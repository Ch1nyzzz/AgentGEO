</span><span data-dcnode-id="4897" id="freeTextContainer5403950988353178202"><span data-dcnode-id="4901" instrument_node="">Joyce Carol Oates, the "grand mistress of ghoulishness" (</span><i data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">Publishers Weekly</span></i><span data-dcnode-id="4898" instrument_node="">), showcases her mastery in four deeply disturbing novellas that will leave the reader both quaking and pining for more In the titular novella, an academic in Pennsylvania discovers a terrifying trauma from her past after inheriting a house in Cardiff, Maine from someone she has never heard of. Mia, </span></span><span data-dcnode-id="4896" instrument_node="">
</span><span data-dcnode-id="4885" id="freeText5403950988353178202" style="display:none"><span data-dcnode-id="4895" instrument_node="">Joyce Carol Oates, the "grand mistress of ghoulishness" (</span><i data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">Publishers Weekly</span></i><span data-dcnode-id="4892" instrument_node="">), showcases her mastery in four deeply disturbing novellas that will leave the reader both quaking and pining for more In the titular novella, an academic in Pennsylvania discovers a terrifying trauma from her past after inheriting a house in Cardiff, Maine from someone she has never heard of. Mia, the protagonist of "Miao Dao," is a pubescent girl overcome with loneliness, who befriends a feral cat that becomes her protector from the increasingly aggressive males that surround her.</span><br data-dcnode-id="4891"><br data-dcnode-id="4890"><span data-dcnode-id="4889" instrument_node="">A brilliant but shy college sophomore realizes that she is pregnant in "Phan-tomwise: 1972." Distraught, she allows a distinguished visiting professor to take her under his wing, though it quickly becomes evident that he is interested in more than an academic mentorship. Lastly, "The Surviving Child" is Stefan, who was spared when his mother, a famous poet, killed his sister and herself. Stefan's father remarries, but his young wife is haunted by dead poet's voice dancing in the wind, an inexplicably befouled well, and a compulsive draw to the same gar-age that took two lives.</span><br data-dcnode-id="4888"><br data-dcnode-id="4887"><span data-dcnode-id="4886" instrument_node="">In these psychologically daring, chillingly suspenseful pieces, Joyce Carol Oates writes about women facing threats past and present.</span></span><span data-dcnode-id="4884" instrument_node="">

</span><span data-dcnode-id="4387" id="freeTextContainer8273911584606754294"><span data-dcnode-id="4401" instrument_node="">5 "how the heck do you doit?" stars !!</span><br data-dcnode-id="4400"><br data-dcnode-id="4399"><b data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">The Bronze Award Read of 2020 (third favorite read)</span></b><br data-dcnode-id="4396"><br data-dcnode-id="4395"><span data-dcnode-id="4394" instrument_node="">Thank you to Netgalley, the author and Grove Atlantic for an advance ebook in exchange for my honest review. This will be released in October 2020.</span><br data-dcnode-id="4393"><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">I am absolutely astonished that in a collection of 4 novellas that ALL OF THEM WOULD BE FUCKIN BRILLIANT !!</span><br data-dcnode-id="4390"><br data-dcnode-id="4389"><span data-dcnode-id="4388" instrument_node="">Ms. Oates' collection is hypnotic, mesmerizing, terrifying, astute and true. I will list the novella's title and a brief little review of each. These mini-re</span></span><span data-dcnode-id="4386" instrument_node="">
</span><span data-dcnode-id="4312" id="freeText8273911584606754294" style="display:none"><span data-dcnode-id="4385" instrument_node="">5 "how the heck do you doit?" stars !!</span><br data-dcnode-id="4384"><br data-dcnode-id="4383"><b data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">The Bronze Award Read of 2020 (third favorite read)</span></b><br data-dcnode-id="4380"><br data-dcnode-id="4379"><span data-dcnode-id="4378" instrument_node="">Thank you to Netgalley, the author and Grove Atlantic for an advance ebook in exchange for my honest review. This will be released in October 2020.</span><br data-dcnode-id="4377"><br data-dcnode-id="4376"><span data-dcnode-id="4375" instrument_node="">I am absolutely astonished that in a collection of 4 novellas that ALL OF THEM WOULD BE FUCKIN BRILLIANT !!</span><br data-dcnode-id="4374"><br data-dcnode-id="4373"><span data-dcnode-id="4372" instrument_node="">Ms. Oates' collection is hypnotic, mesmerizing, terrifying, astute and true. I will list the novella's title and a brief little review of each. These mini-reviews were written right after I read the piece and are collected here.</span><br data-dcnode-id="4371"><br data-dcnode-id="4370"><br data-dcnode-id="4369"><span data-dcnode-id="4368" instrument_node="">Cardiff, by the Sea (5 stars) </span><br data-dcnode-id="4367"><br data-dcnode-id="4366"><span data-dcnode-id="4365" instrument_node="">This novella is so moving, so thrilling, so astute. A young woman receives a call from a lawyer in Maine. She has inheritance ! But she is adopted. Who were her parents ? On this quest she meets her great-aunts, her uncle. This little ditty does not do this novella justice. It is likely one of the best little psychological pieces I have ever read....as good as yes....Shirley Jackson ! That says it all !</span><br data-dcnode-id="4364"><br data-dcnode-id="4363"><span data-dcnode-id="4362" instrument_node="">I will revisit this novella for sure but more for its prose and structure to help me with my own creative writing. I felt short of breath, afraid and thrilled reading this one !</span><br data-dcnode-id="4361"><br data-dcnode-id="4360"><span data-dcnode-id="4359" instrument_node="">Fuck fuck fuck this was so damn good Ms. Oates !</span><br data-dcnode-id="4358"><br data-dcnode-id="4357"><span data-dcnode-id="4356" instrument_node="">Miao Dao (5 stars)</span><br data-dcnode-id="4355"><br data-dcnode-id="4354"><span data-dcnode-id="4353" instrument_node="">Mia is turning 12, 13, 14. Mia is deeply hurt by her mother, her departing father, her distant unsupportive friends. The boys at school are both silly and brutish, the stepfather is.....</span><br data-dcnode-id="4352"><br data-dcnode-id="4351"><span data-dcnode-id="4350" instrument_node="">Mia loves the feral cats and one beautiful white one is angelic yet terrible....</span><br data-dcnode-id="4349"><br data-dcnode-id="4348"><span data-dcnode-id="4347" instrument_node="">This is a terrifying and deeply sad story that has wisdom and rhythm.</span><br data-dcnode-id="4346"><br data-dcnode-id="4345"><span data-dcnode-id="4344" instrument_node="">Ms. Oates you are astounding me !</span><br data-dcnode-id="4343"><br data-dcnode-id="4342"><span data-dcnode-id="4341" instrument_node="">Phan-tomwise, 1972 (5 stars)</span><br data-dcnode-id="4340"><br data-dcnode-id="4339"><span data-dcnode-id="4338" instrument_node="">A 19 yo undergrad in humanities is so very lonely, so very bright, so very naive. She tangles with two malignant narcissists (one paternalistic, one sneering) and the results are not just frightening but terrifying, horrifying.</span><br data-dcnode-id="4337"><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">One of the most ruthless tales about misogyny that I have ever read. I was breathless and hopeless reading this.</span><br data-dcnode-id="4334"><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">Ms. Oates....just stop....you are so bloody good !</span><br data-dcnode-id="4331"><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">The Surviving Child (5 stars)</span><br data-dcnode-id="4328"><br data-dcnode-id="4327"><span data-dcnode-id="4326" instrument_node="">A new stepmother for Stefan. His mother killed herself and murdered his sister ! The new stepmother is haunted by the new seaside house, by strange happenings, by the notoriety of the brilliant first wife. Her love for Stefan is fierce but will that save her from succumbing to....</span><br data-dcnode-id="4325"><br data-dcnode-id="4324"><span data-dcnode-id="4323" instrument_node="">This is a brilliant psychological ghost story. Chilling, everyday, horrifying. Amazing !!</span><br data-dcnode-id="4322"><br data-dcnode-id="4321"><span data-dcnode-id="4320" instrument_node="">Ms. Oates I bow down to your ghoulish brilliance !</span><br data-dcnode-id="4319"><br data-dcnode-id="4318"><span data-dcnode-id="4317" instrument_node="">As you can probably tell ....these are novellas to both frighten and tantalize and are the PERFECT ADDITION to your autumn and especially Halloween reading list.</span><br data-dcnode-id="4316"><br data-dcnode-id="4315"><span data-dcnode-id="4314" instrument_node=""> </span><img class="gr-hostedUserImg" data-dcnode-id="4313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1600108059i/30105780._SX540_.jpg&amp;raw"></span><span data-dcnode-id="4311" instrument_node="">

</span><span data-dcnode-id="4212" id="freeTextContainer13755420806764168951"><span data-dcnode-id="4216" instrument_node="">I’ve had one experience reading the work of Joyce Carol Oates about ten years ago. I thought that </span><i data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">We Were the Mulvaneys</span></i><span data-dcnode-id="4213" instrument_node=""> would completely absorb me, but I failed to connect to that story on some level I can’t quite point to now. I’ve been hesitant to read her since - until last month, when this collection of novellas labeled as ‘suspense’ caught my attention. I’ll admit the title has a kind of pull to it as well. It sounds rather idyllic, so I was curious to see how that would likely be turned ov</span></span><span data-dcnode-id="4211" instrument_node="">
</span><span data-dcnode-id="4163" id="freeText13755420806764168951" style="display:none"><span data-dcnode-id="4210" instrument_node="">I’ve had one experience reading the work of Joyce Carol Oates about ten years ago. I thought that </span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">We Were the Mulvaneys</span></i><span data-dcnode-id="4207" instrument_node=""> would completely absorb me, but I failed to connect to that story on some level I can’t quite point to now. I’ve been hesitant to read her since - until last month, when this collection of novellas labeled as ‘suspense’ caught my attention. I’ll admit the title has a kind of pull to it as well. It sounds rather idyllic, so I was curious to see how that would likely be turned over on its head. These ended up satisfying my desire to read something rather chilling during October!</span><br data-dcnode-id="4206"><br data-dcnode-id="4205"><i data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">“It’s the twilit Maine of Winslow Homer that Clare finds most haunting – mist-shrouded, clouded, evasive. Porous boundaries between shoreline and sea, sea and horizon, horizon and sky, as in a watercolor wash.”</span></i><br data-dcnode-id="4202"><br data-dcnode-id="4201"><span data-dcnode-id="4200" instrument_node="">In the title piece, “Cardiff, by the Sea”, a young woman finds herself the heiress of a long abandoned house by the sea in Maine. She also learns about a biological family of which she has no memory, having been adopted as a very young child. She uncovers a gruesome story and meets an eccentric pair of great aunts and a sinister uncle while making the arrangements to claim her inheritance. This was my favorite of the novellas. It was unsettling and steeped in a deliciously eerie atmosphere. Clare’s confusion and sparks of brief visions take on a nightmarish quality that drew me right in. This may be a stretch, but I felt a little Henry James influence here. Perhaps it was the ambiguity and the mental state of the protagonist that put me in mind of </span><i data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">The Turn of the Screw</span></i><span data-dcnode-id="4197" instrument_node=""> a bit. But I liked this one a lot more than that classic piece!</span><br data-dcnode-id="4196"><br data-dcnode-id="4195"><i data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">“… if you stand very still and stare long enough, you will see the feral cats emerge. Wary, watchful, glittery eyes. Ears pricked in alertness.”</span></i><br data-dcnode-id="4192"><br data-dcnode-id="4191"><span data-dcnode-id="4190" instrument_node="">“Miao Dao” was probably my least favorite of the bunch, but it delivered a disturbing tale for those that might have a strong aversion to cats. There are a lot of them skulking around in this story, the most intimidating being one named Miao Dao by a friendless teen, Mia. Beware of white cats with black eyes (and adolescent girls), especially if you are a bully or a creep!</span><br data-dcnode-id="4189"><br data-dcnode-id="4188"><i data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">“Afterward she would recall how at dusk the old Gothic buildings of the campus took on a sepulchral air. And how a light mist seemed to radiate from streetlamps, as if the very air had become blurred.”</span></i><br data-dcnode-id="4185"><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node="">“Phantomwise: 1972” takes the reader onto a college campus where a young, lonely academic is exploited by not just one but two predators. This one had a rather surprising twist to it!</span><br data-dcnode-id="4182"><br data-dcnode-id="4181"><i data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">“The first glimpse she has of the surviving child is shocking to her: a beautiful face, pale and lightly freckled, darkly luminous eyes, a prematurely adult manner – solemn, sorrowful, wary, and watchful.”</span></i><br data-dcnode-id="4178"><br data-dcnode-id="4177"><span data-dcnode-id="4176" instrument_node="">A shocking murder and suicide are highlighted in “The Surviving Child”, with a young boy having escaped a fatal outcome but certainly not the horror of the event itself. When the boy’s father remarries, the new stepmother is haunted by the stories of the tragic demise of a troubled poet and her little daughter. There’s a spine-tingling supernatural quality in this short work that delivers some gratifying chills. </span><br data-dcnode-id="4175"><br data-dcnode-id="4174"><span data-dcnode-id="4173" instrument_node="">Overall, I thought this was a fantastic collection. Just frightening enough without going over the top. Psychological suspense and terror work much better for me than ravenous zombies, dolls with evil intentions, or one grisly bloodbath after another. At times the abbreviated style of the writing didn’t always appeal but I liked this well enough that I’m encouraged to make another attempt at one of Oates’s full length novels. There are just so many to choose from, I don’t know quite where I’ll land next!</span><br data-dcnode-id="4172"><br data-dcnode-id="4171"><span data-dcnode-id="4170" instrument_node="">Thanks to my fine friend Jaidee for pointing me towards this delightfully disturbing collection! Check out his spirited review here: </span><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/3334398512%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4169" instrument_node="">https://www.goodreads.com/review/show...</span></a><br data-dcnode-id="4167"><br data-dcnode-id="4166"><i data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">“If I were to live here in Cardiff, by the sea, I think that another self would emerge in me. My soul.”</span></i></span><span data-dcnode-id="4162" instrument_node="">

</span><span class="readable" data-dcnode-id="3954" id="reviewTextContainer3486710261"><span data-dcnode-id="3982" instrument_node="">
</span><span data-dcnode-id="3980" id="freeTextContainer1217244393609629335"><span data-dcnode-id="3981" instrument_node="">Joyce Carol Oates is a versatile author and a prolific one as well. I have read her off and on for years, with varying degrees of success. Her writing style can change from book to book, but this one, consisting of four novellas, is straightforward. She uses, in the first and last story, foreshadowing, so in those two stories we get a small taste of what is to follow. Psychological thrillers, that are just chilling enough that I found them delicious. Females take center stage in all four of thes</span></span><span data-dcnode-id="3979" instrument_node="">
</span><span data-dcnode-id="3959" id="freeText1217244393609629335" style="display:none"><span data-dcnode-id="3978" instrument_node="">Joyce Carol Oates is a versatile author and a prolific one as well. I have read her off and on for years, with varying degrees of success. Her writing style can change from book to book, but this one, consisting of four novellas, is straightforward. She uses, in the first and last story, foreshadowing, so in those two stories we get a small taste of what is to follow. Psychological thrillers, that are just chilling enough that I found them delicious. Females take center stage in all four of these novellas.</span><br data-dcnode-id="3977"><br data-dcnode-id="3976"><span data-dcnode-id="3975" instrument_node="">In the first, a young women who was adopted, receives a phone call that leads her to find out about her birth family. Needless to say, all is not as it first appears.</span><br data-dcnode-id="3974"><br data-dcnode-id="3973"><span data-dcnode-id="3972" instrument_node="">In the second, a young teen harassed at school because of her developing body, added to her fluctuating home life, finds comfort in the midst of feral cats. One cat in particular will figure prominently in this story.</span><br data-dcnode-id="3971"><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">The third and my least favorite showcases a young college student taken advantage of by an older teacher. A prominent poet also figures largely. I was, however, surprised by the ending.</span><br data-dcnode-id="3968"><br data-dcnode-id="3967"><span data-dcnode-id="3966" instrument_node="">The fourth, and my favorite, also features a poet, albeit a dead one. In this one a young woman married into a house with a troubled past. Secrets a plenty, and of course, things are not as they appear and secrets are abound.</span><br data-dcnode-id="3965"><br data-dcnode-id="3964"><span data-dcnode-id="3963" instrument_node="">These are not bloody, horrific stories, but well thought out stories with fully realized characters. Like short stories, novellas let one read in manageable time frames.</span><br data-dcnode-id="3962"><br data-dcnode-id="3961"><span data-dcnode-id="3960" instrument_node="">ARC from Edelweiss.</span></span><span data-dcnode-id="3958" instrument_node="">

</span><span data-dcnode-id="3863" id="freeTextContainer839853070690552240"><span data-dcnode-id="3875" instrument_node="">Joyce Carol Oats is a realistic and prolific author. Her fiction has great atmosphere and characters. </span><br data-dcnode-id="3874"><span data-dcnode-id="3873" instrument_node="">It’s easy to lose oneself in her stories. </span><br data-dcnode-id="3872"><span data-dcnode-id="3871" instrument_node="">Oats published her first novel in 1963.... and has since written 58 novels ....plus many collection of short stories, essays, plays, non-fiction, and poetry. She’s also a professor, editor, and literary critic. </span><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">Her contributions to the literary world are remarkable.</span><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node="">It was a pleasure to hear her speak a couple of times at book readings. </span><br data-dcnode-id="3866"><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">“Night Sleep Death</span></span><span data-dcnode-id="3862" instrument_node="">
</span><span data-dcnode-id="3725" id="freeText839853070690552240" style="display:none"><span data-dcnode-id="3861" instrument_node="">Joyce Carol Oats is a realistic and prolific author. Her fiction has great atmosphere and characters. </span><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node="">It’s easy to lose oneself in her stories. </span><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">Oats published her first novel in 1963.... and has since written 58 novels ....plus many collection of short stories, essays, plays, non-fiction, and poetry. She’s also a professor, editor, and literary critic. </span><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">Her contributions to the literary world are remarkable.</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">It was a pleasure to hear her speak a couple of times at book readings. </span><br data-dcnode-id="3852"><br data-dcnode-id="3851"><span data-dcnode-id="3850" instrument_node="">“Night Sleep Death The Stars” is one of my favorite novels— a family portrait with an unforgettable beginning pointing to the racial crisis we’ve seen this year in 2020....( but the book was written much before this year)...</span><br data-dcnode-id="3849"><span data-dcnode-id="3848" instrument_node="">It’s an ambitious 800 page novel - that I still try to convince every reader I know to read it. </span><br data-dcnode-id="3847"><span data-dcnode-id="3846" instrument_node="">I feel strong about two novels in recent years:</span><br data-dcnode-id="3845"><span data-dcnode-id="3844" instrument_node="">“Night Sleep Death The Stars”</span><br data-dcnode-id="3843"><span data-dcnode-id="3842" instrument_node="">and</span><br data-dcnode-id="3841"><span data-dcnode-id="3840" instrument_node="">“The Hearts Invisible Furies” by John Boyne. </span><br data-dcnode-id="3839"><span data-dcnode-id="3838" instrument_node="">I like both books soooo much — it’s a toss up of which of the two is my ‘very’ favorite. </span><br data-dcnode-id="3837"><span data-dcnode-id="3836" instrument_node="">It’s very rare for me to read 800 - to 1000 page books THAT I WISH DIDN’T END...</span><br data-dcnode-id="3835"><span data-dcnode-id="3834" instrument_node="">I still wanted ‘more’. </span><br data-dcnode-id="3833"><span data-dcnode-id="3832" instrument_node="">“Night....” was that 800 page experience.</span><br data-dcnode-id="3831"><span data-dcnode-id="3830" instrument_node="">“Pillars of The Earth” and “World Without End”, both by Ken Follett, we’re also. </span><br data-dcnode-id="3829"><span data-dcnode-id="3828" instrument_node="">“A Little Life”, by Hanya Yanagihara, was another. </span><br data-dcnode-id="3827"><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">There are more books written by Oats ( a five time Pulitzer Prize finalist), than I’ve read....</span><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">yet I’ve enjoyed many. ( varied genres)....</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">with much admiration, respect for her talent. </span><br data-dcnode-id="3820"><br data-dcnode-id="3819"><span data-dcnode-id="3818" instrument_node="">Being such a die-hard fan of </span><br data-dcnode-id="3817"><span data-dcnode-id="3816" instrument_node="">“Night Sleep Death The Stars”....</span><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node="">I can’t imagine any Oats book being better. ( but willing to be wrong)...</span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">That said....</span><br data-dcnode-id="3811"><span data-dcnode-id="3810" instrument_node="">“Cardiff By The Sea” was TERRIFIC...</span><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node="">Each of the four novellas were engaging, suspenseful, psychologically spooky, and most importantly ( to me)....</span><br data-dcnode-id="3807"><span data-dcnode-id="3806" instrument_node="">enjoyably electric. </span><br data-dcnode-id="3805"><span data-dcnode-id="3804" instrument_node="">The characters memorable—</span><br data-dcnode-id="3803"><span data-dcnode-id="3802" instrument_node="">The storytelling gripping—</span><br data-dcnode-id="3801"><span data-dcnode-id="3800" instrument_node="">Yep!.... a book worthy of the money I spent!!! </span><br data-dcnode-id="3799"><span data-dcnode-id="3798" instrument_node=""> (I rarely visit Netgalley these days), - but after reading this book I noticed it was published by one of my favorite publishers from way back: Grove Atlantic. </span><br data-dcnode-id="3797"><span data-dcnode-id="3796" instrument_node="">No surprise to me that Grove Atlantic &amp; Joyce Carol Oats were a team with this book.</span><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node="">I love and admire them both. </span><br data-dcnode-id="3793"><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">Now... for a few tidbits about the 4 novellas:</span><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">Here’s an excerpt from the first story:</span><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">“Cardiff By The Sea”....</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node=""> “Clare has never told anyone that she was adopted. That is her secret. So now she can’t tell anyone about the happiness she feels as an heiress”. </span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">Proof that someone cared for her. A grandmother. </span><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node=""> “But why did you wait so long to acknowledge you, Clare— this grandmother of yours...”. </span><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node=""> “And what about your (birth) parents? Are they alive? Will you try to contact them?” </span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node=""> “Within a day or two you might meet them. Whatever awaits you in Cardiff”. </span><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node=""> “Clare tried not to think much about her mother or father. She assumed that neither parent was living, for otherwise why would their daughter big given away to strangers at the age of two years, nine months?” </span><br data-dcnode-id="3774"><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">One more:</span><br data-dcnode-id="3771"><span data-dcnode-id="3770" instrument_node=""> Clare Seidel:</span><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node=""> “She will want to make inquiries: mother (Kathryn), father (Conner), sister (Emma), brother (Laird). She will want to see photographs of the lost family; she will want to make copies of these photographs. She will not (yet) want to ask, ‘Why did my father do such a terrible thing?’— for the question is too bright and blinding, like gazing into the sun”. </span><br data-dcnode-id="3767"><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">The second story is called “Miao Dao” </span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">We read about a young girl named, Mia.</span><br data-dcnode-id="3762"><span data-dcnode-id="3761" instrument_node="">It had ten months since Mia‘s father had left their family. The divorce was said to be final. </span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">Her younger brothers, Randy and Kevin, didn’t know what to think. </span><br data-dcnode-id="3758"><span data-dcnode-id="3757" instrument_node="">Her mother, started wearing designer jeans, tight fitting suede trousers and matching jackets, high-heeled boots, and wearing lots of face makeup. </span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">Recently Mia’s mother had been going out on dates. Mia found it pathetic… After all her mother was in her late thirties. </span><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">The nerve of her! </span><br data-dcnode-id="3752"><span data-dcnode-id="3751" instrument_node="">As the story continues - we hurt for this young girl </span><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">Home life is not a place where Mia feels protected and safe. </span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">Her mother remarried... making life for Mia scarier. </span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">Life at school was just as bad with crude and cruel boys bullying her.</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">Her one savior was “Miao Dao”....a feral cat. </span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">This was a sad story. Also a reminder how much our fury friend’s comfort can help save us in the best of ways. </span><br data-dcnode-id="3740"><br data-dcnode-id="3739"><span data-dcnode-id="3738" instrument_node="">There are two more stories- each as strong as the first two. </span><br data-dcnode-id="3737"><span data-dcnode-id="3736" instrument_node="">Haunting, unsettling, suspenseful.</span><br data-dcnode-id="3735"><br data-dcnode-id="3734"><span data-dcnode-id="3733" instrument_node="">Remarkable skillful author!!!</span><br data-dcnode-id="3732"><br data-dcnode-id="3731"><br data-dcnode-id="3730"><br data-dcnode-id="3729"><br data-dcnode-id="3728"><br data-dcnode-id="3727"><br data-dcnode-id="3726"></span><span data-dcnode-id="3724" instrument_node="">

</span><span data-dcnode-id="3622" id="freeTextContainer6511891511009761686"><span data-dcnode-id="3626" instrument_node="">It’s been awhile since I’ve read a new JCO, but after reading this, I’m reminded one reason she’s likely so prolific is her finger has always, even from her earliest publications, been on the pulse of the zeitgeist. That’s not to say her stories are ephemeral, with no relevance to the past (or to a likely future). The collection’s third story is set in 1972. With superficial changes it could be of today or, unfortunately, of tomorrow.</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">JCO has a style, at least in these novellas, that draws me in,</span></span><span data-dcnode-id="3621" instrument_node="">
</span><span data-dcnode-id="3598" id="freeText6511891511009761686" style="display:none"><span data-dcnode-id="3620" instrument_node="">It’s been awhile since I’ve read a new JCO, but after reading this, I’m reminded one reason she’s likely so prolific is her finger has always, even from her earliest publications, been on the pulse of the zeitgeist. That’s not to say her stories are ephemeral, with no relevance to the past (or to a likely future). The collection’s third story is set in 1972. With superficial changes it could be of today or, unfortunately, of tomorrow.</span><br data-dcnode-id="3619"><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">JCO has a style, at least in these novellas, that draws me in, though I can see how it might not be appealing to some. You have to not mind parenthetical asides/additions or internal thoughts inside an already closely rendered point of view; sometimes these thoughts are not always what they seem to be and are more closely tied to the ending.</span><br data-dcnode-id="3616"><br data-dcnode-id="3615"><span data-dcnode-id="3614" instrument_node="">The ending of the title novella blew me away, its prose (almost identical to the beginning, yet quite different in tone) shifting the meaning of what came before, even if just slightly: a slight (of hand) off-kilter. The first two stories feature females—one is thirty, the other a young teenager—who are desperately lonely; they both acquire a kitchen knife and undergo dissociative experiences. In the third story, the knives of the earlier stories become a symbolic Kinch (a James Joyce word from </span><i data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Ulysses</span></i><span data-dcnode-id="3611" instrument_node="">). A knife mentioned in the fourth story is invisible. The depicted violence of the third story reminded me of the completely realistic </span><a data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/39989597.Ways_to_Hide_in_Winter" rel="nofollow noopener" title="Ways to Hide in Winter by Sarah St. Vincent"><span data-dcnode-id="3610" instrument_node="">Ways to Hide in Winter</span></a><span data-dcnode-id="3608" instrument_node="">. The fourth story seems a reworking of </span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/12873.Rebecca" rel="nofollow noopener" title="Rebecca by Daphne du Maurier"><span data-dcnode-id="3607" instrument_node="">Rebecca</span></a><span data-dcnode-id="3605" instrument_node=""> combined with a fairy tale I won’t name as it might be a clue to a spoiler. </span><br data-dcnode-id="3604"><br data-dcnode-id="3603"><span data-dcnode-id="3602" instrument_node=""> The stories deal with male violence toward women (and sometimes children), not ‘just’ misogyny, which seems to have lost some of its meaning due to (over)use, but masculine toxicity (a phrase of today). I don’t know how much </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/13388.Shirley_Jackson" rel="nofollow noopener" title="Shirley Jackson"><span data-dcnode-id="3601" instrument_node="">Shirley Jackson</span></a><span data-dcnode-id="3599" instrument_node="">’s works might’ve influenced JCO (she was the editor of one of Jackson’s Library of America volumes) but I felt definite Jacksonian echoes in these stories; perhaps that’s because lonely, undervalued females were Jackson's specialty.</span></span><span data-dcnode-id="3597" instrument_node="">

</span><div class="uitext greyText bookshelves" data-dcnode-id="3511"><span data-dcnode-id="3518" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/8665845-debbie%3Fshelf%3Dedelweiss"><span data-dcnode-id="3517" instrument_node="">edelweiss</span></a><span data-dcnode-id="3515" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/8665845-debbie%3Fshelf%3Dnovella"><span data-dcnode-id="3514" instrument_node="">novella</span></a><span data-dcnode-id="3512" instrument_node="">

</span><span data-dcnode-id="3501" id="freeTextContainer3450908966805018097"><span data-dcnode-id="3505" instrument_node="">I so wanted to pull out my pogo stick and bounce alongside the fans of this book, but damn, I just didn’t feel the love. Mostly it was too gothic for me: dark, macabre, haunting, and atmospheric. It just didn’t make me shiver and quiver with glee. Gothic isn’t my genre, so keep that in mind as I complain. Also, know that despite my Complaint Board, I didn’t hate this book. I just didn’t love it.</span><br data-dcnode-id="3504"><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">There are four novellas here, and each one is about a loner woman who happens to land in creepy-ville.</span></span><span data-dcnode-id="3500" instrument_node="">
</span><span data-dcnode-id="3438" id="freeText3450908966805018097" style="display:none"><span data-dcnode-id="3499" instrument_node="">I so wanted to pull out my pogo stick and bounce alongside the fans of this book, but damn, I just didn’t feel the love. Mostly it was too gothic for me: dark, macabre, haunting, and atmospheric. It just didn’t make me shiver and quiver with glee. Gothic isn’t my genre, so keep that in mind as I complain. Also, know that despite my Complaint Board, I didn’t hate this book. I just didn’t love it.</span><br data-dcnode-id="3498"><br data-dcnode-id="3497"><span data-dcnode-id="3496" instrument_node="">There are four novellas here, and each one is about a loner woman who happens to land in creepy-ville.</span><br data-dcnode-id="3495"><br data-dcnode-id="3494"><b data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Joy Jar:</span></b><br data-dcnode-id="3491"><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node="">-We all know that Oates can write. Some of her images are to die for. And she does this stylistic thing with a lot of her sentences, making them short and leading with a verb. In other books this can annoy me, but here, I liked it.</span><br data-dcnode-id="3488"><br data-dcnode-id="3487"><span data-dcnode-id="3486" instrument_node="">-Oates does a great job of getting into her characters’ heads and showing the psychology of distressed minds. </span><br data-dcnode-id="3485"><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">--Oates is good at creating interesting internal monologues, especially of women in danger or misery.</span><br data-dcnode-id="3482"><br data-dcnode-id="3481"><b data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Complaint Board:</span></b><br data-dcnode-id="3478"><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">-In the first story, Cardiff by the Sea, there is a pair of aunts. They argue and interrupt each other constantly, and their machine-gun volley of unfinished sentences drove me nuts. Way overdone! I wanted them to complete a thought or just shut up. Oates’ way of showing the annoying dialogue is to use a dash after every utterance. I can be dash-crazy, so I shouldn’t talk, but if you wrote down my chatter there wouldn’t be all those dashes. Period.</span><br data-dcnode-id="3475"><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">-Another issue with this first story: It’s repetitive. The main character struggles with remembering a tragic event. Over and over again, to the point of overkill. There is some repetition in the other stories, too, just not as extreme. </span><br data-dcnode-id="3472"><br data-dcnode-id="3471"><span data-dcnode-id="3470" instrument_node="">-At least two of the stories have confusing endings. Perhaps fans of gothic liked the mysterious and eerie endings, but I wanted closure.</span><br data-dcnode-id="3469"><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">-What is real and what is fantasy? We get to see the confusion and imaginings inside the characters’ heads (which is something I usually love), but throughout the stories, I had trouble figuring out what was really happening and what was being imagined.</span><br data-dcnode-id="3466"><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">-All the main characters are women with fragile psyches, and they are described in a similar way. This made the characters themselves seem similar, maybe even interchangeable.</span><br data-dcnode-id="3463"><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">-I got tired of all the main characters being alienated, half-crazy victims. Variety is the spice of life? </span><br data-dcnode-id="3460"><br data-dcnode-id="3459"><span data-dcnode-id="3458" instrument_node="">-Bottom line: I didn’t care about any of them. </span><br data-dcnode-id="3457"><br data-dcnode-id="3456"><span data-dcnode-id="3455" instrument_node="">-Each woman went to a very dark place. I surprised myself by feeling depressed by this! Usually, dark is just fine with me.</span><br data-dcnode-id="3454"><br data-dcnode-id="3453"><span data-dcnode-id="3452" instrument_node="">-Almost every story had a bad ending (one was especially bad). Again, I surprised myself by being bothered by this.</span><br data-dcnode-id="3451"><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">-All the men are awful. I don’t like it when one gender is portrayed as the bad guy.</span><br data-dcnode-id="3448"><br data-dcnode-id="3447"><span data-dcnode-id="3446" instrument_node="">-It took me a long time to finish this book, never a good sign. </span><br data-dcnode-id="3445"><br data-dcnode-id="3444"><span data-dcnode-id="3443" instrument_node="">The read wasn’t a slog, though, and I was interested in seeing how things would turn out. I think it just wasn’t my cuppa.</span><br data-dcnode-id="3442"><br data-dcnode-id="3441"><span data-dcnode-id="3440" instrument_node="">Thanks to Edelweiss for the advance copy.</span><br data-dcnode-id="3439"></span><span data-dcnode-id="3437" instrument_node="">

</span><span class="readable" data-dcnode-id="3256" id="reviewTextContainer3364351198"><span data-dcnode-id="3343" instrument_node="">
</span><span data-dcnode-id="3323" id="freeTextContainer9455445465894150439"><span data-dcnode-id="3342" instrument_node="">/ / / </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wishfullyreading.com/" rel="nofollow noopener"><span data-dcnode-id="3341" instrument_node="">Read more reviews on my blog</span></a><span data-dcnode-id="3339" instrument_node="">&nbsp;/ / /</span><br data-dcnode-id="3338"><br data-dcnode-id="3337"><span data-dcnode-id="3336" instrument_node="">As I highly rate Joyce Carol Oates I was quite looking forward to </span><i data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="3333" instrument_node="">, a collection of four novellas 'of suspense'. While I have only read a few of Oates' works </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2448818502" rel="nofollow noopener"><span data-dcnode-id="3332" instrument_node="">Patricide</span></a><span data-dcnode-id="3330" instrument_node="">, a novella of hers, is a favourite of mine. The novellas collected in </span><i data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="3327" instrument_node=""> have more in common with Oates' </span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2944647702" rel="nofollow noopener"><span data-dcnode-id="3326" instrument_node="">The Pursuit</span></a><span data-dcnode-id="3324" instrument_node=""> as they are not only just as depressing but they are also written in a similar 'stop and start' type of prose. We have staccato sentences t</span></span><span data-dcnode-id="3322" instrument_node="">
</span><span data-dcnode-id="3261" id="freeText9455445465894150439" style="display:none"><span data-dcnode-id="3321" instrument_node="">/ / / </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wishfullyreading.com/" rel="nofollow noopener"><span data-dcnode-id="3320" instrument_node="">Read more reviews on my blog</span></a><span data-dcnode-id="3318" instrument_node="">&nbsp;/ / /</span><br data-dcnode-id="3317"><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">As I highly rate Joyce Carol Oates I was quite looking forward to </span><i data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="3312" instrument_node="">, a collection of four novellas 'of suspense'. While I have only read a few of Oates' works </span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2448818502" rel="nofollow noopener"><span data-dcnode-id="3311" instrument_node="">Patricide</span></a><span data-dcnode-id="3309" instrument_node="">, a novella of hers, is a favourite of mine. The novellas collected in </span><i data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Cardiff, by the Sea</span></i><span data-dcnode-id="3306" instrument_node=""> have more in common with Oates' </span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2944647702" rel="nofollow noopener"><span data-dcnode-id="3305" instrument_node="">The Pursuit</span></a><span data-dcnode-id="3303" instrument_node=""> as they are not only just as depressing but they are also written in a similar 'stop and start' type of prose. We have staccato sentences that often elide their subjects (such as “Chewing, trying to swallow but can't.” or “Seeing the apprehension in the child's face.”). While this style worked in the first novella, the longest in the collection, it felt a bit repetitive and overall less convincing in the following ones. In the first one we follow a deeply traumatised young woman and because of this the prose perfectly conveyed her 'disturbed' psyche. There were scenes where Oates' choppy prose worked well, especially in terms of visuals and pacing: “Mia felt a stab of excitement. Following the flashlight beam. Shining light on ugly gouged tire tracks. Broken and shredded trees.”. As I've said however I do wish that this collection could have showcased Oates' impressive stylistic range.</span><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">These novellas also share many other similarities outside of the way the are written. They feature women who are traumatised, abused, sexually assaulted, and/or gaslighted/manipulated. All of the male characters in these novellas are awful human being. They are pedophiles, rapists, murders, opportunists....the lists goes on. The women in these stories lack agency. There are one or two incidents that suggest otherwise but throughout the course of their narratives they are very much confined to the role of victims. </span><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node=""> </span><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">'Cardiff, by the Sea': 4 stars </span><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">As I've said the best story in this collection is the very first one: 'Cardiff, by the Sea'. This novella was creepy and atmospheric. We follow Clare a woman who receives a call informing her that her grandmother has died...except that Clare has never met or know of her having been raised by adoptive parents. When she visits her newfound 'blood relatives' in Cardiff she becomes increasingly obsessed with the death of her birth parents. She stays with her two great-aunts, who very much reminded me of April Spink and Miriam Forcible from Coraline (except they are far more sinister). They are perpetually arguing and interrupting one another. Perhaps their creepiness is due to Clare's susceptible state of mind, perhaps not. Clare's uncle also lives with them and soon enough Clare becomes convinced that he played some sort of role in her family's demise. </span><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">This story is pure Gothic. Unease reigns supreme. Clare's fragmented and unreliable memories contribute to this unsettling atmosphere. Oates' prose her works really well as it reflects Clare's psyche. Her trauma and shock definitely give her an alienated view of things. If you enjoy Shirley Jackson's work or macabre stories such as the ones penned by Mariana Enríquez chances are you will appreciate this novella which is equal parts suspenseful and disturbing.</span><br data-dcnode-id="3292"><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">'Miao Dao': 3 stars</span><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">This story had potential. I mean: cats killing pervy men? I'm sold. We follow Mia who has just turned thriteen. Her father recently separated from her mother and she now rarely sees him. Her male classmates begin to harass her and her female peers are not all that supportive (if anything they perceive as either a loser or a potential 'threat'). As Mia is 'shamed' for body she begins to feel deeply alienated. Mia finds momentary solace when she is among a group of feral cats that has taken residence in her neighbourhood. </span><br data-dcnode-id="3287"><span data-dcnode-id="3286" instrument_node="">When her mother gets together with a seemingly 'good' guy things take a turn for the worse. Mia ends up taking in a kitten, whom she names Miao Dao, and weird things start happening. </span><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">This story was kind of miserable. Even more so that 'Cardiff, by the Sea' as it focuses on sexual abuse. It also reminded me of my own adolescent, a period of my life I never wish to relive again. The 'leering', the comments, the physical harassment. The way all of these make the victim feel ashamed and embarrassed (as she perceives herself guilty since it is </span><i data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">her</span></i><span data-dcnode-id="3281" instrument_node=""> body that is making these boys and men act this way). So, given all the horrible things that happen to Mia, I was hoping for the story to present us with a satisfying revenge storyline...and it kind of doesn't. The 'cat' element was definitely underused, and I think that the story would have benefitted from venturing more into the paranormal. Still, the ending does kind of make up for some of my initial frustration towards this story.</span><br data-dcnode-id="3280"><br data-dcnode-id="3279"><span data-dcnode-id="3278" instrument_node="">'Phantomwise: 1972' : 2 ½ stars </span><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">This seemed a rehash of the previous two stories. We have a nondescript young woman—who similarly to Clare and Mia is mostly defined by the fact that she is being ill-treated/abused as opposed to having a discernible personality. The story follows a student who becomes involved with a professor (yes, this is that kind of story). As things sour between the two of them, the young woman becomes close to an older man who likes to talk about Lewis Carroll and his 'Alice'. This isn't a gripping or even suspenseful tale. Oates doesn't really subvert this tired female student/male professor dynamic, if anything she goes full on misery porn. Misery and more misery. Women are helpless and men are predators. Great stuff.</span><br data-dcnode-id="3275"><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">'The Surviving Child' : 2 ½ stars</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">This last novella seemed a mix between </span><i data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Rebecca</span></i><span data-dcnode-id="3268" instrument_node=""> and </span><i data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Verity</span></i><span data-dcnode-id="3265" instrument_node="">. We follow the new wife of a man whose previous wife not only committed suicide but she killed their daughter too. She spared the son and the new wife wonders what could have driven her to do so. The prose is once again full of Yoda-like sentences which didn't really add anything to my reading experience. Kind of predictable but not as miserable as the previous novella.</span><br data-dcnode-id="3264"><br data-dcnode-id="3263"><span data-dcnode-id="3262" instrument_node="">With the exception of the titular novella I didn't particularly care for stories in this collection. Oates can certainly write but her style here could have been more varied. Her female characters are passive, even pathetic at times, and I found myself wanting these stories to be more subversive.</span></span><span data-dcnode-id="3260" instrument_node="">

</span><span data-dcnode-id="2992" id="freeTextContainer13086538832172752817"><span data-dcnode-id="2998" instrument_node="">I had a chat with Joyce Carol Oates about this new book which you can watch here: </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpGJlsLdSd28" rel="nofollow noopener"><span data-dcnode-id="2997" instrument_node="">https://www.youtube.com/watch?v=pGJlsLdSd28</span></a><br data-dcnode-id="2995"><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node="">Joyce Carol Oates excels at writing stories of psychological suspense which also contain an underlying layer of more profound and unanswerable questions. In “Cardiff, by the Sea”, her new collection of four novellas, she presents several differently compelling and inventive strategies for teasing the reader into questioning what's real and what's only a part of the narrato</span></span><span data-dcnode-id="2991" instrument_node="">
</span><span data-dcnode-id="2979" id="freeText13086538832172752817" style="display:none"><span data-dcnode-id="2990" instrument_node="">I had a chat with Joyce Carol Oates about this new book which you can watch here: </span><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpGJlsLdSd28" rel="nofollow noopener"><span data-dcnode-id="2989" instrument_node="">https://www.youtube.com/watch?v=pGJlsLdSd28</span></a><br data-dcnode-id="2987"><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">Joyce Carol Oates excels at writing stories of psychological suspense which also contain an underlying layer of more profound and unanswerable questions. In “Cardiff, by the Sea”, her new collection of four novellas, she presents several differently compelling and inventive strategies for teasing the reader into questioning what's real and what's only a part of the narrator's imagination. In the title story, an emotionally-charged terrifying childhood memory haunts a scholarly young woman. In “Miao Dao”, a stray cat becomes a kind of ghost guardian for a vulnerable teenage girl. A bright young student falls prey to her influential mentors in “Phantomwise:1972”. And, in “The Surviving Child”, a new wife joins a household haunted by the memory of a mother who tried to eviscerate her family. These are innately dramatic situations whose psychological complexity is furthered by the longer amount of space the author allows for them to be told, but the stories remain compact enough for their tension to remain breathtakingly persistent. Recent books of short stories by Oates such as “Pursuit” and “Night-Gaunts” present similarly suspenseful situations, but it's interesting how the author works in this new book with slightly longer forms of narrative to produce an effect that is very reminiscent of Henry James' “The Turn of the Screw.” </span><br data-dcnode-id="2984"><br data-dcnode-id="2983"> </span><span data-dcnode-id="2861" id="freeText17978294726359980302" style="display:none"><span data-dcnode-id="2880" instrument_node="">Joyce Carol Oates' new book contains four novellas of suspense with young female protagonists. </span><br data-dcnode-id="2879"><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">In Cardiff, By the Sea, a young academic who was adopted as a child learns she has inherited property on the rugged coast of Maine from a paternal grandmother she never knew she had. Hasn't she always wondered about her biological parents/family and why she was put up for adoption at nearly three-years-of-age? Be careful what you wish for! </span><br data-dcnode-id="2876"><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">In Miao Dao, a twelve-year-old girl struggles with her changing body, school bullies and her dysfunctional family life. Her only friends seem to be a pack of feral cats living in a densely-overgrown cul-de-sac in her neighborhood--particularly one pure white cat she names Miao Dao who becomes quite devoted to the girl. But can feral cats ever be tamed?</span><br data-dcnode-id="2873"><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">In Phantomwise: 1972, a college student begins an affair with one of her professors that leads her into danger.</span><br data-dcnode-id="2870"><br data-dcnode-id="2869"><span data-dcnode-id="2868" instrument_node="">In The Surviving Child, a young woman marries a wealthy older man whose first wife, a renowned poet, committed suicide by carbon monoxide poisoning, killing their daughter but sparing their son. The family home on Cape Cod seems to be haunted by a malevolent presence that is affecting the new wife's happiness. Or is she imagining it all? </span><br data-dcnode-id="2867"><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">These four novellas were all very effectively written with just the right amount of scary atmosphere. The characters were well drawn and in the span of each story, I came to care about each young woman and the situations they were facing. </span><br data-dcnode-id="2864"><br data-dcnode-id="2863"><span data-dcnode-id="2862" instrument_node="">I received an arc of this new book from the publisher via NetGalley in exchange for my honest review. Many thanks!</span></span><span data-dcnode-id="2860" instrument_node="">

</span><span data-dcnode-id="2654" id="freeTextContainer6625829749890219963"><span data-dcnode-id="2662" instrument_node="">Genre: Suspense</span><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">Publisher: Grove Atlantic/Mysterious Press</span><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">Publication Date: October 6, 2020</span><br data-dcnode-id="2657"><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">How does a reviewer review anything written by the living legend, Joyce Carol Oates? Is there any new critique one can possibly add? It is fair to say that Oates is one of the great writers of our time. For decades, she has written in a variety of styles and genres. Particularly effective are her portrayals of violence and evil in modern society. She is a master storyteller in all genres: “We Were the Mulva</span></span><span data-dcnode-id="2653" instrument_node="">
</span><span data-dcnode-id="2600" id="freeText6625829749890219963" style="display:none"><span data-dcnode-id="2652" instrument_node="">Genre: Suspense</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">Publisher: Grove Atlantic/Mysterious Press</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">Publication Date: October 6, 2020</span><br data-dcnode-id="2647"><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">How does a reviewer review anything written by the living legend, Joyce Carol Oates? Is there any new critique one can possibly add? It is fair to say that Oates is one of the great writers of our time. For decades, she has written in a variety of styles and genres. Particularly effective are her portrayals of violence and evil in modern society. She is a master storyteller in all genres: “We Were the Mulvaneys,” is the family saga that explores its breakdown, “Blonde,” is the ultimate study of Marilyn Monroe through a bio-fiction, or in “The Accursed” she is at her gothic best. “Cardiff, by the Sea” consists of four previously unpublished novellas. (I am interested in learning when the author wrote these stories). In these four, we get a good understanding as to why she has been dubbed the “grand mistress of ghoulishness.” Or her more personal nickname of, “Princeton’s Dark Lady of Fiction.” </span><br data-dcnode-id="2644"><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">Oates’ protagonists are usually feminine as they are in this book. The title novella, “Cardiff, by the Sea,” which is my favorite in the collection, reads like a fever dream. A young woman in academia, who was adopted at the age of two, receives a phone call from a lawyer concerning her birth family. She inherited a house in Cardiff, Maine from her biological grandmother whom she has never heard of before. Let the terror begin. She travels to Maine and for the first time and meets her great-aunts and their nephew who is her uncle. The aunts in this short reminded me of the eccentric aunts in the black and white Cary Grant comedy, “Arsenic and Old Lace”(though this novella is no comedy or only very dark humor concerning the aunts). The aunts in the film are portrayed as sweet loving old ladies who just happen to poison lonely men to put them out of their misery. Also, the psychopath uncle from the old movie reminds me of the uncle here in Oates’ imagination. In “Cardiff” the aunts speak so rapidly, without a breath in between words, that the young woman as well as the reader can get a headache. I believe that this is a trick by the author to confuse us. This is best that I can do to get my point across without spoilers. However, I can share, while the young woman stays with her biological family she remembers her traumatic early childhood. These memories are written in a manner that reads as if they are outbursts from the young woman’s unconscious. She, nor the reader, is ever sure if they are real or fake memories. Either way, they are blood curdling scary. </span><br data-dcnode-id="2641"><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node="">My least favorite and the most bizarre in the collection is “Miao Dao.” The story centers on a young teenage girl who’s one of the first in her class to reach puberty. Bad things have been happening to her as she has begun to mature. Unfortunately, her new breasts make her a target for boys who like to bully by “accidentally” bumping into her while making lewd remarks. Simultaneously her parents divorce and she now lives with a lecherous stepfather. She shuts down from all in her life and becomes almost a hermit. Her only friends are a pack of feral cats living in her neighborhood. Oates does such a good job of making us feel the girl’s loneliness, and how these cats become her lifeline. She has taken to sneaking out at night and sleeping with them. And, here is where things get weird. Her new friends become her fierce protectors. One of them grows large and turns into a ferocious cat that may or may not have killed one of the boys who tormented her. In this novella, the famous author reminds me of a modern day Kafka. In his novella, “The Metamorphosis,” did the salesman really turn into a bug, or was his transformation a psychological interpretation of his feelings towards his family and his life. In a way, the same could be said here. Did the cat magically grow strong enough to become able to kill a human or is Oates using its transformation as an analysis of her character? On the other hand, is her character the actual killer and there is nothing mystical at all going on? Damn, Oates is good. The reason I was a bit disappointed in “Miao” is that the teen is written more like a girl obsessed with feral cats than a girl expressing her feelings through them. Still, the author gets her point across.</span><br data-dcnode-id="2638"><br data-dcnode-id="2637"><span data-dcnode-id="2636" instrument_node="">The other two stories revolve around plotlines that Oates has looked at before. One is about a female student who is obsessed with her older professor including all the crap that goes into such a relationship. The other explores motherhood when a female poet has a fatal attraction to a man whom she marries. They are both top quality reads and as always between the horrors, Oates makes you think about aggression against women by the hands of men. “Cardiff” carefully goes back and forth from psychological suspense and supernatural events, but the tales are always creepy. I do not believe that I have ever not recommended a book by my favorite author. This one is no different. As usual, when reading, “Princeton’s Dark Lady of Fiction” you will probably end up having nightmares.</span><br data-dcnode-id="2635"><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">I received this Advance Review Copy (ARC) novel from the publisher at no cost in exchange for an honest review</span><br data-dcnode-id="2632"><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">Find all my book reviews at:</span><br data-dcnode-id="2629"><br data-dcnode-id="2628"><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2627" instrument_node="">https://www.goodreads.com/review/list</span></a><span data-dcnode-id="2625" instrument_node="">...</span><br data-dcnode-id="2624"><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books6259.wordpress.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2623" instrument_node="">https://books6259.wordpress.com/</span></a><br data-dcnode-id="2621"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barnesandnoble.com/review" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2620" instrument_node="">https://www.barnesandnoble.com/review</span></a><span data-dcnode-id="2618" instrument_node="">...</span><br data-dcnode-id="2617"><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/martie.neesr" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2616" instrument_node="">https://www.facebook.com/martie.neesr</span></a><span data-dcnode-id="2614" instrument_node="">...</span><br data-dcnode-id="2613"><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/martie6947/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2612" instrument_node="">https://www.instagram.com/martie6947/</span></a><br data-dcnode-id="2610"><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/martienreco" rel="noopener nofollow </span><span data-dcnode-id="2491" id="freeTextContainer11219464395397381589"><span data-dcnode-id="2492" instrument_node="">I've never read any of Joyce Carol Oates' other works, so I came into this book, a collection of four of her novellas, with a blank slate of expectations. The title itself suggests that they will have suspense, and in the most technical way possible, I suppose you could say that, but it isn't very exciting. While the writing is good - she's particularly talented at communicating the inner monologue of someone experiencing chaotic, confused thinking - the stories, for me, bordered on dull and one</span></span><span data-dcnode-id="2490" instrument_node="">
</span><span data-dcnode-id="2479" id="freeText11219464395397381589" style="display:none"><span data-dcnode-id="2489" instrument_node="">I've never read any of Joyce Carol Oates' other works, so I came into this book, a collection of four of her novellas, with a blank slate of expectations. The title itself suggests that they will have suspense, and in the most technical way possible, I suppose you could say that, but it isn't very exciting. While the writing is good - she's particularly talented at communicating the inner monologue of someone experiencing chaotic, confused thinking - the stories, for me, bordered on dull and one-note, with each story featuring a woman in various states of psychological and/or physical distress caused either, past or present, by one or more male figures in her life. </span><br data-dcnode-id="2488"><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">I get it. There are some men out there who behave badly toward women. As a woman, I'm sympathetic to the situations these women find themselves in. I'm just not sure I prefer spending 400 pages dwelling on it, or demonizing maleness in the process. By displaying many of the male characters as domineering, manipulative, predatory, selfish, or cruel, depending on the story, it also has the effect of making all the female protagonists look weak, pathetic, desperate and dependent, or worse - placating the men who victimize them. I always feel a little confused when that kind of portrayal is written by a woman, because I'm not sure what my take-away is supposed to be. </span><br data-dcnode-id="2485"><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">Regarding the four novellas, I liked the second one, Miao Dao, (it had cats - bonus) and the final one, The Surviving Child, best, as the stories had more sense of resolution. The first one, the titular, Cardiff, by the Sea, was bizarre and confusing to me, but I liked the way Oates wrote the manic back-and-forth conversations between the two great aunts. The third story, Phantomwise: 1972, was interesting, but some aspects of it could come straight out of many current crime shows, so it wasn't particularly suspenseful. All in all, I liked the writing, just not the themes. I'd honestly rather read a book these days that lifts me up.</span><br data-dcnode-id="2482"><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">★★★</span></span><span data-dcnode-id="2478" instrument_node="">

</span><span data-dcnode-id="2379" id="freeText424558529423188225" style="display:none"><span data-dcnode-id="2380" instrument_node="">Impressive that this is the third book I've read by Joyce Carol Oates (JCO) in the space of eight months, each showcasing another facet of her prodigious talent. The fact that the three books consisted of a book of short stories, an 800-page novel, and this, a collection of four novellas only proves that she is equally at home with every form (she also has a book of poetry due out later this year). The theme uniting these four novellas of psychological suspense is women of different ages in danger, but such is her talent that these examples are unique in situation and outcome. She has been writing about the survivor of family mass murder ever since her earliest days, but due to her ability to create individuals, each is remarkable and memorable.</span></span><span data-dcnode-id="2378" instrument_node="">

</span><span data-dcnode-id="2294" id="freeTextContainer4565442898591651383"><span data-dcnode-id="2295" instrument_node="">One of our greatest living authors, Joyce Carol Oates truly captivated me with these four novellas. It’s rare that I read a short story collection where there is no “filler” or weak link - but each of these stories is better than the next. They are, like all her work, beautifully and lyrically written; and also like much of her other work, deeply unsettling. This collection especially appealed to me as a mystery and suspense fan, and was more accessible and easily digested than some of her other</span></span><span data-dcnode-id="2293" instrument_node="">
</span><span data-dcnode-id="2285" id="freeText4565442898591651383" style="display:none"><span data-dcnode-id="2292" instrument_node="">One of our greatest living authors, Joyce Carol Oates truly captivated me with these four novellas. It’s rare that I read a short story collection where there is no “filler” or weak link - but each of these stories is better than the next. They are, like all her work, beautifully and lyrically written; and also like much of her other work, deeply unsettling. This collection especially appealed to me as a mystery and suspense fan, and was more accessible and easily digested than some of her other work. It would be a good introduction to Oates for a suspense fan who has never read her work. I also really enjoyed the feminist, but very dark and disturbing, bent to all of the stories. Perhaps the most shocking story that stays with me the most is “Miao Dao,” which is (and isn’t) about feral cats. This story is incredibly disturbing in the best way, a way that stays with you that you can’t shake. Will probably read it again in the next few days. That story flows seamlessly into the somewhat related Phantomwise: 1972, which is equally haunting. Cardiff By the Sea is the perfect story to start with - and to think it gets even darker from there!</span><br data-dcnode-id="2291"><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node="">I had not read Oates in awhile and this book made me rediscover her all over again, like the time in college when I first read Foxfire. I would love to see another collection like this from Mysterious Press in the future - I for one never knew Oates had published in Ellery Queen mystery magazine, so I am hoping there are even more undiscovered haunting mystery gems of hers out there for me to discover.</span><br data-dcnode-id="2288"><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">Thanks to NetGalley, Grove Atlantic and Joyce Carol Oates for the chance to read this extraordinary book early in exchange for my honest review. The book deserves ten stars, but since I don’t have that capacity, here are the five biggest stars I can give. ⭐️⭐️⭐️⭐️⭐️</span></span><span data-dcnode-id="2284" instrument_node="">
