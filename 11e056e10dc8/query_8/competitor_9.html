</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3811" style="max-height: none; height: 140px;"><span data-dcnode-id="3844" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3820" style="padding-bottom: 20px;"><span data-dcnode-id="3843" instrument_node=""> </span><p data-dcnode-id="3822"><span class="a-text-bold" data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">In </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">New York Times </span></span><span class="a-text-bold" data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">bestselling author Linda Castillo’s new thriller </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Fallen</span></span><span class="a-text-bold" data-dcnode-id="3831"><span data-dcnode-id="3834" instrument_node="">, a rebellious Amish woman leaves the Plain life, but the secrets she takes with her will lead Chief of Police Kate Burkholder down a dark path to danger and death.</span><br data-dcnode-id="3833"><br data-dcnode-id="3832"></span><span data-dcnode-id="3823"><span data-dcnode-id="3830" instrument_node="">When a young woman is found murdered in a Painters Mill motel, Chief of Police Kate Burkholder is shocked to discover she once knew the victim. Rachael Schwartz was a charming but troubled Amish girl who left the fold years ago and fled Painters Mill. Why was she back in town? And who would kill her so brutally?</span><br data-dcnode-id="3829"><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">Kate remembers Rachael as the only girl who was as bad at being Amish as Kate was―and those parallels dog her. But the more Kate learns about Rachael's life, the more she's convinced that her dubious reputation was deserved. As a child, Rachael was a rowdy rulebreaker whose decision to leave devastated her parents and best friend. As an adult, she was charismatic and beautiful, a rabble-rouser with a keen eye for opportunity no matter who got in her way. Her no-holds-barred lifestyle earned her a lot of love and enemies aplenty―both English and Amish. </span><br data-dcnode-id="3826"><br data-dcnode-id="3825"><span data-dcnode-id="3824" instrument_node="">As the case heats to a fever pitch and long-buried secrets resurface, a killer haunts Painters Mill. Someone doesn’t want Rachael’s past―or the mysteries she took with her to the grave―coming to light. As Kate digs deeper, violence strikes again, this time hitting close to home. Will Kate uncover the truth and bring a murderer to justice? Or will a killer bent on protecting a terrible past stop her once and for all―and let the fallen be forgotten?</span></span></p><span data-dcnode-id="3821" instrument_node=""> </span></div><span data-dcnode-id="3819" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3813" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3818"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3814" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3817"></i><span class="a-expander-prompt" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Read more</span></span></a></div><span data-dcnode-id="3812" instrument y fleshed characters, devises an intricate and twisty plot and examines complex issues of religion and morality. A series of literary weight, Castillo’s work appeals to connoisseurs of crime fiction who expect powerful purpose as well as serious storytelling.” –</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Fredericksburg Free-Lance Star</span></span><span data-dcnode-id="2740"><br data-dcnode-id="2743"><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">“Castillo is terrific at constructing a story, and her pacing is impeccable…this series just gets better and better; </span></span><span class="a-text-italic" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Fallen </span></span><span data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">may be the best entry yet.” –</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">St. Louis Post Dispatch</span></span><span data-dcnode-id="2730"><br data-dcnode-id="2733"><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">“</span></span><span class="a-text-italic" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Fallen </span></span><span data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">successfully pushes the envelope of the series…Castillo is more than capable of extracting new stories from a deceptively but deeply complex culture that is as intricate as it is misunderstood.” –</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Bookreporter.com</span></span><span data-dcnode-id="2722"><br data-dcnode-id="2723"></span><span class="a-text-bold" data-dcnode-id="2719"><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">Praise for </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Outsider</span></span><span class="a-text-bold" data-dcnode-id="2713"><span data-dcnode-id="2716" instrument_node="">:</span><br data-dcnode-id="2715"><br data-dcnode-id="2714"></span><span data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">“A pulse-pounding Amish thriller (really!) that’s all too relevant to our time.” ―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Kirkus Reviews </span></span><span class="a-text-bold" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">(starred)</span></span><span data-dcnode-id="2703"><br data-dcnode-id="2706"><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">“[A] fast-paced, suspense-building ride, showing the character development and sensitivity to the Amish culture that mark Castillo’s masterful crime fiction.” –</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Booklist </span></span><span class="a-text-bold" data-dcnode-id="2698"><span data-dcnode-id="2700" instrument_node="">(starred)</span><br data-dcnode-id="2699"></span><span data-dcnode-id="2695"><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node="">“Bestseller Castillo’s suspenseful 12th Kate Burkholder mystery…Castillo presents a loving, realistic portrait of Amish life. Readers will hope Kate has a long career.” </span></span><span class="a-text-bold" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">―</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Publishers Weekly</span></span></p><span data-dcnode-id="2689" instrument_node=""> </span></div><span data-dcnode-id="2687" instrument_node=""> </span><h3 data-dcnode-id="2684"><span data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2683" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2662"><span data-dcnode-id="2682" instrument_node=""> </span><span data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Linda Castillo is the author of the</span></span><span class="a-text-italic" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node=""> New York Times </span></span><span data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">and</span></span><span class="a-text-italic" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node=""> USA Today </span></span><span data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">bestselling Kate Burkholder series, set in the world of the Amish. The first book, </span></span><span class="a-text-italic" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Sworn to Silence</span></span><span data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">, was adapted into a Lifetime original movie titled </span></span><span class="a-text-italic" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">An Amish Murder</span></span><span data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node=""> starring Neve Campbell as Kate Burkholder. Castillo is the recipient of numerous industry awards including a nomination by the International Thriller Writers for Best Hardcover, the Mystery Writers of America’s Sue Grafton Memorial Award, and an appearance on the Boston Globe’s shortlist for best crime novel. In addition to writing, Castillo’s other passion is horses. She lives in Texas with her husband and is currently at work on her next book.</span></span><span data-dcnode-id="2663" instrument_node=""> </span></div><span data-dcnode-id="2661" instrument_node=""> </span></div><span data-dcnode-id="2659" instrument_node=""> </span></div><span data-dcnode-id="2657" instrument_node="">

</span><span class="a-size-base cr-lightbox-review-body" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">
            I can't believe that this is the 13th installment in this series already! I've been a fan of this great series from the very start and always am excited to get my hands on the latest one! This one opens up with the brutal murder of a woman who had left Painter's Mill - and her Amish life - behind twelve years earlier. Murdered in her motel room, this quickly becomes a personal case to chief of police, Kate who recalls babysitting the free-spirited girl long ago. The plot unfolds a little slowly - with the townsfolk once again shocked that violence lies within their community (though it does seem to happen about once a year for the last twelve years, haha!).The story includes the investigation, but also insight into the victim's past and youth. It's a story of her adventures - but also of her deep friendship with Loretta, who stayed within the Amish life. Ultimately, the plot may not be too surprising to all readers, but the pacing really picks up at the end. And as far as Kate's own personal arc goes, this one does little to develop her to move the series along as a whole. It would be nice to see Kate develop more, particularly in her personal relationships that really have stalled in the last few books. But, nothing is given away about past books should a reader choose to start here - though I definitely recommend starting with the first book, SWORN TO SILENCE.

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1682" data-hook="review-date"><span data-dcnode-id="1683" instrument_node="">Reviewed in the United States on July 7, 2021</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1679"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1680" data-hook="avp-badge-linkless"><span data-dcnode-id="1681" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1638"><span class="a-size-base review-text" data-dcnode-id="1639" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1640" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1647" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1678" instrument_node="">
</span><span data-dcnode-id="1649"><span data-dcnode-id="1677" instrument_node="">
  FINAL DECISION: An enjoyable suspense/mystery story. The circumstances are really sad but I love Kate and John getting the opportunity to do some work together. The story kept me guessing and I was surprised by the ending. This series is fantastic and always a great summer read.</span><br data-dcnode-id="1676"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">THE STORY: Chief of Police Kate Burkholder is called to a motel where a young woman has been brutally murdered. She is surprised to realize that she knows the woman who was killed. She was raised Amish and then left the Amish faith and Painters Mill. No one seems to know why she returned and who wanted to kill her. Kate’s investigation brings out many secrets and threatens someone who wants those secrets buried.</span><br data-dcnode-id="1673"><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">OPINION: This is a great read to take to the beach. Murder, suspense, and the great character of Kate Burkholder. The story is well-crafted and while not as personal for Kate, I enjoyed watching her do her job. I was surprised by the ending and felt that the story was topical and yet did not feel forced.</span><br data-dcnode-id="1670"><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">The crime here was violent and the story was graphic at times, but I felt that was completely appropriate in this case. The horror of the crimes committed here is important for understanding the gravity of the acts and builds surprise as to the final resolution.</span><br data-dcnode-id="1667"><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">The book made me turn the pages as it started with a shocking crime that drives the story through to the end. As is often these cases, things don’t turn out as expected, but everything works with the explanation. Reading these books again often surprises me how things are planted throughout the book which provides clues to the solution.</span><br data-dcnode-id="1664"><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">Another winner in this series although a tiny complaint is that I still prefer the more personal stories to the professional cop ones, but no complaints on the actual story and execution.</span><br data-dcnode-id="1661"><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">WORTH MENTIONING: I love the interaction between Kate and John and this book has some really good moments between them that raised the level of this book.</span><br data-dcnode-id="1658"><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">CONNECTED BOOKS: FALLEN is the thirteenth book in the Kate Burkholder series. Each of the books is a self-contained mystery so this book can be read as a standalone. However, there are continuing personal stories that make this series better to read in order.</span><br data-dcnode-id="1655"><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">STAR RATING: I give this book 5 stars.</span><br data-dcnode-id="1652"><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">NOTE: I received an eARC of this book via Netgalley. I was not required to write a review or to write a positive review. All opinions contained herein are my own.

  This is book #13 for Linda Castillo to write having Kate Burkholder as the main character.  I have read all thirteen books in the series and I never know what to expect in the next story Linda Castillo writes.  This one has twists and turns with a lot of mystery tied in.  Kate Burkholder is a strong character that you will not soon forget.  She is a determined character to solve the mystery she has been dealt with.  This story grabs you from the first page and you will not want to put it down.  I do not go into a full description of the story just know I highly recommend this book and the author Linda Castillo does her stories well.

</span><span data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">
  Like the previous books in the Kate Burkholder series, I flew through this one.  When a formerly Amish woman returns to Painters Mill only to be brutally murdered, Kate not only has to figure out who did it, but why the victim had so many enemies.  Kate had a soft spot for Rachel, having baby sat for her when she was younger.  Since they were both rebellious youngsters who left the fold, Kate can’t help but wonder who would inflict such violence on Rachel.</span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">Rachel is one of those characters who is flawed and callous, but there’s something spunky you can’t help but admire.  She’s an extreme version of Kate without a conscience and her recklessness is what gets her killed.  Even when it appears the case is closed, Kate’s instincts tell her they haven’t entirely wrapped things up and there’s a nice little twist at the end.  As usual, Castillo delivers an exciting, intriguing mystery.

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1388" data-hook="review-date"><span data-dcnode-id="1389" instrument_node="">Reviewed in the United States on January 8, 2022</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1385"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1386" data-hook="avp-badge-linkless"><span data-dcnode-id="1387" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1353"><span class="a-size-base review-text" data-dcnode-id="1354" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1355" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1362" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1384" instrument_node="">
</span><span data-dcnode-id="1364"><span data-dcnode-id="1383" instrument_node="">
  The latest in the series featuring Kate Burkholder, who was born and raised Amish, left the church and the community in her late teens, and has now returned to her hometown as Chief of Police. Her knowledge of the Amish culture and beliefs is a great help to her in solving crimes. She also speaks the language, which serves as an advantage in investigations.</span><br data-dcnode-id="1382"><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">And my, these fictional Amish folk are involved in a lot of crimes! This is the 13th book of the series, not counting several additional in-between books. That’s a lot of crime! Rest assured, Chief Burkholder has a 100% solve rate.</span><br data-dcnode-id="1379"><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">The first chapter details the murder, which is particularly violent and unpleasant. I hate when authors do that - start out with a depiction of the deadly attack through the eyes of the victim. If the person is going to be dead momentarily, then I don’t need to get to know them or suffer along with them!</span><br data-dcnode-id="1376"><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">Actually, there is quite a lot of violence in this book, more than I expected and almost more than I could stomach.</span><br data-dcnode-id="1373"><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">But what I enjoy about this series is the glimpse into Amish life that it gives. The author writes about the Amish with compassion and understanding, explaining the truth about, and the reasoning for, some of the customs.</span><br data-dcnode-id="1370"><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">For example, the author explains that the practice of shunning is not meant as punishment, but is an attempt to persuade the shunned to come back to the church and to follow the Amish ways. To rejoin the welcoming community. Apparently this is effective most of the time, since family is extremely important to the Amish.</span><br data-dcnode-id="1367"><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">The story is average in terms of the murder mystery, but rich in atmosphere.
</span></span><span data-dcnode-id="1363" instrument_node="">
