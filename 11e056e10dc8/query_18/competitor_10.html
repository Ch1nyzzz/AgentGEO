</span></li></ul><span data-dcnode-id="1333" instrument_node=""> </span><h1 class="entry-title" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">What is a Plot Twist? Definition, Examples and Types of Twist Endings</span></h1><span data-dcnode-id="1330" instrument_node="">

</span><a data-dcnode-id="1318" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-a-plot-twist-definition/" rel="bookmark" target="_self"><span data-dcnode-id="1321" instrument_node="">on </span><time class="entry-date published updated" data-dcnode-id="1319" datetime="2020-07-17T03:51:58-07:00"><span data-dcnode-id="1320" instrument_node="">July 17, 2020</span></time></a><span data-dcnode-id="1317" instrument_node=""> </span></div><span data-dcnode-id="1315" instrument_node="">

</span><div class="tve_flt tcb-style-wrap" data-dcnode-id="838" id="tve_flt"><div class="tve_shortcode_editor tar-main-content" data-dcnode-id="839" data-post-id="112950" id="tve_editor"><div class="thrv_wrapper thrv-page-section sb-width1000 sb-margin100 sb-style" data-dcnode-id="1283"><span data-dcnode-id="1297" instrument_node="">
</span><div class="tve-page-section-out" data-dcnode-id="1296"></div><span data-dcnode-id="1295" instrument_node="">
</span><div class="tve-page-section-in tve_empty_dropzone" data-dcnode-id="1285"><div class="tve_wp_shortcode thrv_wrapper tve_draggable par-first" data-dcnode-id="1286"><div class="tve_shortcode_raw tve_empty_dropzone" data-dcnode-id="1294" style="display: none"></div><div class="tve_shortcode_rendered" data-dcnode-id="1287"><p data-dcnode-id="1289"><span class="sh-dropcaps-full-square-tale" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">W</span></span><span data-dcnode-id="1290" style="font-weight: 400;"><span data-dcnode-id="1291" instrument_node="">hat is a plot twist? It’s a term we’ve all heard before – but we rarely ever hear it defined. So today, we’re going to define plot twists by looking at some good twist examples in literature and film. By the end, you’ll know how to write a plot twist like Christopher Nolan and M. Night Shyamalan.&nbsp;</span></span></p><p data-dcnode-id="1288"></p></div></div></div><span data-dcnode-id="1284" instrument_node="">
</span></div><div class="thrv_wrapper thrv-page-section sb-width1000 sb-margin100 sb-style" data-dcnode-id="887"><span data-dcnode-id="1282" instrument_node="">
</span><div class="tve-page-section-out" data-dcnode-id="1281"></div><span data-dcnode-id="1280" instrument_node="">
</span><div class="tve-page-section-in tve_empty_dropzone" data-css="tve-u-17ab42a63e1" data-dcnode-id="889"><div class="thrv_wrapper thrv_text_element tve-froala fr-box fr-basic" data-dcnode-id="1254" data-tag="h2"><h2 data-dcnode-id="1278" dir="ltr"><span data-dcnode-id="1279" instrument_node="">Plot Twist Meaning</span></h2><h3 data-dcnode-id="1276" dir="ltr"><span data-dcnode-id="1277" instrument_node="">What does plot twist mean?</span></h3><p data-dcnode-id="1268" dir="ltr"><span data-dcnode-id="1275" instrument_node="">Every story needs </span><a class="tve-froala fr-basic" data-dcnode-id="1273" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-a-plot/" style="outline: none;" target="_blank"><span data-dcnode-id="1274" instrument_node="">plot</span></a><span data-dcnode-id="1272" instrument_node="">. Every plot needs sequences. Every sequence needs </span><a class="tve-froala fr-basic" data-dcnode-id="1270" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/story-beat-in-screenplay/" style="outline: none;" target="_blank"><span data-dcnode-id="1271" instrument_node="">beats</span></a><span data-dcnode-id="1269" instrument_node="">. It may sound complicated but it’s remarkably simple. “Plot” is the basis for the entire story, whether it be a book screenplay, or video game. Think of “plot” as a pyramid, built block by block, or sequence by sequence, towards an apex.</span></p><p data-dcnode-id="1260" dir="ltr"><span data-dcnode-id="1267" instrument_node="">Plot twists serve to remove blocks from the pyramid’s structure, halting progression and changing direction. Why do writers do this? Because their stories rely on contrived structures. Why do their stories rely on contrived structures? Because they’re easy to follow. I want to be clear though: contrived structures like </span><a class="tve-froala fr-basic" data-css="tve-u-17ab41c5ea2" data-dcnode-id="1265" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/save-the-cat-beat-sheet/" style="outline: none;" target="_blank"><span data-dcnode-id="1266" instrument_node="">Save the Cat!</span></a><span data-dcnode-id="1264" instrument_node=""> and </span><a class="tve-froala fr-basic" data-css="tve-u-17ab41c65ba" data-dcnode-id="1262" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/joseph-campbells-heros-journey/" style="outline: none;" target="_blank"><span data-dcnode-id="1263" instrument_node="">The Hero’s Journey</span></a><span data-dcnode-id="1261" instrument_node=""> are not inherently bad! They simply offer a basis for a story – plot twists are one way writers can deviate from the basis.&nbsp;</span></p><p data-dcnode-id="1255" dir="ltr"><span data-dcnode-id="1259" instrument_node="">For twists to be successful, they need to be integral to the plot. In other words, they need to be </span><a class="tve-froala fr-basic" data-dcnode-id="1257" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-foreshadowing-definition/" style="outline: none;" target="_blank"><span data-dcnode-id="1258" instrument_node="">foreshadowed</span></a><span data-dcnode-id="1256" instrument_node=""> beforehand and resolved afterwards. This next video by “Now You See It” looks at some other ways plot twists can be successful.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="1240" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=CuorsbghT5M"><span data-dcnode-id="1253" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="1242" style="padding-bottom: 56.25%;"><span data-dcnode-id="1252" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="1244"><div class="rll-youtube-player" data-dcnode-id="1251" data-id="CuorsbghT5M" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/CuorsbghT5M"></div><noscript data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="CuorsbghT5M" data-provider="youtube" src="https://www.youtube.com/embed/CuorsbghT5M?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/CuorsbghT5M?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="1248"></div><div class="df-video-container" data-dcnode-id="1245"><div class="df-video-container" data-dcnode-id="1246"><div class="df-video-container" data-dcnode-id="1247"></div></div></div></div><span data-dcnode-id="1243" instrument_node="">
</span></div><span data-dcnode-id="1241" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="1237" data-tag="h4"><h4 data-dcnode-id="1238" dir="ltr"><span data-dcnode-id="1239" instrument_node="">Plot Twist Examples &nbsp;• &nbsp;How to Do a Plot Twist by Now You See It</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1234" data-tag="h2"><p data-dcnode-id="1235" dir="ltr"><span data-dcnode-id="1236" instrument_node="">Now that we’ve reviewed the plot twist meaning, let’s move ahead with a plot twist definition.</span></p></div><div class="thrv_wrapper thrv_text_element sb-p-sd with-list" data-dcnode-id="1224" data-tag="h2"><h2 class="" data-dcnode-id="1232" dir="ltr"><span data-dcnode-id="1233" instrument_node="">PLOT TWIST DEFINITION</span></h2><h3 class="" data-dcnode-id="1230" dir="ltr"><span data-dcnode-id="1231" instrument_node="">What is a plot twist?</span></h3><p data-dcnode-id="1225" dir="ltr"><span data-dcnode-id="1229" instrument_node="">A </span><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">plot twist</span></strong><span data-dcnode-id="1226" instrument_node=""> is a deviation from an expected story beat. Plot twists can take place at any time in a story, but they’re most commonly associated with endings, i.e,” twist endings.” Writers frequently use plot twists to add nuance to formulaic narratives.</span></p></div><div class="thrv_wrapper thrv_text_element sb-p-sdlw" data-dcnode-id="1214" data-tag="h2"><h2 class="" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Types of Plot Twists</span></h2><ul class="" data-dcnode-id="1215"><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Classic Twist</span></li><li class="dir=" data-dcnode-id="1218" ltr""=""><span data-dcnode-id="1219" instrument_node="">Mid Twist</span></li><li class="dir=" data-dcnode-id="1216" ltr""=""><span data-dcnode-id="1217" instrument_node="">Double Twist</span></li></ul></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1207" data-tag="h2"><h2 data-dcnode-id="1212" dir="ltr"><span data-dcnode-id="1213" instrument_node="">What is a Plot Twist that Was Right in Front of Us?</span></h2><h3 data-dcnode-id="1210" dir="ltr"><span data-dcnode-id="1211" instrument_node="">Classic twists are magic tricks</span></h3><p data-dcnode-id="1208" dir="ltr"><span data-dcnode-id="1209" instrument_node="">I consider a classic twist a twist with an answer that’s been right in front of us the whole time. Classic twists rely on careful planning and clear execution. Let’s take a look at a couple examples.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="1202"><span class="tve_image_frame" data-dcnode-id="1203" style="width: 100%;"><img alt="Classic Plot Twist Definition • Christopher Nolans The Prestige" class="lazy lazy-hidden tve_image wp-image-112953" data-dcnode-id="1206" data-height="467" data-id="112953" data-init-height="800" data-init-width="1200" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/Classic-Plot-Twist-Definition-%E2%80%A2-Christopher-Nolans-The-Prestige.jpg" data-lazy-type="image" data-width="700" height="467" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="Classic Plot Twist Definition • Christopher Nolans The Prestige" width="700"><noscript data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">&lt;img class="tve_image wp-image-112953" alt="Classic Plot Twist Definition • Christopher Nolans The Prestige" width="700" height="467" title="Classic Plot Twist Definition • Christopher Nolans The Prestige" data-id="112953" src="https://s.studiobinder.com/wp-content/uploads/2021/07/Classic-Plot-Twist-Definition-%E2%80%A2-Christopher-Nolans-The-Prestige.jpg" style="" data-width="700" data-height="467" data-init-width="1200" data-init-height="800" loading="lazy"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="1199" data-tag="h4"><h4 data-dcnode-id="1200" dir="ltr"><span data-dcnode-id="1201" instrument_node="">Classic Plot Twist Definition&nbsp; •&nbsp; Christopher Nolan’s The Prestige</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1184" data-tag="h2"><p data-dcnode-id="1192" dir="ltr"><a data-dcnode-id="1197" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/christopher-nolan/" target="_blank"><span data-dcnode-id="1198" instrument_node="">Christopher Nolan</span></a><span data-dcnode-id="1196" instrument_node=""> loves twists. How do I know? Because they’re integral to just about every one of his movies – but his 2006 film</span><em data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node=""> The Prestige</span></em><span data-dcnode-id="1193" instrument_node=""> contains one of the most noteworthy twists of all-time.</span></p><p data-dcnode-id="1187" dir="ltr"><a data-dcnode-id="1189" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/the-prestige/" target="_blank"><em data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">The Prestige</span></em></a><span data-dcnode-id="1188" instrument_node=""> follows the story of two magicians: Borden (Christian Bale) and Angier (Hugh Jackman). Borden performs a successful trick by appearing in two places at the same time, angering Angier.&nbsp;</span></p><p data-dcnode-id="1185" dir="ltr"><span data-dcnode-id="1186" instrument_node="">Angier becomes consumed with learning how Borden performed the “Transporting Man” trick. Want to know how he did it? Check out the clip below.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="1170" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=C4Rrj5eRdy0"><span data-dcnode-id="1183" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="1172" style="padding-bottom: 56.25%;"><span data-dcnode-id="1182" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="1174"><div class="rll-youtube-player" data-dcnode-id="1181" data-id="C4Rrj5eRdy0" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/C4Rrj5eRdy0"></div><noscript data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="C4Rrj5eRdy0" data-provider="youtube" src="https://www.youtube.com/embed/C4Rrj5eRdy0?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/C4Rrj5eRdy0?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="1178"></div><div class="df-video-container" data-dcnode-id="1175"><div class="df-video-container" data-dcnode-id="1176"><div class="df-video-container" data-dcnode-id="1177"></div></div></div></div><span data-dcnode-id="1173" instrument_node="">
</span></div><span data-dcnode-id="1171" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="1167" data-tag="h4"><h4 data-dcnode-id="1168" dir="ltr"><span data-dcnode-id="1169" instrument_node="">Plot Twist Examples&nbsp; •&nbsp; The Prestige Twist</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1164" data-tag="h2"><p data-dcnode-id="1165" dir="ltr"><span data-dcnode-id="1166" instrument_node="">In the end, we learn that there were two Bordens. It’s actually a simple twist that was foreshadowed early on.&nbsp;</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="1159"><span class="tve_image_frame" data-dcnode-id="1160" style="width: 100%;"><img alt="Iconic Film Twists • M Night Shyamalans The Sixth Sense" class="lazy lazy-hidden tve_image wp-image-112955" data-dcnode-id="1163" data-height="394" data-id="112955" data-init-height="900" data-init-width="1600" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/Iconic-Film-Twists-%E2%80%A2-M.-Night-Shyamalans-The-Sixth-Sense-.jpg" data-lazy-type="image" data-link-wrap="true" data-width="700" height="394" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="Iconic Film Twists • M Night Shyamalans The Sixth Sense" width="700"><noscript data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">&lt;img class="tve_image wp-image-112955" alt="Iconic Film Twists • M Night Shyamalans The Sixth Sense" width="700" height="394" title="Iconic Film Twists • M Night Shyamalans The Sixth Sense" data-id="112955" src="https://s.studiobinder.com/wp-content/uploads/2021/07/Iconic-Film-Twists-%E2%80%A2-M.-Night-Shyamalans-The-Sixth-Sense-.jpg" style="" data-width="700" data-height="394" data-init-width="1600" data-init-height="900" loading="lazy" data-link-wrap="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="1156" data-tag="h4"><h4 data-dcnode-id="1157" dir="ltr"><span data-dcnode-id="1158" instrument_node="">Iconic Film Twists&nbsp; •&nbsp; M. Night Shyamalan's The Sixth Sense&nbsp;</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1140" data-tag="h2"><p data-dcnode-id="1147" dir="ltr"><span data-dcnode-id="1155" instrument_node="">The twist in </span><a data-dcnode-id="1152" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/the-sixth-sense/" target="_blank"><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">The Sixth Sense</span></em></a><span data-dcnode-id="1151" instrument_node=""> is so classic that just about everybody knows it. If the ending of </span><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">The Sixth Sense</span></em><span data-dcnode-id="1148" instrument_node=""> has somehow never been spoiled for you: stop reading and watch it.</span></p><p data-dcnode-id="1143" dir="ltr"><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">The Sixth Sense</span></em><span data-dcnode-id="1144" instrument_node=""> follows the story of psychologist Malcolm Crowe (Bruce Willis) who struggles to move past being shot by a former patient. Shortly after being shot, Malcolm begins treating Cole, a troubled child who says he sees dead people. Seems pretty standard – well as standard as poltergeist encounters can be.</span></p><p data-dcnode-id="1141" dir="ltr"><span data-dcnode-id="1142" instrument_node="">The twist comes near the end when we realize something essential about Malcolm’s character. Check out a video essay on the ending from The Take below.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="1126" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=BPSQswV2fLc"><span data-dcnode-id="1139" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="1128" style="padding-bottom: 56.25%;"><span data-dcnode-id="1138" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="1130"><div class="rll-youtube-player" data-dcnode-id="1137" data-id="BPSQswV2fLc" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/BPSQswV2fLc"></div><noscript data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="BPSQswV2fLc" data-provider="youtube" src="https://www.youtube.com/embed/BPSQswV2fLc?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/BPSQswV2fLc?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="1134"></div><div class="df-video-container" data-dcnode-id="1131"><div class="df-video-container" data-dcnode-id="1132"><div class="df-video-container" data-dcnode-id="1133"></div></div></div></div><span data-dcnode-id="1129" instrument_node="">

</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="1123" data-tag="h4"><h4 data-dcnode-id="1124" dir="ltr"><span data-dcnode-id="1125" instrument_node="">What is a Plot Twist?&nbsp; •&nbsp; The Sixth Sense Ending Explained by The Take</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1112" data-tag="h2"><p data-dcnode-id="1121" dir="ltr"><span data-dcnode-id="1122" instrument_node="">The secret about Malcolm’s character? He’s dead. WE SAW HIM GET SHOT REMEMBER?! M. Night Shyamalan tricks us into thinking he’s not dead by treating the shot as the plot’s inciting incident. We’re led to believe that Malcolm survived, largely because we want to believe it.</span></p><h2 class="" data-dcnode-id="1119" dir="ltr"><span data-dcnode-id="1120" instrument_node="">What is a Plot Twist that Takes Place in the Middle?</span></h2><h3 class="" data-dcnode-id="1117" dir="ltr"><span data-dcnode-id="1118" instrument_node="">Breaking down the art of the mid twist</span></h3><p data-dcnode-id="1115" dir="ltr"><span data-dcnode-id="1116" instrument_node="">A mid twist is a twist that takes place in the middle part of a story. Because of its place in the story’s structure, the mid twist must either change the direction and or the perspective of the plot.&nbsp;</span></p><p data-dcnode-id="1113" dir="ltr"><span data-dcnode-id="1114" instrument_node="">Here are a couple examples of mid twists, spoilers beware.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="1107"><span class="tve_image_frame" data-dcnode-id="1108" style="width: 100%;"><img alt="Plot Twist Examples • Alfred Hitchcocks Psycho" class="lazy lazy-hidden tve_image wp-image-112957" data-dcnode-id="1111" data-height="394" data-id="112957" data-init-height="730" data-init-width="1296" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Examples-%E2%80%A2-Alfred-Hitchcocks-Psycho.jpg" data-lazy-type="image" data-link-wrap="true" data-width="700" height="394" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="Plot Twist Examples • Alfred Hitchcocks Psycho" width="700"><noscript data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">&lt;img class="tve_image wp-image-112957" alt="Plot Twist Examples • Alfred Hitchcocks Psycho" width="700" height="394" title="Plot Twist Examples • Alfred Hitchcocks Psycho" data-id="112957" src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Examples-%E2%80%A2-Alfred-Hitchcocks-Psycho.jpg" style="" data-width="700" data-height="394" data-init-width="1296" data-init-height="730" loading="lazy" data-link-wrap="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="1104" data-tag="h4"><h4 data-dcnode-id="1105" dir="ltr"><span data-dcnode-id="1106" instrument_node="">Plot Twist Examples&nbsp; •&nbsp; Alfred Hitchcock’s Psycho</span></h4></div><div class="thrv_wrapper thrv_text_element tve-froala fr-box" data-dcnode-id="1074"><p data-dcnode-id="1096" dir="ltr"><a data-dcnode-id="1101" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/psycho/" target="_blank"><em data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Psycho </span></em></a><span data-dcnode-id="1100" instrument_node="">contains one of the most iconic examples of a mid twist in all of cinema. For the first act of the film, we’re led to believe Marion Crane (Janet Leigh) is the </span><a class="tve-froala fr-basic" data-dcnode-id="1098" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-a-protagonist-definition/" style="outline: none;" target="_blank"><span data-dcnode-id="1099" instrument_node="">protagonist</span></a><span data-dcnode-id="1097" instrument_node=""> of the story. The plot is formulaic:&nbsp;</span></p><p class="dir=" data-dcnode-id="1095" ltr""=""></p><ol class="" data-dcnode-id="1084"><li data-dcnode-id="1091" dir="ltr"><a class="tve-froala fr-basic" data-dcnode-id="1093" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-exposition-definition/" style="outline: none;" target="_blank"><span data-dcnode-id="1094" instrument_node="">Exposition</span></a><span data-dcnode-id="1092" instrument_node="">: Marion’s lover won’t marry her because he doesn’t have the money.</span></li><li data-dcnode-id="1087" dir="ltr"><a class="tve-froala" data-dcnode-id="1089" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/inciting-incident-examples/" style="outline: none;" target="_blank"><span data-dcnode-id="1090" instrument_node="">Inciting incident</span></a><span data-dcnode-id="1088" instrument_node="">: Marion steals money to procure herself a better future.</span></li><li data-dcnode-id="1085" dir="ltr"><span data-dcnode-id="1086" instrument_node="">Plot point one: Marion meets a motel proprietor named Norman Bates while on the run.</span></li></ol><p data-dcnode-id="1083"></p><p data-dcnode-id="1075" dir="ltr"><span data-dcnode-id="1082" instrument_node="">Standard operating procedure. Up to this point, </span><em data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Psycho </span></em><span data-dcnode-id="1079" instrument_node="">is as formulaic as stories come. But if you know anything about </span><a class="tve-froala" data-dcnode-id="1077" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/alfred-hitchcock/" style="outline: none;" target="_blank"><span data-dcnode-id="1078" instrument_node="">Alfred Hitchcock</span></a><span data-dcnode-id="1076" instrument_node="">, you know “formulaic” isn’t exactly his M.O. So, after setting up the story in a formulaic way, Hitchcock and by extension screenwriter Joseph Stefano, burn the formula on fire and make a new one from its ashes.</span></p></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1071" data-tag="h2"><p data-dcnode-id="1072" dir="ltr"><span data-dcnode-id="1073" instrument_node="">Here’s the scene where the fire hit the fan.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="1057" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=0WtDmbr9xyY"><span data-dcnode-id="1070" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="1059" style="padding-bottom: 56.25%;"><span data-dcnode-id="1069" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="1061"><div class="rll-youtube-player" data-dcnode-id="1068" data-id="0WtDmbr9xyY" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/0WtDmbr9xyY"></div><noscript data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="0WtDmbr9xyY" data-provider="youtube" src="https://www.youtube.com/embed/0WtDmbr9xyY?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/0WtDmbr9xyY?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="1065"></div><div class="df-video-container" data-dcnode-id="1062"><div class="df-video-container" data-dcnode-id="1063"><div class="df-video-container" data-dcnode-id="1064"></div></div></div></div><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="1054" data-tag="h4"><h4 data-dcnode-id="1055" dir="ltr"><span data-dcnode-id="1056" instrument_node="">What is a Plot Twist?&nbsp; •&nbsp; Psycho Plot Twist</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1051" data-tag="h2"><p data-dcnode-id="1052" dir="ltr"><span data-dcnode-id="1053" instrument_node="">It’s worth noting that Hitchock and Stefano didn’t have to institute a mid twist. The original book of the same name by Robert Bloch begins with Marion arriving at the motel. Moreso, it’s told from Norman’s perspective So in a structural sense, the mid twist is a stylistic breakaway from the original story, which might have helped it carve out its own identity.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="1046"><span class="tve_image_frame" data-dcnode-id="1047" style="width: 100%;"><img alt="Plot Twist Definition • David Finchers Gone Girl" class="lazy lazy-hidden tve_image wp-image-112956" data-dcnode-id="1050" data-height="465" data-id="112956" data-init-height="1328" data-init-width="1999" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Definition-%E2%80%A2-David-Finchers-Gone-Girl.png" data-lazy-type="image" data-link-wrap="true" data-width="700" height="465" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="Plot Twist Definition • David Finchers Gone Girl" width="700"><noscript data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&lt;img class="tve_image wp-image-112956" alt="Plot Twist Definition • David Finchers Gone Girl" width="700" height="465" title="Plot Twist Definition • David Finchers Gone Girl" data-id="112956" src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Definition-%E2%80%A2-David-Finchers-Gone-Girl.png" style="" data-width="700" data-height="465" data-init-width="1999" data-init-height="1328" loading="lazy" data-link-wrap="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="1043" data-tag="h4"><h4 data-dcnode-id="1044" dir="ltr"><span data-dcnode-id="1045" instrument_node="">Plot Twist Definition &nbsp;• &nbsp;David Fincher’s Gone Girl</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="1022" data-tag="h2"><p data-dcnode-id="1032" dir="ltr"><a data-dcnode-id="1040" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/gone-girl/" target="_blank"><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Gone Girl</span></em></a><span data-dcnode-id="1039" instrument_node=""> is </span><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">the </span></strong><span data-dcnode-id="1036" instrument_node="">story to analyze if you’re serious about writing a mid twist. Gillian Flynn’s </span><em data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Gone Girl</span></em><span data-dcnode-id="1033" instrument_node=""> novel begins with the alternating perspectives of a husband (Nick) and wife (Amy). It’s clear from the characters’ tones that they’re giving somewhat of a one-sided perspective to the reader.&nbsp;</span></p><p data-dcnode-id="1030" dir="ltr"><span data-dcnode-id="1031" instrument_node="">For the first part of the story, we’re led to believe that Nick could have been responsible for the disappearance of Amy. But the mid twist reveals that we’ve been lied to, from Nick and Amy. Nick lied about his faithfulness – Amy lied about pretty much everything. Oh, and she’s trying to frame Nick for her death.</span></p><p data-dcnode-id="1025" dir="ltr"><span data-dcnode-id="1029" instrument_node="">The film version of </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Gone Girl</span></em><span data-dcnode-id="1026" instrument_node=""> makes Nick a bit more of a sympathetic protagonist. He still lies and cheats – but Flynn really plays up the cluelessness of his character in order to endear us to the mystery.</span></p><p data-dcnode-id="1023" dir="ltr"><span data-dcnode-id="1024" instrument_node="">Here’s how the mid twist is delivered in the film.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="1008" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=_kbwq4G52ks"><span data-dcnode-id="1021" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="1010" style="padding-bottom: 56.25%;"><span data-dcnode-id="1020" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="1012"><div class="rll-youtube-player" data-dcnode-id="1019" data-id="_kbwq4G52ks" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/_kbwq4G52ks"></div><noscript data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="_kbwq4G52ks" data-provider="youtube" src="https://www.youtube.com/embed/_kbwq4G52ks?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/_kbwq4G52ks?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="1016"></div><div class="df-video-container" data-dcnode-id="1013"><div class="df-video-container" data-dcnode-id="1014"><div class="df-video-container" data-dcnode-id="1015"></div></div></div></div><span data-dcnode-id="1011" instrument_node="">
</span></div><span data-dcnode-id="1009" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="1005" data-tag="h4"><h4 data-dcnode-id="1006" dir="ltr"><span data-dcnode-id="1007" instrument_node="">Unexpected Plot Twists&nbsp; •&nbsp; Gone Girl Twist</span></h4></div><div class="thrv_wrapper thrv_text_element tve-froala fr-box fr-basic" data-dcnode-id="990" data-tag="h2"><p data-dcnode-id="997" dir="ltr"><span data-dcnode-id="1004" instrument_node="">Poorly executed mid twists make us feel like the mystery is solved, which removes the tension from the plot. Consequently, well executed mid twists make us feel like we’re in on the mystery, adding tension to the plot. If you’re interested in incorporating a mid twist in your story, consider reading up on</span><a class="tve-froala" data-dcnode-id="1002" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-is-dramatic-irony-definition-examples/" style="outline: none;" target="_blank"><span data-dcnode-id="1003" instrument_node=""> dramatic irony</span></a><span data-dcnode-id="1001" instrument_node=""> and the </span><a class="tve-froala fr-basic" data-dcnode-id="999" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/what-are-the-stages-of-dramatic-irony/" style="outline: none;" target="_blank"><span data-dcnode-id="1000" instrument_node="">stages of dramatic irony</span></a><span data-dcnode-id="998" instrument_node=""> to master the art of tension.</span></p><h2 class="" data-dcnode-id="995" dir="ltr"><span data-dcnode-id="996" instrument_node="">What is a Plot Twist that’s Replaced by a Second Plot Twist?</span></h2><h3 class="" data-dcnode-id="993" dir="ltr"><span data-dcnode-id="994" instrument_node="">How to write a plot twist, times two</span></h3><p data-dcnode-id="991" dir="ltr"><span data-dcnode-id="992" instrument_node="">A successful double twist makes us say “okay you got me” then later realize the first twist was set-up for the second twist – it’s really hard to execute. We’ve only seen a handful of great double twists in cinema history. Here are a couple.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="985"><span class="tve_image_frame" data-dcnode-id="986" style="width: 100%;"><img alt="Plot Twist Ideas • Gregory Hoblits Primal Fear" class="lazy lazy-hidden tve_image wp-image-112958" data-dcnode-id="989" data-height="475" data-id="112958" data-init-height="1271" data-init-width="1872" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Ideas-%E2%80%A2-Gregory-Hoblits-Primal-Fear.jpg" data-lazy-type="image" data-link-wrap="true" data-width="700" height="475" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="Plot Twist Ideas • Gregory Hoblits Primal Fear" width="700"><noscript data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">&lt;img class="tve_image wp-image-112958" alt="Plot Twist Ideas • Gregory Hoblits Primal Fear" width="700" height="475" title="Plot Twist Ideas • Gregory Hoblits Primal Fear" data-id="112958" src="https://s.studiobinder.com/wp-content/uploads/2021/07/Plot-Twist-Ideas-%E2%80%A2-Gregory-Hoblits-Primal-Fear.jpg" style="" data-width="700" data-height="475" data-init-width="1872" data-init-height="1271" loading="lazy" data-link-wrap="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="982" data-tag="h4"><h4 data-dcnode-id="983" dir="ltr"><span data-dcnode-id="984" instrument_node="">Plot Twist Ideas&nbsp; •&nbsp; Gregory Hoblit’s Primal Fear</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="972" data-tag="h2"><p data-dcnode-id="977" dir="ltr"><span data-dcnode-id="981" instrument_node="">At its core, </span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Primal Fear</span></em><span data-dcnode-id="978" instrument_node=""> is a legal drama about protecting an innocent man. The story follows lawyer Martin Vail (Richard Gere) as he attempts to help altar boy Aaron Stampler (Edward Norton) beat a murder charge. The whole story is predicated on us empathizing with Stampler’s innocence – until it isn’t.&nbsp;</span></p><p data-dcnode-id="975" dir="ltr"><span data-dcnode-id="976" instrument_node="">First twist: halfway through, we learn that Stampler is diagnosed with multiple personality disorder. As such, we suspect that Stampler did actually murder the Archbishop.&nbsp;</span></p><p data-dcnode-id="973" dir="ltr"><span data-dcnode-id="974" instrument_node="">Now here’s the second twist.</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="958" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=ZbaW0HZ_Qy8"><span data-dcnode-id="971" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="960" style="padding-bottom: 56.25%;"><span data-dcnode-id="970" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="962"><div class="rll-youtube-player" data-dcnode-id="969" data-id="ZbaW0HZ_Qy8" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/ZbaW0HZ_Qy8"></div><noscript data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="ZbaW0HZ_Qy8" data-provider="youtube" src="https://www.youtube.com/embed/ZbaW0HZ_Qy8?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/ZbaW0HZ_Qy8?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="966"></div><div class="df-video-container" data-dcnode-id="963"><div class="df-video-container" data-dcnode-id="964"><div class="df-video-container" data-dcnode-id="965"></div></div></div></div><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="955" data-tag="h4"><h4 data-dcnode-id="956" dir="ltr"><span data-dcnode-id="957" instrument_node="">Unexpected Plot Twists&nbsp; •&nbsp; Primal Fear Ending</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="950" data-tag="h2"><p data-dcnode-id="953" dir="ltr"><span data-dcnode-id="954" instrument_node="">Second twist: in the end, we learn that Stampler’s innocent personality was a facade; it never really existed. He was a construct created by Stampler to get an insanity plea.</span></p><p data-dcnode-id="951" dir="ltr"><span data-dcnode-id="952" instrument_node="">Fool me once, shame on you. Fool me twice, shame on me. Kudos to writer William Diehl for executing such a good twist.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-17ab41bdecb" data-dcnode-id="945"><span class="tve_image_frame" data-dcnode-id="946" style="width: 100%;"><img alt="How to Create a Twist in a Story • Bryan Singers The Usual Suspects" class="lazy lazy-hidden tve_image wp-image-112954" data-dcnode-id="949" data-height="467" data-id="112954" data-init-height="800" data-init-width="1200" data-lazy-src="https://s.studiobinder.com/wp-content/uploads/2021/07/How-to-Create-a-Twist-in-a-Story-%E2%80%A2-Bryan-Singers-The-Usual-Suspects.jpg" data-lazy-type="image" data-link-wrap="true" data-width="700" height="467" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="" title="How to Create a Twist in a Story • Bryan Singers The Usual Suspects" width="700"><noscript data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">&lt;img class="tve_image wp-image-112954" alt="How to Create a Twist in a Story • Bryan Singers The Usual Suspects" width="700" height="467" title="How to Create a Twist in a Story • Bryan Singers The Usual Suspects" data-id="112954" src="https://s.studiobinder.com/wp-content/uploads/2021/07/How-to-Create-a-Twist-in-a-Story-%E2%80%A2-Bryan-Singers-The-Usual-Suspects.jpg" style="" data-width="700" data-height="467" data-init-width="1200" data-init-height="800" loading="lazy" data-link-wrap="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80" data-dcnode-id="942" data-tag="h4"><h4 class="" data-dcnode-id="943" dir="ltr"><span data-dcnode-id="944" instrument_node="">How to Create a Twist in a Story&nbsp; •&nbsp; Bryan Singer’s The Usual Suspects</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="929" data-tag="h2"><p data-dcnode-id="934" dir="ltr"><a data-dcnode-id="939" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/tag/the-usual-suspects/" target="_blank"><em data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The Usual Suspects</span></em></a><span data-dcnode-id="938" instrument_node=""> may seem like a standard police vs. criminals story at first glance, but it’s much more complex than that. The mystery identity of a notorious gangster named Keyser Soze is at the heart of </span><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The Usual Suspects</span></em><span data-dcnode-id="935" instrument_node=""> – and his pursuit is central to the plot.</span></p><p data-dcnode-id="932" dir="ltr"><span data-dcnode-id="933" instrument_node="">The first twist: In the end, we’re led to believe that Keaton (Gabriel Byrne) – who was integral to the plot – could have been Keyser Soze. And that’s a big twist. Keaton being Keyser Soze recontextualizes the entire story and shifts its perspective.&nbsp;</span></p><p data-dcnode-id="930" dir="ltr"><span data-dcnode-id="931" instrument_node="">But wait, something doesn’t add up. Keaton couldn’t be Keyser Soze, could he?&nbsp;</span></p></div><div class="thrv_responsive_video thrv_wrapper sb-marginbottom15 sb-margintop80" data-aspect-ratio="16:9" data-aspect-ratio-default="0" data-dcnode-id="915" data-float-padding1-d="25px" data-float-padding2-d="25px" data-float-position="top-left" data-float-visibility="mobile" data-float-width-d="300px" data-rel="0" data-type="youtube" data-url="https://www.youtube.com/watch?v=p5Ed_vCOKY4"><span data-dcnode-id="928" instrument_node="">
</span><div class="tve_responsive_video_container" data-dcnode-id="917" style="padding-bottom: 56.25%;"><span data-dcnode-id="927" instrument_node="">
</span><div class="tcb-video-float-container" data-dcnode-id="919"><div class="rll-youtube-player" data-dcnode-id="926" data-id="p5Ed_vCOKY4" data-query="rel=0&amp;modestbranding=0&amp;controls=1&amp;showinfo=1&amp;fs=1&amp;wmode=transparent" data-src="https://www.youtube.com/embed/p5Ed_vCOKY4"></div><noscript data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&lt;iframe title="Responsive Video" class="tcb-responsive-video" data-code="p5Ed_vCOKY4" data-provider="youtube" src="https://www.youtube.com/embed/p5Ed_vCOKY4?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" data-src="https://www.youtube.com/embed/p5Ed_vCOKY4?rel=0&amp;amp;modestbranding=0&amp;amp;controls=1&amp;amp;showinfo=1&amp;amp;fs=1&amp;amp;wmode=transparent" frameborder="0" allowfullscreen=""&gt;&lt;/iframe&gt;</span></noscript><div class="video_overlay" data-dcnode-id="923"></div><div class="df-video-container" data-dcnode-id="920"><div class="df-video-container" data-dcnode-id="921"><div class="df-video-container" data-dcnode-id="922"></div></div></div></div><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span></div><div class="thrv_wrapper thrv_text_element sb-marginbottom80 sb-blockwide" data-dcnode-id="912" data-tag="h4"><h4 class="" data-dcnode-id="913" dir="ltr"><span data-dcnode-id="914" instrument_node="">Unexpected Plot Twists&nbsp; •&nbsp; How to End a Story With a Twist</span></h4></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="901" data-tag="h2"><p data-dcnode-id="910" dir="ltr"><span data-dcnode-id="911" instrument_node="">The second twist: we learn Verbal (Kevin Spacey) fabricated the entire story by picking out details from Agent Kujan’s (Chazz Palminteri) office. Verbal is the true Keyser Soze.</span></p><p data-dcnode-id="902" dir="ltr"><span data-dcnode-id="909" instrument_node="">The ending of </span><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The Usual Suspects</span></em><span data-dcnode-id="906" instrument_node=""> is widely considered one of the greatest endings of all-time. If you’re thinking about double plot twist ideas for your story, make sure everything adds up in the end like it does in </span><em data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The Usual Suspects</span></em><span data-dcnode-id="903" instrument_node="">.</span></p></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="890" data-tag="h2"><h2 class="" data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">UP NEXT</span></strong></h2><h3 data-dcnode-id="896" dir="ltr"><span data-dcnode-id="897" instrument_node="">Best Plot Twist Movies of All Time</span></h3><p data-dcnode-id="894" dir="ltr"><span data-dcnode-id="895" instrument_node="">Now that we’ve defined what a plot twist is with some iconic examples, let’s move on to the best plot twist movies of all time. In our next article, we rank the best plot twist movies by three criteria: twist quality, twist originality, and film quality. Can you guess which classic film took the top honor?</span></p><h5 data-dcnode-id="891" dir="ltr" style="text-align: right;"><a data-dcnode-id="892" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/best-plot-twist-movies-of-all-time/" target="_blank"><span data-dcnode-id="893" instrument_node="">Up Next: Best Plot Twists in Movies →</span></a></h5></div></div><span data-dcnode-id="888" instrument_node="">
