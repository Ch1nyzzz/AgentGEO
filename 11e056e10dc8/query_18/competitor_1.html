</span><h4 data-dcnode-id="2172" style="text-align: center;"><span data-dcnode-id="2173" instrument_node="">20. Funny Games</span></h4><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2169"><img alt="" class="alignnone size-full wp-image-16890" data-attachment-id="16890" data-comments-opened="1" data-dcnode-id="2170" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="funny games" data-large-file="https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg" data-orig-size="1024,583" data-permalink="https://thecinemaholic.com/violence-in-michael-haneke-cinema-explained/funny-games-3/" height="583" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg 1024w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=200,114 200w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=300,171 300w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=768,437 768w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=370,211 370w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=270,154 270w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=570,325 570w, https://thecinemaholic.com/wp-content/uploads/2017/03/funny-games.jpg?resize=740,421 740w" width="1024"></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">I like the sudden twist of events in </span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/every-movie-of-michael-haneke-ranked/"><span data-dcnode-id="2166" instrument_node="">Michael Haneke’s</span></a><span data-dcnode-id="2164" instrument_node=""> depressing classic ‘Funny Games’, because it is not predictable by even a bit, and it doesn’t really make sense, though if you think about it, the distance from reality that the film has going for it at that point is one that is heavily referred to (sort of like a forewarning) in several scenes preceding it, with fourth wall breaks and other forms of audience interaction. The way the film closes the gap with its viewers is by presenting the medium of cinema as a platform for one-to-one communication, addressing the people watching directly and attempting to get them to side with the villains, with a menacing undertone that specifies that they don’t really care if you choose to stay free from this attempt of theirs.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2157"><strong data-dcnode-id="2158"><span data-dcnode-id="2161" instrument_node="">Read More:&nbsp;</span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/schizophrenia-movies/"><span data-dcnode-id="2160" instrument_node="">Best Schizophrenia Movies of All Time</span></a></strong></p><span data-dcnode-id="2156" instrument_node="">
</span><h4 data-dcnode-id="2154" style="text-align: center;"><span data-dcnode-id="2155" instrument_node="">19. The Others</span></h4><span data-dcnode-id="2153" instrument_node="">
</span><figure data-dcnode-id="2151"><img class="aligncenter" data-dcnode-id="2152" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2014/11/_d_improd_/Nicole-Kidman-The-Others_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2149" instrument_node="">There are </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-gore-movies-on-netflix/"><span data-dcnode-id="2148" instrument_node="">horror movies</span></a><span data-dcnode-id="2146" instrument_node=""> that rely on jump scares and sound effects. Then, there are horror movies like The Others that are purely about building tension and completely blowing you away with an unexpected ending. In case of ‘The Others’, the ending turns the whole movie upside down; it so&nbsp;unexpected that you don’t believe what you have just seen. Supported by an excellent </span><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/new-nicole-kidman-movies-list/"><span data-dcnode-id="2145" instrument_node="">Nicole Kidman</span></a><span data-dcnode-id="2143" instrument_node=""> performance, ‘The Others’ is not only a horror movie, but a movie with a mind-bending twist that will stay with you forever.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2132"><strong data-dcnode-id="2133"><span data-dcnode-id="2140" instrument_node="">Read More: </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="2139" instrument_node="">Best Assasination </span></a><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="2137" instrument_node="">Movie</span></a><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="2135" instrument_node="">s of All Time</span></a></strong></p><span data-dcnode-id="2131" instrument_node="">
</span><h4 data-dcnode-id="2129" style="text-align: center;"><span data-dcnode-id="2130" instrument_node="">18. The Illusionist</span></h4><span data-dcnode-id="2128" instrument_node="">
</span><figure data-dcnode-id="2126"><img class="aligncenter" data-dcnode-id="2127" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/still-of-edward-norton-in-the-illusionist-2006-large-picture_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2124" instrument_node="">Presented as a </span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-historical-movies-on-amazon-prime/"><span data-dcnode-id="2123" instrument_node="">period drama</span></a><span data-dcnode-id="2121" instrument_node=""> and directed by Neil Burger, ‘The Illusionist’ is actually a cleverly crafted thriller. It’s an entertaining story, using politics and magic as the underlying themes. Eisenheim The Illusionist, is a mysterious character with an agenda buried deep down in his heart. He dares to oppose the tyrant crown prince, using the only weapon in his armoury – Magic. </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/edward-norton-new-movie/"><span data-dcnode-id="2120" instrument_node="">Ed Norton</span></a><span data-dcnode-id="2118" instrument_node=""> poured his heart out while playing this role and you could feel the same, when you see a broken man seeing his dead beloved. Wait, did I say she was dead? Well, before we spoil the surprise, go and watch it for its mind-blowing ending, if you haven’t.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2107"><strong data-dcnode-id="2108"><span data-dcnode-id="2115" instrument_node="">Read More: </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-about-reincarnation/"><span data-dcnode-id="2114" instrument_node="">Best Movies about </span></a><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-about-reincarnation/"><span data-dcnode-id="2112" instrument_node="">Reincarnation</span></a><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-about-reincarnation/"><span data-dcnode-id="2110" instrument_node="">&nbsp;of All Time</span></a></strong></p><span data-dcnode-id="2106" instrument_node="">
</span><h4 data-dcnode-id="2104" style="text-align: center;"><span data-dcnode-id="2105" instrument_node="">17. Twelve Monkeys</span></h4><span data-dcnode-id="2103" instrument_node="">
</span><figure data-dcnode-id="2101"><img class="aligncenter" data-dcnode-id="2102" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/Twelve-Monkeys_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2099" instrument_node="">One of the best </span><a data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/sci-fi-movies-on-netflix/"><span data-dcnode-id="2098" instrument_node="">science fiction</span></a><span data-dcnode-id="2096" instrument_node=""> movies of the 90s decade, ‘Twelve Monkeys’ is a tense and unassuming thriller. Directed by master director </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-of-terry-gilliam/"><span data-dcnode-id="2095" instrument_node="">Terry Gilliam</span></a><span data-dcnode-id="2093" instrument_node="">, ‘Twelve Monkeys’ gives us a world plagued by a deadly virus. It is up to our protagonist James Cole (portrayed brilliantly by Bruce Willis) to figure out the mystery behind the virus and help find the cure. Of course, the plot is not as simple as that, as it also involves elements of time travel. Watch the movie carefully and you will be shocked by what happens in the last fifteen minutes of the movie.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2086"><strong data-dcnode-id="2087"><span data-dcnode-id="2090" instrument_node="">Read More: </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movie-musicals/"><span data-dcnode-id="2089" instrument_node="">Best Movie Musicals of All Time</span></a></strong></p><span data-dcnode-id="2085" instrument_node="">
</span><h4 data-dcnode-id="2083" style="text-align: center;"><span data-dcnode-id="2084" instrument_node="">16. Brazil</span></h4><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><img alt="" class="alignnone size-full wp-image-14233" data-attachment-id="14233" data-comments-opened="1" data-dcnode-id="2081" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="brazil" data-large-file="https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg" data-orig-size="1024,554" data-permalink="https://thecinemaholic.com/best-movies-set-future-ranked/brazil/" height="554" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg 1024w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=200,108 200w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=300,162 300w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=768,416 768w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=370,200 370w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=270,146 270w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=570,308 570w, https://thecinemaholic.com/wp-content/uploads/2017/01/brazil.jpg?resize=740,400 740w" width="1024"></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2078" instrument_node="">Simply put, ‘Brazil’ is the greatest piece of </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-politics-movies-on-netflix/"><span data-dcnode-id="2077" instrument_node="">political</span></a><span data-dcnode-id="2075" instrument_node=""> satire I’ve ever seen. It is as frightening as it is clever and witty, and it tells a quirky tale in the greatest way possible. Using </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-neo-noir-movies/"><span data-dcnode-id="2074" instrument_node="">neo-noir</span></a><span data-dcnode-id="2072" instrument_node=""> elements to create a </span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-dystopain-movies-on-netflix/"><span data-dcnode-id="2071" instrument_node="">bleak future</span></a><span data-dcnode-id="2069" instrument_node=""> with surreal imagery meant to trick the viewer, ‘Brazil’ primarily deals with the problems that sprout out of excess control and the existence of a personal utopia. The final scene acts as a meld between both these elements, a mix of fantasy and a dreaded reality that could very well happen, subtly hinting on the way the elements that build a society can secretly work behind your back, which I guess is the primary theme of the film. The way it hits you is pretty fascinating, because Gilliam’s frantic style suddenly comes to a halt, and there’s that mind-numbing closing shot with a quick dolly out, isolating the protagonist and making him helpless.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2062"><strong data-dcnode-id="2063"><span data-dcnode-id="2066" instrument_node="">Read More: </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-mind-fuck-movies/" rel="noopener" target="_blank"><span data-dcnode-id="2065" instrument_node="">Best Mind Fuck Movies</span></a></strong></p><span data-dcnode-id="2061" instrument_node="">
</span><h4 data-dcnode-id="2059" style="text-align: center;"><span data-dcnode-id="2060" instrument_node="">15. Shutter Island</span></h4><span data-dcnode-id="2058" instrument_node="">
</span><figure data-dcnode-id="2056"><img class="aligncenter" data-dcnode-id="2057" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/Shutter-Island-31_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2054" instrument_node="">Team </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/greatest-director-actor-collaborations-in-the-history-of-cinema/"><span data-dcnode-id="2053" instrument_node="">Scorcese-DiCaprio</span></a><span data-dcnode-id="2051" instrument_node=""> delivered another fine thriller. </span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-shutter-island/"><span data-dcnode-id="2050" instrument_node="">‘Shutter Island’</span></a><span data-dcnode-id="2048" instrument_node=""> builds up slowly and steadily, with exquisite camerawork, </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/martin-scorsese-movies-coming-out/"><span data-dcnode-id="2047" instrument_node="">Scorcese’s</span></a><span data-dcnode-id="2045" instrument_node=""> hallmark filmmaking, and above all, </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/upcoming-leonardo-dicaprio-movies-list/"><span data-dcnode-id="2044" instrument_node="">DiCaprio’s</span></a><span data-dcnode-id="2042" instrument_node=""> edgy and honest performance. On the one hand, this film has a classic ‘I’m-one-of-them’ sort-of ending, which we’ve seen plenty of times in movies that preceded this. It’s the way that Scorsese presents the concept here that makes it effective, perhaps better than all similar twists, because it brings into play human emotions relating to confusion, embarrassment, and acceptance.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2035"><strong data-dcnode-id="2036"><span data-dcnode-id="2039" instrument_node="">Read More: </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-nonlinear-narrative/"><span data-dcnode-id="2038" instrument_node="">Best Nonlinear Movies of All Time</span></a></strong></p><span data-dcnode-id="2034" instrument_node="">
</span><h4 data-dcnode-id="2032" style="text-align: center;"><span data-dcnode-id="2033" instrument_node="">14. The Sixth Sense</span></h4><span data-dcnode-id="2031" instrument_node="">
</span><figure data-dcnode-id="2029"><img class="aligncenter" data-dcnode-id="2030" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/sixth-sense_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2027" instrument_node="">This is the movie which immortalized the above quote. The debut film of </span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/m-night-shyamalan-movies/"><span data-dcnode-id="2026" instrument_node="">M. Night Shyamalan</span></a><span data-dcnode-id="2024" instrument_node="">, </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-the-sixth-sense/"><span data-dcnode-id="2023" instrument_node="">‘The Sixth Sense’</span></a><span data-dcnode-id="2021" instrument_node=""> is gripping from the start to the end. Yet again, we have </span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/bruce-willis-new-movie/"><span data-dcnode-id="2020" instrument_node="">Bruce Willis</span></a><span data-dcnode-id="2018" instrument_node=""> who is haunted by his own demons and is at his wit’s end to figure out what is happening with the little boy who sees dead people all the time. The ending to ‘The Sixth Sense’ ended up becoming one of the most popular film endings ever, because of how well it worked with the rest of the film upon re-watches. The ending makes sense in the best way possible. Shyamalan also began to work in twist endings into all of his later pictures, though not all of them have been this good, save for maybe ‘Unbreakable’ (2000).</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2011"><strong data-dcnode-id="2012"><span data-dcnode-id="2015" instrument_node="">Read More: </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-based-prison-escapes-ranked/"><span data-dcnode-id="2014" instrument_node="">Best Prison Escape Movies of All Time</span></a></strong></p><span data-dcnode-id="2010" instrument_node="">
</span><h4 data-dcnode-id="2008" style="text-align: center;"><span data-dcnode-id="2009" instrument_node="">13. A Clockwork Orange</span></h4><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="1999"><img alt="" class="alignnone size-full wp-image-12185" data-attachment-id="12185" data-comments-opened="1" data-dcnode-id="2006" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="clockwork_orange-2" data-large-file="https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?w=1000" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg" data-orig-size="1000,600" data-permalink="https://thecinemaholic.com/15-greatest-performances-of-all-time-unrecognized-by-the-oscars-ranked/clockwork_orange-2/" height="600" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg 1000w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=200,120 200w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=300,180 300w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=768,461 768w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=370,222 370w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=270,162 270w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=570,342 570w, https://thecinemaholic.com/wp-content/uploads/2016/11/clockwork_orange-2.jpg?resize=740,444 740w" width="1000"><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/a-clockwork-orange-violent-disturbing-brilliant-but-above-all-timeless/"><span data-dcnode-id="2005" instrument_node="">‘A Clockwork Orange’</span></a><span data-dcnode-id="2003" instrument_node=""> puts forth a strong social criticism with its plot twist. With a line of dialogue that’s easily one of the most quotable lines in the cinema of </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-stanley-kubrick-ranked/"><span data-dcnode-id="2002" instrument_node="">Stanley Kubrick</span></a><span data-dcnode-id="2000" instrument_node="">, the ending is something of a dream sequence, and its purpose is to shock, give the audience a clear idea of where its protagonist stands with respect to his ideologies and thinking. It’s an interesting finish to the film because it helps to round the story off quite brilliantly, and is actually more comedic than anything else, which is an interesting way of carrying out the plot twist.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1993"><strong data-dcnode-id="1994"><span data-dcnode-id="1997" instrument_node="">Read More: </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-mind-fuck-movies/" rel="noopener" target="_blank"><span data-dcnode-id="1996" instrument_node="">Best Mind Fuck Movies</span></a></strong></p><span data-dcnode-id="1992" instrument_node="">
</span><h4 data-dcnode-id="1990" style="text-align: center;"><span data-dcnode-id="1991" instrument_node="">12. The Prestige</span></h4><span data-dcnode-id="1989" instrument_node="">
</span><figure data-dcnode-id="1987"><img class="aligncenter" data-dcnode-id="1988" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/The-Prestige_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1973"><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-the-prestige/"><span data-dcnode-id="1985" instrument_node="">‘The Prestige’</span></a><span data-dcnode-id="1983" instrument_node=""> is probably Christopher Nolan’s most well rounded and emotionally satisfying movie. </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/christian-bale-new-movie/"><span data-dcnode-id="1982" instrument_node="">Christian Bale</span></a><span data-dcnode-id="1980" instrument_node=""> and </span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/hugh-jackman-new-movie/"><span data-dcnode-id="1979" instrument_node="">Hugh Jackman</span></a><span data-dcnode-id="1977" instrument_node=""> give moving performances as two competing magicians, who’ll do anything to best the other. With a twist that now has acquired a legendary status, </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/the-prestige-ending/"><span data-dcnode-id="1976" instrument_node="">‘The Prestige’</span></a><span data-dcnode-id="1974" instrument_node=""> is one big magic trick of a film unto itself, incorporating the pledge, the turn and the ‘prestige’ into a well-acted, visually pleasing film that builds and builds until its full, and reveals everything in a crescendo of unprecedented events, ones that are sure to take your breath away as they reveal themselves. The staging of the magic tricks, the secrets behind how they work and simple details behind their execution astounded me as a viewer, adding to my appreciation of a Nolan film that I feel is somehow piled under more successful and crowd friendly Nolan blockbusters.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1963"><strong data-dcnode-id="1964"><span data-dcnode-id="1971" instrument_node="">Read More: </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-death/"><span data-dcnode-id="1970" instrument_node="">Best&nbsp;</span></a><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-death/"><span data-dcnode-id="1968" instrument_node="">Death</span></a><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-death/"><span data-dcnode-id="1966" instrument_node="">&nbsp;Movies of All Time</span></a></strong></p><span data-dcnode-id="1962" instrument_node="">
</span><h4 data-dcnode-id="1960" style="text-align: center;"><span data-dcnode-id="1961" instrument_node="">11. Memento</span></h4><span data-dcnode-id="1959" instrument_node="">
</span><figure data-dcnode-id="1957"><img class="aligncenter" data-dcnode-id="1958" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/memento_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1949"><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/every-movie-of-christopher-nolan-ranked/"><span data-dcnode-id="1955" instrument_node="">Christopher Nolan</span></a><span data-dcnode-id="1953" instrument_node=""> started out with the low-budget thriller ‘The Following’, but it was </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-memento/"><span data-dcnode-id="1952" instrument_node="">‘Memento’</span></a><span data-dcnode-id="1950" instrument_node=""> which established him as one of the most promising directors of his generation. The rest is well, history. ‘Memento’ is a movie which gets as non-linear as they come. It is in fact, entirely backwards. Boasting of recurring themes like grief, deception and the nature of memory, Memento is a subtle, neo-noir thriller. I find it interesting that the film manages to reveal its twist at the end of its runtime, because chronologically that only becomes the halfway point of the events transpired.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1943"><strong data-dcnode-id="1944"><span data-dcnode-id="1947" instrument_node="">Read More: </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movie-plot-twists-of-all-time/" rel="noopener" target="_blank"><span data-dcnode-id="1946" instrument_node="">Best Plot Twist Movies</span></a></strong></p><span data-dcnode-id="1942" instrument_node="">
</span><h4 data-dcnode-id="1940" style="text-align: center;"><span data-dcnode-id="1941" instrument_node="">10. Oldboy</span></h4><span data-dcnode-id="1939" instrument_node="">
</span><figure data-dcnode-id="1937"><img class="aligncenter" data-dcnode-id="1938" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/Oldboy_f_improf_1024x576.jpeg&amp;raw" width="1024"></figure><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node="">This </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/new-korean-movies/"><span data-dcnode-id="1934" instrument_node="">Korean</span></a><span data-dcnode-id="1932" instrument_node=""> film took the world to storm by its violent and vicious take on revenge saga. I still get shudders when I think about its mind numbing revelation in the end. Praised by the critics and audience alike for its graphic imagery, ‘Oldboy’ is a tale about a man who is kept locked in a room with wantons for food for 15 years is suddenly let out to look for his captor. On his course to the truth, it becomes evident that vengeance can be absolutely cruel and perhaps a little poetic.&nbsp;‘Oldboy’ is a harrowing, at times beautiful and disgusting gore-fest. It is also a classic. </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-oldboy/"><span data-dcnode-id="1931" instrument_node="">‘Oldboy’</span></a><span data-dcnode-id="1929" instrument_node=""> is one of those movies where the plot twist itself speaks volumes about the themes the movie is trying to convey.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><strong data-dcnode-id="1923"><span data-dcnode-id="1926" instrument_node="">Read More: </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-based-on-true-stories/"><span data-dcnode-id="1925" instrument_node="">Best True Story Movies of All Time</span></a></strong></p><span data-dcnode-id="1921" instrument_node="">
</span><h4 data-dcnode-id="1919" style="text-align: center;"><span data-dcnode-id="1920" instrument_node="">9. Se7en</span></h4><span data-dcnode-id="1918" instrument_node="">
</span><figure data-dcnode-id="1916"><img class="aligncenter" data-dcnode-id="1917" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/Se7en_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1914" instrument_node="">Master of the modern thriller, </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/every-movie-of-david-fincher-ranked/"><span data-dcnode-id="1913" instrument_node="">David Fincher</span></a><span data-dcnode-id="1911" instrument_node=""> gave us this masterpiece twenty years ago. It still feels fresh and the ending still terrifies us. The twist at the end doesn’t have a shock value, but rather speaks to our senses and our innermost desires.&nbsp;Quick and interesting fact: Nobody knew that Kevin Spacey was cast in the movie as the killer. His name doesn’t even appear in the casting. His subsequent appearance owed to the movie’s now cult following, as it banked on the success of ‘The Usual Suspects’, which is next on our list. Sidenote, while we say that </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-seven/"><span data-dcnode-id="1910" instrument_node="">‘Se7en’</span></a><span data-dcnode-id="1908" instrument_node=""> lacks shock value, we are also open to the argument (as we do not want to be one-sided here) that that’s all the ending to this film is, with the unexpected Kevin Spacey-entry, the unconnected box in the close (the contents of which don’t really provide the story with depth or further meaning, and in that becomes merely a tool to catch the audience by surprise). Perhaps, it’s Fincher’s meticulous approach to it all that ultimately makes this ending work.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1901"><strong data-dcnode-id="1902"><span data-dcnode-id="1905" instrument_node="">Read More: </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-spies-secret-agents/"><span data-dcnode-id="1904" instrument_node="">Best Spy Movies of&nbsp;All Time&nbsp;</span></a></strong></p><span data-dcnode-id="1900" instrument_node="">
</span><h4 data-dcnode-id="1898" style="text-align: center;"><span data-dcnode-id="1899" instrument_node="">8. The Usual Suspects</span></h4><span data-dcnode-id="1897" instrument_node="">
</span><figure data-dcnode-id="1895"><img class="aligncenter" data-dcnode-id="1896" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/The-Usual-Suspects_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1893" instrument_node="">Before X-Men, Bryan Singer made his mark with </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-the-usual-suspects/"><span data-dcnode-id="1892" instrument_node="">this neo-noir thriller</span></a><span data-dcnode-id="1890" instrument_node="">. Unable to convict Kent of anything, Agent Kujan lets him go free, and Kint’s stroll toward his new life starts off in a limp but, brilliantly, culminates in a straight leg. Kujan is too late to realize that nearly every detail in Kint’s story was lifted, by name, from the various knick-knacks in the agent’s office.&nbsp;It all wraps up with the pitch-perfect closing line, voiced by Kint/Soze: “The greatest trick the Devil ever pulled was convincing the world he doesn’t exist; and like that, he’s gone”. An intelligently written and directed caper, this movie features one of the most famous plot twists in cinematic history. </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/10-best-performances-of-kevin-spacey/"><span data-dcnode-id="1889" instrument_node="">Kevin Spacey</span></a><span data-dcnode-id="1887" instrument_node=""> went on to win the Academy Award for Best Supporting Actor for his performance as Roger ‘Verbal’ Klint.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1880"><strong data-dcnode-id="1881"><span data-dcnode-id="1884" instrument_node="">Read More: </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-hipster-movies/"><span data-dcnode-id="1883" instrument_node="">Best Hipster Movies of All Time</span></a></strong></p><span data-dcnode-id="1879" instrument_node="">
</span><h4 data-dcnode-id="1877" style="text-align: center;"><span data-dcnode-id="1878" instrument_node="">7. Fight Club</span></h4><span data-dcnode-id="1876" instrument_node="">
</span><figure data-dcnode-id="1874"><img class="aligncenter" data-dcnode-id="1875" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/fight-club-brad-pitt_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node="">You know your ending is something of a masterpiece when it becomes a meme and stays relevant even in 2018. I know people say you shouldn’t talk about </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-fight-club/"><span data-dcnode-id="1871" instrument_node="">‘Fight Club’</span></a><span data-dcnode-id="1869" instrument_node="">, but since there probably isn’t anyone reading this who doesn’t know of the famous twist, I guess I’ll do some talking, though I won’t spoil anything in here. </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/fight-club-ending-explanation/"><span data-dcnode-id="1868" instrument_node="">The ending to David Fincher’s thriller-classic</span></a><span data-dcnode-id="1866" instrument_node=""> is one that makes you interpret the entire film in a different way, and the final shot just before the film ends – set to ‘Where Is My Mind’ by Pixies – is considered to be one of cinema’s most memorable moments ever.</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1855"><strong data-dcnode-id="1856"><span data-dcnode-id="1863" instrument_node="">Read More: </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1862" instrument_node="">Best Assasination </span></a><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1860" instrument_node="">Movie</span></a><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1858" instrument_node="">s of All Time</span></a></strong></p><span data-dcnode-id="1854" instrument_node="">
</span><h4 data-dcnode-id="1852" style="text-align: center;"><span data-dcnode-id="1853" instrument_node="">6. The Holy Mountain</span></h4><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><img alt="" class="alignnone size-full wp-image-119059" data-attachment-id="119059" data-comments-opened="1" data-dcnode-id="1850" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="holy-mountain1" data-large-file="https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?w=889" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg" data-orig-size="889,500" data-permalink="https://thecinemaholic.com/holy-mountain1/" height="720" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg 889w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=200,112 200w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=300,169 300w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=768,432 768w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=370,208 370w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=270,152 270w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=570,321 570w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=740,416 740w, https://thecinemaholic.com/wp-content/uploads/2018/12/holy-mountain1.jpg?resize=355,200 355w" width="1280"></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">‘The Holy Mountain’ has an ending that has gotten people divided, and I guess I can understand why that is so, to a degree, at least. The film, which up until then shows a surreal tale like no other, dealing with human representatives from all the planets in our solar system coming together to take on a spiritual journey led by a know-it-all alchemist in order to pursue immortality, suddenly changes itself, not in style, but in the narrative. Some viewers feel this was director Alejandro Jodorowsky’s big cop-out, purposefully providing a lack of closure since he might have run out of ideas, but others, like me, find this ending to be perfect to a story that, for the most part, seems like it is attempting to make sense of its own fantastical caricature of the world in existence.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1840"><strong data-dcnode-id="1841"><span data-dcnode-id="1844" instrument_node="">Read More: </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-mind-fuck-movies/" rel="noopener" target="_blank"><span data-dcnode-id="1843" instrument_node="">Best Mind Fuck Movies</span></a></strong></p><span data-dcnode-id="1839" instrument_node="">
</span><h4 data-dcnode-id="1837" style="text-align: center;"><span data-dcnode-id="1838" instrument_node="">5. Vertigo</span></h4><span data-dcnode-id="1836" instrument_node="">
</span><figure data-dcnode-id="1834"><img class="aligncenter" data-dcnode-id="1835" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/vertigo_f_improf_1024x576.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Alfred Hitchcock taught the world how to do thrillers and ‘Vertigo’ is his finest movie. Criminally overlooked at the time of its released, ‘Vertigo’ was a box-office flop. But it now ranks as one of the best films ever made. It replaced ‘Citizen Kane’ in the Sight &amp; Sound poll as the greatest film in cinematic history. ‘Vertigo’ is a story about manipulation, obsession and the fragile nature of love. It has a twist which is quite subtle and cerebral in nature, its shock only evident in the eyes of our protagonist, played brilliantly by James Stewart.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1825"><strong data-dcnode-id="1826"><span data-dcnode-id="1829" instrument_node="">Read More: </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-about-kidnapping/"><span data-dcnode-id="1828" instrument_node="">Best Kidnapping Movies of All Time</span></a></strong></p><span data-dcnode-id="1824" instrument_node="">
</span><h4 data-dcnode-id="1822" style="text-align: center;"><span data-dcnode-id="1823" instrument_node="">4. Chinatown</span></h4><span data-dcnode-id="1821" instrument_node="">
</span><figure data-dcnode-id="1819"><img class="aligncenter" data-dcnode-id="1820" height="650" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/5-things-you-might-not-know-about-roman-polanski-chinatown_f_improf_865x650.jpg&amp;raw" width="865"></figure><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1817" instrument_node="">The best example of neo-noir genre, </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/chinatown-analysis/"><span data-dcnode-id="1816" instrument_node="">‘Chinatown’</span></a><span data-dcnode-id="1814" instrument_node=""> is undoubtedly one of the best movies of all time. A great script which became a benchmark for screenplays, and to this date is studied by all aspiring scriptwriters to understand the craft of the genre. Densely structured, and elevated by excellent performances by </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/the-10-best-performances-of-jack-nicholson/"><span data-dcnode-id="1813" instrument_node="">Jack Nicholson</span></a><span data-dcnode-id="1811" instrument_node=""> and Faye Dunaway, ‘Chinatown’ grips you by the neck, takes you on a cliff, and in the end, just lets go. The moody and unexpected climax wasn’t in the script originally, but thought by director </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-roman-polanski-movies/"><span data-dcnode-id="1810" instrument_node="">Roman Polanski</span></a><span data-dcnode-id="1808" instrument_node="">. It brought the film to a bleak yet satisfying conclusion.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1801"><strong data-dcnode-id="1802"><span data-dcnode-id="1805" instrument_node="">Read More: </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/greatest-directorial-debuts/"><span data-dcnode-id="1804" instrument_node="">Best Directorial Debuts of All Time</span></a></strong></p><span data-dcnode-id="1800" instrument_node="">
</span><h4 data-dcnode-id="1798" style="text-align: center;"><span data-dcnode-id="1799" instrument_node="">3. Citizen Kane</span></h4><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><img alt="" class="alignnone size-full wp-image-7788" data-attachment-id="7788" data-comments-opened="1" data-dcnode-id="1796" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Citizen Kane" data-large-file="https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?w=1024" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg" data-orig-size="1024,504" data-permalink="https://thecinemaholic.com/citizen-kane-innovations-flaws/citizen-kane-3/" height="504" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg 1024w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=200,98 200w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=300,148 300w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=768,378 768w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=370,182 370w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=270,133 270w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=570,281 570w, https://thecinemaholic.com/wp-content/uploads/2016/04/Citizen-Kane.jpg?resize=740,364 740w" width="1024"></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1793" instrument_node="">With the ending of </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/movies-like-citizen-kane/"><span data-dcnode-id="1792" instrument_node="">‘Citizen Kane’</span></a><span data-dcnode-id="1790" instrument_node="">, largely considered </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-of-all-time/"><span data-dcnode-id="1789" instrument_node="">the greatest film of all time</span></a><span data-dcnode-id="1787" instrument_node="">, the beauty of a twist has become extended further to a communicative tool, allowing the filmmaker to hammer his prime message in a way that doesn’t seem preachy or forced. This is what the film is about, so to speak. The main reason I believe the ending to Orson Welles’ magnum opus works so well is because of how personal it suddenly gets, in comparison to the rest of the picture, which ironically is more or less a </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-characterizations-21st-century/"><span data-dcnode-id="1786" instrument_node="">character study</span></a><span data-dcnode-id="1784" instrument_node="">, of an individual who rises to power from humble beginnings, the prevailing mystery being the meaning behind his last word, ‘Rosebud’. The film pokes the frailty of human life, how we imagine it to be a lot more than what it really is, and to deliver such a theme with the help of a twist ending is really something, isn’t it?</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1773"><strong data-dcnode-id="1774"><span data-dcnode-id="1781" instrument_node="">Read More: </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1780" instrument_node="">Best Assasination </span></a><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1778" instrument_node="">Movie</span></a><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-assasinations/"><span data-dcnode-id="1776" instrument_node="">s of All Time</span></a></strong></p><span data-dcnode-id="1772" instrument_node="">
</span><h4 data-dcnode-id="1770" style="text-align: center;"><span data-dcnode-id="1771" instrument_node="">2. Diabolique</span></h4><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><img alt="" class="alignnone size-full wp-image-10478" data-attachment-id="10478" data-comments-opened="1" data-dcnode-id="1768" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="diaboliques-11" data-large-file="https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?w=864" data-medium-file="https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?w=300" data-orig-file="https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg" data-orig-size="864,600" data-permalink="https://thecinemaholic.com/greatest-movie-endings/diaboliques-11/" height="600" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg&amp;raw" srcset="https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg 864w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=200,139 200w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=300,208 300w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=768,533 768w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=370,257 370w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=270,188 270w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=570,396 570w, https://thecinemaholic.com/wp-content/uploads/2016/08/diaboliques-11.jpg?resize=740,514 740w" width="864"></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Henri-Georges Clouzot’s ‘Diabolique’ ends with a disclaimer, begging the audience to keep what they’ve just seen unfold in front of their eyes a secret, and so, I will not tell you anything about this film’s close. I will tell you though, that the big reveal that happens during the final minutes of this chilling thriller made me feel stupid, because it was right there in the open, obvious (probably) to those who were smarter than me, and made more sense than any other twist ending I’d seen up until then. Part of what works here is the simplicity with which Clouzot presents the last scene, which follows some moments of tension and utter confusion, which should make this ending a sigh of relief, though it ends up acting as the cherry on top. I personally felt mocked by the picture, which communicates its twist with an ardent surety, like I was supposed to know it all along. It’s one of my favorite thrillers of all time for this very reason.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1758"><strong data-dcnode-id="1759"><span data-dcnode-id="1762" instrument_node="">Read More:&nbsp;</span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/schizophrenia-movies/"><span data-dcnode-id="1761" instrument_node="">Best Schizophrenia Movies of All Time</span></a></strong></p><span data-dcnode-id="1757" instrument_node="">
</span><h4 data-dcnode-id="1755" style="text-align: center;"><span data-dcnode-id="1756" instrument_node="">1. Psycho</span></h4><span data-dcnode-id="1754" instrument_node="">
</span><figure data-dcnode-id="1752"><img class="aligncenter" data-dcnode-id="1753" height="527" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/wp-content/uploads/2015/03/_d_improd_/psycho-anthony-perkins-as-norman-bates_f_improf_977x527.jpg&amp;raw" width="977"></figure><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1741"><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-movies-of-alfred-hitchcock/"><span data-dcnode-id="1750" instrument_node="">Alfred Hitchcock’s</span></a><span data-dcnode-id="1748" instrument_node=""> career was at a crossroads. People had monumental expectations from the master of thriller, after the success of ‘North by Northwest’, but many were skeptical that he would go loony and deliver another box office flop like ‘Vertigo’. Things went so bad that he was denied funding for his next movie. The producers&nbsp;didn’t like the fact that he was adapting ‘Psycho’ from a relatively unknown book. Hitchcock gathered his old crew – colleagues and associated from his television show – and decided to go </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-black-and-white-movies-color-era/"><span data-dcnode-id="1747" instrument_node="">black and white</span></a><span data-dcnode-id="1745" instrument_node="">. With minimum funding, Hitchcock delivered ‘Psycho’, which is now counted as the finest </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/hulu-psychological-thrillers/"><span data-dcnode-id="1744" instrument_node="">thriller</span></a><span data-dcnode-id="1742" instrument_node=""> ever made. I won’t talk about the twist here. You have to watch it to experience it.</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><strong data-dcnode-id="1736"><span data-dcnode-id="1739" instrument_node="">Read More: </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecinemaholic.com/best-mind-fuck-movies/" rel="noopener" target="_blank"><span data-dcnode-id="1738" instrument_node="">Best Mind Fuck Movies</span></a></strong></p><span data-dcnode-id="1734" instrument_node="">
</span><span data-dcnode-id="1732" instrument_node="">
