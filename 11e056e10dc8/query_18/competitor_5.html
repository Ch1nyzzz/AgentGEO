</span><h1 class="title" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">12 Songs with Twist Endings</span></h1><span data-dcnode-id="3415" instrument_node="">
</span><div class="bylinepublished" data-dcnode-id="3410"><span data-dcnode-id="3414" instrument_node="">By </span><a class="ovr" data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pastemagazine.com/writers%3Fname%3Dmaria%2Bschurr"><span data-dcnode-id="3413" instrument_node="">Maria Schurr</span></a><span data-dcnode-id="3411" instrument_node=""> &nbsp;|&nbsp; July 13, 2015 &nbsp;|&nbsp; 12:57pm</span></div><span data-dcnode-id="3409" instrument_node="">

</span><p data-dcnode-id="3380"><span data-dcnode-id="3382" instrument_node="">The thrill of surprise is something that permeates all our pop culture, and that thrill is no greater than when what we are reading, watching or even listening to comes with a twist. Songwriting can be seen as the most condensed mode of the surprise or twist ending, and arguably an area where spoilers hamper our enjoyment a little less. Knowing a song’s lyrical path will diverge at some point usually does little in diminishing our appreciation of sterling song structure, a killer hook, or a powerful vocal delivery. We can go back to a song multiple times without ever really considering its story line, although those who are into that sort of thing will likely appreciate the craft that goes into a concise, well-played twist with little regard of whether that twist is anticipated in advance. Despite this being a list mildly marred by spoiler alerts, the reveals in these songs should do little in keeping us from listening on, whether for the first time or 50. </span></p><span data-dcnode-id="3379" instrument_node="">
</span><h2 data-dcnode-id="3374"><span data-dcnode-id="3378" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="3376" id="1-roy-orbison-running-scared-"><span data-dcnode-id="3377" instrument_node="">1. Roy Orbison, “Running Scared”</span></a><span data-dcnode-id="3375" instrument_node="">
</span></h2><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3366"><span data-dcnode-id="3372" instrument_node="">
</span><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node="">
As Bob Dylan famously wrote of Roy Orbison in </span><i data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Chronicles: Volume One</span></i><span data-dcnode-id="3367" instrument_node="">, “He sounded like he was singing from an Olympian mountaintop and he meant business.” Orbison’s voice, at once omnipotent and vulnerable, has one of its most staggering moments on “Running Scared.” Given the air of tragedy and that Orbison made his name with hits like “Only The Lonely,” it would be easy to expect the song to end on an unhappy note. True to Orbison’s genius, however, “Running Scared,” which sees the narrator on the verge of resignation as his lover is torn between him and the man they had both been running from takes a turn at the 11th hour. The subtlety of the twist is all the more shocking thanks to the way it opposes Orbison’s high drama delivery.</span></p><span data-dcnode-id="3365" instrument_node="">

</span><h2 data-dcnode-id="2827"><span data-dcnode-id="2831" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="2829" id="2-rilo-kiley-does-he-love-you"><span data-dcnode-id="2830" instrument_node="">2. Rilo Kiley, “Does He Love You</span></a><span data-dcnode-id="2828" instrument_node="">
</span></h2><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2825" instrument_node="">
</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">
Although some narrative songs can shock with lyrics alone, “Does He Love You” heightens the suspense via musical and vocal changes as the song progresses. What begins with a wide-eyed recitation from Jenny Lewis with simple guitar accompaniment fleshes out to full band as the story unfolds, building up to a tumultuous melody and distorted vocals as we reach the song’s twist and aftermath. This is nothing to discount Lewis’ story of a female friendship being torn apart by adultery. The song reveals itself as deftly as a short story, but the added punch of its musical arrangement ensures a sting that will last for days. </span></p><span data-dcnode-id="2821" instrument_node="">

</span><h2 data-dcnode-id="2767"><span data-dcnode-id="2771" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="2769" id="3-the-kinks-lola-"><span data-dcnode-id="2770" instrument_node="">3. The Kinks, “Lola”</span></a><span data-dcnode-id="2768" instrument_node="">
</span></h2><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2765" instrument_node="">
</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">
“Lola” received its fair share of controversy back in the day for its twist, which was based on a real-life encounter between Kinks’ manager Robert Wace and the titular character. Throughout the course of the song, listeners learn that desirable Lola is not who she seems, leading to the casual revelation that the narrator is happy to be a man “and so is Lola.”  Given the great lack of trans-positivity in the era it was written, “Lola” is a pretty remarkable song in that doesn’t conclude on a derisive note. In doing so, it’s a song made all the better for its twist. More controversial than the twist itself, however, and what ultimately led the BBC to banning the song, was the use of a name brand—Coca-Cola—in the song. Kinks frontman Ray Davies famously had to pause the band’s U.S. tour in order to run home and change the words to “cherry cola” instead. </span></p><span data-dcnode-id="2761" instrument_node="">

</span><h2 data-dcnode-id="2366"><span data-dcnode-id="2370" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="2368" id="4-nick-cave-and-the-bad-seeds-the-mercy-seat-"><span data-dcnode-id="2369" instrument_node="">4. Nick Cave and the Bad Seeds, “The Mercy Seat”</span></a><span data-dcnode-id="2367" instrument_node="">
</span></h2><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2364" instrument_node="">
</span><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">
“The Mercy Seat” is one of Nick Cave’s finest moments, in no small part due to the ambiguity of its twist. On his way to the electric chair, the convicted narrator claims, “I’m not afraid to die,” which could either signify his guilt or admitting that facing his mortality is actually frightening. The song’s bottom line is chilling regardless. If you like your twists more gleeful than sobering, there is always </span><a class="ovr" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/www.youtube.com/watch%3Fv%3DACG9wv69bKU"><span data-dcnode-id="2361" instrument_node="">“The Curse of Millhaven”</span></a><span data-dcnode-id="2359" instrument_node=""> from 1996’s </span><i data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Murder Ballads</span></i><span data-dcnode-id="2356" instrument_node="">, featuring quite possibly the most demented little girl in music history as its protagonist.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><div class="dfp" data-chars="1407" data-dcnode-id="2346"><span data-dcnode-id="2353" instrument_node="">

</span><h2 data-dcnode-id="2335"><span data-dcnode-id="2339" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="2337" id="5-pulp-babies-"><span data-dcnode-id="2338" instrument_node="">5. Pulp, “Babies”</span></a><span data-dcnode-id="2336" instrument_node="">
</span></h2><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2333" instrument_node="">
</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">
The twists and turns of adolescent sexual curiosity and awakening laid out in one of the finest singles of the ‘90s. In spite of its voyeuristic angle, Jarvis Cocker’s tale of spying on his secret crush’s older sister when she has boys in her room comes across as perversely sweet once its punch line comes around. Although the song is brilliant itself, its music video is a pretty clever deconstruction of the promo video that features something of a proto-spoiler alert.  </span></p><span data-dcnode-id="2329" instrument_node="">

</span></h2><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2273" instrument_node="">
</span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">
While a few songs on this list may take their twist cues from the narrative arcs of short stories, “The Gift” is an actual short story, written by Lou Reed while he attended Syracuse University. Narrated to perfection by John Cale, the unfortunate tale of Waldo Jeffers mailing himself to his long distance sweetheart plays out in all its morbid glory on the left side of the speaker while the Velvets din on in the right.  As the tale confirms, nice guys often finish last. But hopefully not all of them get a sheet metal cutter to their head as a result.</span></p><span data-dcnode-id="2269" instrument_node="">

</span><a class="big jumplink" data-dcnode-id="1469" id="8-the-divine-comedy-something-for-the-weekend-"><span data-dcnode-id="1470" instrument_node="">8. The Divine Comedy, “Something For the Weekend”</span></a><span data-dcnode-id="1468" instrument_node="">
</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1465" instrument_node="">
</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">
The opener from The Divine Comedy’s 1996 chamber music-inspired Britpop hit </span><i data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Casanova</span></i><span data-dcnode-id="1460" instrument_node=""> has all the touchstones of Neil Hannon’s songwriting: It’s coy, arch, clever, sex-driven, and unconventional. Rarely have songs led on listeners so charmingly, only to end in such destruction (and in this case, the narrator being beaten and mugged in a woodshed). Bonus points go to Hannon for straying from the melody when he arrives at the punch line and for somehow making “there ain’t nothing in the woodshed / except maybe some wood” into a line you can sing along to.  </span></p><span data-dcnode-id="1458" instrument_node="">

</span><h2 data-dcnode-id="1404"><span data-dcnode-id="1408" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="1406" id="9-harry-chapin-the-mayor-of-candor-lied-"><span data-dcnode-id="1407" instrument_node="">9. Harry Chapin, “The Mayor of Candor Lied”</span></a><span data-dcnode-id="1405" instrument_node="">
</span></h2><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1402" instrument_node="">
</span><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">
Featuring not one, but two, twists, Harry Chapin’s tale of a lowly plow boy out to win the affections of the local mayor’s daughter is a gripping saga in spite of its eight-and-a-half-minute run time. Twist 1: When the boy finds his mother in the mayor’s arms, the mayor agrees to give the boy his daughter’s hand if he keeps the affair a secret. Twist 2: the mayor disregards his side of the bargain, returning after sending his daughter abroad to further dash the plow boy’s hopes by revealing he is the boy’s father. Even if mayor’s shiftiness is portrayed somewhat in the title—“candor” is a synonym for “honesty,” after all—the song still comes across like a bedtime story you know the ending to but still await the retelling of with bated breath.</span></p><span data-dcnode-id="1398" instrument_node="">

</span><h2 data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="1005" id="10-the-wailers-shame-and-scandal-"><span data-dcnode-id="1006" instrument_node="">10. The Wailers, “Shame and Scandal”</span></a><span data-dcnode-id="1004" instrument_node="">
</span></h2><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1001" instrument_node="">
</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">
The Wailers offer another tale of infidelity, played out in a more good-humored way than Chapin’s entry on this list. “Shame and Scandal” is an oft-covered calypso tune written by Lord Melody and originally performed by Sir Lancelot. Its most well known incarnation is likely a version released by Madness in 2005, but that version lacks the bounce and vigor of this offering from the Peter Tosh-fronted Wailers. Another boy eager for a girl’s hand is repeatedly told by his father, “the girl is your sister but your mama don’t know,” a line that sees something of a reversal come song’s end when the boy’s mother tells him, “your daddy ain’t your daddy, but your daddy don’t know.” It’s a song where the twist need not necessitate enjoyment of the song, although that a song called “Shame and Scandal” is enjoyable at all is a twist in itself.</span></p><span data-dcnode-id="997" instrument_node="">

</span><h2 data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">
</span><a class="big jumplink" data-dcnode-id="945" id="11-led-zeppelin-fool-in-the-rain-"><span data-dcnode-id="946" instrument_node="">11. Led Zeppelin, “Fool in the Rain”</span></a><span data-dcnode-id="944" instrument_node="">
</span></h2><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="941" instrument_node="">
</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
While most Led Zeppelin fans probably don’t listen to the band for its lyrical content, those who pay close attention may know well of the humorous twist in </span><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">In Through The Out Door</span></i><span data-dcnode-id="936" instrument_node="">’s “Fool in the Rain.” What could so easily have been just another song about an eager guy being stood up by the object of his affection turns the tables by revealing the poor sucker has been waiting for his date at the wrong location. With a samba-influenced instrumental break and an oft-repeated refrain, the song’s roundabout journey to its punch line excuses anyone who would care to jam out rather than deconstruct the song’s narrative.</span></p><span data-dcnode-id="934" instrument_node="">

</span><a class="big jumplink" data-dcnode-id="863" id="12-the-beatles-drive-my-car-"><span data-dcnode-id="864" instrument_node="">12. The Beatles, “Drive My Car”</span></a><span data-dcnode-id="862" instrument_node="">
</span></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="859" instrument_node="">
</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">
This classic album opener track on 1965’s </span><i data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Rubber Soul</span></i><span data-dcnode-id="854" instrument_node="">, conveys its twist in its perfectly Beatles-esque straightforward manner. “Drive My Car” lays out a tale about being promised a chauffer gig by a comely lady who eventually admits she doesn’t have a car yet. But with a bouncy chorus that ends in “beep beep, yeah!” it’s hard to mad about that little white lie. </span></p><span data-dcnode-id="852" instrument_node="">
