</span><p data-dcnode-id="1849"><img alt="Peter Sarsgaard as Jay, Joey King as Kayla, and Mireille Enos as Rebecca in THE LIE" class="inline" data-dcnode-id="1877" data-image-label="xxxlarge@2x" data-nid="47853053" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media1.popsugar-assets.com/files/thumbor/sXWmq_SRQHeKRTwlSnj9xBfr-fE/fit-in/2048xorig/filters%3Aformat_auto-%21%21-%3Astrip_icc-%21%21-/2020/10/05/841/n/1922283/tmp_vpndwj_da3c3734ad630916_welcome-to-the-blumhouse-LIE_SG_00297R_rgb.jpg&amp;raw" srcset="https://media1.popsugar-assets.com/files/thumbor/UVzfKOeUNaHhXPU8_N49JZenTDY/fit-in/1024x1024/filters:format_auto-!!-:strip_icc-!!-/2020/10/05/841/n/1922283/tmp_vpndwj_da3c3734ad630916_welcome-to-the-blumhouse-LIE_SG_00297R_rgb.jpg 1024w, https://media1.popsugar-assets.com/files/thumbor/sXWmq_SRQHeKRTwlSnj9xBfr-fE/fit-in/2048xorig/filters:format_auto-!!-:strip_icc-!!-/2020/10/05/841/n/1922283/tmp_vpndwj_da3c3734ad630916_welcome-to-the-blumhouse-LIE_SG_00297R_rgb.jpg 2048w" title="Peter Sarsgaard as Jay, Joey King as Kayla, and Mireille Enos as Rebecca in THE LIE"><br data-dcnode-id="1876"><span data-dcnode-id="1875" instrument_node="">
</span><small class="source" data-dcnode-id="1871"><span data-dcnode-id="1874" instrument_node="">Image Source: </span><a class="track-outbound" data-dcnode-id="1872" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://studios.amazon.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studios.amazon.com/" onclick="trackOutboundLink('article:page', 'studios.amazon.com', '47852412', 'https://studios.amazon.com/')" rel="nofollow" target="_blank"><span data-dcnode-id="1873" instrument_node="">Amazon Studios</span></a></small><br data-dcnode-id="1870"><span data-dcnode-id="1869" instrument_node="">
Blumhouse's </span><a class="ga-track" data-dcnode-id="1866" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/latest/The-Lie" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/latest/The-Lie"><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">The Lie</span></strong></a><span data-dcnode-id="1865" instrument_node="">, which premiered </span><a class="ga-track" data-dcnode-id="1863" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/entertainment/new-blumhouse-horror-movies-on-amazon-prime-video-in-2020-47809935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/entertainment/new-blumhouse-horror-movies-on-amazon-prime-video-in-2020-47809935"><span data-dcnode-id="1864" instrument_node="">on Amazon Prime Video on Oct. 6</span></a><span data-dcnode-id="1862" instrument_node="">, stars </span><a class="sugar-inline-link ga-track" data-dcnode-id="1860" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/Joey-King" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/Joey-King" target="_blank" title="Latest photos and news for Joey King"><span data-dcnode-id="1861" instrument_node="">Joey King</span></a><span data-dcnode-id="1859" instrument_node=""> as Kayla, a teenage girl who drags her parents into a web of lies due to a lethal mistake. When it comes to horror movies, I pride myself on the fact that </span><a class="ga-track" data-dcnode-id="1857" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/entertainment/Biggest-Horror-Movie-Twists-40616365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/entertainment/Biggest-Horror-Movie-Twists-40616365"><span data-dcnode-id="1858" instrument_node="">I can usually see a twist coming</span></a><span data-dcnode-id="1856" instrument_node="">. </span><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The Lie</span></strong><span data-dcnode-id="1853" instrument_node=""> is one of the few films that really surprised me when the twist is finally revealed at the end. What makes this particular twist so devastating is King's portrayal of Kayla, which has the audience wondering whether they should feel empathy for her or see her as a monster. It also helps that as Kayla's parents, </span><a class="sugar-inline-link ga-track" data-dcnode-id="1851" data-ga-action="body text link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/Peter-Sarsgaard" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/Peter-Sarsgaard" target="_blank" title="Latest photos and news for Peter Sarsgaard"><span data-dcnode-id="1852" instrument_node="">Peter Sarsgaard</span></a><span data-dcnode-id="1850" instrument_node=""> and Mireille Enos, give a slow-burn performance that keeps you on edge as you wait to see how everything will unravel.  </span></p><span data-dcnode-id="1848" instrument_node="">
</span><h2 data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">The Setup</span></h2><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">On the way to a ballet camp, Kayla and her father, Jay, give her best friend Brittany a ride. Things between the two girls become tense as Brittany seemingly flirts with Jay. When they stop off in the middle of nowhere for a bathroom break, there's a scream, and Kayla reveals she's pushed Brittany off the bridge on purpose, effectively killing her. Kayla's parents spend the rest of the movie trying to cover up what their daughter has done, only to get swept up in her lie. Brittany's father, Sam, eventually catches onto them, as do the cops, so Kayla's parents decide to frame him for murder.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><div class="related-stories clearfix" data-dcnode-id="1829"><span data-dcnode-id="1841" instrument_node="">
</span><div class="related-header" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Related:</span></div><span data-dcnode-id="1838" instrument_node="">
</span><a class="related-link related-link-with-image omniture-track ga-track" data-dcnode-id="1831" data-ga-action="related link" data-ga-category="internal click" data-ga-label="https://www.popsugar.com/entertainment/joey-king-the-lie-interview-47847301" data-omniture-type="related link" data-prop48="47847301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsugar.com/entertainment/joey-king-the-lie-interview-47847301"><span data-dcnode-id="1837" instrument_node="">
</span><div class="related-poster" data-dcnode-id="1833"><span data-dcnode-id="1836" instrument_node="">
</span><img alt="Joey King Interview on The Lie, Horror, and Picking Roles" class="image smallsquare" data-dcnode-id="1835" height="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media1.popsugar-assets.com/files/thumbor/TBwRb2O87n6ST2QzYU_iZZ6Sxmw/491x0%3A2891x2400/fit-in/75x75/filters%3Aformat_auto-%21%21-%3Astrip_icc-%21%21-%3Asharpen-%211%2C0%2Ctrue%21-/2020/10/05/614/n/1922283/eeba14b65f7b2353b77b31.25471921_/i/joey-king-the-lie-interview.jpg&amp;raw" title="Joey King Interview on The Lie, Horror, and Picking Roles" width="75"><span data-dcnode-id="1834" instrument_node="">
</span></div><span data-dcnode-id="1832" instrument_node="">
Joey King's The Lie Is an Unsettling Take on Real-Life Fears: "It's Every Person's Worst Nightmare"
</span></a><span data-dcnode-id="1830" instrument_node="">
</span></div><span data-dcnode-id="1828" instrument_node="">
</span><h2 data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">The Twist</span></h2><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">To frame Sam, Kayla's parents try to bury Brittany's belongings in his yard. Kayla's mother, Rebecca, calls Brittany's phone in order for it to ping but is caught by Sam in the process. Jay comes to her rescue, beating Sam to the ground before the pair escape to their car. As if in a trance, Rebecca runs Sam over, leaving him to die. They try to clean up the evidence once home but are interrupted by Brittany, who's been alive this whole time. The lie Kayla tells isn't the coverup of Brittany's murder; the lie is that Brittany is alive. Kayla decides to lie, so that Brittany can see her boyfriend, whom Sam didn't really care for. Instead of telling her parents, Kayla keeps the lie going because things are like they were before her parents got divorced. "[The twist] surprised me so, so much," King told POPSUGAR in an interview about </span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The Lie</span></strong><span data-dcnode-id="1821" instrument_node="">. "Literally, I slammed my laptop closed. I loved that I didn't see it coming, and I also just love how devastating the reveal is." </span></p><span data-dcnode-id="1819" instrument_node="">
</span><h2 data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">The Aftermath</span></h2><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">Unfortunately, the twist comes right at the end of the film, so the characters aren't given much time to deal with this bombshell as the police sirens start to close in. Kayla's parents hug her tight as the realization that their daughter may be a monster, just not in the way they thought, sets in. "It's all over for her," King said to POPSUGAR. "They committed murder, and it's all her fault, and now she's going to be an orphan because of it. It's the most horrifying realization."</span><br data-dcnode-id="1814"><span data-dcnode-id="1813" instrument_node="">
</span><img alt="Joey King as Kayla in THE LIE" class="inline" data-dcnode-id="1812" data-image-label="xxxlarge@2x" data-nid="47852401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media1.popsugar-assets.com/files/thumbor/UqWD2DbPC01o3SE1pGtgHc2JcrI/fit-in/2048xorig/filters%3Aformat_auto-%21%21-%3Astrip_icc-%21%21-/2020/10/05/695/n/1922283/tmp_Uu2ivq_db458d2d9f3de0f4_welcome-to-the-blumhouse-LIE_Unit_01440R_rgb.jpg&amp;raw" srcset="https://media1.popsugar-assets.com/files/thumbor/KRqO-Ev-TfwER5QrCbnFv26l4f8/fit-in/1024x1024/filters:format_auto-!!-:strip_icc-!!-/2020/10/05/695/n/1922283/tmp_Uu2ivq_db458d2d9f3de0f4_welcome-to-the-blumhouse-LIE_Unit_01440R_rgb.jpg 1024w, https://media1.popsugar-assets.com/files/thumbor/UqWD2DbPC01o3SE1pGtgHc2JcrI/fit-in/2048xorig/filters:format_auto-!!-:strip_icc-!!-/2020/10/05/695/n/1922283/tmp_Uu2ivq_db458d2d9f3de0f4_welcome-to-the-blumhouse-LIE_Unit_01440R_rgb.jpg 2048w" title="Joey King as Kayla in THE LIE"></p><span data-dcnode-id="1810" instrument_node="">
