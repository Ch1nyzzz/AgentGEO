</span><img alt="Antebellum ending" class="articlethumb wp-post-image" data-dcnode-id="223" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filmschoolrejects.com/wp-content/uploads/2020/09/antebellum-monae.jpg&amp;raw" width="800"><span data-dcnode-id="222" instrument_node=""> </span><div class="sf-entry-flags" data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">
</span><span class="sf-entry-flag sf-entry-flag-creditline" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Lionsgate</span></span><span data-dcnode-id="218" instrument_node="">

</span><div class="row align-items-center justify-content-center my-4 text-center medium dark-gray" data-dcnode-id="207"><span data-dcnode-id="211" instrument_node="">
            By&nbsp;</span><a class="author url fn" data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filmschoolrejects.com/author/ciara/" rel="author" title="Posts by Ciara Wardlow"><span data-dcnode-id="210" instrument_node="">Ciara Wardlow</span></a><span data-dcnode-id="208" instrument_node="">&nbsp;· Published on September 18th, 2020 
            </span></div><span data-dcnode-id="206" instrument_node="">
</span><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="197"><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filmschoolrejects.com/topics/ending-explained/"><em data-dcnode-id="201"><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Ending Explained</span></strong></em></a><i data-dcnode-id="198"><span data-dcnode-id="199" instrument_node=""> is a recurring series in which we explore the finales, secrets, and themes of interesting movies and shows, both new and old. This time, we look at the ending of Antebellum.</span></i></p><span data-dcnode-id="196" instrument_node="">
</span><hr data-dcnode-id="195"><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="193" instrument_node="">You have clicked on this article because you have either watched&nbsp;</span><em data-dcnode-id="190"><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Antebellum</span></strong></em><em data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">&nbsp;</span></em><span data-dcnode-id="187" instrument_node="">already (my sympathies) or because you have not but you want to hear all about its much-hyped twist. Normally, this is the point where I would tell those who haven’t watched the movie to go and do so, and then come back. Not this time. This time, I give you my full blessing: spoil yourselves without suffering the pain of watching what might be the most woefully misguided film of 2020.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="184" instrument_node="">The first&nbsp;act of&nbsp;</span><em data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Antebellum&nbsp;</span></em><span data-dcnode-id="181" instrument_node="">introduces Eden (</span><strong data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Janelle Monáe</span></strong><span data-dcnode-id="178" instrument_node="">), an enslaved woman working on a cotton plantation. The second act opens with Veronica, also played by Monáe, a hugely successful sociologist living in the present day. You think maybe there are some time-travel shenanigans going on, à la Octavia E. Butler’s </span><em data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Kindred</span></em><span data-dcnode-id="175" instrument_node="">, or that this is a tale following the rich tradition of Black intergenerational trauma narratives like Alex Haley’s </span><em data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Roots&nbsp;</span></em><span data-dcnode-id="172" instrument_node="">and Yaa Gyasi’s </span><em data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Homegoing.&nbsp;</span></em></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="167" instrument_node="">But then the big reveal comes, and it’s neither. It’s something infinitely stupider: Veronica </span><em data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">is&nbsp;</span></em><span data-dcnode-id="164" instrument_node="">Eden. She gets into what she thinks is her Lyft and only realizes too late that she has instead hopped into the car of Elizabeth (</span><strong data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Jena Malone</span></strong><span data-dcnode-id="161" instrument_node="">), the batshit crazy ringleader of a group of next-level Confederacy-loving Civil War reenactors who kidnap and enslave Black people in order to gain a fully authentic Confederate experience. The United Daughters of the Confederacy ain’t got nothing on Lizzie here.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">So we come full-circle to the enslaved Veronica-Eden and her fellow captives desperately plotting to escape to freedom, which does not, in this instance, require making it to the Mason-Dixon line, just off their captor’s compound — or, you know, to a phone with a working signal.</span></p><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="155" instrument_node="">It’s a dumb, genuinely awful twist that only gets worse the more you think about it. It’s like </span><em data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Antebellum</span></em><span data-dcnode-id="152" instrument_node=""> is trying to counter the bogus argument that racism was a problem solved in the 1960s by making the exact opposite but equally ridiculous argument—that the difference between the Black experience of the antebellum South and the present is mostly WiFi and airplanes.&nbsp;</span><em data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Antebellum </span></em><span data-dcnode-id="149" instrument_node="">is also, ironically, the feature debut of the writer-director duo Gerard Bush and Christopher Renz, who claim that they think it’s “really important that any of the art we put out into the world advances the urgent conversations that need to be had around a whole host of issues.”</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="146" instrument_node="">What urgent conversation is this one supposed to be advancing, lads? Always check the license plate? Because otherwise, all this dumpster fire has to offer is exploitative violence against Black bodies stripped of actual historical commentary by the fantastical nature of its premise. Steve McQueen’s </span><em data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">12 Years a Slave&nbsp;</span></em><span data-dcnode-id="143" instrument_node="">this is not. You don’t get some sort of karmic gold star just for having a historically inspired whipping scene. Adding one more derivative, thematically bankrupt slave story to the pile does not satisfy any real moral imperative. More is not inherently better on this front.</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="140" instrument_node="">Anyway, back to the ending of </span><em data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">Antebellum</span></em><span data-dcnode-id="137" instrument_node="">: Veronica makes her escape. She kills Elizabeth! And her rapist, who we only know as “Him”! And other Confederates! She rides away to freedom on a horse! And it’s clearly supposed to be a Powerful! Moment! Even though, you know, the idea that she is triumphantly free callously ignores all the emotional and physical scars Veronica’s gained through this ordeal (she’s been literally branded). Not to mention the crazy amounts of therapy that she’s going to need to help her move past the trauma and survivors guilt (basically all her enslaved friends die gruesomely, usually in front of her) caused by this ordeal.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Let’s not forget, if we’re actually being realistic here, Veronica is also probably going to be stuck with a murder trial, because that’s due process, even if those assholes deserved it. And of course, there’s no way the whole story doesn’t become a media sensation, so now instead of being known for her best-selling book and successful career, she’s going to be known first and foremost as the woman who survived the crazy slave-branding cult that wasn’t Nxivm.</span></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="131" instrument_node="">So there’s your explanation for why </span><em data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Antebellum&nbsp;</span></em><span data-dcnode-id="128" instrument_node="">ends with the specific moment of the bloodied, battered Veronica escaping on a horse, as opposed to actually reuniting with her family or anything like that — because, sadly, her ordeal isn’t over. But thankfully, this hot mess of a movie is, and with any luck, it will fade into obscurity sooner rather than later.</span></p><span data-dcnode-id="126" instrument_node="">
</span><div class="flex justify-items" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">
