</span><div class="article-content retro-folders" data-dcnode-id="1268" id="main-article"><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2417"></p><div class="quoteright" data-dcnode-id="2413" style="width:250px;"><a class="twikilink" data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/FreddyGotFingered" title="/pmwiki/pmwiki.php/Film/FreddyGotFingered"><div class="lazy_load_img_box" data-dcnode-id="2415" style="padding-top:151.43%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/endingfatigue.png" border="0" class="embeddedimage" data-dcnode-id="2416" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/endingfatigue.png&amp;raw" width="350"></div></a></div><span data-dcnode-id="2412" instrument_node="">
</span><div class="acaptionright" data-dcnode-id="2410" style="width:250px;"><span data-dcnode-id="2411" instrument_node="">A rare case of self-awareness.</span></div><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2408"></p><div class="indent" data-dcnode-id="2394"><em data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">"Then comes the ending of the movie. Or the endings. One after another. Farewells. Poignancy. Lessons to be learned. Speeches to be made. Lost marbles to be rediscovered. Tears to be shed."</span></em><span data-dcnode-id="2405" instrument_node="">
</span><div class="indent" data-dcnode-id="2395"><span data-dcnode-id="2404" instrument_node="">— </span><strong data-dcnode-id="2401"><a class="twikilink" data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RogerEbert" title="/pmwiki/pmwiki.php/Creator/RogerEbert"><span data-dcnode-id="2403" instrument_node="">Roger Ebert</span></a></strong><span data-dcnode-id="2400" instrument_node="">, on </span><em data-dcnode-id="2397"><a class="twikilink" data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Hook" title="/pmwiki/pmwiki.php/Film/Hook"><span data-dcnode-id="2399" instrument_node="">Hook</span></a></em><span data-dcnode-id="2396" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2388"><span class="ad-caption" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2389" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">When a viewer, reader, or player finds the fiction they are perusing to be otherwise fine, but have a problem with the fiction when it can't... quite... finish... itself.
</span></p><p data-dcnode-id="2375"><span data-dcnode-id="2385" instrument_node="">The reasons vary: maybe it has pacing issues after the first half or the first main villain in the </span><a class="twikilink" data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SortingAlgorithmOfEvil" title="/pmwiki/pmwiki.php/Main/SortingAlgorithmOfEvil"><span data-dcnode-id="2384" instrument_node="">Sorting Algorithm of Evil</span></a><span data-dcnode-id="2382" instrument_node=""> is defeated, or it's become deathly dull post-climax, or the effort needed to beat the </span><a class="twikilink" data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="2381" instrument_node="">Final Boss</span></a><span data-dcnode-id="2379" instrument_node=""> just doesn't seem worth it, or the </span><a class="twikilink" data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="2378" instrument_node="">Final Battle</span></a><span data-dcnode-id="2376" instrument_node=""> goes on for too long, or perhaps the author just didn't know how to end it, couldn't decide on an ending and just threw all of them in.
</span></p><p data-dcnode-id="2361"><span data-dcnode-id="2374" instrument_node="">Note that this isn't simply "the story is too long/goes too slowly," but it actually appears if it's going to end yet doesn't, several times. The effect of this, usually, is a frustrating and jarring experience which eventually has the viewer thinking something along the lines of "Just </span><em data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">end</span></em><span data-dcnode-id="2371" instrument_node=""> already!" This is, </span><a class="twikilink" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Administrivia/TropesAreTools" title="/pmwiki/pmwiki.php/Administrivia/TropesAreTools"><span data-dcnode-id="2370" instrument_node="">for the most part</span></a><span data-dcnode-id="2368" instrument_node="">, </span><em data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">not</span></em><span data-dcnode-id="2365" instrument_node=""> a reaction you want to provoke in the reader, or the theatergoer who </span><a class="twikilink" data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PottyEmergency" title="/pmwiki/pmwiki.php/Main/PottyEmergency"><span data-dcnode-id="2364" instrument_node="">badly wants to run to the restroom</span></a><span data-dcnode-id="2362" instrument_node=""> but doesn't want to miss the end of the movie that they paid good money to see.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2355"><span class="ad-caption" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2356" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2336"><a class="twikilink" data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoringReturnJourney" title="/pmwiki/pmwiki.php/Main/BoringReturnJourney"><span data-dcnode-id="2354" instrument_node="">Boring Return Journey</span></a><span data-dcnode-id="2352" instrument_node=""> is usually a deliberate attempt to defy this phenomenon. For a variant exclusive to video games in terms of gameplay, see </span><a class="twikilink" data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisappointingLastLevel" title="/pmwiki/pmwiki.php/Main/DisappointingLastLevel"><span data-dcnode-id="2351" instrument_node="">Disappointing Last Level</span></a><span data-dcnode-id="2349" instrument_node=""> (though if the </span><em data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">story</span></em><span data-dcnode-id="2346" instrument_node=""> falls under this, it still counts here). For series that </span><a class="twikilink" data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExecutiveMeddling" title="/pmwiki/pmwiki.php/Main/ExecutiveMeddling"><span data-dcnode-id="2345" instrument_node="">Executive Meddling</span></a><span data-dcnode-id="2343" instrument_node=""> forces to keep going, see </span><a class="twikilink" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FranchiseZombie" title="/pmwiki/pmwiki.php/Main/FranchiseZombie"><span data-dcnode-id="2342" instrument_node="">Franchise Zombie</span></a><span data-dcnode-id="2340" instrument_node="">. Some songs that employ </span><a class="twikilink" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicRocking" title="/pmwiki/pmwiki.php/Main/EpicRocking"><span data-dcnode-id="2339" instrument_node="">Epic Rocking</span></a><span data-dcnode-id="2337" instrument_node=""> can lead to this, say, if the end is two minutes of instrumentals.
</span></p><p data-dcnode-id="2323"><a class="twikilink" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcFatigue" title="/pmwiki/pmwiki.php/Main/ArcFatigue"><span data-dcnode-id="2335" instrument_node="">Arc Fatigue</span></a><span data-dcnode-id="2333" instrument_node=""> is a small-scale version, where a single story-arc goes on longer than it should. Compare </span><a class="twikilink" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicInstrumentalOpener" title="/pmwiki/pmwiki.php/Main/EpicInstrumentalOpener"><span data-dcnode-id="2332" instrument_node="">Epic Instrumental Opener</span></a><span data-dcnode-id="2330" instrument_node="">, where the intro of a song seems neverending, and </span><a class="twikilink" data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeaveTheCameraRunning" title="/pmwiki/pmwiki.php/Main/LeaveTheCameraRunning"><span data-dcnode-id="2329" instrument_node="">Leave the Camera Running</span></a><span data-dcnode-id="2327" instrument_node="">. </span><a class="twikilink" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle" title="/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle"><span data-dcnode-id="2326" instrument_node="">Your Princess Is in Another Castle!</span></a><span data-dcnode-id="2324" instrument_node=""> is when the reader/player thinks the protagonist has reached the ending, only to find out it's a ruse.
</span></p><p data-dcnode-id="2316"><a class="twikilink" data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChrisCarterEffect" title="/pmwiki/pmwiki.php/Main/TheChrisCarterEffect"><span data-dcnode-id="2322" instrument_node="">The Chris Carter Effect</span></a><span data-dcnode-id="2320" instrument_node=""> is when this or </span><a class="twikilink" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcFatigue" title="/pmwiki/pmwiki.php/Main/ArcFatigue"><span data-dcnode-id="2319" instrument_node="">Arc Fatigue</span></a><span data-dcnode-id="2317" instrument_node=""> causes the audience to grow impatient and give up on the series (and it usually is a series of some kind).
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2310"><span class="ad-caption" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2311" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2296"><span data-dcnode-id="2309" instrument_node="">Contrast </span><a class="twikilink" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomenessWithdrawal" title="/pmwiki/pmwiki.php/Main/AwesomenessWithdrawal"><span data-dcnode-id="2308" instrument_node="">Awesomeness Withdrawal</span></a><span data-dcnode-id="2306" instrument_node=""> where you find yourself </span><em data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">wishing</span></em><span data-dcnode-id="2303" instrument_node=""> the story would go on, and </span><a class="twikilink" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsShortSoItSucks" title="/pmwiki/pmwiki.php/Main/ItsShortSoItSucks"><span data-dcnode-id="2302" instrument_node="">It's Short, So It Sucks!</span></a><span data-dcnode-id="2300" instrument_node=""> which is basically the reverse criticism of this. Also contrast </span><a class="twikilink" data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProlongedPrologue" title="/pmwiki/pmwiki.php/Main/ProlongedPrologue"><span data-dcnode-id="2299" instrument_node="">Prolonged Prologue</span></a><span data-dcnode-id="2297" instrument_node="">, where the opening of the story is what's making everything seem like it's dragging.
</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">For films/plays in theaters, these can really be rough for someone fighting </span><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BladderOfSteel" title="/pmwiki/pmwiki.php/Main/BladderOfSteel"><span data-dcnode-id="2294" instrument_node="">Bladder of Steel</span></a><span data-dcnode-id="2292" instrument_node="">, as there is no way to pause the production.

</span></p><hr data-dcnode-id="2290"><h2 data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Example subpages:</span></h2><span data-dcnode-id="2287" instrument_node="">
</span><ul data-dcnode-id="2256"><li data-dcnode-id="2282"><span data-dcnode-id="2286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/AnimeAndManga" title="/pmwiki/pmwiki.php/EndingFatigue/AnimeAndManga"><span data-dcnode-id="2285" instrument_node="">Anime &amp; Manga</span></a><span data-dcnode-id="2283" instrument_node="">
</span></li><li data-dcnode-id="2277"><span data-dcnode-id="2281" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/LiveActionFilms" title="/pmwiki/pmwiki.php/EndingFatigue/LiveActionFilms"><span data-dcnode-id="2280" instrument_node="">Films — Live-Action</span></a><span data-dcnode-id="2278" instrument_node="">
</span></li><li data-dcnode-id="2272"><span data-dcnode-id="2276" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/Literature" title="/pmwiki/pmwiki.php/EndingFatigue/Literature"><span data-dcnode-id="2275" instrument_node="">Literature</span></a><span data-dcnode-id="2273" instrument_node="">
</span></li><li data-dcnode-id="2267"><span data-dcnode-id="2271" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/LiveActionTV" title="/pmwiki/pmwiki.php/EndingFatigue/LiveActionTV"><span data-dcnode-id="2270" instrument_node="">Live-Action TV</span></a><span data-dcnode-id="2268" instrument_node="">
</span></li><li data-dcnode-id="2262"><span data-dcnode-id="2266" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/Music" title="/pmwiki/pmwiki.php/EndingFatigue/Music"><span data-dcnode-id="2265" instrument_node="">Music</span></a><span data-dcnode-id="2263" instrument_node="">
</span></li><li data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/EndingFatigue/VideoGames" title="/pmwiki/pmwiki.php/EndingFatigue/VideoGames"><span data-dcnode-id="2260" instrument_node="">Video Games</span></a><span data-dcnode-id="2258" instrument_node="">
</span></li></ul><p data-dcnode-id="2255"></p><h2 data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Examples:</span></h2><span data-dcnode-id="2252" instrument_node="">
</span><div class="folderlabel toggle-all-folders-button" data-dcnode-id="2250" onclick="toggleAllFolders();"><span data-dcnode-id="2251" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2248"></p><div class="folderlabel" data-dcnode-id="2246" onclick="togglefolder('folder0');"><span data-dcnode-id="2247" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Board Games&nbsp;</span></div><div class="folder" data-dcnode-id="2192" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="2245" instrument_node="">
</span><ul data-dcnode-id="2193"><li data-dcnode-id="2230"><span data-dcnode-id="2244" instrument_node=""> The </span><em data-dcnode-id="2241"><a class="twikilink" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="2243" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="2240" instrument_node=""> pre-written adventure The </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Red Hand Of Doom</span></em><span data-dcnode-id="2237" instrument_node=""> has the Fane of Tiamat, a rather uneventful, by the numbers, final dungeon to finish off the </span><a class="twikilink" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2236" instrument_node="">Big Bad</span></a><span data-dcnode-id="2234" instrument_node=""> after defeating the Red Hand itself. Guides written for Dungeon Masters running the adventure suggest scrapping it entirely and placing the </span><a class="twikilink" data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2233" instrument_node="">Big Bad</span></a><span data-dcnode-id="2231" instrument_node=""> fight in the earlier Battle of Brindol, as the siege is considered a far worthier end to the campaign.
</span></li><li data-dcnode-id="2215"><span data-dcnode-id="2229" instrument_node=""> A great number of rounds of </span><em data-dcnode-id="2226"><a class="twikilink" data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Monopoly" title="/pmwiki/pmwiki.php/TabletopGame/Monopoly"><span data-dcnode-id="2228" instrument_node="">Monopoly</span></a></em><span data-dcnode-id="2225" instrument_node=""> end up like this: once all the properties are bought, there's nothing really to do but keep going around the board waiting for those in last to run out of money, which they do at a slow rate as everyone still gets $200 for passing Go. Even if people are still trading properties etc., a roll of the dice can easily reintroduce a stalemate. Unusually, this is intentional: the game was originally designed as political propaganda, and the long, grinding endgame was intended to illustrate to the frustrated players the inherent unfairness of the real estate system. The effect is exacerbated by common </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HouseRules" title="/pmwiki/pmwiki.php/Main/HouseRules"><span data-dcnode-id="2224" instrument_node="">House Rules</span></a><span data-dcnode-id="2222" instrument_node=""> (such as awarding players a large amount of cash for landing on Free Parking) which are designed to give losing players a chance to catch up but in practice just prolong their inevitable defeat. This was exemplified in an episode of </span><a class="twikilink" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AchievementHunter" title="/pmwiki/pmwiki.php/Creator/AchievementHunter"><span data-dcnode-id="2221" instrument_node="">Achievement Hunter</span></a><span data-dcnode-id="2219" instrument_node="">'s </span><a class="twikilink" data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LetsPlay" title="/pmwiki/pmwiki.php/Main/LetsPlay"><span data-dcnode-id="2218" instrument_node="">Let's Play</span></a><span data-dcnode-id="2216" instrument_node=""> series. They broke it up into two parts and the first part was difficult to stop because there was just no natural stopping point they could find. And the second part dragged on for so long, the first person to get bankrupt, Gavin, cheerfully leapt out of his seat and ran out the room, screaming "I'M OUT OF HERE, BITCHES!"
</span></li><li data-dcnode-id="2206"><span data-dcnode-id="2214" instrument_node=""> </span><em data-dcnode-id="2211"><a class="twikilink" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Risk" title="/pmwiki/pmwiki.php/TabletopGame/Risk"><span data-dcnode-id="2213" instrument_node="">Risk</span></a></em><span data-dcnode-id="2210" instrument_node=""> does this frequently. The longer the game goes, the more reinforcements a player can get from cards, so failing to finish off an opponent during a long game can often lead to that opponent completely restocking his army on the next turn, extending the length of the game by another hour or so. Plus there's the fact that manipulation and diplomacy are half the fun. Once it's down to two players, this is all gone, leading to the long and boring fight (or quick </span><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="2209" instrument_node="">Curb-Stomp Battle</span></a><span data-dcnode-id="2207" instrument_node="">).
</span></li><li data-dcnode-id="2200"><span data-dcnode-id="2205" instrument_node=""> </span><em data-dcnode-id="2202"><a class="twikilink" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Talisman" title="/pmwiki/pmwiki.php/TabletopGame/Talisman"><span data-dcnode-id="2204" instrument_node="">Talisman</span></a></em><span data-dcnode-id="2201" instrument_node="">: The highly random nature of the game and the many pitfalls that can befall a particular character (death, losing all items/followers, reductions in stats, and random teleportation), some games can run several hours long before a player wins. The game manual even suggests alternate rules for determining who the winner is at the end of a set time limit for players who want to avoid this.
</span></li><li data-dcnode-id="2194"><span data-dcnode-id="2199" instrument_node=""> Also has been known to happen with </span><em data-dcnode-id="2196"><a class="twikilink" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/TrivialPursuit" title="/pmwiki/pmwiki.php/TabletopGame/TrivialPursuit"><span data-dcnode-id="2198" instrument_node="">Trivial Pursuit</span></a></em><span data-dcnode-id="2195" instrument_node="">, on account of having to reach the center space by exact die roll in order to receive the final question. If the die doesn't cooperate, or the final question is missed, this can go on for hours. Add to the fact that many editions of the game contain pretty antiquated trivia to people shy of their fifties.
</span></li></ul></div><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2190"></p><div class="folderlabel" data-dcnode-id="2188" onclick="togglefolder('folder1');"><span data-dcnode-id="2189" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comedy&nbsp;</span></div><div class="folder" data-dcnode-id="2161" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="2187" instrument_node="">
</span><ul data-dcnode-id="2162"><li data-dcnode-id="2175"><span data-dcnode-id="2186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RossNoble" title="/pmwiki/pmwiki.php/Creator/RossNoble"><span data-dcnode-id="2185" instrument_node="">Ross Noble</span></a><span data-dcnode-id="2183" instrument_node=""> is a huge fan of this and a good sign of </span><a class="twikilink" data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Administrivia/TropesAreTools" title="/pmwiki/pmwiki.php/Administrivia/TropesAreTools"><span data-dcnode-id="2182" instrument_node="">Tropes Are Not Bad</span></a><span data-dcnode-id="2180" instrument_node="">. He'll start one topic of discussion or at least mention a story but then never actually finish it or tell the story until the very end of his routine (roughly an hour or two after the first mention) because he'll get distracted by something completely off-topic and then loads of other discussions will come up. Except they all get tidied up at the end. He lampshades this constantly:
</span><dl data-dcnode-id="2176"><dd data-dcnode-id="2177"><div class="indent" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node=""> "WHAT HAPPENED AT LIVE 8 ROSS?!"
</span></div></dd></dl></li><li data-dcnode-id="2163"><span data-dcnode-id="2174" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BillyConnolly" title="/pmwiki/pmwiki.php/Creator/BillyConnolly"><span data-dcnode-id="2173" instrument_node="">Billy Connolly</span></a><span data-dcnode-id="2171" instrument_node=""> could be even worse at times. On one occasion, he had a routine at the Sydney Opera House go so far over time that the car park was locked with the audience's cars inside. There was also one documented case where he started a joke about a guy in a bathroom with holes in his penis, didn't finish it that night, and told someone in the audience annoyed by this that he'd have to attend the next show, in another town, to find out... then </span><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">at</span></em><span data-dcnode-id="2168" instrument_node=""> that next show, during the wrap-up, there came a wail from the audience:
</span><div class="indent" data-dcnode-id="2164"><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">"Billy! You promised! What happened to the guy in the bathroom?!"</span></em><span data-dcnode-id="2165" instrument_node="">
</span></div></li></ul></div><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2159"></p><div class="folderlabel" data-dcnode-id="2157" onclick="togglefolder('folder2');"><span data-dcnode-id="2158" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Books&nbsp;</span></div><div class="folder" data-dcnode-id="2039" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="2156" instrument_node="">
</span><ul data-dcnode-id="2040"><li data-dcnode-id="2144"><span data-dcnode-id="2155" instrument_node=""> </span><em data-dcnode-id="2152"><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/CrisisOnInfiniteEarths" title="/pmwiki/pmwiki.php/ComicBook/CrisisOnInfiniteEarths"><span data-dcnode-id="2154" instrument_node="">Crisis on Infinite Earths</span></a></em><span data-dcnode-id="2151" instrument_node=""> was a long time ending, particularly because the Anti-Monitor just didn't want to die. When </span><a class="twikilink" data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Superman" title="/pmwiki/pmwiki.php/Franchise/Superman"><span data-dcnode-id="2150" instrument_node="">Superman</span></a><span data-dcnode-id="2148" instrument_node=""> finally kills him, he outright does it saying </span><a class="twikilink" data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunctuatedForEmphasis" title="/pmwiki/pmwiki.php/Main/PunctuatedForEmphasis"><span data-dcnode-id="2147" instrument_node="">"I'VE HAD ENOUGH!"</span></a><span data-dcnode-id="2145" instrument_node="">
</span></li><li data-dcnode-id="2136"><span data-dcnode-id="2143" instrument_node=""> </span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Trinity</span></em><span data-dcnode-id="2140" instrument_node="">, DC Comics' paean to how special and awesome its three flagship characters are, was stretched out over an </span><em data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">entire year</span></em><span data-dcnode-id="2137" instrument_node=""> because that seems to be how long they think Epic Series should last these days.
</span></li><li data-dcnode-id="2121"><span data-dcnode-id="2135" instrument_node=""> Marvel </span><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrisisCrossover" title="/pmwiki/pmwiki.php/Main/CrisisCrossover"><span data-dcnode-id="2134" instrument_node="">Crisis Crossovers</span></a><span data-dcnode-id="2132" instrument_node=""> tend to fall into this, since apparently </span><a class="twikilink" data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JoeQuesada" title="/pmwiki/pmwiki.php/Creator/JoeQuesada"><span data-dcnode-id="2131" instrument_node="">Joe Quesada</span></a><span data-dcnode-id="2129" instrument_node="">'s idea of a good crossover event is to have it go on for over a year, with every single title having a 6-issue tie-in. Not to mention, essentially having such crossovers back-to-back. It got so bad that after the disaster that was </span><em data-dcnode-id="2126"><a class="twikilink" data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/SecretEmpire" title="/pmwiki/pmwiki.php/ComicBook/SecretEmpire"><span data-dcnode-id="2128" instrument_node="">Secret Empire</span></a></em><span data-dcnode-id="2125" instrument_node="">, Marvel promised not to even </span><em data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">think</span></em><span data-dcnode-id="2122" instrument_node=""> of such things for at least 18 months.
</span></li><li data-dcnode-id="2107"><span data-dcnode-id="2120" instrument_node=""> The "Cross-Time Caper" plotline in </span><em data-dcnode-id="2117"><a class="twikilink" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Excalibur" title="/pmwiki/pmwiki.php/ComicBook/Excalibur"><span data-dcnode-id="2119" instrument_node="">Excalibur</span></a></em><span data-dcnode-id="2116" instrument_node=""> began in </span><a class="urllink" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vignette.wikia.nocookie.net/marveldatabase/images/8/8d/Excalibur_Vol_1_12.jpg/revision/latest/scale-to-width-down/308%3Fcb%3D20080120145534"><span data-dcnode-id="2115" instrument_node="">issue 12</span><img data-dcnode-id="2114" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2112" instrument_node=""> with the plotline's name and "Part 1 of 9" on the cover. It continued through issue 19, took a break for issue 20 to catch its breath, then picked back up for issue 21... through 24. That's 12 parts (of 9, remember) not including the skipped issue. It was about the team accidentally travelling from an alternate Earth to another, and they got back on their Earth several times, only to flash away moments later. Issue 25 still included the "Cross-Time Caper" logo, but the words </span><a class="urllink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vignette.wikia.nocookie.net/marveldatabase/images/4/4d/Excalibur_Vol_1_25.jpg/revision/latest/scale-to-width-down/323%3Fcb%3D20080208002338"><span data-dcnode-id="2111" instrument_node="">"is still over!"</span><img data-dcnode-id="2110" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2108" instrument_node=""> followed it.
</span></li><li data-dcnode-id="2092"><span data-dcnode-id="2106" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/TheCloneSaga" title="/pmwiki/pmwiki.php/Comicbook/TheCloneSaga"><span data-dcnode-id="2105" instrument_node="">The Clone Saga</span></a><span data-dcnode-id="2103" instrument_node=""> that ran for two years in </span><em data-dcnode-id="2100"><a class="twikilink" data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/SpiderMan" title="/pmwiki/pmwiki.php/Comicbook/SpiderMan"><span data-dcnode-id="2102" instrument_node="">Spider-Man</span></a></em><span data-dcnode-id="2099" instrument_node=""> has become a byword for overly long comic storylines. It was meant to end in less than a year, but editorial kept dragging it out because it was selling well. The catch, of course, is that fans weren't buying it because they </span><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">enjoyed</span></em><span data-dcnode-id="2096" instrument_node=""> it, just because they were already committed to it. In fact, the extra length made the backlash worse — for instance, Ben Reilly "replacing" Peter Parker was always meant to be a fake-out, but the longer it went on, the more fans feared it was really permanent. Near the end, Marvel even released a self-mocking oneshot called </span><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">101 Ways to End the Clone Saga</span></em><span data-dcnode-id="2093" instrument_node="">.
</span></li><li data-dcnode-id="2069"><span data-dcnode-id="2091" instrument_node=""> Another byword for too-long comic stories is </span><em data-dcnode-id="2088"><a class="twikilink" data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheTrialOfTheFlash" title="/pmwiki/pmwiki.php/ComicBook/TheTrialOfTheFlash"><span data-dcnode-id="2090" instrument_node="">The Trial of the Flash</span></a></em><span data-dcnode-id="2087" instrument_node="">. This ambitious storyline from longtime </span><a class="twikilink" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheFlash" title="/pmwiki/pmwiki.php/Franchise/TheFlash"><span data-dcnode-id="2086" instrument_node="">The Flash</span></a><span data-dcnode-id="2084" instrument_node=""> writer Cary Bates put Barry Allen through hell for two years. It was meant to be long, but not to be Barry's </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">last</span></em><span data-dcnode-id="2081" instrument_node=""> story; unfortunately, partway through, the order came down from editorial that Barry would die in </span><em data-dcnode-id="2078"><a class="twikilink" data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/CrisisOnInfiniteEarths" title="/pmwiki/pmwiki.php/Comicbook/CrisisOnInfiniteEarths"><span data-dcnode-id="2080" instrument_node="">Crisis on Infinite Earths</span></a></em><span data-dcnode-id="2077" instrument_node="">. This hurts the Trial with readers, as does the false ending halfway through where Barry is nearly acquitted (mass amnesia erases this) and the many </span><a class="urllink" data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//comicfacts.blogspot.com/2007/04/bob-ingersoll-on-trial-of-flash.html"><span data-dcnode-id="2076" instrument_node="">legal mistakes</span><img data-dcnode-id="2075" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2073" instrument_node="">, including the need for a trial at all... not to mention the inherent story problems in keeping a hero known for battling villains with Super Speed inside a slow-paced courtroom environment. The second-last issue states boldly on the cover "IT'S OVER!" The reason it lasted as long as it did, was due to the fact that DC was modernizing itself creatively and that Cary Bates and Carmine Infantino were basically given Flash to write/draw because none of the editors wanted to give them any big-time assignments due to the fact that they represented the old "50s/60s era DC Comics" style that they were trying to run away from. The whole trial storyline was designed to get the editors to see that they could be hip and relevant as far as capable of producing the long-form storylines that DC editorial wanted at the time; and DC editorial, partly because they didn't want to seem like heartless bastards, let the story run and run and run and run as long as it did mainly because no one wanted to be the one who would have to fire the two from the book. "Crisis" solved this problem, but at the same time made it worse: it was decided to keep Flash being published until </span><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Crisis On Infinite Earths</span></em><span data-dcnode-id="2070" instrument_node=""> #8 was published to hide the big reveal that Barry was going to die. This meant that the storyline had to be dragged out even longer so as to do so.
</span></li><li data-dcnode-id="2063"><span data-dcnode-id="2068" instrument_node=""> </span><em data-dcnode-id="2065"><a class="twikilink" data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/CerebusTheAardvark" title="/pmwiki/pmwiki.php/ComicBook/CerebusTheAardvark"><span data-dcnode-id="2067" instrument_node="">Cerebus</span></a></em><span data-dcnode-id="2064" instrument_node=""> background artist Gerhard very nearly quit before the comic was complete due to having completely lost the ability to enjoy the story due to the rather odd twists and turns Dave Sim had introduced and the way it seemed to be dragging along. He forced himself to finish it by latching onto a prediction Sim made that it would be "done by Christmas" if a certain number of pages were completed each workday, and made that his mantra to keep himself motivated.
</span></li><li data-dcnode-id="2041"><span data-dcnode-id="2062" instrument_node=""> </span><em data-dcnode-id="2059"><a class="twikilink" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Knightfall" title="/pmwiki/pmwiki.php/ComicBook/Knightfall"><span data-dcnode-id="2061" instrument_node="">Knightfall</span></a></em><span data-dcnode-id="2058" instrument_node=""> was a stupidly long storyline. It spent six months building itself up by introducing Bane, Azrael, and Batman's </span><a class="twikilink" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicRROD" title="/pmwiki/pmwiki.php/Main/HeroicRROD"><span data-dcnode-id="2057" instrument_node="">Heroic RRoD</span></a><span data-dcnode-id="2055" instrument_node="">, then nine months were used to break Batman and bring Azrael in, eight months to show Azrael's </span><a class="twikilink" data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SanitySlippage" title="/pmwiki/pmwiki.php/Main/SanitySlippage"><span data-dcnode-id="2054" instrument_node="">Sanity Slippage</span></a><span data-dcnode-id="2052" instrument_node="">, two months for Bruce to come back and defeat Azrael, and after a two-month break for </span><em data-dcnode-id="2049"><a class="twikilink" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/ZeroHourCrisisInTime" title="/pmwiki/pmwiki.php/ComicBook/ZeroHourCrisisInTime"><span data-dcnode-id="2051" instrument_node="">Zero Hour: Crisis in Time!</span></a></em><span data-dcnode-id="2048" instrument_node="">, three months for Dick to be Batman before Bruce returned to the mantle. That's right, the storyline, counting </span><em data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Zero Hour</span></em><span data-dcnode-id="2045" instrument_node="">, lasted </span><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">three years</span></em><span data-dcnode-id="2042" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2037"></p><div class="folderlabel" data-dcnode-id="2035" onclick="togglefolder('folder3');"><span data-dcnode-id="2036" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="2024" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="2034" instrument_node="">
</span><ul data-dcnode-id="2025"><li data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node=""> The narrator of </span><em data-dcnode-id="2030"><a class="twikilink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/PokemonStrangledRed" title="/pmwiki/pmwiki.php/Fanfic/PokemonStrangledRed"><span data-dcnode-id="2032" instrument_node="">Pokemon Strangled Red</span></a></em><span data-dcnode-id="2029" instrument_node=""> invokes this when Steven is wandering around after Miki's death.
</span><div class="indent" data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">"I pondered for a moment if this was really the ending, Steven doomed to do nothing but wander Kanto in misery, haunted by memories, forced to listen to everyone's concerns about him."
</span></div></li></ul></div><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2022"></p><div class="folderlabel" data-dcnode-id="2020" onclick="togglefolder('folder4');"><span data-dcnode-id="2021" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Animation&nbsp;</span></div><div class="folder" data-dcnode-id="1954" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="2019" instrument_node="">
</span><ul data-dcnode-id="1955"><li data-dcnode-id="2013"><span data-dcnode-id="2018" instrument_node=""> The originally-planned ending to </span><em data-dcnode-id="2015"><a class="twikilink" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Aladdin" title="/pmwiki/pmwiki.php/WesternAnimation/Aladdin"><span data-dcnode-id="2017" instrument_node="">Aladdin</span></a></em><span data-dcnode-id="2014" instrument_node=""> - a reprise of "Arabian Nights" where the Peddler from the beginning of the movie revealed himself to be the Genie - may have been cut in order to avoid this trope. It came after the quick reprise of "A Whole New World" and viewers from test screenings reportedly left their seats as the heroes flew off into the night and thus missed this sequence. This may have inspired the finished film's "Made you look!" ending, as it assumes the viewer is already leaving the theater at that moment.
</span></li><li data-dcnode-id="2004"><span data-dcnode-id="2012" instrument_node=""> According to the DVD commentary for </span><em data-dcnode-id="2009"><a class="twikilink" data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ThePiratesInAnAdventureWithScientists" title="/pmwiki/pmwiki.php/WesternAnimation/ThePiratesInAnAdventureWithScientists"><span data-dcnode-id="2011" instrument_node="">The Pirates! In an Adventure with Scientists!</span></a></em><span data-dcnode-id="2008" instrument_node="">, the film narrowly missed coming down with Ending Fatigue during production, since there were so many tiny loose ends to tie up. The Aardman team was anxious to avoid the trope, however, and managed instead to tie up all those loose ends in a </span><a class="twikilink" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreativeClosingCredits" title="/pmwiki/pmwiki.php/Main/CreativeClosingCredits"><span data-dcnode-id="2007" instrument_node="">Creative Closing Credits</span></a><span data-dcnode-id="2005" instrument_node=""> sequence.
</span></li><li data-dcnode-id="1998"><span data-dcnode-id="2003" instrument_node=""> </span><em data-dcnode-id="2000"><a class="twikilink" data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ABugsLife" title="/pmwiki/pmwiki.php/WesternAnimation/ABugsLife"><span data-dcnode-id="2002" instrument_node="">A Bug's Life</span></a></em><span data-dcnode-id="1999" instrument_node=""> has three separate climaxes coming right after the other.
</span></li><li data-dcnode-id="1986"><span data-dcnode-id="1997" instrument_node=""> </span><em data-dcnode-id="1994"><a class="twikilink" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/KuboAndTheTwoStrings" title="/pmwiki/pmwiki.php/WesternAnimation/KuboAndTheTwoStrings"><span data-dcnode-id="1996" instrument_node="">Kubo and the Two Strings</span></a></em><span data-dcnode-id="1993" instrument_node=""> suffers a bit from this, first Kubo confronting the </span><a class="twikilink" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1992" instrument_node="">Big Bad</span></a><span data-dcnode-id="1990" instrument_node="">. Then he wakes up and his village is restored to normal. Then his grandfather wakes up with memory loss. Then we have another afterlife ceremony and </span><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">then</span></em><span data-dcnode-id="1987" instrument_node=""> the credits roll.
</span></li><li data-dcnode-id="1974"><span data-dcnode-id="1985" instrument_node=""> </span><em data-dcnode-id="1982"><a class="twikilink" data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheChristmasLight" title="/pmwiki/pmwiki.php/WesternAnimation/TheChristmasLight"><span data-dcnode-id="1984" instrument_node="">The Christmas Brigade</span></a></em><span data-dcnode-id="1981" instrument_node="">: Just when it seems like the main story is wrapping up after only thirty minutes of its 72-minute runtime, it moves on to Jennifer and her twin sister Amy singing Christmas songs for over ten minutes. </span><em data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Then</span></em><span data-dcnode-id="1978" instrument_node="">, forty-six minutes in, it starts going through the plot of its prequel except with narration. </span><em data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Then</span></em><span data-dcnode-id="1975" instrument_node="">, when that's over, it proceeds to drag its feet for the remainder of the runtime.
</span></li><li data-dcnode-id="1956"><span data-dcnode-id="1973" instrument_node=""> </span><em data-dcnode-id="1970"><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Foodfight" title="/pmwiki/pmwiki.php/WesternAnimation/Foodfight"><span data-dcnode-id="1972" instrument_node="">Foodfight!</span></a></em><span data-dcnode-id="1969" instrument_node=""> is already a pretty terrible movie, but the ending does a lot to drag it down even from a </span><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoBadItsGood" title="/pmwiki/pmwiki.php/Main/SoBadItsGood"><span data-dcnode-id="1968" instrument_node="">So Bad, It's Good</span></a><span data-dcnode-id="1966" instrument_node=""> perspective, due to most of it being consumed by a </span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">very</span></em><span data-dcnode-id="1963" instrument_node=""> lengthy battle scene where the characters throw food at each other. It takes up most of the film's last third, and the repetitive gags, continuous </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">splat</span></em><span data-dcnode-id="1960" instrument_node=""> sound effects and animations, and lack of advancement in general make it downright interminable. Even the majority of </span><a class="twikilink" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CausticCritic" title="/pmwiki/pmwiki.php/Main/CausticCritic"><span data-dcnode-id="1959" instrument_node="">Caustic Critic</span></a><span data-dcnode-id="1957" instrument_node=""> reviews just flat-out skip over most of the sequence because there's just so little to say about it.
</span></li></ul></div><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1952"></p><div class="folderlabel" data-dcnode-id="1950" onclick="togglefolder('folder5');"><span data-dcnode-id="1951" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Professional Wrestling&nbsp;</span></div><div class="folder" data-dcnode-id="1913" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="1949" instrument_node="">
</span><ul data-dcnode-id="1914"><li data-dcnode-id="1939"><span data-dcnode-id="1948" instrument_node=""> </span><em data-dcnode-id="1945"><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDeathOfWCW" title="/pmwiki/pmwiki.php/Literature/TheDeathOfWCW"><span data-dcnode-id="1947" instrument_node="">The Death of WCW</span></a></em><span data-dcnode-id="1944" instrument_node=""> cites this as the reason </span><em data-dcnode-id="1941"><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/WCWMondayNitro" title="/pmwiki/pmwiki.php/Wrestling/WCWMondayNitro"><span data-dcnode-id="1943" instrument_node="">WCW Monday Nitro</span></a></em><span data-dcnode-id="1940" instrument_node=""> moved from three hours to two, it simply being too long for a wrestling show that comes on every week.
</span></li><li data-dcnode-id="1922"><span data-dcnode-id="1938" instrument_node=""> While it is true matches in the US had been getting shorter over the decades, that fans had been asking for a return to form, a common criticism </span><a class="twikilink" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/RingOfHonor" title="/pmwiki/pmwiki.php/Wrestling/RingOfHonor"><span data-dcnode-id="1937" instrument_node="">Ring of Honor</span></a><span data-dcnode-id="1935" instrument_node=""> main events is that they tend to overcompensate on that front, especially during its earlier years. On Quebrada.net, for example, it was suggested the 75-minute </span><em data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Testing The Limit</span></em><span data-dcnode-id="1932" instrument_node=""> match between </span><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/BryanDanielson" title="/pmwiki/pmwiki.php/Wrestling/BryanDanielson"><span data-dcnode-id="1931" instrument_node="">Bryan Danielson</span></a><span data-dcnode-id="1929" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/AustinAries" title="/pmwiki/pmwiki.php/Wrestling/AustinAries"><span data-dcnode-id="1928" instrument_node="">Austin Aries</span></a><span data-dcnode-id="1926" instrument_node=""> should have been over at the forty-five-minute mark with Danielson crushing Aries, since the suggestion Aries could be outwrestled and punished for as long as he did and still mount a comeback was beyond their </span><a class="twikilink" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WillingSuspensionOfDisbelief" title="/pmwiki/pmwiki.php/Main/WillingSuspensionOfDisbelief"><span data-dcnode-id="1925" instrument_node="">Willing Suspension of Disbelief</span></a><span data-dcnode-id="1923" instrument_node="">, as did the suggestion it would take Danielson over thirty minutes, much less more than an hour, to reach the culmination of his game plan(even while they praised him as perhaps the greatest technical wrestler in the world).
</span></li><li data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node=""> This tends to happen when long matches tease too many finishes. The Hell In A Cell match between the Undertaker and Triple H at </span><a class="createlink" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WrestleMania" title="/pmwiki/pmwiki.php/Main/WrestleMania"><span data-dcnode-id="1920" instrument_node="">Wrestle Mania</span></a><span data-dcnode-id="1918" instrument_node=""> XXVIII was notorious for this. The last five minutes of it were made up of nothing but false finishes.
</span></li><li data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node=""> As a whole, wrestlers on the indies are warned against making their matches longer than fifteen minutes and keeping false finishes to a minimum precisely for this reason. Fans tend to be more forgiving of this trope at something like WrestleMania whereas a small indie event will just bore the crowd.
</span></li></ul></div><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1911"></p><div class="folderlabel" data-dcnode-id="1909" onclick="togglefolder('folder6');"><span data-dcnode-id="1910" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Theatre&nbsp;</span></div><div class="folder" data-dcnode-id="1660" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="1908" instrument_node="">
</span><ul data-dcnode-id="1661"><li data-dcnode-id="1853"><span data-dcnode-id="1907" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/RichardWagner" title="/pmwiki/pmwiki.php/Music/RichardWagner"><span data-dcnode-id="1906" instrument_node="">Richard Wagner</span></a><span data-dcnode-id="1904" instrument_node=""> was very, </span><em data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">very</span></em><span data-dcnode-id="1901" instrument_node=""> fond of this trope.
</span><ul data-dcnode-id="1854"><li data-dcnode-id="1890"><span data-dcnode-id="1900" instrument_node=""> </span><em data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Tristan</span></em><span data-dcnode-id="1897" instrument_node="">'s entire third act is about the tenor dying and waiting for the soprano to arrive... and waiting... and waiting... and when she arrives and he finally dies, she also sings a (quite short) 7-minute monologue before the curtain falls. If the tenor is bad — and he often is — this act will make you wish he would </span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyWontYouDie" title="/pmwiki/pmwiki.php/Main/WhyWontYouDie"><span data-dcnode-id="1896" instrument_node="">Just Die Already</span></a><span data-dcnode-id="1894" instrument_node="">. Has naturally been </span><a class="twikilink" data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Pun" title="/pmwiki/pmwiki.php/Main/Pun"><span data-dcnode-id="1893" instrument_node="">parodied to death</span></a><span data-dcnode-id="1891" instrument_node="">.
</span></li><li data-dcnode-id="1860"><span data-dcnode-id="1889" instrument_node=""> In </span><em data-dcnode-id="1886"><a class="twikilink" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/DerRingDesNibelungen" title="/pmwiki/pmwiki.php/Theatre/DerRingDesNibelungen"><span data-dcnode-id="1888" instrument_node="">Der Ring des Nibelungen</span></a></em><span data-dcnode-id="1885" instrument_node="">:
</span><ul data-dcnode-id="1861"><li data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node=""> </span><em data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Die Walküre</span></em><span data-dcnode-id="1881" instrument_node=""> has Wotan's endless farewell and the Magic Fire Music.
</span></li><li data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node=""> </span><em data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Siegfried</span></em><span data-dcnode-id="1876" instrument_node="">'s finale — let's say it begins when Siegfried finds the sleeping Brünnhilde — lasts for about 35-40 minutes. Arguably justified because Brünnhilde would only be on stage for five minutes otherwise.
</span></li><li data-dcnode-id="1870"><span data-dcnode-id="1874" instrument_node=""> </span><em data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Götterdämmerung</span></em><span data-dcnode-id="1871" instrument_node="">. Brünnhilde's Immolation is the basis of the "Fat Lady Sings" joke.
</span></li><li data-dcnode-id="1862"><span data-dcnode-id="1869" instrument_node=""> In a way they are also subversions, as the finales, especially "Wotan's Farewell and Fire Magic" and Brünhilde's Immolation scene are so good that the audience looks forward to them and they are also frequently performed on their own in concerts. While it probably is true to say that where the audience gets really restless is long scenes of expositional dialogue like in the second act of </span><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Die Walküre</span></em><span data-dcnode-id="1866" instrument_node=""> and the Norns' prologue in </span><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Götterdämmerung</span></em><span data-dcnode-id="1863" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node=""> And then, </span><em data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Die Meistersinger von Nürnberg</span></em><span data-dcnode-id="1856" instrument_node="">'s third act seems like it never ends, and at the end, it has Sachs drooling over how great German art is. At this point, singers are usually NOT in the right condition for a 10-minute monologue, after having had the longest role in opera history...
</span></li></ul></li><li data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node=""> </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Death in Venice</span></em><span data-dcnode-id="1849" instrument_node="">. The whole thing is about an aging tenor angsting over a bishounen, while nothing happens, and it ain't over till he lives. Only a great tenor can make it interesting because it's really a one-man show.
</span></li><li data-dcnode-id="1842"><span data-dcnode-id="1847" instrument_node=""> </span><em data-dcnode-id="1844"><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/Turandot" title="/pmwiki/pmwiki.php/Theatre/Turandot"><span data-dcnode-id="1846" instrument_node="">Turandot</span></a></em><span data-dcnode-id="1843" instrument_node=""> can get a bit boring after Liu's death. It's practically Calaf and Turandot making a "who can yell louder" contest for about 20 minutes. See Siegfried above. (Well, it's not Puccini's fault; poor man died and a colleague finished it.)
</span></li><li data-dcnode-id="1836"><span data-dcnode-id="1841" instrument_node=""> Puccini did pay mind to this problem with </span><em data-dcnode-id="1838"><a class="twikilink" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/MadamaButterfly" title="/pmwiki/pmwiki.php/Theatre/MadamaButterfly"><span data-dcnode-id="1840" instrument_node="">Madama Butterfly</span></a></em><span data-dcnode-id="1837" instrument_node=""> by shortening its final aria and postlude.
</span></li><li data-dcnode-id="1831"><span data-dcnode-id="1835" instrument_node=""> </span><em data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Don Carlos</span></em><span data-dcnode-id="1832" instrument_node="">'s final act. Elisabeth sings a massive aria, then an endless duet with Carlos. All while the best characters are either dead, exiled, or not present. Then thank God King Philip and the Spanish Inquisition appear and it ends very, very quickly.
</span></li><li data-dcnode-id="1825"><span data-dcnode-id="1830" instrument_node=""> </span><em data-dcnode-id="1827"><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/TheMarriageOfFigaro" title="/pmwiki/pmwiki.php/Theatre/TheMarriageOfFigaro"><span data-dcnode-id="1829" instrument_node="">The Marriage of Figaro</span></a></em><span data-dcnode-id="1826" instrument_node="">. The third act wraps up so many storylines, the fourth act can just seem unnecessary. It's when Basilio sings an aria telling an irrelevant story about when he was a younger man that the fatigue really sets in.
</span></li><li data-dcnode-id="1819"><span data-dcnode-id="1824" instrument_node=""> </span><em data-dcnode-id="1821"><a class="twikilink" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/DonGiovanni" title="/pmwiki/pmwiki.php/Theatre/DonGiovanni"><span data-dcnode-id="1823" instrument_node="">Don Giovanni</span></a></em><span data-dcnode-id="1820" instrument_node="">. A great opera, truly, but the whole thing could really have been wrapped up after the title character is dragged to Hell, with the curtain falling on Leporello's terror-stricken form. Instead we get another three arias about just desserts, and how everyone intends to get on with their lives - while the audience wishes they could. For that very reason, those extra arias were often cut in the 19th century, when people tended to be more interested in being entertained at the opera than in getting a complete work just as the composer had written it.
</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1818" instrument_node=""> The second acts of </span><a class="twikilink" data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMusical" title="/pmwiki/pmwiki.php/Main/TheMusical"><span data-dcnode-id="1817" instrument_node="">stage musicals</span></a><span data-dcnode-id="1815" instrument_node=""> overall are generally victim to this trope. It's been referred by different names and definitions. Another possibility of musical ending fatigue is that a lot of musicals' </span><a class="twikilink" data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwardBaitSong" title="/pmwiki/pmwiki.php/Main/AwardBaitSong"><span data-dcnode-id="1814" instrument_node="">signature</span></a><span data-dcnode-id="1812" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakawayPopHit" title="/pmwiki/pmwiki.php/Main/BreakawayPopHit"><span data-dcnode-id="1811" instrument_node="">songs</span></a><span data-dcnode-id="1809" instrument_node=""> are performed in the first act, leaving most audiences feeling dry as if the songwriters laid down their best cards too early. An example of this can be found in </span><em data-dcnode-id="1806"><a class="twikilink" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/AnythingGoes" title="/pmwiki/pmwiki.php/Theatre/AnythingGoes"><span data-dcnode-id="1808" instrument_node="">Anything Goes</span></a></em><span data-dcnode-id="1805" instrument_node=""> where the title song, "You're the Top" and many other famous tunes from </span><a class="twikilink" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ColePorter" title="/pmwiki/pmwiki.php/Music/ColePorter"><span data-dcnode-id="1804" instrument_node="">Cole Porter</span></a><span data-dcnode-id="1802" instrument_node="">'s catalog are performed in the first act. The second act is considered very forgettable. This slump is actually the reason that </span><a class="twikilink" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheElevenOClockNumber" title="/pmwiki/pmwiki.php/Main/TheElevenOClockNumber"><span data-dcnode-id="1801" instrument_node="">The Eleven O'Clock Number</span></a><span data-dcnode-id="1799" instrument_node=""> exists, as a way to wake the audience up and lead them into the finale. An example of this is in </span><em data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Flora, the Red Menace</span></em><span data-dcnode-id="1796" instrument_node="">, which has become widely forgotten, save for the second-to-last number, "Sing Happy" which made a star of the song's originator, Liza Minelli.
</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1794" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanSteam" title="/pmwiki/pmwiki.php/Main/OlderThanSteam"><span data-dcnode-id="1793" instrument_node="">Older Than Steam</span></a><span data-dcnode-id="1791" instrument_node="">: The fifth acts of many </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WilliamShakespeare" title="/pmwiki/pmwiki.php/Creator/WilliamShakespeare"><span data-dcnode-id="1790" instrument_node="">William Shakespeare</span></a><span data-dcnode-id="1788" instrument_node=""> plays are simply Shakespeare rushing to tie up all the loose ends and give a resolution to every character. There are several exceptions, of course, ranging from </span><em data-dcnode-id="1785"><a class="twikilink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/Macbeth" title="/pmwiki/pmwiki.php/Theatre/Macbeth"><span data-dcnode-id="1787" instrument_node="">Macbeth</span></a></em><span data-dcnode-id="1784" instrument_node=""> to </span><em data-dcnode-id="1781"><a class="twikilink" data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/KingLear" title="/pmwiki/pmwiki.php/Theatre/KingLear"><span data-dcnode-id="1783" instrument_node="">King Lear</span></a></em><span data-dcnode-id="1780" instrument_node="">. However, the worst offender has to be </span><em data-dcnode-id="1777"><a class="twikilink" data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/AntonyAndCleopatra" title="/pmwiki/pmwiki.php/Theatre/AntonyAndCleopatra"><span data-dcnode-id="1779" instrument_node="">Antony and Cleopatra</span></a></em><span data-dcnode-id="1776" instrument_node="">, where there are at least half a dozen points where Shakespeare could have ended the story, if he wasn't so obsessed with </span><a class="twikilink" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillEmAll" title="/pmwiki/pmwiki.php/Main/KillEmAll"><span data-dcnode-id="1775" instrument_node="">killing every minor and major character</span></a><span data-dcnode-id="1773" instrument_node=""> save Octavian and his entourage. The </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">final</span></em><span data-dcnode-id="1770" instrument_node=""> ending of the play, when Cleopatra commits suicide, is suitably awesome, however.
</span><ul data-dcnode-id="1763"><li data-dcnode-id="1764"><span data-dcnode-id="1769" instrument_node=""> </span><em data-dcnode-id="1766"><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/AMidsummerNightsDream" title="/pmwiki/pmwiki.php/Theatre/AMidsummerNightsDream"><span data-dcnode-id="1768" instrument_node="">A Midsummer Night's Dream</span></a></em><span data-dcnode-id="1765" instrument_node=""> is particularly bad about this with three to four endings depending on what you consider a satisfying end. You have Oberon setting things right for the lovers and removing the enchantments on Titania and Bottom. Followed by the lovers sorting things out with Theseus and Egeus. Then comes the mechanicals' play. And then the actual ending.
</span></li></ul></li><li data-dcnode-id="1756"><span data-dcnode-id="1761" instrument_node=""> </span><em data-dcnode-id="1758"><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/JosephAndTheAmazingTechnicolorDreamcoat" title="/pmwiki/pmwiki.php/Theatre/JosephAndTheAmazingTechnicolorDreamcoat"><span data-dcnode-id="1760" instrument_node="">Joseph and the Amazing Technicolor Dreamcoat</span></a></em><span data-dcnode-id="1757" instrument_node=""> ends with Joseph reunited with his father, singing the show's signature song, and putting on the miraculously-restored titular garment again after all these years. Then the cast performs another ten or fifteen minutes' worth of reprises of the show's major numbers (some of which had multiple encores the first time). About half of productions are merciful and dispense with the reprises.
</span></li><li data-dcnode-id="1747"><span data-dcnode-id="1755" instrument_node=""> </span><em data-dcnode-id="1752"><a class="twikilink" data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/PaintYourWagon" title="/pmwiki/pmwiki.php/Theatre/PaintYourWagon"><span data-dcnode-id="1754" instrument_node="">Paint Your Wagon</span></a></em><span data-dcnode-id="1751" instrument_node="">: The big ensemble reprise of "Wand'rin' Star" sounds like a finale, but the show drags on for one more scene whose only highlight is the </span><a class="twikilink" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigDamnReunion" title="/pmwiki/pmwiki.php/Main/BigDamnReunion"><span data-dcnode-id="1750" instrument_node="">Big Damn Reunion</span></a><span data-dcnode-id="1748" instrument_node=""> of the principal couple.
</span></li><li data-dcnode-id="1726"><span data-dcnode-id="1746" instrument_node=""> </span><em data-dcnode-id="1743"><a class="twikilink" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/LoveNeverDies" title="/pmwiki/pmwiki.php/Theatre/LoveNeverDies"><span data-dcnode-id="1745" instrument_node="">Love Never Dies</span></a></em><span data-dcnode-id="1742" instrument_node="">: Christine once again making her choice between lovers would seem to ensure a quick wrap-up, as the loser graciously decides </span><a class="twikilink" data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantMyBelovedToBeHappy" title="/pmwiki/pmwiki.php/Main/IWantMyBelovedToBeHappy"><span data-dcnode-id="1741" instrument_node="">I Want My Beloved to Be Happy</span></a><span data-dcnode-id="1739" instrument_node=""> — but then we find out her son has been kidnapped. The final scene on the pier, which is over </span><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">fourteen minutes long</span></em><span data-dcnode-id="1736" instrument_node="">, starts with a lengthy explanation of the villain's motivations, after which </span><span class="spoiler" data-dcnode-id="1728" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1735" instrument_node=""> Christine is fatally shot. She manages to reveal Gustave's parentage to the boy, and bid her farewell to him, </span><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">and</span></em><span data-dcnode-id="1732" instrument_node=""> then share a final moment with the Phantom. </span><em data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Then</span></em><span data-dcnode-id="1729" instrument_node=""> Gustave accepts him as his father, they go off together,</span></span><span data-dcnode-id="1727" instrument_node=""> and the show ends.
</span></li><li data-dcnode-id="1711"><span data-dcnode-id="1725" instrument_node=""> </span><em data-dcnode-id="1722"><a class="twikilink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/MichaelJacksonONE" title="/pmwiki/pmwiki.php/Theatre/MichaelJacksonONE"><span data-dcnode-id="1724" instrument_node="">Michael Jackson ONE</span></a></em><span data-dcnode-id="1721" instrument_node=""> has a bad case of this — one would expect "Man in the Mirror" to end the show, given that it features </span><span class="spoiler" data-dcnode-id="1719" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1720" instrument_node=""> a Jackson hologram</span></span><span data-dcnode-id="1718" instrument_node=""> amongst the dancers, but after that, the audience has to sit through most of "Can You Feel It" (which is mostly a video viewing), then a condensed version of the Macaulay Culkin </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkyBookends" title="/pmwiki/pmwiki.php/Main/TalkyBookends"><span data-dcnode-id="1717" instrument_node="">Talky Bookends</span></a><span data-dcnode-id="1715" instrument_node=""> bit from "Black or White", </span><em data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">then</span></em><span data-dcnode-id="1712" instrument_node=""> the cast reassembling for the song itself, which just becomes the curtain call after a few minutes.
</span></li><li data-dcnode-id="1705"><span data-dcnode-id="1710" instrument_node=""> </span><em data-dcnode-id="1707"><a class="twikilink" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/IntoTheWoods" title="/pmwiki/pmwiki.php/Theatre/IntoTheWoods"><span data-dcnode-id="1709" instrument_node="">Into the Woods</span></a></em><span data-dcnode-id="1706" instrument_node=""> is an interesting case of this. The entire recounting of the traditional fairy tales wraps up with the Act 1 Finale 'Ever After'. However, there's another HALF of the show left. This has led to many cases of people mistakenly leaving at the interval.
</span></li><li data-dcnode-id="1662"><span data-dcnode-id="1704" instrument_node=""> </span><em data-dcnode-id="1701"><a class="twikilink" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/CharlieAndTheChocolateFactory" title="/pmwiki/pmwiki.php/Theatre/CharlieAndTheChocolateFactory"><span data-dcnode-id="1703" instrument_node="">Charlie and the Chocolate Factory</span></a></em><span data-dcnode-id="1700" instrument_node=""> downplayed this trope in the original West End staging, then averted it on Broadway.
