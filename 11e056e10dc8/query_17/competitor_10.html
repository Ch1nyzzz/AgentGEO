</span><ul data-dcnode-id="1663"><li data-dcnode-id="1692"><span data-dcnode-id="1699" instrument_node=""> In the West End version, after Charlie and Willy Wonka return to the factory gates after their flight in the Great Glass Elevator and "Pure Imagination", there's a </span><a class="twikilink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoProudOfYou" title="/pmwiki/pmwiki.php/Main/SoProudOfYou"><span data-dcnode-id="1698" instrument_node="">So Proud of You</span></a><span data-dcnode-id="1696" instrument_node=""> celebration for the boy with "A Little Me" as the rest of the Bucket family joins them and the Oompa-Loompas. </span><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Then</span></em><span data-dcnode-id="1693" instrument_node=""> there's a short final dialogue followed by a reprise of "It Must Be Believed to Be Seen" that springs some last-minute surprises, but that takes less than three minutes, thus downplaying the trope.
</span></li><li data-dcnode-id="1664"><span data-dcnode-id="1691" instrument_node=""> The Broadway version replaced "Pure Imagination" with "The View from Here", followed by a reprise of "Strike That! Reverse It!" that brought back </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">all</span></em><span data-dcnode-id="1688" instrument_node=""> the major characters including the restored Four Bratty Kids, then a variation on the West End version's final dialogue. But when this didn't play well in previews, the </span><a class="twikilink" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TriumphantReprise" title="/pmwiki/pmwiki.php/Main/TriumphantReprise"><span data-dcnode-id="1687" instrument_node="">Triumphant Reprise</span></a><span data-dcnode-id="1685" instrument_node=""> was completely cut, and "The View from Here" was followed by a short dialogue exchange between Willy Wonka and Charlie before the </span><a class="twikilink" data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoorClosesEnding" title="/pmwiki/pmwiki.php/Main/DoorClosesEnding"><span data-dcnode-id="1684" instrument_node="">Door-Closes Ending</span></a><span data-dcnode-id="1682" instrument_node="">, averting the trope. However, this makes the show's ending both low-key, as "The View from Here" is a sentimental ballad and no other characters appear afterward, </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">and</span></em><span data-dcnode-id="1679" instrument_node=""> substantially darker because now </span><span class="spoiler" data-dcnode-id="1675" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1678" instrument_node=""> all the brats aside from the now-shrunken Mike may be </span><a class="twikilink" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathByAdaptation" title="/pmwiki/pmwiki.php/Main/DeathByAdaptation"><span data-dcnode-id="1677" instrument_node="">dead</span></a></span><span data-dcnode-id="1674" instrument_node="">. This ended up backfiring, with the ending derided as an </span><a class="twikilink" data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EsotericHappyEnding" title="/pmwiki/pmwiki.php/Main/EsotericHappyEnding"><span data-dcnode-id="1673" instrument_node="">Esoteric Happy Ending</span></a><span data-dcnode-id="1671" instrument_node="">, as yet another example of Wonka being </span><a class="twikilink" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnintentionallyUnsympathetic" title="/pmwiki/pmwiki.php/Main/UnintentionallyUnsympathetic"><span data-dcnode-id="1670" instrument_node="">Unintentionally Unsympathetic</span></a><span data-dcnode-id="1668" instrument_node=""> on Broadway, and </span><a class="twikilink" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Irony" title="/pmwiki/pmwiki.php/Main/Irony"><span data-dcnode-id="1667" instrument_node="">being too short</span></a><span data-dcnode-id="1665" instrument_node="">.
</span></li></ul></li></ul></div><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1658"></p><div class="folderlabel" data-dcnode-id="1656" onclick="togglefolder('folder7');"><span data-dcnode-id="1657" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Toys&nbsp;</span></div><div class="folder" data-dcnode-id="1622" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="1655" instrument_node="">
</span><ul data-dcnode-id="1623"><li data-dcnode-id="1624"><span data-dcnode-id="1654" instrument_node=""> A number of fans have expressed such complaints regarding </span><em data-dcnode-id="1651"><a class="twikilink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Toys/Bionicle" title="/pmwiki/pmwiki.php/Toys/Bionicle"><span data-dcnode-id="1653" instrument_node="">BIONICLE</span></a></em><span data-dcnode-id="1650" instrument_node="">, though in this case, the trope is largely justified, as the writer, Greg Farshtey did intend to continue telling the story. But thing is, the main story was pretty much wrapped up mid-2010, the </span><a class="twikilink" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1649" instrument_node="">Big Bad</span></a><span data-dcnode-id="1647" instrument_node=""> killed, the planet restored, a new civilization has been formed, </span><a class="twikilink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHero" title="/pmwiki/pmwiki.php/Main/TheHero"><span data-dcnode-id="1646" instrument_node="">The Hero</span></a><span data-dcnode-id="1644" instrument_node=""> delivered his final enlightening speech... as for the side stories, those hadn't been tied up yet back then. However since the new story serials tried to tell completely new stories instead of attempting to give closure to the ongoing plots, some would rather see the whole thing end, fearing all the story threads would just degrade into a similar </span><a class="twikilink" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KudzuPlot" title="/pmwiki/pmwiki.php/Main/KudzuPlot"><span data-dcnode-id="1643" instrument_node="">mess</span></a><span data-dcnode-id="1641" instrument_node=""> that some previous serials have become, especially since the writer is going through a horrendous </span><a class="twikilink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScheduleSlip" title="/pmwiki/pmwiki.php/Main/ScheduleSlip"><span data-dcnode-id="1640" instrument_node="">Schedule Slip</span></a><span data-dcnode-id="1638" instrument_node="">. The main story's famous closing lines ironically foretold the situation:
</span><div class="indent" data-dcnode-id="1625"><span data-dcnode-id="1637" instrument_node=""> </span><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">"NEVER... THE END"</span></strong><span class="notelabel" data-dcnode-id="1632" onclick="togglenote('note0nvk7');" style="cursor: pointer;"><sup data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1627" id="note0nvk7" isnote="true" onclick="togglenote('note0nvk7');" style="display: none; cursor: pointer;"><span data-dcnode-id="1631" instrument_node="">At least as long as uncle </span><a class="twikilink" data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/LEGO" title="/pmwiki/pmwiki.php/Franchise/LEGO"><span data-dcnode-id="1630" instrument_node="">LEGO</span></a><span data-dcnode-id="1628" instrument_node=""> allows Greg to continue playing in this world of his.</span></span><span data-dcnode-id="1626" instrument_node="">
</span></div></li></ul></div><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1620"></p><div class="folderlabel" data-dcnode-id="1618" onclick="togglefolder('folder8');"><span data-dcnode-id="1619" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Visual Novels&nbsp;</span></div><div class="folder" data-dcnode-id="1458" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="1617" instrument_node="">
</span><ul data-dcnode-id="1459"><li data-dcnode-id="1547"><span data-dcnode-id="1616" instrument_node=""> </span><em data-dcnode-id="1613"><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/AceAttorney" title="/pmwiki/pmwiki.php/Franchise/AceAttorney"><span data-dcnode-id="1615" instrument_node="">Ace Attorney</span></a></em><span data-dcnode-id="1612" instrument_node="">:
</span><ul data-dcnode-id="1548"><li data-dcnode-id="1604"><span data-dcnode-id="1611" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvokedTrope" title="/pmwiki/pmwiki.php/Main/InvokedTrope"><span data-dcnode-id="1610" instrument_node="">Invoked</span></a><span data-dcnode-id="1608" instrument_node=""> in case 4 of </span><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Justice for All</span></em><span data-dcnode-id="1605" instrument_node=""> (2-4), due to an in-game crisis causing Phoenix to deliberately stall for time.
</span></li><li data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node=""> Case 5 of </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Trials and Tribulations</span></em><span data-dcnode-id="1600" instrument_node=""> (3-5). It feels like you finally got the murderer captured and have the proof, but then Godot and Phoenix drag it out by an hour or so.
</span></li><li data-dcnode-id="1594"><span data-dcnode-id="1598" instrument_node=""> The first game's </span><a class="twikilink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpdatedRerelease" title="/pmwiki/pmwiki.php/Main/UpdatedRerelease"><span data-dcnode-id="1597" instrument_node="">DS-exclusive</span></a><span data-dcnode-id="1595" instrument_node=""> fifth case suffers from this. You know pretty much who the murderer is, but because of some dumb case-exclusive restrictive leash put onto you, you cannot proceed and have to use a loophole to nail him into a potential confession. Had that leash not been there, the case would've been much shorter. And if your client wasn't withholding important evidence from you... again.
</span></li><li data-dcnode-id="1564"><span data-dcnode-id="1593" instrument_node=""> Revealing the identity of the villain in the final episode of </span><em data-dcnode-id="1590"><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/AceAttorneyInvestigationsMilesEdgeworth" title="/pmwiki/pmwiki.php/VisualNovel/AceAttorneyInvestigationsMilesEdgeworth"><span data-dcnode-id="1592" instrument_node="">Ace Attorney Investigations: Miles Edgeworth</span></a></em><span data-dcnode-id="1589" instrument_node=""> is a relatively simple task. Actually getting said villain </span><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">arrested</span></em><span data-dcnode-id="1586" instrument_node=""> is </span><a class="twikilink" data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiplomaticImpunity" title="/pmwiki/pmwiki.php/Main/DiplomaticImpunity"><span data-dcnode-id="1585" instrument_node="">a different</span></a><span data-dcnode-id="1583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveConnections" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveConnections"><span data-dcnode-id="1582" instrument_node="">story</span></a><span data-dcnode-id="1580" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarathonBoss" title="/pmwiki/pmwiki.php/Main/MarathonBoss"><span data-dcnode-id="1579" instrument_node="">entirely</span></a><span data-dcnode-id="1577" instrument_node="">. The fact that the dramatic tension of the </span><a class="twikilink" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousBreakdown" title="/pmwiki/pmwiki.php/Main/VillainousBreakdown"><span data-dcnode-id="1576" instrument_node="">Villainous Breakdown</span></a><span data-dcnode-id="1574" instrument_node=""> pales in comparison to both </span><a class="twikilink" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReveal" title="/pmwiki/pmwiki.php/Main/TheReveal"><span data-dcnode-id="1573" instrument_node="">The Reveal</span></a><span data-dcnode-id="1571" instrument_node=""> and the accomplice's earlier breakdown really doesn't help matters. </span><a class="twikilink" data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Hiimdaisy" title="/pmwiki/pmwiki.php/Webcomic/Hiimdaisy"><span data-dcnode-id="1570" instrument_node="">Hiimdaisy</span></a><span data-dcnode-id="1568" instrument_node=""> parodied it with the villain bragging about how </span><span class="spoiler" data-dcnode-id="1566" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1567" instrument_node="">his extraterritorial rights</span></span><span data-dcnode-id="1565" instrument_node=""> are too powerful to let the game end.
</span></li><li data-dcnode-id="1549"><span data-dcnode-id="1563" instrument_node=""> The final trial of </span><em data-dcnode-id="1560"><a class="twikilink" data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ProfessorLaytonVsPhoenixWrightAceAttorney" title="/pmwiki/pmwiki.php/VideoGame/ProfessorLaytonVsPhoenixWrightAceAttorney"><span data-dcnode-id="1562" instrument_node="">Professor Layton vs. Phoenix Wright: Ace Attorney</span></a></em><span data-dcnode-id="1559" instrument_node=""> spans three whole chapters </span><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">each</span></em><span data-dcnode-id="1556" instrument_node=""> for the investigation and trial, when the entire rest of the game (minus the tutorial) takes four chapters </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">total</span></em><span data-dcnode-id="1553" instrument_node="">. Most of the three trial chapters are filled with very long </span><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InfoDump" title="/pmwiki/pmwiki.php/Main/InfoDump"><span data-dcnode-id="1552" instrument_node="">Info Dumps</span></a><span data-dcnode-id="1550" instrument_node=""> about how the entire plot fits together, with few puzzles or testimonies to break it up. The actual ending itself is quite long, too, making the game feel like it's in no hurry to get itself over with.
</span></li></ul></li><li data-dcnode-id="1481"><span data-dcnode-id="1546" instrument_node=""> </span><em data-dcnode-id="1543"><a class="twikilink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Danganronpa" title="/pmwiki/pmwiki.php/Franchise/Danganronpa"><span data-dcnode-id="1545" instrument_node="">Danganronpa</span></a></em><span data-dcnode-id="1542" instrument_node="">:
</span><ul data-dcnode-id="1482"><li data-dcnode-id="1528"><span data-dcnode-id="1541" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DanganronpaTriggerHappyHavoc" title="/pmwiki/pmwiki.php/VisualNovel/DanganronpaTriggerHappyHavoc"><span data-dcnode-id="1540" instrument_node="">first game's</span></a><span data-dcnode-id="1538" instrument_node=""> final Class Trial. All of the school's mysteries need to be revealed and only </span><em data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">then</span></em><span data-dcnode-id="1535" instrument_node=""> will the mastermind show their face. And then it comes to breaking the mastermind down. This section of the game can take a good two hours or more to finish, at which point, the player is sick and tired of talking to the mastermind, who is shrugging everything off </span><span class="notelabel" data-dcnode-id="1532" onclick="togglenote('note1hktg');" style="cursor: pointer;"><sup data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1530" id="note1hktg" isnote="true" onclick="togglenote('note1hktg');" style="display: none; cursor: pointer;"><span data-dcnode-id="1531" instrument_node="">at least, until the protagonist Naegi has mentioned the concept of hope often enough</span></span><span data-dcnode-id="1529" instrument_node=""> and unnecessarily prolonging the trial. The epilogue after the trial itself is, comparatively, much shorter and concise.
</span></li><li data-dcnode-id="1510"><span data-dcnode-id="1527" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GaidenGame" title="/pmwiki/pmwiki.php/Main/GaidenGame"><span data-dcnode-id="1526" instrument_node="">Gaiden Game</span></a><span data-dcnode-id="1524" instrument_node=""> </span><em data-dcnode-id="1521"><a class="twikilink" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DanganronpaAnotherEpisodeUltraDespairGirls" title="/pmwiki/pmwiki.php/VideoGame/DanganronpaAnotherEpisodeUltraDespairGirls"><span data-dcnode-id="1523" instrument_node="">Danganronpa Another Episode: Ultra Despair Girls</span></a></em><span data-dcnode-id="1520" instrument_node=""> is even worse, as, after </span><a class="twikilink" data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscOneFinalBoss" title="/pmwiki/pmwiki.php/Main/DiscOneFinalBoss"><span data-dcnode-id="1519" instrument_node="">what appears to be the Final Boss</span></a><span data-dcnode-id="1517" instrument_node="">, there's a forty-five-minute long cutscene heavily featuring </span><a class="twikilink" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HateSink" title="/pmwiki/pmwiki.php/Main/HateSink"><span data-dcnode-id="1516" instrument_node="">Hate Sink</span></a><span data-dcnode-id="1514" instrument_node=""> villain going into great detail about her evil plan during which you must refuse to break the controller for the Monokumas five times before fighting the true </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBoss" title="/pmwiki/pmwiki.php/Main/FinalBoss"><span data-dcnode-id="1513" instrument_node="">Final Boss</span></a><span data-dcnode-id="1511" instrument_node="">.
</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1509" instrument_node=""> </span><em data-dcnode-id="1506"><a class="twikilink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DanganronpaV3KillingHarmony" title="/pmwiki/pmwiki.php/VisualNovel/DanganronpaV3KillingHarmony"><span data-dcnode-id="1508" instrument_node="">Danganronpa V3: Killing Harmony</span></a></em><span data-dcnode-id="1505" instrument_node="">'s last class trial also suffers from this. Among </span><a class="twikilink" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBase" title="/pmwiki/pmwiki.php/Main/BrokenBase"><span data-dcnode-id="1504" instrument_node="">other problems that people have with it</span></a><span data-dcnode-id="1502" instrument_node="">, the trial keeps dragging </span><em data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">on</span></em><span data-dcnode-id="1499" instrument_node=""> and </span><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">on</span></strong><span data-dcnode-id="1496" instrument_node=""> even after the </span><a class="twikilink" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1495" instrument_node="">Big Bad</span></a><span data-dcnode-id="1493" instrument_node=""> is exposed. The whole thing (including the epilogue) lasts roughly </span><em data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">four hours</span></em><span data-dcnode-id="1490" instrument_node="">, the longest of </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">ANY</span></strong><span data-dcnode-id="1487" instrument_node=""> Danganronpa game. And when the gameplay finally turns up, you are mostly restricted to using only one Truth Bullet, to say nothing of the segments where you have to lose the minigames on purpose to progress. After that, </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent" title="/pmwiki/pmwiki.php/Main/AndNowForSomeoneCompletelyDifferent"><span data-dcnode-id="1486" instrument_node="">you get to play as every survivor</span></a><span data-dcnode-id="1484" instrument_node=""> (which is a nice add-on feature, but it quickly wears out its welcome when they don't control any different than the main character).
</span></li></ul></li><li data-dcnode-id="1475"><span data-dcnode-id="1480" instrument_node=""> </span><em data-dcnode-id="1477"><a class="twikilink" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/LuxPain" title="/pmwiki/pmwiki.php/VisualNovel/LuxPain"><span data-dcnode-id="1479" instrument_node="">Lux-Pain</span></a></em><span data-dcnode-id="1476" instrument_node=""> is a visual novel-type game, with about 21 episodes which take about an hour each to complete. This can cause the game to feel eerily like a book.
</span></li><li data-dcnode-id="1466"><span data-dcnode-id="1474" instrument_node=""> The first few endings of </span><em data-dcnode-id="1471"><a class="twikilink" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/NineHoursNinePersonsNineDoors" title="/pmwiki/pmwiki.php/VisualNovel/NineHoursNinePersonsNineDoors"><span data-dcnode-id="1473" instrument_node="">Nine Hours, Nine Persons, Nine Doors</span></a></em><span data-dcnode-id="1470" instrument_node=""> are short; then there's a long one (the Safe Ending) that explains a lot but ends badly. At this point, if you're familiar with visual novels, you're probably expecting one last ending — a variation on the Safe Ending with little changes that make it turn out better. You're right about the little changes, but the final ending is also </span><em data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">hours</span></em><span data-dcnode-id="1467" instrument_node=""> longer and includes another two puzzle rooms. It's a long slog, but worth it for the revelations at the end.
</span></li><li data-dcnode-id="1460"><span data-dcnode-id="1465" instrument_node=""> </span><em data-dcnode-id="1462"><a class="twikilink" data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/UminekoWhenTheyCry" title="/pmwiki/pmwiki.php/VisualNovel/UminekoWhenTheyCry"><span data-dcnode-id="1464" instrument_node="">Umineko: When They Cry</span></a></em><span data-dcnode-id="1461" instrument_node=""> can fall into the trope on occasion, mostly because of the fact that every single episode has 2 epilogues after the conclusion of the main story, and the epilogues can go for a couple of hours sometimes. Even the characters, dangling in post-denouement, express how ready they are to just get it over with. Even Beatrice gets sick of being "Endless". If boredom is fatal to witches, imagine what it'll do to audiences.
</span></li></ul></div><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1456"></p><div class="folderlabel" data-dcnode-id="1454" onclick="togglefolder('folder9');"><span data-dcnode-id="1455" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Animation&nbsp;</span></div><div class="folder" data-dcnode-id="1445" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="1453" instrument_node="">
</span><ul data-dcnode-id="1446"><li data-dcnode-id="1447"><span data-dcnode-id="1452" instrument_node=""> After the heroes defeat the villain in </span><em data-dcnode-id="1449"><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/DusksDawn" title="/pmwiki/pmwiki.php/WebAnimation/DusksDawn"><span data-dcnode-id="1451" instrument_node="">Dusk's Dawn</span></a></em><span data-dcnode-id="1448" instrument_node="">, we are treated to... Donut walking through a corridor for an extended period of time talking to himself about how bored he is.
</span></li></ul></div><span data-dcnode-id="1444" instrument_node="">

</span><ul data-dcnode-id="1379"><li data-dcnode-id="1427"><span data-dcnode-id="1439" instrument_node=""> </span><em data-dcnode-id="1436"><a class="twikilink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ProblemSleuth" title="/pmwiki/pmwiki.php/Webcomic/ProblemSleuth"><span data-dcnode-id="1438" instrument_node="">Problem Sleuth</span></a></em><span data-dcnode-id="1435" instrument_node="">'s final battle takes up as many pages as the </span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">entire rest of the comic</span></em><span data-dcnode-id="1432" instrument_node="">. Lampshaded with the command </span><a class="urllink" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mspaintadventures.com/%3Fs%3D4%26p%3D001743"><span data-dcnode-id="1431" instrument_node="">MSPA Readers: React to update.</span><img data-dcnode-id="1430" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1428" instrument_node="">
</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1426" instrument_node=""> </span><em data-dcnode-id="1423"><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SluggyFreelance" title="/pmwiki/pmwiki.php/Webcomic/SluggyFreelance"><span data-dcnode-id="1425" instrument_node="">Sluggy Freelance</span></a></em><span data-dcnode-id="1422" instrument_node="">'s 4U City arc. Started in the middle of 2009 and reached its climax in April 2011.

</span></li></ul></li><li data-dcnode-id="1389"><span data-dcnode-id="1411" instrument_node=""> Late in </span><em data-dcnode-id="1408"><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AoiHouse" title="/pmwiki/pmwiki.php/Manga/AoiHouse"><span data-dcnode-id="1410" instrument_node="">Aoi House</span></a></em><span data-dcnode-id="1407" instrument_node="">, the story transforms into little more than disjointed scenes with minimal context. This manages to create the whole "Just end already!" feeling while simultaneously getting a kind of "What the hell is going on now?" It doesn't so much </span><em data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">end</span></em><span data-dcnode-id="1404" instrument_node="">, it just ceases to produce any more scenes.
</span><ul data-dcnode-id="1390"><li data-dcnode-id="1391"><span data-dcnode-id="1403" instrument_node=""> This would happen again in </span><em data-dcnode-id="1400"><a class="twikilink" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ParanormalMysterySquad" title="/pmwiki/pmwiki.php/Webcomic/ParanormalMysterySquad"><span data-dcnode-id="1402" instrument_node="">Paranormal Mystery Squad</span></a></em><span data-dcnode-id="1399" instrument_node=""> and </span><em data-dcnode-id="1396"><a class="twikilink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/VampireCheerleaders" title="/pmwiki/pmwiki.php/Webcomic/VampireCheerleaders"><span data-dcnode-id="1398" instrument_node="">Vampire Cheerleaders</span></a></em><span data-dcnode-id="1395" instrument_node=""> which are in the </span><a class="twikilink" data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharedUniverse" title="/pmwiki/pmwiki.php/Main/SharedUniverse"><span data-dcnode-id="1394" instrument_node="">Shared Universe</span></a><span data-dcnode-id="1392" instrument_node=""> of Aoi House, finally ending in a rather lackluster fashion.
</span></li></ul></li><li data-dcnode-id="1380"><span data-dcnode-id="1388" instrument_node=""> The main fight in </span><em data-dcnode-id="1385"><a class="twikilink" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SugarBits" title="/pmwiki/pmwiki.php/Webcomic/SugarBits"><span data-dcnode-id="1387" instrument_node="">Sugar Bits</span></a></em><span data-dcnode-id="1384" instrument_node=""> takes virtually half the comic to get through and took </span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">four years</span></em><span data-dcnode-id="1381" instrument_node=""> to finally reach its conclusion and move on with the story.

</span><ul data-dcnode-id="1311"><li data-dcnode-id="1330"><span data-dcnode-id="1345" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebVideo/TheNostalgiaChick" title="/pmwiki/pmwiki.php/WebVideo/TheNostalgiaChick"><span data-dcnode-id="1344" instrument_node="">The Nostalgia Chick</span></a><span data-dcnode-id="1342" instrument_node=""> parodies this in her reviews of </span><em data-dcnode-id="1339"><a class="twikilink" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheLordOfTheRings" title="/pmwiki/pmwiki.php/Film/TheLordOfTheRings"><span data-dcnode-id="1341" instrument_node="">The Lord of the Rings</span></a></em><span data-dcnode-id="1338" instrument_node=""> trilogy. During </span><em data-dcnode-id="1335"><a class="twikilink" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheLordOfTheRingsTheReturnOfTheKing" title="/pmwiki/pmwiki.php/Film/TheLordOfTheRingsTheReturnOfTheKing"><span data-dcnode-id="1337" instrument_node="">The Return of the King</span></a></em><span data-dcnode-id="1334" instrument_node=""> review, the video fades to black multiple times only to resume. When it's actually over, </span><a class="twikilink" data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStinger" title="/pmwiki/pmwiki.php/Main/TheStinger"><span data-dcnode-id="1333" instrument_node="">The Stinger</span></a><span data-dcnode-id="1331" instrument_node=""> has her assuring the viewer that she is done this time.
</span></li><li data-dcnode-id="1321"><span data-dcnode-id="1329" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebVideo/HonestTrailers" title="/pmwiki/pmwiki.php/WebVideo/HonestTrailers"><span data-dcnode-id="1328" instrument_node="">Honest Trailers</span></a><span data-dcnode-id="1326" instrument_node=""> also parodied it. Their trilogy trailer for </span><em data-dcnode-id="1323"><a class="twikilink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheLordOfTheRings" title="/pmwiki/pmwiki.php/Film/TheLordOfTheRings"><span data-dcnode-id="1325" instrument_node="">The Lord of the Rings</span></a></em><span data-dcnode-id="1322" instrument_node=""> ends three times.
</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1320" instrument_node=""> spoofed in </span><em data-dcnode-id="1317"><a class="twikilink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebVideo/TheHorriblySlowMurdererWithTheExtremelyInefficientWeapon" title="/pmwiki/pmwiki.php/WebVideo/TheHorriblySlowMurdererWithTheExtremelyInefficientWeapon"><span data-dcnode-id="1319" instrument_node="">The Horribly Slow Murderer with the Extremely Inefficient Weapon</span></a></em><span data-dcnode-id="1316" instrument_node=""> which takes </span><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">9 hours</span></em><span data-dcnode-id="1313" instrument_node="">

</span><ul data-dcnode-id="1273"><li data-dcnode-id="1299"><span data-dcnode-id="1304" instrument_node=""> </span><em data-dcnode-id="1301"><a class="twikilink" data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TomAndJerry" title="/pmwiki/pmwiki.php/WesternAnimation/TomAndJerry"><span data-dcnode-id="1303" instrument_node="">Tom and Jerry</span></a></em><span data-dcnode-id="1300" instrument_node="">: Jerry uses literal ending fatigue against Tom in "The Cat Concerto", by repeatedly restarting the frantic finale of "Hungarian Rhapsody No. 2" and forcing him to play it out each time rather than let the audience know he's being played, until he finally finishes and just collapses on the piano on the brink of unconsciousness.
</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1298" instrument_node=""> A </span><em data-dcnode-id="1295"><a class="twikilink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/FamilyGuy" title="/pmwiki/pmwiki.php/WesternAnimation/FamilyGuy"><span data-dcnode-id="1297" instrument_node="">Family Guy</span></a></em><span data-dcnode-id="1294" instrument_node=""> spoof of the theme song to the TV series </span><em data-dcnode-id="1291"><a class="twikilink" data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Maude" title="/pmwiki/pmwiki.php/Series/Maude"><span data-dcnode-id="1293" instrument_node="">Maude</span></a></em><span data-dcnode-id="1290" instrument_node=""> drags out its </span><em data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">opening</span></em><span data-dcnode-id="1287" instrument_node=""> by adding more and more verses about famous women. Peter keeps expecting it to get to the "And then there's Maude" part, but it goes on and on — and the verses get lyrically lazier each time: "Amelia Earhart flew a whole bunch of airplanes/'Cept for that one time when she didn't come back". When it </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">finally</span></em><span data-dcnode-id="1284" instrument_node=""> progresses, he's nearly incoherent with frustration.
</span></li><li data-dcnode-id="1274"><span data-dcnode-id="1282" instrument_node=""> The episode of </span><em data-dcnode-id="1279"><a class="twikilink" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons" title="/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons"><span data-dcnode-id="1281" instrument_node="">The Simpsons</span></a></em><span data-dcnode-id="1278" instrument_node=""> "The Kids Are All Fight" has an </span><a class="twikilink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="1277" instrument_node="">In-Universe</span></a><span data-dcnode-id="1275" instrument_node=""> example. After Homer tells the story of how Bart and Lisa used to fight, he continues to tell related stories, until eventually Bart tells him to be quiet, with Lisa adding that he's had three natural endings already.
</span></li></ul></div><span data-dcnode-id="1271" instrument_node="">
