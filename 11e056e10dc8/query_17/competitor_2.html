</span><br data-dcnode-id="10755"><span data-dcnode-id="10754" instrument_node="">
</span><br data-dcnode-id="10753"><span data-dcnode-id="10752" instrument_node="">

"Yeah."</span><br data-dcnode-id="10743"><span data-dcnode-id="10742" instrument_node="">
[Yes, I'll text you.]]</span><br data-dcnode-id="10741"><span data-dcnode-id="10740" instrument_node="">

"It's too early in the morning."</span><br data-dcnode-id="10735"><span data-dcnode-id="10734" instrument_node="">
It bothered me to wake him up, which hasn't even happened yet.</span><br data-dcnode-id="10733"><span data-dcnode-id="10732" instrument_node="">
He sniffed loosely because he was speechless.</span><br data-dcnode-id="10731"><span data-dcnode-id="10730" instrument_node="">
It was funny that he was being polite even though he was determined to argue.</span><br data-dcnode-id="10729"><span data-dcnode-id="10728" instrument_node="">
</span><br data-dcnode-id="10727"><span data-dcnode-id="10726" instrument_node="">

[I'm Cha Woo Hyun]</span><br data-dcnode-id="10717"><span data-dcnode-id="10716" instrument_node="">
Woohyun answered the phone right away. Sarah swallowed her dry saliva secretly and opened her mouth.</span><br data-dcnode-id="10715"><span data-dcnode-id="10714" instrument_node="">

[Yes.]</span><br data-dcnode-id="10711"><span data-dcnode-id="10710" instrument_node="">
The answers from the other side were dull. I thought I couldn't talk about anything serious or argue over the phone.</span><br data-dcnode-id="10709"><span data-dcnode-id="10708" instrument_node="">
"Let's meet."</span><br data-dcnode-id="10707"><span data-dcnode-id="10706" instrument_node="">
She asked me to meet her blindly. The back and forth story had to be told face to face.</span><br data-dcnode-id="10705"><span data-dcnode-id="10704" instrument_node="">
Will you be able to meet me?]</span><br data-dcnode-id="10703"><span data-dcnode-id="10702" instrument_node="">
"We should meet, no matter what."</span><br data-dcnode-id="10701"><span data-dcnode-id="10700" instrument_node="">
[Okay, where should I go?]]</span><br data-dcnode-id="10699"><span data-dcnode-id="10698" instrument_node="">
The other party willingly cooperated. I wanted him to come this way, but it wasn't right to meet at home.</span><br data-dcnode-id="10697"><span data-dcnode-id="10696" instrument_node="">
"I'll go over there. Come to the studio."</span><br data-dcnode-id="10695"><span data-dcnode-id="10694" instrument_node="">
Sarah ordered to be on a high horse.</span><br data-dcnode-id="10693"><span data-dcnode-id="10692" instrument_node="">
</span><br data-dcnode-id="10691"><span data-dcnode-id="10690" instrument_node="">
</span><br data-dcnode-id="10689"><span data-dcnode-id="10688" instrument_node="">

Even if you hide your face tightly like this, people sometimes appear to recognize you with hawk eyes.</span><br data-dcnode-id="10683"><span data-dcnode-id="10682" instrument_node="">

I gritted my teeth while I was moving in a taxi.</span><br data-dcnode-id="10677"><span data-dcnode-id="10676" instrument_node="">
The car went cool and reached Woo-hyun's studio without getting caught in the signal.</span><br data-dcnode-id="10675"><span data-dcnode-id="10674" instrument_node="">
"Stop here, please."</span><br data-dcnode-id="10673"><span data-dcnode-id="10672" instrument_node="">
Sarah changed her voice and spoke to the driver.</span><br data-dcnode-id="10671"><span data-dcnode-id="10670" instrument_node="">

Sarah got out of the taxi and opened the studio door and went inside.</span><br data-dcnode-id="10667"><span data-dcnode-id="10666" instrument_node="">
I could see the silhouette of a slim man like a model.</span><br data-dcnode-id="10665"><span data-dcnode-id="10664" instrument_node="">
Woo-hyun, who was hanging around in the distance, immediately turned his foot to her when he heard a sign of popularity was heard.</span><br data-dcnode-id="10663"><span data-dcnode-id="10662" instrument_node="">

</span><br data-dcnode-id="10659"><span data-dcnode-id="10658" instrument_node="">

</span><div class="SpoilerTarget bbCodeSpoilerText" data-dcnode-id="4213"><span data-dcnode-id="4234" instrument_node="">ML actually did have a crush on her when they were back in college. He met her during some advert(?) shoot. When he asked her to marry him, it was an impluse coupled with that earlier crush. Before their wedding, he found out (or told) that she had been assaulted (I think he thought sexually) by a guy she was rumoured to have been seeing. And that she had to go to the police station herself and that she asked that her parents not be told at that time. This event did happen but the facts he knows are skewed. She was physically assaulted; she did make a report to the police; and she did ask that her parents not be told. But it's not a boy she was seeing; it was someone that her parent's employers (that lady from the beginning) daughter was either seeing or had something to do with. They use FL as a cover.</span><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">
</span><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">
Anyways, ML thinks FL is traumatized by this event and would not welcome sexual overtures. Which is sort of reinforced by her being shy with him and also like flinching/shying away from him. It just doesn't register with him that she's being shy or just uncomfortable because they don't know each other well -or inexperience. </span><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">
</span><br data-dcnode-id="4227"><span data-dcnode-id="4226" instrument_node="">
So that's why he separates the apartment and like doesn't touch her etc. He was trying to make her feel safe in their home and relationship and give her her own space.</span><br data-dcnode-id="4225"><span data-dcnode-id="4224" instrument_node="">
</span><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">
The FL doesn't know he knows about what happened back then or that he has misunderstood. So she just thinks that he doesn't like her.</span><br data-dcnode-id="4221"><span data-dcnode-id="4220" instrument_node="">
</span><br data-dcnode-id="4219"><span data-dcnode-id="4218" instrument_node="">
He's actually distant and cold with everyone - even his parents. Something that developed from a huge trauma that he had as a kid. </span><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">
</span><br data-dcnode-id="4215"><span data-dcnode-id="4214" instrument_node="">
So essentially the misunderstanding (which is one that I can totally appreciate) coupled with his personality - and like one major outside factor - leads to her view of him and their relationship.</span></div><span data-dcnode-id="4212" instrument_node="">
</span></div><span data-dcnode-id="4210" instrument_node="">
</span><div class="messageTextEndMarker" data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">&nbsp;</span></div><span data-dcnode-id="4207" instrument_node="">

"How are you, sister?"</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
"Yeonwoo, it's been a while. Thank you for coming."</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
Likewise, Sarah, who welcomed Yeon-woo, looked down at her stomach and asked.</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">
</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
"Have you got a little belly?" How are you feeling? How are you feeling?"</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
"It's okay. It's great."</span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">
"Now we know the gender of the baby, don't we?" Is that a daughter or a son?”</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
"Daughter."</span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
"Oh, then Sunjae, how about 'instructor' after me?"</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
"Oh, no, no, no. I don't even want to think about it.”</span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
Sunjae shook his head at Sarah's much-anticipated suggestion.</span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">
"Oh, my God. I don't even know if it's an honor for the family."</span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">
Sarah twitched her lips discontentedly, too.</span><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">
</span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">
</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">
It was not long before the three settled down in the Bongandang Hall named Saul.</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
Yeonwoo took over a photo of Saul.</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
The faces of young Saul and Mr. Nureung, who looked smiling, overlapped.</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
Yeon-woo, who became fond of her, swept the face of the picture and smiled along.</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
"Why did you make it a memorial tree?”</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
Seonjae, who took over the remains jar, asked Sara.</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
"I put a memorial tablet in the Bongandang and left a picture, so it was nice to see Saul say hello every time I visited. It's like a home for the mind now.”</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
Leaving the Bongandang, Seonjae voiced regret.</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
"It's a picture. I can send it to you. I can save it on my phone and watch it every day."</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
Sarah answered. Sarah had a cool voice as usual.</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
After a moment of silence Sarah spoke out again.</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
"Someday Saul appeared in a dream. Like an adult. You know the one with the hair dyed yellow hair. Because it's funny."</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
Sarah smirked and said, but Seon-jae and Yeon-woo's eyes were wet.</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
"Do you know what he said to me in his dream?"</span><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">
“…….”</span><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">
</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">
"Marry me. Aren't you jealous that Sunjae is doing well?"</span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">
“…….”</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
"So I said I wasn't jealous."</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
It was a bright voice all along, but I could feel the water gathering at the end of Sarah's words.</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
"But Saul asked me to plant a tree. Now that the baby is going to be born, they say they'd be happy if they moved the remains and planted trees. You'll feel like you're growing up together."</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
“…….”</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
"I wondered why he said he was going to have a baby. I'm a non-maritalist, I don't have a lover, I don't do nonsense."</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
“…….”</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
"So come to think of it, there's a baby to be born."</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
Sarah glanced down at Yeonwoo's belly. Then he turned his head straight to Seonjae and said happily.</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
"Saul must have really liked you.”</span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
What appeared in Sarah's dream was also a gift to Seonjae. Did Saul want to give a tree that grows together to his daughter?</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">
I've already received a lot, so what else can I give you?</span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">
Seonjae was both heartbroken and overwhelmed.</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">
While we were talking, the seedling spot was arranged.</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
Sarah opened the jar, poured the remains, and erected a seedling on it, following the staff's guidance.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
Seonjae and Yeonwoo carried the soil to strengthen the ground.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">
The young tree stood upright on the ground.</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
After finishing the work, Sunjae asked.</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
"It's going to rain and snow, wouldn't it be sad if the trees were wet and snowy?”</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
"It's all right and it grows a little bit. It's going to be as big as it gets rained on and snowed on."</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
Sarah cried from time to time, but she didn't cry.</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
"When the baby becomes an adult, the trees will grow a lot, right? I'm looking forward to it."</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
Sarah also had a big heart.</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
Some people grow up unprepared and others grow up after they grow up.</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
"Let's go now."</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
Sarah, who even built a small monument in front of the seedling, said.</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">
Yeonwoo whispered to the little tree.</span><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">
'Bye, we're gonna meet again.’</span><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node="">
</span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
</span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">
</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
Sarah's car is standing when I come down from the memorial hall.</span><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">
Sarah was in a position to move on schedule today as well. We broke up here.</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
"Sister, it was nice to see you today. I'll be back next year. I'm looking forward to how much trees will grow in a year."</span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
"Yeonwoo, will you be able to come next year?”</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
"Sure. By then, the baby would have been more than 200 days old.”</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">
Sarah grinned at Yeon-woo's brave answer.</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">
"I'll call you when the baby is born. It's going to be hard, but cheer up."</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">
"Yes. Take care, too."</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
"I'll go first. Thank you every year, Seonjae.”</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
Sarah waved at the two and left first.</span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">
</span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">
After seeing Sarah off for a long time, Yeon-woo walked with Seon-jae to the opposite parking lot.</span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
Sarah was so resentful in "The Other Future", but now I rely on her deeply. I'm just so proud of it.</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
On the day of Seonjae's funeral in "Another Future," Yu Sa-ra, who cried so sadly in a rainy memorial, can now erase Yeon-woo.</span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">
Yeon-woo, who had an idea, said to Seon-jae.</span><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">
"I have a thought when I came back from another future."</span><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
"Huh? What's on your mind?"</span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">
"Honey, I promise to have a happy ending to this life."</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
"Happy ending……do you have my last in mind?”</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
Sunjae pointed out.</span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
"Don't end it, just be happy."</span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">
"Yes, my goal was too great."</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
Reflected Yeon-woo showed a different idea.</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
"Then let's think of a happy ending for today. Live with a happy ending every day by day. It'll be a good life together.”</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
"Today's happy ending. That's great."</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">
"Yeah. People have to finish well."</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
Yeon-woo grinned at Sun-jae's warm eyes.</span><br data-dcnode-id="927"><span data-dcnode-id="926" instrument_node="">
Then he lowered his head in front of her.</span><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">
My lips fell and fell.</span><br data-dcnode-id="923"><span data-dcnode-id="922" instrument_node="">
His eyes changed quickly. It's a secret look that I didn't show in front of Sarah.</span><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node="">
A long time ago, a man who used to kiss like a play to show others has changed this much in half a year.</span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">
The energy of happiness in his eyes makes her feel comfortable and flutter.</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
The world surrounded by yellowish golden sunset. Mr. Nureung's hair seemed to sparkle.</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
The trees that absorbed the last sunlight of the day shook silently.</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
I hope the tree grows well.</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
The main part of "Happily Ending" just in time.</span></div><span data-dcnode-id="906" instrument_node="">
</span></div></div><div class="quoteExpand quoteCut" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Click to expand...</span></div></blockquote><span data-dcnode-id="900" instrument_node="">
</span></aside><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">Thaks for the spoilers.
