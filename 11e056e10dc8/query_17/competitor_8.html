</span></li><li data-dcnode-id="1223"><span data-dcnode-id="1256" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AkiraKamiya" title="/pmwiki/pmwiki.php/Creator/AkiraKamiya"><span data-dcnode-id="1255" instrument_node="">Akira Kamiya</span></a><span data-dcnode-id="1253" instrument_node=""> is one of the biggest names of Japanese voice acting in the 1980s to 1990s, best known for </span><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/FistOfTheNorthStar" title="/pmwiki/pmwiki.php/Manga/FistOfTheNorthStar"><span data-dcnode-id="1252" instrument_node="">Kenshiro</span></a><span data-dcnode-id="1250" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/CityHunter" title="/pmwiki/pmwiki.php/Manga/CityHunter"><span data-dcnode-id="1249" instrument_node="">Ryo Saeba</span></a><span data-dcnode-id="1247" instrument_node=""> and many many </span><a class="twikilink" data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HotBlooded" title="/pmwiki/pmwiki.php/Main/HotBlooded"><span data-dcnode-id="1246" instrument_node="">Hot-Blooded</span></a><span data-dcnode-id="1244" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperRobotGenre" title="/pmwiki/pmwiki.php/Main/SuperRobotGenre"><span data-dcnode-id="1243" instrument_node="">Super Robot Genre</span></a><span data-dcnode-id="1241" instrument_node=""> protagonists that required him to </span><a class="twikilink" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallingYourAttacks" title="/pmwiki/pmwiki.php/Main/CallingYourAttacks"><span data-dcnode-id="1240" instrument_node="">yell a lot of attack names</span></a><span data-dcnode-id="1238" instrument_node=""> (Chief amongst them is </span><a class="twikilink" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/GetterRobo" title="/pmwiki/pmwiki.php/Manga/GetterRobo"><span data-dcnode-id="1237" instrument_node="">Ryouma Nagare</span></a><span data-dcnode-id="1235" instrument_node="">). Not to mention he tend to reprise the last ones if they reappear in </span><em data-dcnode-id="1232"><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SuperRobotWars" title="/pmwiki/pmwiki.php/VideoGame/SuperRobotWars"><span data-dcnode-id="1234" instrument_node="">Super Robot Wars</span></a></em><span data-dcnode-id="1231" instrument_node=""> and recorded </span><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">even more yellings</span></em><span data-dcnode-id="1228" instrument_node="">. Eventually, his lungs gave out and he has stated that he would no longer be able to make such kind of voice acting anymore, so he either tutors the latter generation of voice actors or do roles that didn't require him to yell a lot (for example, the aforementioned Ryo Saeba). This is also why </span><em data-dcnode-id="1225"><a class="twikilink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SuperRobotWars" title="/pmwiki/pmwiki.php/VideoGame/SuperRobotWars"><span data-dcnode-id="1227" instrument_node="">Super Robot Wars</span></a></em><span data-dcnode-id="1224" instrument_node=""> slowly phased out the usage of series that starred Kamiya in concern of his lung health.
</span></li><li data-dcnode-id="1205"><span data-dcnode-id="1222" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/ChrisAyres" title="/pmwiki/pmwiki.php/Creator/ChrisAyres"><span data-dcnode-id="1221" instrument_node="">Chris Ayres</span></a><span data-dcnode-id="1219" instrument_node=""> suffered from end-stage COPD in 2017 that left him hospitalized and necessitated surgery. In the years following, he would take on fewer voice acting roles, with his most famous role, </span><a class="twikilink" data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/DragonBall" title="/pmwiki/pmwiki.php/Franchise/DragonBall"><span data-dcnode-id="1218" instrument_node="">Frieza</span></a><span data-dcnode-id="1216" instrument_node="">, being passed on to his understudy </span><a class="twikilink" data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DamanMills" title="/pmwiki/pmwiki.php/Creator/DamanMills"><span data-dcnode-id="1215" instrument_node="">Daman Mills</span></a><span data-dcnode-id="1213" instrument_node=""> (save for </span><em data-dcnode-id="1210"><a class="twikilink" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DragonBallSuperBroly" title="/pmwiki/pmwiki.php/Anime/DragonBallSuperBroly"><span data-dcnode-id="1212" instrument_node="">Dragon Ball Super: Broly</span></a></em><span data-dcnode-id="1209" instrument_node="">, for which he would reprise his role </span><a class="twikilink" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwanSong" title="/pmwiki/pmwiki.php/Main/SwanSong"><span data-dcnode-id="1208" instrument_node="">one final time</span></a><span data-dcnode-id="1206" instrument_node=""> while being ready to leave the recording booth immediately should a lung transplant be made available). He passed away in late 2021 and will be dearly missed.
</span></li><li data-dcnode-id="1183"><span data-dcnode-id="1204" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TomKane" title="/pmwiki/pmwiki.php/Creator/TomKane"><span data-dcnode-id="1203" instrument_node="">Tom Kane</span></a><span data-dcnode-id="1201" instrument_node=""> is a well-known name among the Western animation fans, famous for his near pitch-perfect impersonations of </span><a class="twikilink" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/IanMcKellen" title="/pmwiki/pmwiki.php/Creator/IanMcKellen"><span data-dcnode-id="1200" instrument_node="">Ian McKellen</span></a><span data-dcnode-id="1198" instrument_node=""> as </span><a class="twikilink" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheLordOfTheRings" title="/pmwiki/pmwiki.php/Franchise/TheLordOfTheRings"><span data-dcnode-id="1197" instrument_node="">Gandalf</span></a><span data-dcnode-id="1195" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/WolverineAndTheXMen2009" title="/pmwiki/pmwiki.php/WesternAnimation/WolverineAndTheXMen2009"><span data-dcnode-id="1194" instrument_node="">Magneto</span></a><span data-dcnode-id="1192" instrument_node="">, not to mention his roles as Yoda in </span><em data-dcnode-id="1189"><a class="twikilink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/StarWarsTheCloneWars" title="/pmwiki/pmwiki.php/WesternAnimation/StarWarsTheCloneWars"><span data-dcnode-id="1191" instrument_node="">Star Wars: The Clone Wars</span></a></em><span data-dcnode-id="1188" instrument_node=""> and HIM in </span><em data-dcnode-id="1185"><a class="twikilink" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ThePowerpuffGirls" title="/pmwiki/pmwiki.php/WesternAnimation/ThePowerpuffGirls"><span data-dcnode-id="1187" instrument_node="">The Powerpuff Girls</span></a></em><span data-dcnode-id="1184" instrument_node="">. However, his career was drastically cut short after Kane had a stroke affecting his speech functions. While he recovered, in September 2021 his daughter posted on his Facebook page that he chose to retire early due to long-term apraxia (difficulty in being able to smoothly transition syllables) as a result of the stroke.
</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1182" instrument_node=""> The '50s </span><a class="twikilink" data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MrFanservice" title="/pmwiki/pmwiki.php/Main/MrFanservice"><span data-dcnode-id="1181" instrument_node="">Mr. Fanservice</span></a><span data-dcnode-id="1179" instrument_node=""> Steve Reeves, best known for the 1958 </span><em data-dcnode-id="1176"><a class="twikilink" data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Hercules1958" title="/pmwiki/pmwiki.php/Film/Hercules1958"><span data-dcnode-id="1178" instrument_node="">Hercules</span></a></em><span data-dcnode-id="1175" instrument_node=""> film, saw the beginning of the end of his career thanks to an on-set injury while shooting the 1959 </span><a class="twikilink" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SergioLeone" title="/pmwiki/pmwiki.php/Creator/SergioLeone"><span data-dcnode-id="1174" instrument_node="">Sergio Leone</span></a><span data-dcnode-id="1172" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwordAndSandal" title="/pmwiki/pmwiki.php/Main/SwordAndSandal"><span data-dcnode-id="1171" instrument_node="">Sword and Sandal</span></a><span data-dcnode-id="1169" instrument_node=""> film </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">The Last Days of Pompeii</span></em><span data-dcnode-id="1166" instrument_node="">. Reeves dislocated his shoulder while doing a chariot stunt and re-injured it while shooting an underwater scene, and with each subsequent film, the chronic pain caused by the injury made it increasingly difficult for him to do his own stunts. He made his last movie, the </span><a class="twikilink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaghettiWestern" title="/pmwiki/pmwiki.php/Main/SpaghettiWestern"><span data-dcnode-id="1165" instrument_node="">Spaghetti Western</span></a><span data-dcnode-id="1163" instrument_node=""> </span><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">A Long Ride from Hell</span></em><span data-dcnode-id="1160" instrument_node="">, in 1968 (after a four-year hiatus) and then retired from film, spending the rest of his life as a horse breeder and a natural bodybuilder.
</span></li><li data-dcnode-id="1140"><span data-dcnode-id="1158" instrument_node=""> Two things are generally held to have killed </span><a class="twikilink" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RoseMcGowan" title="/pmwiki/pmwiki.php/Creator/RoseMcGowan"><span data-dcnode-id="1157" instrument_node="">Rose McGowan</span></a><span data-dcnode-id="1155" instrument_node="">'s career. The first was the infamous studio mogul Harvey Weinstein having her blacklisted from his productions after she attempted to go public about him raping her. The second, and the one that ensured that her </span><a class="twikilink" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CareerResurrection" title="/pmwiki/pmwiki.php/Main/CareerResurrection"><span data-dcnode-id="1154" instrument_node="">Career Resurrection</span></a><span data-dcnode-id="1152" instrument_node=""> from </span><em data-dcnode-id="1149"><a class="twikilink" data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Charmed1998" title="/pmwiki/pmwiki.php/Series/Charmed1998"><span data-dcnode-id="1151" instrument_node="">Charmed</span></a></em><span data-dcnode-id="1148" instrument_node=""> and </span><em data-dcnode-id="1145"><a class="twikilink" data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Grindhouse" title="/pmwiki/pmwiki.php/Film/Grindhouse"><span data-dcnode-id="1147" instrument_node="">Grindhouse</span></a></em><span data-dcnode-id="1144" instrument_node=""> would be stillborn, was a car accident in 2007 that left her face badly mangled, forcing her to get substantial reconstructive surgery that didn't quite fix all the damage. Since McGowan had been known as a </span><a class="twikilink" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MsFanservice" title="/pmwiki/pmwiki.php/Main/MsFanservice"><span data-dcnode-id="1143" instrument_node="">sex symbol</span></a><span data-dcnode-id="1141" instrument_node=""> before then, an accident like that was especially damaging for her career, and she's mostly been in little-seen indie films since.
</span></li></ul></li><li data-dcnode-id="1016"><span data-dcnode-id="1137" instrument_node=""> Music:
</span><ul data-dcnode-id="1017"><li data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Immortal" title="/pmwiki/pmwiki.php/Music/Immortal"><span data-dcnode-id="1135" instrument_node="">Immortal</span></a><span data-dcnode-id="1133" instrument_node=""> guitarist and lyricist Demonaz Doom Occulta was forced to abandon the former role because of severe tendinitis in his arms, though he is still considered an active member by the band. Demonaz eventually was able to return to playing guitar with the band and took over lead vocals from Abbath after his departure.
</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node=""> Former </span><a class="twikilink" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Suffocation" title="/pmwiki/pmwiki.php/Music/Suffocation"><span data-dcnode-id="1130" instrument_node="">Suffocation</span></a><span data-dcnode-id="1128" instrument_node=""> guitarist Doug Cerrito will almost certainly never be involved in music again due to crippling arthritis.
</span></li><li data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node=""> In 2008, </span><a class="twikilink" data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Deftones" title="/pmwiki/pmwiki.php/Music/Deftones"><span data-dcnode-id="1125" instrument_node="">Deftones</span></a><span data-dcnode-id="1123" instrument_node=""> bassist Chi Cheng was seriously injured in a car accident and died five years later while in a coma.
</span></li><li data-dcnode-id="1108"><span data-dcnode-id="1121" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Unearth" title="/pmwiki/pmwiki.php/Music/Unearth"><span data-dcnode-id="1120" instrument_node="">Unearth</span></a><span data-dcnode-id="1118" instrument_node=""> drummer Nick Pierce narrowly subverted this after sustaining a back injury sometime after joining the band. He left the injury, a slipped disc, only partially treated for several years, and the disc began to calcify and push up against his spine, eventually piercing it and causing it to leak fluid. This led to his leg atrophying to the point that it was beginning to noticeably wither, which eventually forced him to pull off the band's 2016 Fury Tour after playing with excruciating back and leg pain for the first three and a half weeks of the tour. Back surgery to more fully correct the injury wasn't initially as effective as hoped, and he spent the rest of the year on the sidelines working to recover while the band toured with a fill-in.</span><span class="notelabel" data-dcnode-id="1115" onclick="togglenote('note773xh');" style="cursor: pointer;"><sup data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1110" id="note773xh" isnote="true" onclick="togglenote('note773xh');" style="display: none; cursor: pointer;"><span data-dcnode-id="1114" instrument_node="">Wovenwar and </span><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/AsILayDying" title="/pmwiki/pmwiki.php/Music/AsILayDying"><span data-dcnode-id="1113" instrument_node="">As I Lay Dying</span></a><span data-dcnode-id="1111" instrument_node=""> drummer Jordan Mancino</span></span><span data-dcnode-id="1109" instrument_node=""> He was ultimately able to recover and rejoined the band for a mini-tour at the beginning of 2017.
</span></li><li data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Megadeth" title="/pmwiki/pmwiki.php/Music/Megadeth"><span data-dcnode-id="1106" instrument_node="">Megadeth</span></a><span data-dcnode-id="1104" instrument_node=""> broke up from 2002-04 because of Dave Mustaine's subversion due to nerve damage (caused by him falling asleep with his left arm draped over a chair back). Mustaine also became a born-again Christian during his recovery.
</span></li><li data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node=""> Ultimately subverted by Tony Iommi of </span><a class="twikilink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/BlackSabbath" title="/pmwiki/pmwiki.php/Music/BlackSabbath"><span data-dcnode-id="1101" instrument_node="">Black Sabbath</span></a><span data-dcnode-id="1099" instrument_node="">. On his last day of work in a sheet metal shop, he accidentally cut off the tips of the middle and ring fingers on his right hand. He thought his music career was over until his supervisor played him a record by jazz guitarist </span><a class="twikilink" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/DjangoReinhardt" title="/pmwiki/pmwiki.php/Music/DjangoReinhardt"><span data-dcnode-id="1098" instrument_node="">Django Reinhardt</span></a><span data-dcnode-id="1096" instrument_node="">, who only had two fingers on his fret hand. This inspired Tony to continue in music. He made prosthetic tips for the two fingers he lost, then down-tuned his guitar a full step to make it easier to bend the strings. This gave Black Sabbath their signature sound.
</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node=""> Subverted by </span><a class="twikilink" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/DefLeppard" title="/pmwiki/pmwiki.php/Music/DefLeppard"><span data-dcnode-id="1093" instrument_node="">Def Leppard</span></a><span data-dcnode-id="1091" instrument_node=""> drummer Rick Allen. Despite losing his left arm in a car accident, the band developed a one-armed drumkit for Allen.
</span></li><li data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node=""> Shred guitarist Jason Becker was put out of commission due to Lou Gehrig's disease. He can still compose music using a computer, though, so the trope is ultimately </span><a class="twikilink" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="1088" instrument_node="">subverted</span></a><span data-dcnode-id="1086" instrument_node="">.
</span></li><li data-dcnode-id="1077"><span data-dcnode-id="1084" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DrakeBell" title="/pmwiki/pmwiki.php/Creator/DrakeBell"><span data-dcnode-id="1083" instrument_node="">Drake Bell</span></a><span data-dcnode-id="1081" instrument_node=""> injured his wrist in a way that he supposedly could never play guitar again. </span><a class="twikilink" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="1080" instrument_node="">It later turned out that he could still play.</span></a><span data-dcnode-id="1078" instrument_node="">
</span></li><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node=""> Blues rock legend Dr. John started out as a guitarist and only switched to the piano (with which he became famous) after he was shot in the hand during a bar fight, suffering a permanent loss of movement in one finger that left it too stiff to play guitar but capable of pressing a key.
</span></li><li data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node=""> After suffering a brain aneurysm in 1995, </span><a class="twikilink" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/REM" title="/pmwiki/pmwiki.php/Music/REM"><span data-dcnode-id="1073" instrument_node="">R.E.M.</span></a><span data-dcnode-id="1071" instrument_node=""> drummer Bill Berry left the group in 1997 </span><a class="twikilink" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallToAgriculture" title="/pmwiki/pmwiki.php/Main/CallToAgriculture"><span data-dcnode-id="1070" instrument_node="">and became a farmer</span></a><span data-dcnode-id="1068" instrument_node="">, but has occasionally returned to one-off performances, like R.E.M.'s 2007 Rock and Roll Hall of Fame induction ceremony.
</span></li><li data-dcnode-id="1054"><span data-dcnode-id="1066" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ACDC" title="/pmwiki/pmwiki.php/Music/ACDC"><span data-dcnode-id="1065" instrument_node="">AC/DC</span></a><span data-dcnode-id="1063" instrument_node="">:
</span><ul data-dcnode-id="1055"><li data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node=""> Lead singer Brian Johnson retired from touring in 2016, with the official reason for his departure being hearing problems that made it unsafe for him to continue performing with the band. </span><a class="twikilink" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RashomonStyle" title="/pmwiki/pmwiki.php/Main/RashomonStyle"><span data-dcnode-id="1061" instrument_node="">Johnson himself</span></a><span data-dcnode-id="1059" instrument_node="">, however, claims that his hearing problems were not caused by performing, but from neglecting to wear ear protection during a car race, and that the other members of the band blew his injuries out of proportion to justify forcing him out.
</span></li><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node=""> Co-founder Malcolm Young was forced to retire when he was diagnosed with early-onset dementia. He died sometime later.
</span></li></ul></li><li data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node=""> Jeff Becerra, frontman of </span><a class="twikilink" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Possessed" title="/pmwiki/pmwiki.php/Music/Possessed"><span data-dcnode-id="1052" instrument_node="">Possessed</span></a><span data-dcnode-id="1050" instrument_node="">, was shot and left paralyzed in a botched robbery in 1989. Ultimately subverted in that while he can no longer play the bass, he still performs lead vocals.
</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/HelloProject" title="/pmwiki/pmwiki.php/Music/HelloProject"><span data-dcnode-id="1047" instrument_node="">Ex-Morning Musume</span></a><span data-dcnode-id="1045" instrument_node=""> member Aika Mitsui had to graduate from the group earlier than she wanted, due to a particularly bad foot injury. After spending a few years in New Zealand to study English, she now mainly works under Hello! Project as a reporter and middleman for overseas promotion.
</span></li><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node=""> Averted by Marc Almond. In 2004, he was involved in a motorbike crash which nearly left him dead and might easily have ended his singing career. However, within a few years, he had recovered sufficiently to start singing again.
</span></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node=""> Indie rockers The Long Blondes disbanded in 2008 after guitarist and lyricist Dorian Cox suffered a stroke. While he survived, Cox was unable to play guitar for several years and the band decided not to continue without him.
</span></li><li data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/QuincyJones" title="/pmwiki/pmwiki.php/Music/QuincyJones"><span data-dcnode-id="1038" instrument_node="">Quincy Jones</span></a><span data-dcnode-id="1036" instrument_node=""> was forced to quit playing the trumpet after suffering an aneurysm. The doctors had to implant a steel plate which they feared could come loose if he were to play again. He has since turned to producing music.
</span></li><li data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node=""> Cellist Jacqueline du Pré was forced to retire from performing in 1973 at the age of 28 due to multiple sclerosis. The disease would eventually claim her life 14 years later.
</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node=""> Two members of </span><a class="twikilink" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/TheDillingerEscapePlan" title="/pmwiki/pmwiki.php/Music/TheDillingerEscapePlan"><span data-dcnode-id="1031" instrument_node="">The Dillinger Escape Plan</span></a><span data-dcnode-id="1029" instrument_node=""> suffered career-ending injuries. Bassist Adam Doll was paralyzed from the waist down in a car accident, while guitarist Brian Benoit suffered nerve damage in his hand.
</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node=""> Subverted by guitarist Les Paul, who shattered his right arm and elbow in a car accident, and while doctors were able to save the arm, the elbow could not be repaired, which would normally mark the end of one's instrument-playing days since the arm would have to be set in a fixed position. However, Paul's music was so important to him that rather than give it up, he had the doctors </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">permanently set his arm</span></em><span data-dcnode-id="1024" instrument_node=""> to the angle he needed it to be at to play the guitar.
</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node=""> Subverted by </span><a class="twikilink" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/JudasPriest" title="/pmwiki/pmwiki.php/Music/JudasPriest"><span data-dcnode-id="1021" instrument_node="">Judas Priest</span></a><span data-dcnode-id="1019" instrument_node=""> guitarist Glenn Tipton. In February 2018, he was diagnosed with Parkinson's disease, leading the band to hire Andy Sneap to take his place in live shows.
</span></li></ul></li><li data-dcnode-id="995"><span data-dcnode-id="1015" instrument_node=""> Dance:
</span><ul data-dcnode-id="996"><li data-dcnode-id="1007"><span data-dcnode-id="1014" instrument_node=""> Soloist Kathryn Morgan of the New York City Ballet was five years into a </span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">very</span></em><span data-dcnode-id="1011" instrument_node=""> promising career (she was on the fast track to becoming a principal ballerina with the company) when she was hit by Hashimoto's thyroiditis, which unfortunately put an end to her time with the company. She has since made a name for herself as a </span><a class="twikilink" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/YouTube" title="/pmwiki/pmwiki.php/Website/YouTube"><span data-dcnode-id="1010" instrument_node="">YouTube</span></a><span data-dcnode-id="1008" instrument_node=""> dance guru, and after seven years away, subverted the trope when she joined the incredibly well-respected Miami City Ballet as a soloist in 2019.
</span></li><li data-dcnode-id="997"><span data-dcnode-id="1006" instrument_node=""> Just barely averted by world-famous ballerina Alicia Alonso, whose struggle with a detached retina and subsequent blindness nearly ended her career. After a third and final surgery, she was put on complete bed rest for a full year. She went on to become one of the greatest prima ballerinas in history.
</span><div class="indent" data-dcnode-id="998"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Alonso</span></strong><span data-dcnode-id="1003" instrument_node="">: I danced in my mind. Blind, motionless, flat on my back, I taught myself to dance </span><em data-dcnode-id="1000"><a class="twikilink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/Giselle" title="/pmwiki/pmwiki.php/Theatre/Giselle"><span data-dcnode-id="1002" instrument_node="">Giselle</span></a></em><span data-dcnode-id="999" instrument_node="">.
</span></div></li></ul></li><li data-dcnode-id="968"><span data-dcnode-id="994" instrument_node=""> Art:
</span><ul data-dcnode-id="969"><li data-dcnode-id="970"><span data-dcnode-id="993" instrument_node=""> Manga author Daisuke Ashihara succumbed to a form of juvenile arthritis that rendered it incredibly painful for him to draw, such that his series, </span><em data-dcnode-id="990"><a class="twikilink" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/WorldTrigger" title="/pmwiki/pmwiki.php/Manga/WorldTrigger"><span data-dcnode-id="992" instrument_node="">World Trigger</span></a></em><span data-dcnode-id="989" instrument_node="">, had to be put on indefinite hiatus in November 2016. This overlaps with a </span><a class="twikilink" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="988" instrument_node="">subverted</span></a><span data-dcnode-id="986" instrument_node=""> but also </span><a class="twikilink" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownplayedTrope" title="/pmwiki/pmwiki.php/Main/DownplayedTrope"><span data-dcnode-id="985" instrument_node="">downplayed</span></a><span data-dcnode-id="983" instrument_node=""> example of </span><a class="twikilink" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DreamCrushingHandicap" title="/pmwiki/pmwiki.php/Main/DreamCrushingHandicap"><span data-dcnode-id="982" instrument_node="">Dream-Crushing Handicap</span></a><span data-dcnode-id="980" instrument_node="">, as he had this arthritis from the moment he started his career, and it </span><em data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">did</span></em><span data-dcnode-id="977" instrument_node=""> hurt for him to draw right from the start, but it didn't become debilitating until later. In late October 2018, he managed to avert this trope, with him recovering enough to </span><a class="twikilink" data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackInTheSaddle" title="/pmwiki/pmwiki.php/Main/BackInTheSaddle"><span data-dcnode-id="976" instrument_node="">continue drawing</span></a><span data-dcnode-id="974" instrument_node=""> </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">World Trigger</span></em><span data-dcnode-id="971" instrument_node="">, and with the series moving to a monthly magazine so as not to stress his bones so much.
</span></li></ul></li><li data-dcnode-id="948"><span data-dcnode-id="967" instrument_node=""> Military:
</span><ul data-dcnode-id="949"><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node=""> Saint Ignatius of Loyola became a major reformer of the Catholic Church after a cannonball injury to the leg forced him to give up battle.
</span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node=""> Subverted with General Lefebvre. He was severely wounded in the arm while fighting the Austrians in 1798, which left him unable to exercise command, and he began a career as a Senator instead; indeed, when Napoleon created his eighteen original Marshals in 1804, he was one of the four generals who received the baton as a reward for past service to the Republic and was not meant to see the battlefields again. However, it turned out that the wound was not as crippling as was initially thought, and Lefebvre went on to fight in most campaigns of the Empire, including the invasion of Russia.
</span></li><li data-dcnode-id="958"><span data-dcnode-id="962" instrument_node=""> Played straight in a sense by the infamous turncoat </span><a class="twikilink" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/BenedictArnold" title="/pmwiki/pmwiki.php/UsefulNotes/BenedictArnold"><span data-dcnode-id="961" instrument_node="">Benedict Arnold</span></a><span data-dcnode-id="959" instrument_node="">. The knee injury sustained at the Battle of Saratoga caused him to be given the military governorship of Philadelphia to recuperate. It was during this time that all the initial charges of using his position to profit were made against him, causing him to seek out the British. He would serve as a general in the British Army, but for all intents and purposes, this was the end of his career in the American Continental Army.
</span></li><li data-dcnode-id="950"><span data-dcnode-id="957" instrument_node=""> Aaron Burr had to resign his commission and leave the Continental Army after a heat stroke during the Battle of Monmouth severe enough to leave him </span><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">comatose</span></em><span data-dcnode-id="954" instrument_node=""> for several days. It became apparent after he woke up that he wasn't going to be in any shape to do much of </span><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">anything</span></em><span data-dcnode-id="951" instrument_node="">, let alone fight. He did eventually end up mostly recovering, and even rejoining the war effort (unofficially), but his health was permanently damaged and he showed symptoms of brain damage for the rest of his life.
</span></li></ul></li><li data-dcnode-id="943"><span data-dcnode-id="947" instrument_node=""> Politics:
</span><ul data-dcnode-id="944"><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node=""> Representative Gabrielle "Gabby" Giffords (D-AZ) was shot in the head by a crazed gunman while meeting with her constituents on January 8, 2011. Miraculously she survived, but the extensive recovery and her impaired cognitive and motor skills killed her once-promising political career, and she resigned from her post one year later. She would make a small comeback as a gun control activist, and would later help her husband Mark Kelly get elected to the Senate in 2020.
</span></li></ul></li><li data-dcnode-id="937"><span data-dcnode-id="942" instrument_node=""> Defied by </span><a class="urllink" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chelsiehill.com/"><span data-dcnode-id="941" instrument_node="">Chelsie Hill</span><img data-dcnode-id="940" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="938" instrument_node="">, an aspiring dancer who became a paraplegic after a car accident during her senior year in high school. Rather than giving up on dance, she simply moved to promoting adaptive dancing for people in wheelchairs, and started an organization called the Rollettes to inspire other women who use wheelchairs to do the same.
</span></li><li data-dcnode-id="931"><span data-dcnode-id="936" instrument_node=""> </span><a class="urllink" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brennambean.com/"><span data-dcnode-id="935" instrument_node="">Brenna Bean</span><img data-dcnode-id="934" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="932" instrument_node=""> was a talented pole vaulter in high school and was recruited to compete in college; however, a spinal cord injury sustained in a car accident shortly after finishing high school ended this dream, since it left her completely paralyzed from the chest down.
</span></li></ul></div><span data-dcnode-id="928" instrument_node="">
