</span><div class="article-content retro-folders" data-dcnode-id="925" id="main-article"><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4592"><span data-dcnode-id="4607" instrument_node="">
</span><span data-dcnode-id="4605" instrument_node="">
</span><span data-dcnode-id="4603" instrument_node="">
</span><span data-dcnode-id="4601" instrument_node="">
</span><span data-dcnode-id="4599" instrument_node="">
</span><span data-dcnode-id="4597" instrument_node="">
</span><span data-dcnode-id="4595" instrument_node="">
</span><span data-dcnode-id="4593" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="4588" style="width:350px;"><a class="twikilink" data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons" title="/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons"><div class="lazy_load_img_box" data-dcnode-id="4590" style="padding-top:75.14%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/lubchenkoleg.png" border="0" class="embeddedimage" data-dcnode-id="4591" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/lubchenkoleg.png&amp;raw" width="350"></div></a></div><span data-dcnode-id="4587" instrument_node="">
</span><div class="acaptionright" data-dcnode-id="4582" style="width:350px;"><span data-dcnode-id="4586" instrument_node="">Even in victory, he was still </span><a class="twikilink" data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualPun" title="/pmwiki/pmwiki.php/Main/VisualPun"><span data-dcnode-id="4585" instrument_node="">de-feeted</span></a><span data-dcnode-id="4583" instrument_node="">.</span></div><span data-dcnode-id="4581" instrument_node="">
</span><span data-dcnode-id="4579" instrument_node="">
</span><span data-dcnode-id="4577" instrument_node="">
</span><span data-dcnode-id="4575" instrument_node="">
</span><span data-dcnode-id="4573" instrument_node="">
</span><p data-dcnode-id="4572"></p><div class="indent" data-dcnode-id="4555"><em data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">"I used to be an adventurer like you. Then I took an arrow in the knee."</span></em><span data-dcnode-id="4569" instrument_node="">
</span><div class="indent" data-dcnode-id="4556"><span data-dcnode-id="4568" instrument_node="">— </span><strong data-dcnode-id="4565"><a class="twikilink" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CityGuards" title="/pmwiki/pmwiki.php/Main/CityGuards"><span data-dcnode-id="4567" instrument_node="">City Guards</span></a></strong><span data-dcnode-id="4564" instrument_node=""> (</span><a class="twikilink" data-dcnode-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WelcomeToCorneria" title="/pmwiki/pmwiki.php/Main/WelcomeToCorneria"><span data-dcnode-id="4563" instrument_node="">yes, inexplicably, most of them</span></a><span data-dcnode-id="4561" instrument_node="">), </span><em data-dcnode-id="4558"><a class="twikilink" data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheElderScrollsVSkyrim" title="/pmwiki/pmwiki.php/VideoGame/TheElderScrollsVSkyrim"><span data-dcnode-id="4560" instrument_node="">The Elder Scrolls V: Skyrim</span></a></em><span data-dcnode-id="4557" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4549"><span class="ad-caption" data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4550" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">A Career-Ending Injury is a sudden and unexpected injury or illness that causes disability to a person and forces them to give up their ambitions and dreams.
</span></p><p data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">Usually, this trope involves an athlete getting an injury, but the career can be anything that requires physical and/or mental ability. Likewise, what causes the disability can be something other than an injury (for example, a disease) — the important point is that it prevents the character from achieving their goals by causing a disability.
</span></p><p data-dcnode-id="4540"><span data-dcnode-id="4544" instrument_node="">A variation is where a previously known condition or illness worsens unexpectedly to a point where the character is no longer fit for his/her career. With a character known for being </span><a class="twikilink" data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DentedIron" title="/pmwiki/pmwiki.php/Main/DentedIron"><span data-dcnode-id="4543" instrument_node="">injury-prone or just too stubborn to know when to quit</span></a><span data-dcnode-id="4541" instrument_node="">, this injury may represent the writing on the wall.
</span></p><p data-dcnode-id="4535"><span data-dcnode-id="4539" instrument_node="">Sometimes the injury is part of the backstory, but if it happens during the course of the main story, expect </span><a class="twikilink" data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Angst" title="/pmwiki/pmwiki.php/Main/Angst"><span data-dcnode-id="4538" instrument_node="">Angst</span></a><span data-dcnode-id="4536" instrument_node="">.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4529"><span class="ad-caption" data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4530" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">Very much </span><a class="twikilink" data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TruthInTelevision" title="/pmwiki/pmwiki.php/Main/TruthInTelevision"><span data-dcnode-id="4527" instrument_node="">Truth in Television</span></a><span data-dcnode-id="4525" instrument_node="">. In circles such as the police or the military, this is sometimes sardonically called "earning a desk job". With sports where knee collisions are a regular occurrence, the injury might be so bad that standing up (after it healed) without a cane is impossible.
</span></p><p data-dcnode-id="4495"><span data-dcnode-id="4523" instrument_node="">The injury may have started as a </span><a class="twikilink" data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameBreakingInjury" title="/pmwiki/pmwiki.php/Main/GameBreakingInjury"><span data-dcnode-id="4522" instrument_node="">Game-Breaking Injury</span></a><span data-dcnode-id="4520" instrument_node="">. Compare </span><a class="twikilink" data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhiteDwarfStarlet" title="/pmwiki/pmwiki.php/Main/WhiteDwarfStarlet"><span data-dcnode-id="4519" instrument_node="">White-Dwarf Starlet</span></a><span data-dcnode-id="4517" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ICouldaBeenAContender" title="/pmwiki/pmwiki.php/Main/ICouldaBeenAContender"><span data-dcnode-id="4516" instrument_node="">I Coulda Been a Contender!</span></a><span data-dcnode-id="4514" instrument_node="">, common results of this trope, </span><a class="twikilink" data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DreamCrushingHandicap" title="/pmwiki/pmwiki.php/Main/DreamCrushingHandicap"><span data-dcnode-id="4513" instrument_node="">Dream-Crushing Handicap</span></a><span data-dcnode-id="4511" instrument_node="">, where the character is disabled to start with instead of becoming so during their career, and </span><a class="twikilink" data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CripplingTheCompetition" title="/pmwiki/pmwiki.php/Main/CripplingTheCompetition"><span data-dcnode-id="4510" instrument_node="">Crippling the Competition</span></a><span data-dcnode-id="4508" instrument_node="">, where this trope is invoked. If the character overcomes the injury, either temporarily or permanently, then they're </span><a class="twikilink" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackInTheSaddle" title="/pmwiki/pmwiki.php/Main/BackInTheSaddle"><span data-dcnode-id="4507" instrument_node="">Back in the Saddle</span></a><span data-dcnode-id="4505" instrument_node="">. If the injury isn't just career-ending but </span><em data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">life</span></em><span data-dcnode-id="4502" instrument_node="">-ending, then it's an example of </span><a class="twikilink" data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FatalMethodActing" title="/pmwiki/pmwiki.php/Main/FatalMethodActing"><span data-dcnode-id="4501" instrument_node="">Fatal Method Acting</span></a><span data-dcnode-id="4499" instrument_node="">. May result in the character taking on a </span><a class="twikilink" data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PostInjuryDeskJob" title="/pmwiki/pmwiki.php/Main/PostInjuryDeskJob"><span data-dcnode-id="4498" instrument_node="">Post-Injury Desk Job</span></a><span data-dcnode-id="4496" instrument_node="">.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="4489"><span class="ad-caption" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Advertisement:</span></span><div data-dcnode-id="4490" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="4484"><span data-dcnode-id="4488" instrument_node="">Conversely, the </span><a class="twikilink" data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeafComposer" title="/pmwiki/pmwiki.php/Main/DeafComposer"><span data-dcnode-id="4487" instrument_node="">Deaf Composer</span></a><span data-dcnode-id="4485" instrument_node=""> doesn't let a little thing like being physically unable to practice their career stop them from doing it.
</span></p><p data-dcnode-id="4479"><span data-dcnode-id="4483" instrument_node="">This is sometimes set up as a twist or a </span><a class="twikilink" data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReveal" title="/pmwiki/pmwiki.php/Main/TheReveal"><span data-dcnode-id="4482" instrument_node="">reveal</span></a><span data-dcnode-id="4480" instrument_node="">, so beware of spoilers.
</span></p><hr data-dcnode-id="4478"><h2 data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Examples:</span></h2><span data-dcnode-id="4475" instrument_node="">
</span><p data-dcnode-id="4474"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="4472" onclick="toggleAllFolders();"><span data-dcnode-id="4473" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="4471" instrument_node="">
</span><p data-dcnode-id="4470"></p><div class="folderlabel" data-dcnode-id="4468" onclick="togglefolder('folder0');"><span data-dcnode-id="4469" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime &amp; Manga&nbsp;</span></div><div class="folder" data-dcnode-id="3860" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="4467" instrument_node="">
</span><ul data-dcnode-id="3861"><li data-dcnode-id="4455"><span data-dcnode-id="4466" instrument_node=""> In </span><em data-dcnode-id="4463"><a class="twikilink" data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/TheAnimatrix" title="/pmwiki/pmwiki.php/Anime/TheAnimatrix"><span data-dcnode-id="4465" instrument_node="">The Animatrix</span></a></em><span data-dcnode-id="4462" instrument_node=""> short "World Record", a sprint runner almost exits the Matrix during the record-breaking sprint but is pulled back inside, where his mind </span><a class="twikilink" data-dcnode-id="4460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourMindMakesItReal" title="/pmwiki/pmwiki.php/Main/YourMindMakesItReal"><span data-dcnode-id="4461" instrument_node="">decides he has run past his body capacities and breaks said body</span></a><span data-dcnode-id="4459" instrument_node="">. He is left in a wheelchair for the rest of his life. </span><span class="spoiler" data-dcnode-id="4457" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4458" instrument_node="">But because he knows the truth, with enough effort he can push himself past those limitations. It's left ambiguous how much he can really do.</span></span><span data-dcnode-id="4456" instrument_node="">
</span></li><li data-dcnode-id="4449"><span data-dcnode-id="4454" instrument_node=""> In </span><em data-dcnode-id="4451"><a class="twikilink" data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BananaFish" title="/pmwiki/pmwiki.php/Manga/BananaFish"><span data-dcnode-id="4453" instrument_node="">Banana Fish</span></a></em><span data-dcnode-id="4450" instrument_node="">, Eiji was a talented pole vaulter until he suffered an ankle injury.
</span></li><li data-dcnode-id="4440"><span data-dcnode-id="4448" instrument_node=""> In </span><em data-dcnode-id="4445"><a class="twikilink" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BattleAngelAlita" title="/pmwiki/pmwiki.php/Manga/BattleAngelAlita"><span data-dcnode-id="4447" instrument_node="">Battle Angel Alita</span></a></em><span data-dcnode-id="4444" instrument_node="">, Alita's motorball trainer used to be a racer but had to retire after overuse of reflex-boosting drugs damaged his nervous system. Subverted for Jasugun </span><span class="spoiler" data-dcnode-id="4442" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4443" instrument_node="">who knows his brain is dying from being tampered with too much but chooses to die on the track as a champion</span></span><span data-dcnode-id="4441" instrument_node="">.
</span></li><li data-dcnode-id="4429"><span data-dcnode-id="4439" instrument_node=""> </span><em data-dcnode-id="4436"><a class="twikilink" data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Berserk" title="/pmwiki/pmwiki.php/Manga/Berserk"><span data-dcnode-id="4438" instrument_node="">Berserk</span></a></em><span data-dcnode-id="4435" instrument_node="">:
</span><ul data-dcnode-id="4430"><li data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node=""> Guts' foster father has to retire as an active mercenary after a messy leg injury.

d="4355" instrument_node="">.

</span></li><li data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node=""> In Bootsvorz's backstory, a nasty crash at a test drive resulted in losing his left eye and arm, but he returned to racing after gaining a new arm and eye.
</span></li><li data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node=""> During the German GP, racer Johji Ohtomo crashed, suffering serious injuries. Prior to the crash Johji and Hayato's Super Asruada had a minor collision, leading Hayato to believe Johji's crash was a result of that incident. In reality, Johji turned off his car's computer because he was overwhelemed by the large amounts of data fed into it, hoping instead to race on his instincts. He crashed soon afterwards.
</span></li><li data-dcnode-id="4221"><span data-dcnode-id="4225" instrument_node=""> A racer named John Cleab has his racing career ended in a car accident, but it happened outside the race track. And to make it worse, he </span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">didn’t disclose his accident to the press</span></em><span data-dcnode-id="4222" instrument_node=""> because he was worried about a young girl’s future. (He crashed trying to avoid her as she ran into the street playing with her ball.)
</span></li></ul></li><li data-dcnode-id="4210"><span data-dcnode-id="4218" instrument_node=""> In the original </span><em data-dcnode-id="4215"><a class="twikilink" data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/Gaiking" title="/pmwiki/pmwiki.php/Anime/Gaiking"><span data-dcnode-id="4217" instrument_node="">Gaiking</span></a></em><span data-dcnode-id="4214" instrument_node=""> series, the main hero Sanshiro Tsuwabuki was a baseball star until his hands were injured, forcing him out of the game. It turns out his wounds came from a murder attempt by the enemy forces, who were taking out all the prospective candidates to be Gaiking's pilot one by one; as the </span><a class="twikilink" data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoleSurvivor" title="/pmwiki/pmwiki.php/Main/SoleSurvivor"><span data-dcnode-id="4213" instrument_node="">Sole Survivor</span></a><span data-dcnode-id="4211" instrument_node=""> of the group, he got lucky enough to be recruited by Gaiking's creator.
</span></li><li data-dcnode-id="4198"><span data-dcnode-id="4209" instrument_node=""> </span><em data-dcnode-id="4206"><a class="twikilink" data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Gintama" title="/pmwiki/pmwiki.php/Manga/Gintama"><span data-dcnode-id="4208" instrument_node="">Gintama</span></a></em><span data-dcnode-id="4205" instrument_node="">: </span><span class="spoiler" data-dcnode-id="4203" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4204" instrument_node="">Sakamoto</span></span><span data-dcnode-id="4202" instrument_node=""> was once a swordsman as skillful as his comrades in the Joui War but has switched to guns in the present. That's because </span><span class="spoiler" data-dcnode-id="4200" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4201" instrument_node="">he was busy carrying an injured enemy to safety during the war when somebody —who turns out to be eventual antagonist Batou— attacked him from behind and cut right through his dominant hand, leaving it unfit to ever wield a sword again</span></span><span data-dcnode-id="4199" instrument_node="">.
</span></li><li data-dcnode-id="4177"><span data-dcnode-id="4197" instrument_node=""> </span><em data-dcnode-id="4194"><a class="twikilink" data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/GlassMask" title="/pmwiki/pmwiki.php/Manga/GlassMask"><span data-dcnode-id="4196" instrument_node="">Glass Mask</span></a></em><span data-dcnode-id="4193" instrument_node=""> has this as Chigusa Tsukikage's background, plus </span><a class="twikilink" data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerBeginning" title="/pmwiki/pmwiki.php/Main/DownerBeginning"><span data-dcnode-id="4192" instrument_node="">a flashback to it is the starting point of the OAV'</span></a><span data-dcnode-id="4190" instrument_node="">. Twenty-odd years ago, Tsukikage was performing her prized </span><em data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Crimson Goddess</span></em><span data-dcnode-id="4187" instrument_node=""> play but a stage spotlight snapped and fell on her midway through it. It resulted in </span><a class="twikilink" data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwoFaced" title="/pmwiki/pmwiki.php/Main/TwoFaced"><span data-dcnode-id="4186" instrument_node="">badly burning/injuring half of her face</span></a><span data-dcnode-id="4184" instrument_node="">, to the point that she stopped stage-acting since and switched to teaching; it also kickstarted her obsession to find the perfect actress to give her the </span><em data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Crimson Goddess</span></em><span data-dcnode-id="4181" instrument_node=""> role, which was specifically written for her by </span><a class="twikilink" data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLostLenore" title="/pmwiki/pmwiki.php/Main/TheLostLenore"><span data-dcnode-id="4180" instrument_node="">her long-lost lover</span></a><span data-dcnode-id="4178" instrument_node=""> Ichiren Osaki.
</span></li><li data-dcnode-id="4171"><span data-dcnode-id="4176" instrument_node=""> When the manga </span><em data-dcnode-id="4173"><a class="twikilink" data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/H2" title="/pmwiki/pmwiki.php/Manga/H2"><span data-dcnode-id="4175" instrument_node="">H2</span></a></em><span data-dcnode-id="4172" instrument_node=""> begins, baseball players Hiro &amp; Noda both believe they've suffered such injuries. Hiro to his arm, Noda to his back. They soon discover, though, that their supposedly great doctor was unlicensed and they are, in fact, perfectly healthy.
</span></li><li data-dcnode-id="4137"><span data-dcnode-id="4170" instrument_node=""> </span><em data-dcnode-id="4167"><a class="twikilink" data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/HajimeNoIppo" title="/pmwiki/pmwiki.php/Manga/HajimeNoIppo"><span data-dcnode-id="4169" instrument_node="">Hajime no Ippo</span></a></em><span data-dcnode-id="4166" instrument_node="">
</span><ul data-dcnode-id="4138"><li data-dcnode-id="4161"><span data-dcnode-id="4165" instrument_node=""> Nekota was forced to give up boxing </span><span class="spoiler" data-dcnode-id="4163" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4164" instrument_node="">after an illegal punch from his opponent resulted in permanent mid-brain damage and punch-drunk syndrome, although he experienced the symptoms of the latter before the fight (it was from a fight with his friendly rival Kamogawa)</span></span><span data-dcnode-id="4162" instrument_node="">.
</span></li><li data-dcnode-id="4153"><span data-dcnode-id="4160" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4155" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4159" instrument_node="">Kamogawa himself ended up going through this as well, after subjecting himself to </span><a class="twikilink" data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrainingFromHell" title="/pmwiki/pmwiki.php/Main/TrainingFromHell"><span data-dcnode-id="4158" instrument_node="">Training from Hell</span></a><span data-dcnode-id="4156" instrument_node=""> that went far beyond his physical capabilities.</span></span><span data-dcnode-id="4154" instrument_node="">
</span></li><li data-dcnode-id="4139"><span data-dcnode-id="4152" instrument_node=""> Happens more than once in the case of fighters with "glass jaws", like </span><span class="spoiler" data-dcnode-id="4150" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4151" instrument_node="">Miyata's father</span></span><span data-dcnode-id="4149" instrument_node="">, </span><span class="spoiler" data-dcnode-id="4147" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4148" instrument_node="">Nekota and Kamogawa's friend Dankichi Hama</span></span><span data-dcnode-id="4146" instrument_node=""> and </span><span class="spoiler" data-dcnode-id="4144" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4145" instrument_node="">Ryuuichi Hayami</span></span><span data-dcnode-id="4143" instrument_node="">. It's also a potential problem for </span><span class="spoiler" data-dcnode-id="4141" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4142" instrument_node="">Miyata, who's implied to have inherited his father's "glass jaw"</span></span><span data-dcnode-id="4140" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="4114"><span data-dcnode-id="4136" instrument_node=""> </span><em data-dcnode-id="4133"><a class="twikilink" data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/HugttoPrettyCure" title="/pmwiki/pmwiki.php/Anime/HugttoPrettyCure"><span data-dcnode-id="4135" instrument_node="">HuGtto! Pretty Cure</span></a></em><span data-dcnode-id="4132" instrument_node="">:
</span><ul data-dcnode-id="4115"><li data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node=""> Homare used to be an up-and-coming figure skater with a lot of potential, but a failed jump resulted in an injury that ended her career. Her injury has since healed, but she's still traumatized by it and has distanced herself from anything to do with figure skating. After becoming Cure Étoile, she returns to skating and eventually gets a gold medal in her comeback performance.
</span></li><li data-dcnode-id="4116"><span data-dcnode-id="4129" instrument_node=""> Henri's leg condition is foreshadowed to end his career as an ice skater. Ultimately </span><a class="twikilink" data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZagged" title="/pmwiki/pmwiki.php/Main/ZigZagged"><span data-dcnode-id="4128" instrument_node="">Zig-Zagged</span></a><span data-dcnode-id="4126" instrument_node=""> when his leg is broken due to </span><span class="spoiler" data-dcnode-id="4118" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4125" instrument_node="">an unrelated car accident. Then he gets a </span><a class="twikilink" data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisabilityNegatingSuperpower" title="/pmwiki/pmwiki.php/Main/DisabilityNegatingSuperpower"><span data-dcnode-id="4124" instrument_node="">Disability-Negating Superpower</span></a><span data-dcnode-id="4122" instrument_node=""> and performs one final skating performance. However </span><a class="twikilink" data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperpowersForADay" title="/pmwiki/pmwiki.php/Main/SuperpowersForADay"><span data-dcnode-id="4121" instrument_node="">the superpower doesn't last</span></a><span data-dcnode-id="4119" instrument_node=""> and he is seen in a wheelchair after that</span></span><span data-dcnode-id="4117" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="4083"><span data-dcnode-id="4113" instrument_node=""> </span><em data-dcnode-id="4110"><a class="twikilink" data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/MagicalDoremi" title="/pmwiki/pmwiki.php/Anime/MagicalDoremi"><span data-dcnode-id="4112" instrument_node="">Magical Doremi</span></a></em><span data-dcnode-id="4109" instrument_node="">:
</span><ul data-dcnode-id="4084"><li data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node=""> Doremi and Poppu's mother Haruka was a prospect piano player, but got a severe hand injury and had to give it up.
</span></li><li data-dcnode-id="4085"><span data-dcnode-id="4106" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4104" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4105" instrument_node=""> Onpu's mother Miho</span></span><span data-dcnode-id="4103" instrument_node=""> once was a promising </span><span class="spoiler" data-dcnode-id="4099" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IdolSinger" title="/pmwiki/pmwiki.php/Main/IdolSinger"><span data-dcnode-id="4102" instrument_node="">Idol Singer</span></a><span data-dcnode-id="4100" instrument_node=""> in training</span></span><span data-dcnode-id="4098" instrument_node=""> but during an audition, she took a severe </span><a class="twikilink" data-dcnode-id="4096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StaircaseTumble" title="/pmwiki/pmwiki.php/Main/StaircaseTumble"><span data-dcnode-id="4097" instrument_node="">Staircase Tumble</span></a><span data-dcnode-id="4095" instrument_node=""> and the wounds she sustained forced her to retire. </span><span class="spoiler" data-dcnode-id="4087" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4094" instrument_node="">This is why she's a borderline </span><a class="twikilink" data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StageMom" title="/pmwiki/pmwiki.php/Main/StageMom"><span data-dcnode-id="4093" instrument_node="">Stage Mom</span></a><span data-dcnode-id="4091" instrument_node=""> to Onpu: her kid is naturally talented and likes the spotlight, but in practice, Miho is reliving her </span><a class="twikilink" data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TragicDream" title="/pmwiki/pmwiki.php/Main/TragicDream"><span data-dcnode-id="4090" instrument_node="">tragically lost dreams</span></a><span data-dcnode-id="4088" instrument_node=""> through her.</span></span><span data-dcnode-id="4086" instrument_node="">
</span></li></ul></li><li data-dcnode-id="4071"><span data-dcnode-id="4082" instrument_node=""> Eva from </span><em data-dcnode-id="4079"><a class="twikilink" data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/Memories" title="/pmwiki/pmwiki.php/Anime/Memories"><span data-dcnode-id="4081" instrument_node="">Magnetic Rose</span></a></em><span data-dcnode-id="4078" instrument_node=""> was an opera star who lost her voice at the peak of her career. This left her a </span><a class="twikilink" data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBird" title="/pmwiki/pmwiki.php/Main/BrokenBird"><span data-dcnode-id="4077" instrument_node="">Broken Bird</span></a><span data-dcnode-id="4075" instrument_node=""> and ultimately a </span><a class="twikilink" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhiteDwarfStarlet" title="/pmwiki/pmwiki.php/Main/WhiteDwarfStarlet"><span data-dcnode-id="4074" instrument_node="">White-Dwarf Starlet</span></a><span data-dcnode-id="4072" instrument_node="">.
</span></li><li data-dcnode-id="4048"><span data-dcnode-id="4070" instrument_node=""> </span><em data-dcnode-id="4067"><a class="twikilink" data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/MegaloBox" title="/pmwiki/pmwiki.php/Anime/MegaloBox"><span data-dcnode-id="4069" instrument_node="">Megalo Box</span></a></em><span data-dcnode-id="4066" instrument_node="">:
</span><ul data-dcnode-id="4049"><li data-dcnode-id="4058"><span data-dcnode-id="4065" instrument_node=""> Subverted by Aragaki: His ring name is "Stayin' Alive" because he was able to return to boxing despite having lost his legs after having them replaced by prostetics. </span><span class="spoiler" data-dcnode-id="4060" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4064" instrument_node="">Double subverted as it's revealed actively boxing is too demanding on his legs and he has to retire before he's left permanently unable to move: His match with Joe was </span><a class="twikilink" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLastDance" title="/pmwiki/pmwiki.php/Main/TheLastDance"><span data-dcnode-id="4063" instrument_node="">The Last Dance</span></a><span data-dcnode-id="4061" instrument_node=""> for him and he retires afterwards.</span></span><span data-dcnode-id="4059" instrument_node="">
</span></li><li data-dcnode-id="4050"><span data-dcnode-id="4057" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4055" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4056" instrument_node="">Yuri</span></span><span data-dcnode-id="4054" instrument_node=""> is shown after the </span><a class="twikilink" data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeSkip" title="/pmwiki/pmwiki.php/Main/TimeSkip"><span data-dcnode-id="4053" instrument_node="">Time Skip</span></a><span data-dcnode-id="4051" instrument_node=""> to be wheelchair-bound and retired as a result of his final match.
</span></li></ul></li><li data-dcnode-id="4003"><span data-dcnode-id="4047" instrument_node=""> </span><em data-dcnode-id="4044"><a class="twikilink" data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/MyHeroAcademia" title="/pmwiki/pmwiki.php/Manga/MyHeroAcademia"><span data-dcnode-id="4046" instrument_node="">My Hero Academia</span></a></em><span data-dcnode-id="4043" instrument_node="">:
</span><ul data-dcnode-id="4004"><li data-dcnode-id="4026"><span data-dcnode-id="4042" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FirstEpisodeTwist" title="/pmwiki/pmwiki.php/Main/FirstEpisodeTwist"><span data-dcnode-id="4041" instrument_node="">First-Episode Twist</span></a><span data-dcnode-id="4039" instrument_node=""> is that </span><a class="twikilink" data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCape" title="/pmwiki/pmwiki.php/Main/TheCape"><span data-dcnode-id="4038" instrument_node="">All Might</span></a><span data-dcnode-id="4036" instrument_node=""> suffered a major injury fighting a certain villain in the past, leaving him severely weakened. He chooses the main character, Izuku, as the recipient of his </span><a class="twikilink" data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BequeathedPower" title="/pmwiki/pmwiki.php/Main/BequeathedPower"><span data-dcnode-id="4035" instrument_node="">Bequeathed Power</span></a><span data-dcnode-id="4033" instrument_node="">, though he remains active in order to help train him. </span><span class="spoiler" data-dcnode-id="4028" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4032" instrument_node="">He's finally forced to retire after another fight with </span><a class="twikilink" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PredecessorVillain" title="/pmwiki/pmwiki.php/Main/PredecessorVillain"><span data-dcnode-id="4031" instrument_node="">All For One</span></a><span data-dcnode-id="4029" instrument_node=""> leaves him unable to use his powers for more than a few seconds at a time.</span></span><span data-dcnode-id="4027" instrument_node="">
</span></li><li data-dcnode-id="4015"><span data-dcnode-id="4025" instrument_node=""> Also happens to </span><span class="spoiler" data-dcnode-id="4023" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4024" instrument_node="">Iida's brother Tensei</span></span><span data-dcnode-id="4022" instrument_node="">, who's left paralyzed from the waist down after an encounter with </span><a class="twikilink" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="4021" instrument_node="">Stain</span></a><span data-dcnode-id="4019" instrument_node=""> the </span><a class="twikilink" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroKiller" title="/pmwiki/pmwiki.php/Main/HeroKiller"><span data-dcnode-id="4018" instrument_node="">Hero Killer</span></a><span data-dcnode-id="4016" instrument_node="">. It's noted that many other Pro Heroes suffered the same fate.
</span></li><li data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node=""> Almost happens to Izuku: being unused to One For All's full power, attempting to use 100% of his quirk causes serious injuries to his limbs. On one occasion when fighting Muscular, he uses 100% power on one of his already broken arms. He is warned that if he continues to use his power so recklessly, he could potentially completely lose the use of his arms, thus forcing Izuku to rethink his fighting style.
</span></li><li data-dcnode-id="4005"><span data-dcnode-id="4012" instrument_node=""> Another hero plays with the trope: </span><span class="spoiler" data-dcnode-id="4007" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4011" instrument_node="">after Ragdoll of the Wild Wild Pussycats team got her Quirk stolen, her career as an active hero went up in smoke. However, when the team made their return, Ragdoll became a </span><a class="twikilink" data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissionControl" title="/pmwiki/pmwiki.php/Main/MissionControl"><span data-dcnode-id="4010" instrument_node="">Mission Control</span></a><span data-dcnode-id="4008" instrument_node=""> a la Oracle, still helping her teammates as much as she can</span></span><span data-dcnode-id="4006" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="3994"><span data-dcnode-id="4002" instrument_node=""> </span><em data-dcnode-id="3999"><a class="twikilink" data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Naruto" title="/pmwiki/pmwiki.php/Manga/Naruto"><span data-dcnode-id="4001" instrument_node="">Naruto</span></a></em><span data-dcnode-id="3998" instrument_node="">: Near the end of the series, </span><span class="spoiler" data-dcnode-id="3996" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3997" instrument_node="">Might Guy</span></span><span data-dcnode-id="3995" instrument_node=""> retires as a ninja after he becomes wheelchair-bound.
</span></li><li data-dcnode-id="3985"><span data-dcnode-id="3993" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3991" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3992" instrument_node=""> Shinobu</span></span><span data-dcnode-id="3990" instrument_node=""> in </span><em data-dcnode-id="3987"><a class="twikilink" data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/PrincessArmy" title="/pmwiki/pmwiki.php/Manga/PrincessArmy"><span data-dcnode-id="3989" instrument_node="">Princess Army</span></a></em><span data-dcnode-id="3986" instrument_node=""> suffers from this after receiving a spinal injury that prevented him from practicing judo.
</span></li><li data-dcnode-id="3979"><span data-dcnode-id="3984" instrument_node=""> In </span><em data-dcnode-id="3981"><a class="twikilink" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/ProfessorLaytonAndTheEternalDiva" title="/pmwiki/pmwiki.php/Anime/ProfessorLaytonAndTheEternalDiva"><span data-dcnode-id="3983" instrument_node="">Professor Layton and the Eternal Diva</span></a></em><span data-dcnode-id="3980" instrument_node="">, one of the competitors is a famous British football player who fears that his recent injury will become one of these, which is why he's after the secret to eternal life.
</span></li><li data-dcnode-id="3954"><span data-dcnode-id="3978" instrument_node=""> In </span><em data-dcnode-id="3974"><a class="twikilink" data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/PuellaMagiMadokaMagica" title="/pmwiki/pmwiki.php/Anime/PuellaMagiMadokaMagica"><span data-dcnode-id="3977" instrument_node="">Puella Magi Madoka Magica</span></a><span data-dcnode-id="3975" instrument_node="">,</span></em><span data-dcnode-id="3973" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActionGirl" title="/pmwiki/pmwiki.php/Main/ActionGirl"><span data-dcnode-id="3972" instrument_node="">Sayaka</span></a><span data-dcnode-id="3970" instrument_node="">'s </span><a class="twikilink" data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChildhoodFriendRomance" title="/pmwiki/pmwiki.php/Main/ChildhoodFriendRomance"><span data-dcnode-id="3969" instrument_node="">childhood friend</span></a><span data-dcnode-id="3967" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisabledLoveInterest" title="/pmwiki/pmwiki.php/Main/DisabledLoveInterest"><span data-dcnode-id="3966" instrument_node="">Kyosuke</span></a><span data-dcnode-id="3964" instrument_node=""> is a violin prodigy, until a hand injury rendered him unable to play. His intense depression (up to an </span><a class="twikilink" data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterruptedSuicide" title="/pmwiki/pmwiki.php/Main/InterruptedSuicide"><span data-dcnode-id="3963" instrument_node="">Interrupted Suicide</span></a><span data-dcnode-id="3961" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/PuellaMagiMadokaMagicaPortable" title="/pmwiki/pmwiki.php/VideoGame/PuellaMagiMadokaMagicaPortable"><span data-dcnode-id="3960" instrument_node="">the portable game</span></a><span data-dcnode-id="3958" instrument_node="">) prompts Sayaka's </span><a class="twikilink" data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DealWithTheDevil" title="/pmwiki/pmwiki.php/Main/DealWithTheDevil"><span data-dcnode-id="3957" instrument_node="">contract</span></a><span data-dcnode-id="3955" instrument_node=""> to heal him.
</span></li><li data-dcnode-id="3948"><span data-dcnode-id="3953" instrument_node=""> </span><em data-dcnode-id="3950"><a class="twikilink" data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Rideback" title="/pmwiki/pmwiki.php/Manga/Rideback"><span data-dcnode-id="3952" instrument_node="">Rideback</span></a></em><span data-dcnode-id="3949" instrument_node="">: Rin gives up being a ballerina due to physical (and mental) injuries caused by a fall.
</span></li><li data-dcnode-id="3919"><span data-dcnode-id="3947" instrument_node=""> </span><em data-dcnode-id="3944"><a class="twikilink" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/RurouniKenshin" title="/pmwiki/pmwiki.php/Manga/RurouniKenshin"><span data-dcnode-id="3946" instrument_node="">Rurouni Kenshin</span></a></em><span data-dcnode-id="3943" instrument_node="">, being a series about sword-fighting, has several examples, as well as aversions:
</span><ul data-dcnode-id="3920"><li data-dcnode-id="3938"><span data-dcnode-id="3942" instrument_node=""> Discussed with Yuutaro, the second student of the revived Kamiya Kasshin School, who ends up in the way of one of Raijuta's air-slicing attacks that severs the tendons in his sword-arm. While Kaoru and Yahiko mourn the loss of their promising junior, Yuutaro himself declares that if he can't use his right hand anymore, he'll use his left instead...and his rich dad is willing to send him to doctors in Germany to try and repair his right arm anyway. A brief glance at the dojo's wall in the </span><a class="twikilink" data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistantFinale" title="/pmwiki/pmwiki.php/Main/DistantFinale"><span data-dcnode-id="3941" instrument_node="">Distant Finale</span></a><span data-dcnode-id="3939" instrument_node=""> shows Yuutaro listed as a junior instructor.
</span></li><li data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node=""> The Meiji government tried to invoke this on Makoto Shishio, Kenshin's successor as Manslayer because they feared his ambition. They jumped him at night, knocked him out, and burned him alive. That certainly ended his old career. Unfortunately for the government, it just made Shishio angry…
</span></li><li data-dcnode-id="3931"><span data-dcnode-id="3935" instrument_node=""> At the beginning of the "Jinchuu" arc, a flashback shows that near the end of the civil war, Kenshin fought a massive samurai working for the Shogunate and cut off his sword hand. When the samurai demanded Kenshin kill him because of this, Kenshin refused. The samurai did </span><em data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">not</span></em><span data-dcnode-id="3932" instrument_node=""> take the mercy well, and carried a grudge for years.
</span></li><li data-dcnode-id="3926"><span data-dcnode-id="3930" instrument_node=""> In the finale, </span><span class="spoiler" data-dcnode-id="3928" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3929" instrument_node="">Kenshin's career as a swordsman is brought to an end because his fragile build couldn't keep up with the demands of his sword style, resulting in irreparable damage to his muscle tissue. He's just fine with this, however, since he's brought closure to his past and wishes to settle down with Kaoru</span></span><span data-dcnode-id="3927" instrument_node="">.
</span></li><li data-dcnode-id="3921"><span data-dcnode-id="3925" instrument_node=""> Anime-only example: In the first episode, Gohei Hiruma was a former student at the Kamiya Kasshin dojo who harassed and was overly violent towards the other students. In retaliation, Kaoru's father shattered Gohei's right thumb, specifically mentioning this trope as the reason. It doesn't take, as Gohei learns to fight left-handed – which is what clues Kenshin into having Kaoru check her father's old records. During their fight, Kenshin shatters the knuckles on Gohei's </span><em data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">left</span></em><span data-dcnode-id="3922" instrument_node=""> hand, ensuring that he can never hold a sword again.
</span></li></ul></li><li data-dcnode-id="3904"><span data-dcnode-id="3918" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LegacyCharacter" title="/pmwiki/pmwiki.php/Main/LegacyCharacter"><span data-dcnode-id="3917" instrument_node="">Before he became Yakumo the 8th</span></a><span data-dcnode-id="3915" instrument_node="">, Bon of </span><em data-dcnode-id="3912"><a class="twikilink" data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/ShouwaGenrokuRakugoShinjuu" title="/pmwiki/pmwiki.php/Manga/ShouwaGenrokuRakugoShinjuu"><span data-dcnode-id="3914" instrument_node="">Shouwa Genroku Rakugo Shinjuu</span></a></em><span data-dcnode-id="3911" instrument_node=""> had an injury that caused him to limp and use a cane from a young age. His mother, a </span><a class="twikilink" data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Geisha" title="/pmwiki/pmwiki.php/Main/Geisha"><span data-dcnode-id="3910" instrument_node="">Geisha</span></a><span data-dcnode-id="3908" instrument_node="">, handed him over to Yakumo the 7th, a rakugo master, as a result of this injury since said injury caused him to be unable to dance. However, since </span><a class="twikilink" data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Geisha" title="/pmwiki/pmwiki.php/Main/Geisha"><span data-dcnode-id="3907" instrument_node="">Geisha</span></a><span data-dcnode-id="3905" instrument_node=""> are exclusively women, Bon would have had to look for a different career anyway.
</span></li><li data-dcnode-id="3898"><span data-dcnode-id="3903" instrument_node=""> </span><em data-dcnode-id="3900"><a class="twikilink" data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/TigerAndBunny" title="/pmwiki/pmwiki.php/Anime/TigerAndBunny"><span data-dcnode-id="3902" instrument_node="">Tiger &amp; Bunny</span></a></em><span data-dcnode-id="3899" instrument_node="">: Superpowers in this series are like muscles; practice using them and you gain stronger powers, but overtax them and they'll burn themselves out faster, or even permanently break.
</span></li><li data-dcnode-id="3880"><span data-dcnode-id="3897" instrument_node=""> In </span><em data-dcnode-id="3894"><a class="twikilink" data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/TokyoGhoul" title="/pmwiki/pmwiki.php/Manga/TokyoGhoul"><span data-dcnode-id="3896" instrument_node="">Tokyo Ghoul</span></a></em><span data-dcnode-id="3893" instrument_node="">, losing a limb in battle is pretty much the end of an Investigator's career. It's mentioned that the veterans' old commander, Iba, was forced to retire after losing his arm in battle with the Owl. A decade later, </span><span class="spoiler" data-dcnode-id="3891" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3892" instrument_node="">Kuroiwa</span></span><span data-dcnode-id="3890" instrument_node=""> suffers the same fate. However, the sequel reveals that this was averted by </span><span class="spoiler" data-dcnode-id="3888" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3889" instrument_node="">Juuzou</span></span><span data-dcnode-id="3887" instrument_node=""> — though he lost his right leg in the final battle, he's still going </span><a class="twikilink" data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandicappedBadass" title="/pmwiki/pmwiki.php/Main/HandicappedBadass"><span data-dcnode-id="3886" instrument_node="">strong</span></a><span data-dcnode-id="3884" instrument_node=""> thanks to a fancy </span><a class="twikilink" data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialLimbs" title="/pmwiki/pmwiki.php/Main/ArtificialLimbs"><span data-dcnode-id="3883" instrument_node="">prosthetic</span></a><span data-dcnode-id="3881" instrument_node=""> leg.
</span></li><li data-dcnode-id="3874"><span data-dcnode-id="3879" instrument_node=""> </span><em data-dcnode-id="3876"><a class="twikilink" data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/VividStrike" title="/pmwiki/pmwiki.php/Anime/VividStrike"><span data-dcnode-id="3878" instrument_node="">ViVid Strike!</span></a></em><span data-dcnode-id="3875" instrument_node="">: It's mentioned in passing that Jill's career as a competitive fighter ended because of an unspecified injury she suffered in training.
</span></li><li data-dcnode-id="3862"><span data-dcnode-id="3873" instrument_node=""> Itsuki from </span><em data-dcnode-id="3870"><a class="twikilink" data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/YukiYunaIsAHero" title="/pmwiki/pmwiki.php/Anime/YukiYunaIsAHero"><span data-dcnode-id="3872" instrument_node="">Yuki Yuna is a Hero</span></a></em><span data-dcnode-id="3869" instrument_node=""> wanted to become a singer however halfway through the series </span><span class="spoiler" data-dcnode-id="3867" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3868" instrument_node="">she becomes mute</span></span><span data-dcnode-id="3866" instrument_node="">. </span><span class="spoiler" data-dcnode-id="3864" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3865" instrument_node="">Subverted eventually, as she is cured in the final episode.</span></span><span data-dcnode-id="3863" instrument_node="">
</span></li></ul></div><span data-dcnode-id="3859" instrument_node="">
</span><p data-dcnode-id="3858"></p><div class="folderlabel" data-dcnode-id="3856" onclick="togglefolder('folder1');"><span data-dcnode-id="3857" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Books&nbsp;</span></div><div class="folder" data-dcnode-id="3694" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="3855" instrument_node="">
</span><ul data-dcnode-id="3695"><li data-dcnode-id="3839"><span data-dcnode-id="3854" instrument_node=""> </span><em data-dcnode-id="3850"><a class="twikilink" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/BatmanGordonOfGotham" title="/pmwiki/pmwiki.php/ComicBook/BatmanGordonOfGotham"><span data-dcnode-id="3853" instrument_node="">Batman: Gordon of Gotham</span></a><span data-dcnode-id="3851" instrument_node="">:</span></em><span data-dcnode-id="3849" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3847" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3848" instrument_node="">Detective Soong</span></span><span data-dcnode-id="3846" instrument_node=""> faces possible mandatory retirement when he loses a kidney after </span><a class="twikilink" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="3845" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="3843" instrument_node=""> for </span><span class="spoiler" data-dcnode-id="3841" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3842" instrument_node="">Bullock</span></span><span data-dcnode-id="3840" instrument_node="">.
</span></li><li data-dcnode-id="3833"><span data-dcnode-id="3838" instrument_node=""> Ballistic of </span><em data-dcnode-id="3835"><a class="twikilink" data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Cyberforce" title="/pmwiki/pmwiki.php/ComicBook/Cyberforce"><span data-dcnode-id="3837" instrument_node="">Cyberforce</span></a></em><span data-dcnode-id="3834" instrument_node=""> was the ace pitcher of her state champion high school baseball team (yes, playing with and against boys). She was likely bound for the big leagues until an abusive boyfriend left her with a paralyzed throwing arm.
</span></li><li data-dcnode-id="3827"><span data-dcnode-id="3832" instrument_node=""> </span><em data-dcnode-id="3829"><a class="twikilink" data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/DoctorStrange" title="/pmwiki/pmwiki.php/Comicbook/DoctorStrange"><span data-dcnode-id="3831" instrument_node="">Doctor Strange</span></a></em><span data-dcnode-id="3828" instrument_node="">: Stephen Strange was a gifted surgeon who lost the dexterity in his hands in a car accident. His quest for a cure eventually led him to the Ancient One, who taught him the mystic arts.
</span></li><li data-dcnode-id="3813"><span data-dcnode-id="3826" instrument_node=""> One </span><em data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Elseworlds</span></em><span data-dcnode-id="3823" instrument_node=""> story called </span><em data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Flashpoint</span></em><span data-dcnode-id="3820" instrument_node=""> (Not to be confused with the </span><a class="twikilink" data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrisisCrossover" title="/pmwiki/pmwiki.php/Main/CrisisCrossover"><span data-dcnode-id="3819" instrument_node="">Crisis Crossover</span></a><span data-dcnode-id="3817" instrument_node=""> of the same name) centers around </span><a class="twikilink" data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheFlash" title="/pmwiki/pmwiki.php/Franchise/TheFlash"><span data-dcnode-id="3816" instrument_node="">The Flash</span></a><span data-dcnode-id="3814" instrument_node=""> taking the bullet for JFK, an act that causes him to be paralyzed from the neck down. This, of course, ends his career as the Scarlet Speedster.
</span></li><li data-dcnode-id="3801"><span data-dcnode-id="3812" instrument_node=""> Subverted with Pizzazz from </span><em data-dcnode-id="3809"><a class="twikilink" data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/JemAndTheHologramsIDW" title="/pmwiki/pmwiki.php/ComicBook/JemAndTheHologramsIDW"><span data-dcnode-id="3811" instrument_node="">Jem and the Holograms (IDW)</span></a></em><span data-dcnode-id="3808" instrument_node="">. She is the lead singer of a metal band. In one issue she gets into a car accident, which breaks her larynx. She's left out of work for several issues and the band gets up temporarily replacing her. Ultimately, however, Pizazz recovers. </span><span class="spoiler" data-dcnode-id="3803" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3807" instrument_node="">Their replacement, Blaze, ends up </span><a class="twikilink" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SixthRanger" title="/pmwiki/pmwiki.php/Main/SixthRanger"><span data-dcnode-id="3806" instrument_node="">permanently joining the band</span></a><span data-dcnode-id="3804" instrument_node="">.</span></span><span data-dcnode-id="3802" instrument_node="">
</span></li><li data-dcnode-id="3795"><span data-dcnode-id="3800" instrument_node=""> In </span><em data-dcnode-id="3797"><a class="twikilink" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/JusticeSocietyOfAmerica" title="/pmwiki/pmwiki.php/ComicBook/JusticeSocietyOfAmerica"><span data-dcnode-id="3799" instrument_node="">Justice Society of America</span></a></em><span data-dcnode-id="3796" instrument_node="">, Citizen Steel had hoped to become a professional football player, but suffered a severe leg injury that caused his leg to be amputated below the knee. Eventually, comic-book stuff enabled him to grow a new, unbreakable leg (and nearly unbreakable body), although it still doesn't help him go back to playing football since he's now too heavy to run.
</span></li><li data-dcnode-id="3781"><span data-dcnode-id="3794" instrument_node=""> </span><em data-dcnode-id="3791"><a class="twikilink" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Batgirl" title="/pmwiki/pmwiki.php/ComicBook/Batgirl"><span data-dcnode-id="3793" instrument_node="">Batgirl</span></a></em><span data-dcnode-id="3790" instrument_node="">: Barbara Gordon was shot by the Joker and paralyzed in </span><em data-dcnode-id="3787"><a class="twikilink" data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheKillingJoke" title="/pmwiki/pmwiki.php/ComicBook/TheKillingJoke"><span data-dcnode-id="3789" instrument_node="">The Killing Joke</span></a></em><span data-dcnode-id="3786" instrument_node="">. Her paralysis ended her career as Batgirl until her solo series </span><em data-dcnode-id="3783"><a class="twikilink" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Batgirl2011" title="/pmwiki/pmwiki.php/ComicBook/Batgirl2011"><span data-dcnode-id="3785" instrument_node="">Batgirl (2011)</span></a></em><span data-dcnode-id="3782" instrument_node="">, 23 years later.
</span></li><li data-dcnode-id="3763"><span data-dcnode-id="3780" instrument_node=""> </span><em data-dcnode-id="3777"><a class="twikilink" data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/MyLittlePonyFriendshipIsMagicIDW" title="/pmwiki/pmwiki.php/ComicBook/MyLittlePonyFriendshipIsMagicIDW"><span data-dcnode-id="3779" instrument_node="">My Little Pony: Friendship Is Magic (IDW)</span></a></em><span data-dcnode-id="3776" instrument_node="">: "</span><a class="twikilink" data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/MyLittlePonyFriendshipIsMagicIDWIssue67To68" title="/pmwiki/pmwiki.php/Recap/MyLittlePonyFriendshipIsMagicIDWIssue67To68"><span data-dcnode-id="3775" instrument_node="">Tempest's Tale (Issues 67 and 68)</span></a><span data-dcnode-id="3773" instrument_node="">" expands on Tempest's backstory from the </span><a class="twikilink" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyTheMovie2017" title="/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyTheMovie2017"><span data-dcnode-id="3772" instrument_node="">2017 movie which introduced her</span></a><span data-dcnode-id="3770" instrument_node="">. It has her set to go to Celestia's School for Gifted Unicorns with her childhood friends before losing her horn to an Ursa Minor (and thus being rendered unable to cast spells normally).</span><span class="notelabel" data-dcnode-id="3767" onclick="togglenote('note0fjc4');" style="cursor: pointer;"><sup data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3765" id="note0fjc4" isnote="true" onclick="togglenote('note0fjc4');" style="display: none; cursor: pointer;"><span data-dcnode-id="3766" instrument_node="">The movie focused exclusively on her friends abandoning her after the incident, heavily implying that her obsession with getting her horn fixed was more about being normal for the sake of being normal than doing anything magic-related with her life.</span></span><span data-dcnode-id="3764" instrument_node="">
</span></li><li data-dcnode-id="3757"><span data-dcnode-id="3762" instrument_node=""> In </span><em data-dcnode-id="3759"><a class="twikilink" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/NFLSuperpro" title="/pmwiki/pmwiki.php/ComicBook/NFLSuperpro"><span data-dcnode-id="3761" instrument_node="">NFL SuperPro</span></a></em><span data-dcnode-id="3758" instrument_node="">, Phil Grayfield dreamed of becoming a professional football player before wrecking his knee in an accident.
</span></li><li data-dcnode-id="3741"><span data-dcnode-id="3756" instrument_node=""> </span><em data-dcnode-id="3753"><a class="twikilink" data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheOrder" title="/pmwiki/pmwiki.php/ComicBook/TheOrder"><span data-dcnode-id="3755" instrument_node="">The Order</span></a></em><span data-dcnode-id="3752" instrument_node="">:
</span><ul data-dcnode-id="3742"><li data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node=""> "Calamity" James Wa was a track and baseball star throughout high school and into his college years, due to his phenomenal running speed. He was even on the cover of Sports Illustrated, referred to as "the boy most likely to succeed." Not long after, he lost his legs in a car accident.
</span></li><li data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node=""> Milo Fields, a former soldier who was shot through the spine after becoming an anti-war protester.
</span></li><li data-dcnode-id="3743"><span data-dcnode-id="3747" instrument_node=""> Daniel Michael Murray, a former warrant officer who was paralyzed in the same attack that led to Tony Stark becoming </span><a class="twikilink" data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/IronMan" title="/pmwiki/pmwiki.php/ComicBook/IronMan"><span data-dcnode-id="3746" instrument_node="">Iron Man</span></a><span data-dcnode-id="3744" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="3735"><span data-dcnode-id="3740" instrument_node=""> </span><em data-dcnode-id="3737"><a class="twikilink" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/PunisherNoir" title="/pmwiki/pmwiki.php/ComicBook/PunisherNoir"><span data-dcnode-id="3739" instrument_node="">Punisher: Noir</span></a></em><span data-dcnode-id="3736" instrument_node="">: Mobster Dutch Schultz punishes his underlings for their failures by chopping off one of their fingers. One of these is eventually relegated to serving drinks since he no longer has trigger fingers, and when it's pointed out missing fingers also makes him less than skillful at pouring, Schultz just shoots him.
</span></li><li data-dcnode-id="3729"><span data-dcnode-id="3734" instrument_node=""> </span><em data-dcnode-id="3731"><a class="twikilink" data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Robin1993" title="/pmwiki/pmwiki.php/ComicBook/Robin1993"><span data-dcnode-id="3733" instrument_node="">Robin (1993)</span></a></em><span data-dcnode-id="3730" instrument_node="">: Johnny Warren flips out yelling that he's ruined and can't continue his work anymore when his refusal to listen to Robin's warning about what he just did to Johnny's gun causes him to blow his own hand up. Since his work is torturing and killing people Robin's not too upset, and unfortunately, Johnny doesn't stay out of work for long since he gains superpowers soon after.
</span></li><li data-dcnode-id="3723"><span data-dcnode-id="3728" instrument_node=""> </span><em data-dcnode-id="3725"><a class="createlink" data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/RoyOfTheRovers" title="/pmwiki/pmwiki.php/ComicBook/RoyOfTheRovers"><span data-dcnode-id="3727" instrument_node="">Roy Of The Rovers</span></a></em><span data-dcnode-id="3724" instrument_node="">: The titular character was forced to end his playing career after a helicopter crash that cost him his left foot.
</span></li><li data-dcnode-id="3714"><span data-dcnode-id="3722" instrument_node=""> </span><em data-dcnode-id="3719"><a class="twikilink" data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Silverblade" title="/pmwiki/pmwiki.php/ComicBook/Silverblade"><span data-dcnode-id="3721" instrument_node="">Silverblade</span></a></em><span data-dcnode-id="3718" instrument_node="">: In 1939, Vincent Vermillion was a 10-year-old child extra on the set of </span><em data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">The Silver Blade</span></em><span data-dcnode-id="3715" instrument_node=""> who dreamed of being the next Fred Astaire. He agreed to stunt double for child star Bobby Milestone to earn extra money for dance lessons. However, the safety net snapped and he plunged 40 ft into a 2 ft deep moat, shattering his pelvis and breaking both his legs. As a result, he could never dance again.
</span></li><li data-dcnode-id="3708"><span data-dcnode-id="3713" instrument_node=""> </span><em data-dcnode-id="3710"><a class="twikilink" data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/SpiderMan" title="/pmwiki/pmwiki.php/ComicBook/SpiderMan"><span data-dcnode-id="3712" instrument_node="">Spider-Man</span></a></em><span data-dcnode-id="3709" instrument_node="">: Curt Connors was a battlefield surgeon with the US Army before losing his right arm to an explosion, which led to him becoming a scientist trying to regenerate his arm and eventually turning into the Lizard.
</span></li><li data-dcnode-id="3696"><span data-dcnode-id="3707" instrument_node=""> </span><em data-dcnode-id="3704"><a class="twikilink" data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Uber" title="/pmwiki/pmwiki.php/ComicBook/Uber"><span data-dcnode-id="3706" instrument_node="">Über</span></a></em><span data-dcnode-id="3703" instrument_node="">: Maria "Katyusha" Andreevna was a fearsome Soviet sniper until she lost her right hand in action and for a time, lamented that she was completely done. When she was augmented into a </span><a class="twikilink" data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSoldier" title="/pmwiki/pmwiki.php/Main/SuperSoldier"><span data-dcnode-id="3702" instrument_node="">Halo Battleship</span></a><span data-dcnode-id="3700" instrument_node="">, she regrew her hand as a side-effect, even though she </span><a class="twikilink" data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeBeams" title="/pmwiki/pmwiki.php/Main/EyeBeams"><span data-dcnode-id="3699" instrument_node="">didn't need it to be a sniper any more</span></a><span data-dcnode-id="3697" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="3693" instrument_node="">
</span><p data-dcnode-id="3692"></p><div class="folderlabel" data-dcnode-id="3690" onclick="togglefolder('folder2');"><span data-dcnode-id="3691" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Strips&nbsp;</span></div><div class="folder" data-dcnode-id="3666" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="3689" instrument_node="">
</span><ul data-dcnode-id="3667"><li data-dcnode-id="3680"><span data-dcnode-id="3688" instrument_node=""> Downplayed in </span><em data-dcnode-id="3685"><a class="twikilink" data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/SafeHavens" title="/pmwiki/pmwiki.php/ComicStrip/SafeHavens"><span data-dcnode-id="3687" instrument_node="">Safe Havens</span></a></em><span data-dcnode-id="3684" instrument_node="">: after multiple injuries to it over the years, the ligaments of Dave's left knee completely snapped during his final college game (while scoring the championship-winning point, no less). While he was still able to play basketball, that knee injury basically killed any chance he had of playing in the NBA, thanks to the demanding schedule being too strenuous on his knee. He eventually made a career playing for an Italian basketball team (with a much less demanding schedule), leading them to several championships </span><span class="spoiler" data-dcnode-id="3682" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3683" instrument_node=""> and winning gold in the 2016 Summer Olympics on Team USA's men's basketball team</span></span><span data-dcnode-id="3681" instrument_node="">.
</span></li><li data-dcnode-id="3674"><span data-dcnode-id="3679" instrument_node=""> </span><em data-dcnode-id="3676"><a class="twikilink" data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/TheFarSide" title="/pmwiki/pmwiki.php/ComicStrip/TheFarSide"><span data-dcnode-id="3678" instrument_node="">The Far Side</span></a></em><span data-dcnode-id="3675" instrument_node="">: One cartoon features the caption: "Unbeknownst to most historians, Einstein started down the road of professional basketball before an ankle injury diverted him to science."
</span></li><li data-dcnode-id="3668"><span data-dcnode-id="3673" instrument_node=""> </span><em data-dcnode-id="3670"><a class="twikilink" data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/Striker" title="/pmwiki/pmwiki.php/ComicStrip/Striker"><span data-dcnode-id="3672" instrument_node="">Striker</span></a></em><span data-dcnode-id="3669" instrument_node="">: Nick Jarvis was forced to end his career when a shark bit his leg. He just barely avoided amputation.
