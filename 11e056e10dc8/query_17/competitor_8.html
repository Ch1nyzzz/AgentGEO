</span><ul data-dcnode-id="1849"><li data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node=""> One of the major reasons for the rift between Tomoya and his father is the fact that after an argument between them turned physical, Tomoya suffered an injury that leaves him unable to lift his right arm higher than his shoulder. This left him unable to play basketball effectively, one of his greatest hobbies. Tomoya's father appears to be deeply remorseful about this, but has no clue how to try to approach his son afterward.
</span></li><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node=""> Kappei is introduced as a guy that loves running. Though he isn't on an actual team, running brings him the greatest enjoyment out of life. Late in his route, however, he learns that he has cancer in his leg and it has to be amputated. This leaves him in a deep depression, bad enough that he looks to be contemplating suicide, and trying to find a way to snap him out of it forms the crux of the route's climax.
</span></li></ul></li><li data-dcnode-id="1842"><span data-dcnode-id="1847" instrument_node=""> Averted with the protagonist of </span><em data-dcnode-id="1844"><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/DoubleHomework" title="/pmwiki/pmwiki.php/VisualNovel/DoubleHomework"><span data-dcnode-id="1846" instrument_node="">Double Homework</span></a></em><span data-dcnode-id="1843" instrument_node="">. Someone playing for the first time might initially conclude that this is what happened to him after the incident on Barbarossa. Instead, 12 other people died.
</span></li><li data-dcnode-id="1833"><span data-dcnode-id="1841" instrument_node=""> In his route of </span><em data-dcnode-id="1838"><a class="twikilink" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/InYourArmsTonight" title="/pmwiki/pmwiki.php/VisualNovel/InYourArmsTonight"><span data-dcnode-id="1840" instrument_node="">In Your Arms Tonight</span></a></em><span data-dcnode-id="1837" instrument_node="">, promising ceramics artist Soji Higayashima has his right hand severely injured in a car accident. The damage is bad enough to impair the mobility of his hand, making him unable to continue in his art. </span><span class="spoiler" data-dcnode-id="1835" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1836" instrument_node="">His epilogue suggests that with physical therapy he will recover enough to resume his work.</span></span><span data-dcnode-id="1834" instrument_node="">
</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1832" instrument_node=""> Though he didn't make a career out of it, the protagonist of </span><em data-dcnode-id="1829"><a class="twikilink" data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/MissingStars" title="/pmwiki/pmwiki.php/VisualNovel/MissingStars"><span data-dcnode-id="1831" instrument_node="">Missing Stars</span></a></em><span data-dcnode-id="1828" instrument_node=""> used to love being active and hiking. However, an accident left him unable to use one of his legs. There's no physical problem with it. Erik's post-traumatic stress causes psychosomatic numbness and pain in his leg. He </span><a class="twikilink" data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewTransferStudent" title="/pmwiki/pmwiki.php/Main/NewTransferStudent"><span data-dcnode-id="1827" instrument_node="">transferred</span></a><span data-dcnode-id="1825" instrument_node=""> to a boarding school for teens with mental illnesses in order to improve his mental health.

</span><ul data-dcnode-id="1786"><li data-dcnode-id="1811"><span data-dcnode-id="1816" instrument_node=""> The protagonist of </span><em data-dcnode-id="1813"><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/CantSeeCantHearButLove" title="/pmwiki/pmwiki.php/Webcomic/CantSeeCantHearButLove"><span data-dcnode-id="1815" instrument_node="">Can't See Can't Hear But Love</span></a></em><span data-dcnode-id="1812" instrument_node=""> is a webtoon artist who is forced to quit after he becomes blind due to exertion.
</span></li><li data-dcnode-id="1799"><span data-dcnode-id="1810" instrument_node=""> This is part of the background detail explanation for the reappearance of Dillon's </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldFriend" title="/pmwiki/pmwiki.php/Main/OldFriend"><span data-dcnode-id="1809" instrument_node="">Old Friend</span></a><span data-dcnode-id="1807" instrument_node=""> Ray in </span><em data-dcnode-id="1804"><a class="twikilink" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/StickyDillyBuns" title="/pmwiki/pmwiki.php/Webcomic/StickyDillyBuns"><span data-dcnode-id="1806" instrument_node="">Sticky Dilly Buns</span></a></em><span data-dcnode-id="1803" instrument_node="">; he was pursuing a career in hockey (presumably ice hockey, given that this is set in </span><a class="twikilink" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CanadaEh" title="/pmwiki/pmwiki.php/Main/CanadaEh"><span data-dcnode-id="1802" instrument_node="">Canada</span></a><span data-dcnode-id="1800" instrument_node="">), but he's now suffered a knee injury and decided to switch to acting.
</span></li><li data-dcnode-id="1787"><span data-dcnode-id="1798" instrument_node=""> In </span><em data-dcnode-id="1795"><a class="twikilink" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/WeakHero" title="/pmwiki/pmwiki.php/Webcomic/WeakHero"><span data-dcnode-id="1797" instrument_node="">Weak Hero</span></a></em><span data-dcnode-id="1794" instrument_node="">, Kenny tries to leave the Manwol Gang so that he can </span><a class="twikilink" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBrotherInstinct" title="/pmwiki/pmwiki.php/Main/BigBrotherInstinct"><span data-dcnode-id="1793" instrument_node="">protect his brother</span></a><span data-dcnode-id="1791" instrument_node=""> and also focus entirely on soccer. Though he expects that they won't let him off easy, he doesn't expect them to permanently cripple his leg, ruining his dream of being a soccer player. This incident is what sets his brother down </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RevengeBeforeReason" title="/pmwiki/pmwiki.php/Main/RevengeBeforeReason"><span data-dcnode-id="1790" instrument_node="">the path of revenge.</span></a><span data-dcnode-id="1788" instrument_node="">
</span></li></ul></div><span data-dcnode-id="1784" instrument_node="">

</span><ul data-dcnode-id="1734"><li data-dcnode-id="1771"><span data-dcnode-id="1779" instrument_node=""> </span><em data-dcnode-id="1776"><a class="twikilink" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/ActuallyHappened" title="/pmwiki/pmwiki.php/WebAnimation/ActuallyHappened"><span data-dcnode-id="1778" instrument_node="">ACTUALLY HAPPENED</span></a></em><span data-dcnode-id="1775" instrument_node="">: In </span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">My Mom Entered My Room Without Knocking. Sorry, Mom...</span></em><span data-dcnode-id="1772" instrument_node="">, the gymnast falls off a roof and hurts her spine. She's forced to quit gymnastics and turns to curling instead.
</span></li><li data-dcnode-id="1753"><span data-dcnode-id="1770" instrument_node=""> </span><em data-dcnode-id="1767"><a class="twikilink" data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/RWBY" title="/pmwiki/pmwiki.php/WebAnimation/RWBY"><span data-dcnode-id="1769" instrument_node="">RWBY</span></a></em><span data-dcnode-id="1766" instrument_node="">: Maria Calavera was a famously skilled Huntress in her youth, but retired after losing both her </span><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EyeScream" title="/pmwiki/pmwiki.php/Main/EyeScream"><span data-dcnode-id="1765" instrument_node="">eyes</span></a><span data-dcnode-id="1763" instrument_node=""> in a fight. The thing is, it wasn't the loss of her eyes itself that made her retire (Remnant has pretty advanced </span><a class="twikilink" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElectronicEye" title="/pmwiki/pmwiki.php/Main/ElectronicEye"><span data-dcnode-id="1762" instrument_node="">cybernetics</span></a><span data-dcnode-id="1760" instrument_node="">), but the emotional trauma she went through, especially fear that </span><span class="spoiler" data-dcnode-id="1755" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1759" instrument_node="">someone would realize she was a </span><a class="twikilink" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalEye" title="/pmwiki/pmwiki.php/Main/MagicalEye"><span data-dcnode-id="1758" instrument_node="">Silver Eyed warrior</span></a><span data-dcnode-id="1756" instrument_node=""> again, and finish the job this time</span></span><span data-dcnode-id="1754" instrument_node="">. In her old age, she considers herself a coward and failure for giving up on the Huntress life instead of fulfilling her responsibilities.
</span></li><li data-dcnode-id="1741"><span data-dcnode-id="1752" instrument_node=""> In </span><em data-dcnode-id="1749"><a class="twikilink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Worm" title="/pmwiki/pmwiki.php/Literature/Worm"><span data-dcnode-id="1751" instrument_node="">Worm</span></a></em><span data-dcnode-id="1748" instrument_node="">, the </span><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DaChief" title="/pmwiki/pmwiki.php/Main/DaChief"><span data-dcnode-id="1747" instrument_node="">Director of the local PRT</span></a><span data-dcnode-id="1745" instrument_node="">, Piggot, used to be a field agent before she lost her kidneys in a particularly nasty </span><a class="twikilink" data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoneHorriblyWrong" title="/pmwiki/pmwiki.php/Main/GoneHorriblyWrong"><span data-dcnode-id="1744" instrument_node="">Charlie Foxtrot</span></a><span data-dcnode-id="1742" instrument_node=""> of an operation.
</span></li><li data-dcnode-id="1735"><span data-dcnode-id="1740" instrument_node=""> The plot of "no expectation of returns" from </span><em data-dcnode-id="1737"><a class="twikilink" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebOriginal/YouCouldMakeALife" title="/pmwiki/pmwiki.php/WebOriginal/YouCouldMakeALife"><span data-dcnode-id="1739" instrument_node="">you could make a life</span></a></em><span data-dcnode-id="1736" instrument_node=""> is about an NHL player trying to help his best friend cope after a wrist injury ends his hockey career.
</span></li></ul></div><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1731"></p><div class="folderlabel" data-dcnode-id="1729" onclick="togglefolder('folder17');"><span data-dcnode-id="1730" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Western Animation&nbsp;</span></div><div class="folder" data-dcnode-id="1637" id="folder17" isfolder="true" style="display:block;"><span data-dcnode-id="1728" instrument_node="">
</span><ul data-dcnode-id="1638"><li data-dcnode-id="1719"><span data-dcnode-id="1727" instrument_node=""> Bruce from </span><em data-dcnode-id="1724"><a class="twikilink" data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/BatmanBeyond" title="/pmwiki/pmwiki.php/WesternAnimation/BatmanBeyond"><span data-dcnode-id="1726" instrument_node="">Batman Beyond</span></a></em><span data-dcnode-id="1723" instrument_node=""> gives up crime-fighting due to a heart condition. On its own, it probably wouldn't mean much, but the circumstances caused him to </span><a class="twikilink" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatmanGrabsAGun" title="/pmwiki/pmwiki.php/Main/BatmanGrabsAGun"><span data-dcnode-id="1722" instrument_node="">point a gun at someone</span></a><span data-dcnode-id="1720" instrument_node="">.
</span></li><li data-dcnode-id="1699"><span data-dcnode-id="1718" instrument_node=""> This trope is used in </span><em data-dcnode-id="1715"><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheFairlyOddParents" title="/pmwiki/pmwiki.php/WesternAnimation/TheFairlyOddParents"><span data-dcnode-id="1717" instrument_node="">The Fairly OddParents</span></a></em><span data-dcnode-id="1714" instrument_node=""> The Bronze Kneecap explains that tripping over the Crimson Chin's titular facial feature was what caused him to injure his knee and ended his career. He subsequently smelts all of his bronze trophies and makes them into his villain costume. Timmy views this as a major overreaction and the Bronze Kneecap responds that the Crimson Chin never even said he was sorry.
</span><ul data-dcnode-id="1700"><li data-dcnode-id="1703"><span data-dcnode-id="1713" instrument_node=""> It should also be noted that Timmy unwittingly did the same thing to Mr. Bickles during the episode and manages to evade such extreme repercussions by apologizing and effectively </span><a class="twikilink" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkingTheMonsterToDeath" title="/pmwiki/pmwiki.php/Main/TalkingTheMonsterToDeath"><span data-dcnode-id="1712" instrument_node="">Talking the Monster to Death</span></a><span data-dcnode-id="1710" instrument_node="">. (Although Timmy didn't actually injure Mr. Bickles. He just put on a better magic act and consequently drove him out of business.) It's hard to feel sorry for him given that he's basically a spoof of the </span><a class="twikilink" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WideEyedIdealist" title="/pmwiki/pmwiki.php/Main/WideEyedIdealist"><span data-dcnode-id="1709" instrument_node="">Wide-Eyed Idealist</span></a><span data-dcnode-id="1707" instrument_node=""> who has a new "Dream" every single solitary episode. The fact that Timmy ruined one out of countless and merely by </span><a class="twikilink" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysSomeoneBetter" title="/pmwiki/pmwiki.php/Main/AlwaysSomeoneBetter"><span data-dcnode-id="1706" instrument_node="">being better at it</span></a><span data-dcnode-id="1704" instrument_node=""> makes Mr. Bickles seem like a stupid selfish baby.
</span></li><li data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node=""> This trope is played with for yet another episode. In this one, Timmy cannot sing his part for Mr. Bickles' play because he needs his tonsils taken out. That doesn't stop him from trying to sing anyway. Unfortunately, Mr. Bickles doesn't take it well when Timmy fails due to his aching throat, causing him to drop to his knees and whine about his so-called dream being ruined. This time someone else's career is "ended" by someone else's illness.
</span></li></ul></li><li data-dcnode-id="1693"><span data-dcnode-id="1698" instrument_node=""> In </span><em data-dcnode-id="1695"><a class="twikilink" data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/HerculesTheAnimatedSeries" title="/pmwiki/pmwiki.php/WesternAnimation/HerculesTheAnimatedSeries"><span data-dcnode-id="1697" instrument_node="">Hercules: The Animated Series</span></a></em><span data-dcnode-id="1694" instrument_node=""> Achilles survived that arrow to the heel but became a washed-up has-been hero afterward.
</span></li><li data-dcnode-id="1684"><span data-dcnode-id="1692" instrument_node=""> </span><em data-dcnode-id="1689"><a class="twikilink" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/KickButtowski" title="/pmwiki/pmwiki.php/WesternAnimation/KickButtowski"><span data-dcnode-id="1691" instrument_node="">Kick Buttowski</span></a></em><span data-dcnode-id="1688" instrument_node="">'s mother Honey Splash ended her career as a speedboat stuntster because she tore her </span><a class="twikilink" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseBiology"><span data-dcnode-id="1687" instrument_node="">tendencious ligamental flexor</span></a><span data-dcnode-id="1685" instrument_node="">. Kick encourages her to try again years later, but the injury flares up at a plot-appropriate moment.
</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1683" instrument_node=""> </span><em data-dcnode-id="1680"><a class="twikilink" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/LittlestPetShop2012" title="/pmwiki/pmwiki.php/WesternAnimation/LittlestPetShop2012"><span data-dcnode-id="1682" instrument_node="">Littlest Pet Shop (2012)</span></a></em><span data-dcnode-id="1679" instrument_node="">: In "</span><a class="twikilink" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/LittlestPetShop2012S1E22LotsaLuck" title="/pmwiki/pmwiki.php/Recap/LittlestPetShop2012S1E22LotsaLuck"><span data-dcnode-id="1678" instrument_node="">Lotsa Luck</span></a><span data-dcnode-id="1676" instrument_node="">" Mrs. Twombly ended her career in "kung-fu quilting" when she pulled a tendon in her foot after winning a tournament.
</span></li><li data-dcnode-id="1669"><span data-dcnode-id="1674" instrument_node=""> </span><em data-dcnode-id="1671"><a class="twikilink" data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ObanStarRacers" title="/pmwiki/pmwiki.php/WesternAnimation/ObanStarRacers"><span data-dcnode-id="1673" instrument_node="">Ōban Star-Racers</span></a></em><span data-dcnode-id="1670" instrument_node="">: Rick Thunderbolt, the original Earth team pilot, is seriously injured in his first race, leaving him with a nervous system that freezes up at inopportune moments. After some episodes moping about it, he eventually agrees to help train Molly as his replacement.
</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1668" instrument_node=""> This plays a major role in Eda's backstory in </span><em data-dcnode-id="1665"><a class="twikilink" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheOwlHouse" title="/pmwiki/pmwiki.php/WesternAnimation/TheOwlHouse"><span data-dcnode-id="1667" instrument_node="">The Owl House</span></a></em><span data-dcnode-id="1664" instrument_node="">. </span><span class="spoiler" data-dcnode-id="1659" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1663" instrument_node="">Her father used to be the greatest </span><a class="twikilink" data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Familiar" title="/pmwiki/pmwiki.php/Main/Familiar"><span data-dcnode-id="1662" instrument_node="">palisman</span></a><span data-dcnode-id="1660" instrument_node=""> carver on the Boiling Isles, but one night during a family party she slashed out one of his eyes and mangled one of his hands bad enough to cause nerve damage when he accidentally triggered her owl beast curse with a party popper. She felt so guilt ridden over this that she ran away from home soon afterwards and did everything she could to avoid seeing him for the next 30 years.</span></span><span data-dcnode-id="1658" instrument_node="">
</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1656" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="1655" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="1653" instrument_node=""> in the </span><em data-dcnode-id="1650"><a class="twikilink" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/PinkyAndTheBrain" title="/pmwiki/pmwiki.php/WesternAnimation/PinkyAndTheBrain"><span data-dcnode-id="1652" instrument_node="">Pinky and the Brain</span></a></em><span data-dcnode-id="1649" instrument_node=""> episode "Brain's Song" where a movie created by the Brain (meant to be so much of a tearjerker that everyone would be too inconsolable to stop Brain from taking over the world after watching it) depicts Brain as an optimistic young man whose dreams of becoming an all-star football player are crushed when he suffers from "career-ending stomach cramps" in the middle of the big game and can never play football again. Brain's plan nearly succeeds, but Brain suffering from the aftershocks of the rickety make-shift football field his movie was filmed on as he tries to announce his plans to the weeping masses just causes everyone in the world to just start laughing at him instead.
</span></li><li data-dcnode-id="1639"><span data-dcnode-id="1647" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="1646" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="1644" instrument_node=""> in the </span><em data-dcnode-id="1641"><a class="twikilink" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/VeggieTales" title="/pmwiki/pmwiki.php/WesternAnimation/VeggieTales"><span data-dcnode-id="1643" instrument_node="">VeggieTales</span></a></em><span data-dcnode-id="1640" instrument_node=""> story "Sumo of the Opera", where Mikey used to be in wrestling until he injured his knee. He's a grape.
</span></li></ul></div><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1635"></p><div class="folderlabel" data-dcnode-id="1633" onclick="togglefolder('folder18');"><span data-dcnode-id="1634" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Real Life&nbsp;</span></div><div class="folder" data-dcnode-id="929" id="folder18" isfolder="true" style="display:block;"><span data-dcnode-id="1632" instrument_node="">
</span><ul data-dcnode-id="930"><li data-dcnode-id="1574"><span data-dcnode-id="1631" instrument_node=""> American Football:
</span><ul data-dcnode-id="1575"><li data-dcnode-id="1623"><span data-dcnode-id="1630" instrument_node=""> In one of the most well-known examples from the </span><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AmericanFootball" title="/pmwiki/pmwiki.php/UsefulNotes/AmericanFootball"><span data-dcnode-id="1629" instrument_node="">NFL</span></a><span data-dcnode-id="1627" instrument_node="">, Washington Redskins quarterback Joe Theismann was forced to retire after a Monday Night Football game in 1985. On a failed attempt to trick the New York Giants' defense, Theismann was sacked by all-pro linebacker Lawrence Taylor. As Taylor forced Theismann to the ground, his knee came down on Theisman's leg and snapped the tibia and fibula. While this incident helped cement Taylor's fearsome reputation, Taylor himself was </span><a class="twikilink" data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="1626" instrument_node="">clearly horrified</span></a><span data-dcnode-id="1624" instrument_node=""> and immediately leaped up and called for medical assistance for Theismann as soon as the play ended. Sadly, some fans mistook his frantic motions for help as Taylor celebrating the crippling hit and thought him a dirty player for a while.
</span></li><li data-dcnode-id="1618"><span data-dcnode-id="1622" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HistoryRepeats" title="/pmwiki/pmwiki.php/Main/HistoryRepeats"><span data-dcnode-id="1621" instrument_node="">History would repeat itself</span></a><span data-dcnode-id="1619" instrument_node=""> when quarterback Alex Smith suffered the same injury as Theismann after a sack by Houston Texans defensive end JJ Watt. In an eery coincidence, it happened 33 years to the date of Theismann's injury. With Theismann himself in attendance, no less. Smith returned to the team as a starter two years and multiple surgeries later, even picking up the Comeback Player of the Year award, but lasting pain forced him to retire for good at the end of the season.
</span></li><li data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node=""> For most of the history of </span><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AmericanFootball" title="/pmwiki/pmwiki.php/UsefulNotes/AmericanFootball"><span data-dcnode-id="1616" instrument_node="">American Football</span></a><span data-dcnode-id="1614" instrument_node="">, rotator cuff injuries to the throwing arm have been a death sentence for quarterbacks. Probably the most tragic case was Cincinnati Bengals quarterback Greg Cook, who after a rookie season in 1969 that left many excited about his NFL future, tore his rotator cuff and was out of football with only that rookie season under his belt.
</span></li><li data-dcnode-id="1607"><span data-dcnode-id="1612" instrument_node=""> Chicago Bears player Gale Sayers had to retire after injuring first one knee (the one depicted in the film </span><em data-dcnode-id="1609"><a class="twikilink" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BriansSong" title="/pmwiki/pmwiki.php/Film/BriansSong"><span data-dcnode-id="1611" instrument_node="">Brian's Song</span></a></em><span data-dcnode-id="1608" instrument_node="">) and then the other, both injuries requiring surgery and extensive rehab. He worked with a group that raises funds for injured players and their families until his death in 2020.
</span></li><li data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node=""> Green Bay Packers receiver Sterling Sharpe played for years with an undiagnosed condition affecting the vertebrae in his neck, making him more susceptible to neck injuries. By the time the condition was discovered at the end of the 1994 season, he had already had two significant neck-related incidents in two consecutive games and was told by doctors that he would have to undergo major cervical spine surgery to stabilize his neck or he would be at risk for complications later in life (whether or not he continued to play professional sports). Sharpe initially did not rule out the possibility of resuming his career following the surgery and lengthy recovery, but ultimately retired without ever playing another game.
</span></li><li data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node=""> Over a decade later, Packers safety Nick Collins, coming off a huge 2010 season, suffered a herniated disc in an early 2011 game when a routine tackle went horribly wrong and had to have the same kind of surgery as Sharpe. Collins didn't officially announce his retirement until 2014, but he stopped training for a comeback in 2012 after a doctor told him it would be extremely inadvisable for him to play again.
</span></li><li data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node=""> There might have been three </span><a class="twikilink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/PeytonManning" title="/pmwiki/pmwiki.php/Creator/PeytonManning"><span data-dcnode-id="1601" instrument_node="">Manning</span></a><span data-dcnode-id="1599" instrument_node=""> Brothers in the NFL in the 21st century if eldest son Cooper, who was an all-state wide receiver during his high school days in Mississippi and was considered a hot prospect recruit for Ole Miss, hadn't been diagnosed with a spinal condition that ended his playing days.
</span></li><li data-dcnode-id="1590"><span data-dcnode-id="1597" instrument_node=""> Detroit Lions guard Mike Utley saw his career end suddenly when an on-field injury to his cervical vertebrae resulted in paralysis. He was immediately left a quadriplegic, though he regained nearly full use of his arms.</span><span class="notelabel" data-dcnode-id="1594" onclick="togglenote('note3cotj');" style="cursor: pointer;"><sup data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1592" id="note3cotj" isnote="true" onclick="togglenote('note3cotj');" style="display: none; cursor: pointer;"><span data-dcnode-id="1593" instrument_node="">The medical definition of quadriplegia only requires at least some impairment in all four limbs. Many quadriplegics, including Utley, have varying degrees of use of their arms.</span></span><span data-dcnode-id="1591" instrument_node="">
</span></li><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node=""> New England Patriots wide receiver Darryl Stingley's football career ended immediately after a devastating hit from Oakland Raiders safety Jack Tatum broke his upper spine in a preseason game. He was left a quadriplegic and died several years later from heart problems related to his paralysis.
</span></li><li data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node=""> One of few players to have a significant professional career in two sports, Oakland Raiders running back Bo Jackson suffered a sudden career-ending football injury when he dislocated a hip (with subsequent hip bone fracturing and bone tissue death in the joint) after being tackled on-field. He never played football again, and his baseball career ceased a few years later.
</span></li><li data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node=""> Hall of Fame Dallas Cowboys wide receiver Michael Irvin retired suddenly after being tackled hard by Philadelphia Eagles safety Tim Hauck. Irvin suffered a non-life-threatening spinal cord injury on the play.
</span></li><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node=""> Oakland Raiders running back Napoleon McCallum suffered a gruesome leg injury in a 1994 game against the San Francisco 49ers. He completely hyperextended his left knee to almost a 90-degree angle, tore three ligaments, tore the calf and hamstring muscles from the bone, and suffered nerve damage. He recovered, but his career was over as he was never going to be medically cleared to play football again.
</span></li><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node=""> Pretty much the same thing happened to Marcus Lattimore, a superstar running back for the University of South Carolina. He showed tremendous promise as a freshman in 2010, with reports indicating that he would have been a first-round pick had he been eligible for the 2011 draft. Unfortunately, he tore an ACL in the middle of the 2011 season, followed by an injury similar to that of McCallum in 2012. While he declared for the 2013 draft and was picked in the fourth round, he never played a snap professionally.
</span></li><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node=""> Heartwarmingly inverted a few years later by UCF quarterback McKenzie Milton, who led the Knights to their breakout 2017 season that set the stage for their upcoming move to the Big 12 Conference. The next season, the Knights were unbeaten going into their regular-season finale against archrival South Florida. UCF won, but lost Milton to an injury pretty much identical to that of McCallum and Lattimore (the Knights lost their ensuing bowl game). Milton had to undergo emergency surgery to save the leg, and nearly lost it a second time. After nearly three years of rehab, and a transfer to Florida State, Milton saw the field again. While he's not seen as likely to have a pro playing career, simply playing again was remarkable.
</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node=""> Pittsburgh Steelers linebacker Ryan Shazier had his spine destabilized in a 2017 game against the Cincinnati Bengals. He would never play another down again and announced his retirement three years later. Many fans consider it a miracle that he is able to walk again.
</span></li></ul></li><li data-dcnode-id="1565"><span data-dcnode-id="1573" instrument_node=""> Basketball:
</span><ul data-dcnode-id="1566"><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node=""> New York Liberty star Kym Hampton had to retire from the WNBA after injuring her knee.
</span></li><li data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node=""> Boban Janković, a Serbian basketball star who played in the Greek league in the early 1990s, was permanently paralyzed after he damaged his spinal cord by headbutting the basket post in response to the referee calling an offensive foul on him with 8 minutes to go in a playoff match. He used a wheelchair for the final 13 years of his life and died of a heart attack at the age of 42.
</span></li><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node=""> Magic Johnson was forced into a premature retirement in 1991 after discovering that he had HIV/AIDS. He briefly returned in 1996 but eventually decided to retire for good. As of 2021, he is very much alive, and may very well break the world record for the longest lifespan after being diagnosed with AIDS, if he continues to manage.
</span></li></ul></li><li data-dcnode-id="1534"><span data-dcnode-id="1564" instrument_node=""> Baseball:
</span><ul data-dcnode-id="1535"><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node=""> New York Yankees first baseman Lou Gehrig had to retire from baseball due to amyotrophic lateral sclerosis (which became known in North America as Lou Gehrig's disease).
</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node=""> Sandy Koufax of the Brooklyn/Los Angeles Dodgers, arguably the most dominating pitcher in MLB since the "Dead Ball Era," was forced to retire at age 30 after developing arthritis in his pitching arm.
</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node=""> Roy Campanella spent ten seasons as a catcher for the Brooklyn Dodgers but never got to play in Los Angeles. In the offseason of the team's move, he was paralyzed when his rented 1957 Chevrolet sedan hit a patch of ice, skidded into a telephone pole, and overturned. His neck was broken, the fifth and sixth cervical vertebrae in his back were fractured and his spinal cord was compressed. While he </span><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">was</span></em><span data-dcnode-id="1556" instrument_node=""> paralyzed from the shoulders down at first (and ended up needing a wheelchair for the rest of his life), extensive physical therapy eventually allowed him to regain the use of his arms and hands.
</span></li><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node=""> Houston Astros pitcher J.R. Richard's major league career came to an abrupt end after suffering a stroke at age 30. He made a few short-lived attempts to restart his career in the minors afterwards but was unsuccessful.
</span></li><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node=""> Dave Dravecky, a pitcher for the San Diego Padres and San Francisco Giants, developed a cancerous tumor in his pitching arm at age 32; he first had surgery to remove the growth and then underwent a year's rehabilitation. His comeback attempt lasted all of two games, when the humerus bone in his pitching arm suddenly snapped in mid-pitch, ending his career for good. Cancer returned to his pitching arm later that year, forcing its amputation.
</span></li><li data-dcnode-id="1544"><span data-dcnode-id="1550" instrument_node=""> Several players had their careers ruined after getting hit in the head while up to bat. A few examples resulted in their immediate retirement.
</span><ul data-dcnode-id="1545"><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node=""> Hall of Fame catcher Mickey Cochrane's career with the Detroit Tigers ended immediately after he was severely beaned by pitcher Bump Hadley. Cochrane was knocked unconscious and hospitalized in a coma for ten days afterward.
</span></li><li data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node=""> Kirby Puckett, Hall of Fame center fielder for the Minnesota Twins, had his playing career end after being hit in the face by a pitch from Dennis Martínez and subsequently developing glaucoma. He never played again.
</span></li></ul></li><li data-dcnode-id="1536"><span data-dcnode-id="1543" instrument_node=""> Cleveland Indians</span><span class="notelabel" data-dcnode-id="1540" onclick="togglenote('note4aew5');" style="cursor: pointer;"><sup data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1538" id="note4aew5" isnote="true" onclick="togglenote('note4aew5');" style="display: none; cursor: pointer;"><span data-dcnode-id="1539" instrument_node="">now known as Guardians</span></span><span data-dcnode-id="1537" instrument_node=""> ace pitcher Herb Score was hit in the face by a line drive, and forced to retire. He went on to a long career as the team's radio announcer.
</span></li></ul></li><li data-dcnode-id="1449"><span data-dcnode-id="1533" instrument_node=""> Motorsports:
</span><ul data-dcnode-id="1450"><li data-dcnode-id="1512"><span data-dcnode-id="1532" instrument_node=""> Alessandro "Alex" Zanardi, former </span><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FormulaOne" title="/pmwiki/pmwiki.php/UsefulNotes/FormulaOne"><span data-dcnode-id="1531" instrument_node="">Formula One</span></a><span data-dcnode-id="1529" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/IndyCar" title="/pmwiki/pmwiki.php/UsefulNotes/IndyCar"><span data-dcnode-id="1528" instrument_node="">Indy Car</span></a><span data-dcnode-id="1526" instrument_node=""> racing driver, lost both of his legs in a </span><a class="urllink" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtu.be/KysP71KKzIc"><span data-dcnode-id="1525" instrument_node="">horrific crash</span><img data-dcnode-id="1524" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1522" instrument_node=""> that nearly killed him. </span><a class="twikilink" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandicappedBadass" title="/pmwiki/pmwiki.php/Main/HandicappedBadass"><span data-dcnode-id="1521" instrument_node="">He made the best of it</span></a><span data-dcnode-id="1519" instrument_node=""> and started two new careers. He proved competitive in his first in touring car racing, using a car fitted with hand controls. His second post-injury career as a Paralympic athlete in handcycling was even more successful than either of his auto racing careers. He won three medals, two of them gold, in the 2012 London Paralympics, and did the same at Rio in 2016.
</span><ul data-dcnode-id="1513"><li data-dcnode-id="1514"><span data-dcnode-id="1518" instrument_node=""> However, in a sad postscript, Zanardi suffered </span><em data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">another</span></em><span data-dcnode-id="1515" instrument_node=""> career-ending injury in 2020 during a race when he lost control of his handbike and crashed into an oncoming truck, suffering facial and brain injuries. He was unable to speak for more than six months after the crash, and remained hospitalized for nearly a year after that.
</span></li></ul></li><li data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node=""> Didier Pironi was leading the 1982 </span><a class="twikilink" data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FormulaOne" title="/pmwiki/pmwiki.php/UsefulNotes/FormulaOne"><span data-dcnode-id="1510" instrument_node="">Formula One</span></a><span data-dcnode-id="1508" instrument_node=""> World Championship when he crashed into Alain Prost during qualifying for the German Grand Prix and suffered leg injuries severe enough to end his racing career. He ultimately lost the championship to Keke Rosberg by five points.
</span></li><li data-dcnode-id="1492"><span data-dcnode-id="1506" instrument_node=""> In the second race of the </span><a class="twikilink" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/IndyCar" title="/pmwiki/pmwiki.php/UsefulNotes/IndyCar"><span data-dcnode-id="1505" instrument_node="">Indy Car</span></a><span data-dcnode-id="1503" instrument_node=""> doubleheader at Houston in 2013, Takuma Sato got loose and slid into Dario Franchitti's car, </span><a class="urllink" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DIWivplBtgAo"><span data-dcnode-id="1502" instrument_node="">sending him twirling into the catch fence</span><img data-dcnode-id="1501" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1499" instrument_node="">. Franchitti suffered a broken back and ankle in the crash, as well as a concussion so severe that he later stated he doesn't remember anything from two weeks before the crash to three weeks after. On the advice of his doctors, he retired from racing a month later. </span><span class="notelabel" data-dcnode-id="1496" onclick="togglenote('note56eoe');" style="cursor: pointer;"><sup data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1494" id="note56eoe" isnote="true" onclick="togglenote('note56eoe');" style="display: none; cursor: pointer;"><span data-dcnode-id="1495" instrument_node="">This was Franchitti's third concussion in ten years, and motorsport drivers are just as prone to CTE as football players (they may have fewer concussions, but at higher impacts, so one crash is basically like getting tackled ten times at once). Franchitti was warned that the next crash and next concussion could severely incapacitate him if it didn't outright kill him.</span></span><span data-dcnode-id="1493" instrument_node="">
</span></li><li data-dcnode-id="1486"><span data-dcnode-id="1491" instrument_node=""> Racing driver Tetsuya Ota was forced to quit racing due to losing function in his right arm and leg after a </span><a class="urllink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DGwCfaNRS-JQ"><span data-dcnode-id="1490" instrument_node="">fiery accident</span><img data-dcnode-id="1489" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1487" instrument_node=""> in 1998, where his Ferrari spun out and hit an already spun-out Porsche, creating a fantastic fireball and sending him rolling across the track. The first one on scene was another racer with a fire extinguisher to put out his flaming car. Safety marshals arrived over ten seconds later to extract him and take him to a waiting track van (not an ambulance) to go to the medical center. For reference, he spent 90 seconds from impact in his flaming car, long enough that his visor melted and caused facial scarring when he was laid on his back that required plastic surgery to repair.
</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1485" instrument_node=""> By the end of the 2010 </span><a class="twikilink" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FormulaOne" title="/pmwiki/pmwiki.php/UsefulNotes/FormulaOne"><span data-dcnode-id="1484" instrument_node="">Formula One</span></a><span data-dcnode-id="1482" instrument_node=""> season, Robert Kubica was widely regarded as a rising star, and had a contract in place to drive for Ferrari in 2012. Then, in February 2011, he was involved in a rally crash in which the guardrail penetrated the bodywork and nearly severed his arm. The damage left his arm permanently atrophied and, while he was able to resume his rallying career, it was generally agreed that his F1 career was over. He </span><em data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">did</span></em><span data-dcnode-id="1479" instrument_node=""> manage to make it back into the sport in 2019, but it was clear that he wasn't the same driver anymore, and his comeback lasted only one very disappointing season.
</span></li><li data-dcnode-id="1451"><span data-dcnode-id="1477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NASCAR" title="/pmwiki/pmwiki.php/UsefulNotes/NASCAR"><span data-dcnode-id="1476" instrument_node="">NASCAR</span></a><span data-dcnode-id="1474" instrument_node="">:
</span><ul data-dcnode-id="1452"><li data-dcnode-id="1463"><span data-dcnode-id="1473" instrument_node=""> Ernie Irvan ended up </span><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleSubversion" title="/pmwiki/pmwiki.php/Main/DoubleSubversion"><span data-dcnode-id="1472" instrument_node="">Double Subverting</span></a><span data-dcnode-id="1470" instrument_node=""> this with his near-fatal crash at Michigan in 1994.</span><span class="notelabel" data-dcnode-id="1467" onclick="togglenote('note6u9lv');" style="cursor: pointer;"><sup data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1465" id="note6u9lv" isnote="true" onclick="togglenote('note6u9lv');" style="display: none; cursor: pointer;"><span data-dcnode-id="1466" instrument_node="">He had suffered a basilar skull fracture (i.e., a break at the base of the skull), the same injury that would claim the life of the elder Dale Earnhardt in 2001.</span></span><span data-dcnode-id="1464" instrument_node=""> While he did get back into the car by 1996, and even won in 1997 at the same track that almost killed him, the simple fact of the matter was that he just wasn't a championship-level driver after the wreck (he had been in the midst of challenging Dale Earnhardt for the 1994 title before the injury), and several more head injuries after his comeback drove him to retire in 1999.
</span></li><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node=""> Bobby Allison's near-fatal wreck at Pocono in 1988 was a more immediate instance of this, since, as soon as he recovered enough to set up a press conference, he announced his retirement from NASCAR. The fact that he was fifty years old probably helped with that decision.
</span></li><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node=""> Jerry Nadeau suffered a traumatic brain injury after striking the turn three wall head-on with a hung throttle at Richmond in 2003. Due in part to the lack of understanding about Nadeau's injury at the time, he ended up with permanent brain damage from the resulting swelling, and given that another head injury would likely kill him, he's certain not to be cleared to race ever again.
</span></li><li data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node=""> Dale Earnhardt Jr. was sidelined for the back half of the 2016 season due to lingering concussion-like symptoms from earlier crashes. He had previously been sidelined for two races in the fall of 2012 after taking a concussion in a last-lap crash at Talladega. Although he came back for the 2017 season, he chose to retire from Cup racing at the end of that season for the sake of his health, though continues to be a contributor to the sport as the team owner of JR Motorsports and as a lap-by-lap commentator for NBC.
</span></li><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node=""> Sterling Marlin suffered a terrible crash at Kansas in 2002, which resulted in him missing the rest of the season because he suffered a cracked vertebra in his neck. Although he returned to continue racing, he wasn't the same driver as he was before the injury.
</span></li><li data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node=""> The elder Dale Earnhardt's career was never the same after his infamous crash at Talladega in the 1996 DieHard 500, in which suffered a broken collarbone, sternum, and shoulder blade. Before the crash, he was sitting 2nd in points and was in prime position to get his 8th championship. In 1997, he went winless and had to be relieved at the Southern 500 due to having double vision and blacking out, finishing 5th in the season standings. In 1998, he won the Daytona 500, but his decline continued as he became seen as a "restrictor plate track" driver and finished 8th in the standings. In 1999, he won 3 times, sweeping Talladega and picking up a controversial win at Bristol, and improved to 7th in the standings. In 2000, he had a resurgence after getting offseason surgery to correct a lingering injury from the said 1996 crash. He won the fall Talladega race and the spring Atlanta race, but still struggled at intermediate tracks. He finished a distant 2nd in points to Bobby Labonte in his last full season. Then he was killed in a crash on the last lap of the 2001 Daytona 500.
</span></li></ul></li></ul></li><li data-dcnode-id="1436"><span data-dcnode-id="1448" instrument_node=""> Cycling:
</span><ul data-dcnode-id="1437"><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node=""> Colombian cyclist Mauricio Soler crashed on the 6th stage of the 2011 Tour de Suisse. At the time, he was in second and had won the second stage, as well as generally looking to be at the top of his form. He crashed going downhill at 80 km/h, and suffered a fractured skull, cerebral edema, other fractures, and hematomas, to the point where he had to be put in a medically induced coma. Over a year later, he announced that he wouldn't try to return to the sport.
</span></li><li data-dcnode-id="1438"><span data-dcnode-id="1445" instrument_node=""> Kristina Vogel had a serious cycling accident in June 2018, rendering her paraplegic. This is especially tragic since she is the </span><em data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">world-class</span></em><span data-dcnode-id="1442" instrument_node="">, if not the most, cyclist that had </span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">won</span></em><span data-dcnode-id="1439" instrument_node=""> several cycling races in her career, including the Olympic Games.
</span></li></ul></li><li data-dcnode-id="1424"><span data-dcnode-id="1435" instrument_node=""> Figure skating:
</span><ul data-dcnode-id="1425"><li data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node=""> Skaters in general are </span><em data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">very</span></em><span data-dcnode-id="1431" instrument_node=""> susceptible to this trope, both because they're participating in a sport that involves moving at a fast speed on a sheet of ice using razor-thin blades, not to mention jumping and spinning very fast in the air, and painful falls when things go wrong. Men's singles skaters are considered old in their late twenties, and ladies' skaters can be forced to retire from injury even sooner. Some coaches' beliefs that athletes must be overworked to reach their full potential does not help matters, either.
</span></li><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node=""> Evgeni Plushenko developed a back/spinal problem, aggravated by his work on quadruple Lutzes and Salchows. It would eventually get bad enough that he had to withdraw after the short program warmup for the 2014 Olympics and retire completely from the sport afterwards.
</span></li><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node=""> Averted repeatedly with Yuzuru Hanyu. He suffered a horrific crash into Yan Han during the free skate warmup to the 2014 Cup of China and had to go into surgery for the extensive injuries sustained, as well as the aftereffects. It was thought the crash would be his career-ending injury, but as of 2020, he remains the top-ranked men's singles skater in the world at full health. The recurring injury to his right ankle (forcing him to withdraw from competition in 2017 and 2021) was believed to be this as well, but he has recovered from it multiple times, despite having to accept his 2018 Rostelecom Cup gold on crutches and skating at the 2018 Olympics and 2021 Japanese Championship on painkillers for said ankle. He remains on track for his goal to land the quadruple axel, a move previously considered physically impossible.
</span></li></ul></li><li data-dcnode-id="1404"><span data-dcnode-id="1423" instrument_node=""> Gymnastics:
</span><ul data-dcnode-id="1405"><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node=""> Olympic gymnast Shawn Johnson, best known for competing in the 2008 Beijing games, had to retire from gymnastics for good just before the 2012 London games due to a knee injury.
</span></li><li data-dcnode-id="1416"><span data-dcnode-id="1420" instrument_node=""> Elena Mukhina was left paralysed from the neck down in 1980 while practising the extremely difficult and hazardous Thomas salto, which led to the move being </span><a class="twikilink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DangerousForbiddenTechnique" title="/pmwiki/pmwiki.php/Main/DangerousForbiddenTechnique"><span data-dcnode-id="1419" instrument_node="">banned for women in competition. As of the 2017-2020 quad, rollout skills (except for a simple dive/hecht roll), including the Thomas salto, have been banned for both men and women</span></a><span data-dcnode-id="1417" instrument_node="">.
</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node=""> Julissa Gomez was paralysed from the neck down in 1988 after smashing head-first into a vaulting horse. A further non-sporting accident in a hospital killed her a short time later. This incident led to major reforms in vaulting in general.
</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node=""> Sang Lan was paralysed from the chest down in 1998 after a simple warm-up move went freakishly wrong because she was distracted by a coach.
</span></li><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node=""> Sabina Cojocar was an up-and-coming star for Romania in the early 2000s but was forced to retire a year before the 2004 Olympics due to a hereditary liver condition that made it too difficult for her to train and condition to the extent necessary for elite gymnastics.
</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node=""> Kerri Strug's famous vault during the 1996 Summer Olympics would end up becoming her last-ever gymnastics performance, with the ankle injury she sustained forcing her to retire shortly thereafter.
</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node=""> In a variation, 2012 Olympic gymnast McKayla Maroney sustained numerous separate injuries over the course of several years; she might have overcome any one of them individually, but the cumulative nature of them, as well as the fact that her coaches pressured her to keep training through them, would ultimately prove too much for her body to handle. Maroney, who had at one time professed a desire to be on the 2016 Olympic team, retired in early 2016.
</span></li></ul></li><li data-dcnode-id="1388"><span data-dcnode-id="1403" instrument_node=""> Hockey:
</span><ul data-dcnode-id="1389"><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node=""> Toronto Maple Leafs winger Ace Bailey's NHL career came to an abrupt end during the December 13, 1933, Leafs-Bruins game when Eddie Shore, aiming for Red Horner, checked him to the ice and fractured his skull.
</span></li><li data-dcnode-id="1392"><span data-dcnode-id="1400" instrument_node=""> In one of the most infamous cases of </span><a class="twikilink" data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnnecessaryRoughness" title="/pmwiki/pmwiki.php/Main/UnnecessaryRoughness"><span data-dcnode-id="1399" instrument_node="">Unnecessary Roughness</span></a><span data-dcnode-id="1397" instrument_node=""> in NHL history, Colorado Avalanche forward Steve Moore's career was </span><a class="urllink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Todd_Bertuzzi%25C2%2596Steve_Moore_incident"><span data-dcnode-id="1396" instrument_node="">cut short in 2004</span><img data-dcnode-id="1395" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1393" instrument_node=""> when he was sucker-punched from behind by Vancouver Canucks forward Todd Bertuzzi during a game, knocking him unconscious. Bertuzzi then fell on top of Moore, driving him face-first into the ice, and two of Bertuzzi's teammates piled on. All of this broke three vertebrae in Moore's neck (though, fortunately, he was not paralyzed as a result), left him with a serious concussion, and caused him to suffer several other injuries during the fight that broke out when his teammates rushed to his defense. Despite attempts to stage a comeback the following year, he continued to suffer concussion-like symptoms and was never medically cleared to play again.
</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node=""> In 1995, hockey player Travis Roy crashed head-first into the boards and severed his spine, becoming a quadriplegic, just 11 seconds into his first shift as a member of the Boston University hockey team, his boyhood dream.
</span></li></ul></li><li data-dcnode-id="1355"><span data-dcnode-id="1387" instrument_node=""> Other competitions:
</span><ul data-dcnode-id="1356"><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node=""> Bill McLaren was on the verge of playing his first game for Scotland's national rugby team when he contracted a near-fatal case of TB and was forced to give up playing. He went on to become a renowned commentator, earning him the nickname of "the voice of rugby".
</span></li><li data-dcnode-id="1373"><span data-dcnode-id="1384" instrument_node=""> It was strictly speaking a hobby rather than his career, but </span><a class="twikilink" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/HenryVIII" title="/pmwiki/pmwiki.php/UsefulNotes/HenryVIII"><span data-dcnode-id="1383" instrument_node="">Henry VIII</span></a><span data-dcnode-id="1381" instrument_node=""> of England was very fond of the sport of jousting until a serious accident in the lists stopped him at the age of 44. This was very significant because he seemed likely to die for a while, the shock may have caused his then-pregnant wife to miscarry, and </span><a class="urllink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/uk/this-britain/the-jousting-accident-that-turned-henry-viii-into-a-tyrant-1670421.html"><span data-dcnode-id="1380" instrument_node="">modern historians theorize that he may have suffered brain damage</span><img data-dcnode-id="1379" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1377" instrument_node=""> that turned him from a tough but sane and competent king into a </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoyallyScrewedUp" title="/pmwiki/pmwiki.php/Main/RoyallyScrewedUp"><span data-dcnode-id="1376" instrument_node="">dangerous tyrant</span></a><span data-dcnode-id="1374" instrument_node="">.
</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node=""> Maureen Connolly, one of the greatest women's tennis players of the 1950s, had her career end suddenly when her right leg was crushed in a horse-riding accident at age 19.
</span></li><li data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DickFrancis" title="/pmwiki/pmwiki.php/Creator/DickFrancis"><span data-dcnode-id="1369" instrument_node="">Dick Francis</span></a><span data-dcnode-id="1367" instrument_node=""> was a prominent jockey in National Hunt </span><a class="twikilink" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/HorseRacing" title="/pmwiki/pmwiki.php/UsefulNotes/HorseRacing"><span data-dcnode-id="1366" instrument_node="">horse racing</span></a><span data-dcnode-id="1364" instrument_node=""> in the post-WWII era, even winning one British season riding title. However, after a 1957 racing injury, his employer, Queen Elizabeth The Queen Mother, urged him to retire for his long-term health. He agreed with the Queen Mum, and started an even more successful second career as an author of crime fiction.
</span></li><li data-dcnode-id="1357"><span data-dcnode-id="1362" instrument_node=""> Competitors in mind sports suffer career-ending injuries too. Chess grandmaster </span><a class="urllink" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chessgames.com/perl/chessplayer%3Fpid%3D16564"><span data-dcnode-id="1361" instrument_node="">Milko Bobotsov</span><img data-dcnode-id="1360" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1358" instrument_node=""> was a world-class player until he suffered a near-fatal stroke in 1972 after a tournament. He survived but was never the same again.
</span></li></ul></li><li data-dcnode-id="1295"><span data-dcnode-id="1354" instrument_node=""> Athletes who became famous as performers:
</span><ul data-dcnode-id="1296"><li data-dcnode-id="1340"><span data-dcnode-id="1353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MattSmith" title="/pmwiki/pmwiki.php/Creator/MattSmith"><span data-dcnode-id="1352" instrument_node="">Matt Smith</span></a><span data-dcnode-id="1350" instrument_node=""> originally wanted to be a professional association footballer and was a rising star as the striker and captain of </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/EnglishPremierLeague" title="/pmwiki/pmwiki.php/UsefulNotes/EnglishPremierLeague"><span data-dcnode-id="1349" instrument_node="">English Premier League</span></a><span data-dcnode-id="1347" instrument_node=""> side Leicester City's youth team. However, a back injury put an end to his early career. Considering he's now a world-famous actor and </span><a class="twikilink" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/DoctorWho" title="/pmwiki/pmwiki.php/Series/DoctorWho"><span data-dcnode-id="1346" instrument_node="">the Eleventh Doctor</span></a><span data-dcnode-id="1344" instrument_node=""> (and got to </span><a class="twikilink" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCastShowoff" title="/pmwiki/pmwiki.php/Main/TheCastShowoff"><span data-dcnode-id="1343" instrument_node="">show off</span></a><span data-dcnode-id="1341" instrument_node=""> his still impressive football skills in the latter), we're going to go out on a limb and presume he's not too bitter about it.
</span></li><li data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DeanCain" title="/pmwiki/pmwiki.php/Creator/DeanCain"><span data-dcnode-id="1338" instrument_node="">Dean Cain</span></a><span data-dcnode-id="1336" instrument_node="">'s college football career was ended by a shoulder injury.
</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MichaelLandon" title="/pmwiki/pmwiki.php/Creator/MichaelLandon"><span data-dcnode-id="1333" instrument_node="">Michael Landon</span></a><span data-dcnode-id="1331" instrument_node=""> was a javelin thrower at USC before he tore his shoulder ligaments.
</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1329" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CountryMusic" title="/pmwiki/pmwiki.php/Main/CountryMusic"><span data-dcnode-id="1328" instrument_node="">Country Music</span></a><span data-dcnode-id="1326" instrument_node=""> singer </span><a class="twikilink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/JakeOwen" title="/pmwiki/pmwiki.php/Music/JakeOwen"><span data-dcnode-id="1325" instrument_node="">Jake Owen</span></a><span data-dcnode-id="1323" instrument_node=""> originally wanted to be a professional golfer, but a serious accident while wakeboarding resulted in reconstructive surgery that left him unable to continue.
</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node=""> Latin pop legend Julio Iglesias was a goalkeeper for Real Madrid Castilla, the reserve team of the legendary Spanish </span><a class="twikilink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AssociationFootball" title="/pmwiki/pmwiki.php/UsefulNotes/AssociationFootball"><span data-dcnode-id="1320" instrument_node="">football</span></a><span data-dcnode-id="1318" instrument_node=""> club until injuries suffered in an auto accident left him unable to walk for two years. While he was hospitalized, a nurse gave him a guitar to keep his hands occupied, and he discovered a gift for music.
</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node=""> Country star </span><a class="createlink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ChadBrownlee" title="/pmwiki/pmwiki.php/Music/ChadBrownlee"><span data-dcnode-id="1315" instrument_node="">Chad Brownlee</span></a><span data-dcnode-id="1313" instrument_node=""> was a first-round NHL draft pick until he messed up his knee in a game.
</span></li><li data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Rammstein" title="/pmwiki/pmwiki.php/Music/Rammstein"><span data-dcnode-id="1310" instrument_node="">Rammstein</span></a><span data-dcnode-id="1308" instrument_node=""> vocalist Till Lindemann had been a competitive swimmer in his youth and even qualified for participating in the 1980 Olympics. A stomach injury (and a falling out with the coaches) had put the brakes on that. It's entirely possible that if his swimming career hadn't been cut short, Rammstein may not have formed at all.
</span></li><li data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node=""> A lot of dancers tend to become actors or similar performers later on due to accidents. </span><a class="twikilink" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SummerGlau" title="/pmwiki/pmwiki.php/Creator/SummerGlau"><span data-dcnode-id="1305" instrument_node="">Summer Glau</span></a><span data-dcnode-id="1303" instrument_node="">, for instance, got her start as an actress after a broken toe forced her to put her career as a ballerina on hold.
</span></li><li data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CostasMandylor" title="/pmwiki/pmwiki.php/Creator/CostasMandylor"><span data-dcnode-id="1300" instrument_node="">Costas Mandylor</span></a><span data-dcnode-id="1298" instrument_node=""> was a professional soccer player for both Australia and Greece, but stress fractures to his shins eventually forced him to give up the sport.
</span></li></ul></li><li data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GordonRamsay" title="/pmwiki/pmwiki.php/Creator/GordonRamsay"><span data-dcnode-id="1293" instrument_node="">Gordon Ramsay</span></a><span data-dcnode-id="1291" instrument_node=""> was originally tipped for a professional football career with top-ranking Scottish side Glasgow Rangers, but a succession of serious leg and knee injuries in his late teens forced him to give up this dream. He turned instead to professional cooking.
</span></li><li data-dcnode-id="1138"><span data-dcnode-id="1289" instrument_node=""> Acting and performing:
</span><ul data-dcnode-id="1139"><li data-dcnode-id="1273"><span data-dcnode-id="1288" instrument_node=""> Actor </span><a class="twikilink" data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/ChristopherReeve" title="/pmwiki/pmwiki.php/Creator/ChristopherReeve"><span data-dcnode-id="1287" instrument_node="">Christopher Reeve</span></a><span data-dcnode-id="1285" instrument_node="">, best known for his role as </span><a class="twikilink" data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Superman" title="/pmwiki/pmwiki.php/Franchise/Superman"><span data-dcnode-id="1284" instrument_node="">Superman</span></a><span data-dcnode-id="1282" instrument_node=""> in the 1978 film series, was forced to quit acting in 1995 when a cervical spinal injury from a horse-riding accident paralyzed him. However, he would return a few times, in an updated version of </span><em data-dcnode-id="1279"><a class="twikilink" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/RearWindow" title="/pmwiki/pmwiki.php/Film/RearWindow"><span data-dcnode-id="1281" instrument_node="">Rear Window</span></a></em><span data-dcnode-id="1278" instrument_node="">, and a guest-starring role on </span><em data-dcnode-id="1275"><a class="twikilink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Smallville" title="/pmwiki/pmwiki.php/Series/Smallville"><span data-dcnode-id="1277" instrument_node="">Smallville</span></a></em><span data-dcnode-id="1274" instrument_node="">.
</span></li><li data-dcnode-id="1264"><span data-dcnode-id="1272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DudleyMoore" title="/pmwiki/pmwiki.php/Creator/DudleyMoore"><span data-dcnode-id="1271" instrument_node="">Dudley Moore</span></a><span data-dcnode-id="1269" instrument_node="">'s final years saw him slowly succumb to progressive supranuclear palsy, which ended his dual careers as an actor and pianist — he lost a role in </span><em data-dcnode-id="1266"><a class="twikilink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheMirrorHasTwoFaces" title="/pmwiki/pmwiki.php/Film/TheMirrorHasTwoFaces"><span data-dcnode-id="1268" instrument_node="">The Mirror Has Two Faces</span></a></em><span data-dcnode-id="1265" instrument_node=""> due to losing the ability to remember lines (as this happened before the fatal diagnosis, he was regarded as merely unprofessional at best), and the illness slowly robbed him of the dexterity he needed to play piano.
</span></li><li data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node=""> Roy Horn, of the stage magician duo Siegfried and Roy, got infamously mauled by a white tiger during a show on October 3, 2003. Their show, until then one of the most successful in Las Vegas history, came to an immediate halt, and the incident was one of the contributing factors (along with protests by animal rights groups and the success of </span><a class="twikilink" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CirqueDuSoleil" title="/pmwiki/pmwiki.php/Creator/CirqueDuSoleil"><span data-dcnode-id="1262" instrument_node="">Cirque du Soleil</span></a><span data-dcnode-id="1260" instrument_node="">) in ending the use of exotic animals in magic acts.
</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node=""> Illusionist Wayne Dobson was a big star in the UK in the late 1980s and early 1990s. He's still very active as a devisor of magic tricks and is well-known and respected in the industry, but hasn't been in the public eye since mobility issues caused by multiple sclerosis led him to step back from performing in the mid-1990s.
