</span></li></ul></li><li data-dcnode-id="2569"><span data-dcnode-id="2577" instrument_node=""> An arc in </span><em data-dcnode-id="2574"><a class="twikilink" data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Elementary" title="/pmwiki/pmwiki.php/Series/Elementary"><span data-dcnode-id="2576" instrument_node="">Elementary</span></a></em><span data-dcnode-id="2573" instrument_node=""> revolves around Sherlock attempting to avert this. After being diagnosed with </span><span class="spoiler" data-dcnode-id="2571" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2572" instrument_node="">Post-concussion syndrome</span></span><span data-dcnode-id="2570" instrument_node="">, his health starts taking a turn for the worse. He worries that he'll lose his ability to be a detective, which would subsequently leave him losing his reason for sobriety. The rest of the arc deals with his health issues and his attempts to avoid his illness becoming this trope.
</span></li><li data-dcnode-id="2560"><span data-dcnode-id="2568" instrument_node=""> The short-lived sitcom </span><em data-dcnode-id="2565"><a class="createlink" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/EncoreEncore" title="/pmwiki/pmwiki.php/Series/EncoreEncore"><span data-dcnode-id="2567" instrument_node="">Encore! Encore!</span></a></em><span data-dcnode-id="2564" instrument_node=""> starred </span><a class="twikilink" data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/NathanLane" title="/pmwiki/pmwiki.php/Creator/NathanLane"><span data-dcnode-id="2563" instrument_node="">Nathan Lane</span></a><span data-dcnode-id="2561" instrument_node=""> as an opera singer who retires to the family winery after a throat injury ruins his singing voice.
</span></li><li data-dcnode-id="2548"><span data-dcnode-id="2559" instrument_node=""> An episode of the revived </span><em data-dcnode-id="2556"><a class="twikilink" data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FantasyIsland" title="/pmwiki/pmwiki.php/Series/FantasyIsland"><span data-dcnode-id="2558" instrument_node="">Fantasy Island</span></a></em><span data-dcnode-id="2555" instrument_node=""> had a former high school nerd express his desire to trade places with a football jock from his school, hoping for a glorious career in pro football and ending up with a popular girl. Mr. Roarke obliges. He then does a </span><a class="twikilink" data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeSkip" title="/pmwiki/pmwiki.php/Main/TimeSkip"><span data-dcnode-id="2554" instrument_node="">Time Skip</span></a><span data-dcnode-id="2552" instrument_node=""> to a high school reunion, where the guys find out that his new life didn't turn out this way. During one of his first games, he receives an injury that permanently ends his career. He does end up with the girl, but they live in a trailer. He works at a department store and, apparently had trouble </span><a class="twikilink" data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheLoinsSleepTonight" title="/pmwiki/pmwiki.php/Main/TheLoinsSleepTonight"><span data-dcnode-id="2551" instrument_node="">performing in bed</span></a><span data-dcnode-id="2549" instrument_node="">. In the end, he opts to go back to his life, and he then makes it his personal mission to send the jock to college.
</span></li><li data-dcnode-id="2542"><span data-dcnode-id="2547" instrument_node=""> Kiira in </span><em data-dcnode-id="2544"><a class="twikilink" data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FleshAndBone" title="/pmwiki/pmwiki.php/Series/FleshAndBone"><span data-dcnode-id="2546" instrument_node="">Flesh and Bone</span></a></em><span data-dcnode-id="2543" instrument_node=""> is forced to end her ballet career because of a stress fracture to the ankle.
</span></li><li data-dcnode-id="2533"><span data-dcnode-id="2541" instrument_node=""> One episode of </span><em data-dcnode-id="2538"><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Forever" title="/pmwiki/pmwiki.php/Series/Forever"><span data-dcnode-id="2540" instrument_node="">Forever</span></a></em><span data-dcnode-id="2537" instrument_node=""> has Henry trying to determine who kidnapped a prima ballerina and cut off her foot ending her career. He ultimately determines that </span><span class="spoiler" data-dcnode-id="2535" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2536" instrument_node="">she arranged for herself to be kidnapped and mutilated, having learned that she had a disease that would have forced her to retire in a year or two anyway.</span></span><span data-dcnode-id="2534" instrument_node="">
</span></li><li data-dcnode-id="2527"><span data-dcnode-id="2532" instrument_node=""> </span><em data-dcnode-id="2529"><a class="twikilink" data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Frasier" title="/pmwiki/pmwiki.php/Series/Frasier"><span data-dcnode-id="2531" instrument_node="">Frasier</span></a></em><span data-dcnode-id="2528" instrument_node="">'s dad Martin's bullet to the hip ended his police career.
</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2526" instrument_node=""> In the pilot for </span><em data-dcnode-id="2523"><a class="twikilink" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FridayNightLights" title="/pmwiki/pmwiki.php/Series/FridayNightLights"><span data-dcnode-id="2525" instrument_node="">Friday Night Lights</span></a></em><span data-dcnode-id="2522" instrument_node=""> Jason is paralyzed in an injury ending his planned career as a football player.
</span></li><li data-dcnode-id="2515"><span data-dcnode-id="2520" instrument_node=""> In </span><em data-dcnode-id="2517"><a class="twikilink" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/HawaiiFive0" title="/pmwiki/pmwiki.php/Series/HawaiiFive0"><span data-dcnode-id="2519" instrument_node="">Hawaii Five-0</span></a></em><span data-dcnode-id="2516" instrument_node="">, Kono was on track to a professional surfing career before she injured her knee and had to switch to police work.
</span></li><li data-dcnode-id="2509"><span data-dcnode-id="2514" instrument_node=""> Joe Dawson in </span><em data-dcnode-id="2511"><a class="twikilink" data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Highlander" title="/pmwiki/pmwiki.php/Series/Highlander"><span data-dcnode-id="2513" instrument_node="">Highlander</span></a></em><span data-dcnode-id="2510" instrument_node=""> was a high school football star who got drafted to Vietnam and had his legs blown off.
</span></li><li data-dcnode-id="2490"><span data-dcnode-id="2508" instrument_node=""> </span><em data-dcnode-id="2505"><a class="twikilink" data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/JAG" title="/pmwiki/pmwiki.php/Series/JAG"><span data-dcnode-id="2507" instrument_node="">JAG</span></a></em><span data-dcnode-id="2504" instrument_node="">:
</span><ul data-dcnode-id="2491"><li data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node=""> The series is centered on a Naval Aviator named </span><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Characters/JAG" title="/pmwiki/pmwiki.php/Characters/JAG"><span data-dcnode-id="2502" instrument_node="">Harmon Rabb, Jr.</span></a><span data-dcnode-id="2500" instrument_node=""> He was a carrier fighter pilot, following in his father's footsteps until he crashed his plane in a night landing on an aircraft carrier due to an undiagnosed vision problem. In order to stay in the Navy, he went to law school and became a judge advocate (military lawyer).
</span></li><li data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node=""> In Rabb's case, this gets subverted by the beginning of Season 5, where surgery to correct his problem allowed him to resume a career as a fighter pilot. However, he leaves </span><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">once again</span></em><span data-dcnode-id="2495" instrument_node=""> for the judge advocate branch because he is going to continually get passed over for squadron command by other aviators who've had longer uninterrupted careers.
</span></li><li data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node=""> Also at the end of season 7, Bud Roberts steps on a landmine in Afghanistan and has to struggle throughout the next two seasons to remain in the Navy.
</span></li></ul></li><li data-dcnode-id="2484"><span data-dcnode-id="2489" instrument_node=""> In </span><em data-dcnode-id="2486"><a class="twikilink" data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Lodge49" title="/pmwiki/pmwiki.php/Series/Lodge49"><span data-dcnode-id="2488" instrument_node="">Lodge 49</span></a></em><span data-dcnode-id="2485" instrument_node="">, Dud's hopes of becoming a professional surfer came to a screeching halt after a snake bit him on the foot. The wound never healed properly, and now he can't surf anymore.
</span></li><li data-dcnode-id="2471"><span data-dcnode-id="2483" instrument_node=""> It happens a few times on </span><em data-dcnode-id="2480"><a class="twikilink" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MASH" title="/pmwiki/pmwiki.php/Series/MASH"><span data-dcnode-id="2482" instrument_node="">M*A*S*H</span></a></em><span data-dcnode-id="2479" instrument_node="">:
</span><ul data-dcnode-id="2472"><li data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node=""> In one episode, a football player has to have his leg amputated. Feeling angry and bitter about it, he contemplates suicide, thinking that playing football was the only thing that he was any good at. But as he and Radar reminisce about a tough game he played, he remembers the importance of not giving up, so he leaves with the resolve to at least try.
</span></li><li data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node=""> In another episode, a concert pianist loses dexterity in his hand. Unlike the football player, he doesn't hold it against his doctor but is still left with a lot of self-loathing and the belief that his gift of music is gone. Major Winchester helps him through it by giving him some sheet music for the left hand only. The man claims that he can't make a career out of those pieces and Winchester is aware of it, but he does this act to show him that, regardless of his physical ability, he still has his gift and encourages him to find other ways to share it with the world. "You and the piano will always be as one."
</span></li><li data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node=""> In another episode, an army helicopter pilot is revealed to have diabetes. He kept it a secret for this long by scrounging his own insulin and watching what he consumes. He doesn't want to lose his career as an army pilot, but since it's inevitable when his disease is exposed, he accepts this graciously by the end of the episode and, from what he says, appears at least willing to accept a desk job.
</span></li></ul></li><li data-dcnode-id="2465"><span data-dcnode-id="2470" instrument_node=""> In </span><em data-dcnode-id="2467"><a class="twikilink" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MiamiVice" title="/pmwiki/pmwiki.php/Series/MiamiVice"><span data-dcnode-id="2469" instrument_node="">Miami Vice</span></a></em><span data-dcnode-id="2466" instrument_node="">, Crockett played football in college but had to stop after fracturing his knee.
</span></li><li data-dcnode-id="2459"><span data-dcnode-id="2464" instrument_node=""> Hank from the </span><em data-dcnode-id="2461"><a class="twikilink" data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MidnightCaller" title="/pmwiki/pmwiki.php/Series/MidnightCaller"><span data-dcnode-id="2463" instrument_node="">Midnight Caller</span></a></em><span data-dcnode-id="2460" instrument_node=""> episode "Twelve Gauge" used to work in construction. After becoming paralyzed from the waist down in an accident, he feels he has nothing left to live for.
</span></li><li data-dcnode-id="2453"><span data-dcnode-id="2458" instrument_node=""> In the </span><em data-dcnode-id="2455"><a class="twikilink" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MissionImpossible" title="/pmwiki/pmwiki.php/Series/MissionImpossible"><span data-dcnode-id="2457" instrument_node="">Mission: Impossible</span></a></em><span data-dcnode-id="2454" instrument_node=""> two-parter "The Contender", Barney impersonates an up-and-coming boxer who had to give up fighting after being sent to Vietnam and wrecking his hands rescuing a man from a burning plane, claiming that he had recovered from said injury and was ready to return to boxing. At the end of the second episode, Barney wins the championship and then switches places with the man he impersonated, who tells the press that he suffered another major injury to his hands during the match and would have to retire again.
</span></li><li data-dcnode-id="2447"><span data-dcnode-id="2452" instrument_node=""> </span><em data-dcnode-id="2449"><a class="twikilink" data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Monk" title="/pmwiki/pmwiki.php/Series/Monk"><span data-dcnode-id="2451" instrument_node="">Monk</span></a></em><span data-dcnode-id="2448" instrument_node=""> was able to manage his OCD until his wife's death caused a breakdown that made the condition much worse. This ends his career as a police officer.
</span></li><li data-dcnode-id="2438"><span data-dcnode-id="2446" instrument_node=""> </span><em data-dcnode-id="2443"><a class="twikilink" data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MurdochMysteries" title="/pmwiki/pmwiki.php/Series/MurdochMysteries"><span data-dcnode-id="2445" instrument_node="">Murdoch Mysteries</span></a></em><span data-dcnode-id="2442" instrument_node="">: In "Hot Wheels of Thunder", prior to the roller races, a </span><a class="twikilink" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CripplingTheCompetition" title="/pmwiki/pmwiki.php/Main/CripplingTheCompetition"><span data-dcnode-id="2441" instrument_node="">Crippling the Competition</span></a><span data-dcnode-id="2439" instrument_node=""> assault on Miss Palmer ends her skating career.
</span></li><li data-dcnode-id="2427"><span data-dcnode-id="2437" instrument_node=""> </span><em data-dcnode-id="2434"><a class="twikilink" data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheOuterLimits1995" title="/pmwiki/pmwiki.php/Series/TheOuterLimits1995"><span data-dcnode-id="2436" instrument_node="">The Outer Limits (1995)</span></a></em><span data-dcnode-id="2433" instrument_node="">:
</span><ul data-dcnode-id="2428"><li data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node=""> In "Abduction", Ray was the star running back of the Eden Park High School football team until he injured his knee, bringing his football career to a swift end.
</span></li><li data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node=""> In "Lion's Den", Peter Shotwell was one of the stars of the hugely successful Lewisborough High School wrestling team from 1976 to 1979 but he tore up his left knee, ending his chances of a professional career.
</span></li></ul></li><li data-dcnode-id="2421"><span data-dcnode-id="2426" instrument_node=""> Subverted on </span><em data-dcnode-id="2423"><a class="twikilink" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Raines" title="/pmwiki/pmwiki.php/Series/Raines"><span data-dcnode-id="2425" instrument_node="">Raines</span></a></em><span data-dcnode-id="2422" instrument_node="">. Charlie is Raines' former partner on the police force whose career ended when he was hit in a shootout. Afterward, he discusses the cases Raines works and his tendency to converse with hallucinations of the murder victims. At the end of the first episode, it's revealed that Charlie actually died in the shootout and is now another of Raines' hallucinations.
</span></li><li data-dcnode-id="2412"><span data-dcnode-id="2420" instrument_node=""> </span><em data-dcnode-id="2417"><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheRanch" title="/pmwiki/pmwiki.php/Series/TheRanch"><span data-dcnode-id="2419" instrument_node="">The Ranch</span></a></em><span data-dcnode-id="2416" instrument_node="">: Colt hasn't </span><em data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">quite</span></em><span data-dcnode-id="2413" instrument_node=""> given up on football, but three concussions, a bad shoulder, and possibly a bad knee have killed his shot at the NFL.
</span></li><li data-dcnode-id="2403"><span data-dcnode-id="2411" instrument_node=""> </span><em data-dcnode-id="2408"><a class="twikilink" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ScreamQueens2015" title="/pmwiki/pmwiki.php/Series/ScreamQueens2015"><span data-dcnode-id="2410" instrument_node="">Scream Queens (2015)</span></a></em><span data-dcnode-id="2407" instrument_node="">'s second season has Dr. Brock Holt, who was a brilliant surgeon until he lost a hand in a horrifying garbage disposal accident. After the world's first successful hand transplant, he's back to performing surgery, but reduced to working at the serial-killer-stalked C.U.R.E. Institute (formerly </span><a class="twikilink" data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IDontLikeTheSoundOfThatPlace" title="/pmwiki/pmwiki.php/Main/IDontLikeTheSoundOfThatPlace"><span data-dcnode-id="2406" instrument_node="">Our Lady of Perpetual Suffering Hospital</span></a><span data-dcnode-id="2404" instrument_node="">).
</span></li><li data-dcnode-id="2388"><span data-dcnode-id="2402" instrument_node=""> On </span><em data-dcnode-id="2399"><a class="twikilink" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/SEALTeam" title="/pmwiki/pmwiki.php/Series/SEALTeam"><span data-dcnode-id="2401" instrument_node="">SEAL Team</span></a></em><span data-dcnode-id="2398" instrument_node=""> this is a highly likely possibility for all the SEAL characters. They perform extremely dangerous missions and put their bodies through extreme stress.
</span><ul data-dcnode-id="2389"><li data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node=""> Danny had to retire after barely surviving a bomb blast and is still in a lot of pain.
</span></li><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node=""> Ray injured his shoulder and lied about going to see a doctor because it could get him pulled from a mission and cost him his combat hazard pay. When someone dies because of the lie, Ray is horribly guilt-ridden but fears that if he comes clean, it will end his career in the Navy.
</span></li><li data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node=""> Jason sustains a nasty hit on the head which has him disoriented and hallucinating. He lies about the symptoms to his doctor because he does not want to be taken off the team. When he returns home, the injury flares up again and he has a nasty episode in a restaurant that puts his future as team leader and SEAL in question.
</span></li><li data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node=""> A major storyline in late season 2 involves Clay surviving an IED blast but suffering severe shrapnel wounds that leave him with nerve damage in his right leg. He initially shuts down and refuses to even talk to his very worried team after doctors tell him his career may be over. At season's end, it's still up in the air whether Clay will ever be able to return to being a SEAL.
</span></li></ul></li><li data-dcnode-id="2376"><span data-dcnode-id="2387" instrument_node=""> John Watson has been invalided home from Afghanistan due to his </span><span class="spoiler" data-dcnode-id="2385" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2386" instrument_node="">shoulder</span></span><span data-dcnode-id="2384" instrument_node=""> injury in </span><em data-dcnode-id="2381"><a class="twikilink" data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Sherlock" title="/pmwiki/pmwiki.php/Series/Sherlock"><span data-dcnode-id="2383" instrument_node="">Sherlock</span></a></em><span data-dcnode-id="2380" instrument_node="">. His return to England and subsequent need for a flatshare kicks off his first meeting with </span><a class="twikilink" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefectiveDetective" title="/pmwiki/pmwiki.php/Main/DefectiveDetective"><span data-dcnode-id="2379" instrument_node="">Sherlock</span></a><span data-dcnode-id="2377" instrument_node=""> and the rest of the series.
</span></li><li data-dcnode-id="2367"><span data-dcnode-id="2375" instrument_node=""> </span><em data-dcnode-id="2372"><a class="twikilink" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/SpaceAboveAndBeyond" title="/pmwiki/pmwiki.php/Series/SpaceAboveAndBeyond"><span data-dcnode-id="2374" instrument_node="">Space: Above and Beyond</span></a></em><span data-dcnode-id="2371" instrument_node=""> has Lieutenant Colonel T.C. McQueen, who was an elite fighter pilot before he suffered a debilitating head injury in combat. He has enough experience to warrant making him a squadron commander, acting in the role of </span><a class="twikilink" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MissionControl" title="/pmwiki/pmwiki.php/Main/MissionControl"><span data-dcnode-id="2370" instrument_node="">Mission Control</span></a><span data-dcnode-id="2368" instrument_node=""> for his young pilots.
</span></li><li data-dcnode-id="2361"><span data-dcnode-id="2366" instrument_node=""> In </span><em data-dcnode-id="2363"><a class="twikilink" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/SpartacusBloodAndSand" title="/pmwiki/pmwiki.php/Series/SpartacusBloodAndSand"><span data-dcnode-id="2365" instrument_node="">Spartacus: Blood and Sand</span></a></em><span data-dcnode-id="2362" instrument_node="">, Agron gets captured by the Romans and crucified. He survives and is rescued, but the damage to his arms prevents him from gripping a sword ever again. He manages to participate in the final battle by having blades strapped to his arm and shield, but he retires from being a warrior afterward.
</span></li><li data-dcnode-id="2355"><span data-dcnode-id="2360" instrument_node=""> </span><em data-dcnode-id="2357"><a class="twikilink" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekTheOriginalSeries" title="/pmwiki/pmwiki.php/Series/StarTrekTheOriginalSeries"><span data-dcnode-id="2359" instrument_node="">Star Trek: The Original Series</span></a></em><span data-dcnode-id="2356" instrument_node="">: The episode "The Menagerie" (largely conceived as a way to use the footage from the unaired original pilot) begins with Spock learning that his former Captain, Christopher Pike, has been severely injured by a radiation leak. While no one could bring themselves to formally revoke his commission, he's clearly not capable of actually performing his duties (or doing much of anything else, for that matter).
</span></li><li data-dcnode-id="2345"><span data-dcnode-id="2354" instrument_node=""> </span><em data-dcnode-id="2351"><a class="twikilink" data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StElsewhere" title="/pmwiki/pmwiki.php/Series/StElsewhere"><span data-dcnode-id="2353" instrument_node="">St. Elsewhere</span></a></em><span data-dcnode-id="2350" instrument_node="">: In "Brand New Bag", Warren Coolidge mentions that his chances of playing basketball in the NBA ended when he hurt his knee. He subsequently dropped out of Carver High School, which he attended in </span><em data-dcnode-id="2347"><a class="twikilink" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheWhiteShadow" title="/pmwiki/pmwiki.php/Series/TheWhiteShadow"><span data-dcnode-id="2349" instrument_node="">The White Shadow</span></a></em><span data-dcnode-id="2346" instrument_node="">, and became an orderly.
</span></li><li data-dcnode-id="2339"><span data-dcnode-id="2344" instrument_node=""> </span><em data-dcnode-id="2341"><a class="twikilink" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1985" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1985"><span data-dcnode-id="2343" instrument_node="">The Twilight Zone (1985)</span></a></em><span data-dcnode-id="2340" instrument_node="">: In "Extra Innings", Ed Hamner was a pitcher for the Detriot Tigers until he severely injured his left knee during a game, giving him a permanent limp.
</span></li><li data-dcnode-id="2333"><span data-dcnode-id="2338" instrument_node=""> Blues singer Lester Grimes in </span><em data-dcnode-id="2335"><a class="twikilink" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Vinyl" title="/pmwiki/pmwiki.php/Series/Vinyl"><span data-dcnode-id="2337" instrument_node="">Vinyl</span></a></em><span data-dcnode-id="2334" instrument_node="">. Mob thugs beat him up and permanently damaged his windpipe, depriving him of his powerful and iconic singing voice.
</span></li><li data-dcnode-id="2327"><span data-dcnode-id="2332" instrument_node=""> </span><em data-dcnode-id="2329"><a class="twikilink" data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/WhiteCollar" title="/pmwiki/pmwiki.php/Series/WhiteCollar"><span data-dcnode-id="2331" instrument_node="">White Collar</span></a></em><span data-dcnode-id="2328" instrument_node="">'s Peter Burke was a professional baseball player when he tore his rotator cuff. The injury healed just fine and he was able to play baseball again, though a doctor advised him he could re-injure. Rather than risk losing both his baseball career and the possibility of joining the FBI, Peter opted to quit baseball and simply join the FBI.
</span></li><li data-dcnode-id="2321"><span data-dcnode-id="2326" instrument_node=""> Tony Micelli of </span><em data-dcnode-id="2323"><a class="twikilink" data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/WhosTheBoss" title="/pmwiki/pmwiki.php/Series/WhosTheBoss"><span data-dcnode-id="2325" instrument_node="">Who's the Boss?</span></a></em><span data-dcnode-id="2322" instrument_node=""> was a professional baseball player before a shoulder injury.
</span></li><li data-dcnode-id="2300"><span data-dcnode-id="2320" instrument_node=""> In </span><em data-dcnode-id="2317"><a class="twikilink" data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheRightStuff" title="/pmwiki/pmwiki.php/Series/TheRightStuff"><span data-dcnode-id="2319" instrument_node="">The Right Stuff</span></a></em><span data-dcnode-id="2316" instrument_node=""> this is a constant fear of the astronauts.
</span><ul data-dcnode-id="2301"><li data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node=""> Alan Shepard has an undiagnosed condition inner ear condition that causes him to temporarily lose balance and hearing. It should disqualify him from the astronaut program and probably from flying at all. However, it is intermittent and he is able to hide it from NASA till after his historic mission as the first American in space.
</span></li><li data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node=""> Chris Kraft badly burned his hand as a child. When he applied for flight training, the damage was deemed too extensive and he was rejected.
</span></li><li data-dcnode-id="2304"><span data-dcnode-id="2311" instrument_node=""> Subverted with Deke Slayton who lost a ring finger in a farm accident as a child. That finger is deemed non-essential for a pilot and he was accepted for pilot training. He was later diagnosed with heart arrhythmia but it was not deemed serious to ground him. It was then double-subverted when NASA changes its mind and grounds him due to the arrhythmia after all.</span><span class="notelabel" data-dcnode-id="2308" onclick="togglenote('note140u1');" style="cursor: pointer;"><sup data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2306" id="note140u1" isnote="true" onclick="togglenote('note140u1');" style="display: none; cursor: pointer;"><span data-dcnode-id="2307" instrument_node="">In real life, the trope would become triple-subverted in 1975 when Slayton flew as part of the Apollo-Soyuz mission.</span></span><span data-dcnode-id="2305" instrument_node="">
</span></li><li data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node=""> John Glenn is about to be retired from test flying because he is getting too old and his reflexes are not as good as they used to be.
</span></li></ul></li><li data-dcnode-id="2275"><span data-dcnode-id="2299" instrument_node=""> </span><em data-dcnode-id="2296"><a class="twikilink" data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/UltraSeries" title="/pmwiki/pmwiki.php/Franchise/UltraSeries"><span data-dcnode-id="2298" instrument_node="">Ultra Series</span></a></em><span data-dcnode-id="2295" instrument_node="">:
</span><ul data-dcnode-id="2276"><li data-dcnode-id="2289"><span data-dcnode-id="2294" instrument_node=""> </span><em data-dcnode-id="2291"><a class="twikilink" data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Ultraseven" title="/pmwiki/pmwiki.php/Series/Ultraseven"><span data-dcnode-id="2293" instrument_node="">Ultraseven</span></a></em><span data-dcnode-id="2290" instrument_node="">: At the end of the series, Seven's many injuries sustained during all his fights leave him hurt enough that he has to leave Earth lest he dies, leaving his friends and life he made in his human form behind.
</span></li><li data-dcnode-id="2283"><span data-dcnode-id="2288" instrument_node=""> </span><em data-dcnode-id="2285"><a class="twikilink" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/UltramanLeo" title="/pmwiki/pmwiki.php/Series/UltramanLeo"><span data-dcnode-id="2287" instrument_node="">Ultraman Leo</span></a></em><span data-dcnode-id="2284" instrument_node="">: Seven returns in the first episode to confront Alien Magma and the Giras Brothers, but the trio overwhelm him and break his leg, forcing Leo to rescue him. His leg remains injured even when he takes human form, and the damage sustained through both that and the beatdown given to him by the villains leave him unable to do much fighting, instead becoming a supporting mentor to Leo.
</span></li><li data-dcnode-id="2277"><span data-dcnode-id="2282" instrument_node=""> </span><em data-dcnode-id="2279"><a class="twikilink" data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/HeiseiUltraseven" title="/pmwiki/pmwiki.php/Series/HeiseiUltraseven"><span data-dcnode-id="2281" instrument_node="">Heisei Ultraseven</span></a></em><span data-dcnode-id="2278" instrument_node="">: Ran further with it, showing that Seven was out of commission while recovering on Earth after failing to leave the planet, within the series it took more than 20 years for him to recover.
</span></li></ul></li></ul></div><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2271"></p><div class="folderlabel" data-dcnode-id="2269" onclick="togglefolder('folder8');"><span data-dcnode-id="2270" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Music&nbsp;</span></div><div class="folder" data-dcnode-id="2261" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="2268" instrument_node="">
</span><ul data-dcnode-id="2262"><li data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node=""> "Knee Reconstruction" by Greg Champion (to the tune of "Eve of Destruction" by Barry McGuire) is about a footballer who injures his knee, is forced to sit on the sidelines for a year while undergoing reconstructive surgery, and then returns, only to injure his knee </span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">again</span></em><span data-dcnode-id="2264" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2259"></p><div class="folderlabel" data-dcnode-id="2257" onclick="togglefolder('folder9');"><span data-dcnode-id="2258" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Pro Wrestling&nbsp;</span></div><div class="folder" data-dcnode-id="2176" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="2256" instrument_node="">
</span><ul data-dcnode-id="2177"><li data-dcnode-id="2234"><span data-dcnode-id="2255" instrument_node=""> Such real-life injuries happen often in </span><a class="twikilink" data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProfessionalWrestling" title="/pmwiki/pmwiki.php/Main/ProfessionalWrestling"><span data-dcnode-id="2254" instrument_node="">Professional Wrestling</span></a><span data-dcnode-id="2252" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/StoneColdSteveAustin" title="/pmwiki/pmwiki.php/Wrestling/StoneColdSteveAustin"><span data-dcnode-id="2251" instrument_node="">"Stone Cold" Steve Austin</span></a><span class="notelabel" data-dcnode-id="2247" onclick="togglenote('note26727');" style="cursor: pointer;"><sup data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2245" id="note26727" isnote="true" onclick="togglenote('note26727');" style="display: none; cursor: pointer;"><span data-dcnode-id="2246" instrument_node="">Austin continued wrestling for several years after having his neck broken, but the injury limited his moveset, and he was forced to retire or risk (at best) permanent paralysis by the end of his run in 2003</span></span><span data-dcnode-id="2244" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/TedDiBiase" title="/pmwiki/pmwiki.php/Wrestling/TedDiBiase"><span data-dcnode-id="2243" instrument_node="">Ted DiBiase</span></a><span data-dcnode-id="2241" instrument_node="">, Hayabusa, and </span><a class="twikilink" data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/YoshihiroTakayama" title="/pmwiki/pmwiki.php/Wrestling/YoshihiroTakayama"><span data-dcnode-id="2240" instrument_node="">Yoshihiro Takayama</span></a><span data-dcnode-id="2238" instrument_node=""> are just some, and then there are the injuries that weren't only career-ending, but </span><a class="twikilink" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FatalMethodActing" title="/pmwiki/pmwiki.php/Main/FatalMethodActing"><span data-dcnode-id="2237" instrument_node="">life-ending</span></a><span data-dcnode-id="2235" instrument_node="">.
</span></li><li data-dcnode-id="2226"><span data-dcnode-id="2233" instrument_node=""> An infamous plane crash in 1975 killed its pilot, a man named Joseph Farkas, and also ended the careers of professional wrestlers Johnny Valentine and Bob Bruggers. Future legend </span><a class="twikilink" data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/RicFlair" title="/pmwiki/pmwiki.php/Wrestling/RicFlair"><span data-dcnode-id="2232" instrument_node="">Ric Flair</span></a><span data-dcnode-id="2230" instrument_node=""> was also badly injured in the crash but was able to continue his career after fixing his broken back. Bruggers could have made a comeback but decided to simply retire instead. "Mr. Wrestling" Tim Woods was injured as well but made a comeback, and actually returned to the ring </span><em data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">two weeks</span></em><span data-dcnode-id="2227" instrument_node=""> after the crash despite being in horrible pain, just to dispel the rumors that he had been on the plane, as he was a Face and Flair, Valentine and Bruggers were heels, and it would have hurt kayfabe for them to have travelled together.
</span></li><li data-dcnode-id="2221"><span data-dcnode-id="2225" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/BryanDanielson" title="/pmwiki/pmwiki.php/Wrestling/BryanDanielson"><span data-dcnode-id="2224" instrument_node="">Daniel Bryan</span></a><span data-dcnode-id="2222" instrument_node=""> was forced to retire from the ring in February 2016 due to concussion issues. However, he would be medically cleared to compete in 2018.
</span></li><li data-dcnode-id="2213"><span data-dcnode-id="2220" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/CoreyGraves" title="/pmwiki/pmwiki.php/Wrestling/CoreyGraves"><span data-dcnode-id="2219" instrument_node="">Corey Graves</span></a><span data-dcnode-id="2217" instrument_node="">' in-ring career was cut short due to concussions. By no means, however, was he done with wrestling, as he would later make his debut at NXT Takeover: R-Evolution as a ringside </span><em data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">commentator.</span></em><span data-dcnode-id="2214" instrument_node="">
</span></li><li data-dcnode-id="2208"><span data-dcnode-id="2212" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/MickFoley" title="/pmwiki/pmwiki.php/Wrestling/MickFoley"><span data-dcnode-id="2211" instrument_node="">Mick Foley</span></a><span data-dcnode-id="2209" instrument_node=""> whose major injuries and surgeries over the span of his career have effectively retired him from active competition.
</span></li><li data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/WilliamRegal" title="/pmwiki/pmwiki.php/Wrestling/WilliamRegal"><span data-dcnode-id="2206" instrument_node="">William Regal</span></a><span data-dcnode-id="2204" instrument_node=""> has had accumulated injuries and has had major surgeries and eventually had to retire from the ring.
</span></li><li data-dcnode-id="2195"><span data-dcnode-id="2202" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/Paige" title="/pmwiki/pmwiki.php/Wrestling/Paige"><span data-dcnode-id="2201" instrument_node="">Paige</span></a><span data-dcnode-id="2199" instrument_node=""> had to retire from in-ring competition at only </span><em data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">25</span></em><span data-dcnode-id="2196" instrument_node=""> because of neck injuries. That, on top of the wear and tear of wrestling as young as 13.
</span></li><li data-dcnode-id="2187"><span data-dcnode-id="2194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/BretHart" title="/pmwiki/pmwiki.php/Wrestling/BretHart"><span data-dcnode-id="2193" instrument_node="">Bret Hart</span></a><span data-dcnode-id="2191" instrument_node=""> suffered a concussion so severe that any significant blow to the head would give him </span><em data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">another</span></em><span data-dcnode-id="2188" instrument_node=""> concussion. Two years after he retired due to this injury, he suffered a stroke as a consequence of that injury. The cumulative damage from all of these cranial ailments means he cannot safely lift weights or board airplanes, let alone perform in a professional wrestling ring.
</span></li><li data-dcnode-id="2178"><span data-dcnode-id="2186" instrument_node=""> Darren "Droz" Drozdov was rendered quadriplegic in 1999 after an incident during a recording of </span><em data-dcnode-id="2183"><a class="twikilink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/WWESmackDown" title="/pmwiki/pmwiki.php/Wrestling/WWESmackDown"><span data-dcnode-id="2185" instrument_node="">WWE SmackDown</span></a></em><span data-dcnode-id="2182" instrument_node="">, where </span><a class="twikilink" data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/DLoBrown" title="/pmwiki/pmwiki.php/Wrestling/DLoBrown"><span data-dcnode-id="2181" instrument_node="">D'Lo Brown</span></a><span data-dcnode-id="2179" instrument_node=""> botched a powerbomb and accidentally broke his neck (it's been widely agreed to have been a tragic accident out of D'Lo's control, and Droz holds no animosity towards him for the incident). Droz would later become a writer and columnist and has since regained some control of his upper body and arms.
</span></li></ul></div><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2174"></p><div class="folderlabel" data-dcnode-id="2172" onclick="togglefolder('folder10');"><span data-dcnode-id="2173" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Religion and Mythology&nbsp;</span></div><div class="folder" data-dcnode-id="2156" id="folder10" isfolder="true" style="display:block;"><span data-dcnode-id="2171" instrument_node="">
</span><ul data-dcnode-id="2157"><li data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2169" instrument_node="">The Bible</span></a><span data-dcnode-id="2167" instrument_node=""> lists several types of injuries that disqualify kohenim (Jewish priests) from performing the sacrificial service. Some are temporary, though, and even those under the ban can eat the holy sacrifices.
</span></li><li data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Subverted" title="/pmwiki/pmwiki.php/Main/Subverted"><span data-dcnode-id="2164" instrument_node="">Subverted</span></a><span data-dcnode-id="2162" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/CelticMythology" title="/pmwiki/pmwiki.php/Myth/CelticMythology"><span data-dcnode-id="2161" instrument_node="">Celtic Mythology</span></a><span data-dcnode-id="2159" instrument_node="">. Nuada loses his hand in battle against the Fomorians, and since the law says that the king has to be "perfect," he's replaced with Eochu Bres. After Eochu Bres spends seven years letting his Fomorian relatives rule the country, Nuada takes the throne again. Depending on the version, he either a.) used a silver prosthetic, earning him the name "Argetlam" ("silver hand"), or b.) used said silver hand during the seven years Eochu Bres ruled, then got a normal hand thanks to the healing god Miach.
</span></li></ul></div><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2154"></p><div class="folderlabel" data-dcnode-id="2152" onclick="togglefolder('folder11');"><span data-dcnode-id="2153" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Roleplay&nbsp;</span></div><div class="folder" data-dcnode-id="2139" id="folder11" isfolder="true" style="display:block;"><span data-dcnode-id="2151" instrument_node="">
</span><ul data-dcnode-id="2140"><li data-dcnode-id="2141"><span data-dcnode-id="2150" instrument_node=""> </span><em data-dcnode-id="2146"><a class="twikilink" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Roleplay/DoubtAcademy" title="/pmwiki/pmwiki.php/Roleplay/DoubtAcademy"><span data-dcnode-id="2149" instrument_node="">Doubt Academy</span></a><span data-dcnode-id="2147" instrument_node="">: White</span></em><span data-dcnode-id="2145" instrument_node=""> uses the </span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">threat</span></em><span data-dcnode-id="2142" instrument_node=""> of this as its second motive. Monobear tells the students that unless a murder occurs within a week, he'll randomly select one of the students and cripple them in a way that'll ruin their SHSL Talent.
</span></li></ul></div><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2137"></p><div class="folderlabel" data-dcnode-id="2135" onclick="togglefolder('folder12');"><span data-dcnode-id="2136" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="2106" id="folder12" isfolder="true" style="display:block;"><span data-dcnode-id="2134" instrument_node="">
</span><ul data-dcnode-id="2107"><li data-dcnode-id="2125"><span data-dcnode-id="2133" instrument_node=""> </span><em data-dcnode-id="2130"><a class="createlink" data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGames/Traveler" title="/pmwiki/pmwiki.php/TabletopGames/Traveler"><span data-dcnode-id="2132" instrument_node="">Traveler</span></a></em><span data-dcnode-id="2129" instrument_node="">: During character creation, you may suffer a crippling injury in the line of duty, and have the option to undergo a risky medical procedure (which may restore you completely, or kill you - and yes, this is still during </span><em data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">character creation</span></em><span data-dcnode-id="2126" instrument_node="">). Refusing gives you some stat penalties and forces you to muster out immediately, as you're no longer deemed fit to serve. (You can still be an adventurer.)
</span></li><li data-dcnode-id="2108"><span data-dcnode-id="2124" instrument_node=""> </span><em data-dcnode-id="2121"><a class="twikilink" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer40000" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer40000"><span data-dcnode-id="2123" instrument_node="">Warhammer 40,000</span></a></em><span data-dcnode-id="2120" instrument_node="">: Thanks to the prevalence of crude biomechanical limbs, many soldiers can continue serving the Imperium even with lost limbs.
</span><ul data-dcnode-id="2109"><li data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node=""> However, it's heavily implied that some such soldiers are lobotomized and given cybernetics to function as servitors.
</span></li><li data-dcnode-id="2110"><span data-dcnode-id="2117" instrument_node=""> Space Marines too heavily wounded even for cybernetics or the Apothecary's skill can be interred in a Dreadnought, a </span><a class="twikilink" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiniMecha" title="/pmwiki/pmwiki.php/Main/MiniMecha"><span data-dcnode-id="2116" instrument_node="">Mini-Mecha</span></a><span data-dcnode-id="2114" instrument_node=""> that functions as a life-support system and heavy weapons platform at the cot of putting the Marine into centuries-long sleep between battles. Interestingly, Traitor Marines do this as well... except they see it as </span><em data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">punishment</span></em><span data-dcnode-id="2111" instrument_node="">: Chaos Dreadnoughts have their legs and weapons removed during battles, but they don't get to sleep between battles and are instead chained to a wall.
</span></li></ul></li></ul></div><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2104"></p><div class="folderlabel" data-dcnode-id="2102" onclick="togglefolder('folder13');"><span data-dcnode-id="2103" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="1864" id="folder13" isfolder="true" style="display:block;"><span data-dcnode-id="2101" instrument_node="">
</span><ul data-dcnode-id="1865"><li data-dcnode-id="2092"><span data-dcnode-id="2100" instrument_node=""> In </span><em data-dcnode-id="2097"><a class="twikilink" data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Battleborn" title="/pmwiki/pmwiki.php/VideoGame/Battleborn"><span data-dcnode-id="2099" instrument_node="">Battleborn</span></a></em><span data-dcnode-id="2096" instrument_node="">, El Dragón's arms being ripped off were speculated to be going to be one according to his audio lore challenge. Due to the CWF's prohibition on cybernetically-augmented organics in competition, he was forced into retirement against his will immediately after his match with ISIC, while his </span><a class="twikilink" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackComedy" title="/pmwiki/pmwiki.php/Main/BlackComedy"><span data-dcnode-id="2095" instrument_node="">injuries were still fresh and being interviewed by a reporter indifferent to the actual seriousness of the matter instead of being treated</span></a><span data-dcnode-id="2093" instrument_node="">. Fortunately, though, he was able to eventually squeeze back to the top.
</span></li><li data-dcnode-id="2086"><span data-dcnode-id="2091" instrument_node=""> In </span><em data-dcnode-id="2088"><a class="twikilink" data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BlueReflection" title="/pmwiki/pmwiki.php/VideoGame/BlueReflection"><span data-dcnode-id="2090" instrument_node="">Blue Reflection</span></a></em><span data-dcnode-id="2087" instrument_node="">, Hinako was a promising ballet dancer, but she got into a car accident that injured her knee bad enough that she cannot perform jumps well anymore. When Yuzu and Lime want Hinako to become a Reflector, she only agrees once they tell her that a wish of hers will be fulfilled in return.
</span></li><li data-dcnode-id="2079"><span data-dcnode-id="2085" instrument_node=""> There's a chance in </span><em data-dcnode-id="2081"><a class="twikilink" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CrusaderKings" title="/pmwiki/pmwiki.php/VideoGame/CrusaderKings"><span data-dcnode-id="2084" instrument_node="">Crusader Kings</span></a><span data-dcnode-id="2082" instrument_node=""> II</span></em><span data-dcnode-id="2080" instrument_node=""> that a character leading troops into battle may suffer a particularly bad blow to the head that renders them incapable, meaning they'll need a regent if they happen to be the ruler. Either way, they'll be of no use whatsoever for the rest of their (often mercifully short) days.
</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2078" instrument_node=""> </span><em data-dcnode-id="2075"><a class="twikilink" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DeadIsland" title="/pmwiki/pmwiki.php/VideoGame/DeadIsland"><span data-dcnode-id="2077" instrument_node="">Dead Island</span></a></em><span data-dcnode-id="2074" instrument_node="">: The back story for Logan, an ex-football star, involves an injury that was career-ending in more ways than one. He was in a street-racing accident that not only badly injured his leg, but caused a massive scandal.
</span></li><li data-dcnode-id="2064"><span data-dcnode-id="2072" instrument_node=""> In </span><em data-dcnode-id="2069"><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheElderScrollsVSkyrim" title="/pmwiki/pmwiki.php/VideoGame/TheElderScrollsVSkyrim"><span data-dcnode-id="2071" instrument_node="">The Elder Scrolls V: Skyrim</span></a></em><span data-dcnode-id="2068" instrument_node="">, all guards share a pool of random sentences, which any of them can say. One of those is the page quote, making it sound like this is the backstory for every single guard. An alternate line spoken by a Stormcloak soldier is that he took a sword to the chest which forced an end to his adventuring career. Parodied in the </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Dragonborn</span></em><span data-dcnode-id="2065" instrument_node=""> DLC, where a Khajiit NPC will mention he also used to be an adventurer...until he found a ball of yarn.
</span></li><li data-dcnode-id="2055"><span data-dcnode-id="2063" instrument_node=""> One of the possible responses from the mess officer on board the Brotherhood of Steel airship </span><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Prydwen</span></em><span data-dcnode-id="2060" instrument_node=""> in </span><em data-dcnode-id="2057"><a class="twikilink" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Fallout4" title="/pmwiki/pmwiki.php/VideoGame/Fallout4"><span data-dcnode-id="2059" instrument_node="">Fallout 4</span></a></em><span data-dcnode-id="2056" instrument_node=""> is that he used to be a field scribe until a Deathclaw broke his femur. Averted with Proctor Ingram, who lost her legs, but continues to serve as chief engineer with the assistance of a modified power armor frame.
</span></li><li data-dcnode-id="2046"><span data-dcnode-id="2054" instrument_node=""> This happens to anyone in later </span><em data-dcnode-id="2051"><a class="twikilink" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FireEmblem" title="/pmwiki/pmwiki.php/VideoGame/FireEmblem"><span data-dcnode-id="2053" instrument_node="">Fire Emblem</span></a></em><span data-dcnode-id="2050" instrument_node=""> games that "dies" but is too critical to the plot to be removed (and doesn't cause a Game Over when defeated, as happens to the main characters.) Everyone else is subject to </span><a class="twikilink" data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Permadeath" title="/pmwiki/pmwiki.php/Main/Permadeath"><span data-dcnode-id="2049" instrument_node="">Permadeath</span></a><span data-dcnode-id="2047" instrument_node="">.
</span></li><li data-dcnode-id="2039"><span data-dcnode-id="2045" instrument_node=""> </span><em data-dcnode-id="2041"><a class="twikilink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/JaggedAlliance" title="/pmwiki/pmwiki.php/VideoGame/JaggedAlliance"><span data-dcnode-id="2044" instrument_node="">Jagged Alliance</span></a><span data-dcnode-id="2042" instrument_node=""> 2</span></em><span data-dcnode-id="2040" instrument_node=""> has an Alumni page on the AIM (Association of International Mercenaries) website, where among the retired, KIA and dishonorably discharged there are also those who suffered injury or had failing health.
</span></li><li data-dcnode-id="2030"><span data-dcnode-id="2038" instrument_node=""> Coach in </span><em data-dcnode-id="2035"><a class="twikilink" data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Left4Dead2" title="/pmwiki/pmwiki.php/VideoGame/Left4Dead2"><span data-dcnode-id="2037" instrument_node="">Left 4 Dead 2</span></a></em><span data-dcnode-id="2034" instrument_node=""> used to be a pro in football and was well on his way in joining the big leagues. He suffered a knee injury that forced him to retire from the sport and became a high school health education teacher instead. Even with the injury, the </span><a class="twikilink" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZombieApocalypse" title="/pmwiki/pmwiki.php/Main/ZombieApocalypse"><span data-dcnode-id="2033" instrument_node="">Zombie Apocalypse</span></a><span data-dcnode-id="2031" instrument_node=""> doesn't slow him down from kicking some zombie ass.
</span></li><li data-dcnode-id="2018"><span data-dcnode-id="2029" instrument_node=""> In </span><em data-dcnode-id="2026"><a class="twikilink" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MassEffect3" title="/pmwiki/pmwiki.php/VideoGame/MassEffect3"><span data-dcnode-id="2028" instrument_node="">Mass Effect 3</span></a></em><span data-dcnode-id="2025" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProfessionalKiller" title="/pmwiki/pmwiki.php/Main/ProfessionalKiller"><span data-dcnode-id="2024" instrument_node="">Thane Krios's</span></a><span data-dcnode-id="2022" instrument_node=""> terminal illness known as Kepral's Syndrome finally reaches a point where Thane can no longer reliably perform his job as an assassin. However, this doesn't stop him from </span><span class="spoiler" data-dcnode-id="2020" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2021" instrument_node="">intervening to save the salarian Councilor when Kai Leng and Cerberus attack, though the disease does slow him down to the point that Kai Leng is able to mortally wound him</span></span><span data-dcnode-id="2019" instrument_node="">.
</span></li><li data-dcnode-id="2012"><span data-dcnode-id="2017" instrument_node=""> In </span><em data-dcnode-id="2014"><a class="twikilink" data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetalGearSolidPortableOps" title="/pmwiki/pmwiki.php/VideoGame/MetalGearSolidPortableOps"><span data-dcnode-id="2016" instrument_node="">Metal Gear Solid: Portable Ops</span></a></em><span data-dcnode-id="2013" instrument_node=""> this is given as the backstory for Lieutenant Cunningham of FOX, a CIA-sponsored black ops organization, as he used to be a soldier during Vietnam but suffered an injury to his leg that required it to be amputated thus ending his career. During the story, he expresses resentment towards the CIA for giving him a desk job after his injury when he used to be a distinguished warrior. A common theme in the overall story of the Metal Gear games is that soldiers are mistreated by their governments, Cunningham being downsized is viewed as another example of this ideal.
</span></li><li data-dcnode-id="2003"><span data-dcnode-id="2011" instrument_node=""> </span><em data-dcnode-id="2008"><a class="twikilink" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetalGearSolidVThePhantomPain" title="/pmwiki/pmwiki.php/VideoGame/MetalGearSolidVThePhantomPain"><span data-dcnode-id="2010" instrument_node="">Metal Gear Solid V: The Phantom Pain</span></a></em><span data-dcnode-id="2007" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnArmAndALeg" title="/pmwiki/pmwiki.php/Main/AnArmAndALeg"><span data-dcnode-id="2006" instrument_node="">Kaz is mutilated after an ambush from the Skull unit</span></a><span data-dcnode-id="2004" instrument_node="">, ending his career as a soldier; even if he accepted cybernetic limbs after the events of the game, cybernetic eyes wouldn't be developed until after his death.
</span></li><li data-dcnode-id="1985"><span data-dcnode-id="2002" instrument_node=""> In </span><em data-dcnode-id="1999"><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MordheimCityOfTheDamned" title="/pmwiki/pmwiki.php/VideoGame/MordheimCityOfTheDamned"><span data-dcnode-id="2001" instrument_node="">Mordheim: City of the Damned</span></a></em><span data-dcnode-id="1998" instrument_node="">, much like the </span><a class="twikilink" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Mordheim" title="/pmwiki/pmwiki.php/TabletopGame/Mordheim"><span data-dcnode-id="1997" instrument_node="">Mordheim</span></a><span data-dcnode-id="1995" instrument_node=""> tabletop game, troops can suffer permanent debilitating injuries and it's usually best to retire your gravely-injured fighters and replace them with "intact" raw recruits unless they're highly experienced or you're just really attached to them. Having a grizzled old </span><a class="twikilink" data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandicappedBadass" title="/pmwiki/pmwiki.php/Main/HandicappedBadass"><span data-dcnode-id="1994" instrument_node="">Handicapped Badass</span></a><span data-dcnode-id="1992" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SergeantRock" title="/pmwiki/pmwiki.php/Main/SergeantRock"><span data-dcnode-id="1991" instrument_node="">Sister Superior</span></a><span data-dcnode-id="1989" instrument_node=""> with a peg leg, gouged eye, mutilated hand, and a permanently crazed look on her face from that skull fracture, beating Skaven to death with a </span><a class="twikilink" data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpicFlail" title="/pmwiki/pmwiki.php/Main/EpicFlail"><span data-dcnode-id="1988" instrument_node="">giant flail</span></a><span data-dcnode-id="1986" instrument_node=""> is certainly cool, but her multiple wounds will affect her combat performance considerably, plus she won't be able to climb walls.
</span></li><li data-dcnode-id="1933"><span data-dcnode-id="1984" instrument_node=""> From the </span><em data-dcnode-id="1981"><a class="twikilink" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Persona" title="/pmwiki/pmwiki.php/Franchise/Persona"><span data-dcnode-id="1983" instrument_node="">Persona</span></a></em><span data-dcnode-id="1980" instrument_node=""> series:
</span><ul data-dcnode-id="1934"><li data-dcnode-id="1968"><span data-dcnode-id="1979" instrument_node=""> Anna Yoshizaka of </span><em data-dcnode-id="1976"><a class="twikilink" data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Persona2" title="/pmwiki/pmwiki.php/VideoGame/Persona2"><span data-dcnode-id="1978" instrument_node="">Persona 2</span></a></em><span data-dcnode-id="1975" instrument_node=""> was a star track athlete before being injured in a hit and run. She's depressed as a result, and </span><span class="spoiler" data-dcnode-id="1970" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1974" instrument_node="">in </span><em data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Innocent Sin</span></em><span data-dcnode-id="1971" instrument_node="">, makes a wish to Joker to heal her legs. She subsequently joins the Masked Circle as an executive.</span></span><span data-dcnode-id="1969" instrument_node="">
</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1967" instrument_node=""> </span><em data-dcnode-id="1964"><a class="twikilink" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Persona3" title="/pmwiki/pmwiki.php/VideoGame/Persona3"><span data-dcnode-id="1966" instrument_node="">Persona 3</span></a></em><span data-dcnode-id="1963" instrument_node="">'s Kazuchi Miyamoto is a sports team member who is seriously risking losing the ability to walk in order to train and win a competition </span><span class="spoiler" data-dcnode-id="1961" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1962" instrument_node=""> so that he can convince his nephew, who was crippled in an accident, to undergo rehab. Eventually, he quits the team to recuperate.</span></span><span data-dcnode-id="1960" instrument_node="">
</span></li><li data-dcnode-id="1935"><span data-dcnode-id="1958" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JapaneseDelinquents" title="/pmwiki/pmwiki.php/Main/JapaneseDelinquents"><span data-dcnode-id="1957" instrument_node="">Ryuji</span></a><span data-dcnode-id="1955" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBigGuy" title="/pmwiki/pmwiki.php/Main/TheBigGuy"><span data-dcnode-id="1954" instrument_node="">Sakamoto</span></a><span data-dcnode-id="1952" instrument_node="">, one of the party members from </span><em data-dcnode-id="1949"><a class="twikilink" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Persona5" title="/pmwiki/pmwiki.php/VideoGame/Persona5"><span data-dcnode-id="1951" instrument_node="">Persona 5</span></a></em><span data-dcnode-id="1948" instrument_node="">, has this as his backstory. He was forced to quit the track team after an </span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilTeacher" title="/pmwiki/pmwiki.php/Main/EvilTeacher"><span data-dcnode-id="1947" instrument_node="">Evil Teacher</span></a><span data-dcnode-id="1945" instrument_node=""> subjected him to </span><a class="twikilink" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrainingFromHell" title="/pmwiki/pmwiki.php/Main/TrainingFromHell"><span data-dcnode-id="1944" instrument_node="">Training from Hell</span></a><span data-dcnode-id="1942" instrument_node="">, goaded him into attacking him, and </span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">broke one of his legs</span></em><span data-dcnode-id="1939" instrument_node=""> so that the track team could receive less funding than the volleyball team; while he can still walk and run it's not on the same level as he used to. This is one of the reasons he becomes a party member - to get revenge on the </span><a class="twikilink" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StarterVillain" title="/pmwiki/pmwiki.php/Main/StarterVillain"><span data-dcnode-id="1938" instrument_node="">teacher</span></a><span data-dcnode-id="1936" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="1923"><span data-dcnode-id="1932" instrument_node=""> In </span><em data-dcnode-id="1928"><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/RainbowSix" title="/pmwiki/pmwiki.php/VideoGame/RainbowSix"><span data-dcnode-id="1931" instrument_node="">Rainbow Six</span></a><span data-dcnode-id="1929" instrument_node=""> 3: Raven Shield</span></em><span data-dcnode-id="1927" instrument_node="">, in addition to </span><a class="twikilink" data-dcnode-id="1925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Permadeath" title="/pmwiki/pmwiki.php/Main/Permadeath"><span data-dcnode-id="1926" instrument_node="">deaths being final</span></a><span data-dcnode-id="1924" instrument_node=""> like in previous games, characters who are Incapacitated are also permanently out of action.
</span></li><li data-dcnode-id="1914"><span data-dcnode-id="1922" instrument_node=""> </span><em data-dcnode-id="1919"><a class="twikilink" data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/RealityMinds" title="/pmwiki/pmwiki.php/VideoGame/RealityMinds"><span data-dcnode-id="1921" instrument_node="">RealityMinds</span></a></em><span data-dcnode-id="1918" instrument_node="">: In Episode 0, a soldier, </span><span class="spoiler" data-dcnode-id="1916" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1917" instrument_node="">later revealed to be Silvana's father Deak</span></span><span data-dcnode-id="1915" instrument_node="">, gets his eye slashed out by a monster. As a result, he has retire from combat and take up a clerical position.
</span></li><li data-dcnode-id="1905"><span data-dcnode-id="1913" instrument_node=""> This is revealed as the back story reason for why Jack Krauser faked his death and defected to Wesker's side in </span><em data-dcnode-id="1910"><a class="twikilink" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ResidentEvilTheDarkSideChronicles" title="/pmwiki/pmwiki.php/VideoGame/ResidentEvilTheDarkSideChronicles"><span data-dcnode-id="1912" instrument_node="">Resident Evil The Dark Side Chronicles</span></a></em><span data-dcnode-id="1909" instrument_node="">. Krauser used to be a special ops soldier who worked alongside Leon but during the course of the mission, a viral entity crippled his arm. Krauser eventually sought out Wesker, who provided a way to heal his arm; out of gratitude, Krauser turned to serve Wesker as his special agent </span><span class="spoiler" data-dcnode-id="1907" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1908" instrument_node="">and even got a shapeshifting arm blade/shield out of the deal</span></span><span data-dcnode-id="1906" instrument_node="">.
</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1904" instrument_node=""> In </span><em data-dcnode-id="1901"><a class="twikilink" data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/RimWorld" title="/pmwiki/pmwiki.php/VideoGame/RimWorld"><span data-dcnode-id="1903" instrument_node="">RimWorld</span></a></em><span data-dcnode-id="1900" instrument_node="">, characters can survive a headshot, but if they take damage to the brain, that usually spells the end of their time as a useful member of the colony, as brain damage both severely affects their ability to do anything and is impossible to heal. Only </span><a class="twikilink" data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nanomachines" title="/pmwiki/pmwiki.php/Main/Nanomachines"><span data-dcnode-id="1899" instrument_node="">Luciferium</span></a><span data-dcnode-id="1897" instrument_node=""> can get them back in order, and even then due to lethal addiction issues and limited availability they'll be </span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingOnBorrowedTime" title="/pmwiki/pmwiki.php/Main/LivingOnBorrowedTime"><span data-dcnode-id="1896" instrument_node="">Living on Borrowed Time</span></a><span data-dcnode-id="1894" instrument_node="">.
</span></li><li data-dcnode-id="1887"><span data-dcnode-id="1892" instrument_node=""> K, the Mikado bartender in </span><em data-dcnode-id="1889"><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiIV" title="/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiIV"><span data-dcnode-id="1891" instrument_node="">Shin Megami Tensei IV</span></a></em><span data-dcnode-id="1888" instrument_node="">, was a Samurai himself until he lost his hand battling demons. He has a scissor-like replacement which doesn't appear to harm his bartending any.
</span></li><li data-dcnode-id="1872"><span data-dcnode-id="1886" instrument_node=""> After befriending </span><a class="twikilink" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewPolitenessImASenior" title="/pmwiki/pmwiki.php/Main/ScrewPolitenessImASenior"><span data-dcnode-id="1885" instrument_node="">George</span></a><span data-dcnode-id="1883" instrument_node=""> in </span><em data-dcnode-id="1880"><a class="twikilink" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StardewValley" title="/pmwiki/pmwiki.php/VideoGame/StardewValley"><span data-dcnode-id="1882" instrument_node="">Stardew Valley</span></a></em><span data-dcnode-id="1879" instrument_node=""> he eventually admits he lost the use of his legs in a mining accident and has been living on disability pay, and out of a wheelchair, since then. He's </span><em data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">also</span></em><span data-dcnode-id="1876" instrument_node=""> bitter about his age, but insists that he'd be a </span><a class="twikilink" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolOldGuy" title="/pmwiki/pmwiki.php/Main/CoolOldGuy"><span data-dcnode-id="1875" instrument_node="">Cool Old Guy</span></a><span data-dcnode-id="1873" instrument_node=""> if not for the accident.
</span></li><li data-dcnode-id="1866"><span data-dcnode-id="1871" instrument_node=""> Shotglass, the bartender from the first </span><em data-dcnode-id="1868"><a class="twikilink" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/WingCommander" title="/pmwiki/pmwiki.php/VideoGame/WingCommander"><span data-dcnode-id="1870" instrument_node="">Wing Commander</span></a></em><span data-dcnode-id="1867" instrument_node=""> game, used to be a pilot before he got shot up so bad he couldn't fly. Serving drinks is his way of continuing to do his bit.
