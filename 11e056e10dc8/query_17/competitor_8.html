</span><ul data-dcnode-id="3448"><li data-dcnode-id="3651"><span data-dcnode-id="3660" instrument_node=""> Rainbow Dash in the </span><em data-dcnode-id="3657"><a class="twikilink" data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic" title="/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic"><span data-dcnode-id="3659" instrument_node="">My Little Pony: Friendship Is Magic</span></a></em><span data-dcnode-id="3656" instrument_node=""> fanfic </span><em data-dcnode-id="3653"><a class="twikilink" data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/Asylum" title="/pmwiki/pmwiki.php/Fanfic/Asylum"><span data-dcnode-id="3655" instrument_node="">Asylum</span></a></em><span data-dcnode-id="3652" instrument_node=""> wanted to be a Wonderbolt, like in the main canon, however, a childhood brain injury left her a weak flier. Her career ended before it even began.
</span></li><li data-dcnode-id="3633"><span data-dcnode-id="3650" instrument_node=""> In the </span><em data-dcnode-id="3647"><a class="twikilink" data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Frozen2013" title="/pmwiki/pmwiki.php/WesternAnimation/Frozen2013"><span data-dcnode-id="3649" instrument_node="">Frozen (2013)</span></a></em><span data-dcnode-id="3646" instrument_node=""> fanfic </span><em data-dcnode-id="3643"><a class="twikilink" data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/BecomingFree" title="/pmwiki/pmwiki.php/Fanfic/BecomingFree"><span data-dcnode-id="3645" instrument_node="">Becoming Free</span></a></em><span data-dcnode-id="3642" instrument_node="">, Freya ends up </span><span class="spoiler" data-dcnode-id="3638" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingTheBullet" title="/pmwiki/pmwiki.php/Main/TakingTheBullet"><span data-dcnode-id="3641" instrument_node="">Taking the Bullet</span></a><span data-dcnode-id="3639" instrument_node=""> for Elsa</span></span><span data-dcnode-id="3637" instrument_node="">, which causes her to have to quit her job working with horses. </span><span class="spoiler" data-dcnode-id="3635" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3636" instrument_node="">In order to keep her around, Elsa ends up making Freya into her personal guard.</span></span><span data-dcnode-id="3634" instrument_node="">
</span></li><li data-dcnode-id="3627"><span data-dcnode-id="3632" instrument_node=""> </span><em data-dcnode-id="3629"><a class="twikilink" data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/BluefursChoice" title="/pmwiki/pmwiki.php/Fanfic/BluefursChoice"><span data-dcnode-id="3631" instrument_node="">Bluefur's Choice</span></a></em><span data-dcnode-id="3628" instrument_node="">: Lionheart retired very early due to a shoulder injury he received in battle.
</span></li><li data-dcnode-id="3621"><span data-dcnode-id="3626" instrument_node=""> After Octavia develops arthritis in her hooves in </span><em data-dcnode-id="3623"><a class="twikilink" data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/ClaroDeLuna" title="/pmwiki/pmwiki.php/Fanfic/ClaroDeLuna"><span data-dcnode-id="3625" instrument_node="">Claro de Luna</span></a></em><span data-dcnode-id="3622" instrument_node="">, she's forced to switch from being a cellist to being a composer.
</span></li><li data-dcnode-id="3612"><span data-dcnode-id="3620" instrument_node=""> Subverted in </span><em data-dcnode-id="3617"><a class="twikilink" data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/Endings" title="/pmwiki/pmwiki.php/Fanfic/Endings"><span data-dcnode-id="3619" instrument_node="">Endings</span></a></em><span data-dcnode-id="3616" instrument_node="">. Itsuki wanted to be a singer prior to becoming mute. She still ends up making music thanks to programs such as </span><em data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Vocaloid</span></em><span data-dcnode-id="3613" instrument_node="">.
</span></li><li data-dcnode-id="3606"><span data-dcnode-id="3611" instrument_node=""> In </span><em data-dcnode-id="3608"><a class="twikilink" data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/EquestriaGirlsDinosapien" title="/pmwiki/pmwiki.php/Fanfic/EquestriaGirlsDinosapien"><span data-dcnode-id="3610" instrument_node="">Equestria Girls: Dinosapien</span></a></em><span data-dcnode-id="3607" instrument_node="">, Maia Search's gymnastics career was ended when she broke her leg. Although it healed, she still walks with a limp, so she becomes a camp counselor instead.
</span></li><li data-dcnode-id="3600"><span data-dcnode-id="3605" instrument_node=""> In </span><em data-dcnode-id="3602"><a class="twikilink" data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/EvaSessionsSomeplaceVastAndDry" title="/pmwiki/pmwiki.php/Fanfic/EvaSessionsSomeplaceVastAndDry"><span data-dcnode-id="3604" instrument_node="">EVA Sessions: Someplace Vast and Dry</span></a></em><span data-dcnode-id="3601" instrument_node="">, Misato is critically wounded while serving in a JSSDF anti-Other and peacekeeping operation in Indonesia, and because she now requires artificial organs to live, she is no longer fit for front-line duty. Gendo arranges for her to instead transfer to NERV as Operations Director, her canonical role in the original series.
</span></li><li data-dcnode-id="3594"><span data-dcnode-id="3599" instrument_node=""> Double-subverted with Cinderpelt in </span><em data-dcnode-id="3596"><a class="twikilink" data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/TheFireHasBurntOut" title="/pmwiki/pmwiki.php/Fanfic/TheFireHasBurntOut"><span data-dcnode-id="3598" instrument_node="">The Fire Has Burnt Out</span></a></em><span data-dcnode-id="3595" instrument_node="">. She's capable of being a warrior even with her twisted leg, but she chooses the path of a medicine cat due to bonding with Yellowfang.
</span></li><li data-dcnode-id="3588"><span data-dcnode-id="3593" instrument_node=""> In </span><em data-dcnode-id="3590"><a class="twikilink" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Henceforward" title="/pmwiki/pmwiki.php/Webcomic/Henceforward"><span data-dcnode-id="3592" instrument_node="">Henceforward</span></a></em><span data-dcnode-id="3589" instrument_node="">, Ruby is stabbed by Blake. She survives but is unable to achieve her dreams of becoming a Huntress due to trauma from the injury.

/span><em data-dcnode-id="3537"><a class="twikilink" data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Hyouka" title="/pmwiki/pmwiki.php/Literature/Hyouka"><span data-dcnode-id="3539" instrument_node="">Hyouka</span></a></em><span data-dcnode-id="3536" instrument_node="">) </span><a class="twikilink" data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InterruptedSuicide" title="/pmwiki/pmwiki.php/Main/InterruptedSuicide"><span data-dcnode-id="3535" instrument_node="">saves her</span></a><span data-dcnode-id="3533" instrument_node="">. The credits show her picking up the guitar again, meaning it might not be the end of her career.

</span><ul data-dcnode-id="3325"><li data-dcnode-id="3335"><span data-dcnode-id="3441" instrument_node=""> </span><em data-dcnode-id="3438"><a class="twikilink" data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Cars" title="/pmwiki/pmwiki.php/WesternAnimation/Cars"><span data-dcnode-id="3440" instrument_node="">Cars</span></a></em><span data-dcnode-id="3437" instrument_node="">: Lightning McQueen discovers that Doc Hudson was actually the Fabulous Hudson Hornet, a legendary racecar. Doc ultimately explains that the only reason he "quit" racing was that he suffered a major crash during a race. By the time he could race again, the racing industry merely brushed him off without a second thought.
</span><div class="indent" data-dcnode-id="3336"><em data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">[Lightning has just seen Doc's driving and follows him back to his shop]</span></em><span data-dcnode-id="3434" instrument_node=""> </span><br data-dcnode-id="3433"><strong data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3430" instrument_node=""> Doc, hold it! Seriously, your driving's incredible! </span><br data-dcnode-id="3429"><strong data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3426" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SarcasmMode" title="/pmwiki/pmwiki.php/Main/SarcasmMode"><span data-dcnode-id="3425" instrument_node="">Wonderful</span></a><span data-dcnode-id="3423" instrument_node="">. Now go away. </span><br data-dcnode-id="3422"><strong data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3419" instrument_node=""> Hey, I mean it. You've still got it! </span><br data-dcnode-id="3418"><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3415" instrument_node=""> I'm askin' ya to leave! </span><br data-dcnode-id="3414"><strong data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3411" instrument_node=""> Come on. I'm a racecar, you're... well, a much older racecar, but under the hood, you and I are the same! </span><br data-dcnode-id="3410"><strong data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3407" instrument_node=""> We are NOT the same! Understand? Now, </span><em data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">get out!</span></em><span data-dcnode-id="3404" instrument_node=""> </span><br data-dcnode-id="3403"><strong data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3400" instrument_node=""> How could a car like you quit at the top of your game? </span><br data-dcnode-id="3399"><strong data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3396" instrument_node=""> </span><em data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">[shocked]</span></em><span data-dcnode-id="3393" instrument_node=""> You think I quit? </span><em data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">[Doc turns on the light to reveal an old framed newspaper of him in a wreck]</span></em><span data-dcnode-id="3390" instrument_node=""> </span><br data-dcnode-id="3389"><strong data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3386" instrument_node=""> Right... Your big wreck in '54. </span><br data-dcnode-id="3385"><strong data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3382" instrument_node=""> </span><em data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">They</span></em><span data-dcnode-id="3379" instrument_node=""> quit on </span><em data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">me</span></em><span data-dcnode-id="3376" instrument_node="">. When I finally got put together, I went back expecting a big welcome. You know what they said? "You're history." Moved right on to the next rookie standing in line. There was a lot left in me. I never got a chance to show 'em. I keep that to remind me never to go back. I just never expected that that world would... would find me here. </span><br data-dcnode-id="3375"><strong data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3372" instrument_node=""> Hey, Doc, I'm not them! </span><br data-dcnode-id="3371"><strong data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3368" instrument_node=""> Oh, yeah? </span><br data-dcnode-id="3367"><strong data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3364" instrument_node=""> No, I'm not! </span><br data-dcnode-id="3363"><strong data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Doc Hudson</span></strong><span data-dcnode-id="3360" instrument_node="">: When was the last time you cared about somethin' except yourself, hot rod? You name me one time and I will take it all back. </span><em data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">[Lightning looks defeated]</span></em><span data-dcnode-id="3357" instrument_node=""> Uhuh. Didn't think so. These are good folk around here, who care about one another. I don't want 'em depending on someone they can't count on. </span><br data-dcnode-id="3356"><strong data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Lightning McQueen:</span></strong><span data-dcnode-id="3353" instrument_node=""> Oh, like </span><em data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">you</span></em><span data-dcnode-id="3350" instrument_node="">? </span><a class="twikilink" data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkassHasAPoint" title="/pmwiki/pmwiki.php/Main/JerkassHasAPoint"><span data-dcnode-id="3349" instrument_node="">You've been here for how long, and your friends don't even know who you are? Who's caring about only himself?</span></a><span data-dcnode-id="3347" instrument_node=""> </span><br data-dcnode-id="3346"><strong data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Doc Hudson:</span></strong><span data-dcnode-id="3343" instrument_node=""> </span><em data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">[angrily]</span></em><span data-dcnode-id="3340" instrument_node=""> Just finish that road and get outta here! </span><em data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">[drives off]</span></em><span data-dcnode-id="3337" instrument_node="">
</span></div></li><li data-dcnode-id="3326"><span data-dcnode-id="3334" instrument_node=""> McQueen himself would end up in a similar crash in </span><em data-dcnode-id="3331"><a class="twikilink" data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Cars3" title="/pmwiki/pmwiki.php/WesternAnimation/Cars3"><span data-dcnode-id="3333" instrument_node="">Cars 3</span></a></em><span data-dcnode-id="3330" instrument_node="">, forcing him out of the sport for some time. While he does seek to make a comeback, he ultimately decides on </span><a class="twikilink" data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PassingTheTorch" title="/pmwiki/pmwiki.php/Main/PassingTheTorch"><span data-dcnode-id="3329" instrument_node="">Passing the Torch</span></a><span data-dcnode-id="3327" instrument_node=""> and becomes a coach for the next generation of racers.
</span></li></ul></div><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3322"></p><div class="folderlabel" data-dcnode-id="3320" onclick="togglefolder('folder5');"><span data-dcnode-id="3321" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Live-Action&nbsp;</span></div><div class="folder" data-dcnode-id="2935" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="3319" instrument_node="">
</span><ul data-dcnode-id="2936"><li data-dcnode-id="3310"><span data-dcnode-id="3318" instrument_node=""> </span><em data-dcnode-id="3315"><a class="twikilink" data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheAirUpThere" title="/pmwiki/pmwiki.php/Film/TheAirUpThere"><span data-dcnode-id="3317" instrument_node="">The Air Up There</span></a></em><span data-dcnode-id="3314" instrument_node="">: Jimmy Dolan (</span><a class="twikilink" data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/KevinBacon" title="/pmwiki/pmwiki.php/Creator/KevinBacon"><span data-dcnode-id="3313" instrument_node="">Kevin Bacon</span></a><span data-dcnode-id="3311" instrument_node="">) blew out his knee, costing him a pro career. He becomes a college coach, instead. He still wears his championship ring from 1981 everywhere.
</span></li><li data-dcnode-id="3301"><span data-dcnode-id="3309" instrument_node=""> Danny Glover's </span><a class="twikilink" data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JadedWashout" title="/pmwiki/pmwiki.php/Main/JadedWashout"><span data-dcnode-id="3308" instrument_node="">Jaded Washout</span></a><span data-dcnode-id="3306" instrument_node=""> character in </span><em data-dcnode-id="3303"><a class="twikilink" data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/AngelsInTheOutfield" title="/pmwiki/pmwiki.php/Film/AngelsInTheOutfield"><span data-dcnode-id="3305" instrument_node="">Angels in the Outfield</span></a></em><span data-dcnode-id="3302" instrument_node=""> had his career cut short because the villainous sportscaster character deliberately slid into home with his spikes up when they were playing each other years before.
</span></li><li data-dcnode-id="3283"><span data-dcnode-id="3300" instrument_node=""> The unnamed lead character in the </span><a class="urllink" data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/RyersonUniversityFilmFestival/photos/a.1549891241892009/2037729073108221/%3Ftype%3D3%26theater"><span data-dcnode-id="3299" instrument_node="">2018 Canadian short film</span><img data-dcnode-id="3298" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3296" instrument_node=""> </span><em data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">Attainment</span></em><span data-dcnode-id="3293" instrument_node=""> (which contains no dialogue) is so obsessed with becoming the best competitive figure skater in the world that he over-trains to the point where he </span><span class="spoiler" data-dcnode-id="3285" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3292" instrument_node="">suffers from a </span><em data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">complete</span></em><span data-dcnode-id="3289" instrument_node=""> mental and physical breakdown. His dream is thus shattered and it becomes </span><a class="twikilink" data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEpisodeTitle" title="/pmwiki/pmwiki.php/Main/IronicEpisodeTitle"><span data-dcnode-id="3288" instrument_node="">unattainable</span></a><span data-dcnode-id="3286" instrument_node="">.</span></span><span data-dcnode-id="3284" instrument_node="">
</span></li><li data-dcnode-id="3277"><span data-dcnode-id="3282" instrument_node=""> In the initial timeline of </span><em data-dcnode-id="3279"><a class="twikilink" data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BackToTheFuturePartII" title="/pmwiki/pmwiki.php/Film/BackToTheFuturePartII"><span data-dcnode-id="3281" instrument_node="">Back to the Future Part II</span></a></em><span data-dcnode-id="3278" instrument_node="">, a car accident ends Marty's rock career before it even took off the ground.
</span></li><li data-dcnode-id="3271"><span data-dcnode-id="3276" instrument_node=""> Joe's knee injury in </span><em data-dcnode-id="3273"><a class="twikilink" data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BendItLikeBeckham" title="/pmwiki/pmwiki.php/Film/BendItLikeBeckham"><span data-dcnode-id="3275" instrument_node="">Bend It Like Beckham</span></a></em><span data-dcnode-id="3272" instrument_node="">, which was caused by his father pushing him too hard.
</span></li><li data-dcnode-id="3265"><span data-dcnode-id="3270" instrument_node=""> In </span><em data-dcnode-id="3267"><a class="twikilink" data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BetYourLife" title="/pmwiki/pmwiki.php/Film/BetYourLife"><span data-dcnode-id="3269" instrument_node="">Bet Your Life</span></a></em><span data-dcnode-id="3266" instrument_node="">, Sonny was an up-and-coming footballer until he suffered a knee injury that destroyed his career.
</span></li><li data-dcnode-id="3259"><span data-dcnode-id="3264" instrument_node=""> Marvelous Mervo from </span><em data-dcnode-id="3261"><a class="twikilink" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BloodHarvest" title="/pmwiki/pmwiki.php/Film/BloodHarvest"><span data-dcnode-id="3263" instrument_node="">Blood Harvest</span></a></em><span data-dcnode-id="3260" instrument_node=""> was a trapeze artist until he became brain-damaged in an accident.
</span></li><li data-dcnode-id="3253"><span data-dcnode-id="3258" instrument_node=""> In </span><em data-dcnode-id="3255"><a class="twikilink" data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BloodyReunion" title="/pmwiki/pmwiki.php/Film/BloodyReunion"><span data-dcnode-id="3257" instrument_node="">Bloody Reunion</span></a></em><span data-dcnode-id="3254" instrument_node="">, Dal-Bong used to be the most athletic boy in school. After he came last in a relay, Ms. Park slapped him and made him spend a day doing squats, which later caused him to permanently injure his knee when playing soccer the next day.
</span></li><li data-dcnode-id="3247"><span data-dcnode-id="3252" instrument_node=""> </span><em data-dcnode-id="3249"><a class="twikilink" data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BodyBags" title="/pmwiki/pmwiki.php/Film/BodyBags"><span data-dcnode-id="3251" instrument_node="">Body Bags</span></a></em><span data-dcnode-id="3248" instrument_node="">: In "Eye", Brent is a baseball relief hitter who loses his right eye in a car accident. With no depth perception, he can no longer bat at a professional level. He agrees to the experimental eye transplant surgery in an attempt to save his career.
</span></li><li data-dcnode-id="3238"><span data-dcnode-id="3246" instrument_node=""> In </span><em data-dcnode-id="3243"><a class="twikilink" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Diggstown" title="/pmwiki/pmwiki.php/Film/Diggstown"><span data-dcnode-id="3245" instrument_node="">Diggstown</span></a></em><span data-dcnode-id="3242" instrument_node="">, Caine finds out that the once-great boxer Charles Macom Diggs (for whom the titular town is named), was poisoned by </span><a class="twikilink" data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="3241" instrument_node="">Gillon</span></a><span data-dcnode-id="3239" instrument_node=""> when Diggs refused to throw a fight. The poison and the resulting injuries from the fight paralyze Diggs for life. He manages to move his hand slightly during Roy's climactic fight, giving Roy strength to continue.
</span></li><li data-dcnode-id="3232"><span data-dcnode-id="3237" instrument_node=""> The titular character of </span><em data-dcnode-id="3234"><a class="twikilink" data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DoctorStrange2016" title="/pmwiki/pmwiki.php/Film/DoctorStrange2016"><span data-dcnode-id="3236" instrument_node="">Doctor Strange (2016)</span></a></em><span data-dcnode-id="3233" instrument_node=""> crashed his car at the beginning of the film, leading to nerve damage that caused his hands to shake uncontrollably. Strange was a neurosurgeon before the crash, meaning it was impossible for him to continue working without putting every single one of his patients at enormous risk. It is pointed out that he could still have a long and fulfilling career as a doctor and would be an invaluable resource as a consultant for other neurosurgeons. However, for Strange, medicine holds no interest if he cannot be a surgeon so he wrecks his life looking for a cure for his condition.
</span></li><li data-dcnode-id="3223"><span data-dcnode-id="3231" instrument_node=""> In </span><em data-dcnode-id="3228"><a class="twikilink" data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ADogsPurpose" title="/pmwiki/pmwiki.php/Film/ADogsPurpose"><span data-dcnode-id="3230" instrument_node="">A Dog's Purpose</span></a></em><span data-dcnode-id="3227" instrument_node="">, </span><span class="spoiler" data-dcnode-id="3225" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3226" instrument_node=""> Ethan</span></span><span data-dcnode-id="3224" instrument_node=""> has to end his football career after his leg is broken.
</span></li><li data-dcnode-id="3211"><span data-dcnode-id="3222" instrument_node=""> </span><em data-dcnode-id="3219"><a class="twikilink" data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DrTerrorsHouseOfHorrors" title="/pmwiki/pmwiki.php/Film/DrTerrorsHouseOfHorrors"><span data-dcnode-id="3221" instrument_node="">Dr. Terror's House of Horrors</span></a></em><span data-dcnode-id="3218" instrument_node="">: In the "Disembodied Hand" segment, Eric Landor is </span><a class="twikilink" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CarFu" title="/pmwiki/pmwiki.php/Main/CarFu"><span data-dcnode-id="3217" instrument_node="">run over</span></a><span data-dcnode-id="3215" instrument_node=""> by critic Franklyn Marsh. His injuries result in the amputation of his right hand, destroying his career as an artist. Falling into a deep despair, Landor is eventually </span><a class="twikilink" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="3214" instrument_node="">Driven to Suicide</span></a><span data-dcnode-id="3212" instrument_node="">.
</span></li><li data-dcnode-id="3202"><span data-dcnode-id="3210" instrument_node=""> In </span><em data-dcnode-id="3207"><a class="twikilink" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Firestorm1998" title="/pmwiki/pmwiki.php/Film/Firestorm1998"><span data-dcnode-id="3209" instrument_node="">Firestorm (1998)</span></a></em><span data-dcnode-id="3206" instrument_node="">, Wynt has his legs badly broken when a trailer flips on him during a </span><a class="twikilink" data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicFireRescue" title="/pmwiki/pmwiki.php/Main/HeroicFireRescue"><span data-dcnode-id="3205" instrument_node="">Heroic Fire Rescue</span></a><span data-dcnode-id="3203" instrument_node="">. The breaks mean he can no longer parachute jump, which forces him to retire as a smokejumper.
</span></li><li data-dcnode-id="3196"><span data-dcnode-id="3201" instrument_node=""> In </span><em data-dcnode-id="3198"><a class="twikilink" data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ForrestGump" title="/pmwiki/pmwiki.php/Film/ForrestGump"><span data-dcnode-id="3200" instrument_node="">Forrest Gump</span></a></em><span data-dcnode-id="3197" instrument_node="">, Lieutenant Dan has to leave the army after losing his legs in Vietnam. He had an ancestor die in "every single American war" and believed the same was supposed to happen to him, so being left alive but unable to fight turns him into an alcoholic mess for a long time.
</span></li><li data-dcnode-id="3190"><span data-dcnode-id="3195" instrument_node=""> In </span><em data-dcnode-id="3192"><a class="twikilink" data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/FrankensteinAndTheMonsterFromHell" title="/pmwiki/pmwiki.php/Film/FrankensteinAndTheMonsterFromHell"><span data-dcnode-id="3194" instrument_node="">Frankenstein and the Monster from Hell</span></a></em><span data-dcnode-id="3191" instrument_node="">, Baron Frankenstein has suffered burns to hands which render him incapable of performing delicate surgery. When a talented young surgeon (and fan of the Baron's work) is committed to asylum alongside him, Frankenstein recruits him as a protege and uses him as a proxy set of hands for surgery.
</span></li><li data-dcnode-id="3178"><span data-dcnode-id="3189" instrument_node=""> </span><em data-dcnode-id="3186"><a class="twikilink" data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Gattaca" title="/pmwiki/pmwiki.php/Film/Gattaca"><span data-dcnode-id="3188" instrument_node="">Gattaca</span></a></em><span data-dcnode-id="3185" instrument_node="">: the guy whose DNA the protagonist is using used to be an athlete until an undisclosed incident confined him to a wheelchair. The incident was that </span><span class="spoiler" data-dcnode-id="3180" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3184" instrument_node="">he was bred (DNA-wise) as a champion athlete and only achieved a </span><em data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">silver</span></em><span data-dcnode-id="3181" instrument_node=""> medal in the Olympics. He tried to commit suicide and only succeeded in paralyzing himself</span></span><span data-dcnode-id="3179" instrument_node="">.
</span></li><li data-dcnode-id="3172"><span data-dcnode-id="3177" instrument_node=""> Sebastian in </span><em data-dcnode-id="3174"><a class="twikilink" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheGreatestShowOnEarth" title="/pmwiki/pmwiki.php/Film/TheGreatestShowOnEarth"><span data-dcnode-id="3176" instrument_node="">The Greatest Show on Earth</span></a></em><span data-dcnode-id="3173" instrument_node=""> ends his career as a trapeze artist from performing a dangerous trick.

</span></li><li data-dcnode-id="3090"><span data-dcnode-id="3095" instrument_node=""> The sequel to </span><em data-dcnode-id="3092"><a class="twikilink" data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheMightyDucks" title="/pmwiki/pmwiki.php/Film/TheMightyDucks"><span data-dcnode-id="3094" instrument_node="">The Mighty Ducks</span></a></em><span data-dcnode-id="3091" instrument_node=""> has Gordon Bombay take a knee injury during a minor-league game, ending his NHL career before it begins. Later in the movie, during a pickup game of three-bar, Wolf "The Dentist" Stansson hits him in the same knee.

</span></li><li data-dcnode-id="3075"><span data-dcnode-id="3080" instrument_node=""> In </span><em data-dcnode-id="3077"><a class="twikilink" data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/MollysGame" title="/pmwiki/pmwiki.php/Film/MollysGame"><span data-dcnode-id="3079" instrument_node="">Molly's Game</span></a></em><span data-dcnode-id="3076" instrument_node="">, Molly's promising career as an Olympic-level skier is cut short when a freak accident on the mount renders her unable to ever compete again.

</span></li><li data-dcnode-id="3027"><span data-dcnode-id="3032" instrument_node=""> Discussed and subverted in </span><em data-dcnode-id="3029"><a class="twikilink" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/RockyII" title="/pmwiki/pmwiki.php/Film/RockyII"><span data-dcnode-id="3031" instrument_node="">Rocky II</span></a></em><span data-dcnode-id="3028" instrument_node="">. Rocky having his eye cut in the previous film has caused problems for his vision in his right eye, which his trainer Mickey points makes him unable to defend from that side. Despite this, he still manages to work around it in training and give Apollo Creed a run for his money.

</span></li><li data-dcnode-id="2979"><span data-dcnode-id="2987" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2986" instrument_node="">Howard Payne</span></a><span data-dcnode-id="2984" instrument_node=""> in </span><em data-dcnode-id="2981"><a class="twikilink" data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Speed" title="/pmwiki/pmwiki.php/Film/Speed"><span data-dcnode-id="2983" instrument_node="">Speed</span></a></em><span data-dcnode-id="2980" instrument_node=""> used to be on the SWAT's bomb squad and he was forced to retire when an explosion injured him, resulting in the loss of one of his fingers. Howard's compensation was just a tiny pension and a cheap gold watch, which pissed him off royally since he felt he deserved a lot more for his service. This motivates him to become a terrorist and kicks off the plot of the film where he holds people hostage with his bombs and demands millions of dollars in exchange for their safety.
</span></li><li data-dcnode-id="2973"><span data-dcnode-id="2978" instrument_node=""> In </span><em data-dcnode-id="2975"><a class="twikilink" data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TeenageMutantNinjaTurtles1990" title="/pmwiki/pmwiki.php/Film/TeenageMutantNinjaTurtles1990"><span data-dcnode-id="2977" instrument_node="">Teenage Mutant Ninja Turtles (1990)</span></a></em><span data-dcnode-id="2974" instrument_node="">, Casey Jones mentions at one point that he played a sport (presumably Ice Hockey) professionally, but his career lasted less than a year before he got injured.
</span></li><li data-dcnode-id="2967"><span data-dcnode-id="2972" instrument_node=""> In </span><em data-dcnode-id="2969"><a class="twikilink" data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TigerHouse" title="/pmwiki/pmwiki.php/Film/TigerHouse"><span data-dcnode-id="2971" instrument_node="">Tiger House</span></a></em><span data-dcnode-id="2968" instrument_node="">, Kelly's promising career as a gymnast is ended when her boyfriend Mark accidentally shoots her in the leg with a crossbow.
</span></li><li data-dcnode-id="2958"><span data-dcnode-id="2966" instrument_node=""> </span><em data-dcnode-id="2963"><a class="twikilink" data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TurboAPowerRangersMovie" title="/pmwiki/pmwiki.php/Film/TurboAPowerRangersMovie"><span data-dcnode-id="2965" instrument_node="">Turbo: A Power Rangers Movie</span></a></em><span data-dcnode-id="2962" instrument_node="">: Rocky breaks his back while practicing for a martial arts tournament, forcing him to pick </span><a class="twikilink" data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KidAppealCharacter" title="/pmwiki/pmwiki.php/Main/KidAppealCharacter"><span data-dcnode-id="2961" instrument_node="">Justin</span></a><span data-dcnode-id="2959" instrument_node=""> as his replacement on the team.
</span></li><li data-dcnode-id="2949"><span data-dcnode-id="2957" instrument_node=""> In </span><em data-dcnode-id="2954"><a class="twikilink" data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Unbreakable" title="/pmwiki/pmwiki.php/Film/Unbreakable"><span data-dcnode-id="2956" instrument_node="">Unbreakable</span></a></em><span data-dcnode-id="2953" instrument_node="">, the titular character had an injury in college that made it impossible for him to continue playing football, which he brings up to refute the claims that he is somehow invulnerable to harm or has superpowers. As the movie goes on he remembers that he actually </span><em data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">faked</span></em><span data-dcnode-id="2950" instrument_node=""> the injury, since he knew that college athletes often burnout or can't make it in the pros and he wanted an excuse to get out anyway since his burgeoning romantic interest (and future wife) was studying to be a nurse and put off by the violence of his sport. He told the lie so often that he had forgotten the truth himself.
</span></li><li data-dcnode-id="2937"><span data-dcnode-id="2948" instrument_node=""> </span><em data-dcnode-id="2945"><a class="twikilink" data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/VarsityBlues" title="/pmwiki/pmwiki.php/Film/VarsityBlues"><span data-dcnode-id="2947" instrument_node="">Varsity Blues</span></a></em><span data-dcnode-id="2944" instrument_node=""> had its main plot kick off with one of these, with the star Quarterback suffering a knee injury in this form. It's later revealed that </span><span class="spoiler" data-dcnode-id="2939" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2943" instrument_node="">he'd sustained a </span><em data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">lot</span></em><span data-dcnode-id="2940" instrument_node=""> of knee injuries, but Coach Klimer had talked him out of getting it treated by a doctor and instead gave him shots of painkillers so he could continue playing</span></span><span data-dcnode-id="2938" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2933"></p><div class="folderlabel" data-dcnode-id="2931" onclick="togglefolder('folder6');"><span data-dcnode-id="2932" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="2677" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="2930" instrument_node="">
</span><ul data-dcnode-id="2782"><li data-dcnode-id="2925"><span data-dcnode-id="2929" instrument_node=""> Mystery writer </span><a class="twikilink" data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DickFrancis" title="/pmwiki/pmwiki.php/Creator/DickFrancis"><span data-dcnode-id="2928" instrument_node="">Dick Francis</span></a><span data-dcnode-id="2926" instrument_node="">, a real-life example of this trope (see the "Real Life" folder), did a couple of stories with Sid Halley, a former jockey who became a detective after a horse crushed his hand in a fall.
</span></li><li data-dcnode-id="2916"><span data-dcnode-id="2924" instrument_node=""> </span><em data-dcnode-id="2921"><a class="twikilink" data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheColorOfDistance" title="/pmwiki/pmwiki.php/Literature/TheColorOfDistance"><span data-dcnode-id="2923" instrument_node="">The Color of Distance</span></a></em><span data-dcnode-id="2920" instrument_node="">: Late in </span><em data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Through Alien Eyes</span></em><span data-dcnode-id="2917" instrument_node="">, Ukatonen takes a horrible blow to the head. Even when he's healed, the centuries of skill he's gained in healing and transformation are badly damaged and he can no longer control and soothe those he's linking with, or keep them out.
</span></li><li data-dcnode-id="2910"><span data-dcnode-id="2915" instrument_node=""> In </span><em data-dcnode-id="2912"><a class="twikilink" data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheCuriousCaseOfBenjaminButton" title="/pmwiki/pmwiki.php/Literature/TheCuriousCaseOfBenjaminButton"><span data-dcnode-id="2914" instrument_node="">The Curious Case of Benjamin Button</span></a></em><span data-dcnode-id="2911" instrument_node="">, Daisy is forced to retire as a ballet dancer after a hit by a cab breaks her leg.
</span></li><li data-dcnode-id="2891"><span data-dcnode-id="2909" instrument_node=""> </span><em data-dcnode-id="2906"><a class="twikilink" data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ADogsPurpose" title="/pmwiki/pmwiki.php/Literature/ADogsPurpose"><span data-dcnode-id="2908" instrument_node="">A Dog's Purpose</span></a></em><span data-dcnode-id="2905" instrument_node="">:
</span><ul data-dcnode-id="2892"><li data-dcnode-id="2900"><span data-dcnode-id="2904" instrument_node=""> Ethan had to retire from his promising football career after an injury caused by </span><span class="spoiler" data-dcnode-id="2902" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2903" instrument_node=""> jumping out of his bedroom window during a fire</span></span><span data-dcnode-id="2901" instrument_node="">.
</span></li><li data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node=""> Ellie was a search-and-rescue dog. During one rescue, she got acid on her nose which killed her sense of smell. She couldn't smell more than a few feet in front of her and thus she was retired.
</span></li><li data-dcnode-id="2893"><span data-dcnode-id="2897" instrument_node=""> Jakob was Ellie's first handler. He retired after </span><span class="spoiler" data-dcnode-id="2895" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2896" instrument_node=""> he was hit with a gunshot during a rescue</span></span><span data-dcnode-id="2894" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="2877"><span data-dcnode-id="2890" instrument_node=""> </span><em data-dcnode-id="2887"><a class="twikilink" data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DragonridersOfPern" title="/pmwiki/pmwiki.php/Literature/DragonridersOfPern"><span data-dcnode-id="2889" instrument_node="">Dragonriders of Pern</span></a></em><span data-dcnode-id="2886" instrument_node="">:
</span><ul data-dcnode-id="2878"><li data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node=""> Subverted by Menolly, who injures her hand cleaning fish, and her own mother deliberately stitches her palm up wrong, crippling her hand so she can barely perform routine household tasks (making her even more despised), let alone play any instrument. Her voice and ability to compose are unharmed, however, and after being taken to the Harperhall, she goes through a great deal of physical therapy to help recover from her injury. She eventually reaches the rank of Master in her Craft.
</span></li><li data-dcnode-id="2879"><span data-dcnode-id="2883" instrument_node=""> Played straight in </span><em data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">The Skies of Pern</span></em><span data-dcnode-id="2880" instrument_node=""> when F'lessan and bronze Golanth are badly injured by wildcats, which puts an end to their life of fighting Thread, but they find new meaning in studying astronomy and helping the other dragons and riders discover a new purpose in protecting the skies from other interstellar debris.
</span></li></ul></li><li data-dcnode-id="2864"><span data-dcnode-id="2876" instrument_node=""> </span><em data-dcnode-id="2873"><a class="twikilink" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDresdenFiles" title="/pmwiki/pmwiki.php/Literature/TheDresdenFiles"><span data-dcnode-id="2875" instrument_node="">The Dresden Files</span></a></em><span data-dcnode-id="2872" instrument_node="">: Michael Carpenter, Knight of the Cross, is terribly injured in the climax of </span><em data-dcnode-id="2869"><a class="twikilink" data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SmallFavor" title="/pmwiki/pmwiki.php/Literature/SmallFavor"><span data-dcnode-id="2871" instrument_node="">Small Favor</span></a></em><span data-dcnode-id="2868" instrument_node="">, spends a couple of years recovering, and ends up crippled, forcing him to stop fighting evil. Interestingly, this is viewed as the best ending of his career, as Knights </span><em data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">that</span></em><span data-dcnode-id="2865" instrument_node=""> dedicated usually retire in coffins, while Michael can spend the rest of his life with his loving family who won't now be worried for him every time he goes on a mission.
</span></li><li data-dcnode-id="2855"><span data-dcnode-id="2863" instrument_node=""> </span><em data-dcnode-id="2860"><a class="twikilink" data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheEssexSerpent" title="/pmwiki/pmwiki.php/Literature/TheEssexSerpent"><span data-dcnode-id="2862" instrument_node="">The Essex Serpent</span></a></em><span data-dcnode-id="2859" instrument_node="">: Luke Garrett is a talented doctor and surgeon (one-in-a-generation talented), with dreams and big plans for heart surgeries. He's attacked by a guy who previously stabbed his patient, and his hand gets injured. He will never be able to operate again. </span><span class="spoiler" data-dcnode-id="2857" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2858" instrument_node=""> He actually manages to work in medicine: he's the brain behind many new treatments and surgeries while his close friend George Spencer operates.</span></span><span data-dcnode-id="2856" instrument_node="">
</span></li><li data-dcnode-id="2849"><span data-dcnode-id="2854" instrument_node=""> </span><em data-dcnode-id="2851"><a class="twikilink" data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheFirstLaw" title="/pmwiki/pmwiki.php/Literature/TheFirstLaw"><span data-dcnode-id="2853" instrument_node="">The First Law</span></a></em><span data-dcnode-id="2850" instrument_node="">: Less a single injury and more a collection of them, Sand dan Glokta, colonel of the King's Own, victor of the Contest, and renowned swordsman, saw a harsh end to his military career when he was captured during a heroic charge against the Gurkish. After two years of constant torture, he was released in a prisoner exchange but reduced to a broken cripple. He joined the Inquisition soon after that.
</span></li><li data-dcnode-id="2843"><span data-dcnode-id="2848" instrument_node=""> In </span><em data-dcnode-id="2845"><a class="twikilink" data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheFlightEngineer" title="/pmwiki/pmwiki.php/Literature/TheFlightEngineer"><span data-dcnode-id="2847" instrument_node="">The Flight Engineer</span></a></em><span data-dcnode-id="2844" instrument_node=""> trilogy Commander Peter Raeder, a fighter pilot, had to be retrained as an engineering duty officer (chief fighter mechanic, specifically) after losing a hand in battle. Later in the series, an improved prosthesis gives him the dexterity to fly Speeds again and he's cleared to fly in emergencies.
</span></li><li data-dcnode-id="2831"><span data-dcnode-id="2842" instrument_node=""> </span><em data-dcnode-id="2839"><a class="twikilink" data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheFourHorsemenUniverse" title="/pmwiki/pmwiki.php/Literature/TheFourHorsemenUniverse"><span data-dcnode-id="2841" instrument_node="">The Four Horsemen Universe</span></a></em><span data-dcnode-id="2838" instrument_node="">: The Winged Hussars have a Tortantula-Flatar pair, Oort and Jeejee, among their </span><a class="twikilink" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceMarines" title="/pmwiki/pmwiki.php/Main/SpaceMarines"><span data-dcnode-id="2837" instrument_node="">Space Marines</span></a><span data-dcnode-id="2835" instrument_node="">. Jeejee explains to Hussars Commander Alexis Cromwell that Oort lost part of a leg on a contract. It's not crippling (they have eight of them) but no Tortantula merc unit will hire a maimed one (probably because Tortantulas are </span><a class="twikilink" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExplosiveBreeder" title="/pmwiki/pmwiki.php/Main/ExplosiveBreeder"><span data-dcnode-id="2834" instrument_node="">Explosive Breeders</span></a><span data-dcnode-id="2832" instrument_node=""> and there's, therefore, no market pressure). Jeejee ran across her on a station afterward and kept her from getting into the wrong prize-fighting ring; they joined the Hussars later.
</span></li><li data-dcnode-id="2825"><span data-dcnode-id="2830" instrument_node=""> Narrowly averted in </span><em data-dcnode-id="2827"><a class="twikilink" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/GetAGripVivyCohen" title="/pmwiki/pmwiki.php/Literature/GetAGripVivyCohen"><span data-dcnode-id="2829" instrument_node="">Get a Grip, Vivy Cohen!</span></a></em><span data-dcnode-id="2826" instrument_node=""> As pitcher VJ Capello describes in a letter to Vivy, he suffered from a soldier labrum tear while he was in the lower leagues, ruining his fastball. For some time he thought his baseball career was over, until he took up the knuckleball, allowing him to become a famous pitcher anyway.
</span></li><li data-dcnode-id="2819"><span data-dcnode-id="2824" instrument_node=""> </span><em data-dcnode-id="2821"><a class="twikilink" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/IntoTheDrowningDeep" title="/pmwiki/pmwiki.php/Literature/IntoTheDrowningDeep"><span data-dcnode-id="2823" instrument_node="">Into the Drowning Deep</span></a></em><span data-dcnode-id="2820" instrument_node="">: Ray's career as a world-class MMA fighter was cut short by an injury that destroyed both his knees and his savings were exhausted by top-of-the-line reconstructive surgery. Fortunately for him, when he went looking for other work, he ended up speaking to Theo, who had been a sailor until he suffered a major spinal injury and was sympathetic to Ray's situation.
</span></li><li data-dcnode-id="2813"><span data-dcnode-id="2818" instrument_node=""> </span><em data-dcnode-id="2815"><a class="twikilink" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JesseStone" title="/pmwiki/pmwiki.php/Literature/JesseStone"><span data-dcnode-id="2817" instrument_node="">Jesse Stone</span></a></em><span data-dcnode-id="2814" instrument_node=""> was drafted by the Dodgers and sent to their AAA team (one step below Major League), but hurt his shoulder during a play, and went to work for the police instead, as his strength in the game was throwing. Even when just playing in the local softball game, it still aches years later, and he can tell he has nowhere near the velocity he used to have.
</span></li><li data-dcnode-id="2804"><span data-dcnode-id="2812" instrument_node=""> </span><em data-dcnode-id="2809"><a class="twikilink" data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JohnPutnamThatcher" title="/pmwiki/pmwiki.php/Literature/JohnPutnamThatcher"><span data-dcnode-id="2811" instrument_node="">John Putnam Thatcher</span></a></em><span data-dcnode-id="2808" instrument_node="">: In </span><em data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Right on the Money,</span></em><span data-dcnode-id="2805" instrument_node=""> Doug Ecker was raised as the heir to his father's business for twenty-five years before two heart attacks forced him to take early retirement.
</span></li><li data-dcnode-id="2798"><span data-dcnode-id="2803" instrument_node=""> </span><em data-dcnode-id="2800"><a class="twikilink" data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JohnnyTremain" title="/pmwiki/pmwiki.php/Literature/JohnnyTremain"><span data-dcnode-id="2802" instrument_node="">Johnny Tremain</span></a></em><span data-dcnode-id="2799" instrument_node="">: The title character burns his hand early in the story, meaning he can't be a silversmith.
</span></li><li data-dcnode-id="2792"><span data-dcnode-id="2797" instrument_node=""> Early on in </span><em data-dcnode-id="2794"><a class="twikilink" data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheManWhoBroughtTheDodgersBackToBrooklyn" title="/pmwiki/pmwiki.php/Literature/TheManWhoBroughtTheDodgersBackToBrooklyn"><span data-dcnode-id="2796" instrument_node="">The Man Who Brought the Dodgers Back to Brooklyn</span></a></em><span data-dcnode-id="2793" instrument_node="">, Daniel "Squat" Malone is poised for a promising career with the LA Dodgers' farm team in Montreal in 1958 and is predicted to become the aging Roy Campanella's replacement as catcher. That comes to an end one icy evening in Ann Arbor, Michigan, while visiting his best friend Bobby Hanes in college; while playing catch with Bobby in the street, a car hits Squat and mangles his legs, requiring one to be amputated, and effectively ends his life as a baseball player.
</span></li><li data-dcnode-id="2783"><span data-dcnode-id="2791" instrument_node=""> In </span><em data-dcnode-id="2788"><a class="twikilink" data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/RunWithTheWind" title="/pmwiki/pmwiki.php/Literature/RunWithTheWind"><span data-dcnode-id="2790" instrument_node="">Run with the Wind</span></a></em><span data-dcnode-id="2787" instrument_node="">, the skilled runner Haiji is still suffering a knee injury which he got from high school (implied to have been caused by the intense training and improper maintenance). The injury is frequently in the way of his activities with the Kansei University track team, who are working hard in hopes of running at the prestigious Hakone Ekiden. </span><span class="spoiler" data-dcnode-id="2785" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2786" instrument_node="">The team successfully qualifies and Haiji is able to run there thanks to painkillers and sheer will—however, the physical strains are too much for his leg, and after completing his race at Hakone he's no longer able to run. In the epilogue he's noted to have a slight limp on his injured leg, suggesting not even walking normally is something he can do anymore.</span></span><span data-dcnode-id="2784" instrument_node="">
</span></li></ul><ul data-dcnode-id="2678"><li data-dcnode-id="2766"><span data-dcnode-id="2780" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SherlockHolmes" title="/pmwiki/pmwiki.php/Literature/SherlockHolmes"><span data-dcnode-id="2779" instrument_node="">Sherlock Holmes</span></a><span data-dcnode-id="2777" instrument_node=""> story </span><em data-dcnode-id="2774"><a class="twikilink" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AStudyInScarlet" title="/pmwiki/pmwiki.php/Literature/AStudyInScarlet"><span data-dcnode-id="2776" instrument_node="">A Study in Scarlet</span></a></em><span data-dcnode-id="2773" instrument_node="">, Watson has returned to England after having been shot in Afghanistan. This sets him up to meet </span><a class="twikilink" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefectiveDetective" title="/pmwiki/pmwiki.php/Main/DefectiveDetective"><span data-dcnode-id="2772" instrument_node="">the world's only consulting detective</span></a><span data-dcnode-id="2770" instrument_node="">... </span><a class="twikilink" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeterosexualLifePartners" title="/pmwiki/pmwiki.php/Main/HeterosexualLifePartners"><span data-dcnode-id="2769" instrument_node="">and the rest is history</span></a><span data-dcnode-id="2767" instrument_node="">.
</span></li><li data-dcnode-id="2757"><span data-dcnode-id="2765" instrument_node=""> </span><em data-dcnode-id="2762"><a class="twikilink" data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SocialQueue" title="/pmwiki/pmwiki.php/Literature/SocialQueue"><span data-dcnode-id="2764" instrument_node="">Social Queue</span></a></em><span data-dcnode-id="2761" instrument_node="">: Zoe's dad was in a heavy-machinery accident five years ago, leaving her mom, a nurse, as the sole breadwinner. For a long time her dad was depressed about not being able to contribute, complete with a </span><a class="twikilink" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeardOfSorrow" title="/pmwiki/pmwiki.php/Main/BeardOfSorrow"><span data-dcnode-id="2760" instrument_node="">Beard of Sorrow</span></a><span data-dcnode-id="2758" instrument_node="">, but his mental health improved once he got into cooking.
</span></li><li data-dcnode-id="2741"><span data-dcnode-id="2756" instrument_node=""> </span><em data-dcnode-id="2753"><a class="twikilink" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="2755" instrument_node="">A Song of Ice and Fire</span></a></em><span data-dcnode-id="2752" instrument_node="">:
</span><ul data-dcnode-id="2742"><li data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node=""> Bran gets pushed out of a window and is paralyzed from the waist down, destroying any possibility of his ever being a knight which was his dream and a very suitable calling for a younger son of a feudal lord.
</span></li><li data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node=""> Willas Tyrell, the heir to Highgarden, was a promising knight until his leg got crushed in </span><a class="twikilink" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTourney" title="/pmwiki/pmwiki.php/Main/TheTourney"><span data-dcnode-id="2748" instrument_node="">a tournament</span></a><span data-dcnode-id="2746" instrument_node="">.
</span></li><li data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node=""> Jaime Lannister, also known as the best swordsman in Westeros loses his sword-hand, and so far has made little progress at learning to fight left-handed.
</span></li></ul></li><li data-dcnode-id="2735"><span data-dcnode-id="2740" instrument_node=""> In </span><em data-dcnode-id="2737"><a class="createlink" data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/StillAlice" title="/pmwiki/pmwiki.php/Literature/StillAlice"><span data-dcnode-id="2739" instrument_node="">Still Alice</span></a></em><span data-dcnode-id="2736" instrument_node="">, Alice has to retire early from her job as a linguistics professor because she develops early-onset Alzheimer's Disease.
</span></li><li data-dcnode-id="2729"><span data-dcnode-id="2734" instrument_node=""> In </span><em data-dcnode-id="2731"><a class="twikilink" data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SweetDiamondDust" title="/pmwiki/pmwiki.php/Literature/SweetDiamondDust"><span data-dcnode-id="2733" instrument_node="">Sweet Diamond Dust</span></a></em><span data-dcnode-id="2730" instrument_node="">'s short story, “The Strange Desth of Captain Candelario”, Pedro's athletic aspirations end when the Missionaries, the local police force, raid Villa Cañona (the slum where he lives) and beat him so roughly he is left with a limp. Irónica, he ends up joining them.
</span></li><li data-dcnode-id="2721"><span data-dcnode-id="2728" instrument_node=""> In </span><em data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Virtuosity</span></em><span data-dcnode-id="2725" instrument_node=""> by Jessica Martinez, Diana was a former opera singer who developed vocal cord nodules at the height of her career, forcing her to quit singing. This causes her to become a </span><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StageMom" title="/pmwiki/pmwiki.php/Main/StageMom"><span data-dcnode-id="2724" instrument_node="">Stage Mom</span></a><span data-dcnode-id="2722" instrument_node=""> to her daughter, the protagonist, who is a violin prodigy.
</span></li><li data-dcnode-id="2714"><span data-dcnode-id="2720" instrument_node=""> </span><em data-dcnode-id="2716"><a class="twikilink" data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WalkersCrossing" title="/pmwiki/pmwiki.php/Literature/WalkersCrossing"><span data-dcnode-id="2719" instrument_node="">Walker's Crossing</span></a><span data-dcnode-id="2717" instrument_node="">:</span></em><span data-dcnode-id="2715" instrument_node=""> Lon Walker can't be a cowboy anymore because he hurt his leg when a horse bucked him off.
</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2713" instrument_node=""> Happens several times in </span><em data-dcnode-id="2710"><a class="twikilink" data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WarriorCats" title="/pmwiki/pmwiki.php/Literature/WarriorCats"><span data-dcnode-id="2712" instrument_node="">Warrior Cats</span></a></em><span data-dcnode-id="2709" instrument_node="">. For the most part, the cat is already considerably old when it happens:
</span><ul data-dcnode-id="2689"><li data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node=""> Stonepelt retires early due to a shoulder injury that didn't heal properly.
</span></li><li data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node=""> Longtail retires early when he goes blind from infected scratched eyes he received while rabbit hunting.
</span></li><li data-dcnode-id="2700"><span data-dcnode-id="2704" instrument_node=""> The most notable example in the series, though, is Cinderpelt, whose hind leg was permanently damaged when she was hit by a car when she was only an apprentice. She dreamed of being a warrior but decided to serve her Clan as a medicine cat after it became clear her leg would never heal. </span><span class="spoiler" data-dcnode-id="2702" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2703" instrument_node="">She is later reincarnated and is able to become a warrior as Cinderheart</span></span><span data-dcnode-id="2701" instrument_node="">.
</span></li><li data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node=""> Briarlight, whose spine was broken when a tree fell on her just before she was about to receive her warrior name. Though she survived, her paralyzed hindlegs made her unable to fight or even move around much, so she just helped out around the camp, especially in the medicine cat's den.
</span></li><li data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node=""> Subverted with Brightheart. She was mauled by a dog, leaving her missing one eye. Others try to get her go to retire. Brightheart, however, ends up becoming a warrior despite her partial blindness.
</span></li><li data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node=""> Petalfall had to retire from being a deputy due to epilepsy.
</span></li><li data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node=""> Lilywhisker was forced to retire to the elder's den after a tunnel collapse broke her spine and left her unable to use her back legs.
</span></li><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node=""> Halftail retired early because he couldn't keep balance after most of his tail was lost to a badger.
</span></li></ul></li><li data-dcnode-id="2679"><span data-dcnode-id="2687" instrument_node=""> In </span><em data-dcnode-id="2684"><a class="twikilink" data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HarmonicFeedback" title="/pmwiki/pmwiki.php/Literature/HarmonicFeedback"><span data-dcnode-id="2686" instrument_node="">Harmonic Feedback</span></a></em><span data-dcnode-id="2683" instrument_node="">, Naomi's dad used to work in construction until he fell and injured his back. With no way of getting another job, he </span><a class="twikilink" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrowningMySorrows" title="/pmwiki/pmwiki.php/Main/DrowningMySorrows"><span data-dcnode-id="2682" instrument_node="">took to drinking</span></a><span data-dcnode-id="2680" instrument_node=""> and started neglecting his kids.
</span></li></ul></div><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2675"></p><div class="folderlabel" data-dcnode-id="2673" onclick="togglefolder('folder7');"><span data-dcnode-id="2674" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Live-Action TV&nbsp;</span></div><div class="folder" data-dcnode-id="2273" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="2672" instrument_node="">
</span><ul data-dcnode-id="2274"><li data-dcnode-id="2666"><span data-dcnode-id="2671" instrument_node=""> In the World War 2 series </span><em data-dcnode-id="2668"><a class="createlink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheAttackers" title="/pmwiki/pmwiki.php/Series/TheAttackers"><span data-dcnode-id="2670" instrument_node="">The Attackers</span></a></em><span data-dcnode-id="2667" instrument_node="">, one of the female pilots is shot down but manages to crash land her plane. However, in addition to a bullet wound to the shoulder, she also suffers a nasty head injury. The doctors tell her that the brain injury will make her incapable of flying in combat again. She is reassigned to a flight school as an instructor but subverts this trope by tricking another doctor into giving her a clean bill of health and is sent back to her squadron where she continues to fly combat missions. However, in the last episode of the series, this trope is double subverted when the injury catches up to her, she blacks out in the cockpit and is killed.
</span></li><li data-dcnode-id="2657"><span data-dcnode-id="2665" instrument_node=""> In </span><em data-dcnode-id="2662"><a class="twikilink" data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheBigLeap" title="/pmwiki/pmwiki.php/Series/TheBigLeap"><span data-dcnode-id="2664" instrument_node="">The Big Leap</span></a></em><span data-dcnode-id="2661" instrument_node="">, Monica shattered her kneecap during rehearsals for Swan Lake, and has been taking steroids in order to continue dancing on point. </span><span class="spoiler" data-dcnode-id="2659" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2660" instrument_node=""> Eventually it does give out, but she finds that she's able to continue dancing in a small capacity</span></span><span data-dcnode-id="2658" instrument_node="">.
</span></li><li data-dcnode-id="2651"><span data-dcnode-id="2656" instrument_node=""> In </span><em data-dcnode-id="2653"><a class="twikilink" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BlindJustice" title="/pmwiki/pmwiki.php/Series/BlindJustice"><span data-dcnode-id="2655" instrument_node="">Blind Justice</span></a></em><span data-dcnode-id="2652" instrument_node="">, the protagonist is a police officer who is blinded due to an injury he sustains in the line of duty. This would normally end his career but he manages to subvert the trope by suing the police department to get his job back.
</span></li><li data-dcnode-id="2637"><span data-dcnode-id="2650" instrument_node=""> </span><em data-dcnode-id="2647"><a class="twikilink" data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Bones" title="/pmwiki/pmwiki.php/Series/Bones"><span data-dcnode-id="2649" instrument_node="">Bones</span></a></em><span data-dcnode-id="2646" instrument_node="">:
</span><ul data-dcnode-id="2638"><li data-dcnode-id="2641"><span data-dcnode-id="2645" instrument_node=""> There was an episode where the </span><a class="twikilink" data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VictimOfTheWeek" title="/pmwiki/pmwiki.php/Main/VictimOfTheWeek"><span data-dcnode-id="2644" instrument_node="">Victim of the Week</span></a><span data-dcnode-id="2642" instrument_node=""> is a professional motorcycle racer, one of the suspects is a paraplegic former racer whom the victim had "accidentally" caused to crash in a previous race.
</span></li><li data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node=""> Booth talks in another episode about wanting to play pro football before hurting his shoulder and opting for the military instead.
</span></li></ul></li><li data-dcnode-id="2611"><span data-dcnode-id="2636" instrument_node=""> </span><em data-dcnode-id="2633"><a class="twikilink" data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Cheers" title="/pmwiki/pmwiki.php/Series/Cheers"><span data-dcnode-id="2635" instrument_node="">Cheers</span></a></em><span data-dcnode-id="2632" instrument_node=""> established this as the reason Sam left baseball... with a twist.
</span><div class="indent" data-dcnode-id="2612"><strong data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Diane:</span></strong><span data-dcnode-id="2629" instrument_node=""> So, why aren't you playing anymore? </span><br data-dcnode-id="2628"><strong data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Sam:</span></strong><span data-dcnode-id="2625" instrument_node=""> I developed an elbow problem. </span><br data-dcnode-id="2624"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Diane:</span></strong><span data-dcnode-id="2621" instrument_node=""> An elbow problem? </span><br data-dcnode-id="2620"><strong data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Sam:</span></strong><span data-dcnode-id="2617" instrument_node=""> Yeah. Bent it too much. </span><br data-dcnode-id="2616"><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">[mimes drinking from a bottle]</span></em><span data-dcnode-id="2613" instrument_node="">
</span></div></li><li data-dcnode-id="2605"><span data-dcnode-id="2610" instrument_node=""> A plot point of Danny Messer's backstory in </span><em data-dcnode-id="2607"><a class="twikilink" data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CSINY" title="/pmwiki/pmwiki.php/Series/CSINY"><span data-dcnode-id="2609" instrument_node="">CSI: NY</span></a></em><span data-dcnode-id="2606" instrument_node="">. He was an aspiring baseball player, but an arm injury forced him to quit (a storyline that was incidentally drawn from the actor's real-life background).
</span></li><li data-dcnode-id="2595"><span data-dcnode-id="2604" instrument_node=""> </span><em data-dcnode-id="2600"><a class="twikilink" data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CobraKai" title="/pmwiki/pmwiki.php/Series/CobraKai"><span data-dcnode-id="2603" instrument_node="">Cobra Kai</span></a><span data-dcnode-id="2601" instrument_node="">:</span></em><span data-dcnode-id="2599" instrument_node=""> The climax of Season 2, a bloodbath between </span><a class="twikilink" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RivalDojos" title="/pmwiki/pmwiki.php/Main/RivalDojos"><span data-dcnode-id="2598" instrument_node="">Rival Dojos</span></a><span data-dcnode-id="2596" instrument_node=""> in the halls of West Valley High, sees Robby kicking Miguel over the top balcony and sending him onto the staircase two floors down. Season 3 sees Miguel having to learn how to walk and how to throw punches and kicks again.
</span></li><li data-dcnode-id="2589"><span data-dcnode-id="2594" instrument_node=""> Lily Flagler from the </span><em data-dcnode-id="2591"><a class="twikilink" data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Decoy" title="/pmwiki/pmwiki.php/Series/Decoy"><span data-dcnode-id="2593" instrument_node="">Decoy</span></a></em><span data-dcnode-id="2590" instrument_node=""> episode "High Swing" was a trapeze artist until she fell and broke her back. Her husband quit working as an acrobat to take care of her and started mugging people to feed her opioid addiction.
</span></li><li data-dcnode-id="2578"><span data-dcnode-id="2588" instrument_node=""> </span><em data-dcnode-id="2585"><a class="twikilink" data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Degrassi" title="/pmwiki/pmwiki.php/Series/Degrassi"><span data-dcnode-id="2587" instrument_node="">Degrassi</span></a></em><span data-dcnode-id="2584" instrument_node="">
</span><ul data-dcnode-id="2579"><li data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node=""> Katie injures her knee right before a university soccer tryout and despite being a star player, has to drop her dreams of being an athlete.
</span></li><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node=""> Jimmy Brooks was shot in the lower back and paralyzed in a school shooting, forcing him to use a wheelchair for the rest of his life and ending any chances of a basketball career. One Degrassi mini showed that had Jimmy never been shot, he would have received a scholarship for playing basketball.
