</span><p data-dcnode-id="1278"></p><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Whether or not we care to admit it, as film fans we all love a good happy ending. Seeing the characters we've spent 90-plus minutes getting to know ride off into the sunset is a great feeling, though sometimes a greater thrill can be found in a complete shock. Luckily, there are plenty of directors willing to make films designed to leave the viewer utterly speechless as the credits roll. From uncomfortable family revelations to extreme acts of violence, these are some of cinema's most shocking movie endings.</span></p><span data-dcnode-id="1275" instrument_node="">

</span><img alt="" class="gallery-image" data-dcnode-id="970" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-usual-suspects-1995.jpg" data-post-id="36840" data-slide-num="1" data-slide-title="The Most Shocking Movie Endings: The Usual Suspects (1995)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-usual-suspects-1995/" height="438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.looper.com/img/gallery/the-most-shocking-movie-endings/the-usual-suspects-1995.jpg&amp;raw" width="780"><span data-dcnode-id="969" instrument_node="">
</span></picture><span data-dcnode-id="967" instrument_node="">
</span></div><span data-dcnode-id="965" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="952"><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="963"></p><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">Ending with one of the most genuinely surprising twists in modern cinema, Bryan Singer's neo-noir classic </span><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">The Usual Suspects</span></em><span data-dcnode-id="959" instrument_node=""> follows the interrogation of seemingly helpless Roger "Verbal" Kint (Kevin Spacey), one of only two survivors of a devastating fire on a ship docked at the Port of Los Angeles. Spacey spins the detectives (and hapless viewers) a long and twisted tale of drugs, deceit and death, explaining that everything comes back to a mysterious mob boss by the name of Keyser Söze. The twist? Spacey's character is Keyser Söze all along, which the officers realize just a few moments too late. As Kint exits the police station and shuffles off down the street, his awkward gait starts to straighten out and we realize we've been had. The greatest trick the Devil ever pulled was convincing the world he didn't exist, after all.</span></p><span data-dcnode-id="957" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="956"></div><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="954"></p><span data-dcnode-id="953" instrument_node="">
</span></div><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span><div class="news-article" data-dcnode-id="918"><span data-dcnode-id="948" instrument_node="">
</span><h2 class="" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Inglourious Basterds (2009)</span></h2><span data-dcnode-id="945" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="938" data-post-id="36840" data-slide-num="2"><span data-dcnode-id="944" instrument_node="">

</span><img alt="" class="gallery-image" data-dcnode-id="942" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/inglourious-basterds-2009.jpg" data-post-id="36840" data-slide-num="2" data-slide-title="The Most Shocking Movie Endings: Inglourious Basterds (2009)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/inglourious-basterds-2009/" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.looper.com/img/gallery/the-most-shocking-movie-endings/inglourious-basterds-2009.jpg&amp;raw" width="780"><span data-dcnode-id="941" instrument_node="">
</span></picture><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="920"><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="935"></p><p data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">Quentin Tarantino's gleefully inaccurate take on the WWII thriller was </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imdb.com/title/tt0361748/awards" target="_blank"><span data-dcnode-id="933" instrument_node="">nominated</span></a><span data-dcnode-id="931" instrument_node=""> for eight Academy Awards, with Christoph Waltz taking home the Oscar for Best Actor in a Supporting Role for his portrayal of the film's unforgettable villain Hans "The Jew Hunter" Landa. He joined an ensemble cast including Michael Fassbender, Daniel Brühl and Brad Pitt, the leader of the Nazi-killing U.S. outfit the film is named after. First Lieutenant Aldo "The Apache" Raine (Pitt) and his Basterds go on the hunt for Nazi scalps, machine-gunning Hitler himself to pieces in the process, though the one German Raine cannot kill is Landa. After striking a deal with the top brass, the Jew Hunter is afforded his freedom in the States, though Aldo doesn't let him slide that easily. With the film all but wrapped up, Pitt pulls out his knife and proceeds to carve a Swastika into Waltz's forehead in a shockingly gory close-up.</span></p><span data-dcnode-id="929" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="928"></div><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="926"></p><span data-dcnode-id="925" instrument_node="">
</span><div class="vidad-container" data-dcnode-id="924"></div><span data-dcnode-id="923" instrument_node="">

</span><h2 class="" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The Planet of the Apes (1968)</span></h2><span data-dcnode-id="913" instrument_node="">

</span><img alt="" class="gallery-image" data-dcnode-id="910" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-planet-of-the-apes-1968.jpg" data-post-id="36840" data-slide-num="3" data-slide-title="The Most Shocking Movie Endings: The Planet of the Apes (1968)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-planet-of-the-apes-1968/" height="438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.looper.com/img/gallery/the-most-shocking-movie-endings/the-planet-of-the-apes-1968.jpg&amp;raw" width="780"><span data-dcnode-id="909" instrument_node="">
</span></picture><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="887"><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="903"></p><p data-dcnode-id="893"><span data-dcnode-id="902" instrument_node="">Loosely based on French author Pierre Boulle's 1963 novel </span><em data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">La Planète des Singes,</span></em><span data-dcnode-id="899" instrument_node=""> this seminal sci-fi was included in </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.empireonline.com/movies/features/500-greatest-movies/" target="_blank"><em data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Empire</span></em><span data-dcnode-id="896" instrument_node="">'s</span></a><span data-dcnode-id="894" instrument_node=""> Greatest Movies of All Time list and contains one of the most famous examples of a shock ending. Charlton Heston leads a group of astronauts stranded on a strange and seemingly deserted planet after a crash landing. The crew soon come to realize that they are not alone, however. Apes with human-like intelligence dominate this world and they don't take kindly to the arrival of their otherworldly guests, though it turns out Heston and his team are far from alien. As he escapes the apes and makes his way along the shoreline with returning home on his mind, he comes across the sandy remains of the Statue of Liberty and discovers he's been on Earth the whole time, trapped in a future devastated by nuclear war.</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="891"></div><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="889"></p><span data-dcnode-id="888" instrument_node="">
</span></div><span data-dcnode-id="886" instrument_node="">
</span></div><span data-dcnode-id="884" instrument_node="">
</span><div class="news-article" data-dcnode-id="857"><span data-dcnode-id="883" instrument_node="">

</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="873" data-post-id="36840" data-slide-num="4"><span data-dcnode-id="879" instrument_node="">

</span><img alt="" class="gallery-image" data-dcnode-id="877" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/orphan-2009.jpg" data-post-id="36840" data-slide-num="4" data-slide-title="The Most Shocking Movie Endings: Orphan (2009)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/orphan-2009/" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.looper.com/img/gallery/the-most-shocking-movie-endings/orphan-2009.jpg&amp;raw" width="780"><span data-dcnode-id="876" instrument_node="">
</span></picture><span data-dcnode-id="874" instrument_node="">
</span></div><span data-dcnode-id="872" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="859"><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="870"></p><p data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">A film containing one of the creepiest shock twists in recent years, </span><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Orphan</span></em><span data-dcnode-id="866" instrument_node=""> follows a couple (Vera Farmiga and Peter Sarsgaard) trying to move on with their lives after the death of their unborn child. In an attempt to save their marriage, the pair decide to go ahead with their plans for a third child, adopting a quiet 9-year-old Russian girl named Esther (Isabelle Fuhrman). At least, they're lead to believe she's nine. In truth, Esther is a 33-year-old woman named Leena Klammer, a psychopath with a growth disorder who's spent the majority of her life posing as a pigtailed child and being repeatedly adopted. Why does she need to keep finding new families? She keeps trying to get it on with the dads. We watch in sheer horror as Esther sets about seducing her new father and proceeds to kill him when he isn't receptive.</span></p><span data-dcnode-id="864" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="863"></div><span data-dcnode-id="862" instrument_node="">

</span></div><span data-dcnode-id="844" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="825"><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="842"></p><p data-dcnode-id="831"><span data-dcnode-id="841" instrument_node="">The first </span><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Star Wars</span></em><span data-dcnode-id="838" instrument_node=""> sequel picked up three years after the destruction of the Death Star, the exciting climax of the first film. Luke Skywalker and the Rebel assault squadron bearing down on the superweapon's weak spot remains a memorable finale, though it pales in comparison to the closing stages of </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">The Empire Strikes Back,</span></em><span data-dcnode-id="835" instrument_node=""> known for its double-blow ending</span><em data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">.</span></em><span data-dcnode-id="832" instrument_node=""> Han Solo being frozen alive in carbonite by Darth Vader and carted off was quite the shock for fans of the dashing pilot, though the real jaw-dropper comes when Luke arrives at Cloud City, spurred on by a premonition of Han and Leia in pain. The young Jedi falls right into Vader's trap, losing his hand during the lightsaber battle that ensues and still refusing to join the Dark Side of the Force. In a moment that would be quoted, referenced and parodied countless times over the years that followed, Vader reveals to Luke that he is actually his father.</span></p><span data-dcnode-id="830" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="829"></div><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="827"></p><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span><div class="news-article" data-dcnode-id="792"><span data-dcnode-id="821" instrument_node="">
</span><h2 class="" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Seven (1995)</span></h2><span data-dcnode-id="818" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="811" data-post-id="36840" data-slide-num="6"><span data-dcnode-id="817" instrument_node="">
</span><picture data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="815" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/seven-1995.jpg" data-post-id="36840" data-slide-num="6" data-slide-title="The Most Shocking Movie Endings: Seven (1995)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/seven-1995/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="814" instrument_node="">
</span></picture><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="810" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="794"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="808"></p><p data-dcnode-id="800"><span data-dcnode-id="807" instrument_node="">David Fincher's gory thriller </span><em data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Seven</span></em><span data-dcnode-id="804" instrument_node=""> is crammed full of shocking moments, with every discovery of a new victim churning the stomach that little bit more. The mutilations become increasingly horrific as a serial killer inspired by the seven deadly sins picks off those he deems guilty of committing them. One scene in particular sticks long in the memory, however, and that's the film's haunting finale. After veteran detective William Somerset (Morgan Freeman) and his new partner David Mills (Brad Pitt) finally manage to corner the killer (Kevin Spacey), they discover a box containing the head of Mills' pregnant wife Tracy (Gwyneth Paltrow). Despite it being exactly what the killer wants (that is, Mills to complete the killing by becoming 'Wrath'), the heartbroken detective guns down the skinheaded madman in a shocking climax that unlike other scenes didn't actually rely on gore—Paltrow's severed head is never actually shown, despite many viewers coming away </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tomarencibia.tumblr.com/post/97723811890/playboy-interview-david-fincher" target="_blank"><span data-dcnode-id="803" instrument_node="">swearing they saw it</span></a><span data-dcnode-id="801" instrument_node="">.</span></p><span data-dcnode-id="799" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="798"></div><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="796"></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span><div class="news-article" data-dcnode-id="755"><span data-dcnode-id="790" instrument_node="">
</span><h2 class="" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Oldboy (2003)</span></h2><span data-dcnode-id="787" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="780" data-post-id="36840" data-slide-num="7"><span data-dcnode-id="786" instrument_node="">
</span><picture data-dcnode-id="782"><span data-dcnode-id="785" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="784" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/oldboy-2003.jpg" data-post-id="36840" data-slide-num="7" data-slide-title="The Most Shocking Movie Endings: Oldboy (2003)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/oldboy-2003/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="783" instrument_node="">
</span></picture><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="757"><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="777"></p><p data-dcnode-id="763"><span data-dcnode-id="776" instrument_node="">South Korean director Park Chan-wook made inroads in Hollywood in 2013 after helming two English-language films, the psychological drama </span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Stoker</span></em><span data-dcnode-id="773" instrument_node=""> and the Chris Evans-led sci-fi thriller </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Snowpiercer.</span></em><span data-dcnode-id="770" instrument_node=""> While both drew praise from critics (the latter has an impressive </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rottentomatoes.com/m/snowpiercer/" target="_blank"><span data-dcnode-id="769" instrument_node="">95 percent</span></a><span data-dcnode-id="767" instrument_node=""> Certified Fresh rating on Rotten Tomatoes) most reviewers agreed that Park's best work was done domestically, and the jewel in his Korean filmography is undoubtedly </span><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Oldboy.</span></em><span data-dcnode-id="764" instrument_node=""> The film follows a drunk named Oh Dae-su who's framed for the murder of his wife and imprisoned in an iron-doored hotel room by an unknown man. When he's randomly released 15 years later, he aims to track down his captor with the help of a young female sushi chef who takes him in after his ordeal. The woman and Oh Dae-su fall for each other and begin a sexual relationship, though unbeknownst to the pair this is all part of the captor's grand plan. Oh Dae-su and the young woman are actually father and daughter, which Oh's tormentor takes great pleasure in revealing.</span></p><span data-dcnode-id="762" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="761"></div><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="759"></p><span data-dcnode-id="758" instrument_node="">
</span></div><span data-dcnode-id="756" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
</span><div class="news-article" data-dcnode-id="727"><span data-dcnode-id="753" instrument_node="">
</span><h2 class="" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">The Boy In The Striped Pyjamas (2008)</span></h2><span data-dcnode-id="750" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="743" data-post-id="36840" data-slide-num="8"><span data-dcnode-id="749" instrument_node="">
</span><picture data-dcnode-id="745"><span data-dcnode-id="748" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="747" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-boy-in-the-striped-pyjamas-2008.jpg" data-post-id="36840" data-slide-num="8" data-slide-title="The Most Shocking Movie Endings: The Boy In The Striped Pyjamas (2008)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-boy-in-the-striped-pyjamas-2008/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="746" instrument_node="">
</span></picture><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="729"><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="740"></p><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">Those who had read John Boyne's novel going into this movie adaptation were better prepared for the shocking ending than most, but even then it would have been hard not to tense up the moment young Bruno (Asa Butterfield) and his new Jewish friend Shmuel (Jack Scanlon) start heading in the direction of the gas chambers. The film follows these two 8-year-old boys, one the son of a high ranking Nazi stationed at a German countryside manor house, and the other a prisoner at the camp situated directly behind that house. Not fully understanding the events going on around them, the pair become friends, and when Shmuel's father "goes missing" Bruno offers to help find him, donning the prisoner's uniform and entering the hell of the camp never to return. It's a shocking and highly effective ending, though it is actually historically inaccurate, with the truth being even more shocking. There were no boys that age in that camp, as the Nazis </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.webcitation.org/5jPUPVz28" target="_blank"><span data-dcnode-id="738" instrument_node="">immediately gassed</span></a><span data-dcnode-id="736" instrument_node=""> those not old enough to work.</span></p><span data-dcnode-id="734" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="733"></div><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="731"></p><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">
</span></div><span data-dcnode-id="726" instrument_node="">
</span><div class="news-article" data-dcnode-id="684"><span data-dcnode-id="725" instrument_node="">
</span><h2 class="" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">God Bless America (2012)</span></h2><span data-dcnode-id="722" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="715" data-post-id="36840" data-slide-num="9"><span data-dcnode-id="721" instrument_node="">
</span><picture data-dcnode-id="717"><span data-dcnode-id="720" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="719" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/god-bless-america-2012.jpg" data-post-id="36840" data-slide-num="9" data-slide-title="The Most Shocking Movie Endings: God Bless America (2012)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/god-bless-america-2012/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="718" instrument_node="">
</span></picture><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="686"><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="712"></p><p data-dcnode-id="692"><span data-dcnode-id="711" instrument_node="">Best known as "the one with the funny voice" from the </span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Police Academy</span></em><span data-dcnode-id="708" instrument_node=""> movies, Bobcat Goldthwait really should get more credit for the work he's done behind the camera. He has a "well-crafted, slow-burning horror" on his résumé in 2013's </span><em data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Willow Creek</span></em><span data-dcnode-id="705" instrument_node=""> and was able to get a fine tune out of the late Robin Williams in the "</span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.film4.com/reviews/2009/worlds-greatest-dad" target="_blank"><span data-dcnode-id="704" instrument_node="">startlingly excellent dark comedy</span></a><span data-dcnode-id="702" instrument_node="">" </span><em data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">World's Greatest Dad</span></em><span data-dcnode-id="699" instrument_node="">. Between these two features, he directed another movie—one with a real shock ending. </span><em data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">God Bless America</span></em><span data-dcnode-id="696" instrument_node=""> follows Frank (Joel Murray), a terminally ill man who's had just about enough of celebrity obsession and the decline of American culture, and Roxy (Tara Lynne Barr), a high-school student with a similarly weary world view. Together they embark on a nationwide rampage, gunning down rude civilians and celebrities alike. We always expect Frank to go down in a hail of bullets, but it's a shock to see schoolgirl Roxy also torn apart by police marksmen during a shootout at an </span><em data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">American Idol</span></em><span data-dcnode-id="693" instrument_node="">-style TV talent show.</span></p><span data-dcnode-id="691" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="690"></div><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="688"></p><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span></div><span data-dcnode-id="683" instrument_node="">
</span><div class="news-article" data-dcnode-id="647"><span data-dcnode-id="682" instrument_node="">
</span><h2 class="" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The Departed (2006)</span></h2><span data-dcnode-id="679" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="672" data-post-id="36840" data-slide-num="10"><span data-dcnode-id="678" instrument_node="">
</span><picture data-dcnode-id="674"><span data-dcnode-id="677" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="676" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-departed-2006.jpg" data-post-id="36840" data-slide-num="10" data-slide-title="The Most Shocking Movie Endings: The Departed (2006)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-departed-2006/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="675" instrument_node="">
</span></picture><span data-dcnode-id="673" instrument_node="">
</span></div><span data-dcnode-id="671" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="649"><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="669"></p><p data-dcnode-id="655"><span data-dcnode-id="668" instrument_node="">A loose remake of 2002 Hong Kong crime thriller </span><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Infernal Affairs,</span></em><span data-dcnode-id="665" instrument_node=""> Martin Scorsese's Best Picture winner </span><em data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The Departed</span></em><span data-dcnode-id="662" instrument_node=""> moves the action out of Asia and brings it to Boston, home of notorious Irish mob boss Whitey Bulger—the </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/blogs/celebritology/post/the-departed-its-connection-to-the-arrest-of-james-whitey-bulger/2011/06/23/AGDTJYhH_blog.html%3Futm_term%3D.578133ad419a" target="_blank"><span data-dcnode-id="661" instrument_node="">inspiration</span></a><span data-dcnode-id="659" instrument_node=""> behind Jack Nicholson's character, Frank Costello. The veteran gangster relies on a his police mole Colin Sullivan (Matt Damon) to stay ahead of the game, though he doesn't realize he also has a double agent in his ranks. Billy Costigan (Leonardo DiCaprio) spent time in prison on a fake assault charge to make his cover more believable, though it didn't do him much good in the end. After finally exposing Sullivan and slapping the cuffs on him, Costigan is shot in the head by </span><em data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">another</span></em><span data-dcnode-id="656" instrument_node=""> of Costello's moles, though this level of violence (while still shocking) has come to be expected from Scorsese. What wasn't expected was Staff Sergeant Dignam (Mark Wahlberg) showing up right at the final moment after all the dust has settled to put a bullet in Sullivan's temple.</span></p><span data-dcnode-id="654" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="653"></div><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="651"></p><span data-dcnode-id="650" instrument_node="">
</span></div><span data-dcnode-id="648" instrument_node="">
</span></div><span data-dcnode-id="646" instrument_node="">
</span><div class="news-article" data-dcnode-id="616"><span data-dcnode-id="645" instrument_node="">
</span><h2 class="" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Shutter Island (2010)</span></h2><span data-dcnode-id="642" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="635" data-post-id="36840" data-slide-num="11"><span data-dcnode-id="641" instrument_node="">
</span><picture data-dcnode-id="637"><span data-dcnode-id="640" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="639" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/shutter-island-2010.jpg" data-post-id="36840" data-slide-num="11" data-slide-title="The Most Shocking Movie Endings: Shutter Island (2010)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/shutter-island-2010/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="638" instrument_node="">
</span></picture><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="618"><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="632"></p><p data-dcnode-id="624"><span data-dcnode-id="631" instrument_node="">Another Scorsese-DiCaprio collaboration with a shocking ending, psychological thriller </span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Shutter Island</span></em><span data-dcnode-id="628" instrument_node=""> follows U.S. Marshal Teddy Daniels (DiCaprio) and his new partner Chuck (Mark Ruffalo) as they visit Ashecliffe Hospital for the Criminally Insane to investigate the disappearance of a woman incarcerated there for drowning her children. While perhaps not the directors' best, Scorsese still delivered a "</span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mtv.com/news/2763507/review-shutter-island-is-scorsese-at-his-best/" target="_blank"><span data-dcnode-id="627" instrument_node="">brilliantly constructed mystery</span></a><span data-dcnode-id="625" instrument_node="">" that leads viewers down a winding path with an unexpected end. Just as Teddy believes he's about to solve the puzzle of the missing woman, he discovers his real name is Andrew Laeddis and he's actually a patient at the hospital, sent there for murdering his wife after she drowned their children while suffering from manic depression. The whole investigation was a ruse by the head of the facility, designed as a last-ditch effort to snap Laeddis out of his conspiracy-obsessed insanity.</span></p><span data-dcnode-id="623" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="622"></div><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="620"></p><span data-dcnode-id="619" instrument_node="">
</span></div><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span><div class="news-article" data-dcnode-id="582"><span data-dcnode-id="614" instrument_node="">
</span><h2 class="" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Saw (2004)</span></h2><span data-dcnode-id="611" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="604" data-post-id="36840" data-slide-num="12"><span data-dcnode-id="610" instrument_node="">
</span><picture data-dcnode-id="606"><span data-dcnode-id="609" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="608" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/saw-2004.jpg" data-post-id="36840" data-slide-num="12" data-slide-title="The Most Shocking Movie Endings: Saw (2004)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/saw-2004/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="607" instrument_node="">
</span></picture><span data-dcnode-id="605" instrument_node="">
</span></div><span data-dcnode-id="603" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="584"><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="601"></p><p data-dcnode-id="590"><span data-dcnode-id="600" instrument_node="">After seven installments, some of which have been of questionable quality, the </span><em data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Saw</span></em><span data-dcnode-id="597" instrument_node=""> franchise has become known as nothing but an exercise in cheap thrills and torture porn. As a standalone film, however, the "</span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/film/2004/oct/01/horror" target="_blank"><span data-dcnode-id="596" instrument_node="">loathsome and extravagantly twisted</span></a><span data-dcnode-id="594" instrument_node="">" original drew comparisons to David Fincher's </span><em data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Seven,</span></em><span data-dcnode-id="591" instrument_node=""> and ended in similarly shocking fashion. Most of the movie takes place in a dilapidated subterranean bathroom where a photographer (Leigh Whannell) and an oncologist (Cary Elwes) have been chained up and instructed to kill one another by an unknown captor. A dead man lies between them for the duration, becoming part of the scenery until the final moments when the bloodied corpse suddenly stands up, revealing himself to be the killer known as Jigsaw (Tobin Bell). It's a unique and totally unexpected ending that manages to be more shocking than all the B-movie gore that came before it.</span></p><span data-dcnode-id="589" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="588"></div><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="586"></p><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><div class="news-article" data-dcnode-id="554"><span data-dcnode-id="580" instrument_node="">
</span><h2 class="" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Into The Wild (2007)</span></h2><span data-dcnode-id="577" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="570" data-post-id="36840" data-slide-num="13"><span data-dcnode-id="576" instrument_node="">
</span><picture data-dcnode-id="572"><span data-dcnode-id="575" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="574" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/into-the-wild-2007.jpg" data-post-id="36840" data-slide-num="13" data-slide-title="The Most Shocking Movie Endings: Into The Wild (2007)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/into-the-wild-2007/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="573" instrument_node="">
</span></picture><span data-dcnode-id="571" instrument_node="">
</span></div><span data-dcnode-id="569" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="556"><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="567"></p><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Based on the life and travels of American hiker Christopher McCandless, Sean Penn's </span><em data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Into The Wild</span></em><span data-dcnode-id="563" instrument_node=""> is a biographical survival film that spends 148 minutes building up to a happy ending that never comes. Through a nonlinear timeline we watch McCandless (Emile Hirsch) living in complete isolation in the Alaskan wilderness intercut with the steps he took to get there, abandoning his comfortable existence to hit the road and be closer to nature. As the film draws to an end and the harsh winter sets in, McCandless begins to realize that true happiness can only be shared with others and plans to return home to his family, though the river he crossed four months earlier has become impassible. On the point of starvation, the young backpacker is forced to gather roots and plants to eat, accidentally consuming a poisonous one in the process. He crawls into his sleeping bag to die.</span></p><span data-dcnode-id="561" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="560"></div><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="558"></p><span data-dcnode-id="557" instrument_node="">
</span></div><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span><div class="news-article" data-dcnode-id="526"><span data-dcnode-id="552" instrument_node="">
</span><h2 class="" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The Perks of Being A Wallflower (2012)</span></h2><span data-dcnode-id="549" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="542" data-post-id="36840" data-slide-num="14"><span data-dcnode-id="548" instrument_node="">
</span><picture data-dcnode-id="544"><span data-dcnode-id="547" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="546" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-perks-of-being-a-wallflower-2012.jpg" data-post-id="36840" data-slide-num="14" data-slide-title="The Most Shocking Movie Endings: The Perks of Being A Wallflower (2012)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-perks-of-being-a-wallflower-2012/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="545" instrument_node="">
</span></picture><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="528"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="539"></p><p data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">Writer/director Stephen Chbosky wasn't just aiming to make another teen-centric indie flick when he decided to adapt his own novel for the big screen, he wanted to make his story about young people's mental health a more "</span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/money/2014/dec/17/holidays-and-the-cost-of-mental-health-author-of-the-perks-of-being-a-wallflower-says-you-are-not-alone" target="_blank"><span data-dcnode-id="537" instrument_node="">communal experience</span></a><span data-dcnode-id="535" instrument_node="">" in the hope of reaching more of those affected by the themes. The film itself is well acted by leads Logan Lerman, Emma Watson and Ezra Miller, though it's hard to put your finger on what was good about their performances when all you can think about as the credits roll is the shock ending. Troubled protagonist Charlie (Lerman) has been through the ringer and is about to get the girl (Watson), though when she touches his leg he has a flashback of his late Aunt Helen. The film comes to a grim close with Charlie admitting to a psychiatrist that he's been repressing memories of the sexual abuse he suffered at his Aunt's hand before she died in a car crash.</span></p><span data-dcnode-id="533" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="532"></div><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="530"></p><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="525" instrument_node="">
</span><div class="news-article" data-dcnode-id="495"><span data-dcnode-id="524" instrument_node="">
</span><h2 class="" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Prisoners (2013)</span></h2><span data-dcnode-id="521" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="514" data-post-id="36840" data-slide-num="15"><span data-dcnode-id="520" instrument_node="">
</span><picture data-dcnode-id="516"><span data-dcnode-id="519" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="518" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/prisoners-2013.jpg" data-post-id="36840" data-slide-num="15" data-slide-title="The Most Shocking Movie Endings: Prisoners (2013)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/prisoners-2013/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="517" instrument_node="">
</span></picture><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="497"><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="511"></p><p data-dcnode-id="503"><span data-dcnode-id="510" instrument_node="">Denis Villeneuve's abduction thriller </span><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Prisoners</span></em><span data-dcnode-id="507" instrument_node=""> follows desperate dad Keller Dover (Hugh Jackman) as he hunts his daughter's kidnapper, though while he finally succeeds in solving the mystery of her disappearance, the audience is left with a huge unanswered question of their own. Dover gets himself locked in a backyard bunker by the kidnapper, with his only hope of survival being the tenacious Detective Loki (Jake Gyllenhaal). The bunker's entrance is covered by a truck, however, and Loki is about to unwittingly leave Dover to rot when the latter begins to frantically blow a whistle. Loki stops as if he hears something, and then we fade to black, with Dover's fate left unknown. It's the kind of shocking ending that has audiences waiting for a post-credits explanation, though one is never offered. Screenwriter Aaron Guzikowski even </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/kateaurthur/the-prisoners-spoilers-on-the-ending%3Futm_term%3D.fnme2LXZv%23.odqBdV7zr" target="_blank"><span data-dcnode-id="506" instrument_node="">admitted</span></a><span data-dcnode-id="504" instrument_node=""> that he expected studio resistance to the planned final scene: "I was very surprised that we were allowed to keep that ending. I was surprised I was able to get the movie made, actually."</span></p><span data-dcnode-id="502" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="501"></div><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="499"></p><span data-dcnode-id="498" instrument_node="">
</span></div><span data-dcnode-id="496" instrument_node="">
</span></div><span data-dcnode-id="494" instrument_node="">
</span><div class="news-article" data-dcnode-id="455"><span data-dcnode-id="493" instrument_node="">
</span><h2 class="" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The Sixth Sense (1999)</span></h2><span data-dcnode-id="490" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="483" data-post-id="36840" data-slide-num="16"><span data-dcnode-id="489" instrument_node="">
</span><picture data-dcnode-id="485"><span data-dcnode-id="488" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="487" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-sixth-sense-1999.jpg" data-post-id="36840" data-slide-num="16" data-slide-title="The Most Shocking Movie Endings: The Sixth Sense (1999)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-sixth-sense-1999/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="486" instrument_node="">
</span></picture><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="457"><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="480"></p><p data-dcnode-id="463"><span data-dcnode-id="479" instrument_node="">If there's one director known for an obligatory shocking ending, it's M. Night Shyamalan, a man who enjoys nothing more than lulling his audience into a false sense of security only to flip the world he's created on its head. He did it to great effect in 2000's </span><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Unbreakable</span></em><span data-dcnode-id="476" instrument_node=""> and 2004's </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The Village,</span></em><span data-dcnode-id="473" instrument_node=""> though his most famous shock ending came in his first major success, 1999's </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">The Sixth Sense.</span></em><span data-dcnode-id="470" instrument_node=""> The story follows a kid named Cole (Haley Joel Osment) as he tries to come to terms with the fact that he can see dead people through sessions with a troubled child psychologist (Bruce Willis). Unless you've been living under a rock, you already know Willis' character is actually dead the whole time, and when the film first came out stories of its shocking finale spread like wildfire. Word of mouth helped this small-scale supernatural horror bag six </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imdb.com/title/tt0167404/awards" target="_blank"><span data-dcnode-id="469" instrument_node="">Oscar nominations</span></a><span data-dcnode-id="467" instrument_node=""> and a staggering worldwide </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.boxofficemojo.com/movies/%3Fid%3Dsixthsense.htm" target="_blank"><span data-dcnode-id="466" instrument_node="">box office total</span></a><span data-dcnode-id="464" instrument_node=""> of $673 million.</span></p><span data-dcnode-id="462" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="461"></div><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="459"></p><span data-dcnode-id="458" instrument_node="">
</span></div><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="454" instrument_node="">
</span><div class="news-article" data-dcnode-id="421"><span data-dcnode-id="453" instrument_node="">
</span><h2 class="" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The Mist (2007)</span></h2><span data-dcnode-id="450" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="443" data-post-id="36840" data-slide-num="17"><span data-dcnode-id="449" instrument_node="">
</span><picture data-dcnode-id="445"><span data-dcnode-id="448" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="447" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-mist-2007.jpg" data-post-id="36840" data-slide-num="17" data-slide-title="The Most Shocking Movie Endings: The Mist (2007)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-mist-2007/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="446" instrument_node="">
</span></picture><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="423"><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="440"></p><p data-dcnode-id="429"><span data-dcnode-id="439" instrument_node="">Frank Darabont's adaptation of the Stephen King novella </span><em data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">The Mist</span></em><span data-dcnode-id="436" instrument_node=""> caused controversy before it was even released, due to the director choosing to go with a different ending. King fans were put at ease when the author </span><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cinemablend.com/new/Stephen-King-Loves-Mist-Ending-6909.html" target="_blank"><span data-dcnode-id="435" instrument_node="">gave his approval</span></a><span data-dcnode-id="433" instrument_node=""> of the changes, though only a man who has spent a lifetime delving into the bleak could claim to enjoy it. The film follows a group of people trapped in a supermarket by a deadly mist full of tentacled creatures, one of whom is dad David (Thomas Jane). In the end, David and his young son manage to escape in a car, though when they run out of gas the father is forced to use his remaining four bullets on his child and passengers. After shooting them all, he steps out of the car to accept his gruesome fate at the hands of the monsters, only for the mist to clear and the U.S. Army to appear. The shock ending was so powerful that it left viewers fighting back the urge to </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mtv.com/news/2546366/still-not-over-the-mist-ending/" target="_blank"><span data-dcnode-id="432" instrument_node="">punch their TV screens</span></a><span data-dcnode-id="430" instrument_node="">.</span></p><span data-dcnode-id="428" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="427"></div><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="425"></p><span data-dcnode-id="424" instrument_node="">
</span></div><span data-dcnode-id="422" instrument_node="">
</span></div><span data-dcnode-id="420" instrument_node="">
</span><div class="news-article" data-dcnode-id="390"><span data-dcnode-id="419" instrument_node="">
</span><h2 class="" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Psycho (1960)</span></h2><span data-dcnode-id="416" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="409" data-post-id="36840" data-slide-num="18"><span data-dcnode-id="415" instrument_node="">
</span><picture data-dcnode-id="411"><span data-dcnode-id="414" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="413" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/psycho-1960.jpg" data-post-id="36840" data-slide-num="18" data-slide-title="The Most Shocking Movie Endings: Psycho (1960)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/psycho-1960/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="412" instrument_node="">
</span></picture><span data-dcnode-id="410" instrument_node="">
</span></div><span data-dcnode-id="408" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="392"><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="406"></p><p data-dcnode-id="398"><span data-dcnode-id="405" instrument_node="">One of the first filmmakers to truly understand the art of the twist, Alfred Hitchcock's particular brand of suspense earned him the well-deserved nickname the Master of Suspense, something he delivered consistently over a distinguished career spanning more than five decades. Perhaps his most famous shock ending is the one he conceived for </span><em data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Psycho,</span></em><span data-dcnode-id="402" instrument_node=""> the story of Norman Bates (Anthony Perkins) and his family's motel. While Janet Leigh being slashed in the shower is undoubtedly the movie's best-known scene, the most shocking moment comes in the closing stages, when we finally realize Norman's mother has been dead all along and he's been committing murders dressed in her clothing. Hitchcock went to </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/news/9-things-you-may-not-know-about-alfred-hitchcock" target="_blank"><span data-dcnode-id="401" instrument_node="">great lengths</span></a><span data-dcnode-id="399" instrument_node=""> to keep the twist a secret, swearing the cast and crew to an oath of secrecy and imploring the public to keep quiet about Bates via the film's advertisements.</span></p><span data-dcnode-id="397" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="396"></div><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="394"></p><span data-dcnode-id="393" instrument_node="">
</span></div><span data-dcnode-id="391" instrument_node="">
</span></div><span data-dcnode-id="389" instrument_node="">
</span><div class="news-article" data-dcnode-id="342"><span data-dcnode-id="388" instrument_node="">
</span><h2 class="" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Get Out (2017)</span></h2><span data-dcnode-id="385" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="378" data-post-id="36840" data-slide-num="19"><span data-dcnode-id="384" instrument_node="">
</span><picture data-dcnode-id="380"><span data-dcnode-id="383" instrument_node="">
</span><img alt="Daniel Kaluuya in Get Out" class="gallery-image lazyload" data-dcnode-id="382" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/get-out-2017-1568821178.jpg" data-post-id="36840" data-slide-num="19" data-slide-title="The Most Shocking Movie Endings: Get Out (2017)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/get-out-2017/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="381" instrument_node="">
</span></picture><span data-dcnode-id="379" instrument_node="">
</span></div><span data-dcnode-id="377" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="344"><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="375"></p><p data-dcnode-id="361"><span data-dcnode-id="374" instrument_node="">Jordan Peele's directorial debut&nbsp;</span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Get Out&nbsp;</span></em><span data-dcnode-id="371" instrument_node="">was the&nbsp;</span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//money.com/money/4891175/get-out-jordan-peele-most-profitable-movie-2017/" target="_blank"><span data-dcnode-id="370" instrument_node="">most profitable</span></a><span data-dcnode-id="368" instrument_node="">&nbsp;film of 2017, generating an incredible 630 percent return on initial investment. Made for a modest budget of $4.5 million, Peele's social thriller raked in over&nbsp;</span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boxofficemojo.com/movies/%3Fid%3Dblumhouse2.htm" target="_blank"><span data-dcnode-id="367" instrument_node="">$255 million</span></a><span data-dcnode-id="365" instrument_node="">&nbsp;at the worldwide box office. A number of factors contributed to&nbsp;</span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Get Out</span></em><span data-dcnode-id="362" instrument_node="">'s success, but it was the movie's shocking ending that guaranteed it would live long in the memory.</span></p><span data-dcnode-id="360" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="359"></div><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">When Chris (Daniel Kaluuya), a young black man, meets the parents of his white girlfriend Rose (Allison Williams) for the first time, we soon come to realize that something isn't quite right with her family. After Chris meets a peculiar black guest at the family's garden party, viewers are led to believe that the protagonist is about to be brainwashed into some kind of modern-day slavery, but the final reveal is even more mind-blowing: It turns out Chris is in the clutches of the Order of Coagula, a cult that transplants the brains of old, rich white people into the bodies of young black people.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="354" instrument_node="">Unlike those that came before him, Chris manages to escape this awful fate, stuffing his ears with cotton to avoid being hypnotized. He fights his way outside and is ultimately rescued by his best friend Rod (Lil Rel Howery). This wasn't the </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collider.com/get-out-alternate-ending-explained/%23jordan-peele" target="_blank"><span data-dcnode-id="353" instrument_node="">original ending</span></a><span data-dcnode-id="351" instrument_node="">, however&nbsp;— Peele shot a version in which the cops show up instead of Rod and an innocent Chris is jailed for killing his kidnappers.</span></p><span data-dcnode-id="349" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="348"></div><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="346"></p><span data-dcnode-id="345" instrument_node="">
</span></div><span data-dcnode-id="343" instrument_node="">
</span></div><span data-dcnode-id="341" instrument_node="">
</span><div class="news-article" data-dcnode-id="294"><span data-dcnode-id="340" instrument_node="">
</span><h2 class="" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Fight Club (1999)</span></h2><span data-dcnode-id="337" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="330" data-post-id="36840" data-slide-num="20"><span data-dcnode-id="336" instrument_node="">
</span><picture data-dcnode-id="332"><span data-dcnode-id="335" instrument_node="">
</span><img alt="Brad Pitt, Ed Norton, Fight Club" class="gallery-image lazyload" data-dcnode-id="334" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/fight-club-1999-1568821178.jpg" data-post-id="36840" data-slide-num="20" data-slide-title="The Most Shocking Movie Endings: Fight Club (1999)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/fight-club-1999/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="333" instrument_node="">
</span></picture><span data-dcnode-id="331" instrument_node="">
</span></div><span data-dcnode-id="329" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="296"><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="327"></p><p data-dcnode-id="307"><span data-dcnode-id="326" instrument_node="">It's considered a cult classic today, but </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Fight Club&nbsp;</span></em><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boxofficemojo.com/movies/%3Fid%3Dfightclub.htm" target="_blank"><span data-dcnode-id="323" instrument_node="">bombed</span></a><span data-dcnode-id="321" instrument_node="">&nbsp;when it hit cineplexes in 1999. The gritty David Fincher flick (based on Chuck Palahniuk's&nbsp;novel of the same name) was the victim of a mismanaged marketing campaign by a studio that just didn't know what to do with it. According to&nbsp;</span><em data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Fight Club</span></em><span data-dcnode-id="318" instrument_node="">&nbsp;producer Art Linson, execs at Fox were "flopping around like acid-crazed carp wondering how such a thing could even have happened" when they saw the first cut (via </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.denofgeek.com/movies/fight-club/32368/looking-back-at-david-finchers-fight-club" target="_blank"><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Den of Geek</span></em></a><span data-dcnode-id="314" instrument_node="">). Many critics had a similar reaction, but word of mouth helped turn&nbsp;</span><em data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Fight Club</span></em><span data-dcnode-id="311" instrument_node="">'s fortunes around&nbsp;— DVD sales were </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiewire.com/2019/03/fight-club-david-fincher-clashing-ed-norton-fox-over-marketing-box-office-1202053884/" target="_blank"><span data-dcnode-id="310" instrument_node="">outstanding</span></a><span data-dcnode-id="308" instrument_node="">, pushing Fincher's film into the black. Those who weren't put off by the negative reviews couldn't help but discuss the film's hyper-violence, nihilistic message, and shocking twist ending.</span></p><span data-dcnode-id="306" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="305"></div><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="300"><em data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Fight Club</span></em><span data-dcnode-id="301" instrument_node="">&nbsp;follows Ed Norton's unnamed protagonist (a.k.a the Narrator), a man working a job he hates to buy things he doesn't need. After his apartment is blown to smithereens in an explosion, he moves into a rundown house with Brad Pitt's Tyler Durden, his opposite in every way&nbsp;⁠— cool, focused, and ready to tear the world down. The fight club they start morphs into a full-blown anti-capitalist terrorist cell. By the time the Narrator realizes that he and Durden are the same person, it's too late to stop the plan they've put in place. The movie ends with the destruction of the city's financial district, wiping out everyone's debt.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="298"></p><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">
</span></div><span data-dcnode-id="293" instrument_node="">
</span><div class="news-article" data-dcnode-id="243"><span data-dcnode-id="292" instrument_node="">
</span><h2 class="" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">The Others (2001)</span></h2><span data-dcnode-id="289" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="282" data-post-id="36840" data-slide-num="21"><span data-dcnode-id="288" instrument_node="">
</span><picture data-dcnode-id="284"><span data-dcnode-id="287" instrument_node="">
</span><img alt="Nicole Kidman in The Others" class="gallery-image lazyload" data-dcnode-id="286" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-others-2001-1568821178.jpg" data-post-id="36840" data-slide-num="21" data-slide-title="The Most Shocking Movie Endings: The Others (2001)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-others-2001/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="285" instrument_node="">
</span></picture><span data-dcnode-id="283" instrument_node="">
</span></div><span data-dcnode-id="281" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="245"><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="279"></p><p data-dcnode-id="263"><span data-dcnode-id="278" instrument_node="">The fact that Alejandro Amenabar's </span><em data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">The Others&nbsp;</span></em><span data-dcnode-id="275" instrument_node="">managed to shock audiences even though it dropped just two years after M. Night Shyamalan's&nbsp;</span><em data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">The Sixth Sense&nbsp;</span></em><span data-dcnode-id="272" instrument_node="">is a testament to Amenabar's deft approach to the horror genre. The Spanish-Chilean filmmaker told </span><em data-dcnode-id="268"><a data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.combustiblecelluloid.com/interviews/amenabar.shtml" target="_blank"><span data-dcnode-id="271" instrument_node="">Combustible Celluloid</span></a><span data-dcnode-id="269" instrument_node="">&nbsp;</span></em><span data-dcnode-id="267" instrument_node="">that when it came to writing the script, he began with the twist ending. He then wrote the beginning, and finished with "all the stuff in the middle." When you watch </span><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">The Others&nbsp;</span></em><span data-dcnode-id="264" instrument_node="">again, you realize that the first two acts are full of subtle hints at what's to come, but the finale left the majority of first-time viewers in shock.</span></p><span data-dcnode-id="262" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="261"></div><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Set in the immediate aftermath of World War II, the film follows Nicole Kidman's Grace, a devoutly religious woman who moves into a remote island house with her two children. Grace's daughter has repeated encounters with an otherworldly family (the eponymous "others") who claim the house belongs to them. She's skeptical to begin with, but when she witnesses a piano seemingly playing itself, she becomes convinced that the old Victorian mansion is haunted. She's correct, of course, but she and her kids are the ones doing the haunting&nbsp;— it turns out Grace murdered her children, and all three of them are ghosts.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="256" instrument_node="">It's a shocking, but well-earned twist. "Most of the time it's not about the surprise, but how you set up the surprise, so that when you get there, everything makes sense and it's integrated with the soul of the story,"&nbsp;Amenabar told&nbsp;</span><em data-dcnode-id="253"><a data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywood.com/general/the-others-alejandro-amenabar-interview-57162683/" target="_blank"><span data-dcnode-id="255" instrument_node="">Hollywood.com</span></a></em><span data-dcnode-id="252" instrument_node="">.</span></p><span data-dcnode-id="250" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="249"></div><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="247"></p><span data-dcnode-id="246" instrument_node="">
</span></div><span data-dcnode-id="244" instrument_node="">
</span></div><span data-dcnode-id="242" instrument_node="">
</span><div class="news-article" data-dcnode-id="197"><span data-dcnode-id="241" instrument_node="">
</span><h2 class="" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">The Prestige (2006)</span></h2><span data-dcnode-id="238" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="231" data-post-id="36840" data-slide-num="22"><span data-dcnode-id="237" instrument_node="">
</span><picture data-dcnode-id="233"><span data-dcnode-id="236" instrument_node="">
</span><img alt="Hugh Jackman in The Prestige" class="gallery-image lazyload" data-dcnode-id="235" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/the-prestige-2006-1568821178.jpg" data-post-id="36840" data-slide-num="22" data-slide-title="The Most Shocking Movie Endings: The Prestige (2006)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/the-prestige-2006/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="234" instrument_node="">
</span></picture><span data-dcnode-id="232" instrument_node="">
</span></div><span data-dcnode-id="230" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="199"><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="228"></p><p data-dcnode-id="215"><span data-dcnode-id="227" instrument_node="">Christoper Nolan's movies are about much more than just shocking twists, but the director does love a good misdirect. From&nbsp;</span><em data-dcnode-id="224"><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thisisbarry.com/film/memento-2000-movie-plot-simplified-ending-explained/" target="_blank"><span data-dcnode-id="226" instrument_node="">Memento</span></a></em><span data-dcnode-id="223" instrument_node="">, his out-of-sequence neo-noir psychological thriller,&nbsp;to </span><a data-dcnode-id="220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.looper.com/158243/the-ending-of-interstellar-explained/" target="_blank"><em data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Interstellar</span></em></a><span data-dcnode-id="219" instrument_node="">, his mind-boggling sci-fi epic, Nolan has become well-known for his surprising third acts. While the aforementioned films are great examples of this, the high-concept, head-scratching twists they end on dilute the shock factor somewhat. That wasn't the case with </span><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">The Prestige</span></em><span data-dcnode-id="216" instrument_node="">, a less complicated (but equally gripping) period movie that left audiences reeling from an unexpected double blow.</span></p><span data-dcnode-id="214" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="213"></div><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="208"><em data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">The Prestige</span></em><span data-dcnode-id="209" instrument_node=""> follows Robert Angier (Hugh Jackman) and Alfred Borden (Christian Bale), rival magicians vying for dominance in 19th century London. Angier becomes obsessed with figuring out his opposite number's Transported Man, a trick in which Borden steps into a wardrobe and exits from an identical one at the opposite end of the stage. Angier is led to believe that Borden has been using a teleportation machine invented by Nikola Tesla, but the truth is far less scientific —&nbsp;Borden is actually a set of identical twins who have been living as one person. That's only part of the surprise, however.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">We discover that Angier has actually been using Tesla's machine to do the trick for real. Every time he uses it, he creates a clone of himself. One basks in the applause of the audience, while the other is trapped in a tank and drowned. In the final moments of the movie, we see row upon row of dead Angier clones.</span></p><span data-dcnode-id="204" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="203"></div><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="201"></p><span data-dcnode-id="200" instrument_node="">
</span></div><span data-dcnode-id="198" instrument_node="">
</span></div><span data-dcnode-id="196" instrument_node="">
</span><div class="news-article" data-dcnode-id="148"><span data-dcnode-id="195" instrument_node="">
</span><h2 class="" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Us (2019)</span></h2><span data-dcnode-id="192" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="185" data-post-id="36840" data-slide-num="23"><span data-dcnode-id="191" instrument_node="">
</span><picture data-dcnode-id="187"><span data-dcnode-id="190" instrument_node="">
</span><img alt="Lupita Nyong'o in Us" class="gallery-image lazyload" data-dcnode-id="189" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/us-2019-1568821178.jpg" data-post-id="36840" data-slide-num="23" data-slide-title="The Most Shocking Movie Endings: Us (2019)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/us-2019/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="188" instrument_node="">
</span></picture><span data-dcnode-id="186" instrument_node="">
</span></div><span data-dcnode-id="184" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="150"><span data-dcnode-id="183" instrument_node="">
