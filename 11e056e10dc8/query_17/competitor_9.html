</span><p data-dcnode-id="182"></p><p data-dcnode-id="174"><span data-dcnode-id="181" instrument_node="">Jordan Peele's follow-up to&nbsp;</span><em data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Get Out&nbsp;</span></em><span data-dcnode-id="178" instrument_node="">was less a thought-provoking social thriller and more a straight-up horror movie, but the ending was just as shocking. 2019's&nbsp;</span><em data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Us</span></em><span data-dcnode-id="175" instrument_node="">&nbsp;begins&nbsp;with a little girl named Adelaide wandering off from her parents and entering a spooky beachfront funhouse, where she meets her&nbsp;doppelgänger. When her parents finally locate her, she's unable to speak. Fast forward a few decades and Adelaide (Lupita Nyong'o) is all grown up, though she remembers that day all too well. When her husband (Winston Duke) suggests going on a family vacation to the same beach, she reluctantly agrees. Before long she realizes that she should have listened to her gut.</span></p><span data-dcnode-id="173" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="172"></div><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="170" instrument_node="">Adelaide, her husband, and her two kids are soon terrorized by a family of red jumpsuit-wearing doppelgängers. It turns out that every one of us has a mute double living in the abandoned and forgotten (but&nbsp;</span><a data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/jordan-peeles-us-are-there-really-thousand-of-miles-of-hidden-tunnels-all-across-the-country/" target="_blank"><span data-dcnode-id="169" instrument_node="">very real</span></a><span data-dcnode-id="167" instrument_node="">) underground tunnels that span the length of the United States. That's not the big twist, however. In the final moments of the movie, it's revealed that Adelaide's double choked her out and switched with her the day they came face to face in that hall of mirrors. The </span><a data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//villains.fandom.com/wiki/Red_%28Us%29" target="_blank"><span data-dcnode-id="166" instrument_node="">leader of the Tethered</span></a><span data-dcnode-id="164" instrument_node=""> is actually the real Adelaide, which is why she's the only one who can speak. "This movie's about maybe the monster is you," Peele said on the </span><em data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Empire</span></em><span data-dcnode-id="161" instrument_node=""> podcast (via </span><a data-dcnode-id="158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vice.com/en_us/article/59xxv5/us-movie-ending-explained-jordan-peele-twist-red-adelaide-jeremiah-11-11-vgtrn" target="_blank"><em data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Vice</span></em></a><span data-dcnode-id="157" instrument_node="">). "It's about us, looking at ourselves as individuals and as a group."</span></p><span data-dcnode-id="155" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="154"></div><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="152"></p><span data-dcnode-id="151" instrument_node="">
</span></div><span data-dcnode-id="149" instrument_node="">
</span></div><span data-dcnode-id="147" instrument_node="">
</span><div class="news-article" data-dcnode-id="92"><span data-dcnode-id="146" instrument_node="">
</span><h2 class="" data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">Glass (2019)</span></h2><span data-dcnode-id="143" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="136" data-post-id="36840" data-slide-num="24"><span data-dcnode-id="142" instrument_node="">
</span><picture data-dcnode-id="138"><span data-dcnode-id="141" instrument_node="">
</span><img alt="Sam Jackson in Glass" class="gallery-image lazyload" data-dcnode-id="140" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/glass-2019-1568821178.jpg" data-post-id="36840" data-slide-num="24" data-slide-title="The Most Shocking Movie Endings: Glass (2019)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/glass-2019/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="139" instrument_node="">
</span></picture><span data-dcnode-id="137" instrument_node="">
</span></div><span data-dcnode-id="135" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="94"><span data-dcnode-id="134" instrument_node="">
</span><p data-dcnode-id="133"></p><p data-dcnode-id="113"><span data-dcnode-id="132" instrument_node="">2016's </span><em data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">Split</span></em><span data-dcnode-id="129" instrument_node=""> marked&nbsp;a </span><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/scottmendelson/2017/02/08/box-office-as-split-tops-100m-m-night-shyamalan-is-still-among-our-last-spielbergs/" target="_blank"><span data-dcnode-id="128" instrument_node="">return to form</span></a><span data-dcnode-id="126" instrument_node=""> for M. Night Shyamalan, grossing almost </span><a data-dcnode-id="124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boxofficemojo.com/movies/%3Fid%3Dsplit2017.htm" target="_blank"><span data-dcnode-id="125" instrument_node="">$280 million</span></a><span data-dcnode-id="123" instrument_node="">. The film itself didn't have a typical Shyamalan twist, but an extra scene that played after the title card at the end of the movie confirmed that it was actually a sequel to 2000's </span><em data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Unbreakable</span></em><span data-dcnode-id="120" instrument_node="">, sending fans into hysterics. The final installment in the trilogy, 2019's&nbsp;</span><em data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Glass</span></em><span data-dcnode-id="117" instrument_node="">, didn't do very well with </span><a data-dcnode-id="115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rottentomatoes.com/m/glass_2019" target="_blank"><span data-dcnode-id="116" instrument_node="">the critics</span></a><span data-dcnode-id="114" instrument_node="">, but it delivered on the shock factor.</span></p><span data-dcnode-id="112" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="111"></div><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="103"><em data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Glass</span></em><span data-dcnode-id="107" instrument_node="">&nbsp;reunites Bruce Willis and Samuel Jackson's&nbsp;</span><em data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">Unbreakable&nbsp;</span></em><span data-dcnode-id="104" instrument_node="">characters, David Dunn (a.k.a the Overseer) and&nbsp;Elijah Price (a.k.a Mr. Glass). Both are banged up in a psychiatric ward alongside James McAvoy's Kevin Wendell Crumb (a.k.a the Horde), a man suffering from&nbsp;an extreme case of dissociative identity disorder. All three are under the care of Dr. Ellie Staple (Sarah Paulson), a psychiatrist&nbsp;who specializes in patients who have become convinced that they have superhuman abilities. Staple spends the majority of the film attempting to convince the men that they're delusional, and she's pretty convincing.&nbsp;At times, against our better judgment, we believe her.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Of course, she's wrong. It transpires that Staple is part of a secret society that has been actively repressing super-powered people for years. Price is killed by the Beast, and Staple's men murder Dunn and Crumb. There's one final twist, however&nbsp;—&nbsp;Price hacked the institution's security cameras. Footage of Dunn and Crumb's super-powered showdown is leaked to the public, revealing the existence of superhumans to the world.</span></p><span data-dcnode-id="99" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="98"></div><span data-dcnode-id="97" instrument_node="">
</span><p data-dcnode-id="96"></p><span data-dcnode-id="95" instrument_node="">
</span></div><span data-dcnode-id="93" instrument_node="">
</span></div><span data-dcnode-id="91" instrument_node="">
</span><div class="news-article" data-dcnode-id="54"><span data-dcnode-id="90" instrument_node="">
</span><h2 class="" data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">Gone Baby Gone (2007)</span></h2><span data-dcnode-id="87" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="80" data-post-id="36840" data-slide-num="25"><span data-dcnode-id="86" instrument_node="">
</span><picture data-dcnode-id="82"><span data-dcnode-id="85" instrument_node="">
</span><img alt="Morgan Freeman in Gone Baby Gone" class="gallery-image lazyload" data-dcnode-id="84" data-lazy-src="https://www.looper.com/img/gallery/the-most-shocking-movie-endings/gone-baby-gone-2007-1568821178.jpg" data-post-id="36840" data-slide-num="25" data-slide-title="The Most Shocking Movie Endings: Gone Baby Gone (2007)" data-slide-url="https://www.looper.com/36840/shocking-movie-endings/slide/gone-baby-gone-2007/" height="438" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="83" instrument_node="">
</span></picture><span data-dcnode-id="81" instrument_node="">
</span></div><span data-dcnode-id="79" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="56"><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="77"></p><p data-dcnode-id="72"><span data-dcnode-id="76" instrument_node="">The ending of Ben Affleck's directorial debut&nbsp;</span><em data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">Gone Baby Gone&nbsp;</span></em><span data-dcnode-id="73" instrument_node="">was divisive to say the least. The movie, based on Dennis Lehane's novel of the same name, is about the kidnap and subsequent search for missing child Amanda McCready (Madeline O'Brien). Private investigators Patrick Kenzie (Casey Affleck) and Angie Gennaro (Michelle Monaghan) are hired to find her, and they do&nbsp;— she just isn't where you'd expect her to be. We're led to believe that an associate of Amanda's degenerate mother is responsible, but it turns out that retired police captain Jack Doyle (Morgan Freeman) took the girl, believing that she'd have a far better life with him rather than growing up in a rundown part of Boston with an unfit mother.</span></p><span data-dcnode-id="71" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="70"></div><span data-dcnode-id="69" instrument_node="">
</span><p data-dcnode-id="60"><span data-dcnode-id="68" instrument_node="">Fans of the movie are </span><a data-dcnode-id="66" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.joe.ie/movies-tv/10-years-later-and-people-are-still-arguing-about-the-controversial-ending-to-this-superb-film-604195" target="_blank"><span data-dcnode-id="67" instrument_node="">still arguing</span></a><span data-dcnode-id="65" instrument_node=""> about what comes next. When Kenzie discovers the truth, Doyle attempts to convince him that he should walk away and allow Amanda to grow up under his care. Kenzie's romantic and professional partner Gennaro agrees with the former cop, and she threatens to leave him if he takes the girl back to her drug-abusing mother. He takes her home anyway, believing it's the right thing to do. "You see the squalor the girl lives in and your heart goes out to her for where she used to live, not only where she's been taken to," Ben Affleck told </span><em data-dcnode-id="62"><a data-dcnode-id="63" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/templates/story/story.php%3FstoryId%3D15423592" target="_blank"><span data-dcnode-id="64" instrument_node="">NPR</span></a></em><span data-dcnode-id="61" instrument_node="">. "So it raises all kinds of questions about how we're living and how we're treating kids."</span></p><span data-dcnode-id="59" instrument_node="">
</span><p data-dcnode-id="58"></p><span data-dcnode-id="57" instrument_node="">
