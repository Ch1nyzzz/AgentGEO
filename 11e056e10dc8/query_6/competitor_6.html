</span><div class="tve-page-section-in tve_empty_dropzone" data-css="tve-u-15f5b05a206" data-dcnode-id="1200"><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1317" data-tag="h2" style=""><h2 data-dcnode-id="1322" dir="ltr"><span data-dcnode-id="1323" instrument_node="">SUSPENSEFUL MUSIC</span></h2><h3 data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">How does suspenseful music work?</span></h3><p data-dcnode-id="1318" dir="ltr"><span data-dcnode-id="1319" instrument_node="">Scary movies are all about maintaining the careful balance of tension and revulsion to build fear. Thus, horror movie soundtracks are all about balancing suspense music and horror music.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margin80" data-css="tve-u-15f5b05a1f8" data-dcnode-id="1311" style=""><span class="tve_image_frame" data-dcnode-id="1312" style="width: 100%;"><a data-dcnode-id="1313" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.studiobinder.com/wp-content/uploads/2017/10/Tension-and-Revulsion.jpg%3Fx81279" rel="noopener" target="_blank"><img alt="Suspenseful Music - Tension and Revulsion - StudioBinder" class="lazy tve_image wp-image-29767 lazy-loaded" data-adaptive-images="true" data-dcnode-id="1316" data-id="29767" data-lazy-src="//s.studiobinder.com/wp-content/uploads/2017/10/Tension-and-Revulsion.jpg?x81279&amp;resolution=1680,2" data-lazy-type="image" height="2160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.studiobinder.com/wp-content/uploads/2017/10/Tension-and-Revulsion.jpg%3Fx81279%26resolution%3D1680%2C2&amp;raw" style="width: 100%;" title="Suspenseful Music - Tension and Revulsion - StudioBinder" width="2160"><noscript data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">&lt;img class="tve_image wp-image-29767" alt="Suspenseful Music - Tension and Revulsion - StudioBinder" width="2160" height="2160" title="Suspenseful Music - Tension and Revulsion - StudioBinder" data-id="29767" style="width: 100%;" src="//s.studiobinder.com/wp-content/uploads/2017/10/Tension-and-Revulsion.jpg?x81279&amp;amp;resolution=1680,2" data-adaptive-images="true"&gt;</span></noscript></a></span></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1294" style=""><p data-dcnode-id="1309" dir="ltr"><span data-dcnode-id="1310" instrument_node="">Tension is the slow build. It's the part of the movie where the heroine is reaching for the door and maybe, just maybe, the monster is on the other side. This is where you would deploy suspenseful music.</span></p><p data-dcnode-id="1307" dir="ltr"><span data-dcnode-id="1308" instrument_node="">It makes us tense up in our chairs, waiting, waiting, waiting for the other shoe to drop. Because we can't stand the waiting any longer.</span></p><p data-dcnode-id="1305" dir="ltr"><span data-dcnode-id="1306" instrument_node="">Revulsion, however, is the moment the shoe drops. It's the killer stabbing a knife into someone's chest. It's the revelation that the handsome and loving boyfriend...is actually a vampire.</span></p><p data-dcnode-id="1303" dir="ltr"><span data-dcnode-id="1304" instrument_node="">If tension is suspenseful music, then revulsion is where horror music takes over.</span></p><p data-dcnode-id="1301" dir="ltr"><span data-dcnode-id="1302" instrument_node="">The key to horror movies, and horror movie soundtracks, is balancing those two moments. Cue the revulsion in too soon, and the audience doesn't have enough time to build up their fear.</span></p><p data-dcnode-id="1299" dir="ltr"><span data-dcnode-id="1300" instrument_node="">It's all flash, no substance.</span></p><p data-dcnode-id="1297" dir="ltr"><span data-dcnode-id="1298" instrument_node="">Let the tension go on too long, however, and the audience, desperate to break the tension, will break it themselves. Usually by cracking a joke or disconnecting from the movie altogether.</span></p><p data-dcnode-id="1295" dir="ltr"><span data-dcnode-id="1296" instrument_node="">Both are the kiss of death for you.</span></p></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1267" data-tag="h2" style=""><h2 data-dcnode-id="1292" dir="ltr"><span data-dcnode-id="1293" instrument_node="">STRINGS MAKE FOR SUSPENSEFUL MUSIC</span></h2><h3 data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Instruments in suspense music</span></h3><p data-dcnode-id="1288" dir="ltr"><span data-dcnode-id="1289" instrument_node="">The two most commonly used instruments in suspense music are synthesizers and strings.</span></p><p data-dcnode-id="1286" dir="ltr"><span data-dcnode-id="1287" instrument_node="">Synthesizer music is eerie and artificial. &nbsp;Notes can last far longer than any human could hold them. Perfect for suspense music.</span></p><p data-dcnode-id="1284" dir="ltr"><span data-dcnode-id="1285" instrument_node="">However, they're also a historical side effect. Many of the great horror movie filmmakers of the 80's used synthesizers because they’re cheap. Scary movies are traditionally made on a shoestring budget.</span></p><p data-dcnode-id="1279" dir="ltr"><span data-dcnode-id="1283" instrument_node="">Strings, on the other hand, have been used to raise tension for much longer. You might recall a famous example in </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Psycho</span></em><span data-dcnode-id="1280" instrument_node=""> (1960).</span></p><p data-dcnode-id="1277" dir="ltr"><span data-dcnode-id="1278" instrument_node="">String instruments can also hold notes for an unnaturally long time. Layering discordant strings on top of each other only increases this unsettling effect. It sounds wrong to the human ear in a way other instruments don’t.</span></p><p data-dcnode-id="1275" dir="ltr"><span data-dcnode-id="1276" instrument_node="">Like a predator, or something that shouldn’t exist. Anything that activates the lizard brain is perfect for suspense music.</span></p><p data-dcnode-id="1273" dir="ltr"><span data-dcnode-id="1274" instrument_node="">This effect works great for the moments where the monster is lurking behind a character. Seen by the audience, but not by the victim.</span></p><p data-dcnode-id="1268" dir="ltr"><span data-dcnode-id="1272" instrument_node="">But you can also use it to build tension by layering those strings over innocent scenes. Take this moment from </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The Shining</span></em><span data-dcnode-id="1269" instrument_node=""> (1980).</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-15f5b0a9106" data-dcnode-id="1262" style=""><span class="tve_image_frame" data-dcnode-id="1263" style="width: 100%;"><img alt="Suspenseful Music - The Shining - StudioBinder" class="lazy tve_image wp-image-29770 lazy-loaded" data-adaptive-images="true" data-dcnode-id="1266" data-id="29770" data-lazy-src="//s.studiobinder.com/wp-content/uploads/2017/10/Suspenseful-Music-The-Shining-StudioBinder-1.jpg?x81279&amp;resolution=1680,2" data-lazy-type="image" height="1872" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.studiobinder.com/wp-content/uploads/2017/10/Suspenseful-Music-The-Shining-StudioBinder-1.jpg%3Fx81279%26resolution%3D1680%2C2&amp;raw" style="width: 100%;" title="Suspenseful Music - The Shining - StudioBinder" width="3360"><noscript data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">&lt;img class="tve_image wp-image-29770" alt="Suspenseful Music - The Shining - StudioBinder" width="3360" height="1872" title="Suspenseful Music - The Shining - StudioBinder" data-id="29770" style="width: 100%;" src="//s.studiobinder.com/wp-content/uploads/2017/10/Suspenseful-Music-The-Shining-StudioBinder-1.jpg?x81279&amp;amp;resolution=1680,2" data-adaptive-images="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone sb-marginbottom80" data-dcnode-id="1259" data-tag="h4" style=""><h4 data-dcnode-id="1260" style="text-align: right;"><span data-dcnode-id="1261" instrument_node="">Without the suspenseful music, the Overlook isn’t so bad. Really.</span></h4></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1254" style=""><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Until Danny meets the terrifying twins, there's nothing going on here that's all that frightening. Just a little boy playing on his bike.&nbsp;</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">But don't tell the horror movie music that.</span></p></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1228" data-tag="h2" style=""><h2 data-dcnode-id="1252" dir="ltr"><span data-dcnode-id="1253" instrument_node="">RAISE THE TEMPO, RAISE THE HEARTBEAT</span></h2><h3 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">How does tempo create suspense?</span></h3><p data-dcnode-id="1248" dir="ltr"><span data-dcnode-id="1249" instrument_node="">The human brain is easily fooled. &nbsp;If our heartbeats are raised for any reason, our brains assume we must be afraid.</span></p><p data-dcnode-id="1246" dir="ltr"><span data-dcnode-id="1247" instrument_node="">So anything you can do with suspenseful music to raise your audience's heartbeat will make them more afraid.</span></p><p data-dcnode-id="1244" dir="ltr"><span data-dcnode-id="1245" instrument_node="">One of the easiest ways to do this is to raise the tempo.</span></p><p data-dcnode-id="1242" dir="ltr"><span data-dcnode-id="1243" instrument_node="">Tempo is defined as the speed at which a piece of music should be played. The higher the tempo, the faster the music.</span></p><p data-dcnode-id="1240" dir="ltr"><span data-dcnode-id="1241" instrument_node="">This is especially true if your music is already very staccato — made up of short, individual notes. Knowing this, it makes sense that good suspense music can mimic a fast heartbeat. &nbsp;</span></p><p data-dcnode-id="1238" dir="ltr"><span data-dcnode-id="1239" instrument_node="">Not immediately, mind you. &nbsp;This technique is about suspense music, not horror music. It’s all about the slow build. It starts out slow, then builds and builds.</span></p><p data-dcnode-id="1233" dir="ltr"><span data-dcnode-id="1237" instrument_node="">Think John Williams' famous from </span><em data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Jaws</span></em><span data-dcnode-id="1234" instrument_node=""> (1975). One of the greatest pieces of suspenseful music ever written.</span></p><p data-dcnode-id="1231" dir="ltr"><span data-dcnode-id="1232" instrument_node="">You can probably hum it right now. &nbsp;</span></p><p data-dcnode-id="1229" dir="ltr"><span data-dcnode-id="1230" instrument_node="">It starts slow. But then the beat gets faster, and faster, and faster. &nbsp;And your heart starts to pound along with it. &nbsp;Until you can't take the suspense any longer and…</span></p></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1209" data-tag="h2" style=""><h2 data-css="tve-u-15f5b05a21d" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">CRESCENDOS TURN TENSION INTO REVULSION</span></h2><h3 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">What effect do crescendos have?</span></h3><p data-dcnode-id="1222" dir="ltr"><span data-dcnode-id="1223" instrument_node="">Revulsion is the payoff moment of horror and suspense movies. Where you break out all the expensive special effects and stunt performances.</span></p><p data-dcnode-id="1220" dir="ltr"><span data-dcnode-id="1221" instrument_node="">Those moments need to be reflected in horror movie soundtracks. In music, a crescendo is where the volume hits its peak.</span></p><p data-dcnode-id="1218" dir="ltr"><span data-dcnode-id="1219" instrument_node="">This is where you use your scariest music. &nbsp;You can still mimic a heartbeat. &nbsp;You can still use strings or synths. But this isn’t suspense music, this is horror music.</span></p><p data-dcnode-id="1216" dir="ltr"><span data-dcnode-id="1217" instrument_node="">Take everything you’ve been doing and turn it up to 11.</span></p><p data-dcnode-id="1214" dir="ltr"><span data-dcnode-id="1215" instrument_node="">The build-up, the tension, is where you want the audience's muscles to get tense, almost ready to run from the monster that could kill them.</span></p><p data-dcnode-id="1212" dir="ltr"><span data-dcnode-id="1213" instrument_node="">This part, the revulsion, is where you want the audience to jump. To scream. To let out all that energy.</span></p><p data-dcnode-id="1210" dir="ltr"><span data-dcnode-id="1211" instrument_node="">In essence, it's where you want to actually scare them.</span></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margintop80" data-css="tve-u-15f5b0fc3d9" data-dcnode-id="1204" style=""><span class="tve_image_frame" data-dcnode-id="1205" style="width: 100%;"><img alt="Suspenseful Music - Ghostbusters - StudioBinder" class="lazy lazy-hidden tve_image wp-image-29771" data-adaptive-images="true" data-dcnode-id="1208" data-id="29771" data-lazy-src="//s.studiobinder.com/wp-content/uploads/2017/10/Suspenseful-Music-Ghostbusters-StudioBinder.jpg?x81279&amp;resolution=1680,2" data-lazy-type="image" height="1896" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="width: 100%;" title="Suspenseful Music - Ghostbusters - StudioBinder" width="3360"><noscript data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">&lt;img class="tve_image wp-image-29771" alt="Suspenseful Music - Ghostbusters - StudioBinder" width="3360" height="1896" title="Suspenseful Music - Ghostbusters - StudioBinder" data-id="29771" style="width: 100%;" src="//s.studiobinder.com/wp-content/uploads/2017/10/Suspenseful-Music-Ghostbusters-StudioBinder.jpg?x81279&amp;amp;resolution=1680,2" data-adaptive-images="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone sb-marginbottom80" data-dcnode-id="1201" data-tag="h4" style=""><h4 data-dcnode-id="1202" style="text-align: right;"><span data-dcnode-id="1203" instrument_node="">Without horror music in Ghostbusters (1984), how will we know who to call?</span></h4></div></div><span data-dcnode-id="1199" instrument_node="">
</span></div><div class="thrv_wrapper thrv-page-section sb-width700 sb-style sb-margin100" data-dcnode-id="1153"><span data-dcnode-id="1197" instrument_node="">
</span><div class="tve-page-section-out" data-dcnode-id="1196"></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="tve-page-section-in tve_empty_dropzone" data-dcnode-id="1155"><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1186" data-tag="h2" style=""><h2 data-css="tve-u-15f5b05a21d" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">up next</span></h2><h3 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Mastering the Film Score: John Williams&nbsp;</span></h3><p data-dcnode-id="1189" dir="ltr"><span data-dcnode-id="1190" instrument_node="">Of course, there's more to frightening people than just putting on scary music. &nbsp;Many directors can make you twitch with just a color palette.</span></p><p data-dcnode-id="1187" dir="ltr"><span data-dcnode-id="1188" instrument_node="">If it were that simple, you could put horror music over a scene of someone baking a cake and call it a day.</span></p></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1182" style=""><p data-dcnode-id="1183" dir="ltr"><span data-dcnode-id="1185" instrument_node="">​</span><br data-dcnode-id="1184"></p></div><div class="thrv_wrapper tve_image_caption image-wrapper centered-wrapper sb-margin80" data-css="tve-u-15f60a8d7cb" data-dcnode-id="1177" style=""><span class="tve_image_frame" data-dcnode-id="1178" style="width: 100%;"><img alt="Suspenseful Music - Florence and the Machine - StudioBinder" class="lazy lazy-hidden tve_image wp-image-29774" data-adaptive-images="true" data-dcnode-id="1181" data-id="29774" data-lazy-src="//s.studiobinder.com/wp-content/uploads/2017/10/Florence-Quote.png?x81279&amp;resolution=1680,2" data-lazy-type="image" height="2160" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="width: 100%;" title="Suspenseful Music - Florence and the Machine - StudioBinder" width="2160"><noscript data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">&lt;img class="tve_image wp-image-29774" alt="Suspenseful Music - Florence and the Machine - StudioBinder" width="2160" height="2160" title="Suspenseful Music - Florence and the Machine - StudioBinder" data-id="29774" style="width: 100%;" src="//s.studiobinder.com/wp-content/uploads/2017/10/Florence-Quote.png?x81279&amp;amp;resolution=1680,2" data-adaptive-images="true"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element tve_empty_dropzone" data-dcnode-id="1156" style=""><p data-dcnode-id="1175" dir="ltr"><span data-dcnode-id="1176" instrument_node="">But without suspenseful music, a scary movie isn't quite as scary. Alfred Hitchcock initially didn't want there to be any music in the famous shower scene in "Psycho".</span></p><p data-dcnode-id="1173" dir="ltr"><span data-dcnode-id="1174" instrument_node="">But you can’t imagine that scene without its legendary soundtrack now.</span></p><p data-dcnode-id="1162" dir="ltr"><span data-dcnode-id="1172" instrument_node="">Check out our video series to learn other ways you can use music. If you're interested in building </span><a data-dcnode-id="1170" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/6-essential-screenwriting-tips-for-writing-better-movie-dialogue/" target="_self"><span data-dcnode-id="1171" instrument_node="">terrifying antagonists</span></a><span data-dcnode-id="1169" instrument_node=""> or shooting your vampire film </span><a data-dcnode-id="1167" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/surviving-night-shoot/" target="_self"><span data-dcnode-id="1168" instrument_node="">at night</span></a><span data-dcnode-id="1166" instrument_node="">, you can read more great film tips at our </span><a data-dcnode-id="1164" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.studiobinder.com/blog/" target="_self"><span data-dcnode-id="1165" instrum
