</span></ul></div></nav><div class="site-inner" data-dcnode-id="434"><div class="content-sidebar-wrap" data-dcnode-id="435"><main class="content" data-dcnode-id="1669"><img alt="short story writing advice" class="attachment-home-top size-home-top wp-post-image" data-dcnode-id="2244" data-lazy-type="image" data-src="https://writers.com/wp-content/uploads/2019/08/short-story-writing-help-e1566930480976-750x420.jpg" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/wp-content/uploads/2019/08/short-story-writing-help-e1566930480976-750x420.jpg&amp;raw" width="750"><noscript data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">&lt;img width="750" height="420" src="https://writers.com/wp-content/uploads/2019/08/short-story-writing-help-e1566930480976-750x420.jpg" class="attachment-home-top size-home-top wp-post-image" alt="short story writing advice" /&gt;</span></noscript><article class="post-5732 post type-post status-publish format-standard has-post-thumbnail category-fiction category-from-our-instructors category-short-story event-categories-rosemary-tantra-bensko entry" data-dcnode-id="1862"><header class="entry-header" data-dcnode-id="2222"><h1 class="entry-title" data-dcnode-id="2237"><div class="from-our-instructors" data-dcnode-id="2239"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/category/from-our-instructors"><span data-dcnode-id="2241" instrument_node="">From Our Instructors</span></a></div><span data-dcnode-id="2238" instrument_node="">How to Write a Short Story: The Short Story Checklist</span></h1><span data-dcnode-id="2236" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2223"><time class="entry-time" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">September 1, 2020</span></time><span data-dcnode-id="2233" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2229"><a class="entry-author-link" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/tantra-bensko" rel="author"><span class="entry-author-name" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Rosemary Tantra Bensko</span></span></a></span><span data-dcnode-id="2228" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2225"><a data-dcnode-id="2226" href="#comments"><span data-dcnode-id="2227" instrument_node="">3 Comments</span></a></span><span data-dcnode-id="2224" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="1876"><p data-dcnode-id="2217"><span data-dcnode-id="2221" instrument_node="">Below is a collection of practical short story writing tips by Writers.com instructor </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/tantra-bensko"><span data-dcnode-id="2220" instrument_node="">Rosemary Tantra Bensko</span></a><span data-dcnode-id="2218" instrument_node="">. Each paragraph is its own checklist item: a core element of short story writing advice to follow unless you have clear reasons to the contrary. We hope it’s a helpful resource in your own writing.</span></p><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2215" instrument_node="">Update 9/1/2020: We’ve now made a summary of Rosemary’s short story checklist </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/download/7976/"><span data-dcnode-id="2214" instrument_node="">available as a PDF download</span></a><span data-dcnode-id="2212" instrument_node="">. Enjoy!</span></p><span data-dcnode-id="2210" instrument_node="">
</span><figure aria-describedby="caption-attachment-7985" class="wp-caption aligncenter" data-dcnode-id="2203" id="attachment_7985" style="width: 500px"><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/download/7976/"><img alt="" class="lazy-hidden wp-image-7985" data-dcnode-id="2209" data-lazy-type="image" data-src="https://writers.com/wp-content/uploads/2020/09/Short-Story-Checklist-768x994.png" height="647" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="500"><noscript data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">&lt;img class="wp-image-7985" src="https://writers.com/wp-content/uploads/2020/09/Short-Story-Checklist-768x994.png" alt="" width="500" height="647" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="2204" id="caption-attachment-7985"><span data-dcnode-id="2205" instrument_node="">Click to download</span></figcaption></figure><span data-dcnode-id="2202" instrument_node="">
</span><h2 data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">How to Write a Short Story: Length and Setting</span></h2><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Your short story is 1000 to 7500 words in length.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The story takes place in one time period, not spread out or with gaps other than to drive someplace, sleep, etc. If there are those gaps, there is a space between the paragraphs, the new paragraph beginning flush left, to indicate a new scene.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Each scene takes place in one location, or in continual transit, such as driving a truck or flying in a plane.</span></p><span data-dcnode-id="2190" instrument_node="">
Invalid Instructor name.
</span><h2 data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">How to Write a Short Story: Point of View</span></h2><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Unless it’s a very lengthy Romance story, in which there may be two Point of View (POV) characters, there is one POV character. If we are told what any character secretly thinks, it will only be the POV character. The degree to which we are privy to the unexpressed thoughts, memories and hopes of the POV character remains consistent throughout the story.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">You avoid head-hopping by only having one POV character per scene, even in a Romance. You avoid straying into even brief moments of telling us what other characters think other than the POV character. You use words like “apparently,” “obviously,” or “supposedly” to suggest how non-POV-characters think rather than stating it.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><h2 data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">How to Write a Short Story: Protagonist, Antagonist, Motivation</span></h2><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Your short story has one clear protagonist who is usually the character changing most.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Your story has a clear antagonist, who generally makes the protagonist change by thwarting his goals.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">(Possible exception to the two short story writing tips above: In some types of Mystery and Action stories, particularly in a series, etc., the protagonist doesn’t necessarily grow personally, but instead his change relates to understanding the antagonist enough to arrest or kill him.)</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">The protagonist changes with an Arc arising out of how he is stuck in his Flaw at the beginning of the story, which makes the reader bond with him as a human, and feel the pain of his problems he causes himself. (Or if it’s the non-personal growth type plot: he’s presented at the beginning of the story with a high-stakes problem that requires him to prevent or punish a crime.)</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">The protagonist usually is shown to Want something, because that’s what people normally do, defining their personalities and behavior patterns, pushing them onward from day to day. This may be obvious from the beginning of the story, though it may not become heightened until the Inciting Incident, which happens near the beginning of Act 1. The Want is usually something the reader sort of wants the character to succeed in, while at the same time, knows the Want is not in his authentic best interests. This mixed feeling in the reader creates tension.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">The protagonist is usually shown to Need something valid and beneficial, but at first, he doesn’t recognize it, admit it, honor it, integrate it with his Want, or let the Want go so he can achieve the Need instead. Ideally, the Want and Need can be combined in a satisfying way toward the end for the sake of continuity of forward momentum of victoriously achieving the goals set out from the beginning. It’s the encounters with the antagonist that forcibly teach the protagonist to prioritize his Needs correctly and overcome his Flaw so he can defeat the obstacles put in his path.</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">The protagonist in a personal growth plot needs to change his Flaw/Want but like most people, doesn’t automatically do that when faced with the problem. He tries the easy way, which doesn’t work. Only when the Crisis takes him to a low point does he boldly change enough to become victorious over himself and the external situation. What he learns becomes the Theme.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Each scene shows its main character’s goal at its beginning, which aligns in a significant way with the protagonist’s overall goal for the story. The scene has a “charge,” showing either progress toward the goal or regression away from the goal by the ending. Most scenes end with a negative charge, because a story is about not obtaining one’s goals easily, until the end, in which the scene/s end with a positive charge.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">The protagonist’s goal of the story becomes triggered until the Inciting Incident near the beginning, when something happens to shake up his life. This is the only major thing in the story that is allowed to be a random event that occurs to him.</span></p><span data-dcnode-id="2151" instrument_node="">

</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Your characters are not illustrative of ideas and beliefs you are pushing for, but come across as real people.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><h2 data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">How to Write a Short Story: Prose</span></h2><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Your language is succinct, fresh and exciting, specific, colorful, avoiding clichés and platitudes. Sentence structures vary. In Genre stories, the language is simple, the symbolism is direct, and words are well-known, and sentences are relatively short. In Literary stories, you are freer to use more sophisticated ideas, words, sentence structures and underlying metaphors and implied motifs.</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h2 data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">How to Write a Short Story: Story Structure</span></h2><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Your plot elements occur in the proper places according to classical Act Structure so the reader feels he has vicariously gone through a harrowing trial with the protagonist and won, raising his sense of hope and possibility. Literary short stories may be more subtle, with lower stakes, experimenting beyond classical structures like the Hero’s Journey. They can be more like vignettes sometimes, or even slice-of-life, though these types are hard to place in publications.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">In Genre stories, all the questions are answered, threads are tied up, problems are solved, though the results of carnage may be spread over the landscape. In Literary short stories, you are free to explore uncertainty, ambiguity, and inchoate, realistic endings that suggest multiple interpretations, and unresolved issues.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Some Literary stories may be nonrealistic, such as with Surrealism, Absurdism, New Wave Fabulism, Weird and Magical Realism. If this is what you write, they still need their own internal logic and they should not be bewildering as to the what the reader is meant to experience, whether it’s a nuanced, unnameable mood or a trip into the subconscious.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Literary stories may also go beyond any label other than Experimental. For example, a story could be a list of To Do items on a paper held by a magnet to a refrigerator for the housemate to read. The person writing the list may grow more passive-aggressive and manipulative as the list grows, and we learn about the relationship between the housemates through the implied threats and cajoling.</span></p><span data-dcnode-id="1981" instrument_node="">
</span><h2 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">How to Write a Short Story: Capturing Reader Interest</span></h2><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Your short story is suspenseful, meaning readers hope the protagonist will achieve his best goal, his Need, by the Climax battle against the antagonist.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Your story entertains. This is especially necessary for Genre short stories.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">The story captivates readers at the very beginning with a Hook, which can be a puzzling mystery to solve, an amazing character’s or narrator’s Voice, an astounding location, humor, a startling image, or a world the reader wants to become immersed in.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Expository prose (telling, like an essay) takes up very, very little space in your short story, and it does not appear near the beginning. The story is in Narrative format instead, in which one action follows the next. You’ve removed every unnecessary instance of Expository prose and replaced it with showing Narrative. Distancing words like “used to,” “he would often,” “over the years, he,” “each morning, he” indicate that you are reporting on a lengthy time period, summing it up, rather than sticking to Narrative format, in which immediacy makes the story engaging.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">You’ve earned the right to include Expository Backstory by making the reader yearn for knowing what happened in the past to solve a mystery. This can’t possibly happen at the beginning, obviously. Expository Backstory does not take place in the first pages of your story.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Your reader cares what happens and there are high stakes (especially important in Genre stories). Your reader worries until the end, when the protagonist survives, succeeds in his quest to help the community, gets the girl, solves or prevents the crime, achieves new scientific developments, takes over rule of his realm, etc.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Every sentence is compelling enough to urge the reader to read the next one—because he really, really wants to—instead of doing something else he could be doing. Your story is not going to be assigned to people to analyze in school like the ones you studied, so you have found a way from the beginning to intrigue strangers to want to spend their time with your words.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><div class="inline-course-categories-list" data-dcnode-id="1902"><span data-dcnode-id="1956" instrument_node="">
