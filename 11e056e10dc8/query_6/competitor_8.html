</span><ul class="meta ospm-modern clr" data-dcnode-id="1198"><span data-dcnode-id="1216" instrument_node="">

</span><img alt="You are currently viewing How to Write a Horror Story (And a Scary Short Story): In 7 Steps" class="attachment-full size-full wp-post-image" data-dcnode-id="1195" height="577" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horror-short-story-horror-novel-scary-story-e1624172401962.jpg%3Ffit%3D1024%252C577%26ssl%3D1&amp;raw" width="1024"><span data-dcnode-id="1194" instrument_node="">

</span><div class="entry-content clr" data-dcnode-id="382" itemprop="text"><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Before learning the steps and techniques of writing a good horror story, scary short story, or horror novel you first, have to understand the basics of horror fiction, which is ”fear”.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1185" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">What Is Fear, And Why Do We Love Reading Horror Fiction?</span></strong></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1183" instrument_node="">Fear by the definition is an unpleasant feeling triggered by the threat of danger, pain, harm both real or imaginary and when we experience this strong emotion ”the fear” in our comfort zone where we are safe from all the evils happening in the story or the movie we are watching then this unpleasant feeling of fear gets turned into an extremely ocular pleasant, enjoyable and amusing experience.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1175" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><em data-dcnode-id="1176"><strong data-dcnode-id="1177"><span data-dcnode-id="1180" instrument_node="">Related: </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pandorapost.com/2020/11/famous-horror-short-stories.html"><span data-dcnode-id="1179" instrument_node="">Famous Horror Short Stories </span></a></strong></em></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1173" instrument_node="">In short, the amusing feeling of reading a horror story, horror novel, or watching a horror movie can be related to a person who enjoys eating his favorite spicy food to feel its burning pleasure.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1170" instrument_node="">Horror fiction is always in great demand either in print or the visible media and many writers have earned a big name in writing horror fiction.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="1167" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="1156" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><em data-dcnode-id="1164"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Related</span></strong></em><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">:</span></strong><span data-dcnode-id="1161" instrument_node=""> </span><em data-dcnode-id="1157"><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pandorapost.com/2020/09/best-horror-short-story-ideas-with-horror-vocabulary.html"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">101 Horror Story Ideas</span></strong></a></em></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">But are you ”The Tough Guy”?&nbsp;</span></strong></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1150" instrument_node="">I believe someone who gets scared the most can write an awesome horror or a scary story. So If you fear going alone in a dark basement, fear ghosts, get uncomfortable when a creepy stranger looks at you in a subway, you feel fear when someone seems to follow you on the street,&nbsp; you enjoy watching horror movies but at night you regret that then there is a great chance you can write a better horror story.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1147" instrument_node="">But what If you are “the tough guy” who doesn’t get scared easily and can binge the whole night watching horror then first you have to understand what horror feels like.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1139" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><strong data-dcnode-id="1140"><em data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">Do Read: </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pandorapost.com/2021/02/top-10-best-writing-blogs-books-youtube-channels-for-writers.html"><span data-dcnode-id="1143" instrument_node="">Top 10 Best Books on Writing.&nbsp;</span></a></em></strong></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1135" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Pro Writing Tips:</span></strong></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1133" instrument_node="">As we all know, we get frightened the most reading those horror stories where we see the characters are ordinary beings not so capable of facing the fear.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="1130" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="1128" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="1129" instrument_node="">So no one will enjoy a horror story where the characters are the extraordinary tough guys easily handling their fears.</span></p><span data-dcnode-id="1127" instrument_node="">

</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">This is the fear of a new modern world where people want to know what If an unknown entity, an alien interacts with humans, then how we will cope with the situation and survive. But it’s the hardest fear factor to choose to scare a reader because someone hardly gets scared by reading about an alien invasion or interaction with humans in comparison with getting frightened by reading a ghost story.</span></p><span data-dcnode-id="793" instrument_node="">

</span><li data-dcnode-id="786"><strong data-dcnode-id="790" data-original-attrs="{&quot;style&quot;:&quot;mso-bidi-font-weight: normal;&quot;}"><span data-dcnode-id="791" instrument_node="">Humans</span></strong><strong data-dcnode-id="788" data-original-attrs="{&quot;style&quot;:&quot;mso-bidi-font-weight: normal;&quot;}"><span data-dcnode-id="789" instrument_node="">–</span></strong><span data-dcnode-id="787" instrument_node="">We humans get feared by our own species a lot. This is also one of the prominent fear factors in a horror story. You don’t want your favorite character in the story to get followed by a psycho killer for no reason and you read the whole story just to know if your ordinary and sweet character survived the psycho killer or not.</span></li><span data-dcnode-id="785" instrument_node="">
</span></ul><span data-dcnode-id="783" instrument_node="">
</span><h4 data-dcnode-id="777" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="782" id="Pro_writing_tips"></span><strong data-dcnode-id="780" data-original-attrs="{&quot;style&quot;:&quot;mso-bidi-font-weight: normal;&quot;}"><span data-dcnode-id="781" instrument_node="">Pro writing tips</span></strong><span data-dcnode-id="779" instrument_node="">–</span><span class="ez-toc-section-end" data-dcnode-id="778"></span></h4><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Create Helplessness</span></strong><span data-dcnode-id="773" instrument_node="">-If any character in the story is suffering from a body defect or not capable of doing something which is normal for everyone then you can create an immense fear among your readers when they will see how your sweet character with a bodily defect will face and survive the fear.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">Like we saw in the movie </span><a data-dcnode-id="768" data-original-attrs="{&quot;data-original-href&quot;:&quot;https://en.wikipedia.org/wiki/Annabelle_(film)&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annabelle_%28film%29" rel="noopener" target="_blank"><span data-dcnode-id="769" instrument_node="">Annabelle </span></a><span data-dcnode-id="767" instrument_node="">when one character, a little handicapped girl not capable of walking is attacked by an evil spirit where she looked helpless and cannot fight back.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="759"><strong data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Do Read: </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pandorapost.com/2021/03/reedsy-prompts-writing-contest.html"><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">How to Win $50 Writing Short Stories</span></em></a></strong></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">So imagine what if a character in your horror story suffers from a speaking defect and can’t shout and tell the other characters to save her from the evil.</span></p><span data-dcnode-id="755" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="754" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="752" data-original-attrs="{&quot;style&quot;:&quot;&quot;,&quot;trbidi&quot;:&quot;on&quot;}"><span data-dcnode-id="753" instrument_node="">This shit will make your readers go upside down and will create huge unrest, fear, and terror.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h3 data-dcnode-id="746" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="750" id="Step-2_Use_the_key_elements_of_horror"></span><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Step-2 Use the key elements of horror</span></strong><span class="ez-toc-section-end" data-dcnode-id="747"></span></h3><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The horror story moves on four major elements-</span></p><span data-dcnode-id="742" instrument_node="">
</span><ul data-dcnode-id="737" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="739" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="740" instrument_node="">Fear</span></li><span data-dcnode-id="738" instrument_node="">
</span></ul><span data-dcnode-id="736" instrument_node="">
</span><ul data-dcnode-id="731" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Mystery</span></li><span data-dcnode-id="732" instrument_node="">
</span></ul><span data-dcnode-id="730" instrument_node="">
</span><ul data-dcnode-id="725" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Suspense</span></li><span data-dcnode-id="726" instrument_node="">
</span></ul><span data-dcnode-id="724" instrument_node="">
</span><ul data-dcnode-id="719" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="721" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="722" instrument_node="">Surprise</span></li><span data-dcnode-id="720" instrument_node="">
</span></ul><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">These elements decide your story’s success and failure.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">The use of these elements carelessly and without a proper and balanced way can make your horror story go ineffective and worthless to read. These four elements must be present in any horror story.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="708" data-original-attrs="{&quot;style&quot;:&quot;&quot;,&quot;trbidi&quot;:&quot;on&quot;}"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Fear</span></strong><span data-dcnode-id="709" instrument_node="">– Fear is the basic element of a horror story and is like a pizza dough that no one will eat until you add the tasty toppings of mystery, suspense, and surprise.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Fear is useless and ineffective alone and a horror story only containing fear is worthless to read.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Like no one will be interested in just eating a plain pizza dough without any toppings same as no one will be interested in reading a horror story where the characters only face some fears with no suspense, mystery, or surprise.</span></p><span data-dcnode-id="701" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="700" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Imagine how boring is to read a ghost or a monster or a psycho killer just scaring the characters in the story with no mystery behind who really they are and why they are doing so.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The suspense and mystery play an important role in engaging the reader’s mind deeply in the story and hold the reader’s attention strongly till the end of the story.</span></p><span data-dcnode-id="694" instrument_node="">
</span><h3 data-dcnode-id="690"><span class="ez-toc-section" data-dcnode-id="693" id="Difference_between_Mystery_and_Suspense"></span><span data-dcnode-id="692" instrument_node="">Difference between Mystery and Suspense.</span><span class="ez-toc-section-end" data-dcnode-id="691"></span></h3><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Some people get confused about the difference between mystery and suspense.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">I have seen on many questioning forums that people are confused about the differences between them.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Let’s understand their differences from this simple example-</span></p><span data-dcnode-id="680" instrument_node="">
</span><ul data-dcnode-id="673" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="675"><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Mystery</span></strong><span data-dcnode-id="676" instrument_node="">-Murphy wants to know the mystery behind the locked room in his grandpa’s house.</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><span data-dcnode-id="672" instrument_node="">
</span><ul data-dcnode-id="665" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="667"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Suspense-</span></strong><span data-dcnode-id="668" instrument_node=""> Murphy’s dad promised to tell him about the locked room once they all leave the place.</span></li><span data-dcnode-id="666" instrument_node="">
</span></ul><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">So now you can understand easily the waiting phase of readers for knowing the mystery of something is called Suspense.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Watch the below video to learn about writing a great suspenseful horror story.</span></p><span data-dcnode-id="658" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="657" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="655"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="656" height="314" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/xjKruwAfZWk&amp;raw" width="560"></iframe></p><span data-dcnode-id="654" instrument_node="">
</span><h3 data-dcnode-id="649" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="653" id="Step_3-_Use_a_scary_tone"></span><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Step 3- Use a scary tone</span></strong><span class="ez-toc-section-end" data-dcnode-id="650"></span></h3><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Start playing with words and write every ordinary event in a scary tone. Choose your words wisely while writing a horrific scene and you will give goosebumps to your readers without even showing a single ghost or the psycho killer in the story.</span></p><span data-dcnode-id="645" instrument_node="">
</span><ul data-dcnode-id="639" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">How to narrate the story in a scary tone:</span></strong></li><span data-dcnode-id="640" instrument_node="">
</span></ul><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Here are the examples of how you can turn a simple-looking word into goosebumps giving sentence-</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Example 1-</span></strong></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">The psycho killer called Murphy many times, but Murphy didn’t answer the call-[Not so scary]</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">The phone rang many times at night, but Murphy couldn’t dare to pick up.-[Scary]</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622" data-original-attrs="{&quot;style&quot;:&quot;&quot;,&quot;trbidi&quot;:&quot;on&quot;}"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Example 2-</span></strong></p><span data-dcnode-id="621" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="620" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The psycho killer then sends a message to Murphy saying he is outside his main door.-[Not so scary]</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The phone ringing stopped with a strange message for Murphy, the message reads –Hi dear Murphy why are you hiding from me, don’t you want to meet your new friend who is waiting for so long outside your home just to meet you, dear-[Scary]</span></p><span data-dcnode-id="614" instrument_node="">
</span><h3 data-dcnode-id="609" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="613" id="Step_4-_Set_a_Scary_Background"></span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Step 4- Set a Scary Background </span></strong><span class="ez-toc-section-end" data-dcnode-id="610"></span></h3><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Ever imagined what else can scare someone the more except the ghosts, the monsters, an unknown entity, or any other kind of fear. It’s the background setting and the lonely environment.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">This is the reason while watching horror movies we can get scared as hell, even by a little kid suddenly appearing from nowhere.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">A little kid, one who looks very innocent and practically harmless to the characters in the film, but when this little one is placed into a dark wrecked room filled with old stuff and kids’ toys and when you see this little kid in the darkroom playing alone with his toys, you will not dare to enter into the room alone to talk with that little innocent cute looking kid.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">A well-written background doesn’t even require the dark or night to scare someone.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Assume if you are alone at your home, chilling on your couch while watching your favorite T.V show at 3 P.M afternoon in the daytime with all the sunshine coming into your house by the window, then suddenly you feel like you are not alone in the house and someone is behind you, you turned back and found no one but soon you see a little girl in white dress peeping at you from behind the curtains and then goes into a room slowly.</span></p><span data-dcnode-id="593" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="592" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Either you will leave your house immediately or you will follow the little girl with curiosity and maybe later found that she was your neighbor’s little niece who had come to visit her uncle on her birthday and while playing hide and seek mistakenly entered your house but in both ways, you are scared as hell before knowing about her.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><img alt="how to write a horror short story" class="alignnone size-full wp-image-39" data-dcnode-id="588" data-recalc-dims="1" height="508" loading="lazy" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horor-story-tips.jpg%3Fresize%3D660%252C508%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horor-story-tips.jpg?w=660&amp;ssl=1 660w, https://i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horor-story-tips.jpg?resize=300%2C231&amp;ssl=1 300w" width="660"></p><span data-dcnode-id="586" instrument_node="">
</span><h3 data-dcnode-id="582"><span class="ez-toc-section" data-dcnode-id="585" id="Step_5_Place_a_plot_twist"></span><span data-dcnode-id="584" instrument_node="">Step 5 Place a plot twist.</span><span class="ez-toc-section-end" data-dcnode-id="583"></span></h3><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The plot twist and turns in any story are like the turn and zenith slopes in the roller-coaster ride which makes it more enjoyable and scary as well.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Assume your main character in the story is searching for his lost daughter in a wrecked town full of strangers but gets helped by a sweet but strange woman in the search, and at the end, he found out that no one knows the woman in town and the address of the place which she had said she lives is turning out to be a graveyard.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Or the innocent-looking dumb friend whom everyone mocks all the time turns out to be the psycho killer who killed every friend.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">So the twist in a horror story is like extra cheese on pizza, which everyone wants to eat.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">So take one character from your story and give him a little twist to give your readers the best horror reading experience.</span></p><span data-dcnode-id="566" instrument_node="">
</span><h3 data-dcnode-id="561" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="565" id="Step_6_Use_the_Triple_S_Concept-_Survive_Search_Scare"></span><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Step 6 Use the Triple S Concept- Survive, Search, Scare.</span></strong><span class="ez-toc-section-end" data-dcnode-id="562"></span></h3><span data-dcnode-id="560" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="559" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Have you ever noticed what basically happens in most horror stories?</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">The main goal of the protagonist (the main character) and the other characters in any horror story is either to survive the horrific evil entity or to search for something, someone, some truth along with facing the fear or nothing in the control of the characters and they are not doing anything except getting scared by the evil entity.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Or these all three things are happening simultaneously</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">So they are scared but they had to search for something and also had to survive while searching for their goal.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">So use the Triple-S concepts.</span></p><span data-dcnode-id="544" instrument_node="">
</span><ul data-dcnode-id="537" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="539"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Survive</span></strong><span data-dcnode-id="540" instrument_node="">– Let your characters struggle hard to survive in the story.</span></li><span data-dcnode-id="538" instrument_node="">
</span></ul><span data-dcnode-id="536" instrument_node="">
</span><ul data-dcnode-id="529" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="531"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Search- </span></strong><span data-dcnode-id="532" instrument_node="">Write a story plot in which the protagonist (the main character) is searching for the truth behind all the evil events or let him search for someone lost in the struggle.</span></li><span data-dcnode-id="530" instrument_node="">
</span></ul><span data-dcnode-id="528" instrument_node="">
</span><ul data-dcnode-id="521" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="523"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Scare</span></strong><span data-dcnode-id="524" instrument_node="">– Let the fear factor in your horror story scare the characters of the story all the time and they are looking for the answer that why all horrific things are happening to them.</span></li><span data-dcnode-id="522" instrument_node="">
</span></ul><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">So the uses of the Triple-S concept are common in horror tales.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">No horror story exists without the use of these three S’s.</span></p><span data-dcnode-id="514" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="513" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">So take it as the base of your story and create everything on it, decorate your story with whatever fear elements you like to use.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><img alt="how to write a horror short story" class="alignnone size-full wp-image-40" data-dcnode-id="509" data-recalc-dims="1" height="440" loading="lazy" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horror.jpg%3Fresize%3D660%252C440%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horror.jpg?w=660&amp;ssl=1 660w, https://i0.wp.com/www.pandorapost.com/wp-content/uploads/2020/08/how-to-write-a-horror.jpg?resize=300%2C200&amp;ssl=1 300w" width="660"></p><span data-dcnode-id="507" instrument_node="">
</span><h3 data-dcnode-id="502" data-original-attrs="{&quot;style&quot;:&quot;&quot;}"><span class="ez-toc-section" data-dcnode-id="506" id="Step_7-Save_the_secrets_for_the_right_time"></span><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Step 7-Save the secrets for the right time.</span></strong><span class="ez-toc-section-end" data-dcnode-id="503"></span></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">While writing doesn’t reveal the important secrets of the story so easily.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Give your readers full time to ride their horse of imagination. If there is a shadow that is present at all the terrible events or at the death of characters in the story don’t reveal its secret until you have completely terrorized your readers.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Let your reader guess who is actually behind the killing of the characters or a character, is it a ghost, an unknown evil spirit, or a psycho killer.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Take your time and reveal it when you have nothing else to elaborate on in the story.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">GOOD LUCK WITH YOUR HORROR STORY</span></p><span data-dcnode-id="486" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="485" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">And don’t forget to read my blog </span><a data-dcnode-id="482" data-original-attrs="{&quot;data-original-href&quot;:&quot;https://www.pandorapost.com/2020/09/horror-vocabulary-for-writing-horror-story.html&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pandorapost.com/2020/09/horror-vocabulary-for-writing-horror-story.html"><span data-dcnode-id="483" instrument_node="">101 Best Horror Vocabulary </span></a><span data-dcnode-id="481" instrument_node="">to Know before writing a horror story.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Now, after completing your book you may want to publish it somewhere.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Google Play Books Store is a good way to start.</span></p><span data-dcnode-id="473" instrument_node="">
