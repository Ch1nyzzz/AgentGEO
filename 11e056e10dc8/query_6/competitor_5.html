</span><article class="et_pb_post post-316469 post type-post status-publish format-standard has-post-thumbnail hentry category-book-writing-tips" data-dcnode-id="694" id="post-316469"><span data-dcnode-id="1879" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="1864"><span data-dcnode-id="1878" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">How to Write Action Scenes That Add Suspense to a Story</span></h1><span data-dcnode-id="1875" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1866"><span data-dcnode-id="1874" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1871"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/author/joslynchase1outlook-com/" rel="author" title="Posts by Joslyn Chase"><span data-dcnode-id="1873" instrument_node="">Joslyn Chase</span></a></span><span data-dcnode-id="1870" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="1867"><a data-dcnode-id="1868" data-disqus-identifier="316469 https://thewritepractice.com/?p=316469" href="#disqus_thread"><span data-dcnode-id="1869" instrument_node="">5 Comments</span></a></span></p><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node="">
</span><div class="entry-content" data-dcnode-id="799"><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">You sit down, ready to write, and you’re excited because this scene is going to be full of terrific action-packed conflict to grab your reader. But then you wonder, do you even know how to write action scenes?</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1849"><span class="novashare-pinterest-image" data-dcnode-id="1850"><img alt="how to write action scenes" class="aligncenter wp-image-316719 size-full entered lazyloaded" data-dcnode-id="1858" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" data-lazy-src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png" data-lazy-srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes-480x369.png 480w" data-ll-status="loaded" height="500" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qy7s3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png&amp;raw" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes-480x369.png 480w" width="650"><noscript data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">&lt;img class="aligncenter wp-image-316719 size-full" src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png" alt="how to write action scenes" width="650" height="500" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/07/how-to-write-action-scenes-480x369.png 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" /&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1851" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fthewritepractice.com%2Fhow-to-write-action-scenes%2F%3Futm_source%3Dpinterest%26utm_medium%3Dsocial%26utm_campaign%3Dnovashare&amp;media=https://thewritepractice.com/wp-content/uploads/2021/07/how-to-write-action-scenes.png&amp;description=How%20to%20Write%20Action%20Scenes%20That%20Add%20Suspense%20to%20a%20Story" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1854" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1855" fill="currentColor"></path></svg><span data-dcnode-id="1852" style="margin-left: 4px;"><span data-dcnode-id="1853" instrument_node="">Pin</span></span></span></span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Are plot points and blow-by-blow action really what keeps readers turning pages? Do you know how to write the kind of action that will add suspense to the story, rev your readers’ heart rate, and leave them dying to know what happens next?</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Creating an action scene that works on screen is difficult. Creating an action scene that works on the page might be an even steeper challenge!</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Luckily, there are writing strategies to help you write an action scene with skill.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><h2 data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Poorly Portrayed Action Loses Readers</span></h2><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Moving your story into an action sequence can be a risky business. It requires special attention, and if you don’t give it what it needs, you invite your reader to leave the book.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">I’ll be honest—if I’m at the cinema and I have to go to the bathroom, I always wait for the action scenes to make my move. Too often, these scenes are long on tropes we’ve all seen before and short on story, depending on special effects to carry them through.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">I don’t feel like I missed much when I come back.</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">In my writing career, I’ve come to realize there needs to be something more at the core of the action to keep readers emotionally involved.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Knowing the obstacles you’re up against—and practical techniques that can help you overcome these—is key to writing effective action scenes.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1815"><div class="share-quote-quote" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node=""> There are 3 obstacles writers face when writing effective action scenes. This post teaches what they are—and shares writing techniques on how to overcome them. </span></div></div><div class="share-quote-shares" data-dcnode-id="1809"><div class="share-quote-shares-block" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1810"><a class="share-quote-twitter" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/how-to-write-action-scenes/%26text%3D%2520There%2520are%25203%2520obstacles%2520writers%2520face%2520when%2520writing%2520effective%2520action%2520scenes.%2520This%2520post%2520teaches%2520what%2520they%2520are%25E2%2580%2594and%2520shares%2520writing%2520techniques%2520on%2520how%2520to%2520overcome%2520them.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1812" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1808" instrument_node="">
</span><h2 data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">3 Obstacles That Make Action Scenes Hard to Write</span></h2><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Let’s take a look at some of the challenges you’ll face when writing action&nbsp;scenes.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><h3 data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">1. It’s all on you</span></h3><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">On the movie set, there’s a whole crew of talented folks working together—director, actors, set designer, Foley artist (creates sound effects), film editor, and more.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">On the page, all of those jobs fall to you. You are the one who must set the stage, direct their action, provide the sound effects, and so on. While this is always true, it may be most apparent when it comes to action scenes.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><h3 data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">2. It’s not about the action</span></h3><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1789" instrument_node="">Putting physical conflict on the page is challenging because it’s not really about the actions taking place—it’s about the </span><em data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">emotional core</span></em><span data-dcnode-id="1786" instrument_node=""> of what’s happening. A detailed, blow by blow description can impede the flow of internal conflict and fritter away the tension so carefully built prior to the action.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">In addition, violence is tricky because too much graphic detail will cause some readers to put the book down. Tolerance levels vary, even within sub-genres.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><h3 data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">3. Form must follow content</span></h3><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Your page is your stage. The physical appearance—the way the page looks—is important in conveying the right feel for an action scene. It comes down to pacing.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">When your characters are involved in action, it generally calls for shorter sentences and paragraphs, active voice, limited use of adverbs, and terse dialogue.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1768"><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/story-pacing/"><span data-dcnode-id="1771" instrument_node="">Pacing</span></a><span data-dcnode-id="1769" instrument_node=""> is critical to effective action in your scenes. Get the pacing wrong and it cracks the door wide open for your reader to leave the book and not come back.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><h2 data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Awareness Leads to Permission</span></h2><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">As beginning writers, there’s so much about the craft that we haven’t even thought about. Then, as we level up and gain more skills and experience, we start to see vistas open up that we never even dreamt of.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">I love what my mentor, </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.deanwesleysmith.com/" rel="noopener" target="_blank"><span data-dcnode-id="1759" instrument_node="">Dean Wesley Smith</span></a><span data-dcnode-id="1757" instrument_node="">, says about the ever-rising planes of writing prowess that await dedicated writers:</span></p><span data-dcnode-id="1755" instrument_node="">
</span><blockquote data-dcnode-id="1752"><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">“A major part of learning is just understanding that there are techniques you don’t have yet. Awareness is the key. Once you become aware they exist, you give your subconscious permission to use them.”</span></p></blockquote><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node="">The first time I really became aware of the special skill set involved in writing action was when I attended a lecture from </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/write-action-scenes/"><span data-dcnode-id="1749" instrument_node="">James Rollins</span></a><span data-dcnode-id="1747" instrument_node="">. Since then, I’ve studied a lot about writing effective action and overcoming the obstacles.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">It’s helped make me a better writer, and I’m pleased to share some of what I’ve learned in this article.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><h2 data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Set the Scene for Successful Action</span></h2><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Before you can write action that will add suspense, you have to build a solid foundation. That foundation should consist of at least two important components:</span></p><span data-dcnode-id="1736" instrument_node="">
</span><ol data-dcnode-id="1728"><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Ground the reader solidly in the setting and point of view character.</span></li><span data-dcnode-id="1732" instrument_node="">
</span><li data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Make sure the reader is emotionally invested in the character.</span></li><span data-dcnode-id="1729" instrument_node="">
</span></ol><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node="">To accomplish this first objective, you must open the scene with the specific types of details that will pull the reader into your viewpoint character’s head, as discussed in </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1725" instrument_node="">Deep POV: 6 Key Details to Use in the Beginning of a Book (and Beyond!)</span></a><span data-dcnode-id="1723" instrument_node="">.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">You accomplish the second objective—making sure the reader is emotionally invested—with skillful character development that </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sympathetic-character/"><span data-dcnode-id="1719" instrument_node="">readers will care about</span></a><span data-dcnode-id="1717" instrument_node="">.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">It’s essential that you pull the reader into the viewpoint character’s head. That character is your reader’s interface with the story, the conduit through which all sensory input, emotion, and opinion is delivered.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Only after you’ve built a firm foundation can you create an action scene that fires on all pistons.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><h2 data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Make Action Scenes Emotional</span></h2><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1705" instrument_node="">Your reader can only experience what’s happening through your point of view character, so stay focused on your character’s motivation and emotional core—</span><em data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">what are they thinking and feeling?</span></em></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Are they filled with dread about the conflict? How do their emotions change throughout the struggle? Remember to touch on the high stakes involved in the battle.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">The best fight scenes avoid a lengthy blow-by-blow description and focus more on the direction of the battle scene—who’s gaining the advantage (is it the bad guy?), and where the weaknesses lie.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1689"><div class="share-quote-quote" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node=""> The best fight scenes avoid a lengthy blow-by-blow description and focus more on the direction of the battle scene. </span></div></div><div class="share-quote-shares" data-dcnode-id="1683"><div class="share-quote-shares-block" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1684"><a class="share-quote-twitter" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/how-to-write-action-scenes/%26text%3D%2520The%2520best%2520fight%2520scenes%2520avoid%2520a%2520lengthy%2520blow-by-blow%2520description%2520and%2520focus%2520more%2520on%2520the%2520direction%2520of%2520the%2520battle%2520scene.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1686" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">You may include detailed descriptions about some of the specific movements in the action, but leave out the “shoe leather.” Readers don’t need, or want, to know every minute detail. Including it slows the pace.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1669"><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Do</span></em><span data-dcnode-id="1676" instrument_node=""> give your reader a number of things to worry about, and incorporate a </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnJFmT2LGDuw"><span data-dcnode-id="1675" instrument_node="">surprise</span></a><span data-dcnode-id="1673" instrument_node="">—something completely unexpected—as well as </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnJFmT2LGDuw"><span data-dcnode-id="1672" instrument_node="">suspense</span></a><span data-dcnode-id="1670" instrument_node="">.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1667" instrument_node="">A good example of what I’m talking about is from </span><em data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dgqocrvv26eo"><span data-dcnode-id="1666" instrument_node="">Mission Impossible: Ghost Protocol</span></a></em><span data-dcnode-id="1663" instrument_node="">. In one scene, a glitch in the team’s plan forces the main character, Ethan Hunt, to climb out a window on the 130th floor of a hotel in Dubai and make his way eleven stories up the side of the building. We saw this coming because . . . well, it would happen, wouldn’t it?</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">He wears special sticky gloves to facilitate the climb and halfway through the maneuver, one of them gives out. This definitely cranks up the suspense, but was not totally unexpected.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Ethan falls at one point. My hands clenched when he did. But still—it had to happen.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">What came as a surprise was a sudden sandstorm barreling toward the city, violent and devastating. If it reached the hotel with Ethan still clinging to its side, it would whisk him away in an instant.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1651" instrument_node="">Suspense </span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">and</span></em><span data-dcnode-id="1648" instrument_node=""> surprise.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Remember to stay in the viewpoint character, letting the reader experience his changing emotions as the action progresses. This is much more engaging than a catalog of moves.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><h2 data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Build the Conflict</span></h2><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Action that engages the reader is action that arises from conflict.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">There are many varieties of conflict to choose from in constructing your story. Exploring the different types of conflict goes beyond the scope of this article, but you can learn more by studying about:</span></p><span data-dcnode-id="1634" instrument_node="">
</span><ul data-dcnode-id="1620"><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1630"><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/protagonist-in-trouble/"><span data-dcnode-id="1632" instrument_node="">Your protagonist in trouble</span></a></li><span data-dcnode-id="1629" instrument_node="">
</span><li data-dcnode-id="1626"><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/conflict-in-a-story/"><span data-dcnode-id="1628" instrument_node="">Conflict in a story</span></a></li><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1622"><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/object-of-desire/"><span data-dcnode-id="1624" instrument_node="">Character wants and needs</span></a></li><span data-dcnode-id="1621" instrument_node="">
</span></ul><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">However, you might consider this technique to ramp up the conflict by pouring your characters into a crucible.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><h2 data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Mix Ingredients in the Crucible</span></h2><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">A crucible is a container in which substances can be heated to high temperatures, melted, and refined.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Apply this concept to story, and you have a type of conflict in which characters are forced together in a closed environment, making confrontations inevitable and inescapable.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1606" instrument_node="">One famous example is Agatha Christie’s classic novel </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">And Then There Were None</span></em><span data-dcnode-id="1603" instrument_node="">, where the characters are trapped on an island while someone picks them off one by one</span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">.</span></em><span data-dcnode-id="1600" instrument_node=""> I can think of several more:</span></p><span data-dcnode-id="1598" instrument_node="">
</span><ul data-dcnode-id="1570"><span data-dcnode-id="1597" instrument_node="">
</span><li data-dcnode-id="1593"><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Dead Calm</span></em><span data-dcnode-id="1594" instrument_node="">, where the action is confined to a sailboat</span></li><span data-dcnode-id="1592" instrument_node="">
</span><li data-dcnode-id="1588"><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Speed</span></em><span data-dcnode-id="1589" instrument_node="">, where the action is confined to a speeding bus in LA traffic</span></li><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1583"><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Rear Window</span></em><span data-dcnode-id="1584" instrument_node="">, where the action is confined to an apartment building</span></li><span data-dcnode-id="1582" instrument_node="">
</span><li data-dcnode-id="1578"><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Kiss of The Spider Woman</span></em><span data-dcnode-id="1579" instrument_node="">, where the action is confined to a prison cell</span></li><span data-dcnode-id="1577" instrument_node="">
</span><li data-dcnode-id="1572"><em data-dcnode-id="1574"><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joslynchase.com/books/nocturne-in-ashes/"><span data-dcnode-id="1576" instrument_node="">Nocturne in Ashes</span></a></em><span data-dcnode-id="1573" instrument_node="">, where the action is confined by a volcano</span></li><span data-dcnode-id="1571" instrument_node="">
</span></ul><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Now that you know these foundational components, how can you create action that works?</span></p><span data-dcnode-id="1566" instrument_node="">
</span><h2 data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">2 Essential Ingredients for a Suspenseful Foundation</span></h2><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">If you’ve laid the foundation for suspense, you’re ready to create the kind of action that adds suspense.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">The classic types of action in a thriller, mystery, or suspense novel revolve around chase scenes, brawls, races to the finish line, sword fights, fist fights, shootouts, other types of combat, and violence. These devices work because they heighten the tension in the scene—provided the groundwork for suspense has been laid.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">But suspense-spawning action isn’t limited to these devices. The action can be something far more simple—if the scene includes two essential ingredients.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><h3 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">1. The action drives&nbsp;the story</span></h3><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Walking is action. Opening a letter is action. Climbing stairs is action.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">In many cases, such actions are “stage business,” the little things that go on all the time in real life, giving your characters something to do so they’re not static during dialogue or scene setting. But there’s no real suspense involved unless these actions </span><em data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">matter</span></em><span data-dcnode-id="1544" instrument_node=""> to the story.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Is the hero walking to the neighbor’s house to confront him about an issue germane to the story? Does the staircase lead to a suspect’s apartment?</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Action that adds suspense is more than busy work. It should be wrapped around a crucial event in the story.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><h3 data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">2. The outcome is uncertain</span></h3><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">To drive suspense, there must be more than one possible outcome to the action and uncertainty about which way it will go. Both reader and viewpoint character should be able to anticipate an array of outcomes and be wondering which will occur—or if something unforeseen will happen.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Will the neighbor welcome a discussion or react violently? Will they disclose key information under questioning?</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Large or small, dramatic or ordinary, action that drives suspense will contain these two ingredients.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><h2 data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Interact with the Setting</span></h2><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1520" instrument_node="">Action that engages and adds suspense works with the setting almost as if interacting with another character. (P.S. The setting should be established with </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1519" instrument_node="">POV details</span></a><span data-dcnode-id="1517" instrument_node=""> so that it comes alive and has something to offer during the action.)</span></p><span data-dcnode-id="1515" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1509"><div class="share-quote-quote" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node=""> Don’t forget to use your setting when writing action scenes. This will add established suspense to your story. </span></div></div><div class="share-quote-shares" data-dcnode-id="1503"><div class="share-quote-shares-block" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1504"><a class="share-quote-twitter" data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/how-to-write-action-scenes/%26text%3D%2520Don%25E2%2580%2599t%2520forget%2520to%2520use%2520your%2520setting%2520when%2520writing%2520action%2520scenes.%2520This%2520will%2520add%2520established%2520suspense%2520to%2520your%2520story.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1506" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node="">Watch any Jackie Chan movie to see what I mean. </span><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DbYo9phPxvvA"><span data-dcnode-id="1500" instrument_node="">Chan is brilliant</span></a><span data-dcnode-id="1498" instrument_node=""> at interacting with the setting during his action scenes. He moves over, under, around, through, and in between objects in the environment, using them to further his purposes. Anything, in his crazy capable hands, can become a weapon or a shield.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node="">Remember the </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DsIY7BQkbIT8"><span data-dcnode-id="1494" instrument_node="">crop duster scene</span></a><span data-dcnode-id="1492" instrument_node=""> from </span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">North by Northwest</span></em><span data-dcnode-id="1489" instrument_node="">? Who imagined such peril coming out of nowhere on the flat plane of farmland? Ditches, cornfields, and a lonely stretch of road comprise the setting for one of film’s most suspenseful moments.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1486" instrument_node="">Or how about the </span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrUczpTPATyU"><span data-dcnode-id="1485" instrument_node="">sword&nbsp;fight scene</span></a><span data-dcnode-id="1483" instrument_node=""> between the Dread Pirate Roberts and Inigo Montoya in </span><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">The Princess Bride?</span></em><span data-dcnode-id="1480" instrument_node=""> Another genius example of using setting to advance the action.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Your scene doesn’t have to rely on such elaborate choreography to be a good fight scene, but think about your setting and what options it might offer for your action. Consider the setting in terms of weapons, props, obstacles, solutions.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Use the setting to further the conflict and/or provide the means for resolution.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Setting and worldbuilding can give you an advantage in adding suspense to your story through action.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Alternative Options for Portraying Violence</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Writing violence can be a risky thing.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">Always keep the level of gore and graphic detail in line with your reader’s expectations when writing fight scenes or other action. Remember, it’s less about what’s happening and more about your character’s reaction—how they </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">feel</span></em><span data-dcnode-id="1459" instrument_node=""> about it. Focus on the emotional core of the scene.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">When you need to portray some heavy violence but don’t want to focus on play by play graphic detail, here are a few techniques you can incorporate into your writing style to minimize the risks.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><h3 data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">1.&nbsp;Create an imagination gap</span></h3><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">In this method, you set the scene of impending violence with vivid details, making it real to the reader, then, just before the axe falls, cut the scene. Pick it up after a shift in time or character.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">You might go to a different point of view character who sees only the aftermath. Or keep it in the same POV but make it clear the violence is over and we’re now dealing with the ugly results.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Here’s an example:</span></strong></p><span data-dcnode-id="1441" instrument_node="">
</span><blockquote data-dcnode-id="1423"><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Donna shivered. Frost crept around the edges of the windshield, feathering and growing there, outside the sweep of the wipers’ reach. Looking at it made her feel tired, as if those icy tendrils were wrapping around her brain, numbing her into a long winter’s nap.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">She bit her lip and focused instead on the gray ribbon of road, framed by an overhang of frozen oak and pine boughs, shaggy with snow. The air inside the old Plymouth smelled hot, drawing its breath from the toiling engine under the hood. Donna kept the radio low, needing the noise but not able to tolerate the full booming volume of sleigh bells and cheer. There would be more than enough of that to deal with when she arrived at Gran’s house, with the whole family gathered to hear her news.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">She wished she had something better to tell them. In the next instant, a figure appeared in the middle of the roadway and Donna gripped the wheel, swerving to miss it. The car leapt and spun in a sickening arc, the seat belt clawing at her chest as her head met the frosty windshield with a resounding crack. With a shriek of tortured metal, the old Plymouth dipped, bounced, and took flight like an unwieldy bird.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Donna’s world went black.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">[Break]</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Tire tracks in the snow told the story as the first policeman arrived on the scene. Patrolman Bob Custer studied the twin treadmarks, seeing how they passed the broken guardrail and disappeared into a frozen pond that hadn’t been frozen enough to support the weight of a force-thrown Plymouth. A single fin of the car’s rear fender broke the surface of the ice-scummed water, a cold metal grave marker for some pour soul.</span></p></blockquote><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">In this way, you leave a gap for the reader’s imagination to fill with as much or as little graphic detail as they choose, while maintaining the flow of the narrative.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><h3 data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">2.&nbsp;Use a fuzzy background</span></h3><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">To understand what I mean, picture a violent movie scene where the victim focuses on something outside the attack—a vase of flowers, a stain on the wall, children playing across the street. The rest of the scene is out of focus, giving us just the impression of blows and pain. The victim has emotionally withdrawn, muted the stark reality, unable to face it head on, giving us an oblique view, as well.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1410"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">For example:</span></strong></p><span data-dcnode-id="1409" instrument_node="">
</span><blockquote data-dcnode-id="1394"><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">In the dim light, I caught movement from the corner of my eye. I pulled back, but he was on me, shoving me to the rough concrete, his knee grinding against my spine.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">A single dandelion, pushing up through a crack in the sidewalk, shone gilded in the glow of a distant street lamp, eye level as I sprawled beside it. I couldn’t move, couldn’t even raise my head. Gaze fixed on the dandelion, everything else fading to black, I counted the furred leaves peeling away from the crooked stem. Four leaves.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Four leaves.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Four.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Leaves.</span></p></blockquote><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Rendered powerless, the POV character focuses on the four leaves of the dandelion while violence is perpetrated upon them. We feel their inability to deal with it now and know they’ll have to face the pain and repercussions of it later.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><h3 data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">3.&nbsp;Hide behind the mundane</span></h3><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Violence often comes out of the blue, so shocking that the POV character can’t at first accept what’s happening. Under such circumstances, the mind scrambles to shield, protect, and preserve life as usual. A character under attack may worry if he remembered to pick up the dry cleaning, pay that parking ticket, or&nbsp;pack his lunch.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">This is a variation on the method above, except in the fuzzy background, the focus stays fixedly on a single image outside the realm of violence. Here, there’s a stream of consciousness catalog of the myriad details of an ordinary life—one which the victim clings to even as the violence obliterates it.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Try this as an example:</span></strong></p><span data-dcnode-id="1377" instrument_node="">
</span><blockquote data-dcnode-id="1368"><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Here on the downs, the chill wind swept in with a rush, billowing the yellow grasses, raising tears in her eyes. Rebecca dabbed her nose with a wadded tissue from her pocket and kept up her brisk pace, determined to cover the distance and get back to her desk before her lunch break ended.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">A noise like a buzzing wasp sounded in her ear and she fell, skinning her knee on a moss-covered rock. Shaken, she pulled herself to her feet, swallowing against the rise of bile in her throat. What a shame—she’d torn the hem of her skirt and picked up a dark stain. Would that come out with a regular detergent or require special treatment?</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">She had a box of borax on top of the washer but hadn’t had a chance to use it yet. Was it really good at whitening a load of linens? Doris claimed it was. It hadn’t cost much, just $1.25 from Rite Aid. She vowed to give it a try next time she washed sheets.</span></p></blockquote><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">We, the readers, suspect there’s more to the “wasp” and tumble than appears on the surface. But we understand that Rebecca is in denial, focusing on mundane details as her subconscious shields her from a reality she can’t quite grasp.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">As a bonus, this raises more questions and suspense for the reader. What </span><em data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">did</span></em><span data-dcnode-id="1360" instrument_node=""> happen?</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Has she been shot? Stabbed? Stung? We must read on to find out.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><h2 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Never Pull a Reader Out of the Story</span></h2><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Your goal is to pull the reader deep beneath the story’s surface so they won’t want to put your book down.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1348" instrument_node="">When it comes to action, watch out for areas that will take the reader out of the story. </span><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Ensure this by:</span></strong></p><span data-dcnode-id="1344" instrument_node="">
</span><h3 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Research</span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">If the action must depend on a certain type of weapon or martial arts move, make sure you impart the correct information. If your reader knows enough to recognize an error, it will send them to the surface with a case of the bends.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Either avoid using such details or make sure you get them right.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><h3 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Keep action inside the character</span></h3><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">If your character suddenly does a triple flip and vaults through a window mid-conflict, make sure you’ve set it up in advance that he’s got mad skills like that. Otherwise, your reader will throw the flag and pop right out of your story.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><h3 data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Avoid distracting language</span></h3><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">You want your reader to forget they’re reading and simply be immersed in the story. Everything you do should go toward that goal, and not toward highlighting your awesome vocabulary or pretty turn of phrase.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Remove excessive exposition</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">The thrall of action is not the place to set up payoffs or expound backstory. Make sure things are in place before the action starts.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">You’ve worked hard to capture your reader and pull them deep into your story. Don’t let a careless slipup reverse your careful preparations.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><h2 data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Build Your Writing Toolbox for Good&nbsp;Stories</span></h2><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">Writing action scenes is critical to establishing strong </span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/elements-of-suspense/"><span data-dcnode-id="1309" instrument_node="">elements of suspense</span></a><span data-dcnode-id="1307" instrument_node="">. Knowing the obstacles you face when writing action scenes—and techniques to overcome them—will help you write a suspenseful story that is more than one great fight scene. It will help you write a story that builds suspense with action.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">If you liked this post and want to learn more about including suspense in story structure, check out these additional topics:</span></p><span data-dcnode-id="1302" instrument_node="">
</span><ul data-dcnode-id="1276"><span data-dcnode-id="1301" instrument_node="">
</span><li data-dcnode-id="1298"><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1300" instrument_node="">Pull the reader deep into the POV</span></a></li><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1294"><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sympathetic-character/"><span data-dcnode-id="1296" instrument_node="">Make readers care about your hero</span></a></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1290"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/raise-the-stakes/"><span data-dcnode-id="1292" instrument_node="">Raise the stakes</span></a></li><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1286"><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sequence-of-events-in-a-story/"><span data-dcnode-id="1288" instrument_node="">Provide timely information</span></a></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1282"><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/cliffhanger-meaning/"><span data-dcnode-id="1284" instrument_node="">Create cliffhangers</span></a></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1278"><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/story-pacing/"><span data-dcnode-id="1280" instrument_node="">Pace your story</span></a></li><span data-dcnode-id="1277" instrument_node="">
</span></ul><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">In my next article, I’ll focus on learning how to use foreshadowing and plant clues to boost your stories to a new level of suspense.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">See you soon!</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1261"><strong data-dcnode-id="1266"><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">What elements of action scenes keep you hooked (or make you skip ahead to something more interesting)? </span></em></strong><span data-dcnode-id="1265" instrument_node="">Tell us about it in the </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearscope.io/the-write-practice/reports/013fc2115f1cdac2/optimize%23comments"><span data-dcnode-id="1264" instrument_node="">comments</span></a><span data-dcnode-id="1262" instrument_node="">.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><div data-dcnode-id="1231" id="practice"><span data-dcnode-id="1259" instrument_node="">
</span><h2 data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">PRACTICE</span></h2><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Use one or more of the techniques in this post to write an action scene for your novel or short story. Choose from one of these prompts:</span></p><span data-dcnode-id="1253" instrument_node="">
</span><ul data-dcnode-id="1242"><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Jamie’s work crew gets in an argument on a construction site</span></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Garrett gets involved in a car chase on a mountainous road</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Jenny runs to escape her captor on a moonlit hillside</span></li><span data-dcnode-id="1243" instrument_node="">
</span></ul><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1240" instrument_node="">Write for</span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.ggtimer.com/15minutes"><span data-dcnode-id="1239" instrument_node=""> fifteen minutes</span></a><span data-dcnode-id="1237" instrument_node="">. When you finish, post your work in the </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearscope.io/the-write-practice/reports/013fc2115f1cdac2/optimize%23comments"><span data-dcnode-id="1236" instrument_node="">comments</span></a><span data-dcnode-id="1234" instrument_node=""> and be sure to read and give feedback for your fellow writers!</span></p><span data-dcnode-id="1232" instrument_node="">
