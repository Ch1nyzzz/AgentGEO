</span><div class="image_details" data-dcnode-id="1727" style="display:none;"><span data-dcnode-id="1728" style="display:none;"><span data-dcnode-id="1729" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/d\/dd\/Feel-Good-About-Yourself-Step-7-Version-2.jpg\/v4-460px-Feel-Good-About-Yourself-Step-7-Version-2.jpg","bigUrl":"\/images\/thumb\/d\/dd\/Feel-Good-About-Yourself-Step-7-Version-2.jpg\/aid6271726-v4-728px-Feel-Good-About-Yourself-Step-7-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a><a class="pin_button" data-dcnode-id="1725" href="#" rel="noreferrer noopener nofollow" target="_blank"></a></div><span data-dcnode-id="1723" instrument_node="">
</span><div class="step_num" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">1</span></div><div class="step" data-dcnode-id="1712"><span data-dcnode-id="1720" instrument_node="">
</span><b class="whb" data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Build up your reader's sense of what the characters are thinking.</span></b><span data-dcnode-id="1717" instrument_node=""> If you're writing in third person omniscient, it should be fairly easy to depict the thoughts and intentions of each character towards the reader. Simply creating the events that cause tension among characters or tension itself and providing characters' thoughts on the situations is enough to leave the reader aware of the suspense. &nbsp; &nbsp;
</span><ul data-dcnode-id="1714"><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">If you are writing in first person point of view, you may have to rely on more action-based reactions. For example, say the main character tries to kill another character. How does everyone comprehend the situation? You won't be able to display the thoughts of each character directly, which means you have a few options. You can have them react through dialogue or actions. Dialogue could range from talking to themselves, a friend, the main character himself, etc., while actions could be trying to call the police or attacking the main character. A third option is waiting to reveal one's thoughts until a later time, which may be more rewarding for the reader and create even more tension and suspense.</span></li></ul><span data-dcnode-id="1713" instrument_node="">
</span></div><span data-dcnode-id="1711" instrument_node="">
</span><div class="clearall" data-dcnode-id="1710"></div><span data-dcnode-id="1709" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="1708" data-isstep="1"></div><span data-dcnode-id="1707" instrument_node="">
</span></li><span data-dcnode-id="1705" instrument_node="">
</span><li data-dcnode-id="1670" id="step-id-16"><span data-dcnode-id="1704" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="1703" name="step_2_2"></a><div class="mwimg largeimage floatcenter pin_hover" data-dcnode-id="1684" style="max-width:728px"><a class="image" data-dcnode-id="1686" href="#/Image:Elevate-Your-Self-Esteem-Step-10.jpg"><div class="content-spacer" data-dcnode-id="1694" style="padding-top:75%"><div class="loading-container" data-dcnode-id="1698"><div class="loader" data-dcnode-id="1699"><div class="loader-dot" data-dcnode-id="1702"></div><div class="loader-dot" data-dcnode-id="1701"></div><div class="loader-dot" data-dcnode-id="1700"></div></div></div><span data-dcnode-id="1697" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="1696" data-height="345" data-src="https://www.wikihow.com/images/thumb/f/f3/Elevate-Your-Self-Esteem-Step-10.jpg/v4-460px-Elevate-Your-Self-Esteem-Step-10.jpg" data-srclarge="/images/thumb/f/f3/Elevate-Your-Self-Esteem-Step-10.jpg/aid6271726-v4-728px-Elevate-Your-Self-Esteem-Step-10.jpg" data-width="460" decoding="async" id="21fa73c7668b67526f6a9156e01a3846" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/f/f3/Elevate-Your-Self-Esteem-Step-10.jpg/aid6271726-v4-728px-Elevate-Your-Self-Esteem-Step-10.jpg.webp&amp;raw"><span data-dcnode-id="1695" instrument_node="">
</span></div><span data-dcnode-id="1693" instrument_node="">
</span><noscript data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">&lt;img alt="Image titled Elevate Your Self Esteem Step 10" src="https://www.wikihow.com/images/thumb/f/f3/Elevate-Your-Self-Esteem-Step-10.jpg/v4-460px-Elevate-Your-Self-Esteem-Step-10.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/f/f3/Elevate-Your-Self-Esteem-Step-10.jpg/aid6271726-v4-728px-Elevate-Your-Self-Esteem-Step-10.jpg" data-width="460" data-height="345" id="21fa73c7668b67526f6a9156e01a3846"&gt;</span></noscript><span data-dcnode-id="1690" instrument_node="">
</span><div class="image_details" data-dcnode-id="1687" style="display:none;"><span data-dcnode-id="1688" style="display:none;"><span data-dcnode-id="1689" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/f\/f3\/Elevate-Your-Self-Esteem-Step-10.jpg\/v4-460px-Elevate-Your-Self-Esteem-Step-10.jpg","bigUrl":"\/images\/thumb\/f\/f3\/Elevate-Your-Self-Esteem-Step-10.jpg\/aid6271726-v4-728px-Elevate-Your-Self-Esteem-Step-10.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a><a class="pin_button" data-dcnode-id="1685" href="#" rel="noreferrer noopener nofollow" target="_blank"></a></div><span data-dcnode-id="1683" instrument_node="">
</span><div class="step_num" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">2</span></div><div class="step" data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">
</span><b class="whb" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Draw emotion from characters and have them react differently.</span></b><span data-dcnode-id="1677" instrument_node=""> An easy way of creating tension is to have varying emotional reactions. This will cause conflict that makes it more enticing and thrilling. Don't have everyone feel the same way as this can dampen a lot of nail-biting moments from the reader and end up causing less drama. To create emotion itself, describe it. Use many adjectives/adverbs that detail what people are feeling or how they act, such as "gloomily, hopelessly, mournful, enraged, offended."
</span></div><span data-dcnode-id="1675" instrument_node="">

</span><a class="stepanchor" data-dcnode-id="1667" name="step_2_3"></a><div class="mwimg largeimage floatcenter pin_hover" data-dcnode-id="1648" style="max-width:728px"><a class="image" data-dcnode-id="1650" href="#/Image:Feel-Good-About-Yourself-Step-12-Version-2.jpg"><div class="content-spacer" data-dcnode-id="1658" style="padding-top:75%"><div class="loading-container" data-dcnode-id="1662"><div class="loader" data-dcnode-id="1663"><div class="loader-dot" data-dcnode-id="1666"></div><div class="loader-dot" data-dcnode-id="1665"></div><div class="loader-dot" data-dcnode-id="1664"></div></div></div><span data-dcnode-id="1661" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="1660" data-height="345" data-src="https://www.wikihow.com/images/thumb/b/b2/Feel-Good-About-Yourself-Step-12-Version-2.jpg/v4-460px-Feel-Good-About-Yourself-Step-12-Version-2.jpg" data-srclarge="/images/thumb/b/b2/Feel-Good-About-Yourself-Step-12-Version-2.jpg/aid6271726-v4-728px-Feel-Good-About-Yourself-Step-12-Version-2.jpg" data-width="460" decoding="async" id="5b9328e5f0bc8f834d2b311d9c5e7a90" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/b/b2/Feel-Good-About-Yourself-Step-12-Version-2.jpg/aid6271726-v4-728px-Feel-Good-About-Yourself-Step-12-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="1659" instrument_node="">
</span></div><span data-dcnode-id="1657" instrument_node="">
</span><noscript data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">&lt;img alt="Image titled Feel Good About Yourself Step 12" src="https://www.wikihow.com/images/thumb/b/b2/Feel-Good-About-Yourself-Step-12-Version-2.jpg/v4-460px-Feel-Good-About-Yourself-Step-12-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/b/b2/Feel-Good-About-Yourself-Step-12-Version-2.jpg/aid6271726-v4-728px-Feel-Good-About-Yourself-Step-12-Version-2.jpg" data-width="460" data-height="345" id="5b9328e5f0bc8f834d2b311d9c5e7a90"&gt;</span></noscript><span data-dcnode-id="1654" instrument_node="">
</span><div class="image_details" data-dcnode-id="1651" style="display:none;"><span data-dcnode-id="1652" style="display:none;"><span data-dcnode-id="1653" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/b\/b2\/Feel-Good-About-Yourself-Step-12-Version-2.jpg\/v4-460px-Feel-Good-About-Yourself-Step-12-Version-2.jpg","bigUrl":"\/images\/thumb\/b\/b2\/Feel-Good-About-Yourself-Step-12-Version-2.jpg\/aid6271726-v4-728px-Feel-Good-About-Yourself-Step-12-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a><a class="pin_button" data-dcnode-id="1649" href="#" rel="noreferrer noopener nofollow" target="_blank"></a></div><span data-dcnode-id="1647" instrument_node="">
</span><div class="step_num" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">3</span></div><div class="step" data-dcnode-id="1636"><span data-dcnode-id="1644" instrument_node="">
</span><b class="whb" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Don't be afraid to create interactions.</span></b><span data-dcnode-id="1641" instrument_node=""> Having many connections in the storyline and interactions among the characters makes the story exciting, as the reader will continue to read so that they can find out how each character will react. Interactions that generally end with unexpected results tend to add more tension as well.
</span><ul data-dcnode-id="1638"><li data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">When writing suspense, you must know how to word sentences correctly in dialogue to create the result you were looking for. In easier terms, make conversation with your end goal of that scene in mind, manipulating things until what you wanted to occur occurred, and makes sense that it did.</span></li></ul><span data-dcnode-id="1637" instrument_node="">
</span></div><span data-dcnode-id="1635" instrument_node="">

</span></li><span data-dcnode-id="1629" instrument_node="">
</span><li data-dcnode-id="1590" id="step-id-18"><span data-dcnode-id="1628" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="1627" name="step_2_4"></a><div class="mwimg largeimage floatcenter pin_hover" data-dcnode-id="1608" style="max-width:728px"><a class="image" data-dcnode-id="1610" href="#/Image:Control-Your-Dreams-Step-2-Version-2.jpg"><div class="content-spacer" data-dcnode-id="1618" style="padding-top:75%"><div class="loading-container" data-dcnode-id="1622"><div class="loader" data-dcnode-id="1623"><div class="loader-dot" data-dcnode-id="1626"></div><div class="loader-dot" data-dcnode-id="1625"></div><div class="loader-dot" data-dcnode-id="1624"></div></div></div><span data-dcnode-id="1621" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="1620" data-height="345" data-src="https://www.wikihow.com/images/thumb/2/24/Control-Your-Dreams-Step-2-Version-2.jpg/v4-460px-Control-Your-Dreams-Step-2-Version-2.jpg" data-srclarge="/images/thumb/2/24/Control-Your-Dreams-Step-2-Version-2.jpg/aid6271726-v4-728px-Control-Your-Dreams-Step-2-Version-2.jpg" data-width="460" decoding="async" id="7e4afedd12663eb01c2933dbf26f1009" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/2/24/Control-Your-Dreams-Step-2-Version-2.jpg/aid6271726-v4-728px-Control-Your-Dreams-Step-2-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">
</span><noscript data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">&lt;img alt="Image titled Control Your Dreams Step 2" src="https://www.wikihow.com/images/thumb/2/24/Control-Your-Dreams-Step-2-Version-2.jpg/v4-460px-Control-Your-Dreams-Step-2-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/2/24/Control-Your-Dreams-Step-2-Version-2.jpg/aid6271726-v4-728px-Control-Your-Dreams-Step-2-Version-2.jpg" data-width="460" data-height="345" id="7e4afedd12663eb01c2933dbf26f1009"&gt;</span></noscript><span data-dcnode-id="1614" instrument_node="">
</span><div class="image_details" data-dcnode-id="1611" style="display:none;"><span data-dcnode-id="1612" style="display:none;"><span data-dcnode-id="1613" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/2\/24\/Control-Your-Dreams-Step-2-Version-2.jpg\/v4-460px-Control-Your-Dreams-Step-2-Version-2.jpg","bigUrl":"\/images\/thumb\/2\/24\/Control-Your-Dreams-Step-2-Version-2.jpg\/aid6271726-v4-728px-Control-Your-Dreams-Step-2-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a><a class="pin_button" data-dcnode-id="1609" href="#" rel="noreferrer noopener nofollow" target="_blank"></a></div><span data-dcnode-id="1607" instrument_node="">
</span><div class="step_num" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">4</span></div><div class="step" data-dcnode-id="1596"><span data-dcnode-id="1604" instrument_node="">
</span><b class="whb" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Have changes/twists that leave your reader in awe, but don't go as far as to satisfy them.</span></b><span data-dcnode-id="1601" instrument_node=""> The whole idea behind suspense is to leave people lost for satisfaction, only to find it at the end or the climax. For every moment that something worthy or even just plainly positive happens, there should be an equal negative consequence that the readers are aware of. This can give readers more reason to keep reading whilst forging tension. 
</span><ul data-dcnode-id="1598"><li data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Some examples of awe-filled moments can be the death of a character (one of the most common ways to create tension/unsatisfaction&nbsp;in suspense stories), the return of a character, a sudden change in judgement in a character, a change in pace of the conflict, or events that make happy endings more and more unlikely.</span></li></ul><span data-dcnode-id="1597" instrument_node="">
</span></div><span data-dcnode-id="1595" instrument_node="">
</span><div class="clearall" data-dcnode-id="1594"></div><span data-dcnode-id="1593" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="1592" data-isstep="1"></div><span data-dcnode-id="1591" instrument_node="">
</span></li><span data-dcnode-id="1589" instrument_node="">
</span><li data-dcnode-id="1554" id="step-id-19"><span data-dcnode-id="1588" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="1587" name="step_2_5"></a><div class="mwimg largeimage floatcenter pin_hover" data-dcnode-id="1568" style="max-width:728px"><a class="image" data-dcnode-id="1570" href="#/Image:Write-a-Grant-Proposal-Step-3-Version-3.jpg"><div class="content-spacer" data-dcnode-id="1578" style="padding-top:75%"><div class="loading-container" data-dcnode-id="1582"><div class="loader" data-dcnode-id="1583"><div class="loader-dot" data-dcnode-id="1586"></div><div class="loader-dot" data-dcnode-id="1585"></div><div class="loader-dot" data-dcnode-id="1584"></div></div></div><span data-dcnode-id="1581" instrument_node="">

</span><b class="whb" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Review your user of adjectives and adverbs.</span></b><span data-dcnode-id="1489" instrument_node=""> As you review your work, make sure everything you've written flows towards creating suspense. Don't make someone sad, and then have them go to somewhere lively and fun. It is very important to make sense. If someone is sad but must go somewhere lively or fun, make him sad, but composed, or simply able to do things despite the sadness. If one person feels one way about a certain thing, he/she should feel the same about other similar situations. Everything about each character should be understandable and in turn, relatable to your reader.

</span><div class="qa_q_txt" data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">To make it suspenseful, do I have to make someone die?</span></div><span data-dcnode-id="1361" instrument_node="">
</span><div class="qa_answers" data-dcnode-id="1302"><span data-dcnode-id="1360" instrument_node="">

</span></div><span data-dcnode-id="1337" instrument_node="">
</span><div class="qa_answer answer" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">
								No, not at all. Anything the audience has become invested in can be suspenseful. For example, there could be suspense regarding whether or not a character will end up with the person she loves, or if a spy will complete a mission in time. The point of suspense is to keep the audience on the edge of their seat, needing to know what happens next. Death isn't the only thing that does that.
