8-.913.915-.214 3.34 1.747 5.303 1.96 1.962 4.384 2.662 5.305 1.74.231-.223.42-.412.566-.565.105-.111.123-.34.003-.466-.202-.209-.694-.593-1.544-1.204-.063.05-.139.123-.256.24z" data-dcnode-id="2700" fill="#1B91FF" fill-rule="evenodd"></path></svg><span data-dcnode-id="2698" instrument_node=""> </span></button><span data-dcnode-id="2696" instrument_node=""> </span><button class="sw-share-link" data-dcnode-id="2691" id="topLink" onclick="if (!window.__cfRLUnblockHandlers) return false; sw.shareArticle(event, 'link')"><span data-dcnode-id="2695" instrument_node=""> </span><svg data-dcnode-id="2693" fill="none" height="9" width="18"><path clip-rule="evenodd" d="M7.364 6.51v1.628H4.09C1.83 8.138 0 6.316 0 4.07S1.832 0 4.09 0h3.274v1.628H4.09a2.448 2.448 0 0 0-2.455 2.441 2.448 2.448 0 0 0 2.455 2.442h3.273zm3.272-4.882V0h3.273C16.17 0 18 1.822 18 4.07c0 2.246-1.831 4.068-4.09 4.068h-3.274V6.511h3.273a2.448 2.448 0 0 0 2.455-2.442 2.448 2.448 0 0 0-2.455-2.441h-3.273zM4.91 3.255v1.628h8.182V3.255H4.909z" data-dcnode-id="2694" fill="#1B91FF" fill-rule="evenodd"></path></svg><span data-dcnode-id="2692" instrument_node=""> </span></button><span data-dcnode-id="2690" instrument_node=""> </span></div><span data-dcnode-id="2688" instrument_node=""> </span></header><span data-dcnode-id="2686" instrument_node=""> </span></section><span data-dcnode-id="2684" instrument_node=""> </span><section class="section container-lg ad-center" data-dcnode-id="2680" id="aTop_Banner"><span data-dcnode-id="2683" instrument_node=""> </span><div class="top-banner" data-dcnode-id="2682" id="aTopBanner"></div><span data-dcnode-id="2681" instrument_node=""> </span></section><span data-dcnode-id="2679" instrument_node=""> </span><section class="section container-lg" data-dcnode-id="987"><span data-dcnode-id="2678" instrument_node=""> </span><div class="section-left" data-dcnode-id="2144" id="sectionLeft"><span data-dcnode-id="2677" instrument_node=""> </span><article class="article-content" data-dcnode-id="2427" id="articleContentBody"><span data-dcnode-id="2676" instrument_node=""> </span><div class="article-body" data-dcnode-id="2429"><span data-dcnode-id="2675" instrument_node=""> </span><p class="sw-para" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Being a writer takes a lot of writing talent of course. But more than that, it requires the ability to make your readers a part of the story you created. The words have to be woven in a way that they'd tug at the heart of the audience. Through your pen, you paint the reality of the world and offer it on a platter to the same world to see its beauty and flaws.</span></p><p class="sw-para" data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">With literary appreciation and various awards, women writers in India have been narrating their stories for a while now. They've managed to make us feel love, loss and nostalgia while also bringing out the beautiful social fabric of multiple Indian communities, as well as their cultural problems.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">If you love books, you should definitely pick up a book by these ladies to discover a whole new world of storytelling:</span></p><p class="sw-para" data-dcnode-id="2666"><b data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">1. Jhumpa Lahiri</span></b></p><p class="sw-para" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">As the daughter of Indian immigrants residing in the US, Jhumpa Lahiri's work revolves around the dilemmas of the Indian community staying overseas. From the generational differences to the complicated identity issues, she covers it all.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2654"><span data-dcnode-id="2663" instrument_node="">Mostly known as the author of </span><i data-dcnode-id="2660"><b data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">The Namesake</span></b></i><span data-dcnode-id="2659" instrument_node="">, there is much more to Jhumpa Lahiri apart from that one book. In fact, you should definitely pick up&nbsp;</span><i data-dcnode-id="2656"><b data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Interpreter of Maladies</span></b></i><span data-dcnode-id="2655" instrument_node="">. It was her very first book and well, it fetched her the Pulitzer Prize for Fiction! Now, that speaks a lot about how prolific a writer she is.</span></p><figure class="sw-media" data-dcnode-id="2652"><img alt="" class="load" data-dcnode-id="2653" data-src="https://s3.scoopwhoop.com/anj/sgdfse/646bc111-0e0e-45ec-a230-1f0cf6efba39.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/646bc111-0e0e-45ec-a230-1f0cf6efba39.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2649"><b data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">2.&nbsp;Chitra Banerjee Divakaruni</span></b></p><p class="sw-para" data-dcnode-id="2635"><span data-dcnode-id="2648" instrument_node="">Being a story-teller is one thing but being able to retell an already told story takes a lot of skill. Chitra has excelled at both of them. While a lot of people recommend </span><b data-dcnode-id="2645"><i data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">The Palace of Illusions</span></i></b><span data-dcnode-id="2644" instrument_node=""> by her, an interesting retelling of </span><i data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Mahabharata</span></i><span data-dcnode-id="2641" instrument_node=""> from Draupadi's point of view, we say you also give&nbsp;</span><i data-dcnode-id="2639" style="font-weight: bold;"><span data-dcnode-id="2640" instrument_node="">The Mistress of Spices </span></i><span data-dcnode-id="2638" instrument_node="">a read</span><i data-dcnode-id="2636" style="font-weight: bold;"><span data-dcnode-id="2637" instrument_node="">.&nbsp;</span></i></p><p class="sw-para" data-dcnode-id="2626"><span data-dcnode-id="2634" instrument_node="">The novel is about</span><i data-dcnode-id="2632" style="font-weight: bold;"><span data-dcnode-id="2633" instrument_node="">&nbsp;</span></i><span data-dcnode-id="2631" instrument_node="">an Indian woman who finds herself in America and starts dealing in spices. In fact, Chitra has also written some academic books like&nbsp;</span><i data-dcnode-id="2628"><b data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Multitude:Cross Cultural Readings for Writers</span></b></i><span data-dcnode-id="2627" instrument_node=""> and is a renowned academic personality.</span></p><figure class="sw-media" data-dcnode-id="2624"><img alt="" class="load" data-dcnode-id="2625" data-src="https://s3.scoopwhoop.com/anj/sgdfse/b2d17fe8-dfcd-47a9-8199-b8ffd3e872dd.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/b2d17fe8-dfcd-47a9-8199-b8ffd3e872dd.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2621"><b data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">3.&nbsp;Arundhati Roy</span></b></p><p class="sw-para" data-dcnode-id="2614"><span data-dcnode-id="2620" instrument_node="">The author deals with human emotions in the most real fashion and intertwines those very emotions with social issues. Her debut novel,</span><i data-dcnode-id="2616"><b data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">The God of Small Things</span></b><span data-dcnode-id="2617" instrument_node="">,&nbsp;</span></i><span data-dcnode-id="2615" instrument_node="">was such a success because of exactly that.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2608"><span data-dcnode-id="2613" instrument_node="">The story revolved around a family in Kerala and dealt with issues of caste differences, communism and incest. She came up with her book,&nbsp;</span><i data-dcnode-id="2610"><b data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">The Ministry of Utmost Happiness,&nbsp;</span></b></i><span data-dcnode-id="2609" instrument_node="">only much later and it has already been getting great reviews. It deals with the controversial subject of the Godhra train burning and makes for an excellent read.</span></p><figure class="sw-media" data-dcnode-id="2606"><img alt="" class="load" data-dcnode-id="2607" data-src="https://s3.scoopwhoop.com/anj/sgdfse/d6a23622-565a-4080-9d4e-d433f1c3e70e.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/d6a23622-565a-4080-9d4e-d433f1c3e70e.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2603"><b data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">4. Kiran Desai</span></b></p><p class="sw-para" data-dcnode-id="2597"><span data-dcnode-id="2602" instrument_node="">The daughter of author Anita Desai, Kiran has a way of narrating stories that will tug at your heart for a long time. Her second book,&nbsp;</span><i data-dcnode-id="2599"><b data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">The Inheritence of Loss,&nbsp;</span></b></i><span data-dcnode-id="2598" instrument_node="">won her a Man Booker Prize and for good reason.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2591"><span data-dcnode-id="2596" instrument_node="">The story is about&nbsp;Biju and Sai. While Biju is an illegal immigrant in America, Sai is a girl who stays with her grandfather in India. It talks about the effects of colonialism and the tiff between the past and the present. However, we recommend you read her first book,&nbsp;</span><i data-dcnode-id="2593"><b data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Hullabaloo in the Guava Orchard.</span></b></i><span data-dcnode-id="2592" instrument_node=""> The main character is a man living in Punjab who is trying to run away from the responsibilities of adulthood. A book that was appreciated by Salman Rushdie himself, it makes for a great read for millennials.</span></p><figure class="sw-media" data-dcnode-id="2589"><img alt="" class="load" data-dcnode-id="2590" data-src="https://s3.scoopwhoop.com/anj/sgdfse/e4dc6b23-436e-475a-b6c5-0d6926a23b64.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/e4dc6b23-436e-475a-b6c5-0d6926a23b64.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2586"><b data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">5.&nbsp;Indira Goswami</span></b></p><p class="sw-para" data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Indira suffered from depression for a long time and made multiple attempts to take her own life. Writing for her was, admittedly, a reason to live. While her own story is quite sad, her writing is prolific. She takes a human approach to some of the tragedies faced by India as a nation.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2573"><i data-dcnode-id="2581"><b data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Pages Stained With Blood</span></b></i><span data-dcnode-id="2580" instrument_node=""> is about the anti-Sikh riots of 1984 for which she did a lot of research by going to the affected areas. In&nbsp;</span><i data-dcnode-id="2578" style="font-weight: bold;"><span data-dcnode-id="2579" instrument_node="">The Moth Eaten Howdah of a Tusker, </span></i><span data-dcnode-id="2577" instrument_node="">she&nbsp;paints a picture of the&nbsp;Assamese Brahmin widows in </span><i data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Satra</span></i><span data-dcnode-id="2574" instrument_node="">, the religious institutions of Assam. While she has written a lot of books, these two remain classics that continue to haunt us.</span></p><figure class="sw-media" data-dcnode-id="2571"><img alt="" class="load" data-dcnode-id="2572" data-src="https://s3.scoopwhoop.com/anj/sgdfse/fc7f48de-d34f-4527-a8d5-7b6e019ee633.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/fc7f48de-d34f-4527-a8d5-7b6e019ee633.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2568"><b data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">6. Anuja Chauhan</span></b></p><p class="sw-para" data-dcnode-id="2556"><span data-dcnode-id="2567" instrument_node="">From "</span><i data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Yeh dil maange more' </span></i><span data-dcnode-id="2564" instrument_node="">to "</span><i data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Darr ke aage jeet hai,"&nbsp;</span></i><span data-dcnode-id="2561" instrument_node="">we've all grown up repeating phrases by her. However, it was her novel </span><i data-dcnode-id="2558"><b data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">The Zoya Factor</span></b></i><span data-dcnode-id="2557" instrument_node="">, the story of a girl working in advertising who becomes the lucky mascot of the Indian Cricket team that really brought out her writing talent.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2550"><span data-dcnode-id="2555" instrument_node="">While it is easy to tag her as a chick lit author, the truth is that she does provide a twist to every tale she tells. Hence, when&nbsp;</span><b data-dcnode-id="2552"><i data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Battle For Bittora</span></i></b><span data-dcnode-id="2551" instrument_node=""> about Jinni's sudden shift from Mumbai to her hometown Bittora came out, people could not help but applaud the readability factor along with the great narration.&nbsp;</span></p><figure class="sw-media" data-dcnode-id="2548"><img alt="" class="load" data-dcnode-id="2549" data-src="https://s3.scoopwhoop.com/anj/sgdfse/d6d82f23-8046-4b50-b902-9ee2a5a974ee.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/d6d82f23-8046-4b50-b902-9ee2a5a974ee.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2545"><b data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">7. Ismat Chugtai</span></b></p><p class="sw-para" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Ismat Chugtai was one of those women who thought way beyond the era she lived in. Her short stories are the most famous and the reason for that is the way they she manages to capture the Indian culture.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2534"><span data-dcnode-id="2542" instrument_node="">A short story by her that you should definitely read is </span><i data-dcnode-id="2539"><b data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Lihaaf</span></b></i><span data-dcnode-id="2538" instrument_node="">, a story that inspired the movie </span><i data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Fire.&nbsp;</span></i><span data-dcnode-id="2535" instrument_node="">An allusion to a homosexual relationship between two women, it created quite a stir. What you'll appreciate the most is how she never out rightly says anything and keeps the allusion alive.</span></p><figure class="sw-media" data-dcnode-id="2532"><img alt="" class="load" data-dcnode-id="2533" data-src="https://s3.scoopwhoop.com/anj/sgdfse/066430e5-41f9-4ba8-8de8-c747213ac682.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/066430e5-41f9-4ba8-8de8-c747213ac682.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2529"><b data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">8. Judy Balan</span></b></p><p class="sw-para" data-dcnode-id="2520"><span data-dcnode-id="2528" instrument_node="">While being funny may seem like an easy task, the truth is that it is not. And to come up with a whole novel laced with some kick-ass humour is one great achievement. Judy Balan is famous for writing&nbsp;</span><i data-dcnode-id="2525"><b data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Two Fates: The Story of My Divorce</span></b></i><span data-dcnode-id="2524" instrument_node="">, a parody of Chetan Bhagat's </span><i data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Two States. </span></i><span data-dcnode-id="2521" instrument_node="">If you also hate bad literature and would like to have a good laugh about those who write it, go ahead and pick this one up.</span></p><figure class="sw-media" data-dcnode-id="2518"><img alt="" class="load" data-dcnode-id="2519" data-src="https://s4.scoopwhoop.com/anj/sgdfse/ddda5777-5c53-453f-993f-3e88acf052f0.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/sgdfse/ddda5777-5c53-453f-993f-3e88acf052f0.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2515"><b data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">9.&nbsp;Lavanya Sankaran</span></b></p><p class="sw-para" data-dcnode-id="2509"><span data-dcnode-id="2514" instrument_node="">Lavanya's work has travelled various countries, being translated into multiple languages. The reason for her success is her art of storytelling. Her debut novel,&nbsp;</span><i data-dcnode-id="2511"><b data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">The Hope Factory,&nbsp;</span></b></i><span data-dcnode-id="2510" instrument_node="">was at the top spot on Amazon India.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2503"><span data-dcnode-id="2508" instrument_node="">The simple story of a small factory owner who finds himself lost when urban forces make things out of control. His house help, Kamla, is also struggling to send her son to school for she wants a better future for him. The heartbreaking tale of poverty and broken dreams gives the picture of the real India.&nbsp;</span><i data-dcnode-id="2505"><b data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The Red Carpet</span></b></i><span data-dcnode-id="2504" instrument_node="">, a short story collection, also spent two years in best-seller lists and is a wonderful read if you're into short fiction.</span></p><figure class="sw-media" data-dcnode-id="2501"><img alt="" class="load" data-dcnode-id="2502" data-src="https://s4.scoopwhoop.com/anj/sgdfse/e252b17b-36bb-4798-ae56-8af307839e2a.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/sgdfse/e252b17b-36bb-4798-ae56-8af307839e2a.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2498"><b data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">10. Anita Desai</span></b></p><p class="sw-para" data-dcnode-id="2492"><span data-dcnode-id="2497" instrument_node="">Mother to Booker-prize winner Kiran Desai, Anita Desai herself is a renowned author, something that has won her the&nbsp;Fellowship of the Royal Society of Literature. While the author has written a lot of books, all of different genres and equally well executed, you should pick up </span><i data-dcnode-id="2494"><b data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">In Custody.</span></b></i><span data-dcnode-id="2493" instrument_node=""> The story is that of an old Urdu poet who doesn't know who will keep the language alive after him. A story of culture and loss, every Indian will manage to connect with it.</span></p><figure class="sw-media" data-dcnode-id="2490"><img alt="" class="load" data-dcnode-id="2491" data-src="https://s3.scoopwhoop.com/anj/sgdfse/a9a03a5e-6565-4b25-8911-4a0e24bd5e7f.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/a9a03a5e-6565-4b25-8911-4a0e24bd5e7f.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2487"><b data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">11. Anita Nair</span></b></p><p class="sw-para" data-dcnode-id="2481"><span data-dcnode-id="2486" instrument_node="">She wrote her first book,&nbsp;</span><i data-dcnode-id="2483"><b data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Satyr of the Subway,&nbsp;</span></b></i><span data-dcnode-id="2482" instrument_node="">while she was working as a creative director at an advertising agency. It won her a fellowship from the Virginia Center for the Creative Arts. After working on her craft, her work became more famous and has now been translated into 21 languages.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2475"><span data-dcnode-id="2480" instrument_node="">Her book,&nbsp;</span><i data-dcnode-id="2477"><b data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Ladies Coupe,&nbsp;</span></b></i><span data-dcnode-id="2476" instrument_node="">is one book every Indian lady should pick up. A middle-aged woman is on a journey to Kanyakumari where she ends up swapping stories with 5 other women. The beautiful narration will leave you with more than just some inspiration.</span></p><figure class="sw-media" data-dcnode-id="2473"><img alt="" class="load" data-dcnode-id="2474" data-src="https://s4.scoopwhoop.com/anj/sgdfse/f03ac133-5066-4bfd-83c7-0c9c8641c8b4.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/sgdfse/f03ac133-5066-4bfd-83c7-0c9c8641c8b4.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2470"><b data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">12. Kamala Das</span></b></p><p class="sw-para" data-dcnode-id="2465"><span data-dcnode-id="2469" instrument_node="">A writer too bold for her times, Kamala Das has been recognized for her writing prowess only recently. From dealing with the question of identity to love out of marriage, she deals beautifully with topics too controversial. While her poems are a must-read for all Indian women, you can also pick up&nbsp;</span><i data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">My Story,&nbsp;</span></i><span data-dcnode-id="2466" instrument_node="">her autobiography. It captures the struggle of being a progressive woman in India quite perfectly.</span></p><figure class="sw-media" data-dcnode-id="2463"><img alt="" class="load" data-dcnode-id="2464" data-src="https://s3.scoopwhoop.com/anj/sgdfse/98d5faee-b14d-43b0-b56e-6c9a41705c0e.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/98d5faee-b14d-43b0-b56e-6c9a41705c0e.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2460"><b data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">13.&nbsp;Mahasweta Devi</span></b></p><p class="sw-para" data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">To give only a couple of recommendations by her would definitely be of no use. Mahasweta Devi was a literary gem and she enriched the Indian literature with her contributions. She wrote over 100 books in her lifetime and being a social activist, her books do cover issues faced by Indians.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2448"><span data-dcnode-id="2457" instrument_node="">Read&nbsp;</span><i data-dcnode-id="2454"><b data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Hajar Churashir Maa </span></b></i><span data-dcnode-id="2453" instrument_node="">or </span><i data-dcnode-id="2450"><b data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">No. 1084's Mother</span></b></i><span data-dcnode-id="2449" instrument_node="">, the story of a mother whose son, corpse number 1084, was killed by the state because of his political views. If you're not ready for a heavy read, make sure you pick up at least a short story by her.</span></p><figure class="sw-media" data-dcnode-id="2446"><img alt="" class="load" data-dcnode-id="2447" data-src="https://s4.scoopwhoop.com/anj/sgdfse/f45d4381-9d8b-49a7-b3bc-e1b0dba7e076.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/sgdfse/f45d4381-9d8b-49a7-b3bc-e1b0dba7e076.jpg.webp&amp;raw"></figure><p class="sw-para" data-dcnode-id="2443"><b data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">14. Amrita Pritam</span></b></p><p class="sw-para" data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Amrita Pritam was primarily a poet, writing about love and political turmoil with equal ease. But she has written a number of novels as well which capture human emotions beautifully.&nbsp;</span></p><p class="sw-para" data-dcnode-id="2435"><span data-dcnode-id="2440" instrument_node="">Pick up </span><i data-dcnode-id="2437"><b data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Pinjar </span></b></i><span data-dcnode-id="2436" instrument_node="">to know what women went through during the Partition period. Puro is kidnapped by a Muslim man, Rashid, and her parents refuse to take back the girl who has been 'defiled.' The ending is something that will definitely make you shed a tear.</span></p><figure class="sw-media" data-dcnode-id="2433"><img alt="" class="load" data-dcnode-id="2434" data-src="https://s3.scoopwhoop.com/anj/sgdfse/ec73e0c9-ab98-4d37-92f2-054adeff4db8.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/sgdfse/ec73e0c9-ab98-4d37-92f2-054adeff4db8.jpg.webp&amp;raw"></figure><h2 data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">We thank these women for giving us such literary gems!</span></h2><span data-dcnode-id="2430" instrument_node=""> </span></div><span data-dcnode-id="2428" instrument_node=""> </span></article><span data-dcnode-id="2426" instrument_node=""> </span><div class="mb-10" data-dcnode-id="2425"></div><span data-dcnode-id="2424" instrument_node=""> </span><span data-dcnode-id="2422" instrument_node=""> </span><div class="share-control" data-dcnode-id="2385"><span data-dcnode-id="2421" instrument_node=""> </span><button class="bookmark _show_bookmark sw-share-bm" data-dcnode-id="2413" id="bottomBookmark" onclick="if (!window.__cfRLUnblockHandlers) return false; sw.bookmark(event, 'article')"><span data-dcnode-id="2420" instrument_node=""> </span><svg class="not-marked" data-dcnode-id="2418" fill="none" height="18" width="13"><path clip-rule="evenodd" d="M0 18l6.111-3.056L12.222 18V1.746C12.222.782 11.441 0 10.476 0h-8.73C.782 0 0 .782 0 1.746V18zm6.111-5.008l-4.365 2.183V1.746h8.73v13.429l-4.365-2.183z" data-dcnode-id="2419" fill="#1B91FF" fill-rule="evenodd"></path></svg><span data-dcnode-id="2417" instrument_node=""> </span><svg class="marked" clip-rule="evenodd" data-dcnode-id="2415" fill-rule="evenodd" height="18" stroke-linejoin="round" stroke-miterlimit="1.414" viewBox="0 0 12 17" width="13"><path d="M-.013 17.016l6-2.887 6 2.887V1.665c0-.91-.767-1.65-1.714-1.65H1.7c-.946 0-1.714.74-1.714 1.65v15.35z" data-dcnode-id="2416" fill="#1b91ff"></path></svg><span data-dcnode-id="2414" instrument_node=""> </span></button><span data-dcnode-id="2412" instrument_node=""> </span><button class="sw-share-fb" data-dcnode-id="2406" id="bottomFacebook" onclick="if (!window.__cfRLUnblockHandlers) return false; sw.shareArticle(event, 'fb')"><span data-dcnode-id="2411" instrument_node=""> </span><svg data-dcnode-id="2408" fill="none" height="18" width="18"><path d="M8.22 9.004H9.9V14.4h1.8V9.004h1.784v-1.8H11.7V6.3a.9.9 0 0 1 .9-.9h.9V3.6h-.9a2.7 2.7 0 0 0-2.7 2.7v.904H8.22v1.8z" data-dcnode-id="2410" fill="#1B91FF"></path><path
