</span><div class="entry-content" data-dcnode-id="1626"><span data-dcnode-id="1901" instrument_node="">
</span><div class="left-side" data-dcnode-id="1892"><span data-dcnode-id="1900" instrument_node="">
</span><div class="related-books books" data-dcnode-id="1894"><h4 data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Related Books:</span></h4><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themillions.com/books-reviews/everything-is-illuminated-a-novel-0060529709"><span data-dcnode-id="1897" instrument_node="">
</span><div class="img" data-dcnode-id="1896" style="background-image:url(https://images-na.ssl-images-amazon.com/images/P/0060529709.01.LZZZZZZZ.jpg)"></div></a></div><span data-dcnode-id="1893" instrument_node=""> </span></div><span data-dcnode-id="1891" instrument_node="">
</span><div class="the-content" data-dcnode-id="1628"><span data-dcnode-id="1890" instrument_node="">
</span><div class="bump" data-dcnode-id="1889"></div><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><img alt="" class="alignright size-full wp-image-40395" data-dcnode-id="1887" height="637" sizes="(max-width: 570px) 100vw, 570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themillions.com/wp-content/uploads/2012/04/570_Chabon.jpg&amp;raw" srcset="https://themillions.com/wp-content/uploads/2012/04/570_Chabon.jpg 570w, https://themillions.com/wp-content/uploads/2012/04/570_Chabon-268x300.jpg 268w" title="570_Chabon" width="570"></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">The worst author introduction I ever saw is making me cringe, right now, as I remember it. The co-owner of the bookstore started by reading through the store’s upcoming events flier, pausing to extemporize on each event. This took a full 10 minutes. Then she spent 5 minutes talking about the plight of independent bookstores, and how they need money to do things like community book nights, and hey she’s got this newsletter sign-up sheet that she’s going to pass around. And while we’re at it, the store actually has two different email newsletters that they send out, and she described them both in great detail. Another sign-up sheet is passed around.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Having already wasted close to 20 minutes of our time, she launched into a synopsis of the book, interspersed with her own impressions, leaving no secondary character or minor scene unnamed. Worst of all, the book has a rather large twist in the second half, and she was explicitly hinting at what it is. Someone in the audience actually yelled out, “Don’t give it away!” This was advice she did not take.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">This is an extreme example, by far the worst I’ve ever seen, but author introduction crimes are rampant. I was recently at a literary festival where at least 10 of the roughly 15 author introductions I saw were painful to sit through. I take this issue seriously because I was an author events coordinator at Brookline Booksmith for two years, and we took pride in our author introductions. The willingness and ability to carefully craft a good author introduction, in fact, was part of my job interview.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Author introductions, in my opinion, are about courtesy. Should a beloved, Pulitzer Prize-winning author have to hear the president of Northwestern’s Jewish students’ society call him Michael Sha-BONE eight times in two minutes? No. Because he flew across the country to speak for 50 minutes in your overheated auditorium and you have the internet. A good author introduction shows the author that you’re excited to be a partner in promoting their work and that you value the role their career plays on the literary stage, all while being informative and – lord have mercy – brief.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1870"><strong data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">How To Introduce an Author</span></strong></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Step 1. Find Out Who the Author Is</span></strong></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1864" instrument_node="">Get your details straight. Look up the pronunciation of their name, even if you think you know it. If a definitive answer is elusive, ask their publicist, agent, or whoever set up the event with you. Otherwise, ask the author when they arrive, before you hit the microphone with some garbled version of </span><strong data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Eugenides</span></strong><span data-dcnode-id="1861" instrument_node="">.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1835"></p><div class="amz-links" data-dcnode-id="1854"><a class="amz-ext amz-link" data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0393328627/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1858" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/0393328627.01.MZZZZZZZ.jpg&amp;raw"></a><a class="amz-ext amz-link" data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0345530373/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/0345530373.01.MZZZZZZZ.jpg&amp;raw"></a></div><span data-dcnode-id="1853" instrument_node="">Find out what books they’ve written. Don’t say that </span><a class="amz-ext text-only" data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0345530373/ref%3Dnosim/themillpw-20"><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Stay Awake</span></em></a><span data-dcnode-id="1849" instrument_node=""> is </span><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Dan Chaon’s</span></strong><span data-dcnode-id="1846" instrument_node=""> fifth novel. He’s written two novels, but this is his third story collection. Do you think </span><em data-dcnode-id="1843"><a class="amz-ext text-only" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0393328627/ref%3Dnosim/themillpw-20"><span data-dcnode-id="1845" instrument_node="">A History of Love</span></a></em><span data-dcnode-id="1842" instrument_node=""> is </span><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Nicole Krauss’s</span></strong><span data-dcnode-id="1839" instrument_node=""> first book? Wrong! Look it up. If you find yourself introducing someone like </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Michael Chabon</span></strong><span data-dcnode-id="1836" instrument_node="">, who’s written novels, short stories, essays, comic books, and children’s books, just avoid taxonomy and say he’s prolific.</span><p></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Find out what awards they’ve won, where they teach (currently), and what periodicals they write for. More on this later.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1820"><a class="amz-ext amz-link solo move-me" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0307387763/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1830" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/0307387763.01.MZZZZZZZ.jpg&amp;raw"></a><span data-dcnode-id="1828" instrument_node="">If you haven’t had time to do your research, don’t guess, and definitely don’t — as I saw someone do last weekend — turn to </span><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Kevin Brockmeier</span></strong><span data-dcnode-id="1825" instrument_node=""> in the middle of your introduction and say “Is </span><em data-dcnode-id="1822"><a class="amz-ext text-only" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0307387763/ref%3Dnosim/themillpw-20"><span data-dcnode-id="1824" instrument_node="">The View From the Seventh Layer</span></a></em><span data-dcnode-id="1821" instrument_node=""> a novel?” I shudder.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1816"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Step 2. Weed Out Unnecessary/Unimpressive Details</span></strong></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1814" instrument_node="">So you’ve printed out the author’s Wikipedia entry. Don’t include the fact that they teach creative writing part-time at Eastern Nevada State. Don’t mention that they won the Central North Carolina Writer’s Prize. Don’t say that they were included on </span><em data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Entertainment Weekly’s</span></em><span data-dcnode-id="1811" instrument_node=""> 100 Authors to Watch list.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">These details do two things — they make the author look small-time, and they give the impression that you’re desperate for any scrap of information to fill out your introduction.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1803"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Which Brings Us to Step 3. Include Personal Impressions</span></strong></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Personal impressions of the author’s work should be the bulk of your introduction. Ideally, they will be your personal impressions. During my first year as an events coordinator, I read each author’s book before I hosted their event, a debatably unnecessary gesture with enormous dividends.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Firstly, it is yet another step you can take to avoid looking like an idiot. The room is full of people who’ve most likely come to hear the author because they’ve read their work. It’s embarrassing when the person at the microphone is the only one who hasn’t.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Secondly, it will endear you greatly to the author. Consult any number of essays written by authors on the drudgery of the book tour, and you’ll know that being greeted by someone who’s taken the time to prepare for their visit is a rare and lovely thing.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Thirdly, nothing is more compelling than sincerity. Speaking thoughtfully and graciously about your reading experience will get the whole room, including the author, excited about the event far more than a list of writing prizes they’ve won, or periodicals they’ve contributed to. Listening to someone introduce one of their favorite authors can be really beautiful.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1772"></p><div class="amz-links" data-dcnode-id="1785"><a class="amz-ext amz-link" data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0060529709/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1789" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/0060529709.01.MZZZZZZZ.jpg&amp;raw"></a><a class="amz-ext amz-link" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0547735022/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1787" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/0547735022.01.MZZZZZZZ.jpg&amp;raw"></a></div><span data-dcnode-id="1784" instrument_node="">I spent two days writing an introduction for </span><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Jonathan Safran Foer</span></strong><span data-dcnode-id="1781" instrument_node="">. I read </span><em data-dcnode-id="1778"><a class="amz-ext text-only" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0547735022/ref%3Dnosim/themillpw-20"><span data-dcnode-id="1780" instrument_node="">Extremely Loud &amp; Incredibly Close</span></a></em><span data-dcnode-id="1777" instrument_node=""> and I reread </span><em data-dcnode-id="1774"><a class="amz-ext text-only" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0060529709/ref%3Dnosim/themillpw-20"><span data-dcnode-id="1776" instrument_node="">Everything is Illuminated</span></a></em><span data-dcnode-id="1773" instrument_node="">. I quoted both books. I talked about his critical reputation and my own love for his work both as a reader and as a bookseller. After the event he asked me if I would sign my printed out copy of the introduction for him to keep. I’m sure he doesn’t have it anymore, but it was absolutely the best moment of my nine-year bookselling career.</span><p></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">That introduction, by the way, was 235 words long.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1765"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">So Obviously Step 4 is Wrap It Up</span></strong></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">500 words maximum. Absolutely no more than 500 words. 200-300 words is ideal, but 500 words is the limit. No exceptions, friends, 500 words.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Do your homework. Communicate enthusiasm. Get out of the way.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1755"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Caveats on Introducing a Famous Author</span></strong></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1753" instrument_node="">If you’re in a theater with a few hundred people, you don’t need to convince anybody that the author you’re introducing is impressive. They know that, that’s why they’re in a theatre. Stick to two or three of the most impressive details. “</span><strong data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Marilynne Robinson</span></strong><span data-dcnode-id="1750" instrument_node=""> is a Pulitzer Prize-winning author who teaches at the Iowa Writers’ Workshop” does the trick as far as eminence goes. A long, long list of accomplishments isn’t impressive, it’s tiresome. </span><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Jennifer Egan</span></strong><span data-dcnode-id="1747" instrument_node=""> was included in </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Best American Short Stories</span></em><span data-dcnode-id="1744" instrument_node="">? No kidding. She’s Jennifer Egan.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1741" instrument_node="">Unless it’s short, pithy, and you’re working it into one of your sentences, you don’t need to quote a famous author’s reviewers. The </span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">New York Times</span></em><span data-dcnode-id="1738" instrument_node=""> thinks </span><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Richard Ford</span></strong><span data-dcnode-id="1735" instrument_node=""> is a great writer? No kidding. He’s Richard Ford.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1730"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Caveats on Introducing a New/Not Famous Author</span></strong></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Please read the book. To avoid filling the introduction with the only vaguely impressive accolades we talked about earlier, read the book and say something nice about it.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">In this case, it is great to quote reviewers. Not everyone gets to teach at Iowa, but a lot more people get reviewed by a major newspaper. Quoting these reviews puts the author in the big leagues. If you find a great review of the book, but it’s not in a well-known publication, just attribute it to “one reviewer,” not “a reviewer in the </span><em data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Tuscaloosa Daily Press</span></em><span data-dcnode-id="1722" instrument_node="">.”</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1717"><strong data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Miscellaneous Tips</span></strong></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Don’t list everything the author has ever written. Five titles maximum, or one or two from a few different genres.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Don’t synopsize anything but the book the author is currently promoting.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Any synopsis you do give of the current book should be one sentence long.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1699"><a class="amz-ext amz-link solo" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/1400033837/ref%3Dnosim/themillpw-20"><img align="right" alt="cover" border="0" data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-na.ssl-images-amazon.com/images/P/1400033837.01.MZZZZZZZ.jpg&amp;raw"></a><span data-dcnode-id="1704" instrument_node="">Don’t pretend like you have plans to read the author. Comments like “I can’t wait to get my hands on this book” or “</span><em data-dcnode-id="1701"><a class="amz-ext text-only" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/1400033837/ref%3Dnosim/themillpw-20"><span data-dcnode-id="1703" instrument_node="">A Thousand Acres</span></a></em><span data-dcnode-id="1700" instrument_node=""> has been on my to-be-read pile for a long time” are condescending and blatantly untrue. If you were going to read the book, you would have done it.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Do quote the author in the introduction.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Do get housekeeping details — where the signing line will be, where to buy the books — out of the way before you start your introduction.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">If you’re introducing a joint reading or a panel, don’t make one author sound more impressive than the others.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Print out your introduction (you’ve worked so hard!), practice reading it out loud before the event, and don’t go off script.</span></p><span data-dcnode-id="1686" instrument_node="">

</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">On Friday, April 27, 2012, Harper Lee made her first ever appearance at the Alabama Writers Symposium where an annual award named after her is presented to the Alabama writer of the year. A corporate sponsor’s CEO spoke to explain how she came to attend the event for and referenced her by her first name, Nelle. He also pointed out that the artist Nall was also present and stated that two of Alabama’s most prominent citizens went by a 4 letter name, Nall &amp; Nell(e). Whatever.</span></p><span data-dcnode-id="972" instrument_node="">

</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Having been on both sides of this (worked in a bookstore, hosting a reading series; am now one of those “not famous” authors who reads in bookstores), this is all good advice. Let me add one more thing for writers: treat the staff like they’re made of gold (they are). Bring them snacks and wine. Learn their names. Friend their stores on Facebook and follow them on Twitter. And one piece of advice for those introducing writers: don’t tell the audience if the writer is a drunken asshole. She or he will make that very clear on her or his own.</span></p><span data-dcnode-id="937" instrument_node="">
