</span></div><span data-dcnode-id="1189" instrument_node="">
</span><h1 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">
              How to End a Story Right: 13 Tips Every Author Should Know
            </span></h1><span data-dcnode-id="1186" instrument_node="">
</span></div><span data-dcnode-id="1184" instrument_node="">
</span><div class="article-post" data-dcnode-id="651"><span data-dcnode-id="1183" instrument_node="">
</span><div class="article wordpress" data-dcnode-id="656"><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node="">Whether you have the final scenes of your book worked out from the moment you put pen to paper or it comes to you in the weeds of </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/how-to-write-a-story/"><span data-dcnode-id="1180" instrument_node="">writing a story</span></a><span data-dcnode-id="1178" instrument_node="">, there’s one thing every writer needs to master to leave a lasting impression on readers: how to end a story.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">Writing the ending can be a source of anxiety for a lot of authors. After all, you don’t want to finish a great story with a weak ending and disappoint your readers. To help you effectively bring your novel to a close, this post will cover six popular types of endings found in literature, and provide seven tips (including some </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/editing/book-editor"><span data-dcnode-id="1174" instrument_node="">from professional editors!</span></a><span data-dcnode-id="1172" instrument_node="">) that show that ending a book doesn't have to be hard.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><div class="embed-wrapper" data-dcnode-id="1161"><span data-dcnode-id="1169" instrument_node="">
</span><div class="youtube embed" data-dcnode-id="1163" data-embed="8gavIsKPKNs" data-time="0"><span data-dcnode-id="1168" instrument_node="">
</span><div class="play-button" data-dcnode-id="1167"></div><span data-dcnode-id="1166" instrument_node="">
</span><img alt="8gavIsKPKNs Video Thumb" class="lazyloaded" data-dcnode-id="1165" data-src="https://img.youtube.com/vi/8gavIsKPKNs/hqdefault.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.youtube.com/vi/8gavIsKPKNs/hqdefault.jpg&amp;raw"><span data-dcnode-id="1164" instrument_node="">
</span></div><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">
</span><h2 data-dcnode-id="1158" id="six_types_of_endings__and_what_they_re_used_for_"><span data-dcnode-id="1159" instrument_node="">Six Types of Endings (and what they're used for)</span></h2><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">The ending has an enormous impact on how (and if) readers will remember your book in years to come. If they are dissatisfied at the closing of the final chapter, they won’t likely read it again or share it with others. While the </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/how-to-start-a-story/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1155" instrument_node="">start of your story</span></a><span data-dcnode-id="1153" instrument_node=""> might convince people to read your book in the first place, the end is what will determine if they turn from a reader into a fan.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1150" instrument_node="">Of course there’s no universally </span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">right</span></em><span data-dcnode-id="1147" instrument_node=""> or </span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">wrong</span></em><span data-dcnode-id="1144" instrument_node=""> endings. Art is subjective, after all, and every reader will like different things. However, writers must consider reader expectations — and whether their story is best served by meeting or subverting those expectations.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">A few things to consider when trying to determine reader expectations are:</span></p><span data-dcnode-id="1139" instrument_node="">
</span><ul data-dcnode-id="1125"><span data-dcnode-id="1138" instrument_node="">
</span><li data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; Genre</span></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; Plot structure</span></li><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; Target audience</span></li><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; Theme and overall message</span></li><span data-dcnode-id="1126" instrument_node="">
</span></ul><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">In genre, for example, there are many people who don’t consider something a true romance book until it ends with a happily ever after (or at least a “happy for now”). If you’re following the Hero’s Journey true to form, your protagonist will end up back in the same location that they started from, but transformed by their experiences. Children are going to have quite a different set of expectations from a book than adult readers. And of course, your theme and the takeaway you want readers to have will determine whether subverting or meeting their expectations is likely to go over well. (Just make sure that your subverted endings are still true to the characters, plot, and themes that you’ve established, lest you give readers such a curve ball that they won’t be able to follow what you were going for!)</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Understanding the most common ways other writers end stories will help you no matter which approach you’d like to take, so let’s examine some of the most common types of endings out there, and why they work.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><div class="click-to-tweet panel panel-thin" data-dcnode-id="1100"><span data-dcnode-id="1117" instrument_node="">
</span><div class="panel-body" data-dcnode-id="1102"><span data-dcnode-id="1116" instrument_node="">
</span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DSix%2520different%2520ways%2520to%2520end%2520a%2520story.%2520What%2520are%2520they%3F%2520%2523amwriting%26via%3DReedsyHQ%26url%3Dhttps%3A//blog.reedsy.com/how-to-end-a-story/" target="_blank"><span data-dcnode-id="1115" instrument_node="">Six different ways to end a story. What are they? #amwriting

</span><meta content="https://blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg" data-dcnode-id="1113" itemprop="contentUrl"><span data-dcnode-id="1112" instrument_node="">

</span></div><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span><h3 data-dcnode-id="1097" id="1__resolved_ending"><span data-dcnode-id="1098" instrument_node="">1. Resolved Ending</span></h3><span data-dcnode-id="1096" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="1088" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg" data-dcnode-id="1095" itemprop="contentUrl"><span data-dcnode-id="1094" instrument_node="">
</span><img alt="One Hundred Years of Solitude" class="lazyloaded" data-dcnode-id="1093" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude.jpg 332w" height="300" sizes="(max-width: 480px) 100vw, 332px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/One_Hundred_Years_of_Solitude.jpg 332w" width="200"><span data-dcnode-id="1092" instrument_node="">
</span><figcaption data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">(image: Harper Perennial Modern Classics)</span></figcaption><span data-dcnode-id="1089" instrument_node="">
</span></figure><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Wrap it up and put a bow on it. A resolved ending answers all the questions and ties up any loose plot threads. There is nothing more to tell because the characters’ fates are clearly presented to the reader.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Gabriel García Márquez’s </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">One Hundred Years of Solitude</span></em><span data-dcnode-id="1080" instrument_node=""> provides a great example of a resolved ending. In his Nobel Prize-winning book, García Márquez intertwines the tale of the Buendia family and the small town where they live, from its creation until its destruction. [Caution: spoilers ahead!]</span></p><span data-dcnode-id="1078" instrument_node="">
</span><blockquote data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Before reaching the final line, however, he had already understood that he would never leave that room, for it was foreseen that the city of mirrors (or mirages) would be wiped out by the wind and exiled from the memory of men at the precise moment when Aureliano Babilonia would finish deciphering the parchments, and that everything written on them was unrepeatable since time immemorial and forever more, because races condemned to one hundred years of solitude did not have a second opportunity on earth.</span></p><span data-dcnode-id="1074" instrument_node="">
</span></blockquote><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1071" instrument_node="">With this ending, García Márquez effectively ends all hope of a sequel by destroying the entire town and killing off all the characters. Unlike a Deus Ex Machina ending, where </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deus_ex_machina" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1070" instrument_node="">everything is suddenly and abruptly resolved</span></a><span data-dcnode-id="1068" instrument_node="">, this is an ending that fits with the </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/guide/theme/" rel="noopener" target="_blank"><span data-dcnode-id="1067" instrument_node="">themes</span></a><span data-dcnode-id="1065" instrument_node=""> and plot of this book. Though it is not exactly expected, it brings an appropriate closure to the Buendia family and the town of Macondo.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">When might you use a resolved ending?</span></strong><span data-dcnode-id="1060" instrument_node=""> This sort of conclusion is common to standalone books — especially romance novels, which thrive on ‘happily ever afters’ — or the final installment in a series.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><h3 data-dcnode-id="1056" id="2__unresolved_ending"><span data-dcnode-id="1057" instrument_node="">2. Unresolved Ending</span></h3><span data-dcnode-id="1055" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="1047" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg" data-dcnode-id="1054" itemprop="contentUrl"><span data-dcnode-id="1053" instrument_node="">
</span><img alt="Harry Potter and the Half-Blood Prince" class="lazyloaded" data-dcnode-id="1052" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-147x220.jpg 147w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince.jpg 600w" height="300" sizes="(max-width: 480px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince-147x220.jpg 147w, https://blog-cdn.reedsy.com/uploads/2018/07/Half_Blood-Prince.jpg 600w" width="200"><span data-dcnode-id="1051" instrument_node="">
</span><figcaption data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">(image: Scholastic)</span></figcaption><span data-dcnode-id="1048" instrument_node="">
</span></figure><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">This type of ending asks more questions than it answers and, ideally, leaves the reader wanting to know how the story is going to continue. It lets them reflect on what the hero has been through and pushes them to imagine what is still to happen. There will be some resolution, but it will, most likely, pose questions at the end and leave some doors open.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1039"><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Harry Potter and the Half-Blood Prince</span></em><span data-dcnode-id="1040" instrument_node=""> does exactly that. After years of confronting Voldemort, Harry finally knows the secret to bring him down once and for all, however, the road will only become more dangerous and will require more sacrifices than anybody thought. [More spoilers!]</span></p><span data-dcnode-id="1038" instrument_node="">
</span><blockquote data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">His hand closed automatically around the fake Horcrux, but in spite of everything, in spite of the dark and twisting path he saw stretching ahead for himself, in spite of the final meeting with Voldemort he knew must come, whether in a month, in a year, or in ten, he felt his heart lift at the thought that there was still one last golden day of peace left to enjoy with Ron and Hermione.</span></p><span data-dcnode-id="1034" instrument_node="">
</span></blockquote><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Like Harry, readers are aware that a final meeting between him and Voldemort is coming, and that everything is about to change for him and his friends. As a stand-alone book, this ending would probably be unsatisfactory. But as the penultimate book in the series, it leaves the readers wanting for more.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">When might you use an unresolved ending?</span></strong><span data-dcnode-id="1026" instrument_node=""> Because it can create anticipation and excitement for what comes next, you may want to use an unresolved ending if you are </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/how-to-write-a-series/"><span data-dcnode-id="1025" instrument_node="">writing a series of books</span></a><span data-dcnode-id="1023" instrument_node="">. Who doesn’t love (and hate) a good cliffhanger?</span></p><span data-dcnode-id="1021" instrument_node="">
</span><h3 data-dcnode-id="1019" id="3__ambiguous_ending"><span data-dcnode-id="1020" instrument_node="">3. Ambiguous Ending</span></h3><span data-dcnode-id="1018" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="1010" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg" data-dcnode-id="1017" itemprop="contentUrl"><span data-dcnode-id="1016" instrument_node="">
</span><img alt="The Giver" class="lazyloaded" data-dcnode-id="1015" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver.jpg 266w" height="300" sizes="(max-width: 480px) 100vw, 266px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-200x300.jpg 200w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Giver.jpg 266w" width="200"><span data-dcnode-id="1014" instrument_node="">
</span><figcaption data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">(image: Houghton Mifflin Harcourt)</span></figcaption><span data-dcnode-id="1011" instrument_node="">
</span></figure><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1008" instrument_node="">An ambiguous ending leaves the reader wondering about the “what ifs.” Instead of directly stating what happens to the characters after the book ends, it allows the reader to speculate about what might come next — without establishing a right or wrong answer. Things don't feel quite </span><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">unresolved</span></em><span data-dcnode-id="1005" instrument_node="">, more just open to interpretation.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="1002" instrument_node="">The first installment of </span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The Giver</span></em><span data-dcnode-id="999" instrument_node=""> series, by Lois Lowry, makes use of this ending. </span><em data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The Giver</span></em><span data-dcnode-id="996" instrument_node=""> focuses on Jonas, a teenager living in a colorless yet seemingly ideal society, and on the way he uses his newly assigned position as the Receiver of Memories to unravel the truth about his community and forge a new path for himself. [Caution: spoilers!]</span></p><span data-dcnode-id="994" instrument_node="">
</span><blockquote data-dcnode-id="986"><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Downward, downward, faster, faster. Suddenly he was aware with certainty and joy that below, ahead, they were waiting for him; and that they were waiting, too, for the baby. For the first time, he heard something that he knew to be music. He heard people singing.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Behind him, across vast distances of space and time, from the place he had left, he thought he heard music too. But perhaps it was only an echo.</span></p><span data-dcnode-id="987" instrument_node="">
</span></blockquote><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Readers will wonder what happened to Jonas once he finishes his journey, and what happens to the town and people he left behind. There are three more companion books with more </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/plot-point/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="983" instrument_node="">plot points</span></a><span data-dcnode-id="981" instrument_node="">, but the story centering on Jonas is finished. Readers will see him again, but only as a side character, and will neither find out how he rebuilt his life nor how his old community fared. There might be speculation, but an answer is never clearly given: that is left to the imagination.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">When might you use an ambiguous ending?</span></strong><span data-dcnode-id="976" instrument_node=""> If you want your readers to reflect on the meaning of your book, then this is the ending for you. While a resolved ending may satisfy readers, it probably won’t give them much pause at all. However, by trying to unpick an ambiguous ending they get closer to what you as the author are trying to say.</span></p><span data-dcnode-id="974" instrument_node="">
</span><h3 data-dcnode-id="972" id="4__unexpected_ending"><span data-dcnode-id="973" instrument_node="">4. Unexpected Ending</span></h3><span data-dcnode-id="971" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="963" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg" data-dcnode-id="970" itemprop="contentUrl"><span data-dcnode-id="969" instrument_node="">
</span><img alt="And Then There Were None" class="lazyloaded" data-dcnode-id="968" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg 199w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg 199w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None.jpg 430w" height="300" sizes="(max-width: 480px) 100vw, 430px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg 199w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-199x300.jpg 199w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None-146x220.jpg 146w, https://blog-cdn.reedsy.com/uploads/2018/07/And_Then_There_Were_None.jpg 430w" width="199"><span data-dcnode-id="967" instrument_node="">
</span><figcaption data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">(image: William Morrow Paperbacks)</span></figcaption><span data-dcnode-id="964" instrument_node="">
</span></figure><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">If you have led your readers to believe that your book will end one way, but at the last possible moment you add a </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/plot-twist-ideas-examples/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="960" instrument_node="">plot twist</span></a><span data-dcnode-id="958" instrument_node=""> that they didn’t see coming, you’ve got yourself an unexpected ending! For an author, this type of ending can be a thrill to write, but it must be handled with care. Handled poorly, it will frustrate and infuriate your reader.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">An unexpected ending must be done in such a way that, while surprising, still makes sense and brings a satisfactory conclusion.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="952" instrument_node="">A popular novel that makes use of this ending is </span><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">And Then There Were None</span></em><span data-dcnode-id="949" instrument_node=""> by </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-agatha-christie-books" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="948" instrument_node="">Agatha Christie</span></a><span data-dcnode-id="946" instrument_node="">, where she tells the tale of ten murders without an obvious culprit that took place in an isolated island mansion. [Spoilers coming!] The last lines of the novel read:</span></p><span data-dcnode-id="944" instrument_node="">
</span><blockquote data-dcnode-id="930"><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">When the sea goes down, there will come from the mainland boats and men.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">And they will find ten dead bodies and an unsolved problem on Soldier Island.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Signed:</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Lawrence Wargrave</span></p><span data-dcnode-id="931" instrument_node="">
</span></blockquote><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The ways in which the murders occur lets the reader suspect guilt of just about every character — and then in an epic twist, they all die in the end, leaving the murders unexplained. It is not until the message in the bottle arrives that the true culprit is revealed, as one of the victims no less! The ending is satisfactory to the reader because it brings the plot to a close in a way that, though surprising, invites them to think back on how the murderer set things up for the remaining deaths, and ultimately makes sense.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="916"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">When might you use an unexpected ending?</span></strong><span data-dcnode-id="923" instrument_node=""> These ‘twist endings’ are </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/how-to-write-a-mystery/" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">the bread and butter of mystery novels</span></a><span data-dcnode-id="920" instrument_node="">. Just be aware that while fans of the genre will expect a twist — they won't want one that comes </span><em data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">entirely </span></em><span data-dcnode-id="917" instrument_node="">out of nowhere. To execute a flawless unexpected ending, you must lay groundwork throughout your book, so that the reader can reflect on the plot and go, “ah, but of course!”</span></p><span data-dcnode-id="915" instrument_node="">
</span><h3 data-dcnode-id="913" id="5__tied_ending"><span data-dcnode-id="914" instrument_node="">5. Tied Ending</span></h3><span data-dcnode-id="912" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="904" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg" data-dcnode-id="911" itemprop="contentUrl"><span data-dcnode-id="910" instrument_node="">
</span><img alt="The Night Circus" class="lazyloaded" data-dcnode-id="909" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-143x220.jpg 143w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus.jpg 292w" height="300" sizes="(max-width: 480px) 100vw, 292px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus-143x220.jpg 143w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Night_Circus.jpg 292w" width="195"><span data-dcnode-id="908" instrument_node="">
</span><figcaption data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">(image: Anchor Books)</span></figcaption><span data-dcnode-id="905" instrument_node="">
</span></figure><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">Much of storytelling is cyclical. Sometimes it’s a metaphorical return home, such as in </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/guide/story-structure/heros-journey/" rel="noopener" target="_blank"><span data-dcnode-id="901" instrument_node="">The Hero’s Journey</span></a><span data-dcnode-id="899" instrument_node="">. In other cases, the cycle is quite literal — the story ends where it began.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="896" instrument_node="">Erin Morgenstern uses this ending in her book </span><em data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The Night Circus</span></em><span data-dcnode-id="893" instrument_node="">, where she tells of a duel between two magicians that takes place within </span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Le Cirque des Rêves</span></em><span data-dcnode-id="890" instrument_node="">, a traveling circus and, arguably, a character on its own. [Spoilers!]</span></p><span data-dcnode-id="888" instrument_node="">
</span><blockquote data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Widget takes a sip of his wine and puts his glass down on the table. He sits back in his chair and steadily return the stare at him. Taking his time as though he has all of it in the world, in the universe, from the days when tales meant more than they do now, but perhaps less than they will someday, he draws a breath that releases the tangled knot of words in his heart, and they fall from his lips effortlessly.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">‘The circus arrives without warning.’</span></p><span data-dcnode-id="881" instrument_node="">
</span></blockquote><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">With what may be the most famous lines of the book, “The circus arrives without warning,” this novel closes the characters’ storylines the same way the book begins. In both cases, the words are used to start telling a story; in the beginning, it serves as an introduction to the book, the words filled with wonder and expectation. At the end, it serves as a resolution, the words filled with hope for those who remain. Additionally, Morgenstern later uses a few more pages to finish the second person narrative of the reader’s own visit to the circus, effectively ending the novel with the same </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/guide/point-of-view/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="877" instrument_node="">point of view</span></a><span data-dcnode-id="875" instrument_node=""> that it began.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="869"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">When might you use a tied ending?</span></strong><span data-dcnode-id="870" instrument_node=""> More common in literary fiction, a tied ending can help give you a sense of direction when writing your book — after all, you are ending the same way you began. But don’t think that this makes writing your ending easier. On the contrary, it is up to you to give greater depth to those repeated actions and events so that, by the end, they have a completely different feel.</span></p><span data-dcnode-id="868" instrument_node="">
</span><h3 data-dcnode-id="866" id="6__expanded_ending"><span data-dcnode-id="867" instrument_node="">6. Expanded Ending</span></h3><span data-dcnode-id="865" instrument_node="">
</span><figure class="image alignright" data-dcnode-id="857" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-195x300.jpg" data-dcnode-id="864" itemprop="contentUrl"><span data-dcnode-id="863" instrument_node="">
</span><img alt="The Book Thief" class="lazyload" data-dcnode-id="862" data-src="https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-195x300.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-195x300.jpg 195w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief-143x220.jpg 143w, https://blog-cdn.reedsy.com/uploads/2018/07/The_Book_Thief.jpg 255w" height="300" sizes="(max-width: 480px) 100vw, 255px" width="195"><span data-dcnode-id="861" instrument_node="">
</span><figcaption data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">(image: Alfred A. Knopf)</span></figcaption><span data-dcnode-id="858" instrument_node="">
</span></figure><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">Also known as an </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/guide/parts-of-a-book/epilogue/" rel="noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">epilogue</span></a><span data-dcnode-id="852" instrument_node="">, this type of ending describes what happens to the world of the story afterward in a way that hints at the characters' fates at some point in the future.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">In Markus Zusak’s </span><em data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The Book Thief</span></em><span data-dcnode-id="846" instrument_node="">, Death himself narrates the story of a young girl living in Nazi Germany. In his four-part epilogue, Zusak gives the reader an insight into what happened to Liesel after the bombing, her adult life, and even her death. &nbsp;[Spoilers!]</span></p><span data-dcnode-id="844" instrument_node="">
</span><blockquote data-dcnode-id="830"><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">All I was able to do was turn to Liesel Meminger and tell her the only truth I truly know. I said to the book thief and I say it now to you.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838" style="text-align: center;"><span data-dcnode-id="839" instrument_node="">*** A LAST NOTE FROM YOUR NARRATOR***</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&nbsp;</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832" style="text-align: center;"><span data-dcnode-id="833" instrument_node="">I am hunted by humans.</span></p><span data-dcnode-id="831" instrument_node="">
</span></blockquote><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Instead of going into great detail, Zusak uses short chapters that feel more like sneak peeks into her life. Additionally, it serves the purpose of joining Liesel, the main character, with the narrator, Death, and allowing them to have a conversation on more equal terms.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">When might you use an expanded ending?</span></strong><span data-dcnode-id="823" instrument_node=""> If you need to tie up loose ends but were not able to do it within the actual story, then this is the ending for you. However, it should not take the place of a traditional ending or be used to compensate for a weak ending. Instead, it should give further insight into the characters and give a resolution to the readers.</span></p><span data-dcnode-id="821" instrument_node="">
</span><h2 data-dcnode-id="818" id="seven_tips_to_craft_the_perfect_ending"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Seven Tips to Craft the Perfect Ending</span></strong></h2><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Now that you understand what kind of endings there are, let’s start thinking about how to create them for yourself! We’ve compiled expert knowledge for sticking the landing, so you can create an ending that will linger in people's minds long after they've read your book.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="812" id="1__find_your_ending_in_the_beginning"><span data-dcnode-id="813" instrument_node="">1. Find your ending in the beginning</span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">While your story may contain several different threads and subplots, all books are going to have a central question that’s raised by the opener. Who killed the boss? Will our star-crossed lovers end up together? Can a rag-tag group of heroes really save the world? Is there meaning to a middle-class existence? Can this family’s relationship be saved?</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Your central question is the driving force of what will happen in the plot, so make sure you settle it by the time the book ends. Even if your hero's story continues in a sequel, you’ll want each book to have a central question, and a resolution, for them to feel complete.</span></p><span data-dcnode-id="805" instrument_node="">
</span><h3 data-dcnode-id="803" id="2__completion_goes_hand_in_hand_with_hope"><span data-dcnode-id="804" instrument_node="">2. Completion goes hand-in-hand with hope</span></h3><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Literary agent </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/%23/freelancers/estelle-laure"><span data-dcnode-id="800" instrument_node="">Estelle Laure</span></a><span data-dcnode-id="798" instrument_node=""> explains that a great ending is one that gives the reader both a feeling of completion and hope.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">“You have to assume the character has gone through hell, so let them see something beautiful about the world that allows them to take a breath and step into the next adventure. Even your ending should leave your reader dying for more. They should close the book with a sigh, and that’s the best way I know how to get there. This is, after all, a cruel but wondrous life.”</span></p><span data-dcnode-id="793" instrument_node="">
</span><h3 data-dcnode-id="791" id="3__keep_things_fresh"><span data-dcnode-id="792" instrument_node="">3. Keep things fresh</span></h3><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">This is good advice for every stage of writing, but perhaps nowhere is it more important than the ending. While there are certain genres where a </span><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">type</span></em><span data-dcnode-id="786" instrument_node=""> of ending is expected (romances should end with a happily ever after, mysteries with identifying the killer), you don’t want people to be able to see everything coming from miles off. So even if the payoff from the big resolution is expected, as the writer you’ll want to think hard to find ways to keep things fresh and interesting. To achieve this, try to dig deeper than your first impulse because, chances are, that’s also going to be your audience’s first impulse as well. You don’t necessarily need to subvert that expectation, but it will give you some hints as to what most people think will happen.</span></p><span data-dcnode-id="784" instrument_node="">
</span><h3 data-dcnode-id="782" id="4__make_sure_it_s_really_finished"><span data-dcnode-id="783" instrument_node="">4. Make sure it’s really finished</span></h3><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">To create a satisfying ending, close your book with purpose.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="777" instrument_node="">As Publishing Director of Endeavor Media, </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/jasmin-kirkbride"><span data-dcnode-id="776" instrument_node="">Jasmin Kirkbride’s</span></a><span data-dcnode-id="774" instrument_node=""> biggest tip is to make sure you follow the rule of </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/chekhovs-gun/"><span data-dcnode-id="773" instrument_node="">Chekhov’s Gun</span></a><span data-dcnode-id="771" instrument_node="">: “Every subplot and all the different strands of your </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/what-is-plot/"><span data-dcnode-id="770" instrument_node="">main plot</span></a><span data-dcnode-id="768" instrument_node=""> should reach satisfying, clear conclusions. If they are meant to be left ambiguously, ensure your reader knows this, and create something out of that uncertainty.”</span></p><span data-dcnode-id="766" instrument_node="">
</span><div class="panel panel-blue-fade panel-overflow space-bottom-xs-lg space-top-xs-lg" data-dcnode-id="735"><span data-dcnode-id="765" instrument_node="">
</span><div class="panel-body" data-dcnode-id="737"><span data-dcnode-id="764" instrument_node="">

</span><h3 data-dcnode-id="732" id="5__last_impressions_matter"><span data-dcnode-id="733" instrument_node="">5. Last impressions matter</span></h3><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">In some ways, the final line of a story is even more important than the first one. It’s the last impression you’re going to make in your reader’s mind, and the final takeaway of the whole book. Hone in on what kind of emotions you’d like your reader to feel as they close the book, and ask yourself what kind of image or concluding thought would best convey that. Not sure what that should be? Try looking at your book’s theme! Often the final image is the summation of everything your theme has been building.</span></p><span data-dcnode-id="728" instrument_node="">
</span><h3 data-dcnode-id="726" id="6__come_full_circle"><span data-dcnode-id="727" instrument_node="">6. Come full circle</span></h3><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">Editor </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/jenn-bailey"><span data-dcnode-id="723" instrument_node="">Jenn Bailey</span></a><span data-dcnode-id="721" instrument_node=""> says that a good ending brings the book’s internal and external story arcs to a rational conclusion: “You need to come full circle. You need to end where you began. You need to take the truth your main character believed in at the beginning of the story and expose it as the lie that it is by the end. In your ending, the main character doesn’t have to get what they want, but they do have to get what they need.” For more about character arcs, </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/character-arc/"><span data-dcnode-id="720" instrument_node="">check out this post</span></a><span data-dcnode-id="718" instrument_node="">!</span></p><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="714" id="7__leave_some_things_unsaid"><span data-dcnode-id="715" instrument_node="">7. Leave some things unsaid</span></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="712" instrument_node="">There’s a balance to endings — too little resolution and your book will feel rushed and unsatisfying, but too much and </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/what-is-a-denouement/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="711" instrument_node="">the denouement</span></a><span data-dcnode-id="709" instrument_node=""> starts to drag. In general, though, you want to keep things brief, especially if you want room for an epilogue. It’s okay to trust your readers to reach some conclusions on their own, rather than spending whole chapters making sure every question you raised is answered. But, if do you really want </span><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">everything</span></em><span data-dcnode-id="706" instrument_node=""> tied off, consider moving the resolution of some of your subplots to just </span><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">before</span></em><span data-dcnode-id="703" instrument_node=""> the climax. This avoids jamming everything into the last five pages, allowing your subplots space to breathe.</span></p><span data-dcnode-id="701" instrument_node="">
</span><div class="panel panel-blue-fade panel-overflow space-bottom-xs-lg space-top-xs-lg" data-dcnode-id="670"><span data-dcnode-id="700" instrument_node="">
</span><div class="panel-body" data-dcnode-id="672"><span data-dcnode-id="699" instrument_node="">

</span></div><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">As we have seen, there are many methods for ending stories! However you decide to finish your novel, there is one thing that you should always keep in mind: take account of the story that came before and give it the ending that it needs, not the one you think readers want, and it will be satisfactory for all.</span></p><span data-dcnode-id="666" instrument_node="">
</span><hr data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="661"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">What is your favorite way to end a story? Or do you have a favorite closing passage? Tell us in the comments below!</span></strong></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">&nbsp;</span></p><span data-dcnode-id="657" instrument_node="">
