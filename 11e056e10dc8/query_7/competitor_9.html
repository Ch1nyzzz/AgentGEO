</span><h2 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">About the Template</span></h2><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1055"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Genre:</span></strong><span data-dcnode-id="1068" instrument_node="">&nbsp;Romantic Suspense</span><br data-dcnode-id="1067"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Projected Word Count:&nbsp;</span></strong><span data-dcnode-id="1064" instrument_node="">50,000 - 75,000</span><br data-dcnode-id="1063"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Number of Chapters:&nbsp;</span></strong><span data-dcnode-id="1060" instrument_node="">20 per plot type, 40 total</span><br data-dcnode-id="1059"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Template Length:</span></strong><span data-dcnode-id="1056" instrument_node="">&nbsp;64&nbsp;pages,&nbsp;20,726 words</span></p><span data-dcnode-id="1054" instrument_node="">
</span><h2 data-dcnode-id="1050"><span data-dcnode-id="1051" style="color: #00aaff;"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">SAMPLE</span></strong></span></h2><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1045"><strong data-dcnode-id="1046"><u data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Creating a Romantic Suspense Book Title and Series Name</span></u></strong></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1040"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Genre:</span></strong><span data-dcnode-id="1041" instrument_node=""> Romantic Suspense</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Title:</span></strong><span data-dcnode-id="1036" instrument_node=""> Should hint at both danger and romance and it should be fairly short. You want a punchy title. Romantic suspense is punchy in general, so you need to start that pacing with your title.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><ul data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">e.g. – Mine to Protect, Perilous Trust, Defending Amy, Rancher’s Hostage Rescue, Ruthless.</span></li><span data-dcnode-id="1030" instrument_node="">
</span></ul><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1024"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Series Name:</span></strong><span data-dcnode-id="1025" instrument_node=""> A &lt;Series Hook&gt; Romantic Suspense</span></p><span data-dcnode-id="1023" instrument_node="">
</span><ul data-dcnode-id="1012"><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The series hook can be a location name; a FICTIONAL police or fire department or military unit; or it could be related to a particular trope.</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">e.g. A Blackwood Falls Romantic Suspense, A Smoke Jumpers Romantic Suspense, An Alpha Wolf Protectors Romantic Suspense.</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">For keyword purposes, try to keep “Romantic Suspense” in the series name. Sometimes Amazon will get uppity about keywords in series names, but it’s worth a shot.</span></li><span data-dcnode-id="1013" instrument_node="">
</span></ul><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">POV:</span></strong><span data-dcnode-id="1008" instrument_node=""> Most of the time it’s third person dual POV. However, I’ve seen first person single POV and first person dual POV. If I was just starting out and wanted to make sure I hit all the usual subgenre expectations, then I’d write in third person dual POV. Only use the FMC and the MMC (To keep the outline simple, I’m using a FMC and a MMC, but obviously you can have two MMCs or two FMCs). Sometimes you can also add scenes from the bad guy’s POV, but I’d only recommend that for books longer than 300 pages. I normally only see this in books around 300 - 400 pages.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1002"><strong data-dcnode-id="1003"><u data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Sample Blurb Outline</span></u></strong></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="997"><strong data-dcnode-id="998"><em data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Punchy Tagline</span></em></strong></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">When &lt;FMC’s name&gt; &lt;has a dangerous problem&gt;, she knows she’s in &lt;some kind of trouble&gt;. She &lt;needs help from the MMC&gt; but &lt;he doesn’t want to help her because of a particular reason&gt; (OR) &lt;she doesn’t want to ask him for help for a particular reason&gt;. They have to work together to &lt;accomplish a specific goal&gt; before the &lt;bad guy accomplishes his/her goal&gt;. They’re both attracted to each other, but they can’t be together because &lt;reason why they can’t be together&gt;. However, they still need to work together to stop the bad guy while protection their hearts.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">FMC –</span></strong><span data-dcnode-id="990" instrument_node=""> Female main character. She’s always the one in jeopardy, not the MMC. Don’t try to change this up if you like money.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Has a Dangerous Problem –</span></strong><span data-dcnode-id="985" instrument_node=""> The stakes are life and death. Her problem is huge and it’s not something she can easily fix on her own. E.g. Someone is stalking her; she accidentally witnessed a mob hit; she found out her boss has been embezzling from the company; she’s a reporter running from guerilla forces through an unforgiving jungle; her ex-husband wants her dead, etc.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="978"><em data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">NOTE:&nbsp;</span></strong><span data-dcnode-id="980" instrument_node="">A&nbsp;description of each component will be included in the template. This sample only shows the first two components.</span></em></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Example Blurb #1 - Unknown Subject</span></strong></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Accountant Abigail Brit never expected to end up on the mob’s hit list. Now she’s on the run and she can’t trust anyone, not even the police. Five years ago, she left FBI agent Max Gunner at the altar. Now she needs his help. To stay one step ahead of the ruthless killers, they will have to put aside their painful past and use every skill in their arsenal to outwit her enemies. But the longer they run, the harder it is to deny their sizzling attraction. As the killers close in, they must fight their growing desire for each other and do whatever it takes to stay alive.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="967"><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Example Blurb #2 - Known Antagonist</span></strong></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Three years ago, Jessica Reynolds escaped from the Pentagram Killer’s secret dungeon. Now he’s back to claim his only surviving victim. She’s taken into protective custody by FBI agent Alan Butler, a man with dark secrets of his own. Hiding deep into the Tennessee woods, she’s entirely dependent on Alan for protection. The longer they spend together, the more she’s drawn to him and if she’s not careful, she’ll have to trust him with more than just her body, she’ll have to trust him with her heart.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">There are two kinds of romantic suspense antagonists:</span></strong></p><span data-dcnode-id="959" instrument_node="">
</span><ol data-dcnode-id="939"><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="957" instrument_node="">
</span><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">A known assailant (known antagonist)</span></strong><span data-dcnode-id="954" instrument_node="">
</span><ol data-dcnode-id="943"><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The FMC already knows who is after her and why they want to kill her.</span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">e.g. An ex-husband; a specific mob boss; her neighbor who tried to attack her because she won’t date him, etc.</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Thrillers generally fall into this category.</span></li><span data-dcnode-id="944" instrument_node="">
</span></ol><span data-dcnode-id="942" instrument_node="">
</span></li><span data-dcnode-id="940" instrument_node="">
</span></ol><span data-dcnode-id="938" instrument_node="">
</span><ol data-dcnode-id="918" start="2"><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="936" instrument_node="">
</span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">An unsub (unknown subject)</span></strong><span data-dcnode-id="933" instrument_node="">
</span><ol data-dcnode-id="922"><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">A stranger. The FMC doesn’t know who is after her or why they want to kill her.</span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">e.g. A serial killer obsessed with women who look like the FMC; a stalker; FMC doesn’t realize she saw something she shouldn’t have seen, or she has some information that she shouldn’t have.</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Mysteries generally fall into this category.</span></li><span data-dcnode-id="923" instrument_node="">
</span></ol><span data-dcnode-id="921" instrument_node="">
</span></li><span data-dcnode-id="919" instrument_node="">
</span></ol><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Before you begin your plot, you have to decide which kind of story you’re writing because the structure is slightly different. I’ll give examples for both types in the chapter by chapter breakdown. If you know the assailant, then you don’t need suspects because the FMC already knows who is after her and why. If the assailant is unknown, then you need suspects.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="910"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">NOTE</span></strong><span data-dcnode-id="911" instrument_node=""> – The antagonist can be male or female. Typically, they are male so I’m using that gender throughout the template but some of the best plot twists I’ve read were because the unsub killer was a female.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="905"><strong data-dcnode-id="906"><u data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Suspect List</span></u></strong></p><span data-dcnode-id="904" instrument_node="">
</span><ul data-dcnode-id="854"><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">I like to keep a short suspect list handy so it’s easy to refer to it without going back to the main character list.</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Only use this list if you are working with an unsub.</span></li><span data-dcnode-id="897" instrument_node="">
</span><li data-dcnode-id="886"><span data-dcnode-id="896" instrument_node="">#1 &lt;First Last Name&gt; (&lt;Relationship to FMC&gt;)
</span><ul data-dcnode-id="888"><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Reason whys s/he might want to harm her.</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">e.g. Husband, fiancé, ex-husband, mother, sister, next door neighbor, boss, employee, etc.</span></li><span data-dcnode-id="889" instrument_node="">
</span></ul><span data-dcnode-id="887" instrument_node="">
</span></li><span data-dcnode-id="885" instrument_node="">
</span><li data-dcnode-id="877"><span data-dcnode-id="884" instrument_node="">#2 &lt;First Last Name&gt; (&lt;Relationship to FMC&gt;)
</span><ul data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Reason why s/he might want to harm her.</span></li><span data-dcnode-id="880" instrument_node="">
</span></ul><span data-dcnode-id="878" instrument_node="">
</span></li><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="875" instrument_node="">#3 &lt;First Last Name&gt; (&lt;Relationship to FMC&gt;)
</span><ul data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Reason why s/he might want to harm her.</span></li><span data-dcnode-id="871" instrument_node="">
</span></ul><span data-dcnode-id="869" instrument_node="">
</span></li><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">#4 &lt;First Last Name&gt; (&lt; Relationship to FMC&gt;)
</span><ul data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Reason why s/he might want to harm her.</span></li><span data-dcnode-id="862" instrument_node="">
</span></ul><span data-dcnode-id="860" instrument_node="">
</span></li><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Depending on your book’s length, you could add more suspects. But 3-4 is generally enough.</span></li><span data-dcnode-id="855" instrument_node="">
</span></ul><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="844"><strong data-dcnode-id="850"><u data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Characters -</span></u></strong><span data-dcnode-id="847"><b data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">&nbsp;</span></b></span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">THIS IS JUST A SMALL SAMPLE OF WHAT EACH CHARACTER WILL LOOK LIKE</span></em></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="840"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">&lt;First Last Name&gt; – FMC</span></strong></p><span data-dcnode-id="839" instrument_node="">
</span><ul data-dcnode-id="774"><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">&nbsp;She’s &lt;years old&gt;</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="834" instrument_node="">&lt;description of who she is and what she’s good at&gt;
</span><ul data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">e.g. An accountant who has an eidetic memory (a photographic memory)</span></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span></li><span data-dcnode-id="826" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="825" instrument_node="">She likes to &lt;hobby&gt;
</span><ul data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">e.g. Bake animal-shaped cupcakes.</span></li><span data-dcnode-id="821" instrument_node="">
</span></ul><span data-dcnode-id="819" instrument_node="">
</span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="816" instrument_node="">Reason to like her
</span><ul data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">e.g. She volunteers at the local animal shelter and fosters dogs.</span></li><span data-dcnode-id="812" instrument_node="">
</span></ul><span data-dcnode-id="810" instrument_node="">
</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="807" instrument_node="">One of her personal philosophies
</span><ul data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">e.g. She believes that everyone has some redeemable quality and that no one is pure evil.</span></li><span data-dcnode-id="803" instrument_node="">
</span></ul><span data-dcnode-id="801" instrument_node="">
</span></li><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="798" instrument_node="">Details about her relationship with the MMC (if they had a past relationship)
</span><ul data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">e.g. She left the MMC at the altar because she was afraid of marrying an FBI agent. Her father was an FBI agent killed in the line of duty. She doesn’t want to lose someone she loves.</span></li><span data-dcnode-id="794" instrument_node="">
</span></ul><span data-dcnode-id="792" instrument_node="">
</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="789" instrument_node="">She’s single and although she’d like to fall in love at some point, she doesn’t want to because &lt;reason&gt;.
</span><ul data-dcnode-id="778"><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">This can be specific to her or it can be the reason why she doesn’t want to fall in love with this particular MMC.</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">e.g. She doesn’t believe in love because her parents had an unhappy marriage. She’s never been in love before and doesn’t think it’s real. She thinks it’s a lie everyone tells themselves so that they will fit into society.</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">e.g. She won’t marry anyone who works in a dangerous profession because she lost a loved one to a dangerous profession. (Her brother was a firefighter who died in a forest fire. She’d never dream of marrying a firefighter now.)</span></li><span data-dcnode-id="779" instrument_node="">
</span></ul><span data-dcnode-id="777" instrument_node="">
</span></li><span data-dcnode-id="775" instrument_node="">
</span></ul><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">&lt;First Last Name&gt; – MMC</span></strong></p><span data-dcnode-id="769" instrument_node="">
</span><ul data-dcnode-id="704"><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">He’s &lt;years old&gt;</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">&lt;description of who he is and what he’s good at&gt;
</span><ul data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">e.g. An FBI agent who can shoot the cap off a coke bottle at 1000 yards.</span></li><span data-dcnode-id="760" instrument_node="">
</span></ul><span data-dcnode-id="758" instrument_node="">
</span></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="755" instrument_node="">He likes to &lt;hobby&gt;
</span><ul data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">e.g. Go running every day for at least 5 miles to help clear his head.</span></li><span data-dcnode-id="751" instrument_node="">
</span></ul><span data-dcnode-id="749" instrument_node="">
</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">Reason to like him
</span><ul data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">e.g. He’s the primary organizer for the Children’s Christmas Toy Drive in his small town.</span></li><span data-dcnode-id="742" instrument_node="">
</span></ul><span data-dcnode-id="740" instrument_node="">
</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="730"><span data-dcnode-id="737" instrument_node="">One of his personal philosophies
</span><ul data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">e.g. He believes that the only thing standing between good and evil are law enforcement officers who are willing to lay down their life to protect the innocent.</span></li><span data-dcnode-id="733" instrument_node="">
</span></ul><span data-dcnode-id="731" instrument_node="">
</span></li><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="728" instrument_node="">Details about his relationship with the FMC (if they had a past relationship)
</span><ul data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">e.g. He’s always had the hots for the cute waitress at the diner (FMC), but he doesn’t want to get involved with anyone because he’s too busy with his job.</span></li><span data-dcnode-id="724" instrument_node="">
</span></ul><span data-dcnode-id="722" instrument_node="">
</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="706"><span data-dcnode-id="719" instrument_node="">He’s single and although he’d like to fall in love at some point, he doesn’t want to because &lt;reason&gt;.
</span><ul data-dcnode-id="708"><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">This can be specific to him or it can be the reason why he doesn’t want to fall in love with this particular FMC.</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">e.g. He doesn’t believe that he can work as much as he does and still have time to maintain a relationship too. He’s tried before and has failed every time.</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">e.g. The FMC is his law enforcement partner and although they’ve shared a sizzling attraction for years, he wouldn’t dream of acting on it because she’s also his best friend’s sister.</span></li><span data-dcnode-id="709" instrument_node="">
</span></ul><span data-dcnode-id="707" instrument_node="">
</span></li><span data-dcnode-id="705" instrument_node="">
</span></ul><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="698"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Choose 1: Known Antagonist or Unsub</span></strong><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="694"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">&lt;First Last Name&gt; – Known Antagonist</span></strong></p><span data-dcnode-id="693" instrument_node="">
</span><ul data-dcnode-id="643"><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The FMC knows for sure that he’s after her.</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">She may or may not know exactly</span><em data-dcnode-id="686"><span data-dcnode-id="687" instrument_node=""> why</span></em><span data-dcnode-id="685" instrument_node=""> he wants to kill her.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">He’s very smart and always seems to be one step ahead of the FMC and MMC.</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="679" instrument_node="">He wants to kill the FMC because &lt;reason&gt;.
</span><ul data-dcnode-id="665"><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">e.g. She rejected his romantic advances and he doesn’t take rejection well.</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">e.g. He’s her ex-husband and if he can’t have her, no one else can.</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">e.g. She saw him kill someone else in the midst of a crime and she’s the only one who can ID him and send him to prison.</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">e.g. She’s the only woman who has ever escaped from his underground dungeon.</span></li><span data-dcnode-id="666" instrument_node="">
</span></ul><span data-dcnode-id="664" instrument_node="">
</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="661" instrument_node="">He hates women/people he kills because &lt;reason&gt;.
</span><ul data-dcnode-id="650"><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">To have a well-developed antagonist, he needs to have a deeper motivation for wanting the FMC dead.</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">e.g. (Totally cliché but worth mentioning) – His mother, father, or both parents abused him as a child and now he wants to inflict the same pain on anyone who looks like his parents.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">e.g. He thinks he’s entitled to all the drug money he’s getting because people are weak addicts and they aren’t worth anything more than what he can get from them.</span></li><span data-dcnode-id="651" instrument_node="">
</span></ul><span data-dcnode-id="649" instrument_node="">
</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">If he’s a serial killer, list his previous crimes and go into detail about how he committed the crime. Serial killers typically follow the same MO, so keep a list handy so you can keep it consistent from murder to murder.</span></li><span data-dcnode-id="644" instrument_node="">
</span></ul><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">&lt;First Last Name&gt; - Unknown Antagonist Suspect #1</span></strong></p><span data-dcnode-id="638" instrument_node="">
</span><ul data-dcnode-id="615"><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Skip this step if the FMC already knows who’s trying to kill her.</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">&lt;Relationship to FMC&gt;
</span><ul data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">
</span><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">e.g. Boss; family member; neighbor; etc.</span></li><span data-dcnode-id="629" instrument_node="">
</span></ul><span data-dcnode-id="627" instrument_node="">
</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">&lt;motive for trying to kill the FMC&gt;</span></li><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">He’s capable of it because &lt;dark secret in his past&gt;</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">He &lt;does something suspicious during the course of the book&gt;</span></li><span data-dcnode-id="616" instrument_node="">
</span></ul><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><em data-dcnode-id="610"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">NOTE:</span></strong><span data-dcnode-id="611" instrument_node=""> Additional antagonists are included in the template.</span></em></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="605"><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">&lt;First Last Name&gt; - Victim #1</span></strong></p><span data-dcnode-id="604" instrument_node="">
</span><ul data-dcnode-id="572"><span data-dcnode-id="603" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">&nbsp;If the killer kills anyone else in the course of the book, or if he has killed other people before the book started, list them here.</span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">&lt;how the person was killed&gt;</span></li><span data-dcnode-id="597" instrument_node="">
</span><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&lt;why the murderer killed them&gt;</span></li><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">&lt;how the murder was committed including when and where&gt;</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="590" instrument_node="">Relationship of the victim to the FMC and/or MMC.
</span><ul data-dcnode-id="576"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="588" instrument_node="">It’s common to have the FMC or the MMC become part of an investigation into the murder of a close friend or relative.
</span><ul data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">e.g. The MMC’s sister was killed by the serial killer. Now he’ll stop at nothing to find the killer and put him to justice.</span></li><span data-dcnode-id="584" instrument_node="">
</span></ul><span data-dcnode-id="582" instrument_node="">
</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Repeat this section for as many victims as you want.</span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><span data-dcnode-id="575" instrument_node="">
</span></li><span data-dcnode-id="573" instrument_node="">
</span></ul><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="570" instrument_node="">&nbsp;</span><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">&lt;Additional Characters&gt; – &lt;Role or relationship to other characters&gt;</span></strong></p><span data-dcnode-id="566" instrument_node="">
</span><ul data-dcnode-id="549"><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">&nbsp;This is a space to add supporting characters. Not suspects or main characters.</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="561" instrument_node="">If there are multiple other victims, you would add them here.
</span><ul data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">e.g. Maybe a sheriff’s deputy shows up in a scene by name. Put him here.</span></li><span data-dcnode-id="557" instrument_node="">
</span></ul><span data-dcnode-id="555" instrument_node="">
</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">These generally don’t have to be fully fleshed out, but you need to list them, so you don’t forget who’s who. If they are victims, then list how and when they were killed as well as why the killer</span></li><span data-dcnode-id="550" instrument_node="">
</span></ul><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="544"><strong data-dcnode-id="545"><u data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Setting</span></u></strong></p><span data-dcnode-id="543" instrument_node="">
</span><ul data-dcnode-id="514"><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Romantic suspense can take place in a small town or a big city.</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Make your setting interesting enough to carry a series. Although some romantic suspense is stand-alone, series still sell better.</span></li><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="535" instrument_node="">Town is located in &lt;cool or interesting location&gt;
</span><ul data-dcnode-id="518"><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Some readers will pick up a book just because they like the location, so pick something unique or interesting.</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Lots of options here. Think it through because you could be “stuck” with it for several books if your series takes off.</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="527" instrument_node="">Try to think of a location where you could have a lot of plot or murder options. The more people coming through the town, the better.
</span><ul data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">e.g. If you go with a small town, make sure it’s a tourist destination like a ski resort or a beach town.</span></li><span data-dcnode-id="523" instrument_node="">
</span></ul><span data-dcnode-id="521" instrument_node="">
</span></li><span data-dcnode-id="519" instrument_node="">
</span></ul><span data-dcnode-id="517" instrument_node="">
</span></li><span data-dcnode-id="515" instrument_node="">
</span></ul><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="509"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The Reader’s Primary Question in a Romantic Suspense Novel:</span></strong><span data-dcnode-id="510" instrument_node=""> Will the characters live long enough to fall in love and get their HEA?</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The template includes two complete 20 chapter outlines - One for the "Unknown Subject" plot type and one for the "Known Assailant" plot type.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="501"><strong data-dcnode-id="502"><u data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Plot Outline – Unknown Subject</span></u></strong></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Chapter 1 – Inciting Incident</span></strong></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Scene 1 (FMC Name - FMC POV)</span></strong></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="488"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Goal –</span></strong><span data-dcnode-id="489" instrument_node=""> Escape from the killer.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="483"><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="484" instrument_node="">The FMC is going about her normal day when she’s put in danger. She’s attacked either actively (someone’s shooting at her, trying to kidnap her, etc.) or passively (someone set her house on fire, but the bad guy isn’t in the house anymore). She needs to get out of danger before she’s killed. Her life should be in jeopardy from page 1.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="478"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Choice –</span></strong><span data-dcnode-id="479" instrument_node=""> How is she going to escape the killer?</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="473"><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Consequences –</span></strong><span data-dcnode-id="474" instrument_node=""> She fights like hell to escape the situation. She’s in serious trouble and she needs help. The scene ends with her still in jeopardy.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="468"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="469" instrument_node="">She’s terrified and confused. She doesn’t know why someone would want to hurt her.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Scene 2 (MMC Name - MMC POV)</span></strong></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="459"><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Goal –&nbsp;</span></strong><span data-dcnode-id="460" instrument_node="">Protect the FMC.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="454"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="455" instrument_node="">He’s pulled into the situation somehow. (e.g. The MMC is a firefighter who can tell it’s an arson fire because he can smell gasoline. He hears her screaming from somewhere inside the house.)</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="449"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Choice –</span></strong><span data-dcnode-id="450" instrument_node=""> Should he help her get out of immediate danger?</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="444"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Consequences –</span></strong><span data-dcnode-id="445" instrument_node=""> It’s in his nature to protect people, so he helps her get out of immediate danger. (E.g. He rushes into the burning house to save her.) There is an instant spark of attraction between them. (E.g. – The firefighter notes that she’s the most beautiful woman he’s ever seen even though she’s totally covered in soot from the fire.)</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="439"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="440" instrument_node="">His protective instincts take over and he risks his life to save her. He’s worried about her even if she’s a complete stranger</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">&nbsp;</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Chapter 2</span></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="428"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Scene 1 (FMC Name - FMC POV)</span></strong></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="423"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Goal –</span></strong><span data-dcnode-id="424" instrument_node=""> Try to make sense of what just happened.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="418"><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="419" instrument_node="">She has no idea why someone would try to kill her. She doesn’t know who she can trust or who she can turn to for help.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="413"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Choice –</span></strong><span data-dcnode-id="414" instrument_node=""> Should she trust the MMC?</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="408"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Consequences –</span></strong><span data-dcnode-id="409" instrument_node=""> Even if she already knows the MMC, she will have some reason why she can’t trust him. (E.g. She left him at the altar. How can she expect him to protect her after what she did to him?) There’s a spark of attraction between them, but for some reason, she’s unwilling to acknowledge it.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="403"><strong data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="404" instrument_node="">She’s afraid to get involved with the MMC for some reason so she’s left feeling scared and alone. She feels like she’s not going to be safe ever again. She’s ignoring the spark of attraction between them. Now is definitely not the time to be thinking about how hot the MMC is.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="399"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Scene 2 (MMC Name - MMC POV)</span></strong></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="394"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Goal –</span></strong><span data-dcnode-id="395" instrument_node=""> Find out why the FMC was attacked.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="389"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="390" instrument_node="">The MMC doesn’t believe that she has no idea why someone would want to attack her. He asks her questions about why she thinks someone attacked her. She tells him she doesn’t know why.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="384"><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Choice –</span></strong><span data-dcnode-id="385" instrument_node=""> Should he believe her?</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="379"><strong data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Consequences –</span></strong><span data-dcnode-id="380" instrument_node=""> He doesn’t believe her. Based on what happened during the attack in chapter 1, someone clearly wants the FMC dead. She must be hiding something.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="374"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="375" instrument_node="">He doesn’t trust her at all. She’s hiding something and he doesn’t like it.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">&nbsp;</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Chapter 3: Refusing the Call</span></strong></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="363"><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Scene 1 (FMC Name - FMC POV)</span></strong></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="358"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Goal –</span></strong><span data-dcnode-id="359" instrument_node=""> Get away from the MMC.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="353"><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="354" instrument_node="">She can tell that the MMC isn’t willing to help her beyond getting her out of immediate danger.</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="348"><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Choice –</span></strong><span data-dcnode-id="349" instrument_node=""> Should she try to get him to help her find out who’s trying to kill her?</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="343"><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Consequences –</span></strong><span data-dcnode-id="344" instrument_node=""> She has trust issues and doesn’t want the MMC to be involved. She thanks him for helping her get out of immediate danger but tells him that she doesn’t need his help anymore. She will deal with this situation herself.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="338"><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="339" instrument_node="">She doesn’t trust him. Instead of accepting any more help, she stubbornly decides that she alone can find out why someone is trying to kill her.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="334"><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Scene 2 (MMC Name - MMC POV)</span></strong></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="329"><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Goal –</span></strong><span data-dcnode-id="330" instrument_node=""> Don’t get emotionally involved in the situation.</span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="324"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="325" instrument_node="">For some reason, the MMC doesn’t want to get emotionally involved in the situation. (E.g. She’s his ex-fiancée and she left him at the altar. How can he trust her to listen to him?)</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="319"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Choice –</span></strong><span data-dcnode-id="320" instrument_node=""> Should he continue to help her?</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="314"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Consequences –</span></strong><span data-dcnode-id="315" instrument_node=""> Since his character type is the ultimate alpha protector, he’s going to try to help her even though she doesn’t want his help. However, he’s going to guard his heart against getting emotionally involved. He has good reason not to want to get emotionally involved. (E.g. He’s an FBI agent who got emotionally involved with a witness in a mob trial case. Because he was distracted by their relationship, he didn’t realize that his partner was on the mob’s payroll. His partner killed the witness. The MMC can’t afford to fall for another person he’s supposed to be protecting.) Ultimately, she rejects his help. She walks away from him at the end of this chapter.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="309"><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="310" instrument_node="">He’s willing to help her, but he’s not willing to get emotionally involved with her. He’s angry, frustrated, and/or annoyed because she doesn’t want his help.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">&nbsp;</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="302"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Chapter 4: Turning Point 1</span></strong></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="298"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Scene 1 (FMC Name - FMC POV)</span></strong></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="293"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Goal –</span></strong><span data-dcnode-id="294" instrument_node=""> Ask the MMC for help.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="288"><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="289" instrument_node="">The FMC can’t ignore the danger anymore. A second attempt is made on her life or the killer does something to scare her. (E.g. She comes out of the police station after refusing to let the cop follow her home to make sure she gets home safely. She finds a threatening note on her car.)</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="283"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Choice –</span></strong><span data-dcnode-id="284" instrument_node=""> Should she continue to be stubborn and refuse the MMC’s help?</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="278"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Consequences –</span></strong><span data-dcnode-id="279" instrument_node=""> She knows she needs help. She can’t fight back against a deranged killer by herself. She decides to accept the MMC’s help.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="273"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="274" instrument_node="">She’s shocked out of her stubbornness and is forced to ask for the MMC’s help. She doesn’t have anyone else she can turn to.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="269"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Scene 2 (MMC Name - MMC POV)</span></strong></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="264"><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Goal –</span></strong><span data-dcnode-id="265" instrument_node=""> Decide whether to help the FMC.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="259"><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Complication(s) – </span></strong><span data-dcnode-id="260" instrument_node="">The FMC comes to him and asks for his help.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="254"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Choice –</span></strong><span data-dcnode-id="255" instrument_node=""> Should he help her?</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="249"><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Consequences –</span></strong><span data-dcnode-id="250" instrument_node=""> He agrees to help her because it’s clear that she needs protection from the stalker/killer. She explains why he’s the only one who can help her.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="244"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">POV Character’s Feelings – </span></strong><span data-dcnode-id="245" instrument_node="">He’s still wary because she initially rejected his help. However, he knows she’s in terrible danger, so he’s going to set aside his worries and help her. He’s still keeping his heart guarded and he tells himself that he’s only doing this because she’s a woman in danger. It has nothing to do with that spark he felt when they met.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240"><b data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">END SAMPLE -&nbsp;But in the actual outline, you get a chapter by chapter breakdown for both of the romantic suspense plot types: Known Subject and Unknown Subject. 20 chapters each for a total of 40 chapters.</span></b></span></p><span data-dcnode-id="238" instrument_node="">
