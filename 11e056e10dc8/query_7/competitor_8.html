qfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=30%2C20&amp;ssl=1 30w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=570%2C380&amp;ssl=1 570w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?w=1200&amp;ssl=1 1200w" width="620"><noscript data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">&lt;img width="620" height="414" src="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=620%2C414&amp;#038;ssl=1" alt="ROMANTIC SUSPENSE" class="wp-image-4827" srcset="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=1024%2C683&amp;amp;ssl=1 1024w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=300%2C200&amp;amp;ssl=1 300w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=768%2C512&amp;amp;ssl=1 768w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=30%2C20&amp;amp;ssl=1 30w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?resize=570%2C380&amp;amp;ssl=1 570w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/Copy-of-Copy-of-30-Best-Heist-Books-Ever-written.png?w=1200&amp;amp;ssl=1 1200w" sizes="(max-width: 620px) 100vw, 620px" data-recalc-dims="1" /&gt;</span></noscript></figure><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2937" instrument_node="">Ever since my book FIND ME IN THE SNOW came out, I’ve been asked about other books in the genre. And there are lots of books out there but a few authors and book really stand out. I’ve done my fair share of reading romantic suspense novels. Here are the top 20 romantic suspense novels according to me. And of course, I added my own book to the list. </span><img alt="😉" class="emoji" data-dcnode-id="2936" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f609.svg&amp;raw"></p><span data-dcnode-id="2934" instrument_node="">
</span><h2 data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">20 BEST ROMANTIC SUSPENSE NOVELS</span></h2><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Here’s my list of the 20 best romantic suspense novels that you should read. </span></p><span data-dcnode-id="2928" instrument_node="">
</span><h3 data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Mr. Perfect</span></h3><span data-dcnode-id="2925" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2924" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB00AHE2Q8I%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_9CJ6Fb9H79NP0%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B00AHE2Q8I&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_9CJ6Fb9H79NP0&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">When four female colleagues at a Michigan corporation compile a list of qualities that would make up the perfect man, they unwittingly unleash a murderer who targets them for the perfect murder–one at a time.</span></p><span data-dcnode-id="2918" instrument_node="">
</span><h3 data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Naked in Death</span></h3><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2914" instrument_node="">In the year 2058, technology completely rules the world. But for New York City Detective Eve Dallas, one irresistible impulse still rules the heart: passion…</span><strong data-dcnode-id="2912"><br data-dcnode-id="2913"></strong><br data-dcnode-id="2911"><span data-dcnode-id="2910" instrument_node="">Eve Dallas is a New York police lieutenant hunting for a ruthless killer. In over ten years on the force, she has seen it all. And knows her survival depends on her instincts. She’s going against every warning telling her not to get involved with Roarke. An Irish billionaire—and a suspect in Eve’s murder investigation. But passion and seduction have rules of their own, and it’s up to Eve to take a chance in the arms of a man she knows nothing about.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2907" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB000P2A47M%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_bOJ6Fb4ZT79CA%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B000P2A47M&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_bOJ6Fb4ZT79CA&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2904" instrument_node="">
</span><h3 data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Rebecca</span></h3><span data-dcnode-id="2901" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2900" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB0074ALZ7Q%26preview%3Dnewtab%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_-SJ6FbJVQ7SFJ%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B0074ALZ7Q&amp;#038;preview=newtab&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_-SJ6FbJVQ7SFJ&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2894"><strong data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">“Last Night I Dreamt I went to Manderley Again…”</span></strong></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">With these words, the reader is ushered into an isolated gray stone mansion on the windswept Cornish coast, as the second Mrs. Maxim de Winter recalls the chilling events that transpired as she began her new life as the young bride of a husband she barely knew. For in every corner of every room were phantoms of a time dead but not forgotten—a past devotedly preserved by the sinister housekeeper, Mrs. Danvers: a suite immaculate and untouched, clothing laid out and ready to be worn, but not by any of the great house’s current occupants. With an eerie presentiment of evil tightening her heart, the second Mrs. de Winter walked in the shadow of her mysterious predecessor, determined to uncover the darkest secrets and shattering truths about Maxim’s first wife—the late and hauntingly beautiful Rebecca.</span></p><span data-dcnode-id="2890" instrument_node="">
</span><h3 data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Something About You</span></h3><span data-dcnode-id="2887" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2886" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB0030DHPAM%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_bZJ6FbGE37T6N%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B0030DHPAM&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_bZJ6FbGE37T6N&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Of all the hotel rooms rented by all the adulterous politicians in Chicago, female Assistant U.S. Attorney Cameron Lynde had to choose the one next to 1308, where some hot-and-heavy lovemaking ends in bloodshed. And of all the FBI agents in Illinois, it’s Special Agent Jack Pallas. The same Jack Pallas who still blames Cameron for a botched crackdown three years ago—and nearly ruining his career…</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Work with Cameron Lynde? Are they kidding? Maybe, Jack thinks, this is some kind of welcome-back prank after his stint away from Chicago. But it’s no joke: the pair is going to have to put their rocky past behind them and focus on the case at hand.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><h3 data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">The Guest List</span></h3><span data-dcnode-id="2874" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2873" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB07VBBWN2N%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_I6J6FbBFSFRP5%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B07VBBWN2N&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_I6J6FbBFSFRP5&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">The bride&nbsp;–&nbsp;The plus one&nbsp;–&nbsp;The best man&nbsp;– The wedding planner&nbsp;&nbsp;–&nbsp;The bridesmaid&nbsp;–&nbsp;The body</span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">On an island off the coast of Ireland, guests gather to celebrate two people joining their lives together as one. The groom: handsome and charming, a rising television star. The bride: smart and ambitious, a magazine publisher. It’s a wedding for a magazine, or for a celebrity: the designer dress, the remote location, the luxe party favors, the boutique whiskey. </span></p><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">But perfection is for plans, and people are all too human. As the champagne pops and the festivities begin, resentments and petty jealousies begin to mingle with the reminiscences and well wishes. And then someone turns up dead. Who didn’t wish the happy couple well? And perhaps more important, why?</span></p><span data-dcnode-id="2861" instrument_node="">
</span><h3 data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">BLACK ICE</span></h3><span data-dcnode-id="2858" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2857" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB003734NPK%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_daK6FbMTVGTN9%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B003734NPK&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_daK6FbMTVGTN9&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Chloe Underwood had come to Paris looking for adventure and landed up living hand-to-mouth as a children’s book translator. So when offered a lucrative weekend translating at an international business conference in a remote château, she leaps at the opportunity. Then Chloe discovers her employers aren’t the boring businessmen they seem.</span></p><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Suddenly, she’s running for her life from a group of international and highly illegal arms dealers. Now Chloe knows too much to be allowed to live.</span></p><span data-dcnode-id="2848" instrument_node="">
</span><h3 data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">TINDERBOX</span></h3><span data-dcnode-id="2845" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2844" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB01N968D7N%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_QgK6FbRZF08TX%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B01N968D7N&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_QgK6FbRZF08TX&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">While working on the Horn of Africa, archaeologist Morgan Adler’s work and life are threatened. This forces her to make a desperate dash to a nearby US military base to beg for protection. Green Beret Pax Blanchard has orders to intercept Dr. Adler before she reaches the base. In so doing saves her life, but his responsibilities toward protecting the woman have only just begun.</span></p><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Morgan and Pax are forced to work together in the scorching desert heat, but it is the fire that ignites between them that threatens to consume them both. One thing is certain, his job is no longer a matter of following orders, and he will risk everything to keep her safe.</span></p><span data-dcnode-id="2835" instrument_node="">
</span><h3 data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Her Darkest Nightmare</span></h3><span data-dcnode-id="2832" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2831" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB01DM0JHEE%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_flK6FbRM295TK%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B01DM0JHEE&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_flK6FbRM295TK&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2827" instrument_node="">Evelyn Talbot knows that a psychopath can look perfectly normal. She was only sixteen when her own boyfriend Jasper imprisoned and tortured her—and left her for dead. Now an eminent psychiatrist who specializes in the criminal mind, Evelyn is the force behind Hanover House, a maximum-security facility located in a small Alaskan town. Her job puts her at odds with Sergeant Amarok. He is convinced that Hanover is a threat to his community…even as his attraction to beautiful Evelyn threatens to tear his world apart.</span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">Then, just as the bitter Alaskan winter cuts both town and prison off from the outside world, the mutilated body of a local woman turns up. For Amarok, this is the final proof he needs: Hanover has to go.&nbsp;</span></p><span data-dcnode-id="2823" instrument_node="">
</span><h3 data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">THE WITNESS</span></h3><span data-dcnode-id="2820" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2819" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB007704SF4%26preview%3Dnewtab%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_QtK6FbNKDMAWP%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B007704SF4&amp;#038;preview=newtab&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_QtK6FbNKDMAWP&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Daughter of a cold, controlling mother and an anonymous donor, studious, obedient Elizabeth Fitch finally let loose one night, drinking too much at a nightclub and allowing a strange man’s seductive Russian accent to lure her to a house on Lake Shore Drive.</span></p><span data-dcnode-id="2813" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Twelve years later, the woman now known as Abigail Lowery lives alone on the outskirts of a small town in the Ozarks. A freelance security systems designer, her own protection is supplemented by a fierce dog and an assortment of firearms. She keeps to herself, saying little, revealing nothing. Unfortunately, that seems to be the quickest way to get attention in a tiny southern town.</span></p><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">The mystery of Abigail Lowery and her sharp mind, secretive nature and unromantic viewpoint intrigues local police chief Brooks Gleason, on both a personal and professional level. And while he suspects that Abigail needs protection from something, Gleason is accustomed to two-bit troublemakers, not the powerful and dangerous men who are about to have him in their sights.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">And Abigail Lowery, who has built a life based on security and self-control, is at risk of losing both.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><h3 data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Sister Dear</span></h3><span data-dcnode-id="2801" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="2800" frameborder="0" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.in/kp/card%3Fasin%3DB085G3FG3G%26preview%3Dinline%26linkCode%3Dkpe%26ref_%3Dcm_sw_r_kb_dp_6yK6FbEFE1RK2%26tag%3Dmobilead0e124-20&amp;raw" style="max-width:100%" type="text/html" width="212"></iframe><noscript data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B085G3FG3G&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_6yK6FbEFE1RK2&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">When Eleanor Hardwicke’s beloved father dies, her world is further shattered by a gut-wrenching secret: the man she’s grieving isn’t really her dad. Eleanor was the product of an affair and her biological father is still out there, living blissfully with the family he chose. With her personal life spiraling, a desperate Eleanor seeks him out, leading her to uncover another branch on her family tree—an infuriatingly enviable half sister.</span></p><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Perfectly perfect Victoria has everything Eleanor could ever dream of. Loving childhood, luxury home, devoted husband. All of it stolen from Eleanor, who plans to take it back. After all, good sisters are supposed to share. And quiet little Eleanor has been waiting far too long for her turn to play in this strange romantic suspense drama.</span></p><span data-dcnode-id="2791" instrument_node="">
</span><h3 data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Extreme Exposure</span></h3><span data-dcnode-id="2788" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2787" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B00PW5V90S&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_9AK6Fb57PRPQD&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B00PW5V90S&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_9AK6Fb57PRPQD&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">It’s been years since her child’s father dumped her, and since then Kara McMillan has kept men at bay – although every day she aches more for a lover’s touch. But to get that, the hard-boiled journalist must become vulnerable – a feeling she vowed never to have again.</span></p><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">With his dangerous good looks, charm, and power, Senator Reece Sheridan could have just about any woman he sets his piercing eyes on. But he’s intrigued by only one. This Kara, this gutsy investigative reporter, has a sensuality that arouses him to no end. If she’s a firebrand in print, he guesses, she must be just as fiery in bed…</span></p><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">But this is no fling. A sudden political scandal – and attempts on Kara’s life – could very well drive them apart.</span></p><span data-dcnode-id="2775" instrument_node="">
</span><h3 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Say You’re Sorry&nbsp;</span></h3><span data-dcnode-id="2772" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2771" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B01M7XPGYE&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_THK6FbHY2RX4X&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B01M7XPGYE&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_THK6FbHY2RX4X&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">After the devastating loss of her husband in Iraq, Morgan Dane returns to Scarlet Falls, seeking the comfort of her hometown in this romantic suspense. Now, surrounded by family, she’s finally found peace and a promising career opportunity—until her babysitter is killed and her neighbor asks her to defend his son, Nick, who stands accused of the murder.</span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Tessa was the ultimate girl next door, and the community is outraged by her death. But Morgan has known Nick for years and can’t believe he’s guilty, despite the damning evidence stacked against him. She asks her friend Lance Kruger, an ex-cop turned private eye, for help. Taking on the town, the police, and a zealous DA, Morgan and Lance plunge into the investigation, determined to find the real killer. But as they uncover secrets that rock the community, they become targets for the madman hiding in plain sight.</span></p><span data-dcnode-id="2762" instrument_node="">
</span><h3 data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Heartbreaker</span></h3><span data-dcnode-id="2759" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2753"><figure class="aligncenter size-large is-resized" data-dcnode-id="2754"><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Heartbreaker-Julie-Garwood/dp/0671034006/ref%3Dsr_1_1%3Fdchild%3D1%26keywords%3Dheartbreaker%2Bjulie%2Bgarwood%26qid%3D1609189807%26sr%3D8-1" rel="noopener" target="_blank"><img alt="" class="lazy lazy-hidden wp-image-4823" data-dcnode-id="2758" data-lazy-sizes="(max-width: 216px) 100vw, 216px" data-lazy-src="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=216%2C360&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?w=300&amp;ssl=1 300w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=180%2C300&amp;ssl=1 180w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=18%2C30&amp;ssl=1 18w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=228%2C380&amp;ssl=1 228w" data-lazy-type="image" data-recalc-dims="1" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg%3Ffit%3D18%252C30%26ssl%3D1&amp;raw" width="216"><noscript data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=216%2C360&amp;#038;ssl=1" alt="" class="wp-image-4823" width="216" height="360" srcset="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?w=300&amp;amp;ssl=1 300w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=180%2C300&amp;amp;ssl=1 180w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=18%2C30&amp;amp;ssl=1 18w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/13.jpg?resize=228%2C380&amp;amp;ssl=1 228w" sizes="(max-width: 216px) 100vw, 216px" data-recalc-dims="1" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2751" instrument_node="">In the still shadows of the confessional, the penitent kneels and makes a bone-chilling disclosure:&nbsp;</span><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Bless me father, for I will sin….</span></em><span data-dcnode-id="2748" instrument_node="">&nbsp;Slowly, tauntingly, the man describes his murderous past—how he stalked his victim, worked his way into her life, and then took that life in a violent rage—and his plan to kill again. Only this time, he has raised the stakes in his twisted game, daring authorities to catch him if they can. And this time, he has revealed the name of his next intended victim.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Agent Nick Buchanan has come face-to-face with society’s worst monsters and depraved minds in his work for one of the FBI’s most elite units, but The Heartbreaker threatens to hit close to home. The intended victim, Laurant Madden, is his best friend’s sister. One false move will cost both of them everything that matters.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><h3 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">LETHAL</span></h3><span data-dcnode-id="2740" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2739" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B005MZMZR4&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_3QK6Fb9YXRP96&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B005MZMZR4&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_3QK6Fb9YXRP96&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">When her four year old daughter informs her a sick man is in their yard, Honor Gillette rushes out to help him. But that “sick” man turns out to be Lee Coburn, the man accused of murdering seven people the night before. Dangerous, desperate, and armed, he promises Honor that she and her daughter won’t be hurt as long as she does everything he asks. She has no choice but to accept him at his word.</span></p><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Coburn claims that her beloved late husband possessed something extremely valuable: a treasure that places Honor and her daughter in grave danger. He’s there to retrieve it at any cost.</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Honor soon discovers that even her friends can’t be trusted. From the FBI offices of Washington, D.C. to a rundown shrimp boat in coastal Louisiana, Coburn and Honor run for their lives from the very people sworn to protect them, and unravel a web of corruption and depravity that threatens to destroy them . . . and the fabric of society.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><h3 data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Untraceable</span></h3><span data-dcnode-id="2724" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2723" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B002W83E92&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_fUK6Fb8VG0RE7&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B002W83E92&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_fUK6Fb8VG0RE7&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Private investigator Alexandra Lovell uses computer skills and cunning to help clients drop off the radar and begin new lives in safety. Melanie Bess, desperate to escape her abusive cop husband, was one of those clients. But when Melanie vanishes for real, Alex fears the worst, and sets out to discover what happened. Using every resource she can get her hands on — including an elite team of forensic scientists known as the Tracers, and a jaded, sexy Austin PD detective — Alex embarks on a mission to uncover the truth.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">As far as homicide cop Nathan Deveraux is concerned, no body means no case. But as much as he wants to believe that Alex’s hunch about Melanie’s murder is wrong, his instincts — and their visceral attraction — won’t let him walk away. As a grim picture of what really happened begins to emerge, Nathan realizes this investigation runs deeper than they could ever have guessed. And each step nearer the truth puts Alex in danger of being the next to disappear….in this fast paced romantic suspense.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><h3 data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">A Cold Dark Place</span></h3><span data-dcnode-id="2711" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2710" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B00IR4J6RY&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_zUM6Fb8NX9WT8&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B00IR4J6RY&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_zUM6Fb8NX9WT8&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Former CIA assassin Alex Parker works for a clandestine government organization hell-bent on taking out serial killers and pedophiles before they enter the justice system. Alex doesn’t enjoy killing, but he’s damn good at it.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">FBI Special Agent Mallory Rooney has spent years hunting the lowlife who abducted her identical twin sister eighteen years ago. Now, during an on-going serial killer investigation, Mallory begins to suspect there’s a vigilante operating outside the law.</span></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">When Mallory starts asking questions, Alex is ordered to watch her. As soon as they meet, the two begin to fall in love. But the lies and betrayals that define Alex’s life threaten to destroy them both—especially when the man who stole her sister all those years ago makes Mallory his next target.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><h3 data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Between Two Thieves</span></h3><span data-dcnode-id="2695" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2694" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B081Z3HXSZ&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_KeM6FbBR2ZRPQ&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B081Z3HXSZ&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_KeM6FbBR2ZRPQ&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">PI Eva Roberts is hired by former school friend Lauren Jaeger. Lauren’s cruel partner refuses to let her leave him but he will certainly kill her if she stays.</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">When a second body is found on the beach Lauren’s domestic case soon feels like a distraction… And what starts as a day of rest turns into nothing less than the beginning of a nightmare. Carl Renton was a good man, and a true hero. Norman Peters was a market trader and a colourful rogue.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Their murders appear to have nothing in common. But the truth goes deep into the heart of a crimewave which is tearing the town apart. The private detectives must track down a killer… but Eva’s case takes a dark twist at the worst possible time.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><h3 data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">No One Left to Tell</span></h3><span data-dcnode-id="2679" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2673"><figure class="aligncenter size-large is-resized" data-dcnode-id="2674"><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/No-One-Left-Tell-Baltimore/dp/0451236165/ref%3Dsr_1_1%3Fdchild%3D1%26keywords%3DNO%2BONE%2BLEFT%2BTO%2BTELL%26qid%3D1609196050%26sr%3D8-1" rel="noopener" target="_blank"><img alt="" class="lazy lazy-hidden wp-image-4825" data-dcnode-id="2678" data-lazy-sizes="(max-width: 225px) 100vw, 225px" data-lazy-src="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=225%2C362&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?w=310&amp;ssl=1 310w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=186%2C300&amp;ssl=1 186w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=19%2C30&amp;ssl=1 19w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=236%2C380&amp;ssl=1 236w" data-lazy-type="image" data-recalc-dims="1" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg%3Ffit%3D19%252C30%26ssl%3D1&amp;raw" width="225"><noscript data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">&lt;img loading="lazy" src="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=225%2C362&amp;#038;ssl=1" alt="" class="wp-image-4825" width="225" height="362" srcset="https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?w=310&amp;amp;ssl=1 310w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=186%2C300&amp;amp;ssl=1 186w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=19%2C30&amp;amp;ssl=1 19w, https://i0.wp.com/www.pamelaqfernandes.com/wp-content/uploads/2020/12/17.jpg?resize=236%2C380&amp;amp;ssl=1 236w" sizes="(max-width: 225px) 100vw, 225px" data-recalc-dims="1" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="2672" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">A car crashes in front of rookie PI Paige Holden’s home. And suddenly, she finds one of her pro bono clients dying in her arms—from a gunshot wound. With her last breath, the woman whispers cryptic words into her ear and hands her a blood-smeared flash drive.</span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Five years ago, State’s Attorney Grayson Smith put a murderer behind bars. But when Paige Holden shares the flash drive with him, its contents cast doubts on the conviction—and lead him and Paige into a world of blackmail, dark secrets, and a decades-long string of murders. An investigation they’ll survive only by trusting each other—and the truth in this romantic suspense novel.</span></p><span data-dcnode-id="2666" instrument_node="">
</span><h3 data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Never Look Back</span></h3><span data-dcnode-id="2663" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2662" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B07XJTDDC5&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_qpM6FbCYCJEHN&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B07XJTDDC5&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_qpM6FbCYCJEHN&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">After multiple women go missing, Agent Melina Shepard of the Tennessee Bureau of Investigation makes the impulsive decision to go undercover as a prostitute. While working the street, she narrowly avoids becoming a serial killer’s latest victim; as much as it pains her to admit, she needs backup.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Enter lone wolf FBI agent Jerrod Ramsey. Stonewalled by a lack of leads, he and Melina investigate a scene where a little girl has been found abandoned in a crashed vehicle. They open the trunk to reveal a horror show and quickly realize they’re dealing with two serial killers with very different MOs. The whole situation brings back memories for Melina—why does this particular case feel so connected to her painful past?</span></p><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Before time runs out, Melina must catch not one but two serial killers, both ready to claim another victim—and both with their sights set on her.</span></p><span data-dcnode-id="2650" instrument_node="">
</span><h3 data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">One Little Lie</span></h3><span data-dcnode-id="2647" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2646" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B07TD13L5F&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_1LM6FbWFSHZDY&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B07TD13L5F&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_1LM6FbWFSHZDY&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">When Jane Hardy is appointed interim sheriff in Pelican Harbor, Alabama, there’s no time for an adjustment period. He is arrested for theft and then implicated in a recent murder. Jane quickly realizes she’s facing someone out to destroy her father.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">They escaped from a cult fifteen years ago, and Jane has searched relentlessly for her mother—who refused to leave—ever since. Could someone from that horrible past have found them?</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Reid Bechtol is a well-known journalist who makes documentaries, and his sights are currently set on covering Jane’s career. Jane has little interest in the attention, but the committee who appointed her loves the idea of the publicity.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Jane finds herself depending on Reid’s calm manner as he follows her around taping his documentary, and they begin working together to clear her father. But Reid has his own secrets from the past, and the gulf between them may be impossible to cross.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">It started with one little lie. But Jane Hardy will do everything in her power to uncover the truth in this romantic suspense</span></p><span data-dcnode-id="2628" instrument_node="">
</span><h3 data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">The Glass Ocean</span></h3><span data-dcnode-id="2625" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2624" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B074Z5PYLN&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_2PM6Fb3TD02MH&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B074Z5PYLN&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_2PM6Fb3TD02MH&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2613"><em data-dcnode-id="2618"><span data-dcnode-id="2620" instrument_node="">May 2013</span><br data-dcnode-id="2619"></em><span data-dcnode-id="2617" instrument_node="">Her finances are in dire straits and bestselling author Sarah Blake is struggling to find a big idea for her next book. Desperate, she breaks the one promise she made to her Alzheimer’s-stricken mother. She opens her great-grandfather’s old chest. He who died when the RMS&nbsp;</span><em data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Lusitania</span></em><span data-dcnode-id="2614" instrument_node="">&nbsp;was sunk in 1915. What she discovers there could change history. Sarah embarks on an ambitious journey to England to enlist the help of John Langford, a recently disgraced Member of Parliament whose family archives might contain the only key to the long-ago catastrophe. . . .</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2604"><em data-dcnode-id="2609"><span data-dcnode-id="2611" instrument_node="">April 1915</span><br data-dcnode-id="2610"></em><span data-dcnode-id="2608" instrument_node="">Southern belle Caroline Telfair Hochstetter’s marriage is in crisis. Her formerly attentive industrialist husband, Gilbert, has become remote, pre-occupied with business . . . and something else that she can’t quite put a finger on. She’s hoping a trip to London in&nbsp;</span><em data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Lusitania</span></em><span data-dcnode-id="2605" instrument_node="">’s lavish first-class accommodations will help them reconnect—but she can’t ignore the spark she feels for her old friend, Robert Langford, who turns out to be on the same voyage. </span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2602" instrument_node="">Tessa Fairweather is traveling second-class on the&nbsp;</span><em data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Lusitania</span></em><span data-dcnode-id="2599" instrument_node="">, returning home to Devon. Or at least, that’s her story. Tessa has never left the United States and her English accent is a hasty fake. She’s really Tennessee Schaff, the daughter of a roving con man, and she can steal and forge just about anything. Her partner has promised that if they can pull off this one last heist aboard the&nbsp;</span><em data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Lusitania,</span></em><span data-dcnode-id="2596" instrument_node="">&nbsp;they’ll finally leave the game behind. Tess desperately wants to believe that, but Tess has the uneasy feeling there’s something about this job that isn’t as it seems. . . .</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node="">As the&nbsp;</span><em data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Lusitania</span></em><span data-dcnode-id="2590" instrument_node="">&nbsp;steams toward its fate, three women work against time to unravel a plot that will change the course of their own lives . . . and history itself.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><h3 data-dcnode-id="2585"><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pamelaqfernandes.com/book-trailer-find-me-in-the-snow/"><span data-dcnode-id="2587" instrument_node="">FIND ME IN THE SNOW</span></a></h3><span data-dcnode-id="2584" instrument_node="">
</span><img alt="" class="lazy lazy-hidden" data-dcnode-id="2583" data-lazy-src="<iframe loading=&quot;lazy&quot; type=&quot;text/html&quot; width=&quot;212&quot; height=&quot;362&quot; frameborder=&quot;0&quot; allowfullscreen style=&quot;max-width:100%&quot; src=&quot;https://read.amazon.in/kp/card?asin=B08NDSHH4D&amp;preview=inline&amp;linkCode=kpe&amp;ref_=cm_sw_r_kb_dp_xSM6FbEWDJDGA&amp;tag=mobilead0e124-20&quot; ></iframe>" data-lazy-type="iframe" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">&lt;iframe loading="lazy" type="text/html" width="212" height="362" frameborder="0" allowfullscreen style="max-width:100%" src="https://read.amazon.in/kp/card?asin=B08NDSHH4D&amp;#038;preview=inline&amp;#038;linkCode=kpe&amp;#038;ref_=cm_sw_r_kb_dp_xSM6FbEWDJDGA&amp;#038;tag=mobilead0e124-20" &gt;&lt;/iframe&gt;</span></noscript><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">When Althea meets Morgan Hunter at Muldoon’s pub for the first time, she thinks he’s a handsome, ego tripping, prissy-pants executive. She quickly rebuffs him only to find him thundering at her in the operation theater, the very next day. He’s dogged in his censure of her, but not immune to her allure. Through a snowy December Morgan courts Althea and wins her heart but not her trust.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">When she travels with him at his request for Christmas to his home in Finesse, a tumble in the snow leads to the discovery of Morgan’s missing ex-girlfriend. Dead. Morgan pushes Althea away and she doesn’t understand his reasons.</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Althea returns to build the new rural clinic in Finesse. She discovers the truth about Morgan’s heritage, the murdered ex-girlfriend and the secrets about the Hunter clan.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Can she save the man she loved from going to prison?</span></p><span data-dcnode-id="2568" instrument_node="">
</span><h2 data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Your Favorite Romantic Suspense?</span></h2><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Do you have a favorite romantic suspense novel? Are you one of those who enjoys sparks flying between your leads. Most romantic suspense novels have elements of romance but also lots of mystery. If you have  favorite, share it with me and I’ll add it to my list!</span></p><span data-dcnode-id="2562" instrument_node="">
