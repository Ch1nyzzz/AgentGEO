</span><div class="jet-listing jet-listing-dynamic-field display-inline" data-dcnode-id="2063"><div class="jet-listing-dynamic-field__inline-wrap" data-dcnode-id="2064"><div class="jet-listing-dynamic-field__content" data-dcnode-id="2065"><p data-dcnode-id="2067"><span data-dcnode-id="2080" instrument_node="">Jean Hanff Korelitz is the author of psychological suspense novels, including </span><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">The Devil and Webster </span></em><span data-dcnode-id="2077" instrument_node="">and </span><em data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">You Should Have Known, </span></em><span data-dcnode-id="2074" instrument_node="">the bestselling thriller that served as the basis for HBO’s </span><em data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">The Undoing</span></em><span data-dcnode-id="2071" instrument_node="">. Her latest tale of suspense will keep you reading long into the night with its rich character development and twisty plot. Jacob Finch Bonner is a washed-up writing professor who hasn’t published anything decent in years. When Evan Parker, one of Jacob’s more arrogant students, lays out the plot of his novel-in-progress, Jacob </span><em data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">knows </span></em><span data-dcnode-id="2068" instrument_node="">it’s going to be huge. But when Evan dies before completing his narrative, Jacob decides to steal the premise and present it as his own. Sure enough, Jacob was right: He becomes a household name after publishing his latest work of fiction. Then, just as he’s reaching the height of fame, he receives a shocking message that threatens to expose him: “You are a thief.” Who else knows about his stolen plot, and just who was Evan Parker?</span></p><span data-dcnode-id="2066" instrument_node="">
