</span><h1 class="introH1" data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">Suspense</span></h1><span data-dcnode-id="6170" instrument_node="">, one of the longest running and most successful radio series ever produced, employed some of Hollywood's foremost actors to bring its riveting stories to life. Extremely well produced and directed, Suspense represents the pinnacle of the medium. Over 900 episodes were broadcast between 1942 and 1962. The majority were crime dramas, but the producers often ventured into the Science Fiction, Adventure, and Horror genres as well.</span><br data-dcnode-id="6169"><span data-dcnode-id="6168" instrument_node="">
</span><br data-dcnode-id="6167"><span data-dcnode-id="6166" instrument_node="">

</span><h3 class="title titleSuspense" data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">ABC Murders, The</span></h3><span data-dcnode-id="6077" instrument_node="">
</span><div class="citation" data-dcnode-id="6064"><span data-dcnode-id="6076" instrument_node="">
		Year: 1943
		</span><br data-dcnode-id="6075"><span data-dcnode-id="6074" instrument_node="">
		Duration: 30 min
		</span><br data-dcnode-id="6073"><span data-dcnode-id="6072" instrument_node="">
		Genre: Mystery
        </span><br data-dcnode-id="6071"><span data-dcnode-id="6070" instrument_node="">
        Available for Listening Booth: Y
		</span><br data-dcnode-id="6069"><span data-dcnode-id="6068" instrument_node="">
		Story by: </span><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/famousAuthors.html%23agathaChristie"><span data-dcnode-id="6067" instrument_node="">Agatha Christie</span></a><span data-dcnode-id="6065" instrument_node="">
</span></div><span data-dcnode-id="6063" instrument_node="">
</span><p class="plot" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">
Alexander Bonaparte Cust is a traveling salesman who is prone to blackouts due to a previous head injury. At first his headaches and lapses in memory were just a nuisance, but lately whenever Cust travels to a new town and experiences one of these blackouts, someone ends up dead! Could he be the infamous ABC murderer?
	</span></p><span data-dcnode-id="6060" instrument_node="">
</span><div class="review" data-dcnode-id="6056"><span data-dcnode-id="6059" instrument_node="">
		Reviews:</span><br data-dcnode-id="6058"><span data-dcnode-id="6057" instrument_node="">
Does an admirable job condensing the novel into a scant thirty minutes, but purists will be upset that Hercule Poirot is nowhere to be found—removing the famed detective in favor of focusing on the character Cust. However, this works in the adaptation's favor as Cust is far more complex, changing the story into what would have been a rushed detective story into a gripping psychological thriller. The ending remains a jaw-dropping surprise. [9/10] --- David Schwenker
	</span></div><span data-dcnode-id="6055" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">Action</span></h3><span data-dcnode-id="6052" instrument_node="">
</span><div class="citation" data-dcnode-id="6042"><span data-dcnode-id="6051" instrument_node="">
		Year: 1953
		</span><br data-dcnode-id="6050"><span data-dcnode-id="6049" instrument_node="">

    </span></div><span data-dcnode-id="6041" instrument_node="">
</span><p class="plot" data-dcnode-id="6032"><span data-dcnode-id="6040" instrument_node="">
Following a stroke, a wealthy financier decides to climb an unassailable glacier in the Swiss Alps.</span><br data-dcnode-id="6039"><span data-dcnode-id="6038" instrument_node="">
</span><br data-dcnode-id="6037"><span data-dcnode-id="6036" instrument_node="">
Another version of this story appeared on </span><a data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/escape.html"><span data-dcnode-id="6035" instrument_node="">Escape</span></a><span data-dcnode-id="6033" instrument_node="">.
	</span></p><span data-dcnode-id="6031" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">Actor's Blood</span></h3><span data-dcnode-id="6028" instrument_node="">
</span><div class="citation" data-dcnode-id="6015"><span data-dcnode-id="6027" instrument_node="">
		Year: 1944
		</span><br data-dcnode-id="6026"><span data-dcnode-id="6025" instrument_node="">
		Duration: 30 min
		</span><br data-dcnode-id="6024"><span data-dcnode-id="6023" instrument_node="">
		Genre: Crime / Mystery
        </span><br data-dcnode-id="6022"><span data-dcnode-id="6021" instrument_node="">
        Available for Listening Booth: Y
		</span><br data-dcnode-id="6020"><span data-dcnode-id="6019" instrument_node="">
		Story by: </span><a data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/famousAuthors.html%23benHecht"><span data-dcnode-id="6018" instrument_node="">Ben Hecht</span></a><span data-dcnode-id="6016" instrument_node="">
</span></div><span data-dcnode-id="6014" instrument_node="">
</span><p class="plot" data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">
A veteran stage actor not only believes that his daughter's supposed suicide was actually murder but also believes that he knows who did it. He decides to host a fancy dinner—inviting all his daughter's friends and theatrical co-workers—where he will expose his daughter's killer.
	</span></p><span data-dcnode-id="6011" instrument_node="">
</span><div class="review" data-dcnode-id="6007"><span data-dcnode-id="6010" instrument_node="">
		Reviews:</span><br data-dcnode-id="6009"><span data-dcnode-id="6008" instrument_node="">
Frederic March gives a wonderful and appropriately exaggerated performance as a rather hammy 'past-his-prime' actor. The theatrical trappings add a unique flavor to the proceedings, but the plot itself is underwhelming if only for an ending that—while unexpected—is unsatisfying and anti-climatic. [6/10] --- David Schwenker
	</span></div><span data-dcnode-id="6006" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">After-Dinner Story</span></h3><span data-dcnode-id="6003" instrument_node="">
</span><div class="citation" data-dcnode-id="5990"><span data-dcnode-id="6002" instrument_node="">
		Year: 1943
		</span><br data-dcnode-id="6001"><span data-dcnode-id="6000" instrument_node="">
		Duration: 30 min
		</span><br data-dcnode-id="5999"><span data-dcnode-id="5998" instrument_node="">
		Genre: Mystery / Thriller
        </span><br data-dcnode-id="5997"><span data-dcnode-id="5996" instrument_node="">
        Available for Listening Booth: Y
		</span><br data-dcnode-id="5995"><span data-dcnode-id="5994" instrument_node="">
		Story by: </span><a data-dcnode-id="5992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/famousAuthors.html%23cornellWoolrich"><span data-dcnode-id="5993" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="5991" instrument_node="">
</span></div><span data-dcnode-id="5989" instrument_node="">
</span><p class="plot" data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">
An elevator plummets to the ground, trapping five men in the ensuing rubble. When the men are finally rescued, one of them has been shot. The remaining four claim they saw nothing. The police think it's suicide. The victim's father thinks it's murder and sets out to prove it.
	</span></p><span data-dcnode-id="5986" instrument_node="">
</span><div class="review" data-dcnode-id="5982"><span data-dcnode-id="5985" instrument_node="">
		Reviews:</span><br data-dcnode-id="5984"><span data-dcnode-id="5983" instrument_node="">
The radio adaptation changes the structure of the original story—for instance, now we know the result of the elevator crash before it even happens—thus diminishing it's impact. Nevertheless, the story itself is so well thought-out that it can't help but remain gripping with its truly fascinating premise that actually pays off in the end. Solid storytelling, despite the manhandling—Woolrich does it again! [8/10] --- David Schwenker
	</span></div><span data-dcnode-id="5981" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">Allan in Wonderland</span></h3><span data-dcnode-id="5978" instrument_node="">
</span><div class="citation" data-dcnode-id="5968"><span data-dcnode-id="5977" instrument_node="">
		Year: 1952
		</span><br data-dcnode-id="5976"><span data-dcnode-id="5975" instrument_node="">
		Duration: 30 min

This thirty minute adaptation does an admirable job condensing the novel, removing the amateur sleuth Nigel Strangeways entirely from the story to focus simply on the father Frank Cairnes and his mission to find and kill the hit-and-run driver—a decision that the French film adaptation made as well. As a result, the story surprisingly works better as we now focus on the people actually involved in the crime instead of following a detective not intimately connected to the other characters—consequently, the story becomes much more psychological and engaging. Admittedly, the ending is slightly convoluted with its presentation of four consecutive twists, but it's undeniably clever and unexpected. Interestingly, the French film does *not* possess the same denouement as the radio adaptation. [9/10] --- David Schwenker

Robert A. Arthur's eerie script, coupled with actor Robert Readick's off-kilter line readings, makes this the best horror story from the series' final years. It plays almost like a lost episode of </span><em data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">Quiet, Please</span></em><span data-dcnode-id="5622" instrument_node="">, minus Wyllis Cooper's quirks, with every plot twist taking you deeper into weirdness. --- Anonymous

</span><br data-dcnode-id="5599"><span data-dcnode-id="5598" instrument_node="">
Based on the novel by Cornell Woolrich, two versions were produced for </span><em data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">Suspense</span></em><span data-dcnode-id="5595" instrument_node="">—the first in 1944 with Brian Donlevy and the second in 1946 with Cary Grant. Also in 1946, the novel was very loosely adapted onto film as "The Chase" with Robert Cummings—a movie which is remarkably different from its source material.
	</span></p><span data-dcnode-id="5593" instrument_node="">
</span><div class="review" data-dcnode-id="5589"><span data-dcnode-id="5592" instrument_node="">
		Reviews:</span><br data-dcnode-id="5591"><span data-dcnode-id="5590" instrument_node="">
Entertaining innocent-man-on-the-run thriller that starts off with a bang as our framed hero discovers his lover is dead, that he's been implicated, and that he must now escape from police custody and run through the streets of Cuba to search for both the real killer and a place to hide from the authorities. It begins to falter, however, when it introduces a second love interest—a prostitute named Midnight—whose relationship with Bill strains credibility. Also, despite the fact that Bill Scott appears to be in an entirely hopeless situation, everything is resolved faster than that which is plausible—a possible result of trying to adapt an entire novel into only thirty minutes. Great first half, muddled second half, but still worth a listen. [7/10] --- David Schwenker
	</span></div><span data-dcnode-id="5588" instrument_node="">

Susan Applebie is enjoying herself at a fair where an elderly woman named Elizabeth Masters approaches her and offers her a job—she would like to hire Susan as a companion who will simply live at her house in order to give her company. Being that the money is so much for doing so little, Susan agrees and promptly moves in the next day. All is well until she begins to believe that there is someone else hidden in the house and that she seems unable to leave...

Very entertaining but wholly excessive and overblown. Starts off with a chilling impression of mystery—who is the stranger hiding in the house? why does she feel like she's being held captive? what happened to the other women who were the old woman's previous companions?—that hooks you and keeps you engaged, but the revelation near the end is utterly ridiculous and the resolution is overdone, overwrought, and over-the-top in all respects. You'll most likely chuckle at the absurdities, but these qualities undeniably provide delicious and guilt-ridden entertainment. A real guilty pleasure. [7/10] --- David Schwenker

Adapted from the Robert Louis Stevenson story. Other versions were produced for </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/nightfall.html"><span data-dcnode-id="5494" instrument_node="">Nightfall</span></a><span data-dcnode-id="5492" instrument_node=""> and </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/cbsrmt.html"><span data-dcnode-id="5491" instrument_node="">CBS Radio Mystery Theater</span></a><span data-dcnode-id="5489" instrument_node="">.

This story has been adapted more times than I can count and this telling isn't particularly noteworthy in relation to the others. [5/10] --- David Schwenker</span><br data-dcnode-id="5483"><span data-dcnode-id="5482" instrument_node="">
</span><br data-dcnode-id="5481"><span data-dcnode-id="5480" instrument_node="">
Er... I would say this story was 'inspired' by the Robert Louis Stevenson tale, rather than an adaptation of it. The RLS story is a psychological tale which focuse on the medical student, his actions, and his remorse. This tale focuses on the snatchers, themselves. There is no medical student, but there is a doctor and a police officer. And the ending is quite different. It is not a bad story, but it does seem uninspired. It is noteworthy just because it is so different from any of the other 'adaptations' I have heard. Both the Nightfall and CBS Radio Mystery Theater adaptations are much better. [6/10] --- zM
	</span></div><span data-dcnode-id="5478" instrument_node="">

	</span></div><span data-dcnode-id="5453" instrument_node="">

Reginald Parker is an actor who's growing weary playing the character Edward Grey, the titular lead role of  "The Brighton Strangler". After his final performance, Reginald leaves the London theater only to get caught in a bombing blitz. Due to falling rubble, his head is injured and he becomes very disoriented... and starts to believe he's Edward Grey, the Brighton strangler!</span><br data-dcnode-id="5437"><span data-dcnode-id="5436" instrument_node="">
</span><br data-dcnode-id="5435"><span data-dcnode-id="5434" instrument_node="">
The two lead actors—John Loder and June Duprez—reprise their roles of Reginald Parker and April Carson which they respectively played in the movie "The Brighton Strangler" produced the same year (though not released until 1945).
	</span></p><span data-dcnode-id="5432" instrument_node="">
</span><div class="review" data-dcnode-id="5428"><span data-dcnode-id="5431" instrument_node="">
		Reviews:</span><br data-dcnode-id="5430"><span data-dcnode-id="5429" instrument_node="">
The film which this radio adaptation is based upon seems to be part of what strangely must have been a popular trend at the time —to focus upon artists who blackout and assume their ulterior identities, such as in  "A Double Life" (1947) and "Hangover Square" (1945). Neither the film nor the radio adaptation are as interesting as the previously mentioned titles, but they remain enjoyable enough and do possess a unique atmosphere—war-torn London during a snowy Christmas eve. Fairly routine but entertaining as well. [6/10] --- David Schwenker
	</span></div><span data-dcnode-id="5427" instrument_node="">

An editor reads a book about famous murderers and is horrified to see a picture of a murderess burned at the stake many years ago—a woman who looks exactly like his wife.</span><br data-dcnode-id="5408"><span data-dcnode-id="5407" instrument_node="">
</span><br data-dcnode-id="5406"><span data-dcnode-id="5405" instrument_node="">
Later adapted as the feature film "La Chambre Ardente" in 1962.

Based upon John Dickson Carr's novel—arguably his best—the episode admittedly suffers from trying to fit too much plot in too short of time (condensing a novel in thirty minutes is no easy task), but regardless the story hooks you from the very beginning with its intriguing premise and has many twists and turns to keep you engaged throughout. Simply great storytelling. Just a note on the two versions—I slightly prefer the 1945 broadcast with Clifton Webb over the 1942 broadcast with Charlie Ruggles. [9/10] --- David Schwenker
	</span></div><span data-dcnode-id="5398" instrument_node="">

</span><h3 class="title titleSuspense" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">Cabin B-13</span></h3><span data-dcnode-id="5393" instrument_node="">
</span><div class="citation" data-dcnode-id="5380"><span data-dcnode-id="5392" instrument_node="">
		Year: 1943

		Duration: 30 min
		</span><br data-dcnode-id="5389"><span data-dcnode-id="5388" instrument_node="">

        </span><br data-dcnode-id="5387"><span data-dcnode-id="5386" instrument_node="">

</span><p class="plot" data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">
Newlyweds board an ocean liner and the groom promptly disappears without a trace. Is the bride crazy? Or is there a sinister conspiracy against her?
	</span></p><span data-dcnode-id="5376" instrument_node="">
</span><div class="review" data-dcnode-id="5358"><span data-dcnode-id="5375" instrument_node="">
		Reviews:</span><br data-dcnode-id="5374"><span data-dcnode-id="5373" instrument_node="">
The most memorable and satisfying of John Dickson Carr's original scripts for this series, most of which are "impossible crime" mysteries that sometimes hint at the supernatural, but ultimately conclude with rational solutions. This one is just as contrived as the others, but works better dramatically, probably because the heroine's predicament is so gripping. --- Anonymous</span><br data-dcnode-id="5372"><span data-dcnode-id="5371" instrument_node="">
</span><br data-dcnode-id="5370"><span data-dcnode-id="5369" instrument_node="">
Arguably John Dickson Carr's greatest contribution to </span><em data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">Suspense</span></em><span data-dcnode-id="5366" instrument_node="">. An engrossing mystery that truly keeps you guessing and a strong central performance by Margo as the woman-in-distress proves a recipe for success. Simply great storytelling. Only caveat is its complicated ending, but would we expect anything else from Carr? Resulted in being such a success that it spawned another entire radio series for Carr (also called </span><em data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Cabin B-13</span></em><span data-dcnode-id="5363" instrument_node="">) and was later adapted for film as "Dangerous Crossing". [9/10] --- David Schwenker</span><br data-dcnode-id="5362"><span data-dcnode-id="5361" instrument_node="">
</span><br data-dcnode-id="5360"><span data-dcnode-id="5359" instrument_node="">
First rate "impossible" mystery, written by John Dickson Carr, and superbly acted by all. Margo and Philip Dorn stand out as the damsel in distress whose husband has mysteriously disappeared (or has he?), and  Mr. Dorn shines as the one man who saves the day. Excellent in every way. [10/10] --- Jerry Underwood
	</span></div><span data-dcnode-id="5357" instrument_node="">

A disillusioned correspondent photographs a man in a bar, and must discover why his subject reacts so violently.

Corny propaganda for the consumption of the victorious American public. --- Seth Gaines</span><br data-dcnode-id="5023"><span data-dcnode-id="5022" instrument_node="">
</span><br data-dcnode-id="5021"><span data-dcnode-id="5020" instrument_node="">
Starts off intriguingly enough—why is the man so obsessed with getting the negative?—and the breezy coastal setting of Portugal adds a nice flavor to the proceedings, but it unfortunately devolves into just another routine piece of propaganda, complete with broad stereotypes and standard patriotic sermonizing. However, it's interesting to note that even though this episode aired in 1944, the story actually takes place after the end of the war, thus the narrative is imagining what the immediate post-war process would be like. A curious facet to the production, but the fact that it's coupled with a disappointing plot still prevents it from being anything but mediocre. [5/10] --- David Schwenker
	</span></div><span data-dcnode-id="5018" instrument_node="">

Jimmy Barton's younger sister, Helen, is married to a violent man named Phil Armstrong. Helen wants to escape from her abusive husband so Jimmy helps her go into hiding. Unfortunately, Phil follows after them. One day, Jimmy returns to their hideout and finds Phil dead on the floor with Helen in a hysterical state. To protect his sister even more, he now must dispose of the body in such a manner that neither one of them can be blamed.
	</span></p><span data-dcnode-id="4999" instrument_node="">
</span><div class="review" data-dcnode-id="4992"><span data-dcnode-id="4998" instrument_node="">
		Reviews:</span><br data-dcnode-id="4997"><span data-dcnode-id="4996" instrument_node="">
Tightly wound thriller whose yarn is wrapped around one of the more popular motifs of </span><em data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">Suspense</span></em><span data-dcnode-id="4993" instrument_node="">—body disposal. Though it may not offer anything new to its well-worn narrative device, its writing is razor sharp and quite resourceful in wringing out as much nail-biting tension as possible from its scenario, perhaps straining credibility in the process but also enabling it to maintain a constant fever pitch of tension. A highly entertaining thrill ride. [8/10] --- David Schwenker
	</span></div><span data-dcnode-id="4991" instrument_node="">

Carr is a master at devising ingenious premises, but the narratives don't always express the same ingenuity. Here, the premise is admittedly attention-grabbing, but the actual story is utterly silly and preposterous, lacking any plausibility or credibility. A missed opportunity. [4/10] --- David Schwenker
	</span></div><span data-dcnode-id="4966" instrument_node="">

</span><p class="plot" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">
The flight crew discover a dead body on a plane, but that's just the beginning of their troubles as they also discover they're flying off course, the pilots have disappeared, and a Nazi spy is among the passengers.
	</span></p><span data-dcnode-id="4946" instrument_node="">
</span><div class="review" data-dcnode-id="4942"><span data-dcnode-id="4945" instrument_node="">
		Reviews:</span><br data-dcnode-id="4944"><span data-dcnode-id="4943" instrument_node="">
The narrow scope of the story—the entire tale takes place on the airplane—generates a genuine sense of claustrophobia, and the plot revelations manage to add to that a palpable feeling of paranoia and desperation. However, given that this is primarily war time propaganda, there are some strained moments of overt patriotism and general stereotyping, but the strong storytelling overcomes these momentary lapses in exhortation and makes it a very entertaining ride. Certainly worth a listen. [7/10] --- David Schwenker
	</span></div><span data-dcnode-id="4941" instrument_node="">

</span><br data-dcnode-id="4853"><span data-dcnode-id="4852" instrument_node="">

A simple but intriguing premise that plays out very well. The setting features dark and lonely roads in the vast open space of deserted highways—all which add a palpable sense of isolation and helplessness. Gene Kelly is rather good as the bewildered George, who is constantly looking over his shoulder and only a few paces ahead of danger. It may be just a modest production—it doesn't have much of a story to tell—but the small story it does tell unfolds with rich atmosphere and tense suspense. [8/10] --- David Schwenker
	</span></div><span data-dcnode-id="4842" instrument_node="">

An ex-con named Robert Tasca gets a job working for law partners Max Krieger and Arthur Hines, the latter being the one who sent Tasca to prison in the first place. When Hines is murdered, Tasca falls under suspicion and must now clear his name before he is sentenced once again.</span><br data-dcnode-id="4826"><span data-dcnode-id="4825" instrument_node="">

A fine suspense yarn that offers some precarious situations, a few red herrings, and a fairly surprising culprit. Even though the method in which the culprit is actually captured may be a little too convenient, the proceedings are so light and breezy you probably won't have any qualms with it. A modest production that aims to provide moderate thrills and does exactly that—no more and no less. [7/10] --- David Schwenker

</span><span class="authors" data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">John Dickson Carr</span></span><span data-dcnode-id="4765" instrument_node="">'s scripts are typically literate, complex, highly unlikely, and full of clever misdirection. This is one of his better episodes, thanks in part to the sinister presence of actor </span><span class="actors" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">Peter Lorre</span></span><span data-dcnode-id="4762" instrument_node=""> and an unexpected, more-satisfying-than-usual conclusion. --- Anonymous</span><br data-dcnode-id="4761"><span data-dcnode-id="4760" instrument_node="">

</span><div class="review" data-dcnode-id="4139"><span data-dcnode-id="4154" instrument_node="">

(A+) for production. The sound effects convey the time period perfectly and the acting is first class. The story line is eerie and you're not sure if it's a ghost story or a crime drama until the last couple of minutes. Price is the perfect charming widower and reserved lunatic. --- Gary Zech</span><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">
</span><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node="">
The story is good, but Vincent Price is fantastic and the sound effects are tremendous. Sometimes, the right actor can make all the difference and that's the case here. --- Clarence Grigsby</span><br data-dcnode-id="4147"><span data-dcnode-id="4146" instrument_node="">
</span><br data-dcnode-id="4145"><span data-dcnode-id="4144" instrument_node="">
Lucille Fletcher is up to her usual bag of tricks in this Gothic melodrama that delivers all the goods one would expect from the overwrought sub-genre—gloomy mansion, foreboding mystery, brooding male figure, ghostly haunting—but it also doesn't do anything different—really, it's just another variation on the BLUEBEARD theme. Though that may prevent it from being anything exceptional, it does capture the grotesque excess of the genre perfectly—especially in Vincent Price's hammy performance—turning it into a listening pleasure despite the conventional plotting. [7/10] --- David Schwenker</span><br data-dcnode-id="4143"><span data-dcnode-id="4142" instrument_node="">
</span><br data-dcnode-id="4141"><span data-dcnode-id="4140" instrument_node="">
A terrific pairing: Ida Lupino is poised and polished as the smart Victorian lady and Vincent Price is Vincent Price as the potential husband who may be an insane murderer. Or maybe his kids are insane. As with "Sorry, Wrong Number," author Lucille Fletcher keeps you guessing before delivering another excellent double-whammy climax. - Anonymous

</span><br data-dcnode-id="3893"><span data-dcnode-id="3892" instrument_node="">
The scariest radio episode ever—no contest, because I listened to this while driving during the daytime, and I was still scared stiff! --- David Hassell</span><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">
</span><br data-dcnode-id="3889"><span data-dcnode-id="3888" instrument_node="">
Probably Suspense's greatest episode, "The House In Cypress Canyon" is radio's all time scariest show (maybe next to Quiet, Please's "The Thing on the Fourble Board"). If you're looking for a chill, Hell, their ain't nothing scarier than "The House In Cypress Canyon". --- Luc L'Heureux</span><br data-dcnode-id="3887"><span data-dcnode-id="3886" instrument_node="">
</span><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">
Wait for a dark, rainy night to turn out the lights and listen to this one! Absolutely frightening, the perfect scary radio show! --- Clarence Grigsby</span><br data-dcnode-id="3883"><span data-dcnode-id="3882" instrument_node="">
</span><br data-dcnode-id="3881"><span data-dcnode-id="3880" instrument_node="">
I started to listen to this one several years ago but stopped because the sound quality was poor and the story, frankly, wasn't very scary. But I recently downloaded a different version—with excellent sound quality—and I have to say the sound quality makes a </span><strong data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">huge</span></strong><span data-dcnode-id="3877" instrument_node=""> difference. The creaking doors... the unearthly howls... the exacting descriptions... are all much, much, scarier! Raised the hairs on my arms. (9/10) --- zM

Potentially decent premise is fatally marred by sloppy, lazy writing and annoyingly unbelievable plot and characters. Why would the female reporter wear red when she knows the killer only slaughters women who wear red? Why does the columnist ramble on to the others about how any one of them could be the killer when he has only the vaguest, most unconvincing evidence? Why would the killer risk everything by inviting a detective if the plan was to murder someone else? It's just one dumb thing after another. Arrrgghh! --- Anonymous

Ah, the good old days when you could easily board a plane under an assumed name at the last minute and sit anywhere you liked. The extremely competent, independent-minded, coolheaded heroine (who solves the murders of two other competent professional women) is a refreshing change from the thriller genre's endless line of nasty femme fatales and tearful damsels in distress. The mystery plot is enticingly complex without being too convoluted. The final confrontation scene feels a bit off, but this is a pretty solid episode otherwise, with mostly decent acting and sound effects. --- Anonymous&nbsp;

Doctor Bronson believes there a five basic checks that prevent a person from murdering another. Obsessed with proving his theory, he finds five different people and tries to convince them to commit murder—confident that one of the five checks will prevent his subject from doing so. Unfortunately, his theory is not proven as planned. </span><br data-dcnode-id="3576"><span data-dcnode-id="3575" instrument_node="">

Three versions were produced for </span><em data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Suspense</span></em><span data-dcnode-id="3570" instrument_node=""> and one version for </span><em data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Audion Theatre</span></em><span data-dcnode-id="3567" instrument_node=""> (as "The Last of Dr Bronson").

		Reviews:</span><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">
Similar in theme to "The Doctor Prescribed Death"—this one works slightly better as the characters are more fleshed out and the theorizing isn't as wonky. While certainly interesting, it feels a bit too repetitive and episodic—he is basically going down a check list after all—and the ending is foreseeable from the very beginning—though perhaps that works in its favor as it makes the proceedings more despairing. I found the version with Laird Cregar the most compelling if only because of his performance. [6/10] --- David Schwenker

A good adaptation of the original story. The ending was changed from the original, but Woolrich liked it well enough to rewrite the original story with the new ending. --- Geoff Loker</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">
</span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node="">
Woolrich is a master at weaving clever suspense yarns that undermine your expectations, often due to his stories being told from the perspective of a character with the most limited knowledge of what's happening—that way, we don't know anything more than they do. "Last Night" is a prime example of Woolrich's talents at work. Margo is terrific in the central performance as the wife attempting to piece together what exactly happened last night—we are just as perplexed by the puzzle being assembled as she is and just as surprised when our guesses are proven wrong. This is cracker-jack storytelling at its most entertaining. [9/10] --- David Schwenker

Classic locked room mystery that's only interesting if you haven't heard or read many of them, but if you have—like me—then you would realize that this is one of the lesser inspired examples that the sub-genre has to offer. Yes, the solution is clever, but the same "trick" has been done many times before in many other—and better—stories. With that proviso, there are some nice red herrings to spice things up and if you are totally unfamiliar with the sub-genre then it's probably worth a listen. [6/10] --- David Schwenker

Leonard Snell is an insurance agent who has gambled all his money away and has some rather large debts to pay. He confronts his wife, demanding the money that she has kept away in a safe-deposit box. She refuses, so he kills her, but now has another problem—how can he get away with the murder? Amazingly, Leonard seems to hit an unending streak of luck as ironic twists and turns always seem to fall in his favor and he begins to think he won't get caught for a single thing... but will his luck end?</span><br data-dcnode-id="3103"><span data-dcnode-id="3102" instrument_node="">

</span><p class="plot" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">
Mr. Pender is on a passenger train and strikes up a conversation with a stranger. He offers the man a mystery novel to read, but the stranger promptly turns him down, stating that mysteries aren't accurate to life as the murderers get caught. He instead is only interested in murderers who don't get caught and proceeds to describe ways a person can die and have it appear to be from natural causes. After this meeting, Mr. Pender begins to hear about a string of deaths that have occurred in the exact same fashion as the stranger described! Furthermore, when Mr. Pender begins to investigate, he starts seeing the stranger in places where these deaths have just happened! Is he behind these deaths?
	</span></p><span data-dcnode-id="3048" instrument_node="">
</span><div class="review" data-dcnode-id="3044"><span data-dcnode-id="3047" instrument_node="">
		Reviews:</span><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">
Diabolically clever thriller from Dorothy L. Sayers that plays cat-and-mouse not only with the overly imaginative Mister Pender and a possible ingenious psychopath but also with the expectations of the audience as well—is Pender correct? mistaken? insane? the deaths accidental? murderous? some but not others? the mysterious man a killer? a police officer? is he even real? We are constantly guessing as each revelation seems to give us one definite answer, only to have the next turn of the plot to give us another. A wonderfully unpredictable gem that possesses a pleasant air of sophistication and grace. Highly recommended. [9/10] --- David Schwenker

Orson Welles stars as "The Marvelous Barastro"—a small-time carnival magician who reads fortunes, speaks with the dead, reads the secrets of life, falls in love with and marries a beautiful blind woman. Shortly thereafter, they meet another travelling magician who desires Anna as his assistant and is willing to go to extraordinary lengths to get her. </span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">

Another version was produced for </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/miscellaneousShows.html%23barastro"><em data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Mystery in the Air</span></em></a><span data-dcnode-id="2881" instrument_node="">, starring Peter Lorre.

		Reviews:</span><br data-dcnode-id="2877"><span data-dcnode-id="2876" instrument_node="">
The episode begins almost like a beautiful folk fable, but it soon evolves into dark, surrealistic horror. Indeed, the events that unfold once the "other" magician enters the life of Barastro are disturbing—it even surprisingly flirts with some rather taboo material, adding to the discomfort. Orson Welles is brilliant, of course, but his performance is more outstanding than usual given that he plays a dual role. Its only discredit is the strange narrative framework they use to bookend the story, which features Barastro going to the office of SUSPENSE director/producer William Spier to record his story. It's a rather hokey technique that hems the quality of the episode back from perfection, which it otherwise would have obtained. Regardless, this is a genuinely creepy gem you should seek out!  [9/10] --- David Schwenker

The classic short story is given a superb—and shockingly faithful—radio adaptation with much of the dialogue and action taken verbatim from the source, changing only the opening to simply fit the thirty minute runtime. The sound and music are of much higher quality than usual,  resulting in a truly immersive experience—one truly feels that they're in the jungle with Rainsford as he is savagely hunted. Welles relishes in the role of Zaroff, giving him such incredible presence and weight. One of the few episodes where I can find no fault. The second version with Joseph Cotton is excellent as well but slightly pails in comparison to the first—if only because Welles is so pitch-perfect. [10/10] --- David Schwenker

The premise sounds absurd—and it certainly is—but the narrative is told in such a grim tone, the family's plight so utterly dire, and the brother so viciously malevolent that the story is not laughable but instead genuinely terrifying. Indeed, the absurdity doesn't detract but rather add to the unspeakable horror as the proceedings appear to be so unreal that you feel the family must be trapped in some sort of nightmare. Laird Cregar relishes his role as the diabolical mystic and Hans Conreid excels as the father who loses his grip on reality. The ending is ambiguous in the most tantalizing manner. One of the best episodes SUSPENSE has to offer if you can accept its eccentricities—I sure did. [9/10] --- David Schwenker

Miss Rhodes has been in constant fear for her life for the past ten years. Why? Ten years ago, she gave an incriminating testimony that put away a criminal named Tom Nixon... and Nixon has sworn murderous revenge. It's been ten years and Nixon is supposedly still in prison, but now Miss Rhodes is convinced that a new elevator operator in her building is none other than Tom Nixon himself! Is he really out to get her or is she simply paranoid?
	</span></p><span data-dcnode-id="2428" instrument_node="">
</span><div class="review" data-dcnode-id="2424"><span data-dcnode-id="2427" instrument_node="">
		Reviews:</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node="">
It's written by the wonderful Lucille Fletcher so you'll know the story will have at the very least a palpable atmosphere of dread and moments of genuine suspense—which this episode certainly has. However, the plot itself is surprisingly straightforward and uncomplicated, which on one hand is good—it's focuses purely on the thrills—but on the other hand is disappointing—it offers up no surprises and feels slightly routine because of its predictability. As a result, it falls somewhere in the middle—definitely worth a listen but not exceedingly remarkable. [7/10] --- David Schwenker

</span><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">
I can not praise Woolrich highly enough—he has a knack for creating a world where normalcy slowly slips into terrifying nightmare. Here, a man begins to suspect that his wife—whom he loves and whom is closest to him above all others—may be doing unspeakable horrors. Thus, a loving marriage degrades into the frightening unknown. I do admit that the episode lacks the gut-punch grim ending of the original story—and is weakened because of it—but the change is not disastrous and more than acceptable. [8/10] --- David Schwenker

		Reviews:</span><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node="">
The "impossible crime" motif is always a fascinating plot hook and SUSPENSE features many tales that have such a hook. When the motif is solved with clever ingenuity, the story is resoundingly satisfying, but when it is solved with formulaic laziness, the motif then becomes nothing more than a cheap way to grab our attention. This episode is an instance of the latter. The resolution to the mystery is entirely implausible and as such there is no satisfaction to the crux of the narrative. This is a shame, because Alan Ladd is gleefully hard-boiled, the dialogue chock full of pulp, and the tough no-nonsense investigation is actually quite engaging. If only they thought more about the narrative and less about the genre trappings. [6/10] --- David Schwenker

Stribling's complex original story is sort of the reverse of John Dickson Carr's method, with a seemingly rational murder mystery turning out to be drenched in the supernatural. But the already clumsily adapted script, which downplays the fantasy element, becomes nearly incoherent because some crucial plot points are mysteriously deleted, perhaps because of last-minute cuts to fit time constraints. The white men's condescension toward the "coolies" is in character and true to the period so I can sort of forgive it, but the non-Anglo roles are not at all acted convincingly, which is just plain bad drama, and less forgivable. --- Anonymous

</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
Woolrich's stories were a pre-cursor to modern literature's obsession with mind-bending narratives. Such recent psychological thrillers as MEMENTO, THE MACHINIST, and UNKNOWN—to list some of the more popular examples—owe much to Woolrich. This episode is an example of that sort of influence. An amnesia storyline where a character must piece together fragments of a fractured memory—with his own guilt constantly in question—may be commonplace now, but only because Woolrich inspired a legion of imitators. The story holds up very well today even if it no longer surprises with the same vigor as it first did—given today's overly convoluted narratives, that is saying something. [8/10] --- David Schwenker

Three versions were produced for </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Suspense</span></em><span data-dcnode-id="1284" instrument_node="">—the first with Ida Lupino and Agnes Moorehead, the second with Rosalind Russell and Lurene Tuttle, and the third with Francis Farmer and Cathy Lewis.

		Reviews:</span><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">
For being one of the more popular episodes of </span><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Suspense</span></em><span data-dcnode-id="1276" instrument_node="">—it was broadcast three times—it is surprisingly dull. The opening scene certainly grabs your attention but it unfortunately doesn't go anywhere of interest as the plot chooses to focus on two thoroughly unappealing women who spend most of their time squabbling. As a result, the supernatural element of a premonition seems to be quite out of place as it suggests that there should be a more haunting narrative forthcoming rather than the simple domestic disturbance that arrives. As for all those broadcasts, the first is easily the best because Ida Lupino and Agnes Moorehead give truly great performances—something that the script doesn't deserve. [5/10] --- David Schwenker

A movie director meets a detective who quibbles over the realism of the filmmaker's crime films. To give him a greater sense of reality, the detective brings the director to the morgue where they recently found the body of a world-renowned assassin. Fascinated by this hired killer, the director begins to investigate the assassin's life to use him as a subject for his next picture.

A terrific thriller in the vein of such classic Film Noir movies as  "The Mask of Dimitrios" and "Mr. Arkadin"—both of which feature thrilling investigations into the lives of famous criminals. This episode may not be doing anything different than those efforts,  but it's told in a very effective manner with a potent atmosphere of mystery and tension that is thankfully maintained throughout the entirety of the story—there's always the sense that something is not quite right—and it all pays off wonderfully with some clever twists in the end. It may rush over some details given that the plot is fairly expansive and would have benefitted from a longer running time, but it still remains a tightly plotted slice of entertainment! [8/10] --- David Schwenker

</span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Suspense</span></em><span data-dcnode-id="1198" instrument_node="">'s early '50s crime dramas—the ones with a "based on fact," </span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Dragnet</span></em><span data-dcnode-id="1195" instrument_node="">-inspired, pseudo-documentary approach—tend to leave me a little cold. In this script, Act I's ugly, but well-acted, "slice of life" scenes give way to Act II's dry police procedural. The main interest is Cornel Wilde's persuasive performance as the whiny murderer. --- Anonymous

</span><p class="plot" data-dcnode-id="1165"><span data-dcnode-id="1176" instrument_node="">
Mrs. Stevenson is a bedridden woman whose only access to the outside world is her telephone. One day, while listening to what seems to be a crossed phone connection, she overhears two men planning a murder. With the police unhelpful, can she piece together their plans and stop the impending killing?</span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">
</span><br data-dcnode-id="1173"><span data-dcnode-id="1172" instrument_node="">
Eight versions of this story were broadcast </span><em data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Suspense</span></em><span data-dcnode-id="1169" instrument_node="">, all of which starred Agnes Moorehead. </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Lux Radio Theatre</span></em><span data-dcnode-id="1166" instrument_node=""> produced an hour-long version with Barbara Stanwyck and Burt Lancaster, the stars of the 1948 film adaptation.
	</span></p><span data-dcnode-id="1164" instrument_node="">
</span><div class="review" data-dcnode-id="1153"><span data-dcnode-id="1163" instrument_node="">
		Reviews:</span><br data-dcnode-id="1162"><span data-dcnode-id="1161" instrument_node="">
Arguably the most iconic episode of </span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Suspense</span></em><span data-dcnode-id="1158" instrument_node="">—having been broadcast more than any other story as well as adapted into an oscar-nominated film—and given this fanfare one would expect the episode to be a work of art... not quite. The script is admittedly clever—mustering a compelling story and suspenseful situations with just a single character is no easy task—but it suffers from a main character that's more irritating than sympathetic, thus her plight is not as gripping as it should be. Yet I can't deny that the writing is technically great—it's more of an issue of Agnes Moorehead's interpretation of the character. [8/10] --- David Schwenker</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">
</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
Torn between sympathy for the helpless invalid who heroically tries to stop a murder and antipathy for her being so damned obnoxious about it, you want the heroine to be vindicated, but you also think, "Somebody should stick a knife in this woman." And when somebody does, you're supposed to be left with an uneasy, conflicted double satisfaction. Perhaps that's why most imitations of this play feel relatively empty; they aren't even trying to match its attempt at a twisted catharsis. --- Anonymous

These "perfect murder" and "perfect alibi" stories are a dime a dozen on SUSPENSE and this one doesn't particularly stand out from the crowd. Despite the routine plotting, an oppressive work environment is certainly a relatable setting for most listeners and the central character Henry Wilson is quite fascinating—especially as his grip on reality slowly dwindles and he devolves into a raging paranoiac. Interesting, but too typical to be that memorable. [6/10] --- David Schwenker

		Reviews:</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
A fine mystery yarn that is pleasantly narrow in focus—it mainly centers on the husband, his wife, and his cook—and as such the narrative seems more tightly plotted than most. The plot itself may be fairly simple and straightforward—is the cook a poisoner or is she not—but it does have a clever twist at the end that is wholly unexpected. Unfortunately, the second broadcast with Charles Ruggles presents the twist in a very confusing manner as it is inexplicably rushed and ill-explained, as if they had to quickly wrap up the narrative to fit it within the alloted time. The third broadcast with Sam Jaffe addresses this issue with its extended hour-long adaptation, but it also unnecessarily pads the proceedings to fill its new runtime. Putting aside my minor gripes, it certainly is a worthwhile listen. [7/10] --- David Schwenker

Madeleine Tremaine was a famous London stage actress who now lives as a recluse. She allows only the local vicar, Father Benson, to visit but since he is retiring the vicar brings along with him Mr. Sedley, the new curate, in hopes that he will continue to counsel her. After they arrive, Madeleine begins to tell both men her life story in the theater as well as how she would upstage the lead, Nell Garrett, in her early performances. One day, Nell smacked Madeleine in the face for upstaging her. Later, Nell was found with a knife in her back. Did Madeleine do it?</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">
Two versions were produced for </span><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Suspense</span></em><span data-dcnode-id="854" instrument_node="">, the first in 1944 with June Deprez and the  second in 1947 with Angela Lansbury.
	</span></p><span data-dcnode-id="852" instrument_node="">
</span><div class="review" data-dcnode-id="848"><span data-dcnode-id="851" instrument_node="">
		Reviews:</span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
Melodramatic tale that's told in flashback with all the trappings one would expect in a melodrama—love triangles, sour marriages, false promises, backstabbing, rise to fame, fall from grace, etc. As such, the story is fairly routine and predictable, but you'll remain somewhat invested in seeing it through if only because its frame story proposes so many interesting questions—why does Madeleine let no one into her home? why are the lights never on except when the vicar is in the room? why are the mirrors covered? As a result, you'll feel compelled to listen to the end just to get some answers. Unfortunately, it all becomes painfully obvious well before the climactic revelation, cheapening your investment. [5/10] --- David Schwenker

The narrative is confined within what ought to be a claustrophobic setting—a young woman is trapped on a cruise ship in the middle of the ocean with a killer on the loose—but the writing never seems to evoke that precious feeling of claustrophobia the listener yearns to experience. Indeed, the story appears to be more concerned with the romance between Olivia de Havilland and Reginald Gardner's characters rather than the suspense that's inherent within the plot. Of course, favoring romance over thrills isn't necessarily bad—</span><em data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Casablanca</span></em><span data-dcnode-id="394" instrument_node=""> certainly cares more about its love triangle rather than war time violence and is better for it—but when the relationship is hollow and the story's potential for thrills so apparent, one can not help but feel slightly cheated. A disappointment that had much potential. [5/10] --- David Schwenker

</span><div class="review" data-dcnode-id="233"><span data-dcnode-id="236" instrument_node="">
		Reviews:</span><br data-dcnode-id="235"><span data-dcnode-id="234" instrument_node="">
Woolrich spins an entertaining suspense yarn that is quite gripping thanks in large part to the central performance of Maureen O'Hara—she single handedly transforms a character who would have been otherwise foolish and unbelievable into someone mature and sympathetic. As a result, the moments where she is stalked by the killer are genuinely suspenseful. The revelation of the said killer is indeed a complete surprise but is also arguably unguessable, therefore slightly anti-climatic—however, this episode clearly totes itself as a "thriller" rather than a "whodunit" and as such the cheat is not too problematic. In the end, it may lack the bite of other Woolrich tales, but it's very entertaining all the same. [8/10] --- David Schwenker
	</span></div><span data-dcnode-id="232" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Will You Make a Bet with Death?</span></h3><span data-dcnode-id="229" instrument_node="">
</span><div class="citation" data-dcnode-id="216"><span data-dcnode-id="228" instrument_node="">
		Year: 1942
		</span><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">

		Story by: </span><a data-dcnode-id="218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/famousAuthors.html%23johnCarr"><span data-dcnode-id="219" instrument_node="">John Dickson Carr</span></a><span data-dcnode-id="217" instrument_node="">
</span></div><span data-dcnode-id="215" instrument_node="">
</span><p class="plot" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">
A man makes an unfortunate bet with his step-father: that his step-father can kill him within six months and not get caught... and he will never know where, when, or how.
	</span></p><span data-dcnode-id="212" instrument_node="">
</span><div class="review" data-dcnode-id="208"><span data-dcnode-id="211" instrument_node="">
		Reviews:</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">
Genuinely suspenseful with a palpable atmosphere of dread. Danger seems to be lurking around every corner. This one is a bona fide thriller in the truest sense of the word. Marred only by an overly complicated ending. [8/10] --- David Schwenker
	</span></div><span data-dcnode-id="207" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Woman in Red, The</span></h3><span data-dcnode-id="204" instrument_node="">
</span><div class="citation" data-dcnode-id="194"><span data-dcnode-id="203" instrument_node="">
		Year: 1944
		</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">
		Duration: 30 min
		</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">
		Genre: Espionage
        </span><br data-dcnode-id="198"><span data-dcnode-id="197" instrument_node="">
        Available for Listening Booth: Y

		Story by: Anthony Gilbert
    </span></div><span data-dcnode-id="193" instrument_node="">
</span><p class="plot" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">
A young woman with no family connections answers an ad that gets her mixed up in the plot of a pair of Nazi spies.
	</span></p><span data-dcnode-id="190" instrument_node="">
</span><div class="review" data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">
		Reviews:</span><br data-dcnode-id="188"><span data-dcnode-id="187" instrument_node="">
Based on Anthony Gilbert's novel of the same name, this story was later adapted twice onto film—first as "My Name is Julia" and later as "Dead of Winter"—both of which are significantly different from the radio adaptation but also significantly better—despite the fact that this episode is fairly faithful to the source novel while both the films change most of the story. The core of the narrative is undeniably gripping—a woman trapped against her will is slowly being driven insane—but the inclusion of generic wartime espionage plotting and secret spy ring shenanigans diminish the psychological intensity of the central character's captivity, replacing what should be a personal battle of minds between the imprisoned and her captors with abstract nationalism. Not a bad episode per se but I would recommend the films instead. [6/10] --- David Schwenker
	</span></div><span data-dcnode-id="185" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">World of Darkness, A</span></h3><span data-dcnode-id="182" instrument_node="">
</span><div class="citation" data-dcnode-id="172"><span data-dcnode-id="181" instrument_node="">

Police arrive at a theatrical rooming house and find a woman named Nancy Collins dead. The detective gathers all the suspects together, at which time a blind man named Anton Rejak announces that he knows exactly what happened to her—he heard every sound—and proceeds to recount the events of the evening...
	</span></p><span data-dcnode-id="168" instrument_node="">
</span><div class="review" data-dcnode-id="164"><span data-dcnode-id="167" instrument_node="">
		Reviews:</span><br data-dcnode-id="166"><span data-dcnode-id="165" instrument_node="">
Traditional murder mystery that has some novelty value due to the fact that it's told from a blind man's perspective, but the mystery itself seems rather basic and not that interested in doing anything different. There's a twist at the end—as there always is—but it also seems typical for this sort of story. [5/10] --- David Schwenker
	</span></div><span data-dcnode-id="163" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">You Died Last Night</span></h3><span data-dcnode-id="160" instrument_node="">

Note from anonymous: [I have a strong hunch this didn't air on </span><em data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">The Mysterious Traveler</span></em><span data-dcnode-id="138" instrument_node="">. There's a reference in the script to the Berlin Wall which didn't exist when that series was on the air. There </span><strong data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">was</span></strong><span data-dcnode-id="135" instrument_node=""> an episode of the Traveler with a similar title ("I Died Last Night"), but it's a completely different script.]
	</span></p><span data-dcnode-id="133" instrument_node="">
</span><div class="review" data-dcnode-id="126"><span data-dcnode-id="132" instrument_node="">
		Reviews:</span><br data-dcnode-id="131"><span data-dcnode-id="130" instrument_node="">
Another excellent Robert A. Arthur script from late in the series that might have been at home on </span><em data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Quiet, Please</span></em><span data-dcnode-id="127" instrument_node=""> (it's heavy on the first person narration and ends with an overt moral appeal). Like his "The Black Door," this is a two-hander for actors Robert Readick and Santos Ortega who carry it nicely. Touring the globe in an alien spacecraft and then wiping out billions of people in a matter of seconds are the kind of situations best handled on the radio. --- Anonymous.
	</span></div><span data-dcnode-id="125" instrument_node="">

A nightclub singer in Brazil begins to think her employers are working for the Nazis.
	</span></p><span data-dcnode-id="108" instrument_node="">
</span><div class="review" data-dcnode-id="101"><span data-dcnode-id="107" instrument_node="">
		Reviews:</span><br data-dcnode-id="106"><span data-dcnode-id="105" instrument_node="">
One of the more dull pieces of propaganda that </span><em data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Suspense</span></em><span data-dcnode-id="102" instrument_node=""> had produced during the war years. Besides the generic American inculcation, it is also quite obvious that the narrative was tailored-made specifically for its star Lena Horne as it gives her many—perhaps too many—opportunities to show off her vocal talents. She's a gifted singer—unquestionably—but the episode is unfortunately more concerned with being a star vehicle rather than an actual story. Disappointing as a result. [4/10] --- David Schwenker
	</span></div><span data-dcnode-id="100" instrument_node="">
</span><h3 class="title titleSuspense" data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">You'll Never See Me Again</span></h3><span data-dcnode-id="97" instrument_node="">
</span><div class="citation" data-dcnode-id="84"><span data-dcnode-id="96" instrument_node="">
		Year: 1944; 1946
		</span><br data-dcnode-id="95"><span data-dcnode-id="94" instrument_node="">
		Duration: 30 min
		</span><br data-dcnode-id="93"><span data-dcnode-id="92" instrument_node="">
		Genre: Mystery Thriller
        </span><br data-dcnode-id="91"><span data-dcnode-id="90" instrument_node="">

		Story by: </span><a data-dcnode-id="86" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.otrplotspot.com/famousAuthors.html%23cornellWoolrich"><span data-dcnode-id="87" instrument_node="">Cornell Woolrich</span></a><span data-dcnode-id="85" instrument_node="">
</span></div><span data-dcnode-id="83" instrument_node="">
</span><p class="plot" data-dcnode-id="74"><span data-dcnode-id="82" instrument_node="">
Ed Bliss gets in a heated argument with his wife Janet—their first marital spat after only three months of marriage. She stomps out of the house, threatening that Ed will never see her again. Ed isn't too worried at first—figuring he will give her a few days to cool off—but when he calls his mother-in-law to finally speak with Janet, her mother says she never came to their house! Where could she be?</span><br data-dcnode-id="81"><span data-dcnode-id="80" instrument_node="">
</span><br data-dcnode-id="79"><span data-dcnode-id="78" instrument_node="">
Two versions were produced for </span><em data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">Suspense</span></em><span data-dcnode-id="75" instrument_node="">, the first in 1944 with Joseph Cotton and the second in 1946 with Robert Young.
	</span></p><span data-dcnode-id="73" instrument_node="">
</span><div class="review" data-dcnode-id="66"><span data-dcnode-id="72" instrument_node="">
		Reviews:</span><br data-dcnode-id="71"><span data-dcnode-id="70" instrument_node="">
Based on a novella by Cornell Woolrich, this radio adaptation is fairly faithful to its source material with its only major change being an altered ending—which, of course, isn't as razor sharp as the original. Regardless, this remains a cracker-jack thriller that provides some of the most startling surprises that </span><em data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">Suspense</span></em><span data-dcnode-id="67" instrument_node=""> has to offer—indeed, perhaps the most numerous amount of surprises as well since there seems to be a plot twist every other minute. Unpredictable and deceptive—sometimes ingeniously so—though admittedly the final revelation, while certainly being completely unexpected and shocking, strains credibility tremendously. A minor quibble, I suppose, considering the sheer pleasure one receives when listening to this roller-coaster ride. [9/10] --- David Schwenker
	</span></div><span data-dcnode-id="65" instrument_node="">

	</span></p><span data-dcnode-id="29" instrument_node="">
</span><div class="review" data-dcnode-id="25"><span data-dcnode-id="28" instrument_node="">
		Reviews:</span><br data-dcnode-id="27"><span data-dcnode-id="26" instrument_node="">
This is a great episode of a great series. Everything seems sweet and innocent at first, with an imaginary friend named Trill and an innocent kid's game, but it builds to a terrifying climax. --- C. Grigsby
