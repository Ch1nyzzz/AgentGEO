d="2226" id="articleContentBody"><span data-dcnode-id="2385" instrument_node=""> </span><div class="article-body" data-dcnode-id="2228"><span data-dcnode-id="2384" instrument_node=""> </span><p class="sw-para" data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Scary movies have been getting an overhaul in the recent past. Directors have been mixing and mashing different genres and themes into their horror flicks in some ingenious ways, and these movies are testament to it.</span></p><h2 data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">1. Get Out</span></h2><p class="sw-para" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">There's something eery going on in the all-white town that Chris visits with his girlfriend, and it might have something to do with the colour of his skin. Director Jordan Peele won an Oscar for this movie.</span></p><figure class="sw-media" data-dcnode-id="2372"><img alt="" class="load" data-dcnode-id="2377" data-src="https://s3.scoopwhoop.com/anj/skj/c9d887e1-a5d4-4955-9338-3da6e1fa4f00.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/c9d887e1-a5d4-4955-9338-3da6e1fa4f00.jpg.webp&amp;raw"><figcaption data-dcnode-id="2373"><span data-dcnode-id="2376" instrument_node="">Source: </span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cultfollowing.co/articles/get-out-secrets-easter-eggs-and-references-from-jordan-peeles-commentary/" rel="nofollow" target="_blank"><span data-dcnode-id="2375" instrument_node="">Cultfollowing</span></a></figcaption></figure><h2 data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">2. It Follows</span></h2><p class="sw-para" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Jay becomes the recipient of a curse after having sex with her boyfriend, and is followed by all manner of creatures thereon. This film is straight up terrifying. </span></p><figure class="sw-media" data-dcnode-id="2362"><img alt="" class="load" data-dcnode-id="2367" data-src="https://s3.scoopwhoop.com/anj/skj/df0bf74a-7275-42a4-ac1c-d9f9b736a5ac.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/df0bf74a-7275-42a4-ac1c-d9f9b736a5ac.jpg.webp&amp;raw"><figcaption data-dcnode-id="2363"><span data-dcnode-id="2366" instrument_node="">Source: </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mubi.com/films/it-follows" rel="nofollow" target="_blank"><span data-dcnode-id="2365" instrument_node="">Mubi</span></a></figcaption></figure><h2 data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">3. Annihilation</span></h2><p class="sw-para" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Natalie Portman plays a ballsy biologist venturing into a mysterious shimmer that's eating up the world in the most terrifying of ways.</span></p><figure class="sw-media" data-dcnode-id="2352"><img alt="" class="load" data-dcnode-id="2357" data-src="https://s3.scoopwhoop.com/anj/skj/f09e294f-6d31-47ee-8c97-856e5711e65c.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/f09e294f-6d31-47ee-8c97-856e5711e65c.jpg.webp&amp;raw"><figcaption data-dcnode-id="2353"><span data-dcnode-id="2356" instrument_node="">Source: </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.engadget.com/2018/03/14/annihilation-review-netflix-theaters/" rel="nofollow" target="_blank"><span data-dcnode-id="2355" instrument_node="">Engadget</span></a></figcaption></figure><h2 data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">4. Don't Breathe</span></h2><p class="sw-para" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">3 thieves try to rob a blind man who's just won some prize money. Unfortunately for them, they don't know what this man is capable of.</span></p><figure class="sw-media" data-dcnode-id="2342"><img alt="" class="load" data-dcnode-id="2347" data-src="https://s3.scoopwhoop.com/anj/skj/f85a8fd0-7282-4438-86dd-0b89f1028695.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/f85a8fd0-7282-4438-86dd-0b89f1028695.jpg.webp&amp;raw"><figcaption data-dcnode-id="2343"><span data-dcnode-id="2346" instrument_node="">Source: </span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letterboxd.com/film/dont-breathe-2016/" rel="nofollow" target="_blank"><span data-dcnode-id="2345" instrument_node="">Letterboxd</span></a></figcaption></figure><h2 data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">5. 1922</span></h2><p class="sw-para" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Based on the novel by Stephen King, a farmer plots to kill his wife when she decides to leave him, leading to some very unpleasant consequences.</span></p><figure class="sw-media" data-dcnode-id="2332"><img alt="" class="load" data-dcnode-id="2337" data-src="https://s4.scoopwhoop.com/anj/skj/3ddec452-3862-466d-b736-7a8ff99578ed.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/3ddec452-3862-466d-b736-7a8ff99578ed.jpg.webp&amp;raw"><figcaption data-dcnode-id="2333"><span data-dcnode-id="2336" instrument_node="">Source: </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindustantimes.com/movie-reviews/1922-movie-review-a-haunting-success-stephen-king-s-hot-streak-rages-on-after-it-and-gerald-s-game/story-yNdUwWvqq2nYBpTQOibv2I.html" rel="nofollow" target="_blank"><span data-dcnode-id="2335" instrument_node="">Hindustantimes</span></a></figcaption></figure><h2 data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">6. 10 Cloverfield Lane</span></h2><p class="sw-para" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">A woman is held captive in an underground bunker after a car accident. When she tries to escape though, she discovers something horrible about the outside world.</span></p><figure class="sw-media" data-dcnode-id="2322"><img alt="" class="load" data-dcnode-id="2327" data-src="https://s3.scoopwhoop.com/anj/skj/9283b657-06b5-43c5-9db1-2cf4c631c3f7.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/9283b657-06b5-43c5-9db1-2cf4c631c3f7.jpg.webp&amp;raw"><figcaption data-dcnode-id="2323"><span data-dcnode-id="2326" instrument_node="">Source: </span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2016/03/10/469650092/its-not-really-cloverfield-but-its-a-lot-of-fun" rel="nofollow" target="_blank"><span data-dcnode-id="2325" instrument_node="">Npr</span></a></figcaption></figure><h2 data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">7. The Cabin In The Woods</span></h2><p class="sw-para" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">5 friends arrive at a remote forest cabin for a vacation, but things soon start to go terribly wrong. The setting sounds done to death, but trust me, this is one of the most inventive scary movies on this list.</span></p><figure class="sw-media" data-dcnode-id="2312"><img alt="" class="load" data-dcnode-id="2317" data-src="https://s3.scoopwhoop.com/anj/skj/cd1467c3-78dc-4d6b-95fe-4508b2bdab64.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/cd1467c3-78dc-4d6b-95fe-4508b2bdab64.jpg.webp&amp;raw"><figcaption data-dcnode-id="2313"><span data-dcnode-id="2316" instrument_node="">Source: </span><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bloody-disgusting.com/editorials/3431711/the-cabin-in-the-woods-proved-delays-arent-bad/" rel="nofollow" target="_blank"><span data-dcnode-id="2315" instrument_node="">Bloodydisgusting</span></a></figcaption></figure><h2 data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">8. The Witch</span></h2><p class="sw-para" data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Terrifying, unnerving and wholly deserving of praise, The Witch is about a family in 1630s pastoral New England dealing with something sinister in the woods.</span></p><figure class="sw-media" data-dcnode-id="2302"><img alt="" class="load" data-dcnode-id="2307" data-src="https://s3.scoopwhoop.com/anj/skj/faa81409-c2fe-4f04-aead-61bbae0dd7cf.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/faa81409-c2fe-4f04-aead-61bbae0dd7cf.jpg.webp&amp;raw"><figcaption data-dcnode-id="2303"><span data-dcnode-id="2306" instrument_node="">Source: </span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//variety.com/2015/film/reviews/sundance-film-review-the-witch-1201411310/" rel="nofollow" target="_blank"><span data-dcnode-id="2305" instrument_node="">Variety</span></a></figcaption></figure><h2 data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">9. The Guest</span></h2><p class="sw-para" data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">A family welcomes a friend of their dead son into their home, only to realise he's not who he claims to be.</span></p><figure class="sw-media" data-dcnode-id="2292"><img alt="" class="load" data-dcnode-id="2297" data-src="https://s4.scoopwhoop.com/anj/skj/43d3bb41-c222-48a9-b1e2-b02b32d3f473.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/43d3bb41-c222-48a9-b1e2-b02b32d3f473.jpg.webp&amp;raw"><figcaption data-dcnode-id="2293"><span data-dcnode-id="2296" instrument_node="">Source: </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dan-stevens.co.uk/content/guest-first-teaser-trailer" rel="nofollow" target="_blank"><span data-dcnode-id="2295" instrument_node="">Danstevens</span></a></figcaption></figure><h2 data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">10. Ex Machina</span></h2><p class="sw-para" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">A young scientist is chosen to participate in an ongoing AI experiment that soon takes a very dangerous turn.</span></p><figure class="sw-media" data-dcnode-id="2282"><img alt="" class="load" data-dcnode-id="2287" data-src="https://s4.scoopwhoop.com/anj/skj/03162ff6-0689-4fde-b744-6c0ddc363dbd.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/03162ff6-0689-4fde-b744-6c0ddc363dbd.jpg.webp&amp;raw"><figcaption data-dcnode-id="2283"><span data-dcnode-id="2286" instrument_node="">Source: </span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nerdist.com/annihilation-ex-machina-easter-egg/" rel="nofollow" target="_blank"><span data-dcnode-id="2285" instrument_node="">Nerdist</span></a></figcaption></figure><h2 data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">11. The Visit</span></h2><p class="sw-para" data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">2 kids go to stay for a week with their grandparents who they've never met before. Unfortunately, old people can be pretty freakin' creepy.</span></p><figure class="sw-media" data-dcnode-id="2272"><img alt="" class="load" data-dcnode-id="2277" data-src="https://s4.scoopwhoop.com/anj/skj/15bf671b-fa17-40ea-9111-64538cc34b76.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/15bf671b-fa17-40ea-9111-64538cc34b76.jpg.webp&amp;raw"><figcaption data-dcnode-id="2273"><span data-dcnode-id="2276" instrument_node="">Source: </span><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bustle.com/articles/109215-whats-wrong-with-the-grandparents-in-the-visit-the-twist-will-be-familiar-to-m-night" rel="nofollow" target="_blank"><span data-dcnode-id="2275" instrument_node="">Bustle</span></a></figcaption></figure><h2 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">12. Split</span></h2><p class="sw-para" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">M. Night Shyamalan got his mojo back with this follow up to his hit film Unbreakable. This movie follows Kevin, a man with 23 different personalities, not all of them friendly. </span></p><figure class="sw-media" data-dcnode-id="2262"><img alt="" class="load" data-dcnode-id="2267" data-src="https://s3.scoopwhoop.com/anj/skj/6c9dffba-850a-4f78-b5af-fd7d1e5c4f1d.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/6c9dffba-850a-4f78-b5af-fd7d1e5c4f1d.jpg.webp&amp;raw"><figcaption data-dcnode-id="2263"><span data-dcnode-id="2266" instrument_node="">Source: </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vulture.com/2017/01/split-ending-m-night-shyamalan-unbreakable-sequel.html" rel="nofollow" target="_blank"><span data-dcnode-id="2265" instrument_node="">Vulture</span></a></figcaption></figure><h2 data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">13. Happy Death Day</span></h2><p class="sw-para" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">A college student must relive the day of her murder over and over again until she figures out who killed her. A slasher flick with a difference, this one. </span></p><figure class="sw-media" data-dcnode-id="2252"><img alt="" class="load" data-dcnode-id="2257" data-src="https://s4.scoopwhoop.com/anj/skj/6156eddf-7a74-4023-bbda-258ad5120a34.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/6156eddf-7a74-4023-bbda-258ad5120a34.jpg.webp&amp;raw"><figcaption data-dcnode-id="2253"><span data-dcnode-id="2256" instrument_node="">Source: </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fromthemovie.com/product/creepy-baby-mask-happy-death-day-2017/" rel="nofollow" target="_blank"><span data-dcnode-id="2255" instrument_node="">Fromthemovie</span></a></figcaption></figure><h2 data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">14. It Comes At Night</span></h2><p class="sw-para" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">There's only a few survivors left after a mysterious apocalyptic event, and for them, staying alive means keeping the doors tightly locked at night. Unfortunately, some locks can be broken.</span></p><figure class="sw-media" data-dcnode-id="2242"><img alt="" class="load" data-dcnode-id="2247" data-src="https://s3.scoopwhoop.com/anj/skj/0f314047-a322-47a1-a0ac-cf7672c2a4bb.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s3.scoopwhoop.com/anj/skj/0f314047-a322-47a1-a0ac-cf7672c2a4bb.jpg.webp&amp;raw"><figcaption data-dcnode-id="2243"><span data-dcnode-id="2246" instrument_node="">Source: </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2017/6/9/15768712/it-comes-at-night-review-joel-edgerton-trey-edward-shults" rel="nofollow" target="_blank"><span data-dcnode-id="2245" instrument_node="">Theverge</span></a></figcaption></figure><h2 data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">15. Veronica</span></h2><p class="sw-para" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">A young girl gets possessed by an evil spirit after playing Ouija with her friends.</span></p><figure class="sw-media" data-dcnode-id="2232"><img alt="" class="load" data-dcnode-id="2237" data-src="https://s4.scoopwhoop.com/anj/skj/74834409-310c-449c-9418-63a294f8e849.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.scoopwhoop.com/w620/s4.scoopwhoop.com/anj/skj/74834409-310c-449c-9418-63a294f8e849.jpg.webp&amp;raw"><figcaption data-dcnode-id="2233"><span data-dcnode-id="2236" instrument_node="">Source: </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nme.com/blogs/veronica-scariest-horror-film-ever-2252230" rel="nofollow" target="_blank"><span data-dcnode-id="2235" instrument_node="">Nme</span></a></figcaption></figure><p class="sw-para" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Scream team, unite!</span></p><span data-dcnode-id="2229" instrument_node=""> </span></div><span data-dcnode-id="2227" instrument_node=""> </span></article><span data-dcnode-id="2225" instrument_node=""> </span><div class="mb-10" data-dcnode-id="2224"></div><span data-dcnode-id="2223" instrument_node=""> </span><span data-dcnode-id="2221" instrument_node=""> </span><div class="share-control" data-dcnode-id="2184"><span data-dcnode-id="2220" instrument_node=""> </span><button class="bookmark _show_bookmark sw-share-bm" data-dcnode-id="2212" id="bottomBookmark" onclick="if (!window.__cfRLUnblockHandlers) return false; sw.bookmark(event, 'article')"><span data-dcnode-id="2219" instrument_node=""> </span><svg class="not-marked" data-dcnode-id="2217" fill="none" height="18" width="13"><path cli
