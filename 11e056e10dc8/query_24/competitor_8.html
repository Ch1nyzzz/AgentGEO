</span><p class="byline entry-meta vcard" data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">
By </span><a class="inline-nav" data-dcnode-id="553" href="#author_237"><span data-dcnode-id="554" instrument_node="">Savannah Gilbo</span></a><span data-dcnode-id="552" instrument_node=""> </span></p><span data-dcnode-id="550" instrument_node="">

</span><section class="entry-content entry-content-blog-post mt-4 col-12" data-dcnode-id="224" itemprop="articleBody"><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="544"><a class="btn btn-primary" data-dcnode-id="545" data-rm-show="wdg_idwtt3c2" href="#"><span data-dcnode-id="546" instrument_node="">Download the Red Herrings Workbook and Checklist</span></a></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">No matter what genre you’re writing in, there are probably some things you’ll want to keep hidden from your readers until the time is right to surprise them.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="539" instrument_node="">But in order to pull off a well-done surprise, you need to be sure to play fair with the reader from the start. </span><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">That means you’ll need to plant clues that point to the truth in plain sight so that everything makes sense when it comes time for the big reveal.</span></strong></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">So, how do you actually surprise the reader if all these real clues are hanging out in plain sight? How do you balance playing fair and “dangling the carrot” in front of your reader?</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Put simply, you’ll need to use a mixture of “true clues” (to play fair) and “false clues” (to send readers down the wrong path). These “false clues” are called Red Herrings and that’s what I’ll be covering in today’s post.</span></p><span data-dcnode-id="529" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
</span><h2 data-dcnode-id="524"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">What is a Red Herring?</span></strong></h2><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">A Red Herring is a piece of information that misleads or distracts the reader (and sometimes the character) from an important truth or leads them to mistakenly expect one outcome over another.</span></strong></p><span data-dcnode-id="519" instrument_node="">
</span><h3 data-dcnode-id="516"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Red Herrings can be anything from:</span></strong></h3><span data-dcnode-id="515" instrument_node="">
</span><ul data-dcnode-id="506"><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">A character who seems evil or suspicious.</span></li><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">An object that seems relevant or important.</span></li><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">An event that seems to be significant to the story or protagonist.</span></li><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">A clue placed by the antagonist or a secondary character that sends investigators down the wrong path.</span></li></ul><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="502"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Red Herrings are a type of foreshadowing.</span></strong></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="500" instrument_node="">The term “foreshadowing” refers to all the different ways that an author can </span><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">give readers hints or clues about what’s coming</span></strong><span data-dcnode-id="497" instrument_node="">. Readers pick up on these hints and clues to try and figure out what’s going to happen next (or at the end of the story). </span><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">But not all of these clues will lead to the truth.</span></strong><span data-dcnode-id="494" instrument_node=""> Some will be used to deceive the reader about what’s coming—and in these cases, the “false clues” are called Red Herrings.</span></p><span data-dcnode-id="492" instrument_node="">
</span><h3 data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Red Herrings can be used in any genre.</span></strong></h3><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="487" instrument_node="">If your story has any kind of plot twist or surprise ending, you can use Red Herrings. Red Herrings help you to distract or mislead the reader (and your characters) from the truth of what’s actually happening. It’s also worth noting that different </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/what-we-talk-about-when-we-talk-about-genre/"><span data-dcnode-id="486" instrument_node="">genres</span></a><span data-dcnode-id="484" instrument_node=""> change how the reader views and responds to Red Herrings. For example, in a true </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/secrets-of-the-crime-genre/"><span data-dcnode-id="483" instrument_node="">mystery</span></a><span data-dcnode-id="481" instrument_node="">, red herrings are used to make the reader </span><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">incorrectly guess what </span></strong><strong data-dcnode-id="476"><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">has already happened</span></em></strong><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">.</span></em><span data-dcnode-id="473" instrument_node=""> In a </span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/secrets-of-the-thriller-genre-part-one/"><span data-dcnode-id="472" instrument_node="">thriller</span></a><span data-dcnode-id="470" instrument_node=""> or </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/secrets-of-the-horror-genre/"><span data-dcnode-id="469" instrument_node="">horror</span></a><span data-dcnode-id="467" instrument_node=""> novel, red herrings are used to make the reader </span><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">incorrectly guess what </span></strong><strong data-dcnode-id="462"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">is going to happen.</span></em></strong></p><span data-dcnode-id="460" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
</span><h2 data-dcnode-id="452"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Examples of Red Herrings in </span></strong><strong data-dcnode-id="453"><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Harry Potter &amp; the Prisoner of Azkaban</span></em></strong></h2><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="448"><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">(Warning: spoilers ahead)</span></em></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="446" instrument_node="">In </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="442" instrument_node="">, both the reader and the characters are led to believe that Sirius Black is the story’s main villain. (Besides Voldemort, of course.)</span></p><span data-dcnode-id="440" instrument_node="">
</span><h3 data-dcnode-id="437"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Here’s what readers learn about Sirius Black:</span></strong></h3><span data-dcnode-id="436" instrument_node="">
</span><ol data-dcnode-id="425"><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Twelve years ago, there was a Fidelus Charm on the Potter’s house to keep their location a secret. Someone betrayed their location to Voldemort which directly led to Jame’s and Lily’s murder. Most people believe that it was Sirius Black who betrayed James and Lily to Voldemort.</span></li><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Sirius Black was in Godric’s Hollow on the night of Harry’s parent’s murder. He was sentenced to life in Azkaban for the murder of 12 Muggles and a wizard named Peter Pettigrew. The murder was said to be so violent and messy that all authorities could find of Pettigrew was a bloodstained robe and a few fragments of a finger.</span></li><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Lately, while in Azkaban, Sirius has been heard murmuring, “He’s at Hogwarts,” in his sleep. It is believed that Sirius wants to kill Harry in order to finish what Voldemort started.</span></li><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Sirius Black has never tried to escape from Azkaban prison until now. His escape coincides with the Weasley’s return home from Egypt.</span></li><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Sirius Black is Harry Potter’s godfather.</span></li></ol><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">So, based on those five things, Sirius Black looks like a pretty convincing bad guy, right? Turns out, Sirius Black isn’t out to get Harry at all. He’s actually trying to protect Harry from the person who’s truly responsible for the death of Harry’s parents–Peter Pettigrew. In other words, Sirius Black is a Red Herring. So, now let’s look at everything readers learn about Ron’s pet rat, Scabbers (and how each clue points to the truth about Peter Pettigrew):</span></p><span data-dcnode-id="421" instrument_node="">
</span><h3 data-dcnode-id="418"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Here’s what readers learn about Scabbers:</span></strong></h3><span data-dcnode-id="417" instrument_node="">
</span><ol data-dcnode-id="404"><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Scabbers has been in the Weasley family for twelve years. (Harry’s parents were killed twelve years ago, the night Peter Pettigrew was “murdered.”)</span></li><li data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Scabbers has been acting strange since the Weasleys got home from Egypt. (Peter Pettigrew learns that Sirius Black has escaped from Azkaban and that he’s been muttering, “He’s at Hogwarts” –“he” being Peter Pettigrew, not Harry.)</span></li><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Ron buys a rat tonic to help Scabbers feel better, but it doesn’t work. (Scabbers isn’t actually a rat. He’s a human, living his life in his Animagus form as a rat.)</span></li><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Scabbers is missing a toe on his front paw. (The only thing left of Peter Pettigrew was his finger.)</span></li><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">The Sneakoscope goes off twice when Scabbers is around (first when Ron’s packing it up, second when Crookshanks is picking on Scabbers). (The Sneakoscope is a “dark detector” that lights up, spins, and whistles when someone is doing something untrustworthy.)</span></li><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Scabbers is constantly hiding, missing, or running away from Ron. (Peter Pettigrew knows Sirius Black is looking for him so he’s doing whatever he can to get away from Hogwarts.)</span></li></ol><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">As you can see, J.K. Rowling gave readers all the clues needed to figure out that Scabbers is actually Peter Pettigrew hidden in plain sight. Wherever one of these clues was laid, Rowling used different techniques to distract the reader from the truth. For example, when the Sneakoscope goes off, Crookshanks has just been chasing Scabbers around the room. Readers might interpret the Sneakoscope sounding off because Crookshanks is “misbehaving.” Or they might dismiss this bit of information entirely–chalking the whole thing up to “typical cat behavior.”</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">There are of course more clues than what I’ve laid out here, but hopefully, you can now see how Red Herrings work. Now, let’s take a look at some tips for writing your own Red Herrings…</span></p><span data-dcnode-id="397" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="396"><span data-dcnode-id="395" instrument_node="">
</span><h2 data-dcnode-id="392"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">5 Tips for Writing Effective Red Herrings</span></strong></h2><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Red herrings aren’t easy to craft–they have to tread a fine line between visible and invisible. They have to be obvious enough that most readers will pick up on them, but subtle enough that the reader believes it and follows the false trail. So, how do you write effective Red Herrings in your story? Here are my top five tips:</span></p><span data-dcnode-id="388" instrument_node="">
</span><h3 data-dcnode-id="385"><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">1. Incorporate the Red Herring into the fabric of the story.</span></strong></h3><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="383" instrument_node="">Red herrings aren’t something to be pulled out of your hat when the plot lacks tension, excitement, or conflict. Like most storytelling techniques, Red Herrings have to serve a purpose and feel like they’re an organic part of the story. Not only that, but they need to be logical and have some kind of impact on the story. In the above example from </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="379" instrument_node="">, Sirius Black (the Red Herring) plays a huge role in the story. If you took him out of the plot, the whole story would collapse.</span></p><span data-dcnode-id="377" instrument_node="">
</span><h3 data-dcnode-id="374"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">2. Give your innocent characters motivation, means, and opportunity.</span></strong></h3><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">If you’re planning to use a character as a Red Herring, you’ll need to convince readers that this person could legitimately be guilty. To do this, you could create an innocent character that either:</span></p><span data-dcnode-id="370" instrument_node="">
</span><ul data-dcnode-id="361"><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">benefits from the crime</span></li><li data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">had the means or opportunity to commit the crime</span></li><li data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">has a strong motive</span></li><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">or all of the above.</span></li></ul><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="359" instrument_node="">In </span><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="355" instrument_node="">, Sirius Black is widely believed to have been the Potter’s “secret keeper.” That gives him both the means and the opportunity to betray their location to Voldemort.</span></p><span data-dcnode-id="353" instrument_node="">
</span><h3 data-dcnode-id="350"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">3. Give the reader no (obvious) reason to suspect your guilty character.</span></strong></h3><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">In contrast to an innocent character having the motive, means, and opportunity to commit a crime, you’ll want to do the opposite with the real culprit. In other words, give the real culprit no (obvious) motive, means, or opportunity to be involved in the crime. To do this, you could have a guilty character who is acting strange but the protagonist can’t put his or her finger on why (at least not yet).</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="345" instrument_node="">You could also discredit the guilty character by giving them a personality or skill set that doesn’t feel typical of someone “bad.” In </span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="341" instrument_node="">, Professor McGonagall describes Peter Pettigrew as being “a stupid and foolish boy.” She also says that he was “a less than average student.” Nobody would have believed that Peter Pettigrew was capable of not only betraying his friends but of siding with Lord Voldemort too. This is what makes the surprise even more enjoyable.</span></p><span data-dcnode-id="339" instrument_node="">
</span><h3 data-dcnode-id="336"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">4. Focus the reader’s attention elsewhere when you plant clues.</span></strong></h3><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="327"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Misdirection is </span></strong><strong data-dcnode-id="330"><em data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">not </span></em></strong><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">about withholding information. It’s about giving the reader extra information and focusing their attention on that instead of the truth.&nbsp;</span></strong></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="325" instrument_node="">In </span><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="321" instrument_node="">, it’s easy to overlook all the clues that point to the truth about Scabbers. That’s because J.K. Rowling is a master at planting clues and directing the reader’s attention elsewhere!</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Sometimes she diverts the reader’s attention away from the truth by hiding clues within a list of things.</span></strong><span data-dcnode-id="316" instrument_node=""> For example, the creators of the Maurader’s Map–Moony, Wormtail, Padfoot, and Prongs. </span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="310"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Other times she distracts readers with action or high emotion.</span></strong><span data-dcnode-id="311" instrument_node=""> For example, when Crookshanks chases Scabbers around the room and Hermione and Ron get into a fight).</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="308" instrument_node="">The point? </span><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Don’t hold important information back from the reader. </span></strong><span data-dcnode-id="305" instrument_node="">Figure out a way to not only discretely plant the truth in your story, but to distract the reader from that truth with something interesting too.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h3 data-dcnode-id="300"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">5. Always play fair with the reader.</span></strong></h3><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">When someone reads your story, they give you their trust. They expect that what you tell them is the truth. They build on each bit of information, trying to understand the big picture and figure out what’s going to happen next.&nbsp;</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="295" instrument_node="">Tricking the reader by misleading them is fun (both for them and for you). </span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">But if you fool them by leaving out information they would legitimately have expected to be given, then you are just messing with them.&nbsp;</span></strong></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="290" instrument_node="">In </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31HRdXV"><em data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Harry Potter and the Prisoner of Azkaban</span></em></a><span data-dcnode-id="286" instrument_node="">, J.K. Rowling gave readers all the clues they needed to figure out Scabbers’ true identity. When the truth was revealed, readers were able to connect all the dots because all the clues were there from the start.&nbsp;</span><br data-dcnode-id="285"></p><span data-dcnode-id="283" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="282"><span data-dcnode-id="281" instrument_node="">
</span><div data-dcnode-id="272" style="display:none;"><figure class="wp-block-image" data-dcnode-id="273"><picture class="wp-image-45103" data-dcnode-id="275"><span data-dcnode-id="280" instrument_node="">
</span><source data-dcnode-id="279" sizes="(max-width: 683px) 100vw, 683px" srcset="https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-683x1024.png.webp 683w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-200x300.png.webp 200w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-67x100.png.webp 67w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-600x900.png.webp 600w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid.png.webp 735w" type="image/webp"><span data-dcnode-id="278" instrument_node="">
</span><img alt="" data-dcnode-id="277" height="1024" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-683x1024.png&amp;raw" srcset="https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-683x1024.png 683w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-200x300.png 200w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-67x100.png 67w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid-600x900.png 600w, https://storygrid.com/wp-content/uploads/2019/08/how-to-write-red-herrings-story-grid.png 735w" width="683"><span data-dcnode-id="276" instrument_node="">
</span></picture><span data-dcnode-id="274" instrument_node="">
</span></figure></div><span data-dcnode-id="271" instrument_node="">
</span><h2 data-dcnode-id="268"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Final Thoughts</span></strong></h2><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Red herrings are one of my personal favorite storytelling techniques. When done well, they help writers create plot twists that surprise even the most clever of readers.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">If you can learn to master this delicate dance of playing fair with the reader by giving them the truth, but diverting their attention elsewhere, you’ll create a story that sticks with readers until the end of time!</span></p><span data-dcnode-id="261" instrument_node="">

</span><div class="col-12 col-md-8" data-dcnode-id="208"><h2 data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">About the Author</span></h2><span data-dcnode-id="215" instrument_node="">
Savannah Gilbo is a developmental editor and book coach who helps fiction authors write, edit, and publish stories that work. Being a writer herself, Savannah understands the challenges and fears writers face when trying to turn their book dreams into realities. Through 1:1 coaching and developmental editing, she works with writers of all skill levels to combat these fears, and take their stories from an idea or messy first draft to a finished manuscript that works. She's also the host of the </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/podcastFWME"><span data-dcnode-id="214" instrument_node="">Fiction Writing Made Easy Podcast</span></a><span data-dcnode-id="212" instrument_node=""> that delivers actionable tips, tools, and strategies for writers each week. When she’s not busy creating her own stories, you can find Savannah writing articles for her blog or re-reading her favorite fantasy books over and over again. </span><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savannahgilbo.com/"><span data-dcnode-id="211" instrument_node="">You can learn more about Savannah and how she helps fiction writers here.</span></a><span data-dcnode-id="209" instrument_node=""> </span></div><span data-dcnode-id="207" instrument_node="">
