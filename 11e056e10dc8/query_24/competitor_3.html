</span><img alt="" data-dcnode-id="3804" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/iinside.jpg&amp;raw" width="160"><span data-dcnode-id="3803" instrument_node="">
</span></center><span data-dcnode-id="3801" instrument_node=""> </span></td><td data-dcnode-id="3632" valign="top"><p data-dcnode-id="3794"><i data-dcnode-id="3795"><b data-dcnode-id="3796"><font data-dcnode-id="3797" size="2"><span data-dcnode-id="3798" instrument_node="">The I Inside (2003)</span></font></b></i></p><span data-dcnode-id="3793" instrument_node="">
</span><p data-dcnode-id="3787"><img align="absmiddle" alt="" data-dcnode-id="3792" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="3791" instrument_node=""> </span><b data-dcnode-id="3788"><font data-dcnode-id="3789" size="2"><span data-dcnode-id="3790" instrument_node="">Hospital
                Patient Simon Cable Died in a Fatal Car Accident in the Year
                2002; Due to Memory Loss and His Confused State Between Life
                and Death, Simon Recalled a Similar Fatal
                Head-On Car Accident in the Year 2000. It Happened As a Result
                of Simon's Betrayal of His Brother Peter When He Was 
                Having An Affair With Peter's Fiancee Clair, and All Three Died
                in The Crash. Guilt-Ridden and With a Change of Heart, He Attempted
                to Save His Brother - Simon Struggled to Make Sense of
                Things and Change the Reality of His Death (While Efforts Were
                Made to Revive Him), But He Was Not Able to Be Resuscitated</span></font></b></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3783"><font data-dcnode-id="3784" size="2"><span data-dcnode-id="3785" instrument_node="">Director Roland Suso Richter's enigmatic psychological
            thriller (direct to video/DVD) was based upon screenwriter Michael
            Cooney's own play "Point of Death" - a title that gave
            away the film's entire plot twist premise. </span></font></p><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3770"><font data-dcnode-id="3771" size="2"><span data-dcnode-id="3781" instrument_node="">As in many similar films,
          such as </span><i data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Jacob's Ladder (1990)</span></i><span data-dcnode-id="3778" instrument_node="">, </span><i data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">Soul Survivors (2001)</span></i><span data-dcnode-id="3775" instrument_node="">, and </span><i data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">The
          Butterfly Effect (2004)</span></i><span data-dcnode-id="3772" instrument_node="">, events and people were thoroughly distorted
          and confused because the protagonist was at the point of death. The
          tagline was misleading: </span></font></p><span data-dcnode-id="3769" instrument_node="">
</span><blockquote data-dcnode-id="3763"><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3765"><font data-dcnode-id="3766" size="2"><span data-dcnode-id="3767" instrument_node="">"When You Don't Have a Memory, How Can You Remember
            Who to Trust?" </span></font></p><span data-dcnode-id="3764" instrument_node="">
</span></blockquote><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3759"><font data-dcnode-id="3760" size="2"><span data-dcnode-id="3761" instrument_node=""> The mind-warping film opened with a hospital patient
            Simon Cable (Ryan Phillippe) awakening in a hospital with little
            knowledge (amnesia perhaps?) of what had happened, and why he was
            there, etc. He was told by attending Dr. Jeremy Newman (Stephen Rea)
            that it was July 29, 2002 (Simon thought it was the year 2000 - he
            was confused - he heard a doctor say  20:00 hours!)
            and that he had died for two minutes from cardiac arrest following
            the near-fatal accident -- but he had been revived ("You're as good
            as new"). </span></font></p><span data-dcnode-id="3758" instrument_node="">
</span><blockquote data-dcnode-id="3748"><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3750"><font data-dcnode-id="3751" size="2"><span data-dcnode-id="3756" instrument_node="">Dr. Newman: "Simon, this is the 29th of July.
            The year is 2002. And your wife, whose name is Anna, is waiting outside."
              </span><br data-dcnode-id="3755"><span data-dcnode-id="3754" instrument_node="">
</span><br data-dcnode-id="3753"><span data-dcnode-id="3752" instrument_node="">
            (The doctor left off four crucial additional words, revealed in the
          film's ending.) (Spoiler: Simon had died and was
              not resuscitated!) </span></font></p><span data-dcnode-id="3749" instrument_node="">
</span></blockquote><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3744"><font data-dcnode-id="3745" size="2"><span data-dcnode-id="3746" instrument_node="">A major clue to everything that truly happened was
            the scene that played next under the credits - hospital staff failed
            to bring a patient back to life with a defibrillator after a car
            accident. Chest compressions failed and there was no pulse. A second
            major clue was provided by hospital orderly Travis (Stephen Graham):</span></font></p><span data-dcnode-id="3743" instrument_node="">
</span><blockquote data-dcnode-id="3737"><span data-dcnode-id="3742" instrument_node="">
</span><p data-dcnode-id="3739"><font data-dcnode-id="3740" size="2"><span data-dcnode-id="3741" instrument_node=""> "Everybody dies. No mystery there. But why
              and how everyone dies. Now, there's a mystery worth solving. Probably
              the biggest mystery there is." </span></font></p><span data-dcnode-id="3738" instrument_node="">
</span></blockquote><span data-dcnode-id="3736" instrument_node="">
</span><p data-dcnode-id="3733"><font data-dcnode-id="3734" size="2"><span data-dcnode-id="3735" instrument_node="">A third clue was provided by a doctor: </span></font></p><span data-dcnode-id="3732" instrument_node="">
</span><blockquote data-dcnode-id="3726"><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3728"><font data-dcnode-id="3729" size="2"><span data-dcnode-id="3730" instrument_node="">"The mind is a remarkable thing. Perhaps it
              is trying to show you something you need to see."</span></font></p><span data-dcnode-id="3727" instrument_node="">
</span></blockquote><span data-dcnode-id="3725" instrument_node="">
</span><p data-dcnode-id="3722"><font data-dcnode-id="3723" size="2"><span data-dcnode-id="3724" instrument_node="">For the remainder of the film, Simon's mind was in
          a confused state regarding the actual year, alarming events with
          his brother and wife, and his own existence. </span></font></p><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3718"><font data-dcnode-id="3719" size="2"><span data-dcnode-id="3720" instrument_node="">He thought he had lost two years of his life. He believed
            he was in a different time period and in the hospital following a
            different car accident. He recalled being a patient in the same St.
            Jude's Hospital (in Maine) in the year 2000 as the victim of a similar
            accident, when his older brother Peter (Robert Sean Leonard) died. The
          disoriented and confused Simon thought he had two missing years,
          from 2000 to 2002, and he struggled to put the pieces of his life
          together - a puzzle metaphor. Dr. Newman told
          him his objective: </span></font></p><span data-dcnode-id="3717" instrument_node="">
</span><blockquote data-dcnode-id="3711"><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3713"><font data-dcnode-id="3714" size="2"><span data-dcnode-id="3715" instrument_node="">"Think of it as if your life's a puzzle that's
            been jumbled up. All the pieces are still there. You just have to
            put them back together. Fit them in the right order and place...In
              order to recover what you've lost, Simon, we
              need to find the two points in time and join them."</span></font></p><span data-dcnode-id="3712" instrument_node="">
</span></blockquote><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3704"><font data-dcnode-id="3705" size="2"><span data-dcnode-id="3709" instrument_node="">He was also
          encouraged to start remembering: "The quicker that happens,
          the quicker you accept what </span><i data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">really</span></i><span data-dcnode-id="3706" instrument_node=""> happened, the quicker you'll
          find you'll be able to move on." </span></font></p><span data-dcnode-id="3703" instrument_node="">
</span><p data-dcnode-id="3700"><font data-dcnode-id="3701" size="2"><span data-dcnode-id="3702" instrument_node="">There were lots of  confused pathways that he explored
            as he darted back and forth as a time-traveler between the two years.
            He was attempting to piece together the experiences of his recent
            past (he inaccurately thought it was a two year period between 2000
            and 2002):</span></font></p><span data-dcnode-id="3699" instrument_node="">
</span><ul data-dcnode-id="3673"><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3695"><font data-dcnode-id="3696" size="2"><span data-dcnode-id="3697" instrument_node="">What year was it exactly? 2000 or 2002?</span></font></li><span data-dcnode-id="3694" instrument_node="">
</span><li data-dcnode-id="3691"><font data-dcnode-id="3692" size="2"><span data-dcnode-id="3693" instrument_node="">Was he poisoned by toxic fumes while refinishing
              his brother Peter's inherited estate? or Was he in the hospital
              recovering from a 2 year coma after the first accident? </span></font></li><span data-dcnode-id="3690" instrument_node="">
</span><li data-dcnode-id="3687"><font data-dcnode-id="3688" size="2"><span data-dcnode-id="3689" instrument_node="">Who were the two females that kept visiting him:
              mysterious girlfriend/lover Clair (Sarah Polley) and scheming,
              blackmailing wealthy wife (?) Anna (Piper Perabo) that he didn't
              remember?</span></font></li><span data-dcnode-id="3686" instrument_node="">
</span><li data-dcnode-id="3683"><font data-dcnode-id="3684" size="2"><span data-dcnode-id="3685" instrument_node="">And then, who was shy hospital Nurse Hathaway (Piper
              Perabo) - who resembled Anna? And what about when she revealed
              her devious, blackmailing side when she played him an audio tape
              of Peter's admission of the identity of his killer before his death
              (Peter: "Simon
              killed me")?
              Was there a cover-up of the truth behind Peter's death?</span></font></li><span data-dcnode-id="3682" instrument_node="">
</span><li data-dcnode-id="3679"><font data-dcnode-id="3680" size="2"><span data-dcnode-id="3681" instrument_node="">Was Simon responsible for his brother's death that
              occurred in 2000?</span></font></li><span data-dcnode-id="3678" instrument_node="">
</span><li data-dcnode-id="3675"><font data-dcnode-id="3676" size="2"><span data-dcnode-id="3677" instrument_node="">What was Simon's relation to heart-transplant patient
              Mr. Travitt (Stephen Lang)? After dying, had Simon donated his
              heart to the patient? Were Simon's confused visions for two years
              actually those of the surviving Travitt?</span></font></li><span data-dcnode-id="3674" instrument_node="">
</span></ul><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3669"><font data-dcnode-id="3670" size="2"><span data-dcnode-id="3671" instrument_node="">The true revelations of what happened came when Simon
            - with blood literally on his hands - admitted his guilt: "I
            killed him." In  a loathsome
            act of betrayal, Simon had kissed his brother Peter's fiancee Clair
            in the estate's sun-room. [Clair later told Simon: "I
            can't help but think that we're paying for what happened."]
            After a slight altercation, Peter accidentally fell from the estate's
            top floor through a skylight below. Simon drove his seriously-injured
            brother to Vista Point and contemplated rolling the car over the
            cliff (with Peter inside), to cover up the crime.</span></font></p><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3665"><font data-dcnode-id="3666" size="2"><span data-dcnode-id="3667" instrument_node="">In a replay of the same  event in his mind, guilt-ridden
            Simon had a sudden change of heart from his first inclination. He
            tried to change reality ("I
            thought I could change it"). He turned away from the Vista Point
            turn-off to take his brother to the hospital. Clair - who was driving
            back to the estate at the same time on the same narrow road - had
            a head-on collision with their car (due to blinding headlights),
            and everyone was killed. Two of the paramedics at the scene were
            Nurse Hathaway and Travis. </span></font></p><span data-dcnode-id="3664" instrument_node="">
</span><p data-dcnode-id="3661"><font data-dcnode-id="3662" size="2"><span data-dcnode-id="3663" instrument_node="">Although reluctant to accept his death   ("It
            wasn't supposed to happen like this"), Simon ultimately accepted
            the reality of his expiration. He remained in the afterlife with
            his brother Peter, who had counseled:</span></font></p><span data-dcnode-id="3660" instrument_node="">
</span><blockquote data-dcnode-id="3654"><span data-dcnode-id="3659" instrument_node="">
</span><p data-dcnode-id="3656"><font data-dcnode-id="3657" size="2"><span data-dcnode-id="3658" instrument_node=""> "You
            need to leave this behind you, Simon. For Clair, for me. For Dad.
            You died, Simon. We all did. And you can't move on from all this
            until you let go. Let it go."</span></font></p><span data-dcnode-id="3655" instrument_node="">
</span></blockquote><span data-dcnode-id="3653" instrument_node="">
</span><p data-dcnode-id="3650"><font data-dcnode-id="3651" size="2"><span data-dcnode-id="3652" instrument_node="">Simon's 'death' in his dream of the year 2000 was mirrored
            or paralleled with his  death in 2002. The film returned to
            the car accident scene - also shown in the film's opening - when
            Simon was being treated by emergency personnel. Peter told him: "It's
            your choice, Simon, where you go. It's your choice." A time stamp
            clock showed the time of his death: 20:02. </span></font></p><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3646"><font data-dcnode-id="3647" size="2"><span data-dcnode-id="3648" instrument_node="">Attending
          hospital physician Dr. Newman [revealed as Mr. Cable - the father
          of the two sons] matter-of-factly delivered the news to Simon in
          the film's final line - with an added final sentence - "You died,
          Mr. Cable."</span></font></p><span data-dcnode-id="3645" instrument_node="">
</span><blockquote data-dcnode-id="3639"><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3641"><font data-dcnode-id="3642" size="2"><span data-dcnode-id="3643" instrument_node="">"Simon, this is
            the 29th of July. The year is 2002. And your wife, whose name is
            Anna, is waiting outside. You died, Mr. Cable."</span></font></p><span data-dcnode-id="3640" instrument_node="">
</span></blockquote><span data-dcnode-id="3638" instrument_node="">
</span><p data-dcnode-id="3633"><font data-dcnode-id="3634" size="2"><span data-dcnode-id="3637" instrument_node=""> [There was no
          mention of him being revived.] </span><br data-dcnode-id="3636"><span data-dcnode-id="3635" instrument_node="">
</span></font></p></td><td data-dcnode-id="3540" valign="top"><center data-dcnode-id="3541"><span data-dcnode-id="3630" instrument_node="">
</span><img alt="" data-dcnode-id="3629" height="111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside.jpg&amp;raw" width="160"><span data-dcnode-id="3628" instrument_node=""> </span><br data-dcnode-id="3627"><span data-dcnode-id="3626" instrument_node="">
</span><font data-dcnode-id="3624" size="2"><span data-dcnode-id="3625" instrument_node="">Simon Cable (Ryan Phillippe)</span></font><br data-dcnode-id="3623"><span data-dcnode-id="3622" instrument_node="">
</span><img alt="" data-dcnode-id="3621" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/theiinside.jpg&amp;raw" width="160"><span data-dcnode-id="3620" instrument_node=""> </span><br data-dcnode-id="3619"><span data-dcnode-id="3618" instrument_node="">
</span><font data-dcnode-id="3616" size="2"><span data-dcnode-id="3617" instrument_node="">Dr. Newman (Stephen Rea) </span></font><br data-dcnode-id="3615"><span data-dcnode-id="3614" instrument_node="">
</span><img alt="" data-dcnode-id="3613" height="107" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside2.jpg&amp;raw" width="160"><span data-dcnode-id="3612" instrument_node=""> </span><br data-dcnode-id="3611"><span data-dcnode-id="3610" instrument_node="">
</span><font data-dcnode-id="3608" size="2"><span data-dcnode-id="3609" instrument_node="">Clair (Sarah Polley), Peter's Fiancee </span></font><br data-dcnode-id="3607"><span data-dcnode-id="3606" instrument_node="">
</span><img alt="" data-dcnode-id="3605" height="114" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside3.jpg&amp;raw" width="160"><span data-dcnode-id="3604" instrument_node=""> </span><br data-dcnode-id="3603"><span data-dcnode-id="3602" instrument_node="">
</span><font data-dcnode-id="3600" size="2"><span data-dcnode-id="3601" instrument_node="">Anna (Piper Perabo), Simon's Wife </span></font><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">
</span><img alt="" data-dcnode-id="3597" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside4.jpg&amp;raw" width="160"><span data-dcnode-id="3596" instrument_node=""> </span><br data-dcnode-id="3595"><span data-dcnode-id="3594" instrument_node="">
</span><font data-dcnode-id="3592" size="2"><span data-dcnode-id="3593" instrument_node="">Simon Kissing Clair</span></font><span data-dcnode-id="3591" instrument_node=""> </span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">
</span><img alt="" data-dcnode-id="3588" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside5.jpg&amp;raw" width="160"><span data-dcnode-id="3587" instrument_node=""> </span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">
</span><font data-dcnode-id="3583" size="2"><span data-dcnode-id="3584" instrument_node="">Peter

</span><img alt="" data-dcnode-id="3580" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside6.jpg&amp;raw" width="160"><span data-dcnode-id="3579" instrument_node=""> </span><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">

</span><img alt="" data-dcnode-id="3572" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside7.jpg&amp;raw" width="160"><span data-dcnode-id="3571" instrument_node=""> </span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node="">

</span><img alt="" data-dcnode-id="3564" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside8.jpg&amp;raw" width="160"><span data-dcnode-id="3563" instrument_node=""> </span><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">
</span><font data-dcnode-id="3559" size="2"><span data-dcnode-id="3560" instrument_node="">The Car Crash </span></font><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">
</span><img alt="" data-dcnode-id="3556" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside9.jpg&amp;raw" width="160"><span data-dcnode-id="3555" instrument_node=""> </span><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">
</span><font data-dcnode-id="3551" size="2"><span data-dcnode-id="3552" instrument_node="">Simon's Death </span></font><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node="">
</span><img alt="" data-dcnode-id="3548" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/iinside10.jpg&amp;raw" width="160"><span data-dcnode-id="3547" instrument_node=""> </span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">

</span><img alt="" data-dcnode-id="3534" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/ipassforhuman.jpg&amp;raw" width="160"><span data-dcnode-id="3533" instrument_node="">
</span></center><span data-dcnode-id="3531" instrument_node=""> </span></td><td data-dcnode-id="3361" valign="top"><p data-dcnode-id="3524"><i data-dcnode-id="3525"><b data-dcnode-id="3526"><font data-dcnode-id="3527" size="2"><span data-dcnode-id="3528" instrument_node="">I Pass For Human (2004)</span></font></b></i></p><span data-dcnode-id="3523" instrument_node="">
</span><p data-dcnode-id="3517"><img align="absmiddle" alt="" data-dcnode-id="3522" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="3521" instrument_node=""> </span><b data-dcnode-id="3518"><font data-dcnode-id="3519" size="2"><span data-dcnode-id="3520" instrument_node="">Strung-Out,
                High and Associating With All the Wrong Habitual Drug-Using Crackhead
                Acquaintances, Jane Eventually Overdosed - and Realized To Her
                Shock and Horror - That She Had Become  One of the Undead
                Zombies That Had Been Haunting Her </span></font></b></p><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3507"><font data-dcnode-id="3508" size="2"><span data-dcnode-id="3515" instrument_node="">Writer/director Chris D.'s (Chris Desjardins) first
            feature-length film was this direct-to-DVD/video low-budget, independent
            horror film. The over-used plot twist in this film was also seen
          in </span><i data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Carnival of Souls (1962)</span></i><span data-dcnode-id="3512" instrument_node="">, </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Siesta (1987), Jacob's Ladder
          (1990), A Pure Formality (1994), The Sixth Sense (1999), The Others
          (2001), Soul Survivors (2001), Stay (2005)</span></i><span data-dcnode-id="3509" instrument_node="">, and many other films.</span></font></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3503"><font data-dcnode-id="3504" size="2"><span data-dcnode-id="3505" instrument_node="">The grim movie from the Flesh Eater punk rocker was
            about the LA drug scene, in which drug use (equated with undead zombies)
            robbed individuals of their identities and pulled them into the nightmarish
          world of the dead filled with ghoulish creatures. The tagline summarized
          the metaphoric effects:</span></font></p><span data-dcnode-id="3502" instrument_node="">
</span><blockquote data-dcnode-id="3496"><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3498"><font data-dcnode-id="3499" size="2"><span data-dcnode-id="3500" instrument_node=""> "When
            addicts die, their torment ends...or is it really only just beginning?" </span></font></p><span data-dcnode-id="3497" instrument_node="">
</span></blockquote><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3492"><font data-dcnode-id="3493" size="2"><span data-dcnode-id="3494" instrument_node="">The crude and amateurish film opened with tattooed
            Jane (Eleanor Whitledge), not yet an habitual drug user, worried
            about the condition of her heroin-addicted boyfriend Dax (Bryan Small)
            who was experiencing visions of old friends - all users who were
            OD victims: </span></font></p><span data-dcnode-id="3491" instrument_node="">
</span><blockquote data-dcnode-id="3485"><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3487"><font data-dcnode-id="3488" size="2"><span data-dcnode-id="3489" instrument_node="">"He's seeing
            things. People. People that aren't there - dead people...He says
            they're people that he knows who OD'd." </span></font></p><span data-dcnode-id="3486" instrument_node="">
</span></blockquote><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3481"><font data-dcnode-id="3482" size="2"><span data-dcnode-id="3483" instrument_node="">She met with her concerned
          drug counselor Dr. Larraz (cult queen Mary Woronov), who urged her
          to break up with him. When she returned home, she found that Dax
          had already suffered a deadly overdose in the bathroom after shooting
          up.</span></font></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3477"><font data-dcnode-id="3478" size="2"><span data-dcnode-id="3479" instrument_node="">Tormented and despondent after Dax's death, Jane was
            having hallucinations herself. Especially when she was high, she
            saw phantom apparitions that weren't there. She was introduced by
            Dax's self-destructive, strung-out, drug-abusing half-sister Mila
            (Jennifer Ciesar) to Rick (Joshua Cox), who had also recently lost
            his sexy girlfriend Azami (Eva Scott) to drugs. Strangely, Mila reported
            that she had seen Azami at Dax's gravesite. Rick explained how he
            spied on Azami buying hard drugs and using them with her "strung
            out" ex-husband (John Diehl). Azami overdosed and died in her
            parents' (Jake and Elke Hill) home when staying there overnight with
            Rick. [On a side-note, just before she died,
            Rick had helped Azami cover up the deliberate murder (by suffocation)
            of her abusive, overdosed ex-husband with 4x's dosage, and the disposal
            of his corpse.] </span></font></p><span data-dcnode-id="3476" instrument_node="">
</span><p data-dcnode-id="3473"><font data-dcnode-id="3474" size="2"><span data-dcnode-id="3475" instrument_node=""> Rick and Jane bonded and soon, they became users together.
          After shooting up for the first time, Jane admitted: "I'm
          such a weak-willed piece of s--t." Jane said that she was
          seeing many undead zombies, including lost partners Dax, Azami, and
          blonde Samantha (Iris Berry): "I'm
          seeing god-damned people who aren't there...Why are we suddenly seeing
          ghosts? Is it the dope?" Were
          they ghouls, vampires, or just hallucinations? Rick and Mila, both
          habitual users, acquired drugs from Mila's "heroin-bar"
          source - brutish drug dealer Hobby (E. Shepherd Stevenson).</span></font></p><span data-dcnode-id="3472" instrument_node="">
</span><p data-dcnode-id="3469"><font data-dcnode-id="3470" size="2"><span data-dcnode-id="3471" instrument_node=""> Jane's doctor,
            an ex-addict herself (in med school, she was a junkie to morphine) 
            thought there was some truth to the belief that the leeching, blood-thirsty,
            vampirish zombie creatures vicariously fed off the highs of living
            users: </span></font></p><span data-dcnode-id="3468" instrument_node="">
</span><blockquote data-dcnode-id="3462"><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3464"><font data-dcnode-id="3465" size="2"><span data-dcnode-id="3466" instrument_node="">"The spirits of dead junkies attach themselves to
              other living junkies like leeches...They didn't have the burden
              of physical bodies but they still had the thirst. They still wanted
              the high. Sometimes, I thought somebody was standing right next
            to me, and they were waiting for me to put the needle in my arm...Maybe
              spirits who die from alcoholism or from drugs in some violent way
              - they have trouble passing on. Either they don't want to or they
              can't. Both."</span></font></p><span data-dcnode-id="3463" instrument_node="">
</span></blockquote><span data-dcnode-id="3461" instrument_node="">

</span><p data-dcnode-id="3388"><font data-dcnode-id="3389" size="2"><span data-dcnode-id="3390" instrument_node="">Jane feared she was developing a physical addiction,
          but before that happened, wondered if she could enter a 30-day rehabilitation
          program to avoid following the path of her acquaintances ("I don't
          know one sane person. Everyone I know who wasn't crazy is gone").
          In the week before Jane could arrange for rehab, she bought dope
          from Hobby, who then accused her of stealing his larger
            stash of dope (Mila was the culprit). At shot-gun point, he threatened
            to rape Jane in the back of his van, but Rick arrived and put a bullet
            in his head to save her. With a blood-splattered face, she fled to
            a nightclub, where she was followed by a haunting Samantha and Azami
            and saw a decomposed Dax in a bathtub. </span></font></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3384"><font data-dcnode-id="3385" size="2"><span data-dcnode-id="3386" instrument_node="">Meanwhile, with Rick's gun,
          Mila shot and killed a security guard after shoplifting in a convenience
          store. In her apartment, Jane shot up one final time, and as she
          prepared a bath,  collapsed. At the same time, Mila over-dosed
          (in the company of Azami and Samantha), and guilt-ridden Rick (about
            covering up Azami's murder) planned to suicidally take his own life
            with his gun. Just before putting the gun in his mouth and killing
            himself, Rick spoke to the zombified ex-husband who urged him to
            get off the "merry-go-round" of life:
            </span></font></p><span data-dcnode-id="3383" instrument_node="">
</span><blockquote data-dcnode-id="3377"><span data-dcnode-id="3382" instrument_node="">
</span><p data-dcnode-id="3379"><font data-dcnode-id="3380" size="2"><span data-dcnode-id="3381" instrument_node="">"Well maybe, shootin' dope or smokin' crack or even
              funneling liters of Stoli down your gullet,  you're kinda sittin'
              up on a fence. You're lookin' down at the yard where you climbed
              up from and you see light goin' on down there. And you look down
              on the other side and you see that - you see the opposite. You
              see us. Dope addicts - they're always sittin' on top of a fence,
              and you never know which way they're gonna jump." </span></font></p><span data-dcnode-id="3378" instrument_node="">
</span></blockquote><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3373"><font data-dcnode-id="3374" size="2"><span data-dcnode-id="3375" instrument_node="">In the not very surprising twist ending (the very ubiquitous
            death-dream revelation), Jane (who believed she was alive) ventured
            to Azami's ex-husband's house, where she was surrounded by  many
             dead junkie apparitions, including all her dead acquaintances. She
            was spiteful when Dax and others offered her a hit:</span></font></p><span data-dcnode-id="3372" instrument_node="">
</span><blockquote data-dcnode-id="3366"><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3368"><font data-dcnode-id="3369" size="2"><span data-dcnode-id="3370" instrument_node="">"If I go out and under, OD,
            won't that be one less tit for you to suck on? I won't be any good
            to you dead. It would just be one more mouth to feed." </span></font></p><span data-dcnode-id="3367" instrument_node="">
</span></blockquote><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3362"><font data-dcnode-id="3363" size="2"><span data-dcnode-id="3364" instrument_node="">Azami urged: "We'd rather have you here, with us" -
            and attempted to bite into her neck. Then, after fleeing back to
            her apartment, Jane discovered that she was also dead from an overdose,
        lying in her own bed. </span></font></p></td><td data-dcnode-id="3268" valign="top"><center data-dcnode-id="3269"><span data-dcnode-id="3359" instrument_node="">

</span><p data-dcnode-id="3244"><img align="absmiddle" alt="" data-dcnode-id="3249" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="3248" instrument_node=""> </span><font data-dcnode-id="3245" size="2"><b data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">All
              of the Victims at the Hotel Weren't Real; They Were All the Split
              Personalities of Their "Host" - a Serial Killer Named
              Malcolm Rivers, Who Envisioned the Murders In His Head; Timmy Was
              the One Murderous 'Evil' Personality Inside Him That Was Attempting
              to Purge the Other Personalities </span></b></font></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3234"><font data-dcnode-id="3235" size="2"><span data-dcnode-id="3242" instrument_node="">Director James Mangold's psychological thriller was
            similar to a popular concept of many plot twisters, a combination
            of </span><i data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Fight Club (1999)</span></i><span data-dcnode-id="3239" instrument_node=""> and Agatha Christie's novel </span><i data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">And Then
            There Were None</span></i><span data-dcnode-id="3236" instrument_node="">,
            adapted into many film versions. In
          the familiar thematic plot, a group of individuals in a remote location
          were being killed off, one by one.</span></font></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3230"><font data-dcnode-id="3231" size="2"><span data-dcnode-id="3232" instrument_node=""> In
          this filmed story, during a torrential rainstorm, ten strangers were
            trapped in a secluded motel in Nevada, owned-managed by Larry Washington.
          They were forced to band together when someone started killing them.</span></font></p><span data-dcnode-id="3229" instrument_node="">
</span><blockquote data-dcnode-id="3223"><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3225"><font data-dcnode-id="3226" size="2"><span data-dcnode-id="3227" instrument_node="">[Note: Strangely, all of the ten
            individuals had the same birthday, and their surnames were linked
              to US states, e.g., Louis-iana, Carolina, New York, Rhode(s) Island,
              etc.] </span></font></p><span data-dcnode-id="3224" instrument_node="">
</span></blockquote><span data-dcnode-id="3222" instrument_node="">
</span><ul data-dcnode-id="3174"><span data-dcnode-id="3221" instrument_node="">
</span><li data-dcnode-id="3218"><font data-dcnode-id="3219" size="2"><span data-dcnode-id="3220" instrument_node="">Caroline Suzanne (Rebecca de Mornay), 1980s TV-Hollywood
          actress - stabbed, then decapitated</span></font></li><span data-dcnode-id="3217" instrument_node="">
</span><li data-dcnode-id="3214"><font data-dcnode-id="3215" size="2"><span data-dcnode-id="3216" instrument_node="">Lou Isiana (William Lee Scott), newlywed husband
              - stabbed </span></font></li><span data-dcnode-id="3213" instrument_node="">
</span><li data-dcnode-id="3210"><font data-dcnode-id="3211" size="2"><span data-dcnode-id="3212" instrument_node="">Robert Maine (Jake Busey), inmate in yellow jumpsuit
              - struck in throat with baseball bat </span></font></li><span data-dcnode-id="3209" instrument_node="">
</span><li data-dcnode-id="3206"><font data-dcnode-id="3207" size="2"><span data-dcnode-id="3208" instrument_node="">Larry Washington (John Hawkes), motel owner-manager
              - found dead in a freezer </span></font></li><span data-dcnode-id="3205" instrument_node="">
</span><li data-dcnode-id="3202"><font data-dcnode-id="3203" size="2"><span data-dcnode-id="3204" instrument_node="">George York (John C. McGinley), Alice's husband
          and Timmy's stepfather - accidentally run-over </span></font></li><span data-dcnode-id="3201" instrument_node="">
</span><li data-dcnode-id="3198"><font data-dcnode-id="3199" size="2"><span data-dcnode-id="3200" instrument_node="">Alice York (Leila Kenzle), George's wife, mother
              of Timmy - died of earlier limo accident injuries </span></font></li><span data-dcnode-id="3197" instrument_node="">
</span><li data-dcnode-id="3194"><font data-dcnode-id="3195" size="2"><span data-dcnode-id="3196" instrument_node="">Ginny Isiana (Clea DuVall), newlywed wife, superstitious
              - car explosion (although smothered earlier by Timmy before the
              car was blown up) </span></font></li><span data-dcnode-id="3193" instrument_node="">
</span><li data-dcnode-id="3190"><font data-dcnode-id="3191" size="2"><span data-dcnode-id="3192" instrument_node="">Edward "Ed" Dakota (John Cusack), an ex-LAPD
            cop and limousine driver - gunshot </span></font></li><span data-dcnode-id="3189" instrument_node="">
</span><li data-dcnode-id="3186"><font data-dcnode-id="3187" size="2"><span data-dcnode-id="3188" instrument_node="">Samuel Rhodes (Ray Liotta), an ex-convict who assumed
              identity of a police officer, who was transporting inmate Robert
              Maine - gunshot </span></font></li><span data-dcnode-id="3185" instrument_node="">
</span><li data-dcnode-id="3180"><font data-dcnode-id="3181" size="2"><span data-dcnode-id="3184" instrument_node="">Paris Nevada (Amanda Peet), a Las Vegas hooker -
              by garden fork-rake </span><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">
            AND</span></font></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3176"><font data-dcnode-id="3177" size="2"><span data-dcnode-id="3178" instrument_node="">Timmy York (Bret Loehr), 9 year-old mute son of
              George and Alice </span></font></li><span data-dcnode-id="3175" instrument_node="">
</span></ul><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3167"><font data-dcnode-id="3168" size="2"><span data-dcnode-id="3172" instrument_node="">In this high-concept film with a well-constructed plot
          twist, each of the strangers that was being murdered, one-by-one
          (each victim had a room key placed on or near their body, with each
            room number connected to the order of the deaths), was </span><i data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">not</span></i><span data-dcnode-id="3169" instrument_node=""> a
          real person. They were  specific personalities of the 'host' Malcolm
          Rivers (Pruitt Taylor Vince).</span></font></p><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3163"><font data-dcnode-id="3164" size="2"><span data-dcnode-id="3165" instrument_node="">Malcolm was a convicted
          death-row inmate and serial killer, facing the death penalty and guilty
          of committing brutal murders in the real-world. His doctor, Dr. Malick
            (Alfred Molina), argued that Malcolm suffered from Multiple Personality
          Disorder (or Disassociative Identity Syndrome). He theorized that Malcolm
          was criminally insane - and that his one 'evil' homicidal personality
          was 'cleansing' himself of the other normal and sympathetic personalities
            - those were the 'individuals' at the motel. The scenario in Malcolm's
            head was based on elements of his real life - for example, he was
            abandoned in a motel as a boy.</span></font></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3158"><span data-dcnode-id="3161" instrument_node=""> </span><font data-dcnode-id="3159" size="2"><span data-dcnode-id="3160" instrument_node="">After a final clemency hearing
        with a court judge, it was ruled that the death penalty be overturned:</span></font></p><span data-dcnode-id="3157" instrument_node="">
</span><blockquote data-dcnode-id="3151"><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3153"><font data-dcnode-id="3154" size="2"><span data-dcnode-id="3155" instrument_node=""> "A question is whether to convict  the
            body or the mind. His body committed these murders, that is true.
            The person who remains inside did not."  </span></font></p><span data-dcnode-id="3152" instrument_node="">
</span></blockquote><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3147"><font data-dcnode-id="3148" size="2"><span data-dcnode-id="3149" instrument_node="">Malcolm  was 
          being taken by van with his doctor, Dr. Malick (Alfred Molina), to
          state psychiatric services after it was recommended that his execution
          be held off since it was believed that his homicidal identity had
          'died.' During the drive, Malcolm had another
          startling vision of his last two remaining personalities: Paris and
          Timmy.</span></font></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3143"><font data-dcnode-id="3144" size="2"><span data-dcnode-id="3145" instrument_node="">The only one allowed in his mind to leave the motel
          alive was cynical ex-Las Vegas prostitute Paris, who
          was digging in her Florida garden when she found an orange motel
          door key with the number '1' on it. She turned to see seemingly
          innocent, mute young Timmy York who was revealed (in a quick flashback
          montage) to be the one murderous or guilty personality, who was responsible,
            directly or indirectly, for the deaths of all of the motel occupants. 
			The boy proceeded to kill her with a garden plowing
            fork-rake (off-screen) after telling her:</span></font></p><span data-dcnode-id="3142" instrument_node="">
</span><blockquote data-dcnode-id="3136"><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3138"><font data-dcnode-id="3139" size="2"><span data-dcnode-id="3140" instrument_node=""> Whores
            don't get a second chance.</span></font></p><span data-dcnode-id="3137" instrument_node="">
</span></blockquote><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3132"><font data-dcnode-id="3133" size="2"><span data-dcnode-id="3134" instrument_node="">Timmy then took control of Malcolm's personality and
            strangled psychiatrist Dr. Malick in the front seat of the van as
            the vehicle lurched to the side of the road. Timmy
            whispered the nursery rhyme (in voice-over) as the film ended:</span></font></p><span data-dcnode-id="3131" instrument_node="">
</span><blockquote data-dcnode-id="3125"><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3127"><font data-dcnode-id="3128" size="2"><span data-dcnode-id="3129" instrument_node=""> While
            I was going up the stairs, I met a man who wasn't there. He wasn't
            there again today. I wish, I wish he'd go away.</span></font></p><span data-dcnode-id="3126" instrument_node="">
</span></blockquote></td><td data-dcnode-id="3057" valign="top" width="20%"><center data-dcnode-id="3058"><span data-dcnode-id="3122" instrument_node="">

</span><font data-dcnode-id="3060" size="2"><span data-dcnode-id="3061" instrument_node="">Malcolm Rivers Strangling  Dr. Malick in Transport Van</span></font><span data-dcnode-id="3059" instrument_node="">

</span><font data-dcnode-id="3050" size="2"><img alt="" data-dcnode-id="3051" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/screens/illusionist.jpg&amp;raw" width="160"></font><span data-dcnode-id="3049" instrument_node="">
</span></center><span data-dcnode-id="3047" instrument_node=""> </span></td><td data-dcnode-id="2966" valign="top"><p data-dcnode-id="3040"><em data-dcnode-id="3041"><strong data-dcnode-id="3042"><font data-dcnode-id="3043" size="2"><span data-dcnode-id="3044" instrument_node="">The Illusionist (2006)</span></font></strong></em></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3033"><img align="absmiddle" alt="" data-dcnode-id="3038" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="3037" instrument_node=""> </span><b data-dcnode-id="3034"><font data-dcnode-id="3035" size="2"><span data-dcnode-id="3036" instrument_node="">Sophie/Duchess
               Was Never Killed by Her Abusive Fiancee Prince Leopold; It Was
              An Illusion To Frame Leopold, So That Magician Eisenheim and Lover
              Sophie Could Reunite and Run Away Together </span></font></b></p><span data-dcnode-id="3032" instrument_node="">
</span><p data-dcnode-id="3026"><font data-dcnode-id="3027" size="2"><span data-dcnode-id="3031" instrument_node="">Writer/director Neil  Burger's dazzling and glowing
            period melodrama (and fairy-tale romance) was loosely adapted from
            the story </span><em data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Eisenheim the Illusionist</span></em><span data-dcnode-id="3028" instrument_node="">,
            by Steven Millhauser - about the turn-of-the-century Viennese magician/wizard.
        </span></font></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3022"><font data-dcnode-id="3023" size="2"><span data-dcnode-id="3024" instrument_node="">The first three quarters of the film was basically
            a flashback to explain events occurring before the opening scene.
            It was narrated (in voice-over) by the dogged and determined Chief
            Police Inspector Walter Uhl (Paul Giamatti) to describe why he was
            arresting stage performer Eisenheim (Edward Norton) (aka Eduard Abramovich).</span></font></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3018"><font data-dcnode-id="3019" size="2"><span data-dcnode-id="3020" instrument_node="">The ambitious Uhl was in obligatory allegiance to the
          surly, competitive, arrogant and abusive Crown Prince Leopold (Rufus
          Sewell) who was planning to usurp the Austrian-Hungarian throne. As
          childhood friends, lower-class magician Eisenheim (Aaron Johnson) had
          fallen in love with Sophie (Eleanor Tomlinson), the future Duchess
          von Teschen (Jessica Biel). After he gave her a wooden, butterfly-decorated
          twisting locket that when turned took the shape of a heart (with his
      picture inside) (and she prophetically told him: "One day we'll run
      away together. We'll disappear"), they were forcibly and cruelly separated
      and didn't see each other until 15 years later, when she was engaged to
      marry the Crown Prince. She was reluctantly volunteered by the Prince to
      participate in an on-stage demonstration in Eisenheim's illusionist theatre
      show.</span></font></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3014"><font data-dcnode-id="3015" size="2"><span data-dcnode-id="3016" instrument_node="">The film revealed that the charming Eisenheim and the
          serenely-beautiful Duchess, who was increasingly reluctant to marry,
          had again reignited their love for each other during a secret love-making
          rendezvous. When the Duchess determinedly told the drunken and jealous
          Prince that she wouldn't marry him and was leaving permanently, it
        appeared that she was murdered. </span></font></p><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3010"><font data-dcnode-id="3011" size="2"><span data-dcnode-id="3012" instrument_node="">Off-screen in the horse stables, she
        was struck across the neck with his jewel-encrusted sword, rode off
        slouched half-dead on a horse that wandered into the forest, and bled
        to death. Her lifeless body was later found in a stream. Although the
        Prince was suspected of the crime, his royal status prevented any serious
        consideration of his guilt. </span></font></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3006"><font data-dcnode-id="3007" size="2"><span data-dcnode-id="3008" instrument_node="">Eisenheim's new stage show entered the supernatural
        realm of the spirits. With hired Chinese, the talented illusionist was
        conjuring up spirits, including Sophie's spirit. When her ghostly image
        materialized twice on stage, Eisenheim made it appear like she was accusing
        Leopold of the crime. </span></font></p><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="3002"><font data-dcnode-id="3003" size="2"><span data-dcnode-id="3004" instrument_node="">The conclusion of the opening arrest scene was
        then played out - Eisenheim escaped when his spirit also faded and
        vanished. Uhl was led to evidence in the stable linking the Prince
        to the murder (an emerald from the Prince's sword and Sophie's locket).
        When he accused Leopold of the murder, the Prince committed suicide
        by shooting himself in the head.</span></font></p><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2998"><font data-dcnode-id="2999" size="2"><span data-dcnode-id="3000" instrument_node="">The film's twist was an illusion all
        its own - in the concluding sequence, Uhl was given a book with Eisenheim's
        detailed drawings of the solution to the "ORANGE TREE" trick,
        signifying that Eisenheim's magic was completely illusionary. At the
        same time, the locket in Uhl's possession was pickpocketed by a disguised
        Eisenheim, who hurriedly boarded a train for the country, to cheerfully
        reunite with Sophie. </span></font></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2994"><font data-dcnode-id="2995" size="2"><span data-dcnode-id="2996" instrument_node="">In a spectacular and exhilarating montage, Uhl suddenly
        pieced together the fact that Sophie's death had been a complete and
        deceptive frameup to implicate Leopold: </span></font></p><span data-dcnode-id="2993" instrument_node="">
</span><ol data-dcnode-id="2971"><span data-dcnode-id="2992" instrument_node="">
</span><li data-dcnode-id="2989"><font data-dcnode-id="2990" size="2"><span data-dcnode-id="2991" instrument_node="">She had taken a drug to fake
          death</span></font></li><span data-dcnode-id="2988" instrument_node="">
</span><li data-dcnode-id="2985"><font data-dcnode-id="2986" size="2"><span data-dcnode-id="2987" instrument_node="">The attending "doctor" (Karl
          Johnson) was a friend of Eisenheim's</span></font></li><span data-dcnode-id="2984" instrument_node="">
</span><li data-dcnode-id="2981"><font data-dcnode-id="2982" size="2"><span data-dcnode-id="2983" instrument_node="">Sophie had drugged Leopold's
          wine the night of the 'murder'</span></font></li><span data-dcnode-id="2980" instrument_node="">
</span><li data-dcnode-id="2977"><font data-dcnode-id="2978" size="2"><span data-dcnode-id="2979" instrument_node="">During the 'sword in the stone'
          illusion performed at the palace, Eisenheim had taken the green gemstone
          from Leopold's sword</span></font></li><span data-dcnode-id="2976" instrument_node="">
</span><li data-dcnode-id="2973"><font data-dcnode-id="2974" size="2"><span data-dcnode-id="2975" instrument_node="">Sophie had spread blood on the sword
          and on the horse's mane</span></font></li><span data-dcnode-id="2972" instrument_node="">
</span></ol><span data-dcnode-id="2970" instrument_node="">
</span><p data-dcnode-id="2967"><font data-dcnode-id="2968" size="2"><span data-dcnode-id="2969" instrument_node="">The film's last line was Uhl's memory of Eisenheim
        saying: "Everything
        you have seen is an illusion. It's a trick," as he laughed to himself
        at the recollection.</span></font></p></td><td data-dcnode-id="2919" valign="top"><center data-dcnode-id="2920"><span data-dcnode-id="2964" instrument_node="">

</span><img alt="" data-dcnode-id="2955" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/illusionist3.jpg&amp;raw" width="160"><span data-dcnode-id="2954" instrument_node=""> </span><br data-dcnode-id="2953"><span data-dcnode-id="2952" instrument_node="">

</span><img alt="" data-dcnode-id="2946" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/illusionist4.jpg&amp;raw" width="160"><span data-dcnode-id="2945" instrument_node=""> </span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">

</span><img alt="" data-dcnode-id="2938" height="122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/illusionist2.jpg&amp;raw" width="160"><span data-dcnode-id="2937" instrument_node=""> </span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">

</span></center></td></tr><tr bordercolor="#cccccc" data-dcnode-id="2783" valign="top"><td data-dcnode-id="2908" valign="top"><center data-dcnode-id="2910"><span data-dcnode-id="2914" instrument_node="">
</span><font data-dcnode-id="2912" size="2"><img alt="" data-dcnode-id="2913" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/screens/incompanyofmen.jpg&amp;raw" width="160"></font><span data-dcnode-id="2911" instrument_node="">
</span></center><span data-dcnode-id="2909" instrument_node=""> </span></td><td data-dcnode-id="2849" valign="top"><p data-dcnode-id="2902"><font data-dcnode-id="2903" size="2"><i data-dcnode-id="2904"><strong data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">In the Company of Men (1997)</span></strong></i></font></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2895"><img align="absmiddle" alt="" data-dcnode-id="2900" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="2899" instrument_node=""> </span><b data-dcnode-id="2896"><font data-dcnode-id="2897" size="2"><span data-dcnode-id="2898" instrument_node="">Chad
              Had Never Broken Up With Girlfriend Suzanne; The Dating/Dumping
              of Deaf Christine Was a Cruel Practical Joke; Chad's Manipulated
              Pal Howard Had Fallen in Love With Christine, But She Wouldn't
              Take Him Back </span></font></b></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2888"><font data-dcnode-id="2889" size="2"><span data-dcnode-id="2893" instrument_node="">Writer/director Neil LaBute's  disturbing drama (his
            debut film, a low-budget independent film) had as its thematic premise: "Let's
            hurt somebody" - a line spoken by corporate ex frat-boy Chad
            (Aaron Eckhart) out to seek premeditated, retributive revenge on
            women, after he claimed he had broken up with steady girlfriend Suzanne
            (Emily Cline) - and she had packed up, leaving him only a futon and
            his </span><em data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">American Gigolo</span></em><span data-dcnode-id="2890" instrument_node=""> poster. 
      Chad expressed his vile hatred of the fair sex:</span></font></p><span data-dcnode-id="2887" instrument_node="">
</span><blockquote data-dcnode-id="2881"><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2883"><font data-dcnode-id="2884" size="2"><span data-dcnode-id="2885" instrument_node="">Women. Nice ones,
            the most frigid of the race - it doesn't matter in the end. Inside,
            they're all the same: Meat and gristle and hatred, just simmering.</span></font></p><span data-dcnode-id="2882" instrument_node="">
</span></blockquote><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2877"><font data-dcnode-id="2878" size="2"><span data-dcnode-id="2879" instrument_node="">As the
          handsome Chad and bespectacled business colleague/nice-guy college
            pal Howard (Matt Malloy) were traveling to a project in a branch
            office for a six-week stint, Howard described how his relationship
            with girlfriend Melanie fell apart (even after he gave her a ring).
             Misogynistic Chad thought "we
          ought to do something about it" - referring to how women were "getting
          out of balance," and cruelly proposed that they find an unattractive
          woman, date her, and then unceremoniously dump her during their six
        week stint:</span></font></p><span data-dcnode-id="2876" instrument_node="">
</span><blockquote data-dcnode-id="2870"><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2872"><font data-dcnode-id="2873" size="2"><span data-dcnode-id="2874" instrument_node="">Say we were to find some gal...this person's just
            vulnerable as hell. You know, young thing, wallflower type, or whatever.
            Or like, disfigured in some way. Just some woman who is pretty sure
            that life, and I mean a full, healthy sexual life, romance, stuff like
            that, is lost to her forever...Anyhow, we take a girl of that type,
            just some corn-fed bitch who'd practically mess her pants if you sharpen
            a pencil for her, and we both hit her. Small talk, a dinner date, flowers...We
            just do it, you know, you and me, upping the ante all the time. And
            suddenly she's got two men. She's calling her mom. She's wearing makeup
            again. And on we play, and on and on. And then one day, out goes the
            rug, and us pulling it hard, and Jill - she just comes tumbling after...Trust
            me, she'll be reaching for the sleeping pills within a week, and we
            will laugh about this until we are very old men....Is that not ideal?
            Restore a little dignity to our lives?...It's really just the same
            crap we used to play in school, only it's better because we get a little
            payback on all this messy relationship s--t we're dealing with...I
            think it would be refreshing. I really do. And very therapeutic coming
            off the women we just have.</span></font></p><span data-dcnode-id="2871" instrument_node="">
</span></blockquote><span data-dcnode-id="2869" instrument_node="">
</span><p data-dcnode-id="2866"><font data-dcnode-id="2867" size="2"><span data-dcnode-id="2868" instrument_node="">In their
          office setting, Chad selected deaf and naive secretarial assistant
          temp worker Christine (Stacy Edwards), a dark-haired beauty, as their
          innocent, targeted female - and in week five, Chad slept with her (in
          his friend Howard's hotel room!). And then, in one of the film's most
          painful sequences, set in a restaurant and afterwards in a parked car,
          Howard confessed that he was genuinely falling in love with Christine
          (he told her: "I 
          need you" using sign language). She was the one who replied with
          apology that she had two-timed him ("I've let this go too far...I
          shouldn't have dated both of you") and that she was in love with
          Chad ("I
        love someone else"). </span></font></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2862"><font data-dcnode-id="2863" size="2"><span data-dcnode-id="2864" instrument_node="">Howard  decided to tell her (out of guilt,
          hurt, and jealousy) that Chad's love was a total sham and that they
          had planned the game together ("He doesn't like you. He loathes
          you. He detests you and your pathetic retard voice. That's what he
          calls it...You better wake up. You were used. It was a game"),
          but she had trouble believing him ("Chad would never do that").
          He tried to force a ring upon her ("It's not a game to me anymore"),
          but she refused.</span></font></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2858"><font data-dcnode-id="2859" size="2"><span data-dcnode-id="2860" instrument_node="">In
          week six, Christine met Chad in the hotel room and asked: "Do
          you love me?" and then admitted that she knew about his duplicity
          in the game ("I know what's going on...You two were playing
          a game on me, right?"). Chad quickly attempted to explain his
          participation in a "contest" to
          date Christine, but then admitted he couldn't keep a "straight
          face" telling
          the excuse. When he asked how she felt, she slapped him hard across
          the face. He asked: "It only hurts that much?" and then
          promptly left the room, dumping her ("The deed's done").
          He left her in the room where the emotionally-devastated Christine
        sobbed uncontrollably.</span></font></p><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2854"><font data-dcnode-id="2855" size="2"><span data-dcnode-id="2856" instrument_node="">A few weeks later, after they returned to
          their hometown, a sickened Howard visited Chad at about 1 am, and
          learned that Chad had no regrets about his actions, and that girlfriend
          Suzanne had NEVER left him ("She
          never left. She's always been right there") - the film's plot
          twist. He boldly and amorally declared why he had devised the game: "Because
          I could."  It seemed that all along, the motivation of the venomous
          and controlling Chad was a subtle hatred of the submissive and vulnerable
          Howard, who was appointed ineffectual team leader (in retrospect,
          Chad had cleverly sabotaged Howard's work throughout the film). When
        Howard left the building, he vomited on the staircase.</span></font></p><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2850"><font data-dcnode-id="2851" size="2"><span data-dcnode-id="2852" instrument_node="">Later, Howard
          found Christine working as a secretary at a bank and approached her
          desk, shouting loudly at her: "Listen, listen, listen, Listen
          to me" - but she ignored
          him and wouldn't listen or speak to him.</span></font></p></td><td data-dcnode-id="2785" valign="top"><center data-dcnode-id="2786"><span data-dcnode-id="2847" instrument_node="">

</span><img alt="" data-dcnode-id="2826" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/inthecompanyofmen4.jpg&amp;raw" width="160"><span data-dcnode-id="2825" instrument_node=""> </span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">

</span><img alt="" data-dcnode-id="2818" height="112" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/inthecompanyofmen5.jpg&amp;raw" width="160"><span data-dcnode-id="2817" instrument_node=""> </span><br data-dcnode-id="2816"><span data-dcnode-id="2815" instrument_node="">
</span><font data-dcnode-id="2813" size="2"><span data-dcnode-id="2814" instrument_node="">Christine Told the Truth by Howard </span></font><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">
</span><img alt="" data-dcnode-id="2810" height="107" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/inthecompanyofmen6.jpg&amp;raw" width="160"><span data-dcnode-id="2809" instrument_node=""> </span><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">
</span><font data-dcnode-id="2805" size="2"><span data-dcnode-id="2806" instrument_node="">Christine Dumped</span></font><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">
</span><img alt="" data-dcnode-id="2802" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/photos/inthecompanyofmen7.jpg&amp;raw" width="160"><span data-dcnode-id="2801" instrument_node=""> </span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">
</span><font data-dcnode-id="2797" size="2"><span data-dcnode-id="2798" instrument_node="">Plot Twist: Chad With Suzanne (Emily Cline)</span></font><span data-dcnode-id="2796" instrument_node=""> </span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">

</span><p data-dcnode-id="2761"><img align="absmiddle" alt="" data-dcnode-id="2766" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="2765" instrument_node=""> </span><b data-dcnode-id="2762"><font data-dcnode-id="2763" size="2"><span data-dcnode-id="2764" instrument_node="">The
              Killer Was Not Cop Malloy, But His Detective Partner Rodriguez
              (With a Tell-Tale Tattoo); Frannie Killed Rodriguez </span></font></b></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2754"><font data-dcnode-id="2755" size="2"><span data-dcnode-id="2759" instrument_node="">Director Jane Campion's dark feminist sex film was
            considered   a pretentious rip-off of Richard Brooks'
            </span><i data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Looking for Mr. Goodbar (1977)</span></i><span data-dcnode-id="2756" instrument_node="">. It featured the tagline:</span></font></p><span data-dcnode-id="2753" instrument_node="">
</span><blockquote data-dcnode-id="2747"><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2749"><font data-dcnode-id="2750" size="2"><span data-dcnode-id="2751" instrument_node="">"Everything you know about desire is dead wrong."</span></font></p><span data-dcnode-id="2748" instrument_node="">
</span></blockquote><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2743"><font data-dcnode-id="2744" size="2"><span data-dcnode-id="2745" instrument_node="">It starred
          clean-imaged Meg Ryan as a mid-30s  English writing teacher - an
          unattractive, sex-hungry, despairing divorcee named Francis  "Frannie"
            Avery, who first met a tough, foul-mouthed NY detective named Giovanni "James" Malloy
          (Mark Ruffalo). </span></font></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2739"><font data-dcnode-id="2740" size="2"><span data-dcnode-id="2741" instrument_node="">He  was investigating a homicide in her neighborhood.
          A severed head (with a "disarticulated" body) was discovered
          in the garden outside her window. He had a questionable
          wrist tattoo of the three of spades, matching the tattoo she had seen
          on the wrist of a man (smoking cigarettes) she had witnessed receiving
          an explicit 'blow job' in The Red Turtle pool/bar club's darkened basement,
          performed by a blue-fingernailed female:</span></font></p><span data-dcnode-id="2738" instrument_node="">
</span><ul data-dcnode-id="2732"><span data-dcnode-id="2737" instrument_node="">
</span><li data-dcnode-id="2734"><font data-dcnode-id="2735" size="2"><span data-dcnode-id="2736" instrument_node=""> Angela Sands (Heather
            Litteer) - the murdered woman</span></font></li><span data-dcnode-id="2733" instrument_node="">
</span></ul><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2728"><font data-dcnode-id="2729" size="2"><span data-dcnode-id="2730" instrument_node="">When
          Frannie masturbated face-down on her bed, she fantasized that Malloy
          was watching her, and that he was the man receiving fellatio.</span></font></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2724"><font data-dcnode-id="2725" size="2"><span data-dcnode-id="2726" instrument_node="">The exciting
          premise of the film was that the cop, a possible murderer, might kill
          her next, and she was mugged on the street and roughed up. With sexual
          tension building, she became engaged in a torrid, risky sexual liaison
          with the married (but estranged) cop after a date, although she was
            nervous about Malloy being the killer of Angela (and others), thinking
            that he was lying about the basement-sex incident and other aspects
        of his life.</span></font></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2720"><font data-dcnode-id="2721" size="2"><span data-dcnode-id="2722" instrument_node="">The serial killer also murdered and mutilated a medical
          student co-ed whose body parts were found in the school's laundry
          room, and toward the film's end, Frannie's half-sister Pauline (Jennifer
          Jason Leigh) who worked as a stripper/go-go girl at the Baby Doll
          Lounge, was also found bloodied and decapitated in her apartment's
            bathroom. </span></font></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2716"><font data-dcnode-id="2717" size="2"><span data-dcnode-id="2718" instrument_node="">After straddling Malloy and making
            love to him with one wrist handcuffed to her apartment's radiator,
            Frannie found her missing charm bracelet trinkets (a carriage and
            baby) that she had last seen at Pauline's place in the cop's coat
            pocket, convincing her that he was the killer ("It was you!").
             His alibi was that he had found them on the street after her mugging.
        </span></font></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2712"><font data-dcnode-id="2713" size="2"><span data-dcnode-id="2714" instrument_node="">When Malloy's butchy, on-probation detective partner
            Ritchie Rodriguez (Nick Damici) drove her 'to the lighthouse' under
            the George Washington Bridge (coincidentally the name of a literature
            book that Frannie taught) to conceivably take her statement on Malloy,
            she saw that he had a matching three of spades tattoo - identifying
            him as the serial killer who had received the 'blow-job' and murdered
            the other women.</span></font></p><span data-dcnode-id="2711" instrument_node="">

</span><p data-dcnode-id="2661"><font data-dcnode-id="2662" size="2"><span data-dcnode-id="2663" instrument_node="">Dazed, she then returned (drenched in blood) to
