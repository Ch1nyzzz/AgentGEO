</span><p data-dcnode-id="2566"><img align="absmiddle" alt="" data-dcnode-id="2570" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><b data-dcnode-id="2567"><font data-dcnode-id="2568" size="2"><span data-dcnode-id="2569" instrument_node=""> Victim
              Colbert Was Murdered by Diner Counter Worker Ralph Henshaw, To
              Steal Money to Pay for An Abortion For His Slutty Girlfriend Delores
              Purdy </span></font></b></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2562"><font data-dcnode-id="2563" size="2"><span data-dcnode-id="2564" instrument_node="">This tense whodunit detective 
          story, and Best Picture-winning thriller  was set in the little
            town of Sparta, Mississippi during a hot summer. It chronicled the
            racial tensions between two individuals brought together for a murder
            case:</span></font></p><span data-dcnode-id="2561" instrument_node="">
</span><ul data-dcnode-id="2549"><span data-dcnode-id="2560" instrument_node="">
</span><li data-dcnode-id="2555"><font data-dcnode-id="2558" size="2"><span data-dcnode-id="2559" instrument_node=""> Virgil Tibbs (Sidney Poitier), </span></font><font data-dcnode-id="2556" size="2"><span data-dcnode-id="2557" instrument_node="">a
              black police officer from Philadelphia, a homicide expert</span></font></li><span data-dcnode-id="2554" instrument_node="">
</span><li data-dcnode-id="2551"><font data-dcnode-id="2552" size="2"><span data-dcnode-id="2553" instrument_node="">Sheriff Bill Gillespie (Rod Steiger), the town's redneck
              police chief </span></font></li><span data-dcnode-id="2550" instrument_node="">
</span></ul><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2545"><font data-dcnode-id="2546" size="2"><span data-dcnode-id="2547" instrument_node="">The film's main plot was about the murder of a prominent
            and wealthy industrialist from Chicago named Philip Colbert (uncredited
            Jack Teter) who was found beaten to death (a massive head wound)
            in a town alleyway. Colbert had come to Sparta from the North to
            build a new factory. His surviving widow Leslie (Lee Grant) insisted
            that Detective Tibbs stay on the case to find her husband's killer,
            causing ripples of racism in the small town. </span></font></p><span data-dcnode-id="2544" instrument_node="">
</span><font data-dcnode-id="2542" size="2"><span data-dcnode-id="2543" instrument_node="">&nbsp; </span></font><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2538"><font data-dcnode-id="2539" size="2"><span data-dcnode-id="2540" instrument_node=""> During
            the case's investigation, there were at least four suspects in the
            case over a two-day period, each eliminated one by one:</span></font></p><span data-dcnode-id="2537" instrument_node="">
</span><ul data-dcnode-id="2512"><span data-dcnode-id="2536" instrument_node="">
</span><li data-dcnode-id="2533"><font data-dcnode-id="2534" size="2"><span data-dcnode-id="2535" instrument_node=""> Detective
            Tibbs himself</span></font></li><span data-dcnode-id="2532" instrument_node="">
</span><li data-dcnode-id="2526"><font data-dcnode-id="2527" size="2"><span data-dcnode-id="2531" instrument_node="">petty criminal Harvey Oberst (Scott Wilson), who
              had the wallet in his possession, but claimed he had stolen it
              </span><i data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">after</span></i><span data-dcnode-id="2528" instrument_node=""> the murder had occurred; he was also a "southpaw"
              and it was proved that he couldn't have struck the fatal head blow </span></font></li><span data-dcnode-id="2525" instrument_node="">
</span><li data-dcnode-id="2522"><font data-dcnode-id="2523" size="2"><span data-dcnode-id="2524" instrument_node="">racist plantation
            owner Eric Endicott (Larry Gates) (who had the greatest motivation
              to commit murder, because he was threatened by a new employer coming
              to town); he was targeted as the suspected killer by Tibbs </span></font></li><span data-dcnode-id="2521" instrument_node="">
</span><li data-dcnode-id="2518"><font data-dcnode-id="2519" size="2"><span data-dcnode-id="2520" instrument_node=""> deputy Officer Sam Wood (Warren Oates), a 'peeping-tom'
              cop who was accused of impregnating slutty
            16 year-old Delores Purdy (Quentin Dean) in the cemetery, and then
              robbing and killing Colbert to pay for her abortion; her angry
              and suspicious brother Lloyd Purdy (James Patterson) and Delores
              herself brought false charges against Wood</span></font></li><span data-dcnode-id="2517" instrument_node="">
</span><li data-dcnode-id="2514"><font data-dcnode-id="2515" size="2"><span data-dcnode-id="2516" instrument_node="">the 'real father' of Delores' baby and the homicidal
              murderer of Colbert was sleazy, dishonest diner counter worker
              Ralph Henshaw (Anthony James); after being offered a ride by Colbert
              late one night, and after expressing an interest in future employment
              ("I sure would like a job in that new factory once you get started"),
              Henshaw struck him a fatal blow in the head at the proposed factory's
              construction site, drove Colbert's car with the corpse back to
              an alleyway in town, and stole most of the cash in his wallet to
              pay for Delores' illicit abortion</span></font></li><span data-dcnode-id="2513" instrument_node="">
</span></ul><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2508"><font data-dcnode-id="2509" size="2"><span data-dcnode-id="2510" instrument_node="">During a night-time altercation when all the principal
            characters were assembled, Tibbs was confronted by a gun-wielding
            mob outside the back-room abortionist's store, led by Delores' racist
            brother Purdy. Tibbs announced that Delores had $100 in her purse
            - funds that she had received for her abortion from Ralph Henshaw.
            When the money was discovered in her purse, Lloyd Purdy became enraged
            at Delores (and Henshaw): "You turned my little sister into
            a field slut?" He was shot and killed by Henshaw before being
            disarmed and held by Tibbs.</span></font></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2504"><font data-dcnode-id="2505" size="2"><span data-dcnode-id="2506" instrument_node="">After Henshaw's arrest, his confession was recorded
            in the Sheriff's office. He had murdered Colbert  but  claimed that it was an assault
            that all went wrong ("I didn't mean to kill him"). </span></font></p><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2500"><font data-dcnode-id="2501" size="2"><span data-dcnode-id="2502" instrument_node="">And in the farewell scene as Tibbs departed from the
            train station, he and Sheriff exchanged respectful goodbyes and shook
            hands - with mutual respect:</span></font></p><span data-dcnode-id="2499" instrument_node="">
</span><blockquote data-dcnode-id="2491"><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2493"><font data-dcnode-id="2494" size="2"><span data-dcnode-id="2497" instrument_node="">Sheriff: Virgil? You take care, ya hear? </span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">
            Tibbs: 
          Yeah. </span></font></p><span data-dcnode-id="2492" instrument_node="">
</span></blockquote></td><td data-dcnode-id="2447" valign="top"><center data-dcnode-id="2448"><span data-dcnode-id="2488" instrument_node="">
</span><img alt="" data-dcnode-id="2487" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight3.jpg&amp;raw" width="160"><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">
</span><font data-dcnode-id="2483" size="2"><span data-dcnode-id="2484" instrument_node="">Virgil Tibbs (Sidney Poitier) </span></font><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">
</span><img alt="" data-dcnode-id="2480" height="127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight.jpg&amp;raw" width="160"><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">
</span><font data-dcnode-id="2473" size="2"><span data-dcnode-id="2477" instrument_node="">Delores with Henshaw</span><br data-dcnode-id="2476"><span data-dcnode-id="2475" instrument_node="">
</span><img alt="" data-dcnode-id="2474" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight2.jpg&amp;raw" width="160"></font><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">
</span><font data-dcnode-id="2469" size="2"><span data-dcnode-id="2470" instrument_node="">Delores' Brother Lloyd Purdy (left) Shot by Henshaw </span></font><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">
</span><img alt="" data-dcnode-id="2466" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight4.jpg&amp;raw" width="160"><span data-dcnode-id="2465" instrument_node=""> </span><br data-dcnode-id="2464"><span data-dcnode-id="2463" instrument_node="">
</span><img alt="" data-dcnode-id="2462" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight5.jpg&amp;raw" width="160"><span data-dcnode-id="2461" instrument_node=""> </span><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">
</span><font data-dcnode-id="2454" size="2"><span data-dcnode-id="2458" instrument_node="">Confession of Murderer Ralph Henshaw (Anthony James)</span><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">
</span><img alt="" data-dcnode-id="2455" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shots/inheatofnight6.jpg&amp;raw" width="160"></font><br data-dcnode-id="2453"><span data-dcnode-id="2452" instrument_node="">
</span><font data-dcnode-id="2450" size="2"><span data-dcnode-id="2451" instrument_node="">Train Station Goodbye          </span></font><span data-dcnode-id="2449" instrument_node="">
</span></center></td></tr><tr bordercolor="#cccccc" data-dcnode-id="2356" valign="top"><td data-dcnode-id="2436" valign="top"><center data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">
</span><font data-dcnode-id="2440" size="2"><img alt="" data-dcnode-id="2441" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/titles/inmouthofmadness.jpg&amp;raw" width="160"></font><span data-dcnode-id="2439" instrument_node="">
</span></center><span data-dcnode-id="2437" instrument_node=""> </span></td><td data-dcnode-id="2384" valign="top"><p data-dcnode-id="2430"><i data-dcnode-id="2431"><font data-dcnode-id="2432" size="2"><strong data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">In the Mouth of Madness (1994)</span></strong></font></i></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2423"><img align="absmiddle" alt="" data-dcnode-id="2428" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="2427" instrument_node=""> </span><b data-dcnode-id="2424"><font data-dcnode-id="2425" size="2"><span data-dcnode-id="2426" instrument_node="">Horror
              Novelist Sutter Cane's Writings Became Reality, Turning the World
              Insane; Much of the Film Echoed the Contents of Cane's Latest Book
              "In the Mouth of Madness";  
              One of the Last Survivors After Reading Cane's Book and Visiting
              a Locale in the Book Named Hobbs End (in New Hampshire) was John
              Trent; He Was Institutionalized After Murdering (With An Axe) a
              Reader of Cane's Novel; Trent Walked Out of His Abandoned Asylum
              and Wandered Into a Movie Theatre to Watch a Movie Adaptation of
              Cane's Book - While Laughing Maniacally </span></font></b></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2419"><font data-dcnode-id="2420" size="2"><span data-dcnode-id="2421" instrument_node="">Director
            John Carpenter paid convoluted, warped homage to Stephen King and
            H. P. Lovecraft in this film that blurred the boundaries of fantasy
            and reality, fact and fiction, sanity and insanity, and reality and
            cine-reality. </span></font></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2412"><font data-dcnode-id="2413" size="2"><span data-dcnode-id="2417" instrument_node="">The film's plot, told in flashback, was about insurance
          fraud investigator John Trent (Sam Neill) - now a violent and delusional
          asylum inmate in a padded cell ("I am not insane"), who had
          been institutionalized after axe-murdering a reader of a popular horror
          novel, </span><i data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">In the Mouth of Madness</span></i><span data-dcnode-id="2414" instrument_node="">.</span></font></p><span data-dcnode-id="2411" instrument_node="">
</span><blockquote data-dcnode-id="2405"><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2407"><font data-dcnode-id="2408" size="2"><span data-dcnode-id="2409" instrument_node=""> [Note: The dead man, an insane
            axe-murderer himself, was revealed to be the agent of the novel's author,
            Sutter Cane  (Jürgen Prochnow).] </span></font></p><span data-dcnode-id="2406" instrument_node="">
</span></blockquote><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2401"><font data-dcnode-id="2402" size="2"><span data-dcnode-id="2403" instrument_node=""> Trent had been hired by Arcane Publishing director
            Jackson Harglow (Charlton Heston) to search for the author, Sutter
            Cane, who had mysteriously disappeared. Trent
             was tasked with retrieving the manuscript for Cane's latest novel
            (for Arcane Publishing). Trent
            found himself in the small town of Hobbs End in New Hampshire that
            resembled a place in Cane's novel. It appeared to be a surrealistic
            gateway to another world of evil and madness, and Trent began to
          believe he was  a character in the just published book (called "the
          new Bible").</span></font></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2397"><font data-dcnode-id="2398" size="2"><span data-dcnode-id="2399" instrument_node="">He learned that god-like Cane's
          latest book was so powerful that it could change people ("I think,
          therefore you are!")
          - making them paranoid and delusional, and even turning  anyone who
          read it into a mutant like creature. Those who didn't like to read
          (or didn't read the book) could be converted by watching a movie adaptation
          of the book.</span></font></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2393"><font data-dcnode-id="2394" size="2"><span data-dcnode-id="2395" instrument_node="">When the film ended with a slaughter at the asylum
            by monstrous creatures, Trent wandered out into the world that was
            alarmingly empty after a bloody slaughter and civilization had seemingly
            been destroyed by Cane's creatures. </span></font></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2389"><font data-dcnode-id="2390" size="2"><span data-dcnode-id="2391" instrument_node="">The film concluded by being folded
          back upon itself - Trent entered an abandoned movie theatre that
          was showing the latest movie adaptation of Sutter Cane's book - and
          slowly changed into a crazed, mutant creature that laughed maniacally
          as he sat down and watched himself on the silver screen.</span></font></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2385"><font data-dcnode-id="2386" size="2"><span data-dcnode-id="2387" instrument_node="">The film's
          open-ended conclusion let the viewer decide whether Trent was 
      insane or whether what he experienced was actually reality.</span></font></p></td><td data-dcnode-id="2358" valign="top"><center data-dcnode-id="2359"><span data-dcnode-id="2382" instrument_node="">
</span><img alt="" data-dcnode-id="2381" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/scariest/inmouthofmadness8.jpg&amp;raw" width="160"><span data-dcnode-id="2380" instrument_node=""> </span><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">
</span><img data-dcnode-id="2377" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/scariest/inmouthofmadness4.jpg&amp;raw" width="160"><span data-dcnode-id="2376" instrument_node=""> </span><br data-dcnode-id="2375"><span data-dcnode-id="2374" instrument_node="">
</span><font data-dcnode-id="2372" size="2"><span data-dcnode-id="2373" instrument_node="">John Trent (Sam Neill)</span></font><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node="">
</span><img data-dcnode-id="2369" height="112" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/scariest/inmouthofmadness5.jpg&amp;raw" width="160"><span data-dcnode-id="2368" instrument_node=""> </span><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">

</span><font data-dcnode-id="2361" size="2"><span data-dcnode-id="2362" instrument_node="">Laughing Maniacally While Watching "In the Mouth of Madness" </span></font><span data-dcnode-id="2360" instrument_node="">
</span></center></td></tr><tr bordercolor="#cccccc" data-dcnode-id="2091" valign="top"><td data-dcnode-id="2347" valign="top"><center data-dcnode-id="2349"><span data-dcnode-id="2353" instrument_node="">
</span><font data-dcnode-id="2351" size="2"><img alt="" data-dcnode-id="2352" height="122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/titles/inception.jpg&amp;raw" width="160"></font><span data-dcnode-id="2350" instrument_node="">
</span></center><span data-dcnode-id="2348" instrument_node=""> </span></td><td data-dcnode-id="2201" valign="top"><p data-dcnode-id="2341"><i data-dcnode-id="2342"><b data-dcnode-id="2343"><font data-dcnode-id="2344" size="2"><span data-dcnode-id="2345" instrument_node="">Inception (2010)</span></font></b></i></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2334"><img align="absmiddle" alt="" data-dcnode-id="2339" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="2338" instrument_node=""> </span><b data-dcnode-id="2335"><font data-dcnode-id="2336" size="2"><span data-dcnode-id="2337" instrument_node="">Cobb's
              Mission to Implant Ideas (Termed "Inception") into Robert Fischer's
              Mind Was Successful; He Was Reunited With 'Suicidal' Wife Mal 
              in Limbo But Rejected Staying There With Her; For a Successful
              Mission, Cobb's Fugitive Status as Mal's Murderer Was Erased, and
              He Presumably Joined His Children in the Real World (His
              Totem, A Spinning Top, Seemed to Wobble  - Was
              He Really in Reality?) </span></font></b></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2330"><font data-dcnode-id="2331" size="2"><span data-dcnode-id="2332" instrument_node="">In Christopher Nolan's mind-bending sci-fi heist thriller,
      Leonardo DiCaprio played the part of Dominick "Dom" Cobb, a skilled
       espionage spy who performed thefts (or extractions) of corporate secrets
      by invading people's dreams. However, he had become an international fugitive
      and had ruined his own personal life. He was tasked with one final, seemingly-impossible
      "inception" job - this time not to steal an idea ("an inception") but to
      plant one. And if he succeeded in the task, his criminal record of murder
      of his suicidal wife Mal (Marion Cotillard) would be erased - and his 
      family life with his children would be restored.</span></font></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2326"><font data-dcnode-id="2327" size="2"><span data-dcnode-id="2328" instrument_node="">Due to the nature of the film, it was open to interpretation
          that the whole film might have been the dream of either Cobb, or someone
          else.</span></font></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2322"><font data-dcnode-id="2323" size="2"><span data-dcnode-id="2324" instrument_node="">The film's tagline made sense after viewing:</span></font></p><span data-dcnode-id="2321" instrument_node="">
</span><blockquote data-dcnode-id="2315"><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2317"><font data-dcnode-id="2318" size="2"><span data-dcnode-id="2319" instrument_node=""> "Your mind
            is the scene of the crime."</span></font></p><span data-dcnode-id="2316" instrument_node="">
</span></blockquote><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2311"><font data-dcnode-id="2312" size="2"><span data-dcnode-id="2313" instrument_node="">The film opened with a scene revisited much later in
          the film - Cobb was lying on a beach where he was found delirious.
            He envisioned his children playing near him. He  was taken by an
            armed guard to a beachside fortress where he was faced by wealthy,
            aged corporate executive Saito (Ken Watanabe). The Japanese businessman
            had been Cobb's latest employer.</span></font></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2307"><font data-dcnode-id="2308" size="2"><span data-dcnode-id="2309" instrument_node=""> It was later revealed that the mission
          had been a test, to see whether Cobb would be capable of a much more
          difficult "extraction" - or "inception." Saito had been in "limbo" (a
          state he entered by dying while in a sedated dream) during the mission.
          He had received a lethal wound in a lower dream level while sedated
          (that extended over to deeper levels), requiring Cobb to liberate him
          - by killing him - to bring him safely back to reality. Cobb had passed
          the test, and was readied for his next mission. </span></font></p><span data-dcnode-id="2306" instrument_node="">
</span><blockquote data-dcnode-id="2300"><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2302"><font data-dcnode-id="2303" size="2"><span data-dcnode-id="2304" instrument_node="">[The method of entering a dream state was by injection,
            using portable technology cases. One of the film's major premises
              was that each person was required to have a totem - to help identify
              if one was in the dream world or in the real world. Cobb's totem
              was his wife's spinning top, which would keep spinning around if
              he was in a dream world.]</span></font></p><span data-dcnode-id="2301" instrument_node="">
</span></blockquote><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2296"><font data-dcnode-id="2297" size="2"><span data-dcnode-id="2298" instrument_node="">For the  new "inception" mission, Saito had hired Cobb
             to plant an idea ('inception') in the subconscious mind of Robert
            Fischer (Cillian Murphy), the son and heir of dying Maurice Fischer
            (Pete Postlethwaite), who headed up a rival energy corporation to
            Saito. The idea would be that Robert Fischer - out of his own self-generated
            volition - would choose not to follow in his father's footsteps and
            would break up his corporate energy empire. (Cobb's mission was to
            successfully plant the seed of the idea that Maurice never wanted
            his son Robert to be like him.) </span></font></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2292"><font data-dcnode-id="2293" size="2"><span data-dcnode-id="2294" instrument_node="">To accomplish their objective of planting seeds within
          Fischer, it was necessary to enter very deeply into his subconscious,
          possibly to a third dream level. Going deeper into dreams exponentially
          turned minutes into hours, into days, and even into years.</span></font></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2288"><font data-dcnode-id="2289" size="2"><span data-dcnode-id="2290" instrument_node="">Various members of Cobb's team coordinated
        the effort, including:</span></font></p><span data-dcnode-id="2287" instrument_node="">
</span><ul data-dcnode-id="2269"><span data-dcnode-id="2286" instrument_node="">
</span><li data-dcnode-id="2283"><font data-dcnode-id="2284" size="2"><span data-dcnode-id="2285" instrument_node="">Arthur (Joseph Gordon-Levitt), Cobb's
          "extraction" (and "inception") partner</span></font></li><span data-dcnode-id="2282" instrument_node="">
</span><li data-dcnode-id="2279"><font data-dcnode-id="2280" size="2"><span data-dcnode-id="2281" instrument_node="">Yusuf (Dileep Rao),  a sedative
          chemist</span></font></li><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2275"><font data-dcnode-id="2276" size="2"><span data-dcnode-id="2277" instrument_node="">Eames (Tom Hardy), a con-man, an identity
          shape-shifter</span></font></li><span data-dcnode-id="2274" instrument_node="">
</span><li data-dcnode-id="2271"><font data-dcnode-id="2272" size="2"><span data-dcnode-id="2273" instrument_node="">Ariadne (Ellen Page), a gifted prodigy, a maze-building
          architect for dream landscapes </span></font></li><span data-dcnode-id="2270" instrument_node="">
</span></ul><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2265"><font data-dcnode-id="2266" size="2"><span data-dcnode-id="2267" instrument_node="">At each stage,
        one member of the team who was creating the dream remained behind while
        the others fell asleep to travel to the next level. So-called "kicks"
        would propel the dreamers out of the dream and back toward reality step
        by step (for example: Yusuf driving the van off a bridge and hitting
        the water, Arthur detonating an elevator carrying the entire team to
        fall down the shaft and simulating free-fall, and the ice-fortress being
        detonated and collapsing):</span></font></p><span data-dcnode-id="2264" instrument_node="">
</span><ul data-dcnode-id="2231"><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2258"><font data-dcnode-id="2259" size="2"><b data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Level Zero</span></b><span data-dcnode-id="2260" instrument_node=""> - Cobb's entire team (with Robert
            Fisher) were on an airplane flying from Sydney, Australia to Los
            Angeles, and transporting  Maurice Fisher's body after his death </span></font></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2251"><font data-dcnode-id="2252" size="2"><span data-dcnode-id="2256" instrument_node=""> </span><b data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Level One</span></b><span data-dcnode-id="2253" instrument_node=""> - Yusuf's Dream (on the Plane) of
            Driving the Team in a Van in Heavy Traffic in Rainy Los Angeles,
            and Attacked by Fischer's defensive projections</span></font></li><span data-dcnode-id="2250" instrument_node="">
</span><li data-dcnode-id="2245"><font data-dcnode-id="2246" size="2"><b data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Level Two</span></b><span data-dcnode-id="2247" instrument_node=""> - Arthur's Dream (in the Van) of
            Being in a Corporate Hotel. Cobb posed as "Mr. Charles" to
            trick Fischer and Turn Him Against His Father's Right-Hand Man Peter
            Browning (Tom Berenger), impersonated by Eames</span></font></li><span data-dcnode-id="2244" instrument_node="">
</span><li data-dcnode-id="2239"><font data-dcnode-id="2240" size="2"><b data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Level Three</span></b><span data-dcnode-id="2241" instrument_node=""> - Eames' Dream (in the Hotel Room)
            as the Others Attacked a Snowy Mountain Hospital Fortress. Inside
            was a safe next to Maurice Fischer's hospital deathbed, where Robert
          spoke to his father</span></font></li><span data-dcnode-id="2238" instrument_node="">
</span><li data-dcnode-id="2233"><font data-dcnode-id="2234" size="2"><b data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Limbo</span></b><span data-dcnode-id="2235" instrument_node=""> - Cobb and Ariadne entered Limbo 
            where they encountered Cobb's wife, Mal. </span></font></li><span data-dcnode-id="2232" instrument_node="">
</span></ul><span data-dcnode-id="2230" instrument_node="">
</span><blockquote data-dcnode-id="2214"><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2220"><font data-dcnode-id="2221" size="2"><span data-dcnode-id="2228" instrument_node="">[</span><b data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Background:</span></b><span data-dcnode-id="2225" instrument_node=""> Guilt-ridden Cobb was continually
          seeing projected images of his late wife Mal during his dream-jobs.
          He refused to accept the fact of her death, and his subconscious
          (that was missing her) needed to remember her and be with her. She
            would invasively sabotage his dream efforts - all he wanted was to
            see his children again. In their previous experiments with dream
            technology, Mal and Cobb had entered Limbo together. In his subconscious
            mind, Mal would continue to entice Cobb to follow her toward deeper
            levels into Limbo to live with him as they grew old together. She
            felt that being in Limbo was better than reality, and refused to
            return to reality with him. The Limbo
          space included Cobb's memories of the city he and Mal had built for
          themselves and lived in for </span><i data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">50 years</span></i><span data-dcnode-id="2222" instrument_node="">. </span></font></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2216"><font data-dcnode-id="2217" size="2"><span data-dcnode-id="2218" instrument_node="">In a past dream state with him, he
          disagreed with Mal about remaining in Limbo: "Your world is not
          real." He  tricked her into awakening back into reality (he told
          her: "The
          idea that caused you to question your reality came from me"), 
          but she thought that she was still dreaming. Mal
            committed suicide by leaping from a hotel suite window (where they
            always spent their anniversary), although he had warned her: "If
            you jump, you're not gonna wake up, remember? You're gonna die." He
              felt responsible for causing
              her deadly suicide and blamed himself. He was charged with her
            murder in the real world and had become a fugitive outside the US.]</span></font></p><span data-dcnode-id="2215" instrument_node="">
</span></blockquote><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2210"><font data-dcnode-id="2211" size="2"><span data-dcnode-id="2212" instrument_node="">In the last phase of the current "inception," Mal agreed
          to give up Fischer on the porch if Cobb would remain with her in Limbo.
        Cobb   told her that he couldn't
        keep coming back to her because it wasn't
        her - "You're just a shade of my real wife...I'm sorry, you're just
        not good enough." She was merely his projection of her from memory
        ("I can't
        stay with her anymore because she doesn't exist"). He had continually
        been plagued by her.  When he refused her demands, Mal  shot
        Fischer to death in Level Three. Then, Mal stabbed Cobb,
        and Ariadne shot her. She died in Cobb's arms as he told her: "I
        have to let you go." </span></font></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2206"><font data-dcnode-id="2207" size="2"><span data-dcnode-id="2208" instrument_node="">Ariadne and Fischer fell off the building
        as their "kick" to
        get back. Cobb
        woke up again  on the shores of Saito's
        beach house - the film's opening scene. For Cobb's successful efforts at inception with Fischer,
          Saito made a phone call to clear away Cobb's legal troubles with immigration
          at LAX, enter the US, be freed of his guilt, and be reunited with his
        children - at the film's conclusion.</span></font></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2202"><font data-dcnode-id="2203" size="2"><span data-dcnode-id="2204" instrument_node="">The film ended ambiguously, however.
        As Cobb tested out his top's spinning on a table top, to see whether
        it would topple or not (and to find out whether he was dreaming or not),
          the screen turned to black. What was clear was that Cobb walked away
          from the top in order to be with his children.</span></font></p></td><td data-dcnode-id="2093" valign="top"><center data-dcnode-id="2095"><span data-dcnode-id="2199" instrument_node="">

</span><p data-dcnode-id="2068"><img align="absmiddle" alt="" data-dcnode-id="2073" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="2072" instrument_node=""> </span><b data-dcnode-id="2069"><font data-dcnode-id="2070" size="2"><span data-dcnode-id="2071" instrument_node="">Mutt
              Williams Was Indiana Jones' Son By Marion Ravenwood; KGB operative
              Dr. Spalko Died When 'Rewarded' by Aliens For Returning the Crystal
              Skull; Indiana Jones and Friends Escaped From Crumbling Temple
        as Alien Space Saucer Took Off </span></font></b></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2061"><font data-dcnode-id="2062" size="2"><span data-dcnode-id="2066" instrument_node="">This fourth entry in the highly-successful franchise
            of </span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Indiana Jones</span></em><span data-dcnode-id="2063" instrument_node=""> films was
            set in the year 1957. It starred an aged, 60-ish Indiana Jones (Harrison
        Ford). </span></font></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2057"><font data-dcnode-id="2058" size="2"><span data-dcnode-id="2059" instrument_node="">One of the side stories was that globe-trotting professor-archaeologist
          Indy had fathered a biker-son named Mutt Williams (Shia LaBeouf)
          (aka Henry Jones III) by old lover Marion Ravenwood (Karen Allen),
          although Mutt thought his father was treasure-hunting explorer Dr.
          Harold Oxley (John Hurt) already in Peru. </span></font></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2053"><font data-dcnode-id="2054" size="2"><span data-dcnode-id="2055" instrument_node="">The plot revolved around
          an ancient legend that an elongated crystal skull of Akator (with
          powerful magnetic properties) had been stolen from a Mayan temple
          (in the legendary and lost city of gold called El Dorado) in the
          Amazonian jungles of South America. According
        to legend, the one who found it and returned it would be rewarded with "treasure." [Note:
        Conquistador Francisco de Orellana also vainly searched for it in the
        1540s.] </span></font></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2049"><font data-dcnode-id="2050" size="2"><span data-dcnode-id="2051" instrument_node=""> In
          her maniacal quest for the sacred object (to be used as a cosmic mind
          weapon to rule the world), the lead psychic KGB operative Dr. Irina
          Spalko (Cate Blanchett) with a black page-boy haircut was aided by
          Indy's traitorous "triple
          agent" colleague George 'Mac' McHale (Ray Winstone) who kept Irina
          following close behind in Jones' journeys by dropping blinking tracking
          beacons.</span></font></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2045"><font data-dcnode-id="2046" size="2"><span data-dcnode-id="2047" instrument_node="">In the finale, they entered the Mayan temple's inner
            chamber where 13 aliens ("inter-dimensional beings") with
            crystal skeletons (arranged in a circle) were seated. Presumably,
            the alien beings had been worshipped by the Mayans, who were taught
            advanced technology by the extra-terrestrials. Once the retrieved
            crystal skull was restored onto the spinal cord of one of the aliens,
        Irina demanded the reward: "I want to know."  </span></font></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2041"><font data-dcnode-id="2042" size="2"><span data-dcnode-id="2043" instrument_node="">The
          supernatural being (the collective of all 13 aliens) overloaded her
          skull with knowledge, burning and disintegrating her brain (and eyesockets)
          with flames, and her remains and those of other henchmen were sucked
          up into a vortex that took them into a giant spaceship above (in another
          dimension?).</span></font></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2037"><font data-dcnode-id="2038" size="2"><span data-dcnode-id="2039" instrument_node=""> After Indy and his friends escaped from the crumbling
          temple, they watched from afar as the temple collapsed, the whirling,
          spinning flying saucer created a vortex in its ascension, and the valley
          floor was covered over by Amazonian waters ("Like a broom to their
          footprints"). Oxley
          summarized where the saucer went: "Not into space. Into the space
        between spaces."</span></font></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2033"><font data-dcnode-id="2034" size="2"><span data-dcnode-id="2035" instrument_node=""> Indy also contributed this afterthought:</span></font></p><span data-dcnode-id="2032" instrument_node="">
</span><blockquote data-dcnode-id="2026"><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2028"><font data-dcnode-id="2029" size="2"><span data-dcnode-id="2030" instrument_node=""> "Their
            treasure wasn't gold - it was knowledge. Knowledge was their treasure."</span></font></p><span data-dcnode-id="2027" instrument_node="">
</span></blockquote></td><td data-dcnode-id="1994" valign="top"><center data-dcnode-id="1995"><span data-dcnode-id="2023" instrument_node="">

</span><p data-dcnode-id="1970"><img align="absmiddle" alt="" data-dcnode-id="1975" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="1974" instrument_node=""> </span><b data-dcnode-id="1971"><font data-dcnode-id="1972" size="2"><span data-dcnode-id="1973" instrument_node="">An
            Aging Hollywood Film Star's Identity Was Shattered (Allegorically
            or in Real-life?) After Taking the Lead Role in a Cursed Film Remake
            of a Haunted Polish Gypsy Folk Tale About Adultery; Sue Found Herself
            Adopting the Persona of the Film Character, and Her World Became
            A Surrealistic Nightmare </span></font></b></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1966"><font data-dcnode-id="1967" size="2"><span data-dcnode-id="1968" instrument_node="">As with any David Lynch film, making sense of the surrealistic
        images, unconventional and non-linear plot, overlapping storylines,
        alternate worlds, hyperlinked events, and changing identities (doubling
        of characters as doppelgangers) can be dubious. Even the title of the
          film was ambiguous,  not referring to a region in SoCal, but
          something more interior to the psyche. The film's main clue was its
          tagline:</span></font></p><span data-dcnode-id="1965" instrument_node="">
</span><blockquote data-dcnode-id="1959"><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1961"><font data-dcnode-id="1962" size="2"><span data-dcnode-id="1963" instrument_node=""> "A
          Woman in Trouble." </span></font></p><span data-dcnode-id="1960" instrument_node="">
</span></blockquote><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1955"><font data-dcnode-id="1956" size="2"><span data-dcnode-id="1957" instrument_node="">This  was Lynch's first entire digital video film, shot
        on a handheld Sony PD150 recorder. This three hour mystery-horror film
        was no different than most of Lynch's other works, although there were
          general outlines to follow about a doomed film project, adultery, and
          a possibility of pregnancy:</span></font></p><span data-dcnode-id="1954" instrument_node="">
</span><ul data-dcnode-id="1883"><span data-dcnode-id="1953" instrument_node="">
</span><li data-dcnode-id="1947"><font data-dcnode-id="1948" size="2"><span data-dcnode-id="1952" instrument_node="">Under the credits, a black and
            white sequence, a gramophone (with a closeup of the needle sitting
            on a revolving record) played </span><i data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Axxon
              N</span></i><span data-dcnode-id="1949" instrument_node=""> - described in voice-over as: 
            "the longest running radio play in history, tonight, continuing
            in the Baltic region, a gray winter day in an old  hotel."</span></font></li><span data-dcnode-id="1946" instrument_node="">
</span><li data-dcnode-id="1943"><font data-dcnode-id="1944" size="2"><span data-dcnode-id="1945" instrument_node="">In the second part of the opening, a Lost
            Girl (Karolina Gruszka), a Polish ghetto prostitute after a brutalizing
            encounter with a client, was trapped in hotel Rm. 47 while tearfully
            watching a drawing room sit-com on TV (a movie-within-a-movie about
            three rabbit-headed, clothes-wearing people lounging around in an
            apartment), with a canned laugh track. The voices of the three rabbits
            were Jane (Laura Harring), Jack (Scott Coffey), and Suzie (Naomi
            Watts).</span></font></li><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1936"><font data-dcnode-id="1937" size="2"><span data-dcnode-id="1941" instrument_node="">Just before a movie audition
            for a remake of a film titled </span><i data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">On High in Blue Tomorrows</span></i><span data-dcnode-id="1938" instrument_node="">, aging
            yet privileged LA actress Nikki Grace (Laura Dern), hoping for a
            comeback role, was visited in her luxury home by a heavily-accented
            Polish neighbor lady (Grace Zabriskie). She related two Old World
            folktales about an evil and lost girl. Like a bizarre flash-forward,
            Nikki was abruptly told that there was a "brutal
            f--king murder" in
            the film's plot, and prophetically told she would get the part in
            the film:
            "I definitely hear that you have
            it...Actions do have consequences and yet there is the magic." Nikki
            also was told some hinted foreshadowings about things being non-linear: "I
            can't seem to remember if it's today, two days from now, or yesterday,"
            and "evil was  born."</span></font></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1929"><font data-dcnode-id="1930" size="2"><span data-dcnode-id="1934" instrument_node="">Nikki had auditioned and received the part of Sue
            Blue, playing opposite womanizing actor Devon Berk as Billy Slide
            (Justin Theroux). The film was an adaptation of a Polish gypsy tale
            (an adulterous love story) - with a plot about marriage and murder.
            It was directed by high-profile, pompous Kingsley Stewart (Jeremy
            Irons), with assistance from a broke Freddie Howard (Harry Dean Stanton).
            Production on the previously-cursed
            remake (titled </span><i data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Vier-Sieben:
            47</span></i><span data-dcnode-id="1931" instrument_node="">)
            of the film was never finished when the two leads were murdered.
            There were intimations that the current film would also be cursed.</span></font></li><span data-dcnode-id="1928" instrument_node="">
</span><li data-dcnode-id="1925"><font data-dcnode-id="1926" size="2"><span data-dcnode-id="1927" instrument_node="">During one of the first run-throughs of the script,
            a disturbance was heard backstage in the studio - when Devon investigated,
            he saw Nikki's lurking double seeing herself (at a later point in
            the film when she entered an alleyway and a door marked Axxon N).
            Nikki ran away, into the plain suburban home of another film character
            named Smithy (character Sue's husband in the film?).</span></font></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1921"><font data-dcnode-id="1922" size="2"><span data-dcnode-id="1923" instrument_node="">Nikki's possessively jealous and intimidating husband
            Piotrek (Peter J. Lucas) warned Devon that his wife was out-of-bounds
            for an affair. However, as the film was being made, Nikki did begin
            an affair with Devon, in the role of her character - simultaneously,
            her loss of identity and its fragmentation started when she paranoically
            feared she would be discovered.</span></font></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1917"><font data-dcnode-id="1918" size="2"><span data-dcnode-id="1919" instrument_node="">At the same time, Billy's crazed
          wife Doris (Julia Ormond) in the film was interrogated by a detective,
          when she confessed she was hypnotized by the Phantom (Krzysztof Majchrzak)
          to murder someone with a screwdriver (although the screwdriver was
          stuck in her own bloody side).</span></font></li><span data-dcnode-id="1916" instrument_node="">
</span><li data-dcnode-id="1913"><font data-dcnode-id="1914" size="2"><span data-dcnode-id="1915" instrument_node="">Everything in the film then became very stylistic,
            hallucinatory 'Alice down the rabbit hole' images, seemingly-unrelated.
            Nikki, as a white-trash, hardened, abused working-class housewife
            who confessed her hatred of men to a glasses-wearing psychiatrist,
            also spoke to a gaggle of lascivious prostitutes (fragments of her
            own shattered ego?). She presumably was a prostitute herself (allegorically)
            for allowing sex with her co-star. One of the prostitutes Salli (Wendy
            Rhodes) pulled up her black T-shirt to show off her
             breasts - after one of the others was told: "There's always
            a chance with tits like yours, Kari."  Salli bragged: "These
            are gonna bring up 'In-Like-Flynn'." She was complimented about
            her shapely chest: "They're
            pretty, baby. Nice. Sweet." Suddenly, the group, functioning
            as a Greek chorus, burst into a choreographed version of "The
            Loco-Motion."</span></font></li><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1909"><font data-dcnode-id="1910" size="2"><span data-dcnode-id="1911" instrument_node="">Recurring reiterative images, motifs or themes: a
            cigarette burn hole in silk, allowing one to gaze through; questions
            about what time it is or what day it is; the Axxon N (a rabbit hole
            figuratively?); her scary Polish neighbor - the Phantom? - hiding
            behind a tree; a ringing phone; a screwdriver and wounds; blood and
            catsup mixed on a T-shirt during an afternoon outdoor barbecue.</span></font></li><span data-dcnode-id="1908" instrument_node="">
</span><li data-dcnode-id="1905"><font data-dcnode-id="1906" size="2"><span data-dcnode-id="1907" instrument_node="">She admitted
          to her husband that she was pregnant - and he was shocked. He knew
            she was unfaithful because he told her: "I can't father children."</span></font></li><span data-dcnode-id="1904" instrument_node="">
</span><li data-dcnode-id="1901"><font data-dcnode-id="1902" size="2"><span data-dcnode-id="1903" instrument_node="">Sue wandered the streets and found herself as a battered
            and tawdry prostitute on Hollywood Boulevard and Vine, where she
            was stabbed with a screwdriver in the stomach (and creating a hole
            from her intestine into her vaginal wall) - thereby killing her baby.
            She slowly perished on a sidewalk next to a black homeless woman
            (Helena Chase) and a Japanese girl (Nae) who talked about taking
            a bus from Hollywood to Pomona to visit a friend named Niko. Niko
            represented the archetypal fallen victim of the film itself - 
            a woman who aspired to be an actress, but failed and became a hard
            drugs-taking prostitute with a blonde wig ("She looks very good
            in her blonde wig just like a movie star").</span></font></li><span data-dcnode-id="1900" instrument_node="">
</span><li data-dcnode-id="1897"><font data-dcnode-id="1898" size="2"><span data-dcnode-id="1899" instrument_node="">Before  Sue expired, she vomited blood on one of the
            Hollywood Walk of Fame stars (labeled Dorothy) - a powerful statement.
            The flame of the cigarette lighter of the woman went out ("No
            more blue tomorrows. You on high now, love") - although
            there was a pull-back of the camera revealing it was a filmed scene.</span></font></li><span data-dcnode-id="1896" instrument_node="">
</span><li data-dcnode-id="1890"><font data-dcnode-id="1891" size="2"><span data-dcnode-id="1895" instrument_node="">In the persona of Nikki (now dead as Sue and reborn),
            she  escaped from the trap of the film (after the shooting was
            completed). She entered into a nearby cinema, where she  viewed </span><i data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">On
            High in Blue Tomorrows</span></i><span data-dcnode-id="1892" instrument_node="">, and some of the events of the film. She
            entered the theater's projection room - and found herself in  the
            "Axxon N" apartment building. She
            shot and killed the Phantom with a gun in a hotel hallway (as he
            died, his face displayed a hideous view of Nikki's own clown-face).
            She eventually wandered into hotel Room 47 (which held the anthropomorphic
            rabbits in the TV sitcom), where she kissed the Lost Girl and freed
            her. Nikki and the rabbits faded away. </span></font></li><span data-dcnode-id="1889" instrument_node="">
</span><li data-dcnode-id="1885"><font data-dcnode-id="1887" size="2"><span data-dcnode-id="1888" instrument_node="">In the film's first epilogue, the Lost Girl ran into
            Smithy's house where she happily embraced her estranged husband and
            child (a symbol of Nikki's own restored marriage!).</span></font><span data-dcnode-id="1886" instrument_node=""> </span></li><span data-dcnode-id="1884" instrument_node="">
</span></ul><span data-dcnode-id="1882" instrument_node="">

</span><font data-dcnode-id="1720" size="2"><img alt="" data-dcnode-id="1722" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/titles/innocents.jpg&amp;raw" width="160"><span data-dcnode-id="1721" instrument_node=""> </span></font><span data-dcnode-id="1719" instrument_node="">
</span></center><span data-dcnode-id="1717" instrument_node=""> </span></td><td data-dcnode-id="1577" valign="top"><p data-dcnode-id="1710"><i data-dcnode-id="1711"><b data-dcnode-id="1712"><font data-dcnode-id="1713" size="2"><span data-dcnode-id="1714" instrument_node="">The Innocents (1961, UK)</span></font></b></i></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1703"><img align="absmiddle" alt="" data-dcnode-id="1708" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="1707" instrument_node=""> </span><b data-dcnode-id="1704"><font data-dcnode-id="1705" size="2"><span data-dcnode-id="1706" instrument_node="">Was
        Governess Miss Giddens Slightly Deranged, or Were the Children Really
            the 'Possessed' Spirits of Two Deceased Individuals Haunting the
            Estate? Was She Saving Them or Corrupting Them? </span></font></b></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1696"><font data-dcnode-id="1697" size="2"><span data-dcnode-id="1701" instrument_node="">Director Jack Clayton's scary, supernatural-psychological
          horror film was adapted from Henry James' novella, </span><i data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">The Turn of the
        Screw</span></i><span data-dcnode-id="1698" instrument_node="">. The setting was in the 19th century in Victorian England, at a
          gothic, bleak English country estate.</span></font></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1692"><font data-dcnode-id="1693" size="2"><span data-dcnode-id="1694" instrument_node="">A new governess, Miss Giddens
        (Deborah Kerr), was taking care of a young boy and girl for wealthy
        Bly House estate owner and bachelor, the Uncle (Michael Redgrave).
        The orphaned children were:</span></font></p><span data-dcnode-id="1691" instrument_node="">
</span><ul data-dcnode-id="1681"><span data-dcnode-id="1690" instrument_node="">
</span><li data-dcnode-id="1687"><font data-dcnode-id="1688" size="2"><span data-dcnode-id="1689" instrument_node=""> Miles (Martin Stephens), the 
            seemingly 'innocent' nephew, who was expelled from private boarding
            school and returned to Bly House </span></font></li><span data-dcnode-id="1686" instrument_node="">
</span><li data-dcnode-id="1683"><font data-dcnode-id="1684" size="2"><span data-dcnode-id="1685" instrument_node="">Flora (Pamela Franklin), the niece </span></font></li><span data-dcnode-id="1682" instrument_node="">
</span></ul><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1677"><font data-dcnode-id="1678" size="2"><span data-dcnode-id="1679" instrument_node="">As the disquieting story progressed, the sexually-repressed
          Miss Giddens appeared slightly deranged (was she mad or not?), believing
          that the slightly mature, corrupted and strange children Miles and
          Flora were 'possessed' by the malignant spirits of the estate, including:</span></font></p><span data-dcnode-id="1676" instrument_node="">
</span><ul data-dcnode-id="1666"><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1672"><font data-dcnode-id="1673" size="2"><span data-dcnode-id="1674" instrument_node="">Peter Quint (Peter Wyngarde), the estate's valet,
            violently murdered </span></font></li><span data-dcnode-id="1671" instrument_node="">
</span><li data-dcnode-id="1668"><font data-dcnode-id="1669" size="2"><span data-dcnode-id="1670" instrument_node="">Miss Mary Jessel (Clytie Jessop),  the  previous
             governess suffering from "mad
          grief" who drowned herself after his death </span></font></li><span data-dcnode-id="1667" instrument_node="">
</span></ul><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1662"><font data-dcnode-id="1663" size="2"><span data-dcnode-id="1664" instrument_node="">The two deceased individuals had carried on  a perverse
          sexual relationship (in public) and were suspected of 'haunting' the
          estate as apparitions, often seen by Miss Giddens. The governess believed
          the ghostly couple possessed the bodies of the children in order to
          continue their relationship beyond death. </span></font></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1658"><font data-dcnode-id="1659" size="2"><span data-dcnode-id="1660" instrument_node="">The most controversial portion of the film was its adult-like,
          intimately passionate, unsettling on-the-lips kiss between Miss Giddens
          and the wise-beyond-his-years Miles after she escorted him to bed.
          She was horrified that Miles was keeping a pigeon with a broken neck
          under his pillow ("Yes, poor thing, I'll bury it tomorrow"). And then
          he suddenly sat up and put his arms around her neck, asking: "Kiss
          me Goodnight, Miss Giddens."</span></font></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1654"><font data-dcnode-id="1655" size="2"><span data-dcnode-id="1656" instrument_node="">In the film's frenzied conclusion, first in the hot and
          humid greenhouse, she kept urging and suspecting that the ghost of
          Quint was causing Miles to frighten his schoolmates with vulgar language
          and behavior, and was teaching him to do and say things. Behind Miles,
          she saw an apparition of Quint reflected in a window. But Miles denied
          her assertions, screamed at her, and accused her of being mad:</span></font></p><span data-dcnode-id="1653" instrument_node="">
</span><blockquote data-dcnode-id="1647"><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1649"><font data-dcnode-id="1650" size="2"><span data-dcnode-id="1651" instrument_node="">I know why you keep on and on. It's because you're
            afraid. You're afraid you might be mad. So you keep on and on, trying
            to make me admit something that isn't true. Trying to frighten me
            the way you frightened Flora...But I'm not Flora. I'm no baby. You
            think you can run to my uncle with a lot of lies. But he won't believe
            you, not when I tell him what you are... a damned hussy, a damned
            dirty-minded hag!  You never fooled us. We always
            knew. (cackling laugh, from both Miles and
            Quint)</span></font></p><span data-dcnode-id="1648" instrument_node="">
</span></blockquote><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1643"><font data-dcnode-id="1644" size="2"><span data-dcnode-id="1645" instrument_node="">Then, Miles broke a window, and  fled
          outside to the garden,  Miss Giddens grabbed Miles when he stumbled
          to the ground. She hugged him and tried to reassure him: "Oh,
          it wasn't you. That voice, those words, they weren't yours." She
          begged  him to admit that the ghost of the dead Quint existed and was
          present there with them, and then shook him:</span></font></p><span data-dcnode-id="1642" instrument_node="">
</span><blockquote data-dcnode-id="1636"><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1638"><font data-dcnode-id="1639" size="2"><span data-dcnode-id="1640" instrument_node="">Say it now, now while I'm holding you. Say
          his name, and it will all be over...The man who taught you. The man
            you've been meeting, that you've never stopped meeting... His name,
            Miles. His name, Miles...Tell me his name! You must tell me his
            name!...Look...look! Look!...He's here! For the last time, he's
            here...he's here, and you must say his name!</span></font></p><span data-dcnode-id="1637" instrument_node="">
</span></blockquote><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1632"><font data-dcnode-id="1633" size="2"><span data-dcnode-id="1634" instrument_node="">He yelled back at her and ran off: "You're wrong,
          you're insane, you're insane...you're insane, you're insane...He's
          dead!" Miles
         collapsed to the ground at her feet after screaming out and possibly
        having seen the ghost that she was warning him about (the hand of one
        of the statuesque figures in the garden moved): "Quint!
        Peter Quint! Where? Where? Where? Where, you devil? Where?" </span></font></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1628"><font data-dcnode-id="1629" size="2"><span data-dcnode-id="1630" instrument_node="">She ran to Miles, cradled his body in her
        arms, assuring him and believing that he was finally freed from Quint:</span></font></p><span data-dcnode-id="1627" instrument_node="">
</span><blockquote data-dcnode-id="1621"><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1623"><font data-dcnode-id="1624" size="2"><span data-dcnode-id="1625" instrument_node=""> "He's
          gone, Miles. You're safe. You're free. I have you. He's lost you forever."</span></font></p><span data-dcnode-id="1622" instrument_node="">
</span></blockquote><span data-dcnode-id="1620" instrument_node="">
</span><span data-dcnode-id="1619" instrument_node="">

</span></center><span data-dcnode-id="1491" instrument_node=""> </span></td><td data-dcnode-id="1187" valign="top"><p data-dcnode-id="1484"><i data-dcnode-id="1485"><b data-dcnode-id="1486"><font data-dcnode-id="1487" size="2"><span data-dcnode-id="1488" instrument_node="">Inside Man (2006)</span></font></b></i></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1477"><img align="absmiddle" alt="" data-dcnode-id="1482" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="1481" instrument_node=""> </span><b data-dcnode-id="1478"><font data-dcnode-id="1479" size="2"><span data-dcnode-id="1480" instrument_node="">It
        Wasn't A Bank Robbery at All - The Robbers Only Wanted the Incriminating
        Contents of the Safety Deposit Box of the Bank's Chairman of the Board,
        Who Had Benefited During WWII From Nazi-Related Crimes; The Criminals
            Created a False Wall and "Cell" in the Bank's Supply Room
            Where the Lead Thief (Their "Inside Man") Hid for Almost a Week Before
            Non-Chalantly Leaving the Bank With the Box's Contents </span></font></b></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1464"><font data-dcnode-id="1465" size="2"><span data-dcnode-id="1475" instrument_node="">Director Spike Lee's R-rated film was a typical Hollywood
          retreaded heist-thriller flick, specifically a tense hostage drama.
          It reflected elements found in </span><i data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Serpico (1973), Dog Day Afternoon
          (1975),  </span></i><span data-dcnode-id="1472" instrument_node="">the
          comedy heist film </span><i data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Quick Change (1990), </span></i><span data-dcnode-id="1469" instrument_node=""> and
          </span><i data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Die Hard: With a Vengeance (1995)</span></i><span data-dcnode-id="1466" instrument_node="">. </span></font></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1460"><font data-dcnode-id="1461" size="2"><span data-dcnode-id="1462" instrument_node="">The film opened with cunning
        leader Dalton Russell (Clive Owen) and his gang committing the "perfect
        bank robbery" at the Manhattan Trust Bank in the Wall Street district.
      </span></font></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1456"><font data-dcnode-id="1457" size="2"><span data-dcnode-id="1458" instrument_node="">He broke through the fourth wall to address the audience
          as the film began, offering a major clue that he was speaking from
          a "tiny
        cell" rather
        than "in prison":</span></font></p><span data-dcnode-id="1455" instrument_node="">
</span><blockquote data-dcnode-id="1449"><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1451"><font data-dcnode-id="1452" size="2"><span data-dcnode-id="1453" instrument_node="">"My name is Dalton Russell. Pay strict attention
            to what I say because I choose my words carefully and I never repeat
            myself. I've told you my name: that's the "who." The "where" could
            most readily be described as a prison cell, but there's a vast difference
            between being stuck in a tiny cell and being in prison. The "what"
            is easy. Recently I planned and set in motion events to execute the
            perfect bank robbery. That's also the "when." As for the "why," beyond
            the obvious financial motivation, it's exceedingly simple. Because
            I can. Which leaves us only with the "how." And therein, as the Bard
            would tell us, lies the rub."</span></font></p><span data-dcnode-id="1450" instrument_node="">
</span></blockquote><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1442"><font data-dcnode-id="1443" size="2"><span data-dcnode-id="1447" instrument_node="">The film's action was seen - in flashback. The slogan
        on the side of the thieves' stolen van, for a company called Perfectly
          Planned Painting, provided a major clue to the plot: "We
        NEVER Leave Until The Job Is </span><u data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Done</span></u><span data-dcnode-id="1444" instrument_node="">!" The
        robbers were cleverly dressed - with white painter's
        overalls or jumpsuits, white caps, and sunglasses. During
        the early stages of the robbery (although no money was ultimately taken!)
        after closing the front doors of the bank and sabotaging the security
        cameras, Russell and his masked gang of three ordered everyone to the
        floor. After herding the 50 or so hostages (bank customers and employees)
        downstairs, they bullied them into turning over their cellphones and
        then stripping down to their underwear. The robbers then forced
        the hostages to put on identical dark suits with hoods and white cloth
        face masks, and herded them in groups into several locked offices or
        rooms, and from time to time shuffled them around. </span></font></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1438"><font data-dcnode-id="1439" size="2"><span data-dcnode-id="1440" instrument_node="">A few of the identically-dressed
          hostages were released from the bank, to be mercilessly grilled
        and interrogated with exit interviews by the authorities. The gang
        members also dressed the same as the hostages to confuse the other
        hostages and police. Russell
        demanded two busses and a jumbo jet at JFK airport for the criminals'
        escape. The
        lead negotiator (and others) for the hostages were:</span></font></p><span data-dcnode-id="1437" instrument_node="">
</span><ul data-dcnode-id="1423"><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1433"><font data-dcnode-id="1434" size="2"><span data-dcnode-id="1435" instrument_node="">Keith
          Frazier (Denzel Washington), an unorthodox NYPD detective</span></font></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1429"><font data-dcnode-id="1430" size="2"><span data-dcnode-id="1431" instrument_node="">Mitchell (Chiwetel Ejoifor), Frazier's partner</span></font></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1425"><font data-dcnode-id="1426" size="2"><span data-dcnode-id="1427" instrument_node="">Captain
          John Darius (Willem Dafoe), the brash chief of the Emergency Services
            Unit (ESU).</span></font></li><span data-dcnode-id="1424" instrument_node="">
</span></ul><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1419"><font data-dcnode-id="1420" size="2"><span data-dcnode-id="1421" instrument_node="">At the same time,  ultra-rich bank chairman (of the board
          of directors), founder and owner Arthur Case (Christopher Plummer)
          revealed that he had some secrets - what he called "family heirlooms"
          (valuable diamonds in velvet bags, a Cartier ring, and a Nazi swastika
          manila envelope with documents linking him to war crimes, revealed
          later) hidden in his safety deposit box (# 392) in the besieged bank.
        </span></font></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1413"><font data-dcnode-id="1416" size="2"><span data-dcnode-id="1417" instrument_node="">Case</span></font><font data-dcnode-id="1414" size="2"><span data-dcnode-id="1415" instrument_node=""> hired sleek, high-heeled,
          iron-willed, and bitchy-chilly private investigator/fixer Madeleine
          White (Jodie Foster) (called a "magnificent
        c--t" by the Mayor as she bullied him for favors),  to secure
        the box's contents. She was introduced while arranging for Bin Laden's
        nephew to purchase a co-op on Park Avenue (and list her client Case
        as a reference).</span></font></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1409"><font data-dcnode-id="1410" size="2"><span data-dcnode-id="1411" instrument_node="">Case
        had a dark and secretive past. To enrich himself during WWII, he had
          used his position working in a bank in Switzerland to do business with
          the Nazis during the Holocaust. He helped them betray and steal
          from wealthy Jews and send them to death camps. As "a short path
          to success," he "used his blood money to start a bank." He
          later admitted to Madeleine: "I sold my soul." On his behalf,
          fixer Madeleine entered the bank and bribed Russell with an offer for
          a reduced 4 year sentence, and $2 million dollars after his release,
          in exchange for the envelope, but he didn't accept it. Although unsuccessful
          in retrieving the contents of Case's deposit box, the banker gave Madeleine
           a generous check as hush money. </span></font></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1405"><font data-dcnode-id="1406" size="2"><span data-dcnode-id="1407" instrument_node="">Frazier's questions and the answers he received during
          the case were merely coincidental, but often quite revealing.
          For instance, when he spoke to Russell, the robber boasted that he
          would walk out the front door (as he did): "I'm gonna walk out
          of that door when I'm good and ready." Frazier also told Russell
          that he was "too
          broke"
          to get married (and buy an engagement ring for his girlfriend Sylvia
          (Cassandra Freeman)). And
          Frazier surmised, from another cop's comment ("You never know
          who's listening"),
          that the police command center had been bugged by the robbers, so they
          had heard everything. </span></font></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1401"><font data-dcnode-id="1402" size="2"><span data-dcnode-id="1403" instrument_node="">In the end, no money was stolen, the guns the robbers
        used were fake toys, and an execution of one hostage had been staged.
          The only items disturbed in the bank were the contents of the safety
          deposit box. All of the hostages were released (with three of the gang
          members joining them), while Russell stayed behind to hide. </span></font></p><span data-dcnode-id="1400" instrument_node="">

</span><p data-dcnode-id="1207"><font data-dcnode-id="1208" size="2"><span data-dcnode-id="1209" instrument_node=""> The reason the 'robbery' took
          so long was because the robbers were creating a hiding place - a false
          wall - in the bank's supply room. There, they  dug a hole to be
          used by Russell (as the titular "Inside
          Man")
          as a latrine ("now that's a good-looking s--thole" was the
          clue!). After staying cooped
        up  behind a fake wall in the supply room for about a week, he emerged
          and walked out of the bank as a free man,
          to be picked up in an SUV by his fellow gang members. He  had absconded
          with the loose diamonds in velvet bags, and the envelope from Case's
          safe deposit box to use as blackmail in the future. </span></font></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1203"><font data-dcnode-id="1204" size="2"><span data-dcnode-id="1205" instrument_node="">On
        his way out, he bumped into Frazier, who was entering the bank with
        a court order to open Case's safe deposit box. Frazier found that the
        Cartier ring had been left behind in the box with a note: "Follow
        the Ring." Frazier realized that the
        bank's chairman was implicated and linked to Nazi war crimes. The diamond
        ring had once  belonged to a French Jewish banker and his family who
        were sent to concentration camps.</span></font></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1199"><font data-dcnode-id="1200" size="2"><span data-dcnode-id="1201" instrument_node="">Later
        that evening in his girlfriend's bedroom, Frazier found one of the loose
          diamonds in his pocket - and realized that the man who had bumped into
          him in the bank was Russell (He recalled: "I'm gonna walk
          out of that door when I'm good and ready"). He had been graciously
          provided with a wedding diamond so he could propose to his girlfriend. </span></font></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1195"><font data-dcnode-id="1196" size="2"><span data-dcnode-id="1197" instrument_node="">Sylvia was on the
        bed, urging him to join her for sex - with his "Big Willie
