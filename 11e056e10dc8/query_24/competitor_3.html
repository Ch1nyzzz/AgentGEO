</span><font data-dcnode-id="1104" size="2"><img alt="" data-dcnode-id="1105" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/screens/insidious.jpg&amp;raw" width="160"></font><span data-dcnode-id="1103" instrument_node="">
</span></center><span data-dcnode-id="1101" instrument_node=""> </span></td><td data-dcnode-id="933" valign="top"><p data-dcnode-id="1094"><i data-dcnode-id="1095"><b data-dcnode-id="1096"><font data-dcnode-id="1097" size="2"><span data-dcnode-id="1098" instrument_node="">Insidious (2010)</span></font></b></i></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1087"><img align="absmiddle" alt="" data-dcnode-id="1092" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="1091" instrument_node=""> </span><b data-dcnode-id="1088"><font data-dcnode-id="1089" size="2"><span data-dcnode-id="1090" instrument_node="">The  Film Opened And Closed With a View of a Creepy Old Woman Through A Window;
        That Character Had Haunted and Threatened to Possess Family Head Josh
            Ever Since He Was A Child, and Now Finally Possessed Him As an Adult
            As the Film Concluded; Josh Had Been the Target of the Disembodied,
            Tormented Spirits All Along, Not His Son Dalton, Who Had Only Been
            Used as Bait to Draw Josh Into the Dark Realm of "The Further" </span></font></b></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1065"><font data-dcnode-id="1066" size="2"><span data-dcnode-id="1085" instrument_node="">Director James Wan and writer Leigh Whannell, creators
          of  the "Saw"  film franchise, created this exceptionally-suspenseful
           horror film.  It was derived from elements of typical haunted
           house tales, </span><i data-dcnode-id="1082"><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/exor.html"><span data-dcnode-id="1084" instrument_node="">The Exorcist (1973)</span></a></i><span data-dcnode-id="1081" instrument_node="">, </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/shin.html"><i data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The
           Shining (1980)</span></i></a><span data-dcnode-id="1077" instrument_node="">, </span><i data-dcnode-id="1074"><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/polt.html"><span data-dcnode-id="1076" instrument_node="">Poltergeist
           (1982)</span></a></i><span data-dcnode-id="1073" instrument_node="">,</span><i data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node=""> The Cell (2000)</span></i><span data-dcnode-id="1070" instrument_node="">,
            and </span><i data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Paranormal Activity (2007)</span></i><span data-dcnode-id="1067" instrument_node="">. The
           supernatural flick posited the existence of an unseen shadowy world
           known as "The Further" (known in many such films as the "Other Side"),
           inhabited by creatures ready to possess the souls of humans. </span></font></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1061"><font data-dcnode-id="1062" size="2"><span data-dcnode-id="1063" instrument_node="">The film
        opened with a view of a creepy Old Woman (Philip Friedman) through
        a window, holding a candle - a major hint, and then the title
        screen in pulsating, blood-red lettering.</span></font></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1057"><font data-dcnode-id="1058" size="2"><span data-dcnode-id="1059" instrument_node="">A suburban family moved into a spooky old 1920s, two-story
          Craftsman house:</span></font></p><span data-dcnode-id="1056" instrument_node="">
</span><ul data-dcnode-id="1038"><span data-dcnode-id="1055" instrument_node="">
</span><li data-dcnode-id="1052"><font data-dcnode-id="1053" size="2"><span data-dcnode-id="1054" instrument_node=""> Josh (Patrick
            Wilson), a schoolteacher </span></font></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1048"><font data-dcnode-id="1049" size="2"><span data-dcnode-id="1050" instrument_node="">Renai (Rose Byrne), a stay-at-home mom and aspiring
          singer-songwriter  </span></font></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1040"><font data-dcnode-id="1041" size="2"><span data-dcnode-id="1046" instrument_node="">  their three children: </span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
          - 
          an infant girl Cali</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node=""> 
          - two
            pre-teen brothers: 8 year-old Dalton (Ty Simpkins) and Foster (Andrew
            Astor) </span></font></li><span data-dcnode-id="1039" instrument_node="">
</span></ul><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1034"><font data-dcnode-id="1035" size="2"><span data-dcnode-id="1036" instrument_node="">They began to
        experience a few strange occurrences: books falling off a shelf, scratching
          noises, and a creaking attic door. After Dalton
          went up into the attic to explore, he saw something, fell off the ladder
          (with a broken rung), and hit his head. Overnight as he slept, he went
           into an unexplained 'coma' (without brain damage, trauma, or infection). Dalton
          was hospitalized for three months and then returned  (still
           unresponsive) to the house, where
          more inexplicable things began to happen: </span></font></p><span data-dcnode-id="1033" instrument_node="">
</span><ul data-dcnode-id="1009"><span data-dcnode-id="1032" instrument_node="">
</span><li data-dcnode-id="1027"><font data-dcnode-id="1030" size="2"><span data-dcnode-id="1031" instrument_node="">S</span></font><font data-dcnode-id="1028" size="2"><span data-dcnode-id="1029" instrument_node="">tatic, indistinct whisperings,  and barely audible
            voices were heard on the baby monitor ("There's nothing you can do.
            Nothing you can do...I want it. Give me it! Give me it! I want it!
            I want it now!")</span></font></li><span data-dcnode-id="1026" instrument_node="">
</span><li data-dcnode-id="1023"><font data-dcnode-id="1024" size="2"><span data-dcnode-id="1025" instrument_node="">Foster complained that his comatose older brother
          Dalton was sleepwalking at night</span></font></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1019"><font data-dcnode-id="1020" size="2"><span data-dcnode-id="1021" instrument_node="">Creaky sounds, thuds, door bangings, the
            strange sighting of a sinister figure and shape in the infant's
            bedroom, a security alarm blaring with the locked and alarmed front
            door inexplicably open </span></font></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1015"><font data-dcnode-id="1016" size="2"><span data-dcnode-id="1017" instrument_node="">A bloody handprint on the sheet of Dalton's
          bed next to his foot</span></font></li><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1011"><font data-dcnode-id="1012" size="2"><span data-dcnode-id="1013" instrument_node="">Renai's nightmare of a Long-Haired Fiend (J. LaRose)
             pacing outside her bedroom window and then attacking her (she told
            Josh: "Don't you dare not believe me") </span></font></li><span data-dcnode-id="1010" instrument_node="">
</span></ul><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005"><font data-dcnode-id="1006" size="2"><span data-dcnode-id="1007" instrument_node="">Josh's strange
        past history was hinted at:</span></font></p><span data-dcnode-id="1004" instrument_node="">
</span><ul data-dcnode-id="986"><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="1000"><font data-dcnode-id="1001" size="2"><span data-dcnode-id="1002" instrument_node="">No pictures of Josh as a child in his family photo
          album</span></font></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="996"><font data-dcnode-id="997" size="2"><span data-dcnode-id="998" instrument_node="">He was fearful of being photographed</span></font></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="992"><font data-dcnode-id="993" size="2"><span data-dcnode-id="994" instrument_node="">He began staying late at work,
              allegedly to grade some tests </span></font></li><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="988"><font data-dcnode-id="989" size="2"><span data-dcnode-id="990" instrument_node="">Josh became skeptical and unsupportive of Renai's
          allegations ("I'm scared of this house, there's something wrong with
              this place...It's like a sickness...I can't be alone in there anymore");
              he avoided her stressful problems and privately thought she was
              crazy</span></font></li><span data-dcnode-id="987" instrument_node="">
</span></ul><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="982"><font data-dcnode-id="983" size="2"><span data-dcnode-id="984" instrument_node="">They promptly moved
        to another house, a single-story home. Soon, the
        supernatural events began to reoccur, e.g., the LP record playing on
          the phonograph changed to "Tiptoe Through the Tulips" and a figure
          was seen dancing in the living room, doors abruptly shut and opened,
           a riderless rocking horse rocked, and a laughing doll-child ran through
        the house. </span></font></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="975"><font data-dcnode-id="976" size="2"><span data-dcnode-id="980" instrument_node="">As the trailer revealed, Dalton was the one that was
          haunted by spirits, not the house. Josh's
        tense mother Lorraine Lambert (Barbara Hershey) described  
        a horrifying nightmare and vision she had the night before about an
        unusual figure she saw in the corner of Dalton's bedroom ("There
        was something in there with him"), who was visiting and had come
        to take Dalton. As she told the story to the couple, she saw a red and
        black-faced Demon (Joseph Bishara), looking like </span><i data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Star
          Wars</span></i><span data-dcnode-id="977" instrument_node="">'
        Darth Maul, suddenly emerge behind Josh ("It's here!"). They found Dalton's
        room torn apart, and an unharmed Dalton on the floor. </span></font></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="971"><font data-dcnode-id="972" size="2"><span data-dcnode-id="973" instrument_node="">The couple,
        with Lorraine's recommendation, hired a professional group of paranormal
        investigators to check out the new house:</span></font></p><span data-dcnode-id="970" instrument_node="">
</span><ul data-dcnode-id="958"><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="966"><font data-dcnode-id="967" size="2"><span data-dcnode-id="968" instrument_node="">Elise Rainier  (Lin Shaye), lead medium </span></font></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="960"><font data-dcnode-id="963" size="2"><span data-dcnode-id="964" instrument_node="">Tucker (Angus Sampson) and Specs
            (Leigh Whannell), Elise's two </span></font><font data-dcnode-id="961" size="2"><span data-dcnode-id="962" instrument_node=""> goofy techy
            sidekicks</span></font></li><span data-dcnode-id="959" instrument_node="">
</span></ul><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="954"><font data-dcnode-id="955" size="2"><span data-dcnode-id="956" instrument_node="">Elise's immediate discovery
          was that otherworldly presences, including the blood red-faced, black-bodied
          Demon, and other spirits or ghosts were definitely
          in the house to pursue Dalton's spirit. She stated: "It's
          not the house that's haunted. It's your son." Dalton was astral-projecting
          himself (his spirit had left his physical body) when he traveled into
          a far-off dark world known as The Further. But on one of his out-of-body
          journeys to the far-off spiritual world, he had traveled too far and
          become lost. Elise said they must  get the son back before the disembodied
          and tortured spirits of the dead and other malevolent entities with
          an "insidious agenda" took over (or possessed) his physical body (an
          "empty vessel").</span></font></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="950"><font data-dcnode-id="951" size="2"><span data-dcnode-id="952" instrument_node="">During communications during a seance session in Dalton's
          bedroom, the group learned that the boy was being held (with no way
          to escape) by the fire-faced Demon spirit (who wished to "cause
          pain to others"). Dalton  repeatedly cried out: "Help me." The
          Demon possessed Dalton's body and used it to fight the group - the
          Long-Haired Fiend attacked Renai and licked at her. Elise grabbed the
          boy's hair and screamed out: "Leave this vessel," until the Demon departed.</span></font></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="946"><font data-dcnode-id="947" size="2"><span data-dcnode-id="948" instrument_node="">The next revelation was that Josh had experienced "night
          terrors" and "awful fits of pure fear" when he was eight years old.
         He had been terrorized, like his son, by an evil
        spirit - in the guise of an Old Woman (the one that opened the film).
         A series of photographs from his boyhood showed the Old Woman getting
         closer and closer to him. He was also
        a "gifted traveler" in his childhood with the ability to
        venture out of his physical body during a dream state. He had handed
        down astral-projection abilities to his son. It was recommended that
        Josh, the only one capable of rescuing Dalton's soul,  rediscover his
        lost abilities and enter "The
        Further." </span></font></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><font data-dcnode-id="943" size="2"><span data-dcnode-id="944" instrument_node="">Under
        hypnosis, Josh entered his two story house, where he came upon a number
        of 
        tormented spirits, including the Doll Girls (Kelly Devoto and Corbett
        Ruck) 
        and a Whistling Ghost Dad (Lary Crews). He retrieved
        Dalton from the Demon's lair (located behind a red door), where Dalton
        was found chained down, and the two awakened back in the 'real
        world' after successfully fleeing from the fork-tongued Demon and the
        Old Woman, who both had vanished.</span></font></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="938"><font data-dcnode-id="939" size="2"><span data-dcnode-id="940" instrument_node="">In the shocking conclusion, after Elise took a revealing
          photograph of Josh, he choked her to death (as he shouted: "You bitch!").
          In Elise's camera, Renai saw a picture of the creepy Old Woman. The
          surprise twist was that Josh had been possessed by the spirit himself
          - the Old Woman. 'Josh' reappeared and put his hand on his wife's shoulder,
          and ominously told her: "Renai, I'm right here."</span></font></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><font data-dcnode-id="935" size="2"><span data-dcnode-id="936" instrument_node="">After
        the end credits, the Old Woman blew out the candle she was holding, and
          the screen turned to black.</span></font></p></td><td data-dcnode-id="816" valign="top"><center data-dcnode-id="817"><span data-dcnode-id="931" instrument_node="">
</span><img alt="" data-dcnode-id="930" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious.jpg&amp;raw" width="160"><span data-dcnode-id="929" instrument_node=""> </span><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">
</span><font data-dcnode-id="925" size="2"><span data-dcnode-id="926" instrument_node="">Creepy Old Woman  (Philip Friedman)</span></font><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><img alt="" data-dcnode-id="922" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious2.jpg&amp;raw" width="160"><span data-dcnode-id="921" instrument_node=""> </span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span><font data-dcnode-id="917" size="2"><span data-dcnode-id="918" instrument_node="">Sleepwalking</span></font><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">
</span><img alt="" data-dcnode-id="914" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious3.jpg&amp;raw" width="160"><span data-dcnode-id="913" instrument_node=""> </span><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">
</span><font data-dcnode-id="909" size="2"><span data-dcnode-id="910" instrument_node="">Bloody Handprint </span></font><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">
</span><img alt="" data-dcnode-id="906" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious4.jpg&amp;raw" width="160"><span data-dcnode-id="905" instrument_node=""> </span><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">
</span><font data-dcnode-id="901" size="2"><span data-dcnode-id="902" instrument_node="">Long Haired Fiend (J. LaRose)          </span></font><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">
</span><img alt="" data-dcnode-id="898" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious6.jpg&amp;raw" width="160"><span data-dcnode-id="897" instrument_node=""> </span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">
</span><font data-dcnode-id="893" size="2"><span data-dcnode-id="894" instrument_node="">Renai (Rose Byrne)</span></font><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span><img alt="" data-dcnode-id="890" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/pics/insidious5.jpg&amp;raw" width="160"><span data-dcnode-id="889" instrument_node=""> </span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
</span><font data-dcnode-id="885" size="2"><span data-dcnode-id="886" instrument_node="">The Red and Black Lipstick-Faced Demon (Joseph Bishara)

        (1956)</span></strong></a></font></i></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="792"><img align="absmiddle" alt="" data-dcnode-id="797" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/images/keypoints.jpg&amp;raw" width="90"><span data-dcnode-id="796" instrument_node=""> </span><b data-dcnode-id="793"><font data-dcnode-id="794" size="2"><span data-dcnode-id="795" instrument_node="">Becky
              Was Shockingly Converted Into One of the Pod People When Dr. Bennell
              Left Her and She Fell Asleep; He Vainly Attempted to Warn Drivers
              of the Impending Threat; Miles Was Vindicated in an Added Epilogue </span></font></b></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="788"><font data-dcnode-id="789" size="2"><span data-dcnode-id="790" instrument_node="">This classic 
          science fiction film by director Don Siegel involved the fear of a
            small town doctor that many of his patients, friends and relatives
            were experiencing fearful paranoia and delusions that their acquaintances
            were imposters - and were possibly being replaced by doppelgangers.
            The film was an effective metaphor for the fear of Communist infiltration
            during the Cold War 1950s. </span></font></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><font data-dcnode-id="785" size="2"><span data-dcnode-id="786" instrument_node="">The main characters, living in the small town of Santa
            Mira, were eventually the only two remaining non-pod people: </span></font></p><span data-dcnode-id="783" instrument_node="">
</span><ul data-dcnode-id="773"><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="779"><font data-dcnode-id="780" size="2"><span data-dcnode-id="781" instrument_node=""> Dr. Miles Bennell
            (Kevin McCarthy), a physician</span></font></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="775"><font data-dcnode-id="776" size="2"><span data-dcnode-id="777" instrument_node="">Becky (Dana
            Wynter), his sweetheart fiancee </span></font></li><span data-dcnode-id="774" instrument_node="">
</span></ul><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="769"><font data-dcnode-id="770" size="2"><span data-dcnode-id="771" instrument_node="">In their flight from the town's pod people, the two
            were compelled to hide under the floorboards in a dark, deserted
            cave or tunnel. When Miles left the fainting Becky to discover the
            source of beautiful music for a few moments, Becky briefly fell asleep.
            After he returned to the mine, he found her fatigued and started
            to carry her.</span></font></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="765"><font data-dcnode-id="766" size="2"><span data-dcnode-id="767" instrument_node=""> And then in the film's
          most memorable and frightening moment, he took her in his arms to
          kiss her, and then drew away from her unresponsive lips. In a tight
          closeup shot of her face, he looked into the blank, dark, expressionless
          and staring eyes of his fiancée, 
          realizing with a look of utter fright, shock, and fear that she was
          now  one of "them" - her body had been invaded and snatched
          by the clones. He knew instantly that this was not Becky, his sweetheart
          of a moment ago, but a treacherous imposter and victim. She confirmed
          the truth, and 
          traitorously screamed to the pod-people searchers:</span></font></p><span data-dcnode-id="764" instrument_node="">
</span><blockquote data-dcnode-id="746"><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="748"><font data-dcnode-id="749" size="2"><span data-dcnode-id="762" instrument_node="">Becky:  "I went to sleep Miles, and it happened."</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
            Miles (unbelieving): "Oh, Becky."
                </span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
                Becky: 
            "They
          were right." </span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
              Miles: 
             "I should never have left you." </span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
             Becky: 
            "Stop
            acting like a fool, Miles, and accept us."</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
            Miles: "No. Never!"</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">
            Becky: "He's 
            in here. He's in here. Get him. Get him."</span></font></p><span data-dcnode-id="747" instrument_node="">
</span></blockquote><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="742"><font data-dcnode-id="743" size="2"><span data-dcnode-id="744" instrument_node="">Horrified that he was now completely alone, Miles helplessly
            rushed in panic from the tunnel. He spoke, in voice-over:</span></font></p><span data-dcnode-id="741" instrument_node="">
</span><blockquote data-dcnode-id="735"><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="737"><font data-dcnode-id="738" size="2"><span data-dcnode-id="739" instrument_node="">I've been afraid a lot of times in my life but I
              didn't know the real meaning of fear until, until I had kissed
              Becky. A moment's sleep, and the girl I loved was an inhuman enemy
              bent on my destruction. That moment's sleep was death to Becky's
              soul just as it had been for Jack and Teddy and Dan Kauffman and
              all the rest. Their bodies were now hosts harboring an alien form
              of life, a cosmic form which, to survive, must take over every
              human man. So I ran, I ran. I ran as little Jimmy Grimaldi had
              run the other day. My only hope was to get away from Santa Mira,
               to get to the highway to warn the others of what was happening. </span></font></p><span data-dcnode-id="736" instrument_node="">
</span></blockquote><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731"><font data-dcnode-id="732" size="2"><span data-dcnode-id="733" instrument_node="">He  clambered up the hills to a busy
          highway, where he attempted to flag down cars, and convince passing
          drivers to help him and believe his story. Crazed
          with fear, he rushed into the onrushing traffic, nervously shouting
          and crying words of warning to the unheeding cars and unconvinced
          drivers. Miles climbed onto the back of a passing truck with 
          the names of cities on it, horrified to find it loaded with pods to
            be distributed and spread throughout the nation. He dropped off,
            jumping back on the highway - feeling completely helpless. As a crazed
            prophet of doom, he looked directly into the camera, desperately
            trying to warn others and the audience:</span></font></p><span data-dcnode-id="730" instrument_node="">
</span><blockquote data-dcnode-id="724"><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="726"><font data-dcnode-id="727" size="2"><span data-dcnode-id="728" instrument_node="">Help, help, wait. Help! Help! Wait!             
               Wait! Wait! Stop! Stop and listen to me! Listen to me!...Those
              people that are coming after me! They're not human! Listen to me!
              We're in danger!... They're after all of us! 
               All of us!....Listen to me! There isn't a human being left in
              Santa Mira!... Stop! Pull over to the side of the road! I need
              your help! Something terrible's happened!...Look, you fools. You're
              in danger. Can't you see? They're after you. They're after all
              of us. Our wives, our children, everyone. They're here already.
              YOU'RE NEXT!</span></font></p><span data-dcnode-id="725" instrument_node="">
</span></blockquote><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><font data-dcnode-id="721" size="2"><span data-dcnode-id="722" instrument_node="">In an added epilogue, the distraught
            and raving mad Miles was relating his fantastic nightmarish tale
            in a hospital. The doctors commented that he was a lunatic and as "mad
            as a March hare." As the doctors left the office, another accident
            victim from a wreck was brought in by ambulance. One of the doctors
            explained how there was a collision between a Greyhound bus and a
            truck, and how the truck driver had to be dug out from under a peculiar
            pile of "great big seed pods" from a truck coming out of
        Santa Mira. </span></font></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="716"><font data-dcnode-id="717" size="2"><span data-dcnode-id="718" instrument_node="">Verifying and confirming Miles' story,
          the police started to take control of the invading aliens by blocking
          highways, and the FBI and law enforcement agencies were notified of
            the emergency. An all-points alarm was sounded and Miles was finally
        vindicated and relieved that someone had finally believed him.</span></font></p></td><td data-dcnode-id="671" valign="top"><center data-dcnode-id="672"><span data-dcnode-id="713" instrument_node="">

            of court in 2006) claiming that the DreamWorks/Warner Bros. production
            was an unauthorized, cloned, scene-by-scene remake. It also combined
            elements of </span><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">THX 1138 (1971)</span></i><span data-dcnode-id="567" instrument_node="">, </span><i data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Logan's Run (1976)</span></i><span data-dcnode-id="564" instrument_node="">, and </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filmsite.org/blad.html"><i data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Blade
        Runner (1982).</span></i></a></font></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="555"><font data-dcnode-id="556" size="2"><span data-dcnode-id="557" instrument_node="">In the story, survivors of a massive, toxic global
            contamination lived in a highly-controlled and monitored, self-contained
            and isolated utopian environment in the post-apocalyptic world of
            2019. All of the residents in the remote community believed that
            the 'outer' world was contaminated. They were told that specially-selected
            individuals would be chosen:</span></font></p><span data-dcnode-id="554" instrument_node="">
</span><blockquote data-dcnode-id="548"><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="550"><font data-dcnode-id="551" size="2"><span data-dcnode-id="552" instrument_node="">You're special. You have a very special purpose in life. You've been
            chosen. The Island awaits you.</span></font></p><span data-dcnode-id="549" instrument_node="">
</span></blockquote><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="544"><font data-dcnode-id="545" size="2"><span data-dcnode-id="546" instrument_node="">The way to escape was
          by winning the Lottery - the prize being transport  to "The
          Island" 
          - the only remaining uncontaminated, pristine paradisiacal land area
          left in the world free of a pathogen. Lucky ones, such as the latest
          winner Starkweather Two Delta (Michael Clarke Duncan), were ecstatic
          about their winning future: "To go out and breathe fresh air, swim
          in the ocean. I can't believe I won. Call me Mr. Popular."</span></font></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="537"><font data-dcnode-id="538" size="2"><span data-dcnode-id="542" instrument_node="">In short, however, there was </span><i data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">no</span></i><span data-dcnode-id="539" instrument_node=""> Island. The
            entire operation was kept top-secret by 'godlike' sinister Dr. Merrick
            (Sean Bean), the unethical owner of the cloning, bio-engineering
            corporation, who was profiting billions of dollars by harvesting
            'agnates' - human clones. Visiting, rich potential clients were promised
            a lifespan of 60-70 years longer than normal: </span></font></p><span data-dcnode-id="536" instrument_node="">
</span><blockquote data-dcnode-id="530"><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="532"><font data-dcnode-id="533" size="2"><span data-dcnode-id="534" instrument_node="">The human organism. Unique in all the universe in
              its complexity. The product of three billion years of evolution.
              Perfect in every way, except one. Like all machines, it wears out.
              For centuries, the idea of replenishing the human body has been
              at the forefront of science...And, in compliance with the Eugenics
              laws of 2015, all our agnates are maintained in a persistent vegetative
              state. They never achieve consciousness. They never think or suffer
              or feel pain, joy, love, hate. It's a product, ladies and gentlemen,
              in every way that matters, not human.</span></font></p><span data-dcnode-id="531" instrument_node="">
</span></blockquote><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="526"><font data-dcnode-id="527" size="2"><span data-dcnode-id="528" instrument_node="">However, a lie was told to those wealthy individuals
            who purchased copies of themselves that the clones (or "products")
            were only in a "persistent vegetative state" (or not human),
            so any harvesting process was considered non-lethal.</span></font></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="522"><font data-dcnode-id="523" size="2"><span data-dcnode-id="524" instrument_node=""> Lincoln Six-Echo (Ewan McGregor), who
            was suffering nightmares and erratic sleep cycles, was skeptical
            when his best friend Jordan Two-Delta (Scarlett Johansson) was the
            next lottery winner. After Lincoln's simple
            discovery of a flying winged insect from outside, seeking light 
            in the top of a ventilation shaft  in an off-limits
            power facility, he began to think that much of his environment and
            what he had been told was questionable. The moth should have been
            killed by the pathogen in the outside world. He caught the moth and
            kept it in a glass vase by his bed. And Lincoln then witnessed two
            examples of clone products being given to customers. He saw Starkweather
            make a futile and desperate attempt to escape from organ surgery
            for a liver transplant.
            </span></font></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="518"><font data-dcnode-id="519" size="2"><span data-dcnode-id="520" instrument_node="">Lincoln and Jordan realized
            that the lottery "winners" were used as surrogates
            for replacement or spare parts, organs, genes, and even wombs for
        their wealthy sponsors as insurance policies - when needed. The
        two fled to the 'real world' (a barren and rocky desert area near Yuma,
        Arizona) where they learned that they were actually clones for two sponsors:</span></font></p><span data-dcnode-id="517" instrument_node="">

</span><p data-dcnode-id="438"><font data-dcnode-id="439" size="2"><span data-dcnode-id="440" instrument_node="">Jordan
          was needed for transplant surgery, because her sponsor Sarah Jordan,

            winner.'</span></font></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434"><font data-dcnode-id="435" size="2"><span data-dcnode-id="436" instrument_node="">To retrieve his two runaway 'clones,'
            Merrick hired mercenary Albert Laurent (Djimon Hounsou) to find and
            return them unharmed to the compound. During the pursuit, Lincoln
            tricked Laurent into killing his sponsor Tom Lincoln, which allowed
            Lincoln to assume Tom's identity. Tom/Lincoln (and Jordan) sought
            to return to the isolated facility and liberate all of the other
            clones, which they successfully accomplished, with help from Laurent.
            Tom/Lincoln fought hand-to-hand with cloning technology
            mastermind Merrick, who died 
            when hanged by a harpoon cable around his neck. With the destruction
            of the  holographic reactor chamber, the illusory holograms disappeared
            and natural sunlight flooded in. The white-clad 'agnates' ran from
            the underground bunker into the fresh desert air. </span></font></p><span data-dcnode-id="433" instrument_node="">
