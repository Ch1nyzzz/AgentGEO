</span><h1 data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">
              70+ Plot Twist Ideas and Examples Guaranteed to Blow Your Mind Away
            </span></h1><span data-dcnode-id="1815" instrument_node="">
</span></div><span data-dcnode-id="1813" instrument_node="">
</span><div class="article-post" data-dcnode-id="993"><span data-dcnode-id="1812" instrument_node="">
</span><div class="article wordpress" data-dcnode-id="998"><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">As R.L. Stine once said, “Every story ever told can be broken down into three parts. The beginning. The middle. And the plot twist.”</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1807" instrument_node="">The legendary plot twist is a staple in almost every genre and medium of storytelling — one that’s fun to read but hard to write. To help you become a veritable </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpHGXwQeUk7M" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1806" instrument_node="">Chubby Checker</span></a><span data-dcnode-id="1804" instrument_node="">, here's a definitive resource that's all about the art of the twist.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><h2 data-dcnode-id="1800" id="what_is_a_plot_twist_"><span data-dcnode-id="1801" instrument_node="">What is a plot twist?</span></h2><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1788"><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">A plot twist is a story development that readers do not expect in which either something shocking happens </span></strong><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">or </span></strong><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">something shocking is revealed. </span></strong><span data-dcnode-id="1792" instrument_node="">Generally, the storyteller will set up expectations and then "twist" those expectations by revealing new information </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/plot-point/"><span data-dcnode-id="1791" instrument_node="">through subsequent plot points</span></a><span data-dcnode-id="1789" instrument_node="">.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">The criteria for a plot twist tends to be made up of the following:</span></p><span data-dcnode-id="1784" instrument_node="">
</span><ol data-dcnode-id="1761"><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">It </span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">must</span></em><span data-dcnode-id="1779" instrument_node=""> be narratively sound,</span></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">It </span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">must</span></em><span data-dcnode-id="1773" instrument_node=""> be unexpected, and</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1770" instrument_node="">It </span><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">might</span></em><span data-dcnode-id="1767" instrument_node=""> be </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/what-is-foreshadowing/"><span data-dcnode-id="1766" instrument_node="">foreshadowed</span></a><span data-dcnode-id="1764" instrument_node="">.</span></li><span data-dcnode-id="1762" instrument_node="">
</span></ol><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">To no-one’s surprise, plot twists are particularly prevalent in mysteries, thrillers, and </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/what-is-suspense/"><span data-dcnode-id="1758" instrument_node="">suspense fiction</span></a><span data-dcnode-id="1756" instrument_node="">. However, the twist takes no prisoners and has reared its head in almost every genre out there, which brings us to…</span></p><span data-dcnode-id="1754" instrument_node="">
</span><div class="typeform panel panel-yellow-bordered" data-dcnode-id="1737"><span data-dcnode-id="1753" instrument_node="">
</span><div class="panel-body text-center" data-dcnode-id="1739"><span data-dcnode-id="1752" instrument_node="">
</span><p class="mimic-h1 space-bottom-xs-sm" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">
      🖊️
    </span></p><span data-dcnode-id="1749" instrument_node="">
</span><h3 data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">
      Which contemporary author are you?
    </span></h3><span data-dcnode-id="1746" instrument_node="">
</span><p class="large space-top-xs-xs space-bottom-xs-md" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">
      Find out which of today's greats is your writerly match. Takes one minute!
    </span></p><span data-dcnode-id="1743" instrument_node="">
</span><button class="typeform-start-quiz btn-yellow box-shadow" data-dcnode-id="1741" data-url="https://reedsy.typeform.com/to/aF44hi"><span data-dcnode-id="1742" instrument_node="">
      Start quiz
    </span></button><span data-dcnode-id="1740" instrument_node="">
</span></div><span data-dcnode-id="1738" instrument_node="">
</span></div><span data-dcnode-id="1736" instrument_node="">
</span><h2 data-dcnode-id="1734" id="50__plot_twist_ideas_in_pop_culture"><span data-dcnode-id="1735" instrument_node="">50+ plot twist ideas in pop culture</span></h2><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">If you seek inspiration for crafting your own twists, there’s no better place to start than with some of the most popular unexpected plot-turns in film and literature. But be warned: there be spoilers ahead. With that in mind, here are over 50 examples of plot twists in film and literature.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><blockquote data-dcnode-id="1719"><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1728" instrument_node="">Want to read some of the best, most twisted thrillers and suspense books out there? Check out these </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-suspense-books"><span data-dcnode-id="1727" instrument_node="">50 best suspense books of all time</span></a><span data-dcnode-id="1725" instrument_node="">, or our list of&nbsp;</span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/psychological-thrillers"><span data-dcnode-id="1724" instrument_node="">23 psychological thrillers that will make your head spin</span></a><span data-dcnode-id="1722" instrument_node="">.</span></p><span data-dcnode-id="1720" instrument_node="">
</span></blockquote><span data-dcnode-id="1718" instrument_node="">
</span><h3 data-dcnode-id="1716" id="i_am_your_father"><span data-dcnode-id="1717" instrument_node="">I Am Your Father</span></h3><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Mum’s the word when it comes to family secrets, right? Not so fast. This is the plot twist that concerns a revelation about the key character’s family. It could be that there is a surprising reveal regarding parentage — or perhaps it’s uncovered that the protagonist was an orphan all along.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Made legendary by Star Wars, this type of plot twist is nevertheless widespread in all genres and mediums, as there’s no drama quite like family drama. As George Carlin once said: “The other night I ate at a real nice family restaurant. Every table had an argument going.”’</span></p><span data-dcnode-id="1709" instrument_node="">
</span><ol data-dcnode-id="1686"><span data-dcnode-id="1708" instrument_node="">
</span><li data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">
</span><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Star Wars: The Empire Strikes Back. </span></strong><span data-dcnode-id="1704" instrument_node="">In a pivotal battle, Luke discovers that Darth Vader, his ultimate nemesis, is actually his father.</span></li><span data-dcnode-id="1702" instrument_node="">
</span><li data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node="">
</span><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Angels &amp; Demons. </span></strong><span data-dcnode-id="1698" instrument_node="">Robert Langdon is shocked by the revelation that the late pope’s aide is actually His Holyness’s’s son — conceived through artificial insemination.</span></li><span data-dcnode-id="1696" instrument_node="">
</span><li data-dcnode-id="1688"><span data-dcnode-id="1695" instrument_node="">
</span><strong data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Shutter Island. </span></strong><span data-dcnode-id="1692" instrument_node="">During an investigation of a disappearance from a remote asylum, U.S. Marshal Edward “Teddy” Daniels </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DukkIe8fxrN8" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1691" instrument_node="">realizes that he himself is the missing patient</span></a><span data-dcnode-id="1689" instrument_node=""> — and the husband and murderer of the woman that he had been trying to locate.</span></li><span data-dcnode-id="1687" instrument_node="">
</span></ol><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1682"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1681" instrument_node="">
</span><ol data-dcnode-id="1661" start="4"><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">
</span><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The Man From Earth. </span></strong><span data-dcnode-id="1676" instrument_node="">Right before he dies from a heart attack, Will learns that the unaging Professor John Oldman is actually his father.</span></li><span data-dcnode-id="1674" instrument_node="">
</span><li data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node="">
</span><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Oldboy. </span></strong><span data-dcnode-id="1670" instrument_node="">&nbsp;Mysteriously imprisoned for 15 years, Oh Dae-su falls in love with a young restaurant chef who is later revealed to be his daughter.</span></li><span data-dcnode-id="1668" instrument_node="">
</span><li data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">
</span><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">The Kite Runner. </span></strong><span data-dcnode-id="1664" instrument_node="">Amir has mixed feelings when he discovers that his closest childhood friend, Hassan, is his half-brother.</span></li><span data-dcnode-id="1662" instrument_node="">
</span></ol><span data-dcnode-id="1660" instrument_node="">
</span><figure data-dcnode-id="1652" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/09/3f8ae6c4dc4eeeee51dce8a891e4c1a6-1-1.jpg" data-dcnode-id="1659" itemprop="contentUrl"><span data-dcnode-id="1658" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1657" data-src="https://blog-cdn.reedsy.com/uploads/2018/09/3f8ae6c4dc4eeeee51dce8a891e4c1a6-1-1.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/09/3f8ae6c4dc4eeeee51dce8a891e4c1a6-1-1.jpg&amp;raw"><span data-dcnode-id="1656" instrument_node="">
</span><figcaption data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Luke Skywalker and Darth Vader in The Empire Strikes Back (1980). Image: Disney</span></figcaption><span data-dcnode-id="1653" instrument_node="">
</span></figure><span data-dcnode-id="1651" instrument_node="">
</span><h3 data-dcnode-id="1648" id="it_was_me_all_along"><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">It Was Me All Along</span></strong></h3><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">In which protagonists’ worst enemies is actually themselves. This plot twist turns the magnifying glass inward to reveal that there was something off about the main character all along. It’s one of the oldest tricks in the book — and when executed expertly, it can blow people’s minds away!</span></p><span data-dcnode-id="1644" instrument_node="">
</span><ol data-dcnode-id="1624" start="7"><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1642" instrument_node="">
</span><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Fight Club.</span></strong><span data-dcnode-id="1639" instrument_node=""> The narrator of the movie meets Tyler Durden, a soap salesman, and together they start a local “Fight Club.” In time, he realizes that he himself is Tyler Durden.</span></li><span data-dcnode-id="1637" instrument_node="">
</span><li data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">
</span><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Gone Girl.</span></strong><span data-dcnode-id="1633" instrument_node=""> Amy Dunne is revealed to be alive — and also the mastermind behind the framing of her husband, Nick Dunne, for her own “death.”</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1630" instrument_node="">
</span><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">The Murder of Roger Ackroyd.</span></strong><span data-dcnode-id="1627" instrument_node=""> Dr. James Sheppard, the first-person narrator of the novel, comes out as the murderer in the case that Hercule Poirot had been investigating.</span></li><span data-dcnode-id="1625" instrument_node="">
</span></ol><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1620"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1619" instrument_node="">
</span><ol data-dcnode-id="1602" start="10"><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">
</span><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">The Usual Suspects.</span></strong><span data-dcnode-id="1614" instrument_node=""> Roger “Verbal” Kint, a small-time con man, is interrogated by the police who hope to hunt down the mob boss Keyser Söze. A fax later confirms too late that Kint is Söze himself.</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1604"><span data-dcnode-id="1611" instrument_node="">
</span><strong data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Orphan Black.</span></strong><span data-dcnode-id="1608" instrument_node=""> Sarah Manning is right to be confused when she spies a girl who looks just like her by the train: she is just </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DDsTc_o5ixU8" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1607" instrument_node="">one of hundreds of clones.</span></a><span data-dcnode-id="1605" instrument_node="">
</span></li><span data-dcnode-id="1603" instrument_node="">
</span></ol><span data-dcnode-id="1601" instrument_node="">
</span><h3 data-dcnode-id="1599" id="will_the_real_evil_guy_please_stand_up_"><span data-dcnode-id="1600" instrument_node="">Will The Real Evil Guy Please Stand Up?</span></h3><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1597" instrument_node="">In which the reveal of the villain (</span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/anti-villain/"><span data-dcnode-id="1596" instrument_node="">or anti-villain</span></a><span data-dcnode-id="1594" instrument_node="">) is a surprise to audiences. Maybe they’re a minor character or someone entirely unexpected (such as a close friend or relative of the protagonist).</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">Generally, this plot twist requires some amount of foreshadowing, so as to trigger an </span><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">“Oh, I should’ve known”</span></em><span data-dcnode-id="1588" instrument_node=""> reaction from audiences.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><ol data-dcnode-id="1563" start="12"><span data-dcnode-id="1585" instrument_node="">
</span><li data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">
</span><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Harry Potter and the Goblet of Fire.</span></strong><span data-dcnode-id="1581" instrument_node=""> Harry battles through three perilous stages of the Triwizard Tournament to find that the real villain has been under his nose throughout the entire novel: Barty Crouch, Jr. in disguise as Harry’s mentor, Alastor “Mad-Eye” Moody.</span></li><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1571"><span data-dcnode-id="1578" instrument_node="">
</span><strong data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Psycho.</span></strong><span data-dcnode-id="1575" instrument_node=""> In a turn of events, the person who kills Marion Crane in the shower at Bates Motel is not the overbearing Mrs Bates — rather, her son Norman, who has been </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DxWHYmNrAFlI" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1574" instrument_node="">masquerading as his dead mother this whole time.</span></a><span data-dcnode-id="1572" instrument_node="">
</span></li><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">
</span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Frozen.</span></strong><span data-dcnode-id="1566" instrument_node=""> An eternal snowstorm unveils the actual antagonist in the story: Prince Hans of the Southern Isles, youngest of thirteen sons and one of Anna’s suitors.</span></li><span data-dcnode-id="1564" instrument_node="">
</span></ol><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1559"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1558" instrument_node="">
</span><ol data-dcnode-id="1544" start="15"><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">
</span><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Sherlock. </span></strong><span data-dcnode-id="1553" instrument_node=""> Even Sherlock isn’t able to identify Jim Moriarty, a minor character who disguises himself as Molly Hooper’s gay boyfriend, as his greatest nemesis until it’s too late.</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">
</span><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Iron Man.</span></strong><span data-dcnode-id="1547" instrument_node=""> Tony Stark discovers that the man who wants him killed is his old friend and mentor, Obadiah Stone.</span></li><span data-dcnode-id="1545" instrument_node="">
</span></ol><span data-dcnode-id="1543" instrument_node="">
</span><h3 data-dcnode-id="1541" id="love_the_way_you_lie"><span data-dcnode-id="1542" instrument_node="">Love The Way You Lie</span></h3><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1539" instrument_node="">In which it’s revealed that the </span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/unreliable-narrator/"><span data-dcnode-id="1538" instrument_node="">narrator has been unreliable</span></a><span data-dcnode-id="1536" instrument_node=""> all along — either due to pure subjectivity or their selfish wish to misrepresent the facts.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Because of the nature of this type of plot twist, it is almost always told by a first-person narrator.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><ol data-dcnode-id="1511" start="17"><span data-dcnode-id="1530" instrument_node="">
</span><li data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node="">
</span><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">We Are All Completely Beside Ourselves.</span></strong><span data-dcnode-id="1526" instrument_node=""> Rosemary Cooke starts her story in the middle to disguise the fact that her missing sister is actually a chimpanzee.</span></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node="">
</span><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Atonement.</span></strong><span data-dcnode-id="1520" instrument_node=""> Not until the postscript is it revealed that Briony Tallis had fabricated the previous sections of her story to give Robbie Turner and Cecilia Tallis the happy ending that they never got because of her.</span></li><span data-dcnode-id="1518" instrument_node="">
</span><li data-dcnode-id="1513"><span data-dcnode-id="1517" instrument_node="">
</span><strong data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Life of Pi.</span></strong><span data-dcnode-id="1514" instrument_node=""> Pi Patel tells a story about cannibalization and survival on the open sea that may or may not be about zoo animals.</span></li><span data-dcnode-id="1512" instrument_node="">
</span></ol><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1507"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1506" instrument_node="">
</span><ol data-dcnode-id="1492" start="20"><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">
</span><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Never Let Me Go. </span></strong><span data-dcnode-id="1501" instrument_node=""> Kathy, the narrator, holds back the truth that she and all of her classmates at Hailsham are actually clones who are raised to have their organs harvested.</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">
</span><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Fingersmith.</span></strong><span data-dcnode-id="1495" instrument_node=""> Sue Trinder sets out to swindle Maud Lilly’s fortune — only to fall in love with her and face an uncomfortable truth.</span></li><span data-dcnode-id="1493" instrument_node="">
</span></ol><span data-dcnode-id="1491" instrument_node="">
</span><figure data-dcnode-id="1483" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/09/Atonement-012.jpg" data-dcnode-id="1490" itemprop="contentUrl"><span data-dcnode-id="1489" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1488" data-src="https://blog-cdn.reedsy.com/uploads/2018/09/Atonement-012.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2018/09/Atonement-012.jpg&amp;raw"><span data-dcnode-id="1487" instrument_node="">
</span><figcaption data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Saoirse Ronan as Briony Tallis in Atonement (2007). Image: Focus Features</span></figcaption><span data-dcnode-id="1484" instrument_node="">
</span></figure><span data-dcnode-id="1482" instrument_node="">
</span><h3 data-dcnode-id="1480" id="nice_job_breaking_it__hero_"><span data-dcnode-id="1481" instrument_node="">Nice Job Breaking It, Hero!</span></h3><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The hero’s successfully solved the riddle or problem. Great. Time to pop open the champagne, right?</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1475" instrument_node="">Not quite. Sometimes the hero’s actions make the situation even worse than before. We borrowed this headline from the site </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1474" instrument_node="">TV Tropes</span></a><span data-dcnode-id="1472" instrument_node=""> because it fits this plot twist perfectly: the hero accidentally breaks the world. Perhaps they </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-post-apocalyptic-books"><span data-dcnode-id="1471" instrument_node="">trigger an apocalypse</span></a><span data-dcnode-id="1469" instrument_node=""> or maybe the antidote that the hero acquires is actually poison. Either way, it’s something that the hero must now fix — or else.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><ol data-dcnode-id="1447" start="22"><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">
</span><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The Incredibles.</span></strong><span data-dcnode-id="1462" instrument_node=""> Mr. Incredible helps a mysterious benefactor destroy a violent robot only to discover that his actions have actually helped the evil Syndrome develop the perfect killing machine.</span></li><span data-dcnode-id="1460" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1459" instrument_node="">
</span><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Ender’s Game.</span></strong><span data-dcnode-id="1456" instrument_node=""> 10-year old Andrew “Ender” Wiggin fulfills his war training by leading simulated wars against an alien race — only to realize that the “simulations” were actual battles and he’s unwittingly committed genocide.</span></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">
</span><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Zootopia.</span></strong><span data-dcnode-id="1450" instrument_node=""> Judy Hopps, police officer extraordinaire, successfully locates Zootopia’s missing predators — which immediately cases a public frenzy of fear, hate, and discrimination.</span></li><span data-dcnode-id="1448" instrument_node="">
</span></ol><span data-dcnode-id="1446" instrument_node="">
</span><div class="click-to-tweet panel panel-thin" data-dcnode-id="1428"><span data-dcnode-id="1445" instrument_node="">
</span><div class="panel-body" data-dcnode-id="1430"><span data-dcnode-id="1444" instrument_node="">
</span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DRe-discover%2520all%2520of%2520your%2520favorite%2520plot%2520twists%2520%28and%2520more%29%2520in%2520this%2520post%26via%3DReedsyHQ%26url%3Dhttps%3A//blog.reedsy.com/plot-twist-ideas-examples/" target="_blank"><span data-dcnode-id="1443" instrument_node="">Re-discover all of your favorite plot twists (and more) in this post
      </span><div class="small grid gutter-xs-sm space-top-xs-sm" data-dcnode-id="1434" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="1442" instrument_node="">
</span><meta content="https://blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg" data-dcnode-id="1441" itemprop="contentUrl"><span data-dcnode-id="1440" instrument_node="">
</span><img alt="icon-twitter" class="lazyloaded" data-dcnode-id="1439" data-src="https://blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg&amp;raw" width="24"><span data-dcnode-id="1438" instrument_node="">
</span><b data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Click to tweet!</span></b><span data-dcnode-id="1435" instrument_node="">
</span></div><span data-dcnode-id="1433" instrument_node="">
</span></a><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span></div><span data-dcnode-id="1427" instrument_node="">
</span><h3 data-dcnode-id="1425" id="oh_crap__that_wasn_t_the_actual_final_boss"><span data-dcnode-id="1426" instrument_node="">Oh Crap, That Wasn’t The Actual Final Boss</span></h3><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">Congratulations, hero! You’ve figured out the identity of your nemesis, gone to extreme lengths to hunt them down, engaged in ferocious battle with them </span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">and</span></em><span data-dcnode-id="1420" instrument_node=""> emerged victorious from it — only to discover that they weren’t actually your final boss. There’s someone (or something) bigger and badder behind the scenes, controlling the strings of the marionette. Oopsie.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><ol data-dcnode-id="1398" start="25"><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">
</span><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Batman Begins.</span></strong><span data-dcnode-id="1413" instrument_node=""> Bruce Wayne has subdued The Scarecrow when Henri Ducard, Bruce’s old mentor, shows up and reveals that he is Ra’s al Ghul.</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">
</span><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Iron Man 3.</span></strong><span data-dcnode-id="1407" instrument_node=""> Tony Stark is thrown for a loop when he discovers that the Mandarin is really a bad English actor named Trevor Slattery who has been hired by Aldrich Killian to act as a decoy.</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">
</span><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Howl’s Moving Castle.</span></strong><span data-dcnode-id="1401" instrument_node=""> Howl and Sophie manage to kill the Witch of the Waste — only to discover that the Witch’s fire demon, Miss Angorian, was the real villain all along.</span></li><span data-dcnode-id="1399" instrument_node="">
</span></ol><span data-dcnode-id="1397" instrument_node="">
</span><h3 data-dcnode-id="1395" id="i_dreamed_a_dream_that_this_dream_was_fake"><span data-dcnode-id="1396" instrument_node="">I Dreamed A Dream That This Dream Was Fake</span></h3><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">This is the one in which the entire story turns out to be all a dream — and it’s so well-known that its appearance at the end of a story is almost a punchline these days. That said, authors and filmmakers still continue to find new ways to re-invent this twist today.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><ol data-dcnode-id="1374" start="28"><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node="">
</span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Twilight Zone, “The Midnight Sun.”</span></strong><span data-dcnode-id="1386" instrument_node=""> The last moments reveal that the predicament of the Earth falling into the sun was entirely Norma’s fever dream: the Earth is </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DZfFCTXdiZUQ" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1385" instrument_node="">actually moving away from the sun</span></a><span data-dcnode-id="1383" instrument_node="">, which means that the world is freezing to death.</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">
</span><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Inception.</span></strong><span data-dcnode-id="1377" instrument_node=""> A still-spinning top at the end of the film hints that Dominick “Dom” Cobb may or may not still be stuck in an eternal dream.</span></li><span data-dcnode-id="1375" instrument_node="">
</span></ol><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1370"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1369" instrument_node="">
</span><ol data-dcnode-id="1355" start="30"><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">
</span><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">A Beautiful Mind.</span></strong><span data-dcnode-id="1364" instrument_node=""> A brilliant mathematician suffering from schizophrenia is shown to have been hallucinating friends, enemies, and moments the entire time.</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">
</span><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Jacob’s Ladder.</span></strong><span data-dcnode-id="1358" instrument_node=""> The ordeals of Jacob Singer, a war veteran of Vietnam who is being haunted by frightening visions and fragmented fantasies, give way to the reveal that Jacob died in Vietnam and it was all a dream.</span></li><span data-dcnode-id="1356" instrument_node="">
</span></ol><span data-dcnode-id="1354" instrument_node="">
</span><h3 data-dcnode-id="1352" id="must_pretend_harder_to_look_alive"><span data-dcnode-id="1353" instrument_node="">Must Pretend Harder to Look Alive</span></h3><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">If it quacks like a duck, looks like a duck, and swims like a duck, then it’s probably a duck… except in stories. We're talking about the ones in which we realize (perhaps too late) that a character has been dead along!</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1347" instrument_node="">As you might expect, this plot twist shows up most often in the genres of&nbsp;</span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-sci-fi-books"><span data-dcnode-id="1346" instrument_node="">science fiction</span></a><span data-dcnode-id="1344" instrument_node="">, </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/best-horror-books"><span data-dcnode-id="1343" instrument_node="">horror</span></a><span data-dcnode-id="1341" instrument_node="">, and sometimes&nbsp;</span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/discovery/blog/cosmic-horror"><span data-dcnode-id="1340" instrument_node="">cosmic horror</span></a><span data-dcnode-id="1338" instrument_node=""> (which blends the two). However, it will sometimes make its way into the mainstream, with M. Night Shyamalan’s</span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node=""> The Sixth Sense </span></em><span data-dcnode-id="1335" instrument_node="">being a prime example.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><ol data-dcnode-id="1310" start="32"><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">
</span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">The Others.</span></strong><span data-dcnode-id="1328" instrument_node=""> When a family appears at Grace Stewart’s house one day, she thinks that her house has been overrun — but soon comes to the epiphany that she and her children are dead and that they are the actual spirits haunting the house.</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node="">
</span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The Sixth Sense.</span></strong><span data-dcnode-id="1322" instrument_node=""> Child psychologist Malcolm Crowe begins working with a boy who claims that he can see ghosts. It’s not until the final act that he realizes that he himself is a ghost.</span></li><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1319" instrument_node="">
</span><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">The Twilight Zone, “The Hitch-Hiker.”</span></strong><span data-dcnode-id="1316" instrument_node=""> A young woman driving cross-country across America </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D_AWIxpbrx-w" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1315" instrument_node="">keeps encountering a man at the side of road</span></a><span data-dcnode-id="1313" instrument_node="">. Only when she calls for help does realizes that she was killed in a car accident days ago — and the hitch-hiker who says gently, "I belileve you're going my way," is Death.</span></li><span data-dcnode-id="1311" instrument_node="">
</span></ol><span data-dcnode-id="1309" instrument_node="">
</span><figure data-dcnode-id="1298" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2018/09/CBS_TWILIGHT_ZONE_016_IMAGE_CIAN_1280x720_1202657859722.jpg" data-dcnode-id="1308" itemprop="contentUrl"><span data-dcnode-id="1307" instrument_node="">
</span><img alt="" class="lazyload" data-dcnode-id="1306" data-src="https://blog-cdn.reedsy.com/uploads/2018/09/CBS_TWILIGHT_ZONE_016_IMAGE_CIAN_1280x720_1202657859722.jpg"><span data-dcnode-id="1305" instrument_node="">
</span><figcaption data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node="">Inger Stevens as Nan Adams in&nbsp;episode sixteen of&nbsp;</span><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Twilight Zone</span></em><span data-dcnode-id="1301" instrument_node="">,&nbsp;"The Hitch-hiker" (1960). Image: CBS Productions</span></figcaption><span data-dcnode-id="1299" instrument_node="">
</span></figure><span data-dcnode-id="1297" instrument_node="">
</span><h3 data-dcnode-id="1295" id="not_too_dead_to_ruin_everyone_s_day"><span data-dcnode-id="1296" instrument_node="">Not Too Dead To Ruin Everyone’s Day</span></h3><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">In which every hero’s worst nightmare comes true and villains only </span><em data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">seem </span></em><span data-dcnode-id="1290" instrument_node="">dead. In other words: someone who’s supposed to be dead isn’t actually dead and can pop back into the main storyline like the moles in Whack-a-Mole. Likewise, this plot twist is used across the board to foil the protagonist, so it may be worth it to tread carefully.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><ol data-dcnode-id="1268" start="35"><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">
</span><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Harry Potter and the Prisoner of Azkaban.</span></strong><span data-dcnode-id="1283" instrument_node=""> Harry Potter’s climactic encounter with Sirius Black triggers the revelation that Peter Pettigrew, Voldemort’s secret henchman, is still alive — and has been disguised as Ron’s rat this whole time.</span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">
</span><strong data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Saw.</span></strong><span data-dcnode-id="1277" instrument_node=""> In a twisted game of life and death for two trapped victims, the “corpse” that had lain prone on the ground for most of the scenes rises and reveals himself as the real Jigsaw Killer.</span></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">
</span><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Wreck-It Ralph.</span></strong><span data-dcnode-id="1271" instrument_node=""> In Sugar Rush’s pivotal race, Vanellope’s glitch shows that King Candy is in actuality a fame-hungry auto-racer from another game named Turbo, who is supposed to have been unplugged and gone entirely from the arcade.</span></li><span data-dcnode-id="1269" instrument_node="">
</span></ol><span data-dcnode-id="1267" instrument_node="">
</span><h3 data-dcnode-id="1265" id="bet_you_thought_you_d_seen_the_last_of_me__suckers"><span data-dcnode-id="1266" instrument_node="">Bet You Thought You’d Seen The Last Of Me, Suckers</span></h3><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">In which anyone who ever uttered, “Well, this death seems final,” since the 1800s is proven incorrect. One of the first famous instances of it occurred in 1893 when Sir Arthur Conan Doyle tried to kill off Sherlock Holmes in “The Final Problem.” There was such a public outcry that Doyle was compelled to miraculously resurrect the detective.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Though some argue that it’s a cheap trick to bring a character back to life, it’s still a common occurrence due to fan demand — particularly in today’s Internet-driven culture. So as long as people raise a ruckus online over the deaths of their favorite characters, we’ll probably continue to see this plot twist live a long life.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><ol data-dcnode-id="1235" start="38"><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1249"><span data-dcnode-id="1256" instrument_node="">
</span><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Lord of the Rings.</span></strong><span data-dcnode-id="1253" instrument_node=""> Previously presumed dead after falling off the Bridge of Khazad-dûm during a battle with a Balrog, Gandalf makes a </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D0lhHDXimoLc" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1252" instrument_node="">surprise comeback.</span></a><span data-dcnode-id="1250" instrument_node="">
</span></li><span data-dcnode-id="1248" instrument_node="">
</span><li data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">
</span><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">The Walking Dead, “Heads Up.” </span></strong><span data-dcnode-id="1244" instrument_node=""> Glenn Rhee plunges straight into a mass of bloodthirsty walkers but miraculously survives and makes a return in the third episode of the sixth season.</span></li><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">
</span><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The Lion, The Witch, and The Wardrobe. </span></strong><span data-dcnode-id="1238" instrument_node=""> Aslan, the King of Beasts, is seemingly killed by the White Witch on the Stone Table — until dawn breaks and he is resurrected, thanks to the workings of a Deeper Magic.</span></li><span data-dcnode-id="1236" instrument_node="">
</span></ol><span data-dcnode-id="1234" instrument_node="">
</span><h3 data-dcnode-id="1232" id="damnit__where_s_kansas_"><span data-dcnode-id="1233" instrument_node="">Damnit, Where’s Kansas?</span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1230" instrument_node="">In a delightful twist </span><em data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">within</span></em><span data-dcnode-id="1227" instrument_node=""> the realm of plot twists, the human being isn’t the one causing trouble this time around. Instead, the setting of the story take center stage. Found particularly in science fiction and alternate reality stories, its hallmark is an unanticipated moment in which the protagonist (and the audience) has to wonder: “Where are we, really?”</span></p><span data-dcnode-id="1225" instrument_node="">
</span><ol data-dcnode-id="1205" start="41"><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">
</span><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Truman Show.</span></strong><span data-dcnode-id="1220" instrument_node=""> As the unsuspecting star of a decades-long reality show, Truman Burbank does not realize that he has lived in a massive and elaborate television stage since birth.</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">
</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Planet of the Apes.</span></strong><span data-dcnode-id="1214" instrument_node=""> Astronauts crash-land on an unknown planet ruled by an advanced society of talking apes. Their discovery of the remains of the Statue of Liberty clues them into the realization that they are in the future and that it was Earth all along!</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">
</span><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Oryx and Crake.</span></strong><span data-dcnode-id="1208" instrument_node=""> In flashbacks, the real reason for the post-apocalyptic world is revealed: Crake distributed a wonder drug to engender a global pandemic and wipe the world’s slate clean.</span></li><span data-dcnode-id="1206" instrument_node="">
</span></ol><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1201"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1200" instrument_node="">
</span><ol data-dcnode-id="1183" start="44"><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1198" instrument_node="">
</span><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The Good Place.</span></strong><span data-dcnode-id="1195" instrument_node=""> Witnessing a hell of an argument between her friends sets up Eleanor Shellstrop‘s epiphany: the </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSVG1YGdoCWo" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1194" instrument_node="">Good Place has been the Bad Place</span></a><span data-dcnode-id="1192" instrument_node=""> this whole time.</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">
</span><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">The Village.</span></strong><span data-dcnode-id="1186" instrument_node=""> A blind daughter discovers that her 19th-century “village” is entirely fake and the villagers are actually captives of a social experiment conducted by a history professor.</span></li><span data-dcnode-id="1184" instrument_node="">
</span></ol><span data-dcnode-id="1182" instrument_node="">
</span><h3 data-dcnode-id="1180" id="invisible_good_people"><span data-dcnode-id="1181" instrument_node="">Invisible Good People</span></h3><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">“This guy looks nice,” said no-one probably ever of the greasy-haired, beaked-nosed silhouette lurking in the far corner of the room. However, believe it or not, that’s the premise of this plot twist that deals chiefly with misconceptions and wrong first impressions: someone who seems “off” turns out to actually be good. It’s a nice reminder in and of itself that there are good people everywhere, if you just try to look for them.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><ol data-dcnode-id="1156" start="46"><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">
</span><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Harry Potter and the Sorcerer’s Stone.</span></strong><span data-dcnode-id="1171" instrument_node=""> Harry Potter is surprised to be told that his most hated professor at Hogwarts, Severus Snape, has been helping him survive some tricky situations throughout the entire school year.</span></li><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">
</span><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">I Am Legend.</span></strong><span data-dcnode-id="1165" instrument_node=""> In a world beset by vampirism, Robert Neville comes to the uncomfortable realization that he is the monster in the eyes of the infected — not the other way around.</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">
</span><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Pride and Prejudice.</span></strong><span data-dcnode-id="1159" instrument_node=""> It takes a botched marriage proposal and many declined dances for Elizabeth Bennett to suspect that Mr. Darcy, Lord of Pemberley, has a heart of gold under his stick-in-the-mud exterior.</span></li><span data-dcnode-id="1157" instrument_node="">
</span></ol><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">More plot twist examples of this flavor:</span></strong></p><span data-dcnode-id="1151" instrument_node="">
</span><ol data-dcnode-id="1137" start="49"><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">
</span><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Toy Story.</span></strong><span data-dcnode-id="1146" instrument_node=""> Woody and Buzz are under the impression that Sid’s mutated toys are savages until they step out and help put Buzz back together.</span></li><span data-dcnode-id="1144" instrument_node="">
</span><li data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">
</span><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Love, Simon.</span></strong><span data-dcnode-id="1140" instrument_node=""> Simon Spier doesn’t expect to cross paths again with Bram Greenfeld in his search for “Blue,” his pen pal and the other closeted gay student at his high school.</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ol><span data-dcnode-id="1136" instrument_node="">
</span><h3 data-dcnode-id="1134" id="gasp_factor"><span data-dcnode-id="1135" instrument_node="">Gasp Factor</span></h3><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">In which the twist is an unexpected plot event that attempts to accomplish one objective only: make the audience gasp. </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Jane the Virgin</span></em><span data-dcnode-id="1129" instrument_node="">, a satirical romantic comedy drama, is perhaps the queen of this sort of plot development: each episode parodies all the expletive-worthy twists and turns of a Latin telenovela. Exclamation point!</span></p><span data-dcnode-id="1127" instrument_node="">
</span><ol data-dcnode-id="1113" start="51"><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">
</span><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Game of Thrones.</span></strong><span data-dcnode-id="1122" instrument_node=""> Eddard Stark, the head of House Stark and Lord of Winterfell, is beheaded by Joffrey Lannister.</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">
</span><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Jane The Virgin.</span></strong><span data-dcnode-id="1116" instrument_node=""> Michael Cordero, Jr. dies abruptly in the season three finale from an aortic dissection.</span></li><span data-dcnode-id="1114" instrument_node="">
</span></ol><span data-dcnode-id="1112" instrument_node="">
</span><h3 data-dcnode-id="1110" id="this_herring_was_more_salmon_than_red"><span data-dcnode-id="1111" instrument_node="">This Herring Was More Salmon Than Red</span></h3><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">Sometimes a plot twist comes out of nowhere, without warning or many clues. Whether that’s an indicator of a </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">good</span></em><span data-dcnode-id="1105" instrument_node=""> twist or not is up for debate. However, it still registers as an unexpected event that takes audiences by surprise — which is why we’re including a special section for movies and films that fall into this category.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><ol data-dcnode-id="1083" start="53"><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">
</span><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The Wizard of Oz.</span></strong><span data-dcnode-id="1098" instrument_node=""> Dorothy is befuddled to discover that the Wizard of Oz is a middle-aged man using a microphone.</span></li><span data-dcnode-id="1096" instrument_node="">
</span><li data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">
</span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The Prestige.</span></strong><span data-dcnode-id="1092" instrument_node=""> Robert Angier, a rival stage magician, doesn’t realize that “Alfred Borden” is actually a double act of twin brothers until it’s too late.</span></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">
</span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Gossip Girl.</span></strong><span data-dcnode-id="1086" instrument_node=""> The end of the series pans to a shot of Dan Humphrey, revealing that he was Gossip Girl all along.</span></li><span data-dcnode-id="1084" instrument_node="">
</span></ol><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Did we say that there were only 55 examples in this list? Well, how about THIS twist: here are 15 more!</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h2 data-dcnode-id="1077" id="10__plot_twist_ideas_for_you"><span data-dcnode-id="1078" instrument_node="">10+ plot twist ideas for you</span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Now that you have an idea of what plot twists look like, you might find it easier to write your own. But in case you’re still struggling to come up with a twist, here are some hypothetical scenarios to jumpstart your thinking.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">56. CHARACTER A is persuaded by CHARACTER B that it is all a dream — when it’s actually not.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">57. A gift from CHARACTER B to CHARACTER A is really a trap.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">58. It is revealed that the NARRATOR is Death.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">59. An ARCHAEOLOGIST at a dig comes across his own skeleton.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">60. CHARACTER A discovers the real identity of CHARACTER B through an old yearbook.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">61. It is revealed that all the sounds that CHARACTER A has heard throughout his life has been inside his own head.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">62. CHARACTER A believes he is in Hell. It’s actually Earth.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">63. It is revealed that CHARACTER A and CHARACTER B are not themselves because they were body-swapped.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">64. CHARACTER A is informed that the previous events were actually part of an alternate reality simulation.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">65. It is revealed that SANTA CLAUS is real.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">66. A promise that CHARACTER A and CHARACTER B made when they were children is not really what they think it to be.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">67. CHARACTER A is set up with CHARACTER B, a rich politician, and finds herself falling in love with CHARACTER B’S GIRLFRIEND.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">68. CHARACTER A goes on a series of blind dates without realizing that it is all being filmed for the next experimental season of The Bachelor.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">69. A key strength of CHARACTER A becomes a key weakness.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">70. CHARACTER A experiences puzzling and unexplained flashbacks because she is the reincarnation of GEORGE WASHINGTON.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><h2 data-dcnode-id="1026" id="now__over_to_you"><span data-dcnode-id="1027" instrument_node="">Now, over to you</span></h2><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">A well-written plot twist makes for some of the most exciting, mind-blowing, and dramatic stories in history, which is why it’s so important to get it right. Here’s the second plot twist for this post: it’s now up to you to write your own.</span></p><span data-dcnode-id="1022" instrument_node="">

</span></div><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">
    How many times have you been published? I would love to see your work. Writing should be about being accepting and bringing people together to hone their crafts, and in the meantime, telling tales with underlying meanings with motifs and themes. Maybe Science Fiction and Fantasy are too complex for you, some people just don't relate and that's okay. May I suggest Charlotte's Web as a starter on DVD, then work your way into the book, and you will see how a REAL story is told about life and death and the acceptance thereof. Best of luck, I hope you find great success in your writing career!

</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">
    1. Aha, what a clearly "justified" opinion... Define "trash" and "real writers" a little bit more clearly. I'm not against the expression of your thoughts, but I still don't get your comment... In fact, I think historical or romantic literature is usually boring for me, but I don't consider it "trash". True "trash" for me is something useless, with nothing good to notice in it. A such pessimist and not very clear comment like this is an example (my honest opinion, excuse me if it sounds offensive).
2. "Real" is a very subjective concept, however. This is fiction, but the facts may be either possible, non probable or impossible in "real life" depending of the READER (if you stop thinking on it).
3. In case you want to ignore number 2: with "real stories about real people" I suppose you are talking about NON-fiction texts (If you meant "realistic literature", read below). You CAN'T ADD a PLOT TWIST to a NON-FICTION TEXT. Non-fiction is NOT WRITTEN to be ENTERTAINING (but to TEACH readers instead) and plot twists have an ENTERTAINING PURPOSE! Try to take someone's biography and rewrite it modifying their story to turn an important moment into a plot twist. The result will be LITERATURE even if the facts actually took place. 
4. At least 50/70 of the ideas of this post can be translated to realistic fiction (with some creativity, yeah). That's pretty much,... so?
5.  Don't you like the Dickens's novel "A Tale of Two Cities", Madame DeFarge? Isn't your name from a character of that book? It's FICTICIOUS!
