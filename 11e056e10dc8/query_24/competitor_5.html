rget="_blank"><span data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Manifesto</span></span></a></li></ul></li></ul></div></div></div></header><div class="page_content_wrap page_paddings_no" data-dcnode-id="145"><div class="content_wrap" data-dcnode-id="148"><div class="content" data-dcnode-id="770"><article class="itemscope post_item post_item_single post_featured_default post_format_standard post-14547 post type-post status-publish format-standard has-post-thumbnail hentry category-otherstuff" data-dcnode-id="825" itemscope="itemscope" itemtype="https//schema.org/Article"><section class="post_featured" data-dcnode-id="1137"><div class="post_thumb" data-dcnode-id="1138" data-image="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg" data-title="The Tomorrow War (plot holes &amp; writing tips)"><span data-dcnode-id="1141" instrument_node=""> </span><a class="hover_icon hover_icon_view inited" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg" rel="magnific" title="The Tomorrow War (plot holes &amp; writing tips)"><img alt="The Tomorrow War (plot holes &amp; writing tips)" class="wp-post-image" data-dcnode-id="1140" height="659" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg&amp;raw" width="1170"></a></div></section><h1 class="post_title entry-title" data-dcnode-id="1134" itemprop="headline"><span class="post_icon icon-book-open" data-dcnode-id="1136"></span><span data-dcnode-id="1135" instrument_node="">The Tomorrow War (plot holes &amp; writing tips)</span></h1><div class="post_info" data-dcnode-id="1117"><span data-dcnode-id="1133" instrument_node=""> </span><span class="post_info_item post_info_posted" data-dcnode-id="1129"><span data-dcnode-id="1132" instrument_node=""> </span><a class="post_info_date date updated" content="2021-07-02 21:30:50" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/the-tomorrow-war-plot-screenplay/" itemprop="datePublished"><span data-dcnode-id="1131" instrument_node="">July 2, 2021</span></a></span><span data-dcnode-id="1128" instrument_node=""> </span><span class="post_info_item post_info_posted_by vcard" data-dcnode-id="1125" itemprop="author"><a class="post_info_author" data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/author/teosocrates/"><span data-dcnode-id="1127" instrument_node="">Derek Murphy</span></a></span><span data-dcnode-id="1124" instrument_node=""> </span><span class="post_info_item post_info_counters" data-dcnode-id="1118"><span data-dcnode-id="1123" instrument_node=""> </span><span class="post_counters_item post_counters_views icon-eye" data-dcnode-id="1120" href="https://www.creativindie.com/the-tomorrow-war-plot-screenplay/" title="Views - 208"><span class="post_counters_number" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">208</span></span></span><span data-dcnode-id="1119" instrument_node=""> </span></span></div><section class="post_content" data-dcnode-id="829" itemprop="articleBody"><h2 data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">How to write a satisfying story… movie breakdown</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1111"><img alt="" class="wp-image-14551 ls-is-cached lazyloaded" data-dcnode-id="1114" data-src="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg" data-srcset="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg 800w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-300x169.jpg 300w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-768x432.jpg 768w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-600x338.jpg 600w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg 1080w" height="450" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg&amp;raw" srcset="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg 800w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-300x169.jpg 300w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-768x432.jpg 768w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-600x338.jpg 600w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg 1080w" width="800"><noscript data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">&lt;img width="800" height="450" src="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg" alt="" class="wp-image-14551 lazyload" srcset="https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-800x450.jpg 800w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-300x169.jpg 300w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-768x432.jpg 768w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_-600x338.jpg 600w, https://www.creativindie.com/wp-content/uploads/2021/07/ecbbb573a0fab4611f69e01589dae7feeb5ee48a86fe9748be7ff5d37912a501._SX1080_.jpg 1080w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></figure><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Halfway through Netflix’s “The Tomorrow War” with Chris Pratt, I paused to take notes. It’s a great example of “the thing it costs is the one thing the hero refuses.” I’m only halfway through but I can see where this is going.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1108" instrument_node="">1. early scenes establish hero’s relationship with this father: his father </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">left</span></em><span data-dcnode-id="1105" instrument_node=""> him, and he can </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">never</span></em><span data-dcnode-id="1102" instrument_node=""> forgive his father for this betrayal. He refuses to let his father see his daughter.</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1100" instrument_node="">2. he meets his daughter in the future: she’s the key scientist, the last hope for humanity. She tells him, that he </span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">left</span></em><span data-dcnode-id="1097" instrument_node=""> her and her mom. He can’t believe it, he knows for a fact, that this is the </span><em data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">one thing</span></em><span data-dcnode-id="1094" instrument_node=""> he would never do. It goes against everything he believes in. It’s absolutely impossible – it’s a price he would never pay, because it would break him and everything he stands for.</span><br data-dcnode-id="1093"><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">3. I’m assuming the ending will go like this: he realizes that, if he does not leave his daughter, she will not become the persistent genius the world needs. He is forced to leave her, even though it breaks him, because he knows it’s the only way to save the world.</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">It could’ve just been a story about aliens and cool time travel effects, but that would have been empty and hollow. So they also give it a human element, about a hero, his daughter, his father. I’m guessing he *might* also have closure or forgive his father in a final scene, but not sure if that will happen.</span></p><p data-dcnode-id="1082"><strong data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">Or that’s how it </span><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">could </span></em><span data-dcnode-id="1084" instrument_node="">have gone.</span></strong></p><p data-dcnode-id="1074"><span data-dcnode-id="1081" instrument_node="">Actually, it’s a little more complex, and hits a few crucial points I mapped out in my </span><strong data-dcnode-id="1076"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Book-Craft-write-readers-polish-ebook/dp/B089NJK1SC" target="_blank"><em data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Book Craft </span></em><span data-dcnode-id="1078" instrument_node="">guide to writing</span></a></strong><span data-dcnode-id="1075" instrument_node="">. What follows is a blow-by-blow reaction to the plot events, with tons of spoilers, in a way that should be helpful to identify key elements of a successful plot, story or screenplay. I’m also going to point out some gaping plot holes, to show why they don’t really matter.</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">The movie takes a twist, when the father-daughter team figure out the crucial toxin to kill the aliens. But time’s up: the daughter wants to send her dad back with the toxin to kill the alien threat before the war. She knows this will destroy her and her timeline. She says:</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1071" instrument_node="">“I’m asking you to do what no one else is willing to do.” </span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">“Why me?”</span></p><p data-dcnode-id="1059"><span data-dcnode-id="1067" instrument_node="">“Because you’re my father, there’s no one else I want to trust more.”</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">Sometimes, to avoid a plot whole, you have to raise the glaring question and answer it. It doesn’t have to be a good answer, that makes sense. It just has to be raised and plausible.</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">It could have been anyone, but this gives her a chance to connect with her dad. Fine.</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">But then he says, “Ok, I’ll do it, but I’m coming back for you, and you and me, we’re going to save this world together.”</span></p><p data-dcnode-id="1049"><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Um what? </span></em><span data-dcnode-id="1056" instrument_node="">That’s not how any of this works. If he goes back with the toxin and kills the aliens… the timeline will be destroyed, she won’t exist. Coming back to save her and fix her timeline, doesn’t make any sense. But fine, he’s feeling heroic and </span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">refuses</span></em><span data-dcnode-id="1053" instrument_node=""> to let go of his future daughter, even though it’s logically necessary. This proves the emotional attachment… he’s going to lose her anyway, but there must be heavy resistance first. This starts building the resistance. If he just </span><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">accepted the plan</span></em><span data-dcnode-id="1050" instrument_node="">, knowing she’s basically as good as dead – that she has to be – he won’t freak out or try to save her half as much as he does, which would take away all the urgency.</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">To make the story matter, we can’t let logic or reason wash away emotional attachments. But we have to do the best we can to skip over plot holes and keep tension high. One of the ways to escalate tension, is with a countdown timer; or by staking the obstacles.</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">After the heart-to-heart… the timer starts.</span></p><ul data-dcnode-id="1037"><li data-dcnode-id="1042"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">7 minutes to jump.</span></strong></li><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The alien queen wakes up.</span></li><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Thousands of creatures overrun defenses.</span></li></ul><p data-dcnode-id="1032"><span data-dcnode-id="1036" instrument_node="">These three things together are necessary to build tension and excitement around the finalish battle scene (there are two final battle scenes; the one where they lose, the dark night of the soul, then the one they win – this is true in most satisfying fiction, and that’s why I built my </span><a data-dcnode-id="1034" data-id="https://www.creativindie.com/plotdot/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creativindie.com/plotdot/"><span data-dcnode-id="1035" instrument_node="">plot dot fiction outline</span></a><span data-dcnode-id="1033" instrument_node=""> the way I did.)</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">However, none of things make sense when you think them through.</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">They don’t just ret-tranq the queen, as they’ve been doing every hour for hours… so she gets out. And her hordes of aliens find her, swimming the ocean and freeing her bonds. They showed up in this crucial 7 minute window, and are attacking the base, so everyone is dying and fighting, with big explosions.</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">There’s the inner battle and the outer battle: the forces fighting the allies, to buy time… and the main event with the protagonist(s) and chief villain/alien queen.</span></p><p data-dcnode-id="1022"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">All he has to do is not die… </span></strong><span data-dcnode-id="1023" instrument_node="">and wait it out. But that would be boring. So instead he tries to get to the chopper on the roof for some dumb reason. His daughter gets hurt. He tries to save her, for some dumb reason (putting his own life and the fate of the entire planet and humanity at risk, for a daughter who won’t exist once he fixes it).</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Heroes often make stupid, illogical mistakes under the protection of loyalty/honor/duty… a stubborn persistence in the name of universal principles and personal attachments is what often define them. Villains are defined by the impersonal, seeing the big picture, at the expense of individual players. For heroes, every life matters, no matter what.</span></p><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">1 minute countdown.</span></strong><span data-dcnode-id="1017" instrument_node=""> Tearful goodbyes.</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">“You need to make sure this never happens.”</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The queen hunts them down for some dumb reason (hero always faces off with the prime villain, not the hordes). Hanging by 1 arm over flames.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">20 seconds.</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Literally loses his daughter, torn from his arms by the falling alien queen – it’s not enough to have a symbolic or metaphorical letting go; the sacrifice or choice he’s going to make in the past. It has to be shown, on-stage. It has to be visceral, vivid and raw – with active resistance and tension – often shown as a literal tug of war (him pulling up to save daughter, her being pulled away by the alien.)</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">The thing he loses, can’t be easy for him to accept or bear. It has to be violently torn away.</span></p><p data-dcnode-id="1003"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Back to the Present</span></strong></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">He goes back to his time, but the jumplink is offline they can’t travel to the future again.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">It’s over. He wants to sent the toxin to the future immediately and still save his daughter, or something, even though that’s impossible and would mean the end of civilization and the big alien war. He says “Now I’ve got a solution and no way to use it, so we’ve got to figure it out.”</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Which doesn’t make any sense on paper. He’s got plenty of time to figure out where the aliens are and try to kill them. But, the next step in the plan can’t just be given, easy or obvious. Obstacles must be shown or presented, as if there’s a difficult choice to make or missing information that needs to be discovered.</span></p><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">You must raise the </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">questions</span></em><span data-dcnode-id="993" instrument_node=""> before you present answers; information must be earned – you show what’s important by first showing the lack, gap or needed knowledge. So even though this question seems unnecessary and out of place, it’s kind of just a way to steer readers/viewers towards what happens next… which goes like this.</span></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">“Ok, so we stop them.”</span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">“How did they get here? No ships, it was like they were already here.”</span></p><p data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">This is where, in a “mind-blown” moment, I thought maybe they were hinting towards something really cool: that the toxin he brought back with him was actually the </span><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">beginning</span></em><span data-dcnode-id="984" instrument_node=""> of the aliens, that he’d created them somehow, in a perpetual, impossible time-loop. That’s super interesting, but not easy to resolve or explain.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Instead, somehow, they find some ash under one claw a soldier brought back as a souvenir, and found out is was volcanic ash. So they have one question that depends on one obscure question about… volcanoes.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">This is a satisfying payoff because of a much earlier scene, where he avoids a student who is obsessed about volcanoes. That’s a seed planted, that bears fruit, playing out in a surprising way. This is a great way to build cohesion and makes everything feel relevant and necessary.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The details don’t make a ton of sense, but it’s a fun trail of breadcrumbs that gives them a purpose and a direction. They need to go to the polar ice cap and find an alien ship. This last leg can’t be easy, without conflict. So, the government refuses to help. Suddenly, the alien war in 30 years doesn’t feel as important, so they basically give up trying to worry about it. This is implausible, but the ending couldn’t just be the government nuking the alien ship. The heroes must be oppressed and refused.</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">There is the “accounting of limitations” scene, where a side-character spells out everything they need and how hard it will be: we need a pilot willing to risk flying into international waters to find an ancient alien ship under an iceberg… “There’s no way we can get there!” (this quest is impossible).</span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Which leads them back to his deviant father: the one he swore he’d never ask for help, ever. Now, he needs to go and ask him for help (the thing he swore he wouldn’t do; his one rule he won’t break – set the hard limitation earlier for whatever it is the hero has to do. Set up the resistance earlier, so he is forced to change).</span></p><p data-dcnode-id="960"><span data-dcnode-id="972" instrument_node="">When they actually find the ship, there’s a decision scene, where all the character decide what to do together: Should we risk absolutely everything and go in there unprepared to do it alone: or should we just call for backup and let the government deal with it?</span><br data-dcnode-id="971"><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">The smart, right choice, would be to get help. But that’s not good for dramatic conflict or story. So even though it’s very, very stupid to go inside… that’s what they have to do. To make this seem less stupid, the open discussion raises and rejects possibilities, and gives each character a chance to state their personal reasons… why are </span><em data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">they</span></em><span data-dcnode-id="966" instrument_node=""> here? Why are </span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">they </span></em><span data-dcnode-id="963" instrument_node="">willing to risk their lives, the fate or the world, everything, and </span><em data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">do the dumb thing anyway.</span></em></p><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">It’s not entirely believable, but it’s fine. It’s enough. It just has to be voiced, because otherwise, the audience won’t forgive them for being too dumb to realize and expect the logical consequences. They have to at least consider the risks and decide deliberately anyway for whatever reason that this must be done, and must be done now.</span></p><p data-dcnode-id="954"><span data-dcnode-id="957" instrument_node="">Then, things get increasingly stupid and exciting.</span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">By which I mean, there is more conflict, which is a result of very poor decisions, but things move fast enough it doesn’t really matter: once characters have chosen to go all in, they can be reacting to unexpected twists, making poor decisions but forced by danger or stress.</span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">There are pods of aliens. A bunch of males and apparently just one female queen. Obviously, they should dose the queen first and be done with it – but they don’t. They dose a bunch of males. Then the other males wake up. Chaos ensues. Some escape the ship.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">They go after the female, while chased by the males. A few characters stay behind to die/blow up the whole ship (with a ton of C-4 they somehow carried in on backpacks, but oh well. The other characters are left behind until it’s just him, his dad, against the alien female. This is the build up to the final battle scene, which needs: a villain, a hero, and something for the hero to lose.</span></p><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">They are attacking the alien from both sides with machine guns.</span></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Then, they switch to pistols, for no reason. But it’s cool.</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">They’re fighting on the edge of a cliff, because sure.</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">He rams the alien with his snowmobile somehow, because damn. Surprise wow factor.</span></p><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">He stabs her with the alien claw, and then with an ice pick!</span></p><p data-dcnode-id="933"><span data-dcnode-id="939" instrument_node="">Final battles are up close and personal. In most movies, the final battle scene boils down to a fist fight, no matter what kind of weapons are available, they need to be put aside (otherwise, victory or failure would be swift and immediate). A final fight scene needs to </span><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">drag out</span></em><span data-dcnode-id="936" instrument_node=""> and be </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">suspended.</span></em></p><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The injured hero tries to lure the alien queen off the cliff.</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">But then his dad sacrifices himself instead, saying “I’m sorry for everything.”</span></p><p data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">The hero, confronted with the potential loss of his estranged father (perhaps after just witnessing the painful loss of his future daughter) is motivated to continue the fight instead of giving up. This needs to happen in the </span><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">middle</span></em><span data-dcnode-id="925" instrument_node=""> of your final fight scene: the hero is defeated or willing to die… but then realizes there is something else, something more, than they can’t bear to lose. Often the villain taunts them or gives out one last threat towards someone they care about.</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">The hero rallies.</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">He jumps on the alien’s back, and slits its throat with a knife. He punches it while dodging (even though, previously, soldiers put a hundred rounds into these aliens without stopping them, and the aliens easily chewed through hundreds of soldiers). Now it’s down to a fist fight.</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Finally, he punches the vial of toxin straight into its mouth and it breaks.</span></p><p data-dcnode-id="910"><span data-dcnode-id="917" instrument_node="">Why not just stab it earlier in stasis? Because, then the fight would be too easy. This battle needs to be </span><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">close</span></em><span data-dcnode-id="914" instrument_node="">. The hero needs to </span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">almost lose</span></em><span data-dcnode-id="911" instrument_node="">. So whatever plan or advantage he had, it must be taken away or resisted.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">He breaks the vial of toxin, and for dramatic effect kicks the queen off the cliff like “This is sparta!”</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">It’s a very satisfying fight scene, even though it’s also silly, contrived and over-the-top.</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Dad returns home bringing in the recycling bin. A return to normalcy. Introduces grandpa to his daughter. On the surface, an action alien flick. But also, a story about a guy with father issues trying to raise his daughter, and the healing that brought his family back together.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">It doesn’t make a ton of logical sense, partly because time travel stuff is hard. He ends with: “In the future that’s never going to happen, she changed me. I’m never going to leave her. Never going to leave this family, because my best future was always right in front of me.” That sounds vaguely cool even though it’s mostly meaningless. (The future daughter who changed him, wouldn’t exist without him leaving her – he has to leave her to experience her, which he won’t ever do because he’s changed that future already).</span></p><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">But overall, it works, and illustrates many of the important elements of a successful story and how you some plot holes are fine and even necessary, in order to build up the drama and conflict. For more on this stuff, check out this long post on satisfying character arcs in </span><a data-dcnode-id="899" data-id="https://writethemagic.com/how-to-write-a-satisfying-conclusion-to-your-novel-multiple-character-arc-plot-resolution/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writethemagic.com/how-to-write-a-satisfying-conclusion-to-your-novel-multiple-character-arc-plot-resolution/" target="_blank"><span data-dcnode-id="900" instrument_node="">the Snyder’s Cut Justice League</span></a><span data-dcnode-id="898" instrument_node=""> and some other modern examples.</span></p><h2 data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">…Takeaway Writing Tips</span></h2><p data-dcnode-id="885"><span data-dcnode-id="894" instrument_node="">The Tomorrow War is an illogical mess and riddled with plot holes. But those details don’t matter cuz they got a lot of stuff right. Don’t think! Just enjoy snowmobile rocket </span><img alt="🚀" class="lazyload" data-dcnode-id="893" data-src="https://static.xx.fbcdn.net/images/emoji.php/v9/t1f/1.5/16/1f680.png" height="16" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="16"><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;img class="lazyload" height="16" width="16" alt="🚀" src="https://static.xx.fbcdn.net/images/emoji.php/v9/t1f/1.5/16/1f680.png" /&gt;</span></noscript><span data-dcnode-id="890" instrument_node=""> alien bare knuckle boxing </span><img alt="🥊" class="lazyload" data-dcnode-id="889" data-src="https://static.xx.fbcdn.net/images/emoji.php/v9/t17/1.5/16/1f94a.png" height="16" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="16"><noscript data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">&lt;img class="lazyload" height="16" width="16" alt="🥊" src="https://static.xx.fbcdn.net/images/emoji.php/v9/t17/1.5/16/1f94a.png" /&gt;</span></noscript><span data-dcnode-id="886" instrument_node=""> !</span></p><p data-dcnode-id="881"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The interesting point is,</span></strong><span data-dcnode-id="882" instrument_node=""> sometimes the very tenuous plot holes are just there to support a plausible version of events. If you (easily) resolved the obstacles with simple solutions, the impactful dramatic couldn’t happen. Sometimes you have to invent unsatisfying answers to logical inconsistencies, to sustain the most dramatic narrative.</span></p><div class="nf-post-footer" data-dcnode-id="871"><img alt="" class="aligncenter wp-image-13841 lazyload" data-dcnode-id="880" data-src="https://www.creativindie.com/wp-content/uploads/2019/10/hard-slit-separator-800x217.png" height="112" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="414"><noscript data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">&lt;img class="aligncenter wp-image-13841 lazyload" src="https://www.creativindie.com/wp-content/uploads/2019/10/hard-slit-separator-800x217.png" alt="" width="414" height="112" /&gt;</span></noscript><p data-dcnode-id="872" style="text-align: left"><span data-dcnode-id="877" instrument_node="">The 3 secrets to book marketing, and a haunted castle tour. Totally free. </span><strong data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativindie.clickfunnels.com/optin-24185691" target="_blank"><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Get it here.</span></em></a></strong></p></div><div class="jp-relatedposts" data-dcnode-id="830" id="jp-relatedposts" style="display: block;"><h3 class="jp-relatedposts-headline" data-dcnode-id="868"><em data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Related</span></em></h3><div class="jp-relatedposts-item
