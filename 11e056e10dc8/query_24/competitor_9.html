</span><article class="post-7798 post type-post status-publish format-standard hentry category-writing-craft category-plot-story-elements tag-heist tag-midpoint tag-robin" data-dcnode-id="1699" id="post-7798"><span data-dcnode-id="2075" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2070"><span data-dcnode-id="2074" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">4 Tips for Writing Reversals</span></h1><span data-dcnode-id="2071" instrument_node=""> </span></header><span data-dcnode-id="2068" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1742"><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2066" instrument_node="">One of the most important scenes in any book is the midpoint reversal. A reversal is an event that creates a fresh complication for the protagonist. It increases the stakes and sends the story off in a new direction. The reversal is the backbone of the classic three-act structure. If you don’t know what the three-act structure is you might want to start with this </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.janicehardy.com/2013/10/how-to-plot-with-three-act-structure.html" target="_blank"><span data-dcnode-id="2065" instrument_node="">explanation</span></a><span data-dcnode-id="2063" instrument_node="">.</span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Three-act_structure" target="_blank"><span data-dcnode-id="2062" instrument_node=""> </span><em data-dcnode-id="2059"><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">
</span></em></a></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2052"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/MPW-61871.jpg"><img alt="MPW-61871" class="alignleft size-medium wp-image-7819" data-dcnode-id="2055" height="300" sizes="(max-width: 200px) 85vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/MPW-61871.jpg%3Fresize%3D200%252C300&amp;raw" srcset="https://i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/MPW-61871.jpg?resize=200%2C300 200w, https://i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/MPW-61871.jpg?w=500 500w" width="200"></a><span data-dcnode-id="2053" instrument_node="">The heist is one genre where reversals are not only important at the midpoint, but are abundant throughout the plot. Other types of stories may have a positive event triggering the inciting incident, but not the heist, it favors a negative one. In Ocean’s Twelve, the team has 14 days to return all the money from their first heist, and it’s money they don’t have. This incites them to plan another heist. Of course the heist plot will include the traditional midpoint reversal, and it often favors a third big reversal that leads into the climax.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Since every book needs at least that one reversal, I thought I would share my perspective on the qualities to consider when crafting a reversal.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><ul data-dcnode-id="2006"><span data-dcnode-id="2047" instrument_node="">
</span><li data-dcnode-id="2035"><strong data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Vary the timing and intensity:</span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/groundhog_day-poster1.jpg"><img alt="Original Cinema Quad Poster - Movie Film Posters" class="alignright size-medium wp-image-7817" data-dcnode-id="2045" height="227" loading="lazy" sizes="(max-width: 300px) 85vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/groundhog_day-poster1.jpg%3Fresize%3D300%252C227&amp;raw" srcset="https://i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/groundhog_day-poster1.jpg?resize=300%2C227 300w, https://i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/groundhog_day-poster1.jpg?resize=1024%2C773 1024w, https://i0.wp.com/writeonsisters.com/wp-content/uploads/2015/02/groundhog_day-poster1.jpg?w=1050 1050w" width="300"></a><span data-dcnode-id="2043" instrument_node=""> </span></strong><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2040" instrument_node="">A reversal’s timing (especially the midpoint one) needs to be spot on. If it comes too early, there isn’t much tension. If it comes too late, the story feels like it’s dragging. Using some smaller reversals between the three main transition points helps control the pacing. However, don’t use the same reversal twice unless the&nbsp;plot calls for it (</span><em data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Groundhog Day</span></em><span data-dcnode-id="2037" instrument_node="">), and don’t set the mini reversals too close together. This might make the reader feel overwhelmed or emotionally exhausted. Mixing the type, intensity and placement of the reversals is tricky stuff. It’s best figured out through experimentation and lots of beta readers.</span></p></li><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2028"><strong data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Team an information reversal with an action reversal for greater impact:</span></strong><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">When the reversal is information, like a dark secret, it usually thwarts the protagonist’s internal goals, and destabilizes them emotionally. An action reversal is an external complication, it might even injury the protagonist. Using both makes the situation seem more intense.</span></p></li><span data-dcnode-id="2027" instrument_node="">
</span><li data-dcnode-id="2015"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Don’t count on the element of surprise:</span></strong><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2023" instrument_node="">If you </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">can</span></em><span data-dcnode-id="2020" instrument_node=""> keep the reader guessing, that’s fantastic, and if you can blow them away with a shocking reversal twist, even better. However, any surprise twist is not easy. A writer must edge the story toward the reversal in such a way that once the twist is exposed, it seems logical. The reader might suspect the secret, but they shouldn’t </span><em data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">know</span></em><span data-dcnode-id="2017" instrument_node=""> the secret before the reversal. This type of reversal also counts on book reviewers never spoiling the reversal. Once the twist leaks out these stories tend to fall apart.</span></p></li><span data-dcnode-id="2014" instrument_node="">
</span><li data-dcnode-id="2008"><strong data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Make the characters respond:</span></strong><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The worse thing that can happen after a reversal is for the characters to act like they don’t care. The reversals must throw the characters. They shouldn’t nonchalantly accept the reversal as something they’ve always suspected unless the acceptance of that truth devastates them emotionally. A reversal needs to shake things up. It should create a crisis of faith, change the character’s master plan, or expose a hidden enemy. It should demand a reaction.</span></p></li><span data-dcnode-id="2007" instrument_node="">
</span></ul><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2004" instrument_node="">I am going to repeat this point: </span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">All reversals should increase the stakes and impact the goals of the protagonist in a meaningful way.</span></em></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">I’ve always been a fan of great reversals, and in a heist novel just about any type of reversal is fair game. You can reveal dark secrets, resurrect old feuds, and create teammates with mismatched agendas. As a writer, I love to change things up, and I thrive on putting my characters in uncomfortable situations. As a reader, nothing makes me happier than a reversal I didn’t see coming.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1996" instrument_node="">For more on the reversal:</span><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">
</span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.janicehardy.com/2010/12/golden-oldie-moping-in-middle-dealing.html" target="_blank"><span data-dcnode-id="1993" instrument_node="">http://blog.janicehardy.com/2010/12/golden-oldie-moping-in-middle-dealing.html</span></a></p><span data-dcnode-id="1990" instrument_node="">
