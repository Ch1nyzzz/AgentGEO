</span><div class="a-divider a-divider-section" data-dcnode-id="2931"><div class="a-divider-inner" data-dcnode-id="2932"></div></div><span data-dcnode-id="2930" instrument_node=""> </span><h2 data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2927" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2496"><span data-dcnode-id="2926" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2498"><span data-dcnode-id="2925" instrument_node=""> </span><h3 data-dcnode-id="2922"><span data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Review</span></span></h3><span data-dcnode-id="2921" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2736"><span data-dcnode-id="2920" instrument_node=""> </span><p data-dcnode-id="2738"><span data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">“Elegant, playful, and remarkable.” —</span></span><span class="a-text-italic" data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">The New Yorker</span></span><span data-dcnode-id="2911"><br data-dcnode-id="2915"><span data-dcnode-id="2914" instrument_node="">&nbsp;</span><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node="">“A page-turner, and when you finish you will return immediately to the beginning.” —</span></span><span class="a-text-italic" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">San Francisco Chronicle</span></span><span data-dcnode-id="2901"><br data-dcnode-id="2908"><br data-dcnode-id="2907"><span data-dcnode-id="2906" instrument_node="">“Beautiful. . . . An elegantly composed, quietly devastating tale.” —Heller McAlpin, NPR</span><br data-dcnode-id="2905"><span data-dcnode-id="2904" instrument_node="">&nbsp;</span><br data-dcnode-id="2903"><span data-dcnode-id="2902" instrument_node="">“Dense with philosophical ideas. . . . It manages to create genuine suspense as a sort of psychological detective story.” —Michiko Kakutani, </span></span><span class="a-text-italic" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The New York Times</span></span><span data-dcnode-id="2895"><br data-dcnode-id="2898"><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">“Evelyn Waugh did it in </span></span><span class="a-text-italic" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Brideshead Revisited</span></span><span data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">, as did Philip Larkin in </span></span><span class="a-text-italic" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Jill</span></span><span data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node=""> [and] Kazuo Ishiguro in </span></span><span class="a-text-italic" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">The Remains of the Day</span></span><span data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">. Now, with his powerfully compact new novel, Julian Barnes takes his place among the subtly assertive practitioners of this quiet art.” —</span></span><span class="a-text-italic" data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">The New York Times Book Review</span></span><span data-dcnode-id="2876"><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">&nbsp;</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">“[A] jewel of conciseness and precision….</span></span><span class="a-text-italic" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node=""> The Sense of an Ending</span></span><span data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node=""> packs into so few pages so much that the reader finishes it with a sense of satisfaction more often derived from novels several times its length.” —</span></span><span class="a-text-italic" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">The Los Angeles Times</span></span><span data-dcnode-id="2868"><br data-dcnode-id="2869"></span><span class="a-text-italic" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2863"><br data-dcnode-id="2865"><span data-dcnode-id="2864" instrument_node="">“Exquisitely crafted, sophisticated, suspenseful, and achingly painful, </span></span><span class="a-text-italic" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">The Sense of an Ending</span></span><span data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node=""> is a meditation on history, memory, and individual responsibility.” —</span></span><span class="a-text-italic" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">The Philadelphia Inquirer </span></span><span data-dcnode-id="2852"><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">&nbsp;</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">“Clever, provocative. . . . A brilliant, understated examination of memory and how it works, how it compartmentalizes and fixes impressions to tidily store away.” —</span></span><span class="a-text-italic" data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">The Minneapolis Star-Tribune</span></span><span data-dcnode-id="2845"><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">&nbsp;</span><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">“Concisely written and yet rich and full of emotional depth. . . . It’s highly original as well. And complicated, just like life.” —</span></span><span class="a-text-italic" data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">New York Journal of Books</span></span><span data-dcnode-id="2839"><br data-dcnode-id="2842"><br data-dcnode-id="2841"><span data-dcnode-id="2840" instrument_node="">“Elegiac yet potent, </span></span><span class="a-text-italic" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">The Sense of an Ending</span></span><span data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node=""> probes the mysteries of how we remember and our impulse to redact, correct—and sometimes entirely erase—our pasts.” —</span></span><span class="a-text-italic" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Vogue</span></span><span data-dcnode-id="2830"><span data-dcnode-id="2832" instrument_node=""> </span><br data-dcnode-id="2831"></span><span class="a-text-italic" data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2825"><br data-dcnode-id="2827"><span data-dcnode-id="2826" instrument_node="">“Ominous and disturbing….&nbsp; This outwardly tidy and conventional story is one of Barnes’s most indelible [and] looms oppressively in our minds.” —</span></span><span class="a-text-italic" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">The Wall Street Journal</span></span><span data-dcnode-id="2818"><br data-dcnode-id="2822"><span data-dcnode-id="2821" instrument_node="">&nbsp;</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">“At 163 pages, </span></span><span class="a-text-italic" data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">The Sense of an Ending </span></span><span data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">is the longest book I have ever read, so prepare yourself for rereading. You won’t regret it.” —Jane Juska, </span></span><span class="a-text-italic" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">The San Francisco Chronicle</span></span><span data-dcnode-id="2807"><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">&nbsp;</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">“With his characteristic grace and skill, Barnes manages to turn this cat-and-mouse game into something genuinely suspenseful.” —</span></span><span class="a-text-italic" data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">The Washington Post</span></span><span data-dcnode-id="2800"><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">&nbsp;</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">“Ferocious. . . . A book for the ages.” —</span></span><span class="a-text-italic" data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Cleveland Plain Dealer</span></span><span data-dcnode-id="2793"><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">&nbsp;</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">“Concisely written and yet rich and full of emotional depth. . . . At times, side-splittingly funny, at others, brutally honest, but always delightfully well observed. . . . Ironically, despite focusing on endings, and on suicide, this is a tremendously life-affirming work. It’s highly original as well. And complicated, just like life.” —</span></span><span class="a-text-italic" data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">New York Journal of Books</span></span><span data-dcnode-id="2789"><br data-dcnode-id="2790"></span><span class="a-text-bold" data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2784"><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">“Elegiac yet potent, </span></span><span class="a-text-italic" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">The Sense of an Ending</span></span><span data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node=""> probes the mysteries of how we remember and our impulse to redact, correct – and sometimes entirely erase – our pasts. . . . Barnes’s highly wrought meditation on aging gives just as much resonance to what is unknown and unspoken as it does to the momentum of its own plot.” —</span></span><span class="a-text-italic" data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Vogue</span></span><span data-dcnode-id="2773"><br data-dcnode-id="2777"><span data-dcnode-id="2776" instrument_node="">&nbsp;</span><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node="">“Novel, fertile and memorable . . . . A highly wrought meditation on aging, memory and regret.” —</span></span><span class="a-text-italic" data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">The Guardian</span></span><span data-dcnode-id="2765"><span data-dcnode-id="2770" instrument_node=""> (London)</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">&nbsp;</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">“A brilliant, understated examination of memory and how it works, how it compartmentalizes and fixes impressions to tidily store away. . . . Clever, provocative. . . . Barnes reminds his readers how fragile is the tissue of impressions we conveniently rely upon as bedrock.” —</span></span><span class="a-text-italic" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Minneapolis Star-Tribune</span></span><span data-dcnode-id="2758"><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">&nbsp;</span><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">"Brief, beautiful. . . . That fundamentally chilling question—Am I the person I think I am?—turns out to be a surprisingly suspenseful one. . . . As Barnes so elegantly and poignantly reveals, we are all unreliable narrators, redeemed not by the accuracy of our memories but by our willingness to question them." —</span></span><span class="a-text-italic" data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">The Boston Globe.</span></span><span data-dcnode-id="2754"><br data-dcnode-id="2755"></span><span class="a-text-italic" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2749"><br data-dcnode-id="2751"><span data-dcnode-id="2750" instrument_node="">“Quietly mesmerizing. . . . A slow burn, measured but suspenseful, this compact novel makes every slyly crafted sentence count.” —</span></span><span class="a-text-italic" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">The Independent</span></span><span data-dcnode-id="2741"><span data-dcnode-id="2746" instrument_node=""> (London)</span><br data-dcnode-id="2745"><span data-dcnode-id="2744" instrument_node="">&nbsp;</span><br data-dcnode-id="2743"><span data-dcnode-id="2742" instrument_node="">"Deliciously intriguing...with complex and subtle undertones [and] laced with Barnes' trademark wit and graceful writing." —</span></span><span class="a-text-italic" data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">The Washington Times</span></span></p><span data-dcnode-id="2737" instrument_node=""> </span></div><span data-dcnode-id="2735" instrument_node=""> </span><h3 data-dcnode-id="2732"><span data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2731" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2719"><span data-dcnode-id="2730" instrument_node=""> </span><span data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Julian Barnes&nbsp;is the author of twenty previous books including, most recently,&nbsp;</span></span><span class="a-text-italic" data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Keeping an Eye Open</span></span><span data-dcnode-id="2721"><span data-dcnode-id="2725" instrument_node="">. He has received the Man Booker Prize, the Somerset Maugham Award, the Geoffrey Faber Memorial Prize, the David Cohen Prize for Literature and the E. M. Forster Award from the American Academy of Arts and Letters; in France, the Prix Médicis and the Prix Femina; and in Austria, the State Prize for European Literature. In 2004 he was named Commandeur de l’Ordre des Arts et des Lettres by the French Ministry of Culture. His work has been translated into more than forty languages. He lives in London.</span><br data-dcnode-id="2724"><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">www.julianbarnes.com</span></span><span data-dcnode-id="2720" instrument_node=""> </span></div><span data-dcnode-id="2718" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2508" style="display:none"><span data-dcnode-id="2717" instrument_node=""> </span><h3 data-dcnode-id="2714"><span data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Excerpt. © Reprinted by permission. All rights reserved.</span></span></h3><span data-dcnode-id="2713" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2510"><span data-dcnode-id="2712" instrument_node=""> </span><span data-dcnode-id="2630"><span data-dcnode-id="2711" instrument_node="">I remember, in no particular order: </span><br data-dcnode-id="2710"><br data-dcnode-id="2709"><span data-dcnode-id="2708" instrument_node=""> – a shiny inner wrist; </span><br data-dcnode-id="2707"><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node=""> – steam rising from a wet sink as a hot frying pan is laughingly tossed into it; </span><br data-dcnode-id="2704"><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node=""> – gouts of sperm circling a plughole, before being sluiced down the full length of a tall house; </span><br data-dcnode-id="2701"><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node=""> – a river rushing nonsensically upstream, its wave and wash lit by half a dozen chasing torchbeams; </span><br data-dcnode-id="2698"><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node=""> – another river, broad and grey, the direction of its flow disguised by a stiff wind exciting the surface; </span><br data-dcnode-id="2695"><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node=""> – bathwater long gone cold behind a locked door. This last isn’t something I actually saw, but what you end up remembering isn’t always the same as what you have witnessed. </span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node=""> &nbsp;</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node=""> We live in time – it holds us and moulds us – but I’ve never felt I understood it very well. And I’m not referring to theories about how it bends and doubles back, or may exist elsewhere in parallel versions. No, I mean ordinary, everyday time, which clocks and watches assure us passes regularly: tick-tock, click-clock. Is there anything more plausible than a second hand? And yet it takes only the smallest pleasure or pain to teach us time’s malleability. Some emotions speed it up, others slow it down; occasionally, it seems to go missing – until the eventual point when it really does go missing, never to return. </span><br data-dcnode-id="2688"><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node=""> * * * </span><br data-dcnode-id="2685"><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node=""> I’m not very interested in my schooldays, and don’t feel any nostalgia for them. But school is where it all began, so I need to return briefly to a few incidents that have grown into anecdotes, to some approximate memories which time has deformed into certainty. If I can’t be sure of the actual events any more, I can at least be true to the impressions those facts left. That’s the best I can manage. </span><br data-dcnode-id="2682"><br data-dcnode-id="2681"><span data-dcnode-id="2680" instrument_node=""> There were three of us, and he now made the fourth. We hadn’t expected to add to our tight number: cliques and pairings had happened long before, and we were already beginning to imagine our escape from school into life. His name was Adrian Finn, a tall, shy boy who initially kept his eyes down and his mind to himself. For the first day or two, we took little notice of him: at our school there was no welcoming ceremony, let alone its opposite, the punitive induction. We just registered his presence and waited. </span><br data-dcnode-id="2679"><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">The masters were more interested in him than we were. They had to work out his intelligence and sense of discipline, calculate how well he’d previously been taught, and if he might prove ‘scholarship material’. On the third morning of that autumn term, we had a history class with Old Joe Hunt, wryly affable in his three-piece suit, a teacher whose system of control depended on maintaining sufficient but not excessive boredom. </span><br data-dcnode-id="2676"><br data-dcnode-id="2675"><span data-dcnode-id="2674" instrument_node=""> ‘Now, you’ll remember that I asked you to do some preliminary reading about the reign of Henry VIII.’ Colin, Alex and I squinted at one another, hoping that the ques­tion wouldn’t be flicked, like an angler’s fly, to land on one of our heads. ‘Who might like to offer a characterisation of the age?’ He drew his own conclusion from our averted eyes. ‘Well, Marshall, perhaps. How would you describe Henry VIII’s reign?”</span><br data-dcnode-id="2673"><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node=""> Our relief was greater than our curiosity, because Marshall was a cautious know-nothing who lacked the inventiveness of true ignorance. He searched for possible hidden complexities in the question before eventually locating a response. </span><br data-dcnode-id="2670"><br data-dcnode-id="2669"><span data-dcnode-id="2668" instrument_node=""> ‘There was unrest, sir.’ </span><br data-dcnode-id="2667"><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">An outbreak of barely controlled smirking; Hunt himself almost smiled. </span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">‘Would you, perhaps, care to elaborate?’ </span><br data-dcnode-id="2661"><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">Marshall nodded slow assent, thought a little longer, and decided it was no time for caution. ‘I’d say there was great unrest, sir.’ </span><br data-dcnode-id="2658"><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">‘Finn, then. Are you up in this period?’ </span><br data-dcnode-id="2655"><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">The new boy was sitting a row ahead and to my left. He had shown no evident reaction to Marshall’s idiocies. </span><br data-dcnode-id="2652"><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">‘Not really, sir, I’m afraid. But there is one line of thought according to which all you can truly say of any historical event – even the outbreak of the First World War, for example – is that “something happened”.’ </span><br data-dcnode-id="2649"><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">‘Is there, indeed? Well, that would put me out of a job, wouldn’t it?’ After some sycophantic laughter, Old Joe Hunt pardoned our holiday idleness and filled us in on the polygamous royal butcher. </span><br data-dcnode-id="2646"><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">At the next break, I sought out Finn.‘I’m Tony Webster.’ He looked at me warily. ‘Great line to Hunt.’ He seemed not to know what I was referring to. ‘About something happening.’ </span><br data-dcnode-id="2643"><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">‘Oh. Yes. I was rather disappointed he didn’t take it up.’ </span><br data-dcnode-id="2640"><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">That wasn’t what he was supposed to say. </span><br data-dcnode-id="2637"><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">Another detail I remember: the three of us, as a symbol of our bond, used to wear our watches with the face on the inside of the wrist. It was an affectation, of course, but perhaps something more. It made time feel like a personal, even a secret, thing.We expected Adrian to note the gesture, and follow suit; but he didn’t. </span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node=""> &nbsp;</span><br data-dcnode-id="2632"><span data-dcnode-id="2631" instrument_node=""> Later that day – or perhaps another day – we had a double English period with Phil Dixon, a young master just down from Cambridge. He liked to use contemporary texts, and would throw out sudden challenges.‘“Birth, and Copulation, and Death” – that’s what T. S. Eliot says it’s all about. Any comments?’ He once compared a Shakespearean hero to Kirk Douglas in </span></span><span class="a-text-italic" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Spartacus</span></span><span data-dcnode-id="2620"><span data-dcnode-id="2627" instrument_node="">. And I remember how, when we were discussing Ted Hughes’s poetry, he put his head at a donnish slant and murmured,‘Of course, we’re all wondering what will happen when he runs out of animals.’ Sometimes, he addressed us as ‘Gentlemen’. Naturally, we adored him. </span><br data-dcnode-id="2626"><br data-dcnode-id="2625"><span data-dcnode-id="2624" instrument_node="">That afternoon, he handed out a poem with no title, date or author’s name, gave us ten minutes to study it, then asked for our responses. </span><br data-dcnode-id="2623"><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">‘Shall we start with you, Finn? Put simply, what would you say this poem is </span></span><span class="a-text-italic" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">about</span></span><span data-dcnode-id="2550"><span data-dcnode-id="2617" instrument_node="">?’ </span><br data-dcnode-id="2616"><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">Adrian looked up from his desk. ‘Eros and Thanatos, sir.’ </span><br data-dcnode-id="2613"><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">‘Hmm. Go on.’ </span><br data-dcnode-id="2610"><br data-dcnode-id="2609"><span data-dcnode-id="2608" instrument_node="">‘Sex and death,’ Finn continued, as if it might not just be the thickies in the back row who didn’t understand Greek. ‘Or love and death, if you prefer.The erotic principle, in any case, coming into conflict with the death principle. And what ensues from that conflict. Sir.’ </span><br data-dcnode-id="2607"><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">I was probably looking more impressed than Dixon thought healthy. </span><br data-dcnode-id="2604"><br data-dcnode-id="2603"><span data-dcnode-id="2602" instrument_node="">‘Webster, enlighten us further.’ </span><br data-dcnode-id="2601"><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">‘I just thought it was a poem about a barn owl, sir.’ </span><br data-dcnode-id="2598"><br data-dcnode-id="2597"><span data-dcnode-id="2596" instrument_node="">This was one of the differences between the three of us and our new friend. We were essentially taking the piss, except when we were serious. He was essentially serious, except when he was taking the piss. It took us a while to work this out. </span><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node=""> &nbsp;</span><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node=""> Adrian allowed himself to be absorbed into our group, without acknowledging that it was something he sought. Perhaps he didn’t. Nor did he alter his views to accord with ours. At morning prayers he could be heard joining in the responses while Alex and I merely mimed the words, and Colin preferred the satirical ploy of the pseudo-zealot’s enthusiastic bellow.The three of us considered school sports a crypto-fascist plan for repressing our sex-drive; Adrian joined the fencing club and did the high jump. We were belligerently tone-deaf; he came to school with his clarinet. When Colin denounced the family, I mocked the political system, and Alex made philosophical objections to the perceived nature of reality, Adrian kept his counsel – at first, anyway. He gave the impression that he believed in things. We did too – it was just that we wanted to believe in our own things, rather than what had been decided for us. Hence what we thought of as our cleansing scepticism. </span><br data-dcnode-id="2591"><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node=""> The school was in central London, and each day we travelled up to it from our separate boroughs, passing from one system of control to another. Back then, things were plainer: less money, no electronic devices, little fashion tyranny, no girlfriends. There was nothing to distract us from our human and filial duty which was to study, pass exams, use those qualifications to find a job, and then put together a way of life unthreateningly fuller than that of our parents, who would approve, while privately comparing it to their own earlier lives, which had been simpler, and therefore superior. None of this, of course, was ever stated: the genteel social Darwinism of the English middle classes always remained implicit. </span><br data-dcnode-id="2588"><br data-dcnode-id="2587"><span data-dcnode-id="2586" instrument_node=""> ‘Fucking bastards, parents,’ Colin complained one Monday lunchtime. ‘You think they’re OK when you’re little, then you realise they’re just like . . .’ </span><br data-dcnode-id="2585"><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node=""> ‘Henry VIII, Col?’ Adrian suggested.We were beginning to get used to his sense of irony; also to the fact that it might be turned against us as well.When teasing, or calling us to seriousness, he would address me as Anthony; Alex would become Alexander, and the unlengthenable Colin shortened to Col. </span><br data-dcnode-id="2582"><br data-dcnode-id="2581"><span data-dcnode-id="2580" instrument_node=""> ‘Wouldn’t mind if my dad had half a dozen wives.’ </span><br data-dcnode-id="2579"><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">‘And was incredibly rich.’ </span><br data-dcnode-id="2576"><br data-dcnode-id="2575"><span data-dcnode-id="2574" instrument_node="">‘And painted by Holbein.’ </span><br data-dcnode-id="2573"><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">‘And told the Pope to sod off.’ </span><br data-dcnode-id="2570"><br data-dcnode-id="2569"><span data-dcnode-id="2568" instrument_node="">‘Any particular reason why they’re FBs?’ Alex asked Colin. </span><br data-dcnode-id="2567"><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">‘I wanted us to go to the funfair. They said they had to spend the weekedn gardening.’ </span><br data-dcnode-id="2564"><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">Right: fucking bastards. Except to Adrian, who listened to our denunciations, but rarely joined in. And yet, it seemed to us, he had more cause than most. His mother had walked out years before, leaving his dad to cope with Adrian and his sister. This was long before the term ‘single­parent family’ came into use; back then it was ‘a broken home’, and Adrian was the only person we knew who came from one. This ought to have given him a whole storetank of existential rage, but somehow it didn’t; he said he loved his mother and respected his father. Privately, the three of us examined his case and came up with a theory: that the key to a happy family life was for there not to be a family – or at least, not one living together. Having made this analysis, we envied Adrian the more. </span><br data-dcnode-id="2561"><span data-dcnode-id="2560" instrument_node="">&nbsp; </span><br data-dcnode-id="2559"><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node=""> In those days, we imagined ourselves as being kept in some kind of holding pen, waiting to he released into our lives. And when that moment came, our lives – and time itself – would speed up. How were we to know that our lives had in any case begun, that some advantage had already been gained, some damage already inflicted? Also, that our release would only be into a larger holding pen, whose boundaries would be at first undiscernible. </span><br data-dcnode-id="2556"><br data-dcnode-id="2555"><span data-dcnode-id="2554" instrument_node="">In the meantime, we were book-hungry, sex-hungry, meritocratic, anarchistic. All political and social systems appeared to us corrupt, yet we declined to consider an alternative other than hedonistic chaos. Adrian, however, pushed us to believe in the application of thought to life, in the notion that principles should guide actions. Previously, Alex had been regarded as the philosopher among us. He had read stuff the other two hadn’t, and might, for instance, suddenly declare, ‘Whereof we cannot speak, thereof must we remain silent.’ Colin and I would consider this idea in silence for a while, then grin and carry on talking. But now Adrian’s arrival dislodged Alex from his position – or rather, gave us another choice of philosopher. If Alex had read Russell and Wittgenstein, Adrian had read Camus and Nietzsche. I had read George Orwell and Aldous Huxley; Colin had read Baudelaire and Dostoevsky. This is only a slight caricature. </span><br data-dcnode-id="2553"><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">Yes, of course we were pretentious – what else is youth for? We used terms like ‘</span></span><span class="a-text-italic" data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Weltanschauung</span></span><span data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">’ and ‘</span></span><span class="a-text-italic" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Sturm und Drang</span></span><span data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">’, enjoyed saying ‘That’s philosophically self-evident’, and assured one another that the imagination’s first duty was to be transgressive. Our parents saw things differently, picturing their children as innocents suddenly exposed to noxious influence. So Colin’s mother referred to me as his ‘dark angel’; my father blamed Alex when he found me reading </span></span><span class="a-text-italic" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">The Communist Manifesto</span></span><span data-dcnode-id="2512"><span data-dcnode-id="2539" instrument_node="">; Colin was fingered by Alex’s parents when they caught him with a hard-boiled American crime novel. And so on. It was the same with sex. Our parents thought we might be corrupted by one another into becoming whatever it was they most feared: an incorrigible masturbator, a winsome homosexual, a recklessly impregnatory libertine. On our behalf they dreaded the closeness of adolescent friendship, the predatory behaviour of strangers on trains, the lure of the wrong kind of girl. How far their anxieties outran our experience. </span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">&nbsp; </span><br data-dcnode-id="2536"><br data-dcnode-id="2535"><span data-dcnode-id="2534" instrument_node=""> One afternoon Old Joe Hunt, as if picking up Adrian’s earlier challenge, asked us to debate the origins of the First World War: specifically, the responsibility of Archduke Franz Ferdinand’s assassin for starting the whole thing off. Back then, we were most of us absolutists. We liked Yes v No, Praise v Blame, Guilt v Innocence – or, in Marshall’s case, Unrest v Great Unrest. We liked a game that ended in a win and loss, not a draw. And so for some, the Serbian gunman, whose name is long gone from my memory, had one hundred per cent individual responsibility: take him out of the equation, and the war would never have happened. Others preferred the one hundred per cent responsibility of historical forces, which had placed the antagonistic nations on an inevitable collision course: ‘Europe was a powder keg waiting to blow’, and so on. The more anarchic, like Colin, argued that everything was down to chance, that the world existed in a state of perpetual chaos, and only some primitive storytelling instinct, itself doubtless a hangover from religion, retrospectively imposed meaning on what might or might not have happened. </span><br data-dcnode-id="2533"><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">Hunt gave a brief nod to Colin’s attempt to undermine everything, as if morbid disbelief was a natural by-product of adolescence, something to be grown out of. Masters and parents used to remind us irritatingly that they too had once been young, and so could speak with authority. It’s just a phase, they would insist. You’ll grow out of it; life will teach you reality and realism. But back then we declined to acknowledge that they had ever been anything like us, and we knew that we grasped life – and truth, and morality, and art – far more clearly than our compromised elders. </span><br data-dcnode-id="2530"><br data-dcnode-id="2529"><span data-dcnode-id="2528" instrument_node="">‘Finn, you’ve been quiet. You started this ball rolling. You are, as it were our Serbian gunman.’ Hunt paused to let the allusion take effect. ‘Would you care to give us the benefit of your thoughts?’ </span><br data-dcnode-id="2527"><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">‘I don’t know, sir.’ </span><br data-dcnode-id="2524"><br data-dcnode-id="2523"><span data-dcnode-id="2522" instrument_node="">‘What don’t you know?’ </span><br data-dcnode-id="2521"><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">‘Well, in one sense. I can’t know what it is that I don’t know. That’s philosophically self-evident.’ He left one of those slight pauses in which we again wondered if he was engaged in subtle mockery or a high seriousness beyond the rest of us.‘Indeed, isn’t the whole business of ascribing responsibility a kind of cop-out? We want to blame an individual so that everyone else is exculpated. Or we blame a historical process as a way of exonerating individuals. Or it’s all anarchic chaos, with the same consequence. It seems to me that there is – was – a chain of individual respon­sibilities, all of which were necessary, but not so long a chain that everybody can simply blame everyone else. But of course, my desire to ascribe responsibility might be more a reflection of my own cast of mind than a fair analysis of what happened.That’s one of the central problems of history, isn’t it, sir? The question of subjective versus objective interpretation, the fact that we need to know the history of the historian in order to understand the version that is being put in front of us.’ </span><br data-dcnode-id="2518"><br data-dcnode-id="2517"><span data-dcnode-id="2516" instrument_node="">There was a silence. And no, he wasn’t taking the piss, not in the slightest. </span><br data-dcnode-id="2515"><br data-dcnode-id="2514"><span data-dcnode-id="2513" instrument_node="">Old Joe Hunt looked at his watch and smiled. ‘Finn, I retire in five years. And I shall be happy to give you a reference if you care to take over.’ And he wasn’t taking the piss either.</span></span><span data-dcnode-id="2511" instrument_node=""> </span></div><span data-dcnode-id="2509" instrument_node=""> </span></div><span data-dcnode-id="2507" instrument_node=""> </span><div class="a-row" data-dcnode-id="2500"><span data-dcnode-id="2506" instrument_node=""> </span><a aria-expanded="false" class="a-expander-header a-declarative a-expander-extend-header" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="2502" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="2505"></i><span class="a-expander-prompt" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Read more</span></span></a><span data-dcnode-id="2501" instrument_node=""> </span></div><span data-dcnode-id="2499" instrument_node=""> </span></div><span data-dcnode-id="2497" instrument_node=""> </span></div><span data-dcnode-id="2495" instrument_node=""> </span></div><span data-dcnode-id="2493" instrument_node="">

</span><span data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">A DIFFICULT READ WITH INDECIPHERABLE REFLECTIONS</span></span><span data-dcnode-id="1549" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1545" data-hook="review-date"><span data-dcnode-id="1546" instrument_node="">Reviewed in the United States on February 6, 2018</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1542"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1543" data-hook="avp-badge-linkless"><span data-dcnode-id="1544" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1514"><span class="a-size-base review-text" data-dcnode-id="1515" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1516" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1523" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1541" instrument_node="">
</span><span data-dcnode-id="1525"><span data-dcnode-id="1540" instrument_node="">
  I’ve spent a lot of time, probably more than is healthy, staring at Julian Barnes’s author photo on the back cover of his Man Booker Prize winning novel, “The Sense of an Ending.”  I’m obsessed by his penetrating stare into my eyes that clearly says, “You didn’t understand a thing I said, did you, Goober?”  No.  No, I didn’t.</span><br data-dcnode-id="1539"><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">This book explores Tony Webster, his friends, and his meeting with Adrian Finn at school.  They were all sex-crazed, book obsessed, and gawky as they traded off-color jokes, rumors, witty gossip, and wanking experiences.  Adrian’s life turned to tragedy and they all moved on, trying to forget.  Tony, now middle-aged, has a career, is once-divorced, seems to get along with ex-wife and daughter, and certainly has no desire to hurt anyone.  But a lawyer’s letter, and an unexpected bequeathment that seems to be impossible to obtain, throws up a fog of past experiences and reflections that create hazy moments for me.</span><br data-dcnode-id="1536"><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">So here we have a prize-winning writer, author of several well-received books, with, in my mind, an obsession for turning phrases into indecipherable contemplation.  Many words have been used to describe Barnes’s writing.  Precise, dexterous, disturbing, insightful, elegiac, and provocative are just a few.  His mother, deeming him as having too much imagination, complained that his first book was a “bombardment” of filth.  Perhaps mother knows best.</span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">I did not find this chronicle on getting old, struggling with memories, and being plagued with regret an easy or enjoyable read.  So I crawl back to the cabbage patch and await the remarks from my erudite fellow reading club members to help me make some sense of it all.</span><br ></i></a><span class="a-letter-space" data-dcnode-id="1473"></span><a class="a-size-base a-link-normal review-title a-color-base review-title-content a-text-bold" data-dcnode-id="1468" data-hook="review-title" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.com/gp/customer-reviews/R35O2A5KI5Z95Q%3FASIN%3D0307947726"><span data-dcnode-id="1472" instrument_node="">
</span><span data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Writing for the head, not for the heart.</span></span><span data-dcnode-id="1469" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1465" data-hook="review-date"><span data-dcnode-id="1466" instrument_node="">Reviewed in the United States on July 6, 2017</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1462"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1463" data-hook="avp-badge-linkless"><span data-dcnode-id="1464" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1432"><span class="a-size-base review-text" data-dcnode-id="1433" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1434" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1441" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1461" instrument_node="">
</span><span data-dcnode-id="1443"><span data-dcnode-id="1460" instrument_node="">
  I recently read Julian Barnes’ The Sense of an Ending (Vintage International, 2012), and when I finished it, I did something I have never done before: I immediately turned back to the first page and started over again. I didn’t do this because I so greatly enjoyed the book, exactly. It’s not exactly an enjoyable book, at least not in the sense that some old favorite is enjoyable, the kind of old favorite you read over and over again like comfort food, escaping reality for a few hours to return to a world as familiar as reality, but a lot more pleasant and comfortable. It’s not that kind of book.</span><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">Instead, it is intensely compelling and disturbing, a thought-provoking book that demands you reflect on your own life, your own past, your own memories.</span><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">The book is divided into two parts. That’s the kind of meaningless piece of information that normally alerts the reader of a review that the reviewer has nothing meaningful to say, but it is important here because the first part is a more or less straight forward account of a sequence of events in the narrator’s youth as he remembers them. The second part, almost twice as long as the first, is the narrator’s attempt to unravel the skein of memory and to reconcile reality both with memory and with what Faulkner once called “the irrevocable might-have-been.” And therein lies the book’s genius.</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">Memory is tenuous and all too unreliable, sometimes even recent memory. It is the secular reason why I don’t believe in the death penalty (I also have religious objections): it is all too easy for memory to deceive us, to trick us into believing A when it was really B all along. I was once involved in a criminal police investigation and asked to give certain information. When it came to describing the suspect’s car, I answered with great certainty that it was brand new and bright red. I remember the blank looks on officers’ faces. The suspect’s car was brand new and bright blue. I had seen it, I had seen it clearly. I had even stood looking at it for several minutes, but because it was a new model, magazines were filled with ads, and television commercials ran on every network, showing bright red models and memory had conflated the two in my mind.</span><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">In the same way, one of the key points in The Sense of an Ending hinges on a letter which the narrator remembers one way in Part One, but which we—and he—discover in Part Two to have been very different than his memory would have it. (The phrasing of that sentence should give you a clue to what the reality was.)</span><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">The letter is pivotal because the narrator believes it to have set off a sequence of events he deeply regrets, and he is forced to reexamine his own story of himself. And that is what Barnes is asking us to do, to determine if the history of our lives is accurate, or if we have made convenient cuts and edits, or perhaps added a few cunning and subtle embellishments over the years, to diminish this painful reality here or that uncomfortable truth over there. We all long to be a little better than we are, and the stories of our lives, the stories we tell ourselves and others, reflect that longing, consciously or unconsciously.</span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">In Atonement, Ian McEwan’s central character wants desperately to undo something she did as a child, something she too deeply regrets, and that novel ends with recognition of the futility of trying to change the past. We do terrible things, sometimes, intentionally or unintentionally, and we must learn to live with the consequences of those mistakes. Julian Barnes is also writing about living with consequences, about living with ourselves as we really are, and his narrator, like the narrator of Atonement, finally accepts that. But unlike the narrator of Atonement, Barnes’ narrator does not deliberately create a lie to satisfy his longing, unless you consider pushing the past aside—storing it in an unused closet of the mind—a kind of lie. Instead, his encounter with the reality of the past is thrust upon him and he must slowly come to grips with what really was, some of which may have been partially his own doing, some of which was not.</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">As long as I’m comparing the two novels, I find Ian McEwan’s writing to be much more emotionally engaging than Julian Barnes’. I read somewhere once that Barnes’ brother is a philosopher, and I can readily believe it because that kind of detached, cerebral quality permeates everything I have read by Barnes, including The Sense of an Ending. That is not to be construed as praise: I find the absence of emotional engagement and sensory detail off-putting, though I have no way of knowing if that is intentional on the author’s part or not. As my friend Dan Bronson (Confessions of a Hollywood Nobody) likes to say about writing (quoting Herman Melville’s letter to Nathaniel Hawthorn discussing writing): “I stand for the heart. To the dogs with the head! I had rather be a fool with a heart than Jupiter Olympus with his head.” Atonement is packed with such empathetic characters, including the little girl who ruins the lives around her, that you ache for them all. The Sense of an Ending has characters whose personalities are so reserved as to make them almost unknowable, and whose motivations and emotions we never fully understand, while the narrator, Tony, is completely emotionless in a frightfully British, stiff upper lip sort of way, so that at the end, when a bombshell is set off in what he thinks he understands about his life and actions and the memories of those two things, he simply ruminates on the advantages of thin chips (French fries) over fat ones. That’s not the best way to stir emotions in a reader either.</span><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">And yet… I have never before read a book straight through twice in a row, so clearly something in me was engaged, perhaps not by my heartstrings, but engaged nonetheless.
</span></span><span data-dcnode-id="1442" instrument_node="">

</span><span data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">A Sense of one's own Ending</span></span><span data-dcnode-id="1387" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1383" data-hook="review-date"><span data-dcnode-id="1384" instrument_node="">Reviewed in the United States on May 8, 2017</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1380"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1381" data-hook="avp-badge-linkless"><span data-dcnode-id="1382" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1366"><span class="a-size-base review-text" data-dcnode-id="1367" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1368" style="max-height:300px"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1375" data-hook="review-collapsed"><span data-dcnode-id="1379" instrument_node="">
</span><span data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">
  The prose is written in a meditative style and as a reader you are included in the internal debates of the narrator.  This makes for absorbing reading. The anti-hero, protagonist, Tony Webster is a sort of everyman character - nothing exceptional, living an ordinary life, as it were creaking his way to the crematorium. A lawyer's letter forces him to re-engage with his past and consider errors of judgement that had far-reaching consequences particularly for his developing a reclusive character, unwilling to expose himself to unnecessary hurt. The novel forces us to reconsider our pasts and how our selective memories can trick us into a false sense of complacency.As a history teacher I found the passages that consider history, particularly in the lessons that Tony remembers from his schooldays, a stimulating perspective on our personal histories and how the past is another country. But Julian Barnes is saying the past is a country that should be revisited if we are to find any meaning in our lives especially when we come to the end of our lives so that we can  make sense of the ending.
</span></span><span data-dcnode-id="1376" instrument_node="">

</span><span data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">To Begin, Wear Your Watch Backwards.</span></span><span data-dcnode-id="1294" instrument_node="">
</span></span></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1290" data-hook="review-date"><span data-dcnode-id="1291" instrument_node="">Reviewed in the United Kingdom on June 30, 2018</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1287"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1288" data-hook="avp-badge-linkless"><span data-dcnode-id="1289" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1270"><span class="a-size-base review-text" data-dcnode-id="1271" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1272" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1279" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node="">
  This Man Booker prize-winner plunges the reader into a postmodern potpourri of misleading signs, ambiguous statements and along roads that point one way but lead somewhere quite different. One sequence of events creates an illusory sense of an evolving narrative which then gets undercut and disrupted by another. Tony's relationship with Veronica, for example, is contested by another suggested relationship with her mother, Sarah. Strange horizontal hand movements and the symbolic flipping of eggs in a pan hint at something going on which only exists in an interstitial narrative space which history and memory can't or won't reach. Julian Barnes is brilliant at these deflections and refractions of sense, 'where the imperfections of memory meet the inadequacies of documentation'. The narrative constantly deconstructs itself, pathetically seeking corroboration of its flimsy acts of recall. Adrian's diary is a piece of the Webster jigsaw that can't be bequeathed, with all the legal wrangling in the world, because getting it 'might disrupt the banal reiteration of memory. It might jump-start something - though I had no idea what.' And that's the point. Tony can't 'travel'; he is stuck in 'subjective time, the kind you wear on your wrist', where the watch has been flipped over. This is 'true time', according to Tony, which 'is measured in your relationship to your memory.'</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">Julian Barnes celebrates the fluidity of the displaced and disruptive voice of a man who, according to Veronica, 'never gets it, and never will'. 'Time', the story spells out, 'is not a fixative - it's a solvent'. Events deliquesce and memories melt through bizarre Oedipal shifts; time warps across vast biographical distances and then collapses into a short anecdotal account of some vague sense of what might be true, or what can be 'got' from Adrian's cryptic equation. The disturbing interflux between historical certainty and the unreliable accumulation of memories makes this a totally compelling read, and if you feel let down by the sense of an ending on p.151, that's precisely, I suspect, what Barnes wants us to feel. Scratch your head into the early hours as you try to work it all out if you want, or, better, turn your watch over and think about it again while you're flipping over the fried eggs in the morning.

</span><span data-dcnode-id="1224"><span data-dcnode-id="1227" instrument_node="">
  It is not safe to assume that every Booker prize winning novel will be memorable. That is partly down to personal taste, but several recent winners have been disappointing, and reviewed as such by myself amongst others. The sense of an ending is a fine book, worthy of the prize winning accolade. Barnes turns the story of a few relatively undistinguished middle class teenagers into something memorable. He explores the difficulties of growing up; the first tentative steps of building a relationship, and contrives to make a very ordinary life utterly fascinating. He follows two of the teenagers into mature adulthood.It is the very "ordinariness" of the main character which makes his depiction a triumph.Along the way, he teases the reader with gentle insights into philosophy and depicts the sharp pain of rejection quite superbly. His use of language is a delight and the story unfolds with masterly skill. I suspect,like me, many readers will have decided the ending well in advance. I got it wrong. Often a subtle book of this type struggles to find a satisfactory conclusion, but this one succeeds and even adds the perfect title.</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">I am delighted to have read this book and will remember certain elements for a very long time.

</span><span data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">I felt no involvement in this "story"</span></span><span data-dcnode-id="1179" instrument_node="">
</span></span></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1175" data-hook="review-date"><span data-dcnode-id="1176" instrument_node="">Reviewed in the United Kingdom on November 7, 2020</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1172"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1173" data-hook="avp-badge-linkless"><span data-dcnode-id="1174" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1158"><span class="a-size-base review-text" data-dcnode-id="1159" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1160" style="max-height:300px"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1167" data-hook="review-collapsed"><span data-dcnode-id="1171" instrument_node="">
</span><span data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">
  After all the ecstatic reviews I thought I must have missed something because sadly this book said nothing to me.  I found virtually all the characters mere outlines and I felt no involvement with them at all.  And those that were more defined were unlikeable:  the obnoxious Veronica, and Tony, the central figure, wallowing in memories of the past and too wishy washy to stand up to Veronica's unpleasantness.  Then Adrian, a central part of "the story" (which to me wasn't really a story, but more like an impersonal account) was a shadowy figure who, when he was involved, seemed rather too aloof and precocious to be likeable.  At the end (I was determined to finish it ... I don't like giving up on books) I simply thought:  "so what?".  It being by Julian Barnes, I really wanted to like it but just couldn't get there.
</span></span><span data-dcnode-id="1168" instrument_node="">

</span><span data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">
  Entertaining middlebrow novella of middle class mores, misunderstandings, and remorse, structured within a superficially satisfying but vapid historical and philosophical paradigm, written with wit and engaging charm, but lacking in literary substance or profundity, and mistakingly awarded the Booker Prize in lieu of a lifetime achievement award.</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">A sort of grown up Frederick Raphael of suburban ordinariness and redbrick, combined honours didacticism, best read in one or two sittings as a sharpener between more substantial and rewarding fare, by those in search of a light diversion in Metroland, or as an author's gentle satire on the constrained emotionalism and pallid intellectualism of his perceived readership.
