</span><span data-dcnode-id="2485" instrument_node="">
</span></header><section class="article-body" data-dcnode-id="919" id="article-body" itemprop="articleBody"><span data-dcnode-id="2483" instrument_node=""> </span><p data-dcnode-id="2472"><span data-dcnode-id="2482" instrument_node="">Looking for the best thrillers of 2020? Well, we've got good news: there were a whole heck of a lot of them. When you think of the heyday of thriller movies, most folks will probably go straight to the 50s/60s era or the 80s/90s era. And that is </span><em data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">correct</span></em><span data-dcnode-id="2479" instrument_node="">, because those decades were a dang goldmine of straight-up suspenseful domestic dramas, </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//collider.com/best-film-noir-movies/"><span data-dcnode-id="2478" instrument_node="">noir mysteries</span></a><span data-dcnode-id="2476" instrument_node="">, and </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//collider.com/18-erotic-thriller-movies-to-watch-instead-of-fifty-shades-of-grey/"><span data-dcnode-id="2475" instrument_node="">erotic thrillers</span></a><span data-dcnode-id="2473" instrument_node=""> that kept the blood pumping. But thrillers are actually doing pretty great these days too, they've just evolved a bit. Sure you'll still see the odd simple stalker, the occasional crazed ex, and a spot of classic Hitcockian murder mystery, but for the most part, thrillers have gotten wilder and more genre-bending over the years, leading to the kind of multi-hyphenates that render labels almost useless -- hell, several films below could be described as dark comedy sci-fi horror thrillers.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><span data-dcnode-id="2467" instrument_node=""> </span><p data-dcnode-id="2462"><span data-dcnode-id="2466" instrument_node="">But even though it's harder than ever to slap simple genre labels on things, the Collider staff set out to pick our favorite thrillers of the year, and we came back with one massive, wild list. Some of them are scary, some of them are funny, some of them are sexy -- plenty of them are all that and more -- but the one thing the movies below definitely have in common is the classic thriller touch that will keep you surprised, in suspense, and excited for the next reveal. And if you're looking for more movies to watch, check out all of our </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/best-of-2020/"><span data-dcnode-id="2465" instrument_node="">Best of 2020 lists</span></a><span data-dcnode-id="2463" instrument_node="">.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><span data-dcnode-id="2459" instrument_node="">
</span><span data-dcnode-id="2457" instrument_node="">
</span><span data-dcnode-id="2455" instrument_node="">
</span><h2 data-dcnode-id="2453" id="12-hour-shift"><span data-dcnode-id="2454" instrument_node=""> 12 Hour Shift</span></h2><span data-dcnode-id="2452" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="2424"><span data-dcnode-id="2451" instrument_node="">
</span><div class="responsive-img expandable img-article-item" data-dcnode-id="2426" data-img-caption="&quot;Image via Magnolia Pictures \/ Magnet Releasing&quot;" data-img-url="https://static1.colliderimages.com/wordpress/wp-content/uploads/2020/08/angela-bettis-12-hour-shift.jpg" data-modal-container-id="single-image-modal-container" data-modal-id="single-image-modal" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="2450" instrument_node="">
</span><figure data-dcnode-id="2428"><span data-dcnode-id="2449" instrument_node="">

</span></div><span data-dcnode-id="2423" instrument_node=""> </span><p data-dcnode-id="2399"><span data-dcnode-id="2422" instrument_node="">If you like a little laughter with your thrills, settle in for a snappy, dark comedy thriller with </span><strong data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Brea Grant’</span></strong><span data-dcnode-id="2419" instrument_node="">s </span><strong data-dcnode-id="2415"><em data-dcnode-id="2416"><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/12-hour-shift/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2418" instrument_node="">12 Hour Shift</span></a></em></strong><span data-dcnode-id="2414" instrument_node="">. Set in a hospital during one very gnarly, unrelenting night, the film stars </span><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Angela Bettis</span></strong><span data-dcnode-id="2411" instrument_node=""> as a nurse whose black market organ-selling scheme goes catastrophically off track when her not-to-bright but </span><em data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">extremely </span></em><span data-dcnode-id="2408" instrument_node="">determined cousin (</span><strong data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Chloe Farnworth</span></strong><span data-dcnode-id="2405" instrument_node="">) loses a harvested kidney. Grant has an ear for lively dialogue and a sharp eye (especially in a delightfully random scene transition that breaks out the dance moves,) but as an experienced actor herself, she’s especially keen at getting killer performances out of her cast. Genre staple Angela Bettis is, as always, commanding and nuanced in the lead, and </span><strong data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">David Arquette</span></strong><span data-dcnode-id="2402" instrument_node=""> charms his way through his minimal scenes, but Farnworth is a dang force of nature as an unstoppable dimwit who will do whatever it takes to save her own dolled-up skin, no matter how dastardly. It's the kind of genre-bender that will have you cringing through the comedy and smiling through the squirmiest bits. - </span><em data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="2398" instrument_node="">

</span></div><span data-dcnode-id="2358" instrument_node=""> </span><p data-dcnode-id="2342"><span data-dcnode-id="2357" instrument_node="">Director </span><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">John Hyams</span></strong><span data-dcnode-id="2354" instrument_node=""> impressed the hell out of me with this simple, sparse and incredibly effective thriller about a young woman trying to escape a serial killer in the woods. </span><strong data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Jules Willcox</span></strong><span data-dcnode-id="2351" instrument_node=""> stars as one of the year's very best movie heroines, while </span><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Marc Menchaca</span></strong><span data-dcnode-id="2348" instrument_node=""> (</span><em data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">The Outsider</span></em><span data-dcnode-id="2345" instrument_node="">) is nothing less than chilling as the sadistic stalker who gets off on hunting and toying with his prey. I've seen 100 different variations of this movie, but rarely are they as well done or as impressive photographed. Hyams handles the suspense perfectly, turning a familiar premise into an altogether gripping experience nonetheless. - </span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="2341" instrument_node="">

</span></div><span data-dcnode-id="2303" instrument_node=""> </span><p data-dcnode-id="2285"><span data-dcnode-id="2302" instrument_node="">One of the few must-watch true crime documentaries of 2020, </span><strong data-dcnode-id="2298"><em data-dcnode-id="2299"><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/american-murder-the-family-next-door/"><span data-dcnode-id="2301" instrument_node="">American Murder: The Family Next Door</span></a></em></strong><span data-dcnode-id="2297" instrument_node=""> takes on an altogether more eerie and unsettling texture given the way it is presented. </span><strong data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Jenny Popplewell</span></strong><span data-dcnode-id="2294" instrument_node="">’s unflinching doc looks at the Watts family murders, which took place in 2018 in suburban Colorado. Utilizing body cam footage, surveillance video from the local police station, and social media uploads from the murdered woman, Popplewell slowly reveals what really happened to a young mother and her two daughters and who was responsible. It takes a tragic scenario and makes it even more chilling. And there are unforgettable, telling moments like the police interviewing a neighbor who has a motion sensor camera set up outside his home and who, after interviewing the husband of the missing mother, the good ole boy neighbor suggesting to the cops that </span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">something is up with him</span></em><span data-dcnode-id="2291" instrument_node="">. Uncluttered by talking-head interviews, cheesy reenactments or unnecessary commentary, instead letting the horror of the actual case unfold before your eyes, </span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">American Murder</span></em><span data-dcnode-id="2288" instrument_node=""> was one of the scariest, most psychologically complex movies of the year, without the benefit of a single ghoul or goblin. – </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Drew Taylor</span></em></p><span data-dcnode-id="2284" instrument_node="">

</span></div><span data-dcnode-id="2246" instrument_node=""> </span><p data-dcnode-id="2206"><span data-dcnode-id="2245" instrument_node="">It would've been fascinating to see this film released in theaters, as I suspect it would've been laughed out of the multiplex or hailed as a masterpiece. The truth is more complicated, as </span><strong data-dcnode-id="2241"><em data-dcnode-id="2242"><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/antebellum/"><span data-dcnode-id="2244" instrument_node="">Antebellum</span></a></em></strong><span data-dcnode-id="2240" instrument_node=""> is neither a failure nor a triumph. Directed by activist filmmakers </span><strong data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Gerard Bush</span></strong><span data-dcnode-id="2237" instrument_node=""> and </span><strong data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Christopher Renz</span></strong><span data-dcnode-id="2234" instrument_node="">, </span><em data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Antebellum</span></em><span data-dcnode-id="2231" instrument_node=""> stars </span><strong data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Janelle Mon</span></strong><span data-dcnode-id="2228" instrument_node="">á</span><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">e</span></strong><span data-dcnode-id="2225" instrument_node=""> in dual roles as a plantation slave named Eden and a successful author named Veronica. Do they exist in two separate timelines? Is Veronica a descendant of Eden? By the time the truth is revealed, you may have already lost patience with </span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Antebellum</span></em><span data-dcnode-id="2222" instrument_node="">, but there's no question that the imagery in this film is powerful, and the haunting score by </span><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Nate Wonder</span></strong><span data-dcnode-id="2219" instrument_node=""> and </span><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Roman Gianarthur</span></strong><span data-dcnode-id="2216" instrument_node=""> is superb. In another world, </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Antebellum</span></em><span data-dcnode-id="2213" instrument_node=""> might've been a </span><strong data-dcnode-id="2210"><em data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Get Out</span></em></strong><span data-dcnode-id="2209" instrument_node="">-like sensation, but as it stands, it's a decent-enough VOD rental with a provocative premise that should spark an interesting discussion after the film. - </span><em data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="2205" instrument_node="">

</span></div><span data-dcnode-id="2166" instrument_node=""> </span><p data-dcnode-id="2142"><span data-dcnode-id="2165" instrument_node="">Honestly, this was the best movie that I saw at the 2020 Sundance Film Festival. The story is so incredible, I don't even think you could write it. Such is life... and in this case, death, as implied by the title. Directed by </span><strong data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Ryan White</span></strong><span data-dcnode-id="2162" instrument_node=""> (</span><em data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">The Keepers</span></em><span data-dcnode-id="2159" instrument_node="">), </span><strong data-dcnode-id="2155"><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Assassins</span></em><span data-dcnode-id="2156" instrument_node=""> </span></strong><span data-dcnode-id="2154" instrument_node="">follows two young women who are tricked into assassinating </span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Kim Jong-nam</span></strong><span data-dcnode-id="2151" instrument_node="">, the half-brother of North Korean leader </span><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Kim Jong-un</span></strong><span data-dcnode-id="2148" instrument_node="">, who may have even been behind the hit. Basically, these two admittedly gullible women believe that they're just part of a prank show that involves them placing their hands over the eyes of strangers from behind. Despite having a very capable legal team working on their behalf, their pleas seem to fall on deaf ears, since the fact that the women were involved in Kim Jong-nam's murder was never in doubt -- it was all about what they knew, or didn't know, in this case. </span><em data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Assassins</span></em><span data-dcnode-id="2145" instrument_node=""> offers a weird, wild story that simply has to be seen to be believed, and I promise it's as gripping as any thriller that came out this year. - </span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="2141" instrument_node="">

</span></div><span data-dcnode-id="2103" instrument_node=""> </span><p data-dcnode-id="2086"><span data-dcnode-id="2102" instrument_node="">This movie is bonkers. I don't know what else to tell you. It's a "weird western" from Brazilian filmmakers </span><strong data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Kleber Mendonca Filho</span></strong><span data-dcnode-id="2099" instrument_node=""> and </span><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Juliano Dornelles</span></strong><span data-dcnode-id="2096" instrument_node=""> about a small rural town where some strange stuff starts to go down following the death of its 94-year-old matriarch. It all culminates in a bloody standoff between the town's residents and a group of American tourists, led by genre movie icon </span><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Udo Kier</span></strong><span data-dcnode-id="2093" instrument_node="">, who have come to hunt them for sport. The film is extremely graphic in its violence, and yet it has something to say. There's something on its mind besides empty bloodlust.</span><strong data-dcnode-id="2090"><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node=""> Bacurau</span></em></strong><span data-dcnode-id="2089" instrument_node=""> certainly won't be everyone's cup of tea, but those who indulge in twisted cult films should come away more than satisfied. - </span><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="2085" instrument_node="">

n mean. That said, if you’re a fan of bloody slashers, it’s one of the best to come out this year, complete with one truly shocking demise that will have you recommending the film to friends immediately after you see it. - </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Tom Reimann</span></em></p><span data-dcnode-id="2019" instrument_node="">

</span></div><span data-dcnode-id="1981" instrument_node=""> </span><p data-dcnode-id="1952"><span data-dcnode-id="1980" instrument_node="">If you like your thrillers psychological, settle in for the emotionally wrenching, anxiety-inducing </span><strong data-dcnode-id="1977"><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Black Bear</span></em></strong><span data-dcnode-id="1976" instrument_node="">. An unflinching examination of creative vanity and the emotional minefields some creators build and walk through in pursuit of their art, </span><strong data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Lawrence Michael Levine</span></strong><span data-dcnode-id="1973" instrument_node="">’s horror-tinged psychological drama stars </span><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Aubrey Plaza</span></strong><span data-dcnode-id="1970" instrument_node=""> in the most striking dramatic performance of her career to date, with costars </span><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Christopher Abbot</span></strong><span data-dcnode-id="1967" instrument_node=""> and </span><strong data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Sarah Gadon</span></strong><span data-dcnode-id="1964" instrument_node=""> matching her beat for beat. Split across two mirroring parts, </span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Black Bear</span></em><span data-dcnode-id="1961" instrument_node=""> stars Plaza first as a filmmaker dismantling a rocky relationship as part of her creative process then flips the script in the second half, casting her as an actress who goes a bit too method when she suspects her director husband is having an affair. Each half is as relentlessly tense as the other and while you might find yourself wanting more answers than the film is willing to give, taken at face value </span><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Black Bear</span></em><span data-dcnode-id="1958" instrument_node=""> is a fascinating dissection of toxic creativity featuring not one, but </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">two</span></em><span data-dcnode-id="1955" instrument_node=""> electric performances from Plaza. – </span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="1951" instrument_node="">

</span><img alt="blow-the-man-down" class="lazyload" data-dcnode-id="1924" data-img-url="https://static1.colliderimages.com/wordpress/wp-content/uploads/2020/12/blow-the-man-down.jpg" height="700" width="1400"><span data-dcnode-id="1923" instrument_node="">

</span></div><span data-dcnode-id="1912" instrument_node=""> </span><p data-dcnode-id="1873"><span data-dcnode-id="1911" instrument_node="">Writer/director team </span><strong data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Bridget Savage Cole</span></strong><span data-dcnode-id="1908" instrument_node=""> and </span><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Danielle Krudy</span></strong><span data-dcnode-id="1905" instrument_node="">’s </span><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Blow the Man Down</span></strong><span data-dcnode-id="1902" instrument_node=""> is a strong newcomer to the thriller category. Very much the love child of </span><strong data-dcnode-id="1899"><em data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Fargo</span></em></strong><span data-dcnode-id="1898" instrument_node=""> and a mournful sea shanty, </span><strong data-dcnode-id="1895"><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Blow the Man Down </span></em></strong><span data-dcnode-id="1894" instrument_node="">transports us to a seaside town in Maine where two sisters, Priscilla and Mary Beth Connolly (played by </span><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Sophie Lowe </span></strong><span data-dcnode-id="1891" instrument_node="">and </span><strong data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Morgan Saylor</span></strong><span data-dcnode-id="1888" instrument_node="">),</span><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node=""> </span></strong><span data-dcnode-id="1885" instrument_node="">must figure out how to cover up a crime committed by one of the pair. In a small town where everyone knows everyone, this is no easy feat. It gets even more complicated when the crime reels in the town’s local madam (</span><strong data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Margo Martindale</span></strong><span data-dcnode-id="1882" instrument_node="">) and a local sheriff who’s sweet on Priscilla. </span><em data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Blow the Man Down </span></em><span data-dcnode-id="1879" instrument_node="">is a gritty thriller filled with visceral, real-world stakes. Cole and Krudy’s script is stripped of any fluff and wound so tightly that you can feel the tension in every scene. </span><em data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Blow the Man Down </span></em><span data-dcnode-id="1876" instrument_node="">evokes pared-down thrillers of the ‘70s and ‘80s while confidently standing on its own two feet as it weaves a story that is, refreshingly, using a historically male-dominated genre to tell a story about women and the choices they must make to survive. - </span><em data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Allie Gemmill</span></em></p><span data-dcnode-id="1872" instrument_node="">

</span></div><span data-dcnode-id="1834" instrument_node=""> </span><p data-dcnode-id="1818"><span data-dcnode-id="1833" instrument_node="">This strangely timely film starring </span><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Mary J. Blige</span></strong><span data-dcnode-id="1830" instrument_node=""> follows four New Orleans cops who are haunted by a vengeful spirit after the death of black youth and the subsequent police cover-up. In a strange way, this supernatural revenge movie felt practically cathartic this summer, seeing as how it sees out-of-control cops get their comeuppance. I don't typically expect this kind of social commentary in genre films released straight to VOD, so kudos to director </span><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Malik Vitthal</span></strong><span data-dcnode-id="1827" instrument_node=""> and screenwriters </span><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Nicholas McCarthy</span></strong><span data-dcnode-id="1824" instrument_node=""> and </span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Richmond Riedel </span></strong><span data-dcnode-id="1821" instrument_node="">for coming up with an entertaining way to make some important points about police violence. Vitthal has a strong sense of style, and there is some really startling imagery in this film that should entice viewers who give this one a chance. - </span><em data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="1817" instrument_node="">

</span></div><span data-dcnode-id="1781" instrument_node=""> </span><p data-dcnode-id="1758"><span data-dcnode-id="1780" instrument_node="">Let’s get one thing straight: I am absolutely, 100% recommending you watch the film </span><strong data-dcnode-id="1777"><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Butt Boy</span></em></strong><span data-dcnode-id="1776" instrument_node="">, but should you decide to follow that recommendation, you are not allowed to come back here and get mad at me when</span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node=""> Butt Boy</span></em><span data-dcnode-id="1773" instrument_node=""> starts doing stuff that a movie called </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Butt Bo</span></em><span data-dcnode-id="1770" instrument_node="">y is gonna’ do. I cannot possibly stress enough that the plot of this film is a cat-and-mouse crime-thriller between an alcoholic detective (</span><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Tyler Rice</span></strong><span data-dcnode-id="1767" instrument_node="">) and a man named Chip (</span><strong data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Tyler Kornack</span></strong><span data-dcnode-id="1764" instrument_node="">) who becomes so obsessed with sticking larger and larger objects up his butt he starts setting his sights on people. Deeply strange, equal parts funny and disgusting, and sneakily moving by the end, this movie—John Waters’ top pick of 2020, FYI—is, most importantly, never embarrassed by itself. Director, co-writer, and star Cornack presents his ass-tastic tale of murder and mess with such a deadpan seriousness that, much like Chip’s victims, you can’t help but get lost in it. It’s gross and weird, but endearingly gross and weird, and underneath all that excrement is a genuinely effective metaphor for addiction. If nothing else, </span><em data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Butt Boy</span></em><span data-dcnode-id="1761" instrument_node=""> won’t be like anything you’ve ever seen, as long as you’ve got the stomach for it. --</span><em data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Vinnie Mancuso</span></em></p><span data-dcnode-id="1757" instrument_node="">

</span></div><span data-dcnode-id="1719" instrument_node=""> </span><p data-dcnode-id="1710"><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/come-to-daddy/"><strong data-dcnode-id="1716"><em data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Come to Daddy</span></em></strong></a><span data-dcnode-id="1714" instrument_node=""> exists in a strange genre no man’s land. It’s a comedy, but I’d be reluctant to share it with someone who was just looking for a bust-up laugh. It’s a slyly touching drama, but it’s too brutal to recommend to someone looking for a cathartic cry. And it </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">is</span></em><span data-dcnode-id="1711" instrument_node=""> brutal, but it’s not quite scary enough to be a straight-up horror movie. But it's definitely thrilling, on that I'm absolutely certain.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1697"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Ant Timpson</span></strong><span data-dcnode-id="1706" instrument_node="">'s wild, unpredictable, and fearlessly fucked movie about overcoming your daddy issues stars </span><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Elijah Wood</span></strong><span data-dcnode-id="1703" instrument_node=""> as a soft boi who treks to an unknown remote cabin to bond with his long-estranged father, only to find a real cantankerous son-of-a-bitch (</span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Stephen McHattie</span></strong><span data-dcnode-id="1700" instrument_node="">) who seemingly wants nothing to do with him, much less patching up old wounds. I’d say the rest of the movie is like a roller coaster, but it’s really more like one of those 3D simulation rides, where the whole world shifts around you without warning, and you just kind of sit there awestruck at the journey that just unfolded. It's one of those films that is decidedly "not for everyone", but if you like a film that flies its freak flag proudly while keeping you on the edge of your seat, you might have a hoot with this prickly little puzzle of a movie. - </span><em data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="1696" instrument_node="">

</span></div><span data-dcnode-id="1659" instrument_node="">
</span></div><span data-dcnode-id="1657" instrument_node=""> </span><p data-dcnode-id="1628"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Chris Hemsworth</span></strong><span data-dcnode-id="1654" instrument_node=""> </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//collider.com/extraction-chris-hemsworth-fights-children/"><span data-dcnode-id="1653" instrument_node="">beats the stuffing out of a group of literal children</span></a><span data-dcnode-id="1651" instrument_node="">. Do I have your attention yet? If this doesn’t grab you, something else in </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/extraction/"><strong data-dcnode-id="1648"><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Extraction</span></em></strong></a><span data-dcnode-id="1646" instrument_node=""> will. The Netflix action-thriller, the directorial debut from stunt performer and coordinator </span><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Sam Hargrave</span></strong><span data-dcnode-id="1643" instrument_node="">, is chock full of inventive set pieces, jaw-dropping depictions of intense brutality, some of the best physical performers you’ll see in any contemporary film, and a one-shot sequence that stopped my breath during its entirety. </span><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Extraction</span></em><span data-dcnode-id="1640" instrument_node=""> ain’t just an excuse to give Hemsworth his own </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">John Wick</span></em><span data-dcnode-id="1637" instrument_node="">, however. It has a beating heart underneath its sweaty, ratty tank tops, laser-focused on the possible redemption for Hemsworth’s adrift character via saving the soul of young </span><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Rudhraksh Jaiswal</span></strong><span data-dcnode-id="1634" instrument_node="">, allowing as much of space and punch for its emotional moments as its combative ones. And if that doesn’t do it for you, Hemsworth and </span><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">David Harbour</span></strong><span data-dcnode-id="1631" instrument_node=""> suplexing each other in closed corridors might. Lotta layers in this one, folks! - </span><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Gregory Lawrence</span></em></p><span data-dcnode-id="1627" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1624"></div><span data-dcnode-id="1623" instrument_node="">

</span></div><span data-dcnode-id="1589" instrument_node=""> </span><p data-dcnode-id="1551"><span data-dcnode-id="1588" instrument_node="">Yes, </span><strong data-dcnode-id="1584"><em data-dcnode-id="1585"><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/freaky/"><span data-dcnode-id="1587" instrument_node="">Freaky</span></a></em></strong><span data-dcnode-id="1583" instrument_node=""> is a horror-comedy. But it’s the rare horror-comedy where the horror and comedy are both given equal attention. Co-written and directed by </span><strong data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Christopher Landon</span></strong><span data-dcnode-id="1580" instrument_node="">, who walked a similar tonal tightrope with the two </span><strong data-dcnode-id="1577"><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Happy Death Day</span></em></strong><span data-dcnode-id="1576" instrument_node=""> movies, </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Freaky</span></em><span data-dcnode-id="1573" instrument_node=""> is a body-swapping slasher movie where a teenage girl (</span><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Kathryn Newton</span></strong><span data-dcnode-id="1570" instrument_node="">) swaps places with a grizzled serial killer (</span><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Vince Vaughn</span></strong><span data-dcnode-id="1567" instrument_node="">). Much of the humor comes from the lead performances (Vaughn, in particular, is having a blast), but the number of gags are only upstaged by the levels of gore – watch as Newton, inhabited with the soul of a serial killer, goes on a rampage worth of Freddy, Jason, or Michael Myers. (Our favorite is the vivisection of a grouchy shop teacher played by high school movie icon </span><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Alan Ruck</span></strong><span data-dcnode-id="1564" instrument_node="">.) By the time the movie reaches its climax, </span><em data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Freaky</span></em><span data-dcnode-id="1561" instrument_node=""> has amassed a pretty staggering body count and kills (most of them practical) that earned the movie a spot on the cover of Fangoria. All hail </span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Freaky</span></em><span data-dcnode-id="1558" instrument_node="">, the very best horror comedy since </span><strong data-dcnode-id="1555"><em data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Scream</span></em></strong><span data-dcnode-id="1554" instrument_node="">. – </span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Drew Taylor</span></em></p><span data-dcnode-id="1550" instrument_node="">

</span></div><span data-dcnode-id="1511" instrument_node=""> </span><p data-dcnode-id="1489"><span data-dcnode-id="1510" instrument_node="">After the year we’ve had, it’s wild to think that there was a time that people got so riled up about </span><strong data-dcnode-id="1505"><em data-dcnode-id="1506"><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/the-hunt/"><span data-dcnode-id="1509" instrument_node="">The Hunt</span></a><span data-dcnode-id="1507" instrument_node=""> </span></em></strong><span data-dcnode-id="1504" instrument_node="">that the film had to be pulled from the release calendar and shuffled to this year. And that’s a mighty fine example of why social panic is a dumbass thing, because </span><em data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">The Hunt </span></em><span data-dcnode-id="1501" instrument_node="">is a pretty toothless satire that is content to wag fingers at both sides of the political spectrum and call it a day. However, since all those wagging fingers tend to be trigger fingers, the script’s vapid politics are at least embedded in some of the best, most tension-fuelled action of the year. Ostensibly a movie about the “liberal elite” hunting “deplorables” for sport, </span><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">The Hunt </span></em><span data-dcnode-id="1498" instrument_node="">harkens back to one of cinema’s great survival thrillers with its riff on </span><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The Most Dangerous Game</span></em><span data-dcnode-id="1495" instrument_node="">, and director </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Craig Zobel </span></strong><span data-dcnode-id="1492" instrument_node="">mines every set-up and set-piece for all the adrenaline-pumping thrills they're worth by blending stylishly choreographed blockbuster action with deliciously over-the-top grindhouse gore. - </span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1485"></div><span data-dcnode-id="1484" instrument_node="">

</span></div><span data-dcnode-id="1450" instrument_node=""> </span><p data-dcnode-id="1436"><span data-dcnode-id="1449" instrument_node="">Listen, the end of this movie is absolutely insane, so no matter what, I promise you won't forget it. Whether it's worth the ride getting there is another question entirely, but when you stick the ending like this, you're getting a recommendation from this gorehound. </span><strong data-dcnode-id="1446"><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Hunter Hunter</span></em></strong><span data-dcnode-id="1445" instrument_node=""> stars '90s heartthrob </span><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Devon Sawa</span></strong><span data-dcnode-id="1442" instrument_node=""> as Joseph, a fur trapper who lives in the remote wilderness with his family. When Joseph discovers that a dangerous wolf has returned to the area, he sets out to track it, but makes a shocking discovery that leaves him wondering if he's the hunter or the prey. I don't want to say too much more than that, as the film actually works better if you go in knowing as little as possible. Suffice to say that writer-director </span><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Shawn Linden</span></strong><span data-dcnode-id="1439" instrument_node=""> leaves little to the imagination with a Grand Guignol finale that leaves a lasting impression. Tales of Murder and Dust has never sounded so good... - </span><em data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="1435" instrument_node="">

</span></div><span data-dcnode-id="1396" instrument_node=""> </span><p data-dcnode-id="1371"><span data-dcnode-id="1395" instrument_node="">This compelling drama from writer-director </span><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Robert Machoian</span></strong><span data-dcnode-id="1392" instrument_node=""> first premiered at the Sundance Film Festival in January, making it eligible for this year's list even though it won't be formally released by Neon until February. The film is a striking showcase for its 42-year-old star </span><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Clayne Crawford</span></strong><span data-dcnode-id="1389" instrument_node="">, who is best known for his work on TV shows such as </span><strong data-dcnode-id="1386"><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Lethal Weapon</span></em></strong><span data-dcnode-id="1385" instrument_node="">, </span><strong data-dcnode-id="1382"><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">24</span></em></strong><span data-dcnode-id="1381" instrument_node=""> and </span><strong data-dcnode-id="1378"><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Rectify</span></em></strong><span data-dcnode-id="1377" instrument_node="">. He plays a man who's trying to win back the wife he's separated from, which is complicated by the fact that she has started seeing someone else. Machoian milks every last drop of suspense out of that intriguing premise, and though the film's title creates certain expectations, the story is rather unpredictable, as it doesn't quite go where you initially think it will. Ultimately, </span><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The Killing of Two Lovers</span></em><span data-dcnode-id="1374" instrument_node=""> is a quiet powder keg of a movie that marks Machoian as one to watch, and Crawford as an unassuming force to be reckoned with. - </span><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="1370" instrument_node="">

</span></div><span data-dcnode-id="1332" instrument_node=""> </span><p data-dcnode-id="1305"><span data-dcnode-id="1331" instrument_node="">An inverted take on the classic mob movie, </span><strong data-dcnode-id="1327"><em data-dcnode-id="1328"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/im-your-woman/"><span data-dcnode-id="1330" instrument_node="">I'm Your Woman</span></a></em></strong><span data-dcnode-id="1326" instrument_node=""> puts the spotlight on the wives and mothers who tend to settle into the background of Scorsese and Coppola's revered crime dramas. </span><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Rachel Brosnahan</span></strong><span data-dcnode-id="1323" instrument_node=""> stars as a somewhat unwitting mob doll who's kept in the dark about her husband's criminal lifestyle until she winds up a target on the run. Director </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Julia Hart</span></strong><span data-dcnode-id="1320" instrument_node=""> takes her time unfolding the full extent of this refreshing family drama, but once she gets where she's going, </span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">I'm Your Woman</span></em><span data-dcnode-id="1317" instrument_node=""> sparks into something a bit more special; taking a page from crime thrillers, melodramas, and road movies and remixing them into a heartfelt, if a bit unsteady, story about taking control of your future in life-or-death circumstances. Come for </span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Marvelous Mrs. Maisel </span></em><span data-dcnode-id="1314" instrument_node="">star Brosnahan, but stay for </span><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Marsha Stephanie Blake </span></strong><span data-dcnode-id="1311" instrument_node="">and </span><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Arinzé Kene</span></strong><span data-dcnode-id="1308" instrument_node="">, who steal every scene they're in. - </span><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="1304" instrument_node="">

</span></div><span data-dcnode-id="1265" instrument_node=""> </span><p data-dcnode-id="1250"><span data-dcnode-id="1264" instrument_node="">Thrillers can be hard to define, and more often than not, they bleed into other genres, but when it comes to that cocktail of suspense, anxiety, and surprise, no film this year has knocked me on my ass quite like </span><strong data-dcnode-id="1260"><em data-dcnode-id="1261"><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collider.com/tag/the-invisible-man/"><span data-dcnode-id="1263" instrument_node="">The Invisible Man</span></a></em></strong><span data-dcnode-id="1259" instrument_node="">. </span><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Leigh Whannell’</span></strong><span data-dcnode-id="1256" instrument_node="">s reimagining of the Universal Monsters classic stars </span><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Elisabeth Moss</span></strong><span data-dcnode-id="1253" instrument_node=""> as a woman who makes a daring escape from a violently abusive relationship and, following her ex’s alleged suicide, becomes convinced he is somehow still watching and controlling every facet of her life, unseen in the shadows. Few characters make such a perfectly suited menace to explore themes of gaslighting and manipulation as a literal invisible man, and Whannell wields his camera brilliantly to translate the oppressive anxiety of having your every move monitored and controlled while your construct of reality slips between your fingers. It’s a breathless thriller that ties you up in knots, punctuated with some of the most shocking scares of all time. - </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Haleigh Foutch</span></em></p><span data-dcnode-id="1249" instrument_node="">

</span></div><span data-dcnode-id="1211" instrument_node=""> </span><p data-dcnode-id="1188"><strong data-dcnode-id="1208"><em data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Man of Steel </span></em></strong><span data-dcnode-id="1207" instrument_node="">duo </span><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Diane Lane</span></strong><span data-dcnode-id="1204" instrument_node=""> and </span><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Kevin Costner</span></strong><span data-dcnode-id="1201" instrument_node=""> reunite for this western thriller about a long-married couple who decide to risk their lives to rescue their young grandson from the clutches of his evil stepfather and the man's dastardly family. As good as they both are, the real reason to see this movie is </span><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Lesley Manville</span></strong><span data-dcnode-id="1198" instrument_node="">'s scenery-chewing performance as the matriarch of said family. She just breaks out a Southern accent and goes for it, and frankly, it looks like she's having herself a ball and loving every minute of it. Directed with a pulpy grace by </span><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Thomas Bezucha</span></strong><span data-dcnode-id="1195" instrument_node="">, </span><strong data-dcnode-id="1192"><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Let Him Go</span></em></strong><span data-dcnode-id="1191" instrument_node=""> is aimed squarely at older viewers, though it does get pretty violent at one point, so this one, oddly enough, ain't for the squeamish. It's also not for the impatient, but those who don't mind slow burn will be rewarded with a fiery finale that's worth the wait. - </span><em data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Jeff Sneider</span></em></p><span data-dcnode-id="1187" instrument_node="">
