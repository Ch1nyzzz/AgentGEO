</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">I included this book on my list because it’s so good and so different from anything that has come before or after it. You’ll love this book.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Alexander McCall Smith is an academic. He grew up in Africa, when there was still a British colony in Southern Rhodesia (now Zimbabwe) and then went to university in Scotland.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">He is a respected expert on medical ethics in the UK, but starting in 1998, at the age of 50, he began writing books for the non-academic public. He is a prolific writer, who reportedly writes several thousand words per day. Every day. And he has a long bibliography to show for it.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1156"><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The No. 1 Ladies Detective Agency</span></em><span data-dcnode-id="1157" instrument_node="">&nbsp;is the first of a series that takes place in Botswana and has a female main character solving mysteries. The BBC started adapting the series for television in 2007.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">It took a while for the book (and series) to gain traction, but I believe this book to be a little masterpiece. It’s not too long, it’s upbeat despite some grim details, and the main character is very endearing.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">With the African backdrop, the book is totally different from any other mysteries that you may have read before.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1146"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">The main character, Precious Ramotswe, doesn’t rely on DNA or microscopic particles to solve crimes. She uses common sense and psychology.</span></strong></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">When highly educated academics write great books, you get much more for your money than you may at first realize. Like Umberto Eco’s books,&nbsp;</span><em data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">The No. 1 Ladies Detective Agency</span></em><span data-dcnode-id="1141" instrument_node="">&nbsp;will require reading more than once, but it will be worth it.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">You will learn about history, politics, African culture, and gender-bias, while you’re reading a whopping good story that is also filled with wisdom and humor.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><div class="wp-container-23 wp-block-group" data-dcnode-id="1068"><div class="wp-block-group__inner-container" data-dcnode-id="1069"><span data-dcnode-id="1135" instrument_node="">

</span><p data-dcnode-id="1063"><em data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">In the Woods</span></em><span data-dcnode-id="1064" instrument_node="">&nbsp;is a brilliant first novel by Tana French, who lives in Ireland. The book won four major mystery prizes and was a short-list finalist for The Los Angeles Times Book Award.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">It’s a police procedural, well-plotted and very atmospheric. It’s not exactly a thriller, but it is a scary book.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1056"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">It’s about a police detective investigating a case that strongly resembles something he, himself, was involved in as a child—but doesn’t quite remember.</span></strong></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">The author was originally an actress, who gave up acting to pursue writing. Since this book was published, she has published another six, and one is just as good as the next.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">In this day and age of eBooks, most of the books I read now are downloaded onto my tablet. I buy Tana French’s books in hardcover because I think someday they’ll be worth something on the&nbsp;</span><em data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Antiques Roadshow</span></em><span data-dcnode-id="1048" instrument_node="">. I sincerely believe her books are among the best mysteries of the last 15 years.</span></p><span data-dcnode-id="1046" instrument_node="">

</span><p data-dcnode-id="969"><span data-dcnode-id="976" instrument_node="">Coming out of Australia is&nbsp;</span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The Dry</span></em><span data-dcnode-id="973" instrument_node="">. The author was previously a journalist, and previously from the UK, but she moved to Australia in 2008.&nbsp;</span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">The Dry</span></em><span data-dcnode-id="970" instrument_node="">&nbsp;is her first novel.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">The book is the beginning of a series with the main character, Aaron Falk. The second book is&nbsp;</span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Force of Nature</span></em><span data-dcnode-id="964" instrument_node="">.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">The book has already won 12 awards from several different countries, so I’m not alone in liking it. I put it on this list because it’s just that good.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="956"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Basically, a federal police investigator returns to a small town to go to a funeral and investigate a case. He has ties to the small community that he had left long ago, and that clouds his judgment …a little.</span></strong></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">The book is relatively fast paced, however, if you pause between chapters, you will feel the heat on your back and the sand in your teeth. Atmosphere plays a significant role in the book, and it is oppressive.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The Dry</span></em><span data-dcnode-id="949" instrument_node="">&nbsp;is part mystery, part thriller, and part a glimpse into Australian culture. It’s a great book being adapted to a movie right now.</span></p><span data-dcnode-id="947" instrument_node="">
</span><div class="wp-container-25 wp-block-group" data-dcnode-id="879"><div class="wp-block-group__inner-container" data-dcnode-id="880"><span data-dcnode-id="946" instrument_node="">

</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Lee Child, the pen name of James Dover Grant, has written 24 books in the Jack Reacher series starting with&nbsp;</span><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Killing Floor</span></em><span data-dcnode-id="874" instrument_node="">&nbsp;in 1997. They’re all good mysteries, part thriller part hard-boiled mystery, and part just plain good story.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">I chose&nbsp;</span><em data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">The Midnight Line,</span></em><span data-dcnode-id="868" instrument_node="">&nbsp;one of the more recent books, for my list because I think it’s a step above the others.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The main character, Jack Reacher, is a former military police guy who has never really integrated himself fully back into society since his tour of duty ended.</span></strong></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="859"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">So, Reacher travels across the states, living a nomadic life with as small a footprint as possible while he solves some mysteries and rights some wrongs along the way.</span></strong></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The Midnight Line</span></em><span data-dcnode-id="855" instrument_node="">&nbsp;is first and foremost a good mystery. But the book also takes a close look at some modern societal problems: what happens to vets when they come back from duty, and how difficult it can be to help family members in crisis.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">This book is not high literature. It’s not lyrical prose with multi-layered metaphors. But for what it is, a great page-turner within the mystery genre, it’s the best of its kind. Child’s books have definitely subtly improved with age.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Many of the Jack Reacher books have been made into movies with Tom Cruise as Jack Reacher.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">The movies are pretty good, and if you like action movies, then, by all means, watch them all. However, movies are a different art medium than books, and in this case, the movies are only distantly related to the books.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The biggest problem with the films, which has been addressed many times in the media already, is that Tom Cruise is seriously miscast as Jack Reacher.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Jack Reacher is six foot five inches, blond, and with hands the sizes of “chickens”. Many of the antics and fight scenes that Jack Reacher is capable of are physically impossible for a man half his size, but someone made an economic decision to cast a too-short and too-old heartthrob and guaranteed box-office winner instead of staying true to the book. Pity.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="835"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">I decided to add five more books worth an Honorable Mention.</span></strong></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">I wouldn’t say these are the best mystery books ever written on a short list of 25, but they are so good, that I couldn’t leave them behind either.</span></p><span data-dcnode-id="831" instrument_node="">
