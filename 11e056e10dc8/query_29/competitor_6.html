</span><div class="entry-content" data-dcnode-id="327" itemprop="text"><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">In books, the mystery genre usually (but not always) refers to fiction. Within the mystery genre, there are several types, including, but not limited to, police procedurals, detective stories, hard-boiled detective stories, espionage, medical mysteries, some thrillers, some speculative fiction, cozies, and closed-room mysteries.</span></p><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">For the purposes of this list, I’m grouping them all together and including some from several different classifications. To save myself the agony of trying to list them starting from the absolute best mystery book of all time, I’m going to list them in order of initial date of publication starting with the oldest. And don’t worry; I’m not giving away any spoilers.</span></p><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">There are two things I’d like to mention before you read this list.</span></p><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">First, in some cases, I mention book prizes that were won, and in some cases, I don’t.</span></p><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3441"><strong data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">I always counsel readers not to rely solely on or weigh too heavily whether a book won a prize or several or which prize it may have won, before reading the book at hand.</span></strong></p><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3439" instrument_node="">The book judging for literary prizes is a lot like the judging for championship, long-program, figure-skating. In other words, it’s subjective, not always fair, and occasionally corrupt. Or as the English philosopher, Bertrand Russell, said,&nbsp;</span><em data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">“Even when the experts all agree, they may well be mistaken.”</span></em></p><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">And, of course, the corollary to that is that there are a lot of fantastic books out there that never won anything or were even panned when they were first published.</span></p><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">My second point is that when you read books that were written many years ago, sometimes they may feel dated. People dressed differently, and in some cases, spoke differently. Men were typically the breadwinners, and women wore lots of aprons and carried cigarettes in gold cases. Don’t let any of those details bother you.</span></p><span data-dcnode-id="3429" instrument_node="">
</span><p data-dcnode-id="3426"><strong data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">What’s important in a great book are the characters and their motives, the themes which rise above the written page, the structure, the pacing, the figures of speech, diction and the dialogue. And most of all the story.</span></strong></p><span data-dcnode-id="3425" instrument_node="">
</span><p data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">If I want to read something critically, I read it twice. First I read a book for the story, and then I read it to analyze it. Above all else, these mysteries are great stories.</span></p><span data-dcnode-id="3422" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="3322" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="3414"><span data-dcnode-id="3421" instrument_node="">Table of Contents</span><span data-dcnode-id="3420" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="3415"><span data-dcnode-id="3419" instrument_node="">[</span><a data-dcnode-id="3417" href="#"><span data-dcnode-id="3418" instrument_node="">show</span></a><span data-dcnode-id="3416" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="3323" style="display: none;"><li data-dcnode-id="3411"><a data-dcnode-id="3412" href="#1-The-Moonstone-by-Wilkie-Collins-1868"><span data-dcnode-id="3413" instrument_node="">1. The Moonstone by Wilkie Collins, 1868</span></a></li><li data-dcnode-id="3408"><a data-dcnode-id="3409" href="#2-A-Study-in-Scarlet-by-Sir-Arthur-Conan-Doyle-1887"><span data-dcnode-id="3410" instrument_node="">2. A Study in Scarlet by Sir Arthur Conan Doyle, 1887</span></a></li><li data-dcnode-id="3405"><a data-dcnode-id="3406" href="#3-The-Maltese-Falcon-by-Dashiell-Hammett-1930"><span data-dcnode-id="3407" instrument_node="">3. The Maltese Falcon by Dashiell Hammett, 1930</span></a></li><li data-dcnode-id="3402"><a data-dcnode-id="3403" href="#4-Rebecca-by-Daphne-du-Maurier-1938"><span data-dcnode-id="3404" instrument_node="">4. Rebecca by Daphne du Maurier, 1938</span></a></li><li data-dcnode-id="3399"><a data-dcnode-id="3400" href="#5-Anatomy-of-a-Murder-by-Robert-Traver-1958"><span data-dcnode-id="3401" instrument_node="">5. Anatomy of a Murder by Robert Traver, 1958</span></a></li><li data-dcnode-id="3396"><a data-dcnode-id="3397" href="#6-Killers-Payoff-by-Ed-McBain-1958"><span data-dcnode-id="3398" instrument_node="">6. Killer’s Payoff by Ed McBain, 1958</span></a></li><li data-dcnode-id="3393"><a data-dcnode-id="3394" href="#7-The-Deep-Blue-Good-By-by-John-D-MacDonald-1964"><span data-dcnode-id="3395" in </span><p data-dcnode-id="3248"><em data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">The Moonstone</span></em><span data-dcnode-id="3249" instrument_node="">&nbsp;is generally considered by scholars to be the first detective book in the English language. It’s an epistolary work, meaning that it’s written in the form of letters, which was a common style of writing in mid-nineteenth century literature.</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3246" instrument_node="">The book was originally serialized in Charles Dickens’ magazine,&nbsp;</span><em data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">All The Year Round</span></em><span data-dcnode-id="3243" instrument_node="">. At the time the book was published, the genre was called “a sensation novel.” Now we call these books mystery or suspense novels.</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3238"><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">The moonstone in the book is a large diamond; and the book is about a woman who inherits the diamond, and then the diamond is stolen from her. So, throughout the book, the mystery turns on who stole the diamond and why.</span></strong></p><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3223"><span data-dcnode-id="3236" instrument_node="">Wilkie Collins wrote a few books before&nbsp;</span><em data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">The Moonstone</span></em><span data-dcnode-id="3233" instrument_node="">, including&nbsp;</span><em data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">The Woman in White</span></em><span data-dcnode-id="3230" instrument_node="">, another initial attempt at a “sensation” novel. However, I chose&nbsp;</span><em data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">The Moonstone</span></em><span data-dcnode-id="3227" instrument_node="">&nbsp;for this list because I think it’s better than&nbsp;</span><em data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">The Woman in White</span></em><span data-dcnode-id="3224" instrument_node="">.</span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3216"><em data-dcnode-id="3217"><span data-dcnode-id="3221" instrument_node="">If you want to read the best mysteries from the beginning of time, The Moonstone is the one to start with. If you like The Moonstone, then read&nbsp;</span><a data-dcnode-id="3219" data-lasso-id="58089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Woman-White-Penguin-Classics/dp/0141439610/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><span data-dcnode-id="3220" instrument_node="">The Woman in White</span></a><span data-dcnode-id="3218" instrument_node="">, too.</span></em></p><span data-dcnode-id="3215" instrument_node="">

</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Conan Doyle invented Sherlock Holmes and Dr. Watson, his sidekick, and Holmes is so important both in the development of the detective book genre as well as in today’s culture, that no list of best mysteries would be complete without at least a hat tip to Conan Doyle.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3139"><em data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">A Study In Scarlet</span></em><span data-dcnode-id="3140" instrument_node="">&nbsp;is the first novel in which Holmes appears, although Holmes continues to figure in a total of four novels and 56 short stories.</span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3133"><strong data-dcnode-id="3134"><em data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">A Study in Scarlet</span></em><span data-dcnode-id="3135" instrument_node="">&nbsp;is a murder and revenge story told in the third-person point of view, a first in mysteries. And the mystery is solved purely by deductive reasoning and intellect, something that was most welcome in the Victorian era, which was a tough time for the average man.</span></strong></p><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">All of the Sherlock Holmes stories have nice and neat endings, and you will find it refreshing to read a good mystery that has a sensible solution to it like a neatly wrapped Christmas gift.</span></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Since Conan Doyle was a great storyteller, and so many of the Holmes stories are good, I thought it made sense to put the first book of the series on this list. You can always explore the rest of Sherlock’s adventures at your leisure.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><div class="wp-container-3 wp-block-group" data-dcnode-id="3058"><div class="wp-block-group__inner-container" data-dcnode-id="3059"><span data-dcnode-id="3125" instrument_node="">
</span><h2 data-dcnode-id="3121"><span data-dcnode-id="3122" id="3-The-Maltese-Falcon-by-Dashiell-Hammett-1930"><a aria-label="3. The Maltese Falcon by Dashiell Hammett, 1930 (opens in a new tab)" class="rank-math-link" data-dcnode-id="3123" data-lasso-id="58091" data-lasso-name="The Maltese Falcon" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0679722645%3Ftag%3Dupjourney-20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3124" instrument_node="">3. The Maltese Falcon by Dashiell Hammett, 1930</span></a></span></h2><span data-dcnode-id="3120" instrument_node="">

</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Dashiell Hammett is considered the father of the hard-boiled detective genre. In this type of mystery, there’s a no-nonsense, tough-guy detective solving crimes and/or mysteries. And these types of books usually rely more on dialogue and less on everything else, such as long-winded descriptions to move the plot along.</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3049"><span data-dcnode-id="3053" instrument_node="">Hammett’s Sam Spade appeared first in&nbsp;</span><em data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">The Maltese Falcon</span></em><span data-dcnode-id="3050" instrument_node="">, published in 1930—which was originally serialized—and then later in some short stories.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3043"><strong data-dcnode-id="3044"><em data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">The Maltese Falcon</span></em><span data-dcnode-id="3045" instrument_node="">&nbsp;is basically about a valuable stolen falcon statue, and the question is who stole it and why, and can Spade recover it for his client.</span></strong></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">It’s amazing that Dashiell Hammett managed to get something brilliant written much less published. He suffered from tuberculosis, alcoholism, and writer’s block for most of his life. He also had a wife and children, more than one mistress, and a 30-year off and on a relationship with the famous playwright, Lillian Hellman (Watch on the Rhine).</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">The Maltese Falcon has been made into four different movies (so far), but the best one is the 1941 version with Humphrey Bogart and Peter Lorre, and directed by John Huston (his first film). It’s a great movie, and you should try to see it after you read the book. The movie is considered a film noir classic, which is not surprising since film noir marries well with hard-boiled detective fiction.</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">You’ll probably want to read The Maltese Falcon several times just to be able to memorize some of the dialogue and toss out some winners at cocktail parties. Here are a couple of funny lines from the book:</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3032" instrument_node="">Joel Cairo:&nbsp;</span><em data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">“You always have a very smooth explanation ready.”</span></em></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3024"><span data-dcnode-id="3027" instrument_node="">Sam Spade:&nbsp;</span><em data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">“What do you want me to do, learn to stutter?”</span></em></p><span data-dcnode-id="3023" instrument_node="">
</span><div class="wp-container-4 wp-block-group" data-dcnode-id="3012"><div class="wp-block-group__inner-container" data-dcnode-id="3013"><span data-dcnode-id="3022" instrument_node="">
</span><h2 data-dcnode-id="3018"><span data-dcnode-id="3019" id="4-Rebecca-by-Daphne-du-Maurier-1938"><a class="rank-math-link" data-dcnode-id="3020" data-lasso-id="58092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barnesandnoble.com/w/rebecca-daphne-du-maurier/1100182387%3Fean%3D9780380778553%23/" rel="noopener" target="_blank"><span data-dcnode-id="3021" instrument_node="">4. Rebecca by Daphne du Maurier, 1938</span></a></span></h2><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">It’s important to read the right version of the book, linked above.</span></p><span data-dcnode-id="3014" instrument_node="">
</span></div></div><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3007"><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Rebecca</span></em><span data-dcnode-id="3008" instrument_node="">&nbsp;is a great book, a classic, no matter how you look at it. It’s definitely a crossover book in that it could just as easily be found on a list of great books from the twentieth century, English literature, or gothic literature.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">That said, however, it’s also a mystery. I wouldn’t describe it as a thriller, but it is suspenseful. It’s one of the very early mysteries in which an eerie and oppressive atmosphere plays a big role in the story as opposed to mainly dialogue.</span></p><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="3000"><strong data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">The book is about a young woman who marries a much older man and accompanies him back to his manor, Manderley. The mystery is what is going on in that crazy mansion, and what is the deal with the older man’s first wife, Rebecca.</span></strong></p><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2992"><a class="rank-math-link" data-dcnode-id="2997" data-lasso-id="61709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upjourney.com/best-books-novels-and-short-stories-by-daphne-du-maurier"><span data-dcnode-id="2998" instrument_node="">Du Maurier wrote a few books</span></a><span data-dcnode-id="2996" instrument_node="">, and another one, Jamaica Inn, is often required reading in junior high or high school. Rebecca has been adapted to film several times, and Netflix is working on a new version right now, but the best-known film version is the one directed by Alfred Hitchcock in 1940. Another Hitchcock movie,&nbsp;</span><em data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">The Birds</span></em><span data-dcnode-id="2993" instrument_node="">, was based on another story by du Maurier.</span></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">The Alfred Hitchcock version is a good movie, which won two Academy Awards, one for Best Picture and one for cinematography. However, be forewarned, the movie plot departs from the original book in a few significant ways. As always, read the book first.</span></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2973"><em data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Rebecca</span></em><span data-dcnode-id="2985" instrument_node="">&nbsp;did not get good reviews when it was first published in 1938, but neither did&nbsp;</span><a data-dcnode-id="2982" data-lasso-id="58093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Catcher-Rye-J-D-Salinger/dp/0316769487/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">The Catcher in the Rye</span></em></a><span data-dcnode-id="2981" instrument_node="">&nbsp;by Salinger or&nbsp;</span><a data-dcnode-id="2978" data-lasso-id="58094" data-lasso-name="Slaughterhouse-Five: A Novel (Modern Library 100 Best Novels)" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0385333846%3Ftag%3Dupjourney-20" rel="nofollow noopener" target="_blank"><em data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Slaughterhouse-Five</span></em></a><span data-dcnode-id="2977" instrument_node="">&nbsp;by Vonnegut. So, don’t let that stop you from reading it.&nbsp;</span><em data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Rebecca</span></em><span data-dcnode-id="2974" instrument_node="">&nbsp;has been in publication continuously since 1938, and there’s a reason for that.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Unfortunately, du Maurier, who died in 1989, was accused of plagiarism more than once. I don’t know if she plagiarized anything or not; but I don’t care, either, because Rebecca is still good enough to find a place on this list.</span></p><span data-dcnode-id="2969" instrument_node="">

</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">If you’re partial to courtroom mysteries/thrillers and authors like Scott Turow or John Grisham, you can thank Robert Traver, the pen name of Michigan Supreme Court Justice, John D. Voelker. The book is a fictionalized version of a real case Voelker came across.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Traver wrote a few other fiction novels and a few nonfiction books about fishing, which I haven’t read. As far as writing mysteries, this book was his one-hit wonder.</span></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2890"><em data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Anatomy of a Murder</span></em><span data-dcnode-id="2891" instrument_node="">&nbsp;is an early and great example of courtroom mysteries and the one that paved the way for future works in the subgenre. Many still regard this book as the best of its type ever written. I still recall one quote—forgive me if it’s slightly off—“that’s more complicated than a 99-year chain-store lease.”</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2886"><strong data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">In brief, the book is about a man accused of murder. The mystery is what really happened on the night of the murder and whether the two main lawyer characters will be able to successfully defend the accused in court.</span></strong></p><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">The book is fast-paced, with excellent dialogue, and although it’s long, you will read it fast, because it’s just that good.</span></p><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">The book was made into an excellent movie in 1959, starring James Stewart, George C. Scott, and a bunch of other big names. The movie was directed by Otto Preminger and was nominated for seven Academy Awards although it didn’t win any. Definitely watch the movie if you can.</span></p><span data-dcnode-id="2879" instrument_node="">

</span><p data-dcnode-id="2805"><span data-dcnode-id="2809" instrument_node="">Ed McBain was the pen name for Salvatore Lombino, who aside from McBain, also had a dozen other pen names. He was a prolific writer, who wrote many books in many genres and also several screenplays including the one for Hitchcock’s&nbsp;</span><em data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">The Birds</span></em><span data-dcnode-id="2806" instrument_node="">, mentioned earlier.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">He rotated through several different names because his publisher was worried that some of the genre mysteries might pull down his literary reputation from other more literary books.</span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">McBain was best known for his 87th precinct mysteries or detective books that take place in New York City. There are (I think) 55 books in the series, written over about 50 years.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2797" instrument_node="">I include&nbsp;</span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Killer’s Payoff</span></em><span data-dcnode-id="2794" instrument_node="">&nbsp;in my list, which is the sixth because I think it’s one of the best. You can always go back and read them all starting with the first,&nbsp;</span><a data-dcnode-id="2791" data-lasso-id="58097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Cop-Hater-87th-Precinct-McBain/dp/1612183700/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Cop Hater</span></em></a><span data-dcnode-id="2790" instrument_node="">, if you like it.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Killer’s Payoff is about a blackmailer, Sy Kramer, who is found dead, and the detectives in the 87th precinct have to figure out who killed him, why, and catch him or her before the murderer kills anyone else. Steve Carella is the main detective character in this and all the other 87th precinct books.</span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2782"><strong data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">The reason why McBain belongs on this list is that McBain was one of the earliest mystery authors to give us a police procedural, one in which cops are real people.</span></strong></p><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Both the cops and the crooks are good and bad and all shades of grey, but never black and white. The book is a quick read and well worth your time.</span></p><span data-dcnode-id="2778" instrument_node="">

</span><p data-dcnode-id="2705"><em data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">The Deep Blue Good-By</span></em><span data-dcnode-id="2706" instrument_node="">&nbsp;is the first of the Travis McGee series, and it’s listed here because it’s also one of the best. Travis McGee was a character whose work was “salvage” or getting things back for people when they couldn’t go through normal legal channels to recover whatever they had lost. The book takes place in Florida, as do most of the McGee series.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">All the books have a color in the title, and all the books have McGee trying to get something back for a handsome fee as he works inside or outside the law.</span></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2698"><strong data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">This first book is about him trying to recover…well…I’m not even going to tell you. Let me just say the ones who have lost something sorely need what they have lost. And McGee has a conscience and often gets emotionally involved in his cases against his better judgment.</span></strong></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">What’s important about this book is that as far as the mystery genre goes, we are introduced to the main character whose main job is just solving mysteries. He lives on the fringes of society, operates on the fringes of the law, and as you’re wondering what’s going to happen next, you will also be questioning the world you live in and society at large.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Travis McGee’s books introduce existentialism and pop culture to the mystery genre. The books are not quite hard-boiled, not exactly procedurals, but lean more toward thriller and are really in a class by themselves. That coupled with an original and interesting plot gives The Deep Blue Good-By a permanent spot on my list of must-read mysteries.</span></p><span data-dcnode-id="2691" instrument_node="">

</span><p data-dcnode-id="2617"><span data-dcnode-id="2621" instrument_node="">Now in our list of the best mysteries ever written, we have to jump over the ocean to the United Kingdom and talk about Agatha Christie. She was best known for her 66 mysteries, and this one,&nbsp;</span><em data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">And Then There Were None</span></em><span data-dcnode-id="2618" instrument_node="">, was the one that sold the best, something like 100 million copies.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">It’s a standalone mystery and not part of a series. In interviews, she said that And Then There Were None was the hardest one for her to write.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2607"><strong data-dcnode-id="2608"><span data-dcnode-id="2612" instrument_node="">What’s important about&nbsp;</span><em data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">And Then There Were None</span></em><span data-dcnode-id="2609" instrument_node="">&nbsp;is that it’s a great example of one of several literary tropes or devices that Christie developed and was known for: the closed-room mystery.</span></strong></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">A closed-room mystery is a mystery/crime story in which a crime is committed—usually a murder—where there is a limited pool of suspects, such as in a locked room or locked home or in this case, an island, and then one or more individuals try to solve the mystery before more people die.</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">There are lots of examples of great mysteries from the United Kingdom, in books, as well as in film, theater, and television from the BBC, and there are many great series as well. Space doesn’t allow me to list all of them, but in a list of the best mysteries ever written, I’d be remiss if I didn’t include at least one Agatha Christie book.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><div class="wp-container-9 wp-block-group" data-dcnode-id="2532"><div class="wp-block-group__inner-container" data-dcnode-id="2533"><span data-dcnode-id="2599" instrument_node="">

</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Georges Simenon was a prolific Belgian writer, best known for his series of detective or mystery novels with the main character of Superintendent (or Commissaire) Jules Maigret in France.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Over the course of 42 years, Simenon wrote 77 Maigret books and short stories. Many have been adapted into film or television.</span></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Maigret is a large, plodding character, who doesn’t have a clear recipe for solving crimes like Sherlock Holmes did, for example. Maigret tries to understand the psychology of the situation, the perpetrators, the victims, and motives in order to figure out what happened. Maigret also capitalizes on being underestimated, perhaps a little like the fictional Columbo did on television in the 1980s and ’90s.</span></p><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2518"><em data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">The Patience of Maigret</span></em><span data-dcnode-id="2519" instrument_node="">&nbsp;is one of the later books in the series, but one of the best. Maigret investigates a murder, which he thinks may be related to a long-unsolved series of robberies.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2514"><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">The story is captivating but a slower-paced read than you may be used to. However, as Maigret patiently eliminates suspects, the reader is offered insight into the criminal mind, the mind of a compassionate detective, and the greater world at large.</span></strong></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Maigret books are not very long, and they are not hard to read. If you have the most basic command of French, try reading them in their original language, as something is always lost in translation.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Simenon’s books are somewhat less plot-driven than earlier mysteries, but they are nonetheless great reads that had a major influence on the mystery genre that came afterward.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><div class="wp-container-10 wp-block-group" data-dcnode-id="2442"><div class="wp-block-group__inner-container" data-dcnode-id="2443"><span data-dcnode-id="2506" instrument_node="">

</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">This is a book you may have never heard of before. I’m going to fix that. Roderick Thorp wrote maybe a dozen books. He wasn’t a genius or a professor or a prolific writer who penned a book per week.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2424"><em data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">The Detective</span></em><span data-dcnode-id="2435" instrument_node="">&nbsp;was made into a movie with Frank Sinatra that did well at the box office, but then the story faded into obscurity–except that Thorp’s sequel to&nbsp;</span><em data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">The Detective</span></em><span data-dcnode-id="2432" instrument_node="">, called&nbsp;</span><a data-dcnode-id="2429" data-lasso-id="58102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Nothing-Lasts-Forever-inspired-movie/dp/1935169181/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Nothing Lasts Forever</span></em></a><span data-dcnode-id="2428" instrument_node="">, was made into the movie&nbsp;</span><em data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Die Hard</span></em><span data-dcnode-id="2425" instrument_node="">. And that you may have heard of.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2418"><strong data-dcnode-id="2419"><em data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">The Detective</span></em><span data-dcnode-id="2420" instrument_node="">&nbsp;is about a New York City detective, Joe Leland, who is asked to investigate the death of a man and figure out who killed him and why. It’s an unusual story, crafted unusually well, and I consider it one of the best detective/mystery novels ever written.</span></strong></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">If I could only take 10 books with me to a deserted island, this would be one of them.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">The book addresses some of today’s societal issues and biases and considering that it was published in 1966, I’d say it was well ahead of its time. It’s a big fat book, and although it’s not likely still in print, you can still find a copy of it, and then sink into it and enjoy.</span></p><span data-dcnode-id="2411" instrument_node="">

</span></div><span data-dcnode-id="2352" instrument_node="">
</span></div><span data-dcnode-id="2350" instrument_node="">
</span></div><span data-dcnode-id="2348" instrument_node="">
</span></div></div><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Tony Hillerman grew up in Oklahoma, served during World War II, came back and finished university in Oklahoma, then began a career in journalism. He rose through the newspaper ranks and moved to New Mexico as United Press International’s Bureau Chief.</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">As he continued to live and work in New Mexico, he grew to love the area and the culture. And then he started writing books.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2335"><em data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">The Blessing Way</span></em><span data-dcnode-id="2336" instrument_node="">&nbsp;was Tony Hillerman’s first of 18 books in a series featuring Detective Joe Leaphorn. Later on in the series, Detective Jim Chee is added to the mix.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2329"><strong data-dcnode-id="2330"><em data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">The Blessing Way</span></em><span data-dcnode-id="2331" instrument_node="">&nbsp;and the rest of the series would be considered police procedurals. However, what’s different about these books is that the police procedural does not take place in an urban setting, but rather in the vast American Southwest—and on the Navajo reservation.</span></strong></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">The reason why Hillerman’s books are important is that Hillerman was the one who brought the stories and culture of the indigenous peoples of the American Southwest to mainstream fiction at a time when that wasn’t altogether popular.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Although all of the books revolve around the Navajo in some way, Hillerman also covers Zuni, Hopi, and the Pueblo people (also referred to as Anasazi, which is no longer politically correct).</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">More than once, Hillerman acknowledged that he was inspired by the books of Arthur W. Upfield, who in the 1920’s wrote mysteries in Australia surrounding the aboriginal culture.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node="">So,&nbsp;</span><em data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">The Blessing Way</span></em><span data-dcnode-id="2315" instrument_node="">, like the other books in the series, is a multi-layered affair. There is always one or more murders to solve by Leaphorn, but there is also considerable local&nbsp;anthropology, sociology, and archeology&nbsp;that play important roles in the stories.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Hillerman tried from the beginning to make indigenous cultures accessible to the reading public through the mystery genre.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">These books acquired a young following at first and then a cult following. As the years went by, he became recognized by the literary world.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">However, because of the underlying indigenous flavor to his themes, he had difficulty selling the first book to a publisher, and Robert Redford, who held most of the movie rights for many years similarly had difficulty getting the films made.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Tony Hillerman died in 2008. His daughter Anne continues to write books for the series.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2300" instrument_node="">Hillerman’s Leaphorn books have won all the major mystery prizes, including the&nbsp;</span><em data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Edgar</span></em><span data-dcnode-id="2297" instrument_node="">,&nbsp;</span><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Nero</span></em><span data-dcnode-id="2294" instrument_node="">,&nbsp;</span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Macavity</span></em><span data-dcnode-id="2291" instrument_node="">,&nbsp;</span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Anthony</span></em><span data-dcnode-id="2288" instrument_node="">, and several other prizes as well including the&nbsp;</span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Grand Prix de Littérature Policière</span></em><span data-dcnode-id="2285" instrument_node="">, a major French literary prize. It is well known that the award Hillerman cherished the most was one given to him by the Navajo Tribal Council.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2282" instrument_node="">Some have found Hillerman’s books&nbsp;</span><a data-dcnode-id="2280" data-lasso-id="58105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2008/oct/31/tony-hillerman-obituary" rel="noopener" target="_blank"><span data-dcnode-id="2281" instrument_node="">preachy</span></a><span data-dcnode-id="2279" instrument_node="">, and he was accused more than once of getting a few cultural facts wrong. However, as a body of work starting with&nbsp;</span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">The Blessing Way</span></em><span data-dcnode-id="2276" instrument_node="">, his influence on the mystery genre cannot be overstated. The series is best read in order, and for that reason,&nbsp;</span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The Blessing Way</span></em><span data-dcnode-id="2273" instrument_node="">&nbsp;is the one to read first.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><div class="wp-container-12 wp-block-group" data-dcnode-id="2203"><div class="wp-block-group__inner-container" data-dcnode-id="2204"><span data-dcnode-id="2270" instrument_node="">
</span><h2 data-dcnode-id="2266"><span data-dcnode-id="2267" id="12-Tinker-Tailor-Soldier-Spy-by-John-le-Carre-1974"><a aria-label="12. Tinker, Tailor, Soldier, Spy by John le Carré, 1974 (opens in a new tab)" class="rank-math-link" data-dcnode-id="2268" data-lasso-id="58106" data-lasso-name="Tinker, Tailor, Soldier, Spy: A George Smiley Novel" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0143119788%3Ftag%3Dupjourney-20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2269" instrument_node="">12. Tinker, Tailor, Soldier, Spy by John le Carré, 1974</span></a></span></h2><span data-dcnode-id="2265" instrument_node="">

</span><p data-dcnode-id="2198"><em data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Tinker, Tailor, Soldier, Spy</span></em><span data-dcnode-id="2199" instrument_node="">&nbsp;is a crossover mystery/spy novel. It’s the first of a trilogy, and I recommend reading all three—in order. Le Carré’s career was working for British Intelligence, so my guess is that he knows a thing or two about the spy business.</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">He has written about 30 books, mostly fiction, a few nonfiction, a few screenplays, and he has also produced and acted in a few films.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2190"><em data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Tinker, Tailor</span></em><span data-dcnode-id="2191" instrument_node="">&nbsp;and the others in the trilogy are dense books. They are not the easiest to read, and alternating scenes and characters don’t make it any easier. Nevertheless, they are seamlessly plotted with important minute details everywhere, so, read them slowly and enjoy the author’s way with language and dialogue. And there is a mystery in this book, or several as you will find out.</span></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2185"><em data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Hint</span></em><span data-dcnode-id="2186" instrument_node="">: while you’re reading watch for the themes of betrayal and redemption.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2181"><strong data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">George Smiley is the main character, and the question is can George, now retired, pull himself back together to solve a crime that has been unsolved for at least 20 years and not get killed in the process.</span></strong></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">There have been two films made of this book. The best one is the one made for BBC television with Sir Alec Guinness. Another one made in 2011 with Gary Oldman is not as good—and I’m being kind. Don’t bother with that one.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Sometimes spy novels can be considered a subgenre of mystery. So, this is my hat tip to spy novels, as this trilogy is the best of the best, bar none.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><div class="wp-container-13 wp-block-group" data-dcnode-id="2109"><div class="wp-block-group__inner-container" data-dcnode-id="2110"><span data-dcnode-id="2173" instrument_node="">
</span><h2 data-dcnode-id="2169"><span data-dcnode-id="2170" id="13-True-Confessions-by-John-Gregory-Dunne-1977"><a aria-label="13. True Confessions by John Gregory Dunne, 1977 (opens in a new tab)" class="rank-math-link" data-dcnode-id="2171" data-lasso-id="58107" data-lasso-name="True Confessions: A Novel" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1560258152%3Ftag%3Dupjourney-20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2172" instrument_node="">13. True Confessions by John Gregory Dunne, 1977</span></a></span></h2><span data-dcnode-id="2168" instrument_node="">

</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">And now we come to the second book on my list that you may not have heard of. And yet I consider it one of the best mysteries ever written.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">John Gregory Dunne was just never a household name. He was an accomplished writer, literary critic, and screenwriter. He was also married to Joan Didion, who always seemed to be better known than he was, even though they collaborated on a number of works.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">So, he amassed a respectable collection of writings during his career, then in 2003, one night he keeled over dead at the dinner table. Joan wrote a massively popular prize-winning book about her grief over his loss, which I find a bit…ironic.</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2095"><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">True Confessions</span></em><span data-dcnode-id="2096" instrument_node="">&nbsp;was published in 1977 around the middle of his career. It was made into a very good movie in the early 1980s with Robert De Niro and Robert Duvall. And few people have heard of the movie either. Pity.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">I put the blame for this squarely on the shoulders of the publishers, who gave the book a terrible title. There have been a few times over the years that I have recommended this book to someone, and the person thought I was recommending garbage, like the newspaper rags you see in front of you when you’re paying the cashier at the grocery store.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2088"><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">The book is about two brothers, a priest and a detective, and some murder and mayhem. Look for the themes of right and wrong, hypocrisy, courage, corruption, graft, and redemption. Read it slowly.</span></strong></p><span data-dcnode-id="2087" instrument_node="">
</span><div class="wp-container-14 wp-block-group" data-dcnode-id="2019"><div class="wp-block-group__inner-container" data-dcnode-id="2020"><span data-dcnode-id="2086" instrument_node="">

</span><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Umberto Eco, who died in 2016, was an academic with a broad publishing history. His main area of expertise was semiotics or the study of symbols, however, he was also an expert on history and languages (he spoke several); and so throughout his career he wrote academic texts for universities, fiction novels, and he even wrote children’s books. He was not a sleepyhead.</span></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2007"><strong data-dcnode-id="2008"><em data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">The Name of the Rose</span></em><span data-dcnode-id="2009" instrument_node="">&nbsp;was his debut novel. It’s generally considered a historical mystery, sometimes considered a post-modern mystery, and I just plain consider it the best historical mystery ever written.</span></strong></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">The book has sold over 50 million copies, been translated into several languages, and it has also won a bunch of prizes.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">So, there is a real murder mystery that takes place in a monastery during the fourteenth century.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">In addition to a complex plot, prepare yourself for the following: several subplots, a deep dive into history, church history, medieval history, biblical history, symbols, and Latin, and lots of clues. Everywhere. On every page. Yet, as dense as it is, and despite taking place in a monastery where there isn’t too much cheerful conversation, the book is not all somber. There is some humor in it, too.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">It’s a book that you may need to read several times to understand it fully. But it’s worth it.&nbsp;</span></p><span data-dcnode-id="1994" instrument_node="">

</span><p data-dcnode-id="1911"><span data-dcnode-id="1918" instrument_node="">This is the only entry on my list where I have mentioned the same author twice.&nbsp;</span><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Cinnamon Skin</span></em><span data-dcnode-id="1915" instrument_node="">, written almost 20 years after the first one,&nbsp;</span><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">The Deep Blue Good-By</span></em><span data-dcnode-id="1912" instrument_node="">, is one of the later John D. MacDonald books in the Travis McGee series.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Why is it on this list? Because after reading thousands of mysteries, I think it’s one of the best ever written. In most of the later books of the McGee series, another regular character figures into the mix: Meyer, the retired economist. And this mystery turns on one of Meyer’s relatives.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1904"><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">It’s a lean mystery. There aren’t a lot of Latin clues, and there isn’t a Byzantine plot. But the book is all muscle and sinew. There isn’t one wasted word.</span></strong></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Since the murder involves one of Meyer’s relatives, both McGee and Meyer take it personally, and they are loaded for bear when they try to unravel the mystery.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">MacDonald, who died in 1986, had an MBA from Harvard. His knowledge of business and economics was very useful for unraveling shady business deals in his books as well as the character development of Meyer. Meyer may well have been a somewhat fictional version of MacDonald, himself.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Cinnamon Skin is a bit of a mystery/thriller, and you will enjoy every minute of it.</span></p><span data-dcnode-id="1894" instrument_node="">

</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Joseph Wambaugh is a former cop with the LAPD, who rose to Detective Sergeant after 14 years.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">While he was on the force, he went back to school and got a master’s degree in literature. In 1974, he published&nbsp;</span><em data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The New Centurions</span></em><span data-dcnode-id="1821" instrument_node="">&nbsp;while he was still on the force, but left and became a full-time writer shortly after.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Since then, he has written about a dozen mystery/detective novels, about half a dozen nonfiction crime, and a few screenplays. Many were prize-winning, and several have been made into films.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">His work had a substantial influence on detective stories that came after his. Wambaugh introduced the public to the gritty reality of police work, and he started the whole new wave of mystery that had the backdrop of police-work-isn’t-glamorous.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Wambaugh’s books told us what was really going on, and it often wasn’t pretty. He showed the police work that is boring, often thankless, difficult and life-consuming and work that wasn’t so much thrilling as emotionally draining.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">We see cops who are depressed or nuts or jaded. And pretty soon, television started creating police series that were like this.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Both his fiction and nonfiction are very good. His books are well plotted, although not over the top, characters are developed into real people, and there is often some humor, the black humor of cops.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1799"><strong data-dcnode-id="1800"><em data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The Secrets of Harry Bright</span></em><span data-dcnode-id="1801" instrument_node="">&nbsp;was Wambaugh’s seventh novel. We have a police procedural set in the fictional town of Mineral Springs. Then there is the juxtaposition of world-weary cops and people in southern California who can be best described as having more money than brains. And then there’s a murder.</span></strong></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Watch for quirky but realistic characters, and careful plotting.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1794" instrument_node="">While Joseph Wambaugh is usually remembered for&nbsp;</span><a data-dcnode-id="1791" data-lasso-id="58479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Onion-Field-Joseph-Wambaugh/dp/0385341598/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">The Onion Field</span></em></a><span data-dcnode-id="1790" instrument_node="">&nbsp;or&nbsp;</span><a data-dcnode-id="1787" data-lasso-id="58480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Choirboys-Novel-Joseph-Wambaugh/dp/0385341601/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">The Choirboys</span></em></a><span data-dcnode-id="1786" instrument_node="">, the book he should be remembered for is&nbsp;</span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">The Secrets of Harry Bright</span></em><span data-dcnode-id="1783" instrument_node="">.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1780" instrument_node="">I also heartily recommend his nonfiction book,&nbsp;</span><a data-dcnode-id="1777" data-lasso-id="58481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Blooding-Joseph-Wambaugh/dp/055376330X/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">The Blooding</span></em></a><span data-dcnode-id="1776" instrument_node="">, an account of the first case in which DNA was used to help convict someone.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><div class="wp-container-17 wp-block-group" data-dcnode-id="1706"><div class="wp-block-group__inner-container" data-dcnode-id="1707"><span data-dcnode-id="1773" instrument_node="">

</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">As soon as I started this article, I knew that one Hiaasen book needed to be on this list. I hesitated between Double Whammy or Tourist Season, but I decided on Double Whammy because it’s his first novel in which the character, Skink, is introduced. And I don’t want you to miss out on Skink.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1694"><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Double Whammy</span></em><span data-dcnode-id="1699" instrument_node="">&nbsp;is otherwise Hiaasen’s second novel, and&nbsp;</span><a data-dcnode-id="1696" data-lasso-id="58483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Tourist-Season-Suspense-Carl-Hiaasen/dp/0399587144/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Tourist Season</span></em></a><span data-dcnode-id="1695" instrument_node="">&nbsp;is the first, although Hiaasen did co-write a couple of books before Tourist Season. But I will admit that Tourist Season is the only mystery I’ve ever read that made me laugh out loud. I mean laugh until I cried.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1688"><strong data-dcnode-id="1689"><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Double Whammy</span></em><span data-dcnode-id="1690" instrument_node="">&nbsp;is a type of fishing lure, and the book is about a private investigator who is investigating a celebrity bass fisherman to see if he is cheating on the fishing tournament circuit. But then there’s a murder. And that’s all I’m going to tell you about the plot.</span></strong></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Hiaasen grew up in Florida, got a degree in journalism and has been writing ever since. He started by writing for newspapers, then he started writing novels. He still writes occasionally for some south Florida newspapers.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">He has written fiction, nonfiction, and some children’s books. And won a few prizes, too. The fiction books could all loosely be classified as humorous mysteries.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">They don’t all have the same main character or characters like the John D. MacDonald series, although Skink does appear in a few as a minor character. And you probably wouldn’t find them in the mystery section, but rather in the fiction section. But they are mysteries. Trust me on this.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">These Hiaasen mysteries usually center on a reporter or private investigator who is going to solve a mystery and a crime and hopefully see to it that the bad guys get some kind of justice.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">The books are funny in a weird, outrageous, crazy kind of way. You will snicker as you see the steamy and seamy underbelly of Florida and its corruption, which go together like peanut butter and jelly.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Hiaasen merits a spot on my list because his books are great, and there’s nothing else like them. Sometimes Hiaasen’s books remind me a little of Elmore Leonard’s books, but in their writings, Hiaasen is wackier and Leonard is leaner.</span></p><span data-dcnode-id="1669" instrument_node="">

</span><p data-dcnode-id="1589"><span data-dcnode-id="1599" instrument_node="">Thomas Harris is something of an enigma. He hasn’t written a ton of books, and the others that he did write haven’t achieved the level of success that this one has. His first book was&nbsp;</span><a data-dcnode-id="1597" data-lasso-id="58485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Black-Sunday-Thomas-Harris/dp/0451217411/ref%3Das_li_ss_tl%3Ftag%3Dupjourney-20" rel="noopener" target="_blank"><span data-dcnode-id="1598" instrument_node="">Black Sunday</span></a><span data-dcnode-id="1596" instrument_node="">, and his second book was&nbsp;</span><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1593" instrument_node="">, the precursor to&nbsp;</span><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1590" instrument_node="">.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1587" instrument_node="">Harris has not been interviewed much and abhors the spotlight. He was recently interviewed in&nbsp;</span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">The New York Times</span></em><span data-dcnode-id="1584" instrument_node="">, following the publication of the new book in 2019,&nbsp;</span><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Cari Mora</span></em><span data-dcnode-id="1581" instrument_node="">.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">The&nbsp;</span><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1575" instrument_node="">&nbsp;was made into a blockbuster movie starring Jodie Foster and Anthony Hopkins, which swept several Academy Awards. However, the movie aside, it’s a terrific book. It’s rare that a terrific book turns into a terrific movie, and this is one of the few examples of that.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node="">Harris raised the bar on writing about serial killers.&nbsp;</span><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1569" instrument_node="">&nbsp;is well plotted, has good character development, excellent dialogue, intricate details and it makes sense, as in it’s plausible. Prepare yourself for some grisly details. And it’s long. The only thing a mystery reader likes better than a great mystery is a great mystery that’s very long.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><strong data-dcnode-id="1563"><em data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1564" instrument_node="">&nbsp;is about a young FBI recruit, Clarice Starling, who helps to catch a serial killer. Another serial killer, Hannibal Lector, who is now sitting in jail for previous crimes, helps her to catch the bad guy.</span></strong></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1560" instrument_node="">Harris created Hannibal Lector first in&nbsp;</span><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1557" instrument_node="">, so if you like&nbsp;</span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1554" instrument_node="">, then definitely go back and read&nbsp;</span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1551" instrument_node="">&nbsp;in which he first appears.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1548" instrument_node="">If you’re one of the three people who has not seen the movie,&nbsp;</span><em data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Silence of the Lambs</span></em><span data-dcnode-id="1545" instrument_node="">, read the book first. Always read the book first if possible.&nbsp;</span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1542" instrument_node="">&nbsp;was also made into a couple of movies, but the earlier one (</span><em data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Manhunter</span></em><span data-dcnode-id="1539" instrument_node="">) with a young William Peterson is the better of the two.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1536" instrument_node="">Personally, I think Jodie Foster was miscast as Clarice Starling, but I digress. Just read the book; it’s the best of its type ever written. I have a friend who calls me regularly on the phone and starts the conversation with,&nbsp;</span><em data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">“Is that you, Clarice?”</span></em></p><span data-dcnode-id="1532" instrument_node="">

</span><h2 data-dcnode-id="1527"><span data-dcnode-id="1528" id="19-Relic-by-Preston-and-Child-1995"><a aria-label="19. Relic by Preston and Child, 1995 (opens in a new tab)" class="rank-math-link" data-dcnode-id="1529" data-lasso-id="58486" data-lasso-name="Relic" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1788547020%3Ftag%3Dupjourney-20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1530" instrument_node="">19. Relic by Preston and Child, 1995</span></a></span></h2><span data-dcnode-id="1526" instrument_node="">

</span><p data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">I included&nbsp;</span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Relic</span></em><span data-dcnode-id="1459" instrument_node="">&nbsp;on this list for a few reasons. First, as you get into the late twentieth century you begin to see more and more mysteries that include a science/techno/paranormal angle. I would be remiss not to include at least one great one.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Douglas Preston and Lincoln Child have written a lot of books, and many of them are excellent. Both authors have written books alone and together.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1450"><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Relic</span></em><span data-dcnode-id="1451" instrument_node="">&nbsp;is a top-notch mystery about some strange goings-on in a museum in New York. Most museums have what’s on display which is a small percentage of what they have in storage. Who knows what’s filed away in old boxes or drawers.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1443"><strong data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">In&nbsp;</span><em data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Relic</span></em><span data-dcnode-id="1445" instrument_node="">, there are some deaths at the museum, and there are several people trying to figure out what happened there, including FBI Special Agent Pendergast.</span></strong></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">This is the first appearance of Pendergast, who is seen again in several later Preston and Child books. So, if you like this one, there are plenty more.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">The book is very well-written. It’s tight, lean, well-plotted, and you’ll learn a lot about how museums operate. Pendergast is a memorable character, who will leave you wanting to learn more about him, too. Read the book and see if you like these types of mysteries with the science/techno/paranormal flavor.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">Hat tip to my brother, who put&nbsp;</span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Relic</span></em><span data-dcnode-id="1432" instrument_node="">&nbsp;on my radar, many years ago.</span></p><span data-dcnode-id="1430" instrument_node="">

</span><p data-dcnode-id="1357"><em data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">The Chimney-sweeper’s Boy</span></em><span data-dcnode-id="1358" instrument_node="">&nbsp;was one of Rendell’s later books. She had an enormous bibliography, as well as an enormous collection of prizes. Later in Rendell’s career, she wrote a number of books under the name, Barbara Vine. This book is one of those.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Rendell, who died in 2015, is best known for writing the psychological mystery and trying to understand or elucidate for the reader why people–who appear normal on the outside–do strange, crazy, illegal, and murderous things.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1352" instrument_node="">Many of her books are great, and I could have put any one of at least 10 on this list. I chose&nbsp;</span><em data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">The Chimney-sweeper’s Boy</span></em><span data-dcnode-id="1349" instrument_node="">&nbsp;because I think it’s the best of the best.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">It’s a long book with an extremely complicated plot, a surprise ending, it’s plausible, and it’s just a great story. It’s, in my opinion, a great example of the best of her work.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1341"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The mystery is what crime was committed, why, and who was involved. Period. Not giving anything else away.</span></strong></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">If you like this book, there are only another hundred or so waiting for you to read. Rendell also created the Inspector Wexford series, and many of her books have been turned into films or BBC television shows.</span></p><span data-dcnode-id="1337" instrument_node="">

</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Reginald Hill, who died in 2012, was another great British mystery writer with scores of both books and prizes under his belt, an amazing feat considering his first book wasn’t published until 1970. Before that he got a degree in English and taught English for years.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Eventually, he retired from teaching to devote himself to writing. Many of his books have been adapted to film or television.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">Hill wrote the Dalziel and Pascoe, Yorkshire detectives, series, another shorter series with a private investigator, and several standalone books.&nbsp;</span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">On Beulah Height</span></em><span data-dcnode-id="1258" instrument_node="">&nbsp;is one of the later Dalziel and Pascoe books.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">I usually recommend reading series books in order, but in this case, if you aren’t familiar with the series, I’d start with this one, then go back to the beginning if you feel inclined.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><strong data-dcnode-id="1249"><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">On Beulah Height</span></em><span data-dcnode-id="1250" instrument_node="">&nbsp;is a mystery surrounding the disappearance of several little girls over a period of years, a crime that has never been solved.</span></strong></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Dalziel and Pasco are tasked with putting this disaster to bed once and for all. The book is a part ghost story and part modern detective story.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">When you read this book, look for a complex plot, allusion, metaphor, and lyrical English. What sets Hill apart from other writers of his generation and his genre is his command of English and English literature.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Good stories, beautifully written—that’s what great mysteries are all about.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><div class="wp-container-22 wp-block-group" data-dcnode-id="1170"><div class="wp-block-group__inner-container" data-dcnode-id="1171"><span data-dcnode-id="1237" instrument_node="">
