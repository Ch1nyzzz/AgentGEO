</span><h1 class="entry-title" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">How to write cliffhangers: Suspense examples from books</span></h1><span data-dcnode-id="1573" instrument_node="">
</span><div class="intro-text section-inner max-percentage small" data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Learning&nbsp;how to write cliffhangers and suspenseful scenes is a crucial skill, whether you write mystery thrillers, fantasy fiction or another genre. The suspense examples from books below show how to bring readers to the intolerable state of not knowing that makes us race to turn the page. Here are 5 tips to start:</span></p><span data-dcnode-id="1569" instrument_node="">

</span><img alt="Writing cliffhangers - suspense examples | Now Novel" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="1519" height="270" sizes="(max-width: 480px) 100vw, 480px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-480x270.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-480x270.png 480w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-300x169.png 300w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-768x432.png 768w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-1024x576.png 1024w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-610x343.png 610w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel-150x84.png 150w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Writing-cliffhangers-suspense-examples-Now-Novel.png 1120w" width="480"><span data-dcnode-id="1518" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1188"><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Learning&nbsp;how to write cliffhangers and suspenseful scenes is a crucial skill, whether you write mystery thrillers, fantasy fiction or another genre. The suspense examples from books below show how to bring readers to the intolerable state of not knowing that makes us race to turn the page. Here are 5 tips to start:</span></p><span data-dcnode-id="1509" instrument_node="">
</span><h3 data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">1. Build anticipation for your chapter’s most suspenseful incident</span></h3><span data-dcnode-id="1506" instrument_node="">
</span><h3 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">2. Reveal vital information your characters don’t yet know themselves</span></h3><span data-dcnode-id="1503" instrument_node="">
</span><h3 data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">3. Use shorter sentences to increase pace and tension</span></h3><span data-dcnode-id="1500" instrument_node="">
</span><h3 data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">4. Create&nbsp;constraints that complicate characters’ goals</span></h3><span data-dcnode-id="1497" instrument_node="">
</span><h3 data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">5. Depict&nbsp;gripping character dilemmas</span></h3><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Let’s&nbsp;look closer at each of these pointers:</span></p><span data-dcnode-id="1491" instrument_node="">
</span><h2 data-dcnode-id="1489" id="1-build-anticipation-for-your-scenes-most-suspenseful-incident"><span data-dcnode-id="1490" instrument_node="">1. Build anticipation for your scene’s most suspenseful incident</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Small signs of a coming showdown build tension. Consider this example of suspenseful scene structure:</span></p><span data-dcnode-id="1485" instrument_node="">
</span><ul data-dcnode-id="1472"><li data-dcnode-id="1481"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">1:</span></strong><span data-dcnode-id="1482" instrument_node=""> Character Naomi buys a newspaper – a headline on the back (which Naomi does not see before she’s interrupted by a phone call) reads ‘Lake District Killings Stump Investigators’</span></li><li data-dcnode-id="1477"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">2:</span></strong><span data-dcnode-id="1478" instrument_node=""> The caller is Naomi’s&nbsp;boss asking her to collect a package in said Lake District</span></li><li data-dcnode-id="1473"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">3:</span></strong><span data-dcnode-id="1474" instrument_node=""> Naomi’s car breaks down in the area but there’s a garage nearby. She goes to get help and the owner&nbsp;gives her the creeps</span></li></ul><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">The newspaper headline Naomi hasn’t seen alerts us to the danger of her destination. When her car breaks down, that knowledge is in the back of our minds as readers (but not in Naomi’s mind because she’s oblivious to the danger).</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1467" instrument_node="">This creates dread because&nbsp;we&nbsp;anticipate a shocking turn of events. If this chapter were to end on the shifty garage owner telling Naomi to wait while he nips out back, this would be a good minor cliffhanger, regardless of whether the owner later proves to be the killer </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/better-mystery-plots-7-clues/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1466" instrument_node="">or only a red herring (a false suspect)</span></a><span data-dcnode-id="1464" instrument_node="">.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><h2 data-dcnode-id="1460" id="2-reveal-vital-information-your-characters-dont-yet-know-themselves"><span data-dcnode-id="1461" instrument_node="">2. Reveal vital information your characters don’t yet know themselves</span></h2><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">Giving your reader troubling information your protagonist does not yet have, information that directly concerns them, is an excellent method for </span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/how-to-create-tension-in-writing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1457" instrument_node="">creating suspense and tension</span></a><span data-dcnode-id="1455" instrument_node="">.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">Consider this example from David Mitchell’s novel, </span><em data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Cloud Atlas </span></em><span data-dcnode-id="1449" instrument_node="">(2004):</span></p><span data-dcnode-id="1447" instrument_node="">
</span><h3 data-dcnode-id="1443"><span data-dcnode-id="1446" instrument_node="">Suspense in David Mitchell’s&nbsp;</span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Cloud Atlas</span></em></h3><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">In the section of the novel titled ‘Half-Lives – The First Luisa Rey Mystery’, Luisa Rey is a journalist investigating a nuclear power plant in California that may be contravening&nbsp;safety regulations.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Her investigation places her in danger, as the ruthless owners face dire consequences if news of their irresponsibility leaks.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Towards the end of the chapter, Luisa is driving in her orange VW, en route to report her latest findings. Meanwhile, we read this exchange between a security guard and a mysterious man, Mr Smoke, at a checkpoint near the plant:</span></p><span data-dcnode-id="1433" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1419"><p data-dcnode-id="1422"><span data-dcnode-id="1432" instrument_node="">“I’m guessing Joe Napier has just called you and ordered you not to let an orange VW pass the checkpoint.”</span><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">“That’s correct, Mr. Smoke.”</span><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">“I’m here to countermand that order, on Mr Grimaldi’s personal authority. You </span><em data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">will</span></em><span data-dcnode-id="1425" instrument_node=""> raise the barrier for the VW and let me follow. You’ll phone your buddy on the mainland checkpoint now, and tell him not to let anything through until he sees my car. When Mr Napier gets here, about fifteen minutes from now, you will tell him Alberto Grimaldi says, “Go back to bed.” Understand, Richter?”</span><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node="">“Understood, Mr Smoke.”</span></p><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">David Mitchell, Cloud Atlas (2004), p. 143</span></p></blockquote><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Mitchell creates&nbsp;tension because we know a guard has been given instructions regarding Luisa’s VW. We also see potential help for Luisa&nbsp;– her friend Joe Napier – will be diverted. Mr Smoke proceeds to threaten the guard subtly:</span></p><span data-dcnode-id="1415" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1398"><p data-dcnode-id="1401"><span data-dcnode-id="1414" instrument_node="">“You got married this spring, if memory serves?”</span><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">“You have an excellent memory, sir.”</span><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">“I do. Hoping to start a family?”</span><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">“My wife’s four months pregnant, Mr Smoke.”</span><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">“A piece of advice, Richter, on how to succeed in the security business. Would you like to hear this piece of advice, son?”</span><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">“I would, sir.”</span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">“The dumbest dog can sit and watch. What takes brains is knowing when to look away. Am I making sense to you, Richter?”</span></p><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Mitchell, Cloud Atlas, p. 144</span></p></blockquote><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">This exchange stacks the odds against Luisa. Our suspicions Mr Smoke&nbsp;has dark intentions are confirmed when Mr Smoke rams Luisa’s car off the road after the checkpoint, sending her plunging into the sea below in a tense, chapter-ending cliffhanger.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Similarly, give your reader information they wish they could relay to the endangered or otherwise oblivious protagonist.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1388"><figure class="aligncenter" data-dcnode-id="1389"><img alt="Writing suspense and cliffhangers - HP Lovecraft on suspense | Now Novel" class="wp-image-8818" data-dcnode-id="1390" height="700" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel.png&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel.png 700w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel-150x150.png 150w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel-300x300.png 300w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel-610x610.png 610w, https://www.nownovel.com/blog/wp-content/uploads/2017/05/Quotes-HP-Lovecraft-Plot-and-suspense-Now-Novel-270x270.png 270w" width="700"></figure></div><span data-dcnode-id="1387" instrument_node="">
</span><h2 data-dcnode-id="1385" id="3-use-shorter-sentence-length-to-increase-pace-and-tension"><span data-dcnode-id="1386" instrument_node="">3. Use shorter sentence length to increase pace and tension</span></h2><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Sentence length and structure can dramatically alter the mood of a passage. Long, flowing sentences often achieve a lyrical effect. Short, terse, intense sentences, on the other hand, speed up the flow because we parse or process what they mean faster.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">Take this example from E. Annie Proulx’s Pulitzer-winning novel, </span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The Shipping News </span></em><span data-dcnode-id="1377" instrument_node="">(1993).</span></p><span data-dcnode-id="1375" instrument_node="">
</span><h3 data-dcnode-id="1371"><span data-dcnode-id="1374" instrument_node="">Sentence length and tension in&nbsp;</span><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">The Shipping News</span></em></h3><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">The protagonist Quoyle has found a mysterious suitcase washed up on rocky outcrops on the Newfoundland coast. The chapter builds to Quoyle finally opening the suitcase when he is back on land:</span></p><span data-dcnode-id="1367" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1360"><p data-dcnode-id="1363"><span data-dcnode-id="1366" instrument_node="">Quoyle dragged the suitcase under the single wharf light. He found a piece of pipe and jabbed the lock. The pipe clinked against the brass. The lock held. Quoyle looked around for something to pry, a screwdriver or chisel, but there was nothing but stone and broken glass. In frustration he raised the pipe over his shoulder and swung as hard as he could at the lock. A metallic crack and, with a frightful wave of stench, the suitcase sprang open.</span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">Under the light he saw the ruined eye, the flattened face and blood-stiff mustache of Bayonet Mellville on a bed of seaweed. The gelatinous horror slid out onto the wharf.</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">E. Annie Proulx, The Shipping News (1993), pp. 177-178</span></p></blockquote><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Quoyle’s grisly discovery – the severed head of a character encountered in an earlier chapter – is gradually built to throughout the chapter. The short, verb-centred phrases (‘the lock held’) create a breathless sense of unfolding action. Vary&nbsp;sentence length too, because it will make moments of suspense and terror move faster.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><h2 data-dcnode-id="1354" id="4-use-constraints-that-complicate-characters-goals"><span data-dcnode-id="1355" instrument_node="">4. Use constraints that complicate characters’ goals</span></h2><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">When a character must achieve an impossible-seeming task, additional constraints – such as time limitations – increase tension.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1349" instrument_node="">The third novel in Stephen King’s </span><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">The Dark Tower</span></em><span data-dcnode-id="1346" instrument_node=""> series, </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The Waste Lands&nbsp;</span></em><span data-dcnode-id="1343" instrument_node="">(1991), for example, has a cliffhanger [spoiler follows].</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">The novel ends with a tense train ride on a monorail whose AI is highly intelligent but has gone insane. King’s&nbsp;characters must escape the city of Lud on the monorail, as the city’s destruction is imminent due to the malfunctioning AI. The train announces to the band of characters that it will derail itself before they reach their destination unless they can defeat it in a riddle contest.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">These constraints effectively increase tension. For the characters to reach their goal they must outwit complex AI. King then adds a further element of unpredictability, the AI’s malfunctioning. The story ends on this cliffhanger, without giving the reader a comforting resolution.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Constraints you can use to create obstacles to your characters’ goals and make your scenes tense include:</span></p><span data-dcnode-id="1332" instrument_node="">
</span><ul data-dcnode-id="1325"><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Time constraints (such as the rapidly approaching destruction that drives King’s characters to flee Lud)</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Physical constraints – a character, for example, must hurry from a malevolent pursuer but they are injured, slowing them down</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Mental&nbsp;constraints – popular sources of tension in sci fi novels, where characters must sometimes understand and solve complex problems involving machine learning to correct hazardous&nbsp;yet logically explicable behaviour</span></li></ul><span data-dcnode-id="1324" instrument_node="">
</span><h2 data-dcnode-id="1322" id="5-create-gripping-character-dilemmas"><span data-dcnode-id="1323" instrument_node="">5. Create gripping character dilemmas</span></h2><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">There are many suspense examples in books that show how a good character dilemma can make a story gripping. Tension and suspense grow from our investment in characters’ arcs.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">In David Mitchell’s example above, we invest in Luisa Rey’s arc because she is on an ethical path to expose corrupt corporate behaviour that is threatening others’ wellbeing. Besides making characters face external threats to their goals (known and unknown), create interesting dilemmas.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">Steven James writing for Writer’s Digest lists some </span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.writersdigest.com/online-editor/5-moral-dilemmas-that-make-characters-stories-better" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1313" instrument_node="">character dilemmas that increase suspense</span></a><span data-dcnode-id="1311" instrument_node="">:</span></p><span data-dcnode-id="1309" instrument_node="">
</span><ul data-dcnode-id="1293"><li data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Competing desires</span></strong><span data-dcnode-id="1306" instrument_node="">: A character is torn between opposing wants.</span></li><li data-dcnode-id="1301"><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Tests of faith:</span></strong><span data-dcnode-id="1302" instrument_node="">&nbsp;A character must ask themselves how far they’re willing to go to stay true to&nbsp;primary beliefs or values</span></li><li data-dcnode-id="1294"><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Being forced into a corner:&nbsp;</span></strong><span data-dcnode-id="1298" instrument_node="">A character has no easy way out but is compelled to make a decision through external forces. The classic example of this is </span><em data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Sophie’s Choice&nbsp;</span></em><span data-dcnode-id="1295" instrument_node="">(1979), the tragic (and controversial) story of a woman imprisoned in Auschwitz who must choose which of her children lives</span></li></ul><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">Character dilemmas often deepen existing tensions. For example, when Quoyle discovers the severed head in the suspense example from </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The Shipping News</span></em><span data-dcnode-id="1288" instrument_node="">, this could in turn become a dilemma. Who should Quoyle&nbsp;tell first? What will the consequences of uncovering this murder be? Creating gripping sequences of dilemmas, choices, and further dilemmas that arise from these choices creates sustained tension.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node="">Join Now Novel for peer feedback in our free critique groups, or</span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/coaching" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1284" instrument_node=""> get help from a writing coach</span></a><span data-dcnode-id="1282" instrument_node=""> developing your story’s suspense and other selling points.</span></p><span data-dcnode-id="1280" instrument_node="">

</span><a data-dcnode-id="1077" href="#comment-520693"><time data-dcnode-id="1078" datetime="2017-05-22T13:31:00-04:00" title="May 22, 2017 at 1:31 pm"><span data-dcnode-id="1079" instrument_node="">May 22, 2017 at 1:31 pm</span></time></a><span data-dcnode-id="1076" instrument_node=""> </span></div><span data-dcnode-id="1074" instrument_node="">

</span><div class="comment-content entry-content" data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Great article I definitely need this to help with my writing. I thought that ending stories in cliffhangers was a bad idea because it will leave readers frustrated. I guess it depends on if the person is an established writer already. Number 2 is the hardest for me to do because I end up repeating the information later in the study even after revealing information that the character does not know. I get confused on how to bring it up sounding like a broken record. Also, I find that the smallest information that I reveal could give away the entire story. I know that George RR Martin is good with hiding information in his A Song of Ice and Fire series. Any articles or tips on how to combat this?</span></p><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
