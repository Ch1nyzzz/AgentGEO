</span><h1 class="article-title" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">New Blood: Why Dexter Killed [SPOILER] (&amp; How That Set Up Twist Ending)</span></h1><span data-dcnode-id="1337" instrument_node="">
</span><p class="article-excerpt" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Dexter Morgan killed the innocent [SPOILER] in New Blood's finale when backed into a corner, which also directly set up the show's twist ending.</span></p><span data-dcnode-id="1334" instrument_node="">

</span><section class="article-body" data-dcnode-id="802" id="article-body" itemprop="articleBody"><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1230" style="text-align: center;"><strong data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">Warning: Major Spoilers Ahead for </span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1232" instrument_node="">'s season finale.</span></strong></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1228" instrument_node="">The&nbsp;twist ending of&nbsp;</span><strong data-dcnode-id="1224"><em data-dcnode-id="1225"><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/tag/dexter/"><span data-dcnode-id="1227" instrument_node="">Dexter: New Blood</span></a></em></strong><span data-dcnode-id="1223" instrument_node=""> was certainly shocking, but&nbsp;also inevitable once&nbsp;Dexter uncharacteristically killed Logan. After being arrested for the murder of Matt Caldwell while being under </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-season-8-mystery-bay-harbor-butcher/"><span data-dcnode-id="1222" instrument_node="">suspicion as the mysterious Bay Harbor Butcher</span></a><span data-dcnode-id="1220" instrument_node="">, Dexter Morgan was backed deep into a corner he had yet to experience, as augmented by Harrison’s involvement. Before being locked in the holding cell, Dexter sends Angela out to find Kurt’s burial ground as the&nbsp;Runaway Killer, leaving him alone with Logan. When asking Logan for a bottle of water, Dexter smashes his head against the bars, chokes him, and snaps his neck. After killing Logan in cold blood, Dexter unlocks his cell, takes Logan’s car keys, and goes to meet with Harrison&nbsp;as a last-ditch effort to escape Iron Lake together.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><span data-dcnode-id="1215" instrument_node="">
</span><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1212" instrument_node="">While </span><em data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1209" instrument_node="">’s finale may have benefitted from another episode to keep from rushing&nbsp;its content, </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/why-new-blood-just-killed-spoiler/"><span data-dcnode-id="1208" instrument_node="">Dexter being killed by Harrison</span></a><span data-dcnode-id="1206" instrument_node=""> for his actions makes logical sense for the story's conclusion. Harrison had planned to escape with&nbsp;his father until the moment he realized the blood on his shirt was Logan’s, and that Dexter had called him from Logan’s phone. Considering Harrison could hardly stomach the actual killing of Kurt Caldwell as the Runaway Killer, there was no way he could stand by his father murdering&nbsp;an&nbsp;innocent man (and his wrestling coach). Killing Dexter, his own father, was the hardest decision Harrison had to make, but&nbsp;the famed serial killer&nbsp;finally realized he needed to be put down, guiding his son through pulling the trigger.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><span data-dcnode-id="1201" instrument_node="">
</span><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1194"><span class="related-single" data-dcnode-id="1195"><span data-dcnode-id="1198" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-10-new-blood-season-2-updates-news/"><span data-dcnode-id="1197" instrument_node="">Dexter New Blood Season 2: Everything We Know</span></a></span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1192" instrument_node="">While Dexter has caused or been responsible for the deaths of many innocent people like Maria LaGuerta, Rita Morgan, James Doakes, and even&nbsp;</span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-deb-harrison-kill-ritual-stop/"><span data-dcnode-id="1191" instrument_node="">his sister Deb Morgan</span></a><span data-dcnode-id="1189" instrument_node="">, he hadn’t taken the life of a truly innocent person close to him until Logan in </span><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">New Blood</span></em><span data-dcnode-id="1186" instrument_node="">. Dexter has taken the lives of innocents without remorse when in a bad situation or in a particularly irate state, but these are strangers—not that that fact makes the killings any better. Logan’s death was too close to home and marked a profound change in not only who Dexter has become, but who Dexter has always been. Dexter needing to kill Logan was uncharacteristic for his Code and grown morality, but was unsurprising in context and sealed his fate to be killed by Harrison in </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-ending-explained-meaning/"><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1183" instrument_node="">’s twist&nbsp;ending</span></a><span data-dcnode-id="1181" instrument_node="">.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><span data-dcnode-id="1176" instrument_node="">
</span><span data-dcnode-id="1174" instrument_node="">
</span><h2 data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Dexter Has Betrayed Harry’s Code Throughout New Blood</span></h2><span data-dcnode-id="1171" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1146"><span data-dcnode-id="1170" instrument_node="">
</span><div data-dcnode-id="1148" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1169" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1150" style="padding-bottom: 50%"><span data-dcnode-id="1168" instrument_node="">
</span><picture data-dcnode-id="1152"><span data-dcnode-id="1167" instrument_node="">
</span><span data-dcnode-id="1165" instrument_node="">
</span><source data-dcnode-id="1164" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1163" instrument_node="">
</span><source data-dcnode-id="1162" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1161" instrument_node="">
</span><source data-dcnode-id="1160" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1159" instrument_node="">
</span><source data-dcnode-id="1158" data-srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w" media="(min-width: 0px)" sizes="450px" srcset="https://static0.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-morgan-new-blood-finale-angela-arrest.jpg?q=50&amp;fit=crop&amp;w=450&amp;h=225&amp;dpr=1.5 450w"><span data-dcnode-id="1157" instrument_node="">
</span><span data-dcnode-id="1155" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1154"><span data-dcnode-id="1153" instrument_node="">
</span></picture><span data-dcnode-id="1151" instrument_node="">
</span></div><span data-dcnode-id="1149" instrument_node="">
</span></div><span data-dcnode-id="1147" instrument_node="">
</span></figure><span data-dcnode-id="1145" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">
</span><span data-dcnode-id="1142" instrument_node="">
</span></div><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1139" instrument_node="">Right off the bat, </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1136" instrument_node=""> episode 1 reminds audiences that Dexter has not killed for a decade, so he’s extremely rusty. His first kill after 10 years is Matt Caldwell in a heat-of-the-moment attack; he hardly did his research to confirm the story that Matt caused the deaths of five people, he attacked Matt in the open woods where thermal characters could detect him, and he burned Matt’s body while leaving behind a titanium screw from his leg. While Matt still fit the Code, Dexter immediately betrayed it by not taking the time to avoid being caught. Then, Dexter attacked Miles and killed Jasper with the </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-retcon-ketamine-m99-mistake/"><span data-dcnode-id="1135" instrument_node="">Bay Harbor Butcher's Ketamine drug</span></a><span data-dcnode-id="1133" instrument_node="">, both of which were because he was emotionally involved after&nbsp;their fentanyl drug dealing caused Harrison to overdose. Another significant rule of the code is to not get emotionally involved, as it is a much more direct link back to Dexter and the passion of the kill can lead to mistakes. Early on in </span><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1130" instrument_node="">, Deb (as Dexter’s conscience) admitted that Harry teaching Dexter the Code was child abuse, revealing that he may not completely believe in the Code anyway. As Harrison deduces, Dexter’s killing has never been about vigilanteism or following the Code, it’s a convenient justification for him enjoying killing. Harry’s Code guided him and taught him to not get caught, but it was never going to be what actually stopped Dexter from killing whoever got in his way.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><span data-dcnode-id="1125" instrument_node="">
</span><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1122" instrument_node="">As paralleled back in season 2 of&nbsp;</span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-trinity-killer-rita-death-flashback/"><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Dexter</span></em><span data-dcnode-id="1119" instrument_node="">&nbsp;when&nbsp;Rita Bennett</span></a><span data-dcnode-id="1117" instrument_node=""> made him go to NA because she thought he was using drugs, Dexter Morgan is an addict. Some are addicted to drugs, alcohol, sex, or cigarettes; Dexter Morgan is addicted to killing. This is seen time and again when he plunges his knife into the heart of his victims; his release and gratification from killing are physically apparent, almost looking sexually orgasmic when his victim draws their last breath. Dexter was an addict who stopped his vice cold-turkey for a decade, so when he returned to killing, there was bound to be too much, too fast, with dire consequences. Addicts who return to their vice after too long lose their tolerance, which is what is responsible for a significant amount of drug overdoses, as they indulge in the strength of their old habit and it becomes far too powerful for their system all at once. Dexter feeling the flooding effects of his killing after such a long gap overpowered him in </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-reboot-line-jim-lindsay-angela/"><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1114" instrument_node="">'s reboot</span></a><span data-dcnode-id="1112" instrument_node="">&nbsp;to the point where the Code could no longer control him, and he ended up overdosing. He even tried to convince Harrison to become his serial killing accomplice, which directly opposed the reason why he left in </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Dexter</span></em><span data-dcnode-id="1109" instrument_node="">’s original series finale. The drug had entered Dexter’s body at too high of a volume too quickly, leaving the man at the end of </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1106" instrument_node="">’s series to hardly resemble Dexter Morgan.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1099" instrument_node="">
</span><h2 data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Why Dexter Killed Logan</span></h2><span data-dcnode-id="1096" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1071"><span data-dcnode-id="1095" instrument_node="">
</span><div data-dcnode-id="1073" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1094" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1075" style="padding-bottom: 50%"><span data-dcnode-id="1093" instrument_node="">
</span><picture data-dcnode-id="1077"><span data-dcnode-id="1092" instrument_node="">
</span><span data-dcnode-id="1090" instrument_node="">
</span><source data-dcnode-id="1089" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-jail-logan-kill-death.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-jail-logan-kill-death.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1088" instrument_node="">

</span><source data-dcnode-id="1085" data-srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-jail-logan-kill-death.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static1.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-jail-logan-kill-death.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1084" instrument_node="">

</span></div><span data-dcnode-id="1072" instrument_node="">
</span></figure><span data-dcnode-id="1070" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1066"><span data-dcnode-id="1069" instrument_node="">
</span><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1064" instrument_node="">After straying so far from the Code of Harry throughout </span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1061" instrument_node="">, it’s not completely surprising that Dexter would commit the most grievous error of murdering an innocent. Even though the evidence against </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-episode-3-ending-ashes-matt/"><span data-dcnode-id="1060" instrument_node="">Dexter for killing Matt</span></a><span data-dcnode-id="1058" instrument_node=""> and being the Bay Harbor Butcher was convenient at best, Dexter felt backed into a corner as he sat in the holding cell of Iron Lake’s police station. Time was running out as Angel Batista made his way to Iron Lake, Angela could have connected Harrison to Kurt’s death, and his actions for the past 30 years were catching up to him—so he panicked. While Dexter has been in tougher situations that he’s miraculously gotten out of, </span><em data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">New Blood</span></em><span data-dcnode-id="1055" instrument_node=""> is a new Dexter. In previous seasons, Dexter also didn’t have to worry about Harrison suffering from his sins because&nbsp;he was just a child. In </span><em data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Dexter: New Blood</span></em><span data-dcnode-id="1052" instrument_node="">, Dexter’s choices were either to be caught as </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-bay-harbor-butcher-fix/"><span data-dcnode-id="1051" instrument_node="">Miami's&nbsp;Bay Harbor Butcher</span></a><span data-dcnode-id="1049" instrument_node="">, or kill Logan, grab Harrison, and run. Harrison’s return increased Dexter’s levels of impulsivity, thus losing part of what previously kept him from making rash decisions and carefully avoiding capture. To top it off, Dexter banished Deb from his mind right before he killed Logan, which was </span><em data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">New Blood</span></em><span data-dcnode-id="1046" instrument_node="">’s way of saying that Dexter’s morality and conscience were completely gone at that moment.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><span data-dcnode-id="1041" instrument_node="">
</span><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span class="related-single" data-dcnode-id="1035"><span data-dcnode-id="1038" instrument_node="">Related:&nbsp;</span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-harrison-runaway-killer-twist-doomsday-killer/"><span data-dcnode-id="1037" instrument_node="">New Blood: Harrison Twist Redeems Dexter's Worst Villain</span></a></span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1032" instrument_node="">Dexter had also been acting uncharacteristically impulsive and sloppy throughout the reboot series, so of course, Dexter would stray the farthest from the Code and his typical guidelines by killing an innocent. Logan was collateral, but he was one of the worst possible people that Dexter could have chosen to kill. He was simply coming to bring Dexter a bottle of water, was desperately hoping Dexter was innocent for Harrison’s sake and was one of Harrison’s greatest mentors as his wrestling coach in </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-filming-location-iron-lake-where/"><em data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">New Blood</span></em><span data-dcnode-id="1029" instrument_node="">'s Iron Lake</span></a><span data-dcnode-id="1027" instrument_node="">. It would have been easier for Dexter to just choke Logan into unconsciousness, take the keys to the cell, and run, but Dexter made the decision to kill him. At that moment, the Code was the least of Dexter’s worries, so he killed Logan to back himself out of a corner. But, this would end up being the action that sealed&nbsp;his fate in </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">New Blood</span></em><span data-dcnode-id="1024" instrument_node="">'s finale.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><span data-dcnode-id="1020" instrument_node="">
</span><h2 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">How Killing Logan Set Up Dexter’s New Blood Death</span></h2><span data-dcnode-id="1017" instrument_node="">
</span><figure class="item-img" data-dcnode-id="992"><span data-dcnode-id="1016" instrument_node="">
</span><div data-dcnode-id="994" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1015" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="996" style="padding-bottom: 50%"><span data-dcnode-id="1014" instrument_node="">
</span><picture data-dcnode-id="998"><span data-dcnode-id="1013" instrument_node="">
</span><span data-dcnode-id="1011" instrument_node="">
</span><source data-dcnode-id="1010" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-harrison-morgan-kill-death-finale.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-harrison-morgan-kill-death-finale.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1009" instrument_node="">
</span><source data-dcnode-id="1008" data-srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-harrison-morgan-kill-death-finale.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static3.srcdn.com/wordpress/wp-content/uploads/2022/01/dexter-new-blood-harrison-morgan-kill-death-finale.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1007" instrument_node="">

</span><span data-dcnode-id="1001" instrument_node="">

</span></div><span data-dcnode-id="995" instrument_node="">
</span></div><span data-dcnode-id="993" instrument_node="">
</span></figure><span data-dcnode-id="991" instrument_node="">
</span><div class="ad-even" data-dcnode-id="987"><span data-dcnode-id="990" instrument_node="">
</span><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="985" instrument_node="">Whether Dexter killing Logan feels uncharacteristically contrived or not, this moment indicated that Dexter would have to die, as Dexter himself now fit the Code of Harry. </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">New Blood</span></em><span data-dcnode-id="982" instrument_node=""> episode 9 followed Dexter teaching Harrison the Code, and how its importance would save the lives of thousands by killing a few deserving individuals. While Harrison thought of </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-superhero-dark-defender-origin/"><span data-dcnode-id="981" instrument_node="">Dexter as a “</span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Dark Defender</span></em><span data-dcnode-id="978" instrument_node="">” superhero</span></a><span data-dcnode-id="976" instrument_node=""> by the end of episode 9, </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">New Blood</span></em><span data-dcnode-id="973" instrument_node="">’s finale saw this all change when Dexter killed an innocent man who also happened to look out for Harrison in town. Harrison came to terms with the fact that he was never going to be like his father, that Dexter wasn’t a vigilante, he </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">enjoyed</span></em><span data-dcnode-id="970" instrument_node=""> killing people, and it cost the lives of so many innocents. Dexter taught Harrison the Code well, and by killing Logan and attempting to escape justice for his crimes, Dexter would have to be killed. No more innocent lives would be taken or destroyed on behalf of Dexter and his mistakes, and Logan would be the last hit of Dexter's addiction&nbsp;that went too far. When considering Dexter’s entire guidelines for killing, there was no alternative&nbsp;fate for him in </span><strong data-dcnode-id="967"><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Dexter: New Blood</span></em></strong><span data-dcnode-id="966" instrument_node="">’s finale once he murdered Logan.</span></p><span data-dcnode-id="964" instrument_node="">
</span><span data-dcnode-id="961" instrument_node="">
</span><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="954"><span class="next-single" data-dcnode-id="955"><span data-dcnode-id="958" instrument_node="">Next:&nbsp;</span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/dexter-new-blood-therapy-harrison-season-1/"><span data-dcnode-id="957" instrument_node="">Dexter: New Blood Confirms A Fan Theory</span></a></span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="947"><strong data-dcnode-id="950"><em data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Dexter: New Blood&nbsp;</span></em></strong><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">is now streaming in its entirety on SHOWTIME.</span></strong></p><span data-dcnode-id="946" instrument_node="">
