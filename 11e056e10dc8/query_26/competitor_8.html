</span><section class="article-body" data-dcnode-id="802" id="article-body" itemprop="articleBody"><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180" style="text-align: center;"><strong data-dcnode-id="1181"><em data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Warning! SPOILERS for You Should Have Left below</span></em></strong></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1178" instrument_node="">Blumhouse Productions' newest offering of supernatural horror,&nbsp;</span><strong data-dcnode-id="1174"><em data-dcnode-id="1175"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.screenrant.com/tag/you-should-have-left"><span data-dcnode-id="1177" instrument_node="">You Should Have Left</span></a></em></strong><span data-dcnode-id="1173" instrument_node="">, plays with the haunted house sub-genre and places a modern twist with an ending packed with hidden meaning about marital and domestic issues.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1170" instrument_node="">Starring Kevin Bacon as Theo Conroy and Amanda Seyfried as his wife, Susanna,&nbsp;</span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">You Should Have Left&nbsp;</span></em><span data-dcnode-id="1167" instrument_node="">is a slow-burn thriller with deeper meaning about the larger ramifications of sin, marital strife, and guilt. Written and directed by David Koepp,&nbsp;</span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">You Should Have Left&nbsp;</span></em><span data-dcnode-id="1164" instrument_node="">was based on the 2017 novella of the same name by author Daniel Kehlmann. The idyllic Welsh location, complete with a traditional house atop a hill just like the classics within the same sub-genre like&nbsp;</span><em data-dcnode-id="1160"><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.screenrant.com/tag/the-amityville-horror"><span data-dcnode-id="1163" instrument_node="">The Amityville Horror</span></a><span data-dcnode-id="1161" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1159" instrument_node="">and&nbsp;</span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.screenrant.com/tag/the-haunting-of-hill-house"><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The&nbsp;</span></em><em data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Haunting of Hill House</span></em></a><span data-dcnode-id="1153" instrument_node="">,&nbsp;focuses more on the relationship dynamics between Theo and Susanna than it does the looming threat and mystery of the house.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><span data-dcnode-id="1148" instrument_node="">
</span><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1141"><span class="related-single" data-dcnode-id="1142"><span data-dcnode-id="1145" instrument_node="">Related: </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/guest-movie-ending-david-identity-explained/"><span data-dcnode-id="1144" instrument_node="">The Guest Ending Explained: Who Is David (&amp; What's Wrong With Him)</span></a></span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node="">The ending of </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">You Should Have Left</span></em><span data-dcnode-id="1136" instrument_node="">&nbsp;comes to a head in an unexpected way that serves as poignant social commentary on how something as simple as a house can represent one's personal demons, rather than being a standard haunted locale. In many ways, the title itself is even indicative of the movie's deeper meaning. Here's a breakdown of the ending of </span><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">You Should Have Left</span></em><span data-dcnode-id="1133" instrument_node="">&nbsp;and what the house actually means.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">What Happened At The End Of You Should Have Left</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1103"><span data-dcnode-id="1127" instrument_node="">
</span><div data-dcnode-id="1105" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1126" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1107" style="padding-bottom: 50%"><span data-dcnode-id="1125" instrument_node="">
</span><picture data-dcnode-id="1109"><span data-dcnode-id="1124" instrument_node="">
</span><span data-dcnode-id="1122" instrument_node="">
</span><source data-dcnode-id="1121" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w" media="(min-width: 1024px)" sizes="740px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=740&amp;h=370&amp;dpr=1.5 740w"><span data-dcnode-id="1120" instrument_node="">
</span><source data-dcnode-id="1119" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w" media="(min-width: 768px)" sizes="963px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=963&amp;h=481&amp;dpr=1.5 963w"><span data-dcnode-id="1118" instrument_node="">
</span><source data-dcnode-id="1117" data-srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w" media="(min-width: 481px)" sizes="737px" srcset="https://static2.srcdn.com/wordpress/wp-content/uploads/2020/06/Amanda-Seyfried-in-You-Should-Have-Left.jpg?q=50&amp;fit=crop&amp;w=737&amp;h=368&amp;dpr=1.5 737w"><span data-dcnode-id="1116" instrument_node="">

</span><span data-dcnode-id="1112" instrument_node="">
</span><img alt="Amanda Seyfried in You Should Have Left" class="lazyloaded" data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
</span></picture><span data-dcnode-id="1108" instrument_node="">
</span></div><span data-dcnode-id="1106" instrument_node="">
</span></div><span data-dcnode-id="1104" instrument_node="">
</span></figure><span data-dcnode-id="1102" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1096" instrument_node="">At the end of&nbsp;</span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">You Should Have Left</span></em><span data-dcnode-id="1093" instrument_node="">,&nbsp;Theo (</span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/friday-13th-kevin-bacon-comments-movie-death-scene/"><span data-dcnode-id="1092" instrument_node="">Bacon</span></a><span data-dcnode-id="1090" instrument_node="">) decides that he is going to stay behind in the house and allow Susanna (</span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/guardians-galaxy-gamora-role-amanda-seyfried/"><span data-dcnode-id="1089" instrument_node="">Seyfried</span></a><span data-dcnode-id="1087" instrument_node="">) and their daughter, Ella (Avery Essex) to move on without him. However, despite Susanna's infidelity, the reasoning Theo has for staying behind isn't due to a desire to leave his family - because of his past sins, the greatest of which was allowing his previous wife to drown in the bath tub, he cannot leave the property. Susanna is understandably confused; she seems to have little remorse for what she did, but also seems to think they could reconcile, but takes Ella and leaves after Theo insists that he cannot.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><span data-dcnode-id="1082" instrument_node="">
</span><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Theo's decision to stay behind represents his decision to atone for his sins, to embrace what he has done instead of continually lying to himself and deluding himself that he is able to maintain a happy, healthy marriage as a husband and father. Earlier in the movie, Susanna made mention to Theo's Catholic school education, and it's clear that he harbors a lot of remorse for his actions. This has caused him to become angry and distant in his marriage, jealous, and even paranoid that his wife would cheat on him. While Susanna was unfaithful, it's possible that some of Theo's behaviors caused additional strife and hardship in their marriage because he could never fully atone for his sins, and could never escape the truth, which he kept from his wife - allowing her to believe he was innocent - until the end of the movie.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><span data-dcnode-id="1074" instrument_node="">
</span><span data-dcnode-id="1072" instrument_node="">
</span><h2 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">You Should Have Left: What Does The House Represent?</span></h2><span data-dcnode-id="1069" instrument_node="">
</span><figure class="item-img" data-dcnode-id="1044"><span data-dcnode-id="1068" instrument_node="">
</span><div data-dcnode-id="1046" style="margin:0 auto;max-width:2000px;"><span data-dcnode-id="1067" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1048" style="padding-bottom: 50%"><span data-dcnode-id="1066" instrument_node="">
</span><picture data-dcnode-id="1050"><span data-dcnode-id="1065" instrument_node="">
</span><span data-dcnode-id="1063" instrument_node="">

</span></div><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1037" instrument_node="">The house in&nbsp;</span><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">You Should Have Left&nbsp;</span></em><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/american-horror-story-purgatory-locations-clue-explained/"><span data-dcnode-id="1034" instrument_node="">represents purgatory for sinners</span></a><span data-dcnode-id="1032" instrument_node=""> who are destined for Hell. Earlier in the movie, Theo has a conversation with his daughter about Heaven and who gets to go there. While he is clearly uncomfortable with speaking of death and Heaven, he seems even more nervous answering the question of who is deserving of Heaven. For Theo, this is because he knows the truth about his first wife's death; he might not have directly killed her, but when he saw her drowning in the tub because she was under the influence of substances that made her pass out, he chose not to save her. Theo's reasoning for this was because he was in an unhappy marriage and, at the time, he saw it as a way out. It was selfish, and he could have chosen to divorce her and end their marriage without her having to die; now, he is haunted by his own actions, suffering for them, and allowing them to interfere in a marriage that he seems committed to, with a child he loves.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><span data-dcnode-id="1027" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1020"><span class="related-single" data-dcnode-id="1021"><span data-dcnode-id="1024" instrument_node="">Related: </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/our-house-movie-ending-explained-eli-doll-sequel/"><span data-dcnode-id="1023" instrument_node="">Our House Ending: Eli &amp; The Doll Explained</span></a></span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">Theo finds the house through an online listing, and while it seems innocuous, both he and Susanna have a moment of confusion where they each think the other sent the link to their new rental. Even so, they are drawn to the place; this is because, as confirmed by the ending of&nbsp;</span><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">You Should Have Left</span></em><span data-dcnode-id="1015" instrument_node="">, the house finds people who are destined to go to Hell due to sins they've committed. It doesn't specify the level of sin, which could be why Susanna is able to leave even though she was unfaithful to her husband.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">However, it's also possible Theo has to remain trapped inside - along with many other victims who have been claimed by the house - because he truly believes he is meant to go to Hell, and has accepted his fate. His palpable guilt over how he allowed his first wife to die has left him to believe he is unworthy of redemption, and so the house claims his soul. Not long after he and his family arrive, Theo isn't allowed to leave.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><span data-dcnode-id="1007" instrument_node="">
</span><span data-dcnode-id="1005" instrument_node="">
</span><h2 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The Real Meaning Of You Should Have Left</span></h2><span data-dcnode-id="1002" instrument_node="">
</span><figure class="item-img" data-dcnode-id="977"><span data-dcnode-id="1001" instrument_node="">
</span><div data-dcnode-id="979" style="margin:0 auto;max-width:1400px;"><span data-dcnode-id="1000" instrument_node="">

</span><span data-dcnode-id="996" instrument_node="">

</span><div class="ad-even" data-dcnode-id="972"><span data-dcnode-id="975" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="970" instrument_node="">The title is a giveaway about the movie's ending and Theo's greater crime: if he had just chosen to walk away from his unhappy marriage instead of watching his wife drown in the tub, he would have been free. From there, maybe he would have met Susanna and continued along the same path, but as a happier version of himself instead of a tortured soul. In many ways, the real meaning of&nbsp;</span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">You Should Have Left</span></em><strong data-dcnode-id="965"><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&nbsp;</span></em></strong><span data-dcnode-id="964" instrument_node="">is about decision making and how every action sets off a chain reaction that is often unknown until it's too late. Something as simple as renting a quiet property in the Welsh countryside can turn dangerous if one has made the wrong choices, which Theo learns the hard way; it's not possible to run from one's past and from consequences forever.</span></p><span data-dcnode-id="962" instrument_node="">
</span><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="952"><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/conjuring-3-writer-haunted-house-movie/"><span data-dcnode-id="959" instrument_node="">Unlike other haunted house movies</span></a><span data-dcnode-id="957" instrument_node="">,&nbsp;</span><strong data-dcnode-id="954"><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">You Should Have Left&nbsp;</span></em></strong><span data-dcnode-id="953" instrument_node="">isn't so much about the restless spirits who already occupy the house as much as it involves the living ones that have just arrived. The only curse in this house is the baggage people already carry, their own poor decisions, and the guilt and lies that cannot be escaped or ignored.</span></p><span data-dcnode-id="951" instrument_node="">
</span><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="943"><span class="next-single" data-dcnode-id="944"><span data-dcnode-id="947" instrument_node="">Next: </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//screenrant.com/silence-lambs-movie-ending-meaning-book-differences-explained/"><span data-dcnode-id="946" instrument_node="">Silence Of The Lambs Ending &amp; Real Meaning Explained</span></a></span></p><span data-dcnode-id="942" instrument_node="">

</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Jack Wilhelmi is the horror features editor at Screen Rant, and has been with the site since 2019. He is a lifelong fan of the horror genre, and loves any excuse to discuss genre-related topics, since none of his friends dare challenge him in horror trivia. He has been published on the independent horror blog Morbidly Beautiful, and has covered major genre film festivals such as Cinepocalypse in Chicago. He has also served as a judge for the Ax Wound Film Festival. 

In his free time, he is a devoted dog dad to a high-spirited rescue pup named Peter Quill and enjoys volunteering with various animal rescue organizations. Jack likes to travel and explore dark tourism-related and other various haunted locations. He enjoys studying psychology, the paranormal, and will watch literally any schlocky B-movie on the planet for a laugh.</span></p><span data-dcnode-id="816" instrument_node="">
