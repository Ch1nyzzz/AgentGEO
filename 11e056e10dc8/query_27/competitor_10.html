</span><div class="article__entry" data-dcnode-id="925"><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">After 1,800 submissions, 3 finalists, nearly 3,000 votes, some scary-bad puns, and several recurring nightmares: it’s official. You have chosen the winner of the “Haunting Hook” Scary Story Opener Writing Contest!</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">We challenged contestants to write a spooky, captivating opening to a scary story using 50 words or less. And you cheeky devils delivered.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Dictionary.com and Thesaurus.com editors narrowed it down to three finalists, and we left the rest up to the scariest contingent of humans we could think of: the internet public.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">And now, without further a-boo, we present the most Haunting Hook, as judged by you.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><span data-dcnode-id="1431" id="winning-entry"><span data-dcnode-id="1432" instrument_node=""> </span></span><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1427" instrument_node="">
</span><div class="callout-box" data-dcnode-id="1406" style="border-color: #FF9900; background-color: #ffffff;"><span data-dcnode-id="1426" instrument_node="">
</span><div class="callout__inner" data-dcnode-id="1409"><span data-dcnode-id="1425" instrument_node="">
</span><h2 data-dcnode-id="1420" data-markjs-skip=""><img alt="🥇" class="emoji" data-dcnode-id="1424" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f947.svg&amp;raw"><span data-dcnode-id="1423" instrument_node=""> </span><b data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">1st place (41% of the votes)</span></b></h2><p data-dcnode-id="1417" style="padding-left: 40px;"><span data-dcnode-id="1418" style="font-weight: 400;"><span data-dcnode-id="1419" instrument_node="">The night my brother returned home, my parents wept for joy. Not a scratch on him, too exhausted to speak — nonetheless it was a miracle. I suppose I might have been happier were it not for the fact that I had killed and buried him six months ago.</span></span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1411" style="padding-left: 40px;"><span data-dcnode-id="1414" style="font-weight: 400;"><span data-dcnode-id="1415" instrument_node="">— </span></span><span data-dcnode-id="1412" style="font-weight: 400;"><span data-dcnode-id="1413" instrument_node="">Amy Chase</span></span></p><span data-dcnode-id="1410" instrument_node="">
</span></div><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1401"><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Amy Chase on composing her winning entry:</span></strong></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">“I loved the challenge of submitting to Haunting Hooks—so many horror stories give you the opportunity to build dread and suspense, but this required me to create a quick punch of horror. Nothing like realizing you’re trapped with an overly honest and murderous narrator. I am humbled to have terrified the judges just enough to make it to the finals.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">“I’ve been absorbing a lot of slasher movies recently, and am well aware of the trope that the killer always comes back in the sequel and is never truly dead. I wanted to write from the perspective of a killer whose victim manages to come back instead, in a twist on that idea to alarm the reader.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">“My active writing process seemed brief, because I spent most of my time internally trying to visualize whether a victim or a killer’s perspective would be more evocative for a hook. Once I had that dialed in, getting the words out came surprisingly quickly. (It helps that I entered about a day before the deadline too!)</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">“A friend showed me this contest and at first I thought I might pass on it. I’m used to lengthy, suspenseful writing and wasn’t sure if I could condense that into a quick hook. But I have been experimenting with different horror styles recently, so it was a wonderful exercise and I’m so glad I gave it a try!</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">“I’ve been greatly enjoying the themed word posts this month featuring some of my favorite monstrous and horrific vocabulary. Especially the different creature classifications—a fun way to be educational and imaginative!”</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h3 data-dcnode-id="1382"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Dictionary.com and Thesaurus.com editors on what makes it work:</span></strong></h3><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">We’re used to stories ending with twists, but starting with a twist? Now we’re hooked. The reader is thrust into what seems like a happy occasion. The return of a brother. Tears of joy. A miracle. Then comes the reveal from an apparently </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/fratricidal"><span data-dcnode-id="1379" instrument_node="">fratricidal</span></a><span data-dcnode-id="1377" instrument_node=""> narrator—who we’re almost tempted to trust. Only one way to find out if we can—by reading on. Amy’s entry shows how much thought and precision can go into writing 50 words.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><h2 data-dcnode-id="1368"><span data-dcnode-id="1374" instrument_node="">
</span><span data-dcnode-id="1370" id="2nd-place"><b data-dcnode-id="1371"><img alt="🥈" class="emoji" data-dcnode-id="1373" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f948.svg&amp;raw"><span data-dcnode-id="1372" instrument_node=""> 2nd place (35% of the votes)</span></b></span><span data-dcnode-id="1369" instrument_node="">
</span></h2><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365" style="padding-left: 40px"><span data-dcnode-id="1366" instrument_node="">I hadn’t realized my body had a zipper until I was unzipped from behind. Hands pulled my back apart and I felt a shoe step into me, followed by a leg and the whole of a person. Against my brain, a man’s voice whispered, “Let’s get acquainted, shall we?”</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362" style="padding-left: 40px"><span data-dcnode-id="1363" instrument_node="">— Alexander Lee</span></p><span data-dcnode-id="1361" instrument_node="">
</span><h3 data-dcnode-id="1358"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Alexander Lee, proving that even twisted horror writers can be quite nice:</span></strong></h3><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">“This contest was great fun to participate in! The other submissions were fantastic as well.”</span></p><span data-dcnode-id="1354" instrument_node="">
</span><h3 data-dcnode-id="1351"><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">What makes it work:</span></b></h3><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1349" instrument_node="">Yeesh. If this doesn’t give you the bad chills, check for a pulse. It’s made all the spookier by how tangible it is—the unzipping (*shudder*) is followed not just by someone vaguely stepping inside, but by a “shoe” and then “a leg and </span><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">the whole of a person</span></i><span data-dcnode-id="1346" instrument_node="">.” And then, ugh, a whisper directly against the brain. Bad chills, spooky vibe, have to keep reading.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><h2 data-dcnode-id="1337"><span data-dcnode-id="1343" instrument_node="">
</span><span data-dcnode-id="1339" id="3rd-place"><b data-dcnode-id="1340"><img alt="🥉" class="emoji" data-dcnode-id="1342" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f949.svg&amp;raw"><span data-dcnode-id="1341" instrument_node=""> 3rd place (24% of the votes)</span></b></span><span data-dcnode-id="1338" instrument_node="">
</span></h2><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334" style="padding-left: 40px"><span data-dcnode-id="1335" instrument_node="">It was a bright and sunny day. A beautiful day to paint. Smiling, I look over at my husband. This part calls for crimson red. Gently moving my brush towards the man I married, I dip it where he’s seeping from his wounds. Sometimes, happy little accidents are anything but.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331" style="padding-left: 40px"><span data-dcnode-id="1332" instrument_node="">— Rachel Bullock</span></p><span data-dcnode-id="1330" instrument_node="">
</span><h3 data-dcnode-id="1327"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Rachel Bullock on being inspired:</span></strong></h3><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">“I was astonished I got the opportunity to be a finalist and I’m thankful for the support my family and friends gave me in voting. Overall it was a fun, exciting contest. The other entries were super spooky and I loved participating! This inspired me to write more along the lines of spooky stories.”</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1320"><b data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">What makes it work:</span></b></h3><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">This one flips “It was a dark and stormy night” on its head, literally and thematically. It hits notes disturbing (“the man I married”), macabre (“I dip it where he’s seeping from his wounds”), and funny (“happy little accidents,” a Bob Ross reference)—a perfect blend of horror and comedy. We’d love to see the strange places this goes.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><h2 data-dcnode-id="1310"><span data-dcnode-id="1315" instrument_node="">
</span><span data-dcnode-id="1312" id="honorable-mentions"><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Spooktacular honorable mentions</span></strong></span><span data-dcnode-id="1311" instrument_node="">
</span></h2><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">If you just can’t get enough scary story openings, here are some of the “hauntorable” mentions that just missed the cut:</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304" style="padding-left: 40px"><span data-dcnode-id="1305" instrument_node="">“That first summer living in the city, I learned several things about my neighbor in 8C: he lived alone, preferred Tchaikovsky when it rained, baked aromatic sourdough bread the Sundays his grandson visited, and when those guttural, tide-rending shrieks clawed through his walls, they’d start at precisely 2:56 a.m.”</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301" style="padding-left: 40px"><span data-dcnode-id="1302" instrument_node="">“A large crowd gathered below the clock tower to see the woman that was tied to its hands. The sun, having already impaled itself on the spire, cast a damning shadow over the cobbles and if anyone had followed its trail, they would have discovered that it pointed to me.”</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298" style="padding-left: 40px"><span data-dcnode-id="1299" instrument_node="">“Whenever I sleep, I like to hold my husbands hand. Just one more night, and then I’ll bury it with the rest of him.”</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1285" style="padding-left: 40px"><span data-dcnode-id="1296" instrument_node="">“The graveyard sang one night.</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
People lay in bed, dreaming but not sleeping.</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
The moon leaned closer to the earth to hear the melancholy music.</span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">
‘Come, come,’ the graveyard wailed.</span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
Bodies rattled in coffins. The streets reeked of flesh.</span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">
‘Dig a pit, dig a pit. Come lay your bones.’”</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282" style="padding-left: 40px"><span data-dcnode-id="1283" instrument_node="">“The scene in the painting was the same one I had been seeing in my dreams. A small, dusty country lane with a single tree overhanging the road. But now, unlike in my dreams, the woman hanging from the tree twisted her head around and began to smile at me.”</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279" style="padding-left: 40px"><span data-dcnode-id="1280" instrument_node="">“‘We’ll be best friends forever.’ That sentence was our promise to each other when we were 12. Now, looking at my bedroom wall, which was adorned with decapitated heads dripping with blood, including his, a sadistic smile crept onto my face. I muttered, ‘We’ll be best friends forever.’”</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276" style="padding-left: 40px"><span data-dcnode-id="1277" instrument_node="">“She was born with mismatched eyes and a port wine stain on her face. The maroon skin corrupted, murky and bleak, screaming out against the newborn’s red blush. She looked nothing like her father, and her mother died as soon as she saw her daughter’s face.”</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273" style="padding-left: 40px"><span data-dcnode-id="1274" instrument_node="">“The little girl woke up and asked the medical examiner, ‘Have you come join my tea party?’ It was then when the doctor finally understood why they always had to have a priest present whenever they exhumed a child’s grave.’”</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1271" instrument_node="">If you’re still curious about how the contest worked (but be forewarned, curiosity </span><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">did</span></em><span data-dcnode-id="1268" instrument_node=""> kill the cat), all the details—including what to write, how the contest works, examples, inspiration—are lurking below. (Perhaps it will still get you writing, because an eerie ghost story is perfect any time of the year.) And you can also review the</span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/scary-story-opener-writing-contest-rules/"><span data-dcnode-id="1267" instrument_node=""> official contest rules</span></a><span data-dcnode-id="1265" instrument_node=""> for eligibility and other important conditions.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><hr data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">
</span><h2 data-dcnode-id="1255"><span data-dcnode-id="1260" instrument_node="">
</span><span data-dcnode-id="1257" id="what-to-write"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">What to write</span></strong></span><span data-dcnode-id="1256" instrument_node="">
</span></h2><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Compose an original opening to a scary story in 50 words or less.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">We define an “opening” as the first sentence or sentences that establish the beginning of a written narrative.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Your opening must (and will be judged on):</span></p><span data-dcnode-id="1245" instrument_node="">
</span><ol data-dcnode-id="1228"><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Be original.</span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Be captivating as an opening.</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Follow the general conventions of the horror genre.</span></li><span data-dcnode-id="1235" instrument_node="">
</span><li data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node="">Establish a spooky—or </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/e/slang/spoopy/" rel="noopener" target="_blank"><span data-dcnode-id="1233" instrument_node="">spoopy</span></a><span data-dcnode-id="1231" instrument_node="">—atmosphere or mood.</span></li><span data-dcnode-id="1229" instrument_node="">
</span></ol><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1226" instrument_node="">For more information on these criteria, </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/writing/scary-story-opener-writing-contest%23more-information" rel="noopener" target="_blank"><span data-dcnode-id="1225" instrument_node="">please scroll below</span></a><span data-dcnode-id="1223" instrument_node="">—if you’re brave.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Need inspiration?</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1217" instrument_node="">Try adding some frightful flair to your hook with one of </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/ways-to-say/s/scary-synonyms/%231" rel="noopener" target="_blank"><span data-dcnode-id="1216" instrument_node="">these eerie alternatives for the word </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">scary</span></em></a><span data-dcnode-id="1212" instrument_node=""> or one of these </span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/learn/word-lists/fun/KQ_BDitOOHw" rel="noopener" target="_blank"><span data-dcnode-id="1211" instrument_node="">haunting words ideal for Halloween</span></a><span data-dcnode-id="1209" instrument_node="">. Or, take a look at the some the </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/e/s/best-first-lines-from-books/%231" rel="noopener" target="_blank"><span data-dcnode-id="1208" instrument_node="">most memorable and captivating first lines we’ve encountered in books.</span></a></p><span data-dcnode-id="1205" instrument_node="">
</span><h2 data-dcnode-id="1199"><span data-dcnode-id="1204" instrument_node="">
</span><span data-dcnode-id="1201" id="when-and-how-to-enter"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">When and how to enter</span></strong></span><span data-dcnode-id="1200" instrument_node="">
</span></h2><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">We accepted submissions starting at 12:00 am PT on Tuesday, September 14, 2021 until 11:59 pm PT on Friday, October 8, 2021. Only one entry per person.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">There were multiple ways to submit: through the form on site, or on selected social media.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1191" instrument_node="">
</span><span data-dcnode-id="1188" id="how-to-win"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">How you can win</span></strong></span><span data-dcnode-id="1187" instrument_node="">
</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">When the contest entry period has closed, our editors will review all the submissions and narrow them down to three finalists based on our writing criteria.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Starting on Wednesday, October 20 and closing no later than Monday, October 25, users will have a chance to vote on our sites or social media to choose which of the finalists they think is best. Voting is open to all.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">The results of the votes will be announced by Friday, October 29, 2021.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><h2 data-dcnode-id="1170"><span data-dcnode-id="1175" instrument_node="">
</span><span data-dcnode-id="1172" id="the-prizes"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">What you can win</span></strong></span><span data-dcnode-id="1171" instrument_node="">
</span></h2><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">The finalist who receives the most votes will win:</span></p><span data-dcnode-id="1166" instrument_node="">
</span><ul data-dcnode-id="1146"><span data-dcnode-id="1165" instrument_node="">
</span><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">$100 gift card</span></li><span data-dcnode-id="1162" instrument_node="">
</span><li data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">One-year subscription to </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach"><span data-dcnode-id="1160" instrument_node="">Grammar Coach™</span></a><span data-dcnode-id="1158" instrument_node=""> Premium</span></li><span data-dcnode-id="1156" instrument_node="">
</span><li data-dcnode-id="1148"><span data-dcnode-id="1155" instrument_node="">A gift package with </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/"><span data-dcnode-id="1154" instrument_node="">Thesaurus.com</span></a><span data-dcnode-id="1152" instrument_node=""> or </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/"><span data-dcnode-id="1151" instrument_node="">Dictionary.com</span></a><span data-dcnode-id="1149" instrument_node=""> brand swag</span></li><span data-dcnode-id="1147" instrument_node="">
</span></ul><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The second- and third-place runners-up will receive:</span></p><span data-dcnode-id="1142" instrument_node="">
</span><ul data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">
</span><li data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">A gift package with Thesaurus.com or Dictionary.com brand swag</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ul><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">All three finalists will have the opportunity to have their opening published on and shared by Thesaurus.com and Dictionary.com.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Didn’t make the cut? Your opening may still have the chance to appear on our sites and social media.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><h2 data-dcnode-id="1124"><span data-dcnode-id="1129" instrument_node="">
</span><span data-dcnode-id="1126" id="more-information"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">More information on writing criteria</span></strong></span><span data-dcnode-id="1125" instrument_node="">
</span></h2><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">As noted above, your opening has to meet and will be judged on four criteria, which we’ll explain below. Stay posted—we’ll be providing articles diving deeper into many of these topics in the weeks to come.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1117"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">1. Be original.</span></strong></h3><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Now’s your chance to share that great idea for the start of that scary story you always knew would get those spines tingling!</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Your opening must be your own unique, previously unpublished work. A word to the wise: do not not use any copyrighted material from existing stories in any form. This includes, but is not limited to, horror books, fanfiction, movies, TV shows, podcasts, and other print and digital media.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">We’re looking for scary, not obscene: no slurs, no swears or offensive language, no sexually explicit content, and no gratuitous violence.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">
</span><a class="article__callout-link" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/grammarcoach"><span data-dcnode-id="1105" instrument_node="">Take the worry out of writing by using our astute plagiarism checker in Grammar Coach™.</span></a><span data-dcnode-id="1103" instrument_node="">
</span></p><span data-dcnode-id="1101" instrument_node="">
</span><h3 data-dcnode-id="1098"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">2. Be captivating as an opening.</span></strong></h3><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Hook your audience right away! A great story pulls you in—and doesn’t let you go (like any good monster).</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">A compelling opening is one that can do a lot in just the first few lines. It can spark interest, curiosity—and fear! It can set a vivid scene or introduce a compelling character. It can establish an </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/evocative"><span data-dcnode-id="1092" instrument_node="">evocative</span></a><span data-dcnode-id="1090" instrument_node=""> world. It can start a story the reader just has to keep reading.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1079"><img alt="💀" class="emoji" data-dcnode-id="1087" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f480.svg&amp;raw"><span data-dcnode-id="1086" instrument_node="">&nbsp; </span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Spooky example:</span></strong><span data-dcnode-id="1083" instrument_node=""> “The terror, which would not end for another twenty-eight years—if it ever did end—began, so far as I know or can tell, with a boat made from a sheet of newspaper floating down a gutter swollen with rain.” — </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">It</span></em><span data-dcnode-id="1080" instrument_node="">, Stephen King (1986)</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1071"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1075" instrument_node=""> Here, master of horror Stephen King hooks in readers by portraying an </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/innocuous"><span data-dcnode-id="1074" instrument_node="">innocuous</span></a><span data-dcnode-id="1072" instrument_node="">-seeming paper boat as the unlikely source of decades of terror.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1064"><img alt="👻" class="emoji" data-dcnode-id="1069" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f47b.svg&amp;raw"><span data-dcnode-id="1068" instrument_node=""> </span><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Spoopy example:</span></strong><span data-dcnode-id="1065" instrument_node=""> Emily looked hungrily at her dinner, and he looked happily back at her.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1060" instrument_node=""> In just a few short words, this opener sparks some big questions: who is “he,” and why is he “happily” being eaten alive?!</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">
</span><a class="article__callout-link" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/writing/how-to-write-a-great-hook/"><span data-dcnode-id="1056" instrument_node="">Looking for some creative brainstorming energy? Reel in this guide on how to write a great hook.</span></a><span data-dcnode-id="1054" instrument_node="">
</span></p><span data-dcnode-id="1052" instrument_node="">
</span><h3 data-dcnode-id="1049"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">3. Follow the general conventions of the horror genre.</span></strong></h3><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">Haunted houses and dark alleys, grotesque monsters and blood-sucking vampires, </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/supernatural"><span data-dcnode-id="1046" instrument_node="">supernatural</span></a><span data-dcnode-id="1044" instrument_node=""> and </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/paranormal"><span data-dcnode-id="1043" instrument_node="">paranormal</span></a><span data-dcnode-id="1041" instrument_node=""> events—whether on the page or screen, horror is marked by a variety of places, characters, and plots.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1038" instrument_node="">But they all have some things in common. Your opening must stick to the themes, characteristics, and spirit of </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/horror"><span data-dcnode-id="1037" instrument_node="">horror</span></a><span data-dcnode-id="1035" instrument_node="">: </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/speculative"><span data-dcnode-id="1034" instrument_node="">speculative</span></a><span data-dcnode-id="1032" instrument_node=""> fiction dealing with matters that create fear, shock, or revulsion.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">That said, that doesn’t mean horror can’t have a sense of humor or is all dark and gloomy. We welcome openings with elements based in horror but are still funny, comedic, even cute—or maybe downright turn the genre on its head.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1021"><img alt="💀" class="emoji" data-dcnode-id="1026" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f480.svg&amp;raw"><span data-dcnode-id="1025" instrument_node="">&nbsp;</span><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node=""> Spooky example:&nbsp;</span></strong><span data-dcnode-id="1022" instrument_node=""> If you make any noise in Walker’s Woods, it will find you. And if it finds you, nobody else ever will.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1013"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1017" instrument_node=""> This opening line warns of some </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/ghastly"><span data-dcnode-id="1016" instrument_node="">ghastly</span></a><span data-dcnode-id="1014" instrument_node=""> horror lurking in the woods. It challenges you, the reader, to test your mettle by reading on.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1006"><img alt="👻" class="emoji" data-dcnode-id="1011" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f47b.svg&amp;raw"><span data-dcnode-id="1010" instrument_node=""> </span><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Spoopy example:</span></strong><span data-dcnode-id="1007" instrument_node=""> The skeletons, ghouls, and zombies gathered slowly, methodically around me. If we had any hope of winning the dance competition, we were going to need to learn some new routines.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Explanation:</span></strong><span data-dcnode-id="1002" instrument_node=""> This opener introduces some classic baddies, but immediately subverts expectations by placing them in a surprising, decidedly un-terrifying scene.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="999" instrument_node="">
</span><a class="article__callout-link" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/e/terror-vs-horror/%23horror-in-literature-and-film"><span data-dcnode-id="998" instrument_node="">Not sure how to approach horror? Learn more about the horror genre in our spine-tingling article about </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">terror</span></em><span data-dcnode-id="995" instrument_node=""> vs. </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">horror</span></em><span data-dcnode-id="992" instrument_node="">.</span></a><span data-dcnode-id="990" instrument_node="">
</span></p><span data-dcnode-id="988" instrument_node="">
</span><h3 data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">4. Establish a spooky—or spoopy—atmosphere or mood.</span></strong></h3><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">This is where you give Stephen King or Shirley Jackson a run for their money. The winning opening will be the evil marriage of #2 and #3. In just a few short words, it will create a perfectly spooky—or spoopy—ambience. This can be achieved by crafting that captivating hook (#2) through the elements of horror (#3).</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">A “spooky atmosphere or mood” is one that creates a strong sense of dread, mystery, fear, or related </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/sinister"><span data-dcnode-id="979" instrument_node="">sinister</span></a><span data-dcnode-id="977" instrument_node=""> feelings through its language and narrative techniques. Remember, the goal isn’t to write an entire story in 50 words. Just set the scene, establish the tone, and make the reader want—need—to know what happens next. Draw them into the story’s world—even if it’s a terrifying one.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Because the horror genre isn’t always about sheer terror, a “spooky atmosphere” can be one that distinctly draws from the horror genre for comedic, endearing, or otherwise playful effect.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="963"><img alt="💀" class="emoji" data-dcnode-id="971" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f480.svg&amp;raw"><span data-dcnode-id="970" instrument_node="">&nbsp; </span><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Spooky example:&nbsp;</span></strong><span data-dcnode-id="967" instrument_node=""> “A low howl filled the two-story house, bleeding from the cracks in the knotty Dade County pinewood walls. There were intervals of peace, then the sound rose two octaves into a scream that splintered Jessica Jacobs-Wolde’s sleep.” — </span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">My Soul to Keep</span></em><span data-dcnode-id="964" instrument_node="">,&nbsp;Tananarive Due (1997)</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Explanation:</span></strong><span data-dcnode-id="959" instrument_node=""> A low howl that turns into a scream (yikes!) doesn’t just wake a woman up—it splinters her sleep. It’s the first thing that happens, and it makes it feel like it’s happening to you, the reader. The subtle details of the setting make it even eerier: the sound bleeds through the cracked, knotty walls of what sure sounds like a haunted house.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="951"><img alt="👻" class="emoji" data-dcnode-id="956" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f47b.svg&amp;raw"><span data-dcnode-id="955" instrument_node=""> </span><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Spoopy example:</span></strong><span data-dcnode-id="952" instrument_node="">&nbsp; The eyes in the walls never stopped watching Benny despite how boring his life was. It was rather rude, really. He desperately hoped they would find a new hobby.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="946"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Explanation:</span></strong><span data-dcnode-id="947" instrument_node=""> This opener sets up a world where creepy things are so commonplace that they are felt to be a mild annoyance.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">OK, we know we’re no masters of horror. Don’t worry: we can’t submit.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">
</span><a class="article__callout-link" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/writing/creating-atmosphere-mood/"><span data-dcnode-id="940" instrument_node="">Learn more about how to set the mood and the scene with our tips on effectively creating ambience in writing.</span></a><span data-dcnode-id="938" instrument_node="">
</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">::shines flashlight to face:: So, do you have what it takes?! Mwahaha.</span></p><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="927"><strong data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">For a complete explanation of contest rules, please </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesaurus.com/e/scary-story-opener-writing-contest-rules/"><span data-dcnode-id="931" instrument_node="">visit here</span></a><span data-dcnode-id="929" instrument_node="">.</span></strong></h3><span data-dcnode-id="926" instrument_node="">
