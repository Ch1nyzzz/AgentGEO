</span><h1 class="page-title scroll-element" data-dcnode-id="1089" id="howtowriteashortstorythatgetsread(in7steps)"><span data-dcnode-id="1090" instrument_node="">How to Write a Short Story That Gets Read (In 7 Steps)</span></h1><span data-dcnode-id="1088" instrument_node="">
</span><div class="page-meta" data-dcnode-id="1061"><span data-dcnode-id="1087" instrument_node="">
</span><div class="page-author-avatar" data-dcnode-id="1078"><span data-dcnode-id="1086" instrument_node="">
</span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/author/steph/" title="Steph Fraser"><span data-dcnode-id="1085" instrument_node="">

</span><a class="author-name" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/author/steph/" title="Steph Fraser"><span data-dcnode-id="1074" instrument_node="">

</span><span class="page-raw-date" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">December 22nd, 2021</span></span><span data-dcnode-id="1064" instrument_node="">

</span><div class="top-image" data-dcnode-id="1055"><span data-dcnode-id="1058" instrument_node="">
</span><img alt="How to Write a Short Story That Gets Read (In 7 Steps)" data-dcnode-id="1057" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/How-to-Write-a-Short-Story-That-Gets-Read-.jpg&amp;raw" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/How-to-Write-a-Short-Story-That-Gets-Read--300x169.jpg 600w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/How-to-Write-a-Short-Story-That-Gets-Read--425x280.jpg 900w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/How-to-Write-a-Short-Story-That-Gets-Read--768x432.jpg 1440w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/How-to-Write-a-Short-Story-That-Gets-Read-.jpg 1920w" width="1200"><span data-dcnode-id="1056" instrument_node=""> </span></div><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">On the surface, a short story may sound easy. Like </span><a aria-label="a novel (opens in a new tab)" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-write-novel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1052" instrument_node="">a novel</span></a><span data-dcnode-id="1050" instrument_node="">, but shorter, easier, and less complicated. Learning how to write a short story well, however, is no easy feat.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1044"><a aria-label="An experienced writer (opens in a new tab)" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-become-a-better-writer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1047" instrument_node="">An experienced writer</span></a><span data-dcnode-id="1045" instrument_node=""> will let you in on a little known fact: short stories are often more difficult to write successfully than a novel. It may not take as long, but that doesn’t mean it’s easy.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Short stories are, of course, much shorter than a novel. Therefore, there is not nearly as much room to let things grow, breathe, and evolve.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">You need to get your point across in a small window of both time and space. It’s not as straightforward as it sounds. There are a few steps you can take to make sure it's as strong as possible:</span></p><span data-dcnode-id="1037" instrument_node="">
</span><ol data-dcnode-id="1014"><span data-dcnode-id="1036" instrument_node="">
</span><li data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Familiarize yourself with the definition of a short story</span></li><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Create an outline</span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Remember to show, not tell</span></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Know the essential elements</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Get creative</span></li><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Craft the title</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Finds some tools to help you</span></li><span data-dcnode-id="1015" instrument_node="">
</span></ol><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1012" instrument_node="">As with all </span><a aria-label="types of writing (opens in a new tab)" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/types-of-writers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1011" instrument_node="">types of writing</span></a><span data-dcnode-id="1009" instrument_node="">, anyone can do it. It takes knowledge, practice, and skill to know how to write a short story </span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">well</span></em><span data-dcnode-id="1006" instrument_node="">. An effective short story is one that leaves a reader in shock, in tears, in awe, or all of the above.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="1002" id="writeagoodshortstorywithatemplate"><span data-dcnode-id="1003" instrument_node="">Write a Good Short Story With a Template</span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Before diving into your short story, it might be helpful to set yourself up with a template. A short story template can help you create an effective outline and see the direction of your story before you even start.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Even though it's not as long as a novel, a short story still needs lots of planning.</span></p><span data-dcnode-id="995" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="987"><span data-dcnode-id="994" instrument_node="">
</span><figure class="aligncenter is-resized" data-dcnode-id="989"><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/"><img alt="" class="wp-image-2400 lazyloaded" data-dcnode-id="993" data-sizes="(max-width: 348px) 100vw, 348px" data-src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png" data-srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png 695w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-204x300.png 204w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-768x1132.png 768w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-733x1080.png 733w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template.png 339w" height="512" loading="lazy" sizes="(max-width: 348px) 100vw, 348px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png&amp;raw" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png 695w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-204x300.png 204w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-768x1132.png 768w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-733x1080.png 733w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template.png 339w" width="348"><noscript data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">&lt;img loading="lazy" class="wp-image-2400" src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png" alt="" width="348" height="512" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-695x1024.png 695w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-204x300.png 204w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-768x1132.png 768w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template-733x1080.png 733w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/07/short-story-template.png 339w" sizes="(max-width: 348px) 100vw, 348px" /&gt;</span></noscript></a></figure><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Using novel writing prompts in conjunction with the following steps will give your short story the best chance at success.</span></p><span data-dcnode-id="983" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="981" id="1.howtowriteashortstory:whatisit?"><span data-dcnode-id="982" instrument_node="">1. How to Write a Short Story: What is it?</span></h2><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">For some, a short story needs to have a very short word count. I like to keep short stories to around 3000 words or less. These are easily read and digested in a single sitting, and if done right, will pack a punch in a short period of time.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="976" instrument_node="">By definition, however, a short story can be up to 10,000 words. Beyond this, you are looking at a novella. You can also try a type of&nbsp;fiction writing&nbsp;called&nbsp;flash fiction. This is a form of&nbsp;micro fiction&nbsp;that is typically 1000 words or less. In other words, an&nbsp;</span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">extremely&nbsp;</span></em><span data-dcnode-id="973" instrument_node="">short story</span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">.&nbsp;</span></em><span data-dcnode-id="970" instrument_node=""> In fact, some people try to write a story so short that it fits into a single&nbsp;tweet. There's a whole community dedicated to this on Twitter.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Short stories and&nbsp;micro fiction&nbsp;are common&nbsp;high school&nbsp;writing assignments as they can teach elements of storytelling without having to assign a novel to every student.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Short stories are fun to write, fun to read, and can be extremely profound. They are also often studied in classrooms as they display powerful examples of writing techniques as well as interesting and provocative world views.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">However, they are not nearly as popular as the novel. Novels are easily the most well-read and lucrative area of fiction. But, this doesn’t mean writing short stories isn’t worth it.</span></p><span data-dcnode-id="959" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="957" id="anthologies"><span data-dcnode-id="958" instrument_node="">Anthologies</span></h3><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">Many </span><a aria-label="authors (opens in a new tab)" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/become-an-author/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="954" instrument_node="">authors</span></a><span data-dcnode-id="952" instrument_node=""> come out with short story collections. These are a single book that contains multiple short stories. The stories are sometimes connected, while other times they are all entirely stand-alone.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">Authors often do this after they have already </span><a aria-label="published (opens in a new tab)" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/publish-own-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="948" instrument_node="">published</span></a><span data-dcnode-id="946" instrument_node=""> and sold a successful novel. This way, their short story anthology can ride on the success of their novel a little bit. The author already has attention on them, so their short stories are easier to market and advertise for.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Other times, </span><a aria-label="writers (opens in a new tab)" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-become-a-writer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="942" instrument_node="">writers</span></a><span data-dcnode-id="940" instrument_node=""> will contribute one or two short stories to an anthology comprised of work from several different authors. In this case, the contributors will all share in the profits when it sells.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="937" instrument_node="">Either way, there are methods with which to sell your short story. You just can’t go about it in the same way as you would when </span><a aria-label="publishing a novel. (opens in a new tab)" data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/publish-own-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="936" instrument_node="">publishing a novel.</span></a></p><span data-dcnode-id="933" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="931" id="classicshortstoriesbyfamousauthors"><span data-dcnode-id="932" instrument_node="">Classic Short Stories by Famous Authors</span></h3><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">There are many classic, well-known short stories by famous authors. Some short story examples that are expertly written and deeply meaningful:</span></p><span data-dcnode-id="927" instrument_node="">
</span><ul data-dcnode-id="904"><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">"The Tell-Tale Heart" by Edgar Allan Poe</span></li><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">"Chivalry" by&nbsp;Neil Gaiman</span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">"The Gift of the Magi" by O. Henry</span></li><span data-dcnode-id="917" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">"The Signal-Man" by Charles Dickens</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">"Barn Burning" by&nbsp;William Faulkner&nbsp;</span></li><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">"Miss Temptation" by&nbsp;Kurt Vonnegut&nbsp;</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">"The Snows of Kilimanjaro" by&nbsp;Ernest Hemingway</span></li><span data-dcnode-id="905" instrument_node="">
</span></ul><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">These short tales have gone down in history for their ingenuity. They did such a fantastic job at setting the atmosphere, </span><a aria-label="bringing their character to life (opens in a new tab)" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/character-development-sheet-template/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="901" instrument_node="">bringing their character to life</span></a><span data-dcnode-id="899" instrument_node="">, and awing the reader, that they will forever be remembered.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">That is what a short story is all about.</span></p><span data-dcnode-id="894" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="892" id="2.howtowriteashortstoryoutline(template)"><span data-dcnode-id="893" instrument_node="">2. How to Write a Short Story Outline (Template)</span></h2><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">One thing a short story has in common with a novel is the need for an </span><a aria-label="outline (opens in a new tab)" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/novel-outline/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="889" instrument_node="">outline</span></a><span data-dcnode-id="887" instrument_node="">. Can a short story be written without an outline? Yes, it can. And, your chances of being successful without an outline are much greater with a short story than with a novel.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="881"><em data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">However, </span></em><span data-dcnode-id="882" instrument_node="">knowing how to write a short story outline will reap you some benefits and save valuable time. Especially if your story is going to be on the long side of “short,” (8-10,000 words) then an outline will help you craft the story in the best way possible.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">Outlining a short story isn’t too different from </span><a aria-label="outlining a novel (opens in a new tab)" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/novel-outline/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="878" instrument_node="">outlining a novel</span></a><span data-dcnode-id="876" instrument_node="">. The main difference is in the complexity. A short story outline won’t be as comprehensive as a novel outline, simply because you don’t have as much time to add detail.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">A short story outline will be clear, direct, and concise. It will tell you the main points of the story, and where things are headed. Once you map out these basic elements, actually writing it will become a breeze.</span></p><span data-dcnode-id="871" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="867"><img alt="" class="wp-image-2025 lazyloaded" data-dcnode-id="870" data-sizes="(max-width: 406px) 100vw, 406px" data-src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg" data-srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg 406w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9-244x300.jpg 244w" height="500" loading="lazy" sizes="(max-width: 406px) 100vw, 406px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg&amp;raw" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg 406w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9-244x300.jpg 244w" width="406"><noscript data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&lt;img loading="lazy" width="406" height="500" class="wp-image-2025" src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg" alt="" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9.jpg 406w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/one-9-244x300.jpg 244w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></figure><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">Above is a</span><a aria-label=" basic template (opens in a new tab)" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.education.com/worksheet/article/outline-a-story/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="864" instrument_node=""> basic template</span></a><span data-dcnode-id="862" instrument_node=""> for your short story outline. It prompts you for all the key information. Fill in the specifics of your story, and things will start coming together.</span></p><span data-dcnode-id="860" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="858" id="3.showdon’ttell"><span data-dcnode-id="859" instrument_node="">3. Show Don’t Tell</span></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="856" instrument_node="">This is a popular piece of general writing advice. In any type of writing, especially fiction, you want to </span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">show</span></strong><span data-dcnode-id="853" instrument_node=""> your readers what’s going on, most of the time. However, in a novel-length piece, a </span><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">little bit</span></em><span data-dcnode-id="850" instrument_node=""> of </span><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">telling</span></strong><span data-dcnode-id="847" instrument_node=""> can be okay too.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Not so in a short story. With so little time to put together a beginning, middle, and end, you don’t have any room for lengthy descriptions, backstories, or huge revelations.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Make sure everything is being shown to your readers, and don’t waste time telling them the information.</span></p><span data-dcnode-id="839" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="837" id="4.elementsofashortstory"><span data-dcnode-id="838" instrument_node="">4. Elements of a Short Story</span></h2><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="835" instrument_node="">I always encourage </span><a aria-label="writers  (opens in a new tab)" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-become-a-writer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="834" instrument_node="">writers </span></a><span data-dcnode-id="832" instrument_node="">to be bold, creative and break the rules. This is what can separate good fiction from </span><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">great </span></em><span data-dcnode-id="829" instrument_node="">fiction. That being said, some essential elements are included in almost every short story.</span></p><span data-dcnode-id="827" instrument_node="">
</span><span data-dcnode-id="826" instrument_node="">

</span><table class="tablepress tablepress-id-32" data-dcnode-id="763" id="tablepress-32"><thead data-dcnode-id="816"><tr class="row-1 odd" data-dcnode-id="818"><th class="column-1" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Short Story Elements</span></th><th class="column-2" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">&nbsp;</span></th></tr></thead><tbody class="row-hover" data-dcnode-id="765"><tr class="row-2 even" data-dcnode-id="805"><td class="column-1" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">1. The Message</span></td><td class="column-2" data-dcnode-id="807"><span data-dcnode-id="810" instrument_node="">What are you trying to say with your short story? </span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
What emotions are you writing about? </span></td></tr><tr class="row-3 odd" data-dcnode-id="797"><td class="column-1" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">2. Minimal Characters</span></td><td class="column-2" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">A short story should ideally have only one main character. </span></td></tr><tr class="row-4 even" data-dcnode-id="785"><td class="column-1" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">3. Concise Plot</span></td><td class="column-2" data-dcnode-id="787"><span data-dcnode-id="792" instrument_node="">The plot should be well-developed but not overly complex. </span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
With a short story, you must find a balance. </span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
</span></td></tr><tr class="row-5 odd" data-dcnode-id="777"><td class="column-1" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">4. A Hook</span></td><td class="column-2" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The very beginning needs to be something that draws readers in immediately. </span></td></tr><tr class="row-6 even" data-dcnode-id="767"><td class="column-1" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">5. A Strong Ending</span></td><td class="column-2" data-dcnode-id="769"><span data-dcnode-id="772" instrument_node="">A short story is meant to be intense and powerful. </span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
If your ending lacks, the entire story will fail. </span></td></tr></tbody></table><span data-dcnode-id="762" instrument_node="">
</span><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">These are things that help keep it brief and entertaining at the same time.</span></p><span data-dcnode-id="757" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="755" id="themessage"><span data-dcnode-id="756" instrument_node="">The Message</span></h3><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Short stories are rarely written for no reason. Yes, they are meant to entertain. But they should also leave a lasting impression on the reader.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Think about the message behind your short story. What are you trying to say? What is the strongest emotion behind the story? Are you writing about love, hatred, bitterness, sadness, anger, or something else?</span></p><span data-dcnode-id="748" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="736"><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="738"><a aria-label="F. Scott Fitzgerald (opens in a new tab)" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/writer/f-scott-fitzgerald" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">F. Scott Fitzgerald</span></strong></a><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node=""> puts it simply:</span></strong><span data-dcnode-id="741" instrument_node=""> "</span><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Find the key emotion; this may be all you need know to find your short story. "</span></em></p><span data-dcnode-id="737" instrument_node="">
</span></blockquote><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">A famous short story writer, he has written </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">many</span></em><span data-dcnode-id="731" instrument_node=""> short stories. Some of his most notable titles include:</span></p><span data-dcnode-id="729" instrument_node="">
</span><ol data-dcnode-id="713"><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="724"><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">"</span></em><span data-dcnode-id="725" instrument_node="">The Diamond as Big as the Ritz"</span></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">"The Curious Case of Benjamin Button"</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">"The Camel's Back"</span></li><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">"The Last of the Belles"</span></li><span data-dcnode-id="714" instrument_node="">
</span></ol><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">This main emotion and the message you want to get across will be what drives your story. It is the reason you’re writing, and without reason, a story will fall flat.</span></p><span data-dcnode-id="709" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="707" id="minimalcharacters"><span data-dcnode-id="708" instrument_node="">Minimal Characters</span></h3><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="705" instrument_node="">A short story should not have a large cast of characters. Most of the time, they will focus on one or </span><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">maybe</span></em><span data-dcnode-id="702" instrument_node=""> two </span><a aria-label="main characters. (opens in a new tab)" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/character-development-sheet-template/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="701" instrument_node="">main characters.</span></a><span data-dcnode-id="699" instrument_node=""> For some stories, a small handful of side characters can be useful and appropriate, but that’s it.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Too many characters within a short story will become confusing and overwhelming. Because of the shorter length, you will be jumping back and forth between them too often.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">You also won’t be able to properly </span><a aria-label="develop (opens in a new tab)" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/character-development-sheet-template/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="692" instrument_node="">develop</span></a><span data-dcnode-id="690" instrument_node=""> any of your characters, if you have too many. The window for&nbsp;character development&nbsp;is small, so you must use it wisely.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Some tips on writing your characters well within a short story:</span></p><span data-dcnode-id="685" instrument_node="">
</span><ul data-dcnode-id="671"><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Make at least one of the characters someone the readers will want to root for.</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">All your characters should want </span><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">something</span></em><span data-dcnode-id="677" instrument_node="">, even if it is a single item.</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Be ruthless. No matter how wonderful and lovely your characters are, don’t be afraid to make terrible things happen to them.</span></li><span data-dcnode-id="672" instrument_node="">
</span></ul><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">As well as keeping the characters to a minimum, don’t try to play around with too much perspective shifting. Whether told from the first or third person, it is best to keep the point of view the same throughout. The second&nbsp;person&nbsp;is much less common.&nbsp;</span></p><span data-dcnode-id="667" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="665" id="shortandconciseplot"><span data-dcnode-id="666" instrument_node="">Short and Concise Plot</span></h3><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">A sophisticated and well-developed plot is something to be praised and admired - but it is usually found in </span><a aria-label="a novel (opens in a new tab)" data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-write-novel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="662" instrument_node="">a novel</span></a><span data-dcnode-id="660" instrument_node="">.</span></p><span data-dcnode-id="658" instrument_node="">
</span><div data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">Your short story should feature proper plot development, but it needs to be short and to the point. It will not be developed in the same way as when you’re </span><a aria-label="writing a novel (opens in a new tab)" data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-write-novel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="656" instrument_node="">writing a novel</span></a><span data-dcnode-id="654" instrument_node="">.</span></div><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Some things to think about when creating the plot of your short story:</span></p><span data-dcnode-id="649" instrument_node="">
</span><ul data-dcnode-id="638"><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Start as close to the end as you can. Keep the rising action intense and concise. This allows you to give more attention to the deepest, most important and climactic parts of the story.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Reveal information quickly. Suspense is great, but you can only have so much of it in a short story. &nbsp;Don't drag out the&nbsp;inciting incident&nbsp;and make the&nbsp;plot points&nbsp;clear.&nbsp;</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Every single sentence should have a purpose. Revealing information, forwarding the plot, developing a character, etc. There is no room in a short story for fluffy extras. Familiarize yourself with short&nbsp;story structure. This will help you ensure you include the right elements and leave out the unnecessary ones.</span></li><span data-dcnode-id="639" instrument_node="">
</span></ul><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Even if you keep all of these things in mind, your story will still probably end up being too long. This is why editing is essential. Once your first draft is done, be as ruthless with your editing as you were with the characters.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Cut out absolutely anything and everything that is not essential to the plot. And then, go back for another round. This will get you down to the bare bones of your story. This is what will make it both short </span><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">and</span></em><span data-dcnode-id="630" instrument_node=""> effective. This is where true&nbsp;creative writing&nbsp;is tested. Can you make an impact in just a few words?&nbsp;</span></p><span data-dcnode-id="628" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="626" id="ahook"><span data-dcnode-id="627" instrument_node="">A Hook</span></h3><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Any book will indeed come with a good hook. However, it is especially important with a short story that the beginning be strong and impactful.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">With a short story, you need to introduce your characters, reveal the setting, create the right atmosphere, and grab the reader’s attention all at once. Ideally, it should all be in the&nbsp;first paragraph.&nbsp;</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">This isn’t an easy thing to do, but it’s crucial. A good opening can be done a few different ways:</span></p><span data-dcnode-id="616" instrument_node="">
</span><ol data-dcnode-id="608"><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Throw the readers into an intense action scene. Perhaps even the very climax of your story should double as the beginning. A bank robbery, a murder, a car chase, or violent fight scene will all leave a reader wondering what on earth is happening, and why. They will have no choice but to keep reading to find out.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Pose several questions at once that will prompt them to keep reading. For example, make them wonder who the character is, why they are where they are, and why they’re doing what they’re doing. You can do this by presenting your main character in an unusual situation, rather than immediately describing who they are and why they are important.</span></li><span data-dcnode-id="609" instrument_node="">
</span></ol><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Anything that is interesting, shocking, or creates immediate questions will make for a good hook. If you can hook your readers, they will always want to continue on to the end.</span></p><span data-dcnode-id="604" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="602" id="anendingthatmakesreadersthink"><span data-dcnode-id="603" instrument_node="">An Ending That Makes Readers Think</span></h3><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Lastly, you need a strong ending that leaves a lasting impression. The goal with a short story is to make an impact on your readers. Short stories can be incredibly powerful when executed well.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Don’t rush through the ending. You may already know exactly how you want it to end - but it still needs to be done well!</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Don’t be afraid to think outside the box and create a unique and unexpected ending. There are a few strategic ways to write a powerful ending to a short story:</span></p><span data-dcnode-id="592" instrument_node="">
</span><ol data-dcnode-id="581"><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">A cliffhanger. This requires balance as you don’t want to leave your readers questioning everything about the resolution. But, leaving one thing up in the air will make them think. It will have them running through all the options and deciding which one they want the most. Some readers may even go back through the story to see if there are any clues to the true ending.</span></li><span data-dcnode-id="588" instrument_node="">
</span><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">A twist. Twist endings are classic for a reason - they work! A well written and adequately executed twist will have your readers reeling. They will lay there in shock, combing through the story over and over again to find any instances of foreshadowing, once the ending is revealed.</span></li><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Dialogue. Ending a story with dialogue is similar to a cliffhanger, though generally less shocking and intense. Instead, it leaves things more gently open-ended and will have readers curiously pondering what was said or done next. This is an excellent way to have a highly emotional impact.&nbsp;It's also a good way to set up the&nbsp;next short story&nbsp;if you have a sequel planned.&nbsp;</span></li><span data-dcnode-id="582" instrument_node="">
</span></ol><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Whatever type of ending you choose to use in your story, always ensure that it makes sense.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Even the craziest twist endings need to make sense in some way. If you are planning on doing a big reveal, make sure you do leave small, barely noticeable clues throughout the story.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">This will help the reveal to be shocking, but still logical, and may even have some of the more observant readers guessing at the twist before it happens.</span></p><span data-dcnode-id="571" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="569" id="5.howtowriteacreativeshortstory"><span data-dcnode-id="570" instrument_node="">5. How to Write a Creative Short Story</span></h2><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="567" instrument_node="">Due to the shorter length, a great short story can be produced at a much faster rate than a novel. And, while less popular, they can also be </span><a aria-label="published (opens in a new tab)" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/publish-own-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="566" instrument_node="">published</span></a><span data-dcnode-id="564" instrument_node=""> just as fast especially with the growing </span><a aria-label="self-publishing (opens in a new tab)" data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-self-publish/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="563" instrument_node="">self-publishing</span></a><span data-dcnode-id="561" instrument_node=""> industry.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">This means that in order to stand out, you need to be intuitive and creative. You can’t write something boring and unoriginal, because everyone will have seen it before. Another common place to see short stories published is in a&nbsp;literary magazine. If short enough, they can be included in a one or two-page segment.&nbsp;</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">There are some strategies you can use to write something sufficiently creative and unique:</span></p><span data-dcnode-id="553" instrument_node="">
</span><ol data-dcnode-id="527"><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="551" instrument_node="">Write something that reflects </span><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">you. </span></em><span data-dcnode-id="548" instrument_node="">Don’t write something that you feel you </span><em data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">should</span></em><span data-dcnode-id="545" instrument_node=""> write. Write something that </span><em data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">you</span></em><span data-dcnode-id="542" instrument_node=""> love and are passionate about. Write the story that you want to tell, and the right readers will come.</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Break the rules. At this point, you probably know all of the writing “rules. “ You’ve read the guidelines, the articles, the advice from </span><a aria-label="successful authors (opens in a new tab)" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/become-an-author/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="538" instrument_node="">successful authors</span></a><span data-dcnode-id="536" instrument_node="">. But, If you’re feeling rebellious, then go for it. Go against everything you know to be “right” and proper. If the story turns out to be a bust - oh well! Write another one. Sometimes, the very best stories are the ones that have broken all conventions.</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Think outside the box. This may seem obvious, but too many writers fall prey to the temptation of writing what they think will sell. They stick to what is currently popular because they know people love it. But, trends pass. You want to write something original that will still be relevant in 20 years when no one cares about vampires anymore.</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Don’t be afraid to write something controversial and/or provocative. Touch on those subjects that others think are taboo. Give a voice to things that no one talks about. Stories like these can be wildly entertaining, but they may also spark some real conversation.</span></li><span data-dcnode-id="528" instrument_node="">
</span></ol><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Another simple but impactful way to be creative within your short story is to liven up your dialogue tags a little bit. Constant "he said, she said" gets boring and stagnant real fast.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Here are some examples of common dialogue tags: </span></strong></p><span data-dcnode-id="519" instrument_node="">
</span><ul data-dcnode-id="493"><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">He whispered.</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">She screamed.</span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">He snapped.</span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">They retorted.</span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">She stuttered.</span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">He whined.</span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">They exclaimed.</span></li><span data-dcnode-id="497" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">She mumbled.</span></li><span data-dcnode-id="494" instrument_node="">
</span></ul><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Not only are these things more descriptive, but they will make reading the story more interesting.</span></p><span data-dcnode-id="489" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="487" id="6.howtowriteashortstorytitle"><span data-dcnode-id="488" instrument_node="">6. How to Write a Short Story Title</span></h2><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Knowing how to write a short story title is just as important as the story itself. The title needs to be catchy, smart, and appropriately reflective of the story and its plot.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">The title is the first thing a reader will see. And, unlike with a novel, there usually isn’t an image to go with it. A novel also has a cover design that can be used to captivate and engage a potential reader.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Some short stories may come with illustrations, but most appear with only a title and the text within an anthology. A boring and uninspired title will have most readers skipping the story in favor of the next one.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">There are a few things you can keep in mind when crafting the perfect title for your short story:</span></p><span data-dcnode-id="474" instrument_node="">
</span><ol data-dcnode-id="460"><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">Don’t let it become too long. Five or six words </span><em data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">maximum</span></em><span data-dcnode-id="469" instrument_node=""> is a good rule of thumb.</span></li><span data-dcnode-id="467" instrument_node="">
</span><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Explore the overall themes and message of your story. The title should reflect this.</span></li><span data-dcnode-id="464" instrument_node="">
</span><li data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The title should include a hint at the plot. Just by reading the title, a reader should have at least a vague idea of what’s going to happen.</span></li><span data-dcnode-id="461" instrument_node="">
</span></ol><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Just because a story is short, doesn’t mean the title isn’t important! Don’t neglect this part of the process, as it will be crucial to the success of your short story.</span></p><span data-dcnode-id="456" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="454" id="7.shortstorywritingtools"><span data-dcnode-id="455" instrument_node="">7. Short Story Writing Tools</span></h2><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="452" instrument_node="">Writing anything - short fiction, </span><a aria-label="novels (opens in a new tab)" data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-write-novel/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="451" instrument_node="">novels</span></a><span data-dcnode-id="449" instrument_node="">, </span><a aria-label="nonfiction (opens in a new tab)" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/write-nonfiction-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="448" instrument_node="">nonfiction</span></a><span data-dcnode-id="446" instrument_node=""> - can be daunting and difficult. Sometimes the shorter pieces are even harder than a novel-length work because you don’t have as much wiggle room.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">When the writing gets tricky, don’t be afraid to seek some assistance.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">This can come in the form of human help from your fellow writers, or you can turn to some </span><a aria-label="writing software (opens in a new tab)" data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/12-best-writing-software/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="439" instrument_node="">writing software</span></a><span data-dcnode-id="437" instrument_node=""> to guide you. There are many options when it comes to this, but I can recommend two that will no doubt help you create the best short story possible.</span></p><span data-dcnode-id="435" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="433" id="squibler"><span data-dcnode-id="434" instrument_node="">Squibler</span></h3><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="431" instrument_node="">The first is </span><a aria-label="Squibler. (opens in a new tab)" data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="430" instrument_node="">Squibler.</span></a><span data-dcnode-id="428" instrument_node=""> While Squibler has been specially designed for those wishing to </span><a aria-label="write a book (opens in a new tab)" data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-write-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="427" instrument_node="">write a book</span></a><span data-dcnode-id="425" instrument_node="">, it can still help you with a shorter fictional endeavor.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Squibler offers an abundance of organizational tools that are sure to make your life easier.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">These include:</span></p><span data-dcnode-id="417" instrument_node="">
</span><ul data-dcnode-id="397"><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">A place for notes and research</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">A place for your outline - no matter how detailed</span></li><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Chapter and scene organization</span></li><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Free templates</span></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">A convenient tag system</span></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Easy access and searchability</span></li><span data-dcnode-id="398" instrument_node="">
</span></ul><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">All of these things can come in handy when you are writing a short story. Depending on the style and genre of your story, you may need to do a lot of research despite the shorter length.</span></p><span data-dcnode-id="393" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="389"><img alt="how to write a short story" class="wp-image-2027 lazyload" data-dcnode-id="392" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-1024x445.jpg" data-srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-1024x445.jpg 1024w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-300x130.jpg 300w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-768x334.jpg 768w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6.jpg 1000w" height="445" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="1024"><noscript data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">&lt;img loading="lazy" width="1024" height="445" class="wp-image-2027" src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-1024x445.jpg" alt="how to write a short story" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-1024x445.jpg 1024w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-300x130.jpg 300w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6-768x334.jpg 768w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/squibler1-6.jpg 1000w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">I discussed the importance of an outline for a short story earlier - Squibler will assist with and accommodate this as well.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Squibler won’t write the story for you. But, it takes care of all the small details so you can focus on writing and creating something amazing.</span></p><span data-dcnode-id="382" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="380" id="grammarly"><span data-dcnode-id="381" instrument_node="">Grammarly</span></h3><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">Once you have completed the first draft of your short story, it will be time to edit. Of course, as a </span><a aria-label="writer (opens in a new tab)" data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-become-a-writer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="377" instrument_node="">writer</span></a><span data-dcnode-id="375" instrument_node="">, you are more than capable of doing much of this yourself.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">However, we are human and we make mistakes. </span><a aria-label="Grammarly (opens in a new tab)" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grammarly.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="371" instrument_node="">Grammarly </span></a><span data-dcnode-id="369" instrument_node="">is there to help you through the editing process. Once it scans your work, it will pick out the spelling and grammatical errors, and show them to you.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">In addition to pointing out the errors you’ve made, it tells you how to fix them. These can be small things like an unnecessary comma or a missing period. But, a lot of little things can add up.</span></p><span data-dcnode-id="364" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="360"><img alt="how to write a short story" class="wp-image-2026 lazyload" data-dcnode-id="363" data-sizes="(max-width: 321px) 100vw, 321px" data-src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2.jpg" data-srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2.jpg 321w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2-300x251.jpg 300w" height="269" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="321"><noscript data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">&lt;img loading="lazy" width="321" height="269" class="wp-image-2026" src="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2.jpg" alt="how to write a short story" srcset="//storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2.jpg 321w, //storage.googleapis.com/squibler-wordpress-public-bucket/1/2019/06/grammarly-2-300x251.jpg 300w" sizes="(max-width: 321px) 100vw, 321px" /&gt;</span></noscript></figure><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Grammarly is free to use and can be integrated with a few different things:</span></p><span data-dcnode-id="356" instrument_node="">
</span><ol data-dcnode-id="342"><span data-dcnode-id="355" instrument_node="">
</span><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Windows</span></li><span data-dcnode-id="352" instrument_node="">
</span><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Microsoft Word</span></li><span data-dcnode-id="349" instrument_node="">
</span><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Google Docs</span></li><span data-dcnode-id="346" instrument_node="">
</span><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Chrome Browser</span></li><span data-dcnode-id="343" instrument_node="">
</span></ol><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">Grammarly makes your writing better, but it also </span><a aria-label="makes you a better writer (opens in a new tab)" data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/how-to-become-a-better-writer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">makes you a better writer</span></a><span data-dcnode-id="337" instrument_node="">. It will fix up your current writing, and if you pay attention to the corrections it makes, you can start learning from your own bad habits.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="334" instrument_node="">Grammarly is an effective editing tool for</span><a aria-label=" all types of wri (opens in a new tab)" data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/types-of-writers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="333" instrument_node=""> all </span></a><a aria-label="types of writers (opens in a new tab)" data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/types-of-writers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="331" instrument_node="">types of writers</span></a><span data-dcnode-id="329" instrument_node="">, fiction or otherwise. It cleans up your work fast. This saves you time, improves your craft, and helps you remain professional and polished.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">For an enhanced editing experience, Grammarly offers a premium upgrade that provides you with additional, more advanced checks.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="323" instrument_node="">If you are writing a lot of short stories and hope to </span><a aria-label="publish (opens in a new tab)" data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/blog/publish-own-book/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="322" instrument_node="">publish</span></a><span data-dcnode-id="320" instrument_node=""> them all, the upgrade might be the right choice for you.</span></p><span data-dcnode-id="318" instrument_node="">
</span><h3 class="scroll-element" data-dcnode-id="316" id="writingprompts"><span data-dcnode-id="317" instrument_node="">Writing Prompts</span></h3><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">If you're struggling to come up with some&nbsp;short&nbsp;story ideas, you can beat&nbsp;writer's block&nbsp;by using some&nbsp;writing prompts. Especially if it's your&nbsp;first time, these can be helpful.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">A good place to start is with this&nbsp;</span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.squibler.io/writing-prompt-generator" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="310" instrument_node="">writing prompt&nbsp;generator</span></a><span data-dcnode-id="308" instrument_node="">. It offers you more than 500 options to inspire a story. Use the prompts for a first sentence idea or to solidify the&nbsp;end of the story. Sometimes creating that satisfying ending first actually helps you develop the rest of the plot.&nbsp;</span></p><span data-dcnode-id="306" instrument_node="">
</span><h2 class="scroll-element" data-dcnode-id="304" id="writeashortstoryofyourown"><span data-dcnode-id="305" instrument_node="">Write a Short Story of Your Own</span></h2><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Short stories are a fun, unique, and often mind-bending part of the literary world. Knowing how to write a short story is a valuable skill as it’s not easy.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Short stories that are successful, however, can be some of the most intense, powerful, and thought-provoking pieces of fiction out there.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Once you hone your skills and understand exactly how they work, your short stories will be unstoppable.</span></p><span data-dcnode-id="294" instrument_node="">
