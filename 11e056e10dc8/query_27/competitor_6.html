</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Horror stories can be as fun to write as they are to read. A good horror story can gross you out, terrify you, or haunt your dreams. Horror stories depend on the reader believing in the story enough to be scared, disturbed, or disgusted. However, they can be tricky to write well. Like any fiction genre, horror can be mastered with the right planning, patience, and practice.

</span><div class="step_num" data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">1</span></div><div class="step" data-dcnode-id="4170"><span data-dcnode-id="4191" instrument_node="">
</span><b class="whb" data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Be aware of the subjective nature of the horror story.</span></b><span data-dcnode-id="4188" instrument_node=""> Like comedy, horror can be a difficult genre to write because what makes one person freak out or scream can leave another person bored or emotionless. But like crafting a good joke, crafting a good horror story has been done many times by the masters of the genre.</span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="4172" id="_ref-1"><a data-dcnode-id="4186" href="#_note-1"><span data-dcnode-id="4187" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="4174" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="4185" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">X</span></span><span data-dcnode-id="4182" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">Research source</span></span><span data-dcnode-id="4179" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4178"></span><span data-dcnode-id="4177" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4176" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4175" instrument_node="">
</span></span><span data-dcnode-id="4173" instrument_node="">
</span></sup><span data-dcnode-id="4171" instrument_node=""> Though your story may not appeal to all readers, or elicit cries of terror, there will likely be at least one reader who will respond in horror to your story.

</span></div><span data-dcnode-id="4169" instrument_node="">
</span><div class="green_box mobile" data-dcnode-id="4161"><p data-dcnode-id="4162"><b data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Christopher Taylor, Adjunct Assistant Professor of English, advises:</span></b><span data-dcnode-id="4166" instrument_node=""> "The key elements of a horror story include </span><b data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">fear, suspense, surprise, and moments of foreshadowing</span></b><span data-dcnode-id="4163" instrument_node="">."</span></p></div><span data-dcnode-id="4160" instrument_node="">

</span><li data-dcnode-id="4006" id="step-id-01"><span data-dcnode-id="4153" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="4152" name="step_1_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="4132" style="max-width:728px"><a class="image" data-dcnode-id="4133" href="#/Image:Write-a-Horror-Story-Step-2-Version-4.jpg"><div class="content-spacer" data-dcnode-id="4141" style="padding-top:75%"><div class="loading-container" data-dcnode-id="4147"><div class="loader" data-dcnode-id="4148"><div class="loader-dot" data-dcnode-id="4151"></div><div class="loader-dot" data-dcnode-id="4150"></div><div class="loader-dot" data-dcnode-id="4149"></div></div></div><span data-dcnode-id="4146" instrument_node="">

</span><div class="image_details" data-dcnode-id="4134" style="display:none;"><span data-dcnode-id="4135" style="display:none;"><span data-dcnode-id="4136" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/0\/0a\/Write-a-Horror-Story-Step-2-Version-4.jpg\/v4-460px-Write-a-Horror-Story-Step-2-Version-4.jpg","bigUrl":"\/images\/thumb\/0\/0a\/Write-a-Horror-Story-Step-2-Version-4.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-2-Version-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="4131" instrument_node="">
</span><div class="step_num" data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">2</span></div><div class="step" data-dcnode-id="4018"><span data-dcnode-id="4128" instrument_node="">
</span><b class="whb" data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Read several different types of horror stories.</span></b><span data-dcnode-id="4125" instrument_node=""> Familiarize yourself with the genre by reading effective examples of horror, from classic ghost stories to contemporary horror writing. As famed horror writer Stephen King once said, to be a real writer, you have to "read and write a lot."</span><sup aria-label="Link to Reference 2" class="reference" data-dcnode-id="4109" id="_ref-2"><a data-dcnode-id="4123" href="#_note-2"><span data-dcnode-id="4124" instrument_node="">[2]</span></a><span class="ts_popup" data-dcnode-id="4111" hidden="" id="ts_popup_2" style="display: none;"><span data-dcnode-id="4122" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">X</span></span><span data-dcnode-id="4119" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">Research source</span></span><span data-dcnode-id="4116" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4115"></span><span data-dcnode-id="4114" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4113" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4112" instrument_node="">
</span></span><span data-dcnode-id="4110" instrument_node="">
</span></sup><span data-dcnode-id="4108" instrument_node=""> Think about ghost stories or urban legends told around a campfire when you were a kid as well as any award-winning horror tales you read in school or on your own. You may want to look at specific examples like:
</span><ul data-dcnode-id="4020"><span data-dcnode-id="4107" instrument_node="">
</span><li data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">"The Monkey’s Paw", an 18th century tale by William Wymark Jacobs about three terrible wishes granted by a mystical monkey’s paw.</span></li><span data-dcnode-id="4104" instrument_node="">
</span><li data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">"The Tell-Tale Heart", master horror writer Edgar Allan Poe’s psychologically disturbing short story of murder and haunting.</span></li><span data-dcnode-id="4101" instrument_node="">
</span><li data-dcnode-id="4082"><span data-dcnode-id="4100" instrument_node="">Neil Gaiman's take on the nursery rhyme of Humpty Dumpty in "The Case of Four and Twenty Blackbirds."</span><sup aria-label="Link to Reference 3" class="reference" data-dcnode-id="4084" id="_ref-3"><a data-dcnode-id="4098" href="#_note-3"><span data-dcnode-id="4099" instrument_node="">[3]</span></a><span class="ts_popup" data-dcnode-id="4086" hidden="" id="ts_popup_3" style="display: none;"><span data-dcnode-id="4097" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">X</span></span><span data-dcnode-id="4094" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Research source</span></span><span data-dcnode-id="4091" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4090"></span><span data-dcnode-id="4089" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4088" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4087" instrument_node="">
</span></span><span data-dcnode-id="4085" instrument_node="">
</span></sup><span data-dcnode-id="4083" instrument_node="">
</span></li><span data-dcnode-id="4081" instrument_node="">
</span><li data-dcnode-id="4045"><span data-dcnode-id="4080" instrument_node="">You’d be remiss not to read a horror story by arguably the master of the genre, Stephen King. He has written over 200 short stories and uses many different techniques to scare his readers. While there are many lists of his greatest horror stories</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="4064" id="_ref-4"><a data-dcnode-id="4078" href="#_note-4"><span data-dcnode-id="4079" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="4066" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="4077" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">X</span></span><span data-dcnode-id="4074" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Research source</span></span><span data-dcnode-id="4071" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4070"></span><span data-dcnode-id="4069" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4068" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4067" instrument_node="">
</span></span><span data-dcnode-id="4065" instrument_node="">
</span></sup><span data-dcnode-id="4063" instrument_node="">, read "The Moving Finger"</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="4047" id="_ref-5"><a data-dcnode-id="4061" href="#_note-5"><span data-dcnode-id="4062" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="4049" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="4060" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">X</span></span><span data-dcnode-id="4057" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Research source</span></span><span data-dcnode-id="4054" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4053"></span><span data-dcnode-id="4052" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4051" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4050" instrument_node="">
</span></span><span data-dcnode-id="4048" instrument_node="">
</span></sup><span data-dcnode-id="4046" instrument_node=""> or "The Children of the Corn" to get a sense of King’s style.</span></li><span data-dcnode-id="4044" instrument_node="">
</span><li data-dcnode-id="4025"><span data-dcnode-id="4043" instrument_node="">Contemporary writer Joyce Carol Oates also has a famous horror story called "Where Are You Going, Where Have You Been?" that uses psychological terror to great effect.</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="4027" id="_ref-6"><a data-dcnode-id="4041" href="#_note-6"><span data-dcnode-id="4042" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="4029" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="4040" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">X</span></span><span data-dcnode-id="4037" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Research source</span></span><span data-dcnode-id="4034" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4033"></span><span data-dcnode-id="4032" instrument_node="">
</span><a class="ts_source" data-dcnode-id="4031" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="4030" instrument_node="">
</span></span><span data-dcnode-id="4028" instrument_node="">
</span></sup><span data-dcnode-id="4026" instrument_node="">
</span></li><span data-dcnode-id="4024" instrument_node="">
</span><li data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">Modern non-standard horror, like Stephen Milhauser’s "The White Glove," uses the horror genre to tell a coming-of-age story.</span></li><span data-dcnode-id="4021" instrument_node="">
</span></ul><span data-dcnode-id="4019" instrument_node="">
</span></div><span data-dcnode-id="4017" instrument_node="">

</span></li><span data-dcnode-id="4005" instrument_node="">
</span><li data-dcnode-id="3948" id="step-id-02"><span data-dcnode-id="4004" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="4003" name="step_1_3"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3983" style="max-width:728px"><a class="image" data-dcnode-id="3984" href="#/Image:Write-a-Horror-Story-Step-3-Version-4.jpg"><div class="content-spacer" data-dcnode-id="3992" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3998"><div class="loader" data-dcnode-id="3999"><div class="loader-dot" data-dcnode-id="4002"></div><div class="loader-dot" data-dcnode-id="4001"></div><div class="loader-dot" data-dcnode-id="4000"></div></div></div><span data-dcnode-id="3997" instrument_node="">
</span><img alt="Image titled Write a Horror Story Step 3" class="whcdn content-fill img-loading-alt" data-dcnode-id="3996" data-height="345" data-src="https://www.wikihow.com/images/thumb/7/72/Write-a-Horror-Story-Step-3-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-3-Version-4.jpg" data-srclarge="/images/thumb/7/72/Write-a-Horror-Story-Step-3-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-3-Version-4.jpg" data-width="460" decoding="async" id="957f9ad479eb0f9aa9249f243428fb95" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/7/72/Write-a-Horror-Story-Step-3-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-3-Version-4.jpg.webp&amp;raw"><span data-dcnode-id="3993" instrument_node="">
</span></div><span data-dcnode-id="3991" instrument_node="">
</span><noscript data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 3" src="https://www.wikihow.com/images/thumb/7/72/Write-a-Horror-Story-Step-3-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-3-Version-4.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/7/72/Write-a-Horror-Story-Step-3-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-3-Version-4.jpg" data-width="460" data-height="345" id="957f9ad479eb0f9aa9249f243428fb95"&gt;</span></noscript><span data-dcnode-id="3988" instrument_node="">
</span><div class="image_details" data-dcnode-id="3985" style="display:none;"><span data-dcnode-id="3986" style="display:none;"><span data-dcnode-id="3987" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/7\/72\/Write-a-Horror-Story-Step-3-Version-4.jpg\/v4-460px-Write-a-Horror-Story-Step-3-Version-4.jpg","bigUrl":"\/images\/thumb\/7\/72\/Write-a-Horror-Story-Step-3-Version-4.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-3-Version-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3982" instrument_node="">
</span><div class="step_num" data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">3</span></div><div class="step" data-dcnode-id="3963"><span data-dcnode-id="3979" instrument_node="">
</span><b class="whb" data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Analyze the horror story examples.</span></b><span data-dcnode-id="3976" instrument_node=""> Choose one or two examples you enjoy reading or find interesting in terms of how they use a certain setting, plot, character or twist in the story to create horror or terror. For example:
</span><ul data-dcnode-id="3965"><span data-dcnode-id="3975" instrument_node="">
</span><li data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">In King’s "The Moving Finger", King takes a premise: a man who thinks he sees and hears a moving human finger scratching a wall in his bathroom and then follows the man closely over the span of a short period of time as he tries to avoid the finger, until he is forced to confront his fear of the finger. King also uses other elements like a Jeopardy game and a conversation between the main character and his wife to further create a feeling of suspense and dread.</span></li><span data-dcnode-id="3972" instrument_node="">
</span><li data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">In Oates’ "Where Are You Going, Where Have You Been?", Oates establishes the main character, a young girl named Connie, by providing scenes of her daily life and then zooms in on one fateful day, when two men pull up in a car while Connie is at home all alone. Oates uses dialogue to create a sense of dread and allows the reader to experience Connie’s growing sense of fear of the threat of these men.</span></li><span data-dcnode-id="3969" instrument_node="">
</span><li data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">In both stories, horror or terror is created through a combination of shock and dread, using elements that are possibly supernatural (a moving human finger) and elements that are psychologically disturbing (a young girl alone with two men).</span></li><span data-dcnode-id="3966" instrument_node="">
</span></ul><span data-dcnode-id="3964" instrument_node="">

</span><b class="whb" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Think about what scares you or revolts you the most.</span></b><span data-dcnode-id="3886" instrument_node=""> Tap into your fears of losing family members, of being alone, of violence, of clowns, of demons, or even of killer squirrels. Your fear will then come across on the page and your experience or exploration of this fear will also grip the reader.</span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="3870" id="_ref-7"><a data-dcnode-id="3884" href="#_note-7"><span data-dcnode-id="3885" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="3872" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="3883" instrument_node="">

</span></sup><span data-dcnode-id="3869" instrument_node="">

</span><li data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Make a list of your greatest fears. Then, think about how you would react if you were trapped or forced to confront these fears.</span></li><span data-dcnode-id="3865" instrument_node="">
</span><li data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">You could also take a poll of what scares your family, friends, or partners the most. Get some subjective ideas of horror.</span></li><span data-dcnode-id="3862" instrument_node="">

</span><div class="step_num" data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">2</span></div><div class="step" data-dcnode-id="3801"><span data-dcnode-id="3826" instrument_node="">
</span><b class="whb" data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Take an ordinary situation and create something horrifying.</span></b><span data-dcnode-id="3823" instrument_node=""> Another approach is to look at a normal, everyday situation like taking a walk in the park, cutting up a piece of fruit, or visiting a friend and adding a terrifying or bizarre element. Such as coming across a severed ear during your walk, cutting up a piece of fruit that turns into a finger or a tentacle, or visiting an old friend who has no idea who you are or claims you are someone you are not.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="3807" id="_ref-8"><a data-dcnode-id="3821" href="#_note-8"><span data-dcnode-id="3822" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="3809" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="3820" instrument_node="">

</span></sup><span data-dcnode-id="3806" instrument_node="">
</span><ul data-dcnode-id="3803"><li data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">Use your imagination to create a horrifying spin on a normal, everyday activity or scene.</span></li></ul><span data-dcnode-id="3802" instrument_node="">

</span><div class="step_num" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">3</span></div><div class="step" data-dcnode-id="3755"><span data-dcnode-id="3768" instrument_node="">
</span><b class="whb" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Use setting to limit or trap your characters in the story.</span></b><span data-dcnode-id="3765" instrument_node=""> One way to create a situation that will induce terror in a reader is to restrict your character’s movements so they are forced to confront their fear and then try to find a way out.
</span><ul data-dcnode-id="3757"><span data-dcnode-id="3764" instrument_node="">
</span><li data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Think about what kind of confined spaces scare you. Where would you dread or fear being trapped in the most?</span></li><span data-dcnode-id="3761" instrument_node="">
</span><li data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Trap your character in a confined space like a cellar, a coffin, an abandoned hospital, an island, or an abandoned town. This will create an immediate conflict or threat to the character and set your story up with immediate tension or suspense.</span></li><span data-dcnode-id="3758" instrument_node="">
</span></ul><span data-dcnode-id="3756" instrument_node="">

</span><div class="step_num" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">4</span></div><div class="step" data-dcnode-id="3718"><span data-dcnode-id="3722" instrument_node="">
</span><b class="whb" data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Let your characters restrict their own movements.</span></b><span data-dcnode-id="3719" instrument_node=""> Maybe your character is a werewolf who doesn’t want to hurt anyone on the next full moon so they lock themselves in a cellar or room. Or maybe your character is so fearful of a severed finger in the bathroom, he does everything to avoid the bathroom until the finger haunts him so much he forces himself to go into the bathroom and confront it.

</span><div class="image_details" data-dcnode-id="3691" style="display:none;"><span data-dcnode-id="3692" style="display:none;"><span data-dcnode-id="3693" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/8\/86\/Write-a-Horror-Story-Step-8-Version-4.jpg\/v4-460px-Write-a-Horror-Story-Step-8-Version-4.jpg","bigUrl":"\/images\/thumb\/8\/86\/Write-a-Horror-Story-Step-8-Version-4.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-8-Version-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3688" instrument_node="">
</span><div class="step_num" data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">5</span></div><div class="step" data-dcnode-id="3649"><span data-dcnode-id="3685" instrument_node="">
</span><b class="whb" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Create extreme emotions in your reader.</span></b><span data-dcnode-id="3682" instrument_node=""> Because horror hinges on the subjective reaction of the reader, the story should work to create several extreme feelings in the reader, including:
</span><ul data-dcnode-id="3651"><span data-dcnode-id="3681" instrument_node="">
</span><li data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Shock: the simplest way to scare the reader is to create shock with a twist ending, a sudden image of gore or a quick moment of terror. However, creating fear through shock can lead to cheap scares and if used too much, can become predictable or less likely to scare the reader.</span></li><span data-dcnode-id="3678" instrument_node="">
</span><li data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">Paranoia: the sense that something is not quite right, which can unnerve the reader, make them doubt their own surroundings, and when used to its full effect, make the reader doubt even their own beliefs or ideas of the world. This type of fear is great for slow tension-building and psychological horror stories.</span></li><span data-dcnode-id="3675" instrument_node="">
</span><li data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Dread: this type of fear is the horrible sense that something bad is going to happen. Dread works well when the reader connects deeply to the story and begins to care enough about the characters to fear something bad that is going to happen to them. Inspiring dread in a reader is tricky as the story will need to do a lot of work to keep the reader engaged and involved, but it is a powerful type of fear.</span></li><span data-dcnode-id="3672" instrument_node="">
</span><li data-dcnode-id="3653"><span data-dcnode-id="3671" instrument_node="">Balance intense negative emotions with intense emotions of wonder or positivity.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="3655" id="_ref-9"><a data-dcnode-id="3669" href="#_note-9"><span data-dcnode-id="3670" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="3657" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="3668" instrument_node="">

</span><div class="step_num" data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">6</span></div><div class="step" data-dcnode-id="3583"><span data-dcnode-id="3616" instrument_node="">
</span><b class="whb" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Use horrifying details to create horror or terror in your reader.</span></b><span data-dcnode-id="3613" instrument_node=""> Stephen King argues there are several key ways to create a feeling of horror or terror in a story, which can then create different reactions from the reader.</span><sup aria-label="Link to Reference 10" class="reference" data-dcnode-id="3597" id="_ref-10"><a data-dcnode-id="3611" href="#_note-10"><span data-dcnode-id="3612" instrument_node="">[10]</span></a><span class="ts_popup" data-dcnode-id="3599" hidden="" id="ts_popup_10" style="display: none;"><span data-dcnode-id="3610" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">X</span></span><span data-dcnode-id="3607" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Research source</span></span><span data-dcnode-id="3604" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3603"></span><span data-dcnode-id="3602" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3601" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3600" instrument_node="">
</span></span><span data-dcnode-id="3598" instrument_node="">
</span></sup><span data-dcnode-id="3596" instrument_node="">
</span><ul data-dcnode-id="3585"><span data-dcnode-id="3595" instrument_node="">
</span><li data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Using gross-out details like a severed head tumbling down a flight of stairs, something green and slimy landing on your arm, or a character landing in a pool of blood.</span></li><span data-dcnode-id="3592" instrument_node="">
</span><li data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Using unnatural details (or fear of the unknown or impossible) like spiders the size of bears, an attack from the living dead, or an alien claw grabbing your feet in a dark room.</span></li><span data-dcnode-id="3589" instrument_node="">
</span><li data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Using terrifying psychological details like a character who comes home to another version of him or herself, or a character who experiences paralyzing nightmares which then affect their sense of reality.</span></li><span data-dcnode-id="3586" instrument_node="">
</span></ul><span data-dcnode-id="3584" instrument_node="">

</span><div class="step_num" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">7</span></div><div class="step" data-dcnode-id="3520"><span data-dcnode-id="3550" instrument_node="">
</span><b class="whb" data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">Create a plot outline.</span></b><span data-dcnode-id="3547" instrument_node=""> Once you find your premise or scenario, your setting, determine which extreme emotions you are going to play on, and decide the types of horror details you are going to use in the story, create a rough outline of the story.
</span><ul data-dcnode-id="3522"><span data-dcnode-id="3546" instrument_node="">
</span><li data-dcnode-id="3527"><span data-dcnode-id="3545" instrument_node="">You can use Freytag’s pyramid</span><sup aria-label="Link to Reference 11" class="reference" data-dcnode-id="3529" id="_ref-11"><a data-dcnode-id="3543" href="#_note-11"><span data-dcnode-id="3544" instrument_node="">[11]</span></a><span class="ts_popup" data-dcnode-id="3531" hidden="" id="ts_popup_11" style="display: none;"><span data-dcnode-id="3542" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">X</span></span><span data-dcnode-id="3539" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Research source</span></span><span data-dcnode-id="3536" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3535"></span><span data-dcnode-id="3534" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3533" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3532" instrument_node="">
</span></span><span data-dcnode-id="3530" instrument_node="">
</span></sup><span data-dcnode-id="3528" instrument_node=""> to create an outline, which begins with exposition of the setting and life or day of the character(s), moves into the conflict of the character (a severed finger in the bathroom, two men in a car), shifts upward into rising action where the character tries to solve or work against the conflict but meets several complications or roadblocks, reaches the climax, and then falls downward with falling action, into the resolution where the character is changed, shifted (or in the case of some horror), meets a terrifying death.</span></li><span data-dcnode-id="3526" instrument_node="">
</span><li data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Think of a short title that hints at the terror in your story.</span></li><span data-dcnode-id="3523" instrument_node="">
</span></ul><span data-dcnode-id="3521" instrument_node="">

</span><ol class="steps_list_2" data-dcnode-id="3215"><span data-dcnode-id="3475" instrument_node="">
</span><li data-dcnode-id="3401" id="step-id-210"><span data-dcnode-id="3474" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3473" name="step_3_1"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3453" style="max-width:728px"><a class="image" data-dcnode-id="3454" href="#/Image:Write-a-Horror-Story-Step-11-Version-4.jpg"><div class="content-spacer" data-dcnode-id="3462" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3468"><div class="loader" data-dcnode-id="3469"><div class="loader-dot" data-dcnode-id="3472"></div><div class="loader-dot" data-dcnode-id="3471"></div><div class="loader-dot" data-dcnode-id="3470"></div></div></div><span data-dcnode-id="3467" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3466" data-height="345" data-src="https://www.wikihow.com/images/thumb/e/ea/Write-a-Horror-Story-Step-11-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-11-Version-4.jpg" data-srclarge="/images/thumb/e/ea/Write-a-Horror-Story-Step-11-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-11-Version-4.jpg" data-width="460" decoding="async" id="fc3c774459d1c46b1690ad5e2d0b708e" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/e/ea/Write-a-Horror-Story-Step-11-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-11-Version-4.jpg.webp&amp;raw"><span data-dcnode-id="3463" instrument_node="">
</span></div><span data-dcnode-id="3461" instrument_node="">
</span><noscript data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 11" src="https://www.wikihow.com/images/thumb/e/ea/Write-a-Horror-Story-Step-11-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-11-Version-4.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/e/ea/Write-a-Horror-Story-Step-11-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-11-Version-4.jpg" data-width="460" data-height="345" id="fc3c774459d1c46b1690ad5e2d0b708e"&gt;</span></noscript><span data-dcnode-id="3458" instrument_node="">
</span><div class="image_details" data-dcnode-id="3455" style="display:none;"><span data-dcnode-id="3456" style="display:none;"><span data-dcnode-id="3457" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/e\/ea\/Write-a-Horror-Story-Step-11-Version-4.jpg\/v4-460px-Write-a-Horror-Story-Step-11-Version-4.jpg","bigUrl":"\/images\/thumb\/e\/ea\/Write-a-Horror-Story-Step-11-Version-4.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-11-Version-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3452" instrument_node="">
</span><div class="step_num" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">1</span></div><div class="step" data-dcnode-id="3407"><span data-dcnode-id="3449" instrument_node="">
</span><b class="whb" data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Make your reader care about or identify with your main character.</span></b><span data-dcnode-id="3446" instrument_node=""> Do this by introducing clear details and descriptions of the character’s routine, relationships, and point of view. Make your characters believable so others will empathize with them.</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="3430" id="_ref-12"><a data-dcnode-id="3444" href="#_note-12"><span data-dcnode-id="3445" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3432" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3443" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">X</span></span><span data-dcnode-id="3440" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Research source</span></span><span data-dcnode-id="3437" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3436"></span><span data-dcnode-id="3435" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3434" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3433" instrument_node="">
</span></span><span data-dcnode-id="3431" instrument_node="">
</span></sup><span data-dcnode-id="3429" instrument_node="">
</span><ul data-dcnode-id="3409"><span data-dcnode-id="3428" instrument_node="">
</span><li data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Determine the age and occupation of your character.</span></li><span data-dcnode-id="3425" instrument_node="">
</span><li data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Determine the marital status or relationship status of your character.</span></li><span data-dcnode-id="3422" instrument_node="">
</span><li data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Determine how they view the world (cynical, skeptical, anxious, happy-go-lucky, satisfied, settled).</span></li><span data-dcnode-id="3419" instrument_node="">
</span><li data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Add in specific or unique details. Make your character feel distinct with a certain character trait or tick (a hairstyle, a scar) or a mark of their appearance (an item of clothing, a piece of jewellery, a pipe or cane). A character’s speech or dialect can also distinguish a character on the page, and make them stand out more to the reader.</span></li><span data-dcnode-id="3416" instrument_node="">
</span><li data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">Once your readers identify with a character, the character becomes a bit like their child. They will empathize with the character’s conflict and root for them to overcome their conflict, while also realizing that this rarely happens.</span></li><span data-dcnode-id="3413" instrument_node="">
</span><li data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">This tension between what the reader wants for the character and what could happen or go wrong for the character will fuel the story and propel your readers through the story.</span></li><span data-dcnode-id="3410" instrument_node="">
</span></ul><span data-dcnode-id="3408" instrument_node="">
</span></div><span data-dcnode-id="3406" instrument_node="">

</span><div class="scrolltomarker" data-dcnode-id="3403" data-isstep="1"></div><span data-dcnode-id="3402" instrument_node="">
</span></li><span data-dcnode-id="3400" instrument_node="">
</span><li data-dcnode-id="3338" id="step-id-211"><span data-dcnode-id="3399" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3398" name="step_3_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3378" style="max-width:728px"><a class="image" data-dcnode-id="3379" href="#/Image:Write-a-Horror-Story-Step-12-Version-4.jpg"><div class="content-spacer" data-dcnode-id="3387" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3393"><div class="loader" data-dcnode-id="3394"><div class="loader-dot" data-dcnode-id="3397"></div><div class="loader-dot" data-dcnode-id="3396"></div><div class="loader-dot" data-dcnode-id="3395"></div></div></div><span data-dcnode-id="3392" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3391" data-height="345" data-src="https://www.wikihow.com/images/thumb/4/49/Write-a-Horror-Story-Step-12-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-12-Version-4.jpg" data-srclarge="/images/thumb/4/49/Write-a-Horror-Story-Step-12-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-12-Version-4.jpg" data-width="460" decoding="async" id="ff1ca28f74749c187d23c671182f83ca" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/4/49/Write-a-Horror-Story-Step-12-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-12-Version-4.jpg.webp&amp;raw"><span data-dcnode-id="3388" instrument_node="">
</span></div><span data-dcnode-id="3386" instrument_node="">
</span><noscript data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 12" src="https://www.wikihow.com/images/thumb/4/49/Write-a-Horror-Story-Step-12-Version-4.jpg/v4-460px-Write-a-Horror-Story-Step-12-Version-4.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/4/49/Write-a-Horror-Story-Step-12-Version-4.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-12-Version-4.jpg" data-width="460" data-height="345" id="ff1ca28f74749c187d23c671182f83ca"&gt;</span></noscript><span data-dcnode-id="3383" instrument_node="">
</span><div class="image_details" data-dcnode-id="3380" style="display:none;"><span data-dcnode-id="3381" style="display:none;"><span data-dcnode-id="3382" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/4\/49\/Write-a-Horror-Story-Step-12-Version-4.jpg\/v4-460px-Write-a-Horror-Story-Step-12-Version-4.jpg","bigUrl":"\/images\/thumb\/4\/49\/Write-a-Horror-Story-Step-12-Version-4.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-12-Version-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3377" instrument_node="">
</span><div class="step_num" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">2</span></div><div class="step" data-dcnode-id="3344"><span data-dcnode-id="3374" instrument_node="">
</span><b class="whb" data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Be prepared for bad things to happen to your character.</span></b><span data-dcnode-id="3371" instrument_node=""> Most horror is about fear and tragedy and whether or not your character is capable of overcoming their fears. A story where good things happen to good people may be heartwarming but it will likely not scare or terrify your reader. In fact, the tragedy of bad things happening to good people is not only more relatable, it will also be full of tension and suspense.</span><sup aria-label="Link to Reference 13" class="reference" data-dcnode-id="3355" id="_ref-13"><a data-dcnode-id="3369" href="#_note-13"><span data-dcnode-id="3370" instrument_node="">[13]</span></a><span class="ts_popup" data-dcnode-id="3357" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="3368" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">X</span></span><span data-dcnode-id="3365" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Research source</span></span><span data-dcnode-id="3362" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3361"></span><span data-dcnode-id="3360" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3359" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3358" instrument_node="">
</span></span><span data-dcnode-id="3356" instrument_node="">
</span></sup><span data-dcnode-id="3354" instrument_node="">
</span><ul data-dcnode-id="3346"><span data-dcnode-id="3353" instrument_node="">
</span><li data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">In order to create conflict in a character’s life, you need to introduce a danger or threat to the character, whether it's a moving finger, two men in a car, a mystical monkey’s paw or a murderous clown.</span></li><span data-dcnode-id="3350" instrument_node="">
</span><li data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">For example, in King’s "The Moving Finger", the main character, Howard, is a middle-aged man who enjoys watching Jeopardy, has a comfortable relationship with his wife, and seems to live a decent middle class life. But King does not let the reader get too comfortable in Howard's normal existence as he introduces a scratching sound in Howard's bathroom. The discovery of the finger in the bathroom, and Howard's subsequent attempts to avoid it, remove it, or destroy it, creates a story where a seemingly normal, likeable man’s life is interrupted by the unknown or the unreal.</span></li><span data-dcnode-id="3347" instrument_node="">
</span></ul><span data-dcnode-id="3345" instrument_node="">
</span></div><span data-dcnode-id="3343" instrument_node="">
</span><div class="clearall" data-dcnode-id="3342"></div><span data-dcnode-id="3341" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="3340" data-isstep="1"></div><span data-dcnode-id="3339" instrument_node="">
</span></li><span data-dcnode-id="3337" instrument_node="">
</span><li data-dcnode-id="3269" id="step-id-212"><span data-dcnode-id="3336" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3335" name="step_3_3"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3315" style="max-width:728px"><a class="image" data-dcnode-id="3316" href="#/Image:Write-a-Horror-Story-Step-13-Version-2.jpg"><div class="content-spacer" data-dcnode-id="3324" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3330"><div class="loader" data-dcnode-id="3331"><div class="loader-dot" data-dcnode-id="3334"></div><div class="loader-dot" data-dcnode-id="3333"></div><div class="loader-dot" data-dcnode-id="3332"></div></div></div><span data-dcnode-id="3329" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3328" data-height="345" data-src="https://www.wikihow.com/images/thumb/3/35/Write-a-Horror-Story-Step-13-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-13-Version-2.jpg" data-srclarge="/images/thumb/3/35/Write-a-Horror-Story-Step-13-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-13-Version-2.jpg" data-width="460" decoding="async" id="e4d144fca7b257a1e582acbe14dcb95c" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/3/35/Write-a-Horror-Story-Step-13-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-13-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="3325" instrument_node="">
</span></div><span data-dcnode-id="3323" instrument_node="">
</span><noscript data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 13" src="https://www.wikihow.com/images/thumb/3/35/Write-a-Horror-Story-Step-13-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-13-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/3/35/Write-a-Horror-Story-Step-13-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-13-Version-2.jpg" data-width="460" data-height="345" id="e4d144fca7b257a1e582acbe14dcb95c"&gt;</span></noscript><span data-dcnode-id="3320" instrument_node="">
</span><div class="image_details" data-dcnode-id="3317" style="display:none;"><span data-dcnode-id="3318" style="display:none;"><span data-dcnode-id="3319" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/3\/35\/Write-a-Horror-Story-Step-13-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-13-Version-2.jpg","bigUrl":"\/images\/thumb\/3\/35\/Write-a-Horror-Story-Step-13-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-13-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3314" instrument_node="">
</span><div class="step_num" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">3</span></div><div class="step" data-dcnode-id="3275"><span data-dcnode-id="3311" instrument_node="">
</span><b class="whb" data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">Allow your characters to make mistakes or bad decisions.</span></b><span data-dcnode-id="3308" instrument_node=""> Once you have established the threat or danger to the character, you will then need to have your character respond with the wrong move, while convincing themselves they are in fact making the right move or decision against this threat.</span><sup aria-label="Link to Reference 14" class="reference" data-dcnode-id="3292" id="_ref-14"><a data-dcnode-id="3306" href="#_note-14"><span data-dcnode-id="3307" instrument_node="">[14]</span></a><span class="ts_popup" data-dcnode-id="3294" hidden="" id="ts_popup_14" style="display: none;"><span data-dcnode-id="3305" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">X</span></span><span data-dcnode-id="3302" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Research source</span></span><span data-dcnode-id="3299" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3298"></span><span data-dcnode-id="3297" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3296" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3295" instrument_node="">
</span></span><span data-dcnode-id="3293" instrument_node="">
</span></sup><span data-dcnode-id="3291" instrument_node="">
</span><ul data-dcnode-id="3277"><span data-dcnode-id="3290" instrument_node="">
</span><li data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Its important to create enough motivation for the character so their bad decision feels justifiable and not merely stupid or unbelievable. An attractive young babysitter who responds to a masked killer by running not to the telephone to call the police but outside into the deep, dark woods is not only a stupid character move, it also feels unbelievable to the reader or viewer.</span></li><span data-dcnode-id="3287" instrument_node="">
</span><li data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">But if you have your character make a justifiable, though flawed, decision in response to a threat, your reader will be more willing to believe and root for that character.</span></li><span data-dcnode-id="3284" instrument_node="">
</span><li data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">For example, in King’s "The Moving Finger", Howard initially decides not to tell his wife about the finger in the bathroom because he believes he may be hallucinating or confusing the scratching noise for a mouse or animal caught in the bathroom. The story justifies Howard's decision not to tell anyone about the finger by playing off what most people who tell themselves if they witnessed a strange or bizarre event: it wasn't real, or I'm just seeing things.</span></li><span data-dcnode-id="3281" instrument_node="">
</span><li data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">The story then justifies Howard's reaction by allowing his wife to go into the bathroom and not comment about seeing a moving finger by the toilet. So, the story plays with Howard's perception of reality and indicates that maybe he did hallucinate the finger.</span></li><span data-dcnode-id="3278" instrument_node="">
</span></ul><span data-dcnode-id="3276" instrument_node="">
</span></div><span data-dcnode-id="3274" instrument_node="">
</span><div class="clearall" data-dcnode-id="3273"></div><span data-dcnode-id="3272" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="3271" data-isstep="1"></div><span data-dcnode-id="3270" instrument_node="">
</span></li><span data-dcnode-id="3268" instrument_node="">
</span><li data-dcnode-id="3217" id="step-id-213"><span data-dcnode-id="3267" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3266" name="step_3_4"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3246" style="max-width:728px"><a class="image" data-dcnode-id="3247" href="#/Image:Write-a-Horror-Story-Step-14-Version-2.jpg"><div class="content-spacer" data-dcnode-id="3255" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3261"><div class="loader" data-dcnode-id="3262"><div class="loader-dot" data-dcnode-id="3265"></div><div class="loader-dot" data-dcnode-id="3264"></div><div class="loader-dot" data-dcnode-id="3263"></div></div></div><span data-dcnode-id="3260" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3259" data-height="345" data-src="https://www.wikihow.com/images/thumb/8/84/Write-a-Horror-Story-Step-14-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-14-Version-2.jpg" data-srclarge="/images/thumb/8/84/Write-a-Horror-Story-Step-14-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-14-Version-2.jpg" data-width="460" decoding="async" id="5e522dd87021357e3c1da2a45862502c" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/8/84/Write-a-Horror-Story-Step-14-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-14-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="3256" instrument_node="">

</span><div class="image_details" data-dcnode-id="3248" style="display:none;"><span data-dcnode-id="3249" style="display:none;"><span data-dcnode-id="3250" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/8\/84\/Write-a-Horror-Story-Step-14-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-14-Version-2.jpg","bigUrl":"\/images\/thumb\/8\/84\/Write-a-Horror-Story-Step-14-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-14-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3245" instrument_node="">
</span><div class="step_num" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">4</span></div><div class="step" data-dcnode-id="3229"><span data-dcnode-id="3242" instrument_node="">
</span><b class="whb" data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Make the stakes for the character clear and extreme.</span></b><span data-dcnode-id="3239" instrument_node=""> The "stakes" of a character in a story is what your character has to lose if they make a certain decision or choice in the story. If your reader doesn't know what is at stake for the character in the conflict, they cannot fear loss. And a good horror story is all about creating extreme emotions like fear or anxiety in the reader through creating extreme emotions in the characters.
</span><ul data-dcnode-id="3231"><span data-dcnode-id="3238" instrument_node="">
</span><li data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Fear is built off of understanding the consequences of an action for a character or the risk of their actions. So if your character decides to confront a clown in the attic or two men in a car, the reader will need to be aware of what the character could lose as a result of this decision. Preferably, your character’s stakes should be extreme or major, such as loss of sanity, loss of innocence, loss of life, or loss of the life of someone they care about.</span></li><span data-dcnode-id="3235" instrument_node="">
</span><li data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">In the case of King’s story, the main character is afraid that if he confronts the finger, he may risk losing his sanity. The stakes of the character in the story are very high and very clear to the reader. So, when Howard does finally confront the moving finger, the reader is terrified of how the outcome is going to create a loss for Howard.</span></li><span data-dcnode-id="3232" instrument_node="">
</span></ul><span data-dcnode-id="3230" instrument_node="">
</span></div><span data-dcnode-id="3228" instrument_node="">

</span><div class="altblock" data-dcnode-id="3198"><div data-dcnode-id="3200"><span data-dcnode-id="3204" instrument_node="">Part </span><span data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">4</span></span><span data-dcnode-id="3201" instrument_node="">

</span><span class="mw-headline" data-dcnode-id="3193" id="Creating-a-Horrific-Climax-and-a-Twist-Ending"><div class="method_label" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Part 4 of 5:</span></div><span data-dcnode-id="3194" instrument_node="">Creating a Horrific Climax and a Twist Ending</span></span><a class="large_pdf_link pdf_link pdf_link_steps" data-dcnode-id="3189" href="#"><span data-dcnode-id="3192" instrument_node="">
</span><img data-dcnode-id="3191" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/extensions/wikihow/socialstamp/images/icon-pdf.svg&amp;raw" width="15"><span data-dcnode-id="3190" instrument_node="">

</span></h3><span data-dcnode-id="3186" instrument_node="">
</span><div class="section_text" data-dcnode-id="2935" id="steps_5"><span data-dcnode-id="3185" instrument_node="">
</span><ol class="steps_list_2" data-dcnode-id="2939"><span data-dcnode-id="3184" instrument_node="">
</span><li data-dcnode-id="3116" id="step-id-314"><span data-dcnode-id="3183" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3182" name="step_4_1"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3162" style="max-width:728px"><a class="image" data-dcnode-id="3163" href="#/Image:Write-a-Horror-Story-Step-15-Version-2.jpg"><div class="content-spacer" data-dcnode-id="3171" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3177"><div class="loader" data-dcnode-id="3178"><div class="loader-dot" data-dcnode-id="3181"></div><div class="loader-dot" data-dcnode-id="3180"></div><div class="loader-dot" data-dcnode-id="3179"></div></div></div><span data-dcnode-id="3176" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3175" data-height="345" data-src="https://www.wikihow.com/images/thumb/a/a1/Write-a-Horror-Story-Step-15-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-15-Version-2.jpg" data-srclarge="/images/thumb/a/a1/Write-a-Horror-Story-Step-15-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-15-Version-2.jpg" data-width="460" decoding="async" id="dc7e0b858f809abd17b2c4b8add98817" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/a/a1/Write-a-Horror-Story-Step-15-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-15-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="3172" instrument_node="">
</span></div><span data-dcnode-id="3170" instrument_node="">
</span><noscript data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 15" src="https://www.wikihow.com/images/thumb/a/a1/Write-a-Horror-Story-Step-15-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-15-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/a/a1/Write-a-Horror-Story-Step-15-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-15-Version-2.jpg" data-width="460" data-height="345" id="dc7e0b858f809abd17b2c4b8add98817"&gt;</span></noscript><span data-dcnode-id="3167" instrument_node="">
</span><div class="image_details" data-dcnode-id="3164" style="display:none;"><span data-dcnode-id="3165" style="display:none;"><span data-dcnode-id="3166" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/a\/a1\/Write-a-Horror-Story-Step-15-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-15-Version-2.jpg","bigUrl":"\/images\/thumb\/a\/a1\/Write-a-Horror-Story-Step-15-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-15-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3161" instrument_node="">
</span><div class="step_num" data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">1</span></div><div class="step" data-dcnode-id="3122"><span data-dcnode-id="3158" instrument_node="">
</span><b class="whb" data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Manipulate the reader but do not confuse them.</span></b><span data-dcnode-id="3155" instrument_node=""> Readers can either be confused or scared, but not both. Deceiving or manipulating your readers through foreshadowing, shifting character traits, or a revelation of a plot point can all work to build suspense and create anxiety or fear in the reader.</span><sup aria-label="Link to Reference 15" class="reference" data-dcnode-id="3139" id="_ref-15"><a data-dcnode-id="3153" href="#_note-15"><span data-dcnode-id="3154" instrument_node="">[15]</span></a><span class="ts_popup" data-dcnode-id="3141" hidden="" id="ts_popup_15" style="display: none;"><span data-dcnode-id="3152" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">X</span></span><span data-dcnode-id="3149" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Research source</span></span><span data-dcnode-id="3146" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3145"></span><span data-dcnode-id="3144" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3143" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3142" instrument_node="">
</span></span><span data-dcnode-id="3140" instrument_node="">
</span></sup><span data-dcnode-id="3138" instrument_node="">
</span><ul data-dcnode-id="3124"><span data-dcnode-id="3137" instrument_node="">
</span><li data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Hint at the horrific climax of the story by providing small clues or details, such as the label on a bottle that will later come in handy for the main character, a sound or voice in a room that will later become an indication of an unnatural presence, or even a loaded gun in a pillow that may later go off or be used by the main character.</span></li><span data-dcnode-id="3134" instrument_node="">
</span><li data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Build tension by alternating from tense or bizarre moments to quiet moments where your character can take a breath in a scene, calm down, and feel safe again. Then, amp up the tension by re-engaging the character in the conflict and then making the conflict feel even more serious or threatening.</span></li><span data-dcnode-id="3131" instrument_node="">
</span><li data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">In "The Moving Finger", King does this by having Howard freak out about the finger, then have a relatively normal conversation with his wife while listening to Jeopardy and thinking about the finger, and then attempt to avoid the finger by going for a walk. Howard begins to feel safe or assured that the finger is not real, but of course, once he opens the bathroom door, the finger seems to have grown longer and is moving much faster than it was before.</span></li><span data-dcnode-id="3128" instrument_node="">
</span><li data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">King slowly builds tension for both the character and the reader by introducing the threat and then having it overshadow the rest of the story. As readers, we know the finger is a sign of something bad or possibly evil, and are now in a position to watch Howard try to avoid, and then eventually confront this evil.</span></li><span data-dcnode-id="3125" instrument_node="">
</span></ul><span data-dcnode-id="3123" instrument_node="">
</span></div><span data-dcnode-id="3121" instrument_node="">
</span><div class="clearall" data-dcnode-id="3120"></div><span data-dcnode-id="3119" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="3118" data-isstep="1"></div><span data-dcnode-id="3117" instrument_node="">
</span></li><span data-dcnode-id="3115" instrument_node="">
</span><li data-dcnode-id="3047" id="step-id-315"><span data-dcnode-id="3114" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3113" name="step_4_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3093" style="max-width:728px"><a class="image" data-dcnode-id="3094" href="#/Image:Write-a-Horror-Story-Step-16-Version-2.jpg"><div class="content-spacer" data-dcnode-id="3102" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3108"><div class="loader" data-dcnode-id="3109"><div class="loader-dot" data-dcnode-id="3112"></div><div class="loader-dot" data-dcnode-id="3111"></div><div class="loader-dot" data-dcnode-id="3110"></div></div></div><span data-dcnode-id="3107" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="3106" data-height="345" data-src="https://www.wikihow.com/images/thumb/8/87/Write-a-Horror-Story-Step-16-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-16-Version-2.jpg" data-srclarge="/images/thumb/8/87/Write-a-Horror-Story-Step-16-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-16-Version-2.jpg" data-width="460" decoding="async" id="fe3879eef0220946254f7dd265e8b2ee" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/8/87/Write-a-Horror-Story-Step-16-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-16-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="3103" instrument_node="">
</span></div><span data-dcnode-id="3101" instrument_node="">
</span><noscript data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 16" src="https://www.wikihow.com/images/thumb/8/87/Write-a-Horror-Story-Step-16-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-16-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/8/87/Write-a-Horror-Story-Step-16-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-16-Version-2.jpg" data-width="460" data-height="345" id="fe3879eef0220946254f7dd265e8b2ee"&gt;</span></noscript><span data-dcnode-id="3098" instrument_node="">
</span><div class="image_details" data-dcnode-id="3095" style="display:none;"><span data-dcnode-id="3096" style="display:none;"><span data-dcnode-id="3097" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/8\/87\/Write-a-Horror-Story-Step-16-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-16-Version-2.jpg","bigUrl":"\/images\/thumb\/8\/87\/Write-a-Horror-Story-Step-16-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-16-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3092" instrument_node="">
</span><div class="step_num" data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">2</span></div><div class="step" data-dcnode-id="3053"><span data-dcnode-id="3089" instrument_node="">
</span><b class="whb" data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Add a twist ending.</span></b><span data-dcnode-id="3086" instrument_node=""> A good twist in a horror story can make or break the story, so its important to create a twist ending that ties up many of the loose ends in the character’s conflict but still leaves one major question up in the air to tease the reader’s imagination.
</span><ul data-dcnode-id="3055"><span data-dcnode-id="3085" instrument_node="">
</span><li data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">While you want to create a satisfying ending for the reader, you also do not want to make it so closed and settled that the reader walks away without a lingering feeling of uncertainty.</span></li><span data-dcnode-id="3082" instrument_node="">
</span><li data-dcnode-id="3063"><span data-dcnode-id="3081" instrument_node="">You could have the character experience a moment of realization about the conflict or about how to solve the conflict. The revelation should be the result of a build-up of details in the scene or story and should not be jarring or feel random to the reader.</span><sup aria-label="Link to Reference 16" class="reference" data-dcnode-id="3065" id="_ref-16"><a data-dcnode-id="3079" href="#_note-16"><span data-dcnode-id="3080" instrument_node="">[16]</span></a><span class="ts_popup" data-dcnode-id="3067" hidden="" id="ts_popup_16" style="display: none;"><span data-dcnode-id="3078" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">X</span></span><span data-dcnode-id="3075" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Research source</span></span><span data-dcnode-id="3072" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3071"></span><span data-dcnode-id="3070" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3069" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3068" instrument_node="">
</span></span><span data-dcnode-id="3066" instrument_node="">
</span></sup><span data-dcnode-id="3064" instrument_node="">
</span></li><span data-dcnode-id="3062" instrument_node="">
</span><li data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">In "The Moving Finger", Howard's moment of realization occurs when he figures out that the finger may be a signifier of an evil or wrong in the world. He asks the police officer, who is there to arrest him after noise complaints from the neighbors, a final Jeopardy question, in the category of the "inexplicable". "Why do terrible things sometimes happen to the nicest people?" Howard asks. The police officer then turns to open the toilet, where Howard stored the slaughtered finger, and "wagers it all" before opening the toilet seat to look at the inexplicable or unknown.</span></li><span data-dcnode-id="3059" instrument_node="">
</span><li data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">This ending leaves the reader wondering what the officer sees in the toilet, and if the finger was real or a figment of Howard's imagination. In this way, it is open-ended without being too surprising or confusing for the reader.</span></li><span data-dcnode-id="3056" instrument_node="">
</span></ul><span data-dcnode-id="3054" instrument_node="">
</span></div><span data-dcnode-id="3052" instrument_node="">
</span><div class="clearall" data-dcnode-id="3051"></div><span data-dcnode-id="3050" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="3049" data-isstep="1"></div><span data-dcnode-id="3048" instrument_node="">
</span></li><span data-dcnode-id="3046" instrument_node="">
</span><li data-dcnode-id="2941" id="step-id-316"><span data-dcnode-id="3045" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="3044" name="step_4_3"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="3024" style="max-width:728px"><a class="image" data-dcnode-id="3025" href="#/Image:Write-a-Horror-Story-Step-17-Version-2.jpg"><div class="content-spacer" data-dcnode-id="3033" style="padding-top:75%"><div class="loading-container" data-dcnode-id="3039"><div class="loader" data-dcnode-id="3040"><div class="loader-dot" data-dcnode-id="3043"></div><div class="loader-dot" data-dcnode-id="3042"></div><div class="loader-dot" data-dcnode-id="3041"></div></div></div><span data-dcnode-id="3038" instrument_node="">
