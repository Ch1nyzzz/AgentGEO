</span><noscript data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 17" src="https://www.wikihow.com/images/thumb/7/71/Write-a-Horror-Story-Step-17-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-17-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/7/71/Write-a-Horror-Story-Step-17-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-17-Version-2.jpg" data-width="460" data-height="345" id="bc4e9df72e9f06494efc6f7d799d44ae"&gt;</span></noscript><span data-dcnode-id="3029" instrument_node="">
</span><div class="image_details" data-dcnode-id="3026" style="display:none;"><span data-dcnode-id="3027" style="display:none;"><span data-dcnode-id="3028" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/7\/71\/Write-a-Horror-Story-Step-17-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-17-Version-2.jpg","bigUrl":"\/images\/thumb\/7\/71\/Write-a-Horror-Story-Step-17-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-17-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3023" instrument_node="">
</span><div class="step_num" data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">3</span></div><div class="step" data-dcnode-id="2953"><span data-dcnode-id="3020" instrument_node="">
</span><b class="whb" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Avoid cliches.</span></b><span data-dcnode-id="3017" instrument_node=""> Like any genre, horror has its own set of tropes and cliches that writers should avoid if they want to create a unique, engaging horror story. From familiar images like a deranged clown in the attic to a babysitter alone in a house at night, to familiar phrases like "Run!" or "Don’t look behind you!", cliches are tricky to avoid in this genre.</span><sup aria-label="Link to Reference 17" class="reference" data-dcnode-id="3001" id="_ref-17"><a data-dcnode-id="3015" href="#_note-17"><span data-dcnode-id="3016" instrument_node="">[17]</span></a><span class="ts_popup" data-dcnode-id="3003" hidden="" id="ts_popup_17" style="display: none;"><span data-dcnode-id="3014" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">X</span></span><span data-dcnode-id="3011" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Research source</span></span><span data-dcnode-id="3008" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3007"></span><span data-dcnode-id="3006" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3005" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3004" instrument_node="">
</span></span><span data-dcnode-id="3002" instrument_node="">
</span></sup><span data-dcnode-id="3000" instrument_node="">
</span><ul data-dcnode-id="2955"><span data-dcnode-id="2999" instrument_node="">
</span><li data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Focus on creating a story that feels personally terrifying to you. Or, add a twist to a familiar horror trope, like a vampire who enjoys cake instead of blood, or a man trapped in a dumpster rather than a coffin.</span></li><span data-dcnode-id="2996" instrument_node="">
</span><li data-dcnode-id="2977"><span data-dcnode-id="2995" instrument_node="">Remember that too much gore or violence can actually have a desensitizing effect on the reader, especially if the same pools of blood keep happening over and over again in the story. Of course, some gore is good and likely necessary in a horror story. But make sure you use gore in a spot in the story that is impactful or meaningful, so it can punch your reader in the gut, rather than numb them or bore them.</span><sup aria-label="Link to Reference 18" class="reference" data-dcnode-id="2979" id="_ref-18"><a data-dcnode-id="2993" href="#_note-18"><span data-dcnode-id="2994" instrument_node="">[18]</span></a><span class="ts_popup" data-dcnode-id="2981" hidden="" id="ts_popup_18" style="display: none;"><span data-dcnode-id="2992" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">X</span></span><span data-dcnode-id="2989" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Research source</span></span><span data-dcnode-id="2986" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2985"></span><span data-dcnode-id="2984" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2983" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2982" instrument_node="">
</span></span><span data-dcnode-id="2980" instrument_node="">
</span></sup><span data-dcnode-id="2978" instrument_node="">
</span></li><span data-dcnode-id="2976" instrument_node="">
</span><li data-dcnode-id="2957"><span data-dcnode-id="2975" instrument_node="">Another way you can avoid cliches is to focus more on creating a disturbed or unsettled state of mind for your character, rather than images of gore or pools of blood. Pictorial memories often don’t stick in a reader’s mind, but the effect of these images on a character will likely create a lingering creepiness for the reader. So aim not for your reader’s imagination but for a disturbance in your reader’s state of mind.</span><sup aria-label="Link to Reference 19" class="reference" data-dcnode-id="2959" id="_ref-19"><a data-dcnode-id="2973" href="#_note-19"><span data-dcnode-id="2974" instrument_node="">[19]</span></a><span class="ts_popup" data-dcnode-id="2961" hidden="" id="ts_popup_19" style="display: none;"><span data-dcnode-id="2972" instrument_node="">

</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="2899" data-height="345" data-src="https://www.wikihow.com/images/thumb/e/e2/Write-a-Horror-Story-Step-18-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-18-Version-2.jpg" data-srclarge="/images/thumb/e/e2/Write-a-Horror-Story-Step-18-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-18-Version-2.jpg" data-width="460" decoding="async" id="a70fca0f3be53037f6ab1b0ff5dbf237" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/e/e2/Write-a-Horror-Story-Step-18-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-18-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="2896" instrument_node="">
</span></div><span data-dcnode-id="2894" instrument_node="">
</span><noscript data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 18" src="https://www.wikihow.com/images/thumb/e/e2/Write-a-Horror-Story-Step-18-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-18-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/e/e2/Write-a-Horror-Story-Step-18-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-18-Version-2.jpg" data-width="460" data-height="345" id="a70fca0f3be53037f6ab1b0ff5dbf237"&gt;</span></noscript><span data-dcnode-id="2891" instrument_node="">
</span><div class="image_details" data-dcnode-id="2888" style="display:none;"><span data-dcnode-id="2889" style="display:none;"><span data-dcnode-id="2890" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/e\/e2\/Write-a-Horror-Story-Step-18-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-18-Version-2.jpg","bigUrl":"\/images\/thumb\/e\/e2\/Write-a-Horror-Story-Step-18-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-18-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2885" instrument_node="">
</span><div class="step_num" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">1</span></div><div class="step" data-dcnode-id="2869"><span data-dcnode-id="2882" instrument_node="">
</span><b class="whb" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Analyze your use of language.</span></b><span data-dcnode-id="2879" instrument_node=""> Go through the first draft of your story and look at sentences where you have duplicated adjectives, nouns or verbs. Maybe you have a preference for the adjective "red" to describe a dress or a pool of blood. But adjectives like "ruby, russet, crimson" can add texture to the language and turn a conventional phrase like "a red pool of blood" into a more interesting phrase, like "a crimson pool of blood."
</span><ul data-dcnode-id="2871"><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Get out your thesaurus and replace any redundant word use with synonyms to avoid using the same words or phrases over and over again in the story.</span></li><span data-dcnode-id="2875" instrument_node="">
</span><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Be sure to make your language use and word choice fit the voice of your character. A teenage girl will likely use different words or phrases than a middle-aged man. Creating a vocabulary for your character that fits their personality and perspective will only add to their believability as a character.</span></li><span data-dcnode-id="2872" instrument_node="">
</span></ul><span data-dcnode-id="2870" instrument_node="">
</span></div><span data-dcnode-id="2868" instrument_node="">

</span></li><span data-dcnode-id="2862" instrument_node="">
</span><li class="final_li" data-dcnode-id="2811" id="step-id-418"><span data-dcnode-id="2861" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2860" name="step_5_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2840" style="max-width:728px"><a class="image" data-dcnode-id="2841" href="#/Image:Write-a-Horror-Story-Step-19-Version-2.jpg"><div class="content-spacer" data-dcnode-id="2849" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2855"><div class="loader" data-dcnode-id="2856"><div class="loader-dot" data-dcnode-id="2859"></div><div class="loader-dot" data-dcnode-id="2858"></div><div class="loader-dot" data-dcnode-id="2857"></div></div></div><span data-dcnode-id="2854" instrument_node="">

</span><noscript data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">&lt;img alt="Image titled Write a Horror Story Step 19" src="https://www.wikihow.com/images/thumb/e/e7/Write-a-Horror-Story-Step-19-Version-2.jpg/v4-460px-Write-a-Horror-Story-Step-19-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/e/e7/Write-a-Horror-Story-Step-19-Version-2.jpg/aid139547-v4-728px-Write-a-Horror-Story-Step-19-Version-2.jpg" data-width="460" data-height="345" id="18155dd9ac52ca7d3b8aeecef536e459"&gt;</span></noscript><span data-dcnode-id="2845" instrument_node="">
</span><div class="image_details" data-dcnode-id="2842" style="display:none;"><span data-dcnode-id="2843" style="display:none;"><span data-dcnode-id="2844" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/e\/e7\/Write-a-Horror-Story-Step-19-Version-2.jpg\/v4-460px-Write-a-Horror-Story-Step-19-Version-2.jpg","bigUrl":"\/images\/thumb\/e\/e7\/Write-a-Horror-Story-Step-19-Version-2.jpg\/aid139547-v4-728px-Write-a-Horror-Story-Step-19-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2839" instrument_node="">
</span><div class="step_num" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">2</span></div><div class="step" data-dcnode-id="2823"><span data-dcnode-id="2836" instrument_node="">
</span><b class="whb" data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Read your story out loud.</span></b><span data-dcnode-id="2833" instrument_node=""> You can do this to a mirror or to a group of people you trust. Horror stories began as an oral tradition of spooking someone around a campfire, so reading your story out loud will help you determine if the pace of the story is building steadily and gradually, if there is enough shock, paranoia, or dread, and if your characters make all the wrong decisions until they are forced to confront the source of their conflict.
</span><ul data-dcnode-id="2825"><span data-dcnode-id="2832" instrument_node="">
</span><li data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">If your story is dialogue heavy, reading it out loud will also help you determine if the dialogue sounds believable and natural.</span></li><span data-dcnode-id="2829" instrument_node="">
</span><li data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">If your story contains a twist ending, gauging your reader’s reaction by watching your audience’s faces will help you determine if the ending is effective or needs more work.</span></li><span data-dcnode-id="2826" instrument_node="">
</span></ul><span data-dcnode-id="2824" instrument_node="">

</span><div class="qa_answer answer" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">
								Have plot twists everywhere! And then make that plot twist false, obliging the reader to want to know the real truth. Or, you could reveal the guilty one at the beginning, so that reader is like "I can't wait for him to die!", only to have some other twist added later, such as mistaken identity or a twin. Or, you can even foreshadow it little by little and when it's obvious, change it to something that will cancel out the hints to the "truth".

</span><a class="collapse_link" data-dcnode-id="1679" href="#summary_wrapper"><span data-dcnode-id="1682" id="summary_toc_heading_text"><span data-dcnode-id="1683" instrument_node="">Article Summary</span></span><span data-dcnode-id="1680" id="summary_close"><span data-dcnode-id="1681" instrument_node="">X</span></span></a><p class="text_summary_wrapper" data-dcnode-id="1674" id="summary_text"><span data-dcnode-id="1678" instrument_node="">One way to write a horror story is by brainstorming things or situations that scare you. Many horror writers choose to take a normal, everyday situation, and make it scary by adding unsettling characters or events. Once you have a setting or scenario, make a plot outline and add some detail to your characters, including their fears and goals. As you’re writing, imagine what kind of bad decisions or mistakes your characters could make to worsen the situation, rather than improve it. </span><span data-dcnode-id="1676" id="summary_last_sentence"><span data-dcnode-id="1677" instrument_node="">For tips on writing a riveting climax or adding a twist to your plot, keep reading!</span></span><span class="sumpos_bottom" data-dcnode-id="1675" id="summary_position"></span></p><div class="s-help-wrap" data-dcnode-id="1660" data-type="summarytexthelp"><span data-dcnode-id="1673" instrument_node="">
