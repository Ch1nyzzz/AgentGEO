</span></ul></div></nav><div class="site-inner" data-dcnode-id="533"><div class="content-sidebar-wrap" data-dcnode-id="534"><main class="content" data-dcnode-id="1860"><img alt="originality in writing | calder mobile" class="attachment-home-top size-home-top wp-post-image" data-dcnode-id="2848" data-lazy-type="image" data-src="https://writers.com/wp-content/uploads/2021/02/originality_calder_mobile-1-750x420.jpg" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/wp-content/uploads/2021/02/originality_calder_mobile-1-750x420.jpg&amp;raw" width="750"><noscript data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">&lt;img width="750" height="420" src="https://writers.com/wp-content/uploads/2021/02/originality_calder_mobile-1-750x420.jpg" class="attachment-home-top size-home-top wp-post-image" alt="originality in writing | calder mobile" /&gt;</span></noscript><article class="post-9075 post type-post status-publish format-standard has-post-thumbnail category-creative-nonfiction category-fiction category-novel category-short-story category-writing-tips entry" data-dcnode-id="2011"><header class="entry-header" data-dcnode-id="2829"><h1 class="entry-title" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">How to Write a Compelling Story</span></h1><span data-dcnode-id="2843" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2830"><time class="entry-time" data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">February 16, 2021</span></time><span data-dcnode-id="2840" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="2836"><a class="entry-author-link" data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/author/sean" rel="author"><span class="entry-author-name" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Sean Glatch</span></span></a></span><span data-dcnode-id="2835" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2832"><a data-dcnode-id="2833" href="#comments"><span data-dcnode-id="2834" instrument_node="">2 Comments</span></a></span><span data-dcnode-id="2831" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="2031"><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">What makes a story interesting? Hasn’t every original idea already been taken? Trying to write an interesting story seems impossible when so many books have been written, and if you’re at the start of your literary career (or trying to start your next book!), you might be daunted by the task of originality. In other words, how to write a story that is both compelling and original?</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Learning how to write an original short story will buoy your career to new waters; however, you don’t need an ivory tower education in writing to avoid being a copycat.</span></p><span data-dcnode-id="2823" instrument_node="">
</span><blockquote data-dcnode-id="2820"><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Let’s dispel a myth right away: nobody is 100% original.</span></p></blockquote><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2818" instrument_node="">Let’s dispel a little myth right away: nobody is 100% original. Writers have been sharing ideas and borrowing from each other since the dawn of language. In fact, this borrowing of ideas is well-documented: Dante’s </span><em data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Inferno </span></em><span data-dcnode-id="2815" instrument_node="">and Milton’s </span><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Paradise Lost</span></em><span data-dcnode-id="2812" instrument_node=""> reinterpret Biblical canon, just like William Golding </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//william-golding.co.uk/lord-flies-coral-island"><span data-dcnode-id="2811" instrument_node="">based</span></a><span data-dcnode-id="2809" instrument_node=""> </span><em data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Lord of the Flies</span></em><span data-dcnode-id="2806" instrument_node=""> off the children’s book </span><em data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">The Coral Island.</span></em></p><span data-dcnode-id="2802" instrument_node="">
</span><blockquote data-dcnode-id="2799"><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">If I have seen a little further it is by standing on the shoulders of Giants. —Isaac Newton</span></p></blockquote><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">So, what makes a compelling story, and how can writers ensure their originality of work? This article explores the nuances of authenticity, identifying basic story structures and exploring how to write a plot twist.</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">If you want to write an interesting story, you’ll need to start with the basics of plot and fiction writing. Let’s learn how to write a compelling story, with readings and exercises along the way!</span></p><span data-dcnode-id="2792" instrument_node="">
</span><div class="upcoming-events-shortcode" data-dcnode-id="2653"><h2 data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Check Out Our Fiction Writing Courses!</span></h2><span data-dcnode-id="2789" instrument_node="">

</span><h2 data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">The Paradox of Originality</span></h2><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2648" instrument_node="">Have you ever noticed odd similarities between two completely different fictional works? For example, </span><em data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Moana</span></em><span data-dcnode-id="2645" instrument_node=""> shares several plot points with </span><em data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Lord of the Rings</span></em><span data-dcnode-id="2642" instrument_node="">: both involve an eccentric mortal who comes into (regretful) ownership of a powerful relic. Through a series of unending hurdles—including dangerous raptor-like monsters, interfering deities, and/or wayfaring monsters—these heroes eventually return these relics to their origins, restoring some form of cosmic order to the world.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Does that make Moana derivative? Certainly not. Each plot has its own set of characters, antagonists, worldbuilding schemes, and audiences. Despite sharing similar plots, Moana shouldn’t be considered a ripoff of LOTR: one of them has Disney songs and cultural awareness, the other has an entirely artificial language and intensive worldbuilding.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">In other words, both stories are original, despite relying on unoriginal plot structures. What makes a story interesting if not a unique plot?</span></p><span data-dcnode-id="2634" instrument_node="">
</span><blockquote data-dcnode-id="2631"><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">A compelling story doesn’t rely on plot to be interesting, it relies on the elements of storytelling to make that plot interesting.</span></p></blockquote><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2629" instrument_node="">A compelling story doesn’t rely on plot to be interesting, it relies on the </span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/how-to-start-writing-fiction"><span data-dcnode-id="2628" instrument_node="">elements of storytelling</span></a><span data-dcnode-id="2626" instrument_node=""> </span><em data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">to make that plot interesting.</span></em><span data-dcnode-id="2623" instrument_node=""> Such is the Paradox of Originality: In order for us to tell new stories and generate exciting ideas, we must write stories that participate in the real world, using ideas and structures that have already been used. If no man is an island, then no artist is wholly original. However, our job isn’t to be wholly original. As artists, we seek to explore and expand the boundaries of the human experience; as writers, we explore that experience in words.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><h2 data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">6 Basic Plots for a Compelling Story</span></h2><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">If you reach back far enough to your 9th grade English classroom, you might remember three types of conflicts: man vs. man, man vs. nature, and man vs. self. This distinction is one way of parsing the basic plots of all stories—but not the only way.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2614" instrument_node="">As writers, we need solid frameworks to build from for our stories. The “man vs. thing” categories don’t give us much information about the plot. After all, </span><em data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Star Wars </span></em><span data-dcnode-id="2611" instrument_node="">and </span><em data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Hamilton</span></em><span data-dcnode-id="2608" instrument_node=""> both involve man vs. man conflict, but I’m struggling to find any other similarities between the two. To learn how to write a compelling story, we’ll need a better framework.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node="">So, scrap whatever categories you previously held for plots: a compelling story is sure to use one (or more) of the following frameworks. For convenience, each plot is diagrammed using </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/freytags-pyramid"><span data-dcnode-id="2604" instrument_node="">Freytag’s Pyramid</span></a><span data-dcnode-id="2602" instrument_node="">.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">This list of plots is not comprehensive, and writers should feel challenged to bend these structures for their own stories, but understanding these basic frameworks will help you master the art of story plotting. Use these plots to write an interesting story!</span></p><span data-dcnode-id="2597" instrument_node="">
</span><h3 data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">1. The Wayfarer</span></h3><span data-dcnode-id="2594" instrument_node="">
</span><h4 data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">A protagonist is lost (on a journey)</span></h4><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2590" instrument_node="">Will Odysseus return to his wife? Does Pi return to Pondicherry? Could Jane find a place to call home? In each of these stories (</span><em data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">The Odyssey, Life of Pi, Jane Eyre</span></em><span data-dcnode-id="2587" instrument_node="">), good people face unspeakable odds to return to the people they love, and the journeys they traverse seem endless.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2584" instrument_node="">In this compelling story plot, the protagonists decisions are based on a constant search for survival. Of course, “survival” can be metaphorical—the protagonist in Lisa Ko’s </span><em data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">The Leavers</span></em><span data-dcnode-id="2581" instrument_node=""> has little trouble staying alive, but his constant search for home and family presents its own kind of haunting journey.</span></p><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">In other words, these stories involve internal journeys of self-transformation, reflected through external journeys towards home or survival. Most stories involving a Lost Protagonist include the following:</span></p><span data-dcnode-id="2576" instrument_node="">
</span><ul data-dcnode-id="2546"><span data-dcnode-id="2575" instrument_node="">
</span><li data-dcnode-id="2568"><strong data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Exposition:</span></strong><span data-dcnode-id="2572" instrument_node=""> We often meet our protagonist before their life is changed forever. Sometimes the story begins </span><em data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">in media res</span></em><span data-dcnode-id="2569" instrument_node="">, but before long, the reader must know about the uncontrollable circumstances pushing the protag on a journey.</span></li><span data-dcnode-id="2567" instrument_node="">
</span><li data-dcnode-id="2563"><strong data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Rising Action:</span></strong><span data-dcnode-id="2564" instrument_node=""> Most of the journey takes place in the rising action. New characters may be introduced; we may also meet all of our characters in the exposition. More importantly, conflicts with other people within this journey escalate, often predicting or foreshadowing the climax.</span></li><span data-dcnode-id="2562" instrument_node="">
</span><li data-dcnode-id="2558"><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Climax:</span></strong><span data-dcnode-id="2559" instrument_node=""> The climax of each journey usually occurs when the protagonist is pushed to their limit—whether that limit is physical, spiritual, emotional, or professional.</span></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2553"><strong data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Falling Action:</span></strong><span data-dcnode-id="2554" instrument_node=""> What happens after the climax? Is the protagonist homebound, or doomed to be lost forever? The more suspense the reader feels, the better.</span></li><span data-dcnode-id="2552" instrument_node="">
</span><li data-dcnode-id="2548"><strong data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Resolution:</span></strong><span data-dcnode-id="2549" instrument_node=""> Not all stories about journeys have resolutions, but if the protagonist returns home or creates a new home, the reader might appreciate a comfortable ending. Show the protagonist coming to terms with their destination.</span></li><span data-dcnode-id="2547" instrument_node="">
</span></ul><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2544" instrument_node="">The Wayfarer Archetype prominently features in Bildungsromans and many adventure novels. Stories with prominent wayfarers are found in </span><em data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">The Count of Monte Cristo </span></em><span data-dcnode-id="2541" instrument_node="">by Alexandre Dumas, </span><em data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Don Quixote</span></em><span data-dcnode-id="2538" instrument_node=""> by Miguel de Cervantes, and </span><em data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Voltaire </span></em><span data-dcnode-id="2535" instrument_node="">by Candide.</span></p><span data-dcnode-id="2533" instrument_node="">
</span><h3 data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">2. The Escape Artist</span></h3><span data-dcnode-id="2530" instrument_node="">
</span><h4 data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">A protagonist is trapped</span></h4><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2526" instrument_node="">Some protagonists grow throughout the journey; others are trying to embark on one. In stories involving an “Escape Artist,” the reader becomes intimate with a character stuck in a trap. Sometimes that trap is a building, like the prison in </span><em data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">One Flew Over the Cuckoo’s Nest</span></em><span data-dcnode-id="2523" instrument_node="">. Other times, the trap is society or the government, much like Offred’s desire to escape Gilead in </span><em data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">A Handmaid’s Tale</span></em><span data-dcnode-id="2520" instrument_node="">.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">A compelling story about a trapped protagonist often includes the following:</span></p><span data-dcnode-id="2515" instrument_node="">
</span><ul data-dcnode-id="2470"><span data-dcnode-id="2514" instrument_node="">
</span><li data-dcnode-id="2510"><strong data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Exposition:</span></strong><span data-dcnode-id="2511" instrument_node=""> Much of the story’s opening dwells on the trap itself—society, prison, the self, etc. Our protagonist often colors this worldbuilding with their own feelings of entrapment, allowing the conflict to naturally unfold. Can our protagonist escape by the end of the story?</span></li><span data-dcnode-id="2509" instrument_node="">
</span><li data-dcnode-id="2502"><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Rising Action:</span></strong><span data-dcnode-id="2506" instrument_node=""> Of course, escaping from anything requires a lot of planning. Yet, the longer the protagonist waits to escape, the more complicated things get. The boys of </span><em data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Lord of the Flies</span></em><span data-dcnode-id="2503" instrument_node=""> set out in unison, but seeds of division quickly complicate the boys’ chances of leaving the island.</span></li><span data-dcnode-id="2501" instrument_node="">
</span><li data-dcnode-id="2488"><strong data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Climax:</span></strong><span data-dcnode-id="2498" instrument_node=""> The climax often begins the moment the protagonist leaves their prison, like when Bertha sets fire to her house in </span><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Wide Sargasso Sea</span></em><span data-dcnode-id="2495" instrument_node="">. However, the climax is sometimes a brief moment within the escape where the tension peaks. </span><em data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">The Handmaid’s Tale</span></em><span data-dcnode-id="2492" instrument_node=""> peaks when Offred enters the black van, and the reader ends wondering whether she escaped or is sent to her slaughter. This novel’s successor, </span><em data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">The Testaments</span></em><span data-dcnode-id="2489" instrument_node="">, reaches its climax on a river between Gilead and Canada. In any case, the climax is when the protagonist is put in the most danger, and their future is often decided in this moment.</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2477"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Falling Action:</span></strong><span data-dcnode-id="2484" instrument_node=""> In the case of both Atwood novels, the story ends at its climax. Indeed, there’s often little to tell once the protagonist exits their labyrinth, though the story doesn’t have to end here. In </span><em data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Persuasion</span></em><span data-dcnode-id="2481" instrument_node=""> by Jane Austin, we get to see Anne settle into a happy marriage after years of captivity to her family. We also get to see Dantes escape from prison in </span><em data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">The Count of Monte Cristo</span></em><span data-dcnode-id="2478" instrument_node="">, though in this case, the years after prison are the story’s rising action.</span></li><span data-dcnode-id="2476" instrument_node="">
</span><li data-dcnode-id="2472"><strong data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Resolution:</span></strong><span data-dcnode-id="2473" instrument_node=""> If falling action is rare in stories about the escape artist, a resolution is even rarer. But, if it’s important for the reader to know where the protagonist ends up, the resolution will likely stay brief and concise.</span></li><span data-dcnode-id="2471" instrument_node="">
</span></ul><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2468" instrument_node="">The Escape Artist also performs in </span><em data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Brave New World</span></em><span data-dcnode-id="2465" instrument_node=""> by Aldous Huxley and </span><em data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">A Tale of Two Cities</span></em><span data-dcnode-id="2462" instrument_node=""> by Charles Dickens. In addition to classics, this story structure shows up a lot in contemporary fantasy, sci-fi, and mystery/suspense novels, though it just as often comprises the whole story as it does a minor facet of one.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><h3 data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">3. The Justice Seeker</span></h3><span data-dcnode-id="2457" instrument_node="">
</span><h4 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">A protagonist searches for vindication</span></h4><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Justice sits at the heart of many stories, both classic and contemporary. What constitutes fairness? Is vengeance moral? Do just people receive just rewards? Such are the quandaries—and, thus, the climaxes—of this compelling story archetype.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">The Search for Justice includes the following:</span></p><span data-dcnode-id="2448" instrument_node="">
</span><ul data-dcnode-id="2400"><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2443"><strong data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Exposition:</span></strong><span data-dcnode-id="2444" instrument_node=""> For a story about justice to be just, the reader needs to see all sides of the story. Thus, the exposition involves a lot of scene and character building.</span></li><span data-dcnode-id="2442" instrument_node="">
</span><li data-dcnode-id="2432"><strong data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Rising Action:</span></strong><span data-dcnode-id="2439" instrument_node=""> The rising action starts when injustice occurs or is realized. In Ray Bradbury’s </span><em data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Fahrenheit 451</span></em><span data-dcnode-id="2436" instrument_node="">, the rising action begins when Guy Montag starts questioning his values; around the same time, his wife overdoses and new neighbor goes missing. More recently, the novel </span><em data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Power</span></em><span data-dcnode-id="2433" instrument_node=""> by Linda Hogan picks up when Ama Eaton kills a panther. After one (or several) instances of injustice, each character seeks retribution, vengeance, or some other form of “righting the wrong.”</span></li><span data-dcnode-id="2431" instrument_node="">
</span><li data-dcnode-id="2424"><strong data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Climax:</span></strong><span data-dcnode-id="2428" instrument_node=""> The climax occurs around a sentencing of justice, and sometimes includes the immediate fallout from this decision. </span><em data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">To Kill a Mockingbird</span></em><span data-dcnode-id="2425" instrument_node=""> is a classic example of the justice narrative. Tom Robinson’s conviction and subsequent murder shake Jem Finch’s trust in the justice system, forcing the reader to consider the many fractures in America’s broken courts.</span></li><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2413"><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Falling Action:</span></strong><span data-dcnode-id="2420" instrument_node=""> Often, the story’s climax abandons justice, while the falling action restores it. Boo Radley kills Bob Ewell in </span><em data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">TKAM</span></em><span data-dcnode-id="2417" instrument_node="">’s falling action; alternately, Milkman finds the beauty of life in the falling action of Toni Morrison’s </span><em data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Song of Solomon</span></em><span data-dcnode-id="2414" instrument_node="">, though he also (maybe) dies at the end.</span></li><span data-dcnode-id="2412" instrument_node="">
</span><li data-dcnode-id="2402"><strong data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Resolution:</span></strong><span data-dcnode-id="2409" instrument_node=""> Did our hero pave the road towards a more just world? Or do they ultimately give up? Often, neither: it seems rare for a story about justice to end unambiguously. The search for justice is ultimately squashed in George Orwell’s </span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">1984</span></em><span data-dcnode-id="2406" instrument_node="">, as Winston’s story ends when he decides to love Big Brother; yet, Carton seems to find justice in </span><em data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">A Tale of Two Cities</span></em><span data-dcnode-id="2403" instrument_node=""> by dying for Lucie.</span></li><span data-dcnode-id="2401" instrument_node="">
</span></ul><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2398" instrument_node="">The search for justice takes place across dystopias, historical novels, and both classic and contemporary fiction. Any of the aforementioned novels offer great examples of justice seeking; this plot also features in novels like </span><em data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">The Mandarins </span></em><span data-dcnode-id="2395" instrument_node="">by Simone de Beauvoir, </span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Half of a Yellow Sun </span></em><span data-dcnode-id="2392" instrument_node="">by Chimamanda Ngozi Adichie, and virtually any novel in the </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_literature%23Golden_Age"><span data-dcnode-id="2391" instrument_node="">Golden Age</span></a><span data-dcnode-id="2389" instrument_node=""> of Russian Literature.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><h3 data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">4. The New Neighbor</span></h3><span data-dcnode-id="2384" instrument_node="">
</span><h4 data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">A protagonist encounters a stranger</span></h4><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2380" instrument_node="">While researching how to write a compelling story, you may have encountered the quote “there are two plots: a person goes on a journey and a stranger comes into town.” This story plot involves the stranger, who certainly deserves their own plot. After all, there are about 8 billion people in this world that neither you nor myself have met. Any one of those people could be the catalyst for dramatic new changes in our lives—positive </span><em data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">and </span></em><span data-dcnode-id="2377" instrument_node="">negative. Isn’t that exciting?</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">In most novels, the protagonist ends up meeting new people, but when this new person triggers a journey of growth, the story often follows the plot of a New Neighbor. New Neighbor plots have the following structure:</span></p><span data-dcnode-id="2372" instrument_node="">
</span><ul data-dcnode-id="2321"><span data-dcnode-id="2371" instrument_node="">
</span><li data-dcnode-id="2361"><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Exposition:</span></strong><span data-dcnode-id="2368" instrument_node=""> Before someone new shakes the protagonist’s life, we first need to know what life is like. The exposition focuses briefly on daily life, including any essential worldbuilding and basic characterization. Leo Tolstoy’s </span><em data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Anna Karenina</span></em><span data-dcnode-id="2365" instrument_node=""> shows us upper class Russia before Anna even enters the story; conversely, Nick Carraway is both the narrator and the stranger of </span><em data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">The Great Gatsby</span></em><span data-dcnode-id="2362" instrument_node="">, so his exposition explores the world of New York’s 1920s socialites as he enters it.</span></li><span data-dcnode-id="2360" instrument_node="">
</span><li data-dcnode-id="2353"><strong data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Rising Action:</span></strong><span data-dcnode-id="2357" instrument_node=""> The appearance of someone new is the catalyst for the story’s main events. In John Steinbeck’s </span><em data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">The Winter of Our Discontent</span></em><span data-dcnode-id="2354" instrument_node="">, a stranger offers Ethan Hawley a lucrative (but illegal) opportunity. Though Ethan declines, the opportunity sparks something in his subconscious: a ruthless desire to rebuild his family name.</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2339"><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Climax:</span></strong><span data-dcnode-id="2349" instrument_node=""> The climax doesn’t always involve the stranger who comes into town; sometimes, the stranger merely incites a series of events, as in </span><em data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">The Winter of Our Discontent,</span></em><span data-dcnode-id="2346" instrument_node=""> or Charles Dickens’ </span><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">A Christmas Carol</span></em><span data-dcnode-id="2343" instrument_node="">. Much more often, that stranger is the story’s focus, like in the climax of Margaret Atwood’s </span><em data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">The Blind Assassin. </span></em><span data-dcnode-id="2340" instrument_node="">Alex Thomas is both the catalyst for the story’s rising action and a focus of the climax, and his presence stokes tension through the story’s many winding roads.</span></li><span data-dcnode-id="2338" instrument_node="">
</span><li data-dcnode-id="2328"><strong data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Falling Action:</span></strong><span data-dcnode-id="2335" instrument_node=""> The falling action usually dwells on the aftermath of the relationship between the protagonist and the stranger. Will they part forever, like Selin and Ivan in Elif Batuman’s </span><em data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">The Idiot</span></em><span data-dcnode-id="2332" instrument_node="">? Do they die together, like Romeo &amp; Juliet? Can they stay in each other’s lives, as in Anne Bronte’s </span><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">The Tenant of Wildfell Hall</span></em><span data-dcnode-id="2329" instrument_node="">? Otherwise, if the stranger is merely a catalyst, the falling action examines the aftermath of the climax.</span></li><span data-dcnode-id="2327" instrument_node="">
</span><li data-dcnode-id="2323"><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Resolution:</span></strong><span data-dcnode-id="2324" instrument_node=""> The resolution wraps up loose ends that might remain untied after the falling action.</span></li><span data-dcnode-id="2322" instrument_node="">
</span></ul><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2319" instrument_node="">The New Neighbor plot features prominently in romance and suspense novels. Who can resist the mystery of a stranger? In classic and contemporary fiction, this plot features in stories like </span><em data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Fahrenheit 451</span></em><span data-dcnode-id="2316" instrument_node=""> by Ray Bradbury, </span><em data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Waiting for Godot</span></em><span data-dcnode-id="2313" instrument_node=""> by Samuel Beckett, and </span><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">The Devil Wears Prada</span></em><span data-dcnode-id="2310" instrument_node=""> by Lauren Weisberger (and adapted for screenplay by Aline Brosh McKenna).</span></p><span data-dcnode-id="2308" instrument_node="">
</span><h3 data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">5. The Deadline Pusher</span></h3><span data-dcnode-id="2305" instrument_node="">
</span><h4 data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">A protagonist is running out of time</span></h4><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2301" instrument_node="">Many of the stories we’ve mentioned include a race against time. In some instances, like Atwood’s </span><em data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">The Blind Assassin </span></em><span data-dcnode-id="2298" instrument_node="">or </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">The Testaments</span></em><span data-dcnode-id="2295" instrument_node="">, this “race” is the narrator’s desire to finish the story before she dies.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">However, this plot can also be the primary focus of the novel, setting up the story for powerful examinations of time and man’s relationship to time. After all, suspense is often what makes a story interesting, so this plot structure is inherently suspenseful.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">A compelling story with a “Deadline Pusher” often follows this structure:</span></p><span data-dcnode-id="2287" instrument_node="">
</span><ul data-dcnode-id="2242"><span data-dcnode-id="2286" instrument_node="">
</span><li data-dcnode-id="2282"><strong data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Exposition:</span></strong><span data-dcnode-id="2283" instrument_node=""> The exposition should lay the groundwork for the rising action. What kind of “deadline” would upend normal life? What does normal life look like for the protagonist(s)?</span></li><span data-dcnode-id="2281" instrument_node="">
</span><li data-dcnode-id="2268"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Rising Action:</span></strong><span data-dcnode-id="2278" instrument_node=""> A deadline is usually the start of the story’s rising action. “Deadline” can mean many different things. We’ve already mentioned narrators with only a few months to live, but it can also be a race against a wedding (as in </span><em data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Romeo &amp; Juliet </span></em><span data-dcnode-id="2275" instrument_node="">and some romance novels), a race to survive (like the sisters running out of food in Jean Heglund’s </span><em data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Into the Forest</span></em><span data-dcnode-id="2272" instrument_node="">), or a race before a killer finds another victim (as repeatedly happens in Agatha Christie’s </span><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">And Then There Were None</span></em><span data-dcnode-id="2269" instrument_node="">).</span></li><span data-dcnode-id="2267" instrument_node="">
</span><li data-dcnode-id="2260"><strong data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Climax:</span></strong><span data-dcnode-id="2264" instrument_node=""> You would think that the climax coincides with the deadline, but that’s not always the case. The climax should be the decisive moment of the story, so many novels situate their climax around the protagonist’s chance for success. H. G. Wells’ </span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">The War of the Worlds</span></em><span data-dcnode-id="2261" instrument_node=""> has an implicit deadline: defeat the aliens before they defeat us. Yet, the climax of the story is when the aliens commit the most destruction, not when the humans win the war. (After all, the humans win because the Martians can’t survive on Earth’s conditions, so the ending is rather anti-climactic.)</span></li><span data-dcnode-id="2259" instrument_node="">
</span><li data-dcnode-id="2252"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Falling Action:</span></strong><span data-dcnode-id="2256" instrument_node=""> If the story explores what happens past the climax, the falling action usually ties up loose ends. What happens next if the deadline is met? What’s next if it isn’t? For example, in Haruki Murakami’s </span><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Hard-Boiled Wonderland at the End of the World</span></em><span data-dcnode-id="2253" instrument_node="">, the climax occurs when the protagonist realizes he can’t prevent his upcoming death, and the falling action is his acceptance of this truth.</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2244"><strong data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Resolution:</span></strong><span data-dcnode-id="2248" instrument_node=""> Like the falling action, the resolution ties up loose ends. In Murakami’s </span><em data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">A Wild Sheep Chase</span></em><span data-dcnode-id="2245" instrument_node="">, the protagonist confronts his own past after finding the mysterious sheep with a star in its pelt.</span></li><span data-dcnode-id="2243" instrument_node="">
</span></ul><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Mystery and suspense novels often use the race against time, as do works of political and historical fiction.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><h3 data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">6. The Thinker</span></h3><span data-dcnode-id="2235" instrument_node="">
</span><h4 data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">A protagonist marvels and despairs at the world</span></h4><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">This last class of compelling story plots is a bit overarching, and there isn’t a good set of examples that fit into Freytag’s Pyramid. The Thinker refers to stories about people who don’t do much but observe a lot about their world. The story often mixes exposition and description with characterization and worldbuilding, and the story’s climax, if it exists, consists of emotional or philosophical revelations in the protagonist’s thoughts.</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">Such is the nature of Samuel Beckett’s </span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Waiting for Godot</span></em><span data-dcnode-id="2225" instrument_node="">. Vladimir and Estragon don’t do much in the story; they simply wait and talk about their lives, their issues, and Godot—a mysterious figure who never arrives. Despite the simplicity of this anti-climactic plot, </span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Waiting for Godot</span></em><span data-dcnode-id="2222" instrument_node=""> houses a number of different interpretations, from being an allegory of the Cold War to being a postmodernist reminiscence of the nothingness of life.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2219" instrument_node="">Haruki Murakami also employs “Thinkers” in a variety of his novels. Murakami’s work bends the genres of magical realism, Eastern folklore, and literary fiction </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">precisely</span></em><span data-dcnode-id="2216" instrument_node=""> because of his pensive protagonists. In </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Kafka on the Shore</span></em><span data-dcnode-id="2213" instrument_node="">, the main story involves a boy running away from home and an old man who searches for cats; yet the story’s puzzles, solutions, and many meanings occur in the twin protagonists’ introspections.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2210" instrument_node="">Thinkers are often what makes a story interesting, though they’re best for long, decades-spanning novels. Though Theo goes through many challenges in Donna Tartt’s </span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">The Goldfinch</span></em><span data-dcnode-id="2207" instrument_node="">—including drug addiction, art theft, and antiques forgery—the novel’s plot intends to capture a slice of the contemporary American experience. Theo’s incredible depth and harrowing wit provide the melody to this musical and introspective story, as do the Thinkers of </span><em data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Wuthering Heights</span></em><span data-dcnode-id="2204" instrument_node=""> by Emily Bronte, </span><em data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Ulysses </span></em><span data-dcnode-id="2201" instrument_node="">by James Joyce, and </span><em data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Siddhartha </span></em><span data-dcnode-id="2198" instrument_node="">by Herman Hesse.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><h2 data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">How to Write a Plot Twist: 6 Curveballs for Any Compelling Story</span></h2><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">A plot twist is when the story takes a turn that couldn’t be predicted, like when the aliens get sick in </span><em data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">War of the Worlds</span></em><span data-dcnode-id="2189" instrument_node="">, or when Darth Vader reveals that he’s Luke’s father in Star Wars.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Let’s get something out of the way: interesting stories do not need plot twists. Often times, a plot twist can ruin the reader’s experience of the story, especially if it ruins the story’s momentum or if it feels like a lazy ending. Knowing how to write a good story plot means knowing when to surprise your reader, and when to let the story finish itself.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Still, learning how to write a plot twist can come in handy, especially if you’re hitting a roadblock on where to take your story. The following 6 ideas are plot twists to help you break the mold of your own story. You will most likely use these twists at your story’s climax, but think of these plot twists as different frameworks for approaching your story plot, and take these ideas how you like in your own works of fiction.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><ol data-dcnode-id="2128"><span data-dcnode-id="2180" instrument_node="">
</span><li data-dcnode-id="2173"><strong data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Disrupt a Binary</span></strong><span data-dcnode-id="2177" instrument_node="">. Your story might be setting the climax up for one of two endings. If you tease these two possibilities, you can successfully twist the story by writing a third, unexpected ending. For example, in </span><em data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Romeo &amp; Juliet</span></em><span data-dcnode-id="2174" instrument_node="">, the play’s characters expect the couple to either be married forever or be separated forever. Neither happens; the two star-crossed lovers die and are buried together, ironically concluding their tragic story.</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2165"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Shift the Point of View</span></strong><span data-dcnode-id="2169" instrument_node="">. Playing with the story’s frame of reference can provide chilling moments of introspection and worldbuilding. Such is the case in Mary Shelley’s </span><em data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Frankenstein</span></em><span data-dcnode-id="2166" instrument_node="">. The third part of the story is told from the monster’s perspective; at the time, this was a huge literary gamble, as very few books have been told from the vantage of unwanted monsters. This gamble was highly successful for Shelley, who humanized the monster and questioned man’s right to “Play God.”</span></li><span data-dcnode-id="2164" instrument_node="">
</span><li data-dcnode-id="2157"><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Offer an Ironic Revelation</span></strong><span data-dcnode-id="2161" instrument_node="">. If your plot twist is “out of left field,” so to speak, then making the plot twist ironic might make the story even better. In Guy de Maupassant’s </span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">The Necklace</span></em><span data-dcnode-id="2158" instrument_node="">, the plot twist occurs at the end when Mathilde finds out her original necklace was a fake, and not at all worth as much as she despaired.</span></li><span data-dcnode-id="2156" instrument_node="">
</span><li data-dcnode-id="2146"><strong data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Bring an Option Back</span></strong><span data-dcnode-id="2153" instrument_node="">. Original readers of </span><em data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Jane Eyre</span></em><span data-dcnode-id="2150" instrument_node=""> would never have expected the novel’s ending. One would think that Jane had walked out on Rochester forever—after all, he </span><em data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">did</span></em><span data-dcnode-id="2147" instrument_node=""> lie about his past marriage, toying Jane on while hiding his wife in the attic. Nonetheless, Jane’s return to Rochester completes her quest for home, surprising and satisfying the reader.</span></li><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2138"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Surprise the Protagonist</span></strong><span data-dcnode-id="2142" instrument_node="">. Sometimes, a protagonist is shocked by their own actions. In </span><em data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Half of a Yellow Sun</span></em><span data-dcnode-id="2139" instrument_node="">, nobody expects Ugwu to commit war crimes—least of all Ugwu himself—yet his abduction by the Biafran army and loss-of-faith in the world results in the village’s gentlest citizen committing a horrific act of violence.</span></li><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2130"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Write a Second, Unexpected Climax</span></strong><span data-dcnode-id="2134" instrument_node="">. A reader might expect </span><em data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">To Kill a Mockingbird</span></em><span data-dcnode-id="2131" instrument_node=""> to reach its peak when Tom Robinson is killed. Yet, shortly after this, Bob Ewell attacks Jem and Scout, since their father disgraced the Ewell name for the rest of Bob’s life. This unexpected aftermath results in a second climax, offering the reader much to think about justice and social inequality.</span></li><span data-dcnode-id="2129" instrument_node="">
</span></ol><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Lastly, it’s important that you never try to trick your reader. The reader enters a story with trust that the author has written something enriching and meaningful. Learning how to write a plot twist means learning when to surprise the reader; don’t twist the narrative with something lazy or gimmicky, twist the narrative with something that deepens the story altogether.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><h2 data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Write an Interesting Story with Writers.com</span></h2><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">What does every compelling story in this article share with one another? It’s not the use of plot twists, rigid structures, or original storylines; rather, each story has an authentic voice and a startling vision. Readers of these classic and contemporary novels marvel at each work’s surprising relationship to reality. To write an interesting story, you need merely stare truth in the face, then write about it mercilessly.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">If you’re stuck making a compelling story come to life, the instructors at Writers.com are here to guide you. Learn how to write a good story plot with us! Take a look at our </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writers.com/online-fiction-writing-courses"><span data-dcnode-id="2116" instrument_node="">upcoming fiction courses</span></a><span data-dcnode-id="2114" instrument_node="">, taught by masters of the plotting and writing craft.</span></p><span data-dcnode-id="2112" instrument_node="">
