</span><article class="et_pb_post post-318056 post type-post status-publish format-standard has-post-thumbnail hentry category-genre-and-structure" data-dcnode-id="696" id="post-318056"><span data-dcnode-id="1915" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="1900"><span data-dcnode-id="1914" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Genre Conventions: How to Satisfy Suspense Readers by Meeting Expectations</span></h1><span data-dcnode-id="1911" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1902"><span data-dcnode-id="1910" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1907"><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/author/joslynchase1outlook-com/" rel="author" title="Posts by Joslyn Chase"><span data-dcnode-id="1909" instrument_node="">Joslyn Chase</span></a></span><span data-dcnode-id="1906" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="1903"><a data-dcnode-id="1904" data-disqus-identifier="318056 https://thewritepractice.com/?p=318056" href="#disqus_thread"><span data-dcnode-id="1905" instrument_node="">2 Comments</span></a></span></p><span data-dcnode-id="1901" instrument_node="">
</span></div><span data-dcnode-id="1899" instrument_node="">
</span><div class="entry-content" data-dcnode-id="771"><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">When you sit down with a book, are you hoping for a particular type of story experience? This is a common desire, since readers—know it or not—are drawn towards specific genres and genre conventions.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1885"><span class="novashare-pinterest-image" data-dcnode-id="1886"><img alt="genre conventions" class="aligncenter wp-image-318114 size-full entered error" data-dcnode-id="1894" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" data-lazy-src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png" data-lazy-srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions-480x369.png 480w" data-ll-status="error" height="500" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qy7s3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png&amp;raw" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions-480x369.png 480w" width="650"><noscript data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">&lt;img class="aligncenter wp-image-318114 size-full" src="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png" alt="genre conventions" width="650" height="500" srcset="https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions.png 650w, https://QY7S3400-a.akamaihd.net/wp-content/uploads/2021/12/genre-conventions-480x369.png 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 650px, 100vw" /&gt;</span></noscript><span class="novashare-pinterest-image-button" data-dcnode-id="1887" data-novashare-href="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fthewritepractice.com%2Fgenre-conventions%2F%3Futm_source%3Dpinterest%26utm_medium%3Dsocial%26utm_campaign%3Dnovashare&amp;media=https://thewritepractice.com/wp-content/uploads/2021/12/genre-conventions.png&amp;description=Genre%20Conventions%3A%20How%20to%20Satisfy%20Suspense%20Readers%20by%20Meeting%20Expectations" rel="nofollow noopener noreferrer"><svg data-dcnode-id="1890" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M204 6.5C101.4 6.5 0 74.9 0 185.6 0 256 39.6 296 63.6 296c9.9 0 15.6-27.6 15.6-35.4 0-9.3-23.7-29.1-23.7-67.8 0-80.4 61.2-137.4 140.4-137.4 68.1 0 118.5 38.7 118.5 109.8 0 53.1-21.3 152.7-90.3 152.7-24.9 0-46.2-18-46.2-43.8 0-37.8 26.4-74.4 26.4-113.4 0-66.2-93.9-54.2-93.9 25.8 0 16.8 2.1 35.4 9.6 50.7-13.8 59.4-42 147.9-42 209.1 0 18.9 2.7 37.5 4.5 56.4 3.4 3.8 1.7 3.4 6.9 1.5 50.4-69 48.6-82.5 71.4-172.8 12.3 23.4 44.1 36 69.3 36 106.2 0 153.9-103.5 153.9-196.8C384 71.3 298.2 6.5 204 6.5z" data-dcnode-id="1891" fill="currentColor"></path></svg><span data-dcnode-id="1888" style="margin-left: 4px;"><span data-dcnode-id="1889" instrument_node="">Pin</span></span></span></span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">From a writer’s perspective, knowing these genre “flavors” and how to create them to satisfy reader expectations is key to writing stories that will keep readers coming back.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">In addition, understanding the genre conventions and obligatory scenes helps you push yourself farther and reach higher to innovate and twist what’s been done before, astonishing readers . . . and even yourself!</span></p><span data-dcnode-id="1878" instrument_node="">
</span><h2 data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">How to Write for Suspense Genres</span></h2><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Something amazing has happened to me in my writing so many times that I’ve come to expect it rather than be surprised by it. It’s this:</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">I’ve planned, plotted, and written most of my story and I’m nearing the finish line. I have a pretty solid idea about how the story is going to end, but I let my mind wander a bit and a new twist for the finale leaps into view. Usually, all it requires is a few tweaks in the previously written parts to set it up, and I’ve added a whole dimension to the story.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Thriller readers expect an extra twist like this before the story’s conclusion. A false ending is one of the genre’s obligatory scenes. If I leave the false ending out of my thriller, I leave readers unsatisfied at the end of my book and they may not even realize why.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">They simply won’t move on to my next book, and I’ve lost a reader. I never want that to happen. And you don’t, either.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">So, let’s dig into what readers are looking for when they pick up a book in the suspense genres.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1852"><em data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Note:&nbsp;I’ve drawn a large portion of this information from Shawn Coyne, author of </span></em><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/books/"><span data-dcnode-id="1857" instrument_node="">The Story Grid: What Good Editors Know</span></a><em data-dcnode-id="1853"><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/books/"><span data-dcnode-id="1855" instrument_node="">.&nbsp;&nbsp;</span></a></em></p><span data-dcnode-id="1851" instrument_node="">
</span><h2 data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Mystery Genre Emotions</span></h2><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">According to Shawn Coyne, the core emotion readers want to feel—the reason they make mysteries and crime stories their choice of genre—is </span><em data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">intrigue</span></em><span data-dcnode-id="1844" instrument_node="">. They want to be challenged with a stimulating puzzle and get a chance to solve it while exploring the lives and relationships of engaging characters in interesting settings.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">The puzzle usually involves at least one murder, which can also evoke feelings of fear and concern for the characters. And the story’s resolution should bring a feeling of fulfillment or surprise, as well as a pleasurable release of tension when the criminal is brought to justice.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">If the mystery is not a “whodunit” murder, but instead a caper or heist, the reader may cheer for the perpetrators and feel anxiety over whether they’ll get away with it or not.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1835" instrument_node="">You can help generate these emotions for your mystery readers by </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sympathetic-character/"><span data-dcnode-id="1834" instrument_node="">creating characters they can care about</span></a><span data-dcnode-id="1832" instrument_node="">. It’s also critical to design an intriguing puzzle with </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/mystery-clues/"><span data-dcnode-id="1831" instrument_node="">clues and red herrings</span></a><span data-dcnode-id="1829" instrument_node="">, delivering all the </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sequence-of-events-in-a-story/"><span data-dcnode-id="1828" instrument_node="">information in the right order</span></a><span data-dcnode-id="1826" instrument_node=""> for readers to solve the case or experience the story along with the </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/point-of-view-guide/"><span data-dcnode-id="1825" instrument_node="">viewpoint character</span></a><span data-dcnode-id="1823" instrument_node="">.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1815"><div class="share-quote-quote" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node=""> Mystery stories are about figuring out a puzzle. This article teaches the genre conventions you need to nail in order to do this well. </span></div></div><div class="share-quote-shares" data-dcnode-id="1809"><div class="share-quote-shares-block" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1810"><a class="share-quote-twitter" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/genre-conventions/%26text%3D%2520Mystery%2520stories%2520are%2520about%2520figuring%2520out%2520a%2520puzzle.%2520This%2520article%2520teaches%2520the%2520genre%2520conventions%2520you%2520need%2520to%2520nail%2520in%2520order%2520to%2520do%2520this%2520well.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1812" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1808" instrument_node="">
</span><h2 data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Mystery Genre Conventions</span></h2><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">A genre convention is something readers expect to find in a story from a particular genre. If the element doesn’t make an appearance in the story, readers will be disappointed without really understanding why, so it’s important to include these conventions in your mystery story.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><h3 data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The MacGuffin</span></h3><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1798" instrument_node="">The MacGuffin in a mystery is something pursued by the characters, the </span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/objects-of-desire/"><span data-dcnode-id="1797" instrument_node="">Object of Desire</span></a><span data-dcnode-id="1795" instrument_node="">, and it drives the story forward as the pursuit unfolds. It can be something tangible, like treasure or a coded message—an example is the </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Maltese Falcon </span></em><span data-dcnode-id="1792" instrument_node="">in the story by that name. Or it might be something intangible, such as secret knowledge or proof of innocence, like Roger Thornhill’s quest in </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">North By Northwest</span></em><span data-dcnode-id="1789" instrument_node="">.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">In a murder mystery, the MacGuffin is most often the solution to the crime.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><h3 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Clues and Red Herrings</span></h3><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1780" instrument_node="">These are the pieces of information gained by the sleuth that send them along a line of investigation. Clues, if interpreted correctly, lead to the solution while red herrings lead to dead ends or false conclusions. For more information about clues and red herrings and how to create and plant them in your story, check out my </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/mystery-clues/"><span data-dcnode-id="1779" instrument_node="">Ultimate Guide to Clues and Red Herrings</span></a><span data-dcnode-id="1777" instrument_node="">.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><h3 data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Antagonist making it personal</span></h3><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">As the protagonist sleuth gets closer to the truth, the more uncomfortable the criminal becomes until, at some point, the antagonist makes it personal. This can mean anything from interfering in the investigation and planting false clues to mislead the protagonist, to attempting to “bump off” the protagonist altogether.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><h3 data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">A shapeshifter</span></h3><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Someone, somewhere along the line, is exposed as a shapeshifter, hypocrite, or traitor. This is a secondary character who says one thing and does another, impacting the protagonist’s progress in solving the puzzle.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">The betrayal doesn’t have to be momentous, and the shift involved doesn’t have to be for the worse. An apparent enemy can prove to be an ally, for instance.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><h3 data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">A clock</span></h3><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">While a mystery doesn’t apply the same kind of time pressure as a Thriller, without some kind of a clock moving it forward, the story can drift and get flabby. Limiting time is an effective way to keep a mystery story fresh, active, and moving toward a resolution. It’s something readers and writers alike have come to depend upon in the mystery genre.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><h3 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Clear threat of escalating danger</span></h3><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node="">This danger does not have to be physical. It can imperil the sleuth’s credibility, sanity, or dignity.&nbsp; Or the threat may impact something else significant. This escalating threat </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/raise-the-stakes/"><span data-dcnode-id="1749" instrument_node="">raises the stakes</span></a><span data-dcnode-id="1747" instrument_node="">, keeps the reader emotionally involved, and helps drive the story forward.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1744" instrument_node="">These six conventions of the crime genre, which includes mystery, are set forth by editor Rachelle Ramirez in her article, </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rachelleramirez.com/how-to-write-a-crime-story/"><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">How to Write a Crime Story</span></em></a><span data-dcnode-id="1740" instrument_node="">.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Let’s move on now to the obligatory scenes.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><h2 data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Obligatory Scenes of the Mystery Genre</span></h2><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">When crafting a mystery story, be sure to include these key scenes in your planning. Without them, your mystery will likely fail to resonate with fans of the crime genre. These iconic moments don’t each need their own scene but may be combined as the story progresses.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><h3 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">A crime or the threat of a crime</span></h3><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1725" instrument_node="">According to both </span><em data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Alfred Hitchcock </span></em><span data-dcnode-id="1722" instrument_node="">and </span><em data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Ellery Queen Mystery Magazine,</span></em><span data-dcnode-id="1719" instrument_node=""> long-acknowledged authorities on the subject, this is the definition of a mystery story. It must have a crime or the plausible threat of a crime. Usually, this is what occurs in the </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/inciting-incident/"><span data-dcnode-id="1718" instrument_node="">Inciting Incident</span></a><span data-dcnode-id="1716" instrument_node=""> of the story.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><h3 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">An investigation</span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">The sleuth, your story’s protagonist, must actively pursue a solution to the crime and bring the culprit to justice, or enact an alternate, satisfying resolution. If the story is a caper or heist, the plan must unfold and lead to the capture or escape of the thieves.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><h3 data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Speech in praise of the antagonist</span></h3><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">This is rarely something as formal as an actual speech. Instead, it entails a character pointing out the antagonist’s prowess or apparent superiority in some way. Perhaps as a warning to the sleuth or a secondary character’s admiration of the antagonist.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><h3 data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Protagonist discovers antagonist’s MacGuffin</span></h3><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">At some point in the story, the sleuth comes to understand the criminal’s core pursuit—what he’s really after. For example, the motive behind the crime may become clear, representing a big jump ahead in reaching the solution.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><h3 data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Initial strategy fails</span></h3><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Most successful stories begin with a character, in a setting, with a problem. From there, they go into a series of try/fail cycles until the ultimate “try” of the story’s climax. So, the initial attempt must fail, forcing the protagonist to change strategies and try again. And again.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><h3 data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Core Event in the climactic scene</span></h3><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">In a mystery, the core event involves exposure of the criminal and revealing the solution to the crime—explaining what happened and how the truth was discovered.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">In the case of a caper or heist, the core event is the enactment of the plan—putting it all into action and moving toward completion or failure.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><h3 data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Criminal brought to justice</span></h3><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">The final obligatory scene, which may or may not happen during the story’s climax, is bringing the criminal to justice or an equally satisfying resolution.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">In the case of a caper or heist, this is where the protagonist either succeeds and gets away or is caught.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Remember that readers want to feel intrigued by the mystery. Be sure to present a challenging, interesting puzzle and deliver all the pieces to the reader for a satisfying conclusion.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node="">For more about Mysteries, see </span><a data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/how-to-write-a-mystery-novel/"><span data-dcnode-id="1667" instrument_node="">How to Write a Mystery Novel</span></a><span data-dcnode-id="1665" instrument_node="">.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><h2 data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Emotions of the Suspense Genre</span></h2><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Readers of suspense read to experience the feeling of . . . suspense. That uncertainty that comes with knowing there’s something going on below the surface but only getting hints as to what it might be.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">These are the stories that mess with your mind.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">The suspense genre teeters on the border between mystery and horror. It involves piecing together—not necessarily a crime, as in Mystery—a bigger picture of a hidden reality. You’ll often see these sorts of books categorized as psychological thrillers, but I class them differently since thrillers demand an unrelenting fast pace, whereas suspense can move along at a variety of paces.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">For example, one of the most enduring suspense stories ever written is Daphne DuMaurier’s </span><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Rebecca</span></em><span data-dcnode-id="1647" instrument_node="">. Fraught with suspense and an underlying sense of peril, it nevertheless moves at a leisurely pace through the dim halls of Manderley.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1644" instrument_node="">Remember that Alfred Hitchcock was the Master of Suspense and you’ll have a fair idea of the appeal suspense lovers are looking for. To help you develop this kind of emotion in your readers, work on creating a great </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/atmosphere-literary-definition/"><span data-dcnode-id="1643" instrument_node="">atmosphere</span></a><span data-dcnode-id="1641" instrument_node=""> for suspense. Focus also on techniques for </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1640" instrument_node="">pulling readers into the setting</span></a><span data-dcnode-id="1638" instrument_node=""> and </span><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/foreshadowing/"><span data-dcnode-id="1637" instrument_node="">foreshadowing</span></a><span data-dcnode-id="1635" instrument_node=""> events.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1627"><div class="share-quote-quote" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node=""> The suspense genre teeters on the border between mystery and horror. Learn more about its genre conventions in this article. </span></div></div><div class="share-quote-shares" data-dcnode-id="1621"><div class="share-quote-shares-block" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1622"><a class="share-quote-twitter" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/genre-conventions/%26text%3D%2520The%2520suspense%2520genre%2520teeters%2520on%2520the%2520border%2520between%2520mystery%2520and%2520horror.%2520Learn%2520more%2520about%2520its%2520genre%2520conventions%2520in%2520this%2520article.%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1624" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1620" instrument_node="">
</span><h2 data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Suspense Genre Conventions</span></h2><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Because Mysteries, Thrillers, and Suspense are closely related, they share many Conventions and Obligatory Scenes. In this section, I’ll reiterate where necessary, but focus on the difference between genre conventions.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><h3 data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Menacing atmosphere</span></h3><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Setting is crucial in a Suspense story. A richly drawn, sinister atmosphere is key to creating the mood and tension suspense readers enjoy. The setting can be thick with foreboding or superficially bright with unsettling indicators that all is not as it seems.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><h3 data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">A secret plot</span></h3><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The unknown antagonist is brewing something diabolical beneath the surface of the story that the protagonist seeks to uncover.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><h3 data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Don’t know who to trust</span></h3><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">The hero of the story will be surrounded by secondary characters, but she’ll have doubts about which of them she can rely on and which might be trying to harm her. This is the primary dilemma of the suspense novel.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><h3 data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">It’s personal</span></h3><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">In a mystery or a thriller, the antagonist makes the hero his target at some point in the story’s progression. In a suspense story, it’s always personal. In most cases, the hero has been the target from the start.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><h3 data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Clues and Red Herrings</span></h3><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">As in a mystery, the protagonist will gather information to help her form an accurate picture of what’s going on. In a mystery, the clues generally help solve a crime that’s already happened. In a suspense, the pieces lead the hero to discover an evil plan in progress or that will hatch in the imminent future.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><h3 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">A Shapeshifter</span></h3><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Like a mystery, the suspense story will feature at least one shapeshifter—a character who seems to be one thing yet proves to be something else. Remember, the shapeshifter doesn’t have to go from good to bad but may instead be someone the protagonist thought was against her who turns out to be an ally.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><h3 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">High Stakes</span></h3><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">The risk to the protagonist must be real and significant—usually hinging on life or death. And those stakes should rise as the story progresses. The scope of that risk—meaning the consequences of the hero failing to discover the truth—most often keeps to the lower end of the scale, affecting only the protagonist or a small circle of contacts.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><h2 data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Obligatory Scenes of the Suspense Genre</span></h2><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">These scenes represent the must-have moments in a suspense story. Leave them out, and you risk losing readers who sense something vital missing from your book.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><h3 data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Hero enmeshed in the unfolding danger</span></h3><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">You must give your protagonist a compelling reason for being in the dangerous situation and show how they can’t turn back, crossing the point of no return.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><h3 data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">An investigation</span></h3><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Your protagonist must gather information to make sense of her dilemma and formulate a plan of escape.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><h3 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Initial strategy fails</span></h3><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">As in all effective stories, once the character is in a setting with a problem, her first attempt at overcoming the problem fails and she is forced to scramble for a new plan, usually at greater risk to herself as the stakes rise.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Core Event in the climactic scene</span></h3><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The core event of a suspense lies in the hero exposing the big, underlying secret and destroying the evil plan or escaping its grasp. Or perhaps not. Suspense does not always have a happy ending, though readers do prefer them.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><h3 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Suspended resolution</span></h3><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Often (but not always) in a suspense story, the ending is left up in the air, an ambiguous conclusion. Readers must decide the final outcome for themselves or remain forever suspended in uncertainty. This is in keeping with the overall unsettled, disconcerting tone of the story. And leaves possibilities open for a sequel.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1535" instrument_node="">For more information about what makes a Suspense story and how it differs from Mystery and Thrillers, I invite you to read </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/how-to-write-a-suspense-novel/"><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">How to Write a Suspense Novel</span></em></a><span data-dcnode-id="1531" instrument_node="">.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><h2 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Emotions of a Thriller</span></h2><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Readers dive into thrillers expecting to feel excitement, to experience danger and thrills without actual risk. They want the stimulation of traveling to far off, exotic places without leaving home, the buzz of being privy to momentous secrets, the breathless high of jumping from one narrow escape to the next while staying safe. They want an action story.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node="">Thrillers, like crime stories, also play on a reader’s sense of justice and sanctity of life. Thrillers tend to pit bad guy against good guy and bring the good guy out on top. That is a </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joslynchase.com/4-unexpected-benefits-reading-thrillers/"><span data-dcnode-id="1521" instrument_node="">major appeal of the thriller</span></a><span data-dcnode-id="1519" instrument_node="">.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">And readers want something more from thrillers—they want to know what it feels like to inhabit a particular sort of world. That’s why there are so many sub-genres of thrillers—to provide the emotions and sensations craved by readers for each milieu.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">For example, in addition to the emotional appeals listed above . . .</span></p><span data-dcnode-id="1511" instrument_node="">
</span><ul data-dcnode-id="1456"><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1503"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Espionage</span></strong><span data-dcnode-id="1507" instrument_node=""> and </span><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Secret Agent</span></strong><span data-dcnode-id="1504" instrument_node=""> thrillers let readers experience the thrill of international intrigue, clever tactics, and breaking the rules to achieve a crucial end goal.</span></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1498"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Disaster thrillers</span></strong><span data-dcnode-id="1499" instrument_node=""> allow readers to feel the vicarious terror of panic and destruction, giving them the opportunity to speculate how they would react under such dire circumstances.</span></li><span data-dcnode-id="1497" instrument_node="">
</span><li data-dcnode-id="1493"><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Military thrillers</span></strong><span data-dcnode-id="1494" instrument_node=""> give readers a chance to get down in the trenches and feel the fear, the tragedy, the intimate violence of war as well as rousing emotions of heroism and patriotism.</span></li><span data-dcnode-id="1492" instrument_node="">
</span><li data-dcnode-id="1488"><strong data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Technothrillers</span></strong><span data-dcnode-id="1489" instrument_node=""> allow readers to feel like they are insiders to safe-guarded military and technological information, like they have a Top-Secret clearance to access vital issues of national security.</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1483"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Legal thrillers</span></strong><span data-dcnode-id="1484" instrument_node=""> bring readers into the fascinating machinations of the legal system, letting them take part in high-profile (albeit fictional) trial proceedings and feel the associated angst and prestige.</span></li><span data-dcnode-id="1482" instrument_node="">
</span><li data-dcnode-id="1478"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Financial thrillers</span></strong><span data-dcnode-id="1479" instrument_node=""> allow readers to feel the cachet of wealth and the power that comes with it, and to experience lifestyles of the rich and famous.</span></li><span data-dcnode-id="1477" instrument_node="">
</span><li data-dcnode-id="1473"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Serial Killer thrillers</span></strong><span data-dcnode-id="1474" instrument_node=""> let readers feel the brush with death and get a peek into a mind so deranged they’ll never be able to understand it.</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1468"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Medical and Bio-thrillers</span></strong><span data-dcnode-id="1469" instrument_node=""> are terrifying on such a fundamental level that they create feelings of mortal weakness and helpless fascination.</span></li><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1463"><strong data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Political thrillers</span></strong><span data-dcnode-id="1464" instrument_node=""> impart a strong fear factor as well, inviting the paranoia of conspiracy theories and government takeovers.</span></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1458"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Paranormal thrillers</span></strong><span data-dcnode-id="1459" instrument_node=""> allow readers to be beguiled by the other-worldly and unexplainable, giving them a little chill of excitement.</span></li><span data-dcnode-id="1457" instrument_node="">
</span></ul><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1454" instrument_node="">You can facilitate these emotions for your readers by </span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1453" instrument_node="">pulling them deep into the story setting</span></a><span data-dcnode-id="1451" instrument_node="">, making sure they </span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/raise-the-stakes/"><span data-dcnode-id="1450" instrument_node="">understand what’s at stake</span></a><span data-dcnode-id="1448" instrument_node="">, providing </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/how-to-write-action-scenes/"><span data-dcnode-id="1447" instrument_node="">effective and exciting action scenes</span></a><span data-dcnode-id="1445" instrument_node="">, and </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/sequence-of-events-in-a-story/"><span data-dcnode-id="1444" instrument_node="">delivering the information</span></a><span data-dcnode-id="1442" instrument_node=""> they need to be active players in the reading experience.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">Designing </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/cliffhanger-meaning/"><span data-dcnode-id="1438" instrument_node="">cliffhangers</span></a><span data-dcnode-id="1436" instrument_node=""> that work is another powerful way to evoke the target emotions in your thriller readers.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><div class="share-quote" data-dcnode-id="1428"><div class="share-quote-quote" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">“</span></div><div class="share-quote-text" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node=""> Want to learn the genre conventions for a Thriller story? Check out this article! </span></div></div><div class="share-quote-shares" data-dcnode-id="1422"><div class="share-quote-shares-block" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Tweet this</span></div><div class="share-quote-shares-block" data-dcnode-id="1423"><a class="share-quote-twitter" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//thewritepractice.com/genre-conventions/%26text%3D%2520Want%2520to%2520learn%2520the%2520genre%2520conventions%2520for%2520a%2520Thriller%2520story%3F%2520Check%2520out%2520this%2520article%21%2520%26via%3Dwrite_practice" title="Tweet This"><span data-dcnode-id="1425" instrument_node="">Tweet</span></a></div></div><span data-dcnode-id="1421" instrument_node="">
</span><h2 data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Thriller Genre Conventions</span></h2><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1417" instrument_node="">You’ll notice a lot of crossover in the conventions and obligatory scenes. For this section, I heavily referenced Rachelle Ramirez’s article </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storygrid.com/thriller-genre/"><span data-dcnode-id="1416" instrument_node="">Secrets of the Thriller Genre</span></a><span data-dcnode-id="1414" instrument_node="">.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Here are the conventions you’ll want to include in your story if you’re writing a thriller. Readers want them. Readers expect them. Don’t disappoint.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><h3 data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Vibrant atmosphere</span></h3><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">The setting is a vital part of a thriller and should be portrayed in </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/deep-pov/"><span data-dcnode-id="1404" instrument_node="">clear and specific detail</span></a><span data-dcnode-id="1402" instrument_node="">, bringing it alive and making it immediately threatening.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><h3 data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The MacGuffin</span></h3><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Remember, this is the Object of Desire, what everyone is after. Nuclear codes, diamonds, cold hard cash—whatever it is, make it crucial for both antagonist and protagonist to obtain, pitting them against each other.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><h3 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">The Inciting Crime</span></h3><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The crime or threat of a crime that kicks off the story must contain some clue about the MacGuffin.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><h3 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Protagonist has a special gift</span></h3><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">There is something—a unique talent or ability—that sets the protagonist apart. His superpower. He may suppress that gift or foster it, but in the end he must unleash it to overcome the villain.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><h3 data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Ticking clock</span></h3><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The pace of a thriller is almost relentlessly fast, and the countdown is an important convention. It doesn’t have to be a literal ticking clock, but you must find some plausible way to apply the pressure of time in your thriller.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><h3 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Protagonist pursues an investigation</span></h3><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The hero needs to be actively engaged in an effort to catch the criminal and put a stop to his dastardly plans—following up on clues and hunting or being hunted.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">High stakes</span></h3><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Nothing less than life itself can be on the line. The lives of innocents must be at stake and depend on the hero’s victory over the antagonist.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><h3 data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Elements of suspense</span></h3><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">The story must contain the elements of suspense, providing information that allows readers to predict and anticipate outcomes, heightening the emotional investment and driving the narrative.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><h3 data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Unyielding antagonist</span></h3><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">In some types of stories, the bad guy can be reasoned with and possibly dissuaded from his course of action. In a thriller, that’s not the case. The villain is intent on destruction and determined that nothing will stop him.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><h3 data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Speech in praise of the villain</span></h3><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Someone, somewhere in the story, must remark on how cunning or invincible the villain is, highlighting the hero’s disadvantage and lengthening the odds.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Protagonist is the final victim</span></h3><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">In the climactic scene, the protagonist is the last barrier between the antagonist and his goal of annihilation—he becomes the final victim and either triumphs or ultimately fails.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Clear threat of escalating danger</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Not only is there danger, not only are the stakes high, but that danger must escalate and the stakes must rise in a cause and effect chain of events throughout the story.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><h3 data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The Shapeshifter</span></h3><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Again, the shapeshifter or hypocrite is an important part of the story, someone whose deception impacts the protagonist in a real way and usually in a vulnerable moment.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><h3 data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Justice or injustice prevails</span></h3><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">In a thriller with a positive ending, the villain is brought to some sort of justice, appropriate to his crimes. In a thriller with a negative ending, the villain gets away and injustice prevails.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">However, these are not the only two options: the villain can escape justice (for now) but his evil plan is destroyed. He will rise again with a new plan in the sequel.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><h2 data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Obligatory Scenes of the Thriller Genre</span></h2><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Remember, these are the scenes that will make your thriller. If you leave one out, you will break your thriller. Don’t do that.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><h3 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Inciting crime indicating that a master villain is at work</span></h3><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">The crime must have a perpetrator, leave victims in its wake, and be of such a clever or dastardly design that it must be the work of a master criminal.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><h3 data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Clear point of no return</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">There must be a point at which the protagonist can never go back to the way things were before. This scene pinpoints the moment when the hero’s world is knocked off its axis.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><h3 data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Initial strategy fails</span></h3><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The protagonist’s first attempt to foil the villain’s diabolical plan fails, setting off a try/fail cycle that escalates up to the climactic scene.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><h3 data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Protagonist discovers antagonist’s MacGuffin</span></h3><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">The hero gains insight into the villain’s intentions as he discovers and comes to understand what the bad guy is ultimately pursuing.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><h3 data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Villain makes it personal</span></h3><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">At some point as the story progresses, the protagonist’s efforts to obstruct the villain’s plan land him square in the bullseye. The antagonist targets the hero as his primary victim, bringing the conflict to a personal level, and the two are on a collision course for a head-to-head battle at the story’s climax.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><h3 data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Hero at the mercy of the villain</span></h3><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">This is the climactic scene where the hero faces the villain at overwhelming odds and has to dig deeper than ever before to unleash her special gift—the thing that turns the tables and makes it possible for her to defeat the antagonist.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><h3 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">False ending</span></h3><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Just as the reader is catching her breath and thinking all is resolved, the antagonistic force rebounds to challenge the hero again.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1270" instrument_node="">For more information, check out </span><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/how-to-write-a-thriller-novel/"><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">How to Write a Thriller Novel</span></em></a><span data-dcnode-id="1266" instrument_node="">.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><h2 data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Give Your Readers What They Crave</span></h2><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">These landmark scenes will give your story what it needs to hold and satisfy readers. They help your book to resonate, making your audience happy, because those bedrock elements of story are in the reader’s DNA, bred and nurtured through years of absorbing stories.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">So, use these conventions and obligatory scenes to make your story work. The trick is in innovating them so they feel fresh to the reader. Bring your own voice and creativity into the process to make that happen.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Above all, remember that readers read to feel something, and what they want to feel from the suspense genres . . . is suspense. And all its glorious offshoots—excitement, dread, anticipation, intrigue.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">If you’ve followed this series of articles, </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewritepractice.com/elements-of-suspense/"><span data-dcnode-id="1250" instrument_node="">The Elements of Suspense</span></a><span data-dcnode-id="1248" instrument_node="">, you’ve packed your writer’s toolbox with dozens of techniques and must-have skills for grabbing readers and creating a suspenseful story. And that’s exciting!</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1238"><strong data-dcnode-id="1243"><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">How about you? Do you recognize these conventions and scenes in the stories you read or watch?</span></em></strong><span data-dcnode-id="1242" instrument_node=""> Tell us about it in the </span><a data-dcnode-id="1240" href="#comments"><span data-dcnode-id="1241" instrument_node="">comments</span></a><span data-dcnode-id="1239" instrument_node="">.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><div data-dcnode-id="1205" id="practice"><span data-dcnode-id="1236" instrument_node="">
</span><h2 data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">PRACTICE</span></h2><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Practice incorporating these core emotions, conventions, and key scenes into your work in progress. For this exercise, choose one of the obligatory scenes for the story you’re currently writing and create that scene.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">If you don’t have a WIP, use one of these prompts to get you started:</span></p><span data-dcnode-id="1227" instrument_node="">
</span><ul data-dcnode-id="1216"><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Daniel is trapped in a high-rise office building as he discovers the truth about the villain’s MacGuffin.</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Victoria scrambles through a booby-trapped jungle in a failed attempt to stop the villain’s escape in a helicopter.</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Peter investigates the crime scene, observing clues and formulating ideas about suspects and motives.</span></li><span data-dcnode-id="1217" instrument_node="">
</span></ul><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1214" instrument_node="">Write for </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.ggtimer.com/15minutes"><span data-dcnode-id="1213" instrument_node="">fifteen minutes</span></a><span data-dcnode-id="1211" instrument_node="">. When you are finished, post your writing in the </span><a data-dcnode-id="1209" href="#comments"><span data-dcnode-id="1210" instrument_node="">comments</span></a><span data-dcnode-id="1208" instrument_node="">, and don’t forget to give your fellow writers feedback as well!</span></p><span data-dcnode-id="1206" instrument_node="">
</span></div><span data-dcnode-id="1204" instrument_node="">
</span><span data-dcnode-id="1202" instrument_node="">
