</span></header><section class="article-body" data-dcnode-id="847" id="article-body" itemprop="articleBody"><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Writing your first novel can be more daunting in life than actually putting pen to paper or finger to keyboard. The untouched page is a frank sign of how much work there is to do.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">In Bird by Bird, Anne Lamott explains the writer's dilemma:</span></p><span data-dcnode-id="1644" instrument_node="">
</span><blockquote data-dcnode-id="1639"><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">You are desperate to communicate, to edify and entertain...to make real or imagined events come alive. But you cannot will this to happen. It is a matter of persistence and faith and hard work. So you might as well just go ahead and get started.</span></p><span data-dcnode-id="1640" instrument_node="">
</span></blockquote><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Yet getting started is easier once you've done some initial prep work on your story; its structure, characters, and how on earth you're going to get this thing out of your head.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">That's where these free novel-writing templates and worksheets prove handy.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><span data-dcnode-id="1630" instrument_node="">
</span><span data-dcnode-id="1628" instrument_node="">
</span><h2 data-dcnode-id="1624" id="story-premise-worksheet"><span data-dcnode-id="1627" instrument_node=""> 1. </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.evernote.com/shard/s308/client/snv%3FnoteGuid%3Dbd47628a-8b1d-4ec5-85c2-22b1f2c01a81%26noteKey%3Da0bd589c60591913%26utm_campaign%3Dnanowrimo2017%26utm_medium%3Dpost%26sn%3Dhttps%253A%252F%252Fwww.evernote.com%252Fshard%252Fs308%252Fsh%252Fbd47628a-8b1d-4ec5-85c2-22b1f2c01a81%252Fa0bd589c60591913%26title%3D%25255BTemplate%25255D%252BStory%252BPremise%252BWorksheet%26utm_source%3Dsocial_enblog%26utm_content%3D20171002-en-writing-templates" target="_blank"><span data-dcnode-id="1626" instrument_node="">Story Premise Worksheet</span></a></h2><span data-dcnode-id="1623" instrument_node="">

</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">This worksheet from Evernote is a simple way to outline the main characters, plot themes, events, and conflicts within your story. By teasing them out of your mind and onto a worksheet like this, you'll be able to plot the broad story arc.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><span data-dcnode-id="1592" instrument_node="">
</span><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Remember to keep your descriptions specific and concise. This isn't meant to be an entire plot description.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">If you're an Evernote fan, there are plenty of </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/evernote-tables-life-organized/"><span data-dcnode-id="1585" instrument_node="">other Evernote templates you can use</span></a><span data-dcnode-id="1583" instrument_node="">. But if you don't use Evernote, this worksheet can easily be replicated in other programs, or on a sheet of paper.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1579"></div><span data-dcnode-id="1578" instrument_node="">

</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">This straightforward worksheet from The Novel Factory helps you to pad out your main characters. You'll find yourself adding to, and referring back to this info, time and again as your character develops.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1543" instrument_node="">If you want to flesh out your characters in more detail, you could download the accompanying </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.novel-software.com/CMS/FILES/Worksheets/CharacterDevelopment.pdf" target="_blank"><span data-dcnode-id="1542" instrument_node="">Character Development Worksheet</span></a><span data-dcnode-id="1540" instrument_node=""> and </span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.novel-software.com/CMS/FILES/Worksheets/CharacterVoice.pdf" target="_blank"><span data-dcnode-id="1539" instrument_node="">Character Voice Worksheet</span></a><span data-dcnode-id="1537" instrument_node="">.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><span data-dcnode-id="1532" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1530"></div><span data-dcnode-id="1529" instrument_node="">
</span><h2 data-dcnode-id="1525" id="the-one-page-novel-plot-spreadsheet"><span data-dcnode-id="1528" instrument_node=""> 3. </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/spreadsheets/d/1vI_iDRj6QXWxq-ZDS9VLp7dD0WR55PTtWApYIrMVoXM/edit%23gid%3D0" target="_blank"><span data-dcnode-id="1527" instrument_node="">The One Page Novel Plot Spreadsheet</span></a></h2><span data-dcnode-id="1524" instrument_node="">

</span><p data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">If you're looking for a more linear approach to plan your novel, this spreadsheet from </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eadeverell.com/the-one-page-novel-plot-formula/" target="_blank"><span data-dcnode-id="1496" instrument_node="">EA Deverell</span></a><span data-dcnode-id="1494" instrument_node=""> is especially useful. This customizable resource allows you to break down and describe each of your scenes so that you have a concrete plot before you start writing.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1489" instrument_node="">To start using this spreadsheet, open it up, click </span><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">File</span></strong><span data-dcnode-id="1486" instrument_node=""> then</span><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node=""> Make a Copy.</span></strong></p><span data-dcnode-id="1482" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1480"></div><span data-dcnode-id="1479" instrument_node="">

</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The model covers all essentials, without going overboard on planning. From the introduction of characters, through to rising action, and to the final resolution of your story.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><span data-dcnode-id="1438" instrument_node="">

</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">Writer's Digest has a number of </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writersdigest.com/writing-articles/by-writing-goal/write-first-chapter-get-started/novel-in-30-days-2011" target="_blank"><span data-dcnode-id="1359" instrument_node="">useful writing worksheets</span></a><span data-dcnode-id="1357" instrument_node=""> aimed at helping writers pen the first draft in 30 days. One of the most useful of these templates is the At-a-Glance Outline. This worksheet helps you to fill in any gaps and plot holes in your story before you come across them in the middle of your draft.</span></p><span data-dcnode-id="1355" instrument_node="">

</span><p data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">By knowing about the different ways in which you can draw your story to a close, you may well be able to </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/writing-wrongs-7-essential-tips-new-authors/"><span data-dcnode-id="1184" instrument_node="">improve your writing</span></a><span data-dcnode-id="1182" instrument_node="">&nbsp;and introduce more interesting plot twists and character development than you might have otherwise.</span></p><span data-dcnode-id="1180" instrument_node="">

</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">From character arcs, premises, abbreviated outlines, and character details, to props, areas for worldbuilding, planning out a series, and more.</span></p><span data-dcnode-id="1135" instrument_node="">

</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">These five free Microsoft Word book templates from DIY Book Formats (email registration required) are of high quality. And what's more, they'll save you tons of time wrestling with document formatting when you could be writing.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Each template includes paragraph and header styling, a cover page, footers, and page numbers, and comes in PDF, DOC, DOCX, and INDD (InDesign) filetypes.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">For Google Docs Users: </span></strong><span data-dcnode-id="1056" instrument_node="">The DOC and DOCX files included in this collection </span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">can also be uploaded and used on Google Docs</span></strong><span data-dcnode-id="1053" instrument_node="">. You may have to slightly tweak line spacing, etc. but most of the formatting is retained.</span></p><span data-dcnode-id="1051" instrument_node="">

</span><p data-dcnode-id="1041"><span data-dcnode-id="1044" instrument_node="">By the time you've worked through a few of the worksheets included in this article, you'll be in a much better position to finally put pen to paper and </span><a class="no-callout" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/develop-skilled-writer-inside-successful-life/"><span data-dcnode-id="1043" instrument_node="">become the writer you always wanted to be.</span></a></p><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1036" instrument_node="">And who knows? After a few rounds of edits, you may even be ready to finally </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/how-to-write-an-ebook/"><span data-dcnode-id="1035" instrument_node="">publish your ebook</span></a><span data-dcnode-id="1033" instrument_node="">, and </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/top-4-online-selfpublishers-book-write/"><span data-dcnode-id="1032" instrument_node="">get your story printed</span></a><span data-dcnode-id="1030" instrument_node=""> so you can enjoy the pride that comes with having a physical copy of your work in hand.</span></p><span data-dcnode-id="1028" instrument_node="">
