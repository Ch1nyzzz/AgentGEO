</span><div class="section b-intro with-breadcrumbs no-padding-top no-padding-bottom without-button" data-dcnode-id="938"><span data-dcnode-id="953" instrument_node="">
</span><div class="b-container" data-dcnode-id="940"><span data-dcnode-id="952" instrument_node="">
</span><div class="b-body" data-dcnode-id="942"><span data-dcnode-id="951" instrument_node="">
</span><h1 class="heading" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">How to Write a Compelling Book Review</span></h1><span data-dcnode-id="948" instrument_node="">
</span><p class="text text-mod" data-dcnode-id="944"><span data-dcnode-id="947" instrument_node="">Jun 05, 2019 in </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eliteediting.com/resources/category/writing/" rel="category tag"><span data-dcnode-id="946" instrument_node="">Writing</span></a></p><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span></section><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">
</span></header><span data-dcnode-id="929" instrument_node="">
</span><div class="section no-padding-bottom" data-dcnode-id="378"><span data-dcnode-id="928" instrument_node="">
</span><div class="b-container" data-dcnode-id="396"><span data-dcnode-id="927" instrument_node="">
</span><div class="article-container" data-dcnode-id="398"><span data-dcnode-id="926" instrument_node="">
</span><div class="b-article b-article-mod pb-36" data-dcnode-id="488"><span data-dcnode-id="925" instrument_node="">
</span><img alt="How to Write a Compelling Book Review" class="aligncenter size-full wp-image-4585" data-dcnode-id="924" height="1000" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eliteediting.com/wp-content/uploads/2019/05/bookreview.png&amp;raw" srcset="https://eliteediting.com/wp-content/uploads/2019/05/bookreview.png 1500w, https://eliteediting.com/wp-content/uploads/2019/05/bookreview-300x200.png 300w, https://eliteediting.com/wp-content/uploads/2019/05/bookreview-768x512.png 768w, https://eliteediting.com/wp-content/uploads/2019/05/bookreview-1024x683.png 1024w" width="1500"><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Whether you’re writing for a magazine, your blog, or your social media accounts, it’s good to know how to write a compelling book review.&nbsp;Your book reviews can help build your business’s brand and bring readers to your blog or website. They&nbsp;can also grow your reputation as an expert on a certain subject.&nbsp;At the very least, they can help you connect with a community of people who enjoy reading and discussing the same types of books.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Clearly, learning how to write a great book review can help you achieve your personal and professional goals. In this post, we’ll discuss some book review writing tips such as building your book review argument, understanding your book review audience, and shaping your writing voice. We’ll also look at some book review examples. Good writing, above all, will get your book review noticed.</span></p><span data-dcnode-id="917" instrument_node="">
</span><h2 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">What Is a Book Review?</span></h2><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">A book review offers a fact-based opinion for whether a book is or isn’t successful. This helps other people decide whether they want to read the book themselves. Although book review content will vary based on the book you’re reviewing and your opinion of it, all compelling book reviews share the same basic structure. We’ll look at this before we dive into our book review writing tips.</span></p><span data-dcnode-id="911" instrument_node="">
</span><h3 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Clear argument</span></h3><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Unlike a book report, which really just summarizes a book, a book review is an opinion piece. This means that your book review will focus on the book’s strengths and weaknesses rather than what it’s about. As you’re learning how to write book reviews, remember that your book review argument should focus on a few exciting points and clearly present and support them.</span></p><span data-dcnode-id="905" instrument_node="">
</span><h3 data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Book review format</span></h3><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The basic book review format is easy to learn and remember.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">The first part usually includes a brief summary of the book so readers know what the book is about (or remember it if they’ve already read it). In this section, you should give a basic overview of the book’s plot or main argument and a few notes about the book’s themes or thesis.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The second part is your analysis of the book. In this section, present your argument—or thesis—and include some quotes from the book to support it.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Lastly, you have the conclusion. Here, you should summarize your argument and provide your recommendation for whether readers should or shouldn’t read the book.</span></p><span data-dcnode-id="890" instrument_node="">
</span><h2 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">What Does a Good Book Review Look Like?</span></h2><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Now that we know the basic book review outline, let’s look at what makes a compelling book review and what makes an unhelpful one.</span></p><span data-dcnode-id="884" instrument_node="">
</span><h3 data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Critique vs. opinion</span></h3><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="880" instrument_node="">The most important aspect of how to write a book review is understanding the difference between </span><em data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">critique</span></em><span data-dcnode-id="877" instrument_node=""> and </span><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">opinion</span></em><span data-dcnode-id="874" instrument_node="">. Compelling book reviews focus on critique, which provides an analysis of the book’s strengths and weaknesses. On the other hand, reviews that focus on your personal opinion of the book won’t help other people decide whether </span><em data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">they </span></em><span data-dcnode-id="871" instrument_node="">are&nbsp;interested in reading the book.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Here’s an example of a critique-based review:</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861" style="padding-left: 30px;"><span data-dcnode-id="865" instrument_node="">In </span><em data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Oliver Twist</span></em><span data-dcnode-id="862" instrument_node="">, Charles Dickens provides a glimpse into the lives of the poor and homeless in nineteenth-century London. His well-developed characters offer realistic portraits of members of the working class during this time and the extreme difficulties they faced. However, his lighthearted writing style brightens the story’s mood. Because of this, the book is both entertaining and informative.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">As you can see, the above review focuses on the book’s story and writing elements and discusses how they make the book successful. This helps people decide whether they’d like to read the book themselves.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Now consider this opinion-focused book review example:</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849" style="padding-left: 30px;"><span data-dcnode-id="853" instrument_node="">I enjoyed reading Charles Dickens’s </span><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Oliver Twist</span></em><span data-dcnode-id="850" instrument_node="">. The characters are memorable and made me laugh and feel sympathy for their difficult lives. I’m sure I’ll read this book again, and I recommend it to anyone who likes a story that’s both funny and emotionally moving.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">Unlike the first example, this review gives only the reviewer’s personal opinion of the book and says almost nothing about the book itself. Unless other people have a reason to trust the reviewer, they probably won’t read </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Oliver Twist</span></em><span data-dcnode-id="844" instrument_node=""> based solely on this review.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Analysis vs. summary</span></h3><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">Similarly, as you’re learning how to write a book review, make sure you’re comfortable with the difference between analysis and summary. While a book </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">report</span></em><span data-dcnode-id="835" instrument_node=""> is only a summary, a good book </span><em data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">review</span></em><span data-dcnode-id="832" instrument_node=""> balances both summary and analysis. Here’s a breakdown of both:</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="829" instrument_node="">A </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">summary</span></strong><span data-dcnode-id="826" instrument_node=""> does exactly what it sounds like—it summarizes a book’s plotline (or main points if it’s nonfiction). While a book review should have </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">some</span></em><span data-dcnode-id="823" instrument_node=""> summary to help readers understand what the book is about, it shouldn’t be </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">only</span></em><span data-dcnode-id="820" instrument_node=""> summary.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">On the other hand, an </span><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">analysis</span></strong><span data-dcnode-id="814" instrument_node=""> examines the book’s story elements and writing style. It offers evidence—usually quotes and examples from the book itself—for whether these make the book strong or weak. This helps people who read your review decide if the book is worth reading.</span></p><span data-dcnode-id="812" instrument_node="">
</span><h2 data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Consider Your Audience: Who Will Be Reading This Review?</span></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Once you’re comfortable with the basic book review format and what makes a compelling book review, the next step in how to write a book review is considering your audience. And part of considering your audience is crafting a writing voice that they will find appealing.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h3 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Voice</span></h3><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">So many people read books and write reviews about them. That means it’s essential to use a unique and personal writing voice to help your book review stand out from the crowd. Don’t be afraid to let your personality show in your writing. If you follow the basic book review template, focus on objective analysis, </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">and</span></em><span data-dcnode-id="799" instrument_node=""> write using a compelling voice, you’ll be sure to get your book review noticed.</span></p><span data-dcnode-id="797" instrument_node="">
</span><h3 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Audience</span></h3><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Your book review audience will vary depending on where your review will be published. Here are some examples of common book review platforms:</span></p><span data-dcnode-id="791" instrument_node="">
</span><ul data-dcnode-id="777"><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Amazon: People reading book reviews on Amazon are likely deciding whether they want to buy a certain book. So a helpful Amazon book review will offer an informed recommendation for whether a shopper should invest in the book.</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Goodreads: While people reading book reviews on Goodreads are deciding whether to read a specific book, Goodreads is also a place where readers form communities around common book interests. So reviews on Goodreads could prompt engaging book-focused discussions.</span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">A journal or magazine: The audience of a book review in a journal or magazine depends on who reads that periodical. If you’re not sure what sort of book review audience you should expect, ask your editor or contact at the journal or magazine for some guidance.</span></li><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">A blog: If you’re writing book reviews for your blog, you already know who your audience is. Get to know your readership and what they want to hear about the books you’re reading. You might even ask them what they like about your book reviews and what they’d like to hear more about.</span></li><span data-dcnode-id="778" instrument_node="">
</span></ul><span data-dcnode-id="776" instrument_node="">
</span><h2 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Creating an Outline</span></h2><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Before you begin writing your book review, it’s a good idea to create an outline of the main points you want to address and thoughts you want to include in the review.</span></p><span data-dcnode-id="770" instrument_node="">
</span><h3 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Outline questions</span></h3><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Here are some questions to consider as you’re creating your book review outline. You might even think about these questions while you’re reading the book so you can take notes.</span></p><span data-dcnode-id="764" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Is the writing clear, strong, and understandable?</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">What are this book’s primary points? Are these presented successfully?</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Is this book original?</span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">For fiction:</span></p><span data-dcnode-id="749" instrument_node="">
</span><ul data-dcnode-id="738"><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">What is this book’s genre, and does it fit the genre?</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Are the characters well developed?</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Is the story well paced and believable?</span></li><span data-dcnode-id="739" instrument_node="">
</span></ul><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">For nonfiction:</span></p><span data-dcnode-id="734" instrument_node="">
</span><ul data-dcnode-id="726"><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">What is this book about? Are the concepts clearly explained?</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">What is the author’s argument, and is it successfully supported?</span></li><span data-dcnode-id="727" instrument_node="">
</span></ul><span data-dcnode-id="725" instrument_node="">
</span><h2 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Writing Your Review</span></h2><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Once you have your outline, it’s time to start writing your book review. Let’s take a closer look at the parts of the basic book review template.</span></p><span data-dcnode-id="719" instrument_node="">
</span><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Introduction</span></h3><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">Because your review should get to the point quickly, your opening line—or your </span><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">hook</span></em><span data-dcnode-id="712" instrument_node="">—should catch readers’ attention and set the tone for the review. Some review writers open with a clever quip, a book quote, or a surprising fact from the book. Others go for a brief story of their experience reading the book.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Your introduction should also clearly state the book’s title, the author’s name, and maybe even some background information about the author.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Additionally, your introduction should include your thesis or argument—that is, your opinion of whether the book is or isn’t worth reading—which you’ll discuss in your review’s analysis section.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h3 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Summary</span></h3><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">As we’ve already discussed, your book should include a summary of the book but only enough to give readers an overview. Focus on the book’s main plot points (for fiction) or arguments (for nonfiction), and briefly explain the book’s primary themes or thesis.</span></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Argument/analysis</span></h3><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Your book review argument or analysis of the book should be the main part of your review. As someone who has read a certain book, you’re in a position to suggest to others whether they should also read it. This is what you’ll discuss in your analysis.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">In your review’s analysis, work through the questions you considered while making your outline. Highlight the book’s strengths and weaknesses, and explain why you think the book is or isn’t a success. Give examples or direct quotes from the book to illustrate and support your argument.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h3 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Conclusion</span></h3><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">To give your review a satisfying finish, summarize your main points in a succinct conclusion. Restate your argument, and offer your final recommendation.</span></p><span data-dcnode-id="683" instrument_node="">
</span><h2 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Summary</span></h2><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Hopefully you’re now much more comfortable with the steps of how to write a book review. Here are the main things to remember as you’re writing your review:</span></p><span data-dcnode-id="677" instrument_node="">
</span><ul data-dcnode-id="663"><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Take notes as you’re reading the book, and make an outline of your main points before you start writing your review.</span></li><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Focus on critical analysis rather than personal opinion.</span></li><span data-dcnode-id="670" instrument_node="">
</span><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Don’t oversummarize.</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Discus the book’s strengths and weaknesses in an introduction, summary, analysis, and conclusion.</span></li><span data-dcnode-id="664" instrument_node="">
</span></ul><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">If you follow these book review writing tips, you’ll be able to easily write a review that clearly states your analysis and opinion—and maybe earns a great book a few new readers.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">&nbsp;</span></p><span data-dcnode-id="656" instrument_node="">
