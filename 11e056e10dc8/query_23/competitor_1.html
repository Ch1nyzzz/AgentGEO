</span><h1 data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">How to Write a Stunning Plot Twist</span></h1><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1324" instrument_node="">A </span><em data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">plot twist </span></em><span data-dcnode-id="1321" instrument_node="">is a shocking or unexpected revelation in a </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getproofed.com/author/novel-editing-and-proofreading/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1320" instrument_node="">work of fiction</span></a><span data-dcnode-id="1318" instrument_node="">, forcing the reader to reconsider what they thought they knew about the story.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">When used effectively, plot twists can form the basis of a </span><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">killer story</span></em><span data-dcnode-id="1312" instrument_node="">. If executed poorly, though, a plot twist may turn into a </span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">story killer</span></em><span data-dcnode-id="1309" instrument_node="">. Here, then, are a few tips to help you create a stunning plot twist.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><h3 data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">1. Exclude the Obvious</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1303" instrument_node="">Think of an ending so unexpected that even seasoned readers would not predict it. A useful tip while </span><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getproofed.com/writing-tips/losing-plot-5-tops-tips-writing-good-story/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1302" instrument_node="">plotting your story</span></a><span data-dcnode-id="1300" instrument_node=""> is to brainstorm a list of obvious narrative turns. Once you have identified the obvious plot points, subvert one by doing something different. Remember, an effective plot twist doesn’t always have to be explosive; a small spark can be just as effective.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><h3 data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">2. Avoid Clichés</span></h3><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">Some twists are so overused they are no longer surprising. Don’t disappoint the reader with an </span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookriot.com/2011/12/14/7-surprise-twists-id-rather-live-without-or-the-airing-of-grievances-literary-style/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1293" instrument_node="">anti-climactic cliché</span></a><span data-dcnode-id="1291" instrument_node="">, such as “Grahame woke up and realized it was all just a dream!” Instead, look at what other people have done before and try to work out an original take or twist.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><h3 data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">3. Foreshadowing</span></h3><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//literarydevices.net/foreshadowing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1285" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="1283" instrument_node=""> is a key component in setting up a plot twist. It involves planting subtle clues within the narrative, e.g., in the emotion or action of another event within the story. First time through, the reader may not realize the significance of these clues. But after the plot twist is revealed, they should be able to look back at them and see the hints they missed.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">You may also want to include a </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.masterclass.com/articles/what-is-a-red-herring-in-writing-definition-of-red-herring-with-examples%23what-is-a-red-herring-in-writing" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1279" instrument_node="">red herring</span></a><span data-dcnode-id="1277" instrument_node=""> or two somewhere (i.e., things that seem like clues but actually misdirect readers).</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div class="l-post-break" data-dcnode-id="1208"><span data-dcnode-id="1274" instrument_node="">
</span><div class="c-sticky-box-stop js-sticky-box-stop" data-dcnode-id="1273" data-sticky-name="instant-quote"></div><span data-dcnode-id="1272" instrument_node="">

</span></div><span data-dcnode-id="1207" instrument_node="">
</span><figure aria-describedby="caption-attachment-11070" class="wp-caption aligncenter" data-dcnode-id="1203" id="attachment_11070" style="width: 358px"><img alt="It was the fish that did it!" class="wp-image-11070" data-dcnode-id="1206" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getproofed.com/wp-content/uploads/2019/10/Redherring.gif&amp;raw" width="358"><figcaption class="wp-caption-text" data-dcnode-id="1204" id="caption-attachment-11070"><span data-dcnode-id="1205" instrument_node="">It was the fish that did it!</span></figcaption></figure><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">For instance, if you were writing a murder mystery, you might have a side characters spotted on the night of the murder (even if they’re not the killer). This can keep your reader guessing, adding tension to the story and making the twist more surprising when it turns up.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">But don’t plant too many false clues, as they can be frustrating if overdone!</span></p><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">4. Maintain Momentum</span></h3><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">When planning a plot twist mid-story, make sure the narrative doesn’t lose momentum after the revelation. This can be difficult, as you may have focused on building up to this moment. But you need to keep the reader interested in the rest of the story, so make sure the twist also progresses the story and creates intrigue for what will happen next.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><h3 data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">5. Test the Twist</span></h3><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Once you have written a first draft, you may want to seek feedback from a reader. Questions you could ask include:</span></p><span data-dcnode-id="1184" instrument_node="">
</span><ul data-dcnode-id="1173"><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Did they see the plot twist coming?</span></li><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Was there enough foreshadowing to make the twist satisfying?</span></li><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Was the plot twist both believable and compelling?</span></li><span data-dcnode-id="1174" instrument_node="">
</span></ul><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">After you’ve done this, think about whether you can improve the twist while redrafting. And don’t forget to have your manuscript </span><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getproofed.com/free-proofreading-and-editing-sample/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1170" instrument_node="">proofread</span></a><span data-dcnode-id="1168" instrument_node=""> once you have a final draft, as we can help you prepare for publication.</span></p><span data-dcnode-id="1166" instrument_node="">
</span></div><span data-dcnode-id="1164" instrument_node="">
