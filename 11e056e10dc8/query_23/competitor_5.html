</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">You love to write and have been told you have a way with words. So you’ve decided to give writing a try—creative writing.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Problem is, you’re finding it tougher than it looks.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">You may even have a great </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/story-ideas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1125" instrument_node="">story idea</span></a><span data-dcnode-id="1123" instrument_node="">, but you’re not sure how to turn it into something people will read.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Don’t be discouraged—writing a compelling story can be grueling, even for veterans. Conflicting advice online may confuse you and make you want to quit before you start.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">But you know more than you think. Stories saturate our lives.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">We tell and hear stories every day in music, on television, in video games, in books, in movies, even in relationships.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Most stories, regardless the genre, feature a main character who wants something.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">There’s a need, a goal, some sort of effort to get that something.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">The character begins an adventure, a journey, or a quest, faces obstacles, and is ultimately transformed.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">The work of developing such a story will come. But first, let’s look at the basics.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><div class="jj-thrive-shortcode-wrapper" data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">
</span><span class="tve-leads-two-step-trigger tl-2step-trigger-9581" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Need help writing your novel? Click here to download my 12-step guide to writing a novel.</span></span><span data-dcnode-id="1096" instrument_node=""> </span></div><span data-dcnode-id="1094" instrument_node="">
</span><h2 data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">What is Creative Writing?</span></h2><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">It’s prose (fiction or nonfiction) that tells a story.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Journalistic, academic, technical writing relays facts.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Creative writing can also educate, but it’s best when it also entertains and emotionally moves the reader.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">It triggers the imagination and appeals to the heart.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h2 data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Elements of Creative Writing</span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1072"><img alt="Elements of Creative Writing" class="aligncenter wp-image-9526 size-large lazyloaded" data-dcnode-id="1075" data-ll-status="loaded" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1024x683.jpg&amp;raw" srcset="https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1024x683.jpg 1024w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-300x200.jpg 300w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-768x512.jpg 768w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1536x1024.jpg 1536w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-2048x1365.jpg 2048w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-600x400.jpg 600w" width="1024"><noscript data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&lt;img class="aligncenter wp-image-9526 size-large" src="https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1024x683.jpg" alt="Elements of Creative Writing" width="1024" height="683" srcset="https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1024x683.jpg 1024w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-300x200.jpg 300w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-768x512.jpg 768w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-1536x1024.jpg 1536w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-2048x1365.jpg 2048w, https://jerryjenkins.com/wp-content/uploads/2020/12/Elements-of-Creative-Writing-600x400.jpg 600w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Writing a story is much like building a house.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">You may have all the right tools and design ideas, but if your foundation isn’t solid, even the most beautiful structure won’t stand.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Most storytelling experts agree, these 7 key elements </span><i data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">must</span></i><span data-dcnode-id="1061" instrument_node=""> exist in a story.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><h3 data-dcnode-id="1056"><b data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">1. A Theme</span></b></h3><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1054" instrument_node="">Plot (more on that below) is </span><i data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">what happens</span></i><span data-dcnode-id="1051" instrument_node=""> in a story. </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/story-themes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" instrument_node="">Theme</span></a><span data-dcnode-id="1048" instrument_node=""> is </span><i data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">why</span></i><span data-dcnode-id="1045" instrument_node=""> it happens.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Before you begin writing, determine why you want to tell your story.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><ul data-dcnode-id="1030"><span data-dcnode-id="1039" instrument_node="">
</span><li data-dcnode-id="1036"><i data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">What message do you wish to convey?&nbsp;</span></i></li><span data-dcnode-id="1035" instrument_node="">
</span><li data-dcnode-id="1032"><i data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">What will it teach the reader?&nbsp;</span></i></li><span data-dcnode-id="1031" instrument_node="">
</span></ul><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Resist the urge to explicitly state your theme. Just tell the story, and let it make its own point.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Give your readers credit. Subtly weave your theme into the story and trust them to get it.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">They may remember a great plot, but you want them thinking about your theme long after they’ve finished reading.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1017"><b data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">2. Characters</span></b></h3><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Every story needs believable </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/character-development/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1014" instrument_node="">characters</span></a><span data-dcnode-id="1012" instrument_node=""> who feel knowable.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">In fiction, your main character is the protagonist, also known as the lead or hero/heroine.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1003"><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/antihero/" rel="noopener" target="_blank"><span data-dcnode-id="1006" instrument_node="">The protagonist</span></a><span data-dcnode-id="1004" instrument_node=""> must have:</span></p><span data-dcnode-id="1002" instrument_node="">
</span><ul data-dcnode-id="988"><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">redeemable flaws</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">potentially heroic qualities that emerge in the climax</span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">a </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/character-arc/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="993" instrument_node="">character arc</span></a><span data-dcnode-id="991" instrument_node=""> (he must be different, better, stronger by the end)</span></li><span data-dcnode-id="989" instrument_node="">
</span></ul><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Resist the temptation to create a perfect lead. Perfect is boring. (Even Indiana Jones suffered a snake phobia.)</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">You also need an antagonist, </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/what-makes-a-good-villain/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="982" instrument_node="">the villain</span></a><span data-dcnode-id="980" instrument_node="">, who should be every bit as formidable and compelling as your hero.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Don’t make your bad guy bad just because he’s the bad guy. Make him a worthy foe by giving him motives for his actions.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="971"><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/antivillain/" rel="noopener" target="_blank"><span data-dcnode-id="974" instrument_node="">Villains</span></a><span data-dcnode-id="972" instrument_node=""> don’t see themselves as bad. They think they’re right! A fully rounded bad guy is much more realistic and memorable.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">Depending on the </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-many-words-in-a-novel/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="968" instrument_node="">length of your story</span></a><span data-dcnode-id="966" instrument_node="">, you may also need important orbital cast members.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">For each character, ask:</span></p><span data-dcnode-id="961" instrument_node="">
</span><ul data-dcnode-id="950"><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">What do they want?</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">What or who is keeping them from getting it?</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">What will they do about it?</span></li><span data-dcnode-id="951" instrument_node="">
</span></ul><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">The more challenges your characters face, the more relatable they are.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Much as in real life, the toughest challenges result in the most transformation.</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="940"><b data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">3. Setting</span></b></h3><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Setting may include a location, time, or era, but it should also include how things look, smell, taste, feel, and sound.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="935" instrument_node="">Thoroughly </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/novel-research/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="934" instrument_node="">research details</span></a><span data-dcnode-id="932" instrument_node=""> about </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/worldbuilding/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="931" instrument_node="">your setting</span></a><span data-dcnode-id="929" instrument_node=""> so it informs your writing, but use those details as seasoning, not the main course. The main course is the story.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">But, beware.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">Agents and acquisitions editors tell me one of the biggest mistakes </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-become-a-better-writer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="922" instrument_node="">beginning writers</span></a><span data-dcnode-id="920" instrument_node=""> make is feeling they must begin by describing the setting.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">That’s important, don’t get me wrong. But a sure way to put readers to sleep is to promise a thrilling story on the cover—only to start with some variation of:</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="912"><i data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The house sat in a deep wood surrounded by…</span></i></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Don’t.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Rather than describing your setting, subtly layer it into the story.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="896"><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/show-dont-tell/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Show </span></i><span data-dcnode-id="902" instrument_node="">readers your setting. Don’t </span><i data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">tell </span></i><span data-dcnode-id="899" instrument_node="">them.</span></a><span data-dcnode-id="897" instrument_node=""> Description as a separate element slows your story to crawl.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">By layering in what things look and feel and sound like you subtly register the setting in the theater of readers’ minds.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="891" instrument_node="">While they concentrating on the action, the </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-dialogue/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="890" instrument_node="">dialogue</span></a><span data-dcnode-id="888" instrument_node="">, the </span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/story-tension/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="887" instrument_node="">tension</span></a><span data-dcnode-id="885" instrument_node="">, the drama, and </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/internal-and-external-conflict/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="884" instrument_node="">conflict</span></a><span data-dcnode-id="882" instrument_node=""> that keep them turning the pages, they’re also getting a look and feel for your setting.</span></p><span data-dcnode-id="880" instrument_node="">
</span><h3 data-dcnode-id="877"><b data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">4. Point of View</span></b></h3><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="875" instrument_node="">POV is more than which </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/voice-in-writing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="874" instrument_node="">voice</span></a><span data-dcnode-id="872" instrument_node=""> you choose to tell your story: First Person (</span><i data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">I, me</span></i><span data-dcnode-id="869" instrument_node="">), Second Person (</span><i data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">you, your</span></i><span data-dcnode-id="866" instrument_node="">), or Third Person (</span><i data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">he, she, or it</span></i><span data-dcnode-id="863" instrument_node="">).</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Determine your perspective (POV) character for each scene—the one who serves as your camera and recorder—by deciding who has the most at stake. Who’s story is this?</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The cardinal rule is that you’re limited to one perspective character per scene, but I prefer only one per chapter, and ideally one per novel.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Readers experience everything in your story from this character’s perspective.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="851" instrument_node="">For a more in-depth explanation of Voice and POV, read </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/point-of-view/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="850" instrument_node="">A Writer’s Guide to Point of View</span></a><span data-dcnode-id="848" instrument_node="">.</span></p><span data-dcnode-id="846" instrument_node="">
</span><h3 data-dcnode-id="843"><b data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">5. A Plot</span></b></h3><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="838"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/plot-of-a-story/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="841" instrument_node="">This is the sequence of events that make up a story</span></a><span data-dcnode-id="839" instrument_node="">—in short, what happens. It either compels your reader to keep turning pages or set the book aside.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">A successful story answers:</span></p><span data-dcnode-id="834" instrument_node="">
</span><ol data-dcnode-id="822"><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="829"><i data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">What happens?</span></i><span data-dcnode-id="830" instrument_node=""> (Plot)</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="824"><i data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">What does it mean? </span></i><span data-dcnode-id="825" instrument_node="">(Theme: see above)</span></li><span data-dcnode-id="823" instrument_node="">
</span></ol><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Writing coaches call various </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/story-structures/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="819" instrument_node="">story structures</span></a><span data-dcnode-id="817" instrument_node=""> by different names, but they’re all largely similar. All such structures include some variation of:</span></p><span data-dcnode-id="815" instrument_node="">
</span><ul data-dcnode-id="798"><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">An Opener</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">An Inciting Incident that changes everything</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">A series of Crises that build tension</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">A Climax</span></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">A Resolution (or Conclusion)</span></li><span data-dcnode-id="799" instrument_node="">
</span></ul><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">How effectively you create drama, intrigue, conflict, and tension, determines whether you can grab readers from the start and keep them to the end.</span></p><span data-dcnode-id="794" instrument_node="">
</span><h3 data-dcnode-id="791"><b data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">6. Conflict</span></b></h3><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">This is the engine of fiction and crucial to effective </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/creative-nonfiction/" rel="noopener" target="_blank"><span data-dcnode-id="788" instrument_node="">nonfiction</span></a><span data-dcnode-id="786" instrument_node=""> as well.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">Readers crave </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/types-of-conflict/" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">conflict</span></a><span data-dcnode-id="780" instrument_node=""> and what results from it.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">If everything in your plot is going well and everyone is agreeing, you’ll quickly bore your reader—the cardinal sin of writing.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">If two characters are chatting amiably and the scene feels flat (which it will), inject conflict. Have one say something that makes the other storm out, revealing a deep-seated rift.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Readers will stay with you to find out what it’s all about.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h3 data-dcnode-id="766"><b data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">7. Resolution</span></b></h3><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Whether you’re an </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-outline-a-book/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="763" instrument_node="">Outliner</span></a><span data-dcnode-id="761" instrument_node=""> or a Pantser like me (one who writes by the seat of your pants), you must have an idea where your story is going.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">How you expect the story to end should inform every scene and chapter. It may change, evolve, and grow as you and </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/types-of-characters/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="757" instrument_node="">your characters</span></a><span data-dcnode-id="755" instrument_node=""> do, but never leave it to chance.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Keep your </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/character-archetypes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="751" instrument_node="">lead character</span></a><span data-dcnode-id="749" instrument_node=""> center stage to the very end. Everything he learns through all the complications you plunged him into should, in the end, allow him to rise to the occasion and succeed.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">If you get near the end and something’s missing, don’t rush it. Give your ending a few days, even a few weeks if necessary.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">Read through everything you’ve written. Take a long walk. Think about it. Sleep on it. Jot notes. Let your subconscious work. Play what-if games. Reach for the heart, and deliver a </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-end-a-story/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="742" instrument_node="">satisfying ending that resonates</span></a><span data-dcnode-id="740" instrument_node="">.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Give your readers a payoff for their investment by making it unforgettable.</span></p><span data-dcnode-id="735" instrument_node="">
</span><div class="jj-thrive-shortcode-wrapper" data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">
</span><span class="tve-leads-two-step-trigger tl-2step-trigger-9581" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Need help writing your novel? Click here to download my 12-step guide to writing a novel.</span></span><span data-dcnode-id="731" instrument_node=""> </span></div><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Creative Writing Examples</span></h2><span data-dcnode-id="726" instrument_node="">
</span><ul data-dcnode-id="682"><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Novel</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Novella</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Short Story</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Narrative nonfiction</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Biography</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Autobiography</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Memoir</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Poetry</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Song lyrics</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Speech</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Blog</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Journaling</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Screenwriting</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Playwriting</span></li><span data-dcnode-id="683" instrument_node="">
</span></ul><span data-dcnode-id="681" instrument_node="">
</span><h2 data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Creative Writing Tips</span></h2><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">In </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="676" instrument_node="">How to Write a Novel</span></a><span data-dcnode-id="674" instrument_node="">, I cover each step of the writing process:</span></p><span data-dcnode-id="672" instrument_node="">
</span><ol data-dcnode-id="622"><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="667"><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="670" instrument_node="">Come up with a great story idea</span></a><span data-dcnode-id="668" instrument_node="">.</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p2" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="665" instrument_node="">Determine whether you’re an Outliner or a Pantser.</span></a></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="659"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p3" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="661" instrument_node="">Create an unforgettable main character.</span></a></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="655"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p4" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="657" instrument_node="">Expand your idea into a plot.</span></a></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="651"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p5" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="653" instrument_node="">Do your research.</span></a></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="647"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="649" instrument_node="">Choose your Voice and Point of View.</span></a></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="640"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p7" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="645" instrument_node="">Start </span><i data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">in medias res</span></i><span data-dcnode-id="642" instrument_node=""> (in the midst of things).</span></a></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="636"><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p9" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="638" instrument_node="">Intensify your main character’s problems.</span></a></li><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="632"><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p10" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="634" instrument_node="">Make the predicament appear hopeless.</span></a></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="628"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p11" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="630" instrument_node="">Bring it all to a climax.</span></a></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="624"><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-novel/%23p12" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="626" instrument_node="">Leave readers wholly satisfied.</span></a></li><span data-dcnode-id="623" instrument_node="">
</span></ol><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">More to Think About</span></h2><span data-dcnode-id="618" instrument_node="">
</span><h2 data-dcnode-id="610"><b data-dcnode-id="616" style="font-size: 16px;"><span data-dcnode-id="617" instrument_node="">1. Carry a writing pad, electronic or otherwise. I like the famous </span></b><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/8883701127/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Djerrjenk-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D8883701127%26linkId%3Dd819091dd6ea0042f851809f78dfc05a" rel="noopener noreferrer" style="font-size: 16px;" target="_blank"><b data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Moleskine™ notebook</span></b></a><b data-dcnode-id="611" style="font-size: 16px;"><span data-dcnode-id="612" instrument_node="">.&nbsp;</span></b></h2><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Ideas can come at any moment. Record ideas for:</span></p><span data-dcnode-id="606" instrument_node="">
</span><ul data-dcnode-id="583"><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Characters</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Settings</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Plot</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Twists</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Dialogue</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">Anything that might </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/story-arc/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="588" instrument_node="">expand your story</span></a><b data-dcnode-id="586"></b></li><span data-dcnode-id="584" instrument_node="">
</span></ul><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="579"><b data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">2. Start small.&nbsp;</span></b></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="577" instrument_node="">Take time to build your craft and hone </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/writing-skills/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="576" instrument_node="">your skills</span></a><span data-dcnode-id="574" instrument_node=""> on smaller projects </span><i data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">before</span></i><span data-dcnode-id="571" instrument_node=""> you try to </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-a-book/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="570" instrument_node="">write a book</span></a><span data-dcnode-id="568" instrument_node="">.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">Journal. Write a newsletter. Start a blog. </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/how-to-write-short-stories/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="564" instrument_node="">Write short stories</span></a><span data-dcnode-id="562" instrument_node="">. Submit articles to magazines, newspapers, or e-zines.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">Take a night school or </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/online-creative-writing-courses/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="558" instrument_node="">online course</span></a><span data-dcnode-id="556" instrument_node=""> in journalism or creative writing. Attend a writers conference.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="551"><b data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">3. Throw perfection to the wind.&nbsp;</span></b></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">Separate your writing from your </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jerryjenkins.com/self-editing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="548" instrument_node="">editing</span></a><span data-dcnode-id="546" instrument_node="">.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Anytime you’re writing a first draft, take off your perfectionist cap. You can return to editor mode to your heart’s content while revising, but for now, just write the story.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Separate these tasks and watch your daily production soar.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h2 data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Time to Get to Work</span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Few pleasures in life compare to getting lost in a great story.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Learn how to write creatively, and the characters you birth have the potential to live in hearts for years.</span></p><span data-dcnode-id="529" instrument_node="">
