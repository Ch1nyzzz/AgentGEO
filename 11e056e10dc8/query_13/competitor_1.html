</span><div class="entry-content" data-dcnode-id="793"><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Suspense is a critical aspect of writing crime fiction. All the elements outlined below can help to increase suspense over the course of your novel:</span></p><span data-dcnode-id="1033" instrument_node="">
</span><h2 data-dcnode-id="1031" id="create-suspense-in-crime-via-conflict"><span data-dcnode-id="1032" instrument_node="">Create suspense in crime via conflict</span></h2><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Suspense arises from conflict. Before you can effectively create suspense throughout your crime novel, you need to </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/man-vs-nature-conflict-in-fiction/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">have a handle on its central conflict</span></a><span data-dcnode-id="1026" instrument_node="">. The main question of your novel might be answering who the murderer of a character was. You can use this question and the tension it creates as a starting point for building suspense.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Branching out from your major conflict, there may be smaller conflicts that also create tension. The investigator may interview two suspects, for example, who hate one another. Each might imply that the other may have been involved. Suspense may be built around efforts to cover up unsavoury facts about the deceased. Suspense may also be generated as the investigative protagonist gets closer to the answer since this places her life in danger.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1019" id="choose-a-timeframe-that-adds-urgency"><span data-dcnode-id="1020" instrument_node="">Choose a timeframe that adds urgency</span></h2><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1017" instrument_node="">Unfolding your novel within a tight time frame is one of the best methods for building suspense. Whether your protagonist is in a 24-hour race against time like Robert Langdon in&nbsp;</span><em data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The Da Vinci Code</span></em><span data-dcnode-id="1014" instrument_node="">&nbsp;or has all of 61 hours to save the day like Jack Reacher in the Lee Child novel&nbsp;</span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">61 Hours</span></em><span data-dcnode-id="1011" instrument_node="">, putting your protagonist on a ticking clock will likely make readers turn pages.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">There are a few pitfalls to be cautious of in a time-focused approach to writing crime fiction. One is that effective suspense requires some let-up. If you’ve ever been through an extended period of very high stress, you know that there comes a point where you begin to disengage from the situation to reduce stress. The same thing can happen with fiction. It’s seldom effective to sustain a constant mood of highest-level suspense for the entire duration of a novel. Giving your protagonist a short period of time to solve a problem is an excellent approach to building suspense but be sure to create contrasts. Downtime gives readers a chance to catch their breath. It can even lull them into a false sense of security as you prepare the next surprise that will leave them even more interested and invested.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">The other issue you must deal with is the implication of having something unfold in a short period of time. If your protagonist is on the run for 48 hours, is there time to eat or sleep? If not, what effect will this have? Be sure that you do not push beyond your readers’ suspension of disbelief.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Giving your character a limited amount of time to solve a problem is a great way to build suspense, but you can place constraints on your character that increase tension in other ways as well:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><h2 data-dcnode-id="998" id="explore-other-limits-and-constraints"><span data-dcnode-id="999" instrument_node="">Explore other limits and constraints</span></h2><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="996" instrument_node="">Writing crime fiction that transpires in a limited </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">physical</span></em><span data-dcnode-id="993" instrument_node=""> space is another effective way to create tension. Stephen King does this in some of his novels: in </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Cujo</span></em><span data-dcnode-id="990" instrument_node="">, a woman and her son are trapped in a car by a rabid dog, and in </span><em data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Gerald’s Game</span></em><span data-dcnode-id="987" instrument_node=""> a woman is handcuffed to a bed. The central characters in Elizabeth Engstrom novel&nbsp;</span><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Lizard Wine</span></em><span data-dcnode-id="984" instrument_node=""> are snowbound in a car with a dangerous ex-convict.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">You can challenge your character in other ways, too. The protagonist of King’s&nbsp;</span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The Girl Who Loved Tom Gordon</span></em><span data-dcnode-id="978" instrument_node="">&nbsp;is lost in the woods. What happens if your protagonist is in a foreign country where they cannot speak the language, or has run out of money? By reducing the options available to your main character, you will build suspense.</span></p><span data-dcnode-id="976" instrument_node="">
</span><h2 data-dcnode-id="974" id="incorporate-crime-complicating-red-herrings"><span data-dcnode-id="975" instrument_node="">Incorporate crime-complicating red herrings</span></h2><span data-dcnode-id="973" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="969"><figure class="alignleft" data-dcnode-id="970"><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel.jpg"><img alt="writing crime fiction - chalk outline of victim" class="wp-image-3395" data-dcnode-id="972" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-200x300.jpg&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-200x300.jpg 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-683x1024.jpg 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-610x915.jpg 610w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-267x400.jpg 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-233x350.jpg 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-480x720.jpg 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel-100x150.jpg 100w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/writing-crime-fiction-chalk-outline-Now-Novel.jpg 735w" width="200"></a></figure></div><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">‘Red herrings’ are clues that intentionally mislead readers, and they can be used to great effect in writing crime fiction. For example, one red herring may involve the murderer’s identity. David Lynch’s cult TV show </span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Twin Peaks</span></em><span data-dcnode-id="964" instrument_node=""> made masterful use of this method. If you have created several plausible suspects, the reader may become particularly engrossed when the protagonist is alone with any of them.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">You might plan your red herrings so that there are a number of potential alternatives answers. If you just have one red herring, the savvy suspense fan might see it coming, but if you include multiple ones, you can keep readers guessing.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Red herrings do not just relate to murder suspects. Almost anything can be a red herring including a piece of information or a situation. For example, you can create a series of red herrings as a protagonist is walking down a street at night. The protagonist might think a man is following her but he ends up entering a local restaurant. A short while later she might think she hears his footsteps again but it’s only a piece of newspaper scudding behind her.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Red herrings can work with other elements to increase suspense:</span></p><span data-dcnode-id="953" instrument_node="">
</span><h2 data-dcnode-id="951" id="create-atmosphere-and-mood-with-foreshadowing"><span data-dcnode-id="952" instrument_node="">Create atmosphere and mood with foreshadowing</span></h2><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Foreshadowing involves suggestions of things that may happen. It may be direct or indirect. For example, an example of indirect foreshadowing might be the protagonist’s arrival at a house during a terrible storm (a well-known cliché). The storm is a suggestion of the terrible experience the protagonist will have when a crime is committed at the house.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">Foreshadowing </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allwritefictionadvice.blogspot.com/2012/06/art-of-foreshadowing.html"><span data-dcnode-id="945" instrument_node="">can take other forms as well</span></a><span data-dcnode-id="943" instrument_node="">. For example, characters can be given information that acts as foreshadowing. This information might be misleading, or not. The protagonist might learn that one character served a lengthy prison sentence for a violent crime, and this may end up being a red herring intended to misdirect the reader’s attention away from the actual perpetrator of the crime. Another more direct type of foreshadowing would be one character learning that another has a terrible secret.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">You can </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/use-tone-mood-make-novel-richer/" rel="noopener" target="_blank"><span data-dcnode-id="939" instrument_node="">use atmosphere and mood can to great effect</span></a><span data-dcnode-id="937" instrument_node=""> creating suspense. Examples: An oppressive atmosphere in an old house where a murder has taken place; a gloomy deserted urban street or country lane, or a tense police precinct where everyone is on edge as a killer threatens to strike again.</span></p><span data-dcnode-id="935" instrument_node="">
</span><h2 data-dcnode-id="933" id="keep-raising-the-stakes"><span data-dcnode-id="934" instrument_node="">Keep raising the stakes</span></h2><span data-dcnode-id="932" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="928"><figure class="alignright" data-dcnode-id="929"><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes.jpg"><img alt="writing crime fiction - high stakes - police line do not cross" class="wp-image-3397" data-dcnode-id="931" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-200x300.jpg&amp;raw" srcset="https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-200x300.jpg 200w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-683x1024.jpg 683w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-610x915.jpg 610w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-267x400.jpg 267w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-233x350.jpg 233w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-480x720.jpg 480w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes-100x150.jpg 100w, https://www.nownovel.com/blog/wp-content/uploads/2015/06/Writing-crime-fiction-writing-crime-scenes.jpg 735w" width="200"></a></figure></div><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Things that are at stake must be crucial. This might be a character’s life or livelihood, a long-held dream or something else, but it cannot be unimportant. Furthermore, over the course of the novel, the stakes must go up rather than stay the same or decrease. For example, a crime novel might begin with a police detective being given a murder case. Over the course of the novel, the detective’s job could start to rest on solving this single crime, and the detective’s marriage might begin to suffer. The stakes become higher than the initial motivations for solving the crime.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">Another example of raising stakes: an amateur detective starts out interested in solving a crime. Over time, the protagonist’s loved ones might become potential targets of the antagonist. This format of raising stakes was used successfully by the writers of Showtime’s crime thriller series </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Dexter</span></em><span data-dcnode-id="920" instrument_node="">. Suddenly the protagonist’s action have much higher stakes.</span></p><span data-dcnode-id="918" instrument_node="">
</span><h2 data-dcnode-id="916" id="honor-the-unwritten-contract-with-your-reader"><span data-dcnode-id="917" instrument_node="">Honor the unwritten contract with your reader</span></h2><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">You can only build suspense if the reader trusts you to play fair. Build the reader’s trust by fulfilling any promises that you make throughout the book. This means you must follow through on any major set-ups. This might feel tricky in the context of red herrings, but red herrings are not so much meant to trick as to mislead readers. In other words, red herrings should always have an alternate explanation so that the reader does not feel cheated. Anti-climax has been used by many writers effectively, but you should weigh departing from common genre expectations against the possible displeasure of readers.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">If you spend a lot of time on some detail so that it seems like it is going to be significant and then you abandon it, your reader may feel frustrated. On the other hand, if you show your reader early on that your set-ups pay off, then you can build suspense with longer and more complex set-ups with story arcs across the entire book (or series) and sustain your reader’s interest throughout.</span></p><span data-dcnode-id="909" instrument_node="">
</span><h2 data-dcnode-id="907" id="create-stronger-characters"><span data-dcnode-id="908" instrument_node="">Create stronger characters</span></h2><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">All of this foreshadowing and suspense-building does little if the reader does not care about what happens in the climax of your novel. The best way to make sure that the reader cares is by creating strong characters that are real to the reader. When characters feel real, the reader will care what happens to them and about the suspenseful situations they encounter. Characters’ behaviour should seem reasonably plausible to the reader.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Building suspense requires mastering a number of writing techniques. It also requires making sure that you have engaging characters whose challenges matter to them and to your readers. Suspense needs conflict and drama to grow. Compressing time or limiting the character’s freedom or means in some other way can help build suspense. Planting false clues via red herrings that leave the reader and characters unsure as to who can be trusted is also effective. Authors writing crime fiction must create strong motivation for readers to invest in seeing suspenseful setups through to their conclusion.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Itching to start writing your crime novel? </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nownovel.com/users/sign_up" rel="noopener" target="_blank"><span data-dcnode-id="898" instrument_node="">Sign up today</span></a><span data-dcnode-id="896" instrument_node=""> and use our easy novel-writing process and enjoy helpful critiques as you progress.</span></p><span data-dcnode-id="894" instrument_node="">
