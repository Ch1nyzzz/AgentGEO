</span><h2 data-dcnode-id="4093" id="section---SuspenseInLiterature"><span data-dcnode-id="4094" instrument_node=""> Suspense in Literature</span></h2><p data-dcnode-id="4089"><b data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Suspense</span></b><span data-dcnode-id="4090" instrument_node=""> is a literary strategy or technique employed to heighten the emphasis or excitement of the conflict's resolution. In a story, suspense toys with the reader's expectations and curiosity while simultaneously serving the purpose of giving the ending (or the solution of the given conflict) a stronger emotive impact after its timely arrival. In other words, suspense mostly results from the author withholding plot details or suggestively emphasizing others to entice, confuse, or otherwise stress the reader. </span></p><h3 data-dcnode-id="4087" id="section---TheDifferenceBetweenSuspenseMysteryAndSurprise"><span data-dcnode-id="4088" instrument_node=""> The Difference Between Suspense, Mystery, and Surprise</span></h3><p data-dcnode-id="4076"><span data-dcnode-id="4086" instrument_node="">Suspense in this regard is not to be confused with the movie genre Suspense, which is commonly referred to interchangeably with that of Mystery. However, in literature, mystery, and suspense, though still intertwined, are different elements. </span><b data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Mystery</span></b><span data-dcnode-id="4083" instrument_node="">, if not as a literary genre itself, is an element of </span><b data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">atmosphere</span></b><span data-dcnode-id="4080" instrument_node=""> that sometimes uses </span><b data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">dramatic irony</span></b><span data-dcnode-id="4077" instrument_node=""> making certain things very obvious to the reader, but the characters involved are completely oblivious. </span></p><p data-dcnode-id="4075"></p><p data-dcnode-id="4071"><span data-dcnode-id="4074" instrument_node=""> </span><span data-dcnode-id="4073"></span><span data-dcnode-id="4072" instrument_node=""> </span></p><span data-dcnode-id="4070" instrument_node="">

025" instrument_node=""> </span></p><span data-dcnode-id="4023" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="4013" rowspan="1"><span data-dcnode-id="4020" instrument_node=""> </span><p data-dcnode-id="4015"><span data-dcnode-id="4019" instrument_node=""> </span><span data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">Generates anxiety and stimulates anticipation.</span></span><span data-dcnode-id="4016" instrument_node=""> </span></p><span data-dcnode-id="4014" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="4004" rowspan="1"><span data-dcnode-id="4011" instrument_node=""> </span><p data-dcnode-id="4006"><span data-dcnode-id="4010" instrument_node=""> </span><span data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Develops confusion and intrigue by lacking details and information. Flat characters.</span></span><span data-dcnode-id="4007" instrument_node=""> </span></p><span data-dcnode-id="4005" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="3995" rowspan="1"><span data-dcnode-id="4002" instrument_node=""> </span><p data-dcnode-id="3997"><span data-dcnode-id="4001" instrument_node=""> </span><span data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Shocks the reader. Unexpected, random. Otherworldly and/or out-of-the-ordinary.</span></span><span data-dcnode-id="3998" instrument_node=""> </span></p><span data-dcnode-id="3996" instrument_node=""> </span></td></tr><tr data-dcnode-id="3954"><td colspan="1" data-dcnode-id="3983" rowspan="1"><span data-dcnode-id="3990" instrument_node=""> </span><p data-dcnode-id="3985"><span data-dcnode-id="3989" instrument_node=""> </span><span data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Description</span></span><span data-dcnode-id="3986" instrument_node=""> </span></p><span data-dcnode-id="3984" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="3974" rowspan="1"><span data-dcnode-id="3981" instrument_node=""> </span><p data-dcnode-id="3976"><span data-dcnode-id="3980" instrument_node=""> </span><span data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">Listed sensory details. Time-sensitive or situation-relative.</span></span><span data-dcnode-id="3977" instrument_node=""> </span></p><span data-dcnode-id="3975" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="3965" rowspan="1"><span data-dcnode-id="3972" instrument_node=""> </span><p data-dcnode-id="3967"><span data-dcnode-id="3971" instrument_node=""> </span><span data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Ominous atmosphere: lurking in shadows; dubious dialogue.</span></span><span data-dcnode-id="3968" instrument_node=""> </span></p><span data-dcnode-id="3966" instrument_node=""> </span></td><td colspan="1" data-dcnode-id="3956" rowspan="1"><span data-dcnode-id="3963" instrument_node=""> </span><p data-dcnode-id="3958"><span data-dcnode-id="3962" instrument_node=""> </span><span data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">Grotesque shock value; hideousness or disgust.</span></span><span data-dcnode-id="3959" instrument_node=""> </span></p><span data-dcnode-id="3957" instrument_node=""> </span></td></tr></tbody></table><p data-dcnode-id="3946"><span data-dcnode-id="3949" instrument_node=""> </span><span data-dcnode-id="3948"></span><span data-dcnode-id="3947" instrument_node=""> </span></p><p data-dcnode-id="3945"></p><p data-dcnode-id="3937"><span data-dcnode-id="3944" instrument_node="">Given the nature of mystery, it further blinds the divide between suspense. Nevertheless, keep in mind that mystery deals with the lack of information or information that has not yet been revealed that is usually equally unbeknownst to the reader and the characters. At the same time, suspense usually exposes just enough information to the reader to evoke an emotional response to a situation unknown to the character(s). A </span><b data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">surprise</span></b><span data-dcnode-id="3941" instrument_node=""> element is one akin to "jump scares" in Horror movies, one meant to catch you off guard in the same way as a </span><b data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">non-sequitur</span></b><span data-dcnode-id="3938" instrument_node=""> (something so random or out-of-place you wouldn't expect to see it or hear it next) is meant to make people laugh. </span></p><p data-dcnode-id="3932"><span data-dcnode-id="3936" instrument_node="">In the Horror classic </span><i data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Psycho</span></i><span data-dcnode-id="3933" instrument_node=""> by the 'Master of Suspense' Alfred Hitchcock, there is a mystery when Norman Bates mentions his mother and how he talks about her and his ideology of what a mother-son relationship should be, but we don't yet meet or see the mother. There's a mystery behind the mother created here. This mystery creates suspense (in this case, anxiety behind not knowing this mother he's talking about) which is built on by showing the mother only in shadows, not revealing what she looks like. Hitchcock further creates suspense by the things the mysterious mother says and how she sounds. Finally, the suspense unfolds in a shocking surprise "jump scare" when the mother is finally revealed. As both Hitchcock and Stephen King put it, surprise depends on the visual or unexpected, the nasty, disfigured, grotesque, disgusting, repulsive, revolting, cringing, among others. </span></p><span data-dcnode-id="3931" instrument_node="">
</span></article><span data-dcnode-id="3929" instrument_node="">

</span><h2 data-dcnode-id="3494" id="section---TypesOfSuspense"><span data-dcnode-id="3495" instrument_node=""> Types of Suspense</span></h2><h4 data-dcnode-id="3492" id="section---DramaticIrony"><span data-dcnode-id="3493" instrument_node="">Dramatic Irony</span></h4><p data-dcnode-id="3487"><span data-dcnode-id="3491" instrument_node="">Although not exclusive to suspense, dramatic irony is also commonly used for comedic purposes. Dramatic irony is the backbone of suspense, for it implies that the reader knows something the character doesn't. For instance, when a character goes into the very same room, the killer just walked into. This concept was hilariously parodied in the film </span><i data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Scary Movie</span></i><span data-dcnode-id="3488" instrument_node=""> when the killer is trying to toy with his victim, but she can see his boots under the drapes, and she says, "Oh, no, Mr. Killer, I have no idea where you are." </span></p><h4 data-dcnode-id="3485" id="section---Cliffhanger"><span data-dcnode-id="3486" instrument_node="">Cliffhanger</span></h4><p data-dcnode-id="3480"><span data-dcnode-id="3484" instrument_node="">A cliffhanger is when the author leaves the reader in the middle of a stressful and intense action sequence without revealing the outcome of the characters involved. The term originated from one of Thomas Hardy's serialized releases in which one issue ended with one of his characters hanging from a cliff. However, the pioneer of this type of suspense was the great Charles Dickens all the way back in the 19th. Century around the 1840s. Dickens serialized novels were famous for pausing in the middle of action sequences or an important reveal. This is arguably the most common and widely-used type of suspense, popular in television and movie series such as the </span><i data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Back to the Future</span></i><span data-dcnode-id="3481" instrument_node=""> series who's sequel famously ended with "To be continued," a phrase quite popular during the golden age of TV but still popular today. </span></p><h4 data-dcnode-id="3478" id="section---MacGuffin"><span data-dcnode-id="3479" instrument_node="">MacGuffin</span></h4><p data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">A MacGuffin is more of a film term than a literary term. This is an object whose actual importance is never discussed in detail, if at all, yet this object is what drives the whole plot. This could be acquiring the item, delivering the item, discovering the item, fixing the item, among others. Still, all we know is that something bad will happen due to any misapprehension or misuse of the item. </span></p><p data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">Some classic examples of this suspense include 'The Purloined Letter' by Edgar Allan Poe; this short story is about a high-class individual who fears her reputation is at stake if the contents of a letter that has been stolen are revealed. She hires a detective to track the letter down, but the seriousness of its content isn't the focus of the story. </span></p><p data-dcnode-id="3469"><span data-dcnode-id="3473" instrument_node="">Another example is the classic </span><i data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">The Maltese Falcon</span></i><span data-dcnode-id="3470" instrument_node=""> in which the titular object, a rare collector's item, is desired by many, and a detective is hired to track it down and ensure its safe passage into the hands of those who requested it. </span></p><p data-dcnode-id="3461"><span data-dcnode-id="3468" instrument_node="">Similarly, in the now-classic film, </span><i data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Pulp Fiction</span></i><span data-dcnode-id="3465" instrument_node=""> by </span><b data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">in media res</span></b><span data-dcnode-id="3462" instrument_node=""> (starting the story in the middle of the action), specialist Quentin Tarantino depicts the importance of two mob henchmen acquiring a black briefcase with some mysterious object inside it that emits a powerful golden light. All the spectator ever knows is that the briefcase and its contents belong to a mob boss, and it must be returned to him, but a heap of problems ensues in the process. </span></p><h4 data-dcnode-id="3459" id="section---InMediaRes"><span data-dcnode-id="3460" instrument_node="">In Media Res</span></h4><p data-dcnode-id="3445"><span data-dcnode-id="3458" instrument_node="">This suspense is created by starting in the middle of the action and slowly filling the reader in with what is happening through flashbacks and/or flash-forwards or the regular storytelling. This type of suspense is popular in crime novels and TV shows by starting the plot with the crime already in process and/or the victims already suffering. One such example is another classic by Edgar Allan Poe, 'The Murders in the Rue Morgue' that begins in the middle of the narrator's train of thought and quickly shifts to recounting the most horrific and unexplainable murders. What ensues is detective work, canvassing witnesses and putting together clues. Suspense in this story is created around the </span><b data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">mystery</span></b><span data-dcnode-id="3455" instrument_node=""> of the </span><i data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">unknown</span></i><span data-dcnode-id="3452" instrument_node=""> assailant(s) and the </span><b data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">surprising</span></b><span data-dcnode-id="3449" instrument_node=""> facts of the case: the perpetrator evidently spoke multiple languages, some heard what sounded like Spanish, others what sounded like German, but there was only one voice, and they described only one figure, an otherworldly silhouette of a human but too large to be a normal person, among other </span><b data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">mysterious</span></b><span data-dcnode-id="3446" instrument_node=""> features. </span></p><h2 data-dcnode-id="3443" id="section---HowDoAuthorsCreateSuspense"><span data-dcnode-id="3444" instrument_node=""> How Do Authors Create Suspense?</span></h2><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">There are several ways to create suspense. </span></p><span data-dcnode-id="3440" instrument_node="">
</span><div class="hidden" data-dcnode-id="3371" ng-non-bindable=""><ul data-dcnode-id="3432"><span data-dcnode-id="3439" instrument_node="">
</span><li data-dcnode-id="3434"><span data-dcnode-id="3438" instrument_node="">Some of the basic ones are to one-by-one introduce sensory imagery without further detail: "As I approached my front door, I noticed muddy footprints on the floor. I looked around but saw no one. A loud thud came from inside the house." The unofficial G.O.A.T. Edgar Allan Poe masterfully created suspense in his legendary short story "The Pit and the Pendulum" by building up time-sensitive momentum around the mystery of a falling pendulum that will surely cut its victim in half. The mystery here lies in that the victim cannot see the pendulum fall for most of the time. He can only hear it, whooshing and hissing closer and closer, knowing only that it is because it gets louder, and he begins feeling the slight gusts of wind it creates in the scorching hot room as the walls are closing in. This story is considered the pioneer of such suspense used in iconic storylines such as </span><i data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Star Wars: A New Hope</span></i><span data-dcnode-id="3435" instrument_node=""> where the heroes are threatened with being crushed in the trash compacter. Though the groundbreaking method was previously used in 'The Iron Shroud' by William Mudford, Poe's popularity led to the "contracting room's" widespread use. </span></li><span data-dcnode-id="3433" instrument_node="">
</span></ul><p data-dcnode-id="3429"><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node=""> </span></p><ul data-dcnode-id="3418"><span data-dcnode-id="3428" instrument_node="">
</span><li data-dcnode-id="3420"><span data-dcnode-id="3427" instrument_node="">Gradual sensory details are so important to building suspense; this can be seen in movies. The film's score the music (usually classical) that plays in the background of the movie) serves to reflect the tension of what happens on-screen. In the classic film </span><i data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Jaws</span></i><span data-dcnode-id="3424" instrument_node="">, suspense is created by giving the audience the point-of-view of the coming shark, unbeknownst to the victim's (dramatic irony), as the score sounds it's iconic two-note horns that get faster and faster the closer the shark get until it pounces. In the previously mentioned </span><i data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Psycho</span></i><span data-dcnode-id="3421" instrument_node=""> the score also supports both suspense and surprise. When the mother strikes the knife into the woman in the shower, the score equally violently strikes the strings in the sharpest, most shrill octave possible. Another common technique of gradual sensory details used in movies is showing you a shot of an empty hallway...look again, looks like there's something there...look again, the presence of something is not only confirmed but is closer than it was. </span></li><span data-dcnode-id="3419" instrument_node="">
</span></ul><h2 data-dcnode-id="3416" id="section---SuspenseExamples"><span data-dcnode-id="3417" instrument_node=""> Suspense Examples</span></h2><p data-dcnode-id="3415"></p><span data-dcnode-id="3414" instrument_node="">
</span><span data-dcnode-id="3408" instrument_node="">
</span><span data-dcnode-id="3407" instrument_node="">
</span><span data-dcnode-id="3406" instrument_node="">
</span><span data-dcnode-id="3403" instrument_node="">
</span><span data-dcnode-id="3401" instrument_node="">
</span><span data-dcnode-id="3399" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3398"><caption align="bottom" data-dcnode-id="3409"><span data-dcnode-id="3413" instrument_node="">
</span><p data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">A portion of the cover of the TV adaptation of Poe</span></p><span data-dcnode-id="3410" instrument_node="">
</span></caption><tbody data-dcnode-id="3400"><tr data-dcnode-id="3402"><td data-dcnode-id="3404"><img alt="" data-dcnode-id="3405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/pitpendulum.0017461721930264078852.jpeg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3397"></p><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">"The vibration of the pendulum was at right angles to my length. I saw that the crescent was designed to cross the region of the heart. It would fray the serge of my robe--it would return and repeat its operations--again--and again. Notwithstanding its terrifically wide sweep (some thirty feet or more), and the hissing vigor of its descent, sufficient to sunder these very walls of iron, still, the fraying of my robe would be all that, for several minutes, it would accomplish." </span></p><p data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">Notice the alliterative nature of the use of the 's' sound to highlight the "hissing" of the pendulum as it swings down. Notice how he ends the paragraph with an "ish" sound as in "squish" the sound his entrails are doomed to make if the pendulum reaches his body. </span></p><p data-dcnode-id="3388"><span data-dcnode-id="3392" instrument_node="">David Mitchell/The Wachowskis &amp; Tom Tykwer, </span><i data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Cloud Atlas</span></i><span data-dcnode-id="3389" instrument_node=""> </span></p><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">In both the book and the film adaptation, a journalist discovers unfavorable news about a corporation. She drives an orange VW. As she's leaving the company, this conversation happens between a mysterious figure known only as Mr. Smoke and a security guard: </span></p><p data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">" I'm guessing Joe Napier has just called you and ordered you not to let an orange VW pass the checkpoint. " </span></p><p data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">" That's correct, Mr. Smoke. " </span></p><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">" I'm here to countermand that order, on Mr. Grimaldi's personal authority. You will raise the barrier for the VW and let me follow. You'll phone your buddy on the mainland checkpoint now and tell him not to let anything through until he sees my car. When Mr. Napier gets here, about fifteen minutes from now, you will tell him Alberto Grimaldi says, "Go back to bed." Understand, Richter?" </span></p><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">" Understood, Mr. Smoke." </span></p><p data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">The reader/viewer is left to infer and predict that they are about to ram her off the road in an attempt to kill her, so she doesn't go public with her discovery. </span></p><h2 data-dcnode-id="3374" id="section---LessonSummary"><span data-dcnode-id="3375" instrument_node=""> Lesson Summary</span></h2><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Suspense is basically the author retaining plot details or suggestively highlighting others to entice or confuse the reader to build anxiety and anticipation. Suspense is different from mystery in that mystery deals more with the unknown while suspense is built on the element of anticipation. These two differentiate from surprise in that surprise entails a reveal of something unexpected or otherworldly. The most popular types of suspense are dramatic irony (when the audience knows something the characters don't) and cliffhangers where the author leaves the reader "on edge" by stopping the narrative leaving the character in a perilous and precarious situation. The best way to create suspense is to reveal sensory details piece-by-piece and support this by adding elements of mystery and surprise. Timeless master of suspense to get more examples and a better understanding include Edgar Allan Poe and Alfred Hitchcock.</span></p></div><span data-dcnode-id="3370" instrument_node="">
</span></div><span data-dcnode-id="3368" instrument_node="">
</span><div class="article-cutoff-div" data-dcnode-id="3353"><span data-dcnode-id="3367" instrument_node="">

</span><div class="wikiContent" data-dcnode-id="3281" test-id="faq_text"><span data-dcnode-id="3342" instrument_node="">
</span><div data-dcnode-id="3328" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3341" instrument_node="">
</span><h4 data-dcnode-id="3339" itemprop="name"><span data-dcnode-id="3340" instrument_node="">What is the purpose of suspense in a story?</span></h4><span data-dcnode-id="3338" instrument_node="">
</span><div data-dcnode-id="3330" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3337" instrument_node="">
</span><div data-dcnode-id="3332" itemprop="text"><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">The purpose of suspense in a story is twofold: one is to create anticipation as to what will happen next and the other is to entertain the reader by keeping them engaged, interactive and sympathetic toward the character(s).</span></p><span data-dcnode-id="3333" instrument_node="">
</span></div><span data-dcnode-id="3331" instrument_node="">
</span></div><span data-dcnode-id="3329" instrument_node="">
</span></div><span data-dcnode-id="3327" instrument_node="">
</span><div data-dcnode-id="3313" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3326" instrument_node="">
</span><h4 data-dcnode-id="3324" itemprop="name"><span data-dcnode-id="3325" instrument_node="">How do you identify suspense?</span></h4><span data-dcnode-id="3323" instrument_node="">
</span><div data-dcnode-id="3315" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3322" instrument_node="">
</span><div data-dcnode-id="3317" itemprop="text"><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">You can identify suspense in the same way you can write it: that is, pay attention to when details are being revealed in chunks or listed: "the window is broken, the door looks forced...something terrible must've happened here!"</span></p><span data-dcnode-id="3318" instrument_node="">
</span></div><span data-dcnode-id="3316" instrument_node="">
</span></div><span data-dcnode-id="3314" instrument_node="">
</span></div><span data-dcnode-id="3312" instrument_node="">
</span><div data-dcnode-id="3298" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3311" instrument_node="">
</span><h4 data-dcnode-id="3309" itemprop="name"><span data-dcnode-id="3310" instrument_node="">What is an example of suspense in literature?</span></h4><span data-dcnode-id="3308" instrument_node="">
</span><div data-dcnode-id="3300" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3307" instrument_node="">
</span><div data-dcnode-id="3302" itemprop="text"><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">One of the most iconic examples of suspense in literature are both "The Iron Shroud" by William Mudford and "The Pit and the Pendulum" by Edgar Allan Poe. Both were the pioneers of the "contracting room" where walls close in, threatening the life of the protagonist.</span></p><span data-dcnode-id="3303" instrument_node="">
</span></div><span data-dcnode-id="3301" instrument_node="">
</span></div><span data-dcnode-id="3299" instrument_node="">
</span></div><span data-dcnode-id="3297" instrument_node="">
</span><div data-dcnode-id="3283" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3296" instrument_node="">
</span><h4 data-dcnode-id="3294" itemprop="name"><span data-dcnode-id="3295" instrument_node="">How do you create suspense in a narrative?</span></h4><span data-dcnode-id="3293" instrument_node="">
</span><div data-dcnode-id="3285" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3292" instrument_node="">
</span><div data-dcnode-id="3287" itemprop="text"><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Suspense can most effectively be created by revealing sensory imagery details one-by-one all the while adding elements of mystery and surprise.</span></p><span data-dcnode-id="3288" instrument_node="">
</span></div><span data-dcnode-id="3286" instrument_node="">
</span></div><span data-dcnode-id="3284" instrument_node="">
