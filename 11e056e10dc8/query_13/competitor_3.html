</span><div class="fl-module-content fl-node-content" data-dcnode-id="1116"><span data-dcnode-id="2042" instrument_node="">
</span><a data-dcnode-id="2041" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nextlevelsoul.com/" rel="external noopener noreferrer"></a><a data-dcnode-id="2040" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/post-production/"></a><span data-dcnode-id="2039" instrument_node=""> </span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Although you may not have seen any of his movies (a situation which you seriously need to rectify), you’ve certainly heard the name, Alfred Hitchcock. He is recognized as one of the great minds of cinematographic history and is even hailed as the Master of Suspense.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2035" instrument_node="">Docu-series bringing the forgotten skills of Alfred Hitchcock to today’s pro </span><a data-dcnode-id="2033" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/directing/"><span data-dcnode-id="2034" instrument_node="">filmmakers</span></a><span data-dcnode-id="2032" instrument_node="">, film students, and the wannabe videographer.&nbsp;Experts examine each of the 20 episodes of television that Hitchcock himself directed.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2026"><a data-dcnode-id="2027" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiefilmhustle.tv/programs/collection-cm2e2axqgaq" rel="noopener noreferrer external" target="_blank"><strong data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">WATCH Hitch20: Exploring Hitchcock’s 20 Works of TV on Indie Film Hustle TV</span></strong></a></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">But what was it about this icon that made his movies such a huge success? What was the secret he used in creating suspense in his movies? How does Hitchcock manufacture suspense in his films?</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">In this article, we’ll take a look at some of the methods Hitchcock employed in creating shock and suspense in his movies.</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Before we can start analyzing how Hitchcock created suspense in his movies, let us first look at the difference between shock and suspense. To quote the man himself, he once said</span></p><span data-dcnode-id="2016" instrument_node="">
</span><blockquote data-dcnode-id="2013"><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">“It is indispensable that the public is made aware of all the facts involved. Otherwise, there is no suspense.”</span></p></blockquote><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">This means that with suspense, you are aware of what’s going to happen, but the anticipation is what makes it so nerve-racking. Whereas with shock, there’s no expectation of what’s to happen. In order words, you’re caught pants down.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Without going on much longer, let’s look at some of the ways Alfred Hitchcock has created suspense in his movies.</span></p><span data-dcnode-id="2006" instrument_node="">

</span><h2 data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">1. Hitchcock Leading Ladies</span></h2><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">One of the more interesting techniques to create suspense Hitchcock employed was in his leading ladies. Other they were mostly blonde, they all went against most of the female stereotypes popular in the 1940s up to the 1960s.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">While the most famous blondes of that era never appeared in his movies, there is no denying that his female leads were sexy in their right. Like most female leads, they were sexy but in a subtle way that combined fashion with fetishism.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">They were also capable of mesmerizing their male counterparts who were most times handicapped either physically or psychologically. However, the women in Hitchcock’s movies were not just decorative pieces on the arms of their male leads; they were true lead characters.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1472" instrument_node="">This dynamic nature of his female leads and their willingness to take action (Madeline jumping off the church tower in </span><strong data-dcnode-id="1468"><a data-dcnode-id="1470" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0087ZG7R0/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0087ZG7R0%26linkCode%3Das2%26tag%3Dwhatisbroke-20%26linkId%3D3c4301b331c86297ea7f9bfcaaf8ce2d" rel="external noopener noreferrer"><span data-dcnode-id="1471" instrument_node="">Vertigo</span></a><span data-dcnode-id="1469" instrument_node=""> </span></strong><span data-dcnode-id="1467" instrument_node="">easily springs to mind) is probably what created suspense.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">You never know what to expect. One minute you’re being seduced by a blond bombshell on screen and the next you see them jumping off towers.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><h2 data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">2. Making Use of Subjectivity</span></h2><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Hitchcock often made use of subjectivity for a lot of voyeuristic purposes. Hitchcock’s characters had the uncanny ability to mimic the movie audience by a basic instinct to ogle an unassuming subject.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">But this technique is not one of Hitchcock’s creations and in fact named Lev Kuleshov as his inspiration. This technique is known as “The Kuleshov Effect.”</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">By rhythmically repeating this technique, Hitchcock was able to cultivate suspense in a lot of his movies. He periodically switched from the ogler to the ogled which led to building the action.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">What resulted from this was a feeling and anticipation of utter helplessness as you watch the character observe a dangerous situation unfold and you see he or she proved incapable of preventing the spectacle.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1446" instrument_node="">In the movie </span><strong data-dcnode-id="1443"><a data-dcnode-id="1444" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B009CGQ88G/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB009CGQ88G%26linkCode%3Das2%26tag%3Dwhatisbroke-20%26linkId%3D6efa7356bca3596855b177e2166535ec" rel="external noopener noreferrer"><span data-dcnode-id="1445" instrument_node="">Rear Window</span></a></strong><span data-dcnode-id="1442" instrument_node="">, Hitchcock can build the suspense the audience feels by building the one felt by the character. This way the audience feels like they are one with the character or are sharing something personal and intimate together.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><h2 data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">3. Information to Create Suspense</span></h2><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">Hitchcock believed that information and suspense went hand in hand, he believed in showing the </span><a data-dcnode-id="1434" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/hollyshorts-2019-rb-botto/"><span data-dcnode-id="1435" instrument_node="">audience</span></a><span data-dcnode-id="1433" instrument_node=""> what the character was unaware of. If something was going to harm your character in the future, show it at the beginning scene.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Then you let the scene play like there’s nothing wrong. From time to time, remind the audience of the looming danger. This way you continuously build up the suspense level. Remember, the character is unaware of the coming danger.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1427" instrument_node="">One method </span><a data-dcnode-id="1425" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/alfred-hitchcock-master-class/"><span data-dcnode-id="1426" instrument_node="">Hitchcock</span></a><span data-dcnode-id="1424" instrument_node=""> used in increasing the suspense level was by having the camera playfully roam around looking for something or someone suspicious. This way, the audience not only feels like they’re involved in solving the mystery, but they also feel like they’re one step ahead of the character.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><link data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fonts.googleapis.com/css%3Ffamily%3DPoppins%253A600%252C300%252C700%252C400%26ver%3D5.9.2&amp;raw" id="fl-builder-google-fonts-c858a52bd43927dd12b2791a38a4cc60-css" media="all" rel="stylesheet"><span data-dcnode-id="1420" instrument_node="">

</span><h2 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">4. Montage</span></h2><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">Another method Hitchcock applied was in dividing action into a series of close-ups that were then shown in succession. This is a basic technique in </span><a data-dcnode-id="1320" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/camera-terms-film-crew/"><span data-dcnode-id="1321" instrument_node="">cinematography</span></a><span data-dcnode-id="1319" instrument_node="">. However, you should not make the mistake of thinking it is the same as throwing random shots together as you would see in a fight sequence.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">This is a more subtle approach. First, Alfred Hitchcock starts with a close-up of a hand, then an arm, then you’ll see a face, followed by a gun falling to the floor, all of which are tied together to tell a story.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">This allowed him to portray an event by showing different pieces of it and gaining control over the timing. You can also use this method to hide parts of an event from the audience so that their mind is engaged.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><h2 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">5. Keeping the Story Simple</span></h2><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The confusing and overly complex story requires the audience to memorize quite a bit. It’s hard to squeeze out suspense from stories like that. The key to Hitchcock’s raw energy in his movies is the simplistic linear stories he adopts.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node="">They are usually easy for the audience to follow and grasp. Your </span><a data-dcnode-id="1302" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/free-screenplays-download/"><span data-dcnode-id="1303" instrument_node="">screenplay</span></a><span data-dcnode-id="1301" instrument_node=""> should be streamlined, so it offers the highest dramatic impact.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Abstract stories tend to bore audiences. This is why Hitchcock mostly used crime stories that were filled with a lot of spies, assassinations, and people constantly running from the police. Plots like these aren’t necessary for all movies, but they are the easiest to play on fear.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><h2 data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">6. Avoiding Cliché Character When You Create Suspense</span></h2><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">Clichés are boring and easy to predict. When you create suspense the best characters are those with hard to predict personalities, make decisions on a whim instead of what is expected from the previous buildup. Audiences tend to find such </span><a data-dcnode-id="1290" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/screenwriting-books/"><span data-dcnode-id="1291" instrument_node="">characters</span></a><span data-dcnode-id="1289" instrument_node=""> much more realistic which makes it easier for something to happen to them.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><h2 data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">What is a MacGuffin?</span></h2><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Many of you might have heard of the term “MacGuffin” floating out there in the ether, but what the is it? The answer is not that straightforward. Legendary director Alfred Hitchcock coined the phrase back in the days of his film 39 Steps and used it throughout his career.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">When asked what a MacGuffin was Hitchcock told this story:</span></p><span data-dcnode-id="1278" instrument_node="">
</span><blockquote data-dcnode-id="1275"><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">A man asks, “Well, what is a MacGuffin?” You say, “It’s an apparatus for trapping lions in the Scottish highlands.” Man says, “But there are no lions in the Scottish highlands.” Then you say, “Then that’s no MacGuffin.”</span></p></blockquote><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">According to Wikipedia:</span></p><span data-dcnode-id="1271" instrument_node="">
</span><blockquote data-dcnode-id="1259"><p data-dcnode-id="1260"><span data-dcnode-id="1270" instrument_node="">In&nbsp;fiction, a&nbsp;</span><b data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">MacGuffin</span></b><span data-dcnode-id="1267" instrument_node="">&nbsp;(sometimes&nbsp;</span><b data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">McGuffin</span></b><span data-dcnode-id="1264" instrument_node="">&nbsp;or&nbsp;</span><b data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">maguffin</span></b><span data-dcnode-id="1261" instrument_node="">) is a&nbsp;plot device&nbsp;in the form of some goal, desired object, or another motivator that the&nbsp;protagonist&nbsp;pursues, often with little or no&nbsp;narrative&nbsp;explanation. The specific nature of a McGuffin is typically unimportant to the overall plot. The most common type of McGuffin is a person, place, or thing (such as money or an object of value). Other more abstract types include victory, glory, survival, power, love, or some unexplained driving force.</span></p></blockquote><span data-dcnode-id="1258" instrument_node="">
</span><h2 data-dcnode-id="1118"><span data-dcnode-id="1119" style="font-size: 16px;"><div data-dcnode-id="1120"><div class="spoiler-wrap" data-dcnode-id="1121"><div class="spoiler-head collapsed" data-dcnode-id="1256" title="Expand"><span data-dcnode-id="1257" instrument_node="">&nbsp;</span></div><div class="spoiler-body" data-dcnode-id="1124" style="display: none;"><span data-dcnode-id="1255" instrument_node="">
</span><h2 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Hitchcock’s Filmmaking Techniques</span></h2><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1251" instrument_node="">It’s the early 1900s something extraordinary is about to happen in London, a quirky kid will stroll down the street and introduce himself to a film company. This small act of bravery will change the future of cinema. His name is Alfie. You’ll soon piece together influences from German expressionists, Soviet montage theorists and British macom plays to become the most prolific director in </span><a data-dcnode-id="1250" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/film-history/"></a><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/category/film-history/"><span data-dcnode-id="1249" instrument_node="">film history</span></a><span data-dcnode-id="1247" instrument_node="">. For six decades, he will actively shape the cinema art form, as it transforms from silent to sound to color.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1244" instrument_node="">But what’s the big deal about Alfred Hitchcock? Why are his films considered to be so significant?</span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">
Sometimes you find that film is looked at, solely for its content without any regard to the style or manner in which the story is told. And after all, that, basically is the art of the cinema.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Alfred Hitchcock was a director with one thing in mind, the audience. Everything he put on the screen was designed specifically to make your movie experience enjoyable. It was all designed to manipulate how you feel part of a unified strategy to draw you in to what the characters care about, to form an emotional connection. Just like a painter uses brushstrokes to convey feelings. Hitchcock painted the screen with actors faces. He said, it’s all the little nuances of expression that tell you what the character is feeling. They must be ever so slight.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Well, my idea of a good actor is somebody who can do nothing well. &nbsp;He trained his actors in minimalism, having them keep a blank expression on their face. This was so he could use the camera to create the emotion. Hitchcock’s approach was to avoid simply capturing a conversation on film, which he referred to as photographs of people talking. Instead, he would watch the listening session report. It’s the reaction to what’s being said and isn’t said that brings the audience in. Hitchcock said people don’t always express their inner thoughts to one another. A Conversation may be quite trivial, but often the eyes will reveal what a person thinks or needs. With the camera, he used differences in proximity to the actor’s face to get the emotional impact he wanted. He often called this orchestration. Each close up is saved for moments of emphasis. He can reveal nervousness or suspicion. Behind the actor shows denial. The side shows guilt, a high shot is objective or supernatural. wide shots convey emotional distance between characters. The closer you get to an actor’s face, the more emotion you’ll get.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">I know every shot and every angle. So I’ve become in a sense when I’m shooting the picture, or maybe not so good as a conductor, conducting an orchestra without a score.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1230" instrument_node="">Tracking away can make a situation feel beyond anyone’s control. Using a </span><a data-dcnode-id="1228" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiefilmhustle.com/film-crew-positions/"><span data-dcnode-id="1229" instrument_node="">dolly grip</span></a><span data-dcnode-id="1227" instrument_node=""> I Tracked from wide to close can find a hidden secret. The cutting from wide to close can give the audience a feeling of shock&nbsp;if it weren’t music, it would be tremulous on the violin, and suddenly a brass instrument which is to be closer</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">
while his camera orchestrates emotion. Hitchcock controlled the timing of events along the axis of shot frequency, or how long a shot stays on the screen before cutting away. Staying on a character’s reaction and following them across the room can emphasize in emotion moving the camera to the next shot instead. Cutting to it holds on to tension. A long stationary camera shot allows opposing forces to converge within the screen space. Fast editing is something even more impressionistic for Hitchcock, fragmenting a moment into converging perspectives can stretch out a fast event. It can also evoke something not seen on the screen in the audience’s imagination.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The camera becomes Hitchcock’s instrument, and its succession of shots. A Symphony&nbsp;you are transferring the the the the menace from the screen into the mind of the audience.&nbsp;From his beginnings in silent film, Hitchcock believed in visual storytelling. In those days, there was no voice track and the dialogue had to be shown with printed words on the screen. filmmakers learned to tell the story with the camera so they could minimize the number of titles that would interrupt the action. He said when we tell a story in cinema, we should resort to dialogue only when it’s impossible to do otherwise. His roving camera uncovers objects in the room that add up to an idea.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">In rear window we know Jeffries is injured and confined to a wheelchair on a hot day, and that he’s a war photographer from a magazine. In other words, we don’t have pages to fill, or pages from typewriter to fill, we have a rectangular screen. In a movie house, Hitchcock used hands, feet and objects as words in his cinematic language planted on the ground feet to give us a sense of place and safety are often a lack of safety. marinis feed wobble when she loses control of North by Northwest, the villains feed fall over when he gets shot. Fi can also be a dramatic introduction to a character that will make an important impact in the story. And feed can reveal personality differences between two characters in lifeboat feet become involved in romantic embrace. Hands can show anxiety and shock.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">And most importantly, they interact with objects. Objects are everything in Hitchcock’s storytelling language, that the primary way that hands can drive the plots and interact with the story world. Often these objects are evidence of a crime and carry with them emotional guilt, such as the frozen leg of lamb and lamb to the slaughter.</span></p><span data-dcnode-id="1214" instrument_node="">

&lt;p&gt;filmmakers today who strive to be more like Hitchcock often think suspense is everything they need to know. The fact is, suspense is nothing without tension. tension is different from suspense in that it&amp;#8217;s an immediate gripping feeling as you&amp;#8217;re watching a film. It&amp;#8217;s the series of details that add up to an overall impending event. In a way, tension is what keeps this man&amp;#8217;s feet planted firmly on the slack wire. But suspense is the impending chance that he might fall off. Hitchcock believe that tension can be dissipated with anything vague or complex. If the plot was hard to follow where the characters look too much alike. This could cloud the audience&amp;#8217;s focus. He said blurred thinking is detrimental to achieving suspense. One of the fatal things in all suspense is to have a mind that is confused. Otherwise the audience won&amp;#8217;t emote.&lt;/p&gt;
&lt;p&gt;They believed everything in a story must be simplified to offer maximum dramatic impact. As he said, What is drama after all, but life with the dull bits cut out? For Hitchcock, the path to increasing tension included making the details as realistic as possible.&lt;br /&gt;
And I&amp;#8217;ve always taken great care to be accurate in all detail.&lt;/p&gt;
&lt;p&gt;No matter how fantastic the situation might be. And that is the most important moment when the man is buying a hat in the store in bonds street when the gun is thrust into his ribs. You see, it&amp;#8217;s the juxtaposition of the norm of the accurate average against the fantasy.&lt;/p&gt;
&lt;p&gt;The next level of detail is sound, adding a deeper sense of reality to the flat image on the screen. Hitchcock soundscape soundscapes were authentic. But sometimes he would make things silent to keep a secret from the audience, or he could exaggerate specific sounds for dramatic purposes. In his TV episode The horseplayer the sounds of rain dominates the scene so we soon understand exactly why this church needs to raise money. In most close call scenes, Hitchcock wants us to hear everything the characters hear. That way we can judge how close Marnie is to getting caught.&lt;/p&gt;
&lt;p&gt;Notice there&amp;#8217;s no music is can&amp;#8217;t believe that music gets in the way and even dissipates tension. Music pulls our minds away from the reality of the scene, and more toward a fantasy. Often, Hitchcock would choose to add music from within the setting to avoid music score. This music tended to be comical, almost mocking the plight of the character &nbsp;was a counterpoint of sound, they shouldn&amp;#8217;t make the same mistake. I&amp;#8217;ve always believed that the voice should never make the same statement that the faces making.&lt;/p&gt;
&lt;p&gt;Now there was a girl says I&amp;#8217;m happy, and she&amp;#8217;s got a happy expression, you&amp;#8217;re saying the same thing twice, once with sound around with a visual shall be counter pointed,&nbsp;increasing tension with detail and sound, gave his films a hyper present clarity in the moment. But just like a roller coaster, once tension was created, had to be rhythmic with ups and downs to relieve the audience. He said, If you stretch it out too long, they&amp;#8217;ll start to giggle. They&amp;#8217;ll relieve the tension themselves if you don&amp;#8217;t do it for them. And that was Hitchcock&amp;#8217;s genius. He found that creating laughter was the best way to balance tension. Every film I make is a comedy he said, even considered psycho a practical joke.&lt;/p&gt;
&lt;p&gt;You must have a basic sense of humor about because that&amp;#8217;s what you&amp;#8217;re doing. You&amp;#8217;re doing it deliberately to scare people. And after all, there&amp;#8217;s no difference between the my mating cycle to scare people with tongue in cheek, shall we say? Then a mother who says boo to scare three months old baby.&lt;br /&gt;
Hitchcock often inserted humor into dark situations by shifting the focus to a character that doesn&amp;#8217;t know what&amp;#8217;s going on. He often referred to this technique as understatements, where an aloof person focuses on something comically small instead of the more chilling situation at hand.&lt;br /&gt;
That don&amp;#8217;t work. If we&amp;#8217;re designing the film, I&amp;#8217;m sitting with a riot. And you say, well, wouldn&amp;#8217;t it be fun to kill them this way or that way? And then you say, well, this scene will make them scream. So you do it with a self of lushness. Show him and no different to the man who&amp;#8217;s driving the males in that scaffolding, who&amp;#8217;s making the roller coaster.&lt;/p&gt;
&lt;p&gt;Even though he was all about clarity and detail, Hitchcock believed that film was different to a novel or play because of the emphasis on visual storytelling. It was more like a daydream where facts don&amp;#8217;t matter. Hitchcock found that certain aspects of the plot could be minimized or eliminated entirely. This gave rise to his belief in a suspense device he called the &lt;a href="https://indiefilmhustle.com/macguffin-alfred-hitchcock/" data-wpel-link="internal"&gt;MacGuffin&lt;/a&gt;,&nbsp;the MacGuffin is the thing that the spies are off, but the audience don&amp;#8217;t care.&lt;/p&gt;
&lt;p&gt;Simply put, the MacGuffin is nothing. It can be anything. The only reason for the MacGuffin is to serve a pivotal reason for the suspense to occur in torn curtain. It&amp;#8217;s a secret physics formula that makes escaping Germany dangerous. In marny, it&amp;#8217;s the color red, a psychological trigger of anxiety for Marnie, in Dial M for Murder. It&amp;#8217;s the piece of evidence that can implicate Tony.&lt;br /&gt;
But we don&amp;#8217;t care about the key. We just care if the inspector can cause him to slip up.&nbsp;I mean, what&amp;#8217;s Van Damme up to? Oh, you could say is a sort of import or export, of what? Oh, government secrets perhaps.&lt;/p&gt;
&lt;p&gt;And of course, the critics had a field day with this. They often claimed his films didn&amp;#8217;t have much substance. There was no content.&lt;br /&gt;
When I say that I&amp;#8217;m not interested in content rage would be the same as a painter, worrying about whether the apples that he&amp;#8217;s painting, or whether they&amp;#8217;re sweet or sour, who has it his style, his manner of painting them. That&amp;#8217;s where the emotion comes from.&lt;/p&gt;
&lt;p&gt;Alfred Hitchcock directed over 50 motion pictures and 20 television episodes, from the silent films of the 1920s all the way up into the 1970s. A lot has changed even since then. But hopefully, these classic Hitchcock cinema techniques will live on and continue to be used by filmmakers to bring frightening stories into the minds of the audience.&lt;/p&gt;
