</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Salaried borrowers who have opted for the Reserve Bank of India’s (RBI’s) home loan EMI moratorium, because of the current financial stress, will also see some changes as far as their tax deductions are concerned. Examined in this article, is how the six-month EMI moratorium would impact the tax benefits that a home buyer can avail of under Section 80C and Section 24(b) of the Income Tax (IT) Act.</span></p><div class="ai-viewport-3" data-block="6" data-code="PGRpdiBjbGFzcz0nY29kZS1ibG9jayBjb2RlLWJsb2NrLTYnIHN0eWxlPSdtYXJnaW46IDhweCAwOyBjbGVhcjogYm90aDsnPgo8YSBzdHlsZT0iZGlzcGxheTogYmxvY2s7IHRleHQtYWxpZ246IGNlbnRlcjsgbWFyZ2luLWJvdHRvbTogMzBweDsiIGhyZWY9Imh0dHBzOi8vaG91c2luZy5jb20vaG9tZS1sb2Fucz91dG1fc291cmNlPW5ld3NfYXJ0aWNsZV9wYWdlIj4KICA8aW1nIHN0eWxlPSJ3aWR0aDogMTAwJTsiIHNyYz0iaHR0cHM6Ly9hc3NldHMtbmV3cy5ob3VzaW5nLmNvbS9uZXdzL3dwLWNvbnRlbnQvdXBsb2Fkcy8yMDIyLzAyLzIxMTYzNzE2L2hvbWUtbG9hbnMtc21hbGwucG5nIj4KPC9hPjwvZGl2Pgo=" data-dcnode-id="1315" data-insertion="prepend" data-insertion-no-dbg="" data-selector=".ai-insert-6-88992586"></div><span data-dcnode-id="1314" instrument_node="">

</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">The kind of benefits a borrower would get, or the losses he would suffer on applying for the EMI moratorium, would depend on where exactly he stands in the loan tenure. This has to do with the fact that the benefits offered under the two sections of the law, act quite differently. Using a front-loading method, banks make you pay a large part of the interest component of your home loan during the beginning years of your home loan tenure. After that period, the interest portion reduces while the contribution towards the principal repayment rises. This is why the impact would be different, depending on where exactly in the repayment tenure cycle you stand.</span></p><div class="ad_pushup_paragraph" data-dcnode-id="1267"><span data-dcnode-id="1274" instrument_node="">
</span><div class="_ap_apex_ad" data-dcnode-id="1269" id="4cbc6643-b533-4344-bc4b-1c337dc43234"><span data-dcnode-id="1273" instrument_node="">

</span><div class="mceMediaCreditOuterTemp none" data-dcnode-id="1261" style="width: 779px;"><img alt="Impact of EMI moratorium on home loan tax deductions" class="size-large wp-image-52026" data-dcnode-id="1262" height="400" sizes="(max-width: 779px) 100vw, 779px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-news.housing.com/news/wp-content/uploads/2020/09/11143059/Impact-of-EMI-moratorium-on-home-loan-tax-deductions-779x400.jpg&amp;raw" srcset="https://assets-news.housing.com/news/wp-content/uploads/2020/09/11143059/Impact-of-EMI-moratorium-on-home-loan-tax-deductions-779x400.jpg 779w, https://assets-news.housing.com/news/wp-content/uploads/2020/09/11143059/Impact-of-EMI-moratorium-on-home-loan-tax-deductions-360x185.jpg 360w, https://assets-news.housing.com/news/wp-content/uploads/2020/09/11143059/Impact-of-EMI-moratorium-on-home-loan-tax-deductions-480x246.jpg 480w, https://assets-news.housing.com/news/wp-content/uploads/2020/09/11143059/Impact-of-EMI-moratorium-on-home-loan-tax-deductions.jpg 980w" width="779"></div><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1248"><strong data-dcnode-id="1254"><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">See also:</span></em></strong><span data-dcnode-id="1249" style="color: #0000ff;"><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/news/home-loans-guide-claiming-tax-benefits/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><strong data-dcnode-id="1251"><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node=""> All about home loan tax benefits</span></em></strong></a></span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1244" instrument_node="">
</span><h2 data-dcnode-id="1240"><span data-dcnode-id="1241" id="Impact_of_moratorium_on_tax_benefit_on_home_loan_principal"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Impact of moratorium on tax benefit on home loan principal</span></strong></span></h2><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">An individual can claim a tax deduction of up to Rs 1 .50 lakhs per annum under Section 80C, against various investments, including home loan principal payment. However, deductions under Section 80C are offered on the payment basis. This means, benefits can only be claimed on the actual amount that the borrowers pay in a year. Now, if you have opted for the EMI moratorium, you are not paying the home loan principal for that period. The fact that you would pay that amount later, will not be factored in at the time of tax calculation, since no ‘actual’ towards the principal has been made during the moratorium. Simply put, the deduction cannot be claimed on the principal outstanding during the moratorium period.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Suppose you took a home loan of Rs 40 lakhs for a 20-year period at 8% in April 2019. For the financial year 2020-21, your principal repayment will be Rs 89,756.81 for 12 months. Now, if you opt for the six-month moratorium, you would actually be paying only Rs 44,878 as the home loan principal amount. On the other hand, as against your total interest liability of Rs 3,11,734.39 (over Rs 3.11 lakhs), you would be paying Rs 1,55,867 as the interest component.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1232" instrument_node="">To exhaust the Rs 1.50-lakh limit under Section 80C, you will have to rely on other instruments of investment, since only Rs 44,878 would actually be paid in the year. This should not be a problem for a borrower, who has invested in </span><span data-dcnode-id="1229" style="color: #0000ff;"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/news/use-provident-fund-finance-home-purchase/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="1231" instrument_node="">provident fund</span></a></span><span data-dcnode-id="1228" instrument_node="">, public provident fund and life insurance policies. However, even in these cases, the borrower will have to show proofs of actual payment. To know your provident fund balance online, you could use your </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/news/uan-login/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1227" instrument_node="">UAN login</span></a><span data-dcnode-id="1225" instrument_node="">. You can also check your </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/news/epf-passbook/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1224" instrument_node="">UAN passbook</span></a><span data-dcnode-id="1222" instrument_node=""> online using this login.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h2 data-dcnode-id="1213"><span data-dcnode-id="1214" id="Impact_of_the_moratorium_on_tax_benefit_on_home_loan_interest"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Impact of the moratorium on tax benefit on home loan interest</span></strong></span></h2><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1211" instrument_node="">Unlike Section 80C, Section 24(b) allows tax deductions on the liability and not the actual payment. Deductions on </span><span data-dcnode-id="1208" style="color: #0000ff;"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/home-loans" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="1210" instrument_node="">home loans</span></a></span><span data-dcnode-id="1207" instrument_node=""> under Section 24 (B) are offered on an accrual basis – interest is calculated for each year separately and the rebate can be claimed, even if no actual payment is made.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">This way, borrowers who have availed of the six-month EMI moratorium scheme, could simply get an interest certificate from their bank and submit it as a proof with their employers.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">In the example mentioned above, the borrower would be able to claim deduction of the entire Rs 2-lakh limit, as his interest component is Rs 3.11 lakhs for the entire year, even though he would be paying Rs 1, 55,867 as the interest component, supposing he has applied for a longer tenure and not a higher EMI once the EMIs restart.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1196" instrument_node="">
</span><h2 data-dcnode-id="1192"><span data-dcnode-id="1193" id="EMI_liability_after_the_moratorium_period"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">EMI liability after the moratorium period</span></strong></span></h2><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Note that the EMIs that you do not pay for the six-month period will be included in your overall home loan principal amount. This means that in the above example, Rs 2,00,742 will be added to the outstanding principal amount of Rs 3,937,226, as Rs 62,773.83 has already been paid and your new principal amount would be Rs 4,137,968. From September 1, 2020, the bank would charge the interest on that amount. In our example, however, the tax benefit would be limited to only Rs 2 lakhs, even though the entire interest payment for the year would increase to Rs 3,22,487.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1179"><strong data-dcnode-id="1185"><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Read all about the </span></em></strong><span data-dcnode-id="1180" style="color: #0000ff;"><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//housing.com/news/moratorium-on-home-loan-emi/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><strong data-dcnode-id="1182"><em data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">RBI guidelines for EMI moratorium</span></em></strong></a></span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Those who were not able to exhaust the limit under Section 24(b) earlier, would be able to do so if they apply for the moratorium, as the interest component would increase significantly. This would be true in cases where the borrower has serviced a large portion of the loan and only has a few years left to repay it fully. In these cases, the principal amount constitutes the larger part towards the EMI outgo. In our example, for instance, the borrower would be paying Rs 3,07,056 as the principal amount in the year 2035 as against the interest component of Rs 1,08,282.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1172" instrument_node="">
</span><h2 data-dcnode-id="1168"><span data-dcnode-id="1169" id="FAQ"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">FAQ</span></strong></span></h2><span data-dcnode-id="1167" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1153"><span data-dcnode-id="1166" instrument_node="">
</span><div data-dcnode-id="1155"><span data-dcnode-id="1165" instrument_node="">
</span><h3 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">What is the RBI’s home loan moratorium?</span></h3><span data-dcnode-id="1162" instrument_node=""> </span><div data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">
						The RBI has permitted all lending institutions to allow a moratorium of six months on payment of all term loans outstanding as on March 1, 2020, up to August 31, 2020.                    </span></p><span data-dcnode-id="1158" instrument_node="">
</span></div><span data-dcnode-id="1156" instrument_node="">
</span></div><span data-dcnode-id="1154" instrument_node="">
</span></section><span data-dcnode-id="1152" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1138"><span data-dcnode-id="1151" instrument_node="">
</span><div data-dcnode-id="1140"><span data-dcnode-id="1150" instrument_node="">
</span><h3 data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Can I claim home loan principal deduction if I avail of the RBI loan moratorium?</span></h3><span data-dcnode-id="1147" instrument_node=""> </span><div data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">
						Home loan borrowers who have opted for the EMI moratorium cannot claim tax deductions on the principal repayment of a home loan, as the benefits of Section 80C are only available on actual payments made.                    </span></p><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
</span></section><span data-dcnode-id="1137" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1123"><span data-dcnode-id="1136" instrument_node="">
</span><div data-dcnode-id="1125"><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Can I claim home loan interest deduction if I avail of the RBI loan moratorium?</span></h3><span data-dcnode-id="1132" instrument_node=""> </span><div data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">
						Under Section 24(b) of the Income Tax Act, interest deduction is calculated for each year separately. Hence home loan borrowers who have availed of the EMI moratorium can claim interest deduction by obtaining an interest certificate from their bank.                    </span></p><span data-dcnode-id="1128" instrument_node="">
</span></div><span data-dcnode-id="1126" instrument_node="">
</span></div><span data-dcnode-id="1124" instrument_node="">
</span></section><span data-dcnode-id="1122" instrument_node="">
