</span><h2 data-dcnode-id="2509"><span data-dcnode-id="2510" id="What_Is_A_Tax_Deduction"><span data-dcnode-id="2511" instrument_node="">What Is A Tax Deduction?</span></span></h2><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The one thing that hasn’t change is the nature of deductions. A tax deduction is a business expense you can use to reduce your total taxable income. According to the IRS, expenses that qualify for deduction must be “both ordinary and necessary.”</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">The IRS further explains:</span></p><span data-dcnode-id="2502" instrument_node="">
</span><blockquote data-dcnode-id="2499"><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">An ordinary expense is one that is common and accepted in your trade or business. A necessary expense is one that is helpful and appropriate for your trade or business. An expense does not have to be indispensable to be considered necessary.</span></p></blockquote><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2497" instrument_node="">So what does this mean for you? Essentially, </span><strong data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">you can save a lot more money than you might think.</span></strong></p><span data-dcnode-id="2493" instrument_node="">
</span><h2 data-dcnode-id="2490"><span data-dcnode-id="2491" id="The_Top_30_Small_Business_Tax_Deductions"><span data-dcnode-id="2492" instrument_node="">The Top 30 Small Business Tax Deductions</span></span></h2><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Many business owners know that you can deduct travel, meals, and employee wages, but that’s only the beginning.</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">We’ve compiled a list of 30 different tax deductions that your business may be eligible for.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2482" instrument_node="">Before reading anything further, note that not every business will be eligible for every type of deduction. To learn if you’re eligible for a deduction, double-check </span><a data-dcnode-id="2480" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/tax-reform" target="_blank"><span data-dcnode-id="2481" instrument_node="">IRS regulations</span></a><span data-dcnode-id="2479" instrument_node="">&nbsp;and </span><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">always consult with your accountant.</span></strong></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Here is a list of some of the most common tax deductions available for small businesses:</span></p><span data-dcnode-id="2472" instrument_node="">
</span><ol data-dcnode-id="2350"><span data-dcnode-id="2471" instrument_node="">
</span><li data-dcnode-id="2468"><a data-dcnode-id="2469" data-wct-parsed="1" href="#heading_0"><span data-dcnode-id="2470" instrument_node="">20% pass-through credit</span></a></li><span data-dcnode-id="2467" instrument_node="">
</span><li data-dcnode-id="2464"><a data-dcnode-id="2465" data-wct-parsed="1" href="#heading_1"><span data-dcnode-id="2466" instrument_node="">Mileage</span></a></li><span data-dcnode-id="2463" instrument_node="">
</span><li data-dcnode-id="2460"><a data-dcnode-id="2461" data-wct-parsed="1" href="#heading_2"><span data-dcnode-id="2462" instrument_node="">Car &amp; truck expenses</span></a></li><span data-dcnode-id="2459" instrument_node="">
</span><li data-dcnode-id="2456"><a data-dcnode-id="2457" data-wct-parsed="1" href="#heading_3"><span data-dcnode-id="2458" instrument_node="">Travel</span></a></li><span data-dcnode-id="2455" instrument_node="">

</span><li data-dcnode-id="2444"><a data-dcnode-id="2445" data-wct-parsed="1" href="#heading_6"><span data-dcnode-id="2446" instrument_node="">Office supplies &amp; furniture</span></a></li><span data-dcnode-id="2443" instrument_node="">
</span><li data-dcnode-id="2440"><a data-dcnode-id="2441" data-wct-parsed="1" href="#heading_7"><span data-dcnode-id="2442" instrument_node="">Cost of goods sold</span></a></li><span data-dcnode-id="2439" instrument_node="">
</span><li data-dcnode-id="2436"><a data-dcnode-id="2437" data-wct-parsed="1" href="#heading_8"><span data-dcnode-id="2438" instrument_node="">Tools &amp; equipment</span></a></li><span data-dcnode-id="2435" instrument_node="">
</span><li data-dcnode-id="2432"><a data-dcnode-id="2433" data-wct-parsed="1" href="#heading_9"><span data-dcnode-id="2434" instrument_node="">Repairs &amp; maintenance costs</span></a></li><span data-dcnode-id="2431" instrument_node="">
</span><li data-dcnode-id="2428"><a data-dcnode-id="2429" data-wct-parsed="1" href="#heading_10"><span data-dcnode-id="2430" instrument_node="">Rent</span></a></li><span data-dcnode-id="2427" instrument_node="">
</span><li data-dcnode-id="2424"><a data-dcnode-id="2425" data-wct-parsed="1" href="#heading_11"><span data-dcnode-id="2426" instrument_node="">Moving expenses</span></a></li><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2420"><a data-dcnode-id="2421" data-wct-parsed="1" href="#heading_12"><span data-dcnode-id="2422" instrument_node="">Utilities</span></a></li><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2416"><a data-dcnode-id="2417" data-wct-parsed="1" href="#heading_13"><span data-dcnode-id="2418" instrument_node="">Internet services</span></a></li><span data-dcnode-id="2415" instrument_node="">
</span><li data-dcnode-id="2412"><a data-dcnode-id="2413" data-wct-parsed="1" href="#heading_14"><span data-dcnode-id="2414" instrument_node="">Software</span></a></li><span data-dcnode-id="2411" instrument_node="">
</span><li data-dcnode-id="2408"><a data-dcnode-id="2409" data-wct-parsed="1" href="#heading_15"><span data-dcnode-id="2410" instrument_node="">Employee benefits &amp; bonuses</span></a></li><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2404"><a data-dcnode-id="2405" data-wct-parsed="1" href="#heading_16"><span data-dcnode-id="2406" instrument_node="">Employee wages</span></a></li><span data-dcnode-id="2403" instrument_node="">

</span><li data-dcnode-id="2392"><a data-dcnode-id="2393" data-wct-parsed="1" href="#heading_20"><span data-dcnode-id="2394" instrument_node="">Insurance premiums</span></a></li><span data-dcnode-id="2391" instrument_node="">
</span><li data-dcnode-id="2388"><a data-dcnode-id="2389" data-wct-parsed="1" href="#heading_21"><span data-dcnode-id="2390" instrument_node="">Taxes</span></a></li><span data-dcnode-id="2387" instrument_node="">

</span><li data-dcnode-id="2380"><a data-dcnode-id="2381" data-wct-parsed="1" href="#heading_23"><span data-dcnode-id="2382" instrument_node="">Bank &amp; credit card fees</span></a></li><span data-dcnode-id="2379" instrument_node="">
</span><li data-dcnode-id="2376"><a data-dcnode-id="2377" data-wct-parsed="1" href="#heading_24"><span data-dcnode-id="2378" instrument_node="">Interest costs</span></a></li><span data-dcnode-id="2375" instrument_node="">
</span><li data-dcnode-id="2372"><a data-dcnode-id="2373" data-wct-parsed="1" href="#heading_25"><span data-dcnode-id="2374" instrument_node="">Startup costs</span></a></li><span data-dcnode-id="2371" instrument_node="">
</span><li data-dcnode-id="2368"><a data-dcnode-id="2369" data-wct-parsed="1" href="#heading_26"><span data-dcnode-id="2370" instrument_node="">Advertising &amp; marketing expenses</span></a></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2364"><a data-dcnode-id="2365" data-wct-parsed="1" href="#heading_27"><span data-dcnode-id="2366" instrument_node="">Research &amp; experiment costs</span></a></li><span data-dcnode-id="2363" instrument_node="">
</span><li data-dcnode-id="2360"><a data-dcnode-id="2361" data-wct-parsed="1" href="#heading_28"><span data-dcnode-id="2362" instrument_node="">Cleaning &amp; janitorial expenses</span></a></li><span data-dcnode-id="2359" instrument_node="">
</span><li data-dcnode-id="2356"><a data-dcnode-id="2357" data-wct-parsed="1" href="#heading_29"><span data-dcnode-id="2358" instrument_node="">Intangibles</span></a></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2352"><a data-dcnode-id="2353" data-wct-parsed="1" href="#heading_30"><span data-dcnode-id="2354" instrument_node="">Charitable donations</span></a></li><span data-dcnode-id="2351" instrument_node="">
</span></ol><span data-dcnode-id="2349" instrument_node="">
</span><h3 data-dcnode-id="2347" id="heading_0"><span data-dcnode-id="2348" instrument_node="">Qualified Business Income Deduction</span></h3><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Because of the Tax Cuts &amp; Jobs Act passed in 2017 by the President and Congress, certain business types may be eligible for a 20% pass-through deduction on their total taxable income.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">So, what is a pass-through business?</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">For business types like sole proprietors, S corporations, and partnerships, the business’s income does not get taxed at the corporate level and instead passes through and is taxed at the individual level via the business owners’ tax return. Since the business owner is then responsible for paying the business’s taxes on their individual taxes, they can now take 20% off of their taxable income.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><h3 data-dcnode-id="2335" id="heading_1"><span data-dcnode-id="2336" instrument_node="">Mileage Deduction</span></h3><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Business owners and self-employed individuals can qualify for a mileage deduction. If you drive your car for a business purpose — such as meeting a client, picking up office supplies, driving to the bank for business transactions, etc. — you can write these miles off as a deductible business expense.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">To calculate the mileage deduction, keep a careful record of the miles you drive, including the start and end odometer reading, and use the standard mileage rate to calculate your total deduction. 2020’s standard mileage deduction rate is 57.5 cents per mile.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">With this deduction, you cannot claim your commute or any extra, personal errands you take when making your business errands.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2324" instrument_node="">It’s also important to note that you can choose either the mileage deduction&nbsp;</span><em data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">or</span></em><span data-dcnode-id="2321" instrument_node=""> the vehicle expenses deductions — you can’t choose both, so it’s important to think about whether you would receive a higher tax return tracking your mileage or writing of your vehicle expenses. Read </span><a data-dcnode-id="2319" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/mileage-tax-deduction/"><span data-dcnode-id="2320" instrument_node="">our full breakdown on mileage deductions</span></a><span data-dcnode-id="2318" instrument_node=""> to learn more.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><h3 data-dcnode-id="2314" id="heading_2"><span data-dcnode-id="2315" instrument_node="">Deduct Car &amp; Truck Expenses</span></h3><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Car and truck expenses can be counted as a tax write off. These expenses include:</span></p><span data-dcnode-id="2310" instrument_node="">
</span><ul data-dcnode-id="2281"><span data-dcnode-id="2309" instrument_node="">
</span><li data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Gas</span></li><span data-dcnode-id="2306" instrument_node="">
</span><li data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Oil changes</span></li><span data-dcnode-id="2303" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Maintenance and repairs</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Tires</span></li><span data-dcnode-id="2297" instrument_node="">
</span><li data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Registration</span></li><span data-dcnode-id="2294" instrument_node="">
</span><li data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">License</span></li><span data-dcnode-id="2291" instrument_node="">
</span><li data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Insurance</span></li><span data-dcnode-id="2288" instrument_node="">
</span><li data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Parking fees</span></li><span data-dcnode-id="2285" instrument_node="">
</span><li data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Garage rent</span></li><span data-dcnode-id="2282" instrument_node="">
</span></ul><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">If you choose to deduct your vehicle expenses, you cannot deduct your business mileage — it has to be one or the other. Carefully consider how you use your vehicle to ensure you choose the right method to get the most money back. With either option, keeping good records is imperative.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><h3 data-dcnode-id="2275" id="heading_3"><span data-dcnode-id="2276" instrument_node="">Travel Deduction</span></h3><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">In terms of travel, transportation between your home and a business destination can be deducted. Transportation via car, taxi, train, etc., is only covered if you are traveling from your lodging to a business-related destination. Additionally, lodging can count as a write-off as well as baggage, dry cleaning, and business calls. You can even count purchasing your passport as an expense if it’s for a business trip.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Keep good records of all this information to ensure you get the right deduction amount. Also, you can write off any travel arranged for job candidates being interviewed.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><h3 data-dcnode-id="2266" id="heading_4"><span data-dcnode-id="2267" instrument_node="">Meals &amp; Education Deduction</span></h3><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">While you can longer deduct entertainment, you can still deduct meals if certain qualifications are met. According to the IRS, for meals to be a deductible business expense they must:</span></p><span data-dcnode-id="2262" instrument_node="">
</span><ol data-dcnode-id="2248"><span data-dcnode-id="2261" instrument_node="">
</span><li data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Not be “lavish or extravagant”</span></li><span data-dcnode-id="2258" instrument_node="">
</span><li data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">The meal is an “ordinary and necessary” business expense</span></li><span data-dcnode-id="2255" instrument_node="">
</span><li data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">The taxpayer must be present when purchasing the food and/or drinks</span></li><span data-dcnode-id="2252" instrument_node="">
</span><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">The meal is with a customer, employee, vendor, or other business contact</span></li><span data-dcnode-id="2249" instrument_node="">
</span></ol><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">If all three of these requirements are met, you can deduct up to 50% of meal expenses. Because you can no longer deduct meals and entertainment collectively, make sure you pay for any meals separate from entertainment and keep strong records for your accountant.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><h3 data-dcnode-id="2242" id="heading_5"><span data-dcnode-id="2243" instrument_node="">Home Office Deduction</span></h3><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2233"><span data-dcnode-id="2240" instrument_node="">If you have a </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">separate</span></em><span data-dcnode-id="2237" instrument_node=""> space in your home that is </span><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">exclusively </span></em><span data-dcnode-id="2234" instrument_node="">used for business, then you may be eligible for a home office deduction. This deduction is based on the size of the space and can be calculated in two different ways. The simplified method multiplies the square footage of your office by $5 for your total deduction. Or you can use the actual expense method, which allows you to deduct home office expenses such as:</span></p><span data-dcnode-id="2232" instrument_node="">
</span><ul data-dcnode-id="2212"><span data-dcnode-id="2231" instrument_node="">
</span><li data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Furniture</span></li><span data-dcnode-id="2228" instrument_node="">
</span><li data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Paint</span></li><span data-dcnode-id="2225" instrument_node="">
</span><li data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Rent</span></li><span data-dcnode-id="2222" instrument_node="">
</span><li data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Property Taxes</span></li><span data-dcnode-id="2219" instrument_node="">
</span><li data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Utilities</span></li><span data-dcnode-id="2216" instrument_node="">
</span><li data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Repairs</span></li><span data-dcnode-id="2213" instrument_node="">
</span></ul><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">While you can sometimes receive a larger deduction going with the actual expenses method, it does require much more work and careful bookkeeping.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2207" instrument_node="">Read our guide the </span><em data-dcnode-id="2203"><a data-dcnode-id="2205" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/home-office-deduction-explained/"><span data-dcnode-id="2206" instrument_node="">Small Business Taxes: The Home Office Deduction Explained</span></a><span data-dcnode-id="2204" instrument_node=""> </span></em><span data-dcnode-id="2202" instrument_node="">to learn if you qualify for this deduction.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><h3 data-dcnode-id="2198" id="heading_6"><span data-dcnode-id="2199" instrument_node="">Office Supplies Deduction</span></h3><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Office supplies needed to run your business, such as paper, ink, postage, pens, staplers, toilet paper, break room supplies, etc., are 100% deductible. Although, if you plan on buying a large amount of postage for shipping products, the IRS classifies this as a cost of goods sold (COGs) expense, instead of an office supply expense.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Furniture for your office space is also deductible, although, depending on the purchase, these expenses may need to be depreciated.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><h3 data-dcnode-id="2189" id="heading_7"><span data-dcnode-id="2190" instrument_node="">Cost Of Goods Sold Deduction</span></h3><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">In addition to postage for shipping products, expenses that fall into the cost of goods sold tax deduction can include merchandise, raw materials, packaging materials, and freight.</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Calculating this particular tax deduction can be tricky, so talk to your accountant about the best way to take the COGs tax deduction for your business — and don’t forget to provide your accountant with an inventory count from the beginning and end of the financial year.</span></p><span data-dcnode-id="2182" instrument_node="">
</span><h3 data-dcnode-id="2180" id="heading_8"><span data-dcnode-id="2181" instrument_node="">Tools &amp; Equipment Deduction</span></h3><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">Tools and equipment that are necessary for your business are also deductible, so long as these tools can be used within one year. Larger equipment that lasts longer than a year, such as computers or machinery, cannot be deducted as usual and may need to be </span><a data-dcnode-id="2176" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/quick-guide-accounting-terms-concepts/%23Depreciation"><span data-dcnode-id="2177" instrument_node="">depreciated</span></a><span data-dcnode-id="2175" instrument_node=""> instead.</span></p><span data-dcnode-id="2173" instrument_node="">
</span><h3 data-dcnode-id="2171" id="heading_9"><span data-dcnode-id="2172" instrument_node="">Deduct Repairs &amp; Maintenance Costs</span></h3><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">You can deduct the cost of repairs and maintenance of a property, so long as the total is less than $10,000 or less than 2% of the unadjusted asset basis of the property (meaning the original purchase cost of the asset, not the current value). Whichever amount is less is what will determine your deduction.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Only businesses that earn under $10 million qualify for this deduction. The unadjusted asset basis of the building also must be less than $1 million to qualify. Depending on the repair, this deduction may need to be depreciated so be sure to talk to your accountant about how to properly write off this expense.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><h3 data-dcnode-id="2162" id="heading_10"><span data-dcnode-id="2163" instrument_node="">Rent Deduction</span></h3><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">If you rent an office or building that you use solely for operating your business, you can deduct rent. The stipulation is that, according to the IRS, if you “have or will receive equity in or title to the property,” you cannot write off the rent as a deduction.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><h3 data-dcnode-id="2156" id="heading_11"><span data-dcnode-id="2157" instrument_node="">Deduct Moving Expenses</span></h3><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">While personal moving expenses are deductible, you can still deduct moving expenses if you relocate your business. You can fully deduct any expenses related to moving such as packing and transport.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">This deduction only applies if your business is a corporation or LLC.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><h3 data-dcnode-id="2147" id="heading_12"><span data-dcnode-id="2148" instrument_node="">Utilities Deduction</span></h3><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Your business’s utilities can be a tax write off, so long as they are strictly business expenses. Utilities include:</span></p><span data-dcnode-id="2143" instrument_node="">
</span><ul data-dcnode-id="2126"><span data-dcnode-id="2142" instrument_node="">
</span><li data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Heating</span></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Telephone services</span></li><span data-dcnode-id="2136" instrument_node="">
</span><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Electricity</span></li><span data-dcnode-id="2133" instrument_node="">
</span><li data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Sewage</span></li><span data-dcnode-id="2130" instrument_node="">
</span><li data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Water</span></li><span data-dcnode-id="2127" instrument_node="">
</span></ul><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">You may be able to write off a portion of your personal utilities for the business use of your home office. See the home office deduction for more information.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><h3 data-dcnode-id="2120" id="heading_13"><span data-dcnode-id="2121" instrument_node="">Deduct Internet Services</span></h3><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">If the internet is a requirement for running your business (and when isn’t it in the 21st century?), then your internet services count as a deductible expense.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Depending on your business entity, where you write this tax deduction off on your tax forms will vary. Talk with your accountant about the proper way to take this business tax deduction, and keep records of your monthly Internet bills.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><h3 data-dcnode-id="2111" id="heading_14"><span data-dcnode-id="2112" instrument_node="">Software Deduction</span></h3><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">If your business requires specific software to operate, you can deduct the software cost or monthly subscription.</span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">If you use accounting software like QuickBooks Online or Xero, your monthly fees are deductibles. If you use project management software like Basecamp or Trello, your subscription is deductible. If you use email marketing software like Drip or a website builder like Squarespace, you guessed it, deductible.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><h3 data-dcnode-id="2102" id="heading_15"><span data-dcnode-id="2103" instrument_node="">Employee Benefits Deduction</span></h3><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Did you know that being a good employer can save you money on your taxes? Offering beneficial and competitive benefits to your employees doesn’t just help you acquire and hold onto quality employees; it also helps you come tax season.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">In most instance, you can deduct the following employee benefits:</span></p><span data-dcnode-id="2095" instrument_node="">
</span><ul data-dcnode-id="2063"><span data-dcnode-id="2094" instrument_node="">
</span><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Health plans</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Retirement plans</span></li><span data-dcnode-id="2088" instrument_node="">
</span><li data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Sick pay</span></li><span data-dcnode-id="2085" instrument_node="">
</span><li data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Vacation pay</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Accident coverage</span></li><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Life insurance coverage</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Welfare benefit funds</span></li><span data-dcnode-id="2073" instrument_node="">
</span><li data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Cafeteria plans</span></li><span data-dcnode-id="2070" instrument_node="">
</span><li data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Adoption assistance</span></li><span data-dcnode-id="2067" instrument_node="">
</span><li data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Dependent care assistance</span></li><span data-dcnode-id="2064" instrument_node="">
</span></ul><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">If you give bonuses to your employees, you can also count these bonuses as a deductible business expense. Don’t forget that </span><a data-dcnode-id="2059" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/payroll-taxes/"><span data-dcnode-id="2060" instrument_node="">employee bonus checks are still liable to payroll withholding taxes</span></a><span data-dcnode-id="2058" instrument_node=""> like FICA.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><h3 data-dcnode-id="2054" id="heading_16"><span data-dcnode-id="2055" instrument_node="">Employee Wages Deduction</span></h3><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">As long as you are paying reasonable wages to your employees for work or services performed, you can deduct this cost. Certain employee awards can also be deducted, although there is a deduction limit.</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Independent contractor wages can also be deducted so long as you are paying reasonable wages.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><h3 data-dcnode-id="2045" id="heading_17"><span data-dcnode-id="2046" instrument_node="">Commissions Deduction</span></h3><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Since commissions are considered a part of an employee’s wages (even if the commission is on top of regular wages or salaries), commissions are a deductible tax expense.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><h3 data-dcnode-id="2039" id="heading_19"><span data-dcnode-id="2040" instrument_node="">Employee Education Deduction</span></h3><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Many employers now offer education assistance to their employees. The good news? Most often these fees are deductible up to a certain amount. You can write off work-related education expenses for your employees, including:</span></p><span data-dcnode-id="2035" instrument_node="">
</span><ul data-dcnode-id="2021"><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Tuition</span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Books &amp; supplies</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Lab fees</span></li><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Certain transportation &amp; travel costs</span></li><span data-dcnode-id="2022" instrument_node="">
</span></ul><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">There is a $5,250 limit and you must also have a </span><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">written</span></em><span data-dcnode-id="2016" instrument_node=""> employee assistance program to qualify for this deduction. If you are self-employed, you can also deduct the cost of your education, so long as it is related to your business.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Talk to your accountant for the specific rules and regulations regarding this particular tax deduction.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><h3 data-dcnode-id="2009" id="heading_20"><span data-dcnode-id="2010" instrument_node="">Deduct Insurance Premiums</span></h3><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Certain insurance premiums are often tax-deductible, including insurance for:</span></p><span data-dcnode-id="2005" instrument_node="">
</span><ul data-dcnode-id="1982"><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Fire</span></li><span data-dcnode-id="2001" instrument_node="">
</span><li data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Storms or floods</span></li><span data-dcnode-id="1998" instrument_node="">
</span><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Theft</span></li><span data-dcnode-id="1995" instrument_node="">
</span><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Accident</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Loss</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Liabilities</span></li><span data-dcnode-id="1986" instrument_node="">
</span><li data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Malpractice</span></li><span data-dcnode-id="1983" instrument_node="">
</span></ul><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">Those who are self-employed can also benefit from the added health insurance deduction. Learn more about </span><a data-dcnode-id="1978" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/is-business-insurance-necessary/%23What_Type_Of_Business_Insurance_Do_You_Need"><span data-dcnode-id="1979" instrument_node="">what insurance your business needs in our small business guide to business insurance</span></a><span data-dcnode-id="1977" instrument_node="">.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><h3 data-dcnode-id="1973" id="heading_21"><span data-dcnode-id="1974" instrument_node="">Income Tax &amp; Real Estate Tax Deduction</span></h3><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Certain taxes also count as a deduction, believe it or not. For example, real estate taxes and income taxes often count as a deduction.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><h3 data-dcnode-id="1967" id="heading_22"><span data-dcnode-id="1968" instrument_node="">Deduct Legal Fees</span></h3><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Most legal and professional fees are deductible. Examples of typical fees include the cost of:</span></p><span data-dcnode-id="1963" instrument_node="">
</span><ul data-dcnode-id="1952"><span data-dcnode-id="1962" instrument_node="">
</span><li data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Lawyers</span></li><span data-dcnode-id="1959" instrument_node="">
</span><li data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Accountants</span></li><span data-dcnode-id="1956" instrument_node="">
</span><li data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Tax preparers</span></li><span data-dcnode-id="1953" instrument_node="">
</span></ul><span data-dcnode-id="1951" instrument_node="">
</span><h3 data-dcnode-id="1949" id="heading_23"><span data-dcnode-id="1950" instrument_node="">Deduct Bank &amp; Credit Card Fees</span></h3><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">As a small business owner, you can write off fees associate with your bank or credit card institutions. These fees could include monthly service fees, annual fees, overdraft fees, transfer fees, etc.</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Another surprise, you can even deduct credit card processing fees.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><h3 data-dcnode-id="1940" id="heading_24"><span data-dcnode-id="1941" instrument_node="">Interest Deduction</span></h3><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">In most cases, you can deduct all interest paid or accrued during a tax year, so long as you are legally liable for the debt. You can deduct a part of the interest if you are only partially liable.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Certain types of interest are not accepted, so be sure to contact your accountant or tax professional for the most accurate information.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><h3 data-dcnode-id="1931" id="heading_25"><span data-dcnode-id="1932" instrument_node="">Startup Cost Deduction</span></h3><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Is your business a startup? You’re in luck since the IRS allows businesses to write off $5,000 worth of startup costs.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">To qualify for this tax deduction, your startup costs can be no more than $50,000. If your business exceeds this limit, that doesn’t necessarily mean you can’t take the deduction — you’ll just qualify for a smaller write-off amount. But, if your startup costs were more than $55,000, you do not qualify for this deduction. Thankfully, there are 29 other small business tax deductions on this list that you may be eligible for that can save you money on your small business tax return.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><h3 data-dcnode-id="1922" id="heading_26"><span data-dcnode-id="1923" instrument_node="">Advertising &amp; Marketing Expenses Deduction</span></h3><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Does your business pay for a billboard or local advertising? Did you purchase 500 t-shirts and mugs to hand out at a promotional event? Did you opt for Google Ads, Facebook Ads, business cards?</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Usually, you can deduct all advertising expenses that are related to marketing your business.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><h3 data-dcnode-id="1913" id="heading_27"><span data-dcnode-id="1914" instrument_node="">Research &amp; Experimental Costs Deduction</span></h3><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">If your business is conducting research or experiments, you may be able to write off all expenses related to that research.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Your mind might immediately jump to large tech companies coming up with new prototypes or businesses in the medical field experimenting on new treatments and discoveries. However, while these businesses could be eligible for this deduction, the definition of “research and development” is a lot broader.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Research and development (R&amp;D) count as creating:</span></p><span data-dcnode-id="1903" instrument_node="">
</span><ul data-dcnode-id="1889"><span data-dcnode-id="1902" instrument_node="">
</span><li data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">New products</span></li><span data-dcnode-id="1899" instrument_node="">
</span><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Formulas</span></li><span data-dcnode-id="1896" instrument_node="">
</span><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Processes</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Techniques</span></li><span data-dcnode-id="1890" instrument_node="">
</span></ul><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Not sure whether the work you do counts as a R&amp;D cost? Talk to your accountant. You’ll also want to bring your accountant into the conversation because, while you used to be able to fully write off research and experiment costs, in 2022 these costs will have to be amortized, which can get complicated.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><h3 data-dcnode-id="1883" id="heading_28"><span data-dcnode-id="1884" instrument_node="">Cleaning &amp; Janitorial Expenses Deduction</span></h3><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">If you pay for janitorial or cleaning services for your business or office, this expense counts as a deduction on your small business tax return.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><h3 data-dcnode-id="1877" id="heading_29"><span data-dcnode-id="1878" instrument_node="">Intangibles Deduction</span></h3><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">There’s a unique category of deductions for business assets that are considered “intangible,” or assets that aren’t physical. This deduction includes:</span></p><span data-dcnode-id="1873" instrument_node="">
</span><ul data-dcnode-id="1853"><span data-dcnode-id="1872" instrument_node="">
</span><li data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Licenses</span></li><span data-dcnode-id="1869" instrument_node="">
</span><li data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Permits</span></li><span data-dcnode-id="1866" instrument_node="">
</span><li data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Trademarks</span></li><span data-dcnode-id="1863" instrument_node="">
</span><li data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Patents</span></li><span data-dcnode-id="1860" instrument_node="">
</span><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Copyrights</span></li><span data-dcnode-id="1857" instrument_node="">
</span><li data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Patterns</span></li><span data-dcnode-id="1854" instrument_node="">
</span></ul><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1851" instrument_node="">The list of intangibles is long, so be sure to check out </span><a data-dcnode-id="1849" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/deducting-business-expenses" target="_blank"><span data-dcnode-id="1850" instrument_node="">the IRS’s long list of rules and regulations regarding business expenses and tax deductions</span></a><span data-dcnode-id="1848" instrument_node="">. Certain intangibles require amortization over a period of time, so be sure to consult your accountant or tax preparer to properly take this business deduction.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><h3 data-dcnode-id="1844" id="heading_30"><span data-dcnode-id="1845" instrument_node="">Deduct Charitable Donations</span></h3><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">The charitable donations tax deduction is a tricky one because it depends entirely on your business structure. Only corporations can count charitable donations as a write off for their businesses. All other types of business are considered a pass-through business, which means that the business taxes pass through the business owner’s taxes and get taxed at the individual level instead of the corporate level.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Pass-through businesses include:</span></p><span data-dcnode-id="1837" instrument_node="">
</span><ul data-dcnode-id="1823"><span data-dcnode-id="1836" instrument_node="">
</span><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Sole proprietors</span></li><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Partnerships</span></li><span data-dcnode-id="1830" instrument_node="">
</span><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Limited liability companies (LLCs)</span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">S-corporations</span></li><span data-dcnode-id="1824" instrument_node="">
</span></ul><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">The good news? Business owners with a pass-through business structure can still write off charitable donations — the donations will just be considered a personal deduction on your individual tax return rather than a “business” deduction.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><h2 data-dcnode-id="1816"><span data-dcnode-id="1817" id="What_If_I_Missed_Deducting_A_Business_Expense"><span data-dcnode-id="1818" instrument_node="">What If I Missed Deducting A Business Expense?</span></span></h2><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Now you know that there are dozens of business deductions out there. But what if you missed a key deduction last year or didn’t take any deductions at all?</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">You’re not out of luck yet. Some deductions are retroactive, meaning you can have your tax filings reevaluated to include these deductions. Talk to your accountant to learn more.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><h2 data-dcnode-id="1806"><span data-dcnode-id="1807" id="What_Do_PPP_Loans_EIDL_Advances_Mean_For_Tax_Deductions"><span data-dcnode-id="1808" instrument_node="">What Do PPP Loans &amp; EIDL Advances Mean For Tax Deductions?</span></span></h2><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">As a small business owner, it’s possible that you took advantage of Paycheck Protection Program loans, Economic Injury Disaster Loans (EIDL), and EIDL Advances. These programs were put in place to help struggling business owners during the COVID-19 pandemic. One thing that many small business owners wondered is how receiving these loans and grants would affect their taxes and deductions.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1798"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The good news is that business expenses paid for with PPP, EIDL, and EIDL Advance funds are deductible on your business tax return.</span></strong><span data-dcnode-id="1799" instrument_node=""> Even if your PPP loan is forgiven or you received an EIDL grant that does not have to be repaid, all qualifying business expenses are still completely deductible. For example, let’s say that you received a PPP loan and used the funds to pay employee wages and benefits, rent, and utilities. Not only will you receive forgiveness for your loan, but you can also write these expenses off on your tax return to lower your tax liability.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1796" instrument_node="">As with all other deductions, make sure that you keep all records and documentation surrounding your loan, grant, loan forgiveness, and expenses. Still have questions about what COVID relief means for your business come tax time? </span><a data-dcnode-id="1794" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/how-ppp-loans-affect-taxes/"><span data-dcnode-id="1795" instrument_node="">Learn more about how PPP loans and EIDL grants will affect your taxes this year</span></a><span data-dcnode-id="1793" instrument_node="">.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><h2 data-dcnode-id="1788"><span data-dcnode-id="1789" id="What_Do_New_Tax_Laws_Mean_For_Small_Businesses"><span data-dcnode-id="1790" instrument_node="">What Do New Tax Laws Mean For Small Businesses?</span></span></h2><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">In December of 2017, Congress signed the Tax Cuts and Jobs Act (TCJA), which went into effect on January 1, 2018. Many reporters and tax professionals consider this the biggest tax reform in decades, and most ordinary people are still trying to figure out precisely</span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1783" instrument_node="">what all of these changes mean for both themselves as individual taxpayers and the businesses they run.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">According to the same QuickBooks study mentioned earlier, small business owners have mixed feelings about the TCJA tax reform. Thirty-two percent of business owners think the reform will benefit their business, while 19% say it will poorly affect business — and 22% have heard about the changes to the tax laws but have no idea what the impact will be.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Whether the tax reform is for the better or worse, we can shed a little light on what these laws actually mean. Read on for a brief overview of the main tax reform changes that will affect small businesses and their business deductions this tax season.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><div class="su-accordion su-u-trim" data-dcnode-id="1684"><span data-dcnode-id="1774" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1686" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1771" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1773"></span><span data-dcnode-id="1772" instrument_node="">Learn How The Latest Tax Changes Affect Your Business</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1687"><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">
</span></p><h3 data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Huge Cut In Corporate Tax</span></h3><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">The corporate tax rate went from 35% down to 21%.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h3 data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">New 20% Qualified Business Income Deduction</span></h3><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">There’s good news for small businesses too. Certain types of small businesses, such as sole proprietorships, S corporations, and partnerships, may qualify for a 20% income deduction. Since with these business types, the business income “passes through” to the individual business owner’s income for tax purposes, the tax reform allows these individuals to deduct 20% from their total income.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">There are many rules and regulations about how this tax break works, so talk to your accountant to see if you’re eligible.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><h3 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">New Bonus Depreciation</span></h3><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">You can now depreciate 100% of certain expenses instead of only 50%. The IRS says:</span></p><span data-dcnode-id="1748" instrument_node="">
</span><blockquote data-dcnode-id="1745"><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">The new law increases the bonus depreciation percentage from 50 percent to 100 percent for qualified property acquired and placed in service after Sept. 27, 2017, and before Jan. 1, 2023. The bonus depreciation percentage for qualified property that a taxpayer acquired before Sept. 28, 2017, and placed in service before Jan. 1, 2018, remains at 50 percent.</span></p></blockquote><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">The bonus depreciation applies to fixed assets, such as:</span></p><span data-dcnode-id="1741" instrument_node="">
</span><ul data-dcnode-id="1724"><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Vehicles</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Computers</span></li><span data-dcnode-id="1734" instrument_node="">
</span><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Software</span></li><span data-dcnode-id="1731" instrument_node="">
</span><li data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Machinery</span></li><span data-dcnode-id="1728" instrument_node="">
</span><li data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Equipment</span></li><span data-dcnode-id="1725" instrument_node="">
</span></ul><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Used property may also qualify for 100% depreciation if it meets certain requirements. Furthermore, film, television, and live productions may also be eligible for bonus depreciation.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">This law also lets you depreciate farm equipment over five years instead of seven.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Contact your accountant for all of the details and to ensure you are eligible for bonus depreciation before filing.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><h3 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Change In Meals &amp; Entertainment Deduction</span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">In past years, business owners could deduct 50% of entertainment expenses related to their business. Now you can no longer write off entertainment expenses. The IRS says:</span></p><span data-dcnode-id="1708" instrument_node="">
</span><blockquote data-dcnode-id="1705"><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">TCJA generally eliminated the deduction for any expenses related to activities generally considered entertainment, amusement or recreation.</span></p></blockquote><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Business owners can continue to deduct 50% of the cost of meals if certain conditions are met. Qualifying food and beverage purchases are not considered “lavish or extravagant.” Food and beverages served during an event may qualify for the 50% deduction if purchased separately from the entertainment. For all meals, the business owner or an employee of the business owner must be present during a meal with a client, customer, or another business contact.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><h3 data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">New Paid Family/Medical Leave Credit</span></h3><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Businesses offering paid family leave or paid medical leave to their employees can qualify for a credit when certain requirements are met, including having a written policy in place.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1694" instrument_node="">While this is by no means an exhaustive look at the </span><a data-dcnode-id="1692" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/publication-5318-tax-reform-whats-new-for-your-business" target="_blank"><span data-dcnode-id="1693" instrument_node="">TCJA reform</span></a><span data-dcnode-id="1691" instrument_node="">, these are some of the most pertinent changes to what your business is potentially allowed to deduct.</span><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">
</span></p></div></div><span data-dcnode-id="1685" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span><h2 data-dcnode-id="1680"><span data-dcnode-id="1681" id="Start_Saving_On_Your_Business_Tax_Return"><span data-dcnode-id="1682" instrument_node="">Start Saving On Your Business Tax Return</span></span></h2><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1678" instrument_node="">Feeling overwhelmed yet? That’s okay. This post may contain&nbsp;</span><em data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">a lot</span></em><span data-dcnode-id="1675" instrument_node=""> of information, but that means </span><em data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">a lot</span></em><span data-dcnode-id="1672" instrument_node=""> of savings for you!</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">As the Tax Cuts and Job Act continues to be implemented, these new laws will only become clearer, and we’ll keep updating this post to make things as easy for you as possible. While this tax reform is still being fully realized, your accountant is your best friend. If you have any questions or concerns about which deductions you are eligible for and which small business expenses you can write off, talk to your accountant or another tax professional for the most accurate business advice.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1666" instrument_node="">To see if you are ready for other aspects of the tax season, check out our </span><a data-dcnode-id="1664" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/small-business-tax-preparation-checklist/"><span data-dcnode-id="1665" instrument_node="">Small Business Tax Prep Checklist</span></a><span data-dcnode-id="1663" instrument_node="">. For additional help filing your taxes, read our </span><a data-dcnode-id="1661" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/small-business-tax-tips/"><span data-dcnode-id="1662" instrument_node="">top small business tax filing tips</span></a><span data-dcnode-id="1660" instrument_node="">.&nbsp;Happy filing!</span></p><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1655"><span data-dcnode-id="1656" id="Small_Business_Tax_Deduction_FAQs"><span data-dcnode-id="1657" instrument_node="">Small Business Tax Deduction FAQs</span></span></h2><span data-dcnode-id="1654" instrument_node="">
</span><div class="su-accordion su-u-trim" data-dcnode-id="1560"><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1645" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1651" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1653"></span><span data-dcnode-id="1652" instrument_node="">What can I write off for my business?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1646"><p data-dcnode-id="1650"></p><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">You can write off many small business expenses including business software, mileage, office supplies, utilities, and much more. Read our comprehensive list of the top 30 small business tax deductions you can write off as a business owner.</span></p><span data-dcnode-id="1647" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1633" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1642" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1644"></span><span data-dcnode-id="1643" instrument_node="">How much can I deduct in business expenses?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1634"><p data-dcnode-id="1641"></p><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">It depends on the deduction! Some business expenses can be written off fully. Some have limits, like the meals deductions where you can write off 50% of eligible meal costs. Other business expenses have to be depreciated over time.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">There is no limit on the number of deductions you can take. Consult with an accountant or tax professional to confidently take all of the write-offs that your business qualifies for.</span></p><span data-dcnode-id="1635" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1613" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1630" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1632"></span><span data-dcnode-id="1631" instrument_node="">What is depreciation?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1614"><p data-dcnode-id="1629"></p><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Some expenses are 100% tax-deductible. Others, like property and equipment deductions, have to undergo a process called depreciation.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1622"><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Depreciation sounds confusing, but it simply entails claiming a deduction over a period of years instead of all at once.</span></strong><span data-dcnode-id="1623" instrument_node=""> This method is usually required for business assets or significant expenses, such as computers, company cars, office furniture, and property.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">Due to the new tax reform laws, you may be eligible for bonus depreciation on certain fixed assets. Read the IRS’s </span><a data-dcnode-id="1618" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/new-rules-and-limitations-for-depreciation-and-expensing-under-the-tax-cuts-and-jobs-act" target="_blank"><span data-dcnode-id="1619" instrument_node="">rules for depreciation</span></a><span data-dcnode-id="1617" instrument_node=""> to see if you qualify for even more savings.</span></p><span data-dcnode-id="1615" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1604" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1610" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1612"></span><span data-dcnode-id="1611" instrument_node="">Can I deduct health insurance premiums?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1605"><p data-dcnode-id="1609"></p><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Yes! Health insurance premiums are a deductible business expense, along with retirement plans, child care assistance, and other benefits you may offer your employees.</span></p><span data-dcnode-id="1606" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1595" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1601" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1603"></span><span data-dcnode-id="1602" instrument_node="">Can I deduct purchasing a vehicle for my business?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1596"><p data-dcnode-id="1600"></p><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Yes! You can deduct the cost of buying a business vehicle. Usually, large business expenses like this that last longer than a year require you to depreciate the expense over time, but business vehicles are an exception and you can write off the full vehicle purchase price so long the car is for business use only.</span></p><span data-dcnode-id="1597" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1586" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1592" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1594"></span><span data-dcnode-id="1593" instrument_node="">Can I deduct mortgage interest?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1587"><p data-dcnode-id="1591"></p><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Some interest can count as a business deduction, but these waters get tricky. Eligibility for interest deductions varies based on your business’s structure, so be sure to consult an accountant to see if you qualify for the mortgage interest business deduction.</span></p><span data-dcnode-id="1588" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1577" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1583" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1585"></span><span data-dcnode-id="1584" instrument_node="">Can I deduct education expenses for my business?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1578"><p data-dcnode-id="1582"></p><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Yes! So long as the education expenses are business-related. You can write off tuition, books, supplies, lab fees, and more, but be sure to check the deduction limits and talk to your accountant about if you need a formal written education policy before taking this deduction.</span></p><span data-dcnode-id="1579" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1561" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1574" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1576"></span><span data-dcnode-id="1575" instrument_node="">Where can I find tax help?</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1562"><p data-dcnode-id="1573"></p><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">While most accountants have knowledge of small business taxes, a Certified Public Accountant (CPA) is one of the best choices for tax help, because, unlike a traditional accountant, a CPA can legally represent you and your business before the IRS in case of a tax audit.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1569" instrument_node="">Read our post on </span><a data-dcnode-id="1566" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/find-accountant-small-business/"><em data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">How To Find The Perfect Accountant or CPA For Your Business</span></em></a><span data-dcnode-id="1565" instrument_node=""> and check out our other tax-related articles for more help with your small business taxes.</span></p><span data-dcnode-id="1563" instrument_node="">

</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Does Quicken H&amp;B and/or QuickBooks Self-Employed function like Stride AND sync it from their phone app GPS tracker to their financial software?</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Thank you</span></p><span data-dcnode-id="1086" instrument_node="">

</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">In theory, QuickBooks Self-Employed is supposed to have this function; however, the last time we reviewed QuickBooks Self-Employed there were a lot of user complaints about the mileage tracker not working in the correctly. Granted, there are some users who report positive experiences with the app, so it still might be worth a shot (especially if QuickBooks has updated the app to resolve the previous issues). As far as I know, mileage has to be entered manually into Quicken Home &amp; Business.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">If QuickBooks has worked out their mileage tracking kinks, that is probably your best bet, but I’ll leave this open for any other readers who may have found a good solution to this.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Best of luck,</span></p><span data-dcnode-id="1050" instrument_node="">

</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">I have a question about using a property as an office. I am looking at purchasing a small condo (about 350 sf) and using this only as an office. I would be living in another condo, so the smaller space would only be used for working. Would the entire cost of this property be deductible?</span></p><span data-dcnode-id="1013" instrument_node="">
</span><ul data-dcnode-id="1012"></ul><span data-dcnode-id="1011" instrument_node=""> </span><p data-dcnode-id="1008"><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">This comment refers to an earlier version of this post and may be outdated.</span></em></p><span data-dcnode-id="1007" instrument_node=""> </span><div class="reply" data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node=""> </span><a aria-label="Reply to Dave L" class="comment-reply-link" data-belowelement="comment-reply-1548663" data-commentid="1548663" data-dcnode-id="1004" data-postid="29806" data-replyto="Reply to Dave L" data-respondelement="respond" data-wct-parsed="1" href="#comment-1548663" rel="nofollow"><span data-dcnode-id="1005" instrument_node="">Reply</span></a><span data-dcnode-id="1003" instrument_node=""> </span></div><span data-dcnode-id="1001" instrument_node=""> </span><div class="comment-top" data-dcnode-id="1000" id="comment-1548925"></div><span data-dcnode-id="999" instrument_node=""> </span><div class="comment-author vcard" data-dcnode-id="991"><span data-dcnode-id="998" instrument_node=""> </span><cite class="fn" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Chelsea Krause</span></cite><span data-dcnode-id="995" instrument_node=""> </span><span class="comment-meta commentmetadata" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node=""> May 2, 2019 at 8:13 am </span></span><span data-dcnode-id="992" instrument_node=""> </span></div><span data-dcnode-id="990" instrument_node=""> </span><div class="comment-text triangle-border top" data-dcnode-id="964" id="comment-reply-1548925"><span data-dcnode-id="989" instrument_node=""> </span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Hi Dave,</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Thanks for reaching out! So long as the space is used solely for business purposes, you should be able to write it off in the same way you would write off a business rental. With business rentals, generally the cost of rent and utilities are deductible. However, I would check with your accountant to be certain and to learn which records you’ll need to keep in order to prove that you qualify for this deduction.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Best of luck,</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">-Chelsea Krause</span></p><span data-dcnode-id="977" instrument_node="">
