ext="" data-element-type="paragraph" id="1131577706" style="transition: opacity 1s ease-in-out 0s; display: block;"><span data-dcnode-id="1005" instrument_node="">Nicole Powers • Dec 26, 2021</span></div></div><span data-dcnode-id="1002" instrument_node="">
</span></div><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span><div class="dmRespRow u_1821464270" data-dcnode-id="921" id="1821464270"><span data-dcnode-id="997" instrument_node=""> </span><div class="dmRespColsWrapper" data-dcnode-id="923" id="1484962664"><span data-dcnode-id="996" instrument_node=""> </span><div class="dmRespCol large-12 medium-12 small-12 u_1214401551 postPageExtRoot" data-dcnode-id="925" id="1214401551" server_id="1716942098"><span data-dcnode-id="995" instrument_node=""> </span><div class="dmRespRow u_1471232539 blog-post-row" data-dcnode-id="942" id="1471232539"><span data-dcnode-id="994" instrument_node=""> </span><div class="dmRespColsWrapper" data-dcnode-id="944" id="1292474755"><span data-dcnode-id="993" instrument_node=""> </span><div class="dmRespCol large-12 medium-12 small-12 u_1668470589" data-dcnode-id="946" id="1668470589"><span data-dcnode-id="992" instrument_node=""> </span><h3 class="dmNewParagraph" data-dcnode-id="990" data-element-type="paragraph" id="1700776665" style="transition: opacity 1s ease-in-out 0s;"><span data-dcnode-id="991" instrument_node="">Charitable Donations Deduction</span></h3><span data-dcnode-id="989" instrument_node=""> </span><div class="u_1750185103 imageWidget align-center" data-dcnode-id="987" data-element-type="image" data-widget-type="image" editablewidget="true" id="1750185103"><img class="" data-dcnode-id="988" data-dm-image-path="https://cdn.website.thryv.com/md/dmtmpl/dms3rep/multi/blog_post_image.png" id="1129580552" onerror="handleImageLoadError(this)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lirp.cdn-website.com/md/dmtmpl/dms3rep/multi/opt/blog_post_image-1920w.png&amp;raw"></div><span data-dcnode-id="986" instrument_node="">
</span><div class="u_1250789679 dmNewParagraph" data-dcnode-id="947" data-element-type="paragraph" id="1250789679" style="transition: none 0s ease 0s; display: block;"><span data-dcnode-id="985" instrument_node="">Since the Tax Cut and Jobs Act of 2017, there has been a lot of confusion about charitable donations and deductions.  Then, Covid hit and everything went sideways.&nbsp; &nbsp; </span><div data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">There have been so many different additions, provisions and special circumstances over the last two years that it is easy to be confused about what is or isn’t allowed at tax time.&nbsp;</span></div><span data-dcnode-id="982" instrument_node="">
</span><div data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Starting from the beginning, the 2017 tax changes and moving forward to now, here is a brief rundown of what you can and cannot claim for charity.</span></div><span data-dcnode-id="979" instrument_node="">
</span><div data-dcnode-id="975"><b data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Charitable Donations</span></b><span data-dcnode-id="976" instrument_node=""> 
– Before 2017, you could claim up to 50% of your income (AGI) for contributions to charitable organizations.  But you could only do this if you itemized your deductions.  In 2017, the standard deduction was raised and made it impractical to itemize.  The effect of that was, that while you could still give to qualified charities, you might not be able to take advantage of the increased threshold of 60% of your income (AGI). Remember, your itemized deductions must exceed the standard deduction for it to be a benefit to you.&nbsp; &nbsp;</span></div><span data-dcnode-id="974" instrument_node="">
</span><div data-dcnode-id="972"><br data-dcnode-id="973"></div><span data-dcnode-id="971" instrument_node="">
</span><div data-dcnode-id="963"><span data-dcnode-id="970" instrument_node="">After Covid, a change to charitable deductions was made that allowed individuals to claim up to </span><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">$300</span></b><span data-dcnode-id="967" instrument_node=""> 
in charitable donations made in cash, checks, credit card or debit even if they took the standard deduction.  If your filing status is married filing jointly, you can claim </span><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">$600</span></b><span data-dcnode-id="964" instrument_node=""> 
in charitable donations in addition to your standard deduction.  Clothing, goods and services do not qualify.&nbsp; &nbsp;</span></div><span data-dcnode-id="962" instrument_node="">
</span><div data-dcnode-id="960"><br data-dcnode-id="961"></div><span data-dcnode-id="959" instrument_node="">
</span><div data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">The IRS has provided a tool called the </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/charities-non-profits/tax-exempt-organization-search" runtime_url="https://www.irs.gov/charities-non-profits/tax-exempt-organization-search" target="_blank"><span data-dcnode-id="957" instrument_node="">Tax Exempt Organization Search</span></a><span data-dcnode-id="955" instrument_node=""> 
so you can look up which organizations qualify for the donations.&nbsp; &nbsp;</span></div><span data-dcnode-id="953" instrument_node="">
</span><div data-dcnode-id="949"><span data-dcnode-id="951" style="background-color: rgba(0, 0, 0, 0);"><span data-dcnode-id="952" instrument_node="">With added scrutiny by the Treasury Department, it would be wise to only donate to the approved charities and to keep your receipt.&nbsp; &nbsp;</span></span><br data-dcnode-id="950"></div><span data-dcnode-id="948" instrument_node="">
</span></div></div><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">

</span><span class="blog-post-comments-count" data-comment="Comment" data-comments="Comments" data-dcnode-id="825" data-disqus-id="" data-disqus-short-name="" data-href="http://www.communityresourcetax.com/earned-income-credit-and-the-look-back-provision"></span><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span><div class="postDescription" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">What is the look back credit and how does it apply to you?                                                                                                                               Earned Income Credit is a refundable credit for low-income and moderate-income families and individuals.  The credit is based on the amount of money you earned in the tax year and the number of dependents you claim.  It’s a sliding scale.  So, the more money you have earned, the more EIC you qualify to receive.  The credit has limits based on your income and also cuts off at 3 dependents.                                                                This is how it breaks down:                                                                                       If you have no children and earned less than $21,430 (married filing jointly $27,380) = $1,502 max EIC                                     1 child/dependent and earned less than $42,185 (married filing jointly $48,108) = $3,618 max EIC                                     2 children/dependents and earned less than $47,915 (married filing jointly $53, 865) = $5,980 max EIC                                     3 children/dependents and earned less than $51,464 (married filing jointly $57,414) = $6,728 max EIC                                                                                                 But what if you made less money in 2020 and in 2021?                                                      You will see a lower EIC amount on your refund or not qualify for the credit at all.  If you are doing your own taxes using commercial software, you will probably NOT be prompted to use a provision put in place to help you get the maximum amount of the EIC.  Because of this, you are leaving money on the table.                                                                                                So, here’s the secret.  The IRS has a “look back” provision that allows taxpayers to use their income from 2019 to qualify for the EIC.                      This is helpful for people and families who have earned less money since the pandemic.  But you can’t use it, if you don’t know about it.                                                              The easiest thing you can do is hire a professional and knowledgeable tax pro who will apply the look back provision to see if you will qualify for a higher EIC amount.  But, if you insist on doing your own taxes, be careful to review your return and make sure you are getting the EIC.                       As I said before, most of the commercial software's that offer “free” returns, will NOT prompt you or show you an option to use your 2019 income for EIC purposes.                      You can use the help options or contact customer service but don’t be surprised if they don’t know what you are talking about.                                                                You will still enter all of your personal information and income for 2021.  The difference between your refund without the look back for EIC and using your 2019 income to claim the EIC, could potentially be thousands of dollars.                                                                Since the look back is only good for 2 years, you won’t be able to use your 2019 income after this tax season.  This makes it a last chance kind of situation to claim the EIC money.  You should definitely use it.                                                                The child tax credit, stimulus payments and unemployment won’t be applied to your earned income but you will still have to report these payments to keep from slowing down your tax return processing and refund.  Make sure you report all of your income, even cash income from side jobs or side hustles, as these can increase the amount of your EIC.  Generally, the amount of tax you would need to pay would be offset by the standard deduction for your filing status.                                                                A good tax preparer will work up your return both, with and without, these tax treatments to compare your refund amount and file the return with the most beneficial outcome for your individual tax situation.  If your tax preparer doesn’t do this, you need to find a new preparer.                                                                                                           If you have any questions about whether you qualify for EIC, can use the look back provision to your advantage or any other tax preparation questions, reach out.                                                                                                                                                                           My email is                       contact@communityresourcetax.com                                                                                    My phone number is                       502-536-9143                                                                                    My website is                       www.communityresourcetax.com                                                                                                                   Call, text, email or schedule an appointment.  I’m here to help.                                                                                                                                                                         Remember, as always, to                                                                          Invest in Yourself and Grow Our Community                                                                                     Thanks!!                                                              Nicole</span></div><span data-dcnode-id="819" instrument_node="">

</span><span class="blog-post-comments-count" data-comment="Comment" data-comments="Comments" data-dcnode-id="778" data-disqus-id="" data-disqus-short-name="" data-href="http://www.communityresourcetax.com/business-credit-what-is-it-and-how-do-you-get-it"></span><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node="">
</span><div class="postDescription" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Business Credit.                                                                   What is it and how do you get it?                                                                                                         Credit.  Whether you just started learning about it or have been working on your scores for a while now, credit can be complicated and confusing.                                                                                  With so many scams, so much bad information, schemes and so many different credit and information bureaus out there developing your personal credit can be a chore.  The challenge of starting business credit can be daunting.                                  So how does a small business person start business credit?  Unfortunately, in the beginning, your personal credit will factor in and come to play in starting your business accounts and credit.  The banks, vendors and credit bureaus will not have any other information to base their decisions on, except for your personal credit.  Here is some information to get you started.                                                                    You had an idea, a skill or trade and started a business.  You’ve done your research, filed for an EIN, chose a name, filed for an LLC or corporation, wrote a business plan and have started marketing and building your business.  But you need money to grow, buy supplies, hire and train new employees.  You opened a bank account in your business and have started looking for loans and credit cards for your business.                                                 The first step is to make sure your business finances are clear and clearly documented.  Having your books together and maintaining them is going to help you at every stage of your business growth.                                                                                              Take a look at your personal credit.  Even though you aren’t wanting to use your personal credit for business, there is a short window in your business development that you will have to personally guarantee (or use your personal credit score) to get the ball rolling.  Knowing your scores and cleaning up your report will help you in the long run.                                                                    You need to understand that different scoring is used for developing business credit.  Different companies are involved and different criteria are used to evaluate your company’s creditworthiness.                                                                      One of the first places you can look is Dun &amp; Bradstreet.  This is a company that offers both free and paid services to businesses to start building business credit.  It takes about 5 minutes to open an account and get started.                                                                      Experian and Equifax are also in the business credit scoring game.  Opening accounts with these companies will help you in the long run.                                                                    Business credit is scored from 0 to 100.  You will have a Paydex score and an Intelliscore Plus score.  These scores will help banks and vendors decide how much credit they will give you, interest rates, repayment terms and a variety of other financial considerations that will affect your bottom line and your growth.                                                                                                      You're going to see terms like “freezing your personal credit” and “PG”, as well as, Net 10, Net 30 and Tiers.  It’s a lot of information and I will try to break it up into smaller categories as much as I can.  But to get started                                                                                               Open a NAV account.                                        Open a Dun &amp; Bradstreet account.                                          Open an Experian business account.                                                                                               Start establishing your company with these credit reporting companies.                                  Stay organized.                                    Start a separate file for each kind of account you open and proceed with caution.                                                                      Everyone is going to try to sell you something.  This is a huge industry.  But don’t be afraid to  jump in.... AFTER YOU HAVE DONE SOME RESEARCH!                                                                       Let’s start with some business credit companies, their links and some common credit account terms.                                                                                 https://www.dnb.com/                        This is where you go to get a D-U-N-S number.  This is like a social security for your business to start building your account with Dun &amp; Bradstreet.  It only takes about 5 minutes and it is free to get your number. You can use this number when applying with vendors, suppliers, business credit cards, etc.  When you make purchases and payments to your vendors and cards, they will report that positive account activity and you will start developing a business credit score.                                                                                 https://www.nav.com/                        This company’s focus is more related to business loans and financial “partnering.”  They match you with lenders, credit cards and other financial resources to help your small business gain access to various bank products that you may qualify and be approved for.                                                                                   https://www.experian.com/small-business/small-business-credit                        Experian has a lot of great information about building business credit.  How to start, how to look up your business’ credit score and the scores of other businesses.  Sign up with an account with them as well.  Experian personal and business credit are completely separate.                                                                                                        Net 10, 20, 30 and 60 accounts – These are terms related to business credit extended to companies by vendors.  You have an office?  You need office supplies.  Instead of paying as you go for paper, printers, desks, trash bags, etc., you apply for business credit through companies that offer those goods and pay the balance according to the payment terms you’ve been approved for.  Here is a link to a pretty good article that breaks it down for you.                         https://www.investopedia.com/terms/1/1-10net30.asp                                                                                            There is far too much information and learning related to establishing business credit to cover in one article, blog or video.  I just introduced a few fundamentals and some links to companies to help you get started on that journey.  In my upcoming blogs, I will introduce and explain other aspects of business credit in more detail.  I will provide as many links and resources as possible for you to look through.                                                                    Until next time, remember to                                                                                               Invest in Yourself and Grow Our Community</span></div><span data-dcnode-id="772" instrument_node="">

</span></h3><span data-dcnode-id="747" instrument_node="">

</span><div class="authorBar" data-dcnode-id="729"><span data-dcnode-id="744" instrument_node=""> </span><span data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">By Nicole Powers</span></span><span data-dcnode-id="741" instrument_node="">
</span><span data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">•</span></span><span data-dcnode-id="738" instrument_node="">
</span><span data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">28 Dec, 2021</span></span><span data-dcnode-id="735" instrument_node="">
</span><span data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">•</span></span><span data-dcnode-id="732" instrument_node="">
</span><span class="blog-post-comments-count" data-comment="Comment" data-comments="Comments" data-dcnode-id="731" data-disqus-id="" data-disqus-short-name="" data-href="http://www.communityresourcetax.com/farms-and-taxes"></span><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">
</span><div class="postDescription" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">I recently had a request for more information about farms and farming.  I love this topic.  The overwhelming majority of our agriculture are small, family-owned farms.  There are a lot of opportunities for farmers and anyone in agriculture to recoup losses, save on taxes and get their books in order to qualify for federal programs designed to help them succeed.                                                      Food and livestock are essential for basic survival.  Everyone knows and understands that.  But few people know how difficult the work is and how much paperwork, documentation and time it takes to manage a farm.                                                                Let’s dive in to the basics of farming and taxes!                                                              First, we will explore the state level.  States, individually, define farms.  It is important to research and review what the guidelines for farming and livestock is for your state.  Since I am in Kentucky, we will look at Kentucky’s definition of a farm and what the Agricultural Department expects to see to consider you a valid farm and not just a hobby farmer or someone with an active green thumb.                                                              The Kentucky Revised Statute 132.010 (9, 10, 11) defines agricultural land as any tract of land, including all income producing improvements of at least 10 contiguous acres in area used for the production of livestock, livestock products, poultry, poultry products and/or the growing of tobacco and/or crops including timber, or where devoted to and meeting the requirements and qualifications for payment pursuant agricultural programs and an agreement with the state or Federal government.                                                              If you grow flowers, vegetables, fruits, nuts, have a garden or an orchard, that is used commercially, you only need                       5 contiguous acres                      .                                                              Kentucky also has an Agricultural Exemption Number.  This allows you to be exempt from certain sales and use taxes specifically for agriculture.  This new number was signed into law in 2020.  Here is a link to the Ky. Department of Revenue that explains the number and gives you all the information for applying.                       https://revenue.ky.gov/News/Pages/Kentucky-Farmers-Can-Now-Apply-for-New-Agriculture-Exemption-Number.aspx                                                                         For those of you who have livestock, there are a lot of regulations related to licensing, pest and disease control, marketing, labeling and storage.  To do a deep dive into these requirements and topics, take a look at                       https://www.kyagr.com/                      .                                                              So, now that you have established that you have a farm or commercial agricultural enterprise that qualifies at the state level for tax treatments and meets regulatory requirements, let’s take a look at the federal level tax treatments for your animals, supplies, land, equipment and income.                                                              The USDA defines a farm as any establishment which produced and sold, or would have sold, $1,000 or more of agricultural products during the year.                       Your farm can be organized as a sole proprietorship, partnership or family corporation.                                                                         Like any business, you should establish a business plan, develop the type of business you are running, keep consistent and accurate records of all incomes and expenses.  Just like any other business, you can claim home office expenses.                                                                 Farmers must meet the same standards as any other business when it comes to taking deductions.  In agriculture, these ordinary and necessary expenses include car and truck expenses, fertilizer, seed, rent, insurance, fuel, and other costs of operating a farm.                                                              Cars, trucks, tractors, buildings, fences, cows, hogs, sheep and chickens can all be depreciated under certain guidelines.  Depreciation is a method used to recover the costs of business assets over a period of years.                                           You can see a list of items that you may have purchased and used for your farm that have available tax write offs over a certain number of years.  For example, if you bought sheep or goats this year for breeding, then you can claim a certain amount of the cost of those animals every year for 5 years.   Check out                         IRS Publication 225                        for all the details on depreciable farm assets and properties.                                                                                     There is also a deduction available in the tax code to recoup the costs of your assets, fully, in the same year you put it “into service” called                         Section 179                        .                                            The PATH Act permanently extended an enhanced “section 179” deduction for 2015 and beyond. The Tax Cuts and Jobs Act (TCJA) further enhanced this deduction. For 2019, farmers and small businesses could deduct up to $1,020.000 of the tax basis of certain business property or equipment placed into service that year. Once qualifying purchases reached a threshold of $2,550,000 in 2019, the amount of the deduction was reduced, dollar-for-dollar for each dollar above the threshold. The section 179 deduction, as well as the threshold, are indexed for inflation. For 2020, the amounts are $1,040,000 of tax basis and $2,590,000 for the investment threshold limit.                                                                          The section 179 deduction applies to both new and used business equipment                      . Because it applies to 15-year property or less, it does not apply to farm buildings, but can be used for single purpose agricultural structures, such as a hog barn.                                                              There is another deduction that is available to farmers only.  It’s for conservation.  Here’s the breakdown IRC § 175(a). A taxpayer is engaged in the business of farming if he “cultivates, operates, or manages a farm for gain or profit, either as owner or tenant.”                                                              Treas. Reg. § § 1.175–3. A taxpayer who receives a rental (either in cash or in kind) which is based upon farm production is engaged in the business of farming for purposes of the conservation deduction.                                                              You can see a complete list of the eligible deductions and every other eligible farming deduction in IRS publication 225.                       https://www.irs.gov/publications/p225                                                                                    This publication has a list for everything you need.  From what kind of documents required to prove a deduction in case of an audit to bookkeeping requirements.                               Farm returns are reported on Schedule F.                                             You can hire your family to work on the farm and deduct their wages the same way you would any other hired employee.                      For agriculture, there is an age limit.  Kids 14 and 15 yrs old can work after school.  Your children and your spouse, up to the age of 18 yrs old, could potentially work tax free.  Check out this blog to see the guidelines for hiring your children                       TAX FREE                      !                       https://www.communityresourcetax.com/financial-planning-101-family-business-and-paying-your-children                                                                                    To get the most out of the available deductions, credits and exemptions, you should consult a qualified tax professional.                                                                Having an established, permitted or licensed farm at the state and federal level will also allow you to access resources specifically designed for agriculture.  Depending on what kind of agriculture you are engaged in and when started, you could also qualify for pandemic relief.  While some of the programs have already closed, others are still available.                                                                Here’s the link for that.                       https://www.farmers.gov/coronavirus/pandemic-assistance                                                                                    As you can see, there are a lot of regulations related to agriculture.  But there are also deductions available for you that other industries don’t qualify to receive.                       Check out all of the links provided and always do your own research.                                                                         Thanks for checking out today’s blog.  If you have any questions or have a topic you’d like to explore, feel free to email me.                                                                                                       contact@communityresourcetax.com                                                                                                                                 Always remember to Invest in Yourself and Grow Our Community.</span></div><span data-dcnode-id="725" instrument_node="">

</span><div class="postDescription" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">So many of us have entered the stock market in recent years that never participated before.  There are a lot of tax laws and liabilities involved in the sale of stocks and other assets in the form of capital gains.                                                    Up until now, capital gains have been taxed at a much lower rate and by investing, instead of trading, an investor had no tax liability at all and could hold on to their investments for years without incurring any kind of tax liability.                                                              Upcoming legislation could impact investors in the following ways:                               A higher tax rate on capital gains                               Taxes being assessed on unrealized capital gains.                                                              While the law hasn’t been changed yet, it is being discussed and debated in Congress.  This may seem like a terrible and unfair situation for investors but a solution is already in place to mitigate your tax liability and offset your taxes.                                                              In the Tax Cut and Jobs Act of 2017, there is a little-known program called Opportunity Zones.  An Opportunity Zone is a fund that allows private investors to put their capital gains into funds designed to support and grow underdeveloped and economical distressed communities.  Qualified Opportunity Zones are located all across the nation, in all 50 States and American territories.                                                                There are currently over 8,700 funds available to choose from.  I’ve seen everything on the list from single family housing, hotels, multifamily housing, commercial real estate to workforce housing and infrastructure development.  It’s a pretty amazing program, in my opinion.                                                              The way it works is the investor sales a stock holding or other investment.  They have 180 days from the sale of that asset to reinvest the capital gains from the sale into a Qualified Opportunity Zone Fund or QOZ.                                                              In order to take advantage of this opportunity to invest with tax benefits, you’ll have to match the purchase price of the properties in renovations. When you meet that threshold, you’ll be eligible to receive the tax benefits.                                                              The QOZ Fund invests that money into Opportunity Zone Property.                                                                Similar to any other investment, the holding may increase or decrease in value over time.  But it can also generate income for the investor. As properties and holdings in the fund continue to improve, there is the strong possibility of cash flow.                                                              This is also a great way to reinvest your capital gains into your own local community, if an opportunity zone is available.                                                                                                                            Here are the benefits in short:                                                               You get a tax deferral on any taxable gains until 2026.  You will pay no tax on 10% of gains after a 5-year period.  There are a lot of articles out there from reputable sources that can break it down for you.  Doing a quick internet search will be worth any investor who is looking for a way to reinvest and lower their tax burden.</span></div><span data-dcnode-id="678" instrument_node="">

</span><div class="postDescription" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">In my last blog in this series, we talked about becoming a notary.  If you didn't read that blog,                     click here                    .  Also check out my How To Become a Mobile Notary ebook, ready for immediate download after payment.  (It's ridiculously inexpensive.)                                                    This time I want to give you some thoughts and ideas about another way to make some money with a tight TIME BUDGET and low income.  This plan involves retail arbitrage.  If you've never heard that term....keep reading!                                                              If you go on YouTube, you can find video after video of people shopping for and finding bargins at all of these stores like it's the easiest thing in the world.  They just turn up at Store X and find a product that sells for $30 but they found it for $9.99 and now they are going to sell them and make a huge profit.  It's all so simple!!!!                                                              But like most things, it doesn't really work that way.  I'm sure everyone has thought about getting rich by having a shopify store or being a seller on any of the other platforms available.  But what REALLY goes into it?  What kind of time commitment?  What about shipping?  How do you find these deals?  Is dropshipping really a workable solution?  How do you pick a product?  How do you manage customer complaints?  So many different questions will start popping up and before you know it, you've fallen down a rabbit hole full of great ideas that you never get to, inudated with ads and emails with get rich quick schemes and the algorithms will start to take over your feeds with a constant drumbeat of easy money (if you just buy their website, sell this product, etc and forever.)                               I've got a TON of experience in this because I've done it.  I've tried it all!  So let me tell you what has worked, what has flopped and what I have learned along the way.                                                              First, I want to cut to the chase and talk about what has worked.  I am not promoting one platform over another but I am speaking from what worked for me.  As a mom of 5, I don't have a lot of time and money.  That kind of sets the stage on my time budget.  Not a lot of time to devote to the endeavor.  But I started an Ebay account.  At first, I just started a personal account that only let me post a limited amount of items per month and I sold some of my new clothes that still had tags but I never wore and some gently used shoes.  It was exciting to get my first sale.  I was going to make a fortune.  I ran out to the post office, picked up some boxes, printed my labels and dropped them in the mail.  But I was just breaking even.  Not really turning a profit because all of my items weren't selling or even getting any interest.  But I was willing to keep trying.  So I started looking around for great deals for items that were selling well on the platform and would go around to all the different stores looking at clearance aisles, signing up for apps that promised to alert me to hot selling items that were marked down in my area, etc.  But it was so time consuming to drive around, running in and out of stores trying to find those deals that I was burning through my time budget and my money with virtually no return on my investment.                                                              It became harder and harder to give my time to a project that I wasn't making any money at.                                                              Even if I found a great deal, I had to take great pics, use the perfect description with keywords that would pop it up to the top of the list, figure out the price and hope I made a sale.  It became so time consuming that it was defeating the entire purpose.  I was definitely going into the negative but I am persistent and didn't want to give up.                               I did some more research and found a solution.  My solution was a young man in Pakistan who works as a virtual assistant to manage, setup and promote online stores like Ebay, Amazon and Walmart.                               (Here is his information -                       https://www.fiverr.cm/s2/c29e96244                      )                                                              I hired him and he started working on my account.  He developed a professional store, did all of the product research, keyword searches, customer questions, shipping, managed payments, increased the amount of product I was able to post every month, handled returns...... he literally does it all!  My seller ratings went up, the number of people looking at the products on my Ebay store tripled and he started helping me branch out to other selling platforms.  Sales started becoming more consistent and I had to do nothing except talk to my virtual assistant.  He sends me daily sales reports, pitches me ideas about improving or expanding the store, sources all the dropshipping sources.  He has given me back what I value the most.....TIME.                                                              I don't have to take up any more space in my house trying to store items that don't sell.  I don't have to take pictures, fill out descriptions, answer question, do any shipping or product research.                                                              This is finally working.  Passive income with very little effort on my part.  My margins are still slim and I'm not in the millionaire club but the potential is there.  I'm seeing results.  As with anything, you have to give it time and thought and energy to make it work.                                                              But with the help of a good assistant with expertise in the field, I was able to let go, stop micromanaging, take back my time and still start growing my online retail outlet.                                                              A word about what didn't work.  Shopify stores.  I ran into a wall with this platform.  While it is super slick and has a ton of options with affordable prices, it became so time consuming with no return on my investment that I felt as though it was a black hole I was just throwing cash away to fund.  I have found it extremely difficult to cancel the store.  Extremely.  The dropshippers have a limited amount of products that actively sell and it's very difficult to promote the site.  Of course, you can hire a virtual assistant to do the work for you.  It just depends on what you like, what you are comfortable with and how much you want to invest.                                                              If you have an interest in creating an online store, reselling or dropshipping, I would highly recommend contacting my virtual assistant and talking to him about your needs and your vision.  I've found him to be very reliable and affordable.                                                              I have a ton of insights and anecdotes about my journey through online retail sales.  If you want some more information or have a question, just shoot me an                       email                      .                                                              If you want to reach my assistant here's all of his contact information.                       https://www.fiverr.cm/s2/c29e96244                       or email him directly by clicking                       here                      .                                                              As always, remember to Invest in Yourself and Grow Our Community.                                                              Until next time.....</span></div><span data-dcnode-id="631" instrument_node="">

</span><div class="postDescription" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">In my first blog,                     Financial Planning 101 - Family Business and Paying Your Children                    , we explored the rules, the benefits and the limitations of hiring your children to work in your small business.  Click the link and read about the $12,000/yr your child earn while giving your company some pretty significant tax deductions.                     One of the limitations is the age the child can be for the IRS to allow the payroll and business deductions.  Basically, if you're child is 7 yrs old or older, the IRS will be more accepting of the assigned role you have hired them for in your company.  But what if you have children under 7 yrs old, you work from home or you have a regular job and a side business?  There are still roles your little ones can legally fill that would allow you to pay them up to the $1,000/month TAX FREE limit.                                                              Every business needs advertisement.  It doesn't really matter what the business is, you need to get the word out about who you are, what you offer and how to contact you.  A great idea to let you legally pay your child is to hire them for contract labor as models and/or a spokesperson for your company.                                                              Do you have a side hustle of any kind at all?  Make a Facebook or IG page, TikTok and YouTube and HIRE YOUR CHILDREN to promote and advertise your product or services.  Pictures with products, a short scripted video, anything that you want to use to advertise your business.                               Pay attention to this part, it isn't an employee payroll expense.  This would fall under                       advertising expenses                      for your business.                       Advertising expenses are 100% tax deductible.                                                     There are plenty of boilerplate modeling contract templates out there to use.  Pick one and USE IT!  Models can and are any age.  Even a baby can be a model.  As long as the child earns under $12,550.00 (2021)  in the year, they don't have to file a tax return.  So paying your child, $1,000/month to be a model for advertising purposes and having a contract to prove it, is completely legal and considered a reasonable and common expense for your business.                               Since you will be paying them over the $600/year threshold, you will need to generate a 1099 for them at the end of the year, even if they don't file their taxes.                                                              As you know, content is king.  Want to boost sales?  You better be able to create content and a lot of it.  Assign another person in your family business to be responsible for managing your model and you are all set.  You just knocked out two family jobs at once.                                                              Always keep copies of your documents on file for auditing purposes, review the rules and regulations yourself or with your tax preparer and                       make sure you follow them.                                                                                                Remember, your not just using your children to get deductions for your business.                       You are creating a future for them                      .                                                              The facts are this.  If you start investing $100/month in a S&amp;P 500 index at age 25, you will retire a millionaire.  Compound interest is your best friend.  If you are able to start investing your childs earnings every month, as a minor, the financial benefits to them are outstanding!                               And there are so many other options for investing and savings that will allow you to develop a very strong financial portfolio for them.                               Use these wages to fund your child for every stage of life and to help educate them about money.                               Just imagine if you turned 18 and had tax free college savings, a credit score over 700 and available liquid assets to launch your life as a young adult with the added security of having a retirement plan already in place and earning.  That kind of security is something we can only dream about, right?  NOPE!!! It doesn't have to be a dream.  You can do it with some careful planning.                                                              Thanks for stopping by and reading today's post.  Don't forget to check the rest of the blogs in the series.  We offer ideas and education about budgets, business ideas and taxes.                               Email me at                       contact@communityresourcetax.com                       with any questions or any topic you want me to explore.  I will send you a free, downloadable ebook on this years tax updates with stimulus information for personal and small business taxes.                                                              As always remember to Invest in Yourself.  Grow Our Community.                                                              Nicole with                       Community Resource Tax</span></div><span data-dcnode-id="584" instrument_node="">

</span><div class="postDescription" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Check out this short video about LLC's                      .                               Being successful, independent and your own boss is THE Americian dream for some of us.  You can do it!  But while you are building your dreams, give some thought to what kind of business structure you want and need.  You have so many options and there are plenty of choices for you.                                                              If you want to stay small and operate a home based business without the burden of a bunch of paperwork and State filings, you can operate as a sole proprietorship.  All that means is when you file your taxes, you just file like normal without any extra forms or schedules.  The downside is you pay at your normal, individual tax rate and you won't be able to get all of the business deductions you could qualify to receive.  Everything is processed under your social security number.  The other downside is that if you end up having any kind of debt, even personal debt like child support or defaulting a personal loan, your business income and business assets are up for grabs.  Finally, as a sole proprietor, you might find it harder to qualify for business loans.                                                              Another option is to form a LLC.  This is the simplest type of business type you can file.  Some major companies and extremely wealthy companies are LLC's.  You can be a sole proprietor and be a LLC.  You can also be a single member LLC.  Or you can be a multi member LLC.  It all depends on you.  Don't forget you can change your business type when you like.  You can start a single member LLC and then, if you get a partner, you can add members.                               For this kind of business you will need to do a little bit more work and pay some fees to get it going.  Go to your Secretary of State website and do a business name search to make sure the name you want is available.  Once you know the name is open, go to the IRS website and get and EIN.  This is just a social security number for your business.  Now, it's time to go back to your state website and start filling out the paperwork to establish and register your LLC.  You will have fees.  They vary from state to state from $40 to $250.  You will also need to file Articles of Organization.  Choose your business type, business structure, add members, give the business address, phone number, email.... the works.  If you have multiple members, you will need to have all of that listed in your paperwork along with what percentage of the business each member will get.  This will affect taxation and profits.  You will need to chose a manager, member and registered agent too.  If it's just you, then you will be listed as every role.  That's perfectly fine and completely legal.  You may need to file with your local or county government as well.  The requirements for listing your business at the local/county level will vary as well.  Reach out to your local clerk's office or small business resource center to find out what you need and how much it will cost you.                                                              All pretty boring stuff.  It can be time consuming and also frustrating.  As simple as it sounds right now, you are bound to have questions or hit obstacles that you didn't anticipate.  You can do it yourself or you can hire a company to do it for you.  There are a lot of companies out there offering this service so shop around for the best fit.  I will always promote local business over box chains and faceless internet service providers.  No matter how "cheap" the price tag may be for some of these services, a local business will always provide better customer service and also a much more tailored solution for your needs.  As a small business owner yourself, you understand how important every contract can be.  The cheaper the price tag, the higher volume of work the larger corporation will have so you could get a more generic product and less than satisfactory customer service.  That and they will upsell the crap out of you.  Shop local!!                                                              While you are building your business, you will need to have at least a professional email to go with it.                               You will also benefit from a virtual address and a business phone line.                               Whether you have a website, dedicated social media accounts or neither, is entirely up to you.                               You need the email, phone and virtual address for banking purposes.  While you don't NEED those things to open a bank account, you will need those things to more easily build and qualify for credit cards and loans as you grow your business.                               Again, local businesses offer the setup and services for registered agents, virtual addresses, etc.                                                              Now that you have your business paperwork in order, it's time to go to the bank and get a business account.  You have your choice of virtual banking or local banks.  Do a little research and find out which banks offer the best deals for your type of business and your banking needs.  Bank products can vary wildly!  There isn't a right or wrong answer here but a local bank, a community bank or a credit union will probably be the best option for you as a start up.  Remember, you won't have any business credit when you first start your company, even with a ton of cash flow.  The banks and credit unions will use the only credit score they have to approve or deny you for accounts, loans and cars.  But with time and good bookkeeping, you will be able to build business credit and your personal credit will no longer come into play.                                                              Imagine that!  Business credit completely separate from your personal credit.                                                              That's the goal.  To have all of your business assets separate from your personal assets.  That's the beauty of a LLC.  You can protect your assets.  Your bank accounts and property listed under your LLC are protected from your personal accounts and property.                                                              The tax benefits include additional deductions and credits that you, as a person, won't have access to use.  Also, you have some flexibility in how you file your taxes.  You can file as a corporation and take advantage of corporate tax rates and deductions.  A good tax preparer or accountant can advise you.                                                              Thanks for stopping by and reading today's blog.  If you have any questions about today's topic you can always email me at                                           contact@communityresourcetax.com                      .  I will send you a free ebook with this years latest tax updates for personal and small business.  There is a lot of useful information in there including some stimulus information that you might not know about.  It's a quick download and it's free.                                                              Take a look at my website,                       www.communityresourcetax.com                      for more blogs and also the services I offer.                               I can help you with your business structure, articles of organization, name searches, EIN applicatons and banking information.                                                              As always remember to                                                        Invest in Yourself and Grow Our Community.</span></div><span data-dcnode-id="537" instrument_node="">

</span><div class="postDescription" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Everyone needs a little extra income.  For most of us, it's time that holds up back.  After working all day, running children around, chores, bills and every day life, it's hard to carve out enough time to relax.  While the desire may be there to earn extra money, time holds us back.                                                    There are a lot of get rich quick schemes and "easy money" ideas floating around. What is rare is having someon tell you about a great idea and fill you in on all the actual work involved to be successful.  As with any job, steps have to be taken to get setup, learn the ropes, market your skills and get paid.                                                              Getting paid is the ultimate goal.                                                              But there are options for busy people.  With very little investment you can start a side business that you can keep small or grow according to your needs.  The business is becoming a notary.                                                              Being a notary can be as simple as filling out a form with your Secretary of State, passing a background check, buying some affordable insurance and getting your stamp.  It really isn't too much at all.  The financial investment is small and tax deductible.  The forms are simple and the rules are easy to follow.                               How much money you make and how much time you spend doing it is entirely up to you.                               A notary is basically a person of good reputation who is recognized as having the authority to impartially witness contract signings, deed signings, asset transfers, etc.  Every person who has ever bought or sold a car has needed a notary.  But there are so many other people who need notary services.  Some people just put a sign on their lawn or from their porch advertising their service.  Some people go online, others get their information out to banks, auto dealerships, realtors and anyone else who might need a notary.                               You can have people come to you or you can be a mobile notary.  You can do both.  The flexibility of this job is probably the most attractive part of it.                               How much you earn is up to you.  Statistically, notaries can earn anywhere from $500 to $2,000 a month.                               That sounds pretty good to me!                               Every state has it's own rules so with a little research and minimum effort, you can be on your way to earning some extra cash for savings or to cover those never ending bills.                               To get started, i have put together a handy guide.  My ebook has a short history, legal requirements and steps to get you started.  With handy links and lots of information about where to find business, it's a great place to start.                                                              You can get your copy for $5, download it instantly to any device and be ready to go!                               Email me at                       contact@communityresourcetax.com                      .  Hop on my website at                       www.communityresourcetax.com                      for a quick link.                                                              Thanks for taking the time to read my blog today!  Let me know if you have any ideas or questions you'd like me to write about.                                                              Remember to Invest in Yourself.  Grow Our Community.                                                              Until next time...... Nicole Powers</span></div><span data-dcnode-id="490" instrument_node="">

</span><div class="postDescription" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Budgets are just boring.  Who wants to take their day off or an evening after work and go through tedious, sometimes frustrating, and often disheartening budgeting?                                                    Where do you even get started?  Most of us are living paycheck to paycheck.  Bills always come first and we often struggle to fulfill those basic needs.  God forbid you have a blown tire, get sick and miss work, have daycare issues or some other complication come up to destroy the budget you just spent hours trying to make.                                                              Boring and frustrating it may be..... But it is one step on the path to get you out of that cycle of having to decide whether to go work feeling like death, pick which bill you can afford to pay this month and still eat or any other tactic you’ve had to employ to survive until your next paycheck and the next month.                                                              Think of your budget as a tool you are going to use to keep yourself and your family safe.                                                                Before you sit down and look at your money in and your money out, take a little bit of time to look at the different methods you can use to establish a budget.  There is more than one way to do it.  Not every budgeting strategy is going to work for you.  So, today, I’m going to outline just a few of the options and strategies that have worked for other people.                                                              First, let’s look at ZERO BASED BUDGETS                                                              This method has to be maintained and updated every month.  If you’ve never established a budget before, you might consider starting here.                       With this method, at the end of every month or every pay period, you’re left with zero dollars.  Every dollar is assigned to a specific bill or savings.  Basically, you add up your monthly income.  Then add up your monthly spending and savings.  Every dollar should be assigned to a bill or saving so the balance always ends up at zero.                                                                         Another good budgeting option is call PAY YOURSELF FIRST BUDGETING.                                                              So, you prioritize your savings and your debts.  You determine a value for savings or debt repayment and set aside that amount first.  The remaining income can be distributed any way you like.  By focusing on paying down high interest debt and starting or adding to a savings account, you will be able to lower your overall debt more quickly and then be able to shift that money into savings or other necessities.                                                              A common budget that many people use because it is simple and doesn’t require a lot of meticulous line item work is called 50/30/20.                                                              With this budget, 50% of your income goes to necessary expenses.  30% goes to discretionary spending and 20% goes to savings and debt repayment.  This is a very simple and straight forward budgeting plan and has a lot of flexibility.   You can set this budget up by pay period or monthly.  Whatever is easiest for you.                                                              There are many, many more types of budgets and schemes and plans to help you save money, organize and finance your goals.  These are just a few.                       If you are interested in more in depth information about any of these plans or have a question about savings, debt reduction or tax planning, feel free to contact me.                                                                         I have a ton of ideas and resources to fit into almost any lifestyle or financial situation.  Thanks for stopping by and visit often for more tips, tricks and free information.                                                              As always, Invest in Yourself.  Grow our Community                               Nicole with Community Resource Tax</span></div><span data-dcnode-id="443" instrument_node="">

</span><div class="postTextContainer" data-dcnode-id="393"><span data-dcnode-id="426" instrument_node=""> </span><div class="postText clearfix" data-dcnode-id="395"><span data-dcnode-id="425" instrument_node=""> </span><div class="postTitle" data-dcnode-id="417"><span data-dcnode-id="424" instrument_node=""> </span><h3 data-dcnode-id="419"><span data-dcnode-id="423" instrument_node=""> </span><a data-blog-post-alias="financial-planning-101-family-business-and-paying-your-children" data-dcnode-id="421" dont-color-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.communityresourcetax.com/financial-planning-101-family-business-and-paying-your-children"><span data-dcnode-id="422" instrument_node="">Financial Planning 101 - Family Business and Paying Your Children</span></a><span data-dcnode-id="420" instrument_node="">
</span></h3><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span><div class="authorBar" data-dcnode-id="400"><span data-dcnode-id="415" instrument_node=""> </span><span data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">By Nicole Powers</span></span><span data-dcnode-id="412" instrument_node="">
</span><span data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">•</span></span><span data-dcnode-id="409" instrument_node="">
</span><span data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">13 Dec, 2021</span></span><span data-dcnode-id="406" instrument_node="">
</span><span data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">•</span></span><span data-dcnode-id="403" instrument_node="">
</span><span class="blog-post-comments-count" data-comment="Comment" data-comments="Comments" data-dcnode-id="402" data-disqus-id="" data-disqus-short-name="" data-href="http://www.communityresourcetax.com/financial-planning-101-family-business-and-paying-your-children"></span><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span><div class="postDescription" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Did you know your child can earn up to $1,000/month without paying taxes?  That is potentially $12,000 a year. You read that right!  Hiring your child(ren) to work in a legitimate capacity for your business can result in huge tax reductions for you and an opportunity to create savings and credit building for your family members.                     How is this possibly legal?                               It always has been!  You simply have to know and FOLLOW the rules and guidelines outlined by the IRS and you are on your way.                                                              Here are the rules.                                                              Your child has to be a legitimate employee.                                                                                       What is a legitimate employee?  A child 7 yrs old or older who performs normal, ordinary, common and appropriate duties related to your business.  Those duties don't include babysitting your other children, yard work at your home, etc.  But it could include landscaping, housekeeping or other duties at your business.  Duties like answering phones, stuffing envelopes, monitoring or updating your website, filing, passing out flyers and any other business related duty will qualify.  Type up an employee job description and have your child sign it.  This is just like any job you've ever had.                                                                          Keep timesheets like you would for any other employee to document your childs' employment.                                                                                                                   Their pay must be reasonable for the type of work they are employed to perform.  It might be tempting to pay your child $100 a day to answer the phone but don't do it.  Pay your child a rate that you would pay a stranger for the same job.                                                  Don't forget to pay with a check, not cash!  Direct deposit into a custodial account or another kind of account with your child's name on it is the best option to prove the child is an employee.                                                                          Do your paperwork!  To employ your child, you have to be an employer.  Get your federal EIN if you don't have one already and fill out all the paperwork you would file with the IRS the same as you would for any other employee.  Fill out the required W-4 and I-9.  Don't forget about those W-2's!                                                                                           Now that you have a new employee on your payroll and that employee is your offspring, what do you advise your child to do with their money?                               This is where you put on your thinking cap and get creative!!  Depending on your child's age and your savings goals, there are a ton of options available to explore.  Here are a few:                                                                                       Invest your child's earnings into a low cost S &amp; P 500 index fund and let                           compound interest                          do it's work.  Even by conservative estimates, you can expect a yield of 8.5% over the life of the investment and those numbers will add up.  Leaving that account untouched until retirement will result in your child being a millionaire.                                                                          If you want to save this employee's money for college, consider a                           529 Plan                          .  A 529 plan is an investment account that can be used with tax free benefits to pay for private schools and college.  There are over 100 plans to choose from and you should research your state laws and guidelines before investing in one.                                                                          Check out custodial accounts like UTMA's or UGMA's.  These are accounts that you start for your child and fund.  These are in your child's name and will only be accessible to your child when they reach the legal age of majority in your state.  That means once the money goes in, you can't touch it until the child becomes of legal age to collect the funds.                                     A UTMA allows you to invest in stocks, bonds, ETF's, securities and mutual funds.                                     A UGMA allows you to invest in other types of invests like property deeds, cars and art as well as traditional investments like stocks, bonds, etc.                                     With some simple research and serious consideration about your long term plans for your child, you will be able to make the best choice for you.                                                                          Think about an                           IRA                          .  You can open a custodial IRA and make the maximum contributions on behalf of your child.  There are a lot of tax advantages for IRA's and it would be wise to consider investing in one on behalf of your child.                                                                          While all this investing sounds great, your employee will probably want to spend some of that hard earned cash.  But that's another opportunity to grow your child's financial future in other ways!  New programs emerge in the financial market every day to help parents teach their kids about healthy spending habits.  Here are a few of those!                                                                          Research and choose a                           debit card                          .  Banks are offering debit cards designed specifically for children and teens.  They come with apps that allow parents and children to work together to learn about responsible spending, add to savings accounts and track spending.                                                                          Consider adding your child to a traditional credit card either through your business or personal accounts.  As an authorized user, your child will benefit from the good credit scores your credit account can generate.  Again, do your research!  Some banks and credit cards don't allow authorized users or don't report authorized users to the credit bureaus.  When your child becomes an authorized user and you know the account is reported to the credit bureaus, keep the card in a safe place and set a monthly spending limit.  Allow your lil employee to make credit card purchases with the card and use their income to pay their balance in full every month to establish credit before they turn 18.  As with all credit cards, utilization is key to developing good credit scores so keep those balances below 30% and pay on time!  The benefit is a young adult starting out with a credit score over 700!  With a great credit score and documented income, your child will enter adulthood with a leg up in the financial markets!  Auto loans, employment and housing opportunities will open up and smooth the path for your newly independent child.                                                                          Use some of their pay to save for a secure credit card.  This is a credit card that almost anyone can get.  You choose the credit limit and fund the account.  So, a $500 credit card will require a deposit of $500.  $1,000 credit limit will require a deposit of $1,000.  These cards function exactly like a regular, unsecure card.  Keep those balances low and pay on time.  Again, make sure the card reports to the credit bureaus.                                                                          Different banks and credit unions offer products called                           credit building accounts                          .  This is basically a CD.  It is described as a loan and appears on your child's credit as an installment loan.  The company you purchase this product from "loans" you a certain amount of money and you make monthly payments to the account.  The bank or company keeps the interest and charges you a small fee.  But at the end of the "loan" you get the money back in a lump sum.  These accounts are both a savings vehicle and a credit builder.                                                                          By utilizing these strategies, you will be able to lower your business' tax burden, receive valuable credits and deductions, develop savings, credit and teach healthy spending habits for your child.                                                                          Thank you for taking the time to read my blog on financial basics.  If you have any questions about the strategies I've outlined in this article, feel free to contact me!  My website is www.communityresourcetax.com.  Email me at contact@communityresourcetax.com                                     Or call me at 502-536-9143.                                                                          If you have a topic you'd like to learn more about, reach out!  I will write about it!                                                                          Remember to Invest in Yourself. Grow our Community.</span></div><span data-dcnode-id="396" instrument_node="">
