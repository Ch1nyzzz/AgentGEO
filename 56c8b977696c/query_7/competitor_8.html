</span></ul></div></nav></div></header><div class="site-inner" data-dcnode-id="276"><div class="content-sidebar-wrap" data-dcnode-id="277"><main class="content" data-dcnode-id="352" id="genesis-content"><article aria-label="Work Uniform Expenses: The tax deductions you can and can’t claim" class="post-785 post type-post status-publish format-standard has-post-thumbnail category-tax-advice category-tax-deductions category-tax-saving-tips entry" data-dcnode-id="405"><header class="entry-header" data-dcnode-id="612"><h1 class="entry-title" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Work Uniform Expenses: The tax deductions you can and can’t claim</span></h1><span data-dcnode-id="613" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="407"><span data-dcnode-id="611" instrument_node="">
</span><div class="wp-block-image size-full wp-image-9578" data-dcnode-id="606"><figure class="aligncenter" data-dcnode-id="607"><img alt="Work uniform expenses" class="wp-image-9578" data-dcnode-id="610" height="453" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2014/03/Work-uniform-expenses.jpg&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2014/03/Work-uniform-expenses.jpg 680w, https://www.etax.com.au/wp-content/uploads/2014/03/Work-uniform-expenses-300x200.jpg 300w" width="680"><figcaption data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Keep receipts for the purchase, upkeep and cleaning of your work uniform expenses</span></figcaption></figure></div><span data-dcnode-id="605" instrument_node="">
</span><blockquote data-dcnode-id="602"><h3 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">You can save big just by claiming your work uniform expenses on your tax return!</span></h3></blockquote><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">There are many types of jobs that require you to wear a uniform and/or protective clothing. Unfortunately many organisations don’t provide these, or at best offer them at a discounted price to their employees.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">But for you the costs of these items, especially when they are specialised, can really hurt your bank balance.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="592"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">And who wants to spend all their hard earned money on work gear in any case? Not me! And I doubt you do either.</span></strong></p><span data-dcnode-id="591" instrument_node="">
</span><h3 data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">But what can you do about it?</span></h3><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Well, there is good news! You can get a good proportion of that cash back at tax time. But you need to know what work uniform expenses you can and can’t claim on your tax return. So here goes:</span></p><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Have&nbsp;a look at our list below – do your circumstances fit with the following categories?</span></h2><span data-dcnode-id="582" instrument_node="">
</span><h3 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Is your uniform compulsory?</span></h3><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">If you have a compulsory uniform that is strictly enforced at your workplace, then you can claim for the cost of purchasing it. It must have a company logo and identify you with your place of work. You can’t make a claim for normal business wear (such as plain black pants) that does not have a logo, regardless of whether your employer requires you to wear it to work.</span></p><span data-dcnode-id="576" instrument_node="">
</span><h3 data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Do you have single items of compulsory clothing?</span></h3><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">You can also claim for a single item of compulsory clothing, such as a shirt or a tie. However, it too must also be distinctive to your employer. For example, a business shirt with the company logo permanently attached to it and not available to the general public can be claimed.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Non-compulsory Uniforms</span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">If your employer encourages you to wear a corporate wardrobe but does not enforce it, you can only claim if the uniform is registered with Ausindustry. You cannot claim for stockings, socks or shoes because these cannot be part of a registered uniform. Unsure? Ask your employer if your uniform is registered or not.</span></p><span data-dcnode-id="564" instrument_node="">
</span><h3 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Occupation Specific Clothing</span></h3><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">This type of clothing is a uniform that identifies you to your employer or profession. For example the checkered pants of a chef are occupation-specific, whereas a black and white waiter’s uniform does not identify you to a specific employer or profession.</span></p><span data-dcnode-id="558" instrument_node="">
</span><h3 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Protective Clothing</span></h3><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Anything you may wear while working to protect yourself from injury or risk of injury can be classified as protective clothing. Examples include aprons, steel-capped boots, safety vests and wet weather gear.</span></p><span data-dcnode-id="552" instrument_node="">
</span><h3 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Costumes</span></h3><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">As a performing artist you can claim the cost of purchasing costumes you buy or hire for a role. You must however already have the role to make the claim – you can’t claim if you are just auditioning.</span></p><span data-dcnode-id="546" instrument_node="">
</span><h3 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">More Questions?</span></h3><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">Have a question or opinion on tax deductions for uniforms? Contact us by phone with your query or if you prefer, email the team on </span><a data-dcnode-id="540" href="mailto:admin@etax.com.au"><span data-dcnode-id="541" instrument_node="">admin@etax.com.au</span></a><span data-dcnode-id="539" instrument_node="">.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="534"><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/laundry-expenses/" title="Ironing Out Laundry Expenses: How To Claim Work Uniform Laundry Costs"><span data-dcnode-id="536" instrument_node="">Learn more about claiming work uniform laundry expenses as a tax deduction.</span></a></p><span data-dcnode-id="533" instrument_node="">
