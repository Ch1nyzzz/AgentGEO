</span></header><div class="entry-content" data-dcnode-id="640"><span data-dcnode-id="983" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="978"><figure class="aligncenter size-large" data-dcnode-id="979"><img alt="Travel expenses are work-related costs you paid for yourself" class="wp-image-22711" data-dcnode-id="982" height="467" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2017/05/work-related-travel-expenses.jpg&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2017/05/work-related-travel-expenses.jpg 700w, https://www.etax.com.au/wp-content/uploads/2017/05/work-related-travel-expenses-300x200.jpg 300w, https://www.etax.com.au/wp-content/uploads/2017/05/work-related-travel-expenses-600x400.jpg 600w" width="700"><figcaption data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Work-related travel expenses include costs for public transport, taxis, flights and more. Make sure you claim what you are entitled to and boost your refund. </span></figcaption></figure></div><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Let’s explain how to turn work-related travel expenses into dollars in your pocket at tax time. </span></p><span data-dcnode-id="974" instrument_node="">
</span><h2 data-dcnode-id="972" id="h-what-exactly-is-a-work-related-travel-expense"><span data-dcnode-id="973" instrument_node="">What exactly is a work-related travel expense?</span></h2><span data-dcnode-id="971" instrument_node="">
</span><h3 data-dcnode-id="969" id="h-if-you-travel-for-work-any-purchases-you-make-related-to-that-travel-can-likely-be-claimed-as-a-travel-expense-on-your-tax-return"><span data-dcnode-id="970" instrument_node="">If you travel for work, any purchases you make related to that travel, can likely be claimed as a travel expense on your tax return.  </span></h3><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">As with most work-related expenses, travel expenses are usually tax deductible. Of course, there are a few restrictions on what you can claim and we’ll explain those a little later. </span></p><span data-dcnode-id="965" instrument_node="">
</span><h2 data-dcnode-id="963" id="h-work-related-travel-expenses-can-boost-your-tax-refund"><span data-dcnode-id="964" instrument_node="">Work related travel expenses can boost your tax refund!</span></h2><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">The following travel-related expenses are tax deductible if</span><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node=""> </span></strong><span data-dcnode-id="958" instrument_node="">you are eligible to claim them (check eligibility rules further down this page):</span></p><span data-dcnode-id="956" instrument_node="">
</span><ul data-dcnode-id="931"><li data-dcnode-id="953"><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Accommodation</span></strong></li><li data-dcnode-id="950"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Incidental expenses (laundry etc.)</span></strong></li><li data-dcnode-id="947"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Air, bus, train and taxi/rideshare fares</span></strong></li><li data-dcnode-id="944"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Bridge and road tolls</span></strong></li><li data-dcnode-id="941"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Parking fees</span></strong></li><li data-dcnode-id="938"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Car hire charges</span></strong></li><li data-dcnode-id="935"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Meals (if your travel included an overnight stay)</span></strong></li><li data-dcnode-id="932"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Bags used only for work travel</span></strong></li></ul><span data-dcnode-id="930" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="925"><figure class="aligncenter" data-dcnode-id="926"><img alt="Travel expenses include the purchase of travel bags" class="wp-image-16162" data-dcnode-id="929" height="467" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2017/05/Claim-luggage-bags-as-travel-expenses.jpg&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2017/05/Claim-luggage-bags-as-travel-expenses.jpg 700w, https://www.etax.com.au/wp-content/uploads/2017/05/Claim-luggage-bags-as-travel-expenses-300x200.jpg 300w, https://www.etax.com.au/wp-content/uploads/2017/05/Claim-luggage-bags-as-travel-expenses-600x400.jpg 600w" width="700"><figcaption data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">If you purchase bags or suitcases for your work-related travel, don’t forget to claim them as travel expenses on your tax return.</span></figcaption></figure></div><span data-dcnode-id="924" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="923" style="height:20px"></div><span data-dcnode-id="922" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="919"><figure class="aligncenter size-large" data-dcnode-id="920"><img alt="" class="wp-image-22703" data-dcnode-id="921" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/11/public-transport-expenses.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/11/public-transport-expenses.png 100w, https://www.etax.com.au/wp-content/uploads/2020/11/public-transport-expenses-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="918" instrument_node="">
</span><h2 data-dcnode-id="916" id="h-can-i-claim-driving-in-my-car-or-public-transport"><span data-dcnode-id="917" instrument_node="">Can I claim driving in my car or public transport?</span></h2><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913" id="h-transport-costs-are-one-of-the-most-popular-travel-tax-deductions-generally-work-related-travel-in-your-car-or-on-public-transport-is-claimable-as-long-as-the-travel-is-not-from-home-to-work-or-vice-versa"><span data-dcnode-id="914" instrument_node="">Transport costs are one of the most popular travel tax deductions. Generally, work related travel in your car or on public transport is claimable with the exception of travel from home to work (and vice versa). </span></p><span data-dcnode-id="912" instrument_node="">
</span><h3 data-dcnode-id="910" id="h-allowable-claims"><span data-dcnode-id="911" instrument_node="">Allowable Claims: </span></h3><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="898"><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Travel between two separate workplaces (or jobs).</span></li><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Travel from your workplace to offsite meetings or events.</span></li><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">If you work from home for part of the day, then travel to your workplace for that same employer.</span></li><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Travel from your home to an alternative workplace if required.</span></li><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">If you work at more than one location for the same employer, you can claim the cost of travelling between locations.</span></li></ul><span data-dcnode-id="897" instrument_node="">
</span><h3 data-dcnode-id="892" id="h-travel-you-can-t-you-claim"><span data-dcnode-id="896" instrument_node="">Travel you </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">can’t</span></strong><span data-dcnode-id="893" instrument_node=""> you claim:</span></h3><span data-dcnode-id="891" instrument_node="">
</span><ul data-dcnode-id="882"><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The cost of travel from home to your everyday place of work (and back again).</span></li><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">If you run an errand on the way to or from work. Eg. pick up the mail or a package.</span></li><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">If you work overtime or out of hours.</span></li><li data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">When your home is your place of work for one job and you travel to a different location to work for somebody else.</span></li></ul><span data-dcnode-id="881" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="880" style="height:20px"></div><span data-dcnode-id="879" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="876"><figure class="aligncenter size-large" data-dcnode-id="877"><img alt="" class="wp-image-22704" data-dcnode-id="878" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/11/parking-expenses.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/11/parking-expenses.png 100w, https://www.etax.com.au/wp-content/uploads/2020/11/parking-expenses-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="875" instrument_node="">
</span><h2 data-dcnode-id="873" id="h-is-car-parking-a-travel-expense"><span data-dcnode-id="874" instrument_node="">Is car parking a travel expense?</span></h2><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">You can claim for work-related parking expenses as long as the trip you took was also allowable as a deduction (see list above). </span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">For example, if you pay for parking to attend a company meeting or event and you use your own car to get there, you can claim the trip and the parking costs.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">However, you </span><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">can’t</span></strong><span data-dcnode-id="862" instrument_node=""> claim the cost of normal, everyday parking if you drive to work and pay for parking near your workplace.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Important:</span></strong><span data-dcnode-id="857" instrument_node=""> You can’t claim any car or parking expenses if you were reimbursed by your employer.</span></p><span data-dcnode-id="855" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="854" style="height:20px"></div><span data-dcnode-id="853" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="850"><figure class="aligncenter size-large" data-dcnode-id="851"><img alt="" class="wp-image-22702" data-dcnode-id="852" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/11/travel-diary.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/11/travel-diary.png 100w, https://www.etax.com.au/wp-content/uploads/2020/11/travel-diary-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847" id="h-do-i-need-to-keep-a-travel-diary"><span data-dcnode-id="848" instrument_node="">Do I need to keep a travel diary?</span></h2><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">If you are away from home for more than 6 consecutive nights, you should keep a travel diary to record where you were, what you were doing and the start and end times of your activities. </span></p><span data-dcnode-id="843" instrument_node="">
</span><h4 data-dcnode-id="841" id="h-example-travel-diary-entries"><span data-dcnode-id="842" instrument_node="">Example travel diary entries:</span></h4><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Monday: </span></strong></p><span data-dcnode-id="836" instrument_node="">
</span><ul data-dcnode-id="820"><li data-dcnode-id="833"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">6:00am Flight to Sydney – arrive 8.30am</span></strong></li><li data-dcnode-id="827"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">8.30am –</span></strong><span data-dcnode-id="830" instrument_node=""> </span><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">9:00am Uber from Sydney Airport to Darling Harbour</span></strong></li><li data-dcnode-id="824"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">9:30am – 4:00pm Trade Conference</span></strong></li><li data-dcnode-id="821"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Overnight at The Hyatt, Darling Harbour.</span></strong></li></ul><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">If you don’t have a travel diary handy, no problem! Download a travel diary template from the </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/download-etax-resources/"><span data-dcnode-id="817" instrument_node="">Etax Downloadable Resources</span></a><span data-dcnode-id="815" instrument_node=""> page.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">It’s a good idea to keep a record of your travel and expenses, even when you aren’t required to keep a diary. It’s very easy to forget details about expenses months after they happen. </span></p><span data-dcnode-id="810" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="809" style="height:20px"></div><span data-dcnode-id="808" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="805"><figure class="aligncenter size-large" data-dcnode-id="806"><img alt="" class="wp-image-22705" data-dcnode-id="807" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/11/travel-allowance.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/11/travel-allowance.png 100w, https://www.etax.com.au/wp-content/uploads/2020/11/travel-allowance-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="804" instrument_node="">
</span><h2 data-dcnode-id="802" id="h-what-if-i-receive-a-travel-allowance"><span data-dcnode-id="803" instrument_node="">What if I receive a travel allowance?</span></h2><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">If you receive a travel allowance from your employer it is usually considered taxable income and is listed on your income statement. As long as you spent the money you were paid as an allowance, you can claim a tax deduction against it at tax time. </span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">A common mistake is to assume that you can claim the </span><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">entire allowance</span></em><span data-dcnode-id="794" instrument_node=""> as a tax deduction. This isn’t necessarily the case. </span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">You can only claim the total of your actual expenses. For example if you received $1500 worth of travel allowances from your employer during the year, but the cost of your travel was $1,000, you can only claim $1,000 worth of travel deductions on your return. </span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Only claim travel deductions you have evidence for, as the ATO can require proof for any of your expenses.</span></p><span data-dcnode-id="786" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="785" style="height:20px"></div><span data-dcnode-id="784" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="781"><figure class="aligncenter size-large" data-dcnode-id="782"><img alt="Recording expenses" class="wp-image-19811" data-dcnode-id="783" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/05/icons8-checklist-100-1.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/05/icons8-checklist-100-1.png 100w, https://www.etax.com.au/wp-content/uploads/2020/05/icons8-checklist-100-1-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="780" instrument_node="">
</span><h2 data-dcnode-id="777" id="h-what-travel-records-should-i-keep"><span data-dcnode-id="778" style="color: #333333;"><span data-dcnode-id="779" instrument_node="">What travel records should I keep?</span></span></h2><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">You should keep ALL travel expense records and receipts, even if you receive an allowance.  It’ll help ensure you claim everything you’re entitled too at tax time.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">Remember, if you’re not sure whether you can claim an expense, keep the receipt and ask your tax agent. Don’t forget the motto: </span><strong data-dcnode-id="769"><em data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">You can’t claim it if you can’t prove it!</span></em></strong></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Photograph your receipts and other purchase records, and keep everything in one folder. Create a back up folder too, just to be on the safe side. </span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">Etax clients can upload travel expense receipts straight into their secure online account at </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/"><span data-dcnode-id="762" instrument_node="">etax.com.au</span></a><span data-dcnode-id="760" instrument_node="">. That way everything is ready and waiting in their account at tax time! </span></p><span data-dcnode-id="758" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="757" style="height:20px"></div><span data-dcnode-id="756" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="753"><figure class="aligncenter size-large" data-dcnode-id="754"><img alt="" class="wp-image-22706" data-dcnode-id="755" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/wp-content/uploads/2020/11/cannot-claim-expenses.png&amp;raw" srcset="https://www.etax.com.au/wp-content/uploads/2020/11/cannot-claim-expenses.png 100w, https://www.etax.com.au/wp-content/uploads/2020/11/cannot-claim-expenses-80x80.png 80w" width="100"></figure></div><span data-dcnode-id="752" instrument_node="">
</span><h2 data-dcnode-id="750" id="h-what-travel-expenses-are-not-allowed"><span data-dcnode-id="751" instrument_node="">What travel expenses are not allowed?</span></h2><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="747" id="h-there-are-certain-travel-expenses-and-circumstances-where-travel-costs-are-not-deductible"><span data-dcnode-id="748" instrument_node="">There are certain travel expenses and circumstances where travel costs are not deductible. </span></h3><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">For example:</span></p><span data-dcnode-id="743" instrument_node="">
</span><ul data-dcnode-id="740"><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Although you can claim the cost of travel between two different workplaces, you generally can’t claim your journey from home to work and from work to home each day. The exception is if your employer requires you to transport heavy tools and there is no safe place at work to leave them.</span></li></ul><span data-dcnode-id="739" instrument_node="">
</span><ul data-dcnode-id="736"><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">You can’t claim a tax deduction for any travel expense that your employer has already reimbursed you for.</span></li></ul><span data-dcnode-id="735" instrument_node="">
</span><h2 data-dcnode-id="733" id="h-what-if-i-travel-for-work-and-then-spend-an-extra-few-days-on-holidays-at-the-end-of-the-trip"><span data-dcnode-id="734" instrument_node="">What if I travel for work and then spend an extra few days on holidays at the end of the trip?</span></h2><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">This is where it gets tricky. If your travel is split between work and leisure, then all of your expenses also need be split between work and leisure. There are two key rules here:</span></p><span data-dcnode-id="729" instrument_node="">
</span><ul data-dcnode-id="724"><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The primary purpose of your trip must be work related, and</span></li><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">You can’t claim any part of a trip that is not work related.</span></li></ul><span data-dcnode-id="723" instrument_node="">
</span><h3 data-dcnode-id="720" id="h-example-work-conference-in-another-state"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Example: Work Conference In Another State</span></strong></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Julie travelled to Melbourne for a week long conference. She then stayed in Melbourne on Friday and Saturday night to see the sights and catch up with friends.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="713"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Julie can claim in full:</span></strong></p><span data-dcnode-id="712" instrument_node="">
</span><ul data-dcnode-id="705"><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Accommodation costs for Monday to Friday.</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Uber fares from the hotel to the conference and back each day.</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Meals during the week.</span></li></ul><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="701"><strong data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Julie was away for 7 days, of which 5 (or 71.5%) of the trip was work related. She can also claim 71.5% of:</span></strong></p><span data-dcnode-id="700" instrument_node="">
</span><ul data-dcnode-id="695"><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Her flights to and from Melbourne.</span></li><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Her Ubers to and from the airports.</span></li></ul><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Julie can’t claim leisure expenses:</span></strong></p><span data-dcnode-id="690" instrument_node="">
</span><ul data-dcnode-id="681"><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Accommodation costs for Friday and Saturday night.</span></li><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Meals from Friday night to Sunday.</span></li><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Uber trips to her friend’s house.</span></li><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Car hire and expenses for a trip she made to the Great Ocean Road.</span></li></ul><span data-dcnode-id="680" instrument_node="">
</span><h3 data-dcnode-id="678" id="h-here-are-some-additional-examples-of-what-is-not-allowed-by-the-ato"><span data-dcnode-id="679" instrument_node="">Here are some additional examples of what is not allowed by the ATO:</span></h3><span data-dcnode-id="677" instrument_node="">
</span><ul data-dcnode-id="668"><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Like the example above, if you travel to a work-related conference in another city and stay an extra night to visit a friend, you can’t claim for any costs related to that extra night.</span></li><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">If you travel with your partner or children, you can’t claim any travel or accommodation costs for them.</span></li><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">You can’t claim an add-on flight that is not related to your work trip. For example: If you had a work trip in Mackay, you can’t claim a flight you took to the see the reef in Cairns.</span></li><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">You add on a small work event while on holidays. For example: You are on holidays for 2 weeks in Europe and while you’re there you take the opportunity to attend a 2-day work related conference. You can claim the costs of the conference, however, you can’t claim any travel or accommodation costs related to the trip because the trip’s primary purpose is a holiday, not business.</span></li></ul><span data-dcnode-id="667" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">If you have any questions regarding your work-related travel expenses, feel free to get in touch. Our accountants are always happy to set you on the right track for the best possible tax refund!</span></p><span data-dcnode-id="662" instrument_node="">

</span><ul data-dcnode-id="642"><li data-dcnode-id="655"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/claim-car-expenses-small-business-owner-logbook-method/"><span data-dcnode-id="657" instrument_node="">How To Claim Car Expenses with a Logbook</span></a></li><li data-dcnode-id="652"><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/claim-work-related-calls-tax-return/"><span data-dcnode-id="654" instrument_node="">Mobile Phone Bills are Valid Tax Deductions (if you call for work)</span></a></li><li data-dcnode-id="649"><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/self-education-expenses/" title="Claiming Self Education Expenses as Tax Deductions"><span data-dcnode-id="651" instrument_node="">Claiming self education expenses</span></a></li><li data-dcnode-id="646"><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/work-uniform-expenses/"><span data-dcnode-id="648" instrument_node="">Can you claim your work uniform as a deduction</span></a></li><li data-dcnode-id="643"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etax.com.au/laundry-expenses/" title="Ironing out laundry expenses"><span data-dcnode-id="645" instrument_node="">Ironing out laundry expenses</span></a></li></ul><span data-dcnode-id="641" instrument_node="">
