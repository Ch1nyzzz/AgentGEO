</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module" data-dcnode-id="892" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_big_vid" style=""></div><span data-dcnode-id="891" instrument_node="">

							on </span><span content="2021-12-19 08:00:00" data-dcnode-id="875" itemprop="datePublished dateModified"><span data-dcnode-id="876" instrument_node="">Dec 19, 2021</span></span><span data-dcnode-id="874" instrument_node="">

</span><div class="section post-body" data-dcnode-id="722"><span data-dcnode-id="869" instrument_node="">
</span><span data-dcnode-id="867" instrument_node="">
</span><span data-dcnode-id="726" itemprop="articleBody"><span data-dcnode-id="866" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="728" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="864"><img alt="tax-filing-doc-IS-874826692" data-dcnode-id="865" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg%3Fwidth%3D750%26name%3Dtax-filing-doc-IS-874826692.jpg&amp;raw" srcset="https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=375&amp;name=tax-filing-doc-IS-874826692.jpg 375w, https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=750&amp;name=tax-filing-doc-IS-874826692.jpg 750w, https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=1125&amp;name=tax-filing-doc-IS-874826692.jpg 1125w, https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=1500&amp;name=tax-filing-doc-IS-874826692.jpg 1500w, https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=1875&amp;name=tax-filing-doc-IS-874826692.jpg 1875w, https://www.realized1031.com/hs-fs/hubfs/Images/photo/abstract/tax-filing-doc-IS-874826692.jpg?width=2250&amp;name=tax-filing-doc-IS-874826692.jpg 2250w" style="width: 750px;" width="750"></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Tax deductions are important for individual taxpayers because they can reduce your overall taxable income, which in turn can lower your tax liability, or the amount of money you’ll owe to the Internal Revenue Service when you complete your annual tax return.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">There are many different types of tax deductions available to individual and married tax filers, including:</span></p><span data-dcnode-id="856" instrument_node="">
</span><ul data-dcnode-id="830"><span data-dcnode-id="855" instrument_node="">
</span><li aria-level="1" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Charitable contributions</span></li><span data-dcnode-id="852" instrument_node="">
</span><li aria-level="1" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Mortgage interest</span></li><span data-dcnode-id="849" instrument_node="">
</span><li aria-level="1" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Child tax credit</span></li><span data-dcnode-id="846" instrument_node="">
</span><li aria-level="1" data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Medical expenses</span></li><span data-dcnode-id="843" instrument_node="">
</span><li aria-level="1" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Gambling losses</span></li><span data-dcnode-id="840" instrument_node="">
</span><li aria-level="1" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Student loan interest</span></li><span data-dcnode-id="837" instrument_node="">
</span><li aria-level="1" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Home office deduction</span></li><span data-dcnode-id="834" instrument_node="">
</span><li aria-level="1" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Contributions to IRAs and 401(k)s</span></li><span data-dcnode-id="831" instrument_node="">
</span></ul><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Some of these deductions, such as home office, are only available to gig and freelance workers. Taxpayers also will have to determine if these deductions aggregate to a larger tax savings than the standard deductions available to married ($25,100 in 2021) and single filers ($12,550).</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="825" instrument_node="">Real estate investors, meanwhile, can access some very important “built-in” tax deductions. This article takes a look at some of the tax benefits available to investment property owners.</span><br data-dcnode-id="824"><br data-dcnode-id="823"></p><span data-dcnode-id="821" instrument_node="">
</span><h3 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Tax Deductions for Commercial Investment Properties</span></h3><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">There are several ways real property investors can reduce their annual tax liabilities, particularly when they hold commercial real estate investments over a longer period of time. Here’s a rundown of four common tax deductions and tax shelters available if you own an investment property.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="811"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Depreciation. </span></strong><span data-dcnode-id="812" instrument_node="">This is perhaps the most important tax deduction available to investors who own commercial real estate. The IRS allows these taxpayers to depreciate their real property assets over a 39-year span (it’s 27.5 years for residential properties). Depreciation is the “wear-down” of the physical asset, and 39 years is considered the usable life of commercial assets purchased after 1993.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Here’s how it works: Each year, investors can deduct 1/39th of the costs associated with acquiring and maintaining their investment assets. Investors can use this important tax deduction for the full basis of their investments.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Depreciation is usually reported on Schedule E of your tax return. In order to claim this tax deduction, you have to own the property, derive income from it, determine its useful life, which has to be more than one year. There are two different ways to calculate depreciation: General depreciation and alternative depreciation. Consult your tax professional to determine which system works best for your particular tax situation.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="796"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Real Estate Expenses.</span></strong><span data-dcnode-id="801" instrument_node=""> Many </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.realized1031.com/blog/what-investment-property-expenses-are-tax-deductible"><span data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">expenses incurred through real property ownership</span></span></a><span data-dcnode-id="797" instrument_node=""> are tax deductible as well. These include:</span></p><span data-dcnode-id="795" instrument_node="">
</span><ul data-dcnode-id="766"><span data-dcnode-id="794" instrument_node="">
</span><li aria-level="1" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Mortgage and financing interest</span></li><span data-dcnode-id="791" instrument_node="">
</span><li aria-level="1" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Travel expenses directly related to property ownership</span></li><span data-dcnode-id="788" instrument_node="">
</span><li aria-level="1" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Home office deduction</span></li><span data-dcnode-id="785" instrument_node="">
</span><li aria-level="1" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Professional services such as legal, accounting, and property management</span></li><span data-dcnode-id="782" instrument_node="">
</span><li aria-level="1" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Insurance</span></li><span data-dcnode-id="779" instrument_node="">
</span><li aria-level="1" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Utilities</span></li><span data-dcnode-id="776" instrument_node="">
</span><li aria-level="1" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Repairs and general maintenance</span></li><span data-dcnode-id="773" instrument_node="">
</span><li aria-level="1" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Broker commissions</span></li><span data-dcnode-id="770" instrument_node="">
</span><li aria-level="1" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Refinancing costs</span></li><span data-dcnode-id="767" instrument_node="">
</span></ul><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Many of these expenses are simple to determine, while others can be a bit more complicated. Relying on the experience of certified tax professionals with extensive knowledge of real property ownership tax laws and regulations can help ensure you take the proper deductions on your annual tax return.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="758"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Holding time.</span></strong><span data-dcnode-id="759" instrument_node=""> Holding time determines how capital gains are taxed when you divest investment real estate.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Short-term gains -- applicable for assets held less than a year -- are taxed as ordinary income. This rate could be as high as 37 percent depending on your income and filing status. Long-term gains -- applicable for assets held more than a year -- are either 0, 15, or 20 percent depending on your income and filing status.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="746"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">1031 Exchange.</span></strong><span data-dcnode-id="751" instrument_node=""> Taxpayers who sell investment properties can defer their capital gains tax liabilities by rolling proceeds gained from the relinquished asset into a replacement property through a </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.realized1031.com/1031-exchange"><span data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">1031 exchange</span></span></a><span data-dcnode-id="747" instrument_node="">.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="744" instrument_node="">There are many rules, regulations, and deadlines associated with 1031 exchanges, however, so if you plan on taking this direction, make sure you’ve mapped out an exchange strategy prior to close of sale on your original investment property.</span><br data-dcnode-id="743"><br data-dcnode-id="742"></p><span data-dcnode-id="740" instrument_node="">
</span><h3 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The Bottom Line</span></h3><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Real estate investors can access some important tax deductions that can reduce their annual tax liabilities on investment properties, which can potentially preserve more of their wealth. However, accessing these deductions typically requires the help of qualified and experienced tax professionals so investors avoid costly mistakes and potential penalties.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">&nbsp;</span></p><span data-dcnode-id="731" instrument_node="">
</span><sup data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">This material is for general information and educational purposes only. Information is based on data gathered from what we believe are reliable sources. It is not guaranteed as to accuracy, does not purport to be complete and is not intended to be used as a primary basis for investment decisions. It should also not be construed as advice meeting the particular investment needs of any investor. Realized does not provide tax or legal advice. This material is not a substitute for seeking the advice of a qualified professional for your individual situation. Costs associated with a 1031 transaction may impact investor’s returns and may outweigh the tax benefits. An unfavorable tax ruling may cancel deferral of capital gains and result in immediate tax liabilities.</span></sup></span><span data-dcnode-id="727" instrument_node="">
</span></span><span data-dcnode-id="725" instrument_node="">

</span></div><span data-dcnode-id="719" instrument_node="">
