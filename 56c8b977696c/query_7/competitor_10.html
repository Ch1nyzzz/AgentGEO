</span><div class="content" data-dcnode-id="1971"><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2211" instrument_node="">Under the ACA you can take tax deductions for medical and dental expenses that exceed </span><strong data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">10%*</span></strong><span data-dcnode-id="2208" instrument_node=""> of your annual Adjusted Gross Income using a </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/obamacare-1040-forms-1040-1040a-1040ez/" title="Where Can I Get a 1040 schedule A form?"><span data-dcnode-id="2207" instrument_node="">Form 1040, Schedule A</span></a><span data-dcnode-id="2205" instrument_node="">. This includes deductions for most medical and dental costs for you, your spouse, and your dependents. Most people won’t take this deduction, but if you’ve had a lot of medical expenses or your income was lower than expected, it can be a wallet-saver.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><div class="well well-sm" data-dcnode-id="2182"><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">As a rule of thumb:</span></p><span data-dcnode-id="2199" instrument_node="">
</span><ul data-dcnode-id="2189"><span data-dcnode-id="2198" instrument_node="">
</span><li data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">If you paid the cost out-of-pocket, you can deduct it. This includes things like wellness programs and transportation needed for care.</span></li><span data-dcnode-id="2195" instrument_node="">
</span><li data-dcnode-id="2191"><span data-dcnode-id="2194" instrument_node="">If your insurer paid it, the marketplace paid it as an advanced tax credit, or you put it in a medical savings account, you can’t deduct it. </span><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">No “double benefits.”</span></strong></li><span data-dcnode-id="2190" instrument_node="">
</span></ul><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2184"><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">*</span></strong><span data-dcnode-id="2185" instrument_node=""> The specific percentage number is a little complicated due to changes to the laws over time and how deductions affected those who paid the Alternative Minimum Tax (AMT) in the past. Here is the deal, before 2013, itemized deduction for medical expenses exceeding 7.5% of adjusted gross income (AGI) were allowed. However, for tax payers subject to the Alternative Minimum Tax (AMT), it was 10%. Then, under the ACA, starting in 2016, the adjusted gross income floor was supposed to be increased to 10% for all groups aside from those over 65. However, despite all those details, the adjustment never went into place and the floor remained 7.5% for 2017 and 2018. However, now in 2019, the 10% limit really is kicking in! Thus above we wrote “10%*.”</span></p><span data-dcnode-id="2183" instrument_node="">
</span></div><span data-dcnode-id="2181" instrument_node="">
</span><h2 data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Important Medical Expense Deduction Facts</span></h2><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Here are some quick facts on how Medical and Dental tax deductions work under the ACA:</span></p><span data-dcnode-id="2175" instrument_node="">
</span><ul data-dcnode-id="2126"><span data-dcnode-id="2174" instrument_node="">
</span><li data-dcnode-id="2169"><span data-dcnode-id="2173" instrument_node="">You can only deduct “</span><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc502" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2172" instrument_node="">qualifying expenses</span></a><span data-dcnode-id="2170" instrument_node="">.”</span></li><span data-dcnode-id="2168" instrument_node="">
</span><li data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Medical expenses must exceed 10% of your adjusted gross income before you can claim a deduction starting in 2019. Prior to this it was 7.5% (although see the notes above on the history of the Medical Expense tax deduction).</span></li><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">You can only deduct a portion of your health insurance premium.</span></li><span data-dcnode-id="2162" instrument_node="">
</span><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">If you are over 40 years old you can count a higher portion of your premium toward your expenses.</span></li><span data-dcnode-id="2159" instrument_node="">
</span><li data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">You have to itemize deduction on a Schedule A to take them.</span></li><span data-dcnode-id="2156" instrument_node="">
</span><li data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Expenses must have been paid in the taxable year.</span></li><span data-dcnode-id="2153" instrument_node="">
</span><li data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">You can include most medical or dental costs that you paid for yourself, your spouse and your dependents. Some exceptions and special rules apply.</span></li><span data-dcnode-id="2150" instrument_node="">
</span><li data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">You can include the costs of diagnosing, treating, easing or preventing disease. The cost of insurance premiums that you pay for policies that cover medical care qualifies, as does the cost of some long-term care insurance. The cost of prescription drugs and insulin also qualify. For more examples of deductible costs, see IRS </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irs.gov/file_source/pub/irs-pdf/p502.pdf"><span data-dcnode-id="2148" instrument_node="">Publication 502</span></a><span data-dcnode-id="2146" instrument_node="">, Medical and Dental Expenses.</span></li><span data-dcnode-id="2144" instrument_node="">
</span><li data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">You can include travel costs needed for medical care.</span></li><span data-dcnode-id="2141" instrument_node="">
</span><li data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">You can’t claim “double benefits” so you can’t deduct amounts paid into medical savings accounts as they are tax-free.</span></li><span data-dcnode-id="2138" instrument_node="">
</span><li data-dcnode-id="2128"><strong data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node="">Taking the tax deduction for&nbsp;Medical and Dental doesn’t lower your&nbsp;</span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/modified-adjusted-gross-income-magi/" title="Modified Adjusted Gross Income (MAGI)"><span data-dcnode-id="2136" instrument_node="">MAGI</span></a><span data-dcnode-id="2134" instrument_node="">.&nbsp;You need to&nbsp;calculate&nbsp;your MAGI before taking the deductions. It&nbsp;lowers the amount of taxable income you claim.</span></strong><span data-dcnode-id="2132" instrument_node="">&nbsp;It won’t qualify you for more tax credits but can help prevent you from owing tax credits back when you file the </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/premium-tax-credit-form-8962/" title="Premium Tax Credit Form 8962 and Instructions"><span data-dcnode-id="2131" instrument_node="">Premium Tax Credit form 8962</span></a><span data-dcnode-id="2129" instrument_node="">. This protects those who lost income due to medical expenses.</span></li><span data-dcnode-id="2127" instrument_node="">
</span></ul><span data-dcnode-id="2125" instrument_node="">
</span><h2 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">How Do I Take Tax Deductions for Medical and Dental?</span></h2><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">You’ll need to itemize your deductions for the year&nbsp;for yourself, your spouse and your dependents on a Schedule A. All medical care expenses include payments for the diagnosis, cure, mitigation, treatment, or prevention of disease, or payments for treatments affecting any structure or function of the body. Deductions can&nbsp;include premium amounts, but not amounts paid by the insurer or amounts paid by&nbsp;premium tax credits. See below for full list of deductible items.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><div class="mm-callout mm-callout-primary" data-dcnode-id="2077"><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2115"><strong data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Download:&nbsp;</span></strong></p><span data-dcnode-id="2114" instrument_node="">
</span><ul class="links" data-dcnode-id="2104"><span data-dcnode-id="2113" instrument_node="">
</span><li class="first-child" data-dcnode-id="2110"><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irs.gov/pub/irs-pdf/f1040sa.pdf" rel="noopener noreferrer" target="_blank" title="Schedule A (1040) 2014"><span data-dcnode-id="2112" instrument_node="">Schedule A (Form 1040) Itemized Deductions (including Medical Deductions)</span></a></li><span data-dcnode-id="2109" instrument_node="">
</span><li class="first-child" data-dcnode-id="2106"><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irs.gov/pub/irs-pdf/i1040sca.pdf" rel="noopener noreferrer" target="_blank" title="Schedule A (1040) 2014 Instructions"><span data-dcnode-id="2108" instrument_node="">Schedule A (Form 1040) Itemized Deductions Instructions</span></a></li><span data-dcnode-id="2105" instrument_node="">
</span></ul><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2097"><strong data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node="">Follow These Instructions from </span><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turbotax.intuit.com/tax-tools/tax-tips/Tax-Deductions-and-Credits/Can-I-Claim-Medical-Expenses-on-My-Taxes-/INF14196.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2101" instrument_node="">TurboTax</span></a><span data-dcnode-id="2099" instrument_node="">:</span></strong></p><span data-dcnode-id="2096" instrument_node="">
</span><ul data-dcnode-id="2079"><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">On Schedule A, report the total medical expenses you paid during the year on line 1 and your adjusted gross income (from line 38 of your Form 1040) on line 2.</span></li><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Enter&nbsp;10% of your adjusted gross income on line 3.</span></li><span data-dcnode-id="2089" instrument_node="">
</span><li data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Enter the difference between your expenses and&nbsp;10% of your adjusted gross income on line 4.</span></li><span data-dcnode-id="2086" instrument_node="">
</span><li data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">The resulting amount on line 4 will be subtracted from your adjusted gross income to reduce your taxable income for the year.</span></li><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">If this amount, plus any other standard deductions you claim, is less than your standard deduction, you should not itemize.</span></li><span data-dcnode-id="2080" instrument_node="">
</span></ul><span data-dcnode-id="2078" instrument_node="">
</span></div><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2069"><strong data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">IMPORTANT</span></strong><span data-dcnode-id="2073" instrument_node="">: Self-employed individuals can deduct 100% of medical and dental including premiums. Learn more about</span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/self-employed-health-insurance/" title="Self-Employed Health Insurance"><span data-dcnode-id="2072" instrument_node=""> self-employed deductions</span></a><span data-dcnode-id="2070" instrument_node="">.&nbsp;If you do not claim 100% of your self-employed health insurance deduction, you can include the remaining premiums with your other medical expenses as an itemized deduction on Form 1040, Schedule A</span></p><span data-dcnode-id="2068" instrument_node="">
</span><h2 data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">How Much Can I Deduct For Medical and Dental?</span></h2><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">TIP: This section is outdated because the rule never was enacted. The correct answer to this question should be clear from the information above.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><ul data-dcnode-id="2051"><span data-dcnode-id="2061" instrument_node="">
</span><li data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Before 2012 you could deduct all expenses over 7.5%</span></li><span data-dcnode-id="2058" instrument_node="">
</span><li data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">For years beginning after December 31, 2012, you may deduct only the amount of your total medical expenses that exceed 10% of your adjusted gross income or 7.5% if you or your spouse is 65 or older.</span></li><span data-dcnode-id="2055" instrument_node="">
</span><li data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">For those 65 or older, the 10% limit applies starting in 2016.</span></li><span data-dcnode-id="2052" instrument_node="">
</span></ul><span data-dcnode-id="2050" instrument_node="">
</span><h2 data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">How the Affordable Care Act Changes Tax Deductions for Medical Expenses (2013) [the Rule as Written in the ACA]</span></h2><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Starting in 2013 the tax deduction threshold for medical expenses was raised from 7.5% to 10% ON PAPER (the change never actually took place).</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2043" instrument_node="">The PPACA gives a lot of tax breaks that affect </span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/modified-adjusted-gross-income-magi/" title="Modified Adjusted Gross Income (MAGI)"><span data-dcnode-id="2042" instrument_node="">AGI/MAGI</span></a><span data-dcnode-id="2040" instrument_node="">, but like new </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/health-insurance/health-savings-account-hsa/" title="Health Savings Account (HSA)"><span data-dcnode-id="2039" instrument_node="">limits to medical savings accounts</span></a><span data-dcnode-id="2037" instrument_node="">, raising the tax deduction limits isn’t super attractive on the surface. Take this into account, though, deducting medical expenses and putting money in a medical savings account can lower your MAGI. The lower your MAGI, the higher your tax credits. So if you got sick, and had a Marketplace plan, you could end up getting a larger tax refund due to qualifying for more </span><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/insurance-exchange/premium-tax-credits/" title="Premium Tax Credits"><span data-dcnode-id="2036" instrument_node="">premium health care tax credits</span></a><span data-dcnode-id="2034" instrument_node="">.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><div class="well well-sm" data-dcnode-id="2028"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Sec. 9013. Modification of itemized deduction for medical expenses. </span></strong><span data-dcnode-id="2029" instrument_node="">Increases the adjusted gross income threshold for claiming the itemized deduction for medical expenses from 7.5 percent to 10 percent. Individuals age 65 and older would be able to claim the itemized deduction for medical expenses at 7.5 percent of adjusted gross income through 2016. &lt;—– remember though, this was pushed back until 2019.</span></div><span data-dcnode-id="2027" instrument_node="">
</span><h2 data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">What Medical and Dental Expenses Can I Deduct?</span></h2><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Deductible medical expenses may include but are not limited to the following:</span></p><span data-dcnode-id="2021" instrument_node="">
</span><ul data-dcnode-id="1982"><span data-dcnode-id="2020" instrument_node="">
</span><li data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Payments of fees to doctors, dentists, surgeons, chiropractors, psychiatrists, psychologists, and nontraditional medical practitioners</span></li><span data-dcnode-id="2017" instrument_node="">
</span><li data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Payments for in-patient hospital care or nursing home services, including the cost of meals and lodging charged by the hospital or nursing home</span></li><span data-dcnode-id="2014" instrument_node="">
</span><li data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Payments for acupuncture treatments or inpatient treatment at a center for alcohol or drug addiction, for participation in a smoking-cessation program and for drugs to alleviate nicotine withdrawal that require a prescription</span></li><span data-dcnode-id="2011" instrument_node="">
</span><li data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Payments to participate in a weight-loss program for a specific disease or diseases diagnosed by a physician, including obesity, but not ordinarily payments for diet food items or the payment of health club dues</span></li><span data-dcnode-id="2008" instrument_node="">
</span><li data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Payments for insulin and payments for drugs that require a prescription</span></li><span data-dcnode-id="2005" instrument_node="">
</span><li data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Payments made for admission and transportation to a medical conference relating to a chronic disease that you, your spouse or your dependents have (if the costs are primarily for and essential to necessitated medical care). However, you may not deduct the costs for meals and lodging while attending the medical conference</span></li><span data-dcnode-id="2002" instrument_node="">
</span><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Payments for false teeth, reading or prescription eyeglasses or contact lenses, hearing aids, crutches, wheelchairs, and for guide dogs for the blind or deaf</span></li><span data-dcnode-id="1999" instrument_node="">
</span><li data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Payments for transportation must be for and essential to medical care that qualifies as medical expenses. Examples would be&nbsp;payments of the fare for a taxi, bus, train, ambulance. If your medical transportation is by personal car, you can count the cost&nbsp;of your actual out-of-pocket expenses such as for gas and oil, or the amount of the standard mileage rate for medical expenses, plus the cost of tolls and parking fees.</span></li><span data-dcnode-id="1996" instrument_node="">
</span><li data-dcnode-id="1984"><span data-dcnode-id="1995" instrument_node="">Payments for insurance premiums you paid for policies that cover medical care or for a qualified long-term care insurance policy covering qualified long-term care services. However, if you are an employee, do not include in medical expenses the portion of your premiums treated as paid by your employer under its sponsored group accident, health policy or qualified long-term care insurance policy. Also, do not include the premiums that </span><b data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">you</span></b><span data-dcnode-id="1992" instrument_node=""> paid under your employer-sponsored policy under a premium conversion policy (pre-tax), paid by an employer-sponsored health insurance plan (cafeteria plan) or any other medical and dental expenses unless the premiums are included in box 1 of your </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irs.gov/pub/irs-pdf/fw2.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1991" instrument_node="">Form W-2</span></a><span data-dcnode-id="1989" instrument_node=""> (PDF), </span><i data-dcnode-id="1986"><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Wage and Tax Statement</span></em></i><span data-dcnode-id="1985" instrument_node="">. For example, if you are a federal employee participating in the premium conversion program of the Federal Employee Health Benefits (FEHB) program, you may not include the premiums paid for the policy as a medical expense since they are never included in your gross income</span></li><span data-dcnode-id="1983" instrument_node="">
</span></ul><span data-dcnode-id="1981" instrument_node="">
</span><h2 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Making Sure You Get a Fair Shake at Tax Time</span></h2><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">Between exemptions, tax credits, medical deductions, and medical savings accounts a smart tax filer has a lot of tricks up their sleeve for making sure they get fair treatment from the IRS and ensuring their health care remains affordable. Don’t forget to take advantage of all the important tax forms. </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/file-taxes-obamacare/" title="File Taxes For ObamaCare"><span data-dcnode-id="1976" instrument_node="">Get the guides to all ACA tax forms</span></a><span data-dcnode-id="1974" instrument_node=""> here to make sure you get the most out of the tax season.</span></p><span data-dcnode-id="1972" instrument_node="">
</span></div><span data-dcnode-id="1970" instrument_node="">
</span><span data-dcnode-id="1968" instrument_node="">

</span><p data-dcnode-id="1921"><span data-dcnode-id="1938" instrument_node="">During open enrollment, you can apply for </span><strong data-dcnode-id="1935"><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/obamacare-subsidies/" title="obamacare cost assistance"><span data-dcnode-id="1937" instrument_node="">cost assistance</span></a></strong><span data-dcnode-id="1934" instrument_node="">, </span><strong data-dcnode-id="1931"><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/change-plans-obamacare/" title="change plans obamacare"><span data-dcnode-id="1933" instrument_node="">change plans</span></a></strong><span data-dcnode-id="1930" instrument_node="">, and </span><strong data-dcnode-id="1927"><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/obamacare-sign-up/" title="enroll in a plan obamacare"><span data-dcnode-id="1929" instrument_node="">enroll in a plan</span></a></strong><span data-dcnode-id="1926" instrument_node="">. Find out </span><strong data-dcnode-id="1922"><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/missed-deadline-obamacare/" title="Missed Deadline for ObamaCare"><span data-dcnode-id="1925" instrument_node="">what happens if you&nbsp;miss open enrollment</span></a><span data-dcnode-id="1923" instrument_node="">.</span></strong></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1916"><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Remember</span></strong><span data-dcnode-id="1917" instrument_node="">: ObamaCareFacts is a site focused on research, always double-check the information on this site with your doctor, accountant, insurer, and/or official government websites!</span></p><span data-dcnode-id="1915" instrument_node="">
