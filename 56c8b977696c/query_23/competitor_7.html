</span><h2 data-dcnode-id="1762" id="title1"><span data-dcnode-id="1763" instrument_node="">Corporate Income Tax Rate</span></h2><p data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node="">Your company is taxed at a flat rate of </span><strong data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">17%</span></strong><span data-dcnode-id="1758" instrument_node=""> of its chargeable income. This applies to both local and foreign companies.</span></p><h2 data-dcnode-id="1755" id="title2"><span data-dcnode-id="1756" instrument_node="">Corporate Income Tax Rebates</span></h2><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Corporate Income Tax rebates are given to companies to ease their business costs and to support their restructuring. These rebates are applicable for the Years of Assessment (YAs) 2013 to 2020.</span></p><p data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">The rebates also apply to income derived by Registered Business Trusts, non-resident companies that&nbsp;are not subject to a final withholding tax and companies that receive income taxed at a concessionary tax rate. They do not apply to income derived
    by a non-resident company that is subject to final </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/withholding-tax/payments-to-non-resident-company/payments-that-are-subject-to-withholding-tax"><span data-dcnode-id="1751" instrument_node="">withholding tax</span></a><span data-dcnode-id="1749" instrument_node="">.</span></p><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Your company’s chargeable income declared in its Corporate Income Tax&nbsp;Returns (Estimated Chargeable Income (ECI) and Form C-S/ Form C-S (Lite)/ Form C) should not include the rebate as IRAS will compute and allow it automatically.&nbsp;</span></p><span data-dcnode-id="1745" instrument_node="">
</span></section><span data-dcnode-id="1743" instrument_node="">

</span><h2 data-dcnode-id="1283" id="title3"><span data-dcnode-id="1284" instrument_node="">Tax Exemption Schemes</span></h2><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The tax exemption scheme for new start-up companies and partial tax exemption scheme for companies are tax reliefs available to reduce companies’ tax bills.</span></p><span data-dcnode-id="1280" instrument_node="">
</span></section><span data-dcnode-id="1278" instrument_node="">
</span><section class="eyd-accordion" data-count="0" data-dcnode-id="300" data-total="0"><button class="expand-collapse" data-dcnode-id="1276" type="button"><span data-dcnode-id="1277" instrument_node="">Expand all</span></button><div class="eyd-accordion-item" data-dcnode-id="708" data-placeholder-label="Tax Exemption Scheme for New Start-Up Companies" data-sf-element="accordion" id="tax-exemption-scheme-for-new-start-up-companies"><span data-dcnode-id="1275" instrument_node="">
</span><a class="eyd-accordion-title" data-dcnode-id="1269" href="#tax-exemption-scheme-for-new-start-up-companies"><span data-dcnode-id="1274" instrument_node="">
</span><h3 data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">
            Tax Exemption Scheme for New Start-Up Companies
        </span></h3><span class="eyd-icon eyd-icon-chevron-down" data-dcnode-id="1271"></span><span data-dcnode-id="1270" instrument_node="">
</span></a><span data-dcnode-id="1268" instrument_node="">
</span><div class="eyd-accordion-content" data-dcnode-id="710"><span data-dcnode-id="1267" instrument_node="">
</span><section class="eyd-rte" data-dcnode-id="712"><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The tax exemption scheme for new start-up companies was introduced in the Year of Assessment (YA) 2005 to support entrepreneurship and to grow our local enterprises.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">It was announced in Budget 2018 that the tax exemption under the scheme would be revised with effect from YA 2020, as other support for companies to build their capabilities have been strengthened.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">The tax exemptions for qualifying companies for their first 3 consecutive YAs are as follows:</span></p><span data-dcnode-id="1257" instrument_node="">
</span><div class="tablesaw-bar tablesaw-mode-stack" data-dcnode-id="1256"></div><span data-dcnode-id="1255" instrument_node="">
</span><span data-dcnode-id="1254" instrument_node="">
</span><span data-dcnode-id="1253" instrument_node="">
</span><span data-dcnode-id="1250" instrument_node="">
</span><span data-dcnode-id="1247" instrument_node="">
</span><span data-dcnode-id="1245" instrument_node="">
</span><span data-dcnode-id="1243" instrument_node="">
</span><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1241" instrument_node="">
</span><span data-dcnode-id="1225" instrument_node="">
</span><span data-dcnode-id="1209" instrument_node="">
</span><span data-dcnode-id="1207" instrument_node="">
</span><span data-dcnode-id="1205" instrument_node="">
</span><table class="tablesaw tablesaw-stack" data-dcnode-id="1204" data-tablesaw-mode="stack" id="tablesaw-9245"><thead data-dcnode-id="1244"><tr data-dcnode-id="1246"><th data-dcnode-id="1251" data-role="resizable" scope="col"><span data-dcnode-id="1252" instrument_node="">YA 2020 onwards</span></th><th data-dcnode-id="1248" scope="col"><span data-dcnode-id="1249" instrument_node="">YA 2019 and before</span></th></tr></thead><tbody data-dcnode-id="1206"><tr data-dcnode-id="1208"><td data-dcnode-id="1226"><b class="tablesaw-cell-label" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">YA 2020 onwards</span></b><span data-dcnode-id="1238" instrument_node=""> </span><span class="tablesaw-cell-content" data-dcnode-id="1227"><span data-dcnode-id="1237" instrument_node="">
</span><ul data-dcnode-id="1229"><span data-dcnode-id="1236" instrument_node="">
</span><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">75% exemption on the first $100,000 of normal chargeable income*; and</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">A further 50% exemption on the next $100,000 of normal chargeable income*. </span></li><span data-dcnode-id="1230" instrument_node="">
</span></ul><span data-dcnode-id="1228" instrument_node="">
</span></span></td><td data-dcnode-id="1210"><b class="tablesaw-cell-label" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">YA 2019 and before</span></b><span data-dcnode-id="1222" instrument_node=""> </span><span class="tablesaw-cell-content" data-dcnode-id="1211"><span data-dcnode-id="1221" instrument_node="">
</span><ul data-dcnode-id="1213"><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Full exemption on the first $100,000 of normal chargeable income*; and</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">A further 50% exemption on the next $200,000 of normal chargeable income*. </span></li><span data-dcnode-id="1214" instrument_node="">
</span></ul><span data-dcnode-id="1212" instrument_node="">
</span></span></td></tr></tbody></table><span data-dcnode-id="1203" instrument_node="">
</span><div class="footnotes" data-dcnode-id="1197"><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1199"><em data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">* Normal chargeable income refers to income to be taxed at the prevailing Corporate Income Tax rate of 17%.</span></em></p><span data-dcnode-id="1198" instrument_node="">
</span></div><img alt="Notice (lightbulb)" data-dcnode-id="1196" data-displaymode="Original" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/media/images/default-source/uploadedimages/pages/notice-%28lightbulb%29.png%3Fsfvrsn%3Dc9da3644_0&amp;raw" style="float: left" title="Notice (lightbulb)"><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1187" style="margin-left: 90px"><span data-dcnode-id="1194" instrument_node="">This exemption scheme applies to qualifying companies only for their first 3 consecutive YAs. From the fourth YA onwards, companies can enjoy the </span><a data-dcnode-id="1192" href="#partial-tax-exemption-scheme-for-companies"><span data-dcnode-id="1193" instrument_node="">partial tax exemption</span></a><span data-dcnode-id="1191" instrument_node="">. Learn </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/basics-of-corporate-income-tax/basic-guide-to-corporate-income-tax-for-companies%23determining-your-company-s-first-year-of-assessment--ya-"><span data-dcnode-id="1190" instrument_node="">how to determine the first 3 YAs of your company</span></a><span data-dcnode-id="1188" instrument_node="">.</span></p><span data-dcnode-id="1186" instrument_node="">

</span><div class="tablesaw-bar tablesaw-mode-stack" data-dcnode-id="1179"></div><span data-dcnode-id="1178" instrument_node="">

</span><h3 data-dcnode-id="805" id="qualifying-conditions "><span data-dcnode-id="806" instrument_node="">Qualifying Conditions for Tax Exemption Scheme for New Start-Up Companies</span></h3><img alt="checkbox with tick" data-dcnode-id="804" data-displaymode="Original" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/media/images/default-source/uploadedimages/pages/checkbox-with-tick.png%3Fsfvrsn%3D36c9f14a_0&amp;raw" style="float: left" title="checkbox with tick"><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798" style="margin-left: 90px"><span data-dcnode-id="802" instrument_node="">All new start-up companies are eligible for the tax exemption scheme, </span><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">except</span></strong><span data-dcnode-id="799" instrument_node="">:</span></p><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="789" style="margin-left: 90px"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Companies whose principal activity are that of investment holding</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Companies that undertake property development for sale, investment, or both </span></li><span data-dcnode-id="790" instrument_node="">
</span></ul><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786" style="margin-left: 90px"><span data-dcnode-id="787" instrument_node="">The new start-up company must also:</span></p><span data-dcnode-id="785" instrument_node="">
</span><ol data-dcnode-id="762" style="margin-left: 90px"><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Be incorporated in Singapore</span></li><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Be a </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/basics-of-corporate-income-tax/tax-residency-of-a-company"><span data-dcnode-id="779" instrument_node="">tax resident of Singapore</span></a><span data-dcnode-id="777" instrument_node=""> for that YA</span></li><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="774" instrument_node="">Have its total share capital beneficially held directly by no more than 20 shareholders throughout the basis period for that YA where:
        </span><ol data-dcnode-id="766" style="list-style-type: lower-alpha"><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">All the shareholders are individuals; or</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">At least 1 shareholder is an individual holding at least 10% of the issued ordinary shares of the company</span></li><span data-dcnode-id="767" instrument_node="">
</span></ol><span data-dcnode-id="765" instrument_node="">
</span></li><span data-dcnode-id="763" instrument_node="">
</span></ol><span data-dcnode-id="761" instrument_node="">
</span><h3 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">How to Claim Tax Exemption</span></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="757" instrument_node="">To claim the tax exemption, complete the relevant sections of the </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/estimated-chargeable-income-%28eci%29-filing"><span data-dcnode-id="756" instrument_node="">Estimated Chargeable Income (ECI) filing</span></a><span data-dcnode-id="754" instrument_node=""> and </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/form-c-s-form-c-s-%28lite%29-form-c-filing/guidance-on-filing-form-c-s-form-c-s-%28lite%29-form-c"><span data-dcnode-id="753" instrument_node="">Form C-S/ Form C-S (Lite)/ Form C</span></a><span data-dcnode-id="751" instrument_node="">.
</span></p><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Abuse of the Tax Exemption Scheme</span></h3><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">IRAS takes a serious view of companies that are set up to abuse this scheme and are not incorporated for entrepreneurship and genuine commercial reasons. </span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">IRAS will not hesitate to take action when such abuse is uncovered.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Abuse of the tax exemption scheme includes:</span></p><span data-dcnode-id="737" instrument_node="">
</span><ul data-dcnode-id="729"><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Allocating the income of an existing profitable going concern to a few shell companies so that the chargeable income of each shell company is within the threshold for tax exemption</span></li><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Charging fees/ expenses to an existing profitable going concern by shell companies without any bona fide commercial reasons </span></li><span data-dcnode-id="730" instrument_node="">
</span></ul><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The shell companies claim tax exemption on the income they receive from the profitable going concern, while the latter claims tax deduction on the fees/ expenses paid to the shell companies.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">These shell companies do not carry out any activities or significant activities and have no or few employees. Their accounts usually show few transactions and low capitalisation (usually at $2). </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">These forms of arrangement result in an overall net reduction of tax for the profitable going concern and the shell companies.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">As at 31 Jan 2021, more than 300 companies have been audited for possible abuse of the tax exemption scheme for new start-up companies. This has resulted in total tax recovery and penalties of more than $25 million.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Tax evasion/ fraud is a criminal offence punishable under the law and the Court imposes severe penalties for such offences. Businesses or individuals who engage in abusive tax arrangements such as setting up of shell companies to take advantage of the
    tax exemption scheme for new start-up companies or individuals who assist others with abusive tax arrangements should disclose such abuse immediately. IRAS will treat such disclosure as a mitigating factor when considering the penal charges.</span></p><span data-dcnode-id="713" instrument_node="">
</span></section><span data-dcnode-id="711" instrument_node="">
</span></div><span data-dcnode-id="709" instrument_node="">
</span></div><div class="eyd-accordion-item" data-dcnode-id="406" data-placeholder-label="Partial Tax Exemption Scheme for Companies" data-sf-element="accordion" id="partial-tax-exemption-scheme-for-companies"><span data-dcnode-id="707" instrument_node="">
</span><a class="eyd-accordion-title" data-dcnode-id="701" href="#partial-tax-exemption-scheme-for-companies"><span data-dcnode-id="706" instrument_node="">
</span><h3 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">
            Partial Tax Exemption Scheme for Companies
        </span></h3><span class="eyd-icon eyd-icon-chevron-down" data-dcnode-id="703"></span><span data-dcnode-id="702" instrument_node="">
</span></a><span data-dcnode-id="700" instrument_node="">
</span><div class="eyd-accordion-content" data-dcnode-id="408"><span data-dcnode-id="699" instrument_node="">
</span><section class="eyd-rte" data-dcnode-id="410"><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">All companies, including companies limited by guarantee, are eligible for partial tax exemption (PTE), unless they are claiming the tax exemption for new start-up companies.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">It was announced in Budget 2018 that the tax exemption under the partial tax exemption scheme would be revised with effect from the Year of Assessment (YA) 2020 as other support for companies to build their capabilities have been strengthened.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The tax exemptions for qualifying companies are as follows:</span></p><span data-dcnode-id="689" instrument_node="">

</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">A further 50% exemption on the next $190,000 of normal chargeable income*. </span></li><span data-dcnode-id="655" instrument_node="">
</span></ul><span data-dcnode-id="653" instrument_node="">

</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">75% exemption on the first $10,000 of normal chargeable income*; and</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">A further 50% exemption on the next $290,000 of normal chargeable income*. </span></li><span data-dcnode-id="639" instrument_node="">
</span></ul><span data-dcnode-id="637" instrument_node="">

</span><p data-dcnode-id="624"><em data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">* Normal chargeable income refers to income to be taxed at the prevailing Corporate Income Tax rate of 17%.</span></em></p></div><span data-dcnode-id="622" instrument_node="">

</span><h3 data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">
            FAQs
        </span></h3><span class="eyd-icon eyd-icon-chevron-down" data-dcnode-id="401"></span><span data-dcnode-id="400" instrument_node="">
</span></a><span data-dcnode-id="398" instrument_node="">
</span><div class="eyd-accordion-content" data-dcnode-id="303"><span data-dcnode-id="397" instrument_node="">
</span><section class="eyd-rte" data-dcnode-id="305"><span data-dcnode-id="396" instrument_node="">
</span><ol data-dcnode-id="307"><li data-dcnode-id="388"><p data-dcnode-id="393"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Why are investment holding companies and companies who undertake property development not eligible for the tax exemption scheme for new start-up companies?</span></strong></p><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Investment holding companies derive only passive incomes such as dividend and interest income, while the real estate industry typically incorporates a new company for each new property development.</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">The purpose of the start-up tax exemption is to encourage entrepreneurship, and hence not intended for such companies. However, these companies are eligible for the partial tax exemption.</span></p></li><li data-dcnode-id="377"><p data-dcnode-id="385"><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">How do companies limited by guarantee meet the condition on share capital for the tax exemption scheme for new start-up companies?</span></strong></p><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">For companies limited by guarantee, the mentioned condition will apply to their membership instead. Such companies must have members who meet either of the following conditions:</span></p><ul data-dcnode-id="378"><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">All of whom are individuals throughout the basis period for that Year of Assessment (YA)</span></li><li data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">At least one of whom is an individual throughout the basis period for that YA, and the contribution of that individual under the memorandum of association of the company to the assets of the company in the event of it being wound up amounts
                to at least 10% of the total contributions of the members of the company throughout the basis period for that YA</span></li></ul></li><li data-dcnode-id="362"><p data-dcnode-id="374"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">If my company does not claim the tax exemption for new start-up companies in any of the first 3 YAs, can I continue to claim the tax exemption in subsequent YAs?</span></strong></p><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">No. The tax exemption is available only for the first 3 consecutive YAs. If your company incurs losses or has no income (e.g. business has not commenced) during any of the first 3 YAs, the tax exemption scheme for new start-up companies is not
            applicable to your company for that particular YA as your chargeable income and tax payable are nil. However, that particular YA is still included in determining the first 3 consecutive YAs that your company is eligible for the tax exemption
            for new start-up companies. </span></p><p data-dcnode-id="369"><span data-dcnode-id="370" style="text-decoration: underline"><span data-dcnode-id="371" instrument_node="">Example:</span></span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Your company's first 3 YAs are YA 2020, YA 2021 and YA 2022. It has no income in YAs 2020 and 2021. It started its operations in 2021 and has taxable income in YA 2022.</span></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Your company can claim the tax exemption for new start-up companies in YA 2022 if it meets all the qualifying conditions. However, YA 2022 is your company’s third YA, although this is its first claim for the tax exemption for new start-up
            companies.
        </span></p><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Your company cannot claim the tax exemption for new start-up companies in YA 2023 as it is the fourth YA. From YA 2023, your company is eligible for the partial tax exemption.</span></p></li><li data-dcnode-id="340"><p data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Can my company defer the claim for unutilised tax losses brought forward to maximise the benefit given under the tax exemption scheme for new start-up companies?</span></strong></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">No. The company must first set-off the unutilised tax losses brought forward against the current year adjusted profit, unless it does not meet the qualifying conditions for set-off*.</span></p><div class="footnotes" data-dcnode-id="350"><p data-dcnode-id="351"><em data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">* If it does not meet the </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/income-deductions-for-companies/unutilised-items-%28capital-allowances-trade-losses-donations%29%23qualifying-conditions"><span data-dcnode-id="355" instrument_node="">qualifying conditions for set-off</span></a><span data-dcnode-id="353" instrument_node="">, the unutilised losses will be disregarded and will not be available for set-off against current or future profits.</span></em></p></div><p data-dcnode-id="347"><span data-dcnode-id="348" style="text-decoration: underline"><span data-dcnode-id="349" instrument_node="">Example:</span></span></p><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Your company has tax losses of $150,000 in YA 2021 and has an adjusted profit of $100,000 in YA 2022. It qualifies for the tax exemption scheme for new start-up companies in YA 2022.</span></p><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">The company must first set-off the unutilised tax losses of $150,000 brought forward from YA 2021 against the adjusted profit of $100,000 in YA 2022, assuming it meets the qualifying conditions for set-off. </span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">This results in unutilised losses of $50,000 ($150,000 - $100,000) to be carried forward to set-off against profits of subsequent YAs, subject to meeting the qualifying conditions. The tax exemption scheme for new start-up companies is therefore
            not applicable to the company for YA 2022 since the company's chargeable income and tax payable for YA 2022 are nil.</span></p></li><li data-dcnode-id="331"><p data-dcnode-id="337"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Can my company defer the claim for capital allowance to maximise the benefit given under the tax exemption scheme for new start-up companies?</span></strong></p><p data-dcnode-id="332"><span data-dcnode-id="336" instrument_node="">Yes. Your company can defer the claim for capital allowance. Learn more about </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/taxes/corporate-income-tax/income-deductions-for-companies/claiming-allowances/capital-allowances%23deferring-capital-allowance-claims"><span data-dcnode-id="335" instrument_node="">deferring capital allowance claims</span></a><span data-dcnode-id="333" instrument_node="">.
 </span></p></li><li data-dcnode-id="325"><p data-dcnode-id="328"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">My company's chargeable income for YA 2022 is less than $200,000. As such, my company is unable to enjoy the maximum amount of tax exemption for new start-up companies. Can the 'unutilised' exempt amount for YA 2022 be carried forward to subsequent YAs?</span></strong></p><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">No. The tax exemption is allowed on a per YA basis. You cannot carry forward any 'unutilised' amount to YA 2023 or any other subsequent YAs.</span></p></li><li data-dcnode-id="316"><p data-dcnode-id="322"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">I have converted my sole-proprietor or partnership business into a company. Is my company eligible for the tax exemption scheme for new start-up companies?</span></strong></p><p class="active" data-dcnode-id="317"><span data-dcnode-id="321" instrument_node="">Yes. Your company is eligible for the tax exemption scheme for new companies for its first 3 consecutive YAs if it meets all the </span><a data-dcnode-id="319" href="#qualifying-conditions"><span data-dcnode-id="320" instrument_node="">qualifying conditions</span></a><span data-dcnode-id="318" instrument_node="">.</span></p></li><li data-dcnode-id="308"><p data-dcnode-id="313"><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Can a foreign company or its Singapore branch claim the tax exemption for new start-up companies?</span></strong></p><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">No. A foreign company or its Singapore branch cannot claim the tax exemption for new start-up companies as they are not incorporated in Singapore.</span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">However, a foreign company or its Singapore branch is eligible for the partial tax exemption on its normal chargeable income. </span></p></li></ol><span data-dcnode-id="306" instrument_node="">
</span></section><span data-dcnode-id="304" instrument_node="">
</span></div><span data-dcnode-id="302" instrument_node="">
