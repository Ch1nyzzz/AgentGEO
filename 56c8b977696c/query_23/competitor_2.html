</span><div class="tracker-post-body ng-binding" data-dcnode-id="3596" ng-bind-html="post.description | unsafe"><p data-dcnode-id="3615"><b data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">Here's what some outlets from outside of Ireland are saying about the potential change to corporate tax:</span></b></p><p data-dcnode-id="3611"><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-europe-58819458" target="_blank"><span data-dcnode-id="3614" instrument_node="">BBC</span></a><span data-dcnode-id="3612" instrument_node="">: "Ireland has a corporation tax rate of 12.5%, which is one of the lowest in the developed world.</span></p><p data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">"The country has used that low tax rate as a central part of its efforts to attract foreign investment, particularly from the US. A global minimum rate would weaken the incentives for multinational companies to shift their profits to places where the tax rate is lower."</span></p><p data-dcnode-id="3605"><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euronews.com/2021/10/05/ireland-set-to-agree-historical-minimum-corporate-tax-rate" target="_blank"><span data-dcnode-id="3608" instrument_node="">Euronews</span></a><span data-dcnode-id="3606" instrument_node="">: "Providing a stable, low-tax environment attracted inward investment from some of the world's largest multinationals. Successive Irish governments have said it was necessary to compete on tax given Ireland's geographical location as an island off the continent, as well as its size – where it is felt Ireland's offering could not compete on scale with much larger countries like Germany and France.</span></p><p data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">"Ireland has been under pressure to increase its corporate tax policy for over a decade. The European Commission and larger EU member states such as Germany and France have been hugely critical of Dublin's hesitancy on this matter."</span></p><p data-dcnode-id="3599"><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/ousivMolt/idUSKBN2GX178" target="_blank"><span data-dcnode-id="3602" instrument_node="">Reuters</span></a><span data-dcnode-id="3600" instrument_node="">: "Approval from Ireland, one of the countries that has benefited most from low corporate taxes, would be a big boost for the project to impose a minimum global rate.</span></p><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">"The handful of holdouts, which also include fellow EU members Estonia and Hungary, cannot however block the proposed changes."</span></p></div><span data-dcnode-id="3595" instrument_node="">
</span></div><span data-dcnode-id="3592" instrument_node="">

</span><blockquote align="center" class="twitter-tweet" data-dcnode-id="2859"><p data-dcnode-id="2863" dir="ltr" lang="en"><span data-dcnode-id="2872" instrument_node="">Minister Paschal Donohoe said that a debate is under way in the US Congress on changes to their tax system, which will align them to the OECD agreement. </span><br data-dcnode-id="2871"><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">Given the "significant investment by US multinationals here", this is significant, he said | </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/MP1NeNjYHa"><span data-dcnode-id="2868" instrument_node="">https://t.co/MP1NeNjYHa</span></a><span data-dcnode-id="2866" instrument_node=""> </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/WtLovOsLsb"><span data-dcnode-id="2865" instrument_node="">pic.twitter.com/WtLovOsLsb</span></a></p><span data-dcnode-id="2862" instrument_node="">— RTÉ News (@rtenews) </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/rtenews/status/1446160020387794948"><span data-dcnode-id="2861" instrument_node="">October 7, 2021</span></a></blockquote></div><span data-dcnode-id="2857" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="2776" ng-bind-html="post.description | unsafe"><p data-dcnode-id="2785"><b data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Minister is "absolutely satisfied" Ireland is making correct call</span></b></p><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">He says he recognises where Ireland had been in the past on the issue of 12.5%, and says it created certainty and predictability for multinational companies that have set up here. </span></p><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">"It's also clear that Ireland has benefitted from globalisation... but also from the international standards that underpin that globalisation," he says. </span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Mr Donohoe says Ireland wasn't in a position to sign up in July as critical issues had to be resolved. </span></p><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">He references the "at least" line, and says Ireland made its case for its own economic interests. </span></p></div><span data-dcnode-id="2775" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="2694" ng-bind-html="post.description | unsafe"><p data-dcnode-id="2703"><b data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">"Importantly we have secured the removal of 'at least' in the OECD text as we had sought."</span></b></p><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Mr Donohoe says some countries had sought higher minimum tax rates, but the 15% provides "critical certainty for Government and industry". </span></p><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">He says the European Commission has provided assurances that the directive it will propose to transpose the OECD agreement will be faithful to that agreement which Ireland is signing up to.</span></p><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">"In joining this agreement, we must remember that there are 140 countries involved in this process and many have had to make compromises," he says. </span></p><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">"But I also believe that the agreement Government has agreed to sign up to today is balanced and represents a fair compromise reflecting the interests and input of the many countries involved in the negotiations."</span></p></div><span data-dcnode-id="2693" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="2614" ng-bind-html="post.description | unsafe"><p data-dcnode-id="2621"><b data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Mr Donohoe gives details on which companies it will affect</span></b></p><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">"For Ireland, the agreement will allow for the retention of our statutory 12.5% rate for businesses with annual revenues of less than €750 million," he says.</span></p><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">"This will mean that there will be no increase in the corporate tax rate for one hundred and sixty thousand businesses representing approximately 1.8 million employees and they will continue to enjoy all the benefits of Ireland's longstanding 12.5% rate."</span></p><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">However, it will affect 56 Irish multinational companies employing 100,000 people. It will also affect 1500 foreign owned multinationals employing 400,000 people here.</span></p></div><span data-dcnode-id="2613" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="2530" ng-bind-html="post.description | unsafe"><p data-dcnode-id="2541"><b data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Mr Donohoe is now talking about the risks if Ireland hadn't signed up</span></b></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Firstly, he says Ireland relies on its relationships with other countries as it is a small, open economy. </span></p><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Secondly, Ireland would "lose influence in respect to the critical discussions which will take place in the coming months" if it didn't sign up.</span></p><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Most importantly, he says not joining the agreement could lead to another jurisdiction collecting the taxes Ireland could be.</span></p><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">"So, not joining an agreement will result not just in reputational risks, but also economic and fiscal risks," he says.</span></p><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">"This is a difficult and complex decision. But I believe it is the right one."</span></p></div><span data-dcnode-id="2529" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="2360" ng-bind-html="post.description | unsafe"><p data-dcnode-id="2369"><b data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">The change "will not impact the vast majority of Irish businesses"</span></b></p><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">"The scope of the global minimum effective tax is that it will apply to multinationals with a threshold of €750 million," he reiterates.</span></p><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">But it will impact the Exchequer.</span></p><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">He says: "While the final cost is very difficult to predict the Department of Finance and the Revenue Commissioners have estimated that the cost of the agreement will be up to €2 billion annually when both pillars come into effect. </span></p><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">"This must also be considered in the context of strong growth in corporation tax receipts over recent years."</span></p></div><span data-dcnode-id="2359" instrument_node="">

</span><div class="tracker-post-body ng-binding" data-dcnode-id="1882" ng-bind-html="post.description | unsafe"><p data-dcnode-id="1893"><b data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">There's been more reaction coming in from various groups</span></b></p><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Ibec says the announcement of a "firm commitment to a 15% minimum rate, and no more, is a vindication of the State's position".</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">CEO Danny McCoy says: "Today marks a watershed for the Irish business model. Implementation of any changes must improve on the elements of the regime we control.</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">"Any change should be accompanied by reform on Ireland's regime to maximise our competitiveness for substantial investment and activity, making full use of key supports like the R&amp;D tax credit and dealing with existing complexities in the regime."</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Christian Aid, meanwhile, says the measures don't go far enough.</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Its head of policy and advocacy Sorley McCaughey says: "Such a low rate is unlikely to do enough to stop profit-shifting, not least because 15% is well below most countries' current rates and risks becoming a global floor that incentivises a race to the minimum by all countries, rather than ending the appeal of tax havens."</span></p></div><span data-dcnode-id="1881" instrument_node="">
