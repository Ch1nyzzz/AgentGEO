</span><div class="panel-body" data-dcnode-id="2781" style="text-align: justify;"><span data-dcnode-id="2782" instrument_node="">In the United States, the Corporate Income tax rate is a tax collected from companies. Its amount is based on the net income companies obtain while exercising their business activity, normally during one business year. The benchmark we use refers to the highest rate for Corporate Income.  Revenues from the Corporate Tax Rate are an important source of income for the government of the United States.</span></div><span data-dcnode-id="2780" instrument_node="">
