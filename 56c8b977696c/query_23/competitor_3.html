</span><p data-dcnode-id="6169"><strong data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">Note:&nbsp;</span></strong><span data-dcnode-id="6174" instrument_node="">All data and methodological notes are accessible in our </span><a data-dcnode-id="6171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/TaxFoundation/worldwide-corporate-tax-rates" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">GitHub repository</span></strong></a><span data-dcnode-id="6170" instrument_node="">.</span></p><span data-dcnode-id="6168" instrument_node="">
</span></div><span data-dcnode-id="6166" instrument_node="">
</span><h2 data-dcnode-id="6164" id="Key"><span data-dcnode-id="6165" instrument_node="">Key Findings</span></h2><span data-dcnode-id="6163" instrument_node="">
</span><ul data-dcnode-id="6119"><span data-dcnode-id="6162" instrument_node="">
</span><li data-dcnode-id="6157"><span data-dcnode-id="6161" instrument_node="">
</span><p data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">In 2021, 20 countries made changes to their statutory corporate income tax rates. Three countries—Bangladesh, Argentina, and Gibraltar—increased their top corporate tax rates, while 17 countries—including Chile, Tunisia, and France—reduced their corporate tax rates.</span></p><span data-dcnode-id="6158" instrument_node="">
</span></li><span data-dcnode-id="6156" instrument_node="">
</span><li data-dcnode-id="6151"><span data-dcnode-id="6155" instrument_node="">
</span><p data-dcnode-id="6153"><span data-dcnode-id="6154" instrument_node="">Comoros (50&nbsp;percent), Puerto Rico (37.5 percent), and Suriname (36 percent) are the jurisdictions with the highest corporate tax rates in the world, while Barbados (5.5 percent), Uzbekistan (7.5 percent), and Turkmenistan (8 percent) levy the lowest corporate rates. Fifteen jurisdictions do not impose corporate tax.</span></p><span data-dcnode-id="6152" instrument_node="">
</span></li><span data-dcnode-id="6150" instrument_node="">
</span><li data-dcnode-id="6145"><span data-dcnode-id="6149" instrument_node="">
</span><p data-dcnode-id="6147"><span data-dcnode-id="6148" instrument_node="">The worldwide average statutory corporate income tax rate, measured across 180 jurisdictions, is 23.54 percent. When weighted by GDP, the average statutory rate is 25.44 percent.</span></p><span data-dcnode-id="6146" instrument_node="">
</span></li><span data-dcnode-id="6144" instrument_node="">
</span><li data-dcnode-id="6139"><span data-dcnode-id="6143" instrument_node="">
</span><p data-dcnode-id="6141"><span data-dcnode-id="6142" instrument_node="">Asia has the lowest regional average rate, at 19.62 percent, while Africa has the highest regional average statutory rate, at 27.97 percent. However, when weighted for GDP, Europe has the lowest regional average rate at 23.97 percent and South America has the highest at 31.03 percent.</span></p><span data-dcnode-id="6140" instrument_node="">
</span></li><span data-dcnode-id="6138" instrument_node="">
</span><li data-dcnode-id="6133"><span data-dcnode-id="6137" instrument_node="">
</span><p data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">The average top corporate rate among EU27 countries is 21.30 percent, 23.04 percent among OECD countries, and 69 percent in the G7.</span></p><span data-dcnode-id="6134" instrument_node="">
</span></li><span data-dcnode-id="6132" instrument_node="">
</span><li data-dcnode-id="6127"><span data-dcnode-id="6131" instrument_node="">
</span><p data-dcnode-id="6129"><span data-dcnode-id="6130" instrument_node="">The worldwide average statutory corporate tax rate has consistently decreased since 1980, with the largest decline occurring in the early 2000s.</span></p><span data-dcnode-id="6128" instrument_node="">
</span></li><span data-dcnode-id="6126" instrument_node="">
</span><li data-dcnode-id="6121"><span data-dcnode-id="6125" instrument_node="">
</span><p data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">The average statutory corporate tax rate has declined in every region since 1980.</span></p><span data-dcnode-id="6122" instrument_node="">
</span></li><span data-dcnode-id="6120" instrument_node="">
</span></ul><span data-dcnode-id="6118" instrument_node="">
</span><div class="box box--subtle u-mb2-0" data-dcnode-id="6056"><span data-dcnode-id="6117" instrument_node="">
</span><div class="link-list-box" data-dcnode-id="6058"><span data-dcnode-id="6116" instrument_node="">

</span><li data-dcnode-id="6062"><strong data-dcnode-id="6063"><a data-dcnode-id="6064" href="#Rates"><span data-dcnode-id="6065" instrument_node="">List of all Corporate Tax Rates in 2021</span></a></strong></li><span data-dcnode-id="6061" instrument_node="">

</span></div><span data-dcnode-id="6055" instrument_node="">
</span><h2 data-dcnode-id="6053" id="Intro"><span data-dcnode-id="6054" instrument_node="">Introduction</span></h2><span data-dcnode-id="6052" instrument_node="">
</span><p data-dcnode-id="6045"><span data-dcnode-id="6051" instrument_node="">In 1980, corporate tax rates around the world averaged 40.11 percent, and 46.52 percent when weighted by GDP.</span><a data-dcnode-id="6049" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="6050" instrument_node="">[1]</span></a><span data-dcnode-id="6048" instrument_node=""> Since then countries have recognized the impact that high corporate tax rates have on business investment decisions so that in 2021, the average is now 23.54 percent, and 25.44 when weighted by GDP, for 180 separate tax jurisdictions.</span><a data-dcnode-id="6046" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="6047" instrument_node="">[2]</span></a></p><span data-dcnode-id="6044" instrument_node="">
</span><p data-dcnode-id="6039"><span data-dcnode-id="6043" instrument_node="">Declines have been seen in every major region of the world, including in the largest economies. The 2017 tax reform in the United States brought the statutory corporate income tax rate from among the highest in the world closer to the middle of the distribution. Whereas in 2017 the United States had the fourth highest corporate income tax rate in the world,</span><a data-dcnode-id="6041" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="6042" instrument_node="">[3]</span></a><span data-dcnode-id="6040" instrument_node=""> it now ranks towards the middle of the countries and tax jurisdictions surveyed.</span></p><span data-dcnode-id="6038" instrument_node="">
</span><p data-dcnode-id="6033"><span data-dcnode-id="6037" instrument_node="">European countries tend to have lower </span><a class="tooltip__anchor" data-dcnode-id="6035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/corporate-income-tax-cit/" id="anchor71997"><span data-dcnode-id="6036" instrument_node="">corporate income tax</span></a><span data-dcnode-id="6034" instrument_node=""> rates than countries in other regions, and many developing countries have corporate income tax rates that are above the worldwide average.</span></p><span data-dcnode-id="6032" instrument_node="">
</span><p data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">Today, most countries have corporate tax rates below 30 percent.</span></p><span data-dcnode-id="6029" instrument_node="">
</span><h2 data-dcnode-id="6027" id="Changes"><span data-dcnode-id="6028" instrument_node="">Notable Corporate Tax Rate Changes in 2021</span></h2><span data-dcnode-id="6026" instrument_node="">
</span><p data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">Twenty countries made changes to their statutory corporate income tax rates in 2021. Bangladesh, Argentina, and Gibraltar increased their top corporate tax rates from 25 percent, 30 percent, and 10 percent to 32.5 percent, 35 percent, and 12.5 percent respectively.</span></p><span data-dcnode-id="6023" instrument_node="">
</span><p data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">Seventeen countries across five continents—Sweden, Colombia, Switzerland, Monaco, Congo, Turkey, Indonesia, France, Gambia, Lao People’s Democratic Republic, Sri Lanka, Angola, Democratic Republic of Congo, Bhutan, Kiribati, Tunisia, and Chile—reduced their corporate tax rates in 2021. The tax rate reductions ranged from just less than 1 percentage point in Sweden, to a temporary 15&nbsp;percentage point reduction in Chile.</span></p><span data-dcnode-id="6020" instrument_node="">

</span><p data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">(a) France has further corporate tax rate reductions scheduled, resulting in a rate of 25&nbsp;percent (plus 3.3 percent social surcharge, equaling a combined rate of 25.83 percent) by 2022.</span></p><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">(b) In response to the pandemic, Chile has adopted a temporary rate reduction to 10 percent for small &nbsp;&nbsp;businesses. For other businesses a rate of 27 percent applies.</span></p><span data-dcnode-id="5833" instrument_node="">
</span><p data-dcnode-id="5817"><span data-dcnode-id="5832" instrument_node="">Sources: Statutory corporate income tax rates are from OECD, “Table II.1. Statutory corporate income tax rate,” updated April 2021, </span><a class="link--long" data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stats.oecd.org/index.aspx%3FDataSetCode%3DTable_II1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5831" instrument_node="">https://stats.oecd.org/index.aspx?DataSetCode=Table_II1</span></a><span data-dcnode-id="5829" instrument_node="">; KPMG, “Corporate tax rates table,” </span><a class="link--long" data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5828" instrument_node="">https://home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html</span></a><span data-dcnode-id="5826" instrument_node="">;</span><u data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node=""> Bloomberg Tax, “Country Guides – Corporate Tax Rates,” accessed October and November 2021, </span></u><a class="link--long" data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberglaw.com/product/tax/toc_view_menu/3380" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5823" instrument_node="">https://www.bloomberglaw.com/product/tax/toc_view_menu/3380</span></a><span data-dcnode-id="5821" instrument_node="">; and researched individually, see Tax Foundation, “worldwide-corporate-tax-rates,” GitHub, </span><a class="link--long" data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/TaxFoundation/worldwide-corporate-tax-rates" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5820" instrument_node="">https://github.com/TaxFoundation/worldwide-corporate-tax-rates</span></a><span data-dcnode-id="5818" instrument_node="">.</span></p><span data-dcnode-id="5816" instrument_node="">

</span><h2 data-dcnode-id="5806" id="Scheduled"><span data-dcnode-id="5807" instrument_node="">Scheduled Corporate Tax Rate Changes in the OECD</span></h2><span data-dcnode-id="5805" instrument_node="">
</span><p data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">Among Organisation for Economic Co-operation and Development (OECD) countries, Austria, France, the Netherlands, and the United Kingdom, have announced they will implement changes to their statutory corporate income tax rate over the coming years.</span></p><span data-dcnode-id="5802" instrument_node="">
</span><ul data-dcnode-id="5768"><span data-dcnode-id="5801" instrument_node="">
</span><li data-dcnode-id="5794"><span data-dcnode-id="5800" instrument_node="">In </span><strong data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">Austria</span></strong><span data-dcnode-id="5797" instrument_node="">, the corporate income tax rate will be cut from 25 percent to 23 percent starting in 2024. The government is also considering increasing the tax exemption threshold on profits up to €30,000 from 13 percent to 15 percent.</span><a data-dcnode-id="5795" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="5796" instrument_node="">[5]</span></a></li><span data-dcnode-id="5793" instrument_node="">
</span><li data-dcnode-id="5786"><span data-dcnode-id="5792" instrument_node="">In </span><strong data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">France</span></strong><span data-dcnode-id="5789" instrument_node="">, the standard statutory corporate income tax rate was lowered to 32.02&nbsp;percent (including the 3.3 percent social surcharge) in 2020. An already legislated corporate rate reduction is expected to progressively bring down the corporate tax rate to 25.83 percent by 2022.</span><a data-dcnode-id="5787" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="5788" instrument_node="">[6]</span></a></li><span data-dcnode-id="5785" instrument_node="">
</span><li data-dcnode-id="5778"><span data-dcnode-id="5784" instrument_node="">In the </span><strong data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">Netherlands</span></strong><span data-dcnode-id="5781" instrument_node="">, the originally planned reduction of the statutory corporate tax rate applying to income exceeding €200,000 was reversed: The corporate rate was not decreased to 22.55 percent in 2020 as originally planned. Instead, it remains at 25 percent in 2021 and will not be lowered to 21.7 percent. However, the higher tax bracket is being increased from €245,000 in 2021 to €345,000 in 2022.</span><a data-dcnode-id="5779" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="5780" instrument_node="">[7]</span></a></li><span data-dcnode-id="5777" instrument_node="">
</span><li data-dcnode-id="5770"><span data-dcnode-id="5776" instrument_node="">In the </span><strong data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">United Kingdom</span></strong><span data-dcnode-id="5773" instrument_node="">, the standard statutory corporate income tax rate is due to increase from 19 percent to 25 percent on April 1, 2023.</span><a data-dcnode-id="5771" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="5772" instrument_node="">[8]</span></a></li><span data-dcnode-id="5769" instrument_node="">
</span></ul><span data-dcnode-id="5767" instrument_node="">
</span><h2 data-dcnode-id="5763" id="Highest"><span data-dcnode-id="5766" instrument_node="">The Highest and Lowest Corporate Tax Rates in the World</span><a data-dcnode-id="5764" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="5765" instrument_node="">[9]</span></a></h2><span data-dcnode-id="5762" instrument_node="">
</span><p data-dcnode-id="5752"><span data-dcnode-id="5761" instrument_node="">One hundred and forty of the 225 separate jurisdictions surveyed for the year 2021 have corporate tax rates at or below 25 percent. One hundred and fifteen have tax rates above 20 and at or below 30 percent. The average tax rate among the 225 jurisdictions is 23.54 percent.</span><a data-dcnode-id="5759" href="#_ftn10" name="_ftnref10"><span data-dcnode-id="5760" instrument_node="">[10]</span></a><span data-dcnode-id="5758" instrument_node=""> The United States has the 85</span><sup data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">th</span></sup><span data-dcnode-id="5755" instrument_node=""> highest corporate tax rate with a combined federal and state statutory rate of 25.77 percent.</span><a data-dcnode-id="5753" href="#_ftn11" name="_ftnref11"><span data-dcnode-id="5754" instrument_node="">[11]</span></a></p><span data-dcnode-id="5751" instrument_node="">
</span><p data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">The 20 countries with the highest statutory corporate income tax rates span almost every region, albeit unequally. While eight of the top 20 countries are in Africa, Europe, Oceania, and Asia appear only once. Of the remaining jurisdictions, five are in North America, and four are in South America.</span></p><span data-dcnode-id="5748" instrument_node="">

</span><p data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">On the other end of the spectrum, the 20 countries with the lowest non-zero statutory corporate tax rates all charge rates at or below 12.5 percent. Ten countries have statutory rates of 10 percent, five being small European nations (Andorra, Bosnia and Herzegovina, Bulgaria, Kosovo, and Macedonia). The only three OECD members represented among the bottom 20 countries are Chile, Hungary, and Ireland. Chile temporarily reduced its statutory corporate income tax rate for most businesses due to the pandemic. Hungary reduced its corporate income tax rate from 19 to 9 percent in 2017. Ireland is known for its low 12.5 percent rate, which has been in place since 2003.</span></p><span data-dcnode-id="5449" instrument_node="">

</span><h2 data-dcnode-id="4981" id="Regional"><span data-dcnode-id="4982" instrument_node="">Regional Variation in Corporate Tax Rates</span></h2><span data-dcnode-id="4980" instrument_node="">
</span><p data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">Corporate tax rates can vary significantly by region. Africa has the highest average statutory corporate tax rate among all regions, at 27.97 percent. Asia has the lowest average statutory corporate tax rate among all regions, at 19.62 percent.</span></p><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">When weighted by GDP, South America has the highest average statutory corporate tax rate at 31.03 percent. Europe has the lowest weighted average statutory corporate income tax, at 23.97 percent.</span></p><span data-dcnode-id="4974" instrument_node="">
</span><p data-dcnode-id="4969"><span data-dcnode-id="4973" instrument_node="">In general, larger and more industrialized nations tend to have higher corporate income tax rates than smaller nations. The G7, which is comprised of the seven wealthiest nations in the world, has an average statutory corporate income tax rate of 26.69 percent, and a weighted average rate of 26.41 percent. OECD member states have an average statutory corporate tax rate of 23.04 percent, and a rate of 25.81 percent when weighted by GDP. The BRICS</span><a data-dcnode-id="4971" href="#_ftn12" name="_ftnref12"><span data-dcnode-id="4972" instrument_node="">[12]</span></a><span data-dcnode-id="4970" instrument_node=""> have an average statutory rate of 27.40 percent, and a weighted average statutory corporate income tax rate of 26.07 percent.</span></p><span data-dcnode-id="4968" instrument_node="">

png 1024w, https://files.taxfoundation.org/20211208112314/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-1-1200x852.png 1200w"></a></p><span data-dcnode-id="4738" instrument_node="">
</span><h2 data-dcnode-id="4734" id="Distribution"><span data-dcnode-id="4737" instrument_node="">Distribution of Corporate Tax Rates</span><a data-dcnode-id="4735" href="#_ftn13" name="_ftnref13"><span data-dcnode-id="4736" instrument_node="">[13]</span></a></h2><span data-dcnode-id="4733" instrument_node="">
</span><p data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">Very few tax jurisdictions impose a corporate income tax at statutory rates greater than 35 percent. The following chart shows a distribution of corporate income tax rates among 225 jurisdictions in 2021. A plurality of countries (115 total) imposes a rate at or above 20 percent and below 30 percent. Twenty-two jurisdictions have a statutory corporate tax rate at or above 30 percent and below 35 percent. Only three jurisdictions have a rate over 35 percent. Eighty-five jurisdictions have a statutory corporate tax rate below 20 percent, and 200 jurisdictions have a corporate tax rate below 30 percent.</span></p><span data-dcnode-id="4730" instrument_node="">
</span><p data-dcnode-id="4727"><a data-dcnode-id="4728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2.png"><img alt="2021 corporate tax rates by country, corporate tax rate trends, Irelands corporate tax rate, G7 corporate tax rate, and corporate tax rates globally, 2021 corporate tax rates around the world" class="alignnone size-full wp-image-91116" data-dcnode-id="4729" sizes="(max-width: 1274px) 100vw, 1274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2.png&amp;raw" srcset="https://files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2.png 1274w, https://files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2-300x216.png 300w, https://files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2-768x553.png 768w, https://files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2-1024x737.png 1024w, https://files.taxfoundation.org/20211208112402/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-2-1200x864.png 1200w"></a></p><span data-dcnode-id="4726" instrument_node="">
</span><h2 data-dcnode-id="4724" id="Trends"><span data-dcnode-id="4725" instrument_node="">The Decline of Corporate Tax Rates since 1980</span></h2><span data-dcnode-id="4723" instrument_node="">
</span><p data-dcnode-id="4719"><span data-dcnode-id="4722" instrument_node="">Over the past 40 years, corporate tax rates have consistently declined on a global basis. In 1980, the unweighted average worldwide statutory tax rate was 40.11 percent. Today, the average statutory rate stands at 23.54 percent, representing a 41 percent reduction over the 41 years surveyed.</span><a data-dcnode-id="4720" href="#_ftn14" name="_ftnref14"><span data-dcnode-id="4721" instrument_node="">[14]</span></a></p><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">The weighted average statutory rate has remained higher than the simple average over this period. Prior to U.S. tax reform in 2017, the United States was largely responsible for keeping the weighted average so high, given its relatively high tax rate, as well as its significant contribution to global GDP. Figure 3 shows the significant impact the change in the U.S. corporate rate had on the worldwide weighted average. The weighted average statutory corporate income tax rate has declined from 46.52 percent in 1980 to 25.44 percent in 2021, representing a 45 percent reduction over the 41 years surveyed.</span></p><span data-dcnode-id="4715" instrument_node="">
</span><p data-dcnode-id="4712"><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3.png"><img alt="2021 corporate tax rates by country, corporate tax rate trends, Irelands corporate tax rate, G7 corporate tax rate, and corporate tax rates globally, 2021 corporate tax rates around the world 3" class="alignnone size-full wp-image-91117" data-dcnode-id="4714" sizes="(max-width: 1274px) 100vw, 1274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3.png&amp;raw" srcset="https://files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3.png 1274w, https://files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3-300x216.png 300w, https://files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3-768x552.png 768w, https://files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3-1024x736.png 1024w, https://files.taxfoundation.org/20211208112437/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-3-1200x863.png 1200w"></a></p><span data-dcnode-id="4711" instrument_node="">
</span><p data-dcnode-id="4707"><span data-dcnode-id="4710" instrument_node="">Over time, more countries have shifted to taxing corporations at rates of or lower than 30 percent, with the United States following this trend with its tax changes at the end of 2017. The largest shift occurred between 2000 and 2010, with 78 percent of countries imposing a statutory rate below 30 percent in 2010 and only 47 percent of countries in the dataset imposing a statutory rate below 30 percent in 2000.</span><a data-dcnode-id="4708" href="#_ftn15" name="_ftnref15"><span data-dcnode-id="4709" instrument_node="">[15]</span></a></p><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4703"><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4.png"><img alt="2021 corporate tax rates by country, corporate tax rate trends, Irelands corporate tax rate, G7 corporate tax rate, and corporate tax rates globally, 2021 corporate tax rates around the world" class="alignnone size-full wp-image-91118" data-dcnode-id="4705" sizes="(max-width: 1275px) 100vw, 1275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4.png&amp;raw" srcset="https://files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4.png 1275w, https://files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4-300x263.png 300w, https://files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4-768x673.png 768w, https://files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4-1024x897.png 1024w, https://files.taxfoundation.org/20211208112507/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-4-1200x1051.png 1200w"></a></p><span data-dcnode-id="4702" instrument_node="">
</span><p data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">All regions saw a net decline in average statutory rates between 1980 and 2021. The average declined the most in Europe, with the 1980 average of 44.6 percent dropping to 19.84 percent, representing a 55 percent decline. South America has seen the smallest decline, with the average only decreasing by 27 percent, from 36.66 percent in 1980 to 26.63 percent in 2021.</span></p><span data-dcnode-id="4699" instrument_node="">
</span><p data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">South America saw a period (1990-2000) where the average statutory rate increased slightly at less than 1 percentage point, although the average rate decreased over the full 40-year period.</span></p><span data-dcnode-id="4696" instrument_node="">
</span><p data-dcnode-id="4693"><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5.png"><img alt="2021 corporate tax rates by country, corporate tax rate trends, Irelands corporate tax rate, G7 corporate tax rate, and corporate tax rates globally, 2021 corporate tax rates around the world" class="alignnone size-full wp-image-91119" data-dcnode-id="4695" sizes="(max-width: 1274px) 100vw, 1274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5.png&amp;raw" srcset="https://files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5.png 1274w, https://files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5-300x216.png 300w, https://files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5-768x553.png 768w, https://files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5-1024x737.png 1024w, https://files.taxfoundation.org/20211208112531/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-5-1200x864.png 1200w"></a></p><span data-dcnode-id="4692" instrument_node="">
</span><h2 data-dcnode-id="4690" id="Conclusion"><span data-dcnode-id="4691" instrument_node="">Conclusion</span></h2><span data-dcnode-id="4689" instrument_node="">
</span><p data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">Worldwide and regional average top statutory corporate tax rates have declined over recent decades, with most countries following the trend. Of 225 jurisdictions around the world, only three have increased their top corporate income tax rate in 2021, while 17 countries have decreased their corporate tax rate. The trend seems to be continuing, as several countries are planning to reduce their corporate tax rates in the coming years.</span></p><span data-dcnode-id="4686" instrument_node="">

</span><h2 data-dcnode-id="4544" id="Appendix"><span data-dcnode-id="4545" instrument_node="">Appendix</span></h2><span data-dcnode-id="4543" instrument_node="">
</span><h3 data-dcnode-id="4540"><strong data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">The Dataset</span></strong></h3><span data-dcnode-id="4539" instrument_node="">
</span><h4 data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Scope</span></h4><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">The dataset compiled for this publication includes the 2021 statutory corporate income tax rates of 225 sovereign states and dependent territories around the world. Tax rates were researched only for jurisdictions that are among the roughly 250 sovereign states and dependent territories that have been assigned a country code by the International Organization for Standardization (ISO). As a result, zones or territories that are independent taxing jurisdictions but do not have their own country code are generally not included in the dataset.</span></p><span data-dcnode-id="4533" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">In addition, the dataset includes historic statutory corporate income tax rates for the time period 1980 to 2021. However, these years cover tax rates of fewer than 225 jurisdictions due to missing data points. Please let Tax Foundation know if you are aware of any sources for historic corporate tax rates that are not mentioned in this report, as we constantly strive to improve our datasets.</span></p><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4527"><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6.png"><img alt="2021 corporate tax rates by country, corporate tax rate trends, Irelands corporate tax rate, G7 corporate tax rate, and corporate tax rates globally, 2021 corporate tax rates around the world" class="alignnone size-full wp-image-91120" data-dcnode-id="4529" sizes="(max-width: 1274px) 100vw, 1274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6.png&amp;raw" srcset="https://files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6.png 1274w, https://files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6-300x216.png 300w, https://files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6-768x553.png 768w, https://files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6-1024x737.png 1024w, https://files.taxfoundation.org/20211208112558/2021-corporate-tax-rates-by-country-corporate-tax-rate-trends-Irelands-corporate-tax-rate-G7-corporate-tax-rate-and-corporate-tax-rates-globally-2021-corporate-tax-rates-around-the-world-6-1200x864.png 1200w"></a></p><span data-dcnode-id="4526" instrument_node="">
</span><p data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">To be able to calculate average statutory corporate income tax rates weighted by GDP, the dataset includes GDP data for 180 jurisdictions. When used to calculate average statutory corporate income tax rates, either weighted by GDP or unweighted, only these 180 jurisdictions are included (to ensure the comparability of the unweighted and weighted averages).</span></p><span data-dcnode-id="4523" instrument_node="">
</span><h3 data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Definition of Selected Corporate Income Tax Rate</span></h3><span data-dcnode-id="4520" instrument_node="">
</span><p data-dcnode-id="4515"><span data-dcnode-id="4519" instrument_node="">The dataset captures </span><em data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">standard top statutory corporate income tax rates</span></em><span data-dcnode-id="4516" instrument_node=""> levied on domestic businesses. This means:</span></p><span data-dcnode-id="4514" instrument_node="">
</span><ul data-dcnode-id="4500"><span data-dcnode-id="4513" instrument_node="">
</span><li data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">The dataset does not reflect special tax regimes, including but not limited to patent boxes, offshore regimes, or special rates for specific industries.</span></li><span data-dcnode-id="4510" instrument_node="">
</span><li data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">A number of countries levy lower rates for businesses below a certain revenue threshold. The dataset does not capture these lower rates.</span></li><span data-dcnode-id="4507" instrument_node="">
</span><li data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">A few countries levy gross revenue taxes on businesses instead of corporate income taxes. Since the tax rates of a corporate income tax and a gross revenue tax are not comparable, these countries are excluded from the dataset.</span></li><span data-dcnode-id="4504" instrument_node="">
</span><li data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Some countries have a separate tax rate for nonresident companies. This dataset does not consider nonresident tax rates that differ from the general corporate rate.</span></li><span data-dcnode-id="4501" instrument_node="">
</span></ul><span data-dcnode-id="4499" instrument_node="">
</span><h3 data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Sources</span></h3><span data-dcnode-id="4496" instrument_node="">
</span><h4 data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Tax Rates for the Year 2021</span></h4><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4476"><span data-dcnode-id="4492" instrument_node="">For OECD countries, the statutory corporate income tax rates used are the </span><em data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">combined</span></em><span data-dcnode-id="4489" instrument_node=""> corporate income tax rates provided by the OECD; see OECD, “Table II.1. Statutory corporate income tax rate,” updated April 2021, </span><a class="link--long" data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stats.oecd.org/index.aspx%3FDataSetCode%3DTable_II1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4488" instrument_node="">https://stats.oecd.org/index.aspx?DataSetCode=Table_II1</span></a><span data-dcnode-id="4486" instrument_node="">. The main source for non-OECD jurisdictions are the statutory rates provided by KPMG; see KPMG, “Corporate tax rates table,” 2021, </span><a class="link--long" data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4485" instrument_node="">https://home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html</span></a><span data-dcnode-id="4483" instrument_node="">. The study also relies on Bloomberg Tax, “Country Guides – Corporate Tax Rates,” accessed in October and November 2021, </span><a class="link--long" data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberglaw.com/product/tax/toc_view_menu/3380" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4482" instrument_node="">https://www.bloomberglaw.com/product/tax/toc_view_menu/3380</span></a><span data-dcnode-id="4480" instrument_node="">. Jurisdictions that are not part of these sources were researched individually. The source for each of these jurisdictions is listed in a GitHub repository; see Tax Foundation, “worldwide-corporate-tax-rates,” GitHub, </span><a class="link--long" data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/TaxFoundation/worldwide-corporate-tax-rates" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4479" instrument_node="">https://github.com/TaxFoundation/worldwide-corporate-tax-rates</span></a><span data-dcnode-id="4477" instrument_node="">.</span></p><span data-dcnode-id="4475" instrument_node="">
</span><h4 data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">Tax Rates for the Years 1980-2020</span></h4><span data-dcnode-id="4472" instrument_node="">
</span><p data-dcnode-id="4464"><span data-dcnode-id="4471" instrument_node="">Tax rates for the time frame between 1980 and 2020 are taken from a dataset compiled by the Tax Foundation over the last years. These historic rates come from multiple sources: PwC, “Worldwide Tax Summaries – Corporate Taxes,” 2010-2019; KPMG, “Corporate Tax Rate Survey,” 1998- 2003; KPMG, “Corporate tax rates table,” 2003-2019; EY, “Worldwide Corporate Tax Guide,” 2004-2019; OECD, “Historical Table II.1 – Statutory corporate income tax rate,” 1999, </span><a class="link--long" data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/tax/tax-policy/tax-database.htm%23C_CorporateCaptial" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4470" instrument_node="">http://www.oecd.org/tax/tax-policy/tax-database.htm#C_CorporateCaptial</span></a><span data-dcnode-id="4468" instrument_node="">; the University of Michigan – Ross School of Business, “World Tax Database,” </span><a class="link--long" data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bus.umich.edu/otpr/otpr/default.asp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4467" instrument_node="">https://www.bus.umich.edu/otpr/otpr/default.asp</span></a><span data-dcnode-id="4465" instrument_node="">; and numerous government websites.</span></p><span data-dcnode-id="4463" instrument_node="">
</span><h4 data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Gross Domestic Product (GDP) for the years 1980-2021</span></h4><span data-dcnode-id="4460" instrument_node="">
</span><p data-dcnode-id="4455"><span data-dcnode-id="4459" instrument_node="">GDP calculations are from the U.S. Department of Agriculture, “International Macroeconomics Data Set.” For years prior to 1999, U.S. Department of Agriculture, “International Macroeconomics Data Set – Historical Real Gross Domestic Product (GDP) and Growth Rates of GDP for Baseline Countries/Regions (in billions of 2010 dollars) 1980-2018,” Jan. 3, 2020,&nbsp;</span><a class="link--long" data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ers.usda.gov/data-products/international-macroeconomic-data-set/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4458" instrument_node="">https://www.ers.usda.gov/data-products/international-macroeconomic-data-set/</span></a><span data-dcnode-id="4456" instrument_node="">.</span></p><span data-dcnode-id="4454" instrument_node="">
</span><p data-dcnode-id="4446"><span data-dcnode-id="4453" instrument_node="">For years following 1999, U.S. Department of Agriculture, “International Macroeconomics Data Set – Projected Real Gross Domestic Product (GDP) and Growth Rates of GDP for Baseline Countries/Regions (in billions of 2015 dollars) 2012-2032,” Jan. 7, 2021,&nbsp;</span><a class="link--long" data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ers.usda.gov/data-products/international-macroeconomic-data-set/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4452" instrument_node="">https://www.ers.usda.gov/data-products/international-macroeconomic-data-set/</span></a><span data-dcnode-id="4450" instrument_node="">, and U.S. Department of Agriculture, “International Macroeconomics Data Set – Historical Real Gross Domestic Product (GDP) and Growth Rates of GDP for Baseline Countries/Regions (in billions of 2015 dollars) 1999-2019,” Jan. 7, 2021,&nbsp;</span><a class="link--long" data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ers.usda.gov/data-products/international-macroeconomic-data-set/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4449" instrument_node="">https://www.ers.usda.gov/data-products/international-macroeconomic-data-set/</span></a><span data-dcnode-id="4447" instrument_node="">.</span></p><span data-dcnode-id="4445" instrument_node="">
