</span><img alt="" class="skip-lazy" data-dcnode-id="461" data-pin-description="Maximizing your tax deductions is one of the easiest ways to save your business money. Read here to learn how to get the most out of them this tax season!" height="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sunriseapp.com/wp-content/uploads/2020/01/filing-taxes-scaled-1200x783.jpg&amp;raw" style="width:0;height:0;" width="0"><span data-dcnode-id="460" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" style="font-weight: 400;"><span data-dcnode-id="456" instrument_node="">Tax time is just around the corner, so you should pay special attention to how to maximize all the deductions you can for your small business. You should think about tax time year-round, though, because you should always keep detailed records of business expenses. Not only will this help you stay accurate with the Internal Revenue Service, but it will also give you a better handle on your business expenses for your financial planning.</span></span></p><span data-dcnode-id="453" instrument_node="">
</span><h2 data-dcnode-id="450"><span data-dcnode-id="451" style="font-weight: 400;"><span data-dcnode-id="452" instrument_node="">1. Keep Your Records</span></span></h2><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="447" style="font-weight: 400;"><span data-dcnode-id="448" instrument_node="">Before you start thinking about how to maximize your business tax deduction, you first need to organize your documents and record every expense related to your business. The IRS wants detailed records to support every deduction you take. While it might not seem so serious when you are filing, these records will</span></span><a data-dcnode-id="443" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sunriseapp.com/blog/recent/6-steps-audit-proof-business/"><span data-dcnode-id="446" instrument_node=""> </span><span data-dcnode-id="444" style="font-weight: 400;"><span data-dcnode-id="445" instrument_node="">become critical if you are ever audited.</span></span></a></p><span data-dcnode-id="441" instrument_node="">
</span><h2 data-dcnode-id="438"><span data-dcnode-id="439" style="font-weight: 400;"><span data-dcnode-id="440" instrument_node="">2. Business Mileage</span></span></h2><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="435" style="font-weight: 400;"><span data-dcnode-id="436" instrument_node="">Keeping track of your business mileage is one of the most beneficial ways to maximize your deductions come tax time. You can either deduct your annual fuel and car maintenance costs or take the standard mileage deduction offered by the IRS. For the 2019 tax year, the</span></span><a data-dcnode-id="431" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-issues-standard-mileage-rates-for-2019" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="434" instrument_node=""> </span><span data-dcnode-id="432" style="font-weight: 400;"><span data-dcnode-id="433" instrument_node="">IRS set the standard mileage rate</span></span></a><span data-dcnode-id="429" style="font-weight: 400;"><span data-dcnode-id="430" instrument_node=""> at 58 cents per mile driven for business use. The latter is probably the better option, especially if you use your vehicle often for work. You can also deduct expenses like tolls or parking fees.</span></span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" style="font-weight: 400;"><span data-dcnode-id="426" instrument_node="">Keep records of your mileage throughout the year, noting the mileage of each trip as well as the business purpose of the trip. Importantly, you can’t deduct mileage for personal use of your car, including commuting to and from a workplace.</span></span></p><span data-dcnode-id="423" instrument_node="">
</span><h2 data-dcnode-id="420"><span data-dcnode-id="421" style="font-weight: 400;"><span data-dcnode-id="422" instrument_node="">3. Employee Salaries and Wages</span></span></h2><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" style="font-weight: 400;"><span data-dcnode-id="418" instrument_node="">The IRS allows businesses to deduct payments to employees, which includes salaries, wages, bonuses, commissions, and some fringe benefits. Employee benefit programs, like dependent care assistance, can be deducted, as well as contributions to qualifying employee retirement plan accounts.</span></span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" style="font-weight: 400;"><span data-dcnode-id="414" instrument_node="">Depending on how your business is structured with the IRS, you might be able to deduct your salary. However, if you are a sole proprietor, you cannot deduct your income. Check with your accountant about how you should go about this.</span></span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" style="font-weight: 400;"><span data-dcnode-id="410" instrument_node="">This deduction does not include payments to other corporations, freelancers, or contractors, which can be deducted but under a different category.</span></span></p><span data-dcnode-id="407" instrument_node="">
</span><h2 data-dcnode-id="404"><span data-dcnode-id="405" style="font-weight: 400;"><span data-dcnode-id="406" instrument_node="">4. Contract Labor</span></span></h2><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="401" style="font-weight: 400;"><span data-dcnode-id="402" instrument_node="">If</span></span><a data-dcnode-id="397" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sunriseapp.com/blog/1099-lifestyle/"><span data-dcnode-id="400" instrument_node=""> </span><span data-dcnode-id="398" style="font-weight: 400;"><span data-dcnode-id="399" instrument_node="">you have any 1099 laborers</span></span></a><span data-dcnode-id="395" style="font-weight: 400;"><span data-dcnode-id="396" instrument_node="">, you cannot deduct these payments as wages because the IRS does not consider them your salaried employees. If you pay any independent contractor more than $600 in one year, make sure to issue them a 1099-MISC so that the IRS has a record for the sake of both of your taxes.</span></span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" style="font-weight: 400;"><span data-dcnode-id="392" instrument_node="">Since employee salaries and payment to freelancers can add up to a huge portion of your business’s yearly cash outflows, you want to make sure this is all categorized correctly so that you can maximize your business tax deductions.</span></span></p><span data-dcnode-id="389" instrument_node="">
</span><h2 data-dcnode-id="386"><span data-dcnode-id="387" style="font-weight: 400;"><span data-dcnode-id="388" instrument_node="">5. Business Equipment and Supplies</span></span></h2><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" style="font-weight: 400;"><span data-dcnode-id="384" instrument_node="">You can deduct the cost of all your business equipment and supplies bought during the year, including vehicles. Keep receipts of everything you bought for your business, including cleaning supplies. You can also deduct depreciation costs for lots of business equipment, including computers, machinery, and even office furniture or livestock. Consult with a tax professional or tax software program to calculate equipment depreciation costs over the years.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="381" instrument_node="">
</span><h2 data-dcnode-id="378"><span data-dcnode-id="379" style="font-weight: 400;"><span data-dcnode-id="380" instrument_node="">6. Rent on Business Property</span></span></h2><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" style="font-weight: 400;"><span data-dcnode-id="376" instrument_node="">Rent for business property is fully deductible—including rent for an office, co-working space, storefront, boutique, factory, or any other business facility. Your utilities are also deductible, including electricity, water, and telephone costs.</span></span></p><span data-dcnode-id="373" instrument_node="">
</span><h2 data-dcnode-id="370"><span data-dcnode-id="371" style="font-weight: 400;"><span data-dcnode-id="372" instrument_node="">7. Home Office</span></span></h2><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" style="font-weight: 400;"><span data-dcnode-id="368" instrument_node="">The business property rental deduction even applies to your home office, but extra rules are in place because you can’t just deduct your apartment rent or home mortgage payments as a business expense. If you have a home office or other area of your home used regularly and exclusively as a business area—such as a room where you meet clients—calculate what percentage this area takes up of your home. This percentage of your rent or mortgage is deductible as a business expense.</span></span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" style="font-weight: 400;"><span data-dcnode-id="364" instrument_node="">Note that the IRS requires you to use a home office for business only, not for personal use…ever. Even if you are deducting the corner of your dining room table as a home office, you have to be able to show you use this corner only for business.&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="361" instrument_node="">
</span><h2 data-dcnode-id="358"><span data-dcnode-id="359" style="font-weight: 400;"><span data-dcnode-id="360" instrument_node="">8. Insurance</span></span></h2><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" style="font-weight: 400;"><span data-dcnode-id="356" instrument_node="">With the exception of health insurance, almost all forms of business insurance costs are fully deductible, including flood insurance, business continuation insurance, and malpractice coverage.</span></span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" style="font-weight: 400;"><span data-dcnode-id="352" instrument_node="">You can deduct health coverage, but there are more regulations at play. Small businesses can actually receive a tax credit, which is better than a deduction, for up to half of the health insurance premiums paid for employees. If you are self-employed, your health insurance premiums are not business deductions. Instead, you have to take them as deductions on your personal taxes.</span></span></p><span data-dcnode-id="349" instrument_node="">
