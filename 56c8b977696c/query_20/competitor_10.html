</span><div class="in-page-navigation-navbar" data-dcnode-id="2428" style="display: none"><span data-dcnode-id="2429" instrument_node="">{"menuItems":[{"label":"What is the IRA deduction?","anchorName":"#what-is-the-ira-deduction"},{"label":"How much is the IRA deduction worth for tax year 2021?","anchorName":"#how-much-is-the-ira-deduction-worth-for-tax-year-2021"},{"label":"Who qualifies for the IRA deduction?","anchorName":"#who-qualifies-for-the-ira-deduction"},{"label":"How to calculate the IRA deduction","anchorName":"#how-to-calculate-the-ira-deduction"},{"label":"Related tax credits or deductions","anchorName":"#related-tax-credits-or-deductions"},{"label":"Compare tax filing services","anchorName":"#compare-tax-filing-services"},{"label":"Bottom line","anchorName":"#bottom-line"},{"label":"Frequently asked questions","anchorName":"#frequently-asked-questions"}]}</span></div><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">The IRS has a long list of rules surrounding who qualifies for the IRA deduction. If you’ve contributed to an IRA this year, read on to find out if you qualify.</span></p><h3 data-dcnode-id="2424" id="what-is-the-ira-deduction"><span data-dcnode-id="2425" instrument_node="">What is the IRA deduction?</span></h3><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">The IRA deduction reduces your taxable income dollar for dollar. Anyone can contribute to an IRA, but whether or not you can take the deduction depends on your modified adjusted gross income (AGI) and whether you or your spouse have an employer-sponsored retirement plan — such as a 401(k), 403(b) or pension.</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Generally, your deduction limit is lower if you have a higher income and greater access to an employer-sponsored plan.</span></p><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">If you qualify for the deduction, it will reduce your taxable income dollar for dollar. You can claim it using the standard or itemized deduction. The IRS doesn’t require you to choose one or the other as it does with most deductions.</span></p><h3 data-dcnode-id="2416" id="how-much-is-the-ira-deduction-worth-for-tax-year-2021"><span data-dcnode-id="2417" instrument_node="">How much is the IRA deduction worth for tax year 2021?</span></h3><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">You can find your deduction amount in the chart below for taxes due by April 18, 2022 (or April 19 for Maine and Masschusetts residents), the IRS’s extended deadline for filing individual 2021 tax returns:</span></p><p data-dcnode-id="2411"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">IRA deduction contribution limits for tax year 2021</span></strong></p><div class="has-padding-xsmall" data-dcnode-id="2410"></div><table class="luna-table luna-table--responsiveList luna-table--fixedColumns" data-dcnode-id="2285"><thead class="luna-table__header" data-dcnode-id="2402"><tr data-dcnode-id="2403"><th data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">If your filing status is…</span></th><th data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">And your modified AGI is…</span></th><th data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Then you can take…</span></th></tr></thead><tbody class="luna-table__body" data-dcnode-id="2286"><tr data-dcnode-id="2386"><td data-dcnode-id="2397" data-th="If your filing status is…"><div data-dcnode-id="2398"><strong data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Single, head of household, qualifying widow(er), married filing jointly or separately</span></strong><span data-dcnode-id="2399" instrument_node=""> and neither spouse is covered by a plan at work.</span></div></td><td data-dcnode-id="2392" data-th="And your modified AGI is…"><div data-dcnode-id="2393"><ul class="list-10" da 4"><li data-dcnode-id="2277"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Roth IRA contributions aren’t deductible.</span></strong><span data-dcnode-id="2278" instrument_node=""> You can’t deduct Roth IRA contributions because you receive a tax break later when you withdraw the funds tax-free.</span></li><li data-dcnode-id="2273"><strong data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">There are limits to employer plans.</span></strong><span data-dcnode-id="2274" instrument_node=""> If you or your spouse’s employer offers a retirement plan, your deductions may be limited.</span></li><li data-dcnode-id="2269"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Must have earned income.</span></strong><span data-dcnode-id="2270" instrument_node=""> You must have earned income this tax year to qualify for the IRA deduction. Rental or investment income doesn’t count.</span></li><li data-dcnode-id="2265"><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Married, filing separately.</span></strong><span data-dcnode-id="2266" instrument_node=""> If you file separately and you didn’t live with your spouse this year, you’re considered a single filer for the IRA deduction. If you lived with your spouse, and either of you have a workplace retirement plan, you don’t qualify for the full deduction.</span></li></ul><h4 data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">How much was IRA deduction worth in previous years?</span></h4><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">The chart below shows how much the IRA deduction was worth the past three years:</span></p><p data-dcnode-id="2257"><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">IRA deduction contribution limits 2020</span></strong></p><div class="has-padding-xsmall" data-dcnode-id="2256"></div><table class="luna-table luna-table--responsiveList luna ned income</span></li><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Your modified AGI falls within the limits listed in the chart above</span></li></ul><h3 data-dcnode-id="1886" id="how-to-calculate-the-ira-deduction"><span data-dcnode-id="1887" instrument_node="">How to calculate the IRA deduction</span></h3><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Follow these three steps to calculate your IRA deduction:</span></p><ol data-dcnode-id="1854"><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Find out how much you contributed to your IRA this tax year. Your IRA custodian should send you a statement for tax purposes. Or you can log in to your account to view the amount.</span></li><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Find out if you or your spouse were offered an employer-sponsored retirement plan this year.</span></li><li data-dcnode-id="1857"><span data-dcnode-id="1879" instrument_node="">Locate your AGI on Form 1040, line 8b. Calculate your modified AGI by adding back in certain deductions and accrued tax-exempt interest, such as:</span><div class="u-grid u-grid--gutterCollapse" data-dcnode-id="1858"><div class="u-grid__col u-1/2@s u-1/1" data-dcnode-id="1869"><ul class="list-10" data-dcnode-id="1870"><li data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Student loan interest</span></li><li data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Tuition expenses</span></li><li data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Self-employment tax</span></li><li data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">IRA contributions</span></li></ul></div><div class="u-grid__col u-1/2@s u-1/1" data-dcnode-id="1859"><ul class="list-10" data-dcnode-id="1860"><li data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Social Security payments</span></li><li data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Income from a US savings bond</span></li><li data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Rental losses</span></li><li data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Foreign housing deduction</span></li></ul></div></div></li><li data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Use the information in steps 1 to 3 to determine whether you qualify for the IRA deduction based on the income limits in the chart above.</span></li></ol><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">You’ll receive a statement from your IRA custodian stating how much you contributed to your IRA this tax year. From there, you’ll need to calculate your modified AGI to see if you qualify for a full or partial deduction.</span></p><h3 data-dcnode-id="1850" id="related-tax-credits-or-deductions"><span data-dcnode-id="1851" instrument_node="">Related tax credits or deductions</span></h3><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">If you contributed to a retirement plan this year, you may qualify for:</span></p><ul class="list-2" data-dcnode-id="1843"><li data-dcnode-id="1844"><strong data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Retirement saver’s credit</span></strong><span data-dcnode-id="1845" instrument_node="">. Qualifying taxpayers who contributed to an IRA or ABLE account may receive a credit worth up to $1,000 ($2,000 if married and filing jointly) depending on their filing status and AGI.</span></li></ul><h3 data-dcnode-id="1841" id="compare-tax-filing-services"><span data-dcnode-id="1842" instrument_node="">Compare tax filing services</span></h3><div class="u-grid u-grid--gutterCollapse" data-dcnode-id="1817"><div class="u-grid__col u-1/2" data-dcnode-id="1837"><small class="templateTable__counterContainer" data-dcnode-id="1838"><span data-dcnode-id="1839" id="js-current_product_count-b0f25ee2-cf3c-40e8 ><span data-dcnode-id="1420" instrument_node="">Clear selection</span></button></div></div><div class="compare-bar__content" data-dcnode-id="1410"><ul class="js-compare-bar__items" data-dcnode-id="1411"><li data-dcnode-id="1415"></li><li data-dcnode-id="1414"></li><li data-dcnode-id="1413"></li><li data-dcnode-id="1412"></li></ul></div><div class="compare-bar__action" data-dcnode-id="1406"><button class="btn btn-secondary compare-bar__compare-button t_table_comparebutton" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Compare</span></button></div></div></div></form></section></div><h3 data-dcnode-id="1399" id="bottom-line"><span data-dcnode-id="1400" instrument_node="">Bottom line</span></h3><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Simply because you qualify for IRA contributions doesn’t mean you qualify for the IRA deduction. Your eligibility hinges on your income and whether or not you or your spouse have a workplace retirement plan.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">The good news is, if you qualify, you don’t have to itemize your taxes to claim it. You can still take the standard deduction if that saves you the most money.</span></p><p data-dcnode-id="1390"><span data-dcnode-id="1394" instrument_node="">Figuring out which deductions you do and don’t qualify for can be a headache. Streamline the process by hiring a professional or </span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com/tax-returns"><span data-dcnode-id="1393" instrument_node="">shopping around for an online service</span></a><span data-dcnode-id="1391" instrument_node=""> that can help you file your return.</span></p><h3 data-dcnode-id="1388" id="frequently-asked-questions"><span data-dcnode-id="1389" instrument_node="">Frequently asked questions</span></h3><p data-dcnode-id="1383"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">How much can I contribute to an IRA?</span></strong><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">For 2021 and 2022, the maximum contribution limit for an IRA is $6,000 — or $7,000 if you’re at least 50.</span></p><p data-dcnode-id="1378"><strong data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Can I still contribute to an IRA if I don’t qualify for the deduction?</span></strong><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">Yes. With the exception of a Roth IRA which has income restrictions, anyone can contribute to an IRA regardless of income.</span></p><p data-dcnode-id="1373"><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">What if I contributed too much to my IRA?</span></strong><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">If you go over the $6,000 or $7,000 contribution limit, you’ll pay a 6% penalty fee for each year you leave the excess amount in your IRA.</span></p><span data-dcnode-id="1372" instrument_node="">
