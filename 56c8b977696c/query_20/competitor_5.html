</span><div class="hubspot-editable" data-dcnode-id="1372" data-hubspot-form-id="author_data" data-hubspot-name="Blog Author" id="hubspot-author_data"><span data-dcnode-id="1379" instrument_node="">
</span><div class="custom-date" data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">
                                    April 08, 2021
                                        By
                                        </span><a class="author-link" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/author/richard-poulson"><span data-dcnode-id="1377" instrument_node="">Richard Poulson</span></a><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span></div><span data-dcnode-id="1371" instrument_node="">
</span></div><span data-dcnode-id="1369" instrument_node="">
</span><div class="section post-body" data-dcnode-id="1140"><span data-dcnode-id="1368" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="1142" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">If you own a second home or are planning to buy one, you should know how owning more than one home will affect your taxes. The IRS has specific rules relating to owning a second home, including rules about tax credits and deductions and how and when to report the rental income. The rules vary depending on if the property qualifies as a rental property or is considered a personal residence.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1362" instrument_node="">At Cook Martin Poulson, we work with homeowners every day to ensure they understand their tax obligations as they relate to owning property. Continuing reading to learn what you need to know about owning or </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/tax-on-buying-or-selling-a-house"><span data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">buying a second home</span></span></a><span data-dcnode-id="1358" instrument_node="">.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><img alt="Second Home Tax Deductions Tax Tips for Homeowners" data-dcnode-id="1355" loading="lazy" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/hs-fs/hubfs/Second%2520Home%2520Tax%2520Deductions%2520Tax%2520Tips%2520for%2520Homeowners.jpg%3Fwidth%3D799%26name%3DSecond%2520Home%2520Tax%2520Deductions%2520Tax%2520Tips%2520for%2520Homeowners.jpg&amp;raw" srcset="https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=400&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 400w, https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=799&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 799w, https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=1199&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 1199w, https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=1598&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 1598w, https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=1998&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 1998w, https://blog.cookmartin.com/hs-fs/hubfs/Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg?width=2397&amp;name=Second%20Home%20Tax%20Deductions%20Tax%20Tips%20for%20Homeowners.jpg 2397w" style="width: 799px;" width="799"></p><span data-dcnode-id="1353" instrument_node="">
</span><h2 data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">What is Considered a Second Home for Tax Purposes?</span></h2><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1349" instrument_node="">The Internal Revenue Service allows for any home that is not your private residence to be considered a second home. The rules vary slightly depending on</span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/faqs/itemized-deductions-standard-deduction/real-estate-taxes-mortgage-interest-points-other-property-expenses/real-estate-taxes-mortgage-interest-points-other-property-expenses-5" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1348" instrument_node=""> how you use your second home</span></a><span data-dcnode-id="1346" instrument_node="">. For example, the deduction rules are different if you rent the property out for most of the year than they are if you don't rent it out at all.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Mortgage interest for a second home is deductible provided that it meets IRS requirements, which are the same as for your primary residence, and you use it for 14 days or 10% of the total time you rent it out, whichever is greater.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">The amount of the mortgage that is deductible depends upon when you bought your second home. If you bought it before December 15, 2017, you can deduct interest up to a mortgage value of $1 million or $500,000 if married and filing separately. For homes purchased after December 15, 2017, the limit is $750,000 or $375,000 if married and filing separately.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">If you rent out your second home for most of the year, you are required to report rental income on your tax return. You may also, in some circumstances, be required to pay the self-employed income tax if you provide extensive services to the people who rent from you. We go into detail about that requirement in a later section.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><h2 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Tax Deductions on a Second Home</span></h2><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">One of the most common questions we get from our clients at Cook Martin Poulson is about tax deductions. When you file your tax return, you are entitled to certain tax deductions on your second home. The deductions you take depends upon how you use the home and whether you rent it for all or part of the year.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><h3 data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Mortgage Interest Deduction</span></h3><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">The first tax deduction you may take for your second home is the mortgage interest deduction. As stated above, you qualify for the mortgage deduction if your second home meets the requirements, and you live in it for the greater of:</span></p><span data-dcnode-id="1323" instrument_node="">
</span><ul data-dcnode-id="1315"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">14 days; or</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">10% of the time you rent it out at the fair market value</span></li><span data-dcnode-id="1316" instrument_node="">
</span></ul><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">In other words, if you rent your second home out for 200 days a year, you would need to stay there for a minimum of 20 days to qualify for the deduction. If you don't rent it out at all, the requirement would be to stay there for a minimum of 14 days during the year.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">As previously stated, the maximum mortgage amount to qualify for a deduction is $1,000,000 for married couples whose homes were purchased before December 15, 2017. The amount drops to $500,000 for married couples filing separately.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">If you bought your home after December 15, 2017, then the maximum mortgage amount to qualify is $750,000 if married filing jointly and $375,000 if married and filing separately.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><h3 data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Real Estate Taxes</span></h3><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Homeowners have long been able to deduct property taxes on their federal tax returns. However, the rules changed with the Tax Cuts and Jobs Act of 2017 and the amount that is eligible for a deduction has been reduced.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">The TCJA cuts off the deduction for property taxes at $10,000 per return -- $5,000 per return if married and filing separately. Many people who own two homes will max out the property tax deduction from their first home. That means that the property taxes for your second home will not be deductible.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">It is important to note that some property taxes are not eligible for the deduction:</span></p><span data-dcnode-id="1293" instrument_node="">
</span><ul data-dcnode-id="1285"><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Taxes are charged for local benefits and improvements that increase the value of the real property (examples include assessments for parking lots, sewer mains, water mains, and sidewalks.)</span></li><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Itemized charges for service, even if they are paid to the taxing authority. Examples include water fees or residential services such as trash and recycling.</span></li><span data-dcnode-id="1286" instrument_node="">
</span></ul><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1283" instrument_node="">Working with an experienced </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cookmartin.com/industries/real-estate-construction/"><span data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">real estate tax accountant</span></span></a><span data-dcnode-id="1279" instrument_node=""> can help you determine which property taxes are deductible.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><h3 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Points</span></h3><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">If you paid points to reduce your mortgage interest rate on your first home, you may be wondering if you can do the same for your second. The short answer is yes, but some rules dictate how the points may be deducted.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">With a first home, the points can be deducted in the year you buy the home. If you paid $3,000 for points, you could deduct the entire amount in the tax year you bought the home.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">For a second home, the points payment may still be deducted, but IRS rules state that the deduction must be spread out over the life of the loan. That means if you paid $3,000 and took out a 30-year mortgage, you could deduct only $100 per year. If you took out a 20-year mortgage, the annual deduction would increase to $150 per year.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Qualifying Expenses</span></h3><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">If you rent out your property for part of the year, you may be able to deduct expenses related to the rental. The general rule is that if you rent out the home for fewer than 14 days per year, you are not required to report rental income, but you also may not deduct expenses related to the rental.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">We've already mentioned the requirements, but if you rent out your property and live in it less than 14 days or 10% of the days you rented it, whichever is higher, you may deduct qualifying expenses on your income tax return. Qualifying expenses include the following:</span></p><span data-dcnode-id="1256" instrument_node="">
</span><ul data-dcnode-id="1236"><span data-dcnode-id="1255" instrument_node="">
</span><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Mortgage interest (provided you meet the requirements listed above)</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Property taxes</span></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Insurance premiums</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Property management fees</span></li><span data-dcnode-id="1243" instrument_node="">
</span><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Utilities</span></li><span data-dcnode-id="1240" instrument_node="">
</span><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Depreciation of the property</span></li><span data-dcnode-id="1237" instrument_node="">
</span></ul><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Keep in mind that you may deduct expenses only for the time when the property was rented. If you rented it for 200 days and lived in it for 20 days, you must apportion the qualifying expenses you deduct between the rental time and your personal use of the property. Keeping meticulous records will minimize the risk of you making a mistake when you file your taxes.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><h2 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Tax Rules When Renting Out Your Second Home</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Owning a second home and renting it out to vacationers is a good source of </span></span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/passive-income-tax" rel="noopener" target="_blank"><span data-dcnode-id="1225" style="font-weight: normal;"><span data-dcnode-id="1226" instrument_node="">passive income</span></span></a><span data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node=""> and offset some of the expenses of homeownership. </span></span><span data-dcnode-id="1221" instrument_node="">However, you should know that with the addition of rental income, there is increased complexity when you file your taxes. Here are the rules you should know.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><ol data-dcnode-id="1208"><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">You are not required to report rental income if you rent your second home for 14 days or fewer in a calendar year. This option is in place so that if you want to rent your home during an annual event, you don't need to worry about paying taxes on that income.</span></li><span data-dcnode-id="1215" instrument_node="">
</span><li data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">If you rent your home for more than 14 days, you must report your rental income either as a landlord or as a self-employed person. The latter applies only if you provide what the IRS deems to be "significant services" to your tenants, including transportation, concierge service, cleaning, meals, entertainment, or tours.</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">If your second home operates primarily as a source of rental income, you may deduct qualified expenses as listed above, including property taxes, insurance premiums, and property management fees.</span></li><span data-dcnode-id="1209" instrument_node="">
</span></ol><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">It is important to note that if you spend time on your property making improvements, that time does not count as personal use of the property. That means if you plan to rent your second home for most of the year, you can stay there to make repairs and improvements without dipping into your personal use limit for rental deductions.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">If you plan to use your second home as a source of income, we strongly recommend using an experienced tax accountant to ensure you take advantage of all tax breaks that are available to you.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><h2 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Selling Your Second Home</span></h2><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1197" instrument_node="">Another common question we get from our clients at Cook Martin Poulson has to do with selling a second home. People understandably have concerns about things like </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/capital-gains-tax-utah"><span data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">capital gains tax</span></span></a><span data-dcnode-id="1193" instrument_node="">, which can significantly decrease your net profit from selling a home. Let's talk about what you need to know.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">The rules about selling a home differ depending on whether the home is considered a personal residence, a vacation home, or a rental property. If you are planning to sell your second home because the </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cookmartin.com/cost-segregation-real-estate" rel="noopener"><span data-dcnode-id="1189" instrument_node="">real estate</span></a><span data-dcnode-id="1187" instrument_node=""> market is good or you have made significant improvements, you should know how the sale will impact your taxes.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Under normal circumstances, selling a vacation home would require you to pay a capital gains tax on 100% of your profits. There are no tax breaks available for selling a vacation home or a rental property that generates income.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The alternative would be to use the vacation home as your primary residence before the sale. That would mean you would need to live there for two of the five years before the sale. If you do so, you will be eligible to deduct up to $250,000 in capital gains from your income. The number goes up to $500,000 if you are married and filing a joint tax return.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">There is another rule you need to know if you plan to sell your second home. You cannot have sold another home for which you took the capital gains tax exclusion in the two years immediately preceding the sale of the property in question. In other words, if you owned more than two homes and had already used the capital gains tax exclusion on one home, you would need to wait at least two years before selling another home and taking the capital gains tax exclusion.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The other potential way to minimize or eliminate the capital gains tax you pay is simple. It is known as the 1031 exclusion. If you take the money you earned from the sale of your vacation home and use it to buy a similar property, you are not required to pay capital gains tax. You must identify the replacement property within 45 days and buy it within 180 days.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">There are some conditions that you must meet to qualify for a 1031 exchange:</span></p><span data-dcnode-id="1170" instrument_node="">
</span><ul data-dcnode-id="1156"><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">You must have owned the property you are selling for at least two years.</span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In each of the two, 12-month periods preceding the sale, you must have rented the property for at least 14 days.</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Your personal use of the property may not have exceeded 14 days per year or 10% of the days the home was rented at fair market value, whichever is higher.</span></li><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The replacement property must meet the same conditions as the property you sold, meaning that you must hold it for at least two years after the 1031 exchange, rent it for at least 14 days per year, and not use it for more than 14 days per year or 10% of the days the house was rented at fair market value.</span></li><span data-dcnode-id="1157" instrument_node="">
</span></ul><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">As you can see, the rules are complicated and can be sometimes confusing. If not paying personal gains tax is a priority for you -- and it should be -- then you need to be mindful of how and when you use and sell the home to minimize your tax burden.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h2 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Maximize Your Tax Deductions with the Help from a Trusted Tax Pro</span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1148" instrument_node="">When you own a second home, the process of filing your taxes can be complex and confusing. To ensure that you maximize your tax deductions, the safest bet is to get help from a </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cookmartin.com/services/income-tax-services/"><span data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">trusted tax pro</span></span></a><span data-dcnode-id="1144" instrument_node=""> who has the knowledge and experience to assist you. Contact us today to learn how Cook Martin Poulson can help!</span></p></span><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
