</span><p data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">While perusing tax advice on the Internet, you’ll come across lists of </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/list-common-overlooked-personal-tax-deductions-individuals/"><span data-dcnode-id="1752" instrument_node="">tax deductions and tax credits</span></a><span data-dcnode-id="1750" instrument_node=""> that can help you reduce your tax bill. But do you know the difference between a tax deduction and a tax credit? They’re not the same. Deductions are good, but credits are better.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">Both deductions and credits lower your tax bill, but they work in different ways. Deductions reduce your taxable income, while credits lower your tax liability. For example, if you’re the 22% </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/calculate-federal-income-tax-brackets-rate-tables/"><span data-dcnode-id="1746" instrument_node="">tax bracket</span></a><span data-dcnode-id="1744" instrument_node=""> and you have a $100 deduction, that deduction will save you $22 in taxes (22% of $100). However, if you have a $100 tax credit, it will save you $100 in taxes. That’s what tax pros mean when they say tax credits are a dollar-for-dollar reduction in your tax liability.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Here’s a closer look at the differences between tax deductions and tax credits&nbsp;– and how they can help you save money on your taxes.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1731"><strong data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Pro tip</span></strong><span data-dcnode-id="1736" instrument_node="">: If you use tax preparation software from a company like </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/hr-block" rel="nofollow" target="_blank"><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">H&amp;R Block</span></strong></a><span data-dcnode-id="1732" instrument_node="">, they will calculate your tax liability appropriately based on the tax credits and tax deductions you’re allowed to claim.</span></p><div class="money-38abeec38ed942d6091a9bbb196d6118 money-content" data-dcnode-id="1723" id="money-38abeec38ed942d6091a9bbb196d6118"><div class="money-content" data-dcnode-id="1724" id="money-247179630"><div data-dcnode-id="1725" style="border:1px solid #CACACA; padding:20px; margin-bottom:20px;"><img data-dcnode-id="1730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2022/01/hrblock-logo-square.png&amp;raw" style="float:left; padding-right:10px;" width="60px"><span data-dcnode-id="1726" style="font-size:15px; line-height:160%;"><span data-dcnode-id="1729" instrument_node="">Start your tax return with H&amp;R Block. File online for as little as $0 and you could receive up to a $3,500 Refund Advance loan (0% interest and no credit check needed). </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/hr-block/incontent1" rel="nofollow" style="text-decoration:underline;" target="_blank"><span data-dcnode-id="1728" instrument_node="">File Your Taxes With H&amp;R Block</span></a></span></div></div></div><span data-dcnode-id="1722" instrument_node="">
</span><h2 data-dcnode-id="1720" id="tax-deductions"><span data-dcnode-id="1721" instrument_node="">Tax Deductions</span></h2><span data-dcnode-id="1719" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1716"><figure class="aligncenter" data-dcnode-id="1717"><img alt="Income Tax Deductions" class="wp-image-236383" data-dcnode-id="1718" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/01/income-tax-deductions-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2019/01/income-tax-deductions-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2019/01/income-tax-deductions-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2019/01/income-tax-deductions-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Simply stated, an income tax deduction reduces the amount of your income subject to your tax rate. There are two kinds of deductions:</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">1. Itemized Deductions</span></h3><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Itemized deductions are certain tax breaks you can use to lower your taxable income. Common itemized deductions include:</span></p><span data-dcnode-id="1706" instrument_node="">
</span><ul data-dcnode-id="1694"><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Medical expenses</span></li><li data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">State and local income taxes</span></li><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Property taxes</span></li><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Mortgage interest</span></li><li data-dcnode-id="1695"><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/charitable-contributions-tax-deductions/"><span data-dcnode-id="1697" instrument_node="">Charitable contributions</span></a></li></ul><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Homeowners and people who live in high-tax states love itemized deductions because they usually involve expenses they pay anyway, such as mortgage interest,&nbsp;property taxes, and state income taxes. The tax breaks are a great way to recover some of the money they’re already spending. However, not everyone benefits from taking advantage of these deductions.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1689" instrument_node="">To get a benefit from claiming itemized deductions, you have to use </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040sa.pdf" target="_blank"><span data-dcnode-id="1688" instrument_node="">Schedule A</span></a><span data-dcnode-id="1686" instrument_node=""> to list your deductions individually instead of taking the standard deduction. The standard deduction is a fixed dollar amount that varies according to your filing status. For 2020 returns, the standard deduction is:</span></p><span data-dcnode-id="1684" instrument_node="">
</span><ul data-dcnode-id="1677"><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">$12,400 for single or married filing separately</span></li><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">$24,800 for married filing jointly or qualifying widow(er)</span></li><li data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">$18,650 for head of household</span></li></ul><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">For taxpayers who are 65 or older or blind, the standard deduction increases by $1,650 for single filers and $1,300 for married taxpayers.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">You can claim the standard deduction or itemized deductions, whichever gives you a bigger tax benefit. Many taxpayers don’t have itemized deductions greater than their standard deduction, but that doesn’t mean they can’t take advantage of tax deductions at all.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h3 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">2. Above-the-Line Deductions</span></h3><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">There are a handful of tax deductions that people claiming the standard deduction can still use to lower their tax bills.&nbsp;These are referred to as “above-the-line” deductions because they reduce your adjusted gross income (AGI), whereas itemized deductions reduce your taxable income.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">AGI is a measure of your gross income for the tax year, minus certain deductions. AGI is an important number for many people because it influences a taxpayer’s eligibility to claim many other deductions and credits. For example, when you claim medical expenses as an itemized deduction, you only benefit if your medical expenses exceed 7.5% of your AGI for your 2020 taxes. So a taxpayer with an AGI of $40,000 and medical expenses of $4,000 could claim $1,000 as a deduction, or $4,000 in expenses minus the 7.5% limit (7.5% x $40,000 = $3,000).</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">On the other hand, a taxpayer with an AGI of $60,000 and $4,000 of medical expenses wouldn’t get any benefit from those medical expenses; they would need to have more than $4,500 ($60,000 x 7.5%) to get a deduction. That’s why above-the-line deductions are so valuable&nbsp;– they impact your ability to claim many tax breaks.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">Above-the-line&nbsp;deductions appear in the “Adjustments to Income” section of </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040s1.pdf" target="_blank"><span data-dcnode-id="1656" instrument_node="">Schedule 1</span></a><span data-dcnode-id="1654" instrument_node=""> attached to Form 1040. They include:</span></p><span data-dcnode-id="1652" instrument_node="">
</span><ul data-dcnode-id="1616"><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Educator expenses</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Certain business expenses of reservists, performing artists, and fee-based government officials</span></li><li data-dcnode-id="1644"><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/health-savings-account-hsa-rules/"><span data-dcnode-id="1647" instrument_node="">Health savings account (HSA)</span></a><span data-dcnode-id="1645" instrument_node=""> contributions</span></li><li data-dcnode-id="1640"><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/tax-deductible-job-relocation-moving-expenses/"><span data-dcnode-id="1643" instrument_node="">Moving expenses</span></a><span data-dcnode-id="1641" instrument_node=""> for members of the armed forces</span></li><li data-dcnode-id="1636"><span data-dcnode-id="1639" instrument_node="">The deductible portion of </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/do-you-understand-self-employment-tax/"><span data-dcnode-id="1638" instrument_node="">self-employment taxes</span></a></li><li data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">Contributions to self-employed </span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/what-is-a-sep-ira-account-retirement-plan-rules-contribution-limits/"><span data-dcnode-id="1634" instrument_node="">SEP IRA</span></a><span data-dcnode-id="1632" instrument_node="">, SIMPLE IRA, and other qualified plans</span></li><li data-dcnode-id="1627"><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/self-employed-health-insurance-options/"><span data-dcnode-id="1630" instrument_node="">Self-employed health insurance</span></a><span data-dcnode-id="1628" instrument_node=""> premiums</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Penalties on early savings withdrawals</span></li><li data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Alimony payments (if made under a divorce or separation agreement executed on or before December 31, 2018)</span></li><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Deductible contributions to IRAs</span></li><li data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Student loan interest</span></li><li data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Deductible tuition and fees</span></li></ul><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Above-the-line deductions may not be as valuable as tax credits, but you can still benefit from them. By lowering your AGI, these deductions may enable you to claim other tax breaks based on income limits.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><h2 data-dcnode-id="1610" id="tax-credits"><span data-dcnode-id="1611" instrument_node="">Tax Credits</span></h2><span data-dcnode-id="1609" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1606"><figure class="aligncenter" data-dcnode-id="1607"><img alt="Available Tax Credits" class="wp-image-236370" data-dcnode-id="1608" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/01/available-tax-credits-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2019/01/available-tax-credits-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2019/01/available-tax-credits-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2019/01/available-tax-credits-90x51.jpg 90w" width="810"></figure></div><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">While tax deductions lower your taxable income, tax credits are a direct reduction of your tax due. After you figure out your AGI, apply either the standard deduction or itemized deductions, and calculate your tax due, you may be able to reduce that amount&nbsp;– sometimes significantly&nbsp;– by taking advantage of available tax credits.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">The major tax credits usually get plenty of press, so you’ve probably heard of some of them:</span></p><span data-dcnode-id="1599" instrument_node="">
</span><ul data-dcnode-id="1534"><li data-dcnode-id="1592"><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Earned Income Tax Credit (EITC)</span></strong><span data-dcnode-id="1596" instrument_node="">.&nbsp;The </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/earned-income-tax-credit-eitc-requirements/"><span data-dcnode-id="1595" instrument_node="">Earned Income Tax Credit</span></a><span data-dcnode-id="1593" instrument_node=""> is designed for families with low or moderate incomes. For the 2020 tax year, it’s worth between $538 and $6,660, depending on how many children you have, your marital status, and how much you make.</span></li><li data-dcnode-id="1585"><strong data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Child Tax Credit</span></strong><span data-dcnode-id="1589" instrument_node="">.&nbsp;The </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/parents-tax-deductions-credits-children/"><span data-dcnode-id="1588" instrument_node="">Child Tax Credit</span></a><span data-dcnode-id="1586" instrument_node=""> is worth up to $2,000 per child and up to $500 per non-child dependent. This credit is phased out for higher-income taxpayers.</span></li><li data-dcnode-id="1578"><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Child and Dependent Care Credit</span></strong><span data-dcnode-id="1582" instrument_node="">.&nbsp;The </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/child-dependent-care-tax-credit-deductions-child-care-expenses/"><span data-dcnode-id="1581" instrument_node="">Child and Dependent Care Credit</span></a><span data-dcnode-id="1579" instrument_node=""> is designed to offset the cost of care for children or other dependents so that you can work. It’s worth between 20% and 30% of up to $3,000 of costs for one child and $6,000 of costs for two or more children.</span></li><li data-dcnode-id="1571"><strong data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">American Opportunity Tax Credit</span></strong><span data-dcnode-id="1575" instrument_node="">.&nbsp;The </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/education-tax-deductions-credits-college/"><span data-dcnode-id="1574" instrument_node="">American Opportunity Tax Credit</span></a><span data-dcnode-id="1572" instrument_node=""> is worth up to $2,500 per student. This credit is for tuition, activity fees, books, supplies, and equipment during the first few years of undergraduate education. The student must be enrolled at least half-time to qualify for the credit.</span></li><li data-dcnode-id="1564"><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Lifetime Learning Credit</span></strong><span data-dcnode-id="1568" instrument_node="">. The </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/education-tax-deductions-credits-college/"><span data-dcnode-id="1567" instrument_node="">Lifetime Learning Credit</span></a><span data-dcnode-id="1565" instrument_node=""> is worth up to $2,000 per return for qualified tuition and related expenses. It can be used for undergraduate, graduate, and professional degree courses.</span></li><li data-dcnode-id="1560"><strong data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Adoption Credit</span></strong><span data-dcnode-id="1561" instrument_node="">. This credit covers up to $14,300 in adoption costs per child. If the credit exceeds the amount of tax owed, you can carry the unused portion of the credit forward for up to five years.</span></li><li data-dcnode-id="1553"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Saver’s Credit</span></strong><span data-dcnode-id="1557" instrument_node="">. The </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/retirement-savings-contribution-credit/"><span data-dcnode-id="1556" instrument_node="">Saver’s Credit</span></a><span data-dcnode-id="1554" instrument_node=""> is designed to help low- to moderate-income taxpayers save for retirement in an IRA or employer-sponsored retirement plan. It’s worth up to $2,000 for single taxpayers or $4,000 for married couples.</span></li><li data-dcnode-id="1546"><strong data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Residential Energy Tax Credit</span></strong><span data-dcnode-id="1550" instrument_node="">.&nbsp;The </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/federal-green-energy-efficiency-tax-credits-home-improvement/"><span data-dcnode-id="1549" instrument_node="">Residential Energy Tax Credit</span></a><span data-dcnode-id="1547" instrument_node=""> is worth up to 30% of the cost of alternative energy systems installed on or in your home, including a solar water heater, solar electric equipment, wind turbines, and fuel cell property.</span></li><li data-dcnode-id="1539"><strong data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Plug-In Electric-Drive Motor Vehicle Credit</span></strong><span data-dcnode-id="1543" instrument_node="">. This credit is worth up to $7,500 for buying </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fueleconomy.gov/feg/taxevb.shtml" target="_blank"><span data-dcnode-id="1542" instrument_node="">certain plug-in electric vehicles</span></a><span data-dcnode-id="1540" instrument_node="">. The car must have at least four wheels and a rechargeable battery with a capacity of at least 4 kilowatt hours. To qualify, you must buy the car new; used cars aren’t eligible.</span></li><li data-dcnode-id="1535"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Foreign Tax Credit</span></strong><span data-dcnode-id="1536" instrument_node="">. This credit is available for taxpayers who work in a foreign country or have investment income from a foreign source. It provides a credit for foreign taxes paid or owed to a foreign country or U.S. possession if you’re subject to U.S. tax on the same income.</span></li></ul><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Some credits are refundable, and others are non-refundable.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><h3 data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Refundable Tax Credits</span></h3><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Refundable tax credits are particularly valuable because you can benefit from them even if you have no tax liability and haven’t had any tax withheld. There are several credits in this category, including the EITC, the American Opportunity Tax Credit, and a portion of the Child Tax Credit.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">For example, say your tax liability is $1,000, and your calculated EITC is $2,500. One thousand dollars of the EITC would reduce your tax liability to zero, and you would be refunded the $1,500 balance.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><h3 data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Non-Refundable Tax Credits</span></h3><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Non-refundable tax credits can also make a big difference in your tax liability. However, while they can reduce the amount you owe to zero, the credit cannot exceed the amount of tax you owe. In other words, non-refundable credits will never generate a refund over and above the amount you paid in via withholding or estimated payments for the year.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Non-refundable credits include:</span></p><span data-dcnode-id="1512" instrument_node="">
</span><ul data-dcnode-id="1497"><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Child and Dependent Care Credit</span></li><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Lifetime Learning Credit</span></li><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Adoption Credit</span></li><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Saver’s Credit</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Residential Energy Tax Credit</span></li><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Plug-In Electric-Drive Motor Vehicle Credit</span></li><li data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Foreign Tax Credit</span></li></ul><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1495" instrument_node="">Many credits have complex rules, income limits, and exceptions. Your </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/types-financial-advisors-need-hire/"><span data-dcnode-id="1494" instrument_node="">tax adviser</span></a><span data-dcnode-id="1492" instrument_node=""> can help you sift through the available credits and find any that apply to you.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><h2 data-dcnode-id="1488" id="final-word"><span data-dcnode-id="1489" instrument_node="">Final Word</span></h2><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1486" instrument_node="">Navigating the limitations, rules, and exceptions that apply to these tax deductions and tax credits can be challenging. Using&nbsp;</span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/taxact-vs-turbotax-vs-hr-block-best-tax-prep-software/"><span data-dcnode-id="1485" instrument_node="">online tax preparation software</span></a><span data-dcnode-id="1483" instrument_node=""> from </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/hr-block" rel="nofollow" target="_blank"><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">H&amp;R Block</span></strong></a><span data-dcnode-id="1479" instrument_node=""> can make the job much easier.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Whether you prepare your return yourself or hire a tax pro, take some time to look into which of these tax breaks apply to your situation. Taking advantage of one or more of them can make a big impact on the amount of tax you owe or the refund you’ll get.</span></p><span data-dcnode-id="1474" instrument_node="">
