</span><a class="mntl-author-tooltip__learn-more-link" data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/investopedia-financial-review-board-5076269"><span data-dcnode-id="2715" instrument_node="">Financial Review Board</span></a><span data-dcnode-id="2713" instrument_node="">

</span><div class="comp article-body-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1913" data-sc-ad-label-height="0" data-sc-ad-track-spacing="90" data-sc-breakpoint="50em" data-sc-content-positions="[300, 1, 1, 1250, 1, 1, 1, 1]" data-sc-load-immediate="3" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="80" id="mntl-sc-page_1-0"><span data-dcnode-id="2692" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2690" id="mntl-sc-block_1-0"><span data-dcnode-id="2691" instrument_node="">
Do you own real estate that you rent out? Besides the potential for regular income and capital growth, real estate investments offer deductions that can reduce the income tax on your profits.
</span></p><span data-dcnode-id="2689" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2688" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="2687" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2685" id="mntl-sc-block_1-0-2"><span data-dcnode-id="2686" instrument_node="">
But first, consider what kind of real estate investor you are. Are you a passive investor or a real estate professional? Your classification as one or the other determines how your income and losses are treated.
</span></p><span data-dcnode-id="2684" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2683" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="2682" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2659" id="mntl-sc-block_1-0-4"><span data-dcnode-id="2681" instrument_node="">
</span><div class="comp theme-whatyouneedtoknow mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="2661" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-5"><span data-dcnode-id="2680" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2678" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="2679" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="2677" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2663" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="2676" instrument_node="">
</span><ul data-dcnode-id="2664"><li data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Rental property owners can deduct the costs of owning, maintaining, and operating the property.</span></li><li data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">Most residential rental property is depreciated at a rate of 3.636% per year for 27.5 years—what the IRS considers the property's "useful life."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2670" data-id="#citation-6"><span data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">1</span></span></span></li><li data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Only the value of the buildings can be depreciated. You can't depreciate the land since it never gets "used up."</span></li><li data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">The tax treatment of income and losses depends on your level of involvement in the rental property.</span></li></ul></div><span data-dcnode-id="2662" instrument_node="">
</span></div><span data-dcnode-id="2660" instrument_node="">
</span></div><span data-dcnode-id="2658" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2657" id="toc-tax-treatment-of-income-and-losses"></span><span data-dcnode-id="2656" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2651" id="mntl-sc-block_1-0-6"><span data-dcnode-id="2655" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node=""> Tax Treatment of Income and Losses </span></span><span data-dcnode-id="2652" instrument_node=""> </span></h2><span data-dcnode-id="2650" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2644" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2649" instrument_node="">
Real estate is generally considered a passive activity. However, your level of participation determines the tax treatment of the income and losses the property generates.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2646" data-id="#citation-28"><span data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">2</span></span></span><span data-dcnode-id="2645" instrument_node="">
</span></p><span data-dcnode-id="2643" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2642" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="2641" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2636" id="mntl-sc-block_1-0-9"><span data-dcnode-id="2640" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node=""> Real estate professionals </span></span><span data-dcnode-id="2637" instrument_node=""> </span></h3><span data-dcnode-id="2635" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2629" id="mntl-sc-block_1-0-10"><span data-dcnode-id="2634" instrument_node="">
The Internal Revenue Service (IRS) defines a real estate professional as someone who spends more than half of their working hours in the rental business. This may include property development, construction, acquisition, and management. You must also devote more than 750 hours per year to working on your real estate rental properties to qualify as a professional.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2631" data-id="#citation-16"><span data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">3</span></span></span><span data-dcnode-id="2630" instrument_node="">
</span></p><span data-dcnode-id="2628" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2620" id="mntl-sc-block_1-0-11"><div class="comp native mntl-native" data-dcnode-id="2621" data-right-rail-index="3" id="native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="2627" instrument_node="">
</span><div class="comp mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic is-requested" data-dcnode-id="2623" id="mntl-native__adunit_1-0"><span data-dcnode-id="2626" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2625" data-pos="native" data-priority="4" data-rtb="false" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="2624" instrument_node="">
</span></div><span data-dcnode-id="2622" instrument_node="">
</span></div></div><span data-dcnode-id="2619" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2607" id="mntl-sc-block_1-0-12"><span data-dcnode-id="2618" instrument_node="">
Activities of real estate professionals are not treated as passive activities. Instead, the income you generate is characterized as active income (i.e., non-passive income). As such, you can use losses to offset other income (e.g., wages, salaries, interest, and dividends)—and avoid the 3.8% </span><a data-component="link" data-dcnode-id="2616" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/netinvestmentincome.asp"><span data-dcnode-id="2617" instrument_node="">net investment</span></a><span data-dcnode-id="2615" instrument_node=""> tax if the rental generates income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2612" data-id="#citation-16"><span data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">3</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2609" data-id="#citation-18"><span data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">4</span></span></span><span data-dcnode-id="2608" instrument_node="">
</span></p><span data-dcnode-id="2606" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2605" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="2604" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2599" id="mntl-sc-block_1-0-14"><span data-dcnode-id="2603" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node=""> Material participation </span></span><span data-dcnode-id="2600" instrument_node=""> </span></h3><span data-dcnode-id="2598" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2592" id="mntl-sc-block_1-0-15"><span data-dcnode-id="2597" instrument_node="">
If you materially participated as a real estate professional, your rental property involvement will receive non-passive tax treatment. You can use any losses to offset other types of income, and you won't be subject to the net investment tax.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2594" data-id="#citation-16"><span data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">3</span></span></span><span data-dcnode-id="2593" instrument_node="">
</span></p><span data-dcnode-id="2591" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2590" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="2589" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2587" id="mntl-sc-block_1-0-17"><span data-dcnode-id="2588" instrument_node="">
According to the IRS, you materially participated in an activity if you satisfy any of the following tests:
</span></p><span data-dcnode-id="2586" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2585" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="2584" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2563" id="mntl-sc-block_1-0-19"><span data-dcnode-id="2583" instrument_node="">
</span><li data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">You participated in the activity for more than 500 hours during the year.</span></li><li data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">You do all (or nearly all) of the work in the activity.</span></li><li data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">You work 100+ hours in the activity during the year and work at least as much as anyone else.</span></li><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">The activity is a significant participation activity (SPA) and you participated for at least 500 hours in SPAs.</span></li><li data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">You materially participated in the activity for any five of the previous 10 years (whether consecutive or not).</span></li><li data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">The activity is a personal service activity, and you materially participated for any three preceding tax years.</span></li><li data-dcnode-id="2565"><span data-dcnode-id="2570" instrument_node="">Based on all the facts and circumstances, you participated in the activity on a "regular, continuous, and substantial basis" during the year.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2567" data-id="#citation-16"><span data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">3</span></span></span><br data-dcnode-id="2566"></li><span data-dcnode-id="2564" instrument_node="">
</span></ul><span data-dcnode-id="2562" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2561" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="2560" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2555" id="mntl-sc-block_1-0-21"><span data-dcnode-id="2559" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node=""> Active participation </span></span><span data-dcnode-id="2556" instrument_node=""> </span></h3><span data-dcnode-id="2554" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2548" id="mntl-sc-block_1-0-22"><span data-dcnode-id="2553" instrument_node="">
Active participation is a lower standard of involvement than material participation. The IRS treats you as actively participating if you "make management decisions in a significant and bona fide sense."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2550" data-id="#citation-16"><span data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">3</span></span></span><span data-dcnode-id="2549" instrument_node=""> Management decisions that count as active participation include things like:
</span></p><span data-dcnode-id="2547" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2546" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="2545" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2536" id="mntl-sc-block_1-0-24"><span data-dcnode-id="2544" instrument_node="">
</span><li data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Approving new tenants</span></li><li data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Determining rental terms</span></li><li data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Approving expenditures</span></li><span data-dcnode-id="2537" instrument_node="">
</span></ul><span data-dcnode-id="2535" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2534" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="2533" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2524" id="mntl-sc-block_1-0-26"><span data-dcnode-id="2532" instrument_node="">
If you actively participate by making management decisions—and have at least a 10% interest in the investment—you might be able to deduct some of your passive losses.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2529" data-id="#citation-17"><span data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">5</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2526" data-id="#citation-16"><span data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">3</span></span></span><span data-dcnode-id="2525" instrument_node="">
</span></p><span data-dcnode-id="2523" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2522" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="2521" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2509" id="mntl-sc-block_1-0-28"><span data-dcnode-id="2520" instrument_node="">
This level of participation allows a special passive loss rule. In general, you can deduct up to $25,000 of passive losses if your </span><a data-component="link" data-dcnode-id="2518" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/magi.asp"><span data-dcnode-id="2519" instrument_node="">modified adjusted gross income (MAGI)</span></a><span data-dcnode-id="2517" instrument_node=""> is $100,000 or less. The deduction phases out if your&nbsp;MAGI is between $100,000 and $150,000. Once your MAGI exceeds $150,000, you can't take any passive losses. Losses of more than $25,000 can be carried over to the following year.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2514" data-id="#citation-17"><span data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">5</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2511" data-id="#citation-16"><span data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">3</span></span></span><span data-dcnode-id="2510" instrument_node="">
</span></p><span data-dcnode-id="2508" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2507" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="2506" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2501" id="mntl-sc-block_1-0-30"><span data-dcnode-id="2505" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node=""> Passive activity </span></span><span data-dcnode-id="2502" instrument_node=""> </span></h3><span data-dcnode-id="2500" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2493" id="mntl-sc-block_1-0-31"><span data-dcnode-id="2499" instrument_node="">
On the other hand, if your rental property is a sideline investment—and you don't materially participate in the investment—it's considered a passive activity. In this case, any passive activity losses can be used only to offset passive activity income. In other words, you can't use any losses from the rental property to shelter other taxable income. Instead, the losses are carried forward until you generate passive income or sell the investment.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2496" data-id="#citation-16"><span data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">3</span></span></span><br data-dcnode-id="2495"><span data-dcnode-id="2494" instrument_node="">
</span></p><span data-dcnode-id="2492" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2491" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="2490" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2489" id="toc-rental-property-income-sources"></span><span data-dcnode-id="2488" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2483" id="mntl-sc-block_1-0-33"><span data-dcnode-id="2487" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node=""> Rental Property Income Sources </span></span><span data-dcnode-id="2484" instrument_node=""> </span></h2><span data-dcnode-id="2482" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2476" id="mntl-sc-block_1-0-34"><span data-dcnode-id="2481" instrument_node="">
If you own rental property, you have to report all of the rental income you receive—but keep in mind that includes more than just those monthly rent checks.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2478" data-id="#citation-19"><span data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">6</span></span></span><span data-dcnode-id="2477" instrument_node="">
</span></p><span data-dcnode-id="2475" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2474" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="2473" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2468" id="mntl-sc-block_1-0-36"><span data-dcnode-id="2472" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node=""> Rent </span></span><span data-dcnode-id="2469" instrument_node=""> </span></h3><span data-dcnode-id="2467" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2458" id="mntl-sc-block_1-0-37"><span data-dcnode-id="2466" instrument_node="">
The money you receive for rent is generally considered taxable in the year you receive it, not when it was due or earned. This means any </span><a data-component="link" data-dcnode-id="2464" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/a/advance-payment.asp"><span data-dcnode-id="2465" instrument_node="">advance payments</span></a><span data-dcnode-id="2463" instrument_node=""> must also be treated as income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2460" data-id="#citation-4"><span data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">7</span></span></span><span data-dcnode-id="2459" instrument_node="">
</span></p><span data-dcnode-id="2457" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2456" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="2455" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2447" id="mntl-sc-block_1-0-39"><span data-dcnode-id="2454" instrument_node="">
For example, suppose you rent out a house for $1,000 per month, and you require new </span><a data-component="link" data-dcnode-id="2452" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/lessee.asp"><span data-dcnode-id="2453" instrument_node="">tenants</span></a><span data-dcnode-id="2451" instrument_node=""> to pay the first and last months’ rent when they sign a </span><a data-component="link" data-dcnode-id="2449" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/lease.asp"><span data-dcnode-id="2450" instrument_node="">lease</span></a><span data-dcnode-id="2448" instrument_node="">. In this case, you’ll have to declare the $2,000 you received as income, even though $1,000 of that $2,000 covers a period that might be several years in the future.
</span></p><span data-dcnode-id="2446" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2445" id="mntl-sc-block_1-0-40"></div><span data-dcnode-id="2444" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2439" id="mntl-sc-block_1-0-41"><span data-dcnode-id="2443" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node=""> Tenant-paid expenses </span></span><span data-dcnode-id="2440" instrument_node=""> </span></h3><span data-dcnode-id="2438" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2432" id="mntl-sc-block_1-0-42"><span data-dcnode-id="2437" instrument_node="">
Expenses your tenants pay count as rental income if the expense is for something they're not obligated to pay. For example, suppose your tenant pays the water bill and deducts it from their regular rent payment. In that case, you must include the amount in your rental income. Depending on the expense, you may then deduct the amount as a rental expense.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2434" data-id="#citation-4"><span data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">7</span></span></span><span data-dcnode-id="2433" instrument_node="">
</span></p><span data-dcnode-id="2431" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2430" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="2429" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2424" id="mntl-sc-block_1-0-44"><span data-dcnode-id="2428" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node=""> Trade for services </span></span><span data-dcnode-id="2425" instrument_node=""> </span></h3><span data-dcnode-id="2423" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2414" id="mntl-sc-block_1-0-45"><span data-dcnode-id="2422" instrument_node="">
If your tenant offers to trade services in exchange for rent, you must include the </span><a data-component="link" data-dcnode-id="2420" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/fairmarketvalue.asp"><span data-dcnode-id="2421" instrument_node="">fair market value</span></a><span data-dcnode-id="2419" instrument_node=""> of the services as income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2416" data-id="#citation-4"><span data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">7</span></span></span><span data-dcnode-id="2415" instrument_node=""> For example, if your tenant paints the rental house in exchange for one month’s rent (valued at $1,000), you must include the $1,000 as income even though you didn’t receive the cash. However, you will be able to deduct the $1,000 as an expense.
</span></p><span data-dcnode-id="2413" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2412" id="mntl-sc-block_1-0-46"></div><span data-dcnode-id="2411" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2406" id="mntl-sc-block_1-0-47"><span data-dcnode-id="2410" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node=""> Security deposits </span></span><span data-dcnode-id="2407" instrument_node=""> </span></h3><span data-dcnode-id="2405" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2396" id="mntl-sc-block_1-0-48"><span data-dcnode-id="2404" instrument_node="">
</span><a data-component="link" data-dcnode-id="2402" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/deposit.asp"><span data-dcnode-id="2403" instrument_node="">Security deposits</span></a><span data-dcnode-id="2401" instrument_node=""> are not taxable when you receive them if the intent is to return the money to the tenant at the end of the lease. But what if your tenant does not live up to the lease terms? For example, suppose you collect a $500 security deposit and your tenant moves out and leaves holes in the walls that cost $500 to repair. You must include the $500 as income for that year (but you can also deduct the repair costs).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2398" data-id="#citation-4"><span data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">7</span></span></span><span data-dcnode-id="2397" instrument_node="">
</span></p><span data-dcnode-id="2395" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2394" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="2393" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2387" id="mntl-sc-block_1-0-50"><span data-dcnode-id="2392" instrument_node="">
Note that a security deposit used as a final rent payment is considered advance rent. Hence, you include it as income the year you receive it.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2389" data-id="#citation-4"><span data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">7</span></span></span><span data-dcnode-id="2388" instrument_node="">
</span></p><span data-dcnode-id="2386" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2385" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="2384" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2383" id="toc-rental-property-tax-deductions"></span><span data-dcnode-id="2382" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2377" id="mntl-sc-block_1-0-52"><span data-dcnode-id="2381" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node=""> Rental Property Tax Deductions </span></span><span data-dcnode-id="2378" instrument_node=""> </span></h2><span data-dcnode-id="2376" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2374" id="mntl-sc-block_1-0-53"><span data-dcnode-id="2375" instrument_node="">
As a rental property owner, you can deduct various expenses related to buying, operating, and maintaining the property. Here's a rundown of the most common deductions.
</span></p><span data-dcnode-id="2373" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2372" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="2371" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2366" id="mntl-sc-block_1-0-55"><span data-dcnode-id="2370" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node=""> Mortgage interest deduction </span></span><span data-dcnode-id="2367" instrument_node=""> </span></h3><span data-dcnode-id="2365" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2356" id="mntl-sc-block_1-0-56"><span data-dcnode-id="2364" instrument_node="">
Expenses to obtain a </span><a data-component="link" data-dcnode-id="2362" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/mortgage.asp"><span data-dcnode-id="2363" instrument_node="">mortgage</span></a><span data-dcnode-id="2361" instrument_node="">—such as commissions and appraisal fees—are not deductible when you pay them. Instead, these costs are added to your basis in the property.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2358" data-id="#citation-6"><span data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">1</span></span></span><span data-dcnode-id="2357" instrument_node="">
</span></p><span data-dcnode-id="2355" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2354" id="mntl-sc-block_1-0-57"></div><span data-dcnode-id="2353" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2347" id="mntl-sc-block_1-0-58"><span data-dcnode-id="2352" instrument_node="">
Still, you can deduct interest on up to $750,000 ($1 million if you took out the mortgage before Dec. 16, 2017) of secured mortgage debt on your first or second home. For investment properties, you can deduct mortgage interest as a business expense.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2349" data-id="#citation-20"><span data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">8</span></span></span><span data-dcnode-id="2348" instrument_node="">
</span></p><span data-dcnode-id="2346" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2345" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="2344" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2329" id="mntl-sc-block_1-0-60"><span data-dcnode-id="2343" instrument_node="">
Your </span><a data-component="link" data-dcnode-id="2341" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/mortgage-company.asp"><span data-dcnode-id="2342" instrument_node="">mortgage company</span></a><span data-dcnode-id="2340" instrument_node=""> will send you an IRS </span><a data-component="link" data-dcnode-id="2338" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/form_1098.asp"><span data-dcnode-id="2339" instrument_node="">Form 1098</span></a><span data-dcnode-id="2337" instrument_node=""> each year showing how much you’ve paid in interest throughout the year. If part of your payment includes money that goes into an </span><a data-component="link" data-dcnode-id="2335" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/escrow.asp"><span data-dcnode-id="2336" instrument_node="">escrow</span></a><span data-dcnode-id="2334" instrument_node=""> account to cover taxes and insurance, your mortgage company should report that to you as well.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2331" data-id="#citation-7"><span data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">9</span></span></span><span data-dcnode-id="2330" instrument_node="">
</span></p><span data-dcnode-id="2328" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2327" id="mntl-sc-block_1-0-61"></div><span data-dcnode-id="2326" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2310" id="mntl-sc-block_1-0-62"><span data-dcnode-id="2325" instrument_node="">
While home mortgage interest is reported on&nbsp;</span><a data-component="link" data-dcnode-id="2323" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/schedulea.asp"><span data-dcnode-id="2324" instrument_node="">Schedule A&nbsp;</span></a><span data-dcnode-id="2322" instrument_node="">of the 1040 or 1040-SR tax form,</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2319" data-id="#citation-20"><span data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">8</span></span></span><span data-dcnode-id="2318" instrument_node=""> rental property mortgage interest is reported on Schedule E.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2315" data-id="#citation-30"><span data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">10</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2312" data-id="#citation-21"><span data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">11</span></span></span><span data-dcnode-id="2311" instrument_node="">
</span></p><span data-dcnode-id="2309" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2308" id="mntl-sc-block_1-0-63"></div><span data-dcnode-id="2307" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2285" id="mntl-sc-block_1-0-64"><span data-dcnode-id="2306" instrument_node="">
</span><div class="comp theme-important mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="2287" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-65"><span data-dcnode-id="2305" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2304" id="mntl-sc-block-callout-heading_1-0-1"></h3><span data-dcnode-id="2303" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2289" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2301" instrument_node="">The </span><a data-component="link" data-dcnode-id="2299" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/taxes/trumps-tax-reform-plan-explained/"><span data-dcnode-id="2300" instrument_node="">Tax Cuts and Jobs Act (TCJA)</span></a><span data-dcnode-id="2298" instrument_node="">, passed in 2017, reduced the maximum mortgage principal eligible for the deductible interest to $750,000 (from $1 million) for new loans.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2295" data-id="#citation-20"><span data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">8</span></span></span><span data-dcnode-id="2294" instrument_node=""> The TCJA also nearly doubled the standard deduction, making it unnecessary for many taxpayers to itemize.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2291" data-id="#citation-22"><span data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">12</span></span></span></p></div><span data-dcnode-id="2288" instrument_node="">
</span></div><span data-dcnode-id="2286" instrument_node="">
</span></div><span data-dcnode-id="2284" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2279" id="mntl-sc-block_1-0-66"><span data-dcnode-id="2283" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node=""> Rental property depreciation </span></span><span data-dcnode-id="2280" instrument_node=""> </span></h3><span data-dcnode-id="2278" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2270" id="mntl-sc-block_1-0-67"><span data-dcnode-id="2277" instrument_node="">
Another key tax deduction is the allowance for </span><a data-component="link" data-dcnode-id="2275" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/investing/060815/how-rental-property-depreciation-works.asp"><span data-dcnode-id="2276" instrument_node="">depreciation</span></a><span data-dcnode-id="2274" instrument_node="">. Rather than taking one large deduction when you buy (or improve) a property, depreciation lets you deduct the costs over the property's </span><a data-component="link" data-dcnode-id="2272" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/u/usefullife.asp"><span data-dcnode-id="2273" instrument_node="">useful life</span></a><span data-dcnode-id="2271" instrument_node="">. The IRS lets you depreciate a rental property if it meets these requirements:
</span></p><span data-dcnode-id="2269" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2268" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="2267" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2251" id="mntl-sc-block_1-0-69"><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">You own the property.</span></li><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">You use the property in your business or income-producing activity.</span></li><li data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">The property has a determinable useful life—meaning it's something that wears out, decays, gets used up, becomes obsolete, or loses its value from natural causes.</span></li><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">You expect the property to last for more than one year.</span></li><li data-dcnode-id="2253"><span data-dcnode-id="2257" instrument_node="">The property was not placed in service and later disposed of (or no longer used for business) during the same year.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2254" data-id="#citation-23"><span data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">13</span></span></span></li><span data-dcnode-id="2252" instrument_node="">
</span></ul><span data-dcnode-id="2250" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2249" id="mntl-sc-block_1-0-70"></div><span data-dcnode-id="2248" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2236" id="mntl-sc-block_1-0-71"><span data-dcnode-id="2247" instrument_node="">
</span><div class="comp theme-warning mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="2238" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-72"><span data-dcnode-id="2246" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2245" id="mntl-sc-block-callout-heading_1-0-2"></h3><span data-dcnode-id="2244" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2240" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Land is not depreciable since it never gets used up. Likewise, you generally can't depreciate the costs of clearing, planting, and landscaping since those activities are considered part of the cost of the land, not the buildings.</span></p></div><span data-dcnode-id="2239" instrument_node="">
</span></div><span data-dcnode-id="2237" instrument_node="">
</span></div><span data-dcnode-id="2235" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2226" id="mntl-sc-block_1-0-73"><span data-dcnode-id="2234" instrument_node="">
Residential rental property placed in service after 1986 is depreciated using the&nbsp;</span><a data-component="link" data-dcnode-id="2232" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/macrs.asp"><span data-dcnode-id="2233" instrument_node="">Modified Accelerated Cost Recovery System (MACRS)</span></a><span data-dcnode-id="2231" instrument_node="">. This method spreads costs (and depreciation deductions) over 27.5 years—what the IRS considers the “useful life” of a rental property.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2228" data-id="#citation-24"><span data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">14</span></span></span><span data-dcnode-id="2227" instrument_node="">
</span></p><span data-dcnode-id="2225" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2224" id="mntl-sc-block_1-0-74"></div><span data-dcnode-id="2223" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2211" id="mntl-sc-block_1-0-75"><span data-dcnode-id="2222" instrument_node="">
While depreciation saves you money now, the IRS might want some of that money back. If you depreciate property and then sell it for more than its depreciated value, you'll owe </span><a data-component="link" data-dcnode-id="2220" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/investing/060815/how-rental-property-depreciation-works.asp"><span data-dcnode-id="2221" instrument_node="">depreciation recapture taxes</span></a><span data-dcnode-id="2219" instrument_node=""> on the gain.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2216" data-id="#citation-25"><span data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">15</span></span></span><span data-dcnode-id="2215" instrument_node=""> Many real estate investors use </span><a data-component="link" data-dcnode-id="2213" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/financial-edge/0110/10-things-to-know-about-1031-exchanges.aspx"><span data-dcnode-id="2214" instrument_node="">1031 exchanges</span></a><span data-dcnode-id="2212" instrument_node=""> to defer taxes—including depreciation recapture and capital gains taxes.
</span></p><span data-dcnode-id="2210" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2209" id="mntl-sc-block_1-0-76"></div><span data-dcnode-id="2208" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2203" id="mntl-sc-block_1-0-77"><span data-dcnode-id="2207" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node=""> Repairs and improvements </span></span><span data-dcnode-id="2204" instrument_node=""> </span></h3><span data-dcnode-id="2202" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2197" id="mntl-sc-block_1-0-78"><span data-dcnode-id="2201" instrument_node="">
Rental property owners may assume that anything they do on their property is a deductible expense. </span><em data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Not so</span></em><span data-dcnode-id="2198" instrument_node="">, according to the IRS.
</span></p><span data-dcnode-id="2196" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2195" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="2194" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2185" id="mntl-sc-block_1-0-80"><span data-dcnode-id="2193" instrument_node="">
A repair keeps your rental property in good condition and is a deductible expense in the year when you pay for it. Repairs include painting, fixing a broken toilet, and replacing a faulty light switch. On the other hand, improvements add value to your property and are not deductible when you pay for them. Instead, you recover the cost of improving (and buying) a property by </span><a data-component="link" data-dcnode-id="2191" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/investing/060815/how-rental-property-depreciation-works.asp"><span data-dcnode-id="2192" instrument_node="">depreciating </span></a><span data-dcnode-id="2190" instrument_node="">the expense over your property’s useful life. Improvements might include a new roof, patio, or garage.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2187" data-id="#citation-19"><span data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">6</span></span></span><span data-dcnode-id="2186" instrument_node="">
</span></p><span data-dcnode-id="2184" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2183" id="mntl-sc-block_1-0-81"></div><span data-dcnode-id="2182" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2180" id="mntl-sc-block_1-0-82"><span data-dcnode-id="2181" instrument_node="">
From a tax standpoint, you should make repairs as problems arise instead of waiting until they multiply and require renovations.
</span></p><span data-dcnode-id="2179" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2178" id="mntl-sc-block_1-0-83"></div><span data-dcnode-id="2177" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2172" id="mntl-sc-block_1-0-84"><span data-dcnode-id="2176" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node=""> Property taxes </span></span><span data-dcnode-id="2173" instrument_node=""> </span></h3><span data-dcnode-id="2171" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2162" id="mntl-sc-block_1-0-85"><span data-dcnode-id="2170" instrument_node="">
Property taxes are an ongoing expense for rental property owners. Homeowners can deduct up to a total of $10,000 ($5,000 if married filing separately) for property taxes and either</span><a data-component="link" data-dcnode-id="2168" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/salt-5180146"><span data-dcnode-id="2169" instrument_node=""> state and local income taxes or sales taxes</span></a><span data-dcnode-id="2167" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2164" data-id="#citation-26"><span data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">16</span></span></span><span data-dcnode-id="2163" instrument_node=""> However, that limit doesn't apply to business activities. Depending on your level of participation in the property, you may be able to deduct the full amount as a business expense.
</span></p><span data-dcnode-id="2161" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2160" id="mntl-sc-block_1-0-86"></div><span data-dcnode-id="2159" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2154" id="mntl-sc-block_1-0-87"><span data-dcnode-id="2158" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node=""> Travel expenses </span></span><span data-dcnode-id="2155" instrument_node=""> </span></h3><span data-dcnode-id="2153" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2147" id="mntl-sc-block_1-0-88"><span data-dcnode-id="2152" instrument_node="">
Money you spend on travel to collect rent or maintain your rental property is deductible. However, if the purpose of the trip was for improvements, you must recover that expense as part of the improvement.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2149" data-id="#citation-6"><span data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">1</span></span></span><span data-dcnode-id="2148" instrument_node="">
</span></p><span data-dcnode-id="2146" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2145" id="mntl-sc-block_1-0-89"></div><span data-dcnode-id="2144" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2132" id="mntl-sc-block_1-0-90"><span data-dcnode-id="2143" instrument_node="">
There are two ways to deduct </span><a data-component="link" data-dcnode-id="2141" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/travelexpenses.asp"><span data-dcnode-id="2142" instrument_node="">travel expenses</span></a><span data-dcnode-id="2140" instrument_node="">: using the actual expenses or the </span><a data-component="link" data-dcnode-id="2138" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/standardmileagerate.asp"><span data-dcnode-id="2139" instrument_node="">standard mileage rate</span></a><span data-dcnode-id="2137" instrument_node="">. The latest details about the IRS’s requirements and current mileage allowance are in IRS Publication 463.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2134" data-id="#citation-9"><span data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">17</span></span></span><span data-dcnode-id="2133" instrument_node="">
</span></p><span data-dcnode-id="2131" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2130" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="2129" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2124" id="mntl-sc-block_1-0-92"><span data-dcnode-id="2128" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node=""> Other common expenses </span></span><span data-dcnode-id="2125" instrument_node=""> </span></h3><span data-dcnode-id="2123" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2118" id="mntl-sc-block_1-0-93"><span data-dcnode-id="2122" instrument_node="">
In addition to mortgage interest, repairs, and </span><a data-component="link" data-dcnode-id="2120" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/investing/060815/how-rental-property-depreciation-works.asp"><span data-dcnode-id="2121" instrument_node="">depreciation</span></a><span data-dcnode-id="2119" instrument_node="">, some other common expenses you can deduct include:
</span></p><span data-dcnode-id="2117" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2116" id="mntl-sc-block_1-0-94"></div><span data-dcnode-id="2115" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2090" id="mntl-sc-block_1-0-95"><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Advertising</span></li><li data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Employees and independent contractors</span></li><li data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Home office expenses</span></li><li data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Insurance premiums</span></li><li data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Lawn care</span></li><li data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Losses from casualties (hurricane, earthquake, flood, etc.) or thefts</span></li><li data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Professional services (e.g., accountants, tax preparers, property managers, attorneys)</span></li><li data-dcnode-id="2097"><span data-dcnode-id="2099" instrument_node="">Utilities</span><br data-dcnode-id="2098"></li><li data-dcnode-id="2092"><span data-dcnode-id="2096" instrument_node="">The cost of personal property (e.g., appliances and furniture) used in rental activity</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2093" data-id="#citation-6"><span data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">1</span></span></span></li><span data-dcnode-id="2091" instrument_node="">
</span></ul><span data-dcnode-id="2089" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2088" id="mntl-sc-block_1-0-96"></div><span data-dcnode-id="2087" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2086" id="toc-condominiums-and-cooperatives"></span><span data-dcnode-id="2085" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2080" id="mntl-sc-block_1-0-97"><span data-dcnode-id="2084" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node=""> Condominiums and Cooperatives </span></span><span data-dcnode-id="2081" instrument_node=""> </span></h2><span data-dcnode-id="2079" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2074" id="mntl-sc-block_1-0-98"><span data-dcnode-id="2078" instrument_node="">
If you own a rental </span><a data-component="link" data-dcnode-id="2076" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/condominium.asp"><span data-dcnode-id="2077" instrument_node="">condominium</span></a><span data-dcnode-id="2075" instrument_node=""> or cooperative, each has some special rules:
</span></p><span data-dcnode-id="2073" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2072" id="mntl-sc-block_1-0-99"></div><span data-dcnode-id="2071" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2037" id="mntl-sc-block_1-0-100"><span data-dcnode-id="2070" instrument_node="">
</span><li data-dcnode-id="2055"><strong data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Condominiums:</span></strong><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node=""> </span></em><span data-dcnode-id="2065" instrument_node="">If the rental is</span><em data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node=""> </span></em><span data-dcnode-id="2062" instrument_node="">a condominium, you probably pay dues or assessments to maintain common areas—such as lobbies, elevators, and recreational areas. When you rent out your condominium, you can deduct expenses, such as depreciation, repairs, interest, and taxes that relate to this common property. However, just as with a single-family rental, you can't deduct money spent on </span><a data-component="link" data-dcnode-id="2060" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/capitalimprovement.asp"><span data-dcnode-id="2061" instrument_node="">capital improvements</span></a><span data-dcnode-id="2059" instrument_node="">, such as an assessment for a cabana at the clubhouse. Instead, you must depreciate your share of the cost.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2056" data-id="#citation-6"><span data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">1</span></span></span></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2039"><strong data-dcnode-id="2050"><span data-dcnode-id="2053" instrument_node="">Cooperatives:</span><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node=""> </span></em></strong><span data-dcnode-id="2049" instrument_node="">Expenses for a cooperative apartment you rent out are deductible. This includes the maintenance fees paid to the cooperative housing corporation. Capital improvements are treated differently. You can't deduct improvement costs, nor can you depreciate them. Instead, you must add the cost of the improvement to your </span><a class="pseudoStyle" data-component="link" data-dcnode-id="2047" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/costbasis.asp"><span data-dcnode-id="2048" instrument_node="">cost basis</span></a><span data-dcnode-id="2046" instrument_node=""> in the corporation’s stock, reducing your </span><a data-component="link" data-dcnode-id="2044" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/capitalgain.asp"><span data-dcnode-id="2045" instrument_node="">capital gain</span></a><span data-dcnode-id="2043" instrument_node=""> when you sell.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2040" data-id="#citation-6"><span data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">1</span></span></span></li><span data-dcnode-id="2038" instrument_node="">
</span></ul><span data-dcnode-id="2036" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2035" id="mntl-sc-block_1-0-101"></div><span data-dcnode-id="2034" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2033" id="toc-recordkeeping"></span><span data-dcnode-id="2032" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2027" id="mntl-sc-block_1-0-102"><span data-dcnode-id="2031" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node=""> Recordkeeping </span></span><span data-dcnode-id="2028" instrument_node=""> </span></h2><span data-dcnode-id="2026" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2021" id="mntl-sc-block_1-0-103"><span data-dcnode-id="2025" instrument_node="">
Under the IRS's Schedule E, there are spaces for miscellaneous categories of expenses. That gives you flexibility in the items that you can deduct. But be prepared to back up your claim and separate costs for repairs and maintenance from those that are capital improvements. Remember, the money you spend on improvements could reduce your </span><a class="pseudoStyle" data-component="link" data-dcnode-id="2023" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxliability.asp"><span data-dcnode-id="2024" instrument_node="">tax liability</span></a><span data-dcnode-id="2022" instrument_node=""> when you sell.
</span></p><span data-dcnode-id="2020" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2019" id="mntl-sc-block_1-0-104"></div><span data-dcnode-id="2018" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2016" id="mntl-sc-block_1-0-105"><span data-dcnode-id="2017" instrument_node="">
Plan to keep supporting documentation (like appointment books, diaries, calendars, and logs) to prove your active participation and the time spent on your properties each year.
</span></p><span data-dcnode-id="2015" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2014" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="2013" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1999" id="mntl-sc-block_1-0-107"><span data-dcnode-id="2012" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2011" id="toc-where-do-i-report-rental-income"></span><span data-dcnode-id="2010" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Where Do I Report Rental Income?</span></h2><span data-dcnode-id="2007" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="2001"><p data-dcnode-id="2002"><span data-dcnode-id="2006" instrument_node="">You report rental property income, expenses, and depreciation on&nbsp;Schedule E of your 1040 or 1040-SR (U.S. Tax Return for Seniors). You'll have to use more than one copy of Schedule E if you have more than three rental properties.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2003" data-id="#citation-13"><span data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">18</span></span></span></p></div><span data-dcnode-id="2000" instrument_node="">
</span></div><span data-dcnode-id="1998" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1997" id="mntl-sc-block_1-0-108"></div><span data-dcnode-id="1996" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1969" id="mntl-sc-block_1-0-109"><span data-dcnode-id="1995" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1994" id="toc-what-deductions-can-i-claim-for-rental-property"></span><span data-dcnode-id="1993" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">What Deductions Can I Claim for Rental Property?</span></h2><span data-dcnode-id="1990" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1971"><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">As a rental property owner, you can claim&nbsp;</span><a data-component="link" data-dcnode-id="1987" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/pf/06/rentalowner.asp"><span data-dcnode-id="1988" instrument_node="">deductions to offset rental income</span></a><span data-dcnode-id="1986" instrument_node="">&nbsp;and lower taxes. Broadly, you can deduct qualified rental expenses (e.g., mortgage interest, property taxes, interest, and utilities), operating expenses, and repair costs.</span></p><p data-dcnode-id="1983"><br data-dcnode-id="1984"></p><p data-dcnode-id="1972"><span data-dcnode-id="1982" instrument_node="">You can also depreciate the cost of buying and improving the property over its "useful life," generally 27.5 years.&nbsp;You may also be able to </span><a data-component="link" data-dcnode-id="1980" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/taxes/now-time-restructure-your-business/"><span data-dcnode-id="1981" instrument_node="">deduct an additional 20% of your qualified business income (QBI)</span></a><span data-dcnode-id="1979" instrument_node="">. However, to qualify for the QBI deduction, the rental real estate must "rise to the level of a trade or business under section 162" of the Internal Revenue Code, among other restrictions.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1976" data-id="#citation-29"><span data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">19</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1973" data-id="#citation-14"><span data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">20</span></span></span></p></div><span data-dcnode-id="1970" instrument_node="">
</span></div><span data-dcnode-id="1968" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1967" id="mntl-sc-block_1-0-110"></div><span data-dcnode-id="1966" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1948" id="mntl-sc-block_1-0-111"><span data-dcnode-id="1965" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1964" id="toc-what-is-a-1031-exchange"></span><span data-dcnode-id="1963" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">What Is a 1031 Exchange?</span></h2><span data-dcnode-id="1960" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1950"><p data-dcnode-id="1951"><span data-dcnode-id="1959" instrument_node="">When you eventually sell your rental property, you could be on the hook for capital gains and depreciation recapture taxes. Many real estate investors defer these taxes by using a&nbsp;</span><a data-component="link" data-dcnode-id="1957" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/financial-edge/0110/10-things-to-know-about-1031-exchanges.aspx"><span data-dcnode-id="1958" instrument_node="">1031 exchange</span></a><span data-dcnode-id="1956" instrument_node="">, which lets you swap one investment property for another. According to the IRS, the exchanged properties must be “like-kind,” meaning "they’re of the same nature or character, even if they differ in grade or quality."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1953" data-id="#citation-15"><span data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">21</span></span></span><span data-dcnode-id="1952" instrument_node=""> In general, properties are considered like-kind, whether they’re improved or unimproved.</span></p></div><span data-dcnode-id="1949" instrument_node="">
</span></div><span data-dcnode-id="1947" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1946" id="mntl-sc-block_1-0-112"></div><span data-dcnode-id="1945" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1931" id="mntl-sc-block_1-0-113"><span data-dcnode-id="1944" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1943" id="toc-is-rental-income-taxed-as-ordinary-income"></span><span data-dcnode-id="1942" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Is Rental Income Taxed as Ordinary Income?</span></h2><span data-dcnode-id="1939" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1933"><p data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">Maybe. If you rent out a property for more than 14 days during the year, you must report the rental income on your tax return—and the net income is taxable as ordinary income. You don't have to report or pay taxes on the income if you rent out the property for 14 or fewer days.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1935" data-id="#citation-27"><span data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">22</span></span></span></p></div><span data-dcnode-id="1932" instrument_node="">
</span></div><span data-dcnode-id="1930" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1929" id="mntl-sc-block_1-0-114"></div><span data-dcnode-id="1928" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1927" id="toc-the-bottom-line"></span><span data-dcnode-id="1926" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1921" id="mntl-sc-block_1-0-115"><span data-dcnode-id="1925" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node=""> The Bottom Line </span></span><span data-dcnode-id="1922" instrument_node=""> </span></h2><span data-dcnode-id="1920" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1915" id="mntl-sc-block_1-0-116"><span data-dcnode-id="1919" instrument_node="">
Rental property ownership tends to be most profitable when you consider the tax rules before jumping in. Since there are quite a few deductions available, it pays to know which ones you qualify for so you can maximize your bottom line. Moreover, it's essential to understand </span><a data-component="link" data-dcnode-id="1917" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/rental-real-estate-taxes-5211939"><span data-dcnode-id="1918" instrument_node="">how taxes work</span></a><span data-dcnode-id="1916" instrument_node=""> on your rental income and the eventual sale of your property. For more guidance and help with deductions, taxes, and planning, be sure to consult a qualified tax professional.
