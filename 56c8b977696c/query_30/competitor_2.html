</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">ZEISS has been a client of PwC Germany’s tax and legal services team since 2013. In September 2020, PwC started using the firm’s newly-launched Engagement Center (EC) compliance platform to help ZEISS simplify its global compliance obligations.&nbsp;</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">With multiple business units in different countries, the company needed a clearer line of sight into local compliance issues in a rapidly evolving global regulatory landscape.&nbsp;</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">In 2016, AT engaged PwC to develop its digital and customer strategy in order to transform the company from an engineering business into a world-class customer-centric organisation. Over the past five years, PwC has helped AT roll out ‘Customer Central’, an ongoing programme with a core objective to ‘build better, customer-centric digital solutions faster’.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p class="btn-cta--parent" data-dcnode-id="1233"><a class="btn btn--secondary btn--transparent btn-cta btn-cta-common btn-cta--red" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.com/gx/en/about/case-studies/zeiss.html" pwcbtnfile="HideSize" pwcbtnrendition="Red"><span data-dcnode-id="1237" instrument_node="">Explore case study</span></a><br data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node="">
</span></p><span data-dcnode-id="1232" instrument_node="">

</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">It’s your choice to accept these or not. You can either click the 'I accept all’ button below or use the switches to choose and save your choices.</span></p><span data-dcnode-id="327" instrument_node="">
