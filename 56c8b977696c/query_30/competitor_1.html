</span><section class="two-columns-text bg-white" data-dcnode-id="1758"><span data-dcnode-id="1813" instrument_node="">
</span><div class="grid-container" data-dcnode-id="1761"><span data-dcnode-id="1812" instrument_node="">
</span><div class="grid-x grid-margin-x grid-padding-x" data-dcnode-id="1764"><span data-dcnode-id="1811" instrument_node="">
</span><div class="cell small-12 title-container" data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">
</span><h2 data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">How Can I Benefit from Strategic Corporate Tax Planning?</span></h2><span data-dcnode-id="1807" instrument_node="">
</span></div><span data-dcnode-id="1804" instrument_node="">
</span><div class="cell small-12 medium-6 cell-text" data-dcnode-id="1796"><span data-dcnode-id="1803" instrument_node="">
</span><p class="CBBodyText" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Whether undertaking acquisition activity, expanding operations or meeting increasingly burdensome corporate&nbsp;tax planning strategies and deadlines, businesses are constantly confronted with the challenges of complying with tax regulations. Whatever your company’s situation may be, Cherry Bekaert’s Strategic Corporate Tax Solutions team provides tailored solutions to support your finance team and generate opportunities for cost reduction and tax savings.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p class="CBBodyText" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">The Firm’s Strategic Corporate Tax Solutions team brings industry-specific and public accounting guidance to your tax compliance and regulatory needs. Our team has experience&nbsp;providing accounting and tax services for&nbsp;businesses across a broad spectrum of industries, ranging in size from $10 million to over $2 billion in revenue.</span></p><span data-dcnode-id="1797" instrument_node="">
</span></div><span data-dcnode-id="1794" instrument_node="">
</span><div class="cell small-12 medium-6 cell-text" data-dcnode-id="1767"><span data-dcnode-id="1793" instrument_node="">
</span><h2 data-dcnode-id="1790"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Federal &amp; State Tax Compliance</span></strong></h2><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Ongoing federal corporate tax code changes and the rippling effects to your business can make your federal tax compliance even more complex, leaving you with an uncertain tax position. Cherry Bekaert offers your business a team dedicated to monitoring, mastering and influencing those changes, and can assure you receive the maximum benefit.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Whether you do business in a few locations or a few countries, we know how to navigate the interwoven system of requirements facing your company. Our team can guide you to a lasting, managed system for future federal corporate tax preparation.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><ul data-dcnode-id="1769"><span data-dcnode-id="1782" instrument_node="">
</span><li data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Federal &amp; State Tax Return Compliance</span></li><span data-dcnode-id="1779" instrument_node="">
</span><li data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Uncertain Tax Position (“UTP”) Disclosure</span></li><span data-dcnode-id="1776" instrument_node="">
</span><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Amended Returns</span></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Staff Augmentation &amp; Loaned Staffing</span></li><span data-dcnode-id="1770" instrument_node="">
</span></ul><span data-dcnode-id="1768" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span></div><span data-dcnode-id="1762" instrument_node="">
</span></div><span data-dcnode-id="1759" instrument_node="">
</span></section><span data-dcnode-id="1756" instrument_node="">
</span><section class="two-columns-text bg-white" data-dcnode-id="1645"><span data-dcnode-id="1755" instrument_node="">
</span><div class="grid-container" data-dcnode-id="1648"><span data-dcnode-id="1754" instrument_node="">
</span><div class="grid-x grid-margin-x grid-padding-x" data-dcnode-id="1651"><span data-dcnode-id="1753" instrument_node="">
</span><div class="cell small-12 medium-6 cell-text" data-dcnode-id="1694"><span data-dcnode-id="1752" instrument_node="">
</span><h2 data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Income Tax Provision (ASC 740)</span></h2><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Even if your company has internal resources to meet the federal income tax provision compliance of ASC 740, reporting for these increasingly complex requirements under tight deadlines can be daunting.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Cherry Bekaert’s Corporate Tax Solutions team consists of specialized CPAs and advisors who assist public and private companies during peak income tax provision cycles and throughout the year. Our income tax provision software review can help identify issues prior to your external audit process to guard against your activities creating material weakness, restatement, or ASC 740 non-compliance. Our services include:</span></p><span data-dcnode-id="1743" instrument_node="">
</span><ul data-dcnode-id="1723"><span data-dcnode-id="1742" instrument_node="">
</span><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">ASC 740: Federal Income Tax Provision Preparation</span></li><span data-dcnode-id="1739" instrument_node="">
</span><li data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Annual and Quarterly Income Tax Provision Review</span></li><span data-dcnode-id="1736" instrument_node="">
</span><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">FIN 48: Uncertain Tax Position Update &amp; Review</span></li><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Review of Tax Controls</span></li><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Loaned Staff/Staff Augmentation</span></li><span data-dcnode-id="1727" instrument_node="">
</span><li data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">ONESOURCE Tax Provision Implementation</span></li><span data-dcnode-id="1724" instrument_node="">
</span></ul><span data-dcnode-id="1722" instrument_node="">
</span><h2 data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Outsourcing Accounting Services</span></h2><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Rather than spending resources to train and maintain a full-time tax staff, several businesses use tax outsourcing services to enhance their compliance efforts. Cherry Bekaert specializes in building a robust tax compliance plan so you can focus on your business. Our tax preparation outsourcing and tax consulting services include:</span></p><span data-dcnode-id="1716" instrument_node="">
</span><ul data-dcnode-id="1696"><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Federal, State &amp; International Compliance</span></li><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Sarbanes-Oxley Documentation Assistance</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Tax Return Review</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Amended Returns</span></li><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">IRS or State Audit IDR Response Support</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Accounting for Income Taxes</span></li><span data-dcnode-id="1697" instrument_node="">
</span></ul><span data-dcnode-id="1695" instrument_node="">
</span></div><span data-dcnode-id="1692" instrument_node="">
</span><div class="cell small-12 medium-6 cell-text" data-dcnode-id="1654"><span data-dcnode-id="1691" instrument_node="">
</span><h2 class="CBHeading3" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Tax Technology</span></h2><span data-dcnode-id="1688" instrument_node="">
</span><p class="CBBodyText" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Your internal tax department is under more pressure than ever to produce accurate financial reporting under time constraints with fewer internal resources. Tax technologies and process improvement are excellent solutions that make available numerous compliance software programs, each with its own unique strengths and weaknesses.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p class="CBBodyText" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Cherry Bekaert’s Corporate Tax Solutions technology professionals can help guide your business through the process of choosing, implementing and/or enhancing a tax technology and data analytics software solution.&nbsp;Our tax technology experts&nbsp;match your needs with the right compliance software solution, and then help your team maximize its strengths.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p class="CBBodyText" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">We are experienced with a range of both popular and boutique tax technology and data analytics solutions such as ONESOURCE™, Corptax and Longview Tax. We can help:</span></p><span data-dcnode-id="1679" instrument_node="">
</span><ul data-dcnode-id="1656"><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Determine the “right” tax technology system for your business</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Implement and customize your functionality</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Integrate general ledger, return and provision systems</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Configure tax automation services</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Customize deferred tax reporting</span></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Configure journal entries</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Map for tax basis balance sheet</span></li><span data-dcnode-id="1657" instrument_node="">
</span></ul><span data-dcnode-id="1655" instrument_node="">
</span></div><span data-dcnode-id="1652" instrument_node="">
</span></div><span data-dcnode-id="1649" instrument_node="">
</span></div><span data-dcnode-id="1646" instrument_node="">
