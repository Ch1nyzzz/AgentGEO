</span></p><span data-dcnode-id="1160" instrument_node=""> </span><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">(</span><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Photo by Waka</span></strong><span data-dcnode-id="1156" instrument_node=""> – An Onion Bulb)</span></p><span data-dcnode-id="1154" instrument_node=""> </span><p data-dcnode-id="1152"><span data-dcnode-id="1153" id="more-1544"></span></p><span data-dcnode-id="1151" instrument_node=""> </span><p data-dcnode-id="1148"><span data-dcnode-id="1149" data-preserver-spaces="true"><span data-dcnode-id="1150" instrument_node="">If you cut an onion upfront, tears will flow from your eyes; you need to cut the onion strategically. Likewise, tax non-compliance may cause tears and heartaches; you need a SWOT exercise strategy). However, due to various reasons, this is not possible to achieve. Hence, conducting a SWOT analysis specific to tax compliance is important.</span></span></p><span data-dcnode-id="1147" instrument_node=""> </span><p data-dcnode-id="1144"><span data-dcnode-id="1145" data-preserver-spaces="true"><span data-dcnode-id="1146" instrument_node="">A SWOT analysis is a strategic tool used to assist organizations identifies strengths (capabilities) and weaknesses (limitations) and analyze the influencing factors of opportunities and threats.</span></span></p><span data-dcnode-id="1143" instrument_node=""> </span><p data-dcnode-id="1135"><span data-dcnode-id="1136" data-preserver-spaces="true"><a class="no-lightbox" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxkenya.com/%3Fbha%3Dtrue%26user%3Dwakaguyu%26id%3Dshortcode/https%3A//www.bluehost.com/track/wakaguyu" target="_blank"><img class="lazy none" data-dcnode-id="1142" data-lazy-src="https://bluehost-cdn.com/media/partner/images/wakaguyu/190x60/bh-190x60-03-dy.png" data-lazy-type="image" draggable="false" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bluehost-cdn.com/media/partner/images/wakaguyu/190x60/bh-190x60-03-dy.png&amp;raw"><span data-dcnode-id="1141" instrument_node="">
</span><noscript data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">&lt;img class='lazy lazy-hidden none' src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-lazy-type="image" data-lazy-src='https://bluehost-cdn.com/media/partner/images/wakaguyu/190x60/bh-190x60-03-dy.png' /&gt;&lt;noscript&gt;&lt;img class='none' src='https://bluehost-cdn.com/media/partner/images/wakaguyu/190x60/bh-190x60-03-dy.png' /&gt;</span></noscript><span data-dcnode-id="1138" instrument_node="">
</span></a></span></p><span data-dcnode-id="1134" instrument_node=""> </span><p data-dcnode-id="1131"><span data-dcnode-id="1132" data-preserver-spaces="true"><span data-dcnode-id="1133" instrument_node="">Specifically, SWOT for tax compliance is an exercise to identify a taxpayer’s strengths and weaknesses and analyze opportunities and threats that will result in increased tax compliance.</span></span></p><span data-dcnode-id="1130" instrument_node=""> </span><p data-dcnode-id="1127"><span data-dcnode-id="1128" data-preserver-spaces="true"><span data-dcnode-id="1129" instrument_node="">The exercise will help evaluate the taxpayer’s internal characteristics and the external climate. The goal of the SWOT exercise for tax compliance is to help the taxpayer identify strategies for improved tax compliance.</span></span></p><span data-dcnode-id="1126" instrument_node=""> </span><p data-dcnode-id="1122"><span data-dcnode-id="1123" style="color: #0000ff;"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Why do taxpayers require SWOT?</span></strong></span></p><span data-dcnode-id="1121" instrument_node=""> </span><p data-dcnode-id="1118"><span data-dcnode-id="1119" data-preserver-spaces="true"><span data-dcnode-id="1120" instrument_node="">Many taxpayers have indeed at one time for other been caught up with tax non-compliance issues. Some of the actions by taxpayers that will result in non-compliance are:</span></span></p><span data-dcnode-id="1117" instrument_node=""> </span><ol data-dcnode-id="1095"><span data-dcnode-id="1116" instrument_node=""> </span><li data-dcnode-id="1113"><span data-dcnode-id="1114" data-preserver-spaces="true"><span data-dcnode-id="1115" instrument_node="">Submitting tax returns late.</span></span></li><span data-dcnode-id="1112" instrument_node=""> </span><li data-dcnode-id="1109"><span data-dcnode-id="1110" data-preserver-spaces="true"><span data-dcnode-id="1111" instrument_node="">Submitting wrong self-assessments to the tax authorities.</span></span></li><span data-dcnode-id="1108" instrument_node=""> </span><li data-dcnode-id="1105"><span data-dcnode-id="1106" data-preserver-spaces="true"><span data-dcnode-id="1107" instrument_node="">Remitting tax late.</span></span></li><span data-dcnode-id="1104" instrument_node=""> </span><li data-dcnode-id="1101"><span data-dcnode-id="1102" data-preserver-spaces="true"><span data-dcnode-id="1103" instrument_node="">Remitting wrong amounts of tax.</span></span></li><span data-dcnode-id="1100" instrument_node=""> </span><li data-dcnode-id="1097"><span data-dcnode-id="1098" data-preserver-spaces="true"><span data-dcnode-id="1099" instrument_node="">Technical mistakes such as misclassification of transactions.</span></span></li><span data-dcnode-id="1096" instrument_node=""> </span></ol><span data-dcnode-id="1094" instrument_node=""> </span><p data-dcnode-id="1091"><span data-dcnode-id="1092" data-preserver-spaces="true"><span data-dcnode-id="1093" instrument_node="">Some actions are external to the taxpayer that may result in non-compliance. Some of the actions are:</span></span></p><span data-dcnode-id="1090" instrument_node=""> </span><ol data-dcnode-id="1068"><span data-dcnode-id="1089" instrument_node=""> </span><li data-dcnode-id="1086"><span data-dcnode-id="1087" data-preserver-spaces="true"><span data-dcnode-id="1088" instrument_node="">Change in tax laws.</span></span></li><span data-dcnode-id="1085" instrument_node=""> </span><li data-dcnode-id="1082"><span data-dcnode-id="1083" data-preserver-spaces="true"><span data-dcnode-id="1084" instrument_node="">Requirement to use technology.</span></span></li><span data-dcnode-id="1081" instrument_node=""> </span><li data-dcnode-id="1078"><span data-dcnode-id="1079" data-preserver-spaces="true"><span data-dcnode-id="1080" instrument_node="">Failure of the tax authority’s technology e.g. when submitting tax returns.</span></span></li><span data-dcnode-id="1077" instrument_node=""> </span><li data-dcnode-id="1074"><span data-dcnode-id="1075" data-preserver-spaces="true"><span data-dcnode-id="1076" instrument_node="">Unfriendly business environment.</span></span></li><span data-dcnode-id="1073" instrument_node=""> </span><li data-dcnode-id="1070"><span data-dcnode-id="1071" data-preserver-spaces="true"><span data-dcnode-id="1072" instrument_node="">Political chaos.</span></span></li><span data-dcnode-id="1069" instrument_node=""> </span></ol><span data-dcnode-id="1067" instrument_node=""> </span><p data-dcnode-id="1064"><span data-dcnode-id="1065" data-preserver-spaces="true"><span data-dcnode-id="1066" instrument_node="">Failure to comply with tax laws results in extra tax payments in the form of penalties and interest which are not from productive tax activities. Therefore, every taxpayer should be concerned when they do not comply with tax laws.</span></span></p><span data-dcnode-id="1063" instrument_node=""> </span><p data-dcnode-id="1060"><span data-dcnode-id="1061" data-preserver-spaces="true"><span data-dcnode-id="1062" instrument_node="">Conducting a SWOT exercise on tax affairs will enable the taxpayer:</span></span></p><span data-dcnode-id="1059" instrument_node=""> </span><ol data-dcnode-id="1041"><span data-dcnode-id="1058" instrument_node=""> </span><li data-dcnode-id="1055"><span data-dcnode-id="1056" data-preserver-spaces="true"><span data-dcnode-id="1057" instrument_node="">Identify tax compliance strengths.</span></span></li><span data-dcnode-id="1054" instrument_node=""> </span><li data-dcnode-id="1051"><span data-dcnode-id="1052" data-preserver-spaces="true"><span data-dcnode-id="1053" instrument_node="">Identify tax compliance weaknesses.</span></span></li><span data-dcnode-id="1050" instrument_node=""> </span><li data-dcnode-id="1047"><span data-dcnode-id="1048" data-preserver-spaces="true"><span data-dcnode-id="1049" instrument_node="">Analyze tax compliance opportunities.</span></span></li><span data-dcnode-id="1046" instrument_node=""> </span><li data-dcnode-id="1043"><span data-dcnode-id="1044" data-preserver-spaces="true"><span data-dcnode-id="1045" instrument_node="">Analyze tax compliance threats.</span></span></li><span data-dcnode-id="1042" instrument_node=""> </span></ol><span data-dcnode-id="1040" instrument_node=""> </span><p data-dcnode-id="1037"><span data-dcnode-id="1038" data-preserver-spaces="true"><span data-dcnode-id="1039" instrument_node="">Identifying tax compliance strength and weakness is an inward examination of the company focusing on resources and experiences while analyzing tax compliance weaknesses and threats is an assessment of the external environment.</span></span></p><span data-dcnode-id="1036" instrument_node=""> </span><p data-dcnode-id="1033"><span data-dcnode-id="1034" data-preserver-spaces="true"><span data-dcnode-id="1035" instrument_node="">The information provided by the SWOT exercise will enable the taxpayer to have a clear understanding of the specific areas of tax compliance the taxpayer stand out in and what tax compliance challenges the taxpayer faces.</span></span></p><span data-dcnode-id="1032" instrument_node=""> </span><p data-dcnode-id="1029"><span data-dcnode-id="1030" data-preserver-spaces="true"><span data-dcnode-id="1031" instrument_node="">The exercise will enable the taxpayer to align strategies to achieve the set tax compliance goals while at the same time taking remedial actions that will result in improved tax compliance and hence save on extra tax payments in form of penalties and interest.</span></span></p><span data-dcnode-id="1028" instrument_node=""> </span><p data-dcnode-id="1024"><span data-dcnode-id="1025" style="color: #0000ff;"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Conducting a tax compliance SWOT exercise</span></strong></span></p><span data-dcnode-id="1023" instrument_node=""> </span><p data-dcnode-id="1020"><span data-dcnode-id="1021" data-preserver-spaces="true"><span data-dcnode-id="1022" instrument_node="">SWOT exercises are undertaken in various fields. The exercises involve identifying strengths, weaknesses and analyzing opportunities and threats. The following should be identified and analyzed in a SWOT for tax compliance exercise.</span></span></p><span data-dcnode-id="1019" instrument_node=""> </span><p data-dcnode-id="1015"><span data-dcnode-id="1016" style="color: #0000ff;"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Strengths</span></strong></span></p><span data-dcnode-id="1014" instrument_node=""> </span><p data-dcnode-id="1011"><span data-dcnode-id="1012" data-preserver-spaces="true"><span data-dcnode-id="1013" instrument_node="">Identification of strengths in a SWOT for tax compliance exercise seeks to answer the question “what do we do well” in tax compliance. Taxpayers have control over strengths in that they can choose to use or ignore their strengths.</span></span></p><span data-dcnode-id="1010" instrument_node=""> </span><p data-dcnode-id="1007"><span data-dcnode-id="1008" data-preserver-spaces="true"><span data-dcnode-id="1009" instrument_node="">Strengths are identified from the internal taxpayer’s perspectives. Hence, according to tax compliance, strengths are internal attributes that support successful outcomes. Therefore, identifying and using strengths will enable taxpayers to improve tax compliance hence, impact planning, making decisions and management.</span></span></p><span data-dcnode-id="1006" instrument_node=""> </span><p data-dcnode-id="1003"><span data-dcnode-id="1004" data-preserver-spaces="true"><span data-dcnode-id="1005" instrument_node="">The following are some of the questions that a taxpayer should ask when determining internal strengths:</span></span></p><span data-dcnode-id="1002" instrument_node=""> </span><ol data-dcnode-id="980"><span data-dcnode-id="1001" instrument_node=""> </span><li data-dcnode-id="998"><span data-dcnode-id="999" data-preserver-spaces="true"><span data-dcnode-id="1000" instrument_node="">What characteristics identify our strength?</span></span></li><span data-dcnode-id="997" instrument_node=""> </span><li data-dcnode-id="994"><span data-dcnode-id="995" data-preserver-spaces="true"><span data-dcnode-id="996" instrument_node="">What advantages does the company have such as skilled workers, educated workers and connections in the tax authority?</span></span></li><span data-dcnode-id="993" instrument_node=""> </span><li data-dcnode-id="990"><span data-dcnode-id="991" data-preserver-spaces="true"><span data-dcnode-id="992" instrument_node="">What tax does the company comply better: VAT, PAYE, Corporate tax, Excise duty?</span></span></li><span data-dcnode-id="989" instrument_node=""> </span><li data-dcnode-id="986"><span data-dcnode-id="987" data-preserver-spaces="true"><span data-dcnode-id="988" instrument_node="">What personal resources can you access?</span></span></li><span data-dcnode-id="985" instrument_node=""> </span><li data-dcnode-id="982"><span data-dcnode-id="983" data-preserver-spaces="true"><span data-dcnode-id="984" instrument_node="">What tax grouping does the taxpayer belong to e.g. Kenya Flower Council, KAM?</span></span></li><span data-dcnode-id="981" instrument_node=""> </span></ol><span data-dcnode-id="979" instrument_node=""> </span><p data-dcnode-id="976"><strong data-dcnode-id="977" style="color: #0000ff;"><span data-dcnode-id="978" instrument_node="">Weaknesses</span></strong></p><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="972"><span data-dcnode-id="973" data-preserver-spaces="true"><span data-dcnode-id="974" instrument_node="">Weaknesses are internal faults and defects that will hinder the taxpayer from tax compliance. They are internal attributes that work against successful outcomes thus increase taxpayer’s vulnerability to tax non-compliance.</span></span></p><span data-dcnode-id="971" instrument_node=""> </span><p data-dcnode-id="968"><span data-dcnode-id="969" data-preserver-spaces="true"><span data-dcnode-id="970" instrument_node="">When conducting a SWOT on tax compliance, the expected outcomes are to identify and eliminate weaknesses to minimize incidences of tax non-compliance. The following are some of the questions that the taxpayer should ask when identifying internal weaknesses:</span></span></p><span data-dcnode-id="967" instrument_node=""> </span><ol data-dcnode-id="941"><span data-dcnode-id="966" instrument_node=""> </span><li data-dcnode-id="963"><span data-dcnode-id="964" data-preserver-spaces="true"><span data-dcnode-id="965" instrument_node="">What are the weaknesses in our processes and personnel?</span></span></li><span data-dcnode-id="962" instrument_node=""> </span><li data-dcnode-id="959"><span data-dcnode-id="960" data-preserver-spaces="true"><span data-dcnode-id="961" instrument_node="">What are the internal challenges and risks that we face?</span></span></li><span data-dcnode-id="958" instrument_node=""> </span><li data-dcnode-id="955"><span data-dcnode-id="956" data-preserver-spaces="true"><span data-dcnode-id="957" instrument_node="">What does the tax authority, tax auditors, tax consultants and agents see as our weakness as far as tax compliance is concerned?</span></span></li><span data-dcnode-id="954" instrument_node=""> </span><li data-dcnode-id="951"><span data-dcnode-id="952" data-preserver-spaces="true"><span data-dcnode-id="953" instrument_node="">What tax skills are we lacking in the company?</span></span></li><span data-dcnode-id="950" instrument_node=""> </span><li data-dcnode-id="947"><span data-dcnode-id="948" data-preserver-spaces="true"><span data-dcnode-id="949" instrument_node="">What negative tax habits does the taxpayer exhibit e.g. late annual audits, late tax returns filing, tax liabilities with every KRA audit such as principal tax, penalties and interest?</span></span></li><span data-dcnode-id="946" instrument_node=""> </span><li data-dcnode-id="943"><span data-dcnode-id="944" data-preserver-spaces="true"><span data-dcnode-id="945" instrument_node="">What company characteristic results in weakness such as poor credit control?</span></span></li><span data-dcnode-id="942" instrument_node=""> </span></ol><span data-dcnode-id="940" instrument_node=""> </span><p data-dcnode-id="936"><span data-dcnode-id="937" style="color: #0000ff;"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Opportunities</span></strong></span></p><span data-dcnode-id="935" instrument_node=""> </span><p data-dcnode-id="932"><span data-dcnode-id="933" data-preserver-spaces="true"><span data-dcnode-id="934" instrument_node="">Opportunities are external factors and hence should be considered from external perspectives when conducting SWOT for tax compliance exercise. Taxpayers have no control over frequency or presence of opportunities but they only have control over whether and how they can exploit the opportunities.</span></span></p><span data-dcnode-id="931" instrument_node=""> </span><p data-dcnode-id="928"><span data-dcnode-id="929" data-preserver-spaces="true"><span data-dcnode-id="930" instrument_node="">Therefore, according to SWOT for tax compliance, opportunities are external factors that the taxpayer can use or capitalize on to its advantage to improve tax compliance.</span></span></p><span data-dcnode-id="927" instrument_node=""> </span><p data-dcnode-id="924"><span data-dcnode-id="925" data-preserver-spaces="true"><span data-dcnode-id="926" instrument_node="">The following are some of the questions that a taxpayer should ask when conducting a SWOT for tax compliance exercise:</span></span></p><span data-dcnode-id="923" instrument_node=""> </span><ol data-dcnode-id="897"><span data-dcnode-id="922" instrument_node=""> </span><li data-dcnode-id="919"><span data-dcnode-id="920" data-preserver-spaces="true"><span data-dcnode-id="921" instrument_node="">What can we do better?</span></span></li><span data-dcnode-id="918" instrument_node=""> </span><li data-dcnode-id="915"><span data-dcnode-id="916" data-preserver-spaces="true"><span data-dcnode-id="917" instrument_node="">Are there opportunities existing in the environment that can help improve use tax compliance?</span></span></li><span data-dcnode-id="914" instrument_node=""> </span><li data-dcnode-id="911"><span data-dcnode-id="912" data-preserver-spaces="true"><span data-dcnode-id="913" instrument_node="">What technology can we use to improve tax compliance?</span></span></li><span data-dcnode-id="910" instrument_node=""> </span><li data-dcnode-id="907"><span data-dcnode-id="908" data-preserver-spaces="true"><span data-dcnode-id="909" instrument_node="">What skill’s building opportunities are available out there such as networking events, educational seminars and conferences?</span></span></li><span data-dcnode-id="906" instrument_node=""> </span><li data-dcnode-id="903"><span data-dcnode-id="904" data-preserver-spaces="true"><span data-dcnode-id="905" instrument_node="">What are others doing and who can help us?</span></span></li><span data-dcnode-id="902" instrument_node=""> </span><li data-dcnode-id="899"><span data-dcnode-id="900" data-preserver-spaces="true"><span data-dcnode-id="901" instrument_node="">What changes can we make such as with our service providers e.g. auditors?</span></span></li><span data-dcnode-id="898" instrument_node=""> </span></ol><span data-dcnode-id="896" instrument_node=""> </span><p data-dcnode-id="892"><span data-dcnode-id="893" style="color: #0000ff;"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Threats</span></strong></span></p><span data-dcnode-id="891" instrument_node=""> </span><p data-dcnode-id="888"><span data-dcnode-id="889" data-preserver-spaces="true"><span data-dcnode-id="890" instrument_node="">Threats are external elements that could instigate future problems faced by the taxpayer. These are external factors that may negatively impact on the taxpayer’s tax compliance success. The information provided after the SWOT for tax compliance exercise will identify what the taxpayer should do to put the problem into proper perspective.</span></span></p><span data-dcnode-id="887" instrument_node=""> </span><p data-dcnode-id="884"><span data-dcnode-id="885" data-preserver-spaces="true"><span data-dcnode-id="886" instrument_node="">The taxpayer should answer the following questions:</span></span></p><span data-dcnode-id="883" instrument_node=""> </span><ol data-dcnode-id="857"><span data-dcnode-id="882" instrument_node=""> </span><li data-dcnode-id="879"><span data-dcnode-id="880" data-preserver-spaces="true"><span data-dcnode-id="881" instrument_node="">What are the internal threats we face in tax compliance?</span></span></li><span data-dcnode-id="878" instrument_node=""> </span><li data-dcnode-id="875"><span data-dcnode-id="876" data-preserver-spaces="true"><span data-dcnode-id="877" instrument_node="">What obstacles do we face in tax compliance?</span></span></li><span data-dcnode-id="874" instrument_node=""> </span><li data-dcnode-id="871"><span data-dcnode-id="872" data-preserver-spaces="true"><span data-dcnode-id="873" instrument_node="">What is changing in the tax industry?</span></span></li><span data-dcnode-id="870" instrument_node=""> </span><li data-dcnode-id="867"><span data-dcnode-id="868" data-preserver-spaces="true"><span data-dcnode-id="869" instrument_node="">What skills are required for tax compliance and does the taxpayer have them?</span></span></li><span data-dcnode-id="866" instrument_node=""> </span><li data-dcnode-id="863"><span data-dcnode-id="864" data-preserver-spaces="true"><span data-dcnode-id="865" instrument_node="">How does the performance of the economic environment affect our tax compliance?</span></span></li><span data-dcnode-id="862" instrument_node=""> </span><li data-dcnode-id="859"><span data-dcnode-id="860" data-preserver-spaces="true"><span data-dcnode-id="861" instrument_node="">Can the taxpa
