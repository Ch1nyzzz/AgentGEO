</span><div data-dcnode-id="1476"><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Our comprehensive tax reform program must really make our tax system simpler, fairer and more efficient. While we laud the government efforts in pushing for tax reform, we still need to remind our legislators to prioritize and protect our small businesses. This is due to the fact that 99.52 percent of businesses in the country are micro, small and medium enterprises (MSMEs) which employ 63.19 percent of total workforce. A number of MSMEs are registered as sole proprietors with the Department of Trade and Industry.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">In an open letter to all legislators published and sent to Congress on May 2, 2020, we urged our legislators to end the injustice by legislating tax policy reforms which will help businesses adjust to the new normal and to fund the digital transformation of the Bureau of Internal Revenue (BIR).</span></p><div data-dcnode-id="2165" id="billboard_article"><span data-dcnode-id="2178" instrument_node="">

</span><h3 data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Disparity</span></h3><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2159" instrument_node="">Last week, we published another open letter to the president to veto some provisions of the proposed Corporate Recovery and Tax Incentives for Enterprises (CREATE) bill.</span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/files/2021/04/income-tax-04052021.jpg" title=""><noscript data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">&lt;img class="aligncenter size-full wp-image-320570" src="https://business.inquirer.net/files/2021/04/income-tax-04052021.jpg" alt="" width="872" height="764" srcset="https://business.inquirer.net/files/2021/04/income-tax-04052021.jpg 872w, https://business.inquirer.net/files/2021/04/income-tax-04052021-300x263.jpg 300w, https://business.inquirer.net/files/2021/04/income-tax-04052021-620x543.jpg 620w, https://business.inquirer.net/files/2021/04/income-tax-04052021-129x113.jpg 129w, https://business.inquirer.net/files/2021/04/income-tax-04052021-768x673.jpg 768w" sizes="(max-width: 872px) 100vw, 872px" /&gt;</span></noscript><img alt="" class="aligncenter size-full wp-image-320570 lazyloaded" data-dcnode-id="2156" data-sizes="(max-width: 872px) 100vw, 872px" data-src="https://business.inquirer.net/files/2021/04/income-tax-04052021.jpg" data-srcset="https://business.inquirer.net/files/2021/04/income-tax-04052021.jpg 872w, https://business.inquirer.net/files/2021/04/income-tax-04052021-300x263.jpg 300w, https://business.inquirer.net/files/2021/04/income-tax-04052021-620x543.jpg 620w, https://business.inquirer.net/files/2021/04/income-tax-04052021-129x113.jpg 129w, https://business.inquirer.net/files/2021/04/income-tax-04052021-768x673.jpg 768w" height="764" sizes="(max-width: 872px) 100vw, 872px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/files/2021/04/income-tax-04052021.jpg&amp;raw" srcset="https://business.inquirer.net/files/2021/04/income-tax-04052021.jpg 872w, https://business.inquirer.net/files/2021/04/income-tax-04052021-300x263.jpg 300w, https://business.inquirer.net/files/2021/04/income-tax-04052021-620x543.jpg 620w, https://business.inquirer.net/files/2021/04/income-tax-04052021-129x113.jpg 129w, https://business.inquirer.net/files/2021/04/income-tax-04052021-768x673.jpg 768w" width="872"></a></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Although it will lower the corporate income tax rate from 30 percent to 20 percent, some provisions will create disparity and undue tax advantage for nonindividual (corporations) over individual taxpayers (self-employed, professionals and employees) earning P5 million and above for taxable year 2021-2022. To wit:</span></p><div class="modal-body nofbia" data-dcnode-id="2121" data-word-count="1073" id="article-new-featured"><div data-dcnode-id="2149" id="anf-lbl"><span data-dcnode-id="2150" instrument_node="">FEATURED STORIES</span></div><div data-dcnode-id="2140" id="anf-box"><span data-dcnode-id="2148" instrument_node="">
</span><div data-dcnode-id="2146" id="anf-cat"><span data-dcnode-id="2147" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2145" instrument_node="">
</span><div data-dcnode-id="2142" id="anf-head"><a class="af-clicks" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346369/dominguez-new-us-led-owner-of-subic-shipyard-to-create-300-new-jobs-a-year/"><span data-dcnode-id="2144" instrument_node="">Dominguez: New US-led owner of Subic shipyard to create 300 new jobs a year</span></a></div><span data-dcnode-id="2141" instrument_node="">
</span></div><div data-dcnode-id="2131" id="anf-box"><span data-dcnode-id="2139" instrument_node="">
</span><div data-dcnode-id="2137" id="anf-cat"><span data-dcnode-id="2138" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2136" instrument_node="">
</span><div data-dcnode-id="2133" id="anf-head"><a class="af-clicks" data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346375/the-success-secret-of-corporate-giants-and-how-you-can-use-it-too/"><span data-dcnode-id="2135" instrument_node="">The success secret of corporate giants– and how you can use it, too</span></a></div><span data-dcnode-id="2132" instrument_node="">
</span></div><div data-dcnode-id="2122" id="anf-box"><span data-dcnode-id="2130" instrument_node="">
</span><div data-dcnode-id="2128" id="anf-cat"><span data-dcnode-id="2129" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2127" instrument_node="">
</span><div data-dcnode-id="2124" id="anf-head"><a class="af-clicks" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346210/robinsons-land-transfers-p5-9b-ortigas-building-to-reit-firm/"><span data-dcnode-id="2126" instrument_node="">Robinsons Land transfers P5.9B Ortigas building to REIT firm</span></a></div><span data-dcnode-id="2123" instrument_node="">
</span></div></div><p data-dcnode-id="2120"></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Under the TRAIN (Tax Reform Acceleration and Inclusion) law, individual taxpayers earning P3 million and below are considered small businesses which may avail themselves of the optional 8 percent in lieu of both income and percentage taxes. However, under the CREATE bill, small businesses are defined as corporations with net taxable income of P5 million and below and granted a lower corporate income tax of 20 percent.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Further, the TRAIN law imposes 35 percent to individual taxpayers who will earn and declare above P8 million compensation and/or net taxable income. See computation above which shows the tax advantage of nonindividual (corporations) over individual taxpayers from almost half a million to over P2 million for those with P5 million to P25 million net taxable income.</span></p><div class="ztoop" data-dcnode-id="2105"><span data-dcnode-id="2113" instrument_node="">
</span><div data-dcnode-id="2108" id="div-gpt-ad-pixel1"><span data-dcnode-id="2112" instrument_node="">
</span><span data-dcnode-id="2109" instrument_node="">
</span></div><div data-dcnode-id="2107" id="anyclip_2021"></div><span data-dcnode-id="2106" instrument_node="">
</span></div><p data-dcnode-id="2104"></p><span data-dcnode-id="2103" instrument_node="">
</span><h3 data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Theoretical justice</span></h3><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">In 2027, corporations regardless of net taxable income will be paying only 20 percent corporate income tax while individual taxpayers will still pay 35 percent for earnings above P8 million as they are classified as “ultra-rich” under the TRAIN law e.g., with P30 million net taxable income an individual taxpayer will pay P9.9 million personal income tax versus P6 million corporate income tax. That’s a lot of tax advantage which defies theoretical justice of a sound tax system.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Instead of providing separate tax relief for small businesses, we should create a ax egime for small businesses which will impose a flat tax rate and simplified tax compliance for all small businesses whether registered as a sole proprietor or a corporation with threshold set not on total assets but on annual gross sales to include those in ecommerce business which may have less asset value but high gross revenues e.g., P100-million ceiling at 10-percent flat tax based on gross in lieu of income and business taxes.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><h3 data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Custom-fit taxation</span></h3><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">A 10-percent flat tax will eliminate the unnecessary compliance costs and threat of BIR audit especially once the electronic invoicing has been implemented since it will be based on gross sales or revenues in lieu of income, business and other taxes.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Although our existing tax laws impose higher income and business taxes, most companies are paying barely 5 percent of their gross sales or revenues, notwithstanding the compliance costs and deficiency tax assessment during BIR audit.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Aside from the 10-percent flat tax, our legislators must also aim to broaden our taxpayer base and increase voluntary compliance from the informal sector, digital economy including startups by providing a custom-fit taxation which is simpler, fairer and more efficient for the BIR to collect taxes.</span></p><div data-dcnode-id="2069" id="billboard_article"><span data-dcnode-id="2082" instrument_node="">
</span><span data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">ADVERTISEMENT</span></span><span data-dcnode-id="2079" instrument_node="">
</span><div data-dcnode-id="2071" id="bb_box2"><span data-dcnode-id="2078" instrument_node="">
</span><div data-dcnode-id="2073" id="div-gpt-ad-mrec2"><span data-dcnode-id="2077" instrument_node="">
</span><span data-dcnode-id="2074" instrument_node="">
</span></div><span data-dcnode-id="2072" instrument_node="">
</span></div><span data-dcnode-id="2070" instrument_node="">
</span></div><p data-dcnode-id="2068"></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Here’s a brief discussion of the proposal:</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2060"><strong data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Marginal income earners.</span></strong><span data-dcnode-id="2061" instrument_node=""> Increase sales threshold for marginal income earners from P100,000 to P500,000, and impose fixed tax from P1,000 to P5,000 based on location, target market and years of operations to encourage all sari-sari stores, online sellers and those in the underground economy. Let them pay annually or quarterly and provide online access where they can just encode their sales and purchases for easy monitoring;</span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2055"><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Startups.</span></strong><span data-dcnode-id="2056" instrument_node=""> Provide a two-year tax exemption to all startups but must not be affiliated to any existing corporations or conglomerates to avoid abuse and unnecessary tax benefit to those who can afford to pay taxes already;</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2050"><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Small businesses.</span></strong><span data-dcnode-id="2051" instrument_node=""> Standardize the definition of a small business whether registered as sole proprietor or corporation, use sales as threshold (not asset value) e.g., P100 million and impose a flat tax; 10-percent tax for small businesses in lieu of all other taxes i.e., income, businesses etc.;</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2045"><strong data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Large taxpayers.</span></strong><span data-dcnode-id="2046" instrument_node=""> Implement the lowering of corporate income tax from 30 percent to 25 percent, and allow them to use 20 percent but under Optional Standard Deduction;</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2040"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">General tax amnesty.</span></strong><span data-dcnode-id="2041" instrument_node=""> Implement a general tax amnesty with provision on lifting of bank secrecy law for tax fraud cases so BIR can focus on high-risk, big time tax evaders.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">If the goal is to make our tax system simpler, fairer and more efficient, and to provide tax relief measure especially for small businesses during this pandemic, then it’s a no-brainer to lessen the burden of taxpayers while collecting much needed revenues from those who earn more.</span></p><div class="lfform-inquirer lfform-inquirer-horizontal form_inline norelated" data-dcnode-id="2035" style="max-width:100%;"><span data-dcnode-id="2036" instrument_node=""> </span></div><p data-dcnode-id="2034"></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Creating more business opportunities is the long-term impact of a genuine tax reform. It will attract more foreign direct investments, encourage more startups and hopefully, include the informal economy to better support them without the threat of high taxes and compliance costs.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">In the end, any tax policy reform must be supported by well-funded, technology-driven tax administration reform. Making it simple not just for the taxpayers, but also for the BIR to assess and collect taxes especially from the digital and new economy.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Needless to say, Congress must appropriate a significant budget to fund the digital transformation of the BIR. Given its limited budget and manpower, the BIR has exceeded its revenue collection target despite the threat of COVID-19. It has also provided several digital platforms for taxpayers to file and pay their taxes without leaving their offices or the comfort of their homes. INQ</span></p><span data-dcnode-id="2024" instrument_node="">
