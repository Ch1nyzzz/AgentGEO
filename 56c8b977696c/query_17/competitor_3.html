</span><div class="pb40" data-dcnode-id="1113"><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1377" instrument_node="">A business whose </span><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">aggregate turnover</span></strong><span data-dcnode-id="1374" instrument_node=""> in a financial year exceeds Rs.20 lakhs (or Rs.40 lakh for a supplier of goods) has to mandatorily register under </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cleartax.in/gst" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1373" instrument_node="">Goods and Services Tax</span></a><span data-dcnode-id="1371" instrument_node="">. This limit is set at Rs.10 lakhs for North Eastern and hilly states flagged as special category states. The article explores through the meaning of annual aggregate turnover, turnover in state with examples.</span><br data-dcnode-id="1370"></p><span data-dcnode-id="1368" instrument_node="">
</span><div data-dcnode-id="1367" id="ToC"></div><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1363"><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Latest Updates on GST registration</span></strong></p><span data-dcnode-id="1362" instrument_node="">
</span><p class="grey-block" data-dcnode-id="1332"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">21st December 2021</span></strong><br data-dcnode-id="1359"><span data-dcnode-id="1358" instrument_node="">From 1st January 2022, CBIC made the aadhaar authentication mandatory to apply for revocation of cancelled GST registration under the CGST Rule 23 in REG-21.</span><br data-dcnode-id="1357"><br data-dcnode-id="1356"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">29th August 2021</span></strong><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">Taxpayers can get extended time up to 30th September 2021 to revoke cancelled GST registration if the last date for the same falls between 1st March 2020 and 31st August 2021. It applies if the GST registration is cancelled under Section 29(2) clause (b) or (c) of the CGST Act via CGST notification number 34/2021 dated 29th August 2021.</span><br data-dcnode-id="1351"><br data-dcnode-id="1350"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">28th May 2021</span></strong><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">Due date to file application for revocation of cancellation of registration falling between 15th April 2021 up to 29th June 2021 is 30th June 2021. </span><br data-dcnode-id="1345"><br data-dcnode-id="1344"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">1st May 2021</span></strong><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">The time limit to take actions, reply or pass orders as given under Rule 9 of the CGST Rules, 2017 that falls between 1st May 2021 and 31st May 2021 has been extended up to 15th June 2021.</span><br data-dcnode-id="1339"><br data-dcnode-id="1338"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">5th March 2021</span></strong><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">The Search ARN Functionality for Registration, post-TRN Login has been enhanced for the taxpayers.</span><br data-dcnode-id="1333"></p><span data-dcnode-id="1331" instrument_node="">
</span><h2 data-dcnode-id="1328" id=""><span data-dcnode-id="1330" instrument_node="">What is Annual Aggregate Turnover?</span><span data-dcnode-id="1329" id="aggregateturnover"></span></h2><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1326" instrument_node="">As per GST law, “</span><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">aggregate turnover</span></strong><span data-dcnode-id="1323" instrument_node="">” refers to the aggregate value of all taxable supplies (excluding the value of inward supplies on which tax is payable by a person on reverse charge basis), exempt supplies, exports of goods or services or both and inter-state supplies of persons having the same Permanent Account Number, to be computed on an all-India basis but excludes Central tax, State tax, Union territory tax, Integrated tax and cess.&nbsp;</span><br data-dcnode-id="1322"></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1319" instrument_node="">The aggregate turnover computed for the entire financial year between April of a year up to March of next year is called annual aggregate turnover. In other words, it is the total turnover calculated at a PAN level (all GSTINs put together) being sum of the following:</span><br data-dcnode-id="1318"></p><span data-dcnode-id="1316" instrument_node="">
</span><ul data-dcnode-id="1307"><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Taxable sales value</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Exempt sales value</span></li><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Export of goods and services</span></li><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Interstate supplies by the business to its sister concern under the same PAN or interstate stock transfer or supplies between distinct persons under the same PAN.</span></li></ul><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1305" instrument_node="">However, the above sum excludes the tax components such as the Central tax, State tax, Union territory tax, Integrated tax and Cess. Further, the taxable value excludes those purchases where the person is required to pay tax under reverse charge. Note that the sales that are subject to reverse charge must continue to form part of the taxable supplies in aggregate turnover.</span><br data-dcnode-id="1304"></p><span data-dcnode-id="1302" instrument_node="">
</span><h2 data-dcnode-id="1299" id=""><span data-dcnode-id="1301" instrument_node="">Meaning of Turnover in State</span><span data-dcnode-id="1300" id="turnoverinstate"></span></h2><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1297" instrument_node="">Turnover in State is different from the aggregate turnover definition. It refers to the the aggregate value of all taxable and non-taxable supplies, including exempt supplies and exports of goods and/or services made within a State by a taxable person and inter-state supplies of goods and/or services made from the State by the said taxable person excluding taxes, if any charged under the CGST Act, SGST Act and the IGST Act, as the case may be.&nbsp;</span><br data-dcnode-id="1296"></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1293" instrument_node="">In other words, the turnover for a particular GSTIN at state-level including any inter-state supplies undertaken by that GSTIN.</span><br data-dcnode-id="1292"></p><span data-dcnode-id="1290" instrument_node="">
</span><h2 data-dcnode-id="1287" id=""><span data-dcnode-id="1289" instrument_node="">Example for Normal Category States under GST</span><span data-dcnode-id="1288" id="examplenormalstate"></span></h2><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Here’s an example to help you understand the concept of aggregate turnover.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">So Mr. A owns a tea estate with an annual turnover of Rs.1.60 crore by selling tea leaves. This activity is exempt from GST. However, Mr. A also supplies plastic bags along with his crop and charges separately for this. His turnover from the sale of plastic bags is Rs. 5 lakhs and we know that this transaction (sale of plastic bags) is chargeable to GST. In simple words, his taxable turnover is only Rs. 5 lakhs.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1279" instrument_node="">Going by the definition of aggregate turnover, Mr. A is required to register under GST because his </span><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">aggregate turnover</span></strong><span data-dcnode-id="1276" instrument_node=""> exceeds the threshold limit of Rs. 40 lakh. Further, Mr. A does not have the option to register as a </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cleartax.in/s/composition-scheme-under-gst" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1275" instrument_node="">composition dealer</span></a><span data-dcnode-id="1273" instrument_node=""> because this aggregate turnover exceeds the threshold limit of Rs.1.5 crore (Rs 75 lakhs for special category states).</span><br data-dcnode-id="1272"></p><span data-dcnode-id="1270" instrument_node="">
</span><h2 data-dcnode-id="1267" id=""><span data-dcnode-id="1269" instrument_node="">Example for Special Category States Under GST</span><span data-dcnode-id="1268" id="examplespecialstate"></span></h2><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Below is the list of states which are assigned special status under Goods and Services Tax Law:</span></p><span data-dcnode-id="1263" instrument_node="">
</span><ul data-dcnode-id="1240"><li data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Arunachal Pradesh</span></li><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Assam</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Jammu &amp; Kashmir</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Manipur</span></li><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Meghalaya</span></li><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Mizoram</span></li><li data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Nagaland</span></li><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Sikkim</span></li><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Tripura</span></li><li data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Himachal Pradesh</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Uttarakhand</span></li></ul><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">The threshold limit of aggregate turnover for all the above states has been kept at Rs. 10 lakh. So the same example will apply here too, but the numbers will get modified.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Let’s assume that the turnover of the farmer Mr. B living in Nagaland is Rs. 15 lakh from agriculture. His taxable turnover from the sale of plastic bags is only Rs. 50,000. Mr. B will still have to register under GST as his aggregate turnover exceeds the threshold limit of Rs. 10 lakh for special category states.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The Government may, at the request of a special category State and on the Council’s recommendations, increase the aggregate turnover referred to in the law from ten lakh rupees to such level, not exceeding twenty lakh rupees, and subject to such conditions and limitations, as may be prescribed in the CGST (Amendment) Act, 2018.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">As a result, the threshold limit for the states of Jammu and Kashmir, Arunachal Pradesh, Assam, Himachal Pradesh, Meghalaya, Sikkim, and Uttarakhand remains Rs.20 lakhs as of 1st January 2019, and Rs.10 lakhs for the states of Manipur, Mizoram, Nagaland, and Tripura.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h2 data-dcnode-id="1224" id=""><span data-dcnode-id="1226" instrument_node="">Reference of Aggregate Turnover across GST law</span><span data-dcnode-id="1225" id="referencegstlaw"></span></h2><span data-dcnode-id="1223" instrument_node="">
