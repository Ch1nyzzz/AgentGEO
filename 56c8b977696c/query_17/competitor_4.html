</span><h1 data-dcnode-id="1086"><b data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Tax Essentials For Small Businesses</span></b></h1><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">Tax season can be overwhelming for small business owners, but it’s important to understand the basics to make the most of your return.&nbsp;</span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" style="font-weight: 400;"><span data-dcnode-id="1080" instrument_node="">This article will overview key tax concepts for small businesses, including deductions, exemptions, and filing requirements. Then, with a little knowledge ahead of time, you’ll be ready to file your return confidently and get the most out of your business taxes.</span></span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" style="font-weight: 400;"><span data-dcnode-id="1076" instrument_node="">Starting a small business in Australia can be a great way to make money and be your boss, but it’s important to understand the tax requirements before you get started. This blog post will outline the basics of taxation for small businesses in Australia, including income tax rates, deductions, and GST.</span></span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" style="font-weight: 400;"><span data-dcnode-id="1072" instrument_node="">Did you know that you’re responsible for managing your </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/australian-taxation-law-for-small-businesses/"><span data-dcnode-id="1071" instrument_node="">tax affairs as a small business owner in Australia</span></a><span data-dcnode-id="1069" instrument_node="">? This can seem daunting, but it’s achievable with a little organisation and planning.&nbsp;</span></span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" style="font-weight: 400;"><span data-dcnode-id="1065" instrument_node="">In this blog post, we’ll outline some of the key tax essentials you need to be aware of as a small business owner. We’ll also provide some handy tips on how to stay on top of your tax obligations throughout the year.&nbsp;</span></span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" style="font-weight: 400;"><span data-dcnode-id="1061" instrument_node="">Small business owners have to deal with Australia’s paperwork and complex legal requirements. Filing your taxes correctly is one of the most important things you need to do as a small business owner, but it can be unclear where to start.&nbsp;</span></span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node="">This blog post will provide an overview of the Australian taxation system for small businesses and outline the most important things you need to know to file your taxes correctly. So if you’re looking for a guide to tax season, you’ve come to the right place!</span></span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">As a small business owner in Australia, tax time can seem daunting. But with the right information, it doesn’t have to be! This post will outline the key essentials you need to know about </span></span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/General/Tax-and-small-business/"><span data-dcnode-id="1050" style="font-weight: 400;"><span data-dcnode-id="1051" instrument_node="">Australian taxes for small businesses</span></span></a><span data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" style="font-weight: 400;"><span data-dcnode-id="1044" instrument_node="">We’ll cover everything from how to register for an ABN to what deductions you can claim. So whether you’re just starting out or you’re gearing up for tax time, read on for our top tips!</span></span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">Nearly every small business owner is responsible for managing their taxes. However, tax laws can be complicated and confusing.&nbsp;</span></span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" style="font-weight: 400;"><span data-dcnode-id="1036" instrument_node="">This guide provides a basic overview of the most important tax concepts </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/important-tax-tips-for-australian-small-businesses-in-2021/"><span data-dcnode-id="1035" instrument_node="">small business</span></a><span data-dcnode-id="1033" instrument_node=""> owners need to know. By understanding these essentials, you’ll better manage your tax obligations and avoid any costly mistakes.</span></span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" style="font-weight: 400;"><span data-dcnode-id="1029" instrument_node="">It’s important to be aware of the various tax essentials and deadlines of owning a business. In this blog post, we’ll outline some of the key things you need to know about Australian taxes so that you can stay on top of your paperwork and compliance obligations.&nbsp;</span></span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" style="font-weight: 400;"><span data-dcnode-id="1025" instrument_node="">We’ll also provide tips for making the tax filing process as straightforward as possible. So if you’re ready to learn more about Australian taxes, keep reading!</span></span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" style="font-weight: 400;"><span data-dcnode-id="1021" instrument_node="">Are you a small business owner who is confused about tax essentials? Do you know what you need to do to stay compliant and avoid penalties? If not, don’t worry – this blog post is for you.&nbsp;</span></span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" style="font-weight: 400;"><span data-dcnode-id="1017" instrument_node="">We’ll go over the most important things you need to know about taxes, including what kinds of taxes apply to your business, how to file your return, and more. So read on for helpful tax tips that will make filing your return a breeze!</span></span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node="">As a </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/taxation-tips-for-small-businesses-in-australia/"><span data-dcnode-id="1012" instrument_node="">small business owner</span></a><span data-dcnode-id="1010" instrument_node=""> in Australia, you must know the different tax requirements and obligations you need to meet. This handy guide provides an overview of the key essentials you need to know, from registering for GST to recording income and expenses.&nbsp;</span></span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" style="font-weight: 400;"><span data-dcnode-id="1006" instrument_node="">So if you’re looking to take some of the stress out of your tax planning, read on for our top tips!</span></span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">Let’s get started!</span></span></p><span data-dcnode-id="999" instrument_node="">
</span><h2 data-dcnode-id="996"><b data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Tips for Understanding &amp; Categorising Your Business Expenses</span></b></h2><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="991"><img alt="business partnership discussing using calculator review balance sheet annual with holding pen using laptop computer calculating budget audit integrity before investment concept" class="lazy-hidden alignnone size-full wp-image-1023" data-dcnode-id="994" data-lazy-type="image" data-src="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept.jpg" data-srcset="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept.jpg 1200w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-300x200.jpg 300w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-1024x683.jpg 1024w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-768x512.jpg 768w" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-1023" src="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept.jpg" alt="business partnership discussing using calculator review balance sheet annual with holding pen using laptop computer calculating budget audit integrity before investment concept" width="1200" height="800" srcset="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept.jpg 1200w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-300x200.jpg 300w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-1024x683.jpg 1024w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/business-partnership-discussing-using-calculator-review-balance-sheet-annual-with-holding-pen-using-laptop-computer-calculating-budget-audit-integrity-before-investment-concept-768x512.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" instrument_node="">According to data from the </span></span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abs.gov.au/"><span data-dcnode-id="986" style="font-weight: 400;"><span data-dcnode-id="987" instrument_node="">Australian Bureau of Statistics</span></span></a><span data-dcnode-id="983" style="font-weight: 400;"><span data-dcnode-id="984" instrument_node="">, almost 2.5 million businesses actively trading in the Australian economy. Around 97% of these businesses have less than 20 staff, which adds up to approximately 5 million workers employed by small businesses.</span></span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" style="font-weight: 400;"><span data-dcnode-id="980" instrument_node="">As such, it’s no exaggeration to say that small businesses are the lifeblood of our nation’s economy.&nbsp;</span></span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="976" instrument_node="">And to keep the economy moving, small business owners need to maximise their profits and control their cash flow. That means understanding all their financial matters, including recording and categorising </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/everything-about-small-business-taxes-in-australia/"><span data-dcnode-id="975" instrument_node="">small business expenses for tax deductions</span></a><span data-dcnode-id="973" instrument_node="">.</span></span></p><span data-dcnode-id="970" instrument_node="">
</span><h3 data-dcnode-id="967"><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">1. What Are Business Expenses?</span></b></h3><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" style="font-weight: 400;"><span data-dcnode-id="965" instrument_node="">Any necessary and ordinary costs incurred for a business to operate and trade are what is business expenses. If a business is operating to make a profit, these expenditures can be deducted at tax time, reducing the overall amount of taxable income you’re required to pay tax on.</span></span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">The ATO uses the following formula to work out how much of income is your taxable:</span></span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" style="font-weight: 400;"><span data-dcnode-id="957" instrument_node="">Assessable Income – Tax Deductions = Taxable Income</span></span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" style="font-weight: 400;"><span data-dcnode-id="953" instrument_node="">The Assessable Income part of this equation is generally all of the gross pre-tax income earned from carrying out a business.&nbsp;</span></span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" style="font-weight: 400;"><span data-dcnode-id="949" instrument_node="">It also includes all other forms of income from transactions intended to make a profit, such as capital gains, stock trading, crowdfunding, government payments, sharing economies, foreign income, and cryptocurrency investments.</span></span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.gov.au/finance/taxation/tax-deductions"><span data-dcnode-id="944" style="font-weight: 400;"><span data-dcnode-id="945" instrument_node="">Tax Deductions</span></span></a><span data-dcnode-id="941" style="font-weight: 400;"><span data-dcnode-id="942" instrument_node=""> will be able to be claimed for most of the day to day costs incurred when running a business for profit, not including GST. Therefore, your small business expenses need to be tracked and categorised to increase savings substantially.</span></span></p><span data-dcnode-id="939" instrument_node="">
</span><h3 data-dcnode-id="936"><b data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">2. Types Of Business Expenses</span></b></h3><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" style="font-weight: 400;"><span data-dcnode-id="934" instrument_node="">Business expenses are split into four main types: General, Operating, Capital, and Inventory. More information about each is below:</span></span></p><span data-dcnode-id="931" instrument_node="">
</span><h4 data-dcnode-id="928"><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">1. General Expenses</span></b></h4><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" style="font-weight: 400;"><span data-dcnode-id="926" instrument_node="">These are all general costs associated with managing and supervising your business. This includes expenditures for employing staff such as wages or salaries and super contributions.</span></span></p><span data-dcnode-id="923" instrument_node="">
</span><h4 data-dcnode-id="920"><b data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">2. Operating Expenses</span></b></h4><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" style="font-weight: 400;"><span data-dcnode-id="918" instrument_node="">This includes any of the necessary costs of running a business. Sometimes also known as revenue or working expenses, these include the costs of rent, utilities, marketing, maintenance, vehicles, and anything else required to operate the business.</span></span></p><span data-dcnode-id="915" instrument_node="">
</span><h4 data-dcnode-id="912"><b data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">3. Capital Expenses</span></b></h4><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" style="font-weight: 400;"><span data-dcnode-id="910" instrument_node="">Any assets purchased to make goods, provide services, or otherwise increase the growth or profits are categorised as capital expenses. This includes the purchase price of equipment, machinery, and furniture, as well as cash, vehicles, patents, manuals, and real estate.</span></span></p><span data-dcnode-id="907" instrument_node="">
</span><h4 data-dcnode-id="904"><b data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">4. Inventory Expenses</span></b></h4><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" style="font-weight: 400;"><span data-dcnode-id="902" instrument_node="">These are any direct and indirect expenses associated with inventory, such as storage, taxes, insurance, and shortages.</span></span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">The three main types of inventory are:</span></span></p><span data-dcnode-id="895" instrument_node="">
</span><ul data-dcnode-id="881"><span data-dcnode-id="894" instrument_node="">
</span><li aria-level="1" data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="892" style="font-weight: 400;"><span data-dcnode-id="893" instrument_node="">Raw Materials</span></span></li><span data-dcnode-id="890" instrument_node="">
</span><li aria-level="1" data-dcnode-id="887" style="font-weight: 400;"><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node="">Work-In-Progress</span></span></li><span data-dcnode-id="886" instrument_node="">
</span><li aria-level="1" data-dcnode-id="883" style="font-weight: 400;"><span data-dcnode-id="884" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node="">Finished Goods</span></span></li><span data-dcnode-id="882" instrument_node="">
</span></ul><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">While </span></span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/printfriendly.aspx%3Furl%3D/Business/Income-and-deductions-for-business/"><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">business inventory isn’t tax-deductible</span></span></a><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node="">, it can be used to reduce the gross receipts. This is why the total value of all trading inventory must be accounted for at the end of each Financial year.</span></span></p><span data-dcnode-id="871" instrument_node="">
</span><h3 data-dcnode-id="868"><b data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">3. Deductible Business Expenses (Partially Or Fully Deductible)</span></b></h3><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" style="font-weight: 400;"><span data-dcnode-id="866" instrument_node="">When it comes to the general costs incurred when running your business, the good news is that the vast majority of expenses can be offset to reduce your taxable income.&nbsp;</span></span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node="">That being said, some exceptions are only eligible for a partial reduction, whereas others are excluded outright.</span></span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">According to the ATO, business expenses can be claimed as tax deductions as long as:</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><ul data-dcnode-id="841"><span data-dcnode-id="854" instrument_node="">
</span><li aria-level="1" data-dcnode-id="851" style="font-weight: 400;"><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">They are related directly to earning income for the business</span></span></li><span data-dcnode-id="850" instrument_node="">
</span><li aria-level="1" data-dcnode-id="847" style="font-weight: 400;"><span data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" instrument_node="">You keep records to substantiate your claims</span></span></li><span data-dcnode-id="846" instrument_node="">
</span><li aria-level="1" data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="844" style="font-weight: 400;"><span data-dcnode-id="845" instrument_node="">They are solely for the business and not private use*</span></span></li><span data-dcnode-id="842" instrument_node="">
</span></ul><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">*If an expense is for a mixture of both business and private use, only the portion used for business can be claimed.</span></span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" style="font-weight: 400;"><span data-dcnode-id="835" instrument_node="">Below is a list of categories most businesses can claim as deductible business expenses.</span></span></p><span data-dcnode-id="832" instrument_node="">
</span><ul data-dcnode-id="770"><span data-dcnode-id="831" instrument_node="">
</span><li aria-level="1" data-dcnode-id="828" style="font-weight: 400;"><span data-dcnode-id="829" style="font-weight: 400;"><span data-dcnode-id="830" instrument_node="">Payroll, Salaries, &amp; Employee Benefits</span></span></li><span data-dcnode-id="827" instrument_node="">
</span><li aria-level="1" data-dcnode-id="824" style="font-weight: 400;"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">Rent or Mortgage</span></span></li><span data-dcnode-id="823" instrument_node="">
</span><li aria-level="1" data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" style="font-weight: 400;"><span data-dcnode-id="822" instrument_node="">Utilities</span></span></li><span data-dcnode-id="819" instrument_node="">
</span><li aria-level="1" data-dcnode-id="816" style="font-weight: 400;"><span data-dcnode-id="817" style="font-weight: 400;"><span data-dcnode-id="818" instrument_node="">Maintenance &amp; Repairs</span></span></li><span data-dcnode-id="815" instrument_node="">
</span><li aria-level="1" data-dcnode-id="812" style="font-weight: 400;"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="814" instrument_node="">Cars &amp; Other Motor Vehicle Expenses</span></span></li><span data-dcnode-id="811" instrument_node="">
</span><li aria-level="1" data-dcnode-id="808" style="font-weight: 400;"><span data-dcnode-id="809" style="font-weight: 400;"><span data-dcnode-id="810" instrument_node="">Communications, Internet &amp; Cloud storage</span></span></li><span data-dcnode-id="807" instrument_node="">
</span><li aria-level="1" data-dcnode-id="804" style="font-weight: 400;"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">Inventory &amp; Stock</span></span></li><span data-dcnode-id="803" instrument_node="">
</span><li aria-level="1" data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" style="font-weight: 400;"><span data-dcnode-id="802" instrument_node="">Licenses &amp; Permits</span></span></li><span data-dcnode-id="799" instrument_node="">
</span><li aria-level="1" data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" style="font-weight: 400;"><span data-dcnode-id="798" instrument_node="">Legal, Accounting, &amp; Professional Services</span></span></li><span data-dcnode-id="795" instrument_node="">
</span><li aria-level="1" data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" style="font-weight: 400;"><span data-dcnode-id="794" instrument_node="">Office Furniture, Equipment, &amp; Supplies</span></span></li><span data-dcnode-id="791" instrument_node="">
</span><li aria-level="1" data-dcnode-id="788" style="font-weight: 400;"><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">Marketing, Advertising, &amp; Sponsorship</span></span></li><span data-dcnode-id="787" instrument_node="">
</span><li aria-level="1" data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" style="font-weight: 400;"><span data-dcnode-id="786" instrument_node="">Software &amp; Subscription Services</span></span></li><span data-dcnode-id="783" instrument_node="">
</span><li aria-level="1" data-dcnode-id="780" style="font-weight: 400;"><span data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" instrument_node="">Insurance</span></span></li><span data-dcnode-id="779" instrument_node="">
</span><li aria-level="1" data-dcnode-id="776" style="font-weight: 400;"><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node="">Business Travel &amp; Accommodation</span></span></li><span data-dcnode-id="775" instrument_node="">
</span><li aria-level="1" data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" style="font-weight: 400;"><span data-dcnode-id="774" instrument_node="">Public relations</span></span></li><span data-dcnode-id="771" instrument_node="">
</span></ul><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" style="font-weight: 400;"><span data-dcnode-id="768" instrument_node="">While this is not an exhaustive list, it should give you a good idea of where to start. In addition, educating yourself about the most common expense categories for small businesses should make it much easier to determine what you can deduct at tax time.</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="762"><b data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">4. Non-Deductible Expenses</span></b></h3><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="759" style="font-weight: 400;"><span data-dcnode-id="760" instrument_node="">While most small business expenses are considered </span></span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/general/other-languages/in-detail/information-in-other-languages/deductions-for-small-business/"><span data-dcnode-id="757" style="font-weight: 400;"><span data-dcnode-id="758" instrument_node="">tax deductions</span></span></a><span data-dcnode-id="754" style="font-weight: 400;"><span data-dcnode-id="755" instrument_node="">, not all are allowable.</span></span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" style="font-weight: 400;"><span data-dcnode-id="751" instrument_node="">Some small business expenses that cannot be used to reduce taxable income include political contributions or lobbying, social memberships, and obviously any illegal activities. Some of the most common non-deductible business expenses are:</span></span></p><span data-dcnode-id="748" instrument_node="">
</span><ul data-dcnode-id="726"><span data-dcnode-id="747" instrument_node="">
</span><li aria-level="1" data-dcnode-id="744" style="font-weight: 400;"><span data-dcnode-id="745" style="font-weight: 400;"><span data-dcnode-id="746" instrument_node="">Fines or Penalties</span></span></li><span data-dcnode-id="743" instrument_node="">
</span><li aria-level="1" data-dcnode-id="740" style="font-weight: 400;"><span data-dcnode-id="741" style="font-weight: 400;"><span data-dcnode-id="742" instrument_node="">Expenses For Client Entertainment</span></span></li><span data-dcnode-id="739" instrument_node="">
</span><li aria-level="1" data-dcnode-id="736" style="font-weight: 400;"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">Gifts Not Connected to Earnings</span></span></li><span data-dcnode-id="735" instrument_node="">
</span><li aria-level="1" data-dcnode-id="732" style="font-weight: 400;"><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">GST Component of Expenses</span></span></li><span data-dcnode-id="731" instrument_node="">
</span><li aria-level="1" data-dcnode-id="728" style="font-weight: 400;"><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">Personal Expenses</span></span></li><span data-dcnode-id="727" instrument_node="">
</span></ul><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">Even though the business has paid for the expenses above, they’re considered non-deductible by the ATO.</span></span></p><span data-dcnode-id="721" instrument_node="">
</span><h2 data-dcnode-id="718"><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Small Business Tips For Your 2022 Business Tax Return&nbsp;</span></b></h2><span data-dcnode-id="717" instrument_node="">
</span><h3 data-dcnode-id="714"><b data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">1. Claim, claim, claim</span></b></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" style="font-weight: 400;"><span data-dcnode-id="712" instrument_node="">Even as we start to move into recovery mode, the financial outlay required to keep many small businesses up and to run in response to the COVID-19 pandemic has been huge.&nbsp;</span></span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" style="font-weight: 400;"><span data-dcnode-id="708" instrument_node="">From safety equipment to rising production costs, every small business in Australia has had to spend money to keep making money.&nbsp;</span></span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" style="font-weight: 400;"><span data-dcnode-id="704" instrument_node="">So when it comes to what tax deductions you can claim – if you have had to spend money on it to keep carrying on your business and it directly relates to earning your assessable income, you can generally deduct it.</span></span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="699" style="font-weight: 400;"><span data-dcnode-id="700" instrument_node="">The </span></span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/"><span data-dcnode-id="697" style="font-weight: 400;"><span data-dcnode-id="698" instrument_node="">ATO website</span></span></a><span data-dcnode-id="694" style="font-weight: 400;"><span data-dcnode-id="695" instrument_node=""> has a detailed list of goods and services you can claim, but some of the standout items for 2021 include:</span></span></p><span data-dcnode-id="692" instrument_node="">
</span><ul data-dcnode-id="674"><span data-dcnode-id="691" instrument_node="">
</span><li aria-level="1" data-dcnode-id="688" style="font-weight: 400;"><span data-dcnode-id="689" style="font-weight: 400;"><span data-dcnode-id="690" instrument_node="">COVID Safe personal protective equipment (PPE) gear for you, your staff, and your customers for use in your business</span></span></li><span data-dcnode-id="687" instrument_node="">
</span><li aria-level="1" data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" style="font-weight: 400;"><span data-dcnode-id="686" instrument_node="">Self-education for small business owners who have been upskilling for their role during lockdown</span></span></li><span data-dcnode-id="683" instrument_node="">
</span><li aria-level="1" data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" style="font-weight: 400;"><span data-dcnode-id="682" instrument_node="">New technology is required to allow you to continue to operate your business and replicate complex office environments while working from home</span></span></li><span data-dcnode-id="679" instrument_node="">
</span><li aria-level="1" data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" style="font-weight: 400;"><span data-dcnode-id="678" instrument_node="">Small business accounting fees</span></span></li><span data-dcnode-id="675" instrument_node="">
</span></ul><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" style="font-weight: 400;"><span data-dcnode-id="672" instrument_node="">The Government’s Instant Asset Write off and Temporary Full Expensing schemes in place during FY21 also allow you to claim an upfront tax deduction for most assets, such as furniture and computer equipment, instead of depreciating over several years. Visit the ATO website for more details, or contact your tax accountant to discuss your situation.</span></span></p><span data-dcnode-id="669" instrument_node="">
</span><h3 data-dcnode-id="666"><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">2. Do you declare Job Keeper and Job Seeker?</span></b></h3><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="664" instrument_node="">Like 2020, </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/"><span data-dcnode-id="663" instrument_node="">lodging your tax return</span></a><span data-dcnode-id="661" instrument_node=""> this year is slightly more complex than in normal years with the introduction of various government support measures for small businesses in response to COVID-19.&nbsp;</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" style="font-weight: 400;"><span data-dcnode-id="657" instrument_node="">However, it’s pretty straightforward when it comes to claims – you must declare any Job Keeper and Job Seeker payments as income.&nbsp;</span></span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" style="font-weight: 400;"><span data-dcnode-id="653" instrument_node="">For more information about incorporating the COVID-19 financial packages into your FY2020/21 tax return, check out the ATO’s handy guide.&nbsp;</span></span></p><span data-dcnode-id="650" instrument_node="">
</span><h3 data-dcnode-id="647"><b data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">3. Unpaid invoices can work in your favour</span></b></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" style="font-weight: 400;"><span data-dcnode-id="645" instrument_node="">If you have unpaid invoices that your customers cannot pay (which is not uncommon given the spate of lockdowns many small businesses have had to endure), then the good news is there’s a chance you can write those off as a bad debt.</span></span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" style="font-weight: 400;"><span data-dcnode-id="641" instrument_node="">‘Bad debt’ refers to any unpaid invoices you might have, where you are confident those outstanding invoices are not going to be paid, and you have made several attempts to redeem payment.&nbsp;</span></span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" style="font-weight: 400;"><span data-dcnode-id="637" instrument_node="">Writing off bad debts can reduce your taxable income; however, as always, it’s best to chat with your business tax accountant about your specific circumstances and how to write off bad debts.</span></span></p><span data-dcnode-id="634" instrument_node="">
</span><h3 data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">4. Boozy lunches are (still) not a tax write off</span></b></h3><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" style="font-weight: 400;"><span data-dcnode-id="629" instrument_node="">Thinking you can sneak in some pub lunches on your small business tax return this year? Think again. Although it might be tempting to lean into some ‘creative accounting’ at tax time, it’s important to play by the rules regarding what you can claim as a small business write off.&nbsp;</span></span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" style="font-weight: 400;"><span data-dcnode-id="625" instrument_node="">Aside from the penalties (which can incur fines of up to $360,000 and jail time in some cases), you must also bear in mind that you have a business and staff to consider.&nbsp;</span></span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" style="font-weight: 400;"><span data-dcnode-id="621" instrument_node="">It’s a good idea to check what you can and cannot claim, but some of the more common mistakes made by small business owners include claiming items such as:</span></span></p><span data-dcnode-id="618" instrument_node="">
</span><ul data-dcnode-id="596"><span data-dcnode-id="617" instrument_node="">
</span><li aria-level="1" data-dcnode-id="614" style="font-weight: 400;"><span data-dcnode-id="615" style="font-weight: 400;"><span data-dcnode-id="616" instrument_node="">Client lunches or dinners</span></span></li><span data-dcnode-id="613" instrument_node="">
</span><li aria-level="1" data-dcnode-id="610" style="font-weight: 400;"><span data-dcnode-id="611" style="font-weight: 400;"><span data-dcnode-id="612" instrument_node="">Personal UBER or taxi fares</span></span></li><span data-dcnode-id="609" instrument_node="">
</span><li aria-level="1" data-dcnode-id="606" style="font-weight: 400;"><span data-dcnode-id="607" style="font-weight: 400;"><span data-dcnode-id="608" instrument_node="">Uniform dry cleaning for non-uniform items</span></span></li><span data-dcnode-id="605" instrument_node="">
</span><li aria-level="1" data-dcnode-id="602" style="font-weight: 400;"><span data-dcnode-id="603" style="font-weight: 400;"><span data-dcnode-id="604" instrument_node="">Luxury bags posing as ‘laptop bags’&nbsp;</span></span></li><span data-dcnode-id="601" instrument_node="">
</span><li aria-level="1" data-dcnode-id="598" style="font-weight: 400;"><span data-dcnode-id="599" style="font-weight: 400;"><span data-dcnode-id="600" instrument_node="">Vehicle costs over 5,000km without a logbook</span></span></li><span data-dcnode-id="597" instrument_node="">
</span></ul><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="592"><b data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Tax Deductions And Write-Offs For Your Small Business</span></b></h2><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="587"><img alt="businessman with financial concerns" class="lazy-hidden alignnone size-full wp-image-1021" data-dcnode-id="590" data-lazy-type="image" data-src="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns.jpg" data-srcset="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns.jpg 1200w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-300x200.jpg 300w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-1024x683.jpg 1024w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-768x512.jpg 768w" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1200"><noscript data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-1021" src="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns.jpg" alt="businessman with financial concerns" width="1200" height="800" srcset="https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns.jpg 1200w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-300x200.jpg 300w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-1024x683.jpg 1024w, https://www.taxwarehouse.com.au/wp-content/uploads/2022/01/businessman-with-financial-concerns-768x512.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></p><span data-dcnode-id="586" instrument_node="">
</span><h3 data-dcnode-id="583"><b data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">1. Claiming the instant business asset write-off</span></b></h3><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="580" style="font-weight: 400;"><span data-dcnode-id="581" instrument_node="">This is a rule that may allow you to </span></span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/Business/Depreciation-and-capital-expenses-and-allowances/Simpler-depreciation-for-small-business/Instant-asset-write-off/"><span data-dcnode-id="578" style="font-weight: 400;"><span data-dcnode-id="579" instrument_node="">claim eligible business assets</span></span></a><span data-dcnode-id="575" style="font-weight: 400;"><span data-dcnode-id="576" instrument_node="">, like vehicles, machinery and equipment in the year of expenditure.</span></span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">If your business meets the eligibility tests, you may be able to claim asset purchases in your tax return for 2021. This is provided they are first used or installed and ready for use within the periods required by the ATO.</span></span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" style="font-weight: 400;"><span data-dcnode-id="568" instrument_node="">There may be time to make purchases for your business and claim the eligible amount against your income in that year. However, not every purchase or expenditure may qualify, and the rules are complex, so you’ll need to seek your independent taxation advice before buying the asset.</span></span></p><span data-dcnode-id="565" instrument_node="">
</span><h3 data-dcnode-id="562"><b data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">2. Claiming depreciation of business assets</span></b></h3><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" style="font-weight: 400;"><span data-dcnode-id="560" instrument_node="">Tax deductions are generally not available immediately (except in special conditions like the instant asset write-off – see above.) Rather, the asset’s cost is claimed over time, reflecting its decline in value.&nbsp;</span></span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" instrument_node="">This is commonly referred to as tax depreciation. Tax depreciation is complex and different rules can apply, depending on the type of asset and its use. In addition, certain small business entities may also elect to use the simplified depreciation rules to work out their tax depreciation claim.</span></span></p><span data-dcnode-id="553" instrument_node="">
</span><h3 data-dcnode-id="550"><b data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">3. Prepaid expenses</span></b></h3><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" style="font-weight: 400;"><span data-dcnode-id="548" instrument_node="">Running your own business can be expensive, but you may be able to claim some running expenses as tax deductions – including ones you pay for ahead of time.&nbsp;</span></span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" style="font-weight: 400;"><span data-dcnode-id="544" instrument_node="">Prepaying some expenses before 30 June can increase your allowable deductions for the financial year they are paid. Eligible expenses include a service period of 12 months or less, for example, annual policies, utility bills or professional subscriptions.&nbsp;</span></span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" instrument_node="">Keep in mind that if you claim them this year, you won’t be able to claim them next year, meaning you may have more tax to pay next year.</span></span></p><span data-dcnode-id="537" instrument_node="">
</span><h3 data-dcnode-id="534"><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">4. Business account and loan expenses</span></b></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" style="font-weight: 400;"><span data-dcnode-id="532" instrument_node="">It would be best to consider whether you can claim the fees and interest from your business accounts and loans around tax time.</span></span></p><span data-dcnode-id="529" instrument_node="">
</span><h3 data-dcnode-id="526"><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">5. Deductions for personal super contributions</span></b></h3><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" style="font-weight: 400;"><span data-dcnode-id="524" instrument_node="">If you’re aged under 751, you may be able to claim a tax deduction for personal super contributions made to an eligible super fund.&nbsp;</span></span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" style="font-weight: 400;"><span data-dcnode-id="520" instrument_node="">Those aged 67 and 74 need to meet the work test to contribute, which means you need to be employed for at least 40 hours over 30 consecutive days during the financial year.</span></span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" style="font-weight: 400;"><span data-dcnode-id="516" instrument_node="">From 1 July 2019, if you are aged 67 to 74 (measured at the time of the contribution), you may be able to continue making voluntary contributions for a further 12 months from the end of the financial year in which you last met the required work test, due to the work test exemption.&nbsp;</span></span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" style="font-weight: 400;"><span data-dcnode-id="512" instrument_node="">To qualify to make contributions under the work test exemption, your total superannuation balance (just before the financial year of contribution) must be less than $300,000. Once you have used the work test exemption for a financial year, it cannot be used again in the future.</span></span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="507" style="font-weight: 400;"><span data-dcnode-id="508" instrument_node="">When claiming a personal superannuation deduction for the financial year, it’s important to remember that the combined total of your superannuation guarantee payments, salary sacrificed amounts, and your </span></span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cpaaustralia.com.au/tools-and-resources/taxation/tax-tips/tax-tips-for-employees-and-contractors"><span data-dcnode-id="505" style="font-weight: 400;"><span data-dcnode-id="506" instrument_node="">personal tax-deductible contributions</span></span></a><span data-dcnode-id="502" style="font-weight: 400;"><span data-dcnode-id="503" instrument_node=""> do not exceed $25,000 in a financial year or extra tax will apply.</span></span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" style="font-weight: 400;"><span data-dcnode-id="499" instrument_node="">To make a personal tax-deductible contribution, you need to submit a valid ‘Notice of intent to claim or vary a deduction for personal super contributions’ form to your super fund within the prescribed time limits and receive an acknowledgment for a valid notice from the fund in writing. Refer to the ATO website if you intend to claim a tax deduction for personal contributions.</span></span></p><span data-dcnode-id="496" instrument_node="">
</span><h3 data-dcnode-id="493"><b data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">6. Other deductions</span></b></h3><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" style="font-weight: 400;"><span data-dcnode-id="491" instrument_node="">If you have been recently working at home due to the coronavirus, you may be entitled to claim tax deductions for expenses related to generating your income.&nbsp;</span></span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" style="font-weight: 400;"><span data-dcnode-id="487" instrument_node="">There are several criteria to consider before </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxwarehouse.com.au/get-refund/"><span data-dcnode-id="486" instrument_node="">claiming an amount in your tax return</span></a><span data-dcnode-id="484" instrument_node="">; for instance, you should consider whether you can claim the temporary ATO approved “shortcut method” (of 80 cents per hour for all additional running expenses) for the period 1 July 2020 until 30 June 2021.&nbsp;</span></span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" style="font-weight: 400;"><span data-dcnode-id="480" instrument_node="">Other calculation methods may also be acceptable and more appropriate to your circumstances. However, it would be best to consider which method is best for you and the criteria required to claim a deduction. Further information is available on the ATO website.</span></span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" style="font-weight: 400;"><span data-dcnode-id="476" instrument_node="">You pay many other expenses to keep your business running or help you earn business income, which may be tax-deductible. You can find more information about claimable deductions on the ATO website or by speaking to an accountant or tax adviser.</span></span></p><span data-dcnode-id="473" instrument_node="">
</span><h2 data-dcnode-id="470"><b data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Small Business Accounting Tips For Managing Your Cash Flow&nbsp;&nbsp;&nbsp;</span></b></h2><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" style="font-weight: 400;"><span data-dcnode-id="468" instrument_node="">Developing good cash flow management habits is crucial to the success of any business – whether it’s a start-up, established small business (SME) or big business.&nbsp;</span></span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" style="font-weight: 400;"><span data-dcnode-id="464" instrument_node="">Cash management must be a top priority for small business owners. You’ll find yourself in deep water if you have insufficient cash flow. This is a business risk you want to avoid.&nbsp;</span></span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" style="font-weight: 400;"><span data-dcnode-id="460" instrument_node="">Here are our top small business accounting tips to help businesses manage their cash flow for success.&nbsp;</span></span></p><span data-dcnode-id="457" instrument_node="">
</span><h3 data-dcnode-id="454"><b data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Rule 1: Never be too busy to invoice</span></b></h3><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" style="font-weight: 400;"><span data-dcnode-id="452" instrument_node="">Running a small business from day to day can be time-consuming, and it’s easy to let paperwork (whether it’s physical or digital) pile up. But if you’re not invoicing on time, you’re not getting paid on time or generating the revenue to support your business goals.</span></span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" style="font-weight: 400;"><span data-dcnode-id="448" instrument_node="">Tip: Use invoicing software that triggers an invoice to be sent when a product or service is delivered and sends a reminder before the due date if needed. An alert can also be programmed to tell you when someone doesn’t pay on time.&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="445" instrument_node="">
</span><h3 data-dcnode-id="442"><b data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Rule 2: Always have a cash reserve&nbsp;</span></b></h3><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="435"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rba.gov.au/publications/bulletin/2021/mar/australias-economic-recovery-and-access-to-small-business-finance.html"><span data-dcnode-id="439" style="font-weight: 400;"><span data-dcnode-id="440" instrument_node="">Having a cash reserve</span></span></a><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node=""> is a must when running an SME business. At any moment, an unexpected personal, local, or global crisis could send your small business into a tailspin. So, having a cash reserve to help protect your small business could be vital to its survival.&nbsp;</span></span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" style="font-weight: 400;"><span data-dcnode-id="433" instrument_node="">Part of managing your cash flow is making sure you’re covered in case of an emergency. Therefore make sure you save those extra dollars and don’t touch your business savings account unless you absolutely need to.</span></span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" style="font-weight: 400;"><span data-dcnode-id="429" instrument_node="">Tip: If you hit a rough patch with your cash flow, consider applying for a small business loan. You can use your cash reserve to pay it back later if necessary, but if you use up your reserve and your cash flow situation looks bad, getting a business loan down the track could be harder.</span></span></p><span data-dcnode-id="426" instrument_node="">
</span><h3 data-dcnode-id="423"><b data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Rule 3: Keep your bookkeeping meticulous, no matter what</span></b></h3><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" style="font-weight: 400;"><span data-dcnode-id="421" instrument_node="">Having immaculate accounting records can keep you out of trouble and make it easy to resolve issues if questions are ever raised about your cash management. If bookkeeping isn’t your thing, use accounting software and hire out the tricky bits, but don’t let your record-keeping slide.</span></span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">Tip: Remember that if you use a business credit card to pay for anything, it doesn’t impact your books until you pay the credit card bill. Don’t make the mistake of double-debiting your books!</span></span></p><span data-dcnode-id="414" instrument_node="">
</span><h3 data-dcnode-id="411"><b data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Rule 4: Be nice to your customers, but not too nice</span></b></h3><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" style="font-weight: 400;"><span data-dcnode-id="409" instrument_node="">Being too lenient with your customers can lead to putting yourself in an unnecessary cash crunch.&nbsp;</span></span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" style="font-weight: 400;"><span data-dcnode-id="405" instrument_node="">Carrying a balance for a customer weakens your cash flow, so make sure you send them an invoice, follow up and follow up again until you get paid. Australia makes payment terms part of contract law, so the only one preventing you from getting paid is you if you aren’t sending out invoices promptly.</span></span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" style="font-weight: 400;"><span data-dcnode-id="401" instrument_node="">Tip: You don’t have to be mean, but you can’t afford to be a pushover. Track your accounts receivable turnover and have a plan in place for aggressive pursuit of payments owed if necessary.</span></span></p><span data-dcnode-id="398" instrument_node="">
</span><h3 data-dcnode-id="395"><b data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Rule 5: Don’t mix business and personal finances&nbsp;</span></b></h3><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="392" style="font-weight: 400;"><span data-dcnode-id="393" instrument_node="">If you invest your own money in </span></span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationwidesuper.com.au/how-to-start-a-small-business-in-australia-your-6-step-guide/"><span data-dcnode-id="390" style="font-weight: 400;"><span data-dcnode-id="391" instrument_node="">starting or running your small business</span></span></a><span data-dcnode-id="387" style="font-weight: 400;"><span data-dcnode-id="388" instrument_node="">, make sure you only invest what you can afford. Your small business may succeed or fail, but protecting your personal finances should always take priority.</span></span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" style="font-weight: 400;"><span data-dcnode-id="384" instrument_node="">Tip: Have a completely separate business banking savings account and business debit card, or small business credit card, for your business. This will keep your business transactions separate from your own money and will help you track how your business cash flow is doing.</span></span></p><span data-dcnode-id="381" instrument_node="">
</span></div><span data-dcnode-id="379" instrument_node="">
