</span><h1 class="entry-title" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Recent Regulation Changes</span></h1><span data-dcnode-id="766" instrument_node="">
</span></div><span data-dcnode-id="764" instrument_node="">
</span><div class="et_pb_title_featured_container" data-dcnode-id="761"><span class="et_pb_image_wrap" data-dcnode-id="762"><img alt="" class="et_multi_view_hidden_image" data-dcnode-id="763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tax.newmexico.gov/all-nm-taxes/recent-regulation-changes&amp;raw" title="Recent Regulation Changes"></span></div><span data-dcnode-id="760" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="574"><span data-dcnode-id="758" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="576"><h2 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Regulations are written statements of general application intended to help us all interpret and apply the statutes to which they relate.</span></h2><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="754" instrument_node="">This section identifies&nbsp;recently filed regulations. The listing below is organized by tax act followed by the regulation</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">number(s) for recently filed regulations under that act. The links below will lead you to the corresponding tax act. Once you open the tax act you must conduct a search for the regulation number that you are interested in viewing.</span></p><span data-dcnode-id="750" instrument_node="">
</span><h3 data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">Corporate Income and Franchise Tax Act – </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tax.newmexico.gov/all-nm-taxes/wp-content/uploads/sites/9/2021/03/Corporate-Income-and-Franchise-Tax-Act.pdf" rel="attachment noopener wp-att-9801" target="_blank"><span data-dcnode-id="748" instrument_node="">Click Here</span></a></h3><span data-dcnode-id="745" instrument_node="">
