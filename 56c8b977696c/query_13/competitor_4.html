</span><div class="u-mb2-0" data-dcnode-id="485" id="post-content"><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1161"><a class="button center button--full-width" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/2022-state-tax-reform/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">State Legislatures Take Up Tax Reform in 2022 </span></strong></a></p><span data-dcnode-id="1160" instrument_node="">
</span><h2 data-dcnode-id="1157"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Key Findings</span></strong></h2><span data-dcnode-id="1156" instrument_node="">
</span><ul data-dcnode-id="1139"><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Twenty-one states and the District of Columbia had significant tax changes take effect on January 1, 2022</span></li><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Five states (Arizona, Arkansas, Louisiana, North Carolina, and Oklahoma) cut individual income taxes effective January 1. The District of Columbia was the only jurisdiction to increase income taxes.</span></li><span data-dcnode-id="1149" instrument_node="">
</span><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Four states (Arkansas, Louisiana, Nebraska, and Oklahoma) saw corporate income tax rates decrease. Florida is the only state to increase corporate income tax rates, as a temporary reduction expired.</span></li><span data-dcnode-id="1146" instrument_node="">
</span><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Five states (Arizona, Colorado, Georgia, Illinois, and Oregon) implemented a pass-through entity election to serve as a workaround to the federal state and local tax (SALT) deduction cap.</span></li><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Iowa is phasing out its inheritance tax, while Maryland and Washington face litigation over new taxes on digital advertising and capital gains income respectively.</span></li><span data-dcnode-id="1140" instrument_node="">
</span></ul><span data-dcnode-id="1138" instrument_node="">
</span><h2 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Introduction</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1134" instrument_node="">States, as Justice Louis Brandeis once wrote, are the laboratories of democracy,</span><a data-dcnode-id="1131" href="#_ftn1" name="_ftnref1"><sup data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">[1]</span></sup></a><span data-dcnode-id="1130" instrument_node=""> and those laboratories have been remarkably busy in recent years as, 90 years since Justice Brandeis coined the phrase, states continue to produce unique responses to policy challenges and opportunities.&nbsp;</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">As the nation enters 2022, 21 states and the District of Columbia have significant tax changes taking effect. Some states have chosen to respond to budget surpluses associated with the pandemic recovery by enacting individual and </span><a class="tooltip__anchor" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/corporate-income-tax-cit/" id="anchor71997"><span data-dcnode-id="1126" instrument_node="">corporate income tax</span></a><span data-dcnode-id="1124" instrument_node=""> (CIT) cuts. Other states, uncertain as to the impact of the pandemic on state revenue, opted to raise taxes. Some states will implement tax changes adopted by elected representatives while others will implement changes adopted through ballot measures.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1121" instrument_node="">Among the more novel tax policy “experiments” to be implemented in 2022 is Maryland’s first-in-the-nation digital advertising tax. Meanwhile, five new states will join the list of those that allow </span><a class="tooltip__anchor" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/pass-through-business/" id="anchor73696"><span data-dcnode-id="1120" instrument_node="">pass-through business</span></a><span data-dcnode-id="1118" instrument_node="">es to be taxed at the entity level to sidestep federal limits on </span><a class="tooltip__anchor" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/salt-deduction/" id="anchor75467"><span data-dcnode-id="1117" instrument_node="">state and local tax (SALT) deduction</span></a><span data-dcnode-id="1115" instrument_node="">s. And Washington is attempting to implement a 7 percent </span><a class="tooltip__anchor" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/capital-gains-tax/" id="anchor71993"><span data-dcnode-id="1114" instrument_node="">capital gains tax</span></a><span data-dcnode-id="1112" instrument_node=""> under a constitution which defines income as a form of property and allows no property to be taxed at a rate greater than 1 percent.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">All 22 jurisdictions with significant changes are highlighted below.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1106" instrument_node="">In addition to the tax changes mentioned here, many states will see automatic adjustments to a range of tax rates, from inflation-indexing of gas taxes or income tax rates and brackets to formula-driven adjustments to unemployment insurance tax rates. Some revisions adopted in 2021 legislative sessions will start at a later date (often July 1st, the beginning of the fiscal year in most states), while a substantial increase in New York’s individual and CIT rates was implemented retroactive to 2021.</span><a data-dcnode-id="1104" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="1105" instrument_node="">[2]</span></a></p><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1099"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Arizona</span></strong></h2><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Arizona’s 2022 tax changes are among the nation’s most complex, as they involve—among other things—the unwinding of a prior ballot measure. Proposition 208 (2020) had created a 3.5 percent high earners tax atop the state’s existing 4.5 percent top marginal income tax rate, functionally yielding a new top rate of 8 percent, with the additional proceeds earmarked for education. Lawmakers effectively undid the ratification through legislation, lowering the base rates to ensure that the combined top rate never exceeded 4.5 percent. They simultaneously adopted revenue triggers that could create a lower, single-rate tax.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1094" instrument_node="">Senate Bill 1828 would have started the state’s conversion from a graduated individual income tax to a flat individual income tax on January 1, 2022.</span><a data-dcnode-id="1092" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="1093" instrument_node="">[3]</span></a><span data-dcnode-id="1091" instrument_node=""> The transition would have initially collapsed the four current </span><a class="tooltip__anchor" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/tax-brackets/" id="anchor75149"><span data-dcnode-id="1090" instrument_node="">tax bracket</span></a><span data-dcnode-id="1088" instrument_node="">s into two. Single tax filers with </span><a class="tooltip__anchor" data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/taxable-income/" id="anchor75152"><span data-dcnode-id="1087" instrument_node="">taxable income</span></a><span data-dcnode-id="1085" instrument_node=""> up to $27,272 (double if filing jointly) would have been taxed at a rate of 2.55 percent. Any taxable income exceeding that amount would have been taxed at a rate of 2.98 percent. Pending revenue triggers, the tax would eventually have been reduced to 2.5 percent, regardless of income level. However, enough signatures were gathered via petition that voters will now be required to approve the flat tax via ballot measure (Proposition 307) in the November 2022 election. In the meantime, implementation of S.B. 1828 has been suspended.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1082" instrument_node="">Pending the outcome of Proposition 307, Arizona’s top marginal rate will be capped at 4.5 percent, even though a final decision on Proposition 208 is still pending judicial review.</span><a data-dcnode-id="1080" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="1081" instrument_node="">[4]</span></a><span data-dcnode-id="1079" instrument_node=""> Since the Arizona Supreme Court refused to suspend the law</span><a data-dcnode-id="1077" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="1078" instrument_node="">[5]</span></a><span data-dcnode-id="1076" instrument_node=""> while a lower court adjudicates details pertaining to the measure’s revenue allocation, the </span><a class="tooltip__anchor" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/surtax/" id="anchor87411"><span data-dcnode-id="1075" instrument_node="">surtax</span></a><span data-dcnode-id="1073" instrument_node=""> remains in effect. Therefore, policymakers enacted S.B. 1827, to counteract the effects of Proposition 208 by automatically reducing the top marginal </span><a class="tooltip__anchor" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/individual-income-tax/" id="anchor74523"><span data-dcnode-id="1072" instrument_node="">individual income tax</span></a><span data-dcnode-id="1070" instrument_node=""> rate by an amount that would keep both the surtax and the top rate combined from exceeding 4.5 percent.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1067" instrument_node="">Finally, under provisions of H.B. 2838,</span><a data-dcnode-id="1064" href="#_ftn6" name="_ftnref6"><sup data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">[6]</span></sup></a><span data-dcnode-id="1063" instrument_node=""> Arizona will allow partnerships, limited liability companies (LLCs), and S corporations to pay a 4.5 percent tax at the entity level instead of having all business-related income pass through to the individual income tax. The law was passed as a SALT deduction cap workaround.</span><a data-dcnode-id="1061" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="1062" instrument_node="">[7]</span></a></p><span data-dcnode-id="1059" instrument_node="">
</span><h2 data-dcnode-id="1056"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Arkansas</span></strong></h2><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">As a part of reforms begun in 2019,</span><a data-dcnode-id="1052" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="1053" instrument_node="">[8]</span></a><span data-dcnode-id="1051" instrument_node=""> Arkansas’s CIT rate decreased from 6.2 percent to 5.9 percent on January 1, 2022. This is the second of two corporate rate reductions legislated under Act 822.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Arkansas’s top individual income tax rate will decline from 5.9 percent to 5.5 percent as a result of legislation passed during the state’s December 2021 special session.</span><a data-dcnode-id="1046" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="1047" instrument_node="">[9]</span></a><span data-dcnode-id="1045" instrument_node=""> Arkansas is unique in having three different tax rate schedules depending on income level, and in 2022, the rate of nearly every intermediate tax bracket was also reduced as legislators voted to collapse the two lower tax tables into one.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><h2 data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">California</span></strong></h2><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1038" instrument_node="">Beginning January 1, 2022, California’s cannabis cultivation taxes increased to reflect an adjustment for inflation as required under the Cannabis Tax Law. Flowers are now taxed at a rate of $10.08 per dry-weight ounce; leaves are taxed at a rate of $3.00 per dry-weight ounce; and fresh cannabis plants are taxed at $1.41 per ounce.</span><a data-dcnode-id="1036" href="#_ftn10" name="_ftnref10"><span data-dcnode-id="1037" instrument_node="">[10]</span></a><span data-dcnode-id="1035" instrument_node=""> Prior to the New Year, flowers were taxed at a rate of $9.65 per dry-weight ounce; leaves at $2.87 per dry-weight ounce; and fresh cannabis plants at $1.35 per ounce.</span><a data-dcnode-id="1033" href="#_ftn11" name="_ftnref11"><span data-dcnode-id="1034" instrument_node="">[11]</span></a></p><span data-dcnode-id="1031" instrument_node="">
</span><h2 data-dcnode-id="1028"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Colorado</span></strong></h2><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">On June 23, 2021, Governor Jared Polis (D) signed H.B. 1311,</span><a data-dcnode-id="1024" href="#_ftn12" name="_ftnref12"><span data-dcnode-id="1025" instrument_node="">[12]</span></a><span data-dcnode-id="1023" instrument_node=""> adopting the Finnegan Rule for determining which affiliated companies are considered part of a unitary group for corporate income purposes. Colorado is a combined reporting state, which means that the gains and losses of all taxable affiliated companies are combined on a single return, but under the Finnegan Rule, it will no longer be necessary that each entity included in the joint return have its own nexus with the state of Colorado, as was the case under the Joyce Rule.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1020" instrument_node="">Another bill, H.B. 1327, establishes an optional entity-level tax regime for pass-through businesses.</span><a data-dcnode-id="1018" href="#_ftn13" name="_ftnref13"><span data-dcnode-id="1019" instrument_node="">[13]</span></a><span data-dcnode-id="1017" instrument_node=""> The new law allows </span><a class="tooltip__anchor" data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/s-corporation-s-corp/" id="anchor75465"><span data-dcnode-id="1016" instrument_node="">S corporation</span></a><span data-dcnode-id="1014" instrument_node="">s, partnerships, and LLCs to elect to be taxed as an entity rather than on the owners’ individual income taxes, avoiding the federal cap on SALT deductions. The law is applicable to income tax years beginning on or after January 1, 2022 provided federal SALT deductions are limited in the respective tax year. Income of electing entities would be taxed at 4.55 percent.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><h2 data-dcnode-id="1009"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">District of Columbia</span></strong></h2><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">As of January 1, 2022, Washington, D.C.’s individual income tax changed considerably. Enacted via the Fiscal Year 2022 Budget Support Act of 2021, the District increased the number of tax brackets from six to seven and altered many of the thresholds.</span><a data-dcnode-id="1005" href="#_ftn14" name="_ftnref14"><span data-dcnode-id="1006" instrument_node="">[14]</span></a><span data-dcnode-id="1004" instrument_node=""> Changes begin for individuals with a D.C. taxable income between $250,000 and $500,000, assessed a tax of $19,560 plus 9.25 percent of the excess over $250,000. Those with taxable income over $500,000 but not over $1 million will pay $42,775 plus 9.75 percent of the excess over $500,000. Finally, individuals with taxable income over $1 million will be taxed $91,525 plus 10.75 percent on any amount over $1 million.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h2 data-dcnode-id="999"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Florida</span></strong></h2><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="997" instrument_node="">Florida’s CIT rate decreased by nearly 1 percentage point in 2021, but it changed again—at least for a short time—at the beginning of 2022.</span><a data-dcnode-id="995" href="#_ftn15" name="_ftnref15"><span data-dcnode-id="996" instrument_node="">[15]</span></a><span data-dcnode-id="994" instrument_node=""> Florida ended 2021 with the nation’s second-lowest CIT rate, at 3.535 percent.</span><a data-dcnode-id="992" href="#_ftn16" name="_ftnref16"><span data-dcnode-id="993" instrument_node="">[16]</span></a><span data-dcnode-id="991" instrument_node=""> Only North Carolina had a lower rate, at 2.50 percent. As of January 1, a key provision of the 2019 tax reform sunsetted, with the CIT snapping back to 5.5 percent.</span><a data-dcnode-id="989" href="#_ftn17" name="_ftnref17"><span data-dcnode-id="990" instrument_node="">[17]</span></a><span data-dcnode-id="988" instrument_node=""> With this reversion, Florida now ranks 11th among states with a CIT, at least until policymakers decide whether to extend the 2021 reduction or to make it permanent.</span></p><span data-dcnode-id="986" instrument_node="">
</span><h2 data-dcnode-id="983"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Georgia</span></strong></h2><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">As of New Year’s Day 2022, partnerships and S corporations in Georgia are allowed to elect whether business income will be as an entity. Pursuant to the passage of H.B. 149,</span><a data-dcnode-id="979" href="#_ftn18" name="_ftnref18"><span data-dcnode-id="980" instrument_node="">[18]</span></a><span data-dcnode-id="978" instrument_node=""> the Georgia taxable income of electing pass-through businesses will be taxed at 5.75 percent. The change effectively isolates small business income and taxes it at the same rate as corporate income, another example of a workaround for the federal SALT deduction cap for pass-through businesses.</span></p><span data-dcnode-id="976" instrument_node="">
</span><h2 data-dcnode-id="973"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Illinois</span></strong></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="971" instrument_node="">Under S.B. 2531 signed by Governor J.B. Pritzker (D) on August 27, 2021, Illinois will allow partnerships and S corporations to elect to be taxed as an entity.</span><a data-dcnode-id="969" href="#_ftn19" name="_ftnref19"><span data-dcnode-id="970" instrument_node="">[19]</span></a><span data-dcnode-id="968" instrument_node=""> The election may be made for tax years starting on or after January 1, 2022 and before January 1, 2026. Illinois, in addition to its statutory income tax rate of 4.95 percent, also has a 1.5 percent “personal property replacement tax,” an additional income tax that is imposed on pass-through businesses, originally to offset revenue from the repeal of tangible </span><a class="tooltip__anchor" data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/property-tax/" id="anchor75885"><span data-dcnode-id="967" instrument_node="">property tax</span></a><span data-dcnode-id="965" instrument_node="">es. This additional tax remains in place.</span></p><span data-dcnode-id="963" instrument_node="">
</span><h2 data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Iowa</span></strong></h2><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="958" instrument_node="">With the passage of S.F. 619, Iowa policymakers set the state on course to eliminate the inheritance tax by the first day of 2025. </span><a data-dcnode-id="956" href="#_ftn20" name="_ftnref20"><span data-dcnode-id="957" instrument_node="">[20]</span></a><span data-dcnode-id="955" instrument_node=""> Rates will be phased down in five uniform reductions.</span><a data-dcnode-id="953" href="#_ftn21" name="_ftnref21"><span data-dcnode-id="954" instrument_node="">[21]</span></a><span data-dcnode-id="952" instrument_node=""> The revisions to the inheritance tax law were enacted June 16, 2021, with the first rate reduction made retroactive to New Year’s Day 2021. The second round of reductions went into effect on January 1, 2022, yielding a 40 percent reduction in pre-reform rates. After Iowa’s inheritance tax is eliminated, only five states (Kentucky, Maryland, Nebraska, New Jersey, and Pennsylvania)</span><a data-dcnode-id="950" href="#_ftn22" name="_ftnref22"><span data-dcnode-id="951" instrument_node="">[22]</span></a><span data-dcnode-id="949" instrument_node=""> will continue to tax beneficiaries on the value of their inherited property.</span></p><span data-dcnode-id="947" instrument_node="">
</span><h2 data-dcnode-id="944"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Kentucky</span></strong></h2><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="942" instrument_node="">With the enactment of H.B. 249 over the veto of Governor Andy Beshear (D), Kentucky will make significant changes to its film tax credit.</span><a data-dcnode-id="940" href="#_ftn23" name="_ftnref23"><span data-dcnode-id="941" instrument_node="">[23]</span></a><span data-dcnode-id="939" instrument_node=""> For applications approved on or after January 1, 2022, film companies are now authorized to receive a </span><a class="tooltip__anchor" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/refundable-tax-credits/" id="anchor75136"><span data-dcnode-id="938" instrument_node="">refundable tax credit</span></a><span data-dcnode-id="936" instrument_node="">. Prior to 2022, companies could receive a credit offsetting Kentucky income or limited liability entity taxes, but they could not claim more subsidy than they owed in taxes. This restores a level of generosity to film </span><a class="tooltip__anchor" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/tax-credit/" id="anchor75470"><span data-dcnode-id="935" instrument_node="">tax credit</span></a><span data-dcnode-id="933" instrument_node="">s that the Commonwealth had previously curtailed, in line with other states increasingly recognizing the poor return they offer. The total value of all refundable credits now authorized by the Commonwealth is $75 million.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h2 data-dcnode-id="928"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Louisiana</span></strong></h2><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="926" instrument_node="">With the approval of Amendment No. 2 by the voters on November 13, 2021,</span><a data-dcnode-id="924" href="#_ftn24" name="_ftnref24"><span data-dcnode-id="925" instrument_node="">[24]</span></a><span data-dcnode-id="923" instrument_node=""> four significant tax changes took effect in Louisiana on January 1, some resulting directly from the constitutional amendment and others through the implementation of legislation that was contingent on that constitutional ratification. First, the maximum individual income tax rate permitted by the state constitution decreased from 6 percent to 4.75 percent.</span><a data-dcnode-id="921" href="#_ftn25" name="_ftnref25"><span data-dcnode-id="922" instrument_node="">[25]</span></a><span data-dcnode-id="920" instrument_node=""> Second, the amendment eliminated the mandatory deduction of federal income taxes from state income taxes.</span><a data-dcnode-id="918" href="#_ftn26" name="_ftnref26"><span data-dcnode-id="919" instrument_node="">[26]</span></a></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="915" instrument_node="">Third, as of January 1, 2022, H.B. 278 reduced individual income tax rates from 2 percent, 4 percent, and 6 percent to 1.85 percent, 3.5 percent, and 4.25 percent respectively.</span><a data-dcnode-id="913" href="#_ftn27" name="_ftnref27"><span data-dcnode-id="914" instrument_node="">[27]</span></a><span data-dcnode-id="912" instrument_node=""> Finally, H.B. 292 collapsed Louisiana’s five CIT rates into three.</span><a data-dcnode-id="910" href="#_ftn28" name="_ftnref28"><span data-dcnode-id="911" instrument_node="">[28]</span></a><span data-dcnode-id="909" instrument_node=""> The new system taxes the first $50,000 of corporate net income at 3.5 percent. The next $100,000 will be taxed at 5.5 percent, and any income over $150,000 will be taxed at 7.5 percent. The top marginal rate is reduced by 0.5 percentage points but kicks in at a threshold $50,000 lower than in 2021. Both H.B. 278 and H.B. 292 were passed during Louisiana’s regular 2021 legislative session but enactment was contingent on voters’ assent to Amendment No. 2.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">Unrelated to the constitutional amendment, Louisiana enacted S.B. 36, which affects the carryforward of net operating losses (NOLs).</span><a data-dcnode-id="904" href="#_ftn29" name="_ftnref29"><span data-dcnode-id="905" instrument_node="">[29]</span></a><span data-dcnode-id="903" instrument_node=""> Instead of a 20-year window in which to carry forward all losses from a given year, the state now allows NOLs from tax years beginning January 1, 2001 to be carried forward until exhausted. Such cases are applicable to tax returns filed after January 1, 2022.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="900" instrument_node="">Governor John Bel Edwards (D) also signed S.B. 157 on June 16, 2021.</span><a data-dcnode-id="898" href="#_ftn30" name="_ftnref30"><span data-dcnode-id="899" instrument_node="">[30]</span></a><span data-dcnode-id="897" instrument_node=""> The law, effective January 1, 2022, responds to an increasingly remote workforce by eliminating the requirement for an employer to withhold income taxes from wages of a nonresident employee if the employee worked in the state for 25 days or fewer during the calendar year. If nonresidents work in Louisiana for more than 25 days, </span><a class="tooltip__anchor" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/withholding/" id="anchor75476"><span data-dcnode-id="896" instrument_node="">withholding</span></a><span data-dcnode-id="894" instrument_node=""> must occur for the entire period the employee operated in the state.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h2 data-dcnode-id="889"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Maryland</span></strong></h2><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="887" instrument_node="">Maryland’s first-in-the-nation digital advertising tax, enacted initially as part of H.B. 732,</span><a data-dcnode-id="885" href="#_ftn31" name="_ftnref31"><span data-dcnode-id="886" instrument_node="">[31]</span></a><span data-dcnode-id="884" instrument_node=""> took belated effect on New Year’s Day 2022. Passed by overriding the veto of Governor Larry Hogan (R), the law was initially to take effect on March 14, 2021. However, it was delayed in February 2021 by S.B. 787 so policymakers could have time to make additional changes to the law.</span><a data-dcnode-id="882" href="#_ftn32" name="_ftnref32"><span data-dcnode-id="883" instrument_node="">[32]</span></a><span data-dcnode-id="881" instrument_node=""> Under the new policy, the first $100 million in annual global gross receipts generated through online advertising will be exempt from taxation. Receipts between $100 million and $1 billion will be subject to a tax of 2.5 percent. A 5 percent rate will be assessed on receipts between $1 billion and $5 billion; 7.5 percent on $5 billion to $15 billion; and 10 percent on gross receipts exceeding $15 billion. The tax is the subject of pending litigation on its constitutionality and potential conflict with the federal Permanent Internet Tax Freedom Act, most immediately in </span><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">U.S. Chamber of Commerce v. Franchot.</span></em></p><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="874"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Mississippi</span></strong></h2><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">As of January 1, 2022, Mississippi has completed the phaseout of its 3 percent individual and CIT brackets. The state has been slowly eliminating its lowest tax bracket by exempting $1,000 increments every year since 2018. The Magnolia State now effectively exempts the first $5,000 of taxable income while assessing a 4 percent tax on the next $5,000 and a 5 percent tax on all taxable income above $5,000.</span></p><span data-dcnode-id="870" instrument_node="">
</span><h2 data-dcnode-id="867"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Montana</span></strong></h2><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="865" instrument_node="">Montana legalized the sale of recreational marijuana as of January 1, 2022, along with a 20 percent tax on the retail price of marijuana. The legalization and excise tax were approved by 57 percent of voters who weighed in on Initiative No. 190 on the 2020 ballot.</span><a data-dcnode-id="863" href="#_ftn33" name="_ftnref33"><span data-dcnode-id="864" instrument_node="">[33]</span></a><span data-dcnode-id="862" instrument_node=""> Under H.B. 701, which enacted changes to marijuana regulations and taxation, counties also have the option of enacting up to a 3 percent local-option excise tax on the retail value of marijuana sales provided the surtax is approved by voters.</span><a data-dcnode-id="860" href="#_ftn34" name="_ftnref34"><span data-dcnode-id="861" instrument_node="">[34]</span></a><span data-dcnode-id="859" instrument_node=""> Medical marijuana will continue to be taxed at 4 percent of its retail value.</span><a data-dcnode-id="857" href="#_ftn35" name="_ftnref35"><span data-dcnode-id="858" instrument_node="">[35]</span></a></p><span data-dcnode-id="855" instrument_node="">
</span><h2 data-dcnode-id="852"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Nebraska</span></strong></h2><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">Nebraska began a two-stage reduction to the CIT this year. Under L.B. 432, the top marginal corporate rate (applied to income over $100,000) was reduced from 7.81 percent to 7.5 percent.</span><a data-dcnode-id="848" href="#_ftn36" name="_ftnref36"><span data-dcnode-id="849" instrument_node="">[36]</span></a><span data-dcnode-id="847" instrument_node=""> The lower marginal rate (5.58 percent, applied to the first $100,000 of income) is unchanged.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h2 data-dcnode-id="842"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">New Hampshire</span></strong></h2><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">As of New Year’s Day 2022, the filing threshold for the business enterprise tax increased. Businesses will be required to file a return if they have gross receipts greater than $250,000 or an enterprise value tax base greater than $250,000. The type of return will be a function of the larger of whichever base meets the $250,000 minimum. The change to the business enterprise tax was enacted as part of the biennial budget, H.B. 2, signed into law by Governor Chris Sununu (R) on June 25, 2021.</span><a data-dcnode-id="838" href="#_ftn37" name="_ftnref37"><span data-dcnode-id="839" instrument_node="">[37]</span></a></p><span data-dcnode-id="836" instrument_node="">
</span><h2 data-dcnode-id="833"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">North Carolina</span></strong></h2><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">Under provisions of North Carolina’s biennial budget bill signed by Governor Roy Cooper (D) on November 18, 2021, the state’s flat income tax rate was reduced to 4.99 percent on January 1, 2022.</span><a data-dcnode-id="829" href="#_ftn38" name="_ftnref38"><span data-dcnode-id="830" instrument_node="">[38]</span></a><span data-dcnode-id="828" instrument_node=""> This is the first of six incremental reductions that will ultimately reduce the rate to 3.99 percent by tax year 2027. The budget bill also provides for the full future phaseout of the CIT.</span></p><span data-dcnode-id="826" instrument_node="">
</span><h2 data-dcnode-id="823"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Oklahoma</span></strong></h2><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="821" instrument_node="">Oklahoma implemented numerous changes to the individual income tax in addition to two business-related income tax reductions. H.B. 2962 implemented an across-the-board rate reduction of 0.25 percent.</span><a data-dcnode-id="819" href="#_ftn39" name="_ftnref39"><span data-dcnode-id="820" instrument_node="">[39]</span></a><span data-dcnode-id="818" instrument_node=""> The top rate declined from 5 to 4.75 percent, making it the ninth lowest top marginal rate among states that levy an individual income tax. H.B. 2962 also restored the refundability of the state’s </span><a class="tooltip__anchor" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/earned-income-tax-credit-eitc/" id="anchor71926"><span data-dcnode-id="817" instrument_node="">earned income tax credit (EITC)</span></a><span data-dcnode-id="815" instrument_node="">, which was made nonrefundable in 2016.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="812" instrument_node="">Lawmakers also approved H.B. 2960, which lowers the CIT from 6 percent to 4 percent,</span><a data-dcnode-id="810" href="#_ftn40" name="_ftnref40"><span data-dcnode-id="811" instrument_node="">[40]</span></a><span data-dcnode-id="809" instrument_node=""> leaving Oklahoma tied with Missouri for the second-lowest CIT rate in the nation, after North Carolina (2.5 percent). H.B. 2963 applies the same rate to pass-through businesses.</span><a data-dcnode-id="807" href="#_ftn41" name="_ftnref41"><span data-dcnode-id="808" instrument_node="">[41]</span></a></p><span data-dcnode-id="805" instrument_node="">
</span><h2 data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Oregon</span></strong></h2><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">With the implementation of S.B 727 on January 1, 2022,</span><a data-dcnode-id="798" href="#_ftn42" name="_ftnref42"><span data-dcnode-id="799" instrument_node="">[42]</span></a><span data-dcnode-id="797" instrument_node=""> Oregon joined a growing list of states that have legislated SALT deduction workarounds on behalf of pass-through business owners. Oregon’s pass-through business alternative income tax is similar to other states’ in that it allows S corporations, LLCs, and partnerships to isolate business income for tax purposes. Electing entities would be subject to a 9 percent tax on taxable income up to $250,000 and 9.9 percent tax on taxable income exceeding that amount. If a business owner or partnership elects to forgo the election, taxable income in excess of $125,000 for a single filer would be subject to the top marginal rate of 9.9 percent. This alternative tax regime is currently available through the end of 2024.</span></p><span data-dcnode-id="795" instrument_node="">
</span><h2 data-dcnode-id="792"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Washington</span></strong></h2><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Washington implemented a 7 percent tax on long-term net capital gains in excess of $250,000 beginning January 1, 2022. Real estate, retirement savings accounts, livestock, and timber are exempt from taxation. On November 2, 2021, the law was the subject of a non-binding advisory vote where 61 percent of voters expressed their desire to repeal the tax. While the law took effect at the start of the new year, it will also wind its way through the courts. Litigation is currently pending, since the state’s constitution restricts income taxation, with proponents of the new tax arguing that it is not a tax on income but rather an </span><a class="tooltip__anchor" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/excise-tax/" id="anchor74471"><span data-dcnode-id="789" instrument_node="">excise tax</span></a><span data-dcnode-id="787" instrument_node=""> denominated in net income.</span></p><span data-dcnode-id="785" instrument_node="">
</span><h2 data-dcnode-id="782"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">West Virginia</span></strong></h2><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Since enactment of H.B. 2001 in 2019, West Virginia has been phasing in an income tax exemption for Social Security benefits.</span><a data-dcnode-id="778" href="#_ftn43" name="_ftnref43"><span data-dcnode-id="779" instrument_node="">[43]</span></a><span data-dcnode-id="777" instrument_node=""> Thirty-five percent of benefits were exempt from taxation in tax year 2020; 65 percent of benefits were exempt in 2021; and 100 percent of benefits are exempt as of January 1, 2022. The exemption is means-tested, so some taxpayers will not qualify. Joint tax filers with a federal adjusted gross income of more than $100,000 or single filers with a federal adjusted gross income of more than $50,000 will be excluded.</span></p><span data-dcnode-id="775" instrument_node="">
</span><h2 data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Wyoming</span></strong></h2><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="770" instrument_node="">On February 9, 2021, Governor Mark Gordon (R) signed S.F. 60 into law,</span><a data-dcnode-id="768" href="#_ftn44" name="_ftnref44"><span data-dcnode-id="769" instrument_node="">[44]</span></a><span data-dcnode-id="767" instrument_node=""> which, as of January 1, 2022, requires Wyoming mining companies to remit </span><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">ad valorem</span></em><span data-dcnode-id="764" instrument_node=""> taxes on production to county governments on a monthly basis. Prior to the law’s implementation, companies were required to pay </span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">ad valorem</span></em><span data-dcnode-id="761" instrument_node=""> taxes semiannually. However, remittance often lagged production by up to 18 months. In certain instances, mining firms would go bankrupt before local governments received the overdue revenue. The payment schedule was changed to mitigate the fiscal impact on county governments.</span></p><span data-dcnode-id="759" instrument_node="">
</span><div data-dcnode-id="747" id="state-newsletter-widget"><div class="newsletter-widget-inline no-print" data-dcnode-id="748"><span data-dcnode-id="758" instrument_node="">
</span><h2 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Stay informed on the tax policies impacting you.</span></h2><span data-dcnode-id="755" instrument_node="">
