pe="submit"></button><span data-dcnode-id="350" instrument_node=""> </span><input data-dcnode-id="349" id="s" name="s" placeholder="How can we help you?" type="search"></form></a></li></ul></li></ul></div></div></div><div class="breadcrumbs" data-dcnode-id="318"><div class="container" data-dcnode-id="319"><span data-dcnode-id="339" instrument_node=""> </span><span data-dcnode-id="334" property="itemListElement" typeof="ListItem"><a class="home" data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zicolaw.com/" property="item" title="Go to ZICO Law." typeof="WebPage"><span data-dcnode-id="337" property="name"><span data-dcnode-id="338" instrument_node="">ZICO Law</span></span></a><meta content="1" data-dcnode-id="335" property="position"></span><span data-dcnode-id="333" instrument_node=""> &gt; </span><span data-dcnode-id="329" property="itemListElement" typeof="ListItem"><span data-dcnode-id="331" property="name"><span data-dcnode-id="332" instrument_node="">Resources</span></span><meta content="2" data-dcnode-id="330" property="position"></span><span data-dcnode-id="328" instrument_node=""> &gt; </span><span data-dcnode-id="323" property="itemListElement" typeof="ListItem"><a class="alert-root post post-alert" data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zicolaw.com/resources/alerts/" property="item" title="Go to Alerts." typeof="WebPage"><span data-dcnode-id="326" property="name"><span data-dcnode-id="327" instrument_node="">Alerts</span></span></a><meta content="3" data-dcnode-id="324" property="position"></span><span data-dcnode-id="322" instrument_node=""> &gt; </span><span class="post post-alert current-item" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Recent Labuan Tax Changes</span></span></div></div><div class="featured-image no-excerpt rocket-lazyload" data-bg="url(https://www.zicolaw.com/wp-content/uploads/2019/04/ZICO-Law_Website_Banner_Alerts.jpg)" data-dcnode-id="314" data-was-processed="true" style="background-image: url(&quot;https://www.zicolaw.com/wp-content/uploads/2019/04/ZICO-Law_Website_Banner_Alerts.jpg&quot;);"><div class="block-heading" data-dcnode-id="315"><div class="block-title" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Alerts</span></div></div></div><div class="default-area wrapper" data-dcnode-id="102"><div class="container" data-dcnode-id="103"><div class="full-width single-alert" data-dcnode-id="104"><div class="content-area" data-dcnode-id="105"><div class="container" data-dcnode-id="106"><div class="content-table" data-dcnode-id="107"><div class="alert-area" data-dcnode-id="195"><div class="content" data-dcnode-id="196"><div class="single-date" data-dcnode-id="304"><span data-dcnode-id="313" instrument_node=""> </span><span data-dcnode-id="311" id="day"><span data-dcnode-id="312" instrument_node="">26</span></span><span data-dcnode-id="310" instrument_node=""> </span><span data-dcnode-id="308" id="month"><span data-dcnode-id="309" instrument_node="">February</span></span><span data-dcnode-id="307" instrument_node=""> </span><span data-dcnode-id="305" id="year"><span data-dcnode-id="306" instrument_node="">2020</span></span></div><div class="location" data-dcnode-id="301"><span data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Malaysia</span></span></div><div class="single-title" data-dcnode-id="293"><div data-dcnode-id="294" id="featured-alert"><span data-dcnode-id="300" instrument_node=""> </span><img alt="" class="attachment-post-thumbnail size-post-thumbnail wp-post-image lazyloaded" data-dcnode-id="299" data-lazy-src="https://www.zicolaw.com/wp-content/uploads/2020/02/ZICO-Alerts_icons_Labuan-Tax.png" data-was-processed="true" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zicolaw.com/wp-content/uploads/2020/02/ZICO-Alerts_icons_Labuan-Tax.png&amp;raw" width="151"><noscript data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">&lt;img width="151" height="151" src="https://www.zicolaw.com/wp-content/uploads/2020/02/ZICO-Alerts_icons_Labuan-Tax.png" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" alt="" /&gt;</span></noscript><h1 data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Recent Labuan Tax Changes</span></h1></div></div><div class="main-content-area" data-dcnode-id="198"><div class="alert-content" data-dcnode-id="199"><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Recent changes to the Labuan tax laws have seen new regulations introduced to enhance the reputation and credibility of the tax regime in Labuan. The changes are welcomed as Malaysia seeks to implement the minimum standards under the Base Erosion and Profit Shifting (BEPS) Action Plan which sets out strategies and standards for best practices in tax. This alert sets out a quick summary of the main changes thus far.</span></p><p data-dcnode-id="287"><strong data-dcnode-id="288"><u data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Amendments under the Finance Act 2018</span></u></strong></p><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">The Labuan Business Activity Tax Act 1990 (“</span><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">LBATA</span></strong><span data-dcnode-id="283" instrument_node="">”) was amended via the Finance Act 2018, which came into force on 27 December 2018. Key changes under the LBATA are as follows:</span></p><ul data-dcnode-id="269"><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">The definition of “Labuan business activity” was amended to remove Malaysian ringgit restrictions or restrictions on dealing with Malaysian residents.</span></li><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">New economic substance requirements for Labuan entities were introduced. Section 2B(1)(b) of the LBATA requires Labuan entities, for the purpose of the Labuan business activity, to have (i) an adequate number of full time employees in Labuan, and (ii) an adequate amount of annual operating expenditure in Labuan.</span></li><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Income derived from royalty or other income derived from an intellectual property right shall not enjoy LBATA tax, and is now subject to tax under the Malaysian Income Tax Act 1967.</span></li><li data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Labuan entities carrying on a Labuan trading activity no longer have the option to elect to pay tax of RM20,000. This means that all Labuan entities that carry on a Labuan trading activity and comply with the relevant economic substance requirements shall be subject to tax at the rate of 3% on its chargeable profits.</span></li><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">A Labuan entity that does not carry on a Labuan business activity, or in carrying on a Labuan business activity, does not have the adequate number of full time employees in Labuan, or adequate amount of annual operating expenditure in Labuan, will be subject to tax under the Malaysian Income Tax Act 1967.</span></li><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">A Labuan entity continues to be able to make an irrevocable election to pay tax under the Malaysian Income Tax Act 1967.</span></li></ul><p data-dcnode-id="265"><strong data-dcnode-id="266"><u data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Labuan Business Activity Tax (Requirements for Labuan Business Activity) Regulations 2018</span></u></strong></p><p data-dcnode-id="260"><span data-dcnode-id="264" instrument_node="">On 1 January 2019, the Labuan Business Activity Tax (Requirements for Labuan Business Activity) Regulations 2018 (“</span><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">2018 Regulations</span></strong><span data-dcnode-id="261" instrument_node="">”) came into operation. The 2018 Regulations specify the (i) minimum number of full time employees required in Labuan and (ii) minimum amount of annual operating expenditure required in Labuan for each type of Labuan entity.</span></p><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">There are 21 types of Labuan entities listed, most of which are licensed entities and would already have to comply&nbsp; with some form of substance requirements under their respective industry guidelines. What is of note is that the substance requirements are now imposed on insurance and insurance-related licensees (which previously relied on appointing a Labuan insurance manager or Labuan underwriting manager to comply with substance requirements), and holding companies. Holding companies are now subject to a minimum number of 2 full time employees and an annual operating expenditure in Labuan of RM50,000.</span></p><p data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">Since then, there have been various pronouncements by the Labuan Financial Services Authority (“</span><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">LFSA</span></strong><span data-dcnode-id="254" instrument_node="">”) to address areas of concern from the industry players. LFSA has stated that these pronouncements are subject to release of gazetted regulations but it is useful to see what they are:</span></p><ul data-dcnode-id="242"><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Revised list of substance requirements on certain Labuan entities including Labuan banks, investment banks, insurers, insurance brokers, leasing companies and holding companies. Significantly, the substance requirements on holding companies are reduced as follows:</span></li><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">for Labuan holding companies that undertake other than pure equity holding activities, they require a minimum of 1 full time employee and minimum annual operating expenditure of RM20,000 in Labuan; and</span></li><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">for Labuan holding companies that undertake pure equity holding activities, they are not required to have any full time employees in Labuan, but will need to comply with management and control requirements, and have a minimum annual expenditure of RM20,000 in Labuan.</span></li><li data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Revised reduced rates of non-deductibility rules on interest payments and lease rental payments.</span></li><li data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Imposition of substance requirement rules (minimum of 2 full time employees and minimum annual operating expenditure of RM50,000) on Labuan entities that carry out administrative, accounting and legal services including backroom processing, payroll services, talent management, agency services, insolvency related services and management services.</span></li></ul><p data-dcnode-id="238"><strong data-dcnode-id="239"><u data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Labuan Business Activity Tax (Amendment) Act 2020</span></u></strong></p><p data-dcnode-id="230"><span data-dcnode-id="237" instrument_node="">On 10 February 2020, the Labuan Business Activity Tax (Amendment) Act 2020 (the “</span><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Amendment Act</span></strong><span data-dcnode-id="234" instrument_node="">”) came into force. A key change under the Amendment Act is to put into effect the pronouncement made by LFSA earlier that any Labuan entity carrying on a Labuan business activity but fails to comply with the relevant substance requirements for a basis period for a year of assessment is subject to tax under the LBATA </span><strong data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">at the rate of 24% of its chargeable profits</span></strong><span data-dcnode-id="231" instrument_node=""> for that year of assessment, and not subject to tax under the Malaysian Income Tax Act 1967.</span></p><p data-dcnode-id="225"><span data-dcnode-id="229" instrument_node="">The other amendments under the Amendment Act relate to detailed and increased powers of the Director General of Inland Revenue (“</span><strong data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">DG</span></strong><span data-dcnode-id="226" instrument_node="">”) in dealing with tax matters under the LBATA, including:</span></p><ul data-dcnode-id="214"><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Where the DG believes that any transaction has the direct or indirect effect of altering the incidence of tax payable, relieving any person from liability or evading or avoiding liability, the DG may disregard or vary the transaction and make adjustments as he thinks fit, including the computation or re-computation of the chargeable profit, or the imposition of liability to tax.</span></li><li data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">In determining the chargeable profit of a person, the DG may substitute the price for the acquisition or supply of property or services in respect of transactions that the person has entered into, to reflect an arm’s length price for the transaction.</span></li><li data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">In order to ascertain whether a person is chargeable to tax, the DG has the power to call for the books, accounts and returns of the person in order to obtain the full information.</span></li><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">For the purposes of the LBATA, the DG has full and free access to all lands, buildings and places and to all books, documents, objects, articles, materials and things and may search such lands etc. and inspect, copy or make extracts from such books etc.</span></li><li data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Every person who is required to furnish a return of his profits for a year of assessment shall keep and retain in safe custody sufficient documents for a period of seven years from the end of that year of assessment.</span></li></ul><p data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">As the Labuan International Finance and Business Centre enters its 30</span><sup data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">th</span></sup><span data-dcnode-id="210" instrument_node=""> year of operation this year, it continues to introduce necessary changes to its laws and regulations to remain both reputable and competitive. These latest changes reflect the balance that needs to be struck from this perspective. Businesses would do well to look at whether their existing structures are in compliance with the new requirements.</span></p><p data-dcnode-id="204"><span data-dcnode-id="208" instrument_node="">If you have any questions or require any additional information, please contact </span><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zicolaw.com/people/wei-min-chua/"><span data-dcnode-id="207" instrument_node="">Chua Wei Min</span></a><span data-dcnode-id="205" instrument_node="">, Director ZICO Insights Law LLC.</span></p><hr data-dcnode-id="203"><p data-dcnode-id="200"><em data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">This alert is for general information only and is not a substitute for legal advice.</span></em></p></div></div><div class="meta" data-dcnode-id="197"></div></div></div><div class="sidebar single-alert" data-dcnode-id="108"><div class="inner" data-dcnode-id="109"><div class="contact-person" data-dcnode-id="173"><h2 class="header-titles" data-dcnode-id="193"><span data-dcnode-id="194" ins
