span data-dcnode-id="2528" instrument_node="">69.44696</span></td><td class="align-char" data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">73.85709</span></td></tr><tr data-dcnode-id="2512"><th class="align-left" data-dcnode-id="2519" scope="row"><span data-dcnode-id="2523" instrument_node="">Prob(</span><em data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">J</span></em><span data-dcnode-id="2520" instrument_node="">-statistic)</span></th><td class="align-char" data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">0.000000</span></td><td class="align-char" data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">0.000000</span></td><td class="align-char" data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">0.000000</span></td></tr><tr data-dcnode-id="2503"><th class="align-left" data-dcnode-id="2510" scope="row"><span data-dcnode-id="2511" instrument_node="">Observations</span></th><td class="align-char" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">411</span></td><td class="align-char" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">415</span></td><td class="align-char" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">475</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2488"></p><p data-dcnode-id="2496" id="spar0160"><em data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Source</span></em><span data-dcnode-id="2497" instrument_node="">: Authors’ calculations using data from Eurostat.</span></p><p data-dcnode-id="2489" id="spar0175"><em data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Note</span></em><span data-dcnode-id="2493" instrument_node="">: </span><em data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">t</span></em><span data-dcnode-id="2490" instrument_node="">-test in parenthesis.</span></p><p></p><dl class="footnotes" data-dcnode-id="2477"><dt data-dcnode-id="2486" id="tblfn0065"><span data-dcnode-id="2487" instrument_node="">*</span></dt><dd data-dcnode-id="2483"><p data-dcnode-id="2484" id="npar0030"><span data-dcnode-id="2485" instrument_node="">Significant at 5%.</span></p></dd><dt data-dcnode-id="2481" id="tblfn0100"><span data-dcnode-id="2482" instrument_node="">**</span></dt><dd data-dcnode-id="2478"><p data-dcnode-id="2479" id="npar0035"><span data-dcnode-id="2480" instrument_node="">Significant at 1%</span></p></dd></dl></div></div><p data-dcnode-id="2473" id="par0195"><span data-dcnode-id="2474" instrument_node="">First model includes total government spending and all tax items, comprised by the tax burden – taxes on land, buildings and other structures, individual income tax, tax on corporate profits, taxes on production and imports, value added type taxes, and social contributions. Thus, the model expresses the impact of total government expenditure and the structure of tax revenues on the economic growth. The results show the negative influence of total government spending on the growth, which is also confirmed by the two-stage least squares estimations (2SLS).</span></p><p data-dcnode-id="2471" id="par0200"><span data-dcnode-id="2472" instrument_node="">The tax items reveal a varicolored picture of impacts. The property taxes have a positive insignificant coefficient and the use of first difference does not change the picture. At the same time the estimation under the two-stage procedure reports a negative insignificant coefficient, so there is no reason to make a reliable conclusion about the nature and significance of this relationship. It seems that property taxes in the EU-28 are neutral to the economic growth.</span></p><p data-dcnode-id="2445" id="par0205"><span data-dcnode-id="2470" instrument_node="">The personal income tax and social contributions have strong positive effects on growth, which is confirmed by the 2SLS estimates. The impact of the corporate taxes seems to be positive but the relationship is very weak. Moreover, the coefficients lose their significance in calculations using instrumental variables. The assumption for growth-conductive direct taxation in the EU-28 member states is confirmed by the second model, although it is not consistent with the results of some of the empirical studies. Confirmation is found by </span><a class="workspace-trigger" data-dcnode-id="2468" href="#bib0040" name="bbib0040"><span data-dcnode-id="2469" instrument_node="">Canavire-Bacarreza et al. (2013)</span></a><span data-dcnode-id="2467" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2465" href="#bib0035" name="bbib0035"><span data-dcnode-id="2466" instrument_node="">Bernardi (2013)</span></a><span data-dcnode-id="2464" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2462" href="#bib0145" name="bbib0145"><span data-dcnode-id="2463" instrument_node="">Stoilova and Patonov (2013)</span></a><span data-dcnode-id="2461" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2459" href="#bib0080" name="bbib0080"><span data-dcnode-id="2460" instrument_node="">Havránek et al. (2015)</span></a><span data-dcnode-id="2458" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2456" href="#bib0155" name="bbib0155"><span data-dcnode-id="2457" instrument_node="">Tanchev (2016)</span></a><span data-dcnode-id="2455" instrument_node="">. On the opposite side are the results of </span><a class="workspace-trigger" data-dcnode-id="2453" href="#bib0095" name="bbib0095"><span data-dcnode-id="2454" instrument_node="">Kneller, Bleaney, and Gemmell (1999)</span></a><span data-dcnode-id="2452" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2450" href="#bib0170" name="bbib0170"><span data-dcnode-id="2451" instrument_node="">Widmalm (2001)</span></a><span data-dcnode-id="2449" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2447" href="#bib0050" name="bbib0050"><span data-dcnode-id="2448" instrument_node="">Dackehag and Hansson (2012)</span></a><span data-dcnode-id="2446" instrument_node="">, which estimated depressing effects of income taxes.</span></p><p data-dcnode-id="2440" id="par0210"><span data-dcnode-id="2444" instrument_node="">The taxes on productions and imports demonstrate the strongest positive linear relationship with economic growth, confirmed by the estimation with instrumental variables. This result is in line with the economic theory. Taxes on consumption are generally recommended as growth-conducive (</span><a class="workspace-trigger" data-dcnode-id="2442" href="#bib0175" name="bbib0175"><span data-dcnode-id="2443" instrument_node="">Zipfel &amp; Heinrichs, 2012</span></a><span data-dcnode-id="2441" instrument_node="">), due to the presumption that tax system, more heavily relied on consumption, minimizes the distorting effects of taxation on the growth factors (labour, capital and technological progress).</span></p><p data-dcnode-id="2438" id="par0215"><span data-dcnode-id="2439" instrument_node="">At the same time, consumption tax like value added tax (VAT), shows negative influence on the economic growth. VAT is intended to be an universal proportional tax on consumption, but actually has a variety of exceptions and reduced rates across EU-28 member states that makes it far form efficiency, flexibility, justice and, of course, consistency with growth. Moreover, the relationship has a cubic form that implies curve with optimum values of the VAT collection. The negative effect of the value added taxes on economic growth is also confirmed by the estimations of third model. As a whole, the results imply that the society does not gain economic benefits by imposing value added taxes. However, economic efficiency is supported by the taxes of selective type like those levied on productions and imports.</span></p></section><section data-dcnode-id="2426" id="sec0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2435" id="sect0060"><span data-dcnode-id="2436" instrument_node="">Conclusions</span></h2><p data-dcnode-id="2433" id="par0220"><span data-dcnode-id="2434" instrument_node="">Since the financial crisis, the EU-28 member states have faced the difficult challenge of consolidating their budgets while at the same time promoting economic growth. One possible approach would be to reconsider the design of their respective tax systems. A variety of studies claim that raising consumption taxes while at the same time lowering taxes on labour and capital can stimulate the economy's growth forces. At the same time, other studies note that taxation and tax structure would have different impacts on economic activity for different countries and periods and under varying circumstances. In this respect, our research provides one more estimate and a few more suggestions for growth-conductive taxation.</span></p><p data-dcnode-id="2431" id="par0225"><span data-dcnode-id="2432" instrument_node="">The empirical results proved that government expenditure do not contribute to an increase in the annual GDP growth rate in the EU-28 member states, while total tax revenues seem to be less harmful for the growth. In this line, balanced budgets are predicted to be growth-friendly.</span></p><p data-dcnode-id="2429" id="par0230"><span data-dcnode-id="2430" instrument_node="">Optimum design of a tax system depends on numerous factors and differs from country to country. However, some taxes proved to be less harmful to growth. The taxes on productions and imports demonstrate a strong positive impact on economic growth, but the empirical results imply that imposing value added taxes affects negatively EU-28 economies. The property taxes are neutral to the economic growth, while the personal income tax and social contributions have positive effects.</span></p><p data-dcnode-id="2427" id="par0235"><span data-dcnode-id="2428" instrument_node="">However, robust political recommendations should also be based on country-specific criteria such as the design of the tax system, social redistribution preferences and the overall volume of tax revenues. Last but not least, empirical analysis is hampered by the fact that quite often structural and cyclical effects on the tax structure are hard to differentiate.</span></p></section></div><div class="Appendices" data-dcnode-id="1717"><section data-dcnode-id="1718" id="sec0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2419" id="sect0065"><span data-dcnode-id="2424" instrument_node="">Appendix A</span><span data-dcnode-id="2422" instrument_node="">. </span><span data-dcnode-id="2420" instrument_node="">Augmented Dicky-Fuller (ADF) tests</span></h2><p data-dcnode-id="2417" id="par0255"><span data-dcnode-id="2418" instrument_node="">Null Hypothesis: TR has a unit root</span></p><p data-dcnode-id="2415" id="par0260"><span data-dcnode-id="2416" instrument_node="">Exogenous: Constant</span></p><p data-dcnode-id="2344" id="par0265"><span data-dcnode-id="2414" instrument_node="">Lag Length: 0 (Automatic - based on SIC, maxlag</span><span data-dcnode-id="2412" instrument_node="">&nbsp;</span><span data-dcnode-id="2410" instrument_node="">=</span><span data-dcnode-id="2408" instrument_node="">&nbsp;</span><span data-dcnode-id="2406" instrument_node="">1)</span><span class="display" data-dcnode-id="2345"></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2346" id="tbl0005"><div class="groups" data-dcnode-id="2356"><table data-dcnode-id="2357"><thead class="valign-top" data-dcnode-id="2392"><tr data-dcnode-id="2393"><td class="rowsep-1" data-dcnode-id="2403" scope="col"><span class="screen-reader-only" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Empty Cell</span></span></td><th class="rowsep-1 align-left" data-dcnode-id="2399" scope="col"><em data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node lass="buttons" data-dcnode-id="336"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="337" type="button"><span class="button-link-text" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="338" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="339"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="331"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="332" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="333"><p data-dcnode-id="334" id="d1e7211"><span data-dcnode-id="335" instrument_node="">This study investigates the role of governance in the resource mobilization-inclusive growth relationship. We explore the difference Generalized Method of Moments (GMM) estimation technique to examine this relationship in 27 sub-Saharan African countries for the period 1995–2015. This study uses aggregate tax and disaggregated taxes to capture domestic resource mobilization. The findings from our empirical analysis indicate that the persistence level of inclusive growth determines to a large extent, the current growth inclusiveness in the SSA region. The results show that the aggregate tax and disaggregated taxes do not have a significant impact on inclusive growth. The results also show a positive direct impact of all dimensions of governance on inclusive growth. All dimensions of governance have direct positive effect on inclusive growth. However, these dimensions exert no palpable catalytic role in enhancing the extent to which resource mobilization facilitates inclusive growth. By implication, the resource mobilization frame seems disconnected from the pace of governance as evident by low level of tax efforts while governance infrastructure is beginning to have some effects to galvanize benefits of economic growth to citizens. The results are indicative of how other seemingly easy sources of finance have been a distraction for the governments in the region. The tax efforts by governments are significantly low which make them less accountable to the citizens. These findings should prompt policymakers to develop reliable tax reforms coupled with quality governance to make growth inclusiveness in the region a reality. This will include building a strong database with information on taxpayers in the country at individual, corporation and external sector levels as well as quality institutions that will ensure accountability.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="319"><div class="sub-heading" data-dcnode-id="324"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.13189/ujaf.2021.090424" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="328" id="citing-articles-article1-title"><span data-dcnode-id="329" instrument_node="">Personal Income Tax Revenue and Nigeria's Aggregate Earnings</span></h3></a><div class="article-source ellipsis" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">2021, Universal Journal of Accounting and Finance</span></div></div><div class="buttons" data-dcnode-id="323"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="320"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="321" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="322"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="308"><div class="sub-heading" data-dcnode-id="313"><a data-dcnode-id="316" href="htt
