</span><meta content="Optimum design of a tax system depends on numerous factors and differs from country to country. A variety of studies claim that raising consumption ta…" data-dcnode-id="4652" property="og:description"><span data-dcnode-id="4651" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0005&quot;><p id=&quot;spar0005&quot;>Optimum design of a tax system depends on numerous factors and differs from country to country. A variety of studies claim that raising consumption taxes while at the same time lowering taxes on labour and capital can stimulate the economy&amp;#x27;s growth forces. At the same time, other studies note that tax burden and tax structure would have different impacts on economic activity for different countries and periods and under varying circumstances. In this respect the main purpose of this paper is to provide one more estimate and a few more suggestions for growth-conductive taxation. The study is focused on the impact of tax structure on the economic growth in the EU-28 member states for the period 1996–2013. The descriptive analysis is focused on the cross-country differences in terms of total tax burden and design of tax structure, while the empirical analysis studies the impact of taxation on the economic growth through regressions on pooled panel data. The conclusion is that tax structure based on selective consumption taxes, taxes on personal income and property is more supporting to the economic growth.</p></div></div></div>" data-dcnode-id="4650" lang="en" name="citation_abstract"><span data-dcnode-id="4649" instrument_node="">
</span><meta content="La estructura óptima del sistema fiscal (tributario) depende de muchos factores y varía en los distintos países. Varios estudios afirman que el aument…" data-dcnode-id="4648" property="og:description"><span data-dcnode-id="4647" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0005&quot; lang=&quot;es&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Resumen</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0010&quot;>La estructura óptima del sistema fiscal (tributario) depende de muchos factores y varía en los distintos países. Varios estudios afirman que el aumento de los impuestos sobre el consumo, acompañado además de una reducción de los impuestos sobre el trabajo y el capital, puede estimular el crecimiento económico. Al mismo tiempo, otros estudios indican que el gravamen y la estructura fiscal pueden tener una influencia diferente en la actividad económica en los distintos países, en diversos periodos y en diferentes circunstancias. En este sentido, el objetivo principal de este artículo es prestar una nueva evaluación y algunas propuestas de los impuestos destinados a estimular el crecimiento económico. El estudio está enfocado sobre la influencia de la estructura fiscal en el crecimiento económico de la Unión Europea (UE-28) para el periodo 1996-2013. En la metodología se empleó un análisis que está dirigido a identificar las diferencias entre los países desde el punto de vista del gravamen común y la estructura del sistema de impuestos, mientras que en el análisis empírico se analiza la influencia de los impuestos sobre el crecimiento económico a través de regresiones con datos de panel. Por último, se concluye que el sistema fiscal basado en los impuestos selectivos al consumo, impuestos sobre los ingresos de personas físicas e impuestos sobre la propiedad personal es más favorable para el crecimiento económico.</p></div></div></div>" data-dcnode-id="4646" lang="es" name="citation_abstract"><span data-dcnode-id="4645" instrument_node="">

ass="ArticleIdentifierLinks" data-dcnode-id="4183" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.cya.2017.04.006" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4187" instrument_node="">https://doi.org/10.1016/j.cya.2017.04.006</span></a><a class="rights-and-content" data-dcnode-id="4184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0186104217300438%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4185" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="4174"><div class="License" data-dcnode-id="4178"><span data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4180" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="4175"><span class="access-indicator" data-dcnode-id="4177"></span><span data-dcnode-id="4176" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="4173"></section><section class="ReferencedArticles" data-dcnode-id="4172"></section><div class="PageDivider" data-dcnode-id="4171"></div><div class="Abstracts u-font-serif" data-dcnode-id="4158" id="abstracts"><div class="abstract author" data-dcnode-id="4165" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Abstract</span></h2><div data-dcnode-id="4166" id="abst0005"><p data-dcnode-id="4167" id="spar0005"><span data-dcnode-id="4168" instrument_node="">Optimum design of a tax system depends on numerous factors and differs from country to country. A variety of studies claim that raising consumption taxes while at the same time lowering taxes on labour and capital can stimulate the economy's growth forces. At the same time, other studies note that tax burden and tax structure would have different impacts on economic activity for different countries and periods and under varying circumstances. In this respect the main purpose of this paper is to provide one more estimate and a few more suggestions for growth-conductive taxation. The study is focused on the impact of tax structure on the economic growth in the EU-28 member states for the period 1996–2013. The descriptive analysis is focused on the cross-country differences in terms of total tax burden and design of tax structure, while the empirical analysis studies the impact of taxation on the economic growth through regressions on pooled panel data. The conclusion is that tax structure based on selective consumption taxes, taxes on personal income and property is more supporting to the economic growth.</span></p></div></div><div class="abstract author" data-dcnode-id="4159" id="abs0005" lang="es"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">Resumen</span></h2><div data-dcnode-id="4160" id="abst0010"><p data-dcnode-id="4161" id="spar0010"><span data-dcnode-id="4162" instrument_node="">La estructura óptima del sistema fiscal (tributario) depende de muchos factores y varía en los distintos países. Varios estudios afirman que el aumento de los impuestos sobre el consumo, acompañado además de una reducción de los impuestos sobre el trabajo y el capital, puede estimular el crecimiento económico. Al mismo tiempo, otros estudios indican que el gravamen y la estructura fiscal pueden tener una influencia diferente en la actividad económica en los distintos países, en diversos periodos y en diferentes circunstancias. En este sentido, el objetivo principal de este artículo es prestar una nueva evaluación y algunas propuestas de los impuestos destinados a estimular el crecimiento económico. El estudio está enfocado sobre la influencia de la estructura fiscal en el crecimiento económico de la Unión Europea (UE-28) para el periodo 1996-2013. En la metodología se empleó un análisis que está dirigido a identificar las diferencias entre los países desde el punto de vista del gravamen común y la estructura del sistema de impuestos, mientras que en el análisis empírico se analiza la influencia de los impuestos sobre el crecimiento económico a través de regresiones con datos de panel. Por último, se concluye que el sistema fiscal basado en los impuestos selectivos al consumo, impuestos sobre los ingresos de personas físicas e impuestos sobre la propiedad personal es más favorable para el crecimiento económico.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4135" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4147"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0186104217300402"><svg class="icon icon-navigate-left" data-dcnode-id="4156" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4157"></path></svg><span class="button-alternative-text" data-dcnode-id="4149"><strong data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4136"><button class="button-alternative button-alternative-tertiary" data-dcnode-id="4137" disabled="" type="button"><span class="button-alternative-text" data-dcnode-id="4140"><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4138" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4139"></path></svg></button></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4086"><div class="keywords-section" data-dcnode-id="4123" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">JEL classification</span></h2><div class="keyword" data-dcnode-id="4130" id="kw0005"><span data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">E62</span></span></div><div class="keyword" data-dcnode-id="4127" id="kw0010"><span data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">H21</span></span></div><div class="keyword" data-dcnode-id="4124" id="kw0015"><span data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">O47</span></span></div></div><div class="keywords-section" data-dcnode-id="4111" id="kwd0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Códigos JEL</span></h2><div class="keyword" data-dcnode-id="4118" id="kw0020"><span data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">E62</span></span></div><div class="keyword" data-dcnode-id="4115" id="kw0025"><span data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">H21</span></span></div><div class="keyword" data-dcnode-id="4112" id="kw0030"><span data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">O47</span></span></div></div><div class="keywords-section" data-dcnode-id="4099" id="kwd0015"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4106" id="kw0035"><span data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Tax structure</span></span></div><div class="keyword" data-dcnode-id="4103" id="kw0040"><span data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">Economic growth</span></span></div><div class="keyword" data-dcnode-id="4100" id="kw0045"><span data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">European Union</span></span></div></div><div class="keywords-section" data-dcnode-id="4087" id="kwd0020"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Palabras clave</span></h2><div class="keyword" data-dcnode-id="4094" id="kw0050"><span data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Sistema fiscal</span></span></div><div class="keyword" data-dcnode-id="4091" id="kw0055"><span data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Crecimiento económico</span></span></div><div class="keyword" data-dcnode-id="4088" id="kw0060"><span data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">Unión Europea</span></span></div></div></div><span data-dcnode-id="4085" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1716" id="body"><div data-dcnode-id="2425"><section data-dcnode-id="4069" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4083" id="sect0035"><span data-dcnode-id="4084" instrument_node="">Introduction</span></h2><p data-dcnode-id="4081" id="par0005"><span data-dcnode-id="4082" instrument_node="">Contemporary tax policies pursue diversity of policy objectives. Thus, taxation aims not just to raise the necessary funds for government expenditure, but also to contribute to income redistribution, economic stabilization, resource allocation, while at the same time should be supportive to the economic growth. The purpose of the properly designed tax system is to achieve desired fiscal policy objectives in the most efficient way, namely by limiting undesired distortions, minimizing the cost of tax collection and promoting economic growth. The efficiency of taxation and particularly the tax structure plays important role in achieving economic growth and fiscal consolidation.</span></p><p data-dcnode-id="4076" id="par0010"><span data-dcnode-id="4080" instrument_node="">According to the conventional economic theory taxation creates distortions and impacts negatively on economic growth. Considering a simple production function it is apparent that taxation can affect growth through its impact on (1) physical capital, (2) human capital and (3) through its effect on the total factor productivity. Some studies enunciate that corporate and personal income taxes are the most detrimental to growth, while consumption, environment and property taxes are less harmful (</span><a class="workspace-trigger" data-dcnode-id="4078" href="#bib0125" name="bbib0125"><span data-dcnode-id="4079" instrument_node="">OECD, 2008</span></a><span data-dcnode-id="4077" instrument_node="">).</span></p><p data-dcnode-id="4070" id="par0015"><span data-dcnode-id="4075" instrument_node="">Having in mind these assumptions, this paper aims to study the basic trends in the distribution of the total tax burden in the EU-28 member states</span><a class="workspace-trigger" data-dcnode-id="4072" href="#fn0005" name="bfn0005"><sup data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">1</span></sup></a><span data-dcnode-id="4071" instrument_node=""> for the period 1996–2013 and its impact on the economic growth. In addition, the paper sheds a light on the government spending and budgetary deficits as factors for creating a growth-friendly environment. The paper comprises six sections. Section ‘Literature Review’ presents a brief literature review. Section ‘Tax Systems in the EU-28 Member States (1996–2014)’ provides a descriptive analysis focused on the tax burden and tax structure in the EU-28 member states, derived through breakdown of the total tax revenues into standard components such as direct taxes, indirect taxes and social security contributions. Section ‘Analytical framework and empirical methodology’ presents the analytical framework and empirical methodology. Section ‘Regression results’ studies the effects of taxation and tax structure on economic growth applying regression methodology. Section ‘Conclusions’ concludes.</span></p></section><section data-dcnode-id="3952" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4067" id="sect0040"><span data-dcnode-id="4068" instrument_node="">Literature review</span></h2><p data-dcnode-id="4041" id="par0020"><span data-dcnode-id="4066" instrument_node="">The empirical studies on the relationship between taxation and economy growth are mainly focused on providing an evidence firstly, for the impact of the tax level on growth and secondly, for the impact of the tax structure on growth. A number of studies (</span><a class="workspace-trigger" data-dcnode-id="4064" href="#bib0005" name="bbib0005"><span data-dcnode-id="4065" instrument_node="">Agell et al., 2006</span></a><span data-dcnode-id="4063" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4061" href="#bib0025" name="bbib0025"><span data-dcnode-id="4062" instrument_node="">Barro, 1990</span></a><span data-dcnode-id="4060" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4058" href="#bib0030" name="bbib0030"><span data-dcnode-id="4059" instrument_node="">Barro, 1991</span></a><span data-dcnode-id="4057" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4055" href="#bib0060" name="bbib0060"><span data-dcnode-id="4056" instrument_node="">Easterly and Rebelo, 1993</span></a><span data-dcnode-id="4054" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4052" href="#bib0085" name="bbib0085"><span data-dcnode-id="4053" instrument_node="">Folster and Henrekson, 2001</span></a><span data-dcnode-id="4051" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4049" href="#bib0100" name="bbib0100"><span data-dcnode-id="4050" instrument_node="">Koester and Kormendi, 1989</span></a><span data-dcnode-id="4048" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4046" href="#bib0110" name="bbib0110"><span data-dcnode-id="4047" instrument_node="">Levine and Renelt, 1992</span></a><span data-dcnode-id="4045" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4043" href="#bib0130" name="bbib0130"><span data-dcnode-id="4044" instrument_node="">Paparas and Richter, 2015</span></a><span data-dcnode-id="4042" instrument_node="">) have investigated the link between the overall level of taxation (or of public spending) and growth using cross-country growth regression models covering different periods and different samples of countries, but no clear consensus about the nature and significance of such a relationship has emerged from the exploration works. This is not surprising because the overall size of the public sector has two opposite effects. On the one hand, higher taxes cause potentially higher distortions and impact negatively on economic growth, but on the other hand, higher taxes suppose higher levels of public expenditure, some of which may foster economic growth.</span></p><p data-dcnode-id="4033" id="par0025"><span data-dcnode-id="4040" instrument_node="">The discussion on the impact of the tax structure on growth is mainly focused on the relative merits of direct vs. indirect taxes, and especially on their ability to create a more growth-friendly environment. The prevailing view favours indirect taxation, and suggests a shift of the fiscal burden towards indirect taxes, especially those on consumption. For example </span><a class="workspace-trigger" data-dcnode-id="4038" href="#bib0115" name="bbib0115"><span data-dcnode-id="4039" instrument_node="">Myles (2009)</span></a><span data-dcnode-id="4037" instrument_node=""> reviews the findings on the topic and concludes that almost all the results support the claim that a move from income taxation to consumption taxation will raise the rate of growth. Moreover, a general tendency to shift the fiscal burden from direct to indirect taxation, and in particular from labour and capital towards the consumption taxes, has been observed in some of the EU member states over the last years (EU </span><a class="workspace-trigger" data-dcnode-id="4035" href="#bib0070" name="bbib0070"><span data-dcnode-id="4036" instrument_node="">Commission, 2011</span></a><span data-dcnode-id="4034" instrument_node="">).</span></p><p data-dcnode-id="3995" id="par0030"><span data-dcnode-id="4032" instrument_node="">The results from the empirical analyses of </span><a class="workspace-trigger" data-dcnode-id="4030" href="#bib0095" name="bbib0095"><span data-dcnode-id="4031" instrument_node="">Kneller, Bleaney, and Gemmell (1999)</span></a><span data-dcnode-id="4029" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4027" href="#bib0170" name="bbib0170"><span data-dcnode-id="4028" instrument_node="">Widmalm (2001)</span></a><span data-dcnode-id="4026" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4024" href="#bib0105" name="bbib0105"><span data-dcnode-id="4025" instrument_node="">Lee and Gordon (2005)</span></a><span data-dcnode-id="4023" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4021" href="#bib0090" name="bbib0090"><span data-dcnode-id="4022" instrument_node="">Gemell et al. (2006)</span></a><span data-dcnode-id="4020" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4018" href="#bib0020" name="bbib0020"><span data-dcnode-id="4019" instrument_node="">Arnold (2008)</span></a><span data-dcnode-id="4017" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4015" href="#bib0140" name="bbib0140"><span data-dcnode-id="4016" instrument_node="">Schwellnus and Arnold (2008)</span></a><span data-dcnode-id="4014" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4012" href="#bib0165" name="bbib0165"><span data-dcnode-id="4013" instrument_node="">Vartia (2008)</span></a><span data-dcnode-id="4011" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4009" href="#bib0050" name="bbib0050"><span data-dcnode-id="4010" instrument_node="">Dackehag and Hansson (2012)</span></a><span data-dcnode-id="4008" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4006" href="#bib0035" name="bbib0035"><span data-dcnode-id="4007" instrument_node="">Bernardi (2013)</span></a><span data-dcnode-id="4005" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4003" href="#bib0150" name="bbib0150"><span data-dcnode-id="4004" instrument_node="">Szarowska (2013)</span></a><span data-dcnode-id="4002" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4000" href="#bib0040" name="bbib0040"><span data-dcnode-id="4001" instrument_node="">Canavire-Bacarreza, et al. (2013)</span></a><span data-dcnode-id="3999" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3997" href="#bib0155" name="bbib0155"><span data-dcnode-id="3998" instrument_node="">Tanchev (2016)</span></a><span data-dcnode-id="3996" instrument_node=""> shed a light on the nature and significance of the relationship between tax structure and growth.</span></p><p data-dcnode-id="3976" id="par0035"><a class="workspace-trigger" data-dcnode-id="3993" href="#bib0095" name="bbib0095"><span data-dcnode-id="3994" instrument_node="">Kneller, Bleaney and Gemmell (1999)</span></a><span data-dcnode-id="3992" instrument_node=""> used a panel of 22 OECD countries for the period 1970–95 and identified a depressing effect of so called ‘distortionary taxes’, which include taxes on income and property. These findings are further confirmed by the analysis of </span><a class="workspace-trigger" data-dcnode-id="3990" href="#bib0090" name="bbib0090"><span data-dcnode-id="3991" instrument_node="">Gemell, Kneller and Sanz (2006)</span></a><span data-dcnode-id="3989" instrument_node="">, which provided new evidence on the long-run impact of distortionary taxes on growth in OECD countries by updating and extending datasets to cover 1970–2004. </span><a class="workspace-trigger" data-dcnode-id="3987" href="#bib0105" name="bbib0105"><span data-dcnode-id="3988" instrument_node="">Lee and Gordon (2005)</span></a><span data-dcnode-id="3986" instrument_node=""> applied cross-country regressions and found a significant negative correlation between statutory corporate tax rates and growth for 70 countries during 1970–1997. </span><a class="workspace-trigger" data-dcnode-id="3984" href="#bib0050" name="bbib0050"><span data-dcnode-id="3985" instrument_node="">Dackehag and Hansson (2012)</span></a><span data-dcnode-id="3983" instrument_node=""> report similar results. They studied how statutory tax rates on corporate and personal income affect economic growth by using panel data for the period 1975–2010 for 25 rich OECD countries and found that both taxation of corporate and personal income negatively influence economic growth. The empirical analyses of </span><a class="workspace-trigger" data-dcnode-id="3981" href="#bib0140" name="bbib0140"><span data-dcnode-id="3982" instrument_node="">Schwellnus and Arnold (2008)</span></a><span data-dcnode-id="3980" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3978" href="#bib0165" name="bbib0165"><span data-dcnode-id="3979" instrument_node="">Vartia (2008)</span></a><span data-dcnode-id="3977" instrument_node="">, based on large datasets of firms and industries across OECD countries, also indicated a negative effect of corporate taxes on the productivity and investment.</span></p><p data-dcnode-id="3966" id="par0040"><a class="workspace-trigger" data-dcnode-id="3974" href="#bib0170" name="bbib0170"><span data-dcnode-id="3975" instrument_node="">Widmalm (2001)</span></a><span data-dcnode-id="3973" instrument_node=""> used pooled cross-sectional data from 23 OECD countries, between 1965 and 1990, and found evidence that the proportion of tax revenue raised by taxing personal income has a negative correlation with economic growth. The robustness of the result is confirmed by sensitivity analysis, where the author controled for other plausible growth determinants in a systematic manner. </span><a class="workspace-trigger" data-dcnode-id="3971" href="#bib0020" name="bbib0020"><span data-dcnode-id="3972" instrument_node="">Arnold (2008)</span></a><span data-dcnode-id="3970" instrument_node=""> entered indicators of the tax structure into a set of panel growth regressions for a sample of 21 OECD countries over the period 1971–2004 and found that property taxes are the most growth-friendly, followed by consumption taxes and then by personal income taxes. At the same time corporate income taxes appear to have the most negative effect on growth. </span><a class="workspace-trigger" data-dcnode-id="3968" href="#bib0150" name="bbib0150"><span data-dcnode-id="3969" instrument_node="">Szarowska (2013)</span></a><span data-dcnode-id="3967" instrument_node=""> applied regression analysis on annual panel data for EU-24 member states during the period 1995–2010 and found statistically significant positive effect of consumption taxes on GDP growth.</span></p><p data-dcnode-id="3961" id="par0045"><span data-dcnode-id="3965" instrument_node="">In contrast to these findings, </span><a class="workspace-trigger" data-dcnode-id="3963" href="#bib0035" name="bbib0035"><span data-dcnode-id="3964" instrument_node="">Bernardi (2013)</span></a><span data-dcnode-id="3962" instrument_node=""> has performed an aggregated analysis of tax trends across Euro Area (EA-17) member countries, and a disaggregated, country-by-country analysis, with regard to the 2000–2014 period. He found that the gains from a tax shift (from direct to indirect taxes) do not appear to be as straightforward as claimed by the previous researches. On the contrary, he predicts that the tax shift may exacerbate the economic slump spreading across the European Union, particularly as an effect of the general adoption of restrictive fiscal policies by almost all member countries.</span></p><p data-dcnode-id="3957" id="par0050"><a class="workspace-trigger" data-dcnode-id="3959" href="#bib0040" name="bbib0040"><span data-dcnode-id="3960" instrument_node="">Canavire-Bacarreza, Martinez-Vazquez, and Vulovic (2013)</span></a><span data-dcnode-id="3958" instrument_node=""> evaluated the effect of different tax instruments on growth for Latin American countries using vector autoregressive techniques and panel data estimation. They found that personal income tax does not have the expected negative effect on economic growth. For corporate income tax, their results suggest reducing tax evasion and greater reliance on collection may boost economic growth in the region. The reliance on consumption taxes has significant positive effects on growth in Latin American in general, although they found slight negative effects in some of the selected countries.</span></p><p data-dcnode-id="3953" id="par0055"><a class="workspace-trigger" data-dcnode-id="3955" href="#bib0155" name="bbib0155"><span data-dcnode-id="3956" instrument_node="">Tanchev (2016)</span></a><span data-dcnode-id="3954" instrument_node=""> conducted an econometric study using OLS method in order to assess the impact of the personal income tax on the economic growth in Bulgaria for the period 2004–2012. He found that progressive income taxation has positive impact on growth.</span></p></section><section data-dcnode-id="3823" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3950" id="sect0045"><span data-dcnode-id="3951" instrument_node="">Tax systems in the EU-28 member states (1996–2014)</span></h2><div data-dcnode-id="3844"><p data-dcnode-id="3932" id="par0060"><span data-dcnode-id="3949" instrument_node="">Since the financial and economic crisis, the EU-28 member states have faced the difficult challenge of consolidating their budgets while at the same time promoting economic growth. The average budgetary aggregates in the EU-28 member states has clearly expressed cyclical dynamics over the period 1996–2014 (</span><a class="workspace-trigger" data-dcnode-id="3947" href="#fig0005" name="bfig0005"><span data-dcnode-id="3948" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3946" instrument_node="">). As a whole, the average ratio of public spending to GDP is high and varies between 45% and 50%. The most apparent increase in government spending is observed since 2008 due to the financial and economic crisis. The EU countries and especially those of EU-15</span><a class="workspace-trigger" data-dcnode-id="3943" href="#fn0010" name="bfn0010"><sup data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">2</span></sup></a><span data-dcnode-id="3942" instrument_node=""> traditionally have a strong social protection which entails higher amounts of government expenditure and respective tax burden. It is evident that proxies for economic development like GDP per capita, the industrial sector, and civil liberties have a positive impact on the tax revenues (</span><a class="workspace-trigger" data-dcnode-id="3940" href="#bib0045" name="bbib0045"><span data-dcnode-id="3941" instrument_node="">Castro &amp; Camarillo, 2014</span></a><span data-dcnode-id="3939" instrument_node="">). Significantly lower public spending and tax burden are reported by the new member states (eastern and southern European countries), mainly as a result of liberal economic reforms of democratic transition (</span><a class="workspace-trigger" data-dcnode-id="3937" href="#fig0010" name="bfig0010"><span data-dcnode-id="3938" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3936" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3934" href="#fig0015" name="bfig0015"><span data-dcnode-id="3935" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3933" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3903" id="fig0005"><span data-dcnode-id="3916"><img alt="" aria-describedby="cap0005" data-dcnode-id="3931" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr1.jpg&amp;raw"><span data-dcnode-id="3930" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3917"><li data-dcnode-id="3924"><a class="anchor download-link u-font-sans" data-dcnode-id="3925" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr1_lrg.jpg" target="_blank" title="Download high-res image (213KB)"><span class="anchor-text" data-dcnode-id="3926"><span data-dcnode-id="3929" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Download high-res image (213KB)</span></span></span></a></li><li data-dcnode-id="3918"><a class="anchor download-link u-font-sans" data-dcnode-id="3919" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3920"><span data-dcnode-id="3923" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3904"><span data-dcnode-id="3905" id="cap0005"><p data-dcnode-id="3910" id="spar0065"><span class="label" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Fig. 1</span></span><span data-dcnode-id="3913" instrument_node="">. </span><span data-dcnode-id="3911" instrument_node="">Government Expenditure, Tax Revenue and Budgetary Balance in the EU-28 (% of GDP).</span></p><p data-dcnode-id="3906" id="spar0070"><em data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Source</span></em><span data-dcnode-id="3907" instrument_node="">: Eurostat.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3874" id="fig0010"><span data-dcnode-id="3887"><img alt="" aria-describedby="cap0010" data-dcnode-id="3902" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr2.jpg&amp;raw"><span data-dcnode-id="3901" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3888"><li data-dcnode-id="3895"><a class="anchor download-link u-font-sans" data-dcnode-id="3896" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr2_lrg.jpg" target="_blank" title="Download high-res image (285KB)"><span class="anchor-text" data-dcnode-id="3897"><span data-dcnode-id="3900" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Download high-res image (285KB)</span></span></span></a></li><li data-dcnode-id="3889"><a class="anchor download-link u-font-sans" data-dcnode-id="3890" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3891"><span data-dcnode-id="3894" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3875"><span data-dcnode-id="3876" id="cap0010"><p data-dcnode-id="3881" id="spar0075"><span class="label" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Fig. 2</span></span><span data-dcnode-id="3884" instrument_node="">. </span><span data-dcnode-id="3882" instrument_node="">Government Expenditure and Budgetary Balance in the EU-28 member states (% of GDP, mean 1996–2014).</span></p><p data-dcnode-id="3877" id="spar0080"><em data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Source</span></em><span data-dcnode-id="3878" instrument_node="">: Eurostat.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3845" id="fig0015"><span data-dcnode-id="3858"><img alt="" aria-describedby="cap0015" data-dcnode-id="3873" height="258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr3.jpg&amp;raw"><span data-dcnode-id="3872" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3859"><li data-dcnode-id="3866"><a class="anchor download-link u-font-sans" data-dcnode-id="3867" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr3_lrg.jpg" target="_blank" title="Download high-res image (434KB)"><span class="anchor-text" data-dcnode-id="3868"><span data-dcnode-id="3871" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Download high-res image (434KB)</span></span></span></a></li><li data-dcnode-id="3860"><a class="anchor download-link u-font-sans" data-dcnode-id="3861" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0186104217300438-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3862"><span data-dcnode-id="3865" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3846"><span data-dcnode-id="3847" id="cap0015"><p data-dcnode-id="3852" id="spar0085"><span class="label" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Fig. 3</span></span><span data-dcnode-id="3855" instrument_node="">. </span><span data-dcnode-id="3853" instrument_node="">Distribution of the total tax burden in the EU-28 member states (% of GDP, mean 1996–2014).</span></p><p data-dcnode-id="3848" id="spar0090"><em data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Source</span></em><span data-dcnode-id="3849" instrument_node="">: Eurostat.</span></p></span></span></figure></div><p data-dcnode-id="3833" id="par0065"><span data-dcnode-id="3843" instrument_node="">The economic crisis triggered a collapse in gross domestic product (GDP) across EU-28 and highlighted the problems in connection with budget deficit and government debt. The balancing of budget has been on the agenda for most of the EU member states over the analyzed period. As seen, the average budgetary balance has cyclical dynamics (</span><a class="workspace-trigger" data-dcnode-id="3841" href="#fig0005" name="bfig0005"><span data-dcnode-id="3842" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3840" instrument_node="">). However, the usual state of this variable is a lower deficit or a higher deficit and no surpluses are recorded, even in the peak of the business cycle. The conclusion is that fiscal policy in most of the EU-28 members does not reflect neither Keynesian nor neo-liberal principles for budgetary balancing. The Nordic countries (e.g. Denmark, Finland and Sweden) make an exception, registering the highest overall public spending parallel to the highest overall tax burden (and respectively balanced budgets) in an EU-wide comparison (</span><a class="workspace-trigger" data-dcnode-id="3838" href="#fig0010" name="bfig0010"><span data-dcnode-id="3839" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3837" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3835" href="#fig0015" name="bfig0015"><span data-dcnode-id="3836" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3834" instrument_node="">).</span></p><p data-dcnode-id="3828" id="par0070"><span data-dcnode-id="3832" instrument_node="">The average overall tax burden in the EU-28 varies within very narrow limits (38.5%–40% of GDP). At the same time it differs considerably from country to country (</span><a class="workspace-trigger" data-dcnode-id="3830" href="#fig0015" name="bfig0015"><span data-dcnode-id="3831" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3829" instrument_node="">). The lowest average total-tax-to-GDP rates are reported by Romania (28.1%) and Bulgaria (28.7%), while almost two times higher rates are observed in Denmark (47.7%), Sweden (46.2%) and Belgium (45.5%).</span></p><p data-dcnode-id="3826" id="par0075"><span data-dcnode-id="3827" instrument_node="">Although the mean tax burden in the EU-28 seems almost equally distributed between the direct taxes (12.6%), indirect taxes (13.0%) and social security contributions (13.2%), the receipts from taxes on labour and capital have significantly decreased from 2007 to 2010, outpacing the reduction of the GDP. On the one hand this is due to the financial and economic crisis, which has a negative effect on corporate profits and personal income. On the other hand a slight shift in the tax burden away from labour towards consumption was registered, especially in the countries of eastern and northern Europe.</span></p><p data-dcnode-id="3824" id="par0080"><span data-dcnode-id="3825" instrument_node="">A cross-country comparison reveals that the eastern European states generate a relatively high share of total revenues through taxes on consumption, while in the northern and central European states, revenues come predominantly from labour taxes. Some European countries, such as Germany, France, Austria, and Belgium, impose relatively high burden on the factor labour, compared with the EU-28 average, and register the large share of social security contributions. Denmark is a special case as social security revenues there only amount to 1.6% of GDP.</span></p></section><section data-dcnode-id="3554" id="sec0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3821" id="sect0050"><span data-dcnode-id="3822" instrument_node="">Analytical framework and empirical methodology</span></h2><p data-dcnode-id="3816" id="par0085"><span data-dcnode-id="3820" instrument_node="">Barro's endogenous model is adopted as a suitable framework for analysis on the influence of taxation and government spending on economy growth in the EU-28 member states. Further developments of this model conclude that “the long-run growth rate of per capita output is a function of the tax rate and the shares of spending by different levels of government” (</span><a class="workspace-trigger" data-dcnode-id="3818" href="#bib0055" name="bbib0055"><span data-dcnode-id="3819" instrument_node="">Davoodi &amp; Zou, 1998</span></a><span data-dcnode-id="3817" instrument_node="">, p. 247).</span></p><p data-dcnode-id="3567" id="par0090"><span data-dcnode-id="3815" instrument_node="">The last deduction is accepted as a basis of regression model. The simple regression is specified as the annual growth rate of GDP is dependent variable, and the following are independent variables: total government spending, total receipts from taxes and social contributions as well as budgetary balance. This general model enables us to estimate the impacts of the fiscal policy of the European governments on economic growth. Thus, the equation of this relationship has the following type:</span><span class="display" data-dcnode-id="3619"><span class="formula" data-dcnode-id="3620" id="eq0005"><span class="math" data-dcnode-id="3621"><span class="MathJax_Preview" data-dcnode-id="3814" style=""></span><span class="MathJax_SVG" data-dcnode-id="3624" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>y</mi><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi><mi is=&quot;true&quot;>t</mi></mrow></msub><mo is=&quot;true&quot;>=</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>b</mi><mn is=&quot;true&quot;>0</mn></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>b</mi><mn is=&quot;true&quot;>1</mn></msub><mi is=&quot;true&quot;>T</mi><msub is=&quot;true&quot;><mi is=&quot;true&quot;>S</mi><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi><mi is=&quot;true&quot;>t</mi></mrow></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>b</mi><mn is=&quot;true&quot;>2</mn></msub><mi is=&quot;true&quot;>T</mi><msub is=&quot;true&quot;><mi is=&quot;true&quot;>R</mi><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</ 2" is="true"><mi data-dcnode-id="3678" is="true"><span data-dcnode-id="3679" instrument_node="">S</span></mi><mrow data-dcnode-id="3673" is="true"><mi data-dcnode-id="3676" is="true"><span data-dcnode-id="3677" instrument_node="">i</span></mi><mi data-dcnode-id="3674" is="true"><span data-dcnode-id="3675" instrument_node="">t</span></mi></mrow></msub><mo data-dcnode-id="3670" is="true"><span data-dcnode-id="3671" instrument_node="">+</span></mo><msub data-dcnode-id="3665" is="true"><mi data-dcnode-id="3668" is="true"><span data-dcnode-id="3669" instrument_node="">b</span></mi><mn data-dcnode-id="3666" is="true"><span data-dcnode-id="3667" instrument_node="">2</span></mn></msub><mi data-dcnode-id="3663" is="true"><span data-dcnode-id="3664" instrument_node="">T</span></mi><msub data-dcnode-id="3655" is="true"><mi data-dcnode-id="3661" is="true"><span data-dcnode-id="3662" instrument_node="">R</span></mi><mrow data-dcnode-id="3656" is="true"><mi data-dcnode-id="3659" is="true"><span data-dcnode-id="3660" instrument_node="">i</span></mi><mi data-dcnode-id="3657" is="true"><span data-dcnode-id="3658" instrument_node="">t</span></mi></mrow></msub><mo data-dcnode-id="3653" is="true"><span data-dcnode-id="3654" instrument_node="">+</span></mo><msub data-dcnode-id="3648" is="true"><mi data-dcnode-id="3651" is="true"><span data-dcnode-id="3652" instrument_node="">b</span></mi><mn data-dcnode-id="3649" is="true"><span data-dcnode-id="3650" instrument_node="">3</span></mn></msub><mi data-dcnode-id="3646" is="true"><span data-dcnode-id="3647" instrument_node="">B</span></mi><msub data-dcnode-id="3638" is="true"><mi data-dcnode-id="3644" is="true"><span data-dcnode-id="3645" instrument_node="">B</span></mi><mrow data-dcnode-id="3639" is="true"><mi data-dcnode-id="3642" is="true"><span data-dcnode-id="3643" instrument_node="">i</span></mi><mi data-dcnode-id="3640" is="true"><span data-dcnode-id="3641" instrument_node="">t</span></mi></mrow></msub><mo data-dcnode-id="3636" is="true"><span data-dcnode-id="3637" instrument_node="">+</span></mo><msub data-dcnode-id="3628" is="true"><mi data-dcnode-id="3634" is="true"><span data-dcnode-id="3635" instrument_node="">ε</span></mi><mrow data-dcnode-id="3629" is="true"><mi data-dcnode-id="3632" is="true"><span data-dcnode-id="3633" instrument_node="">i</span></mi><mi data-dcnode-id="3630" is="true"><span data-dcnode-id="3631" instrument_node="">t</span></mi></mrow></msub></mrow></math></span></span></span></span></span><span data-dcnode-id="3618" instrument_node="">where </span><em data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">y</span></em><sub data-dcnode-id="3613"><em data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">it</span></em></sub><span data-dcnode-id="3612" instrument_node=""> is the annual growth rate of GDP for each country and year. The total budget spending to GDP for each country and year is put into record with </span><em data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">TS</span></em><sub data-dcnode-id="3607"><em data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">it</span></em></sub><span data-dcnode-id="3606" instrument_node="">. </span><em data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">TR</span></em><sub data-dcnode-id="3601"><em data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">it</span></em></sub><span data-dcnode-id="3600" instrument_node=""> is the total receipts from taxes and social contributions after deduction of amounts assessed, but unlikely to be collected, as a ratio to GDP for each country and year. The third variable </span><em data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">BB</span></em><sub data-dcnode-id="3595"><em data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">it</span></em></sub><span data-dcnode-id="3594" instrument_node=""> is budgetary balance, which expresses net surplus or net deficit of budget as a ratio to GDP for each country and year. As expected, the component of error is marked with </span><em data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">ɛ</span></em><sub data-dcnode-id="3589"><em data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">it</span></em></sub><span data-dcnode-id="3588" instrument_node="">. The parameters are </span><em data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">b</span></em><sub data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">0</span></sub><span data-dcnode-id="3583" instrument_node="">, </span><em data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">b</span></em><sub data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">1</span></sub><span data-dcnode-id="3578" instrument_node="">, </span><em data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">b</span></em><sub data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">2</span></sub><span data-dcnode-id="3573" instrument_node="">, </span><em data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">b</span></em><sub data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">3</span></sub><span data-dcnode-id="3568" instrument_node="">.</span></p><p data-dcnode-id="3562" id="par0100"><span data-dcnode-id="3566" instrument_node="">The Ordinary Least Squares (OLS) method is adopted as an estimating technique. Along with the simple estimations, more precise procedures are also adopted. Reffering the experience of other economists (</span><a class="workspace-trigger" data-dcnode-id="3564" href="#bib0065" name="bbib0065"><span data-dcnode-id="3565" instrument_node="">Ehdaie, 1994</span></a><span data-dcnode-id="3563" instrument_node="">), we use the lagged values of the variables as instrumental variables. The procedures of the Ramsey RESET test and the White heteroskedasticity test are applied in searching for linear-structure breaks and heteroskedasticity. In cases of breaks of the traditional linear structure of the regression, non-linear functional forms will be expressed. In a case of heteroskedasticity, the technique of two-stage least squares will be applied. The test of Durbin-Watson indicates the presence and kind of serial correlation. Augmented Dicky-Fuller test is performed to check for unit root in the dynamics of each variable.</span></p><p data-dcnode-id="3557" id="par0105"><span data-dcnode-id="3561" instrument_node="">The study covers annual data for the period 1996–2013, retrieved from the </span><a class="workspace-trigger" data-dcnode-id="3559" href="#bib0075" name="bbib0075"><span data-dcnode-id="3560" instrument_node="">Eurostat database</span></a><span data-dcnode-id="3558" instrument_node="">.</span></p><p data-dcnode-id="3555" id="par0110"><span data-dcnode-id="3556" instrument_node="">After some rearrangements in the generalized specification, we are able to get understanding about the growth-friendliness of the tax structure. It is presented as disaggregate of the total amount of revenue into separate tax items by economic function. The total amount of government spending remains its place in the regression, while the variable of budgetary balance is removed, because the surplus and deficit are mostly caused by deviations in the tax collections and in this sense have secondary importance. Thus, the main purpose of the analysis is to estimate consistency of each tax with the economic growth. On this base, we could infer about what type of tax structure is more conductive to growth.</span></p></section><section data-dcnode-id="2437" id="sec0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3552" id="sect0055"><span data-dcnode-id="3553" instrument_node="">Regression results</span></h2><p data-dcnode-id="3547" id="par0115"><span data-dcnode-id="3551" instrument_node="">The dynamics of the aggregate variables are free of unit root, which is confirmed by the Augmented Dicky-Fuller (ADF) tests presented in </span><a class="workspace-trigger" data-dcnode-id="3549" href="#sec0040" name="bsec0040"><span data-dcnode-id="3550" instrument_node="">Appendix</span></a><span data-dcnode-id="3548" instrument_node="">.</span></p><div data-dcnode-id="3504"><p data-dcnode-id="3542" id="par0120"><span data-dcnode-id="3546" instrument_node="">As a starting point of the analysis, a check for breaks in the linear structure of the model has been run. The test of Ramsey confirms the existence of such breaks (</span><a class="workspace-trigger" data-dcnode-id="3544" href="#tbl0010" name="btbl0010"><span data-dcnode-id="3545" instrument_node="">Table 1</span></a><span data-dcnode-id="3543" instrument_node="">). It implies that non-linear links will describe the relations between the aggregate variables of fiscal policy and output.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3505" id="tbl0010"><span class="captions" data-dcnode-id="3534"><span data-dcnode-id="3535" id="cap0020"><p data-dcnode-id="3536" id="spar0095"><span class="label" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Table 1</span></span><span data-dcnode-id="3539" instrument_node="">. </span><span data-dcnode-id="3537" instrument_node="">Ramsey RESET Test on the specification with aggregate variables.</span></p></span></span><div class="groups" data-dcnode-id="3511"><table data-dcnode-id="3512"><tbody data-dcnode-id="3513"><tr data-dcnode-id="3523"><th class="align-left" data-dcnode-id="3530" scope="row"><em data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">F</span></em><span data-dcnode-id="3531" instrument_node="">-statistic</span></th><td class="align-char" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">15.67060</span></td><td class="align-left" data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Probability</span></td><td class="align-char" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">0.000087</span></td></tr><tr data-dcnode-id="3514"><th class="align-left" data-dcnode-id="3521" scope="row"><span data-dcnode-id="3522" instrument_node="">Log likelihood ratio</span></th><td class="align-char" data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">15.58050</span></td><td class="align-left" data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Probability</span></td><td class="align-char" data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">0.000079</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3506"></p><p data-dcnode-id="3507" id="spar0100"><em data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">Source</span></em><span data-dcnode-id="3508" instrument_node="">: Authors’ calculations using data from Eurostat.</span></p><p></p></div></div><div data-dcnode-id="3178"><p data-dcnode-id="3496" id="par0125"><span data-dcnode-id="3503" instrument_node="">The parameters of the regression are estimated under the full version of equation. Moreover, separate simple one-factor regressions are also run for the relation of each independent variable and the dependent variable. The estimating procedure was applied to an annual data panel for the EU-28 member states. Running regression under full version enables us to test for heteroskedasticity. The outputs of the White Heteroskedasticity test confirm the presence of the phenomenon of heteroskedasticity (</span><a class="workspace-trigger" data-dcnode-id="3501" href="#tbl0015" name="btbl0015"><span data-dcnode-id="3502" instrument_node="">Table 2</span></a><span data-dcnode-id="3500" instrument_node="">). Thus, the application of two-stage least squares method is justified for obtaining more reliable results (</span><a class="workspace-trigger" data-dcnode-id="3498" href="#tbl0020" name="btbl0020"><span data-dcnode-id="3499" instrument_node="">Table 3</span></a><span data-dcnode-id="3497" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3447" id="tbl0015"><span class="captions" data-dcnode-id="3488"><span data-dcnode-id="3489" id="cap0025"><p data-dcnode-id="3490" id="spar0105"><span class="label" data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Table 2</span></span><span data-dcnode-id="3493" instrument_node="">. </span><span data-dcnode-id="3491" instrument_node="">White Heteroskedasticity Test on the specification with aggregate variables.</span></p></span></span><div class="groups" data-dcnode-id="3453"><table data-dcnode-id="3454"><tbody data-dcnode-id="3455"><tr data-dcnode-id="3474"><th class="align-left" data-dcnode-id="3484" scope="row"><em data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">F</span></em><span data-dcnode-id="3485" instrument_node="">-statistic</span></th><td class="align-char" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">4.698558</span></td><td class="align-left" data-dcnode-id="3477"><span data-dcnode-id="3481" instrument_node="">Prob. </span><em data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">F</span></em><span data-dcnode-id="3478" instrument_node="">(9473)</span></td><td class="align-char" data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">0.0000</span></td></tr><tr data-dcnode-id="3465"><th class="align-left" data-dcnode-id="3472" scope="row"><span data-dcnode-id="3473" instrument_node="">Obs*R-squared</span></th><td class="align-char" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">39.63739</span></td><td class="align-left" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Prob. Chi-Square(9)</span></td><td class="align-char" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">0.0000</span></td></tr><tr data-dcnode-id="3456"><th class="align-left" data-dcnode-id="3463" scope="row"><span data-dcnode-i <span data-dcnode-id="3213" instrument_node="">479</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3196"></p><p data-dcnode-id="3204" id="spar0120"><em data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Source</span></em><span data-dcnode-id="3205" instrument_node="">: Authors’ calculations using data from Eurostat.</span></p><p data-dcnode-id="3197" id="spar0165"><em data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Note</span></em><span data-dcnode-id="3201" instrument_node="">: </span><em data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">t</span></em><span data-dcnode-id="3198" instrument_node="">-test in parenthesis.</span></p><p></p><dl class="footnotes" data-dcnode-id="3180"><dt data-dcnode-id="3194" id="tblfn0055"><span data-dcnode-id="3195" instrument_node="">*</span></dt><dd data-dcnode-id="3191"><p data-dcnode-id="3192" id="npar0005"><span data-dcnode-id="3193" instrument_node="">Significant at 10%.</span></p></dd><dt data-dcnode-id="3189" id="tblfn0070"><span data-dcnode-id="3190" instrument_node="">**</span></dt><dd data-dcnode-id="3186"><p data-dcnode-id="3187" id="npar0010"><span data-dcnode-id="3188" instrument_node="">Significant at 5%.</span></p></dd><dt data-dcnode-id="3184" id="tblfn0090"><span data-dcnode-id="3185" instrument_node="">***</span></dt><dd data-dcnode-id="3181"><p data-dcnode-id="3182" id="npar0015"><span data-dcnode-id="3183" instrument_node="">Significant at 1%.</span></p></dd></dl></div></div><p data-dcnode-id="3176" id="par0130"><span data-dcnode-id="3177" instrument_node="">As noted above, this version of the model makes it possible to estimate the effects of fiscal policy on economic growth in the EU-28 member states. These estimations imply that one quarter of the deviations of the growth are explained by the work of fiscal policy instruments. The one-factor regressions also fill details in the general picture. As seen, the government expenditure and budgetary balance have great importance for the EU economies, as far as these variables explain a high share of the economic growth deviations.</span></p><p data-dcnode-id="3174" id="par0135"><span data-dcnode-id="3175" instrument_node="">The first model testifies to a net negative effect of the government spending on the economic growth in the sample of EU-28 member states for the period 1996–2013. Similar evidence is drawn by the results estimated via instrumental variables. The link is linear and the coefficient has the highest value among all parameters of the model. The large amounts of inefficient expenditure can provide explanation for the results. Some governments have spent more than one half of GDP and such ratios have been maintaining for decades in the richest European countries. According to predatory state framework, governments invade in many spheres where private capital could have a better performance.</span></p><p data-dcnode-id="3160" id="par0140"><span data-dcnode-id="3173" instrument_node="">These results are supported by a variety of studies. </span><a class="workspace-trigger" data-dcnode-id="3171" href="#bib0120" name="bbib0120"><span data-dcnode-id="3172" instrument_node="">Nantob (2014)</span></a><span data-dcnode-id="3170" instrument_node=""> concludes that negative relationship between public expenditures and economic growth is due to the distortionary effect of high income taxes on economic growth. It is well known that the scope of government tends to increase with the level of income. This tendency is commonly called Wagner's Law, and is often said to imply that the income elasticity of demand for government is larger than unity. But this relationship is weakened at the highest levels of income. </span><a class="workspace-trigger" data-dcnode-id="3168" href="#bib0060" name="bbib0060"><span data-dcnode-id="3169" instrument_node="">Easterly and Rebelo (1993)</span></a><span data-dcnode-id="3167" instrument_node=""> show that there is a strong positive relationship between government size and per capita income both across a large sample of countries at a point in time (1985) and for a panel of 28 countries from 1870 to 1988, but this relationship disappears at the highest levels of income. </span><a class="workspace-trigger" data-dcnode-id="3165" href="#bib0085" name="bbib0085"><span data-dcnode-id="3166" instrument_node="">Folster and Henrekson (2001)</span></a><span data-dcnode-id="3164" instrument_node=""> report many regressions, which show a robust negative relationship between economic growth and government size in a panel of rich countries, covering the 1970–95 period. In accordance, </span><a class="workspace-trigger" data-dcnode-id="3162" href="#bib0135" name="bbib0135"><span data-dcnode-id="3163" instrument_node="">Schaltegger and Torgler (2006)</span></a><span data-dcnode-id="3161" instrument_node=""> concentrated on the relationship between public expenditure and economic growth within a rich country using the full sample of state and local governments from Switzerland over the 1981–2001 and found a fairly robust negative relationship between government size and economic growth.</span></p><p data-dcnode-id="3153" id="par0145"><a class="workspace-trigger" data-dcnode-id="3158" href="#bib0030" name="bbib0030"><span data-dcnode-id="3159" instrument_node="">Barro (1991)</span></a><span data-dcnode-id="3157" instrument_node=""> analyzed (among other variables) the ratio of real government consumption expenditure to real GDP as a regressor, and found a significantly negative correlation with growth for 98 countries in the period 1960–1985. </span><a class="workspace-trigger" data-dcnode-id="3155" href="#bib0130" name="bbib0130"><span data-dcnode-id="3156" instrument_node="">Paparas and Richter (2015)</span></a><span data-dcnode-id="3154" instrument_node=""> applied regressions in order to highlight the relationship between fiscal policy and economic growth in the EU-15 for the period 1995–2008 and found a negative impact of spending on human capital accumulation on economic growth. At the same time they noted that increase in government spending on infrastructure has a significant positive impact on the economic growth of a country.</span></p><p data-dcnode-id="3149" id="par0150"><a class="workspace-trigger" data-dcnode-id="3151" href="#bib0015" name="bbib0015"><span data-dcnode-id="3152" instrument_node="">Andersen and Jordan (1968)</span></a><span data-dcnode-id="3150" instrument_node=""> have estimated a weak positive effect of government expenditure in the quarters in which spending increases, but the effects are negative in the other quarters. They consider these results as consistent with modern quantity theories, which hold that government spending, taxing, and borrowing policies would have, through interest rate and wealth effects, different impacts on economic activity under varying circumstances.</span></p><p data-dcnode-id="3147" id="par0155"><span data-dcnode-id="3148" instrument_node="">The large amounts of government expenditure entail permanent budgetary deficits over the period. Therefore, positive regression coefficient would be expected for the impact of budgetary balance, i.e. shifting to balanced budget (and even to budgetary surplus in the peak of economic cycle) would be useful for the economic growth. The coefficient estimated via instrumental variables provides reliable evidence on those expectations. The simple-technique output show a weak non-linear relation, which implies a curve with optimum states of budgetary balance.</span></p><p data-dcnode-id="3139" id="par0160"><span data-dcnode-id="3146" instrument_node="">The parameters of first model indicates a positive influence of the tax revenues on economic growth in the EU-28 member states. In spite of having a lower value than this of government spending it is statistically significant. Third model gives a negative significant coefficient, but the explanatory power and adequacy of the model are ambiguous. The result obtained via instrumental variables is positive, but unfortunately insignificant. Despite the lack of unambugues evidence on the sign, it would be reasonable to suspect positive effects of taxation on economic growth. The literature does not provide a consensus about the nature and significance of the relationship taxation – growth; however, our results are in compliance with those of several studies. Mobilizing a dynamic panel data specification over the period 1989–2012, </span><a class="workspace-trigger" data-dcnode-id="3144" href="#bib0120" name="bbib0120"><span data-dcnode-id="3145" instrument_node="">Nantob (2014)</span></a><span data-dcnode-id="3143" instrument_node=""> found that weak and high tax rates respectively at short run and long run do not create distortions and hence affect positively economic growth. </span><a class="workspace-trigger" data-dcnode-id="3141" href="#bib0010" name="bbib0010"><span data-dcnode-id="3142" instrument_node="">Aghion, Akcigit, Cagé, and Kerr (2016)</span></a><span data-dcnode-id="3140" instrument_node=""> studied the relationships between taxation, corruption, and economic growth using state- and county-level variations within the United States over the 1983–2007 period, and reported significantly positive marginal effect of taxation for growth for a state with low levels of corruption.</span></p><p data-dcnode-id="3134" id="par0165"><span data-dcnode-id="3138" instrument_node="">Taking into account the results of the regressions, we could conclude about the general directions of development of the fiscal policy in the EU-28 members. Thus, efficient cure against economic weakness is decrease in the government expenditure, balanced budget, and tax structure, conductive to growth. This recommendation is applicable in spite of statements that the fulfilment of the Maastricht criteria is complicated under the conditions of a global financial crisis (</span><a class="workspace-trigger" data-dcnode-id="3136" href="#bib0160" name="bbib0160"><span data-dcnode-id="3137" instrument_node="">Todorov, 2014</span></a><span data-dcnode-id="3135" instrument_node="">).</span></p><p data-dcnode-id="3132" id="par0170"><span data-dcnode-id="3133" instrument_node="">A variety of empirical studies are searching for an optimum tax structure. In this sense, our research provides one more estimate and a few more suggestions for growth-conductive taxation.</span></p><div data-dcnode-id="2834"><p data-dcnode-id="3124" id="par0175"><span data-dcnode-id="3131" instrument_node="">As mentioned above, the specification of the model is modified in order to study the effects of separate taxes on economic growth. The revenue variable is differentiated into separate tax items, the expenditure variable remains unchanged, while the variable of budgetary balance is removed from the equation. Separate specifications of the model have been constructed by different combinations of right-hand variables. Thus, we get specifications through which estimate the entire tax structure (</span><em data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Model 1</span></em><span data-dcnode-id="3128" instrument_node="">), as well as the effects of indirect taxes, direct taxes and social contributions, respectively second and third model (</span><a class="workspace-trigger" data-dcnode-id="3126" href="#tbl0035" name="btbl0035"><span data-dcnode-id="3127" instrument_node="">Table 6</span></a><span data-dcnode-id="3125" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2835" id="tbl0035"><span class="captions" data-dcnode-id="3116"><span data-dcnode-id="3117" id="cap0045"><p data-dcnode-id="3118" id="spar0145"><span class="label" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Table 6</span></span><span data-dcnode-id="3121" instrument_node="">. </span><span data-dcnode-id="3119" instrument_node="">Tax structure and economic growth in the EU-28 member states, OLS Estimates.</span></p></span></span><div class="groups" data-dcnode-id="2859"><table data-dcnode-id="2860"><thead class="valign-top" data-dcnode-id="3104"><tr data-dcnode-id="3105"><th class="rowsep-1 align-left" data-dcnode-id="3114" scope="col"><span data-dcnode-id="3115" instrument_node="">Variable</span></th><th class="rowsep-1 align-left" data-dcnode-id="3112" scope="col"><span data-dcnode-id="3113" instrument_node="">Model 1</span></th><th class="rowsep-1 align-left" data-dcnode-id="3110" scope="col"><span data-dcnode-id="3111" instrument_node="">Model 2</span></th><th class="rowsep-1 align-left" data-dcnode-id="3108" scope="col"><span data-dcnode-id="3109" instrument_node="">Model 3</span></th><th class="rowsep-1 align-left" data-dcnode-id="3106" scope="col"><span data-dcnode-id="3107" instrument_node="">1st Difference</span></th></tr></thead><tbody data-dcnode-id="2861"><tr data-dcnode-id="3077"><th class="align-left" data-dcnode-id="3102" scope="row"><span data-dcnode-id="3103" instrument_node="">(Constant)</span></th><td class="align-char" data-dcnode-id="3096"><span data-dcnode-id="3101" instrument_node="">10.634</span><a class="workspace-trigger" data-dcnode-id="3098" href="#tblfn0095" name="btblfn0095"><sup data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">**</span></sup></a><span data-dcnode-id="3097" instrument_node=""> (6.406)</span></td><td class="align-char" data-dcnode-id="3090"><span data-dcnode-id="3095" instrument_node="">16.215</span><a class="workspace-trigger" data-dcnode-id="3092" href="#tblfn0095" name="btblfn0095"><sup data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">**</span></sup></a><span data-dcnode-id="3091" instrument_node=""> (12.896)</span></td><td class="align-char" data-dcnode-id="3084"><span data-dcnode-id="3089" instrument_node="">9.379</span><a class="workspace-trigger" data-dcnode-id="3086" href="#tblfn0095" name="btblfn0095"><sup data-d
