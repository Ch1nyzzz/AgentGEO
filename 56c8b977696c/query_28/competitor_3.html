</span><section data-dcnode-id="628" id="full-body-content"><h2 data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">What is the Economic Growth and Tax Relief Reconciliation Act (EGTRRA)?</span></h2><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">The Economic Growth and Tax Relief Reconciliation Act&nbsp;(EGTRRA)&nbsp;was enacted on June 7, 2001 as an amendment to the 1986 tax code. This income tax cut was initiated by the Bush administration to stimulate the economy during the 2001 recession.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><h2 data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Deeper definition</span></h2><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">EGTRRA made the following tax reductions:</span></p><span data-dcnode-id="1724" instrument_node="">
</span><ul data-dcnode-id="1695"><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Reduced the tax brackets from 39.6 percent to 35 percent, 36 percent to 33 percent, 31 percent to 28 percent, 28 percent to 25 percent, and 15 percent to 10 percent.</span></li><span data-dcnode-id="1720" instrument_node="">
</span><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Increased the child tax credit from $500 to $1,000.</span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Increased allowable tax deductions for education expenses and savings.</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Increased tax-deductible contributions to IRA accounts.</span></li><span data-dcnode-id="1711" instrument_node="">
</span><li data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Reduced the Alternative Minimum Tax.</span></li><span data-dcnode-id="1708" instrument_node="">
</span><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Reduced the marriage penalty by doubling the standard deduction for married couples and doubling the income threshold for married couples in the 15 percent bracket.</span></li><span data-dcnode-id="1705" instrument_node="">
</span><li data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Eliminated the phasing out of personal exemptions for individuals earning more than $150,000 per year.</span></li><span data-dcnode-id="1702" instrument_node="">
</span><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Eliminated the phasing out of itemized deductions of those earning more than $100,000 per year.</span></li><span data-dcnode-id="1699" instrument_node="">
</span><li data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Lowered the gift tax.</span></li><span data-dcnode-id="1696" instrument_node="">
</span></ul><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Because the EGTRRA tax cut was retroactive, the IRS mailed one-time tax rebates to taxpayers. The tax cuts and rebates initially provided some economic stimulus, offered tax relief for needy families and incentivized taxpayers to save more.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">However, the EGTRRA’s impact on the sluggish economy was limited. The EGTRRA cuts were designed to be phased in from 2001 to 2009. When the economy didn’t grow as hoped, experts argued the tax breaks were being phased in too slowly.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Researchers also found that high-income earners saved rather than spent the money saved from the EGTRRA.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">In response to the slowed economic growth, Congress passed the Jobs and Growth Tax Relief Reconciliation Act (JGTRRA) in 2003. This accelerated the EGTRRA provisions, reduced rates on dividends and capital gains to 15 percent, and increased tax deductions for small businesses.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Economic growth continued to remain slow while government revenues diminished, increasing the U.S. deficit. The value of the U.S. dollar began to decline in 2006, due to the high U.S. debt.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Over a 10-year period, the tax cuts from EGTRRA and JGTRRA saved taxpayers $1.35 trillion but increased the U.S. debt by $1.35 trillion. The Urban Institute reported the tax cuts provided the most benefit to families with children, making more than $200,000 per year.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">The EGTRRA tax cuts were scheduled to expire in 2004 and then again in 2010 but were repeatedly extended. The future of the EGTRRA taxes monopolized tax policy for more than a decade and became a central topic in the 2008 presidential campaign.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Barack Obama advocated for extending the cuts for families, earning less than $250,000. John McCain argued that most of the cuts should become permanent for all earners.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">In 2013, the American Taxpayer Relief Act of 2012 was passed and most of the EGTRRA cuts were made permanent as a part of a deal to avoid the so-called fiscal cliff, whereby a series of previously enacted laws would go into effect simultaneously, increasing taxes while decreasing spending</span></p><span data-dcnode-id="1667" instrument_node="">
