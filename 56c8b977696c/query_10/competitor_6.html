</span></div><hr class="HorizontalRule-sc-166wsjk-0 isGfFs" color="black" data-dcnode-id="731"><div data-dcnode-id="724" id="toc-bottom-cta"><div class="WidgetMarkdownTableOfContents__Upsell-sc-1eygwq-4 jhBJhD" data-dcnode-id="725"><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Tired of doing your own books?</span></p><p data-dcnode-id="726"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/signup/"><span data-dcnode-id="728" instrument_node="">Try Bench.</span></a></p></div></div></div></nav></div></div></div><div class="GridColumn-sc-1eg69m4-0 cFcltA" data-dcnode-id="326" span="7"><div class="SectionGrid__WidgetStack-sc-1deimss-0 yzRon" data-dcnode-id="353"><div class="Spacer-sc-12w5prj-0 ewfVbr" data-dcnode-id="354"><div data-dcnode-id="355" id="article-body"><div data-dcnode-id="356"><div class="ArticleBody-sc-1o0g7b9-0 fMlBDb" data-dcnode-id="357"><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The early bird gets the worm, as the saying goes, and so the early business tax filer earns comparable advantages. If you can get your taxes filed in January, you’ll be on your way to a less stressful tax season.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">As the tax filing season looms, here’s what you need to know about filing your </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/file-small-business-tax-return/"><span data-dcnode-id="714" instrument_node="">business income tax return</span></a><span data-dcnode-id="712" instrument_node=""> as soon as possible.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Keep in mind that state return deadlines vary, so this article focuses on federal tax return deadlines. Find out your state tax deadline by checking its Department of Revenue website.</span></p><span data-dcnode-id="707" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="706" id="when-will-the-irs-accept-returns"></div><h2 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">When will the IRS accept returns?</span></h2><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">The Internal Revenue Service has announced that </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/2022-tax-filing-season-begins-jan-24-irs-outlines-refund-timing-and-what-to-expect-in-advance-of-april-18-tax-deadline" rel="nofollow" target="_blank"><span data-dcnode-id="701" instrument_node="">they will begin accepting electronic returns from taxpayers</span></a><span data-dcnode-id="699" instrument_node=""> as of Monday, January 24th, 2022.</span></p><span data-dcnode-id="697" instrument_node="">
</span><div data-dcnode-id="696" data-proof-id="banner-1"></div><span data-dcnode-id="695" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="694" id="when-are-business-taxes-due"></div><h2 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">When are business taxes due?</span></h2><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">April 15 is commonly known as Tax Day, the day that individuals, sole proprietors, LLCs, and C corporations must file their taxes. While the pandemic resulted in changing due dates the previous year, the IRS has not announced any substantial changes for 2021 tax returns. In 2022, taxes are due on April 18th, since April 15 falls on Good Friday.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">You must have your tax return filed electronically by </span><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">midnight on April 18</span></strong><span data-dcnode-id="684" instrument_node="">. If you send your return to the IRS via snail mail, it is considered on time as long as it is postmarked by the due date. Note: your return will only be considered on time if you send the return in with the proper postage and the correct address. Tax returns sent back because of insufficient postage or an incorrect address are not considered filed on time by the IRS.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Business tax due dates are earlier for S corporations and partnerships. These business entities must have their returns filed by </span><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">March 15, 2022</span></strong><span data-dcnode-id="678" instrument_node="">. An S corporation files Form 1120-S while a partnership files Form 1065.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">S corporations and partnerships do not pay taxes on their income per se. Those income taxes are passed to shareholders or partners and paid as individual taxes.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">For the 2021 tax year, the last estimated quarterly tax payment for businesses is due </span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">January 17, 2022</span></strong><span data-dcnode-id="669" instrument_node="">. Estimated tax payments bump to the next business day if the due date falls on a holiday or weekend.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">For the 2022 tax year, estimated tax payments for businesses are due on the following days:</span></p><span data-dcnode-id="664" instrument_node="">

</span><div class="toc-anchor" data-dcnode-id="602" id="calendar-year-vs-fiscal-year"></div><h2 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Calendar year vs. fiscal year</span></h2><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">Keep in mind that there is a difference between the calendar year and fiscal year filing dates. The </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/tax-years" rel="nofollow" target="_blank"><span data-dcnode-id="597" instrument_node="">IRS</span></a><span data-dcnode-id="595" instrument_node=""> defines a calendar year as of January 1 through December 31. It considers a fiscal year as 12 consecutive months ending on the last day of any month except December.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="592" instrument_node="">Businesses filing as a calendar year must file by </span><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">April 18.</span></strong><span data-dcnode-id="589" instrument_node=""> Those operating under a </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc301" rel="nofollow" target="_blank"><span data-dcnode-id="588" instrument_node="">fiscal year</span></a><span data-dcnode-id="586" instrument_node=""> system must file the return on or before the </span><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">15th day of the fourth month after the close of your fiscal year</span></strong><span data-dcnode-id="583" instrument_node="">.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">Businesses can use either form of the tax year to determine annual income unless a certain type of tax year is required. Tax years are “adopted” by filing the initial tax form using that tax year. Once a particular tax year is chosen, you may need IRS approval in order to change it by filing IRS </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1128.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="579" instrument_node="">Form 1128</span></a><span data-dcnode-id="577" instrument_node="">.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Changing your tax year is fairly straightforward, but be sure you’ve followed IRS regulations to do so. According to the IRS, the following actions </span><em data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">do not</span></em><span data-dcnode-id="571" instrument_node=""> constitute adopting a tax year:</span></p><span data-dcnode-id="569" instrument_node="">
</span><ul data-dcnode-id="555"><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">Filing an application for an </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/ein-number/"><span data-dcnode-id="566" instrument_node="">Employer Identification Number</span></a><span data-dcnode-id="564" instrument_node=""> (EIN)</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Filing an application for a tax extension on an income tax return</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Paying estimated taxes for a tax year</span></li><span data-dcnode-id="556" instrument_node="">
</span></ul><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Most businesses can adopt a calendar year, and there are situations in which adopting a calendar year is mandatory. These include:</span></p><span data-dcnode-id="551" instrument_node="">
</span><ul data-dcnode-id="537"><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Lack of recordkeeping</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">No annual accounting period</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The current tax year does not qualify as a fiscal year</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">The IRS Code or income tax regulations require a calendar year</span></li><span data-dcnode-id="538" instrument_node="">
</span></ul><span data-dcnode-id="536" instrument_node="">
</span><div data-dcnode-id="535" data-proof-id="banner-2"></div><span data-dcnode-id="534" instrument_node="">
</span><h3 data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Is your business eligible for a refund?</span></h3><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">While </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/irs-refund-status/"><span data-dcnode-id="529" instrument_node="">tax refunds</span></a><span data-dcnode-id="527" instrument_node=""> are common when filing personal income taxes, most businesses are not eligible for a tax refund. That’s true of businesses structured as sole proprietorships, partnerships, S corporations, or limited liability corporations (LLCs).</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">That’s because these entities are structured to pass income to the owners. The owners then report the business income and expenses on their individual tax returns and are subject to tax. Small businesses structured this way do not pay taxes directly to the IRS, so the business per se cannot receive a refund. The owner might receive a refund based on their individual income tax return.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">The exception is a business structured as a C corporation. Using IRS </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1120.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="520" instrument_node="">Form 1120</span></a><span data-dcnode-id="518" instrument_node="">, the U.S. Corporation Income Tax, a C corporation pays taxes directly to the IRS. If the C corporation pays more in estimated tax than is due on its final return, a refund may prove due.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="515" instrument_node="">The </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/llc-filing-as-a-corporation-or-partnership" rel="nofollow" target="_blank"><span data-dcnode-id="514" instrument_node="">IRS treats an LLC</span></a><span data-dcnode-id="512" instrument_node=""> either as a C corporation, partnership, or as part of the owner’s tax return. Much depends on the number of members of an LLC or the elections made by the LLC. A domestic LLC with two or more members is considered a partnership for federal income tax purposes unless it decides to be treated as a C corporation by filing </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/llc-filing-as-a-corporation-or-partnership" rel="nofollow" target="_blank"><span data-dcnode-id="511" instrument_node="">Form 8832</span></a><span data-dcnode-id="509" instrument_node="">.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="501"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Learn more</span></strong><span data-dcnode-id="504" instrument_node="">: </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/llc-taxes/"><span data-dcnode-id="503" instrument_node="">The Complete Guide to LLC Taxes</span></a></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">While only C corporations could potentially receive an income tax refund, there are situations in which other types of overpaid taxes could result in a refund no matter the business structure type.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="496" instrument_node="">For instance, overpayment of </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/accounting/calculate-payroll-tax/"><span data-dcnode-id="495" instrument_node="">payroll taxes</span></a><span data-dcnode-id="493" instrument_node=""> could occur if you overpaid this account. The same holds true for sales or excise taxes, although these overpayments are usually refunded by the state or municipality, not the federal government. Overpayment or underpayment of employment taxes requires the filing of an </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/correcting-employment-taxes" rel="nofollow" target="_blank"><span data-dcnode-id="492" instrument_node="">"X’ amended return form.</span></a></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">If your small business is eligible for a refund, it makes sense to file your income tax return as early as possible. Even if your business is not eligible for a refund, filing as a sole proprietor or partnership could mean that you might receive a personal tax refund.</span></p><span data-dcnode-id="486" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="485" id="what-are-the-consequences-of-filing-late"></div><h2 data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">What are the consequences of filing late?</span></h2><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">What happens if you must file your tax return late or if you </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/what-happens-if-you-dont-file-taxes/"><span data-dcnode-id="480" instrument_node="">don’t file taxes</span></a><span data-dcnode-id="478" instrument_node=""> at all?  You could end up with an additional tax bill from the IRS. The one thing you must not do is ignore your tax situation. Not filing your return on time generally means any taxes due were not paid, and that can lead to serious penalties.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The IRS will levy both a late filing penalty and a late payment penalty. How much you will have to pay depends on how late your filing and payment are and how much tax you owe.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Without filing for an extension, missing the tax deadline incurs a penalty of 5% of the unpaid tax for each month the return is late. That amount can add up very quickly. Failure to pay the amount of tax owed on time results in a penalty of 0.5% of the amount due for each month it is unpaid.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">There is some good news. These penalties max out at 25% of the total tax owed. In a worst-case scenario, you max out at the 5% penalty for missing the tax deadline after five months. That “failure to pay” penalty keeps going for quite some time if not resolved, with a total of 45 months, or close to four years.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Along with penalties, expect interest charges. That interest is applied every day that you are late. It is applied not only to your total tax due but to your accrued penalties as well. The interest rate is the federal short-term rate plus 3%.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">What if your business is new and you didn’t have any taxable income? You must still file a tax return.</span></p><span data-dcnode-id="461" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="460" id="how-bench-can-help"></div><h2 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">How Bench can help</span></h2><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">At Bench, our team of bookkeepers completes monthly books and prepares financials for tax filing. We help you maximize every available tax deduction, and provide a year-end financial package with everything needed to file your business taxes. If you’re worried about missing the deadline, we can even complete your tax filings for you.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="453" instrument_node="">If you have any additional questions, Bench customers also get access to unlimited on-demand tax consultations. </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/how-it-works/"><span data-dcnode-id="452" instrument_node="">Start your free trial today</span></a><span data-dcnode-id="450" instrument_node="">.</span></p><span data-dcnode-id="448" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="447" id="what-are-the-benefits-of-getting-started-on-your-taxes-early"></div><h2 data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">What are the benefits of getting started on your taxes early?</span></h2><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Tax season is stressful. One of the great benefits of getting started on your taxes early is stress minimization. A mental weight is lifted when you know your tax filing is completed ahead of the due date and you can focus on your business instead of tax obligations.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">What if you owe tax? First, by getting started early, you know how much you owe the IRS and have time to put together a payment plan. You don’t actually have to pay the money owed until the due date. By completing your tax forms and filing them, you can figure out the best ways to come up with the funds rather than go into panic mode on April 14.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Your tax professional likely has more availability to help early filers as well. Getting an appointment with a tax professional is much easier in January or February than in March or April. In fact, getting ahead on your tax prep can save you money in the long run, too. You avoid IRS penalties and, by avoiding any last-minute rush fees,  you will often pay less for tax preparation.</span></p><span data-dcnode-id="435" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="434" id="tax-extensions"></div><h2 data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Tax extensions</span></h2><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="430" instrument_node="">Sometimes a business cannot file early and must </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/how-to-file-federal-tax-extension/"><span data-dcnode-id="429" instrument_node="">file for a tax extension</span></a><span data-dcnode-id="427" instrument_node="">. Tax extensions are due by </span><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">April 18</span></strong><span data-dcnode-id="424" instrument_node=""> for C corporations. For businesses that file as S corporations or partnerships, the tax extension due date is </span><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">March 15, 2022</span></strong><span data-dcnode-id="421" instrument_node="">.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">If your business has filed successfully for a tax extension, sole proprietors and C corporations must file income tax returns by </span><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">October 15, 2022</span></strong><span data-dcnode-id="415" instrument_node="">.</span></p><span data-dcnode-id="413" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="412" id="w2-filing-deadline"></div><h2 data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">W-2 filing deadline</span></h2><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">Businesses with employees must fill out two W-2 forms, the Wage and Tax Statement, for each employee. One copy goes to the employee and the other to the IRS. The deadline for submitting these forms is </span><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">January 31, 2022</span></strong><span data-dcnode-id="405" instrument_node="">.</span></p><span data-dcnode-id="403" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="402" id="form-1099-deadline"></div><h2 data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Form 1099 deadline</span></h2><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">Businesses working with </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/1099-nec-vs-misc/"><span data-dcnode-id="397" instrument_node="">independent contractors</span></a><span data-dcnode-id="395" instrument_node=""> must file </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/1099-nec-guide/"><span data-dcnode-id="394" instrument_node="">Form 1099-NEC</span></a><span data-dcnode-id="392" instrument_node=""> for non-employee compensation. Before 2020, businesses used the form 1099-MISC for miscellaneous income for such reporting.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Prior to 2020, the 1099-NEC had not been used since the 1980s. Now, the 1099-NEC is used for reporting all payments to individuals performing work for the company who are not on the payroll. The 1099-MISC has not disappeared but is now used solely for various types of miscellaneous income, such as rents, legal settlements, or prizes.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">The deadline for providing this form to independent contractors and the IRS is </span><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">January 31, 2022</span></strong><span data-dcnode-id="383" instrument_node="">. Part A of 1099-NEC is filed with the IRS, while Part B is sent to the contractor.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="380" instrument_node="">If you must provide a 1099-MISC form, the due date for filing a paper return is </span><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">February 28, 2022</span></strong><span data-dcnode-id="377" instrument_node="">. If you e-file, the due date is </span><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">March 31, 2022</span></strong><span data-dcnode-id="374" instrument_node="">. Again, Part A of 1099-MISC is filed with the IRS while Part B is sent to the recipient.</span></p><span data-dcnode-id="372" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="371" id="advantages-of-early-filing"></div><h2 data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Advantages of early filing</span></h2><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">There are many advantages to filing your business taxes early and virtually no downside. Filing your business income tax return early eliminates the need to file for a tax extension. While reasons for requesting an extension vary by the enterprise, for many small businesses the need is driven by simply not getting tax documents gathered on time.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="364" instrument_node="">No business wants to make mistakes when </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/small-business-taxes/"><span data-dcnode-id="363" instrument_node="">filing its tax return</span></a><span data-dcnode-id="361" instrument_node="">. Rushing to meet the tax deadline makes it more likely that errors, perhaps costly ones, will occur. Getting started early means no hurrying and less likelihood of mistakes. Just make sure your bookkeeping is up-to-date and you’ll be prepared have your business taxes filed as soon as possible!</span></p><span data-dcnode-id="359" instrument_node="">
</span><div data-dcnode-id="358" data-proof-id="banner-3"></div></div></div></div></div></div><div class="SectionGrid__WidgetStack-sc-1deimss-0 yzRon" data-dcnode-id="339"><div class="Spacer-sc-12w5prj-0 ewfVbr" data-dcnode-id="340"><section data-dcnode-id="341"><header class="WidgetValueProp__ValuePropHeader-sc-902n5r-0 gUNghf" data-dcnode-id="350"><h3 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">What's Bench?</span></h3></header><main class="WidgetValueProp__ValuePropBody-sc-902n5r-1 kagVwP" data-dcnode-id="342" font-size="18" font-weight="500"><div data-dcnode-id="343"><p data-dcnode-id="345"><span data-dcnode-id="349" instrument_node="">We're an online bookkeeping service powered by real humans. Bench gives you a dedicated bookkeeper supported by a team of knowledgeable small business experts. We’re here to take the guesswork out of running your own business—for good. Your bookkeeping team imports bank statements, categorizes transactions, and prepares financial statements every month. </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bench.co/signup/"><span data-dcnode-id="348" instrument_node="">Get started with a free month of bookkeeping</span></a><span data-dcnode-id="346" instrument_node="">.</span></p><span data-dcnode-id="344" instrument_node="">
