</span><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">Take a few minutes to save each relevant filing date to your calendar (</span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/resources/federal-tax-prep-calendar/"><span data-dcnode-id="1140" instrument_node="">or download our federal tax calendar</span></a><span data-dcnode-id="1138" instrument_node="">), and stay ahead of the IRS.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1135" id="when-is-tax-day"></div><h2 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">When is “tax day”?</span></h2><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">While January to April is called “tax season,” the big “tax day” is usually April 15. If that falls on a holiday or weekend, it moves to the next business day.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">This year, tax day is April 18, 2022. This is when individual taxpayers, sole proprietors, and C corporations need to file their taxes.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1125" instrument_node="">Note that if you are using a </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/accounting/fiscal-year/"><span data-dcnode-id="1124" instrument_node="">fiscal year</span></a><span data-dcnode-id="1122" instrument_node=""> that isn’t the calendar year, your tax filing deadline is different and </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/accounting/fiscal-year/%23the-fiscal-year-and-taxes"><span data-dcnode-id="1121" instrument_node="">depends on your business entity and when your fiscal year ends</span></a><span data-dcnode-id="1119" instrument_node="">.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1116" id="whats-the-deadline-to-pay-your-taxes"></div><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">What’s the deadline to pay your taxes?</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Even if you successfully apply for an extension, the payment deadlines don’t change. The penalty for late payment is 0.5% of the taxes owed each month compared to 5% for late filing. Regardless of whether you can pay your small business taxes, it always pays off to file on time.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">If you’re sending your return via snail mail, the IRS considers your return “on time” if it’s addressed correctly, has enough postage, and is in the mail before the end of business on your filing deadline. Otherwise, you can e-file your return before midnight on your tax filing deadline day.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">If you’re self-employed, your business probably pays taxes in four sums throughout the year, rather than on one day. These are called </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/estimated-quarterly-taxes/"><span data-dcnode-id="1105" instrument_node="">estimated tax payments</span></a><span data-dcnode-id="1103" instrument_node=""> and you can think of them as a prepayment of your income and self-employment taxes (Medicare and social security). The due dates for these 2022 payments are April 18, June 15, September 15, and January 16 (2023).</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">If you’d rather have someone else handle your bookkeeping and federal income tax filing, </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/benchtax/"><span data-dcnode-id="1099" instrument_node="">check out Bench</span></a><span data-dcnode-id="1097" instrument_node="">.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">We’ll set you up with a dedicated team of bookkeepers and a tax team to provide year round tax advice and file your taxes for you. With these teams, you’ll have a tax planning session to ensure you are more prepared for next year. We’ll take both headaches—bookkeeping and taxes—off your hands, for good.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1091" id="when-are-2022-tax-extensions-due"></div><h2 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">When are 2022 tax extensions due?</span></h2><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">You have right up until tax day to file for an extension. For individuals, that means you can still file for a tax extension right on April 18, 2022. The same goes for businesses: S corps and partnerships can still get an extension on March 15, and the last day for C corps to file for an extension is April 18.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><div data-dcnode-id="1084" data-proof-id="banner-1"></div><span data-dcnode-id="1083" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1082" id="2022-tax-deadlines"></div><h2 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">2022 Tax Deadlines</span></h2><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1078" instrument_node="">Below is a detailed list of every tax deadline in 2022. But you can also check out our specific guides for </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/llc-tax-filing-deadline/"><span data-dcnode-id="1077" instrument_node="">LLC tax deadlines</span></a><span data-dcnode-id="1075" instrument_node=""> and </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/s-corp-tax-filing-deadline/"><span data-dcnode-id="1074" instrument_node="">S corporation tax deadlines</span></a><span data-dcnode-id="1072" instrument_node="">.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1069" id="january-3-2022"></div><h2 data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">January 3, 2022</span></h2><span data-dcnode-id="1066" instrument_node="">
</span><h3 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Extended 2021 filing deadline for Hurricane Ida victims (Pennsylvania, New York, and New Jersey)</span></h3><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1062" instrument_node="">Individuals and businesses in </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-tax-relief-now-available-to-ida-victims-in-pennsylvania-oct-15-deadline-other-dates-extended-to-jan-3" rel="nofollow" target="_blank"><span data-dcnode-id="1061" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="1059" instrument_node="">, </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-tax-relief-now-available-to-ida-victims-in-new-york-and-new-jersey-oct-15-deadline-other-dates-extended-to-jan-3" rel="nofollow" target="_blank"><span data-dcnode-id="1058" instrument_node="">New York, and New Jersey</span></a><span data-dcnode-id="1056" instrument_node=""> affected by Hurricane Ida have been granted an extension to certain filing deadlines.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">If you are an individual or business that successfully extended your tax filing to October 15, 2021, you now have until January 3, 2022 to file.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Quarterly estimated income tax payments originally due on September 15, 2021 and excise tax returns originally due on November 1, 2021 have also been pushed to January 3, 2022.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="1047" id="january-18-2022"></div><h2 data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">January 18, 2022</span></h2><span data-dcnode-id="1044" instrument_node="">
</span><h3 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Estimated quarterly payments</span></h3><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Say a final goodbye to 2021. The fourth (and final) </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/estimated-taxes" rel="nofollow" target="_blank"><span data-dcnode-id="1039" instrument_node="">estimated quarterly tax payment</span></a><span data-dcnode-id="1037" instrument_node=""> for the previous tax year is due today.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1028"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Note:</span></strong><span data-dcnode-id="1032" instrument_node=""> Individuals, you do not have to file this payment due on January 18, 2022—so long as you file your 2021 tax return by January 31, 2022 and pay the remaining balance owed with your return (see </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/1040-es/"><span data-dcnode-id="1031" instrument_node="">Form 1040-ES</span></a><span data-dcnode-id="1029" instrument_node=""> for details).</span></p><span data-dcnode-id="1027" instrument_node="">

</span><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">If you have employees, you’ll need to fill out two copies of </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/uac/about-form-w2" rel="nofollow" target="_blank"><span data-dcnode-id="988" instrument_node="">Form W-2</span></a><span data-dcnode-id="986" instrument_node=""> for each one.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">One W-2 must be submitted to the IRS. The other must be sent to the employee. The deadline for both is January 31, 2022.</span></p><span data-dcnode-id="981" instrument_node="">

</span><h3 data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Start making tax moves</span></h3><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="436"><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/year-end-tax-moves/"><span data-dcnode-id="442" instrument_node="">End of year tax moves</span></a><span data-dcnode-id="440" instrument_node=""> can help grow your business and reduce your </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/taxable-income/"><span data-dcnode-id="439" instrument_node="">taxable income</span></a><span data-dcnode-id="437" instrument_node=""> for the calendar year. If you haven’t done so already, now’s the time to plan and take action.</span></p><span data-dcnode-id="435" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="434" id="december-31-2022"></div><h2 data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">December 31, 2022</span></h2><span data-dcnode-id="431" instrument_node="">
</span><h3 data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Tax moves deadline</span></h3><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Today is the final day to make any tax moves for the 2022 tax year.</span></p><span data-dcnode-id="425" instrument_node="">
</span><h3 data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Set up a solo 401 (k)</span></h3><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">If you are self-employed, today is the deadline to set up a </span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/retirement-plans/one-participant-401k-plans" rel="nofollow" target="_blank"><span data-dcnode-id="420" instrument_node="">solo 401 (k)</span></a><span data-dcnode-id="418" instrument_node="">.</span></p><span data-dcnode-id="416" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="415" id="when-can-i-start-filing-taxes-for-2022"></div><h2 data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">When can I start filing taxes for 2022?</span></h2><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Typically, the IRS starts accepting tax returns around mid to late January. If you’re going to use a tax professional, it’s best to get started sooner rather than later. As we get closer to deadlines, demand for their services go up and they have less capacity to take on new clients.</span></p><span data-dcnode-id="409" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="408" id="when-will-i-get-my-tax-refund"></div><h2 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">When will I get my tax refund?</span></h2><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">Most tax filers will receive their refund within </span><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">21 calendar days</span></strong><span data-dcnode-id="401" instrument_node=""> after their return was received by the IRS.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="398" instrument_node="">That’s not an IRS promise or anything. But in general, you can expect to get your tax refund </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/refunds/tax-season-refund-frequently-asked-questions" rel="nofollow" target="_blank"><span data-dcnode-id="397" instrument_node="">3-4 weeks after filing your return</span></a><span data-dcnode-id="395" instrument_node="">. You can </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/irs-refund-status/"><span data-dcnode-id="394" instrument_node="">check your IRS refund status in five minutes</span></a><span data-dcnode-id="392" instrument_node=""> by using the IRS </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Where’s My Refund</span></em><span data-dcnode-id="389" instrument_node=""> tool.</span></p><span data-dcnode-id="387" instrument_node="">
</span><div class="toc-anchor" data-dcnode-id="386" id="paying-your-taxes-late"></div><h2 data-dcnode-id="383"><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Paying your taxes late</span></strong></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">Past your tax due date, you’ll have to pay a </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/irs-audit/%23irs-fines-and-penalties"><span data-dcnode-id="380" instrument_node="">penalty for late payment</span></a><span data-dcnode-id="378" instrument_node="">. This amounts to an additional 0.5% of unpaid taxes every month until you pay your original tax bill (up to a maximum 25% of your total tax bill).</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">The late filing penalty is 5% of unpaid taxes every month. This means that even if you can’t afford your current tax liability, filing on time will still save you money on penalties.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">While it’s best to file and pay your taxes as soon as you can to minimize penalties, we put together a guide that explains </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/what-happens-if-you-dont-file-taxes/"><span data-dcnode-id="371" instrument_node="">what happens if you don’t file taxes</span></a><span data-dcnode-id="369" instrument_node="">.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="366" instrument_node="">If you have concerns about falling behind on tax payments, learn about the </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/irs-fresh-start/"><span data-dcnode-id="365" instrument_node="">IRS</span></a><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bench.co/blog/tax-tips/irs-fresh-start/"><span data-dcnode-id="363" instrument_node=""> Fresh Start program</span></a><span data-dcnode-id="361" instrument_node="">.</span></p><span data-dcnode-id="359" instrument_node="">
</span><div data-dcnode-id="358" data-proof-id="banner-3"></div></div></div></div></div></div><div class="SectionGrid__WidgetStack-sc-1deimss-0 yzRon" data-dcnode-id="339"><div class="Spacer-sc-12w5prj-0 ewfVbr" data-dcnode-id="340"><section data-dcnode-id="341"><header class="WidgetValueProp__ValuePropHeader-sc-902n5r-0 gUNghf" data-dcnode-id="350"><h3 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">What's Bench?</span></h3></header><main class="WidgetValueProp__ValuePropBody-sc-902n5r-1 kagVwP" data-dcnode-id="342" font-size="18" font-weight="500"><div data-dcnode-id="343"><p data-dcnode-id="345"><span data-dcnode-id="349" instrument_node="">We're an online bookkeeping service powered by real humans. Bench gives you a dedicated bookkeeper supported by a team of knowledgeable small business experts. We’re here to take the guesswork out of running your own business—for good. Your bookkeeping team imports bank statements, categorizes transactions, and prepares financial statements every month. </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bench.co/signup/"><span data-dcnode-id="348" instrument_node="">Get started with a free month of bookkeeping</span></a><span data-dcnode-id="346" instrument_node="">.</span></p><span data-dcnode-id="344" instrument_node="">
