</span><article class="post-entry post-entry-type-standard post-entry-14274 post-loop-1 post-parity-odd post-entry-last single-big with-slider post-14274 post type-post status-publish format-standard has-post-thumbnail hentry category-blog category-leasing-insights category-news" data-dcnode-id="901" itemprop="blogPost" itemscope="itemscope" itemtype="https://schema.org/BlogPosting"><div class="big-preview single-big" data-dcnode-id="1104" itemprop="image" itemscope="itemscope" itemtype="https://schema.org/ImageObject"><a class="lightbox-added" data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//c1s4b2yq1kp361y1f134gmgt-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/photo-1479920252409-6e3d8e8d4866-1030x687.jpg" title="photo-1479920252409-6e3d8e8d4866"><img alt="Computer equipment leasing, How does Super Deduction Tax work" class="wp-image-15606 avia-img-lazy-loading-15606 attachment-entry_without_sidebar size-entry_without_sidebar wp-post-image" data-dcnode-id="1108" height="423" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//c1s4b2yq1kp361y1f134gmgt-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/photo-1479920252409-6e3d8e8d4866-e1629372459665-845x423.jpg&amp;raw" width="845"><span class="image-overlay overlay-type-image" data-dcnode-id="1106"><span class="image-overlay-inside" data-dcnode-id="1107"></span></span></a></div><div class="blog-meta" data-dcnode-id="1103"></div><div class="entry-content-wrapper clearfix standard-content" data-dcnode-id="938"><header class="entry-content-header" data-dcnode-id="1070"><h1 class="post-title entry-title" data-dcnode-id="1100" itemprop="headline"><span data-dcnode-id="1102" instrument_node="">How does Super Deduction Tax work with leasing?</span><span class="post-format-icon minor-meta" data-dcnode-id="1101"></span></h1><span class="post-meta-infos" data-dcnode-id="1071"><time class="date-container minor-meta updated" data-dcnode-id="1098" datetime="2022-01-24T09:00:35+00:00" itemprop="datePublished"><span data-dcnode-id="1099" instrument_node="">January 24, 2022</span></time><span class="text-sep" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">/</span></span><span class="comment-container minor-meta" data-dcnode-id="1093"><a class="comments-link" data-dcnode-id="1094" href="#respond"><span data-dcnode-id="1095" instrument_node="">0 Comments</span></a></span><span class="text-sep" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">/</span></span><span class="blog-categories minor-meta" data-dcnode-id="1081"><span data-dcnode-id="1090" instrument_node="">in </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westwon.co.uk/category/blog/" rel="tag"><span data-dcnode-id="1089" instrument_node="">Blog</span></a><span data-dcnode-id="1087" instrument_node="">, </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westwon.co.uk/category/leasing-insights/" rel="tag"><span data-dcnode-id="1086" instrument_node="">Leasing Insights</span></a><span data-dcnode-id="1084" instrument_node="">, </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westwon.co.uk/category/news/" rel="tag"><span data-dcnode-id="1083" instrument_node="">News</span></a></span><span class="text-sep" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">/</span></span><span class="blog-author minor-meta" data-dcnode-id="1072"><span data-dcnode-id="1078" instrument_node="">by </span><span class="entry-author-link" data-dcnode-id="1073" itemprop="author"><span class="author" data-dcnode-id="1074"><span class="fn" data-dcnode-id="1075"><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westwon.co.uk/author/millie/" rel="author" title="Posts by Millie Newton"><span data-dcnode-id="1077" instrument_node="">Millie Newton</span></a></span></span></span></span></span></header><div class="entry-content" data-dcnode-id="966" itemprop="text"><div class="hr av-tpptlu-9b7ab41e84b283e0bff34aad1e68a1a7 hr-invisible avia-builder-el-0 avia-builder-el-no-sibling" data-dcnode-id="1067"><span class="hr-inner" data-dcnode-id="1068"><span class="hr-inner-style" data-dcnode-id="1069"></span></span></div><span data-dcnode-id="1066" instrument_node="">
</span><h3 data-dcnode-id="1063"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">How does the Super Tax Deduction work with leasing?</span></strong></h3><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1061" instrument_node="">From the 1</span><sup data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">st</span></sup><span data-dcnode-id="1058" instrument_node=""> April until 31</span><sup data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">st</span></sup><span data-dcnode-id="1055" instrument_node=""> March 2023, companies investing in new plant and machinery assets are able to claim the 130% super tax deduction. For further information visit </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/super-deduction"><span data-dcnode-id="1054" instrument_node="">here</span></a><span data-dcnode-id="1052" instrument_node="">.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">We are used to speaking about the tax benefits of asset finance. However, these conversations have been taking in a new meaning since the announcement of the new super tax deduction.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">In this article, we explore how does the super deduction work with finance?</span></p><span data-dcnode-id="1044" instrument_node="">
</span><h3 data-dcnode-id="1041"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Can I take out a finance agreement and still claim super deduction tax relief?</span></strong></h3><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">The simple answer is </span><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">YES</span></strong><span data-dcnode-id="1036" instrument_node="">. From a tax planning perspective, a hire purchase agreement has the same tax allowances as if you are paying cash for an asset. This enables the qualified asset to take advantage of the 130% tax breaks.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><h3 data-dcnode-id="1031"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Can you claim super deduction relief on a lease rental or hire agreement?</span></strong></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">No, when leasing you do not have title of the equipment as it is a lease rental. As such you will not be able to claim the super deduction tax relief. However, you are able to offset all the rental payments against profits using the annual capital allowances to reduce your tax bill. For further information visit </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/capital-allowances/annual-investment-allowance"><span data-dcnode-id="1028" instrument_node="">here</span></a><span data-dcnode-id="1026" instrument_node="">.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><h4 data-dcnode-id="1021"><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">What is the impact on investment in the UK?</span></strong></h4><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The super deduction relief is expected to increase UK capital equipment investment by about 10% this year. Some of this investment will just be companies bringing forward investments from future years. However, at WestWon we have already seen a huge increase by clients looking to take advantage of this tax break.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><h4 data-dcnode-id="1014"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Will the use of finance increase due to super deductions?</span></strong></h4><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Yes. Financing in the UK is still the main way companies raise money to finance equipment purchases. It is expected that the use of finance will increase in 2022. There is also a high expectation companies will move from lease rental, to hire purchase agreements.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h4 data-dcnode-id="1007"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">What is the situation regarding leasing and the financing of non-qualifying assets?</span></strong></h4><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Certain asset types do not qualify for the Super Deduction tax scheme. An example is office fit outs. Some of this expenditure does qualify, however, where the asset is part of the fabric of the building, the tax position is very different.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">For non-qualifying assets, there are still available tax breaks to companies wishing to use the option of either a lease rental or commercial loan. In addition, we can support you by splitting a project up to look to take out a lease purchase agreement on the qualifying assets and a business loan on the non-qualifying assets.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><h4 data-dcnode-id="997"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The super deduction – a boost in the arm for UK finance companies</span></strong></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Finance companies thrive on investment. The more companies look to invest in capital equipment, the more business a UK leasing company will do. We thank the Chancellor for the introduction of the enhanced tax breaks, it is a real boost for all UK finance companies.</span></p><span data-dcnode-id="993" instrument_node="">
</span><h4 data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Want to know what the saving looks like?</span></strong></h4><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Use our super deductions calculator to give you a guide on the savings you can make.</span></p><span data-dcnode-id="986" instrument_node="">
</span><h4 data-dcnode-id="983"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Contact Us</span></strong></h4><span data-dcnode-id="982" instrument_node="">

</span><h2 data-dcnode-id="198" style="text-align: center;"><span data-dcnode-id="199" instrument_node="">Marketing Manager</span></h2><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195" style="text-align: center;"><span data-dcnode-id="196" instrument_node="">Known as Ollie in the office, Oliver joined WestWon in September 2017 straight out of university. Now heading up the marketing department, Ollie specialises in generating inbound enquiries to WestWon and heading up our partner marketing efforts.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192" style="text-align: center;"><span data-dcnode-id="193" instrument_node="">A keen football fan (sadly West Ham), Ollie has fast become popular at WestWon for his bright personality and expensive clothes taste.</span></p><span data-dcnode-id="191" instrument_node="">

</span><p data-dcnode-id="165" style="text-align: center;"><span data-dcnode-id="166" instrument_node="">Having joined WestWon in 2013 out of a local university, George has worked in many of the departments in WestWon. From working in operations, to sales support and now heading up the marketing team George also manages inbound enquiries as well as existing partner relationships.</span></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162" style="text-align: center;"><span data-dcnode-id="163" instrument_node="">With a face that refuses to age, and a personality that refuses to grow up, we’re not 100% sure what he does on a day to day basis, but we couldn’t work without him.</span></p><span data-dcnode-id="161" instrument_node="">
