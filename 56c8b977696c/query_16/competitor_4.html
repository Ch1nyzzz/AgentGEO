teps"><span data-dcnode-id="1800" instrument_node="">How To Track The Mileage Tax Deduction In 5 Steps</span></a></li><li data-dcnode-id="1795"><a data-dcnode-id="1796" data-wct-parsed="1" href="#Should_I_Use_The_Actual_Expenses_Vehicle_Deduction_Method_Instead"><span data-dcnode-id="1797" instrument_node="">Should I Use The Actual Expenses Vehicle Deduction Method Instead?</span></a></li><li data-dcnode-id="1792"><a data-dcnode-id="1793" data-wct-parsed="1" href="#The_Bottom_Line_On_Claiming_Mileage_Vehicle_Tax_Deductions"><span data-dcnode-id="1794" instrument_node="">The Bottom Line On Claiming Mileage &amp; Vehicle Tax Deductions</span></a></li><li data-dcnode-id="1789"><a data-dcnode-id="1790" data-wct-parsed="1" href="#Mileage_Tax_Deductions_FAQs"><span data-dcnode-id="1791" instrument_node="">Mileage Tax Deductions FAQs</span></a></li></ul></div><span data-dcnode-id="1786" instrument_node="">
</span><h2 data-dcnode-id="1783"><span data-dcnode-id="1784" id="What_Is_The_Mileage_Tax_Deduction"><span data-dcnode-id="1785" instrument_node="">What Is The Mileage Tax Deduction?</span></span></h2><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">What is the mileage tax deduction, and how important is it to your business? The mileage tax deduction is a deduction you can claim on your tax return if you meet specific conditions and use a vehicle for business purposes.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">If you drive a vehicle for business purposes (such as going from your office to an off-site meeting with a client), you can deduct your mileage from your income tax return. You may also qualify for a deduction for miles driven to medical appointments or to perform volunteer work.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><h2 data-dcnode-id="1773"><span data-dcnode-id="1774" id="How_Does_The_Mileage_Tax_Deduction_Work"><span data-dcnode-id="1775" instrument_node="">How Does The Mileage Tax Deduction Work?</span></span></h2><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">As you might expect, one of the biggest questions a business owner has if they travel a lot is, “How does the mileage tax deduction work?” Any self-employed taxpayer or small business owner knows the importance of deductions, and the mileage tax deduction is a big one. This holds especially true for taxpayers that drive long distances or travel to clients often for qualified business purposes.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">The mileage tax deduction is calculated by multiplying qualified mileage by the annual rate set by the Internal Revenue Service. The standard IRS mileage rate for the 2021 tax year is $0.56/miles. For qualifying trips for medical appointments, the rate is $0.16/mile. For volunteer work, the rate is $0.14/mile. This rate changes each year, so make sure you’re using current rates if you opt for this deduction.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">While this is the standard method of taking a mileage tax deduction, you may instead opt to use the actual expenses method. Instead of tracking mileage, you’ll be able to write off actual vehicle expenses associated with your business. We’ll dive more into both of these methods, so keep reading.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h2 data-dcnode-id="1760"><span data-dcnode-id="1761" id="Do_I_Qualify_For_The_Mileage_Tax_Deduction"><span data-dcnode-id="1762" instrument_node="">Do I Qualify For The Mileage Tax Deduction?</span></span></h2><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">In years past, many employees could take advantage of the mileage tax deduction to lower their tax liability. However, the passage of the Tax Cuts and Job Acts of 2017 changed this for many people, making it so that only the self-employed and employees in specific industries could take advantage of this deduction.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">You can claim the mileage tax deduction on your income tax return if one of the following conditions apply:</span></p><span data-dcnode-id="1753" instrument_node="">
</span><ul data-dcnode-id="1721"><span data-dcnode-id="1752" instrument_node="">
</span><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">You own a small business</span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">You’re self-employed and file a Schedule C or Schedule F</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">You’re an independent contractor</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">You drive for a rideshare service</span></li><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">You’re traveling for volunteer work</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">You’re traveling for medical appointments</span></li><span data-dcnode-id="1734" instrument_node="">
</span><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">You’re a qualified performing artist</span></li><span data-dcnode-id="1731" instrument_node="">
</span><li data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">You work as a fee-based government official</span></li><span data-dcnode-id="1728" instrument_node="">
</span><li data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">You’re a reservist in the armed forces</span></li><span data-dcnode-id="1725" instrument_node="">
</span><li data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">You’re an active-duty military member that has moving expenses associated with a permanent change of station</span></li><span data-dcnode-id="1722" instrument_node="">
</span></ul><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1719" instrument_node="">Additionally, you will also need to determine what counts as business mileage. </span><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">The following mileage</span></strong><span data-dcnode-id="1716" instrument_node=""> </span><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">is deductible</span></strong><span data-dcnode-id="1713" instrument_node="">:</span></p><span data-dcnode-id="1711" instrument_node="">
</span><ul data-dcnode-id="1700"><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Travel from store, office, or another type of business location to other business-related locations (e.g., traveling to a client’s home or place of employment for business purposes)</span></li><span data-dcnode-id="1707" instrument_node="">
</span><li data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Travel from your home to another business location if you work from a home office</span></li><span data-dcnode-id="1704" instrument_node="">
</span><li data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">For rideshare drivers, trips driven between your first business stop through the last stop</span></li><span data-dcnode-id="1701" instrument_node="">
</span></ul><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1695"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">The following mileage is not deductible</span></strong><span data-dcnode-id="1696" instrument_node="">:</span></p><span data-dcnode-id="1694" instrument_node="">
</span><ul data-dcnode-id="1686"><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Travel from your home to your store, office, or other business location</span></li><span data-dcnode-id="1690" instrument_node="">
</span><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">For rideshare drivers, the trip from your home to your first stop and the trip from your last business stop to home</span></li><span data-dcnode-id="1687" instrument_node="">
</span></ul><span data-dcnode-id="1685" instrument_node="">
</span><h2 data-dcnode-id="1682"><span data-dcnode-id="1683" id="How_To_Track_The_Mileage_Tax_Deduction_In_5_Steps"><span data-dcnode-id="1684" instrument_node="">How To Track The Mileage Tax Deduction In 5 Steps</span></span></h2><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Taking the mileage tax deduction is just one of the ways that you can lower your tax liability. If you’ve never claimed this deduction before, get started here with these five easy steps for tracking and claiming the mileage tax deduction on your income tax return.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><h3 data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Step 1: Determine If You Qualify For The Mileage Tax Deduction</span></h3><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Before you claim the mileage tax deduction on your tax return, you must first determine if you qualify for this deduction. Mileage tax deductions can be claimed by small business owners, self-employed individuals, independent contractors (including rideshare drivers), reservists, qualified performing artists, certain government employees, and individuals that travel for volunteer work or medical appointments.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">If you’re unsure if you qualify, talk to an accountant or tax professional about your specific situation.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><h3 data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Step 2: Choose A Method For Recording Your Mileage</span></h3><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">There are several ways to track and record your mileage for tax purposes. A traditional mileage log, your accounting software, or even a smartphone app can be used to track your mileage throughout the year. Software like </span><a data-dcnode-id="1663" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/reviews/quickbooks-self-employed-review/"><span data-dcnode-id="1664" instrument_node="">QuickBooks Self-Employed</span></a><span data-dcnode-id="1662" instrument_node=""> make it easy to track mileage.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">No matter which method you choose, make sure to record your vehicle’s odometer reading at the beginning and the end of the year. Additionally, make sure that you’re accurately tracking personal/business mileage and keeping your records updated.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><h3 data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Step 3: Document Your Mileage Or Expenses</span></h3><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Once you’ve determined how you’ll log your mileage, make sure that you keep your records up to date throughout the year. This ensures that you accurately calculate your mileage, easily differentiate between personal and business trips, and get the most out of the mileage deduction. You’ll also be glad you kept updated records in the event of an IRS tax audit.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">In your mileage log, software, or app, record the following information for each trip:</span></p><span data-dcnode-id="1648" instrument_node="">
</span><ul data-dcnode-id="1634"><span data-dcnode-id="1647" instrument_node="">
</span><li data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Start/end odometer readings</span></li><span data-dcnode-id="1644" instrument_node="">
</span><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Start/end location</span></li><span data-dcnode-id="1641" instrument_node="">
</span><li data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Purpose of the trip</span></li><span data-dcnode-id="1638" instrument_node="">
</span><li data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Total mileage for the trip</span></li><span data-dcnode-id="1635" instrument_node="">
</span></ul><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">This method should be used if you plan to claim the standard mileage rate. If you plan to use actual car expenses for your tax deduction, you’ll need to keep receipts and documents related to your annual vehicle expenses (i.e., car repairs and insurance). We’ll talk more about standard mileage vs. actual car expenses later in this post.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><h3 data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Step 4: File The Correct Tax Forms</span></h3><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Keeping and maintaining good records makes it easier come tax time, but you’ll also need to ensure that you’re filing the proper tax forms with your return. Here’s a breakdown of what form you’ll need to use to claim your mileage deduction:</span></p><span data-dcnode-id="1624" instrument_node="">
</span><ul data-dcnode-id="1602"><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1619"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Self-Employed, Business Owners, &amp; Rideshare Drivers:</span></strong><span data-dcnode-id="1620" instrument_node=""> The mileage deduction is claimed on your Schedule C.</span></li><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1614"><strong data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Reservists, Performance Artists, &amp; Fee-Based Government Officials:</span></strong><span data-dcnode-id="1615" instrument_node=""> Report your miles on Form 2106: Employee Business Expenses.</span></li><span data-dcnode-id="1613" instrument_node="">
</span><li data-dcnode-id="1609"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Volunteers:</span></strong><span data-dcnode-id="1610" instrument_node=""> Qualified mileage will be included as part of your charitable deductions. This is only available for those who are claiming itemized deductions.</span></li><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1604"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Medical Appointments:</span></strong><span data-dcnode-id="1605" instrument_node=""> Qualified mileage will be included as part of your medical deductions. This is only available for those who are claiming itemized deductions.</span></li><span data-dcnode-id="1603" instrument_node="">
</span></ul><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Depending on the form you file, you may be required to include additional information about the vehicle used, such as the date it was put into service.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><h3 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Step 5: Hold On To Your Records</span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">After you file your return, you may be required to submit documentation to the IRS to verify your mileage. Because of this, you should hold on to your records for </span><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">a minimum of three years</span></strong><span data-dcnode-id="1591" instrument_node="">. Make sure to separate your records, receipts, and other documentation for each tax year to stay organized.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">If you find that your records are taking up too much space, you might want to consider scanning your documents, using accounting software with built-in mileage tracking, or using another computer-based form of storage for future tax years.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1583"><span data-dcnode-id="1584" id="Should_I_Use_The_Actual_Expenses_Vehicle_Deduction_Method_Instead"><span data-dcnode-id="1585" instrument_node="">Should I Use The Actual Expenses Vehicle Deduction Method Instead?</span></span></h2><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">There are two different vehicle deductions that you can choose to lower your tax liability: the standard mile deduction and the actual expenses method. You can only choose one, so it’s important that you make the right choice to get the most out of your deduction. Keep reading to learn more about these deductions and how you can determine which one is best for your business.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><h3 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Actual Expenses VS Standard Mile Deduction</span></h3><span data-dcnode-id="1576" instrument_node="">
</span><div class="tg-wrap" data-dcnode-id="1520"><span data-dcnode-id="1575" instrument_node="">
</span><span data-dcnode-id="1574" instrument_node="">
</span><span data-dcnode-id="1573" instrument_node="">
</span><span data-dcnode-id="1572" instrument_node="">
</span><span data-dcnode-id="1569" instrument_node="">
</span><span data-dcnode-id="1566" instrument_node="">
</span><span data-dcnode-id="1564" instrument_node="">
</span><span data-dcnode-id="1562" instrument_node="">
</span><span data-dcnode-id="1561" instrument_node="">
</span><span data-dcnode-id="1560" instrument_node="">
</span><span data-dcnode-id="1557" instrument_node="">
</span><span data-dcnode-id="1554" instrument_node="">
</span><span data-dcnode-id="1552" instrument_node="">
</span><span data-dcnode-id="1551" instrument_node="">
</span><span data-dcnode-id="1548" instrument_node="">
</span><span data-dcnode-id="1545" instrument_node="">
</span><span data-dcnode-id="1543" instrument_node="">
</span><span data-dcnode-id="1542" instrument_node="">
</span><span data-dcnode-id="1539" instrument_node="">
</span><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" instrument_node="">
</span><span data-dcnode-id="1533" instrument_node="">
</span><span data-dcnode-id="1530" instrument_node="">
</span><span data-dcnode-id="1527" instrument_node="">
</span><span data-dcnode-id="1525" instrument_node="">
</span><span data-dcnode-id="1523" instrument_node="">
</span><table class="mm-table" data-dcnode-id="1522"><thead data-dcnode-id="1563"><tr data-dcnode-id="1565"><th data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Standard Mileage Deduction</span></th><th data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Actual Car Expense Deduction</span></th></tr></thead><tbody data-dcnode-id="1524"><tr data-dcnode-id="1553"><td data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Calculated using the current standard mileage rate set by the IRS</span></td><td data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Calculated using the costs to operate the car for business use</span></td></tr><tr data-dcnode-id="1544"><td data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Can’t write off vehicle expenses; must use standard rate per mile driven for business use</span></td><td data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Can write off expenses including gas, oil, repairs, tires, insurance, registration fees, licenses, and depreciation</span></td></tr><tr data-dcnode-id="1535"><td data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Tracked using a mileage log</span></td><td data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Expenses tracked using receipts and other documentation</span></td></tr><tr data-dcnode-id="1526"><td data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Must be used the first year the car is placed into service</span></td><td data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">If chosen for the first year car is placed into service, it must be used every year following that the vehicle is in service</span></td></tr></tbody></table><span data-dcnode-id="1521" instrument_node="">
</span></div><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">With the standard mileage deduction, you can deduct a set rate per mile when a vehicle is used for business purposes. This rate changes each year and is posted on the IRS website. You must own or lease the vehicle for which you are claiming the standard deduction. Mileage should be tracked using a mileage log.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">The standard mile deduction is easy to calculate, which is why many taxpayers choose to use this option. However, in some cases, you may not be able to use the standard mile deduction. Per the IRS, you will be unable to use this option if any of the following apply:</span></p><span data-dcnode-id="1513" instrument_node="">
</span><ul data-dcnode-id="1496"><span data-dcnode-id="1512" instrument_node="">
</span><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Your business uses five or more cars at one time</span></li><span data-dcnode-id="1509" instrument_node="">
</span><li data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">You claimed a depreciation deduction for the car using any method other than straight-line</span></li><span data-dcnode-id="1506" instrument_node="">
</span><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">You claimed a Section 179 deduction on the car</span></li><span data-dcnode-id="1503" instrument_node="">
</span><li data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">You claimed the special depreciation allowance on the car</span></li><span data-dcnode-id="1500" instrument_node="">
</span><li data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">You claimed actual expenses after 1997 for a vehicle you lease</span></li><span data-dcnode-id="1497" instrument_node="">
</span></ul><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1494" instrument_node="">To use the standard method,</span><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node=""> you must use it the first year that your car is put into service for your business</span></strong><span data-dcnode-id="1491" instrument_node="">. In subsequent years, you can continue to use the standard mileage deduction, or you can switch to the actual expenses method.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">If you choose to use the standard deduction for a leased vehicle, </span><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">you must continue to use the standard deduction for the duration of your lease</span></strong><span data-dcnode-id="1485" instrument_node="">, including all renewals.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">You may decide that the actual expense deduction is the better option for your business. Some business owners also don’t qualify to use the standard deduction (such as businesses with a fleet of vehicles), so they must use the actual expense deduction instead.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Instead of receiving a set rate for the miles driven, this deduction allows you to write off expenses necessary for the operation of a vehicle for business purposes. These include:</span></p><span data-dcnode-id="1477" instrument_node="">
</span><ul data-dcnode-id="1454"><span data-dcnode-id="1476" instrument_node="">
</span><li data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Gas</span></li><span data-dcnode-id="1473" instrument_node="">
</span><li data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Oil</span></li><span data-dcnode-id="1470" instrument_node="">
</span><li data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Repairs</span></li><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Insurance</span></li><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">License fees</span></li><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Registration fees</span></li><span data-dcnode-id="1458" instrument_node="">
</span><li data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Vehicle depreciation</span></li><span data-dcnode-id="1455" instrument_node="">
</span></ul><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">This method may require more record-keeping, but it could potentially result in a higher deduction than using the standard mileage rate.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">One important thing to note is that if you opt to use the actual expenses deduction, you will have to continue to use that method for each year that the vehicle is being used for your business.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">If you’re unsure which method is best for you, use IRS tax form instructions or online calculators to determine which gives you the larger deduction.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">How To Track The Actual Expenses Vehicle Deduction</span></h3><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">If you decide to use the actual expenses vehicle deduction, you will need to track your vehicle expenses. If the vehicle is used for business and personal use, you will only be allowed to deduct expenses associated with the business usage of the vehicle.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">You can use a mileage log to determine how often the vehicle is used for tax purposes. You will also need to hold onto any receipts and documents related to any vehicle expenses.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Additionally, you will want to hold onto receipts for parking and toll fees. These expenses could potentially be deductible elsewhere on your tax return. This applies even when you use the standard mileage deduction.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><h2 data-dcnode-id="1429"><span data-dcnode-id="1430" id="The_Bottom_Line_On_Claiming_Mileage_Vehicle_Tax_Deductions"><span data-dcnode-id="1431" instrument_node="">The Bottom Line On Claiming Mileage &amp; Vehicle Tax Deductions</span></span></h2><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1427" instrument_node="">Whether you’re a full-time small business owner or you do freelancing work on the side, doing your taxes can be stressful. One way to ease some of that tax-time stress is by lowering your tax liability with credits and deductions, such as the standard or actual expenses mileage deductions. And don’t stop there. Get the most out of your tax return by checking out our </span><a data-dcnode-id="1425" data-wct-parsed="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merchantmaverick.com/write-off-small-business-tax-deduction/"><span data-dcnode-id="1426" instrument_node="">complete list of small business tax deductions</span></a><span data-dcnode-id="1424" instrument_node=""> that can benefit your business.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Good luck!</span></p><span data-dcnode-id="1419" instrument_node="">
</span><h2 data-dcnode-id="1416"><span data-dcnode-id="1417" id="Mileage_Tax_Deductions_FAQs"><span data-dcnode-id="1418" instrument_node="">Mileage Tax Deductions FAQs</span></span></h2><span data-dcnode-id="1415" instrument_node="">
</span><div class="su-accordion su-u-trim" data-dcnode-id="1369"><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1406" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1412" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1414"></span><span data-dcnode-id="1413" instrument_node="">Can I write off my mileage in 2021? </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1407"><p data-dcnode-id="1411"></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">If you meet the conditions set by the IRS and have used a vehicle for business purposes, you can write off your mileage in 2021. Small business owners, rideshare drivers, independent contractors, gig workers, and other self-employed individuals may qualify for this money-saving deduction. The current standard rate for the 2021 mileage tax deduction is $0.56 per mile.</span></p><span data-dcnode-id="1408" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1397" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1403" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1405"></span><span data-dcnode-id="1404" instrument_node="">Is it worth claiming mileage on taxes? </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1398"><p data-dcnode-id="1402"></p><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">While claiming mileage on your taxes does require a bit more recordkeeping, you could potentially shave hundreds of dollars (or even more) off of your tax liability. Apps and software make it easier than ever to track your mileage, save receipts, and keep track of your mileage so that you’ll be prepared come tax time.</span></p><span data-dcnode-id="1399" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1388" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1394" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1396"></span><span data-dcnode-id="1395" instrument_node="">Should I use the mileage deduction or standard vehicle deduction? </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1389"><p data-dcnode-id="1393"></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The mileage deduction and standard vehicle deduction are interchangeable terms. This is one type of deduction you can claim on your tax return, or you can opt to use the actual expenses deduction. There are different requirements for each, so make sure you qualify. If you qualify for both options, try calculating the deduction using each method to see which results in the larger deduction.</span></p><span data-dcnode-id="1390" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1379" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1385" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1387"></span><span data-dcnode-id="1386" instrument_node="">How do I track mileage for deductions? </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1380"><p data-dcnode-id="1384"></p><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Many business owners use a traditional driving log to track mileage, including information such as the odometer readings and the purpose of the trip. Other business owners opt to use apps and software to track mileage for one or more business vehicles.</span></p><span data-dcnode-id="1381" instrument_node="">
</span></div></div><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-chevron accordion su-spoiler-closed" data-anchor-in-url="no" data-dcnode-id="1370" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="1376" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1378"></span><span data-dcnode-id="1377" instrument_node="">What other deductions can I claim on my small business taxes? </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1371"><p data-dcnode-id="1375"></p><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">There are a number of deductions you can claim on your small business taxes, including home office expenses, rent, utilities, travel expenses, software, supplies, payroll expenses, and more. Check out our complete guide to small business tax deductions to learn how you can save this tax season.</span></p><span data-dcnode-id="1372" instrument_node="">
</span></div></div></div><span data-dcnode-id="1366" instrument_node="">
