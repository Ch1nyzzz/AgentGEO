</span><main data-dcnode-id="321"><section class="bg-cover" data-dcnode-id="679" id="headlineContainer" style="background-image: url(/imagecache/bestfitgs/1920x400/_files/misc/tax-deductions.jpg);"><span data-dcnode-id="700" instrument_node="">

</span><div class="caption" data-dcnode-id="683"><span data-dcnode-id="698" instrument_node="">
</span><h1 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Tax Deductions – Expenses or Capital Works?</span></h1><span data-dcnode-id="695" instrument_node="">
</span><div data-dcnode-id="685" id="breadcrumbs"><span data-dcnode-id="694" instrument_node="">
</span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sgaterentals.com.au/"><span data-dcnode-id="693" instrument_node="">Home</span></a><span data-dcnode-id="691" instrument_node=""> </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sgaterentals.com.au/landlord"><span data-dcnode-id="690" instrument_node="">Landlord</span></a><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sgaterentals.com.au/tax-deductions"><span data-dcnode-id="688" instrument_node="">Tax Deductions</span></a><span data-dcnode-id="686" instrument_node=""> </span></div><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span></article><span data-dcnode-id="680" instrument_node="">
</span></section><span data-dcnode-id="678" instrument_node="">
</span><section data-dcnode-id="323" id="contentContainer"><span data-dcnode-id="677" instrument_node="">
</span><span data-dcnode-id="675" instrument_node="">
</span><article class="container" data-dcnode-id="327"><span data-dcnode-id="674" instrument_node="">
</span><div class="row" data-dcnode-id="329"><span data-dcnode-id="673" instrument_node="">
</span><div class="column tiny-12 med-9 push-med-3" data-dcnode-id="400"><span data-dcnode-id="672" instrument_node="">
</span><div class="contentRegion" data-dcnode-id="402"><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="670" instrument_node="">We are often asked, what items can you claim a full deduction for, and what items are ‘depreciated’.&nbsp; Basically an </span><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">‘Expense’</span></strong><span data-dcnode-id="667" instrument_node=""> is something that you may be entitled to an immediate deduction in the income year you incur the expense.&nbsp; A </span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">‘Capital Works Deduction’</span></strong><span data-dcnode-id="664" instrument_node=""> is an&nbsp;expense of a capital nature that are depreciated over&nbsp;time and or may form part of the cost base of the property for capital gains tax purposes.</span></p><span data-dcnode-id="662" instrument_node="">
</span><h3 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">What is an EXPENSE?</span></h3><span data-dcnode-id="659" instrument_node="">
</span><ul data-dcnode-id="579"><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">advertising for tenants</span></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">bank charges</span></li><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">body corporate fees and charges</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">cleaning</span></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">council rates</span></li><span data-dcnode-id="643" instrument_node="">
</span><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">electricity and gas</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">gardening and lawn mowing</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">in-house audio and video service charges</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">insurance (building, contents, public liability)</span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">interest on loans</span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">land tax</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">lease document expenses (preparation, registration, stamp duty)</span></li><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">legal expenses (excluding acquisition costs and borrowing costs)</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">mortgage discharge expenses</span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">pest control</span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">property agents fees and commissions</span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">quantity surveyor’s fees</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">repairs and maintenance*</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">secretarial and bookkeeping fees</span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">security patrol fees</span></li><span data-dcnode-id="598" instrument_node="">
</span><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">servicing costs, for example, servicing a water heater</span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">stationery and postage</span></li><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">telephone calls and rental</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">tax-related expenses</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">travel and car expenses (for&nbsp;rent collection,&nbsp;inspection of property,&nbsp;maintenance of property)</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">water consumption and supply charges</span></li><span data-dcnode-id="580" instrument_node="">
</span></ul><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="577" instrument_node="">* </span><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Repairs and Maintenance</span></strong><span data-dcnode-id="574" instrument_node=""> is the most commonly asked item.&nbsp; Expenditure for repairs you make to the property may be&nbsp;deductible. However, the repairs must relate directly to&nbsp;wear and tear&nbsp;or other damage that </span><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">occurred as a result of&nbsp;your renting out the property</span></strong><span data-dcnode-id="571" instrument_node="">.&nbsp; Repairs generally involve a replacement or renewal of a worn out or broken part, for example, replacing some guttering damaged in a storm or part of a fence that was damaged by a falling tree branch.</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
So, that means that repairs carried out to a newly purchased property are NOT expenses, and are deemed Capital Works.&nbsp; Refer to the examples below on repairs prior to renting a property and when it is no longer being rented….</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">ATO Example on ‘repairs prior to renting out a property’</span></strong><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">
</span><em data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">“The Hitchmans needed to do some repairs to their newly acquired rental property before the first tenants moved in. They paid an interior decorator to repaint dirty walls, replace broken light fittings and repair doors on two bedrooms. They also discovered white ants in some of the floorboards. This required white ant treatment and replacement of some of the boards.&nbsp; These expenses were incurred to make the property suitable for rental and did not arise from the Hitchmans’ use of the property to generate assessable rental income. The expenses are capital in nature and the Hitchmans are not able to claim a deduction for these expenses.”</span></em><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="552"><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">ATO Example on ‘repairs when the property is no longer rented out’</span></strong></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><em data-dcnode-id="547"><span data-dcnode-id="550" instrument_node="">“After the last tenants moved out in September 2013, the Hitchmans discovered&nbsp;&nbsp;that the stove did not work, kitchen tiles were cracked and the toilet window was broken. They also discovered a hole in a bedroom wall that had been covered with a poster. In October 2013 the Hitchmans paid for this damage to be repaired so they could sell the property. As the tenants were no longer in the property, the Hitchmans were not using the property to produce assessable income. However, they could still claim a deduction for repairs to the property because the repairs related to the period when their tenants were living in the property and the repairs were completed before the end of the income year in which the property ceased to be used to produce income.”</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
To find out more on Capital works deductions and how to claim, read on…..</span></em></p><span data-dcnode-id="545" instrument_node="">
</span><h3 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">What is a CAPITAL WORKS DEDUCTION?</span></h3><span data-dcnode-id="542" instrument_node="">
</span><ul data-dcnode-id="531"><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">replacement of an entire structure or unit of property (such as a complete fence or building, a stove, kitchen cupboards or refrigerator)</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">improvements, renovations, extensions and alterations, and</span></li><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">initial repairs, for example, in remedying defects, damage or deterioration that existed at the date you acquired the property.</span></li><span data-dcnode-id="532" instrument_node="">
</span></ul><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">How are these deductions calculated?&nbsp; Well this is where it gets&nbsp;complex and where the benefits of having a&nbsp;&nbsp;professionally prepared ‘Tax Depreciation Schedule’ prepared by a quantity surveyor such as BMT are invaluable.&nbsp; I know of quite a few examples where our landlords&nbsp;literally were able to claim thousands of dollars worth of extra deductions once they had their report done – I highly recommend it.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">To work out your deduction there are&nbsp;two methods.&nbsp;Both methods are based on the effective life of the asset (which is determined by ATO ruling&nbsp;TR2014/4.&nbsp; The ‘Diminishing Value’ method is&nbsp;most commonly used and&nbsp;assumes that the decline in value each year is a constant proportion of the remaining value and produces a progressively smaller decline over time (allowing&nbsp;higher deductions immediately).&nbsp; The ‘Prime Cost Method’ assumes that the value of a depreciating asset decreases uniformly over its effective life (meaning smaller claims up front, which is why it is not as popular.)&nbsp; The </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/Calculators-and-tools/Decline-in-value/" target="_blank"><span data-dcnode-id="525" instrument_node="">decline in value calculator</span></a><span data-dcnode-id="523" instrument_node=""> on the ATO&nbsp;website&nbsp;&nbsp;will help you with the choice and the calculation.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="506"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Diminishing Value Method</span></strong><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">
&nbsp;</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
</span><em data-dcnode-id="509"><span data-dcnode-id="514" instrument_node="">Base value*&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; x &nbsp;&nbsp;&nbsp;&nbsp; Days held&nbsp;&nbsp;&nbsp;&nbsp; &nbsp; x&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;200%&nbsp;(on or after May 06) or 150% (prior to May 06)&nbsp;</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 365&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; asset’s effective life</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
&nbsp;*for the income year which an asset is first used or installed ready for use for any purpose, the base value is the asset’s cost. For a later income year, the base value is the asset’s opening adjustable value plus any amounts included in the assets’ second element of cost for that year</span></em><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="488"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Prime Cost Method</span></strong><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
</span><em data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">Assets cost&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; x &nbsp;&nbsp;&nbsp;&nbsp; Days held&nbsp;&nbsp;&nbsp;&nbsp; &nbsp; x&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 100%&nbsp;</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 365&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; asset’s effective life</span></em><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
</span><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Example of Claim using ‘Diminishing Value’ method for the supply and installation of $2000 split system air con</span></strong><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
On the 1st July you install a split system air con (so unit is held for 365 days).&nbsp; The&nbsp;cost to supply and install the&nbsp;unit is $2000.00&nbsp; The ATO effective life&nbsp;is 10 years.&nbsp;The claim for the first year&nbsp;using the above calculation would be $400.&nbsp; The following year, the written down value of the (cost $2000, less 1st years depreciation of $400) is used as calculate&nbsp;the ‘base value’ of $1600.&nbsp;&nbsp;This would then mean the&nbsp;claim in the following year is $320.</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
Effective life of the most common items from the current ruling TR2014/4 are;</span></p><span data-dcnode-id="487" instrument_node="">
</span><ul data-dcnode-id="416"><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Cooktop – 12 years</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Oven – 12 years</span></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Dishwasher – 8 years</span></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Carpet – 10 years</span></li><span data-dcnode-id="474" instrument_node="">
</span><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Floating timber floors – 15 years</span></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Vinyl – 10 years</span></li><span data-dcnode-id="468" instrument_node="">
</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Aircon ducted r/c – 15 years</span></li><span data-dcnode-id="465" instrument_node="">
</span><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Aircon evaporative – 20 years</span></li><span data-dcnode-id="462" instrument_node="">
</span><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Aircon split system (under 20kw) – 10 years</span></li><span data-dcnode-id="459" instrument_node="">
</span><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Ceiling fan – 5 years</span></li><span data-dcnode-id="456" instrument_node="">
</span><li data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Heater – 15 years</span></li><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Heater ducted – 20 years</span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Hot water gas or electric – 12 years</span></li><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Hot water solar – 15 years</span></li><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Light fittings – 5 years</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">TV Antennae – 10 years</span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Solar System – 20 years</span></li><span data-dcnode-id="435" instrument_node="">
