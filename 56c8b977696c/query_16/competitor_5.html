="https://moneydoneright.com/wp-content/uploads/salt-deduction-1500x370.jpg 2x" height="370" width="1500" alt="salt-deduction"&gt;</span></noscript><img alt="salt-deduction" class="lazyloaded" data-dcnode-id="1250" data-src="https://moneydoneright.com/wp-content/uploads/salt-deduction-1500x370.jpg" data-srcset="https://moneydoneright.com/wp-content/uploads/salt-deduction-1500x370.jpg 2x" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/wp-content/uploads/salt-deduction-1500x370.jpg&amp;raw" srcset="https://moneydoneright.com/wp-content/uploads/salt-deduction-1500x370.jpg 2x" width="1500"></div></section><section class="main-section" data-dcnode-id="764"><div class="container" data-dcnode-id="774"><div data-dcnode-id="815" id="content"><div class="top-holder top-post-holder" data-dcnode-id="1233"><div class="post-blog-wrap" data-dcnode-id="1234"><div class="state-holder" data-dcnode-id="1241"><span data-dcnode-id="1247" instrument_node=""> </span><span class="state" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Updated</span></span><span data-dcnode-id="1244" instrument_node=""> </span><span class="date" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">September 29, 2021</span></span></div><h1 data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">State and Local Tax Deduction: How Does the $10,000 SALT Deduction Work?</span></h1><span data-dcnode-id="1238" instrument_node=""> </span><span class="money-chevron right-chevron" data-dcnode-id="1235"><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/personal-taxes/"><span data-dcnode-id="1237" instrument_node="">Personal Taxes</span></a></span></div></div><div data-dcnode-id="1217" id="breadcrumbs"><span data-dcnode-id="1218"><span data-dcnode-id="1219"><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/"><span data-dcnode-id="1232" instrument_node="">Home</span></a><span data-dcnode-id="1230" instrument_node=""> &gt; </span><span data-dcnode-id="1220"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/"><span data-dcnode-id="1229" instrument_node="">Taxes</span></a><span data-dcnode-id="1227" instrument_node=""> &gt; </span><span data-dcnode-id="1221"><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/personal-taxes/"><span data-dcnode-id="1226" instrument_node="">Personal Taxes</span></a><span data-dcnode-id="1224" instrument_node=""> &gt; </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">State and Local Tax Deduction: How Does the $10,000 SALT Deduction Work?</span></span></span></span></span></span></div><div class="info-block" data-dcnode-id="1211"><p data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">We may receive a commission if you sign up or purchase through links on this page. </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/how-we-make-money/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Here's more information.</span></b></a></p></div><div class="content-text" data-dcnode-id="893"><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The SALT deduction isn’t based upon the amount of salt you buy</span></p><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">It stands for the State and Local Tax Deduction, and it can reduce your tax bill.</span></p><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">But not everyone can claim the SALT deduction.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">If you claim the </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/personal-taxes/standard-deduction/"><span data-dcnode-id="1203" instrument_node="">standard deduction</span></a><span data-dcnode-id="1201" instrument_node="">, you can’t take the SALT deduction.</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">But for those who itemize deductions, we’ll walk you through the details of the SALT deduction.</span></p><div class="ez-toc-v2_0_18 counter-hierarchy ez-toc-grey" data-dcnode-id="1167" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="1191"><p class="ez-toc-title" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Table of Contents</span></p><span data-dcnode-id="1195" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="1192"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="1193" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="1194"></i></a></span></div><nav data-dcnode-id="1168"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="1169" style="display: none;"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1188"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="1189" href="#SALT_Deduction_Overview" title="SALT Deduction Overview"><span data-dcnode-id="1190" instrument_node="">SALT Deduction Overview</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1185"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="1186" href="#Deducting_Income_Tax_vs_Sales_Tax" title="Deducting Income Tax vs. Sales Tax"><span data-dcnode-id="1187" instrument_node="">Deducting Income Tax vs. Sales Tax</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1182"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="1183" href="#State_Tax_Refund_Addback" title="State Tax Refund Addback"><span data-dcnode-id="1184" instrument_node="">State Tax Refund Addback</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1179"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="1180" href="#Spouses_and_the_State_and_Local_Tax_Deduction" title="Spouses and the State and Local Tax Deduction"><span data-dcnode-id="1181" instrument_node="">Spouses and the State and Local Tax Deduction</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1176"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="1177" href="#Alternative_Minimum_Tax_AMT_and_the_SALT_Deduction" title="Alternative Minimum Tax (AMT) and the SALT Deduction"><span data-dcnode-id="1178" instrument_node="">Alternative Minimum Tax (AMT) and the SALT Deduction</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1173"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="1174" href="#State_and_Local_Tax_Deduction_Example" title="State and Local Tax Deduction Example"><span data-dcnode-id="1175" instrument_node="">State and Local Tax Deduction Example</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1170"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1171" href="#SALT_Deduction_Frequently_Asked_Questions" title="SALT Deduction Frequently Asked Questions"><span data-dcnode-id="1172" instrument_node="">SALT Deduction Frequently Asked Questions</span></a></li></ul></nav></div><h2 data-dcnode-id="1162"><span class="ez-toc-section" data-dcnode-id="1166" id="SALT_Deduction_Overview"></span><b data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">SALT Deduction Overview</span></b><span class="ez-toc-section-end" data-dcnode-id="1163"></span></h2><h3 data-dcnode-id="1159"><b data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">What Is the State and Local Tax Deduction?</span></b></h3><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">You can deduct the taxes you pay to your state and local government on your federal income tax return.</span></p><h3 data-dcnode-id="1154"><b data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">What Types of State and Local Taxes Are Deductible?</span></b></h3><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">There are four different state and local taxes you can deduct.</span></p><h4 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Income Taxes</span></h4><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Taxes you paid to your state or local government on your wages are deductible.</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">For example, if you live in Philadelphia you can deduct the income tax you pay to Pennsylvania and the income tax you pay to Philly.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">The amount of tax you paid will be shown in boxes 17 and 19 on your W-2.</span></p><h4 data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Sales Tax</span></h4><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">You can only deduct sales taxes if you don’t deduct income taxes. You can’t deduct both.</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">All the sales tax you pay in a year can be deducted. This is beneficial if you made large ticket purchases, like buying a car or an RV.</span></p><h4 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Real Estate Taxes</span></h4><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Owning a residence comes with certain tax breaks, including deducting the real estate taxes you pay to your state and local government.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">You should receive a tax assessment from your state or local government each year. Use this to calculate your deduction.</span></p><h4 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Personal Property Taxes</span></h4><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Personal property is anything you own that’s movable.</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">And the taxes you pay for owning this property are deductible.</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">This includes things like your annual vehicle registration fee.</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">To be deductible, these taxes must be paid annually as opposed to one-time taxes like sales tax.</span></p><h3 data-dcnode-id="1119"><b data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Is There a Limit on the Amount of Tax I Can Deduct?</span></b></h3><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Yes. For 2019 and 2020, the maximum you can deduct is $10,000 a year. But if you’re married filing separately, the maximum is $5,000.</span></p><h3 data-dcnode-id="1114"><b data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">How Can I Claim the State and Local Tax Deduction?</span></b></h3><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">The state and local tax deduction is claimed on lines 5-7 on Schedule A when you file your Form 1040.</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Using Schedule A is commonly referred to as “itemizing deductions”. If you don’t itemize and instead claim the standard deduction, which is $12,200 for 2019 and $12,400 for 2020, you can’t claim any of the state and local tax deductions.</span></p><h2 data-dcnode-id="1105"><span class="ez-toc-section" data-dcnode-id="1109" id="Deducting_Income_Tax_vs_Sales_Tax"></span><b data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Deducting Income Tax vs. Sales Tax</span></b><span class="ez-toc-section-end" data-dcnode-id="1106"></span></h2><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">You can deduct either your income tax or your sales tax. Not both.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Generally, most people will pay more in income tax than they do in sales tax. But if you made expensive purchases in a year, you may have paid more in sales tax. Do the math and figure out which deduction is best for you.</span></p><h3 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Calculating the Income Tax Deduction</span></h3><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">To calculate your income tax deduction, look at the bottom of your W-2.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Box 17 lists the amount of state income tax withheld from your pay.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Box 19 lists any local income tax withheld.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Add these two numbers to any state and local tax amounts you paid directly to the government during the calendar year — that is, not through tax withholding — and that’s your income tax deduction</span></p><h3 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Calculating the Sales Tax Deduction</span></h3><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">However, if you live in a state like Texas or Florida that doesn’t collect a state income tax, you’ll want to deduct your sales tax.</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Calculating the sales tax you paid can involve a bit more work.</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Keep copies of invoices or receipts from purchases made in a year.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Although every dollar of sales tax you paid at the grocery store, the home improvement store, or a restaurant is deductible, it likely isn’t practical to track it.</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">But if you bought a car, jewelry, or other large ticket items, hang on to those receipts.</span></p><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Add up all the sales tax you paid to get your sales tax deduction.</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">If you don’t want to track receipts in this way, use the </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.irs.gov/app/stdc/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1075" instrument_node="">IRS Sales Tax Deduction Calculator</span></a><span data-dcnode-id="1073" instrument_node="">.</span></p><h2 data-dcnode-id="1067"><span class="ez-toc-section" data-dcnode-id="1071" id="State_Tax_Refund_Addback"></span><b data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">State Tax Refund Addback</span></b><span class="ez-toc-section-end" data-dcnode-id="1068"></span></h2><h3 data-dcnode-id="1064"><b data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">What if You Received a Refund of State Income Tax?</span></b></h3><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">If you received a refund of state income tax, you should receive a Form 1099-G from your state. It will show the amount of the refund in Box 2.</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Whether or not you must claim this refund as income depends on whether you claimed the income tax deduction for the year of the refund.</span></p><h3 data-dcnode-id="1057"><b data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Determining the Taxability of Your State Tax Refund</span></b></h3><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">If you claimed the standard deduction for the year in question, you won’t have to report the refund as income. But if you claimed the state income tax deduction for that year, you’ll have to report the refund as income.</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">For example, let’s say you claimed a $1,000 state income tax deduction on your 2019 tax return — and this deduction truly benefited you, even after taking into account AMT — but you received a $250 refund in 2020.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">You will report the $250 refund as income on your 2020 tax return.</span></p><h2 data-dcnode-id="1046"><span class="ez-toc-section" data-dcnode-id="1050" id="Spouses_and_the_State_and_Local_Tax_Deduction"></span><b data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Spouses and the State and Local Tax Deduction</span></b><span class="ez-toc-section-end" data-dcnode-id="1047"></span></h2><h3 data-dcnode-id="1043"><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Spouses Filing Separately</span></b></h3><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">For spouses that file separate tax returns, the SALT deduction is limited to $5,000 per person.</span></p><h3 data-dcnode-id="1038"><b data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Community Property Considerations</span></b></h3><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">If you live in a state that recognizes community property ownership, determine which spouse has legal ownership of the property in question.</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">However, if the property is community owned (meaning each spouse owns equal parts), as it likely is if it was obtained after marriage, then the tax deduction will be split 50/50.</span></p><h2 data-dcnode-id="1029"><span class="ez-toc-section" data-dcnode-id="1033" id="Alternative_Minimum_Tax_AMT_and_the_SALT_Deduction"></span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Alternative Minimum Tax (AMT) and the SALT Deduction</span></b><span class="ez-toc-section-end" data-dcnode-id="1030"></span></h2><h3 data-dcnode-id="1026"><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">What is the Alternative Minimum Tax?</span></b></h3><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The alternative minimum tax is used by certain individuals to ensure they pay at least a minimum amount of tax.</span></p><h3 data-dcnode-id="1021"><b data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Who is Subject to the Alternative Minimum Tax?</span></b></h3><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Individuals subject to the AMT are usually higher-income earners who claim certain deductions. These deductions significantly reduce the amount of tax owed.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">If you had any of the following items on your 2019 return, you’ll need to do another calculation on Form 6251 to see if you must pay the AMT:</span></p><ul data-dcnode-id="982"><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Taxes deductible on line 7 of Schedule A</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Investment interest expense</span></li><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Depletion</span></li><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Net operating loss deductions</span></li><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Interest from certain bonds</span></li><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Exercised stock option rights</span></li><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Estate and trust income</span></li><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Disposed of assets and recorded a gain or a loss</span></li><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Depreciation expense of certain assets</span></li><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Passive activity gains or losses</span></li><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Loss limitations</span></li><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Circulation costs</span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Long-term contracts</span></li><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Mining costs</span></li><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Research and experiment costs</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Income from certain installment sales contracts</span></li><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Intangible drilling costs</span></li></ul><h3 data-dcnode-id="979"><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Taxes Are Not Deductible for AMT Calculations</span></b></h3><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">If you had any of the above items and you calculate AMT, the state and local taxes you deducted on Schedule A won’t be deductible for AMT purposes.</span></p><h2 data-dcnode-id="972"><span class="ez-toc-section" data-dcnode-id="976" id="State_and_Local_Tax_Deduction_Example"></span><b data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">State and Local Tax Deduction Example</span></b><span class="ez-toc-section-end" data-dcnode-id="973"></span></h2><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Jeff lives in Indianapolis and is a single filer. He owns a home and bought a new truck in 2019. Details about Jeff for 2019 are:</span></p><ul data-dcnode-id="959"><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Wages: $55,000</span></li><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">State and local income taxes paid: $2,500</span></li><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Real estate taxes paid on home: $3,000</span></li><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Sales tax paid on new truck: $1,800</span></li><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Annual vehicle registration fee for new truck: $275</span></li></ul><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Jeff will be able to deduct $5,775 ($3,000 + $2,500 + $275) on Schedule A.&nbsp; Remember that he can deduct either state and local income taxes OR sales tax, not both.</span></p><p data-dcnode-id="949"><span data-dcnode-id="956" instrument_node="">But remember that Jeff’s standard deduction is $12,200.&nbsp; So unless he has other itemized deductions like </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/personal-taxes/medical-expense-deduction/"><span data-dcnode-id="955" instrument_node="">medical expenses</span></a><span data-dcnode-id="953" instrument_node=""> or </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moneydoneright.com/taxes/personal-taxes/mortgage-interest-deduction/"><span data-dcnode-id="952" instrument_node="">mortgage interest</span></a><span data-dcnode-id="950" instrument_node="">, he should claim the standard deduction of $12,200.</span></p><h2 data-dcnode-id="945"><span class="ez-toc-section" data-dcnode-id="948" id="SALT_Deduction_Frequently_Asked_Questions"></span><span data-dcnode-id="947" instrument_node="">SALT Deduction Frequently Asked Questions</span><span class="ez-toc-section-end" data-dcnode-id="946"></span></h2><ul class="accordion-list" data-dcnode-id="894"><li data-dcnode-id="933"><span class="accordion-title" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">I prepaid my 2020 real estate taxes in December 2019. Can I deduct them on my 2019 tax return?</span></span><div class="expanded" data-dcnode-id="934" style="display: none;"><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">It depends on when you become legally liable to pay them, which is when the state assesses the property.</span></p><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">If your 2020 taxes were assessed in 2019, then you can deduct them in 2019. However, if they weren’t assessed in 2019, then you can’t deduct them.</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Example: Your state assesses your property and sent you the tax bill in November 2019 for your 2020 taxes. You pay the bill in December 2019. You can deduct the 2020 taxes from your 2019 return.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Example: Your state assesses your property on January 1, 2020. You contacted your state on December 31, 2019 to find out what your 2020 tax bill would be and you paid the bill on the same day. In this case, you can’t deduct the 2020 taxes from your 2019 return since the taxes weren’t assessed until January 1, 2020.</span></p></div></li><li data-dcnode-id="927"><span class="accordion-title" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">I own a rental property and paid $3,000 in real estate taxes on it. Can I deduct these taxes on Schedule A?</span></span><div class="expanded" data-dcnode-id="928" style="display: none;"><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">No. You will deduct this on line 16 of Schedule E. This is the form you use to report all income and expense from rental property.</span></p></div></li><li data-dcnode-id="921"><span class="accordion-title" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">I own a second home in Mexico that isn’t a rental property. Can I deduct the real estate taxes I pay in Mexico?</span></span><div class="expanded" data-dcnode-id="922" style="display: none;"><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">No. Foreign real estate taxes are not deductible.</span></p></div></li><li data-dcnode-id="915"><span class="accordion-title" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Will the state and local tax deduction expire?</span></span><div class="expanded" data-dcnode-id="916" style="display: none;"><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">No. This deduction is not set to expire. However, Congress can change the tax laws at any time.</span></p></div></li><li data-dcnode-id="909"><span class="accordion-title" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">I live in a high-tax state and my real estate taxes exceed $10,000 a year. What can I do?</span></span><div class="expanded" data-dcnode-id="910" style="display: none;"><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Unfortunately, there isn’t anything you can do to deduct the excess tax. However, the $10,000 cap is scheduled to sunset after 2025 and the unlimited SALT deduction will return unless Congress changes the law before then.</span></p></div></li><li data-dcnode-id="903"><span class="accordion-title" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">I pay my real estate taxes to my mortgage company via escrow. I don’t directly pay the taxing authority. Can I still deduct these taxes?</span></span><div class="expanded" data-dcnode-id="904" style="display: none;"><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Yes. You are paying the taxes, although indirectly. Simply because your mortgage company pays the taxing authority on your behalf doesn’t change anything.</span></p></div></li><li data-dcnode-id="895"><span class="accordion-title" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">I bought a home in April 2019 and had to prepay the April – December 2019 real estate taxes to my mortgage company. Do I deduct this entire amount on my 2019 return?</span></span><div class="expanded" data-dcnode-id="896" style="display: none;"><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Yes, if the mortgage company paid the taxing authorities by December 31, 2019. Remember you can deduct only what was legally owed on and paid by December 31, 2019.</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Don’t worry: if the mortgage company paid the taxes in 2020, you’ll be able to deduct the 2019 taxes on your 2020 return.</span></p></div></li></ul></div><div class="actions-holder" data-dcnode-id="876"><ul class="share-list" data-dcnode-id="877"><li data-dcnode-id="890"><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//moneydoneright.com/taxes/personal-taxes/salt-deduction/" target="_blank"><i class="icon-facebook" data-dcnode-id="892"></i></a></li><li data-dcnode-id="887"><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DState%2520and%2520Local%2520Tax%2520Deduction%3A%2520How%2520Does%2520the%2520%2410%2C000%2520SALT%2520Deduction%2520Work%3F%26url%3Dhttps%3A//moneydoneright.com/t
