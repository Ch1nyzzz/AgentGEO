1 federal tax bill and quarterly tax payments</span></a><ul data-dcnode-id="1265"><li data-dcnode-id="1278"><a data-dcnode-id="1279" href="#Example_1_Estimating_total_federal_income_taxes_owed_in_2021" title="Example 1: Estimating total federal income taxes owed in 2021"><span data-dcnode-id="1280" instrument_node="">Example 1: Estimating total federal income taxes owed in 2021</span></a></li><li data-dcnode-id="1275"><a data-dcnode-id="1276" href="#Example_2_Estimating_federal_quarterly_tax_payments_for_2022" title="Example 2: Estimating federal quarterly tax payments for 2022"><span data-dcnode-id="1277" instrument_node="">Example 2: Estimating federal quarterly tax payments for 2022</span></a></li><li data-dcnode-id="1272"><a data-dcnode-id="1273" href="#Step_1" title="Step 1"><span data-dcnode-id="1274" instrument_node="">Step 1</span></a></li><li data-dcnode-id="1269"><a data-dcnode-id="1270" href="#Step_2" title="Step 2"><span data-dcnode-id="1271" instrument_node="">Step 2</span></a></li><li data-dcnode-id="1266"><a data-dcnode-id="1267" href="#Step_3" title="Step 3"><span data-dcnode-id="1268" instrument_node="">Step 3</span></a></li></ul></li><li data-dcnode-id="1261"><a data-dcnode-id="1262" href="#Other_types_of_small_business_taxes" title="Other types of small business taxes"><span data-dcnode-id="1263" instrument_node="">Other types of small business taxes</span></a></li><li data-dcnode-id="1258"><a data-dcnode-id="1259" href="#How_and_when_to_file_business_taxes" title="How and when to file business taxes"><span data-dcnode-id="1260" instrument_node="">How and when to file business taxes</span></a></li></ul></nav></div><span data-dcnode-id="1254" instrument_node="">
</span><h2 data-dcnode-id="1251"><span class="ez-toc-section" data-dcnode-id="1252" id="How_are_small_businesses_taxed"><span data-dcnode-id="1253" instrument_node="">How are small businesses taxed?&nbsp;</span></span></h2><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1249" instrument_node="">As a small business, you’re taxed </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/start-business/which-business-structure" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1248" instrument_node="">according to your business structure</span></a><span data-dcnode-id="1246" instrument_node="">. How and what you&nbsp; pay depends on whether you’re registered as a C corporation, </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/partner-resources/the-advantages-and-disadvantages-of-filing-as-an-s-corporation" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1245" instrument_node="">S corporation</span></a><span data-dcnode-id="1243" instrument_node="">, sole proprietorship, </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/start-business/what-is-an-llc" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1242" instrument_node="">limited liability company</span></a><span data-dcnode-id="1240" instrument_node=""> (LLC), or partnership. Depending on your business structure, you’ll fall into one of two categories: a pass-through entity or a non pass-through entity.&nbsp;</span></p><span data-dcnode-id="1238" instrument_node="">
</span><h2 data-dcnode-id="1235"><span class="ez-toc-section" data-dcnode-id="1236" id="Pass-through_entities"><span data-dcnode-id="1237" instrument_node="">Pass-through entities</span></span></h2><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">Pass-through entities include </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/start-business/sole-proprietorship" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1232" instrument_node="">sole proprietorships</span></a><span data-dcnode-id="1230" instrument_node="">, S corps, LLCs, and partnerships. In a pass-through entity, your business’s income gets passed straight to you as the business owner. As a result, you bypass paying any corporate income tax and instead pay personal income tax on your business’s income.&nbsp;</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Exactly how much you pay depends on a few different factors, including:&nbsp;</span></p><span data-dcnode-id="1225" instrument_node="">
</span><ul data-dcnode-id="1216"><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Your business’s income&nbsp;</span></li><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">How much you earn from other jobs or income streams&nbsp;</span></li><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Your individual filing status (i.e. single or married)</span></li><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Your tax deductions and credits</span></li></ul><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1214" instrument_node="">Some pass-through entities—like </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/payroll/pay-myself-owner-single-member-llc" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1213" instrument_node="">single-member LLCs</span></a><span data-dcnode-id="1211" instrument_node="">—are also considered disregarded entities. A </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/start-business/disregarded-entity-tax" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1210" instrument_node="">disregarded entity is a business that has a single owner</span></a><span data-dcnode-id="1208" instrument_node="">, isn’t a corporation, and is considered separate from the owner for personal liability reasons—but not for federal tax purposes. The Internal Revenue Service (IRS) </span><em data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">disregards</span></em><span data-dcnode-id="1205" instrument_node=""> the company as being separate from its owner, which means the business owner reports their business’s income and expenses on their own personal tax return.&nbsp;</span></p><span data-dcnode-id="1203" instrument_node="">
</span><h2 data-dcnode-id="1200"><span class="ez-toc-section" data-dcnode-id="1201" id="Non_pass-through_entities"><span data-dcnode-id="1202" instrument_node="">Non pass-through entities</span></span></h2><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1198" instrument_node="">Non pass-through entities include </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/start-business/c-corporation" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1197" instrument_node="">C corps</span></a><span data-dcnode-id="1195" instrument_node=""> and LLCs electing to be taxed as corporations. If you own a C corp, you’ll pay corporate taxes on your business’s income first. Currently, C corps pay a flat rate of 21% per the </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p5318.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1194" instrument_node="">Tax Cuts and Jobs Act</span></a><span data-dcnode-id="1192" instrument_node=""> of 2017.&nbsp;</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">Your corporation could then pay </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/business-finance/s-corp-vs-c-corp-shareholders" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1188" instrument_node="">individual shareholders dividends</span></a><span data-dcnode-id="1186" instrument_node=""> (shares of the company’s profit), and those individual shareholders have to pay personal income taxes on the dividends they receive. This is why C corp business owners are subject to what’s called “double taxation”; they’re taxed once at the corporate level then again at the personal level.&nbsp;</span></p><span data-dcnode-id="1184" instrument_node="">
</span><h2 data-dcnode-id="1181"><span class="ez-toc-section" data-dcnode-id="1182" id="What_else_affects_your_tax_rate"><span data-dcnode-id="1183" instrument_node="">What else affects your tax rate?&nbsp;</span></span></h2><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">In addition to your business’s income, your personal income, and your individual filing status, there are two other main factors that affect how much your business pays in taxes: tax credits and tax deductions.&nbsp;</span></p><span data-dcnode-id="1177" instrument_node="">
</span><h2 data-dcnode-id="1174"><span class="ez-toc-section" data-dcnode-id="1175" id="Tax_credits"><span data-dcnode-id="1176" instrument_node="">Tax credits&nbsp;</span></span></h2><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">True to their name, tax credits give you a credit toward your taxes, effectively reducing the amount of taxes you owe. You can take advantage of both individual tax credits and </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/covid19-small-business-tax-credits" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1171" instrument_node="">business tax credits</span></a><span data-dcnode-id="1169" instrument_node="">, which are designed to incentivize you to make certain decisions with your operations or investments.&nbsp;</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">Common </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/business-tax-credits" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1165" instrument_node="">business tax credits</span></a><span data-dcnode-id="1163" instrument_node=""> include:</span></p><span data-dcnode-id="1161" instrument_node="">
</span><ul data-dcnode-id="1143"><li data-dcnode-id="1157"><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/business-tax-credits" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1160" instrument_node="">General Business Credit</span></a><span data-dcnode-id="1158" instrument_node="">&nbsp;</span></li><li data-dcnode-id="1154"><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/work-opportunity-tax-credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1156" instrument_node="">Work Opportunity Tax Credit</span></a></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Empowerment Zone Employment Credit</span></li><li data-dcnode-id="1149"><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/employee-retention-credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1151" instrument_node="">Employee Retention Credit</span></a></li><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Credit For Small Employer Health Insurance Premiums&nbsp;</span></li><li data-dcnode-id="1144"><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-form-8846" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1146" instrument_node="">Credit for Employer Social Security and Medicare Taxes Paid on Certain Employee Tips</span></a></li></ul><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1138"><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions-for-individuals" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1141" instrument_node="">Individual tax credits</span></a><span data-dcnode-id="1139" instrument_node=""> include:</span></p><span data-dcnode-id="1137" instrument_node="">
</span><ul data-dcnode-id="1112"><li data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">Family and dependent credits, like the </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/child-tax-credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1135" instrument_node="">Child Tax Credit</span></a><span data-dcnode-id="1133" instrument_node=""> or Credit for the Elderly</span></li><li data-dcnode-id="1125"><span data-dcnode-id="1131" instrument_node="">Income and savings credits, like the </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/individuals/international-taxpayers/foreign-tax-credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1130" instrument_node="">Foreign Tax Credit</span></a><span data-dcnode-id="1128" instrument_node=""> or </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/retirement-plans/plan-participant-employee/retirement-savings-contributions-savers-credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1127" instrument_node="">Retirement Savings Contributions Credit</span></a></li><li data-dcnode-id="1121"><span data-dcnode-id="1124" instrument_node="">Homeowner credits, like the </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/energy-incentives-for-individuals-residential-property-updated-questions-and-answers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1123" instrument_node="">Residential Energy Efficient Property Credit</span></a></li><li data-dcnode-id="1117"><span data-dcnode-id="1120" instrument_node="">Healthcare credits, like the </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions/individuals/hctc" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1119" instrument_node="">Health Coverage Tax Credit</span></a></li><li data-dcnode-id="1113"><span data-dcnode-id="1116" instrument_node="">Education credits, like the </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions/individuals/aotc" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1115" instrument_node="">American Opportunity Credit and Lifetime Learning Credit</span></a></li></ul><span data-dcnode-id="1111" instrument_node="">
</span><h2 data-dcnode-id="1108"><span class="ez-toc-section" data-dcnode-id="1109" id="Tax_deductions"><span data-dcnode-id="1110" instrument_node="">Tax deductions&nbsp;</span></span></h2><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1100"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/self-employment-tax-deductions" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1106" instrument_node="">Small business tax deductions</span></a><span data-dcnode-id="1104" instrument_node=""> are expenses you can deduct from your total taxable income, effectively lowering your total tax bill. The IRS </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/publications/p535%23en_US_2020_publink100078332" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1103" instrument_node="">defines business tax deductions</span></a><span data-dcnode-id="1101" instrument_node=""> as expenses that are “both ordinary and necessary” to your business.&nbsp;</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Common deductions for businesses include:</span></p><span data-dcnode-id="1096" instrument_node="">
</span><ul data-dcnode-id="1075"><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Advertising and marketing costs</span></li><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Business insurance</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Contract labor</span></li><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Depreciation</span></li><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Home office</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Legal fees</span></li><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Rent&nbsp;</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Salaries&nbsp;</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Phone and internet expenses</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Travel expenses</span></li></ul><span data-dcnode-id="1074" instrument_node="">
</span><h2 data-dcnode-id="1071"><span class="ez-toc-section" data-dcnode-id="1072" id="2021_tax_brackets"><span data-dcnode-id="1073" instrument_node="">2021 tax brackets</span></span></h2><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">If you’re a sole proprietorship, LLC, partnership, or S corp, here are the applicable </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-provides-tax-inflation-adjustments-for-tax-year-2021" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1068" instrument_node="">individual income tax rates for 2021</span></a><span data-dcnode-id="1066" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="1064" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1002"><table class="wp-block-table" data-dcnode-id="1003"><tbody data-dcnode-id="1004"><tr data-dcnode-id="1054"><td data-dcnode-id="1061"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Tax Rate</span></strong></td><td data-dcnode-id="1058"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Single</span></strong></td><td data-dcnode-id="1055"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Married Filing Jointly</span></strong></td></tr><tr data-dcnode-id="1047"><td data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">10%</span></td><td data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">$9,950 and under</span></td><td data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">$19,900 and under</span></td></tr><tr data-dcnode-id="1040"><td data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">12%</span></td><td data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Over $9,950</span></td><td data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Over $19,900</span></td></tr><tr data-dcnode-id="1033"><td data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">22%</span></td><td data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Over $40,525</span></td><td data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Over $81,050</span></td></tr><tr data-dcnode-id="1026"><td data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">24%</span></td><td data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Over $86,375</span></td><td data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Over $172,750</span></td></tr><tr data-dcnode-id="1019"><td data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">32%</span></td><td data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Over $164,925</span></td><td data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Over $329,850</span></td></tr><tr data-dcnode-id="1012"><td data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">35%</span></td><td data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Over $209,425</span></td><td data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Over $418,850</span></td></tr><tr data-dcnode-id="1005"><td data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">37%</span></td><td data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Over $523,600</span></td><td data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Over $628,300</span></td></tr></tbody></table></figure><span data-dcnode-id="1001" instrument_node="">
</span><article class="widget widget-related side-right clickable" data-dcnode-id="992" id="wid-3333"><span class="btn-read" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Related</span></span><h6 data-dcnode-id="996"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/people-management/the-single-word-that-secretly-drives-our-behavior"><span data-dcnode-id="998" instrument_node="">The Single Word That Secretly Drives Our Behavior</span></a></h6><strong class="title" data-dcnode-id="993"><a class="category team-management" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/team-management"><span data-dcnode-id="995" instrument_node="">Team Management</span></a></strong></article><span data-dcnode-id="991" instrument_node="">
</span><h2 data-dcnode-id="988"><span class="ez-toc-section" data-dcnode-id="989" id="2022_federal_tax_brackets"><span data-dcnode-id="990" instrument_node="">2022 federal tax brackets&nbsp;</span></span></h2><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">The </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-provides-tax-inflation-adjustments-for-tax-year-2022" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="985" instrument_node="">individual federal income tax brackets for 2022</span></a><span data-dcnode-id="983" instrument_node="">—which have been adjusted for inflation—determine how much tax you pay for your 2022. Here’s what to expect:</span></p><span data-dcnode-id="981" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="919"><table class="wp-block-table" data-dcnode-id="920"><tbody data-dcnode-id="921"><tr data-dcnode-id="971"><td data-dcnode-id="978"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Tax Rate</span></strong></td><td data-dcnode-id="975"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Single</span></strong></td><td data-dcnode-id="972"><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Married Filing Jointly</span></strong></td></tr><tr data-dcnode-id="964"><td data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">10%</span></td><td data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">$10,275 and under</span></td><td data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">$20,550 and under</span></td></tr><tr data-dcnode-id="957"><td data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">12%</span></td><td data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Over $10,275</span></td><td data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Over $20,550</span></td></tr><tr data-dcnode-id="950"><td data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">22%</span></td><td data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Over $41,775</span></td><td data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Over $83,550</span></td></tr><tr data-dcnode-id="943"><td data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">24%</span></td><td data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Over $89,075</span></td><td data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Over $178,150</span></td></tr><tr data-dcnode-id="936"><td data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">32%</span></td><td data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Over $170,050</span></td><td data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Over $340,100</span></td></tr><tr data-dcnode-id="929"><td data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">35%</span></td><td data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Over $215,950</span></td><td data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Over $431,900</span></td></tr><tr data-dcnode-id="922"><td data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">37%</span></td><td data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Over $539,900</span></td><td data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Over $647,850</span></td></tr></tbody></table></figure><span data-dcnode-id="918" instrument_node="">
</span><h2 data-dcnode-id="915"><span class="ez-toc-section" data-dcnode-id="916" id="How_to_estimate_your_2021_federal_tax_bill_and_quarterly_tax_payments"><span data-dcnode-id="917" instrument_node="">How to estimate your 2021 federal tax bill and quarterly tax payments</span></span></h2><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">By crunching some numbers, you can estimate your business’s 2021 total federal tax bill and subsequent quarterly payments for the year. Let’s do a couple of examples:</span></p><span data-dcnode-id="911" instrument_node="">
</span><h3 data-dcnode-id="908"><span class="ez-toc-section" data-dcnode-id="909" id="Example_1_Estimating_total_federal_income_taxes_owed_in_2021"><span data-dcnode-id="910" instrument_node="">Example 1: Estimating total federal income taxes owed in 2021</span></span></h3><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">Jane Cameron runs a single-member LLC specializing in web design services. She earned $80,000 in income in 2021, plus $3,000 from her job as an assistant soccer coach at a local university. She has $8,000 in business deductions, and can also take the </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/irs-provides-tax-inflation-adjustments-for-tax-year-2021" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="905" instrument_node="">2021 standard deduction for single taxpayers</span></a><span data-dcnode-id="903" instrument_node=""> of $12,550. Using the below formula, that brings her total taxable income down to $62,450.&nbsp;</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Total income ($83,000) – business deductions ($8,000) – standard deduction ($12,550)</span></strong></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Because Jane is filing as a single taxpayer, her marginal tax rate is 22%. However, the entire $62,450 doesn’t get taxed at 22%. Only the amount over the minimum—which in this case is $40,525—gets taxed at the rate of 22%. The rest of the money is taxed at a lower rate, since it falls into the lower tax brackets. Here’s how the math works out:&nbsp;</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">$9,950 x 10% = $995</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">($40,525 – $9,950) x 12% = $3,669</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">($62,450 – $40,525) x 22% = $4,823.50</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Adding up those numbers, Jane’s estimated federal income tax bill for 2021 would be $9,487.50.</span></p><span data-dcnode-id="882" instrument_node="">
</span><h3 data-dcnode-id="879"><span class="ez-toc-section" data-dcnode-id="880" id="Example_2_Estimating_federal_quarterly_tax_payments_for_2022"><span data-dcnode-id="881" instrument_node="">Example 2: Estimating federal quarterly tax payments for 2022</span></span></h3><span data-dcnode-id="878" instrument_node="">
</span><h3 data-dcnode-id="875"><span class="ez-toc-section" data-dcnode-id="876" id="Step_1"><span data-dcnode-id="877" instrument_node="">Step 1</span></span></h3><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="873" instrument_node="">To estimate Jane’s quarterly payments, we have to start by </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/how-to-calculate-your-self-employment-tax-in-4-simple-steps" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="872" instrument_node="">calculating her self-employment tax</span></a><span data-dcnode-id="870" instrument_node="">. Because Jane earns more than $400 a year from her business, she has to pay </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/self-employment-tax-social-security-and-medicare-taxes" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="869" instrument_node="">self-employment tax</span></a><span data-dcnode-id="867" instrument_node="">; the current rate is 15.3% (12.4% for Social Security and 2.9% for Medicare). The amount of money subject to self-employment tax is roughly </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc554%23%3A~%3Atext%3DGenerally%252C%2520the%2520amount%2520subject%2520to%2Cfrom%2520your%2520trade%2520or%2520business." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">92.35% of a business’s net earnings</span></a><span data-dcnode-id="864" instrument_node="">.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">So, to calculate Jane’s estimated quarterly tax payments for 2022, we have to use the below formula:</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Estimated net earnings for 2022 x 92.35% x 15.3% = estimated self-employment taxes</span></strong></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Based on her 2021 earnings, let’s say Jane estimates she’ll be able to bring in $95,000 in 2022.&nbsp;</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">$95,000 x 92.35% x 15.3% = $13,423</span></p><span data-dcnode-id="849" instrument_node="">
</span><h3 data-dcnode-id="846"><span class="ez-toc-section" data-dcnode-id="847" id="Step_2"><span data-dcnode-id="848" instrument_node="">Step 2</span></span></h3><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Next, we have to calculate Jane’s estimated income tax for 2022. We’ll use the same formula as Example 1, but with the updated figures from the 2022 individual income tax brackets.&nbsp;</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="839"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Total net profits – business deductions – standard deduction</span></strong></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Jane estimates she’ll earn $95,000 in total net profits, have roughly $10,000 in business deductions, and have the same standard deduction of $12,550.&nbsp;</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">$95,000 – $10,000 – $12,550 = $72,450</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">She still falls into the 22% tax bracket.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">$10,275 x 10% = $1,027.50</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">($41,775 – $10,275) x 12% = $3,780</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">($72,450 – $41,775) x 22% = $6,748.50</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Adding up those numbers, Jane’s estimated federal income tax bill for 2022 would be $11,556.</span></p><span data-dcnode-id="817" instrument_node="">
</span><h3 data-dcnode-id="814"><span class="ez-toc-section" data-dcnode-id="815" id="Step_3"><span data-dcnode-id="816" instrument_node="">Step 3</span></span></h3><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">To figure out Jane’s </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/taxes/small-business-quarterly-taxes" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="811" instrument_node="">estimated federal quarterly payments for 2022</span></a><span data-dcnode-id="809" instrument_node="">, we have to add up her estimated income taxes owed (from Step 2) and her estimated self-employment taxes owed (from Step 1), then divide by four quarters.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="804"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">(Estimated income taxes owed + estimated self-employment taxes owed) / 4 = quarterly payment</span></strong></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">($11,556 + $13,423) / 4 = $6,244.75</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">That means Jane can plan on making an estimated tax payment of&nbsp; $6,244.75 each quarter.&nbsp;</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Though these formulas can be helpful for gauging how much money you owe in taxes, keep in mind that they are just simple examples. It’s important to consult a tax professional who can account for your business’s unique tax considerations, and help guide you through the process of organizing paperwork and making payments.&nbsp;</span></p><span data-dcnode-id="794" instrument_node="">
</span><h2 data-dcnode-id="791"><span class="ez-toc-section" data-dcnode-id="792" id="Other_types_of_small_business_taxes"><span data-dcnode-id="793" instrument_node="">Other types of small business taxes</span></span></h2><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">While most small businesses don’t directly pay income tax, there are many other types of taxes that a small business has to account for:</span></p><span data-dcnode-id="787" instrument_node="">
</span><ul data-dcnode-id="758"><li data-dcnode-id="780"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Payroll taxes:</span></strong><span data-dcnode-id="784" instrument_node=""> If you have employees, you have to </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/payroll/payroll-taxes" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">pay taxes on the money they earn</span></a><span data-dcnode-id="781" instrument_node="">. That includes Social Security and Medicare taxes, unemployment taxes, and federal and state income tax withholding.&nbsp;</span></li><li data-dcnode-id="773"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Excise taxes:</span></strong><span data-dcnode-id="777" instrument_node=""> Depending on your business’s industry and offerings, you may have to pay </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/excise-tax" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">excise taxes</span></a><span data-dcnode-id="774" instrument_node="">, which the IRS imposes for certain goods, services, and activities. Owning a heavy highway vehicle and wagering on sports are just two examples.&nbsp;</span></li><li data-dcnode-id="763"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">State taxes: </span></strong><span data-dcnode-id="770" instrument_node="">Similar to federal income tax, owners/partners of small business interests may be subject to state income tax. . You can </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/states-and-territories" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="769" instrument_node="">check your state’s official website</span></a><span data-dcnode-id="767" instrument_node=""> or </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/publications/state-corporate-income-tax-rates-and-brackets/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="766" instrument_node="">search for your state</span></a><span data-dcnode-id="764" instrument_node=""> to find out the income tax rate as well as your state’s quarterly estimated tax requirements.&nbsp;</span></li><li data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Property taxes:</span></strong><span data-dcnode-id="760" instrument_node=""> If your business owns a building or land, you have to pay property taxes.&nbsp;</span></li></ul><span data-dcnode-id="757" instrument_node="">
</span><h2 data-dcnode-id="754"><span class="ez-toc-section" data-dcnode-id="755" id="How_and_when_to_file_business_taxes"><span data-dcnode-id="756" instrument_node="">How and when to file business taxes</span></span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Unless you file for an extension, the filing due date for taxes this year is April 18, 2022, though you can file them any time after January 24, 2022. The form you need to file depends on your business structure:</span></p><span data-dcnode-id="750" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="710"><table class="wp-block-table" data-dcnode-id="711"><tbody data-dcnode-id="712"><tr data-dcnode-id="743"><td data-dcnode-id="747"><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Business Structure</span></strong></td><td data-dcnode-id="744"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Tax Form</span></strong></td></tr><tr data-dcnode-id="737"><td data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">C corp</span></td><td data-dcnode-id="738"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-form-1120" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="740" instrument_node="">Form 1120</span></a></td></tr><tr data-dcnode-id="731"><td data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">S corp</span></td><td data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/s-corporations" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="734" instrument_node="">Form 1120-S</span></a></td></tr><tr data-dcnode-id="725"><td data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">LLC</span></td><td data-dcnode-id="726"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/llc-filing-as-a-corporation-or-partnership" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="728" instrument_node="">Form 1065</span></a></td></tr><tr data-dcnode-id="719"><td data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Sole proprietorship</span></td><td data-dcnode-id="720"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/forms-for-sole-proprietorship" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="722" instrument_node="">Form 1040</span></a></td></tr><tr data-dcnode-id="713"><td data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Partnership</span></td><td data-dcnode-id="714"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/llc-filing-as-a-corporation-or-partnership" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="716" instrument_node="">Form 1065</span></a></td></tr></tbody></table></figure><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">As illustrated in the earlier example, some business owners are also responsible for paying quarterly taxes. If you need to pay those, both federal and state payments have the same deadlines::&nbsp;</span></p><span data-dcnode-id="706" instrument_node="">
</span><ul data-dcnode-id="697"><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Quarter 1: April 18, 2022</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Quarter 2: June 15, 2022</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Quarter 3: September 15, 2022</span></li><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Quarter 4: January 17, 2023</span></li></ul><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">It’s never too early to start getting organized for tax payments. If you need additional help, consider reaching out to a tax professional or </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/finances-and-taxes" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="694" instrument_node="">check out some of our other guides</span></a><span data-dcnode-id="692" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="690" instrument_node="">
</span></div><span data-dcnode-id="688" instrument_node="">
