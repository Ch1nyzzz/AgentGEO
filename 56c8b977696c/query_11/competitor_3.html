</span><p data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">The 2022 tax filing season in Canada kicked off on February 21, 2022. </span></p><span data-dcnode-id="3176" instrument_node="">
</span><p data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">The tax-filing deadline for most Canadians (for the 2021 tax year) is on April 30, 2022. Normally, the general tax filing deadline date is on April 30th each year, but in 2022, this date falls on a Saturday, so there’s an extension until the next business day which is May 2, 2022.</span></p><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">CRA will consider your return to have been filed on time if:</span></p><span data-dcnode-id="3170" instrument_node="">
</span><ul data-dcnode-id="3165"><li data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">It is received on or before May 2, 2022</span></li><li data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Your paper return is postmarked on or before May 2, 2022</span></li></ul><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">For those who are self-employed, or who have a spouse/partner who is self-employed, the deadline extends until June 15, 2022.</span></p><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Filing your taxes on time is not just about getting your tax refunds on time. A late tax filing can result in monetary penalties and can also delay or affect your government benefits negatively. </span></p><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3157" instrument_node="">For example, you could miss out on the </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/canada-child-benefit-dates/"><span data-dcnode-id="3156" instrument_node="">Canada Child Benefit</span></a><span data-dcnode-id="3154" instrument_node=""> and </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/gst-payment-dates/"><span data-dcnode-id="3153" instrument_node="">GST/HST Credit</span></a><span data-dcnode-id="3151" instrument_node="">.</span></p><span data-dcnode-id="3149" instrument_node="">

2 Personal Tax Changes and Tax Filing Deadline</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3117"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="3118" href="#2021_Personal_Tax_Changes" title="2021 Personal Tax Changes"><span data-dcnode-id="3119" instrument_node="">2021 Personal Tax Changes</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3114"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="3115" href="#2020_Personal_Tax_Changes" title="2020 Personal Tax Changes"><span data-dcnode-id="3116" instrument_node="">2020 Personal Tax Changes</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3111"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="3112" href="#2019_Personal_Tax_Changes" title="2019 Personal Tax Changes"><span data-dcnode-id="3113" instrument_node="">2019 Personal Tax Changes</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="3104"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="3109" href="#Personal_Tax_Changes_in_2018" title="Personal Tax Changes in 2018"><span data-dcnode-id="3110" instrument_node="">Personal Tax Changes in 2018</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="3105"><li class="ez-toc-heading-level-3" data-dcnode-id="3106"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="3107" href="#Eliminated_tax_Credits" title="Eliminated tax Credits"><span data-dcnode-id="3108" instrument_node="">Eliminated tax Credits</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="3100" instrument_node="">
</span><h2 data-dcnode-id="3096"><span class="ez-toc-section" data-dcnode-id="3099" id="What_Are_The_Penalties_For_a_Late_Tax-Filing_in_2022"></span><span data-dcnode-id="3098" instrument_node="">What Are The Penalties For a Late Tax-Filing in 2022?</span><span class="ez-toc-section-end" data-dcnode-id="3097"></span></h2><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">The government wants every penny it is owed and wants it in good time. As such, there are penalties for filing a late tax return if you have an unpaid tax balance. </span></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">If you are getting a refund or your tax balance is zero, there are no penalties for sending in your return after the deadline date.</span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">The penalties for filing your income tax and benefit return late when you owe the Canada Revenue Agency (CRA) are as follows:</span></p><span data-dcnode-id="3086" instrument_node="">
</span><h3 data-dcnode-id="3082"><span class="ez-toc-section" data-dcnode-id="3085" id="Late_Tax-Filing_Penalty"></span><span data-dcnode-id="3084" instrument_node="">Late Tax-Filing Penalty</span><span class="ez-toc-section-end" data-dcnode-id="3083"></span></h3><span data-dcnode-id="3081" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3072"><figure class="alignright size-full is-resized" data-dcnode-id="3073"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/recommends/simple-tax/" rel="nofollow sponsored noopener" target="_blank"><picture class="wp-image-53271 sp-no-webp" data-dcnode-id="3075" data-pin-description="2022 Tax Filing Deadline and What You Need To Know https://www.savvynewcanadians.com/tax-filing-deadline/"><source data-dcnode-id="3080" data-lazy-srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.webp" srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.webp" type="image/webp"><source data-dcnode-id="3079" data-lazy-srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" type="image/png"><img alt="Wealthsimple tax banner" class="wp-image-53271 sp-no-webp entered lazyloaded" data-dcnode-id="3078" data-lazy-src="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" data-lazy-srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" data-ll-status="loaded" data-pin-description="2022 Tax Filing Deadline and What You Need To Know https://www.savvynewcanadians.com/tax-filing-deadline/" height="174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png&amp;raw" srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" width="209"><noscript data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">&lt;img src="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png" class="wp-image-53271 sp-no-webp" data-pin-description="2022 Tax Filing Deadline and What You Need To Know https://www.savvynewcanadians.com/tax-filing-deadline/" alt="Wealthsimple tax banner" height="174" width="209" srcset="https://www.savvynewcanadians.com/wp-content/uploads/2022/01/Wealthsimple-tax-banner.png"&gt;</span></noscript></picture></a></figure></div><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">An immediate penalty of 5% on your tax balance owing plus 1% of your balance owing per month for up to 12 months is levied by the CRA.</span></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3064"><strong data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">For example</span></strong><span data-dcnode-id="3065" instrument_node="">, if you owe the taxman $5,000 in taxes and send in your tax return 12 months late, your tax bill increases to:</span></p><span data-dcnode-id="3063" instrument_node="">
</span><ul data-dcnode-id="3058"><li data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">$5,000 x 5% = $250, plus</span></li><li data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">$5,000 x 1% x 12 months = $600</span></li></ul><span data-dcnode-id="3057" instrument_node="">
</span><p data-dcnode-id="3049"><strong data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Late-filing penalty</span></strong><span data-dcnode-id="3054" instrument_node=""> = </span><strong data-dcnode-id="3051"><u data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">$850</span></u></strong><span data-dcnode-id="3050" instrument_node="">, increasing your overall tax bill to $5,850.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">This amount does not include the additional interest penalty.</span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">If you were late in filing your taxes in previous years as well, the CRA can increase your “late-filing” penalty to 10% of your tax balance, plus 2% per month up to a maximum of 20 months.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><h3 data-dcnode-id="3038"><span class="ez-toc-section" data-dcnode-id="3041" id="Late_Tax-Filing_Interest"></span><span data-dcnode-id="3040" instrument_node="">Late Tax-Filing Interest</span><span class="ez-toc-section-end" data-dcnode-id="3039"></span></h3><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">In addition to the “late-filing” penalty, the government will also charge interest on the amount of taxes you owe, including the penalties.</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">There are some instances where the CRA may be able to waive penalties/interest on taxes owing if you can show that circumstances beyond your control prevented you from meeting your tax obligations, such as financial hardship, natural or man-made disasters, serious illness or accident, postal strike, etc.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3030" instrument_node="">Use </span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/forms-publications/forms/rc4288.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3029" instrument_node="">Form RC4288 </span></a><span data-dcnode-id="3027" instrument_node="">to request the penalty waiver.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3018"><strong data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Tax-Tip</span></strong><span data-dcnode-id="3022" instrument_node="">: Even if you are unable to pay CRA what you owe them in taxes, it still makes sense to file your taxes before the May 2nd </span><s data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">April 30th</span></s><span data-dcnode-id="3019" instrument_node=""> deadline. Doing this means that you avoid the late-filing penalty and will only be on the hook for interest payments.</span></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3011"><strong data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Related</span></strong><span data-dcnode-id="3014" instrument_node="">: </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/simple-tax-review/"><span data-dcnode-id="3013" instrument_node="">File Your Taxes For Free Using Wealthsimple Tax</span></a></p><span data-dcnode-id="3010" instrument_node="">
</span><h2 data-dcnode-id="3006"><span class="ez-toc-section" data-dcnode-id="3009" id="Is_Tax_Filing_Compulsory"></span><span data-dcnode-id="3008" instrument_node="">Is Tax Filing Compulsory?</span><span class="ez-toc-section-end" data-dcnode-id="3007"></span></h2><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">It depends.</span></p><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">If you don’t owe taxes to the government, you may not need to file a tax return. However, there are other reasons why you may need to file a return and they include if:</span></p><span data-dcnode-id="2999" instrument_node="">
</span><ul data-dcnode-id="2981"><li data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">You are expecting a tax refund. Duh! CRA won’t chase you around if you don’t owe them. If you want what’s yours i.e. tax refund, you better go get it!</span></li><li data-dcnode-id="2992"><span data-dcnode-id="2996" instrument_node="">You are eligible for and want to collect government benefits including GST/HST credits, Canada Child Benefit, </span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/guaranteed-income-supplement-allowance-and-allowance-for-the-survivor/"><span data-dcnode-id="2995" instrument_node="">GIS or Allowance benefits</span></a><span data-dcnode-id="2993" instrument_node="">.</span></li><li data-dcnode-id="2987"><span data-dcnode-id="2991" instrument_node="">You have an open </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/home-buyers-and-lifelong-learning-plans/"><span data-dcnode-id="2990" instrument_node="">Home Buyers’ Plan</span></a><span data-dcnode-id="2988" instrument_node=""> or Lifelong Learning Plan account through your RRSP.</span></li><li data-dcnode-id="2982"><span data-dcnode-id="2986" instrument_node="">You are contributing to the </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/understanding-the-canada-pension-plan/"><span data-dcnode-id="2985" instrument_node="">Canada Pension Plan</span></a><span data-dcnode-id="2983" instrument_node=""> (CPP).</span></li></ul><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2975"><span data-dcnode-id="2979" instrument_node="">There are a </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/tax/individuals/topics/about-your-tax-return/you-have-file-a-return.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2978" instrument_node="">few other scenarios</span></a><span data-dcnode-id="2976" instrument_node=""> where a tax return filing is required even if you do not owe taxes. If in doubt, just file – there are many ways to do it for cheap, or even free.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><h2 data-dcnode-id="2970"><span class="ez-toc-section" data-dcnode-id="2973" id="How_To_File_Your_Taxes_in_2022"></span><span data-dcnode-id="2972" instrument_node="">How To File Your Taxes in 2022</span><span class="ez-toc-section-end" data-dcnode-id="2971"></span></h2><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">There are so many ways to go about filing your taxes in 2022, depending on your circumstances or preferences. Some of the options available include:</span></p><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2962"><strong data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Online Tax Software</span></strong><span data-dcnode-id="2963" instrument_node="">: There are many brands of tax software you can use for filing your taxes. Depending on the level of support you need, you can choose the free or paid versions.</span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="2960" instrument_node="">Examples of tax software in Canada include </span><a class="thirstylink" data-dcnode-id="2958" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/recommends/simple-tax/" rel="nofollow sponsored" target="_blank" title="Simple Tax"><span data-dcnode-id="2959" instrument_node="">Wealthsimple Tax</span></a><span data-dcnode-id="2957" instrument_node=""> (free), TurboTax Online, H&amp;R Block Tax, Studio Tax, GenuTax, AdvTax, uFile, and CloudTax.</span></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">We have reviewed some of these options and you can learn more about what they offer using the links below:</span></p><span data-dcnode-id="2952" instrument_node="">
</span><ul data-dcnode-id="2937"><li data-dcnode-id="2945"><a class="thirstylink" data-dcnode-id="2950" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/recommends/simple-tax/" rel="nofollow sponsored" target="_blank" title="Simple Tax"><span data-dcnode-id="2951" instrument_node="">WealthsimpleTax Free</span></a><span data-dcnode-id="2949" instrument_node=""> (free tax software and you also get a </span><strong data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">$15 cash bonus</span></strong><span data-dcnode-id="2946" instrument_node="">)</span></li><li data-dcnode-id="2941"><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/turbotax-canada/"><span data-dcnode-id="2944" instrument_node="">TurboTax Canada</span></a><span data-dcnode-id="2942" instrument_node=""> (free and paid options)</span></li><li data-dcnode-id="2938"><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/tax-software-canada/"><span data-dcnode-id="2940" instrument_node="">Best Tax Return Software in Canada</span></a></li></ul><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2935" instrument_node="">Tax software simplifies the filing process since you can connect to an existing </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/how-to-open-a-cra-my-account/"><span data-dcnode-id="2934" instrument_node="">CRA My Account</span></a><span data-dcnode-id="2932" instrument_node=""> and use the “auto-fill my return” feature to automatically populate a good portion of your information. This automated process also helps to reduce the likelihood of errors occurring.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Using online software means that you can send your tax return directly to CRA through NETFILE, and get your refund back in as little as 8 business days.&nbsp;Additionally, you will have your tax information for previous years stored online and easily accessible for reference in the future.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2920"><strong data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Paper Return via Mail</span></strong><span data-dcnode-id="2924" instrument_node="">: Some people prefer to do their taxes the old-fashioned way. In some years, the CRA mails out tax forms to paper filers to hasten the process. If you prefer to file a paper return and did not receive them in the mail, you can order a paper copy or </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/forms-publications/tax-packages-years/general-income-tax-benefit-package.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2923" instrument_node="">download them</span></a><span data-dcnode-id="2921" instrument_node=""> starting in January 2022.</span></p><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Paper-filers expecting a tax refund have to wait for up to 8 weeks.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2912"><strong data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">CRA File My Return</span></strong><span data-dcnode-id="2913" instrument_node="">:&nbsp; For the 2022 tax season, CRA is offering to help low-income individuals complete their tax returns via automated phone service. This service is free and eligible persons will be notified through the mail.</span></p><span data-dcnode-id="2911" instrument_node="">
</span><p data-dcnode-id="2907"><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Community Volunteer Income tax Program</span></strong><span data-dcnode-id="2908" instrument_node="">: Through this program, tax clinics across Canada assist individuals with modest incomes and simple taxes with completing their tax returns. It is made available using video-conference, phone, and document drop-off arrangements.</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2905" instrument_node="">Read more about the </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/best-free-tax-software-canada/"><span data-dcnode-id="2904" instrument_node="">free tax return software</span></a><span data-dcnode-id="2902" instrument_node=""> available to Canadians.</span></p><span data-dcnode-id="2900" instrument_node="">

eadline-canada-564x376.jpg 564w, https://www.savvynewcanadians.com/wp-content/uploads/2018/04/tax-filing-deadline-canada-1013x675.jpg 1013w" sizes="(max-width: 749px) 100vw, 749px"&gt;</span></noscript></picture></figure></div><span data-dcnode-id="2891" instrument_node="">
</span><h2 data-dcnode-id="2887"><span class="ez-toc-section" data-dcnode-id="2890" id="2022_Personal_Tax_Changes_and_Tax_Filing_Deadline"></span><span data-dcnode-id="2889" instrument_node="">2022 Personal Tax Changes and Tax Filing Deadline</span><span class="ez-toc-section-end" data-dcnode-id="2888"></span></h2><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">The tax filing deadline in Canada in 2022 is on May 2, 2022.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">2021 was another extraordinary year. Unlike previous years where you probably only focused on getting your T4 slip and that was it, your 2021 tax return filing may look a bit different.</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Canadians who received COVID-19 financial benefits are required to report the income on their tax return.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2876" instrument_node="">For example, you must report income received from the </span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/how-to-apply-for-the-canada-recovery-benefit-crb/"><span data-dcnode-id="2875" instrument_node="">Canada Recovery Benefit</span></a><span data-dcnode-id="2873" instrument_node=""> (CRB), Canada Recovery Sickness Benefit (CRSB), and Canada Recovery Caregiving Benefit (CRCB)</span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/how-to-apply-for-the-canada-emergency-response-benefit-cerb/"><span data-dcnode-id="2872" instrument_node="">. </span></a><span data-dcnode-id="2870" instrument_node="">Recipients of these benefits will get a T4A slip from CRA.</span></p><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">The tax was withheld at source for these three benefits, however, depending on how much you earn from other sources, you may still owe taxes or receive a refund.</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">For the 2022 tax year, the following updates are applicable:</span></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2855"><strong data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">RRSP Contribution Limit</span></strong><span data-dcnode-id="2859" instrument_node="">: The RRSP annual limit for 2022 is increasing to $29,210 from the previous limit of $27,830 in 2021. You can still make RRSP contributions for the 2021 tax year during the </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/rrsp-season-contribution-deadline-march-1-2018/"><span data-dcnode-id="2858" instrument_node="">RRSP season</span></a><span data-dcnode-id="2856" instrument_node=""> that ends on March 1, 2022.</span></p><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2850"><strong data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Basic Personal Amount</span></strong><span data-dcnode-id="2851" instrument_node="">: The federal basic personal amount in 2022 is up to $14,398 if your income is $155,625&nbsp;or less. A clawback of the personal amount applies to higher taxable incomes and is $12,719 if you earn $221,708 or more. </span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2845"><strong data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">TFSA Contribution Limit</span></strong><span data-dcnode-id="2846" instrument_node="">: The annual TFSA limit for 2022 is unchanged at $6,000. If you have been eligible to contribute to a TFSA since it was implemented in 2009, your total contribution room is now $81,500 (assuming you have made no withdrawals or re-contribution so far). </span></p><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2840"><strong data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Federal Tax Brackets</span></strong><span data-dcnode-id="2841" instrument_node="">: The federal tax rates and brackets for 2022 are as follows:</span></p><span data-dcnode-id="2839" instrument_node="">
</span><ul data-dcnode-id="2828"><li data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Up to $50,197: 15%</span></li><li data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">$50,197.01 to $100,392: 20.50%</span></li><li data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">$100,392.01 to $155,625: 26%</span></li><li data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">$155,625.01 to $221,708: 29%</span></li><li data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">$221,708+: 33%</span></li></ul><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node="">Find out what your </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/federal-provincial-tax-brackets-canada/"><span data-dcnode-id="2825" instrument_node="">provincial tax rate is here</span></a><span data-dcnode-id="2823" instrument_node="">.</span></p><span data-dcnode-id="2821" instrument_node="">
</span><span class="mb-center maxbutton-1-center" data-dcnode-id="2816"><span class="maxbutton-1-container mb-container" data-dcnode-id="2817"><a class="maxbutton-1 maxbutton maxbutton-affiliate-buttons-1" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/recommends/simple-tax/" rel="nofollow noopener" target="_blank"><span class="mb-text" data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">File Your Taxes For Free Online ($15 Bonus)</span></span></a></span></span><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2811"><strong data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Related Tax Reading for 2022</span></strong><span data-dcnode-id="2812" instrument_node="">:</span></p><span data-dcnode-id="2810" instrument_node="">
</span><ul data-dcnode-id="2797"><li data-dcnode-id="2807"><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/work-from-home-office-tax-deductions-canada/"><span data-dcnode-id="2809" instrument_node="">Work From Home Tax Deductions</span></a></li><li data-dcnode-id="2804"><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/penalty-for-filing-taxes-late-canada/"><span data-dcnode-id="2806" instrument_node="">Late Tax Filing Penalties</span></a></li><li data-dcnode-id="2801"><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/gst-hst-quarterly-instalment-due-dates/"><span data-dcnode-id="2803" instrument_node="">GST Installment Payments for Businesses</span></a></li><li data-dcnode-id="2798"><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/corporate-tax-instalments-due-dates-canada/"><span data-dcnode-id="2800" instrument_node="">Quarterly Corporation Tax Payment Schedule</span></a></li></ul><span data-dcnode-id="2796" instrument_node="">
</span><h2 data-dcnode-id="2792"><span class="ez-toc-section" data-dcnode-id="2795" id="2021_Personal_Tax_Changes"></span><span data-dcnode-id="2794" instrument_node="">2021 Personal Tax Changes</span><span class="ez-toc-section-end" data-dcnode-id="2793"></span></h2><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">2020 was an extraordinary year. Unlike previous years where you probably only focused on getting your T4 slip and that was it, your 2020 tax return filing may look a bit different.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Canadians who received COVID-19 financial benefits are required to report the income on their tax return.</span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2784" instrument_node="">For example, you must report income received from the </span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/how-to-apply-for-the-canada-emergency-response-benefit-cerb/"><span data-dcnode-id="2783" instrument_node="">Canada Emergency Response Benefit</span></a><span data-dcnode-id="2781" instrument_node=""> (CERB) and Canada Emergency Student Benefit (CESB). Recipients of these benefits will get a T4A slip from CRA.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Other benefits that have been paid in the 2020 tax year include:</span></p><span data-dcnode-id="2776" instrument_node="">
</span><ul data-dcnode-id="2767"><li data-dcnode-id="2772"><a data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/how-to-apply-for-the-canada-recovery-benefit-crb/"><span data-dcnode-id="2775" instrument_node="">Canada Recovery Benefit</span></a><span data-dcnode-id="2773" instrument_node=""> (CRB)</span></li><li data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Canada Recovery Sickness Benefit (CRSB), and </span></li><li data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Canada Recovery Caregiving Benefit (CRCB)</span></li></ul><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">Tax was withheld at source for these three benefits, however, depending on how much you earn from other sources, you may still owe taxes or receive a refund.</span></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">For the 2021 tax year, the following updates are applicable:</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2753"><strong data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">RRSP Contribution Limit</span></strong><span data-dcnode-id="2757" instrument_node="">: The RRSP annual limit for 2021 is increasing to $27,830 from the previous limit of $27,230 in 2020. You can still make RRSP contributions for the 2020 tax year during the </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/rrsp-season-contribution-deadline-march-1-2018/"><span data-dcnode-id="2756" instrument_node="">RRSP season</span></a><span data-dcnode-id="2754" instrument_node=""> that ends on March 1, 2021.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2748"><strong data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Basic Personal Amount</span></strong><span data-dcnode-id="2749" instrument_node="">: The federal basic personal amount in 2021 is up to $13,808 if your income is $151,978&nbsp;or less. A clawback of the personal amount applies to higher taxable incomes and is $12,421 if you earn $216,511 or more. </span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2743"><strong data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">TFSA Contribution Limit</span></strong><span data-dcnode-id="2744" instrument_node="">: The annual TFSA limit for 2021 is unchanged at $6,000. If you have been eligible to contribute to a TFSA since it was implemented in 2009, your total contribution room is now $75,500 (assuming you have made no withdrawals or re-contribution so far). </span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2738"><strong data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Federal Tax Brackets</span></strong><span data-dcnode-id="2739" instrument_node="">: The federal tax rates and brackets for 2021 are as follows:</span></p><span data-dcnode-id="2737" instrument_node="">
</span><ul data-dcnode-id="2726"><li data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Up to $49,020: 15%</span></li><li data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">$49,020.01 to $98,040: 20.50%</span></li><li data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">$98,040.01 to $151,978: 26%</span></li><li data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">$151,978.01 to $216,511: 29%</span></li><li data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">$216,511+: 33%</span></li></ul><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2721"><strong data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Home Office Expense Deduction</span></strong><span data-dcnode-id="2722" instrument_node="">: For the 2020 tax year, the CRA has simplified the process for claiming work-space-in-the-home expenses if you worked from home due to COVID-19. </span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">You can claim up to $400 in expenses without submitting a T2200 Form.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><h2 data-dcnode-id="2713"><span class="ez-toc-section" data-dcnode-id="2716" id="2020_Personal_Tax_Changes"></span><span data-dcnode-id="2715" instrument_node="">2020 Personal Tax Changes</span><span class="ez-toc-section-end" data-dcnode-id="2714"></span></h2><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2711" instrument_node="">The </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">RRSP dollar limit</span></strong><span data-dcnode-id="2708" instrument_node=""> for 2020 is increasing to $27,230 from the previous limit of $26,500 in 2019. If you have RRSP contribution carried over from 2019, you have until February 28, 2020, to make those contributions and claim them as a deduction on your 2019 tax return.</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2705" instrument_node="">The standard </span><strong data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">basic personal amount</span></strong><span data-dcnode-id="2702" instrument_node=""> (BPA) i.e. your tax-free allowance for 2020 is $12,298, up from $12,069 in 2019. There are plans by the Liberal government to get the BPA to $15,000 by 2023. Based on the draft proposals, the BPA will be $13,229 in 2020, $13,808 (2021), $14,398 (2022) and $15,000 (2023).</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">The enhancements to the basic personal amount are targeted at reducing taxes for middle-class Canadians and will phase out at incomes exceeding $150,000.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Speaking of tax brackets, for 2020, the federal tax brackets are:</span></p><span data-dcnode-id="2694" instrument_node="">
</span><ul data-dcnode-id="2683"><li data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">$0 to $48,535: 15%</span></li><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">over $48,535 up to $97,069: 20.5%</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">over $97,069 to $150,473: 26%</span></li><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">over $150,473 to $214,368: 29%</span></li><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">over $214,368: 33%</span></li></ul><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2681" instrument_node="">Increases in </span><strong data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">CPP payments</span></strong><span data-dcnode-id="2678" instrument_node=""> continue in 2020 with employers and employees making a contribution of 5.25% on up to $58,700 in pensionable earnings. The basic exemption amount for 2020 remains at $3,500. The contribution rate for self-employed will be 10.5% (i.e. 5.25% x 2).</span></p><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">First-time homebuyers can withdraw up to $35,000 from their RRSP tax-free and put it towards the purchase of a home under the revamped Home Buyers’ Plan. A couple can withdraw up to $70,000.</span></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">If you subscribe to digital news, you can now claim up to a $75 in tax credit every year on up to $500 paid in fees.</span></p><span data-dcnode-id="2670" instrument_node="">
</span><h2 data-dcnode-id="2666"><span class="ez-toc-section" data-dcnode-id="2669" id="2019_Personal_Tax_Changes"></span><span data-dcnode-id="2668" instrument_node="">2019 Personal Tax Changes</span><span class="ez-toc-section-end" data-dcnode-id="2667"></span></h2><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Some of the new tax developments that will come into effect in 2019 and which will affect your tax filing in future years include:</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2661" instrument_node="">The </span><strong data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">small business tax rate</span></strong><span data-dcnode-id="2658" instrument_node=""> has been reduced from 10% to 9%. Also, note that there is now a lower limit to the passive income small business owners can keep before higher corporate tax rates kick in.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2655" instrument_node="">Low-income workers will receive an increase in </span><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Canada Workers Benefits</span></strong><span data-dcnode-id="2652" instrument_node=""> (a refundable tax benefit formerly known as the Working Income Tax Benefit).</span></p><span data-dcnode-id="2650" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2649" instrument_node="">New </span><strong data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">carbon taxes</span></strong><span data-dcnode-id="2646" instrument_node=""> have been introduced and fuel costs are expected to go up starting in April 2019. Direct tax rebates will be available to residents of provinces that do not yet have an agreement with the federal government (Manitoba, Ontario, New Brunswick, and Saskatchewan).</span></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2643" instrument_node="">The </span><strong data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Enhanced CPP</span></strong><span data-dcnode-id="2640" instrument_node=""> goes into effect with rates increasing to 5.1%. The maximum pensionable earnings for 2019 is $57,400. While CPP payments have increased, </span><strong data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">EI premiums</span></strong><span data-dcnode-id="2637" instrument_node=""> will drop by 4 cents for every $100 of insurable earnings (i.e. from $1.66 to $1.62 per $100).</span></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2634" instrument_node="">The </span><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/rrsp-tfsa-ei-oas-cpp-tax-benefit-numbers-2018/"><span data-dcnode-id="2633" instrument_node="">RRSP deduction limit</span></a><span data-dcnode-id="2631" instrument_node=""> for 2019 increases to $26,500 (up from $26,230 in 2018).</span></p><span data-dcnode-id="2629" instrument_node="">
</span><h2 data-dcnode-id="2625"><span class="ez-toc-section" data-dcnode-id="2628" id="Personal_Tax_Changes_in_2018"></span><span data-dcnode-id="2627" instrument_node="">Personal Tax Changes in 2018</span><span class="ez-toc-section-end" data-dcnode-id="2626"></span></h2><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Some of the tax changes for the 2018 tax season include old tax credits that are now eliminated and some new/improved tax credits.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><h3 data-dcnode-id="2617"><span class="ez-toc-section" data-dcnode-id="2620" id="Eliminated_tax_Credits"></span><span data-dcnode-id="2619" instrument_node="">Eliminated tax Credits</span><span class="ez-toc-section-end" data-dcnode-id="2618"></span></h3><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2612"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Education and Textbook Amounts</span></strong><span data-dcnode-id="2613" instrument_node="">: The Federal education and textbook credits have been eliminated. Carry-overs from previous years can still be used or carried forward.</span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2607"><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Children’s Credits</span></strong><span data-dcnode-id="2608" instrument_node="">: There are no more credits for children’s arts and fitness programs.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2602"><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Public Transit Tax Credit</span></strong><span data-dcnode-id="2603" instrument_node="">: You can claim your monthly bus/subway passes up until June 30, 2017. Any passes after this date are not eligible for this tax credit since it has been scrapped as well.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><h4 data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">New and Improved Tax Credits</span></h4><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2591"><strong data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Canada Caregiver Amount</span></strong><span data-dcnode-id="2595" instrument_node="">: The tax credits available to anyone who cares for an infirm family member (i.e. The Family Caregiver Amount, The Caregiver Amount, and The Amount for Infirm Dependants aged 18 or older) have now been combined into one tax credit – </span><em data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">The Canada Caregiver Amount</span></em><span data-dcnode-id="2592" instrument_node="">.</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2586"><strong data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Medical Expenses Tax Credit</span></strong><span data-dcnode-id="2587" instrument_node="">: Individuals who have fertility-related medical expenses may now be able to claim some of these costs on their tax return.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2581"><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Disability Tax Credit</span></strong><span data-dcnode-id="2582" instrument_node="">: Nurse practitioners are now on the list of medical professionals who can certify individuals with disabilities for the Disability Tax Credit.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="2577"><strong data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">BONUS: Freebie Cash Back for 2022</span></strong></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Want to earn cash back on your purchases or high interest rates this year? These apps can help!</span></p><span data-dcnode-id="2573" instrument_node="">

</span><p data-dcnode-id="2558"><strong data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Rakuten</span></strong><span data-dcnode-id="2562" instrument_node="">: Earn up to 40% in cash-back on all your online purchases at more than 750 stores.&nbsp;</span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savvynewcanadians.com/recommends/ebates-canada/"><span data-dcnode-id="2561" instrument_node="">Join Rakuten</span></a><span data-dcnode-id="2559" instrument_node=""> ($30 bonus when you make your first purchase of $30 or more).</span></p><span data-dcnode-id="2557" instrument_node="">
