</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">It’s payback time on Monday, the last day for filing of income tax returns of employed and self-employed persons, estates and trusts for income earned last year.</span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">As soon as the data from the field are collated, which may take a month, the Bureau of Internal Revenue would be able to figure out whether the biggest tax haul for the year would be sufficient to meet its revenue projections for 2012.</span></p><div data-dcnode-id="2948" id="billboard_article"><span data-dcnode-id="2961" instrument_node="">

</span><p data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">In quiet fashion, the BIR has set its sight on a group of taxpayers that is reputed to use its knowledge of tax regulations to deftly reduce, if not avoid, the payment of taxes: the professional partnerships.</span></p><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Several months ago, the BIR made a big splash about the filing of tax evasion charges against several medical practitioners who refused or failed to issue receipts to their paying patients.</span></p><div class="modal-body nofbia" data-dcnode-id="2911" data-word-count="938" id="article-new-featured"><div data-dcnode-id="2939" id="anf-lbl"><span data-dcnode-id="2940" instrument_node="">FEATURED STORIES</span></div><div data-dcnode-id="2930" id="anf-box"><span data-dcnode-id="2938" instrument_node="">
</span><div data-dcnode-id="2936" id="anf-cat"><span data-dcnode-id="2937" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2935" instrument_node="">
</span><div data-dcnode-id="2932" id="anf-head"><a class="af-clicks" data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346369/dominguez-new-us-led-owner-of-subic-shipyard-to-create-300-new-jobs-a-year/"><span data-dcnode-id="2934" instrument_node="">Dominguez: New US-led owner of Subic shipyard to create 300 new jobs a year</span></a></div><span data-dcnode-id="2931" instrument_node="">
</span></div><div data-dcnode-id="2921" id="anf-box"><span data-dcnode-id="2929" instrument_node="">
</span><div data-dcnode-id="2927" id="anf-cat"><span data-dcnode-id="2928" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2926" instrument_node="">
</span><div data-dcnode-id="2923" id="anf-head"><a class="af-clicks" data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346375/the-success-secret-of-corporate-giants-and-how-you-can-use-it-too/"><span data-dcnode-id="2925" instrument_node="">The success secret of corporate giants– and how you can use it, too</span></a></div><span data-dcnode-id="2922" instrument_node="">
</span></div><div data-dcnode-id="2912" id="anf-box"><span data-dcnode-id="2920" instrument_node="">
</span><div data-dcnode-id="2918" id="anf-cat"><span data-dcnode-id="2919" instrument_node="">BUSINESS</span></div><span data-dcnode-id="2917" instrument_node="">
</span><div data-dcnode-id="2914" id="anf-head"><a class="af-clicks" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.inquirer.net/346210/robinsons-land-transfers-p5-9b-ortigas-building-to-reit-firm/"><span data-dcnode-id="2916" instrument_node="">Robinsons Land transfers P5.9B Ortigas building to REIT firm</span></a></div><span data-dcnode-id="2913" instrument_node="">
</span></div></div><p data-dcnode-id="2910"></p><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">The “shame campaign” prompted the Philippine Medical Association to seek a dialogue with the BIR for the conduct of an information drive among its members to advise them on proper compliance with their tax responsibilities.</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Either the campaign was effective or the thought of being criminally prosecuted was unnerving, but a remarkable rise in compliance with the receipt requirement among medical professionals has been noted.</span></p><div class="ztoop" data-dcnode-id="2895"><span data-dcnode-id="2903" instrument_node="">
</span><div data-dcnode-id="2898" id="div-gpt-ad-pixel1"><span data-dcnode-id="2902" instrument_node="">
</span><span data-dcnode-id="2899" instrument_node="">
</span></div><div data-dcnode-id="2897" id="anyclip_2021"></div><span data-dcnode-id="2896" instrument_node="">
</span></div><p data-dcnode-id="2894"></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Why take the risk? The unassuming patient may be an undercover BIR agent.</span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2887"><strong data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Exemption</span></strong></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">The BIR, through Revenue Memorandum Circular No. 3-2012, has served notice that general professional partnerships are in its crosshairs.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">These partnerships are “formed by persons for the sole purpose of exercising their common professions, no part of the income of which is derived from engaging in any trade or business.”</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">This business arrangement is common among lawyers, accountants, architects and engineers. Their standard investment is their talent or skills, and they are generally paid based on the amount of time they spend in attending to their client’s needs and the end result of their work.</span></p><div data-dcnode-id="2864" id="billboard_article"><span data-dcnode-id="2877" instrument_node="">
</span><span data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">ADVERTISEMENT</span></span><span data-dcnode-id="2874" instrument_node="">
</span><div data-dcnode-id="2866" id="bb_box2"><span data-dcnode-id="2873" instrument_node="">
</span><div data-dcnode-id="2868" id="div-gpt-ad-mrec2"><span data-dcnode-id="2872" instrument_node="">
</span><span data-dcnode-id="2869" instrument_node="">
</span></div><span data-dcnode-id="2867" instrument_node="">
</span></div><span data-dcnode-id="2865" instrument_node="">
</span></div><p data-dcnode-id="2863"></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">The circular cited Sec. 26 of the National Internal Revenue Code which states that such partnerships are not subject to income tax for income earned in that capacity.</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">However, the people who comprise the partnership shall be liable for income tax in their separate and individual capacities. Meaning, as soon as the profits of the partnership are divided and remitted to them, they become liable for the income tax due for the money they received.</span></p><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">The partner concerned has to report “as gross income his distributive share, actually or constructively received, in the net income of the partnership.”</span></p><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">The “constructively received” income refers to money and other things of value the partner may have received from the partnership during the year, such as, transportation allowance, representation expenses, vacation privileges and other similar perks.</span></p><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2847"><strong data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Withholding </span></strong></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Consistent with the income tax exemption, the circular also stated that the rules on creditable withholding tax are not applicable to payments by third parties to the partnership.</span></p><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">To illustrate, when a company engages the services of a musical band to perform before its customers during its anniversary, the company is obliged to deduct a certain percentage from the band’s talent fee and remit it to the BIR as the band’s creditable tax withholding.</span></p><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">In turn, the balance of the talent fee received by the band has to be reported by the latter in its income tax return for the applicable year.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Through the company’s report on the creditable tax withheld, the BIR can later check whether or not the band accurately declared the talent fee it received from the company.</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2833" instrument_node="">If the figures submitted by the company and the band do not match, it means either one or both lied in their BIR reports. Whoever submitted the false information could find itself in serious legal trouble.</span><span data-dcnode-id="2831" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3470805887229135" data-ad-format="auto" data-ad-slot="8007816029" data-dcnode-id="2830" style="display:inline-block;min-width:300px;max-width:970px;margin-top:10px;width:100%;"></ins><span data-dcnode-id="2829" instrument_node="">
</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Considering the speed by which the BIR’s computers can seek out and compare the figures stored in its database, catching the party who failed to submit the correct data or otherwise fudged the numbers is a breeze, including the filing of tax evasion charges.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2819"><strong data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Reporting</span></strong></p><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">In criminal cases, verbal testimony stands weakly against documentary evidence. Besides, under existing rules, electronically generated documents, e.g., computer printouts are, after compliance with certain authentication requirements, acceptable pieces of evidence.</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">The exemption of general professional partnerships from income tax and creditable tax withholding does not, however, mean that the BIR simply relies on the honesty (ugh!) or patriotism (double ugh!) of the taxpayers who derive income from their participation in such business entities.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Lest its intended target may have forgotten, the circular reminded them that, as early as 1998, it has put in place a mechanism that creates a paper trail for the income they receive from their partnerships.</span></p><div class="lfform-inquirer lfform-inquirer-horizontal form_inline norelated" data-dcnode-id="2808" style="max-width:100%;"><span data-dcnode-id="2809" instrument_node=""> </span></div><p data-dcnode-id="2807"></p><span data-dcnode-id="2806" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">The BIR cited Revenue Regulations No. 2-98, as amended by Revenue Regulations No. 30-0, which provide that income payments made to the partners whether periodically or at the end of the taxable year, such as drawings, advances, sharings, allowances, stipends and the like, are subject to 15 percent creditable tax withholding if the payments for the current year exceed P720,000, and 10 percent if otherwise.</span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Two people could be held liable for violation of this rule—the partner who failed to accurately deduct, report and remit the tax withheld, and the partner who did not correctly declare the income he received.</span></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2799" instrument_node="">(For feedback, please write to </span><span data-dcnode-id="2798" instrument_node="">rpalabrica@inquirer.com.ph.</span><span data-dcnode-id="2797" instrument_node="">)</span></p><span data-dcnode-id="2795" instrument_node="">
