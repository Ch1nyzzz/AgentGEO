 post, we’ve compiled a list of the different types of tax breaks available to small businesses, with details on eligibility and how to claim for a deduction.</span></p><span data-dcnode-id="2573" instrument_node=""> </span><p data-dcnode-id="2572"></p><span data-dcnode-id="2571" instrument_node=""> </span><p data-dcnode-id="2570"></p><span data-dcnode-id="2569" instrument_node=""> </span><h2 data-dcnode-id="2567" id="table-of-contents"><span data-dcnode-id="2568" instrument_node="">Table of contents</span></h2><span data-dcnode-id="2566" instrument_node=""> </span><p data-dcnode-id="2565"></p><span data-dcnode-id="2564" instrument_node=""> </span><p data-dcnode-id="2563"></p><span data-dcnode-id="2562" instrument_node=""> </span><ul data-dcnode-id="2516"><span data-dcnode-id="2561" instrument_node=""> </span><li data-dcnode-id="2558"><a data-dcnode-id="2559" href="#what-is-a-tax-break"><span data-dcnode-id="2560" instrument_node="">What is a tax break?</span></a></li><span data-dcnode-id="2557" instrument_node=""> </span><li data-dcnode-id="2554"><a data-dcnode-id="2555" href="#small-business-rate-relief"><span data-dcnode-id="2556" instrument_node="">Small Business Rate Relief</span></a></li><span data-dcnode-id="2553" instrument_node=""> </span><li data-dcnode-id="2550"><a data-dcnode-id="2551" href="#charity-donations"><span data-dcnode-id="2552" instrument_node="">Charity donations</span></a></li><span data-dcnode-id="2549" instrument_node=""> </span><li data-dcnode-id="2546"><a data-dcnode-id="2547" href="#allowable-business-expenses"><span data-dcnode-id="2548" instrument_node="">Allowable business expenses</span></a></li><span data-dcnode-id="2545" instrument_node=""> </span><li data-dcnode-id="2542"><a data-dcnode-id="2543" href="#annual-investment-allowance"><span data-dcnode-id="2544" instrument_node="">Annual Investment Allowance</span></a></li><span data-dcnode-id="2541" instrument_node=""> </span><li data-dcnode-id="2538"><a data-dcnode-id="2539" href="#employment-allowance"><span data-dcnode-id="2540" instrument_node="">Employment Allowance</span></a></li><span data-dcnode-id="2537" instrument_node=""> </span><li data-dcnode-id="2534"><a data-dcnode-id="2535" href="#research-and-development-tax-relief"><span data-dcnode-id="2536" instrument_node="">Research and Development Tax Relief</span></a></li><span data-dcnode-id="2533" instrument_node=""> </span><li data-dcnode-id="2530"><a data-dcnode-id="2531" href="#the-patent-box-scheme"><span data-dcnode-id="2532" instrument_node="">The Patent Box Scheme</span></a></li><span data-dcnode-id="2529" instrument_node=""> </span><li data-dcnode-id="2526"><a data-dcnode-id="2527" href="#creative-industries-tax-reliefs"><span data-dcnode-id="2528" instrument_node="">Creative Industries Tax Relief</span></a></li><span data-dcnode-id="2525" instrument_node=""> </span><li data-dcnode-id="2522"><a data-dcnode-id="2523" href="#Expert-insights"><span data-dcnode-id="2524" instrument_node="">Expert insights</span></a></li><span data-dcnode-id="2521" instrument_node=""> </span><li data-dcnode-id="2518"><a data-dcnode-id="2519" href="#wrapping-up"><span data-dcnode-id="2520" instrument_node="">Wrapping up</span></a></li><span data-dcnode-id="2517" instrument_node=""> </span></ul><span data-dcnode-id="2515" instrument_node=""> </span><p data-dcnode-id="2514"></p><span data-dcnode-id="2513" instrument_node=""> </span><p data-dcnode-id="2512"></p><span data-dcnode-id="2511" instrument_node=""> </span><h2 data-dcnode-id="2509" id="what-is-a-tax-break"><span data-dcnode-id="2510" instrument_node="">What is a tax break?</span></h2><span data-dcnode-id="2508" instrument_node=""> </span><p data-dcnode-id="2507"></p><span data-dcnode-id="2506" instrument_node=""> </span><p data-dcnode-id="2505"></p><span data-dcnode-id="2504" instrument_node=""> </span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">A tax break, or tax relief, is a way for you to reduce your tax liability by taking into account things you spend money on or invest in for your business.</span></p><span data-dcnode-id="2501" instrument_node=""> </span><p data-dcnode-id="2500"></p><span data-dcnode-id="2499" instrument_node=""> </span><p data-dcnode-id="2498"></p><span data-dcnode-id="2497" instrument_node=""> </span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">It’s the Government’s way of helping to stimulate the economy by ensuring you have more money to spend on your business. It’s also a way to encourage positive behaviours, such as donating to charity and investing in innovation.&nbsp;</span></p><span data-dcnode-id="2494" instrument_node=""> </span><p data-dcnode-id="2493"></p><span data-dcnode-id="2492" instrument_node=""> </span><p data-dcnode-id="2491"></p><span data-dcnode-id="2490" instrument_node=""> </span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Taking advantage of tax breaks doesn’t mean avoiding tax, taking advantage of a loophole in the tax system, or paying less than you owe. You’ll still be contributing fully to the UK economy and paying the correct amount of tax. All it means is that you’re supported by certain schemes to boost your personal take-home pay and/or company balance sheet.</span></p><span data-dcnode-id="2487" instrument_node=""> </span><p data-dcnode-id="2486"></p><span data-dcnode-id="2485" instrument_node=""> </span><p data-dcnode-id="2484"></p><span data-dcnode-id="2483" instrument_node=""> </span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Some tax breaks are industry-specific. Others depend on your business structure and whether you’re a sole trader or limited company. Each tax break also comes with its own set of criteria that determine whether you’re eligible.</span></p><span data-dcnode-id="2480" instrument_node=""> </span><p data-dcnode-id="2479"></p><span data-dcnode-id="2478" instrument_node=""> </span><p data-dcnode-id="2477"></p><span data-dcnode-id="2476" instrument_node=""> </span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">We’ll cover eligibility as we break down each of the schemes available to small business owners. However, it’s always worth seeking professional help from a chartered accountant before pursuing any kind of tax break.&nbsp;</span></p><span data-dcnode-id="2473" instrument_node=""> </span><p data-dcnode-id="2472"></p><span data-dcnode-id="2471" instrument_node=""> </span><p data-dcnode-id="2470"></p><span data-dcnode-id="2469" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="2456"><strong data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Top Tip: </span></strong><span data-dcnode-id="2466" instrument_node="">If you don’t have an accountant for your business, it may be worth consulting with one when it comes to calculating your business tax. To learn more about how accountants can help to ease the complexities of filing your tax return, read our </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/small-business-accounting/%23calculate-tax" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2465" instrument_node="">complete guide to small business accounting</span></a><span data-dcnode-id="2463" instrument_node="">. If you do decide to move forward, it can be difficult to know where to start your search. To help, we’ve written an article on </span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/how-to-choose-an-accountant-for-your-small-business/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2462" instrument_node="">how to choose an accountant for your small business</span></a><span data-dcnode-id="2460" instrument_node=""> and a guide to </span><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/why-online-accountant-small-business/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2459" instrument_node="">how to find an online accountant for your small business</span></a><span data-dcnode-id="2457" instrument_node=""> 📌</span></p><span data-dcnode-id="2455" instrument_node=""> </span><p data-dcnode-id="2454"></p><span data-dcnode-id="2453" instrument_node=""> </span><p data-dcnode-id="2452"></p><span data-dcnode-id="2451" instrument_node=""> </span><div class="wp-block-image mobile-hide" data-dcnode-id="2445"><span data-dcnode-id="2450" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="2447"><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="2449" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30103509/Accounting-intergrations-Small-Banner-V2.png&amp;raw"></a></figure><span data-dcnode-id="2446" instrument_node=""> </span></div><span data-dcnode-id="2444" instrument_node=""> </span><p data-dcnode-id="2443"></p><span data-dcnode-id="2442" instrument_node=""> </span><p data-dcnode-id="2441"></p><span data-dcnode-id="2440" instrument_node=""> </span><div class="wp-block-image mobile-show" data-dcnode-id="2434"><span data-dcnode-id="2439" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="2436"><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="2438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30103519/Accounting-intergrations-Small-Banner-V2-Mobile.png&amp;raw"></a></figure><span data-dcnode-id="2435" instrument_node=""> </span></div><span data-dcnode-id="2433" instrument_node=""> </span><p data-dcnode-id="2432"></p><span data-dcnode-id="2431" instrument_node=""> </span><p data-dcnode-id="2430"></p><span data-dcnode-id="2429" instrument_node=""> </span><span data-dcnode-id="2426" instrument_node=""> </span><p data-dcnode-id="2425"></p><span data-dcnode-id="2424" instrument_node=""> </span><p data-dcnode-id="2423"></p><span data-dcnode-id="2422" instrument_node=""> </span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Here are eight tax breaks available to small and medium-sized enterprises (SMEs).</span></p><span data-dcnode-id="2419" instrument_node=""> </span><p data-dcnode-id="2418"></p><span data-dcnode-id="2417" instrument_node=""> </span><p data-dcnode-id="2416"></p><span data-dcnode-id="2415" instrument_node=""> </span><h2 data-dcnode-id="2413" id="small-business-rate-relief"><span data-dcnode-id="2414" instrument_node="">1. Small business rate relief</span></h2><span data-dcnode-id="2412" instrument_node=""> </span><p data-dcnode-id="2411"></p><span data-dcnode-id="2410" instrument_node=""> </span><p data-dcnode-id="2409"></p><span data-dcnode-id="2408" instrument_node=""> </span><p data-dcnode-id="2403"><span data-dcnode-id="2407" instrument_node="">Most businesses with their own premises get charged a ‘business rate’ by their local council for their non-domestic, or business, property. The </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/small-business-rate-relief%23%3A~%3Atext%3DYou%2520will%2520not%2520pay%2520business%2Cfrom%2520100%2525%2520to%25200%2525.%26text%3DIf%2520your%2520rateable%2520value%2520is%2Cget%252050%2525%2520off%2520your%2520bill." rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2406" instrument_node="">Small Business Rate Relief scheme (SBRR)</span></a><span data-dcnode-id="2404" instrument_node=""> was introduced by the Government in 2005 as a way to help ease the financial burden on small businesses with their own premises.&nbsp;</span></p><span data-dcnode-id="2402" instrument_node=""> </span><p data-dcnode-id="2401"></p><span data-dcnode-id="2400" instrument_node=""> </span><p data-dcnode-id="2399"></p><span data-dcnode-id="2398" instrument_node=""> </span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">You’re entitled to SBRR if you have:</span></p><span data-dcnode-id="2395" instrument_node=""> </span><p data-dcnode-id="2394"></p><span data-dcnode-id="2393" instrument_node=""> </span><p data-dcnode-id="2392"></p><span data-dcnode-id="2391" instrument_node=""> </span><ul data-dcnode-id="2383"><span data-dcnode-id="2390" instrument_node=""> </span><li data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">One property with a rateable value of less than £15,000; or</span></li><span data-dcnode-id="2387" instrument_node=""> </span><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">One main property and other additional properties, providing they have rateable values of less than £2,900 and the total rateable value of all properties is under £20,000.</span></li><span data-dcnode-id="2384" instrument_node=""> </span></ul><span data-dcnode-id="2382" instrument_node=""> </span><p data-dcnode-id="2381"></p><span data-dcnode-id="2380" instrument_node=""> </span><p data-dcnode-id="2379"></p><span data-dcnode-id="2378" instrument_node=""> </span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">If your property has a rateable value above those thresholds but below £51,000 you may still be entitled to rate relief. However, your bill will be calculated using the small business multiplier. This is currently 49.1p, lower than the 50.4p standard multiplier used to work out relief for properties under £15,000. So tax relief won’t be as generous.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="2375" instrument_node=""> </span><p data-dcnode-id="2374"></p><span data-dcnode-id="2373" instrument_node=""> </span><p data-dcnode-id="2372"></p><span data-dcnode-id="2371" instrument_node=""> </span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">How much tax relief you’re entitled to depends on the rateable value of your property. Relief is tapered from 100% to 0% on rateable values between £12,001 and £15,000.</span></p><span data-dcnode-id="2368" instrument_node=""> </span><p data-dcnode-id="2367"></p><span data-dcnode-id="2366" instrument_node=""> </span><p data-dcnode-id="2365"></p><span data-dcnode-id="2364" instrument_node=""> </span><p data-dcnode-id="2356"><span data-dcnode-id="2363" instrument_node="">You won’t be entitled to SBRR if your business receives </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/rural-rate-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2362" instrument_node="">Mandatory Rural Rate Relief</span></a><span data-dcnode-id="2360" instrument_node=""> or </span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/charitable-rate-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2359" instrument_node="">Mandatory Charitable Relief</span></a><span data-dcnode-id="2357" instrument_node="">. These are separate schemes available for businesses in rural areas with a population under 3,000, and businesses who use their property for charitable purposes respectively.&nbsp;</span></p><span data-dcnode-id="2355" instrument_node=""> </span><p data-dcnode-id="2354"></p><span data-dcnode-id="2353" instrument_node=""> </span><p data-dcnode-id="2352"></p><span data-dcnode-id="2351" instrument_node=""> </span><h3 data-dcnode-id="2349" id="applying-for-small-business-rates-relief"><span data-dcnode-id="2350" instrument_node="">Applying for Small Business Rates Relief</span></h3><span data-dcnode-id="2348" instrument_node=""> </span><p data-dcnode-id="2347"></p><span data-dcnode-id="2346" instrument_node=""> </span><p data-dcnode-id="2345"></p><span data-dcnode-id="2344" instrument_node=""> </span><p data-dcnode-id="2339"><span data-dcnode-id="2343" instrument_node="">To check if you’re eligible and apply for SBRR, you’ll need to </span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/contact-your-local-council-about-business-rates" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2342" instrument_node="">contact your local council</span></a><span data-dcnode-id="2340" instrument_node=""> and complete a rate relief application form.&nbsp;</span></p><span data-dcnode-id="2338" instrument_node=""> </span><p data-dcnode-id="2337"></p><span data-dcnode-id="2336" instrument_node=""> </span><p data-dcnode-id="2335"></p><span data-dcnode-id="2334" instrument_node=""> </span><p data-dcnode-id="2326"><span data-dcnode-id="2333" instrument_node="">Your council also automatically applies </span><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/exempted-buildings-and-empty-buildings-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2332" instrument_node="">exempted and empty buildings relief</span></a><span data-dcnode-id="2330" instrument_node=""> for certain properties, such as agricultural lands and buildings, places of worship and buildings used for the training or welfare of disabled people. You’ll also receive </span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/transitional-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2329" instrument_node="">transitional relief</span></a><span data-dcnode-id="2327" instrument_node=""> if your rates change at revaluation.&nbsp;</span></p><span data-dcnode-id="2325" instrument_node=""> </span><p data-dcnode-id="2324"></p><span data-dcnode-id="2323" instrument_node=""> </span><p data-dcnode-id="2322"></p><span data-dcnode-id="2321" instrument_node=""> </span><p data-dcnode-id="2307"><span data-dcnode-id="2320" instrument_node="">While the premise is the same, business rates are handled slightly differently in </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2319" instrument_node="">England</span></a><span data-dcnode-id="2317" instrument_node="">, </span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mygov.scot/business-rates-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2316" instrument_node="">Scotland</span></a><span data-dcnode-id="2314" instrument_node="">, </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//businesswales.gov.wales/business-rates-wales" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2313" instrument_node="">Wales</span></a><span data-dcnode-id="2311" instrument_node=""> and </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nibusinessinfo.co.uk/content/help-available-business-rates" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2310" instrument_node="">Northern Ireland</span></a><span data-dcnode-id="2308" instrument_node=""> so be sure to check the website of your specific government.</span></p><span data-dcnode-id="2306" instrument_node=""> </span><p data-dcnode-id="2305"></p><span data-dcnode-id="2304" instrument_node=""> </span><p data-dcnode-id="2303"></p><span data-dcnode-id="2302" instrument_node=""> </span><h3 data-dcnode-id="2300" id="additional-business-rates-relief"><span data-dcnode-id="2301" instrument_node="">Additional business rates relief</span></h3><span data-dcnode-id="2299" instrument_node=""> </span><p data-dcnode-id="2298"></p><span data-dcnode-id="2297" instrument_node=""> </span><p data-dcnode-id="2296"></p><span data-dcnode-id="2295" instrument_node=""> </span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">As well as small business rates relief, the Government offers several other schemes including:</span></p><span data-dcnode-id="2292" instrument_node=""> </span><p data-dcnode-id="2291"></p><span data-dcnode-id="2290" instrument_node=""> </span><p data-dcnode-id="2289"></p><span data-dcnode-id="2288" instrument_node=""> </span><ul data-dcnode-id="2262"><span data-dcnode-id="2287" instrument_node=""> </span><li data-dcnode-id="2282"><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/enterprise-zones" rel="nofollow noreferrer noopener" target="_blank"><strong data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Enterprise zone relief</span></strong></a><span data-dcnode-id="2283" instrument_node=""> for businesses starting or relocating to a local enterprise zone</span></li><span data-dcnode-id="2281" instrument_node=""> </span><li data-dcnode-id="2276"><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/hardship-relief" rel="nofollow noreferrer noopener" target="_blank"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Hardship relief</span></strong></a><span data-dcnode-id="2277" instrument_node=""> for businesses in financial difficulty&nbsp;&nbsp;</span></li><span data-dcnode-id="2275" instrument_node=""> </span><li data-dcnode-id="2270"><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/retail-discount" rel="nofollow noreferrer noopener" target="_blank"><strong data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Retail discount</span></strong></a><span data-dcnode-id="2271" instrument_node=""> for shops, restaurants, cafes, bars, pubs, cinemas, music venues and hospitality or leisure businesses&nbsp;</span></li><span data-dcnode-id="2269" instrument_node=""> </span><li data-dcnode-id="2264"><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/local-newspaper-relief" rel="nofollow noreferrer noopener" target="_blank"><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Local newspaper relief</span></strong></a><span data-dcnode-id="2265" instrument_node=""> for property used as office premises by journalists and reporters on a local newspaper</span></li><span data-dcnode-id="2263" instrument_node=""> </span></ul><span data-dcnode-id="2261" instrument_node=""> </span><p data-dcnode-id="2260"></p><span data-dcnode-id="2259" instrument_node=""> </span><p data-dcnode-id="2258"></p><span data-dcnode-id="2257" instrument_node=""> </span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">If your business falls into any of these categories, contact your local council to find out if you’re eligible for tax relief.</span></p><span data-dcnode-id="2254" instrument_node=""> </span><p data-dcnode-id="2253"></p><span data-dcnode-id="2252" instrument_node=""> </span><p data-dcnode-id="2251"></p><span data-dcnode-id="2250" instrument_node=""> </span><h3 data-dcnode-id="2248" id="business-rates-relief-and-covid-19"><span data-dcnode-id="2249" instrument_node="">Business rates relief and Covid-19</span></h3><span data-dcnode-id="2247" instrument_node=""> </span><p data-dcnode-id="2246"></p><span data-dcnode-id="2245" instrument_node=""> </span><p data-dcnode-id="2244"></p><span data-dcnode-id="2243" instrument_node=""> </span><p data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">To help </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/eligibility-checker/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2241" instrument_node="">businesses impacted by the coronavirus pandemic</span></a><span data-dcnode-id="2239" instrument_node="">, the Government has paused business rates for certain sectors.</span></p><span data-dcnode-id="2237" instrument_node=""> </span><p data-dcnode-id="2236"></p><span data-dcnode-id="2235" instrument_node=""> </span><p data-dcnode-id="2234"></p><span data-dcnode-id="2233" instrument_node=""> </span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">If your business operates in the retail, hospitality or leisure sectors in England, you won’t pay business rates for the 2020-2021 tax year. This change should have been applied automatically on your April 2020 council tax bill.</span></p><span data-dcnode-id="2230" instrument_node=""> </span><p data-dcnode-id="2229"></p><span data-dcnode-id="2228" instrument_node=""> </span><p data-dcnode-id="2227"></p><span data-dcnode-id="2226" instrument_node=""> </span><p data-dcnode-id="2215"><span data-dcnode-id="2225" instrument_node="">The details of Covid-19 related rates relief schemes are different for </span><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findbusinesssupport.gov.scot/coronavirus-advice/business-rates-and-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2224" instrument_node="">Scotland</span></a><span data-dcnode-id="2222" instrument_node="">, </span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//businesswales.gov.wales/business-rates-wales" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2221" instrument_node="">Wales</span></a><span data-dcnode-id="2219" instrument_node=""> and </span><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nibusinessinfo.co.uk/content/covid-19-emergency-rates-package-businesses" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2218" instrument_node="">Northern Ireland</span></a><span data-dcnode-id="2216" instrument_node="">.</span></p><span data-dcnode-id="2214" instrument_node=""> </span><p data-dcnode-id="2213"></p><span data-dcnode-id="2212" instrument_node=""> </span><p data-dcnode-id="2211"></p><span data-dcnode-id="2210" instrument_node=""> </span><p data-dcnode-id="2205"><span data-dcnode-id="2209" instrument_node="">Find additional information on the Small Business Rate Relief Scheme at the </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/apply-for-business-rate-relief/small-business-rate-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2208" instrument_node="">GOV.UK website.</span></a><span data-dcnode-id="2206" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2204" instrument_node=""> </span><p data-dcnode-id="2203"></p><span data-dcnode-id="2202" instrument_node=""> </span><p data-dcnode-id="2201"></p><span data-dcnode-id="2200" instrument_node=""> </span><h2 data-dcnode-id="2198" id="charity-donations"><span data-dcnode-id="2199" instrument_node="">2. Charity donations</span></h2><span data-dcnode-id="2197" instrument_node=""> </span><p data-dcnode-id="2196"></p><span data-dcnode-id="2195" instrument_node=""> </span><p data-dcnode-id="2194"></p><span data-dcnode-id="2193" instrument_node=""> </span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Donations to charities from individuals in the UK are tax-free. If a charity or Community Amateur Sports Club (CASC) is registered for Gift Aid, they are able to claim the basic rate of tax that donors have paid from HMRC.&nbsp;</span></p><span data-dcnode-id="2190" instrument_node=""> </span><p data-dcnode-id="2189"></p><span data-dcnode-id="2188" instrument_node=""> </span><p data-dcnode-id="2187"></p><span data-dcnode-id="2186" instrument_node=""> </span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">This means a charity or sports club will get an extra 25p for every £1 you donate and it won’t cost you extra.&nbsp;</span></p><span data-dcnode-id="2183" instrument_node=""> </span><p data-dcnode-id="2182"></p><span data-dcnode-id="2181" instrument_node=""> </span><p data-dcnode-id="2180"></p><span data-dcnode-id="2179" instrument_node=""> </span><p data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">It’s a scheme that works well — </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/collections/charitable-donations-and-tax-reliefs-statistics" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2177" instrument_node="">£1.4bn in Gift Aid was claimed by Charities in 2019-20</span></a><span data-dcnode-id="2175" instrument_node=""> and £1.35bn in 2018-19.&nbsp;</span></p><span data-dcnode-id="2173" instrument_node=""> </span><p data-dcnode-id="2172"></p><span data-dcnode-id="2171" instrument_node=""> </span><p data-dcnode-id="2170"></p><span data-dcnode-id="2169" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="2162"><strong data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Top Tip: </span></strong><span data-dcnode-id="2166" instrument_node="">It’s also important to take VAT into account when it comes to tax and charities. Note that if you are not a charity, you alone are responsible for double-checking that the charity is eligible for reduced VAT rates. To learn more about VAT exemption, read our guide to </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/vat-exemption/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2165" instrument_node="">what VAT exemption is (and who it applies to)</span></a><span data-dcnode-id="2163" instrument_node="">💡</span></p><span data-dcnode-id="2161" instrument_node=""> </span><p data-dcnode-id="2160"></p><span data-dcnode-id="2159" instrument_node=""> </span><p data-dcnode-id="2158"></p><span data-dcnode-id="2157" instrument_node=""> </span><h3 data-dcnode-id="2155" id="claiming-tax-relief-for-charity-donations"><span data-dcnode-id="2156" instrument_node="">Claiming tax relief for charity donations&nbsp;&nbsp;</span></h3><span data-dcnode-id="2154" instrument_node=""> </span><p data-dcnode-id="2153"></p><span data-dcnode-id="2152" instrument_node=""> </span><p data-dcnode-id="2151"></p><span data-dcnode-id="2150" instrument_node=""> </span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">If you’re registered for Self Assessment and pay income tax above the 20% basic rate, you can claim the difference between the tax you’ve paid on any donations made through Gift Aid and what the charity got back when you complete your Self Assessment tax return.</span></p><span data-dcnode-id="2147" instrument_node=""> </span><p data-dcnode-id="2146"></p><span data-dcnode-id="2145" instrument_node=""> </span><p data-dcnode-id="2144"></p><span data-dcnode-id="2143" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="2133"><strong data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Top Tip: </span></strong><span data-dcnode-id="2140" instrument_node="">If you’re self-employed or have income streams in addition to your wages from employment, you may need to complete a Self Assessment tax return. To figure out if Self Assessment applies to you and how to register, complete and pay your Self Assessment tax bill,</span><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node=""> </span></strong><span data-dcnode-id="2137" instrument_node="">read our </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/self-assessment-tax-return/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2136" instrument_node="">complete guide to everything you need to know about Self Assessment tax returns</span></a><span data-dcnode-id="2134" instrument_node=""> ✅</span></p><span data-dcnode-id="2132" instrument_node=""> </span><p data-dcnode-id="2131"></p><span data-dcnode-id="2130" instrument_node=""> </span><p data-dcnode-id="2129"></p><span data-dcnode-id="2128" instrument_node=""> </span><p data-dcnode-id="2123"><span data-dcnode-id="2127" instrument_node="">If you claim </span><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/marriage-allowance" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2126" instrument_node="">Marriage Allowance</span></a><span data-dcnode-id="2124" instrument_node="">, your tax-free allowance may increase to account for donations made through Gift Aid. This will be done automatically when you complete your annual Self Assessment tax return.</span></p><span data-dcnode-id="2122" instrument_node=""> </span><p data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">If you’ve made a donation as a company, deductions are deductible from your total profits, as explained by </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charitytaxgroup.org.uk/tax/donations/gift-aid/corporate-gift-aid/%23%3A~%3Atext%3DCompanies%2520are%2520entitled%2520to%2520tax%2Cwhich%2520the%2520donations%2520are%2520made." rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2120" instrument_node="">Charity Tax Group</span></a><span data-dcnode-id="2118" instrument_node="">:</span></p><span data-dcnode-id="2116" instrument_node=""> </span><p data-dcnode-id="2115"></p><span data-dcnode-id="2114" instrument_node=""> </span><p data-dcnode-id="2113"></p><span data-dcnode-id="2112" instrument_node=""> </span><p data-dcnode-id="2109"><em data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">“Companies are entitled to tax relief for qualifying charitable donations made to charities. The donations are paid gross without the deduction of income tax. The donations are deductible from the company’s total profits in the year in which the donations are made. The amount of the deduction is limited to the amount that reduces the company’s total taxable profits to nil: the payment of a charitable donation cannot create or augment a company’s loss for tax purposes. This means that charities do not reclaim tax from HMRC in respect of company donations.”</span></em></p><span data-dcnode-id="2108" instrument_node=""> </span><p data-dcnode-id="2107"></p><span data-dcnode-id="2106" instrument_node=""> </span><p data-dcnode-id="2105"></p><span data-dcnode-id="2104" instrument_node=""> </span><p data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node="">Find additional information on charity donations tax relief at the </span><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/income-tax-reliefs/charity-donations-tax-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2102" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="2100" instrument_node="">.</span></p><span data-dcnode-id="2098" instrument_node=""> </span><p data-dcnode-id="2097"></p><span data-dcnode-id="2096" instrument_node=""> </span><p data-dcnode-id="2095"></p><span data-dcnode-id="2094" instrument_node=""> </span><h2 data-dcnode-id="2092" id="allowable-business-expenses"><span data-dcnode-id="2093" instrument_node="">3. Allowable business expenses</span></h2><span data-dcnode-id="2091" instrument_node=""> </span><p data-dcnode-id="2090"></p><span data-dcnode-id="2089" instrument_node=""> </span><p data-dcnode-id="2088"></p><span data-dcnode-id="2087" instrument_node=""> </span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Regardless of size or sector, every small business incurs running costs, or money spent to keep your business ticking over and competitive.</span></p><span data-dcnode-id="2084" instrument_node=""> </span><p data-dcnode-id="2083"></p><span data-dcnode-id="2082" instrument_node=""> </span><p data-dcnode-id="2081"></p><span data-dcnode-id="2080" instrument_node=""> </span><p data-dcnode-id="2075"><span data-dcnode-id="2079" instrument_node="">Allowable business </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/expenses/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2078" instrument_node="">expenses</span></a><span data-dcnode-id="2076" instrument_node=""> are designed to help you manage some of these running costs by deducting the expense from your taxable income or profits.</span></p><span data-dcnode-id="2074" instrument_node=""> </span><p data-dcnode-id="2073"></p><span data-dcnode-id="2072" instrument_node=""> </span><p data-dcnode-id="2071"></p><span data-dcnode-id="2070" instrument_node=""> </span><p data-dcnode-id="2065"><span data-dcnode-id="2069" instrument_node="">To use </span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/expenses-if-youre-self-employed" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="2068" instrument_node="">GOV.UK’s</span></a><span data-dcnode-id="2066" instrument_node=""> example:</span></p><span data-dcnode-id="2064" instrument_node=""> </span><p data-dcnode-id="2063"></p><span data-dcnode-id="2062" instrument_node=""> </span><p data-dcnode-id="2061"></p><span data-dcnode-id="2060" instrument_node=""> </span><p data-dcnode-id="2057"><em data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">‘Your turnover is £40,000, and you claim £10,000 in allowable expenses. You only pay tax on the remaining £30,000 – known as your taxable profit.’</span></em></p><span data-dcnode-id="2056" instrument_node=""> </span><p data-dcnode-id="2055"></p><span data-dcnode-id="2054" instrument_node=""> </span><p data-dcnode-id="2053"></p><span data-dcnode-id="2052" instrument_node=""> </span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Allowable expenses include:</span></p><span data-dcnode-id="2049" instrument_node=""> </span><p data-dcnode-id="2048"></p><span data-dcnode-id="2047" instrument_node=""> </span><p data-dcnode-id="2046"></p><span data-dcnode-id="2045" instrument_node=""> </span><ul data-dcnode-id="2033"><span data-dcnode-id="2044" instrument_node=""> </span><li data-dcnode-id="2040"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Office costs (including business premises costs)</span></strong><span data-dcnode-id="2041" instrument_node="">. Items you’d typically use for less than two years, such as stationery, software and printer ink, as well as rent, rates, power and insurance costs.&nbsp;</span></li><span data-dcnode-id="2039" instrument_node=""> </span><li data-dcnode-id="2035"><strong data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Travel costs.</span></strong><span data-dcnode-id="2036" instrument_node=""> Business car or van and travel expenses, including fuel, hire charges, breakdown cover, insurance, transport fares and hotel stays.&nbsp;</span></li><span data-dcnode-id="2034" instrument_node=""> </span></ul><span data-dcnode-id="2032" instrument_node=""> </span><p data-dcnode-id="2031"></p><span data-dcnode-id="2030" instrument_node=""> </span><p data-dcnode-id="2029"></p><span data-dcnode-id="2028" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="2018"><strong data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Top Tip:</span></strong><span data-dcnode-id="2025" instrument_node=""> Business travel can be difficult for any company to manage. The key is to find the sweet spot between oversight and autonomy, and the best way to do that is to create a comprehensive </span><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/company-expense-policy/"><span data-dcnode-id="2024" instrument_node="">expenses policy</span></a><span data-dcnode-id="2022" instrument_node=""> that your team has easy access to. To learn more about how to establish fair corporate travel management policies, read our </span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/corporate-travel-management/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2021" instrument_node="">guide to corporate travel management</span></a><span data-dcnode-id="2019" instrument_node=""> ✈️</span></p><span data-dcnode-id="2017" instrument_node=""> </span><p data-dcnode-id="2016"></p><span data-dcnode-id="2015" instrument_node=""> </span><p data-dcnode-id="2014"></p><span data-dcnode-id="2013" instrument_node=""> </span><ul data-dcnode-id="1981"><span data-dcnode-id="2012" instrument_node=""> </span><li data-dcnode-id="2008"><strong data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Clothing.</span></strong><span data-dcnode-id="2009" instrument_node=""> Uniforms and protective clothing needed for work.</span></li><span data-dcnode-id="2007" instrument_node=""> </span><li data-dcnode-id="2003"><strong data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Staff.</span></strong><span data-dcnode-id="2004" instrument_node=""> Employee salaries, bonuses, pensions, benefits, training courses, subcontractor pay and agency fees.</span></li><span data-dcnode-id="2002" instrument_node=""> </span><li data-dcnode-id="1998"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Financial costs.</span></strong><span data-dcnode-id="1999" instrument_node=""> Professional indemnity insurance premiums and hiring of accountants, solicitors, surveyors and architects.</span></li><span data-dcnode-id="1997" instrument_node=""> </span><li data-dcnode-id="1993"><strong data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Things you buy to sell on.</span></strong><span data-dcnode-id="1994" instrument_node=""> Raw materials, stock and costs associated with production.</span></li><span data-dcnode-id="1992" instrument_node=""> </span><li data-dcnode-id="1988"><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Advertising and marketing.</span></strong><span data-dcnode-id="1989" instrument_node=""> Website costs, direct mail advertising, newspaper or directory advertising and free samples.</span></li><span data-dcnode-id="1987" instrument_node=""> </span><li data-dcnode-id="1983"><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Training courses.</span></strong><span data-dcnode-id="1984" instrument_node=""> Training such as a qualification or refresher course that helps you improve your skills and knowledge for the benefit of your business.&nbsp;</span></li><span data-dcnode-id="1982" instrument_node=""> </span></ul><span data-dcnode-id="1980" instrument_node=""> </span><p data-dcnode-id="1979"></p><span data-dcnode-id="1978" instrument_node=""> </span><p data-dcnode-id="1977"></p><span data-dcnode-id="1976" instrument_node=""> </span><div class="wp-block-image mobile-hide" data-dcnode-id="1970"><span data-dcnode-id="1975" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1972"><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="1974" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30121751/Accounting-intergrations-Large-Banner-V1.png&amp;raw"></a></figure><span data-dcnode-id="1971" instrument_node=""> </span></div><span data-dcnode-id="1969" instrument_node=""> </span><p data-dcnode-id="1968"></p><span data-dcnode-id="1967" instrument_node=""> </span><p data-dcnode-id="1966"></p><span data-dcnode-id="1965" instrument_node=""> </span><div class="wp-block-image mobile-show" data-dcnode-id="1959"><span data-dcnode-id="1964" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1961"><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="1963" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30103510/Accounting-intergrations-Large-Banner-V1-Mobile.png&amp;raw"></a></figure><span data-dcnode-id="1960" instrument_node=""> </span></div><span data-dcnode-id="1958" instrument_node=""> </span><p data-dcnode-id="1957"></p><span data-dcnode-id="1956" instrument_node=""> </span><p data-dcnode-id="1955"></p><span data-dcnode-id="1954" instrument_node=""> </span><h3 data-dcnode-id="1952" id="claiming-tax-relief-for-allowable-expenses"><span data-dcnode-id="1953" instrument_node="">Claiming tax relief for Allowable expenses</span></h3><span data-dcnode-id="1951" instrument_node=""> </span><p data-dcnode-id="1950"></p><span data-dcnode-id="1949" instrument_node=""> </span><p data-dcnode-id="1948"></p><span data-dcnode-id="1947" instrument_node=""> </span><p data-dcnode-id="1939"><span data-dcnode-id="1946" instrument_node="">If you’re self-employed, allowable expenses can be listed on your Self Assessment tax return. The amount claimed will automatically be deducted from your taxable income, but you need to keep an accurate record of purchases for up to six years. You can do this by using Tide’s </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/features/company-expense-cards/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1945" instrument_node="">expenses management tools</span></a><span data-dcnode-id="1943" instrument_node=""> or through our </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/spreadsheets/d/11UyjezvVjr4LUbZn73BSNBNpEl0S06OfTNPFqIecHwU/edit%3Fusp%3Dsharing" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1942" instrument_node="">free online expense spreadsheet template</span></a><span data-dcnode-id="1940" instrument_node="">.</span></p><span data-dcnode-id="1938" instrument_node=""> </span><p data-dcnode-id="1937"></p><span data-dcnode-id="1936" instrument_node=""> </span><p data-dcnode-id="1935"></p><span data-dcnode-id="1934" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1931"><img alt="Screenshot of the Tide expense sheet template" class="wp-image-32084" data-dcnode-id="1932" height="655" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/20162235/Tide-expense-sheet-screenshot-1024x655.png&amp;raw" srcset="https://web.uploads.tide.co/2020/10/20162235/Tide-expense-sheet-screenshot-1024x655.png 1024w, https://web.uploads.tide.co/2020/10/20162235/Tide-expense-sheet-screenshot-300x192.png 300w, https://web.uploads.tide.co/2020/10/20162235/Tide-expense-sheet-screenshot-768x491.png 768w, https://web.uploads.tide.co/2020/10/20162235/Tide-expense-sheet-screenshot.png 1600w" width="1024"></figure><span data-dcnode-id="1930" instrument_node=""> </span></div><span data-dcnode-id="1928" instrument_node=""> </span><p data-dcnode-id="1927"></p><span data-dcnode-id="1926" instrument_node=""> </span><p data-dcnode-id="1925"></p><span data-dcnode-id="1924" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="1917"><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Top Tip: </span></strong><span data-dcnode-id="1921" instrument_node="">Keeping track of expenses matters when it comes to paying tax, but it also helps you to save money, cut down on unnecessary costs and improve your business’s financial health in the long run. To learn more about how to efficiently manage and track your business expenses, read our guide on </span><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/how-to-keep-track-of-expenses/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1920" instrument_node="">how to keep track of expenses</span></a><span data-dcnode-id="1918" instrument_node=""> 💯</span></p><span data-dcnode-id="1916" instrument_node=""> </span><p data-dcnode-id="1915"></p><span data-dcnode-id="1914" instrument_node=""> </span><p data-dcnode-id="1913"></p><span data-dcnode-id="1912" instrument_node=""> </span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">If you’re a subcontractor and have already paid tax during the year, allowable expenses will be repaid in the form of a tax refund.</span></p><span data-dcnode-id="1909" instrument_node=""> </span><p data-dcnode-id="1908"></p><span data-dcnode-id="1907" instrument_node=""> </span><p data-dcnode-id="1906"></p><span data-dcnode-id="1905" instrument_node=""> </span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">There are some exemptions to keep in mind, though:&nbsp;</span></p><span data-dcnode-id="1902" instrument_node=""> </span><p data-dcnode-id="1901"></p><span data-dcnode-id="1900" instrument_node=""> </span><p data-dcnode-id="1899"></p><span data-dcnode-id="1898" instrument_node=""> </span><ul data-dcnode-id="1882"><span data-dcnode-id="1897" instrument_node=""> </span><li data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">If you use your </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/tax-free-allowances-on-property-and-trading-income" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1895" instrument_node="">£1,000 tax-free trading allowance</span></a><span data-dcnode-id="1893" instrument_node=""> for property or trading income, you won’t be able to claim allowable expenses.</span></li><span data-dcnode-id="1891" instrument_node=""> </span><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Allowable expenses don’t include money taken from your business to pay for a private purchase (you have to have personally paid for it).</span></li><span data-dcnode-id="1888" instrument_node=""> </span><li data-dcnode-id="1884"><span data-dcnode-id="1887" instrument_node="">If you use something for both work and personal use you can only claim allowable expenses for the business costs. To use another GOV.UK example: </span><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">‘Your mobile phone bills for the year total £200. Of this, you spend £130 on personal calls and £70 on business. You can claim for £70 of business expenses.’.</span></em></li><span data-dcnode-id="1883" instrument_node=""> </span></ul><span data-dcnode-id="1881" instrument_node=""> </span><p data-dcnode-id="1880"></p><span data-dcnode-id="1879" instrument_node=""> </span><p data-dcnode-id="1878"></p><span data-dcnode-id="1877" instrument_node=""> </span><p data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">If you run your own limited company, expenses can be deducted from profits before tax. This is fairly straightforward to do and involves reporting any business item you use personally as a </span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/employer-reporting-expenses-benefits" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1875" instrument_node="">company benefit</span></a><span data-dcnode-id="1873" instrument_node="">.</span></p><span data-dcnode-id="1871" instrument_node=""> </span><p data-dcnode-id="1870"></p><span data-dcnode-id="1869" instrument_node=""> </span><p data-dcnode-id="1868"></p><span data-dcnode-id="1867" instrument_node=""> </span><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">Find additional information on allowable business expenses at the </span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/expenses-if-youre-self-employed" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1865" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="1863" instrument_node="">.</span></p><span data-dcnode-id="1861" instrument_node=""> </span><p data-dcnode-id="1860"></p><span data-dcnode-id="1859" instrument_node=""> </span><p data-dcnode-id="1858"></p><span data-dcnode-id="1857" instrument_node=""> </span><h2 data-dcnode-id="1855" id="annual-investment-allowance"><span data-dcnode-id="1856" instrument_node="">4. Annual Investment Allowance (AIA)</span></h2><span data-dcnode-id="1854" instrument_node=""> </span><p data-dcnode-id="1853"></p><span data-dcnode-id="1852" instrument_node=""> </span><p data-dcnode-id="1851"></p><span data-dcnode-id="1850" instrument_node=""> </span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Where allowable expenses allow you to get a tax break on the costs incurred by everyday running costs, Annual Investment Allowance (AIA) gives you tax relief on large purchases of things you buy to keep and use in your business.&nbsp;</span></p><span data-dcnode-id="1847" instrument_node=""> </span><p data-dcnode-id="1846"></p><span data-dcnode-id="1845" instrument_node=""> </span><p data-dcnode-id="1844"></p><span data-dcnode-id="1843" instrument_node=""> </span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Items that qualify for AIA include most ‘plant and machinery’ up to a certain amount. Until 31 December 2020, this amount is £1 million but this changes, often significantly, year-on-year, so you should research allowances when planning for any major purchase.</span></p><span data-dcnode-id="1840" instrument_node=""> </span><p data-dcnode-id="1839"></p><span data-dcnode-id="1838" instrument_node=""> </span><p data-dcnode-id="1837"></p><span data-dcnode-id="1836" instrument_node=""> </span><p data-dcnode-id="1831"><span data-dcnode-id="1835" instrument_node="">According to </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/capital-allowances/what-you-can-claim-on" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1834" instrument_node="">GOV.UK</span></a><span data-dcnode-id="1832" instrument_node="">, plant and machinery includes:</span></p><span data-dcnode-id="1830" instrument_node=""> </span><p data-dcnode-id="1829"></p><span data-dcnode-id="1828" instrument_node=""> </span><p data-dcnode-id="1827"></p><span data-dcnode-id="1826" instrument_node=""> </span><ul data-dcnode-id="1809"><span data-dcnode-id="1825" instrument_node=""> </span><li data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Items that you keep to use in your business, including cars</span></li><span data-dcnode-id="1822" instrument_node=""> </span><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Costs of demolishing plant and machinery</span></li><span data-dcnode-id="1819" instrument_node=""> </span><li data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Parts of a building considered integral, known as ‘integral features’</span></li><span data-dcnode-id="1816" instrument_node=""> </span><li data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Some fixtures, for example fitted kitchens or bathroom suites</span></li><span data-dcnode-id="1813" instrument_node=""> </span><li data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Alterations to a building to install other plant and machinery (this does not include repairs)</span></li><span data-dcnode-id="1810" instrument_node=""> </span></ul><span data-dcnode-id="1808" instrument_node=""> </span><p data-dcnode-id="1807"></p><span data-dcnode-id="1806" instrument_node=""> </span><p data-dcnode-id="1805"></p><span data-dcnode-id="1804" instrument_node=""> </span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">You cannot claim capital allowances on things you lease, buildings, land and structures or items used only for entertainment (e.g. a yacht or karaoke machine). Cars, items you owned for another reason before starting your business and items given to your business are also exempt from AIA.</span></p><span data-dcnode-id="1801" instrument_node=""> </span><p data-dcnode-id="1800"></p><span data-dcnode-id="1799" instrument_node=""> </span><p data-dcnode-id="1798"></p><span data-dcnode-id="1797" instrument_node=""> </span><h3 data-dcnode-id="1795" id="claiming-annual-investment-allowance"><span data-dcnode-id="1796" instrument_node="">Claiming Annual Investment Allowance</span></h3><span data-dcnode-id="1794" instrument_node=""> </span><p data-dcnode-id="1793"></p><span data-dcnode-id="1792" instrument_node=""> </span><p data-dcnode-id="1791"></p><span data-dcnode-id="1790" instrument_node=""> </span><p data-dcnode-id="1785"><span data-dcnode-id="1789" instrument_node="">You can claim AIA on your </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/company-tax-returns" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1788" instrument_node="">Company Tax Return</span></a><span data-dcnode-id="1786" instrument_node=""> in the accounting period that you bought the item, which HMRC states as:</span></p><span data-dcnode-id="1784" instrument_node=""> </span><p data-dcnode-id="1783"></p><span data-dcnode-id="1782" instrument_node=""> </span><p data-dcnode-id="1781"></p><span data-dcnode-id="1780" instrument_node=""> </span><ul data-dcnode-id="1772"><span data-dcnode-id="1779" instrument_node=""> </span><li data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">The date you signed the contract if payment is due within four months</span></li><span data-dcnode-id="1776" instrument_node=""> </span><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">The date payment is due if due more than four months later&nbsp;</span></li><span data-dcnode-id="1773" instrument_node=""> </span></ul><span data-dcnode-id="1771" instrument_node=""> </span><p data-dcnode-id="1770"></p><span data-dcnode-id="1769" instrument_node=""> </span><p data-dcnode-id="1768"></p><span data-dcnode-id="1767" instrument_node=""> </span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">If you sell an item after claiming AIA, you may need to pay additional tax in the accounting period of sale.</span></p><span data-dcnode-id="1764" instrument_node=""> </span><p data-dcnode-id="1763"></p><span data-dcnode-id="1762" instrument_node=""> </span><p data-dcnode-id="1761"></p><span data-dcnode-id="1760" instrument_node=""> </span><p data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">Find additional information on AIA at the </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/capital-allowances/annual-investment-allowance" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1758" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="1756" instrument_node="">.</span></p><span data-dcnode-id="1754" instrument_node=""> </span><p data-dcnode-id="1753"></p><span data-dcnode-id="1752" instrument_node=""> </span><p data-dcnode-id="1751"></p><span data-dcnode-id="1750" instrument_node=""> </span><h2 data-dcnode-id="1748" id="employment-allowance"><span data-dcnode-id="1749" instrument_node="">5. Employment Allowance</span></h2><span data-dcnode-id="1747" instrument_node=""> </span><p data-dcnode-id="1746"></p><span data-dcnode-id="1745" instrument_node=""> </span><p data-dcnode-id="1744"></p><span data-dcnode-id="1743" instrument_node=""> </span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">If you run a company and employ staff, you may be able to reduce your National Insurance (NI) bill by up to £4,000 by taking advantage of Employment Allowance.</span></p><span data-dcnode-id="1740" instrument_node=""> </span><p data-dcnode-id="1739"></p><span data-dcnode-id="1738" instrument_node=""> </span><p data-dcnode-id="1737"></p><span data-dcnode-id="1736" instrument_node=""> </span><p data-dcnode-id="1731"><span data-dcnode-id="1735" instrument_node="">It works by reducing your Class 1 National Insurance Contributions (NICs) each time you run your </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/payroll/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1734" instrument_node="">payroll</span></a><span data-dcnode-id="1732" instrument_node=""> until the £4,000 has gone or the tax year ends, whichever comes first.&nbsp;</span></p><span data-dcnode-id="1730" instrument_node=""> </span><p data-dcnode-id="1729"></p><span data-dcnode-id="1728" instrument_node=""> </span><p data-dcnode-id="1727"></p><span data-dcnode-id="1726" instrument_node=""> </span><figure class="wp-block-table aligncenter" data-dcnode-id="1625"><span data-dcnode-id="1725" instrument_node=""> </span><span data-dcnode-id="1724" instrument_node=""> </span><span data-dcnode-id="1723" instrument_node=""> </span><span data-dcnode-id="1722" instrument_node=""> </span><span data-dcnode-id="1719" instrument_node=""> </span><span data-dcnode-id="1716" instrument_node=""> </span><span data-dcnode-id="1714" instrument_node=""> </span><span data-dcnode-id="1712" instrument_node=""> </span><span data-dcnode-id="1711" instrument_node=""> </span><span data-dcnode-id="1710" instrument_node=""> </span><span data-dcnode-id="1707" instrument_node=""> </span><span data-dcnode-id="1700" instrument_node=""> </span><span data-dcnode-id="1698" instrument_node=""> </span><span data-dcnode-id="1697" instrument_node=""> </span><span data-dcnode-id="1694" instrument_node=""> </span><span data-dcnode-id="1687" instrument_node=""> </span><span data-dcnode-id="1685" instrument_node=""> </span><span data-dcnode-id="1684" instrument_node=""> </span><span data-dcnode-id="1681" instrument_node=""> </span><span data-dcnode-id="1674" instrument_node=""> </span><span data-dcnode-id="1672" instrument_node=""> </span><span data-dcnode-id="1671" instrument_node=""> </span><span data-dcnode-id="1668" instrument_node=""> </span><span data-dcnode-id="1661" instrument_node=""> </span><span data-dcnode-id="1659" instrument_node=""> </span><span data-dcnode-id="1658" instrument_node=""> </span><span data-dcnode-id="1655" instrument_node=""> </span><span data-dcnode-id="1648" instrument_node=""> </span><span data-dcnode-id="1646" instrument_node=""> </span><span data-dcnode-id="1645" instrument_node=""> </span><span data-dcnode-id="1642" instrument_node=""> </span><span data-dcnode-id="1635" instrument_node=""> </span><span data-dcnode-id="1633" instrument_node=""> </span><span data-dcnode-id="1631" instrument_node=""> </span><table data-dcnode-id="1630" width="100%"><thead data-dcnode-id="1713"><tr data-dcnode-id="1715"><th data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Class 1 National Insurance thresholds</span></th><th data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">2021 to 2022</span></th></tr></thead><tbody data-dcnode-id="1632"><tr data-dcnode-id="1699"><td data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Lower earnings limit</span></td><td data-dcnode-id="1701"><span data-dcnode-id="1706" instrument_node="">£120 per week</span><br data-dcnode-id="1705"><span data-dcnode-id="1704" instrument_node="">£520 per month</span><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">£6,240 per year</span></td></tr><tr data-dcnode-id="1686"><td data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Primary threshold</span></td><td data-dcnode-id="1688"><span data-dcnode-id="1693" instrument_node="">£184 per week</span><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">£797 per month</span><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">£9,568 per year</span></td></tr><tr data-dcnode-id="1673"><td data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Secondary threshold</span></td><td data-dcnode-id="1675"><span data-dcnode-id="1680" instrument_node="">£170 per week</span><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">£737 per month</span><br data-dcnode-id="1677"><span data-dcnode-id="1676" instrument_node="">£8,840 per year</span></td></tr><tr data-dcnode-id="1660"><td data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Upper secondary threshold (under 21)</span></td><td data-dcnode-id="1662"><span data-dcnode-id="1667" instrument_node="">£967 per week</span><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">£4,189 per month</span><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">£50,270 per year</span></td></tr><tr data-dcnode-id="1647"><td data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Apprentice upper secondary threshold (apprentice under 25)</span></td><td data-dcnode-id="1649"><span data-dcnode-id="1654" instrument_node="">£967 per week</span><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">£4,189 per month</span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">£50,270 per year</span></td></tr><tr data-dcnode-id="1634"><td data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Upper earnings limit</span></td><td data-dcnode-id="1636"><span data-dcnode-id="1641" instrument_node="">£967 per week</span><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">£4,189 per month</span><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">£50,270 per year</span></td></tr></tbody></table><figcaption data-dcnode-id="1626"><span data-dcnode-id="1629" instrument_node="">Source: </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/rates-and-thresholds-for-employers-2021-to-2022" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1628" instrument_node="">GOV.UK</span></a></figcaption></figure><span data-dcnode-id="1624" instrument_node=""> </span><p data-dcnode-id="1623"></p><span data-dcnode-id="1622" instrument_node=""> </span><p data-dcnode-id="1621"></p><span data-dcnode-id="1620" instrument_node=""> </span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">For example, if you have an employee who is paid £20,000 a year and pay the typical Employer NI rate of 13.8% on earnings over the £8,840 NI secondary threshold, they’ll incur NICs of £1,540.08 a year.&nbsp;</span></p><span data-dcnode-id="1617" instrument_node=""> </span><p data-dcnode-id="1616"></p><span data-dcnode-id="1615" instrument_node=""> </span><p data-dcnode-id="1614"></p><span data-dcnode-id="1613" instrument_node=""> </span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Because the full amount of Employer NICs (£1,540.08) is within the £4,000 Employment Allowance, you won’t pay any Employer NICs.&nbsp;</span></p><span data-dcnode-id="1610" instrument_node=""> </span><p data-dcnode-id="1609"></p><span data-dcnode-id="1608" instrument_node=""> </span><p data-dcnode-id="1607"></p><span data-dcnode-id="1606" instrument_node=""> </span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Where NICs exceed the Employment Allowance limit, the first £4,000 is written off.&nbsp;</span></p><span data-dcnode-id="1603" instrument_node=""> </span><p data-dcnode-id="1602"></p><span data-dcnode-id="1601" instrument_node=""> </span><p data-dcnode-id="1600"></p><span data-dcnode-id="1599" instrument_node=""> </span><h3 data-dcnode-id="1597" id="claiming-employment-allowance"><span data-dcnode-id="1598" instrument_node="">Claiming Employment Allowance</span></h3><span data-dcnode-id="1596" instrument_node=""> </span><p data-dcnode-id="1595"></p><span data-dcnode-id="1594" instrument_node=""> </span><p data-dcnode-id="1593"></p><span data-dcnode-id="1592" instrument_node=""> </span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">You can claim Employment Allowance if you’re a business or a charity with employee Class 1 NI liabilities of less than £100,000 in the previous tax year.&nbsp;</span></p><span data-dcnode-id="1589" instrument_node=""> </span><p data-dcnode-id="1588"></p><span data-dcnode-id="1587" instrument_node=""> </span><p data-dcnode-id="1586"></p><span data-dcnode-id="1585" instrument_node=""> </span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">You can also secure the tax break if you employ a care or support worker.</span></p><span data-dcnode-id="1582" instrument_node=""> </span><p data-dcnode-id="1581"></p><span data-dcnode-id="1580" instrument_node=""> </span><p data-dcnode-id="1579"></p><span data-dcnode-id="1578" instrument_node=""> </span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">If you’re eligible, Employment Allowance will be deducted from Class 1 NICs by payroll software automatically or by ticking ‘Yes’ in the Employment Allowance field.&nbsp;</span></p><span data-dcnode-id="1575" instrument_node=""> </span><p data-dcnode-id="1574"></p><span data-dcnode-id="1573" instrument_node=""> </span><p data-dcnode-id="1572"></p><span data-dcnode-id="1571" instrument_node=""> </span><p data-dcnode-id="1566"><span data-dcnode-id="1570" instrument_node="">Find additional information on Employment Allowance at the </span><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/claim-employment-allowance" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1569" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="1567" instrument_node="">.</span></p><span data-dcnode-id="1565" instrument_node=""> </span><p data-dcnode-id="1564"></p><span data-dcnode-id="1563" instrument_node=""> </span><p data-dcnode-id="1562"></p><span data-dcnode-id="1561" instrument_node=""> </span><div class="wp-block-image mobile-hide" data-dcnode-id="1555"><span data-dcnode-id="1560" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1557"><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="1559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30103517/Accounting-intergrations-Small-Banner-V1.png&amp;raw"></a></figure><span data-dcnode-id="1556" instrument_node=""> </span></div><span data-dcnode-id="1554" instrument_node=""> </span><p data-dcnode-id="1553"></p><span data-dcnode-id="1552" instrument_node=""> </span><p data-dcnode-id="1551"></p><span data-dcnode-id="1550" instrument_node=""> </span><div class="wp-block-image mobile-show" data-dcnode-id="1544"><span data-dcnode-id="1549" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1546"><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/business-current-account/" rel="noopener noreferrer" target="_blank"><img alt="" data-dcnode-id="1548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/30103516/Accounting-intergrations-Small-Banner-V1-Mobile.png&amp;raw"></a></figure><span data-dcnode-id="1545" instrument_node=""> </span></div><span data-dcnode-id="1543" instrument_node=""> </span><p data-dcnode-id="1542"></p><span data-dcnode-id="1541" instrument_node=""> </span><p data-dcnode-id="1540"></p><span data-dcnode-id="1539" instrument_node=""> </span><h2 data-dcnode-id="1537" id="research-and-development-tax-relief"><span data-dcnode-id="1538" instrument_node="">6. Research and development (R&amp;D) tax relief</span></h2><span data-dcnode-id="1536" instrument_node=""> </span><p data-dcnode-id="1535"></p><span data-dcnode-id="1534" instrument_node=""> </span><p data-dcnode-id="1533"></p><span data-dcnode-id="1532" instrument_node=""> </span><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">In 2018, UK businesses spent £37.1 billion on research and development, the equivalent of 1.7 of GDP. By 2027, the Government wants that figure to reach </span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonslibrary.parliament.uk/research-briefings/sn04223/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1530" instrument_node="">2.4% of GDP</span></a><span data-dcnode-id="1528" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1526" instrument_node=""> </span><p data-dcnode-id="1525"></p><span data-dcnode-id="1524" instrument_node=""> </span><p data-dcnode-id="1523"></p><span data-dcnode-id="1522" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1513"><span data-dcnode-id="1521" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1515"><img alt="Gross expenditure on research and development" class="wp-image-38492" data-dcnode-id="1520" height="731" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-1024x731.png&amp;raw" srcset="https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-1024x731.png 1024w, https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-300x214.png 300w, https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-768x549.png 768w, https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-1536x1097.png 1536w, https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-1015x725.png 1015w, https://web.uploads.tide.co/2020/10/10164059/Gross-expenditure-on-research-and-development-1523x1088.png 1523w" width="1024"><figcaption data-dcnode-id="1516"><span data-dcnode-id="1519" instrument_node="">Source: </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commonslibrary.parliament.uk/research-briefings/sn04223/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1518" instrument_node="">House of Commons Library</span></a></figcaption></figure><span data-dcnode-id="1514" instrument_node=""> </span></div><span data-dcnode-id="1512" instrument_node=""> </span><p data-dcnode-id="1511"></p><span data-dcnode-id="1510" instrument_node=""> </span><p data-dcnode-id="1509"></p><span data-dcnode-id="1508" instrument_node=""> </span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">To help promote R&amp;D investment in small businesses, the Government offers Corporation Tax relief so that companies can deduct an extra 130% of their qualifying costs from their yearly profit, as well as the standard deduction of 100%, for a total 230% tax deduction.</span></p><span data-dcnode-id="1505" instrument_node=""> </span><p data-dcnode-id="1504"></p><span data-dcnode-id="1503" instrument_node=""> </span><p data-dcnode-id="1502"></p><span data-dcnode-id="1501" instrument_node=""> </span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">This means, if you spent £1,000 on R&amp;D, you can reduce your yearly taxable profits by an additional £1,300 on top of the £1,000 outlay.&nbsp;</span></p><span data-dcnode-id="1498" instrument_node=""> </span><p data-dcnode-id="1497"></p><span data-dcnode-id="1496" instrument_node=""> </span><p data-dcnode-id="1495"></p><span data-dcnode-id="1494" instrument_node=""> </span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">In addition to tax relief, if you invest in R&amp;D and your company makes a loss, you can choose to claim an R&amp;D tax credit worth up to 14.5%. In this instance, the Government pays you a cash sum.</span></p><span data-dcnode-id="1491" instrument_node=""> </span><p data-dcnode-id="1490"></p><span data-dcnode-id="1489" instrument_node=""> </span><p data-dcnode-id="1488"></p><span data-dcnode-id="1487" instrument_node=""> </span><h3 data-dcnode-id="1485" id="claiming-research-and-development-tax-relief"><span data-dcnode-id="1486" instrument_node="">Claiming Research and Development tax relief</span></h3><span data-dcnode-id="1484" instrument_node=""> </span><p data-dcnode-id="1483"></p><span data-dcnode-id="1482" instrument_node=""> </span><p data-dcnode-id="1481"></p><span data-dcnode-id="1480" instrument_node=""> </span><p data-dcnode-id="1472"><span data-dcnode-id="1479" instrument_node="">To be eligible for </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/corporation-tax-research-and-development-rd-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1478" instrument_node="">R&amp;D tax reliefs</span></a><span data-dcnode-id="1476" instrument_node="">, your business must have fewer than 500 staff and a turnover of €100m or a balance sheet total under €86m. If your company has external investors because you </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/how-to-raise-capital/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1475" instrument_node="">raised venture capital</span></a><span data-dcnode-id="1473" instrument_node="">, you’ll need to show figures detailing the voting rights of connected or partner companies.&nbsp;</span></p><span data-dcnode-id="1471" instrument_node=""> </span><p data-dcnode-id="1470"></p><span data-dcnode-id="1469" instrument_node=""> </span><p data-dcnode-id="1468"></p><span data-dcnode-id="1467" instrument_node=""> </span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">If you meet the criteria, you’ll be able to claim for reduced tax payments on your project from the day it starts through to the point that you develop or discover the advance, or the project ends. Relief can be claimed up to two years after the end of the relevant accounting period.&nbsp;</span></p><span data-dcn
