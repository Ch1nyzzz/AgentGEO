ode-id="1464" instrument_node=""> </span><p data-dcnode-id="1463"></p><span data-dcnode-id="1462" instrument_node=""> </span><p data-dcnode-id="1461"></p><span data-dcnode-id="1460" instrument_node=""> </span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Costs you can claim for include:</span></p><span data-dcnode-id="1457" instrument_node=""> </span><p data-dcnode-id="1456"></p><span data-dcnode-id="1455" instrument_node=""> </span><p data-dcnode-id="1454"></p><span data-dcnode-id="1453" instrument_node=""> </span><ul data-dcnode-id="1431"><span data-dcnode-id="1452" instrument_node=""> </span><li data-dcnode-id="1448"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Employee costs.</span></strong><span data-dcnode-id="1449" instrument_node=""> Salaries, wages, Class 1 NICs and pension contributions for staff directly working on your project.</span></li><span data-dcnode-id="1447" instrument_node=""> </span><li data-dcnode-id="1443"><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Subcontractor costs.</span></strong><span data-dcnode-id="1444" instrument_node=""> 65% of relevant costs for subcontractors used in your project.</span></li><span data-dcnode-id="1442" instrument_node=""> </span><li data-dcnode-id="1438"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Software.</span></strong><span data-dcnode-id="1439" instrument_node=""> Software licence fees and a ‘reasonable share’ of software partly used in your project.</span></li><span data-dcnode-id="1437" instrument_node=""> </span><li data-dcnode-id="1433"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Consumables. </span></strong><span data-dcnode-id="1434" instrument_node="">A relevant proportion of materials and utilities used in your project.</span></li><span data-dcnode-id="1432" instrument_node=""> </span></ul><span data-dcnode-id="1430" instrument_node=""> </span><p data-dcnode-id="1429"></p><span data-dcnode-id="1428" instrument_node=""> </span><p data-dcnode-id="1427"></p><span data-dcnode-id="1426" instrument_node=""> </span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">You won’t be able to claim for:</span></p><span data-dcnode-id="1423" instrument_node=""> </span><p data-dcnode-id="1422"></p><span data-dcnode-id="1421" instrument_node=""> </span><p data-dcnode-id="1420"></p><span data-dcnode-id="1419" instrument_node=""> </span><ul data-dcnode-id="1402"><span data-dcnode-id="1418" instrument_node=""> </span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">The production and distributions of goods or services</span></li><span data-dcnode-id="1415" instrument_node=""> </span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Capital expenditure</span></li><span data-dcnode-id="1412" instrument_node=""> </span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Cost of land</span></li><span data-dcnode-id="1409" instrument_node=""> </span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Cost of patents and trademarks</span></li><span data-dcnode-id="1406" instrument_node=""> </span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Rent and rates</span></li><span data-dcnode-id="1403" instrument_node=""> </span></ul><span data-dcnode-id="1401" instrument_node=""> </span><p data-dcnode-id="1400"></p><span data-dcnode-id="1399" instrument_node=""> </span><p data-dcnode-id="1398"></p><span data-dcnode-id="1397" instrument_node=""> </span><p data-dcnode-id="1392"><span data-dcnode-id="1396" instrument_node="">You can submit a claim for R&amp;D tax reliefs by completing the enhanced expenditure section of your full Company Tax Return form. GOV.UK also has an </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/corporation-tax-research-and-development-tax-relief-for-large-companies" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1395" instrument_node="">online service</span></a><span data-dcnode-id="1393" instrument_node=""> with details and help on how to support your claim, including which details you need to include about your project.</span></p><span data-dcnode-id="1391" instrument_node=""> </span><p data-dcnode-id="1390"></p><span data-dcnode-id="1389" instrument_node=""> </span><p data-dcnode-id="1388"></p><span data-dcnode-id="1387" instrument_node=""> </span><p data-dcnode-id="1382"><span data-dcnode-id="1386" instrument_node="">Find additional information on R&amp;D tax reliefs at the </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/corporation-tax-research-and-development-rd-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1385" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="1383" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1381" instrument_node=""> </span><p data-dcnode-id="1380"></p><span data-dcnode-id="1379" instrument_node=""> </span><p data-dcnode-id="1378"></p><span data-dcnode-id="1377" instrument_node=""> </span><h2 data-dcnode-id="1375" id="the-patent-box-scheme"><span data-dcnode-id="1376" instrument_node="">7. The Patent Box Scheme</span></h2><span data-dcnode-id="1374" instrument_node=""> </span><p data-dcnode-id="1373"></p><span data-dcnode-id="1372" instrument_node=""> </span><p data-dcnode-id="1371"></p><span data-dcnode-id="1370" instrument_node=""> </span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Like R&amp;D tax relief, the Patent Box scheme encourages innovation and rewards forward-thinking companies with a Corporation Tax break.</span></p><span data-dcnode-id="1367" instrument_node=""> </span><p data-dcnode-id="1366"></p><span data-dcnode-id="1365" instrument_node=""> </span><p data-dcnode-id="1364"></p><span data-dcnode-id="1363" instrument_node=""> </span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">The scheme is aimed at businesses that retain and commercialise existing UK and European patents or develop new patented products. If your business meets the criteria, you’ll be able to enjoy a reduced Corporation Tax rate of 10% on all profits earned from patented inventions since 1 April 2013.&nbsp;</span></p><span data-dcnode-id="1360" instrument_node=""> </span><p data-dcnode-id="1359"></p><span data-dcnode-id="1358" instrument_node=""> </span><p data-dcnode-id="1357"></p><span data-dcnode-id="1356" instrument_node=""> </span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">And the reduction is generous. In 2016-17, 1,170 companies claimed a total tax relief of £1,035 million under the Patent Box scheme.&nbsp;</span></p><span data-dcnode-id="1353" instrument_node=""> </span><p data-dcnode-id="1352"></p><span data-dcnode-id="1351" instrument_node=""> </span><p data-dcnode-id="1350"></p><span data-dcnode-id="1349" instrument_node=""> </span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">To benefit from this tax break, your business must:</span></p><span data-dcnode-id="1346" instrument_node=""> </span><p data-dcnode-id="1345"></p><span data-dcnode-id="1344" instrument_node=""> </span><p data-dcnode-id="1343"></p><span data-dcnode-id="1342" instrument_node=""> </span><ul data-dcnode-id="1328"><span data-dcnode-id="1341" instrument_node=""> </span><li data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Be liable to Corporation Tax</span></li><span data-dcnode-id="1338" instrument_node=""> </span><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Make a profit from exploiting patented inventions (these don’t have to be your own inventions)</span></li><span data-dcnode-id="1335" instrument_node=""> </span><li data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Own or have exclusively licenced-in the patents (you may also be eligible for the scheme if your company holds certain medicinal or botanic innovation rights)</span></li><span data-dcnode-id="1332" instrument_node=""> </span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Have undertaken qualifying development on the patents</span></li><span data-dcnode-id="1329" instrument_node=""> </span></ul><span data-dcnode-id="1327" instrument_node=""> </span><p data-dcnode-id="1326"></p><span data-dcnode-id="1325" instrument_node=""> </span><p data-dcnode-id="1324"></p><span data-dcnode-id="1323" instrument_node=""> </span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">As well as the business eligibility criteria, your patent-related income needs to tick the necessary boxes. To qualify for the tax break, your income needs to come from:</span></p><span data-dcnode-id="1320" instrument_node=""> </span><p data-dcnode-id="1319"></p><span data-dcnode-id="1318" instrument_node=""> </span><p data-dcnode-id="1317"></p><span data-dcnode-id="1316" instrument_node=""> </span><ul data-dcnode-id="1302"><span data-dcnode-id="1315" instrument_node=""> </span><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Selling patented items including products, products that incorporate the patented items and bespoke spare parts</span></li><span data-dcnode-id="1312" instrument_node=""> </span><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Licensing out patented rights</span></li><span data-dcnode-id="1309" instrument_node=""> </span><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Selling patented rights</span></li><span data-dcnode-id="1306" instrument_node=""> </span><li data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Compensation income or damages from the infringement of rights that you own</span></li><span data-dcnode-id="1303" instrument_node=""> </span></ul><span data-dcnode-id="1301" instrument_node=""> </span><p data-dcnode-id="1300"></p><span data-dcnode-id="1299" instrument_node=""> </span><p data-dcnode-id="1298"></p><span data-dcnode-id="1297" instrument_node=""> </span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Income earned from regular activities and marketing asset returns (e.g. income from branding, rather than innovation) does not qualify.&nbsp;</span></p><span data-dcnode-id="1294" instrument_node=""> </span><p data-dcnode-id="1293"></p><span data-dcnode-id="1292" instrument_node=""> </span><p data-dcnode-id="1291"></p><span data-dcnode-id="1290" instrument_node=""> </span><p class="highlight-block" data-dcnode-id="1283"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Top Tip: </span></strong><span data-dcnode-id="1287" instrument_node="">Patents fall under the intellectual property umbrella, along with Trade Marks, Designs, Copyright and Trade Secrets. To learn more about how to protect all of your intellectual property, read our guide on </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tide.co/blog/business-tips/how-to-protect-a-business-idea/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1286" instrument_node="">how to protect a business idea</span></a><span data-dcnode-id="1284" instrument_node=""> 🔐</span></p><span data-dcnode-id="1282" instrument_node=""> </span><p data-dcnode-id="1281"></p><span data-dcnode-id="1280" instrument_node=""> </span><p data-dcnode-id="1279"></p><span data-dcnode-id="1278" instrument_node=""> </span><h3 data-dcnode-id="1276" id="claiming-patent-box-tax-relief"><span data-dcnode-id="1277" instrument_node="">Claiming Patent Box tax relief</span></h3><span data-dcnode-id="1275" instrument_node=""> </span><p data-dcnode-id="1274"></p><span data-dcnode-id="1273" instrument_node=""> </span><p data-dcnode-id="1272"></p><span data-dcnode-id="1271" instrument_node=""> </span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">To get the Corporation Tax cut, you’ll need to make an election into the Patent Box within two years after the end of the relevant accounting period. You can do this in the computations that accompany your Company Tax Return or separately in writing.</span></p><span data-dcnode-id="1268" instrument_node=""> </span><p data-dcnode-id="1267"></p><span data-dcnode-id="1266" instrument_node=""> </span><p data-dcnode-id="1265"></p><span data-dcnode-id="1264" instrument_node=""> </span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">The process of calculating your qualifying profits and income, however, can be complex.&nbsp;</span></p><span data-dcnode-id="1261" instrument_node=""> </span><p data-dcnode-id="1260"></p><span data-dcnode-id="1259" instrument_node=""> </span><p data-dcnode-id="1258"></p><span data-dcnode-id="1257" instrument_node=""> </span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">New rules introduced in 2016 to protect the system from abuse mean that IP rights, patented products and product families need to be ‘streamed’ separately. For example, if you have five patented products, you’ll need to carry out your income and profit calculations five times.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1254" instrument_node=""> </span><p data-dcnode-id="1253"></p><span data-dcnode-id="1252" instrument_node=""> </span><p data-dcnode-id="1251"></p><span data-dcnode-id="1250" instrument_node=""> </span><p data-dcnode-id="1245"><span data-dcnode-id="1249" instrument_node="">You can find an </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/hmrc-internal-manuals/corporate-intangibles-research-and-development-manual/cird277000" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1248" instrument_node="">example of Patent Box calculation</span></a><span data-dcnode-id="1246" instrument_node=""> on the HMRC website.</span></p><span data-dcnode-id="1244" instrument_node=""> </span><p data-dcnode-id="1243"></p><span data-dcnode-id="1242" instrument_node=""> </span><p data-dcnode-id="1241"></p><span data-dcnode-id="1240" instrument_node=""> </span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Given the complexities, it’s worth seeking specialist tax advice before making a claim for tax relief.</span></p><span data-dcnode-id="1237" instrument_node=""> </span><p data-dcnode-id="1236"></p><span data-dcnode-id="1235" instrument_node=""> </span><p data-dcnode-id="1234"></p><span data-dcnode-id="1233" instrument_node=""> </span><p data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">Find additional information on the Patent Box scheme at the </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/corporation-tax-the-patent-box" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1231" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="1229" instrument_node="">.</span></p><span data-dcnode-id="1227" instrument_node=""> </span><p data-dcnode-id="1226"></p><span data-dcnode-id="1225" instrument_node=""> </span><p data-dcnode-id="1224"></p><span data-dcnode-id="1223" instrument_node=""> </span><h2 data-dcnode-id="1221" id="creative-industries-tax-reliefs"><span data-dcnode-id="1222" instrument_node="">8. Creative Industries tax reliefs (CITRs)</span></h2><span data-dcnode-id="1220" instrument_node=""> </span><p data-dcnode-id="1219"></p><span data-dcnode-id="1218" instrument_node=""> </span><p data-dcnode-id="1217"></p><span data-dcnode-id="1216" instrument_node=""> </span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Creative Industries Tax Reliefs were launched by the Government in 2013 as a way to encourage long term investments in the UK’s creative industries.&nbsp;</span></p><span data-dcnode-id="1213" instrument_node=""> </span><p data-dcnode-id="1212"></p><span data-dcnode-id="1211" instrument_node=""> </span><p data-dcnode-id="1210"></p><span data-dcnode-id="1209" instrument_node=""> </span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">They’ve proven popular. In 2019-20 period, </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/907624/August_2020_Commentary_Creative_Industries_Statistics.pdf" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1207" instrument_node="">a total of £1.11 billion</span></a><span data-dcnode-id="1205" instrument_node=""> was paid out in tax reliefs across all creative industries:</span></p><span data-dcnode-id="1203" instrument_node=""> </span><p data-dcnode-id="1202"></p><span data-dcnode-id="1201" instrument_node=""> </span><p data-dcnode-id="1200"></p><span data-dcnode-id="1199" instrument_node=""> </span><ul data-dcnode-id="1173"><span data-dcnode-id="1198" instrument_node=""> </span><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Film</span></li><span data-dcnode-id="1195" instrument_node=""> </span><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">High-end TV</span></li><span data-dcnode-id="1192" instrument_node=""> </span><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Animation</span></li><span data-dcnode-id="1189" instrument_node=""> </span><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Video games</span></li><span data-dcnode-id="1186" instrument_node=""> </span><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Children’s TV</span></li><span data-dcnode-id="1183" instrument_node=""> </span><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Theatre</span></li><span data-dcnode-id="1180" instrument_node=""> </span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Orchestra</span></li><span data-dcnode-id="1177" instrument_node=""> </span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Museums and Galleries Exhibition</span></li><span data-dcnode-id="1174" instrument_node=""> </span></ul><span data-dcnode-id="1172" instrument_node=""> </span><p data-dcnode-id="1171"></p><span data-dcnode-id="1170" instrument_node=""> </span><p data-dcnode-id="1169"></p><span data-dcnode-id="1168" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1159"><span data-dcnode-id="1167" instrument_node=""> </span><figure class="aligncenter size-large" data-dcnode-id="1161"><img alt="Amount of Creative Industries Tax Reliefs graph" class="wp-image-38493" data-dcnode-id="1166" height="858" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-1024x858.png&amp;raw" srcset="https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-1024x858.png 1024w, https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-300x251.png 300w, https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-768x644.png 768w, https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-865x725.png 865w, https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph-1298x1088.png 1298w, https://web.uploads.tide.co/2020/10/10164134/Amount-of-Creative-Industries-Tax-Reliefs-graph.png 1465w" width="1024"><figcaption data-dcnode-id="1162"><span data-dcnode-id="1165" instrument_node="">Source: </span><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/907624/August_2020_Commentary_Creative_Industries_Statistics.pdf" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1164" instrument_node="">HMRC</span></a></figcaption></figure><span data-dcnode-id="1160" instrument_node=""> </span></div><span data-dcnode-id="1158" instrument_node=""> </span><p data-dcnode-id="1157"></p><span data-dcnode-id="1156" instrument_node=""> </span><p data-dcnode-id="1155"></p><span data-dcnode-id="1154" instrument_node=""> </span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">CITRs work in a similar way to R&amp;D tax breaks in that they allow a deduction of research and development spending against trading profits.&nbsp;</span></p><span data-dcnode-id="1151" instrument_node=""> </span><p data-dcnode-id="1150"></p><span data-dcnode-id="1149" instrument_node=""> </span><p data-dcnode-id="1148"></p><span data-dcnode-id="1147" instrument_node=""> </span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Which means, if you qualify, you can claim an additional Corporation Tax reduction (the enhancement) of up to 100% of enhanceable expenditure. Or, if you make a loss, 25% of the loss up to the amount of enhanceable expenditure.</span></p><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1143"></p><span data-dcnode-id="1142" instrument_node=""> </span><p data-dcnode-id="1141"></p><span data-dcnode-id="1140" instrument_node=""> </span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Enhanceable expenditure is the lesser of qualifying UK expenditure or 80% of the total qualifying expenditure.&nbsp;</span></p><span data-dcnode-id="1137" instrument_node=""> </span><p data-dcnode-id="1136"></p><span data-dcnode-id="1135" instrument_node=""> </span><p data-dcnode-id="1134"></p><span data-dcnode-id="1133" instrument_node=""> </span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Eligibility for CITR differs depending on your industry. Here’s an overview of who and what qualifies:</span></p><span data-dcnode-id="1130" instrument_node=""> </span><p data-dcnode-id="1129"></p><span data-dcnode-id="1128" instrument_node=""> </span><p data-dcnode-id="1127"></p><span data-dcnode-id="1126" instrument_node=""> </span><h3 data-dcnode-id="1124" id="film-tax-relief-ftr"><span data-dcnode-id="1125" instrument_node="">Film Tax Relief (FTR)</span></h3><span data-dcnode-id="1123" instrument_node=""> </span><p data-dcnode-id="1122"></p><span data-dcnode-id="1121" instrument_node=""> </span><p data-dcnode-id="1120"></p><span data-dcnode-id="1119" instrument_node=""> </span><p data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">You can claim </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-film-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1117" instrument_node="">Film Tax Relief</span></a><span data-dcnode-id="1115" instrument_node=""> if your film:</span></p><span data-dcnode-id="1113" instrument_node=""> </span><p data-dcnode-id="1112"></p><span data-dcnode-id="1111" instrument_node=""> </span><p data-dcnode-id="1110"></p><span data-dcnode-id="1109" instrument_node=""> </span><ul data-dcnode-id="1098"><span data-dcnode-id="1108" instrument_node=""> </span><li data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Passes the cultural test (it must be certified as British) or qualifies as an official co-production</span></li><span data-dcnode-id="1105" instrument_node=""> </span><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Is intended for theatrical release</span></li><span data-dcnode-id="1102" instrument_node=""> </span><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Has at least 10% of its core costs relate to activities in the UK</span></li><span data-dcnode-id="1099" instrument_node=""> </span></ul><span data-dcnode-id="1097" instrument_node=""> </span><p data-dcnode-id="1096"></p><span data-dcnode-id="1095" instrument_node=""> </span><p data-dcnode-id="1094"></p><span data-dcnode-id="1093" instrument_node=""> </span><h3 data-dcnode-id="1091" id="high-end-television-tax-relief-htr"><span data-dcnode-id="1092" instrument_node="">High-end Television Tax Relief (HTR)</span></h3><span data-dcnode-id="1090" instrument_node=""> </span><p data-dcnode-id="1089"></p><span data-dcnode-id="1088" instrument_node=""> </span><p data-dcnode-id="1087"></p><span data-dcnode-id="1086" instrument_node=""> </span><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">You’ll be eligible to claim </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-high-end-television-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1084" instrument_node="">High-end Television Tax Relief</span></a><span data-dcnode-id="1082" instrument_node=""> if your TV programme:</span></p><span data-dcnode-id="1080" instrument_node=""> </span><p data-dcnode-id="1079"></p><span data-dcnode-id="1078" instrument_node=""> </span><p data-dcnode-id="1077"></p><span data-dcnode-id="1076" instrument_node=""> </span><ul data-dcnode-id="1056"><span data-dcnode-id="1075" instrument_node=""> </span><li data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Is certified as British by the British Film Institute (BFI)</span></li><span data-dcnode-id="1072" instrument_node=""> </span><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Is intended for broadcast to the general public</span></li><span data-dcnode-id="1069" instrument_node=""> </span><li data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Is a drama, comedy or documentary</span></li><span data-dcnode-id="1066" instrument_node=""> </span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Has at least 10% of its core costs relate to activities in the UK</span></li><span data-dcnode-id="1063" instrument_node=""> </span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Has an average core expenditure (money spent on pre- and post-production and photography) of at least £1 million per hour of slot length</span></li><span data-dcnode-id="1060" instrument_node=""> </span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Has a slot length of greater than 30 minutes</span></li><span data-dcnode-id="1057" instrument_node=""> </span></ul><span data-dcnode-id="1055" instrument_node=""> </span><p data-dcnode-id="1054"></p><span data-dcnode-id="1053" instrument_node=""> </span><p data-dcnode-id="1052"></p><span data-dcnode-id="1051" instrument_node=""> </span><h3 data-dcnode-id="1049" id="animation-tax-relief-atr"><span data-dcnode-id="1050" instrument_node="">Animation Tax Relief (ATR)</span></h3><span data-dcnode-id="1048" instrument_node=""> </span><p data-dcnode-id="1047"></p><span data-dcnode-id="1046" instrument_node=""> </span><p data-dcnode-id="1045"></p><span data-dcnode-id="1044" instrument_node=""> </span><p data-dcnode-id="1040"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-animation-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1043" instrument_node="">Animation Tax Relief</span></a><span data-dcnode-id="1041" instrument_node=""> can be claimed if your programme:</span></p><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1038"></p><span data-dcnode-id="1037" instrument_node=""> </span><p data-dcnode-id="1036"></p><span data-dcnode-id="1035" instrument_node=""> </span><ul data-dcnode-id="1021"><span data-dcnode-id="1034" instrument_node=""> </span><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Is certified as British by the British Film Institute (BFI)</span></li><span data-dcnode-id="1031" instrument_node=""> </span><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Is intended for broadcast to the general public</span></li><span data-dcnode-id="1028" instrument_node=""> </span><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Has at least 51% of its core expenditure on animation</span></li><span data-dcnode-id="1025" instrument_node=""> </span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Has at least 10% of its core costs relate to activities in the UK</span></li><span data-dcnode-id="1022" instrument_node=""> </span></ul><span data-dcnode-id="1020" instrument_node=""> </span><p data-dcnode-id="1019"></p><span data-dcnode-id="1018" instrument_node=""> </span><p data-dcnode-id="1017"></p><span data-dcnode-id="1016" instrument_node=""> </span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Your company must also be responsible for production, planning and decision making. As well as contract, rights, goods and services negotiations.</span></p><span data-dcnode-id="1013" instrument_node=""> </span><p data-dcnode-id="1012"></p><span data-dcnode-id="1011" instrument_node=""> </span><p data-dcnode-id="1010"></p><span data-dcnode-id="1009" instrument_node=""> </span><h3 data-dcnode-id="1007" id="video-games-tax-relief-vgtr"><span data-dcnode-id="1008" instrument_node="">Video Games Tax Relief (VGTR)</span></h3><span data-dcnode-id="1006" instrument_node=""> </span><p data-dcnode-id="1005"></p><span data-dcnode-id="1004" instrument_node=""> </span><p data-dcnode-id="1003"></p><span data-dcnode-id="1002" instrument_node=""> </span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">You can claim if </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-video-games-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1000" instrument_node="">Video Games Tax Relief</span></a><span data-dcnode-id="998" instrument_node=""> your game:</span></p><span data-dcnode-id="996" instrument_node=""> </span><p data-dcnode-id="995"></p><span data-dcnode-id="994" instrument_node=""> </span><p data-dcnode-id="993"></p><span data-dcnode-id="992" instrument_node=""> </span><ul data-dcnode-id="981"><span data-dcnode-id="991" instrument_node=""> </span><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Is certified as British by the British Film Institute (BFI)</span></li><span data-dcnode-id="988" instrument_node=""> </span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Is intended for the general public</span></li><span data-dcnode-id="985" instrument_node=""> </span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Has at least 25% of its core expenditure on goods and services provided from with the European Economic Area (EEA)</span></li><span data-dcnode-id="982" instrument_node=""> </span></ul><span data-dcnode-id="980" instrument_node=""> </span><p data-dcnode-id="979"></p><span data-dcnode-id="978" instrument_node=""> </span><p data-dcnode-id="977"></p><span data-dcnode-id="976" instrument_node=""> </span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">As with Animation Tax Relief, your company must be engaged in planning and decision making and directly negotiate terms for contracts, rights, goods and services.</span></p><span data-dcnode-id="973" instrument_node=""> </span><p data-dcnode-id="972"></p><span data-dcnode-id="971" instrument_node=""> </span><p data-dcnode-id="970"></p><span data-dcnode-id="969" instrument_node=""> </span><h3 data-dcnode-id="967" id="childrens-tv-tax-relief-cttr"><span data-dcnode-id="968" instrument_node="">Children’s TV Tax Relief (CTTR)</span></h3><span data-dcnode-id="966" instrument_node=""> </span><p data-dcnode-id="965"></p><span data-dcnode-id="964" instrument_node=""> </span><p data-dcnode-id="963"></p><span data-dcnode-id="962" instrument_node=""> </span><p data-dcnode-id="958"><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-childrens-television-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="961" instrument_node="">Children’s TV Tax Relief</span></a><span data-dcnode-id="959" instrument_node=""> is similar to high-end TV and animation and the eligibility criteria are the same, except for:</span></p><span data-dcnode-id="957" instrument_node=""> </span><p data-dcnode-id="956"></p><span data-dcnode-id="955" instrument_node=""> </span><p data-dcnode-id="954"></p><span data-dcnode-id="953" instrument_node=""> </span><ul data-dcnode-id="945"><span data-dcnode-id="952" instrument_node=""> </span><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The intended audience must be under the age of 15</span></li><span data-dcnode-id="949" instrument_node=""> </span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">If your programme is a quiz, game show or a content show, the prize total must not exceed £1,000</span></li><span data-dcnode-id="946" instrument_node=""> </span></ul><span data-dcnode-id="944" instrument_node=""> </span><p data-dcnode-id="943"></p><span data-dcnode-id="942" instrument_node=""> </span><p data-dcnode-id="941"></p><span data-dcnode-id="940" instrument_node=""> </span><h3 data-dcnode-id="938" id="theatre-tax-relief-ttr"><span data-dcnode-id="939" instrument_node="">Theatre Tax Relief (TTR)</span></h3><span data-dcnode-id="937" instrument_node=""> </span><p data-dcnode-id="936"></p><span data-dcnode-id="935" instrument_node=""> </span><p data-dcnode-id="934"></p><span data-dcnode-id="933" instrument_node=""> </span><p data-dcnode-id="929"><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/hmrc-internal-manuals/theatre-tax-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="932" instrument_node="">Theatre Tax Relief</span></a><span data-dcnode-id="930" instrument_node=""> can be claimed if your theatre:</span></p><span data-dcnode-id="928" instrument_node=""> </span><p data-dcnode-id="927"></p><span data-dcnode-id="926" instrument_node=""> </span><p data-dcnode-id="925"></p><span data-dcnode-id="924" instrument_node=""> </span><ul data-dcnode-id="913"><span data-dcnode-id="923" instrument_node=""> </span><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Puts on a live play, opera, musical drama or ballet production</span></li><span data-dcnode-id="920" instrument_node=""> </span><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">All of most of the productions are for the general public or put on for education purposes</span></li><span data-dcnode-id="917" instrument_node=""> </span><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Spends at least 25% of its core expenditure costs on goods or services provided from with the European Economic Area (EEA)</span></li><span data-dcnode-id="914" instrument_node=""> </span></ul><span data-dcnode-id="912" instrument_node=""> </span><p data-dcnode-id="911"></p><span data-dcnode-id="910" instrument_node=""> </span><p data-dcnode-id="909"></p><span data-dcnode-id="908" instrument_node=""> </span><h3 data-dcnode-id="906" id="orchestra-tax-relief-otr"><span data-dcnode-id="907" instrument_node="">Orchestra Tax Relief (OTR)</span></h3><span data-dcnode-id="905" instrument_node=""> </span><p data-dcnode-id="904"></p><span data-dcnode-id="903" instrument_node=""> </span><p data-dcnode-id="902"></p><span data-dcnode-id="901" instrument_node=""> </span><p data-dcnode-id="896"><span data-dcnode-id="900" instrument_node="">To claim </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/hmrc-internal-manuals/orchestra-tax-relief" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="899" instrument_node="">Orchestra Tax Relief</span></a><span data-dcnode-id="897" instrument_node=""> you must put on a qualifying orchestral concert that:</span></p><span data-dcnode-id="895" instrument_node=""> </span><p data-dcnode-id="894"></p><span data-dcnode-id="893" instrument_node=""> </span><p data-dcnode-id="892"></p><span data-dcnode-id="891" instrument_node=""> </span><ul data-dcnode-id="877"><span data-dcnode-id="890" instrument_node=""> </span><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Is performed by an orchestra, ensemble group or band that consists of at least 12 instrumentalists</span></li><span data-dcnode-id="887" instrument_node=""> </span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Features instruments that are not electronically amplified</span></li><span data-dcnode-id="884" instrument_node=""> </span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Is performed live for the paying public or put on for educational purposes</span></li><span data-dcnode-id="881" instrument_node=""> </span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Spends at least 25% of its core expenditure costs on goods or services provided from with the European Economic Area (EEA)</span></li><span data-dcnode-id="878" instrument_node=""> </span></ul><span data-dcnode-id="876" instrument_node=""> </span><p data-dcnode-id="875"></p><span data-dcnode-id="874" instrument_node=""> </span><p data-dcnode-id="873"></p><span data-dcnode-id="872" instrument_node=""> </span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Your company must also be responsible for planning and putting on the concert.</span></p><span data-dcnode-id="869" instrument_node=""> </span><p data-dcnode-id="868"></p><span data-dcnode-id="867" instrument_node=""> </span><p data-dcnode-id="866"></p><span data-dcnode-id="865" instrument_node=""> </span><h3 data-dcnode-id="863" id="museums-and-galleries-exhibitions-tax-relief-mgetr"><span data-dcnode-id="864" instrument_node="">Museums and Galleries Exhibitions Tax Relief (MGETR)</span></h3><span data-dcnode-id="862" instrument_node=""> </span><p data-dcnode-id="861"></p><span data-dcnode-id="860" instrument_node=""> </span><p data-dcnode-id="859"></p><span data-dcnode-id="858" instrument_node=""> </span><p data-dcnode-id="854"><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/claiming-museums-and-galleries-exhibition-tax-relief-for-corporation-tax" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="857" instrument_node="">Museums and Galleries Exhibitions Tax Relief</span></a><span data-dcnode-id="855" instrument_node=""> is available for primary and secondary production charities and local authorities, but eligibility differs depending on whether you’re primary or secondary.&nbsp;</span></p><span data-dcnode-id="853" instrument_node=""> </span><p data-dcnode-id="852"></p><span data-dcnode-id="851" instrument_node=""> </span><p data-dcnode-id="850"></p><span data-dcnode-id="849" instrument_node=""> </span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">According to GOV.UK, a primary company must:</span></p><span data-dcnode-id="846" instrument_node=""> </span><p data-dcnode-id="845"></p><span data-dcnode-id="844" instrument_node=""> </span><p data-dcnode-id="843"></p><span data-dcnode-id="842" instrument_node=""> </span><ul data-dcnode-id="828"><span data-dcnode-id="841" instrument_node=""> </span><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Make an effective creative, technical or artistic contribution</span></li><span data-dcnode-id="838" instrument_node=""> </span><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Be actively engaged in planning and decision-making</span></li><span data-dcnode-id="835" instrument_node=""> </span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Directly negotiate, contract and pay for rights, goods and services</span></li><span data-dcnode-id="832" instrument_node=""> </span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Be responsible for producing and running the exhibition at a venue</span></li><span data-dcnode-id="829" instrument_node=""> </span></ul><span data-dcnode-id="827" instrument_node=""> </span><p data-dcnode-id="826"></p><span data-dcnode-id="825" instrument_node=""> </span><p data-dcnode-id="824"></p><span data-dcnode-id="823" instrument_node=""> </span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">A secondary company must be responsible for putting on the exhibition at their venue and actively engaged in the decision-making process for the venue.&nbsp;</span></p><span data-dcnode-id="820" instrument_node=""> </span><p data-dcnode-id="819"></p><span data-dcnode-id="818" instrument_node=""> </span><p data-dcnode-id="817"></p><span data-dcnode-id="816" instrument_node=""> </span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">For the exhibition to qualify for the tax break, it must:</span></p><span data-dcnode-id="813" instrument_node=""> </span><p data-dcnode-id="812"></p><span data-dcnode-id="811" instrument_node=""> </span><p data-dcnode-id="810"></p><span data-dcnode-id="809" instrument_node=""> </span><ul data-dcnode-id="801"><span data-dcnode-id="808" instrument_node=""> </span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Be a curated public display of scientific, historic, artistic or cultural interest (this includes single objects)</span></li><span data-dcnode-id="805" instrument_node=""> </span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Have spent at least 25% of its core expenditure on goods and services from within the European Economic Area (EEA)</span></li><span data-dcnode-id="802" instrument_node=""> </span></ul><span data-dcnode-id="800" instrument_node=""> </span><p data-dcnode-id="799"></p><span data-dcnode-id="798" instrument_node=""> </span><p data-dcnode-id="797"></p><span data-dcnode-id="796" instrument_node=""> </span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">If you’re putting on a touring exhibition, you’ll need to show that your exhibition is held at more than one venue, with at least 25% of works displayed at every venue and no more than six months between exhibitions.</span></p><span data-dcnode-id="793" instrument_node=""> </span><p data-dcnode-id="792"></p><span data-dcnode-id="791" instrument_node=""> </span><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node=""> </span><h3 data-dcnode-id="787" id="claiming-creative-industries-tax-reliefs"><span data-dcnode-id="788" instrument_node="">Claiming Creative Industries tax reliefs</span></h3><span data-dcnode-id="786" instrument_node=""> </span><p data-dcnode-id="785"></p><span data-dcnode-id="784" instrument_node=""> </span><p data-dcnode-id="783"></p><span data-dcnode-id="782" instrument_node=""> </span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The process of claiming CITR is broadly the same for each industry and can be done by calculating the amount of additional deduction and payable credit you’re owed on your Company Tax Return.</span></p><span data-dcnode-id="779" instrument_node=""> </span><p data-dcnode-id="778"></p><span data-dcnode-id="777" instrument_node=""> </span><p data-dcnode-id="776"></p><span data-dcnode-id="775" instrument_node=""> </span><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">Find additional information on allowable business expenses at the </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/corporation-tax-creative-industry-tax-reliefs" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="773" instrument_node="">GOV.UK website</span></a><span data-dcnode-id="771" instrument_node="">.</span></p><span data-dcnode-id="769" instrument_node=""> </span><p data-dcnode-id="768"></p><span data-dcnode-id="767" instrument_node=""> </span><p data-dcnode-id="766"></p><span data-dcnode-id="765" instrument_node=""> </span><h2 data-dcnode-id="763" id="Expert-insights"><span data-dcnode-id="764" instrument_node="">💡 Expert insights</span></h2><span data-dcnode-id="762" instrument_node=""> </span><p data-dcnode-id="761"></p><span data-dcnode-id="760" instrument_node=""> </span><p data-dcnode-id="759"></p><span data-dcnode-id="758" instrument_node=""> </span><p data-dcnode-id="751"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/darrenfell/" rel="external noreferrer noopener"><span data-dcnode-id="757" instrument_node="">Darren Fell</span></a><span data-dcnode-id="755" instrument_node=""> is the CEO and Founder of </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crunch.co.uk/%3Futm_source%3Daffiliate%26utm_medium%3Dtide%26utm_campaign%3Dexpert-insights" rel="external noreferrer noopener"><span data-dcnode-id="754" instrument_node="">Crunch</span></a><span data-dcnode-id="752" instrument_node="">, an award-winning online accounting service that supports freelancers, contractors, and practically anyone who’s self-employed.&nbsp;</span></p><span data-dcnode-id="750" instrument_node=""> </span><p data-dcnode-id="749"></p><span data-dcnode-id="748" instrument_node=""> </span><p data-dcnode-id="747"></p><span data-dcnode-id="746" instrument_node=""> </span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">For over ten years, Crunch has combined easy-to-use, online accounting software with actual human beings, so that you’re always able to access your accounts and seek the support you need.&nbsp;</span></p><span data-dcnode-id="743" instrument_node=""> </span><p data-dcnode-id="742"></p><span data-dcnode-id="741" instrument_node=""> </span><p data-dcnode-id="740"></p><span data-dcnode-id="739" instrument_node=""> </span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Crunch helps thousands of clients with their accounting needs every single year, using their years of expertise and insight to help small business owners manage their responsibilities.</span></p><span data-dcnode-id="736" instrument_node=""> </span><p data-dcnode-id="735"></p><span data-dcnode-id="734" instrument_node=""> </span><p data-dcnode-id="733"></p><span data-dcnode-id="732" instrument_node=""> </span><h3 data-dcnode-id="730" id="q1-is-there-ever-a-scenario-where-business-owners-shouldnt-consider-a-tax-break"><span data-dcnode-id="731" instrument_node="">Q1: Is there ever a scenario where business owners shouldn’t consider a tax break?</span></h3><span data-dcnode-id="729" instrument_node=""> </span><p data-dcnode-id="728"></p><span data-dcnode-id="727" instrument_node=""> </span><p data-dcnode-id="726"></p><span data-dcnode-id="725" instrument_node=""> </span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Absolutely!&nbsp;</span></p><span data-dcnode-id="722" instrument_node=""> </span><p data-dcnode-id="721"></p><span data-dcnode-id="720" instrument_node=""> </span><p data-dcnode-id="719"></p><span data-dcnode-id="718" instrument_node=""> </span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Through your life as a business owner, you’ll encounter schemes such as offshore arrangements or tax loss investments promoted by organisations, claiming to have been approved by HMRC.</span></p><span data-dcnode-id="715" instrument_node=""> </span><p data-dcnode-id="714"></p><span data-dcnode-id="713" instrument_node=""> </span><p data-dcnode-id="712"></p><span data-dcnode-id="711" instrument_node=""> </span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">HMRC never signs off on such schemes, and you should always seek your own specialist advice before entering into any financial arrangements on behalf of your business.</span></p><span data-dcnode-id="708" instrument_node=""> </span><p data-dcnode-id="707"></p><span data-dcnode-id="706" instrument_node=""> </span><p data-dcnode-id="705"></p><span data-dcnode-id="704" instrument_node=""> </span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">Any </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crunch.co.uk/knowledge/tax/tax-avoidance-evasion-difference-legal/%3Futm_source%3Daffiliate%26utm_medium%3Dtide%26utm_campaign%3Dexpert-insights" rel="external noreferrer noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">bending of the rules</span></a><span data-dcnode-id="700" instrument_node="">, artificially contrived schemes involving loans, or offshore trusts are likely to fall foul of HMRC and could see you facing a hefty tax bill or even prosecution.</span></p><span data-dcnode-id="698" instrument_node=""> </span><p data-dcnode-id="697"></p><span data-dcnode-id="696" instrument_node=""> </span><p data-dcnode-id="695"></p><span data-dcnode-id="694" instrument_node=""> </span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Don’t forget the golden rule: if it looks too good to be true, it usually is.</span></p><span data-dcnode-id="691" instrument_node=""> </span><p data-dcnode-id="690"></p><span data-dcnode-id="689" instrument_node=""> </span><p data-dcnode-id="688"></p><span data-dcnode-id="687" instrument_node=""> </span><h3 data-dcnode-id="685" id="q2-what-can-business-owners-do-to-make-their-profit-work-harder-for-them"><span data-dcnode-id="686" instrument_node="">Q2: What can business owners do to make their profit work harder for them?</span></h3><span data-dcnode-id="684" instrument_node=""> </span><p data-dcnode-id="683"></p><span data-dcnode-id="682" instrument_node=""> </span><p data-dcnode-id="681"></p><span data-dcnode-id="680" instrument_node=""> </span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The first thing to do is to look closely at your business structure. Is it the right one for you (sole trader, limited liability partnership, or limited company)?&nbsp;</span></p><span data-dcnode-id="677" instrument_node=""> </span><p data-dcnode-id="676"></p><span data-dcnode-id="675" instrument_node=""> </span><p data-dcnode-id="674"></p><span data-dcnode-id="673" instrument_node=""> </span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Are you (legitimately) minimising the tax you pay by claiming all of your entitlements? Research and Development credits in particular are often overlooked. Don’t forget to also look carefully at the timing of asset purchases to maximise capital allowances.&nbsp;</span></p><span data-dcnode-id="670" instrument_node=""> </span><p data-dcnode-id="669"></p><span data-dcnode-id="668" instrument_node=""> </span><p data-dcnode-id="667"></p><span data-dcnode-id="666" instrument_node=""> </span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">You might also want to consider whether it’s time to diversify your business through investment in other businesses or new products.</span></p><span data-dcnode-id="663" instrument_node=""> </span><p data-dcnode-id="662"></p><span data-dcnode-id="661" instrument_node=""> </span><p data-dcnode-id="660"></p><span data-dcnode-id="659" instrument_node=""> </span><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Finally, there will come a time when you wish to close your business or hand part (or all) of it over to others. When the time comes, you’ll need a clear exit plan: consider the tax efficiencies available, such as </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crunch.co.uk/knowledge/tax/what-is-entrepreneurs-relief/%3Futm_source%3Daffiliate%26utm_medium%3Dtide%26utm_campaign%3Dexpert-insights" rel="external noreferrer noopener" target="_blank"><span data-dcnode-id="657" instrument_node="">Entrepreneurs Relief</span></a><span data-dcnode-id="655" instrument_node="">, which is specially designed for such situations.</span></p><span data-dcnode-id="653" instrument_node=""> </span><p data-dcnode-id="652"></p><span data-dcnode-id="651" instrument_node=""> </span><p data-dcnode-id="650"></p><span data-dcnode-id="649" instrument_node=""> </span><h2 data-dcnode-id="647" id="wrapping-up"><span data-dcnode-id="648" instrument_node="">Wrapping up</span></h2><span data-dcnode-id="646" instrument_node=""> </span><p data-dcnode-id="645"></p><span data-dcnode-id="644" instrument_node=""> </span><p data-dcnode-id="643"></p><span data-dcnode-id="642" instrument_node=""> </span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Whether you’re self-employed and work from home or run a limited company with multiple staff, there’s a tax break that exists to help your business. Taking advantage of them can help free up cash that can be invested in growth opportunities.&nbsp;</span></p><span data-dcnode-id="639" instrument_node=""> </span><p data-dcnode-id="638"></p><span data-dcnode-id="637" instrument_node=""> </span><p data-dcnode-id="636"></p><span data-dcnode-id="635" instrument_node=""> </span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Use this post and the links provided to find out what’s available and work with a certified accountant to help you claim what you are eligible for.</span></p><span data-dcnode-id="632" instrument_node=""> </span><p data-dcnode-id="631"></p><span data-dcnode-id="630" instrument_node=""> </span><p data-dcnode-id="629"></p><span data-dcnode-id="628" instrument_node=""> </span><p data-dcnode-id="624" style="font-size:10px;"><span data-dcnode-id="627" instrument_node="">Photo by Anthony Shkraba, published on </span><a aria-label="Pexels (opens in a new tab)" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="626" instrument_node="">Pexels</span></a></p><span data-dcnode-id="623" instrument_node=""> </span><p data-dcnode-id="622"></p><span data-dcnode-id="621" instrument_node=""> </span></div><span data-dcnode-id="619" instrument_node="">
