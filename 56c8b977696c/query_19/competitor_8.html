" instrument_node=""> </span></div><span data-dcnode-id="1300" instrument_node=""> </span></div><span data-dcnode-id="1297" instrument_node=""> </span><div class="wrap" data-dcnode-id="446" role="document"><div class="content" data-dcnode-id="447"><main class="main" data-dcnode-id="450"><div class="container" data-dcnode-id="1277"><div class="row" data-dcnode-id="1278"><div class="col-md-7 mr-md-auto" data-dcnode-id="1279"><p class="breadcrumb yoast" data-dcnode-id="1280" id="breadcrumbs" style="padding: 1rem 0px 0px 0px; font-size: 0.8rem; margin-bottom: 0;"><span data-dcnode-id="1281"><span data-dcnode-id="1282"><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/"><span data-dcnode-id="1295" instrument_node="">Home</span></a><span data-dcnode-id="1293" instrument_node=""> / </span><span data-dcnode-id="1283"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/"><span data-dcnode-id="1292" instrument_node="">Guides</span></a><span data-dcnode-id="1290" instrument_node=""> / </span><span data-dcnode-id="1284"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guide_category/tax-vat/"><span data-dcnode-id="1289" instrument_node="">Tax &amp; VAT</span></a><span data-dcnode-id="1287" instrument_node=""> / </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">How To Minimise Your Tax Liability: Tax Credits, Tax Relief and Expenses</span></span></span></span></span></span></p></div></div></div><article class="main post-4783 guide type-guide status-publish has-post-thumbnail hentry tag-accounting-software stage_category-decide guide_category-tax-vat" data-dcnode-id="451"><div class="vc_block" data-dcnode-id="1213"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1214"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1215"><div class="vc_column-inner" data-dcnode-id="1216"><div class="wpb_wrapper" data-dcnode-id="1217"><div class="block text has_drive wpb_text_column wpb_content_element" data-dcnode-id="1218"><div class="container" data-dcnode-id="1221"><div class="row" data-dcnode-id="1224"><div class="col-md-7 mr-md-auto" data-dcnode-id="1247"><p data-dcnode-id="1271"><strong data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">There are three main ways businesses in Ireland can minimise tax liability: claiming tax credits, claiming tax reliefs, and claiming </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/tax-deductible-expenses-for-companies-sole-traders/"><span data-dcnode-id="1275" instrument_node="">tax-deductible business expenses</span></a><span data-dcnode-id="1273" instrument_node="">.</span></strong></p><p data-dcnode-id="1268"><span data-contrast="auto" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">If you are just starting out in business, in the early stages of setting up, or when preparing your taxes, you may be asking yourself “what can possibly help reduce the amount of taxes that you owe?” </span></span></p><p data-dcnode-id="1254"><span data-contrast="auto" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">T</span></span><span data-contrast="auto" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">here is a range of support available to you. There are </span></span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/guide-to-startup-grants-and-support/"><span data-contrast="none" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">grants and financial support</span></span></a><span data-contrast="none" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">&nbsp;to help you to launch and grow your business</span></span><span data-contrast="auto" data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">, and also a range of tax schemes that can help to reduce income tax liability.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">&nbsp;</span></span></p><p data-dcnode-id="1251"><span data-contrast="auto" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">In this guide, we will discuss how to reduce tax liability through the different tax reliefs available in Ireland. This will hopefully help you to take advantage of all the relevant credits and reliefs.</span></span></p><p data-dcnode-id="1248"><span data-contrast="auto" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">It’s important to note that not all tax schemes apply to everyone so talk to your accountant for specific advice about your circumstances. For more information on how we can help, talk to a member of our Client Services team today.</span></span></p></div><span data-dcnode-id="1246" instrument_node=""> </span><div class="col-md-4" data-dcnode-id="1225"><div class="stage_driver not-updated-service decide" data-dcnode-id="1228"><div class="widget default" data-dcnode-id="1231"><div class="card" data-dcnode-id="1234"><div class="card-body" data-dcnode-id="1237"><h3 class="card-title" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Need Help?</span></h3><p class="card-text" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Our client services team are always happy to talk to you about what's best for your needs</span></p><span data-dcnode-id="1240" instrument_node=""> </span><a class="btn btn-secondary btn-lg btn-block ga-track-stage-decide-cta-btn" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/get-started/" title="Get Started"><span data-dcnode-id="1239" instrument_node="">Get Started</span></a></div><span data-dcnode-id="1236" instrument_node=""> </span></div><span data-dcnode-id="1233" instrument_node=""> </span></div><span data-dcnode-id="1230" instrument_node=""> </span></div><span data-dcnode-id="1227" instrument_node=""> </span></div></div><span data-dcnode-id="1223" instrument_node=""> </span></div><span data-dcnode-id="1220" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="1212" instrument_node=""> </span><div class="vc_block" data-dcnode-id="1169"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1170"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1171"><div class="vc_column-inner" data-dcnode-id="1172"><div class="wpb_wrapper" data-dcnode-id="1173"><section class="infosteps acol-cx-masterclass" data-dcnode-id="1174"><div class="infosteps-wrapper" data-dcnode-id="1175"><div class="container" data-dcnode-id="1176"><header class="infosteps-header" data-dcnode-id="1203"><h2 class="infosteps-title" data-dcnode-id="1204"><span data-dcnode-id="1210" instrument_node=""> </span><span class="infosteps-first-part" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Differences between</span></span><span data-dcnode-id="1207" instrument_node=""> </span><span class="infosteps-sec-part" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">tax credits, reliefs and expenses</span></span></h2></header><div class="infosteps-main" data-dcnode-id="1177"><div class="infosteps-items-wrapper row" data-dcnode-id="1178"><div class="col-md-4 infosteps-item-wrapper" data-dcnode-id="1195"><div class="infosteps-item" data-dcnode-id="1196"><span data-dcnode-id="1202" instrument_node=""> </span><span class="infosteps-item-number" data-dcnode-id="1201"></span><h3 class="infosteps-item-title" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Tax credits</span></h3><div class="infosteps-item-description" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node=""> A tax credit is an item that directly reduces the amount of tax you pay in a full tax year, thereby reducing your tax liability. Some tax credits are given automatically and others you must claim through a tax return.</span></div></div></div><div class="col-md-4 infosteps-item-wrapper" data-dcnode-id="1187"><div class="infosteps-item" data-dcnode-id="1188"><span data-dcnode-id="1194" instrument_node=""> </span><span class="infosteps-item-number" data-dcnode-id="1193"></span><h3 class="infosteps-item-title" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Tax relief</span></h3><div class="infosteps-item-description" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node=""> Tax reliefs directly reduce the income on which you pay tax and is usually given as a refund of tax due when you file a tax return. The amount depends on the rate of tax you pay.</span></div></div></div><div class="col-md-4 infosteps-item-wrapper" data-dcnode-id="1179"><div class="infosteps-item" data-dcnode-id="1180"><span data-dcnode-id="1186" instrument_node=""> </span><span class="infosteps-item-number" data-dcnode-id="1185"></span><h3 class="infosteps-item-title" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Claim business expenses</span></h3><div class="infosteps-item-description" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node=""> Your tax bill is based on the profit of a business and profit is the money that is left over after you deduct expenses. So this means incurring business expenses can lower you tax liability at the end of the year</span></div></div></div></div></div></div></div></section></div></div></div></div></div><span data-dcnode-id="1168" instrument_node=""> </span><div class="vc_block" data-dcnode-id="1107"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1108"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1109"><div class="vc_column-inner" data-dcnode-id="1110"><div class="wpb_wrapper" data-dcnode-id="1111"><div class="block items type pyramid layout grid count_0" data-dcnode-id="1142"><div class="container" data-dcnode-id="1145"><div class="row" data-dcnode-id="1148"><div class="col-12 col-md-7 mr-auto" data-dcnode-id="1158"><div class="header" data-dcnode-id="1159"><h2 data-dcnode-id="1164"><span data-dcnode-id="1166" instrument_node="">Tax credits for business owners in Ireland</span><span data-dcnode-id="1165"></span></h2><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Sole Traders and companies in Ireland have access to different tax credits. However, if you are also an employee or Director of a Limited Company, you can claim similar tax credits to a Sole Trader.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">We go through some examples below but we recommend you seek advice from an accountant as each situation is different and not all tax credits will apply.</span></p></div></div><span data-dcnode-id="1157" instrument_node=""> </span><div class="col-12 col-md-3 m-auto" data-dcnode-id="1151"><div class="footer" data-dcnode-id="1152"><p data-dcnode-id="1153"><a class="btn btn-lg btn-secondary" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/get-started/" target="" title="Get Started"><span data-dcnode-id="1155" instrument_node="">Get Started</span></a></p></div></div><span data-dcnode-id="1150" instrument_node=""> </span></div><span data-dcnode-id="1147" instrument_node=""> </span></div><span data-dcnode-id="1144" instrument_node=""> </span></div><span data-dcnode-id="1141" instrument_node=""> </span><div class="block text has_media a_left wpb_text_column wpb_content_element" data-dcnode-id="1112"><div class="container" data-dcnode-id="1115"><div class="row" data-dcnode-id="1118"><div class="col-md-5 mr-md-auto" data-dcnode-id="1126"><div class="header" data-dcnode-id="1137"><h2 data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">25% tax credit for Research And Development (R&amp;D)</span></h2></div><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">The R&amp;D tax credit is for Limited Companies in Ireland. It is a value-based incentive that encourages companies to invest in R&amp;D activities in the European Economic Area (EEA). If your company fulfils technical requirements, you can claim up to 25% of the cost of R&amp;D expenditure by way of a reduction in your Corporation Tax.</span></p><p data-dcnode-id="1127"><span data-contrast="auto" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Find out more about what kind of R&amp;D activities qualify and </span></span><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/tax-credit-available-rd/"><span data-contrast="none" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">how to claim your R&amp;D tax credit</span></span></a><span data-contrast="auto" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node=""> in our guide. For more information on how we can help, talk to our Client Services Team.&nbsp;</span></span></p></div><span data-dcnode-id="1125" instrument_node=""> </span><div class="col-md-6" data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node=""> </span><noscript data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">&lt;img decoding="async" src="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-scaled.jpg" srcset="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1900/https://4fbzss3mlf7ofmte92mbodbd d-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-scaled.jpg&amp;raw" srcset="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1900/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-scaled.jpg 1900w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_768/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-scaled-768x512.jpg 768w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1536/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-1536x1024.jpg 1536w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_2048/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-2048x1365.jpg 2048w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_576/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-576x384.jpg 576w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_992/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-992x661.jpg 992w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1200/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-1200x800.jpg 1200w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1230/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/man-working-on-laptop-while-woman-takes-notes-3153199-1230x820.jpg 1230w" title=""></div></div><span data-dcnode-id="1117" instrument_node=""> </span></div><span data-dcnode-id="1114" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="1106" instrument_node=""> </span><div class="vc_block" data-dcnode-id="1030"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1031"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1032"><div class="vc_column-inner" data-dcnode-id="1033"><div class="wpb_wrapper" data-dcnode-id="1034"><div class="block text layout grid wpb_text_column wpb_content_element" data-dcnode-id="1035"><div class="container" data-dcnode-id="1038"><div class="row" data-dcnode-id="1041"><div class="" data-dcnode-id="1044"><div class="header" data-dcnode-id="1102"><h2 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Tax credits for Sole Traders and Directors</span></h2></div><div class="row" data-dcnode-id="1045"><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="1066"><article class="object listed text" data-dcnode-id="1067"><div class="card" data-dcnode-id="1068"><div class="card-body" data-dcnode-id="1069"><h2 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Earned Income tax credit</span></h2><p data-dcnode-id="1090"><span data-contrast="auto" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">The&nbsp;</span></span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revenue.ie/en/personal-tax-credits-reliefs-and-exemptions/income-and-employment/earned-income-credit/index.aspx" rel="noopener" target="_blank"><span data-contrast="none" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Earned Income Credit</span></span></a><span data-contrast="auto" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node=""> is a tax credit based on the type of pay that you earn. It applies to Sole Traders, proprietary directors (owning more than 15% of the ordinary share capital of a company) and the spouse or child of proprietary directors.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">&nbsp;</span></span></p><p data-dcnode-id="1085"><span data-contrast="auto" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">This tax credit can be for €1650 or 20% of your qualifying income, whichever is lower.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp;</span></span></p><p data-dcnode-id="1070"><span data-contrast="auto" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">You can claim this by logging into </span></span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ros.ie/myaccount-web/sign_in.html%3Fexecution%3De1s1" rel="noopener" target="_blank"><span data-contrast="none" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Revenue’s myAccount</span></span></a><span data-contrast="auto" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&nbsp;and adding it to your current tax credits or you can claim it on your&nbsp;</span></span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/directors-returns-2/" rel="noopener"><span data-contrast="none" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Income Tax Return</span></span></a><span data-contrast="auto" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&nbsp;(Form 11).</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">&nbsp;</span></span></p></div></div></article></div><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="1047"><article class="object listed text" data-dcnode-id="1048"><div class="card" data-dcnode-id="1049"><div class="card-body" data-dcnode-id="1050"><h2 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Employee (PAYE) Tax Credit</span></h2><p data-dcnode-id="1059"><span data-dcnode-id="1063" instrument_node="">Sole Traders&nbsp;</span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/creating-a-business-with-full-time-job/"><span data-dcnode-id="1062" instrument_node="">starting a business while working full-time</span></a><span data-dcnode-id="1060" instrument_node=""> can avail of both the Earned Income Credit and the Employee Tax Credit. However, the combined amount cannot exceed the maximum employee tax credit of €1,700.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1058" instrument_node="">Proprietary directors (owning more than 15% of ordinary share capital in a company), their spouse or civil partner receiving income directly related to that directorship</span><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revenue.ie/en/personal-tax-credits-reliefs-and-exemptions/income-and-employment/employee-tax-credit/index.aspx" rel="noopener" target="_blank"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">cannot claim</span></strong></a><span data-dcnode-id="1052" instrument_node="">&nbsp;the employee tax credit.</span></p></div></div></article></div><div class="clear" data-dcnode-id="1046"></div></div></div><span data-dcnode-id="1043" instrument_node=""> </span></div><span data-dcnode-id="1040" instrument_node=""> </span></div><span data-dcnode-id="1037" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="1029" instrument_node=""> </span><div class="vc_block" data-dcnode-id="972"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="973"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="974"><div class="vc_column-inner" data-dcnode-id="975"><div class="wpb_wrapper" data-dcnode-id="976"><div class="block text has_drive wpb_text_column wpb_content_element" data-dcnode-id="977"><div class="container" data-dcnode-id="980"><div class="row" data-dcnode-id="983"><div class="col-md-7 mr-md-auto" data-dcnode-id="1006"><div class="header" data-dcnode-id="1025"><h2 data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">How to claim tax credits?</span></h2></div><p data-dcnode-id="1017"><span data-dcnode-id="1024" instrument_node="">Sole Traders and directors need to file income tax returns every year by completing a Form 11 on </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ros.ie/myaccount-web/sign_in.html%3Fexecution%3De1s1" rel="noopener" target="_blank"><span data-dcnode-id="1023" instrument_node="">Revenue’s Online System (ROS)</span></a><span data-dcnode-id="1021" instrument_node="">. This is sometimes be referred to as a </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/directors-returns-2/"><span data-dcnode-id="1020" instrument_node="">Directors Return</span></a><span data-dcnode-id="1018" instrument_node="">&nbsp;if you are a Director of an Irish company.</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">This form will outline your total income for the previous year and the amount of tax to pay, including&nbsp;</span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/quick-guide-to-preliminary-tax/"><span data-dcnode-id="1015" instrument_node="">preliminary tax&nbsp;</span></a><span data-dcnode-id="1013" instrument_node="">for Sole Traders.</span></p><p data-dcnode-id="1007"><span data-contrast="auto" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">If you need help with filling out your Income Tax Returns, our professional team can do so on your behalf. Reach out to a member of our Client Services team today to discuss your business’ needs.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="1005" instrument_node=""> </span><div class="col-md-4" data-dcnode-id="984"><div class="stage_driver not-updated-service decide" data-dcnode-id="987"><div class="widget default" data-dcnode-id="990"><div class="card" data-dcnode-id="993"><div class="card-body" data-dcnode-id="996"><h3 class="card-title" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Need Help?</span></h3><p class="card-text" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Our client services team are always happy to talk to you about what's best for your needs</span></p><span data-dcnode-id="999" instrument_node=""> </span><a class="btn btn-secondary btn-lg btn-block ga-track-stage-decide-cta-btn" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/get-started/" title="Get Started"><span data-dcnode-id="998" instrument_node="">Get Started</span></a></div><span data-dcnode-id="995" instrument_node=""> </span></div><span data-dcnode-id="992" instrument_node=""> </span></div><span data-dcnode-id="989" instrument_node=""> </span></div><span data-dcnode-id="986" instrument_node=""> </span></div></div><span data-dcnode-id="982" instrument_node=""> </span></div><span data-dcnode-id="979" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="971" instrument_node=""> </span><div class="vc_block" data-dcnode-id="829"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="830"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="831"><div class="vc_column-inner" data-dcnode-id="832"><div class="wpb_wrapper" data-dcnode-id="833"><div class="block items type pyramid layout grid count_6" data-dcnode-id="836"><div class="container" data-dcnode-id="839"><div class="row" data-dcnode-id="953"><div class="col-12 col-md-7 mr-auto" data-dcnode-id="963"><div class="header" data-dcnode-id="964"><h2 data-dcnode-id="967"><span data-dcnode-id="969" instrument_node="">Tax reliefs for businesses owners in Ireland</span><span data-dcnode-id="968"></span></h2><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Tax relief reduces your total taxable income which can reduce taxes paid. You may be eligible to claim back tax paid over the last four years. Here we will explain some of the most common type of tax relief in Ireland. For more information on your specific circumstance, reach out to our Client Services Team today.</span></p></div></div><span data-dcnode-id="962" instrument_node=""> </span><div class="col-12 col-md-3 m-auto" data-dcnode-id="956"><div class="footer" data-dcnode-id="957"><p data-dcnode-id="958"><a class="btn btn-lg btn-secondary" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/get-started/" target="" title="Get Started"><span data-dcnode-id="960" instrument_node="">Get Started</span></a></p></div></div><span data-dcnode-id="955" instrument_node=""> </span></div><span data-dcnode-id="952" instrument_node=""> </span><div class="row" data-dcnode-id="842"><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="935"><article class="object listed item" data-dcnode-id="938"><div class="card" data-dcnode-id="941"><div class="card-body" data-dcnode-id="942"><ul class="fa-ul" data-dcnode-id="943"><li data-dcnode-id="944"><span class="fa-li" data-dcnode-id="949"><i class="fas fa-check" data-dcnode-id="950"></i></span><h3 class="card-title" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Cycle to work</span></h3><p class="card-text" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Employees who cycle to and from work are eligible for this tax relief. Employers can pay for bicycles and bicycle equipment for employees and the employee pays back through salary deductions of up to 12 months.</span></p></li></ul></div></div><span data-dcnode-id="940" instrument_node=""> </span></article><span data-dcnode-id="937" instrument_node=""> </span></div><span data-dcnode-id="934" instrument_node=""> </span><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="917"><article class="object listed item" data-dcnode-id="920"><div class="card" data-dcnode-id="923"><div class="card-body" data-dcnode-id="924"><ul class="fa-ul" data-dcnode-id="925"><li data-dcnode-id="926"><span class="fa-li" data-dcnode-id="931"><i class="fas fa-check" data-dcnode-id="932"></i></span><h3 class="card-title" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Medical insurance</span></h3><p class="card-text" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The amount of tax relief is calculated by the insurer and the cost of your policy is reduced by this amount. Revenue.ie specifies the approved insurance providers.</span></p></li></ul></div></div><span data-dcnode-id="922" instrument_node=""> </span></article><span data-dcnode-id="919" instrument_node=""> </span></div><span data-dcnode-id="916" instrument_node=""> </span><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="899"><article class="object listed item" data-dcnode-id="902"><div class="card" data-dcnode-id="905"><div class="card-body" data-dcnode-id="906"><ul class="fa-ul" data-dcnode-id="907"><li data-dcnode-id="908"><span class="fa-li" data-dcnode-id="913"><i class="fas fa-check" data-dcnode-id="914"></i></span><h3 class="card-title" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Rent-a-room</span></h3><p class="card-text" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">You’re entitled to this tax deduction if you rent a room in your home where you live for one year. You don’t have to own the property, you could be a tenant and sub-let to someone else. You can claim the tax relief by preparing rental income accounts and filing a tax return.</span></p></li></ul></div></div><span data-dcnode-id="904" instrument_node=""> </span></article><span data-dcnode-id="901" instrument_node=""> </span></div><span data-dcnode-id="898" instrument_node=""> </span><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="881"><article class="object listed item" data-dcnode-id="884"><div class="card" data-dcnode-id="887"><div class="card-body" data-dcnode-id="888"><ul class="fa-ul" data-dcnode-id="889"><li data-dcnode-id="890"><span class="fa-li" data-dcnode-id="895"><i class="fas fa-check" data-dcnode-id="896"></i></span><h3 class="card-title" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Transborder workers</span></h3><p class="card-text" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">People who are a resident in Ireland but work and pay tax in another country are eligible to claim this tax deduction. You need to work for a continuous period of 13 weeks in a year and you cannot claim this relief if your spouse or civil partner is a proprietary director for the company you work for.</span></p></li></ul></div></div><span data-dcnode-id="886" instrument_node=""> </span></article><span data-dcnode-id="883" instrument_node=""> </span></div><span data-dcnode-id="880" instrument_node=""> </span><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="863"><article class="object listed item" data-dcnode-id="866"><div class="card" data-dcnode-id="869"><div class="card-body" data-dcnode-id="870"><ul class="fa-ul" data-dcnode-id="871"><li data-dcnode-id="872"><span class="fa-li" data-dcnode-id="877"><i class="fas fa-check" data-dcnode-id="878"></i></span><h3 class="card-title" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">€500 Small Benefits Exemption for Limited Companies</span></h3><p class="card-text" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">A non-cash benefit of up to €500 in value, tax-free, each year. This is usually given through gift cards on goods and services and reduces the tax implications for both parties.</span></p></li></ul></div></div><span data-dcnode-id="868" instrument_node=""> </span></article><span data-dcnode-id="865" instrument_node=""> </span></div><span data-dcnode-id="862" instrument_node=""> </span><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="845"><article class="object listed item" data-dcnode-id="848"><div class="card" data-dcnode-id="851"><div class="card-body" data-dcnode-id="852"><ul class="fa-ul" data-dcnode-id="853"><li data-dcnode-id="854"><span class="fa-li" data-dcnode-id="859"><i class="fas fa-check" data-dcnode-id="860"></i></span><h3 class="card-title" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Personal circumstance</span></h3><p class="card-text" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">A change in your personal circumstances can have implications for how you are taxed. These changes should be communicated to your accountant so they can ensure you are availing of all the tax schemes available to you.</span></p></li></ul></div></div><span data-dcnode-id="850" instrument_node=""> </span></article><span data-dcnode-id="847" instrument_node=""> </span></div><span data-dcnode-id="844" instrument_node=""> </span></div><span data-dcnode-id="841" instrument_node=""> </span></div><span data-dcnode-id="838" instrument_node=""> </span></div><span data-dcnode-id="835" instrument_node=""> </span></div></div></div></div></div><span data-dcnode-id="828" instrument_node=""> </span><div class="vc_block" data-dcnode-id="784"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="785"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="786"><div class="vc_column-inner" data-dcnode-id="787"><div class="wpb_wrapper" data-dcnode-id="788"><div class="block text has_media a_left wpb_text_column wpb_content_element" data-dcnode-id="789"><div class="container" data-dcnode-id="792"><div class="row" data-dcnode-id="795"><div class="col-md-5 mr-md-auto" data-dcnode-id="803"><div class="header" data-dcnode-id="824"><h2 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Start Your Own Business Relief</span></h2></div><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">The </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revenue.ie/en/personal-tax-credits-reliefs-and-exemptions/investment/start-your-own-business-relief/index.aspx" rel="noopener" target="_blank"><span data-dcnode-id="822" instrument_node="">Start Your Own Business Relief</span></a><span data-dcnode-id="820" instrument_node=""> is aimed at entrepreneurs who start their own businesses while unemployed.</span></p><p data-dcnode-id="808"><span data-dcnode-id="818" instrument_node="">You may be entitled to this relief if you started your own business between October 25</span><sup data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">th</span></sup><span data-dcnode-id="815" instrument_node=""> 2013 and December 31</span><sup data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">st</span></sup><span data-dcnode-id="812" instrument_node=""> 2018 </span><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">and y</span></strong><span data-dcnode-id="809" instrument_node="">ou were unemployed for at least 12 months before you started your business.</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">It allows you to claim Income Tax relief of up to €40,000 a year, for a maximum of 2 years. You can only claim it once and you must make the claim within 4 years of the year your claim relates to.</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">For example, if you started your business in 2018, you have until the end of 2022 to claim Income Tax relief for the year 2018.</span></p></div><span data-dcnode-id="802" instrument_node=""> </span><div class="col-md-6" data-dcnode-id="796"><span data-dcnode-id="800" instrument_node=""> </span><noscript data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">&lt;img decoding="async" src="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912.jpg" srcset="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1600/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912.jpg 1600w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_768/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912-768x512.jpg 768w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1536/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912-1536x1023.jpg 1536w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_576/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912-576x384.jpg 576w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_992/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-content/uploads/2022/03/shutterstock_1538372912-992x661.jpg 992w, https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img,w_1200/https://4fb -inner" data-dcnode-id="753"><div class="wpb_wrapper" data-dcnode-id="754"><div class="block text has_media a_right wpb_text_column wpb_content_element" data-dcnode-id="755"><div class="container" data-dcnode-id="758"><div class="row" data-dcnode-id="761"><div class="col-md-5 ml-md-auto order-md-2" data-dcnode-id="769"><div class="header" data-dcnode-id="779"><h2 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">StartUp Relief For Entrepreneurs (SURE)</span></h2></div><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">The </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/start-up-relief-for-entrepreneurs/"><span data-dcnode-id="777" instrument_node="">StartUp Relief For Entrepreneurs (SURE) scheme</span></a><span data-dcnode-id="775" instrument_node=""> is a tax refund scheme that allows investors of companies to claim back up to 41% of their investment in a Startup, through a refund of Income Tax you have paid in previous years.</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">To avail of this scheme, the investor must make a qualifying investment in a qualifying company, and there are certain criteria that must be met.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">To find out more about whether you can qualify for SURE and how to apply, check out our guide to the SURE scheme or talk to our Client Services team today. We are happy to advise you on the best services for your needs.</span></p></div><span data-dcnode-id="768" instrument_node=""> </span><div class="col-md-6 order-md-1" data-dcnode-id="762"><span data-dcnode-id="766" instrument_node=""> </span><noscript data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&lt;img decoding="async" src="https://sp-ao.shortpixel.ai/client/to_auto,q_lossy,ret_img/https://4fbzss3mlf7ofmte92mbodbd-wpengine.netdna-ssl.com/wp-conten d="747" instrument_node="">Corporation Tax Relief</span></h2></div><p data-dcnode-id="736"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/how-to-qualify-for-corporation-tax-in-ireland/"><span data-dcnode-id="744" instrument_node="">C</span><span data-contrast="none" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">orporation Tax</span></span></a><span data-contrast="auto" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node=""> Relief can help to reduce the amount of Corporation Tax your company will pay during your first 5 years of trading.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&nbsp;</span></span></p><p data-dcnode-id="731"><span data-contrast="auto" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">You may be entitled to this tax relief if:</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">&nbsp;</span></span></p><ul data-dcnode-id="720"><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="1" data-dcnode-id="721" data-font="Symbol" data-leveltext="" data-listid="14"><span data-contrast="auto" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Your company’s income is from a&nbsp;</span></span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revenue.ie/en/starting-a-business/initiatives-for-startup-businesses-and-smes/tax-relief-for-new-startup-companies/can-you-claim-for-tax-relief-for-your-start-up-company.aspx" rel="noopener" target="_blank"><span data-contrast="none" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">qualifying trade,</span></span></a><span data-contrast="auto" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">&nbsp;according to Revenue</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">&nbsp;</span></span></li></ul><ul data-dcnode-id="696"><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="1" data-dcnode-id="715" data-font="Symbol" data-leveltext="" data-listid="14"><span data-contrast="auto" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Your corporation tax due is less than €40,000 per year</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">&nbsp;</span></span></li><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="2" data-dcnode-id="702" data-font="Symbol" data-leveltext="" data-listid="14"><span data-contrast="auto" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">The amount of&nbsp;</span></span><span data-contrast="none" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Pay Related Social Insurance (PRSI)</span></span><span data-contrast="auto" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">&nbsp;you pay is less than €5</span></span><span data-contrast="auto" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">,</span></span><span data-contrast="auto" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">000 per employee and €40,000 for all employees in a 12-month period</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">&nbsp;</span></span></li><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="3" data-dcnode-id="697" data-font="Symbol" data-leveltext="" data-listid="20"><span data-contrast="auto" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Note: If your Corporation Tax is between €40,000 and €60,000 per year or you pay more than the PRSI limit you may still be entitled to partial relief. We recommend that you talk to your accountant for specific advice about your situation.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">&nbsp;</span></span></li></ul><p data-dcnode-id="691"><span data-contrast="auto" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Companies can apply for this relief on your Form CT1 tax return</span></span><span data-contrast="auto" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node=""> or you can outsource your annual accounting requirements to our team of Chartered and Certified Accountants. Reach out to us today to discuss outsourcing your company’s tax obligations.</span></span></p></div><span data-dcnode-id="689" instrument_node=""> </span><div class="col-md-4" data-dcnode-id="668"><div class="stage_driver not-updated-service decide" data-dcnode-id="671"><div class="widget default" data-dcnode-id="674"><div class="card" data-dcnode-id="677"><div class="card-body" data-dcnode-id="680"><h3 class="card-title" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Need Help?</span></h3><p class="card-text" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Our client services team are always happy to talk to you about what's best for your needs</span></p><span data-dcnode-id="683" instrument_node=""> </span><a class="btn btn-secondary btn-lg btn-block ga-track-stage-decide-cta-btn" data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/get-started/" title="Get Started"><span data-dcnode-id="682" instrument_node="">Get Started</span></a></div><span data-dcnode-id="679" instrument_node=""> </span></div><span data-dcnode-id="676" instrument_node=""> </span></div><span data-dcnode-id="673" instrument_node=""> </span></div><span data-dcnode-id="670" instrument_node=""> </span></div></div><span data-dcnode-id="666" instrument_node=""> </span></div><span data-dcnode-id="663" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="655" instrument_node=""> </span><div class="vc_block" data-dcnode-id="580"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="581"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="582"><div class="vc_column-inner" data-dcnode-id="583"><div class="wpb_wrapper" data-dcnode-id="584"><div class="block text layout grid wpb_text_column wpb_content_element" data-dcnode-id="585"><div class="container" data-dcnode-id="588"><div class="row" data-dcnode-id="591"><div class="" data-dcnode-id="594"><div class="row" data-dcnode-id="595"><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="644"><article class="object listed text" data-dcnode-id="645"><div class="card" data-dcnode-id="646"><div class="card-body" data-dcnode-id="647"><h2 data-dcnode-id="652" style="text-align: left;"><span data-dcnode-id="653" instrument_node="">Contributing to your pension to reduce income tax liability</span></h2><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Pension contributions are eligible for tax relief as the government offers generous tax breaks to encourage pension saving for company directors. Your retirement strategy can ensure the extraction of maximum cash from the company when retiring.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">It is measured at the same rate as your income tax rate. In other words, if you are paying income tax at a higher rate (40%), you will get 40% tax relief on your pension. Likewise, if you are taxed at a lower rate (20%), you would get tax relief at that rate.</span></p></div></div></article></div><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="597"><article class="object listed text" data-dcnode-id="598"><div class="card" data-dcnode-id="599"><div class="card-body" data-dcnode-id="600"><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">&nbsp;</span></p><p data-dcnode-id="639"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The maximum pension contribution one can make is in relation to your age;</span></strong></p><table data-dcnode-id="602" width="533"><tbody data-dcnode-id="603"><tr data-dcnode-id="634"><td data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Age</span></td><td data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Contribution</span></td></tr><tr data-dcnode-id="629"><td data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">under 30 years</span></td><td data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">15% of earnings</span></td></tr><tr data-dcnode-id="624"><td data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">30-39 years</span></td><td data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">20% of earnings</span></td></tr><tr data-dcnode-id="619"><td data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">40-49 years</span></td><td data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">25% of earnings</span></td></tr><tr data-dcnode-id="614"><td data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">50-54 years</span></td><td data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">30% of earnings</span></td></tr><tr data-dcnode-id="609"><td data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">55-59 years</span></td><td data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">35% of earnings</span></td></tr><tr data-dcnode-id="604"><td data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">60 years plus</span></td><td data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">40% of earnings</span></td></tr></tbody></table><p data-dcnode-id="601"></p></div></div></article></div><div class="clear" data-dcnode-id="596"></div></div></div><span data-dcnode-id="593" instrument_node=""> </span></div><span data-dcnode-id="590" instrument_node=""> </span></div><span data-dcnode-id="587" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="579" instrument_node=""> </span><div class="vc_block" data-dcnode-id="502"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="503"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="504"><div class="vc_column-inner" data-dcnode-id="505"><div class="wpb_wrapper" data-dcnode-id="506"><div class="block text layout grid wpb_text_column wpb_content_element" data-dcnode-id="507"><div class="container" data-dcnode-id="510"><div class="row" data-dcnode-id="513"><div class="" data-dcnode-id="516"><div class="row" data-dcnode-id="517"><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="546"><article class="object listed text" data-dcnode-id="547"><div class="card" data-dcnode-id="548"><div class="card-body" data-dcnode-id="549"><h2 data-dcnode-id="576" style="text-align: left;"><span data-dcnode-id="577" instrument_node="">Business and pre-trading expenses</span></h2><p data-dcnode-id="567"><span data-contrast="auto" data-dcnode-id="570"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/sole-trader-limited-company/"><span data-dcnode-id="575" instrument_node="">Sole Traders and Limited Companies</span></a><span data-dcnode-id="573" instrument_node="">&nbsp;can claim&nbsp;</span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/tax-deductible-expenses-for-companies-sole-traders/"><span data-dcnode-id="572" instrument_node="">tax-deductible business expenses</span></a></span><span data-contrast="auto" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node=""> to reduce the amount of tax they are liable to pay at the end of the year and reduce the overall tax amount.&nbsp;</span></span></p><p data-dcnode-id="555"><span data-contrast="auto" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">You can also claim back expenses incurred in the 3 years before you started trading. These are known as pre-trading expenses and can include</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">&nbsp;a</span></span><span data-contrast="auto" data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">ccounting and&nbsp;</span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accountantonline.ie/guides/company-formation/"><span data-dcnode-id="561" instrument_node="">company formation</span></a><span data-dcnode-id="559" instrument_node="">&nbsp;fees.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">&nbsp;</span></span></p><p data-dcnode-id="550"><span data-contrast="auto" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">To discuss the full list of business expenses you can claim as tax relief for your company, reach out to us today – we’re happy to advise you on minimising your business’ tax liability.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">&nbsp;</span></span></p></div></div></article></div><div class="col-xs-12 col-sm-6 col-md-6 col-lg-6" data-dcnode-id="519"><a olumn wpb_content_element" data-dcnode-id="460"><div class="container" data-dcnode-id="463"><div class="row" data-dcnode-id="466"><div class="col-md-7 mr-md-auto" data-dcnode-id="489"><div class="header" data-dcnode-id="497"><h2 data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Am I using all my tax credits and tax reliefs?</span></h2></div><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Keep your accountant up-to-date on your personal circumstances so they can adjust your tax credits and reliefs accordingly. Your accountant can help reduce your tax liability by indicating which schemes you are eligible for. This is a list of popular ways to reduce your tax bill, but not an exhaustive list. Everyone’s tax and business expenditures are different.</span></p><p data-dcnode-id="490"><span data-contrast="auto" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">If you are unsure what tax schemes you are entitled to, we’re happy to help. Talk to a member of our Client Services team to discuss how to minimise your business’s tax.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="488" instrument_node=""> </span><div class="col-md-4" data-dcnode-id="467"><div class="stage_driver not-updated-service decide" data-dcnode-id="470"><div class="widget default" data-dcnode-id="473"><div class="card" data-dcnode-id="476"><div class="card-body" data-dcnode-id="479"><h3 class="card-title" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Need Help?</span></h3><p class="card-text" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Our client services team are always happy to talk to you about what's best for your needs</span></p><span data-dcnode-id="482" instrument_node=""> </span><a class="btn btn-secondary btn-lg btn-
