</span><a class="Description-2 mb-1.5 mr-4 font-bold inline-block rounded-full py-1.5 px-3.5 border border-bcblue-light" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestcompany.com/tax-relief/blog%3Ftag%3Dtax-preparation"><span data-dcnode-id="1309" instrument_node="">

</span><section class="relative flex flex-col lg:flex-row pt-7 pb-7 md:pb-16" data-dcnode-id="788"><span data-dcnode-id="1299" instrument_node="">
</span><div class="flex-1 w-full max-w-full mr-6 prose lg:w-auto" data-dcnode-id="865"><span data-dcnode-id="1298" instrument_node="">
</span><div class="md:mb-10" data-dcnode-id="1156"><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><img alt="reusable bag with recycle symbol and earth on it by dead leaves" data-dcnode-id="1296" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.bestcompany.com/blog/recycle-earth-leaves.jpg&amp;raw" width="800"></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290"><em data-dcnode-id="1291"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Guest Post by Peter Spano</span></strong></em></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">It is a well-established fact that recycling has a wide range of benefits on the environment, primarily by reducing our society’s dependence on natural resources. For example, the process of recycling aluminum — a common non-renewable resource — requires </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nems.nih.gov/environmental-programs/Pages/Benefits-of-Recycling.aspx" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1287" instrument_node="">95 percent less energy than creating new aluminum from raw materials</span></a><span data-dcnode-id="1285" instrument_node="">.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1282" instrument_node="">That’s why it’s important for modern-day businesses to maintain viable waste reduction programs; it’s just the sensible thing to do for our planet. </span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">But apart from the ethical considerations of managing waste properly, recycling also provides some practical bottom-line benefits for companies during tax season. A business that recycles its waste products in accordance with accepted procedures can qualify for one or more tax breaks. What follows is a partial list of tax breaks and related financial incentives that may be available to a business that follows sound recycling practices.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Helping the environment and receiving tax breaks at the same time? It’s a win-win.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><h2 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">IRS tax credits</span></h2><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The Internal Revenue Service offers the following financial incentives connected to a business's compliance with recycling standards:&nbsp;</span></p><span data-dcnode-id="1269" instrument_node="">
</span><h3 data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Qualified reuse and recycling property allowance</span></h3><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">“Qualified reuse and recycling property” refers to any kind of equipment or machinery, along with any software used in conjunction with it, that is dedicated to collecting, distributing, or recycling certain recyclable materials. If your property has been depreciated under the guidelines of the Modified Accelerated Cost Recovery System (MACRS), and the property was initially used after August 31, 2008, then you may qualify for a 50 percent depreciation allowance. To learn more about this allowance, please see </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-publication-946" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1264" instrument_node="">IRS Publication 946</span></a><span data-dcnode-id="1262" instrument_node="">, How To Depreciate Property.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h3 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Qualifying advanced energy project credit</span></h3><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node="">This is accessible to businesses that invest in a qualifying advanced energy project for their manufacturing facility that produces fuel cells, microturbines, electric grids, certain electric motor vehicles, or other materials of this nature. More information can be found on </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-form-3468" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1255" instrument_node="">Form 3468</span></a><span data-dcnode-id="1253" instrument_node="">, Investment Credit.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><h2 data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">State tax incentives</span></h2><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Many tax credits and related incentives are available through state governments in addition to those that can be obtained from the IRS. The majority of U.S. states have tax incentive programs for businesses that adhere to accepted recycling practices. These programs can take the form of rebates, tax credits, sales tax exemptions, or another type of incentive.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Although we don’t have the space here to examine all the programs in force at the state level, we can briefly touch on some state tax incentives currently on the books.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><h3 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">California</span></h3><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1238" instrument_node="">The state offers a </span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdtfa.ca.gov/industry/manufacturing-exemptions.htm" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1237" instrument_node="">partial exemption</span></a><span data-dcnode-id="1235" instrument_node=""> of sales and use tax on specified manufacturing equipment used for generating, producing, storing, or distributing electric power. In addition, Department of Resources Recycling and Recovery (CalRecycle) has a Recycling Market Development Zone Loan (</span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calrecycle.ca.gov/RMDZ" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1234" instrument_node="">RMDZ</span></a><span data-dcnode-id="1232" instrument_node="">) program, which provides loans and free product marketing to businesses that agree to use waste-steam materials from one of the specified zones across California. More information about these and other programs can be viewed on the official </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calrecycle.ca.gov/business/incentives" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1231" instrument_node="">CalRecycle</span></a><span data-dcnode-id="1229" instrument_node=""> website.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Florida</span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">The state offers a </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//floridadep.gov/waste/waste/content/rbac-recycling-tax-incentives-florida" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1222" instrument_node="">sales tax exemption</span></a><span data-dcnode-id="1220" instrument_node=""> for the purchase of any "resource recovery equipment" used for a local government recycling program.&nbsp;</span></p><span data-dcnode-id="1218" instrument_node="">
</span><h3 data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Texas</span></h3><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">The state has a </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tceq.texas.gov/airquality/taxrelief" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1213" instrument_node="">Tax Relief for Pollution Control Property Program</span></a><span data-dcnode-id="1211" instrument_node=""> for businesses that maintain property or equipment capable of sufficiently reducing the facility's environmental burden.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Kentucky</span></h3><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">The state allows individuals and corporations to claim a </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//revenue.ky.gov/Business/Pages/Recycling-Composting-Tax-Credit.aspx" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1204" instrument_node="">50 percent tax credit on any recycling or composting equipment</span></a><span data-dcnode-id="1202" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Recycling incentives at the state level tend to change frequently, so it’s a good idea to check your local government’s website on a periodic basis for updates.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h2 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Department of Energy programs</span></h2><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">The Database of State Incentives for Renewables &amp; Efficiency (DSIRE), funded by the U.S. Department of Energy and operated by the North Carolina Clean Energy Technology Center, has a vast number of energy-efficiency incentives and programs. Some of these programs may be of help in lowering your company’s tax burden. The </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dsireusa.org/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1192" instrument_node="">official website</span></a><span data-dcnode-id="1190" instrument_node=""> lists a variety of loans, grants, rebates, energy audits, advisory services, discount programs, tax exemptions, and other incentives that are available at the city, county, or state level. All fifty states are represented here.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Take the time to search through the DSIRE website — most states have literally dozens of opportunities listed, and it’s likely that you aren’t already aware of some of them.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">It's also worth pointing out that maintaining eco-friendly operational practices can lead to additional financial benefits that aren’t as easily quantifiable as tax credits. Modern consumers, by and large, support environmentally positive business practices. They will often go out of their way to patronize companies that demonstrate a dedication to minimizing their impact on the environment. In fact, </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/solitairetownsend/2018/11/21/consumers-want-you-to-help-them-make-a-difference" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1183" instrument_node="">one survey</span></a><span data-dcnode-id="1181" instrument_node=""> has found that 88 percent of consumers have a preference for brands that help them live in an eco-positive way.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">If your company is doing its part to aid the environment, don’t be shy about advertising that fact. Publicizing your recycling efforts can bolster your bottom line.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><h2 data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">How a waste consultant can help</span></h2><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">These days, staying environmentally conscious is undoubtedly a wise business policy, but it can be difficult for organizations to reach their sustainability goals. For that reason, many organizations turn to a waste consulting company that delivers advisory services to the business community. </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globaltrashsolutions.com/waste-management-consultants/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1171" instrument_node="">Waste consulting services</span></a><span data-dcnode-id="1169" instrument_node=""> like these can go a long way toward helping businesses manage their recycling needs.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">By thoroughly analyzing your facilities and its processes, your consulting company will be able to issue recommendations for improving your waste management procedures. In some cases, a waste management consultant can even sell or rent state-of-the-art recycling equipment such as balers and compactors. It’s an excellent money- and time-saving way to boost your recycling efforts.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1158"><em data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">Peter Spano is the founder and CEO of </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globaltrashsolutions.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1162" instrument_node="">Global Trash Solutions</span></a><span data-dcnode-id="1160" instrument_node="">, a company dedicated to providing waste management services and products to the business community. He is the inventor of the GTS2000 trash compactor, which has been successfully used by McDonalds, Burger King, Starbucks, and many other major corporations.</span></em></p><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
