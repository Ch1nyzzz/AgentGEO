</span><h1 class="entry-title" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Residential energy credits: Home improvements that qualify for 2018</span></h1><span data-dcnode-id="873" instrument_node=""> </span></div><span data-dcnode-id="871" instrument_node="">
</span><div class="byline byline-minimal" data-dcnode-id="865"><span data-dcnode-id="870" instrument_node="">
</span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creditkarma.com/author/christy-rakoczy-bieber" target="_blank"><span class="author vcard" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Written by:  Christy Rakoczy Bieber</span></span></a><span data-dcnode-id="866" instrument_node=""> </span></div><span data-dcnode-id="864" instrument_node="">

</span><div class="editorial-navigational-sidebar-container" data-dcnode-id="845"><span data-dcnode-id="852" instrument_node="">
</span><div class="nutshell" data-dcnode-id="847"><span data-dcnode-id="851" instrument_node="">
</span><p class="nutshell__title" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">
			In a Nutshell		</span></p><span data-dcnode-id="848" instrument_node="">

		If you make energy-efficiency improvements to your home, you may be able to get residential energy tax credits for at least some of the costs of those upgrades. You’ll need to fill out Form 5695 to claim these credits, which can be worth several thousand dollars depending on the improvements you make.	</span></div><span data-dcnode-id="846" instrument_node="">
</span></div><span data-dcnode-id="844" instrument_node="">
</span><div class="entry-content" data-dcnode-id="338"><span data-dcnode-id="843" instrument_node="">

</span><div data-dcnode-id="779"><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><em data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">This article was fact-checked by our editors and reviewed by </span><a data-dcnode-id="787" href="#jennifersamuel"><span data-dcnode-id="788" instrument_node="">Jennifer Samuel</span></a><span data-dcnode-id="786" instrument_node="">, senior product specialist for Credit Karma Tax®.</span></em></p><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">A more energy-efficient home helps your wallet and the planet over the long term, reducing your energy costs and potentially improving your home’s resale value.</span></h2><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">The idea is that upgrades to improve energy efficiency will pay for themselves over time. But still, the up-front costs of making those improvements can be steep.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">The good news? You may be able to get a tax break for certain home improvement projects that make your house more efficient.</span></p><span data-dcnode-id="772" instrument_node="">
</span><section class="ck-signup-widget cta-non-offer --with-orange-gradient" data-dcnode-id="764"><span data-dcnode-id="771" instrument_node="">
</span><span class="ck-signup-widget__title" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Credit Karma Tax® — Always free</span></span><span data-dcnode-id="768" instrument_node="">
</span><a class="ck-signup-widget__action" data-click-tracking-key="cta-non-offer-1" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creditkarma.com/tax" rel="noopener" target="_blank"><span data-dcnode-id="767" instrument_node="">
			Learn More 		</span></a><span data-dcnode-id="765" instrument_node="">
</span></section><span data-dcnode-id="763" instrument_node="">
</span><hr data-dcnode-id="762"><span data-dcnode-id="761" instrument_node="">
</span><h2 data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Basics of residential energy credits</span></strong></h2><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">“Several renewable energy tax credits have been extended under the Bipartisan Budget Act of 2018,” explains Jacob Dayan, CEO and co-founder of Community Tax. “They’ll be in effect until 2021, with a gradual step-down in credit value each year.”</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">In December 2018, the House of Representatives Ways and Means Committee also introduced legislation to extend other credits for energy-efficiency improvements to nonbusiness properties, but that legislation didn’t pass before Congress ended its 2018 session.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">While these tax credits can be quite generous, there are strict rules and limitations for claiming them — and you need to make sure your improvements qualify.</span></p><span data-dcnode-id="748" instrument_node="">
</span><section class="ck-fast-facts" data-dcnode-id="717"><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">FAST FACTS</span></h3><span data-dcnode-id="744" instrument_node="">
</span><h4 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">What’s the difference between a tax credit and a tax deduction?</span></h4><span data-dcnode-id="741" instrument_node="">
</span><div class="ck-fast-facts__content" data-dcnode-id="728"><span data-dcnode-id="740" instrument_node="">
</span><div class="ck-fast-facts__image alignleft" data-dcnode-id="736"><span data-dcnode-id="739" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="738" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creditkarma-cms.imgix.net/wp-content/uploads/2018/02/gettyimages-90079709-deductcredit-e1517601659469.jpg%3Fauto%3Dcompress&amp;raw"><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">A tax deduction can help lower your tax bill by reducing the amount of income on which you’ll pay tax. Your income bracket can affect how much a tax deduction will save you. A tax credit is a dollar-for-dollar reduction in the amount of tax you owe.</span></p><p data-dcnode-id="730"><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creditkarma.com/tax/i/tax-deduction-and-tax-credit" rel="noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">Learn more about the difference between tax deductions and tax credits.</span></a></p><span data-dcnode-id="729" instrument_node=""> </span></div><span data-dcnode-id="727" instrument_node="">
</span><div class="ck-fast-facts__actions" data-dcnode-id="719"><span data-dcnode-id="726" instrument_node="">
</span><a class="js-ck__toggle--fast-facts" data-dcnode-id="721" href="#"><span data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Show</span></span><span data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Hide</span></span></a><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span></section><span data-dcnode-id="716" instrument_node="">
</span><h2 data-dcnode-id="713"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Residential renewable-energy tax credits</span></strong></h2><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="709"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">What improvements qualify?</span></strong></h3><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Residential renewable-energy tax credits may provide a credit valued at up to 30% of the cost of …</span></p><span data-dcnode-id="705" instrument_node="">
</span><ul data-dcnode-id="688"><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Solar panels that generate electricity in a home used as a residence</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Solar-powered water heaters that perform at least half the home’s water heating in a U.S. home used as a residence</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Wind turbines that generate energy for a home used as a residence</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Geothermal heat pumps for heating and cooling a home used as a residence</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Fuel cells that generate at least 0.5 kW and have an electricity-generating efficiency of more than 30% (for fuel cells installed only in a primary home)</span></li><span data-dcnode-id="689" instrument_node="">
</span></ul><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">These credits are available for a new-construction home (once you start living in it) as well as for improvements to an existing home. And, with the exception of the fuel cell credit, they’re available for both primary and secondary homes.</span></p><span data-dcnode-id="684" instrument_node="">
</span><h3 data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">How do you claim residential energy credits?</span></strong></h3><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">To claim your residential energy credits, you’ll need to complete </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-form-5695" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="678" instrument_node="">IRS Form 5695</span></a><span data-dcnode-id="676" instrument_node="">. This form requires you to provide information on the costs of your solar, wind or geothermal system.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">You’ll need to ensure the energy-efficient improvements meet IRS requirements to be eligible for the credit. For example, you can claim a credit for your solar water heater only if the property is certified by the nonprofit Solar Rating Certification Corporation or by a comparable entity endorsed by the state government where the property you improved is located. And at least half the energy that powers the water heater must be solar.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">The </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-form-5695" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="669" instrument_node="">instructions for IRS Form 5695</span></a><span data-dcnode-id="667" instrument_node=""> provide details on the specific requirements for each type of improvement. As these instructions explain, you can claim the credit in the year when your fuel cells, solar system, wind system or geothermal units are installed. Or if you’re having a home built or reconstructed, you can claim the credit when you first begin using the home.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The credit is nonrefundable: If it reduces the tax you owe to zero, you can’t get any remaining balance returned to you as a refund.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">The total amount of residential energy credits you receive can’t exceed the amount of tax due for the year in which you claim the credit. But if you don’t owe enough to claim your full credit, you can carry the unused amount over to the next tax year.</span></p><span data-dcnode-id="659" instrument_node="">
</span><div class="cta-non-offer" data-dcnode-id="656"><a class="callout -link" data-click-tracking-key="cta-non-offer" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creditkarma.com/tax/i/refundable-tax-credits" rel="" target="_blank"><span data-dcnode-id="658" instrument_node="">Learn about three refundable tax credits</span></a></div><span data-dcnode-id="655" instrument_node="">
</span><h3 data-dcnode-id="652"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">How much are residential energy credits worth?</span></strong></h3><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Residential energy credits can be quite valuable.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">“You can get a hefty sum back” as a return on your investment, Dayan said.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">However, the specific value of the credits varies depending upon the cost of your system, as well as how much tax you owe.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">If you qualify, you can claim up to 30% of the total costs, including labor costs for preparing your property for the energy-efficiency improvements. According to the U.S. Energy Information Administration, average construction costs for solar power were $2,436 per kW in 2016, so a 10 kW system would cost around $24,360 on average. A credit equal to 30% of that cost would be worth $7,308. Remember, though, if you owe less than that amount in taxes for the year, your credit for 2018 would be capped at the amount.</span></p><span data-dcnode-id="639" instrument_node="">
</span><section class="ck-sem__tax-signup" data-dcnode-id="608"><span data-dcnode-id="638" instrument_node="">

</span><h2 data-dcnode-id="604"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Nonbusiness energy property credits</span></strong></h2><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="600"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">What improvements qualify?</span></strong></h3><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The nonbusiness energy credit has expired, and will not be available for your 2018 taxes unless Congress acts to renew it. If nonbusiness energy property credits are renewed for 2018 and unchanged from 2017, they could be available for certain improvements to energy efficiency. The 2018 list of eligible improvements included the following:</span></p><span data-dcnode-id="596" instrument_node="">
</span><ul data-dcnode-id="576"><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Adding insulation specifically to reduce heat loss or gain</span></li><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Upgrading to energy-efficient windows, skylights or exterior doors</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Installing a metal roof with pigmented coatings or an asphalt roof with cooling granules intended to reduce a home’s heat gain</span></li><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Installing certain electrical heat-pump water heaters, central air conditioners, or heaters or stoves that use biomass</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Upgrading to a qualifying energy-efficient furnace or boiler</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Installing qualifying air-circulating fans</span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">In 2017, these improvements could entitle you to nonbusiness energy property credits only if they were made to your primary home that you owned during the tax year.</span></p><span data-dcnode-id="572" instrument_node="">
</span><h3 data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Claiming nonbusiness energy property credits</span></strong></h3><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">If Congress renews the nonbusiness energy property credit for 2018, it would be claimed by completing IRS Form 5695.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">To claim the credits, you must meet all qualifying criteria. This means your home must be your main, or primary, home and the improvements to energy efficiency must meet specific energy standards. If you are upgrading insulation, windows or skylights, exterior doors, or roofing, the components must be expected to last for at least five years.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h3 data-dcnode-id="559"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">How much can nonbusiness energy property credits be worth?</span></strong></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Nonbusiness energy property credits could be worth up to 10% of the amount paid for improvements if Congress extends them with the same qualifications and rules as the 2017 credits. But there are limits based on the specific credit. For example …</span></p><span data-dcnode-id="555" instrument_node="">
</span><ul data-dcnode-id="544"><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">You can take a maximum $500 credit combined for all tax years after 2005.</span></li><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">You’re limited to a combined credit of $200 for windows for all tax years after 2005.</span></li><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">You can claim a maximum credit of $50 for advanced main air circulating fans, $150 for a qualifying furnace or boiler and $300 for energy-efficient building property.</span></li><span data-dcnode-id="545" instrument_node="">
</span></ul><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">This lifetime cap means that if you’ve claimed at least $500 in credits in the past, you won’t be able to claim credits again in 2018, if Congress renews the credit.</span></p><span data-dcnode-id="540" instrument_node="">
</span><div class="cta-non-offer" data-dcnode-id="537"><a class="callout -link" data-click-tracking-key="cta-non-offer" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creditkarma.com/tax/i/tax-reform-for-homeowners" rel="" target="_blank"><span data-dcnode-id="539" instrument_node="">How will tax reform affect homeowners?</span></a></div><span data-dcnode-id="536" instrument_node="">
</span><h2 data-dcnode-id="533"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Other advantages to improving the energy efficiency of your home</span></strong></h2><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Earning tax credits is a good reason to improve the energy efficiency of your home, but reducing your federal taxes isn’t the only reason to act.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Better energy efficiency can lower your ongoing costs and make your home more valuable to would-be buyers. In fact, the U.S. Department of Energy estimates your property value rises $20 for each $1 in utility-bill savings when you install a solar electric system.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">You may also be eligible for rebates from your utility company, as well as for state tax credits, and property tax credits to further defray up-front costs. Just be aware that you typically can’t double dip by taking a state credit and federal credit for the same improvements.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">“Check your state and local websites to see if there are any additional tax credits you might qualify for,” Dayan says.</span></p><span data-dcnode-id="520" instrument_node="">
</span><hr data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
</span><h2 data-dcnode-id="515"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Bottom line</span></strong></h2><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Residential energy efficient property credit is available through 2021, and Congress looks ready to extend some energy credits that expired in 2017. So if you’re thinking about installing solar power, a solar water heater, a geothermal unit or fuel cells, now is probably a good time to act. For residential energy-efficient properties, you could get tax credits valued at up to 30% of your costs, which can lead to a pretty big tax break.</span></p><span data-dcnode-id="511" instrument_node="">
</span><hr data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="500"><em data-dcnode-id="501"><strong data-dcnode-id="506"><a data-dcnode-id="508" id="jennifersamuel"></a><span data-dcnode-id="507" instrument_node="">Jennifer Samuel</span></strong><span data-dcnode-id="505" instrument_node="">, senior tax product specialist for Credit Karma Tax®, has more than a decade of experience in the tax preparation industry, including work as a tax analyst and tax preparation professional. She holds a bachelor’s degree in accounting from Saint Leo University. You can find her on </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/taxlife11/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="504" instrument_node="">LinkedIn</span></a><span data-dcnode-id="502" instrument_node="">.</span></em></p><span data-dcnode-id="499" instrument_node="">
