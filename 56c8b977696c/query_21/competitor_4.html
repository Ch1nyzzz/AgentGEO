op" width="84"><p align="right" data-dcnode-id="4192"><font data-dcnode-id="4193" face="Arial" size="2"><span data-dcnode-id="4194" instrument_node="">0.2</span></font></p></td><td data-dcnode-id="4186" valign="top" width="180"><p align="right" data-dcnode-id="4187"><font data-dcnode-id="4188" face="Arial" size="2"><span data-dcnode-id="4189" instrument_node="">100%</span></font></p></td><td data-dcnode-id="4181" valign="top" width="211"><p align="right" data-dcnode-id="4182"><font data-dcnode-id="4183" face="Arial" size="2"><span data-dcnode-id="4184" instrument_node="">0.0%</span></font></p></td></tr><tr data-dcnode-id="4158"><td data-dcnode-id="4174" valign="top" width="108"><p data-dcnode-id="4175"><font data-dcnode-id="4176" face="Arial" size="2"><span data-dcnode-id="4177" instrument_node="">Wind</span></font></p></td><td data-dcnode-id="4169" valign="top" width="84"><p align="right" data-dcnode-id="4170"><font data-dcnode-id="4171" face="Arial" size="2"><span data-dcnode-id="4172" instrument_node="">1258.5</span></font></p></td><td data-dcnode-id="4164" valign="top" width="180"><p align="right" data-dcnode-id="4165"><font data-dcnode-id="4166" face="Arial" size="2"><span data-dcnode-id="4167" instrument_node="">91%</span></font></p></td><td data-dcnode-id="4159" valign="top" width="211"><p align="right" data-dcnode-id="4160"><font data-dcnode-id="4161" face="Arial" size="2"><span data-dcnode-id="4162" instrument_node="">83.0%</span></font></p></td></tr><tr data-dcnode-id="4136"><td data-dcnode-id="4152" valign="top" width="108"><p data-dcnode-id="4153"><font data-dcnode-id="4154" face="Arial" size="2"><span data-dcnode-id="4155" instrument_node="">Totals</span></font></p></td><td data-dcnode-id="4147" valign="top" width="84"><p align="right" data-dcnode-id="4148"><font data-dcnode-id="4149" face="Arial" size="2"><span data-dcnode-id="4150" instrument_node="">1515.4</span></font></p></td><td data-dcnode-id="4142" valign="top" width="180"><p align="right" data-dcnode-id="4143"><font data-dcnode-id="4144" face="Arial" size="2"><span data-dcnode-id="4145" instrument_node="">79%</span></font></p></td><td data-dcnode-id="4137" valign="top" width="211"><p align="right" data-dcnode-id="4138"><font data-dcnode-id="4139" face="Arial" size="2"><span data-dcnode-id="4140" instrument_node="">100.0%</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="4130"><font data-dcnode-id="4131" face="NewCenturySchlbk"><span data-dcnode-id="4132" instrument_node="">Given the dominance of wind in the renewable resource portfolio that has emerged under the Texas RPS, as noted above, SB 20 included a 500 MW goal for the development of non-wind resources.  According to Texas PUC staff, staff is developing proposed rule language that would increase the incentives for non-wind resources by increasing the number of RECs associated with each MWh of non-wind renewable generation.  This approach is similar to New Mexico's (see New Mexico case study below). </span></font></p><p data-dcnode-id="4124"><b data-dcnode-id="4125"><i data-dcnode-id="4126"><font data-dcnode-id="4127" face="Verdana"><a data-dcnode-id="4129" name="P590_126903"></a><span data-dcnode-id="4128" instrument_node="">Geographic Flexibility</span></font></i></b></p><p data-dcnode-id="4115"><font data-dcnode-id="4122" face="NewCenturySchlbk"><span data-dcnode-id="4123" instrument_node="">In order to generate RECs to be applied toward an LSE's RPS obligations, the energy produced by a renewable resource must be generated in, or delivered directly into, the Texas grid.</span></font><sup data-dcnode-id="4118"><font data-dcnode-id="4119" face="Arial" size="2"><a data-dcnode-id="4120" href="#P593_127107" name="P593_127108"><span data-dcnode-id="4121" instrument_node="">43</span></a></font></sup><font data-dcnode-id="4116" face="NewCenturySchlbk"><span data-dcnode-id="4117" instrument_node=""> This requirement was established as a way to ensure that the vast majority of renewable facilities resulting from the RPS mandate are built in Texas, and is thus responsive to the goal of increasing the amount of renewable capacity in the state.  However, because compliance is ultimately based on RECs, eligibility requirements that allow only those RECs generated by projects in Texas were viewed as potentially in conflict with the Interstate Commerce Clause.  To get around this issue, but still ensure that the vast majority of projects participating in the RPS are built in Texas, the PUC determined that only RECs associated with energy produced by generators located in or directly interconnected to the Texas grid would be eligible.  Although analogous to California's delivery requirement, it is important to note that unlike CAISO, the Electric Reliability Council of Texas (ERCOT) is essentially an energy island unto itself, such that energy that is delivered outside of ERCOT cannot physically reach customers within ERCOT.  This would appear to provide a more solid basis from a commerce clause standpoint of limiting the eligibility of RECS produced by facilities that deliver outside of ERCOT since these facilities are not producing energy that can be used in Texas.  </span></font></p><p data-dcnode-id="4106"><font data-dcnode-id="4113" face="NewCenturySchlbk"><span data-dcnode-id="4114" instrument_node="">Wind resources and associated projects are located primarily in the western part of the state.  To the extent that the benefits sought through the RPS are based on where the energy is delivered, or where it is generated, the benefits produced thus far under the Texas RPS are unevenly distributed across the state and across ratepayers. Communities in western Texas receive the direct economic development benefits of the RPS, and ratepayers served by the larger LSEs receive the fuel diversity benefits associated with long-term contracting for renewable energy.  For other categories of benefit, however, the implications are either unclear, as in the case of air quality benefits, or are unchanged, owing to the more diffuse or public nature of the benefit category in question. It is difficult to assess who receives the air quality benefits derived from the displacement of conventional power without modeling dispatch under different renewable deployment scenarios to determine the type and location of those resources that would get displaced.  According to Texas PUC staff, the renewable output in western Texas is most significant during non-peak times, both on a daily and seasonal basis.</span></font><sup data-dcnode-id="4109"><font data-dcnode-id="4110" face="Arial" size="2"><a data-dcnode-id="4111" href="#P596_129850" name="P596_129851"><span data-dcnode-id="4112" instrument_node="">44</span></a></font></sup><font data-dcnode-id="4107" face="NewCenturySchlbk"><span data-dcnode-id="4108" instrument_node=""> Although regional air quality issues are less of a concern during times when wind output is the greatest, it is important not to discount the localized air quality benefits that may be realized through the displacement of conventional facilities.    </span></font></p><p data-dcnode-id="4100"><b data-dcnode-id="4101"><i data-dcnode-id="4102"><font data-dcnode-id="4103" face="Verdana"><a data-dcnode-id="4105" name="P597_130926"></a><span data-dcnode-id="4104" instrument_node="">Temporal Flexibility</span></font></i></b></p><p data-dcnode-id="4085"><font data-dcnode-id="4098" face="NewCenturySchlbk"><span data-dcnode-id="4099" instrument_node="">According to Texas PUC staff, the availability of RECs varies substantially from one year to the next.  In absence of the ability to bank, all else being equal, this will result in substantial price volatility in the market for RECs. Banking provides a means by which obligated entities can over-procure RECs when they are cheap (i.e. when output is high) and save them for periods when the price of RECs is high (i.e., when output is low).  In Texas, wind output is thought to be on a three year cycle, which, according to Texas PUC staff, provided the principal rationale for allowing RECs to be banked for three years.</span></font><sup data-dcnode-id="4094"><font data-dcnode-id="4095" face="Arial" size="2"><a data-dcnode-id="4096" href="#P600_131567" name="P600_131568"><span data-dcnode-id="4097" instrument_node="">45</span></a></font></sup><font data-dcnode-id="4092" face="NewCenturySchlbk"><span data-dcnode-id="4093" instrument_node="">  In addition, banking, as a general matter, reduces the risk associated with the relative difficulty LSEs may have in predicting load. These problems are likely to be particularly acute for those operating in a competitive retail market like Texas.  If an LSE purchases a substantial number of RECs under a load assumption that proves to be too high, banking ensures that the value of excess RECs is not completely stranded.  They can be held and used in subsequent compliance periods, thus reducing the REC purchases that would need to be made in those periods, or they can be resold to another entity to be applied toward their obligations.</span></font><sup data-dcnode-id="4088"><font data-dcnode-id="4089" face="Arial" size="2"><a data-dcnode-id="4090" href="#P601_132249" name="P601_132250"><span data-dcnode-id="4091" instrument_node="">46</span></a></font></sup><font data-dcnode-id="4086" face="NewCenturySchlbk"><span data-dcnode-id="4087" instrument_node=""> </span></font></p><p data-dcnode-id="4082"><font data-dcnode-id="4083" face="NewCenturySchlbk"><span data-dcnode-id="4084" instrument_node="">Borrowing under the Texas program was limited to 2002 and 2003, with obligated LSEs allowed to carry forward, without penalty, deficits of up to 10% of their compliance obligations for one compliance period.  For all compliance periods since, LSEs must meet the entirety of their obligations or face penalties of the lesser of twice the average market value of renewable energy credits or $50 per MWH. </span></font></p><p data-dcnode-id="4076"><b data-dcnode-id="4077"><i data-dcnode-id="4078"><font data-dcnode-id="4079" face="Verdana"><a data-dcnode-id="4081" name="P604_132914"></a><span data-dcnode-id="4080" instrument_node="">Participatory Flexibility   </span></font></i></b></p><p data-dcnode-id="4067"><font data-dcnode-id="4074" face="NewCenturySchlbk"><span data-dcnode-id="4075" instrument_node="">The Texas REC program is a fully tradable regime, allowing renewable generators, LSEs, whether obligated or not under the RPS, and third party intermediaries to participate.  As of December 31, 2004, there were 27 renewable generators and 72 competitive LSEs participating in the program.</span></font><sup data-dcnode-id="4070"><font data-dcnode-id="4071" face="Arial" size="2"><a data-dcnode-id="4072" href="#P607_133230" name="P607_133231"><span data-dcnode-id="4073" instrument_node="">47</span></a></font></sup><font data-dcnode-id="4068" face="NewCenturySchlbk"><span data-dcnode-id="4069" instrument_node=""> Because the Texas legislature postponed retail competition in some service territories, and electricity coops and municipal utilities can elect, but are not required, to allow retail competition in their service territories, this does not represent all of the LSEs that are actively participating in REC trading.  Some municipalities have green energy programs or their own renewable energy targets distinct from those established under the RPS.  In addition to their use for RPS compliance purposes, RECs are used by these entities as the unit of account to support green energy claims.</span></font></p><p data-dcnode-id="4061"><b data-dcnode-id="4062"><i data-dcnode-id="4063"><font data-dcnode-id="4064" face="Verdana"><a data-dcnode-id="4066" name="P608_134019"></a><span data-dcnode-id="4065" instrument_node="">Contract Lengths</span></font></i></b></p><p data-dcnode-id="4054"><font data-dcnode-id="4059" face="NewCenturySchlbk"><span data-dcnode-id="4060" instrument_node="">Most of the energy and RECs from the projects in the initial years of the Texas RPS are under long-term contracts with a few of the state's largest utilities, specifically TXU, San Antonio, and the Lower Colorado River Authority.  In order to meet their obligations, other LSEs in the state are relying primarily on unbundled RECs, purchased from these larger LSEs to meet their RPS obligations.  Anecdotal information suggests that several factors motivated the larger utilities to enter into these contracts.  First, aggressive procurement of renewable energy ensured that they would be in compliance with the RPS mandate.  Second, the utilities saw excess procurement as a means to diversify their portfolios and thus be responsive to ratepayer demand for green energy.  In addition, the economics of wind in Texas make it competitive with conventional resources. As it worked out, these utilities found themselves long on RECs, a situation that has proven to be beneficial inasmuch as the power purchase agreements (PPAs) the larger utilities signed facilitated developer financing, while resale of excess RECs to smaller LSEs allows them to comply with the RPS without entering into long-term contracts.  In effect, the larger utilities have bridged the gap between the needs of renewable developers to have long-term contracts with credit worthy counter-parties and the renewable needs of smaller competitive retailers who are unable to enter into such contracts.  Other ESPs entering the market may also be able to assume this role.  In June 2005, an ESP announced that it had entered into a 15-year deal with a generator for the energy and RECs generated by a wind farm near Abilene, Texas.</span></font><sup data-dcnode-id="4055"><font data-dcnode-id="4056" face="Arial" size="2"><a data-dcnode-id="4057" href="#P611_135733" name="P611_135734"><span data-dcnode-id="4058" instrument_node="">48</span></a></font></sup></p><p data-dcnode-id="4051"><font data-dcnode-id="4052" face="NewCenturySchlbk"><span data-dcnode-id="4053" instrument_node="">As the market in Texas matures, anecdotal evidence suggests that renewable developers are increasingly willing to build facilities on a merchant basis (i.e., without a PPA in place).  More well-capitalized renewable energy developers in particular are able to justify investment in renewable generation without long-term contracts in place, on the premise that the combination of REC and energy prices will provide a reasonable return on investment.  While small developers will still face challenges in getting their projects built absent long-term PPAs, the RPS program in Texas appears to provide sufficient certainty to larger entities of the long-term value of renewable energy investments.</span></font></p><p data-dcnode-id="4045"><b data-dcnode-id="4046"><i data-dcnode-id="4047"><font data-dcnode-id="4048" face="Verdana"><a data-dcnode-id="4050" name="P614_136633"></a><span data-dcnode-id="4049" instrument_node="">Tracking System</span></font></i></b></p><p data-dcnode-id="4036"><font data-dcnode-id="4043" face="NewCenturySchlbk"><span data-dcnode-id="4044" instrument_node="">ERCOT acts as the program administrator overseeing the REC tracking program in Texas.  In this capacity, ERCOT monitors and verifies compliance with the state's RPS goals and also provides REC data to LSEs to support green power claims.  In addition to issuing and tracking RECs, ERCOT is also responsible for calculating each LSE's REC obligations and retiring RECs that have either exceeded their three year life or are being applied toward RPS compliance requirements.</span></font><sup data-dcnode-id="4039"><font data-dcnode-id="4040" face="Arial" size="2"><a data-dcnode-id="4041" href="#P617_137119" name="P617_137120"><span data-dcnode-id="4042" instrument_node="">49</span></a></font></sup><font data-dcnode-id="4037" face="NewCenturySchlbk"><span data-dcnode-id="4038" instrument_node=""> RECs are issued to renewable generators for each metered MWh of electricity they produce and deposited into a corresponding account. Each REC provides information regarding a relatively limited set of attributes of the underlying energy including: year and quarter created, the technology type, a facility identification number, and a unique identifier. Transference of RECs is facilitated through an online system, which allows participants to initiate and accept REC transactions.  Although there is no regulation that expressly prohibits disaggregating RECs, the fact that there is no accounting mechanism by which REC attributes can be individually tracked creates a technical barrier to this possibility.  Many of the attributes associated with renewable energy are implicit under the REC system in Texas, with no information collected regarding the avoided emissions. In order for RECs to be transferred to another party, specific identifying information is required including the name of the parties involved, the serial number of the RECs to be transferred, their issuance date, and the renewable resource type that produced them.  Once this information is provided, and the recipient accepts the transfer, ERCOT updates the accounts accordingly and issues a letter of acknowledgement to the parties involved.  No financial information regarding the value or terms and conditions of the sale are recorded by the system as all transactions are conducted on a bilateral basis.  </span></font></p><p data-dcnode-id="4021"><font data-dcnode-id="4034" face="NewCenturySchlbk"><span data-dcnode-id="4035" instrument_node="">The incremental costs of the REC tracking system were estimated to be $500,000 in start-up costs, with ongoing operating costs of approximately $70,000/year, collected through a per MWh fee assessed to all LSEs in the ERCOT region.</span></font><sup data-dcnode-id="4030"><font data-dcnode-id="4031" face="Arial" size="2"><a data-dcnode-id="4032" href="#P620_139151" name="P620_139152"><span data-dcnode-id="4033" instrument_node="">50</span></a></font></sup><font data-dcnode-id="4028" face="NewCenturySchlbk"><span data-dcnode-id="4029" instrument_node="">  Responsible for ensuring system reliability in the state, ERCOT had metering infrastructure in place to measure electricity flows into the grid prior to the establishment of the RPS program, making it the logical choice as system administrator.  This infrastructure plays a critical role in the REC program as it is the means by which the number and allocation of RECs is determined.</span></font><sup data-dcnode-id="4024"><font data-dcnode-id="4025" face="Arial" size="2"><a data-dcnode-id="4026" href="#P621_139764" name="P621_139765"><span data-dcnode-id="4027" instrument_node="">51</span></a></font></sup><font data-dcnode-id="4022" face="NewCenturySchlbk"><span data-dcnode-id="4023" instrument_node=""> </span></font></p><p data-dcnode-id="4015"><b data-dcnode-id="4016"><i data-dcnode-id="4017"><font data-dcnode-id="4018" face="Verdana"><a data-dcnode-id="4020" name="P622_140060"></a><span data-dcnode-id="4019" instrument_node="">Key Observations and Lessons from the Texas Experience with RECs</span></font></i></b></p><p data-dcnode-id="4010"><font data-dcnode-id="4011" face="Arial" size="2"><i data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">·</span></i><span data-dcnode-id="4012" instrument_node=""> Despite the absence of long-term contracting requirements under the Texas RPS, developers in Texas were able to find LSEs willing to enter into long-term PPAs for both their renewable energy and the associated RECs, thus facilitating development.  The willingness of these entities to enter into these contracts is likely driven in part by the competitive economics of wind relative to conventional sources of generation.</span></font></p><p data-dcnode-id="4005"><font data-dcnode-id="4006" face="Arial" size="2"><i data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">·</span></i><span data-dcnode-id="4007" instrument_node=""> Smaller competitive retailers rely largely on unbundled RECs purchased on a short-term basis from those entities that have entered into long-term contracts with developers to comply with their RPS obligations, thus avoiding the risks associated with long-term contracting.</span></font></p><p data-dcnode-id="4000"><font data-dcnode-id="4001" face="Arial" size="2"><i data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">·</span></i><span data-dcnode-id="4002" instrument_node=""> The opportunity/ability to resell RECs to other obligated entities acts as a hedge against the risk associated with long-term bundled contracts entered into by the larger LSEs.</span></font></p><p data-dcnode-id="3995"><font data-dcnode-id="3996" face="Arial" size="2"><i data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">·</span></i><span data-dcnode-id="3997" instrument_node=""> The three-year shelf-life of RECs in Texas ensures that those LSEs that have the majority of RECs under long-term contract have a strong incentive to sell their RECs, thus encouraging market liquidity and facilitating the compliance of competitive ESPs. </span></font></p><p data-dcnode-id="3990"><font data-dcnode-id="3991" face="Arial" size="2"><i data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">·</span></i><span data-dcnode-id="3992" instrument_node=""> Well-capitalized developers appear to be willing to build renewable facilities on a merchant basis, demonstrating that the Texas RPS program is providing sufficient certainty regarding the future value of renewable energy in Texas.  The willingness of these developers to pursue these projects is driven in part by the availability of revenues from both energy and REC sales.</span></font></p><p data-dcnode-id="3985"><font data-dcnode-id="3986" face="Arial" size="2"><i data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">·</span></i><span data-dcnode-id="3987" instrument_node=""> Compliance with the RPS in Texas has occurred almost exclusively through the development of wind resources, principally in west Texas, an outcome that is consistent with the incentives unbundled RECs create to develop least-cost resources regardless of where those resources are located relative to those entities that are obligated under the program. The practical exclusion of other renewable technologies from those being developed under the RPS motivated the Texas legislature to include a 500 MW goal for non-wind resources under SB 20.</span></font></p><p data-dcnode-id="3980"><font data-dcnode-id="3981" face="Arial" size="2"><i data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">·</span></i><span data-dcnode-id="3982" instrument_node=""> Because the best wind resources are located principally in the western part of the state, much of the resource development is occurring in that region. This suggests that the benefits of the RPS program will be unevenly distributed across the state. Economic development benefits will accrue principally to land-owners and communities in western Texas. The benefits associated with the energy itself will accrue primarily to those ratepayers that are served by utilities to whom the electricity is actually delivered. </span></font></p><p data-dcnode-id="3975"><b data-dcnode-id="3976"><font data-dcnode-id="3977" face="Verdana" size="+1"><a data-dcnode-id="3979" name="P638_142688"></a><span data-dcnode-id="3978" instrument_node="">Massachusetts</span></font></b></p><p data-dcnode-id="3972"><font data-dcnode-id="3973" face="NewCenturySchlbk"><span data-dcnode-id="3974" instrument_node="">Like Texas, Massachusetts introduced its RPS program as part of electric restructuring.  The program requires all retail electricity suppliers, defined as all competitive suppliers, to procure four percent of their electricity from new renewable energy sources by 2009.   Municipal utilities are exempt from the RPS requirements unless they allow retail competition in their service territories.  According to the Division of Energy Resources (DOER), the principal objectives of the Massachusetts RPS are fourfold: to decrease pollution from existing power plants, to diversify fuel sources used to generate electricity in Massachusetts, to decrease the state's reliance on fuels imported from other regions, and to moderate price volatility caused by reliance on imported fuels.  Interim compliance targets took effect in 2003, with an initial requirement that a minimum of one percent of energy sold be derived from new renewable sources.  For each year thereafter, this target increases by one half of one percent through 2009. See Table 3, below.  After 2009, the annual compliance target increases by one percent each year, subject to any modification or suspension of the program by the Massachusetts DOER.  In the event that the program is suspended, the minimum percentage of energy sold that must come from new renewable sources going forward will remain at whatever level it was at the time of the suspension. </span></font></p><p data-dcnode-id="3963"><b data-dcnode-id="3968"><font data-dcnode-id="3969" face="NewCenturySchlbk"><a data-dcnode-id="3971" name="P642_144121"></a><span data-dcnode-id="3970" instrument_node="">Table 3: Massachusetts RPS Compliance Targets</span></font></b><sup data-dcnode-id="3964"><font data-dcnode-id="3965" face="Arial" size="2"><a data-dcnode-id="3966" href="#P643_144166" name="P643_144167"><span data-dcnode-id="3967" instrument_node="">52</span></a></font></sup></p><p data-dcnode-id="3863"><span data-dcnode-id="3962" instrument_node="">

</span><table border="1" data-dcnode-id="3864"><tbody data-dcnode-id="3865"><tr data-dcnode-id="3950"><td data-dcnode-id="3956" valign="top" width="204"><p align="center" data-dcnode-id="3957"><font data-dcnode-id="3958" face="Arial" size="2"><span data-dcnode-id="3959" instrument_node="">Compliance Year</span></font></p></td><td data-dcnode-id="3951" valign="top" width="276"><p align="center" data-dcnode-id="3952"><font data-dcnode-id="3953" face="Arial" size="2"><span data-dcnode-id="3954" instrument_node="">Cumulative Minimum Percentage Renewable Energy </span></font></p></td></tr><tr data-dcnode-id="3938"><td data-dcnode-id="3944" valign="top" width="204"><p align="center" data-dcnode-id="3945"><font data-dcnode-id="3946" face="Arial" size="2"><span data-dcnode-id="3947" instrument_node="">2003</span></font></p></td><td data-dcnode-id="3939" valign="top" width="276"><p align="center" data-dcnode-id="3940"><font data-dcnode-id="3941" face="Arial" size="2"><span data-dcnode-id="3942" instrument_node="">1.0</span></font></p></td></tr><tr data-dcnode-id="3926"><td data-dcnode-id="3932" valign="top" width="204"><p align="center" data-dcnode-id="3933"><font data-dcnode-id="3934" face="Arial" size="2"><span data-dcnode-id="3935" instrument_node="">2004</span></font></p></td><td data-dcnode-id="3927" valign="top" width="276"><p align="center" data-dcnode-id="3928"><font data-dcnode-id="3929" face="Arial" size="2"><span data-dcnode-id="3930" instrument_node="">1.5</span></font></p></td></tr><tr data-dcnode-id="3914"><td data-dcnode-id="3920" valign="top" width="204"><p align="center" data-dcnode-id="3921"><font data-dcnode-id="3922" face="Arial" size="2"><span data-dcnode-id="3923" instrument_node="">2005</span></font></p></td><td data-dcnode-id="3915" valign="top" width="276"><p align="center" data-dcnode-id="3916"><font data-dcnode-id="3917" face="Arial" size="2"><span data-dcnode-id="3918" instrument_node="">2.0</span></font></p></td></tr><tr data-dcnode-id="3902"><td data-dcnode-id="3908" valign="top" width="204"><p align="center" data-dcnode-id="3909"><font data-dcnode-id="3910" face="Arial" size="2"><span data-dcnode-id="3911" instrument_node="">2006</span></font></p></td><td data-dcnode-id="3903" valign="top" width="276"><p align="center" data-dcnode-id="3904"><font data-dcnode-id="3905" face="Arial" size="2"><span data-dcnode-id="3906" instrument_node="">2.5</span></font></p></td></tr><tr data-dcnode-id="3890"><td data-dcnode-id="3896" valign="top" width="204"><p align="center" data-dcnode-id="3897"><font data-dcnode-id="3898" face="Arial" size="2"><span data-dcnode-id="3899" instrument_node="">2007</span></font></p></td><td data-dcnode-id="3891" valign="top" width="276"><p align="center" data-dcnode-id="3892"><font data-dcnode-id="3893" face="Arial" size="2"><span data-dcnode-id="3894" instrument_node="">3.0</span></font></p></td></tr><tr data-dcnode-id="3878"><td data-dcnode-id="3884" valign="top" width="204"><p align="center" data-dcnode-id="3885"><font data-dcnode-id="3886" face="Arial" size="2"><span data-dcnode-id="3887" instrument_node="">2008</span></font></p></td><td data-dcnode-id="3879" valign="top" width="276"><p align="center" data-dcnode-id="3880"><font data-dcnode-id="3881" face="Arial" size="2"><span data-dcnode-id="3882" instrument_node="">3.5</span></font></p></td></tr><tr data-dcnode-id="3866"><td data-dcnode-id="3872" valign="top" width="204"><p align="center" data-dcnode-id="3873"><font data-dcnode-id="3874" face="Arial" size="2"><span data-dcnode-id="3875" instrument_node="">2009</span></font></p></td><td data-dcnode-id="3867" valign="top" width="276"><p align="center" data-dcnode-id="3868"><font data-dcnode-id="3869" face="Arial" size="2"><span data-dcnode-id="3870" instrument_node="">4.0</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="3860"><font data-dcnode-id="3861" face="NewCenturySchlbk"><span data-dcnode-id="3862" instrument_node="">Compliance with the Massachusetts RPS can be achieved in three ways. First, an obligated entity can purchase RECs from eligible renewable generators in a given compliance period to be applied toward its RPS targets in that period. This is known as "standard compliance." Second, under "banked compliance," an obligated entity may apply banked RECs, subject to limitations, toward its RPS targets.  Third, if an obligated entity fails to meet it compliance target through the application of either standard or banked RECs, it can make an "alternative compliance payment" (ACP), set initially at $50/MWh.  The ACP is indexed to the Consumer Price Index, and for 2006, was calculated to be $55.13/MWh.  The ACP is intended to function as a safety valve, keeping the costs of compliance under the RPS in check.  However, at the same time, there is legitimate concern that the availability of the ACP may create disincentives to enter into long-term contracts, even if those long-term contracts offer RECs at relatively lower cost, by allowing LSEs to avoid the risks associated with long-term contracts in light of load variability.     </span></font></p><p data-dcnode-id="3857"><font data-dcnode-id="3858" face="NewCenturySchlbk"><span data-dcnode-id="3859" instrument_node="">The program does not include in its targets generation from "old" renewable facilities, i.e. those facilities that began commercial operation prior to December 31, 1997.  In other words, energy produced by these facilities cannot be applied toward the compliance targets established in the RPS.  Should these facilities cease operating, it would have no impact on the amount of new renewable generation obligated entities would need to procure to be in compliance, suggesting that the program provides limited incentives to ensure these facilities continue operating.  Despite this, according to DOER staff, relatively little attrition has occurred in the number of older facilities operating.  Old facilities can, however, produce RECs for generation that is in excess of historical output if they are granted "vintage waivers."  For old facilities that came online prior to 1995, vintage waivers are granted for output in excess of the average output over the three year period between 1995 and 1997.  For those facilities that came online after January 1, 1995, but before 1998, vintage waivers can be granted for output in excess of average output over the first 36 month period following their online date. </span></font></p><p data-dcnode-id="3854"><font data-dcnode-id="3855" face="NewCenturySchlbk"><span data-dcnode-id="3856" instrument_node="">In the 2004 compliance period, 35% of the RPS obligation was achieved through alternative compliance payments.  As a result of constrained supply, the price of RECs in Massachusetts has been near or at the ACP for all compliance periods to date.  Although there was some banking of RECs in 2004, the expectation is that a similar shortfall will occur in 2005, with the supply situation anticipated to improve in 2006. Going forward, Massachusetts faces a number of impediments to developing sufficient generating capacity to meet its RPS goals.  Principal among these are financing issues and siting challenges.  Regarding the latter, local opposition has made it extremely difficult to get project sites approved, according to DOER staff.  This is particularly true in the case of wind facilities, as many of the good sites are located on public recreational lands or offshore.  Regarding the former, as elsewhere, there appears to be a disconnect between the ability of RPS obligated entities to enter into long-term contracts and the developers' need to have long-term contracts to secure financing.  This issue will be discussed in more detail below.</span></font></p><p data-dcnode-id="3851"><font data-dcnode-id="3852" face="NewCenturySchlbk"><span data-dcnode-id="3853" instrument_node="">Table 4 provides a breakdown by technology type for the portion of the 2004 RPS targets met through standard compliance.  Non-intermittent facilities (e.g., biomass, landfill gas, and anaerobic digester facilities) produced approximately 99% of the RECs produced in the 2004 compliance period.  Although no formal studies have been done, DOER staff believes these facilities are primarily displacing gas-fired generation.</span></font></p><p data-dcnode-id="3842"><b data-dcnode-id="3847"><font data-dcnode-id="3848" face="NewCenturySchlbk"><a data-dcnode-id="3850" name="P672_148213"></a><span data-dcnode-id="3849" instrument_node="">Table 4: Massachusetts 2004 Standard Compliance RECs by Technology Type</span></font></b><sup data-dcnode-id="3843"><font data-dcnode-id="3844" face="Arial" size="2"><a data-dcnode-id="3845" href="#P673_148284" name="P673_148285"><span data-dcnode-id="3846" instrument_node="">53</span></a></font></sup></p><p data-dcnode-id="3719"><span data-dcnode-id="3841" instrument_node="">

<font data-dcnode-id="3793" face="Arial" size="2"><span data-dcnode-id="3794" instrument_node="">60%</span></font></p></td></tr><tr data-dcnode-id="3773"><td data-dcnode-id="3784" valign="top" width="168"><p data-dcnode-id="3785"><font data-dcnode-id="3786" face="Arial" size="2"><span data-dcnode-id="3787" instrument_node="">Anaerobic Digester</span></font></p></td><td data-dcnode-id="3779" valign="top" width="132"><p align="center" data-dcnode-id="3780"><font data-dcnode-id="3781" face="Arial" size="2"><span data-dcnode-id="3782" instrument_node="">17,787</span></font></p></td><td data-dcnode-id="3774" valign="top" width="300"><p align="center" data-dcnode-id="3775"><font data-dcnode-id="3776" face="Arial" size="2"><span data-dcnode-id="3777" instrument_node="">4%</span></font></p></td></tr><tr data-dcnode-id="3756"><td data-dcnode-id="3767" valign="top" width="168"><p data-dcnode-id="3768"><font data-dcnode-id="3769" face="Arial" size="2"><span data-dcnode-id="3770" instrument_node="">Wind</span></font></p></td><td data-dcnode-id="3762" valign="top" width="132"><p align="center" data-dcnode-id="3763"><font data-dcnode-id="3764" face="Arial" size="2"><span data-dcnode-id="3765" instrument_node="">4,447</span></font></p></td><td data-dcnode-id="3757" valign="top" width="300"><p align="center" data-dcnode-id="3758"><font data-dcnode-id="3759" face="Arial" size="2"><span data-dcnode-id="3760" instrument_node="">1%</span></font></p></td></tr><tr data-dcnode-id="3739"><td data-dcnode-id="3750" valign="top" width="168"><p data-dcnode-id="3751"><font data-dcnode-id="3752" face="Arial" size="2"><span data-dcnode-id="3753" instrument_node="">Solar</span></font></p></td><td data-dcnode-id="3745" valign="top" width="132"><p align="center" data-dcnode-id="3746"><font data-dcnode-id="3747" face="Arial" size="2"><span data-dcnode-id="3748" instrument_node="">-</span></font></p></td><td data-dcnode-id="3740" valign="top" width="300"><p align="center" data-dcnode-id="3741"><font data-dcnode-id="3742" face="Arial" size="2"><span data-dcnode-id="3743" instrument_node="">&lt;1%</span></font></p></td></tr><tr data-dcnode-id="3722"><td data-dcnode-id="3733" valign="top" width="168"><p data-dcnode-id="3734"><font data-dcnode-id="3735" face="Arial" size="2"><span data-dcnode-id="3736" instrument_node="">Total</span></font></p></td><td data-dcnode-id="3728" valign="top" width="132"><p align="center" data-dcnode-id="3729"><font data-dcnode-id="3730" face="Arial" size="2"><span data-dcnode-id="3731" instrument_node="">444,680</span></font></p></td><td data-dcnode-id="3723" valign="top" width="300"><p align="center" data-dcnode-id="3724"><font data-dcnode-id="3725" face="Arial" size="2"><span data-dcnode-id="3726" instrument_node="">100%</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="3716"><font data-dcnode-id="3717" face="Arial" size="2"><span data-dcnode-id="3718" instrument_node=""> </span></font></p><p data-dcnode-id="3710"><b data-dcnode-id="3711"><i data-dcnode-id="3712"><font data-dcnode-id="3713" face="Verdana"><a data-dcnode-id="3715" name="P698_148541"></a><span data-dcnode-id="3714" instrument_node="">Role of Renewable Energy Certificates</span></font></i></b></p><p data-dcnode-id="3695"><font data-dcnode-id="3708" face="NewCenturySchlbk"><span data-dcnode-id="3709" instrument_node="">The statutory language establishing the RPS program in Massachusetts did not specifically direct or give the DOER the authority to allow the use of unbundled or tradable RECs for RPS compliance.  However, it did direct the DOER to conduct a study to "determine to what extent the RPS...shall create a process for awarding certified renewable energy credits to renewable energy generators or retail suppliers."</span></font><sup data-dcnode-id="3704"><font data-dcnode-id="3705" face="Arial" size="2"><a data-dcnode-id="3706" href="#P701_148985" name="P701_148986"><span data-dcnode-id="3707" instrument_node="">54</span></a></font></sup><font data-dcnode-id="3702" face="NewCenturySchlbk"><span data-dcnode-id="3703" instrument_node="">  The legislation goes on to say that if DOER determines that the program should issue credits, such a process would need to be implemented through statute, not by administrative authority.  DOER interpreted this set of directives as meaning that the threshold question of how RECs would be used for RPS compliance purposes was entirely within its domain. However, assuming RECs are to be used, and further assuming that DOER believes that the Massachusetts RPS program should be responsible for issuing and tracking RECs, implementation of such a system would require explicit authorization from the legislature. Based on the study conducted to evaluate whether the Massachusetts RPS program should create its own system for the issuance and tracking of RECs, DOER concluded that such a system would be "cumbersome and expensive" and would "impose unnecessary administrative costs on both retail electricity suppliers and [DOER]."</span></font><sup data-dcnode-id="3698"><font data-dcnode-id="3699" face="Arial" size="2"><a data-dcnode-id="3700" href="#P702_149963" name="P702_149964"><span data-dcnode-id="3701" instrument_node="">55</span></a></font></sup><font data-dcnode-id="3696" face="NewCenturySchlbk"><span data-dcnode-id="3697" instrument_node="">  In DOER's opinion, the existence of the New England Power Pool Generation Information System (NEPOOL-GIS) system, which tracks and issues certificates describing the generation attributes of all power plants serving the New England region, not just renewable facilities, obviates the need for Massachusetts to create its own independent system.  </span></font></p><p data-dcnode-id="3686"><font data-dcnode-id="3693" face="NewCenturySchlbk"><span data-dcnode-id="3694" instrument_node="">Regarding the threshold question as to whether and how to use RECs, DOER appears to have simply assumed that it had the authority to allow obligated entities to purchase unbundled RECs as one of several methods to achieve compliance.   In the same letter in which it recommends against the creation of a Massachusetts-specific REC tracking system, DOER observes that "[the] draft regulations for the RPS do not specify a particular method that retail suppliers can or must use to document compliance with RPS. This means DOER would allow any of several methods to document compliance. These would include evidence of contracts with renewable generators (when accompanied by reliable documentation that these attributes have not been counted toward any other RPS or green marketing program), evidence of ownership of "generation certificates" that include renewable attributes, or evidence of contributions made to the Massachusetts Technology Park Corporation."</span></font><sup data-dcnode-id="3689"><font data-dcnode-id="3690" face="Arial" size="2"><a data-dcnode-id="3691" href="#P705_151413" name="P705_151414"><span data-dcnode-id="3692" instrument_node="">56</span></a></font></sup><font data-dcnode-id="3687" face="NewCenturySchlbk"><span data-dcnode-id="3688" instrument_node=""> As it currently operates, compliance is assessed exclusively on the basis of RECs, which are issued and tracked by the NEPOOL-GIS system though a system of electronic accounts.</span></font></p><p data-dcnode-id="3680"><b data-dcnode-id="3681"><i data-dcnode-id="3682"><font data-dcnode-id="3683" face="Verdana"><a data-dcnode-id="3685" name="P706_151598"></a><span data-dcnode-id="3684" instrument_node="">Geographic Flexibility</span></font></i></b></p><p data-dcnode-id="3671"><font data-dcnode-id="3678" face="NewCenturySchlbk"><span data-dcnode-id="3679" instrument_node="">In order to be eligible under the Massachusetts RPS, a REC must be associated with renewable energy that is produced in or delivered to the New England ISO control area.  For generators located outside of the New England control area, this requires a showing of an executed contract for delivery of energy to an entity within NEPOOL. Various options were considered prior to adopting this standard, ranging from restricting eligibility to generators located within the state of Massachusetts to virtually no geographic restrictions whatsoever. Restricting eligibility to generators physically located in the state was dismissed owing to Commerce Clause concerns.</span></font><sup data-dcnode-id="3674"><font data-dcnode-id="3675" face="Arial" size="2"><a data-dcnode-id="3676" href="#P709_152282" name="P709_152283"><span data-dcnode-id="3677" instrument_node="">57</span></a></font></sup><font data-dcnode-id="3672" face="NewCenturySchlbk"><span data-dcnode-id="3673" instrument_node="">  In arriving at the current requirement, DOER applied a principle of ensuring that the renewable electrons produced by eligible generators have at least the theoretical possibility of reaching Massachusetts customers.  This favored the approach the state has taken, as any energy that is produced or delivered into the NEPOOL grid can flow to any of the states within the control area, including Massachusetts.  It should be noted that in addition to commerce clause concerns, given the limited availability of renewable resources within the state and the challenges Massachusetts has faced in exploiting those resources that do exist, there exists a strong rationale from a policy perspective for allowing out of state resources to participate in the Massachusetts RPS.  In addition, Massachusetts is part of a tight power pool, ISO New England, and it is relatively common to plan regionally and share the grid and regional power resources.</span></font></p><p data-dcnode-id="3662"><font data-dcnode-id="3669" face="NewCenturySchlbk"><span data-dcnode-id="3670" instrument_node="">In the 2004 compliance year, renewable projects located in Massachusetts, Connecticut, Maine, New Hampshire, New York, and Rhode Island contributed to Massachusetts' renewable energy goals.  Approximately 66% of the generation (in terms of REC contributions) that produced eligible RECs under the Massachusetts RPS were located in states other than Massachusetts itself, suggesting that much of the economic development benefits associated with the program are being exported to other states (given that economic development was not identified as one of the central objectives of the program, at least as articulated by the DOER, and the relatively modest size of the mandate, this may not be considered a relevant concern).  The availability and price of RECs available to the Massachusetts market may be adversely impacted going forward as RPS programs in other states are implemented or the targets in those states become more aggressive.  In particular, Connecticut's compliance targets begin to increase at a higher rate in 2007 than they did in previous years.  2007 also marks the first year in which Rhode Island's RPS requirements go into effect.</span></font><sup data-dcnode-id="3665"><font data-dcnode-id="3666" face="Arial" size="2"><a data-dcnode-id="3667" href="#P712_154696" name="P712_154697"><span data-dcnode-id="3668" instrument_node="">58</span></a></font></sup><font data-dcnode-id="3663" face="NewCenturySchlbk"><span data-dcnode-id="3664" instrument_node=""> </span></font></p><p data-dcnode-id="3656"><b data-dcnode-id="3657"><i data-dcnode-id="3658"><font data-dcnode-id="3659" face="Verdana"><a data-dcnode-id="3661" name="P714_154959"></a><span data-dcnode-id="3660" instrument_node="">Temporal Flexibility</span></font></i></b></p><p data-dcnode-id="3647"><font data-dcnode-id="3654" face="NewCenturySchlbk"><span data-dcnode-id="3655" instrument_node="">Under the Massachusetts RPS, LSEs are allowed to bank RECs procured in excess of compliance needs for up to three years.   However, the number of RECs that an LSE is allowed to bank is limited to a maximum of 30% of the number of RECs they are required to hold in the compliance period in which the RECs were created.</span></font><sup data-dcnode-id="3650"><font data-dcnode-id="3651" face="Arial" size="2"><a data-dcnode-id="3652" href="#P717_155296" name="P717_155297"><span data-dcnode-id="3653" instrument_node="">59</span></a></font></sup><font data-dcnode-id="3648" face="NewCenturySchlbk"><span data-dcnode-id="3649" instrument_node="">  Once banked, these RECs cannot be resold. Furthermore, the ability to bank RECs for use in future compliance years is limited to LSEs exclusively.  A couple of rationales motivated the implementation of these rules.  First, prohibiting the resale of banked RECs appears to limit opportunities to hoard RECs for purposes of driving up REC prices.  Second, with respect to the 30% limitation, there was concern that if no limits were imposed, an LSE could procure the entire amount of RECs it needs to achieve its RPS goals for multiple years in a single compliance period, resulting in uneven demand for RECs, and, by extension uneven demand for renewable energy. Second, REC banking complicates fuel source disclosure labeling because of the temporal disconnect between when the energy is delivered and when the REC, embodying the renewable attributes of the energy, is used for RPS compliance.  In other words, when should fuel disclosure labels include the renewable attributes associated with the banked RECs in describing the type of generating source used: when the energy and REC were actually generated or when the REC is used for compliance purposes?   Limitation on REC banking was viewed a reasonable compromise to mitigate this concern.  </span></font></p><p data-dcnode-id="3644"><font data-dcnode-id="3645" face="NewCenturySchlbk"><span data-dcnode-id="3646" instrument_node="">In 2004, obligated entities were required to hold RECs representing 750,954 MWh of renewable generation, accounting for 1.5% of retail electricity sales. Of this amount, approximately 67% was met through the retirement of RECs, with the balance (~33%) achieved through alternative compliance payments. The vintage of the RECs used to meet the obligation breaks down as follows:  444,680 of the RECs retired were generated by eligible renewable resources in 2004; 61,147 (13.8%) were banked RECs that were actually generated in 2003.  Although most entities were not able to purchase sufficient RECs to cover their RPS obligations, a few did find themselves over-procured in 2004, thus allowing 20,297 RECs to be banked for use in 2005 and/or 2006.     </span></font></p><p data-dcnode-id="3638"><b data-dcnode-id="3639"><i data-dcnode-id="3640"><font data-dcnode-id="3641" face="Verdana"><a data-dcnode-id="3643" name="P720_157318"></a><span data-dcnode-id="3642" instrument_node="">Participatory Flexibility</span></font></i></b></p><p data-dcnode-id="3635"><font data-dcnode-id="3636" face="NewCenturySchlbk"><span data-dcnode-id="3637" instrument_node="">Third parties (i.e., non-LSEs and non-generators) may participate in the Massachusetts REC market, although anecdotal evidence suggests that the volume of RECs these entities are handling is relatively limited.  The types of entities purchasing RECs in Massachusetts include RPS obligated entities, speculators, REC aggregators, green-tag and green-energy marketers.</span></font></p><p data-dcnode-id="3629"><b data-dcnode-id="3630"><i data-dcnode-id="3631"><font data-dcnode-id="3632" face="Verdana"><a data-dcnode-id="3634" name="P723_157709"></a><span data-dcnode-id="3633" instrument_node="">Contract Lengths</span></font></i></b></p><p data-dcnode-id="3626"><font data-dcnode-id="3627" face="NewCenturySchlbk"><span data-dcnode-id="3628" instrument_node="">In an effort to spur competition in the retail market, the restructuring bill in Massachusetts, of which the RPS program was a part, prohibited utilities that had not divested themselves of their generating units from entering into long-term contracts for energy procurement.  Competitive LSEs, i.e. those using new generating plants or using facilities divested by the incumbents, were not subject to this restriction.  Furthermore, the rates incumbent utilities were allowed to charge customers that had not selected a competing supplier were set by state regulators for a seven year period, thus forcing the incumbents to absorb the risk associated with price volatility in the wholesale spot market. This "standard offer" service ended on March 1, 2005. At that point, customers served by the incumbent utilities were transferred over to default service, under which prices and the attendant price volatility, were passed through.  Collectively, these measures were intended to jump-start competition in the market, first by encouraging the utilities to divest themselves of their generating facilities and second, by increasing the attractiveness of competitive suppliers who, by virtue of their ability to enter into longer-term contracts, could offer greater price stability to end-users. </span></font></p><p data-dcnode-id="3616"><font data-dcnode-id="3617" face="NewCenturySchlbk"><span data-dcnode-id="3625" instrument_node="">However, at least in the residential market, competition has been slow to develop.  As of 2005, competitive suppliers provided only 6% of the total energy used to serve load.  On the commercial and industrial side, the results have been more favorable with 46% of the load served by competitive retailers.</span><sup data-dcnode-id="3622"><a data-dcnode-id="3623" href="#P728_159326" name="P728_159327"><span data-dcnode-id="3624" instrument_node="">60</span></a></sup><span data-dcnode-id="3621" instrument_node="">  Whether an LSE serves the commercial/industrial or the residential market, the ability to enter into long-term contracts for both energy and RECs appears to be limited.  In the case of the residential market, although the incumbent utilities serve the vast majority of load and thus have some certainty regarding long-term demand, they continue to purchase power from wholesalers under 12-month contracts. Unstable price forecasts further increase the risk engendered by long-term purchase agreements. In the REC market in particular, given that it remains in the early stages of development, price forecasting is especially difficult.</span><a data-dcnode-id="3619" href="#P729_160109" name="P729_160110"><span data-dcnode-id="3620" instrument_node="">61</span></a><span data-dcnode-id="3618" instrument_node="">  In the commercial and industrial market, this uncertainty is compounded by competition which adds an additional element of risk.  Although some competitive retailers are increasingly willing to enter into contracts of more than a year, it appears at this point that the contract lengths tend to be on the order of 3-5 years. The adequacy of these contract terms in providing investors sufficient certainty to finance projects is likely to be contingent, to some degree, on the capital intensity of the proposed project/technology and the associated debt structure.  However, the fact that the vast majority of RECs continue to be purchased in short-term markets suggests that substantial challenges remain in securing long-term power purchase agreements required to secure financing. </span></font></p><p data-dcnode-id="3597"><font data-dcnode-id="3614" face="NewCenturySchlbk"><span data-dcnode-id="3615" instrument_node="">To support additional renewable development, the Massachusetts Technology Park Corporation (MTPC)</span></font><sup data-dcnode-id="3610"><font data-dcnode-id="3611" face="Arial" size="2"><a data-dcnode-id="3612" href="#P732_161607" name="P732_161608"><span data-dcnode-id="3613" instrument_node="">62</span></a></font></sup><font data-dcnode-id="3598" face="NewCenturySchlbk"><span data-dcnode-id="3609" instrument_node="">, the state's economic development agency, created the Massachusetts Green Power Partnership (MGPP).  Initially this program was funded exclusively by MTPC monies collected through the state's systems benefits charge, with DOER and MTPC subsequently agreeing that ACP funds should also be used.  Under the MGPP, the MTPC enters into forward contracts with renewable developers, selected via an open solicitation process, that either commit to purchasing RECs outright in later years, or, alternatively, grant developers the right to sell RECs to the MTPC at a guaranteed price.  This effectively sets a price floor for RECs for the time period detailed in the contract, with contract lengths of up to 10 years.</span><sup data-dcnode-id="3606"><a data-dcnode-id="3607" href="#P733_162784" name="P733_162785"><span data-dcnode-id="3608" instrument_node="">63</span></a></sup><span data-dcnode-id="3605" instrument_node=""> These long-term purchase commitments and/or price supports, combined with the anticipated value of the commodity energy these projects generate, facilitate developer financing.  In 2003, the MTPC committed to approximately $32 million (nominal dollars) in funding to support renewable energy development, representing projects with a combined capacity of approximately 100 MW.</span><sup data-dcnode-id="3602"><a data-dcnode-id="3603" href="#P734_163969" name="P734_163970"><span data-dcnode-id="3604" instrument_node="">64</span></a></sup><span data-dcnode-id="3601" instrument_node="">  The MGPP is funded by monies collected through ACPs as well as by the Renewable Energy Trust, itself funded by a systems benefit charge created pursuant to electricity restructuring in Massachusetts.</span><a data-dcnode-id="3599" href="#P735_164367" name="P735_164368"><span data-dcnode-id="3600" instrument_node="">65</span></a></font></p><p data-dcnode-id="3591"><b data-dcnode-id="3592"><i data-dcnode-id="3593"><font data-dcnode-id="3594" face="Verdana"><a data-dcnode-id="3596" name="P736_164407"></a><span data-dcnode-id="3595" instrument_node="">Tracking System</span></font></i></b></p><p data-dcnode-id="3588"><font data-dcnode-id="3589" face="NewCenturySchlbk"><span data-dcnode-id="3590" instrument_node="">MA-RECs are issued and tracked through the NEPOOL-GIS, an electronic certificate-based system maintained by the New England Power Pool.  The NEPOOL-GIS system issues certificates describing and certifying the generation attributes of all energy that is generated in or delivered into the New England control area. When a generator produces energy, the system deposits a corresponding number of certificates, each representing one MWh of electricity, describing the attributes of the underlying energy into generator specific accounts.  Presently the system tracks approximately 50 different generation attributes, including whether the power produced by a given generator qualifies as new renewable energy under the Massachusetts RPS program. Certificates that include this "MA-REC" designation can be sold to obligated entities or third parties for compliance purposes under the state's RPS program. </span></font></p><p data-dcnode-id="3579"><font data-dcnode-id="3586" face="NewCenturySchlbk"><span data-dcnode-id="3587" instrument_node="">As noted above, certificates that include the MA-REC designation can be sold or otherwise conveyed to other entities via a web-based system for eventual application toward the state's RPS goals.  From an accounting perspective, these transfers involve the conveyance of the entire certificate, and therefore all of the associated attributes. That said, the issue of disaggregation has not been specifically addressed by either the legislation or the regulation governing the RPS program.  Since the system doesn't issue certificates for each individual attribute, but only certificates that embody all of the tracked characteristics, it is unclear how the system, as currently designed, could accommodate transfers involving individual attributes.  In addition to technical concerns, use of partial RECs to meet the RPS targets is also unlikely to pass regulatory scrutiny.  According to DOER staff, the definitions of Massachusetts RPS do not allow partial RECs to be used for compliance purposes.  Specifically, the program requires obligated entities to "retire new renewable generation attributes," where "generation attributes" is defined as "a non-price characteristic of the electrical energy output of a Generation Unit including, but not limited to, the Unit's fuel type, emissions, vintage, and RPS eligibility."</span></font><sup data-dcnode-id="3582"><font data-dcnode-id="3583" face="Arial" size="2"><a data-dcnode-id="3584" href="#P741_166645" name="P741_166646"><span data-dcnode-id="3585" instrument_node="">66</span></a></font></sup><font data-dcnode-id="3580" face="NewCenturySchlbk"><span data-dcnode-id="3581" instrument_node="">  Thus, in order to comply with the Massachusetts RPS, all of the non-price characteristics of the energy must be retired with the REC. </span></font></p><p data-dcnode-id="3572"><font data-dcnode-id="3577" face="NewCenturySchlbk"><span data-dcnode-id="3578" instrument_node="">The start-up costs for the NE-GIS system are estimated to be approximately $200,000 plus anywhere from $900,000 to $2,400,000 per year in ongoing operating costs.  However, this estimated breakdown between start-up versus operational costs is less than precise since the operating costs, collected via transaction fees, include costs associated with the recovery of some system development costs.</span></font><sup data-dcnode-id="3573"><font data-dcnode-id="3574" face="Arial" size="2"><a data-dcnode-id="3575" href="#P744_167231" name="P744_167232"><span data-dcnode-id="3576" instrument_node="">67</span></a></font></sup></p><p data-dcnode-id="3566"><b data-dcnode-id="3567"><i data-dcnode-id="3568"><font data-dcnode-id="3569" face="Verdana"><a data-dcnode-id="3571" name="P745_167400"></a><span data-dcnode-id="3570" instrument_node="">Key Observations and Lessons from the Massachusetts Experience with RECs</span></font></i></b></p><p data-dcnode-id="3561"><font data-dcnode-id="3562" face="Arial" size="2"><b data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">·</span></b><span data-dcnode-id="3563" instrument_node=""> Short contracting terms in the residential market coupled with price uncertainty, and retail competition in the commercial/industrial sector, have conspired to undermine the willingness and ability of obligated LSEs to enter into long-term contracts for renewable energy and RECs.  This confounds the ability of developers to get financing, thus slowing the pace of renewable energy development.  </span></font></p><p data-dcnode-id="3556"><font data-dcnode-id="3557" face="Arial" size="2"><b data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">·</span></b><span data-dcnode-id="3558" instrument_node=""> In-state renewable development has also been impeded by siting challenges, particularly for wind facilities.  </span></font></p><p data-dcnode-id="3553"><font data-dcnode-id="3554" face="Arial" size="2"><span data-dcnode-id="3555" instrument_node=""> </span></font></p><p data-dcnode-id="3548"><font data-dcnode-id="3549" face="Arial" size="2"><b data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">·</span></b><span data-dcnode-id="3550" instrument_node=""> The state has sought to address the challenges developers face in securing financing by creating the Massachusetts Green Power Partnership, funded through system benefit charges and alternative compliance payments, to provide price guarantees for RECs on a long-term basis.</span></font></p><p data-dcnode-id="3543"><font data-dcnode-id="3544" face="Arial" size="2"><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">·</span></b><span data-dcnode-id="3545" instrument_node=""> The alternative compliance payment system has been effective in capping the costs associated with RPS compliance as well as providing a pool of money that can be used to support renewable development (see previous bullet).</span></font></p><p data-dcnode-id="3538"><font data-dcnode-id="3539" face="Arial" size="2"><b data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">·</span></b><span data-dcnode-id="3540" instrument_node=""> Renewable resource development driven by the Massachusetts RPS has been dominated by biomass and landfill gas facilities, both of which have dispatch and availability characteristics similar to conventional fuel sources, thus allowing them to displace peak power, primarily gas-fired generation. As a result, the Massachusetts RPS appears to be providing a hedge against gas price volatility.</span></font></p><p data-dcnode-id="3533"><font data-dcnode-id="3534" face="Arial" size="2"><b data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">·</span></b><span data-dcnode-id="3535" instrument_node=""> By allowing RECs produced by all renewable generators that deliver into the NEPOOL system, Massachusetts has expanded the resource options available to its obligated entities to satisfy their RPS requirements.  However, this has resulted in a significant amount of ratepayer dollars flowing out of state.</span></font></p><p data-dcnode-id="3528"><font data-dcnode-id="3529" face="Arial" size="2"><b data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">·</span></b><span data-dcnode-id="3530" instrument_node=""> Little attrition has occurred among older renewable facilities (i.e. those that came online prior to December 1998) suggesting that they are able to compete with conventional facilities despite the fact that they do not produce Massachusetts-eligible RECs and thus do not benefit from this additional incentive.</span></font></p><p data-dcnode-id="3523"><font data-dcnode-id="3524" face="Arial" size="2"><b data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">·</span></b><span data-dcnode-id="3525" instrument_node=""> In an effort to preserve incentives to repower or otherwise expand the generating capacity of older renewable projects, older facilities can apply for vintage waivers that allow output in excess of historical generation to produce Massachusetts eligible RECs. </span></font></p><p data-dcnode-id="3518"><b data-dcnode-id="3519"><font data-dcnode-id="3520" face="Verdana" size="+1"><a data-dcnode-id="3522" name="P764_169752"></a><span data-dcnode-id="3521" instrument_node="">New Mexico</span></font></b></p><p data-dcnode-id="3515"><font data-dcnode-id="3516" face="NewCenturySchlbk"><span data-dcnode-id="3517" instrument_node="">New Mexico codified its RPS in statute March 2004, two years after the New Mexico Public Regulation Commission (PRC) adopted a renewable energy rule (572) that obligated the state's three investor owned utilities (rural electric cooperatives and municipal utilities are exempt) to procure a minimum of 5% of their energy from designated renewable resources by 2006. Eligible generating technologies under the New Mexico standard include solar, wind, hydropower, geothermal, fuels cells (provided they are not powered by fossil fuels) and biomass.   The goal of the legislature, in creating the RPS, was to promote the state's energy self-sufficiency, preserve the state's natural resources, and improve the state's environment, thereby providing substantial economic benefits to New Mexico.  The specific targets adopted under the RPS are provided in Table 5 below.</span></font></p><p data-dcnode-id="3506"><b data-dcnode-id="3511"><font data-dcnode-id="3512" face="NewCenturySchlbk"><a data-dcnode-id="3514" name="P768_170627"></a><span data-dcnode-id="3513" instrument_node="">Table 5: New Mexico RPS Compliance Schedule and Targets</span></font></b><sup data-dcnode-id="3507"><font data-dcnode-id="3508" face="Arial" size="2"><a data-dcnode-id="3509" href="#P769_170682" name="P769_170683"><span data-dcnode-id="3510" instrument_node="">68</span></a></font></sup></p><p data-dcnode-id="3418"><span data-dcnode-id="3505" instrument_node="">
