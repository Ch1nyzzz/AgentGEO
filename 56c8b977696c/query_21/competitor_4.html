 valign="top" width="120"><span data-dcnode-id="731" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="710"><td data-dcnode-id="723" valign="top" width="24"><p data-dcnode-id="724"><font data-dcnode-id="725" face="Arial" size="2"><span data-dcnode-id="726" instrument_node="">11</span></font></p></td><td data-dcnode-id="717" valign="top" width="84"><p data-dcnode-id="718"><b data-dcnode-id="719"><font data-dcnode-id="720" face="Arial" size="2"><span data-dcnode-id="721" instrument_node="">Pennsylvania</span></font></b></p></td><td data-dcnode-id="714" valign="top" width="120"><span data-dcnode-id="715" instrument_node="">&nbsp;</span></td><td data-dcnode-id="711" valign="top" width="120"><span data-dcnode-id="712" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="691"><td data-dcnode-id="704" valign="top" width="24"><p data-dcnode-id="705"><font data-dcnode-id="706" face="Arial" size="2"><span data-dcnode-id="707" instrument_node="">12</span></font></p></td><td data-dcnode-id="698" valign="top" width="84"><p data-dcnode-id="699"><b data-dcnode-id="700"><font data-dcnode-id="701" face="Arial" size="2"><span data-dcnode-id="702" instrument_node="">Rhode Island</span></font></b></p></td><td data-dcnode-id="695" valign="top" width="120"><span data-dcnode-id="696" instrument_node="">&nbsp;</span></td><td data-dcnode-id="692" valign="top" width="120"><span data-dcnode-id="693" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="668"><td data-dcnode-id="685" valign="top" width="24"><p data-dcnode-id="686"><font data-dcnode-id="687" face="Arial" size="2"><span data-dcnode-id="688" instrument_node="">13</span></font></p></td><td data-dcnode-id="679" valign="top" width="84"><p data-dcnode-id="680"><b data-dcnode-id="681"><font data-dcnode-id="682" face="Arial" size="2"><span data-dcnode-id="683" instrument_node="">Texas</span></font></b></p></td><td data-dcnode-id="674" valign="top" width="120"><p data-dcnode-id="675"><font data-dcnode-id="676" face="Arial" size="2"><span data-dcnode-id="677" instrument_node="">16 Tex. Admin. Code § 25.173(o)(2)</span></font></p></td><td data-dcnode-id="669" valign="top" width="120"><p data-dcnode-id="670"><font data-dcnode-id="671" face="Arial" size="2"><span data-dcnode-id="672" instrument_node=""> 16 Tex. Admin. Code § 25.173(g)</span></font></p></td></tr><tr data-dcnode-id="649"><td data-dcnode-id="662" valign="top" width="24"><p data-dcnode-id="663"><font data-dcnode-id="664" face="Arial" size="2"><span data-dcnode-id="665" instrument_node="">14</span></font></p></td><td data-dcnode-id="656" valign="top" width="84"><p data-dcnode-id="657"><b data-dcnode-id="658"><font data-dcnode-id="659" face="Arial" size="2"><span data-dcnode-id="660" instrument_node="">Washington DC</span></font></b></p></td><td data-dcnode-id="653" valign="top" width="120"><span data-dcnode-id="654" instrument_node="">&nbsp;</span></td><td data-dcnode-id="650" valign="top" width="120"><span data-dcnode-id="651" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="628"><td data-dcnode-id="643" valign="top" width="24"><p data-dcnode-id="644"><font data-dcnode-id="645" face="Arial" size="2"><span data-dcnode-id="646" instrument_node="">15</span></font></p></td><td data-dcnode-id="637" valign="top" width="84"><p data-dcnode-id="638"><b data-dcnode-id="639"><font data-dcnode-id="640" face="Arial" size="2"><span data-dcnode-id="641" instrument_node="">Wisconsin</span></font></b></p></td><td data-dcnode-id="634" valign="top" width="120"><span data-dcnode-id="635" instrument_node="">&nbsp;</span></td><td data-dcnode-id="629" valign="top" width="120"><p data-dcnode-id="630"><font data-dcnode-id="631" face="Arial" size="2"><span data-dcnode-id="632" instrument_node=""> Wis. Admin. Code PSC § 118.06</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="618"><font data-dcnode-id="619" face="Arial" size="2"><sup data-dcnode-id="621"><a data-dcnode-id="623" href="#P211_5695" name="P211_5694"><span data-dcnode-id="624" instrument_node="">1</span></a><span data-dcnode-id="622" instrument_node=""> </span></sup><span data-dcnode-id="620" instrument_node=""> Under the existing RPS framework, compliance is assessed on the basis of physical deliveries of renewable energy.   In D.05-11-025, the Commission identified two alternatives to this approach: an unbundled regime, and a tradable regime.  Under an unbundled REC regime, claim over the renewable attributes of energy produced by eligible renewable technologies can be transferred from the renewable generator to one LSE while the energy is delivered to another.  However, once this transfer occurs, claim over the attributes cannot be resold.  In contrast, under a tradable REC regime, although the concept of selling the energy and claim over the attributes to different parties remains intact, RECs may be transferred from the renewable generator to any third party, not just obligated LSEs.  In addition  these attributes can be resold subsequent to the initial sale.</span></font></p><p data-dcnode-id="611"><font data-dcnode-id="612" face="Arial" size="2"><sup data-dcnode-id="614"><a data-dcnode-id="616" href="#P212_6568" name="P212_6567"><span data-dcnode-id="617" instrument_node="">2</span></a><span data-dcnode-id="615" instrument_node=""> </span></sup><span data-dcnode-id="613" instrument_node=""> Public Utilities Code Sections 399.11-399.17.</span></font></p><p data-dcnode-id="604"><font data-dcnode-id="605" face="Arial" size="2"><sup data-dcnode-id="607"><a data-dcnode-id="609" href="#P261_21788" name="P261_21787"><span data-dcnode-id="610" instrument_node="">3</span></a><span data-dcnode-id="608" instrument_node=""> </span></sup><span data-dcnode-id="606" instrument_node=""> In D.05-11-025, the CPUC held that its consideration of the potential use of unbundled or tradable RECs for RPS compliance purposes is not prohibited by current law (pg. 18).</span></font></p><p data-dcnode-id="597"><font data-dcnode-id="598" face="Arial" size="2"><sup data-dcnode-id="600"><a data-dcnode-id="602" href="#P276_28448" name="P276_28447"><span data-dcnode-id="603" instrument_node="">4</span></a><span data-dcnode-id="601" instrument_node=""> </span></sup><span data-dcnode-id="599" instrument_node=""> In a few cases the RPS goals are structured as an installed capacity requirement, as in Texas.</span></font></p><p data-dcnode-id="590"><font data-dcnode-id="591" face="Arial" size="2"><sup data-dcnode-id="593"><a data-dcnode-id="595" href="#P277_29123" name="P277_29122"><span data-dcnode-id="596" instrument_node="">5</span></a><span data-dcnode-id="594" instrument_node=""> </span></sup><span data-dcnode-id="592" instrument_node=""> Eligible renewable resources under the California RPS (PUC § 383.5(b)(1)): biomass, solar thermal, photovoltaic, wind, geothermal, fuel cells using renewable fuels, Small Hydro (&lt;= 30 MW), digester gas, municipal solid waste conversion, landfill gas, ocean wave, ocean thermal, or tidal current, and any additions or enhancements to a facility using that technology. </span></font></p><p data-dcnode-id="583"><font data-dcnode-id="584" face="Arial" size="2"><sup data-dcnode-id="586"><a data-dcnode-id="588" href="#P278_29888" name="P278_29887"><span data-dcnode-id="589" instrument_node="">6</span></a><span data-dcnode-id="587" instrument_node=""> </span></sup><span data-dcnode-id="585" instrument_node=""> The executive order identifies the following emission reduction targets for the state of California: by 2010, reduce GHG emissions to 2000 levels; by 2020, reduce GHG emissions to 1990 levels; by 2050, reduce GHG emissions to 80 percent below 1990 levels. Executive Order S-3-05; June 1, 2005.</span></font></p><p data-dcnode-id="576"><font data-dcnode-id="577" face="Arial" size="2"><sup data-dcnode-id="579"><a data-dcnode-id="581" href="#P283_31880" name="P283_31879"><span data-dcnode-id="582" instrument_node="">7</span></a><span data-dcnode-id="580" instrument_node=""> </span></sup><span data-dcnode-id="578" instrument_node=""> D.05-07-039, pp. 9-10, also see Findings of Fact 5, Conclusions of Law 4, and Ordering Paragraph 1a.</span></font></p><p data-dcnode-id="569"><font data-dcnode-id="570" face="Arial" size="2"><sup data-dcnode-id="572"><a data-dcnode-id="574" href="#P286_32865" name="P286_32864"><span data-dcnode-id="575" instrument_node="">8</span></a><span data-dcnode-id="573" instrument_node=""> </span></sup><span data-dcnode-id="571" instrument_node=""> In D.05-11-025 the CPUC found that SB 1078 holds these entities to the same standards as the IOUs in terms of the total share of energy sales that must come from eligible renewable resources by 2010, as well as in terms of the minimum required increase in their procurement of renewable energy each year.   </span></font></p><p data-dcnode-id="562"><font data-dcnode-id="563" face="Arial" size="2"><sup data-dcnode-id="565"><a data-dcnode-id="567" href="#P287_34050" name="P287_34049"><span data-dcnode-id="568" instrument_node="">9</span></a><span data-dcnode-id="566" instrument_node=""> </span></sup><span data-dcnode-id="564" instrument_node=""> For an explanation of what it means to "firm" a resource, see Appendix A.</span></font></p><p data-dcnode-id="555"><font data-dcnode-id="556" face="Arial" size="2"><sup data-dcnode-id="558"><a data-dcnode-id="560" href="#P296_38029" name="P296_38028"><span data-dcnode-id="561" instrument_node="">10</span></a><span data-dcnode-id="559" instrument_node=""> </span></sup><span data-dcnode-id="557" instrument_node=""> See Hamrin, J., Wingate, M., "Regulator's Handbook on Tradable Renewable Certificates," Center for Resource Solutions, June 2004.</span></font></p><p data-dcnode-id="546"><font data-dcnode-id="547" face="Arial" size="2"><sup data-dcnode-id="551"><a data-dcnode-id="553" href="#P313_40238" name="P313_40237"><span data-dcnode-id="554" instrument_node="">11</span></a><span data-dcnode-id="552" instrument_node=""> </span></sup><span data-dcnode-id="550" instrument_node=""> "Strategies Underway in California that Reduce Greenhouse Gas Emissions," </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climatechange.ca.gov/climate_action_team/factsheets/2005-06_GHG_STRATEGIES_FS.PDF"><span data-dcnode-id="549" instrument_node="">

http://www.climatechange.ca.gov/climate_action_team/factsheets/2005-06_GHG_STRATEGIES_FS.PDF</span></a></font></p><p data-dcnode-id="539"><font data-dcnode-id="540" face="Arial" size="2"><sup data-dcnode-id="542"><a data-dcnode-id="544" href="#P316_41226" name="P316_41225"><span data-dcnode-id="545" instrument_node="">12</span></a><span data-dcnode-id="543" instrument_node=""> </span></sup><span data-dcnode-id="541" instrument_node=""> Rader, N., Hempling, S., "The Renewables Portfolio Standard: A Practical Guide," Prepared for the National Association of Regulatory Utility Commissioners, pp. 3-5, February 2001.</span></font></p><p data-dcnode-id="532"><font data-dcnode-id="533" face="Arial" size="2"><sup data-dcnode-id="535"><a data-dcnode-id="537" href="#P343_51162" name="P343_51161"><span data-dcnode-id="538" instrument_node="">13</span></a><span data-dcnode-id="536" instrument_node=""> </span></sup><span data-dcnode-id="534" instrument_node=""> See Appendix A for an explanation shaping and firming in the context of renewable generation.</span></font></p><p data-dcnode-id="525"><font data-dcnode-id="526" face="Arial" size="2"><sup data-dcnode-id="528"><a data-dcnode-id="530" href="#P348_54301" name="P348_54300"><span data-dcnode-id="531" instrument_node="">14</span></a><span data-dcnode-id="529" instrument_node=""> </span></sup><span data-dcnode-id="527" instrument_node=""> D.04-12-048, pg. 87.</span></font></p><p data-dcnode-id="518"><font data-dcnode-id="519" face="Arial" size="2"><sup data-dcnode-id="521"><a data-dcnode-id="523" href="#P352_55152" name="P352_55151"><span data-dcnode-id="524" instrument_node="">15</span></a><span data-dcnode-id="522" instrument_node=""> </span></sup><span data-dcnode-id="520" instrument_node=""> See Hamrin, J., Wingate, M., "Regulator's Handbook on Tradable Renewable Certificates," Center for Resource Solutions, June 2004.</span></font></p><p data-dcnode-id="503"><font data-dcnode-id="504" face="Arial" size="2"><sup data-dcnode-id="514"><a data-dcnode-id="516" href="#P363_60422" name="P363_60421"><span data-dcnode-id="517" instrument_node="">16</span></a><span data-dcnode-id="515" instrument_node=""> </span></sup><span data-dcnode-id="513" instrument_node=""> See Chupka, Marc W., "Renewable Energy Credits: Policy Design and Price Volatility," in Greentrading</span><i data-dcnode-id="510"><sup data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">TM</span></sup></i><span data-dcnode-id="509" instrument_node="">: Commercial Opportunities for the Environment. Peter C. Fusaro and Marion Yuen, editors. New York, NY: Greentrading</span><i data-dcnode-id="506"><sup data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">TM</span></sup></i><span data-dcnode-id="505" instrument_node="">, 2004.</span></font></p><p data-dcnode-id="496"><font data-dcnode-id="497" face="Arial" size="2"><sup data-dcnode-id="499"><a data-dcnode-id="501" href="#P366_61881" name="P366_61880"><span data-dcnode-id="502" instrument_node="">17</span></a><span data-dcnode-id="500" instrument_node=""> </span></sup><span data-dcnode-id="498" instrument_node=""> This assumes no social discount rate.  If the social discount rate is greater than zero, the optimal level of renewable energy delivered per compliance period would change such that each subsequent compliance period would be characterized by less renewable energy delivered than the previous period, reflecting society's preference for benefits that occur sooner rather than later.</span></font></p><p data-dcnode-id="483"><font data-dcnode-id="484" face="Arial" size="2"><sup data-dcnode-id="492"><a data-dcnode-id="494" href="#P367_62709" name="P367_62708"><span data-dcnode-id="495" instrument_node="">18</span></a><span data-dcnode-id="493" instrument_node=""> </span></sup><span data-dcnode-id="491" instrument_node=""> According to the U.S. Environmental Protection Agency, the atmospheric lifetime of CO</span><sub data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">2</span></sub><span data-dcnode-id="488" instrument_node=""> ranges from 50 to 200 years. Benefits of the RPS in terms of avoided heat-trapping potential from CO</span><sub data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">2</span></sub><span data-dcnode-id="485" instrument_node=""> emissions would be maximized if all of the avoided emissions were realized in early compliance periods, rather than being spread out across compliance periods or clustered in later compliance periods.  However, the difference in total benefits is likely to be small irrespective of when the emission avoidance occurs in the program as total benefits accrue over a time span that is much longer than the RPS program itself. </span></font></p><p data-dcnode-id="476"><font data-dcnode-id="477" face="Arial" size="2"><sup data-dcnode-id="479"><a data-dcnode-id="481" href="#P370_63841" name="P370_63840"><span data-dcnode-id="482" instrument_node="">19</span></a><span data-dcnode-id="480" instrument_node=""> </span></sup><span data-dcnode-id="478" instrument_node=""> See Hamrin, J., Wingate, M., "Regulator's Handbook on Tradable Renewable Certificates," Center for Resource Solutions, June 2004.</span></font></p><p data-dcnode-id="469"><font data-dcnode-id="470" face="Arial" size="2"><sup data-dcnode-id="472"><a data-dcnode-id="474" href="#P374_64650" name="P374_64649"><span data-dcnode-id="475" instrument_node="">20</span></a><span data-dcnode-id="473" instrument_node=""> </span></sup><span data-dcnode-id="471" instrument_node=""> See Public Utilities Code section 399.14(2)(C).</span></font></p><p data-dcnode-id="462"><font data-dcnode-id="463" face="Arial" size="2"><sup data-dcnode-id="465"><a data-dcnode-id="467" href="#P375_65363" name="P375_65362"><span data-dcnode-id="468" instrument_node="">21</span></a><span data-dcnode-id="466" instrument_node=""> </span></sup><span data-dcnode-id="464" instrument_node=""> Shortfalls in excess of 25% of a utility's annual procurement target (APT) would be permitted if one of the following conditions were met: insufficient response to the RFO, contracts already executed will provide future deliveries sufficient to satisfy current year deficits, inadequate public goods funds are available to cover above-market renewable energy costs, and/or seller non-performance.</span></font></p><p data-dcnode-id="455"><font data-dcnode-id="456" face="Arial" size="2"><sup data-dcnode-id="458"><a data-dcnode-id="460" href="#P376_65889" name="P376_65888"><span data-dcnode-id="461" instrument_node="">22</span></a><span data-dcnode-id="459" instrument_node=""> </span></sup><span data-dcnode-id="457" instrument_node=""> The RPS rules require that any purchases in subsequent compliance periods must first be applied to that period's APT, and only after that period's APT has been met can additional purchases be applied against prior deficits of 25% or less.  </span></font></p><p data-dcnode-id="446"><font data-dcnode-id="447" face="Arial" size="2"><sup data-dcnode-id="451"><a data-dcnode-id="453" href="#P387_70515" name="P387_70514"><span data-dcnode-id="454" instrument_node="">23</span></a><span data-dcnode-id="452" instrument_node=""> </span></sup><span data-dcnode-id="450" instrument_node=""> "Tradable RECs and Financing Renewable Energy Projects in California," Evolution Markets, Presentation at the California Registry Conference, April 19, 2005. </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climateregistry.org/docs/EVENTS/Conference%25202005/Hochschild.pdf"><span data-dcnode-id="449" instrument_node="">

http://www.climateregistry.org/docs/EVENTS/Conference%202005/Hochschild.pdf</span></a></font></p><p data-dcnode-id="439"><font data-dcnode-id="440" face="Arial" size="2"><sup data-dcnode-id="442"><a data-dcnode-id="444" href="#P400_75544" name="P400_75543"><span data-dcnode-id="445" instrument_node="">24</span></a><span data-dcnode-id="443" instrument_node=""> </span></sup><span data-dcnode-id="441" instrument_node=""> The length of the contract, in of itself, is less important than whether the contract provides the investor community a requisite level of certainty regarding project revenues.  If the price renewable energy commands is high, the contract length that is necessary to ensure that projects will be able to cover their debt service and provide an adequate return on investment will be shorter than if the prices is low. </span></font></p><p data-dcnode-id="432"><font data-dcnode-id="433" face="Arial" size="2"><sup data-dcnode-id="435"><a data-dcnode-id="437" href="#P403_76963" name="P403_76962"><span data-dcnode-id="438" instrument_node="">25</span></a><span data-dcnode-id="436" instrument_node=""> </span></sup><span data-dcnode-id="434" instrument_node=""> The value of this hedge is perhaps clearest in circumstances where the wholesale price in the market exceeds the contractually agreed upon fixed price combination of wholesale energy plus RECs.  In these circumstances, the generator would pay the LSE, in effect receiving a negative price for its RECs, consistent with the contractual requirement that the combined price of energy and REC equal the agreed upon fixed price.   </span></font></p><p data-dcnode-id="425"><font data-dcnode-id="426" face="Arial" size="2"><sup data-dcnode-id="428"><a data-dcnode-id="430" href="#P406_78787" name="P406_78786"><span data-dcnode-id="431" instrument_node="">26</span></a><span data-dcnode-id="429" instrument_node=""> </span></sup><span data-dcnode-id="427" instrument_node=""> In a deregulated market, in which retail competition prevails, the ability of an LSE to pass increased costs onto customers in the form of higher prices is limited by competitive forces.  </span></font></p><p data-dcnode-id="411"><font data-dcnode-id="412" face="Arial" size="2"><sup data-dcnode-id="421"><a data-dcnode-id="423" href="#P409_81277" name="P409_81276"><span data-dcnode-id="424" instrument_node="">27</span></a><span data-dcnode-id="422" instrument_node=""> </span></sup><span data-dcnode-id="420" instrument_node=""> "Tradable RECs and Financing Renewable Energy Projects in California," Evolution Markets, Presentation at the California Registry Conference, April 19, 2005. </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climateregistry.org/docs/EVENTS/Conference%25202005/Hochschild.pdf"><span data-dcnode-id="419" instrument_node="">
</span></a><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climateregistry.org/docs/EVENTS/Conference%25202005/Hochschild.pdf" target="_top"><span data-dcnode-id="417" instrument_node="">http://www.climateregistry.org/docs/EVENTS/Conference%202005/Hochschild.pdf</span></a><span data-dcnode-id="415" instrument_node="">; Also see  "Design Guide for Renewable Energy Certificate Tracking Systems," National Wind Coordinating Committee Green Markets and Credit Trading Work Group, pp. 4-6, July 2004. </span><a data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationalwind.org/publications/rec/rec_guide.pdf"><span data-dcnode-id="414" instrument_node="">

http://www.awea2.org/downloads/RPS/Alan_Nogee.pdf</span></a><span data-dcnode-id="403" instrument_node="">.</span></font></p><p data-dcnode-id="394"><font data-dcnode-id="395" face="Arial" size="2"><sup data-dcnode-id="397"><a data-dcnode-id="399" href="#P415_85238" name="P415_85237"><span data-dcnode-id="400" instrument_node="">29</span></a><span data-dcnode-id="398" instrument_node=""> </span></sup><span data-dcnode-id="396" instrument_node=""> Public Utilities Code Section 399.14(e) allows for a procurement entity to make renewable energy purchases on behalf of another LSE's customers.  It is unclear from the statute if a procurement entity for RECs alone is authorized.  </span></font></p><p data-dcnode-id="387"><font data-dcnode-id="388" face="Arial" size="2"><sup data-dcnode-id="390"><a data-dcnode-id="392" href="#P427_89927" name="P427_89926"><span data-dcnode-id="393" instrument_node="">30</span></a><span data-dcnode-id="391" instrument_node=""> </span></sup><span data-dcnode-id="389" instrument_node=""> While this same argument could also be made in the context of a bundled regime, whereby all generators would bid into the RPS solicitation at the maximum price they believe they can receive based on their estimate of what the marginal generator will get, because of the commodity nature of RECs and the greatly reduced transaction costs associated with their sale to any entity in the state, RECs will presumably exhibit price behavior that conforms closer to the rule of one price than the price of renewable energy purchased on a bundled basis.  </span></font></p><p data-dcnode-id="380"><font data-dcnode-id="381" face="Arial" size="2"><sup data-dcnode-id="383"><a data-dcnode-id="385" href="#P456_105834" name="P456_105833"><span data-dcnode-id="386" instrument_node="">31</span></a><span data-dcnode-id="384" instrument_node=""> </span></sup><span data-dcnode-id="382" instrument_node=""> D.05-05-011, "Opinion Clarifying Participation of Renewable Distributed Generation in the Renewable Portfolio  Standards Program," pp. 1, 6-7.  These issues will be addressed in R.06-03-004.</span></font></p><p data-dcnode-id="373"><font data-dcnode-id="374" face="Arial" size="2"><sup data-dcnode-id="376"><a data-dcnode-id="378" href="#P463_107063" name="P463_107062"><span data-dcnode-id="379" instrument_node="">32</span></a><span data-dcnode-id="377" instrument_node=""> </span></sup><span data-dcnode-id="375" instrument_node=""> Hamrin, J., Wingate, M., "Regulator's Handbook on Tradable Renewable Certificates," Center for Resource Solutions, pp. 69-74, June 2004.</span></font></p><p data-dcnode-id="366"><font data-dcnode-id="367" face="Arial" size="2"><sup data-dcnode-id="369"><a data-dcnode-id="371" href="#P466_108950" name="P466_108949"><span data-dcnode-id="372" instrument_node="">33</span></a><span data-dcnode-id="370" instrument_node=""> </span></sup><span data-dcnode-id="368" instrument_node="">In addition to these minimal functionality requirements, policy-makers may also wish to incorporate additional capabilities into the system.  For example, in addition to tracking REC transactions, it may be desirable for the system to actively facilitate REC trading by providing a trading platform or otherwise providing some market making functionality. In addition to tracking renewable attributes, broadly construed, the system may also provide additional resolution regarding the actual environmental characteristics of the energy, by tracking such things as avoided emissions.        </span></font></p><p data-dcnode-id="359"><font data-dcnode-id="360" face="Arial" size="2"><sup data-dcnode-id="362"><a data-dcnode-id="364" href="#P467_109922" name="P467_109921"><span data-dcnode-id="365" instrument_node="">34</span></a><span data-dcnode-id="363" instrument_node=""> </span></sup><span data-dcnode-id="361" instrument_node=""> Operating systems include the NEPOOL Generation Information System (Maine, Massachusetts, Connecticut, Vermont, and Rhode Island), PJM's Generation Attributes Tracking System (all or parts of Delaware, Indiana, Illinois, Kentucky, Maryland, Michigan, New Jersey, North Carolina, Ohio, Pennsylvania, Tennessee, Virginia, West Virginia, and the District of Columbia), ERCOT (Texas), and Wisconsin's Renewable Resource Credit tracking system. Systems under development include he Midwest Regional Tracking System is under development (encompassing Minnesota, Wisconsin, Iowa, North Dakota, and South Dakota, and the Western Renewable Energy Generation Information System (encompassing Arizona, Colorado, Idaho, Montana, Nevada, New Mexico, Oregon, Utah, Washington, and Wyoming).</span></font></p><p data-dcnode-id="352"><font data-dcnode-id="353" face="Arial" size="2"><sup data-dcnode-id="355"><a data-dcnode-id="357" href="#P472_111244" name="P472_111243"><span data-dcnode-id="358" instrument_node="">35</span></a><span data-dcnode-id="356" instrument_node=""> </span></sup><span data-dcnode-id="354" instrument_node=""> See Hamrin, J., Wingate, M., "Regulator's Handbook on Tradable Renewable Certificates," Center for Resource Solutions, June 2004, pg. 71.</span></font></p><p data-dcnode-id="343"><font data-dcnode-id="344" face="Arial" size="2"><sup data-dcnode-id="348"><a data-dcnode-id="350" href="#P493_115804" name="P493_115803"><span data-dcnode-id="351" instrument_node="">36</span></a><span data-dcnode-id="349" instrument_node=""> </span></sup><span data-dcnode-id="347" instrument_node=""> "Western Renewable Energy Generation Information System," Producer Services Consulting, Green Power in Canada Workshop Series Presentation, Feb. 10, 2004. </span><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pollutionprobe.org/whatwedo/GPW/calgary/Presentations/PDFs/john.pdf"><span data-dcnode-id="346" instrument_node="">

de=""> </span></sup><span data-dcnode-id="310" instrument_node=""> Tex. Util. Code Ann. § 39.904.</span></font></p><p data-dcnode-id="301"><font data-dcnode-id="302" face="Arial" size="2"><sup data-dcnode-id="304"><a data-dcnode-id="306" href="#P551_123907" name="P551_123906"><span data-dcnode-id="307" instrument_node="">42</span></a><span data-dcnode-id="305" instrument_node=""> </span></sup><span data-dcnode-id="303" instrument_node=""> In the fourth quarter of 2005, this value was updated to 27.6%, reflecting actual performance experienced thus far by renewable generators participating in the program.  This lower value was in part a result of the excessive build-out of renewable facilities in transmission constrained areas which forced curtailments, thus putting downward pressure on the capacity factor.  As a result of this change, obligated entities that had procured RECs on the premise of the 35% capacity factor found themselves over-procured. </span></font></p><p data-dcnode-id="294"><font data-dcnode-id="295" face="Arial" size="2"><sup data-dcnode-id="297"><a data-dcnode-id="299" href="#P593_127108" name="P593_127107"><span data-dcnode-id="300" instrument_node="">43</span></a><span data-dcnode-id="298" instrument_node=""> </span></sup><span data-dcnode-id="296" instrument_node=""> Langniss, O., Wiser, Ryan., "The Renewables Portfolio Standard in Texas: An Early Assessment" Energy Policy, More specifically, a renewable project's first point of interconnection must be within ERCOT for associated RECs to be eligible for the Texas RPS.</span></font></p><p data-dcnode-id="287"><font data-dcnode-id="288" face="Arial" size="2"><sup data-dcnode-id="290"><a data-dcnode-id="292" href="#P596_129851" name="P596_129850"><span data-dcnode-id="293" instrument_node="">44</span></a><span data-dcnode-id="291" instrument_node=""> </span></sup><span data-dcnode-id="289" instrument_node=""> There appears to be some dispute regarding what resources wind displaces.  According to a http://www.directenergy.com/media_relations/announcements/de/2005/2005-06-15.htm</span></a></font></p><p data-dcnode-id="247"><font data-dcnode-id="248" face="Arial" size="2"><sup data-dcnode-id="250"><a data-dcnode-id="252" href="#P617_137120" name="P617_137119"><span data-dcnode-id="253" instrument_node="">49</span></a><span data-dcnode-id="251" instrument_node=""> </span></sup><span data-dcnode-id="249" instrument_node=""> Entities are notified of the exact number of RECs they are required to retire for a given compliance period by March 1 of the following year.  To help LSEs estimate their requirements over the course of the compliance period, ERCOT posts, on a monthly basis, the total competitive retail load served in the state.</span></font></p><p data-dcnode-id="238"><font data-dcnode-id="239" face="Arial" size="2"><sup data-dcnode-id="243"><a data-dcnode-id="245" href="#P620_139152" name="P620_139151"><span data-dcnode-id="246" instrument_node="">50</span></a><span data-dcnode-id="244" instrument_node=""> </span></sup><span data-dcnode-id="242" instrument_node=""> "Design Guide for Renewable Energy Certificate Tracking Systems," National Wind Coordinating Committee Green Markets and Credit Trading Work Group, pg. 20, July 2004. </span><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationalwind.org/publications/rec/rec_guide.pdf"><span data-dcnode-id="241" instrument_node="">

http://www.nationalwind.org/publications/rec/rec_guide.pdf</span></a></font></p><p data-dcnode-id="231"><font data-dcnode-id="232" face="Arial" size="2"><sup data-dcnode-id="234"><a data-dcnode-id="236" href="#P621_139765" name="P621_139764"><span data-dcnode-id="237" instrument_node="">51</span></a><span data-dcnode-id="235" instrument_node=""> </span></sup><span data-dcnode-id="233" instrument_node=""> The role of ERCOT's metering infrastructure as the basis for tracking renewable energy production prevents un-metered renewable resources, like distributed generation facilities, which are technically and legally capable of generating RECs, from earning RECs that can be traded in the market.</span></font></p><p data-dcnode-id="224"><font data-dcnode-id="225" face="Arial" size="2"><sup data-dcnode-id="227"><a data-dcnode-id="229" href="#P643_144167" name="P643_144166"><span data-dcnode-id="230" instrument_node="">52</span></a><span data-dcnode-id="228" instrument_node=""> </span></sup><span data-dcnode-id="226" instrument_node=""> 225 CMR 14.07</span></font></p><p data-dcnode-id="217"><font data-dcnode-id="218" face="Arial" size="2"><sup data-dcnode-id="220"><a data-dcnode-id="222" href="#P673_148285" name="P673_148284"><span data-dcnode-id="223" instrument_node="">53</span></a><span data-dcnode-id="221" instrument_node=""> </span></sup><span data-dcnode-id="219" instrument_node=""> "Annual RPS Compliance Report for 2004," Division of Energy Resources, pp. 5-6, January 9, 2006. </span></font></p><p data-dcnode-id="210"><font data-dcnode-id="211" face="Arial" size="2"><sup data-dcnode-id="213"><a data-dcnode-id="215" href="#P701_148986" name="P701_148985"><span data-dcnode-id="216" instrument_node="">54</span></a><span data-dcnode-id="214" instrument_node=""> </span></sup><span data-dcnode-id="212" instrument_node=""> Chapter 164 of the Acts of 1997 Section 332.</span></font></p><p data-dcnode-id="203"><font data-dcnode-id="204" face="Arial" size="2"><sup data-dcnode-id="206"><a data-dcnode-id="208" href="#P702_149964" name="P702_149963"><span data-dcnode-id="209" instrument_node="">55</span></a><span data-dcnode-id="207" instrument_node=""> </span></sup><span data-dcnode-id="205" instrument_node=""> DOER Recommendation Letter, Report to the General Court, pursuant to Section 332 of the Electric Industry Restructuring Act, Oct. 2, 2001.</span></font></p><p data-dcnode-id="196"><font data-dcnode-id="197" face="Arial" size="2"><sup data-dcnode-id="199"><a data-dcnode-id="201" href="#P705_151414" name="P705_151413"><span data-dcnode-id="202" instrument_node="">56</span></a><span data-dcnode-id="200" instrument_node=""> </span></sup><span data-dcnode-id="198" instrument_node=""> Ibid.</span></font></p><p data-dcnode-id="189"><font data-dcnode-id="190" face="Arial" size="2"><sup data-dcnode-id="192"><a data-dcnode-id="194" href="#P709_152283" name="P709_152282"><span data-dcnode-id="195" instrument_node="">57</span></a><span data-dcnode-id="193" instrument_node=""> </span></sup><span data-dcnode-id="191" instrument_node=""> The one exception to this rule is in the case of "behind the meter" applications, e.g., photovoltaics and other distributed generation.  In order to produce RECs that are eligible for the Massachusetts RPS, power produced behind the meter must be generated by facilities that are physically located in the state. </span></font></p><p data-dcnode-id="180"><font data-dcnode-id="181" face="Arial" size="2"><sup data-dcnode-id="185"><a data-dcnode-id="187" href="#P712_154697" name="P712_154696"><span data-dcnode-id="188" instrument_node="">58</span></a><span data-dcnode-id="186" instrument_node=""> </span></sup><span data-dcnode-id="184" instrument_node=""> "Renewable Portfolio Standard Annual RPS Compliance Report for 2004," Commonwealth of Massachusetts Office of Consumer Affairs and Business Regulation, Division of Energy Resources, pp. 11, January 9, 2006. </span><a data-dcnode-id="182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mass.gov/doer/rps/rps-2004annual-rpt.pdf"><span data-dcnode-id="183" instrument_node="">

http://www.mass.gov/doer/rps/rps-2004annual-rpt.pdf</span></a></font></p><p data-dcnode-id="173"><font data-dcnode-id="174" face="Arial" size="2"><sup data-dcnode-id="176"><a data-dcnode-id="178" href="#P717_155297" name="P717_155296"><span data-dcnode-id="179" instrument_node="">59</span></a><span data-dcnode-id="177" instrument_node=""> </span></sup><span data-dcnode-id="175" instrument_node=""> 225 CMR 14.08(3)</span></font></p><p data-dcnode-id="163"><font data-dcnode-id="164" face="Arial" size="2"><sup data-dcnode-id="169"><a data-dcnode-id="171" href="#P728_159327" name="P728_159326"><span data-dcnode-id="172" instrument_node="">60</span></a><span data-dcnode-id="170" instrument_node=""> </span></sup><span data-dcnode-id="168" instrument_node=""> "2005 Electric Power Customer Migration Data", Massachusetts Division of Energy Resources, </span><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mass.gov/Eoca/docs/doer/2005migrate.pdf"><span data-dcnode-id="167" instrument_node="">

http://www.mass.gov/Eoca/docs/doer/2005migrate.pdf</span></a><span data-dcnode-id="165" instrument_node="">. </span></font></p><p data-dcnode-id="156"><font data-dcnode-id="157" face="Arial" size="2"><sup data-dcnode-id="159"><a data-dcnode-id="161" href="#P729_160110" name="P729_160109"><span data-dcnode-id="162" instrument_node="">61</span></a><span data-dcnode-id="160" instrument_node=""> </span></sup><span data-dcnode-id="158" instrument_node=""> Concerns regarding the long-term price stability of RECs were underscored by the recent crash of REC prices in Connecticut following the installation of emission control technologies on a large biomass facility.  This enabled the facility to qualify as a renewable resource under the eligibility rules of the Connecticut RPS, subsequently flooding the market with RECs.  In July 2005 Connecticut RECs were trading at approximately $35.  In December the prices had plummeted to $3.  Prices are slowly recovering as load growth and escalating renewable targets increase demand.  (Evolution Markets, March 2, 2006.)</span></font></p><p data-dcnode-id="149"><font data-dcnode-id="150" face="Arial" size="2"><sup data-dcnode-id="152"><a data-dcnode-id="154" href="#P732_161608" name="P732_161607"><span data-dcnode-id="155" instrument_node="">62</span></a><span data-dcnode-id="153" instrument_node=""> </span></sup><span data-dcnode-id="151" instrument_node=""> The MTPC was established in 1982 by the Massachusetts Legislature, initially to pursue a number of activities to support the development of the semiconductor industry in Massachusetts. Over the years its mission has been broadened to include a range of efforts to support the "innovation economy". Following the creation of the Renewable Energy Trust in late 1990s, the MTPC was charged with implementing programs to encourage the development of renewable energy. </span></font></p><p data-dcnode-id="142"><font data-dcnode-id="143" face="Arial" size="2"><sup data-dcnode-id="145"><a data-dcnode-id="147" href="#P733_162785" name="P733_162784"><span data-dcnode-id="148" instrument_node="">63</span></a><span data-dcnode-id="146" instrument_node=""> </span></sup><span data-dcnode-id="144" instrument_node=""> In addition to these "put" contracts the MTPC also offers "put/call" contracts, under which the developer is granted the right to sell RECs at a guaranteed price (the put price) to the MTPC, and the MTPC is granted the right to purchase the RECs at some higher price (the call price).  Under put contracts, the MTPC sees no, or very limited, upside since the contract would only be exercised in circumstances when the put price is above the market price.  Under a put/call contract, if the market price exceeds the call price, the MTPC can exercise its right to purchase at the call price, and resell the REC at a profit. Regardless of the contractual conditions under which RECs are purchased, the MTPC resells the RECs to LSEs for RPS compliance purposes, voluntary market purposes, or to third parties.</span></font></p><p data-dcnode-id="133"><font data-dcnode-id="134" face="Arial" size="2"><sup data-dcnode-id="138"><a data-dcnode-id="140" href="#P734_163970" name="P734_163969"><span data-dcnode-id="141" instrument_node="">64</span></a><span data-dcnode-id="139" instrument_node=""> </span></sup><span data-dcnode-id="137" instrument_node=""> Cory, K., "Long-Term Revenue Support to Help Developers Secure Project Financing," presentation at Windpower 2004, March 31, 2004, </span><a data-dcnode-id="135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mtpc.org/renewableenergy/green_power/MGPPpptAWEA.pdf"><span data-dcnode-id="136" instrument_node="">

node=""> </span></sup><span data-dcnode-id="100" instrument_node=""> N.M. Code R. § 17.9.572.10(A).</span></font></p><p data-dcnode-id="89"><font data-dcnode-id="90" face="Arial" size="2"><sup data-dcnode-id="94"><a data-dcnode-id="96" href="#P791_172062" name="P791_172061"><span data-dcnode-id="97" instrument_node="">70</span></a><span data-dcnode-id="95" instrument_node=""> </span></sup><span data-dcnode-id="93" instrument_node=""> In December 2005, the PRC adopted a solar photovoltaic incentive program under which the state's largest local utility, PNM, will purchase RECs for every kWh generated by customers' interconnected photovoltaic systems.  The program is limited to systems of less 10kW. See "New Mexico Greets New Year with New Solar RECs program," Renewable Energy Access, December 30, 2005. </span><a data-dcnode-id="91" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.renewableenergyaccess.com/rea/news/story%3Fid%3D41050"><span data-dcnode-id="92" instrument_node="">

http://www.renewableenergyaccess.com/rea/news/story?id=41050</span></a></font></p><p data-dcnode-id="80"><font data-dcnode-id="81" face="Arial" size="2"><sup data-dcnode-id="85"><a data-dcnode-id="87" href="#P794_173497" name="P794_173496"><span data-dcnode-id="88" instrument_node="">71</span></a><span data-dcnode-id="86" instrument_node=""> </span></sup><span data-dcnode-id="84" instrument_node=""> N.M. Stat. Ann. § </span><b data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">62-12-4.</span></b></font></p><p data-dcnode-id="73"><font data-dcnode-id="74" face="Arial" size="2"><sup data-dcnode-id="76"><a data-dcnode-id="78" href="#P802_177507" name="P802_177506"><span data-dcnode-id="79" instrument_node="">72</span></a><span data-dcnode-id="77" instrument_node=""> </span></sup><span data-dcnode-id="75" instrument_node=""> SB 43 Section 5.</span></font></p><p data-dcnode-id="66"><font data-dcnode-id="67" face="Arial" size="2"><sup data-dcnode-id="69"><a data-dcnode-id="71" href="#P807_179169" name="P807_179168"><span data-dcnode-id="72" instrument_node="">73</span></a><span data-dcnode-id="70" instrument_node=""> </span></sup><span data-dcnode-id="68" instrument_node=""> "Public Service Company of New Mexico Stipulated Renewable Energy Procurement Plan for 2005," pp. 1-2;  "Public Service Company of New Mexico Renewable Energy Portfolio Procurement Plan for 2006" pp. 3-4; "El Paso Electric Company's Application for Approval of its 2005 Annual Procurement Plan" pg. 3; "Southwestern Public Service Company 2005 Annual Renewable Energy Portfolio Procurement Plan," pg. 5, also see Attachment C.</span></font></p><p data-dcnode-id="59"><font data-dcnode-id="60" face="Arial" size="2"><sup data-dcnode-id="62"><a data-dcnode-id="64" href="#P814_180377" name="P814_180376"><span data-dcnode-id="65" instrument_node="">74</span></a><span data-dcnode-id="63" instrument_node=""> </span></sup><span data-dcnode-id="61" instrument_node=""> N.M. Stat. Ann. § 62-16-5(B)(1)(d).</span></font></p><p data-dcnode-id="52"><font data-dcnode-id="53" face="Arial" size="2"><sup data-dcnode-id="55"><a data-dcnode-id="57" href="#P824_184113" name="P824_184112"><span data-dcnode-id="58" instrument_node="">75</span></a><span data-dcnode-id="56" instrument_node=""> </span></sup><span data-dcnode-id="54" instrument_node=""> Depending on the type of renewable technology, each kWh of renewable generation can yield 1, 2, or 3 RECs that can be applied toward RPS compliance.</span></font></p><p data-dcnode-id="45"><font data-dcnode-id="46" face="Arial" size="2"><sup data-dcnode-id="48"><a data-dcnode-id="50" href="#P928_209551" name="P928_209550"><span data-dcnode-id="51" instrument_node="">76</span></a><span data-dcnode-id="49" instrument_node=""> </span></sup><span data-dcnode-id="47" instrument_node=""> Tex. Util. Code Ann. § 39.904(b).</span></font></p><p data-dcnode-id="38"><font data-dcnode-id="39" face="Arial" size="2"><sup data-dcnode-id="41"><a data-dcnode-id="43" href="#P929_209952" name="P929_209951"><span data-dcnode-id="44" instrument_node="">77</span></a><span data-dcnode-id="42" instrument_node=""> </span></sup><span data-dcnode-id="40" instrument_node=""> 225 Mass. Code Regs. 14.05.</span></font></p><p data-dcnode-id="31"><font data-dcnode-id="32" face="Arial" size="2"><sup data-dcnode-id="34"><a data-dcnode-id="36" href="#P932_210471" name="P932_210470"><span data-dcnode-id="37" instrument_node="">78</span></a><span data-dcnode-id="35" instrument_node=""> </span></sup><span data-dcnode-id="33" instrument_node=""> For example, versions of N.M. Code R. § 17.9.572 prior to the 2004 statutory adoption of N.M. Stat. Ann. § 62-16-1 contain specific language commenting on REC trading.</span></font></p><p data-dcnode-id="22"><font data-dcnode-id="23" face="Arial" size="2"><sup data-dcnode-id="27"><a data-dcnode-id="29" href="#P939_211967" name="P939_211966"><span data-dcnode-id="30" instrument_node="">79</span></a><span data-dcnode-id="28" instrum
