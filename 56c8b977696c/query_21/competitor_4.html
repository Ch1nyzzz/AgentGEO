de="">Increasing the number of participants to include other parties only makes sense if reselling is allowed, since the primary motive for many of these entities would be in making money off the resale of RECs.  In light of this, the fourth scenario described above will not be considered, and for purposes of this discussion the presumption is that if third-party intermediaries are allowed to participate, additional trading is also allowed.  There are a number of reasons supporting the participation of these third parties in the market. First, by allowing intermediaries to participate, the transaction costs associated with trading are likely to decline.  This benefit is particularly important for smaller LSEs who may not have the resources to effectively participate in the market for RECs.  Similarly, the introduction of a secondary market will enable renewable developers to more easily sell their RECs to more than one buyer, further facilitating the participation of small LSEs.  The current stipulation that RPS contracts be long-term assures renewable projects a stable income stream, something that is assumed to be necessary for them to secure financing.  However, for reasons already explained, small LSEs may be unable to enter into these types of contracts.    Third-party intermediaries can potentially bridge this gap by entering into long term REC contracts with renewable developers, subsequently reselling the RECs to several small LSEs on a one-off basis.</span></font><sup data-dcnode-id="4800"><font data-dcnode-id="4801" face="Arial" size="2"><a data-dcnode-id="4802" href="#P387_70514" name="P387_70515"><span data-dcnode-id="4803" instrument_node="">23</span></a></font></sup><font data-dcnode-id="4798" face="NewCenturySchlbk"><span data-dcnode-id="4799" instrument_node=""> Third-party intermediaries can thus play the role of a demand aggregator. In other words, a secondary market provides an easy way for these intermediaries to underwrite the risk of renewable development while meeting the needs of smaller LSEs.  Third, by increasing the number of potential buyers and sellers, a secondary market should limit the ability of any single entity to leverage their market power to secure lower prices and/or corner the market in RECs.     </span></font></p><p data-dcnode-id="4794"><font data-dcnode-id="4795" face="NewCenturySchlbk"><span data-dcnode-id="4796" instrument_node=""> </span></font></p><p data-dcnode-id="4791"><font data-dcnode-id="4792" face="NewCenturySchlbk"><span data-dcnode-id="4793" instrument_node="">Despite the apparent advantages of allowing additional trading and increasing market participation, there are tradeoffs to consider. The more flexibility there is, either in terms of whether additional trading after the initial sale is allowed, or in terms of who is eligible to participate in the market, the greater the complexity of program administration.  The increase in complexity, however, would seem to turn on whether additional trading after the initial sale of RECs is authorized.  If no additional trading is allowed, a contract-path approach to REC tracking and trading may be sufficient even if non-generators and non-LSEs were allowed to participate.  Under a fully tradable regime, in which resale is allowed, an electronic REC tracking system is a practical necessity, again, regardless of whether third parties are also allowed to participate.  Once an electronic tracking system is online, the additional costs associated with allowing third party entities to participate, or allowing multiple transfers, should be negligible. </span></font></p><p data-dcnode-id="4785"><b data-dcnode-id="4786"><i data-dcnode-id="4787"><font data-dcnode-id="4788" face="Verdana"><a data-dcnode-id="4790" name="P390_72267"></a><span data-dcnode-id="4789" instrument_node="">California Context</span></font></i></b></p><p data-dcnode-id="4782"><font data-dcnode-id="4783" face="NewCenturySchlbk"><span data-dcnode-id="4784" instrument_node="">California is currently exploring ways to facilitate the participation of ESPs, and CCAs, as well as small and multi-jurisdictional utilities in the RPS program.  For reasons already described, the ability to purchase unbundled or tradable RECs may offer a low-cost alternative to compliance for these entities.  Although in the long run the active participation of smaller obligated LSEs would appear to be best served under a fully tradable regime, as an intermediate step an unbundled approach may be appropriate. The number of entities involved and the volume of trading is likely to be much lower under an unbundled regime, thus reducing the administrative complexity of the program, possibly allowing it to be implemented more quickly than if the state were to migrate to a fully tradable system immediately.  However, even with the relatively limited demands of an unbundled regime, the interim reporting and accounting system currently used to track renewable procurement by obligated entities is unlikely to be sufficient.  As it currently operates, the CEC issues a verification report that tracks and verifies all RPS-eligible procurement annually.  This report is subsequently used by the CPUC to assess compliance with the RPS program.  There are currently no protocols in place that would allow for RECs to be unbundled from the renewable generation itself and assigned to another LSE. Although the current approach to tracking compliance does involve the implicit use of RECs, specifically the indefinite banking provision, this falls well short of providing a platform or process to track unbundled REC trades between entities.   </span></font></p><p data-dcnode-id="4777"><b data-dcnode-id="4778"><font data-dcnode-id="4779" face="Verdana" size="+1"><a data-dcnode-id="4781" name="P396_73931"></a><span data-dcnode-id="4780" instrument_node="">OTHER CRITICAL ISSUES</span></font></b></p><p data-dcnode-id="4772"><b data-dcnode-id="4773"><font data-dcnode-id="4774" face="Verdana" size="+1"><a data-dcnode-id="4776" name="P397_73952"></a><span data-dcnode-id="4775" instrument_node="">Contract Lengths</span></font></b></p><p data-dcnode-id="4763"><font data-dcnode-id="4770" face="NewCenturySchlbk"><span data-dcnode-id="4771" instrument_node="">From the investment community's perspective, renewable energy development can be a risky endeavor.  Renewable energy projects tend to be capital intensive with most of the costs incurred at the beginning of a project. Once incurred, these costs are largely sunk, a factor that increases the risk associated with these investments.  An RPS is intended to mitigate some of this risk by compelling obligated LSEs to purchase some minimum amount of renewable energy, in effect creating a guaranteed market for renewable energy.  That said, the creation of an RPS alone may be insufficient to provide the financial markets sufficient certainty that investments in specific renewable projects will bear fruit.  For one, although an RPS guarantees a market for renewables in general, at the level of the individual developer, absent long-term contracts, the possibility remains that demand will vanish either due to changes in overall market demand (e.g., resulting from an economic downturn) or the emergence of low-cost competitors.  In addition, regulatory uncertainty (i.e., the possibility that the regulatory framework could change) may result in a higher perception of risk associated with renewable energy investments, thereby raising the cost of capital and limiting investment accordingly.  Long-term contracts provide one means of providing additional certainty to investors that renewable projects will have a stable income stream for the duration of the contract, irrespective of changes in the competitive landscape, economic conditions, or the regulatory environment.</span></font><sup data-dcnode-id="4766"><font data-dcnode-id="4767" face="Arial" size="2"><a data-dcnode-id="4768" href="#P400_75543" name="P400_75544"><span data-dcnode-id="4769" instrument_node="">24</span></a></font></sup><font data-dcnode-id="4764" face="NewCenturySchlbk"><span data-dcnode-id="4765" instrument_node=""> </span></font></p><p data-dcnode-id="4754"><font data-dcnode-id="4761" face="NewCenturySchlbk"><span data-dcnode-id="4762" instrument_node="">Long-term contracts also play an important role in securing the fuel diversity benefits ascribed to greater reliance on renewables. Specifically, renewable energy, sold on a long-term, fixed-price basis, can function as a hedge against price swings that exist in the wholesale energy market, driven largely by fossil fuel price volatility.  Although intuitively the purchase of RECs alone would not appear to confer any hedge benefits, since the purchasing utility must still purchase energy from the wholesale market, creative contractual approaches can ensure that unbundled REC purchases provide similar benefits.  Contracts for differences represent a contractual approach whereby the price of RECs varies inversely with the price of energy on the wholesale market, such that the sum of the two equals a pre-determined fixed price. Utilizing this type of contract, an LSE is able to lock-in a fixed price for the combination of wholesale energy purchases and RECs, thus providing a price hedge.</span></font><sup data-dcnode-id="4757"><font data-dcnode-id="4758" face="Arial" size="2"><a data-dcnode-id="4759" href="#P403_76962" name="P403_76963"><span data-dcnode-id="4760" instrument_node="">25</span></a></font></sup><font data-dcnode-id="4755" face="NewCenturySchlbk"><span data-dcnode-id="4756" instrument_node=""> At the same time, assuming they are done on a long-term basis, contracts for differences enable a renewable energy developer to lock-in a fixed revenue stream, thus providing certainty to investors.  Absent these long-term contracts, obligated entities will not reduce their exposure to price swings associated with conventional energy.   </span></font></p><p data-dcnode-id="4745"><font data-dcnode-id="4752" face="NewCenturySchlbk"><span data-dcnode-id="4753" instrument_node="">IOUs in California may have relatively limited financial incentives to enter into long-term contracts, despite the benefits these contracts provide to ratepayers and renewable energy developers. By the same token, there is relatively limited risk for them to enter into these contracts, given their ability to pass costs onto ratepayers and their relatively stable loads.  Thus, regulations that obligate the IOUs to enter into long-term contracts seem unlikely to impose undue burden.  However, for smaller LSEs, long-term contracts for renewable energy are likely to be problematic, given the relatively higher levels of load variability and lack of guaranteed load that smaller LSEs face. For example, if an energy intensive industry shuts down in a small LSE's service territory, the impact on its total load can be substantial, such that it will be left holding a surfeit of energy under a long-term contract.  The costs of this energy will need to be reallocated to the remaining load, or, if a deregulated market prevails, absorbed by shareholders.</span></font><sup data-dcnode-id="4748"><font data-dcnode-id="4749" face="Arial" size="2"><a data-dcnode-id="4750" href="#P406_78786" name="P406_78787"><span data-dcnode-id="4751" instrument_node="">26</span></a></font></sup><font data-dcnode-id="4746" face="NewCenturySchlbk"><span data-dcnode-id="4747" instrument_node="">  Although, barring any contractual limitations to reselling, this energy can be remarketed, the ratepayers and shareholders of smaller LSEs ultimately assume additional price risk.  In contrast, because of their size and the diversity of economic activity within their service territories, the large IOUs are less vulnerable to dramatic load reductions and any attendant reallocation of costs, thus the risk associated with long-term contracts is comparatively less. More importantly, this risk is borne by utility ratepayers, not shareholders, since the utilities can roll the costs of energy into their rates, such that even if a significant reduction in load were to occur, remaining load would simply have to shoulder a greater share of the costs.  For ESPs, the ability to pass additional costs on to ratepayers is limited by the prices charged by the utilities, with whom ESPs compete, as well as by the contractual terms they have entered into with their customers.</span></font></p><p data-dcnode-id="4738"><font data-dcnode-id="4739" face="NewCenturySchlbk"><span data-dcnode-id="4744" instrument_node="">The same issue persists in the context of an unbundled or tradable REC regime.  In the interest of ensuring certainty to investors, policy makers have an interest in promoting long-term renewable contracts. Regardless of whether unbundled RECs are allowed, the financial community will require that renewable developers demonstrate that their prospective investments in renewable projects will generate sufficient revenues to cover their debt obligations, and thereby provide a requisite level of certainty regarding the security of their investment.  The totality and certainty of revenue is what matters, not whether that stream is generated by the sale of a bundled commodity, or a commodity that has been bifurcated into two marketable components.  However, as already described, long-term contracting requirements can impose undue burden on smaller LSEs. Policy makers need to consider whether they will allow any obligated entities, or a subset of entities, to enter into short-term contracts to satisfy their RPS obligations, or if doing so will undermine the certainty long-term contracts provide.  Although one could imagine scenarios in which renewable developers might be able to build without holding long-term contracts, at the present time, these contracts are viewed as a critical element in securing financing.</span><sup data-dcnode-id="4741"><a data-dcnode-id="4742" href="#P409_81276" name="P409_81277"><span data-dcnode-id="4743" instrument_node="">27</span></a></sup><span data-dcnode-id="4740" instrument_node=""> </span></font></p><p data-dcnode-id="4731"><font data-dcnode-id="4732" face="NewCenturySchlbk"><span data-dcnode-id="4737" instrument_node="">Interest in unbundled and/or tradable RECs in California is motivated in part by the perceived need to provide additional compliance flexibility to ESPs, CCAs, and small and multi-jurisdictional utilities.  The acceleration of the RPS timetable from a target date of 2017 to 2010, coupled with the absence of rules governing the RPS activities of these entities, have dramatically reduced the time frame within which they can procure the resources necessary to attain the 20% goal.  Given the significant transmission constraints and the inequitable distribution of renewable resources throughout the state, unbundled or tradable RECs are viewed as a way to enable more expeditious compliance at relatively lower cost to bundled purchase requirements  The smaller obligated entities have generally supported the use of unbundled RECs on the grounds that RECs will enable them to comply without incurring the costs of delivering and managing renewable resources, and without assuming the substantial risk associated with long-term contracts. Regarding the former rationale, unbundled RECs used for RPS compliance are inherently divorced from the management of the underlying energy.  However, the risks of long-term contracts depend on whether policy makers decide that short-term REC purchases, like those envisioned under a tradable REC program, are allowed.  The risks of long-term contracting are especially high for ESPs in California, given the current status of Direct Access in the state.  ESPs may prefer to enter into short-term contracts, or engage in spot market purchases for RECs, despite price volatility concerns, rather than enter into long-term contracts and face the possibility of stranded costs associated with substantial loss of load.  However, for ESPs this is largely a matter of choosing from the lesser to two evils inasmuch as short-term or spot market purchases of RECs appear likely to be characterized by higher prices generally</span><sup data-dcnode-id="4734"><a data-dcnode-id="4735" href="#P412_83710" name="P412_83711"><span data-dcnode-id="4736" instrument_node="">28</span></a></sup><span data-dcnode-id="4733" instrument_node=""> compared to long-term contracts as well as prone to greater price volatility. It should also be noted that even if ESPs, CCAs and other LSEs were willing to enter into long-term contracts, their ability to do so may be constrained by their credit worthiness.</span></font></p><p data-dcnode-id="4724"><font data-dcnode-id="4725" face="NewCenturySchlbk"><span data-dcnode-id="4730" instrument_node="">As discussed in the section regarding participatory flexibility, this impasse may be resolved by third-party intermediaries, or possibly larger LSEs, who could underwrite the risk, by entering into long-term REC contracts with developers on the premise that they can resell the RECs to obligated entities at some later time. The willingness of these intermediaries to enter into these arrangements will hinge on the degree of certainty they have that they will be able to recoup their costs and earn a reasonable rate of return. At present time it is difficult to know whether there are any third parties that would be willing to enter into long-term contracts specifically for purposes of selling RECs to those parties that are unable or unwilling to enter into such contracts themselves. In the absence of the market's ability to bridge this gap the state could conceivably authorize the establishment of a procurement entity to procure RECs under long-term contract on behalf of smaller entities for which such contracts impose undue burden.</span><sup data-dcnode-id="4727"><a data-dcnode-id="4728" href="#P415_85237" name="P415_85238"><span data-dcnode-id="4729" instrument_node="">29</span></a></sup><span data-dcnode-id="4726" instrument_node="">  A discussion of the specific details of how such and entity would be created and operate is beyond the scope of this paper, but would clearly require a great deal of thought and input from stakeholders, should this be viewed as a route worth pursuing.  There is also some indication that some of the larger renewable developers are increasingly willing to build on a merchant basis provided they have some degree of certainty regarding their ability to sell RECs and energy into the market, whether on a long-term or short-term basis. </span></font></p><p data-dcnode-id="4719"><b data-dcnode-id="4720"><font data-dcnode-id="4721" face="Verdana" size="+1"><a data-dcnode-id="4723" name="P417_86009"></a><span data-dcnode-id="4722" instrument_node="">Compatibility with RPS Supplemental Energy Payments Structure </span></font></b></p><p data-dcnode-id="4716"><font data-dcnode-id="4717" face="NewCenturySchlbk"><span data-dcnode-id="4718" instrument_node="">The immediate goal of an RPS is to stimulate demand for renewable energy above and beyond what would be selected were no requirement imposed.  Absent an explicit requirement to purchase minimum amounts of renewable energy, the market would select renewable resources provided they were priced at or below the market price of conventional energy.  In order to have any impact beyond what the market would provide on its own, an RPS must require obligated entities to purchase a minimum amount of renewable energy exceeding the amount the market would otherwise dictate, such that the price of renewable energy rises sufficiently to induce market entry of renewable developers consistent with the goals of the program.  This is illustrated in Figure 2 below.  </span></font></p><p data-dcnode-id="4711"><b data-dcnode-id="4712"><font data-dcnode-id="4713" face="NewCenturySchlbk"><a data-dcnode-id="4715" name="P421_86829"></a><span data-dcnode-id="4714" instrument_node="">Figure 2: REC Price Determination Under an RPS </span></font></b></p><p data-dcnode-id="4709"><img border="1" data-dcnode-id="4710" height="395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.cpuc.ca.gov/publishedDocs/published/Graphics/55606-3.gif&amp;raw" width="576"></p><p data-dcnode-id="4706"><font data-dcnode-id="4707" face="NewCenturySchlbk"><span data-dcnode-id="4708" instrument_node="">The intersection of the renewable energy demand curve, for simplicity assumed here to be based exclusively on the RPS mandate, and the renewable energy supply curve, yield a market clearing price of renewable energy of P**. From this basic framework, it follows that the price of procuring renewable resources to meet the RPS will impose costs above the market price of energy that ratepayers would otherwise bear.  In Figure 2 this is represented by the difference between P* and P**, where P* represents the market price of energy and P** represents the market clearing price for renewable energy.  In creating the RPS in California, legislators created a system by which these above-market costs are paid for by all ratepayers, through the Supplemental Energy Payment (SEP) process. The difference between a proxy for the market price of electricity, known as the market price referent (MPR), and the cost of electricity from renewable sources, is paid for out of the pool of funds generated by the public goods charge (PGC). The SEP funds are administered by the CEC, and are distributed on a project-by-project basis, such that each project that produces energy at a cost higher than the MPR receives SEPs covering part, or all, of the differential between the MPR and their costs. Unlike a uniform subsidy, supplemental funding varies from project to project on the basis of estimated need.  This approach was developed with the intention of allowing the PGC funding to be stretched as far as possible.  Should the above-market costs of complying with the RPS exceed the availability of SEP funds, obligated entities are allowed to forgo additional renewable energy purchases. Thus this structure also provides a cap on the costs of compliance with the RPS.  </span></font></p><p data-dcnode-id="4694"><font data-dcnode-id="4702" face="NewCenturySchlbk"><span data-dcnode-id="4705" instrument_node="">This approach appears incompatible with an unbundled or tradable REC regime.  Each point on the renewable energy supply curve represents the price generators must receive in order to produce a corresponding amount of output. Implicitly these monies can be split into two components: the value of the energy, and the value of the renewable attributes.  For some renewable generators, the value of the energy alone will be sufficient to cover their costs and they would be willing to produce irrespective of the value of RECs, i.e., all generators to the left of Q* (representing the quantity of the renewable energy that the market would provide absent the RPS requirement given a price of energy of P*).  For generators to the right of Q*, an additional quantity of money is required to make up the difference between the price of energy and the price they need to receive in order to enter the market.  In a perfect market, the price of renewable energy will be determined by the intersection of the supply and demand curves for renewable energy, with the price of RECs equal to the difference between P** and the market price of energy, P*. An important observation is that, assuming perfect competition, </span><i data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">all renewable generators in the market will receive this price for their RECs.</span></i></font><i data-dcnode-id="4697"><sup data-dcnode-id="4698"><font data-dcnode-id="4699" face="Arial" size="2"><a data-dcnode-id="4700" href="#P427_89926" name="P427_89927"><span data-dcnode-id="4701" instrument_node="">30</span></a></font></sup></i><font data-dcnode-id="4695" face="NewCenturySchlbk"><span data-dcnode-id="4696" instrument_node=""> </span></font></p><p data-dcnode-id="4691"><font data-dcnode-id="4692" face="NewCenturySchlbk"><span data-dcnode-id="4693" instrument_node="">This is where the incompatibility of the SEP structure and a tradable REC regime comes to the fore. Under an unbundled regime, all generators except the marginal unit receive a total combined price for their energy and RECs that exceeds what they require to be willing to produce renewable energy. In contrast, under the SEP structure, each generator theoretically receives only the amount that is necessary to induce them to enter the market.  Some have suggested that RECs represent the above-market costs of renewable energy, and, therefore, applying the SEP approach in the context of an unbundled REC regime would require that SEPs be used to pay for all RECs.  However the price of RECs does not correspond to the above-market costs of all renewable generation.  As the analysis above indicates, it represents the above-market costs only for the marginal unit. Thus SEP funding used to pay for RECs associated with the energy produced by infra-marginal generators would, rather than stimulating additional renewable development, end up contributing largely to producer surplus.  </span></font></p><p data-dcnode-id="4688"><font data-dcnode-id="4689" face="NewCenturySchlbk"><span data-dcnode-id="4690" instrument_node="">Given the problems associated with calculating SEPs in the context of unbundled RECs, a number of alternatives could be pursued, ranging from wholesale elimination of the SEP subsidy to leaving the existing SEP structure unchanged, but limiting SEP eligibility to bundled renewable contracts consistent with the 10, 15, and 20 year contract terms currently required by the regulatory framework. Absent legislation to eliminate the SEP subsidy, the latter approach or variations thereof may be the most realistic option, at least in the near term.  </span></font></p><p data-dcnode-id="4685"><font data-dcnode-id="4686" face="NewCenturySchlbk"><span data-dcnode-id="4687" instrument_node="">Proponents of limiting the availability of SEPs to bundled contracts have argued that unbundled RECs do not contribute to the installation of new renewable facilities anyway, so theoretical and technical challenges associated with calculating above-market costs for unbundled purchases aside, they should not receive ratepayer subsidies, which are specifically intended to promote new development. However, in the context of new renewable facilities, unbundled REC purchases under long-term contracts would appear to be a valid means of providing some certainty to investors regarding the financial viability of a renewable project and thus facilitate financing and development.  Short-term REC sales may also play a role to the extent that the prospect of short-term REC sales motivate renewable developers to build on a merchant basis.  The point is that one could easily imagine how unbundled REC sales do, in fact, contribute to additional renewable development.  These new projects may very well have costs that exceed the market price referent and, applying the same logic as that used to justify SEP payments to bundled projects, should also be provided access to ratepayer subsidies.    </span></font></p><p data-dcnode-id="4682"><font data-dcnode-id="4683" face="NewCenturySchlbk"><span data-dcnode-id="4684" instrument_node="">If the PGC funds are made available to support unbundled REC purchases, efforts to distinguish between those unbundled REC sales that do contribute to new renewable development and those that do not should be undertaken.  One potential approach would be to limit the availability of PGC funds on the basis of facility vintage, the presumption being that older facilities, i.e. those with online dates that pre-existed the establishment of the RPS program, do not require the additional support in order to be viable.  This would be consistent with the current regulations that limit SEP funds to those facilities that began commercial operations on or after January 1, 2002 or have been repowered and re-commenced operation on or after January 1, 2002.  </span></font></p><p data-dcnode-id="4679"><font data-dcnode-id="4680" face="NewCenturySchlbk"><span data-dcnode-id="4681" instrument_node="">Creating a system that avails only bundled contracts of the PGC subsidy may give rise to perverse incentives whereby an LSE may elect to enter into a bundled contract even if it is more expensive than an unbundled alternative consisting of both an unbundled non-renewable energy contract and an unbundled REC contract.  Assuming both options result in costs that exceed the MPR, LSEs would have an incentive to select the bundled contract because the costs under that contract are capped at the MPR.  This may undermine some of the market efficiencies that migration to an unbundled REC regime is intended to facilitate. It is also seemingly at odds with the goal of reducing variation in the costs of RPS compliance in different parts of the state due to differences in the endowment of, and access to, renewable resources.  The ability to enter into a bundled contract with a renewable developer is largely contingent on whether the energy can be delivered. Those LSEs that rely more heavily on unbundled REC purchases to achieve their RPS compliance targets, because they operate in resource poor regions or have limited transmission capacity, will not enjoy the same cost protections as those LSEs that don't face these constraints if access to PGC subsidies is confined exclusively to bundled contracts.</span></font></p><p data-dcnode-id="4676"><font data-dcnode-id="4677" face="NewCenturySchlbk"><span data-dcnode-id="4678" instrument_node="">As noted above, one of the goals of relying on SEPs and the associated pool of PGC funds to cover the above-market cost of renewable generation is to limit the total costs of the RPS program.  Over the longer term other options may be more effective at achieving the goal of limiting the costs of complying with the RPS without conflicting with the ability to use unbundled RECs for RPS compliance or resulting in the distortionary impacts described above.  For example, in Massachusetts, LSEs can make alternative compliance payments (ACPs) in lieu of purchasing RECs.  An alternative compliance payment is set at a predetermined amount thus keeping the costs of RPS compliance in check. If the price of RECs rises to the level of the ACP, obligated entities can substitute REC purchases with ACPs.  Monies collected from these payments can be used to support additional renewable development. However, this option is not without it own set of drawbacks.  For one, it does not cap the total cost of RPS compliance since the total compliance obligation can continue to grow, through increased demand, even though ACPs place a ceiling on the cost per unit of compliance.  In addition, LSEs may choose to forgo REC purchases in favor of making alternative compliance payments if they view this as an easy way out, suggesting that, if implemented, some means of verifying that the alternative compliance payment is, in fact, the least-cost option available, will need to be established.  Absent this verification, LSEs may choose to pay ACPs rather than purchase RECs under a long-term contract, even at a price below the cost of the ACP, because they can avoid the risks these long-term contracts may impose, in terms of load migration, regulatory uncertainty, etc.</span></font></p><p data-dcnode-id="4671"><b data-dcnode-id="4672"><font data-dcnode-id="4673" face="Verdana" size="+1"><a data-dcnode-id="4675" name="P441_97131"></a><span data-dcnode-id="4674" instrument_node="">Double-Counting </span></font></b></p><p data-dcnode-id="4668"><font data-dcnode-id="4669" face="NewCenturySchlbk"><span data-dcnode-id="4670" instrument_node="">If the same REC is claimed by more than one party, and/or retired in order to meet more than one regulatory or voluntary market purpose, it may constitute double-counting.  Clearly if more than one obligated entity is claiming the same REC for RPS compliance purposes, double counting has occurred.  Although electronic REC tracking systems, in which an unique identifier is assigned to each REC, can largely eliminate this concern for "in-system" REC sales, it is still conceivable for a REC to be sold twice if it is sold to an entity that falls outside of the governance regime, for example to an out-of-state entity that is not covered by the tracking system.  To address this, the state should seek to encourage other jurisdictions to transact through the California tracking system when procuring RECs from entities that participate in the California market. In addition, there may be more subtle issues that policy makers may need to address, as in the context of cap and trade and other emission reduction programs.  </span></font></p><p data-dcnode-id="4665"><font data-dcnode-id="4666" face="Arial" size="2"><span data-dcnode-id="4667" instrument_node="">In California, limits on carbon emissions are an impending reality.  Policy makers will need to reconcile any REC program with whatever carbon regime emerges.  Once a carbon cap is adopted, compliance enforcement requires the accurate measurement of total emissions attributable to each regulated entity.  Unbundled REC purchases may complicate this assessment to the extent that the purchaser of the associated energy may not have claim on the renewable attributes, including avoided CO2 emissions, embodied by the REC. Whether claim over these attributes are conveyed with the REC is a question policy makers will need to resolve.  If they decide that these attributes are conveyed with the REC, the REC essentially functions as an offset, reducing the emissions for which a given utility is held accountable.  Determining the value of this offset is an issue that will need to be fully addressed.  One could easily imagine this becoming quite complex given that the emission benefits of renewable energy are primarily driven by what conventional resources are displaced, which is likely to vary by the type of renewable project, based on its location and when it operates.  In addition, the emission attributes of the renewable facility itself must be considered.  (e.g. biomass and biogas facilities release CO2 into the atmosphere). Furthermore, the LSE that purchases the commodity energy should not be allowed to take credit for the avoided CO2 emissions associated with the REC, as allowing it to do so would constitute double counting.  Instead the CO2 emissions for which it is accountable should be adjusted upward to reflect the same amount for which the purchaser of the REC receives credit.  These and related issues should be considered by the Commission as it moves forward with implementing a load-based carbon cap on the IOUs pursuant to D.06-02-032. </span></font></p><p data-dcnode-id="4662"><font data-dcnode-id="4663" face="NewCenturySchlbk"><span data-dcnode-id="4664" instrument_node="">Similar concerns potentially arise in any situation where a separate market exists for an attribute associated with renewable energy. For example, biomass and biogas facilities offer important on-site benefits, in addition to the benefits of displacing conventional facilities by capturing harmful emissions, like methane, that would otherwise be released into the environment.  According to CEC staff, some facilities are currently selling these on-site benefits into emission markets.  Once could argue that these on-site benefits are part and parcel of the REC.   To the extent that renewable generators will, or may already, be participating in a cap and trade programs or other emission markets by selling or otherwise providing emissions offsets or permits, policy makers will need to determine whether renewable generators can sell their disaggregated RECs for RPS compliance purposes.  Under ideal circumstances, all trades involving generation attributes would be tracked using one system.  Absent this capability, it becomes difficult, if not impossible, to determine what, exactly, a REC represents and whether a partial double-sale has occurred. That said, disaggregation and tracking of underlying benefits greatly increase the administrative complexity associated with the program, since the tracking system would need to track each of the underlying attributes separately or have some means of know that a REC has had some of its underlying attributes sold off. </span></font></p><p data-dcnode-id="4657"><b data-dcnode-id="4658"><font data-dcnode-id="4659" face="Verdana" size="+1"><a data-dcnode-id="4661" name="P449_101518"></a><span data-dcnode-id="4660" instrument_node="">Assignment of REC Ownership to Qualifying Facilities and Distributed Generators</span></font></b></p><p data-dcnode-id="4654"><font data-dcnode-id="4655" face="NewCenturySchlbk"><span data-dcnode-id="4656" instrument_node="">A number of policies in addition to the RPS have been implemented in an effort to promote the development of alternative energy technologies in California. Under the Public Utility Regulatory Policies Act (PURPA), utilities were required to purchase energy from Qualifying Facilities (QFs) under long-term contracts at the interconnecting utility's short run avoided costs.  In addition to PURPA, California's Self Generation Incentive Program has fostered the development of distributed generating (DG) technologies by offering rebates to offset installation costs.  Similarly, the California Energy Commission offers rebates to consumers who install qualifying renewable energy systems on their property through their Emerging Renewables Program (ERP).  The recent creation of the California Solar Initiative (CSI) in D.06-01-024 expands on the SGIP and the ERP, earmarking approximately $2.9 billion in rebates to support the installation of distributed solar technologies.  </span></font></p><p data-dcnode-id="4649"><font data-dcnode-id="4652" face="NewCenturySchlbk"><span data-dcnode-id="4653" instrument_node="">Energy produced by QFs and by DG facilities is eligible to be counted toward utilities' RPS targets provided the energy produced is from a designated renewable technology.  In the case of QFs, renewable facilities were included in the calculation of the large IOUs' RPS baselines, which quantified the existing share of energy that renewables represented in their portfolios as of January 1, 2002.   In other words, the Commission adopted an approach whereby the RECs associated with QF generation were conveyed with the energy delivered under contract.  As these contracts expire, the issue regarding the disposition of RECs produced by these facilities going forward will need to be resolved. As Figure 2 above indicates, one of the confounding factors associated with migrating to an unbundled or tradable REC regime is that all renewable facilities will receive the market clearing price for their RECs, despite the fact that for those facilities that are able to compete with conventional facilities (i.e. those to the right of Q*), the price received for RECs gives them a total revenue stream that exceeds what they need in order to be willing to remain in the market.  To the extent that many QFs have long since paid off their fixed costs, these facilities may be those that do not require the full magnitude of the additional incentive that RECs would provide. In other words, these facilities would continue operating regardless of their ability to capture additional value for their RECs since the price they receive for energy alone is sufficient to cover their variable costs.  To the extent that a REC program is intended to promote incremental investments in renewable generation, monies spent by ratepayers to procure RECs from facilities that would operate regardless would appear to increase the costs of the program unnecessarily.  The Commission will need to think carefully about if and how it can limit the ability of these facilities to earn windfall gains at California ratepayer expense while leaving incentives to expand or repower existing facilities intact.</span></font><font data-dcnode-id="4650" face="Bodoni MT"><span data-dcnode-id="4651" instrument_node=""> </span></font></p><p data-dcnode-id="4639"><font data-dcnode-id="4644" face="NewCenturySchlbk"><span data-dcnode-id="4648" instrument_node="">In the case of DG, in D.05-05-011 the CPUC adopted the position that energy produced by renewable DG technologies can be applied toward RPS goals and, further, that the RECs from these facilities are conferred to the owner of the DG installation.  In the same decision, the CPUC acknowledged that this approach is relatively crude, in light of ratepayer subsidies to support DG installation, leaving the possibility open that a more nuanced approach, in which REC ownership reflects both ratepayers' and owners' respective investments in these facilities, could be adopted. It should be noted that regardless of whether RECs associated with DG facilities are transferred to the IOUs on the basis of their share of the installation costs, IOUs do benefit from these facilities through the load reductions these facilities enable. This avoided load reduces the RPS compliance obligations of the IOU within whose service territory the DG facility is located. D.05-05-011 also notes that the RPS eligibility of RECs produced by DG facilities will be contingent on the ability to accurately measure the amount of energy these facilities produce.  This issue was also deferred.</span><a data-dcnode-id="4646" href="#P456_105833" name="P456_105834"><span data-dcnode-id="4647" instrument_node="">31</span></a><span data-dcnode-id="4645" instrument_node=""> Additional questions should also be addressed. For example, under the state's net-metering program, the meter of a DG owner runs backwards when the DG facility is producing electricity, in essence, giving the DG owner a credit to be applied against their electricity bill for every unit of electricity they generate, up to the total amount of grid-based electricity they use.  This is a sizable subsidy with implications for REC ownership similar to those raised with respect to subsidies that offset DG installation costs.</span></font><font data-dcnode-id="4642" face="Bodoni MT"><span data-dcnode-id="4643" instrument_node=""> </span></font><font data-dcnode-id="4640" face="Times New Roman"><span data-dcnode-id="4641" instrument_node=""> </span></font></p><p data-dcnode-id="4634"><b data-dcnode-id="4635"><font data-dcnode-id="4636" face="Verdana" size="+1"><a data-dcnode-id="4638" name="P460_106553"></a><span data-dcnode-id="4637" instrument_node="">TRACKING SYSTEM REQUIREMENTS UNDER A TRADABLE REC REGIME</span></font></b></p><p data-dcnode-id="4625"><font data-dcnode-id="4632" face="NewCenturySchlbk"><span data-dcnode-id="4633" instrument_node="">REC tracking can be achieved in two ways: a contract-path approach and a certificate- based approach.  Under the contract-path approach, REC ownership is tracked via bilateral contracts, in which an auditor determines ultimate ownership of energy and its associated attributes, by tracking the chain of custody from generator to LSE.  Because information regarding contracts is not centralized and not standardized, this method is relatively cumbersome.</span></font><sup data-dcnode-id="4628"><font data-dcnode-id="4629" face="Arial" size="2"><a data-dcnode-id="4630" href="#P463_107062" name="P463_107063"><span data-dcnode-id="4631" instrument_node="">32</span></a></font></sup><font data-dcnode-id="4626" face="NewCenturySchlbk"><span data-dcnode-id="4627" instrument_node="">  Furthermore, because the contract-path approach does not have a method for uniquely identifying each individual REC that is created, assessing whether any double sales have occurred under an unbundled or tradable regime is a relatively difficult proposition.  In contrast, under a certificate-based approach, RECs are uniquely identified and assigned to generators through a centralized system of accounts.  The number of RECs that are recognized by the system is determined by metered generation, not contracts, thus ensuring that the number of RECs corresponds directly to the total amount of renewable energy that has actually been produced.  Although the financial terms of REC transactions are typically conducted on a bilateral basis, transfer of REC ownership must be confirmed through the system by both buyer and seller. This provides a robust platform for assessing the amount of renewable energy obligated entities can claim whether for RPS, voluntary market, or general disclosure purposes.    </span></font></p><p data-dcnode-id="4610"><font data-dcnode-id="4623" face="NewCenturySchlbk"><span data-dcnode-id="4624" instrument_node="">While in the context of a bundled regime, as that term is defined in this paper, a contract-path approach to tracking the environmental attributes of energy may be feasible, a certificate based tracking system becomes increasingly important as the level of trading flexibility increases. Such systems are better able to track REC ownership across entities and thus ensure that double-counting of RECs does not occur in a far more robust way than the contract-path approach. At a minimum the tracking system must be able to (1) issue RECs based on a determination of how much renewable energy is generated and by whom, consistent with generator eligibility criteria, (2) support various rules governing REC eligibility for additional trading</span></font><sup data-dcnode-id="4619"><font data-dcnode-id="4620" face="Arial" size="2"><a data-dcnode-id="4621" href="#P466_108949" name="P466_108950"><span data-dcnode-id="4622" instrument_node="">33</span></a></font></sup><font data-dcnode-id="4617" face="NewCenturySchlbk"><span data-dcnode-id="4618" instrument_node=""> as well as (3) track REC transactions, by providing a channel through which trades are confirmed by both the buyer and seller, and REC ownership transferred accordingly. According to a report by the California Research Bureau, of the 14 jurisdictions identified in their report that allow REC trading, 6 have operating systems in place, and seven have systems under development.</span></font><sup data-dcnode-id="4613"><font data-dcnode-id="4614" face="Arial" size="2"><a data-dcnode-id="4615" href="#P467_109921" name="P467_109922"><span data-dcnode-id="4616" instrument_node="">34</span></a></font></sup><font data-dcnode-id="4611" face="NewCenturySchlbk"><span data-dcnode-id="4612" instrument_node=""> </span></font></p><p data-dcnode-id="4605"><b data-dcnode-id="4606"><font data-dcnode-id="4607" face="Verdana" size="+1"><a data-dcnode-id="4609" name="P469_110702"></a><span data-dcnode-id="4608" instrument_node="">Issuance of RECs</span></font></b></p><p data-dcnode-id="4596"><font data-dcnode-id="4603" face="NewCenturySchlbk"><span data-dcnode-id="4604" instrument_node="">In order to issue RECs, the tracking system must have access to robust data describing the amount of renewable energy generated by each renewable energy generating facility. For every unit of energy generated by a renewable resource, the system must be able to issue a REC, and associate that REC with the specific generator that produced it.  Since independent system operators typically track energy generation and flows at the wholesale level, they are strong candidates for assuming the role of issuing and tracking RECs.</span></font><sup data-dcnode-id="4599"><font data-dcnode-id="4600" face="Arial" size="2"><a data-dcnode-id="4601" href="#P472_111243" name="P472_111244"><span data-dcnode-id="4602" instrument_node="">35</span></a></font></sup><font data-dcnode-id="4597" face="NewCenturySchlbk"><span data-dcnode-id="4598" instrument_node=""> </span></font></p><p data-dcnode-id="4591"><b data-dcnode-id="4592"><font data-dcnode-id="4593" face="Verdana" size="+1"><a data-dcnode-id="4595" name="P474_111385"></a><span data-dcnode-id="4594" instrument_node="">Incorporation of RPS Rules</span></font></b></p><p data-dcnode-id="4588"><font data-dcnode-id="4589" face="NewCenturySchlbk"><span data-dcnode-id="4590" instrument_node="">The tracking system must also be able to support the various rules that govern REC eligibility for trading and application toward RPS targets.  This may involve automated processes by which RECs are automatically designated as eligible or ineligible by the system for RPS compliance.  Alternatively, the REC system may simply track all of the attributes on which an eligibility determination relies and leave the actual decision as to whether a given REC can be applied toward an entity's compliance targets to state regulators. In either case, the system must capture all information necessary to verify whether a REC can be applied toward the state's RPS goals. </span></font></p><p data-dcnode-id="4583"><b data-dcnode-id="4584"><font data-dcnode-id="4585" face="Verdana" size="+1"><a data-dcnode-id="4587" name="P478_112075"></a><span data-dcnode-id="4586" instrument_node="">Tracking of REC Transactions</span></font></b></p><p data-dcnode-id="4580"><font data-dcnode-id="4581" face="NewCenturySchlbk"><span data-dcnode-id="4582" instrument_node="">A REC tracking system should provide a relatively simple means of determining who has claim on the renewable attributes of energy produced using renewable technologies.  This is achieved through a system of accounts, with an account for each eligible entity, whether LSE, renewable generator, or, if a fully tradable regime, third-party intermediary, that is participating.  Every time a REC transaction occurs, those RECs being traded should be removed from the account of the seller and moved into the account of the buyer, contingent on confirmation by both buyer and seller that the transaction has occurred. </span></font></p><p data-dcnode-id="4571"><font data-dcnode-id="4572" face="NewCenturySchlbk"><span data-dcnode-id="4579" instrument_node="">The ability of the system to track REC transactions is closely linked to the concerns that have been raised regarding double-counting, particularly with respect to the sale of individual attributes that have been disaggregated from the REC itself.  As described above in the discussion regarding double counting, if a separate market exists for some underlying attribute that is not explicitly tracked by the REC system, it is conceivable that any given REC will not represent the totality of benefits that are assumed to be included.  Again, using carbon regulation as an example, if the avoided CO</span><sub data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">2</span></sub><span data-dcnode-id="4576" instrument_node=""> emissions attributed to renewable energy that can be claimed by a utility are not calculated on the basis of REC ownership, but are instead made on the basis of some other unit of account (e.g., energy), a REC purchased on an unbundled basis may not actually embody any incremental avoided CO</span><sub data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">2</span></sub><span data-dcnode-id="4573" instrument_node=""> emissions.</span></font></p><p data-dcnode-id="4568"><font data-dcnode-id="4569" face="NewCenturySchlbk"><span data-dcnode-id="4570" instrument_node=""> </span></font></p><p data-dcnode-id="4565"><font data-dcnode-id="4566" face="NewCenturySchlbk"><span data-dcnode-id="4567" instrument_node="">An open question for policymakers is whether they wish to use the system to facilitate trading in underlying renewable energy attributes.  If yes, this requires that the system issue separate certificates for each attribute that can be sold and tracked on a disaggregated basis.  Systems created thus far do not support this capability.  Any attribute that is sold necessarily involves the sale of the entire REC, which embodies all of the underlying attributes. Allowing trading in disaggregated attributes also opens up a number of other issues, specifically regarding what attributes must be included with a REC in order for it to be applicable toward a state's RPS goals. </span></font></p><p data-dcnode-id="4560"><b data-dcnode-id="4561"><font data-dcnode-id="4562" face="Verdana" size="+1"><a data-dcnode-id="4564" name="P486_114299"></a><span data-dcnode-id="4563" instrument_node="">California Context</span></font></b></p><p data-dcnode-id="4557"><font data-dcnode-id="4558" face="NewCenturySchlbk"><span data-dcnode-id="4559" instrument_node="">Pursuant to SB 1078, the California Energy Commission was charged with developing a system to track renewable energy generation for purposes of assessing RPS compliance.  This has since evolved into a partnership effort with the Western Governors' Association (WGA) to develop a system capable of tracking renewable energy generation throughout the Western Electricity Coordinating Council (WECC) states.  The CEC is now overseeing the creation of the Western Regional Energy Generation Information System (WREGIS), a renewable energy tracking and registry system that will track renewable energy generation throughout the states and provinces covered by the WECC.  The current timeline anticipates that the system will come online in the second half of 2007.  </span></font></p><p data-dcnode-id="4554"><font data-dcnode-id="4555" face="NewCenturySchlbk"><span data-dcnode-id="4556" instrument_node="">According to the WGA's "Energy Policy Roadmap," WREGIS will "provide the data necessary to substantiate the number of MWh generated from renewable resources and support verification, tracking and trading of RECs." According to CEC staff, the WREGIS system will issue certificates on the basis of metered data provided by "reporting entities." These entities may be control area operators, independent third parties, or, in the case of distributed generation, self-reported. </span></font></p><p data-dcnode-id="4545"><font data-dcnode-id="4552" face="NewCenturySchlbk"><span data-dcnode-id="4553" instrument_node="">Because of the variation in renewable policies across the different states, WREGIS is policy neutral in the sense that it will track RECs produced by generators that are deemed eligible renewable resources by any jurisdiction within its coverage area.</span></font><sup data-dcnode-id="4548"><font data-dcnode-id="4549" face="Arial" size="2"><a data-dcnode-id="4550" href="#P493_115803" name="P493_115804"><span data-dcnode-id="4551" instrument_node="">36</span></a></font></sup><font data-dcnode-id="4546" face="NewCenturySchlbk"><span data-dcnode-id="4547" instrument_node="">  The final determination as to whether a given REC is eligible for application toward the California RPS is left in the hands of state regulators, though WREGIS will facilitate this assessment by including, as a characteristic, whether the REC is eligible. To support the goals of the California RPS, WREGIS must be capable of tracking all the relevant information on which an eligibility determination depends.  This means that, at a minimum, for California's purposes, the system must be able to identify the quantity of renewable energy generated, the type of resource or technology that was used, and confirmation that the energy was delivered into the CAISO system. </span></font></p><p data-dcnode-id="4539"><font data-dcnode-id="4540" face="NewCenturySchlbk"><span data-dcnode-id="4544" instrument_node="">The system, as currently envisioned, is designed to track whole RECs, and thus does not track the sale of underlying attributes on a disaggregated basis. However, in California, given the recent decision by the Commission to impose a carbon cap on the investor owned utilities, there will be a need to reconcile claim over the avoided carbon emission associated with renewable energy and the ownership of RECs.  If the totality of renewable attributes are conveyed with RECs, including claim over avoided CO</span><sub data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">2</span></sub><span data-dcnode-id="4541" instrument_node=""> emissions, the accounting system used to quantify the amount of carbon for which a given IOU is responsible will need to integrate information from WREGIS.  In addition, a methodology for ascribing some proxy level of emissions to the commodity energy produced by renewable facilities, but separated from its RECs, will also need to be developed.  These issues should be considered as the Commission moves ahead with its implementation of a load-based carbon cap on the IOUs, pursuant to D.06-02-032.</span></font></p><p data-dcnode-id="4532"><font data-dcnode-id="4537" face="NewCenturySchlbk"><span data-dcnode-id="4538" instrument_node="">Consistent with other REC tracking systems, REC transfers from one entity's account to another's are confirmed by both parties.  A REC owner initiates the transfer by notifying the system via a web-based platform which RECs to transfer and to what receiving party.  The receiving party receives a notice of the transfer that must be confirmed for the transaction to be completed.  Although WREGIS will issue and track the transfer of certificates, the system does not capture information regarding the financial or contractual details of the transaction, nor does it provide any market-making functionality.</span></font><sup data-dcnode-id="4533"><font data-dcnode-id="4534" face="Arial" size="2"><a data-dcnode-id="4535" href="#P498_118327" name="P498_118328"><span data-dcnode-id="4536" instrument_node="">37</span></a></font></sup></p><p data-dcnode-id="4529"><font data-dcnode-id="4530" face="Arial" size="2"><span data-dcnode-id="4531" instrument_node=""> </span></font></p><p data-dcnode-id="4524"><b data-dcnode-id="4525"><font data-dcnode-id="4526" face="Verdana" size="+1"><a data-dcnode-id="4528" name="P501_118472"></a><span data-dcnode-id="4527" instrument_node="">OVERVIEW OF OTHER STATE RPS PROGRAMS AND REC COMPLIANCE FRAMEWORKS</span></font></b></p><p data-dcnode-id="4521"><font data-dcnode-id="4522" face="NewCenturySchlbk"><span data-dcnode-id="4523" instrument_node="">A number of states have implemented RPS programs that allow obligated entities to purchase unbundled RECs to meet their compliance targets.  In order to help the CPUC better understand how to think about and balance the various tradeoffs that may exist, in this section we explore the specific experience in a number of states using RECs to support their RPS programs.  Although a significant number of states have RPS programs that include the use of unbundled RECs, few have sufficient experience with these programs from which to draw any meaningful conclusions regarding the efficacy of REC unbundling in facilitating renewable energy development.  Texas, Massachusetts, and New Mexico were selected as good case studies primarily because they are relatively far along in the implementation of their programs.  All three states have already gone through at least one compliance period, offering at least some insight into how unbundled/tradable RECs are being used by obligated entities to achieve RPS compliance goals and how they may be impacting renewable development. </span></font></p><p data-dcnode-id="4516"><b data-dcnode-id="4517"><font data-dcnode-id="4518" face="Verdana" size="+1"><a data-dcnode-id="4520" name="P505_119614"></a><span data-dcnode-id="4519" instrument_node="">Texas</span></font></b></p><p data-dcnode-id="4495"><font data-dcnode-id="4514" face="NewCenturySchlbk"><span data-dcnode-id="4515" instrument_node="">In 1999, Texas signed legislation establishing its RPS program as part of broader electricity restructuring bill.  The Texas RPS applies to competitive LSEs, i.e., those that operate in markets offering consumer choice. Implemented in January 2002,</span></font><sup data-dcnode-id="4510"><font data-dcnode-id="4511" face="Arial" size="2"><a data-dcnode-id="4512" href="#P508_119867" name="P508_119868"><span data-dcnode-id="4513" instrument_node="">38</span></a></font></sup><font data-dcnode-id="4508" face="NewCenturySchlbk"><span data-dcnode-id="4509" instrument_node=""> and subsequently amended in July 2005,</span></font><sup data-dcnode-id="4504"><font data-dcnode-id="4505" face="Arial" size="2"><a data-dcnode-id="4506" href="#P509_119913" name="P509_119914"><span data-dcnode-id="4507" instrument_node="">39</span></a></font></sup><font data-dcnode-id="4502" face="NewCenturySchlbk"><span data-dcnode-id="4503" instrument_node=""> the Texas RPS requires that a minimum of 5,000 MW of new renewable capacity be installed by 2015, in addition to the 880 MW of existing renewable capacity,</span></font><sup data-dcnode-id="4498"><font data-dcnode-id="4499" face="Arial" size="2"><a data-dcnode-id="4500" href="#P510_120077" name="P510_120078"><span data-dcnode-id="4501" instrument_node="">40</span></a></font></sup><font data-dcnode-id="4496" face="NewCenturySchlbk"><span data-dcnode-id="4497" instrument_node=""> for a total goal of 5,880 MW of renewable generation.  Of this total, the RPS includes a set aside of 500 MW of non-wind facilities. Although established as a means to promote renewable resource diversity, the set aside is a goal, not a requirement.   The Texas RPS also sets an ultimate goal of 10,000 MW of installed renewable capacity by 2025. </span></font></p><p data-dcnode-id="4492"><font data-dcnode-id="4493" face="NewCenturySchlbk"><span data-dcnode-id="4494" instrument_node="">The objectives of the RPS, as articulated by the Texas Public Utility Commission (PUC) when it adopted the initial rule establishing the program, include the following goals:</span></font></p><span data-dcnode-id="4491" instrument_node=""> </span><ul data-dcnode-id="4487"><p data-dcnode-id="4488"><font data-dcnode-id="4489" face="Arial" size="2"><span data-dcnode-id="4490" instrument_node=""> "[encouraging] the construction and operation of new renewable energy projects at those sites in Texas that have the greatest potential for capture and development of environmentally beneficial renewable resources; [reducing] air pollution in Texas that is associated with the generation of electricity using fossil fuels;  [responding] to customer preferences that place a high value on environmental quality and reflect a willingness to pay a higher price for "clean" energy acquired from renewable resources;  [increasing] the amount of renewable energy available to supply electricity to consumers in Texas; and [ensuring] that all customers have access to energy from renewable energy resources pursuant to PURA §39.101(b)(3)."</span></font></p></ul><p data-dcnode-id="4474"><font data-dcnode-id="4485" face="NewCenturySchlbk"><span data-dcnode-id="4486" instrument_node="">The program is unique in that targets are measured in terms of renewable capacity</span></font><i data-dcnode-id="4482"><font data-dcnode-id="4483" face="Bodoni MT"><span data-dcnode-id="4484" instrument_node=""> </span></font></i><font data-dcnode-id="4480" face="NewCenturySchlbk"><span data-dcnode-id="4481" instrument_node="">rather than in terms of the share</span></font><i data-dcnode-id="4477"><font data-dcnode-id="4478" face="Bodoni MT"><span data-dcnode-id="4479" instrument_node=""> </span></font></i><font data-dcnode-id="4475" face="NewCenturySchlbk"><span data-dcnode-id="4476" instrument_node="">of the state's resource mix made up by renewable energy. Table 1 below provides the schedule of renewable capacity required by the RPS statute and, for those compliance periods that have passed, the amount of capacity that was actually installed.  Since the RPS was adopted in 1999, over 1500 MW of new renewable capacity has been built.</span></font></p><p data-dcnode-id="4469"><b data-dcnode-id="4470"><font data-dcnode-id="4471" face="NewCenturySchlbk"><a data-dcnode-id="4473" name="P518_121894"></a><span data-dcnode-id="4472" instrument_node="">Table 1: Texas Compliance Targets and Installed Capacity</span></font></b></p><p data-dcnode-id="4329"><span data-dcnode-id="4468" instrument_node="">

/font></p></td><td data-dcnode-id="4367" valign="top" width="196"><p align="center" data-dcnode-id="4368"><font data-dcnode-id="4369" face="Arial" size="2"><span data-dcnode-id="4370" instrument_node="">Not available</span></font></p></td></tr><tr data-dcnode-id="4349"><td data-dcnode-id="4360" valign="top" width="180"><p align="center" data-dcnode-id="4361"><font data-dcnode-id="4362" face="Arial" size="2"><span data-dcnode-id="4363" instrument_node="">1/1/2013</span></font></p></td><td data-dcnode-id="4355" valign="top" width="206"><p align="center" data-dcnode-id="4356"><font data-dcnode-id="4357" face="Arial" size="2"><span data-dcnode-id="4358" instrument_node="">5,256</span></font></p></td><td data-dcnode-id="4350" valign="top" width="196"><p align="center" data-dcnode-id="4351"><font data-dcnode-id="4352" face="Arial" size="2"><span data-dcnode-id="4353" instrument_node="">Not available</span></font></p></td></tr><tr data-dcnode-id="4332"><td data-dcnode-id="4343" valign="top" width="180"><p align="center" data-dcnode-id="4344"><font data-dcnode-id="4345" face="Arial" size="2"><span data-dcnode-id="4346" instrument_node="">1/1/2015</span></font></p></td><td data-dcnode-id="4338" valign="top" width="206"><p align="center" data-dcnode-id="4339"><font data-dcnode-id="4340" face="Arial" size="2"><span data-dcnode-id="4341" instrument_node="">5,880</span></font></p></td><td data-dcnode-id="4333" valign="top" width="196"><p align="center" data-dcnode-id="4334"><font data-dcnode-id="4335" face="Arial" size="2"><span data-dcnode-id="4336" instrument_node="">Not available</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="4326"><font data-dcnode-id="4327" face="NewCenturySchlbk"><span data-dcnode-id="4328" instrument_node="">Prior to changes in the Texas RPS pursuant to the passage of SB 20, RECs purchased to support voluntary market claims could not be counted toward the RPS goals of obligated entities. Customers who paid extra to subscribe to green energy programs were assured that the additional monies spent, above and beyond what regular subscribers paid, would go toward REC purchases that would be incremental to the RPS goals. The language in SB 20 is less clear on this point, leading some to believe that, going forward, RECs purchased through the voluntary market could be applied toward an LSE's RPS obligations.  Thus, instead of stimulating incremental demand in the renewable energy market, the premium would serve to help obligated entities to achieve RPS targets they are required to meet anyway.  This and other related issues are the subject of a current rulemaking before the Texas PUC.</span></font></p><p data-dcnode-id="4320"><b data-dcnode-id="4321"><i data-dcnode-id="4322"><font data-dcnode-id="4323" face="Verdana"><a data-dcnode-id="4325" name="P547_123072"></a><span data-dcnode-id="4324" instrument_node="">Role of Renewable Energy Certificates</span></font></i></b></p><p data-dcnode-id="4305"><font data-dcnode-id="4318" face="NewCenturySchlbk"><span data-dcnode-id="4319" instrument_node="">The language establishing the RPS program in Texas specifically directed the Texas PUC to establish a renewable energy credits trading program to facilitate RPS compliance by allowing obligated entities to hold RECs in lieu of capacity.</span></font><sup data-dcnode-id="4314"><font data-dcnode-id="4315" face="Arial" size="2"><a data-dcnode-id="4316" href="#P550_123345" name="P550_123346"><span data-dcnode-id="4317" instrument_node="">41</span></a></font></sup><font data-dcnode-id="4312" face="NewCenturySchlbk"><span data-dcnode-id="4313" instrument_node="">  This is a complicating feature of the Texas program as it requires the capacity targets identified in the statute to be translated into REC purchasing requirements, with each REC representing one MWh of renewable generation.  This conversion relies on a "conversion capacity factor," set initially at 35% to provide an estimate of the number of RECs that correspond to the amount of capacity that is required by law. This number is periodically updated to reflect the actual capacity factors experienced by renewable projects.</span></font><sup data-dcnode-id="4308"><font data-dcnode-id="4309" face="Arial" size="2"><a data-dcnode-id="4310" href="#P551_123906" name="P551_123907"><span data-dcnode-id="4311" instrument_node="">42</span></a></font></sup><font data-dcnode-id="4306" face="NewCenturySchlbk"><span data-dcnode-id="4307" instrument_node="">  The higher the capacity factor, the greater the number of RECs required to be held, since the renewable output associated with a given capacity will be greater compared to a situation in which the capacity factor is relatively low. Each LSE is assigned the number of RECs they are obligated to procure, either on a bundled or unbundled basis, by the beginning of each compliance period, based on their pro-rata share of total competitive load served in the state. Although the statute sets out a biannual compliance schedule, in implementing the program, the PUC requires obligated entities to retire RECs on an annual basis. </span></font></p><p data-dcnode-id="4302"><font data-dcnode-id="4303" face="NewCenturySchlbk"><span data-dcnode-id="4304" instrument_node="">As noted above, there were an estimated 880 megawatts of renewable generation that pre-existed the RPS program. In an effort to limit competition between new and old renewable generation, existing facilities are treated differently than new facilities.  Rather than purchasing RECs from these facilities, obligated entities, that have had a historical supply relationship with an existing facility, can apply for "REC-offsets" which can be applied toward their RPS targets, thereby reducing the number of RECs they need to procure from new facilities to meet their obligations.  </span></font></p><p data-dcnode-id="4299"><font data-dcnode-id="4300" face="NewCenturySchlbk"><span data-dcnode-id="4301" instrument_node="">Currently, wind represents the lion's share of renewable energy development occurring under the Texas RPS.  This result is driven by a combination of factors including wind's relatively low cost and the abundance of good wind resources in the state. The RPS has also promoted the development of other renewable technologies, though at a much lower level than wind. Table 2 provides an overview of the types of resources used to meet the Texas RPS.</span></font></p><p data-dcnode-id="4296"><font data-dcnode-id="4297" face="Arial" size="2"><span data-dcnode-id="4298" instrument_node=""> </span></font></p><p data-dcnode-id="4291"><b data-dcnode-id="4292"><font data-dcnode-id="4293" face="NewCenturySchlbk"><a data-dcnode-id="4295" name="P557_126085"></a><span data-dcnode-id="4294" instrument_node="">Table 2: Texas Renewable Capacity by Technology Type</span></font></b></p><p data-dcnode-id="4133"><span data-dcnode-id="4290" instrument_node="">
