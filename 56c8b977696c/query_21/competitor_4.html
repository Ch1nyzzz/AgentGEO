ern Electricity Coordinating Council</span></font></p></td></tr><tr data-dcnode-id="5239"><td data-dcnode-id="5240" valign="top" width="564"><p data-dcnode-id="5241"><font data-dcnode-id="5242" face="Arial" size="2"><span data-dcnode-id="5243" instrument_node="">WREGIS - Western Renewable Energy Generation Information System</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="5231"><b data-dcnode-id="5232"><font data-dcnode-id="5233" face="Verdana" size="+1"><a data-dcnode-id="5235" name="P208_5481"></a><span data-dcnode-id="5234" instrument_node="">EXECUTIVE SUMMARY</span></font></b></p><p data-dcnode-id="5217"><font data-dcnode-id="5229" face="NewCenturySchlbk"><span data-dcnode-id="5230" instrument_node="">Unbundled and tradable renewable energy certificates (RECs) have been proposed as a way to facilitate load serving entity (LSE) compliance under the California Renewables Portfolio Standard (RPS).</span></font><sup data-dcnode-id="5220"><font data-dcnode-id="5226" face="Arial" size="2"><a data-dcnode-id="5227" href="#P211_5694" name="P211_5695"><span data-dcnode-id="5228" instrument_node="">1</span></a></font><font data-dcnode-id="5224" face="NewCenturySchlbk"><span data-dcnode-id="5225" instrument_node="">, </span></font><font data-dcnode-id="5221" face="Arial" size="2"><a data-dcnode-id="5222" href="#P212_6567" name="P212_6568"><span data-dcnode-id="5223" instrument_node="">2</span></a></font></sup><font data-dcnode-id="5218" face="NewCenturySchlbk"><span data-dcnode-id="5219" instrument_node="">  Although California has sufficient resource potential statewide to achieve the aggressive renewable energy targets established under the RPS, the geographic distribution of these resources throughout the state, coupled with existing transmission constraints, strongly suggests that the costs of achieving the RPS goals are likely to differ substantially from one obligated entity to the next.  Furthermore, the ability to integrate renewable energy, particularly intermittent resources, into their portfolios, is likely to vary considerably across LSEs.  Smaller LSEs in particular, may have greater difficulty accommodating renewable energy than the larger IOUs.  The RPS as initially implemented measured compliance on the basis of physical deliveries of renewable energy into an LSE's service territory.  Although this delivery requirement has since been relaxed, such that renewable energy delivered anywhere into the California Independent System Operator (CAISO) grid now counts towards an LSE's RPS obligations, high transaction costs associated with managing the ultimate disposition of renewable energy may remain. There is concern that these transaction costs will result in inefficient renewable resource development because once factored into the procurement decision, they render the development of some low-cost resources uneconomic relative to other resources that, though more costly, face lower transaction costs. Changing the compliance rules to allow unbundled RECs is potentially a way by which these costs can be avoided, thus facilitating LSE compliance and the achievement of the RPS goals at least cost.</span></font></p><p data-dcnode-id="5214"><font data-dcnode-id="5215" face="NewCenturySchlbk"><span data-dcnode-id="5216" instrument_node="">Under an unbundled and/or tradable REC regime, obligated entities would be allowed to purchase claim over the renewable attributes associated with a unit of energy generated by a renewable facility without having to take ownership or delivery of the energy itself.  This claim, represented by a REC, could then be applied toward the LSE's RPS goals.  Because they do not take ownership of the energy, the transaction costs associated with managing the final disposition of the energy are avoided.  Importantly, under an unbundled and/or tradable REC framework, an LSE can purchase RECs from renewable facilities largely irrespective of where those facilities are located or where the energy is ultimately delivered.  From the developer's perspective, the ability to sell unbundled RECs means that the value for the renewable character of their energy is not solely dependent on demand from those load serving entities to which they are able to deliver their energy at low cost.  Under an unbundled regime, developers would be able to sell their RECs to any obligated entity, regardless of their location.  </span></font></p><p data-dcnode-id="5211"><font data-dcnode-id="5212" face="NewCenturySchlbk"><span data-dcnode-id="5213" instrument_node="">This is an important result, particularly in the context of California, because of the highly concentrated nature of some renewable resources in the state.  For example, much of the low-cost resource potential is acknowledged to be geographically located in Southern California Edison's (SCE's) service territory, far in excess of what it needs to comply with the RPS.  Under the present deliverability rules, the ability of renewable developers in SCE's service territory to capture the value of the renewable attributes associated with energy produced in excess of what SCE needs to meet its RPS obligations may be significantly reduced.  Obligated entities outside of SCE's service territory may find it uneconomic to enter into contracts with these developers owing to the costs of managing delivery or remarketing of the energy.  As a result, much of this resource potential could go untapped.  In contrast, under an unbundled REC regime, developers in SCE's service territory could exploit the demand for renewable attributes from all entities obligated under the California RPS, thus enabling them to capture value associated with their energy's renewable attributes regardless of whether SCE has already met its RPS targets.  This same argument holds for other renewable resources as well.  By providing renewable developers the opportunity to tap into statewide demand for the renewable attributes of their energy, unbundled RECs can stimulate the development of low-cost resources that would otherwise go unbuilt.</span></font></p><p data-dcnode-id="5208"><font data-dcnode-id="5209" face="NewCenturySchlbk"><span data-dcnode-id="5210" instrument_node="">Despite these apparent advantages, there are a number of issues that need to be considered if the state is to commit to an unbundled or tradable REC regime. First, the state needs to assess the extent to which an unbundled or tradable approach to RPS compliance promotes, or conflicts with, the underlying goals sought through the RPS mandate. The portfolio of resources that will be developed under an unbundled regime may not provide the same types of benefits as the portfolio that will emerge under a bundled regime.  Second, the state should have a clear understanding of the generic design elements that govern REC trading and the way these elements are likely to affect the success of the program.  Finally, understanding the challenges unbundled and/or tradable RECs may face in light of the existing regulatory framework and statutory requirements in California is of critical importance as the state contemplates the option of migrating to this alternative approach to compliance with the RPS.  </span></font></p><p data-dcnode-id="5205"><font data-dcnode-id="5206" face="NewCenturySchlbk"><span data-dcnode-id="5207" instrument_node="">In considering these issues, California has ample opportunity to learn from the experience in other states, many of which allow obligated entities to apply unbundled RECs toward their RPS targets.  This paper draws on the experience in other states to inform its assessment of the potential role and implications of unbundled and/or tradable RECs in California, most notably Texas, Massachusetts and New Mexico. In addition to these in-depth case studies, staff has also compiled the various statutory and administrative authorities governing key aspects of how RECs are deployed in other states.  This information can be found in Appendix B.</span></font></p><p data-dcnode-id="5202"><font data-dcnode-id="5203" face="NewCenturySchlbk"><span data-dcnode-id="5204" instrument_node="">The following provides an overview of the key findings and recommendations contained in this report. </span></font></p><p data-dcnode-id="5199"><font data-dcnode-id="5200" face="Arial" size="2"><span data-dcnode-id="5201" instrument_node="">· Many of the underlying objectives of the RPS program are derived from where renewable energy is produced or where it is delivered, inasmuch as these factors determine where ratepayer dollars flow and which conventional facilities are displaced.  To the extent that an unbundled REC regime results in the development of a different set of renewable resources than would occur under a bundled regime, the resulting benefits are likely to be different.</span></font></p><p data-dcnode-id="5196"><font data-dcnode-id="5197" face="Arial" size="2"><span data-dcnode-id="5198" instrument_node="">· At present, it is uncertain how the portfolio of renewable resources used to meet the RPS would change if unbundled or tradable RECs were implemented, and how these differences interact with the end goals sought though the RPS program.  This uncertainty greatly limits the ability of policy-makers to assess the degree to which unbundled RECs may dilute or enhance the benefits sought through the RPS program. </span></font></p><p data-dcnode-id="5193"><font data-dcnode-id="5194" face="Arial" size="2"><span data-dcnode-id="5195" instrument_node="">· California's existing compliance framework allows for the implicit use of unbundled RECs.  D.05-07-039 changed the delivery requirements such that the renewable energy procured pursuant to the RPS need not be delivered into the service territory of the purchasing utility, but must only be delivered into the CAISO control area.  Regardless of whether the purchasing LSE arranges for delivery of the energy into its service territory or remarkets the energy, it receives credit towards its RPS obligations.  Remarketing of the renewable energy is analogous to an unbundled REC transaction since claim over the attributes is dissociated from the ultimate disposition of the energy.  </span></font></p><p data-dcnode-id="5190"><font data-dcnode-id="5191" face="Arial" size="2"><span data-dcnode-id="5192" instrument_node="">· It is unclear if the expanded delivery flexibility adopted in D.05-07-039 has proven effective in increasing the renewable resource options available to obligated entities, or whether it has enabled some renewable projects to proceed that would have otherwise gone unbuilt.  This is an area of additional inquiry the Commission should pursue.</span></font></p><p data-dcnode-id="5187"><font data-dcnode-id="5188" face="Arial" size="2"><span data-dcnode-id="5189" instrument_node="">· The Commission should make clear that the expanded delivery requirements allow for the use of shaped and firmed products, provided the renewable energy involved in these arrangements is initially delivered into the CAISO grid, consistent with the delivery rules authorized in D.05-07-039.</span></font></p><p data-dcnode-id="5184"><font data-dcnode-id="5185" face="Arial" size="2"><span data-dcnode-id="5186" instrument_node="">· The experience in Texas, Massachusetts and New Mexico suggests that policies regarding geographic eligibility were developed in recognition of the constraints the Interstate Commerce Clause may impose. Limiting the eligibility of RECs to those produced by facilities that deliver into CAISO control area may be desirable in terms of ensuring that the majority of benefits associated with renewable energy delivered under the California RPS accrue to Californians, however any approach to dealing with RECs should take into consideration Commerce Clause concerns.</span></font></p><p data-dcnode-id="5181"><font data-dcnode-id="5182" face="Arial" size="2"><span data-dcnode-id="5183" instrument_node="">· The ability to bank and resell RECs reduces the risk associated with REC purchases by providing a means by which the value of excess RECs can be maintained and captured by the purchasing LSE.  The ability to resell RECs also acts as a hedge against the risk of non-compliance by giving obligated entities that have under-procured the ability to procure additional RECs from those LSEs that have over-procured.  However, once a REC is counted toward the California RPS, it must be retired to avoid double-counting.</span></font></p><p data-dcnode-id="5178"><font data-dcnode-id="5179" face="Arial" size="2"><span data-dcnode-id="5180" instrument_node="">· If an unbundled or tradable REC regime is established in California, the current provisions allowing unlimited banking should be revisited and changed to a finite time period, consistent with the objective of encouraging market liquidity and ensuring that the RPS provides ongoing and consistent demand for renewable generation.  </span></font></p><p data-dcnode-id="5175"><font data-dcnode-id="5176" face="Arial" size="2"><span data-dcnode-id="5177" instrument_node="">· Third-parties, including brokers as well as voluntary market participants, can fulfill an important role in a REC market by reducing transaction costs, underwriting risk associated with renewable energy development, and creating additional demand for renewable energy. The involvement of third-parties will only occur if trading is allowed. Provided an electronic tracking system is operational, the incremental administrative costs associated with third-party participation should be minimal. </span></font></p><p data-dcnode-id="5172"><font data-dcnode-id="5173" face="Arial" size="2"><span data-dcnode-id="5174" instrument_node="">· If unbundled transactions are authorized, the existing long-term contracting requirements imposed on the larger IOUs should remain largely unchanged, with some consideration given to the idea of allowing them to meet some, relatively small, portion of their RPS obligations through short-term contracts. Long-term contracts are critical in facilitating developer financing by providing certainty to the financial community of a stable revenue stream and return on their investments in renewable projects.  Long-term contracts, specifically fixed-price contracts are also critical if renewable energy purchased under the RPS is to provide price hedge benefits.   </span></font></p><p data-dcnode-id="5167"><font data-dcnode-id="5168" face="Arial" size="2"><i data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">·</span></i><span data-dcnode-id="5169" instrument_node=""> In applying the RPS to energy service providers (ESPs), community choice aggregators (CCAs), small utilities, and multi-jurisdictional utilities, the long-term contracting requirement should be significantly scaled back or eliminated whether for bundled or unbundled purchases.  These long-term contracts impose substantial risk on these entities in general and on ESPs in particular. </span></font></p><p data-dcnode-id="5162"><font data-dcnode-id="5163" face="Arial" size="2"><i data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">·</span></i><span data-dcnode-id="5164" instrument_node=""> Whether the demand from smaller LSEs will result in new renewable development will depend on the willingness of merchant generators to build on the basis of prospective REC and energy sales on a short-term basis to these entities, and/or the existence of a third-party that will enter into long-term contracts with prospective developers and resell to the smaller LSEs on a short-term basis.  If neither is present, RECs purchased by smaller LSEs will more than likely serve only to reallocate claim over the attributes from existing projects without stimulating new development.  </span></font></p><p data-dcnode-id="5157"><font data-dcnode-id="5158" face="Arial" size="2"><i data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">·</span></i><span data-dcnode-id="5159" instrument_node=""> Unbundled or tradable REC purchases are not readily integrated into the current process by which the above-market costs of renewable energy are calculated and paid for through the issuance of supplemental energy payments (SEP).  Although not a necessary condition for migration to an unbundled or tradable REC regime, an alternative approach to offsetting the above-market costs of renewable energy should be found in the longer term.  A hybrid approach in which bundled transactions are eligible for SEP funds and unbundled transactions are not appears to create perverse incentives and undermines the degree to which the availability of RECs promotes efficient resource development. A more generic approach of technology- and vintage-specific subsidies may be preferable because it can be applied more uniformly to generators, irrespective of whether they sell their energy and RECs on a bundled or unbundled basis.  </span></font></p><p data-dcnode-id="5152"><font data-dcnode-id="5153" face="Arial" size="2"><i data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">·</span></i><span data-dcnode-id="5154" instrument_node=""> Insulating ratepayers from excessive costs associated with RPS compliance under an unbundled or tradable REC regime may be better achieved through the creation of an alternative compliance payment (ACP) that obligated entities could pay in lieu of purchasing additional RECs.  The level of the alternative compliance payment would effectively cap the maximum price of RECs to a predetermined level.  To ensure that obligated entities are using ACPs only as a compliance tool of last resort, a process would need to be established to verify that ACPs are the least-cost option available. Unlike compliance penalties, these monies should not flow into the general fund, but should, instead, be used to support additional renewable development.  Instituting this change would require new legislation.</span></font></p><p data-dcnode-id="5149"><font data-dcnode-id="5150" face="Arial" size="2"><span data-dcnode-id="5151" instrument_node="">· Similar to the approach taken in Massachusetts, RPS eligible RECs should only be issued to QFs for generation in excess of some level of historical output, to ensure that QFs have an incentive to repower or otherwise expand their generating capacity, without providing them windfall gains at the expense of California ratepayers.</span></font></p><p data-dcnode-id="5144"><font data-dcnode-id="5145" face="Arial" size="2"><i data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">·</span></i><span data-dcnode-id="5146" instrument_node=""> Migration to an unbundled or tradable REC regime would be greatly facilitated by the availability of the Western Renewable Energy Generation Information System (WREGIS).  Although contract audits may be sufficient to support an unbundled regime, an electronic tracking system is an absolute necessity if the state is to move to a fully tradable program. </span></font></p><p data-dcnode-id="5141"><font data-dcnode-id="5142" face="Arial" size="2"><span data-dcnode-id="5143" instrument_node=""> </span></font></p><p data-dcnode-id="5138"><font data-dcnode-id="5139" face="Arial" size="2"><span data-dcnode-id="5140" instrument_node="">· The manner in which an unbundled/tradable REC regime interacts with emission trading markets will need to be carefully thought out. In particular, in February 2006, the Commission indicated its intent to implement a carbon cap limiting the total carbon emissions produced by the Investor Owned Utilities (IOUs).  Policy makers will need to determine if claim over the avoided carbon emissions associated with renewable energy are transferred with the REC, or if they remain bundled with the energy.  In either case a determination will need to be made regarding the magnitude of these benefits.  This is an issue that should be considered by the Commission as it moves forward with its efforts to implement a load-based carbon cap.  </span></font></p><p data-dcnode-id="5133"><b data-dcnode-id="5134"><font data-dcnode-id="5135" face="Verdana" size="+1"><a data-dcnode-id="5137" name="P258_21469"></a><span data-dcnode-id="5136" instrument_node="">INTRODUCTION</span></font></b></p><p data-dcnode-id="5124"><font data-dcnode-id="5131" face="NewCenturySchlbk"><span data-dcnode-id="5132" instrument_node="">In the interest of providing additional compliance flexibility under the California RPS, and to facilitate achievement of the RPS goals at least cost, the CPUC is considering the use of unbundled and/or tradable renewable energy credits as an alternative or supplement to the existing compliance framework.</span></font><sup data-dcnode-id="5127"><font data-dcnode-id="5128" face="Arial" size="2"><a data-dcnode-id="5129" href="#P261_21787" name="P261_21788"><span data-dcnode-id="5130" instrument_node="">3</span></a></font></sup><font data-dcnode-id="5125" face="NewCenturySchlbk"><span data-dcnode-id="5126" instrument_node="">  A REC confers to its holder a claim on the renewable attributes of one unit of energy generated from a renewable resource. RECs are "created" by a renewable generator simultaneous to the production of electricity and can subsequently be sold separately from the underlying energy.  This gives rise to two scenarios: one in which a renewable generator sells their energy and the credit bundled together, and another, in which the energy is sold to one buyer and the renewable credit is unbundled and sold to another.  In the case of the former, the buyer receives both the energy and the credit, while, in the latter, one buyer receives the energy, which has been "stripped" of its renewable attributes, while another buyer purchases the renewable credit. </span></font></p><p data-dcnode-id="5121"><font data-dcnode-id="5122" face="NewCenturySchlbk"><span data-dcnode-id="5123" instrument_node="">In the context of the RPS, the ability to separate the energy from the renewable attributes gives load-serving entities with limited access to renewable energy resources the ability to purchase RECs to be applied toward their renewable energy obligations from renewable generators, irrespective of where those generators are located or where the energy itself is ultimately delivered. This allows LSEs to avoid the costs associated with accommodating physical delivery of the underlying energy and/or the costs associated with remarketing the energy if delivery is not an option.  By removing these transaction costs, obligated entities are given greater flexibility in terms of how and what resources they rely on to achieve their RPS goals, thereby reducing their costs of compliance.</span></font></p><p data-dcnode-id="5118"><font data-dcnode-id="5119" face="NewCenturySchlbk"><span data-dcnode-id="5120" instrument_node="">From the developers' standpoint, the unbundling of RECs provides the opportunity to capitalize on demand for their energy's renewable attributes on a statewide basis, rather than being solely dependent on demand for those attributes from geographically proximate LSEs.  This outcome is particularly important in circumstances where least-cost resources are highly concentrated in a few geographic regions, such that full development of those resources would far exceed the compliance needs of nearby LSEs.  Once these LSEs have achieved their compliance targets, their demand for additional renewable resources will be determined exclusively on the basis of the energy value of those resources, with little or no value placed on the renewable attributes.  Under a bundled regime, this would limit development of these low-cost resource regions to the extent that investors need to receive more than the price they are able to get for their energy alone in order to support additional project development.  Under an unbundled or tradable regime, developers have the ability to capture the value of the energy's renewable attributes not just from those LSEs that are proximate to the region, but from LSEs that are located outside of the region, through the sale of RECs.  This ensures that least-cost resources are fully exploited for RPS purposes before more costly resources are developed. </span></font></p><p data-dcnode-id="5115"><font data-dcnode-id="5116" face="NewCenturySchlbk"><span data-dcnode-id="5117" instrument_node="">Despite these potential benefits, there are a number of issues associated with unbundled/tradable RECs in general, and in the California context in particular, which this white paper seeks to explore. Many of these revolve around the concern that unbundling the renewable attributes from the underlying energy may dilute the benefits sought through the RPS program.  In circumstances where the benefits of renewable energy are linked to where or when the energy is delivered or where it is generated, an unbundled REC regime may compromise the underlying objectives.  </span></font></p><p data-dcnode-id="5112"><font data-dcnode-id="5113" face="NewCenturySchlbk"><span data-dcnode-id="5114" instrument_node="">The benefits of an unbundled/tradable REC regime derive from the additional purchasing flexibility it offers market participants.  This flexibility is a function of the trading rules that govern activity in the REC market.  Trading under a REC regime, or any credit or permit based trading system, for that matter, can be thought of as providing three types of flexibility: geographic flexibility, temporal flexibility, and participatory flexibility.  The geographic flexibility of a REC regime describes the geographic limits to REC eligibility, in terms of where the energy associated with an eligible REC can be produced and/or delivered. Temporal flexibility defines the time period within which a REC is eligible to be traded relative to when it was created (and thus includes issues related to banking and borrowing), and participatory flexibility defines which entities are eligible to participate. In D.05-11-025, the CPUC characterized this as a binary choice between an "unbundled" REC regime, in which RECs are transferred directly from the renewable generator to the LSE, and then retired, and a "tradable" REC regime in which RECs may be transferred from the renewable generator to any third party, including brokers, resellers, or other financial intermediaries and may be bought and sold multiple times.  That said, there are likely to be other, intermediate approaches in which the ability to participate is still limited to generators and LSEs, but the amount and direction of trading among these entities is less circumscribed. </span></font></p><p data-dcnode-id="5109"><font data-dcnode-id="5110" face="NewCenturySchlbk"><span data-dcnode-id="5111" instrument_node="">In considering these design elements, it is important to keep in mind that California has already made significant progress implementing its RPS program.  The degree to which a new REC-based compliance framework is compatible with the existing structure will bear significantly on whether and how to move forward.  The technical requirements for administering the program must also be considered: specifically, the nature and functionality of the REC tracking system, and how a REC system in California would integrate with other state policies.  To better understand how California might approach the adoption of an unbundled/tradable REC regime, this paper will look to the experience in other states with RPS programs where obligated entities are allowed to apply unbundled RECs toward their renewable energy targets, considering both the regulatory framework under which REC programs were implemented, as well as the results thus far in using REC-based compliance.  In addition, should California policymakers decide to move forward with allowing unbundled and/or tradable RECs to meet RPS obligations in California, this paper will make recommendations on how to proceed. </span></font></p><p data-dcnode-id="5104"><b data-dcnode-id="5105"><font data-dcnode-id="5106" face="Verdana" size="+1"><a data-dcnode-id="5108" name="P273_28189"></a><span data-dcnode-id="5107" instrument_node="">BACKGROUND</span></font></b></p><p data-dcnode-id="5083"><font data-dcnode-id="5102" face="NewCenturySchlbk"><span data-dcnode-id="5103" instrument_node="">In September 2002, the California Legislature passed SB 1078, instituting California's RPS. Under an RPS, obligated LSEs are required to purchase a specific amount or share of the total energy used to serve load from designated renewable resources.</span></font><sup data-dcnode-id="5098"><font data-dcnode-id="5099" face="Arial" size="2"><a data-dcnode-id="5100" href="#P276_28447" name="P276_28448"><span data-dcnode-id="5101" instrument_node="">4</span></a></font></sup><font data-dcnode-id="5096" face="NewCenturySchlbk"><span data-dcnode-id="5097" instrument_node=""> The California RPS established renewable targets for the IOUs, ESPs, CCAs, small utilities, and multi-jurisdictional utilities.  In addition, though not requiring the municipal utilities to procure a specific percentage of renewable energy in developing their resource portfolios, the legislation requires them to establish renewable portfolio standards that are consistent with the State's goal of increasing reliance on renewable energy resources.  As originally passed, the RPS required that at least 20% of the energy used to serve load be from renewable resources by 2017.</span></font><sup data-dcnode-id="5092"><font data-dcnode-id="5093" face="Arial" size="2"><a data-dcnode-id="5094" href="#P277_29122" name="P277_29123"><span data-dcnode-id="5095" instrument_node="">5</span></a></font></sup><font data-dcnode-id="5090" face="NewCenturySchlbk"><span data-dcnode-id="5091" instrument_node=""> In May, 2003, the deadline for achieving the 20% target was accelerated to 2010, pursuant to the Energy Action Plan adopted by the California Public Utilities Commission (CPUC or Commission) and the California Energy Commission (CEC).  Furthermore, in June, 2005, Governor Schwarzenegger signed Executive Order S-3-05, establishing greenhouse gas (GHG) emission reduction targets for the state.</span></font><sup data-dcnode-id="5086"><font data-dcnode-id="5087" face="Arial" size="2"><a data-dcnode-id="5088" href="#P278_29887" name="P278_29888"><span data-dcnode-id="5089" instrument_node="">6</span></a></font></sup><font data-dcnode-id="5084" face="NewCenturySchlbk"><span data-dcnode-id="5085" instrument_node=""> The key strategies identified by the Governor's Climate Action Team to achieve these goals include an expansion of the RPS program to include a target of 33% renewable energy by 2020.</span></font></p><p data-dcnode-id="5080"><font data-dcnode-id="5081" face="NewCenturySchlbk"><span data-dcnode-id="5082" instrument_node="">Under the legislative and regulatory framework set up thus far, compliance with the RPS requires LSEs to sign long-term contracts with renewable energy developers selected though the RPS solicitation process.  Under this approach, LSEs issue Requests for Offers (RFOs) describing the delivery terms, volume and type of resources that best fit their portfolio needs. Prospective renewable developers respond by submitting bids indicating the resource type, location, size, expected operation date, and the price they are willing to accept, among other details.  Bids are ranked and selected on the basis of least-cost/best fit criteria, with winning bids entering into power purchase agreements and/or a turnkey or buy-out agreement in which the LSE assumes ownership of the facility at some point.  The current solicitation process requires the utilities to issue RFOs for contract terms of 10, 15, or 20 years, although short-term and bilateral contracts are eligible under the RPS, subject to CPUC approval.</span></font></p><p data-dcnode-id="5071"><font data-dcnode-id="5078" face="NewCenturySchlbk"><span data-dcnode-id="5079" instrument_node="">As originally implemented, the regulatory regime required energy procured through the RPS solicitation process to be delivered into the service territory of the purchasing utility. However, given the inequitable endowment of renewable resources across service territories and existing transmission constraints, this requirement was viewed as overly restrictive. In D.05-07-039, the Commission changed the compliance framework to allow delivery of the renewable energy anywhere in the CAISO control area.</span></font><sup data-dcnode-id="5074"><font data-dcnode-id="5075" face="Arial" size="2"><a data-dcnode-id="5076" href="#P283_31879" name="P283_31880"><span data-dcnode-id="5077" instrument_node="">7</span></a></font></sup><font data-dcnode-id="5072" face="NewCenturySchlbk"><span data-dcnode-id="5073" instrument_node="">  Rather than having to arrange for the physical delivery of renewable energy procured pursuant to the RPS into their service territories, obligated entities can instead remarket the energy to other service providers and still get credit under the RPS provided the energy was initially delivered into the CAISO grid.  This allows them to look more broadly for renewable projects they can contract with for purposes of the RPS.  Although this approach still imposes some transaction costs associated with remarketing, these costs are theoretically much lower than those associated with the original, more restrictive delivery requirement.  </span></font></p><p data-dcnode-id="5056"><font data-dcnode-id="5069" face="NewCenturySchlbk"><span data-dcnode-id="5070" instrument_node="">At the present time, only the IOUs are actively participating in the state RPS program.  However, as noted above, the legislation imposes the same renewable energy obligations on ESPs, CCAs, small utilities, and multi-jurisdictional utilities.</span></font><sup data-dcnode-id="5065"><font data-dcnode-id="5066" face="Arial" size="2"><a data-dcnode-id="5067" href="#P286_32864" name="P286_32865"><span data-dcnode-id="5068" instrument_node="">8</span></a></font></sup><font data-dcnode-id="5063" face="NewCenturySchlbk"><span data-dcnode-id="5064" instrument_node="">  Given their relatively late start in procuring renewable resources, meeting the 20% by 2010 deadline is likely to be challenging, especially in light of existing transmission constraints.  The ability of smaller LSEs in general, and ESPs in particular, to enter into long-term bundled contracts for renewable energy may be limited for a number of reasons.  There may be a mismatch between the amount of renewable energy a small LSE demands and the size of an economically sized renewable project, such that project's output exceeds the LSE's needs. In order transform this demand into actual projects, developers would have to cobble together the demand from multiple entities, a time-consuming and potentially uncertain path.   Furthermore, smaller LSEs may be relatively less able to accommodate renewable energy, especially from intermittent resources.  The need to firm</span></font><sup data-dcnode-id="5059"><font data-dcnode-id="5060" face="Arial" size="2"><a data-dcnode-id="5061" href="#P287_34049" name="P287_34050"><span data-dcnode-id="5062" instrument_node="">9</span></a></font></sup><font data-dcnode-id="5057" face="NewCenturySchlbk"><span data-dcnode-id="5058" instrument_node=""> these resources adds additional costs that may make compliance with the RPS unduly expensive for these entities.  For ESPs in particular, the existing RPS requirements may be especially onerous given the high level of uncertainty regarding the size of their customer base going forward.  In September of 2001, the CPUC suspended Direct Access, thereby preventing ESPs from signing up new customers.  This, coupled with their relatively limited ability to roll additional costs into rates (at least in the short term), make long-term contracts, as required by the existing RPS rules, a particularly risky proposition.  </span></font></p><p data-dcnode-id="5053"><font data-dcnode-id="5054" face="NewCenturySchlbk"><span data-dcnode-id="5055" instrument_node="">The ability to comply with the RPS through the purchase of unbundled or tradable RECs would help address some, though not all, of these problems.  Specifically, the costs associated with incorporating renewable resources into their portfolios would be largely avoided, as would the costs of remarketing energy procured under long-term contract.  Unbundled RECs, in of themselves, however, do not resolve all of the problems associated with the RPS as currently implemented.  The risks associated with long-term contracts do not automatically disappear if unbundled REC purchases are allowed, but the long-term contracting requirements remain, such that unbundled RECs are purchased on a long-term basis. Concerns about stranded costs resulting from loss of load would persist. If policy makers are to be fully responsive to the concerns of smaller LSEs they would need to allow unbundled REC purchases on a short-term basis.</span></font></p><p data-dcnode-id="5050"><font data-dcnode-id="5051" face="NewCenturySchlbk"><span data-dcnode-id="5052" instrument_node="">However, if smaller obligated entities are allowed to comply with the RPS through short-term energy and/or REC purchases, there is concern that their participation will do little to stimulate additional renewable energy development. The conventional wisdom is that renewable developers need long-term contracts in order to secure financing.  Despite the sizable amount of demand that smaller LSEs represent in aggregate, on an individual basis their reluctance and/or inability to enter into long-term contracts could prevent the market from transforming this demand into additional renewable energy projects.  Furthermore, even if willing to enter into long-term contracts, it is unclear whether the market would be willing to finance new projects given that some of these LSEs may not be credit-worthy counter parties.  Bridging this gap appears to be a fundamental challenge in applying the RPS to these entities in a manner that actually yields incremental renewable energy development.</span></font></p><p data-dcnode-id="5047"><font data-dcnode-id="5048" face="NewCenturySchlbk"><span data-dcnode-id="5049" instrument_node="">Despite relatively widespread consensus on the theoretical benefits of an unbundled compliance framework, there is little evidence in the record demonstrating that unbundled/tradable RECs have ultimately facilitated RPS goals or, for that matter, whether any of the various theoretical concerns associated with REC trading are justified. A number of states have active tradable REC programs in place, providing some opportunity to evaluate the extent to which practical experience with RECs comports with the theoretical advantage tradable RECs are thought to offer.  Given the use of unbundled RECs is still relatively new, the collective experience with this compliance tool may not be sufficient to come to any definitive conclusions on its effectiveness.  However, understanding how other states have thought about and dealt with the various issues can only help California as it considers going down a similar path.</span></font></p><p data-dcnode-id="5038"><font data-dcnode-id="5045" face="NewCenturySchlbk"><span data-dcnode-id="5046" instrument_node="">We note that there are a number of legal issues that may bear upon the ability of states to establish certain policies related to geographic flexibility in the context of RECs.  For example, eligibility rules which discriminate between RECs on the basis of where the originating generator is located must be evaluated in light of the Interstate Commerce Clause, the General Agreement on Tariffs and Trade, and the North American Free Trade Agreement.</span></font><sup data-dcnode-id="5041"><font data-dcnode-id="5042" face="Arial" size="2"><a data-dcnode-id="5043" href="#P296_38028" name="P296_38029"><span data-dcnode-id="5044" instrument_node="">10</span></a></font></sup><font data-dcnode-id="5039" face="NewCenturySchlbk"><span data-dcnode-id="5040" instrument_node="">  While this report will identify where these legal issues have impacted policy choices, and present some reasoning regarding how these issues might be approached, a detailed analysis of the legal implications of any particular policy is beyond the scope of the report. </span></font></p><p data-dcnode-id="5035"><font data-dcnode-id="5036" face="Arial" size="2"><span data-dcnode-id="5037" instrument_node=""> </span></font></p><p data-dcnode-id="5030"><b data-dcnode-id="5031"><font data-dcnode-id="5032" face="Verdana" size="+1"><a data-dcnode-id="5034" name="P300_38432"></a><span data-dcnode-id="5033" instrument_node="">GOALS OF THE RPS</span></font></b></p><p data-dcnode-id="5027"><font data-dcnode-id="5028" face="NewCenturySchlbk"><span data-dcnode-id="5029" instrument_node="">Any assessment of the efficacy of an alternate compliance regime first needs to understand the end goals of the impacted program.  In the case of California's RPS, the two touchstone documents that provide insight into these end goals are Senate Bill 1078, which established the RPS program, and Executive Order S-3-05, which identified greenhouse gas emission reduction targets for the state, thus providing the impetus for a potential expansion of the RPS program to include a goal of 33% renewable energy by 2020.  </span></font></p><p data-dcnode-id="5024"><font data-dcnode-id="5025" face="NewCenturySchlbk"><span data-dcnode-id="5026" instrument_node="">Article 16, added to the Public Utilities Code pursuant to SB 1078, states the following:</span></font></p><span data-dcnode-id="5023" instrument_node=""> </span><ul data-dcnode-id="5010"><ul data-dcnode-id="5011"><p data-dcnode-id="5020"><font data-dcnode-id="5021" face="Arial" size="2"><span data-dcnode-id="5022" instrument_node="">(a) In order to attain a target of 20 percent renewable energy for the purposes of increasing the diversity, reliability, public health and environmental benefits of the energy mix, it is the intent of the Legislature that the California Public Utilities Commission and the State Energy Resources Conservation and Development Commission implement the California Renewables Portfolio Standard Program described in this article. </span></font></p><span data-dcnode-id="5019" instrument_node=""> </span><p data-dcnode-id="5016"><font data-dcnode-id="5017" face="Arial" size="2"><span data-dcnode-id="5018" instrument_node="">(b) Increasing California's reliance on renewable energy resources may promote stable electricity prices, protect public health, improve environmental quality, stimulate sustainable economic development, create new employment opportunities, and reduce reliance on imported fuels.</span></font></p><span data-dcnode-id="5015" instrument_node=""> </span><p data-dcnode-id="5012"><font data-dcnode-id="5013" face="Arial" size="2"><span data-dcnode-id="5014" instrument_node="">(c) The development of renewable energy resources may ameliorate air quality problems throughout the state and improve public health by reducing the burning of fossil fuels and the associated environmental impacts.</span></font></p></ul></ul><p data-dcnode-id="5001"><font data-dcnode-id="5008" face="NewCenturySchlbk"><span data-dcnode-id="5009" instrument_node="">Although Executive Order S-3-05 doesn't specifically mention the RPS program, the Governor's Climate Action Team identified an expansion of the RPS target to include a goal of 33% by 2020 as a critical element in achieving the greenhouse gas emission reductions.</span></font><sup data-dcnode-id="5004"><font data-dcnode-id="5005" face="Arial" size="2"><a data-dcnode-id="5006" href="#P313_40237" name="P313_40238"><span data-dcnode-id="5007" instrument_node="">11</span></a></font></sup><font data-dcnode-id="5002" face="NewCenturySchlbk"><span data-dcnode-id="5003" instrument_node="">  Thus the principal objectives of the 33% goal would appear to be more limited than those associated with the 20% goal established in SB 1078. This suggests that a two-tiered approach to unbundled/tradable RECs may be theoretically desirable to the extent that different levels and categories of flexibility under a REC regime impact the objectives sought under each specific target differently.  While such an approach may be reasonable from a purely analytical perspective, from a more practical standpoint it is questionable if the additional complexity that a two-tiered compliance framework would engender is worth the trouble.</span></font></p><p data-dcnode-id="4992"><font data-dcnode-id="4999" face="NewCenturySchlbk"><span data-dcnode-id="5000" instrument_node="">The literature also provides insight into the various objectives policy makers may hope to support through RPS programs.  The report "The Renewable Portfolio Standard: A Practical Guide"</span></font><sup data-dcnode-id="4995"><font data-dcnode-id="4996" face="Arial" size="2"><a data-dcnode-id="4997" href="#P316_41225" name="P316_41226"><span data-dcnode-id="4998" instrument_node="">12</span></a></font></sup><font data-dcnode-id="4993" face="NewCenturySchlbk"><span data-dcnode-id="4994" instrument_node="">, lists the following policy goals that typically motivate implementation of an RPS: environmental benefits, resource diversity benefits, technologies advancement benefits, in-state economic development benefits, and political benefits of responding to public support for renewables.  Interestingly, there appears to be relatively little literature that expressly addresses the impact of unbundled and tradable RECs on the achievement and/or allocation of the underlying goals sought through RPS programs.</span></font></p><p data-dcnode-id="4987"><b data-dcnode-id="4988"><font data-dcnode-id="4989" face="Verdana" size="+1"><a data-dcnode-id="4991" name="P319_41912"></a><span data-dcnode-id="4990" instrument_node="">REC TRADING RULES</span></font></b></p><p data-dcnode-id="4984"><font data-dcnode-id="4985" face="NewCenturySchlbk"><span data-dcnode-id="4986" instrument_node="">As identified above, there are three dimensions that characterize an unbundled/tradable REC regime: a geographic dimension, a temporal dimension, and a participatory dimension. How a REC regime is designed along each of these dimensions has implications for the efficacy of the associated RPS program in terms of its ability to achieve the specific goals policy-makers hope to realize. A qualitative/theoretical assessment of these implications is provided below.  </span></font></p><p data-dcnode-id="4979"><b data-dcnode-id="4980"><font data-dcnode-id="4981" face="Verdana" size="+1"><a data-dcnode-id="4983" name="P323_42394"></a><span data-dcnode-id="4982" instrument_node="">Geographic Flexibility</span></font></b></p><p data-dcnode-id="4976"><font data-dcnode-id="4977" face="NewCenturySchlbk"><span data-dcnode-id="4978" instrument_node="">For purposes of this paper, the level of geographic flexibility defines the eligibility of RECs for compliance purposes in terms of where the energy associated with a given REC is generated and/or where the energy is delivered.  In general, the larger the geographic region within which LSEs can purchase RECs to apply against their RPS obligations, the lower the overall costs of compliance should be.  These cost savings are derived primarily from the expanded set of low-cost renewable resources that would be developed under an unbundled REC regime.  In addition, by expanding the number of potential suppliers, expanded geographic eligibility reduces the ability of any participant to corner the market or otherwise exert market power. While from an overall compliance perspective this should reduce costs, there may be concern that unconstrained geographic eligibility will result in a dilution or export of some of the benefits associated with the RPS. </span></font></p><p data-dcnode-id="4970"><font data-dcnode-id="4971" face="NewCenturySchlbk"><span data-dcnode-id="4975" instrument_node="">One of the central concerns with market-based compliance approaches (</span><i data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">i.e.</span></i><span data-dcnode-id="4972" instrument_node="">, those based on tradable credits or permits) is that while they offer the opportunity to achieve compliance at least cost to society at large, such systems are indifferent in terms of the allocation of benefits across members of society.  In other words, no value is placed on more rather than less equitable outcomes if the market is left to decide which resources get developed.  If the allocation of benefits associated with the RPS were completely unrelated to where renewable resources were actually developed or where the energy was delivered, this concern would be purely academic.  For example, increased reliance on renewable energy displaces conventional generation thereby reducing greenhouse gas emissions.  The benefits of these particular reductions are essentially global in nature; where the renewable generation occurs or where the energy is delivered is largely irrelevant.  In contrast, air quality benefits are likely to be less diffuse, largely based on which conventional facilities are displaced by the inflow of renewable energy and the type of pollutants involved.  For other categories of benefit, location plays an even more direct role in determining to whom the benefits accrue.  Economic development benefits, in terms of rents paid to landowners, salaries associated with the construction, operation, and maintenance of renewable facilities, and the accrual of applicable local property taxes, are realized by those localities where a renewable project is located.  Allowing the application of RECs toward RPS goals generated by renewable developers located in regions that are relatively remote from the ratepayers who bear the costs of renewable development may be problematic in that these ratepayers are, in effect, subsidizing economic growth that provides little direct benefit to them.</span></font></p><p data-dcnode-id="4967"><font data-dcnode-id="4968" face="NewCenturySchlbk"><span data-dcnode-id="4969" instrument_node="">Closely linked to the issue of where renewable resources will get developed under an unbundled regime is that of what types of resources will be developed.  From a compliance standpoint, the RPS treats all renewable resources the same, such that, for example, a unit of compliance achieved through the delivery of one MWh of energy from a biomass facility is equivalent to one unit of compliance achieved through the delivery of one MWh of energy from a wind facility. This is one of the oft-cited benefits of a relying on an RPS to promote renewable development; it allows the market to choose which technologies are ultimately developed.  However, different resource types are likely to confer different types of benefits, other things being equal.  Assuming the presence of long-term, fixed-price contracts, the value of a renewable resource as a hedge against fuel price volatility is contingent largely on its operational characteristics and what types of facilities it displaces.  For example, if the marginal generator that would otherwise operate is gas-fired, the renewable resource insulates customers from gas price swings.  If instead the marginal generator is coal-fired, the renewable resource insulates customers from coal price swings. These operational characteristics will also impact the type of emissions that are avoided.  If an unbundled approach significantly alters the type of resources that are developed, the benefits that are derived from the program are likely to change as well.    </span></font></p><p data-dcnode-id="4961"><b data-dcnode-id="4962"><i data-dcnode-id="4963"><font data-dcnode-id="4964" face="Verdana"><a data-dcnode-id="4966" name="P330_46785"></a><span data-dcnode-id="4965" instrument_node="">California Context</span></font></i></b></p><p data-dcnode-id="4958"><font data-dcnode-id="4959" face="NewCenturySchlbk"><span data-dcnode-id="4960" instrument_node="">Migrating to an unbundled/tradable REC regime creates the possibility that some LSEs will comply with the RPS largely through the purchase of unbundled RECs associated with renewable facilities that are neither located near, nor deliver energy to, their customers. As a result, ratepayers served by LSEs that comply through unbundled RECs will receive fewer of the benefits sought through the RPS program and will, in effect, subsidize benefits that accrue to other ratepayers.  More geographically restrictive eligibility requirements can function to ensure that location-specific benefits are equitably distributed across obligated LSEs and their respective ratepayers.  That said, compliance with the California RPS is already largely divorced from the location of renewable energy projects and the delivery of energy.</span></font></p><p data-dcnode-id="4955"><font data-dcnode-id="4956" face="NewCenturySchlbk"><span data-dcnode-id="4957" instrument_node="">Under the existing rules, all that is required for a renewable project to be eligible for RPS compliance purposes is that the energy it produces be delivered into the CAISO control area.  Once delivered into the CAISO control area, from a compliance standpoint, the final disposition of the energy does not matter.  If an LSE purchases energy that is delivered to its service area, it may choose to use the energy to serve native load or remarket the energy to another LSE. If the energy is delivered to another LSE, the purchasing utility again has a choice of remarketing the energy, or arranging to have the power delivered to its service area by wheeling the electricity through the transmission system.  Either way, the energy is treated the same for compliance purposes.  The opportunity to remarket the electricity is tantamount to allowing unbundled RECs.  To see this more clearly, consider the following: if a utility purchases and subsequently remarkets some quantity of energy, by definition another LSE is ultimately receiving the energy, yet the utility that resold the energy retains claim over the renewable attributes.  This is an unbundled REC trade at its most basic.  See Figure 1 below.</span></font></p><p data-dcnode-id="4950"><b data-dcnode-id="4951"><font data-dcnode-id="4952" face="Times New Roman"><a data-dcnode-id="4954" name="P335_48831"></a><span data-dcnode-id="4953" instrument_node="">Figure 1: Unbundled REC Purchases</span></font></b></p><p data-dcnode-id="4947"><img border="1" data-dcnode-id="4949" height="335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.cpuc.ca.gov/publishedDocs/published/Graphics/55606-2.gif&amp;raw" width="577"><img data-dcnode-id="4948" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.cpuc.ca.gov/publishedDocs/published/Report/%2520&amp;raw"></p><p data-dcnode-id="4944"><font data-dcnode-id="4945" face="Arial" size="2"><span data-dcnode-id="4946" instrument_node="">In the left panel, both Utility A and Utility B are meeting their respective load obligations using power generated by conventional facilities. In the right panel, Utility B has contracted with a renewable generator for ten mega watt hours of electricity, but does not purchase the associated RECs. These RECs are sold to Utility A.  In this case, Utility A receives few if any benefits associated with displacing power that would otherwise be produced by its conventional facilities since it is only purchasing the renewable attributes embodied by the RECs, while Utility B receives the actual energy and any attendant benefits.  This figure could also depict a scenario in which Utility A purchases the energy and RECs, but remarkets the energy to Utility B. Note that under the existing compliance framework, Utility A would receive credit for the renewable attributes of the energy despite the fact that it is not actually receiving any of the energy itself. </span></font></p><p data-dcnode-id="4941"><font data-dcnode-id="4942" face="NewCenturySchlbk"><span data-dcnode-id="4943" instrument_node="">Interestingly, as part of SCE's 2003 interim RPS procurement effort, the Commission approved a contract that bears all the hallmarks of a REC-based transaction involving power produced by Calpine and sold to SCE.  Under the terms of the contract, renewable energy was delivered into NP15 as conventional power while a corresponding amount of power, generated by conventional facilities in SP15, was simultaneously delivered to SCE.  This power was treated as renewable power for RPS purposes and counted toward SCE's RPS goals.  One could easily look at this as a REC transaction, in which the RECs were unbundled from the renewable power and transferred to SCE to be rebundled with a corresponding amount of conventional power.  This approach, sometimes referred to as an "inter-utility swap," is, from a practical standpoint, indistinguishable from energy remarketing.  In both circumstances the purchasing utility receives credit for the renewable attributes associated with energy that is delivered to another LSE.</span></font></p><p data-dcnode-id="4932"><font data-dcnode-id="4939" face="NewCenturySchlbk"><span data-dcnode-id="4940" instrument_node="">The ability to receive credit for renewable attributes associated with renewable energy provided it is delivered into the CAISO control area also allows obligated entities to take advantage of delivery management strategies that might otherwise be foreclosed to them.  Specifically, using a shaped renewable resource</span></font><sup data-dcnode-id="4935"><font data-dcnode-id="4936" face="Arial" size="2"><a data-dcnode-id="4937" href="#P343_51161" name="P343_51162"><span data-dcnode-id="4938" instrument_node="">13</span></a></font></sup><font data-dcnode-id="4933" face="NewCenturySchlbk"><span data-dcnode-id="4934" instrument_node=""> under a strict delivery requirement, might undermine the ability of the procuring entity to claim the renewable attributes associated with that energy, since the renewable energy itself may be delivered to another LSE.  Shaping refers to contractual arrangements whereby renewable energy, like the output of a wind generator, is delivered to some third party, displacing the output from some flexible resource, typically a hydro facility.  This, in effect, stores the renewable energy which is then redelivered to the purchasing LSE at some later time.  Under a strict delivery requirement the purchasing LSE may not be able to apply this generation toward its RPS goals, since technically, the energy it receives, though corresponding to the output produced by a renewable facility, may be produced by a facility that doesn't qualify as a renewable resource.  However, under the more relaxed delivery requirement adopted by the Commission, the purchasing utility would be able to apply this energy toward its RPS goals, provided the renewable energy is initially delivered into the CAISO control area.  </span></font></p><p data-dcnode-id="4929"><font data-dcnode-id="4930" face="NewCenturySchlbk"><span data-dcnode-id="4931" instrument_node="">Although the existing regulatory regime embodies the implicit use of unbundled RECs and thus facilitates the development of low-cost resources, obligated entities still face hurdles in exploiting those resources that cannot be delivered to their service territories directly, owing to transmission constraints and the attendant costs of delivery, and/or the costs of remarketing the electricity. It would be helpful for the Commission to explore whether the relaxation of the delivery requirements established in D.05-07-039 has actually stimulated additional renewable development and participation in the RPS. In addition, the Commission should clarify that inter-utility swaps, as well as shaped products are compatible with the existing deliverability requirements, and therefore can be applied toward an LSE's RPS goals provided the renewable energy involved in these transactions is initially delivered into the CAISO control area.</span></font></p><p data-dcnode-id="4920"><font data-dcnode-id="4927" face="NewCenturySchlbk"><span data-dcnode-id="4928" instrument_node="">As indicated above, the primary goals associated with the 20% renewables goal appear to be more expansive than those associated with the 33% goal proposed by the Governor.  Since the latter has been proposed principally as a means to reduce GHG emissions and mitigate global warming, absent administrative concerns, the state should be relatively indifferent as to where the additional projects resulting from the adoption of a 33% target are located or where the associated energy is delivered, and should be more concerned with the carbon intensity of the generation that is displaced, irrespective of its location.  This implies that a different set of rules governing issues of geographic eligibility may be appropriate for the 33% goal than what would be appropriate for the 20% goal, though such a two tiered compliance regime would greatly increase the administrative complexity of the program.  However, as the CPUC stated in D.04-12-048, the 20% RPS goal is intended to be a floor, not a cap,</span></font><sup data-dcnode-id="4923"><font data-dcnode-id="4924" face="Arial" size="2"><a data-dcnode-id="4925" href="#P348_54300" name="P348_54301"><span data-dcnode-id="4926" instrument_node="">14</span></a></font></sup><font data-dcnode-id="4921" face="NewCenturySchlbk"><span data-dcnode-id="4922" instrument_node=""> so presumably the benefits associated with the 33% goal can be thought of as in addition to, rather than wholly separate from, the goals sought through the establishment of the 20% target.  </span></font></p><p data-dcnode-id="4914"><b data-dcnode-id="4915"><i data-dcnode-id="4916"><font data-dcnode-id="4917" face="Verdana"><a data-dcnode-id="4919" name="P349_54514"></a><span data-dcnode-id="4918" instrument_node="">Legal Issues</span></font></i></b></p><p data-dcnode-id="4905"><font data-dcnode-id="4912" face="NewCenturySchlbk"><span data-dcnode-id="4913" instrument_node="">Whatever geographic eligibility requirements are established, they must be compatible with the legal context within which the compliance regime operates.   Eligibility rules that discriminate between RECs on the basis of where the originating generator is located may run afoul of the Interstate Commerce Clause.  Under the Commerce Clause, states are not allowed to place unreasonable burdens on interstate commerce, for example, by discriminating against similar products on the basis of whether the product in question was produced out of state or in-state. Similar issues may arise in the context of NAFTA and GATT rules.</span></font><sup data-dcnode-id="4908"><font data-dcnode-id="4909" face="Arial" size="2"><a data-dcnode-id="4910" href="#P352_55151" name="P352_55152"><span data-dcnode-id="4911" instrument_node="">15</span></a></font></sup><font data-dcnode-id="4906" face="NewCenturySchlbk"><span data-dcnode-id="4907" instrument_node=""> </span></font></p><p data-dcnode-id="4902"><font data-dcnode-id="4903" face="NewCenturySchlbk"><span data-dcnode-id="4904" instrument_node="">In California, eligibility of a renewable facility's output under the RPS is contingent on the generator's first point of interconnection being within the ISO grid. Determining REC eligibility on the basis of its first point of interconnection does not necessarily discriminate against out of state producers, since any out-of state producer whose first point of interconnection is to the CAISO grid would be eligible to sell its RECs in California. In addition, requiring the first point of interconnection to be to within the CAISO control area may be a reasonable proxy for indicating that renewable resources and the associated benefits are actually reaching California residents.  It is important to remember that a REC is a regulatory construct, not a tangible or objective product like milk or computers.  If a renewable energy project does not produce energy that yields benefits to California ratepayers, one could argue that a California REC has not been produced since it is these benefits that a REC embodies. Limiting eligibility to those generators that deliver their energy directly into California is not discriminatory to the extent that it accurately identifies which generators are producing benefits that flow into California and to California ratepayers.   That said, to the extent that other states, in developing rules, were sensitive to Commerce Clause concerns, their experience may be instructive.</span></font></p><p data-dcnode-id="4897"><b data-dcnode-id="4898"><font data-dcnode-id="4899" face="Verdana" size="+1"><a data-dcnode-id="4901" name="P356_56708"></a><span data-dcnode-id="4900" instrument_node="">Temporal Flexibility</span></font></b></p><p data-dcnode-id="4894"><font data-dcnode-id="4895" face="Arial" size="2"><span data-dcnode-id="4896" instrument_node=""> </span></font></p><p data-dcnode-id="4891"><font data-dcnode-id="4892" face="NewCenturySchlbk"><span data-dcnode-id="4893" instrument_node="">The rules dictating when RECs can be traded, relative to their date of creation (or relative to the compliance period in which they were created) is another aspect of a REC regime that policy makers will need to consider.  Temporal flexibility is achieved by allowing "banking" and "borrowing" of RECs for RPS compliance purposes.  Banking refers to the ability of obligated LSEs to apply RECs purchased in a given compliance period in excess of their RPS obligations in that period to future compliance periods. Borrowing refers to the ability of obligated entities to defer required purchases in a given compliance period with the understanding that they will make up for the shortfall by "over-procuring" in subsequent compliance periods. </span></font></p><p data-dcnode-id="4888"><font data-dcnode-id="4889" face="NewCenturySchlbk"><span data-dcnode-id="4890" instrument_node="">Banking and borrowing give obligated entities the ability to purchase excess RECs when they are low cost, and apply these toward their compliance goals when they are high cost, irrespective of the chronological order in which these respective periods of low and high costs occur.  These inter-temporal trades moderate price swings in the market by decoupling the timing of compliance purchases from when RECs are actually generated. There are compelling theoretical reasons to believe that REC prices will be subject to a great deal of volatility absent the ability to bank and borrow.  The price of RECs in a given compliance period is likely to differ substantially from that associated with the long-run equilibrium owing to the inherent unpredictability of renewable demand and supply, each of which are dependent on underlying factors that are themselves difficult to anticipate.  On the demand side, economic activity and weather conditions play a critical role in determining the total number of RECs that must be procured by obligated entities in any given compliance period. On the supply side, variation in resource availability (e.g., annual rainfall, wind speeds, biomass growth or harvesting) may impact the availability of renewable generation.  Other factors may also impact the timing of renewable development, like the availability of the production tax credit.   </span></font></p><p data-dcnode-id="4881"><font data-dcnode-id="4882" face="NewCenturySchlbk"><span data-dcnode-id="4887" instrument_node="">In the short run, shifts in either the supply or demand curve can have substantial price effects due to their respective inelasticity.  For example, in compliance periods when demand outstrips supply, absent the ability borrow, REC prices will be extremely high given the limited ability of the market to respond to upward pressure on REC prices with additional capacity or reduced demand. However, borrowing allows LSEs to forgo purchases for some predetermined time period, essentially increasing the price elasticity of demand (while still, assuming this information is made public, providing clear signals to investors of future demand).  The ability to shift demand forward will temper price increases in the immediate period by reducing demand, as well as mitigate price declines in future periods by increasing demand for RECs when those shortfalls are made up.  Conversely, in times when supply outstrips demand, REC prices will be extremely low, again by virtue of the inelasticity of supply and demand in the short-run.  By allowing banking, the elasticity of demand in a given period is increased, such that a price decline motivates additional REC purchases, providing some countervailing pressure on prices in the immediate period. This will mitigate the magnitude of the price decline that would occur absent the ability to bank. These excess REC purchases can be applied toward future compliance obligations when REC prices are relatively high, thus providing a tempering influence on REC prices in those future periods characterized by REC scarcity. </span><sup data-dcnode-id="4884"><a data-dcnode-id="4885" href="#P363_60421" name="P363_60422"><span data-dcnode-id="4886" instrument_node="">16</span></a></sup><span data-dcnode-id="4883" instrument_node="">  Banking and borrowing, combined with the ability to resell, can further mitigate price swings by allowing inter-temporal arbitrage, in which speculators procure excess RECs in low price periods in order to resell those RECs in high-price periods. </span></font></p><p data-dcnode-id="4862"><font data-dcnode-id="4879" face="NewCenturySchlbk"><span data-dcnode-id="4880" instrument_node="">As with the issues around geographic flexibility, a concern in offering temporal flexibility is that it could result in a reallocation of when (instead of where) the associated renewable energy is actually produced, such that there may be a significant amount of clustering of renewable energy production across compliance periods. For example, if air quality benefits in a given compliance period are characterized by diminishing returns, such that each additional unit of air pollution or GHG reduction achieved via the RPS produces fewer benefits than the preceding unit, overall air quality benefits will not be maximized if all of the renewable energy that will be procured under the RPS over the life of the program were delivered in a single compliance period.  Under such a scenario, total benefits are maximized if the energy delivered under the RPS is spread evenly across compliance periods, an outcome that argues against allowing any banking or borrowing whatsoever.</span></font><sup data-dcnode-id="4874"><font data-dcnode-id="4875" face="Arial" size="2"><span data-dcnode-id="4878" instrument_node=""> </span><a data-dcnode-id="4876" href="#P366_61880" name="P366_61881"><span data-dcnode-id="4877" instrument_node="">17</span></a></font></sup><font data-dcnode-id="4869" face="NewCenturySchlbk"><span data-dcnode-id="4873" instrument_node="">  However, the effects of clustering on the benefits associated with the RPS are likely to vary by benefit category.  In contrast to local air quality benefits, the impact of clustering on global warming benefits is likely to be less dramatic due to the small magnitude of benefits that will accrue during the life of the RPS program, in terms of avoided CO</span><sub data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">2</span></sub><span data-dcnode-id="4870" instrument_node=""> emissions, relative to the total benefits over the lifetime of the avoided emissions.</span></font><sup data-dcnode-id="4865"><font data-dcnode-id="4866" face="Arial" size="2"><a data-dcnode-id="4867" href="#P367_62708" name="P367_62709"><span data-dcnode-id="4868" instrument_node="">18</span></a></font></sup><font data-dcnode-id="4863" face="NewCenturySchlbk"><span data-dcnode-id="4864" instrument_node=""> </span></font></p><p data-dcnode-id="4853"><font data-dcnode-id="4860" face="NewCenturySchlbk"><span data-dcnode-id="4861" instrument_node="">There may be other issues associated with banking and borrowing that will need to be considered.  For example, regulators may be particularly reluctant to allow a great deal of latitude with respect to borrowing, as entities may choose to defer as long as possible in the hopes that they will be able to avoid compliance altogether because of legislative or regulatory changes that may occur.  There may also be concerns that significant temporal flexibility could create additional opportunities to game the market</span></font><sup data-dcnode-id="4856"><font data-dcnode-id="4857" face="Arial" size="2"><a data-dcnode-id="4858" href="#P370_63840" name="P370_63841"><span data-dcnode-id="4859" instrument_node="">19</span></a></font></sup><font data-dcnode-id="4854" face="NewCenturySchlbk"><span data-dcnode-id="4855" instrument_node=""> or actually compound rather than alleviate the boom-bust cycle in the development of renewable energy. Several states impose time limits on the amount of time that RECs can be banked, at least in part as a way to reduce the extent to which banked RECs "compete" with new RECs generated during a given compliance period. Limiting the time for banked RECs to be counted may also help maintain market liquidity, by giving holders of excess RECs a strong incentive to sell prior to the end of the authorized banking period.</span></font></p><p data-dcnode-id="4847"><b data-dcnode-id="4848"><i data-dcnode-id="4849"><font data-dcnode-id="4850" face="Verdana"><a data-dcnode-id="4852" name="P371_64492"></a><span data-dcnode-id="4851" instrument_node="">California Context</span></font></i></b></p><p data-dcnode-id="4826"><font data-dcnode-id="4845" face="NewCenturySchlbk"><span data-dcnode-id="4846" instrument_node="">Though not contemplated in the context of unbundled/tradable RECs, the issue of banking and borrowing has been addressed in the RPS statute</span></font><sup data-dcnode-id="4841"><font data-dcnode-id="4842" face="Arial" size="2"><a data-dcnode-id="4843" href="#P374_64649" name="P374_64650"><span data-dcnode-id="4844" instrument_node="">20</span></a></font></sup><font data-dcnode-id="4839" face="NewCenturySchlbk"><span data-dcnode-id="4840" instrument_node=""> and the current compliance rules governing the RPS in California.  Specifically, in D.03-06-071, the Commission established rules that allow the IOUs to bank RPS purchases in excess of their annual procurement targets indefinitely. It is worth noting that the concept of banking such that over-procurement in earlier periods can be "saved" and applied to later compliance is, in essence, a REC-based transaction.  In addition, the rules adopted in this decision stipulate that LSEs may borrow up to 25% of their incremental procurement targets without Commission authorization, with additional latitude granted on a showing of specific extenuating circumstances.</span></font><sup data-dcnode-id="4835"><font data-dcnode-id="4836" face="Arial" size="2"><a data-dcnode-id="4837" href="#P375_65362" name="P375_65363"><span data-dcnode-id="4838" instrument_node="">21</span></a></font></sup><font data-dcnode-id="4833" face="NewCenturySchlbk"><span data-dcnode-id="4834" instrument_node=""> These shortfalls need to be rectified within three years of when they occurred through over-procurement in subsequent periods.</span></font><sup data-dcnode-id="4829"><font data-dcnode-id="4830" face="Arial" size="2"><a data-dcnode-id="4831" href="#P376_65888" name="P376_65889"><span data-dcnode-id="4832" instrument_node="">22</span></a></font></sup><font data-dcnode-id="4827" face="NewCenturySchlbk"><span data-dcnode-id="4828" instrument_node="">  If the state chooses to move forward with an unbundled REC regime, the rules dictating the terms of banking and borrowing could be made consistent with this existing approach, at least through 2010.  In view of the relatively short time frame involved, the risks would appear to be relatively limited. However, given that the LSEs are required by the RPS statute to maintain the 20% share of renewable energy in their portfolios beyond 2010, and the possibility of an expanded target of 33% by 2020, the state may need to revisit these design elements and establish clear rules that determine the length of time that RECs can be banked, as well as the amount of time LSEs have to make up any shortfalls in their renewable procurement efforts.</span></font></p><p data-dcnode-id="4823"><font data-dcnode-id="4824" face="NewCenturySchlbk"><span data-dcnode-id="4825" instrument_node="">As with geographic flexibility, to the extent that the benefits sought through the 20% goal are more sensitive to temporal clustering of renewable energy purchases, it may be that a different set of eligibility rules for RECs would be appropriate in the context of the 20% goal than in the context of the expanded 33% goal envisioned by Governor Schwarzenegger. </span></font></p><p data-dcnode-id="4818"><b data-dcnode-id="4819"><font data-dcnode-id="4820" face="Verdana" size="+1"><a data-dcnode-id="4822" name="P380_67237"></a><span data-dcnode-id="4821" instrument_node="">Participatory Flexibility</span></font></b></p><p data-dcnode-id="4809"><font data-dcnode-id="4810" face="NewCenturySchlbk"><span data-dcnode-id="4817" instrument_node="">In D.05-11-025, the Commission differentiated between an unbundled REC regime, and a tradable REC regime.  The decision defined an unbundled regime as one in which RECs are transferred directly from the renewable generator to the LSE, not necessarily associated with the underlying energy,&nbsp;and are not eligible for subsequent resale.  In contrast, the decision defined a tradable REC regime as one in which RECs may be transferred from the renewable generator to any third party, including brokers or other financial intermediaries, and are eligible for subsequent resale. This framework appears to conflate two related, though not identical design elements, specifically who is allowed to participate in the program, and whether trading/resale is allowed.  As currently defined, an unbundled regime is one in which only LSEs and generators can participate </span><i data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">and </span></i><span data-dcnode-id="4814" instrument_node="">no reselling of unbundled RECs is allowed after the initial sale.  A tradable regime is defined as one in which virtually any actor can participate</span><i data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node=""> and</span></i><span data-dcnode-id="4811" instrument_node=""> subsequent resale of RECs is allowed.  However, one could easily imagine an intermediate option in which only generators and LSEs are allowed to participate, but subsequent resale is allowed.  Still another, though nonsensical option from a practical standpoint, would be one in which any actor can participate, but trading after the initial sale is not allowed.  </span></font></p><p data-dcnode-id="4806"><font data-dcnode-id="4807" face="NewCenturySchlbk"><span data-dcnode-id="4808" instrument_node="">Allowing additional trading after the initial sale of RECs provides an additional risk management tool, similar in many ways to banking and borrowing provisions. By giving LSEs another way to dispose of RECs in the event of over-procurement, and an opportunity to buy additional RECs in the event of under-procurement, the risks they assume in trying to comply with the RPS may be greatly reduced. </span></font></p><p data-dcnode-id="4797"><font data-dcnode-id="4804" face="NewCenturySchlbk"><span data-dcnode-id="4805" instrument_no
