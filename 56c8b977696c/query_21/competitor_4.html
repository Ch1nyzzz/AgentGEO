</span><table border="1" data-dcnode-id="3419"><tbody data-dcnode-id="3420"><tr data-dcnode-id="3493"><td data-dcnode-id="3499" valign="top" width="288"><p align="center" data-dcnode-id="3500"><font data-dcnode-id="3501" face="Arial" size="2"><span data-dcnode-id="3502" instrument_node="">Compliance Date</span></font></p></td><td data-dcnode-id="3494" valign="top" width="295"><p align="center" data-dcnode-id="3495"><font data-dcnode-id="3496" face="Arial" size="2"><span data-dcnode-id="3497" instrument_node="">Renewable Energy Requirement</span></font></p></td></tr><tr data-dcnode-id="3481"><td data-dcnode-id="3487" valign="top" width="288"><p align="center" data-dcnode-id="3488"><font data-dcnode-id="3489" face="Arial" size="2"><span data-dcnode-id="3490" instrument_node="">1/1/2006</span></font></p></td><td data-dcnode-id="3482" valign="top" width="295"><p align="center" data-dcnode-id="3483"><font data-dcnode-id="3484" face="Arial" size="2"><span data-dcnode-id="3485" instrument_node="">5%</span></font></p></td></tr><tr data-dcnode-id="3469"><td data-dcnode-id="3475" valign="top" width="288"><p align="center" data-dcnode-id="3476"><font data-dcnode-id="3477" face="Arial" size="2"><span data-dcnode-id="3478" instrument_node="">1/1/2007</span></font></p></td><td data-dcnode-id="3470" valign="top" width="295"><p align="center" data-dcnode-id="3471"><font data-dcnode-id="3472" face="Arial" size="2"><span data-dcnode-id="3473" instrument_node="">6%</span></font></p></td></tr><tr data-dcnode-id="3457"><td data-dcnode-id="3463" valign="top" width="288"><p align="center" data-dcnode-id="3464"><font data-dcnode-id="3465" face="Arial" size="2"><span data-dcnode-id="3466" instrument_node="">1/1/2008</span></font></p></td><td data-dcnode-id="3458" valign="top" width="295"><p align="center" data-dcnode-id="3459"><font data-dcnode-id="3460" face="Arial" size="2"><span data-dcnode-id="3461" instrument_node="">7%</span></font></p></td></tr><tr data-dcnode-id="3445"><td data-dcnode-id="3451" valign="top" width="288"><p align="center" data-dcnode-id="3452"><font data-dcnode-id="3453" face="Arial" size="2"><span data-dcnode-id="3454" instrument_node="">1/1/2009</span></font></p></td><td data-dcnode-id="3446" valign="top" width="295"><p align="center" data-dcnode-id="3447"><font data-dcnode-id="3448" face="Arial" size="2"><span data-dcnode-id="3449" instrument_node="">8%</span></font></p></td></tr><tr data-dcnode-id="3433"><td data-dcnode-id="3439" valign="top" width="288"><p align="center" data-dcnode-id="3440"><font data-dcnode-id="3441" face="Arial" size="2"><span data-dcnode-id="3442" instrument_node="">1/1/2010</span></font></p></td><td data-dcnode-id="3434" valign="top" width="295"><p align="center" data-dcnode-id="3435"><font data-dcnode-id="3436" face="Arial" size="2"><span data-dcnode-id="3437" instrument_node="">9%</span></font></p></td></tr><tr data-dcnode-id="3421"><td data-dcnode-id="3427" valign="top" width="288"><p align="center" data-dcnode-id="3428"><font data-dcnode-id="3429" face="Arial" size="2"><span data-dcnode-id="3430" instrument_node="">1/1/2011</span></font></p></td><td data-dcnode-id="3422" valign="top" width="295"><p align="center" data-dcnode-id="3423"><font data-dcnode-id="3424" face="Arial" size="2"><span data-dcnode-id="3425" instrument_node="">10%</span></font></p></td></tr></tbody></table></p><p data-dcnode-id="3415"><font data-dcnode-id="3416" face="NewCenturySchlbk"><span data-dcnode-id="3417" instrument_node="">For all years subsequent to 2011, the IOUs are required to maintain a ten percent share of renewable energy in their portfolios.   Regarding renewable generation that predates the adoption of the RPS statute, the legislation explicitly allows for all renewable energy in a utility's portfolio prior to July 1, 2004 to be counted toward the compliance targets.  </span></font></p><p data-dcnode-id="3397"><font data-dcnode-id="3410" face="NewCenturySchlbk"><span data-dcnode-id="3414" instrument_node="">Although the utilities' first RPS compliance reports will not be issued until September 2007, according to PRC staff it appears that all three utilities will meet their requirements.  Non-wind resources appear to be </span><i data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">de minimus </span></i><span data-dcnode-id="3411" instrument_node="">in the IOU procurement plans, despite the fact that under the regulatory framework adopted in New Mexico, REC multipliers are applied to non-wind and non-hydro resources, and, furthermore the renewable resource portfolios developed pursuant to the RPS are required to be diversified.</span></font><sup data-dcnode-id="3406"><font data-dcnode-id="3407" face="Arial" size="2"><a data-dcnode-id="3408" href="#P790_171680" name="P790_171681"><span data-dcnode-id="3409" instrument_node="">69</span></a></font></sup><font data-dcnode-id="3404" face="NewCenturySchlbk"><span data-dcnode-id="3405" instrument_node="">  The fact that the RPS program appears to be motivating wind development almost exclusively became apparent to the PRC when the utilities filed their preliminary RPS procurement plans in 2004. Although Public Service Company of New Mexico (PNM) indicated that it was pursuing efforts to seek out some resource diversity through a solar REC program</span></font><sup data-dcnode-id="3400"><font data-dcnode-id="3401" face="Arial" size="2"><a data-dcnode-id="3402" href="#P791_172061" name="P791_172062"><span data-dcnode-id="3403" instrument_node="">70</span></a></font></sup><font data-dcnode-id="3398" face="NewCenturySchlbk"><span data-dcnode-id="3399" instrument_node="">, wind represented the totality of El Paso Electric's (EPE) and Southwestern Public Service Company's (SPS)  renewable procurement plans.  In response the PRC directed the SPS and EPE to evaluate non-wind renewable resources with the explicit goal of diversifying their renewable energy portfolios.  Pursuant to this, they have initiated efforts to procure non-wind resources through a RFP process specifically seeking non-wind projects.</span></font></p><p data-dcnode-id="3382"><font data-dcnode-id="3395" face="NewCenturySchlbk"><span data-dcnode-id="3396" instrument_node="">At present, it is unclear what penalties will be brought to bear if a utility fails to achieve its RPS compliance goals.  Under state statute 62-12-4, "any person or corporation which violates any provision of the Public Utility Act [</span></font><u data-dcnode-id="3391"><font color="#0000ff" data-dcnode-id="3392" face="Bodoni MT"><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.conwaygreene.com/nmsu/lpext.dll%3Ff%3DFifLink%26t%3Ddocument-frame.htm%26l%3Djump%26iid%3D3e2c96cb.43fe5aeb.0.0%26nid%3D2345%23JD_62-13-1" target="_top"><span data-dcnode-id="3394" instrument_node="">62-13-1</span></a></font></u><font data-dcnode-id="3389" face="NewCenturySchlbk"><span data-dcnode-id="3390" instrument_node=""> New Mexico Statutes Annotated (NMSA) 1978] or which fails, omits or neglects to obey, observe or comply with any lawful order, or any part or provision thereof, of the commission is subject to a penalty of not less than one hundred dollars ($100) nor more than one hundred thousand dollars ($100,000) for each offense."</span></font><sup data-dcnode-id="3385"><font data-dcnode-id="3386" face="Arial" size="2"><a data-dcnode-id="3387" href="#P794_173496" name="P794_173497"><span data-dcnode-id="3388" instrument_node="">71</span></a></font></sup><font data-dcnode-id="3383" face="NewCenturySchlbk"><span data-dcnode-id="3384" instrument_node="">  How "each offense" will be interpreted, as well as where within the range of potential amounts any penalties will fall, remains an open question. </span></font></p><p data-dcnode-id="3379"><font data-dcnode-id="3380" face="NewCenturySchlbk"><span data-dcnode-id="3381" instrument_node="">Building on the renewable energy rule originally created by the PRC, the RPS statute established a number of cost control mechanisms to ensure that both the obligated utilities and ratepayers are protected from excessive costs that may be engendered by the program.  First, the legislation directed the PRC to establish a "reasonable cost threshold," thereby putting a cap on overall compliance costs.  Pursuant to this directive, the PRC established reasonable cost thresholds on a technology-specific and on an overall rate-impact basis.  The thresholds by generating technology are as follows:  $0.049/kWh for wind and hydropower, $0.0625/kWh for biomass and geothermal, $0.15/kWh for solar projects of 10 kW or less, and $0.10/kWh for solar projects larger than 10 kW. Should the costs of a given renewable technology exceed these thresholds, utilities would not be required to make additional purchases. These cost caps may also be an impediment to the development of non-wind resources to the extent that they are unrealistically low.  In addition, the overall rate increase customers experience as a result of RPS procurement should not exceed 1% in 2006 plus an additional 0.2% per year until 2011 where the allowable rate increase is capped at 2%. Should the cost increase exceed these levels, utilities would be required to forgo those renewable purchases that, if made, would result in this threshold being exceeded in a given year. Large commercial customers are provided an additional protection from cost increases associated with RPS procurement. As implemented by the PRC, the RPS procurement obligations of a given utility derived from the energy used by  customers that consume in excess of 10,000 MWh/year,  are to be adjusted downward to ensure that the costs of compliance these customer bear in 2006 does not exceed the lesser of 1% of the customer's annual electric bill or $49,000.  Each subsequent year thereafter, these caps may increase by 0.2% per year or $10,000 until January 1, 2011 after which the limits are fixed at a total rate impact of the lesser of 2% or $99,000, adjusted for inflation.</span></font></p><p data-dcnode-id="3376"><font data-dcnode-id="3377" face="NewCenturySchlbk"><span data-dcnode-id="3378" instrument_node="">Utilizing the authority granted to it by the statute, the PRC, in addition to imposing specific renewable procurement obligations on the state's public utilities, also required public utilities and rural electric cooperatives to offer voluntary programs to support the purchase of renewable energy.  Purchases made under these programs are mandatory but cannot be banked or applied toward a utility's obligations under the RPS. </span></font></p><p data-dcnode-id="3370"><b data-dcnode-id="3371"><i data-dcnode-id="3372"><font data-dcnode-id="3373" face="Verdana"><a data-dcnode-id="3375" name="P799_176226"></a><span data-dcnode-id="3374" instrument_node="">Role of Renewable Energy Certificates</span></font></i></b></p><p data-dcnode-id="3363"><font data-dcnode-id="3368" face="NewCenturySchlbk"><span data-dcnode-id="3369" instrument_node="">RECs are the unit of account by which compliance with the New Mexico RPS is assessed.  The New Mexico statute contains extensive detail regarding the use of renewable energy certificates in the context of the RPS program.  Not only does the statute direct the PRC to establish "a system of renewable energy certificates that can be used by a public utility to establish compliance," it also addresses a variety of other issues including ways in which credits may be issued to promote diversified renewable energy development, as well as fairly explicit guidelines concerning the various dimensions of trading flexibility (geographic, temporal, and participatory) under the REC regime.  The statute also provides clear language defining the ownership of RECs in the context of Qualifying Facility contracts under PURPA as well as renewable energy contracts that predate the adoption of the RPS program.  Regarding PURPA QF contracts, unless rights over the renewable attributes were explicitly retained by the generator in the contract, the purchasing utility has claim over any associated RECs.  Similarly, contracts for renewable energy in effect before January 1, 2004 are assumed to convey the RECs to the purchaser of the renewable energy.</span></font><sup data-dcnode-id="3364"><font data-dcnode-id="3365" face="Arial" size="2"><a data-dcnode-id="3366" href="#P802_177506" name="P802_177507"><span data-dcnode-id="3367" instrument_node="">72</span></a></font></sup></p><p data-dcnode-id="3360"><font data-dcnode-id="3361" face="NewCenturySchlbk"><span data-dcnode-id="3362" instrument_node="">Under the New Mexico program, RECs are denominated in kWh.  However the number of RECs issued per kWh generated by an eligible renewable technology varies by resource.  Each kWh generated by wind or hydroelectric facilities receives one REC to be applied toward the RPS targets. Generation from biomass, geothermal, landfill gas, or fuel cell technologies earn two RECs for each kWh of generation, while solar generation receives three RECs for each kWh of generation.  Because RECs represent an additional income stream that developers can earn, these technology specific REC conversions provide increased incentives for certain types of technologies relative to others.  This is a slightly different approach than that used in other states to provide increased incentives for specific technology types within the broader set of eligible renewable resources. A number of other states employ technology carve-outs, in which a specific portion of the RPS must be met through energy generated by a specific renewable technology.  Arguably the New Mexico approach is more market-oriented in that if the cost differential between one suite of alternative renewable technologies and another exceeds a certain level, the market can choose to shift away from the high cost technologies in favor of lower cost technologies.</span></font></p><p data-dcnode-id="3351"><font data-dcnode-id="3358" face="NewCenturySchlbk"><span data-dcnode-id="3359" instrument_node="">Based on renewable procurement plans filed by the utilities, two of the three obligated under the RPS are complying through bundled purchases; SPS and PNM both have contracts with wind developers for both the energy and the associated RECs.  In contrast, EPE is purchasing unbundled RECs from PNM to fulfill its RPS obligations.</span></font><sup data-dcnode-id="3354"><font data-dcnode-id="3355" face="Arial" size="2"><a data-dcnode-id="3356" href="#P807_179168" name="P807_179169"><span data-dcnode-id="3357" instrument_node="">73</span></a></font></sup><font data-dcnode-id="3352" face="NewCenturySchlbk"><span data-dcnode-id="3353" instrument_node=""> </span></font></p><p data-dcnode-id="3345"><b data-dcnode-id="3346"><i data-dcnode-id="3347"><font data-dcnode-id="3348" face="Verdana"><a data-dcnode-id="3350" name="P808_179598"></a><span data-dcnode-id="3349" instrument_node="">Geographic Flexibility</span></font></i></b></p><p data-dcnode-id="3342"><font data-dcnode-id="3343" face="NewCenturySchlbk"><span data-dcnode-id="3344" instrument_node="">In order for a REC to be eligible under the New Mexico RPS, the associated energy must be delivered into New Mexico. According to PRC staff, this approach was viewed as a reasonable way to ensure that the program does not violate the Commerce Clause.  However, if the PRC determines that a regional market exists for RECs, then this delivery requirement can be changed pursuant to Commission directive to be broader in scope. This appears to be in recognition of the eventual implementation of the WREGIS system, which would track renewable generation throughout the WECC region, of which New Mexico is a part.</span></font></p><p data-dcnode-id="3336"><b data-dcnode-id="3337"><i data-dcnode-id="3338"><font data-dcnode-id="3339" face="Verdana"><a data-dcnode-id="3341" name="P811_180230"></a><span data-dcnode-id="3340" instrument_node="">Temporal Flexibility</span></font></i></b></p><p data-dcnode-id="3327"><font data-dcnode-id="3334" face="NewCenturySchlbk"><span data-dcnode-id="3335" instrument_node="">RECs can be banked for up to four years, after which they are no longer eligible for application toward the state's RPS goals.</span></font><sup data-dcnode-id="3330"><font data-dcnode-id="3331" face="Arial" size="2"><a data-dcnode-id="3332" href="#P814_180376" name="P814_180377"><span data-dcnode-id="3333" instrument_node="">74</span></a></font></sup><font data-dcnode-id="3328" face="NewCenturySchlbk"><span data-dcnode-id="3329" instrument_node=""> This provision was established through a stakeholder process used during the development of the original renewable energy rule adopted by the PRC. Borrowing is not allowed per se, though the New Mexico program's reasonable cost threshold provides some of the same benefits. Like borrowing, it allows a utility to forgo purchases that would otherwise be made to achieve its RPS goals when it becomes economically unreasonable to do so. However it is not borrowing in the sense that if this occurs, the utility is not expected to "pay back" the shortfall in subsequent years by over-complying.  In other words, the amount of renewable energy for which an obligated utility is responsible remains consistent with the goals identified in Table 6 above, irrespective of whether it hits its earlier RPS targets.  </span></font></p><p data-dcnode-id="3321"><b data-dcnode-id="3322"><i data-dcnode-id="3323"><font data-dcnode-id="3324" face="Verdana"><a data-dcnode-id="3326" name="P815_181222"></a><span data-dcnode-id="3325" instrument_node="">Participatory Flexibility</span></font></i></b></p><p data-dcnode-id="3318"><font data-dcnode-id="3319" face="NewCenturySchlbk"><span data-dcnode-id="3320" instrument_node="">Under the RPS statute, RECs can be transferred by their owner to any entity.  At this time, it is too early to see if any non-generator or non-utility players will enter the New Mexico market, however, because of the relatively few number of players that are obligated under the program and the absence of retail competition, there may be less of a role for non-utility intermediaries to play. </span></font></p><p data-dcnode-id="3312"><b data-dcnode-id="3313"><i data-dcnode-id="3314"><font data-dcnode-id="3315" face="Verdana"><a data-dcnode-id="3317" name="P818_181641"></a><span data-dcnode-id="3316" instrument_node="">Contract Lengths</span></font></i></b></p><p data-dcnode-id="3309"><font data-dcnode-id="3310" face="NewCenturySchlbk"><span data-dcnode-id="3311" instrument_node="">The renewable energy rule adopted by the PRC that formed the basis for the RPS legislation required the utilities to enter into contracts of at least ten years in length for renewable generators, a stipulation that was subsequently removed with the passage of the RPS statute.  The need for the minimum ten-year requirement appears to be partially belied by the long time frames characterizing the wind contracts signed by both PNM and SPS far exceeding the renewable energy rule's ten-year minimum.  In the case of the former, PNM initiated a 25-year contract in mid-2003 with Florida Power and Light (FPL) for the total output and RECs generated by the New Mexico Wind Energy Center, a 200 MW wind farm 170 miles southeast of Albuquerque. This contract is anticipated to meet virtually all of PNM's RPS obligations through 2007 and a sizable share thereafter.  Similarly, SPS has entered into 20-year contracts with two wind farms that are more than sufficient to meet the entirety of its RPS obligations through 2018. For 2006 and 2007, EPE is fulfilling its compliance targets through the purchase of unbundled RECs from PNM under a six-year contract.  According to testimony provided by EPE in support of its 2005 Annual Procurement Plan, unbundled REC purchases from PNM are the only option available for it to meet its 2006 and 2007 obligations, given the lack of availability of viable alternatives.  The share of EPE's obligations that will be met through unbundled REC purchases from PNM declines dramatically in the post 2007-timeframe, with the difference to be made up through RECs and/or energy purchased pursuant to EPE's 2006 Diversity RFP for Renewable Energy Supply.</span></font></p><p data-dcnode-id="3303"><b data-dcnode-id="3304"><i data-dcnode-id="3305"><font data-dcnode-id="3306" face="Verdana"><a data-dcnode-id="3308" name="P821_183341"></a><span data-dcnode-id="3307" instrument_node="">Tracking System</span></font></i></b></p><p data-dcnode-id="3294"><font data-dcnode-id="3301" face="NewCenturySchlbk"><span data-dcnode-id="3302" instrument_node="">Currently there is no centralized REC tracking system operating in New Mexico.  Instead, each utility self-reports by filing its RECs directly with the PRC.  Each REC submitted for RPS compliance purposes must contain the name and contact information of the renewable energy generating facility owner and/or operator; the name and contact information of the IOU purchasing the renewable energy certificate; the type of generator technology and fuel type; the generating facility's physical location, nameplate capacity in MW, location and ID number of revenue meter, and date of commencement of commercial generation; the IOU to which the generating facility is interconnected; the control area operator for the generating facility; and the quantity in kWh</span></font><sup data-dcnode-id="3297"><font data-dcnode-id="3298" face="Arial" size="2"><a data-dcnode-id="3299" href="#P824_184112" name="P824_184113"><span data-dcnode-id="3300" instrument_node="">75</span></a></font></sup><font data-dcnode-id="3295" face="NewCenturySchlbk"><span data-dcnode-id="3296" instrument_node=""> and the date of the REC transaction.  It is unclear, on the basis of the administrative code or conversations with PRC staff, how the number of RECs is actually arrived at.  There do not appear to be any clear protocols regarding how generation is measured for purposes of determining the number of RECs that are available.</span></font></p><p data-dcnode-id="3288"><b data-dcnode-id="3289"><i data-dcnode-id="3290"><font data-dcnode-id="3291" face="Verdana"><a data-dcnode-id="3293" name="P825_184587"></a><span data-dcnode-id="3292" instrument_node="">Key Observations and Lessons from the New Mexico Experience with RECs</span></font></i></b></p><p data-dcnode-id="3285"><font data-dcnode-id="3286" face="Arial" size="2"><span data-dcnode-id="3287" instrument_node="">· IOUs have taken advantage of the additional flexibility REC trading provides to comply with the RPS through both bundled and unbundled purchases, with SPS and PNM entering into long-term bundled contracts (20+ years) and EPE procuring unbundled RECs from PNM to meet its 2006 and 2007 RPS targets.</span></font></p><p data-dcnode-id="3282"><font data-dcnode-id="3283" face="Arial" size="2"><span data-dcnode-id="3284" instrument_node="">· As in Texas, renewable energy development in New Mexico has been dominated by wind to the near exclusion of all other renewable technologies, despite the efforts in the statute to encourage a more diversified pool of resources.  Though this outcome cannot attributed in a definitive way to the ability to trade RECs, it is at least consistent with the theory that RECs drive development of least-cost resources irrespective of where those resources are located relative to obligated entities.</span></font></p><p data-dcnode-id="3279"><font data-dcnode-id="3280" face="Arial" size="2"><span data-dcnode-id="3281" instrument_node="">· Although it hasn't proven to be effective thus far in actually securing more diversified renewable resource development, the approach used by New Mexico to encourage resource diversity by awarding a different number of RECs per unit of energy generation depending on the type of technology used is at least indicative of how a REC framework could be used to redress concerns that it will result in the exclusive development of only one kind of renewable technology.</span></font></p><p data-dcnode-id="3276"><font data-dcnode-id="3277" face="Arial" size="2"><span data-dcnode-id="3278" instrument_node="">· The small number of obligated entities in New Mexico RPS greatly reduces the complexity and volume of REC transactions that occur.  Rather than developing a centralized electronic system, the New Mexico approach relies on utility self-reporting.</span></font></p><p data-dcnode-id="3273"><font data-dcnode-id="3274" face="Arial" size="2"><span data-dcnode-id="3275" instrument_node="">· Long-term contracts with wind developers of twenty years or more have been signed by two of New Mexico's three obligated IOU's, far in excess of the ten-year contracting requirement under the PRC's original renewable energy rule and despite the removal of this requirement  from the RPS statute that was subsequently passed.  As in Texas, this seems to suggest that under certain circumstances, mandatory contract lengths of ten years or more are unnecessary. </span></font></p><p data-dcnode-id="3268"><b data-dcnode-id="3269"><font data-dcnode-id="3270" face="Verdana" size="+1"><a data-dcnode-id="3272" name="P838_186620"></a><span data-dcnode-id="3271" instrument_node="">CONCLUSION</span></font></b></p><p data-dcnode-id="3265"><font data-dcnode-id="3266" face="NewCenturySchlbk"><span data-dcnode-id="3267" instrument_node="">California faces a number of substantial challenges in achieving its RPS goals. Under the existing framework, obligated entities are required to take ownership of the energy produced by eligible renewable generators in order to have that energy count toward their RPS targets. Although California does not have a strict deliverability requirement due to changes in the rules that expanded the delivery options, as a practical matter, LSEs may be limited to those resources that are proximate or deliverable to their customers. The geographic distribution of renewable resources across the state, coupled with existing transmission constraints, strongly suggests that the costs and even ability to comply with the RPS program will vary dramatically from one LSE to the next, depending on the endowment of renewable resources to which they have access.  In addition, the RPS mandate requires that the same renewable energy obligations be imposed on ESPs, CCAs, small utilities, and multi-jurisdictional utilities.  In general, these smaller entities are likely to face additional challenges meeting the RPS goals under the existing compliance framework, given the relatively limited amount of time they have to achieve the 20% renewable energy target, their relatively low renewable baselines, and their relatively reduced ability to manage delivery of unconventional resources. Furthermore, the RPS, as applied to the large IOUs, requires them to enter into long-term contracts with generators for renewable purchases.  This stipulation was included as a way to facilitate developer financing under the assumption that absent long-term contracts, investments in renewable energy would be perceived as too risky.  While these contracts are relatively easy for the IOUs to accommodate, they are problematic to ESPs who face a great deal of uncertainty regarding their future load obligations.      </span></font></p><p data-dcnode-id="3262"><font data-dcnode-id="3263" face="NewCenturySchlbk"><span data-dcnode-id="3264" instrument_node="">Unbundled/tradable RECs represent a compliance approach that would help resolve some of these concerns.  For obligated entities, an unbundled/tradable regime would allow them to look beyond those resources that are physically or electrically proximate and purchase claim over the renewable attributes associated with renewable projects largely irrespective of where those projects are located or where their energy is delivered.  This should encourage greater reliance on least-cost resources statewide as opposed to each obligated entity relying on least-cost resources within their respective service territories.  In contrast to a bundled regime, in which the ability to capture the value of their energy's renewable character is largely contingent on the demand from nearby LSEs, the additional flexibility afforded under an unbundled regime would allow developers to capitalize on demand for renewable attributes emanating from LSEs located anywhere in the state.  LSE's that operate in regions with limited renewable resources, rather than trying to develop whatever resources happen to be proximate and/or deliverable to their customers, could choose instead to purchase RECs from facilities that generate energy that is delivered elsewhere. </span></font></p><p data-dcnode-id="3259"><font data-dcnode-id="3260" face="NewCenturySchlbk"><span data-dcnode-id="3261" instrument_node="">The ability to comply with the RPS through unbundled REC purchases may also help facilitate the compliance of smaller IOU's and non-IOU LSEs, by allowing them to sidestep the costs of managing delivery of renewable resources, which may be prohibitive for these smaller entities, and, to the extent that such purchases can be made on a short-term basis, allowing them to avoid the risk of stranded costs associated with long-term contracts.  ESPs generally rely on a procurement model characterized by short-term energy contracts reflecting the types of contracts into which their customers are willing to enter.  It follows that their willingness to enter into contracts for renewable energy and/or RECs would be similarly constrained. </span></font></p><p data-dcnode-id="3256"><font data-dcnode-id="3257" face="NewCenturySchlbk"><span data-dcnode-id="3258" instrument_node="">At least at the theoretical level, California has already taken a number of significant steps in the direction of unbundled/tradable RECs. In particular, the change in the delivery requirements, established in D.05-07-039, provides tacit approval to the unbundling of RECs within California, since, from a compliance perspective, the final disposition of the energy is no longer relevant, only that it is delivered into the CAISO grid.  An IOU is thus allowed to retain claim over the renewable attributes of energy, even if that energy has been remarketed to another entity.  Although the costs of remarketing and/or redelivery of renewable energy prevent extensive reliance on resources that deliver out-of-territory, the regulatory framework clearly allows this type of transaction to count toward an IOU's RPS goals.  Migrating to an overtly unbundled or tradable regime therefore appears to be a change of degree, not of kind, given the steps that have already been taken and the de facto unbundling of RECs that is already allowed.</span></font></p><p data-dcnode-id="3253"><font data-dcnode-id="3254" face="NewCenturySchlbk"><span data-dcnode-id="3255" instrument_node="">If California does move forward with an unbundled or tradable REC regime, it will need to develop regulatory guidelines governing the levels of geographic, temporal and participatory flexibility. In developing these rules, policy makers will need to remain sensitive to the implications of these changes on the market for renewable energy and the ability of the RPS to deliver on the goals the program was intended to produce.  In addition, reconciling an unbundled REC approach with some of the more idiosyncratic aspects of the existing regulatory structure will likely prove challenging.  Specifically the SEP funding structure in California, designed to cover the above-market costs of renewable energy is not readily compatible with a framework in which the energy is separated from the renewable attributes, particularly if either component can be sold on a short-term basis and to multiple parties. Regardless of how the state proceeds, it is critically important that policy makers develop a better understanding of the specific goals the state hopes to achieve via the RPS program and how these goals are impacted by different compliance regimes.  Absent this information, it is extremely difficult, if not impossible, to weigh the tradeoffs associated with one approach versus another.  </span></font></p><p data-dcnode-id="3248"><b data-dcnode-id="3249"><font data-dcnode-id="3250" face="Verdana" size="+1"><a data-dcnode-id="3252" name="P850_192844"></a><span data-dcnode-id="3251" instrument_node="">Recommendations and Observations</span></font></b></p><p data-dcnode-id="3245"><font data-dcnode-id="3246" face="NewCenturySchlbk"><span data-dcnode-id="3247" instrument_node="">Below are a list of recommendations and observations that the Commission and the Legislature should consider as they contemplate the use of RECs to support the state's renewable energy goals.  </span></font></p><p data-dcnode-id="3239"><b data-dcnode-id="3240"><i data-dcnode-id="3241"><font data-dcnode-id="3242" face="Verdana"><a data-dcnode-id="3244" name="P853_193069"></a><span data-dcnode-id="3243" instrument_node="">Geographic Flexibility</span></font></i></b></p><p data-dcnode-id="3236"><font data-dcnode-id="3237" face="Arial" size="2"><span data-dcnode-id="3238" instrument_node="">· The Commission has already adopted rules that allow renewable energy delivered anywhere in the CAISO control area to count toward a given IOU's RPS obligations, thus facilitating the implicit use of RECs within California.  An unbundled/tradable REC regime could leave these eligibility requirements unchanged or broaden eligibility to include generation delivered anywhere in California or anywhere in the WECC. This recommendation would appear to require legislative action.</span></font></p><p data-dcnode-id="3233"><font data-dcnode-id="3234" face="Arial" size="2"><span data-dcnode-id="3235" instrument_node=""> </span></font></p><p data-dcnode-id="3230"><font data-dcnode-id="3231" face="Arial" size="2"><span data-dcnode-id="3232" instrument_node="">· Broader geographic eligibility may change the portfolio of renewable resources that would otherwise get developed such that a greater proportion of the portfolio is composed of the least-cost technology in the eligible resource region. If this translates into the near exclusion of other renewable resource types, as appears to have happened in Texas and New Mexico, the RPS may not be as effective in delivering on some of the underlying goals compared to a scenario in which a more diverse set of resources is developed.  Different technologies are likely to be more or less effective in achieving certain goals than others.  Understanding the interplay between the goals of RPS and the type of technologies that are likely to get developed under different regimes warrants further analysis.</span></font></p><p data-dcnode-id="3227"><font data-dcnode-id="3228" face="Arial" size="2"><span data-dcnode-id="3229" instrument_node="">· It seems intuitively obvious that, with the exception of greenhouse gas emissions, broader geographic eligibility, encompassing resources that deliver energy out of state, will produce fewer benefits that accrue to California relative to those resources that produce energy that is delivered into California. </span></font></p><p data-dcnode-id="3224"><font data-dcnode-id="3225" face="Arial" size="2"><span data-dcnode-id="3226" instrument_node="">· It is unclear if the expanded delivery flexibility adopted in D.05-07-039 has proven effective in increasing the renewable resource options available to obligated entities, or whether it has enabled some renewable projects to proceed that would have otherwise gone unbuilt.  This is an area of additional inquiry the Commission should pursue.</span></font></p><p data-dcnode-id="3221"><font data-dcnode-id="3222" face="Arial" size="2"><span data-dcnode-id="3223" instrument_node="">· The Commission should make clear that the expanded delivery requirements allow for the use of shaped and firmed products provided the renewable energy involved in these transactions is initially delivered into the CAISO grid, consistent with the delivery rules authorized in D.05-07-039.</span></font></p><p data-dcnode-id="3218"><font data-dcnode-id="3219" face="Arial" size="2"><span data-dcnode-id="3220" instrument_node="">· Commerce Clause concerns may be a factor in determining whether California can legally exclude resources that are delivered outside of CAISO control area but into the WECC.  The experience in Texas, Massachusetts and New Mexico suggests that policy regarding geographic eligibility was developed in recognition of the constraints the Commerce Clause imposes.  </span></font></p><p data-dcnode-id="3212"><b data-dcnode-id="3213"><i data-dcnode-id="3214"><font data-dcnode-id="3215" face="Verdana"><a data-dcnode-id="3217" name="P866_195665"></a><span data-dcnode-id="3216" instrument_node="">Temporal Flexibility </span></font></i></b></p><p data-dcnode-id="3209"><font data-dcnode-id="3210" face="Arial" size="2"><span data-dcnode-id="3211" instrument_node="">· The existing rules governing temporal flexibility under the California RPS are readily transferable to a REC-based framework. However, should an unbundled or tradable REC regime be established, the current provisions allowing unlimited banking should be revisited and changed to a finite time period, consistent with the objective of encouraging market liquidity and ensuring that the RPS provides ongoing demand for renewable generation.</span></font></p><p data-dcnode-id="3206"><font data-dcnode-id="3207" face="Arial" size="2"><span data-dcnode-id="3208" instrument_node="">· Limits to the share of the obligation in any compliance period that can be met through the use of banked RECs could also be contemplated as a means to further promote market liquidity and continuous demand for renewable energy.  </span></font></p><p data-dcnode-id="3200"><b data-dcnode-id="3201"><i data-dcnode-id="3202"><font data-dcnode-id="3203" face="Verdana"><a data-dcnode-id="3205" name="P871_196355"></a><span data-dcnode-id="3204" instrument_node="">Participatory Flexibility</span></font></i></b></p><p data-dcnode-id="3197"><font data-dcnode-id="3198" face="Arial" size="2"><span data-dcnode-id="3199" instrument_node="">· Third parties can fulfill an important role in the market by reducing transaction costs, underwriting risk associated with renewable energy development, and creating additional demand for renewable energy.  The principal argument against third party ownership of RECs is that it would increase administrative complexity.  This argument may be valid in the absence of a REC tracking system, but, assuming WREGIS comes online as anticipated, the additional complexity and administrative overhead associated with third-party ownership is minimal.</span></font></p><p data-dcnode-id="3194"><font data-dcnode-id="3195" face="Arial" size="2"><span data-dcnode-id="3196" instrument_node="">· Regarding the ability to resell RECs multiple times, if one accepts that third-parties have a valuable role to play, it follows that resale of RECs subsequent to initial purchase must be allowed.  With the exception of non-obligated entities that wish to retire RECs to stimulate additional renewable demand, third parties will have no reason to enter the market if they are unable to resell.  </span></font></p><p data-dcnode-id="3191"><font data-dcnode-id="3192" face="Arial" size="2"><span data-dcnode-id="3193" instrument_node="">· Whether third parties are allowed to participate, the ability to resell RECs subsequent to initial purchase provides valuable benefits by reducing the risk of stranded costs from the over-procurement of RECs, an issue of great concern to ESPs in particular. Opportunities to resell ensure that the value of RECs purchased in excess of need do not drop to zero.  All else equal, this should reduce the reluctance of obligated entities to enter into long-term contracts with developers.</span></font></p><p data-dcnode-id="3188"><font data-dcnode-id="3189" face="Arial" size="2"><span data-dcnode-id="3190" instrument_node="">· The ability to resell RECs also provides a hedge against the risks of under-procurement and over-procurement.  LSEs that have under-procured can look to those that have over-procured to make up any shortfalls. This will facilitate the participation of ESPs and other smaller LSEs that are obligated under the RPS program and lessen the risk to IOUs as well. </span></font></p><p data-dcnode-id="3182"><b data-dcnode-id="3183"><i data-dcnode-id="3184"><font data-dcnode-id="3185" face="Verdana"><a data-dcnode-id="3187" name="P880_198163"></a><span data-dcnode-id="3186" instrument_node="">Contract Lengths</span></font></i></b></p><p data-dcnode-id="3179"><font data-dcnode-id="3180" face="Arial" size="2"><span data-dcnode-id="3181" instrument_node="">· If unbundled transactions are authorized, the existing long-term contracting requirements imposed on the larger IOUs should remain largely unchanged, with some consideration given to the idea of allowing them to meet some, relatively small, portion of their RPS obligations through short-term contracts.  Long-term contracts are critical in facilitating developer financing by providing certainty to the financial community of a stable revenue stream and return on their investments in renewable projects. </span></font></p><p data-dcnode-id="3174"><font data-dcnode-id="3175" face="Arial" size="2"><i data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">·</span></i><span data-dcnode-id="3176" instrument_node=""> In applying the RPS to ESPs, CCAs, small utilities, and multi-jurisdictional utilities, the long-term contracting requirement should not be applied.  As discussed, long-term contracts impose substantial risk on these entities in general and on ESPs in particular. These entities should be allowed to enter into these contracts if they choose, but should not be required to do so.</span></font></p><p data-dcnode-id="3169"><font data-dcnode-id="3170" face="Arial" size="2"><i data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">·</span></i><span data-dcnode-id="3171" instrument_node=""> Whether the demand from smaller LSEs will result in new renewable development will depend on the willingness of merchant generators to build on the basis of prospective REC and energy sales on a short-term basis to these entities, and/or the existence of a third-party that will enter into long-term contracts with prospective developers and resell to the smaller LSEs on a short-term basis.  If neither is present, RECs purchased by smaller LSEs will more than likely serve only to reallocate claim over the attributes from existing projects without stimulating new development.  </span></font></p><p data-dcnode-id="3163"><b data-dcnode-id="3164"><i data-dcnode-id="3165"><font data-dcnode-id="3166" face="Verdana"><a data-dcnode-id="3168" name="P887_199648"></a><span data-dcnode-id="3167" instrument_node="">Supplemental Energy Payments</span></font></i></b></p><p data-dcnode-id="3158"><font data-dcnode-id="3159" face="Arial" size="2"><i data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">·</span></i><span data-dcnode-id="3160" instrument_node=""> Unbundled or tradable REC purchases are not readily integrated into the current process by which the above-market costs of renewable energy are calculated and paid for through the issuance of supplemental energy payments.  Although not a necessary condition for migration to an unbundled or tradable REC regime, an alternative approach to offsetting the above-market costs of renewable energy should be found in the longer term.  A hybrid approach in which bundled transactions are eligible for SEP funds and unbundled transactions are not appears to create perverse incentives and undermine the degree to which the availability of RECs promotes efficient resource development. A more generic approach of technology and vintage-specific subsidies may be preferable because it can be applied more uniformly to generators, irrespective of whether they sell their energy and RECs on a bundled or unbundled basis.  This recommendation would appear to require a change in the RPS legislation.</span></font></p><p data-dcnode-id="3153"><font data-dcnode-id="3154" face="Arial" size="2"><i data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">·</span></i><span data-dcnode-id="3155" instrument_node=""> Insulating ratepayers from excessive costs associated with RPS compliance under an unbundled or tradable REC regime could be achieved through the creation of an alternative compliance payment that obligated entities could pay in lieu of purchasing additional RECs.  The level of the alternative compliance payment would effectively cap the maximum price of RECs to a predetermined level.  To ensure that obligated entities are using ACPs only as a compliance tool of last resort, a process would need to be established to verify that ACPs are the least-cost option available. Unlike compliance penalties, these monies should not flow into the general fund, but should, instead, be used to support additional renewable development.  This recommendation would appear to require a change in the RPS legislation.</span></font></p><p data-dcnode-id="3147"><b data-dcnode-id="3148"><i data-dcnode-id="3149"><font data-dcnode-id="3150" face="Verdana"><a data-dcnode-id="3152" name="P892_201473"></a><span data-dcnode-id="3151" instrument_node="">Qualifying Facilities and Distributed Generation</span></font></i></b></p><p data-dcnode-id="3144"><font data-dcnode-id="3145" face="Arial" size="2"><span data-dcnode-id="3146" instrument_node="">· QFs with expiring PURPA contracts may receive windfall gains at ratepayer expense if they are allowed to sell their RECs into the California market for RPS compliance purposes, to the extent that they do not require this additional incentive to continue operating.  To maximize the effectiveness of ratepayer monies in promoting new renewable investment, the state should identify ways in which the contribution of these facilities to the state's renewable energy goals can be recognized without requiring unnecessary ratepayer expenditures. At the same time, repowering and expansion project should still be encouraged.  </span></font></p><p data-dcnode-id="3141"><font data-dcnode-id="3142" face="Arial" size="2"><span data-dcnode-id="3143" instrument_node="">· Similar to the approach taken in Massachusetts, the state should consider limiting the eligibility of older facilities to produce RECs under the California RPS.  However, RPS eligible RECs should be issued to QFs for generation in excess of some level of historical output, thus ensuring that facility owners have an incentive to repower or otherwise expand their generating capacity, while preventing QFs from earning windfall gains at the expense of California ratepayers.</span></font></p><p data-dcnode-id="3138"><font data-dcnode-id="3139" face="Arial" size="2"><span data-dcnode-id="3140" instrument_node="">· The issue of how to allocate RECs produced by DG facilities between IOUs and DG facility owners in light of ratepayer subsidies should be mindful of the benefits these facilities confer to IOUs in terms of reduced load and reduced RPS obligations.</span></font></p><p data-dcnode-id="3132"><b data-dcnode-id="3133"><i data-dcnode-id="3134"><font data-dcnode-id="3135" face="Verdana"><a data-dcnode-id="3137" name="P899_202867"></a><span data-dcnode-id="3136" instrument_node="">Tracking System</span></font></i></b></p><p data-dcnode-id="3127"><font data-dcnode-id="3128" face="Arial" size="2"><i data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">·</span></i><span data-dcnode-id="3129" instrument_node=""> Unbundled RECs are technically feasible absent WREGIS, but would require the state to develop an interim method for tracking REC ownership via contract audits.  The current CEC interim tracking system does not support this capability.</span></font></p><p data-dcnode-id="3124"><font data-dcnode-id="3125" face="Arial" size="2"><span data-dcnode-id="3126" instrument_node="">· Migration to an unbundled or tradable REC regime would be greatly facilitated by the availability of the WREGIS tracking system.  Although contract audits may be sufficient to support an unbundled regime, a fully tradable program will absolutely require an electronic tracking system.</span></font></p><p data-dcnode-id="3121"><font data-dcnode-id="3122" face="Arial" size="2"><span data-dcnode-id="3123" instrument_node="">· The manner in which an unbundled/tradable REC regime interacts with emission trading markets will need to carefully thought out. For example, in February 2006, the Commission announced its intent to implement a load-based carbon cap limiting the total carbon emissions produced by the IOUs.  Policy makers will need to determine if claim over the avoided carbon emissions associated with renewable energy are transferred with the REC, or if they remain bundled with the energy.  In either case, a determination will need to be made regarding the magnitude of these benefits.  This is an issue that should be considered in the context of the carbon cap proceeding.  </span></font></p><h1 data-dcnode-id="3116"><a data-dcnode-id="3120" name="P909_204068"></a><b data-dcnode-id="3117"><font data-dcnode-id="3118" face="Arial" size="2"><span data-dcnode-id="3119" instrument_node="">APPENDIX A: FIRMED AND SHAPED RENEWABLE ENERGY PRODUCTS</span></font></b></h1><p data-dcnode-id="3111"><font data-dcnode-id="3112" face="Arial" size="2"><b data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Firmed Power</span></b><span data-dcnode-id="3113" instrument_node="">: In the context of renewable power, "firming" refers to the process by which a backup resource is used to supplement the output of an intermittent resource to ensure that the total energy provided is sufficient to meet customer load. Critical to this concept is the capability of the supplementary resource to fluctuate in concert with the intermittent resource such that the sum of the two equals the total load at any given point in time. Figure A-1 illustrates the firming concept.  The squiggly line represents the output of a hypothetical wind facility or other intermittent resource over an arbitrary time period.  The horizontal line represents the amount of energy that is demanded.  The space between the wind output and the energy demanded is the amount that must be firmed by some supplementary resource.  When wind output declines, holding demand constant, output from the supplementary resource must increase. Similarly, if wind output increases, output from the supplementary resource must decrease, again holding demand constant.  In practice, things are a bit more complicated as load is likely to fluctuate as well, but the basic concept that the intermittent resource must be backed-up by a flexible supplementary resource remains unchanged.  According to PPM Energy, this supplementary resource can be energy from gas-fired generation, hydro, other intermittent resources, spot market purchases, or some combination of these.</span></font></p><p data-dcnode-id="3106"><b data-dcnode-id="3107"><font data-dcnode-id="3108" face="NewCenturySchlbk"><a data-dcnode-id="3110" name="P913_205580"></a><span data-dcnode-id="3109" instrument_node="">Figure A - 1: Firmed Power Schematic</span></font></b></p><p data-dcnode-id="3101"><font data-dcnode-id="3102" face="Arial" size="2"><img border="1" data-dcnode-id="3105" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.cpuc.ca.gov/publishedDocs/published/Graphics/55606-4.gif&amp;raw" width="576"><img data-dcnode-id="3104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.cpuc.ca.gov/publishedDocs/published/Report/%2520&amp;raw"><span data-dcnode-id="3103" instrument_node="">Note that contract terms could, theoretically, specify what supplementary resources can be used for firming purposes, or establish a prioritized list of what resources would be preferred.  </span></font></p><p data-dcnode-id="3096"><font data-dcnode-id="3097" face="Arial" size="2"><b data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Shaped Power</span></b><span data-dcnode-id="3098" instrument_node="">: Renewables are typically thought of as resources that must be used when their fuel is available, i.e., they are "must-take" resources that are "dispatched" on the basis of when the wind is blowing or when the sun is shining.  From the perspective of an LSE, this makes these resources less desirable because they cannot be brought online when the power is actually needed, and furthermore, fluctuations in output must be dealt with (through firming) on a real-time basis.  One way to remedy this, as described in the context of firmed power, is to pair such must-take resources with resources that are dispatchable, reducing output from the dispatchable resource when the must-take resource is operating.  For example, wind and hydro can be paired such that when the wind is blowing, hydro output is reduced commensurate with the wind resource's output, in effect storing that wind resource in the potential energy of the water that would have otherwise been converted into electricity.  This approach, in effect, converts a must-take resource into one that can be dispatched when needed. A similar pairing could occur between must-take renewables and dispatchable forms of conventional generation, like gas turbines. This displaced power is then delivered to the customer at some point in the future, thus giving the customer some lead time to secure additional power to supplement what was produced from the intermittent resource.  </span></font></p><p data-dcnode-id="3093"><font data-dcnode-id="3094" face="Arial" size="2"><span data-dcnode-id="3095" instrument_node="">Until recently, the Bonneville Power Administration (BPA) offered both firmed and shaped products.  Their firmed product, marketed as their Network Wind Integration Service, allowed customers with wind contracts covering some of their power needs to receive the balance of power (the difference between what the wind resource generated and load) from Bonneville.  The backup resource was principally hydro.  BPA also offered a shaped product marketed as their Storage and Shaping Service.   Under this offering, a wind resource would be stored in the form of avoided hydro generation, which would then be delivered a week later in flat/firm hourly peak and off-peak blocks corresponding to the time of day the power was originally generated.  The benefits to customers of this offering included providing time to secure additional resources well in advance to cover any shortfall in the amount of power generated by the wind project, and providing power in firm hourly blocks, thus reducing the granularity of firming that would otherwise be required.  </span></font></p><p data-dcnode-id="3090"><font data-dcnode-id="3091" face="Arial" size="2"><span data-dcnode-id="3092" instrument_node="">Bonneville recently stopped offering these products due to changes in the operating rules governing its hydro system.  Specifically, in November of 2005, changes were made that require specific flow rates on both the Snake and Columbia Rivers in an effort to improve conditions for salmon.  This requirement reduces the operational flexibility and capacity of the system, thus limiting the ability of the system to respond to fluctuations in wind generation, a capability fundamental to BPA's approach to firming and shaping intermittent renewable energy. </span></font></p><h1 data-dcnode-id="3085"><a data-dcnode-id="3089" name="P925_208862"></a><b data-dcnode-id="3086"><font data-dcnode-id="3087" face="Arial" size="2"><span data-dcnode-id="3088" instrument_node="">APPENDIX B: STATUTORY AUTHORITY AND ADMINISTRATIVE REC PROGRAM DESIGN </span></font></b></h1><p data-dcnode-id="3074"><font data-dcnode-id="3075" face="Arial" size="2"><span data-dcnode-id="3084" instrument_node="">A plurality of states with RPS programs incorporate REC trading as part of their compliance regime, with the prescriptiveness of existing statutory language addressing the implementation of REC trading varying dramatically from state to state.  Notably, the Maine, Massachusetts, and Texas statutory language is quite minimal and vague in discussing REC programs.  However, despite the lack of statutory direction administrative authorities in these states have developed substantial REC trading programs.  The Texas code, for instance, merely grants authorization for the commission to establish a REC trading program</span><sup data-dcnode-id="3081"><a data-dcnode-id="3082" href="#P928_209550" name="P928_209551"><span data-dcnode-id="3083" instrument_node="">76</span></a></sup><span data-dcnode-id="3080" instrument_node="">, but, as noted earlier in this paper, neglects to require specifics other than noting that RECs shall be purchased in lieu of capacity building.  Similarly, Massachusetts' statute merely alludes to the development of tradable credit markets, yet Massachusetts' regulatory commission has laid out a broad regulatory framework within its administrative utility code.</span><sup data-dcnode-id="3077"><a data-dcnode-id="3078" href="#P929_209951" name="P929_209952"><span data-dcnode-id="3079" instrument_node="">77</span></a></sup><span data-dcnode-id="3076" instrument_node=""> </span></font></p><p data-dcnode-id="3068"><font data-dcnode-id="3069" face="Arial" size="2"><span data-dcnode-id="3073" instrument_node="">However, the vast majority of states that allow REC trading appear to have language referencing RECs as a general compliance option in their statute.  This suggests that California would be something of an exception if it implemented REC trading in the absence of specific statutory language to do so. However, some state regulatory agencies have established REC trading prior to direct regulatory authorization, which has then subsequently been codified by their respective legislatures.</span><sup data-dcnode-id="3070"><a data-dcnode-id="3071" href="#P932_210470" name="P932_210471"><span data-dcnode-id="3072" instrument_node="">78</span></a></sup></font></p><p data-dcnode-id="3065"><font data-dcnode-id="3066" face="Arial" size="2"><span data-dcnode-id="3067" instrument_node="">Regarding more specific implementation details of REC trading, there appears to be less of a clear consensus in how states have proceeded.  In the tables that follow, we have attempted to catalog the statutory and administrative language governing REC trading in those jurisdictions with RPS programs.  A brief description of the trends that were observed in pulling this information together is provided below.    </span></font></p><p data-dcnode-id="3060"><b data-dcnode-id="3061"><font data-dcnode-id="3062" face="Verdana" size="+1"><a data-dcnode-id="3064" name="P936_211055"></a><span data-dcnode-id="3063" instrument_node="">Geographic Flexibility </span></font></b></p><p data-dcnode-id="3050"><font data-dcnode-id="3051" face="Arial" size="2"><span data-dcnode-id="3059" instrument_node="">Guidelines and limitations on out-of-state or regional credit trading are specifically mentioned in several state statutes.  Statutorily speaking, the two primary factors that appear to control geographic flexibility are the declared goals of the state legislature for implementing an RPS and REC trading program, and the development or plan for a regional trading system.  Depending on the weight that state legislative bodies give factors such as in-state economic development, regional and global environmental benefits, and least-cost-benefit to energy providers factors into the analysis of state statutory construction.  For instance, Montana legislative material specifically states that its renewable program is meant to help rural economic development and subsequently the legislature requires a significant amount of energy to be procured through rural renewable power projects.</span><sup data-dcnode-id="3056"><a data-dcnode-id="3057" href="#P939_211966" name="P939_211967"><span data-dcnode-id="3058" instrument_node="">79</span></a></sup><span data-dcnode-id="3055" instrument_node="">  Texas similarly stipulates in its administrative language that the output of a renewable facility must be readily capable of being physically metered and verified in Texas by the program administrator.  The reasoning put forth is that energy from a renewable facility that is delivered into a transmission system where it is commingled with electricity from non-renewable resource can not be verified as delivered to Texas customers.</span><sup data-dcnode-id="3052"><a data-dcnode-id="3053" href="#P940_212430" name="P940_212431"><span data-dcnode-id="3054" instrument_node="">80</span></a></sup></font></p><p data-dcnode-id="3047"><font data-dcnode-id="3048" face="Arial" size="2"><span data-dcnode-id="3049" instrument_node="">The availability of regional tracking programs also plays an important role.  Most states in the New England NEPOOL tracking system have neglected to put specific geographic language pertaining to flexibility within state statutes presumably because of the development and success of the NEPOOL regional trading system.  However, states with no current regional tracking system in place such as New Mexico presently limit the trading of out of state RECs, but allow flexibility within their legal framework should a regional trading system develop. </span></font></p><p data-dcnode-id="3043"><b data-dcnode-id="3044"><font data-dcnode-id="3045" face="Verdana" size="+1"><span data-dcnode-id="3046" instrument_node="">Temporal Flexibility </span></font></b></p><p data-dcnode-id="3036"><font data-dcnode-id="3037" face="Arial" size="2"><span data-dcnode-id="3042" instrument_node="">Banking and borrowing provisions appear in several states' statutory regimes.  Primarily this has occurred through the codification of specific REC retirement language limiting the amount of time a state may bank RECs.  This check on banking varies, but runs anywhere from one to four years, a feature likely the result of individual state dynamics.</span><sup data-dcnode-id="3039"><a data-dcnode-id="3040" href="#P947_213378" name="P947_213379"><span data-dcnode-id="3041" instrument_node="">81</span></a></sup><span data-dcnode-id="3038" instrument_node="">  Delaware, Maryland, and Pennsylvania all list express retirement language in their state statutes.  In other states like Maine, New Mexico, and Texas, however, regulatory authorities have taken to implementing similar administrative retirement language without direct on-point statutory authority.  This may signal an interpretive difference in how some state regulatory bodies are choosing to construe statutory authority to implement REC programs, with some believing they have the administrative authority to properly implement a regulatory REC framework without specific statutory direction.  </span></font></p><p data-dcnode-id="3033"><font data-dcnode-id="3034" face="Arial" size="2"><span data-dcnode-id="3035" instrument_node="">Two states, Wisconsin and Montana, directly address the issue of "borrowing" in state statutes allowing for a "true-up" period where utilities may purchase RECs to balance accounts from the previous year.  In Montana this extends for a three month period following the business year and in Wisconsin this extends for a full calendar year.</span></font></p><p data-dcnode-id="3028"><b data-dcnode-id="3029"><font data-dcnode-id="3030" face="Verdana" size="+1"><a data-dcnode-id="3032" name="P951_214405"></a><span data-dcnode-id="3031" instrument_node="">Participatory Flexibility</span></font></b></p><p data-dcnode-id="3025"><font data-dcnode-id="3026" face="Arial" size="2"><span data-dcnode-id="3027" instrument_node="">Most states have not chosen to codify language pertaining to market participation by varying actors.  Presumably this may be to let state administrative authorities determine the specifics of the participating actors.</span></font></p><p data-dcnode-id="3020"><b data-dcnode-id="3021"><font data-dcnode-id="3022" face="Verdana" size="+1"><a data-dcnode-id="3024" name="P954_214647"></a><span data-dcnode-id="3023" instrument_node="">Contract Lengths</span></font></b></p><p data-dcnode-id="3017"><font data-dcnode-id="3018" face="Arial" size="2"><span data-dcnode-id="3019" instrument_node="">While the subject of mandatory minimum contract lengths has received substantial discussion, it appears that only Montana has chosen to codify contract lengths in their statutory language.  The reason for this may be that contract lengths may be less of a mitigating factor to the development of significant REC tracking systems than it appears to be.  At present, Montana requires a 10 year minimum contract length.</span></font></p><p data-dcnode-id="3012"><b data-dcnode-id="3013"><font data-dcnode-id="3014" face="Verdana" size="+1"><a data-dcnode-id="3016" name="P958_215079"></a><span data-dcnode-id="3015" instrument_node="">Tracking System</span></font></b></p><p data-dcnode-id="3009"><font data-dcnode-id="3010" face="Arial" size="2"><span data-dcnode-id="3011" instrument_node="">A continuum exists regarding state regulatory language on developing REC tracking systems.  While many states dictate in statutes what attributes a REC certificate must incorporate, not all necessarily require by statute that a full electronic tracking system be established.  Geographic size and the participation of other neighboring regional states also likely contribute to the specific requirements of tracking systems.    </span></font></p><p data-dcnode-id="3006"><font data-dcnode-id="3007" face="Arial" size="2"><span data-dcnode-id="3008" instrument_node="">For example, states such as Maine, Massachusetts, and Connecticut, located within the New England ISO, already have the NEPOOL tracking system in place for energy created within the regional system.  Thus, their legislative and administrative language does not reference the need to develop a tracking system, but rather simply notes what the requirements for a REC are within each state.  In Texas, on the other hand, the Utilities Commission details the set up of a regulatory tracking system in its administrative language and calls for administration of the system by a third party.  </span></font></p><p data-dcnode-id="3001"><b data-dcnode-id="3002"><font data-dcnode-id="3003" face="NewCenturySchlbk"><a data-dcnode-id="3005" name="P966_216110"></a><span data-dcnode-id="3004" instrument_node="">Table B - 1: Statutory and Administrative Authorities Regarding the Use of RECs</span></font></b></p><p data-dcnode-id="2239"><span data-dcnode-id="3000" instrument_node="">
