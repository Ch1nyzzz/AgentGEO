</span><div data-dcnode-id="732" style="margin:-5px 0 5px 0; font-size:small; text-align:right;"><span data-dcnode-id="733" instrument_node="">Recorded in April 2017</span></div><span data-dcnode-id="731" instrument_node="">

</span><div class="rich-text" data-dcnode-id="500"><h2 data-dcnode-id="725"><a class="nolink" data-dcnode-id="726" id="what-is-an-iht-portfolio"><span data-dcnode-id="728" instrument_node="">What is an IHT Portfolio?</span><br data-dcnode-id="727"></a></h2><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">An IHT portfolio is a managed portfolio of unquoted or AIM-listed companies that qualify for BPR. AIM portfolios can be held in an ISA.</span></p><h4 data-dcnode-id="719"><a class="nolink" data-dcnode-id="722" id="read-more-on-aim-isas"></a><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/aim-iht-isas/"><span data-dcnode-id="721" instrument_node="">Read more on AIM ISAs »&nbsp;</span></a></h4><h4 data-dcnode-id="717"><a class="nolink" data-dcnode-id="718" id=""></a></h4><h4 data-dcnode-id="713"><a class="nolink" data-dcnode-id="716" id="see-iht-portfolio-offers"></a><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/"><span data-dcnode-id="715" instrument_node="">See IHT portfolio offers »</span></a></h4><p data-dcnode-id="712"></p><h4 data-dcnode-id="708"><a class="nolink" data-dcnode-id="711" id="read-more-on-the-risks"></a><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/risks-and-commitments/"><span data-dcnode-id="710" instrument_node="">Read more on the risks »&nbsp;</span></a></h4><p data-dcnode-id="707"></p><h2 data-dcnode-id="704"><a class="nolink" data-dcnode-id="705" id="what-are-the-main-benefits-of-investing-in-an-iht-portfolio"><span data-dcnode-id="706" instrument_node="">What are the main benefits of investing in an IHT portfolio?&nbsp;</span></a></h2><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">If you are happy to take on
significant investment risk, the benefits include:</span></p><p data-dcnode-id="701"></p><ul data-dcnode-id="675"><li data-dcnode-id="696"><b data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Pass on more of your wealth free of IHT</span></b><span data-dcnode-id="698" instrument_node=""> – shares in BPR-qualifying companies can benefit from 100% IHT relief.</span><br data-dcnode-id="697"></li><li data-dcnode-id="691"><b data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Speed</span></b><span data-dcnode-id="693" instrument_node=""> – IHT relief kicks in after just two years. This compares favourably to other forms of estate planning.&nbsp;</span><br data-dcnode-id="692"></li><li data-dcnode-id="686"><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Simplicity</span></b><span data-dcnode-id="688" instrument_node=""> – investing in an IHT portfolio requires a simple transaction, similar to investing in other tax-efficient products. There are no eligibility criteria for income, health or age. Investors are, however, required to answer some questions about their investment knowledge and experience.&nbsp;</span><br data-dcnode-id="687"></li><li data-dcnode-id="681"><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Control</span></b><span data-dcnode-id="683" instrument_node=""> – your money is not locked away. Should your circumstances change or should you need access, you can make withdrawals. The amount you withdraw will no longer be IHT free, but what remains invested should be.&nbsp;</span><br data-dcnode-id="682"></li><li data-dcnode-id="676"><b data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Professional management</span></b><span data-dcnode-id="678" instrument_node=""> – the portfolio is managed by a professional team, which researches and selects the investee companies and monitors them to ensure they remain BPR qualifying.&nbsp;</span><br data-dcnode-id="677"></li></ul><p data-dcnode-id="674"></p><h2 data-dcnode-id="671"><a class="nolink" data-dcnode-id="672" id="what-are-the-main-risks-of-investing-in-an-iht-portfolio"><span data-dcnode-id="673" instrument_node="">What are the main risks of investing in an IHT portfolio?&nbsp;</span></a></h2><p data-dcnode-id="670"></p><ul data-dcnode-id="650"><li data-dcnode-id="666"><b data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Your capital is at risk</span></b><span data-dcnode-id="667" instrument_node=""> – your investment can fall as well as rise in value so you could get back less than you invest. In addition, because BPR-qualifying companies tend to be smaller and subject to less stringent checks than those quoted on the main London Stock Exchange, the risks are greater.</span></li><li data-dcnode-id="661"><b data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">IHT relief is not guaranteed</span></b><span data-dcnode-id="663" instrument_node=""> – tax benefits depend&nbsp;on circumstances and tax rules can change. To benefit from IHT relief you must hold the investment for at least two years and on your death and the companies must maintain their qualifying status. The government may change the rules on BPR in future.</span><br data-dcnode-id="662"></li><li data-dcnode-id="656"><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Investments may be difficult to sell</span></b><span data-dcnode-id="658" instrument_node=""> – shares in unlisted and AIM-listed companies are more illiquid than those quoted on the main London Stock Exchange, so they may be more difficult to sell.&nbsp;</span><br data-dcnode-id="657"></li><li data-dcnode-id="651"><b data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Not for everyone</span></b><span data-dcnode-id="653" instrument_node=""> – IHT portfolios are only for experienced investors, who fully understand and are happy with the benefits and risks. You should only invest if you can withstand loss of capital.&nbsp;</span><br data-dcnode-id="652"></li></ul><p data-dcnode-id="649"></p><h2 data-dcnode-id="646"><a class="nolink" data-dcnode-id="647" id="what-kind-of-companies-do-portfolios-invest-in"><span data-dcnode-id="648" instrument_node="">What kind of companies do portfolios invest in?</span></a></h2><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">This will be different depending on whether it’s an unquoted or AIM portfolio.&nbsp;</span></p><p data-dcnode-id="639"><b data-dcnode-id="641"><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/aim-iht-isas/"><span data-dcnode-id="643" instrument_node="">AIM portfolios</span></a></b><span data-dcnode-id="640" instrument_node="">, as the name suggests, invest in AIM companies that qualify for BPR.&nbsp;AIM is a diverse index, comprising nearly 800 companies worth from around £450,000 to over £3.3 billion (March 2022).&nbsp;AIM IHT portfolio managers tend to focus on established, larger, mature businesses. They should be more resilient and deliver growth but can be volatile.&nbsp;</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">When you invest in an AIM portfolio you acquire shares in the underlying companies.</span></p><p data-dcnode-id="632"><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Unquoted portfolios</span></b><span data-dcnode-id="634" instrument_node=""> are different. When you invest, you typically invest in one company (or a couple of companies) run by the portfolio manager. Each company will typically concentrate and make investments in a particular sector.&nbsp;</span><br data-dcnode-id="633"></p><p data-dcnode-id="629"><span data-dcnode-id="631" instrument_node="">Popular sectors for unquoted portfolios are:&nbsp;</span><br data-dcnode-id="630"></p><p data-dcnode-id="628"></p><ul data-dcnode-id="612"><li data-dcnode-id="623"><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Property</span></b><span data-dcnode-id="625" instrument_node="">: this includes businesses that trade from freehold or long-leasehold premises. Examples are care homes, hotels, pubs and data centres.</span><br data-dcnode-id="624"></li><li data-dcnode-id="618"><b data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Renewables</span></b><span data-dcnode-id="620" instrument_node="">: this includes solar or wind farms and anaerobic digestion projects. These businesses tend to have relatively low running costs, together with largely predictable revenue streams from Government-backed subsidies and sale of renewable energy.</span><br data-dcnode-id="619"></li><li data-dcnode-id="613"><b data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Lending</span></b><span data-dcnode-id="615" instrument_node="">: the company may lend money to,&nbsp;rather than investing in,&nbsp;small businesses. Loans tend to be secured against the borrower’s assets or offer some other form of security.&nbsp;</span><br data-dcnode-id="614"></li></ul><p data-dcnode-id="611"></p><p data-dcnode-id="608"><span data-dcnode-id="610" instrument_node="">Irrespective of the sector, these investments tend to be defensive in nature so should produce steady earnings, although this is not guaranteed.&nbsp;</span><br data-dcnode-id="609"></p><h2 data-dcnode-id="605"><a class="nolink" data-dcnode-id="606" id="how-much-can-i-invest"><span data-dcnode-id="607" instrument_node="">How much can I invest?</span></a></h2><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">There is no maximum. The minimum investment will vary depending on the provider, but it is typically in the region of £50,000.&nbsp;&nbsp;</span></p><h2 data-dcnode-id="600"><a class="nolink" data-dcnode-id="601" id="could-i-take-an-income"><span data-dcnode-id="602" instrument_node="">Could I take an income?</span></a></h2><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Unlike most other forms of IHT planning, when you invest in IHT portfolios you can take money out – even liquidate the whole portfolio.&nbsp;</span></p><p data-dcnode-id="595"><span data-dcnode-id="597" instrument_node="">Most providers will facilitate withdrawals. It could be a one-off or regular withdrawals.&nbsp;</span><br data-dcnode-id="596"></p><p data-dcnode-id="592"><span data-dcnode-id="594" instrument_node="">Withdrawals are not normally classed as income, but as a capital gain: you sell some of your shares and withdraw the proceeds. This could save tax: withdrawals will usually be subject to capital gains (up to 28%) rather than income tax (up to 45%).&nbsp;</span><br data-dcnode-id="593"></p><p data-dcnode-id="589"><span data-dcnode-id="591" instrument_node="">It’s important to note though any withdrawals will reduce the amount you can expect to become IHT free. Moreover, the amount you withdraw will be part of your taxable estate again, unless you spend it.&nbsp;</span><br data-dcnode-id="590"></p><p data-dcnode-id="586"><span data-dcnode-id="588" instrument_node="">Please remember tax benefits depend on circumstances and tax rules can change.&nbsp;</span><br data-dcnode-id="587"></p><h2 data-dcnode-id="583"><a class="nolink" data-dcnode-id="584" id="how-do-i-claim-the-tax-relief"><span data-dcnode-id="585" instrument_node="">How do I claim the tax relief?</span></a></h2><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The executors of the will or administrators of the estate can claim Business Property Relief when they value the estate.</span></p><p data-dcnode-id="572"><span data-dcnode-id="580" instrument_node="">They may have to submit </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/inheritance-tax-unlisted-stocks-and-shares-and-control-holdings-iht412"><span data-dcnode-id="579" instrument_node="">schedule IHT412</span></a><span data-dcnode-id="577" instrument_node=""> (Unlisted stocks and shares and control holdings) in addition to </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/inheritance-tax-inheritance-tax-account-iht400"><span data-dcnode-id="576" instrument_node="">form IHT400</span></a><span data-dcnode-id="574" instrument_node=""> (Inheritance Tax account) and alongside any other forms the estate’s circumstances will require as part of the probate process.&nbsp;</span><br data-dcnode-id="573"></p><p data-dcnode-id="569"><span data-dcnode-id="571" instrument_node="">The IHT portfolio manager will typically send details of the investment along with an information pack to help with this.&nbsp;</span><br data-dcnode-id="570"></p><h2 data-dcnode-id="566"><a class="nolink" data-dcnode-id="567" id="what-happens-to-my-iht-portfolio-when-i-die"><span data-dcnode-id="568" instrument_node="">What happens to my IHT portfolio when I die?</span></a></h2><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">There are three main options for the executors of the will or administrators of the estate:</span></p><p data-dcnode-id="563"></p><ol data-dcnode-id="553"><li data-dcnode-id="560"><span data-dcnode-id="562" instrument_node="">The portfolio could be liquidated and any proceeds could be passed on to your beneficiaries.&nbsp;</span><br data-dcnode-id="561"></li><li data-dcnode-id="557"><span data-dcnode-id="559" instrument_node="">The portfolio could remain invested for the beneficiaries (and in the case of a spouse or civil partner, it does not reset the two-year clock for BPR)&nbsp;</span><br data-dcnode-id="558"></li><li data-dcnode-id="554"><span data-dcnode-id="556" instrument_node="">The portfolio could be liquidated and the proceeds used to pay any inheritance tax due on other assets, such as your home, directly to HMRC.</span><br data-dcnode-id="555"></li></ol><p data-dcnode-id="552"></p><p data-dcnode-id="549"><span data-dcnode-id="551" instrument_node="">If you died within two years of the investment and the portfolio was liquidated, the proceeds could be subject to IHT.&nbsp;</span><br data-dcnode-id="550"></p><p data-dcnode-id="540"><span data-dcnode-id="548" instrument_node="">Some providers, e.g. </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/downing-estate-planning/"><span data-dcnode-id="547" instrument_node="">Downing</span></a><span data-dcnode-id="545" instrument_node=""> and </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/foresight-accelerated-iht/"><span data-dcnode-id="544" instrument_node="">Foresight</span></a><span data-dcnode-id="542" instrument_node="">, offer insurance against this. The insurance could effectively make the investment IHT free from day one. However, charges would be higher.&nbsp;</span><br data-dcnode-id="541"></p><h2 data-dcnode-id="537"><a class="nolink" data-dcnode-id="538" id="how-do-i-invest"><span data-dcnode-id="539" instrument_node="">How do I invest?</span></a></h2><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">If you’re an experienced investor comfortable with the risks, browse the </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/"><span data-dcnode-id="535" instrument_node="">list of offers currently available</span></a><span data-dcnode-id="533" instrument_node="">. The two-year clock starts ticking once funds have been invested.&nbsp;</span></p><h4 data-dcnode-id="528"><a class="nolink" data-dcnode-id="531" id="compare-iht-portfolios"></a><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/"><span data-dcnode-id="530" instrument_node="">Compare IHT portfolios »</span></a></h4><h2 data-dcnode-id="525"><a class="nolink" data-dcnode-id="526" id="what-returns-could-iht-portfolios-offer"><span data-dcnode-id="527" instrument_node="">What returns could IHT portfolios offer?</span></a></h2><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Most IHT portfolios target returns that aim to beat inflation – typically around 3% a year. Please note, returns are not guaranteed and capital is at risk.&nbsp;&nbsp;</span></p><h2 data-dcnode-id="520"><a class="nolink" data-dcnode-id="521" id="what-are-the-charges"><span data-dcnode-id="522" instrument_node="">What are the charges?</span></a></h2><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">An </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/inheritance-tax-portfolios/"><span data-dcnode-id="518" instrument_node="">inheritance tax portfolio</span></a><span data-dcnode-id="516" instrument_node=""> will have an initial charge (they vary widely from zero to 5.5%) and an annual management fee (typically in the region of 2% plus VAT).&nbsp;</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Some providers may also apply performance fees and other charges. Please read the provider documents for full details of the charges.&nbsp;</span></p><h2 data-dcnode-id="510"><a class="nolink" data-dcnode-id="511" id="who-might-consider-investing-in-iht-portfolios"><span data-dcnode-id="512" instrument_node="">Who might consider investing in IHT portfolios?</span></a></h2><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">IHT portfolios are for experienced investors whose estates are large enough to be affected by inheritance tax and who want to keep control of their assets.&nbsp;They must be comfortable with taking significant investment
risks.&nbsp;The type of portfolio chosen depends on many factors, including attitude to risk and whether income is needed. If in doubt, always seek professional advice.</span></p><h2 data-dcnode-id="505"><a class="nolink" data-dcnode-id="506" id="can-i-sell-my-inheritance-tax-portfolio"><span data-dcnode-id="507" instrument_node="">Can I sell my inheritance tax portfolio?</span></a></h2><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">One of the main advantages of investing in IHT portfolios over other IHT-planning strategies is the degree of control you can retain. For instance, if your circumstances were to change, it is possible to request the funds. Of course, in this case, you would however lose the IHT relief.&nbsp;</span></p><p data-dcnode-id="501"><br data-dcnode-id="502"></p></div><span data-dcnode-id="499" instrument_node="">
