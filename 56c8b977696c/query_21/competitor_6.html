</span><p class="+type-body-one" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
Bankrate follows a strict editorial policy, so you can trust that our content is honest and accurate. Our award-winning editors and reporters create honest and accurate content to help you make the right financial decisions. The content created by our editorial staff is objective, factual, and not influenced by our advertisers.

</span><p class="+type-body-one" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">
We’re transparent about how we are able to bring quality content, competitive rates, and useful tools to you by explaining how we make money.
</span></p><span data-dcnode-id="740" instrument_node="">
</span><p class="+type-body-one" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">
Bankrate.com is an independent, advertising-supported publisher and comparison service. We are compensated in exchange for placement of sponsored products and, services, or by you clicking on certain links posted on our site. Therefore, this compensation may impact how, where and in what order products appear within listing categories. Other factors, such as our own proprietary website rules and whether a product is offered in your area or at your self-selected credit score range can also impact how and where products appear on this site. While we strive to provide a wide range offers, Bankrate does not include information about every financial or credit product or service.
</span></p><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span></div><span data-dcnode-id="733" instrument_node="">
</span><span data-dcnode-id="730" instrument_node="">
</span><div class="article__content" data-dcnode-id="594" data-swiftype-index="true" data-swiftype-name="body" data-swiftype-type="text"><span data-dcnode-id="729" instrument_node="">
</span><div data-dcnode-id="596"><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Tax credits are incredibly valuable when it comes to saving money on taxes and are subtracted dollar for dollar directly from the amount of tax you owe the IRS. These credits are used to incentivize citizens to help others, whether it is by taking care of dependents or buying an electric car.</span></p><h2 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">How tax credits work</span></h2><p data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">Tax credits, as </span><a data-ctaposition="1" data-dcnode-id="722" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankrate.com/taxes/tax-credit-vs-tax-deduction/"><span data-dcnode-id="723" instrument_node="">opposed to tax deductions</span></a><span data-dcnode-id="721" instrument_node="">, are subtracted directly from the tax you owe, helping you cut down your overall tax bill. Tax deductions simply lower your taxable income.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Let’s say you make $50,000 and owe $10,000 in taxes. (This is simplified from real progressive tax rates.) If you take a tax deduction of $1,000, you’d owe taxes on $49,000 of income instead of $50,000, and your tax bill would be about $9,800. A $1,000 tax credit, however, comes right out of the bill, so instead of owing $10,000 in taxes, you’d owe $9,000.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Because tax credits are subtracted directly from your tax bill, there aren’t very many of them. Knowing what tax credits you qualify for can create substantial savings on your taxes.</span></p><h2 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Types of tax credits</span></h2><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">The IRS offers three types of tax credits.</span></p><div class="force-full-vw +pd-horizontal-sm +pd-horizontal-md--sm" data-dcnode-id="702" data-injected-el="self"><span data-dcnode-id="711" instrument_node="">
</span><div class="google-ad-manager +mg-vertical-md +pd-bottom +mg-vertical-md +pd-bottom" data-dcnode-id="704" data-injected-el="self"><span data-dcnode-id="710" instrument_node="">
</span><div data-dcnode-id="709" id="leaderboard-middle"></div><span data-dcnode-id="708" instrument_node="">
</span><div class="google-ad-manager__disclosure" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Advertisement</span></div><span data-dcnode-id="705" instrument_node="">
</span></div><span data-dcnode-id="703" instrument_node="">
</span></div><ul data-dcnode-id="685"><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="697"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Non-refundable tax credits:</span></strong><span data-dcnode-id="698" instrument_node=""> These credits allow you to use up to the amount that you owe. So if your tax bill is $1,000, but you qualify for a non-refundable $1,200 tax credit, you’d only get your taxes reduced to zero. (Your $1,200 tax credit would be capped at $1,000.)</span></li><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="692"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Refundable tax credits:</span></strong><span data-dcnode-id="693" instrument_node=""> On the other hand, refundable tax credits can put cash back in your pocket. If you get a refundable $1,200 credit on a $1,000 tax bill, you’ll receive a payment of $200 for the rest of the credit. In short, you’d get a refund from the IRS.</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="687"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Partially refundable tax credits:</span></strong><span data-dcnode-id="688" instrument_node=""> The combination of these two are credits where only part of the credit is refundable. So, if you had a $1,200 credit where only $1,100 was refundable, you’d only get the last $100 refunded if you had that same $1,000 bill.</span></li><span data-dcnode-id="686" instrument_node="">
</span></ul><h2 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Popular tax credits and how to qualify for them</span></h2><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Popular tax credits include expenditures for large renewable energy or energy efficiency purchases, costs related to raising a child or dependent care, and credits for saving or educational expenses.</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Most of these tax credits include a phaseout, where you get less of a credit and eventually no credit as your income rises. Be sure to check with the IRS or your tax preparer to see if you qualify based on your wages.</span></p><h3 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Energy efficiency and renewable energy upgrades</span></h3><p data-dcnode-id="673"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Plug-In Electric Drive Vehicle Credit:</span></strong><span data-dcnode-id="674" instrument_node=""> For eligible plug-in electric vehicles that you purchase new, the current tax credit is up to $7,500, or 10 percent of the purchase price. Some factors impact your eligibility to receive the maximum amount, including the capacity of your car’s battery. In addition, the tax credit begins to phase out once an electric car maker sells 200,000 vehicles. Tesla electric vehicles, for example, are no longer eligible for the federal tax credit.</span></p><p data-dcnode-id="666"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Residential Energy Efficient Property Credit:</span></strong><span data-dcnode-id="670" instrument_node=""> The government offers a percentage credit to incentivize home improvement purchases that are considered sustainable and energy efficient, such as solar energy systems. If you purchased and placed the qualifying improvement into service before the end of 2020, your credit is 26 percent, while improvements placed into service by the end of 2021 received only 22 percent. </span><a data-ctaposition="2" data-dcnode-id="668" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/energy-incentives-for-individuals-residential-property-updated-questions-and-answers" rel="noopener" target="_blank"><span data-dcnode-id="669" instrument_node="">Items that may qualify</span></a><span data-dcnode-id="667" instrument_node=""> include solar electric, solar water heaters, geothermal heat pumps, small wind turbines and fuel cells.</span></p><h3 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Tax credits related to dependents and children</span></h3><p data-dcnode-id="654"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Child Tax Credit:</span></strong><span data-dcnode-id="661" instrument_node=""> When you fall beneath particular income limits (under $400,000 if married filing jointly, under $200,000 for singles), each dependent qualifying child in your care creates a $3,600 per child under age 6 and $3,000 for each child between the ages of six and 17 — up from </span><a data-ctaposition="3" data-dcnode-id="659" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/child-tax-credit-by-the-numbers" rel="noopener" target="_blank"><span data-dcnode-id="660" instrument_node="">$2,000 tax credit previously,</span></a><span data-dcnode-id="658" instrument_node=""> with each non-child dependent creating a $500 nonrefundable credit. However, only $1,400 of each child’s credit is refundable if the taxpayer owes no tax. These income thresholds are based on your </span><a data-ctaposition="4" data-dcnode-id="656" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankrate.com/taxes/modified-adjusted-gross-income/"><span data-dcnode-id="657" instrument_node="">modified adjusted gross income (MAGI)</span></a><span data-dcnode-id="655" instrument_node="">.</span></p><p data-dcnode-id="650"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Adoption Credit:</span></strong><span data-dcnode-id="651" instrument_node=""> The expenses associated with adopting a child can be high, and the federal government offers credit toward qualifying expenses. These credits are $14,300 in 2020 and $14,440 in 2021. It’s non-refundable, but you can roll over what you don’t use to a future year if your circumstances and tax liability allow it. There are also circumstances where an adoption is classified as having special needs, where you may be able to claim the full credit without incurring that many expenses.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The 2020 phaseout starts with modified adjusted gross incomes over $214,520 in 2020 and $216,660 in 2021. The credit goes away completely for those with incomes above $254,520.</span></p><p data-dcnode-id="641"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Child and Dependent Care Credit:</span></strong><span data-dcnode-id="645" instrument_node=""> If you receive child or dependent care that falls under the </span><a data-ctaposition="5" data-dcnode-id="643" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc602" rel="noopener" target="_blank"><span data-dcnode-id="644" instrument_node="">rules set out by the IRS</span></a><span data-dcnode-id="642" instrument_node="">, a percentage of your first $4,000 in expenses could create a tax credit ($8,000 if you have two or more children/dependents in care). This is up from $3,000 for one qualifying person and $6,000 for two or more prior to the passing of the American Rescue Plan Act of 2021. The calculation tends to yield a credit that is 20 to 35 percent of your qualifying child care expenses. To use this credit, you can’t also use a flexible spending account to pay for dependent care. Speak with a tax advisor or a qualified financial planner to get advice on your specific situation.</span></p><div class="force-full-vw +pd-horizontal-sm +pd-horizontal-md--sm" data-dcnode-id="631" data-injected-el="self"><span data-dcnode-id="640" instrument_node="">
</span><div class="google-ad-manager +mg-vertical-md +pd-bottom +mg-vertical-md +pd-bottom" data-dcnode-id="633" data-injected-el="self"><span data-dcnode-id="639" instrument_node="">
</span><div data-dcnode-id="638" id="leaderboard-middle2"></div><span data-dcnode-id="637" instrument_node="">
</span><div class="google-ad-manager__disclosure" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Advertisement</span></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span></div><p data-dcnode-id="621"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Earned Income Tax Credit (EITC):</span></strong><span data-dcnode-id="628" instrument_node=""> This credit helps low- to moderate-income workers and families get a tax break. This credit isn’t exclusive to those with dependents and children. It’s a credit for lower-income earners and depends on the amount of people you’re supporting. If your </span><a data-ctaposition="6" data-dcnode-id="626" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankrate.com/taxes/modified-adjusted-gross-income/"><span data-dcnode-id="627" instrument_node="">adjusted gross income</span></a><span data-dcnode-id="625" instrument_node=""> is less than $56,000, and you have three or more children as a married couple, for instance, you’ll qualify for EITC. But with fewer dependents, you’ll need to have lower income, </span><a data-ctaposition="7" data-dcnode-id="623" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions/individuals/earned-income-tax-credit/do-i-qualify-for-earned-income-tax-credit-eitc" rel="noopener" target="_blank"><span data-dcnode-id="624" instrument_node="">according to the IRS</span></a><span data-dcnode-id="622" instrument_node="">. For no qualifying children, your credit would be $1,502 in 2021 — up from $538 in 2020. With three or more, you’d get the maximum credit of $6,728, up from $6,660 in 2020. This credit is completely refundable, so if you don’t owe any taxes at all, you’d still get the full amount of your tax credit as a refund.</span></p><h3 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Tax credits for saving and investing</span></h3><p data-dcnode-id="612"><a data-ctaposition="8" data-dcnode-id="616" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/retirement-plans/plan-participant-employee/retirement-savings-contributions-savers-credit" rel="noopener" target="_blank"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Saver’s Credit</span></strong></a><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">:</span></strong><span data-dcnode-id="613" instrument_node=""> If you have a modest income (under $66,000 when filing jointly as a married couple, $49,000 as a head of household or $33,000 if filing single), you can get a credit for saving in a retirement plan, like a company 401(k), 403(b) or personal IRA. The credit ranges from 10 to 50 percent per individual ($4,000 as a couple). The tax credit percentage is higher for lower-income filers.</span></p><h3 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Tax credits for educational expenses</span></h3><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">For both of the </span><a data-ctaposition="9" data-dcnode-id="607" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/help/ita/am-i-eligible-to-claim-an-education-credit" rel="noopener" target="_blank"><span data-dcnode-id="608" instrument_node="">educational expenses credits</span></a><span data-dcnode-id="606" instrument_node="">, there are income-based phaseouts, but most people should at least check to see if they qualify if they have educational expenses in a given year. No individual can take both tax credits in a year, but if two members of your household have educational expenses, you might be able to take both on a single tax return. (It can be the parents who take these credits if their dependent is creating the qualifying expenses.)</span></p><p data-dcnode-id="601"><a data-ctaposition="10" data-dcnode-id="603" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions/individuals/llc" rel="noopener" target="_blank"><span data-dcnode-id="604" instrument_node="">Lifetime Learning Credit</span></a><span data-dcnode-id="602" instrument_node="">: A credit of up to $2,000 per tax return for expenses related to an accredited school, but they don’t have to be degree-seeking. This is a non-refundable credit and is calculated as a 20 percent credit on the first $10,000 of qualified education expenses.</span></p><p data-dcnode-id="597"><a data-ctaposition="11" data-dcnode-id="599" data-linktype="contentInline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/credits-deductions/individuals/aotc" rel="noopener" target="_blank"><span data-dcnode-id="600" instrument_node="">American Opportunity Credit</span></a><span data-dcnode-id="598" instrument_node="">: If you have educational expenses and fit the income criteria, you may qualify for up to $2,500 in tax credits based on expenses like tuition, books, supplies and fees accrued while attending your institution. This is focused on the first four years of schooling. This credit can only be used for four years per student and is a partially refundable credit, up to a maximum $1,000 refund. The amount of the credit is 100 percent of the first $2,000 of qualified education expenses per student and then 25 percent of the next $2,000 of qualified education expenses you paid for that student. The refundability is calculated as a 40 percent refund of the remaining credit after the credit zeros out a taxpayer’s tax liability.</span></p></div><span data-dcnode-id="595" instrument_node="">
</span></div><span data-dcnode-id="593" instrument_node="">
</span></div><span data-dcnode-id="591" instrument_node="">
</span></main><span data-dcnode-id="589" instrument_node="">
