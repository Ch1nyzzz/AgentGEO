</span></div><h3 class="vc_custom_heading" data-dcnode-id="1713" style="font-size: 24px;color: #002eea;text-align: left"><span data-dcnode-id="1714" instrument_node="">What is the Domestic Renewable Heat Incentive?</span></h3><span data-dcnode-id="1712" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1691"><span data-dcnode-id="1711" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1693"><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Domestic Renewable Heat Incentive scheme is a UK Government initiative offering financial incentives to encourage home owners to use renewable energy systems instead of fossil fuel.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">If you participate in the Domestic Renewable Heat Incentive scheme and install a renewable heating system such as an air source heat pump or biomass boiler, the Domestic Renewable Heat Incentive tariff payments will be paid to you quarterly for 7 years.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Most Renewable Heat Incentive payments are based on the heat required to heat your home and provide hot water. This information can be found on your Energy Performance Certificate (EPC).</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1700" instrument_node="">The Domestic Renewable Heat Incentive is available in England, </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/renewable-heat-incentive-scotland/"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Scotland</span></strong></a><span data-dcnode-id="1696" instrument_node=""> and Wales.</span></p><span data-dcnode-id="1694" instrument_node="">
</span></div><span data-dcnode-id="1692" instrument_node="">
</span></div><span data-dcnode-id="1690" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_green" data-dcnode-id="1684"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="1688"><span class="vc_sep_line" data-dcnode-id="1689"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="1686"><span class="vc_sep_line" data-dcnode-id="1687"></span></span><span data-dcnode-id="1685" instrument_node="">
</span></div><h4 class="vc_custom_heading" data-dcnode-id="1682" style="font-size: 24px;color: #002eea;text-align: left"><span data-dcnode-id="1683" instrument_node="">Why was the Domestic Renewable Heat Incentive introduced?</span></h4><span data-dcnode-id="1681" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1654"><span data-dcnode-id="1680" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1656"><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The basis of the Domestic Renewable Heat Incentive scheme is that the UK Government has set out its intention of achieving a target of 12% of heating being sourced from renewables such as biomass energy by 2020.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">This is part of its overall plan to reduce carbon emissions from homes and businesses and to minimise the effects of climate change.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node="">The Domestic Renewable Heat Incentive scheme is considered so important by the Government that the Department of Energy and Climate Change described it as </span><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">‘the first step in transforming the way we heat our homes’</span></strong><span data-dcnode-id="1669" instrument_node="">.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1666" instrument_node="">In May 2019 the Committee on Climate Change released a report entitled </span><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">‘Net Zero The UK’s contribution to stopping global warming’. </span></strong><span data-dcnode-id="1663" instrument_node="">This set a target of net zero carbon emissions from the UK by 2050. You can download a full copy of the report </span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theccc.org.uk/wp-content/uploads/2019/05/Net-Zero-The-UKs-contribution-to-stopping-global-warming.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">HERE</span></strong></a><span data-dcnode-id="1659" instrument_node="">.</span></p><span data-dcnode-id="1657" instrument_node="">
</span></div><span data-dcnode-id="1655" instrument_node="">
</span></div><span data-dcnode-id="1653" instrument_node="">
</span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-4" data-dcnode-id="1279"><div class="vc_column-inner" data-dcnode-id="1280"><div class="wpb_wrapper" data-dcnode-id="1281"><span data-dcnode-id="1649" instrument_node="">

</span><li data-dcnode-id="1218"><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/air-source-heat-pumps/"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Air Source Heat Pumps</span></strong></a><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node=""> – </span></strong><span data-dcnode-id="1219" instrument_node="">Air to Water Heat Pumps Only</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1212"><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/biomass-boilers/"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Biomass Boilers</span></strong></a><span data-dcnode-id="1213" instrument_node=""> – Wood Fuelled Boilers</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1206"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/biomass-boilers/"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Biomass Pellet Stoves</span></strong></a><span data-dcnode-id="1207" instrument_node=""> – With Integrated Back Boilers Providing Space Heating</span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1200"><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/ground-source-heat-pumps/"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Ground Source Heat Pumps</span></strong></a><span data-dcnode-id="1201" instrument_node=""> – Ground to Water Heat Pumps Only</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1194"><strong data-dcnode-id="1196"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/solar-thermal-water-heating-systems/"><span data-dcnode-id="1198" instrument_node="">Solar Thermal Water Heating Systems</span></a></strong><span data-dcnode-id="1195" instrument_node=""> – Flat Plate or Evacuated Tube Which Provide Hot Water Only</span></li><span data-dcnode-id="1193" instrument_node="">
</span></ul><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Domestic Renewable Heat Incentive tariffs are paid to eligible applicants every three months for seven years. The Domestic Renewable Heat Incentive scheme is available to homeowners and those who self-build new homes in England, Wales and Scotland.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Whilst the Domestic Renewable Heat Incentive scheme is available to all households, those off mains gas will have more to gain by reducing both their fuel bills and carbon emissions. This is because of the relative inefficiencies (compared to mains gas) of LPG, heating oil, coal or electricity in providing cost-effective heat and hot water for your home.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">All of these renewable energy heating systems provide space heating or space heating and hot water, except solar thermal which must provide hot water only, to be eligible. &nbsp;Where a renewable energy technology system provides space heating, it must do so through a ‘wet’ central heating system such as radiators to be eligible for the Domestic Renewable Heat Incentive scheme.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Current estimates are that there are approximately four million households in the UK which don’t have access to mains gas and the Domestic Renewable Heat Incentive scheme is available to:</span></p><span data-dcnode-id="1179" instrument_node="">
</span><ul class="list_check-circle list_color_green" data-dcnode-id="1162"><span data-dcnode-id="1178" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">owner-occupiers</span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">private landlords</span></li><span data-dcnode-id="1172" instrument_node="">
</span><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">social housing</span></li><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">third-party owners of a domestic heating system and</span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">new self-build properties</span></li><span data-dcnode-id="1163" instrument_node="">
</span></ul><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1157" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_green" data-dcnode-id="1151"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="1155"><span class="vc_sep_line" data-dcnode-id="1156"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="1153"><span class="vc_sep_line" data-dcnode-id="1154"></span></span><span data-dcnode-id="1152" instrument_node="">
</span></div><h5 class="vc_custom_heading" data-dcnode-id="1149" style="font-size: 26px;color: #002eea;text-align: left"><span data-dcnode-id="1150" instrument_node="">Domestic Renewable Heat Incentive – Financial Incentives</span></h5><div class="vc_row wpb_row vc_inner vc_row-fluid" data-dcnode-id="1113"><div class="wpb_column vc_column_container vc_col-sm-6" data-dcnode-id="1127"><div class="vc_column-inner" data-dcnode-id="1128"><div class="wpb_wrapper" data-dcnode-id="1129"><span data-dcnode-id="1148" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1131"><span data-dcnode-id="1147" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1133"><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Domestic Renewable Heat Incentive financial incentives are paid quarterly for seven years, to the owner of the renewable heating system.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Tariffs are at a set rate of ‘pence per kilowatt hour’ of renewable heat energy generated.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">To be eligible for the Domestic Renewable Heat Incentive, solar thermal panels must ONLY supply hot water for your home, whereas all of the other eligible renewable heating systems can provide space heating, with or without hot water.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Domestic RHI scheme rules only apply to these renewable energy technologies if they use a ‘wet’ central heating system such as central heating radiators. Domestic RHI tariffs will not be paid for hot water intended for use in a swimming pool or hot tub.</span></p><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span></div><span data-dcnode-id="1130" instrument_node="">
</span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-6" data-dcnode-id="1114"><div class="vc_column-inner" data-dcnode-id="1115"><div class="wpb_wrapper" data-dcnode-id="1116"><span data-dcnode-id="1126" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_center" data-dcnode-id="1118"><span data-dcnode-id="1125" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_outline vc_box_border_green" data-dcnode-id="1122"><img alt="Domestic Renewable Heat Incentive - RHI Tariffs" class="vc_single_image-img attachment-full" data-dcnode-id="1123" height="273" sizes="(max-width: 618px) 100vw, 618px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/wp-content/uploads/RHI-Tariffs.jpg&amp;raw" srcset="https://domesticrenewableheatincentive.co.uk/wp-content/uploads/RHI-Tariffs.jpg 618w, https://domesticrenewableheatincentive.co.uk/wp-content/uploads/RHI-Tariffs-150x66.jpg 150w, https://domesticrenewableheatincentive.co.uk/wp-content/uploads/RHI-Tariffs-300x133.jpg 300w" width="618"></div><span data-dcnode-id="1121" instrument_node="">
</span></figure><span data-dcnode-id="1119" instrument_node="">
</span></div><span data-dcnode-id="1117" instrument_node="">
</span></div></div></div></div><p class="vc_custom_heading" data-dcnode-id="1111" style="font-size: 20px;color: #002eea;text-align: left"><span data-dcnode-id="1112" instrument_node="">Example of RHI Tariffs by Switching to an Air Source Heat Pump</span></p><span data-dcnode-id="1110" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1076"><span data-dcnode-id="1109" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1078"><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Based on a typical three bedroom house using 15,000 kilowatt hours of heat energy per year, installing an Air Source Heat Pump, the total annual Domestic Renewable Heat Incentive tariff will be:</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1102"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">kWh of renewable heat x tariff = Total annual Domestic Renewable Heat Incentive payment</span></strong></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1098"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">15,000 kWh x 10.71 pence per kWh = £1,606.50 per year</span></strong></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">This equates to tariff receipts of £11,245 over seven years however, this is adjusted by the Seasonal Performance Factor of the particular air source heat pump you install. Please see the relevant FAQ below.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">When assessing the financial impact of switching to renewable energy you should take into account:</span></p><span data-dcnode-id="1091" instrument_node="">
</span><ul data-dcnode-id="1080"><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">The installation cost of the renewable energy heating system</span></li><span data-dcnode-id="1087" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The RHI tariff receipts, which increase by inflation each year</span></li><span data-dcnode-id="1084" instrument_node="">
</span><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">The savings in switching from an expensive fuel such as oil, LPG or coal</span></li><span data-dcnode-id="1081" instrument_node="">
</span></ul><span data-dcnode-id="1079" instrument_node="">
</span></div><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1075" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_green" data-dcnode-id="1069"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="1073"><span class="vc_sep_line" data-dcnode-id="1074"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="1071"><span class="vc_sep_line" data-dcnode-id="1072"></span></span><span data-dcnode-id="1070" instrument_node="">
</span></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="768"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="769"><div class="vc_column-inner" data-dcnode-id="770"><div class="wpb_wrapper" data-dcnode-id="771"><h6 class="vc_custom_heading" data-dcnode-id="1063" style="font-size: 26px;color: #002eea;text-align: left"><span data-dcnode-id="1064" instrument_node="">Domestic Renewable Heat Incentive FAQs</span></h6><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="1042"><span data-dcnode-id="1062" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="1058"><h4 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Will Domestic Renewable Heat Incentive tariffs change?</span></h4><i class="vc_toggle_icon" data-dcnode-id="1059"></i></div><span data-dcnode-id="1057" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="1044"><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Renewable Heat Incentive tariffs will change annually in line with the Retail Price Index (RPI).</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Also, the Department of Energy and Climate Change (DECC) has announced that in order to control costs and encourage early take up, Domestic Renewable Heat Incentive tariffs may be reduced over time for new applicants to the scheme, this is referred to as degression. &nbsp;However, once an applicant has secured their tariff it will not be reduced due to cost control or degression; it will only be affected by changes in the RPI each year.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Any changes to tariff rates in the Renewable Heat Incentive scheme will be notified by the Department of Energy and Climate Change but we cannot guarantee that any published tariff rates on this web site represent the very latest situation.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">If you are considering installing a renewable energy heating system such as a air source heat pump you should check with Ofgem first for current Domestic Renewable Heat Incentive tariffs, before making a decision.</span></p><span data-dcnode-id="1045" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">
</span></div><span data-dcnode-id="1041" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="1026"><span data-dcnode-id="1040" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="1036"><h4 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Will I have to pay tax on the Domestic Renewable Heat Incentives tariffs I receive?</span></h4><i class="vc_toggle_icon" data-dcnode-id="1037"></i></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="1028"><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">When the Renewable Heat Incentive scheme was first launched, the then Chancellor of the Exchequer, Alistair Darling, announced that Domestic Renewable Heat Incentive tariffs would not be taxable.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">As far as we are aware, that remains the case as long as the renewable energy produced by your eligible heating system is for your own private use in the property within which it is installed.</span></p><span data-dcnode-id="1029" instrument_node="">
</span></div><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="995"><span data-dcnode-id="1024" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="1020"><h4 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Will I have to install a meter?</span></h4><i class="vc_toggle_icon" data-dcnode-id="1021"></i></div><span data-dcnode-id="1019" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="997"><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">You will need metering if:</span></p><span data-dcnode-id="1016" instrument_node="">
</span><ul data-dcnode-id="999"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">you have a back-up heating system, for example if you install a biomass boiler but you also have an oil fired boiler</span></li><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">you have a heat pump capable of using a non-renewable fuel such as fossil fuels</span></li><span data-dcnode-id="1009" instrument_node="">
</span><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">you have more than one renewable heating system, such as a number of biomass pellet stoves fitted with back boilers, in different rooms</span></li><span data-dcnode-id="1006" instrument_node="">
</span><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">your biomass boiler or stove does not heat all of the property</span></li><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">your home is occupied for less than half of the year. &nbsp;This includes second homes and tenanted properties which are expected to be empty for more than six months in a year.</span></li><span data-dcnode-id="1000" instrument_node="">
</span></ul><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="994" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="979"><span data-dcnode-id="993" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="989"><h4 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Where can I find an approved domestic renewable energy installer?</span></h4><i class="vc_toggle_icon" data-dcnode-id="990"></i></div><span data-dcnode-id="988" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="981"><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Simply complete the form on this page and we will introduce you to up to three renewable energy technology installation companies for you to request quotations from.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">We do not charge you anything for this service and you are under no obligation to place an order with any of the installers that we introduce you to.</span></p><span data-dcnode-id="982" instrument_node="">
</span></div><span data-dcnode-id="980" instrument_node="">
</span></div><span data-dcnode-id="978" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="960"><span data-dcnode-id="977" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="973"><h4 data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Will I need an Energy Performance Certificate (EPC) before I apply for the Domestic Renewable Heat Incentive?</span></h4><i class="vc_toggle_icon" data-dcnode-id="974"></i></div><span data-dcnode-id="972" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="962"><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Your proposed renewable heating system must be installed in a property capable of having a domestic Energy Performance Certificate (EPC). &nbsp;Without an EPC you will not be able to apply for the scheme.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Additionally, for biomass boilers , ground source heat pumps and air source heat pumps, the Domestic Renewable Heat Incentive tariff payable to householders is calculated with reference to the estimated heat demand for the property as shown in the EPC.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">In other words, without an EPC the tariff payments due cannot be calculated, so it is very much in the applicant’s interest to ensure that an EPC is prepared.</span></p><span data-dcnode-id="963" instrument_node="">
</span></div><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="923"><span data-dcnode-id="958" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="954"><h4 data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">If I join the Domestic Renewable Heat Incentive scheme, what are my responsibilities?</span></h4><i class="vc_toggle_icon" data-dcnode-id="955"></i></div><span data-dcnode-id="953" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="925"><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The Domestic Renewable Heat Incentive scheme rules include:</span></p><span data-dcnode-id="950" instrument_node="">
</span><ul class="list_check-circle list_color_green" data-dcnode-id="927"><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Keeping the renewable heating system and any metering system in good working order.</span></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Informing Ofgem if the heating system breaks down or isn’t working.</span></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Informing Ofgem if you sell your house whilst still receiving Domestic Renewable Heat Incentive scheme tariff payments.</span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Advising Ofgem of any major changes to your renewable heating system. This includes any changes which result in you having to install a meter when one wasn’t previously required.</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Informing Ofgem of any changes in your circumstances which may affect your eligibility to receive Domestic Renewable Heat Incentive scheme tariff payments.</span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Completing an annual declaration confirming that you have kept to the rules of the Domestic Renewable Heat Incentive scheme. Please note that domestic installations of renewable energy heating systems which are part of the Domestic RHI scheme will be randomly checked to ensure compliance with the scheme’s rules.</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Domestic users of biomass boilers will have to demonstrate that they have bought their biomass wood pellets from an authorised supplier who is on the&nbsp;Renewable Heat Incentive Biomass Suppliers List&nbsp;in order to ensure that the wood pellets being used satisfy the required sustainability criteria of the Renewable Heat Incentive scheme.</span></li><span data-dcnode-id="928" instrument_node="">
</span></ul><span data-dcnode-id="926" instrument_node="">
</span></div><span data-dcnode-id="924" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="892"><span data-dcnode-id="921" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="917"><h4 data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">What documentation do I need to apply for Domestic Renewable Heat Incentive scheme?</span></h4><i class="vc_toggle_icon" data-dcnode-id="918"></i></div><span data-dcnode-id="916" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="894"><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">To apply for Domestic Renewable Heat Incentive scheme you will need:</span></p><span data-dcnode-id="913" instrument_node="">
</span><ul class="list_check-circle list_color_green" data-dcnode-id="899"><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">An Energy Performance Certificate (EPC) for your home.</span></li><span data-dcnode-id="909" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">A report to confirm that your home meets current loft and cavity wall insulation specifications.</span></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">An MCS (Microgeneration Certification Scheme) certificate to confirm that the renewable energy heating system you are installing complies with the requirements of the MCS scheme and the Domestic Renewable Heat Incentive scheme.</span></li><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">An Emissions Certificate for the renewable energy heating system you intend to install.</span></li><span data-dcnode-id="900" instrument_node="">
</span></ul><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">All of these can be provided by or organised by your installer.</span></p><span data-dcnode-id="895" instrument_node="">
</span></div><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="891" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="879"><span data-dcnode-id="890" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="886"><h4 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Will I have to repay any previous grants I have received before I apply for the Domestic Renewable Heat Incentive?</span></h4><i class="vc_toggle_icon" data-dcnode-id="887"></i></div><span data-dcnode-id="885" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="881"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Any public grants previously received which have subsidised the cost of installing renewable heating systems such as biomass boilers, including the Renewable Heat Premium Payment (RHPP), may be deducted from the Domestic Renewable Heat Incentive tariff, to avoid a double subsidy.</span></p><span data-dcnode-id="882" instrument_node="">
</span></div><span data-dcnode-id="880" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="866"><span data-dcnode-id="877" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="873"><h4 data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Who administers the Domestic Renewable Energy Incentive scheme?</span></h4><i class="vc_toggle_icon" data-dcnode-id="874"></i></div><span data-dcnode-id="872" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="868"><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The Renewable Heat Incentive is administered by Ofgem.</span></p><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="853"><span data-dcnode-id="864" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="860"><h4 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">What happens if I sell my property before the seven year Domestic Renewable Heat Incentive tariff period ends?</span></h4><i class="vc_toggle_icon" data-dcnode-id="861"></i></div><span data-dcnode-id="859" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="855"><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">If you sell your property whilst you are still receiving tariffs under the Renewable Heat Incentive scheme, you must inform Ofgem so that future payments can be made to the new owner.</span></p><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span></div><span data-dcnode-id="852" instrument_node="">
</span><div class="vc_toggle vc_toggle_round vc_toggle_color_green vc_toggle_color_inverted vc_toggle_size_lg" data-dcnode-id="822"><span data-dcnode-id="851" instrument_node="">
</span><div class="vc_toggle_title" data-dcnode-id="847"><h4 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">How are the RHI tariffs for Heat Pumps adjusted for the Seasonal Performance Factor?</span></h4><i class="vc_toggle_icon" data-dcnode-id="848"></i></div><span data-dcnode-id="846" instrument_node="">
</span><div class="vc_toggle_content" data-dcnode-id="824"><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Electricity is required to run heat pumps and to avoid being rewarded for using this electricity, the RHI tariff payable is adjusted for the Seasonal Performance Factor (SPF) of the particular heat pump you have installed.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">The SPF is calculated the following way:</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><img alt="" data-dcnode-id="839" height="34" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUkAAAAiCAMAAADlENu3AAAAAXNSR0IArs4c6QAAAHhQTFRFAAAAAAAAAAA6AABmADo6ADqQAGaQAGa2OgAAOgA6OgBmOjoAOjqQOmZmOpC2OpDbZgAAZgA6ZgBmZpCQZrb/kDoAkDo6kDpmkGYAkJBmkLaQkNvbkNv/tmYAtpA6tv//25A629uQ2/+22////7Zm/9uQ//+2///b7eYLdAAAAAF0Uk5TAEDm2GYAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAAZdEVYdFNvZnR3YXJlAE1pY3Jvc29mdCBPZmZpY2V/7TVxAAAE2UlEQVRoQ+1ZcV8aMQwFnROcm7iBm5sMnAf3/b/h8pImTY+DlvPU8yf3h3hNmqSvadreG41Oz3AQ2EwfOBj9HU5kfURSLy6eWkemjVAodlSN5bnRHonpHJL9ItxurV8fHpg14aTWq/PVaFSdUeJsbx/MZb0wXEoQTUP9OEhuZ/O42vhljYSqfKIywMVPwK5ejMcXT/hLP0hVmqCYk/fUQL4g5tljeVAWT0G0maaqm+nvCXouuQfSINYKcSnvm+kfdv2I/uQiNHofbBrezZWYxmMBi3eNQq1ow1qGIV0sliUNdXkzqu/uqWl9ab0pQQFw8SNw1YtLGi6sSGmkGTpfGZITEmJ+SGHEaKRyvAbRpqG6mbD6UhDjyKAp2DuXJJRhoz+5cBhoQCqKrtIyhoCDd/uVSaKcYME4DIPdcxgkk2oIl9f/vq/qBc2DjoGUjlneApdGHpHUsTWFmyvJeCc3lSsB32AJ72Yd4ds8p6qKZNIfGNjUtpuOGWNeo6l0PuxN5hEgYSnwxNKoqkuCEaNzepSh5Y+EyhXBqi2v2zMrvTaGCXYnWgsNOSIJoqZqmCegz7kxfeBVhSdx6WCIcYQeYSxsCiF6V0HmA2pB1IGjM4Pk47CxzQDY+XI+Wt8gOo/kEbt3mPRkwnm+2nIypGNTLnOqmSpd/XuMrV58s/2wc04mptlrElApkpyTk/laoFx+vqOJvv4lI9dq3iEntWjx2qOJ5zOBzp+aZqX650rlriCrqKkqJnikHHLFe0YYvtRJKZ5nUkShD1va6Iq+ihJXYioJ2CFpViI4Vi20TkpcFBil3/b2i27ootehTvKCRSrTLih796dQbjBzNknYgrl2s1yUAzAiaqqGwLez8fgrr85ZrDzO5fhHsPaIpQsVuEBj9MGrmns7V8G5D9gXCrXSgmTcu/n0I4EtMc9R+bi9O8Ty8j+84Dl7DjyWMrs6B0Rdgi9B6bjzZJcoOvXh5aRnqH0WXg/JbCi6vyNf5R7IqwKHXd7z7GTaCY2unXAkRh3IJsIrIpm9VqvCdsab07UccqkA9Lw6uoL6/vrZGk9OG+9vHG8fcbintVxfsNRkwZ+eIgS4ToaPAfwtjutk4/ojoJ6eAwgI2PUC13oB8FQnixLwwKkiualA77S6j4OUdm0c2uOHy1NOHgdg1Madyq/qZyK5k9plcR30GoXPDK4sFip2fVI3+52WkTqHgm7BY7dpL2gvj2bv1M1+MNLBJG8l4xw4kv1TN1kkD5M69LUtkDVKrYTDv1Ax4eOQsS3yYZhPr1RwzpSvAQkj16/wUVloob+e6hk8dZND8jCpQ1/blOhosi4+J5XYIbCU/gGbUwl8cm/Av7GRBQnVM3jqJofk7v2SWtyOo/KU/XE6uPAzXkzkuH/h2Xr77/JoFA/7qR5lhWL4ZvytqJsckjlSJ0VS2Z8GkpFtMeJFaIMGkrFRkKS/RvVIlg6YuskhmeRkC6lTlJOOgkyJl0xOtlI9Q6VuckjmSJ0ESc+6tBM7SrxwvazmbgflOsmN+C/0dlQPWtF7sNRNDskcqRORbLIue4idQP9gd </span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">This is to say, a heat pump with an SPF of 3 will on average deliver 3.0kWh of heat for every 1kWh of electricity it uses.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The adjusted annual RHI tariff payable is calculated as follows:</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><img alt="Domestic Renewable Heat Incentive ASHP tariff calculation adjusted for SPF" class="alignnone wp-image-844" data-dcnode-id="830" height="59" sizes="(max-width: 347px) 100vw, 347px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticrenewableheatincentive.co.uk/wp-content/uploads/Domestic-Renewable-Heat-Incentive-ASHP-tariff-calculation-adjusted-for-SPF-300x51.jpg&amp;raw" srcset="https://domesticrenewableheatincentive.co.uk/wp-content/uploads/Domestic-Renewable-Heat-Incentive-ASHP-tariff-calculation-adjusted-for-SPF-300x51.jpg 300w, https://domesticrenewableheatincentive.co.uk/wp-content/uploads/Domestic-Renewable-Heat-Incentive-ASHP-tariff-calculation-adjusted-for-SPF-150x25.jpg 150w, https://domesticrenewableheatincentive.co.uk/wp-content/uploads/Domestic-Renewable-Heat-Incentive-ASHP-tariff-calculation-adjusted-for-SPF.jpg 368w" width="347"></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">If the annual heat demand from your EPC is 15,000 kWh as in the example above this equates to an annual tariff of £1,071.00 not £1,606.50 as shown above, before the adjustment for your air source heat pump’s SPF.</span></p><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="821" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_green" data-dcnode-id="815"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="819"><span class="vc_sep_line" data-dcnode-id="820"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="817"><span class="vc_sep_line" data-dcnode-id="818"></span></span><span data-dcnode-id="816" instrument_node="">
</span></div><h6 class="vc_custom_heading" data-dcnode-id="813" style="font-size: 30px;color: #002eea;line-height: 1.5;text-align: left"><span data-dcnode-id="814" instrument_node="">Changes to the Domestic Renewable Heat Incentive</span></h6><span data-dcnode-id="812" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="779"><span data-dcnode-id="811" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="781"><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">The main changes to the Domestic Renewable Heat Incentive since it was introduced are:</span></p><span data-dcnode-id="807" instrument_node="">
</span><ul data-dcnode-id="790"><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="802"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Metering</span></strong><span data-dcnode-id="803" instrument_node=""> – The introduction of mandatory metering for all new air source heat pumps and ground source heat pumps installed.&nbsp; Payments of Domestic Renewable Heat Incentive tariffs will still be based on deemed heat demand from the EPC for domestic properties. Metering will be used for second properties and situations where the renewable heating system is installed alongside another heating system.</span></li><span data-dcnode-id="801" instrument_node="">
</span><li data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Assignment of Rights</span></strong><span data-dcnode-id="798" instrument_node=""> – The introduction of an ‘assignment of rights’ option to provide householders and landlords access to finance to cover the upfront cost of a renewable heating system. Assignment of rights allows an installer or investor to help fund the purchase, installation and maintenance of a renewable heating system. In effect, the installer or investor pays for the renewable heating system and receives the Domestic Renewable Heat Incentive tariff payments. The benefit to the householder is that they receive a new renewable heating system and benefit from the associated reduction in heating costs and carbon emissions.</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="792"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Heat Demand Limits</span></strong><span data-dcnode-id="793" instrument_node=""> – Heat demand limits were introduced to cap the annual Domestic Renewable Heat Incentive tariff payments which an householder can receive. The heat demand limits are set at 20,000kWh for air source heat pumps, 25,000kWh for biomass boilers &amp; stoves and 30,000kWh for ground source heat pumps. There are no heat demand limits for solar thermal water heating systems. The result is that if the deemed heat demand from your EPC is over 20,000kWh and you install an air source heat pumps, the DRHI tariff payments will be based on a maximum of 20,000kWh per year.</span></li><span data-dcnode-id="791" instrument_node="">
</span></ul><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="788" instrument_node="">Other minor changes have been introduced and a ‘Factsheet – Important Changes to the Domestic Renewable Heat Incentive Scheme’ produced by OFGEM can be seen </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ofgem.gov.uk/system/files/docs/2018/07/factsheet_importantchanges_july_2018.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">HERE</span></strong></a><span data-dcnode-id="784" instrument_node="">.</span></p><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_green" data-dcnode-id="772"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="776"><span class="vc_sep_line" data-dcnode-id="777"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="774"><span class="vc_sep_line" data-dcnode-id="775"></span></span><span data-dcnode-id="773" instrument_node="">
</span></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="737"><div class="wpb_column vc_column_container vc_col-sm-6" data-dcnode-id="753"><div class="vc_column-inner" data-dcnode-id="754"><div class="wpb_wrapper" data-dcnode-id="755"><p class="vc_custom_heading" data-dcnode-id="766" style="font-size: 18px;color: #002eea;line-height: 1.3;text-align: left"><span data-dcnode-id="767" instrument_node="">Typical costs per unit of fuel energy for a Biomass wood pellet boiler compared to other domestic fuels:</span></p><span data-dcnode-id="765" instrument_node="">

</span><p data-dcnode-id="106"><strong data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">Affordable Warmth Scheme</span></strong></p><span data-dcnode-id="105" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="79"><span data-dcnode-id="104" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="81"><span data-dcnode-id="103" instrument_node="">
</span><p data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Another Government scheme to help with heating systems in domestic households is the Affordable Warmth Scheme. This provides grants to help to install central heating systems, replace broken heating systems and to install insulation in homes where one of the occupants receives a qualifying State Benefit, Tax Credits or other allowance.</span></p><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="94"><span data-dcnode-id="99" instrument_node="">More information about the Affordable Warmth Scheme can be found&nbsp;</span><a data-dcnode-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.affordablewarmthscheme.co.uk/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">HERE</span></strong></a><span data-dcnode-id="95" instrument_node="">.</span></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="83"><span data-dcnode-id="92" instrument_node="">You can apply for ‘First Time Central Heating’ to be installed </span><a data-dcnode-id="89" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.affordablewarmthscheme.co.uk/first-time-central-heating-grants/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">HERE</span></strong></a><span data-dcnode-id="88" instrument_node=""> or if you live in Liverpool, apply </span><a data-dcnode-id="85" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.affordablewarmthscheme.co.uk/liverpool-central-heating-grants/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">HERE</span></strong></a><span data-dcnode-id="84" instrument_node="">.</span></p><span data-dcnode-id="82" instrument_node="">
