</span><p class="entry-meta" data-dcnode-id="556"><span data-dcnode-id="565" instrument_node="">Published on </span><time class="entry-time" data-dcnode-id="563" datetime="2021-08-24T15:00:00-07:00" itemprop="datePublished"><span data-dcnode-id="564" instrument_node="">August 24, 2021</span></time><span class="author-info" data-dcnode-id="557"><span data-dcnode-id="562" instrument_node="">  - Written By: </span><span class="entry-author" data-dcnode-id="558" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quicksprout.com/author/lars/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="560" itemprop="name"><span data-dcnode-id="561" instrument_node="">Lars Lofgren</span></span></a></span></span></p></header><div class="entry-content" data-dcnode-id="232" itemprop="text"><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">So you want to start an LLC or already have one. But you feel daunted by the idea of doing your own taxes.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">Don’t worry, we understand. It is a common feeling amongst entrepreneurs to be overwhelmed at the thought of doing taxes on your own. Once you work for yourself and have your own companies, all the responsibility is on </span><em data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">you</span></em><span data-dcnode-id="547" instrument_node=""> to do things legally, or else you suffer the consequences.&nbsp;</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">But don’t let the fear of figuring out your LLC taxes stop you from moving forward with your business. Imagine being able to understand what you need to know about LLC taxes and fearlessly going all-in into your business. Sounds great, right?&nbsp;</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">We can help you get there. We’ve put together this beginner’s guide to understanding how LLC taxes work so that you can shake off your concerns, get down to the nitty-gritty, and learn how to do your taxes the right way so that your business has the opportunity to thrive.</span></p><span data-dcnode-id="539" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="535"><img alt="Quicksprout.com's complete beginner's guide to how LLC taxes work." class="wp-image-76144 entered error" data-dcnode-id="538" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png" data-lazy-srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png 1024w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-300x200.png 300w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-768x512.png 768w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide.png 1200w" data-ll-status="error" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png&amp;raw" srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png 1024w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-300x200.png 300w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-768x512.png 768w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide.png 1200w"><noscript data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">&lt;img src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png" alt="Quicksprout.com's complete beginner's guide to how LLC taxes work." class="wp-image-76144" srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-1024x683.png 1024w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-300x200.png 300w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide-768x512.png 768w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2022/02/How-LLC-Taxes-Work-Guide.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><span data-dcnode-id="534" instrument_node="">
</span><h2 data-dcnode-id="532" id="what-are-llc-taxes"><span data-dcnode-id="533" instrument_node="">What Are LLC Taxes?</span></h2><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">If you are looking at starting a small business, chances are good you will start with an LLC.&nbsp;</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">LLC stands for “limited liability corporation,” and this type of business is like a corporation at the state level, but is taxed more like a partnership or sole proprietorship at the federal level.&nbsp;</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">This means that an LLC doesn’t pay taxes on business income. Instead, the members of the LLC pay taxes on their share of the LLC’s profits–that is, the income left over after business expenses are deducted. All members of an LLC are also responsible for paying income tax on any money that is earned from the LLC, and they are also responsible for their own self-employment taxes.&nbsp;</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Different types of LLCs have different tax rules. We will share more on this down below along with the other information you learn to understand your LLC taxes.</span></p><span data-dcnode-id="519" instrument_node="">
</span><h2 data-dcnode-id="517" id="the-basics-of-llc-taxes"><span data-dcnode-id="518" instrument_node="">The Basics of LLC Taxes</span></h2><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Though LLC taxes may seem like a dark cloud over your head that is always looming, once you get through some of the basics, they won’t seem as scary.&nbsp;</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">In this section, we will cover the basics of LLC taxes, what you need to do for your specific type of LLC, what to do if you have employees, and what you do if you live in a state with sales tax.</span></p><span data-dcnode-id="510" instrument_node="">
</span><h3 data-dcnode-id="508" id="for-single-member-llcs"><span data-dcnode-id="509" instrument_node="">For Single-Member LLCs</span></h3><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Single-member LLCs are considered disregarded entities by the IRS. This means that the LLC does not need to file a separate tax return in order to report any income earned and expenses. Instead, you will report your income and expenses similar to a sole proprietor, via an addendum, to your personal Form 1040 tax return called Schedule C. </span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">To fill out this form, you need a statement of your LLC’s income as well as financial records and proof of receipt for the deductions you want to take for your business.&nbsp;</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">For most states, this process is the same at both the state and local levels. This means that someone with an LLC in California will report business income on both their personal federal and state tax returns. This income will be taxed at the tax rate that corresponds to the federal income tax rate as well as the state and local ones for the state in which you established your LLC.&nbsp;</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Note that in some states, you have to pay a separate annual LLC tax. For California, this tax amount is $800. You may also be required to pay a fee if your LLC earns more than a certain amount of money (for California it’s if you earn more than $250,000).</span></p><span data-dcnode-id="495" instrument_node="">
</span><h3 data-dcnode-id="493" id="for-multi-member-llcs"><span data-dcnode-id="494" instrument_node="">For Multi-Member LLCs</span></h3><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Multi-member LLCs are “pass-through” entities. This means that both the business’s profits and losses are run through the owners of the LLC.&nbsp;</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Similar to single-member LLCs, multi-members LLCs don’t have to pay taxes of their own. Rather, each member of the LLC pays taxes on the income of the business that corresponds to the amount of ownership they have in the LLC.&nbsp;</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">If you have an LLC with two members, then each member of your LLC is responsible for paying taxes on half of the company’s income. Not only does each member pay half, but each member gets half of the tax deductions and credits.&nbsp;</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">The taxes for a multi-member LLC are much like a partnership.&nbsp;</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">With this type of LLC, you are required to file certain tax forms, including Form 1065. This is the Return of Partnership Income form and must be filed with the IRS every year. In order to file this form, you need the following things:&nbsp;</span></p><span data-dcnode-id="477" instrument_node="">
</span><ul data-dcnode-id="470"><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Profit and loss statement</span></li><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">List of all deductible expenses</span></li><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Balance sheet showing the beginning of the year and the end of the year&nbsp;</span></li></ul><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">In addition to that, each owner in a multi-member LLC must fill out a Schedule K-1 prior to March 15. This form shows each owner’s share of the income, loss, credits, and deductions of the LLC from the previous year. Each member’s Schedule K-1 is part of their personal tax return and must be filed with this.</span></p><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="464" id="for-llcs-filing-as-a-c-corporation"><span data-dcnode-id="465" instrument_node="">For LLCs Filing as a C Corporation</span></h3><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">In some cases, LLCs can lower their tax bills by opting to be taxed as a corporation.&nbsp;</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">If this sounds like you, then consider filing Form 8832, which allows the IRS to tax you as a C corporation.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">What exactly does this mean?</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">It means that unlike how things work in the above situations (where the LLC’s income and expenses are filed through the member(s)’ personal tax returns), the owner(s) have to file a separate corporate tax return that taxes the owners separate from the company. This form is Form 1120.&nbsp;</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">In order to file this form, you need the following financial information:&nbsp;</span></p><span data-dcnode-id="448" instrument_node="">
</span><ul data-dcnode-id="441"><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Profit and loss statement</span></li><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">List of all deductible expenses</span></li><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Balance sheet showing the beginning of the year and the end of the year</span></li></ul><span data-dcnode-id="440" instrument_node="">
</span><h3 data-dcnode-id="438" id="for-llcs-filing-as-an-s-corporation"><span data-dcnode-id="439" instrument_node="">For LLCs Filing as an S Corporation</span></h3><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">The LLC status of an S corporation is the same as a standard LLC in that it allows corporations to pass any income and deductions on to the owners on their personal tax returns.&nbsp;</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Unlike sole proprietorships and partnerships that have to pay self-employment tax on 100% of the business profiles, by filing paperwork for an S corporation, the S corp owners only pay self-employment taxes on their personal salary from the LLC.&nbsp;</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">The paperwork required for this is Form 1120S, the U.S. Income Tax Return for an S Corporation. In addition to that, each owner will have to report their share of the business’ income on a Schedule K-1 and submit it along with their personal tax return.</span></p><span data-dcnode-id="428" instrument_node="">
</span><h3 data-dcnode-id="426" id="for-llcs-with-employees"><span data-dcnode-id="427" instrument_node="">For LLCs With Employees</span></h3><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">If you are an LLC with employees, you must collect and pay payroll taxes.&nbsp;</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">The taxes that are part of payroll taxes are:</span></p><span data-dcnode-id="419" instrument_node="">
</span><ul data-dcnode-id="412"><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Social security</span></li><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Medicare</span></li><li data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Unemployment&nbsp;</span></li></ul><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Employers are responsible for paying unemployment taxes, and both employees and employers pay social security and Medicare. It is the responsibility of an LLC to withhold social security and Medicare taxes as well as income taxes from each employee’s paycheck.&nbsp;</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">In order to form your payroll taxes, use Form 940 and Form 941. Form 940 is an annual form and Form 941 is a quarterly form.&nbsp;</span></p><span data-dcnode-id="405" instrument_node="">
</span><h3 data-dcnode-id="403" id="self-employment-taxes"><span data-dcnode-id="404" instrument_node="">Self-Employment Taxes</span></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Because members of an LLC are not considered employees, you may pay need to pay self-employment taxes. These taxes are social security and Medicare taxes.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">The self-employment tax is 15.3% and includes:&nbsp;</span></p><span data-dcnode-id="396" instrument_node="">
</span><ul data-dcnode-id="389"><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">12.4% social security tax (if your LLC makes up to $137,700)</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">2.9% Medicare tax on all money earned</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">0.9% Medicare surtax on any money earned over $200,000&nbsp;</span></li></ul><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Schedule SE is the form you need to complete your self-employment taxes.</span></p><span data-dcnode-id="385" instrument_node="">
</span><h3 data-dcnode-id="383" id="sales-tax"><span data-dcnode-id="384" instrument_node="">Sales Tax</span></h3><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Does your LLC sell goods and/or services that are taxable? If so, then you should collect sales tax from your customers and pay sales tax.&nbsp;</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">The rules on sales tax vary from state to state, so be sure to look up what you need to do for the state that your LLC is in.</span></p><span data-dcnode-id="376" instrument_node="">
</span><h2 data-dcnode-id="374" id="2-tools-to-improve-llc-taxes"><span data-dcnode-id="375" instrument_node="">2 Tools to Improve LLC Taxes</span></h2><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">As you learn more about LLC taxes, you may find that you want more help in completing them. And we don’t blame you. Doing LLC taxes 100% on your own is quite a thing to take on and honestly, we don’t recommend it.&nbsp;</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">There are some tools out there that can help make your LLC taxes much more simple and that will also increase the chances of them being done correctly which means less work for you, and no fines or fees.&nbsp;</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Read on to find out the top two tools we think you should use to make your LLC taxes less stressful.&nbsp;</span></p><span data-dcnode-id="364" instrument_node="">
</span><h3 data-dcnode-id="362" id="tax-software"><span data-dcnode-id="363" instrument_node="">Tax Software</span></h3><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Since it is the law to prepare annual tax returns, we suggest you do what you can to prepare the returns correctly.&nbsp;</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">One of the ways to help ensure that your taxes are done correctly is by using tax software. There are lots of options out there when it comes to tax software, and we are guessing you’ve heard of some of the top ones including TurboTax and H&amp;R Block.&nbsp;</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Opting to use tax software not only helps guide you through the complicated process of doing your taxes but also saves you time. And if you choose this over hiring an accountant, it will save you money too.&nbsp;</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">The options for tax software are great and each one offers different features that work for different people and companies.&nbsp;</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="348" instrument_node="">The tax software that comes with our highest approval is</span><a aria-label=" (opens in a new tab)" class="ek-link" data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quicksprout.com/go/qspnm1673/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="347" instrument_node=""> H&amp;R Block</span></a><span data-dcnode-id="345" instrument_node="">. This tax software works best for most LLCs, as it has software that is specific for small businesses that are in a variety of different tax situations.&nbsp;</span></p><span data-dcnode-id="343" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="339"><img alt="H&amp;R Block tax software homepage." class="wp-image-61452" data-dcnode-id="342" data-lazy-sizes="(max-width: 624px) 100vw, 624px" data-lazy-src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11.png" data-lazy-srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11.png 624w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11-300x149.png 300w" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">&lt;img src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11.png" alt="H&amp;amp;R Block tax software homepage." class="wp-image-61452" srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11.png 624w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image1-11-300x149.png 300w" sizes="(max-width: 624px) 100vw, 624px" /&gt;</span></noscript></figure><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">H&amp;R Block helps to walk you through the often complex tax situations that arise with an LLC and has the option to upgrade to packages that provide you with more help from a tax pro.&nbsp;</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">There are a few different package options for H&amp;R Block’s tax software.</span></p><span data-dcnode-id="332" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="328"><img alt="H&amp;R Block tax software pricing plans." class="wp-image-61451" data-dcnode-id="331" data-lazy-sizes="(max-width: 624px) 100vw, 624px" data-lazy-src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12.png" data-lazy-srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12.png 624w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12-300x140.png 300w" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">&lt;img src="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12.png" alt="H&amp;amp;R Block tax software pricing plans." class="wp-image-61451" srcset="https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12.png 624w, https://quicksprout-wpengine.netdna-ssl.com/wp-content/uploads/2021/08/image2-12-300x140.png 300w" sizes="(max-width: 624px) 100vw, 624px" /&gt;</span></noscript></figure><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">And if you aren’t sure which package is right for you, H&amp;R has an online quiz you can fill out to help determine the right tax program for you.</span></p><span data-dcnode-id="324" instrument_node="">
</span><h3 data-dcnode-id="322" id="an-accountant"><span data-dcnode-id="323" instrument_node="">An Accountant</span></h3><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Though the more pricey option, accountants are great for those LLC owners who want to have as little to do with their taxes as possible. And if this is you, we have no judgment. Some people are fine with doing taxes, and some would rather pay someone else to do them.&nbsp;</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">If you are the latter, then you want to hire an accountant. This person will need your company’s financial information and will go through the process of filing your taxes for you.&nbsp;</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The price of accountants varies from state to state and also depends upon the specific type of LLC you have. To find the best accountant for your LLC, consider asking colleagues who they use for their taxes.</span></p><span data-dcnode-id="312" instrument_node="">
</span><h2 data-dcnode-id="310" id="3-tricks-for-llc-taxes"><span data-dcnode-id="311" instrument_node="">3 Tricks for LLC Taxes</span></h2><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Looking to make your LLC taxes easier? We thought so. No one likes to deal with wildly complicated taxes.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">To help you with this process, here are three tricks.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h3 data-dcnode-id="301" id="keep-track-of-deductions"><span data-dcnode-id="302" instrument_node="">Keep Track of Deductions</span></h3><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Deductions refer to certain expenses that you can write off on your LLC taxes. The different deductions or write-offs that are available will vary depending on your type of business, but here are some of the most common ones.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Rental expenses</span></strong></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">If you rent an office or retail space for your LLC, you can deduct how much you pay in rent. Or, if you run your LLC from home, then you can write off a percentage of your monthly rent for your business.&nbsp;</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="287"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Insurance</span></strong></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Depending on the business you run, you may need insurance. And that insurance is deductible as a business expense.&nbsp;</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="280"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Professional expenses</span></strong></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">If your LLC requires specific licenses, professional development, conferences, books, and more, you can deduct those expenses.&nbsp;</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="273"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Travel</span></strong></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">If your LLC requires you to travel for your work, then you can write off travel expenses that are related to business.</span></p><span data-dcnode-id="269" instrument_node="">
</span><h3 data-dcnode-id="267" id="pay-attention-to-due-dates"><span data-dcnode-id="268" instrument_node="">Pay Attention to Due Dates</span></h3><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">When it comes to LLC taxes, you do not want to mess around with deadlines. Though the standard tax return deadline is April 15, there may be other dates for other forms that you need to pay attention to.</span></p><span data-dcnode-id="263" instrument_node="">
</span><h3 data-dcnode-id="261" id="hire-an-accountant"><span data-dcnode-id="262" instrument_node="">Hire an Accountant</span></h3><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">If you feel completely overwhelmed and feel that there is no way you could possibly do your LLC taxes on your own, then consider the expense of an accountant worth it. Plus, you can write that off as a business expense, so there’s an added bonus.</span></p><span data-dcnode-id="257" instrument_node="">
</span><h2 data-dcnode-id="255" id="what-to-do-next"><span data-dcnode-id="256" instrument_node="">What to Do Next</span></h2><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Now with a better idea of LLC taxes under your belt, you may feel more confident about moving forward with your LLC.&nbsp;</span></p><span data-dcnode-id="251" instrument_node="">
