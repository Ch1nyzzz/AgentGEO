</span><div class="mntl-attribution__item-date" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Published July 20, 2021</span></div><span data-dcnode-id="2027" instrument_node="">

</span><div class="loc article-content" data-dcnode-id="1699"><span data-dcnode-id="2016" instrument_node="">
</span><div class="comp article-content structured-content expert-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1701" data-sc-ad-bottom-offset="0" data-sc-ad-label-height="20" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[300, 1250, 1, 1, 1, 1, 1, 1]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="80" id="mntl-sc-page_1-0"><span data-dcnode-id="2015" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="2010" id="mntl-sc-block_1-0-1"><span data-dcnode-id="2014" instrument_node="">
Forming a </span><a data-component="link" data-dcnode-id="2012" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-a-limited-liability-company-llc-5214194"><span data-dcnode-id="2013" instrument_node="">limited liability company (LLC)</span></a><span data-dcnode-id="2011" instrument_node=""> is a common way to structure a small business. LLCs allow owners to enjoy certain advantages of incorporation while retaining tax benefits reserved for unincorporated partnerships.&nbsp;
</span></p><span data-dcnode-id="2009" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2008" id="mntl-sc-block_1-0-2"></div><span data-dcnode-id="2007" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="2005" id="mntl-sc-block_1-0-4"><span data-dcnode-id="2006" instrument_node="">
In addition to providing protection against personal liability, LLCs are not automatically subject to separate corporate taxation, unlike C-corporations (C-corps). This makes an LLC an attractive option for many small business owners.&nbsp;
</span></p><span data-dcnode-id="2004" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2003" id="mntl-sc-block_1-0-5"></div><span data-dcnode-id="2002" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1997" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2001" instrument_node="">
“There are benefits and drawbacks to each type of </span><a data-component="link" data-dcnode-id="1999" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-an-s-corporation-s-corp-5210878"><span data-dcnode-id="2000" instrument_node="">business and tax structure</span></a><span data-dcnode-id="1998" instrument_node="">,” said April Walker, lead manager for tax practice &amp; ethics with the American Institute of CPAs, in an email interview with The Balance. “There is no single choice that is always better for a business owner—the owner’s current needs and future plans should be evaluated by working with a professional.”
</span></p><span data-dcnode-id="1996" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1995" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="1994" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1993" id="toc-benefits-of-pass-through-taxation"></span><span data-dcnode-id="1992" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1987" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1991" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node=""> Benefits of Pass-Through Taxation </span></span><span data-dcnode-id="1988" instrument_node=""> </span></h2><span data-dcnode-id="1986" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1981" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1985" instrument_node="">
Unless otherwise designated by the </span><a data-component="link" data-dcnode-id="1983" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/how-to-pay-yourself-from-an-llc-5210800"><span data-dcnode-id="1984" instrument_node="">owners</span></a><span data-dcnode-id="1982" instrument_node="">, an LLC is not separately taxed as a business. For income tax purposes, the IRS treats the business as a partnership by default.
</span></p><span data-dcnode-id="1980" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1979" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="1978" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1973" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1977" instrument_node="">
Instead, an LLC is taxed as a </span><a data-component="link" data-dcnode-id="1975" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-a-pass-through-entity-5217698"><span data-dcnode-id="1976" instrument_node="">“pass-through” entity</span></a><span data-dcnode-id="1974" instrument_node="">, meaning that income taxes are passed through to its owner or owners, who are known as “members.”&nbsp;
</span></p><span data-dcnode-id="1972" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1971" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1970" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1968" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1969" instrument_node="">
Members individually report income and losses from the LLC on their personal returns. This is generally considered an easier and cheaper process than filing for a C-corp.&nbsp;
</span></p><span data-dcnode-id="1967" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1966" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1965" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1952" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1964" instrument_node="">
&nbsp;For pass-through entities, this income is taxed up to the maximum of 37%. However, certain qualifying pass-through income is eligible for a 20% reduction through 2025, per the 2017 </span><a data-component="link" data-dcnode-id="1962" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/trump-s-tax-plan-how-it-affects-you-4113968"><span data-dcnode-id="1963" instrument_node="">Tax Cuts and Jobs Act</span></a><span data-dcnode-id="1961" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1958" data-id="#citation-1"><span data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">1</span></span></span><span data-dcnode-id="1957" instrument_node=""> The reduction would decrease the maximum tax rate to 29.6%. Generally, to qualify for the reduction, an individual must have earned up to $163,300, and a married couple filing jointly must have earned up to $326,600. However, the IRS outlines specific exceptions to these rules.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1954" data-id="#citation-2"><span data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">2</span></span></span><span data-dcnode-id="1953" instrument_node="">
</span></p><span data-dcnode-id="1951" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1950" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1949" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1936" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1948" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1938" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1947" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1940" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1945" instrument_node="">Along with LLCs, S-corporations, </span><a data-component="link" data-dcnode-id="1943" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/guide-to-sole-proprietorship-taxes-5195060"><span data-dcnode-id="1944" instrument_node="">sole proprietorships</span></a><span data-dcnode-id="1942" instrument_node="">, and partnerships are also considered pass-through entities.&nbsp;</span></p></div><span data-dcnode-id="1939" instrument_node="">
</span></div><span data-dcnode-id="1937" instrument_node="">
</span></div><span data-dcnode-id="1935" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1934" id="toc-choosing-your-llc-tax-designation"></span><span data-dcnode-id="1933" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1928" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1932" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node=""> Choosing Your LLC Tax Designation </span></span><span data-dcnode-id="1929" instrument_node=""> </span></h2><span data-dcnode-id="1927" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1925" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1926" instrument_node="">
LLC members can select from three different types of federal tax designations, including a non-pass-through corporation option.
</span></p><span data-dcnode-id="1924" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1916" id="mntl-sc-block_1-0-27"><div class="comp mntl-native" data-dcnode-id="1917" data-right-rail-index="3" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1923" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1919" id="mntl-native__adunit_1-0"><span data-dcnode-id="1922" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1921" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1920" instrument_node="">
</span></div><span data-dcnode-id="1918" instrument_node="">
</span></div></div><span data-dcnode-id="1915" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1913" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1914" instrument_node="">
Each state has its own requirements for the formation of LLCs including fee structure and operating rules, said California-based CPA Mary Kay Foss via email to The Balance. LLCs are state designations, not federal tax structures. Business owners looking to form an LLC must consult their state statutes. On a federal level, however, LLCs have flexibility when it comes to how they are taxed.
</span></p><span data-dcnode-id="1912" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1911" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1910" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1908" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1909" instrument_node="">
The following are the different types of federal tax classifications available for the LLC.
</span></p><span data-dcnode-id="1907" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1906" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1905" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1900" id="mntl-sc-block_1-0-35"><span data-dcnode-id="1904" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node=""> Single-Member LLC </span></span><span data-dcnode-id="1901" instrument_node=""> </span></h3><span data-dcnode-id="1899" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1897" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1898" instrument_node="">
A single-member LLC—which is owned by one member—is considered a separate entity from its owner, unless that owner chooses another option on Form 8832. This is a pass-through designation, wherein the owner is essentially taxed as a sole proprietor. The business is not regarded as a separate, taxable entity.&nbsp;
</span></p><span data-dcnode-id="1896" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1895" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="1894" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1889" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1893" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node=""> Partnership&nbsp; </span></span><span data-dcnode-id="1890" instrument_node=""> </span></h3><span data-dcnode-id="1888" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1886" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1887" instrument_node="">
LLCs with two or more members are designated as partnerships by the IRS for income tax purposes. In a partnership, two or more owners engage in a business and share in the profits and losses. Taxation is passed through to each individual member, and the business is not treated as a separate, taxable entity.&nbsp;
</span></p><span data-dcnode-id="1885" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1884" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="1883" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1873" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1882" instrument_node="">
</span><div class="comp theme-experttipwarning mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1875" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-45"><span data-dcnode-id="1881" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1877" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Individuals in partnerships are subject to self-employment taxes.&nbsp;</span></p></div><span data-dcnode-id="1876" instrument_node="">
</span></div><span data-dcnode-id="1874" instrument_node="">
</span></div><span data-dcnode-id="1872" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1867" id="mntl-sc-block_1-0-47"><span data-dcnode-id="1871" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node=""> Corporation&nbsp; </span></span><span data-dcnode-id="1868" instrument_node=""> </span></h3><span data-dcnode-id="1866" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1864" id="mntl-sc-block_1-0-49"><span data-dcnode-id="1865" instrument_node="">
An LLC can elect to be taxed as a corporate entity if it chooses the option on Form 8832. These LLCs will follow corporate federal tax rules. Corporations are subject to Social Security, unemployment and payroll taxes.
</span></p><span data-dcnode-id="1863" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1862" id="mntl-sc-block_1-0-50"></div><span data-dcnode-id="1861" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1856" id="mntl-sc-block_1-0-52"><span data-dcnode-id="1860" instrument_node="">
Since a corporate designation allows organizations to </span><a data-component="link" data-dcnode-id="1858" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-financial-capital-3305825"><span data-dcnode-id="1859" instrument_node="">raise capital</span></a><span data-dcnode-id="1857" instrument_node=""> through stock, the structure is a good idea for medium- to high-risk businesses that need to raise money, or if they plan to be sold or go public, according to the U.S. Small Business Administration.
</span></p><span data-dcnode-id="1855" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1854" id="mntl-sc-block_1-0-53"></div><span data-dcnode-id="1853" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1851" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1852" instrument_node="">
C-corps and S-corps are the most common corporate tax designations.
</span></p><span data-dcnode-id="1850" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1849" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="1848" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1823" id="mntl-sc-block_1-0-58"><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1834"><strong data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">C-corp:</span></strong><span data-dcnode-id="1844" instrument_node=""> This business entity will be taxed separately from individual owners. Federal income tax of the business entity is capped at 21%. However, C-corporations must also pay taxes on </span><a data-component="link" data-dcnode-id="1842" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-a-dividend-356103"><span data-dcnode-id="1843" instrument_node="">dividends</span></a><span data-dcnode-id="1841" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1839" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/capital-gains-basics-357396"><span data-dcnode-id="1840" instrument_node="">capital gains</span></a><span data-dcnode-id="1838" instrument_node=""> paid to the owner, resulting in double taxation. The latter rates can go as high as 40.8%.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1835" data-id="#citation-3"><span data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">3</span></span></span></li><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1826"><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">S-corp</span></strong><span data-dcnode-id="1830" instrument_node="">: Unlike a C-corp, an S-corp is considered a pass-through designation. Income, losses, deductions, and credits can be passed through to shareholders, thereby avoiding double taxation. An S-corp can have no more than 100 shareholders. Owners must file through the IRS to achieve an S-corp designation.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1827" data-id="#citation-4"><span data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">4</span></span></span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1825"></span><span data-dcnode-id="1824" instrument_node="">
</span></ul><span data-dcnode-id="1822" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1821" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="1820" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1818" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1819" instrument_node="">
Owners of S-corps can receive a reasonable salary, and unlike a partnership or sole proprietorship, they won’t be subject to self-employment tax, said Walker. “The savings would be on the payroll taxes (Social Security and Medicare taxes) on the difference between the salary paid and the net taxable income of the business that is subject to tax,” she said.
</span></p><span data-dcnode-id="1817" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1816" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1815" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1814" id="toc-other-llc-taxes"></span><span data-dcnode-id="1813" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1808" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1812" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node=""> Other LLC Taxes </span></span><span data-dcnode-id="1809" instrument_node=""> </span></h2><span data-dcnode-id="1807" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1805" id="mntl-sc-block_1-0-65"><span data-dcnode-id="1806" instrument_node="">
In addition to income tax, LLCs are subject to other federal, state, and local taxation.
</span></p><span data-dcnode-id="1804" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1803" id="mntl-sc-block_1-0-66"></div><span data-dcnode-id="1802" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1797" id="mntl-sc-block_1-0-68"><span data-dcnode-id="1801" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node=""> Social Security and Unemployment Taxes&nbsp; </span></span><span data-dcnode-id="1798" instrument_node=""> </span></h3><span data-dcnode-id="1796" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1790" id="mntl-sc-block_1-0-70"><span data-dcnode-id="1795" instrument_node="">
LLCs listed as sole proprietors or partnerships must pay a rate of 15.3% in self-employment taxes—including Social Security and Medicare—through the members’ personal returns.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1792" data-id="#citation-5"><span data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">5</span></span></span><span data-dcnode-id="1791" instrument_node="">
</span></p><span data-dcnode-id="1789" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1788" id="mntl-sc-block_1-0-71"></div><span data-dcnode-id="1787" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1777" id="mntl-sc-block_1-0-72"><span data-dcnode-id="1786" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1779" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1785" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1781" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Most employers have to pay 6% of an employee’s wages to federal unemployment taxes, as well as 6.2% to Medicare and Social Security benefits for each employee.</span></p></div><span data-dcnode-id="1780" instrument_node="">
</span></div><span data-dcnode-id="1778" instrument_node="">
</span></div><span data-dcnode-id="1776" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1771" id="mntl-sc-block_1-0-75"><span data-dcnode-id="1775" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node=""> State by State </span></span><span data-dcnode-id="1772" instrument_node=""> </span></h3><span data-dcnode-id="1770" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1768" id="mntl-sc-block_1-0-77"><span data-dcnode-id="1769" instrument_node="">
Since LLCs are designated by individual states, it’s critical for every LLC to consult their state and local laws when budgeting for taxes and fees.
</span></p><span data-dcnode-id="1767" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1766" id="mntl-sc-block_1-0-78"></div><span data-dcnode-id="1765" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1759" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1764" instrument_node="">
Employers must pay state unemployment taxes, usually within the range of 2%-4% depending on where they operate.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1761" data-id="#citation-6"><span data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">6</span></span></span><span data-dcnode-id="1760" instrument_node="">
</span></p><span data-dcnode-id="1758" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1757" id="mntl-sc-block_1-0-81"></div><span data-dcnode-id="1756" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1750" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1755" instrument_node="">
While many states generally follow federal rules for taxing business entities, Foss said that some states have additional requirements. California, for example, imposes an $800 minimum franchise tax on all businesses.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1752" data-id="#citation-7"><span data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">7</span></span></span><span data-dcnode-id="1751" instrument_node=""> Meanwhile, states like New Hampshire and Tennessee do not recognize S-corp pass-through designations and so they are treated the same as C-corps.&nbsp;
</span></p><span data-dcnode-id="1749" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1748" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1747" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1742" id="mntl-sc-block_1-0-86"><span data-dcnode-id="1746" instrument_node="">
Find out about your state business taxation policies through the </span><a data-component="link" data-dcnode-id="1744" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/state-government-websites" rel="noopener" target="_blank"><span data-dcnode-id="1745" instrument_node="">IRS directory</span></a><span data-dcnode-id="1743" instrument_node="">.&nbsp;
</span></p><span data-dcnode-id="1741" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1740" id="mntl-sc-block_1-0-87"></div><span data-dcnode-id="1739" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1738" id="toc-when-to-file-your-llc-taxes"></span><span data-dcnode-id="1737" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1732" id="mntl-sc-block_1-0-88"><span data-dcnode-id="1736" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node=""> When To File Your LLC Taxes </span></span><span data-dcnode-id="1733" instrument_node=""> </span></h2><span data-dcnode-id="1731" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1729" id="mntl-sc-block_1-0-90"><span data-dcnode-id="1730" instrument_node="">
Here are some important dates to remember in regards to specific LLC tax filings.&nbsp;
</span></p><span data-dcnode-id="1728" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1727" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="1726" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1708" id="mntl-sc-block_1-0-93"><span data-dcnode-id="1725" instrument_node="">
</span><li data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node="">Default partnership LLCs must fill out </span><a data-component="link" data-dcnode-id="1722" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/form-1065-instructions-a-step-by-step-guide-5209979"><span data-dcnode-id="1723" instrument_node="">IRS Form 1065</span></a><span data-dcnode-id="1721" instrument_node="">. These taxes are paid annually by March 15.&nbsp;&nbsp;</span></li><span data-dcnode-id="1719" instrument_node="">
</span><li data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Sole proprietors must include a Schedule C attachment on their standard Form 1040 tax return. These are estimated taxes that must be filed quarterly in addition to the annual taxes due April 15.&nbsp;</span></li><span data-dcnode-id="1716" instrument_node="">
</span><li data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">For a corporation LLC, the business must report its income and deductions on Form 1120 annually and pay income tax. The deadline is generally the 15th day of the fourth month after the end of the corporation’s tax year, with certain exceptions. Each owner must also report their dividends on their personal Form 1040s.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1713"></span><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">S-corporation taxes are due by March 15.&nbsp;</span></li><span data-dcnode-id="1709" instrument_node="">
</span></ul><span data-dcnode-id="1707" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1706" id="mntl-sc-block_1-0-94"></div><span data-dcnode-id="1705" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1703" id="mntl-sc-block_1-0-96"><span data-dcnode-id="1704" instrument_node="">
An LLC that wishes to change its default tax designation should fill out IRS Form 8832.&nbsp;
</span></p><span data-dcnode-id="1702" instrument_node="">
</span></div><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span><div class="loc article-post-content" data-dcnode-id="1522"><span data-dcnode-id="1697" instrument_node="">
</span><div class="comp article-sources mntl-block" data-dcnode-id="1593" id="article-sources_1-0"><span data-dcnode-id="1696" instrument_node="">
</span><div class="comp mntl-article-sources mntl-expandable-block" data-dcnode-id="1595" data-scroll-offset="100" id="mntl-article-sources_1-0"><span data-dcnode-id="1695" instrument_node="">
</span><div class="loc toggle-content" data-dcnode-id="1662"><span data-dcnode-id="1694" instrument_node="">
</span><div class="comp mntl-article-sources__wrapper mntl-block" data-click-tracked="true" data-dcnode-id="1664" id="mntl-article-sources__wrapper_1-0"><span data-dcnode-id="1693" instrument_node="">
