</span><h1 class="doc-title text-bold" data-dcnode-id="569" id="articleTitle" itemprop="name"><span data-dcnode-id="570" instrument_node="">How to File Taxes for a Partnership LLC</span></h1><span data-dcnode-id="568" instrument_node="">
</span><input data-dcnode-id="567" id="ArticleId" name="ArticleId" type="hidden" value="5b9c2e047c55e44ad04f1277"><span data-dcnode-id="566" instrument_node="">
</span><p class="doc-description" data-dcnode-id="561" itemprop="description"><em data-dcnode-id="562"><span data-dcnode-id="565" instrument_node="">If you're wondering how to file taxes for a partnership LLC, you should first understand how a partnership LLC works.</span><span class="content-read-time" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">3 min read</span></span></em></p><span data-dcnode-id="560" instrument_node="">
</span><div class="article-body marg-t-20" data-dcnode-id="425"><span data-dcnode-id="559" instrument_node="">
</span><a data-dcnode-id="557" href="#what-is-an-llc"><span data-dcnode-id="558" instrument_node="">1. What is an LLC?</span></a><br data-dcnode-id="556"><a data-dcnode-id="554" href="#the-steps-needed-to-create-an-llc"><span data-dcnode-id="555" instrument_node="">2. The Steps Needed to Create an LLC</span></a><br data-dcnode-id="553"><a data-dcnode-id="551" href="#fill-out-forms"><span data-dcnode-id="552" instrument_node="">3. Fill out Forms</span></a><br data-dcnode-id="550"><a data-dcnode-id="548" href="#partnerships-pass-throughs-and-deductions"><span data-dcnode-id="549" instrument_node="">4. Partnerships, Pass-throughs, and Deductions</span></a><br data-dcnode-id="547"><a data-dcnode-id="545" href="#five-steps-to-file-taxes-at-an-llc"><span data-dcnode-id="546" instrument_node="">5. Five Steps to File Taxes at an LLC</span></a><br data-dcnode-id="544"><span data-dcnode-id="543" instrument_node="">
</span><br data-dcnode-id="542"><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">If you're wondering how to file taxes for a partnership LLC, you should first understand how a partnership LLC works. LLCs come in many shapes and sizes. And while there are many different types of business and many different styles of business management, there is definitely a right and a wrong way to file taxes for a partnership LLC.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h2 data-dcnode-id="536" id="what-is-an-llc"><span data-dcnode-id="537" instrument_node="">What is an LLC?</span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The very first step in filing taxes as a partnership LLC is to be sure that you've formed a legally recognized LLC.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">An LLC is a company that combines the limited liability characteristic of a corporation and the simplified tax benefit of paying through the owners/partners of a sole proprietorship or partnership. These owners, also known as members, are only taxed once. In order to do this, you'll need to ensure that each individual partner is listed.</span></p><span data-dcnode-id="529" instrument_node="">
</span><h2 data-dcnode-id="527" id="the-steps-needed-to-create-an-llc"><span data-dcnode-id="528" instrument_node="">The Steps Needed to Create an LLC</span></h2><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">The Employer ID number will be used to identify your business on any forms sent to the IRS, including W-2's and 1099's. Even if you never hire additional employees, you must obtain this important number.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">You'll also need to register your LLC in its state of residency. This often involves contacting the Secretary of State's office and, depending on your state of residency, filing a Certificate of Organization.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">Before you begin to form a </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/types-of-businesses" target="_blank"><span data-dcnode-id="518" instrument_node="">hybrid business structure</span></a><span data-dcnode-id="516" instrument_node="">, such as an LLC, you must first understand how to file taxes for a partnership LLC.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="512" id="fill-out-forms"><span data-dcnode-id="513" instrument_node="">Fill out Forms</span></h2><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">First, you'll need a Form 1065. This is the form that allows the </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/creating-a-partnership-llc" target="_blank"><span data-dcnode-id="509" instrument_node="">partnership LLC</span></a><span data-dcnode-id="507" instrument_node=""> as an entity to report its income. Then the individual partners will pay income taxes based on their individual tax rates, rather than paying as an entity. This means that no tax is calculated from Form 1065; it's simply the means of showing the IRS how much you've earned.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Based on profits and loss and capital gains and liabilities, shares are distributed as a responsibility of each individual partner, depending on the terms of their partnership agreement. This information is listed on a K-1 form, which is in turn filed on the partners' tax returns.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">It is important that both forms K-1 and 1065 are sent to the IRS for prompt and up-to-date tax records.</span></p><span data-dcnode-id="499" instrument_node="">
</span><h2 data-dcnode-id="497" id="partnerships-pass-throughs-and-deductions"><span data-dcnode-id="498" instrument_node="">Partnerships, Pass-throughs, and Deductions</span></h2><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Each member of an LLC is only taxed once, and although profit and loss and money are important, there are other relevant aspects of an LLC that are significant.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">There are various factors that impact the size of partner shares within an LLC. The number of responsibilities a partner has, any salaries they may be paid as an employee, and other various terms that are based on the LLC's written partnership agreement affect the size of partner shares.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Neither partnerships nor limited liability companies are separate entities, so no federal taxes are paid at the organizational level. Business taxes and deductions are paid based on the size of partner shares and deductions for each partner. LLC owners are also protected from certain legal liabilities that corporate shareholders face.</span></p><span data-dcnode-id="487" instrument_node="">
</span><h2 data-dcnode-id="485" id="five-steps-to-file-taxes-at-an-llc"><span data-dcnode-id="486" instrument_node="">Five Steps to File Taxes at an LLC</span></h2><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">Once forms 1065 and K-1 are on file with the IRS, the amount of information </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/blogs/6-things-you-need-know-about-your-tax-responsibilities-llc" target="_blank"><span data-dcnode-id="482" instrument_node="">needed to file taxes</span></a><span data-dcnode-id="480" instrument_node=""> for a year is relatively straightforward.</span></p><span data-dcnode-id="478" instrument_node="">
</span><ul data-dcnode-id="438"><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="460"><span data-dcnode-id="476" instrument_node="">
</span><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Fill out your forms</span></strong><span data-dcnode-id="473" instrument_node="">
</span><ul data-dcnode-id="462"><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Year-end Balance Sheet - This information must also include the figures for any properties purchased by the LLC within that year.</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Profit and Loss Statement - The copy of this workshop shows categories of expenses, such as inventory, supplies, etc., that were purchased and used during the year.</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Partners Share Listings - This listing must show a complete record of all partners within the LLC, as well as the number of shares held by each individual partner.</span></li><span data-dcnode-id="463" instrument_node="">
</span></ul><span data-dcnode-id="461" instrument_node="">
</span></li><span data-dcnode-id="459" instrument_node="">
</span><li data-dcnode-id="454"><span data-dcnode-id="458" instrument_node="">
</span><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Keep updated information.</span></strong><span data-dcnode-id="455" instrument_node=""> Updating these records regularly and having a system in place to track expenses throughout the tax year can save you. Don't forget any franchise fees.</span></li><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="450"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Show your accounting method.</span></strong></li><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="446"><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Review your information.</span></strong></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">
</span><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">File your papers.</span></strong><span data-dcnode-id="441" instrument_node=""> These forms must then be filed by April 15th or an extension must be filed. And this can be done electronically or by mail. You'll need to file state and federal returns.</span></li><span data-dcnode-id="439" instrument_node="">
</span></ul><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="433"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turbotax.intuit.com/tax-tips/small-business-taxes/limited-liability-company-taxes/L5TDDlstC" target="_blank"><span data-dcnode-id="436" instrument_node="">Filing taxes for a partnership LLC</span></a><span data-dcnode-id="434" instrument_node=""> doesn't have to be intimidating or confusing. By ensuring that you record proper information when creating an LLC and updating it regularly, you have information that is ready for tax time.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">If you need help with how to file taxes for a partnership LLC, you can </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/jobs/new%3Fpage_location%3Darticle-paj-hyperlink-content" target="_blank"><span data-dcnode-id="430" instrument_node="">post your job</span></a><span data-dcnode-id="428" instrument_node=""> on UpCounsel's marketplace. UpCounsel accepts only the top 5 percent of lawyers to its site. Lawyers on UpCounsel come from law schools such as Harvard Law and Yale Law and average 14 years of legal experience, including work with or on behalf of companies like Google, Menlo Ventures, and Airbnb.</span></p><span data-dcnode-id="426" instrument_node="">
