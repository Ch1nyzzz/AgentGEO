vPhHZ" data-dcnode-id="1067"><span class="_1V059C" data-dcnode-id="1069"><span class="_23_GlS _5-T082 _2McN3Z _2GMChG _2XMNUx" data-currency="Text" data-dcnode-id="1070"><a class="_23_GlS _5-T082 _2McN3Z _2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/blog/author/pprakash/"><span data-dcnode-id="1074" instrument_node="">Priyanka Prakash</span></a><span class="_3QjvLE _23_GlS _5-T082 _2McN3Z _2GMChG" data-currency="Text" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node=""></span></span></span></span><span data-dcnode-id="1068" instrument_node=""> </span></div><div class="_2B4Iyg ofD6p9 _19SWxv _1tYt-B mvPhHZ _1V059C" data-dcnode-id="1064"><span class="_3QjvLE _23_GlS _5-T082 _2McN3Z _2GMChG _2XMNUx" data-currency="Text" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Oct 30, 2020</span></span></div></div></div></div><div class="FTDQoV" data-dcnode-id="1055"><div class="" data-dcnode-id="1056"><figure class="_2HF0Jk" data-dcnode-id="1057"><div class="_2vhaZz _2WdI9G" data-dcnode-id="1058" style="background-color:#F7F7F7;padding-bottom:40.000%"><div class="Pwlcz9 _2W-jno" data-dcnode-id="1059"><img alt="" class="_1HRq6D _30WfNQ" data-dcnode-id="1060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/GettyImages-1214593883-770x462.jpg&amp;raw" srcset="https://www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/GettyImages-1214593883-600x360.jpg 600w, https://www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/GettyImages-1214593883-770x462.jpg 770w, https://www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/GettyImages-1214593883-1440x864.jpg 1440w, https://www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/GettyImages-1214593883-1920x1152.jpg 1920w, https://www.nerdwallet.com/assets/blog/wp-content/upload d="1007"><a class="_2QtC2m _31LNO1 _2ActLi UysN4l _2XRmtd _2gJCrk" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/redirect/8ca87586-bd00-11ec-99aa-df5d158fac63%3Fmvt%3DMTY1MDkxNzQ1MzI2MTA4NDE1MjpkYmJkNzQ1NS1iZmRhLTQ4NGItYjUzYS04MWEyNzkxZjNiNTc6N2QxZjU5ZmZlYTcwN2FjNzI0ZWZmYzIzN2RlZDYxZDIyZjQwMTFiMGNmYTYwNDI1NTI1NTAxNTljYTBjMDY0Nw%253D%253D%26trk_channel%3Dweb%26trk_element%3Dbutton%26trk_location%3DMarketplaceApplyNow%26trk_nldt%3Dundefined%26trk_pagetype%3D%26trk_sectionCategory%3D%26trk_topic%3Dundefined%26trk_vertical%3DSmall%2520Business%26finish_type%3Dexternal_application%26has_prequalified%3Dfalse%26impression_id%3D109e7f14-1956-42f5-a96d-0d21b6efcf18%26link_type%3DAPPLY_NOW_BUTTON%26monetizable%3D%26page_number%3D%26product_display_driver%3Duser_selected%26product_position%3D%26section_name%3DMiniProductCard%26section_position%3D%26header_pageViewId%3D4c4d6923-d0a4-44de-93eb-b24b424caa16%26clickHeader_pageNumber%3D%26clickHeader_productPosition%3D%26clickHeader_productLocation%3DMarketplaceApplyNow%26clickHeader_sectionPosition%3D%26clickHeader_productId%3D8ca87586-bd00-11ec-99aa-df5d158fac63%26clickHeader_productSlug%3D%26clickHeader_linkType%3DAPPLY_NOW_BUTTON" target="_blank"><div class="_21lVPM" data-dcnode-id="1011"><span class="_1zPu06" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Shop Now</span></span></div></a><p class="annotation tNDKHl _31LNO1 _1CNg5T _3QjvLE" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">on ZenBusiness's website</span></p></div></div></div></div></div></div></td></tr></tbody></table></div></div></div></div></div></div><div class="FTDQoV" data-dcnode-id="988"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="989"><span class="_2HGwPY _7LUqYM _2GMChG _3-to_p" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">How do LLC taxes work?</span></span></h2></div><div class="FTDQoV" data-dcnode-id="984"><p class="_2GMChG _3-to_p" data-dcnode-id="985"><span class="_2GMChG _3-to_p" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">An LLC is typically treated as a pass-through entity for federal income tax purposes. This means that the LLC itself doesn’t pay taxes on business income. The members of the LLC pay taxes on their share of the LLC’s profits. State or local governments might levy additional LLC taxes. Members can choose for the LLC to be taxed as a corporation instead of a pass-through entity.</span></span></p></div><div class="FTDQoV" data-dcnode-id="980"><p class="_2GMChG _3-to_p" data-dcnode-id="981"><span class="_2GMChG _3-to_p" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">There are several types of LLC taxes. The federal government, as well as state and local governments, levy these taxes. All LLC members are responsible for paying income tax on any income they earn from the LLC as well as self-employment taxes. Depending on what you sell and whether you employ anyone, you might also be responsible for paying payroll taxes and sales taxes. To complicate things even more, an LLC can opt to be taxed as a different business entity.</span></span></p></div><div class="FTDQoV" data-dcnode-id="976"><p class="_2GMChG _3-to_p" data-dcnode-id="977"><span class="_2GMChG _3-to_p" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">In this guide, we’ll cover the entire range of LLC taxes, what you’ll be responsible for, and options for reducing your tax bill. Understanding your tax burden in advance can help you make smarter financial decisions.</span></span></p></div><div class="FTDQoV" data-dcnode-id="971"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="972"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="973"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">How LLCs pay income taxes</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="967"><p class="_2GMChG _3-to_p" data-dcnode-id="968"><span class="_2GMChG _3-to_p" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">There’s a wide range of business taxes that the owners of an LLC might be responsible for. Federal, state, and local income taxes represent the biggest burden for most business owners. The way in which you file and pay income taxes depends on whether your LLC has one owner (a single-member LLC) or multiple owners (a multi-member LLC).</span></span></p></div><div class="FTDQoV" data-dcnode-id="962"><h3 class="_23_GlS _1jyA_Q _2McN3Z _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="963"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="964"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Income taxes for single-member LLCs</span></span></span></h3></div><div class="FTDQoV" data-dcnode-id="958"><p class="_2GMChG _3-to_p" data-dcnode-id="959"><span class="_2GMChG _3-to_p" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">By default, the IRS treats a single-member LLC as a disregarded entity for federal income tax purposes. According to Vincent Porter, a certified public accountant (CPA) at MyTexasCPA, “A disregarded entity means that the LLC is not required to file a separate income tax return to report income and expenses. The income and expenses will go directly on the member’s tax return.”</span></span></p></div><div class="FTDQoV" data-dcnode-id="954"><p class="_2GMChG _3-to_p" data-dcnode-id="955"><span class="_2GMChG _3-to_p" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">In other words, as the sole owner of an LLC,&nbsp; you’ll report business income and expenses on Form 1040, Schedule C, similar to a sole proprietor. If, after deducting business expenses, the LLC generates a profit for the year, the owner will owe taxes to the IRS in accordance with their personal income tax rate. If the LLC operates at a loss for the year, the owner can deduct the business’s losses from their personal income.</span></span></p></div><div class="FTDQoV" data-dcnode-id="950"><p class="_2GMChG _3-to_p" data-dcnode-id="951"><span class="_2GMChG _3-to_p" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">This process generally works the same way at the state and local level. For example, a single owner of a New York City LLC will report business income on their federal and state personal tax returns. The income will be taxed at the owner’s federal, state, and local personal income tax rate. The key is that you’ll only be taxed on income that’s attributable to the state or locality. According to Porter, “States will tax an LLC relative to the amount of sales, payroll, or assets that are owned in that state. In other words, if federal income is $100 and the company has $50 of payroll in New York and $200 of payroll everywhere, New York would tax $25 of the income to the state ($50/$200 x $100).”</span></span></p></div><div class="FTDQoV" data-dcnode-id="946"><p class="_2GMChG _3-to_p" data-dcnode-id="947"><span class="_2GMChG _3-to_p" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Some states charge a separate LLC tax or fee. California, for example, charges an $800 annual LLC tax, plus an annual fee that varies based on your LLC’s California income. Take these LLC taxes into account when selecting your business structure and making budgeting decisions.</span></span></p></div><div class="FTDQoV" data-dcnode-id="941"><h3 class="_23_GlS _1jyA_Q _2McN3Z _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="942"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="943"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Income taxes for multi-member LLCs</span></span></span></h3></div><div class="FTDQoV" data-dcnode-id="937"><p class="_2GMChG _3-to_p" data-dcnode-id="938"><span class="_2GMChG _3-to_p" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Multi-member LLCs are treated as pass-through entities for federal income tax purposes. Similar to the single-member LLC, this means that the LLC doesn’t pay taxes of its own. Instead, each member pays taxes on the business’s income in proportion to their ownership stake in the LLC. Thus, the LLC tax rate is in accordance with each member’s individual income tax bracket.</span></span></p></div><div class="FTDQoV" data-dcnode-id="933"><p class="_2GMChG _3-to_p" data-dcnode-id="934"><span class="_2GMChG _3-to_p" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">If, for instance, two members in an LLC have a 50-50 ownership split, each owner will be responsible for paying taxes on half of the business’s profits. Each owner can also claim half of the tax deductions and tax credits that the LLC is eligible for, and write off half of the losses. This type of taxation works almost exactly like a partnership.</span></span></p></div><div class="FTDQoV" data-dcnode-id="929"><p class="_2GMChG _3-to_p" data-dcnode-id="930"><span class="_2GMChG _3-to_p" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">A multi-member LLC has to file certain tax forms with the IRS, including Form 1065, U.S. Return of Partnership Income—an informational return that must be filed annually with the IRS. The LLC must also give each owner a completed Schedule K-1 by March 15 of each year. The Schedule K-1 summarizes each owner’s share of LLC income, losses, credits, and deductions. Each owner will attach their Schedule K-1 to their personal income tax return that’s filed with the IRS.</span></span></p></div><div class="FTDQoV" data-dcnode-id="925"><p class="_2GMChG _3-to_p" data-dcnode-id="926"><span class="_2GMChG _3-to_p" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Pass-through taxation continues at the state and local levels. Most states have their own equivalent of Form 1065 and Schedule K-1. As mentioned above, a few states like California charge additional LLC taxes.</span></span></p></div><div class="FTDQoV" data-dcnode-id="920"><h3 class="_23_GlS _1jyA_Q _2McN3Z _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="921"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="922"><span class="_23_GlS _1jyA_Q _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Choosing corporate tax status for your LLC</span></span></span></h3></div><div class="FTDQoV" data-dcnode-id="916"><p class="_2GMChG _3-to_p" data-dcnode-id="917"><span class="_2GMChG _3-to_p" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">So far, we’ve discussed the default income tax rules for LLCs, but things can get more complicated. The members of an LLC can choose for the business to be classified as a C-corporation or S-corporation for tax purposes. The voting procedure and consent required to make this change will be reflected in the LLC operating agreement.</span></span></p></div><div class="FTDQoV" data-dcnode-id="907"><p class="_2GMChG _3-to_p" data-dcnode-id="908"><span class="_2GMChG _3-to_p" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Your LLC can opt to be taxed as a C-corporation by filing Form 8832 with the IRS (your state might also require additional forms for a change in tax status). If you make this change, your LLC will be subject to the 21% federal corporate tax rate. You’ll need to file taxes using </span></span><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1120.pdf" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Form 1120</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">, U.S. Corporation Income Tax Return. You’ll also pay state and local corporate taxes as applicable where your business is located.</span></span></p></div><div class="FTDQoV" data-dcnode-id="903"><p class="_2GMChG _3-to_p" data-dcnode-id="904"><span class="_2GMChG _3-to_p" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">To opt for S-corporation tax status, file Form 2553 with the IRS. An S-corp is taxed like a pass-through entity, similar to an LLC, with some differences in how salary and distributions from the business are taxed. To file taxes for an S-corp, submit Form 1120S, U.S. Income Tax Return for an S-corporation, to the IRS.</span></span></p></div><div class="FTDQoV" data-dcnode-id="899"><p class="_2GMChG _3-to_p" data-dcnode-id="900"><span class="_2GMChG _3-to_p" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Note that choosing corporate tax status won’t affect your LLC from a legal standpoint. Legally, your business will continue to operate as an LLC. You should consult with a tax professional to see if you’d benefit from corporate tax status. Income in a corporation is taxed differently than an LLC, and a corporation is eligible for more deductions and credits.</span></span></p></div><div class="FTDQoV" data-dcnode-id="894"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="895"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="896"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">LLC payroll taxes&nbsp;</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="890"><p class="_2GMChG _3-to_p" data-dcnode-id="891"><span class="_2GMChG _3-to_p" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">LLCs that have employees have to collect and pay payroll taxes. These taxes include unemployment taxes, social security taxes, and Medicare taxes. Employers pay unemployment taxes to fund unemployment benefit programs. Employers and employees share in the payment of social security and Medicare taxes (collectively called FICA taxes under the Federal Insurance Contributions Act). Employers have to withhold the employee share of these taxes, along with income taxes, from their employees’ paychecks.</span></span></p></div><div class="FTDQoV" data-dcnode-id="886"><p class="_2GMChG _3-to_p" data-dcnode-id="887"><span class="_2GMChG _3-to_p" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Payroll taxes are filed using IRS Form 940 and Form 941. Form 940 is filed annually and is used to report an employer’s unemployment tax obligations. Form 941 is filed on a quarterly basis. Businesses use this form to report withheld income taxes and the employer and employee’s portion of social security and Medicare taxes.</span></span></p></div><div class="FTDQoV" data-dcnode-id="877"><p class="_2GMChG _3-to_p" data-dcnode-id="878"><span class="_2GMChG _3-to_p" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">One thing to note is that these taxes aren’t paid when you file the tax forms. The IRS utilizes a pay-as-you-go system for payroll taxes, so you’ll need to deposit your payroll taxes throughout the year according to the schedule set by the IRS. Deposits can be made on the </span></span><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eftps.gov/" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Electronic Federal Tax Payment System</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node=""> (EFTPS). Unemployment taxes are deposited quarterly, whereas social security and Medicare taxes are deposited either monthly or semiweekly depending on the amount of your tax liability. The IRS instructions for Form 940 and Form 941 can help you determine your deposit schedule.</span></span></p></div><div class="FTDQoV" data-dcnode-id="873"><p class="_2GMChG _3-to_p" data-dcnode-id="874"><span class="_2GMChG _3-to_p" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">For reference, here are the current federal tax rates for unemployment taxes, social security taxes, and Medicare taxes:</span></span></p></div><div class="FTDQoV LQW3zN _3OPU_j" data-dcnode-id="866"><div class="OE0NEO fyWLSM" data-dcnode-id="867" style="width:770px;margin-left:auto;margin-right:auto;max-width:100%"><figure class="_2HF0Jk" data-dcnode-id="868"><div class="_2vhaZz" data-dcnode-id="869" style="background-color:transparent"><div class="Pwlcz9 _1hOZ19" data-dcnode-id="870"><div class="_2ol46b" data-dcnode-id="872" style="padding-top:68.18181818181819%;margin-left:-1px"></div><img alt="" class="_30WfNQ" data-dcnode-id="871" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/Screen-Shot-2021-05-14-at-10.58.35-AM-770x525.png&amp;raw"></div></div></figure></div></div><div class="FTDQoV" data-dcnode-id="862"><p class="_2GMChG _3-to_p" data-dcnode-id="863"><span class="_2GMChG _3-to_p" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Along with federal payroll taxes, states and local governments often charge additional payroll taxes. For payroll taxes that are the employee’s responsibility, you’ll have to make the necessary withholdings and remit payment to the state or locality. You’ll pay employer taxes directly to the tax agency.</span></span></p></div><div class="FTDQoV" data-dcnode-id="857"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="858"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="859"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">LLC self-employment taxes</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="853"><p class="_2GMChG _3-to_p" data-dcnode-id="854"><span class="_2GMChG _3-to_p" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Members of an LLC are not considered employees. However, under the Self Employment Contributions Act (SECA), you still owe social security and Medicare taxes to the IRS. You’ll pay these taxes directly to the IRS in the form of self-employment taxes. The total self-employment tax is 15.3%, and it’s broken down into several parts:</span></span></p></div><div class="FTDQoV" data-dcnode-id="836"><ul class="_33E9q6" data-currency="List" data-dcnode-id="837"><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="848"><div class="OE0NEO fyWLSM" data-dcnode-id="849"><p class="_2GMChG _3-to_p" data-dcnode-id="850"><span class="_2GMChG _3-to_p" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">12.4% social security tax on earnings up to $137,700</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="843"><div class="OE0NEO fyWLSM" data-dcnode-id="844"><p class="_2GMChG _3-to_p" data-dcnode-id="845"><span class="_2GMChG _3-to_p" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">2.9% Medicare tax on all earnings</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="838"><div class="OE0NEO fyWLSM" data-dcnode-id="839"><p class="_2GMChG _3-to_p" data-dcnode-id="840"><span class="_2GMChG _3-to_p" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">0.9% Medicare surtax on earnings over $200,000</span></span></p></div></li></ul></div><div class="FTDQoV" data-dcnode-id="829"><p class="_2GMChG _3-to_p" data-dcnode-id="830"><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-prior/f1040sse--2018.pdf" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Schedule SE</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node=""> will help you calculate your tax liability and should be attached to your tax return.</span></span></p></div><div class="FTDQoV" data-dcnode-id="824"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="825"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="826"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">LLC sales taxes</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="820"><p class="_2GMChG _3-to_p" data-dcnode-id="821"><span class="_2GMChG _3-to_p" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">If your LLC sells taxable goods or services, then you’ll need to collect sales tax from your customers and remit the tax to the state or local tax agency. Which goods and services are taxable depends on the state and locality where you do business. Forty-five states impose sales tax. Alaska does not levy a state sales tax, but several cities in Alaska charge local sales tax.</span></span></p></div><div class="FTDQoV" data-dcnode-id="816"><p class="_2GMChG _3-to_p" data-dcnode-id="817"><span class="_2GMChG _3-to_p" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The legal test for whether you have to collect sales tax has to do with “nexus.” Sales tax nexus means that you have enough of a connection with a state or locality that you’re obligated to collect and remit sales tax there. The connection could be a physical shop in the area, employing people in the area, or shipping goods into the area. Online businesses could be responsible for collecting sales taxes in a state simply by virtue of the fact that they ship goods there.</span></span></p></div><div class="FTDQoV" data-dcnode-id="780"><div data-dcnode-id="781"><div data-dcnode-id="782"><div data-dcnode-id="783"><div class="_2rL-0a" data-dcnode-id="784"><div class="_1iVWpW" data-dcnode-id="785"><table class="_1B1L1C" data-dcnode-id="786" tabindex="0"><tbody data-dcnode-id="787"><tr class="_3BaYKd" data-dcnode-id="788"><td class="nCNh6k" data-dcnode-id="789"><div class="OE0NEO fyWLSM _2gpzlo" data-dcnode-id="790"><div class="FTDQoV" data-dcnode-id="812"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="813"><span class="_2HGwPY _7LUqYM _2GMChG _3-to_p" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">ZenBusiness: Fast &amp; Simple LLC Formation</span></span></h2></div><div class="FTDQoV" data-dcnode-id="808"><h4 class="_2HGwPY _3ZRnke _2GMChG _34qbNm" data-currency="Text" data-dcnode-id="809"><span class="_2HGwPY _3ZRnke _2GMChG _3-to_p" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Get started for as low as $49</span></span></h4></div><div data-dcnode-id="791"><div data-dcnode-id="792"><div class="OE0NEO fyWLSM _3qaoWb" data-dcnode-id="793"><div class="OE0NEO fyWLSM _31LNO1 Ch_54P" data-dcnode-id="794" style="max-width:140px"><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/redirect/8ca87586-bd00-11ec-99aa-df5d158fac63%3Fmvt%3DMTY1MDkxNzQ1MzI2MTA4NDE1MjpkYmJkNzQ1NS1iZmRhLTQ4NGItYjUzYS04MWEyNzkxZjNiNTc6N2QxZjU5ZmZlYTcwN2FjNzI0ZWZmYzIzN2RlZDYxZDIyZjQwMTFiMGNmYTYwNDI1NTI1NTAxNTljYTBjMDY0Nw%253D%253D%26trk_channel%3Dweb%26trk_element%3Dhyperlink%26trk_location%3DMarketplaceApplyNow%26trk_nldt%3Dundefined%26trk_pagetype%3D%26trk_sectionCategory%3D%26trk_topic%3Dundefined%26trk_vertical%3DSmall%2520Business%26finish_type%3Dexternal_application%26has_prequal position%3D%26header_pageViewId%3D4c4d6923-d0a4-44de-93eb-b24b424caa16%26clickHeader_pageNumber%3D%26clickHeader_productPosition%3D%26clickHeader_productLocation%3DMarketplaceApplyNow%26clickHeader_sectionPosition%3D%26clickHeader_productId%3D8ca87586-bd00-11ec-99aa-df5d158fac63%26clickHeader_productSlug%3D%26clickHeader_linkType%3DAPPLY_NOW_BUTTON" target="_blank"><div class="_21lVPM" data-dcnode-id="799"><span class="_1zPu06" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Shop Now</span></span></div></a><p class="annotation tNDKHl _31LNO1 _1CNg5T _3QjvLE" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">on ZenBusiness's website</span></p></div></div></div></div></div></div></td></tr></tbody></table></div></div></div></div></div></div><div class="FTDQoV" data-dcnode-id="776"><p class="_2GMChG _3-to_p" data-dcnode-id="777"><span class="_2GMChG _3-to_p" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Most states follow destination-based tax rules, which means that the sales tax rate is tied to the final delivery location of the product or service. A small number of states follow origin-based tax rules, in which case the sales tax rate is tied to the location of the business which sold the good or service. Contact the departments of revenue in the areas where you sell to check the rules that apply to your business.</span></span></p></div><div class="FTDQoV" data-dcnode-id="771"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="772"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="773"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">LLC tax forms and LLC tax deadlines</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="767"><p class="_2GMChG _3-to_p" data-dcnode-id="768"><span class="_2GMChG _3-to_p" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The exact tax forms you’ll need to complete your LLC taxes depend on three things:</span></span></p></div><div class="FTDQoV" data-dcnode-id="750"><ol class="_1FP5tP" data-currency="List" data-dcnode-id="751"><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="762"><div class="OE0NEO fyWLSM" data-dcnode-id="763"><p class="_2GMChG _3-to_p" data-dcnode-id="764"><span class="_2GMChG _3-to_p" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Whether your LLC is single-member or multi-member</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="757"><div class="OE0NEO fyWLSM" data-dcnode-id="758"><p class="_2GMChG _3-to_p" data-dcnode-id="759"><span class="_2GMChG _3-to_p" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Whether you choose default (pass-through) tax status or corporate tax status for your LLC</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="752"><div class="OE0NEO fyWLSM" data-dcnode-id="753"><p class="_2GMChG _3-to_p" data-dcnode-id="754"><span class="_2GMChG _3-to_p" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Whether your LLC has employees</span></span></p></div></li></ol></div><div class="FTDQoV" data-dcnode-id="746"><p class="_2GMChG _3-to_p" data-dcnode-id="747"><span class="_2GMChG _3-to_p" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Here are the commonly used LLC tax forms and corresponding deadlines:</span></span></p></div><div class="FTDQoV LQW3zN _3OPU_j" data-dcnode-id="739"><div class="OE0NEO fyWLSM" data-dcnode-id="740" style="width:770px;margin-left:auto;margin-right:auto;max-width:100%"><figure class="_2HF0Jk" data-dcnode-id="741"><div class="_2vhaZz" data-dcnode-id="742" style="background-color:transparent"><div class="Pwlcz9 _1hOZ19" data-dcnode-id="743"><div class="_2ol46b" data-dcnode-id="745" style="padding-top:136.1038961038961%;margin-left:-1px"></div><img alt="" class="_30WfNQ" data-dcnode-id="744" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nerdwallet.com/assets/blog/wp-content/uploads/2021/05/Screen-Shot-2021-05-14-at-10.59.46-AM-770x1048.png&amp;raw"></div></div></figure></div></div><div class="FTDQoV" data-dcnode-id="720"><p class="_2GMChG _3-to_p" data-dcnode-id="721"><span class="_2GMChG _3-to_p" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Note that if a tax deadline falls on a Saturday, Sunday, or </span></span><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opm.gov/policy-data-oversight/snow-dismissal-procedures/federal-holidays/%23url%3D2019" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">federal holiday</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">, you can file the document on the next business day. Also, if you request an extension for tax filing, you’ll get an additional six months to file. For example, tax filers who request an extension to file Form 1065 will have until September 15 to do so. Use </span></span><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f4868.pdf" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Form 4868</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node=""> to request an extension if you’re a single-member LLC taxed as a disregarded entity. In all other cases, use </span></span><a class="_2GMChG eIBHSv _23_Bjp _2zmeFA" data-currency="Link" data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/i7004.pdf" rel="nofollow noopener noreferrer" target="_blank"><span class="_2GMChG _3-to_p" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Form 7004</span></span></a><span class="_2GMChG _3-to_p" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node=""> to request an extension on business tax filing.</span></span></p></div><div class="FTDQoV" data-dcnode-id="715"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="716"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="717"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">LLC tax tips for business owners</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="711"><p class="_2GMChG _3-to_p" data-dcnode-id="712"><span class="_2GMChG _3-to_p" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">It’s easy to feel overwhelmed by all the tax responsibilities an LLC might have. Fortunately, there are a few ways to lower your tax burden and make tax filing easier.</span></span></p></div><div class="FTDQoV" data-dcnode-id="707"><p class="_2GMChG _3-to_p" data-dcnode-id="708"><span class="_2GMChG _3-to_p" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Here are some tips for LLC tax filing:</span></span></p></div><div class="FTDQoV" data-dcnode-id="680"><ul class="_33E9q6" data-currency="List" data-dcnode-id="681"><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="702"><div class="OE0NEO fyWLSM" data-dcnode-id="703"><p class="_2GMChG _3-to_p" data-dcnode-id="704"><span class="_2GMChG _3-to_p" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Take advantage of any tax deductions and tax credits that your LLC is eligible for.</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="697"><div class="OE0NEO fyWLSM" data-dcnode-id="698"><p class="_2GMChG _3-to_p" data-dcnode-id="699"><span class="_2GMChG _3-to_p" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Review business tax deadlines in advance, and note relevant due dates.</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="692"><div class="OE0NEO fyWLSM" data-dcnode-id="693"><p class="_2GMChG _3-to_p" data-dcnode-id="694"><span class="_2GMChG _3-to_p" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Hire a certified public accountant or tax professional to assist you with tax filing.</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="687"><div class="OE0NEO fyWLSM" data-dcnode-id="688"><p class="_2GMChG _3-to_p" data-dcnode-id="689"><span class="_2GMChG _3-to_p" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Talk with your CPA or tax professional about the potential benefits of electing corporation tax status for your LLC.</span></span></p></div></li><li class="_2vhrLT vMzlLC _30uTzW" data-dcnode-id="682"><div class="OE0NEO fyWLSM" data-dcnode-id="683"><p class="_2GMChG _3-to_p" data-dcnode-id="684"><span class="_2GMChG _3-to_p" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Understand your state and locality’s tax requirements.</span></span></p></div></li></ul></div><div class="FTDQoV" data-dcnode-id="676"><p class="_2GMChG _3-to_p" data-dcnode-id="677"><span class="_2GMChG _3-to_p" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Porter says that understanding your LLC’s tax setup in the beginning is important. “Common mistakes are not engaging a CPA that is familiar with the tax rules surrounding LLCs. It’s much easier and cheaper in the long run to set up the LLC correctly the first time and make the valid elections for the LLC to be taxed as the business owner wishes.”</span></span></p></div><div class="FTDQoV" data-dcnode-id="671"><h2 class="_2HGwPY _7LUqYM _2GMChG _1VhA5C" data-currency="Text" data-dcnode-id="672"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="673"><span class="_2HGwPY _7LUqYM _3Rmqs8 _2GMChG _3-to_p" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The bottom line</span></span></span></h2></div><div class="FTDQoV" data-dcnode-id="667"><p class="_2GMChG _3-to_p" data-dcnode-id="668"><span class="_2GMChG _3-to_p" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">As you now know, there are several types of LLC taxes that you might be responsible for. With so many obligations to remember, it’s important to stay organized so that you file the correct forms and pay your LLC taxes at the correct time. If you need extra time to file your LLC taxes, request an extension so you don’t have to pay any penalties. With taxes taken care of, you’ll be able to focus on what matters most—running a stellar small business and making your customers happy.</span></span></p></div><div class="FTDQoV" data-dcnode-id="648"><div class="_1iGWeE _1sn0sC _2vFBK3 _3zTr2E i8Cfcr _3ObXKb qmOFJy ofD6p9 _3GWRCj _32wcXa _1GAd2m VLeEaR _1f2lGt" data-dcnode-id="649"><div class="_2Tcwop _2vFBK3 _3PfUjB _3zTr2E i8Cfcr OE0NEO _3JCdHo" data-dcnode-id="650"><div class="_2vFBK3 _3zTr2E _3nZuoR _1EqXL- _2wSwha _2QtC2m _1Q1s6a" data-dcnode-id="664"><p class="DWu0fb _2tSPex _2GMChG _2aa7Uj" data-currency="Title" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">How Much Do You Need?</span></p></div><div class="_2vFBK3 _3PfUjB _3zIi26" data-dcnode-id="651"><div class="_2vFBK3 _10WMF- _1LsNR- _2QtC2m _1Q1s6a" data-dcnode-id="661"><label class="_2QtC2m XnM6hD" data-dcnode-id="662" for="article-client-26-1"><input class="KJhnAs _1LkDEy _16NzbZ _2QtC2m uPWgSa" data-dcnode-id="663" id="article-client-26-1" maxlength="13" placeholder="$" type="tel" value=""></label></div><div class="_2QtC2m _1Q1s6a" data-dcnode-id="652"><button class="_2nYXVh _1J48pr _29Q6OF" data-currency="Button" data-dcnode-id="656" type="button"><
