</span><h1 data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">LLC Taxes - How is an LLC Taxed?</span></h1><span data-dcnode-id="1785" instrument_node="">
</span><p class="header-subtitle" data-dcnode-id="1784" style="font-size:1.8rem"></p><span data-dcnode-id="1783" instrument_node="">
</span></div><span data-dcnode-id="1781" instrument_node="">
</span><div class="row" data-dcnode-id="1747"><span data-dcnode-id="1780" instrument_node="">
</span><div class="col-lg-5 offset-lg-1" data-dcnode-id="1758"><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1778" instrument_node="">A limited liability company&nbsp;</span><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">(LLC)</span></strong><span data-dcnode-id="1775" instrument_node="">&nbsp;doesn't pay taxes&nbsp;at the business level. Instead, LLC income passes through to the member's personal income tax return.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">This allows LLCs to avoid the double taxation of a corporation while still having the benefit of limited liability protection.&nbsp;</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1769" instrument_node="">Learn&nbsp;the basics in our </span><strong data-dcnode-id="1766"><em data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">LLC Taxes</span></em></strong><span data-dcnode-id="1765" instrument_node=""> -&nbsp;</span><em data-dcnode-id="1762"><strong data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">How is an LLC Taxed</span></strong></em><span data-dcnode-id="1761" instrument_node="">&nbsp;guide below.</span></p><span data-dcnode-id="1759" instrument_node="">

</span><h2 data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">LLC Taxes</span></h2><span data-dcnode-id="1696" instrument_node="">
</span><div class="row" data-dcnode-id="1674"><span data-dcnode-id="1695" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1676"><span data-dcnode-id="1694" instrument_node="">
</span><h3 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">LLC Tax Basics</span></h3><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">By default, LLCs are treated as a pass-through entity for federal income tax purposes. This means LLCs don't pay federal income taxes at the business level. LLC income passes through to members' personal income tax returns based on their percentage of ownership as it's laid out in the </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-an-llc-operating-agreement%23%3A~%3Atext%3DAn%2520LLC%2520Operating%2520Agreement%2520is%2Cand%2520between%2520members%2520and%2520managers." target="_blank"><span data-dcnode-id="1689" instrument_node="">LLC operating agreement</span></a><span data-dcnode-id="1687" instrument_node="">. The income is then subject to individual income tax rates.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node="">Payments made to members are called distributions or draws. Distributions are subject to self-employment taxes. For some LLCs, it might make sense to </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/elect-s-corp-tax-status-for-your-llc" target="_blank"><span data-dcnode-id="1683" instrument_node="">elect S corporation tax status</span></a><span data-dcnode-id="1681" instrument_node=""> to reduce self-employment taxes.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1678"></p><span data-dcnode-id="1677" instrument_node="">
</span></div><span data-dcnode-id="1675" instrument_node="">
</span></div><span data-dcnode-id="1673" instrument_node="">
</span><div class="row" data-dcnode-id="1637"><span data-dcnode-id="1672" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1639"><span data-dcnode-id="1671" instrument_node="">
</span><h3 data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Single-Member LLC Taxes</span></h3><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1664"><a data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/single-member-taxes" target="_blank" title="Go to Taxes for Single-Member LLCs"><span data-dcnode-id="1667" instrument_node="">Single-member LLCs</span></a><span data-dcnode-id="1665" instrument_node=""> are taxed by the IRS as “Disregarded Entities.” This just means the IRS ignores the structure of your business (i.e., the fact that it's a single-member LLC) and taxes you like it does a sole proprietorship. The LLC’s income is reported on your personal tax return at the end of the year.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">With your LLC income, you can pay yourself with a distribution. You will have to pay self-employment taxes on your distribution but, because you already paid income tax on the LLC’s total profits, you do not have to pay income tax on the distribution. This process is explained more in our </span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/how-do-i-pay-myself-in-an-llc%23smllc" target="_blank"><span data-dcnode-id="1661" instrument_node="">How Do I Pay Myself From My LLC</span></a><span data-dcnode-id="1659" instrument_node="">&nbsp;guide.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><h4 data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">If the IRS treats my single-member LLC as a disregarded entity, do I still get the benefits of being an LLC?</span></h4><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Yes.&nbsp;Even though the IRS ignores the LLC structure when it comes to taxation, don’t worry—you still get the benefits of personal asset protection and deduction of business expenses.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">To ensure you get these benefits, you should conduct your business in a formal way. These basic rules are outlined in our </span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/maintain-llc-corporate-veil" target="_blank"><span data-dcnode-id="1649" instrument_node="">LLC corporate veil</span></a><span data-dcnode-id="1647" instrument_node="">&nbsp;article.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1641"><picture data-dcnode-id="1642"><source data-dcnode-id="1644" data-srcset="https://cdn2.howtostartanllc.com/images/tax/diagram/single-member-llc-diagram.webp" srcset="https://cdn2.howtostartanllc.com/images/tax/diagram/single-member-llc-diagram.webp" type="image/webp"><img alt="A diagram showing which forms a single member LLC needs" class="img-fluid center-block lazyloaded" data-dcnode-id="1643" data-src="https://cdn2.howtostartanllc.com/images/tax/diagram/single-member-llc-diagram.jpg" height="391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.howtostartanllc.com/images/tax/diagram/single-member-llc-diagram.jpg&amp;raw" width="608"></picture></p><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node="">
</span><div class="row" data-dcnode-id="1611"><span data-dcnode-id="1635" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1613"><span data-dcnode-id="1634" instrument_node="">
</span><h3 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Multi-Member LLC Taxes</span></h3><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1630" instrument_node="">A </span><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/multi-member-taxes" target="_blank" title="Learn how to file taxes for an LLC partnership"><span data-dcnode-id="1629" instrument_node="">multi-member LLC</span></a><span data-dcnode-id="1627" instrument_node=""> is typically taxed as a partnership by the IRS. This means that LLCs&nbsp;don't pay federal income taxes to the IRS and all profits are passed through to the members of the LLC as per the partnership operating agreement. The members of the LLC then pay the taxes to the IRS on their individual tax returns.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">Like single-member LLCs, each owner in a multi-member LLC can take a distribution from their share of the LLC’s profits. This process is explained more in our&nbsp;</span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/how-do-i-pay-myself-in-an-llc%23smllc" target="_blank"><span data-dcnode-id="1623" instrument_node="">How Do I Pay Myself From My LLC</span></a><span data-dcnode-id="1621" instrument_node="">&nbsp;guide.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1615"><picture data-dcnode-id="1616"><source data-dcnode-id="1618" data-srcset="https://cdn2.howtostartanllc.com/images/tax/diagram/multi-member-llc-diagram.webp" srcset="https://cdn2.howtostartanllc.com/images/tax/diagram/multi-member-llc-diagram.webp" type="image/webp"><img alt="A chart showing which forms members of a multi member LLC must fill out" class="img-fluid center-block lazyloaded" data-dcnode-id="1617" data-src="https://cdn2.howtostartanllc.com/images/tax/diagram/multi-member-llc-diagram.jpg" height="391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.howtostartanllc.com/images/tax/diagram/multi-member-llc-diagram.jpg&amp;raw" width="621"></picture></p><span data-dcnode-id="1614" instrument_node="">
</span></div><span data-dcnode-id="1612" instrument_node="">
</span></div><span data-dcnode-id="1610" instrument_node="">
</span><h2 data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Other LLC Tax Structures: S Corp and C Corp</span></h2><span data-dcnode-id="1607" instrument_node="">
</span><div class="row" data-dcnode-id="1566"><span data-dcnode-id="1606" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1568"><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">For most people starting an LLC, the default tax structures—“disregarded entity” for single-member LLCs or “partnership” for multi-member LLCs—are probably the most appropriate. These are the standard tax structures for limited liability companies and do not require a special election when forming.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1601" instrument_node="">However, under certain circumstances, both single-member LLCs and multi-member LLCs can also elect to be taxed like a </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-vs-corporation-taxes" target="_blank" title="Learn about LLC vs corporation taxes"><span data-dcnode-id="1600" instrument_node="">corporation</span></a><span data-dcnode-id="1598" instrument_node="">. The two corporate tax classifications are C corporation (</span><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">C&nbsp;corp)</span></strong><span data-dcnode-id="1595" instrument_node=""> and S Corporation (</span><strong data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">S&nbsp;corp)</span></strong><span data-dcnode-id="1592" instrument_node="">.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">A </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/what-is-a-c-corp" target="_blank" title="What is a C Corp?"><span data-dcnode-id="1588" instrument_node="">C&nbsp;corporation</span></a><span data-dcnode-id="1586" instrument_node="">&nbsp;pays taxes on gross income minus all operating expenses. They then distribute profits to shareholders, and shareholders pay income tax on the dividends. This is also known as "double-taxation.”</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1583" instrument_node="">An </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-an-s-corporation" target="_blank" title="What is an S Corporation?"><span data-dcnode-id="1582" instrument_node="">S&nbsp;corporation</span></a><span data-dcnode-id="1580" instrument_node="">&nbsp;allows the member(s) of a company to save on taxes. It is a tax classification with specific rules that can be beneficial to your company if your business earnings are significant. However, before making a decision, it’s important to understand the basics of an S corp and what changes may be in store for your business if you decide to&nbsp;</span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/elect-s-corp-tax-status-for-your-llc" target="_blank" title="Why choose S corp status for your LLC?"><span data-dcnode-id="1579" instrument_node="">elect S corp status</span></a><span data-dcnode-id="1577" instrument_node="">.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">Selecting these tax structures can be done when you apply for an </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-an-ein" target="_blank" title="What is an EIN?"><span data-dcnode-id="1573" instrument_node="">EIN (Employer Identification Number)</span></a><span data-dcnode-id="1571" instrument_node=""> for your LLC or at a later time.</span></p><span data-dcnode-id="1569" instrument_node="">

</span><h2 data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">LLC Federal Income Taxes</span></h2><span data-dcnode-id="1374" instrument_node="">
</span><div class="row" data-dcnode-id="1310"><span data-dcnode-id="1373" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1312"><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Regardless of which tax designation you elect for your LLC, you still have to file with the IRS.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1365"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">All owners will have to fill out&nbsp;Form 1040</span></strong><span data-dcnode-id="1366" instrument_node="">—your individual income tax return—and its appropriate schedules:</span></p><span data-dcnode-id="1364" instrument_node="">
</span><ul data-dcnode-id="1357"><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1359"><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040sc.pdf" target="_blank" title="Profit or Loss From Business (IRS.gov)"><span data-dcnode-id="1362" instrument_node="">Schedule C:</span></a><span data-dcnode-id="1360" instrument_node="">&nbsp;The form for&nbsp;reporting income specifically from your business.</span></li><span data-dcnode-id="1358" instrument_node="">
</span></ul><span data-dcnode-id="1356" instrument_node="">
</span><ul data-dcnode-id="1349"><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1351"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040sse.pdf" target="_blank" title="Self-Employment Tax"><span data-dcnode-id="1354" instrument_node="">Schedule SE</span></a><span data-dcnode-id="1352" instrument_node="">:&nbsp;The form for&nbsp;filing and paying your self-employment taxes.</span></li><span data-dcnode-id="1350" instrument_node="">
</span></ul><span data-dcnode-id="1348" instrument_node="">
</span><ul data-dcnode-id="1341"><span data-dcnode-id="1347" instrument_node="">
</span><li data-dcnode-id="1343"><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040se.pdf" target="_blank" title="Supplemental Income and Loss"><span data-dcnode-id="1346" instrument_node="">Schedule E</span></a><span data-dcnode-id="1344" instrument_node="">: The form&nbsp;for&nbsp;reporting any income from rental properties and other investments.</span></li><span data-dcnode-id="1342" instrument_node="">
</span></ul><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Multi-member LLCs and special entities will need to file more than that. Partnerships, in addition to Form 1040, must also file the following:</span></p><span data-dcnode-id="1337" instrument_node="">
</span><ul data-dcnode-id="1330"><span data-dcnode-id="1336" instrument_node="">
</span><li data-dcnode-id="1332"><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1065sk1.pdf" target="_blank" title="Schedule K-1 (Form 1065)"><span data-dcnode-id="1335" instrument_node="">Form 1065</span></a><span data-dcnode-id="1333" instrument_node="">: The form used to report&nbsp;your business’s gains and losses.</span></li><span data-dcnode-id="1331" instrument_node="">
</span></ul><span data-dcnode-id="1329" instrument_node="">
</span><ul data-dcnode-id="1322"><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1324"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1041sk1.pdf" target="_blank" title="Schedule K-1 (Form 1041)"><span data-dcnode-id="1327" instrument_node="">Schedule K-1:</span></a><span data-dcnode-id="1325" instrument_node="">&nbsp;The form&nbsp;for reporting your share of the profits as an individual owner.</span></li><span data-dcnode-id="1323" instrument_node="">
</span></ul><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">Check out our guide to filing&nbsp;</span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/how-to-file" target="_blank" title="Read our guide to choosing a tax status"><span data-dcnode-id="1319" instrument_node="">federal LLC taxes</span></a><span data-dcnode-id="1317" instrument_node="">&nbsp;to see a full list of necessary&nbsp;forms for&nbsp;both single-member LLCs and multi-member LLCs.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1314"></p><span data-dcnode-id="1313" instrument_node="">
</span></div><span data-dcnode-id="1311" instrument_node="">
</span></div><span data-dcnode-id="1309" instrument_node="">
</span><h2 data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">LLC State Income Taxes</span></h2><span data-dcnode-id="1306" instrument_node="">
</span><div class="row" data-dcnode-id="1238"><span data-dcnode-id="1305" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1240"><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Because LLCs are typically “pass-through” entities, they do not have to pay separate state taxes. That is, the individual members pay state taxes; not the LLC itself.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Here are some of the common forms of state tax:</span></p><span data-dcnode-id="1298" instrument_node="">
</span><ul data-dcnode-id="1291"><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1293"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Franchise Tax:</span></strong><span data-dcnode-id="1294" instrument_node="">&nbsp;Some states require this tax, which is based on how much an LLC earns per year.</span></li><span data-dcnode-id="1292" instrument_node="">
</span></ul><span data-dcnode-id="1290" instrument_node="">
</span><ul data-dcnode-id="1281"><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1283"><strong data-dcnode-id="1285"><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/sales-tax-guide" target="_blank"><span data-dcnode-id="1288" instrument_node="">Sales and Use Tax</span></a><span data-dcnode-id="1286" instrument_node="">:</span></strong><span data-dcnode-id="1284" instrument_node="">&nbsp;If you sell physical products, consumers pay this tax to you and you pay this tax to your respective state or local governments.</span></li><span data-dcnode-id="1282" instrument_node="">
</span></ul><span data-dcnode-id="1280" instrument_node="">
</span><ul data-dcnode-id="1273"><span data-dcnode-id="1279" instrument_node="">
</span><li data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Gross Receipts Tax:</span></strong><span data-dcnode-id="1276" instrument_node="">&nbsp;While similar to a sales tax, a gross receipts tax is paid by the seller rather than the buyer.</span></li><span data-dcnode-id="1274" instrument_node="">
</span></ul><span data-dcnode-id="1272" instrument_node="">
</span><ul data-dcnode-id="1265"><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1267"><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Withholding Tax:</span></strong><span data-dcnode-id="1268" instrument_node="">&nbsp;This is income that is withheld from employee paychecks and paid to the government.</span></li><span data-dcnode-id="1266" instrument_node="">
</span></ul><span data-dcnode-id="1264" instrument_node="">
</span><ul data-dcnode-id="1257"><span data-dcnode-id="1263" instrument_node="">
</span><li data-dcnode-id="1259"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Unemployment Insurance (UI) Tax:</span></strong><span data-dcnode-id="1260" instrument_node="">&nbsp;UI is used for unemployment benefits. Tax rates are set by state law.</span></li><span data-dcnode-id="1258" instrument_node="">
</span></ul><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1255" instrument_node="">You can find out more&nbsp;in our detailed </span><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/business-taxes" target="_blank"><span data-dcnode-id="1254" instrument_node="">guide to state LLC taxes</span></a><span data-dcnode-id="1252" instrument_node="">. You can also read our&nbsp;</span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc" target="_blank" title="How to Form an LLC"><span data-dcnode-id="1251" instrument_node="">How to</span></a><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc" target="_blank" title="How to Form an LLC"><span data-dcnode-id="1249" instrument_node=""> For</span></a><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc" target="_blank" title="How to Form an LLC"><span data-dcnode-id="1247" instrument_node="">m</span></a><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc" target="_blank" title="How to Form an LLC"><span data-dcnode-id="1245" instrument_node=""> an LLC</span></a><span data-dcnode-id="1243" instrument_node=""> guides to learn more about LLC taxes by state.</span></p><span data-dcnode-id="1241" instrument_node="">
</span></div><span data-dcnode-id="1239" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span><h2 data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">LLC Business Expenses</span></h2><span data-dcnode-id="1234" instrument_node="">
</span><div class="row" data-dcnode-id="1193"><span data-dcnode-id="1233" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1195"><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">As a business, you are able to deduct certain expenses from your taxes. The IRS says that a deductible business expense is both “ordinary and necessary.” In other words, your business can write off any expenses that help your business succeed.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Tax-deductible expenses can include a variety of purchases; these are just a few common examples:</span></p><span data-dcnode-id="1226" instrument_node="">
</span><ul data-dcnode-id="1209"><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Office supplies</span></li><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Rent and general maintenance</span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Licenses and permits</span></li><span data-dcnode-id="1216" instrument_node="">
</span><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Advertising</span></li><span data-dcnode-id="1213" instrument_node="">
</span><li data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Insurance</span></li><span data-dcnode-id="1210" instrument_node="">
</span></ul><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Some expenses, such as travel and entertainment-related purchases, are harder to deduct. These categories have spending limits, additional terms, or must be capitalized.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Of course, expenses are only deductible if they are “appropriate.” You might think a rooftop Jacuzzi is important for maintaining your business, but the IRS probably won’t agree with you unless you’re a Jacuzzi-selling business.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">You can&nbsp;check out our </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/tax-deductible-business-expenses" target="_blank"><span data-dcnode-id="1200" instrument_node="">business expense</span></a><span data-dcnode-id="1198" instrument_node=""> guide for&nbsp;a complete list of basic and complex deductions.</span></p><span data-dcnode-id="1196" instrument_node="">
</span></div><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1192" instrument_node="">
</span><h2 data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">LLC Bookkeeping and Accounting</span></h2><span data-dcnode-id="1189" instrument_node="">
</span><div class="row" data-dcnode-id="1142"><span data-dcnode-id="1188" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1144"><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">It’s important to make sure your books are in order to </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/maintain-llc-corporate-veil" target="_blank"><span data-dcnode-id="1185" instrument_node="">protect your corporate veil</span></a><span data-dcnode-id="1183" instrument_node="">.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Separate your personal matters from your business expenses as much as possible. You can do this by:</span></p><span data-dcnode-id="1178" instrument_node="">
</span><ul data-dcnode-id="1170"><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">Opening a separate </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/why-you-need-a-business-bank-account" target="_blank" title="Why You Need a Business Bank Account"><span data-dcnode-id="1175" instrument_node="">business bank account</span></a><span data-dcnode-id="1173" instrument_node="">.</span></li><span data-dcnode-id="1171" instrument_node="">
</span></ul><span data-dcnode-id="1169" instrument_node="">
</span><ul data-dcnode-id="1161"><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Obtaining a </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/how-to-get-a-business-credit-card" target="_blank" title="How to Get a Business Credit Card"><span data-dcnode-id="1166" instrument_node="">business credit card</span></a><span data-dcnode-id="1164" instrument_node=""> for work-related purchases.</span></li><span data-dcnode-id="1162" instrument_node="">
</span></ul><span data-dcnode-id="1160" instrument_node="">
</span><ul data-dcnode-id="1152"><span data-dcnode-id="1159" instrument_node="">
</span><li data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">Creating a solid bookkeeping system - A high-quality </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/why-accounting-is-important" target="_blank" title="Why Accounting is Important for Your Business"><span data-dcnode-id="1157" instrument_node="">accounting</span></a><span data-dcnode-id="1155" instrument_node=""> program can help keep track of your expenses and make the process simple and relatively pain-free. You can also hire an accountant.</span></li><span data-dcnode-id="1153" instrument_node="">
</span></ul><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">Check out our </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/business-bookkeeping" target="_blank" title="The Guide to Small Business Bookkeeping"><span data-dcnode-id="1149" instrument_node="">Guide to Small Business Bookkeeping</span></a><span data-dcnode-id="1147" instrument_node=""> to learn more.</span></p><span data-dcnode-id="1145" instrument_node="">
</span></div><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span><div class="row" data-dcnode-id="1116"><span data-dcnode-id="1140" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1118"><span data-dcnode-id="1139" instrument_node="">
</span><div class="well cta-well row" data-dcnode-id="1120"><span data-dcnode-id="1138" instrument_node="">
</span><div class="col-2 col-sm-1" data-dcnode-id="1134"><span data-dcnode-id="1137" instrument_node="">
</span><img alt="The Truic Flame Logo" class="img-fluid lazyload well-icon" data-dcnode-id="1136" data-src="https://cdn2.howtostartanllc.com/images/truic-well-logo.svg" height="150" width="87"><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span><div class="col-10 col-sm-11" data-dcnode-id="1122"><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1128"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Recommended:</span></strong><span data-dcnode-id="1129" instrument_node=""> A business accountant service can help you avoid overpaying taxes, manage bookkeeping, issue payroll, and more. Schedule a consultation with a business accountant today to find out how much time and money your business could save.</span></p><span data-dcnode-id="1127" instrument_node=""> </span><p class="text-center" data-dcnode-id="1124"><a class="btn-lg btn btn-primary text-uppercase" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//appwiki.nl/link/brand/bAzhx6dxAPof3x9tHJ5HjK6wszPFxbul%3Fsub1%3Dhtsl_taxes_llc-taxes_middle" rel="nofollow" target="_blank" title="Link to Freshbooks"><span data-dcnode-id="1126" instrument_node="">Accounting services</span></a></p><span data-dcnode-id="1123" instrument_node="">
</span></div><span data-dcnode-id="1121" instrument_node="">

</span><section class="container content-wrapper content-divider" data-dcnode-id="912"><span data-dcnode-id="1112" instrument_node=""> </span><h2 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">LLC Taxes FAQ</span></h2><span data-dcnode-id="1109" instrument_node="">
</span><div class="row" data-dcnode-id="1086"><span data-dcnode-id="1108" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1088"><span data-dcnode-id="1107" instrument_node="">
</span><h4 data-dcnode-id="1105" style="font-weight:600"><span data-dcnode-id="1106" instrument_node="">
                                                What tax classification is an LLC?
                                            </span></h4><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1103" instrument_node="">An LLC is classified by default as either a </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">disregarded entity</span></strong><span data-dcnode-id="1100" instrument_node=""> (for single-member LLCs) or a </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">partnership</span></strong><span data-dcnode-id="1097" instrument_node=""> (multi-member LLCs). However, LLCs can elect to be classified as a </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">C corp</span></strong><span data-dcnode-id="1094" instrument_node=""> or </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">S corp</span></strong><span data-dcnode-id="1091" instrument_node="">.</span></p><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span></div><span data-dcnode-id="1085" instrument_node="">
</span><div class="row" data-dcnode-id="1019"><span data-dcnode-id="1084" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1021"><span data-dcnode-id="1083" instrument_node="">
</span><h4 data-dcnode-id="1081" style="font-weight:600"><span data-dcnode-id="1082" instrument_node="">
                                                Do I file my LLC and personal taxes together?
                                            </span></h4><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">It depends on your structure.&nbsp;</span></p><span data-dcnode-id="1077" instrument_node="">
</span><ul data-dcnode-id="1064"><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1066"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/single-member-taxes" target="_blank"><span data-dcnode-id="1075" instrument_node="">Single-member LLCs</span></a><span data-dcnode-id="1073" instrument_node=""> taxed as a disregarded entity file their business income on </span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Schedule C</span></strong><span data-dcnode-id="1070" instrument_node="">, which is submitted with their individual tax return (</span><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Form 1040</span></strong><span data-dcnode-id="1067" instrument_node="">).</span></li><span data-dcnode-id="1065" instrument_node="">
</span></ul><span data-dcnode-id="1063" instrument_node="">
</span><ul data-dcnode-id="1050"><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1052"><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-taxes/multi-member-taxes" target="_blank"><span data-dcnode-id="1061" instrument_node="">Multi-member LLCs</span></a><span data-dcnode-id="1059" instrument_node=""> taxed as a partnership file the total business’s income on </span><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Form 1065</span></strong><span data-dcnode-id="1056" instrument_node="">, and each partner reports their individual profits on </span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Schedule K-1</span></strong><span data-dcnode-id="1053" instrument_node=""> as well as their individual tax return.</span></li><span data-dcnode-id="1051" instrument_node="">
</span></ul><span data-dcnode-id="1049" instrument_node="">
</span><ul data-dcnode-id="1038"><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">LLCs that choose to be taxed as a </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/what-is-a-c-corp" target="_blank"><span data-dcnode-id="1046" instrument_node="">C corp</span></a><span data-dcnode-id="1044" instrument_node=""> file </span><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Form 1120</span></strong><span data-dcnode-id="1041" instrument_node=""> and the owners do NOT report business income on their individual tax return.&nbsp;</span></li><span data-dcnode-id="1039" instrument_node="">
</span></ul><span data-dcnode-id="1037" instrument_node="">
</span><ul data-dcnode-id="1023"><span data-dcnode-id="1036" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1035" instrument_node="">LLCs that choose to be taxed as an </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-an-s-corporation" target="_blank"><span data-dcnode-id="1034" instrument_node="">S corp</span></a><span data-dcnode-id="1032" instrument_node=""> file </span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Form 1120S</span></strong><span data-dcnode-id="1029" instrument_node=""> and the owners report their individual share of income on </span><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Schedule K-1</span></strong><span data-dcnode-id="1026" instrument_node=""> as well as their individual tax return.</span></li><span data-dcnode-id="1024" instrument_node="">
</span></ul><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">
</span></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="row" data-dcnode-id="998"><span data-dcnode-id="1017" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="1000"><span data-dcnode-id="1016" instrument_node="">
</span><h4 data-dcnode-id="1014" style="font-weight:600"><span data-dcnode-id="1015" instrument_node="">
                                                Is owning an LLC considered self-employed?
                                            </span></h4><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Yes. LLCs are taxed as pass-through entities just like if you were an independent contractor or sole proprietor.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1009" instrument_node="">If taxed as a </span><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">disregarded entity</span></strong><span data-dcnode-id="1006" instrument_node=""> or a </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">partnership</span></strong><span data-dcnode-id="1003" instrument_node="">, LLC owners must make quarterly income tax payments to the IRS (and state, if applicable) as well as list their self-employment tax amount on their personal tax returns.</span></p><span data-dcnode-id="1001" instrument_node="">
</span></div><span data-dcnode-id="999" instrument_node="">
</span></div><span data-dcnode-id="997" instrument_node="">
</span><div class="row" data-dcnode-id="973"><span data-dcnode-id="996" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="975"><span data-dcnode-id="995" instrument_node="">
</span><h4 data-dcnode-id="993" style="font-weight:600"><span data-dcnode-id="994" instrument_node="">
                                                Do I have to pay taxes on an LLC that made no money?
                                            </span></h4><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">LLCs with no business activity that are taxed as either a disregarded entity or a partnership do not have to file their LLC income.&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Single-member LLCs</span></strong><span data-dcnode-id="986" instrument_node=""> with no business activity do not have to file their LLC income on Schedule C, but may have to report any other non-LLC self-employment income on Schedule C.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="980"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Multi-member LLCs</span></strong><span data-dcnode-id="981" instrument_node=""> with no business activity do not have to file a partnership return unless the LLC wishes to claim any expenses.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">LLCs that elect to be taxed as a corporation will need to submit an annual corporate tax return regardless of business activity.</span></p><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span></div><span data-dcnode-id="972" instrument_node="">
</span><div class="row" data-dcnode-id="961"><span data-dcnode-id="971" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="963"><span data-dcnode-id="970" instrument_node="">
</span><h4 data-dcnode-id="968" style="font-weight:600"><span data-dcnode-id="969" instrument_node="">
                                                Can I file my own LLC taxes?
                                            </span></h4><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Yes. You can file your own business tax returns for your business, or you can use tax preparation software.</span></p><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span><div class="row" data-dcnode-id="938"><span data-dcnode-id="959" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="940"><span data-dcnode-id="958" instrument_node="">
</span><h4 data-dcnode-id="956" style="font-weight:600"><span data-dcnode-id="957" instrument_node="">
                                                Is an LLC better for taxes?
                                            </span></h4><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">An LLC has the option to choose between tax structures, allowing them to pick the one that benefits them the most.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">LLCs benefit from </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/llc-pass-through-taxation" target="_blank"><span data-dcnode-id="950" instrument_node="">pass-through taxation</span></a><span data-dcnode-id="948" instrument_node=""> by default, meaning that the LLC’s profits pass directly to the members and are reported on the members’ tax returns.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">However, LLCs can elect to be taxed as a corporation to avoid self-employment tax, receive potential tax deductions, and look overall more appealing to investors.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="942"></p><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><div class="row" data-dcnode-id="914"><span data-dcnode-id="936" instrument_node="">
</span><div class="col-md-8 offset-md-2" data-dcnode-id="916"><span data-dcnode-id="935" instrument_node="">
</span><h4 data-dcnode-id="933" style="font-weight:600"><span data-dcnode-id="934" instrument_node="">
                                                How do I convert my LLC to an S corp?
                                            </span></h4><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">You can convert your LLC to an S corporation (S corp) by completing </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/form-2553-instructions" target="_blank"><span data-dcnode-id="930" instrument_node="">Form 2553</span></a><span data-dcnode-id="928" instrument_node=""> and filing it with the Internal Revenue Service.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="925" instrument_node="">To learn more about whether electing the S corp tax classification is right for your LLC, visit our </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/form-an-llc/llc-vs-s-corp-whats-the-difference" target="_blank"><span data-dcnode-id="924" instrument_node="">LLC vs S Corp</span></a><span data-dcnode-id="922" instrument_node=""> guide.</span><br data-dcnode-id="921"><br data-dcnode-id="920"><br data-dcnode-id="919"></p><span data-dcnode-id="917" instrument_node="">
</span></div><span data-dcnode-id="915" instrument_node="">
</span></div><span data-dcnode-id="913" instrument_node="">
