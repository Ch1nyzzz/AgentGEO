</span><h1 class="leading-9 text-5xl tracking-2 font-extrabold md:tracking-1 md:leading-10 md:text-6xl" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">How to File LLC Taxes</span></h1><span data-dcnode-id="1339" instrument_node="">
</span><p class="leading-4 text-lg tracking-10" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">If your business is organized as an LLC, it may be taxed as a sole proprietorship, a partnership, or a corporation, and you may be responsible for self-employment taxes in addition to federal and state income tax.
</span></p><span data-dcnode-id="1336" instrument_node="">
</span><div class="grid grid-cols-12 my-2 lg:mb-3" data-dcnode-id="1286"><span data-dcnode-id="1335" instrument_node="">

by&nbsp;Jane Haskins, Esq.</span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">
updated&nbsp;</span><span data-dcnode-id="1330" id="article-updated-time"><span data-dcnode-id="1331" instrument_node="">May 31, 2022</span></span><span data-dcnode-id="1329" instrument_node="">&nbsp;·&nbsp; </span><span data-dcnode-id="1327" id="article-read-time"><span data-dcnode-id="1328" instrument_node="">4</span></span><span data-dcnode-id="1326" instrument_node="">min read

</span><div class="article-content mb-3 lg:mb-5" data-dcnode-id="1182" id="article-content"><span data-dcnode-id="1284" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="1184" property="schema:text"><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">From a tax standpoint, limited liability companies are like hermit crabs. With no tax classification of their own, they inhabit the tax homes of other types of businesses, and they can choose and change the way they are taxed.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">This tax flexibility is one of the things that make LLCs so appealing for small business owners. But if you’re just starting out, the LLC tax filing process can seem confusing.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">LLCs can choose to be taxed like sole proprietorships, partnerships or corporations. It’s important to understand the differences between them because the way your business is taxed can affect both your total tax bill and your </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalzoom.com/articles/reduce-self-employment-taxes-with-a-corporation-or-llc"><span data-dcnode-id="1276" instrument_node="">obligation to pay self-employment tax</span></a><span data-dcnode-id="1274" instrument_node="">.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><img alt="tax return document" data-dcnode-id="1271" data-entity-type="file" data-entity-uuid="96b0e55d-2035-4d72-8931-735709ce2d57" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalzoom.com/sites/lz.com/files/inline-images/xtax-return.jpg.pagespeed.ic.OO9LmsJqYf.jpg&amp;raw" width="840"></p><span data-dcnode-id="1269" instrument_node="">
</span><h2 data-dcnode-id="1267" data-toc="1" id="article1" tabindex="-1"><span data-dcnode-id="1268" instrument_node="">How Are LLCs Taxed?</span></h2><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Because LLCs are a relatively new type of business entity, the Internal Revenue Service has not established a tax classification for them. Therefore, while there are forms and procedures for corporate tax returns, there is no such thing as an LLC tax return form.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><blockquote data-dcnode-id="1258"><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">That doesn’t mean that limited liability company income isn’t taxed. It just means that LLCs are taxed as though they were a different kind of entity.</span></p><span data-dcnode-id="1259" instrument_node="">
</span></blockquote><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">If your LLC has only one owner (known as a “member”), the IRS will automatically treat your LLC like a sole proprietorship. If your LLC has more than one member, the IRS automatically treats it like a general partnership.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">However, if you’d prefer to have your LLC taxed like a corporation, you can change its tax status by filing a form with the IRS.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><h2 data-dcnode-id="1249" data-toc="2" id="article2" tabindex="-1"><span data-dcnode-id="1250" instrument_node="">The Single-Member LLC Tax Return</span></h2><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">A single-member LLC that is taxed like a sole proprietorship reports its income and expenses on Schedule C of the member’s personal income tax return. The member then lists the net profit or loss on the income section of his or her Form 1040, U.S. Individual Income Tax Return.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">Because the LLC is ignored for tax purposes, an LLC that is taxed like a sole proprietorship is referred to as a “</span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalzoom.com/articles/what-is-a-disregarded-entity-llc"><span data-dcnode-id="1243" instrument_node="">disregarded entity</span></a><span data-dcnode-id="1241" instrument_node="">.” The entity is only disregarded for tax purposes—these LLCs still retain all of their limited liability protection.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h2 data-dcnode-id="1237" data-toc="3" id="article3" tabindex="-1"><span data-dcnode-id="1238" instrument_node="">Multi-Member LLCs Taxed Like Partnerships</span></h2><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">If your LLC has more than one member and is taxed like a partnership, the LLC's income will flow through to the members themselves and will be reported on their personal tax returns.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Specifically, an LLC that’s taxed like a partnership files Form 1065, an informational tax return that reports all of the partnership’s income and expenses.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">The LLC also issues a Schedule K-1 to each LLC member, showing the member’s share of the LLC’s profit. Your LLC’s operating agreement should list each member’s percentage share of the LLC’s profits and losses.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">LLC members then report their share of profit (or loss) on Schedule E of their personal tax returns. Members must report and pay tax on their entire share of the profit, even if they leave some of those profits in the business rather than taking them home.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><h2 data-dcnode-id="1222" data-toc="4" id="article4" tabindex="-1"><span data-dcnode-id="1223" instrument_node="">Self-Employment Taxes and Estimated Taxes</span></h2><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The members of LLCs taxed as sole proprietorships or partnerships are considered to be self-employed for federal tax purposes. When you work for an employer, your employer pays half of your Social Security and Medicare taxes, and you pay the other half. But when you’re self-employed, you must pay the full amount yourself. On your annual tax return, you are allowed to deduct half of this tax from your income, which slightly offsets the impact of the self-employment tax.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">You must file Schedule SE, Self-Employment Tax, with your tax return to report and calculate your self-employment taxes. In addition, self-employed individuals are expected to make estimated payments of these taxes and their </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalzoom.com/articles/how-to-pay-quarterly-taxes"><span data-dcnode-id="1216" instrument_node="">personal income tax quarterly</span></a><span data-dcnode-id="1214" instrument_node=""> throughout the year. Failure to do this can lead to penalties and interest.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><h2 data-dcnode-id="1210" data-toc="5" id="article5" tabindex="-1"><span data-dcnode-id="1211" instrument_node="">LLC Taxed as S Corp. or C Corp.</span></h2><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">As an alternative, an LLC can choose to be taxed as a corporation by filing Form 8832, Entity Classification Election, with the IRS.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">An LLC can also file a further election to be taxed as an S corporation. Corporate taxation can be more complicated and it’s a good idea to consult an accountant before choosing to be taxed as a corporation. Some of the reasons an LLC might choose corporate taxation include:</span></p><span data-dcnode-id="1203" instrument_node="">
</span><ul data-dcnode-id="1196"><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">You plan to leave a substantial amount of money in the business each year to finance expansion or for other reasons.</span></li><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Your profits are far greater than the amount the owner/employees should reasonably make in salary and you want to minimize self-employment taxes.</span></li><span data-dcnode-id="1197" instrument_node="">
</span></ul><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">An LLC taxed as a C corporation files a corporate income tax return each year. The shareholders also report any salary and dividends they receive on their personal tax returns.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">An LLC taxed as an S corporation follows a procedure similar to a partnership, filing an informational return and providing members with a Schedule K-1 form showing their share of the profits (or losses). The members then report that income on Schedule E of their personal tax returns.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">Knowing how and when to file estimated and annual tax forms for your LLC is an important step in keeping your business’s finances on track. If you’re just starting out, you’ll probably prefer to be taxed as a sole proprietorship or partnership, but as your business grows, you may want to consult with an accountant to see if </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legalzoom.com/articles/what-are-the-tax-benefits-of-an-llc"><span data-dcnode-id="1188" instrument_node="">your LLC might benefit from taxation</span></a><span data-dcnode-id="1186" instrument_node=""> as a corporation.</span></p></div><span data-dcnode-id="1183" instrument_node="">
