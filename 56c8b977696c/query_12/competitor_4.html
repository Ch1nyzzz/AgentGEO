</span><h1 class="doc-title text-bold" data-dcnode-id="836" id="articleTitle" itemprop="name"><span data-dcnode-id="837" instrument_node="">How to File Taxes for LLC: Everything You Need to Know </span></h1><span data-dcnode-id="835" instrument_node="">
</span><input data-dcnode-id="834" id="ArticleId" name="ArticleId" type="hidden" value="5990277c4543323cb6330800"><span data-dcnode-id="833" instrument_node="">
</span><p class="doc-description" data-dcnode-id="828" itemprop="description"><em data-dcnode-id="829"><span data-dcnode-id="832" instrument_node="">How to file taxes for an LLC depends on whether your LLC is treated as a sole proprietorship, partnership or corporation by the IRS for tax purposes. </span><span class="content-read-time" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">8 min read</span></span></em></p><span data-dcnode-id="827" instrument_node="">
</span><div class="article-body marg-t-20" data-dcnode-id="566"><span data-dcnode-id="826" instrument_node="">
</span><a data-dcnode-id="824" href="#how-to-file-taxes-for-an-llc"><span data-dcnode-id="825" instrument_node="">1. How to File Taxes for an LLC</span></a><br data-dcnode-id="823"><a data-dcnode-id="821" href="#determining-how-the-irs-recognizes-your-llc"><span data-dcnode-id="822" instrument_node="">2. Determining How the IRS Recognizes Your LLC</span></a><br data-dcnode-id="820"><a data-dcnode-id="818" href="#llcs-taxed-as-sole-proprietorships"><span data-dcnode-id="819" instrument_node="">3. LLCs Taxed as Sole Proprietorships</span></a><br data-dcnode-id="817"><a data-dcnode-id="815" href="#llcs-taxed-as-partnerships"><span data-dcnode-id="816" instrument_node="">4. LLCs Taxed as Partnerships</span></a><br data-dcnode-id="814"><a data-dcnode-id="812" href="#llcs-taxed-as-corporations"><span data-dcnode-id="813" instrument_node="">5. LLCs Taxed as Corporations
</span></a><br data-dcnode-id="811"><a data-dcnode-id="809" href="#self-employment-taxes"><span data-dcnode-id="810" instrument_node="">6. Self-Employment Taxes</span></a><br data-dcnode-id="808"><a data-dcnode-id="806" href="#advantages-of-taxation-as-a-corporation"><span data-dcnode-id="807" instrument_node="">7. Advantages of Taxation as a Corporation</span></a><br data-dcnode-id="805"><a data-dcnode-id="803" href="#what-irs-forms-llcs-should-file"><span data-dcnode-id="804" instrument_node="">8. What IRS Forms LLCs Should File</span></a><br data-dcnode-id="802"><a data-dcnode-id="800" href="#state-taxes-and-fees"><span data-dcnode-id="801" instrument_node="">9. State Taxes and Fees</span></a><br data-dcnode-id="799"><a data-dcnode-id="797" href="#state-level-llc-tax-forms"><span data-dcnode-id="798" instrument_node="">10. State Level LLC Tax Forms.</span></a><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">
</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
</span><h2 data-dcnode-id="791" id="how-to-file-taxes-for-an-llc"><span data-dcnode-id="792" instrument_node="">How to File Taxes for an LLC</span></h2><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="789" instrument_node="">How to file taxes for an LLC depends on whether your LLC is treated as a </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/sole-proprietorship" meaning_of_life="42" target="_blank"><span data-dcnode-id="788" instrument_node="">sole proprietorship</span></a><span data-dcnode-id="786" instrument_node="">, </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/general-partnership" meaning_of_life="42" target="_blank"><span data-dcnode-id="785" instrument_node="">partnership</span></a><span data-dcnode-id="783" instrument_node=""> or corporation by the IRS for tax purposes. LLCs are state created business forms and the IRS does not recognize them as a distinct form of taxable entity. For tax purposes, an LLC is treated like a sole proprietorship, partnership, or corporation.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">By default, the IRS treats LLCs as partnerships or if there is only one owner, as sole proprietorships. However, LLCs can elect to be taxed like a corporation. This treatment is for tax purposes only and does not impact other aspects of the </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/business-entity" meaning_of_life="42" target="_blank"><span data-dcnode-id="779" instrument_node="">business entity</span></a><span data-dcnode-id="777" instrument_node="">.</span></p><span data-dcnode-id="775" instrument_node="">
</span><h2 data-dcnode-id="773" id="determining-how-the-irs-recognizes-your-llc"><span data-dcnode-id="774" instrument_node="">Determining How the IRS Recognizes Your LLC</span></h2><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="771" instrument_node="">The first step in filing your LLC’s </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/blog/the-ins-and-outs-of-filing-taxes-for-your-small-business" target="_blank"><span data-dcnode-id="770" instrument_node="">small business taxes</span></a><span data-dcnode-id="768" instrument_node=""> is to determine how the IRS views your LLC. How the IRS, recognizes your LLC depends on whether or not you have filed an </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/uac/form-8832-entity-classification-election" rel="nofollow" target="_blank"><span data-dcnode-id="767" instrument_node="">IRS Form 8832</span></a><span data-dcnode-id="765" instrument_node=""> with the IRS. Form 8832 is a form that allows LLCs to elect whether they would like to be taxed like a </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/disregarded-entity" meaning_of_life="42" target="_blank"><span data-dcnode-id="764" instrument_node="">disregarded entity</span></a><span data-dcnode-id="762" instrument_node="">, a partnership or a corporation.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">LLCs with one owner have the option of being taxes as a disregarded entity, the same way a sole proprietorship is taxed, or as a corporation. LLCs with multiple owners can elect to be taxed as a partnership or as a corporation. If no Form 8832 is filed, single owner LLCs will automatically be treated like sole proprietorships, and multi-owner LLCs will automatically be treated like partnerships by the IRS for income tax purposes.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">If you want your LLC to be taxed as a corporation, you must file a Form 8832 as soon as possible. You must also file a Form 8832 if you want to change the way your LLC is taxed. You can only change how your LLC is taxed once every five years. Eligible LLCs that want to be treated like an </span><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/s-corporation" meaning_of_life="42" target="_blank"><span data-dcnode-id="755" instrument_node="">S-Corporation</span></a><span data-dcnode-id="753" instrument_node=""> rather than a C-Corporation must be eligible under IRS rules and file a separate election to be taxes as an S-Corporation in addition to the Form 8832.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h2 data-dcnode-id="749" id="llcs-taxed-as-sole-proprietorships"><span data-dcnode-id="750" instrument_node="">LLCs Taxed as Sole Proprietorships</span></h2><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="747" instrument_node="">If your LLC is taxed as a sole proprietorship, your LLC is considered a “</span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/pass-through-entity" target="_blank"><span data-dcnode-id="746" instrument_node="">pass through entity</span></a><span data-dcnode-id="744" instrument_node="">” for taxes. “Pass through entities” report their income on their owner’s tax returns. In other words, the LLCs profits and losses “pass through” to its owner and you have personal responsibility for paying taxes and filing with the IRS. LLCs that are treated as sole proprietorships taxed only once by the IRS at the level of the individual owner; they do not pay taxes at the entity level. However, these </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/types-of-llc" meaning_of_life="42" target="_blank"><span data-dcnode-id="743" instrument_node="">types of LLCs</span></a><span data-dcnode-id="741" instrument_node=""> may still have tax reporting and payment obligations at the state level.</span></p><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="737" id="llcs-taxed-as-partnerships"><span data-dcnode-id="738" instrument_node="">LLCs Taxed as Partnerships</span></h2><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Like one-owner LLCs, LLCs with multiple owners that are taxed as partnerships are “pass through entities” and do not pay separate taxes on business income to the IRS. Each owner reports and pays the taxes associated with their share profits on their individual tax return.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">The LLCs operating agreement should set out each </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-owner" meaning_of_life="42" target="_blank"><span data-dcnode-id="731" instrument_node="">LLC owner</span></a><span data-dcnode-id="729" instrument_node="">’s distributive share, their percentage share of profits and losses. Usually, but not always, each owner’s distributive share is equal to their percentage ownership in the company. For example, an owner that has a 65 percent ownership interest in the LLC will usually have a 65 percent share of profits and a 65 percent share of losses. Occasionally, the distributive share for tax purposes will not be equal to the ownership interest or an owner will share in different percentages of profits and losses. If there is no operating agreement, state law usually supplies default rules for profit/loss sharing.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Every year, the IRS treats each LLC owner as though they received their entire distributive share even if the member did not actually receive the share. For example, if the LLC agrees that some profits should be left in the LLC’s account to expand the business and each member receives only a small disbursement of profits, the </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-member" meaning_of_life="42" target="_blank"><span data-dcnode-id="725" instrument_node="">LLC members</span></a><span data-dcnode-id="723" instrument_node=""> are still taxed on their distributive share as though they had received their full share.</span></p><span data-dcnode-id="721" instrument_node="">
</span><h2 data-dcnode-id="716" id="llcs-taxed-as-corporations"><span data-dcnode-id="720" instrument_node="">LLCs Taxed as </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/corporations" meaning_of_life="42" target="_blank"><span data-dcnode-id="719" instrument_node="">Corporations</span></a><span data-dcnode-id="717" instrument_node="">
</span></h2><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">LLCs treated as corporations for tax purposes are treated as separate entities by the IRS unless an S-Corp election is filed. In other words, both the LLC and the individual must pay taxes to the IRS. The business pays taxes on its profits, and the owner pays taxes on the dividend payments it received from the corporation. The business and the individual’s reporting and tax payment obligations are separate. If an S-Corporation is filed by an eligible LLC, that LLC is treated as a “pass-through entity,” much like a partnership for taxes.</span></p><span data-dcnode-id="712" instrument_node="">
</span><h2 data-dcnode-id="710" id="self-employment-taxes"><span data-dcnode-id="711" instrument_node="">Self-Employment Taxes</span></h2><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">LLC members are owners of the LLC, not employees, which means that contributions are not made by them or on their behalf to Social Security and Medicare. Most LLC owners are still required to make contributions to Social Security and Medicare through “self-</span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/employment-law-human-resources" meaning_of_life="42" target="_blank"><span data-dcnode-id="707" instrument_node="">employment</span></a><span data-dcnode-id="705" instrument_node=""> taxes.”&nbsp;These taxes are paid to the IRS.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Currently, only managing owners, owners that manage the LLC, are required to pay self-employment taxes to the IRS. Members of the LLC whose contribution is solely as an investment and do not manage the business, are often not required to pay self-employment taxes on their share of profits. The line between who must pay and who does not have to pay is tricky, and it is advisable to consult an attorney and a tax adviser to help you avoid mistakes which could result in financial penalties.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="699" instrument_node="">Owners of an LLC that hires and pays W-2 employees are not automatically </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/exempt" meaning_of_life="42" target="_blank"><span data-dcnode-id="698" instrument_node="">exempt</span></a><span data-dcnode-id="696" instrument_node=""> from paying Self-employment taxes. For example, if Mary is the sole owner of an LLC and hires two employees who she pays regular wages, she will be required to pay applicable employment taxes associated with her employees and she will also be required to pay self-employment taxes on her own earnings from </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-inc" meaning_of_life="42" target="_blank"><span data-dcnode-id="695" instrument_node="">LLC income</span></a><span data-dcnode-id="693" instrument_node="">.</span></p><span data-dcnode-id="691" instrument_node="">
</span><h2 data-dcnode-id="689" id="advantages-of-taxation-as-a-corporation"><span data-dcnode-id="690" instrument_node="">Advantages of Taxation as a Corporation</span></h2><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">Even though being taxed twice may not sound appealing, there are sound reasons </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/why-llc" meaning_of_life="42" target="_blank"><span data-dcnode-id="686" instrument_node="">why LLCs</span></a><span data-dcnode-id="684" instrument_node=""> might want to consider electing to be taxed as a corporation. Some of the advantages of being taxed as a corporation are:</span></p><span data-dcnode-id="682" instrument_node="">
</span><ul data-dcnode-id="662"><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Corporate tax rates for the first $75,000 taxable corporate income are less than individual tax rates most LLC owners;</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Corporate tax election benefits LLC owners that want to keep profits in their LLC because the owners do not have to pay taxes on funds that were not actually distributed to them;</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">Entities taxed as corporations can offer certain benefits like </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/stock-options" meaning_of_life="42" target="_blank"><span data-dcnode-id="673" instrument_node="">stock options</span></a><span data-dcnode-id="671" instrument_node=""> that have tax advantages which are unavailable to LLC owners and employees</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">LLC owners are not personally liable if the </span><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-tax" meaning_of_life="42" target="_blank"><span data-dcnode-id="667" instrument_node="">LLC taxed</span></a><span data-dcnode-id="665" instrument_node=""> like a corporation does not pay its taxes or file a return.</span></li><span data-dcnode-id="663" instrument_node="">
</span></ul><span data-dcnode-id="661" instrument_node="">
</span><h2 data-dcnode-id="659" id="what-irs-forms-llcs-should-file"><span data-dcnode-id="660" instrument_node="">What IRS Forms LLCs Should File</span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="657" instrument_node="">Required forms depend on the LLC’s filing status and other factors. The IRS provides a detailed explanation in its </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p3402.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="656" instrument_node="">Publication 3402</span></a><span data-dcnode-id="654" instrument_node="">: Taxation of </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/limited-liability" meaning_of_life="42" target="_blank"><span data-dcnode-id="653" instrument_node="">Limited Liability</span></a><span data-dcnode-id="651" instrument_node=""> Companies. The following are general rules of thumb for LLCs filing requirements. It is important to note that individual LLC owners have their own obligation to file their individual tax returns, reporting income, regardless of the LLCs requirements. Each situation is unique, and it is important to consult expert advisors.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">IRS Forms for LLCs Taxed as Sole Proprietorships. </span></strong></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Single-member LLC taxed as sole proprietorships must complete and file Form 1040, an individual tax return. Schedule C to Form 1040 is completed to report the LLCs income and tax deductions. If the Schedule C shows a profit, that income is reported on the LLC owner’s Form 1040 as income. Certain LLCs, like those that earn income from fishing, must complete Schedule E, F, or J in lieu of Schedule C. Schedule SE must be filed for calculation and payment of self-employment tax.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">IRS Forms for LLCs Taxed as Partnerships.</span></strong></p><span data-dcnode-id="638" instrument_node="">
</span><ul data-dcnode-id="630"><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">Form 1065 is filed to report the income of LLCs taxed as partnerships. This is merely an informational form. The LLC does not pay taxes based on this form. Instead, like a sole proprietorship </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/form-llc" meaning_of_life="42" target="_blank"><span data-dcnode-id="635" instrument_node="">form LLC</span></a><span data-dcnode-id="633" instrument_node="">, income is reported on the individual owner’s Form 1040s in proportion with their distributive share. For example, if you and your LLC co-owner each have a 50 percent distributive share of the LLC and the LLC earned $100,000 last year with $40,000 in deductible expenses, you and your business partner will each receive a Schedule K-1 showing $50,000 of earnings and $20,000 in deductions.</span></li><span data-dcnode-id="631" instrument_node="">
</span></ul><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The LLC must also prepare and distribute a Schedule K-1 (equivalent of a W-2) is distributed to each LLC owner. Schedule SE’s must be filed for calculation and payment of self-employment tax by each member responsible for such taxes.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">IRS Forms for LLCs Taxed as Corporations.</span></strong></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Different forms are filed by LLCs depending on if they have elected S-Corporation status or not. If they have not, a Form 1120 is filed that reports the LLCs income and deductions. The individual owners must include any dividends they received from the LLC during the year on their individual tax return.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">If S-Corporation status is elected, the </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-file" meaning_of_life="42" target="_blank"><span data-dcnode-id="617" instrument_node="">LLC files</span></a><span data-dcnode-id="615" instrument_node=""> a Form 1120S and prepares and distributes a Schedule K-1 to each of its owners. The income then “passes through” to the individual owner’s tax returns just as it does for LLCs taxed as sole proprietorships and as partnerships.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">LLCs With Employees</span></strong></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">LLCs of all kinds that hire employees are responsible for completing and filing the required employment tax forms. These usually include a Form 940, Employer's Annual Federal Unemployment (FUTA) Tax Return, and Form 941, Employer's Quarterly Federal Tax Return, or Form 944, Employer’s Annual Federal Tax Return. If you use a payroll processing company for your company’s payroll, the company may provide some assistance in preparing required tax forms.</span></p><span data-dcnode-id="606" instrument_node="">
</span><h2 data-dcnode-id="604" id="state-taxes-and-fees"><span data-dcnode-id="605" instrument_node="">State Taxes and Fees</span></h2><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">In addition to federal taxes, LLCs in most states must also pay state taxes or some type of annual fee to the state where it is formed. The system in most states is similar to the IRS where the LLC owner pays taxes for LLC profits on their individual returns.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">However, some states impose an additional LLC income related tax on the LLC level. California’s LLC is a notoriously harsh example. All LLCs in California must pay an annual minimum fee of hundreds of dollars to the state’s </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/franchise-tax" meaning_of_life="42" target="_blank"><span data-dcnode-id="598" instrument_node="">Franchise Tax</span></a><span data-dcnode-id="596" instrument_node=""> Board. The more the LLC makes, the more it must pay. For example, LLCs with income greater than $250,000 are responsible to the state for taxes ranging from about $900 to $11,000 depending on the exact amount made.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">Other states require a smaller flat rate fee to be paid by all LLCs that is not tied to income. As you can probably tell, the approaches can vary greatly from state to state. State government websites typically provide a wealth of information on how </span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-taxation" meaning_of_life="42" target="_blank"><span data-dcnode-id="592" instrument_node="">LLC taxation</span></a><span data-dcnode-id="590" instrument_node=""> works in their state.</span></p><span data-dcnode-id="588" instrument_node="">
</span><h2 data-dcnode-id="583" id="state-level-llc-tax-forms"><span data-dcnode-id="587" instrument_node="">State Level </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/llc-tax-form" meaning_of_life="42" target="_blank"><span data-dcnode-id="586" instrument_node="">LLC Tax Forms</span></a><span data-dcnode-id="584" instrument_node="">.</span></h2><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">Usually, LLCs will file returns that are analogous to the forms they filed with the IRS, so your LLC filed partnership forms with the IRS, you will likely file partnership forms with the state agency as well. However, state level taxation and associated forms vary greatly between states. Some states don’t even have a </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/business-income-tax" meaning_of_life="42" target="_blank"><span data-dcnode-id="580" instrument_node="">business income tax</span></a><span data-dcnode-id="578" instrument_node="">.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Due to this variety and frequent changes in the law, the best practice is to contact your state’s taxing authority to ask about the forms that your LLC is required to file with the state. There is similar variety when it comes to state level employment related taxes, and the employment agency of your LLC’s state is usually the best source of information on this taxation topic.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">Tax attorneys and some business attorneys can work with your LLC and your accountant to help you decide on the right tax election for your LLC and to prepare the required forms, saving you time, energy, and risk of making a mistake. UpCounsel’s platform provides an excellent way to find attorneys for this purpose, </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/jobs/new" target="_blank"><span data-dcnode-id="571" instrument_node="">post your legal need</span></a><span data-dcnode-id="569" instrument_node=""> today and start receiving bids from experienced attorneys who want to help you.</span></p><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span></div><span data-dcnode-id="561" instrument_node="">

</span><div class="col-md-3 col-sm-12 no-print" data-dcnode-id="269"><div class="row" data-dcnode-id="518"><span data-dcnode-id="549" instrument_node="">
