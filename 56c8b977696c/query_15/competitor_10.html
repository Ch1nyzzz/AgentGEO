</span><h1 class="h1 fs-40" data-dcnode-id="1103" itemprop="headline"><span data-dcnode-id="1104" instrument_node="">
    25 Home Business Tax Deductions for Small Business Owners</span></h1><span data-dcnode-id="1102" instrument_node="">
</span><span data-dcnode-id="1100" instrument_node="">
</span><div class="row" data-dcnode-id="1048"><span data-dcnode-id="1099" instrument_node="">
</span><div class="container" data-dcnode-id="1050"><span data-dcnode-id="1098" instrument_node="">
</span><div class="article-byline" data-dcnode-id="1058"><span data-dcnode-id="1097" instrument_node="">

</span><div class="authors-display" data-dcnode-id="1076"><span data-dcnode-id="1094" instrument_node="">

</span><label class="authorLabel" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Written by</span></label><span data-dcnode-id="1089" instrument_node="">
</span><div class="social-author" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">
</span><a class="author-hover article-names" data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/writer/holly-johnson/"><span data-dcnode-id="1087" instrument_node="">
                        Holly Johnson                    </span></a><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">

</span><div class="editor-byline" data-dcnode-id="1065"><span data-dcnode-id="1070" instrument_node="">

            Updated on: March 22nd, 2020        </span></span><span data-dcnode-id="1054" instrument_node="">
</span><p class="editor_disclosure" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">

</span><div class="row" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">

</span><span data-dcnode-id="1028" instrument_node="">
</span><div data-dcnode-id="760" itemprop="articleBody"><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Small business owners take on a considerable amount of responsibility. Beyond serving clients, they must also take care of all the minutiae of running a business, including keeping track of expenses they can deduct as a small business owner.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Fortunately, small business owners and entrepreneurs who use their home for work can benefit from various home business tax deductions that help them reduce their taxable business income. Common deductions include office supplies, software and internet access, but deductions can vary widely depending on the type of home business you run.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><ul data-dcnode-id="1007"><span data-dcnode-id="1020" instrument_node="">
</span><li data-dcnode-id="1017"><a data-dcnode-id="1018" href="#whoqualifiesforhomebusinesstaxdeductions"><span data-dcnode-id="1019" instrument_node="">Who qualifies for home business tax deductions?</span></a></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1013"><a data-dcnode-id="1014" href="#homebusinesstaxdeductionsforyoursmallbusiness"><span data-dcnode-id="1015" instrument_node="">25 home business tax deductions for your small business</span></a></li><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1009"><a data-dcnode-id="1010" href="#howtowriteoffhomebusinessexpenses"><span data-dcnode-id="1011" instrument_node="">How to write off home business expenses</span></a></li><span data-dcnode-id="1008" instrument_node="">
</span></ul><span data-dcnode-id="1006" instrument_node="">
</span><h2 data-dcnode-id="1004" id="whoqualifiesforhomebusinesstaxdeductions"><span data-dcnode-id="1005" instrument_node="">Who qualifies for home business tax deductions?</span></h2><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">If you run your business out of your home, you may be able to deduct expenses for the use of your residence on your </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/business/accounting/tax-preparation-checklist/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1001" instrument_node="">taxes for your small business</span></a><span data-dcnode-id="999" instrument_node="">. The home office deduction can be utilized by homeowners and renters, and any type of residence can qualify (single-family home, condominium, manufactured housing, etc.).</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">To qualify for the home office deduction, your home business activities must meet the following criteria:</span></p><span data-dcnode-id="994" instrument_node="">
</span><ul data-dcnode-id="982"><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="989"><b data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Regular and exclusive use.</span></b><span data-dcnode-id="990" instrument_node=""> According to the IRS, you must “regularly use part of your home exclusively for conducting business.” In other words, you must have a space in your home that you use only for business purposes, such as a home office or extra room that is used only for business and never for personal use.</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="984"><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Principal place of business. </span></b><span data-dcnode-id="985" instrument_node="">To qualify for the home office deduction, your home also must be the principal place your business operates from, although there are exceptions. The IRS reported that you may qualify for the home office deduction if you also have a business location outside of your home, provided you use your home for a substantial component of your business. For instance, if you conduct business in another location but have meetings with clients or patients in your home, the IRS allows you to deduct expenses for the part of your home that you use “exclusively and regularly” for business purposes.</span></li><span data-dcnode-id="983" instrument_node="">
</span></ul><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">There are some exceptions to these rules, including for those who run a home daycare. If your small business involves watching children in your home, then it would be impossible to meet the “exclusive use” criteria if you’re watching children in your own living area. To qualify for this exception to the exclusive use rule, you must provide daycare for children, persons age 65 or older or persons who are unable to care for themselves. Additionally, you must have “applied for, been granted or be exempt from having a license, certification, registration or approval as a daycare center or as a family or group daycare home under state law,” noted the IRS.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h2 data-dcnode-id="976" id="homebusinesstaxdeductionsforyoursmallbusiness"><span data-dcnode-id="977" instrument_node="">25 home business tax deductions for your small business</span></h2><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">If you’re eager to reduce your taxable income this year, figuring out which home business tax deductions you can take is a smart first step. Here are 25 common deductions you may be able to qualify for.</span></p><span data-dcnode-id="972" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">#1: Business supplies</span></h3><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Business supplies and office expenses, such as office furniture, printer paper, pens, calculators and business cards, are deductible provided they are for business use. According to the IRS, business expenses must be both ordinary and necessary, meaning they are “common and accepted in your trade” and “helpful and appropriate,” though not necessarily indispensable.</span></p><span data-dcnode-id="966" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">#2: Software and electronics</span></h3><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">Small business computers and software you need to purchase for your business, including </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/business/accounting/best-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="961" instrument_node="">small business accounting software</span></a><span data-dcnode-id="959" instrument_node="">, should be tax-deductible business expenses provided these purchases are ordinary and necessary for your business to remain in operation.</span></p><span data-dcnode-id="957" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">#3: Home repairs and maintenance</span></h3><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">You may also be able to deduct home repairs and maintenance performed on your place of residence, but only for the part of your residence that is used exclusively for business purposes. According to the IRS, an example could include “painting or repairs only in the area used for business,” like a new coat of paint or replacement flooring in your home office.</span></p><span data-dcnode-id="951" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">#4: Rent or depreciation</span></h3><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">You can deduct the business portion of your rent as an expense if the property you rent is for use in your trade or business. However, you cannot deduct rent as a business expense if you have or will receive equity in or a title to said property. Per the IRS, rent is defined as “any amount you pay for the use of property you do not own.”</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">In terms of </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/glossary/depreciation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="943" instrument_node="">depreciation</span></a><span data-dcnode-id="941" instrument_node="">, the IRS said that you can typically deduct depreciation on the business use portion of your home as well, in an amount up to the gross income limitation over a 39-year period.</span></p><span data-dcnode-id="939" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">#5: Utilities</span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">If you have a home office, your house utilities will also be required for your business. As a result, you can deduct a portion of your </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/debt-consolidation/easy-tips-to-lower-your-monthly-bills/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="934" instrument_node="">utility bills</span></a><span data-dcnode-id="932" instrument_node="">, such as gas and electric bills. However, you can only deduct a portion of these expenses since, obviously, part of your utility bills are for personal use.</span></p><span data-dcnode-id="930" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">#6: Car costs</span></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">If you use your car for business purposes, you can deduct auto-related expenses for the business use of a car. The IRS also reported that, if you use your car for both personal and business use, you must divide your car expenses based on the mileage you drive for personal and business purposes.</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">#7: Mileage</span></h3><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">You can also deduct mileage for all travel related to business. The IRS offers a </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/tax-professionals/standard-mileage-rates" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="919" instrument_node="">table of standard mileage rates</span></a><span data-dcnode-id="917" instrument_node=""> and mileage deduction rules you can refer to for the last several years, including mileage expenses for 2020.</span></p><span data-dcnode-id="915" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">#8: Employees’ pay</span></h3><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">You can also write off employees’ pay as a small business owner. This is true even if you operate your business out of a home office.</span></p><span data-dcnode-id="909" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">#9: Retirement plans</span></h3><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">You can also deduct contributions to retirement plans, including tax-advantaged </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/business/finding-retirement-plans/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="904" instrument_node="">retirement plans for the self-employed or small business owners</span></a><span data-dcnode-id="902" instrument_node="">, such as an SEP IRA or a solo 401(k).</span></p><span data-dcnode-id="900" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">#10: Interest</span></h3><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">If your business is paying interest on a credit card or loan that you borrowed for business activities, you should also be able to deduct this interest as a business expense.</span></p><span data-dcnode-id="894" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">#11: Taxes</span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">According to the IRS, you may be able to deduct various federal, state, local or foreign taxes that are directly related to your trade or business.</span></p><span data-dcnode-id="888" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">#12: Insurance</span></h3><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">You can typically deduct the cost of business-related insurance products you pay for, provided they are applicable to your trade or profession.</span></p><span data-dcnode-id="882" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">#13: Cost of goods sold</span></h3><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">If your business creates products or purchases them for resale, you can typically deduct the cost of these products or the costs involved in manufacturing them. This can include the cost of raw materials, freight, shipping, storage, direct labor and more.</span></p><span data-dcnode-id="876" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">#14: Qualified business income</span></h3><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">Thanks to the </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/business/accounting/small-business-tax-rate/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="871" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="869" instrument_node="">, you may be able to deduct up to 20% of your qualified business income on your taxes. This deduction does have limitations based on your trade or business as well as how much you earn, however. Specifically, joint tax filers with incomes below $315,000 and other filers with incomes below $157,000 can claim this deduction in full provided they work in a qualifying industry. For 2018, joint tax filers with incomes between $315,000 and $415,000 and individuals with incomes between $157,000 and $207,500 were subject to phase-outs.</span></p><span data-dcnode-id="867" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">#15: Cleaning services and supplies</span></h3><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">If you use your home for business purposes, you can generally deduct cleaning services and supplies that you purchase for the business-related portion of your home.</span></p><span data-dcnode-id="861" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">#16: Mortgage interest</span></h3><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">If you own your home and have a home mortgage, you can deduct a portion of your </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/home/mortgage/what-determines-interest-rate/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="856" instrument_node="">mortgage interest</span></a><span data-dcnode-id="854" instrument_node=""> on your business taxes. Deductions are based on the percentage of your home that you use for your business. If your lender requires mortgage insurance, part of that can be deducted as well.</span></p><span data-dcnode-id="852" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">#17: Travel expenses</span></h3><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Business-related travel expenses can also be taken as a business expense. This could include travel to meet with clients or to professional education or training events.</span></p><span data-dcnode-id="846" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">#18: Professional services</span></h3><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">If you pay for professional services, such as legal advice or tax preparation, these expenses can be deducted as business expenses.</span></p><span data-dcnode-id="840" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">#19: Marketing and business development</span></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">If you pay for marketing help or a business coach, these expenses can be deductible from your business income.</span></p><span data-dcnode-id="834" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">#20: Shipping costs and postage</span></h3><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">If you ship items for business purposes, shipping costs can be deductible on your taxes. The same is true for postage when used for business purposes.</span></p><span data-dcnode-id="828" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">#21: Security system</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">A security system that protects the doors and windows in your home from intruders can also be partially deductible as a business expense, provided part of your home is used for business purposes.</span></p><span data-dcnode-id="822" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">#22: Memberships and subscriptions</span></h3><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Professional memberships you pay for and subscriptions to business-related publications can also be tax-deductible.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">#23: Telephone</span></h3><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">The IRS said that while the first local telephone landline in your home is </span><i data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">not</span></i><span data-dcnode-id="809" instrument_node=""> a deductible business expense, “charges for business long-distance phone calls on that line, as well as the cost of a second line into your home used exclusively for business, are deductible business expenses.”</span></p><span data-dcnode-id="807" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">#24: Health insurance</span></h3><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Health insurance for yourself and your family is deductible as a business expense when you’re self-employed, although you do not have to have a home office to qualify for this deduction.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h3 class="h3-underline" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">#25: Education expenses for employees</span></h3><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">If you pay for or reimburse education expenses for an employee, you can deduct the expenses if they are part of a qualified educational assistance program, per IRS rules.</span></p><span data-dcnode-id="795" instrument_node="">
</span><h2 data-dcnode-id="793" id="howtowriteoffhomebusinessexpenses"><span data-dcnode-id="794" instrument_node="">How to write off home business expenses</span></h2><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">If you’re feeling overwhelmed by all of the </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lendingtree.com/business/home-based-business-legal/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="790" instrument_node="">home office business expenses</span></a><span data-dcnode-id="788" instrument_node=""> you might have to keep track of, you should know that the IRS also offers a standardized home office deduction that requires less legwork upfront. Here are the two options you have when it comes to how to write off home office business expenses this year:</span></p><span data-dcnode-id="786" instrument_node="">
</span><ul data-dcnode-id="774"><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="781"><b data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Simplified home office deduction: </span></b><span data-dcnode-id="782" instrument_node="">Since the 2013 tax year, taxpayers have been able to access a simplified option for computing the home office deduction. This option lets you determine a standard deduction based on the square footage of your home office space, thus letting you avoid tracking and reporting all of your individual home office expenses. Of course, the simplified method isn’t perfect since you can’t take some deductions like depreciation. You also cannot carry over a loss from a previous year, which is a departure from the regular method.</span></li><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="776"><b data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Regular method:</span></b><span data-dcnode-id="777" instrument_node=""> If you keep excellent records and prefer to deduct business expenses the old-fashioned way, you are still able to do so. With this method, you would need to keep detailed records of all your actual expenses for your home office including mortgage interest, utilities, depreciation and more. From there, your deduction will still be determined based on the percentage of your home used for business purposes.</span></li><span data-dcnode-id="775" instrument_node="">
</span></ul><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">If you’re using the regular method, you should plan on using </span><a aria-describedby="audioeye_new_window_message" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f8829.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="771" instrument_node="">IRS Form 8829</span></a><span data-dcnode-id="769" instrument_node=""> for certain business-related tax deductions when you file your taxes. But be aware that some business expenses don’t fall under the home office deduction, so they would be deductible within other areas of your taxes, such as Schedule C or F. Examples include telephone expenses, dues and salaries.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Also note that if you use the simplified method and itemize deductions, you can deduct some expenses for your home that are otherwise deductible, including mortgage interest and property taxes, as itemized deductions using Form 1040 or 1040-SR, Schedule A.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">When choosing which method to use for your home office deduction, keep in mind that both options have pros and cons. The regular method requires a lot more work, but you have the potential for a larger deduction if you have a lot of qualified expenses within a year. The simplified method is easier, but not necessarily ideal if you want to recapture depreciation when you sell your home, or if you want to be able to carry over losses. Make sure you understand each method and its limitations so you can make an informed decision.</span></p><span data-dcnode-id="761" instrument_node="">
</span></div><span data-dcnode-id="759" instrument_node="">
