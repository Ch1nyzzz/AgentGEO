</span><h1 data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Understanding tax deductions</span></h1><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1177"><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Understanding exactly how much of what you spend is tax deductible is crucial for understanding what you can spend on your business (and when).</span></em></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" id="more-11357"></span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">People often fall into the trap of thinking that spending a dollar on </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myob.com/au/blog/17-commonly-overlooked-ato-tax-deductions/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1171" instrument_node="">tax deductible expenses or assets</span></a><span data-dcnode-id="1169" instrument_node=""> will save a dollar in tax.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">But the tax man isn’t that generous.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">In fact, with the ongoing changes to marginal tax rates, there’s even less advantage given to lower income earners.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">To demonstrate the point, let’s consider you as an individual taxpayer and the marginal tax rates that apply to you for the 2020-21 tax year:</span></p><span data-dcnode-id="1158" instrument_node="">
</span><span data-dcnode-id="1157" instrument_node="">
</span><span data-dcnode-id="1156" instrument_node="">
</span><span data-dcnode-id="1155" instrument_node="">
</span><span data-dcnode-id="1152" instrument_node="">
</span><span data-dcnode-id="1149" instrument_node="">
</span><span data-dcnode-id="1147" instrument_node="">
</span><span data-dcnode-id="1146" instrument_node="">
</span><span data-dcnode-id="1143" instrument_node="">
</span><span data-dcnode-id="1140" instrument_node="">
</span><span data-dcnode-id="1138" instrument_node="">
</span><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1134" instrument_node="">
</span><span data-dcnode-id="1131" instrument_node="">
</span><span data-dcnode-id="1129" instrument_node="">
</span><span data-dcnode-id="1128" instrument_node="">
</span><span data-dcnode-id="1125" instrument_node="">
</span><span data-dcnode-id="1122" instrument_node="">
</span><span data-dcnode-id="1120" instrument_node="">
</span><span data-dcnode-id="1118" instrument_node="">
</span><table border="1" cellpadding="0" cellspacing="0" data-dcnode-id="1117"><tbody data-dcnode-id="1119"><tr data-dcnode-id="1148"><td data-dcnode-id="1153" valign="top" width="148"><span data-dcnode-id="1154" instrument_node="">$18,201 – $45,000</span></td><td data-dcnode-id="1150" valign="top" width="331"><span data-dcnode-id="1151" instrument_node="">19 cents for each dollar over $18,200</span></td></tr><tr data-dcnode-id="1139"><td data-dcnode-id="1144" valign="top" width="148"><span data-dcnode-id="1145" instrument_node="">$45,001 – $120,000</span></td><td data-dcnode-id="1141" valign="top" width="331"><span data-dcnode-id="1142" instrument_node="">$5,092 plus 32.5 cents for each dollar over $45,000</span></td></tr><tr data-dcnode-id="1130"><td data-dcnode-id="1135" valign="top" width="148"><span data-dcnode-id="1136" instrument_node="">$120,001- $180,000</span></td><td data-dcnode-id="1132" valign="top" width="331"><span data-dcnode-id="1133" instrument_node="">$29,467 plus 37 cents for each dollar over $120,000</span></td></tr><tr data-dcnode-id="1121"><td data-dcnode-id="1126" valign="top" width="148"><span data-dcnode-id="1127" instrument_node="">$180,001 and over</span></td><td data-dcnode-id="1123" valign="top" width="331"><span data-dcnode-id="1124" instrument_node="">$51,667 plus 45 cents for each dollar over $180,000</span></td></tr></tbody></table><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1110" style="text-align: center;"><span data-dcnode-id="1111" style="color: #800080;"><strong data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">READ: </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myob.com/au/blog/eofy-effective-small-business-habits/" rel="noopener noreferrer" style="color: #800080;" target="_blank"><span data-dcnode-id="1114" instrument_node="">4 habits of highly effective business owners at EOFY</span></a></strong></span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">If your taxable income is less than $18,201 per year, you will not pay any tax.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">So if you buy a tax-deductible subscription, for example, you won’t receive any tax benefit because you’re not going to pay any tax anyway.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">But let’s say you earn more than $180,000 and you spend a dollar on the same tax-deductible subscription. How much tax will you save and get back from the tax man?</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Any income earned over $180,000 attracts tax at 45 cents in the dollar (plus the Medicare levy of two percent), so a $1 tax deduction will give you a tax saving of 47 percent.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">But what’s the actual cost of the subscription once tax is accounted for?</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">The $1 for the subscription less a 47 cents tax saving equals an out-of-pocket cost of 53 cents.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><blockquote data-dcnode-id="1088"><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Pretty good, right? It’s no wonder those with taxable incomes over $180,000 say, “I love being in partnership with the&nbsp;tax man!”</span></p></blockquote><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Why do you think people who earn over $180,000 love negative gearing with residential property? It’s because every dollar they lose, the tax man pays nearly half of that loss in tax savings.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">But where does that leave you if your taxable income is less than $180,000? Well, it depends on what your taxable income is.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">If your taxable income is between $45,001 and $120,000, every dollar spent on tax-deductible costs will earn you a tax saving of 37 cents excluding the Medicare levy.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1070" style="text-align: center;"><span data-dcnode-id="1071" style="color: #800080;"><em data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">Are you still manually writing out invoices? </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myob.com/au/small-business/resources/invoice-template" rel="noopener noreferrer" style="color: #800080;" target="_blank"><span data-dcnode-id="1076" instrument_node="">Download our FREE invoice template</span></a><span data-dcnode-id="1074" instrument_node=""> and get your business ticking today.</span></strong></em></span></p><span data-dcnode-id="1069" instrument_node="">
</span><hr data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">
</span><h3 data-dcnode-id="1064" style="text-align: center;"><span data-dcnode-id="1065" style="color: #800080;"><span data-dcnode-id="1066" instrument_node="">Should you rush out and start spending?</span></span></h3><span data-dcnode-id="1063" instrument_node="">
</span><hr data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The higher your taxable income, the more the ATO will shelter the cost. But for those with lower taxable incomes, you should only ever spend what you need to regardless of what portion of that spend is tax deductible.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Your tax-paying entity or company will also have an impact on your tax saving.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">For example, a company with turnover less than $50 million is taxed at 26 cents in the dollar (for FY2020-21), while a self-managed superannuation fund (SMSF) is generally taxed at 15 cents in the dollar assuming it is in accumulation phase.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">So, a dollar spent on a tax-deductible expense in a company or SMSF will cost the company 74 cents after tax and the SMSF a significant 85 cents after tax.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><blockquote data-dcnode-id="1046"><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Which begs the question why negative gearing into property in an SMSF is considered so attractive when you realise that, for every dollar lost after rental income, the tax man only pays 15 cents?</span></p></blockquote><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The SMSF funds every dollar lost to the tune of 85 cents. The investment had better be a good one, if it’s to recover the after-tax losses over the period of ownership and still provide the SMSF with a solid capital gain.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Don’t forget there are other tax concessions available that will impact your decision on whether you incur a cost or not.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Obtaining a tax deduction in June 2021 will mean that you will receive the tax credit for that cost in your 2021 income tax return, and you will receive the refund for the expense when you lodge your 2021 tax return.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">That means spending up in July will mean that you will not receive the tax saving until you lodge your 2022 income tax return and that’s at least another 11 months away.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">In short, timing is a consideration, but only if you </span><em data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">really</span></em><span data-dcnode-id="1029" instrument_node=""> need that tax deduction.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><section class="p-2 mb-3 border radius clear--both bg-storm-6" data-dcnode-id="957"><span data-dcnode-id="1026" instrument_node="">

</span><h4 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Remember the two golden rules of tax deductions:</span></h4><span data-dcnode-id="953" instrument_node="">
</span><ol data-dcnode-id="941"><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Tax deductions aren’t a refund.</span></strong><span data-dcnode-id="949" instrument_node=""> At best, if you earn more than $180,000, you will save 45 cents per dollar, and if you earn less than $180,000 then your tax deduction goes down significantly, too.</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="943"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">If you don’t need it, don’t buy it.</span></strong><span data-dcnode-id="944" instrument_node=""> The full amount is better off in your pocket than any tax deduction.</span></li><span data-dcnode-id="942" instrument_node="">
</span></ol><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Always think about the need, the timing and the tax saving (based on the applicable marginal tax rate) when offloading those hard-earned dollars of yours.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">The easiest thing you can do to help with this is to make sure you’re capturing and tracking all your small business financials in </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myob.com/au/accounting-software" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="935" instrument_node="">online accounting software</span></a><span data-dcnode-id="933" instrument_node=""> as well as consulting closely with a certified tax agent.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="923" style="text-align: center;"><span data-dcnode-id="924" style="color: #800080;"><strong data-dcnode-id="925"><i data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">The information provided here is of a general nature for Australia and should not be your only source of information. Please </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myob.com/au/accountants-and-partners/partner-search/" rel="noopener noreferrer" style="color: #800080;" target="_blank"><span data-dcnode-id="929" instrument_node="">consult an experienced and registered tax agent</span></a><span data-dcnode-id="927" instrument_node=""> as each small business’ circumstance will vary for end of financial year.</span></i></strong></span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="916" style="text-align: center;"><span data-dcnode-id="917" style="color: #800080;"><em data-dcnode-id="918"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Please note:</span></strong><span data-dcnode-id="919" instrument_node=""> This article was originally written by Steven Miller and published in 2015. This latest version carries information correct for 2021 with the help of Debra Anderson.</span></em></span></p><span data-dcnode-id="915" instrument_node="">
</span></div><span data-dcnode-id="913" instrument_node="">
