</span><h1 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Understanding The Standard Tax Deduction</span></h1><span data-dcnode-id="621" instrument_node="">
</span><div class="visible-xs" data-dcnode-id="619" id="displaySidebar"><img data-dcnode-id="620" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/wp-content/themes/irs/assets/img/icon-sidebar-menu.jpg&amp;raw"></div><span data-dcnode-id="618" instrument_node="">
</span><div class="col-lg-9 col-md-8 content-article" data-dcnode-id="428"><span data-dcnode-id="617" instrument_node="">
</span><p class="hidden-xs" data-dcnode-id="616" style="margin-top: 34px;"></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Claim the Standard Deduction on Your 1040 Return to Lower Your Income Tax Liability</span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">Are you going to take the standard tax deduction, or will you claim&nbsp;itemized deductions? To better answer this question, you may need to learn more about the standard deduction and the benefits that it offers. One thing is for sure: you need to take full advantage of as many&nbsp;</span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/articles/tax-deductions"><span data-dcnode-id="610" instrument_node="">tax deductions</span></a><span data-dcnode-id="608" instrument_node="">&nbsp;as possible. This is one of the best ways to lower your income tax liability.</span></p><div class="ai-viewport-3" data-block="6" data-code="PGRpdiBjbGFzcz0nY29kZS1ibG9jayBjb2RlLWJsb2NrLTYnIHN0eWxlPSdtYXJnaW46IDhweCAwOyBjbGVhcjogYm90aDsnPgo8c2NyaXB0IGFzeW5jIHNyYz0iLy9wYWdlYWQyLmdvb2dsZXN5bmRpY2F0aW9uLmNvbS9wYWdlYWQvanMvYWRzYnlnb29nbGUuanMiPjwvc2NyaXB0Pgo8aW5zIGNsYXNzPSJhZHNieWdvb2dsZSIKICAgICBzdHlsZT0iZGlzcGxheTpibG9jazsgdGV4dC1hbGlnbjpjZW50ZXI7IgogICAgIGRhdGEtYWQtbGF5b3V0PSJpbi1hcnRpY2xlIgogICAgIGRhdGEtYWQtZm9ybWF0PSJmbHVpZCIKICAgICBkYXRhLWFkLWNsaWVudD0iY2EtcHViLTg4OTEwNjY2MTgyMjE0OTgiCiAgICAgZGF0YS1hZC1zbG90PSI4MzQ1Nzk0MTE0Ij48L2lucz4KPHNjcmlwdD4KICAgICAoYWRzYnlnb29nbGUgPSB3aW5kb3cuYWRzYnlnb29nbGUgfHwgW10pLnB1c2goe30pOwo8L3NjcmlwdD48L2Rpdj4K" data-dcnode-id="606" data-insertion="prepend" data-insertion-no-dbg="" data-selector=".ai-insert-6-87816367"></div><span data-dcnode-id="605" instrument_node="">
</span><div class="ai-viewport-1 ai-viewport-2" data-block="1" data-code="PGRpdiBjbGFzcz0nY29kZS1ibG9jayBjb2RlLWJsb2NrLTEnIHN0eWxlPSdtYXJnaW46IDhweCBhdXRvOyB0ZXh0LWFsaWduOiBjZW50ZXI7IGRpc3BsYXk6IGJsb2NrOyBjbGVhcjogYm90aDsnPgo8c2NyaXB0IGFzeW5jIHNyYz0iLy9wYWdlYWQyLmdvb2dsZXN5bmRpY2F0aW9uLmNvbS9wYWdlYWQvanMvYWRzYnlnb29nbGUuanMiPjwvc2NyaXB0Pgo8aW5zIGNsYXNzPSJhZHNieWdvb2dsZSIKICAgICBzdHlsZT0iZGlzcGxheTpibG9jazsgdGV4dC1hbGlnbjpjZW50ZXI7IgogICAgIGRhdGEtYWQtbGF5b3V0PSJpbi1hcnRpY2xlIgogICAgIGRhdGEtYWQtZm9ybWF0PSJmbHVpZCIKICAgICBkYXRhLWFkLWNsaWVudD0iY2EtcHViLTg4OTEwNjY2MTgyMjE0OTgiCiAgICAgZGF0YS1hZC1zbG90PSI4MzQ1Nzk0MTE0Ij48L2lucz4KPHNjcmlwdD4KICAgICAoYWRzYnlnb29nbGUgPSB3aW5kb3cuYWRzYnlnb29nbGUgfHwgW10pLnB1c2goe30pOwo8L3NjcmlwdD48L2Rpdj4K" data-dcnode-id="595" data-insertion="prepend" data-insertion-no-dbg="" data-selector=".ai-insert-1-48306490"><div class="code-block code-block-1" data-dcnode-id="597" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="604" instrument_node="">

</span><h3 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">What Is the Standard Deduction?</span></h3><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="585" instrument_node="">The standard deduction is a set dollar amount based on your&nbsp;</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/articles/determining-your-filing-status"><span data-dcnode-id="584" instrument_node="">filing status</span></a><span data-dcnode-id="582" instrument_node="">, which reduces your&nbsp;</span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/articles/what-is-taxable-income-2"><span data-dcnode-id="581" instrument_node="">taxable income</span></a><span data-dcnode-id="579" instrument_node="">. It is important to note that you cannot take the standard deduction if you are itemizing your deductions. You have to choose one or the other — ideally the one that will do you the most good in terms of tax savings.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">As noted above, the standard tax deduction is based on your filing status (including single, married filing separately, married filing jointly, head of household, or qualifying widow/widower).</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="567"><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/file-taxes-online/"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">&gt;&gt;</span></strong><span data-dcnode-id="571" instrument_node=""> </span><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">File Taxes Online</span></strong></a></p><span data-dcnode-id="566" instrument_node="">
</span><h3 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">How Much Is the Standard Deduction Worth?</span></h3><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">For tax year 2021, the standard deduction amounts are as follows:</span></p><span data-dcnode-id="560" instrument_node="">
</span><ul data-dcnode-id="543"><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">$12,550 for Single filer taxpayers</span></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">$12,550 for Married Filing Separately taxpayers</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">$18,800 for Head of Household filer taxpayers</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">$25,100 for Married Filing Jointly taxpayers</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">$25,100 for Qualifying Widow(er) filer taxpayers</span></li><span data-dcnode-id="544" instrument_node="">
</span></ul><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">&nbsp;</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The standard deduction amounts tend to change from year to year, as they are adjusted for inflation.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">It is important to note that the amount of your standard deduction may be reduced if you are claimed as a dependent on another person’s&nbsp;income tax return.</span></p><div class="ai-viewport-3" data-block="3" data-code="PGRpdiBjbGFzcz0nY29kZS1ibG9jayBjb2RlLWJsb2NrLTMnIHN0eWxlPSdtYXJnaW46IDhweCBhdXRvIDhweCAwOyB0ZXh0LWFsaWduOiBsZWZ0OyBkaXNwbGF5OiBibG9jazsgY2xlYXI6IGJvdGg7Jz4KPHNjcmlwdCBhc3luYyBzcmM9Ii8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzIj48L3NjcmlwdD4KPCEtLSBJUlMgTW9iaWxlIEhlYWRlciAzMjB4MTAwIC0tPgo8aW5zIGNsYXNzPSJhZHNieWdvb2dsZSIKICAgICBzdHlsZT0iZGlzcGxheTppbmxpbmUtYmxvY2s7d2lkdGg6MzIwcHg7aGVpZ2h0OjEwMHB4IgogICAgIGRhdGEtYWQtY2xpZW50PSJjYS1wdWItODg5MTA2NjYxODIyMTQ5OCIKICAgICBkYXRhLWFkLXNsb3Q9IjgzMjM1MDk5MDQiPjwvaW5zPgo8c2NyaXB0PgooYWRzYnlnb29nbGUgPSB3aW5kb3cuYWRzYnlnb29nbGUgfHwgW10pLnB1c2goe30pOwo8L3NjcmlwdD48L2Rpdj4K" data-dcnode-id="533" data-insertion="prepend" data-insertion-no-dbg="" data-selector=".ai-insert-3-42815165"></div><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="531" instrument_node="">RELATED:&nbsp;</span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/articles/2021-federal-income-tax-rates-brackets-standard-deduction-amounts/"><span data-dcnode-id="530" instrument_node="">2021 Federal Tax Rates &amp; Brackets</span></a></p><span data-dcnode-id="527" instrument_node="">
</span><h3 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The Additional Standard Deduction</span></h3><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Did you know that there is an additional standard tax deduction for people over the age of 65 and/or those who are blind? The deduction for the blind is allowed if you (or your spouse if filing jointly) are medically confirmed to be totally or partially blind as of the last day of the tax year.</span></p><div class="ai-viewport-1 ai-viewport-2" data-block="8" data-code="PGRpdiBjbGFzcz0nY29kZS1ibG9jayBjb2RlLWJsb2NrLTgnIHN0eWxlPSdtYXJnaW46IDhweCAwOyBjbGVhcjogYm90aDsnPgo8c2NyaXB0IGFzeW5jIHNyYz0iLy9wYWdlYWQyLmdvb2dsZXN5bmRpY2F0aW9uLmNvbS9wYWdlYWQvanMvYWRzYnlnb29nbGUuanMiPjwvc2NyaXB0Pgo8IS0tIElSUyAyMDE4IFJlc3BvbnNpdmUgLS0+CjxpbnMgY2xhc3M9ImFkc2J5Z29vZ2xlIgogICAgIHN0eWxlPSJkaXNwbGF5OmJsb2NrIgogICAgIGRhdGEtYWQtY2xpZW50PSJjYS1wdWItODg5MTA2NjYxODIyMTQ5OCIKICAgICBkYXRhLWFkLXNsb3Q9IjQwMjc0NTI3NjIiCiAgICAgZGF0YS1hZC1mb3JtYXQ9ImF1dG8iCiAgICAgZGF0YS1mdWxsLXdpZHRoLXJlc3BvbnNpdmU9InRydWUiPjwvaW5zPgo8c2NyaXB0PgooYWRzYnlnb29nbGUgPSB3aW5kb3cuYWRzYnlnb29nbGUgfHwgW10pLnB1c2goe30pOwo8L3NjcmlwdD48L2Rpdj4K" data-dcnode-id="510" data-insertion="prepend" data-insertion-no-dbg="" data-selector=".ai-insert-8-73704627"><div class="code-block code-block-8" data-dcnode-id="512" style="margin: 8px 0; clear: both;"><span data-dcnode-id="521" instrument_node="">
</span><span data-dcnode-id="519" instrument_node="">
</span><span data-dcnode-id="517" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8891066618221498" data-ad-format="auto" data-ad-slot="4027452762" data-dcnode-id="516" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The 2021 additional standard deduction for the elderly (age 65 or older) or blind is $1,350. This amount increases to $1,700 if you are using the Single or Head of Household filing status. If you are both elderly and blind, the amount of your additional standard deduction is doubled.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Other additions to the standard deduction may also exist for loss from a Federally-declared disaster area, as well as for state/local&nbsp;real estate taxes.</span></p><span data-dcnode-id="503" instrument_node="">
</span><h3 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Who Doesn’t Qualify for the Standard Deduction?</span></h3><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Keep in mind that there are several groups of people who do not qualify to claim the standard deduction. According to the IRS, this includes the following taxpayers:</span></p><span data-dcnode-id="497" instrument_node="">
</span><ul data-dcnode-id="483"><span data-dcnode-id="496" instrument_node="">
</span><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">A married individual filing as “married filing separately” whose spouse itemizes deductions</span></li><span data-dcnode-id="493" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">An individual who was a nonresident alien or dual status alien during the year (although there are certain exceptions)</span></li><span data-dcnode-id="490" instrument_node="">
</span><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">An individual who files a return for a period of less than 12 months due to a change in his/her annual accounting period</span></li><span data-dcnode-id="487" instrument_node="">
</span><li data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">An estate or trust, common trust fund, or partnership</span></li><span data-dcnode-id="484" instrument_node="">
</span></ul><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">Understanding the standard tax deduction is very important so you can properly&nbsp;</span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.com/articles/how-to-prepare-your-federal-income-tax-return"><span data-dcnode-id="480" instrument_node="">prepare your income tax return</span></a><span data-dcnode-id="478" instrument_node="">. You should do the math to see whether the standard deduction or itemizing deductions does a better job at lowering your tax liability. This will make it easier for you to decide between the standard deduction and itemizing your deductions.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">For more information, please see&nbsp;</span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p501.pdf"><span data-dcnode-id="474" instrument_node="">IRS Publication 501 (Exemptions, Standard Deduction, and Filing Information)</span></a><span data-dcnode-id="472" instrument_node="">.</span></p><span data-dcnode-id="470" instrument_node="">
</span><span data-dcnode-id="468" instrument_node="">
