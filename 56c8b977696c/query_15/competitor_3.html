</span><time class="updated" data-dcnode-id="1595" datetime="2018-10-19T22:17:40+00:00"><span data-dcnode-id="1596" instrument_node="">August 10, 2021</span></time><span data-dcnode-id="1594" instrument_node=""> </span><span class="divider" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">|</span></span><span data-dcnode-id="1591" instrument_node=""> </span><span class="reading-time" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">5 min read</span></span><span data-dcnode-id="1588" instrument_node="">
</span><span class="pill-button pill-button--white button-wp mb" data-dcnode-id="1585"><a class="text-small text-black" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/blog/topic/financial-assistance"><span data-dcnode-id="1587" instrument_node="">Financial Assistance</span></a></span><span data-dcnode-id="1584" instrument_node="">

</span><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1574" style="font-weight: 400"><span data-dcnode-id="1575" instrument_node="">The old saying goes that it’s better to give than to receive. If you aren’t convinced, studies have shown that helping other people can </span></span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.harvard.edu/gazette/story/2008/04/money-spent-on-others-can-buy-happiness/"><span data-dcnode-id="1572" style="font-weight: 400"><span data-dcnode-id="1573" instrument_node="">make you happier</span></span></a><span data-dcnode-id="1569" style="font-weight: 400"><span data-dcnode-id="1570" instrument_node=""> and may actually </span></span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ajph.aphapublications.org/doi/abs/10.2105/AJPH.2012.300876"><span data-dcnode-id="1567" style="font-weight: 400"><span data-dcnode-id="1568" instrument_node="">help you live longer.&nbsp;</span></span></a><span data-dcnode-id="1564" style="font-weight: 400"><span data-dcnode-id="1565" instrument_node="">And another added bonus? Doing good can reduce your tax bill when it’s time to write a check to Uncle Sam. </span></span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1560" style="font-weight: 400"><span data-dcnode-id="1561" instrument_node="">If you’re interested in donating to a good cause while also reaping the tax benefits of </span></span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/blog/give-to-charity"><span data-dcnode-id="1558" style="font-weight: 400"><span data-dcnode-id="1559" instrument_node="">charitable giving</span></span></a><span data-dcnode-id="1555" style="font-weight: 400"><span data-dcnode-id="1556" instrument_node="">, it’s important to understand the tax rules. This article explains the most important aspects of tax deductions for charitable donations.</span></span></p><span data-dcnode-id="1553" instrument_node="">
</span><h2 data-dcnode-id="1550"><span class="heading-2" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">What are the tax benefits of giving to charity?</span></span></h2><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" style="font-weight: 400"><span data-dcnode-id="1548" instrument_node="">The tax benefits of donating to charity are simple: Deducting charitable donations from your taxes may reduce the amount of money you’ll owe to the federal government come April 15th, depending on your individual tax situation. &nbsp;</span></span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" style="font-weight: 400"><span data-dcnode-id="1544" instrument_node="">The IRS allows individuals to deduct charitable contributions up to 50% of their adjusted gross income, though 20% and 30% limits sometimes apply. Celebrities and the super wealthy often take advantage of these high limits and donate huge chunks of money to nonprofits. But even if you’re not donating billions of dollars like Bill Gates, certain charitable contributions might still help reduce&nbsp;your tax burden. </span></span></p><span data-dcnode-id="1541" instrument_node="">
</span><h2 data-dcnode-id="1538"><span class="heading-2" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">How do charity tax deductions work?</span></span></h2><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" style="font-weight: 400"><span data-dcnode-id="1536" instrument_node="">If you’ve ever heard someone say “you can write that off,” they were likely referring to tax deductions. A few of the most common deductions are student loan interest, business expenses, home mortgage interest, and donations to charities. </span></span></p><span data-dcnode-id="1533" instrument_node="">
</span><h3 data-dcnode-id="1530"><span class="heading-3" data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">How do I claim a deduction for charitable donations?</span></span></h3><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" style="font-weight: 400"><span data-dcnode-id="1528" instrument_node="">Here are the main steps to claim a deduction for charitable donations: </span></span></p><span data-dcnode-id="1525" instrument_node="">
</span><ol data-dcnode-id="1501"><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1516" style="font-weight: 400"><span data-dcnode-id="1522" style="font-weight: 400"><span data-dcnode-id="1523" instrument_node="">If donating directly to a charity, make sure it is a legally registered 501(c)(3) Certified Charity. To be absolutely certain, you can always check an organization’s status on the </span></span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.irs.gov/app/eos/"><span data-dcnode-id="1520" style="font-weight: 400"><span data-dcnode-id="1521" instrument_node="">IRS website</span></span></a><span data-dcnode-id="1517" style="font-weight: 400"><span data-dcnode-id="1518" instrument_node="">. </span></span></li><span data-dcnode-id="1515" instrument_node="">
</span><li data-dcnode-id="1512" style="font-weight: 400"><span data-dcnode-id="1513" style="font-weight: 400"><span data-dcnode-id="1514" instrument_node="">Itemize deductions when filing your taxes. You can only claim charitable deductions on your tax return if you itemize deductions. </span></span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1503" style="font-weight: 400"><span data-dcnode-id="1509" style="font-weight: 400"><span data-dcnode-id="1510" instrument_node="">On your tax return, you can claim a charity tax deduction for charitable giving on </span></span><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040sa.pdf"><span data-dcnode-id="1507" style="font-weight: 400"><span data-dcnode-id="1508" instrument_node="">Schedule A (Form 1040)</span></span></a><span data-dcnode-id="1504" style="font-weight: 400"><span data-dcnode-id="1505" instrument_node="">. </span></span></li><span data-dcnode-id="1502" instrument_node="">
</span></ol><span data-dcnode-id="1500" instrument_node="">
</span><h2 data-dcnode-id="1497"><span class="heading-2" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">How do you know if contributions are tax deductible or not? </span></span></h2><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" style="font-weight: 400"><span data-dcnode-id="1495" instrument_node="">You might be surprised by some of the ways you can claim charitable donations on your taxes. Below are some general rules about which donations are considered deductible and which aren’t, according to the IRS. </span></span></p><span data-dcnode-id="1492" instrument_node="">
</span><h3 data-dcnode-id="1489"><span class="heading-3" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Types of charitable contributions that are deductible </span></span></h3><span data-dcnode-id="1488" instrument_node="">
</span><ul data-dcnode-id="1458"><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1484" style="font-weight: 400"><span data-dcnode-id="1485" style="font-weight: 400"><span data-dcnode-id="1486" instrument_node="">Donations to religious organizations</span></span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1480" style="font-weight: 400"><span data-dcnode-id="1481" style="font-weight: 400"><span data-dcnode-id="1482" instrument_node="">Donations to federal, state, and local governments</span></span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1476" style="font-weight: 400"><span data-dcnode-id="1477" style="font-weight: 400"><span data-dcnode-id="1478" instrument_node="">Donations to war veterans’ groups</span></span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1472" style="font-weight: 400"><span data-dcnode-id="1473" style="font-weight: 400"><span data-dcnode-id="1474" instrument_node="">Donations to nonprofit schools and hospitals</span></span></li><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1468" style="font-weight: 400"><span data-dcnode-id="1469" style="font-weight: 400"><span data-dcnode-id="1470" instrument_node="">Expenses incurred from a student living with you</span></span></li><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1464" style="font-weight: 400"><span data-dcnode-id="1465" style="font-weight: 400"><span data-dcnode-id="1466" instrument_node="">Volunteer expenses </span></span></li><span data-dcnode-id="1463" instrument_node="">
</span><li data-dcnode-id="1460" style="font-weight: 400"><span data-dcnode-id="1461" style="font-weight: 400"><span data-dcnode-id="1462" instrument_node="">Payroll deductions to charities through your employer</span></span></li><span data-dcnode-id="1459" instrument_node="">
</span></ul><span data-dcnode-id="1457" instrument_node="">
</span><h3 data-dcnode-id="1454"><span class="heading-3" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Types of charitable contributions that are not deductible</span></span></h3><span data-dcnode-id="1453" instrument_node="">
</span><ul data-dcnode-id="1419"><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1449" style="font-weight: 400"><span data-dcnode-id="1450" style="font-weight: 400"><span data-dcnode-id="1451" instrument_node="">Donations to foreign organizations </span></span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1445" style="font-weight: 400"><span data-dcnode-id="1446" style="font-weight: 400"><span data-dcnode-id="1447" instrument_node="">Donations to political parties, action committees, or fundraisers</span></span></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1441" style="font-weight: 400"><span data-dcnode-id="1442" style="font-weight: 400"><span data-dcnode-id="1443" instrument_node="">Gifts donated to individuals </span></span></li><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1437" style="font-weight: 400"><span data-dcnode-id="1438" style="font-weight: 400"><span data-dcnode-id="1439" instrument_node="">Donations to foreign governments </span></span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1433" style="font-weight: 400"><span data-dcnode-id="1434" style="font-weight: 400"><span data-dcnode-id="1435" instrument_node="">Donations to for-profit schools or hospitals </span></span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1429" style="font-weight: 400"><span data-dcnode-id="1430" style="font-weight: 400"><span data-dcnode-id="1431" instrument_node="">Donations to social and sports clubs</span></span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1425" style="font-weight: 400"><span data-dcnode-id="1426" style="font-weight: 400"><span data-dcnode-id="1427" instrument_node="">Donations to labor unions</span></span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1421" style="font-weight: 400"><span data-dcnode-id="1422" style="font-weight: 400"><span data-dcnode-id="1423" instrument_node="">Donations to homeowners’ associations</span></span></li><span data-dcnode-id="1420" instrument_node="">
</span></ul><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1416" style="font-weight: 400"><span data-dcnode-id="1417" instrument_node="">Different types of charitable donations have their own set of tax rules. Luckily, the IRS provides a comprehensive guide on </span></span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p526.pdf"><span data-dcnode-id="1414" style="font-weight: 400"><span data-dcnode-id="1415" instrument_node="">charitable contributions</span></span></a><span data-dcnode-id="1412" instrument_node=""> </span><span data-dcnode-id="1410" style="font-weight: 400"><span data-dcnode-id="1411" instrument_node="">to help you navigate any uncharted tax territory. </span></span></p><span data-dcnode-id="1408" instrument_node="">
</span><h3 data-dcnode-id="1405"><span class="heading-3" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">What about online fundraising and charitable tax deductions?</span></span></h3><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1402" style="font-weight: 400"><span data-dcnode-id="1403" instrument_node="">In the age of </span></span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/crowdfunding"><span data-dcnode-id="1400" style="font-weight: 400"><span data-dcnode-id="1401" instrument_node="">crowdfunding</span></span></a><span data-dcnode-id="1397" style="font-weight: 400"><span data-dcnode-id="1398" instrument_node="">, it has never been easier to support your favorite charity. Technology has changed the way people all over the world help others. Lending a digital hand to those in need is now effortless, and finding </span></span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/blog/best-charities-to-donate-to"><span data-dcnode-id="1395" style="font-weight: 400"><span data-dcnode-id="1396" instrument_node="">best charities to donate to</span></span></a><span data-dcnode-id="1392" style="font-weight: 400"><span data-dcnode-id="1393" instrument_node=""> takes no time at all. </span></span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1388" style="font-weight: 400"><span data-dcnode-id="1389" instrument_node="">The </span></span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/blog/charity-fundraising-sites"><span data-dcnode-id="1386" style="font-weight: 400"><span data-dcnode-id="1387" instrument_node="">top charity fundraising sites</span></span></a><span data-dcnode-id="1383" style="font-weight: 400"><span data-dcnode-id="1384" instrument_node=""> have done an incredible job of simplifying the giving process for donors and organizers alike. Reputable sites now offer </span></span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/c/free-fundraising"><span data-dcnode-id="1381" style="font-weight: 400"><span data-dcnode-id="1382" instrument_node="">fundraising</span></span></a><span data-dcnode-id="1378" style="font-weight: 400"><span data-dcnode-id="1379" instrument_node=""> platforms and &nbsp;issue tax-deductible receipts for donations made to certified charity fundraisers. They also give donors a way to easily track their donations in one place.</span></span></p><span data-dcnode-id="1376" instrument_node="">
</span><h2 data-dcnode-id="1373"><span class="heading-2" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Other important tax tips</span></span></h2><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" style="font-weight: 400"><span data-dcnode-id="1371" instrument_node="">If you want to make the most of your charitable contributions, you’ll want to keep these other tax rules in mind. </span></span></p><span data-dcnode-id="1368" instrument_node="">
</span><h3 data-dcnode-id="1365"><span class="heading-3" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Time your donation correctly</span></span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" style="font-weight: 400"><span data-dcnode-id="1363" instrument_node="">Donations are only deductible in the year that they’re made. This means that you must make donations by December 31st to count. Checks can’t be dated for the following year. </span></span></p><span data-dcnode-id="1360" instrument_node="">
</span><h3 data-dcnode-id="1356"><strong data-dcnode-id="1357"><span class="heading-3" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Note any personal benefits and incentives </span></span></strong></h3><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" style="font-weight: 400"><span data-dcnode-id="1354" instrument_node="">If you receive any incentives or personal benefits from your donation, the IRS requires you to subtract that cost from the amount you plan on claiming as a charitable donation. For example, if you receive tickets to an event valued at $25 for your donation of $200 to an organization, you could only claim $175 as a charitable donation on your taxes. </span></span></p><span data-dcnode-id="1351" instrument_node="">
</span><h3 data-dcnode-id="1347"><strong data-dcnode-id="1348"><span class="heading-3" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Always ask for receipts</span></span></strong></h3><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" style="font-weight: 400"><span data-dcnode-id="1345" instrument_node="">It’s important to get a receipt as proof of your contribution when making non-cash donations. The receipt should state the amount of the donation, the date, and the name of the organization you donated to. For cash donations of $250 or more, you will need a receipt to support your contributions.</span></span></p><span data-dcnode-id="1342" instrument_node="">
</span><h3 data-dcnode-id="1338"><strong data-dcnode-id="1339"><span class="heading-3" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Consider working with a tax professional</span></span></strong></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" style="font-weight: 400"><span data-dcnode-id="1336" instrument_node="">Tax laws can change on a yearly basis and everyone’s situation is different, so we recommend working with a tax professional before following any of the advice outlined in this guide. A tax professional will ensure you’re adhering to tax laws, and they’ll be able to help you maximize charity tax deductions. &nbsp;&nbsp;</span></span></p><span data-dcnode-id="1333" instrument_node="">
