01"><span data-dcnode-id="1214" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1203"><span data-dcnode-id="1213" instrument_node=""> </span><p data-dcnode-id="1205"><span data-dcnode-id="1211" style="font-weight:400;"><span data-dcnode-id="1212" instrument_node="">Business tax liability is complicated and we’d be willing to bet you’re not taking full advantage of the strategies designed to help you. Today we’re breaking down 10 ways you can minimize your tax liability, decrease your </span></span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/blog/guide-to-quarterly-business-taxes/"><span data-dcnode-id="1209" style="font-weight:400;"><span data-dcnode-id="1210" instrument_node="">estimated quarterly taxes</span></span></a><span data-dcnode-id="1206" style="font-weight:400;"><span data-dcnode-id="1207" instrument_node="">, and spend your business dollars smarter. </span></span></p><span data-dcnode-id="1204" instrument_node=""> </span></div><span data-dcnode-id="1202" instrument_node=""> </span></div><span data-dcnode-id="1200" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="1198"><div class="divider" data-dcnode-id="1199" style="height:20px;"></div></div><span data-dcnode-id="1197" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1189"><span data-dcnode-id="1196" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node=""> </span><h2 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">What is tax liability?</span></h2><span data-dcnode-id="1192" instrument_node=""> </span></div><span data-dcnode-id="1190" instrument_node=""> </span></div><span data-dcnode-id="1188" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="1186"><div class="divider" data-dcnode-id="1187" style="height:40px;"></div></div><span data-dcnode-id="1185" instrument_node=""> </span><div class="wpb_text_column wpb_content_element vc_custom_1616029827215" data-dcnode-id="1175"><span data-dcnode-id="1184" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1177"><span data-dcnode-id="1183" instrument_node=""> </span><p data-dcnode-id="1179"><strong data-dcnode-id="1180"><i data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Your tax liability is the amount for which you’re responsible to the IRS. Tax liability is determined by your tax rate and your amount of income.</span></i></strong></p><span data-dcnode-id="1178" instrument_node=""> </span></div><span data-dcnode-id="1176" instrument_node=""> </span></div><span data-dcnode-id="1174" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="1172"><div class="divider" data-dcnode-id="1173" style="height:20px;"></div></div><span data-dcnode-id="1171" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1158"><span data-dcnode-id="1170" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1160"><span data-dcnode-id="1169" instrument_node=""> </span><p data-dcnode-id="1166"><span data-dcnode-id="1167" style="font-weight:400;"><span data-dcnode-id="1168" instrument_node="">Reducing your tax liability means taking advantage of all of the deductions you can and minimizing the bottom-line total that’s used to calculate your tax bill. There are several strategies for using your gross revenue wisely so that less of it is eligible for taxes and so that your taxes are working harder for you.&nbsp;</span></span></p><span data-dcnode-id="1165" instrument_node=""> </span><p data-dcnode-id="1162"><span data-dcnode-id="1163" style="font-weight:400;"><span data-dcnode-id="1164" instrument_node="">Now let’s jump into the ways you can leverage small business tax codes to work to your advantage.</span></span></p><span data-dcnode-id="1161" instrument_node=""> </span></div><span data-dcnode-id="1159" instrument_node=""> </span></div><span data-dcnode-id="1157" instrument_node=""> </span></div><span data-dcnode-id="1155" instrument_node=""> </span></div><span data-dcnode-id="1153" instrument_node=""> </span></div><span data-dcnode-id="1151" instrument_node=""> </span></div></div><span data-dcnode-id="1148" instrument_node=""> </span><div class="wpb_row vc_row-fluid vc_row" data-column-margin="default" data-dcnode-id="846" data-midnight="dark" id="fws_6262e40598924" style="padding-top:0px;padding-bottom:0px;"><div class="row-bg-wrap" data-bg-animation="none" data-bg-overlay="false" data-dcnode-id="1145"><div class="inner-wrap" data-dcnode-id="1146"><div class="row-bg" data-dcnode-id="1147" style=""></div></div></div><div class="row_col_wrap_12 col span_12 dark left" data-dcnode-id="847"><span data-dcnode-id="1144" instrument_node=""> </span><div class="vc_col-sm-12 wpb_column column_container vc_column_container col padding-10-percent" data-animation="" data-bg-color="" data-bg-opacity="1" data-dcnode-id="849" data-delay="0" data-has-bg-color="false" data-padding-pos="left-right" style="margin-bottom:2px;"><span data-dcnode-id="1143" instrument_node=""> </span><div class="vc_column-inner" data-dcnode-id="851"><span data-dcnode-id="1142" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="853"><span data-dcnode-id="1141" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1132"><span data-dcnode-id="1140" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1134"><span data-dcnode-id="1139" instrument_node=""> </span><h2 data-dcnode-id="1136"><span data-dcnode-id="1137" style="font-weight:400;"><span data-dcnode-id="1138" instrument_node="">10 ways to minimize your small business tax liability</span></span></h2><span data-dcnode-id="1135" instrument_node=""> </span></div><span data-dcnode-id="1133" instrument_node=""> </span></div><span data-dcnode-id="1131" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="1129"><div class="divider" data-dcnode-id="1130" style="height:20px;"></div></div><span data-dcnode-id="1128" instrument_node=""> </span><div class="wpb_text_column wpb_content_element vc_custom_1616039403850" data-dcnode-id="1075"><span data-dcnode-id="1127" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="1077"><span data-dcnode-id="1126" instrument_node=""> </span><p data-dcnode-id="1122"><em data-dcnode-id="1123"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">In this article: </span></strong></em></p><span data-dcnode-id="1121" instrument_node=""> </span><ol data-dcnode-id="1079"><span data-dcnode-id="1120" instrument_node=""> </span><li data-dcnode-id="1117"><a data-dcnode-id="1118" href="#family"><span data-dcnode-id="1119" instrument_node="">Employ family members</span></a></li><span data-dcnode-id="1116" instrument_node=""> </span><li data-dcnode-id="1113"><a data-dcnode-id="1114" href="#retirement"><span data-dcnode-id="1115" instrument_node="">Build a retirement fund</span></a></li><span data-dcnode-id="1112" instrument_node=""> </span><li data-dcnode-id="1109"><a data-dcnode-id="1110" href="#healthcare"><span data-dcnode-id="1111" instrument_node="">Focus on healthcare</span></a></li><span data-dcnode-id="1108" instrument_node=""> </span><li data-dcnode-id="1105"><a data-dcnode-id="1106" href="#incorporated"><span data-dcnode-id="1107" instrument_node="">Get incorporated</span></a></li><span data-dcnode-id="1104" instrument_node=""> </span><li data-dcnode-id="1101"><a data-dcnode-id="1102" href="#maximize"><span data-dcnode-id="1103" instrument_node="">Maximize deductions</span></a></li><span data-dcnode-id="1100" instrument_node=""> </span><li data-dcnode-id="1097"><a data-dcnode-id="1098" href="#contract"><span data-dcnode-id="1099" instrument_node="">Contract employees</span></a></li><span data-dcnode-id="1096" instrument_node=""> </span><li data-dcnode-id="1093"><a data-dcnode-id="1094" href="#contributions"><span data-dcnode-id="1095" instrument_node="">Charitable contributions</span></a></li><span data-dcnode-id="1092" instrument_node=""> </span><li data-dcnode-id="1089"><a data-dcnode-id="1090" href="#optimize"><span data-dcnode-id="1091" instrument_node="">Optimize deductions</span></a></li><span data-dcnode-id="1088" instrument_node=""> </span><li data-dcnode-id="1085"><a data-dcnode-id="1086" href="#law"><span data-dcnode-id="1087" instrument_node="">Stay current on tax law</span></a></li><span data-dcnode-id="1084" instrument_node=""> </span><li data-dcnode-id="1081"><a data-dcnode-id="1082" href="#accountable"><span data-dcnode-id="1083" instrument_node="">Adopt accountable plans</span></a></li><span data-dcnode-id="1080" instrument_node=""> </span></ol><span data-dcnode-id="1078" instrument_node=""> </span></div><span data-dcnode-id="1076" instrument_node=""> </span></div><span data-dcnode-id="1074" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="1072"><div class="divider" data-dcnode-id="1073" style="height:20px;"></div></div><span data-dcnode-id="1071" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="947"><span data-dcnode-id="1070" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="949"><span data-dcnode-id="1069" instrument_node=""> </span><h3 data-dcnode-id="1066" id="family"><span data-dcnode-id="1067" style="font-weight:400;"><span data-dcnode-id="1068" instrument_node="">1. Employ family members</span></span></h3><span data-dcnode-id="1065" instrument_node=""> </span><p data-dcnode-id="1052"><span data-dcnode-id="1063" style="font-weight:400;"><span data-dcnode-id="1064" instrument_node="">It’s not possible for every small business, but if you hire a family member you can skip some of the employer taxes you’d be paying for another employee. If you hire a spouse you are not required to pay </span></span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc759"><span data-dcnode-id="1061" style="font-weight:400;"><span data-dcnode-id="1062" instrument_node="">unemployment (FUTA) taxes</span></span></a><span data-dcnode-id="1058" style="font-weight:400;"><span data-dcnode-id="1059" instrument_node="">, and for children, you aren’t required to pay </span></span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/taxtopics/tc751"><span data-dcnode-id="1056" style="font-weight:400;"><span data-dcnode-id="1057" instrument_node="">employment (FICA) taxes</span></span></a><span data-dcnode-id="1053" style="font-weight:400;"><span data-dcnode-id="1054" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1051" instrument_node=""> </span><h3 data-dcnode-id="1048" id="retirement"><span data-dcnode-id="1049" style="font-weight:400;"><span data-dcnode-id="1050" instrument_node="">2. Build a retirement fund</span></span></h3><span data-dcnode-id="1047" instrument_node=""> </span><p data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-weight:400;"><span data-dcnode-id="1046" instrument_node="">Not only is it common sense to save for retirement—it can actually help you pay less in taxes. As a small business owner, you can save up to $57,000 per year in total retirement contributions. These contributions are totally tax free, and you have a few options for executing this strategy:&nbsp;</span></span></p><span data-dcnode-id="1043" instrument_node=""> </span><ul data-dcnode-id="999"><span data-dcnode-id="1042" instrument_node=""> </span><li data-dcnode-id="1001" style="list-style-type:none;"><span data-dcnode-id="1041" instrument_node=""> </span><ul data-dcnode-id="1003"><span data-dcnode-id="1040" instrument_node=""> </span><li aria-level="1" data-dcnode-id="1032" style="font-weight:400;"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/simple-ira.asp"><b data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">SIMPLE IRA</span></b></a><b data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node=""> = Savings Incentive Match Plan/Individual Retirement Account.</span></b><span data-dcnode-id="1033" style="font-weight:400;"><span data-dcnode-id="1034" instrument_node=""> As an employer you can require a 2% contribution from employee paychecks to their retirement fund, or offer an employer match up to 3%. Employees can contribute $13,500 per year (and an additional $3,000 for employees over the age of 50).&nbsp;</span></span></li><span data-dcnode-id="1031" instrument_node=""> </span><li aria-level="1" data-dcnode-id="1023" style="font-weight:400;"><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/r/rothira.asp"><b data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Roth IRA</span></b></a><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node=""> = Individual Retirement Account allowing for tax-free qualified withdrawals. </span></b><span data-dcnode-id="1024" style="font-weight:400;"><span data-dcnode-id="1025" instrument_node="">These savings accounts are preferable for those making less than $140,000 annually and who think taxes will be higher for them in the future. The money is taxed when it goes into the account but can be withdrawn tax-free. However, the employer match is pre-tax money.&nbsp;</span></span></li><span data-dcnode-id="1022" instrument_node=""> </span><li aria-level="1" data-dcnode-id="1014" style="font-weight:400;"><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/1/403bplan.asp"><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">403(b)</span></b></a><b data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> = A retirement account for certain non-profit and public school employees.</span></b><span data-dcnode-id="1015" style="font-weight:400;"><span data-dcnode-id="1016" instrument_node=""> Like other retirement plans, employers can match employee contributions pre-taxes and can maximize benefits if employees stay for 15 years of employment.&nbsp;</span></span></li><span data-dcnode-id="1013" instrument_node=""> </span><li aria-level="1" data-dcnode-id="1005" style="font-weight:400;"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/sep.asp"><b data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Simplified Employee Pension Plan (SEP)</span></b></a><b data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node=""> = A retirement account with higher contribution limits available for self-employed individuals. </span></b><span data-dcnode-id="1006" style="font-weight:400;"><span data-dcnode-id="1007" instrument_node="">A simplified retirement account that provides employers tax free contributions as well as a tax credit when initiating the plan.&nbsp;</span></span></li><span data-dcnode-id="1004" instrument_node=""> </span></ul><span data-dcnode-id="1002" instrument_node=""> </span></li><span data-dcnode-id="1000" instrument_node=""> </span></ul><span data-dcnode-id="998" instrument_node=""> </span><h3 data-dcnode-id="995" id="healthcare"><span data-dcnode-id="996" style="font-weight:400;"><span data-dcnode-id="997" instrument_node="">3. Focus on healthcare</span></span></h3><span data-dcnode-id="994" instrument_node=""> </span><p data-dcnode-id="991"><span data-dcnode-id="992" style="font-weight:400;"><span data-dcnode-id="993" instrument_node="">If you have a high deductible health care plan you may be eligible for health savings accounts (HSAs), which make it easy to save tax-free money to be used for health and wellness spending. Both contributions and withdrawals are tax-free, which makes this option particularly appealing. Raises might seem like an easy win, but you’d actually be better off contributing more to your employees’ healthcare. A raise is subject to employer taxes (with FICA &amp; FUTA taxes being withheld like regular wages) and then taxed on the employee side as part of their income. Instead you can cover more of their health insurance costs without paying any taxes.&nbsp;</span></span></p><span data-dcnode-id="990" instrument_node=""> </span><h3 data-dcnode-id="987" id="incorporated"><span data-dcnode-id="988" style="font-weight:400;"><span data-dcnode-id="989" instrument_node="">4. Get incorporated</span></span></h3><span data-dcnode-id="986" instrument_node=""> </span><p data-dcnode-id="978"><span data-dcnode-id="984" style="font-weight:400;"><span data-dcnode-id="985" instrument_node="">If your business operates as a sole proprietorship or other business structure, it may be beneficial for your tax liability to </span></span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patriotsoftware.com/blog/accounting/switching-sole-proprietorship-llc-how-change-convert/"><span data-dcnode-id="982" style="font-weight:400;"><span data-dcnode-id="983" instrument_node="">make the switch to a Limited Liability Corporation or LLC</span></span></a><span data-dcnode-id="979" style="font-weight:400;"><span data-dcnode-id="980" instrument_node="">. Many small business owners are able to omit the employer portion of their FICA taxes and decrease their tax liability. Further, you can have your first $50,000 taxed at a lower rate if you are structured as a C-corporation.&nbsp;</span></span></p><span data-dcnode-id="977" instrument_node=""> </span><h3 data-dcnode-id="974" id="maximize"><span data-dcnode-id="975" style="font-weight:400;"><span data-dcnode-id="976" instrument_node="">5. Maximize deductions</span></span></h3><span data-dcnode-id="973" instrument_node=""> </span><p data-dcnode-id="960"><span data-dcnode-id="971" style="font-weight:400;"><span data-dcnode-id="972" instrument_node="">Work closely with a tax professional to understand exactly what you can </span></span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/blog/what-are-tax-deductible-business-expenses/"><span data-dcnode-id="969" style="font-weight:400;"><span data-dcnode-id="970" instrument_node="">deduct in your business expenses</span></span></a><span data-dcnode-id="966" style="font-weight:400;"><span data-dcnode-id="967" instrument_node=""> (hint: it’s a lot). From travel to office supplies to marketing, you can deduct </span></span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/deducting-business-expenses"><span data-dcnode-id="964" style="font-weight:400;"><span data-dcnode-id="965" instrument_node="">“ordinary and necessary” expenses</span></span></a><span data-dcnode-id="961" style="font-weight:400;"><span data-dcnode-id="962" instrument_node=""> to reduce the amount taxed. The same can go for credits.&nbsp;</span></span></p><span data-dcnode-id="959" instrument_node=""> </span><p data-dcnode-id="951"><span data-dcnode-id="957" style="font-weight:400;"><span data-dcnode-id="958" instrument_node="">In order to deduct your expenses correctly and apply tax credits you’ll need meticulous records. Set up your books and </span></span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/expenses/"><span data-dcnode-id="955" style="font-weight:400;"><span data-dcnode-id="956" instrument_node="">expense management</span></span></a><span data-dcnode-id="952" style="font-weight:400;"><span data-dcnode-id="953" instrument_node=""> to categorize your tax deductible expenses and be sure to capture receipts for future access. </span></span></p><span data-dcnode-id="950" instrument_node=""> </span></div><span data-dcnode-id="948" instrument_node=""> </span></div><span data-dcnode-id="946" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="944"><div class="divider" data-dcnode-id="945" style="height:20px;"></div></div><span data-dcnode-id="943" instrument_node=""> </span><div class="wpb_text_column wpb_content_element vc_custom_1616030011943" data-dcnode-id="928"><span data-dcnode-id="942" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="930"><span data-dcnode-id="941" instrument_node=""> </span><p data-dcnode-id="932"><strong data-dcnode-id="933"><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Do you need help managing your small business taxes? Check out our </span></i><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/blog/guide-to-quarterly-business-taxes/"><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">tax guide</span></i></a><i data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">.</span></i></strong></p><span data-dcnode-id="931" instrument_node=""> </span></div><span data-dcnode-id="929" instrument_node=""> </span></div><span data-dcnode-id="927" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="925"><div class="divider" data-dcnode-id="926" style="height:20px;"></div></div><span data-dcnode-id="924" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="855"><span data-dcnode-id="923" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="857"><span data-dcnode-id="922" instrument_node=""> </span><h3 data-dcnode-id="919" id="contract"><span data-dcnode-id="920" style="font-weight:400;"><span data-dcnode-id="921" instrument_node="">6. Contract employees</span></span></h3><span data-dcnode-id="918" instrument_node=""> </span><p data-dcnode-id="910"><span data-dcnode-id="916" style="font-weight:400;"><span data-dcnode-id="917" instrument_node="">When you hire freelance employees or </span></span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/blog/how-to-file-taxes-as-an-independent-contractor-guide/"><span data-dcnode-id="914" style="font-weight:400;"><span data-dcnode-id="915" instrument_node="">independent contractors</span></span></a><span data-dcnode-id="911" style="font-weight:400;"><span data-dcnode-id="912" instrument_node="">, you are able to get quality work for a smaller portion of the taxes. You are not responsible for their employment taxes or healthcare costs, but can still get the same (if not better) results.&nbsp;</span></span></p><span data-dcnode-id="909" instrument_node=""> </span><h3 data-dcnode-id="906" id="contributions"><span data-dcnode-id="907" style="font-weight:400;"><span data-dcnode-id="908" instrument_node="">7. Charitable contributions</span></span></h3><span data-dcnode-id="905" instrument_node=""> </span><p data-dcnode-id="902"><span data-dcnode-id="903" style="font-weight:400;"><span data-dcnode-id="904" instrument_node="">Making charitable contributions is a great way to pay it forward and to establish trust with your customer base. Choose meaningful and effective charities and then keep careful track of your donations. You are able to deduct up to 25% of your taxable income in charitable donations, so it’s always a great option for building a reputation and reducing your tax liability.&nbsp;</span></span></p><span data-dcnode-id="901" instrument_node=""> </span><h3 data-dcnode-id="898" id="optimize"><span data-dcnode-id="899" style="font-weight:400;"><span data-dcnode-id="900" instrument_node="">8. Optimize deductions&nbsp;</span></span></h3><span data-dcnode-id="897" instrument_node=""> </span><p data-dcnode-id="894"><span data-dcnode-id="895" style="font-weight:400;"><span data-dcnode-id="896" instrument_node="">It’s critical that you deduct everything for which you are eligible to minimize your tax liability. But you shouldn’t stop there. For some business expenses you’re able to choose between two ways of deducting the expense.&nbsp;</span></span></p><span data-dcnode-id="893" instrument_node=""> </span><p data-dcnode-id="880"><span data-dcnode-id="891" style="font-weight:400;"><span data-dcnode-id="892" instrument_node="">For example, for cars and travel you can deduct the cost </span></span><i data-dcnode-id="888"><span data-dcnode-id="889" style="font-weight:400;"><span data-dcnode-id="890" instrument_node="">or</span></span></i><span data-dcnode-id="886" style="font-weight:400;"><span data-dcnode-id="887" instrument_node=""> use the </span></span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/tax-professionals/standard-mileage-rates"><span data-dcnode-id="884" style="font-weight:400;"><span data-dcnode-id="885" instrument_node="">IRS standard mileage rate</span></span></a><span data-dcnode-id="881" style="font-weight:400;"><span data-dcnode-id="882" instrument_node=""> for deduction. Another example is using large purchases as a whole-item deduction or deducting depreciation over time. Keeping meticulous records allows you to compare the advantages of each method and to choose the one that will provide the greatest return.&nbsp;</span></span></p><span data-dcnode-id="879" instrument_node=""> </span><h3 data-dcnode-id="876" id="law"><span data-dcnode-id="877" style="font-weight:400;"><span data-dcnode-id="878" instrument_node="">9. Stay current on tax law</span></span></h3><span data-dcnode-id="875" instrument_node=""> </span><p data-dcnode-id="872"><span data-dcnode-id="873" style="font-weight:400;"><span data-dcnode-id="874" instrument_node="">Tax law is changing constantly, and the way you completed your taxes last year might not work this year. Stay up-to-date on the current tax regulations and deduction particulars so that you can take full advantage of the most recent changes. Contract with a tax professional if you don’t have your own accounting team.&nbsp;</span></span></p><span data-dcnode-id="871" instrument_node=""> </span><h3 data-dcnode-id="868" id="accountable"><span data-dcnode-id="869" style="font-weight:400;"><span data-dcnode-id="870" instrument_node="">10. Adopt accountable plans</span></span></h3><span data-dcnode-id="867" instrument_node=""> </span><p data-dcnode-id="859"><span data-dcnode-id="865" style="font-weight:400;"><span data-dcnode-id="866" instrument_node="">If you need to </span></span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getdivvy.com/blog/are-employee-reimbursements-taxable/"><span data-dcnode-id="863" style="font-weight:400;"><span data-dcnode-id="864" instrument_node="">reimburse your employees</span></span></a><span data-dcnode-id="860" style="font-weight:400;"><span data-dcnode-id="861" instrument_node=""> for mileage, travel, or other expenses, you can save money on taxes by adopting accountable plans. It means that the reimbursements are not counted as part of W-2 income and are exempt from FICA and FUTA taxes.</span></span></p><span data-dcnode-id="858" instrument_node=""> </span></div><span data-dcnode-id="856" instrument_node=""> </span></div><span data-dcnode-id="854" instrument_node=""> </span></div><span data-dcnode-id="852" instrument_node=""> </span></div><span data-dcnode-id="850" instrument_node=""> </span></div><span data-dcnode-id="848" instrument_node=""> </span></div></div><span data-dcnode-id="845" instrument_node=""> </span><div class="wpb_row vc_row-fluid vc_row" data-column-margin="default" data-dcnode-id="764" data-midnight="dark" id="fws_6262e4059905a" style="padding-top:0px;padding-bottom:0px;"><div class="row-bg-wrap" data-bg-animation="none" data-bg-overlay="false" data-dcnode-id="842"><div class="inner-wrap" data-dcnode-id="843"><div class="row-bg" data-dcnode-id="844" style=""></div></div></div><div class="row_col_wrap_12 col span_12 dark left" data-dcnode-id="765"><span data-dcnode-id="841" instrument_node=""> </span><div class="vc_col-sm-12 wpb_column column_container vc_column_container col padding-10-percent" data-animation="" data-bg-color="" data-bg-opacity="1" data-dcnode-id="767" data-delay="0" data-has-bg-color="false" data-padding-pos="left-right" style="margin-bottom:2px;"><span data-dcnode-id="840" instrument_node=""> </span><div class="vc_column-inner" data-dcnode-id="769"><span data-dcnode-id="839" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="771"><span data-dcnode-id="838" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="830"><span data-dcnode-id="837" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="832"><span data-dcnode-id="836" instrument_node=""> </span><h2 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Put money back into your small business</span></h2><span data-dcnode-id="833" instrument_node=""> </span></div><span data-dcnode-id="831" instrument_node=""> </span></div><span data-dcnode-id="829" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="827"><div class="divider" data-dcnode-id="828" style="height:40px;"></div></div><span data-dcnode-id="826" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="817"><span data-dcnode-id="825" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="819"><span data-dcnode-id="824" instrument_node=""> </span><p data-dcnode-id="821"><span data-dcnode-id="822" style="font-weight:400;"><span data-dcnode-id="823" instrument_node="">It’s not too late to minimize your small business tax liability with some carefully placed purchases or donations, and managing the way you deduct expenses for your business. Talk with your trusted tax professional to determine the best course forward for your company. </span></span></p><span data-dcnode-id="820" instrument_node=""> </span></div><span data-dcnode-id="818" instrument_node=""> </span></div><span data-dcnode-id="816" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="814"><div class="divider" data-dcnode-id="815" style="height:40px;"></div></div><div class="divider-wrap" data-alignment="default" data-dcnode-id="812"><div class="divider-border" data-animate="" data-animation-delay="" data-color="default" data-dcnode-id="813" data-width="100%" style="margin-top:20px;height:1px;margin-bottom:20px;"></div></div><div class="divider-wrap" data-alignment="default" data-dcnode-id="810"><div class="divider" data-dcnode-id="811" style="height:40px;"></div></div><span data-dcnode-id="809" instrument_node=""> </span><div class="wpb_text_column wpb_content_element" data-dcnode-id="792"><span data-dcnode-id="808" instrument_node=""> </span><div class="wpb_wrapper" data-dcnode-id="794"><span data-dcnode-id="807" instrument_node=""> </span><p data-dcnode-id="796"><b data-dcnode-id="804"><i data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Divvy creates expense software that allows you to automate expense reports and categorizations that make tax season a breeze. </span></i></b><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apply.divvy.co/auth"><b data-dcnode-id="801"><i data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Sign up for free today</span></i></b></a><b data-dcnode-id="797"><i data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">. </span></i></b></p><span data-dcnode-id="795" instrument_node=""> </span></div><span data-dcnode-id="793" instrument_node=""> </span></div><span data-dcnode-id="791" instrument_node=""> </span><div class="divider-wrap" data-alignment="default" data-dcnode-id="789"><div class="divider" data-dcnode-id="790" style="height:20px;"></div></div><div class="img-with-aniamtion-wrap center" data-animation="fade-in" data-dcnode-id="773" data-max-width="100%" data-max-width-mobile="default" data-shadow="none"><span data-dcnode-id="788" instrument_node=""> </span><div class="inner" data-dcnode-id="775"><span data-dcnode-id="787" instrument_node=""> </span><div class="hover-wrap" data-dcnode-id="777" style="opacity: 1;"><span data-dcnode-id="786" instrument_node=""> </span><div class="hover-wrap-inner" data-dcnode-id="779"><span data-dcnode-id="785" instrument_node=""> </span><a class="center" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apply.divvy.co/" target="_self"><span data-dcnode-id="784" instrument_node=""> </span><img alt="grow your business with better credit and control. get started." class="img-with-animation skip-lazy lazyloaded animated-in" data-animation="fade-in" data-dcnode-id="783" data-delay="0" height="400" id="MTI1MTo2ODg=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cfojb.nitrocdn.com/jdVUvNAagxcDlwFoRwekSNRHWyXQwqms/assets/static/optimized/rev-b86a2b9/wp-content/uploads/2021/04/cta-grow-business-start.png" nitro-lazy-srcset="https://cdn-cfojb.nitrocdn.com/jdVUvNAagxcDlwFoRwekSNRHWyXQwqms/assets/static/optimized/rev-b86a2b9/wp-content/uploads/2021/04/cta-grow-business-start.png 800w, https://cdn-cfojb.nitrocdn.com/jdVUvNAagxcDlwFoRwekSNRHWyXQwqms/assets/static/optimized/rev-b86a2b9/wp-content/uploads/2021/04/cta-grow-business-start-300x150.png 300w, https://cdn-cfojb.nitrocdn.com/jdVUvNAagxcDlwFoRwekSNRHWyXQwqms/assets/static/optimized/rev-b86a2b9/wp-content/uploads/2021/04/cta-grow-business-start-768x384.png 768w, https://cdn-cfojb.nitrocdn.com/jdVUvNAagxcDlwFoRwekSNRHWyXQwqms/assets/static/optimized/rev-b86a2b9/wp-content/uploads/
