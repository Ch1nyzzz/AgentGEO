</span><p data-dcnode-id="3247"><span data-dcnode-id="3257" instrument_node="">One of the most important issues in assessing reform options is the impact on charitable giving. The estate tax encourages charitable giving at death by allowing a deduction for charitable bequests. It also encourages giving during life, as explained below. But the </span><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="3256" instrument_node="">tax</span></a><span data-dcnode-id="3254" instrument_node=""> reduces charitable gifts by reducing the amount of </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wealth" title="Wealth"><span data-dcnode-id="3253" instrument_node="">wealth</span></a><span data-dcnode-id="3251" instrument_node=""> decedents can allocate to various uses. The net impact of these effects is ambiguous in theory. It is found that estate tax repeal reduces charitable bequests by between 22 and 37 percent, or between $3.6 billion and $6 billion per year. To put this in perspective, a reduction in annual charitable donations in life and at death of $10 billion due to estate tax repeal implies that, each year, the nonprofit sector would lose resources equivalent to the total grants currently made by the largest 110 foundations in the </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3250" instrument_node="">United States</span></a><span data-dcnode-id="3248" instrument_node="">. The qualitative conclusion that repeal would significantly reduce giving holds even if repeal raises aggregate pre-tax wealth and income by plausible amounts.
</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Some simple examples show the channels through which estate tax repeal would affect giving and why it is plausible to believe that repeal would reduce such giving. Holding pre-tax wealth constant, the estate tax directly reduces the price of charitable bequests and the level of after-tax wealth that decedents can allocate to various uses. The effect of estate tax repeal depends on the relative magnitude of the changes in price and after-tax wealth; and the relative responsiveness of charitable bequests to changes in each.
</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3244" instrument_node="">Estate tax repeal would have significant deleterious effects on charitable bequests and charitable giving during life. Although estate tax reform will raise many issues, the impact on the nonprofit sector should be a central part of the debate.</span><sup class="reference" data-dcnode-id="3241" id="cite_ref-53"><a data-dcnode-id="3242" href="#cite_note-53"><span data-dcnode-id="3243" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3240" instrument_node="">
</span></p><span data-dcnode-id="3238" instrument_node="">
</span><h2 data-dcnode-id="3228"><span class="mw-headline" data-dcnode-id="3236" id="Debate"><span data-dcnode-id="3237" instrument_node="">Debate</span></span><span class="mw-editsection" data-dcnode-id="3229"><span class="mw-editsection-bracket" data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">[</span></span><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Debate"><span data-dcnode-id="3233" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3226" instrument_node="">The estate tax is a recurring source of contentious political debate and </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_football" title="Political football"><span data-dcnode-id="3225" instrument_node="">political football</span></a><span data-dcnode-id="3223" instrument_node="">.  Generally the debate breaks down between a side which opposes any tax on inheritance, and another which considers it good policy.
</span></p><span data-dcnode-id="3221" instrument_node="">
</span><h3 data-dcnode-id="3211"><span class="mw-headline" data-dcnode-id="3219" id="Arguments_in_support"><span data-dcnode-id="3220" instrument_node="">Arguments in support</span></span><span class="mw-editsection" data-dcnode-id="3212"><span class="mw-editsection-bracket" data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">[</span></span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Arguments in support"><span data-dcnode-id="3216" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3198"><span data-dcnode-id="3209" instrument_node="">Proponents of the estate tax argue that large inheritances (currently those over $5 million) are a progressive and fair source of government funding. Removing the estate tax, they argue, favors only the very wealthy and leaves a greater share of the total tax burden on working taxpayers.  Proponents further argue that campaigns to repeal the tax rely on public confusion about the estate tax and about tax policy more generally.</span><sup class="reference" data-dcnode-id="3206" id="cite_ref-54"><a data-dcnode-id="3207" href="#cite_note-54"><span data-dcnode-id="3208" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="3203" id="cite_ref-55"><a data-dcnode-id="3204" href="#cite_note-55"><span data-dcnode-id="3205" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3202" instrument_node="">  William Gale and Joel Slemrod give three reasons for taxing at the point of inheritance in their book </span><i data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Rethinking Estate and Gift Taxation</span></i><span data-dcnode-id="3199" instrument_node="">.  "First, the probate process may reveal information about lifetime economic well-being that is difficult to obtain in the course of enforcement of the income tax but is nevertheless relevant to societal notions of who should pay tax.  Second, taxes imposed at death may have smaller disincentive effects on lifetime labor supply and saving than taxes that raise the same revenue (in present value terms) but are imposed during life.  Third, if society does wish to tax lifetime transfers among adult households, it is difficult to see any time other than death at which to assess the total transfers made."
</span></p><span data-dcnode-id="3197" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3188"><p data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">While death may be unpleasant to contemplate, there are good administrative, equity, and efficiency reasons to impose taxes at death, and the asserted costs appear to be overblown.</span></p><div class="templatequotecite" data-dcnode-id="3189"><span data-dcnode-id="3192" instrument_node="">— </span><cite data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">William Gale and Joel Slemrod</span></cite></div></blockquote><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3186" instrument_node="">In response to the concern that the estate tax interferes with a middle-class family's ability to pass on wealth, proponents point out that the estate tax currently affects only estates of considerable size (over $5 million, and $10 million for couples) and provides numerous credits (including the unified credit) that allow a significant portion of even large estates to escape taxation.</span><sup class="reference" data-dcnode-id="3183" id="cite_ref-NYT_2006_56-0"><a data-dcnode-id="3184" href="#cite_note-NYT_2006-56"><span data-dcnode-id="3185" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3182" instrument_node=""> Proponents note that abolishing the estate tax will result in tens of billions of dollars being lost annually from the federal budget.</span><sup class="reference" data-dcnode-id="3179" id="cite_ref-Atlantic_57-0"><a data-dcnode-id="3180" href="#cite_note-Atlantic-57"><span data-dcnode-id="3181" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3178" instrument_node=""> Proponents of the estate tax argue that it serves to prevent the perpetuation of wealth, free of tax, in wealthy families and that it is necessary to a system of </span><a class="mw-redirect" data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_taxation" title="Progressive taxation"><span data-dcnode-id="3177" instrument_node="">progressive taxation</span></a><span data-dcnode-id="3175" instrument_node="">.</span><sup class="reference" data-dcnode-id="3172" id="cite_ref-WAPO_58-0"><a data-dcnode-id="3173" href="#cite_note-WAPO-58"><span data-dcnode-id="3174" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3171" instrument_node="">
</span></p><p data-dcnode-id="3145"><span data-dcnode-id="3169" instrument_node="">A driving force behind support for the estate tax is the concept of </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_opportunity" title="Equal opportunity"><span data-dcnode-id="3168" instrument_node="">equal opportunity</span></a><span data-dcnode-id="3166" instrument_node=""> as a basis for the </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_contract" title="Social contract"><span data-dcnode-id="3165" instrument_node="">social contract</span></a><span data-dcnode-id="3163" instrument_node="">.  This viewpoint highlights the association between wealth and power in society – material, proprietary, personal, political, social.  Arguments that justify wealth disparities based on individual talents, efforts, or achievements, do not support the same disparities where they result from the </span><a class="mw-redirect" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rule_Against_Perpetuities" title="Rule Against Perpetuities"><span data-dcnode-id="3162" instrument_node="">dead hand</span></a><span data-dcnode-id="3160" instrument_node="">.  These views are bolstered by the concept that those who enjoy a privileged position in society should have a greater obligation to pay for its costs.  The strength of political opposition to the estate tax, proponents argue, would not be found under a </span><a class="mw-redirect" data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veil_of_ignorance" title="Veil of ignorance"><span data-dcnode-id="3159" instrument_node="">veil of ignorance</span></a><span data-dcnode-id="3157" instrument_node="">, in which policy makers were kept from knowing the wealth of their own families.</span><sup class="reference" data-dcnode-id="3154" id="cite_ref-59"><a data-dcnode-id="3155" href="#cite_note-59"><span data-dcnode-id="3156" instrument_node="">[59]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="3147" style="white-space:nowrap;"><span data-dcnode-id="3153" instrument_node="">[</span><i data-dcnode-id="3149"><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AReliable_sources" title="Wikipedia:Reliable sources"><span data-dcnode-id="3151" title="The material near this tag may rely on an unreliable source. (October 2013)"><span data-dcnode-id="3152" instrument_node="">unreliable source?</span></span></a></i><span data-dcnode-id="3148" instrument_node="">]</span></sup><span data-dcnode-id="3146" instrument_node="">
</span></p><p data-dcnode-id="3116"><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winston_Churchill" title="Winston Churchill"><span data-dcnode-id="3144" instrument_node="">Winston Churchill</span></a><span data-dcnode-id="3142" instrument_node=""> argued that estate taxes are "a certain corrective against the development of a race of idle rich". This issue has been referred to as the "Carnegie effect," for </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Carnegie" title="Andrew Carnegie"><span data-dcnode-id="3141" instrument_node="">Andrew Carnegie</span></a><span data-dcnode-id="3139" instrument_node="">. Carnegie once commented, "The parent who leaves his son enormous wealth generally deadens the talents and energies of the son, and tempts him to lead a less useful and less worthy life than he otherwise would'." Some research suggests that the more wealth that older people inherit, the more likely they are to leave the labor market.</span><sup class="reference" data-dcnode-id="3136" id="cite_ref-60"><a data-dcnode-id="3137" href="#cite_note-60"><span data-dcnode-id="3138" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3135" instrument_node=""> A 2004 report by the Congressional Budget Office found that eliminating the estate tax would reduce charitable giving by 6–12 percent.</span><sup class="reference" data-dcnode-id="3132" id="cite_ref-61"><a data-dcnode-id="3133" href="#cite_note-61"><span data-dcnode-id="3134" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3131" instrument_node=""> Chye-Ching Huang and Nathaniel Frentz of the </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Center_on_Budget_and_Policy_Priorities" title="Center on Budget and Policy Priorities"><span data-dcnode-id="3130" instrument_node="">Center on Budget and Policy Priorities</span></a><span data-dcnode-id="3128" instrument_node=""> assert that repealing the estate tax "would not substantially affect private saving...." and that repeal would increase government deficits, thereby reducing the amount of capital available for investment.</span><sup class="reference" data-dcnode-id="3125" id="cite_ref-cbpp.org_62-0"><a data-dcnode-id="3126" href="#cite_note-cbpp.org-62"><span data-dcnode-id="3127" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3124" instrument_node="">
In the 2006 documentary, </span><i data-dcnode-id="3121"><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_One_Percent_%28film%29" title="The One Percent (film)"><span data-dcnode-id="3123" instrument_node="">The One Percent</span></a></i><span data-dcnode-id="3120" instrument_node="">, </span><a data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Reich" title="Robert Reich"><span data-dcnode-id="3119" instrument_node="">Robert Reich</span></a><span data-dcnode-id="3117" instrument_node=""> commented, "If we continue to reduce the estate tax on the schedule we now have, it means that we are going to have the children of the wealthiest people in this country owning more and more of the assets of this country, and their children as well.... It's unfair; it's unjust; it's absurd."
</span></p><p data-dcnode-id="3106"><span data-dcnode-id="3115" instrument_node="">Proponents of the estate tax tend to object to characterizations that it operates as a "double tax". They point out many of the earnings subject to estate tax were never taxed because they were "unrealized" gains.</span><sup class="reference" data-dcnode-id="3112" id="cite_ref-NYT_2006_56-1"><a data-dcnode-id="3113" href="#cite_note-NYT_2006-56"><span data-dcnode-id="3114" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3111" instrument_node=""> Others describe this point as a red herring given common overlapping of taxes. Chye-Ching Huang and Nathaniel Frentz of the Center on Budget and Policy Priorities assert that large estates "consist to a significant degree of 'unrealized' capital gains that have never been taxed...."</span><sup class="reference" data-dcnode-id="3108" id="cite_ref-cbpp.org_62-1"><a data-dcnode-id="3109" href="#cite_note-cbpp.org-62"><span data-dcnode-id="3110" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3107" instrument_node="">
</span></p><p data-dcnode-id="3096"><span data-dcnode-id="3105" instrument_node="">Supporters of the estate tax argue there is longstanding historical precedent for limiting inheritance, and note current generational transfers of wealth are greater than they have been historically. In ancient times, funeral rites for lords and chieftains involved significant wealth expenditure on sacrifices to religious deities, feasting, and ceremonies. The well-to-do were literally buried or burned along with most of their wealth. These traditions may have been imposed by religious edict but they served a real purpose, which was to prevent accumulation of great disparities of wealth, which, estate tax proponents suggest, tended to prevent social destabilization, revolution, or disruption of functioning economic systems.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3098" style="white-space:nowrap;"><span data-dcnode-id="3104" instrument_node="">[</span><i data-dcnode-id="3100"><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3102" title="who argues this? (October 2020)"><span data-dcnode-id="3103" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3099" instrument_node="">]</span></sup><span data-dcnode-id="3097" instrument_node="">
</span></p><p data-dcnode-id="3087"><span data-dcnode-id="3095" instrument_node="">Economist </span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jared_Bernstein" title="Jared Bernstein"><span data-dcnode-id="3094" instrument_node="">Jared Bernstein</span></a><span data-dcnode-id="3092" instrument_node=""> has said: "People call it the 'Paris Hilton tax' for a reason, we live in an economy now where 40 percent of the nation's wealth accumulates to the top 1 percent. And when these folks leave bequests to their heirs, we're talking about bequests in the tens of millions".</span><sup class="reference" data-dcnode-id="3089" id="cite_ref-NPR.org_63-0"><a data-dcnode-id="3090" href="#cite_note-NPR.org-63"><span data-dcnode-id="3091" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3088" instrument_node="">
</span></p><p data-dcnode-id="3065"><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_market" title="Free market"><span data-dcnode-id="3086" instrument_node="">Free market</span></a><span data-dcnode-id="3084" instrument_node=""> supporters of the tax, including </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="3083" instrument_node="">Adam Smith</span></a><sup class="reference" data-dcnode-id="3079" id="cite_ref-Spectator_-_Inheritance_Tax_Is_Good_64-0"><a data-dcnode-id="3080" href="#cite_note-Spectator_-_Inheritance_Tax_Is_Good-64"><span data-dcnode-id="3081" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3078" instrument_node=""> and the </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Founding_Fathers_of_the_United_States" title="Founding Fathers of the United States"><span data-dcnode-id="3077" instrument_node="">founding fathers</span></a><sup class="reference" data-dcnode-id="3073" id="cite_ref-Estate_tax_and_the_founding_fathers_65-0"><a data-dcnode-id="3074" href="#cite_note-Estate_tax_and_the_founding_fathers-65"><span data-dcnode-id="3075" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3072" instrument_node=""> would argue that people should be able to get to the top of the market through earning wealth, based on meritocratic competition, not through unearned, inherited handouts, which were central to the </span><a class="mw-redirect" data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristocratic" title="Aristocratic"><span data-dcnode-id="3071" instrument_node="">aristocratic</span></a><span data-dcnode-id="3069" instrument_node=""> systems they were opposed to, and fought the </span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolutionary_War" title="American Revolutionary War"><span data-dcnode-id="3068" instrument_node="">War of Independence</span></a><span data-dcnode-id="3066" instrument_node=""> to free American citizens from. Smith wrote:
</span></p><span data-dcnode-id="3064" instrument_node="">
</span><link data-dcnode-id="3063" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3057"><p data-dcnode-id="3058"><span data-dcnode-id="3062" instrument_node="">A power to dispose of estates for ever is manifestly absurd. The earth and the fulness of it belongs to every generation, and the preceding one can have no right to bind it up from posterity. Such extension of property is quite unnatural.</span><sup class="reference" data-dcnode-id="3059" id="cite_ref-Estate_tax_and_the_founding_fathers_65-1"><a data-dcnode-id="3060" href="#cite_note-Estate_tax_and_the_founding_fathers-65"><span data-dcnode-id="3061" instrument_node="">[65]</span></a></sup></p></blockquote><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3055" instrument_node="">Unearned transfers of wealth work against the free market by creating a disincentive of hard work in the recipients, and others in the market.</span><sup class="reference" data-dcnode-id="3052" id="cite_ref-FT_-_Inheritance_should_not_be_an_alternative_to_hard_work_66-0"><a data-dcnode-id="3053" href="#cite_note-FT_-_Inheritance_should_not_be_an_alternative_to_hard_work-66"><span data-dcnode-id="3054" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3051" instrument_node=""> If the income from estate tax is reduced, this would have to be made up broadly through taxes on working people. Accordingly, if estate tax was increased relative to other taxes, </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irwin_Stelzer" title="Irwin Stelzer"><span data-dcnode-id="3050" instrument_node="">Irwin Stelzer</span></a><span data-dcnode-id="3048" instrument_node=""> argues it could pay for "lowering the marginal tax rate faced by all earners. Reduce taxes on the pay for that extra work, and you will get more of it; reduce taxes on the profits from risk-taking, and entrepreneurs will take more chances and create more jobs. Reduce the taxes on recipients of inheritances, on the other hand, and they will work less and be less likely to start up new businesses..".</span><sup class="reference" data-dcnode-id="3045" id="cite_ref-Spectator_-_Inheritance_Tax_Is_Good_64-1"><a data-dcnode-id="3046" href="#cite_note-Spectator_-_Inheritance_Tax_Is_Good-64"><span data-dcnode-id="3047" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3044" instrument_node="">
</span></p><p data-dcnode-id="3017"><span data-dcnode-id="3042" instrument_node="">Unhindered inheritance has another possible influence on some in the market; if many of the wealthiest in the country acquired their wealth through inheritance, while contributing nothing to the market personally to get there, people at the lower end of the market may have equal economic potential as many of those receiving some of this 40 percent of wealth, but did not have the luck of being born to wealthy parents. The disparity in fair chance of acquiring initial wealth, on top of pre-existing differences in non fiscal sustenance like differing qualities of education, inherited work ethic, and valuable connections, causes resentment and the perception that hard work is of diminished importance, when some, due to bad luck will struggle to afford the basics of living even at maximum effort, while others may never need to work, and even present this lifestyle as ideal.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3035" style="white-space:nowrap;"><span data-dcnode-id="3041" instrument_node="">[</span><i data-dcnode-id="3037"><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3039" title="This claim needs references to reliable sources. (November 2016)"><span data-dcnode-id="3040" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3036" instrument_node="">]</span></sup><span data-dcnode-id="3034" instrument_node="">. The disparity in initial gifted wealth also means a reduced ability for some to accumulate wealth; it is a lot easier to put money aside if you inherited a house and do not have to rent one.</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-FT_-_Inheritance_should_not_be_an_alternative_to_hard_work_66-1"><a data-dcnode-id="3032" href="#cite_note-FT_-_Inheritance_should_not_be_an_alternative_to_hard_work-66"><span data-dcnode-id="3033" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3030" instrument_node=""> These factors create a system perceived to be rigged against those who are not lucky enough to be born into wealthy families, along with political instability; continuous infighting and even civil wars.</span><sup class="reference" data-dcnode-id="3027" id="cite_ref-67"><a data-dcnode-id="3028" href="#cite_note-67"><span data-dcnode-id="3029" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3026" instrument_node=""> Reducing estate tax exacerbates this situation, while increasing estate tax promotes a fairer free market, especially if this excess wealth is used to encourage productivity, while also encouraging wealthy parents to focus on providing the best skills and education for their children.</span><sup class="reference" data-dcnode-id="3023" id="cite_ref-Spectator_-_Inheritance_Tax_Is_Good_64-2"><a data-dcnode-id="3024" href="#cite_note-Spectator_-_Inheritance_Tax_Is_Good-64"><span data-dcnode-id="3025" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3022" instrument_node=""> Michael J. Graetz has said: "Indeed, that's what the case for the estate tax boils down to: basic fairness. The tax affects a small number of people who inherit large amounts of wealth—and who can afford to give up a portion of their windfall to help finance their government."</span><sup class="reference" data-dcnode-id="3019" id="cite_ref-Wall_Street_Journal,_Its_Fair,_and_we_need_the_Revenue._68-0"><a data-dcnode-id="3020" href="#cite_note-Wall_Street_Journal,_Its_Fair,_and_we_need_the_Revenue.-68"><span data-dcnode-id="3021" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3018" instrument_node="">
</span></p><p data-dcnode-id="3005"><span data-dcnode-id="3016" instrument_node="">Some proponents of a steep estate tax argue that concentrating wealth in the hands of a few is harmful to both the economy and to democracy itself. </span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oscar_F._Mayer" title="Oscar F. Mayer"><span data-dcnode-id="3015" instrument_node="">Oscar Mayer</span></a><span data-dcnode-id="3013" instrument_node=""> heir </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chuck_Collins" title="Chuck Collins"><span data-dcnode-id="3012" instrument_node="">Chuck Collins</span></a><span data-dcnode-id="3010" instrument_node=""> writes "Billionaires are expanding their shares of the pie at the expense of investments in our social safety net, infrastructure, and education systems," and notes that "Supreme Court Justice Louis Brandeis observed, 'You can have concentrated wealth in the hands of a few or democracy. But you can’t have both.'"</span><sup class="reference" data-dcnode-id="3007" id="cite_ref-69"><a data-dcnode-id="3008" href="#cite_note-69"><span data-dcnode-id="3009" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3006" instrument_node="">
</span></p><span data-dcnode-id="3004" instrument_node="">
</span><h3 data-dcnode-id="2994"><span class="mw-headline" data-dcnode-id="3002" id="Arguments_against"><span data-dcnode-id="3003" instrument_node="">Arguments against</span></span><span class="mw-editsection" data-dcnode-id="2995"><span class="mw-editsection-bracket" data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">[</span></span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D18" title="Edit section: Arguments against"><span data-dcnode-id="2999" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2992" instrument_node="">Some people oppose the estate tax on principle of individualism and a market economy. In their view, proponents of the tax often argue that "excess wealth" should be taxed without defining "excess" or explaining why taxing it is undesirable if it was acquired by legal means. Such arguments are seen to have a predilection for collectivist principles that opponents of the estate tax oppose.</span><sup class="reference" data-dcnode-id="2989" id="cite_ref-auto_70-0"><a data-dcnode-id="2990" href="#cite_note-auto-70"><span data-dcnode-id="2991" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="2986" id="cite_ref-71"><a data-dcnode-id="2987" href="#cite_note-71"><span data-dcnode-id="2988" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="2983" id="cite_ref-72"><a data-dcnode-id="2984" href="#cite_note-72"><span data-dcnode-id="2985" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2982" instrument_node=""> In arguing against the estate tax, the </span><i data-dcnode-id="2979"><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investor%2527s_Business_Daily" title="Investor's Business Daily"><span data-dcnode-id="2981" instrument_node="">Investor's Business Daily</span></a></i><span data-dcnode-id="2978" instrument_node=""> has editorialized that "People should not be punished because they work hard, become successful and want to pass on the fruits of their labor, or even their ancestors' labor, to their children. As has been said, families shouldn't be required to visit the undertaker and the tax collector on the same day.".</span><sup class="reference" data-dcnode-id="2975" id="cite_ref-auto_70-1"><a data-dcnode-id="2976" href="#cite_note-auto-70"><span data-dcnode-id="2977" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2974" instrument_node="">
</span></p><p data-dcnode-id="2954"><span data-dcnode-id="2972" instrument_node="">A similar argument is based on a distrust of governments to use taxes for the public good. In an article in </span><i data-dcnode-id="2969"><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Examiner" title="Washington Examiner"><span data-dcnode-id="2971" instrument_node="">Washington Examiner</span></a></i><span data-dcnode-id="2968" instrument_node="">, Michael Shindler argued that "inheritance of multigenerational wealth allows people, especially young people, to comfortably pursue callings that, despite their vital importance to human flourishing, are typically uncompensated by the market" and cites </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lord_Byron" title="Lord Byron"><span data-dcnode-id="2967" instrument_node="">Lord Byron</span></a><span data-dcnode-id="2965" instrument_node="">, </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="2964" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="2962" instrument_node="">, and </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Wittgenstein" title="Ludwig Wittgenstein"><span data-dcnode-id="2961" instrument_node="">Ludwig Wittgenstein</span></a><span data-dcnode-id="2959" instrument_node=""> as examples of such individuals. Similarly, Shindler also argues that "whereas in Europe museums, theaters, symphony halls, and other cultural institutions are typically government-subsidized, here they gain the bulk of their funding from the generosity of philanthropic foundations founded and sustained by the stewards of multigenerational wealth....Consequently, American culture is less an expression of the whims of bureaucrats and more a manifestation of the will of its citizenry."</span><sup class="reference" data-dcnode-id="2956" id="cite_ref-73"><a data-dcnode-id="2957" href="#cite_note-73"><span data-dcnode-id="2958" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2955" instrument_node="">
</span></p><p data-dcnode-id="2945"><span data-dcnode-id="2953" instrument_node="">Other arguments against an estate tax are based on its economic effects. The </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Foundation" title="Tax Foundation"><span data-dcnode-id="2952" instrument_node="">Tax Foundation</span></a><span data-dcnode-id="2950" instrument_node=""> published research suggesting that the estate tax is a strong disincentive to entrepreneurship. Its 1994 study found that a 55% tax rate had roughly the same effect as doubling an entrepreneur's top effective marginal income tax rate. Also, the estate tax was found to impose a large compliance burden on the U.S. economy. Past studies by the same group estimated compliance costs to be roughly equal to the revenue raised – nearly five times more cost per dollar of revenue than the federal income tax – making it one of the nation's most inefficient revenue sources.</span><sup class="reference" data-dcnode-id="2947" id="cite_ref-Tax_Foundation_74-0"><a data-dcnode-id="2948" href="#cite_note-Tax_Foundation-74"><span data-dcnode-id="2949" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2946" instrument_node="">
</span></p><p data-dcnode-id="2939"><span data-dcnode-id="2944" instrument_node="">Another argument is that tax obligation can overshadow more fundamental decisions about the assets. In certain cases, it is claimed to create an undue burden. For example, pending estate taxes could be a disincentive to invest in a viable business or an incentive to liquidate, downsize, divest from or retire one. This is especially true when an estate's value is about to surpass the exemption amount. Older people may see less value in maintaining a farm or small business than reducing risk and preserving their capital, by shifting resources, liquidating assets, and using tax avoidance techniques such as insurance, gift transfer, trusts and tax-free investments.</span><sup class="reference" data-dcnode-id="2941" id="cite_ref-75"><a data-dcnode-id="2942" href="#cite_note-75"><span data-dcnode-id="2943" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2940" instrument_node="">
</span></p><p data-dcnode-id="2906"><span data-dcnode-id="2938" instrument_node="">Another argument is that the estate tax burdens farmers because agriculture requires more capital assets, such as land and equipment, to generate the same income that other types of businesses generate with fewer assets. Individuals, partnerships and family corporations own 98% of the nation's 2.2 million farms and ranches. The estate tax may force surviving family members to sell land, buildings, or equipment to continue their operation.</span><sup class="reference" data-dcnode-id="2935" id="cite_ref-76"><a data-dcnode-id="2936" href="#cite_note-76"><span data-dcnode-id="2937" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2934" instrument_node="">  The </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Farmers_Union_%28United_States%29%23Current_activities" title="National Farmers Union (United States)"><span data-dcnode-id="2933" instrument_node="">National Farmers Union</span></a><span data-dcnode-id="2931" instrument_node=""> advocated relief for farmers by increasing the exemption per estate to $5 million.</span><sup class="reference" data-dcnode-id="2928" id="cite_ref-Policy_of_the_National_Farmers_Union_77-0"><a data-dcnode-id="2929" href="#cite_note-Policy_of_the_National_Farmers_Union-77"><span data-dcnode-id="2930" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2927" instrument_node=""> </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_Standing_for_the_Simplification_of_the_Estate_Tax" title="Americans Standing for the Simplification of the Estate Tax"><span data-dcnode-id="2926" instrument_node="">Americans Standing for the Simplification of the Estate Tax</span></a><span data-dcnode-id="2924" instrument_node=""> advocates relief for farmers and small business owners by eliminating death as a taxable event in what the group describes as a </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Down_payment" title="Down payment"><span data-dcnode-id="2923" instrument_node="">down payment</span></a><span data-dcnode-id="2921" instrument_node=""> on their estate taxes during their earning years.</span><sup class="reference" data-dcnode-id="2918" id="cite_ref-78"><a data-dcnode-id="2919" href="#cite_note-78"><span data-dcnode-id="2920" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2917" instrument_node=""> Along these lines, the American Solution for Simplifying the Estate Tax Act, or 'ASSET Act', of 2014 (H.R. 5872) was introduced on December 11, 2014 to the </span><a class="mw-redirect" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/113th_Congress" title="113th Congress"><span data-dcnode-id="2916" instrument_node="">113th Congress</span></a><span data-dcnode-id="2914" instrument_node=""> by Rep. </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andy_Harris_%28politician%29" title="Andy Harris (politician)"><span data-dcnode-id="2913" instrument_node="">Andy Harris</span></a><span data-dcnode-id="2911" instrument_node="">.</span><sup class="reference" data-dcnode-id="2908" id="cite_ref-79"><a data-dcnode-id="2909" href="#cite_note-79"><span data-dcnode-id="2910" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2907" instrument_node="">
</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2905" instrument_node="">Another set of arguments against the estate tax is based on its enforcement. The </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Foundation" title="Tax Foundation"><span data-dcnode-id="2904" instrument_node="">Tax Foundation</span></a><span data-dcnode-id="2902" instrument_node=""> notes that because the tax can be avoided with careful estate planning, estate taxes are just "penalties imposed on those who neglect to plan ahead or who retain unskilled estate planners".</span><sup class="reference" data-dcnode-id="2899" id="cite_ref-Tax_Foundation_74-1"><a data-dcnode-id="2900" href="#cite_note-Tax_Foundation-74"><span data-dcnode-id="2901" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2898" instrument_node=""> A </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_competition" title="Tax competition"><span data-dcnode-id="2897" instrument_node="">disparity between tax rates</span></a><span data-dcnode-id="2895" instrument_node=""> may encourage wealthy people to minimize taxation by moving their wealth outside the United States. As a result, the collected tax will be far less than claimed by proponents and will lower the tax base, opponents argue.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2888" style="white-space:nowrap;"><span data-dcnode-id="2894" instrument_node="">[</span><i data-dcnode-id="2890"><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2892" title="This claim needs references to reliable sources. (March 2015)"><span data-dcnode-id="2893" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2889" instrument_node="">]</span></sup><span data-dcnode-id="2887" instrument_node=""> However, most countries have inheritance tax at similar or higher rates.</span><sup class="reference" data-dcnode-id="2884" id="cite_ref-80"><a data-dcnode-id="2885" href="#cite_note-80"><span data-dcnode-id="2886" instrument_node="">[80]</span></a></sup><span data-dcnode-id="2883" instrument_node="">
</span></p><span data-dcnode-id="2881" instrument_node="">
</span><h3 data-dcnode-id="2870"><span data-dcnode-id="2880" id="The_term_.22death_tax.22"></span><span class="mw-headline" data-dcnode-id="2878" id="The_term_&quot;death_tax&quot;"><span data-dcnode-id="2879" instrument_node="">The term "death tax"</span></span><span class="mw-editsection" data-dcnode-id="2871"><span class="mw-editsection-bracket" data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">[</span></span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D19" title="Edit section: The term &quot;death tax&quot;"><span data-dcnode-id="2875" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2869" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2868" instrument_node="">The caption for section 303 of the Internal Revenue Code of 1954, enacted on August 16, 1954, refers to estate taxes, inheritance taxes, legacy taxes and succession taxes imposed because of the death of an individual as "death taxes". That wording remains in the caption of the Internal Revenue Code of 1986, as amended.</span><sup class="reference" data-dcnode-id="2865" id="cite_ref-81"><a data-dcnode-id="2866" href="#cite_note-81"><span data-dcnode-id="2867" instrument_node="">[81]</span></a></sup><span data-dcnode-id="2864" instrument_node="">
</span></p><p data-dcnode-id="2840"><span data-dcnode-id="2862" instrument_node="">On July 1, 1862, the U.S. Congress enacted a "duty or tax" with respect to certain "legacies or distributive shares arising from personal property" passing, either by will or intestacy, from deceased persons.</span><sup class="reference" data-dcnode-id="2859" id="cite_ref-82"><a data-dcnode-id="2860" href="#cite_note-82"><span data-dcnode-id="2861" instrument_node="">[82]</span></a></sup><span data-dcnode-id="2858" instrument_node=""> The modern U.S. estate tax was enacted on September 8, 1916 under section 201 of the </span><a data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revenue_Act_of_1916" title="Revenue Act of 1916"><span data-dcnode-id="2857" instrument_node="">Revenue Act of 1916</span></a><span data-dcnode-id="2855" instrument_node="">. Section 201 used the term "estate tax".</span><sup class="reference" data-dcnode-id="2852" id="cite_ref-83"><a data-dcnode-id="2853" href="#cite_note-83"><span data-dcnode-id="2854" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="2849" id="cite_ref-84"><a data-dcnode-id="2850" href="#cite_note-84"><span data-dcnode-id="2851" instrument_node="">[84]</span></a></sup><span data-dcnode-id="2848" instrument_node=""> According to Professor </span><a class="new" data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMichael_J._Graetz%26action%3Dedit%26redlink%3D1" title="Michael J. Graetz (page does not exist)"><span data-dcnode-id="2847" instrument_node="">Michael Graetz</span></a><span data-dcnode-id="2845" instrument_node=""> of Columbia Law School and professor emeritus at Yale Law School, opponents of the estate tax began calling it the "death tax" in the 1940s.</span><sup class="reference" data-dcnode-id="2842" id="cite_ref-85"><a data-dcnode-id="2843" href="#cite_note-85"><span data-dcnode-id="2844" instrument_node="">[85]</span></a></sup><span data-dcnode-id="2841" instrument_node=""> The term "death tax" more directly refers back to the original use of "death duties" to address the fact that death itself triggers the tax or the transfer of assets on which the tax is assessed.
</span></p><p data-dcnode-id="2824"><span data-dcnode-id="2839" instrument_node="">While the use of terms like "death duty" had been known earlier, specifically calling </span><i data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">estate tax</span></i><span data-dcnode-id="2836" instrument_node=""> the "death tax" was a move that entered mainstream public discourse in the 1990s, as an attempt to give it a devastating new nickname in a manner similar to a </span><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neologism" title="Neologism"><span data-dcnode-id="2835" instrument_node="">neologism</span></a><span data-dcnode-id="2833" instrument_node="">. This happened after a proposal was shelved that would have reduced the threshold from $600,000 to $200,000, after it proved to be more unpopular than expected, and awakened political interest in reducing the tax.</span><sup class="reference" data-dcnode-id="2830" id="cite_ref-Economist_-_Taxing_inheritances_is_falling_out_of_favour_86-0"><a data-dcnode-id="2831" href="#cite_note-Economist_-_Taxing_inheritances_is_falling_out_of_favour-86"><span data-dcnode-id="2832" instrument_node="">[86]</span></a></sup><span data-dcnode-id="2829" instrument_node=""> For some reason, surveys suggest that opposition to inheritance and estate taxes is even stronger with the poor than with the rich.</span><sup class="reference" data-dcnode-id="2826" id="cite_ref-87"><a data-dcnode-id="2827" href="#cite_note-87"><span data-dcnode-id="2828" instrument_node="">[87]</span></a></sup><span data-dcnode-id="2825" instrument_node="">
</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2823" instrument_node="">Many opponents of the estate tax refer to it as the "death tax" in their public discourse partly because a </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death" title="Death"><span data-dcnode-id="2822" instrument_node="">death</span></a><span data-dcnode-id="2820" instrument_node=""> must occur before any </span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="2819" instrument_node="">tax</span></a><span data-dcnode-id="2817" instrument_node=""> on the deceased's </span><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asset" title="Asset"><span data-dcnode-id="2816" instrument_node="">assets</span></a><span data-dcnode-id="2814" instrument_node=""> can be realized and also because the tax rate is determined by the value of the deceased's persons assets rather than the amount each inheritor receives. Neither the number of inheritors nor the size of each inheritor's portion factors into the calculations for rate of the estate tax.
</span></p><p data-dcnode-id="2804"><span data-dcnode-id="2812" instrument_node="">Proponents of the tax say the term "death tax" is imprecise, and that the term has been used since the nineteenth century to refer to </span><i data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">all</span></i><span data-dcnode-id="2809" instrument_node=""> the death duties applied to transfers at death: estate, inheritance, succession and otherwise.</span><sup class="reference" data-dcnode-id="2806" id="cite_ref-NYT_1897_88-0"><a data-dcnode-id="2807" href="#cite_note-NYT_1897-88"><span data-dcnode-id="2808" instrument_node="">[88]</span></a></sup><span data-dcnode-id="2805" instrument_node="">
</span></p><p data-dcnode-id="2798"><span data-dcnode-id="2803" instrument_node="">Chye-Ching Huang and Nathaniel Frentz of the Center on Budget and Policy Priorities assert that the claim that the estate tax is best characterized as a "death tax" is a myth, and that only the richest 0.14% of estates owe the tax.</span><sup class="reference" data-dcnode-id="2800" id="cite_ref-89"><a data-dcnode-id="2801" href="#cite_note-89"><span data-dcnode-id="2802" instrument_node="">[89]</span></a></sup><span data-dcnode-id="2799" instrument_node="">
</span></p><p data-dcnode-id="2789"><span data-dcnode-id="2797" instrument_node="">Political use of "death tax" as a synonym for "estate tax" was encouraged by Jack Faris of the National Federation of Independent Business</span><sup class="reference" data-dcnode-id="2794" id="cite_ref-NYT_2001_90-0"><a data-dcnode-id="2795" href="#cite_note-NYT_2001-90"><span data-dcnode-id="2796" instrument_node="">[90]</span></a></sup><span data-dcnode-id="2793" instrument_node=""> during the Speakership of </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newt_Gingrich" title="Newt Gingrich"><span data-dcnode-id="2792" instrument_node="">Newt Gingrich</span></a><span data-dcnode-id="2790" instrument_node="">.
</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2788" instrument_node="">Well-known </span><a class="mw-redirect" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Republican_Party" title="United States Republican Party"><span data-dcnode-id="2787" instrument_node="">Republican</span></a><span data-dcnode-id="2785" instrument_node=""> </span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opinion_poll" title="Opinion poll"><span data-dcnode-id="2784" instrument_node="">pollster</span></a><span data-dcnode-id="2782" instrument_node=""> </span><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Luntz" title="Frank Luntz"><span data-dcnode-id="2781" instrument_node="">Frank Luntz</span></a><span data-dcnode-id="2779" instrument_node=""> wrote that the term "death tax" "kindled voter resentment in a way that 'inheritance tax' and 'estate tax' do not".</span><sup class="reference" data-dcnode-id="2776" id="cite_ref-excerpt_91-0"><a data-dcnode-id="2777" href="#cite_note-excerpt-91"><span data-dcnode-id="2778" instrument_node="">[91]</span></a></sup><span data-dcnode-id="2775" instrument_node="">
</span></p><p data-dcnode-id="2762"><span data-dcnode-id="2773" instrument_node="">In 2016, </span><a class="mw-redirect" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump_presidential_campaign%2C_2016" title="Donald Trump presidential campaign, 2016"><span data-dcnode-id="2772" instrument_node="">presidential candidate Donald Trump</span></a><span data-dcnode-id="2770" instrument_node=""> released a health care plan which used the term "death penalty" in the context of </span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_savings_account" title="Health savings account"><span data-dcnode-id="2769" instrument_node="">health savings accounts</span></a><span data-dcnode-id="2767" instrument_node=""> which would pass tax-free to the heirs of an estate.</span><sup class="reference" data-dcnode-id="2764" id="cite_ref-death_penalty_92-0"><a data-dcnode-id="2765" href="#cite_note-death_penalty-92"><span data-dcnode-id="2766" instrument_node="">[92]</span></a></sup><span data-dcnode-id="2763" instrument_node="">
</span></p><span data-dcnode-id="2761" instrument_node="">
</span><h2 data-dcnode-id="2751"><span class="mw-headline" data-dcnode-id="2759" id="Related_taxes"><span data-dcnode-id="2760" instrument_node="">Related taxes</span></span><span class="mw-editsection" data-dcnode-id="2752"><span class="mw-editsection-bracket" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">[</span></span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D20" title="Edit section: Related taxes"><span data-dcnode-id="2756" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node="">The federal government also imposes a </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gift_tax" title="Gift tax"><span data-dcnode-id="2748" instrument_node="">gift tax</span></a><span data-dcnode-id="2746" instrument_node="">, assessed in a manner similar to the estate tax. One purpose is to prevent a person from avoiding paying estate tax by giving away all his or her assets before death.
</span></p><p data-dcnode-id="2734"><span data-dcnode-id="2744" instrument_node="">There are two levels of exemption from the gift tax.  First, transfers of up to (as of 2020) </span><span data-dcnode-id="2742" style="white-space: nowrap"><span data-dcnode-id="2743" instrument_node="">$15,000</span></span><span data-dcnode-id="2741" instrument_node=""> per (recipient) person per year are not subject to the tax. Individuals can make gifts up to this amount to each of as many people as they wish each year. In a marriage, a couple can pool their individual gift exemptions to make gifts worth up to </span><span data-dcnode-id="2739" style="white-space: nowrap"><span data-dcnode-id="2740" instrument_node="">$30,000</span></span><span data-dcnode-id="2738" instrument_node=""> per (recipient) person per year without incurring any gift tax.  Second, there is a lifetime credit on total gifts until a combined total of </span><span data-dcnode-id="2736" style="white-space: nowrap"><span data-dcnode-id="2737" instrument_node="">$5,250,000</span></span><span data-dcnode-id="2735" instrument_node=""> (not covered by annual exclusions) has been given.
</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">In many instances, an estate planning strategy is to give the maximum amount possible to as many people as possible to reduce the size of the estate, the effectiveness of which depends on the lifespan of the donor and the number of donees.  (This also gives the donees immediate use of the assets, while the donor is alive to see them enjoy it.)
</span></p><p data-dcnode-id="2724"><span data-dcnode-id="2731" instrument_node="">Furthermore, transfers (whether by bequest, gift, or inheritance) in excess of </span><span data-dcnode-id="2729" style="white-space: nowrap"><span data-dcnode-id="2730" instrument_node="">$5</span></span><span data-dcnode-id="2728" instrument_node=""> million (tied to inflation in the same manner as the estate tax exemption) may be subject to a </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Generation-skipping_transfer_tax" title="Generation-skipping transfer tax"><span data-dcnode-id="2727" instrument_node="">generation-skipping transfer tax</span></a><span data-dcnode-id="2725" instrument_node=""> if certain other criteria are met.
</span></p><p data-dcnode-id="2706"><span data-dcnode-id="2723" instrument_node="">The combined (Federal and state) estate, inheritance, and gift (EIG) tax burden per decedent's impact on the number of firms in the </span><a data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2722" instrument_node="">United States</span></a><span data-dcnode-id="2720" instrument_node="">. The increase in the </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gift_tax" title="Gift tax"><span data-dcnode-id="2719" instrument_node="">gift tax</span></a><span data-dcnode-id="2717" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_burden" title="Tax burden"><span data-dcnode-id="2716" instrument_node="">tax burden</span></a><span data-dcnode-id="2714" instrument_node=""> per decedent reduces the growth in the number of companies, mostly small firms. The asymmetric liquidity effect, which restricts small business owners' ability to collect the funds required to pay the </span><a class="mw-redirect" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estate_tax" title="Estate tax"><span data-dcnode-id="2713" instrument_node="">estate tax</span></a><span data-dcnode-id="2711" instrument_node=""> without liquidating their estates, can be attributed to the higher dissolution rate among small firms.</span><sup class="reference" data-dcnode-id="2708" id="cite_ref-93"><a data-dcnode-id="2709" href="#cite_note-93"><span data-dcnode-id="2710" instrument_node="">[93]</span></a></sup><span data-dcnode-id="2707" instrument_node="">
</span></p><span data-dcnode-id="2705" instrument_node="">
</span><h2 data-dcnode-id="2695"><span class="mw-headline" data-dcnode-id="2703" id="Loopholes"><span data-dcnode-id="2704" instrument_node="">Loopholes</span></span><span class="mw-editsection" data-dcnode-id="2696"><span class="mw-editsection-bracket" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">[</span></span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D21" title="Edit section: Loopholes"><span data-dcnode-id="2700" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2693" instrument_node="">Many very wealthy people avoid the estate tax by moving money into </span><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trust_law" title="Trust law"><span data-dcnode-id="2692" instrument_node="">trusts</span></a><span data-dcnode-id="2690" instrument_node=""> or charitable foundations before death.</span><sup class="reference" data-dcnode-id="2687" id="cite_ref-revealed_94-0"><a data-dcnode-id="2688" href="#cite_note-revealed-94"><span data-dcnode-id="2689" instrument_node="">[94]</span></a></sup><span data-dcnode-id="2686" instrument_node="">
</span></p><span data-dcnode-id="2684" instrument_node="">
