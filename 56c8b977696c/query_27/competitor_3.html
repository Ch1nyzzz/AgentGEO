</span><p data-dcnode-id="4776"><span data-dcnode-id="4807" instrument_node="">The </span><b data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">estate tax</span></b><span data-dcnode-id="4804" instrument_node=""> in the </span><a data-dcnode-id="4802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="4803" instrument_node="">United States</span></a><span data-dcnode-id="4801" instrument_node=""> is a federal </span><a data-dcnode-id="4799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="4800" instrument_node="">tax</span></a><span data-dcnode-id="4798" instrument_node=""> on the transfer of the </span><a data-dcnode-id="4796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estate_%28law%29" title="Estate (law)"><span data-dcnode-id="4797" instrument_node="">estate</span></a><span data-dcnode-id="4795" instrument_node=""> of a person who dies. The tax applies to property that is transferred by </span><a class="mw-redirect" data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Will_%28law%29" title="Will (law)"><span data-dcnode-id="4794" instrument_node="">will</span></a><span data-dcnode-id="4792" instrument_node=""> or, if the person has no will, according to state laws of </span><a data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intestacy" title="Intestacy"><span data-dcnode-id="4791" instrument_node="">intestacy</span></a><span data-dcnode-id="4789" instrument_node="">. Other transfers that are subject to the tax can include those made through a </span><a data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trust_law" title="Trust law"><span data-dcnode-id="4788" instrument_node="">trust</span></a><span data-dcnode-id="4786" instrument_node=""> and the payment of certain </span><a data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_insurance" title="Life insurance"><span data-dcnode-id="4785" instrument_node="">life insurance</span></a><span data-dcnode-id="4783" instrument_node=""> benefits or financial accounts. The estate tax is part of the federal </span><b data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">unified gift and estate tax</span></b><span data-dcnode-id="4780" instrument_node=""> in the United States. The other part of the system, the </span><a data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gift_tax_in_the_United_States" title="Gift tax in the United States"><span data-dcnode-id="4779" instrument_node="">gift tax</span></a><span data-dcnode-id="4777" instrument_node="">, applies to transfers of property during a person's life.
</span></p><p data-dcnode-id="4771"><span data-dcnode-id="4775" instrument_node="">In addition to this federal estate tax, many states have enacted similar taxes. These taxes may be termed "</span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inheritance_tax" title="Inheritance tax"><span data-dcnode-id="4774" instrument_node="">inheritance taxes</span></a><span data-dcnode-id="4772" instrument_node="">" to the extent the tax is payable by a person who inherits money or property of a person who has died, as opposed to an estate tax, which is a levy on the estate (money and property) of a person who has died.
</span></p><p data-dcnode-id="4755"><span data-dcnode-id="4770" instrument_node="">The estate tax is often the subject of political debate, and opponents call it the </span><b data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">"death tax"</span></b><span data-dcnode-id="4767" instrument_node="">.</span><sup class="reference" data-dcnode-id="4764" id="cite_ref-Inception_of_Death_Tax_Pejorative_1-0"><a data-dcnode-id="4765" href="#cite_note-Inception_of_Death_Tax_Pejorative-1"><span data-dcnode-id="4766" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4763" instrument_node=""> Some supporters of the tax have called it the "</span><a data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Hilton" title="Paris Hilton"><span data-dcnode-id="4762" instrument_node="">Paris Hilton</span></a><span data-dcnode-id="4760" instrument_node=""> tax".</span><sup class="reference" data-dcnode-id="4757" id="cite_ref-2"><a data-dcnode-id="4758" href="#cite_note-2"><span data-dcnode-id="4759" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4756" instrument_node="">
</span></p><p data-dcnode-id="4711"><span data-dcnode-id="4754" instrument_node="">If an asset is left to a spouse or a federally recognized </span><a data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charitable_organization" title="Charitable organization"><span data-dcnode-id="4753" instrument_node="">charity</span></a><span data-dcnode-id="4751" instrument_node="">, the tax usually does not apply. In addition, a maximum amount, varying year by year, can be given by an individual, before and/or upon their death, without incurring federal gift or estate taxes:</span><sup class="reference" data-dcnode-id="4748" id="cite_ref-3"><a data-dcnode-id="4749" href="#cite_note-3"><span data-dcnode-id="4750" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4747" instrument_node=""> </span><span data-dcnode-id="4745" style="white-space: nowrap"><span data-dcnode-id="4746" instrument_node="">$5,340,000</span></span><span data-dcnode-id="4744" instrument_node=""> for estates of persons dying in 2014</span><sup class="reference" data-dcnode-id="4741" id="cite_ref-4"><a data-dcnode-id="4742" href="#cite_note-4"><span data-dcnode-id="4743" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4740" instrument_node=""> and 2015,</span><sup class="reference" data-dcnode-id="4737" id="cite_ref-5"><a data-dcnode-id="4738" href="#cite_note-5"><span data-dcnode-id="4739" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4736" instrument_node=""> </span><span data-dcnode-id="4734" style="white-space: nowrap"><span data-dcnode-id="4735" instrument_node="">$5,450,000</span></span><span data-dcnode-id="4733" instrument_node=""> (effectively $10.90 million per married couple, assuming the deceased spouse did not leave assets to the surviving spouse) for estates of persons dying in 2016.</span><sup class="reference" data-dcnode-id="4730" id="cite_ref-What's_New_-_Estate_and_Gift_Tax_6-0"><a data-dcnode-id="4731" href="#cite_note-What's_New_-_Estate_and_Gift_Tax-6"><span data-dcnode-id="4732" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4729" instrument_node=""> Because of these exemptions, it is estimated that only the largest 0.2% of estates in the U.S. will pay the tax.</span><sup class="reference" data-dcnode-id="4726" id="cite_ref-ReferenceA_7-0"><a data-dcnode-id="4727" href="#cite_note-ReferenceA-7"><span data-dcnode-id="4728" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4725" instrument_node=""> For 2017, the exemption increased to </span><span data-dcnode-id="4723" style="white-space: nowrap"><span data-dcnode-id="4724" instrument_node="">$5.49 million</span></span><span data-dcnode-id="4722" instrument_node="">. In 2018, the exemption doubled to </span><span data-dcnode-id="4720" style="white-space: nowrap"><span data-dcnode-id="4721" instrument_node="">$11.18 million</span></span><span data-dcnode-id="4719" instrument_node=""> per taxpayer due to the </span><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="4718" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="4716" instrument_node="">. As a result, only about 2,000 estates per year in the US are currently liable for federal estate tax.</span><sup class="reference" data-dcnode-id="4713" id="cite_ref-8"><a data-dcnode-id="4714" href="#cite_note-8"><span data-dcnode-id="4715" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4712" instrument_node="">
</span></p><span data-dcnode-id="4710" instrument_node="">

</span><li class="toclevel-1 tocsection-1" data-dcnode-id="4611"><a data-dcnode-id="4696" href="#Federal_estate_tax"><span class="tocnumber" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">1</span></span><span data-dcnode-id="4699" instrument_node=""> </span><span class="toctext" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">Federal estate tax</span></span></a><span data-dcnode-id="4695" instrument_node="">

</span><h2 data-dcnode-id="4480"><span class="mw-headline" data-dcnode-id="4488" id="Federal_estate_tax"><span data-dcnode-id="4489" instrument_node="">Federal estate tax</span></span><span class="mw-editsection" data-dcnode-id="4481"><span class="mw-editsection-bracket" data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">[</span></span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: Federal estate tax"><span data-dcnode-id="4485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4479" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4467"><div class="thumbinner" data-dcnode-id="4468" style="width:302px;"><a class="image" data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEstate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif"><img alt="" class="thumbimage" data-dcnode-id="4478" data-file-height="445" data-file-width="625" decoding="async" height="214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%252C_1982_-_2010.gif/300px-Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%252C_1982_-_2010.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif/450px-Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/08/Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif/600px-Estate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif 2x" width="300"></a><span data-dcnode-id="4476" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4469"><div class="magnify" data-dcnode-id="4474"><a class="internal" data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEstate_Tax_Returns_as_a_Percentage_of_Adult_Deaths%2C_1982_-_2010.gif" title="Enlarge"></a></div><span data-dcnode-id="4473" instrument_node="">Estate tax returns as a percentage of adult deaths, 1982–2008.</span><sup class="reference" data-dcnode-id="4470" id="cite_ref-9"><a data-dcnode-id="4471" href="#cite_note-9"><span data-dcnode-id="4472" instrument_node="">[9]</span></a></sup></div></div></div><span data-dcnode-id="4466" instrument_node="">
</span><p data-dcnode-id="4457"><span data-dcnode-id="4465" instrument_node="">The federal </span><i data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">estate tax</span></i><span data-dcnode-id="4462" instrument_node=""> is imposed "on the transfer of the taxable estate of every decedent who is a citizen or resident of the United States."</span><sup class="reference" data-dcnode-id="4459" id="cite_ref-10"><a data-dcnode-id="4460" href="#cite_note-10"><span data-dcnode-id="4461" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4458" instrument_node="">
</span></p><p data-dcnode-id="4451"><span data-dcnode-id="4456" instrument_node="">Federal estate taxes give very wealthy families incentives to transfer resources directly to distant generations in order to avoid taxes on successive rounds of transfers. Until recently such transfers were impeded by the rule against perpetuities, which prevented transfers to most potential not-yet-born beneficiaries. Many American states have repealed the rule against perpetuities, raising concerns that the combination of tax incentives and new legal rights encourages the devotion of vast wealth to perpetual trusts designed to benefit distant generations, avoid taxes, and maintain a degree of control over the financial affairs of descendants in perpetuity.</span><sup class="reference" data-dcnode-id="4453" id="cite_ref-Jr_2012_11-0"><a data-dcnode-id="4454" href="#cite_note-Jr_2012-11"><span data-dcnode-id="4455" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4452" instrument_node="">
</span></p><p data-dcnode-id="4445"><span data-dcnode-id="4450" instrument_node="">One of the major concerns that motivate estate planning is the potential burden of federal taxes, which apply both to gifts during lifetime and to transfers at death. In practice, only a small fraction of U.S. estates is taxable, reflecting that exemption levels are high and transfers to surviving spouses are entirely excluded from taxable estates; but those estates that are subject to federal taxation typically face high rates. Taxpayers commonly arrange their affairs to soften the impact of federal taxation.</span><sup class="reference" data-dcnode-id="4447" id="cite_ref-Jr_2012_11-1"><a data-dcnode-id="4448" href="#cite_note-Jr_2012-11"><span data-dcnode-id="4449" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4446" instrument_node="">
</span></p><p data-dcnode-id="4436"><span data-dcnode-id="4444" instrument_node="">The starting point in the calculation is the "gross estate".</span><sup class="reference" data-dcnode-id="4441" id="cite_ref-12"><a data-dcnode-id="4442" href="#cite_note-12"><span data-dcnode-id="4443" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4440" instrument_node=""> Certain </span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_deduction" title="Tax deduction"><span data-dcnode-id="4439" instrument_node="">deductions</span></a><span data-dcnode-id="4437" instrument_node=""> from the "gross estate" are allowed to arrive at the "taxable estate".
</span></p><span data-dcnode-id="4435" instrument_node="">
</span><h3 data-dcnode-id="4424"><span data-dcnode-id="4434" id="The_.22gross_estate.22"></span><span class="mw-headline" data-dcnode-id="4432" id="The_&quot;gross_estate&quot;"><span data-dcnode-id="4433" instrument_node="">The "gross estate"</span></span><span class="mw-editsection" data-dcnode-id="4425"><span class="mw-editsection-bracket" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">[</span></span><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: The &quot;gross estate&quot;"><span data-dcnode-id="4429" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">The "gross estate" for federal estate tax purposes often includes more property than that included in the "probate estate" under the property laws of the state in which the decedent lived at the time of death. The gross estate (before the modifications) may be considered to be the value of all the property interests of the decedent at the time of death. To these interests are added the following property interests generally not owned by the decedent at the time of death:
</span></p><span data-dcnode-id="4420" instrument_node="">
</span><ul data-dcnode-id="4342"><li data-dcnode-id="4409"><span data-dcnode-id="4419" instrument_node="">the value of property to the extent of an interest held by the surviving spouse as a "</span><a data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dower" title="Dower"><span data-dcnode-id="4418" instrument_node="">dower</span></a><span data-dcnode-id="4416" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curtesy" title="Curtesy"><span data-dcnode-id="4415" instrument_node="">curtesy</span></a><span data-dcnode-id="4413" instrument_node="">";</span><sup class="reference" data-dcnode-id="4410" id="cite_ref-13"><a data-dcnode-id="4411" href="#cite_note-13"><span data-dcnode-id="4412" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="4408" instrument_node="">
</span><li data-dcnode-id="4403"><span data-dcnode-id="4407" instrument_node="">the value of certain items of property in which the decedent had, at any time, made a transfer during the three years immediately preceding the date of death (i.e., even if the property was no longer owned by the decedent on the date of death), other than certain gifts, and other than property sold for full value;</span><sup class="reference" data-dcnode-id="4404" id="cite_ref-14"><a data-dcnode-id="4405" href="#cite_note-14"><span data-dcnode-id="4406" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="4402" instrument_node="">
</span><li data-dcnode-id="4394"><span data-dcnode-id="4401" instrument_node="">the value of certain property transferred by the decedent before death for which the decedent retained a "</span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_estate" title="Life estate"><span data-dcnode-id="4400" instrument_node="">life estate</span></a><span data-dcnode-id="4398" instrument_node="">", or retained certain "powers";</span><sup class="reference" data-dcnode-id="4395" id="cite_ref-15"><a data-dcnode-id="4396" href="#cite_note-15"><span data-dcnode-id="4397" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="4393" instrument_node="">
</span><li data-dcnode-id="4388"><span data-dcnode-id="4392" instrument_node="">the value of certain property in which the recipient could, through ownership, have possession or enjoyment only by surviving the decedent;</span><sup class="reference" data-dcnode-id="4389" id="cite_ref-16"><a data-dcnode-id="4390" href="#cite_note-16"><span data-dcnode-id="4391" instrument_node="">[16]</span></a></sup></li><span data-dcnode-id="4387" instrument_node="">
</span><li data-dcnode-id="4379"><span data-dcnode-id="4386" instrument_node="">the value of certain property in which the decedent retained a "</span><a data-dcnode-id="4384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Future_interest" title="Future interest"><span data-dcnode-id="4385" instrument_node="">reversionary interest</span></a><span data-dcnode-id="4383" instrument_node="">", the value of which exceeded five percent of the value of the property;</span><sup class="reference" data-dcnode-id="4380" id="cite_ref-17"><a data-dcnode-id="4381" href="#cite_note-17"><span data-dcnode-id="4382" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="4378" instrument_node="">
</span><li data-dcnode-id="4373"><span data-dcnode-id="4377" instrument_node="">the value of certain property transferred by the decedent before death where the transfer was revocable;</span><sup class="reference" data-dcnode-id="4374" id="cite_ref-18"><a data-dcnode-id="4375" href="#cite_note-18"><span data-dcnode-id="4376" instrument_node="">[18]</span></a></sup></li><span data-dcnode-id="4372" instrument_node="">
</span><li data-dcnode-id="4367"><span data-dcnode-id="4371" instrument_node="">the value of certain annuities;</span><sup class="reference" data-dcnode-id="4368" id="cite_ref-19"><a data-dcnode-id="4369" href="#cite_note-19"><span data-dcnode-id="4370" instrument_node="">[19]</span></a></sup></li><span data-dcnode-id="4366" instrument_node="">
</span><li data-dcnode-id="4355"><span data-dcnode-id="4365" instrument_node="">the value of certain jointly owned property, such as assets passing by operation of law or survivorship, i.e. </span><a class="mw-redirect" data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_tenants_with_rights_of_survivorship" title="Joint tenants with rights of survivorship"><span data-dcnode-id="4364" instrument_node="">joint tenants with rights of survivorship</span></a><span data-dcnode-id="4362" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tenants_by_the_entirety" title="Tenants by the entirety"><span data-dcnode-id="4361" instrument_node="">tenants by the entirety</span></a><span data-dcnode-id="4359" instrument_node="">, with special rules for assets owned jointly by spouses.;</span><sup class="reference" data-dcnode-id="4356" id="cite_ref-20"><a data-dcnode-id="4357" href="#cite_note-20"><span data-dcnode-id="4358" instrument_node="">[20]</span></a></sup></li><span data-dcnode-id="4354" instrument_node="">
</span><li data-dcnode-id="4349"><span data-dcnode-id="4353" instrument_node="">the value of certain "powers of appointment";</span><sup class="reference" data-dcnode-id="4350" id="cite_ref-21"><a data-dcnode-id="4351" href="#cite_note-21"><span data-dcnode-id="4352" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="4348" instrument_node="">
</span><li data-dcnode-id="4343"><span data-dcnode-id="4347" instrument_node="">the amount of proceeds of certain life insurance policies.</span><sup class="reference" data-dcnode-id="4344" id="cite_ref-22"><a data-dcnode-id="4345" href="#cite_note-22"><span data-dcnode-id="4346" instrument_node="">[22]</span></a></sup></li></ul><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">The above list of modifications is not comprehensive.
</span></p><p data-dcnode-id="4328"><span data-dcnode-id="4338" instrument_node="">As noted above, </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_insurance" title="Life insurance"><span data-dcnode-id="4337" instrument_node="">life insurance</span></a><span data-dcnode-id="4335" instrument_node=""> benefits may be included in the gross estate (even though the proceeds arguably were not "owned" by the decedent and were never received by the decedent). Life insurance proceeds are generally included in the gross estate if the benefits are payable to the estate, or if the decedent was the owner of the life insurance policy or had any "incidents of ownership" over the life insurance policy (such as the power to change the beneficiary designation). Similarly, bank accounts or other financial instruments which are </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Totten_trust" title="Totten trust"><span data-dcnode-id="4334" instrument_node="">"payable on death" or "transfer on death"</span></a><span data-dcnode-id="4332" instrument_node=""> are usually included in the taxable estate, even though such assets are not subject to the </span><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Probate" title="Probate"><span data-dcnode-id="4331" instrument_node="">probate</span></a><span data-dcnode-id="4329" instrument_node=""> process under state law.
</span></p><span data-dcnode-id="4327" instrument_node="">
</span><h3 data-dcnode-id="4317"><span class="mw-headline" data-dcnode-id="4325" id="Deductions_and_the_taxable_estate"><span data-dcnode-id="4326" instrument_node="">Deductions and the taxable estate</span></span><span class="mw-editsection" data-dcnode-id="4318"><span class="mw-editsection-bracket" data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">[</span></span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Deductions and the taxable estate"><span data-dcnode-id="4322" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4316" instrument_node="">
</span><p data-dcnode-id="4311"><span data-dcnode-id="4315" instrument_node="">Once the value of the "gross estate" is determined, the law provides for various deductions (in Part IV of Subchapter A of Chapter 11 of Subtitle B of the </span><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Code" title="Internal Revenue Code"><span data-dcnode-id="4314" instrument_node="">Internal Revenue Code</span></a><span data-dcnode-id="4312" instrument_node="">) in arriving at the value of the "taxable estate." Deductions include but are not limited to:
</span></p><span data-dcnode-id="4310" instrument_node="">
</span><ul data-dcnode-id="4283"><li data-dcnode-id="4305"><span data-dcnode-id="4309" instrument_node="">Funeral expenses, administration expenses, and claims against the estate;</span><sup class="reference" data-dcnode-id="4306" id="cite_ref-23"><a data-dcnode-id="4307" href="#cite_note-23"><span data-dcnode-id="4308" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="4304" instrument_node="">
</span><li data-dcnode-id="4296"><span data-dcnode-id="4303" instrument_node="">Certain </span><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charitable_organization" title="Charitable organization"><span data-dcnode-id="4302" instrument_node="">charitable</span></a><span data-dcnode-id="4300" instrument_node=""> contributions;</span><sup class="reference" data-dcnode-id="4297" id="cite_ref-24"><a data-dcnode-id="4298" href="#cite_note-24"><span data-dcnode-id="4299" instrument_node="">[24]</span></a></sup></li><span data-dcnode-id="4295" instrument_node="">
</span><li data-dcnode-id="4290"><span data-dcnode-id="4294" instrument_node="">Certain items of property left to the surviving spouse.</span><sup class="reference" data-dcnode-id="4291" id="cite_ref-25"><a data-dcnode-id="4292" href="#cite_note-25"><span data-dcnode-id="4293" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="4289" instrument_node="">
</span><li data-dcnode-id="4284"><span data-dcnode-id="4288" instrument_node="">Beginning in 2005, inheritance or estate taxes paid to states or the District of Columbia.</span><sup class="reference" data-dcnode-id="4285" id="cite_ref-26"><a data-dcnode-id="4286" href="#cite_note-26"><span data-dcnode-id="4287" instrument_node="">[26]</span></a></sup></li></ul><span data-dcnode-id="4282" instrument_node="">
</span><p data-dcnode-id="4272"><span data-dcnode-id="4281" instrument_node="">Of these deductions, the most important is the deduction for property passing to (or in certain kinds of trust, for) the surviving spouse, because it can eliminate any federal estate tax for a married decedent.  However, this unlimited deduction does not apply if the surviving spouse (not the decedent) is not a U.S. citizen.</span><sup class="reference" data-dcnode-id="4278" id="cite_ref-27"><a data-dcnode-id="4279" href="#cite_note-27"><span data-dcnode-id="4280" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4277" instrument_node=""> A special trust called a Qualified Domestic Trust or QDOT must be used to obtain an unlimited marital deduction for otherwise disqualified spouses.</span><sup class="reference" data-dcnode-id="4274" id="cite_ref-28"><a data-dcnode-id="4275" href="#cite_note-28"><span data-dcnode-id="4276" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4273" instrument_node="">
</span></p><span data-dcnode-id="4271" instrument_node="">
</span><h3 data-dcnode-id="4261"><span class="mw-headline" data-dcnode-id="4269" id="Tentative_tax"><span data-dcnode-id="4270" instrument_node="">Tentative tax</span></span><span class="mw-editsection" data-dcnode-id="4262"><span class="mw-editsection-bracket" data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">[</span></span><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Tentative tax"><span data-dcnode-id="4266" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">The tentative tax is based on the tentative tax base, which is the sum of the taxable estate and the "adjusted taxable gifts" (i.e., taxable gifts made after 1976). For decedents dying after December 31, 2009, the tentative tax will, with exceptions, be calculated by applying the following tax rates:

</span></p><p data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">The tentative tax is reduced by gift tax that would have been paid on the adjusted taxable gifts, based on the rates in effect on the date of death (which means that the reduction is not necessarily equal to the gift tax actually paid on those gifts).
</span></p><span data-dcnode-id="4058" instrument_node="">
</span><h3 data-dcnode-id="4048"><span class="mw-headline" data-dcnode-id="4056" id="Credits_against_tax"><span data-dcnode-id="4057" instrument_node="">Credits against tax</span></span><span class="mw-editsection" data-dcnode-id="4049"><span class="mw-editsection-bracket" data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">[</span></span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Credits against tax"><span data-dcnode-id="4053" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4046" instrument_node="">There are several credits against the tentative tax, the most important of which is a "unified credit" which can be thought of as providing for an "exemption equivalent" or </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_exemption" title="Tax exemption"><span data-dcnode-id="4045" instrument_node="">exempted value</span></a><span data-dcnode-id="4043" instrument_node=""> with respect to the sum of the taxable estate and the taxable gifts during lifetime.
</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4041" instrument_node="">For a person dying during 2006, 2007, or 2008, the "applicable exclusion amount" is </span><span data-dcnode-id="4039" style="white-space: nowrap"><span data-dcnode-id="4040" instrument_node="">$2,000,000</span></span><span data-dcnode-id="4038" instrument_node="">, so if the sum of the taxable estate plus the "adjusted taxable gifts" made during lifetime equals </span><span data-dcnode-id="4036" style="white-space: nowrap"><span data-dcnode-id="4037" instrument_node="">$2,000,000</span></span><span data-dcnode-id="4035" instrument_node=""> or less, there is no federal estate tax to pay. According to the </span><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Growth_and_Tax_Relief_Reconciliation_Act_of_2001" title="Economic Growth and Tax Relief Reconciliation Act of 2001"><span data-dcnode-id="4034" instrument_node="">Economic Growth and Tax Relief Reconciliation Act of 2001</span></a><span data-dcnode-id="4032" instrument_node="">, the applicable exclusion increased to </span><span data-dcnode-id="4030" style="white-space: nowrap"><span data-dcnode-id="4031" instrument_node="">$3,500,000</span></span><span data-dcnode-id="4029" instrument_node=""> in 2009, and the estate tax was repealed for estates of decedents dying in 2010, but then the Act was to "sunset" in 2011 and the estate tax was to reappear with an applicable exclusion amount of only </span><span data-dcnode-id="4027" style="white-space: nowrap"><span data-dcnode-id="4028" instrument_node="">$1,000,000</span></span><span data-dcnode-id="4026" instrument_node="">.
</span></p><p data-dcnode-id="4010"><span data-dcnode-id="4024" instrument_node="">The Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010 became law on December 17, 2010. The 2010 Act changed, among other things, the rate structure for estates of decedents dying after December 31, 2009, subject to certain exceptions.  It also served to reunify the estate tax credit (aka exemption equivalent) with the federal gift tax credit (aka exemption equivalent). The gift tax exemption is equal to </span><span data-dcnode-id="4022" style="white-space: nowrap"><span data-dcnode-id="4023" instrument_node="">$5,250,000</span></span><sup class="reference" data-dcnode-id="4019" id="cite_ref-Rev._Proc._2013-15_(see_page_11,_item_13)_29-0"><a data-dcnode-id="4020" href="#cite_note-Rev._Proc._2013-15_(see_page_11,_item_13)-29"><span data-dcnode-id="4021" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4018" instrument_node=""> for estates of decedents dying in 2013, and </span><span data-dcnode-id="4016" style="white-space: nowrap"><span data-dcnode-id="4017" instrument_node="">$5,340,000</span></span><span data-dcnode-id="4015" instrument_node=""> for estates of decedents dying in 2014.</span><sup class="reference" data-dcnode-id="4012" id="cite_ref-30"><a data-dcnode-id="4013" href="#cite_note-30"><span data-dcnode-id="4014" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4011" instrument_node="">
</span></p><p data-dcnode-id="3999"><span data-dcnode-id="4009" instrument_node="">The 2010 Act also provided portability to the credit, allowing a surviving spouse to use that portion of the pre-deceased spouse's credit that was not previously used (e.g. a husband died, used </span><span data-dcnode-id="4007" style="white-space: nowrap"><span data-dcnode-id="4008" instrument_node="">$3 million</span></span><span data-dcnode-id="4006" instrument_node=""> of his credit, and filed an estate tax return.  At his wife's subsequent death, she can use her </span><span data-dcnode-id="4004" style="white-space: nowrap"><span data-dcnode-id="4005" instrument_node="">$5 million</span></span><span data-dcnode-id="4003" instrument_node=""> credit plus the remaining </span><span data-dcnode-id="4001" style="white-space: nowrap"><span data-dcnode-id="4002" instrument_node="">$2 million</span></span><span data-dcnode-id="4000" instrument_node=""> of her husband's). If the estate includes property that was inherited from someone else within the preceding 10 years, and there was estate tax paid on that property, there may also be a credit for property previously taxed.
</span></p><p data-dcnode-id="3993"><span data-dcnode-id="3998" instrument_node="">Because of these exemptions, only the largest 0.2% of estates in the US will have to pay any estate tax.</span><sup class="reference" data-dcnode-id="3995" id="cite_ref-ReferenceA_7-1"><a data-dcnode-id="3996" href="#cite_note-ReferenceA-7"><span data-dcnode-id="3997" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3994" instrument_node="">
</span></p><p data-dcnode-id="3988"><span data-dcnode-id="3992" instrument_node="">Before 2005, there was also a credit for non-federal estate taxes, but that credit was phased out by the </span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Growth_and_Tax_Relief_Reconciliation_Act_of_2001" title="Economic Growth and Tax Relief Reconciliation Act of 2001"><span data-dcnode-id="3991" instrument_node="">Economic Growth and Tax Relief Reconciliation Act of 2001</span></a><span data-dcnode-id="3989" instrument_node="">.
</span></p><span data-dcnode-id="3987" instrument_node="">
</span><h3 data-dcnode-id="3977"><span class="mw-headline" data-dcnode-id="3985" id="Portability"><span data-dcnode-id="3986" instrument_node="">Portability</span></span><span class="mw-editsection" data-dcnode-id="3978"><span class="mw-editsection-bracket" data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">[</span></span><a data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Portability"><span data-dcnode-id="3982" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3976" instrument_node="">
</span><p data-dcnode-id="3972"><a data-dcnode-id="3974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Relief%2C_Unemployment_Insurance_Reauthorization%2C_and_Job_Creation_Act_of_2010" title="Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010"><span data-dcnode-id="3975" instrument_node="">The Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010</span></a><span data-dcnode-id="3973" instrument_node=""> authorizes the personal representative of estates of decedents dying on or after January 1, 2011, to elect to transfer any unused estate tax exclusion amount to the surviving spouse, in a concept known as portability. The amount received by the surviving spouse is called the deceased spousal unused exclusion, or DSUE, amount. If the personal representative of the decedent's estate elects transfer, or portability, of the DSUE amount, the surviving spouse may apply the DSUE amount received from the estate of his or her last deceased spouse against any tax liability arising from subsequent lifetime gifts and transfers at death. The portability exemption is claimed by filing Form 706, specifically Part 6 of the estate tax return.  Whether the personal representative has an obligation to make the portability election is presently unclear.
</span></p><span data-dcnode-id="3971" instrument_node="">
</span><h3 data-dcnode-id="3961"><span class="mw-headline" data-dcnode-id="3969" id="Requirements_for_filing_return_and_paying_tax"><span data-dcnode-id="3970" instrument_node="">Requirements for filing return and paying tax</span></span><span class="mw-editsection" data-dcnode-id="3962"><span class="mw-editsection-bracket" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">[</span></span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Requirements for filing return and paying tax"><span data-dcnode-id="3966" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3952"><span data-dcnode-id="3959" instrument_node="">For estates larger than the current federally exempted amount, any estate tax due is paid by the </span><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executor" title="Executor"><span data-dcnode-id="3958" instrument_node="">executor</span></a><span data-dcnode-id="3956" instrument_node="">, other person responsible for administering the estate, or the person in possession of the decedent's property. That person is also responsible for filing a Form 706 return with the </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="3955" instrument_node="">Internal Revenue Service</span></a><span data-dcnode-id="3953" instrument_node=""> (IRS). In addition, the form must be filed if the decedent's spouse wishes to claim any of the decedent's remaining estate/gift tax exemption.
</span></p><p data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">The return must contain detailed information as to the valuations of the estate assets and the exemptions claimed, to ensure that the correct amount of tax is paid. The deadline for filing the Form 706 is 9 months from the date of the decedent's death. The payment may be extended, but not to exceed 12 months, but the return must be filed by the 9-month deadline.
</span></p><span data-dcnode-id="3949" instrument_node="">
</span><h3 data-dcnode-id="3939"><span class="mw-headline" data-dcnode-id="3947" id="Exemptions_and_tax_rates"><span data-dcnode-id="3948" instrument_node="">Exemptions and tax rates</span></span><span class="mw-editsection" data-dcnode-id="3940"><span class="mw-editsection-bracket" data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">[</span></span><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Exemptions and tax rates"><span data-dcnode-id="3944" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3938" instrument_node="">

</span><p data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">As noted above, a certain amount of each estate is exempted from taxation by the law. Below is a table of the amount of exemption by year an estate would expect. Estates above these amounts would be subject to estate tax, but only for the amount above the exemption.
</span></p><p data-dcnode-id="3604"><span data-dcnode-id="3629" instrument_node="">For example, assume an estate of </span><span data-dcnode-id="3627" style="white-space: nowrap"><span data-dcnode-id="3628" instrument_node="">$3.5 million</span></span><span data-dcnode-id="3626" instrument_node=""> in 2006. There are two beneficiaries who will each receive equal shares of the estate. The maximum allowable credit is </span><span data-dcnode-id="3624" style="white-space: nowrap"><span data-dcnode-id="3625" instrument_node="">$2 million</span></span><span data-dcnode-id="3623" instrument_node=""> for that year, so the taxable value is therefore </span><span data-dcnode-id="3621" style="white-space: nowrap"><span data-dcnode-id="3622" instrument_node="">$1.5 million</span></span><span data-dcnode-id="3620" instrument_node="">. Since it is 2006, the tax rate on that </span><span data-dcnode-id="3618" style="white-space: nowrap"><span data-dcnode-id="3619" instrument_node="">$1.5 million</span></span><span data-dcnode-id="3617" instrument_node=""> is 46%, so the total taxes paid would be </span><span data-dcnode-id="3615" style="white-space: nowrap"><span data-dcnode-id="3616" instrument_node="">$690,000</span></span><span data-dcnode-id="3614" instrument_node="">. Each beneficiary will receive </span><span data-dcnode-id="3612" style="white-space: nowrap"><span data-dcnode-id="3613" instrument_node="">$1,000,000</span></span><span data-dcnode-id="3611" instrument_node=""> of untaxed inheritance and </span><span data-dcnode-id="3609" style="white-space: nowrap"><span data-dcnode-id="3610" instrument_node="">$405,000</span></span><span data-dcnode-id="3608" instrument_node=""> from the taxable portion of their inheritance for a total of </span><span data-dcnode-id="3606" style="white-space: nowrap"><span data-dcnode-id="3607" instrument_node="">$1,405,000</span></span><span data-dcnode-id="3605" instrument_node="">. This means the estate would have paid a taxable rate of 19.7%.
</span></p><p data-dcnode-id="3585"><span data-dcnode-id="3603" instrument_node="">As shown below, </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Growth_and_Tax_Relief_Reconciliation_Act_of_2001%23Estate_and_gift_tax_rules" title="Economic Growth and Tax Relief Reconciliation Act of 2001"><span data-dcnode-id="3602" instrument_node="">the 2001 tax act</span></a><span data-dcnode-id="3600" instrument_node=""> would have repealed the estate tax for one year (2010) and would then have readjusted it in 2011 to the year 2002 exemption level with a 2001 top rate. That is, had no further legislation been passed, the estate of a person who died in the year 2010 would have been entirely exempt from tax while that of a person who died in the year 2011 or later would have been taxed as heavily as in 2001. However, on December 17, 2010, Congress passed the </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Relief%2C_Unemployment_Insurance_Reauthorization%2C_and_Job_Creation_Act_of_2010" title="Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010"><span data-dcnode-id="3599" instrument_node="">Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010</span></a><span data-dcnode-id="3597" instrument_node="">. Section 301 of the 2010 Act reinstated the federal estate tax. The new law set the exemption for U.S. citizens and residents at </span><span data-dcnode-id="3595" style="white-space: nowrap"><span data-dcnode-id="3596" instrument_node="">$5 million</span></span><span data-dcnode-id="3594" instrument_node=""> per person,</span><sup class="reference" data-dcnode-id="3591" id="cite_ref-36"><a data-dcnode-id="3592" href="#cite_note-36"><span data-dcnode-id="3593" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3590" instrument_node=""> and it provided a top tax rate of 35 percent for the years 2011 and 2012.</span><sup class="reference" data-dcnode-id="3587" id="cite_ref-37"><a data-dcnode-id="3588" href="#cite_note-37"><span data-dcnode-id="3589" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3586" instrument_node="">
</span></p><p data-dcnode-id="3573"><span data-dcnode-id="3584" instrument_node="">On January 1, 2013, the </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Taxpayer_Relief_Act_of_2012" title="American Taxpayer Relief Act of 2012"><span data-dcnode-id="3583" instrument_node="">American Taxpayer Relief Act of 2012</span></a><span data-dcnode-id="3581" instrument_node=""> was passed which permanently establishes an exemption of </span><span data-dcnode-id="3579" style="white-space: nowrap"><span data-dcnode-id="3580" instrument_node="">$5 million</span></span><span data-dcnode-id="3578" instrument_node=""> (as 2011 basis with inflation adjustment) per person for U.S. citizens and residents, with a maximum tax rate of 40% for the year 2013 and beyond.</span><sup class="reference" data-dcnode-id="3575" id="cite_ref-38"><a data-dcnode-id="3576" href="#cite_note-38"><span data-dcnode-id="3577" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3574" instrument_node="">
</span></p><p data-dcnode-id="3558"><span data-dcnode-id="3572" instrument_node="">The permanence of this regulation is not ensured: the fiscal year 2014 budget called for lowering the estate tax exclusion, the generation-skipping transfer tax and the gift-tax exemption back to levels of 2009 as of the year 2018.</span><sup class="reference" data-dcnode-id="3569" id="cite_ref-39"><a data-dcnode-id="3570" href="#cite_note-39"><span data-dcnode-id="3571" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3568" instrument_node=""> The exemption amounts of </span><span data-dcnode-id="3566" style="white-space: nowrap"><span data-dcnode-id="3567" instrument_node="">$11,180,000</span></span><span data-dcnode-id="3565" instrument_node=""> in 2018 and </span><span data-dcnode-id="3563" style="white-space: nowrap"><span data-dcnode-id="3564" instrument_node="">$11,400,000</span></span><span data-dcnode-id="3562" instrument_node=""> in 2019 are also currently (as of December 2018) scheduled to sunset 12/31/2025 (</span><a data-dcnode-id="3560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="3561" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="3559" instrument_node="">).
</span></p><span data-dcnode-id="3557" instrument_node="">
</span><h3 data-dcnode-id="3547"><span class="mw-headline" data-dcnode-id="3555" id="Puerto_Rico_and_other_U.S._possessions"><span data-dcnode-id="3556" instrument_node="">Puerto Rico and other U.S. possessions</span></span><span class="mw-editsection" data-dcnode-id="3548"><span class="mw-editsection-bracket" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">[</span></span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Puerto Rico and other U.S. possessions"><span data-dcnode-id="3552" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3533"><span data-dcnode-id="3545" instrument_node="">A decedent who is a U.S. citizen born in Puerto Rico and resident at the time of death in a U.S. possession (i.e., PR) is generally treated, for federal tax purposes, as though he or she were a nonresident who is not a citizen of the United States,</span><sup class="reference" data-dcnode-id="3542" id="cite_ref-40"><a data-dcnode-id="3543" href="#cite_note-40"><span data-dcnode-id="3544" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3541" instrument_node=""> so the $5 million exemption does not apply to such a person's estate. For U.S. estate tax purposes, a U.S. resident is someone who had a </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domicile_%28law%29" title="Domicile (law)"><span data-dcnode-id="3540" instrument_node="">domicile</span></a><span data-dcnode-id="3538" instrument_node=""> in the United States at the time of death. A person acquires a domicile by living in a place for even a brief period of time, as long as the person had no intention of moving from that place.</span><sup class="reference" data-dcnode-id="3535" id="cite_ref-41"><a data-dcnode-id="3536" href="#cite_note-41"><span data-dcnode-id="3537" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3534" instrument_node="">
</span></p><span data-dcnode-id="3532" instrument_node="">
</span><h3 data-dcnode-id="3522"><span class="mw-headline" data-dcnode-id="3530" id="Non-residents"><span data-dcnode-id="3531" instrument_node="">Non-residents</span></span><span class="mw-editsection" data-dcnode-id="3523"><span class="mw-editsection-bracket" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">[</span></span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Non-residents"><span data-dcnode-id="3527" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3513"><span data-dcnode-id="3520" instrument_node="">The $11.2 million exemption specified in the Acts of 2010 and 2012 (cited above) applies only to U.S. citizens or residents, not to </span><a class="mw-redirect" data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-resident_alien" title="Non-resident alien"><span data-dcnode-id="3519" instrument_node="">non-resident aliens</span></a><span data-dcnode-id="3517" instrument_node="">. Non-resident aliens have a $60,000 exclusion instead; this amount may be higher if a </span><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_treaty%23Provisions_unique_to_inheritance_taxes" title="Tax treaty"><span data-dcnode-id="3516" instrument_node="">gift and estate tax treaty</span></a><span data-dcnode-id="3514" instrument_node=""> applies.
</span></p><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">For estate tax purposes, the test is different in determining who is a non-resident alien, compared to the one for income tax purposes (the inquiry centers around the decedent's domicile). This is a subjective test that looks primarily at intent. The test considers factors such as the length of stay in the United States; frequency of travel, size, and cost of home in the United States; location of family; participation in community activities; participation in U.S. business and ownership of assets in the United States; and voting. A foreigner can be a U.S. resident for income tax purposes, but not be domiciled for estate tax purposes.
</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">A non-resident alien is subject to a different regime for estate tax than U.S. citizens and residents. The estate tax is imposed only on the part of the gross non-resident alien's estate that at the time of death is situated in the United States. These rules may be ameliorated by an estate tax treaty. The U.S. does not maintain as many estate tax treaties as income tax treaties, but there are estate tax treaties in place with many of the major European countries, Australia, and Japan.
</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">U.S. real estate owned by a non-resident alien through a foreign corporation is not included in a non-resident alien's estate. The corporation must have a business purpose and activity, lest it be deemed a sham designed to avoid U.S. estate taxes.
</span></p><span data-dcnode-id="3506" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3500" role="note"><span data-dcnode-id="3503" instrument_node="">See also: </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gift_tax_in_the_United_States%23Non-residents" title="Gift tax in the United States"><span data-dcnode-id="3502" instrument_node="">Gift tax in the United States §&nbsp;Non-residents</span></a></div><span data-dcnode-id="3499" instrument_node="">
</span><h3 data-dcnode-id="3489"><span class="mw-headline" data-dcnode-id="3497" id="Noncitizen_spouse"><span data-dcnode-id="3498" instrument_node="">Noncitizen spouse</span></span><span class="mw-editsection" data-dcnode-id="3490"><span class="mw-editsection-bracket" data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">[</span></span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Noncitizen spouse"><span data-dcnode-id="3494" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">The estate tax of a deceased spouse depends on the citizenship of the surviving spouse.
</span></p><p data-dcnode-id="3474"><span data-dcnode-id="3485" instrument_node="">All property held jointly with a surviving noncitizen spouse is considered to belong entirely to the </span><a data-dcnode-id="3483" href="#Gross_estate"><span data-dcnode-id="3484" instrument_node="">gross estate</span></a><span data-dcnode-id="3482" instrument_node=""> of the deceased, except for the extent the </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executor" title="Executor"><span data-dcnode-id="3481" instrument_node="">executor</span></a><span data-dcnode-id="3479" instrument_node=""> can substantiate the contributions of the noncitizen surviving spouse to the acquisition of the property.</span><sup class="reference" data-dcnode-id="3476" id="cite_ref-42"><a data-dcnode-id="3477" href="#cite_note-42"><span data-dcnode-id="3478" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3475" instrument_node="">
</span></p><p data-dcnode-id="3469"><span data-dcnode-id="3473" instrument_node="">U.S. citizens with a noncitizen spouse do not benefit from the same </span><a data-dcnode-id="3471" href="#Deductions_and_the_taxable_estate"><span data-dcnode-id="3472" instrument_node="">marital deductions</span></a><span data-dcnode-id="3470" instrument_node=""> as those with a U.S. citizen spouse.
</span></p><p data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Furthermore, the estate tax exemption is not portable among spouses if one of the spouses is a noncitizen.
</span></p><span data-dcnode-id="3466" instrument_node="">
</span><link data-dcnode-id="3465" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3461" role="note"><span data-dcnode-id="3464" instrument_node="">See also: </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gift_tax_in_the_United_States%23Noncitizen_spouse" title="Gift tax in the United States"><span data-dcnode-id="3463" instrument_node="">Gift tax in the United States §&nbsp;Noncitizen spouse</span></a></div><span data-dcnode-id="3460" instrument_node="">
</span><h2 data-dcnode-id="3450"><span class="mw-headline" data-dcnode-id="3458" id="Estate_and_inheritance_taxes_at_the_state_level"><span data-dcnode-id="3459" instrument_node="">Estate and inheritance taxes at the state level</span></span><span class="mw-editsection" data-dcnode-id="3451"><span class="mw-editsection-bracket" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">[</span></span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Estate and inheritance taxes at the state level"><span data-dcnode-id="3455" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3439"><span data-dcnode-id="3448" instrument_node="">Currently, fifteen states and the District of Columbia have an estate tax, and six states have an inheritance tax. Maryland has both.</span><sup class="reference" data-dcnode-id="3445" id="cite_ref-Blog_43-0"><a data-dcnode-id="3446" href="#cite_note-Blog-43"><span data-dcnode-id="3447" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3444" instrument_node=""> Some states exempt estates at the federal level. Other states impose tax at lower levels; New Jersey estate tax was abolished for deaths after Jan 1, 2018.</span><sup class="reference" data-dcnode-id="3441" id="cite_ref-Blog_43-1"><a data-dcnode-id="3442" href="#cite_note-Blog-43"><span data-dcnode-id="3443" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3440" instrument_node="">
</span></p><p data-dcnode-id="3429"><span data-dcnode-id="3438" instrument_node="">In states that impose an inheritance tax, the tax rate depends on the status of the person receiving the property, and in some jurisdictions, how much they receive.</span><sup class="reference" data-dcnode-id="3435" id="cite_ref-44"><a data-dcnode-id="3436" href="#cite_note-44"><span data-dcnode-id="3437" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3434" instrument_node=""> Inheritance taxes are paid not by the estate of the deceased, but by the inheritors of the estate. For example, the Kentucky inheritance tax "is a tax on the right to receive property from a decedent's estate; both tax and exemptions are based on the relationship of the beneficiary to the decedent."</span><sup class="reference" data-dcnode-id="3431" id="cite_ref-45"><a data-dcnode-id="3432" href="#cite_note-45"><span data-dcnode-id="3433" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3430" instrument_node="">
</span></p><p data-dcnode-id="3412"><span data-dcnode-id="3428" instrument_node="">For decedents dying in calendar year 2014, 12 states (Connecticut, Delaware, Hawaii, Illinois, Maine, Massachusetts, Minnesota, New York, Oregon, Rhode Island, Vermont, and Washington) and the District of Columbia impose only estate taxes. Delaware and Hawaii allowed their taxes to expire after Congress repealed the credit for state estate taxes, but reenacted the taxes in 2010. Exemption amounts under the state estate taxes vary, ranging from the federal estate tax exemption amount or </span><span data-dcnode-id="3426" style="white-space: nowrap"><span data-dcnode-id="3427" instrument_node="">$5.34 million</span></span><span data-dcnode-id="3425" instrument_node="">, indexed for inflation (two states) to </span><span data-dcnode-id="3423" style="white-space: nowrap"><span data-dcnode-id="3424" instrument_node="">$675,000</span></span><span data-dcnode-id="3422" instrument_node=""> (New Jersey). The most common amount is </span><span data-dcnode-id="3420" style="white-space: nowrap"><span data-dcnode-id="3421" instrument_node="">$1 million</span></span><span data-dcnode-id="3419" instrument_node=""> (three states and the District of Columbia). In 2014, four states increased their exemption amounts: Minnesota (phased up to </span><span data-dcnode-id="3417" style="white-space: nowrap"><span data-dcnode-id="3418" instrument_node="">$2 million</span></span><span data-dcnode-id="3416" instrument_node=""> for 2018 deaths), Rhode Island (</span><span data-dcnode-id="3414" style="white-space: nowrap"><span data-dcnode-id="3415" instrument_node="">$1.5 million</span></span><span data-dcnode-id="3413" instrument_node=""> for 2015 deaths), and Maryland and New York (both phased their exemptions up to the federal amount for 2019 deaths). Top rates range from 12 percent to 19 percent with most states, like Minnesota, imposing a top rate of 16 percent.
</span></p><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Five states (Iowa, Kentucky, Nebraska, New Jersey, and Pennsylvania) impose only inheritance taxes. The exemptions under state inheritance taxes vary greatly, ranging from no exemption (Pennsylvania) for bequests to unrelated individuals to unlimited exemptions (Iowa and Kentucky) for bequests to lineal heirs, such as children or parents of the decedent. No states tax bequests to surviving spouses. Only two states (Nebraska and Pennsylvania) tax bequests to lineal heirs. Top tax rates range from 4.5 percent (Pennsylvania on lineal heirs) to 18 percent (Nebraska on collateral heirs).
</span></p><p data-dcnode-id="3404"><span data-dcnode-id="3409" instrument_node="">One state— Maryland —imposes both types of taxes, but the estate tax paid is a credit against the inheritance tax, so the total tax liability is not the sum of the two, but the greater of the two taxes. Its inheritance tax does not apply to bequests to lineal heirs.</span><sup class="reference" data-dcnode-id="3406" id="cite_ref-46"><a data-dcnode-id="3407" href="#cite_note-46"><span data-dcnode-id="3408" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3405" instrument_node="">
</span></p><span data-dcnode-id="3403" instrument_node="">
</span><h2 data-dcnode-id="3393"><span class="mw-headline" data-dcnode-id="3401" id="Tax_mitigation"><span data-dcnode-id="3402" instrument_node="">Tax mitigation</span></span><span class="mw-editsection" data-dcnode-id="3394"><span class="mw-editsection-bracket" data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">[</span></span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Tax mitigation"><span data-dcnode-id="3398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3392" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3391" instrument_node="">Mitigation strategies can include making </span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inter_vivos" title="Inter vivos"><span data-dcnode-id="3390" instrument_node="">inter vivos</span></a><span data-dcnode-id="3388" instrument_node=""> (lifetime) transfers that are subject to lower effective </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_rate" title="Tax rate"><span data-dcnode-id="3387" instrument_node="">tax rates</span></a><span data-dcnode-id="3385" instrument_node=""> than transfers at death, transferring property through insurance trusts or </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grantor_retained_annuity_trust" title="Grantor retained annuity trust"><span data-dcnode-id="3384" instrument_node="">grantor retained annuity trusts</span></a><span data-dcnode-id="3382" instrument_node="">, making gifts to charity, transferring minority business interests, taking maximal advantage of each spouse’s opportunity for exempt transfers; and there are many others, not the least of which is simply spending more of one’s resources during lifetime and thereby reducing total transfers.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-Jr_2012_11-2"><a data-dcnode-id="3380" href="#cite_note-Jr_2012-11"><span data-dcnode-id="3381" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3378" instrument_node=""> A 2021 investigation using leaked IRS documents found more than half of the richest 100 Americans are using grantor retained annuity trusts to avoid paying estate taxes when they die.</span><sup class="reference" data-dcnode-id="3375" id="cite_ref-47"><a data-dcnode-id="3376" href="#cite_note-47"><span data-dcnode-id="3377" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3374" instrument_node="">
</span></p><span data-dcnode-id="3372" instrument_node="">
</span><h2 data-dcnode-id="3362"><span class="mw-headline" data-dcnode-id="3370" id="History"><span data-dcnode-id="3371" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="3363"><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">[</span></span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: History"><span data-dcnode-id="3367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3361" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3349"><div class="thumbinner" data-dcnode-id="3350" style="width:352px;"><a class="image" data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUS_Top_Estate_Tax_Rate.png"><img alt="" class="thumbimage" data-dcnode-id="3360" data-file-height="248" data-file-width="457" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d1/US_Top_Estate_Tax_Rate.png/350px-US_Top_Estate_Tax_Rate.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/d/d1/US_Top_Estate_Tax_Rate.png 1.5x" width="350"></a><span data-dcnode-id="3358" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3351"><div class="magnify" data-dcnode-id="3356"><a class="internal" data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUS_Top_Estate_Tax_Rate.png" title="Enlarge"></a></div><span data-dcnode-id="3355" instrument_node="">Top Estate Tax Rate, 1914–2018</span><sup class="reference" data-dcnode-id="3352" id="cite_ref-48"><a data-dcnode-id="3353" href="#cite_note-48"><span data-dcnode-id="3354" instrument_node="">[48]</span></a></sup></div></div></div><span data-dcnode-id="3348" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3347" instrument_node="">Taxes which apply to estates or to inheritance in the United States trace back to the 18th century.  According to the IRS, a temporary stamp tax in 1797 applied a tax of varying size depending on the size of the bequest, ranging from 25 cents for a bequest between </span><span data-dcnode-id="3345" style="white-space: nowrap"><span data-dcnode-id="3346" instrument_node="">$50</span></span><span data-dcnode-id="3344" instrument_node=""> and </span><span data-dcnode-id="3342" style="white-space: nowrap"><span data-dcnode-id="3343" instrument_node="">$100</span></span><span data-dcnode-id="3341" instrument_node="">, to 1 dollar for each </span><span data-dcnode-id="3339" style="white-space: nowrap"><span data-dcnode-id="3340" instrument_node="">$500</span></span><span data-dcnode-id="3338" instrument_node="">.  The tax was repealed in 1802.  In the 19th century, the Revenue Act of 1862 and the </span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_Revenue_Act_of_1898" title="War Revenue Act of 1898"><span data-dcnode-id="3337" instrument_node="">War Revenue Act of 1898</span></a><span data-dcnode-id="3335" instrument_node=""> also imposed rates, but were each repealed shortly thereafter.  The modern estate tax was enacted in 1916.</span><sup class="reference" data-dcnode-id="3332" id="cite_ref-49"><a data-dcnode-id="3333" href="#cite_note-49"><span data-dcnode-id="3334" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="3329" id="cite_ref-50"><a data-dcnode-id="3330" href="#cite_note-50"><span data-dcnode-id="3331" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3328" instrument_node="">
</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3326" instrument_node="">The modern estate tax was temporarily phased out and repealed by tax legislation in 2001.  This legislation gradually dropped the rates until they were eliminated in 2010. However, the law did not make these changes permanent and the estate tax returned in 2011.</span><sup class="reference" data-dcnode-id="3323" id="cite_ref-51"><a data-dcnode-id="3324" href="#cite_note-51"><span data-dcnode-id="3325" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3322" instrument_node="">
</span></p><span data-dcnode-id="3320" instrument_node="">
</span><blockquote data-dcnode-id="3308"><p data-dcnode-id="3309"><span data-dcnode-id="3319" instrument_node="">But late in 2010, before that clause took effect, Congress passed superseding legislation that imposed a 35 percent tax in 2011 and 2012 on estate in excess of </span><span data-dcnode-id="3317" style="white-space: nowrap"><span data-dcnode-id="3318" instrument_node="">$5 million</span></span><span data-dcnode-id="3316" instrument_node="">. Like the 2001 legislation, the 2010 legislation had a sunset clause so that in 2013 the estate tax would return to its 2001 level. But then on New Year's Day 2013, Congress made permanent an estate tax on estates in excess of </span><span data-dcnode-id="3314" style="white-space: nowrap"><span data-dcnode-id="3315" instrument_node="">$5 million</span></span><span data-dcnode-id="3313" instrument_node=""> at a rate of 40 percent.</span><sup class="reference" data-dcnode-id="3310" id="cite_ref-52"><a data-dcnode-id="3311" href="#cite_note-52"><span data-dcnode-id="3312" instrument_node="">[52]</span></a></sup></p></blockquote><span data-dcnode-id="3307" instrument_node="">
</span><h2 data-dcnode-id="3297"><span class="mw-headline" data-dcnode-id="3305" id="Estate_tax_and_charity"><span data-dcnode-id="3306" instrument_node="">Estate tax and charity</span></span><span class="mw-editsection" data-dcnode-id="3298"><span class="mw-editsection-bracket" data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">[</span></span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Estate tax and charity"><span data-dcnode-id="3302" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3296" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="3259" role="presentation"><tbody data-dcnode-id="3260"><tr data-dcnode-id="3261"><td class="mbox-image" data-dcnode-id="3292"><div data-dcnode-id="3293" style="width:52px"><a class="image" data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3295" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3262"><div class="mbox-text-span" data-dcnode-id="3263"><span data-dcnode-id="3291" instrument_node="">This section </span><b data-dcnode-id="3287"><span data-dcnode-id="3290" instrument_node="">needs additional citations for </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3289" instrument_node="">verification</span></a></b><span data-dcnode-id="3286" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3278"><span data-dcnode-id="3285" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEstate_tax_in_the_United_States%26action%3Dedit"><span data-dcnode-id="3284" instrument_node="">improve this article</span></a><span data-dcnode-id="3282" instrument_node=""> by </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3281" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3279" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="3277" instrument_node=""> </span><span class="date-container" data-dcnode-id="3271"><i data-dcnode-id="3272"><span data-dcnode-id="3276" instrument_node="">(</span><span class="date" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">June 2021</span></span><span data-dcnode-id="3273" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3264"><i data-dcnode-id="3265"><span data-dcnode-id="3270" instrument_node=""> (</span><small data-dcnode-id="3267"><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3269" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3266" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3258" instrument_node="">
