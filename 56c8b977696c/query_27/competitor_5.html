</span><h3 data-dcnode-id="2112"><span class="mw-headline" data-dcnode-id="2120" id="Assessors"><span data-dcnode-id="2121" instrument_node="">Assessors</span></span><span class="mw-editsection" data-dcnode-id="2113"><span class="mw-editsection-bracket" data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">[</span></span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D32" title="Edit section: Assessors"><span data-dcnode-id="2117" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2110" instrument_node="">Most taxing jurisdictions refer to the official charged with determining property values, assessing, and collecting property taxes as assessors.  Assessors may be elected, appointed, hired, or contracted, depending on rules within the jurisdiction, which may vary within a state.  Assessors may or not be involved in collection of tax.</span><sup class="reference" data-dcnode-id="2107" id="cite_ref-62"><a data-dcnode-id="2108" href="#cite_note-62"><span data-dcnode-id="2109" instrument_node="">[62]</span></a></sup><span data-dcnode-id="2106" instrument_node="">  The tax assessors in some states are required to pass certain certification examinations and/or have a certain minimum level of property valuation experience.</span><sup class="reference" data-dcnode-id="2103" id="cite_ref-Systempage_b_12-2"><a data-dcnode-id="2104" href="#cite_note-Systempage_b-12"><span data-dcnode-id="2105" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2102" instrument_node="">  Larger jurisdictions employ full-time personnel in the tax assessors office, while small jurisdictions may engage only one part-time person for the entire tax assessor function.
</span></p><span data-dcnode-id="2100" instrument_node="">
</span><h2 data-dcnode-id="2090"><span class="mw-headline" data-dcnode-id="2098" id="Constitutional_limitations"><span data-dcnode-id="2099" instrument_node="">Constitutional limitations</span></span><span class="mw-editsection" data-dcnode-id="2091"><span class="mw-editsection-bracket" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">[</span></span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D33" title="Edit section: Constitutional limitations"><span data-dcnode-id="2095" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2088" instrument_node="">Property taxes, like all taxes in the United States, are subject to constraints under the United States and applicable state constitutions.  The </span><a class="mw-redirect" data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Constitution" title="United States Constitution"><span data-dcnode-id="2087" instrument_node="">United States Constitution</span></a><span data-dcnode-id="2085" instrument_node=""> contains three relevant provisions: </span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taxing_and_Spending_Clause" title="Taxing and Spending Clause"><span data-dcnode-id="2084" instrument_node="">limits on federal direct taxation</span></a><span data-dcnode-id="2082" instrument_node="">, an </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Protection_Clause" title="Equal Protection Clause"><span data-dcnode-id="2081" instrument_node="">equal protection rule</span></a><span data-dcnode-id="2079" instrument_node="">, and the </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privileges_and_Immunities_Clause" title="Privileges and Immunities Clause"><span data-dcnode-id="2078" instrument_node="">privileges and immunities provisions</span></a><span data-dcnode-id="2076" instrument_node="">.</span><sup class="reference" data-dcnode-id="2073" id="cite_ref-Hellersteinpage_63-0"><a data-dcnode-id="2074" href="#cite_note-Hellersteinpage-63"><span data-dcnode-id="2075" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2072" instrument_node="">  Nearly all state constitutions impose uniformity and equality rules.  Most state constitutions also impose other restrictions, which vary widely.
</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2070" instrument_node="">The federal government is generally prohibited from imposing </span><a class="mw-redirect" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Direct_taxes" title="Direct taxes"><span data-dcnode-id="2069" instrument_node="">direct taxes</span></a><span data-dcnode-id="2067" instrument_node=""> unless such taxes are then given to the states in proportion to population.  Thus, </span><i data-dcnode-id="2064"><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ad_valorem_tax" title="Ad valorem tax"><span data-dcnode-id="2066" instrument_node="">ad valorem</span></a></i><span data-dcnode-id="2063" instrument_node=""> property taxes have not been imposed at the federal level.
</span></p><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">The states must grant residents of other states equal protections as taxpayers.
</span></p><span data-dcnode-id="2059" instrument_node="">
</span><h3 data-dcnode-id="2049"><span class="mw-headline" data-dcnode-id="2057" id="Uniformity_and_equality"><span data-dcnode-id="2058" instrument_node="">Uniformity and equality</span></span><span class="mw-editsection" data-dcnode-id="2050"><span class="mw-editsection-bracket" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">[</span></span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D34" title="Edit section: Uniformity and equality"><span data-dcnode-id="2054" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2047" instrument_node="">State constitutions constrain taxing authorities within the state, including local governments.  Typically, these constitutions require that property taxes be uniformly or equally assessed.  While many states allow differing rates of taxation among tax jurisdictions, most prohibit the same jurisdiction from applying different rates to different taxpayers. These provisions have generally been interpreted to mean the method of valuation and assessment must be consistent from one local government to another.  Some state courts have held that this uniformity and equality requirement does not prevent granting individualized tax credits (such as exemptions and incentives).  Some states permit different classes of property (as opposed to different classes of taxpayers) to be valued using different assessment ratios.  In many states the uniformity and equality provisions apply only to property taxes, leading to significant classification problems.</span><sup class="reference" data-dcnode-id="2044" id="cite_ref-Hellersteinpage_63-1"><a data-dcnode-id="2045" href="#cite_note-Hellersteinpage-63"><span data-dcnode-id="2046" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2043" instrument_node="">
</span></p><span data-dcnode-id="2041" instrument_node="">
</span><h2 data-dcnode-id="2031"><span class="mw-headline" data-dcnode-id="2039" id="History"><span data-dcnode-id="2040" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="2032"><span class="mw-editsection-bracket" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">[</span></span><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D35" title="Edit section: History"><span data-dcnode-id="2036" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2029" instrument_node="">Property taxes in the United States originated during colonial times.</span><sup class="reference" data-dcnode-id="2026" id="cite_ref-64"><a data-dcnode-id="2027" href="#cite_note-64"><span data-dcnode-id="2028" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2025" instrument_node="">  By 1796, state and local governments in fourteen of the fifteen states taxed land, but only four taxed inventory (stock in trade).  Delaware did not tax property, but rather the income from it.  In some states, "all property, with a few exceptions, was taxed; in others, specific objects were named. Land was taxed in one state according to quantity, in another according to quality, and in a third not at all. Responsibility for the assessment and collection of taxes in some cases attached to the state itself; in others, to the counties or townships."  Vermont and North Carolina taxed land based on quantity, while New York and Rhode Island taxed land based on value.  Connecticut taxed land based on type of use.  Procedures varied widely.</span><sup class="reference" data-dcnode-id="2022" id="cite_ref-auto_65-0"><a data-dcnode-id="2023" href="#cite_note-auto-65"><span data-dcnode-id="2024" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2021" instrument_node="">
</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2019" instrument_node="">During the period from 1796 until the </span><a class="mw-redirect" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_War_%28United_States%29" title="Civil War (United States)"><span data-dcnode-id="2018" instrument_node="">Civil War</span></a><span data-dcnode-id="2016" instrument_node="">, a unifying principle developed: "the taxation of all property, movable and immovable, visible and invisible, or real and personal, as we say in America, at one uniform rate."</span><sup class="reference" data-dcnode-id="2013" id="cite_ref-66"><a data-dcnode-id="2014" href="#cite_note-66"><span data-dcnode-id="2015" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2012" instrument_node="">  During this period, property taxes came to be assessed based on value.  This was introduced as a requirement in many state constitutions.
</span></p><p data-dcnode-id="1999"><span data-dcnode-id="2010" instrument_node="">After the Civil War, intangible property, including corporate stock, took on far greater importance. Taxing jurisdictions found it difficult to find and tax this sort of property.  This trend led to the introduction of alternatives to the property tax (such as </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax_in_the_United_States" title="Income tax in the United States"><span data-dcnode-id="2009" instrument_node="">income</span></a><span data-dcnode-id="2007" instrument_node=""> and </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sales_taxes_in_the_United_States" title="Sales taxes in the United States"><span data-dcnode-id="2006" instrument_node="">sales taxes</span></a><span data-dcnode-id="2004" instrument_node="">) at the state level.</span><sup class="reference" data-dcnode-id="2001" id="cite_ref-Hellersteinpage_a_16-1"><a data-dcnode-id="2002" href="#cite_note-Hellersteinpage_a-16"><span data-dcnode-id="2003" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2000" instrument_node="">  Property taxes remained a major source of government revenue below the state level.
</span></p><p data-dcnode-id="1987"><span data-dcnode-id="1998" instrument_node="">Hard times during the </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="1997" instrument_node="">Great Depression</span></a><span data-dcnode-id="1995" instrument_node=""> led to high delinquency rates and reduced property tax revenues.</span><sup class="reference" data-dcnode-id="1992" id="cite_ref-67"><a data-dcnode-id="1993" href="#cite_note-67"><span data-dcnode-id="1994" instrument_node="">[67]</span></a></sup><span data-dcnode-id="1991" instrument_node="">  Also during the 1900s, many jurisdictions began exempting certain property from taxes.  Many jurisdictions exempted homes of war veterans. After </span><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="1990" instrument_node="">World War II</span></a><span data-dcnode-id="1988" instrument_node="">, some states replaced exemptions with "circuit breaker" provisions limiting increases in value for residences.
</span></p><p data-dcnode-id="1979"><span data-dcnode-id="1986" instrument_node="">Various economic factors have led to taxpayer initiatives in various states to limit property tax.  </span><a class="mw-redirect" data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_Proposition_13_%281978%29" title="California Proposition 13 (1978)"><span data-dcnode-id="1985" instrument_node="">California Proposition 13 (1978)</span></a><span data-dcnode-id="1983" instrument_node=""> amended the </span><a class="mw-redirect" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_Constitution" title="California Constitution"><span data-dcnode-id="1982" instrument_node="">California Constitution</span></a><span data-dcnode-id="1980" instrument_node=""> to limit aggregate property taxes to 1% of the "full cash value of such property."  It also limited the increase in assessed value of real property to an inflation factor that was limited to 2% per year.
</span></p><span data-dcnode-id="1978" instrument_node="">
</span><h2 data-dcnode-id="1968"><span class="mw-headline" data-dcnode-id="1976" id="Policy_issues"><span data-dcnode-id="1977" instrument_node="">Policy issues</span></span><span class="mw-editsection" data-dcnode-id="1969"><span class="mw-editsection-bracket" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">[</span></span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D36" title="Edit section: Policy issues"><span data-dcnode-id="1973" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1967" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="1924" role="presentation"><tbody data-dcnode-id="1925"><tr data-dcnode-id="1926"><td class="mbox-image" data-dcnode-id="1963"><div data-dcnode-id="1964" style="width:52px"><a class="image" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="1966" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="1927"><div class="mbox-text-span" data-dcnode-id="1928"><span data-dcnode-id="1962" instrument_node="">This section </span><b data-dcnode-id="1955"><span data-dcnode-id="1961" instrument_node="">does not </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="1960" instrument_node="">cite</span></a><span data-dcnode-id="1958" instrument_node=""> any </span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="1957" instrument_node="">sources</span></a></b><span data-dcnode-id="1954" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1943"><span data-dcnode-id="1953" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit"><span data-dcnode-id="1952" instrument_node="">improve this section</span></a><span data-dcnode-id="1950" instrument_node=""> by </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="1949" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="1947" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="1946" instrument_node="">removed</span></a><span data-dcnode-id="1944" instrument_node="">.</span></span><span data-dcnode-id="1942" instrument_node=""> </span><span class="date-container" data-dcnode-id="1936"><i data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">(</span><span class="date" data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">December 2015</span></span><span data-dcnode-id="1938" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1929"><i data-dcnode-id="1930"><span data-dcnode-id="1935" instrument_node=""> (</span><small data-dcnode-id="1932"><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="1934" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1931" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">There are numerous policy issues regarding property tax, including:
</span></p><span data-dcnode-id="1920" instrument_node="">
</span><ul data-dcnode-id="1908"><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Fairness, or lack thereof</span></li><span data-dcnode-id="1917" instrument_node="">
</span><li data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Progressivity, or lack thereof</span></li><span data-dcnode-id="1914" instrument_node="">
</span><li data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Administrability/socialist redistribution of taxpayer funds</span></li><span data-dcnode-id="1911" instrument_node="">
</span><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Allodial title vs. true ownership of property</span></li></ul><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">In spite of these issues, many aspects of the property tax, and the reliance of local governments on it as a principal source of revenue, have remained much the same since colonial times.
</span></p><span data-dcnode-id="1904" instrument_node="">
</span><h2 data-dcnode-id="1894"><span class="mw-headline" data-dcnode-id="1902" id="Opinions_on_property_tax"><span data-dcnode-id="1903" instrument_node="">Opinions on property tax</span></span><span class="mw-editsection" data-dcnode-id="1895"><span class="mw-editsection-bracket" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">[</span></span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D37" title="Edit section: Opinions on property tax"><span data-dcnode-id="1899" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1893" instrument_node="">
</span><h3 data-dcnode-id="1883"><span class="mw-headline" data-dcnode-id="1891" id="Sprawl"><span data-dcnode-id="1892" instrument_node="">Sprawl</span></span><span class="mw-editsection" data-dcnode-id="1884"><span class="mw-editsection-bracket" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">[</span></span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D38" title="Edit section: Sprawl"><span data-dcnode-id="1888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">In the absence of urban planning policies, property tax on real estate changes the incentives for developing land, which in turn affects land use patterns. One of the main concerns is whether or not it encourages </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_sprawl" title="Urban sprawl"><span data-dcnode-id="1880" instrument_node="">urban sprawl</span></a><span data-dcnode-id="1878" instrument_node="">.
</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1876" instrument_node="">The </span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_value" title="Market value"><span data-dcnode-id="1875" instrument_node="">market value</span></a><span data-dcnode-id="1873" instrument_node=""> of undeveloped real estate reflects a property's current use as well as its development potential. As a city expands, relatively cheap and undeveloped lands (such as farms, ranches, private conservation parks, etc.) increase in value as neighboring areas are developed into retail, industrial, or residential units. This raises the land value, which increases the property tax that must be paid on agricultural land, but does not increase the amount of </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revenue" title="Revenue"><span data-dcnode-id="1872" instrument_node="">revenue</span></a><span data-dcnode-id="1870" instrument_node=""> per land area available to the owner. This, along with a higher sale price, increases the incentive to rent or sell agricultural land to developers. On the other hand, a property owner who develops a parcel must thereafter pay a higher tax, based on the value of the improvements. This makes the development less attractive than it would otherwise be. Overall, these effects result in lower density development, which tends to increase sprawl.
</span></p><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Attempts to reduce the impact of property taxes on sprawl include:
</span></p><span data-dcnode-id="1866" instrument_node="">
</span><ul data-dcnode-id="1823"><li data-dcnode-id="1861"><b data-dcnode-id="1863"><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_value_tax" title="Land value tax"><span data-dcnode-id="1865" instrument_node="">Land value taxation</span></a></b><span data-dcnode-id="1862" instrument_node=""> - This method separates the value of a given property into its actual components&nbsp;— land value and improvement value. A gradually lower and lower tax is levied on the improvement value and a higher tax is levied on the land value to insure revenue-neutrality. A similar method is known as split-rate taxation.</span></li><span data-dcnode-id="1860" instrument_node="">
</span><li data-dcnode-id="1856"><b data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Current-use valuation</span></b><span data-dcnode-id="1857" instrument_node=""> - This method assesses the value of a given property based only upon its current use. Much like land value taxation, this reduces the effect of city encroachment.</span></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1850"><b data-dcnode-id="1852"><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservation_easement" title="Conservation easement"><span data-dcnode-id="1854" instrument_node="">Conservation easements</span></a></b><span data-dcnode-id="1851" instrument_node=""> - The property owner adds a restriction to the property prohibiting future development. This effectively removes the development potential as a factor in the property taxes.</span></li><span data-dcnode-id="1849" instrument_node="">
</span><li data-dcnode-id="1845"><b data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Exemptions</span></b><span data-dcnode-id="1846" instrument_node=""> - Exempting favored classes of real estate (such as farms, ranches, cemeteries or private conservation parks) from the property tax altogether or assessing their value at a minimal amount (for example, $1 per acre).</span></li><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1834"><b data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Forcing higher density housing</span></b><span data-dcnode-id="1841" instrument_node=""> - In the </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portland%2C_Oregon" title="Portland, Oregon"><span data-dcnode-id="1840" instrument_node="">Portland, Oregon</span></a><span data-dcnode-id="1838" instrument_node=""> area, for example, local municipalities are often forced to accept higher density housing with small lot sizes. This is governed by a multi-county development control board, in Portland's case </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metro_%28Oregon_regional_government%29" title="Metro (Oregon regional government)"><span data-dcnode-id="1837" instrument_node="">Metro</span></a><span data-dcnode-id="1835" instrument_node="">.</span></li><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1824"><b data-dcnode-id="1830"><a data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_growth_boundary" title="Urban growth boundary"><span data-dcnode-id="1832" instrument_node="">Urban growth boundary</span></a></b><span data-dcnode-id="1829" instrument_node=""> or </span><b data-dcnode-id="1826"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_belt" title="Green belt"><span data-dcnode-id="1828" instrument_node="">Green belt</span></a></b><span data-dcnode-id="1825" instrument_node=""> - Government declares some land undevelopable until a date in the future. This forces regional development back into the urban core, increasing density but also land and housing prices. It may also cause development to skip over the restricted-use zone, to occur in more distant areas, or to move to other cities.</span></li></ul><span data-dcnode-id="1822" instrument_node="">
</span><h3 data-dcnode-id="1812"><span class="mw-headline" data-dcnode-id="1820" id="Distributional"><span data-dcnode-id="1821" instrument_node="">Distributional</span></span><span class="mw-editsection" data-dcnode-id="1813"><span class="mw-editsection-bracket" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">[</span></span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D39" title="Edit section: Distributional"><span data-dcnode-id="1817" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1810" instrument_node="">Property tax has been shown to be </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regressive_tax" title="Regressive tax"><span data-dcnode-id="1809" instrument_node="">regressive</span></a><sup class="reference" data-dcnode-id="1805" id="cite_ref-whopays_2-1"><a data-dcnode-id="1806" href="#cite_note-whopays-2"><span data-dcnode-id="1807" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1804" instrument_node=""> (that is, to fall disproportionately on those of lower income) under certain circumstances, because of its impact on particular low-income/high-asset groups such as </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pension" title="Pension"><span data-dcnode-id="1803" instrument_node="">pensioners</span></a><span data-dcnode-id="1801" instrument_node=""> and farmers. Because these persons have high-assets accumulated over time, they have a high property tax liability, although their realized income is low. Therefore, a larger proportion of their income goes to paying the tax. In areas with speculative land appreciation (such as California in the 1970s and 2000s), there may be little or no relationship between property taxes and a homeowner's ability to pay them short of selling the property.</span><sup class="reference" data-dcnode-id="1798" id="cite_ref-68"><a data-dcnode-id="1799" href="#cite_note-68"><span data-dcnode-id="1800" instrument_node="">[68]</span></a></sup><span data-dcnode-id="1797" instrument_node="">
</span></p><p data-dcnode-id="1776"><span data-dcnode-id="1795" instrument_node="">This issue was a common argument used by supporters of such measures as </span><a class="mw-redirect" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_Proposition_13_%281978%29" title="California Proposition 13 (1978)"><span data-dcnode-id="1794" instrument_node="">California Proposition 13</span></a><span data-dcnode-id="1792" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon_Ballot_Measure_5_%281990%29" title="Oregon Ballot Measure 5 (1990)"><span data-dcnode-id="1791" instrument_node="">Oregon Ballot Measure 5</span></a><span data-dcnode-id="1789" instrument_node="">; some economists have even called for the abolition of property taxes altogether, to be replaced by </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="1788" instrument_node="">income taxes</span></a><span data-dcnode-id="1786" instrument_node="">, </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumption_tax" title="Consumption tax"><span data-dcnode-id="1785" instrument_node="">consumption taxes</span></a><span data-dcnode-id="1783" instrument_node=""> such as Europe's </span><a class="mw-redirect" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Value_added_tax" title="Value added tax"><span data-dcnode-id="1782" instrument_node="">VAT</span></a><span data-dcnode-id="1780" instrument_node="">, or a combination of both. Others, however, have argued that property taxes are broadly </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_tax" title="Progressive tax"><span data-dcnode-id="1779" instrument_node="">progressive</span></a><span data-dcnode-id="1777" instrument_node="">, since people of higher incomes are disproportionately likely to own more valuable property. In addition, while nearly all households have some income, nearly a third of households own no real estate. Moreover, the most valuable properties are owned by corporations not individuals. Hence, property is more unevenly distributed than income.
</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">It has been suggested that these two beliefs are not incompatible&nbsp;— it is possible for a tax to be progressive in general but to be regressive in relation to minority groups. However, although not direct, and not likely one-to-one, property renters can be subject to property taxes as well. If the tax reduces the supply of housing units, then it will increase the rental price. In this way, the owner's cost of taxation is passed on to the renter (occupant).
</span></p><span data-dcnode-id="1773" instrument_node="">
</span><h4 data-dcnode-id="1763"><span class="mw-headline" data-dcnode-id="1771" id="Progressive_policies"><span data-dcnode-id="1772" instrument_node="">Progressive policies</span></span><span class="mw-editsection" data-dcnode-id="1764"><span class="mw-editsection-bracket" data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">[</span></span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D40" title="Edit section: Progressive policies"><span data-dcnode-id="1768" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">As property increases in value the possibility exists that new buyers might pay taxes on outdated values thus placing an unfair burden on the rest of the property owners. To correct this imbalance municipalities periodically revalue property. Revaluation produces an up-to-date value to be used in determination of the tax rate necessary to produce the required tax levy.
</span></p><p data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">A consequence of this is that existing owners are reassessed as well as new owners and thus are required to pay taxes on property the value of which is determined by market forces, such as </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gentrification" title="Gentrification"><span data-dcnode-id="1758" instrument_node="">gentrification</span></a><span data-dcnode-id="1756" instrument_node=""> in low income areas of a city. In an effort to relieve the frequently large tax burdens on existing owners, particularly those with fixed incomes such as the elderly and those who have lost their jobs, communities have introduced exemptions.
</span></p><p data-dcnode-id="1744"><span data-dcnode-id="1754" instrument_node="">In some states, laws provide for exemptions (typically called </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homestead_exemption" title="Homestead exemption"><span data-dcnode-id="1753" instrument_node="">homestead exemptions</span></a><span data-dcnode-id="1751" instrument_node="">) and/or limits on the percentage increase in tax, which limit the yearly increase in property tax so that owner-occupants are not "taxed out of their homes". Generally, these exemptions and ceilings are available only to property owners who use their property as their principal residence. Homestead exemptions generally cannot be claimed on </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate_investing" title="Real estate investing"><span data-dcnode-id="1750" instrument_node="">investment properties</span></a><span data-dcnode-id="1748" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vacation_property" title="Vacation property"><span data-dcnode-id="1747" instrument_node="">second homes</span></a><span data-dcnode-id="1745" instrument_node="">. When a homesteaded property changes ownership, the property tax often rises sharply and the property's sale price may become the basis for new exemptions and limits available to the new owner-occupant.
</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1743" instrument_node="">Homestead exemptions increase the complexity of property tax collection and sometimes provide an easy opportunity for people who own several properties to benefit from tax credits to which they are not entitled. Since there is no national database that links home ownership with </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Security_number" title="Social Security number"><span data-dcnode-id="1742" instrument_node="">Social Security numbers</span></a><span data-dcnode-id="1740" instrument_node="">, landlords sometimes gain homestead tax credits by claiming multiple properties in different states, and even their own state, as their "principal residence", while only one property is truly their residence.</span><sup class="reference" data-dcnode-id="1737" id="cite_ref-69"><a data-dcnode-id="1738" href="#cite_note-69"><span data-dcnode-id="1739" instrument_node="">[69]</span></a></sup><span data-dcnode-id="1736" instrument_node=""> In 2005, several US Senators and Congressmen were found to have erroneously claimed "second homes" in the greater Washington, D.C. area as their "principal residences", giving them property tax credits to which they were not entitled.</span><sup class="reference" data-dcnode-id="1733" id="cite_ref-70"><a data-dcnode-id="1734" href="#cite_note-70"><span data-dcnode-id="1735" instrument_node="">[70]</span></a></sup><span data-dcnode-id="1732" instrument_node="">
</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1730" instrument_node="">Undeserved homestead exemption credits became so ubiquitous in the state of Maryland that a law was passed in the 2007 legislative session to require validation of principal residence status through the use of a social security number matching system.</span><sup class="reference" data-dcnode-id="1727" id="cite_ref-71"><a data-dcnode-id="1728" href="#cite_note-71"><span data-dcnode-id="1729" instrument_node="">[71]</span></a></sup><span data-dcnode-id="1726" instrument_node=""> The bill passed unanimously in the Maryland House of Delegates and Senate and was signed into law by the Governor.</span><sup class="reference" data-dcnode-id="1723" id="cite_ref-72"><a data-dcnode-id="1724" href="#cite_note-72"><span data-dcnode-id="1725" instrument_node="">[72]</span></a></sup><span data-dcnode-id="1722" instrument_node=""> The fairness of property tax collection and distribution is a hotly debated topic. Some people feel school systems would be more uniform if the taxes were collected and distributed at a state level, thereby equalizing the funding of school districts. Others are reluctant to have a higher level of government determine the rates and allocations, preferring to leave the decisions to government levels closer to the people.
</span></p><p data-dcnode-id="1715"><span data-dcnode-id="1720" instrument_node="">In Rhode Island efforts are being made to modify revaluation practices to preserve the major benefit of property taxation, the reliability of tax revenue, while providing for what some view as a correction of the unfair distribution of tax burdens on existing owners of property.</span><sup class="reference" data-dcnode-id="1717" id="cite_ref-73"><a data-dcnode-id="1718" href="#cite_note-73"><span data-dcnode-id="1719" instrument_node="">[73]</span></a></sup><span data-dcnode-id="1716" instrument_node="">
</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1714" instrument_node="">The </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="1713" instrument_node="">Supreme Court</span></a><span data-dcnode-id="1711" instrument_node=""> has held</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1704" style="white-space:nowrap;"><span data-dcnode-id="1710" instrument_node="">[</span><i data-dcnode-id="1706"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1708" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="1709" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1705" instrument_node="">]</span></sup><span data-dcnode-id="1703" instrument_node=""> that Congress can directly tax land ownership so long as the tax is apportioned among the states based upon representation/population. In an apportioned land tax, each state would have its own rate of taxation sufficient to raise its pro-rata share of the total revenue to be financed by a land tax. So, for example, if State A has 5% of the population, the State A would collect and remit to the federal government such tax revenue that equals 5% of the revenue sought. Such an apportioned tax on land had been used on many occasions up through the Civil War.
</span></p><p data-dcnode-id="1686"><a class="mw-redirect" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indirect_taxes" title="Indirect taxes"><span data-dcnode-id="1701" instrument_node="">Indirect taxes</span></a><span data-dcnode-id="1699" instrument_node=""> on the </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transfer_tax" title="Transfer tax"><span data-dcnode-id="1698" instrument_node="">transfer of land</span></a><span data-dcnode-id="1696" instrument_node=""> are permitted without apportionment: in the past, this has taken the form of requiring </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revenue_stamp" title="Revenue stamp"><span data-dcnode-id="1695" instrument_node="">revenue stamps</span></a><span data-dcnode-id="1693" instrument_node=""> to be affixed to deeds and mortgages, but these are no longer required by federal law. Under the Internal Revenue Code, the government realizes a substantial amount of revenue from income taxes on </span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_gain" title="Capital gain"><span data-dcnode-id="1692" instrument_node="">capital gains</span></a><span data-dcnode-id="1690" instrument_node=""> from the sale of land and in </span><a class="mw-redirect" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estate_tax_%28United_States%29" title="Estate tax (United States)"><span data-dcnode-id="1689" instrument_node="">estate taxes</span></a><span data-dcnode-id="1687" instrument_node=""> from the passage of property (including land) upon the death of its owner.
</span></p><p data-dcnode-id="1668"><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milton_Friedman" title="Milton Friedman"><span data-dcnode-id="1685" instrument_node="">Milton Friedman</span></a><span data-dcnode-id="1683" instrument_node=""> noted that "[T]he property tax is one of the least bad taxes, because it's levied on something that cannot be produced&nbsp;— that part that is levied on the land".</span><sup class="reference" data-dcnode-id="1680" id="cite_ref-74"><a data-dcnode-id="1681" href="#cite_note-74"><span data-dcnode-id="1682" instrument_node="">[74]</span></a></sup><span data-dcnode-id="1679" instrument_node=""> A 2008 analysis from the </span><a class="mw-redirect" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organisation_for_Economic_Co-operation_and_Development" title="Organisation for Economic Co-operation and Development"><span data-dcnode-id="1678" instrument_node="">Organisation for Economic Co-operation and Development</span></a><span data-dcnode-id="1676" instrument_node=""> was consistent with Friedman's opinion; examining the effect of various types of taxes on economic growth, it found that property taxes "seem[ed] to be the most growth-friendly, followed by consumption taxes and then by personal income taxes."</span><sup class="reference" data-dcnode-id="1673" id="cite_ref-75"><a data-dcnode-id="1674" href="#cite_note-75"><span data-dcnode-id="1675" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="1670" id="cite_ref-76"><a data-dcnode-id="1671" href="#cite_note-76"><span data-dcnode-id="1672" instrument_node="">[76]</span></a></sup><span data-dcnode-id="1669" instrument_node="">
</span></p><span data-dcnode-id="1667" instrument_node="">
</span><h2 data-dcnode-id="1657"><span class="mw-headline" data-dcnode-id="1665" id="See_also"><span data-dcnode-id="1666" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="1658"><span class="mw-editsection-bracket" data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">[</span></span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D41" title="Edit section: See also"><span data-dcnode-id="1662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1656" instrument_node="">
</span><ul data-dcnode-id="1631"><li data-dcnode-id="1653"><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allodial_title" title="Allodial title"><span data-dcnode-id="1655" instrument_node="">Allodial title</span></a></li><span data-dcnode-id="1652" instrument_node="">
