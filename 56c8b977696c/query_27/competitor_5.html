</span><p data-dcnode-id="3515"><span data-dcnode-id="3547" instrument_node="">Most local governments in the United States impose a </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_tax" title="Property tax"><span data-dcnode-id="3546" instrument_node="">property tax</span></a><span data-dcnode-id="3544" instrument_node="">, also known as a </span><a class="mw-redirect" data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millage_rate" title="Millage rate"><span data-dcnode-id="3543" instrument_node="">millage rate</span></a><span data-dcnode-id="3541" instrument_node="">, as a principal source of revenue.</span><sup class="reference" data-dcnode-id="3538" id="cite_ref-1"><a data-dcnode-id="3539" href="#cite_note-1"><span data-dcnode-id="3540" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3537" instrument_node="">  This </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="3536" instrument_node="">tax</span></a><span data-dcnode-id="3534" instrument_node=""> may be imposed on </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate" title="Real estate"><span data-dcnode-id="3533" instrument_node="">real estate</span></a><span data-dcnode-id="3531" instrument_node=""> or </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personal_property" title="Personal property"><span data-dcnode-id="3530" instrument_node="">personal property</span></a><span data-dcnode-id="3528" instrument_node="">. The tax is nearly always computed as the </span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_market_value" title="Fair market value"><span data-dcnode-id="3527" instrument_node="">fair market value</span></a><span data-dcnode-id="3525" instrument_node=""> of the property times an assessment ratio times a </span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_rate" title="Tax rate"><span data-dcnode-id="3524" instrument_node="">tax rate</span></a><span data-dcnode-id="3522" instrument_node="">, and is generally an obligation of the owner of the property. Values are determined by local officials, and may be disputed by property owners. For the taxing authority, one advantage of the property tax over the </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sales_tax" title="Sales tax"><span data-dcnode-id="3521" instrument_node="">sales tax</span></a><span data-dcnode-id="3519" instrument_node=""> or </span><a data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="3518" instrument_node="">income tax</span></a><span data-dcnode-id="3516" instrument_node=""> is that the revenue always equals the tax levy, unlike the other taxes. The property tax typically produces the required revenue for municipalities' tax levies. A disadvantage to the taxpayer is that the tax liability is fixed, while the taxpayer's income is not.
</span></p><p data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">The tax is administered at the local government level. Many states impose limits on how local jurisdictions may tax property. Because many properties are subject to tax by more than one local jurisdiction, some states provide a method by which values are made uniform among such jurisdictions.
</span></p><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Property tax is rarely self-computed by the owner. The tax becomes a legally enforceable obligation attaching to the property at a specific date. Most states impose taxes resembling property tax in the state, and some states tax other types of business property.
</span></p><span data-dcnode-id="3510" instrument_node="">

</span></td></tr></tbody></table><div class="infobox-caption" data-dcnode-id="2979"><span data-dcnode-id="2992" instrument_node="">The average effective property tax of the 50 states on a household (2007). The effective tax shown is calculated using a </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsimulation" title="Microsimulation"><span data-dcnode-id="2991" instrument_node="">microsimulation</span></a><span data-dcnode-id="2989" instrument_node=""> model based on the 1990 </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Use_Microdata_Area" title="Public Use Microdata Area"><span data-dcnode-id="2988" instrument_node="">Public Use Microdata</span></a><span data-dcnode-id="2986" instrument_node=""> Sample of census records and statistical data from the </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="2985" instrument_node="">Internal Revenue Service</span></a><span data-dcnode-id="2983" instrument_node=""> for undisclosed years.</span><sup class="reference" data-dcnode-id="2980" id="cite_ref-whopays_2-0"><a data-dcnode-id="2981" href="#cite_note-whopays-2"><span data-dcnode-id="2982" instrument_node="">[2]</span></a></sup></div></td></tr></tbody></table><span data-dcnode-id="2974" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="2973" instrument_node="">Most jurisdictions below the state level in the United States impose a tax on interests in real property (land, buildings, and permanent improvements) that are considered under state law to be ownership interests.</span><sup class="reference" data-dcnode-id="2970" id="cite_ref-3"><a data-dcnode-id="2971" href="#cite_note-3"><span data-dcnode-id="2972" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2969" instrument_node=""> Rules vary widely by jurisdiction.</span><sup class="reference" data-dcnode-id="2966" id="cite_ref-4"><a data-dcnode-id="2967" href="#cite_note-4"><span data-dcnode-id="2968" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2965" instrument_node=""> However, certain features are nearly universal. Some jurisdictions also tax some types of business personal property, particularly inventory and equipment.</span><sup class="reference" data-dcnode-id="2962" id="cite_ref-5"><a data-dcnode-id="2963" href="#cite_note-5"><span data-dcnode-id="2964" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2961" instrument_node=""> States generally do not impose property taxes.</span><sup class="reference" data-dcnode-id="2958" id="cite_ref-6"><a data-dcnode-id="2959" href="#cite_note-6"><span data-dcnode-id="2960" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2957" instrument_node="">
</span></p><p data-dcnode-id="2919"><span data-dcnode-id="2955" instrument_node="">Many overlapping jurisdictions may have authority to tax the same property.</span><sup class="reference" data-dcnode-id="2952" id="cite_ref-7"><a data-dcnode-id="2953" href="#cite_note-7"><span data-dcnode-id="2954" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2951" instrument_node="">  These include </span><a class="mw-redirect" data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counties%23United_States" title="Counties"><span data-dcnode-id="2950" instrument_node="">counties</span></a><span data-dcnode-id="2948" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parishes" title="Parishes"><span data-dcnode-id="2947" instrument_node="">parishes</span></a><span data-dcnode-id="2945" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cities%23United_States" title="Cities"><span data-dcnode-id="2944" instrument_node="">cities</span></a><span data-dcnode-id="2942" instrument_node=""> and/or </span><a data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Town" title="Town"><span data-dcnode-id="2941" instrument_node="">towns</span></a><span data-dcnode-id="2939" instrument_node="">, </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/School_district%23United_States" title="School district"><span data-dcnode-id="2938" instrument_node="">school districts</span></a><span data-dcnode-id="2936" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_utility_district" title="Public utility district"><span data-dcnode-id="2935" instrument_node="">utility districts</span></a><span data-dcnode-id="2933" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special-purpose_district" title="Special-purpose district"><span data-dcnode-id="2932" instrument_node="">special taxing authorities</span></a><span data-dcnode-id="2930" instrument_node=""> which vary by state. Few states impose a tax on the value of property. The tax is based on </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_market_value" title="Fair market value"><span data-dcnode-id="2929" instrument_node="">fair market value</span></a><span data-dcnode-id="2927" instrument_node=""> of the subject property, and generally </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attachment_%28law%29" title="Attachment (law)"><span data-dcnode-id="2926" instrument_node="">attaches</span></a><span data-dcnode-id="2924" instrument_node=""> to the property on a specific date. The owner of the property on that date is liable for the tax.</span><sup class="reference" data-dcnode-id="2921" id="cite_ref-8"><a data-dcnode-id="2922" href="#cite_note-8"><span data-dcnode-id="2923" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2920" instrument_node="">
</span></p><p data-dcnode-id="2905"><span data-dcnode-id="2918" instrument_node="">The amount of tax is determined annually based on market value of each property on a particular date,</span><sup class="reference" data-dcnode-id="2915" id="cite_ref-9"><a data-dcnode-id="2916" href="#cite_note-9"><span data-dcnode-id="2917" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2914" instrument_node=""> and most jurisdictions require redeterminations of value periodically. The tax is computed as the determined market value times an assessment ratio times the tax rate.</span><sup class="reference" data-dcnode-id="2911" id="cite_ref-10"><a data-dcnode-id="2912" href="#cite_note-10"><span data-dcnode-id="2913" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2910" instrument_node=""> Assessment ratios and tax rates vary among jurisdictions, and may vary by type of property within a jurisdiction.</span><sup class="reference" data-dcnode-id="2907" id="cite_ref-11"><a data-dcnode-id="2908" href="#cite_note-11"><span data-dcnode-id="2909" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2906" instrument_node="">  Most jurisdictions' legislative bodies determine their assessment ratios and tax rates, though some states impose constraints on such determinations.
</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2904" instrument_node="">Tax assessors for taxing jurisdictions determine property values in a variety of ways, but are generally required to base such determinations on fair market value.</span><sup class="reference" data-dcnode-id="2901" id="cite_ref-Systempage_b_12-0"><a data-dcnode-id="2902" href="#cite_note-Systempage_b-12"><span data-dcnode-id="2903" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2900" instrument_node="">  Fair market value is that price for a willing and informed seller would sell the property to a willing and informed buyer, neither being under any compulsion to act. Where a property has recently been sold between unrelated sellers, such sale establishes fair market value.  In other (</span><i data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">i.e.</span></i><span data-dcnode-id="2897" instrument_node="">, most) cases, the value must be estimated. Common estimation techniques include the comparable sales method, the depreciated cost method, and an income method approach. Property owners may also declare a value, which is subject to change by the tax assessor.
</span></p><p data-dcnode-id="2886"><span data-dcnode-id="2895" instrument_node="">Once the value is determined, the assessor typically notifies the last known property owner of the value determination. Such notices may include the calculated amount of tax. The property owner may then contest the value.</span><sup class="reference" data-dcnode-id="2892" id="cite_ref-13"><a data-dcnode-id="2893" href="#cite_note-13"><span data-dcnode-id="2894" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2891" instrument_node=""> Property values are generally subject to review by a board of review or similar body, before which a property owner may contest determinations.</span><sup class="reference" data-dcnode-id="2888" id="cite_ref-14"><a data-dcnode-id="2889" href="#cite_note-14"><span data-dcnode-id="2890" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2887" instrument_node="">
</span></p><p data-dcnode-id="2877"><span data-dcnode-id="2885" instrument_node="">After values are settled, property tax bills or notices are sent to property owners.</span><sup class="reference" data-dcnode-id="2882" id="cite_ref-15"><a data-dcnode-id="2883" href="#cite_note-15"><span data-dcnode-id="2884" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2881" instrument_node=""> Payment times and terms vary widely. If a property owner fails to pay the tax, the taxing jurisdiction has various remedies for collection, in many cases including seizure and sale of the property.  Property taxes constitute a </span><a data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lien" title="Lien"><span data-dcnode-id="2880" instrument_node="">lien</span></a><span data-dcnode-id="2878" instrument_node=""> on the property to which transferees are also subject.
</span></p><span data-dcnode-id="2876" instrument_node="">
</span><h2 data-dcnode-id="2866"><span class="mw-headline" data-dcnode-id="2874" id="Property_subject_to_tax"><span data-dcnode-id="2875" instrument_node="">Property subject to tax</span></span><span class="mw-editsection" data-dcnode-id="2867"><span class="mw-editsection-bracket" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">[</span></span><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Property subject to tax"><span data-dcnode-id="2871" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2845"><span data-dcnode-id="2864" instrument_node="">Nearly all property tax imposing jurisdictions tax </span><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_property" title="Real property"><span data-dcnode-id="2863" instrument_node="">real property</span></a><span data-dcnode-id="2861" instrument_node="">.</span><sup class="reference" data-dcnode-id="2858" id="cite_ref-Hellersteinpage_a_16-0"><a data-dcnode-id="2859" href="#cite_note-Hellersteinpage_a-16"><span data-dcnode-id="2860" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2857" instrument_node="">  This includes land, buildings, and all improvements (often called </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fixture_%28property_law%29" title="Fixture (property law)"><span data-dcnode-id="2856" instrument_node="">fixtures</span></a><span data-dcnode-id="2854" instrument_node="">) that cannot be removed without damage to the property.</span><sup class="reference" data-dcnode-id="2851" id="cite_ref-17"><a data-dcnode-id="2852" href="#cite_note-17"><span data-dcnode-id="2853" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2850" instrument_node="">  Taxed property includes homes, farms, business premises, and most other real property.  Many jurisdictions also tax certain types of other property used in a business.  Property existing and located in the jurisdiction on a particular date is subject to this tax.  This date is often January 1 of each year, but varies among jurisdictions.
Property owned by educational, charitable, and religious organizations is usually exempt.</span><sup class="reference" data-dcnode-id="2847" id="cite_ref-18"><a data-dcnode-id="2848" href="#cite_note-18"><span data-dcnode-id="2849" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2846" instrument_node="">
</span></p><span data-dcnode-id="2844" instrument_node="">
</span><h2 data-dcnode-id="2834"><span class="mw-headline" data-dcnode-id="2842" id="Tax_rates"><span data-dcnode-id="2843" instrument_node="">Tax rates</span></span><span class="mw-editsection" data-dcnode-id="2835"><span class="mw-editsection-bracket" data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">[</span></span><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Tax rates"><span data-dcnode-id="2839" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2813"><a class="mw-redirect" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_rates" title="Tax rates"><span data-dcnode-id="2832" instrument_node="">Tax rates</span></a><span data-dcnode-id="2830" instrument_node=""> vary widely among jurisdictions.</span><sup class="reference" data-dcnode-id="2827" id="cite_ref-19"><a data-dcnode-id="2828" href="#cite_note-19"><span data-dcnode-id="2829" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2826" instrument_node="">  They are generally set by the taxing jurisdiction's governing body.</span><sup class="reference" data-dcnode-id="2823" id="cite_ref-20"><a data-dcnode-id="2824" href="#cite_note-20"><span data-dcnode-id="2825" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2822" instrument_node="">  The method of determining the rate varies widely, but may be constrained under laws of particular states. Property tax is likely the first or second highest tax burden on a capital-intensive business so hundreds of thousands of dollars may be at stake.</span><sup class="reference" data-dcnode-id="2819" id="cite_ref-21"><a data-dcnode-id="2820" href="#cite_note-21"><span data-dcnode-id="2821" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2818" instrument_node=""> In some jurisdictions, property is taxed based on its classification. Classification is the grouping of properties based on similar use.  Examples of classification are residential, commercial, industrial, vacant, and blighted real property. Property classification are used to tax properties at different rates and for different public policy purposes. In Washington D.C. for instance property occupancy is incentivized by taxing residential property at 0.85 percent of assessed value but vacant residential property at 5 percent of assessed value.</span><sup class="reference" data-dcnode-id="2815" id="cite_ref-22"><a data-dcnode-id="2816" href="#cite_note-22"><span data-dcnode-id="2817" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2814" instrument_node="">
</span></p><span data-dcnode-id="2812" instrument_node="">
</span><h3 data-dcnode-id="2802"><span class="mw-headline" data-dcnode-id="2810" id="Rate_or_millage"><span data-dcnode-id="2811" instrument_node="">Rate or millage</span></span><span class="mw-editsection" data-dcnode-id="2803"><span class="mw-editsection-bracket" data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">[</span></span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Rate or millage"><span data-dcnode-id="2807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2800" instrument_node="">The rate of tax is a percentage of the assessed value of the property subject to tax.  This in some cases is expressed as a "millage" or dollars of tax per thousand dollars of assessed value.</span><sup class="reference" data-dcnode-id="2797" id="cite_ref-23"><a data-dcnode-id="2798" href="#cite_note-23"><span data-dcnode-id="2799" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2796" instrument_node="">
</span></p><span data-dcnode-id="2794" instrument_node="">
</span><h2 data-dcnode-id="2784"><span class="mw-headline" data-dcnode-id="2792" id="Assessment_ratio"><span data-dcnode-id="2793" instrument_node="">Assessment ratio</span></span><span class="mw-editsection" data-dcnode-id="2785"><span class="mw-editsection-bracket" data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">[</span></span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Assessment ratio"><span data-dcnode-id="2789" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2783" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2782" instrument_node="">Most jurisdictions impose the tax on some stated portion of fair market value, referred to as an assessment ratio.</span><sup class="reference" data-dcnode-id="2779" id="cite_ref-24"><a data-dcnode-id="2780" href="#cite_note-24"><span data-dcnode-id="2781" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2778" instrument_node="">  This ratio may vary depending on the type or use of the property.  The assessment ratio can, in many jurisdictions, be changed from year to year by the taxing jurisdiction's governing body. Changes in tax rate or assessment ratio may have the same practical effect of changing net tax due on a particular property.
</span></p><span data-dcnode-id="2776" instrument_node="">
</span><h2 data-dcnode-id="2766"><span class="mw-headline" data-dcnode-id="2774" id="Valuation"><span data-dcnode-id="2775" instrument_node="">Valuation</span></span><span class="mw-editsection" data-dcnode-id="2767"><span class="mw-editsection-bracket" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">[</span></span><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Valuation"><span data-dcnode-id="2771" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2765" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2759" role="note"><span data-dcnode-id="2762" instrument_node="">Main article: </span><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_estate_appraisal" title="Real estate appraisal"><span data-dcnode-id="2761" instrument_node="">Real estate appraisal</span></a></div><span data-dcnode-id="2758" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2743"><div class="thumbinner" data-dcnode-id="2744" style="width:172px;"><a class="image" data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A19237_TaxFoundation_v2.gif"><img alt="" class="thumbimage" data-dcnode-id="2757" data-file-height="798" data-file-width="504" decoding="async" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/69/19237_TaxFoundation_v2.gif/170px-19237_TaxFoundation_v2.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/69/19237_TaxFoundation_v2.gif/255px-19237_TaxFoundation_v2.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/69/19237_TaxFoundation_v2.gif/340px-19237_TaxFoundation_v2.gif 2x" width="170"></a><span data-dcnode-id="2755" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2745"><div class="magnify" data-dcnode-id="2753"><a class="internal" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A19237_TaxFoundation_v2.gif" title="Enlarge"></a></div><span data-dcnode-id="2752" instrument_node="">Composition of state and local tax revenues by </span><a class="mw-redirect" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sales_tax_in_the_United_States" title="Sales tax in the United States"><span data-dcnode-id="2751" instrument_node="">sales taxes</span></a><span data-dcnode-id="2749" instrument_node=""> (brown), property taxes (white), licenses and other fees (grey), individual and corporate </span><a class="mw-redirect" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_income_taxes" title="State income taxes"><span data-dcnode-id="2748" instrument_node="">income taxes</span></a><span data-dcnode-id="2746" instrument_node=""> (green) in 2007.</span></div></div></div><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2741" instrument_node="">Determining the value of property is a critical aspect of property taxation, as such value determines the amount of tax due.  Various techniques may be used to determine value.  Except in the case of property recently sold, valuation has some inherently subjective aspects.  Values may change over time, and many states require taxing jurisdictions to redetermine values every three or four years.  The value of property is often determined based on current use of the property, rather than potential uses.</span><sup class="reference" data-dcnode-id="2738" id="cite_ref-TexasBasics_25-0"><a data-dcnode-id="2739" href="#cite_note-TexasBasics-25"><span data-dcnode-id="2740" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2737" instrument_node="">  Property values are determined at a particular </span><b data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">valuation date</span></b><span data-dcnode-id="2734" instrument_node=""> for each jurisdiction, which varies widely.
</span></p><span data-dcnode-id="2732" instrument_node="">
</span><h3 data-dcnode-id="2722"><span class="mw-headline" data-dcnode-id="2730" id="Who_determines_value"><span data-dcnode-id="2731" instrument_node="">Who determines value</span></span><span class="mw-editsection" data-dcnode-id="2723"><span class="mw-editsection-bracket" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">[</span></span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Who determines value"><span data-dcnode-id="2727" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2720" instrument_node="">Property owners may make a declaration of the value of property they own to a taxing authority.  This is often referred to as rendition.</span><sup class="reference" data-dcnode-id="2717" id="cite_ref-26"><a data-dcnode-id="2718" href="#cite_note-26"><span data-dcnode-id="2719" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2716" instrument_node="">  The taxing authority may accept this value or make its own determination of value.  The value determinations are generally made by a </span><b data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">tax assessor</span></b><span data-dcnode-id="2713" instrument_node=""> for the taxing authority.  Some states require uniform values to be determined for each particular property.
</span></p><span data-dcnode-id="2711" instrument_node="">
</span><h3 data-dcnode-id="2701"><span class="mw-headline" data-dcnode-id="2709" id="Market_value"><span data-dcnode-id="2710" instrument_node="">Market value</span></span><span class="mw-editsection" data-dcnode-id="2702"><span class="mw-editsection-bracket" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">[</span></span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Market value"><span data-dcnode-id="2706" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2699" instrument_node="">Property values are generally based on </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_market_value" title="Fair market value"><span data-dcnode-id="2698" instrument_node="">fair market value</span></a><span data-dcnode-id="2696" instrument_node=""> of the property on the valuation date.  Fair market value has been defined as that price a willing and informed purchaser would pay to an unrelated willing and informed seller where neither party is under compulsion to act.  Sale of the particular property between unrelated persons generally conclusively establishes fair market value on the date of sale.  Thus, a recent sale of the same property provides good evidence of market value.  Where there has been no recent sale, other techniques must be used to determine market value.
</span></p><span data-dcnode-id="2694" instrument_node="">
</span><h3 data-dcnode-id="2684"><span class="mw-headline" data-dcnode-id="2692" id="Assessed_value"><span data-dcnode-id="2693" instrument_node="">Assessed value</span></span><span class="mw-editsection" data-dcnode-id="2685"><span class="mw-editsection-bracket" data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">[</span></span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Assessed value"><span data-dcnode-id="2689" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2682" instrument_node="">Many jurisdictions impose tax on a value that is only a portion of market value.  This assessed value is the market value times an assessment ratio.</span><sup class="reference" data-dcnode-id="2679" id="cite_ref-Systempage_27-0"><a data-dcnode-id="2680" href="#cite_note-Systempage-27"><span data-dcnode-id="2681" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2678" instrument_node="">  Assessment ratios are often set by local taxing jurisdictions.  However, some states impose constraints on the assessment ratios used by taxing jurisdictions within the state.</span><sup class="reference" data-dcnode-id="2675" id="cite_ref-Systempage_27-1"><a data-dcnode-id="2676" href="#cite_note-Systempage-27"><span data-dcnode-id="2677" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2674" instrument_node="">  Some such restrictions vary by type or use of property, and may vary by jurisdiction within the state.  Some states impose restrictions on the rate at which assessed value may increase.</span><sup class="reference" data-dcnode-id="2671" id="cite_ref-28"><a data-dcnode-id="2672" href="#cite_note-28"><span data-dcnode-id="2673" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2670" instrument_node="">
</span></p><span data-dcnode-id="2668" instrument_node="">
</span><h3 data-dcnode-id="2658"><span class="mw-headline" data-dcnode-id="2666" id="Equalization_among_jurisdictions"><span data-dcnode-id="2667" instrument_node="">Equalization among jurisdictions</span></span><span class="mw-editsection" data-dcnode-id="2659"><span class="mw-editsection-bracket" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">[</span></span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Equalization among jurisdictions"><span data-dcnode-id="2663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2657" instrument_node="">
</span><link data-dcnode-id="2656" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2652" role="note"><span data-dcnode-id="2655" instrument_node="">Main article: </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_tax_equalization" title="Property tax equalization"><span data-dcnode-id="2654" instrument_node="">Property tax equalization</span></a></div><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2650" instrument_node="">Many states require that multiple jurisdictions taxing the same property must use the same market value.</span><sup class="reference" data-dcnode-id="2647" id="cite_ref-29"><a data-dcnode-id="2648" href="#cite_note-29"><span data-dcnode-id="2649" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2646" instrument_node="">  Generally, such state provides a </span><b data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">board of equalization</span></b><span data-dcnode-id="2643" instrument_node=""> or similar body to determine values in cases of disputes between jurisdictions.</span><sup class="reference" data-dcnode-id="2640" id="cite_ref-30"><a data-dcnode-id="2641" href="#cite_note-30"><span data-dcnode-id="2642" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2639" instrument_node="">
</span></p><span data-dcnode-id="2637" instrument_node="">
</span><h3 data-dcnode-id="2627"><span class="mw-headline" data-dcnode-id="2635" id="Valuation_techniques"><span data-dcnode-id="2636" instrument_node="">Valuation techniques</span></span><span class="mw-editsection" data-dcnode-id="2628"><span class="mw-editsection-bracket" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">[</span></span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Valuation techniques"><span data-dcnode-id="2632" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2625" instrument_node="">Tax assessors may use a variety of techniques for determining the value of property that was not recently sold.</span><sup class="reference" data-dcnode-id="2622" id="cite_ref-TexasBasics_25-1"><a data-dcnode-id="2623" href="#cite_note-TexasBasics-25"><span data-dcnode-id="2624" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2621" instrument_node="">  Determining which technique to use and how to apply it inherently involves judgment.
</span></p><span data-dcnode-id="2619" instrument_node="">
</span><h4 data-dcnode-id="2609"><span class="mw-headline" data-dcnode-id="2617" id="Comparable_sales"><span data-dcnode-id="2618" instrument_node="">Comparable sales</span></span><span class="mw-editsection" data-dcnode-id="2610"><span class="mw-editsection-bracket" data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">[</span></span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Comparable sales"><span data-dcnode-id="2614" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2607" instrument_node="">Values may be determined based on recent sales of comparable property.</span><sup class="reference" data-dcnode-id="2604" id="cite_ref-31"><a data-dcnode-id="2605" href="#cite_note-31"><span data-dcnode-id="2606" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2603" instrument_node="">  The value of most homes is usually determined based on sales of comparable homes in the immediate area.  Valuation adjustments may be necessary to achieve comparability.  Among the factors considered in determining if a property is comparable are:
</span></p><span data-dcnode-id="2601" instrument_node="">
</span><ul data-dcnode-id="2565"><li data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Nature of the property (house, office building, bare land, etc.)</span></li><span data-dcnode-id="2598" instrument_node="">
</span><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Location</span></li><span data-dcnode-id="2595" instrument_node="">
</span><li data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Size</span></li><span data-dcnode-id="2592" instrument_node="">
</span><li data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Use of the property (residential, commercial, farm, etc.)</span></li><span data-dcnode-id="2589" instrument_node="">
</span><li data-dcnode-id="2578"><span data-dcnode-id="2588" instrument_node="">Nature of improvements
</span><ul data-dcnode-id="2579"><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Types and uses of buildings</span></li><span data-dcnode-id="2585" instrument_node="">
</span><li data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Features of the buildings (number of bedrooms, level of amenities, etc.)</span></li><span data-dcnode-id="2582" instrument_node="">
</span><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Age of improvements</span></li></ul></li><span data-dcnode-id="2577" instrument_node="">
</span><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Desirability of the property (view, proximity to schools, type of access, nearby detracting features, etc.)</span></li><span data-dcnode-id="2574" instrument_node="">
</span><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Restrictions on the property (easements, building code restrictions, physical restrictions, etc.)</span></li><span data-dcnode-id="2571" instrument_node="">
</span><li data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Utility of the property (fertility of land, drainage or lack thereof, environmental issues, etc.)</span></li><span data-dcnode-id="2568" instrument_node="">
</span><li data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">General economic conditions</span></li></ul><span data-dcnode-id="2564" instrument_node="">
</span><h4 data-dcnode-id="2554"><span class="mw-headline" data-dcnode-id="2562" id="Cost"><span data-dcnode-id="2563" instrument_node="">Cost</span></span><span class="mw-editsection" data-dcnode-id="2555"><span class="mw-editsection-bracket" data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">[</span></span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Cost"><span data-dcnode-id="2559" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2552" instrument_node="">Where recent comparable property sales are not available, a cost based approach may be used.  In this approach, the original or replacement cost of a property is reduced by an allowance for decline in value (depreciation) of improvements.</span><sup class="reference" data-dcnode-id="2549" id="cite_ref-Systempage_27-2"><a data-dcnode-id="2550" href="#cite_note-Systempage-27"><span data-dcnode-id="2551" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2548" instrument_node="">  In some jurisdictions, the amount of depreciation may be limited by statute.  Where original cost is used, it may be adjusted for inflation or increases or decreases in cost of constructing improvements.  Replacement cost may be determined by estimates of construction costs.
</span></p><span data-dcnode-id="2546" instrument_node="">
</span><h4 data-dcnode-id="2536"><span class="mw-headline" data-dcnode-id="2544" id="Income"><span data-dcnode-id="2545" instrument_node="">Income</span></span><span class="mw-editsection" data-dcnode-id="2537"><span class="mw-editsection-bracket" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">[</span></span><a data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Income"><span data-dcnode-id="2541" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2534" instrument_node="">An alternative valuation may be used for income producing property based on economic concepts.  Using the income approach, value is determined based on present values expected income streams from the property.</span><sup class="reference" data-dcnode-id="2531" id="cite_ref-Systempage_27-3"><a data-dcnode-id="2532" href="#cite_note-Systempage-27"><span data-dcnode-id="2533" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2530" instrument_node="">  Selection of an appropriate discount rate in determining present values is a key judgmental factor influencing valuation under this approach.
</span></p><span data-dcnode-id="2528" instrument_node="">
</span><h3 data-dcnode-id="2518"><span class="mw-headline" data-dcnode-id="2526" id="Special_use_values"><span data-dcnode-id="2527" instrument_node="">Special use values</span></span><span class="mw-editsection" data-dcnode-id="2519"><span class="mw-editsection-bracket" data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">[</span></span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Special use values"><span data-dcnode-id="2523" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2507"><span data-dcnode-id="2516" instrument_node="">Most taxing jurisdictions provide that property used in any of several manners is subject to special valuation procedures.</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-32"><a data-dcnode-id="2514" href="#cite_note-32"><span data-dcnode-id="2515" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2512" instrument_node="">  This is commonly applied to property used for farming, forestry, or other uses common in the jurisdiction.  Some jurisdictions value property at its "highest and best use", with some of these providing exceptions for homes or agricultural land.</span><sup class="reference" data-dcnode-id="2509" id="cite_ref-33"><a data-dcnode-id="2510" href="#cite_note-33"><span data-dcnode-id="2511" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2508" instrument_node="">  Special valuation issues vary widely among jurisdictions.
</span></p><span data-dcnode-id="2506" instrument_node="">
</span><h3 data-dcnode-id="2496"><span class="mw-headline" data-dcnode-id="2504" id="Revaluation"><span data-dcnode-id="2505" instrument_node="">Revaluation</span></span><span class="mw-editsection" data-dcnode-id="2497"><span class="mw-editsection-bracket" data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">[</span></span><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Revaluation"><span data-dcnode-id="2501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2494" instrument_node="">All taxing jurisdictions recognize that values of property may change over time.  Thus, values must be redetermined periodically.  Many states and localities require that the value of property be redetermined at three or four year intervals.</span><sup class="reference" data-dcnode-id="2491" id="cite_ref-34"><a data-dcnode-id="2492" href="#cite_note-34"><span data-dcnode-id="2493" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2490" instrument_node="">  Such revaluation may follow valuation principles above, or may use mass valuation techniques.
</span></p><span data-dcnode-id="2488" instrument_node="">
</span><h3 data-dcnode-id="2478"><span class="mw-headline" data-dcnode-id="2486" id="Limits_on_increases"><span data-dcnode-id="2487" instrument_node="">Limits on increases</span></span><span class="mw-editsection" data-dcnode-id="2479"><span class="mw-editsection-bracket" data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">[</span></span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Limits on increases"><span data-dcnode-id="2483" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2476" instrument_node="">Some jurisdictions have set limits on how much property values may be increased from year to year for property tax purposes.</span><sup class="reference" data-dcnode-id="2473" id="cite_ref-35"><a data-dcnode-id="2474" href="#cite_note-35"><span data-dcnode-id="2475" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2472" instrument_node="">  These limits may be applied yearly or cumulatively, depending on the jurisdiction's rules.
</span></p><span data-dcnode-id="2470" instrument_node="">
</span><h2 data-dcnode-id="2460"><span class="mw-headline" data-dcnode-id="2468" id="Assessment_process"><span data-dcnode-id="2469" instrument_node="">Assessment process</span></span><span class="mw-editsection" data-dcnode-id="2461"><span class="mw-editsection-bracket" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">[</span></span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D18" title="Edit section: Assessment process"><span data-dcnode-id="2465" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2458" instrument_node="">The assessment process varies widely by jurisdiction as to procedure and timing.  In many states, the process of assessment and collection may be viewed as a two-year process, where values are determined in the first year and tax assessed and paid in the second.</span><sup class="reference" data-dcnode-id="2455" id="cite_ref-36"><a data-dcnode-id="2456" href="#cite_note-36"><span data-dcnode-id="2457" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2454" instrument_node="">  Most jurisdictions encourage property owners to declare the value of their property at the start of the assessment process.  Property owners in all jurisdictions are given rights to appeal taxing authority determinations, but such rights vary widely.
</span></p><span data-dcnode-id="2452" instrument_node="">
</span><h3 data-dcnode-id="2442"><span class="mw-headline" data-dcnode-id="2450" id="Valuation_by_assessor"><span data-dcnode-id="2451" instrument_node="">Valuation by assessor</span></span><span class="mw-editsection" data-dcnode-id="2443"><span class="mw-editsection-bracket" data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">[</span></span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D19" title="Edit section: Valuation by assessor"><span data-dcnode-id="2447" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2440" instrument_node="">Jurisdictions imposing property tax uniformly charge some official with determining value of property subject to tax by the jurisdiction.</span><sup class="reference" data-dcnode-id="2437" id="cite_ref-37"><a data-dcnode-id="2438" href="#cite_note-37"><span data-dcnode-id="2439" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2436" instrument_node="">  This official may be an employee or contractor to the taxing government, and is generally referred to as the </span><b data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">tax assessor</span></b><span data-dcnode-id="2433" instrument_node=""> in most jurisdictions.  Some taxing jurisdictions may share a common tax assessor for some or all property within the jurisdictions, especially when the jurisdictions overlap.
</span></p><span data-dcnode-id="2431" instrument_node="">
</span><h3 data-dcnode-id="2421"><span class="mw-headline" data-dcnode-id="2429" id="Notification_to_owner"><span data-dcnode-id="2430" instrument_node="">Notification to owner</span></span><span class="mw-editsection" data-dcnode-id="2422"><span class="mw-editsection-bracket" data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">[</span></span><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D20" title="Edit section: Notification to owner"><span data-dcnode-id="2426" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2419" instrument_node="">Following determination of value, tax assessors are generally required to notify the property owner(s) of the value so determined.</span><sup class="reference" data-dcnode-id="2416" id="cite_ref-38"><a data-dcnode-id="2417" href="#cite_note-38"><span data-dcnode-id="2418" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2415" instrument_node=""> Procedures vary by jurisdiction. In Louisiana, no formal notice is required; instead, the assessor "opens" the books to allow property owners to view the valuations.</span><sup class="reference" data-dcnode-id="2412" id="cite_ref-39"><a data-dcnode-id="2413" href="#cite_note-39"><span data-dcnode-id="2414" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2411" instrument_node=""> Texas and some other jurisdictions also require that the notice include very specific items, and such notice may cover multiple taxing jurisdictions.  Some jurisdictions provide that notification is made by publishing a list of properties and values in a local newspaper.</span><sup class="reference" data-dcnode-id="2408" id="cite_ref-40"><a data-dcnode-id="2409" href="#cite_note-40"><span data-dcnode-id="2410" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2407" instrument_node="">
</span></p><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">In some jurisdictions, such notification is required only if the value increases by more than a certain percentage.  In some jurisdictions, the notification of value may also constitute a tax bill or assessment.  Generally, notification of the owner starts the limited period during which the owner may contest the value.
</span></p><span data-dcnode-id="2403" instrument_node="">
</span><h3 data-dcnode-id="2393"><span class="mw-headline" data-dcnode-id="2401" id="Review"><span data-dcnode-id="2402" instrument_node="">Review</span></span><span class="mw-editsection" data-dcnode-id="2394"><span class="mw-editsection-bracket" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">[</span></span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D21" title="Edit section: Review"><span data-dcnode-id="2398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2391" instrument_node="">Owners of property are nearly always entitled to discuss valuations with the tax assessor, and such discussions may result in changes in the assessor's valuation.</span><sup class="reference" data-dcnode-id="2388" id="cite_ref-41"><a data-dcnode-id="2389" href="#cite_note-41"><span data-dcnode-id="2390" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2387" instrument_node="">  Many jurisdictions provide for a review of value determinations.  Such review is often done by a board of review, often composed of residents of the jurisdiction who are not otherwise associated with the jurisdiction's government.</span><sup class="reference" data-dcnode-id="2384" id="cite_ref-42"><a data-dcnode-id="2385" href="#cite_note-42"><span data-dcnode-id="2386" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2383" instrument_node="">  In addition, some jurisdictions and some states provide for additional review bodies.</span><sup class="reference" data-dcnode-id="2380" id="cite_ref-43"><a data-dcnode-id="2381" href="#cite_note-43"><span data-dcnode-id="2382" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2379" instrument_node="">
</span></p><span data-dcnode-id="2377" instrument_node="">
</span><h3 data-dcnode-id="2367"><span class="mw-headline" data-dcnode-id="2375" id="Protest"><span data-dcnode-id="2376" instrument_node="">Protest</span></span><span class="mw-editsection" data-dcnode-id="2368"><span class="mw-editsection-bracket" data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">[</span></span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D22" title="Edit section: Protest"><span data-dcnode-id="2372" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2365" instrument_node="">Nearly all jurisdiction provide for a mechanism for contesting the assessor's determination of value.  Such mechanisms vary widely.</span><sup class="reference" data-dcnode-id="2362" id="cite_ref-44"><a data-dcnode-id="2363" href="#cite_note-44"><span data-dcnode-id="2364" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2361" instrument_node="">
</span></p><span data-dcnode-id="2359" instrument_node="">
</span><h3 data-dcnode-id="2349"><span class="mw-headline" data-dcnode-id="2357" id="Judicial_appeal"><span data-dcnode-id="2358" instrument_node="">Judicial appeal</span></span><span class="mw-editsection" data-dcnode-id="2350"><span class="mw-editsection-bracket" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">[</span></span><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D23" title="Edit section: Judicial appeal"><span data-dcnode-id="2354" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2347" instrument_node="">All jurisdictions levying property tax must allow property owners to go to court to contest valuation and taxes.</span><sup class="reference" data-dcnode-id="2344" id="cite_ref-45"><a data-dcnode-id="2345" href="#cite_note-45"><span data-dcnode-id="2346" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2343" instrument_node="">  Procedures for such judicial appeal vary widely.  Some jurisdictions prohibit judicial appeal until administrative appeals are exhausted.  Some permit binding arbitration.</span><sup class="reference" data-dcnode-id="2340" id="cite_ref-46"><a data-dcnode-id="2341" href="#cite_note-46"><span data-dcnode-id="2342" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2339" instrument_node="">
</span></p><span data-dcnode-id="2337" instrument_node="">
</span><h3 data-dcnode-id="2327"><span class="mw-headline" data-dcnode-id="2335" id="Levy_of_tax"><span data-dcnode-id="2336" instrument_node="">Levy of tax</span></span><span class="mw-editsection" data-dcnode-id="2328"><span class="mw-editsection-bracket" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">[</span></span><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D24" title="Edit section: Levy of tax"><span data-dcnode-id="2332" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2325" instrument_node="">Tax is levied at the tax rate and assessment ratio applicable for the year.</span><sup class="reference" data-dcnode-id="2322" id="cite_ref-47"><a data-dcnode-id="2323" href="#cite_note-47"><span data-dcnode-id="2324" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2321" instrument_node="">  Taxing jurisdictions levy tax on property following a preliminary or final determination of value.  Property taxes in the United States generally are due only if the taxing jurisdiction has levied or billed the tax.  The form of levy or billing varies, but is often accomplished by mailing a tax bill to the property owner or mortgage company.</span><sup class="reference" data-dcnode-id="2318" id="cite_ref-48"><a data-dcnode-id="2319" href="#cite_note-48"><span data-dcnode-id="2320" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2317" instrument_node="">
</span></p><span data-dcnode-id="2315" instrument_node="">
</span><h2 data-dcnode-id="2305"><span class="mw-headline" data-dcnode-id="2313" id="Exemptions_and_incentives"><span data-dcnode-id="2314" instrument_node="">Exemptions and incentives</span></span><span class="mw-editsection" data-dcnode-id="2306"><span class="mw-editsection-bracket" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">[</span></span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D25" title="Edit section: Exemptions and incentives"><span data-dcnode-id="2310" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2303" instrument_node="">Taxing jurisdictions provide a wide variety of methods a property owner may use to reduce tax.  Nearly all jurisdictions provide a </span><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homestead_exemption" title="Homestead exemption"><span data-dcnode-id="2302" instrument_node="">homestead exemption</span></a><span data-dcnode-id="2300" instrument_node=""> reducing the taxable value, and thus tax, of an individual's home.</span><sup class="reference" data-dcnode-id="2297" id="cite_ref-49"><a data-dcnode-id="2298" href="#cite_note-49"><span data-dcnode-id="2299" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2296" instrument_node=""> Many provide additional exemptions for veterans.</span><sup class="reference" data-dcnode-id="2293" id="cite_ref-50"><a data-dcnode-id="2294" href="#cite_note-50"><span data-dcnode-id="2295" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2292" instrument_node="">  Taxing jurisdictions may also offer temporary or permanent full or partial exemptions from property taxes, often as an incentive for a particular business to locate its premises within the jurisdiction.</span><sup class="reference" data-dcnode-id="2289" id="cite_ref-51"><a data-dcnode-id="2290" href="#cite_note-51"><span data-dcnode-id="2291" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2288" instrument_node="">  Some jurisdictions provide broad exemptions from property taxes for businesses located within certain areas, such as </span><a class="mw-redirect" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_Enterprise_Zones" title="Urban Enterprise Zones"><span data-dcnode-id="2287" instrument_node="">enterprise zones</span></a><span data-dcnode-id="2285" instrument_node="">.</span><sup class="reference" data-dcnode-id="2282" id="cite_ref-52"><a data-dcnode-id="2283" href="#cite_note-52"><span data-dcnode-id="2284" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2281" instrument_node="">
</span></p><p data-dcnode-id="2270"><span data-dcnode-id="2279" instrument_node="">The largest property tax exemption is the exemption for registered non-profit organizations; all 50 states fully exempt these organizations from state and local property taxes with a 2009 study estimating the exemption's forgone tax revenues range from </span><span class="nowrap" data-dcnode-id="2276"><span data-dcnode-id="2278" data-sort-value="7010170000000000000♠"></span><span data-dcnode-id="2277" instrument_node="">$17–32&nbsp;billion</span></span><span data-dcnode-id="2275" instrument_node=""> per year.</span><sup class="reference" data-dcnode-id="2272" id="cite_ref-53"><a data-dcnode-id="2273" href="#cite_note-53"><span data-dcnode-id="2274" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2271" instrument_node="">
</span></p><p data-dcnode-id="2258"><span data-dcnode-id="2269" instrument_node="">Exemptions can be quite substantial. In New York City alone, an Independent Budget Office study found that religious institutions would have been taxed </span><span data-dcnode-id="2267" style="white-space: nowrap"><span data-dcnode-id="2268" instrument_node="">$627M</span></span><span data-dcnode-id="2266" instrument_node=""> yearly without such exemptions; all exempt groups avoided paying a combined </span><span data-dcnode-id="2264" style="white-space: nowrap"><span data-dcnode-id="2265" instrument_node="">$13 billion</span></span><span data-dcnode-id="2263" instrument_node=""> in the fiscal year of 2012 (1 July 2011 to 30 June 2012).</span><sup class="reference" data-dcnode-id="2260" id="cite_ref-54"><a data-dcnode-id="2261" href="#cite_note-54"><span data-dcnode-id="2262" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2259" instrument_node="">
</span></p><span data-dcnode-id="2257" instrument_node="">
</span><h2 data-dcnode-id="2247"><span class="mw-headline" data-dcnode-id="2255" id="Payment"><span data-dcnode-id="2256" instrument_node="">Payment</span></span><span class="mw-editsection" data-dcnode-id="2248"><span class="mw-editsection-bracket" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">[</span></span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D26" title="Edit section: Payment"><span data-dcnode-id="2252" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2245" instrument_node="">Time and manner of payment of property taxes varies widely.</span><sup class="reference" data-dcnode-id="2242" id="cite_ref-55"><a data-dcnode-id="2243" href="#cite_note-55"><span data-dcnode-id="2244" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2241" instrument_node="">  Property taxes in many jurisdictions are due in a single payment by January 1.  Many jurisdictions provide for payment in multiple installments.</span><sup class="reference" data-dcnode-id="2238" id="cite_ref-56"><a data-dcnode-id="2239" href="#cite_note-56"><span data-dcnode-id="2240" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2237" instrument_node=""> In some jurisdictions, the first installment payment is based on prior year tax.  Payment is generally required by cash or check delivered or mailed to the taxing jurisdiction.
</span></p><span data-dcnode-id="2235" instrument_node="">
</span><h2 data-dcnode-id="2225"><span class="mw-headline" data-dcnode-id="2233" id="Liens_and_seizures"><span data-dcnode-id="2234" instrument_node="">Liens and seizures</span></span><span class="mw-editsection" data-dcnode-id="2226"><span class="mw-editsection-bracket" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">[</span></span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D27" title="Edit section: Liens and seizures"><span data-dcnode-id="2230" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2223" instrument_node="">Property taxes generally </span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attachment_%28law%29" title="Attachment (law)"><span data-dcnode-id="2222" instrument_node="">attach</span></a><span data-dcnode-id="2220" instrument_node=""> to the property; that is, they become an encumbrance on the property which the current and future owners must satisfy.</span><sup class="reference" data-dcnode-id="2217" id="cite_ref-Systempage_a_57-0"><a data-dcnode-id="2218" href="#cite_note-Systempage_a-57"><span data-dcnode-id="2219" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2216" instrument_node="">  This attachment, or lien, generally happens automatically without further action of the taxing authority.</span><sup class="reference" data-dcnode-id="2213" id="cite_ref-Systempage_a_57-1"><a data-dcnode-id="2214" href="#cite_note-Systempage_a-57"><span data-dcnode-id="2215" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2212" instrument_node="">  The lien generally is removed automatically upon payment of the tax.
</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">If the tax is not paid within a specified period of time (including additional interest, penalties, and costs), a </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_sale" title="Tax sale"><span data-dcnode-id="2209" instrument_node="">tax sale</span></a><span data-dcnode-id="2207" instrument_node=""> is held, which may result in either 1) the actual sale of a property, or 2) a lien sold to a third party, who (after another specified period of time) may take action to claim the property, or force a later sale to redeem the lien.
</span></p><span data-dcnode-id="2205" instrument_node="">
</span><h2 data-dcnode-id="2195"><span class="mw-headline" data-dcnode-id="2203" id="Attachment_date"><span data-dcnode-id="2204" instrument_node="">Attachment date</span></span><span class="mw-editsection" data-dcnode-id="2196"><span class="mw-editsection-bracket" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">[</span></span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D28" title="Edit section: Attachment date"><span data-dcnode-id="2200" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2193" instrument_node="">The tax lien attaches to the property</span><sup class="reference" data-dcnode-id="2190" id="cite_ref-TexasBasics_a_58-0"><a data-dcnode-id="2191" href="#cite_note-TexasBasics_a-58"><span data-dcnode-id="2192" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2189" instrument_node=""> at a specific date, generally the date the tax liability becomes enforceable.</span><sup class="reference" data-dcnode-id="2186" id="cite_ref-59"><a data-dcnode-id="2187" href="#cite_note-59"><span data-dcnode-id="2188" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2185" instrument_node="">  This date, known as the </span><b data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">attachment date</span></b><span data-dcnode-id="2182" instrument_node="">, varies by state, and in some states by local jurisdiction.
</span></p><span data-dcnode-id="2180" instrument_node="">
</span><h3 data-dcnode-id="2170"><span class="mw-headline" data-dcnode-id="2178" id="Delinquency"><span data-dcnode-id="2179" instrument_node="">Delinquency</span></span><span class="mw-editsection" data-dcnode-id="2171"><span class="mw-editsection-bracket" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">[</span></span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D29" title="Edit section: Delinquency"><span data-dcnode-id="2175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2168" instrument_node="">Where the property owner does not pay tax by the due date, the taxing authority may assess penalties and interest.</span><sup class="reference" data-dcnode-id="2165" id="cite_ref-60"><a data-dcnode-id="2166" href="#cite_note-60"><span data-dcnode-id="2167" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2164" instrument_node="">  The amount, timing, and procedures vary widely.  Generally, the penalty and interest are enforceable in the same manner as the tax, and attach to the property.
</span></p><span data-dcnode-id="2162" instrument_node="">
</span><h3 data-dcnode-id="2152"><span class="mw-headline" data-dcnode-id="2160" id="Seizure_and_sale"><span data-dcnode-id="2161" instrument_node="">Seizure and sale</span></span><span class="mw-editsection" data-dcnode-id="2153"><span class="mw-editsection-bracket" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">[</span></span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D30" title="Edit section: Seizure and sale"><span data-dcnode-id="2157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2150" instrument_node="">Where the property owner fails to pay tax, the taxing authority may act to enforce its lien. Enforcement procedures vary by state.  In some states, the lien may be sold by the taxing authority to a third party, who can then attempt collection.</span><sup class="reference" data-dcnode-id="2147" id="cite_ref-61"><a data-dcnode-id="2148" href="#cite_note-61"><span data-dcnode-id="2149" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2146" instrument_node="">  In most states, the taxing authority can seize the property and offer it for sale, generally at a public auction.</span><sup class="reference" data-dcnode-id="2143" id="cite_ref-TexasBasics_a_58-1"><a data-dcnode-id="2144" href="#cite_note-TexasBasics_a-58"><span data-dcnode-id="2145" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2142" instrument_node="">  In some states, rights acquired in such sale may be limited.
</span></p><span data-dcnode-id="2140" instrument_node="">
</span><h2 data-dcnode-id="2130"><span class="mw-headline" data-dcnode-id="2138" id="Tax_administrations"><span data-dcnode-id="2139" instrument_node="">Tax administrations</span></span><span class="mw-editsection" data-dcnode-id="2131"><span class="mw-editsection-bracket" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">[</span></span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProperty_tax_in_the_United_States%26action%3Dedit%26section%3D31" title="Edit section: Tax administrations"><span data-dcnode-id="2135" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2128" instrument_node="">Property taxes are generally administered separately by each jurisdiction imposing property tax,</span><sup class="reference" data-dcnode-id="2125" id="cite_ref-Systempage_b_12-1"><a data-dcnode-id="2126" href="#cite_note-Systempage_b-12"><span data-dcnode-id="2127" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2124" instrument_node=""> though some jurisdictions may share a common property tax administration.  Often the administration of the taxes is conducted from the taxing jurisdiction's administrative offices (e.g., town hall).  The form and organization varies widely.
</span></p><span data-dcnode-id="2122" instrument_node="">
