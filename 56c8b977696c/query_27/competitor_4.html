</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1044" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1045" instrument_node="">
A repatriation tax holiday that is part of the recent tax changes could be a benefit to some companies and some individuals holding profits overseas, but it also means they must pay tax on cash and other assets now held abroad. The 2017 Tax Cuts and Jobs Act allows companies to repatriate profits they hold in foreign countries. Since U.S. businesses have an estimated $2.6 trillion in cash and other assets outside the U.S., the flow of these assets into the U.S. could help stimulate the economy.
</span></p><span data-dcnode-id="1043" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1032" id="mntl-sc-block_1-0-2"><div class="comp mntl-block" data-dcnode-id="1033" id="mntl-block_10-0"><span data-dcnode-id="1042" instrument_node="">

</span></p><span data-dcnode-id="1028" instrument_node="">

This article discusses how the repatriation tax works and how it affects many U.S. corporations, corporate shareholders, and others who do business outside the U.S. The tax was due for the 2017 tax year, payable by April 17, 2018.
</span></p><span data-dcnode-id="1013" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1002" id="mntl-sc-block_1-0-8"><div class="comp mntl-block" data-dcnode-id="1003" id="mntl-block_12-0"><span data-dcnode-id="1012" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1000" id="toc-repatriation-tax"></span><span data-dcnode-id="999" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="994" id="mntl-sc-block_1-0-9"><span data-dcnode-id="998" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node=""> Repatriation Tax </span></span><span data-dcnode-id="995" instrument_node=""> </span></h2><span data-dcnode-id="993" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="991" id="mntl-sc-block_1-0-11"><span data-dcnode-id="992" instrument_node="">
Repatriation in general means bringing a person or an asset back into a country. A repatriation tax is a tax on money repatriated or brought into the country. A corporation that does business in a foreign country may be keeping profits within that country in order to avoid U.S. taxes. The repatriation tax part of the 2017 tax law is considered a tax holiday because it is a one-time reduction in the tax level for special circumstances.
</span></p><span data-dcnode-id="990" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="989" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="988" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="983" id="mntl-sc-block_1-0-14"><span data-dcnode-id="987" instrument_node="">
The IRS calls this a t</span><a data-component="link" data-dcnode-id="985" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/section-965-transition-tax" rel="noopener" target="_blank"><span data-dcnode-id="986" instrument_node="">ransition tax</span></a><span data-dcnode-id="984" instrument_node=""> and says this tax is due by "U.S. shareholders," including
</span></p><span data-dcnode-id="982" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="981" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="980" instrument_node="">
</span><blockquote class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="978" id="mntl-sc-block_1-0-17"><span data-dcnode-id="979" instrument_node="">
"...domestic corporations, but could also include other U.S. persons, such as individuals, S corporations, partnerships, estate, trusts, cooperatives, REITS, RICs and tax-exempt organizations."
</span></blockquote><span data-dcnode-id="977" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="976" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="975" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="974" id="toc-repatriation-tax-holiday"></span><span data-dcnode-id="973" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="968" id="mntl-sc-block_1-0-19"><span data-dcnode-id="972" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node=""> Repatriation Tax Holiday </span></span><span data-dcnode-id="969" instrument_node=""> </span></h2><span data-dcnode-id="967" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="962" id="mntl-sc-block_1-0-21"><span data-dcnode-id="966" instrument_node="">
The new 2017 tax law proposes changing the laws for taxing profits of companies doing business abroad (called </span><a data-component="link" data-dcnode-id="964" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/what-is-a-controlled-foreign-corporation-4157448"><span data-dcnode-id="965" instrument_node="">Controlled Foreign Corporations (CFCs)</span></a><span data-dcnode-id="963" instrument_node="">. These corporations operate overseas and have U.S. shareholders who have 50% or more of the control of that corporation.
</span></p><span data-dcnode-id="961" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="950" id="mntl-sc-block_1-0-22"><div class="comp mntl-block" data-dcnode-id="951" id="mntl-block_13-0"><span data-dcnode-id="960" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="953" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="959" instrument_node="">

</span><div class="wrapper" data-dcnode-id="957" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span></div><span data-dcnode-id="952" instrument_node="">
</span></div></div><span data-dcnode-id="949" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="944" id="mntl-sc-block_1-0-24"><span data-dcnode-id="948" instrument_node="">
Due to the global nature of the economy, many companies do business in multiple countries. Many countries operate on a worldwide tax system that taxes companies that do business abroad and individuals who live and work abroad only when they bring their earnings back to their home country. According to the </span><a data-component="link" data-dcnode-id="946" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/repatriation-tax-holiday-hangover/" rel="noopener" target="_blank"><span data-dcnode-id="947" instrument_node="">Tax Foundation,</span></a><span data-dcnode-id="945" instrument_node=""> this worldwide tax system discourages the flow of profits from companies doing business abroad back into the U.S.
</span></p><span data-dcnode-id="943" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="932" id="mntl-sc-block_1-0-25"><div class="comp mntl-block" data-dcnode-id="933" id="mntl-block_14-0"><span data-dcnode-id="942" instrument_node="">

</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard4-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="937" id="mntl-sc-sticky-billboard-ad_9-0"><span data-dcnode-id="940" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="949c61d9c0dd487ea4003dfc630171d8" data-auction-floor-value="265" data-dcnode-id="939" data-pos="btf3" data-priority="6" data-rtb="true" data-sizes="[[300, 250],[300, 253],[4, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard4"></div><span data-dcnode-id="938" instrument_node="">

</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="926" id="mntl-sc-block_1-0-27"><span data-dcnode-id="930" instrument_node="">
The change in tax law involves a switch in U.S. taxes to a </span><a data-component="link" data-dcnode-id="928" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/territorial-tax-system-oecd-review/" rel="noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">territorial tax system</span></a><span data-dcnode-id="927" instrument_node="">. A territorial tax system exempts businesses from paying tax on offshore income (earned outside the U.S).
</span></p><span data-dcnode-id="925" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="914" id="mntl-sc-block_1-0-28"><div class="comp mntl-block" data-dcnode-id="915" id="mntl-block_15-0"><span data-dcnode-id="924" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard5-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="917" data-height="600" id="billboard5-sticky-dynamic_2-0" style="height: 600px;"><span data-dcnode-id="923" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard5-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="919" id="mntl-sc-sticky-billboard-ad_11-0"><span data-dcnode-id="922" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="8f4aaabfde9542c8b872f941363aae2b" data-auction-floor-value="295" data-dcnode-id="921" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="920" instrument_node="">
</span></div><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span></div></div><span data-dcnode-id="913" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="911" id="mntl-sc-block_1-0-30"><span data-dcnode-id="912" instrument_node="">
The one-time repatriation tax is a first step to this territorial system.
</span></p><span data-dcnode-id="910" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="899" id="mntl-sc-block_1-0-31"><div class="comp mntl-block" data-dcnode-id="900" id="mntl-block_16-0"><span data-dcnode-id="909" instrument_node="">

</span></div><span data-dcnode-id="903" instrument_node="">

</span></div></div><span data-dcnode-id="898" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="893" id="mntl-sc-block_1-0-33"><span data-dcnode-id="897" instrument_node="">
</span><a data-component="link" data-dcnode-id="895" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dividend.com/news/2018/02/26/tax-reform-repatriation-money/" rel="noopener" target="_blank"><span data-dcnode-id="896" instrument_node="">Dividend.com</span></a><span data-dcnode-id="894" instrument_node=""> says,
</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="881" id="mntl-sc-block_1-0-34"><div class="comp mntl-block" data-dcnode-id="882" id="mntl-block_17-0"><span data-dcnode-id="891" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard7-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="884" data-height="600" id="billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="890" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard7-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="886" id="mntl-sc-sticky-billboard-ad_13-0"><span data-dcnode-id="889" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="855808d1f3694da4921a8915b53b56df" data-auction-floor-value="165" data-dcnode-id="888" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="887" instrument_node="">
</span></div><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span></div></div><span data-dcnode-id="880" instrument_node="">
</span><blockquote class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="878" id="mntl-sc-block_1-0-36"><span data-dcnode-id="879" instrument_node="">
The idea is that this lower rate should persuade firms to make the decision to bring this cash home and use it here in the United States for investment rather than have it just sit in an overseas checking account.
</span></blockquote><span data-dcnode-id="877" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="876" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="875" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="874" id="toc-how-the-repatriation-tax-works"></span><span data-dcnode-id="873" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="868" id="mntl-sc-block_1-0-38"><span data-dcnode-id="872" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node=""> How the Repatriation Tax Works </span></span><span data-dcnode-id="869" instrument_node=""> </span></h2><span data-dcnode-id="867" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="862" id="mntl-sc-block_1-0-40"><span data-dcnode-id="866" instrument_node="">
Companies and shareholders repatriating profits (bringing them into the U.S.) pay a one-time tax rate of 15.5% on cash and 8% on equipment, which is lower than the current </span><a data-component="link" data-dcnode-id="864" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/corporate-tax-rates-and-tax-calculation-397647"><span data-dcnode-id="865" instrument_node="">U.S. corporate tax rate </span></a><span data-dcnode-id="863" instrument_node="">of 21%.
</span></p><span data-dcnode-id="861" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="860" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="859" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="857" id="mntl-sc-block_1-0-43"><span data-dcnode-id="858" instrument_node="">
The profits that can be repatriated are post-1986 profits through 2017 that have not already been taxed in the U.S. The tax must be paid by the 2018 tax date, April 17, 2018. But the tax may be paid in installments over an eight-year period.
</span></p><span data-dcnode-id="856" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="855" id="mntl-sc-block_1-0-44"></div><span data-dcnode-id="854" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="853" id="toc-the-effects-of-the-repatriation-tax"></span><span data-dcnode-id="852" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="847" id="mntl-sc-block_1-0-45"><span data-dcnode-id="851" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node=""> The Effects of the Repatriation Tax </span></span><span data-dcnode-id="848" instrument_node=""> </span></h2><span data-dcnode-id="846" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="844" id="mntl-sc-block_1-0-47"><span data-dcnode-id="845" instrument_node="">
The purpose of this holiday is to give incentives to companies repatriating profits they have sitting in overseas accounts, by giving them a break on the taxes.
</span></p><span data-dcnode-id="843" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="842" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="841" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="836" id="mntl-sc-block_1-0-50"><span data-dcnode-id="840" instrument_node="">
This repatriation tax holiday isn't new; a similar tax provision was </span><a data-component="link" data-dcnode-id="838" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2017/04/26/what-happened-the-last-time-companies-got-a-break-on-overseas-profits.html" rel="noopener" target="_blank"><span data-dcnode-id="839" instrument_node="">put into place in 2004 </span></a><span data-dcnode-id="837" instrument_node="">as part of the American Jobs Creation Act. At that time, about $312 billion of corporate cash was brought back into the U.S. at a tax rate of 5.25%. So the tax revenues were a benefit, but this cash was used to pay dividends to stockholders and share buybacks, not to increase capital assets.
</span></p><span data-dcnode-id="835" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="834" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="833" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="828" id="mntl-sc-block_1-0-53"><span data-dcnode-id="832" instrument_node="">
Another effect may be the attempt by U.S. companies to shift taxable profits from the 15% tax category (for cash) to the 8% category (for equipment). This sounds like a good thing because it would mean businesses would be investing in capital, but </span><a data-component="link" data-dcnode-id="830" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-tax-repatriation/corporations-may-dodge-billions-in-u-s-taxes-through-new-loophole-experts-idUSKBN1F035Q" rel="noopener" target="_blank"><span data-dcnode-id="831" instrument_node="">there are some loopholes in this category. </span></a><span data-dcnode-id="829" instrument_node="">
</span></p><span data-dcnode-id="827" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="826" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="825" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="824" id="toc-more-information-from-the-irs"></span><span data-dcnode-id="823" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="818" id="mntl-sc-block_1-0-55"><span data-dcnode-id="822" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node=""> More Information from the IRS </span></span><span data-dcnode-id="819" instrument_node=""> </span></h2><span data-dcnode-id="817" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="809" id="mntl-sc-block_1-0-57"><span data-dcnode-id="816" instrument_node="">
The IRS has issued </span><a data-component="link" data-dcnode-id="814" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-drop/n-18-07.pdf" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">Notice 2018-7</span></a><span data-dcnode-id="813" instrument_node=""> which gives more detailed information on this repatriation tax. The relevant section of the U.S. Tax Code is </span><a data-component="link" data-dcnode-id="811" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/26/965" rel="noopener" target="_blank"><span data-dcnode-id="812" instrument_node="">Section 956</span></a><span data-dcnode-id="810" instrument_node="">.
</span></p><span data-dcnode-id="808" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="807" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="806" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="805" id="toc-if-you-owe-this-tax"></span><span data-dcnode-id="804" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="799" id="mntl-sc-block_1-0-59"><span data-dcnode-id="803" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> If You Owe This Tax </span></span><span data-dcnode-id="800" instrument_node=""> </span></h2><span data-dcnode-id="798" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="793" id="mntl-sc-block_1-0-61"><span data-dcnode-id="797" instrument_node="">
It's not clear how individual taxpayers are affected by this repatriation tax. Talk to a tax professional who has some expertise in this area of tax law. If you missed the April 17, 2018 deadline and you find you owe this tax, you should pay as soon as possible to avoid increasing </span><a data-component="link" data-dcnode-id="795" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/late-payment-of-business-taxes-397688"><span data-dcnode-id="796" instrument_node="">fines and penalties</span></a><span data-dcnode-id="794" instrument_node="">.
</span></p><span data-dcnode-id="792" instrument_node="">
</span><div class="comp js-scads-inline-content ads-sc mntl-block" data-dcnode-id="782" id="ads-sc_1-0"><span data-dcnode-id="791" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
</span><span data-dcnode-id="789" instrument_node="">
</span><span data-dcnode-id="788" instrument_node="">
</span><span data-dcnode-id="787" instrument_node="">
</span><span data-dcnode-id="786" instrument_node="">
</span><span data-dcnode-id="785" instrument_node="">
</span><span data-dcnode-id="784" instrument_node="">
</span><span data-dcnode-id="783" instrument_node="">
</span></div><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
