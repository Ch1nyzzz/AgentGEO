</span><div class="elementor-widget-container" data-dcnode-id="1226"><span data-dcnode-id="1248" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1228"><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">The goal of many podcast hosts is eventually to make at least some money on their podcasts. Whether you hope to just make enough to cover your costs, or want to make a sustainable income from your show, </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rss.com/blog/make-money-from-your-podcast/"><span data-dcnode-id="1245" instrument_node="">monetizing your podcast</span></a><span data-dcnode-id="1243" instrument_node=""> moves you into the potentially frightening new arena of having to deal with taxable income.&nbsp;</span></p><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The good news is, with taxable income comes tax deductions for podcasters that you may not even realize you qualify for. With that in mind, you may be wondering, what can I claim as a deduction on my tax returns? To answer that, you’ll need to start with asking yourself a few simple questions:</span></p><p data-dcnode-id="1232" style="padding-left: 40px;"><span data-dcnode-id="1239" instrument_node="">1. Do You Have Expenses?</span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">2. Are You Making Money On Your Show?</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">3. Is it a Business or a Hobby?</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">4. Do You Have Thorough Records?</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Let’s break each of these questions down a little further to help you determine if you can claim deductions as a podcaster.</span></p><span data-dcnode-id="1229" instrument_node=""> </span></div><span data-dcnode-id="1227" instrument_node="">
</span></div><span data-dcnode-id="1225" instrument_node="">
</span></div><span data-dcnode-id="1223" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">1. Do You Have Expenses?
</span></h2><span data-dcnode-id="1200" instrument_node=""> </span></div><span data-dcnode-id="1198" instrument_node="">
</span></div><span data-dcnode-id="1196" instrument_node="">

</span><section class="elementor-section elementor-top-section elementor-element elementor-element-36d0e8a elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="1128" data-element_type="section" data-id="36d0e8a" data-particle-mobile-disabled="false" data-particle_enable="false"><span data-dcnode-id="1183" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="1130"><span data-dcnode-id="1182" instrument_node="">

</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-8e4716e" data-dcnode-id="1134" data-element_type="column" data-id="8e4716e"><span data-dcnode-id="1180" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="1136"><span data-dcnode-id="1179" instrument_node="">
</span><div class="elementor-widget-wrap" data-dcnode-id="1138"><span data-dcnode-id="1178" instrument_node="">
</span><div class="elementor-element elementor-element-2445cb3 elementor-widget elementor-widget-text-editor" data-dcnode-id="1140" data-element_type="widget" data-id="2445cb3" data-widget_type="text-editor.default"><span data-dcnode-id="1177" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1142"><span data-dcnode-id="1176" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1144"><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">If you’re a podcaster hosting a show on your own, you likely have expenses. Look at all of the money you’re spending on your show each year. Subscription fees for your email service provider, courses that teach how to start a podcast, and even a new computer purchased for editing and storing show files could be considered potential tax deductions for podcasters.</span></p><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">Christian Brim of </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coregroupus.com/"><span data-dcnode-id="1171" instrument_node="">Core Business and Financial Services</span></a><span data-dcnode-id="1169" instrument_node=""> said that in his business, he actually works with several podcasters. Common deductions he sees are:</span></p><ul data-dcnode-id="1157"><li data-dcnode-id="1158" style="list-style-type: none;"><ul data-dcnode-id="1159"><li data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Advertising (Facebook, Google)</span></li><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Credit Card Fees (Squarespace, Paypal)</span></li><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Software subscriptions (Honeybook, Podcast Hosting)</span></li><li data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Production Costs (Hiring 3rd Party Vendors/Independent Contractors)</span></li></ul></li></ul><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">Licensed tax professional Charles Corsello Jr. of </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxdebthelp.com/"><span data-dcnode-id="1155" instrument_node="">TaxDebtHelp.com</span></a><span data-dcnode-id="1153" instrument_node=""> said, “Podcasters who are filing their taxes have deductible expenses just like other businesses.” In addition to the aforementioned deductions he added, “If the podcaster works from home and uses a room solely and regularly for business, they can take a home office deduction. Generally, it must be the principal place of business. The home office deduction can be calculated by taking the square footage of the home office relative to the total square footage of the residence. So for example, if the home office represents 10% of the total square feet of the residence, then the podcaster can deduct 10% of utility costs, such as electricity, gas/oil, and so forth.”</span></p><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">If you are traveling to do interviews or go to industry conferences Charles said, “Travel expenses for the podcaster can also be deducted as well. Hotel costs, airfare, 50% of meals can be deducted too.”</span></p><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">When it comes to healthcare he noted, “If the podcaster pays for their health insurance, their spouse, and their children’s health insurance (if the children are under 27 at the end of the year) and the podcaster is not eligible to take part in an employer sponsored health insurance plan, they can take the self-employed health insurance deduction. As a result, they can deduct 100% of the premiums from their federal taxable income.”</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Of course, before you can claim any of the potential tax deductions for podcasters, you have to address the next couple of questions.</span></p><span data-dcnode-id="1145" instrument_node=""> </span></div><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span></div><span data-dcnode-id="1131" instrument_node="">
</span></div><span data-dcnode-id="1129" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1050"><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1061" instrument_node="">Get really serious when answering this question. If you brought in any revenue from your podcast, how much did you make? What were the sources of the income? It’s not just the money you’re pulling in from </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rss.com/blog/podcast-sponsorships-podcorn/"><span data-dcnode-id="1060" instrument_node="">ads/sponsorships</span></a><span data-dcnode-id="1058" instrument_node="">, but also anything that comes into your Patreon or crowdfunding accounts, affiliate partnerships, </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rss.com/blog/creating-a-product-for-your-podcast/"><span data-dcnode-id="1057" instrument_node="">merchandise sales</span></a><span data-dcnode-id="1055" instrument_node="">, etc.&nbsp;</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Don’t forget to include any gifts such as swag that was sent to you by sponsors. All of the income you’ve earned from your show must be tallied up as it will play a huge role when you ask yourself the next question.</span></p><span data-dcnode-id="1051" instrument_node=""> </span></div><span data-dcnode-id="1049" instrument_node="">
</span></div><span data-dcnode-id="1047" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">3. Is it a Business or a Hobby?
</span></h2><span data-dcnode-id="1022" instrument_node=""> </span></div><span data-dcnode-id="1020" instrument_node="">

</span><section class="elementor-section elementor-top-section elementor-element elementor-element-ec9580e elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="964" data-element_type="section" data-id="ec9580e" data-particle-mobile-disabled="false" data-particle_enable="false"><span data-dcnode-id="1005" instrument_node="">

</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-6fafb6e" data-dcnode-id="970" data-element_type="column" data-id="6fafb6e"><span data-dcnode-id="1002" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="972"><span data-dcnode-id="1001" instrument_node="">

</span><div class="elementor-element elementor-element-ddc7aeb elementor-widget elementor-widget-text-editor" data-dcnode-id="976" data-element_type="widget" data-id="ddc7aeb" data-widget_type="text-editor.default"><span data-dcnode-id="999" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="978"><span data-dcnode-id="998" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="980"><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="996" instrument_node="">The </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/newsroom/earning-side-income-is-it-a-hobby-or-a-business"><span data-dcnode-id="995" instrument_node="">IRS defines a business as an institution</span></a><span data-dcnode-id="993" instrument_node=""> that “operates to make a profit.” A hobby on the other hand is “for sport or recreation, not to make a profit.” </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turbotax.intuit.com/tax-tips/small-business-taxes/when-the-irs-classifies-your-business-as-a-hobby/L5NClTTtK"><span data-dcnode-id="992" instrument_node="">TurboTax</span></a><span data-dcnode-id="990" instrument_node=""> explained this further stating, “The Internal Revenue Service allows you to take a tax deduction for legitimate losses incurred in the operation of your business. However, if your business claims a net loss for too many years, or fails to meet other requirements, the IRS may classify it as a hobby, which would prevent you from claiming a loss related to the business. If the IRS classifies your business as a hobby, you’ll have to prove that you had a valid profit motive if you want to claim those deductions.”</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Charles said, “If podcasting is a hobby, a podcaster can only deduct up to the amount of income the hobby generated. In other words, they cannot deduct podcasting related expenses in excess of hobby income.”</span></p><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">If you want to claim deductions on this year’s taxes, you need to decide if you are producing your podcast as a business or as a hobby. However, you can change this in the future if you claim it as a hobby one year but start earning money from it the following year. If you’ve decided you want to </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.simplecast.com/answers-from-an-actual-lawyer-do-i-need-an-llc/"><span data-dcnode-id="985" instrument_node="">claim your podcast as a business</span></a><span data-dcnode-id="983" instrument_node="">, move on to the next question.</span></p><span data-dcnode-id="981" instrument_node=""> </span></div><span data-dcnode-id="979" instrument_node="">
</span></div><span data-dcnode-id="977" instrument_node="">
</span></div><span data-dcnode-id="975" instrument_node="">

</span><div class="elementor-element elementor-element-8d16b88 elementor-widget elementor-widget-text-editor" data-dcnode-id="881" data-element_type="widget" data-id="8d16b88" data-widget_type="text-editor.default"><span data-dcnode-id="900" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="883"><span data-dcnode-id="899" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="885"><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">If you are claiming tax deductions, you need to have thorough records of every expense you report. </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//turbotax.intuit.com/tax-tips/small-business-taxes/when-the-irs-classifies-your-business-as-a-hobby/L5NClTTtK"><span data-dcnode-id="896" instrument_node="">As TurboTax explains</span></a><span data-dcnode-id="894" instrument_node="">, “Running a hobby as a business could very possibly trigger an IRS audit. If your business is legitimate, keeping accurate and extensive records could help prevent the classification of your business as a hobby.”</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">If you are audited, you’re going to need to prove that you spent that money you said you did on the production of your podcast. If you’ve kept the receipts from your purchases and can easily produce the records of things like recurring subscriptions, so you should feel safe taking deductions. If not, though, you might find that the deductions you are trying to get aren’t worth the trouble that you can face during an audit.</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Christian said, “Generally, a taxpayer must provide documentation to substantiate the amount and business use of an expense. For obvious business expenses this can be [as simple as] a receipt, bill/invoice, or other document. For items that do not have a clear business purpose (e.g. postage), additional documentation might be required to prove business usage. Certain expenses (e.g. travel, gifts) require additional documentation. No documentation is required to claim the deduction, but a taxpayer should be able to provide documentation upon request or audit by the IRS.”</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Bottom line: Keep thorough records, claim your deductions accurately, and be prepared to produce your records in the event an audit is triggered.</span></p><span data-dcnode-id="886" instrument_node=""> </span></div><span data-dcnode-id="884" instrument_node="">
</span></div><span data-dcnode-id="882" instrument_node="">
