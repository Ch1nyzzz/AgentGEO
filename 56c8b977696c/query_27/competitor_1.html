</span><img alt=" A trio of Black women wearing business attire faces the camera. The women are smiling. The woman standing on the left is holding an open binder and the one sitting on the right is holding an electronic tablet." data-dcnode-id="572" decoding="async" height="415" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uschamber-co.imgix.net/https%253A//s3.us-east-1.amazonaws.com/co-assets/assets/images/minority-owned-business_2021-05-17-153147.jpg%3Fauto%3Dcompress%252Cformat%26crop%3Dfocalpoint%26fit%3Dcrop%26fp-x%3D0.8061%26fp-y%3D0.5751%26h%3D415%26q%3D88%26w%3D622%26s%3D2c71b2e505a7b57d75ff482de51fcad0&amp;raw" width="622"><span data-dcnode-id="571" instrument_node="">

</span><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">There are many tax credits and other incentives that minority-owned businesses should look into.</span></strong><span data-dcnode-id="567" instrument_node=""> — Getty Images/kali9
    </span></figcaption><span data-dcnode-id="565" instrument_node="">
</span></figure><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="558" dir="ltr"><span data-dcnode-id="562" instrument_node="">Minority-owned businesses are a crucial component of the American economy. Over the last 10 years, </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbc.senate.gov/public/index.cfm/minorityentrepreneurs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="561" instrument_node="">minority enterprises</span></a><span data-dcnode-id="559" instrument_node=""> comprised more than 50% of new U.S.-based businesses and created 4.7 million jobs.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555" dir="ltr"><span data-dcnode-id="556" instrument_node="">While the federal tax code doesn’t include any specific incentives for minority-owned businesses, entrepreneurs who identify as a member of a minority group may be better positioned to take advantage of certain tax credits and breaks. Here’s what you need to know about tax breaks for minority-owned businesses.</span></p><span data-dcnode-id="554" instrument_node="">
</span><h2 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">How is a minority-owned business defined on a federal level?</span></h2><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549" dir="ltr"><span data-dcnode-id="550" instrument_node="">In the United States, there are seven recognized minority groupings: Hispanic/Latino Americans, Black/African Americans, Asian Americans, Arab Americans/Middle Eastern Americans, Native Americans/Alaska Natives and Native Hawaiians/Pacific Islanders.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546" dir="ltr"><span data-dcnode-id="547" instrument_node="">To support entrepreneurs who identify as one or more of these minorities, federal agencies and other corporations often set aside a percentage of their budgets to work with these businesses. Businesses that work with certified Minority Business Enterprises (MBEs) may be eligible to receive certain tax benefits. </span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543" dir="ltr"><span data-dcnode-id="544" instrument_node="">To qualify as an MBE, a business must meet the following criteria:</span></p><span data-dcnode-id="542" instrument_node="">
</span><ul data-dcnode-id="535"><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">At least 51% of the business is owned and operated by one or more minority U.S. citizens.</span></li><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Management and daily operations are carried out by the minority ownership member(s).</span></li><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">The business is a for-profit enterprise, physically located in the United States or trust territories.</span></li></ul><p data-dcnode-id="527" dir="ltr"><span data-dcnode-id="534" instrument_node="">[</span><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Read more</span></strong><span data-dcnode-id="531" instrument_node="">: </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/co/run/business-financing/certification-guide-for-minority-owned-business" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="530" instrument_node="">How to Get Certified as a Minority-Owned Business</span></a><span data-dcnode-id="528" instrument_node="">]</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="515" dir="ltr"><span data-dcnode-id="525" instrument_node="">There are also national certifications for </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/co/start/strategy/get-certified-woman-owned-business" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">Women-Owned Small Businesses</span></a><span data-dcnode-id="522" instrument_node=""> (WOSB) that are at least 51% woman-owned and operated, and </span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/offices/headquarters/oed/resources/3690" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="521" instrument_node="">Economically Disadvantaged Women-Owned Small Businesses</span></a><span data-dcnode-id="519" instrument_node=""> (EDWOSB) whose qualifying woman owners have a personal net worth of less than $750,000. Because </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalreserve.gov/econres/notes/feds-notes/disparities-in-wealth-by-race-and-ethnicity-in-the-2019-survey-of-consumer-finances-20200928.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="518" instrument_node="">the Federal Reserve recognizes</span></a><span data-dcnode-id="516" instrument_node=""> that minority households often have a lower mean and median net worth than white households, minority female entrepreneurs may meet the criteria for all three of these certifications.</span></p><span data-dcnode-id="514" instrument_node="">
</span><div class="article-pull-quote animate" data-dcnode-id="500"><span data-dcnode-id="513" instrument_node="">
</span><div class="contain-wrapper" data-dcnode-id="502"><span data-dcnode-id="512" instrument_node="">
</span><div class="article-pull-quote__wrapper" data-dcnode-id="504"><span data-dcnode-id="511" instrument_node="">
</span><span class="icon-quote" data-dcnode-id="510"></span><span data-dcnode-id="509" instrument_node="">
</span><h4 data-dcnode-id="506"><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Businesses that work with certified Minority Business Enterprises (MBEs) may be eligible to receive certain tax benefits.</span></p></h4><span data-dcnode-id="505" instrument_node="">
</span></div><span data-dcnode-id="503" instrument_node="">
</span></div><span data-dcnode-id="501" instrument_node="">
</span></div><span data-dcnode-id="499" instrument_node="">
</span><h2 data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">What tax breaks are offered for minority-owned businesses?</span></h2><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="491" dir="ltr"><span data-dcnode-id="495" instrument_node="">There are no federal tax breaks specifically offered to certified minority-owned businesses, but </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanexpress.com/en-us/business/trends-and-insights/articles/5-tax-tips-for-minority-owned-businesses/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="494" instrument_node="">there are tax incentives</span></a><span data-dcnode-id="492" instrument_node=""> for working with other minority-owned businesses and operating in low-income areas, which often have larger minority populations. These indirect tax benefits are a great incentive for minority-owned businesses to support their fellow minority entrepreneurs while benefiting financially.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="482" dir="ltr"><span data-dcnode-id="489" instrument_node="">[</span><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Read more</span></strong><span data-dcnode-id="486" instrument_node="">: </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/co/start/strategy/top-resources-for-minority-owned-businesses" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="485" instrument_node="">10 Resources for Minority-Owned Businesses</span></a><span data-dcnode-id="483" instrument_node="">]</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479" dir="ltr"><span data-dcnode-id="480" instrument_node="">Depending on the location and nature of their business, there are two particular tax breaks minority business owners may be able to take advantage of:</span></p><span data-dcnode-id="478" instrument_node="">
</span><h3 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">New-Markets Tax Credit (NMTC)</span></h3><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473" dir="ltr"><span data-dcnode-id="474" instrument_node="">Established in 2000, the NMTC program has supported minority businesses within low-income areas. Under this program, taxpayers can receive a credit against federal income taxes by investing in designated community development entities (CDEs). Investors can then claim their up to 39% of tax credits in as little as seven years—5% of the investment for each of the first three years, then 6% of the project for each of the remaining four years.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470" dir="ltr"><span data-dcnode-id="471" instrument_node="">A minority enterprise that falls under CDE designation can be its own investor, though it can also find outside investors (typically a regulated financial institution). Any entity or person is eligible to claim these credits. While the credit is set to expire in 2021, Congress has extended it several times since its initiation, so the NMTC program may continue well into the future.</span></p><span data-dcnode-id="469" instrument_node="">
</span><h3 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Breaks for businesses in distressed and empowerment areas</span></h3><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464" dir="ltr"><span data-dcnode-id="465" instrument_node="">There are several tax breaks that exist to encourage businesses to operate in economically distressed areas. These are not limited to minority enterprises and are open to any qualifying organization. However, if a minority entrepreneur has lived in or is familiar with these designated areas, they may have a competitive advantage in starting up and finding success.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461" dir="ltr"><span data-dcnode-id="462" instrument_node="">One of the most common tax breaks is for businesses working in empowerment zones. Empowerment zones are areas designated by the Department of Housing and Urban Development (for urban areas) and the Department of Agriculture (for rural areas). Enterprises in these locations qualify for various tax credits, including the empowerment-zone employment credit, special capital-gain exclusion and additional first-year expensing write-offs.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="450" dir="ltr"><span data-dcnode-id="459" instrument_node="">[</span><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Read more</span></strong><span data-dcnode-id="456" instrument_node="">: </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/co/run/business-financing/funding-options-for-minority-owned-businesses" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="455" instrument_node="">9 Funding Options for Minority-Owned Businesses</span></a><span data-dcnode-id="453" instrument_node="">]</span><em data-dcnode-id="451"><br data-dcnode-id="452"></em></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="446" dir="ltr"><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">CO— aims to bring you inspiration from leading 
respected experts. However, before making any business decision, you 
should consult a professional who can advise you based on your 
individual situation.</span></em></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="439"><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/thrivewithco/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Follow us on Instagram </span></strong></a><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">for more expert tips &amp; business owners’ stories.</span></strong></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">To stay on top of all the news impacting your small business, go here for all of our latest </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/co/start/strategy/small-business-news" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="436" instrument_node="">small business news and updates</span></a><span data-dcnode-id="434" instrument_node="">.</span></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="425"><strong data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">CO—is committed to helping you start, run and grow your small business. Learn more about the benefits of small business membership in the U.S. Chamber of Commerce, </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uschamber.com/join/small-business-membership%3Futm_source%3Dco%26utm_medium%3Darticle%26utm_campaign%3Deditorial_body" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="429" instrument_node="">here</span></a><span data-dcnode-id="427" instrument_node="">.</span></strong></p><span data-dcnode-id="424" instrument_node="">
