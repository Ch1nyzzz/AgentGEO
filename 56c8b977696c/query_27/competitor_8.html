er rate.</span><sup class="reference" data-dcnode-id="4322" id="cite_ref-1"><a data-dcnode-id="4323" href="#cite_note-1"><span data-dcnode-id="4324" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4321" instrument_node="">

</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Separately, the tax on collectibles and certain small business stock is capped at 28%. The tax on unrecaptured Section 1250 gain — the portion of gains on depreciable real estate (structures used for business purposes) that has been or could have been claimed as depreciation — is capped at 25%.
</span></p><p data-dcnode-id="3887"><span data-dcnode-id="3904" instrument_node="">The income amounts ("tax brackets") were reset by the </span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="3903" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="3901" instrument_node=""> for the 2018 tax year to equal the amount that would have been due under prior law.</span><sup class="reference" data-dcnode-id="3898" id="cite_ref-Fool2018_3-0"><a data-dcnode-id="3899" href="#cite_note-Fool2018-3"><span data-dcnode-id="3900" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3897" instrument_node=""> They will be adjusted each year based on the </span><a data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Chained_Consumer_Price_Index" title="United States Chained Consumer Price Index"><span data-dcnode-id="3896" instrument_node="">Chained CPI</span></a><span data-dcnode-id="3894" instrument_node=""> measure of inflation. These income amounts are after deductions: There is another bracket, of income below that shown as $0 in the table, on which no tax is due. For 2021, this amount is at least the </span><a data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_deduction" title="Standard deduction"><span data-dcnode-id="3893" instrument_node="">standard deduction</span></a><span data-dcnode-id="3891" instrument_node="">, $12,550 for an individual return and $25,100 for a joint return, or more if the taxpayer has over that amount in </span><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Itemized_deduction" title="Itemized deduction"><span data-dcnode-id="3890" instrument_node="">itemized deductions</span></a><span data-dcnode-id="3888" instrument_node="">.
</span></p><span data-dcnode-id="3886" instrument_node="">
</span><h3 data-dcnode-id="3876"><span class="mw-headline" data-dcnode-id="3884" id="Additional_taxes"><span data-dcnode-id="3885" instrument_node="">Additional taxes</span></span><span class="mw-editsection" data-dcnode-id="3877"><span class="mw-editsection-bracket" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">[</span></span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Additional taxes"><span data-dcnode-id="3881" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">There may be taxes in addition to the tax rates shown in the above table.
</span></p><span data-dcnode-id="3872" instrument_node="">
</span><ul data-dcnode-id="3856"><li data-dcnode-id="3860"><span data-dcnode-id="3871" instrument_node="">Taxpayers earning income above certain thresholds ($200,000 for singles and heads of household, $250,000 for married couples filing jointly and qualifying widowers with dependent children, and $125,000 for married couples filing separately) pay an additional 3.8% tax on all investment income. This tax is known as the </span><a class="mw-redirect" data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Net_investment_income_tax" title="Net investment income tax"><span data-dcnode-id="3870" instrument_node="">net investment income tax</span></a><span data-dcnode-id="3868" instrument_node="">.</span><sup class="reference" data-dcnode-id="3865" id="cite_ref-4"><a data-dcnode-id="3866" href="#cite_note-4"><span data-dcnode-id="3867" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="3862" id="cite_ref-5"><a data-dcnode-id="3863" href="#cite_note-5"><span data-dcnode-id="3864" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3861" instrument_node=""> Therefore, the top federal tax rate on long-term capital gains is 23.8%.</span></li><span data-dcnode-id="3859" instrument_node="">
</span><li data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">State and local taxes often apply to capital gains. In a state whose tax is stated as a percentage of the federal tax liability, the percentage is easy to calculate. Some states structure their taxes differently. In this case, the treatment of long-term and short-term gains does not necessarily correspond to the federal treatment.</span></li></ul><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3854" instrument_node="">Capital gains do not push ordinary income into a higher income bracket. The Capital Gains and Qualified Dividends Worksheet in the Form 1040 instructions specifies a calculation that treats both long-term capital gains and qualified dividends as though they were the last income received, then applies the preferential tax rate as shown in the above table.</span><sup class="reference" data-dcnode-id="3851" id="cite_ref-6"><a data-dcnode-id="3852" href="#cite_note-6"><span data-dcnode-id="3853" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3850" instrument_node="">  Conversely, however, this means an increase in ordinary income will withdraw the 0% and 15% brackets for capital gains taxes.
</span></p><span data-dcnode-id="3848" instrument_node="">
</span><h3 data-dcnode-id="3838"><span class="mw-headline" data-dcnode-id="3846" id="Cost_basis"><span data-dcnode-id="3847" instrument_node="">Cost basis</span></span><span class="mw-editsection" data-dcnode-id="3839"><span class="mw-editsection-bracket" data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">[</span></span><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Cost basis"><span data-dcnode-id="3843" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3836" instrument_node="">The capital gain that is taxed is the excess of the sale price over the </span><a data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cost_basis" title="Cost basis"><span data-dcnode-id="3835" instrument_node="">cost basis</span></a><span data-dcnode-id="3833" instrument_node=""> of the asset. The taxpayer reduces the sale price and increases the cost basis (reducing the capital gain on which tax is due) to reflect transaction costs such as brokerage fees, certain legal fees, and the transaction tax on sales.
</span></p><span data-dcnode-id="3831" instrument_node="">
</span><h4 data-dcnode-id="3821"><span class="mw-headline" data-dcnode-id="3829" id="Depreciation"><span data-dcnode-id="3830" instrument_node="">Depreciation</span></span><span class="mw-editsection" data-dcnode-id="3822"><span class="mw-editsection-bracket" data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">[</span></span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Depreciation"><span data-dcnode-id="3826" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3819" instrument_node="">In contrast, when a business is entitled to a </span><a data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depreciation" title="Depreciation"><span data-dcnode-id="3818" instrument_node="">depreciation</span></a><span data-dcnode-id="3816" instrument_node=""> deduction on an asset used in the business (such as for each year's wear on a piece of machinery), it reduces the cost basis of that asset by that amount, potentially to zero.</span><sup class="reference" data-dcnode-id="3813" id="cite_ref-7"><a data-dcnode-id="3814" href="#cite_note-7"><span data-dcnode-id="3815" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3812" instrument_node=""> The reduction in basis occurs whether or not the business claims the depreciation.
</span></p><p data-dcnode-id="3806"><span data-dcnode-id="3810" instrument_node="">If the business then sells the asset for a gain (that is, for more than its adjusted cost basis), this part of the gain is called </span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depreciation_recapture_%28United_States%29" title="Depreciation recapture (United States)"><span data-dcnode-id="3809" instrument_node="">depreciation recapture</span></a><span data-dcnode-id="3807" instrument_node="">. When selling certain real estate, it may be treated as capital gain. When selling equipment, however, depreciation recapture is generally taxed as ordinary income, not capital gain. Further, when selling some kinds of assets, none of the gain qualifies as capital gain.
</span></p><span data-dcnode-id="3805" instrument_node="">
</span><h4 data-dcnode-id="3795"><span class="mw-headline" data-dcnode-id="3803" id="Other_gains_in_the_course_of_business"><span data-dcnode-id="3804" instrument_node="">Other gains in the course of business</span></span><span class="mw-editsection" data-dcnode-id="3796"><span class="mw-editsection-bracket" data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">[</span></span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Other gains in the course of business"><span data-dcnode-id="3800" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3781"><span data-dcnode-id="3793" instrument_node="">If a business develops and sells properties, gains are taxed as business income rather than investment income. The </span><a class="mw-redirect" data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifth_Circuit_Court_of_Appeals" title="Fifth Circuit Court of Appeals"><span data-dcnode-id="3792" instrument_node="">Fifth Circuit Court of Appeals</span></a><span data-dcnode-id="3790" instrument_node="">, in </span><i data-dcnode-id="3787"><a data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byram_v._United_States" title="Byram v. United States"><span data-dcnode-id="3789" instrument_node="">Byram v. United States</span></a></i><span data-dcnode-id="3786" instrument_node=""> (1983), set out criteria for making this decision and determining whether income qualifies for treatment as a capital gain.</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-8"><a data-dcnode-id="3784" href="#cite_note-8"><span data-dcnode-id="3785" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3782" instrument_node="">
</span></p><span data-dcnode-id="3780" instrument_node="">
</span><h4 data-dcnode-id="3770"><span class="mw-headline" data-dcnode-id="3778" id="Inherited_property"><span data-dcnode-id="3779" instrument_node="">Inherited property</span></span><span class="mw-editsection" data-dcnode-id="3771"><span class="mw-editsection-bracket" data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">[</span></span><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Inherited property"><span data-dcnode-id="3775" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3769" instrument_node="">
</span><p data-dcnode-id="3760"><span data-dcnode-id="3768" instrument_node="">Under the </span><a data-dcnode-id="3766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stepped-up_basis" title="Stepped-up basis"><span data-dcnode-id="3767" instrument_node="">stepped-up basis</span></a><span data-dcnode-id="3765" instrument_node=""> rule,</span><sup class="reference" data-dcnode-id="3762" id="cite_ref-9"><a data-dcnode-id="3763" href="#cite_note-9"><span data-dcnode-id="3764" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3761" instrument_node=""> for an individual who inherits a capital asset, the cost basis is "stepped up" to its fair market value of the property at the time of the inheritance. When eventually sold, the capital gain or loss is only the difference in value from this stepped-up basis. Increase in value that occurred before the inheritance (such as during the life of the decedent) is never taxed.
</span></p><span data-dcnode-id="3759" instrument_node="">
</span><h4 data-dcnode-id="3749"><span class="mw-headline" data-dcnode-id="3757" id="Capital_losses"><span data-dcnode-id="3758" instrument_node="">Capital losses</span></span><span class="mw-editsection" data-dcnode-id="3750"><span class="mw-editsection-bracket" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">[</span></span><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Capital losses"><span data-dcnode-id="3754" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3748" instrument_node="">
</span><p data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">If a taxpayer realizes both capital gains and capital losses in the same year, the losses offset (cancel out) the gains. The amount remaining after offsetting is the net gain or net loss used in the calculation of taxable gains.
</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3745" instrument_node="">For individuals, a net loss can be claimed as a </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_deduction" title="Tax deduction"><span data-dcnode-id="3744" instrument_node="">tax deduction</span></a><span data-dcnode-id="3742" instrument_node=""> against ordinary income, up to $3,000 per year ($1,500 in the case of a married individual filing separately). Any remaining net loss can be carried over and applied against gains in future years.  However, losses from the sale of personal property, including a residence, do not qualify for this treatment.</span><sup class="reference" data-dcnode-id="3739" id="cite_ref-10"><a data-dcnode-id="3740" href="#cite_note-10"><span data-dcnode-id="3741" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3738" instrument_node="">
</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3736" instrument_node="">Corporations with net losses of any size can re-file their tax forms for the previous three years and use the losses to offset gains reported in those years. This results in a refund of capital gains taxes paid previously. After the carryback, a corporation can carry any unused portion of the loss forward for five years to offset future gains.</span><sup class="reference" data-dcnode-id="3733" id="cite_ref-11"><a data-dcnode-id="3734" href="#cite_note-11"><span data-dcnode-id="3735" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3732" instrument_node="">
</span></p><span data-dcnode-id="3730" instrument_node="">
</span><h4 data-dcnode-id="3720"><span class="mw-headline" data-dcnode-id="3728" id="Return_of_capital"><span data-dcnode-id="3729" instrument_node="">Return of capital</span></span><span class="mw-editsection" data-dcnode-id="3721"><span class="mw-editsection-bracket" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">[</span></span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Return of capital"><span data-dcnode-id="3725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3719" instrument_node="">
</span><p data-dcnode-id="3711"><span data-dcnode-id="3718" instrument_node="">Corporations may declare that a payment to shareholders is a </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Return_of_capital" title="Return of capital"><span data-dcnode-id="3717" instrument_node="">return of capital</span></a><span data-dcnode-id="3715" instrument_node=""> rather than a dividend. Dividends are taxable in the year that they are paid, while returns of capital work by decreasing the cost basis by the amount of the payment, and thus increasing the shareholder's eventual capital gain. Although most </span><a class="mw-redirect" data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qualified_dividends" title="Qualified dividends"><span data-dcnode-id="3714" instrument_node="">qualified dividends</span></a><span data-dcnode-id="3712" instrument_node=""> receive the same favorable tax treatment as long-term capital gains, the shareholder can defer taxation of a return of capital indefinitely by declining to sell the stock.
</span></p><span data-dcnode-id="3710" instrument_node="">
</span><h2 data-dcnode-id="3700"><span class="mw-headline" data-dcnode-id="3708" id="History"><span data-dcnode-id="3709" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="3701"><span class="mw-editsection-bracket" data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">[</span></span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: History"><span data-dcnode-id="3705" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3699" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3690"><div class="thumbinner" data-dcnode-id="3691" style="width:502px;"><a class="image" data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFederal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf"><img alt="" class="thumbimage" data-dcnode-id="3698" data-file-height="995" data-file-width="2775" decoding="async" height="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf/page1-500px-Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf/page1-750px-Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf/page1-1000px-Federal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf.jpg 2x" width="500"></a><span data-dcnode-id="3696" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3692"><div class="magnify" data-dcnode-id="3694"><a class="internal" data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFederal_Capital_Gains_Tax_Collections_1954-2009_history_chart.pdf" title="Enlarge"></a></div><span data-dcnode-id="3693" instrument_node="">US Capital Gains Taxes history chart</span></div></div></div><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3650"><span data-dcnode-id="3688" instrument_node="">From 1913 to 1921, capital gains were taxed at ordinary rates, initially up to a maximum rate of 7%.</span><sup class="reference" data-dcnode-id="3685" id="cite_ref-ettp_12-0"><a data-dcnode-id="3686" href="#cite_note-ettp-12"><span data-dcnode-id="3687" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3684" instrument_node=""> The </span><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revenue_Act_of_1921" title="Revenue Act of 1921"><span data-dcnode-id="3683" instrument_node="">Revenue Act of 1921</span></a><span data-dcnode-id="3681" instrument_node=""> allowed a tax rate of 12.5% gain for assets held at least two years.</span><sup class="reference" data-dcnode-id="3678" id="cite_ref-ettp_12-1"><a data-dcnode-id="3679" href="#cite_note-ettp-12"><span data-dcnode-id="3680" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3677" instrument_node=""> From 1934 to 1941, taxpayers could exclude from taxation up to 70% of gains on assets held 1, 2, 5, and 10 years.</span><sup class="reference" data-dcnode-id="3674" id="cite_ref-ettp_12-2"><a data-dcnode-id="3675" href="#cite_note-ettp-12"><span data-dcnode-id="3676" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3673" instrument_node=""> Beginning in 1942, taxpayers could exclude 50% of capital gains on assets held at least six months or elect a 25% alternative tax rate if their ordinary tax rate exceeded 50%.</span><sup class="reference" data-dcnode-id="3670" id="cite_ref-ettp_12-3"><a data-dcnode-id="3671" href="#cite_note-ettp-12"><span data-dcnode-id="3672" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3669" instrument_node=""> From 1954 to 1967, the maximum capital gains tax rate was 25%.</span><sup class="reference" data-dcnode-id="3666" id="cite_ref-13"><a data-dcnode-id="3667" href="#cite_note-13"><span data-dcnode-id="3668" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3665" instrument_node=""> Capital gains tax rates were significantly increased in the </span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Reform_Act_of_1969" title="Tax Reform Act of 1969"><span data-dcnode-id="3664" instrument_node="">1969</span></a><span data-dcnode-id="3662" instrument_node=""> and </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Reform_Act_of_1976" title="Tax Reform Act of 1976"><span data-dcnode-id="3661" instrument_node="">1976</span></a><span data-dcnode-id="3659" instrument_node=""> Tax Reform Acts.</span><sup class="reference" data-dcnode-id="3656" id="cite_ref-ettp_12-4"><a data-dcnode-id="3657" href="#cite_note-ettp-12"><span data-dcnode-id="3658" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3655" instrument_node=""> In 1978, Congress eliminated the minimum tax on excluded gains and increased the exclusion to 60%, reducing the maximum rate to 28%.</span><sup class="reference" data-dcnode-id="3652" id="cite_ref-ettp_12-5"><a data-dcnode-id="3653" href="#cite_note-ettp-12"><span data-dcnode-id="3654" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3651" instrument_node=""> The 1981 tax rate reductions further reduced capital gains rates to a maximum of 20%.
</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3649" instrument_node="">The </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Reform_Act_of_1986" title="Tax Reform Act of 1986"><span data-dcnode-id="3648" instrument_node="">Tax Reform Act of 1986</span></a><span data-dcnode-id="3646" instrument_node=""> repealed the exclusion of long-term gains, raising the maximum rate to 28% (33% for taxpayers subject to phaseouts).</span><sup class="reference" data-dcnode-id="3643" id="cite_ref-ettp_12-6"><a data-dcnode-id="3644" href="#cite_note-ettp-12"><span data-dcnode-id="3645" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3642" instrument_node=""> The 1990 and 1993 budget acts increased ordinary tax rates but re-established a lower rate of 28% for long-term gains, though effective tax rates sometimes exceeded 28% because of other tax provisions.</span><sup class="reference" data-dcnode-id="3639" id="cite_ref-ettp_12-7"><a data-dcnode-id="3640" href="#cite_note-ettp-12"><span data-dcnode-id="3641" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3638" instrument_node=""> The </span><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taxpayer_Relief_Act_of_1997" title="Taxpayer Relief Act of 1997"><span data-dcnode-id="3637" instrument_node="">Taxpayer Relief Act of 1997</span></a><span data-dcnode-id="3635" instrument_node=""> reduced capital gains tax rates to 10% and 20% and created the exclusion for one's primary residence.</span><sup class="reference" data-dcnode-id="3632" id="cite_ref-ettp_12-8"><a data-dcnode-id="3633" href="#cite_note-ettp-12"><span data-dcnode-id="3634" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3631" instrument_node=""> The </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Growth_and_Tax_Relief_Reconciliation_Act_of_2001" title="Economic Growth and Tax Relief Reconciliation Act of 2001"><span data-dcnode-id="3630" instrument_node="">Economic Growth and Tax Relief Reconciliation Act of 2001</span></a><span data-dcnode-id="3628" instrument_node=""> reduced them further, to 8% and 18%, for assets held for five years or more. The </span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jobs_and_Growth_Tax_Relief_Reconciliation_Act_of_2003" title="Jobs and Growth Tax Relief Reconciliation Act of 2003"><span data-dcnode-id="3627" instrument_node="">Jobs and Growth Tax Relief Reconciliation Act of 2003</span></a><span data-dcnode-id="3625" instrument_node=""> reduced the rates to 5% and 15%, and extended the preferential treatment to </span><a class="mw-redirect" data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qualified_dividends" title="Qualified dividends"><span data-dcnode-id="3624" instrument_node="">qualified dividends</span></a><span data-dcnode-id="3622" instrument_node="">.
</span></p><p data-dcnode-id="3613"><span data-dcnode-id="3620" instrument_node="">The 15% tax rate was extended through 2010 as a result of the </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Increase_Prevention_and_Reconciliation_Act_of_2005" title="Tax Increase Prevention and Reconciliation Act of 2005"><span data-dcnode-id="3619" instrument_node="">Tax Increase Prevention and Reconciliation Act of 2005</span></a><span data-dcnode-id="3617" instrument_node="">, then through 2012. The </span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Taxpayer_Relief_Act_of_2012" title="American Taxpayer Relief Act of 2012"><span data-dcnode-id="3616" instrument_node="">American Taxpayer Relief Act of 2012</span></a><span data-dcnode-id="3614" instrument_node=""> made qualified dividends a permanent part of the tax code but added a 20% rate on income in the new, highest tax bracket.
</span></p><p data-dcnode-id="3601"><span data-dcnode-id="3612" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_Economic_Stabilization_Act" title="Emergency Economic Stabilization Act"><span data-dcnode-id="3611" instrument_node="">Emergency Economic Stabilization Act</span></a><span data-dcnode-id="3609" instrument_node=""> of 2008 caused the </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="3608" instrument_node="">IRS</span></a><span data-dcnode-id="3606" instrument_node=""> to introduce Form 8949, and radically change Form 1099-B,</span><sup class="reference" data-dcnode-id="3603" id="cite_ref-14"><a data-dcnode-id="3604" href="#cite_note-14"><span data-dcnode-id="3605" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3602" instrument_node=""> so that brokers would report not just the amounts of sales proceeds but also the amounts of purchases to the IRS, enabling the IRS to verify reported capital gains.
</span></p><p data-dcnode-id="3586"><span data-dcnode-id="3600" instrument_node="">The </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Small_Business_Jobs_Act_of_2010" title="Small Business Jobs Act of 2010"><span data-dcnode-id="3599" instrument_node="">Small Business Jobs Act of 2010</span></a><span data-dcnode-id="3597" instrument_node=""> exempted taxes on capital gains for angel and venture capital investors on small business stock investments if held for 5 years. It was a temporary measure but was extended through 2011 by the </span><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Relief%2C_Unemployment_Insurance_Reauthorization%2C_and_Job_Creation_Act_of_2010" title="Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010"><span data-dcnode-id="3596" instrument_node="">Tax Relief, Unemployment Insurance Reauthorization, and Job Creation Act of 2010</span></a><span data-dcnode-id="3594" instrument_node=""> as a jobs stimulus.</span><sup class="reference" data-dcnode-id="3591" id="cite_ref-15"><a data-dcnode-id="3592" href="#cite_note-15"><span data-dcnode-id="3593" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3588" id="cite_ref-16"><a data-dcnode-id="3589" href="#cite_note-16"><span data-dcnode-id="3590" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3587" instrument_node="">
</span></p><p data-dcnode-id="3581"><span data-dcnode-id="3585" instrument_node="">In 2013, </span><a class="mw-redirect" data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provisions_of_the_Patient_Protection_and_Affordable_Care_Act" title="Provisions of the Patient Protection and Affordable Care Act"><span data-dcnode-id="3584" instrument_node="">provisions of the Patient Protection and Affordable Care Act</span></a><span data-dcnode-id="3582" instrument_node=""> ("Obama-care") took effect that imposed the Medicare tax of 3.8% (formerly a payroll tax) on capital gains of high-income taxpayers.
</span></p><span data-dcnode-id="3580" instrument_node="">
</span><h3 data-dcnode-id="3570"><span class="mw-headline" data-dcnode-id="3578" id="Summary_of_recent_history"><span data-dcnode-id="3579" instrument_node="">Summary of recent history</span></span><span class="mw-editsection" data-dcnode-id="3571"><span class="mw-editsection-bracket" data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">[</span></span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Summary of recent history"><span data-dcnode-id="3575" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3568" instrument_node="">From 1998 through 2017, tax law keyed the tax rate for long-term capital gains to the taxpayer's tax bracket for ordinary income, and set forth a lower rate for the capital gains. (Short-term capital gains have been taxed at the same rate as ordinary income for this entire period.)</span><sup class="reference" data-dcnode-id="3565" id="cite_ref-17"><a data-dcnode-id="3566" href="#cite_note-17"><span data-dcnode-id="3567" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3564" instrument_node=""> This approach was dropped by the </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="3563" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="3561" instrument_node="">, starting with tax year 2018.</span><sup class="reference" data-dcnode-id="3558" id="cite_ref-Fool2018_3-1"><a data-dcnode-id="3559" href="#cite_note-Fool2018-3"><span data-dcnode-id="3560" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3557" instrument_node="">

</span><h2 data-dcnode-id="3266"><span class="mw-headline" data-dcnode-id="3274" id="State_capital_gains_taxes"><span data-dcnode-id="3275" instrument_node="">State capital gains taxes</span></span><span class="mw-editsection" data-dcnode-id="3267"><span class="mw-editsection-bracket" data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">[</span></span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: State capital gains taxes"><span data-dcnode-id="3271" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3265" instrument_node="">
</span><link data-dcnode-id="3264" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3260" role="note"><span data-dcnode-id="3263" instrument_node="">Main article: </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_income_tax" title="State income tax"><span data-dcnode-id="3262" instrument_node="">State income tax</span></a></div><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3258" instrument_node="">Most states tax capital gains as ordinary income. States that don't tax income (Alaska, Florida, Nevada, South Dakota, Texas, Washington, and Wyoming) don't tax capital gains either, nor do two (New Hampshire and Tennessee) that do or did tax only income from dividends and interest.</span><sup class="reference" data-dcnode-id="3255" id="cite_ref-18"><a data-dcnode-id="3256" href="#cite_note-18"><span data-dcnode-id="3257" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3254" instrument_node="">
</span></p><span data-dcnode-id="3252" instrument_node="">
</span><h2 data-dcnode-id="3242"><span class="mw-headline" data-dcnode-id="3250" id="Rationale"><span data-dcnode-id="3251" instrument_node="">Rationale</span></span><span class="mw-editsection" data-dcnode-id="3243"><span class="mw-editsection-bracket" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">[</span></span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Rationale"><span data-dcnode-id="3247" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3241" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3232"><div class="thumbinner" data-dcnode-id="3233" style="width:222px;"><a class="image" data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APercent_of_Income_from_Capital_Gains_and_Dividends_%282006%29.gif"><img alt="" class="thumbimage" data-dcnode-id="3240" data-file-height="291" data-file-width="396" decoding="async" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/59/Percent_of_Income_from_Capital_Gains_and_Dividends_%25282006%2529.gif/220px-Percent_of_Income_from_Capital_Gains_and_Dividends_%25282006%2529.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/59/Percent_of_Income_from_Capital_Gains_and_Dividends_%282006%29.gif/330px-Percent_of_Income_from_Capital_Gains_and_Dividends_%282006%29.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/5/59/Percent_of_Income_from_Capital_Gains_and_Dividends_%282006%29.gif 2x" width="220"></a><span data-dcnode-id="3238" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3234"><div class="magnify" data-dcnode-id="3236"><a class="internal" data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APercent_of_Income_from_Capital_Gains_and_Dividends_%282006%29.gif" title="Enlarge"></a></div><span data-dcnode-id="3235" instrument_node="">Percent of personal income from capital gains and dividends for different income groups (2006).</span></div></div></div><span data-dcnode-id="3231" instrument_node="">
</span><h3 data-dcnode-id="3221"><span class="mw-headline" data-dcnode-id="3229" id="Who_pays_it"><span data-dcnode-id="3230" instrument_node="">Who pays it</span></span><span class="mw-editsection" data-dcnode-id="3222"><span class="mw-editsection-bracket" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">[</span></span><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Who pays it"><span data-dcnode-id="3226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3219" instrument_node="">Capital gains taxes are disproportionately paid by high-income households, since they are more likely to own assets that generate the taxable gains.</span><sup class="reference" data-dcnode-id="3216" id="cite_ref-effects_19-0"><a data-dcnode-id="3217" href="#cite_note-effects-19"><span data-dcnode-id="3218" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3215" instrument_node=""> While this supports the argument that payers of capital gains taxes have more "ability to pay,"</span><sup class="reference" data-dcnode-id="3212" id="cite_ref-Sanders_20-0"><a data-dcnode-id="3213" href="#cite_note-Sanders-20"><span data-dcnode-id="3214" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3211" instrument_node="">
it also means that the payers are especially able to defer or avoid the tax, as it only comes due if and when the owner sells the asset.
</span></p><p data-dcnode-id="3201"><span data-dcnode-id="3209" instrument_node="">Low-income taxpayers who do not pay capital gains taxes directly may wind up paying them through changed prices as the actual payers pass through the cost of paying the tax.  Another factor complicating the use of capital gains taxes to address </span><a class="mw-redirect" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_inequality" title="Income inequality"><span data-dcnode-id="3208" instrument_node="">income inequality</span></a><span data-dcnode-id="3206" instrument_node=""> is that capital gains are usually not recurring income.  A taxpayer may be "high-income" in the single year in which he or she sells an asset or invention.</span><sup class="reference" data-dcnode-id="3203" id="cite_ref-21"><a data-dcnode-id="3204" href="#cite_note-21"><span data-dcnode-id="3205" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3202" instrument_node="">
</span></p><p data-dcnode-id="3189"><span data-dcnode-id="3200" instrument_node="">Debate on tax rates is often partisan; the </span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_%28United_States%29" title="Republican Party (United States)"><span data-dcnode-id="3199" instrument_node="">Republican Party</span></a><span data-dcnode-id="3197" instrument_node=""> tends to favor lower rates, whereas the </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="3196" instrument_node="">Democratic Party</span></a><span data-dcnode-id="3194" instrument_node=""> tends to favor higher rates.</span><sup class="reference" data-dcnode-id="3191" id="cite_ref-22"><a data-dcnode-id="3192" href="#cite_note-22"><span data-dcnode-id="3193" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3190" instrument_node="">
</span></p><span data-dcnode-id="3188" instrument_node="">
</span><h3 data-dcnode-id="3178"><span class="mw-headline" data-dcnode-id="3186" id="Existence_of_the_tax"><span data-dcnode-id="3187" instrument_node="">Existence of the tax</span></span><span class="mw-editsection" data-dcnode-id="3179"><span class="mw-editsection-bracket" data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">[</span></span><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Existence of the tax"><span data-dcnode-id="3183" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3155"><span data-dcnode-id="3176" instrument_node="">The existence of the capital gains tax is controversial. In 1995, to support the </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contract_with_America" title="Contract with America"><span data-dcnode-id="3175" instrument_node="">Contract with America</span></a><span data-dcnode-id="3173" instrument_node=""> legislative program of House Speaker </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newt_Gingrich" title="Newt Gingrich"><span data-dcnode-id="3172" instrument_node="">Newt Gingrich</span></a><span data-dcnode-id="3170" instrument_node="">, </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Moore_%28writer%29" title="Stephen Moore (writer)"><span data-dcnode-id="3169" instrument_node="">Stephen Moore</span></a><span data-dcnode-id="3167" instrument_node=""> and John Silvia wrote a study for the </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cato_Institute" title="Cato Institute"><span data-dcnode-id="3166" instrument_node="">Cato Institute</span></a><span data-dcnode-id="3164" instrument_node="">. In the study, they proposed halving of capital gains taxes, arguing that this move would "substantially raise tax collections and increase tax payments by the rich" and that it would increase economic growth and job creation. They wrote that the tax "is so economically inefficient...that the optimal economic policy...would be to abolish the tax entirely."</span><sup class="reference" data-dcnode-id="3161" id="cite_ref-23"><a data-dcnode-id="3162" href="#cite_note-23"><span data-dcnode-id="3163" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3160" instrument_node="">
More recently, Moore has written that the capital gains tax constitutes double taxation. "First, most capital gains come from the sale of financial assets like stock. But publicly held companies have to pay corporate income tax....Capital gains is a second tax on that income when the stock is sold."</span><sup class="reference" data-dcnode-id="3157" id="cite_ref-Moore_24-0"><a data-dcnode-id="3158" href="#cite_note-Moore-24"><span data-dcnode-id="3159" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3156" instrument_node="">
</span></p><p data-dcnode-id="3144"><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Epstein" title="Richard Epstein"><span data-dcnode-id="3154" instrument_node="">Richard Epstein</span></a><span data-dcnode-id="3152" instrument_node=""> says that the capital-gains tax "slows down the shift in wealth from less to more productive uses" by imposing a cost on the decision to shift assets. He favors repeal or a </span><a class="mw-redirect" data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rollover_%28finance%29" title="Rollover (finance)"><span data-dcnode-id="3151" instrument_node="">rollover</span></a><span data-dcnode-id="3149" instrument_node=""> provision to defer the tax on gains that are reinvested.</span><sup class="reference" data-dcnode-id="3146" id="cite_ref-25"><a data-dcnode-id="3147" href="#cite_note-25"><span data-dcnode-id="3148" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3145" instrument_node="">
</span></p><span data-dcnode-id="3143" instrument_node="">
</span><h3 data-dcnode-id="3133"><span class="mw-headline" data-dcnode-id="3141" id="Preferential_rate"><span data-dcnode-id="3142" instrument_node="">Preferential rate</span></span><span class="mw-editsection" data-dcnode-id="3134"><span class="mw-editsection-bracket" data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">[</span></span><a data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Preferential rate"><span data-dcnode-id="3138" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3131" instrument_node="">The fact that the long-term capital gains rate is lower than the rate on ordinary income is regarded by the </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Left-wing_politics" title="Left-wing politics"><span data-dcnode-id="3130" instrument_node="">political left</span></a><span data-dcnode-id="3128" instrument_node="">, such as Sen. </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernie_Sanders" title="Bernie Sanders"><span data-dcnode-id="3127" instrument_node="">Bernie Sanders</span></a><span data-dcnode-id="3125" instrument_node="">, as a "tax break" that excuses investors from paying their "fair share."</span><sup class="reference" data-dcnode-id="3122" id="cite_ref-Sanders_20-1"><a data-dcnode-id="3123" href="#cite_note-Sanders-20"><span data-dcnode-id="3124" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="3119" id="cite_ref-26"><a data-dcnode-id="3120" href="#cite_note-26"><span data-dcnode-id="3121" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3118" instrument_node=""> The tax benefit for a long-term capital gain is sometimes referred to as a "tax expenditure" that government could elect to stop spending.</span><sup class="reference" data-dcnode-id="3115" id="cite_ref-27"><a data-dcnode-id="3116" href="#cite_note-27"><span data-dcnode-id="3117" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3114" instrument_node=""> By contrast, Republicans favor lowering the capital gain tax rate as an inducement to saving and investment. Also, the lower rate partly compensates for the fact that some capital gains are illusory and reflect nothing but inflation between the time the asset is bought and the time it is sold. Moore writes, "when inflation is high....the tax rate can even rise above 100 percent",</span><sup class="reference" data-dcnode-id="3111" id="cite_ref-Moore_24-1"><a data-dcnode-id="3112" href="#cite_note-Moore-24"><span data-dcnode-id="3113" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3110" instrument_node=""> as when a taxpayer owes tax on a capital gain that does not result in any increase in real wealth.
</span></p><span data-dcnode-id="3108" instrument_node="">
</span><h3 data-dcnode-id="3098"><span class="mw-headline" data-dcnode-id="3106" id="Holding_period"><span data-dcnode-id="3107" instrument_node="">Holding period</span></span><span class="mw-editsection" data-dcnode-id="3099"><span class="mw-editsection-bracket" data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">[</span></span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Holding period"><span data-dcnode-id="3103" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3068"><span data-dcnode-id="3096" instrument_node="">The one-year threshold between short-term and long-term capital gains is arbitrary and has changed over time. Short-term gains are disparaged as </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speculation" title="Speculation"><span data-dcnode-id="3095" instrument_node="">speculation</span></a><span data-dcnode-id="3093" instrument_node=""> and are perceived as self-interested, myopic, and destabilizing,</span><sup class="reference" data-dcnode-id="3090" id="cite_ref-28"><a data-dcnode-id="3091" href="#cite_note-28"><span data-dcnode-id="3092" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3089" instrument_node=""> while long-term gains are characterized as </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investment" title="Investment"><span data-dcnode-id="3088" instrument_node="">investment</span></a><span data-dcnode-id="3086" instrument_node="">, which supposedly reflects a more stable commitment that is in the nation's interest. Others call this a false dichotomy.</span><sup class="reference" data-dcnode-id="3083" id="cite_ref-29"><a data-dcnode-id="3084" href="#cite_note-29"><span data-dcnode-id="3085" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3082" instrument_node="">
The holding period to qualify for favorable tax treatment has varied from six months to ten years (see </span><a data-dcnode-id="3080" href="#History"><span data-dcnode-id="3081" instrument_node="">History</span></a><span data-dcnode-id="3079" instrument_node=""> above). There was special treatment of assets held for five years during the Presidency of </span><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="3078" instrument_node="">George W. Bush</span></a><span data-dcnode-id="3076" instrument_node="">. In her 2016 Presidential campaign, </span><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hillary_Clinton" title="Hillary Clinton"><span data-dcnode-id="3075" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="3073" instrument_node=""> advocated holding periods of up to six years with a sliding scale of tax rates.</span><sup class="reference" data-dcnode-id="3070" id="cite_ref-30"><a data-dcnode-id="3071" href="#cite_note-30"><span data-dcnode-id="3072" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3069" instrument_node="">
</span></p><span data-dcnode-id="3067" instrument_node="">
</span><h3 data-dcnode-id="3057"><span class="mw-headline" data-dcnode-id="3065" id="Carried_interest"><span data-dcnode-id="3066" instrument_node="">Carried interest</span></span><span class="mw-editsection" data-dcnode-id="3058"><span class="mw-editsection-bracket" data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">[</span></span><a data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Carried interest"><span data-dcnode-id="3062" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3041"><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carried_interest" title="Carried interest"><span data-dcnode-id="3055" instrument_node="">Carried interest</span></a><span data-dcnode-id="3053" instrument_node=""> is the share of any profits that the general partners of </span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_equity" title="Private equity"><span data-dcnode-id="3052" instrument_node="">private equity</span></a><span data-dcnode-id="3050" instrument_node=""> funds receive as compensation, despite not contributing any initial funds.</span><sup class="reference" data-dcnode-id="3047" id="cite_ref-31"><a data-dcnode-id="3048" href="#cite_note-31"><span data-dcnode-id="3049" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3046" instrument_node=""> The manager may also receive compensation that is a percentage of the assets under management.</span><sup class="reference" data-dcnode-id="3043" id="cite_ref-cbo.gov_32-0"><a data-dcnode-id="3044" href="#cite_note-cbo.gov-32"><span data-dcnode-id="3045" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3042" instrument_node="">
Tax law provides that when such managers take, as a fee, a portion of the gain realized in connection with the investments they manage, the manager's gain is afforded the same tax treatment as the client's gain. Thus, where the client realizes long-term capital gains, the manager's gain is a long-term capital gain—generally resulting in a lower tax rate for the manager than would be the case if the manager's income were not treated as a long-term capital gain. Under this treatment, the tax on a long-term gain does not depend on how investors and managers divide the gain.
</span></p><p data-dcnode-id="3019"><span data-dcnode-id="3040" instrument_node="">This tax treatment is often called the "hedge-fund loophole",</span><sup class="reference" data-dcnode-id="3037" id="cite_ref-33"><a data-dcnode-id="3038" href="#cite_note-33"><span data-dcnode-id="3039" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3036" instrument_node=""> even though it is private equity funds that benefit from the treatment; hedge funds usually do not have long-term gains.</span><sup class="reference" data-dcnode-id="3033" id="cite_ref-34"><a data-dcnode-id="3034" href="#cite_note-34"><span data-dcnode-id="3035" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3032" instrument_node=""> It has been criticized as "indefensible" and a "gross unfairness",</span><sup class="reference" data-dcnode-id="3029" id="cite_ref-35"><a data-dcnode-id="3030" href="#cite_note-35"><span data-dcnode-id="3031" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3028" instrument_node=""> because it taxes management services at a preferential rate intended for long-term gains. Warren Buffett has used the term "coddling the super rich".</span><sup class="reference" data-dcnode-id="3025" id="cite_ref-36"><a data-dcnode-id="3026" href="#cite_note-36"><span data-dcnode-id="3027" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3024" instrument_node="">  One counterargument is that the preferential rate is warranted because a grant of carried interest is often deferred and contingent, making it less reliable than a regular salary.</span><sup class="reference" data-dcnode-id="3021" id="cite_ref-37"><a data-dcnode-id="3022" href="#cite_note-37"><span data-dcnode-id="3023" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3020" instrument_node="">
</span></p><p data-dcnode-id="3013"><span data-dcnode-id="3018" instrument_node="">The 2017 tax reform established a three-year holding period for these fund managers to qualify for the long-term capital-gains preference.</span><sup class="reference" data-dcnode-id="3015" id="cite_ref-Reuters2017_38-0"><a data-dcnode-id="3016" href="#cite_note-Reuters2017-38"><span data-dcnode-id="3017" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3014" instrument_node="">
</span></p><span data-dcnode-id="3012" instrument_node="">
</span><h2 data-dcnode-id="3002"><span class="mw-headline" data-dcnode-id="3010" id="Effects"><span data-dcnode-id="3011" instrument_node="">Effects</span></span><span class="mw-editsection" data-dcnode-id="3003"><span class="mw-editsection-bracket" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">[</span></span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D18" title="Edit section: Effects"><span data-dcnode-id="3007" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="3000" instrument_node="">The capital gains tax raises money for government but penalizes investment (by reducing the final rate of return). Proposals to change the tax rate from the current rate are accompanied by predictions on how it will affect both results. For example, an increase of the tax rate would be more of a disincentive to invest in assets, but would seem to raise more money for government. However, the </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laffer_curve" title="Laffer curve"><span data-dcnode-id="2999" instrument_node="">Laffer curve</span></a><span data-dcnode-id="2997" instrument_node=""> suggests that the revenue increase might not be linear and might even be a decrease, as Laffer's "economic effect" begins to outweigh the "arithmetic effect."</span><sup class="reference" data-dcnode-id="2994" id="cite_ref-39"><a data-dcnode-id="2995" href="#cite_note-39"><span data-dcnode-id="2996" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2993" instrument_node=""> For example, a 10% rate increase (such as from 20% to 22%) might raise less than 10% additional tax revenue by inhibiting some transactions. Laffer postulated that a 100% tax rate results in no tax revenue.
</span></p><p data-dcnode-id="2986"><span data-dcnode-id="2991" instrument_node="">Another economic effect that might make receipts differ from those predicted is that the United States competes for capital with other countries. A change in the capital gains rate could attract more foreign investment, or drive United States investors to invest abroad.</span><sup class="reference" data-dcnode-id="2988" id="cite_ref-Robert_Wood_40-0"><a data-dcnode-id="2989" href="#cite_note-Robert_Wood-40"><span data-dcnode-id="2990" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2987" instrument_node="">
</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2985" instrument_node="">Congress sometimes directs the </span><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congressional_Budget_Office" title="Congressional Budget Office"><span data-dcnode-id="2984" instrument_node="">Congressional Budget Office</span></a><span data-dcnode-id="2982" instrument_node=""> (CBO) to estimate the effects of a bill to change the tax code. It is contentious on partisan grounds whether to direct the CBO to use </span><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dynamic_scoring" title="Dynamic scoring"><span data-dcnode-id="2981" instrument_node="">dynamic scoring</span></a><sup class="reference" data-dcnode-id="2977" id="cite_ref-Lawler_41-0"><a data-dcnode-id="2978" href="#cite_note-Lawler-41"><span data-dcnode-id="2979" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2976" instrument_node=""> (to include economic effects), or static scoring that does not consider the bill's effect on the incentives of taxpayers. After failing to enact the </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budget_and_Accounting_Transparency_Act_of_2014" title="Budget and Accounting Transparency Act of 2014"><span data-dcnode-id="2975" instrument_node="">Budget and Accounting Transparency Act of 2014</span></a><span data-dcnode-id="2973" instrument_node="">,</span><sup class="reference" data-dcnode-id="2970" id="cite_ref-42"><a data-dcnode-id="2971" href="#cite_note-42"><span data-dcnode-id="2972" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2969" instrument_node=""> Republicans mandated dynamic scoring in a rule change at the start of 2015, to apply to the Fiscal Year 2016 and subsequent budgets.</span><sup class="reference" data-dcnode-id="2966" id="cite_ref-43"><a data-dcnode-id="2967" href="#cite_note-43"><span data-dcnode-id="2968" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2965" instrument_node="">
</span></p><span data-dcnode-id="2963" instrument_node="">
</span><h3 data-dcnode-id="2953"><span class="mw-headline" data-dcnode-id="2961" id="Measuring_the_effect_on_the_economy"><span data-dcnode-id="2962" instrument_node="">Measuring the effect on the economy</span></span><span class="mw-editsection" data-dcnode-id="2954"><span class="mw-editsection-bracket" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">[</span></span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D19" title="Edit section: Measuring the effect on the economy"><span data-dcnode-id="2958" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2939"><span data-dcnode-id="2951" instrument_node="">Supporters of cuts in capital gains tax rates may argue that the current rate is on the falling side of the Laffer curve (past a point of </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diminishing_returns" title="Diminishing returns"><span data-dcnode-id="2950" instrument_node="">diminishing returns</span></a><span data-dcnode-id="2948" instrument_node="">) — that it is so high that its disincentive effect is dominant, and thus that a rate cut would "pay for itself."</span><sup class="reference" data-dcnode-id="2945" id="cite_ref-Lawler_41-1"><a data-dcnode-id="2946" href="#cite_note-Lawler-41"><span data-dcnode-id="2947" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2944" instrument_node=""> Opponents of cutting the capital gains tax rate argue the correlation between top tax rate and total economic growth is inconclusive.</span><sup class="reference" data-dcnode-id="2941" id="cite_ref-study_44-0"><a data-dcnode-id="2942" href="#cite_note-study-44"><span data-dcnode-id="2943" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2940" instrument_node="">
</span></p><p data-dcnode-id="2920"><span data-dcnode-id="2938" instrument_node="">Mark LaRochelle wrote on the conservative website </span><i data-dcnode-id="2935"><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Events" title="Human Events"><span data-dcnode-id="2937" instrument_node="">Human Events</span></a></i><span data-dcnode-id="2934" instrument_node=""> that cutting the capital gains rate increases employment. He presented a U.S. Treasury chart to assert that "in general, capital gains taxes and GDP have an inverse relationship: when the rate goes up, the economy goes down". He also cited statistical correlation based on tax rate changes during the presidencies of </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="2933" instrument_node="">George W. Bush</span></a><span data-dcnode-id="2931" instrument_node="">, </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Clinton" title="Bill Clinton"><span data-dcnode-id="2930" instrument_node="">Bill Clinton</span></a><span data-dcnode-id="2928" instrument_node="">, and </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="2927" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="2925" instrument_node="">.</span><sup class="reference" data-dcnode-id="2922" id="cite_ref-45"><a data-dcnode-id="2923" href="#cite_note-45"><span data-dcnode-id="2924" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2921" instrument_node="">
</span></p><span data-dcnode-id="2919" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2907"><div class="thumbinner" data-dcnode-id="2908" style="width:222px;"><a class="image" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATop_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg"><img alt="" class="thumbimage" data-dcnode-id="2918" data-file-height="448" data-file-width="663" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg/220px-Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg/330px-Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg/440px-Top_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg 2x" width="220"></a><span data-dcnode-id="2916" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2909"><div class="magnify" data-dcnode-id="2914"><a class="internal" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATop_Capital_Gains_Tax_Rates_and_Economic_Growth_1950-2011.jpg" title="Enlarge"></a></div><span data-dcnode-id="2913" instrument_node="">Top tax rates on long-term capital gains and real economic growth (measured as the percentage change in real GDP) from 1950 to 2011. Burman found low correlation (0.12) between low capital gains taxes and economic growth.</span><sup class="reference" data-dcnode-id="2910" id="cite_ref-Burman_46-0"><a data-dcnode-id="2911" href="#cite_note-Burman-46"><span data-dcnode-id="2912" instrument_node="">[46]</span></a></sup></div></div></div><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2905" instrument_node="">However, comparing capital gains tax rates and economic growth in America from 1950 to 2011, </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brookings_Institution" title="Brookings Institution"><span data-dcnode-id="2904" instrument_node="">Brookings Institution</span></a><span data-dcnode-id="2902" instrument_node=""> economist </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonard_Burman" title="Leonard Burman"><span data-dcnode-id="2901" instrument_node="">Leonard Burman</span></a><span data-dcnode-id="2899" instrument_node=""> found "no statistically significant correlation between the two", even after using "lag times of five years." Burman's data are shown in the chart at right.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-study_44-1"><a data-dcnode-id="2897" href="#cite_note-study-44"><span data-dcnode-id="2898" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="2893" id="cite_ref-Burman_46-1"><a data-dcnode-id="2894" href="#cite_note-Burman-46"><span data-dcnode-id="2895" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2892" instrument_node="">
</span></p><p data-dcnode-id="2879"><span data-dcnode-id="2890" instrument_node="">Economist Thomas L. Hungerford of the liberal </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Policy_Institute" title="Economic Policy Institute"><span data-dcnode-id="2889" instrument_node="">Economic Policy Institute</span></a><span data-dcnode-id="2887" instrument_node=""> found "little or even a negative" correlation between capital gains tax reduction and rates of saving and investment, writing: "Saving rates have fallen over the past 30 years while the capital gains tax rate has fallen from 28% in 1987 to 15% today .... This suggests that changing capital gains tax rates have had little effect on private saving".</span><sup class="reference" data-dcnode-id="2884" id="cite_ref-effects_19-1"><a data-dcnode-id="2885" href="#cite_note-effects-19"><span data-dcnode-id="2886" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="2881" id="cite_ref-47"><a data-dcnode-id="2882" href="#cite_note-47"><span data-dcnode-id="2883" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2880" instrument_node="">
</span></p><span data-dcnode-id="2878" instrument_node="">
</span><h3 data-dcnode-id="2868"><span class="mw-headline" data-dcnode-id="2876" id="Factors_that_complicate_measurement"><span data-dcnode-id="2877" instrument_node="">Factors that complicate measurement</span></span><span class="mw-editsection" data-dcnode-id="2869"><span class="mw-editsection-bracket" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">[</span></span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D20" title="Edit section: Factors that complicate measurement"><span data-dcnode-id="2873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2866" instrument_node="">Researchers usually use the top </span><a class="mw-redirect" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marginal_tax_rate" title="Marginal tax rate"><span data-dcnode-id="2865" instrument_node="">marginal tax rate</span></a><span data-dcnode-id="2863" instrument_node=""> to characterize policy as high-tax or low-tax.  This figure measures the disincentive on the largest transactions per additional dollar of taxable income.  However, this might not tell the complete story.  The table </span><a data-dcnode-id="2861" href="#Summary_of_recent_history"><span data-dcnode-id="2862" instrument_node="">Summary of recent history</span></a><span data-dcnode-id="2860" instrument_node=""> above shows that, although the marginal rate is higher now than at any time since 1998, there is also a substantial bracket on which the tax rate is 0%.
</span></p><p data-dcnode-id="2847"><span data-dcnode-id="2858" instrument_node="">Another reason it is hard to prove correlation between the top capital gains rate and total economic output is that changes to the capital gains rate do not occur in isolation, but as part of a tax reform package. They may be accompanied by other measures to boost investment, and Congressional consensus to do so may derive from an economic shock, from which the economy may have been recovering independent of tax reform. A reform package may include increases and decreases in tax rates; the </span><a data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Reform_Act_of_1986" title="Tax Reform Act of 1986"><span data-dcnode-id="2857" instrument_node="">Tax Reform Act of 1986</span></a><span data-dcnode-id="2855" instrument_node=""> increased the top capital gains rate, from 20% to 28%, as a compromise for reducing the top rate on ordinary income from 50% to 28%.</span><sup class="reference" data-dcnode-id="2852" id="cite_ref-48"><a data-dcnode-id="2853" href="#cite_note-48"><span data-dcnode-id="2854" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="2849" id="cite_ref-49"><a data-dcnode-id="2850" href="#cite_note-49"><span data-dcnode-id="2851" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2848" instrument_node="">
</span></p><span data-dcnode-id="2846" instrument_node="">
</span><h2 data-dcnode-id="2836"><span class="mw-headline" data-dcnode-id="2844" id="Tax_avoidance_strategies"><span data-dcnode-id="2845" instrument_node="">Tax avoidance strategies</span></span><span class="mw-editsection" data-dcnode-id="2837"><span class="mw-editsection-bracket" data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">[</span></span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D21" title="Edit section: Tax avoidance strategies"><span data-dcnode-id="2841" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2835" instrument_node="">
</span><link data-dcnode-id="2834" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2830" role="note"><span data-dcnode-id="2833" instrument_node="">Further information: </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_avoidance" title="Tax avoidance"><span data-dcnode-id="2832" instrument_node="">tax avoidance</span></a></div><span data-dcnode-id="2829" instrument_node="">
