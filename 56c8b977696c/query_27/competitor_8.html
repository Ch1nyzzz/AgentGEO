</span><h3 data-dcnode-id="2819"><span class="mw-headline" data-dcnode-id="2827" id="Strategic_losses"><span data-dcnode-id="2828" instrument_node="">Strategic losses</span></span><span class="mw-editsection" data-dcnode-id="2820"><span class="mw-editsection-bracket" data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">[</span></span><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D22" title="Edit section: Strategic losses"><span data-dcnode-id="2824" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2817" instrument_node="">The ability to use capital losses to offset capital gains in the same year is discussed </span><a data-dcnode-id="2815" href="#Capital_losses"><span data-dcnode-id="2816" instrument_node="">above</span></a><span data-dcnode-id="2814" instrument_node="">. Toward the end of a tax year, some investors sell assets that are worth less than the investor paid for them to obtain this tax benefit.
</span></p><p data-dcnode-id="2804"><span data-dcnode-id="2812" instrument_node="">A </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wash_sale" title="Wash sale"><span data-dcnode-id="2811" instrument_node="">wash sale</span></a><span data-dcnode-id="2809" instrument_node="">, in which the investor sells an asset and buys it (or a similar asset) right back, cannot be treated as a loss at all, although there are other potential tax benefits as consolation.</span><sup class="reference" data-dcnode-id="2806" id="cite_ref-50"><a data-dcnode-id="2807" href="#cite_note-50"><span data-dcnode-id="2808" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2805" instrument_node="">
</span></p><p data-dcnode-id="2796"><span data-dcnode-id="2803" instrument_node="">In January, a new tax year begins; if stock prices increase, analysts may attribute the increase to an absence of such end-of-year selling and say there is a </span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/January_effect" title="January effect"><span data-dcnode-id="2802" instrument_node="">January effect</span></a><span data-dcnode-id="2800" instrument_node="">.  A </span><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santa_Claus_rally" title="Santa Claus rally"><span data-dcnode-id="2799" instrument_node="">Santa Claus rally</span></a><span data-dcnode-id="2797" instrument_node=""> is an increase in stock prices at the end of the year, perhaps in anticipation of a January effect.
</span></p><span data-dcnode-id="2795" instrument_node="">
</span><h3 data-dcnode-id="2785"><span class="mw-headline" data-dcnode-id="2793" id="Versus_purchase"><span data-dcnode-id="2794" instrument_node="">Versus purchase</span></span><span class="mw-editsection" data-dcnode-id="2786"><span class="mw-editsection-bracket" data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">[</span></span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D23" title="Edit section: Versus purchase"><span data-dcnode-id="2790" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2776"><span data-dcnode-id="2783" instrument_node="">A taxpayer can designate that a sale of corporate stock corresponds to a specified purchase. For example, the taxpayer holding 500 shares may have bought 100 shares each on five occasions, probably at a different price each time. The individual </span><b data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">lots</span></b><span data-dcnode-id="2780" instrument_node=""> of 100 shares are typically not held separate; even in the days of physical </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock_certificate" title="Stock certificate"><span data-dcnode-id="2779" instrument_node="">stock certificates</span></a><span data-dcnode-id="2777" instrument_node="">, there was no indication which stock was bought when. If the taxpayer sells 100 shares, then by designating which of the five lots is being sold, the taxpayer will realize one of five different capital gains or losses. The taxpayer can maximize or minimize the gain depending on an overall strategy, such as generating losses to offset gains, or keeping the total in the range that is taxed at a lower rate or not at all.
</span></p><p data-dcnode-id="2767"><span data-dcnode-id="2775" instrument_node="">To use this strategy, the taxpayer must specify </span><i data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">at the time of a sale</span></i><span data-dcnode-id="2772" instrument_node=""> which lot is being sold (creating a "contemporaneous record"). This "versus purchase" sale is versus (against) a specified purchase. On brokerage websites, a "Lot Selector" may let the taxpayer specify the purchase to which a sell order corresponds.</span><sup class="reference" data-dcnode-id="2769" id="cite_ref-51"><a data-dcnode-id="2770" href="#cite_note-51"><span data-dcnode-id="2771" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2768" instrument_node="">
</span></p><span data-dcnode-id="2766" instrument_node="">
</span><h3 data-dcnode-id="2756"><span class="mw-headline" data-dcnode-id="2764" id="Primary_residence"><span data-dcnode-id="2765" instrument_node="">Primary residence</span></span><span class="mw-editsection" data-dcnode-id="2757"><span class="mw-editsection-bracket" data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">[</span></span><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D24" title="Edit section: Primary residence"><span data-dcnode-id="2761" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2754" instrument_node="">Section 121</span><sup class="reference" data-dcnode-id="2751" id="cite_ref-52"><a data-dcnode-id="2752" href="#cite_note-52"><span data-dcnode-id="2753" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2750" instrument_node=""> lets an individual exclude from gross income up to $250,000 ($500,000 for a married couple filing jointly) of gains on the sale of real property if the owner owned and used it as </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_residence" title="Primary residence"><span data-dcnode-id="2749" instrument_node="">primary residence</span></a><span data-dcnode-id="2747" instrument_node=""> for two of the five years before the date of sale. The two years of residency do not have to be continuous. An individual may meet the ownership and use tests during different 2-year periods. A taxpayer can move and claim the primary-residence exclusion every two years if living in an area where home prices are rising rapidly.
</span></p><p data-dcnode-id="2736"><span data-dcnode-id="2745" instrument_node="">The tests may be waived for military service, disability, partial residence, unforeseen events, and other reasons. Moving to shorten one's commute to a new job is not an unforeseen event.</span><sup class="reference" data-dcnode-id="2742" id="cite_ref-53"><a data-dcnode-id="2743" href="#cite_note-53"><span data-dcnode-id="2744" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2741" instrument_node=""> Bankruptcy of an employer that induces a move to a different city is likely an unforeseen event, but the exclusion will be pro-rated if one has stayed in the home less than two years.</span><sup class="reference" data-dcnode-id="2738" id="cite_ref-54"><a data-dcnode-id="2739" href="#cite_note-54"><span data-dcnode-id="2740" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2737" instrument_node="">
</span></p><p data-dcnode-id="2730"><span data-dcnode-id="2735" instrument_node="">The amount of this exclusion is not increased for home ownership beyond five years.</span><sup class="reference" data-dcnode-id="2732" id="cite_ref-55"><a data-dcnode-id="2733" href="#cite_note-55"><span data-dcnode-id="2734" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2731" instrument_node=""> One is not able to deduct a loss on the sale of one's home.
</span></p><p data-dcnode-id="2714"><span data-dcnode-id="2729" instrument_node="">The exclusion is calculated in a pro-rata manner, based on the number of years used as a residence and the number of years the house is rented-out.</span><sup class="reference" data-dcnode-id="2726" id="cite_ref-CPAjournal2009_56-0"><a data-dcnode-id="2727" href="#cite_note-CPAjournal2009-56"><span data-dcnode-id="2728" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="2723" id="cite_ref-TaxAdviser2009_57-0"><a data-dcnode-id="2724" href="#cite_note-TaxAdviser2009-57"><span data-dcnode-id="2725" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="2720" id="cite_ref-flores_58-0"><a data-dcnode-id="2721" href="#cite_note-flores-58"><span data-dcnode-id="2722" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2719" instrument_node="">   For example, if a house is purchased, then rented-out for 4 years, then lived-in for 3 years, then sold, the owner is entitled to 3/7 of the exclusion.</span><sup class="reference" data-dcnode-id="2716" id="cite_ref-59"><a data-dcnode-id="2717" href="#cite_note-59"><span data-dcnode-id="2718" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2715" instrument_node="">  This method of calculating the primary residence exclusion was implemented in 2008, aimed at eliminating a loophole where owners could rent out a house for many years, then move into it for two years and get the full exclusion.
</span></p><span data-dcnode-id="2713" instrument_node="">
</span><h3 data-dcnode-id="2703"><span class="mw-headline" data-dcnode-id="2711" id="Deferral_strategies"><span data-dcnode-id="2712" instrument_node="">Deferral strategies</span></span><span class="mw-editsection" data-dcnode-id="2704"><span class="mw-editsection-bracket" data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">[</span></span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D25" title="Edit section: Deferral strategies"><span data-dcnode-id="2708" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2701" instrument_node="">Taxpayers can defer capital gains taxes to a future tax year using the following strategies:</span><sup class="reference" data-dcnode-id="2698" id="cite_ref-60"><a data-dcnode-id="2699" href="#cite_note-60"><span data-dcnode-id="2700" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2697" instrument_node="">
</span></p><span data-dcnode-id="2695" instrument_node="">
</span><ul data-dcnode-id="2650"><li data-dcnode-id="2685"><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Code_section_1031" title="Internal Revenue Code section 1031"><span data-dcnode-id="2694" instrument_node="">Section 1031 exchange</span></a><span data-dcnode-id="2692" instrument_node="">—If a business sells property but uses the proceeds to buy similar property, it may be treated as a "like kind" exchange. Tax is not due based on the sale; instead, the cost basis of the original property is applied to the new property.</span><sup class="reference" data-dcnode-id="2689" id="cite_ref-Sec1031_61-0"><a data-dcnode-id="2690" href="#cite_note-Sec1031-61"><span data-dcnode-id="2691" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="2686" id="cite_ref-62"><a data-dcnode-id="2687" href="#cite_note-62"><span data-dcnode-id="2688" instrument_node="">[62]</span></a></sup></li><span data-dcnode-id="2684" instrument_node="">
</span><li data-dcnode-id="2670"><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structured_sale" title="Structured sale"><span data-dcnode-id="2683" instrument_node="">Structured sales</span></a><span data-dcnode-id="2681" instrument_node="">, such as the self-directed installment sale, are sales that use a third party, in the style of an </span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annuity" title="Annuity"><span data-dcnode-id="2680" instrument_node="">annuity</span></a><span data-dcnode-id="2678" instrument_node="">. They permit sellers to defer recognition of gains on the sale of a business or real estate to the tax year in which the proceeds are received.</span><sup class="reference" data-dcnode-id="2675" id="cite_ref-63"><a data-dcnode-id="2676" href="#cite_note-63"><span data-dcnode-id="2677" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2674" instrument_node=""> Fees and complications should be weighed against the tax savings.</span><sup class="reference" data-dcnode-id="2671" id="cite_ref-64"><a data-dcnode-id="2672" href="#cite_note-64"><span data-dcnode-id="2673" instrument_node="">[64]</span></a></sup></li><span data-dcnode-id="2669" instrument_node="">
</span><li data-dcnode-id="2662"><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charitable_trust" title="Charitable trust"><span data-dcnode-id="2668" instrument_node="">Charitable trusts</span></a><span data-dcnode-id="2666" instrument_node="">, set up to transfer assets to a charity upon death or after a term of years, normally avoid capital gains taxes on the appreciation of the assets, while allowing the original owner to benefit from the asset in the meantime.</span><sup class="reference" data-dcnode-id="2663" id="cite_ref-65"><a data-dcnode-id="2664" href="#cite_note-65"><span data-dcnode-id="2665" instrument_node="">[65]</span></a></sup></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2651"><a class="mw-redirect" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opportunity_Zone" title="Opportunity Zone"><span data-dcnode-id="2660" instrument_node="">Opportunity Zone</span></a><span data-dcnode-id="2658" instrument_node="">—Under the </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="2657" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="2655" instrument_node="">, investors who reinvest gains into a designated low-income "opportunity zone" can defer paying capital gains tax until 2026, or as long as they hold the reinvestment, and can reduce or eliminate capital gain liability depending on the number of years they own it.</span><sup class="reference" data-dcnode-id="2652" id="cite_ref-66"><a data-dcnode-id="2653" href="#cite_note-66"><span data-dcnode-id="2654" instrument_node="">[66]</span></a></sup></li></ul><span data-dcnode-id="2649" instrument_node="">
</span><h2 data-dcnode-id="2639"><span class="mw-headline" data-dcnode-id="2647" id="Proposals"><span data-dcnode-id="2648" instrument_node="">Proposals</span></span><span class="mw-editsection" data-dcnode-id="2640"><span class="mw-editsection-bracket" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">[</span></span><a data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D26" title="Edit section: Proposals"><span data-dcnode-id="2644" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2638" instrument_node="">
</span><h3 data-dcnode-id="2628"><span class="mw-headline" data-dcnode-id="2636" id="Simpson-Bowles"><span data-dcnode-id="2637" instrument_node="">Simpson-Bowles</span></span><span class="mw-editsection" data-dcnode-id="2629"><span class="mw-editsection-bracket" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">[</span></span><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D27" title="Edit section: Simpson-Bowles"><span data-dcnode-id="2633" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2626" instrument_node="">In 2011, President </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="2625" instrument_node="">Barack Obama</span></a><span data-dcnode-id="2623" instrument_node=""> signed </span><a class="external text" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamawhitehouse.archives.gov/the-press-office/executive-order-national-commission-fiscal-responsibility-and-reform" rel="nofollow"><span data-dcnode-id="2622" instrument_node="">Executive Order 13531</span></a><span data-dcnode-id="2620" instrument_node=""> establishing the </span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Commission_on_Fiscal_Responsibility_and_Reform" title="National Commission on Fiscal Responsibility and Reform"><span data-dcnode-id="2619" instrument_node="">National Commission on Fiscal Responsibility and Reform</span></a><span data-dcnode-id="2617" instrument_node=""> (the "Simpson-Bowles Commission") to identify "policies to improve the fiscal situation in the medium term and to achieve fiscal sustainability over the long run". The </span><a class="external text" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20160513085723/https%3A//www.fiscalcommission.gov/sites/fiscalcommission.gov/files/documents/TheMomentofTruth12_1_2010.pdf" rel="nofollow"><span data-dcnode-id="2616" instrument_node="">Commission's final report</span></a><span data-dcnode-id="2614" instrument_node=""> took the same approach as the 1986 reform: eliminate the preferential tax rate for long-term capital gains in exchange for a lower top rate on ordinary income.</span><sup class="reference" data-dcnode-id="2611" id="cite_ref-67"><a data-dcnode-id="2612" href="#cite_note-67"><span data-dcnode-id="2613" instrument_node="">[67]</span></a></sup><span data-dcnode-id="2610" instrument_node="">
</span></p><p data-dcnode-id="2600"><span data-dcnode-id="2608" instrument_node="">The tax change proposals made by the National Commission on Fiscal Responsibility and Reform were never introduced. Republicans supported the proposed fiscal policy changes, yet Obama failed to garner support among fellow Democrats; During the 2012 election, presidential candidate </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitt_Romney" title="Mitt Romney"><span data-dcnode-id="2607" instrument_node="">Mitt Romney</span></a><span data-dcnode-id="2605" instrument_node=""> faulted Obama for "missing the bus" on his own Commission.</span><sup class="reference" data-dcnode-id="2602" id="cite_ref-Politifact2012_68-0"><a data-dcnode-id="2603" href="#cite_note-Politifact2012-68"><span data-dcnode-id="2604" instrument_node="">[68]</span></a></sup><span data-dcnode-id="2601" instrument_node="">
</span></p><span data-dcnode-id="2599" instrument_node="">
</span><h3 data-dcnode-id="2589"><span class="mw-headline" data-dcnode-id="2597" id="In_the_2016_campaign"><span data-dcnode-id="2598" instrument_node="">In the 2016 campaign</span></span><span class="mw-editsection" data-dcnode-id="2590"><span class="mw-editsection-bracket" data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">[</span></span><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D28" title="Edit section: In the 2016 campaign"><span data-dcnode-id="2594" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2587" instrument_node="">Tax policy was a part of the </span><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_United_States_presidential_election" title="2016 United States presidential election"><span data-dcnode-id="2586" instrument_node="">2016 presidential campaign</span></a><span data-dcnode-id="2584" instrument_node="">, as candidates proposed changes to the tax code that affect the capital gains tax.
</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2582" instrument_node="">President </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="2581" instrument_node="">Donald Trump</span></a><span data-dcnode-id="2579" instrument_node="">'s main proposed change to the capital gains tax was to repeal the 3.8% Medicare surtax that took effect in 2013. He also proposed to repeal the </span><a class="mw-redirect" data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_Minimum_Tax" title="Alternative Minimum Tax"><span data-dcnode-id="2578" instrument_node="">Alternative Minimum Tax</span></a><span data-dcnode-id="2576" instrument_node="">, which would reduce tax liability for taxpayers with large incomes including capital gains. His maximum tax rate of 15% on businesses could result in lower capital gains taxes. However, as well as lowering tax rates on ordinary income, he would lower the dollar amounts for the remaining tax brackets, which would subject more individual capital gains to the top (20%) tax rate.</span><sup class="reference" data-dcnode-id="2573" id="cite_ref-69"><a data-dcnode-id="2574" href="#cite_note-69"><span data-dcnode-id="2575" instrument_node="">[69]</span></a></sup><span data-dcnode-id="2572" instrument_node=""> Other Republican candidates proposed to lower the capital gains tax (</span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ted_Cruz" title="Ted Cruz"><span data-dcnode-id="2571" instrument_node="">Ted Cruz</span></a><span data-dcnode-id="2569" instrument_node=""> proposed a 10% rate), or eliminate it entirely (such as </span><a data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marco_Rubio" title="Marco Rubio"><span data-dcnode-id="2568" instrument_node="">Marco Rubio</span></a><span data-dcnode-id="2566" instrument_node="">).</span><sup class="reference" data-dcnode-id="2563" id="cite_ref-70"><a data-dcnode-id="2564" href="#cite_note-70"><span data-dcnode-id="2565" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2562" instrument_node="">
</span></p><p data-dcnode-id="2529"><span data-dcnode-id="2560" instrument_node="">Democratic nominee </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hillary_Clinton" title="Hillary Clinton"><span data-dcnode-id="2559" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="2557" instrument_node=""> proposed to increase the capital gains tax rate for high-income taxpayers by "creating several new, higher ordinary rates",</span><sup class="reference" data-dcnode-id="2554" id="cite_ref-Forbes2016_71-0"><a data-dcnode-id="2555" href="#cite_note-Forbes2016-71"><span data-dcnode-id="2556" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2553" instrument_node=""> and proposed a sliding scale for long-term capital gains, based on the time the asset was owned, up to 6 years.</span><sup class="reference" data-dcnode-id="2550" id="cite_ref-Forbes2016_71-1"><a data-dcnode-id="2551" href="#cite_note-Forbes2016-71"><span data-dcnode-id="2552" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2549" instrument_node=""> Gains on assets held from one to two years would be reclassified short-term</span><sup class="reference" data-dcnode-id="2546" id="cite_ref-72"><a data-dcnode-id="2547" href="#cite_note-72"><span data-dcnode-id="2548" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2545" instrument_node=""> and taxed as ordinary income, at an effective rate of up to 43.4%, and long-term assets not held for a full 6 years would also be taxed at a higher rate.</span><sup class="reference" data-dcnode-id="2542" id="cite_ref-73"><a data-dcnode-id="2543" href="#cite_note-73"><span data-dcnode-id="2544" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2541" instrument_node=""> Clinton also proposed to treat carried interest (see </span><a data-dcnode-id="2539" href="#Carried_interest"><span data-dcnode-id="2540" instrument_node="">above</span></a><span data-dcnode-id="2538" instrument_node="">) as ordinary income, increasing the tax on it, to impose a tax on "high-frequency" trading, and to take other steps.</span><sup class="reference" data-dcnode-id="2535" id="cite_ref-74"><a data-dcnode-id="2536" href="#cite_note-74"><span data-dcnode-id="2537" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2534" instrument_node=""> Bernie Sanders proposed to treat many capital gains as ordinary income, and increase the Medicare surtax to 6%, resulting in a top effective rate of 60% on some capital gains.</span><sup class="reference" data-dcnode-id="2531" id="cite_ref-Forbes2016_71-2"><a data-dcnode-id="2532" href="#cite_note-Forbes2016-71"><span data-dcnode-id="2533" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2530" instrument_node="">
</span></p><span data-dcnode-id="2528" instrument_node="">
</span><h3 data-dcnode-id="2518"><span class="mw-headline" data-dcnode-id="2526" id="In_the_115th_Congress"><span data-dcnode-id="2527" instrument_node="">In the 115th Congress</span></span><span class="mw-editsection" data-dcnode-id="2519"><span class="mw-editsection-bracket" data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">[</span></span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D29" title="Edit section: In the 115th Congress"><span data-dcnode-id="2523" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2516" instrument_node="">The Republican Party introduced the </span><a data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Health_Care_Act_of_2017" title="American Health Care Act of 2017"><span data-dcnode-id="2515" instrument_node="">American Health Care Act of 2017</span></a><span data-dcnode-id="2513" instrument_node=""> (</span><a class="external text" data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/115th-congress/house-bill/1628" rel="nofollow"><span data-dcnode-id="2512" instrument_node="">House Bill 1628</span></a><span data-dcnode-id="2510" instrument_node="">), which would amend the </span><a class="mw-redirect" data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patient_Protection_and_Affordable_Care_Act" title="Patient Protection and Affordable Care Act"><span data-dcnode-id="2509" instrument_node="">Patient Protection and Affordable Care Act</span></a><span data-dcnode-id="2507" instrument_node=""> ("ACA" or "Obamacare") to repeal the 3.8% tax on all investment income for high-income taxpayers</span><sup class="reference" data-dcnode-id="2504" id="cite_ref-75"><a data-dcnode-id="2505" href="#cite_note-75"><span data-dcnode-id="2506" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2503" instrument_node=""> and the 2.5% "shared responsibility payment" ("individual mandate") for taxpayers who do not have an acceptable insurance policy, which applies to capital gains.</span><sup class="reference" data-dcnode-id="2500" id="cite_ref-76"><a data-dcnode-id="2501" href="#cite_note-76"><span data-dcnode-id="2502" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2499" instrument_node=""> The House passed this bill but the Senate did not.
</span></p><span data-dcnode-id="2497" instrument_node="">
</span><dl data-dcnode-id="2494"><dt data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">2017 tax reform</span></dt></dl><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2492" instrument_node="">House Bill 1 (the </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_Cuts_and_Jobs_Act_of_2017" title="Tax Cuts and Jobs Act of 2017"><span data-dcnode-id="2491" instrument_node="">Tax Cuts and Jobs Act of 2017</span></a><span data-dcnode-id="2489" instrument_node="">) was released on November 2, 2017 by Chairman </span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kevin_Brady" title="Kevin Brady"><span data-dcnode-id="2488" instrument_node="">Kevin Brady</span></a><span data-dcnode-id="2486" instrument_node=""> of the House Ways and Means Committee. Its treatment of capital gains was comparable to current law, but it roughly doubled the standard deduction, while dropping personal exemptions in favor of a larger child tax credit. President Trump advocated using the bill to also repeal the shared responsibility payment, but Rep. Brady believed doing so would complicate passage.</span><sup class="reference" data-dcnode-id="2483" id="cite_ref-77"><a data-dcnode-id="2484" href="#cite_note-77"><span data-dcnode-id="2485" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2482" instrument_node=""> The House passed H.B. 1 on November 16.
</span></p><p data-dcnode-id="2461"><span data-dcnode-id="2480" instrument_node="">The Senate version of H.B. 1 passed on December 2. It zeroed out the shared responsibility payment, but only beginning in 2019.  Attempts to repeal "versus purchase" sales of stock (see </span><a data-dcnode-id="2478" href="#Versus_purchase"><span data-dcnode-id="2479" instrument_node="">above</span></a><span data-dcnode-id="2477" instrument_node="">),</span><sup class="reference" data-dcnode-id="2474" id="cite_ref-78"><a data-dcnode-id="2475" href="#cite_note-78"><span data-dcnode-id="2476" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2473" instrument_node=""> and to make it harder to exclude gains on the sale of one's personal residence, did not survive the conference committee.</span><sup class="reference" data-dcnode-id="2470" id="cite_ref-79"><a data-dcnode-id="2471" href="#cite_note-79"><span data-dcnode-id="2472" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2469" instrument_node=""> Regarding "carried interest" (see </span><a data-dcnode-id="2467" href="#Carried_interest"><span data-dcnode-id="2468" instrument_node="">above</span></a><span data-dcnode-id="2466" instrument_node="">), the conference committee raised the holding period from one year to three to qualify for long-term capital-gains treatment.</span><sup class="reference" data-dcnode-id="2463" id="cite_ref-Reuters2017_38-1"><a data-dcnode-id="2464" href="#cite_note-Reuters2017-38"><span data-dcnode-id="2465" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2462" instrument_node="">
</span></p><p data-dcnode-id="2449"><span data-dcnode-id="2460" instrument_node="">The tax bills were "scored" to ensure their cost in lower government revenue was small enough to qualify under the Senate's </span><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconciliation_%28United_States_Congress%29" title="Reconciliation (United States Congress)"><span data-dcnode-id="2459" instrument_node="">reconciliation procedure</span></a><span data-dcnode-id="2457" instrument_node="">. The law required this to use dynamic scoring (see </span><a data-dcnode-id="2455" href="#Effects"><span data-dcnode-id="2456" instrument_node="">above</span></a><span data-dcnode-id="2454" instrument_node="">), but Larry Kudlow claimed that the scoring underestimated economic incentives and inflow of capital from abroad.</span><sup class="reference" data-dcnode-id="2451" id="cite_ref-80"><a data-dcnode-id="2452" href="#cite_note-80"><span data-dcnode-id="2453" instrument_node="">[80]</span></a></sup><span data-dcnode-id="2450" instrument_node=""> To improve the scoring, changes to the personal income tax expired at the end of 2025.
</span></p><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Both houses of Congress passed H.B. 1 on December 20 and President Trump signed it into law on December 22.
</span></p><span data-dcnode-id="2446" instrument_node="">
</span><dl data-dcnode-id="2443"><dt data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">"Phase two"</span></dt></dl><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2441" instrument_node="">In March 2018, Trump appointed Kudlow the assistant to the President for Economic Policy and Director of the </span><a data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Economic_Council_%28United_States%29" title="National Economic Council (United States)"><span data-dcnode-id="2440" instrument_node="">National Economic Council</span></a><span data-dcnode-id="2438" instrument_node="">, replacing </span><a class="mw-redirect" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gary_Cohn_%28investment_banker%29" title="Gary Cohn (investment banker)"><span data-dcnode-id="2437" instrument_node="">Gary Cohn</span></a><span data-dcnode-id="2435" instrument_node="">.</span><sup class="reference" data-dcnode-id="2432" id="cite_ref-81"><a data-dcnode-id="2433" href="#cite_note-81"><span data-dcnode-id="2434" instrument_node="">[81]</span></a></sup><span data-dcnode-id="2431" instrument_node=""> Kudlow supports indexing the cost basis of taxable investments to avoid taxing gains that are merely the result of inflation, and has suggested that the law lets Trump direct the IRS to do so without a vote of Congress.</span><sup class="reference" data-dcnode-id="2428" id="cite_ref-82"><a data-dcnode-id="2429" href="#cite_note-82"><span data-dcnode-id="2430" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="2425" id="cite_ref-83"><a data-dcnode-id="2426" href="#cite_note-83"><span data-dcnode-id="2427" instrument_node="">[83]</span></a></sup><span data-dcnode-id="2424" instrument_node=""> The Treasury confirmed it was investigating the idea, but a lead Democrat said it would be “legally dubious” and meet with “stiff and vocal opposition”.</span><sup class="reference" data-dcnode-id="2421" id="cite_ref-84"><a data-dcnode-id="2422" href="#cite_note-84"><span data-dcnode-id="2423" instrument_node="">[84]</span></a></sup><span data-dcnode-id="2420" instrument_node=""> In August 2018, Trump said indexation of capital gains would be "very easy to do", though telling reporters the next day that it might be perceived as benefitting the wealthy.</span><sup class="reference" data-dcnode-id="2417" id="cite_ref-85"><a data-dcnode-id="2418" href="#cite_note-85"><span data-dcnode-id="2419" instrument_node="">[85]</span></a></sup><span data-dcnode-id="2416" instrument_node="">
</span></p><p data-dcnode-id="2405"><span data-dcnode-id="2414" instrument_node="">Trump and Kudlow both announced a "phase two" of tax reform, suggesting a new bill that included a lower capital gains rate.</span><sup class="reference" data-dcnode-id="2411" id="cite_ref-86"><a data-dcnode-id="2412" href="#cite_note-86"><span data-dcnode-id="2413" instrument_node="">[86]</span></a></sup><span data-dcnode-id="2410" instrument_node=""> However, prospects for a follow-on tax bill dimmed after the Democratic Party took the House of Representatives in the 2018 elections.</span><sup class="reference" data-dcnode-id="2407" id="cite_ref-87"><a data-dcnode-id="2408" href="#cite_note-87"><span data-dcnode-id="2409" instrument_node="">[87]</span></a></sup><span data-dcnode-id="2406" instrument_node="">
</span></p><span data-dcnode-id="2404" instrument_node="">
</span><h2 data-dcnode-id="2394"><span class="mw-headline" data-dcnode-id="2402" id="References"><span data-dcnode-id="2403" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="2395"><span class="mw-editsection-bracket" data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">[</span></span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCapital_gains_tax_in_the_United_States%26action%3Dedit%26section%3D30" title="Edit section: References"><span data-dcnode-id="2399" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2393" instrument_node="">
