</span><div class="x-section" data-dcnode-id="721" id="x-section-2" style="margin: 0px;padding: 0px; background-color: transparent;"><div class="x-container max width" data-dcnode-id="722" style="margin: 0px auto;padding: 0px;"><div class="x-column x-sm x-2-3" data-dcnode-id="798" style="padding: 0px;"><div class="x-text" data-dcnode-id="1492"><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The personal tax system in Singapore is progressive in nature. Progressive tax rate means that the tax rate increases with an increase in the individual’s income (capped at 20% at present for portion of the annual income exceeding $320,000). However, many types of personal income such as income from capital gains, income from dividends, estate duty, etc. are not taxed at all. Overall, Singapore offers an extremely attractive set of features in its personal tax system that residents of most other countries can only dream of.</span></p><span data-dcnode-id="1493" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="1489" id="r-s" style="color: #403f3f;"><span data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Residential Status</span></span></h2><div class="x-text" data-dcnode-id="1473"><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">The income taxable in Singapore depends on the “residential” status of an individual. An individual is a resident for tax purposes if he is:</span></p><span data-dcnode-id="1486" instrument_node="">
</span><ol data-dcnode-id="1475"><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">A citizen of Singapore,</span></li><span data-dcnode-id="1482" instrument_node="">
</span><li data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">A Permanent Resident (PR) of Singapore, or</span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Any foreigner who works in Singapore for a period exceeding 183 days on an aggregate in the year in which relevant chargeable income was received.</span></li><span data-dcnode-id="1476" instrument_node="">
</span></ol><span data-dcnode-id="1474" instrument_node="">
</span></div><div class="x-text post-article-heading" data-dcnode-id="1467"><p data-dcnode-id="1469"><span data-dcnode-id="1470" style="color: #00cc00;"><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Resident Individuals</span></strong></span></p><span data-dcnode-id="1468" instrument_node="">
</span></div><div class="x-text post-article-text" data-dcnode-id="1325"><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">For resident individuals, the personal tax rates range from 0-20%. Any income below $20,000 is not subject to tax whereas income above $320,000 is subject to 20% tax. Since the country follows a progressive tax structure, the tax increases with an increase in income starting at 0% and capped at 20%.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">An individual pays tax on the taxable income. Following are the tax rates which depend on the income of the individual:</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">
</span></p><div class="table-scroll" data-dcnode-id="1330"><span data-dcnode-id="1458" instrument_node="">

e-id="1410" instrument_node="">7.0%</span></td><td class="column-3" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">7.0%</span></td></tr><tr class="row-6 even" data-dcnode-id="1395"><td class="column-1" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Next $40,000 (i.e. upto $120,000 total)</span></td><td class="column-2" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">11.5%</span></td><td class="column-3" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">11.5%</span></td></tr><tr class="row-7 odd" data-dcnode-id="1385"><td class="column-1" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Next $40,000 (i.e. upto $160,000 total)</span></td><td class="column-2" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">15.0%</span></td><td class="column-3" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">15.0%</span></td></tr><tr class="row-8 even" data-dcnode-id="1375"><td class="column-1" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Next $40,000 (i.e. upto $200,000 total)</span></td><td class="column-2" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">17.0%</span></td><td class="column-3" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">18.0%</span></td></tr><tr class="row-9 odd" data-dcnode-id="1365"><td class="column-1" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Next $40,000 (i.e. upto $240,000 total)</span></td><td class="column-2" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">18.0%</span></td><td class="column-3" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">19.0%</span></td></tr><tr class="row-10 even" data-dcnode-id="1355"><td class="column-1" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Next $40,000 (i.e. upto $280,000 total)</span></td><td class="column-2" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">18.0%</span></td><td class="column-3" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">19.5%</span></td></tr><tr class="row-11 odd" data-dcnode-id="1345"><td class="column-1" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Next $40,000 (i.e. upto $320,000 total)</span></td><td class="column-2" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">18.0%</span></td><td class="column-3" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">20.0%</span></td></tr><tr class="row-12 even" data-dcnode-id="1335"><td class="column-1" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Above $320,000 (i.e. no limit on total)</span></td><td class="column-2" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">20.0%</span></td><td class="column-3" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">22.0%</span></td></tr></tbody></table></div><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"></p><span data-dcnode-id="1326" instrument_node="">
</span></div><div class="x-text post-article-heading" data-dcnode-id="1319"><p data-dcnode-id="1321"><span data-dcnode-id="1322" style="color: #00cc00;"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Non-Resident Individuals</span></strong></span></p><span data-dcnode-id="1320" instrument_node="">
</span></div><div class="x-text post-article-text" data-dcnode-id="1315"><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Individuals who are considered non-residents of Singapore for tax purposes are taxed as described below.</span></p><span data-dcnode-id="1316" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1312" style="color: #666666;"><span data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Employment Income</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1269"><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The tax rates applicable to employment income of a non-resident individual generally depend on the number of days the individual resides in Singapore. Accordingly, the tax implications are as follows:</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">
</span></p><div class="table-scroll" data-dcnode-id="1274"><span data-dcnode-id="1306" instrument_node="">
</span><span data-dcnode-id="1305" instrument_node="">
</span><span data-dcnode-id="1304" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
</span><span data-dcnode-id="1297" instrument_node="">
</span><span data-dcnode-id="1295" instrument_node="">
</span><span data-dcnode-id="1294" instrument_node="">
</span><span data-dcnode-id="1293" instrument_node="">
</span><span data-dcnode-id="1288" instrument_node="">
</span><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1285" instrument_node="">
</span><span data-dcnode-id="1280" instrument_node="">
</span><span data-dcnode-id="1278" instrument_node="">
</span><span data-dcnode-id="1276" instrument_node="">
</span><table class="tablepress tablepress-id-34" data-dcnode-id="1275" id="tablepress-34"><thead data-dcnode-id="1296"><tr class="row-1 odd" data-dcnode-id="1298"><th class="column-1" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Number of Days</span></th><th class="column-2" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Tax Applicable</span></th></tr></thead><tbody class="row-hover" data-dcnode-id="1277"><tr class="row-2 even" data-dcnode-id="1287"><td class="column-1" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Employment for up to 60 days in Singapore</span></td><td class="column-2" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Exempt from tax</span></td></tr><tr class="row-3 odd" data-dcnode-id="1279"><td class="column-1" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Employment for 61-182 days in Singapore</span></td><td class="column-2" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Tax rate - 15% of employment income or the prevailing progressive resident rates (whichever is higher)</span></td></tr></tbody></table></div><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"></p><span data-dcnode-id="1270" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1266" style="color: #666666;"><span data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Other Income</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1259"><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Director’s fees and other types of taxable income for non-residents are taxed at the prevailing rate of 20% (From Assessment Year 2017 tax rate this rate will rise to 22%). For a non-resident who is a director, public entertainer or professional in Singapore for a period up to 60 days, the </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startupdecisions.com.sg/singapore/taxes/withholding-tax/"><span data-dcnode-id="1264" instrument_node="">withholding tax rates</span></a><span data-dcnode-id="1262" instrument_node=""> will apply. The income is not exempt from tax for these three categories. Additionally, if the absence of the individual from the country is in connection with the employment itself, his income will not be exempt from tax.</span></p><span data-dcnode-id="1260" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1256" style="color: #666666;"><span data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Not Ordinary Resident (NOR) Scheme</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1222"><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The Not Ordinary Resident (NOR) scheme is a scheme that provides various tax concessions to qualified tax non-resident individuals. The scheme was introduced with the objective of&nbsp;attracting talented individuals. The scheme is applicable to the employment income of an individual who is not a resident of Singapore. According to the NOR Scheme, an individual can enjoy the benefit of reduced taxes that are proportional to the fraction of year he spends in Singapore&nbsp;. If an individual qualifies for this scheme, his employment income is taxable only according to the number of days he resides in Singapore. Additionally, any contributions by the employer to an overseas pension fund will be exempt from tax for any NOR.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">An individual is eligible for this scheme on the following basis:</span></p><span data-dcnode-id="1250" instrument_node="">
</span><ol data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">If the individual is a non-resident in the 3 immediately preceding assessment years and</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">If the individual is a tax resident in Singapore in the assessment year where he applies for the NOR status.</span></li><span data-dcnode-id="1243" instrument_node="">
</span></ol><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The benefit under the scheme will be available for 5 assessment years.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Once an individual qualifies for the scheme, he will have to fulfill the following additional conditions:</span></p><span data-dcnode-id="1235" instrument_node="">
</span><ol data-dcnode-id="1224"><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">The individual shall ensure that he spends at least 90 days outside Singapore for his business.</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">His Singapore-sourced income must be at least $160,000.</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">If the tax on the apportioned income of the individual is less than 10% of his total employment income, he will still be subject to tax on 10% of the total employment income.</span></li><span data-dcnode-id="1225" instrument_node="">
</span></ol><span data-dcnode-id="1223" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="1219" id="t-t" style="color: #403f3f;"><span data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Tax Types and Tax Rates </span></span></h2><div class="x-text post-article-text" data-dcnode-id="1092"><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Following is a quick summary of the tax types and rates applicable for residents and non-residents in Singapore:</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">
</span></p><div class="table-scroll" data-dcnode-id="1097"><span data-dcnode-id="1213" instrument_node="">

</span><span data-dcnode-id="1200" instrument_node="">
</span><span data-dcnode-id="1199" instrument_node="">
</span><span data-dcnode-id="1198" instrument_node="">
</span><span data-dcnode-id="1191" instrument_node="">
</span><span data-dcnode-id="1189" instrument_node="">
</span><span data-dcnode-id="1188" instrument_node="">
</span><span data-dcnode-id="1181" instrument_node="">
</span><span data-dcnode-id="1179" instrument_node="">
</span><span data-dcnode-id="1178" instrument_node="">

</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">
 Interest received from Singapore Banks or Licensed Finance Company is not taxable.</span></td><td class="column-3" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">15%</span></td></tr><tr class="row-8 even" data-dcnode-id="1126"><td class="column-1" data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Tax on royalties</span></td><td class="column-2" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Included in an individual’s total taxable income and taxed at resident rates as above.</span></td><td class="column-3" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">10%</span></td></tr><tr class="row-9 odd" data-dcnode-id="1112"><td class="column-1" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Withholding tax</span></td><td class="column-2" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">N.A.</span></td><td class="column-3" data-dcnode-id="1114"><span data-dcnode-id="1119" instrument_node="">The withholding tax rates depend on the type of payments made to the non-resident.</span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">
</span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
 Tax rates will differ if Singapore has entered into an Avoidance of Double Taxation Agreement (DTA) with the country where the non-resident resides.</span></td></tr><tr class="row-10 even" data-dcnode-id="1102"><td class="column-1" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Tax on Freelance Income</span></td><td class="column-2" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Included in an individual’s total taxable income and taxed at resident rates as above.</span></td><td class="column-3" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Included in an individual’s total taxable income and taxed at non-resident rates as above</span></td></tr></tbody></table></div><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"></p><span data-dcnode-id="1093" instrument_node="">
</span></div><div class="x-text post-article-heading" data-dcnode-id="1086"><p data-dcnode-id="1088"><span data-dcnode-id="1089" style="color: #00cc00;"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Income not taxable in Singapore</span></strong></span></p><span data-dcnode-id="1087" instrument_node="">
</span></div><div class="x-text" data-dcnode-id="1082"><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">As pointed out in the table, the following types of income are not subject to taxes in Singapore:</span></p><span data-dcnode-id="1083" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1079" style="color: #666666;"><span data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Capital Gains Tax</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1075"><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">These are personal gains of individuals, for instance, any gain on sale of a fixed asset, stocks, etc. or gains on capital transactions.</span></p><span data-dcnode-id="1076" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1072" style="color: #666666;"><span data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Estate duty</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1050"><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">From 2008, Singapore does not levy estate duty. The government earlier levied this tax on an individual’s wealth that he left behind after his death. This tax is now exempt. An individual’s estate includes:</span></p><span data-dcnode-id="1069" instrument_node="">
</span><ol data-dcnode-id="1055"><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Everything owned in the individual’s own name</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The individual’s share of assets that are jointly owned</span></li><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Any gift made within five years before the death of the individual</span></li><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Any assets in a trust from which the individual receives a personal benefit</span></li><span data-dcnode-id="1056" instrument_node="">
</span></ol><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">The exemption of estate duty in Singapore makes it a very good place for inheritance planning.</span></p><span data-dcnode-id="1051" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="1047" style="color: #666666;"><span data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Dividend Income</span></span></h3><div class="x-text post-article-text" data-dcnode-id="1040"><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Dividend is an individual’s profit from his shareholding in a company. From 2008, the dividend paid by Singapore resident companies to their shareholders is exempt from tax.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The exemption of capital gains tax, estate duty and tax on dividend income in Singapore makes the country an attractive place for foreigners to invest in. Various foreign investors hold assets in the country due to the exemption of these taxes.</span></p><span data-dcnode-id="1041" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="1037" id="t-o-i" style="color: #403f3f;"><span data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Tax on Foreign Income</span></span></h2><img class="x-img x-img-none" data-dcnode-id="1036" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.startupdecisions.com.sg/wp-content/uploads/9-1.jpg&amp;raw"><div class="x-text post-article-text" data-dcnode-id="1011"><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">The receipt of overseas income by an individual in Singapore is generally not taxable. The reason for the non-taxability is that the source of the income is from an overseas country and not Singapore. For instance, the appointment&nbsp;of an individual by the employer to work in an overseas office will not be taxable in Singapore as the source of employment income will be overseas and not in Singapore.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">However, IRAS has listed the kinds of overseas income that are subject to tax in Singapore:</span></p><span data-dcnode-id="1030" instrument_node="">
</span><ol data-dcnode-id="1013"><span data-dcnode-id="1029" instrument_node="">
</span><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">If the receipt of overseas income is through a partnership in Singapore.</span></li><span data-dcnode-id="1026" instrument_node="">
</span><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The employment the individual carries out overseas is incidental to the employment in Singapore. This implies that if the part of the work done overseas is, in fact, a part of an individual’s employment in Singapore, it will be taxable in Singapore.</span></li><span data-dcnode-id="1023" instrument_node="">
</span><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Employment of an individual overseas on behalf of the Singapore Government.</span></li><span data-dcnode-id="1020" instrument_node="">
</span><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Individual’s trade or business is in Singapore and the individual has a trade or business overseas incidental to the Singapore trade.</span></li><span data-dcnode-id="1017" instrument_node="">
</span><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Receipt of service income by an individual from overseas.</span></li><span data-dcnode-id="1014" instrument_node="">
</span></ol><span data-dcnode-id="1012" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="1008" id="d-t-a" style="color: #403f3f;"><span data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Double Tax Avoidance</span></span></h2><div class="x-text" data-dcnode-id="998"><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">To avoid the situation where&nbsp;an individual may be subject to tax on his income both in Singapore and in foreign countries, Singapore has an extensive set of DTAs. To avoid tax on the same income twice, an individual can apply for </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startupdecisions.com.sg/singapore/taxes/double-tax-treaties-guide/"><span data-dcnode-id="1006" instrument_node="">double taxation relief</span></a><span data-dcnode-id="1004" instrument_node="">. Singapore has a very extensive network of double tax avoidance treaties </span><a class="broken_link" data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iras.gov.sg/IRASHome/uploadedFiles/IRASHome/Quick_Links/Brief%2520explanation%2520on%2520the%2520application%2520of%2520a%2520DTA.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1003" instrument_node="">with other countries</span></a><span data-dcnode-id="1001" instrument_node="">. Many of these tax treaties also offer further reduction in the applicable tax rates.</span></p><span data-dcnode-id="999" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="995" id="t-c" style="color: #403f3f;"><span data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Tax Calculation and Tax Filing</span></span></h2><div class="x-text post-article-heading" data-dcnode-id="989"><p data-dcnode-id="991"><span data-dcnode-id="992" style="color: #00cc00;"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Taxable Income</span></strong></span></p><span data-dcnode-id="990" instrument_node="">
</span></div><div class="x-text post-article-text" data-dcnode-id="922"><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Taxable income is the net personal income of an individual that is subject to taxes. The Inland Revenue Authority of Singapore (IRAS) provides a computation of the taxable income as follows:</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Computation of Taxable Income</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">
</span></p><div class="table-scroll" data-dcnode-id="930"><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="979" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><span data-dcnode-id="975" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="971" instrument_node="">
</span><span data-dcnode-id="970" instrument_node="">
</span><span data-dcnode-id="969" instrument_node="">
</span><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="964" instrument_node="">
</span><span data-dcnode-id="963" instrument_node="">

</span><span data-dcnode-id="934" instrument_node="">

</span><table class="tablepress tablepress-id-36" data-dcnode-id="931" id="tablepress-36"><tfoot data-dcnode-id="972"><tr class="row-7 odd" data-dcnode-id="974"><th class="column-1" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">(=) Taxable Income </span></th></tr></tfoot><tbody class="row-hover" data-dcnode-id="933"><tr class="row-1 odd" data-dcnode-id="965"><td class="column-1" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Total Income </span></td></tr><tr class="row-2 even" data-dcnode-id="959"><td class="column-1" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">(-) Expenses</span></td></tr><tr class="row-3 odd" data-dcnode-id="953"><td class="column-1" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">(=) Statutory Income</span></td></tr><tr class="row-4 even" data-dcnode-id="947"><td class="column-1" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">(-) Donations</span></td></tr><tr class="row-5 odd" data-dcnode-id="941"><td class="column-1" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">(=) Assessable Income</span></td></tr><tr class="row-6 even" data-dcnode-id="935"><td class="column-1" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">(-) Personal Reliefs</span></td></tr></tbody></table></div><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">An individual will pay taxes according to the prevailing tax rates on their taxable income.</span></p><span data-dcnode-id="923" instrument_node="">
</span></div><div class="x-text post-article-heading" data-dcnode-id="916"><p data-dcnode-id="918"><span data-dcnode-id="919" style="color: #00cc00;"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Tax Deductions</span></strong></span></p><span data-dcnode-id="917" instrument_node="">
</span></div><div class="x-text post-article-text" data-dcnode-id="867"><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Tax deductions include donations, reliefs, and expenses which an individual can claim to reduce the tax burden. When computing your taxable income you can claim the following as deductions:</span></p><span data-dcnode-id="913" instrument_node="">
</span><ol data-dcnode-id="869"><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="892"><span data-dcnode-id="911" instrument_node="">Employment expenses that an individual incurs in the course of employment. These deductions are not allowable in case of personal income or any income of capital nature. The expenses have to be in the course of carrying out the official duties. The following are a few instances of allowable deductions providing overall tax benefits to employees:
</span><ul data-dcnode-id="894"><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Meal Allowances</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Transport allowances</span></li><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Car Services</span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Medical reimbursements</span></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Housing allowances etc</span></li><span data-dcnode-id="895" instrument_node="">
</span></ul><span data-dcnode-id="893" instrument_node="">
</span></li><span data-dcnode-id="891" instrument_node="">
</span><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Donations made by the individual to qualified charitable organizations.</span></li><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Allowable expenses the individual incurs when earning rental income. The net amount of rental income after the deduction of allowable expenses such as repairs and maintenance, property tax, fire insurance etc., will be subject to tax.</span></li><span data-dcnode-id="885" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="884" instrument_node="">Tax reliefs and rebates that the government provides as recognition of an individual’s efforts at self improvement. These reliefs include:
</span><ul data-dcnode-id="873"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Course Fee Relief – To encourage individuals to upgrade their skills</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">CPF Cash Top-up Relief – To encourage individuals to set aside money for retirement needs</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Supplementary Retirement Scheme (SRS) Relief – To encourage individuals to save for their old age etc</span></li><span data-dcnode-id="874" instrument_node="">
</span></ul><span data-dcnode-id="872" instrument_node="">
</span></li><span data-dcnode-id="870" instrument_node="">
</span></ol><span data-dcnode-id="868" instrument_node="">
</span></div><div class="x-text post-article-heading" data-dcnode-id="861"><p data-dcnode-id="863"><span data-dcnode-id="864" style="color: #00cc00;"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Tax Filing </span></strong></span></p><span data-dcnode-id="862" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="858" style="color: #666666;"><span data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Filing of Returns</span></span></h3><div class="x-text post-article-text" data-dcnode-id="842"><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Individuals have to file their returns through forms available on IRAS. The kind of forms depends on the residential and occupational status of the individual.</span></p><span data-dcnode-id="855" instrument_node="">
</span><ol data-dcnode-id="844"><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Form B1 – Employed individuals</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Form B – Self-employed individuals</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Form M – Non-resident individuals</span></li><span data-dcnode-id="845" instrument_node="">
</span></ol><span data-dcnode-id="843" instrument_node="">
</span></div><h3 class="h-custom-headline post-main-subheading h5" data-dcnode-id="839" style="color: #666666;"><span data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Deadline</span></span></h3><div class="x-text post-article-text" data-dcnode-id="826"><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">The individuals have to observe the following deadlines:</span></p><span data-dcnode-id="836" instrument_node="">
</span><ol data-dcnode-id="828"><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Filing Tax Returns: Where the annual earning of an individual is above $22,000, the individual will have to file tax returns. Every individual who is required to pay tax has to file a tax return annually by April 15. The annual filing of tax returns can be done either via paper means or electronically. In the case of e-filing of returns, the deadline is April 18. An individual has to file his annual tax returns anytime between March 1 to April 18.</span></li><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Payment of Taxes: Once the individual files the tax return he will receive a Notice of Assessment (NOA) by September stating the tax amount payable. The tax is payable within a period of 30 days from the date of the notice. However, the individual also has an option to pay in installments.</span></li><span data-dcnode-id="829" instrument_node="">
</span></ol><span data-dcnode-id="827" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="823" id="conclusion" style="color: #403f3f;"><span data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Conclusion</span></span></h2><div class="x-text post-article-text" data-dcnode-id="816"><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">An individual’s tax liability is on the basis of his residential status, the prevailing tax rates, and the allowable deductions. It is advisable to consult a </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startupdecisions.com.sg/corporateservices/"><span data-dcnode-id="821" instrument_node="">corporate services provider</span></a><span data-dcnode-id="819" instrument_node=""> who can assist you in optimizing your personal tax strategy and the filing of your tax return.</span></p><span data-dcnode-id="817" instrument_node="">
</span></div><h2 class="h-custom-headline post-main-heading h4" data-dcnode-id="813" id="faqs" style="color: #403f3f;"><span data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">FAQs</span></span></h2><div class="x-accordion" data-dcnode-id="799"><div class="x-accordion-group" data-dcnode-id="800"><div class="x-accordion-heading" data-dcnode-id="810"><a aria-controls="panel-6265b2a72e54c" aria-expanded="true" aria-selected="true" class="x-accordion-toggle" data-dcnode-id="811" data-x-toggle="collapse-b" data-x-toggleable="6265b2a72e54c" id="tab-6265b2a72e54c" role="tab"><span data-dcnode-id="812" instrument_node="">What is Assessment Year and Previous Year?</span></a></div><div aria-hidden="false" aria-labelledby="tab-6265b2a72e54c" class="x-accordion-body" data-dcnode-id="801" data-x-toggle-collapse="1" data-x-toggleable="6265b2a72e54c" id="panel-6265b2a72e54c" role="tabpanel" style=""><div class="x-accordion-inner" data-dcnode-id="802"><span data-dcnode-id="809" instrument_node="">The Assessment Year is the year in which the individual will calculate and pay the tax on the chargeable income. The income on which the individual pays tax is the income of the previous year, i.e. the preceding year in which the individual earns the income.</span><p data-dcnode-id="808"></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="806" instrument_node="">Example: For the Assessment year 2017, the income of the individual is that of the previous year – January to December, 2016.</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
</span></p></div></div></div></div></div><div class="x-column x-sm article-content x-1-3" data-dcnode-id="723" style="padding: 0px;"><h4 class="h-custom-headline table-contents-h h6" data-dcnode-id="795" style="color: rgb(64, 63, 63);"><span data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">TABLE OF CONTENTS</span></span></h4><div class="x-raw-content table-contents-article" data-dcnode-id="763"><ol data-dcnode-id="765"><span data-dcnode-id="794" instrument_node="">
