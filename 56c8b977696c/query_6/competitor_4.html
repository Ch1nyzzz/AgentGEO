          Elke Asen  </span></p><span data-dcnode-id="1361" instrument_node="">
</span></div><span data-dcnode-id="1359" instrument_node="">
</span><div data-dcnode-id="540" id="post-content"><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Most countries’ personal income taxes have a progressive structure, meaning that the tax rate paid by individuals increases as they earn higher wages. The highest tax rate individuals pay differs significantly across European OECD countries—as shown in today’s map.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">The top statutory personal income tax rate applies to the share of income that falls into the highest </span><a class="tooltip__anchor" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/tax-brackets/" id="anchor75149"><span data-dcnode-id="1353" instrument_node="">tax bracket</span></a><span data-dcnode-id="1351" instrument_node="">. For instance, if a country has five tax brackets, and the top income tax rate of 50&nbsp;percent has a threshold of €1 million, each additional euro of income over €1 million would be taxed at 50&nbsp;percent.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1346"><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021.jpg"><img alt="Top statutory personal income tax rates in Europe 2021" class="alignnone size-full wp-image-85438" data-dcnode-id="1348" sizes="(max-width: 1386px) 100vw, 1386px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021.jpg&amp;raw" srcset="https://files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021.jpg 1386w, https://files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021-300x290.jpg 300w, https://files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021-768x743.jpg 768w, https://files.taxfoundation.org/20210505165000/Top-statutory-personal-income-tax-rates-in-Europe-2021-1024x990.jpg 1024w"></a></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341"><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/publications/how-scandinavian-countries-pay-for-their-government-spending/"><span data-dcnode-id="1344" instrument_node="">Denmark (55.9&nbsp;percent)</span></a><span data-dcnode-id="1342" instrument_node="">, France (55.4 percent), and Austria (55&nbsp;percent) had the highest top statutory personal income tax rates among European OECD countries in 2020. The Czech Republic (15&nbsp;percent), Hungary (15&nbsp;percent), and Estonia (20&nbsp;percent) had the lowest top rates.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The income level at which the top statutory personal income tax rates apply also varies significantly across the countries covered. Expressed as a multiple of a country’s average wage, the threshold ranges from 0 in the Czech Republic, Hungary, and Latvia to 22.5 in Austria. The Czech Republic, Hungary, and Latvia apply their flat personal income tax on all income earned. In contrast, Austria’s top statutory rate of 55&nbsp;percent only applies to income above €1 million.</span></p><span data-dcnode-id="1337" instrument_node="">
