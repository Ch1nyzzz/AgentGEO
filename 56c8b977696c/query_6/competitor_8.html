lass="input_wrapper" data-dcnode-id="3300"><input class="page_number" data-dcnode-id="3301" id="jump_page" name="page_number" type="tel" value="1"></div></label></div><span aria-atomic="true" aria-live="polite" data-dcnode-id="3293"><span class="visually_hidden" data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">You are on page 1</span></span><span class="page_of" data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">of 10</span></span></span></div></div><div class="right_tools" data-dcnode-id="3277"><div class="wrapper__doc_page_App_Page_Body_DocumentSearch" data-dcnode-id="3282"><div class="search_wrapper" data-dcnode-id="3283"><div class="wrapper__text_input input_row document_search text" data-dcnode-id="3284"><label data-dcnode-id="3285" for="document_search"><span class="label_text visually_hidden" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Search inside document </span></span><div class="input_wrapper" data-dcnode-id="3286"><span aria-hidden="true" class="icon-ic_search search_icon" data-dcnode-id="3288" role="presentation"></span><input class="document_search" data-dcnode-id="3287" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="3278"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="3279" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="3280"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="3281"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2269"><h1 data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">CHAPTER 7: SELF-TEST EXERCISES</span></h1><p data-dcnode-id="3222"><span data-dcnode-id="3273" instrument_node="">Discussion Questions</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">1. Discuss the scope of the regular income tax especially on passive</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">    income and capital gains.</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">2. Enumerate the characteristics of the regular income tax.</span><br data-dcnode-id="3266"><span data-dcnode-id="3265" instrument_node="">3. What are the exclusion in gross income?</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">4. Distinguish allowable deductions from personal exemption.</span><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">5. Demonstrate the computation of the gross income from employment and</span><br data-dcnode-id="3260"><span data-dcnode-id="3259" instrument_node="">    the gross income from business or exercise of a profession.</span><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">6. How is cost of goods sold determined?</span><br data-dcnode-id="3256"><span data-dcnode-id="3255" instrument_node="">7. What are included in cost of services?</span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node="">8. What composes the compensation income of a rank and file employee and</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">    a managerial and supervisory employee?</span><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">9. How does the tax presentation of the composition of gross income in</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">    the tax return differ between individuals and corporate taxpayers?</span><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node="">10. Distinguish “other taxable income from operations” from non-operating</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">    income.</span><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">11. Distinguish revenue from sales, fees, and receipt.</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">12. Discuss the taxable income of the following is determined:</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">  a. Corporate taxpayer</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">  b. Purely compensation earner</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">  c. Purely business or professional income taxpayer</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">  d. Mixed income earner</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">13. Discuss the treatment of net loss from business or exercise of</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">    profession.</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">14. What are the deadlines of the quarterly regular income tax for</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">    individuals and corporations?</span></p><p data-dcnode-id="3186"><span data-dcnode-id="3221" instrument_node="">True or False 1</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">1. There are two types of regular income tax: proportional income tax</span><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">    for corporations and progressive income tax for individuals.</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">2. NRA-NETBs and NRFCs are also subject to regular income tax.</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">3. All taxpayers are subject to final tax.</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">4. Taxable income is synonymous to net income.</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">5. For all taxpayers, taxable income means the pertinent items of gross</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">    income not subject to capital gains tax and final tax less allowable</span><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">    deductions.</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">6. All taxpayers are subject to regular income tax.</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">7. Employed taxpayers can claim expenses from their employment as</span><br data-dcnode-id="3200"><span data-dcnode-id="3199" instrument_node="">    deductions against their compensation income.</span><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">8. Items of gross income subject to final tax and capital gains tax are</span><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node="">    excluded in gross income subject to regular income tax.</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">9. The P250,000 income tax exemption for individuals is designed to be</span><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">    in lieu of their personal and business expenses.</span><br data-dcnode-id="3190"><span data-dcnode-id="3189" instrument_node="">10. Non-taxable compensation are items of compensation that are excluded</span><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">    against gross income.</span></p><p data-dcnode-id="3142"><span data-dcnode-id="3185" instrument_node="">True or False 2</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">1. The taxable compensation income is computed as gross compensation less</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">    the non-taxable compensation income.</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">2. The deadline of filing the corporate quarterly income tax return is</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node="">    the same with the deadline of the quarterly income tax return for</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node="">    individuals.</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">3. Business expenses can be deducted against all types of gross income</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">    subject to regular tax.</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">4. No deduction shall be allowed against taxable income.</span><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node="">5. Only corporations may incur deductions against gross income.</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">f6. The gross income from business is measured as sales or gross receipts</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">    less cost of sales or cost of services.</span><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node="">7. The tax due of individuals is determined by means of a schedules of</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node="">    tax rates.</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">8. The tax due of corporations is determined by multiplying their gross</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node="">    income by 30%.</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node="">9. The deadline of the annual income tax return of corporations using</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node="">    the calendar year is similar to the deadline fixed for individual</span><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">    taxpayers.</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">10. Every individual taxpayer is exempt from income tax on compensation</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">    up to P250,000 annually but the same exemption does not apply to</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">    business income.</span></p><p data-dcnode-id="3141"></p><h2 data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Multiple Choice - Theory: Part 1</span></h2><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">   1. The general rule in income taxation is</span><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">       a. Final income taxation      c. regular income taxation</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">       b. Capital gains taxation     d. fringe benefit taxation</span><p data-dcnode-id="3132"></p><p data-dcnode-id="3131"></p><h2 data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">   2. Active income is subject to</span></h2><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">       a. Regular tax                 c. final tax</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">       b. Capital gains tax           d. any of these</span><p data-dcnode-id="3124"></p><p data-dcnode-id="3123"></p><h2 data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">   3. Questions 3 and 4 are based on the following:</span></h2><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">   A. Regular Tax        B. Final Tax            C. Capital Gains Tax</span><p data-dcnode-id="3118"></p><p data-dcnode-id="3117"></p><h2 data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">   Which of the foregoing are passive incomes are subject to?</span></h2><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">      a. A only                     c. Both A and B</span><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">      b. B only                     d. Either A or B</span><p data-dcnode-id="3110"></p><p data-dcnode-id="3109"></p><h2 data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">   4. Which of the foregoing are capital gains subject to?</span></h2><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">       a. A only                     c. Either A or C</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">       b. C only                     d. Both A and C</span><p data-dcnode-id="3102"></p><p data-dcnode-id="3101"></p><h2 data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">   5. The net amount of regular income subject to regular tax is called</span></h2><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">       a. Taxable income             c. Net income</span><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node="">       b. Compensation income        d. Gross income</span><p data-dcnode-id="3094"></p><p data-dcnode-id="3093"></p><h2 data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">   6. Which is not generally subject to regular income tax?</span></h2><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node="">       a. Compensation income        c. Professional income</span><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">       b. Business income            d. Passive income</span><p data-dcnode-id="3086"></p><p data-dcnode-id="3085"></p><h2 data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">   7. What are the allowable deductions against gross income?</span></h2><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">       a. Business expenses</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">       b. Family support</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">       c. Personal expenses by the taxpayer</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">       d. Expenses of employment</span><p data-dcnode-id="3074"></p><p data-dcnode-id="3073"></p><h2 data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">   8. Deductions are allowed to</span></h2><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">       a. Employed taxpayers          c. Corporate taxpayers only</span><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">       b. Individual taxpayers only   d. Taxpayers engaged in business</span><p data-dcnode-id="3066"></p><p data-dcnode-id="3065"></p><h2 data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">   9. Personal exemptions are allowed to</span></h2><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">       a. Employed taxpayers         c. Corporate taxpayers only</span><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">       b. Individual taxpayers only  d. Taxpayers engaged in business</span><p data-dcnode-id="3058"></p><p data-dcnode-id="3057"></p><h2 data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">   10. Which is not the feature of regular income tax?</span></h2><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">      a. Net income tax              c. Annual tax</span><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">f   b. Final withholding tax      d. Creditable withholding tax</span><p data-dcnode-id="3050"></p><p data-dcnode-id="3049"></p><h2 data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">11. Which is true with the final withholding tax?</sp         P10,000,000        P12,000,000</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">        Dividend – domestic                50,000             -</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">        Royalties                          80,000            200,000</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">        Business expenses               8,700,000          9,800,000</span></p><p data-dcnode-id="2363"></p><h2 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">        Compute the taxable income if Lesde, Inc. was a domestic</span></h2><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">        corporation.</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">        a. P3,500,000           c. P1,380,000</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">        b. P3,700,000           d. P1,300,000</span><p data-dcnode-id="2354"></p><p data-dcnode-id="2353"></p><h2 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">  2. Compute the income tax due in the immediately preceding problem.</span></h2><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">     a. P1,149,000           c. P1,110,000</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">     b. P390,000             d. P381,000</span><p data-dcnode-id="2346"></p><p data-dcnode-id="2345"></p><h2 data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">  3. Compute the taxable income assuming Lesde Corporation was a</span></h2><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">     resident foreign corporation.</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">     a. P3,700,000           c. P1,380,000</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">     b. P3,500,000           d. P1,300,000</span><p data-dcnode-id="2336"></p><p data-dcnode-id="2335"></p><h2 data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">  4. Compute the income tax due in the immediately preceding problem.</span></h2><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">     a. P390,000             c. P1,149,000</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">     b. P1,110,000           d. P381,000</span><p data-dcnode-id="2328"></p><p data-dcnode-id="2327"></p><h2 data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">  5. Compute the tax due if Lesde, Inc. was a non-resident foreign</span></h2><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">     corporation. Assume that the tax sparing is not applicable to</span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">     Cavite.</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">     a. P3,105,000           c. P3,000,000</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">     b. P3,039,000           d. P429,000</span><p data-dcnode-id="2316"></p><p data-dcnode-id="2315"></p><h2 data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">  6. Mr. Allan derived the following income in 2019:</span></h2><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">f   Business income                                          P 200,000</span><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">   Compensation income                                        300,000</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">   Interest income from   5⁄6 lending to clients              100,000</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">   Interest income from   bank deposits                        20,000</span><br data-dcnode-id="2304"><spa
