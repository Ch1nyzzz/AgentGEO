</span><h2 data-dcnode-id="5926" id="Findings"><span data-dcnode-id="5927" instrument_node="">Key Findings</span></h2><span data-dcnode-id="5925" instrument_node="">
</span><ul data-dcnode-id="5902"><span data-dcnode-id="5924" instrument_node="">
</span><li data-dcnode-id="5922"><span data-dcnode-id="5923" instrument_node="">In 2020, 10 countries made changes to their statutory corporate income tax rates. One country—Micronesia—increased its top corporate tax rate, while nine countries—Armenia, Belgium, Colombia, France, French Polynesia, Greenland, Monaco, Togo, and Zimbabwe—reduced their corporate tax rates.</span></li><span data-dcnode-id="5921" instrument_node="">
</span><li data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">Comoros (50&nbsp;percent), Puerto Rico (37.5 percent), and Suriname (36 percent) are the countries with the highest corporate tax rates in the world, while Barbados (5.5 percent), Uzbekistan (7.5 percent), and Turkmenistan (8 percent) levy the lowest corporate rates. Fifteen jurisdictions do not impose corporate tax.</span></li><span data-dcnode-id="5918" instrument_node="">
</span><li data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">The worldwide average statutory corporate income tax rate, measured across 177 jurisdictions, is 23.85 percent. When weighted by GDP, the average statutory rate is 25.85 percent.</span></li><span data-dcnode-id="5915" instrument_node="">
</span><li data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">Europe has the lowest regional average rate, at 19.99 percent (24.61 percent when weighted by GDP). Conversely, Africa has the highest regional average statutory rate, at 28.50 percent (28.16 percent weighted by GDP).</span></li><span data-dcnode-id="5912" instrument_node="">
</span><li data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">The average top corporate rate among EU27 countries is 21.47 percent, 23.51 percent in OECD countries, and 24 percent in the G7.</span></li><span data-dcnode-id="5909" instrument_node="">
</span><li data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">The worldwide average statutory corporate tax rate has consistently decreased since 1980, with the largest decline occurring in the early 2000s.</span></li><span data-dcnode-id="5906" instrument_node="">
</span><li data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">The average statutory corporate tax rate has declined in every region since 1980.</span></li><span data-dcnode-id="5903" instrument_node="">
</span></ul><span data-dcnode-id="5901" instrument_node="">
</span><h2 data-dcnode-id="5899" id="Intro"><span data-dcnode-id="5900" instrument_node="">Introduction</span></h2><span data-dcnode-id="5898" instrument_node="">
</span><p data-dcnode-id="5891"><span data-dcnode-id="5897" instrument_node="">In 1980, corporate tax rates around the world averaged 40.11 percent, and 46.52 percent when weighted by GDP.</span><a data-dcnode-id="5895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn1" name="_ftnref1"><span data-dcnode-id="5896" instrument_node="">[1]</span></a><span data-dcnode-id="5894" instrument_node=""> Since then countries have recognized the impact that high corporate tax rates have on business investment decisions so that in 2020, the average is now 23.85 percent, and 25.85 when weighted by GDP, for 177 separate tax jurisdictions.</span><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn2" name="_ftnref2"><span data-dcnode-id="5893" instrument_node="">[2]</span></a></p><span data-dcnode-id="5890" instrument_node="">
</span><p data-dcnode-id="5885"><span data-dcnode-id="5889" instrument_node="">Declines have been seen in every major region of the world, including in the largest economies. The 2017 tax reform in the United States brought the statutory corporate income tax rate from among the highest in the world closer to the middle of the distribution. Whereas in 2017 the United States had the fourth highest corporate income tax rate in the world,</span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn3" name="_ftnref3"><span data-dcnode-id="5888" instrument_node="">[3]</span></a><span data-dcnode-id="5886" instrument_node=""> it now ranks towards the middle of the countries and tax jurisdictions surveyed.</span></p><span data-dcnode-id="5884" instrument_node="">
</span><p data-dcnode-id="5879"><span data-dcnode-id="5883" instrument_node="">European countries tend to have lower </span><a class="tooltip__anchor" data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/tax-basics/corporate-income-tax-cit/" id="anchor71997"><span data-dcnode-id="5882" instrument_node="">corporate income tax</span></a><span data-dcnode-id="5880" instrument_node=""> rates than countries in other regions, and many developing countries have corporate income tax rates that are above the worldwide average.</span></p><span data-dcnode-id="5878" instrument_node="">
</span><p data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">Today, most countries have corporate tax rates below 30 percent.</span></p><span data-dcnode-id="5875" instrument_node="">
</span><h2 data-dcnode-id="5873" id="Changes"><span data-dcnode-id="5874" instrument_node="">Notable Corporate Tax Rate Changes in 2020</span></h2><span data-dcnode-id="5872" instrument_node="">
</span><p data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Ten countries have made changes to their statutory corporate income tax rates in 2020. Micronesia was the only country to increase its top corporate tax rate, introducing a progressive corporate income tax system with a top rate of 30&nbsp;percent, nine&nbsp;percentage points higher than the previous flat corporate tax of 21&nbsp;percent.</span></p><span data-dcnode-id="5869" instrument_node="">
</span><p data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">Nine countries across five continents—Armenia, Belgium, Colombia, France, French Polynesia, Greenland, Monaco, Togo, and Zimbabwe—reduced their corporate tax rates in 2020. The tax rate reductions ranged from one percentage point in Colombia, French Polynesia, and Togo to 5.3&nbsp;percentage points in Greenland.</span></p><span data-dcnode-id="5866" instrument_node="">

</span><h2 data-dcnode-id="5601" id="Scheduled"><span data-dcnode-id="5604" instrument_node="">Scheduled Corporate Tax Rate Changes in the OECD</span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn4" name="_ftnref4"><span data-dcnode-id="5603" instrument_node="">[4]</span></a></h2><span data-dcnode-id="5600" instrument_node="">
</span><p data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">Among OECD countries, France, the Netherlands, and Sweden have announced they will implement changes to their statutory corporate income tax rate over the coming years.</span></p><span data-dcnode-id="5597" instrument_node="">
</span><ul data-dcnode-id="5577"><span data-dcnode-id="5596" instrument_node="">
</span><li data-dcnode-id="5591"><span data-dcnode-id="5595" instrument_node="">In </span><strong data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">France</span></strong><span data-dcnode-id="5592" instrument_node="">, the standard statutory corporate income tax rate was lowered to 32.02&nbsp;percent (including the 3.3 percent social surcharge) in 2020. An already legislated corporate rate reduction is expected to progressively bring the corporate tax rate down to 25.83 percent by 2022.</span></li><span data-dcnode-id="5590" instrument_node="">
</span><li data-dcnode-id="5585"><span data-dcnode-id="5589" instrument_node="">In the </span><strong data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">Netherlands</span></strong><span data-dcnode-id="5586" instrument_node="">, the originally planned reduction of the statutory corporate tax rate applying to income exceeding €200,000 was partly reversed: The corporate rate was not decreased to 22.55 percent in 2020 as originally planned. Instead, it remains at 25 percent in 2020 and will be lowered to 21.7 percent instead of 20.50 percent in 2021.</span></li><span data-dcnode-id="5584" instrument_node="">
</span><li data-dcnode-id="5579"><span data-dcnode-id="5583" instrument_node="">In </span><strong data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">Sweden</span></strong><span data-dcnode-id="5580" instrument_node="">, the statutory corporate tax rate will be cut from 21.4 percent in 2020 to 20.6 percent in 2021.</span></li><span data-dcnode-id="5578" instrument_node="">
</span></ul><span data-dcnode-id="5576" instrument_node="">
</span><h2 data-dcnode-id="5572" id="Highest"><span data-dcnode-id="5575" instrument_node="">The Highest and Lowest Corporate Tax Rates in the World</span><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn5" name="_ftnref5"><span data-dcnode-id="5574" instrument_node="">[5]</span></a></h2><span data-dcnode-id="5571" instrument_node="">
</span><p data-dcnode-id="5563"><span data-dcnode-id="5570" instrument_node="">One hundred of the 223 separate jurisdictions surveyed for the year 2020 have corporate tax rates below 25 percent and 117 have tax rates above 20 and at or below 30 percent. The average tax rate among the 223 jurisdictions is 22.57 percent.</span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn6" name="_ftnref6"><span data-dcnode-id="5569" instrument_node="">[6]</span></a><span data-dcnode-id="5567" instrument_node=""> The United States has the 85</span><sup data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">th</span></sup><span data-dcnode-id="5564" instrument_node=""> highest corporate tax rate with a combined statutory rate of 25.77 percent.</span></p><span data-dcnode-id="5562" instrument_node="">
</span><p data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">The 20 countries with the highest statutory corporate income tax rates span almost every region, albeit unequally. While nine of the top 20 countries are in Africa, Europe appears only twice and Asia not at all. Of the remaining jurisdictions, two are in Oceania, and seven are in the Americas.</span></p><span data-dcnode-id="5559" instrument_node="">
</span><p data-dcnode-id="5554"><span data-dcnode-id="5558" instrument_node="">The only industrialized nation</span><a data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn7" name="_ftnref7"><span data-dcnode-id="5557" instrument_node="">[7]</span></a><span data-dcnode-id="5555" instrument_node=""> in the top 20 is France (32.02 percent).</span></p><span data-dcnode-id="5553" instrument_node="">

</span><p data-dcnode-id="4804"><span data-dcnode-id="4808" instrument_node="">Notes: *Bahrain has no general corporate income tax but has a targeted corporate income tax on oil companies, which can be as high as 46 percent. See Deloitte, “International Tax – Bahrain Highlights 2020,” last updated January 2020, </span><a class="link--long" data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.deloitte.com/content/dam/Deloitte/global/Documents/Tax/dttl-tax-bahrainhighlights-2020.pdf%3Fnc%3D1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4807" instrument_node="">https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Tax/dttl-tax-bahrainhighlights-2020.pdf?nc=1</span></a><span data-dcnode-id="4805" instrument_node="">. The United Arab Emirates is a federation of seven separate emirates. Since 1960, each emirate has the discretion to levy up to a 55 percent corporate tax rate on any business. In practice, this tax is mostly levied on foreign banks and petroleum companies. For more information on the taxation system in the United Arab Emirates, see PwC, “Worldwide Tax Summaries – Corporate income tax (CIT) rates.”</span></p><span data-dcnode-id="4803" instrument_node="">

</span><h2 data-dcnode-id="4793" id="Regional"><span data-dcnode-id="4794" instrument_node="">Regional Variation in Corporate Tax Rates</span></h2><span data-dcnode-id="4792" instrument_node="">
</span><p data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">Corporate tax rates can vary significantly by region. Africa has the highest average statutory corporate tax rate among all regions, at 28.50 percent. Europe has the lowest average statutory corporate tax rate among all regions, at 19.99 percent.</span></p><span data-dcnode-id="4789" instrument_node="">
</span><p data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">When weighted by GDP, South America has the highest average statutory corporate tax rate at 31.83 percent. Europe has the lowest weighted average statutory corporate income tax, at 24.61 percent.</span></p><span data-dcnode-id="4786" instrument_node="">
</span><p data-dcnode-id="4781"><span data-dcnode-id="4785" instrument_node="">In general, larger and more industrialized nations tend to have higher corporate income tax rates than smaller nations. The G7, which is comprised of the seven wealthiest nations in the world, has an average statutory corporate income tax rate of 27.24 percent, and a weighted average rate of 26.95 percent. OECD member states have an average statutory corporate tax rate of 23.51 percent, and a rate of 26.30 percent when weighted by GDP. The BRICS</span><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn9" name="_ftnref9"><span data-dcnode-id="4784" instrument_node="">[9]</span></a><span data-dcnode-id="4782" instrument_node=""> have an average statutory rate of 27.40 percent, and a weighted average statutory corporate income tax rate of 26.49 percent.</span></p><span data-dcnode-id="4780" instrument_node="">

</span><p data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">The following map illustrates the current state of corporate tax rates around the world. Countries in Africa and South America tend to have higher corporate tax rates than Asian and European jurisdictions. Oceania and North America’s corporate tax rates tend to be close to the world average.</span></p><span data-dcnode-id="4554" instrument_node="">
</span><p data-dcnode-id="4551"><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011.png"><img alt="2020 Corporate Tax Rates Around the World, Corporate Taxes around the World, 2020 Corporate Tax Trends" class="alignnone size-full wp-image-80287" data-dcnode-id="4553" sizes="(max-width: 1351px) 100vw, 1351px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011.png 1351w, https://files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011-300x214.png 300w, https://files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011-768x547.png 768w, https://files.taxfoundation.org/20201208141847/2020-Corporate-Tax-Rates-Around-the-World-FV-01-011-1024x730.png 1024w"></a></p><span data-dcnode-id="4550" instrument_node="">
</span><h2 data-dcnode-id="4546" id="Distribution"><span data-dcnode-id="4549" instrument_node="">Distribution of Corporate Tax Rates</span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn10" name="_ftnref10"><span data-dcnode-id="4548" instrument_node="">[10]</span></a></h2><span data-dcnode-id="4545" instrument_node="">
</span><p data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Very few tax jurisdictions impose a corporate income tax at statutory rates greater than 35 percent. The following chart shows a distribution of corporate income tax rates among 223 jurisdictions in 2020. A plurality of countries (117 total) impose a rate above 20 percent and at or below 30 percent. Twenty-three jurisdictions have a statutory corporate tax rate above 30 percent and at or below 35 percent. Eighty jurisdictions have a statutory corporate tax rate at or below 20 percent, and 197 jurisdictions have a corporate tax rate at or below 30 percent.</span></p><span data-dcnode-id="4542" instrument_node="">
</span><p data-dcnode-id="4539"><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World.png"><img alt="Most countries' corporate tax rates range between 20 percent and 30 percent. 2020 corporate tax rates around the world, 2020 corporate tax trends" class="alignnone size-full wp-image-80292" data-dcnode-id="4541" sizes="(max-width: 1328px) 100vw, 1328px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World.png 1328w, https://files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World-300x216.png 300w, https://files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World-768x552.png 768w, https://files.taxfoundation.org/20201208141951/Most-Countries-Corporate-Tax-Rates-Range-between-20-and-30-2020-Corporate-Tax-Rates-Around-the-World-1024x736.png 1024w"></a></p><span data-dcnode-id="4538" instrument_node="">
</span><h2 data-dcnode-id="4536" id="Trends"><span data-dcnode-id="4537" instrument_node="">The Decline of Corporate Tax Rates since 1980</span></h2><span data-dcnode-id="4535" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4534" instrument_node="">Over the past 40 years, corporate tax rates have consistently declined on a global basis. In 1980, the unweighted average worldwide statutory tax rate was 40.11 percent. Today, the average statutory rate stands at 23.85 percent, representing a 41 percent reduction over the 40 years surveyed.</span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn11" name="_ftnref11"><span data-dcnode-id="4533" instrument_node="">[11]</span></a></p><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">The weighted average statutory rate has remained higher than the simple average over this period. Prior to U.S. tax reform in 2017, the United States was largely responsible for keeping the weighted average so high, given its relatively high tax rate, as well as its significant contribution to global GDP. Figure 3 shows the significant impact the change in the U.S. corporate rate had on the worldwide weighted average. The weighted average statutory corporate income tax rate has declined from 46.52 percent in 1980 to 25.85 percent in 2020, representing a 44 percent reduction over the 40 years surveyed.</span></p><span data-dcnode-id="4527" instrument_node="">
</span><p data-dcnode-id="4524"><a data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World.png"><img alt="Corporate tax rates have continuously declined over the last 40 years, 2020 corporate tax rates around the world, 2020 corporate tax trends" class="alignnone size-full wp-image-80291" data-dcnode-id="4526" sizes="(max-width: 1328px) 100vw, 1328px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World.png 1328w, https://files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World-300x216.png 300w, https://files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World-768x552.png 768w, https://files.taxfoundation.org/20201208141950/Corporate-Tax-Rates-Have-Continously-Declined-over-the-Last-40-years-2020-Corporate-Tax-Rates-Around-the-World-1024x736.png 1024w"></a></p><span data-dcnode-id="4523" instrument_node="">
</span><p data-dcnode-id="4519"><span data-dcnode-id="4522" instrument_node="">Over time, more countries have shifted to taxing corporations at rates of or lower than 30 percent, with the United States following this trend with its tax changes at the end of 2017. The largest shift occurred between 2000 and 2010, with 78 percent of countries imposing a statutory rate at or below 30 percent in 2010 and only 42 percent of countries imposing a statutory rate at or below 30 percent in 2000.</span><a data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn12" name="_ftnref12"><span data-dcnode-id="4521" instrument_node="">[12]</span></a></p><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4515"><a data-dcnode-id="4516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World.png"><img alt="Corporate tax rates between 20 percent and 25 percent are most common. 2020 corporate tax rates around the world, 2020 corporate tax trends" class="alignnone size-full wp-image-80288" data-dcnode-id="4517" sizes="(max-width: 1327px) 100vw, 1327px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World.png 1327w, https://files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World-300x263.png 300w, https://files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World-768x673.png 768w, https://files.taxfoundation.org/20201208141946/Corporate-Tax-Rates-between-20-and-25-have-become-the-most-common-2020-Corporate-Tax-Rates-around-the-World-1024x897.png 1024w"></a></p><span data-dcnode-id="4514" instrument_node="">
</span><p data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">All regions saw a net decline in average statutory rates between 1980 and 2020. The average declined the most in Europe, with the 1980 average of 44.6 percent dropping to 19.99 percent, representing a 55 percent rate reduction. South America has seen the smallest decline, with the average only decreasing by 25 percent, from 36.66 percent in 1980 to 27.54 percent in 2020.</span></p><span data-dcnode-id="4511" instrument_node="">
</span><p data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">South America saw a period (1990-2000) where the average statutory rate increased slightly at less than one percentage point, although the average rate decreased over the full 40-year period.</span></p><span data-dcnode-id="4508" instrument_node="">
</span><p data-dcnode-id="4505"><a data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World.png"><img alt="Corporate tax rates have declined in every region around the world over time. 2020 corporate tax rates around the world, 2020 corporate tax trends" class="alignnone size-full wp-image-80289" data-dcnode-id="4507" sizes="(max-width: 1327px) 100vw, 1327px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World.png 1327w, https://files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World-300x216.png 300w, https://files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World-768x553.png 768w, https://files.taxfoundation.org/20201208141948/Corporate-Tax-Rates-Have-Declined-in-Every-Region-Around-the-World-Over-Time-2020-Corporate-Tax-Rates-around-the-World-1024x737.png 1024w"></a></p><span data-dcnode-id="4504" instrument_node="">
</span><h2 data-dcnode-id="4502" id="Conclusion"><span data-dcnode-id="4503" instrument_node="">Conclusion</span></h2><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Worldwide and regional average top statutory corporate tax rates have declined over recent decades, with most countries following the trend. Of 223 jurisdictions around the world, only one has increased its top corporate income tax rate in 2020, while nine countries have decreased their corporate tax rate. The trend seems to be continuing, as several countries are planning to reduce their corporate tax rates in the coming years.</span></p><span data-dcnode-id="4498" instrument_node="">
</span><h2 data-dcnode-id="4496" id="Appendix"><span data-dcnode-id="4497" instrument_node="">Appendix</span></h2><span data-dcnode-id="4495" instrument_node="">
</span><h3 data-dcnode-id="4492"><strong data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">The Dataset</span></strong></h3><span data-dcnode-id="4491" instrument_node="">
</span><h3 data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Scope</span></h3><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4487" instrument_node="">The dataset compiled for this publication includes the 2020 statutory corporate income tax rates of 223 sovereign states and dependent territories around the world. Tax rates were researched only for jurisdictions that are among the around 250 sovereign states and dependent territories that have been assigned a country code by the International Organization for Standardization (ISO).</span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world%3Fclient_source%3Dsmall_player%26iframe%3Dtrue%26referrer%3Dhttps%3A//www.buzzsprout.com/1264889/6804181-corporate-tax-rates-around-the-world.js%3Fcontainer_id%3Dbuzzsprout-player-6804181%26player%3Dsmall%23_ftn13" name="_ftnref13"><span data-dcnode-id="4486" instrument_node="">[13]</span></a><span data-dcnode-id="4484" instrument_node=""> As a result, zones or territories that are independent taxing jurisdictions but do not have their own country code are generally not included in the dataset.</span></p><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">In addition, the dataset includes historic statutory corporate income tax rates for the time period 1980 to 2019. However, these years cover tax rates of fewer than 223 jurisdictions due to missing data points. Please let Tax Foundation know if you are aware of any sources for historic corporate tax rates that are not mentioned in this report, as we constantly strive to improve our datasets.</span></p><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4476"><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World.png"><img alt="Number of Countries for which the Dataset Includes a Corporate Tax Rate, 2020 corporate tax rates around the world, 2020 corporate tax trends" class="alignnone size-full wp-image-80290" data-dcnode-id="4478" sizes="(max-width: 1328px) 100vw, 1328px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World.png&amp;raw" srcset="https://files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World.png 1328w, https://files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World-300x216.png 300w, https://files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World-768x552.png 768w, https://files.taxfoundation.org/20201208141949/Number-of-Countries-for-which-the-dataset-includes-a-Corporate-Tax-Rate-2020-Corporate-Tax-Rates-around-the-World-1024x736.png 1024w"></a></p><span data-dcnode-id="4475" instrument_node="">
</span><p data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">To be able to calculate average statutory corporate income tax rates weighted by GDP, the dataset includes GDP data for 177 jurisdictions. When used to calculate average statutory corporate income tax rates, either weighted by GDP or unweighted, only these 177 jurisdictions are included (to ensure the comparability of the unweighted and weighted averages).</span></p><span data-dcnode-id="4472" instrument_node="">
</span><h3 data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">Definition of Selected Corporate Income Tax Rate</span></h3><span data-dcnode-id="4469" instrument_node="">
</span><p data-dcnode-id="4464"><span data-dcnode-id="4468" instrument_node="">The dataset captures </span><em data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">standard top statutory corporate income tax rates</span></em><span data-dcnode-id="4465" instrument_node=""> levied on domestic businesses. This means:</span></p><span data-dcnode-id="4463" instrument_node="">
</span><ul data-dcnode-id="4449"><span data-dcnode-id="4462" instrument_node="">
</span><li data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">The dataset does not reflect special tax regimes, including but not limited to patent boxes, offshore regimes, or special rates for specific industries.</span></li><span data-dcnode-id="4459" instrument_node="">
</span><li data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">A number of countries levy lower rates for businesses below a certain revenue threshold. The dataset does not capture these lower rates.</span></li><span data-dcnode-id="4456" instrument_node="">
</span><li data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">A few countries levy gross revenue taxes on businesses instead of corporate income taxes. Since the tax rates of a corporate income tax and a gross revenue tax are not comparable, these countries are excluded from the dataset.</span></li><span data-dcnode-id="4453" instrument_node="">
</span><li data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">Some countries have a separate tax rate for nonresident companies. This dataset does not consider nonresident tax rates that differ from the general corporate rate.</span></li><span data-dcnode-id="4450" instrument_node="">
</span></ul><span data-dcnode-id="4448" instrument_node="">
</span><h3 data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Sources</span></h3><span data-dcnode-id="4445" instrument_node="">
</span><h4 data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">Tax Rates for the Year 2020</span></h4><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4428"><span data-dcnode-id="4441" instrument_node="">For OECD countries, the statutory corporate income tax rates used are the </span><em data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">combined</span></em><span data-dcnode-id="4438" instrument_node=""> corporate income tax rates provided by the OECD; see OECD, “Table II.1. Statutory corporate income tax rate,” updated April 2020, </span><a class="link--long" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stats.oecd.org/index.aspx%3FDataSetCode%3DTable_II1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4437" instrument_node="">https://stats.oecd.org/index.aspx?DataSetCode=Table_II1</span></a><span data-dcnode-id="4435" instrument_node="">. The main source for non-OECD jurisdictions are the statutory rates provided by KPMG; see KPMG, “Corporate tax rates table,” 2020, </span><a class="link--long" data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4434" instrument_node="">https://home.kpmg/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online/corporate-tax-rates-table.html</span></a><span data-dcnode-id="4432" instrument_node="">. Jurisdictions that are not part of either source were researched individually. The source for each of these jurisdictions is listed in a GitHub repository; see Tax Foundation, “worldwide-corporate-tax-rates,” GitHub, </span><a class="link--long" data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/TaxFoundation/worldwide-corporate-tax-rates" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4431" instrument_node="">https://github.com/TaxFoundation/worldwide-corporate-tax-rates</span></a><span data-dcnode-id="4429" instrument_node="">.</span></p><span data-dcnode-id="4427" instrument_node="">
</span><h4 data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">Tax Rates for the Years 1980-2019</span></h4><span data-dcnode-id="4424" instrument_node="">
</span><p data-dcnode-id="4416"><span data-dcnode-id="4423" instrument_node="">Tax rates for the time frame between 1980 and 2019 are taken from a dataset compiled by the Tax Foundation over the last years. These historic rates come from multiple sources: PwC, “Worldwide Tax Summaries – Corporate Taxes,” 2010-2019; KPMG, “Corporate Tax Rate Survey,” 1998- 2003; KPMG, “Corporate tax rates table,” 2003-2019; EY, “Worldwide Corporate Tax Guide,” 2004-2019; OECD, “Historical Table II.1 – Statutory corporate income tax rate,” 1999, </span><a class="link--long" data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/tax/tax-policy/tax-database.htm%23C_CorporateCaptial" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4422" instrument_node="">http://www.oecd.org/tax/tax-policy/tax-database.htm#C_CorporateCaptial</span></a><span data-dcnode-id="4420" instrument_node="">; the University of Michigan – Ross School of Business, “World Tax Database,” </span><a class="link--long" data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bus.umich.edu/otpr/otpr/default.asp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4419" instrument_node="">https://www.bus.umich.edu/otpr/otpr/default.asp</span></a><span data-dcnode-id="4417" instrument_node="">; and numerous government websites.</span></p><span data-dcnode-id="4415" instrument_node="">
</span><h4 data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Gross Domestic Product (GDP) for the years 1980-2020</span></h4><span data-dcnode-id="4412" instrument_node="">
</span><p data-dcnode-id="4407"><span data-dcnode-id="4411" instrument_node="">GDP calculations are from the U.S. Department of Agriculture, “International Macroeconomics Data Set,” Jan. 3, 2020, </span><a class="link--long" data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ers.usda.gov/data-products/international-macroeconomic-data-set/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4410" instrument_node="">https://www.ers.usda.gov/data-products/international-macroeconomic-data-set/</span></a><span data-dcnode-id="4408" instrument_node="">.</span></p><span data-dcnode-id="4406" instrument_node="">
