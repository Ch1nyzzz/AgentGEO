</span><p data-dcnode-id="1296"><span data-dcnode-id="1299" instrument_node="">A</span><span data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> valuable financial benefit to owning a house is that you can deduct the property taxes you pay on your home each year, although a 2017 change in the tax laws may have made that less attractive.</span></span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">
</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1292" instrument_node="">Let’s take</span><span data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node=""> a look at how property tax deductions work, as well as some important considerations when debating whether deducting real estate taxes makes financial sense for you.</span></span></p><span data-dcnode-id="1288" instrument_node="">
</span></div><span data-dcnode-id="1286" instrument_node="">
</span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="1233" id="IGXPresentationRow_7bb15eb575957d80ffd6e90e3a3c1fe0"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="1234" gridwidth="12" id="IGXPresentationColumn_29289489cd37776cc950fa848193452c"><span data-dcnode-id="1283" instrument_node=""> </span><div class="b-Copy" data-dcnode-id="1236"><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">What Is The Property Tax Deduction?</span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The property tax deduction is just one of the many tax benefits that homeowners in the U.S. have enjoyed over the years. The 2017 Tax Cuts and Jobs Act capped the amount of that deduction – the state and local taxes (SALT) deduction – at $10,000. The property tax deduction allows homeowners to deduct their local property, or real estate taxes, from their federal income taxes.</span></span></p><span data-dcnode-id="1275" instrument_node="">
</span><h3 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">What Are Property Taxes?</span></h3><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268"><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/property-tax" rel="noopener" target="_blank"><span data-dcnode-id="1271" instrument_node="">Property taxes</span></a><span data-dcnode-id="1269" instrument_node=""> and real estate taxes are the same, and the terms can be used interchangeably. </span></span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264"><span data-dcnode-id="1265" style="text-decoration: line-through;"></span></span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1260"><span data-dcnode-id="1261" style="text-decoration: line-through;"></span></span><span data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">State and local taxes are used to pay for services where you live. In particular, property taxes often fund school districts, garbage pick-up and all the other services that municipalities offer. </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/property-tax-assessment" rel="noopener" target="_blank"><span data-dcnode-id="1258" instrument_node="">Property taxes are assessed</span></a><span data-dcnode-id="1256" instrument_node=""> locally on the value of your home.</span></span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252"></span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">If your mortgage servicer maintains an escrow account – sometimes referred to as an </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/impound-account" rel="noopener" target="_blank"><span data-dcnode-id="1248" instrument_node="">impound account</span></a><span data-dcnode-id="1246" instrument_node=""> – on your behalf, you may not think much about property taxes, but they're being paid as part of your monthly </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/mortgage-payments-explained" rel="noopener" target="_blank"><span data-dcnode-id="1245" instrument_node="">mortgage payment</span></a><span data-dcnode-id="1243" instrument_node="">. This account is also used to pay homeowners and mortgage insurance premiums, if applicable.</span></span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239"></span></p><span data-dcnode-id="1237" instrument_node="">
</span></div><span data-dcnode-id="1235" instrument_node="">
</span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="1202" id="IGXPresentationRow_3e34f68290467e35df993d8c96d635cf"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="1203" gridwidth="12" id="IGXPresentationColumn_189f64379fa6eb27a8619df297a08bfa"><span data-dcnode-id="1232" instrument_node=""> </span><div data-dcnode-id="1205"><span data-dcnode-id="1231" instrument_node="">
</span><div class="sprk-o-CenteredColumn sprk-o-Flag sprk-o-Flag--stacked sprk-o-Flag--middle sprk-u-mbl sprk-u-pam" data-dcnode-id="1207"><span data-dcnode-id="1230" instrument_node="">

</span><h2 data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Are Property Taxes Deductible?</span></h2><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">You're allowed to deduct your property taxes each year, but since the passage of the 2017 Tax Cuts and Jobs Act, it may or may not make sense to do so, depending on your situation.</span></span></p><span data-dcnode-id="1193" instrument_node="">
</span><h3 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The Cap On The Property Tax Deduction</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">First, the 2017 law put a cap on the amount of the property tax deduction. You can now deduct a total of $10,000 in state and local property taxes if you're single, a head of household or if you're married and filing jointly, and $5,000 if you're married and filing separately.</span></span></p><span data-dcnode-id="1186" instrument_node="">
</span><h3 data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Higher Standard Deduction</span></h3><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The 2017 law also increased the amount of the standard deduction. With 2022 inflation-related increases, the standard deduction is up to $12,950 if you file as single or married, filing separately. Heads of households have a standard deduction of $19,400. Finally, if you're married filing jointly, your standard deduction is $25,900.</span></span></p><span data-dcnode-id="1179" instrument_node="">
</span></div><span data-dcnode-id="1177" instrument_node="">
</span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="1131" id="IGXPresentationRow_a856058cef7f6abcc700a90d5cf51abc"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="1132" gridwidth="12" id="IGXPresentationColumn_b575511d83fcacc9a2ebf889df733791"><span data-dcnode-id="1174" instrument_node=""> </span><div class="b-Copy" data-dcnode-id="1134"><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Standard Deduction Vs. Itemized Deductions: What's The Difference?</span></h2><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Aside from the SALT cap, as it's known, the biggest change to the property tax deduction caused by the 2017 tax law is that – because of the increase in the standard deduction – it may not make sense for many homeowners to itemize their deductions. Remember that you can elect to use either standard or itemized deductions, but not both.</span></span></p><span data-dcnode-id="1166" instrument_node="">
</span><h3 data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">What Is The Standard Deduction?</span></h3><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">The standard deduction is the amount everyone gets to deduct from their taxes. You may be able to claim a higher standard deduction if you're blind, or age 65 or older. The IRS website has an </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/help/ita/how-much-is-my-standard-deduction" rel="noopener" target="_blank"><span data-dcnode-id="1161" instrument_node="">interactive tax assistant</span></a><span data-dcnode-id="1159" instrument_node=""> that will tell you exactly how much your standard deduction is.</span></span></p><span data-dcnode-id="1156" instrument_node="">
</span><h3 data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">What Are Itemized Deductions?</span></h3><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">You can always try to itemize your deductions to see if doing so gives you a bigger deduction than the standard deduction allows. Because of the SALT cap, it no longer makes sense for many homeowners to itemize their deductions.</span></span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148"></span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">For example, if you paid $7,000 in property taxes in 2021 and $5,000 in state and local income taxes, you can only deduct $10,000 on your 2021 income taxes, not the $12,000 you actually paid.</span></span></p><span data-dcnode-id="1142" instrument_node="">
</span><h3 data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">How Much Is The Standard Deduction In 2022?</span></h3><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">For 2022, the standard deduction is $12,950 per individual taxpayer, $25,900 for married couples filing jointly and $19,400 for heads of households. The 2017 law requires that the deduction be revised each year to account for inflation.</span></span></p><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span></div></div><div class="onespot-recommendations onespot-no-print" data-dcnode-id="1121" id="learn-middle-text-unit"><div class="onespot-unit text-list" data-dcnode-id="1122"><div class="unit-title" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Read More: </span></div><div class="recommendations" data-dcnode-id="1124"><ul data-dcnode-id="1125"><li data-dcnode-id="1126"><a class="recommendation onespot-rec" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/best-places-to-raise-a-family" id="onsite-rec:learn-middle-text-unit:-1:0:true:2591476::text-list:default:b96d279d-b159-40f0-9513-2f14bdbbdcba:0"><span data-dcnode-id="1128" instrument_node="">Top 10 Best Places To Raise A Family</span></a></li></ul></div><span data-dcnode-id="1123" instrument_node=""></span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="1090" id="IGXPresentationRow_8598470106a29093f866bbc07707a7e5"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="1091" gridwidth="12" id="IGXPresentationColumn_596cb3684e5e6c8c87162d73d3ed3ff9"><span data-dcnode-id="1120" instrument_node=""> </span><div data-dcnode-id="1093"><span data-dcnode-id="1119" instrument_node="">

</span><h2 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">How To Claim Your Real Estate Tax Deduction</span></h2><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">If you decide to claim the standard deduction, you can't also itemize to deduct your property taxes. If your standard deduction would be higher than any savings you could gain by itemizing your taxes, it makes more sense to claim that standard deduction. If you'd save more by itemizing and claiming your property tax deduction, you should itemize and not claim the standard deduction.</span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080"></span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">If you plan on itemizing your taxes, here are the steps to follow to claim your property tax deduction.</span></span></p><span data-dcnode-id="1074" instrument_node="">
</span><h3 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Determine If You Want To Itemize</span></h3><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Remember, you can only claim your property tax deduction if you itemize your taxes. If you claim your standard deduction, you can't also write off property taxes. You'll need to determine, then, whether you'll save more money on your taxes with the standard deduction or by itemizing.</span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Review Tax Records</span></h3><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Your local or county government will usually send your property tax bills two times a year. Refer to them to determine how much you paid in taxes for the year. You can only deduct your property taxes in the year you pay them. If you're filing your taxes for 2020, then, only deduct the amount of property taxes you paid in that year.</span></span></p><span data-dcnode-id="1060" instrument_node="">
</span><h3 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Double Check Your Escrow Account</span></h3><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node="">If you make your property tax </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/escrow-update" rel="noopener" target="_blank"><span data-dcnode-id="1055" instrument_node="">payments through an escrow account</span></a><span data-dcnode-id="1053" instrument_node=""> set up by your mortgage lender, it's even easier to keep track of what you paid. Each year, your lender will send you a 1098 statement. This statement lists the amount of mortgage interest you pay during the tax year. But it also lists the property tax payments your lender has made on your behalf. You can find this number in Box 4 of your 1098 form.</span></span></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Use Schedule A</span></h3><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node="">You'll need to file a completed </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-schedule-a-form-1040" rel="noopener" target="_blank"><span data-dcnode-id="1045" instrument_node="">Schedule A</span></a><span data-dcnode-id="1043" instrument_node=""> along with your Form 1040 with the IRS if you want to claim a property tax deduction. This form allows you to claim all of your deductions, from medical and dental expenses to mortgage interest.</span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039"></span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">You can also enter the state and local income or general sales taxes (one or the other) you paid during the year on line 5a, your state and local real estate taxes on line 5b and your state and local personal property taxes on line 5c. You'd then add lines 5a through 5c to determine your property tax deduction.</span></span></p><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1031" instrument_node="">
</span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="937" id="IGXPresentationRow_01dff71eb7a157110133e35f16d4fc62"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="938" gridwidth="12" id="IGXPresentationColumn_706c37fd0bc9df5b7082a4d455767337"><span data-dcnode-id="1028" instrument_node=""> </span><div class="b-Copy" data-dcnode-id="940"><span data-dcnode-id="1027" instrument_node="">
</span><h2 data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Property Tax Deduction FAQs</span></h2><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Here are some common questions and answers about the property tax deduction.</span></span></p><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">What's the difference between a tax deduction and a tax exemption?</span></h3><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010"><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/property-tax-exemptions" rel="noopener" target="_blank"><span data-dcnode-id="1016" instrument_node="">Property tax exemptions</span></a><span data-dcnode-id="1014" instrument_node=""> are portions of a full tax amount that taxpayers don’t have to pay. Some state and local governments offer exemptions to reduce or forgo the amount of taxes paid by some residents, usually on the basis of age, disability or military service. There is also a </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/homestead-exemption" rel="noopener" target="_blank"><span data-dcnode-id="1013" instrument_node="">homestead exemption</span></a><span data-dcnode-id="1011" instrument_node=""> in many areas. </span></span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006"><span data-dcnode-id="1007" style="text-decoration: line-through;"></span></span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1002"><span data-dcnode-id="1003" style="text-decoration: line-through;"></span></span><span data-dcnode-id="1001" instrument_node="">T</span><span data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">o see if your municipality offers an exemption and whether you qualify, check your local government's website.</span></span></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">What is escrow and how does it pay for my property taxes?</span></h3><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/escrow-explained" rel="noopener" target="_blank"><span data-dcnode-id="993" instrument_node="">Escrow</span></a><span data-dcnode-id="991" instrument_node=""> is an account set up by your lender through which you can pay your property taxes and insurance premiums. Under these escrow arrangements, you pay extra with each mortgage payment, and your lender deposits these extra dollars in an escrow account. When your property taxes and homeowners insurance bills are due, your lender uses the funds in this account to pay them on your behalf. </span></span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">
</span></p><p data-dcnode-id="982"><span data-dcnode-id="985" instrument_node="">In</span><span data-dcnode-id="983"><span data-dcnode-id="984" instrument_node=""> this way, property taxes affect your mortgage payments, making them higher than they would be if you didn't escrow your taxes and insurance. Escrow arrangements, though, can reduce the risk of you missing your property tax payments, and even if you pay your property taxes through an escrow account, you can still deduct them on your income taxes.</span></span></p><span data-dcnode-id="981" instrument_node="">
</span><h3 data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">How do I find out what property taxes will be on the properties I'm considering?</span></h3><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The higher your property taxes, the more expensive it will be to own your home. For example, say your home comes with yearly estimated property taxes of $8,400. If you escrow your property taxes, that will add $700 to your monthly mortgage payment.</span></span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973"></span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">You can also ask home sellers what they're paying but understand that you'll probably pay more if your purchase price exceeds the current owner's assessed value. It also varies because you might qualify for different exemptions as well.</span></span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">
</span></p><p data-dcnode-id="959"><span data-dcnode-id="964" instrument_node="">Even if you can deduct them, though, it's important to consider the </span><span data-dcnode-id="960"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/blog/impact-property-taxes-home-buying-decisions" rel="noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">impact property taxes have on home buying</span></a><span data-dcnode-id="961" instrument_node="">.</span></span></p><span data-dcnode-id="958" instrument_node="">
</span><h3 data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Are there exceptions to the property tax deduction?</span></h3><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">You can't claim deductions for every kind of tax levied against your properties. For instance, you can't deduct the cost of any assessments levied against you for the building of streets, water systems, sewer systems and sidewalks in your community. You can't deduct the portion of your property tax bill that's allocated for services such as water or trash collection.</span></span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950"></span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">If you live in a building or community that charges </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quickenloans.com/learn/hoa-fees" rel="noopener" target="_blank"><span data-dcnode-id="946" instrument_node="">homeowners association (HOA) fees</span></a><span data-dcnode-id="944" instrument_node="">, you can't deduct them. And you also can't deduct any payments you've made on loans that finance the addition of energy-saving improvements to your home. Depending on your situation, there may be other deductions and credits available for these energy-saving home improvements.</span></span></p><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></div></div><div class="row pagePresentationLayoutRow" data-dcnode-id="913" id="IGXPresentationRow_6691cb147e05278fc3f2c5d804110f6b"><div class="col-sm-12 pagePresentationLayoutColumn" data-dcnode-id="914" gridwidth="12" id="IGXPresentationColumn_85270579208093c3191082face495e8e"><span data-dcnode-id="936" instrument_node=""> </span><div class="b-Copy" data-dcnode-id="916"><span data-dcnode-id="935" instrument_node="">
</span><h2 data-dcnode-id="931"><span data-dcnode-id="932"><span data-dcnode-id="934" instrument_node="">The Bottom Line</span><span data-dcnode-id="933" style="text-decoration: line-through;"></span></span></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The 2017 tax law modified many rules, but it still allows at least a partial property tax deduction. Whether it makes sense for you to take it depends on your individual situation, but many homeowners will find that the standard deduction more than makes up for the cap on the deduction.</span></span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">
</span></p><p data-dcnode-id="918"><span data-dcnode-id="923" instrument_node="">If you don’t own a home yet but are considering it, </span><span data-dcnode-id="919"><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rocketmortgage.com/alf/bam-orbit/loanType%3FQLSource%3DQLTextLink" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">get preapproved</span></a><span data-dcnode-id="920" instrument_node=""> today with Rocket Mortgage® and see what rates and terms you can qualify for.</span></span></p><span data-dcnode-id="917" instrument_node="">
</span></div><span data-dcnode-id="915" instrument_node="">
