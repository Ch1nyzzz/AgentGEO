</span><p data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">The first thing first, If you are new to locum tenens work you must know that now you are an independent contractor which means you are self-employed and your locum tenens taxes will be different from W-2 taxes that you used to file.</span></p><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">1 – Nobody withdraws your income tax from your paycheck anymore so now it is YOUR responsibility to make regular tax payments to the IRS (federal tax, self-employment tax, and state tax).</span></p><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">2 – Your tax return will look different: you will have to pay taxes four times a year in contrast to once at the end of the year.</span></p><p data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">3 – Now you can deduct business expenses, i.e. the thing that cost you money but are required to conduct your “business” as a locum tenens physician.</span></p><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">This will be the case regardless of whether you work using a staffing agency or work directly with the hospital as long as you are paid as a 1099 physician.</span></p><span data-dcnode-id="2984" instrument_node=""> </span></div><span data-dcnode-id="2982" instrument_node="">

</span><p data-dcnode-id="2680"><b data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">If you use your personal (i.e. not rented) car to travel to locum tenens assignments, your tax advantage will usually come in one of the two forms:</span></b></p><span data-dcnode-id="2679" instrument_node=""> </span></div><span data-dcnode-id="2677" instrument_node="">
</span></div><span data-dcnode-id="2675" instrument_node="">

</span><span data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">“All-inclusive” IRS mileage rate</span></span><span data-dcnode-id="2657" instrument_node="">
</span></h3><span data-dcnode-id="2655" instrument_node="">
</span></div><span data-dcnode-id="2653" instrument_node="">

</span></div><span data-dcnode-id="2649" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="2621"><span data-dcnode-id="2645" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2623"><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2643" instrument_node="">The most common option is to use the “all-inclusive” IRS mileage rate, which changes every year and it is&nbsp;</span><strong data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">$0.575 per mile</span></strong><span data-dcnode-id="2640" instrument_node="">&nbsp;in 2020.</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">So, for example, you decided to drive to the neighboring state instead of flying and covered 500 miles both ways. Also, while working away from home you drove 10 miles every day for 15 days to get from the hotel to the hospital and back.</span></p><p data-dcnode-id="2633"><u data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Your total mileage would equal:&nbsp;</span></u><span data-dcnode-id="2634" instrument_node="">500 + 10 * 15 (10 miles daily for 15 days) = 650 miles</span></p><p data-dcnode-id="2629"><span data-dcnode-id="2632" instrument_node="">To calculate the money value you need to multiply total mileage by IRS rate, or 650 miles x $0.575 which equals&nbsp;</span><strong data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">$373.75.</span></strong></p><p data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Now, when you work with an agency this amount will be added to your paycheck and will be tax-free.&nbsp;</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">If you work with the hospital directly as an independent contractor, this amount is allowable as tax deductions for doctors.</span></p><span data-dcnode-id="2624" instrument_node=""> </span></div><span data-dcnode-id="2622" instrument_node="">

</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">A lot of doctors want to know how much money they can deduct from their 1099 taxable income. In my experience, if you travel away from home and work locum tenens full time, you will be looking at anywhere between $5000 to $15,000.</span></p><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">So, if you are in the 30% tax brackets, you will save $5000 * 30%, or $1500 per year on the lower end and $15000*(keep in mind these are very rough calculations).</span></p><span data-dcnode-id="1465" instrument_node=""> </span></div><span data-dcnode-id="1463" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="800"><time class="comment-time" data-dcnode-id="801"><a class="comment-time-link" data-dcnode-id="802" href="#comment-235"><span data-dcnode-id="803" instrument_node="">August 26, 2020 at 10:59 pm</span></a></time></p><span data-dcnode-id="799" instrument_node=""> </span></header><span data-dcnode-id="797" instrument_node="">
</span><div class="comment-content" data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Hi, Out of training, I started 2 locum tenens assignments in California in July/August 2020 to fill a full work week. Neither of the two agencies are covering travel/meal/housing. My permanent residence is still considered a taxable state on the East Coast. I am single, drove across country over 7 days, and am nearing the end of 2 weeks in a hotel. My immediate questions are: To maximize deductions/minimize costs, should I continue in hotels, AirBnB/ corporate Zeus rentals (all paid out of pocket on my business credit card)? Or, can I sign a short-term 6 month condo lease in CA? Specifically, should I start pre-paying tax to CA and MA for the 2020 tax year (despite only making hourly contract rate in July/August)? I know I should pre-pay federal taxes…My initial contacts are 3 and 6 month terms. I appreciate the advice!</span></p><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="788"><a aria-label="Reply to XC" class="comment-reply-link" data-belowelement="article-comment-235" data-commentid="235" data-dcnode-id="789" data-postid="1715" data-respondelement="respond" href="#comment-235" rel="nofollow"><span data-dcnode-id="790" instrument_node="">Reply</span></a></div><span data-dcnode-id="787" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="778" height="60" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4e8dd903053f139edcec30be1816863d%3Fs%3D60%26d%3Dmonsterid%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4e8dd903053f139edcec30be1816863d?s=120&amp;d=monsterid&amp;r=g 2x" width="60"><span class="comment-author-name" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Ben Nanney, CPA</span></span><span data-dcnode-id="775" instrument_node=""> </span><span class="says" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">says</span></span><span data-dcnode-id="772" instrument_node=""> </span></p><span data-dcnode-id="770" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="766"><time class="comment-time" data-dcnode-id="767"><a class="comment-time-link" data-dcnode-id="768" href="#comment-240"><span data-dcnode-id="769" instrument_node="">September 3, 2020 at 1:40 pm</span></a></time></p><span data-dcnode-id="765" instrument_node=""> </span></header><span data-dcnode-id="763" instrument_node="">
</span><div class="comment-content" data-dcnode-id="749"><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Hi XC,</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">If you’re keeping up a residence in MA and still travel back some in between assignments, then your CA travel expenses are deductible. This said, it still makes sense to minimize actual expenses where possible. For example, let’s say you paid 40% of tax on your business income, which means every dollar of extra business expense saves you $0.40. If you paid an extra $1,000 in travel expenses by staying at a hotel instead of condo, you’d “save” $400 in taxes but are still in the hole $600 ($1,000 travel costs – $400 tax savings).</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">On making estimated payments to the states, your CA earnings should already have a 7% withholding for CA income tax (more on this here: </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftb.ca.gov/pay/withholding/withholding-on-nonresidents.html" rel="nofollow ugc"><span data-dcnode-id="754" instrument_node="">https://www.ftb.ca.gov/pay/withholding/withholding-on-nonresidents.html</span></a><span data-dcnode-id="752" instrument_node=""> ). Many states don’t require this so something to keep in mind. Also, whatever tax you pay to CA for business income will offset what you owe to MA for the same business income (you don’t pay income tax to both states on the same dollar of income, thankfully!).</span></p><span data-dcnode-id="750" instrument_node="">
</span></div><span data-dcnode-id="748" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="745"><a aria-label="Reply to Ben Nanney, CPA" class="comment-reply-link" data-belowelement="article-comment-240" data-commentid="240" data-dcnode-id="746" data-postid="1715" data-respondelement="respond" href="#comment-240" rel="nofollow"><span data-dcnode-id="747" instrument_node="">Reply</span></a></div><span data-dcnode-id="744" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="617"><time class="comment-time" data-dcnode-id="618"><a class="comment-time-link" data-dcnode-id="619" href="#comment-536"><span data-dcnode-id="620" instrument_node="">December 16, 2021 at 3:11 pm</span></a></time></p><span data-dcnode-id="616" instrument_node=""> </span></header><span data-dcnode-id="614" instrument_node="">

</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Hi Richard,</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="609" instrument_node="">If you have a full-time W2 job, you can check with HR to see if your employer offers a Dependent Care Flexible Spending Account. If you qualify, you can contribute money to this account pre-tax and then use it for childcare expenses tax-free. A big qualification for many married couples is that both spouses work (have earned income). Also, you can’t use both a Dependent Care FSA and take the Dependent Care Credit on the same expenses, so ideally you’d want to compare which option would likely offer the best benefit for your situation. Here’s the exciting technical info from IRS, if curious: </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-publication-503" rel="nofollow ugc"><span data-dcnode-id="608" instrument_node="">https://www.irs.gov/forms-pubs/about-publication-503</span></a><span data-dcnode-id="606" instrument_node="">. For more practical guidance, you may want to check out this detailed article at WCI:</span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/dcfsa-and-cdctc-tax-credits/" rel="nofollow ugc"><span data-dcnode-id="605" instrument_node="">https://www.whitecoatinvestor.com/dcfsa-and-cdctc-tax-credits/</span></a></p><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">

</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Hi Chris,</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="532" instrument_node="">Good question. If you worked an assignment in VA, then you report that assignment income to VA as a “nonresident” and will owe tax on it. If you live in a state that also has an income tax, you should report the tax owed to VA on your home state’s tax return, and receive a reduction in the amount of tax owed to your home state (known as a state tax credit). Most all states follow these principles, with VA’s specific reporting info here if curious for a source: </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tax.virginia.gov/residency-status%23%3A~%3Atext%3DYou%2520are%2520liable%2520to%2520pay%2Cmilitary%252C%2520see%2520Military%2520Tax%2520Tips" rel="nofollow ugc"><span data-dcnode-id="531" instrument_node="">https://www.tax.virginia.gov/residency-status#:~:text=You%20are%20liable%20to%20pay,military%2C%20see%20Military%20Tax%20Tips</span></a><span data-dcnode-id="529" instrument_node="">.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">As far as whether the assignment is reported to VA, it depends on the locum agency. I’ve seen some 1099’s specify the assignment state’s income (meaning there would be an official record of the VA income) and other 1099’s that didn’t. But even if your 1099 didn’t specify the VA assignment income, I’d report it correctly. Would avoid potential time and money headaches down the road.</span></p><span data-dcnode-id="524" instrument_node="">
</span></div><span data-dcnode-id="522" instrument_node="">
