</span><h2 data-dcnode-id="3056"><span class="mw-headline" data-dcnode-id="3064" id="Other_corporate_events"><span data-dcnode-id="3065" instrument_node="">Other corporate events</span></span><span class="mw-editsection" data-dcnode-id="3057"><span class="mw-editsection-bracket" data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">[</span></span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D10" title="Edit section: Other corporate events"><span data-dcnode-id="3061" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Many systems provide that certain corporate events are not taxable to corporations or shareholders.  Significant restrictions and special rules often apply.  The rules related to such transactions are often quite complex.
</span></p><span data-dcnode-id="3052" instrument_node="">
</span><h3 data-dcnode-id="3042"><span class="mw-headline" data-dcnode-id="3050" id="Formation"><span data-dcnode-id="3051" instrument_node="">Formation</span></span><span class="mw-editsection" data-dcnode-id="3043"><span class="mw-editsection-bracket" data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">[</span></span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D11" title="Edit section: Formation"><span data-dcnode-id="3047" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3040" instrument_node="">Most systems treat the formation of a corporation by a controlling corporate shareholder as a nontaxable event.  Many systems, including the United States and Canada, extend this tax free treatment to the formation of a corporation by any group of shareholders in control of the corporation.</span><sup class="reference" data-dcnode-id="3037" id="cite_ref-44"><a data-dcnode-id="3038" href="#cite_note-44"><span data-dcnode-id="3039" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3036" instrument_node="">  Generally, in tax free formations the tax attributes of assets and liabilities are transferred to the new corporation along with such assets and liabilities.
</span></p><p data-dcnode-id="3029"><span data-dcnode-id="3034" instrument_node="">Example:  John and Mary are United States residents who operate a business.  They decide to incorporate for business reasons.  They transfer the assets of the business to Newco, a newly formed Delaware corporation of which they are the sole shareholders, subject to accrued liabilities of the business in exchange solely for common shares of Newco.  Under United States principles, this transfer does not cause tax to John, Mary, or Newco.  If on the other hand Newco also assumes a bank loan in excess of the basis of the assets transferred less the accrued liabilities, John and Mary will recognize taxable gain for such excess.</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-45"><a data-dcnode-id="3032" href="#cite_note-45"><span data-dcnode-id="3033" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3030" instrument_node="">
</span></p><span data-dcnode-id="3028" instrument_node="">
</span><h3 data-dcnode-id="3018"><span class="mw-headline" data-dcnode-id="3026" id="Acquisitions"><span data-dcnode-id="3027" instrument_node="">Acquisitions</span></span><span class="mw-editsection" data-dcnode-id="3019"><span class="mw-editsection-bracket" data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">[</span></span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D12" title="Edit section: Acquisitions"><span data-dcnode-id="3023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3011"><span data-dcnode-id="3016" instrument_node="">Corporations may merge or acquire other corporations in a manner a particular tax system treats as nontaxable to either of the corporations and/or to their shareholders.  Generally, significant restrictions apply if tax free treatment is to be obtained.</span><sup class="reference" data-dcnode-id="3013" id="cite_ref-46"><a data-dcnode-id="3014" href="#cite_note-46"><span data-dcnode-id="3015" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3012" instrument_node="">  For example, Bigco acquires all of the shares of Smallco from Smallco shareholders in exchange solely for Bigco shares.  This acquisition is not taxable to Smallco or its shareholders under U.S. or Canadian tax law if certain requirements are met, even if Smallco is then liquidated into or merged or amalgamated with Bigco.
</span></p><span data-dcnode-id="3010" instrument_node="">
</span><h3 data-dcnode-id="3000"><span class="mw-headline" data-dcnode-id="3008" id="Reorganizations"><span data-dcnode-id="3009" instrument_node="">Reorganizations</span></span><span class="mw-editsection" data-dcnode-id="3001"><span class="mw-editsection-bracket" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">[</span></span><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D13" title="Edit section: Reorganizations"><span data-dcnode-id="3005" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2993"><span data-dcnode-id="2998" instrument_node="">In addition, corporations may change key aspects of their legal identity, capitalization, or structure in a tax free manner under most systems.  Examples of reorganizations that may be tax free include mergers, amalgamations, liquidations of subsidiaries, share for share exchanges, exchanges of shares for assets, changes in form or place of organization, and recapitalizations.</span><sup class="reference" data-dcnode-id="2995" id="cite_ref-47"><a data-dcnode-id="2996" href="#cite_note-47"><span data-dcnode-id="2997" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2994" instrument_node="">
</span></p><span data-dcnode-id="2992" instrument_node="">
</span><h2 data-dcnode-id="2982"><span class="mw-headline" data-dcnode-id="2990" id="Interest_deduction_limitations"><span data-dcnode-id="2991" instrument_node="">Interest deduction limitations</span></span><span class="mw-editsection" data-dcnode-id="2983"><span class="mw-editsection-bracket" data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">[</span></span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D14" title="Edit section: Interest deduction limitations"><span data-dcnode-id="2987" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2980" instrument_node="">Most jurisdictions allow a </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_deduction" title="Tax deduction"><span data-dcnode-id="2979" instrument_node="">tax deduction</span></a><span data-dcnode-id="2977" instrument_node=""> for interest expense incurred by a corporation in carrying out its trading activities.  Where such interest is paid to related parties, such deduction may be limited.  Without such limitation, owners could structure financing of the corporation in a manner that would provide for a tax deduction for much of the profits, potentially without changing the tax on shareholders.  For example, assume a corporation earns profits of 100 before interest expense and would normally distribute 50 to shareholders.  If the corporation is structured so that deductible interest of 50 is payable to the shareholders, it will cut its tax to half the amount due if it merely paid a dividend.
</span></p><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">A common form of limitation is to limit the deduction for interest paid to related parties to interest charged at arm's length rates on debt not exceeding a certain portion of the equity of the paying corporation.  For example, interest paid on related party debt in excess of three times equity may not be deductible in computing taxable income.
</span></p><p data-dcnode-id="2965"><span data-dcnode-id="2973" instrument_node="">The United States, United Kingdom, and French tax systems apply a more complex set of tests to limit deductions.  Under the </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_tax_in_the_United_States" title="Corporate tax in the United States"><span data-dcnode-id="2972" instrument_node="">U.S. system</span></a><span data-dcnode-id="2970" instrument_node="">, related party interest expense in excess of 50% of cash flow is generally not currently deductible, with the excess potentially deductible in future years.</span><sup class="reference" data-dcnode-id="2967" id="cite_ref-48"><a data-dcnode-id="2968" href="#cite_note-48"><span data-dcnode-id="2969" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2966" instrument_node="">
</span></p><p data-dcnode-id="2959"><span data-dcnode-id="2964" instrument_node="">The classification of instruments as debt on which interest is deductible or as equity with respect to which distributions are not deductible can be complex in some systems.</span><sup class="reference" data-dcnode-id="2961" id="cite_ref-49"><a data-dcnode-id="2962" href="#cite_note-49"><span data-dcnode-id="2963" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2960" instrument_node="">
</span></p><span data-dcnode-id="2958" instrument_node="">
</span><h2 data-dcnode-id="2948"><span class="mw-headline" data-dcnode-id="2956" id="Foreign_corporation_branches"><span data-dcnode-id="2957" instrument_node="">Foreign corporation branches</span></span><span class="mw-editsection" data-dcnode-id="2949"><span class="mw-editsection-bracket" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">[</span></span><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D15" title="Edit section: Foreign corporation branches"><span data-dcnode-id="2953" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2946" instrument_node="">Most jurisdictions tax foreign corporations differently from domestic corporations.</span><sup class="reference" data-dcnode-id="2943" id="cite_ref-50"><a data-dcnode-id="2944" href="#cite_note-50"><span data-dcnode-id="2945" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2942" instrument_node="">  No international laws limit the ability of a country to tax its nationals and residents (individuals and entities).  However, treaties and practicality impose limits on taxation of those outside its borders, even on income from sources within the country.
</span></p><p data-dcnode-id="2932"><span data-dcnode-id="2940" instrument_node="">Most jurisdictions tax foreign corporations on business income within the jurisdiction when earned through a branch or </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Permanent_establishment" title="Permanent establishment"><span data-dcnode-id="2939" instrument_node="">permanent establishment</span></a><span data-dcnode-id="2937" instrument_node=""> in the jurisdiction.  This tax may be imposed at the same rate as the tax on business income of a resident corporation or at a different rate.</span><sup class="reference" data-dcnode-id="2934" id="cite_ref-51"><a data-dcnode-id="2935" href="#cite_note-51"><span data-dcnode-id="2936" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2933" instrument_node="">
</span></p><p data-dcnode-id="2920"><span data-dcnode-id="2931" instrument_node="">Upon payment of </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dividend" title="Dividend"><span data-dcnode-id="2930" instrument_node="">dividends</span></a><span data-dcnode-id="2928" instrument_node="">, corporations are generally subject to </span><a class="mw-redirect" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withholding_tax" title="Withholding tax"><span data-dcnode-id="2927" instrument_node="">withholding tax</span></a><span data-dcnode-id="2925" instrument_node=""> only by their country of incorporation.  Many countries impose a branch profits tax on foreign corporations to prevent the advantage the absence of dividend withholding tax would otherwise provide to foreign corporations.  This tax may be imposed at the time profits are earned by the branch or at the time they are remitted or deemed remitted outside the country.</span><sup class="reference" data-dcnode-id="2922" id="cite_ref-52"><a data-dcnode-id="2923" href="#cite_note-52"><span data-dcnode-id="2924" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2921" instrument_node="">
</span></p><p data-dcnode-id="2914"><span data-dcnode-id="2919" instrument_node="">Branches of foreign corporations may not be entitled to all of the same deductions as domestic corporations.  Some jurisdictions do not recognize inter-branch payments as actual payments, and income or deductions arising from such inter-branch payments are disregarded.</span><sup class="reference" data-dcnode-id="2916" id="cite_ref-53"><a data-dcnode-id="2917" href="#cite_note-53"><span data-dcnode-id="2918" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2915" instrument_node="">  Some jurisdictions impose express limits on tax deductions of branches.  Commonly limited deductions include management fees and interest.
</span></p><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Nathan M. Jenson argues that low corporate tax rates are a minor determinate of a multinational company when setting up their headquarters in a country. Nathan M. Jenson: Sinha, S.S. 2008, "Can India Adopt Strategic Flexibility Like China Did?", Global Journal of Flexible Systems Management, vol. 9, no. 2/3, pp.&nbsp;1.
</span></p><span data-dcnode-id="2911" instrument_node="">
</span><h2 data-dcnode-id="2901"><span class="mw-headline" data-dcnode-id="2909" id="Losses"><span data-dcnode-id="2910" instrument_node="">Losses</span></span><span class="mw-editsection" data-dcnode-id="2902"><span class="mw-editsection-bracket" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">[</span></span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D16" title="Edit section: Losses"><span data-dcnode-id="2906" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2899" instrument_node="">Most jurisdictions allow interperiod allocation or deduction of losses in some manner for corporations, even where such deduction is not allowed for individuals.  A few jurisdictions allow losses (usually defined as negative taxable income) to be deducted by revising or amending prior year taxable income.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-54"><a data-dcnode-id="2897" href="#cite_note-54"><span data-dcnode-id="2898" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2895" instrument_node="">  Most jurisdictions allow such deductions only in subsequent periods.  Some jurisdictions impose time limitations as to when loss deductions may be utilized.
</span></p><span data-dcnode-id="2893" instrument_node="">
</span><h2 data-dcnode-id="2883"><span class="mw-headline" data-dcnode-id="2891" id="Groups_of_companies"><span data-dcnode-id="2892" instrument_node="">Groups of companies</span></span><span class="mw-editsection" data-dcnode-id="2884"><span class="mw-editsection-bracket" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">[</span></span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D17" title="Edit section: Groups of companies"><span data-dcnode-id="2888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2877"><span data-dcnode-id="2881" instrument_node="">Several jurisdictions provide a mechanism whereby losses or </span><a class="mw-redirect" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_credits" title="Tax credits"><span data-dcnode-id="2880" instrument_node="">tax credits</span></a><span data-dcnode-id="2878" instrument_node=""> of one corporation may be used by another corporation where both corporations are commonly controlled (together, a group).  In the United States and Netherlands, among others, this is accomplished by filing a single tax return including the income and loss of each group member.  This is referred to as a consolidated return in the United States and as a fiscal unity in the Netherlands.  In the United Kingdom, this is accomplished directly on a pairwise basis called group relief.  Losses of one group member company may be "surrendered" to another group member company, and the latter company may deduct the loss against profits.
</span></p><p data-dcnode-id="2871"><span data-dcnode-id="2876" instrument_node="">The United States has extensive regulations dealing with consolidated returns.</span><sup class="reference" data-dcnode-id="2873" id="cite_ref-55"><a data-dcnode-id="2874" href="#cite_note-55"><span data-dcnode-id="2875" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2872" instrument_node="">  One such rule requires matching of income and deductions on intercompany transactions within the group by use of "deferred intercompany transaction" rules.
</span></p><p data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">In addition, a few systems provide a tax exemption for dividend income received by corporations.  The Netherlands system provides a "participation exception" to taxation for corporations owning more than 25% of the dividend paying corporation.
</span></p><span data-dcnode-id="2868" instrument_node="">
</span><h2 data-dcnode-id="2858"><span class="mw-headline" data-dcnode-id="2866" id="Transfer_pricing"><span data-dcnode-id="2867" instrument_node="">Transfer pricing</span></span><span class="mw-editsection" data-dcnode-id="2859"><span class="mw-editsection-bracket" data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">[</span></span><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D18" title="Edit section: Transfer pricing"><span data-dcnode-id="2863" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2857" instrument_node="">
</span><link data-dcnode-id="2856" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2852" role="note"><span data-dcnode-id="2855" instrument_node="">See also: </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transfer_pricing" title="Transfer pricing"><span data-dcnode-id="2854" instrument_node="">Transfer pricing</span></a></div><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">A key issue in corporate tax is the setting of prices charged by related parties for goods, services or the use of property. Many jurisdictions have guidelines on transfer pricing which allow tax authorities to adjust transfer prices used. Such adjustments may apply in both an international and a domestic context.
</span></p><span data-dcnode-id="2848" instrument_node="">
</span><h2 data-dcnode-id="2838"><span class="mw-headline" data-dcnode-id="2846" id="Taxation_of_shareholders"><span data-dcnode-id="2847" instrument_node="">Taxation of shareholders</span></span><span class="mw-editsection" data-dcnode-id="2839"><span class="mw-editsection-bracket" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">[</span></span><a data-dcnode-id="2842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D19" title="Edit section: Taxation of shareholders"><span data-dcnode-id="2843" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2836" instrument_node="">Most income tax systems levy tax on the corporation and, upon distribution of earnings (dividends), on the shareholder.  This results in a dual level of tax.  Most systems require that income tax be withheld on distribution of dividends to foreign shareholders, and some also require withholding of tax on distributions to domestic shareholders.  The rate of such </span><a class="mw-redirect" data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withholding_tax" title="Withholding tax"><span data-dcnode-id="2835" instrument_node="">withholding tax</span></a><span data-dcnode-id="2833" instrument_node=""> may be reduced for a shareholder under a </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_treaty" title="Tax treaty"><span data-dcnode-id="2832" instrument_node="">tax treaty</span></a><span data-dcnode-id="2830" instrument_node="">.
</span></p><p data-dcnode-id="2820"><span data-dcnode-id="2828" instrument_node="">Some systems tax some or all dividend income at lower rates than other income.  The United States has historically provided a </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dividends_received_deduction" title="Dividends received deduction"><span data-dcnode-id="2827" instrument_node="">dividends received deduction</span></a><span data-dcnode-id="2825" instrument_node=""> to corporations with respect to dividends from other corporations in which the recipient owns more than 10% of the shares.  For tax years 2004–2010, the United States also has imposed a reduced rate of taxation on dividends received by individuals.</span><sup class="reference" data-dcnode-id="2822" id="cite_ref-56"><a data-dcnode-id="2823" href="#cite_note-56"><span data-dcnode-id="2824" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2821" instrument_node="">
</span></p><p data-dcnode-id="2810"><span data-dcnode-id="2819" instrument_node="">Some systems currently attempt or in the past have attempted to integrate taxation of the corporation with taxation of shareholders to mitigate the dual level of taxation.  As a current example, Australia provides for a "franking credit" as a benefit to shareholders.  When an Australian company pays a dividend to a domestic shareholder, it reports the dividend as well as a notional tax credit amount.  The shareholder utilizes this notional credit to offset shareholder level income tax.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2812" style="white-space:nowrap;"><span data-dcnode-id="2818" instrument_node="">[</span><i data-dcnode-id="2814"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2816" title="This claim needs references to reliable sources. (October 2018)"><span data-dcnode-id="2817" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2813" instrument_node="">]</span></sup><span data-dcnode-id="2811" instrument_node="">
</span></p><p data-dcnode-id="2805"><span data-dcnode-id="2809" instrument_node="">A previous system was utilised in the United Kingdom, called the </span><a data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advance_corporation_tax" title="Advance corporation tax"><span data-dcnode-id="2808" instrument_node="">advance corporation tax</span></a><span data-dcnode-id="2806" instrument_node=""> (ACT).  When a company paid a dividend, it was required to pay an amount of ACT, which it then used to offset its own taxes.  The ACT was included in income by the shareholder resident in the United Kingdom or certain treaty countries, and treated as a payment of tax by the shareholder.  To the extent that deemed tax payment exceeded taxes otherwise due, it was refundable to the shareholder.
</span></p><span data-dcnode-id="2804" instrument_node="">
</span><h2 data-dcnode-id="2794"><span class="mw-headline" data-dcnode-id="2802" id="Alternative_tax_bases"><span data-dcnode-id="2803" instrument_node="">Alternative tax bases</span></span><span class="mw-editsection" data-dcnode-id="2795"><span class="mw-editsection-bracket" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">[</span></span><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D20" title="Edit section: Alternative tax bases"><span data-dcnode-id="2799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Many jurisdictions incorporate some sort of alternative tax computation.  These computations may be based on assets, capital, wages, or some alternative measure of taxable income.  Often the alternative tax functions as a minimum tax.
</span></p><p data-dcnode-id="2781"><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax_in_the_United_States" title="Income tax in the United States"><span data-dcnode-id="2790" instrument_node="">United States federal income tax</span></a><span data-dcnode-id="2788" instrument_node=""> incorporates an </span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_minimum_tax" title="Alternative minimum tax"><span data-dcnode-id="2787" instrument_node="">alternative minimum tax</span></a><span data-dcnode-id="2785" instrument_node="">.  This tax is computed at a lower tax rate (20% for corporations), and imposed based on a modified version of taxable income.  Modifications include longer depreciation lives assets under </span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MACRS" title="MACRS"><span data-dcnode-id="2784" instrument_node="">MACRS</span></a><span data-dcnode-id="2782" instrument_node="">, adjustments related to costs of developing natural resources, and an addback of certain tax exempt interest.  The U.S. state of Michigan previously taxed businesses on an alternative base that did not allow compensation of employees as a tax deduction and allowed full deduction of the cost of production assets upon acquisition.
</span></p><p data-dcnode-id="2763"><span data-dcnode-id="2780" instrument_node="">Some jurisdictions, such as Swiss cantons and certain states within the United States, impose taxes based on capital.  These may be based on total equity per audited financial statements,</span><sup class="reference" data-dcnode-id="2777" id="cite_ref-57"><a data-dcnode-id="2778" href="#cite_note-57"><span data-dcnode-id="2779" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2776" instrument_node=""> a computed amount of assets less liabilities</span><sup class="reference" data-dcnode-id="2773" id="cite_ref-New_York_58-0"><a data-dcnode-id="2774" href="#cite_note-New_York-58"><span data-dcnode-id="2775" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2772" instrument_node=""> or quantity of shares outstanding.</span><sup class="reference" data-dcnode-id="2769" id="cite_ref-59"><a data-dcnode-id="2770" href="#cite_note-59"><span data-dcnode-id="2771" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2768" instrument_node="">  In some jurisdictions, capital based taxes are imposed in addition to the income tax.</span><sup class="reference" data-dcnode-id="2765" id="cite_ref-New_York_58-1"><a data-dcnode-id="2766" href="#cite_note-New_York-58"><span data-dcnode-id="2767" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2764" instrument_node="">  In other jurisdictions, the capital taxes function as alternative taxes.
</span></p><p data-dcnode-id="2753"><span data-dcnode-id="2762" instrument_node="">Mexico imposes an alternative tax on corporations, the IETU.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2755" style="white-space:nowrap;"><span data-dcnode-id="2761" instrument_node="">[</span><i data-dcnode-id="2757"><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2759" title="This claim needs references to reliable sources. (October 2018)"><span data-dcnode-id="2760" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2756" instrument_node="">]</span></sup><span data-dcnode-id="2754" instrument_node="">  The tax rate is lower than the regular rate, and there are adjustments for salaries and wages, interest and royalties, and depreciable assets.
</span></p><span data-dcnode-id="2752" instrument_node="">
</span><h2 data-dcnode-id="2742"><span class="mw-headline" data-dcnode-id="2750" id="Tax_returns"><span data-dcnode-id="2751" instrument_node="">Tax returns</span></span><span class="mw-editsection" data-dcnode-id="2743"><span class="mw-editsection-bracket" data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">[</span></span><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D21" title="Edit section: Tax returns"><span data-dcnode-id="2747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2740" instrument_node="">Most systems require that corporations file an annual income tax return.</span><sup class="reference" data-dcnode-id="2737" id="cite_ref-60"><a data-dcnode-id="2738" href="#cite_note-60"><span data-dcnode-id="2739" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2736" instrument_node="">  Some systems (such as the </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_return_%28Canada%29" title="Tax return (Canada)"><span data-dcnode-id="2735" instrument_node="">Canadian</span></a><span data-dcnode-id="2733" instrument_node=""> and </span><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_return_%28United_States%29" title="Tax return (United States)"><span data-dcnode-id="2732" instrument_node="">United States</span></a><span data-dcnode-id="2730" instrument_node=""> systems) require that taxpayers self assess tax on the tax return.</span><sup class="reference" data-dcnode-id="2727" id="cite_ref-61"><a data-dcnode-id="2728" href="#cite_note-61"><span data-dcnode-id="2729" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2726" instrument_node="">  Other systems provide that the government must make an assessment for tax to be due.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2719" style="white-space:nowrap;"><span data-dcnode-id="2725" instrument_node="">[</span><i data-dcnode-id="2721"><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2723" title="This claim needs references to reliable sources. (October 2018)"><span data-dcnode-id="2724" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2720" instrument_node="">]</span></sup><span data-dcnode-id="2718" instrument_node="">  Some systems require certification of tax returns in some manner by accountants licensed to practice in the jurisdiction, often the company's auditors.</span><sup class="reference" data-dcnode-id="2715" id="cite_ref-62"><a data-dcnode-id="2716" href="#cite_note-62"><span data-dcnode-id="2717" instrument_node="">[62]</span></a></sup><span data-dcnode-id="2714" instrument_node="">
</span></p><p data-dcnode-id="2707"><span data-dcnode-id="2712" instrument_node="">Tax returns can be fairly simple or quite complex.  The systems requiring simple returns often base taxable income on financial statement profits with few adjustments, and may require that audited financial statements be attached to the return.</span><sup class="reference" data-dcnode-id="2709" id="cite_ref-63"><a data-dcnode-id="2710" href="#cite_note-63"><span data-dcnode-id="2711" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2708" instrument_node="">  Returns for such systems generally require that the relevant financial statements be attached to a simple adjustment schedule.  By contrast, United States corporate tax returns require both computation of taxable income from components thereof and reconciliation of taxable income to financial statement income.
</span></p><p data-dcnode-id="2702"><span data-dcnode-id="2706" instrument_node="">Many systems require forms or schedules supporting particular items on the main form.  Some of these schedules may be incorporated into the main form.  For example, the Canadian corporate return, </span><a class="external text" data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/forms-publications/forms/t2.html" rel="nofollow"><span data-dcnode-id="2705" instrument_node="">Form T-2</span></a><span data-dcnode-id="2703" instrument_node="">, an eight-page form, incorporates some detail schedules but has nearly 50 additional schedules that may be required.
</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2701" instrument_node="">Some systems have different returns for different types of corporations or corporations engaged in specialized businesses.  The United States has 13 variations on the basic Form 1120</span><sup class="reference" data-dcnode-id="2698" id="cite_ref-64"><a data-dcnode-id="2699" href="#cite_note-64"><span data-dcnode-id="2700" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2697" instrument_node=""> for </span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S_corporation" title="S corporation"><span data-dcnode-id="2696" instrument_node="">S corporations</span></a><span data-dcnode-id="2694" instrument_node="">, insurance companies, </span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domestic_international_sales_corporation" title="Domestic international sales corporation"><span data-dcnode-id="2693" instrument_node="">Domestic international sales corporations</span></a><span data-dcnode-id="2691" instrument_node="">, foreign corporations, and other entities.  The structure of the forms and imbedded schedules vary by type of form.
</span></p><p data-dcnode-id="2682"><span data-dcnode-id="2689" instrument_node="">Preparation of non-simple corporate tax returns can be time consuming.  For example, the U.S. </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="2688" instrument_node="">Internal Revenue Service</span></a><span data-dcnode-id="2686" instrument_node=""> states in the </span><a class="external text" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/i1120.pdf" rel="nofollow"><span data-dcnode-id="2685" instrument_node="">instructions for Form 1120</span></a><span data-dcnode-id="2683" instrument_node=""> that the average time needed to complete form is over 56 hours, not including record keeping time and required attachments.
</span></p><p data-dcnode-id="2668"><span data-dcnode-id="2681" instrument_node="">Tax return due dates vary by jurisdiction, fiscal or tax year, and type of entity.</span><sup class="reference" data-dcnode-id="2678" id="cite_ref-65"><a data-dcnode-id="2679" href="#cite_note-65"><span data-dcnode-id="2680" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2677" instrument_node="">  In self-assessment systems, payment of taxes is generally due no later than the normal due date, though advance tax payments may be required.</span><sup class="reference" data-dcnode-id="2674" id="cite_ref-66"><a data-dcnode-id="2675" href="#cite_note-66"><span data-dcnode-id="2676" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2673" instrument_node="">  Canadian corporations must pay estimated taxes monthly.</span><sup class="reference" data-dcnode-id="2670" id="cite_ref-67"><a data-dcnode-id="2671" href="#cite_note-67"><span data-dcnode-id="2672" instrument_node="">[67]</span></a></sup><span data-dcnode-id="2669" instrument_node="">  In each case, final payment is due with the corporation tax return.
</span></p><span data-dcnode-id="2667" instrument_node="">
