a-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ATaxation%26action%3Dedit"><abbr data-dcnode-id="5181" title="Edit this template"><span data-dcnode-id="5182" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="5172" instrument_node="">
</span><p data-dcnode-id="5149"><span data-dcnode-id="5171" instrument_node="">A </span><b data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">corporate tax</span></b><span data-dcnode-id="5168" instrument_node="">, also called </span><b data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">corporation tax</span></b><span data-dcnode-id="5165" instrument_node=""> or </span><b data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">company tax</span></b><span data-dcnode-id="5162" instrument_node="">, is a </span><a data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Direct_tax" title="Direct tax"><span data-dcnode-id="5161" instrument_node="">direct tax</span></a><span data-dcnode-id="5159" instrument_node=""> imposed on the income or capital of </span><a data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="5158" instrument_node="">corporations</span></a><span data-dcnode-id="5156" instrument_node=""> or analogous legal entities. Many countries impose such taxes at the national level, and a similar tax may be imposed at state or local levels. The taxes may also be referred to as </span><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="5155" instrument_node="">income tax</span></a><span data-dcnode-id="5153" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_tax" title="Capital tax"><span data-dcnode-id="5152" instrument_node="">capital tax</span></a><span data-dcnode-id="5150" instrument_node="">. A country's corporate tax may apply to:
</span></p><span data-dcnode-id="5148" instrument_node="">
</span><ul data-dcnode-id="5128"><li data-dcnode-id="5144"><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incorporation_%28business%29" title="Incorporation (business)"><span data-dcnode-id="5147" instrument_node="">corporations incorporated</span></a><span data-dcnode-id="5145" instrument_node=""> in the country,</span></li><span data-dcnode-id="5143" instrument_node="">
</span><li data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">corporations doing business in the country on income from that country,</span></li><span data-dcnode-id="5140" instrument_node="">
</span><li data-dcnode-id="5135"><span data-dcnode-id="5139" instrument_node="">foreign corporations who have a </span><a data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Permanent_establishment" title="Permanent establishment"><span data-dcnode-id="5138" instrument_node="">permanent establishment</span></a><span data-dcnode-id="5136" instrument_node=""> in the country, or</span></li><span data-dcnode-id="5134" instrument_node="">
</span><li data-dcnode-id="5129"><span data-dcnode-id="5133" instrument_node="">corporations deemed to be </span><a data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_residence" title="Tax residence"><span data-dcnode-id="5132" instrument_node="">resident for tax purposes</span></a><span data-dcnode-id="5130" instrument_node=""> in the country.</span></li></ul><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">Company income subject to tax is often determined much like taxable income for individual taxpayers. Generally, the tax is imposed on net profits. In some jurisdictions, rules for taxing companies may differ significantly from rules for taxing individuals. Certain corporate acts or types of entities may be exempt from tax.
</span></p><p data-dcnode-id="5116"><span data-dcnode-id="5124" instrument_node="">The </span><a data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_incidence" title="Tax incidence"><span data-dcnode-id="5123" instrument_node="">incidence</span></a><span data-dcnode-id="5121" instrument_node=""> of corporate taxation is a subject of significant debate among economists and policymakers. Evidence suggests that some portion of the corporate tax falls on owners of capital, workers, and shareholders, but the ultimate incidence of the tax is an unresolved question.</span><sup class="reference" data-dcnode-id="5118" id="cite_ref-1"><a data-dcnode-id="5119" href="#cite_note-1"><span data-dcnode-id="5120" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5117" instrument_node="">
</span></p><span data-dcnode-id="5115" instrument_node="">

</span><h2 data-dcnode-id="4873"><span class="mw-headline" data-dcnode-id="4881" id="Economics"><span data-dcnode-id="4882" instrument_node="">Economics</span></span><span class="mw-editsection" data-dcnode-id="4874"><span class="mw-editsection-bracket" data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">[</span></span><a data-dcnode-id="4877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D1" title="Edit section: Economics"><span data-dcnode-id="4878" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4872" instrument_node="">
</span><table class="box-Expand_section plainlinks metadata ambox mbox-small-left ambox-content" data-dcnode-id="4851" role="presentation"><tbody data-dcnode-id="4852"><tr data-dcnode-id="4853"><td class="mbox-image" data-dcnode-id="4869"><a class="image" data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWiki_letter_w_cropped.svg"><img alt="[icon]" data-dcnode-id="4871" data-file-height="31" data-file-width="44" decoding="async" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/20px-Wiki_letter_w_cropped.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/30px-Wiki_letter_w_cropped.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/40px-Wiki_letter_w_cropped.svg.png 2x" width="20"></a></td><td class="mbox-text" data-dcnode-id="4854"><div class="mbox-text-span" data-dcnode-id="4855"><span data-dcnode-id="4868" instrument_node="">This section </span><b data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">needs expansion</span></b><span data-dcnode-id="4865" instrument_node="">. You can help by </span><a class="external text" data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D"><span data-dcnode-id="4864" instrument_node="">adding to it</span></a><span data-dcnode-id="4862" instrument_node="">.  </span><span class="date-container" data-dcnode-id="4856"><i data-dcnode-id="4857"><span data-dcnode-id="4861" instrument_node="">(</span><span class="date" data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">April 2019</span></span><span data-dcnode-id="4858" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4850" instrument_node="">
</span><p data-dcnode-id="4804"><span data-dcnode-id="4849" instrument_node="">Economists disagree as to how much of the burden of the corporate tax falls on owners, workers, consumers, and landowners, and how the corporate tax affects economic growth and economic inequality.</span><sup class="reference" data-dcnode-id="4846" id="cite_ref-2"><a data-dcnode-id="4847" href="#cite_note-2"><span data-dcnode-id="4848" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4845" instrument_node=""> More of the burden probably falls on capital in large open economies such as the US.</span><sup class="reference" data-dcnode-id="4842" id="cite_ref-3"><a data-dcnode-id="4843" href="#cite_note-3"><span data-dcnode-id="4844" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4841" instrument_node=""> Some studies place the burden more on labor.</span><sup class="reference" data-dcnode-id="4838" id="cite_ref-4"><a data-dcnode-id="4839" href="#cite_note-4"><span data-dcnode-id="4840" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4835" id="cite_ref-5"><a data-dcnode-id="4836" href="#cite_note-5"><span data-dcnode-id="4837" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="4832" id="cite_ref-6"><a data-dcnode-id="4833" href="#cite_note-6"><span data-dcnode-id="4834" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4831" instrument_node=""> According to one study: "Regression analysis shows that a one-percentage-point increase in the marginal state corporate tax rate reduces wages 0.14 to 0.36 percent."</span><sup class="reference" data-dcnode-id="4828" id="cite_ref-7"><a data-dcnode-id="4829" href="#cite_note-7"><span data-dcnode-id="4830" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4827" instrument_node=""> There have been other studies.</span><sup class="reference" data-dcnode-id="4824" id="cite_ref-8"><a data-dcnode-id="4825" href="#cite_note-8"><span data-dcnode-id="4826" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="4821" id="cite_ref-9"><a data-dcnode-id="4822" href="#cite_note-9"><span data-dcnode-id="4823" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="4818" id="cite_ref-10"><a data-dcnode-id="4819" href="#cite_note-10"><span data-dcnode-id="4820" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="4815" id="cite_ref-11"><a data-dcnode-id="4816" href="#cite_note-11"><span data-dcnode-id="4817" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="4812" id="cite_ref-12"><a data-dcnode-id="4813" href="#cite_note-12"><span data-dcnode-id="4814" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4809" id="cite_ref-13"><a data-dcnode-id="4810" href="#cite_note-13"><span data-dcnode-id="4811" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4808" instrument_node="">
According to the </span><a data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith_Institute" title="Adam Smith Institute"><span data-dcnode-id="4807" instrument_node="">Adam Smith Institute</span></a><span data-dcnode-id="4805" instrument_node="">, "Clausing (2012), Gravelle (2010) and Auerbach (2005), the three best reviews we found, basically conclude that most of the tax falls on capital, not labour."
</span></p><span data-dcnode-id="4803" instrument_node="">
</span><h2 data-dcnode-id="4793"><span class="mw-headline" data-dcnode-id="4801" id="Legal_framework"><span data-dcnode-id="4802" instrument_node="">Legal framework</span></span><span class="mw-editsection" data-dcnode-id="4794"><span class="mw-editsection-bracket" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">[</span></span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D2" title="Edit section: Legal framework"><span data-dcnode-id="4798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4792" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="4749" role="presentation"><tbody data-dcnode-id="4750"><tr data-dcnode-id="4751"><td class="mbox-image" data-dcnode-id="4788"><div data-dcnode-id="4789" style="width:52px"><a class="image" data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4791" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="4752"><div class="mbox-text-span" data-dcnode-id="4753"><span data-dcnode-id="4787" instrument_node="">This section </span><b data-dcnode-id="4780"><span data-dcnode-id="4786" instrument_node="">does not </span><a data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="4785" instrument_node="">cite</span></a><span data-dcnode-id="4783" instrument_node=""> any </span><a data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4782" instrument_node="">sources</span></a></b><span data-dcnode-id="4779" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4768"><span data-dcnode-id="4778" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit"><span data-dcnode-id="4777" instrument_node="">improve this section</span></a><span data-dcnode-id="4775" instrument_node=""> by </span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="4774" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="4772" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="4771" instrument_node="">removed</span></a><span data-dcnode-id="4769" instrument_node="">.</span></span><span data-dcnode-id="4767" instrument_node=""> </span><span class="date-container" data-dcnode-id="4761"><i data-dcnode-id="4762"><span data-dcnode-id="4766" instrument_node="">(</span><span class="date" data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">August 2015</span></span><span data-dcnode-id="4763" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4754"><i data-dcnode-id="4755"><span data-dcnode-id="4760" instrument_node=""> (</span><small data-dcnode-id="4757"><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4759" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4756" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4748" instrument_node="">
</span><p data-dcnode-id="4740"><span data-dcnode-id="4747" instrument_node="">A corporate tax is a tax imposed on the net profit of a corporation that is taxed at the entity level in a particular jurisdiction. Net profit for corporate tax is generally the financial statement net profit with modifications, and may be defined in great detail within each country's tax system. Such taxes may include income or other taxes. The tax systems of most countries impose an </span><a data-dcnode-id="4745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="4746" instrument_node="">income tax</span></a><span data-dcnode-id="4744" instrument_node=""> at the entity level on the certain type(s) of entities (company or </span><a data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="4743" instrument_node="">corporation</span></a><span data-dcnode-id="4741" instrument_node="">). The rate of tax varies by jurisdiction. The tax may have an alternative base, such as assets, payroll, or income computed in an alternative manner.
</span></p><p data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">Most countries exempt certain types of corporate events or transactions from income tax. For example, events related to the formation or reorganization of the corporation, which are treated as capital costs. In addition, most systems provide specific rules for taxation of the entity and/or its members upon winding up or dissolution of the entity.
</span></p><p data-dcnode-id="4727"><span data-dcnode-id="4737" instrument_node="">In systems where financing costs are allowed as reductions of the tax base (</span><a class="mw-redirect" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_deductions" title="Tax deductions"><span data-dcnode-id="4736" instrument_node="">tax deductions</span></a><span data-dcnode-id="4734" instrument_node="">), rules may apply that differentiate between classes of member-provided financing. In such systems, items characterized as </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interest" title="Interest"><span data-dcnode-id="4733" instrument_node="">interest</span></a><span data-dcnode-id="4731" instrument_node=""> may be deductible, perhaps subject to limitations, while items characterized as dividends are not. Some systems limit deductions based on simple formulas, such as a </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Debt-to-equity_ratio" title="Debt-to-equity ratio"><span data-dcnode-id="4730" instrument_node="">debt-to-equity ratio</span></a><span data-dcnode-id="4728" instrument_node="">, while other systems have more complex rules.
</span></p><p data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">Some systems provide a mechanism whereby groups of related corporations may obtain benefit from losses, credits, or other items of all members within the group. Mechanisms include combined or consolidated returns as well as group relief (direct benefit from items of another member).
</span></p><p data-dcnode-id="4717"><span data-dcnode-id="4724" instrument_node="">Many systems additionally tax shareholders of those entities on </span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dividend" title="Dividend"><span data-dcnode-id="4723" instrument_node="">dividends</span></a><span data-dcnode-id="4721" instrument_node=""> or other distributions by the corporation. A few systems provide for partial integration of entity and member taxation. This may be accomplished by "imputation systems" or </span><a class="mw-redirect" data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franking_credit" title="Franking credit"><span data-dcnode-id="4720" instrument_node="">franking credits</span></a><span data-dcnode-id="4718" instrument_node="">. In the past, mechanisms have existed for advance payment of member tax by corporations, with such payment offsetting entity level tax.
</span></p><p data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">Many systems (particularly sub-country level systems) impose a tax on particular corporate attributes.  Such non-income taxes may be based on capital stock issued or authorized (either by number of shares or value), total equity, net capital, or other measures unique to corporations.
</span></p><p data-dcnode-id="4710"><span data-dcnode-id="4714" instrument_node="">Corporations, like other entities, may be subject to </span><a class="mw-redirect" data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withholding_tax" title="Withholding tax"><span data-dcnode-id="4713" instrument_node="">withholding tax</span></a><span data-dcnode-id="4711" instrument_node=""> obligations upon making certain varieties of payments to others.  These obligations are generally not the tax of the corporation, but the system may impose penalties on the corporation or its officers or employees for failing to withhold and pay over such taxes. A company has been defined as a juristic person having an independent and separate existence from its shareholders. Income of the company is computed and assessed separately in the hands of the company. In certain cases, distributions from the company to its shareholders as dividends are taxed as income to the shareholders.
</span></p><p data-dcnode-id="4690"><span data-dcnode-id="4709" instrument_node="">Corporations </span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_tax" title="Property tax"><span data-dcnode-id="4708" instrument_node="">property tax</span></a><span data-dcnode-id="4706" instrument_node="">, </span><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Payroll_tax" title="Payroll tax"><span data-dcnode-id="4705" instrument_node="">payroll tax</span></a><span data-dcnode-id="4703" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withholding_tax" title="Withholding tax"><span data-dcnode-id="4702" instrument_node="">withholding tax</span></a><span data-dcnode-id="4700" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Excise_tax" title="Excise tax"><span data-dcnode-id="4699" instrument_node="">excise tax</span></a><span data-dcnode-id="4697" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Customs_duties" title="Customs duties"><span data-dcnode-id="4696" instrument_node="">customs duties</span></a><span data-dcnode-id="4694" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Value_added_tax" title="Value added tax"><span data-dcnode-id="4693" instrument_node="">value added tax</span></a><span data-dcnode-id="4691" instrument_node="">, and other common taxes, are generally not referred to as "corporate tax".
</span></p><span data-dcnode-id="4689" instrument_node="">
</span><h3 data-dcnode-id="4679"><span class="mw-headline" data-dcnode-id="4687" id="Definition_of_corporation"><span data-dcnode-id="4688" instrument_node="">Definition of corporation</span></span><span class="mw-editsection" data-dcnode-id="4680"><span class="mw-editsection-bracket" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">[</span></span><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D3" title="Edit section: Definition of corporation"><span data-dcnode-id="4684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4678" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4672" role="note"><span data-dcnode-id="4675" instrument_node="">Main article: </span><a data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="4674" instrument_node="">Corporation</span></a></div><span data-dcnode-id="4671" instrument_node="">
</span><p data-dcnode-id="4646"><span data-dcnode-id="4670" instrument_node="">Characterization as a </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="4669" instrument_node="">corporation</span></a><span data-dcnode-id="4667" instrument_node=""> for tax purposes is based on the form of organization, with the exception of United States Federal</span><sup class="reference" data-dcnode-id="4664" id="cite_ref-14"><a data-dcnode-id="4665" href="#cite_note-14"><span data-dcnode-id="4666" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4663" instrument_node=""> and most states income taxes, under which an entity may elect to be treated as a corporation and taxed at the entity level or taxed only at the member level.</span><sup class="reference" data-dcnode-id="4660" id="cite_ref-26usc11_15-0"><a data-dcnode-id="4661" href="#cite_note-26usc11-15"><span data-dcnode-id="4662" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4659" instrument_node="">  See </span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limited_liability_company" title="Limited liability company"><span data-dcnode-id="4658" instrument_node="">Limited liability company</span></a><span data-dcnode-id="4656" instrument_node="">,  </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_taxation" title="Partnership taxation"><span data-dcnode-id="4655" instrument_node="">Partnership taxation</span></a><span data-dcnode-id="4653" instrument_node="">, </span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S_corporation" title="S corporation"><span data-dcnode-id="4652" instrument_node="">S corporation</span></a><span data-dcnode-id="4650" instrument_node="">, </span><a data-dcnode-id="4648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sole_proprietorship" title="Sole proprietorship"><span data-dcnode-id="4649" instrument_node="">Sole proprietorship</span></a><span data-dcnode-id="4647" instrument_node="">.
</span></p><span data-dcnode-id="4645" instrument_node="">
</span><h2 data-dcnode-id="4635"><span class="mw-headline" data-dcnode-id="4643" id="Types"><span data-dcnode-id="4644" instrument_node="">Types</span></span><span class="mw-editsection" data-dcnode-id="4636"><span class="mw-editsection-bracket" data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">[</span></span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D4" title="Edit section: Types"><span data-dcnode-id="4640" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4634" instrument_node="">
</span><p data-dcnode-id="4620"><span data-dcnode-id="4633" instrument_node="">Most jurisdictions tax corporations on their income, like the United Kingdom</span><sup class="reference" data-dcnode-id="4630" id="cite_ref-16"><a data-dcnode-id="4631" href="#cite_note-16"><span data-dcnode-id="4632" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4629" instrument_node=""> or the United States.</span><sup class="reference" data-dcnode-id="4626" id="cite_ref-26usc11_15-1"><a data-dcnode-id="4627" href="#cite_note-26usc11-15"><span data-dcnode-id="4628" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4625" instrument_node=""> The United States taxes most types of corporate income at 21%.</span><sup class="reference" data-dcnode-id="4622" id="cite_ref-26usc11_15-2"><a data-dcnode-id="4623" href="#cite_note-26usc11-15"><span data-dcnode-id="4624" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4621" instrument_node="">
</span></p><p data-dcnode-id="4614"><span data-dcnode-id="4619" instrument_node="">The United States taxes corporations under the same framework of tax law as individuals, with differences related to the inherent natures of corporations and individuals or unincorporated entities.  Individuals are not formed, amalgamated, or acquired; and corporations do not incur medical expenses except by way of compensating individuals.</span><sup class="reference" data-dcnode-id="4616" id="cite_ref-17"><a data-dcnode-id="4617" href="#cite_note-17"><span data-dcnode-id="4618" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4615" instrument_node="">
</span></p><p data-dcnode-id="4609"><span data-dcnode-id="4613" instrument_node="">Most systems tax both domestic and </span><a data-dcnode-id="4611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_corporation" title="Foreign corporation"><span data-dcnode-id="4612" instrument_node="">foreign corporations</span></a><span data-dcnode-id="4610" instrument_node="">.  Often, domestic corporations are taxed on worldwide income while foreign corporations are taxed only on income from sources within the jurisdiction.
</span></p><span data-dcnode-id="4608" instrument_node="">
</span><h3 data-dcnode-id="4598"><span class="mw-headline" data-dcnode-id="4606" id="Taxable_income"><span data-dcnode-id="4607" instrument_node="">Taxable income</span></span><span class="mw-editsection" data-dcnode-id="4599"><span class="mw-editsection-bracket" data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">[</span></span><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D5" title="Edit section: Taxable income"><span data-dcnode-id="4603" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4597" instrument_node="">
</span><p data-dcnode-id="4582"><span data-dcnode-id="4596" instrument_node="">The United States defines taxable income for a corporation as all </span><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_income" title="Gross income"><span data-dcnode-id="4595" instrument_node="">gross income</span></a><span data-dcnode-id="4593" instrument_node="">, i.e. sales plus other income minus cost of goods sold and tax exempt income less allowable </span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_deduction" title="Tax deduction"><span data-dcnode-id="4592" instrument_node="">tax deductions</span></a><span data-dcnode-id="4590" instrument_node="">, without the allowance of the </span><a data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_deduction" title="Standard deduction"><span data-dcnode-id="4589" instrument_node="">standard deduction</span></a><span data-dcnode-id="4587" instrument_node=""> applicable to individuals.</span><sup class="reference" data-dcnode-id="4584" id="cite_ref-18"><a data-dcnode-id="4585" href="#cite_note-18"><span data-dcnode-id="4586" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4583" instrument_node="">
</span></p><p data-dcnode-id="4573"><span data-dcnode-id="4581" instrument_node="">The United States' system requires that differences in principles for recognizing income and deductions differing from financial accounting principles like the timing of income or deduction, </span><a data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_exemption" title="Tax exemption"><span data-dcnode-id="4580" instrument_node="">tax exemption</span></a><span data-dcnode-id="4578" instrument_node=""> for certain income, and disallowance or limitation of certain tax deductions  be disclosed in considerable detail for non-small corporations on Schedule M-3 to Form 1120.</span><sup class="reference" data-dcnode-id="4575" id="cite_ref-19"><a data-dcnode-id="4576" href="#cite_note-19"><span data-dcnode-id="4577" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4574" instrument_node="">
</span></p><p data-dcnode-id="4559"><span data-dcnode-id="4572" instrument_node="">The United States taxes resident corporations, i.e. those organized within the country,</span><sup class="reference" data-dcnode-id="4569" id="cite_ref-20"><a data-dcnode-id="4570" href="#cite_note-20"><span data-dcnode-id="4571" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4568" instrument_node=""> on their worldwide income, and nonresident, foreign corporations only on their income from sources within the country.</span><sup class="reference" data-dcnode-id="4565" id="cite_ref-21"><a data-dcnode-id="4566" href="#cite_note-21"><span data-dcnode-id="4567" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4564" instrument_node="">  Hong Kong taxes resident and nonresident corporations only on income from sources within the country.</span><sup class="reference" data-dcnode-id="4561" id="cite_ref-22"><a data-dcnode-id="4562" href="#cite_note-22"><span data-dcnode-id="4563" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4560" instrument_node="">
</span></p><span data-dcnode-id="4558" instrument_node="">

</span><p data-dcnode-id="4255"><span data-dcnode-id="4260" instrument_node="">Corporate tax rates generally are the same for differing types of income, yet the US graduated its tax rate system where corporations with lower levels of income pay a lower rate of tax, with rates varying from 15% on the first $50,000 of income to 35% on incomes over $10,000,000, with phase-outs.</span><sup class="reference" data-dcnode-id="4257" id="cite_ref-24"><a data-dcnode-id="4258" href="#cite_note-24"><span data-dcnode-id="4259" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4256" instrument_node="">
</span></p><p data-dcnode-id="4249"><span data-dcnode-id="4254" instrument_node="">The Canadian system imposes tax at different rates for different types of corporations, allowing lower rates for some smaller corporations.</span><sup class="reference" data-dcnode-id="4251" id="cite_ref-25"><a data-dcnode-id="4252" href="#cite_note-25"><span data-dcnode-id="4253" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4250" instrument_node="">
</span></p><p data-dcnode-id="4243"><span data-dcnode-id="4248" instrument_node="">Tax rates vary by jurisdiction and some countries have sub-country level jurisdictions like provinces, cantons, prefectures, cities, or other that also impose corporate income tax like Canada, Germany, Japan, Switzerland, and the United States.</span><sup class="reference" data-dcnode-id="4245" id="cite_ref-26"><a data-dcnode-id="4246" href="#cite_note-26"><span data-dcnode-id="4247" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4244" instrument_node=""> Some jurisdictions impose tax at a different rate on an alternative tax base.
</span></p><span data-dcnode-id="4242" instrument_node="">
</span><div data-dcnode-id="4241" style="clear:left;"></div><span data-dcnode-id="4240" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4226"><div class="thumbinner" data-dcnode-id="4227" style="width:222px;"><a class="image" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_per_capita_PPP_vs_CIT_2016.svg"><img alt="" class="thumbimage" data-dcnode-id="4239" data-file-height="850" data-file-width="1513" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/df/GDP_per_capita_PPP_vs_CIT_2016.svg/220px-GDP_per_capita_PPP_vs_CIT_2016.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/df/GDP_per_capita_PPP_vs_CIT_2016.svg/330px-GDP_per_capita_PPP_vs_CIT_2016.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/df/GDP_per_capita_PPP_vs_CIT_2016.svg/440px-GDP_per_capita_PPP_vs_CIT_2016.svg.png 2x" width="220"></a><span data-dcnode-id="4237" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4228"><div class="magnify" data-dcnode-id="4235"><a class="internal" data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_per_capita_PPP_vs_CIT_2016.svg" title="Enlarge"></a></div><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_finance" title="Public finance"><span data-dcnode-id="4234" instrument_node="">General government</span></a><span data-dcnode-id="4232" instrument_node=""> revenue, in&nbsp;% of GDP, from Corporate Income Taxes. For this data, the </span><a data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variance" title="Variance"><span data-dcnode-id="4231" instrument_node="">variance</span></a><span data-dcnode-id="4229" instrument_node=""> of GDP per capita with purchasing power parity (PPP) is explained in 2&nbsp;% by tax revenue. Years 2014-17.</span></div></div></div><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">Examples of corporate tax rates for a few English-speaking countries include:
</span></p><span data-dcnode-id="4222" instrument_node="">
</span><ul data-dcnode-id="4176"><li data-dcnode-id="4217"><span data-dcnode-id="4221" instrument_node="">Australia: 28.5%, however some specialized entities are taxed at lower rates.</span><sup class="reference" data-dcnode-id="4218" id="cite_ref-27"><a data-dcnode-id="4219" href="#cite_note-27"><span data-dcnode-id="4220" instrument_node="">[27]</span></a></sup></li><span data-dcnode-id="4216" instrument_node="">
</span><li data-dcnode-id="4211"><span data-dcnode-id="4215" instrument_node="">Canada:  Federal 11%, or Federal 15% plus provincial 1% to 16%.  Note: the rates are additive.</span><sup class="reference" data-dcnode-id="4212" id="cite_ref-28"><a data-dcnode-id="4213" href="#cite_note-28"><span data-dcnode-id="4214" instrument_node="">[28]</span></a></sup></li><span data-dcnode-id="4210" instrument_node="">
</span><li data-dcnode-id="4205"><span data-dcnode-id="4209" instrument_node="">Hong Kong: 16.5%</span><sup class="reference" data-dcnode-id="4206" id="cite_ref-29"><a data-dcnode-id="4207" href="#cite_note-29"><span data-dcnode-id="4208" instrument_node="">[29]</span></a></sup></li><span data-dcnode-id="4204" instrument_node="">
</span><li data-dcnode-id="4199"><span data-dcnode-id="4203" instrument_node="">Ireland:  12.5% on trading (business) income, and 25% on non-trading income.</span><sup class="reference" data-dcnode-id="4200" id="cite_ref-30"><a data-dcnode-id="4201" href="#cite_note-30"><span data-dcnode-id="4202" instrument_node="">[30]</span></a></sup></li><span data-dcnode-id="4198" instrument_node="">
</span><li data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">New Zealand: 28%</span></li><span data-dcnode-id="4195" instrument_node="">
</span><li data-dcnode-id="4190"><span data-dcnode-id="4194" instrument_node="">Singapore: 17% from 2010, however a partial exemption scheme may apply to new companies.</span><sup class="reference" data-dcnode-id="4191" id="cite_ref-31"><a data-dcnode-id="4192" href="#cite_note-31"><span data-dcnode-id="4193" instrument_node="">[31]</span></a></sup></li><span data-dcnode-id="4189" instrument_node="">
</span><li data-dcnode-id="4184"><span data-dcnode-id="4188" instrument_node="">United Kingdom: 19% for 2017–2021.</span><sup class="reference" data-dcnode-id="4185" id="cite_ref-32"><a data-dcnode-id="4186" href="#cite_note-32"><span data-dcnode-id="4187" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="4183" instrument_node="">
</span><li data-dcnode-id="4177"><span data-dcnode-id="4182" instrument_node="">United States: Federal 21%.</span><sup class="reference" data-dcnode-id="4179" id="cite_ref-33"><a data-dcnode-id="4180" href="#cite_note-33"><span data-dcnode-id="4181" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4178" instrument_node="">  States: 0% to 10%, deductible in computing Federal taxable income. Some cities:  up to 9%, deductible in computing Federal taxable income.  The Federal Alternative Minimum Tax of 20% is imposed on regular taxable income with adjustments.</span></li></ul><span data-dcnode-id="4175" instrument_node="">
</span><h3 data-dcnode-id="4165"><span class="mw-headline" data-dcnode-id="4173" id="International_corporate_tax_rates"><span data-dcnode-id="4174" instrument_node="">International corporate tax rates</span></span><span class="mw-editsection" data-dcnode-id="4166"><span class="mw-editsection-bracket" data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">[</span></span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D7" title="Edit section: International corporate tax rates"><span data-dcnode-id="4170" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4164" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="4143" role="presentation"><tbody data-dcnode-id="4144"><tr data-dcnode-id="4145"><td class="mbox-image" data-dcnode-id="4161"><div data-dcnode-id="4162" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="4163" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="4146"><div class="mbox-text-span" data-dcnode-id="4147"><span data-dcnode-id="4160" instrument_node="">This section needs to be </span><b data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">updated</span></b><span data-dcnode-id="4157" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="4154" instrument_node=""> </span><span class="date-container" data-dcnode-id="4148"><i data-dcnode-id="4149"><span data-dcnode-id="4153" instrument_node="">(</span><span class="date" data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">November 2021</span></span><span data-dcnode-id="4150" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Corporate tax rates vary widely by country, leading some corporations to shield earnings within offshore subsidiaries or to redomicile within countries with lower tax rates.
</span></p><p data-dcnode-id="4134"><span data-dcnode-id="4139" instrument_node="">In comparing national corporate tax rates one should also take into account the taxes on dividends paid to shareholders. For example, the overall U.S. tax on corporate profits of 35% is less than or similar to that of European countries such as Germany, Ireland, Switzerland and the United Kingdom, which have lower corporate tax rates but higher taxes on dividends paid to shareholders.</span><sup class="reference" data-dcnode-id="4136" id="cite_ref-34"><a data-dcnode-id="4137" href="#cite_note-34"><span data-dcnode-id="4138" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4135" instrument_node="">
</span></p><p data-dcnode-id="4129"><span data-dcnode-id="4133" instrument_node="">Corporate tax rates across the </span><a class="mw-redirect" data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organisation_for_Economic_Co-operation_and_Development" title="Organisation for Economic Co-operation and Development"><span data-dcnode-id="4132" instrument_node="">Organisation for Economic Co-operation and Development</span></a><span data-dcnode-id="4130" instrument_node=""> (OECD) are shown in the table.
</span></p><span data-dcnode-id="4128" instrument_node="">

</span><p data-dcnode-id="3337"><span data-dcnode-id="3342" instrument_node="">In October 2021 some 136 countries agreed to enforce a corporate tax rate of at least 15% from 2023 after the talks on a minimum rate led by OECD for a decade.</span><sup class="reference" data-dcnode-id="3339" id="cite_ref-39"><a data-dcnode-id="3340" href="#cite_note-39"><span data-dcnode-id="3341" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3338" instrument_node="">
</span></p><span data-dcnode-id="3336" instrument_node="">
</span><h2 data-dcnode-id="3326"><span class="mw-headline" data-dcnode-id="3334" id="Distribution_of_earnings"><span data-dcnode-id="3335" instrument_node="">Distribution of earnings</span></span><span class="mw-editsection" data-dcnode-id="3327"><span class="mw-editsection-bracket" data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">[</span></span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCorporate_tax%26action%3Dedit%26section%3D8" title="Edit section: Distribution of earnings"><span data-dcnode-id="3331" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3325" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3324" instrument_node="">Most systems that tax corporations also impose income tax on shareholders of corporations when earnings are distributed.</span><sup class="reference" data-dcnode-id="3321" id="cite_ref-40"><a data-dcnode-id="3322" href="#cite_note-40"><span data-dcnode-id="3323" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3320" instrument_node="">  Such distribution of earnings is generally referred to as a </span><a data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dividend" title="Dividend"><span data-dcnode-id="3319" instrument_node="">dividend</span></a><span data-dcnode-id="3317" instrument_node="">.  The tax may be at reduced rates.  For example, the United States provides for reduced amounts of tax on dividends received by  individuals and by corporations.</span><sup class="reference" data-dcnode-id="3314" id="cite_ref-41"><a data-dcnode-id="3315" href="#cite_note-41"><span data-dcnode-id="3316" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3313" instrument_node="">
</span></p><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">The company law of some jurisdictions prevents corporations from distributing amounts to shareholders except as distribution of earnings.  Such earnings may be determined under company law principles or tax principles. In such jurisdictions, exceptions are usually provided with respect to distribution of shares of the company, for winding up, and in limited other situations.
</span></p><p data-dcnode-id="3300"><span data-dcnode-id="3309" instrument_node="">Other jurisdictions treat distributions as distributions of earnings taxable to shareholders if earnings are available to be distributed, but do not prohibit distributions in excess of earnings.  For example, under the United States system each corporation must maintain a calculation of its earnings and profits (a tax concept similar to retained earnings).</span><sup class="reference" data-dcnode-id="3306" id="cite_ref-42"><a data-dcnode-id="3307" href="#cite_note-42"><span data-dcnode-id="3308" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3305" instrument_node="">  A distribution to a shareholder is considered to be from earnings and profits to the extent thereof unless an exception applies.</span><sup class="reference" data-dcnode-id="3302" id="cite_ref-43"><a data-dcnode-id="3303" href="#cite_note-43"><span data-dcnode-id="3304" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3301" instrument_node="">  Note that the United States provides reduced tax on dividend income of both corporations and individuals.
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3299" instrument_node="">Other jurisdictions provide corporations a means of designating, within limits, whether a distribution is a distribution of earnings taxable to the shareholder or a </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Return_of_capital" title="Return of capital"><span data-dcnode-id="3298" instrument_node="">return of capital</span></a><span data-dcnode-id="3296" instrument_node="">.
</span></p><span data-dcnode-id="3294" instrument_node="">
