</span><p data-dcnode-id="2259"><b data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Tax deduction</span></b><span data-dcnode-id="2273" instrument_node=""> is a reduction of income that is able to be </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax" title="Tax"><span data-dcnode-id="2272" instrument_node="">taxed</span></a><span data-dcnode-id="2270" instrument_node=""> and is commonly a result of expenses, particularly those incurred to produce additional income. Tax deductions are a form of </span><a class="mw-redirect" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_incentives" title="Tax incentives"><span data-dcnode-id="2269" instrument_node="">tax incentives</span></a><span data-dcnode-id="2267" instrument_node="">, along with exemptions and </span><a data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_credit" title="Tax credit"><span data-dcnode-id="2266" instrument_node="">credits</span></a><span data-dcnode-id="2264" instrument_node="">. The difference between deductions, exemptions and credits is that deductions and exemptions both reduce taxable income, while credits reduce tax.</span><sup class="reference" data-dcnode-id="2261" id="cite_ref-simple_1-0"><a data-dcnode-id="2262" href="#cite_note-simple-1"><span data-dcnode-id="2263" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2260" instrument_node="">

</span><li class="toclevel-1 tocsection-14" data-dcnode-id="2131"><a data-dcnode-id="2132" href="#References"><span class="tocnumber" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">8</span></span><span data-dcnode-id="2135" instrument_node=""> </span><span class="toctext" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">References</span></span></a></li><span data-dcnode-id="2130" instrument_node="">

</span><h2 data-dcnode-id="2100"><span class="mw-headline" data-dcnode-id="2108" id="Above_and_below_the_line"><span data-dcnode-id="2109" instrument_node="">Above and below the line</span></span><span class="mw-editsection" data-dcnode-id="2101"><span class="mw-editsection-bracket" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">[</span></span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D1" title="Edit section: Above and below the line"><span data-dcnode-id="2105" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2098" instrument_node="">Above and below the line refers to items above or below adjusted gross income, which is item 37 on the tax year 2017 1040 tax form.</span><sup class="reference" data-dcnode-id="2095" id="cite_ref-2"><a data-dcnode-id="2096" href="#cite_note-2"><span data-dcnode-id="2097" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2094" instrument_node=""> Tax deductions above the line lessen adjusted gross income, while deductions below the line can only lessen taxable income if the aggregate of those deductions exceeds the standard deduction, which in tax year 2018 in the U.S., for example, was $12,000 for a single taxpayer and $24,000 for married couple.</span><sup class="reference" data-dcnode-id="2091" id="cite_ref-simple_1-1"><a data-dcnode-id="2092" href="#cite_note-simple-1"><span data-dcnode-id="2093" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="2088" id="cite_ref-3"><a data-dcnode-id="2089" href="#cite_note-3"><span data-dcnode-id="2090" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2087" instrument_node="">
</span></p><span data-dcnode-id="2085" instrument_node="">
</span><h2 data-dcnode-id="2075"><span class="mw-headline" data-dcnode-id="2083" id="Limitations"><span data-dcnode-id="2084" instrument_node="">Limitations</span></span><span class="mw-editsection" data-dcnode-id="2076"><span class="mw-editsection-bracket" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">[</span></span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D2" title="Edit section: Limitations"><span data-dcnode-id="2080" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2073" instrument_node="">Often, deductions are subject to conditions, such as being allowed only for expenses incurred that produce current benefits. </span><a class="mw-redirect" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_expenditures" title="Capital expenditures"><span data-dcnode-id="2072" instrument_node="">Capitalization</span></a><span data-dcnode-id="2070" instrument_node=""> of items producing future benefit can be required, though with some exceptions. A deduction is allowed, for example, on interest paid on student loans.</span><sup class="reference" data-dcnode-id="2067" id="cite_ref-simple_1-2"><a data-dcnode-id="2068" href="#cite_note-simple-1"><span data-dcnode-id="2069" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2066" instrument_node="">  Some systems allow taxpayer deductions for items the influential parties want to encourage as purchases.
</span></p><span data-dcnode-id="2064" instrument_node="">
</span><h2 data-dcnode-id="2054"><span class="mw-headline" data-dcnode-id="2062" id="Business_expenses"><span data-dcnode-id="2063" instrument_node="">Business expenses</span></span><span class="mw-editsection" data-dcnode-id="2055"><span class="mw-editsection-bracket" data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">[</span></span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D3" title="Edit section: Business expenses"><span data-dcnode-id="2059" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Nearly all jurisdictions that tax business income allow deductions for business and trade expenses.  Allowances vary and may be general or restricted.  To be deducted, the expenses must be incurred in furthering business, and usually only include activities undertaken for profit.
</span></p><span data-dcnode-id="2050" instrument_node="">
</span><h3 data-dcnode-id="2040"><span class="mw-headline" data-dcnode-id="2048" id="Cost_of_goods_sold"><span data-dcnode-id="2049" instrument_node="">Cost of goods sold</span></span><span class="mw-editsection" data-dcnode-id="2041"><span class="mw-editsection-bracket" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">[</span></span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D4" title="Edit section: Cost of goods sold"><span data-dcnode-id="2045" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2038" instrument_node="">Nearly all income tax systems allow a deduction for the </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cost_of_goods_sold" title="Cost of goods sold"><span data-dcnode-id="2037" instrument_node="">cost of goods sold</span></a><span data-dcnode-id="2035" instrument_node="">. This may be considered an expense, a reduction of </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_income" title="Gross income"><span data-dcnode-id="2034" instrument_node="">gross income</span></a><span data-dcnode-id="2032" instrument_node="">,</span><sup class="reference" data-dcnode-id="2029" id="cite_ref-4"><a data-dcnode-id="2030" href="#cite_note-4"><span data-dcnode-id="2031" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2028" instrument_node=""> or merely a component utilized in computing net profits.</span><sup class="reference" data-dcnode-id="2025" id="cite_ref-5"><a data-dcnode-id="2026" href="#cite_note-5"><span data-dcnode-id="2027" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2024" instrument_node="">  The manner in which cost of goods sold is determined has several inherent complexities, including various accounting methods. These include:
</span></p><span data-dcnode-id="2022" instrument_node="">
</span><ul data-dcnode-id="1998"><li data-dcnode-id="2017"><span data-dcnode-id="2021" instrument_node="">Conventions for assigning costs to particular goods sold where specific identification is infeasible.</span><sup class="reference" data-dcnode-id="2018" id="cite_ref-6"><a data-dcnode-id="2019" href="#cite_note-6"><span data-dcnode-id="2020" instrument_node="">[6]</span></a></sup></li><span data-dcnode-id="2016" instrument_node="">
</span><li data-dcnode-id="2011"><span data-dcnode-id="2015" instrument_node="">Methods for attributing common costs, such as factory burden, to particular goods.</span><sup class="reference" data-dcnode-id="2012" id="cite_ref-7"><a data-dcnode-id="2013" href="#cite_note-7"><span data-dcnode-id="2014" instrument_node="">[7]</span></a></sup></li><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">Methods for determining when costs are recognized in computing cost of goods sold or to be sold.</span><sup class="reference" data-dcnode-id="2006" id="cite_ref-8"><a data-dcnode-id="2007" href="#cite_note-8"><span data-dcnode-id="2008" instrument_node="">[8]</span></a></sup></li><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">Methods for recognizing costs of goods that will not be sold or have declined in value.</span><sup class="reference" data-dcnode-id="2000" id="cite_ref-9"><a data-dcnode-id="2001" href="#cite_note-9"><span data-dcnode-id="2002" instrument_node="">[9]</span></a></sup></li></ul><span data-dcnode-id="1997" instrument_node="">
</span><h3 data-dcnode-id="1987"><span class="mw-headline" data-dcnode-id="1995" id="Trading_or_ordinary_and_necessary_business_expenses"><span data-dcnode-id="1996" instrument_node="">Trading or ordinary and necessary business expenses</span></span><span class="mw-editsection" data-dcnode-id="1988"><span class="mw-editsection-bracket" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">[</span></span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D5" title="Edit section: Trading or ordinary and necessary business expenses"><span data-dcnode-id="1992" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1985" instrument_node="">Many systems, including the </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="1984" instrument_node="">United Kingdom</span></a><span data-dcnode-id="1982" instrument_node="">, levy tax on all chargeable “profits of a trade” computed under local </span><a class="mw-redirect" data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Generally_accepted_accounting_principles" title="Generally accepted accounting principles"><span data-dcnode-id="1981" instrument_node="">generally accepted accounting principles</span></a><span data-dcnode-id="1979" instrument_node=""> (GAAP).</span><sup class="reference" data-dcnode-id="1976" id="cite_ref-10"><a data-dcnode-id="1977" href="#cite_note-10"><span data-dcnode-id="1978" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1975" instrument_node=""> Under this approach, determination of whether an item is deductible depends upon accounting rules and judgments. By contrast, the U.S. allows as a deduction "all the ordinary and necessary expenses paid or incurred during the taxable year in carrying on any trade or business..."</span><sup class="reference" data-dcnode-id="1972" id="cite_ref-11"><a data-dcnode-id="1973" href="#cite_note-11"><span data-dcnode-id="1974" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1971" instrument_node=""> subject to qualifications, enhancements, and limitations.</span><sup class="reference" data-dcnode-id="1968" id="cite_ref-12"><a data-dcnode-id="1969" href="#cite_note-12"><span data-dcnode-id="1970" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1967" instrument_node=""> A similar approach is followed by Canada, but generally with fewer special rules. Such an approach poses significant definitional issues. Among the definitional issues often addressed are:
</span></p><span data-dcnode-id="1965" instrument_node="">
</span><ul data-dcnode-id="1953"><li data-dcnode-id="1957"><span data-dcnode-id="1964" instrument_node="">What constitutes a trade or business?  Generally, the business must be regular, continuous, substantial, and entered into with an expectation of profit.</span><sup class="reference" data-dcnode-id="1961" id="cite_ref-13"><a data-dcnode-id="1962" href="#cite_note-13"><span data-dcnode-id="1963" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="1958" id="cite_ref-14"><a data-dcnode-id="1959" href="#cite_note-14"><span data-dcnode-id="1960" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="1956" instrument_node="">
</span><li data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">What expenses are ordinary and necessary?  The phrase deals with what expenses are appropriate to the nature of the business, whether the expenses are of the sort expected to help produce income and promote the business, and whether the expenses are not lavish and extravagant.</span></li></ul><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1951" instrument_node="">Note that under this concept, the same sorts of expenses are generally deductible by business entities and individuals carrying on a trade or business.  To the extent such expenses relate to the employment of an individual and are not reimbursed by the employer, the amount may be deductible by the individual.</span><sup class="reference" data-dcnode-id="1948" id="cite_ref-15"><a data-dcnode-id="1949" href="#cite_note-15"><span data-dcnode-id="1950" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1947" instrument_node="">
</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1945" instrument_node="">Business deductions of flow-through entities may flow through as a component of the entity's net income in some jurisdictions.  Deductions of flow-through entities may pass through to members of such entities separately from the net income of the entity in some jurisdictions or some cases.  For example, charitable contributions by trusts, and all deductions of partnerships (and </span><a class="mw-redirect" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S_corporations" title="S corporations"><span data-dcnode-id="1944" instrument_node="">S corporations</span></a><span data-dcnode-id="1942" instrument_node=""> in the U.S.) are deductible by member beneficiaries or partners (or </span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S_corporation" title="S corporation"><span data-dcnode-id="1941" instrument_node="">S corporation</span></a><span data-dcnode-id="1939" instrument_node=""> shareholders) in a manner appropriate to the deduction and the member, such as itemized deductions for charitable contributions or a component of net business profits for business expenses.</span><sup class="reference" data-dcnode-id="1936" id="cite_ref-16"><a data-dcnode-id="1937" href="#cite_note-16"><span data-dcnode-id="1938" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1935" instrument_node="">
</span></p><span data-dcnode-id="1933" instrument_node="">
</span><h3 data-dcnode-id="1923"><span class="mw-headline" data-dcnode-id="1931" id="Accounting_methods"><span data-dcnode-id="1932" instrument_node="">Accounting methods</span></span><span class="mw-editsection" data-dcnode-id="1924"><span class="mw-editsection-bracket" data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">[</span></span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D6" title="Edit section: Accounting methods"><span data-dcnode-id="1928" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1922" instrument_node="">
</span><link data-dcnode-id="1921" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1917" role="note"><span data-dcnode-id="1920" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_accounting" title="Tax accounting"><span data-dcnode-id="1919" instrument_node="">Tax accounting</span></a></div><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1915" instrument_node="">One important aspect of determining tax deductions for business expenses is the timing of such deduction.  The method used for this is commonly referred to as an accounting method.  Accounting methods for tax purposes may differ from applicable </span><a class="mw-redirect" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Generally_accepted_accounting_principles" title="Generally accepted accounting principles"><span data-dcnode-id="1914" instrument_node="">GAAP</span></a><span data-dcnode-id="1912" instrument_node="">.  Examples include timing of recognition of cost recovery deductions (e.g., depreciation), current expensing of otherwise capitalizable costs of intangibles,</span><sup class="reference" data-dcnode-id="1909" id="cite_ref-17"><a data-dcnode-id="1910" href="#cite_note-17"><span data-dcnode-id="1911" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1908" instrument_node=""> and rules related to costs that should be treated  as part of cost of goods not yet sold.</span><sup class="reference" data-dcnode-id="1905" id="cite_ref-18"><a data-dcnode-id="1906" href="#cite_note-18"><span data-dcnode-id="1907" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1904" instrument_node="">  Further, taxpayers often have choices among multiple accounting methods permissible under GAAP and/or tax rules.  Examples include conventions for determining which goods have been sold (such as first-in-first-out, average cost, etc.), whether or not to defer minor expenses producing benefit in the immediately succeeding period, etc.
</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Accounting methods may be defined with some precision by tax law, as in the U.S. system, or may be based on GAAP, as in the UK system.
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><h3 data-dcnode-id="1890"><span class="mw-headline" data-dcnode-id="1898" id="Limits_on_deductions"><span data-dcnode-id="1899" instrument_node="">Limits on deductions</span></span><span class="mw-editsection" data-dcnode-id="1891"><span class="mw-editsection-bracket" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">[</span></span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D7" title="Edit section: Limits on deductions"><span data-dcnode-id="1895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Many systems limit particular deductions, even where the expenses directly relate to the business.  Such limitations may, by way of example, include:
</span></p><span data-dcnode-id="1886" instrument_node="">
</span><ul data-dcnode-id="1853"><li data-dcnode-id="1881"><span data-dcnode-id="1885" instrument_node="">Maximum deductions for use of automobiles</span><sup class="reference" data-dcnode-id="1882" id="cite_ref-19"><a data-dcnode-id="1883" href="#cite_note-19"><span data-dcnode-id="1884" instrument_node="">[19]</span></a></sup></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node="">Limits on deducting compensation of certain key employees</span><sup class="reference" data-dcnode-id="1876" id="cite_ref-20"><a data-dcnode-id="1877" href="#cite_note-20"><span data-dcnode-id="1878" instrument_node="">[20]</span></a></sup></li><span data-dcnode-id="1874" instrument_node="">
</span><li data-dcnode-id="1869"><span data-dcnode-id="1873" instrument_node="">Limits on lobbying or similar expenditures</span><sup class="reference" data-dcnode-id="1870" id="cite_ref-21"><a data-dcnode-id="1871" href="#cite_note-21"><span data-dcnode-id="1872" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="1868" instrument_node="">
</span><li data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">Nondeductibility of payments considered in violation of public policy, such as criminal fines</span><sup class="reference" data-dcnode-id="1864" id="cite_ref-22"><a data-dcnode-id="1865" href="#cite_note-22"><span data-dcnode-id="1866" instrument_node="">[22]</span></a></sup></li><span data-dcnode-id="1862" instrument_node="">
</span><li data-dcnode-id="1854"><span data-dcnode-id="1861" instrument_node="">Limits on deductions for business-related entertainment but no limit in 2021 taxes and beyond.</span><sup class="reference" data-dcnode-id="1858" id="cite_ref-23"><a data-dcnode-id="1859" href="#cite_note-23"><span data-dcnode-id="1860" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="1855" id="cite_ref-24"><a data-dcnode-id="1856" href="#cite_note-24"><span data-dcnode-id="1857" instrument_node="">[24]</span></a></sup></li></ul><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1851" instrument_node="">In addition, deductions in excess of income in one endeavor may not be allowed to offset income from other endeavors.  For example, the United States limits deductions related to passive activities to income from passive activities.</span><sup class="reference" data-dcnode-id="1848" id="cite_ref-25"><a data-dcnode-id="1849" href="#cite_note-25"><span data-dcnode-id="1850" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1847" instrument_node="">
</span></p><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">In particular, expenses that are included in COGS cannot be deducted again as a business expense. COGS expenses include:  
</span></p><span data-dcnode-id="1843" instrument_node="">
</span><ul data-dcnode-id="1831"><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">The cost of products or raw materials, including freight or shipping charges;</span></li><span data-dcnode-id="1840" instrument_node="">
</span><li data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">The cost of storing products the business sells;</span></li><span data-dcnode-id="1837" instrument_node="">
</span><li data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Direct labor costs for workers who produce the products; and</span></li><span data-dcnode-id="1834" instrument_node="">
</span><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Factory overhead expenses.</span></li></ul><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1829" instrument_node="">In 2005, the Australian government amended its taxation legislation to remove deductions for expenses incurred in conducting criminal business activities. This came after the </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Court_of_Australia" title="Federal Court of Australia"><span data-dcnode-id="1828" instrument_node="">Federal Court</span></a><span data-dcnode-id="1826" instrument_node=""> ruled in </span><i data-dcnode-id="1823"><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commissioner_of_Taxation_v_La_Rosa" title="Commissioner of Taxation v La Rosa"><span data-dcnode-id="1825" instrument_node="">Commissioner of Taxation v La Rosa</span></a></i><span data-dcnode-id="1822" instrument_node=""> that a heroin dealer was entitled to a tax deduction for money stolen from him in a drug deal.</span><sup class="reference" data-dcnode-id="1819" id="cite_ref-26"><a data-dcnode-id="1820" href="#cite_note-26"><span data-dcnode-id="1821" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1818" instrument_node="">
</span></p><span data-dcnode-id="1816" instrument_node="">
</span><h2 data-dcnode-id="1805"><span data-dcnode-id="1815" id="Capitalized_items_and_cost_recovery_.28depreciation.29"></span><span class="mw-headline" data-dcnode-id="1813" id="Capitalized_items_and_cost_recovery_(depreciation)"><span data-dcnode-id="1814" instrument_node="">Capitalized items and cost recovery (depreciation)</span></span><span class="mw-editsection" data-dcnode-id="1806"><span class="mw-editsection-bracket" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">[</span></span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D8" title="Edit section: Capitalized items and cost recovery (depreciation)"><span data-dcnode-id="1810" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1803" instrument_node="">Many systems require that the cost of items likely to produce future benefits be capitalized.</span><sup class="reference" data-dcnode-id="1800" id="cite_ref-27"><a data-dcnode-id="1801" href="#cite_note-27"><span data-dcnode-id="1802" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1799" instrument_node="">  Examples include plant and equipment, fees related to acquisition, and developing </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intangible_asset" title="Intangible asset"><span data-dcnode-id="1798" instrument_node="">intangible assets</span></a><span data-dcnode-id="1796" instrument_node=""> (e.g., patentable inventions).  Such systems often allow a tax deduction for cost recovery in a future period.
</span></p><p data-dcnode-id="1771"><span data-dcnode-id="1794" instrument_node="">A common approach to such cost recovery is to allow a deduction for a portion of the cost ratably over some period of years.  The U.S. system refers to such a cost recovery deduction as </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depreciation" title="Depreciation"><span data-dcnode-id="1793" instrument_node="">depreciation</span></a><span data-dcnode-id="1791" instrument_node=""> for costs of tangible assets</span><sup class="reference" data-dcnode-id="1788" id="cite_ref-28"><a data-dcnode-id="1789" href="#cite_note-28"><span data-dcnode-id="1790" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1787" instrument_node=""> and as </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amortization" title="Amortization"><span data-dcnode-id="1786" instrument_node="">amortization</span></a><span data-dcnode-id="1784" instrument_node=""> for costs of intangible assets.  Depreciation in these systems is allowed over an estimated useful life, which may be assigned by the government for numerous classes of assets, based on the nature and use of the asset and the nature of the business.</span><sup class="reference" data-dcnode-id="1781" id="cite_ref-29"><a data-dcnode-id="1782" href="#cite_note-29"><span data-dcnode-id="1783" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1780" instrument_node="">  The annual depreciation deduction may be computed on a straight line, declining balance, or other basis, as permitted in each country's rules.</span><sup class="reference" data-dcnode-id="1777" id="cite_ref-30"><a data-dcnode-id="1778" href="#cite_note-30"><span data-dcnode-id="1779" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1776" instrument_node="">  Many systems allow amortization of the cost of intangible assets only on a straight-line basis, generally computed monthly over the actual expected life or a government specified life.</span><sup class="reference" data-dcnode-id="1773" id="cite_ref-31"><a data-dcnode-id="1774" href="#cite_note-31"><span data-dcnode-id="1775" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1772" instrument_node="">
</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1770" instrument_node="">Alternative approaches are used by some systems.  Some systems allow a fixed percentage or dollar amount of cost recovery in particular years, often called “capital allowances.”</span><sup class="reference" data-dcnode-id="1767" id="cite_ref-32"><a data-dcnode-id="1768" href="#cite_note-32"><span data-dcnode-id="1769" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1766" instrument_node="">  This may be determined by reference to the type of asset or business.</span><sup class="reference" data-dcnode-id="1763" id="cite_ref-33"><a data-dcnode-id="1764" href="#cite_note-33"><span data-dcnode-id="1765" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1762" instrument_node="">  Some systems allow specific charges for cost recovery for some assets upon certain identifiable events.</span><sup class="reference" data-dcnode-id="1759" id="cite_ref-34"><a data-dcnode-id="1760" href="#cite_note-34"><span data-dcnode-id="1761" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1758" instrument_node="">
</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1756" instrument_node="">Capitalization may be required for some items without the potential for cost recovery until disposition or abandonment of the asset to which the capitalized costs relate.  This is often the case for costs related to the formation or reorganization of a corporation, or certain expenses in corporate acquisitions.</span><sup class="reference" data-dcnode-id="1753" id="cite_ref-35"><a data-dcnode-id="1754" href="#cite_note-35"><span data-dcnode-id="1755" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1752" instrument_node="">  However, some systems provide for amortization of certain such costs, at the election of the taxpayer.</span><sup class="reference" data-dcnode-id="1749" id="cite_ref-36"><a data-dcnode-id="1750" href="#cite_note-36"><span data-dcnode-id="1751" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1748" instrument_node="">
</span></p><span data-dcnode-id="1746" instrument_node="">
</span><h2 data-dcnode-id="1736"><span class="mw-headline" data-dcnode-id="1744" id="Non-business_expenses"><span data-dcnode-id="1745" instrument_node="">Non-business expenses</span></span><span class="mw-editsection" data-dcnode-id="1737"><span class="mw-editsection-bracket" data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">[</span></span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D9" title="Edit section: Non-business expenses"><span data-dcnode-id="1741" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1734" instrument_node="">Some systems distinguish between an active trade or business and the holding of assets to produce income.</span><sup class="reference" data-dcnode-id="1731" id="cite_ref-37"><a data-dcnode-id="1732" href="#cite_note-37"><span data-dcnode-id="1733" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1730" instrument_node="">  In such systems, there may be additional limitations on the timing and nature of amounts that may be claimed as tax deductions.  Many of the rules, including accounting methods and limits on deductions, that apply to business expenses also apply to income producing expenses.
</span></p><span data-dcnode-id="1728" instrument_node="">
</span><h3 data-dcnode-id="1718"><span class="mw-headline" data-dcnode-id="1726" id="Losses"><span data-dcnode-id="1727" instrument_node="">Losses</span></span><span class="mw-editsection" data-dcnode-id="1719"><span class="mw-editsection-bracket" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">[</span></span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D10" title="Edit section: Losses"><span data-dcnode-id="1723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1717" instrument_node="">
</span><link data-dcnode-id="1716" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1712" role="note"><span data-dcnode-id="1715" instrument_node="">See also: </span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loss_on_sale_of_residential_property" title="Loss on sale of residential property"><span data-dcnode-id="1714" instrument_node="">Loss on sale of residential property</span></a></div><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Many systems allow a deduction for loss on sale, exchange, or abandonment of both business and non-business income producing assets.  This deduction may be limited to gains from the same class of assets.  In the U.S., a loss on non-business assets is considered a capital loss, and deduction of the loss is limited to capital gains.  Also, in the U.S. a loss on the sale of the taxpayer's principal residence or other personal assets is not allowed as a deduction except to the extent due to casualty or theft.
</span></p><span data-dcnode-id="1708" instrument_node="">
</span><h3 data-dcnode-id="1698"><span class="mw-headline" data-dcnode-id="1706" id="Personal_deductions"><span data-dcnode-id="1707" instrument_node="">Personal deductions</span></span><span class="mw-editsection" data-dcnode-id="1699"><span class="mw-editsection-bracket" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">[</span></span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D11" title="Edit section: Personal deductions"><span data-dcnode-id="1703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1696" instrument_node="">Many jurisdictions allow certain classes of taxpayers to reduce taxable income for certain inherently personal items.  A common such deduction is a fixed allowance for the taxpayer and certain family members or other persons supported by the taxpayer.  The U.S. allows such a deduction for “personal exemptions” for the taxpayer and certain members of the taxpayer's household.</span><sup class="reference" data-dcnode-id="1693" id="cite_ref-38"><a data-dcnode-id="1694" href="#cite_note-38"><span data-dcnode-id="1695" instrument_node="">[38]</span></a></sup><span data-dcnode-id="1692" instrument_node="">  The UK grants a “</span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personal_allowance" title="Personal allowance"><span data-dcnode-id="1691" instrument_node="">personal allowance</span></a><span data-dcnode-id="1689" instrument_node="">.”</span><sup class="reference" data-dcnode-id="1686" id="cite_ref-39"><a data-dcnode-id="1687" href="#cite_note-39"><span data-dcnode-id="1688" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1685" instrument_node="">  Both U.S. and UK allowances are phased out for individuals or married couples with income in excess of specified levels.
</span></p><p data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">In addition, many jurisdictions allow reduction of taxable income for certain categories of expenses not incurred in connection with a business or investments.  In the U.S. system, these (as well as certain business or investment expenses) are referred to as "</span><a class="mw-redirect" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Itemized_deductions" title="Itemized deductions"><span data-dcnode-id="1682" instrument_node="">itemized deductions</span></a><span data-dcnode-id="1680" instrument_node="">" for individuals.  The UK allows a few of these as personal reliefs.  These include, for example, the following for U.S. residents (and UK residents as noted):
</span></p><span data-dcnode-id="1678" instrument_node="">
</span><ul data-dcnode-id="1633"><li data-dcnode-id="1673"><span data-dcnode-id="1677" instrument_node="">Medical expenses (in excess of 7.5% of adjusted gross income)</span><sup class="reference" data-dcnode-id="1674" id="cite_ref-40"><a data-dcnode-id="1675" href="#cite_note-40"><span data-dcnode-id="1676" instrument_node="">[40]</span></a></sup></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1671" instrument_node="">State and local income and property taxes (the </span><a class="mw-redirect" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SALT_deduction" title="SALT deduction"><span data-dcnode-id="1670" instrument_node="">SALT deduction</span></a><span data-dcnode-id="1668" instrument_node=""> in the United States)</span><sup class="reference" data-dcnode-id="1665" id="cite_ref-41"><a data-dcnode-id="1666" href="#cite_note-41"><span data-dcnode-id="1667" instrument_node="">[41]</span></a></sup></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">Interest expense on certain home loans</span><sup class="reference" data-dcnode-id="1659" id="cite_ref-42"><a data-dcnode-id="1660" href="#cite_note-42"><span data-dcnode-id="1661" instrument_node="">[42]</span></a></sup></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1656" instrument_node="">Gifts of money or property to qualifying charitable organizations, subject to certain maximum limitations,</span><sup class="reference" data-dcnode-id="1653" id="cite_ref-43"><a data-dcnode-id="1654" href="#cite_note-43"><span data-dcnode-id="1655" instrument_node="">[43]</span></a></sup></li><span data-dcnode-id="1651" instrument_node="">
</span><li data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">Losses on non-income-producing property due to casualty or theft,</span><sup class="reference" data-dcnode-id="1647" id="cite_ref-44"><a data-dcnode-id="1648" href="#cite_note-44"><span data-dcnode-id="1649" instrument_node="">[44]</span></a></sup></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">Contribution to certain retirement or health savings plans (U.S. and UK),</span><sup class="reference" data-dcnode-id="1641" id="cite_ref-45"><a data-dcnode-id="1642" href="#cite_note-45"><span data-dcnode-id="1643" instrument_node="">[45]</span></a></sup></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node="">Certain educational expenses.</span><sup class="reference" data-dcnode-id="1635" id="cite_ref-46"><a data-dcnode-id="1636" href="#cite_note-46"><span data-dcnode-id="1637" instrument_node="">[46]</span></a></sup></li></ul><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1631" instrument_node="">Many systems provide that an individual may claim a tax deduction for personal payments that, upon payment, become taxable to another person, such as alimony.</span><sup class="reference" data-dcnode-id="1628" id="cite_ref-47"><a data-dcnode-id="1629" href="#cite_note-47"><span data-dcnode-id="1630" instrument_node="">[47]</span></a></sup><span data-dcnode-id="1627" instrument_node="">  Such systems generally require, at a minimum, reporting of such amounts,</span><sup class="reference" data-dcnode-id="1624" id="cite_ref-48"><a data-dcnode-id="1625" href="#cite_note-48"><span data-dcnode-id="1626" instrument_node="">[48]</span></a></sup><span data-dcnode-id="1623" instrument_node=""> and may require that </span><a class="mw-redirect" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Withholding_tax" title="Withholding tax"><span data-dcnode-id="1622" instrument_node="">withholding tax</span></a><span data-dcnode-id="1620" instrument_node=""> be applied to the payment.</span><sup class="reference" data-dcnode-id="1617" id="cite_ref-49"><a data-dcnode-id="1618" href="#cite_note-49"><span data-dcnode-id="1619" instrument_node="">[49]</span></a></sup><span data-dcnode-id="1616" instrument_node="">
</span></p><span data-dcnode-id="1614" instrument_node="">
</span><h2 data-dcnode-id="1604"><span class="mw-headline" data-dcnode-id="1612" id="Groups_of_taxpayers"><span data-dcnode-id="1613" instrument_node="">Groups of taxpayers</span></span><span class="mw-editsection" data-dcnode-id="1605"><span class="mw-editsection-bracket" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">[</span></span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D12" title="Edit section: Groups of taxpayers"><span data-dcnode-id="1609" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1602" instrument_node="">Some systems allow a deduction to a company or other entity for expenses or losses of another company or entity if the two companies or entities are commonly controlled.  Such deduction may be referred to as “group relief.”</span><sup class="reference" data-dcnode-id="1599" id="cite_ref-50"><a data-dcnode-id="1600" href="#cite_note-50"><span data-dcnode-id="1601" instrument_node="">[50]</span></a></sup><span data-dcnode-id="1598" instrument_node="">  Generally, such deductions function in lieu of consolidated or combined computation of tax (</span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_consolidation" title="Tax consolidation"><span data-dcnode-id="1597" instrument_node="">tax consolidation</span></a><span data-dcnode-id="1595" instrument_node="">) for such groups.  Group relief may be available for companies in </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_state_of_the_European_Union" title="Member state of the European Union"><span data-dcnode-id="1594" instrument_node="">EU member countries</span></a><span data-dcnode-id="1592" instrument_node=""> with respect to losses of group companies in other countries.</span><sup class="reference" data-dcnode-id="1589" id="cite_ref-51"><a data-dcnode-id="1590" href="#cite_note-51"><span data-dcnode-id="1591" instrument_node="">[51]</span></a></sup><span data-dcnode-id="1588" instrument_node="">
</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1576"><span class="mw-headline" data-dcnode-id="1584" id="International_aspects"><span data-dcnode-id="1585" instrument_node="">International aspects</span></span><span class="mw-editsection" data-dcnode-id="1577"><span class="mw-editsection-bracket" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">[</span></span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTax_deduction%26action%3Dedit%26section%3D13" title="Edit section: International aspects"><span data-dcnode-id="1581" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">Many systems impose limitations on tax deductions paid to foreign parties, especially related parties.  See </span><a class="mw-redirect" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_tax" title="International tax"><span data-dcnode-id="1573" instrument_node="">International tax</span></a><span data-dcnode-id="1571" instrument_node=""> and </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transfer_pricing" title="Transfer pricing"><span data-dcnode-id="1570" instrument_node="">Transfer pricing</span></a><span data-dcnode-id="1568" instrument_node="">.
</span></p><span data-dcnode-id="1566" instrument_node="">

al:BookSources/978-0981454214"><bdi data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">978-0981454214</span></bdi></a><span data-dcnode-id="1516" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1514" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Taxes+Made+Simple%3A+Income+Taxes+Explained+in+100+Pages+or+Less&amp;rft.pub=Simple+Subjects%2C+LLC&amp;rft.date=2014-09-12&amp;rft.isbn=978-0981454214&amp;rft.aulast=Piper&amp;rft.aufirst=Mike&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ATax+deduction"></span></span><span data-dcnode-id="1512" instrument_node="">

</span><li data-dcnode-id="1493" id="cite_note-2"><span class="mw-cite-backlink" data-dcnode-id="1506"><b data-dcnode-id="1507"><a aria-label="Jump up" data-dcnode-id="1508" href="#cite_ref-2" title="Jump up"><span data-dcnode-id="1509" instrument_node="">^</span></a></b></span><span data-dcnode-id="1505" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1495"><link data-dcnode-id="1504" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="1497"><a class="external text" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040.pdf" rel="nofollow"><span data-dcnode-id="1503" instrument_node="">"Tax year 2017 tax form"</span></a><span data-dcnode-id="1501" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">(PDF)</span></span><span data-dcnode-id="1498" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1496" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Tax+year+2017+tax+form&amp;rft_id=https%3A%2F%2Fwww.irs.gov%2Fpub%2Firs-pdf%2Ff1040.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ATax+deduction"></span></span><span data-dcnode-id="1494" instrument_node="">
</span></li><span data-dcnode-id="1492" instrument_node="">
</span><li data-dcnode-id="1483" id="cite_note-3"><span class="mw-cite-backlink" data-dcnode-id="1488"><b data-dcnode-id="1489"><a aria-label="Jump up" data-dcnode-id="1490" href="#cite_ref-3" title="Jump up"><span data-dcnode-id="1491" instrument_node="">^</span></a></b></span><span data-dcnode-id="1487" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Internal Revenue Code, 26 U.S.C. § 1</span></span><span data-dcnode-id="1484" instrument_node="">
</span></li><span data-dcnode-id="1482" instrument_node="">
</span><li data-dcnode-id="1467" id="cite_note-4"><span class="mw-cite-backlink" data-dcnode-id="1478"><b data-dcnode-id="1479"><a aria-label="Jump up" data-dcnode-id="1480" href="#cite_ref-4" title="Jump up"><span data-dcnode-id="1481" instrument_node="">^</span></a></b></span><span data-dcnode-id="1477" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1469"><span data-dcnode-id="1476" instrument_node="">PRATHAM MANGAT system computes taxable income qby subtracting deductions from gross income.  Gross income, under </span><a class="external text" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/26/61-" rel="nofollow"><span data-dcnode-id="1475" instrument_node="">26 USC 61</span></a><span data-dcnode-id="1473" instrument_node=""> is defined as gains from the sale of property plus other income.  Gains, in turn, are defined in </span><a class="external text" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/26/1001-" rel="nofollow"><span data-dcnode-id="1472" instrument_node="">26 USC 1001</span></a><span data-dcnode-id="1470" instrument_node=""> as the amount realized less the adjusted basis of property sold.</span></span><span data-dcnode-id="1468" instrument_node="">
</span></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1457" id="cite_note-5"><span class="mw-cite-backlink" data-dcnode-id="1462"><b data-dcnode-id="1463"><a aria-label="Jump up" data-dcnode-id="1464" href="#cite_ref-5" title="Jump up"><span data-dcnode-id="1465" instrument_node="">^</span></a></b></span><span data-dcnode-id="1461" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">The UK system computes income chargeable to tax as net business profits, plus other income, with adjustments.  In such systems, the locally recognized generally accepted accounting principles apply.  See, e.g., IAS 2, Inventories.</span></span><span data-dcnode-id="1458" instrument_node="">
</span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1447" id="cite_note-6"><span class="mw-cite-backlink" data-dcnode-id="1452"><b data-dcnode-id="1453"><a aria-label="Jump up" data-dcnode-id="1454" href="#cite_ref-6" title="Jump up"><span data-dcnode-id="1455" instrument_node="">^</span></a></b></span><span data-dcnode-id="1451" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Examples of alternatives to specific identification include first-in-first-out (FIFO), average cost, and last-in-first-out (LIFO).  Many EU countries do not permit LIFO.</span></span><span data-dcnode-id="1448" instrument_node="">
</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1437" id="cite_note-7"><span class="mw-cite-backlink" data-dcnode-id="1442"><b data-dcnode-id="1443"><a aria-label="Jump up" data-dcnode-id="1444" href="#cite_ref-7" title="Jump up"><span data-dcnode-id="1445" instrument_node="">^</span></a></b></span><span data-dcnode-id="1441" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Among the methods commonly used are:  i) factory burden rate, in which overhead costs are assigned  to goods produced based on labor hours or labor dollars;  ii) standard costs, in which a cost including overheads is periodically determined for each type of goods and inventory and cost of goods sold are adjusted periodically for variances of actual costs from such standards; and  iii) activity based costing, in which costs are assigned based on factors which drive the incurrence of such costs.  Numerous variations on these are available in many systems.</span></span><span data-dcnode-id="1438" instrument_node="">
</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1427" id="cite_note-8"><span class="mw-cite-backlink" data-dcnode-id="1432"><b data-dcnode-id="1433"><a aria-label="Jump up" data-dcnode-id="1434" href="#cite_ref-8" title="Jump up"><span data-dcnode-id="1435" instrument_node="">^</span></a></b></span><span data-dcnode-id="1431" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Generally, determinations depend upon the overall method of accounting or overarching principles of local GAAP.  These include the cash receipts and disbursements method, accrual methods, and deferred cost methods.  Under these principles there may be a need to determine when amounts are properly treated as incurred.</span></span><span data-dcnode-id="1428" instrument_node="">
</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1417" id="cite_note-9"><span class="mw-cite-backlink" data-dcnode-id="1422"><b data-dcnode-id="1423"><a aria-label="Jump up" data-dcnode-id="1424" href="#cite_ref-9" title="Jump up"><span data-dcnode-id="1425" instrument_node="">^</span></a></b></span><span data-dcnode-id="1421" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">GAAP often requires that the decline in value of unsold goods be charged to income when the decline occurs.  This is often accomplished through a lower of cost or market value inventory accounting method,  or inventory reserves.  Some systems provide for differences in these determinations for financial reporting and tax purposes.</span></span><span data-dcnode-id="1418" instrument_node="">
</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1396" id="cite_note-10"><span class="mw-cite-backlink" data-dcnode-id="1412"><b data-dcnode-id="1413"><a aria-label="Jump up" data-dcnode-id="1414" href="#cite_ref-10" title="Jump up"><span data-dcnode-id="1415" instrument_node="">^</span></a></b></span><span data-dcnode-id="1411" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1398"><span data-dcnode-id="1410" instrument_node="">[ UK Income and Corporation Taxes Act of 1988 (ICTA) section</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1403" style="white-space:nowrap;"><span data-dcnode-id="1409" instrument_node="">[</span><i data-dcnode-id="1405"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1407" title="This claim needs references to reliable sources. (April 2010)"><span data-dcnode-id="1408" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1404" instrument_node="">]</span></sup><span data-dcnode-id="1402" instrument_node="">]. The HMRC Business Income Manual at </span><a class="external text" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hmrc.gov.uk/manuals/bimmanual/bim31001.htm" rel="nofollow"><span data-dcnode-id="1401" instrument_node="">BIM 31001</span></a><span data-dcnode-id="1399" instrument_node=""> states that "the starting point is accounts prepared in accordance with ordinary principles of commercial accountancy, and the commercial profits are then adjusted in accordance with the provisions of the Taxes Acts."</span></span><span data-dcnode-id="1397" instrument_node="">
</span></li><span data-dcnode-id="1395" instrument_node="">
</span><li data-dcnode-id="1384" id="cite_note-11"><span class="mw-cite-backlink" data-dcnode-id="1391"><b data-dcnode-id="1392"><a aria-label="Jump up" data-dcnode-id="1393" href="#cite_ref-11" title="Jump up"><span data-dcnode-id="1394" instrument_node="">^</span></a></b></span><span data-dcnode-id="1390" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1386"><a class="external text" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/26/162-" rel="nofollow"><span data-dcnode-id="1389" instrument_node="">26 USC 162(a)</span></a><span data-dcnode-id="1387" instrument_node="">.</span></span><span data-dcnode-id="1385" instrument_node="">
</span></li><span data-dcnode-id="1383" instrument_node="">
</span><li data-dcnode-id="1371" id="cite_note-12"><span class="mw-cite-backlink" data-dcnode-id="1379"><b data-dcnode-id="1380"><a aria-label="Jump up" data-dcnode-id="1381" href="#cite_ref-12" title="Jump up"><span data-dcnode-id="1382" instrument_node="">^</span></a></b></span><span data-dcnode-id="1378" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">Johnston, Kevin. "A List of Deductible Business Expenses for Schedule C." Small Business - Chron.com, </span><a class="external free" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//smallbusiness.chron.com/list-deductible-business-expenses-schedule-c-21156.html" rel="nofollow"><span data-dcnode-id="1376" instrument_node="">http://smallbusiness.chron.com/list-deductible-business-expenses-schedule-c-21156.html</span></a><span data-dcnode-id="1374" instrument_node="">. 29 June 2018.</span></span><span data-dcnode-id="1372" instrument_node="">
</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1347" id="cite_note-13"><span class="mw-cite-backlink" data-dcnode-id="1366"><b data-dcnode-id="1367"><a aria-label="Jump up" data-dcnode-id="1368" href="#cite_ref-13" title="Jump up"><span data-dcnode-id="1369" instrument_node="">^</span></a></b></span><span data-dcnode-id="1365" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1349"><span data-dcnode-id="1364" instrument_node="">In this regard, the </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Tax_Court" title="United States Tax Court"><span data-dcnode-id="1363" instrument_node="">United States Tax Court</span></a><span data-dcnode-id="1361" instrument_node=""> has issued well in excess of one thousand rulings.  Among the factors considered are:  a) whether the transactions are regular and continuous (discussed, e.g., prior to the income tax in Lewellyn v. Pittsburgh, B. &amp; L. E. R. Co., 222 Fed. 177 (CA3, 1915), a case cited by the Tax Court), (b) whether  the purported business is substantial (see, e.g.,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1354" style="white-space:nowrap;"><span data-dcnode-id="1360" instrument_node="">[</span><i data-dcnode-id="1356"><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1358" title="This claim needs references to reliable sources. (April 2010)"><span data-dcnode-id="1359" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1355" instrument_node="">]</span></sup><span data-dcnode-id="1353" instrument_node="">), (c) whether the transactions were profit motivated (see, e.g., Doggett v. Burnet, (1933) , 65 F2d 191; also see hobby loss rules at </span><a class="external text" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/26/183-" rel="nofollow"><span data-dcnode-id="1352" instrument_node="">26 USC 183</span></a><span data-dcnode-id="1350" instrument_node="">).</span></span><span data-dcnode-id="1348" instrument_node="">
</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1335" id="cite_note-14"><span class="mw-cite-backlink" data-dcnode-id="1342"><b data-dcnode-id="1343"><a aria-label="Jump up" data-dcnode-id="1344" href="#cite_ref-14" title="Jump up"><span data-dcnode-id="1345" instrument_node="">^</span></a></b></span><span data-dcnode-id="1341" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1337"><a class="external text" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hmrc.gov.uk/manuals/bimmanual/bim20200.htm" rel="nofollow"><span data-dcnode-id="1340" instrument_node="">UK Business Income Manual 20200</span></a><span data-dcnode-id="1338" instrument_node=""> describes various badges of trade.</span></span><span data-dcnode-id="1336" instrument_node="">
