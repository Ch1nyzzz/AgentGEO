</span></div></div></div><div class="uk-sticky" data-dcnode-id="1278" style="z-index: 1;" uk-sticky="offset: 100; bottom: #body;"><h4 class="uk-margin-small-bottom" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Contents</span></h4><ul class="uk-nav uk-nav-default uk-link-text" data-dcnode-id="1279" uk-scrollspy-nav="closest: li; scroll: true;offset:100"><li class="uk-active" data-dcnode-id="1292"><a data-dcnode-id="1293" href="#part1" uk-scroll="offset:100;"><span data-dcnode-id="1294" instrument_node="">What is a profits tax?</span></a></li><li data-dcnode-id="1289"><a data-dcnode-id="1290" href="#part2" uk-scroll="offset:100;"><span data-dcnode-id="1291" instrument_node="">Year of assessment and corporate tax return</span></a></li><li data-dcnode-id="1286"><a data-dcnode-id="1287" href="#part3" uk-scroll="offset:100;"><span data-dcnode-id="1288" instrument_node="">Profit tax rate and basis of taxation</span></a></li><li data-dcnode-id="1283"><a data-dcnode-id="1284" href="#part4" uk-scroll="offset:100;"><span data-dcnode-id="1285" instrument_node="">Tax incentives available</span></a></li><li data-dcnode-id="1280"><a data-dcnode-id="1281" href="#part5" uk-scroll="offset:100;"><span data-dcnode-id="1282" instrument_node="">Calculating taxable income in Hong Kong</span></a></li></ul></div><div class="uk-sticky-placeholder" data-dcnode-id="1277" hidden="" style="height: 289px; margin: 0px;"></div></div></div><div class="uk-width-3-4@m" data-dcnode-id="342"><div class="uk-panel uk-hidden@m uk-margin" data-dcnode-id="1255" id="template--Lkl946v#1-0-1-0" style="visibility: hidden;" uk-scrollspy-class=""><div class="uk-alert uk-padding" data-dcnode-id="1256"><h4 class="uk-margin-small-bottom" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Contents</span></h4><ul class="uk-nav uk-nav-default uk-link-text" data-dcnode-id="1257"><li data-dcnode-id="1270"><a data-dcnode-id="1271" href="#part1" uk-scroll="offset:100;"><span data-dcnode-id="1272" instrument_node="">What is a profits tax?</span></a></li><li data-dcnode-id="1267"><a data-dcnode-id="1268" href="#part2" uk-scroll="offset:100;"><span data-dcnode-id="1269" instrument_node="">Year of assessment and corporate tax return</span></a></li><li data-dcnode-id="1264"><a data-dcnode-id="1265" href="#part3" uk-scroll="offset:100;"><span data-dcnode-id="1266" instrument_node="">Profit tax rate and basis of taxation</span></a></li><li data-dcnode-id="1261"><a data-dcnode-id="1262" href="#part4" uk-scroll="offset:100;"><span data-dcnode-id="1263" instrument_node="">Tax incentives available</span></a></li><li data-dcnode-id="1258"><a data-dcnode-id="1259" href="#part5" uk-scroll="offset:100;"><span data-dcnode-id="1260" instrument_node="">Calculating taxable income in Hong Kong</span></a></li></ul></div></div><div class="uk-panel uk-margin-remove-vertical uk-scrollspy-inview" data-dcnode-id="966" id="body" style="" uk-scrollspy-class=""><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">With Hong Kong’s two-tier tax regime, low tax rates and easy-to-understand tax legislation, many companies choose to carry out their business in the country. In this article, we will go into the specifics about the corporate (profit) tax in Hong Kong, and help you learn which tax rate will apply to your Hong Kong company.</span></p><h2 data-dcnode-id="1251" id="part1"><span data-dcnode-id="1252" instrument_node="">What is a profits tax in Hong Kong?</span></h2><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Profits tax is an equivalent to corporate income tax. Every company in Hong Kong must file a profits tax return with The Inland Revenue Department (IRD), along with the audited financial statements of the company. Individuals, sole proprietorships, partnerships and property owners are also required to file annual profits tax returns.</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">The IRD issues&nbsp;</span><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">tax returns on 31st March</span></strong><span data-dcnode-id="1245" instrument_node="">&nbsp;each year to all persons and corporations required to file a tax return. Such persons and corporations should complete and file tax returns to the IRD within a month, together with any necessary documentation.</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Extensions of time for lodgement can be requested – late lodgement (without the IRD granting an extension) will result in penalties being levied on the company. For newly incorporated companies, Profits tax returns are issued within 18 months of the business commencement date of companies in Hong Kong.</span></p><div class="tm-grid-expand uk-grid-margin uk-grid" data-dcnode-id="1204" style="background-color: #FDE6D2; border-radius: 5px; padding: 25px 25px 25px 0; margin-left:0;" uk-grid=""><div class="uk-grid-item-match uk-flex-middle uk-width-2-3@s uk-first-column" data-dcnode-id="1210"><div class="uk-panel uk-width-1-1" data-dcnode-id="1211"><h4 data-dcnode-id="1238"><span data-dcnode-id="1241" instrument_node="">Never miss an important deadline with our detailed compliance calendar</span><span class="acc-orange" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">.</span></span></h4><ul class="uk-list" data-dcnode-id="1216"><li class="el-item" data-dcnode-id="1231"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="1232" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="1236"><img alt="" class="el-image" data-dcnode-id="1237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hongkong.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="1233"><div class="el-content uk-panel" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Get a clear picture of all the accounting, tax and HR deadlines</span></div></div></div></li><li class="el-item" data-dcnode-id="1224"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="1225" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="1229"><img alt="" class="el-image" data-dcnode-id="1230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hongkong.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="1226"><div class="el-content uk-panel" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Avoid penalties and late fees</span></div></div></div></li><li class="el-item" data-dcnode-id="1217"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="1218" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="1222"><img alt="" class="el-image" data-dcnode-id="1223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hongkong.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="1219"><div class="el-content uk-panel" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Keep your accountants or accounting firm accountable</span></div></div></div></li></ul><div class="uk-margin" data-dcnode-id="1212"><span data-dcnode-id="1215" instrument_node=""> </span><a class="el-content uk-button uk-button-primary" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hongkong.acclime.com/downloads/compliance-calendar/"><span data-dcnode-id="1214" instrument_node="">Download now</span></a></div></div></div><div class="uk-grid-item-match uk-flex-middle uk-width-1-3@s" data-dcnode-id="1205"><div class="uk-panel uk-width-1-1" data-dcnode-id="1206"><div class="uk-margin" data-dcnode-id="1207"><span data-dcnode-id="1209" instrument_node=""> </span><img alt="Compliance Calendar" class="el-image uk-border-rounded uk-box-shadow-medium" data-dcnode-id="1208" data-height="700" data-width="495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hongkong.acclime.com/wp-content/uploads/Compliance-calendar-cover-HK.png&amp;raw"></div></div></div></div><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="1200" id="part2"><span data-dcnode-id="1201" instrument_node="">Year of assessment &amp; corporate tax return</span></h2><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Year of assessment (YA) is the year that income is charged for companies. In Hong Kong, the YA is from 1 April to 31 March the following year.</span></p><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">The&nbsp;</span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ird.gov.hk/eng/welcome.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1196" instrument_node="">Inland Revenue Department</span></a><span data-dcnode-id="1194" instrument_node="">&nbsp;(IRD) will issue tax returns and you must file the tax return together with submitting the required documents to the IRD. If the company is a newly registered business, the IRD will issue the profits tax return 18 months after the date of incorporation.</span></p><p data-dcnode-id="1190"><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The company must file the following:</span></strong></p><ul data-dcnode-id="1181"><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">A certified copy of the auditor’s report, balance sheet and profit &amp; loss account</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">A tax calculation showing how the amount of assessable profits</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Profits tax return form issued by the IRD</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Supplementary form from the IRD for your tax data and financial data</span></li></ul><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Small corporations may or may not be required to submit supporting documents with the profit tax return if they qualify as a small company defined by the IRD (has income for a basis period of not more than HKD 2 million.)</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">However, they should keep those documents and submit them if they are requested. A branch office in Hong Kong must file a profits tax return annually, and the IRD may request audited accounts of the foreign parent company to confirm the profit tax return of the branch office.</span></p><h2 data-dcnode-id="1175" id="part3"><span data-dcnode-id="1176" instrument_node="">Profits tax rate and basis of taxation</span></h2><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">There are two rates of tax for companies in Hong Kong. A percentage of 8.25% applies to profits up to HKD 2 million. The remaining profits is subject to a rate of 16.5%. For unincorporated businesses, a rate of 7.5% applies to profits up to HKD 2 million. After that, the rate is 15%.</span></p><p data-dcnode-id="1165"><span data-dcnode-id="1172" instrument_node="">In the year 2019/20, 100% of profits tax is waived, up to a maximum of&nbsp;</span><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">HKD 20,000</span></strong><span data-dcnode-id="1169" instrument_node="">. This means that, effectively for a company, the first&nbsp;</span><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">HKD 242,424</span></strong><span data-dcnode-id="1166" instrument_node="">&nbsp;of profits is exempt from tax (HKD 242,424 x 8.25% = HKD 20,000).</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node="">For an unincorporated business, the effective tax exemption is on your first&nbsp;</span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">HKD 266,667</span></strong><span data-dcnode-id="1161" instrument_node="">&nbsp;of profits (HKD 266,667 x 7.5% = HKD 20,000)</span></p><h3 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Two-tier tax profit regime</span></h3><div class="uk-overflow-auto" data-dcnode-id="1129"><table class="uk-table uk-table-striped uk-table-divider uk-table-hover" data-dcnode-id="1130"><tbody data-dcnode-id="1131"><tr data-dcnode-id="1146"><td data-dcnode-id="1153"><b data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Assessable</span></b><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">&nbsp;profits</span></strong></td><td data-dcnode-id="1150"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Corporations</span></strong></td><td data-dcnode-id="1147"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Unincorporated businesses</span></strong></td></tr><tr data-dcnode-id="1139"><td data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">First HKD 2 million</span></td><td data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">8.25%</span></td><td data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">7.5%</span></td></tr><tr data-dcnode-id="1132"><td data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">More than HKD 2 million</span></td><td data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">16.5%</span></td><td data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">15%</span></td></tr></tbody></table></div><h2 data-dcnode-id="1127" id="part4"><span data-dcnode-id="1128" instrument_node="">Tax incentives available</span></h2><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Hong Kong has tax incentives on specific industries, such as air services, financial services and shipping. Income from qualifying debt instruments (QDI) issued before 1 April 2018 are subject to a concessionary tax rate of 50% of the standard profit tax rates, which depends on the maturity period of the QDI. QDIs issued after 1 April 2018 are exempted regardless of its maturity period.</span></p><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Corporate treasury centres qualify to pay tax at a concessionary tax rate of 50% of the standard profit tax rates under certain conditions. Profits from qualifying aircraft leasing activities and aircraft leasing management activities conducted in Hong Kong are subject to a profit tax of 50% of the profit tax rates.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Hong Kong has also introduced tax incentives for qualifying R&amp;D expenditures. The Inland Revenue (Amendment) (No.7) Ordinance 2018 (the Amendment) identified two types of deductible R&amp;D expenditures:</span></p><ul data-dcnode-id="1116"><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Type A – Qualified for 100% standard tax deduction</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Type B – Qualified for an enhanced two-tiered tax deduction at 300% for the first HKD 2 million and 200% for the remaining amount</span></li></ul><div class="uk-overflow-auto" data-dcnode-id="1083"><table class="uk-table uk-table-striped uk-table-divider uk-table-hover" data-dcnode-id="1084"><tbody data-dcnode-id="1085"><tr data-dcnode-id="1109"><td data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Type A expenditures qualified for standard deduction</span></strong></td><td data-dcnode-id="1110"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Type B expenditures qualified for enhanced deduction</span></strong></td></tr><tr data-dcnode-id="1086"><td data-dcnode-id="1100"><span data-dcnode-id="1108" instrument_node="">Payments made to a college, university or a Designated Research Institution:</span><p data-dcnode-id="1107"></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">· For an R&amp;D activity related to the business; or</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">· To conduct R&amp;D activity related to the class of the business; or</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Spending on any R&amp;D activity associated with the taxpayer’s business, including capital expenditure except land or buildings,</span></p></td><td data-dcnode-id="1087"><span data-dcnode-id="1099" instrument_node="">Payments made to a Designated Local Research Institution:</span><p data-dcnode-id="1098"></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">· For a qualifying R&amp;D activity associated with the business; or</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">· To undertake a qualifying R&amp;D activity related to the business; or</span></p><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Spending incurred:</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">· Regarding an employee engaged directly in; or</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">· On a consumable item used directly on a qualifying R&amp;D activity relevant to the business</span></p></td></tr></tbody></table></div><p data-dcnode-id="1079"><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Designated local research institution</span></em><span data-dcnode-id="1080" instrument_node="">&nbsp;refers to a university or college in Hong Kong that conducts qualifying R&amp;D activities that are specified by the Commissioner for Innovation and Technology (CIT).</span></p><p data-dcnode-id="1074"><strong data-dcnode-id="1075"><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">R&amp;D activity</span></em><span data-dcnode-id="1076" instrument_node="">&nbsp;is an activity that:</span></strong></p><ol data-dcnode-id="1065"><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Is related to natural or applied sciences to increase knowledge;</span></li><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Is experimental, investigative or systematic, for study related to business, market or management research;</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Is an original and planned investigation undertaken to gain new scientific or technical understanding; or</span></li><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Applies research findings or other new knowledge to plans or designs for producing or improving devices, materials, products, processes or services before they are commercially made.</span></li></ol><p data-dcnode-id="1061"><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Qualifying R&amp;D activity</span></em><span data-dcnode-id="1062" instrument_node="">&nbsp;only applies to activities (1), (3) and (4) that are conducted in Hong Kong, and excludes any activities not related to science or technology.</span></p><h2 data-dcnode-id="1059" id="part5"><span data-dcnode-id="1060" instrument_node="">Calculating taxable income in Hong Kong</span></h2><h3 data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Step 1: Deduct non-assessable profits</span></h3><p data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Profits that are non-assessable include:</span></strong></p><ul data-dcnode-id="1047"><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Capital from the sale of capital assets</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Dividends or profits that profit tax has already been assessed</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Interest income from deposit in Hong Kong</span></li></ul><h3 data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Step 2: Deduct qualified business expenses</span></h3><p data-dcnode-id="1042"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Expenses that are obtained from producing business income are deductible. These expenses include:</span></strong></p><ul data-dcnode-id="1021"><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Building or land rent</span></li><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Charitable donations</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Costs of buying patents, copyrights, trademarks and registered designs</span></li><li data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Expenses related with lending money</span></li><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Foreign taxes paid on income</span></li><li data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Repair, refurbishment, and replacement of machines or equipment expenses</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Research and development expenses</span></li><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Retirement scheme contributions</span></li><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Technical education fees</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Trademark and patent registration costs</span></li></ul><p data-dcnode-id="1018"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Non-deductible expenses include:</span></strong></p><ul data-dcnode-id="1003"><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Domestic or private expenses, such as travelling fees to and from the place of business and the person’s residence</span></li><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Expenses that are not incurred in generating profit</span></li><li data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Improvement costs</span></li><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Other taxes paid (excluding employees’ salary tax)</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1009" instrument_node="">Other non-deductible expenses as listed in&nbsp;</span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elegislation.gov.hk/hk/cap112%21en%3Fxpid%3DID_1438402580829_001" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1008" instrument_node="">Section 17</span></a></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Payments for the benefits of spouses or partners</span></li></ul><h3 data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Step 3: Deduct &gt;unutilised&nbsp;losses</span></h3><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Losses can be deducted from either the company’s income in the same assessment year or can be deducted from income in the following assessment years. In order to be deductible, the losses must have been from business conducted in Hong Kong.</span></p><h3 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Step 4: Add balancing charges</span></h3><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">A balancing charge occurs when the sale of a capital asset is more than the written down value. To know what the balancing charges are, you must deduct the cost of the asset from the amount of capital allowances acquired.</span></p><h3 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Step 5: Deduct capital allowances</span></h3><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Capital allowances are the deductions that you can claim from the wear and tear on fixed assets such as land, buildings or equipment used to generate profit for your business. Tax deductions are available for capital expenditure sustained from the construction of buildings or structures and machinery and plant for trade or business purposes. The types of capital allowances are:</span></p><ul data-dcnode-id="975"><li data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">Commercial buildings and structures</span><ul data-dcnode-id="987"><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">An annual allowance of 4% of the capital expenditure sustained on construction is applied.</span></li></ul></li><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Industrial buildings and structures</span><ul data-dcnode-id="982"><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">An initial allowance of 20% in addition to the annual allowance of 4%.</span></li></ul></li><li data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">Plant and machinery</span><ul data-dcnode-id="977"><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">An initial allowance of 60% is available on the capital expenditure.</span></li></ul></li></ul><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Once all the listed deductions and additions have been completed, the company’s taxable income is made. One out of the two tax rates may be applied based on the suitability to determine the profits tax. The tax rate for corporations is 16.5% while the tax rate for unincorporated business is 15%.</span></p><h2 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Conclusion</span></h2><p data-dcnode-id="967"><span data-dcnode-id="970" instrument_node="">Hong Kong’s low tax rate and special tax regimes for small companies and startups has enticed many foreigners around the world to invest in Hong Kong. Whenever you need help or advice regarding Hong Kong taxation, don’t hesitate to contact&nbsp;</span><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Acclime.</span></strong></p></div><div class="uk-panel uk-hidden@m uk-margin" data-dcnode-id="343" id="template--Lkl946v#1-0-1-2" style="visibility: hidden;" uk-scrollspy-class=""><p data-dcnode-id="963" style="padding 10px;"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Share this article</span></strong></p><div class="elfsight-widget-social-share-buttons elfsight-widget eapps-social-share-buttons eapps-widget eapps-social-share-buttons-location-inline eapps-social-share-buttons-position-center eapps-social-share-buttons-text-hide eapps-social-share-buttons-shape-circle eapps-social-share-buttons-style-default eapps-social-share-buttons-icon-color-white eapps-social-share-buttons-bg-color-native eapps-social-share-buttons-icon-color-on-hover-white eapps-social-share-buttons-bg-color-on-hover-black eapps-social-share-buttons-animation-none" data-dcnode-id="344" data-elfsight-widget-id="elfsight-social-share-buttons-3" id="eapps-social-share-buttons-2"><div data-dcnode-id="348"><span data-dcnode-id="962" instrument_node="">
