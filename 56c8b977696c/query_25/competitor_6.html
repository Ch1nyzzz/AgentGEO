axsummaries.pwc.com/uganda/individual/tax-administration" value="f3b798bc-26bc-4f94-969e-157f5d3f503e">Tax administration</option></select><span class="select2 select2-container select2-container--default" data-dcnode-id="598" data-select2-id="7" dir="ltr" style="width: 456px;"><span class="selection" data-dcnode-id="600"><span aria-disabled="false" aria-expanded="false" aria-haspopup="true" aria-labelledby="select2-mobileTopicSelector-container" class="select2-selection select2-selection--single" data-dcnode-id="601" role="combobox" tabindex="0"><span aria-readonly="true" class="select2-selection__rendered" data-dcnode-id="604" id="select2-mobileTopicSelector-container" role="textbox" title="Deductions"><span data-dcnode-id="605" instrument_node="">Deductions</span></span><span class="select2-selection__arrow" data-dcnode-id="602" role="presentation"><b data-dcnode-id="603" role="presentation"></b></span></span></span><span aria-hidden="true" class="dropdown-wrapper" data-dcnode-id="599"></span></span><span data-dcnode-id="597" instrument_node="">

</span><h1 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Uganda</span></h1><span data-dcnode-id="587" instrument_node="">
</span><span data-dcnode-id="585" instrument_node="">
</span><header class="heading-grp" data-dcnode-id="577"><span data-dcnode-id="584" instrument_node="">
</span><h2 class="section__heading" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Corporate - Deductions</span></h2><span data-dcnode-id="581" instrument_node="">
</span><span class="date" data-dcnode-id="579" data-lastreviewed-text="Last reviewed" id="lastReviewedDate"><span data-dcnode-id="580" instrument_node="">Last reviewed - 21 January 2022</span></span><span data-dcnode-id="578" instrument_node="">
</span></header><span data-dcnode-id="576" instrument_node="">
</span><div class="mobile-wrapper" data-dcnode-id="291"><div class="section__content" data-dcnode-id="292" id="txtPageBody"><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The ITA sets out the following conditions for deductibility of an expense:</span></p><span data-dcnode-id="571" instrument_node="">
</span><ul data-dcnode-id="560"><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">There must be an expenditure or loss.</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">The expenditure or loss must be incurred by a person during the year of income.</span></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">The expenditure must be incurred in the production of income included in gross income.</span></li><span data-dcnode-id="561" instrument_node="">
</span></ul><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">A taxpayer who is accounting for tax purposes on an accrual basis derives income when it is receivable by the taxpayer and incurs expenditure when it is payable by the taxpayer.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">An amount is treated as payable by the taxpayer when all the events that determine liability have occurred and the amount of the liability can be determined with reasonable accuracy, but not before economic performance with respect to the amount occurs. Economic performance occurs:</span></p><span data-dcnode-id="553" instrument_node="">
</span><ul data-dcnode-id="542"><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">with respect to the acquisition of services or property, at the time the services or property are provided</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">with respect to the use of property, at the time the property is used, or</span></li><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">in any other case, at the time the taxpayer makes payment in full satisfaction of the liability.</span></li><span data-dcnode-id="543" instrument_node="">
</span></ul><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Contingent liabilities are not tax-deductible in Uganda.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h2 data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Depreciation</span></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">A deduction is allowed for the depreciation of the person’s depreciable assets, other than minor assets, in accordance with the appropriate applicable rates. The ITA allows a taxpayer a deduction for the depreciation of their depreciable assets on a reducing-balance basis. Depreciable assets are classified in three classes as follows:</span></p><span data-dcnode-id="532" instrument_node="">
</span><span data-dcnode-id="531" instrument_node="">
</span><span data-dcnode-id="530" instrument_node="">
</span><span data-dcnode-id="529" instrument_node="">
</span><span data-dcnode-id="526" instrument_node="">
</span><span data-dcnode-id="523" instrument_node="">
</span><span data-dcnode-id="520" instrument_node="">
</span><span data-dcnode-id="518" instrument_node="">
</span><span data-dcnode-id="516" instrument_node="">
</span><span data-dcnode-id="515" instrument_node="">
</span><span data-dcnode-id="514" instrument_node="">
</span><span data-dcnode-id="511" instrument_node="">
</span><span data-dcnode-id="508" instrument_node="">
</span><span data-dcnode-id="505" instrument_node="">
</span><span data-dcnode-id="503" instrument_node="">
</span><span data-dcnode-id="502" instrument_node="">
</span><span data-dcnode-id="499" instrument_node="">
</span><span data-dcnode-id="496" instrument_node="">
</span><span data-dcnode-id="493" instrument_node="">
</span><span data-dcnode-id="491" instrument_node="">
</span><span data-dcnode-id="490" instrument_node="">
</span><span data-dcnode-id="487" instrument_node="">
</span><span data-dcnode-id="484" instrument_node="">
</span><span data-dcnode-id="481" instrument_node="">
</span><span data-dcnode-id="479" instrument_node="">
</span><span data-dcnode-id="477" instrument_node="">
</span><table border="1" data-dcnode-id="476" width="100%"><thead data-dcnode-id="517"><tr data-dcnode-id="519" style="height: 30px;"><td class="tableheading" data-dcnode-id="527" style="height: 30px; text-align: left;"><span data-dcnode-id="528" instrument_node="">Class</span></td><td class="tableheading" data-dcnode-id="524" style="height: 30px;"><span data-dcnode-id="525" instrument_node="">Assets included</span></td><td class="tableheading" data-dcnode-id="521" style="height: 30px; text-align: right;"><span data-dcnode-id="522" instrument_node="">Rate of tax depreciation (%)</span></td></tr></thead><tbody data-dcnode-id="478"><tr data-dcnode-id="504" style="height: 14px;"><td data-dcnode-id="512" style="height: 14px; text-align: left;"><span data-dcnode-id="513" instrument_node="">1</span></td><td data-dcnode-id="509" style="height: 14px;"><span data-dcnode-id="510" instrument_node="">Computers and data handling equipment.</span></td><td data-dcnode-id="506" style="height: 14px; text-align: right;"><span data-dcnode-id="507" instrument_node="">40</span></td></tr><tr data-dcnode-id="492"><td data-dcnode-id="500" style="text-align: left;"><span data-dcnode-id="501" instrument_node="">2</span></td><td data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Plant and Machinery used in farming, manufacturing&nbsp;and mining&nbsp;</span></td><td data-dcnode-id="494" style="text-align: right;"><span data-dcnode-id="495" instrument_node="">30</span></td></tr><tr data-dcnode-id="480" style="height: 30px;"><td data-dcnode-id="488" style="height: 30px; text-align: left;"><span data-dcnode-id="489" instrument_node="">3</span></td><td data-dcnode-id="485" style="height: 30px;"><span data-dcnode-id="486" instrument_node="">Automobiles;buses, minibuses, goods and vehicles, construction and earth moving equipment, specialised trucks, tractors, trailers and trailer mounted containers, rail cars, locomotives, and equipment; vessels, barges, tugs, and similar water transportation equipment; aircraft; specialised public utility plant, equipment, and machinery; office furniture, fixtures, and equipment; and any depreciable&nbsp;asset not included in another class.</span></td><td data-dcnode-id="482" style="height: 30px; text-align: right;"><span data-dcnode-id="483" instrument_node="">20</span></td></tr></tbody></table><span data-dcnode-id="475" instrument_node="">
</span><h3 data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Industrial building allowance</span></h3><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">A company is eligible for an industrial building allowance on its industrial and commercial buildings at a tax rate of 5% </span><em data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">per annum</span></em><span data-dcnode-id="468" instrument_node=""> on a straight-line basis. The industrial building allowance will be granted on the actual cost incurred in constructing the buildings.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">An industrial building is defined to mean any building that is wholly or partly used, or held ready for use, by a person in manufacturing operations, research and development into improved or new methods of manufacture, mining operations, an approved hotel business, an approved hospital, or approved commercial buildings.</span></p><span data-dcnode-id="463" instrument_node="">
</span><h3 data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Initial allowance</span></h3><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">A person is allowed an initial allowance deduction at 50% of the cost base of plant and machinery wholly used in the production of income included in gross income. The initial allowance deduction is applicable to plant and property placed into service for the first time during a year of income outside a radius of 50 kilometres from Kampala.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Also, initial allowance is allowed on industrial buildings at 20% of the cost base of a new industrial building or extension of an industrial building on which construction was commenced on or after 1 July 2000 and placed into service for the first time during the year of income.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Initial allowances are granted in addition to the tax depreciation and industrial building allowance explained above. However, where initial allowance is granted, the standard depreciation allowance will be deferred for deduction to the subsequent year of income. Accordingly, 'double' deductions are no longer available in the same year of income in which initial allowance is granted.</span></p><span data-dcnode-id="451" instrument_node="">
</span><h2 data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Goodwill</span></h2><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">An intangible asset is amortisable over its useful life. To the extent that the useful life of the underlying asset that gives rise to goodwill can be determined, then the goodwill may be deductible over the useful life of the asset.</span></p><span data-dcnode-id="445" instrument_node="">
</span><h2 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Start-up expenses</span></h2><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="441" instrument_node="">A company setting up business for the first time or engaged in the initial public offer at the stock market will be entitled to a tax deduction for all its start-up costs that are of capital nature that would otherwise not be tax-deductible under the ordinary tax rules. The start-up costs will be allowed as tax-deductible costs over a period of four years on a straight-line basis at the rate of 25% </span><em data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">per annum</span></em><span data-dcnode-id="438" instrument_node="">.</span></p><span data-dcnode-id="436" instrument_node="">
</span><h2 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Interest expenses</span></h2><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Interest is deductible if the interest is incurred in respect of a debt obligation by the company in the production of income included in the company’s gross income. Interest arising from non-trade-related debt obligation is not deductible. Deferred interest is deductible when paid.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Interest charged before capital investment is put to use must be capitalised. Interest incurred after capital investment is put to use is allowed as a deduction.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The previous thin capitalisation rules were repealed and replaced by a provision that limits the deductibility of interest by a taxpayer who is a member of a group to 30% of the tax EBITDA. The excess interest can be carried forward for a maximum of three years. This interest limitation does not apply to financial institutions or a person carrying on insurance business.</span></p><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Bad debt</span></h2><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">A deduction is allowed for bad debt only if:</span></p><span data-dcnode-id="418" instrument_node="">
</span><ul data-dcnode-id="407"><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">the amount was included in the person’s income in the year of income</span></li><span data-dcnode-id="414" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">it is in respect of money that was lent in the ordinary course of business by a financial institution in the production of income, or</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">the amount of the debt claim was in respect of a loan granted to any person by a financial institution for the purpose of farming, forestry, fish farming, beekeeping, animal and poultry husbandry, or similar operations.</span></li><span data-dcnode-id="408" instrument_node="">
</span></ul><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">For the bad debt to be deductible, the taxpayer must demonstrate to the URA that reasonable steps to collect the debt were taken and that the taxpayer failed to recover the debt. In relation to a financial institution, it should be a debt in respect of which a loss reserve held against presently identified losses or potential losses, and which is therefore not available to meet losses that subsequently materialise, has been made.</span></p><span data-dcnode-id="403" instrument_node="">
</span><h2 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Charitable contributions</span></h2><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Charitable donations are deductible if made to amateur sporting associations; religious, charitable, or educational institutions whose object is not for profit; trade unions; and other similar associations that have been issued with a written ruling by the Commissioner currently in force stating that it is an exempt organisation. The donations should not exceed 5% of the person’s chargeable income.</span></p><span data-dcnode-id="397" instrument_node="">
</span><h2 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Meals, refreshments, and entertainment</span></h2><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Expenses for meals, refreshments, and entertainment are deductible only where the value is included in the employment income of the employees or is excluded from employment income owing to the fact that it is provided on equal terms to all workers.</span></p><span data-dcnode-id="391" instrument_node="">
</span><h2 data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Pension expenses</span></h2><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Employers are allowed a deduction for the contributions made to pension schemes on behalf of their employees. Employees, on the other hand, do not get a deduction for the contributions they make to pension funds.</span></p><span data-dcnode-id="385" instrument_node="">
</span><h2 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Payment for directors</span></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Directors are treated as employees, so expenses incurred in respect of directors are deductible expenses.</span></p><span data-dcnode-id="379" instrument_node="">
</span><h2 data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Bribes, kickbacks, illegal payments</span></h2><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Non-business expenses are not tax-deductible, including those of a private nature.</span></p><span data-dcnode-id="373" instrument_node="">
</span><h2 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Fines and penalties</span></h2><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">No deduction is allowed for any fine or similar penalty paid to a government or its sub-division for breach of any law.</span></p><span data-dcnode-id="367" instrument_node="">
</span><h2 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Taxes</span></h2><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">No deduction is allowed for income tax payable in Uganda or in a foreign country.</span></p><span data-dcnode-id="361" instrument_node="">
</span><h2 data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Other significant items</span></h2><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">No deduction is allowed for the following other expenditures:</span></p><span data-dcnode-id="355" instrument_node="">
</span><ul data-dcnode-id="326"><span data-dcnode-id="354" instrument_node="">
</span><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Any expenditure or loss of a domestic or private nature.</span></li><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Any expenditure or loss of a capital nature.</span></li><span data-dcnode-id="348" instrument_node="">
</span><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Any expenditure or loss recoverable under insurance contract or indemnity.</span></li><span data-dcnode-id="345" instrument_node="">
</span><li data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Any contribution or similar payment made to a retirement fund by the employee or for the benefit of any other person (e.g. National Social Security Fund [NSSF] contributions).</span></li><span data-dcnode-id="342" instrument_node="">
</span><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Any premium or similar payment made in respect of a life insurance policy for the life of the person paying the premium or on the life of some other person.</span></li><span data-dcnode-id="339" instrument_node="">
</span><li data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Any income appropriated to a reserve fund or capitalised in any way.</span></li><span data-dcnode-id="336" instrument_node="">
</span><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">The amount of pension paid to any person.</span></li><span data-dcnode-id="333" instrument_node="">
</span><li data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Deduction of expenses falling under the new EFRIS&nbsp;will only be allowed if supported by an e-invoice or e-receipt (effective from 1 January 2021).</span></li><span data-dcnode-id="330" instrument_node="">
</span><li data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Any expenditure above UGX&nbsp;5 million shillings in one transaction on goods and services from a supplier who does not have a taxpayer identification number.</span></li><span data-dcnode-id="327" instrument_node="">
</span></ul><span data-dcnode-id="325" instrument_node="">
</span><h2 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Net operating losses</span></h2><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">A deduction is allowed for any assessed tax losses carried forward from previous years of income. Such tax losses are carried forward and deducted against future taxable profit of the business in the subsequent years of income. The losses can be carried forward indefinitely. There is no ring-fencing of losses except in the following circumstances:</span></p><span data-dcnode-id="319" instrument_node="">
</span><ul data-dcnode-id="302"><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="307"><span data-dcnode-id="317" instrument_node="">Where, during a year of income, there has been a change of 50% or more in the underlying ownership of a company, as compared with its ownership one year previously, the company is not permitted to deduct an assessed loss in the year of income or in subsequent years, unless the company, for a period of two years after the change or until the assessed loss has been exhausted if that occurs within two years after the change,:
</span><ul data-dcnode-id="309"><span data-dcnode-id="316" instrument_node="">
</span><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">continues to carry on the same business after the change as it carried on before the change and</span></li><span data-dcnode-id="313" instrument_node="">
</span><li data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">does not engage in any new business or investment after the change where the primary purpose of the company or the beneficial owners of the company is to utilise the assessed loss so as to reduce the tax payable on the income arising from the new business or investment.</span></li><span data-dcnode-id="310" instrument_node="">
</span></ul><span data-dcnode-id="308" instrument_node="">
</span></li><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">In cases where losses relate to farming, the assessed farming loss can only be deducted from farming income of the taxpayer in the following year and not from any other income.</span></li><span data-dcnode-id="303" instrument_node="">
</span></ul><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">There is no provision for carryback of losses in Uganda.</span></p><span data-dcnode-id="298" instrument_node="">
</span><h2 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Payments to foreign affiliates</span></h2><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Payments to foreign affiliates are deductible as long as they are charged at an arm's length and incurred in the production of income.</span></p></div></div><span data-dcnode-id="290" instrument_node="">
</span><span data-dcnode-id="288" instrument_node="">
