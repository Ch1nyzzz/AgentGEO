What follows is an overview of the </span><a data-component="link" data-dcnode-id="2603" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/taxes/trumps-tax-reform-plan-explained/"><span data-dcnode-id="2604" instrument_node="">Tax Cuts and Jobs Act</span></a><span data-dcnode-id="2602" instrument_node=""> (TCJA) and some changes you can expect to affect your taxes in the near term. We also give an overview of some much-discussed proposals that didn't happen. While this guide is not an exhaustive list of every change to the tax code, it does cover the key elements&nbsp;that will affect the most people.&nbsp;
</span></p><span data-dcnode-id="2600" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2599" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="2598" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2593" id="mntl-sc-block_1-0-2"><span data-dcnode-id="2597" instrument_node="">
How the tax bill affects you depends on your personal situation: how many children you have, how much you pay in mortgage interest and </span><a data-component="link" data-dcnode-id="2595" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/salt-5180146"><span data-dcnode-id="2596" instrument_node="">state/local&nbsp;taxes</span></a><span data-dcnode-id="2594" instrument_node="">, how much you earn from work, and more.
</span></p><span data-dcnode-id="2592" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2591" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="2590" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2570" id="mntl-sc-block_1-0-4"><span data-dcnode-id="2589" instrument_node="">
</span><div class="comp theme-whatyouneedtoknow mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="2572" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-5"><span data-dcnode-id="2588" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2586" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="2587" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="2585" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2574" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="2584" instrument_node="">
</span><ul data-dcnode-id="2575"><li data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">The Tax Cuts and Jobs Act took effect on Jan. 1, 2018, and will substantially impact taxpayers through 2025.</span></li><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">The nearly 200-page Act extensively changes the tax code for institutions and American citizens with a focus on cutting individual, corporate, and estate tax rates.</span></li><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Nearly everyone in America is affected by the tax changes, but the effects you feel will depend on your personal and business situations.</span></li><li data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Understanding this tax law and how it may affect your circumstances can alleviate uncertainty in tax planning and filing.</span></li></ul></div><span data-dcnode-id="2573" instrument_node="">
</span></div><span data-dcnode-id="2571" instrument_node="">
</span></div><span data-dcnode-id="2569" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2568" id="toc-passing-the-tax-cuts-and-jobs-act"></span><span data-dcnode-id="2567" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2562" id="mntl-sc-block_1-0-6"><span data-dcnode-id="2566" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node=""> Passing the Tax Cuts and Jobs Act </span></span><span data-dcnode-id="2563" instrument_node=""> </span></h2><span data-dcnode-id="2561" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2559" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2560" instrument_node="">
On Dec. 22, 2017, former President Donald Trump signed a massive tax bill known as the Tax Cuts and Jobs Act (TCJA). As its name implies, it cut individual, corporate, and estate tax rates.
</span></p><span data-dcnode-id="2558" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2557" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="2556" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2554" id="mntl-sc-block_1-0-9"><span data-dcnode-id="2555" instrument_node="">
The lower corporate tax rate is one of the key components of the Act. This cut is said to be a major factor for corporate profits and job creation. The Act went in the record books as “An Act to provide for reconciliation pursuant to titles II and V of the concurrent resolution on the budget for the fiscal year 2018."
</span></p><span data-dcnode-id="2553" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2545" id="mntl-sc-block_1-0-10"><div class="comp native mntl-native" data-dcnode-id="2546" data-right-rail-index="3" id="native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="2552" instrument_node="">
</span><div class="comp mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic is-requested" data-dcnode-id="2548" id="mntl-native__adunit_1-0"><span data-dcnode-id="2551" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2550" data-pos="native" data-priority="4" data-rtb="false" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="2549" instrument_node="">
</span></div><span data-dcnode-id="2547" instrument_node="">
</span></div></div><span data-dcnode-id="2544" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2538" id="mntl-sc-block_1-0-11"><span data-dcnode-id="2543" instrument_node="">
The final bill is approximately 200 pages&nbsp;and the ultimate effects on Americans and the economy continue to play out and will be enforced from Jan. 1, 2018 through 2025. Meanwhile, a number of its effects were clear immediately.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2540" data-id="#citation-2"><span data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">1</span></span></span><span data-dcnode-id="2539" instrument_node="">
</span></p><span data-dcnode-id="2537" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2536" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="2535" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2534" id="toc-you-own-a-home"></span><span data-dcnode-id="2533" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2528" id="mntl-sc-block_1-0-13"><span data-dcnode-id="2532" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node=""> You Own a Home </span></span><span data-dcnode-id="2529" instrument_node=""> </span></h2><span data-dcnode-id="2527" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2515" id="mntl-sc-block_1-0-14"><span data-dcnode-id="2526" instrument_node="">
If you live in an area with high </span><a data-component="link" data-dcnode-id="2524" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/09/calculate-property-tax.asp"><span data-dcnode-id="2525" instrument_node="">property taxes</span></a><span data-dcnode-id="2523" instrument_node="">, you will be affected by the new $10,000 limit on how much state and local tax&nbsp;(including property taxes) you can deduct from your federal income taxes (</span><a data-component="link" data-dcnode-id="2521" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/exemptincome.asp"><span data-dcnode-id="2522" instrument_node="">exempted</span></a><span data-dcnode-id="2520" instrument_node="">: taxes that are paid or accrued through doing a business or trade). You can find more details below.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2517" data-id="#citation-4"><span data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">2</span></span></span><span data-dcnode-id="2516" instrument_node="">
</span></p><span data-dcnode-id="2514" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2513" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="2512" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2510" id="mntl-sc-block_1-0-16"><span data-dcnode-id="2511" instrument_node="">
Fewer people will itemize, though, since the standard deduction nearly doubled. The figures are adjusted annually:
</span></p><span data-dcnode-id="2509" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2508" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="2507" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2494" id="mntl-sc-block_1-0-18"><span data-dcnode-id="2506" instrument_node="">
</span><li data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node="">For 2021, the standard deduction is $12,550 for single taxpayers and $25,100 for married couples filing jointly.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2502" data-id="#citation-65"><span data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">3</span></span></span></li><li data-dcnode-id="2496"><span data-dcnode-id="2500" instrument_node="">For 2022, the standard deduction is $12,950 for single taxpayers and $25,900 for married couples filing jointly.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2497" data-id="#citation-69"><span data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">4</span></span></span></li><span data-dcnode-id="2495" instrument_node="">
</span></ul><span data-dcnode-id="2493" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2492" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="2491" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2482" id="mntl-sc-block_1-0-20"><span data-dcnode-id="2490" instrument_node="">
Homeowners also won’t be able to deduct the interest on&nbsp;</span><a data-component="link" data-dcnode-id="2488" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/h/homeequityloan.asp"><span data-dcnode-id="2489" instrument_node="">home equity loans</span></a><span data-dcnode-id="2487" instrument_node="">, whether they itemize or not.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2484" data-id="#citation-2"><span data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">1</span></span></span><span data-dcnode-id="2483" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="2481" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2480" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="2479" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2478" id="toc-youre-buying-or-selling-a-home"></span><span data-dcnode-id="2477" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2472" id="mntl-sc-block_1-0-22"><span data-dcnode-id="2476" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node=""> You're Buying (or Selling) a Home </span></span><span data-dcnode-id="2473" instrument_node=""> </span></h2><span data-dcnode-id="2471" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2465" id="mntl-sc-block_1-0-23"><span data-dcnode-id="2470" instrument_node="">
Under prior law, homeowners could deduct the interest on a mortgage of up to $1,000,000, or $500,000 for married taxpayers filing separately. Now, anyone who takes out a mortgage between Dec. 15, 2017, and Dec. 31, 2025, can only deduct interest on a mortgage of up to $750,000, or $375,000 for married taxpayers filing separately.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2467" data-id="#citation-84"><span data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">5</span></span></span><span data-dcnode-id="2466" instrument_node="">
</span></p><span data-dcnode-id="2464" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2463" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="2462" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2457" id="mntl-sc-block_1-0-25"><span data-dcnode-id="2461" instrument_node="">
For buyers in expensive markets, these </span><a data-component="link" data-dcnode-id="2459" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/10/concise-history-tax-changes.asp"><span data-dcnode-id="2460" instrument_node="">tax code changes</span></a><span data-dcnode-id="2458" instrument_node=""> could make homeownership less affordable. For most people, the difference between owning and renting, from a tax standpoint, is now much smaller.
</span></p><span data-dcnode-id="2456" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2455" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="2454" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2453" id="toc-itemizing-your-deductions"></span><span data-dcnode-id="2452" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2447" id="mntl-sc-block_1-0-27"><span data-dcnode-id="2451" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node=""> Itemizing Your Deductions </span></span><span data-dcnode-id="2448" instrument_node=""> </span></h2><span data-dcnode-id="2446" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2441" id="mntl-sc-block_1-0-28"><span data-dcnode-id="2445" instrument_node="">
As already discussed, the standard </span><a data-component="link" data-dcnode-id="2443" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/09/overlooked-tax-deductions.asp"><span data-dcnode-id="2444" instrument_node="">deduction</span></a><span data-dcnode-id="2442" instrument_node=""> has nearly doubled.
</span></p><span data-dcnode-id="2440" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2439" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="2438" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2436" id="mntl-sc-block_1-0-30"><span data-dcnode-id="2437" instrument_node="">
This means many households that used to itemize their deductions using Schedule A will now take the standard deduction instead, simplifying tax preparation for Americans. Not filing Schedule A&nbsp;means less record-keeping and less tax-prep time.
</span></p><span data-dcnode-id="2435" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2434" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="2433" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2428" id="mntl-sc-block_1-0-32"><span data-dcnode-id="2432" instrument_node="">
Taxpayers who continue to </span><a data-component="link" data-dcnode-id="2430" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/taxes/08/itemized-deductions-overview.asp"><span data-dcnode-id="2431" instrument_node="">itemize</span></a><span data-dcnode-id="2429" instrument_node=""> need to be aware of changes to many Schedule A items. And those changes include the elimination of many previous deductions.
</span></p><span data-dcnode-id="2427" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2426" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="2425" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2424" id="toc-casualty-and-theft-losses"></span><span data-dcnode-id="2423" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2418" id="mntl-sc-block_1-0-34"><span data-dcnode-id="2422" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node=""> Casualty and Theft Losses </span></span><span data-dcnode-id="2419" instrument_node=""> </span></h2><span data-dcnode-id="2417" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2411" id="mntl-sc-block_1-0-35"><span data-dcnode-id="2416" instrument_node="">
These items are no longer tax deductible unless they are related to a loss in a federally declared disaster area; think hurricanes, floods, and wildfire victims.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2413" data-id="#citation-2"><span data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">1</span></span></span><span data-dcnode-id="2412" instrument_node="">
</span></p><span data-dcnode-id="2410" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2409" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="2408" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2407" id="toc-medical-expenses"></span><span data-dcnode-id="2406" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2401" id="mntl-sc-block_1-0-37"><span data-dcnode-id="2405" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node=""> Medical Expenses </span></span><span data-dcnode-id="2402" instrument_node=""> </span></h2><span data-dcnode-id="2400" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2394" id="mntl-sc-block_1-0-38"><span data-dcnode-id="2399" instrument_node="">
For the tax year 2021, the threshold for deducting medical expenses is 7.5%.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2396" data-id="#citation-70"><span data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">6</span></span></span><span data-dcnode-id="2395" instrument_node="">
</span></p><span data-dcnode-id="2393" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2392" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="2391" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2389" id="mntl-sc-block_1-0-40"><span data-dcnode-id="2390" instrument_node="">
If your adjusted gross income is $50,000, you’ll be able to deduct medical expenses that exceed $3,750. So if you paid $5,000 in medical expenses and you’re itemizing using Schedule A, you will be eligible&nbsp;to deduct $1,250 of your $5,000 in medical expenses.&nbsp;
</span></p><span data-dcnode-id="2388" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2387" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="2386" instrument_node="">

Taxpayers can deduct a maximum of $10,000 from the total of their state and local income taxes or sales taxes, and their&nbsp;property taxes (added together). This measure might&nbsp;hurt itemizers in high-tax states such as California, New York, and New Jersey.
</span></p><span data-dcnode-id="2375" instrument_node="">

The </span><a data-component="link" data-dcnode-id="2333" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/personal-finance/031615/how-do-tax-exemptions-work-your-favor.asp"><span data-dcnode-id="2334" instrument_node="">exemption</span></a><span data-dcnode-id="2332" instrument_node=""> amount for the 2017 tax year was $4,050 each for individuals, spouses, and dependents.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2329" data-id="#citation-16"><span data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">8</span></span></span><span data-dcnode-id="2328" instrument_node=""> As a deduction, it helped to lower your taxable income. That exemption goes to zero until 2025.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2325" data-id="#citation-83"><span data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">7</span></span></span><span data-dcnode-id="2324" instrument_node="">

</span></p><span data-dcnode-id="2310" instrument_node="">

</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2303" id="mntl-sc-block_1-0-55"><span data-dcnode-id="2307" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node=""> Single, With No Children&nbsp; </span></span><span data-dcnode-id="2304" instrument_node=""> </span></h3><span data-dcnode-id="2302" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2287" id="mntl-sc-block_1-0-56"><span data-dcnode-id="2301" instrument_node="">
</span><li data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Standard deduction increases from $6,350 to $12,550</span></li><li data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Personal exemptions decrease from $4,050 to $0</span></li><li data-dcnode-id="2293"><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Old tax break:</span></em><span data-dcnode-id="2294" instrument_node="">&nbsp;$10,400</span></li><li data-dcnode-id="2289"><em data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">New tax break:&nbsp;</span></em><span data-dcnode-id="2290" instrument_node="">$12,550</span></li><span data-dcnode-id="2288" instrument_node="">
</span></ul><span data-dcnode-id="2286" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2285" id="mntl-sc-block_1-0-57"></div><span data-dcnode-id="2284" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2279" id="mntl-sc-block_1-0-58"><span data-dcnode-id="2283" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node=""> Married Filing Jointly, With No Children </span></span><span data-dcnode-id="2280" instrument_node=""> </span></h3><span data-dcnode-id="2278" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2263" id="mntl-sc-block_1-0-59"><span data-dcnode-id="2277" instrument_node="">
</span><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Standard deduction increases from $12,700 to $25,100</span></li><li data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Personal exemptions decrease from $8,100 to $0</span></li><li data-dcnode-id="2269"><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Old tax break:</span></em><span data-dcnode-id="2270" instrument_node="">&nbsp;$20,800</span></li><li data-dcnode-id="2265"><em data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">New tax break:</span></em><span data-dcnode-id="2266" instrument_node="">&nbsp;$25,100</span></li><span data-dcnode-id="2264" instrument_node="">
</span></ul><span data-dcnode-id="2262" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2261" id="mntl-sc-block_1-0-60"></div><span data-dcnode-id="2260" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2255" id="mntl-sc-block_1-0-61"><span data-dcnode-id="2259" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node=""> Married Filing Jointly, With Two&nbsp;Children </span></span><span data-dcnode-id="2256" instrument_node=""> </span></h3><span data-dcnode-id="2254" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2239" id="mntl-sc-block_1-0-62"><span data-dcnode-id="2253" instrument_node="">
</span><li data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Standard deduction increases from $12,700 to $25,100</span></li><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Personal exemptions decrease from $16,200 to $0</span></li><li data-dcnode-id="2245"><em data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Old tax break:</span></em><span data-dcnode-id="2246" instrument_node="">&nbsp;$30,900</span></li><li data-dcnode-id="2241"><em data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">New tax break:</span></em><span data-dcnode-id="2242" instrument_node="">&nbsp;$25,100</span></li><span data-dcnode-id="2240" instrument_node="">
</span></ul><span data-dcnode-id="2238" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2237" id="mntl-sc-block_1-0-63"></div><span data-dcnode-id="2236" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2234" id="mntl-sc-block_1-0-64"><span data-dcnode-id="2235" instrument_node="">
For those married people with children, there is another offset, an increase in the child tax credit.
</span></p><span data-dcnode-id="2233" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2232" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="2231" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2230" id="toc-child-tax-credit"></span><span data-dcnode-id="2229" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2224" id="mntl-sc-block_1-0-66"><span data-dcnode-id="2228" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node=""> Child Tax Credit </span></span><span data-dcnode-id="2225" instrument_node=""> </span></h2><span data-dcnode-id="2223" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2218" id="mntl-sc-block_1-0-67"><span data-dcnode-id="2222" instrument_node="">
The TCJA increased the child </span><a data-component="link" data-dcnode-id="2220" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/08/tax-credit.asp"><span data-dcnode-id="2221" instrument_node="">tax credit</span></a><span data-dcnode-id="2219" instrument_node=""> from $1,000 to $2,000 per child under age 17. It’s also refundable up to $1,400, which means that even if you don’t owe tax because your income is too low, you can still get a partial child tax credit. The TCJA also makes the tax credit more widely available to the middle and upper classes.
</span></p><span data-dcnode-id="2217" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2216" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="2215" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2206" id="mntl-sc-block_1-0-69"><span data-dcnode-id="2214" instrument_node="">
In 2017, single parents couldn’t claim the full credit if they earned more than $75,000 and married parents couldn’t claim it if they earned more than $110,000. With the TCJA, those thresholds increase to $200,000 and $400,000 through 2025.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2211" data-id="#citation-2"><span data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">1</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2208" data-id="#citation-17"><span data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">10</span></span></span><span data-dcnode-id="2207" instrument_node="">
</span></p><span data-dcnode-id="2205" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2204" id="mntl-sc-block_1-0-70"></div><span data-dcnode-id="2203" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2201" id="mntl-sc-block_1-0-71"><span data-dcnode-id="2202" instrument_node="">
As for age, the prior law&nbsp;applied to children under the age of 17. The tax bill doesn't change the age threshold for the child tax credit, but it does change the situation for undocumented immigrant parents.
</span></p><span data-dcnode-id="2200" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2199" id="mntl-sc-block_1-0-72"></div><span data-dcnode-id="2198" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2192" id="mntl-sc-block_1-0-73"><span data-dcnode-id="2197" instrument_node="">
Under the previous&nbsp;law, undocumented immigrants who filed taxes using an individual taxpayer identification number could&nbsp;claim the child tax credit. The new law requires parents to provide the Social Security number (SSN) for each child they’re claiming the credit for, a move that seems designed to prevent even undocumented immigrants who pay taxes from claiming the credit.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2194" data-id="#citation-86"><span data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">11</span></span></span><span data-dcnode-id="2193" instrument_node="">
</span></p><span data-dcnode-id="2191" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2190" id="mntl-sc-block_1-0-74"></div><span data-dcnode-id="2189" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2188" id="toc-using-529-plans-for-school"></span><span data-dcnode-id="2187" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2182" id="mntl-sc-block_1-0-75"><span data-dcnode-id="2186" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node=""> Using 529 Plans for School </span></span><span data-dcnode-id="2183" instrument_node=""> </span></h2><span data-dcnode-id="2181" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2175" id="mntl-sc-block_1-0-76"><span data-dcnode-id="2180" instrument_node="">
One big change: 529 plans&nbsp;have been expanded.&nbsp;In addition to using them to fund college expenses,&nbsp;parents may now use $10,000 per year from 529 accounts tax-free&nbsp;to pay for K-12 education tuition at the public, private, or religious institution of choice.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2177" data-id="#citation-87"><span data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">12</span></span></span><span data-dcnode-id="2176" instrument_node="">
</span></p><span data-dcnode-id="2174" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2173" id="mntl-sc-block_1-0-77"></div><span data-dcnode-id="2172" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2167" id="mntl-sc-block_1-0-78"><span data-dcnode-id="2171" instrument_node="">
An important point to note for those with 529 plans. The rules were expanded even further after the passing of the </span><a data-component="link" data-dcnode-id="2169" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/secure-act-4688468"><span data-dcnode-id="2170" instrument_node="">Setting Every Community Up for Retirement Enhancement Act</span></a><span data-dcnode-id="2168" instrument_node="">—also referred to as the SECURE Act. Signed in December 2019, the bill allows 529 account holders to withdraw funds to pay expenses related to a beneficiary's apprenticeship. In order to qualify, the program must be registered with the Department of Labor.
</span></p><span data-dcnode-id="2166" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2165" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="2164" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2158" id="mntl-sc-block_1-0-80"><span data-dcnode-id="2163" instrument_node="">
Another addition to the 529 plan is the ability to use funds to pay down student debt. Under Section 302, a plan holder can withdraw a maximum lifetime of $10,000 to pay down a qualified education loan for a beneficiary or their sibling. These withdrawals are tax- and penalty-free at the federal level but may count as nonqualified distributions under state tax laws.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2160" data-id="#citation-19"><span data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">13</span></span></span><span data-dcnode-id="2159" instrument_node="">
</span></p><span data-dcnode-id="2157" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2156" id="mntl-sc-block_1-0-81"></div><span data-dcnode-id="2155" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2154" id="toc-elderly-dependents-or-children-over-17"></span><span data-dcnode-id="2153" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2148" id="mntl-sc-block_1-0-82"><span data-dcnode-id="2152" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node=""> Elderly Dependents or Children Over 17 </span></span><span data-dcnode-id="2149" instrument_node=""> </span></h2><span data-dcnode-id="2147" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2141" id="mntl-sc-block_1-0-83"><span data-dcnode-id="2146" instrument_node="">
For dependents who don’t qualify for the child tax credit, such as college-aged children and dependent parents, taxpayers can claim a nonrefundable $500 credit, subject to the same income limits as the new child tax credit (explained in the "Children Under 17"&nbsp;section, above).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2143" data-id="#citation-2"><span data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">1</span></span></span><span data-dcnode-id="2142" instrument_node=""> Caregivers have lost two benefits under the new law.
</span></p><span data-dcnode-id="2140" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2139" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="2138" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2122" id="mntl-sc-block_1-0-85"><span data-dcnode-id="2137" instrument_node="">

</span><p data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node="">The American Rescue Plan of 2021 reduces the cost of Marketplace plans, increases the tax credits for many Americans, and expands eligibility for the tax credits starting April 1, 2021. The average Marketplace user will pay $85 less every month per policy.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2081" data-id="#citation-68"><span data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">17</span></span></span></p></div><span data-dcnode-id="2078" instrument_node="">

The Republicans got their wish to see the individual health insurance mandate penalty repealed. This change means that people who don’t buy health insurance will not&nbsp;have to pay a fine to the Internal Revenue Service (IRS).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2070" data-id="#citation-2"><span data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">1</span></span></span><span data-dcnode-id="2069" instrument_node="">

Federal and private student loan debt discharged from death or disability will not be taxed from 2018 through 2025. This change will be a big help to unfortunate families. However, the law does not require private lenders to discharge the debt in the event of a death or disability.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2053" data-id="#citation-87"><span data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">12</span></span></span><span data-dcnode-id="2052" instrument_node="">

Let's say you’re married and you have $30,000 in student loan debt. Under the old law, if you died or became permanently disabled and your lender discharged your debt, reducing it to zero, you or your estate would&nbsp;receive an income tax bill on that $30,000.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2044" data-id="#citation-26"><span data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">18</span></span></span><span data-dcnode-id="2043" instrument_node=""> If your marginal tax rate was 25%, your heirs or survivors&nbsp;would owe $7,500 in taxes. The TCJA </span><a data-component="link" data-dcnode-id="2041" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/taxes/12/start-over-with-irs.asp"><span data-dcnode-id="2042" instrument_node="">tax reform</span></a><span data-dcnode-id="2040" instrument_node=""> eliminates that burden.
</span></p><span data-dcnode-id="2038" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2037" id="mntl-sc-block_1-0-100"></div><span data-dcnode-id="2036" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2035" id="toc-12-million-estate-tax-relief"></span><span data-dcnode-id="2034" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2029" id="mntl-sc-block_1-0-101"><span data-dcnode-id="2033" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node=""> $12 Million Estate Tax Relief </span></span><span data-dcnode-id="2030" instrument_node=""> </span></h2><span data-dcnode-id="2028" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2026" id="mntl-sc-block_1-0-102"><span data-dcnode-id="2027" instrument_node="">
The old&nbsp;federal estate-tax exemption thresholds were $5.49 million for individuals. If one&nbsp;died with assets worth less than those amounts, no estate tax was owed.
</span></p><span data-dcnode-id="2025" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2024" id="mntl-sc-block_1-0-103"></div><span data-dcnode-id="2023" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2014" id="mntl-sc-block_1-0-104"><span data-dcnode-id="2022" instrument_node="">
From 2018 through 2025, the thresholds double to over $12 million for individuals.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2019" data-id="#citation-87"><span data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">12</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2016" data-id="#citation-27"><span data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">19</span></span></span><span data-dcnode-id="2015" instrument_node="">
</span></p><span data-dcnode-id="2013" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2012" id="mntl-sc-block_1-0-105"></div><span data-dcnode-id="2011" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2002" id="mntl-sc-block_1-0-106"><span data-dcnode-id="2010" instrument_node="">
The top </span><a data-component="link" data-dcnode-id="2008" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/personal-finance/120715/estate-taxes-who-pays-what-and-how-much.asp"><span data-dcnode-id="2009" instrument_node="">estate-tax</span></a><span data-dcnode-id="2007" instrument_node=""> rate remains 40%. The estate tax uses a bracketed system with increasing marginal rates, just like the individual income tax does. It starts at 18% but escalates quickly. Once your taxable estate—the amount beyond the exemption—reaches six figures, you’re already in the 28% bracket.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2004" data-id="#citation-28"><span data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">20</span></span></span><span data-dcnode-id="2003" instrument_node="">
</span></p><span data-dcnode-id="2001" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2000" id="mntl-sc-block_1-0-107"></div><span data-dcnode-id="1999" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1998" id="toc-changes-in-the-tax-bracket"></span><span data-dcnode-id="1997" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1992" id="mntl-sc-block_1-0-108"><span data-dcnode-id="1996" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node=""> Changes in the Tax Bracket </span></span><span data-dcnode-id="1993" instrument_node=""> </span></h2><span data-dcnode-id="1991" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1989" id="mntl-sc-block_1-0-109"><span data-dcnode-id="1990" instrument_node="">
Tax rates are changing through 2025 across the income spectrum. In 2026, the changes will expire and 2017 rates will return, absent further legislation. The individual cuts were not made permanent. Here's the reason: their effect on increasing the budget deficit.&nbsp;
</span></p><span data-dcnode-id="1988" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1987" id="mntl-sc-block_1-0-110"></div><span data-dcnode-id="1986" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="1971" id="mntl-sc-block_1-0-111"><span data-dcnode-id="1985" instrument_node="">
</span><div class="comp theme-important mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1973" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-112"><span data-dcnode-id="1984" instrument_node="">

</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1975" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">The TCJA has lowered tax rates across income tax brackets with income levels adjusted annually based on the Chained Consumer Price Index for All Urban Consumers.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1977" data-id="#citation-87"><span data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">12</span></span></span></p></div><span data-dcnode-id="1974" instrument_node="">
</span></div><span data-dcnode-id="1972" instrument_node="">
</span></div><span data-dcnode-id="1970" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1964" id="mntl-sc-block_1-0-113"><span data-dcnode-id="1969" instrument_node="">
The nonpartisan&nbsp;Tax Policy Center&nbsp;projects that everyone, on average, will save money from the tax-bracket changes. The top 95% to 99% are the biggest winners, with an average tax cut of about 3.4% while the top 1% will see an average tax cut of about 2.2%. On average, households in 2018 should receive a 1.7% increase in after-tax incomes.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1966" data-id="#citation-90"><span data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">21</span></span></span><span data-dcnode-id="1965" instrument_node="">
</span></p><span data-dcnode-id="1963" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1962" id="mntl-sc-block_1-0-114"></div><span data-dcnode-id="1961" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1956" id="mntl-sc-block_1-0-115"><span data-dcnode-id="1960" instrument_node="">
The new tax brackets eliminate the&nbsp;</span><a data-component="link" data-dcnode-id="1958" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/marriage-penalty.asp"><span data-dcnode-id="1959" instrument_node="">marriage penalty</span></a><span data-dcnode-id="1957" instrument_node="">. The income brackets that apply to each marginal tax rate for married couples filing jointly are exactly double those for singles. Previously, some couples found themselves in a higher tax bracket after marriage.
</span></p><span data-dcnode-id="1955" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1954" id="mntl-sc-block_1-0-116"></div><span data-dcnode-id="1953" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1951" id="mntl-sc-block_1-0-117"><span data-dcnode-id="1952" instrument_node="">
Read on to see how the changes will affect your bracket. Note that there is some overlap among where people fit in the income spectrum. Also, note that income tax rates will remain through 2025 but qualifying income brackets will be adjusted annually for inflation.
</span></p><span data-dcnode-id="1950" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1949" id="mntl-sc-block_1-0-118"></div><span data-dcnode-id="1948" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1939" id="mntl-sc-block_1-0-119"><span data-dcnode-id="1947" instrument_node="">
The tax bill also changes how tax brackets are increased for inflation. They are now indexed to a slower inflation measure called the </span><a data-component="link" data-dcnode-id="1945" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/cpiu.asp"><span data-dcnode-id="1946" instrument_node="">Chained Consumer Price Index for All Urban Consumers</span></a><span data-dcnode-id="1944" instrument_node=""> (CPI-U).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1941" data-id="#citation-87"><span data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">12</span></span></span><span data-dcnode-id="1940" instrument_node="">
</span></p><span data-dcnode-id="1938" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1937" id="mntl-sc-block_1-0-120"></div><span data-dcnode-id="1936" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1922" id="mntl-sc-block_1-0-122"><span data-dcnode-id="1927" instrument_node="">
The Tax Policy Center’s analysis shows that the biggest benefits will go to households earning $308,000 to $733,000. And those who earn more than $733,000 can expect a $33,000 tax cut.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1924" data-id="#citation-77"><span data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">22</span></span></span><span data-dcnode-id="1923" instrument_node="">
</span></p><span data-dcnode-id="1921" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1920" id="mntl-sc-block_1-0-123"></div><span data-dcnode-id="1919" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1910" id="mntl-sc-block_1-0-124"><span data-dcnode-id="1918" instrument_node="">
Note that the top 25% paid nearly 86% of all the </span><a data-component="link" data-dcnode-id="1916" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/taxes/08/owe-nothing-federal-tax-return.asp"><span data-dcnode-id="1917" instrument_node="">federal income tax</span></a><span data-dcnode-id="1915" instrument_node=""> the government collects, according to the Tax Foundation. The top 1% pay more than 37% of it, and the top 0.1% pay even less.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1912" data-id="#citation-34"><span data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">23</span></span></span><span data-dcnode-id="1911" instrument_node="">
</span></p><span data-dcnode-id="1909" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1908" id="mntl-sc-block_1-0-125"></div><span data-dcnode-id="1907" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1905" id="mntl-sc-block_1-0-126"><span data-dcnode-id="1906" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1744" id="mntl-sc-block_1-0-150"><span data-dcnode-id="1751" instrument_node="">
A </span><a data-component="link" data-dcnode-id="1749" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/flow-through.asp"><span data-dcnode-id="1750" instrument_node="">pass-through</span></a><span data-dcnode-id="1748" instrument_node=""> business pays taxes through the individual income tax code rather than through the corporate tax code. Sole proprietorships, S corporations, partnerships, and </span><a data-component="link" data-dcnode-id="1746" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/llc.asp"><span data-dcnode-id="1747" instrument_node="">limited liability companies</span></a><span data-dcnode-id="1745" instrument_node=""> (LLCs) are all pass-through businesses, while C corporations are not.
</span></p><span data-dcnode-id="1743" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1742" id="mntl-sc-block_1-0-151"></div><span data-dcnode-id="1741" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1732" id="mntl-sc-block_1-0-152"><span data-dcnode-id="1740" instrument_node="">
Under the new tax code, pass-through business owners are able to deduct 20% of their business income, which will lower their tax liability. However, professional-services business owners such as lawyers, doctors, and consultants filing as single and earning more than $157,500 or filing jointly and earning more than $315,000 face a phase-out and a cap on their </span><a data-component="link" data-dcnode-id="1738" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/deduction.asp"><span data-dcnode-id="1739" instrument_node="">deduction</span></a><span data-dcnode-id="1737" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1734" data-id="#citation-79"><span data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">28</span></span></span><span data-dcnode-id="1733" instrument_node="">
</span></p><span data-dcnode-id="1731" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1730" id="mntl-sc-block_1-0-153"></div><span data-dcnode-id="1729" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1727" id="mntl-sc-block_1-0-154"><span data-dcnode-id="1728" instrument_node="">
Other types of businesses that surpass these earnings thresholds will see their deduction limited to the higher of 50% of total wages paid or 25% of total wages paid plus 2.5% of the cost of tangible depreciable property, such as real estate. Independent contractors and small business owners will benefit from the pass-through deduction, as will large businesses that are structured as pass-through entities, such as certain hedge funds, investment firms, manufacturers, and real estate companies.&nbsp;
</span></p><span data-dcnode-id="1726" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1725" id="mntl-sc-block_1-0-155"></div><span data-dcnode-id="1724" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1715" id="mntl-sc-block_1-0-156"><span data-dcnode-id="1723" instrument_node="">
Both pass-through and corporate business owners will be able to write off 100% of the </span><a data-component="link" data-dcnode-id="1721" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/costofcapital.asp"><span data-dcnode-id="1722" instrument_node="">cost of capital</span></a><span data-dcnode-id="1720" instrument_node=""> expenses from 2018 for five years instead of writing them off gradually over several years.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1717" data-id="#citation-87"><span data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">12</span></span></span><span data-dcnode-id="1716" instrument_node=""> That means it will be less expensive for businesses to make certain investments.
</span></p><span data-dcnode-id="1714" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1713" id="mntl-sc-block_1-0-157"></div><span data-dcnode-id="1712" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1711" id="toc-taxing-multinationals"></span><span data-dcnode-id="1710" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1705" id="mntl-sc-block_1-0-158"><span data-dcnode-id="1709" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node=""> Taxing Multinationals </span></span><span data-dcnode-id="1706" instrument_node=""> </span></h2><span data-dcnode-id="1704" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1699" id="mntl-sc-block_1-0-159"><span data-dcnode-id="1703" instrument_node="">
The TCJA changes the U.S. </span><a data-component="link" data-dcnode-id="1701" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/corporatetax.asp"><span data-dcnode-id="1702" instrument_node="">corporate tax</span></a><span data-dcnode-id="1700" instrument_node=""> system from a worldwide one to a territorial one. This means U.S. corporations no longer have to pay U.S. taxes on most future overseas profits. Under the previous system, U.S. corporations paid U.S. taxes on all profits no matter what country they are earned in.&nbsp;
</span></p><span data-dcnode-id="1698" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1697" id="mntl-sc-block_1-0-160"></div><span data-dcnode-id="1696" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1687" id="mntl-sc-block_1-0-161"><span data-dcnode-id="1695" instrument_node="">
The tax bill also changes&nbsp;how repatriated foreign earnings are taxed. When U.S. corporations bring profits held overseas back to the United States, they will pay a tax of 8% on </span><a data-component="link" data-dcnode-id="1693" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/illiquid.asp"><span data-dcnode-id="1694" instrument_node="">illiquid</span></a><span data-dcnode-id="1692" instrument_node=""> assets such as factories and equipment, and 15.5% on cash and cash equivalents. The tax is payable over eight years.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1689" data-id="#citation-2"><span data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">1</span></span></span><span data-dcnode-id="1688" instrument_node="">
</span></p><span data-dcnode-id="1686" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1685" id="mntl-sc-block_1-0-162"></div><span data-dcnode-id="1684" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1682" id="mntl-sc-block_1-0-163"><span data-dcnode-id="1683" instrument_node="">
Both new rates represent substantial drops from the prior rate of 35%. In addition, the anti-base-erosion and anti-abuse tax intend to discourage U.S. corporations from shifting profits to lower-tax countries moving forward.
</span></p><span data-dcnode-id="1681" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1680" id="mntl-sc-block_1-0-164"></div><span data-dcnode-id="1679" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1677" id="mntl-sc-block_1-0-165"><span data-dcnode-id="1678" instrument_node="">
Although these cuts will also affect how much corporate tax is applied to&nbsp;the deficit, they do not expire starting in 2026 as the individual cuts do.&nbsp;
</span></p><span data-dcnode-id="1676" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1675" id="mntl-sc-block_1-0-166"></div><span data-dcnode-id="1674" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1665" id="mntl-sc-block_1-0-167"><span data-dcnode-id="1673" instrument_node="">
Tax-bill proponents point out that Americans who own&nbsp;stocks, mutual funds, or </span><a data-component="link" data-dcnode-id="1671" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/etf.asp"><span data-dcnode-id="1672" instrument_node="">exchange-traded funds</span></a><span data-dcnode-id="1670" instrument_node=""> (ETFs) in their retirement and investment accounts will also profit from these changes. The reason: their investments rise in value when multinational stocks rise in value.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1667" data-id="#citation-43"><span data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">29</span></span></span><span data-dcnode-id="1666" instrument_node="">
</span></p><span data-dcnode-id="1664" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1663" id="mntl-sc-block_1-0-168"></div><span data-dcnode-id="1662" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1653" id="mntl-sc-block_1-0-169"><span data-dcnode-id="1661" instrument_node="">
They also note that the prior system of worldwide taxation harms Americans by sending jobs, profits, and tax revenue overseas by effectively </span><a data-component="link" data-dcnode-id="1659" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/double_taxation.asp"><span data-dcnode-id="1660" instrument_node="">double-taxing</span></a><span data-dcnode-id="1658" instrument_node=""> foreign-earned income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1655" data-id="#citation-91"><span data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">30</span></span></span><span data-dcnode-id="1654" instrument_node=""> Most developed countries use a territorial system, and the United States joined them beginning Jan. 1, 2018. This could result in fewer companies relocating overseas to lower their taxes.&nbsp;
</span></p><span data-dcnode-id="1652" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1651" id="mntl-sc-block_1-0-170"></div><span data-dcnode-id="1650" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1649" id="toc-corporate-tax-rates"></span><span data-dcnode-id="1648" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1643" id="mntl-sc-block_1-0-171"><span data-dcnode-id="1647" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node=""> Corporate Tax Rates </span></span><span data-dcnode-id="1644" instrument_node=""> </span></h2><span data-dcnode-id="1642" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1636" id="mntl-sc-block_1-0-172"><span data-dcnode-id="1641" instrument_node="">
Corporations, like individuals and estates, pay taxes under a bracketed system with increasing marginal rates. In 2017, those rates were as follows:</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1638" data-id="#citation-44"><span data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">31</span></span></span><span data-dcnode-id="1637" instrument_node="">
</span></p><span data-dcnode-id="1635" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1634" id="mntl-sc-block_1-0-173"></div><span data-dcnode-id="1633" instrument_node="">
</span><figure class="comp mntl-sc-block-image inline-image mntl-sc-block finance-sc-block-image mntl-sc-block-universal-image figure-landscape figure-low-res" data-dcnode-id="1620" id="mntl-sc-block_1-0-174"><span data-dcnode-id="1632" instrument_node="">
</span><div class="figure-media" data-dcnode-id="1622"><span data-dcnode-id="1631" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1613" id="mntl-sc-block_1-0-175"><span data-dcnode-id="1618" instrument_node="">
Starting in 2018, the corporate tax became a flat rate of 21%—permanently.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1615" data-id="#citation-2"><span data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">1</span></span></span><span data-dcnode-id="1614" instrument_node=""> Since it’s a flat rate that’s lower than most of the previous marginal rates, most corporations will have a lower federal tax bill. Those with profits under $50,000 will have a higher tax bill because their rate will increase from 15% to 21%.
</span></p><span data-dcnode-id="1612" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1611" id="mntl-sc-block_1-0-176"></div><span data-dcnode-id="1610" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1600" id="mntl-sc-block_1-0-177"><span data-dcnode-id="1609" instrument_node="">
According to an analysis by The&nbsp;Wall Street Journal, the types of companies most likely to benefit from the lower corporate rates are retailers, health insurers, telecommunications carriers, independent refiners, and grocers.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1606" data-id="#citation-92"><span data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">32</span></span></span><span data-dcnode-id="1605" instrument_node=""> Aetna, for example, has a median effective tax rate of 35% over the last 11 years according to&nbsp;MarketWatch’s Corporate Tax Calculator, while Time Warner has paid 33%, Target has paid 34.9%, and Phillips 66 has paid 31.3%.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1602" data-id="#citation-45"><span data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">33</span></span></span><span data-dcnode-id="1601" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="1599" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1598" id="mntl-sc-block_1-0-178"></div><span data-dcnode-id="1597" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1595" id="mntl-sc-block_1-0-179"><span data-dcnode-id="1596" instrument_node="">
As with the changes in how foreign profits are taxed, the changes in how corporate profits are taxed will affect everyone who owns shares of a corporation through stocks, mutual funds, or ETFs.
</span></p><span data-dcnode-id="1594" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1593" id="mntl-sc-block_1-0-180"></div><span data-dcnode-id="1592" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1583" id="mntl-sc-block_1-0-181"><span data-dcnode-id="1591" instrument_node="">
The top marginal tax rate for U.S. corporations under the former law was 35% and the global average was 25.44%, when weighted for GDP. Critics have long contended that America’s high corporate tax rates put the country at a competitive disadvantage compared to lower-tax nations such as Ireland, pushing American corporations’ profits overseas.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1588" data-id="#citation-47"><span data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">34</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1585" data-id="#citation-43"><span data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">29</span></span></span><span data-dcnode-id="1584" instrument_node=""> In theory, now that rates are lower, companies may allow more profits to be earned domestically and they might spend fewer resources lobbying for lower tax rates and more resources on improving their products and services.
</span></p><span data-dcnode-id="1582" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1581" id="mntl-sc-block_1-0-182"></div><span data-dcnode-id="1580" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1574" id="mntl-sc-block_1-0-183"><span data-dcnode-id="1579" instrument_node="">
Also, the corporate alternative minimum tax of 20% was repealed.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1576" data-id="#citation-87"><span data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">12</span></span></span><span data-dcnode-id="1575" instrument_node="">
</span></p><span data-dcnode-id="1573" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1572" id="mntl-sc-block_1-0-184"></div><span data-dcnode-id="1571" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1558" id="mntl-sc-block_1-0-185"><span data-dcnode-id="1570" instrument_node="">
The Tax Foundation’s models, however, found that the tax plan should increase </span><a data-component="link" data-dcnode-id="1568" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/g/gdp.asp"><span data-dcnode-id="1569" instrument_node="">gross domestic product</span></a><span data-dcnode-id="1567" instrument_node=""> (GDP) by 1.7% over the long term, increase wages by 1.5%, and add 339,000 full-time equivalent jobs.&nbsp;They say GDP will grow by an average of 0.29% per year over the next decade, an increase from 1.84% to 2.13%. They also expect the growth generated by the tax cuts to increase federal revenues by $1 trillion.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1564" data-id="#citation-51"><span data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">35</span></span></span><span data-dcnode-id="1563" instrument_node="">&nbsp;Job growth indeed did occur&nbsp;in 2018.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1560" data-id="#citation-80"><span data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">36</span></span></span><span data-dcnode-id="1559" instrument_node="">
</span></p><span data-dcnode-id="1557" instrument_node="">

Starting already, tax preparers, tax attorneys, and accountants can expect a boost in business from clients seeking to maximize benefits or limit damage from the tax-code changes.

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1543" id="mntl-sc-block_1-0-189"></div><span data-dcnode-id="1542" instrument_node="">

They were busy in 2018,&nbsp;helping people set up pass-through businesses and reevaluating their clients’ circumstances in light of all the tax changes.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1538" data-id="#citation-93"><span data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">37</span></span></span><span data-dcnode-id="1537" instrument_node=""> Tax preparers who primarily work for low- and middle-class taxpayers may see a drop in business, however, since fewer of those households will benefit from itemizing their deductions.
</span></p><span data-dcnode-id="1535" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1534" id="mntl-sc-block_1-0-191"></div><span data-dcnode-id="1533" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1532" id="toc-whats-permanent-what-isnt"></span><span data-dcnode-id="1531" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1526" id="mntl-sc-block_1-0-192"><span data-dcnode-id="1530" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node=""> What's Permanent, What Isn't </span></span><span data-dcnode-id="1527" instrument_node=""> </span></h2><span data-dcnode-id="1525" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1523" id="mntl-sc-block_1-0-193"><span data-dcnode-id="1524" instrument_node="">
All the individual changes to the tax code are temporary, including the 20% deduction for pass-through income. Most changes expire after 2025; a few, like the reduced medical-expense threshold, expire sooner. The corporate tax rate cut, international tax rules, and the change to a slower measure of inflation for determining tax brackets are permanent.
</span></p><span data-dcnode-id="1522" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1521" id="mntl-sc-block_1-0-194"></div><span data-dcnode-id="1520" instrument_node="">

The House released its first version of the tax bill on Nov. 2, 2017.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1516" data-id="#citation-87"><span data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">12</span></span></span><span data-dcnode-id="1515" instrument_node=""> Different groups who stood to gain or lose significantly fought hard to protect their interests.
</span></p><span data-dcnode-id="1513" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1497" id="mntl-sc-block_1-0-197"><span data-dcnode-id="1510" instrument_node="">
Graduate students felt threatened by the possibility that their tuition waivers would be taxed. Many graduate schools don’t charge tuition to students who teach or who work as research assistants. Students were opposed to getting tax bills for the income they never received.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1507" data-id="#citation-53"><span data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">38</span></span></span><span data-dcnode-id="1506" instrument_node=""> The average graduate tuition in the 2015–16 year was $17,868, so depending on what tax bracket the grad student fell into, the tax bill may have been several thousand dollars.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1503" data-id="#citation-54"><span data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">39</span></span></span><span data-dcnode-id="1502" instrument_node=""> Grad students will continue to receive this tuition benefit tax-free.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1499" data-id="#citation-94"><span data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">40</span></span></span><span data-dcnode-id="1498" instrument_node="">
</span></p><span data-dcnode-id="1496" instrument_node="">

</span><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">Anyone with student-loan debt will still be able to deduct the interest, even if they no longer itemize because of the higher standard deduction.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1485" data-id="#citation-56"><span data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">41</span></span></span></p></div><span data-dcnode-id="1482" instrument_node="">

Teachers also worried about losing their up-to-$250 deductions for classroom and certain job-related expenses. They didn't. They can take this deduction whether they itemize deductions or take the standard one.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1474" data-id="#citation-57"><span data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">42</span></span></span><span data-dcnode-id="1473" instrument_node="">&nbsp;

The low-income housing tax credit was also saved.&nbsp;The president of the National Low Income Housing Coalition told NPR that a provision of the bill that would have revoked the tax-exempt status of&nbsp;</span><a data-component="link" data-dcnode-id="1466" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/privateactivitybond.asp"><span data-dcnode-id="1467" instrument_node="">private activity bonds</span></a><span data-dcnode-id="1465" instrument_node="">, a benefit that encourages investment in affordable housing construction by lowering its cost, would have meant “a loss of around 800,000 affordable rental homes over the next 10 years."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1462" data-id="#citation-58"><span data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">43</span></span></span><span data-dcnode-id="1461" instrument_node="">&nbsp;These bonds are also used to finance infrastructure projects such as roads and airports.&nbsp;

The Tax Cuts and Jobs Act will have an effect on tax payments for all Americans from the 2018 tax year and primarily lasting through 2025. Overall, the TCJA lowers tax rates across income levels helping reduce Americans' income tax burden. Individually, understanding how the Act affects taxes in your tax bracket and individual circumstances that affect you directly can help you to ensure you are taking advantage of all the deductions you deserve and ultimately paying the lowest tax bill available to you.
