</span><span class="heading-toc" data-dcnode-id="2572" id="toc-what-is-a-tax-deduction"></span><span data-dcnode-id="2571" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2566" id="mntl-sc-block_1-0"><span data-dcnode-id="2570" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node=""> What Is a Tax Deduction? </span></span><span data-dcnode-id="2567" instrument_node=""> </span></h2><span data-dcnode-id="2565" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2557" id="mntl-sc-block_1-0-1"><span data-dcnode-id="2564" instrument_node="">
A tax deduction is an item you can subtract from your </span><a data-component="link" data-dcnode-id="2562" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxableincome.asp"><span data-dcnode-id="2563" instrument_node="">taxable income</span></a><span data-dcnode-id="2561" instrument_node=""> to lower the amount of taxes you owe. You can choose the standard deduction—a single deduction at a fixed amount—or itemize deductions on </span><a data-component="link" data-dcnode-id="2559" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/forms-pubs/about-schedule-a-form-1040" rel="noopener" target="_blank"><span data-dcnode-id="2560" instrument_node="">Schedule A </span></a><span data-dcnode-id="2558" instrument_node="">of your income tax return.
</span></p><span data-dcnode-id="2556" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2555" id="mntl-sc-block_1-0-2"></div><span data-dcnode-id="2554" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2546" id="mntl-sc-block_1-0-3"><span data-dcnode-id="2553" instrument_node="">
If the value of your itemized expenses is greater than the standard deduction for your filing status, it makes sense to itemize. Allowable itemized deductions include </span><a data-component="link" data-dcnode-id="2551" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/home-mortgage-interest.asp"><span data-dcnode-id="2552" instrument_node="">mortgage interest</span></a><span data-dcnode-id="2550" instrument_node="">, charitable gifts, unreimbursed medical expenses, and </span><a data-component="link" data-dcnode-id="2548" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/salt-5180146"><span data-dcnode-id="2549" instrument_node="">state and local taxes</span></a><span data-dcnode-id="2547" instrument_node="">.
</span></p><span data-dcnode-id="2545" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2544" id="mntl-sc-block_1-0-4"></div><span data-dcnode-id="2543" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2521" id="mntl-sc-block_1-0-5"><span data-dcnode-id="2542" instrument_node="">

</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2539" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="2540" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="2538" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2525" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="2537" instrument_node="">
</span><ul data-dcnode-id="2526"><li data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Tax deductions are subtracted from your taxable income, thereby lowering the amount of tax you owe.</span></li><li data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">You can choose the standard deduction or itemize your deductions on Schedule A of Form 1040 or 1040-SR.</span></li><li data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">The Tax Cuts and Jobs Act (TCJA) nearly doubled the standard deduction and improved several tax deductions.</span></li><li data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">The TCJA also eliminated or limited many itemized deductions, including the mortgage interest deduction.</span></li><li data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">If you itemize your deductions, be sure to keep receipts to substantiate your expenses.</span></li></ul></div><span data-dcnode-id="2524" instrument_node="">
</span></div><span data-dcnode-id="2522" instrument_node="">
</span></div><span data-dcnode-id="2520" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2257" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="2256" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2214" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="2213" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2212" id="toc-tax-deductions-for-the-self-employed"></span><span data-dcnode-id="2211" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2206" id="mntl-sc-block_1-0-30"><span data-dcnode-id="2210" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node=""> Tax Deductions for the Self-Employed </span></span><span data-dcnode-id="2207" instrument_node=""> </span></h2><span data-dcnode-id="2205" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2199" id="mntl-sc-block_1-0-31"><span data-dcnode-id="2204" instrument_node="">
The ranks of freelancers and gig workers are growing. According to a Pew Research study, more than 16 million Americans now identify as self-employed.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2201" data-id="#citation-18"><span data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">7</span></span></span><span data-dcnode-id="2200" instrument_node="">
</span></p><span data-dcnode-id="2198" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2197" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="2196" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2194" id="mntl-sc-block_1-0-33"><span data-dcnode-id="2195" instrument_node="">
Luckily for them, they have retained some of the tax deductions that wage earners lost in the 2017 tax reform law. Some deductions are complex because you have to determine how much of every expense is business, thus deductible—and how much is personal and nondeductible.
</span></p><span data-dcnode-id="2193" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2192" id="mntl-sc-block_1-0-34"></div><span data-dcnode-id="2191" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2186" id="mntl-sc-block_1-0-35"><span data-dcnode-id="2190" instrument_node="">

</span></p><span data-dcnode-id="2185" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2184" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="2183" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2172" id="mntl-sc-block_1-0-37"><span data-dcnode-id="2182" instrument_node="">
One particularly valuable deduction for self-employed people defers taxes on their contributions to retirement plans. Tax-deferred retirement plans—including the </span><a data-component="link" data-dcnode-id="2180" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/sep.asp%23%3A~%3Atext%3DA%2520SEP%2520IRA%2520is%252C%2520of%2Cbe%2520taxed%2520as%2520ordinary%2520income."><span data-dcnode-id="2181" instrument_node="">SEP-IRA</span></a><span data-dcnode-id="2179" instrument_node="">, the </span><a data-component="link" data-dcnode-id="2177" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/simple-ira.asp%23%3A~%3Atext%3DA%2520SIMPLE%2520IRA%252C%2520or%2520Savings%2Cother%2520plans%2520might%2520consider%2520it."><span data-dcnode-id="2178" instrument_node="">SIMPLE IRA</span></a><span data-dcnode-id="2176" instrument_node="">, and the </span><a data-component="link" data-dcnode-id="2174" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/ask/answers/100314/do-i-need-employer-set-401k-plan.asp"><span data-dcnode-id="2175" instrument_node="">solo 401(k)</span></a><span data-dcnode-id="2173" instrument_node="">—are designed specifically for the self-employed, solo operators, and small business owners.
</span></p><span data-dcnode-id="2171" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2170" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="2169" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="2154" id="mntl-sc-block_1-0-39"><span data-dcnode-id="2168" instrument_node="">
</span><div class="comp theme-important mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="2156" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-40"><span data-dcnode-id="2167" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="2166" id="mntl-sc-block-callout-heading_1-0-2"></h3><span data-dcnode-id="2165" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="2158" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">Contributions to traditional IRAs and qualified plans such as 401(k)s are an "</span><a data-component="link" data-dcnode-id="2161" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/11/above-the-line-deductions.asp"><span data-dcnode-id="2162" instrument_node="">above the line</span></a><span data-dcnode-id="2160" instrument_node="">" deduction. That means the contribution will reduce your taxable income even if you choose to take the standard deduction instead of itemizing.</span></p></div><span data-dcnode-id="2157" instrument_node="">
</span></div><span data-dcnode-id="2155" instrument_node="">
</span></div><span data-dcnode-id="2153" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2152" id="toc-small-business-tax-deductions"></span><span data-dcnode-id="2151" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2146" id="mntl-sc-block_1-0-41"><span data-dcnode-id="2150" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node=""> Small Business Tax Deductions </span></span><span data-dcnode-id="2147" instrument_node=""> </span></h2><span data-dcnode-id="2145" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2139" id="mntl-sc-block_1-0-42"><span data-dcnode-id="2144" instrument_node="">
Businesses large and small pay taxes on their profits, which is their total receipts minus their total business costs. That means recording every single expense and reporting it to the IRS. Some of the top deductions for small business owners include:</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2141" data-id="#citation-30"><span data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">8</span></span></span><span data-dcnode-id="2140" instrument_node="">
</span></p><span data-dcnode-id="2138" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2137" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="2136" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2101" id="mntl-sc-block_1-0-44"><span data-dcnode-id="2135" instrument_node="">
</span><li data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Advertising and promotion</span></li><li data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Bad debts</span></li><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Books</span></li><li data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Business travel</span></li><li data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Charitable contributions</span></li><li data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Continuing education</span></li><li data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Equipment</span></li><li data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Insurance</span></li><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Legal and professional fees</span></li><li data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">License and regulatory fees</span></li><li data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Loan interest</span></li><li data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Pass-through tax deduction</span></li><li data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Repair and maintenance</span></li><li data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Taxes (local, sales, and property taxes)</span></li><li data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Vehicle expenses</span></li><li data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Startup costs</span></li><span data-dcnode-id="2102" instrument_node="">
</span></ul><span data-dcnode-id="2100" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2099" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="2098" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2094" id="mntl-sc-block_1-0-46"><span data-dcnode-id="2097" instrument_node="">
The rules for many of these deductions are complex, particularly for shoestring operations. Vehicle expenses and travel expenses, for example, must be carefully separated between deductible business use and nondeductible personal or family use.</span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">
</span></p><span data-dcnode-id="2093" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2092" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="2091" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2090" id="toc-tax-deductions-vs-tax-credits"></span><span data-dcnode-id="2089" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2084" id="mntl-sc-block_1-0-48"><span data-dcnode-id="2088" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node=""> Tax Deductions vs. Tax Credits </span></span><span data-dcnode-id="2085" instrument_node=""> </span></h2><span data-dcnode-id="2083" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2078" id="mntl-sc-block_1-0-49"><span data-dcnode-id="2082" instrument_node="">
Tax deductions reduce your total taxable income—the amount you use to calculate your tax bill. On the other hand, </span><a data-component="link" data-dcnode-id="2080" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxcredit.asp"><span data-dcnode-id="2081" instrument_node="">tax credits</span></a><span data-dcnode-id="2079" instrument_node=""> are subtracted directly from the taxes you owe. Some tax credits are even refundable, meaning that if the credits reduce your tax bill to below zero, you'll get a refund for the difference.
</span></p><span data-dcnode-id="2077" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2076" id="mntl-sc-block_1-0-50"></div><span data-dcnode-id="2075" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2073" id="mntl-sc-block_1-0-51"><span data-dcnode-id="2074" instrument_node="">
Even if they aren't refundable, a tax credit is more valuable than a tax deduction. A tax deduction may kick your taxable income down a few notches on the tax tables, but a tax credit reduces the tax you owe, dollar for dollar.
</span></p><span data-dcnode-id="2072" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2071" id="mntl-sc-block_1-0-52"></div><span data-dcnode-id="2070" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2069" id="toc-example-of-a-tax-deduction"></span><span data-dcnode-id="2068" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2063" id="mntl-sc-block_1-0-53"><span data-dcnode-id="2067" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node=""> Example of a Tax Deduction </span></span><span data-dcnode-id="2064" instrument_node=""> </span></h2><span data-dcnode-id="2062" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2057" id="mntl-sc-block_1-0-54"><span data-dcnode-id="2061" instrument_node="">
Here's an example. Consider a single taxpayer reporting an earned income of $80,000 per year. That puts the person in </span><a data-component="link" data-dcnode-id="2059" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/2021-tax-brackets-other-tax-changes-5084597"><span data-dcnode-id="2060" instrument_node="">the 22% tax bracket</span></a><span data-dcnode-id="2058" instrument_node="">. So their tax bill for 2021 would be $4,863 (12% of the first $40,525 in income) plus 22% of the amount over $40,525, which comes out to $13,548. Like all taxpayers, this individual can choose to itemize deductions or take the standard deduction.
</span></p><span data-dcnode-id="2056" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2055" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="2054" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2049" id="mntl-sc-block_1-0-56"><span data-dcnode-id="2053" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node=""> If the Taxpayer Itemizes </span></span><span data-dcnode-id="2050" instrument_node=""> </span></h3><span data-dcnode-id="2048" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2046" id="mntl-sc-block_1-0-57"><span data-dcnode-id="2047" instrument_node="">
The taxpayer has paid $10,000 in mortgage interest and has contributed $6,000 to a traditional IRA. Both are deductible expenses.
</span></p><span data-dcnode-id="2045" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2044" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="2043" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2037" id="mntl-sc-block_1-0-59"><span data-dcnode-id="2042" instrument_node="">
With a total of $16,000 in deductions to report, the taxpayer will owe income taxes on $64,000 ($80,000 - $16,000) of earned income. After taking the deductions, the person will owe $10,028 in taxes for the year (instead of the original $13,548).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2039" data-id="#citation-23"><span data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">9</span></span></span><span data-dcnode-id="2038" instrument_node="">
</span></p><span data-dcnode-id="2036" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2035" id="mntl-sc-block_1-0-60"></div><span data-dcnode-id="2034" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2029" id="mntl-sc-block_1-0-61"><span data-dcnode-id="2033" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node=""> If the Taxpayer Takes the Standard Deduction </span></span><span data-dcnode-id="2030" instrument_node=""> </span></h3><span data-dcnode-id="2028" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2026" id="mntl-sc-block_1-0-62"><span data-dcnode-id="2027" instrument_node="">
The standard deduction for a single filer is $12,550 for the 2021 tax year. It's important to note that the taxpayer will get the deduction for the IRA contribution in any case. It's an "above-the-line" deduction, reducing this taxpayer's gross income from $80,000 to $74,000. The standard deduction further reduces the filer's taxable income to $61,450. With the standard deduction, the taxpayer will owe $9,467.
</span></p><span data-dcnode-id="2025" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2024" id="mntl-sc-block_1-0-63"></div><span data-dcnode-id="2023" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2021" id="mntl-sc-block_1-0-64"><span data-dcnode-id="2022" instrument_node="">
Even with a hefty mortgage interest write-off, the taxpayer would save $561 by taking the standard deduction rather than itemizing deductions.
</span></p><span data-dcnode-id="2020" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2019" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="2018" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2017" id="toc-standard-deductions-vs-itemized-deductions"></span><span data-dcnode-id="2016" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2011" id="mntl-sc-block_1-0-66"><span data-dcnode-id="2015" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node=""> Standard Deductions vs. Itemized Deductions </span></span><span data-dcnode-id="2012" instrument_node=""> </span></h2><span data-dcnode-id="2010" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2008" id="mntl-sc-block_1-0-67"><span data-dcnode-id="2009" instrument_node="">
U.S. taxpayers choose to itemize their deductions or take the standard deduction, depending on which most reduces their taxable income. Still, most taxpayers benefit from the standard deduction because the TCJA nearly doubled the standard deduction and eliminated (or capped) many itemized deductions.
</span></p><span data-dcnode-id="2007" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2006" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="2005" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2003" id="mntl-sc-block_1-0-69"><span data-dcnode-id="2004" instrument_node="">
If you itemize, you need to keep receipts for eligible expenses throughout the year and organize them into categories. At tax time, you tally and record the expenses on a Schedule A—and hold onto the receipts in case you're audited.
</span></p><span data-dcnode-id="2002" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2001" id="mntl-sc-block_1-0-70"></div><span data-dcnode-id="2000" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1990" id="mntl-sc-block_1-0-71"><span data-dcnode-id="1999" instrument_node="">
The standard deduction is substantially less work: You simply fill in the amount of your standard deduction on line 12a of </span><a data-component="link" data-dcnode-id="1997" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1998" instrument_node="">Form 1040</span></a><span data-dcnode-id="1996" instrument_node=""> or </span><a data-component="link" data-dcnode-id="1994" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/f1040s.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1995" instrument_node="">1040-SR</span></a><span data-dcnode-id="1993" instrument_node="">.</span><br data-dcnode-id="1992"><span data-dcnode-id="1991" instrument_node="">
</span></p><span data-dcnode-id="1989" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1988" id="mntl-sc-block_1-0-72"></div><span data-dcnode-id="1987" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1986" id="toc-state-tax-deductions"></span><span data-dcnode-id="1985" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1980" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1984" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node=""> State Tax Deductions </span></span><span data-dcnode-id="1981" instrument_node=""> </span></h2><span data-dcnode-id="1979" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1977" id="mntl-sc-block_1-0-74"><span data-dcnode-id="1978" instrument_node="">
Most of the 41 states that impose an income tax follow the format of the federal forms as closely as possible. However, the states set their own tax rates and standard deductions, and they may have additional allowable deductions or different restrictions on deductions.
</span></p><span data-dcnode-id="1976" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1975" id="mntl-sc-block_1-0-75"></div><span data-dcnode-id="1974" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1972" id="mntl-sc-block_1-0-76"><span data-dcnode-id="1973" instrument_node="">
Some states do not permit taxpayers to itemize state taxes if they take the federal tax deduction.
</span></p><span data-dcnode-id="1971" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1970" id="mntl-sc-block_1-0-77"></div><span data-dcnode-id="1969" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1962" id="mntl-sc-block_1-0-78"><span data-dcnode-id="1968" instrument_node="">
In any case, it's worth reading your state's tax forms closely to see if there are any additional deductions for which you might qualify. For example, in New Mexico, you are exempt from state income tax when you reach age 100. And Nevada taxpayers can get a free pack of cards for filing their tax returns.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1965" data-id="#citation-16"><span data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">10</span></span></span><br data-dcnode-id="1964"><span data-dcnode-id="1963" instrument_node="">
</span></p><span data-dcnode-id="1961" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1960" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="1959" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1958" id="toc-special-considerations"></span><span data-dcnode-id="1957" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1952" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1956" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node=""> Special Considerations </span></span><span data-dcnode-id="1953" instrument_node=""> </span></h2><span data-dcnode-id="1951" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1949" id="mntl-sc-block_1-0-81"><span data-dcnode-id="1950" instrument_node="">
Keep in mind that there are limitations on some deductions. For example, current federal tax law limits the mortgage interest deduction to a maximum of $750,000 of secured mortgage debt (or $1 million if you bought the home prior to Dec. 16, 2017). That 2017 change was a severe blow to the very wealthy and to some not-so-wealthy residents of the cities with the most expensive homes.
</span></p><span data-dcnode-id="1948" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1947" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="1946" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1940" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1945" instrument_node="">
Then there's the limit on the healthcare deduction. If you're itemizing healthcare costs, the expenses that you paid (for yourself, your spouse, and your dependents) must exceed a certain percentage of your adjusted gross income (AGI) to be deductible. For your 2021 tax return, the threshold for medical expenses is 7.5% of AGI for all&nbsp;taxpayers.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1942" data-id="#citation-11"><span data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">11</span></span></span><span data-dcnode-id="1941" instrument_node="">
</span></p><span data-dcnode-id="1939" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1938" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1937" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1936" id="toc-capital-loss-carryforward"></span><span data-dcnode-id="1935" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1930" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1934" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node=""> Capital Loss Carryforward </span></span><span data-dcnode-id="1931" instrument_node=""> </span></h2><span data-dcnode-id="1929" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1924" id="mntl-sc-block_1-0-86"><span data-dcnode-id="1928" instrument_node="">
One additional deduction not included in the standard or itemized tax deductions is the one for </span><a data-component="link" data-dcnode-id="1926" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/capitalloss.asp"><span data-dcnode-id="1927" instrument_node="">capital losses</span></a><span data-dcnode-id="1925" instrument_node="">. These are recorded on Schedule D, along with capital gains, rather than on Schedule A.
</span></p><span data-dcnode-id="1923" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1922" id="mntl-sc-block_1-0-87"></div><span data-dcnode-id="1921" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1915" id="mntl-sc-block_1-0-88"><span data-dcnode-id="1920" instrument_node="">
A tax loss carryforward is a legal way to rearrange earnings for the taxpayer's benefit. You can carry forward individual and business capital losses from previous years. You can claim up to $3,000 ($1,500 if married filing separately) in capital losses as a tax deduction as of the 2021 tax year (the tax return you file in 2022). If your losses were greater than that, you can "carry them forward" to the following year or years.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1917" data-id="#citation-12"><span data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">12</span></span></span><span data-dcnode-id="1916" instrument_node="">
</span></p><span data-dcnode-id="1914" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1913" id="mntl-sc-block_1-0-89"></div><span data-dcnode-id="1912" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1894" id="mntl-sc-block_1-0-90"><span data-dcnode-id="1911" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1910" id="toc-what-can-i-write-off-on-my-taxes-for-2021"></span><span data-dcnode-id="1909" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">What Can I Write Off on My Taxes for 2021?</span></h2><span data-dcnode-id="1906" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1896"><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">There are dozens of tax deductions and credits that can help lower your tax bill. Some of the more common deductions include those for mortgage interest, retirement plan contributions, HSA contributions, student loan interest, charitable contributions, medical and dental expenses, gambling losses, and state and local taxes.</span></p><p data-dcnode-id="1899"><span data-dcnode-id="1903" instrument_node="">Common credits include the child tax credit, earned income tax credit, child and dependent care credit, saver's credit, foreign tax credit, American opportunity credit, lifetime learning credit, and premium tax credit.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1900" data-id="#citation-28"><span data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">13</span></span></span></p><p data-dcnode-id="1897"><br data-dcnode-id="1898"></p></div><span data-dcnode-id="1895" instrument_node="">

</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1874" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1890" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1889" id="toc-how-can-i-maximize-my-tax-deductions"></span><span data-dcnode-id="1888" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">How Can I Maximize My Tax Deductions?</span></h2><span data-dcnode-id="1885" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1876"><p data-dcnode-id="1882"><span data-dcnode-id="1884" instrument_node="">Whether you itemize or take the standard deduction, it helps to contribute the maximum allowable amount to a traditional (i.e., not Roth) retirement account like an IRA or a 401(k). That way, you'll be adding to your retirement savings while reducing your taxes for the year.</span><br data-dcnode-id="1883"></p><p data-dcnode-id="1879"><span data-dcnode-id="1881" instrument_node="">If you have substantial mortgage interest, student debt interest, medical expenses, and other deductible expenses, you may find the total exceeds the standard deduction. In that case, you can maximize your deductions by itemizing on Schedule A of Form 1040 or 1040-SR.</span><br data-dcnode-id="1880"></p><p data-dcnode-id="1877"><br data-dcnode-id="1878"></p></div><span data-dcnode-id="1875" instrument_node="">
</span></div><span data-dcnode-id="1873" instrument_node="">

</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1858"><p data-dcnode-id="1859"><span data-dcnode-id="1864" instrument_node="">There is no maximum. However, the average refund for individuals in the 2020 tax filing season was $2,827, according to the National Taxpayer Advocate (an independent organization within the IRS).</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1861" data-id="#citation-27"><span data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">14</span></span></span><br data-dcnode-id="1860"></p></div><span data-dcnode-id="1857" instrument_node="">
