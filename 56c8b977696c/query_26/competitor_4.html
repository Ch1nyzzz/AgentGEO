</span></ul></div></nav><div class="site-inner" data-dcnode-id="193"><div class="content-sidebar-wrap" data-dcnode-id="194"><main class="content" data-dcnode-id="451" id="genesis-content" style="min-height: 3283px;"><article aria-label="Four Areas of the New Tax Law that Affect Nonprofits" class="post-6346 post type-post status-publish format-standard has-post-thumbnail category-tips-to-having-a-successful-nonprofit tag-nonprofit-accounting-tips entry" data-dcnode-id="464" itemscope="" itemtype="https://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="576"><h1 class="entry-title" data-dcnode-id="587" itemprop="headline"><span data-dcnode-id="588" instrument_node="">Four Areas of the New Tax Law that Affect Nonprofits</span></h1><span data-dcnode-id="586" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="577"><time class="entry-time" data-dcnode-id="584" datetime="2018-03-06T12:10:34-08:00" itemprop="datePublished"><span data-dcnode-id="585" instrument_node="">March 6, 2018</span></time><span data-dcnode-id="583" instrument_node=""> By </span><span class="entry-author" data-dcnode-id="579" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonprofitinformation.com/author/jameswillis/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="581" itemprop="name"><span data-dcnode-id="582" instrument_node="">James Willis</span></span></a></span><span data-dcnode-id="578" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="476" itemprop="text"><span data-dcnode-id="575" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="571"><figure class="alignright" data-dcnode-id="572"><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonprofitinformation.com/new-tax-law-nonprofits/nonprofit-taxes/" rel="attachment wp-att-6348"><img alt="Nonprofit Taxes" class="wps-ic-local-lazy wp-image-6348 ic-fade-in" data-dcnode-id="574" data-src="https://nonprofitinformation.com/wp-content/uploads/2018/03/nonprofit-taxes.jpg" height="250" loading="lazy" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonprofitinformation.com/wp-content/uploads/2018/03/nonprofit-taxes.jpg&amp;raw" srcset="https://nonprofitinformation.com/wp-content/uploads/2018/03/nonprofit-taxes.jpg 250w, https://nonprofitinformation.com/wp-content/uploads/2018/03/nonprofit-taxes-150x150.jpg 150w, https://nonprofitinformation.com/wp-content/uploads/2018/03/nonprofit-taxes-100x100.jpg 100w" style="opacity: 1;" width="250"></a></figure></div><span data-dcnode-id="570" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">No one likes to talk about corporate taxes, especially those in the nonprofit industry who feel as though taxes are primarily a concern for the for-profit world.&nbsp; However, the new tax law passed in December 2017, known as the Tax Cuts and Jobs Act (and also known as PL 115-97/HR 1), contains four provisions that directly impact nonprofits.&nbsp; These four provisions are:</span></p><span data-dcnode-id="567" instrument_node="">
</span><ol data-dcnode-id="558"><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Executive Compensation,</span></li><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">University Endowments,</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Unrelated Business Income Tax, and</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Fringe Benefits.</span></li></ol><span data-dcnode-id="557" instrument_node="">
</span><h2 data-dcnode-id="554"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Executive Compensation</span></strong></h2><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">With the passage of the new tax law, there is now an excise tax on excess executive compensation.&nbsp; Essentially, Section 501(c) and 501(d) organizations will now have to pay an annual 21% excise tax on employee compensation in excess of $1M.&nbsp; This rate of 21% is the top corporate income tax rate under the new law, and it’s assumed that large trade associations, universities, and hospitals will be most affected by this provision given that they are most likely to pay such high salaries.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">The way the law is structured, the current top five (5) highest paid employees, irrespective of position or title, whose compensation is in excess of $1M will be subject to this 21% excise tax.&nbsp; However, the taxes don’t stop there.&nbsp; As these five employees fall out of the top five in future years, they are still part of the group of employees that are subject to this excise tax provided they are making over $1M, along with any new employees that may have joined the top five.&nbsp; So, the group of employees subject to this tax isn’t limited to just five employees – it can grow as those in the top five change year-over-year.&nbsp; The good news is that licensed professionals providing medical services, including doctors and veterinarians, are excluded and should not be counted in this employee group.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">When calculating employee compensation, this will be the total of current compensation, deferred compensation, and excess parachute payments (an excess parachute payment relates to the present value of the parachute payment that is equal to or exceeds three times the base salary amount).&nbsp; Also included in the compensation is remuneration for services as determined for income tax withholding purposes and amounts required to be included in gross income under IRC section 457(f) — but excluding designed Roth contributions.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">This provision is also applicable to political organizations under 527(e)(1) and organizations whose income is excluded under IRC section 115(1), as well as related entities (such as parent organizations).</span></p><span data-dcnode-id="541" instrument_node="">
</span><h2 data-dcnode-id="538"><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">University Endowments</span></strong></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Under the new tax law, there is a 1.4% excise tax for endowment investment income.&nbsp; This applies only to colleges and universities with endowments of at least $500K per student, and it is limited to institutions with at least 500 students and where more than 50% of the college/university’s student body is located in the US.&nbsp; However, this provision does not apply to state colleges and universities.</span></p><span data-dcnode-id="534" instrument_node="">
</span><h2 data-dcnode-id="531"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Unrelated Business Income Tax (UBIT)</span></strong></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">As was the case before the new tax law, all income generated from unrelated business activities will be subject to UBIT; however, now at a lower tax rate of 21%.&nbsp; But there is a catch!&nbsp; Starting January 1, 2018, all income generated from unrelated business activities have to be calculated separately and the new 21% tax rate will apply to the income on each of those individual activities.&nbsp; Therefore, you will be unable to net the activities and pay the 21% on the whole amount as was the case before the new tax law.&nbsp; Thus, if you have an operating loss on one unrelated business activity, that loss carries forward to the next year as opposed to being netted against the profit-making activities for that year.</span></p><span data-dcnode-id="527" instrument_node="">
</span><h2 data-dcnode-id="524"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Fringe Benefits</span></strong></h2><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Perhaps an area that will affect many nonprofits, certain fringe benefits are now subject to the 21% UBIT rate.&nbsp; These fringe benefits include qualified transportation, parking, and on-premises athletic facilities.&nbsp; The cost of these benefits, if provided by the employer, should be calculated and a 21% UBIT paid on them by the employer.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">There are other concerns with the new tax law and its impact on nonprofits.&nbsp; One such concern is that the increase in the standard deduction could cause less people to donate to nonprofits going forward since there would be no need or incentive for them to itemize their deductions.&nbsp; In addition, the limit on the amount that a contribution can be deducted has increased from 50% of an individual’s adjusted gross income (AGI) to 60%, charitable deductions for amounts paid for college athletic event seating rights has gone from 80% to 0%, and the indexed Estate Tax exemption has doubled from $5.5M to $11M.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Needless to say, there is a lot of uncertainty in the tax community about how the IRS will apply some of these rules as the new law was put together rather quickly, left a lot of room for interpretation, and was issued without going through the proper questioning period.&nbsp; Given that, it is always best to reach out to a tax accountant or your organization’s audit firm before making any assumptions.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">References</span></p><span data-dcnode-id="511" instrument_node="">
