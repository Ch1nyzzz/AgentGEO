n data-dcnode-id="1798" instrument_node=""> </span><span data-dcnode-id="1796" instrument_node=""> </span><table border="1" cellpadding="0" cellspacing="0" data-dcnode-id="1795" width="100%"><thead data-dcnode-id="2514"><tr data-dcnode-id="2516"><td align="center" data-dcnode-id="2530" valign="top" width="7%"><strong data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">No</span></strong></td><td data-dcnode-id="2526" valign="top" width="53%"><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Description</span></strong></td><td align="center" data-dcnode-id="2522" valign="top" width="18%"><strong data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Time</span></strong></td><td align="center" data-dcnode-id="2518" valign="top" width="20%"><strong data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Reference</span></strong></td></tr></thead><tbody data-dcnode-id="1797"><tr data-dcnode-id="2502"><td align="center" data-dcnode-id="2508" valign="top"><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">1.0</span></strong></td><td colspan="3" data-dcnode-id="2504" width="92%"><strong data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Obligations under Companies Act 2016</span></strong></td></tr><tr data-dcnode-id="2472"><td align="center" data-dcnode-id="2498" valign="top"><span data-dcnode-id="2499" instrument_node="">1.1</span></td><td data-dcnode-id="2480" valign="top"><strong data-dcnode-id="2494"><u data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Publication of Name &amp; Registration No</span></u></strong><p data-dcnode-id="2493"></p><span data-dcnode-id="2492" instrument_node=""> </span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">(a) Registered Office;</span></p><span data-dcnode-id="2489" instrument_node=""> </span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">(b) Place of Business;</span></p><span data-dcnode-id="2486" instrument_node=""> </span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">(c) Place where its books (Accounting Records) are kept; and</span></p><span data-dcnode-id="2483" instrument_node=""> </span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">(d) all business letters, statements of account, invoices, official notices, official publications, websites, bills of exchange, promissory notes, endorsements, cheques, order forms, invoices, receipts and letters of credit of or purporting to be issued or signed by or on behalf of, the company, and all other forms of its business correspondences and documentation should have the Company name (whether or not it is carrying on business under a business name) &amp; company registration number</span></p></td><td data-dcnode-id="2477" valign="top"><span data-dcnode-id="2478" instrument_node="">Immediately</span></td><td data-dcnode-id="2474" valign="top"><span data-dcnode-id="2475" instrument_node="">S.30 of Companies Act</span></td></tr><tr data-dcnode-id="2456"><td align="center" data-dcnode-id="2468" valign="top"><span data-dcnode-id="2469" instrument_node="">1.2</span></td><td data-dcnode-id="2464" valign="top"><strong data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Appointment of First Secretary</span></strong></td><td data-dcnode-id="2461" valign="top"><span data-dcnode-id="2462" instrument_node="">Within 30 days from the date of incorporation</span></td><td data-dcnode-id="2458" valign="top"><span data-dcnode-id="2459" instrument_node="">S.236 of Companies Act</span></td></tr><tr data-dcnode-id="2413"><td align="center" data-dcnode-id="2452" valign="top"><span data-dcnode-id="2453" instrument_node="">1.3</span></td><td data-dcnode-id="2421" valign="top"><strong data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Documents to be kept at Registered Office</span></strong><p data-dcnode-id="2448"></p><span data-dcnode-id="2447" instrument_node=""> </span><p data-dcnode-id="2425"><span data-dcnode-id="2446" instrument_node="">a) notice of registration issued under section 15;</span><br data-dcnode-id="2445"><span data-dcnode-id="2444" instrument_node=""> b) the constitution of the company, if any;</span><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node=""> c) certificates given under this Act or corresponding previous written law, if any</span><br data-dcnode-id="2441"><span data-dcnode-id="2440" instrument_node=""> d) all registers, books, records and documents as required under this Act;</span><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node=""> e) minutes of all meetings of members and resolutions of members;</span><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node=""> f) minutes of all meetings and resolutions of the board and committees of the Board;</span><br data-dcnode-id="2435"><span data-dcnode-id="2434" instrument_node=""> g) copies of all written communications to all members or all holders of the same class of shares;</span><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node=""> h) copies of all financial statements and group financial statement;</span><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node=""> i) the accounting records of the company required under section 245;</span><br data-dcnode-id="2429"><span data-dcnode-id="2428" instrument_node=""> j) copies of all instruments creating or evidencing charges as required under section 357; and</span><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node=""> k) such other documents required to be kept by the Registrar.</span></p><span data-dcnode-id="2424" instrument_node=""> </span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">All the documents above are usually kept at the Registered Office as we are handling the Corporate Secretarial Services, except for item (i) the accounting records of the company which is not under our custody. Hence, a Notification to that effect has to be lodged with SSM.</span></p></td><td data-dcnode-id="2418" valign="top"><span data-dcnode-id="2419" instrument_node="">Immediately and within 14 days from the date of change</span></td><td data-dcnode-id="2415" valign="top"><span data-dcnode-id="2416" instrument_node="">S.47 of Companies Act</span></td></tr><tr data-dcnode-id="2386"><td align="center" data-dcnode-id="2409" valign="top"><span data-dcnode-id="2410" instrument_node="">1.4</span></td><td data-dcnode-id="2394" valign="top"><strong data-dcnode-id="2405"><u data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Proper Accounting Records</span></u></strong><p data-dcnode-id="2404"></p><span data-dcnode-id="2403" instrument_node=""> </span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Keeping proper accounting and other records which sufficiently explain the transactions and financial position of the company and enable true and fair profit and loss accounts and balance sheets.</span></p><span data-dcnode-id="2400" instrument_node=""> </span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">All appropriate entries are to be made in such accounting and other records within 60 days of completion of the transactions to which they relate the accounting and other records are to be retained for 7 years.</span></p><span data-dcnode-id="2397" instrument_node=""> </span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">In accordance to the Inland Revenue Board of Malaysia (IRBM) guidelines of record keeping, it is obliged that all accounting documents should be kept in its original form (hardcopies) although they could be converted to an electronic form (scanned copies) to be conveniently retrievable. The accounting record should be made available if IRBM officer requests for its original.</span></p></td><td data-dcnode-id="2391" valign="top"><span data-dcnode-id="2392" instrument_node="">Within 60 days of completion of transactions</span></td><td data-dcnode-id="2388" valign="top"><span data-dcnode-id="2389" instrument_node="">S.245 of Companies Act</span></td></tr><tr data-dcnode-id="2371"><td align="center" data-dcnode-id="2382" valign="top"><span data-dcnode-id="2383" instrument_node="">1.5</span></td><td data-dcnode-id="2379" valign="top"><span data-dcnode-id="2380" instrument_node="">Lodging of Annual Return, for each calendar year not later than 30 days from the anniversary of its incorporation date.</span></td><td data-dcnode-id="2376" valign="top"><span data-dcnode-id="2377" instrument_node="">Within 30 days from the anniversary of incorporation date</span></td><td data-dcnode-id="2373" valign="top"><span data-dcnode-id="2374" instrument_node="">S.68 of Companies Act</span></td></tr><tr data-dcnode-id="2351"><td align="center" data-dcnode-id="2367" valign="top"><span data-dcnode-id="2368" instrument_node="">1.6</span></td><td data-dcnode-id="2359" valign="top"><strong data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Preparation of Financial Statements</span></strong><p data-dcnode-id="2363"></p><span data-dcnode-id="2362" instrument_node=""> </span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Directors of every company shall prepare financial statements within 18 months of date of incorporation and subsequently, 6 months of financial year-end.</span></p></td><td data-dcnode-id="2356" valign="top"><span data-dcnode-id="2357" instrument_node="">Within 18 months of incorporation and subsequently 6 months of financial year-end</span></td><td data-dcnode-id="2353" valign="top"><span data-dcnode-id="2354" instrument_node="">S.248 of Companies Act</span></td></tr><tr data-dcnode-id="2331"><td align="center" data-dcnode-id="2347" valign="top"><span data-dcnode-id="2348" instrument_node="">1.7</span></td><td data-dcnode-id="2339" valign="top"><strong data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Duty to circulate copies of Financial Statements (FS)</span></strong><p data-dcnode-id="2343"></p><span data-dcnode-id="2342" instrument_node=""> </span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Every company shall send copy of FS for each financial year to every member of company, every person entitled to receive notice of general meetings, every auditor of company and every debenture holder of company on request being made, to the last known address provided to the company.</span></p></td><td data-dcnode-id="2336" valign="top"><span data-dcnode-id="2337" instrument_node="">Within 6 months of financial year-end for private company</span></td><td data-dcnode-id="2333" valign="top"><span data-dcnode-id="2334" instrument_node="">S.257 &amp; S.258 of the Companies Act</span></td></tr><tr data-dcnode-id="2308"><td align="center" data-dcnode-id="2327" valign="top"><span data-dcnode-id="2328" instrument_node="">1.8</span></td><td data-dcnode-id="2316" valign="top"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Duty to lodge financial statements and reports with the Registrar</span></strong><p data-dcnode-id="2323"></p><span data-dcnode-id="2322" instrument_node=""> </span><p data-dcnode-id="2317"><span data-dcnode-id="2321" instrument_node="">The financial statements and reports in the case of private company, has to be lodged with SSM via </span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.3ecpa.com.my/services/accounting/extensible-business-reporting-language-xbrl-reporting-services-malaysia/" title="XBRL format"><span data-dcnode-id="2320" instrument_node="">XBRL format</span></a><span data-dcnode-id="2318" instrument_node=""> within 30 days from the date the financial statements and reports are circulated to its members.</span></p></td><td data-dcnode-id="2313" valign="top"><span data-dcnode-id="2314" instrument_node="">Within 30 days from the date of circulation of financial statements and reports</span></td><td data-dcnode-id="2310" valign="top"><span data-dcnode-id="2311" instrument_node="">S.259 of the Companies Act</span></td></tr><tr data-dcnode-id="2275"><td align="center" data-dcnode-id="2304" valign="top"><span data-dcnode-id="2305" instrument_node="">1.9</span></td><td data-dcnode-id="2283" valign="top"><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Audited Financial Statements</span></strong><p data-dcnode-id="2300"></p><span data-dcnode-id="2299" instrument_node=""> </span><p data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Every company is required to circulate its audited financial statements to shareholders and auditors unless the companies are exempted based on the Practice Directive entitled “</span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.3ecpa.com.my/resources/corporate-compliance-requirement/qualifying-criteria-for-audit-exemption-for-malaysia-private-limited-companies/" title="Qualifying Criteria for Audit Exemption for Certain Categories of Private Companies"><span data-dcnode-id="2297" instrument_node="">Qualifying Criteria for Audit Exemption for Certain Categories of Private Companies</span></a><span data-dcnode-id="2295" instrument_node="">” issued by SSM.</span></p><span data-dcnode-id="2293" instrument_node=""> </span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">The following companies are eligible for audit exemption:-</span></p><span data-dcnode-id="2290" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2284"><span data-dcnode-id="2289" instrument_node="">(a) dormant companies</span><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node=""> (b) zero-revenue companies</span><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node=""> (c) threshold-qualified companies</span></p></td><td data-dcnode-id="2280" valign="top"><span data-dcnode-id="2281" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2277" valign="top"><span data-dcnode-id="2278" instrument_node="">S. 267(2) of the Companies Act &amp; SSM Practice Directive 3/2017</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="2264"><td align="center" data-dcnode-id="2270" valign="top"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">2.0</span></strong></td><td colspan="3" data-dcnode-id="2266" width="92%"><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Directors’ duties and prohibition under the Companies Act 2016</span></strong></td></tr><tr class="nitro-offscreen" data-dcnode-id="2244"><td align="center" data-dcnode-id="2260" valign="top"><span data-dcnode-id="2261" instrument_node="">2.1</span></td><td data-dcnode-id="2252" valign="top"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Disclosure of interest in contracts, property, offices, etc</span></strong><p data-dcnode-id="2256"></p><span data-dcnode-id="2255" instrument_node=""> </span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Any director (including person connected with that director) who is directly or indirectly interested in a contract or proposed contract with the company shall as soon as possible as practicable, declare the nature of his interest at the meeeting of the Board of Directors. The interested director must refrain from voting at the contract or proposed contract.</span></p></td><td data-dcnode-id="2249" valign="top"><span data-dcnode-id="2250" instrument_node="">Immediate</span></td><td data-dcnode-id="2246" valign="top"><span data-dcnode-id="2247" instrument_node="">S.221 of Companies Act</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="2217"><td align="center" data-dcnode-id="2240" valign="top"><span data-dcnode-id="2241" instrument_node="">2.2</span></td><td data-dcnode-id="2225" valign="top"><strong data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Loans to director &amp; prohibition of loans to persons connected with directors</span></strong><p data-dcnode-id="2236"></p><span data-dcnode-id="2235" instrument_node=""> </span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">A company (other than an exempt private company) shall not make a loan to a director of the company or a related company or person connected with a director.</span></p><span data-dcnode-id="2232" instrument_node=""> </span><p data-dcnode-id="2229"><em data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Note : An exempt private company (“EPC”) means a private company in shares of which no beneficial interest is held directly or indirectly by any corporation and which has not more than twenty members none of whom is a corporation. </span></em></p><span data-dcnode-id="2228" instrument_node=""> </span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">&nbsp;</span></p></td><td data-dcnode-id="2222" valign="top"><span data-dcnode-id="2223" instrument_node="">Immediate</span></td><td data-dcnode-id="2219" valign="top"><span data-dcnode-id="2220" instrument_node="">S.224 &amp; S. 225 of Companies Act</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="2197"><td align="center" data-dcnode-id="2213" valign="top"><span data-dcnode-id="2214" instrument_node="">2.3</span></td><td data-dcnode-id="2205" valign="top"><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">General duty to make disclosure</span></strong><p data-dcnode-id="2209"></p><span data-dcnode-id="2208" instrument_node=""> </span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">A director shall give notice in writing to the company in respect of particulars of any change relating to shares, debentures, participatory interest, rights, options and contracts in the company or in related corporation</span></p></td><td data-dcnode-id="2202" valign="top"><span data-dcnode-id="2203" instrument_node="">Within 14 days from occurrence of event</span></td><td data-dcnode-id="2199" valign="top"><span data-dcnode-id="2200" instrument_node="">S.219 of Companies Act</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="2177"><td align="center" data-dcnode-id="2193" valign="top"><span data-dcnode-id="2194" instrument_node="">2.4</span></td><td data-dcnode-id="2185" valign="top"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Any changes of particulars of director, manager and secretary</span></strong><p data-dcnode-id="2189"></p><span data-dcnode-id="2188" instrument_node=""> </span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Any changes in the name, nationality, residential address, service address, business occupation, particulars of other directorships of public companies or its subsidiaries, IC/Passport number of directors including date of resignation, removal, retirement, not re-elected and death. In case of death, to provide death certificate.</span></p></td><td data-dcnode-id="2182" valign="top"><span data-dcnode-id="2183" instrument_node="">Within 14 days from the date of change</span></td><td data-dcnode-id="2179" valign="top"><span data-dcnode-id="2180" instrument_node="">S.58 of Companies Act</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="2157"><td align="center" data-dcnode-id="2173" valign="top"><span data-dcnode-id="2174" instrument_node="">2.5</span></td><td data-dcnode-id="2165" valign="top"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Any changes to the Business Address and/or Nature of Business</span></strong><p data-dcnode-id="2169"></p><span data-dcnode-id="2168" instrument_node=""> </span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrumen nt (YA) from the date of commencement of operations exempted. Nevertheless, it is advisable to submit the Form CP204 notifying the IRB of its SME status without having to state the amount of ETP to avoid any penalty for under-estimation of tax or penalty for non-submission being wrongly imposed by the IRB.</span><p data-dcnode-id="1991"></p><span data-dcnode-id="1990" instrument_node=""> </span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Third year of assessment onwards: 30 days before the beginning of the basis period</span></p></td></tr><tr class="nitro-offscreen" data-dcnode-id="1968"><td align="center" data-dcnode-id="1981" valign="top"><span data-dcnode-id="1982" instrument_node="">4.3</span></td><td data-dcnode-id="1973" valign="top"><span data-dcnode-id="1979" instrument_node="">For companies (except SME) which first commence operations</span><p data-dcnode-id="1978"></p><span data-dcnode-id="1977" instrument_node=""> </span><p data-dcnode-id="1974"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Generally, SME refer to resident companies that has a paid-up capital in respect of ordinary shares of RM2.5mil and less</span></em></p></td><td colspan="2" data-dcnode-id="1970" valign="top"><span data-dcnode-id="1971" instrument_node="">Within 3 months from date of commencement of operations only if the basis period for that year is not less than 6 months</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="1954"><td align="center" data-dcnode-id="1964" valign="top"><span data-dcnode-id="1965" instrument_node="">4.4</span></td><td data-dcnode-id="1959" valign="top"><strong data-dcnode-id="1960"><u data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Submission of revised estimate of tax payable</span></u></strong></td><td colspan="2" data-dcnode-id="1956" valign="top"><span data-dcnode-id="1957" instrument_node="">You can submit the CP 204A to revise the estimate of tax payable in the sixth or/and ninth month of the basis period</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="1936"><td align="center" data-dcnode-id="1950" valign="top"><span data-dcnode-id="1951" instrument_node="">4.5</span></td><td data-dcnode-id="1941" valign="top"><strong data-dcnode-id="1946"><u data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Submission of income tax return</span></u></strong><p data-dcnode-id="1945"></p><span data-dcnode-id="1944" instrument_node=""> </span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">(must be prepared based on audited accounts w.e.f YA 2014)</span></p></td><td colspan="2" data-dcnode-id="1938" valign="top"><span data-dcnode-id="1939" instrument_node="">You must submit Form e-C within 7 months from the date following the close of its accounting period</span></td></tr><tr class="nitro-offscreen" data-dcnode-id="1925"><td align="center" data-dcnode-id="1931" valign="top"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">5.0</span></strong></td><td colspan="3" data-dcnode-id="1927" width="92%"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Obligations under Sales Tax Act 2018 and Service Tax Act 2018</span></strong></td></tr><tr class="nitro-offscreen" data-dcnode-id="1869"><td align="center" data-dcnode-id="1921" valign="top"><span data-dcnode-id="1922" instrument_node="">5.1</span></td><td data-dcnode-id="1877" valign="top"><strong data-dcnode-id="1917"><u data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Registering for SST</span></u></strong><p data-dcnode-id="1916"></p><span data-dcnode-id="1915" instrument_node=""> </span><p data-dcnode-id="1911"><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Compulsory&nbsp;</span></strong><span data-dcnode-id="1912" instrument_node="">if annual turnover exceeding RM500,000 which can be determined based on either</span></p><span data-dcnode-id="1910" instrument_node=""> </span><ul data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node=""> </span><li data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">The total value of taxable goods or services of the current month and the previous 11 months, or</span></li><span data-dcnode-id="1906" instrument_node=""> </span><li data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The total value of taxable goods or services of the current month and the next 11 months</span></li><span data-dcnode-id="1903" instrument_node=""> </span></ul><span data-dcnode-id="1901" instrument_node=""> </span><p data-dcnode-id="1897"><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Voluntary Registration&nbsp;</span></strong><span data-dcnode-id="1898" instrument_node="">is allowable but subject to the approval by Director General.</span></p><span data-dcnode-id="1896" instrument_node=""> </span><p data-dcnode-id="1893"><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Who must register</span></strong></p><span data-dcnode-id="1892" instrument_node=""> </span><p data-dcnode-id="1888"><strong data-dcnode-id="1889"><u data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Sales tax</span></u></strong></p><span data-dcnode-id="1887" instrument_node=""> </span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Any person who engaged in the manufacturing of taxable goods in the course of business.</span></p><span data-dcnode-id="1884" instrument_node=""> </span><p data-dcnode-id="1878"><strong data-dcnode-id="1881"><u data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Service tax</span></u></strong><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node=""> Any person who provides any taxable services.</span></p></td><td data-dcnode-id="1874" valign="top"><span data-dcnode-id="1875" instrument_node="">At the end of the month where n data-dcnode-id="1836" instrument_node="">5.3</span></td><td data-dcnode-id="1824" valign="top"><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Imported Taxable Services</span></strong><p data-dcnode-id="1831"></p><span data-dcnode-id="1830" instrument_node=""> </span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Effective from 1 January 2019, the imported taxable service is subject to service tax.</span></p><span data-dcnode-id="1827" instrument_node=""> </span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">This apply to both the registrant and non-registrant.</span></p></td><td data-dcnode-id="1804" valign="top"><strong data-dcnode-id="1820"><u data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">For registrant</span></u></strong><p data-dcnode-id="1819"></p><span data-dcnode-id="1818" instrument_node=""> </span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">to declare the tax in Form SST-02 and make payment as per taxable period.</span></p><span data-dcnode-id="1815" instrument_node=""> </span><p data-dcnode-id="1811"><strong data-dcnode-id="1812"><u data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">For non-registrant </span></u></strong></p><span data-dcnode-id="1810" instrument_node=""> </span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">the tax is due when the payment is made or invoice is received for the service, whichever is earlier.</span></p><span data-dcnode-id="1807" instrument_node=""> </span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">The tax should be declared in Form SST-02A and the payment should be made not later than the last day of the month following the month when the tax is due.</span></p></td><td data-dcnode-id="1801" valign="top"><span data-dcnode-id="1802" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="1794" instru
