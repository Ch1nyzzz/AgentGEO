</span></div></div></div><div class="uk-sticky" data-dcnode-id="767" style="z-index: 1;" uk-sticky="offset: 100; bottom: #body;"><h4 class="uk-margin-small-bottom" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Contents</span></h4><ul class="uk-nav uk-nav-default uk-link-text" data-dcnode-id="768" uk-scrollspy-nav="closest: li; scroll: true;offset:100"><li class="uk-active" data-dcnode-id="784"><a data-dcnode-id="785" href="#part1" uk-scroll="offset:100;"><span data-dcnode-id="786" instrument_node="">Company set up requirements</span></a></li><li data-dcnode-id="781"><a data-dcnode-id="782" href="#part2" uk-scroll="offset:100;"><span data-dcnode-id="783" instrument_node="">Ongoing business compliance requirements</span></a></li><li data-dcnode-id="778"><a data-dcnode-id="779" href="#part3" uk-scroll="offset:100;"><span data-dcnode-id="780" instrument_node="">Accounting &amp; tax compliance requirements</span></a></li><li data-dcnode-id="775"><a data-dcnode-id="776" href="#part4" uk-scroll="offset:100;"><span data-dcnode-id="777" instrument_node="">Obtaining business licenses</span></a></li><li data-dcnode-id="772"><a data-dcnode-id="773" href="#part5" uk-scroll="offset:100;"><span data-dcnode-id="774" instrument_node="">Employment law</span></a></li><li data-dcnode-id="769"><a data-dcnode-id="770" href="#part6" uk-scroll="offset:100;"><span data-dcnode-id="771" instrument_node="">Conclusion</span></a></li></ul></div><div class="uk-sticky-placeholder" data-dcnode-id="766" hidden="" style="height: 295px; margin: 0px;"></div></div></div><div class="uk-width-3-4@m" data-dcnode-id="286"><div class="uk-panel uk-hidden@m uk-margin" data-dcnode-id="741" id="template-kyFUZLnv#1-0-1-0" style="visibility: hidden;" uk-scrollspy-class=""><div class="uk-alert uk-padding" data-dcnode-id="742"><h4 class="uk-margin-small-bottom" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Contents</span></h4><ul class="uk-nav uk-nav-default uk-link-text" data-dcnode-id="743"><li data-dcnode-id="759"><a data-dcnode-id="760" href="#part1" uk-scroll="offset:100;"><span data-dcnode-id="761" instrument_node="">Company set up requirements</span></a></li><li data-dcnode-id="756"><a data-dcnode-id="757" href="#part2" uk-scroll="offset:100;"><span data-dcnode-id="758" instrument_node="">Ongoing business compliance requirements</span></a></li><li data-dcnode-id="753"><a data-dcnode-id="754" href="#part3" uk-scroll="offset:100;"><span data-dcnode-id="755" instrument_node="">Accounting &amp; tax compliance requirements</span></a></li><li data-dcnode-id="750"><a data-dcnode-id="751" href="#part4" uk-scroll="offset:100;"><span data-dcnode-id="752" instrument_node="">Obtaining business licenses</span></a></li><li data-dcnode-id="747"><a data-dcnode-id="748" href="#part5" uk-scroll="offset:100;"><span data-dcnode-id="749" instrument_node="">Employment law</span></a></li><li data-dcnode-id="744"><a data-dcnode-id="745" href="#part6" uk-scroll="offset:100;"><span data-dcnode-id="746" instrument_node="">Conclusion</span></a></li></ul></div></div><div class="uk-panel uk-margin-remove-vertical uk-scrollspy-inview" data-dcnode-id="425" id="body" style="" uk-scrollspy-class=""><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">There are a number of business compliances for Malaysian companies, and you must satisfy the requirements in order to legally and correctly establish your company in Malaysia according to the Malaysian law.</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">We have put together a list of the incorporation requirements and the on-going compliance requirements you will need to follow.</span></p><h2 data-dcnode-id="735" id="part1"><span data-dcnode-id="736" instrument_node="">What are the company set up requirements in Malaysia?</span></h2><h3 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Company name</span></h3><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">The company name should be submitted through the&nbsp;</span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssm.com.my/Pages/Home.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="731" instrument_node="">Companies Commission of Malaysia</span></a><span data-dcnode-id="729" instrument_node="">&nbsp;(SSM) online system with a fee of RM 50.</span></p><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">Once the name is approved, it will be reserved for three months from the date of approval. There are certain&nbsp;</span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssm.com.my/Pages/Legal_Framework/PDF%2520Tab%25202/guidelines_on_names.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="726" instrument_node="">guidelines</span></a><span data-dcnode-id="724" instrument_node="">&nbsp;on the company name you must follow in order to have your name approved.</span></p><h3 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Registered office</span></h3><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">A Malaysian company must have a registered office address to keep the company’s statutory documents, books and files. The company must inform the SSM of the location of the registered office and submit&nbsp;</span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssm.com.my/acts/fscommand/pua0173y1966sc059.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="719" instrument_node="">form 44</span></a><span data-dcnode-id="717" instrument_node="">&nbsp;to the SSM.</span></p><h3 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Directors</span></h3><p data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">Every company must have at least </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/guides/director-roles-duties/"><span data-dcnode-id="712" instrument_node="">one director</span></a><span data-dcnode-id="710" instrument_node=""> and be at least 18 years old. The director must have a place of residence in Malaysia.</span></p><h3 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Shareholders</span></h3><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">A Malaysian company must have a minimum of one shareholder. The shareholder can be an individual or a body corporate, and must be aged 18 or above.</span></p><div class="tm-grid-expand uk-grid-margin uk-grid" data-dcnode-id="667" style="background-color: #FDE6D2; border-radius: 5px; padding: 25px 25px 25px 0; margin-left:0;" uk-grid=""><div class="uk-grid-item-match uk-flex-middle uk-width-2-3@s uk-first-column" data-dcnode-id="673"><div class="uk-panel uk-width-1-1" data-dcnode-id="674"><h4 data-dcnode-id="701"><span data-dcnode-id="704" instrument_node="">Never miss an important deadline with our detailed compliance calendar</span><span class="acc-orange" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">.</span></span></h4><ul class="uk-list" data-dcnode-id="679"><li class="el-item" data-dcnode-id="694"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="695" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="699"><img alt="" class="el-image" data-dcnode-id="700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="696"><div class="el-content uk-panel" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Get a clear picture of all the accounting, tax and HR deadlines</span></div></div></div></li><li class="el-item" data-dcnode-id="687"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="688" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="692"><img alt="" class="el-image" data-dcnode-id="693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="689"><div class="el-content uk-panel" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Avoid penalties and late fees</span></div></div></div></li><li class="el-item" data-dcnode-id="680"><div class="uk-grid-small uk-child-width-expand uk-flex-nowrap uk-grid" data-dcnode-id="681" uk-grid=""><div class="uk-width-auto uk-first-column" data-dcnode-id="685"><img alt="" class="el-image" data-dcnode-id="686" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/wp-content/uploads/check.svg&amp;raw" width="20"></div><div data-dcnode-id="682"><div class="el-content uk-panel" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Keep your accountants or accounting firm accountable</span></div></div></div></li></ul><div class="uk-margin" data-dcnode-id="675"><span data-dcnode-id="678" instrument_node=""> </span><a class="el-content uk-button uk-button-primary" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/compliance-calendar/"><span data-dcnode-id="677" instrument_node="">Download now</span></a></div></div></div><div class="uk-grid-item-match uk-flex-middle uk-width-1-3@s" data-dcnode-id="668"><div class="uk-panel uk-width-1-1" data-dcnode-id="669"><div class="uk-margin" data-dcnode-id="670"><span data-dcnode-id="672" instrument_node=""> </span><img alt="Compliance Calendar" class="el-image uk-border-rounded uk-box-shadow-medium" data-dcnode-id="671" data-height="700" data-width="495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/wp-content/uploads/Compliance-calendar-cover-MY.png&amp;raw"></div></div></div></div><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Company secretary</span></h3><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">A company must have a minimum of one </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/business/company-secretary/"><span data-dcnode-id="661" instrument_node="">company secretary</span></a><span data-dcnode-id="659" instrument_node=""> who is a member of any professional body or licensed by the SSM.</span></p><h3 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Data protection and data protection officer</span></h3><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The Malaysian law does not have requirements to appoint a data protection officer. The Personal Data Protection Department’s (PDPD) main responsibility is to control the processing of personal data of individuals who are involved in commercial transactions and avoid the misuse of any personal data.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">It is required that some entities have to register under the PDPA, and these entities are:</span></p><ul data-dcnode-id="631"><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Banking and financial institutions</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Direct selling</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Education</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Health institutions</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Insurance agencies</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Real estate</span></li><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Services (ie accounting, architecture, audit, engineering, employment agencies, legal, retailer and wholesaler)</span></li><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Tourism and hospitality</span></li><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Transportation</span></li><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Utilities</span></li></ul><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">If you want to register under the PDPA Act of 2010, you will need the following documents:</span></p><ul data-dcnode-id="622"><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Documents required during company establishment if you are another type of company</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Memorandum and articles of association for public and private companies</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Registration fees payment</span></li></ul><h3 data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Display of company name and business registration number</span></h3><ol data-dcnode-id="595"><li data-dcnode-id="611"><span data-dcnode-id="619" instrument_node="">A company must display the registered name and registration number at:</span><ol data-dcnode-id="612" type="a"><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">The registered office</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Every place the business is carried on</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Every place where the books are kept</span></li></ol></li><li data-dcnode-id="596"><span data-dcnode-id="610" instrument_node="">A company must reveal the registered name and registration number on:</span><ol data-dcnode-id="597" type="a"><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Business letters, notices and other publications</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Websites</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Bills of exchange, promissory notes, endorsements and order forms</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Cheques</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Order invoices and other payment receipts</span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">All forms of business correspondence and documentation</span></li></ol></li></ol><h2 data-dcnode-id="593" id="part2"><span data-dcnode-id="594" instrument_node="">What are the ongoing business compliance requirements?</span></h2><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Keeping of company registers and records</span></h3><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Documents to be kept at a company’s registered office are:</span></p><ul data-dcnode-id="566"><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">The notice of registration issued under section 15</span></li><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The constitution of the company (if any)</span></li><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Certificates given under the Companies Act or corresponding with the previous law (if any)</span></li><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">All registers, books, records and documents as required under the Companies Act</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Minutes of all meeting of members and resolution of members</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Minutes of all meetings and resolutions of the board and committees of the board</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Copies of all written communication to members or holders of the same class of shares</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Copies of all financial statements and group financial statement</span></li><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The accounting records of the company required under section 245 of the Companies Act</span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Copies of all instruments creating or evidencing charges as required under section 357</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Other documents required to be kept by the Registrar</span></li></ul><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">If there is a change to the address that the documents are kept, the company has to notify the Registrar within 14 days of the change.</span></p><h3 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Annual general meeting (AGM)</span></h3><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Every public and private company must hold an annual general meeting every calendar year. The annual general meeting should be held:</span></p><ul data-dcnode-id="555"><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Within six months of the company’s financial year-end</span></li><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Not more than 15 months after the last preceding annual general meeting</span></li></ul><h3 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Filing of annual returns</span></h3><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">A company must file annual returns with the Registrar every calendar year for not later than 30 days from the anniversary of its incorporation.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Annual returns of a company must have:</span></p><ul data-dcnode-id="530"><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The address of the registered office</span></li><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The nature of the business</span></li><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The address of the places where the business is carried on, including branches</span></li><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">The address of the places that the register of members are kept, if not kept at the registered office</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Summary of the shareholding structure, including debentures</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The total amount of indebtedness</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The particulars of directors, managers, secretaries and auditors</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">List of its members</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Other information the Registrar may require</span></li></ul><h2 data-dcnode-id="528" id="part3"><span data-dcnode-id="529" instrument_node="">Accounting and tax compliance requirements</span></h2><p data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">Below is an overview of accounting &amp; tax requirements. To dive deeper into accounting, you may find our </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/guides/accounting-malaysia/"><span data-dcnode-id="526" instrument_node="">accounting compliance requirements</span></a><span data-dcnode-id="524" instrument_node=""> guide useful.</span></p><h2 data-dcnode-id="521"></h2><h3 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">What is the date of financial year-end?</span></h3><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">According to the Companies Act 2016, there is not a specified date of the financial year-end for companies. The date is entirely up to the decision of the company.</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Every company is required to prepare financial statements for not more than 18 months from the date of incorporation and submit the financial statements to the SSM and the Inland Revenue Board of Malaysia.</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Most companies choose their financial year-end as the last day of the calendar year, 31 December, or on the last day of any quarter, 31 March, 30 June or 30 September.</span></p><h3 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Safekeeping of proper accounts and records</span></h3><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">All companies are required to maintain accounting and other records to explain the transactions and financial position of the company. The records must provide a true and fair view of the company’s financial statements.</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">All transactions must be recorded within 60 days of the completion, and the records must be kept for seven years.</span></p><h3 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Appointment of auditor</span></h3><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Every company must appoint an auditor before the first annual general meeting. The board of directors will appoint the first auditor at least 30 days before the end of the period for the submission of the first financial statements.</span></p><h3 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">What is the 2021 deadline for income tax return?</span></h3><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">All companies must file an annual tax return. The extended deadline for filing the returns in the year 2020 is:</span></p><ul data-dcnode-id="494"><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Manual form: 31 July 2021</span></li><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">E-Filing: 31 August 2021</span></li></ul><h2 data-dcnode-id="491" id="part4"><span data-dcnode-id="493" instrument_node="">Obtaining business licenses </span></h2><p data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">There are three types of </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malaysia.acclime.com/guides/business-licensing/"><span data-dcnode-id="489" instrument_node="">business licenses</span></a><span data-dcnode-id="487" instrument_node=""> in Malaysia:</span></p><ol data-dcnode-id="479"><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">General licenses: The necessary licenses you will need when you establish a business in Malaysia</span></li><li data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Sector/industry-specific licenses: Licenses needed for a specific industry or sector specified by the Malaysian government</span></li><li data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Activity-specific licenses: This license regulates specific activities and can be applied to more than one industry or sector</span></li></ol><h2 data-dcnode-id="477" id="part5"><span data-dcnode-id="478" instrument_node="">Employment law in Malaysia</span></h2><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">The Employment Act, 1955 outlines terms and conditions available to employees in Malaysia. This includes annual leaves, sick leaves, overtime payment and more.</span></p><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">An employee in Malaysia is entitled to:</span></p><ul data-dcnode-id="434"><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Sixty days of paid maternity leave</span></li><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Working hours not exceeding eight hours a day or 48 hours a week</span></li><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Paid holidays</span></li><li data-dcnode-id="460"><span data-dcnode-id="466" instrument_node="">Less than two years of service:</span><ul data-dcnode-id="461"><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Eight days of paid annual leaves</span></li><li data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">14 days paid sick leaves</span></li></ul></li><li data-dcnode-id="453"><span data-dcnode-id="459" instrument_node="">Two or more but less than five years of service:</span><ul data-dcnode-id="454"><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">12 days of paid annual leaves</span></li><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">18 days of paid sick leaves</span></li></ul></li><li data-dcnode-id="446"><span data-dcnode-id="452" instrument_node="">Over five years of service:</span><ul data-dcnode-id="447"><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">16 days of paid annual leaves</span></li><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">22 days of paid sick leaves</span></li></ul></li><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Up to 60 days leave when hospitalisation is necessary</span></li><li data-dcnode-id="435"><span data-dcnode-id="443" instrument_node="">Payment for overtime work:</span><ul data-dcnode-id="436"><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Normal working days – one and a half times the hourly rate of pay</span></li><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Rest days – two times the hourly rate of pay</span></li><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Public holidays – three times the hourly rate of pay</span></li></ul></li></ul><h2 data-dcnode-id="432" id="part6"><span data-dcnode-id="433" instrument_node="">Conclusion</span></h2><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The requirements for the business compliances for Malaysian companies, as listed above, should be met to avoid any problems that could happen in the future.</span></p><p data-dcnode-id="426"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Acclime’s</span></strong><span data-dcnode-id="427" instrument_node="">&nbsp;professional team will ensure that your company complies with all of the necessary requirements.</span></p></div><div class="uk-panel uk-hidden@m uk-margin" data-dcnode-id="287" id="template-kyFUZLnv#1-0-1-2" style="visibility: hidden;" uk-scrollspy-class=""><p data-dcnode-id="422" style="padding 10px;"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Share this article</span></strong></p><div class="elfsight-widget-social-share-buttons elfsight-widget eapps-social-share-buttons eapps-widget eapps-social-share-buttons-location-inline eapps-social-share-buttons-position-left eapps-social-share-buttons-text-hide eapps-social-share-buttons-shape-circle eapps-social-share-buttons-style-default eapps-social-share-buttons-icon-color-white eapps-social-share-buttons-bg-color-native eapps-social-share-buttons-icon-color-on-hover-white eapps-social-share-buttons-bg-color-on-hover-black eapps-social-share-buttons-animation-none" data-dcnode-id="288" data-elfsight-widget-id="elfsight-social-share-buttons-1" id="eapps-social-
