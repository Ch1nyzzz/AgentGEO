uirements of Audited Accounts:"><span data-dcnode-id="1870" instrument_node="">Requirements of Audited Accounts:</span></a></li></ul></li><li data-dcnode-id="1863"><a data-dcnode-id="1864" href="#Dormant_Company" title="Dormant Company"><span data-dcnode-id="1865" instrument_node="">Dormant Company</span></a></li><li data-dcnode-id="1860"><a data-dcnode-id="1861" href="#Requirements_for_an_Annual_Return" title="Requirements for an Annual Return"><span data-dcnode-id="1862" instrument_node="">Requirements for an Annual Return</span></a></li><li data-dcnode-id="1857"><a data-dcnode-id="1858" href="#Filing_Financial_Statements_in_XBRL_format" title="Filing Financial Statements in XBRL format"><span data-dcnode-id="1859" instrument_node="">Filing Financial Statements in XBRL format</span></a></li><li data-dcnode-id="1854"><a data-dcnode-id="1855" href="#Application_for_Time_Extension" title="Application for Time Extension"><span data-dcnode-id="1856" instrument_node="">Application for Time Extension</span></a></li><li data-dcnode-id="1844"><a data-dcnode-id="1852" href="#Late_AGM_or_Annual_Return_may_result_in_High_Penalty_Fee_Summon_andor_Arrest_Warrant" title="Late AGM or Annual Return&nbsp;may result in High Penalty Fee, Summon and/or Arrest Warrant"><span data-dcnode-id="1853" instrument_node="">Late AGM or Annual Return&nbsp;may result in High Penalty Fee, Summon and/or Arrest Warrant</span></a><ul data-dcnode-id="1845"><li data-dcnode-id="1849"><a data-dcnode-id="1850" href="#Prosecutorial_action" title="Prosecutorial action"><span data-dcnode-id="1851" instrument_node="">Prosecutorial action</span></a></li><li data-dcnode-id="1846"><a data-dcnode-id="1847" href="#Other_enforcement_actions" title="Other enforcement actions"><span data-dcnode-id="1848" instrument_node="">Other enforcement actions</span></a></li></ul></li><li data-dcnode-id="1841"><a data-dcnode-id="1842" href="#Certificate_of_Compliance" title="Certificate of Compliance"><span data-dcnode-id="1843" instrument_node="">Certificate of Compliance</span></a></li><li data-dcnode-id="1838"><a data-dcnode-id="1839" href="#Company_Seal" title="Company Seal"><span data-dcnode-id="1840" instrument_node="">Company Seal</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="1832" instrument_node="">
</span><h1 data-dcnode-id="1829"><span class="ez-toc-section" data-dcnode-id="1830" id="Corporate_Compliance_Requirements_Compliance_with_ACRA"><span data-dcnode-id="1831" instrument_node="">Corporate Compliance Requirements – Compliance with ACRA</span></span></h1><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1825" instrument_node="">
</span><h2 data-dcnode-id="1822"><span class="ez-toc-section" data-dcnode-id="1823" id="Requirement_for_Register_of_Registrable_Controllers_RORC"><span data-dcnode-id="1824" instrument_node="">Requirement for Register of Registrable Controllers (RORC)</span></span></h2><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1801"><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/private-limited-company/"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Companies</span></strong></a><span data-dcnode-id="1817" instrument_node="">, </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/foreign-company-representative-office/"><strong data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">foreign companies</span></strong></a><span data-dcnode-id="1813" instrument_node=""> and </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/limited-liability-partnership/"><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">limited liability partnerships (LLPs)</span></strong></a><span data-dcnode-id="1809" instrument_node=""> (unless exempted) are expected by </span><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acra.gov.sg/" rel="noopener" target="_blank"><span data-dcnode-id="1808" instrument_node="">ACRA</span></a><span data-dcnode-id="1806" instrument_node=""> to maintain information on beneficial ownership in the form of a </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acra.gov.sg/compliance/register-of-registrable-controllers" rel="noopener" target="_blank"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Registry of Registered Controllers (RORC)</span></strong></a><span data-dcnode-id="1802" instrument_node=""> and upon request, to make this information accessible to public authorities.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><h3 data-dcnode-id="1797"><span class="ez-toc-section" data-dcnode-id="1798" id="Who_can_be_a_Controller_of_a_Company"><span data-dcnode-id="1799" instrument_node="">Who can be a “Controller” of a Company?</span></span></h3><span data-dcnode-id="1796" instrument_node="">
</span><ol data-dcnode-id="1767"><span data-dcnode-id="1795" instrument_node="">
</span><li data-dcnode-id="1784"><span data-dcnode-id="1794" instrument_node="">A beneficiary / controller with a “substantial interest” is defined as a natural or legal person who has the following:
</span><ul data-dcnode-id="1786"><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">a holding of more than 25% of the shares</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">shares representing more than 25% of the total voting rights of the company</span></li><span data-dcnode-id="1787" instrument_node="">
</span></ul><span data-dcnode-id="1785" instrument_node="">
</span></li><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1782" instrument_node="">A beneficial owner/controller who exercises significant control over an entity that:
</span><ul data-dcnode-id="1771"><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">has the right to appoint or remove directors who hold the majority of the voting rights at meetings of the directors;</span></li><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">holds more than 25% of the voting rights in matters to be decided by a vote of the members of the corporation; or</span></li><span data-dcnode-id="1775" instrument_node="">
</span><li data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">has significant influence or control over the company or has the right to do so.</span></li><span data-dcnode-id="1772" instrument_node="">
</span></ul><span data-dcnode-id="1770" instrument_node="">
</span></li><span data-dcnode-id="1768" instrument_node="">
</span></ol><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h2 data-dcnode-id="1760"><span class="ez-toc-section" data-dcnode-id="1761" id="Requirement_for_Businesses_to_Maintain_a_Registry_of_Nominee_Directors"><span data-dcnode-id="1762" instrument_node="">Requirement for Businesses to Maintain a Registry of Nominee Directors</span></span></h2><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">Companies are required to maintain a register of directors nominated by them, which contains details of the </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/appointing-a-nominee-director/"><span data-dcnode-id="1757" instrument_node="">nominee directors</span></a><span data-dcnode-id="1755" instrument_node=""> of the corporation.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">A director is a nominee director if he or she has the formal or informal duty to act upon the instructions, directions or wishes of another person.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1747" instrument_node="">
</span><h2 data-dcnode-id="1744"><span class="ez-toc-section" data-dcnode-id="1745" id="Statutory_Requirements_for_Annual_General_Meeting_AGM_and_the_Submission_of_Annual_Returns_AR_for_Private_Companies_ending_on_or_after_31_August_2020"><span data-dcnode-id="1746" instrument_node="">Statutory Requirements for Annual General Meeting (AGM) and the Submission of Annual Returns (AR) for Private Companies ending on or after 31 August 2020</span></span></h2><span data-dcnode-id="1743" instrument_node="">
</span><h3 data-dcnode-id="1740"><span class="ez-toc-section" data-dcnode-id="1741" id="1_Scheduling_of_the_AGMs_and_filing_of_ARs"><span data-dcnode-id="1742" instrument_node="">1. Scheduling of the AGMs and filing of ARs</span></span></h3><span data-dcnode-id="1739" instrument_node="">
</span><ol data-dcnode-id="1695"><span data-dcnode-id="1738" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1737" instrument_node="">Participation in the </span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/annual-general-meeting/"><span data-dcnode-id="1736" instrument_node="">Annual General Meeting</span></a><span data-dcnode-id="1734" instrument_node="">
</span><ul data-dcnode-id="1726"><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">for listed companies: hold general meetings within 4 months of the fiscal year</span></li><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">for any other company: hold the Annual General Meeting within 6 months of the fiscal year</span></li><span data-dcnode-id="1727" instrument_node="">
</span></ul><span data-dcnode-id="1725" instrument_node="">
</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1697"><span data-dcnode-id="1722" instrument_node="">Filing of Annual Returns
</span><ul data-dcnode-id="1699"><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">for companies with share capital that maintain a register of branches outside Singapore: filing of Annual Returns within 6 months (if listed) or 8 months (if unlisted) after the financial year</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">for other companies: file Annual Returns within 5 months (if listed) or 7 months (if unlisted) after the fiscal year</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1714" instrument_node="">the Annual Return can only be filed:
</span><ul data-dcnode-id="1703"><span data-dcnode-id="1713" instrument_node="">
</span><li data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">after a general meeting has been held;</span></li><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">after the mailing of the financial statements, if the corporation is not required to hold a general meeting; or</span></li><span data-dcnode-id="1707" instrument_node="">
</span><li data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">after the fiscal year, when the corporation does not have to send the financial reports.</span></li><span data-dcnode-id="1704" instrument_node="">
</span></ul><span data-dcnode-id="1702" instrument_node="">
</span></li><span data-dcnode-id="1700" instrument_node="">
</span></ul><span data-dcnode-id="1698" instrument_node="">
</span></li><span data-dcnode-id="1696" instrument_node="">
</span></ol><span data-dcnode-id="1694" instrument_node="">
</span><h3 data-dcnode-id="1691"><span class="ez-toc-section" data-dcnode-id="1692" id="2_Exemption_for_private_companies_to_hold_AGMs_subject_to_specified_safeguards"><span data-dcnode-id="1693" instrument_node="">2. Exemption for private companies to hold AGMs subject to specified safeguards</span></span></h3><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1689" instrument_node="">Private companies are exempt from the obligation to hold a general meeting if they send their annual </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/compilation-of-financial-statement/"><span data-dcnode-id="1688" instrument_node="">financial statements</span></a><span data-dcnode-id="1686" instrument_node=""> to shareholders within 5 months of the fiscal year.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><ol data-dcnode-id="1673"><span data-dcnode-id="1683" instrument_node="">
</span><li data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">A shareholder who wishes to request the holding of a general meeting must notify the company holding the general meeting at least 14 days before the last day of the 6th month following the financial year.</span></li><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">The directors must hold a general meeting within 6 months of the financial year if a member of the company gives notice. The company may apply to the Registrar for an extension of the time to hold the meeting.</span></li><span data-dcnode-id="1677" instrument_node="">
</span><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Private companies are required to hold a general meeting to prepare annual accounts if a shareholder or an auditor requests within 14 days of the annual accounts being sent.</span></li><span data-dcnode-id="1674" instrument_node="">
</span></ol><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1667"><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/filing-for-dormant-company/"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Dormant companies</span></strong></a><span data-dcnode-id="1668" instrument_node=""> exempt from sending financial statements will not be required to hold an AGM, subject to the safeguards referred to above.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h3 data-dcnode-id="1663"><span class="ez-toc-section" data-dcnode-id="1664" id="3_In_order_to_prevent_companies_from_arbitrarily_changing_their_FYE_the_following_safeguards_are_put_in_place"><span data-dcnode-id="1665" instrument_node="">3. In order to prevent companies from arbitrarily changing their FYE, the following safeguards are put in place:</span></span></h3><span data-dcnode-id="1662" instrument_node="">
</span><ol data-dcnode-id="1633"><span data-dcnode-id="1661" instrument_node="">
</span><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Companies must inform the Registrar of their FYE at the time of incorporation and of any subsequent changes;</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1647"><span data-dcnode-id="1657" instrument_node="">Companies must apply to the Registrar for permission to change their financial year:
</span><ul data-dcnode-id="1649"><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">if the change in the financial year results in the financial year exceeding 18 months; or</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">if the financial year has been changed within the last five years; and</span></li><span data-dcnode-id="1650" instrument_node="">
</span></ul><span data-dcnode-id="1648" instrument_node="">
</span></li><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Only the current and previous fiscal year (provided that the statutory period for holding the meeting, filing the annual report and sending the financial statements has not expired) may be changed; and</span></li><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Unless otherwise approved by the Registrar, the fiscal year of a corporation shall not exceed 18 months in the year of its incorporation.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Corporations with an unusually long fiscal year (not 12 months) must notify ACRA by fiscal year change notification if they wish to avoid having to apply each year for fiscal year change approval.</span></li><span data-dcnode-id="1637" instrument_node="">
</span><li data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Existing companies shall have as the date of their fiscal year any date previously notified to the Registrar. In the absence of such notification, the anniversary of the date of incorporation shall be deemed by law to be their FYE. Companies may change their FYE by notifying ACRA before or after the new FYE laws come into effect.</span></li><span data-dcnode-id="1634" instrument_node="">
</span></ol><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1629" instrument_node="">
</span><h2 data-dcnode-id="1626"><span class="ez-toc-section" data-dcnode-id="1627" id="Statutory_requirements_for_AGM_and_filing_of_AR_for_Private_Companies_ending_before_31_August_2020"><span data-dcnode-id="1628" instrument_node="">Statutory requirements for AGM and filing of AR for Private Companies ending before 31 August 2020</span></span></h2><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Every company in Singapore is required to hold its Annual General Meeting (AGM) once per calendar year and its financial statements must be submitted to the AGM for shareholder approval.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node="">The </span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sso.agc.gov.sg/Act/CoA1967" rel="noopener" target="_blank"><span data-dcnode-id="1620" instrument_node="">Singapore Companies Act (Cap.50)</span></a><span data-dcnode-id="1618" instrument_node=""> requires each company to hold an annual general meeting:</span></p><span data-dcnode-id="1616" instrument_node="">
</span><ul data-dcnode-id="1605"><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">once per calendar year; and</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">within 15 months of the date of the last General Meeting; or</span></li><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">within 6 months after the end of the financial year, if earlier.</span></li><span data-dcnode-id="1606" instrument_node="">
</span></ul><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Exception: Newly founded companies are allowed to hold the first general meeting within 18 months of the date of foundation.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1598" instrument_node="">
</span><h2 data-dcnode-id="1595"><span class="ez-toc-section" data-dcnode-id="1596" id="Annual_General_Meeting_AGM"><span data-dcnode-id="1597" instrument_node="">Annual General Meeting (AGM)</span></span></h2><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">An AGM must be held physically anywhere in the world where the shareholders meet.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The following matters are to be discussed at an AGM:</span></p><span data-dcnode-id="1588" instrument_node="">
</span><ul data-dcnode-id="1568"><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Approval of the report/audit report of the directors</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Approval of the fees, remuneration and emoluments of the directors</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Re-elect the director(s) (if applicable)</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">For the renewal of the term of office of the statutory auditors</span></li><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Explain any dividends</span></li><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">To transact any other business</span></li><span data-dcnode-id="1569" instrument_node="">
</span></ul><span data-dcnode-id="1567" instrument_node="">
</span><h3 data-dcnode-id="1564"><span class="ez-toc-section" data-dcnode-id="1565" id="Requirement_for_Accounts"><span data-dcnode-id="1566" instrument_node="">Requirement for Accounts</span></span></h3><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">When a shareholders’ meeting is held, the directors of the corporation are required to provide the shareholders with the relevant documents, such as the financial statements of the corporation prepared in accordance with Singaporean accounting standards, consisting of:</span></p><span data-dcnode-id="1560" instrument_node="">
</span><ul data-dcnode-id="1537"><span data-dcnode-id="1559" instrument_node="">
</span><li data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Statement of the Directors</span></li><span data-dcnode-id="1556" instrument_node="">
</span><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Independent Auditors’ Report (if required)</span></li><span data-dcnode-id="1553" instrument_node="">
</span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Balance Sheet</span></li><span data-dcnode-id="1550" instrument_node="">
</span><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Profit and Loss statement</span></li><span data-dcnode-id="1547" instrument_node="">
</span><li data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Statement of Changes in Equity</span></li><span data-dcnode-id="1544" instrument_node="">
</span><li data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Cash Flow Statement</span></li><span data-dcnode-id="1541" instrument_node="">
</span><li data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Corresponding notes to the Financial Statements</span></li><span data-dcnode-id="1538" instrument_node="">
</span></ul><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Note: Section 201 of the Companies Act states that annual accounts may not be prepared more than six months after the date of the meeting.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><h3 data-dcnode-id="1530"><span class="ez-toc-section" data-dcnode-id="1531" id="Requirements_of_Audited_Accounts"><span data-dcnode-id="1532" instrument_node="">Requirements of Audited Accounts:</span></span></h3><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Criteria for exemption from audit:</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">For a company whose financial year begins before 1 July 2015:</span></p><span data-dcnode-id="1523" instrument_node="">
</span><ul data-dcnode-id="1512"><span data-dcnode-id="1522" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">the company has no shareholders;</span></li><span data-dcnode-id="1519" instrument_node="">
</span><li data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">the total number of individual shareholders must be less than 20; and</span></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">the company’s annual turnover must be less than $5 million.</span></li><span data-dcnode-id="1513" instrument_node="">
</span></ul><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">For a corporation with a fiscal year beginning on or after July 1, 2015, the corporation must have qualified as a small business for the last 2 consecutive fiscal years.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">A corporation will be considered a small business if (a) it is a private corporation in that fiscal year and (b) it meets at least 2 of the following 3 criteria in the last 2 consecutive fiscal years:</span></p><span data-dcnode-id="1505" instrument_node="">
</span><ol data-dcnode-id="1494"><span data-dcnode-id="1504" instrument_node="">
</span><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">its total annual revenues do not exceed $10 million;</span></li><span data-dcnode-id="1501" instrument_node="">
</span><li data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">its total assets do not exceed $10 million;</span></li><span data-dcnode-id="1498" instrument_node="">
</span><li data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">the number of employees does not exceed 50.</span></li><span data-dcnode-id="1495" instrument_node="">
</span></ol><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">For a company that is part of a group of companies to benefit from the exemption from auditing:</span></p><span data-dcnode-id="1490" instrument_node="">
</span><ol data-dcnode-id="1482"><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">the entity must qualify as a small company; and</span></li><span data-dcnode-id="1486" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">the whole group must be a “small group”.</span></li><span data-dcnode-id="1483" instrument_node="">
</span></ol><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">For a group to be a small group, it must meet at least 2 of the 3 quantitative criteria on a consolidated basis for the 2 financial years immediately following each other. An entity that meets the above requirements may prepare unaudited financial statements, commonly referred to as “unaudited financial statements”.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1473"><em data-dcnode-id="1474"><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Note:</span></strong><span data-dcnode-id="1475" instrument_node=""> A company is considered dormant during a period in which no accounting transactions take place. Dormant companies can be exempted from the obligation to prepare audited financial statements, but must continue to prepare unaudited financial statements.</span></em></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1466"><span class="ez-toc-section" data-dcnode-id="1467" id="Dormant_Company"><span data-dcnode-id="1468" instrument_node="">Dormant Company</span></span></h2><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">As of January 3, 2016, a dormant, unlisted company (which is not a subsidiary of a listed company) is exempt from the obligation to prepare financial statements if:</span></p><span data-dcnode-id="1462" instrument_node="">
</span><ol data-dcnode-id="1454"><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">the entity meets the test for tangible assets; and</span></li><span data-dcnode-id="1458" instrument_node="">
</span><li data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">the entity has been inactive since its inception or since the end of the previous financial year.</span></li><span data-dcnode-id="1455" instrument_node="">
</span></ol><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">The test for tangible assets is that the total assets of the corporation must not exceed US$500,000 at any time during the fiscal year. In the case of a parent company, the total consolidated assets of the Group may not exceed USD 500,000 at any time during the fiscal year.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Listed companies and their subsidiaries, as well as unlisted companies that do not meet the physical assets test, are required to prepare financial reports, but these reports are unaudited. This remains unchanged from the current situation.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1446" instrument_node="">Thinking of </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/strike-off-company-services/"><span data-dcnode-id="1445" instrument_node="">striking off your dormant company</span></a><span data-dcnode-id="1443" instrument_node=""> and </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/company-incorporation-packages/"><span data-dcnode-id="1442" instrument_node="">setting up a new private limited company</span></a><span data-dcnode-id="1440" instrument_node=""> or </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/business-limited-liability-partnership-packages/"><span data-dcnode-id="1439" instrument_node="">limited liability partnership</span></a><span data-dcnode-id="1437" instrument_node="">? Check out Timcole’s affordable incorporation and business set up packages.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1432" instrument_node="">
</span><h2 data-dcnode-id="1429"><span class="ez-toc-section" data-dcnode-id="1430" id="Requirements_for_an_Annual_Return"><span data-dcnode-id="1431" instrument_node="">Requirements for an Annual Return</span></span></h2><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Under the Companies Act, all locally incorporated companies are required to file their annual returns.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The following company information is required for filing annual returns:</span></p><span data-dcnode-id="1422" instrument_node="">
</span><ul data-dcnode-id="1390"><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Name and registration number</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Registered address</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Main activities</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Type of company during the year</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Summary of share capital and shares</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Recorded expenditure</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Information about company managers</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Information about shareholders</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Dates of the annual reports, the General Meeting and the annual accounts</span></li><span data-dcnode-id="1394" instrument_node="">
</span><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Balance sheets (XBRL format), if required</span></li><span data-dcnode-id="1391" instrument_node="">
</span></ul><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h2 data-dcnode-id="1383"><span class="ez-toc-section" data-dcnode-id="1384" id="Filing_Financial_Statements_in_XBRL_format"><span data-dcnode-id="1385" instrument_node="">Filing Financial Statements in XBRL format</span></span></h2><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1381" instrument_node="">Your Company would be required to file its </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/xbrl-filing-services/"><span data-dcnode-id="1380" instrument_node="">financial statements in XBRL format</span></a><span data-dcnode-id="1378" instrument_node=""> during the filing of the annual return, if your company is:</span></p><span data-dcnode-id="1376" instrument_node="">
</span><ul data-dcnode-id="1368"><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Insolvent (total assets – total liabilities = negative value)</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">It has at least one shareholder in the company for the year and is not dormant.</span></li><span data-dcnode-id="1369" instrument_node="">
</span></ul><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">All companies are required to keep proper accounting book records for 5 years. See flexible </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/book-keeping-services/"><span data-dcnode-id="1365" instrument_node="">bookkeeping packages</span></a><span data-dcnode-id="1363" instrument_node=""> here.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1358" instrument_node="">
</span><h2 data-dcnode-id="1355"><span class="ez-toc-section" data-dcnode-id="1356" id="Application_for_Time_Extension"><span data-dcnode-id="1357" instrument_node="">Application for Time Extension</span></span></h2><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">If your company needs more time to meet the requirements to hold the General Meeting or filing of Annual Returns, you can apply for an extension to ACRA 2 months before the deadlines.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h2 data-dcnode-id="1345"><span class="ez-toc-section" data-dcnode-id="1346" id="Late_AGM_or_Annual_Return_may_result_in_High_Penalty_Fee_Summon_andor_Arrest_Warrant"><span data-dcnode-id="1347" instrument_node="">Late AGM or Annual Return&nbsp;may result in High Penalty Fee, Summon and/or Arrest Warrant</span></span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">ACRA has taken a big step forward to ensure that the issue of AGM and AR violations is resolved. It has increased the fine to $300 for each violation regardless of the duration of the violation, increased the settlement offer to $300 for late filing of the AGM and AR under S175 and S197 respectively, and, most importantly, prohibited a person from acting as a director of a Singapore company for a violation of a relevant requirement of the Companies Act for an uninterrupted period of 3 months or longer.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">The following are 3 main statutory criteria which companies and directors are liable to breach:</span></p><span data-dcnode-id="1338" instrument_node="">
</span><span data-dcnode-id="1337" instrument_node="">
</span><span data-dcnode-id="1336" instrument_node="">
</span><span data-dcnode-id="1335" instrument_node="">
</span><span data-dcnode-id="1331" instrument_node="">
</span><span data-dcnode-id="1327" instrument_node="">
</span><span data-dcnode-id="1323" instrument_node="">
</span><span data-dcnode-id="1321" instrument_node="">
</span><span data-dcnode-id="1320" instrument_node="">
</span><span data-dcnode-id="1317" instrument_node="">
</span><span data-dcnode-id="1314" instrument_node="">
</span><span data-dcnode-id="1311" instrument_node="">
</span><span data-dcnode-id="1309" instrument_node="">
</span><span data-dcnode-id="1308" instrument_node="">
</span><span data-dcnode-id="1305" instrument_node="">
</span><span data-dcnode-id="1302" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
</span><span data-dcnode-id="1297" instrument_node="">
</span><span data-dcnode-id="1296" instrument_node="">
</span><span data-dcnode-id="1293" instrument_node="">
</span><span data-dcnode-id="1290" instrument_node="">
</span><span data-dcnode-id="1287" instrument_node="">
</span><span data-dcnode-id="1285" instrument_node="">
</span><span data-dcnode-id="1283" instrument_node="">
</span><table border="1" data-dcnode-id="1282" style="border-collapse: collapse; width: 100%;"><tbody data-dcnode-id="1284"><tr data-dcnode-id="1322" style="height: 21px;"><td data-dcnode-id="1332" style="width: 33.3333%; height: 21px;"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Companies Act Section</span></strong></td><td data-dcnode-id="1328" style="width: 33.3333%; height: 21px;"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Statutory Requirements</span></strong></td><td data-dcnode-id="1324" style="width: 33.3333%; height: 21px;"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Breach by</span></strong></td></tr><tr data-dcnode-id="1310" style="height: 21px;"><td data-dcnode-id="1318" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1319" instrument_node="">Section 175</span></td><td data-dcnode-id="1315" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1316" instrument_node="">Requirement for companies to hold AGM</span></td><td data-dcnode-id="1312" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1313" instrument_node="">Both company and director</span></td></tr><tr data-dcnode-id="1298" style="height: 21px;"><td data-dcnode-id="1306" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1307" instrument_node="">Section 197</span></td><td data-dcnode-id="1303" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1304" instrument_node="">Lodgment of Annual Return via Bizfile online</span></td><td data-dcnode-id="1300" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1301" instrument_node="">Both company and director</span></td></tr><tr data-dcnode-id="1286" style="height: 21px;"><td data-dcnode-id="1294" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1295" instrument_node="">Section 201(1)</span></td><td data-dcnode-id="1291" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1292" instrument_node="">Laying of financial statements at the AGM</span></td><td data-dcnode-id="1288" style="width: 33.3333%; height: 21px;"><span data-dcnode-id="1289" instrument_node="">Director</span></td></tr></tbody></table><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">ACRA imposes a high penalty and summons for late filing of AGM:</span></p><span data-dcnode-id="1275" instrument_node="">
</span><ul data-dcnode-id="1264"><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">a flat penalty of $300 for late filing of AR, regardless of the duration of the default;</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">a total of $300 (s175 of the Companies Act) for holding the AGM late;</span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">a total of $300 for the layout of out-of-date AGM financial statements (S201 of the Companies Act)</span></li><span data-dcnode-id="1265" instrument_node="">
</span></ul><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1256"><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/penalties-for-failing-to-hold-annual-general-meetings-or-file-annual-returns/"><span data-dcnode-id="1262" instrument_node="">Failure to hold the AGM and to file AR</span></a><span data-dcnode-id="1260" instrument_node=""> will result in action by the Executive, including the offer of settlement amounts. With Timcole as your corporate secretary, you will never miss a filing deadline anymore. </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/company-secretarial-package/"><span data-dcnode-id="1259" instrument_node="">Corporate secretarial services</span></a><span data-dcnode-id="1257" instrument_node=""> packages from $288/year.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">In the event that ACRA decides to take executive action for failure to hold an Annual General Meeting and/or to file AR, a three-step composition rule will be imposed to encourage early termination and deter non-compliance by the directors.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1249"><span class="ez-toc-section" data-dcnode-id="1250" id="Prosecutorial_action"><span data-dcnode-id="1251" instrument_node="">Prosecutorial action</span></span></h3><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">ACRA will consider prosecuting the directors in court if:</span></p><span data-dcnode-id="1245" instrument_node="">
</span><ol data-dcnode-id="1234"><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">They do not register and participate in the DCP if ACRA offers them the opportunity to participate in the DCP in writing (only first-time offenders are eligible); or</span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">They fail to compound (when offered a chance to compound); or</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">The circumstances of the case are such that the composition is not appropriate, e.g. in the case of multiple or unruly infringements.</span></li><span data-dcnode-id="1235" instrument_node="">
</span></ol><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">If a director attempts to aggravate his violation(s) after a summons has been issued, ACRA cannot allow him to aggravate the situation.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">After a summons is issued, ACRA will mail the summons to the Director at his or her home address. The summons will include the State Court number and the date and time when the director must appear in court. If the director does not appear in court, the court will issue an arrest warrant against him. The director must appear in court, even if he has written to ACRA to verify the summons.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1224"><span class="ez-toc-section" data-dcnode-id="1225" id="Other_enforcement_actions"><span data-dcnode-id="1226" instrument_node="">Other enforcement actions</span></span></h3><span data-dcnode-id="1223" instrument_node="">
</span><ul data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Disqualification of directors</span></li><span data-dcnode-id="1219" instrument_node="">
</span></ul><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">A director who has cancelled at least 3 of his companies within a period of 5 years will be disqualified as a director or officer of a company for a period of 5 years from the date of cancellation of the last of the three companies from the date of cancellation of the third company.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">For the avoidance of doubt, the cancellation of the three companies refers only to the cancellation initiated by the Registrar and does not include voluntary cancellation requests.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><ul data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">
</span><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Debarment of the director or secretary of the company</span></li><span data-dcnode-id="1207" instrument_node="">
</span></ul><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">A director or company secretary who fails to comply with an essential requirement of the Companies Act for an uninterrupted period of three months or more may be subject to a removal order by the Registrar preventing him from making further appointments as director or company secretary of other companies.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1199" instrument_node="">
</span><h2 data-dcnode-id="1196"><span class="ez-toc-section" data-dcnode-id="1197" id="Certificate_of_Compliance"><span data-dcnode-id="1198" instrument_node="">Certificate of Compliance</span></span></h2><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Companies that meet the three requirements of Sections 175, 197 and 201 of the Act can obtain a Certificate of Compliance. Companies that do not meet any or all of the requirements are not eligible for the certificate.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h2 data-dcnode-id="1186"><span class="ez-toc-section" data-dcnode-id="1187" id="Company_Seal"><span data-dcnode-id="1188" instrument_node="">Company Seal</span></span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">A </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/self-inking-rubber-stamp/"><span data-dcnode-id="1183" instrument_node="">company seal</span></a><span data-dcnode-id="1181" instrument_node=""> (sometimes called a corporate seal) is an official seal used by a company. Company seals were primarily used by companies in common law jurisdictions, although most countries have now abolished the use of seals.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Under the Companies Act, companies in Singapore are no longer required to use the seal when signing documents such as deeds or other documents such as share certificates. Companies can execute documents by having them signed by authorized persons of the companies as follows:</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Authorized persons for companies:</span></p><span data-dcnode-id="1173" instrument_node="">
</span><ul data-dcnode-id="1162"><span data-dcnode-id="1172" instrument_node="">
</span><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">a director and a company’s secretary; or</span></li><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">two company directors; or</span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">a company director in the presence of a witness attesting to the signature.</span></li><span data-dcnode-id="1163" instrument_node="">
</span></ul><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">For existing companies that wish to waive the use of their company seal, the company formation must be changed to remove the obligation to use the company seal.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">Do you need help filing your AGM, AR and XBRL in Singapore? </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/"><span data-dcnode-id="1156" instrument_node="">Timcole</span></a><span data-dcnode-id="1154" instrument_node=""> can help you.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1149"><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/iras-compliance/"><span data-dcnode-id="1151" instrument_node="">To read on about IRAS Corporate Compliance, click here.</span></a></p><span data-dcnode-id="1148" instrument_node="">
</span></div><div class="post-meta wf-mobile-collapsed" data-dcnode-id="1138"><div class="entry-meta" data-dcnode-id="1139"><span class="category-link" data-dcnode-id="1143"><span data-dcnode-id="1146" instrument_node="">Category:&nbsp;</span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/category/corporate-compliance/"><span data-dcnode-id="1145" instrument_node="">Corporate Compliance</span></a></span><a class="data-link" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/2020/10/13/" rel="bookmark" title="5:04 pm"><time class="entry-date updated" data-dcnode-id="1141" datetime="2020-10-13T17:04:54+08:00"><span data-dcnode-id="1142" instrument_node="">October 13, 2020</span></time></a></div></div><nav class="navigation post-navigation" data-dcnode-id="1118" role="navigation"><h2 class="screen-reader-text" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Post navigation</span></h2><div class="nav-links" data-dcnode-id="1119"><a class="nav-previous" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/ongoing-compliance/" rel="next"><i aria-hidden="true" class="fa fa-angle-left" data-dcnode-id="1135"></i><span aria-hidden="true" class="meta-nav" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Previous</span></span><span class="screen-reader-text" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Previous post:</span></span><span class="post-title h4-size" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Corporate Compliance Requirement – Ongoing Compliance</span></span></a><a class="nav-next" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timcole.com.sg/iras-compliance/" rel="prev"><i aria-hidden="true" class="fa fa-angle-right" data-dcnode-id="1127"
