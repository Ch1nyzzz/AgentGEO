</span></div></div><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Do you own or manage a business engaged in environmentally sustainable activities? Does it utilise green technologies or help to create a green economy? This article outlines the key elements of the Government’s new tax incentive scheme for “green” jobs. Find out below if your business is eligible!</span></p><p data-dcnode-id="1153"><a aria-label=" (opens in a new tab)" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cloudcfo.ph/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1159" instrument_node="">CloudCfo</span></a><span data-dcnode-id="1157" instrument_node=""> is an outsourced accounting company that provides accounting, finance and bookkeeping services for companies in the Philippines. </span><a data-dcnode-id="1155" href="#newsletter-anchor"><span data-dcnode-id="1156" instrument_node="">Subscribe </span></a><span data-dcnode-id="1154" instrument_node="">to our monthly newsletter for up-to-date information on the finance and compliance aspects of owning and managing a business in the Philippines.</span></p><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">In recent years, the corporate world has become much more conscious of its obligations to the environment. Many strategic business decisions are now made only after environmental factors have been considered.</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1150" instrument_node="">The Philippine Government has also declared its ambition to transition to a “green” economy. The introduction of the </span><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Philippine Green Jobs Act of 2016</span></strong><span data-dcnode-id="1147" instrument_node=""> is an example of this. Arising from this Act, the </span><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Bureau of Internal Revenue</span></strong><span data-dcnode-id="1144" instrument_node=""> </span><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">(BIR)</span></strong><span data-dcnode-id="1141" instrument_node=""> has just recently issued regulations that provide for a new tax incentive scheme for businesses that generate “green” jobs. &nbsp;</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">See below for all you need to know about the new tax incentive scheme. We have also included a checklist for eligibility requirements and a step guide for the application process. See if your business is eligible for the tax incentive scheme!</span></p><h2 data-dcnode-id="1134"><span data-dcnode-id="1135" id="What_is_the_Philippines_Green_Jobs_Act_of_2016_Republic_Act_No_10771"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">What is the Philippines Green Jobs Act of 2016 (Republic Act No. 10771)</span></strong></span></h2><p data-dcnode-id="1124"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.officialgazette.gov.ph/2016/04/29/republic-act-no-10771/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1133" instrument_node="">R.A. No. 10771</span></a><span data-dcnode-id="1131" instrument_node="">, also known as the Philippine Green Jobs Act of 2016, is a Government act designed to promote the generation of green jobs and the granting of </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">tax</span></strong><span data-dcnode-id="1128" instrument_node=""> </span><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">incentives for green businesses</span></strong><span data-dcnode-id="1125" instrument_node=""> in the Philippines.&nbsp;</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">“</span><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Green jobs</span></strong><span data-dcnode-id="1120" instrument_node="">” refer to employment, across a number of sectors, which helps to preserve or restore the quality of the environment. Examples might include jobs that help to protect ecosystems or biodiversity, reduce energy and water consumption, decarbonize the economy or jobs that help to minimize/eliminate waste and pollution.</span></p><p data-dcnode-id="1115"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.officialgazette.gov.ph/2016/04/29/republic-act-no-10771/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1118" instrument_node="">R.A. No. 10771</span></a><span data-dcnode-id="1116" instrument_node=""> aims to achieve the Government’s declared policy of promoting the rights of the Philippine people to a “balanced and healthful ecology in accord with the rhythm and harmony of nature.”</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">A primary objective of the Government is to </span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">transition the economy of the Philippines to a green economy.&nbsp;</span></strong><span data-dcnode-id="1111" instrument_node="">The tax incentive scheme is in recognition of individuals and businesses that create jobs to assist with achieving this green economy objective.</span></p><h2 data-dcnode-id="1104"><span data-dcnode-id="1105" id="Why_is_the_Green_Jobs_Act_2016_relevant_now_nbsp"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Why is the Green Jobs Act 2016 relevant now</span></strong><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">? &nbsp;</span></strong></span></h2><p data-dcnode-id="1093"><span data-dcnode-id="1103" instrument_node="">In the last number of weeks, the </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Bureau of Internal Revenue</span></strong><span data-dcnode-id="1100" instrument_node=""> (</span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">BIR</span></strong><span data-dcnode-id="1097" instrument_node="">) published </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bir.gov.ph/images/bir_files/internal_communications_1/Full%2520Text%2520RR%25202019/RR%2520No%25205-2019.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1096" instrument_node="">Revenue Regulations No. 5-2019</span></a><span data-dcnode-id="1094" instrument_node=""> which implemented the tax incentive provisions of the Philippine Green Jobs Act of 2016.</span></p><p data-dcnode-id="1089"><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bir.gov.ph/images/bir_files/internal_communications_1/Full%2520Text%2520RR%25202019/RR%2520No%25205-2019.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1092" instrument_node="">RR. No. 5-2019</span></a><span data-dcnode-id="1090" instrument_node=""> introduces a tax incentive scheme for certain businesses engaged in activities concerned with environmental sustainability and that generate jobs that help protect the environment.&nbsp;</span></p><h2 data-dcnode-id="1085"><span data-dcnode-id="1086" id="How_does_the_new_tax_incentive_scheme_work"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">How does the new tax incentive scheme work?</span></strong></span></h2><p data-dcnode-id="1077"><span data-dcnode-id="1084" instrument_node="">Under RR. No. 5-2019, if your business is a “</span><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">qualified business enterprise</span></strong><span data-dcnode-id="1081" instrument_node="">”, you are entitled to avail of a special </span><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">deduction on the taxable income equivalent to 50% of the total expenses for skills training and research development expenses</span></strong><span data-dcnode-id="1078" instrument_node="">.</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">These special deductions will be over and above the ordinary deductions currently allowable for such expenses under the </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bir.gov.ph/index.php/tax-code.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1075" instrument_node="">National Internal Revenue Code of 1997</span></a><span data-dcnode-id="1073" instrument_node="">&nbsp;(as amended) (i.e. the Tax Code). &nbsp;</span></p><h2 data-dcnode-id="1068"><span data-dcnode-id="1069" id="What_is_a_qualified_business_enterprise"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">What is a “qualified business enterprise”?</span></strong></span></h2><p data-dcnode-id="1063"><span data-dcnode-id="1067" instrument_node="">A “</span><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">business enterprise</span></strong><span data-dcnode-id="1064" instrument_node="">” is an establishment engaged in the production, manufacturing, processing, repacking, assembly or sale of goods or services. This includes service-orientated businesses, self-employed workers, MSMEs and community based businesses.</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1062" instrument_node="">In order to attain the status of “qualified”, a business enterprise </span><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">must first be certified </span></strong><span data-dcnode-id="1059" instrument_node="">by the </span><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Secretary of the </span></strong><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//climate.gov.ph/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Climate Change Commission</span></strong></a><span data-dcnode-id="1053" instrument_node=""> as qualified and eligible to receive the tax incentive.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Examples of “qualified businesses enterprises” might include businesses engaged in activities to mitigate climate change, businesses that utilise green technologies or follow green building practices and business processes and businesses engaged in the production or selling of green goods or green services.</span></p><h2 data-dcnode-id="1046"><span data-dcnode-id="1047" id="Is_there_a_time_period_for_claiming_this_tax_deduction"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Is there a time period for claiming this tax deduction? </span></strong></span></h2><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Yes. The deduction must be availed of within the same taxable year in which the relevant expenses were paid or incurred.</span></p><h2 data-dcnode-id="1040"><span data-dcnode-id="1041" id="When_can_you_claim_the_tax_deduction"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">When can you claim the tax deduction?</span></strong></span></h2><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The tax deduction is claimed at the time the business files its income tax returns.</span></p><h2 data-dcnode-id="1034"><span data-dcnode-id="1035" id="Does_evidence_have_to_be_provided"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Does evidence have to be provided?</span></strong></span></h2><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Yes. The business must be able to provide sufficient evidence that it is eligible to avail of the deduction. Evidence can be in the form of official receipts, delivery receipts, etc, and must show (a) the total value of the expenses being claimed and (b) the direct connection/relation between the skills training or research development conducted and the expenses.</span></p><h2 data-dcnode-id="1028"><span data-dcnode-id="1029" id="How_do_you_apply_for_the_tax_incentive"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">How do you apply for the tax incentive? </span></strong></span></h2><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Helpfully, RR. No. 5-2019 outlines the process required to apply for the tax incentive, as follows:</span></p><ol data-dcnode-id="1008"><li data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">The business must first submit, to the Revenue District Office where the business is registered, a </span><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Certification issued by the Climate Change Commission</span></strong><span data-dcnode-id="1022" instrument_node=""> which confirms that the business is “qualified” and eligible to avail of the tax incentive;</span></li><li data-dcnode-id="1009"><span data-dcnode-id="1020" instrument_node="">When filing its income tax returns/annual information returns, the business must submit the following documents, all of which </span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">must be sworn as true</span></strong><span data-dcnode-id="1017" instrument_node="">:</span><ul data-dcnode-id="1010"><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">A list of the total expenses paid or incurred for skills training or research development during the year;</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">A list of the activities or projects undertaken and their cost and indicating how the expenses were paid/incurred;</span></li><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">A declaration that the expenses paid/incurred have a direct connection/relation to the activities or projects of the business that generate or sustain “green” jobs.</span></li></ul></li></ol><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Let </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cloudcfo.ph/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1006" instrument_node="">CloudCfo</span></a><span data-dcnode-id="1004" instrument_node=""> know if you require support with your tax compliance obligations or BIR applications/filings!</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">CloudCfo is an accounting company that provides outsourced finance and accounting services to companies in the Philippines. CloudCfo advises various companies across Metro Manila on all aspects of their finance-related activities including bookkeeping, payroll, tax compliance, transaction support and more.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Our team of dedicated professionals has extensive knowledge of the tax compliance and regulatory system in the Philippines and can transform your financial processes into real value added activities for your company.</span></p><p data-dcnode-id="991"><span data-dcnode-id="998" instrument_node="">Visit us at </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cloudcfo.ph/"><span data-dcnode-id="997" instrument_node="">cloudcfo.ph</span></a><span data-dcnode-id="995" instrument_node=""> or contact us at </span><a data-dcnode-id="993" href="mailto:enquire@cloudcfo.ph"><span data-dcnode-id="994" instrument_node="">enquire@cloudcfo.ph</span></a><span data-dcnode-id="992" instrument_node=""> for more information on how we can support your business here in the Philippines.</span></p></div><p data-dcnode-id="987"><em data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">DISCLAIMER: This article is strictly for general information purposes only. Nothing in this article constitutes or intends to constitute financial, accounting, regulatory or legal advice and must not be used as a substitute for professional advice. It is still necessary to consult your relevant professional adviser regarding any specific matter referenced above.</span></em></p><div class="sharethis" data-dcnode-id="957"><div class="sharethis-inline-share-buttons st-justified st-has-labels st-inline-share-buttons st-animated" data-dcnode-id="958" id="st-2"><div class="st-btn st-first" data-dcnode-id="980" data-network="facebook" style="display: inline-block;"><span data-dcnode-id="986" instrument_node="">
