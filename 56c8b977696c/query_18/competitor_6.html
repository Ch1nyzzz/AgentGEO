</span><h1 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Pakistan</span></h1><span data-dcnode-id="499" instrument_node="">
</span><span data-dcnode-id="497" instrument_node="">
</span><header class="heading-grp" data-dcnode-id="489"><span data-dcnode-id="496" instrument_node="">
</span><h2 class="section__heading" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Corporate - Tax credits and incentives</span></h2><span data-dcnode-id="493" instrument_node="">
</span><span class="date" data-dcnode-id="491" data-lastreviewed-text="Last reviewed" id="lastReviewedDate"><span data-dcnode-id="492" instrument_node="">Last reviewed - 20 December 2021</span></span><span data-dcnode-id="490" instrument_node="">
</span></header><span data-dcnode-id="488" instrument_node="">
</span><div class="mobile-wrapper" data-dcnode-id="297"><div class="section__content" data-dcnode-id="298" id="txtPageBody"><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">&nbsp;</span></p><span data-dcnode-id="483" instrument_node="">
</span><h2 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Tax credits &amp; exemptions</span></h2><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">The Income Tax Ordinance, 2001 (i.e the local tax law) provides for exemptions of whole or part of tax, reduced applicable tax rates, inapplicability of certain provisions and reduction in tax liability. These exemptions are either based on specific category of taxpayers or for a specific time period. Significant tax credits / exemptions for the year 2021-22 are listed below:&nbsp;</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">&nbsp;</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Profits and gains derived from an electric power generation project set up in Pakistan are exempt from tax.&nbsp;This exemption is restricted for persons entering into agreement or to whom letter of intent is issued by Federal or Provincial Government, for setting up an electric power generation project in Pakistan upto June 30, 2021.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Profits and gains derived from a transmission line project setup in Pakistan on or after July 1, 2015 are exempt from income tax for a period of 10 years, subject to certain conditions. One such condition provided is that such project should be setup by June 30, 2018. Now, the said date is extended until June 30, 2022.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Profits and gains derived by refineries, which are setup between 1 July 2018 and 30 June 2023, have been granted exemption from tax for a period of 20 years, upon fulfilment of certain conditions.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Low-cost housing projects have been incentivised by allowing a reduction in tax liability (arising on profits and gains) by 50%, subject to fulfilment of certain conditions.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">The tax payable on the income, profits, and gains of projects of low-cost housing developed or approved by the&nbsp;Naya Pakistan Housing and Development Authority (NAPHDA) or under the Ehsaas Programme shall be reduced by 90%. Moreover, in case of banking companies, the taxable income arising from additional advances to NAPHDA for low cost housing schemes shall be taxed at the rate of 10%.&nbsp;However, the said relief shall be available only for the projects which commence on or before June 30, 2024.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">A tax credit of 25% of the amount invested is available to a green field&nbsp;industrial undertaking engaged in manufacturing or ship building and an industrial undertaking engaged in the manufacturing of machinery and equipment used for generation of renewable energy.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Income derived by an enterprise set up in ‘special economic zones’ is exempt from tax for a period of ten years, starting from commencement of commercial operations/production, subject to certain conditions. These ‘special economic zones’ have been established in different territories of the country.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Profits and gains derived by liquefied natural gas terminal operators and terminal owners are exempt from tax for a period of five years beginning from the date of commercial production.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448" style="text-align: justify;"><span data-dcnode-id="449" instrument_node="">Profit and gains derived from a bagasse / biomass based cogeneration power project having certain level of capacity is made exempt from income tax. While, reduced withholding tax rate (7.5%) is introduced on payment of dividend by these entities subject to certain conditions.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445" style="text-align: justify;"><span data-dcnode-id="446" instrument_node="">Profit and gains derived by new deep conversion refineries (approved by Federal Government before Dec 31, 2021) have also been made exempt from income tax for 20 years (10 years for existing refineries from date of upgradating) subject to certain conditions.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442" style="text-align: justify;"><span data-dcnode-id="443" instrument_node="">Profit and gains derived from a sale of electricity by National Power Parks Management Company (Private) Limited or by its demerged entities have been made exempt from income tax commencing from commercial operations dates and continuing after the dates of change of ownership through privatization.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439" style="text-align: justify;"><span data-dcnode-id="440" instrument_node="">Any sum remitted to Pakistan through banking channel in foreign currency to an international buying house from its non-resident principal to meet its expenses in Pakistan are made exempt from income tax.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436" style="text-align: justify;"><span data-dcnode-id="437" instrument_node="">Similarly, any sum chargeable under the head salary received by a person who, not being a citizen or resident of Pakistan, is engaged as an expert by an international buying house is also made exempt from income tax.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="431" style="text-align: justify;"><span data-dcnode-id="434" instrument_node="">‘</span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">The concept of international trade house is accordingly explained in the law as persons acting as buying offices, buyers’ agents, or representatives of international buyers for facilitating exports from Pakistan and are registered as a liaison office or companies acting as cost centers with sole purpose to bring export orders to Pakistan and are not engaged in any other business transactions.’</span></em></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Certain exemption and concessions have been introduced recently for ‘special technology zones’ [‘STZ’] as under:</span></strong></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424" style="text-align: justify;"><span data-dcnode-id="425" instrument_node="">Dividend income and long-term capital gains from investments in zone enterprises as defined STZ Ordinance by a venture capital fund for investment in zone enterprises is exempt for 10 years commencing from issuance of license by the authority to the zone enterprise.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421" style="text-align: justify;"><span data-dcnode-id="422" instrument_node="">Profit and gains from the development and operations of the zones by zone developer as defined in STZ Ordinance is exempt for 10 years from the date of signing of the development agreement.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418" style="text-align: justify;"><span data-dcnode-id="419" instrument_node="">Profit and gains of zone enterprises as defined in STZ Ordinance is exempt for 10 years from the date of issuance of license by the authority.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415" style="text-align: justify;"><span data-dcnode-id="416" instrument_node="">Profit and gains of STZ authority established for infinite period.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="411"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">In terms of understanding reached between the trade bodies and Government, reduced withholding / minimum tax rates for the traders, wholesalers and retailers of specified sectors have been introduced as under: </span></strong></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408" style="text-align: justify;"><span data-dcnode-id="409" instrument_node="">Reduced tax withholding rate and minimum tax rate (on turnover) of 0.25% on receipts of dealers and sub-dealers of sugar, cement and edible oils also extended to wholesalers, retailers and distributers. The scope of goods / sectors covered under this concession expanded to also include fertilizer and fast-moving consumer goods and electronic (excluding mobile phones) subject to certain conditions.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405" style="text-align: justify;"><span data-dcnode-id="406" instrument_node="">The rate of advance tax collection by manufacturer or commercial importer of fertilizers reduced to 0.25% from 0.7%, if the distributor / dealer / wholesaler is active taxpayer for both income tax &amp; sales tax.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402" style="text-align: justify;"><span data-dcnode-id="403" instrument_node="">Distributers, dealers, wholesellers and retailers of locally manufactured mobile phones shall no longer be required to act as withholding agent in terms of payment for sale of goods.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399" style="text-align: justify;"><span data-dcnode-id="400" instrument_node="">Tax liability of cotton ginners on their income shall not be more than 1% of their turnover from cotton lint, cotton seed, cotton seed oil and cotton seed cakes. The tax so payable shall be final tax in respect of their cotton ginning and oil milling activities only.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395" style="text-align: justify;"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Significant exemption / tax credits&nbsp;withdrawn:</span></strong></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Tax credit for person employing fresh graduates.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">First year depreciation allowance on specified assets @ 90% of cost of assets.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Tax credit for enlistment on registered stock exchange.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Certain tax credits for newly established industrial undertaking – refer section 65D &amp; 65E.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Exemption available on profit &amp; gains derived from the refining and concentrating business (subject to certain conditions) to an undertaking in business of exploration and extraction of mineral deposits.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Certain concessions available to Oil &amp; Gas exploration companies’ including deduction of 100% depreciation expense in case of below ground installations.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Profit on debt payable to a non-resident in respect of loans.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Distribution from specific collectives investment schemes registered by regulatory authority under the non-banking finance companies and notified entities regulation 2007.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Profit and gains from an industrial undertaking setup between a time line, duly certified by Pakistan Telecommunication Authority, engaged in the manufacturing of cellular mobile phones.&nbsp;</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">&nbsp;</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">&nbsp;</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359" style="text-align: justify;"><span data-dcnode-id="360" instrument_node="">&nbsp;</span></p><span data-dcnode-id="358" instrument_node="">
</span><h2 data-dcnode-id="356" style="text-align: justify;"><span data-dcnode-id="357" instrument_node="">Small companies</span></h2><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="354" instrument_node="">Activities of small companies are encouraged with a reduced income tax rate of 21% (</span><em data-dcnode-id="349"><span data-dcnode-id="353" instrument_node="">see the </span><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxsummaries.pwc.com/pakistan/corporate/taxes-on-corporate-income" rel="noopener" target="_blank"><span data-dcnode-id="352" instrument_node="">Taxes on corporate income</span></a><span data-dcnode-id="350" instrument_node=""> section</span></em><span data-dcnode-id="348" instrument_node="">).</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">A small company has been defined to mean a company that:</span></p><span data-dcnode-id="343" instrument_node="">
</span><ul data-dcnode-id="326"><span data-dcnode-id="342" instrument_node="">
</span><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">is registered on or after 1 July 2005 under the Companies Ordinance, 1984</span></li><span data-dcnode-id="339" instrument_node="">
</span><li data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">has a paid-up capital plus undistributed reserves not exceeding PKR 50 million</span></li><span data-dcnode-id="336" instrument_node="">
</span><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">has employees not exceeding 250 at any time during the year</span></li><span data-dcnode-id="333" instrument_node="">
</span><li data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">has an annual turnover not exceeding PKR 250 million, and</span></li><span data-dcnode-id="330" instrument_node="">
</span><li data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">is not formed by splitting up or the reconstitution of business already in existence.</span></li><span data-dcnode-id="327" instrument_node="">
</span></ul><span data-dcnode-id="325" instrument_node="">
</span><h2 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Charitable donations credit</span></h2><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Companies are allowed a tax credit equivalent to 20% of their taxable income in respect of donations to:</span></p><span data-dcnode-id="319" instrument_node="">
</span><ul data-dcnode-id="308"><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">any board of education or university in Pakistan, established by or under federal or provincial law</span></li><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">any educational institution, hospital, or relief fund established or run in Pakistan by federal government, provincial government, or local government, and</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">any non-profit organisation.</span></li><span data-dcnode-id="309" instrument_node="">
</span></ul><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305" style="text-align: justify;"><span data-dcnode-id="306" instrument_node="">Companies were earlier allowed a straight deduction against taxable income (up to 20% of taxable income) in case of donations made to certain approved institutions.&nbsp;Donations to these charitable institutes earlier eligible for direct deduction from income has now been transposed into tax credit regime. As a result of that, overall upper limit for tax break for the donors, in respect of charitable donations, has been reduced</span></p><span data-dcnode-id="304" instrument_node="">
</span><h2 data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Foreign tax credit</span></h2><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Where a resident taxpayer derives foreign-source income on which foreign income tax is paid within two years from the year in which it is derived, the taxpayer is allowed a tax credit equal to the lower of (i) the foreign income tax paid or (ii) the Pakistan tax payable in respect of that income. However, foreign tax paid is not refundable.</span></p></div></div><span data-dcnode-id="296" instrument_node="">
