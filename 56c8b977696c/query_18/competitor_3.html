</span><h1 data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Malaysia</span></h1><span data-dcnode-id="1419" instrument_node="">
</span><span data-dcnode-id="1417" instrument_node="">
</span><header class="heading-grp" data-dcnode-id="1409"><span data-dcnode-id="1416" instrument_node="">
</span><h2 class="section__heading" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Corporate - Tax credits and incentives</span></h2><span data-dcnode-id="1413" instrument_node="">
</span><span class="date" data-dcnode-id="1411" data-lastreviewed-text="Last reviewed" id="lastReviewedDate"><span data-dcnode-id="1412" instrument_node="">Last reviewed - 14 December 2021</span></span><span data-dcnode-id="1410" instrument_node="">
</span></header><span data-dcnode-id="1408" instrument_node="">
</span><div class="mobile-wrapper" data-dcnode-id="291"><div class="section__content" data-dcnode-id="292" id="txtPageBody"><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Malaysia has a wide variety of incentives covering the major industry sectors. Tax incentives can be granted through income exemption or by way of allowances. Where incentives are given by way of allowances, any unutilised allowances may be carried forward indefinitely to be utilised against future statutory income, except for certain incentives, such as reinvestment allowance and investment allowance for approved service projects, where a seven-year limitation applies.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">In compliance with the Forum on Harmful Tax Practices (FHTP) criteria under the Base Erosion and Profit Shifting (BEPS) Action 5 (Countering Harmful Tax Practices More Effectively, Taking into Account Transparency and Substance), Malaysia has amended the legislation in relation to the tax incentives to:</span></p><span data-dcnode-id="1400" instrument_node="">
</span><ul data-dcnode-id="1389"><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">remove ring-fencing features</span></li><span data-dcnode-id="1396" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">exclude IP income from the incentives, and&nbsp;</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">stipulate the substantial activities requirements.</span></li><span data-dcnode-id="1390" instrument_node="">
</span></ul><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The following are the major types of incentives available in Malaysia.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h2 data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Pioneer status (PS) and investment tax allowance (ITA)</span></h2><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Companies in the manufacturing, agricultural, and hotel and tourism sectors, or any other industrial or commercial sector, that participate in a promoted activity or produce a promoted product may be eligible for either PS or&nbsp;ITA.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">PS is given by way of exemption from CIT on 70% of the statutory income for five years and the remaining 30% is taxed at the prevailing CIT rate.&nbsp;ITA is granted on 60% qualifying capital expenditure incurred for a period of five years and is utilised against 70% of the statutory income, while the 30% balance is taxed at the prevailing CIT rate.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">A company that intends to undertake reinvestment before expiration of its PS or ITA status may opt for reinvestment allowance, provided it surrenders its PS or ITA status.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The PS and ITA incentives are enhanced for the following types of projects:</span></p><span data-dcnode-id="1370" instrument_node="">

</span><h2 data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Special incentive schemes</span></h2><span data-dcnode-id="1184" instrument_node="">
</span><h3 data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Reinvestment allowance</span></h3><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">A resident company in operation for not less than 36 months that incurs capital expenditure to expand, modernise, automate, or diversify its existing manufacturing business or approved agricultural project is entitled to reinvestment allowance as follows:</span></p><span data-dcnode-id="1178" instrument_node="">
</span><ul data-dcnode-id="1164"><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The allowance is given for 15 years from the first year of claim.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The allowance is computed at&nbsp;60% of QCE incurred and can be utilised against 70% of statutory income.&nbsp;</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">The 70% restriction does not apply to projects that have achieved the level of productivity as prescribed by the Minister of Finance.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The allowance will be withdrawn if the asset for which the allowance is granted is disposed of within five years.</span></li><span data-dcnode-id="1165" instrument_node="">
</span></ul><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1162" instrument_node="">A special reinvestment allowance of 60% of QCE will be given for years of assessment 2020 to 2022 for companies that have exhausted their existing 15-year reinvestment allowance period and special reinvestment allowance granted for years of assessment 2016 to 2018. I</span><span data-dcnode-id="1160" style="font-weight: 400;"><span data-dcnode-id="1161" instrument_node="">t is proposed in Budget 2022 that the period for special reinvestment allowance be extended </span></span><span data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" instrument_node="">to the year</span></span><span data-dcnode-id="1156" style="font-weight: 400;"><span data-dcnode-id="1157" instrument_node=""> of assessment 2024. </span></span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1153"></p><span data-dcnode-id="1152" instrument_node="">
</span><h3 data-dcnode-id="1149"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Incentives for relocating to Malaysia</span></strong></h3><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The following incentives are given to encourage investment and relocation of manufacturing operations into Malaysia:</span></p><span data-dcnode-id="1145" instrument_node="">
</span><ul data-dcnode-id="1137"><span data-dcnode-id="1144" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">0% tax rate for 10 or 15 years for new companies that invest a minimum of MYR 300 million or MYR 500 million, respectively, in the manufacturing sector in Malaysia.</span></li><span data-dcnode-id="1141" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">ITA of 100% for five years for existing companies in Malaysia to relocate their overseas manufacturing facility for a new business segment to Malaysia with a minimum investment of MYR 300 million.</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ul><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Applications received by 31 December 2022.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><h3 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Approved service projects</span></h3><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">A resident company undertaking a project approved by the Minister of Finance in the transportation, communications, utilities, and services subsectors may enjoy the following incentives:</span></p><span data-dcnode-id="1127" instrument_node="">
</span><ul data-dcnode-id="1119"><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Investment allowance of 60% of QCE incurred within five years to be utilised against 70% of statutory income, or income tax exemption of 70% of statutory income for a period of five years.</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Buildings used solely for the purposes of such projects qualify for an industrial building allowance.</span></li><span data-dcnode-id="1120" instrument_node="">
</span></ul><span data-dcnode-id="1118" instrument_node="">
</span><h3 data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Export incentives</span></h3><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">A resident company engaged in manufacturing or agriculture that exports manufactured products, agricultural produce, or services is entitled to allowances between 10% and 100% of value of increased exports (subject to satisfying prescribed conditions), which is deductible at up to 70% of statutory income.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><h2 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Regional operations</span></h2><span data-dcnode-id="1109" instrument_node="">
</span><h3 data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Principal hub</span></h3><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">A principal hub is a locally incorporated company that uses Malaysia as a base for conducting its regional and global businesses and operations through management, control, and support of key functions, such as management of risk, strategic decisions, finance, and human resources. A principal hub will enjoy a CIT at effective tax rates of 0% or 5% (new companies) of statutory income for a period of 5 + 5 years or 10% of statutory income (existing companies) for 5 years, subject to conditions being met (for applications by 31 December 2022).</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" style="font-weight: 400;"><span data-dcnode-id="1102" instrument_node="">Other non-fiscal incentives available include:</span></span></p><span data-dcnode-id="1099" instrument_node="">
</span><ul data-dcnode-id="1087"><span data-dcnode-id="1098" instrument_node="">
</span><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">No equity/ownership conditions.</span></li><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">Foreign exchange administration flexibilities and approval of expatriate positions based on stated policies.</span></span></li><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Customs duty exemption for raw materials, components, or finished products brought into free zones, licensed and bonded warehouses for production or repackaging, cargo consolidation, and integration before distribution to its final customers for goods-based companies.</span></li><span data-dcnode-id="1088" instrument_node="">
</span></ul><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1083"><b data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Global Trading Centre</span></b></h3><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" style="font-weight: 400;"><span data-dcnode-id="1081" instrument_node="">A concessionary tax rate of 10% for 5 years (renewable for another 5 years) will be given to a newly incorporated resident company in Malaysia that uses Malaysia as its international trading base for undertaking strategic sourcing, procurement and distribution of raw materials, components and finished products to its related and unrelated companies in Malaysia and abroad (for applications by 31 December 2022).</span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><h3 data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">International trading company</span></h3><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">International trading companies are exempted on income equivalent to 20% of increased export value to be set off against a maximum of 70% of statutory income, for a period of five years. To qualify for the incentive, the company must meet the following three conditions:</span></p><span data-dcnode-id="1072" instrument_node="">
</span><ul data-dcnode-id="1061"><span data-dcnode-id="1071" instrument_node="">
</span><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Incorporated in Malaysia, with 60% Malaysian ownership.</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Achieve minimum annual sales of MYR 10 million, of which not more than 20% of its annual sales may be derived from the trading of commodities.</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Use local services (banking, finance, and insurance) and infrastructure (local ports and airports) in its operations.</span></li><span data-dcnode-id="1062" instrument_node="">
</span></ul><span data-dcnode-id="1060" instrument_node="">
</span><h2 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Financial services sector</span></h2><span data-dcnode-id="1057" instrument_node="">
</span><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Islamic fund management</span></h3><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Full income tax exemption is available on statutory income on management fees received by resident fund management companies for managing funds of foreign and local investors established under Syariah principles (until year of assessment 2023). Such funds must be approved by the Securities Commission.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><h3 data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Tun Razak Exchange (TRX) (formerly known as Kuala Lumpur International Financial District)</span></h3><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The TRX is an integrated property development comprising office towers for finance and banking, residences, and retail spaces in Kuala Lumpur. To accelerate the development of the TRX, the following incentives have been given:</span></p><span data-dcnode-id="1045" instrument_node="">
</span><ul data-dcnode-id="1034"><span data-dcnode-id="1044" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Income tax exemption of 70% of statutory income from the disposal of any building or rights over a building, or part thereof, for five years up to&nbsp;year of assessment&nbsp;2022, for property developers in TRX.</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Income tax exemption of 70% of statutory income from the rental of any building, or part thereof, for five years up to&nbsp;year of assessment&nbsp;2027, for property developers in TRX.</span></li><span data-dcnode-id="1038" instrument_node="">
</span><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Additional 50% tax deduction of rental payment incurred by TRX Marquee status companies for buildings used for business in TRX.</span></li><span data-dcnode-id="1035" instrument_node="">
</span></ul><span data-dcnode-id="1033" instrument_node="">
</span><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Real estate investment trusts (REIT)/Property trust fund (PTF)</span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">REIT/PTFs are vehicles that mobilise funds from unit holders comprising individuals and companies for investments in the property sector and related assets. REIT/PTFs are exempted from tax on all income, provided that at least 90% of their total income is distributed to unit holders. This exemption only applies to REIT/PTFs that are listed on the Bursa Malaysia. If the 90% distribution condition is not complied with, all income will be taxed at the prevailing income tax rate at the REIT/PTF level and tax credit will be claimed by the unit holders on distributions received from the REIT/PTF.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Unit holders are taxed as follows:</span></p><span data-dcnode-id="1024" instrument_node="">
</span><span data-dcnode-id="1023" instrument_node="">
</span><span data-dcnode-id="1022" instrument_node="">
</span><span data-dcnode-id="1021" instrument_node="">

</span><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Sabah&nbsp;Development Corridor (SDC)</span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">The following incentives are available for qualifying companies operating in the SDC&nbsp;</span><span data-dcnode-id="617" style="font-weight: 400;"><span data-dcnode-id="618" instrument_node="">(applications by 31 December 2020)</span></span><span data-dcnode-id="616" instrument_node="">:</span></p><span data-dcnode-id="614" instrument_node="">
</span><ul data-dcnode-id="600"><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">100% income tax exemption for&nbsp;five years of assessment on statutory income in respect of specified qualifying activities in the shipping and creative sectors.</span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">100% income tax exemption for&nbsp;ten years of assessment on statutory income in respect of specified qualifying activities in the sectors of hotel and resort, manufacturing, education, and marine.&nbsp;</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Income tax exemption equivalent to 100% of QCE incurred that can be offset against 100% statutory income for&nbsp;five years in respect of specified qualifying activities in the shipping, creative,&nbsp;hotel and resort, manufacturing, education, and marine sectors.&nbsp;</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Income tax exemption equivalent to 100% of QCE incurred that can be offset against 100% statutory income for&nbsp;ten years in respect of specified qualifying activities in the halal sector.</span></li><span data-dcnode-id="601" instrument_node="">
</span></ul><span data-dcnode-id="599" instrument_node="">
</span><h2 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Information and communication technology (ICT)</span></h2><span data-dcnode-id="596" instrument_node="">
</span><h3 data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">MSC Malaysia</span></h3><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">MSC Malaysia is Malaysia’s initiative for the global information technology (IT) industry and is designed to be the research and development (R&amp;D) centre for industries based on IT. It is an ICT hub equipped with high-capacity global telecommunications and logistics networks. MSC Malaysia is also supported by secure cyber laws, strategic policies, and a range of financial and non-financial incentives for investors. It is managed by the Multimedia Development Corporation (MDeC), a ‘one-stop shop’ that acts as the approving authority for companies applying for MSC Malaysia status.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">MSC Malaysia status is awarded to both local and foreign companies that develop or use multimedia technologies to produce or enhance their products and services as well as for process development. MSC Malaysia companies are eligible for incentives, which include the following:</span></p><span data-dcnode-id="587" instrument_node="">
</span><ul data-dcnode-id="565"><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="585" instrument_node="">Income tax exemption (for&nbsp;five years and extendable by&nbsp;five years) on statutory income (or value-added income) derived from services provided in relation to&nbsp;core income generating activities for MSC Malaysia.&nbsp;</span><span data-dcnode-id="583" style="font-weight: 400;"><span data-dcnode-id="584" instrument_node="">Intellectual property income (as defined) is excluded from the incentive.</span></span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Unrestricted employment of local and foreign knowledge workers.</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Freedom to source funds globally for investments.</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Protection of intellectual property and cyber laws.</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">No censorship of the Internet.</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Globally competitive telecommunication tariffs.</span></li><span data-dcnode-id="566" instrument_node="">
</span></ul><span data-dcnode-id="564" instrument_node="">
</span><h2 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Green incentives</span></h2><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Green technology projects</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Companies that undertake any of the following green technology projects will be eligible for an ITA of 100% of QCE against 70% statutory income for QCE incurred for three years (applications to be received by 31 December 2023):</span></p><span data-dcnode-id="555" instrument_node="">
</span><ul data-dcnode-id="538"><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Renewable energy.</span></li><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Energy efficiency.</span></li><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Green building.</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Green data centre.</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Integrated waste management.</span></li><span data-dcnode-id="539" instrument_node="">
</span></ul><span data-dcnode-id="537" instrument_node="">
</span><h3 data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Green technology services</span></h3><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Companies that provide services, such as advisory, design, feasibility study, testing, and commissioning, in the following areas will be eligible for income tax exemption of 70% of statutory income for three years (applications to be received by 31 December 2023):</span></p><span data-dcnode-id="531" instrument_node="">
</span><ul data-dcnode-id="505"><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Renewable energy.</span></li><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Energy efficiency.</span></li><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Electric vehicle.</span></li><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Green building.</span></li><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Green data centre.</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Green certification and verification.</span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Green township.</span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Integrated waste management.</span></li><span data-dcnode-id="506" instrument_node="">
</span></ul><span data-dcnode-id="504" instrument_node="">
</span><h3 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Solar leasing</span></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Companies engaged in solar leasing are eligible for income tax exemption of 70% of statutory income for five or ten years based on the energy production capacity (applications to be received by 31 December 2023).</span></p><span data-dcnode-id="498" instrument_node="">
</span><h3 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Green technology assets</span></h3><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Companies that purchase green technology assets listed on the MyHijau directory will be eligible for an ITA of 100% of QCE incurred from 25 October 2013 to 31 December 2023, to be set off against 70% of statutory income (applications to be received by 31 December 2023).</span></p><span data-dcnode-id="492" instrument_node="">
</span><h2 data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Biotechnology industry</span></h2><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Companies undertaking biotechnology activity with approved bionexus status from Malaysian Biotechnology Corporation Sdn Bhd will be eligible for the following incentives:</span></p><span data-dcnode-id="486" instrument_node="">
</span><ul data-dcnode-id="472"><span data-dcnode-id="485" instrument_node="">
</span><li data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">100% income tax exemption on statutory income for ten years from the first year in which the company derives statutory income or income tax exemption equivalent to a rate of 100% on QCE incurred for a period of five years to be utilised against 100% of statutory income.</span></li><span data-dcnode-id="482" instrument_node="">
</span><li data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Concessionary tax rate of 20% on statutory income from qualifying activities for ten years upon expiry of the original tax-exempt period.</span></li><span data-dcnode-id="479" instrument_node="">
</span><li data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Accelerated industrial building allowance (over ten years) for buildings used solely for the purpose of its new business or expansion project.</span></li><span data-dcnode-id="476" instrument_node="">
</span><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Exemption of import duty and sales tax on import of raw materials and machinery.</span></li><span data-dcnode-id="473" instrument_node="">
</span></ul><span data-dcnode-id="471" instrument_node="">
</span><h2 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Research and development (R&amp;D)</span></h2><span data-dcnode-id="468" instrument_node="">
</span><h3 data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Contract R&amp;D company</span></h3><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Companies that provide R&amp;D services to third parties are eligible for:</span></p><span data-dcnode-id="462" instrument_node="">
</span><ul data-dcnode-id="450"><span data-dcnode-id="461" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="459" style="font-weight: 400;"><span data-dcnode-id="460" instrument_node="">PS of 100% of statutory income for five year</span></span><span data-dcnode-id="457" style="font-weight: 400;"><span data-dcnode-id="458" instrument_node="">s</span></span><span data-dcnode-id="456" instrument_node=""> (extendable by five years), or</span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">ITA of 100% of QCE incurred within a period of ten (extendable by ten years) to be utilised against 70% of statutory income.</span></li><span data-dcnode-id="451" instrument_node="">
</span></ul><span data-dcnode-id="449" instrument_node="">
</span><h3 data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">R&amp;D company</span></h3><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" style="font-weight: 400;"><span data-dcnode-id="445" instrument_node="">ITA of 100% of QCE for a period of&nbsp;ten years (extendable by&nbsp;ten years) to be utilised against 70% of statutory income.</span></span></p><span data-dcnode-id="442" instrument_node="">
</span><h3 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">In-house R&amp;D</span></h3><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Companies undertaking in-house R&amp;D projects are eligible for ITA at the rate of 50% of QCE incurred within a period of ten years (extendable by ten years) to be utilised against 70% of statutory income.</span></p><span data-dcnode-id="436" instrument_node="">
</span><h3 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Commercialisation of resource-based R&amp;D findings</span></h3><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">A company that invests for the sole purpose of financing a project on commercialisation of resource-based R&amp;D findings (which is wholly owned by a public research institute or public institute of higher learning in Malaysia) is given a deduction equivalent to the value of that investment.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The subsidiary undertaking the commercialisation of R&amp;D findings is granted 100% tax exemption on statutory income for ten years.</span></p><span data-dcnode-id="427" instrument_node="">
</span><h2 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Other incentives</span></h2><span data-dcnode-id="424" instrument_node="">
</span><h3 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Shipbuilding and repairing (SBSR)</span></h3><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The following incentives are available for SBSR (applications to be received by 31 December 2022):</span></p><span data-dcnode-id="418" instrument_node="">
</span><ul data-dcnode-id="410"><span data-dcnode-id="417" instrument_node="">
</span><li aria-level="1" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Tax exemption of 70% of statutory income for five years, or ITA of 60% of QCE incurred within five years to be set off against 70% statutory income, for new companies.</span></li><span data-dcnode-id="414" instrument_node="">
</span><li aria-level="1" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">ITA of 60% of QCE incurred within five years to be set off against 70% statutory income for existing companies that have not enjoyed the SBSR incentive.</span></li><span data-dcnode-id="411" instrument_node="">
</span></ul><span data-dcnode-id="409" instrument_node="">

</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">The following incentives are available for MWC:</span></p><span data-dcnode-id="403" instrument_node="">

</span></td><td data-dcnode-id="368" style="height: 56px;"><span data-dcnode-id="369" instrument_node="">Applications received&nbsp;by 31 December 2026.</span></td></tr><tr data-dcnode-id="354" style="height: 30px;"><td data-dcnode-id="362" style="height: 30px;"><span data-dcnode-id="363" instrument_node="">Development manager</span></td><td data-dcnode-id="359" style="height: 30px;"><span data-dcnode-id="360" instrument_node="">PS of 100% exemption on statutory income from management, consultancy, supervisory, or marketing services to MWC developer in MWC from the first year of assessment statutory income is derived until year of assessment 2023.</span></td><td data-dcnode-id="356" style="height: 30px;"><span data-dcnode-id="357" instrument_node="">Applications received on or after 1 January 2013.</span></td></tr><tr data-dcnode-id="322" style="height: 88px;"><td data-dcnode-id="350" style="height: 88px;"><span data-dcnode-id="351" instrument_node="">Developer</span></td><td data-dcnode-id="335" style="height: 88px;"><span data-dcnode-id="348" instrument_node="">

</span><h3 data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Capital allowance for increased automation</span></h3><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Manufacturing companies that have been engaged in manufacturing activities for at least 36 months are eligible for the following incentives, where they have incurred expenditure in more technologically advanced automation equipment used directly in the manufacturing activities and which results in reduced man hours and increased productivity:</span></p><span data-dcnode-id="311" instrument_node="">
</span><ul data-dcnode-id="303"><span data-dcnode-id="310" instrument_node="">
</span><li data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">For high labour-intensive industries (rubber products, plastics, wood, furniture, and textiles industries): 200% automation capital allowance on first MYR 4 million QCE&nbsp;(for years of assessment 2015 to 2023).</span></li><span data-dcnode-id="307" instrument_node="">
</span><li data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Other industries: 200% automation capital allowance on first MYR 2 million QCE&nbsp;(for years of assessment 2015 to 2023).</span></li><span data-dcnode-id="304" instrument_node="">
</span></ul><span data-dcnode-id="302" instrument_node="">
