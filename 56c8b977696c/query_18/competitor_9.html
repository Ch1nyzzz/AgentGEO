</span><h1 class="entry-title" data-dcnode-id="870" itemprop="headline"><span data-dcnode-id="871" instrument_node="">Tax Incentives for Green Technology in Malaysia</span></h1><span data-dcnode-id="869" instrument_node="">

</span><div class="post-wrapper-content" data-dcnode-id="587"><span data-dcnode-id="797" instrument_node="">
</span><div class="section the_content has_content" data-dcnode-id="627"><div class="section_wrapper" data-dcnode-id="628"><div class="the_content_wrapper" data-dcnode-id="629"><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Malaysia Government will provide tax incentives for the purchase of green technology equipment, besides giving tax exemption on the use of green technology services.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">With these tax incentives, it will allow small and medium enterprises to grow the Renewable Energy market. The main purpose of the Malaysia Government is to attract potential investors and industry players to invest in Renewable Energy.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">In addition, the Malaysia government wants to motivate companies to acquire green technology assets and of course, to enhance the number of green technology service providers.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The three groups under the Green Technology Tax incentive:&nbsp;</span></p><span data-dcnode-id="784" instrument_node="">
</span><ul data-dcnode-id="777"><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Green Investment Tax Allowance (GITA) Assets</span></li><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Green Investment Tax Allowance (GITA) Project</span></li><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Green Income Tax Exemption (GITE) Services</span></li></ul><span data-dcnode-id="776" instrument_node="">
</span><h2 data-dcnode-id="773"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Green Investment Tax Allowance (GITA) Assets</span></strong></h2><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">GITA Assets are for companies that acquire qualifying green technology assets and there are listed under MyHIJAU Directory. Companies should comply with ALL of the following criteria:</span></p><span data-dcnode-id="769" instrument_node="">
</span><ul data-dcnode-id="762"><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The companies should minimise the degradation of the environment or reduce greenhouse emissions.</span></li><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">They should promote health and the improvement of the environment.&nbsp;</span></li><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">They need to conserve the use of energy, water and other forms of natural resources, or promote the use of renewable energy, or are able to recycle waste material resources.&nbsp;</span></li></ul><span data-dcnode-id="761" instrument_node="">
</span><h3 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The Rate of Incentive</span></h3><span data-dcnode-id="758" instrument_node="">
</span><ul data-dcnode-id="751"><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Green Investment Tax Allowance (GITA) of 100% of qualifying capital expenditure incurred on approved green technology assets from the date of purchase until 31 December 2020.</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">The allowance can be offset against 70% of statutory income in the year of assessment.</span></li><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Unutilised allowances can be carried forward until they are fully absorbed.</span></li></ul><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="747"><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Green Investment Tax Allowance (GITA) Project</span></strong></h2><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">GITA Projects are for companies that undertake a qualifying green technology. Companies should comply with ALL of the following criteria:</span></p><span data-dcnode-id="743" instrument_node="">
</span><ul data-dcnode-id="736"><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">minimise the degradation of the environment or reduce greenhouse emission</span></li><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">promote health and improvement of the environment</span></li><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">conserve the use of energy, water and/or other forms of natural resources, or promote the use of renewable energy, or are able to recycle waste material resources</span></li></ul><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732"><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">The application should be received by MIDA until 31 December 2020.</span></em></p><span data-dcnode-id="731" instrument_node="">
</span><h3 data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Rate of Incentive</span></h3><span data-dcnode-id="728" instrument_node="">
</span><ul data-dcnode-id="721"><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Green Investment Tax Allowance (GITA) of 100% of qualifying capital expenditure incurred on green technology project from the date of application received by MIDA until the year of assessment 2020.</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The allowance can be offset against 70% of statutory income in the year of assessment.</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Unutilised allowances can be carried forward until they are fully absorbed.</span></li></ul><span data-dcnode-id="720" instrument_node="">
</span><h2 data-dcnode-id="717"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Green Income Tax Exemption (GITE) Services</span></strong></h2><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">GITE Services is for companies which provide green technology services which have been verified by GreenTech Malaysia, and listed under the MyHIJAU Directory. Companies must meet the criteria of green technology service providers as follows:</span></p><span data-dcnode-id="713" instrument_node="">
</span><ul data-dcnode-id="706"><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">At least one competent/qualified personnel in the respective green technology*;</span></li><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Must have a green policy related to the environmental or sustainability**; and</span></li><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">100% income must be derived from the respective green technology services.</span></li></ul><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="702"><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">*Note: Competent personnel are defined as holding a certificate of competency as a service provider in the related field of green technology. The certificate must be recognised by the Government or a Professional Body in Malaysia.</span></em></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698"><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">**Green Policy is a statement about the commitment to sustainability and environment management by the company.</span></em></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">All applications must be submitted to MIDA before 31 December 2020.&nbsp;</span></p><span data-dcnode-id="694" instrument_node="">
</span><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Rate of Incentive</span></h3><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">100% of statutory income from the date of application received by MIDA until the year of assessment 2020 (the maximum period is 5 years from the date of commencement).</span></p><span data-dcnode-id="688" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Qualifying Activities</span></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">For SEDA, there are two main qualifying activities to be approved for the tax incentives:</span></p><span data-dcnode-id="682" instrument_node="">
</span><ol data-dcnode-id="677"><li data-dcnode-id="678"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Renewable Energy</span></strong><span data-dcnode-id="679" instrument_node="">: Commercial and industrial business entities which undertake generation of energy in the form of electricity, steam, heat and chilled water using renewable energy resources such as:</span></li></ol><span data-dcnode-id="676" instrument_node="">
</span><ul data-dcnode-id="663"><li data-dcnode-id="672"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Solar Power</span></strong><span data-dcnode-id="673" instrument_node=""> (including NEM)</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Biomass</span></li><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Biogas</span></li><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Mini hydro</span></li><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Geothermal</span></li></ul><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="659"><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">*Note: Projects which have been approved with Feed-in-Tariff (FiT) for solar by SEDA are not eligible for the Investment Tax Allowance.</span></em></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">2. </span><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Energy Efficiency</span></strong><span data-dcnode-id="654" instrument_node="">: Companies invest in energy efficient equipment or technologies and invest in energy saving equipment.</span></p><span data-dcnode-id="652" instrument_node="">
</span><h2 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">In a Nutshell&nbsp;</span></h2><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Right now, the entire solar power industry in Malaysia is producing 67% of the 270MW of renewable energy.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">There are several solar farms in Malaysia that sells electricity to the grid. Solar farms are designed to produce enough electricity power for thousands of homes and businesses. If you have never seen one, they are just like the solar panels you install on your roof to generate electricity for your needs.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">It’s important to start using renewable energy sources now because they provide clean energy for our lives and reduce climate warming and pollution; and by reducing the use of oil and gas, we can reduce the risk of cancer and heart attacks.</span></p><span data-dcnode-id="640" instrument_node="">
