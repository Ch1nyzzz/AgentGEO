</span><h1 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Greece</span></h1><span data-dcnode-id="775" instrument_node="">
</span><span data-dcnode-id="773" instrument_node="">
</span><header class="heading-grp" data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">
</span><h2 class="section__heading" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Corporate - Tax credits and incentives</span></h2><span data-dcnode-id="769" instrument_node="">
</span><span class="date" data-dcnode-id="767" data-lastreviewed-text="Last reviewed" id="lastReviewedDate"><span data-dcnode-id="768" instrument_node="">Last reviewed - 10 February 2022</span></span><span data-dcnode-id="766" instrument_node="">
</span></header><span data-dcnode-id="764" instrument_node="">
</span><div class="mobile-wrapper" data-dcnode-id="315"><div class="section__content" data-dcnode-id="316" id="txtPageBody"><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Foreign tax credit</span></h2><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Tax paid abroad for income taxable in Greece is credited but is limited to the amount of Greek tax due.</span></p><span data-dcnode-id="756" instrument_node="">
</span><h2 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Deferred taxation</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">The concept of deferred taxation applies on the basis of the IFRS to entities supervised by the Bank of Greece (namely banks and leasing companies, as well as factoring companies). In this respect, said entities may convert tax assets into tax credits in return for shares issued to the Greek state. Specific rules and conditions apply.</span></p><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Incentives for job enhancement</span></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Under certain conditions, an increase by 50% and up to 14 times the minimum wage of an unmarried employee over 25 years old per employment of the employers’ contributions is provided.</span></p><span data-dcnode-id="744" instrument_node="">
</span><h2 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Other tax incentives</span></h2><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">On 4 February 2022, Law 4887/2022 'Development Law - Greece Strong Development’ has been voted by the Greek Parliament. The new Development Law provides a general framework, specified for each aid scheme foreseen through ministerial decisions issued. In essence, the provisions of the new Law start to apply following the issuance of the relevant ministerial decisions. Up to date, the Ministry of Development and Investments is in the process of planning the issuance of the above mentioned ministerial decisions.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Under the new Law, an explicit reference to the provisions of the General Block Exemption Regulation (GBER) of the European Commission (651/17.07.2014, Law 187/1/26.06.2014) is made.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">A threshold is being provided for the types of aid available to individuals’ investment projects, as well as to companies and groups of companies, in order to achieve dispersion of the beneficiaries of state aid.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Special categories of aid are being determined, either (i) on the basis of the performance of the companies (extroversion, mergers, employment increase, sectors, high added value), or (ii) on territorial basis (highland, border areas and areas with increased migration burden, industrial areas, innovations zones). Companies that fall under special categories may be reinforced through capital aids, in case the latter are not provided, or by additional capital aids, in case the latter are provided.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">General Section</span></h3><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The General Section of the new law regulates the beneficiaries of aids provided, the terms and prerequisites for participation, the covered investment projects, the eligible expenses, the types of aids, the procedure regarding the filing of applications and evaluation of investments projects, as well as the issues regarding the implementation and completion of investments projects.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Beneficiaries of the aid schemes are commercial companies, cooperatives, social cooperative companies of Law 4019/2011, groups of producers, organizations of producers, agricultural partnerships of Law 4384/2016, urban cooperatives, companies under formation or under merger (on the condition that they have been incorporated or merged before the commencement of the project), public and municipal enterprises and their subsidiaries (under specific conditions), joint ventures provided that they have been registered with General Commercial Registry (GEMI) and individual companies with a maximum eligible investment project cost of 200,000 Euros and solely for the aid scheme "Agri food- primary production and processing of agricultural products - fisheries and aquaculture. " &nbsp;</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">As regards the terms and prerequisites for participation, it is provided that the compulsory nature of own participation is abolished. The participation of the beneficiary in the cost of the investment project can take place either through own equity or through external financing. The main prerequisite is that 25% of the total investment cost does not contain state aid, support, or subsidy.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The minimum investment amount ranges from EUR 50,000 (for social cooperative companies, agricultural partnerships, groups of producers, organizations of producers, urban cooperatives, and agricultural partnerships) to EUR 1,000,000 (for large companies). Moreover, for medium-sized companies, the investment amount is set at EUR 500,000, for small companies at EUR 250,000 and for very small companies at EUR 100,000.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">The investment projects that fall under the aid schemes should have the character of initial investment (buildings, machinery, intangible) and meet certain conditions (indicatively, creation of new plants, extension of existing plants’ capacity, etc.).</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">The investment projects that are covered by the Law relate, in principle, to all economic sectors, subject to certain exceptions (sector of steel, coal, synthetic fibres, shipbuilding, etc.). Under certain conditions, the covered investment projects could also relate to:</span></p><span data-dcnode-id="708" instrument_node="">
</span><ul data-dcnode-id="697"><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Production or co-production and distribution of heat from renewable energy sources and production of electricity by small hydroelectric projects.</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Tourism.</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Logistics services.</span></li><span data-dcnode-id="698" instrument_node="">
</span></ul><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">In respect of the eligible expenses, these are divided into: (i) eligible expenses of regional state aid nature based on the Regional State Aid Map (capital expenditure in tangible and intangible assets, employment cost of new employees) and (ii) eligible expenses of non-regional state aid, which aim to broaden and enrich the investment options towards new qualitative directions. The maximum amounts and percentages of regional state aids and non-regional state aids are also being determined. Based on the general framework, the maximum amounts and percentages of each individual aid scheme are being specified, in accordance with the provisions of the Special Section of the new Law.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Further, with regard to the types of aid, the following types are provided:</span></p><span data-dcnode-id="690" instrument_node="">
</span><ul data-dcnode-id="673"><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Tax exemption (exemption from the payment of CIT on profits, before taxes, generated from the total business activity of the company, following the deduction of the CIT that corresponds to the profits distributed to the company’s shareholders).</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Subsidy of funds in order to cover part of the eligible expenses of the investment project.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Subsidy of leasing for the acquisition of new machinery and other equipment (which cannot exceed the period of seven years).</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Subsidy of employment cost (which cannot be enhanced with any other state aid)</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Business risk financing only for New entrepreneurship aid scheme</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">All types of aids can be provided either separately or in combination thereof and are all taken into account for the determination of the total aid amount of each investment project. The types of aid are granted (and, respectively, the benefit starts to apply), following a relevant certification, either in lump sum (following the issuance of the decision certifying the completion and the commencement of the productive operation of the project) or gradually (according to the specific requirements per each type of aid granted).</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Moreover, as regards the support and implementation of the new Law (filing of applications, documentation file, evaluation, etc.), all procedural issues will be carried out through a) the Development Planning Directorates of the Regions of the country (for the investment plans of an eligible amount up to 1,000,000 Euros which are implemented within the boundaries of each region), b) the Private Investment Directorate of the Ministry of Interior, Macedonia - Thrace Sector (for the investment plans of an eligible amount of more than&nbsp; 1,000,000 and up to&nbsp; 3,000,000 Euros implemented in the Regions of Western and Central Macedonia and Eastern Macedonia and Thrace) and c) the State Aid Information System of the Ministry of Development and Investments (for the rest investment plans).</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">The evaluation process includes the stage of completion and legality control and the evaluation stage and is carried out either through the method of comparative evaluation or through the method of direct evaluation. Investment projects that fall under the aid schemes are audited at any time and at any stage of implementation of the investment project or at any stage of fulfilling their long-term liabilities.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h3 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Special Section</span></h3><span data-dcnode-id="660" instrument_node="">

</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">In the Special Section of the new Law, the following aid schemes and the relevant aid granted per scheme are being prescribed:</span></p><span data-dcnode-id="654" instrument_node="">

</span><h2 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Scientific and technological research expenses</span></h2><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">The expenses of scientific and technological research, including the depreciation of equipment and instruments used for the purposes of conducting scientific and technological research, are deducted from the gross income of companies at the time of their realization, increased by one hundred percent (100%).</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The criteria for the characterization of the above expenses are determined by a joint decision of the Minister of Finance and the Minister of Development and Investments, which is issued after a suggestion of the Governor of the Independent Authority of Public Revenues. In the event that losses occur after deduction of the above percentage, they shall be carried forward (up to five years), in accordance with Article 27 of the Greek Income Tax Code.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Simultaneously with the submission of its tax return, the company submits to the General Secretary for Research and Innovation (GSRI) of the Ministry of Development and Investments the necessary supporting documentation for the research and technology expenses incurred. The examination and the certification of these expenses are carried out within a period of ten (10) months.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Alternatively, instead of the above procedure, the company, at the same time with the submission of its annual tax return, may elect to submit to the General Secretary for Research and Innovation (GSRI) of the Ministry of Development and Investments, the necessary supporting documents, accompanied by an audit report for the realization of the expenses and their amount, which is signed by a certified auditor - accountant and / or auditing company which is registered in the relevant Public Register with the respective insurance coverage, pursuant to the provisions of articles 14 and 37 of Law 4449/2017 and after the conduction of a relevant audit, in accordance with International Financial Reporting Standards (IFRS) and the tax legislation.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">In this scenario, the General Secretary for Research and Innovation (GSRI) carries out an audit on the physical object, i.e., it checks whether the expenses incurred relate to research and technology activities. The examination and the certification of the expenses are carried out by the competent Service within a period of six (6) months. After the expiration of this deadline, it is considered that the relevant expenses have been approved.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">By a joint decision of the Minister of Finance and the Minister of Development and Investments, which is issued after the opinion of the Accounting Standardization and Audits Committee (“ELTE”), the audit framework (International Standards) is determined, based on which the audits are carried out by the auditors and / or audit companies, in accordance with Law 4449/2017, the necessary supporting documents are defined, as well as the audit process by the General Secretary for Research and Innovation (GSRI). The performance of the control of the expenses of scientific and technological research by certified auditors and / or auditing companies, is being considered as a mandatory audit.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Finally, the audit reports as described above, are subject to a sample audit carried out by the General Secretary for Research and Innovation (GSRI). This sample audit is carried out on an annual basis and covers at least five percent (5%) of the audit reports submitted. If during the above sample audit violations of the provisions are found, as regards the accuracy and completeness of the report by the certified auditor - accountant and / or the auditing company, the case is forwarded to the Accounting Standardization and Audits Committee (“ELTE”) for further examination and a potential imposition of sanctions/fines of par. 10 of article 35 of Law 4449/2017.</span></p><span data-dcnode-id="403" instrument_node="">
</span><h2 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Patent Incentives</span></h2><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">According to the provisions of article 71A of the Greek Income Tax Code, the profits of a company arising from the exploitation of an internationally recognized patent in its name and developed by itself, are exempt from income tax for up to three (3) consecutive years, starting from the year in which these profits were realized for the first time. The exemption is granted on the condition that there is a connection with the research and development expenses incurred by the company for the development of the patent.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Moreover, the amount of the abovementioned exemption is calculated as follows:</span></p><span data-dcnode-id="394" instrument_node="">
</span><span data-dcnode-id="393" instrument_node="">

</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">It is pointed out that in the event that an internationally recognized patent relates to a part or component of the product produced, that patent shall contribute up to thirty percent (30%) to the cost represented by the materials used to manufacture the product in order to benefit from the patent box.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Additionally, the amount of the exemption, which is calculated as above, is depicted in a special reserve account and is subject to taxation in accordance with the general provisions of the Greek Income Tax Code, when distributed or capitalized (i.e., upon use).</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">This exemption is granted provided that there is research and development expense that was carried out by the patent development company. New developments are in force as of 01.01.2022 according to the provisions of article 89 of Law 4864/2021 which amended the article 71A of the Greek Income Tax Code (Law 4172/2013).</span></p></div></div><span data-dcnode-id="314" instrument_node="">
