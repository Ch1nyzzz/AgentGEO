</span><header class="entry-header" data-dcnode-id="4791"><span data-dcnode-id="4795" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">Latest Official Tax (Income Tax + TDS) Updates by CBDT of India</span></h1><span data-dcnode-id="4792" instrument_node="">
</span></header><span data-dcnode-id="4790" instrument_node="">
</span><span data-dcnode-id="4788" instrument_node="">
</span><div class="entry-footer" data-dcnode-id="4759"><span data-dcnode-id="4787" instrument_node="">
</span><span class="posted-on" data-dcnode-id="4782"><i class="fa fa-calendar" data-dcnode-id="4786"></i><span data-dcnode-id="4785" instrument_node=""> Updated on </span><time data-dcnode-id="4783" datetime="2022-04-25T12:00:02+05:30"><span data-dcnode-id="4784" instrument_node="">April 25, 2022</span></time></span><span class="byline" data-dcnode-id="4775"><i class="fa fa-user" data-dcnode-id="4781"></i><span class="screen-reader-text" data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">Posted by</span></span><span class="author vcard" data-dcnode-id="4776"><a class="url fn n" data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/author/vineetasharma" rel="nofollow"><span data-dcnode-id="4778" instrument_node="">CA Vineeta</span></a></span></span><span class="cat-links" data-dcnode-id="4761"><svg aria-hidden="true" class="svg-icon" data-dcnode-id="4772" focusable="false" height="16" role="img" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" data-dcnode-id="4774"></path><path d="M0 0h24v24H0z" data-dcnode-id="4773" fill="none"></path></svg><span class="screen-reader-text" data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Posted in</span></span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/category/taxes-in-india/income-tax" rel="category tag"><span data-dcnode-id="4769" instrument_node="">Latest Income Tax News &amp; Articles</span></a><span data-dcnode-id="4767" instrument_node="">, </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/category/taxes-in-india/tds" rel="category tag"><span data-dcnode-id="4766" instrument_node="">Tax Deducted at Source (TDS) News</span></a><span data-dcnode-id="4764" instrument_node="">, </span><a data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/category/taxes-in-india" rel="category tag"><span data-dcnode-id="4763" instrument_node="">Taxes in India</span></a></span><span data-dcnode-id="4760" instrument_node="">
</span></div><span data-dcnode-id="4758" instrument_node="">
</span><div class="entry-content" data-dcnode-id="772"><span data-dcnode-id="4757" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="4754"><a class="fancybox image" data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/income-tax-tds-latest-updates.jpg"><img alt="Latest Income Tax and TDS Updates" class="wp-image-40547" data-dcnode-id="4756" height="630" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/income-tax-tds-latest-updates.jpg&amp;raw" width="1200"></a></figure><span data-dcnode-id="4753" instrument_node="">
</span><p data-dcnode-id="4748"><span data-dcnode-id="4752" instrument_node=""> Here we have provided complete notifications related to the Income Tax and TDS provisions as per the official government laws. We include all the </span><strong data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">latest updates in Income Tax and TDS</span></strong><span data-dcnode-id="4749" instrument_node="">, news, amendments, and circulars as on the government portal for your reference.</span></p><span data-dcnode-id="4747" instrument_node="">
</span><h2 data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Introduce of Income Tax</span></h2><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Income Tax is the tax levied by the government on the income earned by an individual in any given previous year. Income tax is charged as a price for utilizing the services provided by the government and maintaining the same. It is the main source of revenue for the central government. The main motive of collecting income tax is so that the amount raised by the government can be used for the development of buildings, roads and other infrastructure and development services. Income tax is collected by the central government and distributed to the state governments. </span></p><span data-dcnode-id="4741" instrument_node="">
</span><p data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">Income tax is managed by the Central Board of Direct Tax (CBDT) and is governed by the Income Tax Act, 1961. There are six sources of income according to the Indian tax system. Income from salary, income from business or profession, income from capital gains, income from other sources, income from house property and income from lottery, horse race etc. Different rates of tax are applicable to different types of incomes. Some deductions are also provided by the government on the income. The taxable income of an individual can be calculated after the deduction of such deductions. </span></p><span data-dcnode-id="4738" instrument_node="">
</span><p data-dcnode-id="4730"><span data-dcnode-id="4737" instrument_node="">Income tax is charged by the government according to the income earned by the individual. It is levied according to a slab system. In India, two slab systems are working under income tax, namely, the old system and the new system. The </span><strong data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">new IT slab system</span></strong><span data-dcnode-id="4734" instrument_node=""> was introduced with the annual Budget for the financial year 2020-2021. The government has provided an option of choosing between the slab systems to the assesses. An </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/how-to-e-file-your-income-tax-return-free-guide"><span data-dcnode-id="4733" instrument_node="">income tax return can be filed online</span></a><span data-dcnode-id="4731" instrument_node=""> by the individual assessee under forms ITR-1, ITR-2, ITR-3, ITR-4, ITR-5, and ITR-7 according to the source of income of the assessee. The returns can also be filed by an assesses earning below the tax slabs. Non-compliance with the provisions of Income Tax can attract serious penalties or prison, or both.</span></p><span data-dcnode-id="4729" instrument_node="">
</span><h2 data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Tax Deducted at Source (TDS) in India</span></h2><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4721"><span data-dcnode-id="4725" instrument_node="">Tax deducted at source is the tax deducted by the payer before paying the amount to the payee. It is a form of direct tax.  It is levied on incomes, dividends, asset sales, rents, interest payments by the bank. It is managed by the Central Board of Direct Tax (CBDT) and is governed by the Income Tax Act, 1961. The </span><span class="show-popp" data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">returns of TDS are to be filed by the assesses </span></span><span data-dcnode-id="4722" instrument_node="">every quarter. </span></p><span data-dcnode-id="4720" instrument_node="">
</span><p data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">The tax is imposed so that the burden of tax to be paid by the assesses at the end of the year is reduced infractions every month and the government too can earn some revenue beforehand. Different rates of tax are applicable to different types of transactions. TDS is a form of advance tax. The returns of TDS can be e-filed by the assesses.</span></p><span data-dcnode-id="4717" instrument_node="">
</span><p data-dcnode-id="4712"><span data-dcnode-id="4716" instrument_node="">Section 194IA, </span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/194i-194ib-194ic-tds-income-tax-act"><span data-dcnode-id="4715" instrument_node="">Section 194IB and Section 194IC</span></a><span data-dcnode-id="4713" instrument_node=""> of Income Tax Act,1961 govern the TDS to be deducted on sale of assets and Section 302 governs TDS on dividends. If the tax deducted by the employer is more than the actual liabilities then he/she can claim a refund for the same. Non-compliance with the provisions of TDS can attract penalties or prison, or both. Collection of TDS makes sure that there is no tax evasion by any individual as the employer is responsible to deduct the tax and the situation of tax evasion is not even possible. The statement of TDS is reflected in Form 26AS of the Income Tax Act, 1961 and can be claimed in the same.</span></p><span data-dcnode-id="4711" instrument_node="">
</span><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="4707"><p data-dcnode-id="4708"><strong data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">Fill Form for ITR &amp; TDS Compliance Software</span></strong></p></blockquote><span data-dcnode-id="4706" instrument_node="">

</span><h2 data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">Latest Update in Income Tax and TDS</span></h2><span data-dcnode-id="4645" instrument_node="">
</span><p data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">The latest update in Income Tax and TDS via the government has come up with a lot of amendments under different norms looking to the current situation of the taxpayer/businesses in India. Here is the complete set of the latest Income tax &amp; TDS updates amendments, crucial notifications, and announcements made by the government also the important information that every taxpayer must know:</span></p><span data-dcnode-id="4642" instrument_node="">
</span><p data-dcnode-id="4639"><strong data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">23rd April 2022</span></strong></p><span data-dcnode-id="4638" instrument_node="">
</span><ul data-dcnode-id="4635"><li data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">The Income-tax department has enabled the e-filing of ITR-1 and ITR-4 and the offline e-filing option for ITR-2 at the official website.</span></li></ul><span data-dcnode-id="4634" instrument_node="">
</span><p data-dcnode-id="4631"><strong data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">22nd April 2022</span></strong></p><span data-dcnode-id="4630" instrument_node="">

</span><ul data-dcnode-id="1058"><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1060"><a class="aioseop-link fancybox-pdf" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/circular-number-10-2020.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1063" instrument_node="">Circular number 10/2020 </span></a><span data-dcnode-id="1061" instrument_node=""> stated that reporting under section 30C (GST) and clause 44 (GAAR) of the Form 3CD (Audit Report) has been deferred till March 31, 2021</span></li><span data-dcnode-id="1059" instrument_node="">

</span><ul data-dcnode-id="1042"><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1044"><span data-dcnode-id="1051" instrument_node="">Income tax department issues circular clarifying the direct tax provisions of </span><a aria-label="Vivad Se Vishwas act 2020 (opens in a new tab)" class="aioseop-link" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/tax-dispute-settlement-scheme" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1050" instrument_node="">Vivad Se Vishwas act 2020</span></a><span data-dcnode-id="1048" instrument_node=""> with amendments and changes. </span><a class="fancybox-pdf" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/circular-number-9-2020.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1047" instrument_node="">Download and view</span></a><span data-dcnode-id="1045" instrument_node=""> general circular number 9/2020 for direct tax provisions</span></li><span data-dcnode-id="1043" instrument_node="">
</span></ul><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1038"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">13th April 2020</span></strong></p><span data-dcnode-id="1037" instrument_node="">
</span><ul data-dcnode-id="1023"><span data-dcnode-id="1036" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">In the recent circular provided by the ministry of finance regarding the short deduction of TDS/TCS due to increasing in rates of surcharge by Finance (No.2) Act, 20l9-reg. has been clarified on the official portal. </span><a class="fancybox-pdf" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/tds-tcs-circular-8-2020.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1034" instrument_node="">Download and view</span></a><span data-dcnode-id="1032" instrument_node=""> to find out in detail by official circular number 8/2020 under TDS and TCS</span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">The ministry of finance has issues and circular for the clarification in respect of option under section 115 BAC of the Income-tax Act, 1961. </span><a class="aioseop-link fancybox-pdf" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/section-115-bac-circular_c1_2020.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1028" instrument_node="">Download and view</span></a><span data-dcnode-id="1026" instrument_node=""> the official Circular C1 2020 for Section 115 BAC</span></li><span data-dcnode-id="1024" instrument_node="">
</span></ul><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1019"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">8th April 2020</span></strong></p><span data-dcnode-id="1018" instrument_node="">
</span><ul data-dcnode-id="1010"><span data-dcnode-id="1017" instrument_node="">
</span><li data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">The government has decided to release the pending IT Refunds up to Rs. 5 lakhs on an urgent basis to taxpayers and business entities. </span><a class="fancybox-pdf" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/04/press-release-8-4-2020.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1015" instrument_node="">Download and view</span></a><span data-dcnode-id="1013" instrument_node=""> the official press release</span></li><span data-dcnode-id="1011" instrument_node="">
</span></ul><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">31st March 2020</span></strong></p><span data-dcnode-id="1005" instrument_node="">
</span><ul data-dcnode-id="973"><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">The last date of 31 March 2020 for filing the income tax return for AY 2019-20 (FY 2018-19) has been extended to 30 June 2020. The extension applies to the filing of original return and revised returns.</span></li><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Taxpayers can make tax-saving investments for FY 2019-20 such as payment of LIC premium, deposit to NSC, PPF, SSY and so on until 30 June 2020. Similarly, medical insurance premiums, donations, interest on education loan paid until 30 June 2020 will also be eligible for a tax deduction for FY 2019-20.</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Taxpayers can also make investments in the new house property, bonds and so on until 30 June 2020 to claim capital gains exemption. Such investment or purchase made until 30 June 2020 can be claimed as capital gains exemption for FY 2019-20.</span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">The date for commencement of operation for SEZ units (claiming deduction under section 10AA) has been extended to 30 June 2020, for units which have received approval by 31 March 2020.</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The time for passing income tax orders or issuing income tax notices has been extended from 31 March 2020 to 30 June 2020.</span></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The interest on delayed payment of taxes has been reduced to 9% p.a. for any delayed payment of TDS, TCS, advance tax, equalization levy, Commodities Transaction tax (CTT) or Securities Transaction Tax (STT), which fall due for payment from 20 March 2020 to 29 June 2020, but paid by 30 June 2020.</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The last date for Aadhaar PAN linking is extended to 30 June 2020.</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Donations made to PM CARES Fund will be eligible for a 100% deduction under section 80G. The donation made from 1 April 2020 to 30 June 2020 can be claimed as a tax deduction for the FY 2019-20. In case a taxpayer wants to claim the tax deduction for FY 2020-21, the deduction is allowed both under the old regime and new optional tax regime.</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">The time for declaration and payment under the Vivad se Vishwas Scheme has been extended to 30 June 2020. </span><a class="fancybox-pdf" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2020/03/tax-relief-covid19.pdf" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="978" instrument_node="">Download and view</span></a><span data-dcnode-id="976" instrument_node=""> oficial press release.</span></li><span data-dcnode-id="974" instrument_node="">
</span></ul><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="969"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">13th February 2020</span></strong></p><span data-dcnode-id="968" instrument_node="">
</span><ul data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">As per the income tax norm, the due date for linking Aadhaar to PAN is 31 March 2020 after the expiry of the due date the PAN will be considered in-operative. The format has been mentioned by the government. The PAN considered In-operative will be seen as not furnished and the concerned taxpayer will be deemed for not furnishing the PAN and have to face the related consequences. PAN will operate on the date you furnish the Aadhaar number</span></li><span data-dcnode-id="964" instrument_node="">
</span></ul><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">12th February 2020</span></strong></p><span data-dcnode-id="958" instrument_node="">
</span><ul data-dcnode-id="950"><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Section 115BAA of the Income Tax Act 1961 has been included with the objective to provide the benefit of reduced corporate tax (22%) from FY 2019-20. To avail of the benefit domestic firms need to fulfill certain conditions. Domestic firms need to file Form no. 10-IC valid under section 115BAA to enjoy the reduced corporate taxes. The form is available electronically and needs to be authenticated with a DSC or EVC. Simultaneously, Section 115BAB came into existence facilitating the new domestic manufacturing firms with lower tax rates (15%). Such companies are liable to file Form no. 10-ID and avail reduced tax benefits from FY 2019-20 and so on. The form is available electronically and needs to be authenticated with a DSC or EVC</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The courts of the Chief Judicial Magistrates of the union territory of Jammu and Kashmir were identified by law as the ‘Special Courts’ for resolution of income tax issues and addressing other tax-related purposes within their respective territorial jurisdictions by the Central Government.</span></li><span data-dcnode-id="951" instrument_node="">
</span></ul><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="946"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">29th January 2020</span></strong></p><span data-dcnode-id="945" instrument_node="">
</span><ul data-dcnode-id="910"><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="912" style="list-style-type: none;"><span data-dcnode-id="943" instrument_node="">
</span><ul data-dcnode-id="914"><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="941" instrument_node="">CBDT modified Rule 6DD that restricts the cash expense per day to Rs 10,000 also rule 6BBA says that most of the payments will be in digital mode if the individual wishes to avail of the benefits/reliefs under various provisions of the Income Tax Act, 1961. Modifications will come into effect from the 1st of September 2019. Here is the list of electronic money transaction methods stated under 6BBA:
</span><ol data-dcnode-id="918"><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Credit/debit card</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Net banking</span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">RTGS</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">NEFT</span></li><span data-dcnode-id="928" instrument_node="">
</span><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">BHIM Aadhaar pay</span></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">IMPS</span></li><span data-dcnode-id="922" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">UPI</span></li><span data-dcnode-id="919" instrument_node="">
</span></ol><span data-dcnode-id="917" instrument_node="">
</span></li><span data-dcnode-id="915" instrument_node="">
</span></ul><span data-dcnode-id="913" instrument_node="">
</span></li><span data-dcnode-id="911" instrument_node="">
</span></ul><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Sections affected by the changes:</span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><ul data-dcnode-id="873"><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="878" style="list-style-type: none;"><span data-dcnode-id="903" instrument_node="">
</span><ol data-dcnode-id="880"><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Section 35AD</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Section 40A</span></li><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Section 43/43CA</span></li><span data-dcnode-id="893" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Section 44AD</span></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Section 50C</span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Section 80JJA</span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Section 269SS/269ST/269T</span></li><span data-dcnode-id="881" instrument_node="">
</span></ol><span data-dcnode-id="879" instrument_node="">
</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The modes of electronic payments mentioned above will include account payee check or draft drawn from the bank or through such other electronic mode as prescribed in rule 6ABBA. The provision is effective from the 1st of September 2019</span></li><span data-dcnode-id="874" instrument_node="">
</span></ul><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="869"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">28th January 2020</span></strong></p><span data-dcnode-id="868" instrument_node="">
</span><ul data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Institute of Pesticide Formulation Technology, Gurugram (PAN:- AAATI0389Q) gained approval from the Central Government for serving the purpose u/s 35(1)(ii) of the income tax act valid from AY 2019-20 under the category of “Research Association”</span></li><span data-dcnode-id="864" instrument_node="">
</span></ul><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="859"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">6th January 2020</span></strong></p><span data-dcnode-id="858" instrument_node="">
</span><ul data-dcnode-id="836"><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="856" instrument_node="">Finance (No. 2) Act, 2019 amended Section 92D of the Income Tax Act, 1961 clarifying that an outlet of any international group is obliged to preserve and submit the master file even when it had no involvement in any international transaction during the financial year. Similarly, CBDT has included certain amendments in U/S 10DA and Section 10DB of the Income-tax Rules, 1962. Here are some of those changes:
</span><ol data-dcnode-id="840"><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="845"><span data-dcnode-id="854" instrument_node="">The entire data or documents to be furnished by the subordinate entity of any international group (as mentioned u/s 10DA) shall be submitted to the joint commissioner Form 3CEAA before the expiry of the </span><span class="show-popp" data-dcnode-id="847"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/income-tax-return-due-dates"><span data-dcnode-id="853" instrument_node="">due date for ITR filing</span></a><a class="popup2" data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/income-tax-return-due-dates"><span data-dcnode-id="851" instrument_node=""> </span><img data-dcnode-id="850" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/wp-content/uploads/2016/06/due-date-income-tax.jpg&amp;raw"><span data-dcnode-id="849" instrument_node="">Get all due dates of income tax return and payment of advance taxes for FY 2019-20 (AY 2020-21). We update the last date as per the IT departments notifications. Read More</span></a></span><span data-dcnode-id="846" instrument_node="">. Form 3CEAA will be submitted to the Director-General of Income-tax (Risk assessment)</span></li><span data-dcnode-id="844" instrument_node="">
</span><li data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">As per section 10DB, either the holding company or the alternate reporting entity (established in India), is liable to furnish the report in Form No. 3CEAD (for every reporting financial year) to Joint Commissioner as may be designated by the Director-General of Income-tax (Risk Assessment)</span></li><span data-dcnode-id="841" instrument_node="">
</span></ol><span data-dcnode-id="839" instrument_node="">
</span></li><span data-dcnode-id="837" instrument_node="">
</span></ul><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="832"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">3rd January 2020</span></strong></p><span data-dcnode-id="831" instrument_node="">
</span><ul data-dcnode-id="814"><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Indian Institute of Technology (Indian School of Mines), Dhanbad was included under the category of “University, college or other institution” under section 35(1)(ii/iii) starting from AY 2019-20 and onwards</span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="826" instrument_node="">CBDT introduced the ITR Forms (ITR-1 and ITR-4) for AY 2020-21. Below are the modifications made by the organization:
</span><ol data-dcnode-id="818"><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Taxpayers with the carried forward/brought forward loss under ‘Income From House Property’ is no longer eligible to use ITR-1 &amp; ITR-4 while filing the ITR</span></li><span data-dcnode-id="822" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">If the property is rented then the landlord is liable to furnish the name and PAN or Aadhar number of the Tenant in ITR-4</span></li><span data-dcnode-id="819" instrument_node="">
</span></ol><span data-dcnode-id="817" instrument_node="">
</span></li><span data-dcnode-id="815" instrument_node="">
</span></ul><div class="addtoany_share_save_container addtoany_content addtoany_content_bottom" data-dcnode-id="774"><div class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="Latest Official Tax (Income Tax + TDS) Updates by CBDT of India" data-a2a-url="https://blog.saginfotech.com/income-tax-tds-latest-updates" data-dcnode-id="775" style="line-height: 32px;"><a class="a2a_button_facebook" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/%23facebook" rel="nofollow noopener" target="_blank" title="Facebook"><span class="a2a_svg a2a_s__default a2a_s_facebook" data-dcnode-id="811" style="background-color: rgb(24, 119, 242);"><svg aria-hidden="true" data-dcnode-id="812" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5.26 1.905-5.26 5.405v3.016h-3.53v4.09h3.53V27.5h4.223z" data-dcnode-id="813" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Facebook</span></span></a><a class="a2a_button_twitter" data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.saginfotech.com/%23twitter" rel="nofollow noopener" target="_blank" title="Twitter"><span class="a2a_svg a2a_s__default a2a_s_twitter" data-dcnode-id="805" style="background-color: rgb(29, 155, 240);"><svg aria-hidden="true" data-dcnode-id="806" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M28 8.557a9.913 9.913 0 01-2.828.775 4.93 4.93 0 002.166-2.725 9.738 9.738 0 01-3.13 1.194 4.92 4.92 0 00-3.593-1.55 4.924 4.924 0 00-4.794 6.049c-4.09-.21-7.72-2.17-10.15-5.15a4.942 4.942 0 00-.665 2.477c0 1.71.87 3.214 2.19 4.1a4.968 4.968 0 01-2.23-.616v.06c0 2.39 1.7 4.38 3.952 4.83-.414.115-.85.174-1.297.174-.318 0-.626-.03-.928-.086a4.935 4.935 0 0
