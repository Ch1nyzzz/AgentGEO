</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">A PAN is a unique identifier issued to all judicial entities identifiable under the Indian Income Tax Act, 1961. The income tax PAN and its linked card are issued under Section 139A of the Income Tax Act. It is issued by the Indian Income Tax Department under the supervision of the Central Board for Direct Taxes (CBDT) and it also serves as an important proof of identification.It is also issued to foreign nationals (such as investors) subject to a valid visa, and hence a PAN card is not acceptable as proof of Indian citizenship.</span></p><span data-dcnode-id="485" instrument_node="">
