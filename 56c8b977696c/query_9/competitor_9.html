</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1636"><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><img alt="Latest on Labuan Company Tax" class="wp-image-7962 size-full aligncenter" data-dcnode-id="1700" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/wp-content/uploads/2017/01/images.jpg&amp;raw" style="color: #7a7a7a;" width="261"></p><div data-dcnode-id="1696"><span data-dcnode-id="1697" style="text-align: justify; font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-weight: var( --e-global-typography-text-font-weight );"><span data-dcnode-id="1698" instrument_node="">Below is the guide on the latest of Labuan Company Tax for corporate as well as individual for your understanding.</span></span></div><div data-dcnode-id="1693"><span data-dcnode-id="1694" style="text-align: justify; font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-weight: var( --e-global-typography-text-font-weight );"><span data-dcnode-id="1695" instrument_node="">&nbsp;</span></span></div><p data-dcnode-id="1688" style="text-align: justify;"><span data-dcnode-id="1692" instrument_node="">A Labuan company’s activity is permitted to carry on the activity in, from or through Labuan, in any foreign currency as well as Malaysian currency, with non-resident or with another Labuan entity or even local Malaysian entities! To get to know the latest 2021 Labuan tax changes and law in great detail, please visit&nbsp;</span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/2021-latest-labuan-tax-info/" rel="noopener" target="_blank"><span data-dcnode-id="1691" instrument_node="">here</span></a><span data-dcnode-id="1689" instrument_node="">.</span></p><p data-dcnode-id="1686" style="text-align: justify;"><span data-dcnode-id="1687" instrument_node="">For Labuan Company corporate tax annual filing, the assessment will be based on the activities carried out during the year. The financial year end for all Labuan companies is usually fixed on 31st December each year (unless you apply for a different date).</span></p><h4 data-dcnode-id="1682" style="text-align: justify;"><span data-dcnode-id="1683" style="color: #666699;"><b data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Ready assistance to our clients</span></b></span></h4><p data-dcnode-id="1680" style="text-align: justify;"><span data-dcnode-id="1681" instrument_node="">For all our clients, we assist with the opening of the corporate tax file (Form LE) and perform yearly tax filing with Labuan Inland Revenue Board (IRB). The dateline of submission is by 31st March annually, extendable to 31st May (subject to IRB’s discretion).</span></p><p data-dcnode-id="1678" style="text-align: justify;"><span data-dcnode-id="1679" instrument_node="">There are three choices (3) options of tax election for the Labuan Company based on nature of activities as follows:</span></p><p data-dcnode-id="1675" style="text-align: justify;"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">A. For Trading Company</span></strong></p><p data-dcnode-id="1670" style="text-align: justify;"><span data-dcnode-id="1674" instrument_node="">Trading activity of a Labuan Company is defined as carrying activities, which include banking, insurance, trading, management, financing, import, export, trading, agency, wholesaler, consultancy and advisory. The corporate tax will be 3% on profits (with audit report required) subject to complying with the latest substance requirements or otherwise, 24% as per the local tax legislation. To understand more on the substance requirements, please read&nbsp;</span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/2021-latest-labuan-tax-info/" rel="noopener" target="_blank"><span data-dcnode-id="1673" instrument_node="">here</span></a><span data-dcnode-id="1671" instrument_node="">.</span></p><p data-dcnode-id="1667" style="text-align: justify;"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">B. For Investment Holding Company</span></strong></p><p data-dcnode-id="1662" style="text-align: justify;"><span data-dcnode-id="1666" instrument_node="">Labuan Company can act as an investment holding (non-trading activity), that includes the activities relating to the holding of investments in securities, stocks, shares, loans, deposits and immovable properties in Malaysia or outside Malaysia. The corporate tax used to be 0% with no audit reporting required except for management account. Under the&nbsp;</span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/2021-latest-labuan-tax-info/" rel="noopener" target="_blank"><span data-dcnode-id="1665" instrument_node="">latest tax changes</span></a><span data-dcnode-id="1663" instrument_node="">, there are 2 categories of investment holding:</span></p><p data-dcnode-id="1660" style="text-align: justify;"><span data-dcnode-id="1661" instrument_node="">i. Pure Equity Holding Labuan Company (hold equity participation and earn receive interest from dividend monies or capital gain proceeds from disposal of shares) – the corporate tax rate of 3% on net profits may be enjoyed provided that (1) control and management is established in Labuan and (2) a minimum annual operating expenditure (OPEX) of RM 20,000 is spent in Labuan. Otherwise, the corporate tax rate of 24% will apply.</span></p><p data-dcnode-id="1656" style="text-align: justify;"><span data-dcnode-id="1659" instrument_node="">ii. Non-Pure Equity Holding Labuan Company (hold variety of assets and earn different types of income such as interests, rents and royalties) – the preferential tax rate of 3% on net profits may be enjoyed subject to substance fulfilment of (1) at least one full time employee employment in Labuan and (2) </span><span data-dcnode-id="1657" style="font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-weight: var( --e-global-typography-text-font-weight );"><span data-dcnode-id="1658" instrument_node="">a minimum annual operating expenditure (OPEX) of RM 20,000 is spent in Labuan. Otherwise, the corporate tax rate of 24% will apply.</span></span></p><p data-dcnode-id="1653" style="text-align: justify;"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">C. For Dormant (Inactive) Company</span></strong></p><p data-dcnode-id="1651" style="text-align: justify;"><span data-dcnode-id="1652" instrument_node="">Dormant or inactive Labuan Company are required to submit relevant tax documents on an annual basis until the company is officially struck off or removed from the Labuan Register. Generally, due to the nature of the company, management accounts will suffice with no tax and audit report required.</span></p><p data-dcnode-id="1648" style="text-align: justify;"><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">D. Irrevocable election of Inland Tax Act 1967 (Local Onshore Malaysian Tax Law)</span></strong></p><p data-dcnode-id="1643" style="text-align: justify;"><span data-dcnode-id="1647" instrument_node="">Labuan company that have opted to be taxed under the Malaysia Onshore Income Tax Act 1967 will&nbsp; follow the local corporate tax rate of 17% on the first RM 600,000 followed by 24% on subsequent chargeable income. The accounts has to be audited by an approved Labuan auditor and be filed to the local IRB annually. For more info, please click&nbsp;</span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/labuan-company-auditing-process/" rel="noopener" target="_blank"><span data-dcnode-id="1646" instrument_node="">here</span></a><span data-dcnode-id="1644" instrument_node="">!</span></p><p data-dcnode-id="1638" style="text-align: justify;"><span data-dcnode-id="1642" instrument_node="">Please refer to&nbsp;</span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/faq-on-labuan-company-taxation/" rel="noopener" target="_blank"><span data-dcnode-id="1641" instrument_node="">FAQ on Labuan Company Tax</span></a><span data-dcnode-id="1639" instrument_node="">&nbsp;for more information.</span></p><span data-dcnode-id="1637" instrument_node=""> </span></div><span data-dcnode-id="1635" instrument_node="">
</span></div><span data-dcnode-id="1633" instrument_node="">
</span></div><span data-dcnode-id="1631" instrument_node="">
</span><div class="elementor-element elementor-element-656b88c3 elementor-widget elementor-widget-text-editor" data-dcnode-id="1618" data-element_type="widget" data-id="656b88c3" data-widget_type="text-editor.default"><span data-dcnode-id="1630" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1620"><span data-dcnode-id="1629" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1622"><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" style="font-family: tahoma, arial, helvetica, sans-serif; color: #666699; font-size: 14pt;"><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Latest Labuan Company Tax – Employer’s Return and Personal Income Tax</span></strong></span></p><span data-dcnode-id="1623" instrument_node=""> </span></div><span data-dcnode-id="1621" instrument_node="">
</span></div><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">
</span><div class="elementor-element elementor-element-331e73a6 elementor-widget elementor-widget-text-editor" data-dcnode-id="1599" data-element_type="widget" data-id="331e73a6" data-widget_type="text-editor.default"><span data-dcnode-id="1616" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1601"><span data-dcnode-id="1615" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1603"><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><img alt="Malaysia Inland Revenue for Labuan Company Tax" class="wp-image-4967 alignleft" data-dcnode-id="1613" height="132" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/wp-content/uploads/2014/07/images-24.jpg&amp;raw" style="color: #7a7a7a;" width="176"></p><p data-dcnode-id="1607" style="text-align: justify;"><span data-dcnode-id="1611" instrument_node="">Every Labuan company is obliged to comply with IRB’s regulations to lodge Employer Return (Form LE) declaring the number of staffs employed in the Company and every employee has the duty to file their Personal Income Tax (Form BE) on a yearly basis. For Malaysians, the personal income tax filing is only applicable to earnings of more than RM30,000 per year. [Further reference:&nbsp;</span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labuanbusiness.com/guide-on-personal-tax-filing-for-expatriate-employed-by-labuan-company/" rel="noopener" target="_blank"><span data-dcnode-id="1610" instrument_node="">Personal Income Tax for Expatriates</span></a><span data-dcnode-id="1608" instrument_node="">]</span></p><p data-dcnode-id="1605" style="text-align: justify;"><span data-dcnode-id="1606" instrument_node="">The annual due date for Employer Return (Form E) filing is 31 March, which is to be filed by the company, while the Personal Income Tax (Form BE) filing is 30th April by the individual working in a Labuan company, with Inland Revenue Board of Malaysia.</span></p><span data-dcnode-id="1604" instrument_node=""> </span></div><span data-dcnode-id="1602" instrument_node="">
</span></div><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span><div class="elementor-element elementor-element-7a0df09 elementor-widget elementor-widget-text-editor" data-dcnode-id="1585" data-element_type="widget" data-id="7a0df09" data-widget_type="text-editor.default"><span data-dcnode-id="1597" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1587"><span data-dcnode-id="1596" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1589"><span data-dcnode-id="1595" instrument_node="">
</span><h4 data-dcnode-id="1591"><span data-dcnode-id="1592" style="color: #666699; font-family: tahoma, arial, helvetica, sans-serif; font-size: 14pt;"><strong data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Latest Personal Income Tax Rebates – For Expatriates and Malaysians</span></strong></span></h4><span data-dcnode-id="1590" instrument_node=""> </span></div><span data-dcnode-id="1588" instrument_node="">
</span></div><span data-dcnode-id="1586" instrument_node="">
</span></div><span data-dcnode-id="1584" instrument_node="">
</span><div class="elementor-element elementor-element-96c81e3 elementor-widget elementor-widget-text-editor" data-dcnode-id="1559" data-element_type="widget" data-id="96c81e3" data-widget_type="text-editor.default"><span data-dcnode-id="1583" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1561"><span data-dcnode-id="1582" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1563"><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579" style="text-align: justify;"><span data-dcnode-id="1580" instrument_node="">There are four (4) main tax-exempt incentives applicable up to the year 2020 for those working in a a Labuan Company. Only one (1) incentive has been extended (see below):</span></p><ol data-dcnode-id="1570" style="text-align: justify;"><li data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Exempt expatriates from the payment of income tax in respect of fees received by that individual in his/her capacity as a director of a Labuan entity. (Latest 2021 update: This exemption has been extended for another five (5) years until YA2025 as per the latest Labuan Directive issued on 4 December 2020).&nbsp;</span></li><li data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Exempt any person (expatriates or Malaysians) from payment of income tax on 65% of the statutory income derived from a source consisting of the provision of qualifying professional services (legal, accounting, financial and secretarial services) rendered in Labuan by that person to a Labuan entity. (Expired on 31 December 2020)</span></li><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Exempt expatriates from the payment of income tax on 50% of gross income received by that individual from exercising an employment in a managerial capacity with a Labuan entity in Labuan, co-located office or marketing office. (Expired on 31 December 2020)</span></li><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Exempt Malaysian citizens from the payment of income tax on 50% of gross housing allowance and gross allowance received by that individual from exercising employment with a Labuan entity in Labuan. (Expired on 31 December 2020)</span></li></ol><div data-dcnode-id="1568" style="text-align: justify;"><span data-dcnode-id="1569" instrument_node="">&nbsp;</span></div><div data-dcnode-id="1565" style="text-align: justify;"><span data-dcnode-id="1566" style="font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-weight: var( --e-global-typography-text-font-weight );"><span data-dcnode-id="1567" instrument_node="">Late lodgment will be subjected to penalties directly imposed by the IRB Authority. The consequences of failing to comply with the regulations may affect the visa renewal process.</span></span></div><span data-dcnode-id="1564" instrument_node=""> </span></div><span data-dcnode-id="1562" instrument_node="">
</span></div><span data-dcnode-id="1560" instrument_node="">
</span></div><span data-dcnode-id="1558" instrument_node="">

</span><p data-dcnode-id="1550" style="text-align: justify;"><span data-dcnode-id="1551" style="font-size: 12pt;"><span data-dcnode-id="1554" instrument_node="">Feel free to email us at </span><span data-dcnode-id="1553" instrument_node="">contact@labuanbusiness.com</span><span data-dcnode-id="1552" instrument_node=""> if you need assistance with your Labuan Company tax issues with our in-house Labuan Tax Expert!</span></span></p><p data-dcnode-id="1548" style="text-align: justify;"><span data-dcnode-id="1549" instrument_node="">Labuan Business ‘One Platform’ is designed to meet your convenience to subscribe to all services in one stop to simplify your investment in Labuan from day one!&nbsp;</span></p><span data-dcnode-id="1547" instrument_node=""> </span></div><span data-dcnode-id="1545" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="339"><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="457" style="text-align: center;"><strong data-dcnode-id="458"><span data-dcnode-id="459" style="font-size: 14pt; color: #0e9db0;"><span data-dcnode-id="460" instrument_node="">Latest on Labuan Company Tax</span></span></strong></p><p data-dcnode-id="453" style="text-align: left;"><img alt="Latest on Labuan Company Tax" class="aligncenter wp-image-7962 size-full" data-dcnode-id="456" height="123" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/wp-content/uploads/2017/01/images.jpg&amp;raw" width="261"><span data-dcnode-id="454" style="font-size: 12pt;"><span data-dcnode-id="455" instrument_node="">Below is the guide on the latest of Labuan Company Tax for corporate as well as individual for your understanding. </span></span></p><p data-dcnode-id="447" style="text-align: left;"><span data-dcnode-id="448" style="font-size: 12pt;"><span data-dcnode-id="452" instrument_node="">A Labuan company’s activity is permitted to carry on the activity&nbsp; in, from or through Labuan, in any foreign currency other than Malaysian currency with non-resident or with another Labuan entity. It is also permitted to </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.labuanbusinesstax.com/labuan-entities-dealing-malaysian-residents/"><span data-dcnode-id="451" instrument_node="">deal with local Malaysian entities</span></a><span data-dcnode-id="449" instrument_node=""> with the certain requirement on reporting to Labuan FSA.</span></span></p><p data-dcnode-id="444"><span data-dcnode-id="445" style="font-size: 12pt;"><span data-dcnode-id="446" instrument_node="">For Labuan Company corporate tax annual filing, the assessment will be based on the activities carried out during the year. The financial year end for all Labuan companies is fixed on 31st December each year. </span></span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Ready assistance to our clients</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" style="font-size: 12pt;"><span data-dcnode-id="440" style="font-size: 12pt;"><span data-dcnode-id="441" instrument_node="">For all our clients, we assist in the opening of the corporate tax file (Form LE) and perform yearly tax filing with Labuan Inland Revenue Board (IRB). The dateline of submission is&nbsp;</span></span><span data-dcnode-id="438" style="font-size: 12pt;"><span data-dcnode-id="439" instrument_node="">by 31st March annually, extendable to 31st May (subject to IRB’s discretion).&nbsp;</span></span></span></p><p data-dcnode-id="433"><span data-dcnode-id="434" style="font-size: 12pt;"><span data-dcnode-id="435" instrument_node="">There are three choices (3) options of tax election for the Labuan Company based on nature of activities as follows:</span></span></p><p data-dcnode-id="419"><span data-dcnode-id="429" style="font-size: 12pt; color: #ff9900;"><span data-dcnode-id="431" style="color: #0e9db0;"><span data-dcnode-id="432" instrument_node="">A. For Trading Company&nbsp;</span></span><br data-dcnode-id="430"></span><br data-dcnode-id="428"><span data-dcnode-id="420" style="font-size: 12pt;"><span data-dcnode-id="427" instrument_node="">Trading activity of a Labuan Company is defined as carrying activities, which include </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/guide-apply-labuan-commercial-banking-license/"><span data-dcnode-id="426" instrument_node="">banking</span></a><span data-dcnode-id="424" instrument_node="">, </span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/guide-to-set-up-labuan-general-insurance-business/"><span data-dcnode-id="423" instrument_node="">insurance</span></a><span data-dcnode-id="421" instrument_node="">, trading, management, financing, import, export, trading, agency, wholesaler, consultancy and advisory.&nbsp;The corporate tax will be 3% (with audit report required).</span></span></p><p data-dcnode-id="416"><span data-dcnode-id="417" style="font-size: 12pt; color: #0e9db0;"><span data-dcnode-id="418" instrument_node="">B. For Investment Holding Company</span></span></p><p data-dcnode-id="413"><span data-dcnode-id="414" style="font-size: 12pt;"><span data-dcnode-id="415" instrument_node="">Labuan Company can act as an investment holding(non-trading&nbsp;activity), that includes the activities relating to the holding of investments in securities, stocks, shares,&nbsp;loans, deposits and immovable properties in Malaysia or outside Malaysia.&nbsp;The corporate tax will be 0%, no audit reporting required except for management account.&nbsp;</span></span></p><p data-dcnode-id="410"><span data-dcnode-id="411" style="font-size: 12pt; color: #0e9db0;"><span data-dcnode-id="412" instrument_node="">C. For Dormant (inactive) Company</span></span></p><p data-dcnode-id="407"><span data-dcnode-id="408" style="font-size: 12pt;"><span data-dcnode-id="409" instrument_node="">Labuan Company which is dormant also required to submit relevant tax documents. However, there is no tax and audit reporting required except for management account for a dormant company.</span></span></p><p data-dcnode-id="404"><span data-dcnode-id="405" style="color: #239ab8; font-size: 12pt;"><span data-dcnode-id="406" instrument_node="">D. Dealing with Malaysian Resident</span></span></p><p data-dcnode-id="397"><span data-dcnode-id="398" style="font-size: 12pt;"><span data-dcnode-id="403" instrument_node="">Labuan company that dealt with Malaysia residents (individual or corporate)&nbsp; that have opted to be taxed under the Malaysia onshore Income Tax Act 1967 with a tax rate of 24% on net profit. The account has to be audited and file to the local IRB annually. For more info, please </span><span data-dcnode-id="399" style="color: #239ab8;"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.labuanbusinesstax.com/labuan-corporate-tax-info/" rel="noopener noreferrer" style="color: #239ab8;" target="_blank"><span data-dcnode-id="402" instrument_node="">click here</span></a><span data-dcnode-id="400" instrument_node="">!</span></span></span></p><p data-dcnode-id="388"><span data-dcnode-id="389" style="font-size: 12pt;"><span data-dcnode-id="396" instrument_node="">Please refer to </span><span data-dcnode-id="391" style="color: #209e9e;"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.labuanbusiness.com/faq-on-labuan-company-taxation/" rel="noopener noreferrer" style="color: #209e9e;" target="_blank"><span data-dcnode-id="395" instrument_node="">F</span><span data-dcnode-id="393" style="color: #239ab8;"><span data-dcnode-id="394" instrument_node="">AQ on Labuan Company Tax</span></span></a></span><span data-dcnode-id="390" instrument_node=""> for more information.</span></span></p><p data-dcnode-id="386"><img alt="Malaysia Inland Revenue for Labuan Company Tax" class="aligncenter wp-image-4967" data-dcnode-id="387" height="132" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/wp-content/uploads/2014/07/images-24.jpg&amp;raw" width="176"></p><h4 data-dcnode-id="383"><span data-dcnode-id="384" style="color: #000080; font-size: 14pt;"><span data-dcnode-id="385" instrument_node="">Latest Labuan Company Tax- Employer’s Return and Personal Income Tax &nbsp;</span></span></h4><p data-dcnode-id="364"><span data-dcnode-id="374" style="font-size: 12pt;"><span data-dcnode-id="382" instrument_node="">Every Labuan company is obliged to comply with IRB’s regulations to lodge Employer Return (Form LE) declaring the number of staffs employed in the Company and every employee has the duty to file their </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.labuanbusinesstax.com/labuan-personal-tax-info/"><span data-dcnode-id="381" instrument_node="">Personal Income Tax (Form BE)</span></a><span data-dcnode-id="379" instrument_node=""> on yearly basis. For Malaysians, the personal income tax filing is only applicable to earning more than RM30,000 per year. [Further reference: </span><span data-dcnode-id="376" style="color: #003366;"><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.labuanbusiness.com/guide-on-personal-tax-filing-for-expatriate-employed-by-labuan-company/" rel="noopener noreferrer" style="color: #003366;" target="_blank"><span data-dcnode-id="378" instrument_node="">Personal Income Tax for Expatriates</span></a></span><span data-dcnode-id="375" instrument_node="">]</span></span><br data-dcnode-id="373"><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/faq-on-labuan-company-taxation/" rel="noopener noreferrer" target="_blank" title="FAQ on Labuan Company Taxation"><span data-dcnode-id="371" style="color: #ffcc00;"><br data-dcnode-id="372"></span></a><span data-dcnode-id="368" style="color: #333333; font-size: 12pt;"><span data-dcnode-id="369" instrument_node="">The annual due date for Employer Return (Form E) filing is 31 March file by the company while the Personal Income Tax (Form BE) filing is 30th April with IRB by the individual working in a Labuan company.</span></span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labuanbusiness.com/faq-on-labuan-company-taxation/" rel="noopener noreferrer" target="_blank" title="FAQ on Labuan Company Taxation"><span data-dcnode-id="366" style="color: #ffcc00;"><br data-dcnode-id="367"></span></a></p><h4 data-dcnode-id="361"><span data-dcnode-id="362" style="color: #000080; font-size: 14pt;"><span data-dcnode-id="363" instrument_node="">Latest Personal Income Tax Rebates – For Expatriates and Malaysians</span></span></h4><p data-dcnode-id="358"><span data-dcnode-id="359" style="font-size: 12pt;"><span data-dcnode-id="360" instrument_node="">There are four (4) main tax-exempt incentives applicable up to the year 2020 working in a Labuan Company for the following capacity:</span></span></p><p data-dcnode-id="355"><span data-dcnode-id="356" style="font-size: 12pt;"><span data-dcnode-id="357" instrument_node="">1. Exempt expatriates from the payment of income tax in respect of fees received by that individual in his/her capacity as a director of a Labuan entity.&nbsp;</span></span></p><p data-dcnode-id="352"><span data-dcnode-id="353" style="font-size: 12pt;"><span data-dcnode-id="354" instrument_node="">2. Exempt any person (expatriates or Malaysians) from payment of income tax on 65% of the statutory income derived from a source consisting of the provision of qualifying professional services (legal, accounting, financial and secretarial services) rendered in Labuan by that person to a Labuan entity.</span></span></p><p data-dcnode-id="344"><span data-dcnode-id="351" instrument_node="">3.&nbsp;</span><span data-dcnode-id="348" style="font-size: 12pt;"><span data-dcnode-id="350" instrument_node="">Exempt expatriates from the payment of income tax on 50% of gross income received by that individual from exercising an employment in a managerial capacity with a Labuan entity in Labuan, co-located office or marketing office.</span><br data-dcnode-id="349"></span><br data-dcnode-id="347"><span data-dcnode-id="345" style="font-size: 12pt;"><span data-dcnode-id="346" instrument_node="">4. Exempt Malaysian citizens from the payment of income tax on 50% of gross housing allowance and gross allowance received by that individual from exercising employment with a Labuan entity in Labuan.</span></span></p><p data-dcnode-id="341"><span data-dcnode-id="342" style="font-size: 12pt;"><span data-dcnode-id="343" instrument_node="">Late lodgement will subject to penalty directly imposed by the IRB Authority. The consequences by failing to comply with the regulations may affect the renewal visa process.&nbsp;</span></span></p><span data-dcnode-id="340" instrument_node=""> </span></div><span data-dcnode-id="338" instrument_node="">
