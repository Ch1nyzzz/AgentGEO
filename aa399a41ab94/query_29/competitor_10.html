</span><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">We often refer to our expanding universe with one simple word: space. But where does space begin and, more importantly, what is it?</span></p><div class="ad-unit" data-dcnode-id="2186" id="ad-unit-1"></div><p data-dcnode-id="2181"><span data-dcnode-id="2185" instrument_node="">Space is an almost perfect vacuum, nearly void of matter and with extremely low pressure. In space, sound doesn't carry because there aren't molecules close enough together to transmit sound between them. Not quite empty, bits of gas, dust and other matter floats around "emptier" areas of the universe, while more crowded regions can host planets, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/57-stars-formation-classification-and-constellations.html"><span data-dcnode-id="2184" instrument_node="">stars</span></a><span data-dcnode-id="2182" instrument_node=""> and galaxies.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2180" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="2137058834697831200" data-widget-type="seasonal"></aside><p data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">From our </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/54-earth-history-composition-and-atmosphere.html"><span data-dcnode-id="2178" instrument_node="">Earth</span></a><span data-dcnode-id="2176" instrument_node="">-bound perspective, outer space is most often thought to begin about 62 miles (100 kilometers) above sea level at what is known as the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/6564-edge-space.html"><span data-dcnode-id="2175" instrument_node="">Kármán line</span></a><span data-dcnode-id="2173" instrument_node="">. This is an imaginary boundary at an altitude where there is no appreciable air to breathe or scatter light. Passing this altitude, blue starts to give way to black because oxygen molecules are not in enough abundance to make the sky blue.</span></p><div class="in-article ad-unit" data-dcnode-id="2127" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2128" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2129"><div data-dcnode-id="2130"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2131" id="trc_wrapper_61451" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2155" id="trc_header_61451"><div class="trc_header_ext" data-dcnode-id="2157"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2165"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow spon bel video-title trc_ellipsis" data-dcnode-id="2145" style="-webkit-line-clamp: 2;"><span data-dcnode-id="2146" instrument_node="">Glucose Monitoring So Convenient, You'll Forget You're Wearing It</span></span><span class="branding" data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Dexcom</span></span></span></a><div class="trc_user_exclude_btn" data-dcnode-id="2140" title="Remove this item"></div><div class="trc_exclude_overlay trc_fade" data-dcnode-id="2139"></div><div class="trc_undo_btn" data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Undo</span></div></div></div></div></div><div class="trc_clearer" data-dcnode-id="2132"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2125" id="mobile-in-article"><div data-dcnode-id="2126" id="mobile-taboola-mid-article"></div></div><p data-dcnode-id="2120"><strong data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/42733-virgin-galactic-space-claim-relies-on-karman-line.html"><span data-dcnode-id="2122" instrument_node="">Where DOES Space Begin? Virgin Galactic Flies Right into the Debate</span></a></p><div class="jwplayer__widthsetter" data-dcnode-id="2101"><div class="jwplayer__wrapper" data-dcnode-id="2102"><div class="future__jwplayer" data-dcnode-id="2103" id="futr_botr_M1uMt4s9_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2116" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/M1uMt4s9/16-years-of-hubble-imagery-in-250-000-galaxies-mosaic%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2118" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2104" id="botr_M1uMt4s9_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2105"><div class="jw-icon jw-reset" data-dcnode-id="2111"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2112" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2113"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2106"><div class="jw-error-text jw-reset-text" data-dcnode-id="2107" data-nosnippet="" dir="auto"><span data-dcnode-id="2110" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2109"></span><span data-dcnode-id="2108" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">No one knows exactly how big space is. It's difficult to determine because of what we can see in our detectors. We measure long distances in space in "light-years," representing the distance it takes for light to travel in a year (roughly 5.8 trillion miles (9.3 trillion kilometers)).&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2098" id="ad-unit-2"></div><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">From the light that is visible in our telescopes, we have charted galaxies reaching almost as far back as the Big Bang, which is thought to have started our universe about 13.8 billion years ago. This means we can "see" into space at a distance of almost 13.8 billion light-years. But the universe continues to expand, making "measuring space," even more challenging.&nbsp;</span></p><p data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node="">Additionally, astronomers are </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2093" data-url="https://www.space.com/18811-multiple-universes-5-theories.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18811-multiple-universes-5-theories.html"><span data-dcnode-id="2094" instrument_node="">not totally sure if our universe is the only one that exists</span></a><span data-dcnode-id="2092" instrument_node="">. This means that space could be a whole lot bigger than we even think.</span></p><h3 class="article-body__section" data-dcnode-id="2088" id="section-space-radiation-invisible-to-human-eyes"><span data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Space radiation invisible to human eyes</span></span></h3><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">The majority of space is relatively empty, with just stray bits of dust and gas floating around. This means that when humans send a probe to a distant planet or asteroid, the craft will not encounter "drag" in the same way that an airplane does as it sails through space.</span></p><p data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">In fact, the vacuum environment in space and on the moon, is one reason why the lunar lander of the Apollo program was designed to have an almost </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2083" data-url="https://www.space.com/17616-apollo-9.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17616-apollo-9.html"><span data-dcnode-id="2084" instrument_node="">spider-like appearance</span></a><span data-dcnode-id="2082" instrument_node="">, as it was described by the Apollo 9 crew. Because the spacecraft was designed to work in a zone with no atmosphere, it didn't need to have smooth edges or an aerodynamic shape.</span></p><p data-dcnode-id="2073"><span data-dcnode-id="2080" instrument_node="">In addition to the bits of debris that speckle the "emptier" regions of space, research has shown that these areas are also home to different forms of radiation. In our own solar system, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2078" data-url="https://www.space.com/22215-solar-wind.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22215-solar-wind.html"><span data-dcnode-id="2079" instrument_node="">solar wind</span></a><span data-dcnode-id="2077" instrument_node=""> — charged particles that stream from the sun — emanate throughout the solar system and occasionally cause auroras near Earth's poles. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2075" data-url="https://www.space.com/19786-cosmic-rays-origins-star-explosion.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19786-cosmic-rays-origins-star-explosion.html"><span data-dcnode-id="2076" instrument_node="">Cosmic rays</span></a><span data-dcnode-id="2074" instrument_node=""> also fly through our neighborhood, stemming from supernovas outside of the solar system.</span></p><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">In fact, the universe as a whole is inundated with what is known as the cosmic microwave background (CMB), which is essentially the leftover radiation from the explosion mostly commonly known as the Big Bang. The CMB is the oldest radiation that our instruments can detect.&nbsp;</span></p><p data-dcnode-id="2066"><strong data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Infographic: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2067" data-url="https://www.space.com/20330-cosmic-microwave-background-explained-infographic.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20330-cosmic-microwave-background-explained-infographic.html"><span data-dcnode-id="2068" instrument_node="">Cosmic Microwave Background Explained</span></a></p><h3 class="article-body__section" data-dcnode-id="2063" id="section-dark-matter-and-energy"><span data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Dark matter and energy</span></span></h3><div class="jwplayer__widthsetter" data-dcnode-id="2044"><div class="jwplayer__wrapper" data-dcnode-id="2045"><div class="future__jwplayer" data-dcnode-id="2046" id="futr_botr_hphYG6CS_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2059" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/hphYG6CS/galaxy-that-is-missing-dark-matter-investigated-using-hubble%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2061" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2047" id="botr_hphYG6CS_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2048"><div class="jw-icon jw-reset" data-dcnode-id="2054"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2055" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2056"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2049"><div class="jw-error-text jw-reset-text" data-dcnode-id="2050" data-nosnippet="" dir="auto"><span data-dcnode-id="2053" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2052"></span><span data-dcnode-id="2051" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2036"><span data-dcnode-id="2043" instrument_node="">There remain two giant mysteries about space: </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20930-dark-matter.html"><span data-dcnode-id="2042" instrument_node="">dark matter </span></a><span data-dcnode-id="2040" instrument_node="">and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20929-dark-energy.html"><span data-dcnode-id="2039" instrument_node="">dark energy</span></a><span data-dcnode-id="2037" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">While scientists have provided extensive evidence for the existence of dark matter and dark energy, they are each still poorly understood as, so far, scientists cannot directly observe them and can only observe their effects.&nbsp;</span></p><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Roughly 80% of all of the mass in the universe is made up of what scientists have dubbed "dark matter," but it's not known what it actually is or if it is even matter by our current definition. However, while dark matter doesn't emit light or energy and cannot, therefore, be directly observed, scientists have found overwhelming evidence that it makes up the vast majority of the matter in the cosmos.</span></p><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Dark energy might have a similar name to dark matter, but it's a whole different component entirely.&nbsp;</span></p><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Thought to make up nearly 75% of the universe, dark energy is a mysterious and unknown force or entity that scientists think is responsible for the universe's ongoing expansion.</span></p><h3 class="article-body__section" data-dcnode-id="2025" id="section-black-holes"><span data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Black holes</span></span></h3><div class="bordeaux-slot" data-dcnode-id="2024" data-feat-ref="bordeaux-feat-id-72" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2023" data-feat-ref="bordeaux-feat-id-75" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2008"><div class="image-full-width-wrapper" data-dcnode-id="2014"><div class="image-widthsetter" data-dcnode-id="2015" style="max-width:1200px;"><p class="vanilla-image-block" data-dcnode-id="2016" style="padding-top:100.00%;"><picture data-dcnode-id="2017"><source alt="Matter swirling into the supermassive black hole at the centre of M87." class="expandable lazy-image-van optional-image" data-dcnode-id="2022" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Matter swirling into the supermassive black hole at the centre of M87." class="expandable lazy-image-van optional-image" data-dcnode-id="2021" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2018"><img alt="Matter swirling into the supermassive black hole at the centre of M87." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2020" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKSCuhkMmdL7ym98sdksyd-970-80.jpeg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2019"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2009" itemprop="caption description"><span class="caption-text" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Matter swirling into the supermassive black hole at the centre of M87. </span></span><span class="credit" data-dcnode-id="2010" itemprop="copyrightHolder"><span data-dcnode-id="2011" instrument_node="">(Image credit: Event Horizon Telescope)</span></span></figcaption></figure><p data-dcnode-id="2003"><span data-dcnode-id="2007" instrument_node="">Smaller </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2005" data-url="https://www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html"><span data-dcnode-id="2006" instrument_node="">black holes</span></a><span data-dcnode-id="2004" instrument_node=""> can form from the gravitational collapse of a gigantic star, which forms a singularity from which nothing can escape — not even light, hence the name of the object. No one is quite sure what lies within a black hole, or what would happen to a person or object who fell into it – but research is ongoing.</span></p><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">An example is gravitational waves, or ripples in space-time that come from interactions between black holes. This was first predicted by Albert Einstein at the turn of the last century, when he showed that time and space are linked; time speeds up or slows down when space is distorted.</span></p><p data-dcnode-id="1996"><span data-dcnode-id="2000" instrument_node="">As of mid-2017, the Laser Interferometer Gravitational-Wave Observatory (LIGO) Scientific Collaboration has announced three </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1998" data-url="https://www.space.com/37049-gravitational-wave-experiment-detects-third-black-hole-merger.html/37049-gravitational-wave-experiment-detects-third-black-hole-merger.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/37049-gravitational-wave-experiment-detects-third-black-hole-merger.html/37049-gravitational-wave-experiment-detects-third-black-hole-merger.html"><span data-dcnode-id="1999" instrument_node="">black-hole interactions and mergers</span></a><span data-dcnode-id="1997" instrument_node=""> detected through gravitational waves, in just two years.</span></p><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">The team found these three events in about two years, indicating that when LIGO is implemented at full sensitivity, the observatory may be able to find these sorts of events frequently, scientists said in May 2017. Should a bunch of these black hole events be detected, it could help scientists learn how black holes of a certain size (several tens of sun masses) are born, and later merge into new black holes.</span></p><h3 class="article-body__section" data-dcnode-id="1991" id="section-stars-planets-asteroids-and-comets"><span data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Stars, planets, asteroids and comets</span></span></h3><div class="bordeaux-slot" data-dcnode-id="1990" data-feat-ref="bordeaux-feat-id-73" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1989" data-feat-ref="bordeaux-feat-id-76" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1974"><div class="image-full-width-wrapper" data-dcnode-id="1980"><div class="image-widthsetter" data-dcnode-id="1981" style="max-width:800px;"><p class="vanilla-image-block" data-dcnode-id="1982" style="padding-top:56.25%;"><picture data-dcnode-id="1983"><source alt="The exoplanet wasp-103b and its star." class="expandable lazy-image-van optional-image" data-dcnode-id="1988" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-srcset="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-970-80.png.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The exoplanet wasp-103b and its star." class="expandable lazy-image-van optional-image" data-dcnode-id="1987" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-srcset="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-970-80.png 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/png"></picture></p><figure class="expandable-image" data-dcnode-id="1984"><img alt="The exoplanet wasp-103b and its star." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="1986" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL.png" data-srcset="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-970-80.png 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/5U3GWHTqUF9Vg67Jwc49cL-970-80.png 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1985"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="1975" itemprop="caption description"><span class="caption-text" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">The exoplanet wasp-103b and its star. </span></span><span class="credit" data-dcnode-id="1976" itemprop="copyrightHolder"><span data-dcnode-id="1977" instrument_node="">(Image credit: ESA)</span></span></figcaption></figure><p data-dcnode-id="1967"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1972" data-url="https://www.space.com/22437-main-sequence-stars.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22437-main-sequence-stars.html"><span data-dcnode-id="1973" instrument_node="">Stars</span></a><span data-dcnode-id="1971" instrument_node=""> (like our own sun) are immense balls of gas that produce their own radiation. They can range from red supergiants to cooling white dwarfs that are the leftovers of supernovas, or star explosions that occur when a big one runs out of gas to burn. These explosions spread elements throughout the universe and are the reason that elements such as iron exist. Star explosions can also give rise to incredibly dense objects called </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1969" data-url="https://www.space.com/22180-neutron-stars.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22180-neutron-stars.html"><span data-dcnode-id="1970" instrument_node="">neutron stars</span></a><span data-dcnode-id="1968" instrument_node="">. If these neutron stars send out pulses of radiation, they are called pulsar stars.</span></p><p data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node="">Planets are objects whose definition came under scrutiny in 2006, when astronomers were debating </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1964" data-url="https://www.space.com/43-pluto-the-ninth-planet-that-was-a-dwarf.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/43-pluto-the-ninth-planet-that-was-a-dwarf.html"><span data-dcnode-id="1965" instrument_node="">whether Pluto could be considered a planet or not</span></a><span data-dcnode-id="1963" instrument_node="">. At the time, the International Astronomical Union (the governing body on Earth for these decisions) ruled that a planet is a celestial body that orbits the sun, is massive enough to have a nearly round shape, and has cleared its orbit of debris. Under this designation, Pluto and similar small objects are considered "dwarf planets," although not everyone agrees with the designation. After the New Horizons spacecraft flew by Pluto in 2015, principal investigator Alan Stern and others again opened up the debate, saying the diversity of terrain on Pluto makes it more like a planet.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="1943"><div class="jwplayer__wrapper" data-dcnode-id="1944"><div class="future__jwplayer" data-dcnode-id="1945" id="futr_botr_pRwyrMvA_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="1958" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/pRwyrMvA/interstellar-object-oumuamua-may-be-chunk-of-pluto-like-planet%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="1960" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="1946" id="botr_pRwyrMvA_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1947"><div class="jw-icon jw-reset" data-dcnode-id="1953"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="1954" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="1955"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1948"><div class="jw-error-text jw-reset-text" data-dcnode-id="1949" data-nosnippet="" dir="auto"><span data-dcnode-id="1952" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="1951"></span><span data-dcnode-id="1950" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="1938"><span data-dcnode-id="1942" instrument_node="">The definition of extrasolar planets, or planets outside the solar system, is still not firmed up by the IAU, but essentially astronomers understand it to mean objects that behave like planets in our neighborhood. The first such planet was found in 1992 (in the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1940" data-url="https://www.space.com/1046-10-years-planet-hunting-amazing-variety.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/1046-10-years-planet-hunting-amazing-variety.html"><span data-dcnode-id="1941" instrument_node="">constellation Pegasus</span></a><span data-dcnode-id="1939" instrument_node="">) and since that time, thousands of alien planets have been confirmed — with many more suspected. In solar systems that have planets under formation, these objects are often called "protoplanets" because they aren't quite the maturity of those planets we have in our own solar system.</span></p><p data-dcnode-id="1934"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1936" data-url="https://www.space.com/51-asteroids-formation-discovery-and-exploration.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/51-asteroids-formation-discovery-and-exploration.html"><span data-dcnode-id="1937" instrument_node="">Asteroids</span></a><span data-dcnode-id="1935" instrument_node=""> are rocks that are not quite big enough to be dwarf planets. We've even found asteroids with rings around them, such as 10199 Charilko. Their small size often leads to the conclusion that they were remnants from when the solar system was formed. Most asteroids are concentrated in a belt between the planets Mars and Jupiter, but there are also many asteroids that follow behind or ahead of planets, or can even cross in a planet's path. NASA and several other entities have asteroid-searching programs in place to scan for potentially dangerous objects in the sky and monitor their orbits closely.&nbsp;</span></p><p data-dcnode-id="1926"><span data-dcnode-id="1933" instrument_node="">In our solar system, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1931" data-original-url="https://www.space.com/53-comets-formation-discovery-and-exploration.html" data-url="https://www.space.com/53-comets-formation-discovery-and-exploration.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/53-comets-formation-discovery-and-exploration.html"><span data-dcnode-id="1932" instrument_node="">comets</span></a><span data-dcnode-id="1930" instrument_node=""> (sometimes called dirty snowballs) are objects believed to originate from a vast collection of icy bodies called the Oort Cloud. As a comet approaches the sun, the heat of our star causes ices to melt and stream away from the comet. The ancients often associated comets with destruction or some sort of immense change on Earth, but the discovery of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1928" data-url="https://www.space.com/19878-halleys-comet.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19878-halleys-comet.html"><span data-dcnode-id="1929" instrument_node="">Halley's Comet</span></a><span data-dcnode-id="1927" instrument_node=""> and related "periodic" or returning comets showed that they were ordinary solar system phenomena.</span></p><h3 class="article-body__section" data-dcnode-id="1923" id="section-galaxies-and-quasars"><span data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Galaxies and quasars</span></span></h3><div class="bordeaux-slot" data-dcnode-id="1922" data-feat-ref="bordeaux-feat-id-74" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1921" data-feat-ref="bordeaux-feat-id-77" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1906"><div class="image-full-width-wrapper" data-dcnode-id="1912"><div class="image-widthsetter" data-dcnode-id="1913" style="max-width:600px;"><p class="vanilla-image-block" data-dcnode-id="1914" style="padding-top:56.17%;"><picture data-dcnode-id="1915"><source alt="An artist's rendering of the double quasar, located in two merging galaxies about 10 billion light-years away" class="expandable lazy-image-van optional-image" data-dcnode-id="1920" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-srcset="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-970-80.png.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="An artist's rendering of the double quasar, located in two merging galaxies about 10 billion light-years away" class="expandable lazy-image-van optional-image" data-dcnode-id="1919" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-srcset="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-970-80.png 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/png"></picture></p><figure class="expandable-image" data-dcnode-id="1916"><img alt="An artist's rendering of the double quasar, located in two merging galaxies about 10 billion light-years away" class="expandable lazy-image-van optional-image loaded" data-dcnode-id="1918" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH.png" data-srcset="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-970-80.png 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/EFYAPaJVy7kzaRTuauepQH-970-80.png 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1917"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="1907" itemprop="caption description"><span class="caption-text" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">An artist's rendering of the double quasar, located in two merging galaxies about 10 billion light-years away&nbsp; </span></span><span class="credit" data-dcnode-id="1908" itemprop="copyrightHolder"><span data-dcnode-id="1909" instrument_node="">(Image credit: NASA, ESA, and J. Olmsted (STScI))</span></span></figcaption></figure><p data-dcnode-id="1901"><span data-dcnode-id="1905" instrument_node="">Among the biggest cosmic structures we can see are galaxies, which essentially are vast collections of stars. Our own galaxy is called the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1903" data-url="https://www.space.com/19915-milky-way-galaxy.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19915-milky-way-galaxy.html"><span data-dcnode-id="1904" instrument_node="">Milky Way</span></a><span data-dcnode-id="1902" instrument_node="">, and is considered a "barred spiral" shape. There are several types of galaxies, ranging from spiral to elliptical to irregular, and they can change as they come close to other objects or as stars within them age.</span></p><p data-dcnode-id="1893"><span data-dcnode-id="1900" instrument_node="">Often galaxies have </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1898" data-url="https://www.youtube.com/user/VideoFromSpace" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/VideoFromSpace"><span data-dcnode-id="1899" instrument_node="">supermassive black holes</span></a><span data-dcnode-id="1897" instrument_node=""> embedded in the center of their galaxies, which are only visible through the radiation that each black hole emanates as well as through its gravitational interactions with other objects. If the black hole is particularly active, with a lot of material falling into it, it produces immense amounts of radiation. This kind of a galactic object is called a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1895" data-url="https://www.space.com/17262-quasar-definition.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17262-quasar-definition.html"><span data-dcnode-id="1896" instrument_node="">quasar</span></a><span data-dcnode-id="1894" instrument_node=""> (just one of several types of similar objects.)</span></p><p data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">Large groups of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1890" data-url="https://www.space.com/17123-record-breaking-galaxy-cluster-discovered.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17123-record-breaking-galaxy-cluster-discovered.html"><span data-dcnode-id="1891" instrument_node="">galaxies can form in clusters</span></a><span data-dcnode-id="1889" instrument_node=""> that are groups as large as hundreds or thousands of galaxies bound together gravitationally. Scientists consider these the largest structures in the universe.</span></p><p data-dcnode-id="1885"><em data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">This page was updated in Jan. 2022 by Space.com senior writer Chelsea Gohd.</span></em></p><span data-dcnode-id="1884" instrument_node="">

</span><span class="bio" data-dcnode-id="1798"><p data-dcnode-id="1799"><span data-dcnode-id="1806" instrument_node="">Elizabeth Howell, Ph.D., is a contributing writer for </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//space.com/" target="_blank"><span data-dcnode-id="1805" instrument_node="">Space.com</span></a><span data-dcnode-id="1803" instrument_node=""> since 2012. As a proud Trekkie and Canadian, she tackles topics like spaceflight, diversity, science fiction, astronomy and gaming to help others explore the universe. Elizabeth's on-site reporting includes two human spaceflight launches from Kazakhstan, and embedded reporting from a simulated Mars mission in Utah. She holds a Ph.D. and </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//m.sc/" target="_blank"><span data-dcnode-id="1802" instrument_node="">M.Sc</span></a><span data-dcnode-id="1800" instrument_node="">. in Space Studies from the University of North Dakota, and a Bachelor of Journalism from Canada's Carleton University. Her latest book, NASA Leadership Moments, is co-written with astronaut Dave Williams. Elizabeth first got interested in space after watching the movie Apollo 13 in 1996, and still wants to be an astronaut someday.</span></p></span><span data-dcnode-id="1797" instrument_node="">
