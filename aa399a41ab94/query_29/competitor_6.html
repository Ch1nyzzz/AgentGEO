</span><img data-dcnode-id="6399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trueorthodox.com/pictures/misfortunejew2.jpg&amp;raw"></p></font></center><font data-dcnode-id="5955" face="verdana" size="2"><br data-dcnode-id="6395"><span data-dcnode-id="6394" instrument_node="">
</span><strong data-dcnode-id="6390"><font color="660033" data-dcnode-id="6392" face="verdana" size="3"><span data-dcnode-id="6393" instrument_node="">“Die Juden sind unser Ungluck!”</span></font><span data-dcnode-id="6391" instrument_node=""> </span></strong><font data-dcnode-id="6298" face="verdana" size="2"><span data-dcnode-id="6389" instrument_node="">was a slogan, (a quote actually), </span><a data-dcnode-id="6386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.holocaustresearchproject.org/holoprelude/dersturmer.html"><font color="FF0000" data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">printed</span></font></a><span data-dcnode-id="6385" instrument_node=""> on the bottom of the popular Third Reich newspaper, </span><a data-dcnode-id="6382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.metapedia.org/wiki/Der_St%25C3%25BCrmer"><font color="FF0000" data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">Der Sturmer</span></font></a><span data-dcnode-id="6381" instrument_node="">.</span><p data-dcnode-id="6380"></p><span data-dcnode-id="6379" instrument_node="">
</span><p data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">Translated, the slogan states, “The Jews are our Misfortune!”</span></p><span data-dcnode-id="6376" instrument_node="">
</span><p data-dcnode-id="6366"><span data-dcnode-id="6375" instrument_node="">Der Sturmer was </span><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//history1900s.about.com/od/1930s/a/derstuermer.htm"><font color="FF0000" data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">published</span></font></a><span data-dcnode-id="6371" instrument_node=""> by Julius Streicher from 1923 to 1945. The paper was </span><a data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.metapedia.org/wiki/Der_St%25C3%25BCrmer"><font color="FF0000" data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">endorsed</span></font></a><span data-dcnode-id="6367" instrument_node=""> by Hitler as a useful tool for influencing the man on the street. Yet still, neither Hitler nor Der Sturmer were the authors of the slogan.</span></p><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6355"><span data-dcnode-id="6364" instrument_node="">After the war, Streicher was </span><a data-dcnode-id="6361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stormfront.org/truth_at_last/archives/julius.htm"><font color="FF0000" data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">tried and hung</span></font></a><span data-dcnode-id="6360" instrument_node=""> at the Nuremberg trials for “crimes against humanity”—translate—”criticizing the Jews.” And the Jews got him “hung from the gallows” </span><a data-dcnode-id="6357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stormfront.org/truth_at_last/archives/julius.htm"><font color="FF0000" data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">simply</span></font></a><span data-dcnode-id="6356" instrument_node=""> for publishing the paper.</span></p><span data-dcnode-id="6354" instrument_node="">
</span><p data-dcnode-id="6342"><span data-dcnode-id="6353" instrument_node="">In 1935,  Der Sturmer </span><a data-dcnode-id="6350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.calvin.edu/academic/cas/gpa/ds14.htm"><font color="FF0000" data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">published</span></font></a><span data-dcnode-id="6349" instrument_node=""> the article, </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.calvin.edu/academic/cas/gpa/ds14.htm"><font color="FF0000" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">“How the Jew Hates the Sturmer</span></font></a><font color="FF0000" data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">.”</span></font><span data-dcnode-id="6343" instrument_node=""> Excerpts from its opening lines describe why Jewry feared the paper:</span></p><span data-dcnode-id="6341" instrument_node="">
</span><p data-dcnode-id="6336"><img align="right" data-dcnode-id="6340" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trueorthodox.com/pictures/dersturm1.jpg&amp;raw" style="width: 280px; height: 314px" width="280"><span data-dcnode-id="6339" instrument_node=""> </span><font color="333399" data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">“The Sturmer is a guide to the solution of the Jewish Question. A fearsome accuser of Pan-Jewry.</span></font></p><font color="333399" data-dcnode-id="6331"><span data-dcnode-id="6335" instrument_node="">
</span><p data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">Over the last decades our thinking fell victim to the poisoning of the Jewish world press. The Jew even silenced the voice of German blood. Our people stood before the abyss of a complete lack of judgment.</span></p><span data-dcnode-id="6332" instrument_node="">
</span></font><p data-dcnode-id="6319"><font color="333399" data-dcnode-id="6329"><span data-dcnode-id="6330" instrument_node="">This is why the Sturmer keeps saying: ‘The Jews Are Our Misfortune!’ This is why it is so hated by the Jews. Everyone knows that the Jew only fights that which he fears. And he fears the Sturmer in the depths of his soul!”</span></font><span data-dcnode-id="6328" instrument_node=""> </span><a data-dcnode-id="6325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.calvin.edu/academic/cas/gpa/ds14.htm"><font color="800705" data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">View Entire Story</span></font></a><span data-dcnode-id="6324" instrument_node=""> </span><a data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.calvin.edu/academic/cas/gpa/ds14.htm"><font color="009900" data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">Here</span></font></a><span data-dcnode-id="6320" instrument_node="">.</span></p><span data-dcnode-id="6318" instrument_node="">
</span><p data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">The article points to the dominance of Jewry over the media both in Germany and beyond its borders. </span></p><span data-dcnode-id="6315" instrument_node="">
</span><p data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">And in stating that the masses had fallen “victim” to the poisoning of the Jewish world press and “stood” before the abyss of complete lack of judgment, the paper was unknowingly auguring a warning for future generations. </span></p><span data-dcnode-id="6312" instrument_node="">
</span><p data-dcnode-id="6311"></p><center data-dcnode-id="6308"><span data-dcnode-id="6310" instrument_node=""> </span><img data-dcnode-id="6309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trueorthodox.com/pictures/rootmis1.jpg&amp;raw"></center><p data-dcnode-id="6307"></p><span data-dcnode-id="6306" instrument_node="">
</span><p data-dcnode-id="6305"></p><center data-dcnode-id="6301"><strong data-dcnode-id="6302"><font color="990033" data-dcnode-id="6303" size="4"><span data-dcnode-id="6304" instrument_node="">ROOTS OF MISFORTUNE</span></font></strong></center><p data-dcnode-id="6300"></p><span data-dcnode-id="6299" instrument_node="">
</span></font><p data-dcnode-id="6281"><font data-dcnode-id="6293" face="verdana" size="2"><strong data-dcnode-id="6295"><font color="000099" data-dcnode-id="6296" face="verdana" size="3"><span data-dcnode-id="6297" instrument_node="">“The Jews are our Misfortune!”</span></font></strong><span data-dcnode-id="6294" instrument_node=""> </span></font><span data-dcnode-id="6292" instrument_node=""> </span><font data-dcnode-id="6282" face="verdana" size="2"><span data-dcnode-id="6291" instrument_node=""> was originally </span><a data-dcnode-id="6288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//germanhistorydocs.ghi-dc.org/sub_document.cfm%3Fdocument_id%3D1799"><font color="FF0000" data-dcnode-id="6289"><span data-dcnode-id="6290" instrument_node="">put forth</span></font></a><span data-dcnode-id="6287" instrument_node=""> by Heinrich von Treitschke (1834-1896), a Professor of History at the University of Berlin and </span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//germanhistorydocs.ghi-dc.org/sub_document.cfm%3Fdocument_id%3D1799"><font color="FF0000" data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">admired</span></font></a><span data-dcnode-id="6283" instrument_node=""> for his penetrating analysis of German political life. </span></font></p><font data-dcnode-id="5956" face="verdana" size="2"><span data-dcnode-id="6280" instrument_node="">
</span><p data-dcnode-id="6271"><span data-dcnode-id="6279" instrument_node="">His greatest </span><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spartacus.schoolnet.co.uk/HIStreitsche.htm"><font color="FF0000" data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">achievement</span></font></a><span data-dcnode-id="6275" instrument_node=""> was his multi-volume, </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//college.cengage.com/history/primary_sources/world/history_germany_19th.htm"><font color="FF0000" data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">“History of Germany in the 19th Century.”</span></font></a></p><span data-dcnode-id="6270" instrument_node="">
</span><p data-dcnode-id="6264"><span data-dcnode-id="6269" instrument_node="">In his University lectures, political essays, and even in his History of Germany, Treitschke </span><a data-dcnode-id="6266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//germanhistorydocs.ghi-dc.org/sub_document.cfm%3Fdocument_id%3D1799"><font color="FF0000" data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">expressed</span></font></a><span data-dcnode-id="6265" instrument_node=""> disdain for the Jews. </span></p><span data-dcnode-id="6263" instrument_node="">
</span><p data-dcnode-id="6257"><span data-dcnode-id="6262" instrument_node="">In 1880, he published a pamphlet entitled, </span><a data-dcnode-id="6259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinyurl.com/85pvcwl"><font color="FF0000" data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">“A Word About Our Jews,”</span></font></a><span data-dcnode-id="6258" instrument_node=""> which enjoyed much popularity. In this pamphlet the assertion, “The Jews are our misfortune,” first appeared. </span></p><span data-dcnode-id="6256" instrument_node="">
</span><p data-dcnode-id="6250"><span data-dcnode-id="6255" instrument_node="">Although to this day Jewry </span><a data-dcnode-id="6252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jewishvirtuallibrary.org/jsource/judaica/ejud_0002_0020_0_20022.html"><font color="FF0000" data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">labels</span></font></a><span data-dcnode-id="6251" instrument_node=""> Treitschke as an “anti-Semite”… yet with astonishing prescience in sketching the Jewish problem of his day Treitschke shadowed forth the Western world’s current plight:</span></p><span data-dcnode-id="6249" instrument_node="">
</span><p data-dcnode-id="6244"><img align="right" data-dcnode-id="6248" height="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trueorthodox.com/pictures/jewparity.jpg&amp;raw" style="width: 280px; height: 337px" width="280"><span data-dcnode-id="6247" instrument_node=""> </span><font color="333399" data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">“The influence of Jewry on our national life nowadays shows itself in many ways harmful. </span></font></p><font color="333399" data-dcnode-id="6233"><span data-dcnode-id="6243" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">Just read the History of the Jews by Graetz. What rage against the ‘arch-enemy,’ the Christian Church! </span></p><span data-dcnode-id="6240" instrument_node="">
</span><p data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">Most dangerous is the preponderance of Jewry in the daily press. Their anti-Christian defamations and blasphemies are shocking.  </span></p><span data-dcnode-id="6237" instrument_node="">
</span><p data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">Scarcely was emancipation achieved before Jewry demanded parity in everything. They refuse to see that we are a Christian people and that they are only a minority among us. We have experienced their demands that Christian images be set aside and that their sabbath be celebrated in mixed schools.</span></p><span data-dcnode-id="6234" instrument_node="">
</span></font><p data-dcnode-id="6213"><font color="333399" data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">An evil that everyone felt but no one wanted to touch upon is now openly discussed. Among educated men who reject any idea of church intolerance there rings with one voice: ‘The Jews are our misfortune!’”</span></font><span data-dcnode-id="6230" instrument_node=""> </span><a data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//germanhistorydocs.ghi-dc.org/sub_document.cfm%3Fdocument_id%3D1799"><font color="800705" data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">View Entire Story</span></font></a><span data-dcnode-id="6226" instrument_node=""> </span><a data-dcnode-id="6223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//germanhistorydocs.ghi-dc.org/sub_document.cfm%3Fdocument_id%3D1799"><font color="009900" data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">Here</span></font></a><span data-dcnode-id="6222" instrument_node="">, </span><a data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinyurl.com/85pvcwl"><font color="009900" data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">Here</span></font></a><span data-dcnode-id="6218" instrument_node=""> &amp; </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spartacus.schoolnet.co.uk/HIStreitsche.htm"><font color="009900" data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">Here</span></font></a><span data-dcnode-id="6214" instrument_node="">.</span></p><span data-dcnode-id="6212" instrument_node="">
</span><p data-dcnode-id="6202"><strong data-dcnode-id="6209"><font color="660000" data-dcnode-id="6210" face="verdana" size="3"><span data-dcnode-id="6211" instrument_node="">A SPIRITUAL DEVASTATION</span></font></strong><span data-dcnode-id="6208" instrument_node=""> </span><font data-dcnode-id="6203" face="verdana" size="2"><span data-dcnode-id="6207" instrument_node="">is now wreaking havoc in what formerly was known </span><em data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">and</span></em><span data-dcnode-id="6204" instrument_node=""> experienced as “Christendom.” </span></font></p><font data-dcnode-id="5957" face="verdana" size="2"><span data-dcnode-id="6201" instrument_node="">
</span><p data-dcnode-id="6191"><span data-dcnode-id="6200" instrument_node="">In a newly published book, </span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Coming-Apart-State-America-1960-2010/dp/0307453421"><font color="FF0000" data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">“Coming Apart: The State of White America,”</span></font></a><span data-dcnode-id="6196" instrument_node=""> the white working class is </span><a data-dcnode-id="6193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crisismagazine.com/2012/coming-apart-the-state-of-white-america"><font color="FF0000" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">shown</span></font></a><span data-dcnode-id="6192" instrument_node=""> as no longer clinging to religion but letting go of everything that once distinguished it.  </span></p><span data-dcnode-id="6190" instrument_node="">
</span><p data-dcnode-id="6172"><span data-dcnode-id="6189" instrument_node="">This is surely due to Jewry’s </span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.realzionistnews.com/%3Fcat%3D366"><font color="FF0000" data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">control</span></font></a><span data-dcnode-id="6185" instrument_node=""> of the media where defamation of the Church is rampant. The </span><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//truthtellers.org/alerts/ProgayGCBReflectsJewishAgenda.html"><font color="FF0000" data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">Jewish-produced</span></font></a><span data-dcnode-id="6181" instrument_node=""> sitcom, </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goodchristianbitches.com/"><font color="FF0000" data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">“Good Christian Bitches,”</span></font></a><span data-dcnode-id="6177" instrument_node=""> is just one example of Jewry’s </span><a data-dcnode-id="6174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//truthtellers.org/alerts/WhyHateBehindGCB_11apr12.html"><font color="FF0000" data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">ridicule</span></font></a><span data-dcnode-id="6173" instrument_node=""> of Christianity. </span></p><span data-dcnode-id="6171" instrument_node="">
</span><p data-dcnode-id="6167"><span data-dcnode-id="6170" instrument_node="">Could it be true then—that even today—the Jews are our misfortune?</span><br data-dcnode-id="6169"><span data-dcnode-id="6168" instrument_node="">
</span></p><center data-dcnode-id="6123"><a data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brothernathanaelfoundation.org/"><img data-dcnode-id="6166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trueorthodox.com/pictures/tbnfrzn2.jpg&amp;raw"></a><p data-dcnode-id="6164"></p><span data-dcnode-id="6163" instrument_node="">

<strong><font size=&quot;3&quot; face=&quot;verdana&quot; color=&quot;660033&quot;>&amp;#8220;Die Juden sind unser Ungluck!&amp;#8221;</font> </strong><font size=&quot;2&quot; face=&quot;verdana&quot;>was a slogan, (a quote actually), <a href=&quot;http://www.holocaustresearchproject.org/holoprelude/dersturmer.html&quot;><font color=&quot;FF0000&quot;>printed</a></font> on the bottom of the popular Third Reich newspaper, <a href=&quot;http://en.metapedia.org/wiki/Der_St%C3%BCrmer&quot;><font color=&quot;FF0000&quot;>Der Sturmer</a></font>.</p>
<p>Translated, the slogan states, &amp;#8220;The Jews are our Misfortune!&amp;#8221;</p>
<p>Der Sturmer was <a href=&quot;http://history1900s.about.com/od/1930s/a/derstuermer.htm&quot;><font color=&quot;FF0000&quot;>published</a></font> by Julius Streicher from 1923 to 1945. The paper was <a href=&quot;http://en.metapedia.org/wiki/Der_St%C3%BCrmer&quot;><font color=&quot;FF0000&quot;>endorsed</a></font> by Hitler as a useful tool for influencing the man on the street. Yet still, neither Hitler nor Der Sturmer were the authors of the slogan.</p>
<p>After the war, Streicher was <a href=&quot;http://www.stormfront.org/truth_at_last/archives/julius.htm&quot;><font color=&quot;FF0000&quot;>tried and hung</a></font> at the Nuremberg trials for &amp;#8220;crimes against humanity&amp;#8221;—translate—&amp;#8221;criticizing the Jews.&amp;#8221; And the Jews got him &amp;#8220;hung from the gallows&amp;#8221; <a href=&quot;http://www.stormfront.org/truth_at_last/archives/julius.htm&quot;><font color=&quot;FF0000&quot;>simply</a></font> for publishing the paper.</p>
<p>In 1935,  Der Sturmer <a href=&quot;http://www.calvin.edu/academic/cas/gpa/ds14.htm&quot;><font color=&quot;FF0000&quot;>published</a></font> the article, <a href=&quot;http://www.calvin.edu/academic/cas/gpa/ds14.htm&quot;><font color=&quot;FF0000&quot;>&amp;#8220;How the Jew Hates the Sturmer</a>.&amp;#8221;</font> Excerpts from its opening lines describe why Jewry feared the paper:</p>
<p><img align=&quot;right&quot; width=&quot;280&quot; src=&quot;http://www.trueorthodox.com/pictures/dersturm1.jpg&quot; height=&quot;314&quot; style=&quot;width: 280px; height: 314px&quot; /> <font color=&quot;333399&quot;>&amp;#8220;The Sturmer is a guide to the solution of the Jewish Question. A fearsome accuser of Pan-Jewry.</p>
<p>Over the last decades our thinking fell victim to the poisoning of the Jewish world press. The Jew even silenced the voice of German blood. Our people stood before the abyss of a complete lack of judgment.</p>
<p>This is why the Sturmer keeps saying: &amp;#8216;The Jews Are Our Misfortune!&amp;#8217; This is why it is so hated by the Jews. Everyone knows that the Jew only fights that which he fears. And he fears the Sturmer in the depths of his soul!&amp;#8221;</font> <a href=&quot;http://www.calvin.edu/academic/cas/gpa/ds14.htm&quot;><font color=&quot;800705&quot;>View Entire Story</a></font> <a href=&quot;http://www.calvin.edu/academic/cas/gpa/ds14.htm&quot;><font color=&quot;009900&quot;>Here</a></font>.</p>
<p>The article points to the dominance of Jewry over the media both in Germany and beyond its borders. </p>
<p>And in stating that the masses had fallen &amp;#8220;victim&amp;#8221; to the poisoning of the Jewish world press and &amp;#8220;stood&amp;#8221; before the abyss of complete lack of judgment, the paper was unknowingly auguring a warning for future generations. </p>
<p><center> <img src=&quot;http://www.trueorthodox.com/pictures/rootmis1.jpg&quot;/></center></p>
<p><center><strong><font size=&quot;4&quot; color=&quot;990033&quot;>ROOTS OF MISFORTUNE</font></strong></center></p>
<p><strong><font size=&quot;3&quot; face=&quot;verdana&quot; color=&quot;000099&quot;>&amp;#8220;The Jews are our Misfortune!&amp;#8221;</font></strong> </font> <font size=&quot;2&quot; face=&quot;verdana&quot;> was originally <a href=&quot;http://germanhistorydocs.ghi-dc.org/sub_document.cfm?document_id=1799&quot;><font color=&quot;FF0000&quot;>put forth</a></font> by Heinrich von Treitschke (1834-1896), a Professor of History at the University of Berlin and <a href=&quot;http://germanhistorydocs.ghi-dc.org/sub_document.cfm?document_id=1799&quot;><font color=&quot;FF0000&quot;>admired</a></font> for his penetrating analysis of German political life. </p>
<p>His greatest <a href=&quot;http://www.spartacus.schoolnet.co.uk/HIStreitsche.htm&quot;><font color=&quot;FF0000&quot;>achievement</a></font> was his multi-volume, <a href=&quot;http://college.cengage.com/history/primary_sources/world/history_germany_19th.htm&quot;><font color=&quot;FF0000&quot;>&amp;#8220;History of Germany in the 19th Century.&amp;#8221;</a></font></p>
<p>In his University lectures, political essays, and even in his History of Germany, Treitschke <a href=&quot;http://germanhistorydocs.ghi-dc.org/sub_document.cfm?document_id=1799&quot;><font color=&quot;FF0000&quot;>expressed</a></font> disdain for the Jews. </p>
<p>In 1880, he published a pamphlet entitled, <a href=&quot;http://tinyurl.com/85pvcwl&quot;><font color=&quot;FF0000&quot;>&amp;#8220;A Word About Our Jews,&amp;#8221;</a></font> which enjoyed much popularity. In this pamphlet the assertion, &amp;#8220;The Jews are our misfortune,&amp;#8221; first appeared. </p>
<p>Although to this day Jewry <a href=&quot;http://www.jewishvirtuallibrary.org/jsource/judaica/ejud_0002_0020_0_20022.html&quot;><font color=&quot;FF0000&quot;>labels</a></font> Treitschke as an &amp;#8220;anti-Semite&amp;#8221;&amp;#8230; yet with astonishing prescience in sketching the Jewish problem of his day Treitschke shadowed forth the Western world&amp;#8217;s current plight:</p>
<p><img align=&quot;right&quot; width=&quot;280&quot; src=&quot;http://www.trueorthodox.com/pictures/jewparity.jpg&quot; height=&quot;337&quot; style=&quot;width: 280px; height: 337px&quot; /> <font color=&quot;333399&quot;>&amp;#8220;The influence of Jewry on our national life nowadays shows itself in many ways harmful. </p>
<p>Just read the History of the Jews by Graetz. What rage against the &amp;#8216;arch-enemy,&amp;#8217; the Christian Church! </p>
<p>Most dangerous is the preponderance of Jewry in the daily press. Their anti-Christian defamations and blasphemies are shocking.  </p>
<p>Scarcely was emancipation achieved before Jewry demanded parity in everything. They refuse to see that we are a Christian people and that they are only a minority among us. We have experienced their demands that Christian images be set aside and that their sabbath be celebrated in mixed schools.</p>
<p>An evil that everyone felt but no one wanted to touch upon is now openly discussed. Among educated men who reject any idea of church intolerance there rings with one voice: &amp;#8216;The Jews are our misfortune!&amp;#8217;&amp;#8221;</font> <a href=&quot;http://germanhistorydocs.ghi-dc.org/sub_document.cfm?document_id=1799&quot;><font color=&quot;800705&quot;>View Entire Story</a></font> <a href=&quot;http://germanhistorydocs.ghi-dc.org/sub_document.cfm?document_id=1799&quot;><font color=&quot;009900&quot;>Here</a></font>, <a href=&quot;http://tinyurl.com/85pvcwl&quot;><font color=&quot;009900&quot;>Here</a></font> &amp;#038; <a href=&quot;http://www.spartacus.schoolnet.co.uk/HIStreitsche.htm&quot;><font color=&quot;009900&quot;>Here</a></font>.</p>
<p><strong><font size=&quot;3&quot; color=&quot;660000&quot; face=&quot;verdana&quot;>A SPIRITUAL DEVASTATION</font></strong> <font size=&quot;2&quot; face=&quot;verdana&quot;>is now wreaking havoc in what formerly was known <em>and</em> experienced as &amp;#8220;Christendom.&amp;#8221; </p>
<p>In a newly published book, <a href=&quot;http://www.amazon.com/Coming-Apart-State-America-1960-2010/dp/0307453421&quot;><font color=&quot;FF0000&quot;>&amp;#8220;Coming Apart: The State of White America,&amp;#8221;</a></font> the white working class is <a href=&quot;http://www.crisismagazine.com/2012/coming-apart-the-state-of-white-america&quot;><font color=&quot;FF0000&quot;>shown</a></font> as no longer clinging to religion but letting go of everything that once distinguished it.  </p>
<p>This is surely due to Jewry&amp;#8217;s <a href=&quot;http://www.realzionistnews.com/?cat=366&quot;><font color=&quot;FF0000&quot;>control</a></font> of the media where defamation of the Church is rampant. The <a href=&quot;http://truthtellers.org/alerts/ProgayGCBReflectsJewishAgenda.html&quot;><font color=&quot;FF0000&quot;>Jewish-produced</a></font> sitcom, <a href=&quot;http://goodchristianbitches.com/&quot;><font color=&quot;FF0000&quot;>&amp;#8220;Good Christian Bitches,&amp;#8221;</a></font> is just one example of Jewry&amp;#8217;s <a href=&quot;http://truthtellers.org/alerts/WhyHateBehindGCB_11apr12.html&quot;><font color=&quot;FF0000&quot;>ridicule</a></font> of Christianity. </p>
<p>Could it be true then—that even today—the Jews are our misfortune?<br />

</span><p data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">TORONTO (JTA) — Canada’s largest Protestant denomination is calling for a boycott of goods produced in “illegal” Israeli settlements, including eastern Jerusalem.</span></p><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">In a 26-page report released Tuesday, [a working-group report to] the United Church of Canada calls for an economic boycott of Israel focused exclusively on settlement products. </span></p><span data-dcnode-id="4836" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">The report seeks “a church-wide campaign of economic action directed against one or more settlement products that can be identified as produced in or related to the settlements or the occupied territories.”</span></p><span data-dcnode-id="4833" instrument_node="">
</span><p data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">The Church wants “a focused boycott of products that are being created illegally,” said the Very Rev. David Giuliano, a former moderator, or head, of the United Church, who chaired the three-member working group that wrote the report.</span></p><span data-dcnode-id="4830" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">“To buy settlement products is the same as buying stolen goods; in other words, benefiting from the crime,” Giuliano said. He added, however, that “this is not a call for a boycott of Israel or Israeli products.”</span></p><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">A prominent Jewish leader charged Tuesday that the United Church has been hijacked by a small group of anti-Israel activists who do not speak for the whole denomination.</span></p><span data-dcnode-id="4824" instrument_node="">
</span><p data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">“Israel has become an obsession for a small vocal group,” Shimon Fogel, CEO of the Centre for Israel and Jewish Affairs, told the National Post newspaper. “I think frankly it betrays the sensibilities of the vast majority of ordinary members of the United Church.”</span></p><span data-dcnode-id="4821" instrument_node="">

</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Dear Firebell,</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">I’ve noticed your request. It will be a little bit. </span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">I wish to spend some time going through the article from TOO, but my first reading through is that it does have a lot of good thoughtful substance about the Synagogue of Satan.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">And yes, Christian eschatology in the West is now very, very confusing. Eastern and Oriental Orthodox Churches, as does the Roman Catholic Church from its early common history, have always maintained an “amillenial” view, as chiliasm (millenialism) was decreed a heretical teaching at the Second Ecumenical Council.</span></p><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">As for Preterism, I suppose Orthodoxy might be considered ‘partial preterist’ in Western Christian thought. The Eastern Churches really don’t have an equivalent and didn’t experience the need to develop a preterist doctrine.</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Chiliastic views in antiquity were spread chiefly among heretics. The Second Ecumenical Council in 381 AD convened at Constantinople condemning the heretic Apollinarius, condemned his teaching about the thousand-year Kingdom of Christ. </span></p><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">To put a stop to further attempts at introducing this teaching, the Fathers of the Council inserted into the Creed the words about Christ: “His Kingdom shall have no end.” </span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">In other words, when Christ’s reign begins there will be no interruptions in His eternal Kingdom. </span></p><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Excerpt from OCA website doctrinal exposition on the Symbol of Faith (Nicene-Constantinople Creed): </span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Christ’s kingdom is “not of this world” (Jn 18:31). He says this to Pontius Pilate when being mocked as king, revealing in this humiliation His genuine divine kingship. </span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">The Kingdom of God, which Christ will rule, will come with power at the end of time when the Lord will fill all creation and will be truly “all, and in all” (Col 3:11). </span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">The Church, a direct uninterrupted continuation of the worshipping community of Old Israel, which in popular Orthodox doctrine is called the Kingdom of God on earth, has already mysteriously been given this experience. </span></p><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">In the Church, Christ is already acknowledged, glorified, and served, as the only king and lord; and His Holy Spirit, whom the saints of the Church have identified with the Kingdom of God, is already given to the world in the Church with full graciousness and power.</span></p><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">The Kingdom of God, therefore, is a Divine Reality. It is the reality of God’s presence among men through Christ and the Holy Spirit. “For the Kingdom of God… means… peace and joy and righteousness in the Holy Spirit” (Rom 14:17). </span></p><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">The Kingdom of God as a spiritual, divine reality is given to men by Christ in the Church. It is celebrated and participated in the sacramental mysteries of the faith. It is witnessed to in the scriptures, the councils, the canons, and the saints. </span></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">It will become the universal, final cosmic reality for the whole of creation at the end of the ages when Christ comes in glory to fill all things with Himself by the Holy Spirit, that God might be “all and in all” (1 Cor 15:28).</span></p><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3261"><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oca.org/orthodoxy/the-orthodox-faith/worship/the/kingdom-of-god" rel="nofollow"><span data-dcnode-id="3263" instrument_node="">http://oca.org/orthodoxy/the-orthodox-faith/worship/the/kingdom-of-god</span></a></p><span data-dcnode-id="3260" instrument_node="">
</span><p data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">During the course of the first three centuries, Christians endured almost constant persecution, first — from the unbelieving Jews and then — from pagans.</span></p><span data-dcnode-id="3257" instrument_node="">
</span><p data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">The Jews, who did not accept the Saviour promised by God, the Lord Jesus Christ, but rather condemned Him to death with crazed shouts of “Let His blood be upon us and on our children” and who also killed many Christians, and particularly accused and denounced the Christians of the circumcision to the Romans all over the empire, were finally punished for all their stiff-necked, lawlessness, hypocrisy, perjury, avarice, greed, hatred, murders, thefts, etc.</span></p><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Jesus in his critical indictment of the Seven Woes pronounced to the wicked shepherds of the people, the Scribes (Sages) and the Pharisees, listed the not only their moral failings, but implies the moral degeneration of the people as a consequence, and the spiritual corruption of the Temple and its priesthood (Matthew 23:1-39). </span></p><span data-dcnode-id="3251" instrument_node="">
</span><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Josephus records numerous observations, and some of the rabbis of the day who recorded in the Talmud the rapid moral decline of Jerusalem and Jewish society after Christ’s crucifixion, commented that they understood that it was Divine punishment for their hatred and their manifold sins.</span></p><span data-dcnode-id="3248" instrument_node="">
</span><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Synagogue of Satan is literally, Synagogue of the Accuser. In Revelation 12:10 Satan is referred to as “the accuser of our brethren.” The word “accuse” is defined, “(1) to charge with, or declare to have committed a crime, (2) to find at fault; to blame . . .” </span></p><span data-dcnode-id="3245" instrument_node="">
</span><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Sometimes a person is justly accused. However, that is not what is spoken of here. In my opinion based on Roman history dealing with the Jews and their legal status, the Synagogue of Satan originally alluded to the Pharisees throughout the Roman Empire, who like Paul who was sent to Damascus by the Great Sanhedrin were the official prosecutors.</span></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">When the Jews couldn’t prosecute Christians under their own laws (and don’t believe it when Jews say they were only going after the circumcised Christian “heretics” as apostates from Judaism), they turned the Christians into the Roman authorities, if they didn’t just outright resort to mob action and beat us to death or stoned us. </span></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">The Jews were given the status of a “legal religion” by Augustus and had a privileged exemption from the mandatory participation in the state cultus and sacrifices to the pagan gods and worship of the Roman state and emperor. </span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">For several decades, the Romans considered Christianity a sect of Judaism; and don’t forget that there were Gentiles, including Romans, who were circumcised proselytes, or else uncircumcised God-fearers, like the Righteous Centurion or Cornelius, who would have been included in Judaism. The book of Acts records the early persecutions and the efforts to turn Christians, particularly Paul outside of Palestine, over to the Gentile authorities for trial. </span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">In any case, about Nero’s time, the Romans, probably lobbied by the influential Jews through Poppea, his wife and reportedly a convert to Judaism, determined that Christianity was a separate religion from Judaism, and so we lost the exemption the Jews enjoyed, and were required to then make sacrifices to the pagan gods in the public cultus. </span></p><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">It was a criminal offense against the piety of the state not to do so for everyone but the Jews because they were exempted. The pagan priests issued certificates or tokens to that this public duty had been done. The Jews would make formal accusations, spy on Christian gatherings in people’s homes or other gatherings, and turn them in to the authorities.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">The spread of the Christian faith among the pagans provoked persecution of the Christians by pagan Roman emperors. Besides the Jews working sometimes in tandem, adherents of the pagan faith also convinced the Emperor that Christians were enemies of the state, enemies of the Emperor himself and of all the mankind as a whole. </span></p><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Persecution of the Christians was so cruel that it is difficult to describe. The Christians underwent the most terrifying tortures imaginable. </span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Do we have any examples of Satan accusing “our brethren before God” (Rev. 12:10)? Yes, we find such in Job 1:6-11; 2:1-6. Job was a good man! God himself testified to this fact. However, it did not matter to Satan, accused Job anyway. Here we see a true picture of Satan not only as the tempter, but as “the accuser of our brethren.” </span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Hence, people can become “accusers of our brethren” and share in the devil’s work, but it was particularly egregious coming from the Synagogue of Satan who were blood kin to some of the Christians.</span></p><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Jerusalem and the Temple of God were destroyed to their foundations by the Roman soldiers when the Jews arose in revolt. This happened in 70 A.D. as the Lord had prophesied, but the church of Judaea was prophetically warned (plus, they could see the mounting tensions working up to Jewish civil war against the Romans) and escaped the devastation by crossing east over the Jordan River. </span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">The place where the first Temple of God had stood was ploughed under, so that not a stone was left upon a stone. Jews are now under a great delusion that God promised He would send to them. </span></p><span data-dcnode-id="3209" instrument_node="">
