</span><h2 data-dcnode-id="1403"><span class="mw-headline" data-dcnode-id="1411" id="History"><span data-dcnode-id="1412" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1404"><span class="mw-editsection-bracket" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">[</span></span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="1408" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1401" instrument_node="">Recognizing the cosmological importance of the darkness of the night sky (</span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olbers%2527_paradox" title="Olbers' paradox"><span data-dcnode-id="1400" instrument_node="">Olbers' paradox</span></a><span data-dcnode-id="1398" instrument_node="">) and the first speculations on an </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extragalactic_background_light" title="Extragalactic background light"><span data-dcnode-id="1397" instrument_node="">extragalactic background light</span></a><span data-dcnode-id="1395" instrument_node=""> dates back to the first half of the 19th century. Despite its importance, the first attempts were made only in the 1950-60s to derive the value of the visual background due to galaxies, at that time based on the integrated starlight of these stellar systems. In the 1960s the absorption of starlight by dust was already taken into account, but without considering the re-emission of this absorbed energy in the </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared" title="Infrared"><span data-dcnode-id="1394" instrument_node="">infrared</span></a><span data-dcnode-id="1392" instrument_node="">. At that time </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Peebles" title="Jim Peebles"><span data-dcnode-id="1391" instrument_node="">Jim Peebles</span></a><span data-dcnode-id="1389" instrument_node=""> pointed out, that in a </span><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Bang" title="Big Bang"><span data-dcnode-id="1388" instrument_node="">Big Bang</span></a><span data-dcnode-id="1386" instrument_node="">-created Universe there must have been a cosmic infrared background (CIB) – different from the </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_microwave_background" title="Cosmic microwave background"><span data-dcnode-id="1385" instrument_node="">cosmic microwave background</span></a><span data-dcnode-id="1383" instrument_node=""> – that can account for the formation and evolution of stars and galaxies.
</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1381" instrument_node="">In order to produce today's </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metallicity" title="Metallicity"><span data-dcnode-id="1380" instrument_node="">metallicity</span></a><span data-dcnode-id="1378" instrument_node="">, early galaxies must have been significantly more powerful than they are today. In the early CIB models the absorption of starlight was neglected, therefore in these models the CIB peaked between 1–10μm wavelengths. These early models have already shown correctly that the CIB was most probably fainter than its foregrounds, and so it was very difficult to observe. Later the discovery and observations of high luminosity infrared galaxies in the vicinity of the </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" title="Milky Way"><span data-dcnode-id="1377" instrument_node="">Milky Way</span></a><span data-dcnode-id="1375" instrument_node=""> showed, that the peak of the CIB is most likely at longer wavelengths (around 50μm), and its full power could be ~1−10% of that of the </span><a class="mw-redirect" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CMB" title="CMB"><span data-dcnode-id="1374" instrument_node="">CMB</span></a><span data-dcnode-id="1372" instrument_node="">.
</span></p><p data-dcnode-id="1354"><span data-dcnode-id="1370" instrument_node="">As </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Harwit" title="Martin Harwit"><span data-dcnode-id="1369" instrument_node="">Martin Harwit</span></a><span data-dcnode-id="1367" instrument_node=""> emphasized, the CIB is very important in the understanding of some special astronomical objects, like </span><a class="mw-redirect" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quasars" title="Quasars"><span data-dcnode-id="1366" instrument_node="">quasars</span></a><span data-dcnode-id="1364" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraluminous_infrared_galaxies" title="Ultraluminous infrared galaxies"><span data-dcnode-id="1363" instrument_node="">ultraluminous infrared galaxies</span></a><span data-dcnode-id="1361" instrument_node="">, which are very bright in the infrared. He also pointed out, that the CIB cause a significant attenuation for very high energy electrons, protons and gamma-rays of the </span><a class="mw-redirect" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_radiation" title="Cosmic radiation"><span data-dcnode-id="1360" instrument_node="">cosmic radiation</span></a><span data-dcnode-id="1358" instrument_node=""> through inverse </span><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compton_scattering" title="Compton scattering"><span data-dcnode-id="1357" instrument_node="">Compton scattering</span></a><span data-dcnode-id="1355" instrument_node="">, photopion and electron-positron pair production.
</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1353" instrument_node="">In the early 1980s there were only upper limits available for the CIB. The real observations of the CIB began after the era of astronomical satellites working in the infrared, started by the </span><a class="mw-redirect" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_Astronomy_Satellite" title="Infrared Astronomy Satellite"><span data-dcnode-id="1352" instrument_node="">Infrared Astronomy Satellite</span></a><span data-dcnode-id="1350" instrument_node=""> (IRAS), and followed by the </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_Background_Explorer" title="Cosmic Background Explorer"><span data-dcnode-id="1349" instrument_node="">Cosmic Background Explorer</span></a><span data-dcnode-id="1347" instrument_node=""> (COBE), the </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_Space_Observatory" title="Infrared Space Observatory"><span data-dcnode-id="1346" instrument_node="">Infrared Space Observatory</span></a><span data-dcnode-id="1344" instrument_node=""> (ISO) and by the </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spitzer_Space_Telescope" title="Spitzer Space Telescope"><span data-dcnode-id="1343" instrument_node="">Spitzer Space Telescope</span></a><span data-dcnode-id="1341" instrument_node="">. Exploration of the CIB was continued by the </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herschel_Space_Observatory" title="Herschel Space Observatory"><span data-dcnode-id="1340" instrument_node="">Herschel Space Observatory</span></a><span data-dcnode-id="1338" instrument_node="">, launched in 2009.
</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1336" instrument_node="">The Spitzer wide area surveys have detected anisotropies in the CIB.</span><sup class="reference" data-dcnode-id="1333" id="cite_ref-1"><a data-dcnode-id="1334" href="#cite_note-1"><span data-dcnode-id="1335" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1332" instrument_node="">
</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1330" instrument_node="">A summary on the history of CIB research can be found in the review papers by M.G. Hauser and E. Dwek (2001)</span><sup class="reference" data-dcnode-id="1327" id="cite_ref-2"><a data-dcnode-id="1328" href="#cite_note-2"><span data-dcnode-id="1329" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1326" instrument_node=""> and A. Kashlinsky (2005).</span><sup class="reference" data-dcnode-id="1323" id="cite_ref-3"><a data-dcnode-id="1324" href="#cite_note-3"><span data-dcnode-id="1325" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1322" instrument_node="">
</span></p><span data-dcnode-id="1320" instrument_node="">
</span><h2 data-dcnode-id="1310"><span class="mw-headline" data-dcnode-id="1318" id="Origin_of_the_cosmic_infrared_background"><span data-dcnode-id="1319" instrument_node="">Origin of the cosmic infrared background</span></span><span class="mw-editsection" data-dcnode-id="1311"><span class="mw-editsection-bracket" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">[</span></span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D2" title="Edit section: Origin of the cosmic infrared background"><span data-dcnode-id="1315" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1308" instrument_node="">One of the most important questions about the CIB is the source of its energy. In the early models the CIB was built up from the </span><a class="mw-redirect" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redshifted" title="Redshifted"><span data-dcnode-id="1307" instrument_node="">redshifted</span></a><span data-dcnode-id="1305" instrument_node=""> </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetic_spectrum" title="Electromagnetic spectrum"><span data-dcnode-id="1304" instrument_node="">spectra</span></a><span data-dcnode-id="1302" instrument_node=""> of the galaxies found in our cosmic neighborhood. However, these simple models could not reproduce the observed features of the CIB. In the baryonic material of the Universe there are two sources of large amounts of energy: nuclear fusion and gravitation.
</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1300" instrument_node="">Nuclear fusion takes place inside the stars, and we can really see this light redshifted: this is the main source of the </span><a class="new" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_ultraviolet-_and_visual_background%26action%3Dedit%26redlink%3D1" title="Cosmic ultraviolet- and visual background (page does not exist)"><span data-dcnode-id="1299" instrument_node="">cosmic ultraviolet- and visual background</span></a><span data-dcnode-id="1297" instrument_node="">.  However, a significant amount of this starlight is not observed directly. Dust in the host galaxies can absorb it and re-emit it in the infrared, contributing to the CIB. Although most of today's galaxies contain little dust (e.g. </span><a class="mw-redirect" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elliptical_galaxies" title="Elliptical galaxies"><span data-dcnode-id="1296" instrument_node="">elliptical galaxies</span></a><span data-dcnode-id="1294" instrument_node=""> are practically dustless), there are some special stellar systems even in our vicinity which are extremely bright in the infrared and at the same time faint (often almost invisible) in the optical. These </span><a class="mw-redirect" data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraluminous_infrared_galaxies" title="Ultraluminous infrared galaxies"><span data-dcnode-id="1293" instrument_node="">ultraluminous infrared galaxies</span></a><span data-dcnode-id="1291" instrument_node=""> (ULIRGs) are just in a very active </span><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_formation" title="Star formation"><span data-dcnode-id="1290" instrument_node="">star formation</span></a><span data-dcnode-id="1288" instrument_node=""> period: they are just in a collision or in a merge with another galaxy. In the optical this is hidden by the huge amount of dust, and the galaxy is bright in the infrared due to the same reason. Galaxy collisions and mergers were more frequent in the cosmic past: the global </span><a class="new" data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStar_formation_rate%26action%3Dedit%26redlink%3D1" title="Star formation rate (page does not exist)"><span data-dcnode-id="1287" instrument_node="">star formation rate</span></a><span data-dcnode-id="1285" instrument_node=""> of the Universe peaked around </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redshift" title="Redshift"><span data-dcnode-id="1284" instrument_node="">redshift</span></a><span data-dcnode-id="1282" instrument_node=""> </span><i data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">z</span></i><span data-dcnode-id="1279" instrument_node="">&nbsp;=&nbsp;1...2, and was 10 to 50 times the average value today. These galaxies in the </span><i data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">z</span></i><span data-dcnode-id="1276" instrument_node="">&nbsp;=&nbsp;1...2 redshift range give 50 to 70 percent of the full brightness of the CIB.
</span></p><p data-dcnode-id="1258"><span data-dcnode-id="1274" instrument_node="">Another important component of the CIB is the infrared emission by </span><a class="mw-redirect" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quasars" title="Quasars"><span data-dcnode-id="1273" instrument_node="">quasars</span></a><span data-dcnode-id="1271" instrument_node="">. In these systems most of the </span><a class="mw-redirect" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravitational_potential_energy" title="Gravitational potential energy"><span data-dcnode-id="1270" instrument_node="">gravitational potential energy</span></a><span data-dcnode-id="1268" instrument_node=""> of the matter falling into the central </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_hole" title="Black hole"><span data-dcnode-id="1267" instrument_node="">black hole</span></a><span data-dcnode-id="1265" instrument_node=""> is converted into </span><a class="mw-redirect" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-rays" title="X-rays"><span data-dcnode-id="1264" instrument_node="">X-rays</span></a><span data-dcnode-id="1262" instrument_node="">, which would escape unless they are absorbed by the dust torus of the </span><a class="mw-redirect" data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accretion_disc" title="Accretion disc"><span data-dcnode-id="1261" instrument_node="">accretion disc</span></a><span data-dcnode-id="1259" instrument_node="">. This absorbed light is again re-emitted in the infrared, and in total gives about 20–30% of the full power of the CIB; however at some specific wavelengths this is the dominant source of CIB energy.
</span></p><p data-dcnode-id="1240"><span data-dcnode-id="1257" instrument_node="">A hitherto unrecognised population of </span><a class="mw-redirect" data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergalactic_stars" title="Intergalactic stars"><span data-dcnode-id="1256" instrument_node="">intergalactic stars</span></a><span data-dcnode-id="1254" instrument_node=""> have been shown to explain the CIB as well as the other elements of the </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffuse_extragalactic_background_radiation" title="Diffuse extragalactic background radiation"><span data-dcnode-id="1253" instrument_node="">diffuse extragalactic background radiation</span></a><span data-dcnode-id="1251" instrument_node="">. If intergalactic stars were to account for all of the background anisotropy, it would require a very large population, but this is not excluded by observations and could in fact also explain a fair part of the </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_matter" title="Dark matter"><span data-dcnode-id="1250" instrument_node="">dark matter</span></a><span data-dcnode-id="1248" instrument_node=""> problem as well.</span><sup class="reference" data-dcnode-id="1245" id="cite_ref-4"><a data-dcnode-id="1246" href="#cite_note-4"><span data-dcnode-id="1247" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="1242" id="cite_ref-5"><a data-dcnode-id="1243" href="#cite_note-5"><span data-dcnode-id="1244" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1241" instrument_node="">
</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h2 data-dcnode-id="1229"><span class="mw-headline" data-dcnode-id="1237" id="Foregrounds"><span data-dcnode-id="1238" instrument_node="">Foregrounds</span></span><span class="mw-editsection" data-dcnode-id="1230"><span class="mw-editsection-bracket" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">[</span></span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D3" title="Edit section: Foregrounds"><span data-dcnode-id="1234" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">The most important foreground components of the CIB are the following:
</span></p><span data-dcnode-id="1225" instrument_node="">
</span><ul data-dcnode-id="1177"><li data-dcnode-id="1218"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zodiacal_light" title="Zodiacal light"><span data-dcnode-id="1224" instrument_node="">Zodiacal emission</span></a><span data-dcnode-id="1222" instrument_node="">: the thermal emission of microscopic dust particles in the </span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="1221" instrument_node="">Solar System</span></a><span data-dcnode-id="1219" instrument_node=""> (from near- to mid-infrared)</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1216" instrument_node="">Thermal emission of small </span><a class="mw-redirect" data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asteroids" title="Asteroids"><span data-dcnode-id="1215" instrument_node="">asteroids</span></a><span data-dcnode-id="1213" instrument_node=""> in the </span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="1212" instrument_node="">Solar System</span></a><span data-dcnode-id="1210" instrument_node=""> (from near- to mid-infrared)</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1204"><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_cirrus" title="Infrared cirrus"><span data-dcnode-id="1207" instrument_node="">Galactic cirrus emission</span></a><span data-dcnode-id="1205" instrument_node=""> (far-infrared)</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1202" instrument_node="">Faint </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy" title="Galaxy"><span data-dcnode-id="1201" instrument_node="">galactic</span></a><span data-dcnode-id="1199" instrument_node=""> </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="1198" instrument_node="">stars</span></a><span data-dcnode-id="1196" instrument_node=""> (in the </span><a class="mw-redirect" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Near-infrared" title="Near-infrared"><span data-dcnode-id="1195" instrument_node="">near-infrared</span></a><span data-dcnode-id="1193" instrument_node="">, λ&lt;20μm)</span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1184"><span data-dcnode-id="1190" instrument_node="">Infrared emission of </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intracluster_medium" title="Intracluster medium"><span data-dcnode-id="1189" instrument_node="">intracluster dust</span></a><span data-dcnode-id="1187" instrument_node=""> in the </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_Group" title="Local Group"><span data-dcnode-id="1186" instrument_node="">Local Group</span></a></li><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1178"><span data-dcnode-id="1182" instrument_node="">The </span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_microwave_background" title="Cosmic microwave background"><span data-dcnode-id="1181" instrument_node="">cosmic microwave background</span></a><span data-dcnode-id="1179" instrument_node=""> - although physically it is not a "foreground" - is also considered as an important contaminating source of emission at very long infrared wavelengths (λ&gt;300μm)</span></li></ul><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">These components must be separated for a clear CIB detection.
</span></p><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1163"><span class="mw-headline" data-dcnode-id="1171" id="Observation_of_the_cosmic_infrared_background"><span data-dcnode-id="1172" instrument_node="">Observation of the cosmic infrared background</span></span><span class="mw-editsection" data-dcnode-id="1164"><span class="mw-editsection-bracket" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">[</span></span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D4" title="Edit section: Observation of the cosmic infrared background"><span data-dcnode-id="1168" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The detection of the CIB is both observationally and astrophysically very challenging. It has a very few characteristics which can be used to separate it from the foregrounds. One major point is, that the CIB must be isotropic, i.e. one has to measure the same CIB value all over the sky. It also lacks suspicious spectral features, since the final shape of its spectrum is the sum of the spectra of sources in the line of sight at various redshifts.
</span></p><span data-dcnode-id="1159" instrument_node="">
</span><h3 data-dcnode-id="1149"><span class="mw-headline" data-dcnode-id="1157" id="Direct_detection"><span data-dcnode-id="1158" instrument_node="">Direct detection</span></span><span class="mw-editsection" data-dcnode-id="1150"><span class="mw-editsection-bracket" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">[</span></span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D5" title="Edit section: Direct detection"><span data-dcnode-id="1154" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1147" instrument_node="">Direct measurements are simple, but very difficult. One just has to measure the total incoming power, and determine the contribution of each </span><a class="new" data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSky_background%26action%3Dedit%26redlink%3D1" title="Sky background (page does not exist)"><span data-dcnode-id="1146" instrument_node="">sky background</span></a><span data-dcnode-id="1144" instrument_node=""> component. The measurement has to be repeated in many directions to determine the contribution of the foregrounds. After the removal of all other components the remaining power – if it is the same constant value in any direction – is the CIB at that specific wavelength. In practice, one needs an instrument that is able to perform </span><a class="new" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAbsolute_photometry%26action%3Dedit%26redlink%3D1" title="Absolute photometry (page does not exist)"><span data-dcnode-id="1143" instrument_node="">absolute photometry</span></a><span data-dcnode-id="1141" instrument_node="">, i.e. it has some mechanism to fully block incoming light for an accurate zero level determination (</span><a class="new" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCold_shutter%26action%3Dedit%26redlink%3D1" title="Cold shutter (page does not exist)"><span data-dcnode-id="1140" instrument_node="">cold shutter</span></a><span data-dcnode-id="1138" instrument_node="">). Since the instrument parts, including the shutter, have non-zero temperatures and emit in the infrared, this is a very difficult task.
</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1136" instrument_node="">The first, and still the most extensive, direct CIB measurements were performed by the </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffuse_Infrared_Background_Experiment" title="Diffuse Infrared Background Experiment"><span data-dcnode-id="1135" instrument_node="">DIRBE</span></a><span data-dcnode-id="1133" instrument_node=""> instrument of the </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_Background_Explorer" title="Cosmic Background Explorer"><span data-dcnode-id="1132" instrument_node="">COBE</span></a><span data-dcnode-id="1130" instrument_node=""> satellite. After the removal of the precisely determined </span><a class="new" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DZodiacal_emission%26action%3Dedit%26redlink%3D1" title="Zodiacal emission (page does not exist)"><span data-dcnode-id="1129" instrument_node="">zodiacal emission</span></a><span data-dcnode-id="1127" instrument_node=""> contribution (which was based on the measured annual variation) the remaining power at longer infrared wavelength contained basically two components: the CIB and the Galactic cirrus emission. The infrared surface brightness of the Galactic cirrus must correlate with the neutral hydrogen column densities, since they originate from the same, low-density structure.  After the removal of the HI-correlated part, the remaining surface brightness was identified as the cosmic infrared background at 60, 100, 140, and 240μm. At shorter wavelengths the CIB level could not be correctly determined.
</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">Later, short-wavelength DIRBE measurements at 2.2 and 3.5μ were combined with the Two Micron Sky Survey (</span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2MASS" title="2MASS"><span data-dcnode-id="1124" instrument_node="">2MASS</span></a><span data-dcnode-id="1122" instrument_node="">) source count data, and this led to the detection of the CIB at these two wavelengths.
</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1110"><span class="mw-headline" data-dcnode-id="1118" id="Fluctuation_studies"><span data-dcnode-id="1119" instrument_node="">Fluctuation studies</span></span><span class="mw-editsection" data-dcnode-id="1111"><span class="mw-editsection-bracket" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">[</span></span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D6" title="Edit section: Fluctuation studies"><span data-dcnode-id="1115" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1108" instrument_node="">Since the CIB is an accumulated light of individual sources there is always a somewhat different number of sources in different directions in the field of view of the observer. This cause a variation (fluctuation) in the total amount of observed incoming flux among the different line of sights. These fluctuations are traditionally described by the two dimensional </span><a class="mw-redirect" data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocorrelation_function" title="Autocorrelation function"><span data-dcnode-id="1107" instrument_node="">autocorrelation function</span></a><span data-dcnode-id="1105" instrument_node="">, or by the corresponding </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourier_analysis" title="Fourier analysis"><span data-dcnode-id="1104" instrument_node="">Fourier</span></a><span data-dcnode-id="1102" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_spectrum" title="Power spectrum"><span data-dcnode-id="1101" instrument_node="">power spectrum</span></a><span data-dcnode-id="1099" instrument_node="">. The detection of fluctuations is easier than the direct CIB measurements, since one does not need to determine the absolute photometric zero point – fluctuations can be derived from differential measurements. On the other hand, fluctuations do not provide an immediate information on the CIB brightness. The measured fluctuation amplitudes either has to be confronted with a CIB model that has a prediction for the fluctuation / absolute level ratio, or it has to be compared with integrated differential light levels of </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Source_counts" title="Source counts"><span data-dcnode-id="1098" instrument_node="">source counts</span></a><span data-dcnode-id="1096" instrument_node=""> at the same wavelength.
</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1094" instrument_node="">The power spectrum of the CIB is usually presented in a spatial frequency [arcmin</span><sup data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">−1</span></sup><span data-dcnode-id="1091" instrument_node="">] vs. fluctuation power [Jy</span><sup data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">2</span></sup><span data-dcnode-id="1088" instrument_node=""> sr</span><sup data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">−1</span></sup><span data-dcnode-id="1085" instrument_node="">] diagram. It is contaminated by the presence of the power spectrum of foreground components, so that the total power spectrum is:
</span></p><p data-dcnode-id="1068"><i data-dcnode-id="1070"><span data-dcnode-id="1083" instrument_node="">P(f) = Φ(f)x[P</span><sub data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">CIB</span></sub><span data-dcnode-id="1080" instrument_node="">(f) + P</span><sub data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">cirr</span></sub><span data-dcnode-id="1077" instrument_node="">(f) + P</span><sub data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">ze</span></sub><span data-dcnode-id="1074" instrument_node="">(f) + P</span><sub data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">n</span></sub><span data-dcnode-id="1071" instrument_node="">(f)]</span></i><span data-dcnode-id="1069" instrument_node="">
</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1067" instrument_node="">where P(f), P</span><sub data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">CIB</span></sub><span data-dcnode-id="1064" instrument_node="">(f), P</span><sub data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">cirr</span></sub><span data-dcnode-id="1061" instrument_node="">, P</span><sub data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">ze</span></sub><span data-dcnode-id="1058" instrument_node="">(f) and P</span><sub data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">n</span></sub><span data-dcnode-id="1055" instrument_node="">(f) are the total, CIB, </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_cirrus" title="Infrared cirrus"><span data-dcnode-id="1054" instrument_node="">Galactic cirrus</span></a><span data-dcnode-id="1052" instrument_node="">, zodiacal emission and noise (instrument noise) power spectrum components, respectively, and Φ is the power spectrum of the telescope's </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Point_spread_function" title="Point spread function"><span data-dcnode-id="1051" instrument_node="">point spread function</span></a><span data-dcnode-id="1049" instrument_node="">.
</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1047" instrument_node="">For most of the infrared zodiacal emission fluctuation are negligible in the "cosmic windows", far from the </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecliptic" title="Ecliptic"><span data-dcnode-id="1046" instrument_node="">ecliptic</span></a><span data-dcnode-id="1044" instrument_node=""> plane.</span><sup class="reference" data-dcnode-id="1041" id="cite_ref-6"><a data-dcnode-id="1042" href="#cite_note-6"><span data-dcnode-id="1043" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1040" instrument_node="">
</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1038" instrument_node="">In the far-infrared the CIB power spectrum can be effectively used to separate it from its strongest foreground, the Galactic cirrus emission. The cirrus emission has a characteristic power spectrum of a power-law (that of a </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fractal" title="Fractal"><span data-dcnode-id="1037" instrument_node="">fractal</span></a><span data-dcnode-id="1035" instrument_node=""> spatial structure) </span><i data-dcnode-id="1025"><span data-dcnode-id="1034" instrument_node="">P(f) = P</span><sub data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">0</span></sub><span data-dcnode-id="1031" instrument_node="">(f/f</span><sub data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">0</span></sub><span data-dcnode-id="1028" instrument_node="">)</span><sup data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">α</span></sup></i><span data-dcnode-id="1024" instrument_node="">, where </span><i data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">P</span></i><span data-dcnode-id="1021" instrument_node=""> is the fluctuation power at the spatial frequency </span><i data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">f</span></i><span data-dcnode-id="1018" instrument_node="">, </span><i data-dcnode-id="1014"><span data-dcnode-id="1017" instrument_node="">P</span><sub data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">0</span></sub></i><span data-dcnode-id="1013" instrument_node=""> is the fluctuation power at the reference spatial frequency </span><i data-dcnode-id="1009"><span data-dcnode-id="1012" instrument_node="">f</span><sub data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">0</span></sub></i><span data-dcnode-id="1008" instrument_node="">, and α is the spectral index. α was found to be α≈-3, which is much steeper than the power spectrum of the CIB at low spatial frequencies. The cirrus component can be identified in the power spectrum at low spatial frequencies and then removed from the whole spatial frequency range. The remaining power spectrum – after a careful correction for instrument effects – should be that of the CIB.
</span></p><p data-dcnode-id="991"><span data-dcnode-id="1006" instrument_node="">Autocorrelation and power spectrum studies resulted in the CIB fluctuation amplitudes at 1.25, 2.2, 3.5, 12–100μm based on the </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_Background_Explorer" title="Cosmic Background Explorer"><span data-dcnode-id="1005" instrument_node="">COBE</span></a><span data-dcnode-id="1003" instrument_node="">/DIRBE measurements, and later at 90 and 170μm, based on the observations of the ISOPHOT instrument of the </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_Space_Observatory" title="Infrared Space Observatory"><span data-dcnode-id="1002" instrument_node="">Infrared Space Observatory</span></a><span data-dcnode-id="1000" instrument_node="">.</span><sup class="reference" data-dcnode-id="997" id="cite_ref-7"><a data-dcnode-id="998" href="#cite_note-7"><span data-dcnode-id="999" instrument_node="">[7]</span></a></sup><span data-dcnode-id="996" instrument_node=""> Recently, the clustering of the galaxies have also been identified in the power spectrum at 160μm using this method.</span><sup class="reference" data-dcnode-id="993" id="cite_ref-8"><a data-dcnode-id="994" href="#cite_note-8"><span data-dcnode-id="995" instrument_node="">[8]</span></a></sup><span data-dcnode-id="992" instrument_node="">
</span></p><span data-dcnode-id="990" instrument_node="">
</span><h3 data-dcnode-id="980"><span class="mw-headline" data-dcnode-id="988" id="Source_counts"><span data-dcnode-id="989" instrument_node="">Source counts</span></span><span class="mw-editsection" data-dcnode-id="981"><span class="mw-editsection-bracket" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">[</span></span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D7" title="Edit section: Source counts"><span data-dcnode-id="985" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">]</span></span></span></h3><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="972"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Source_counts" title="Source counts"><span data-dcnode-id="978" instrument_node="">Source counts</span></a><span data-dcnode-id="976" instrument_node=""> gives the most extensive picture about the sources building up the CIB. In a </span><a class="mw-redirect" data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Source_count" title="Source count"><span data-dcnode-id="975" instrument_node="">source count</span></a><span data-dcnode-id="973" instrument_node=""> one tries to detect as many point/compact sources in a certain field of view as possible: this is usually done at multiple wavelengths and is often complemented by other data, e.g. photometry at visual or sub-millimeter wavelengths. In this way, one has information on the broad band spectral characteristics of the detected sources, too. The detected point sources have to be distinguished from other contaminating sources, e.g. minor bodies in the Solar System, Galactic stars and cirrus knots (local density enhancements in the Galactic cirrus emission).
</span></p><p data-dcnode-id="947"><span data-dcnode-id="971" instrument_node="">Source counts were important tasks for the recent infrared missions like </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2MASS" title="2MASS"><span data-dcnode-id="970" instrument_node="">2MASS</span></a><span data-dcnode-id="968" instrument_node=""> or the </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_Space_Observatory" title="Infrared Space Observatory"><span data-dcnode-id="967" instrument_node="">Infrared Space Observatory</span></a><span data-dcnode-id="965" instrument_node=""> (ISO), and is still one of the most important questions the current and near future infrared space instruments (the </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spitzer_Space_Telescope" title="Spitzer Space Telescope"><span data-dcnode-id="964" instrument_node="">Spitzer Space Telescope</span></a><span data-dcnode-id="962" instrument_node=""> and the </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herschel_Space_Observatory" title="Herschel Space Observatory"><span data-dcnode-id="961" instrument_node="">Herschel Space Observatory</span></a><span data-dcnode-id="959" instrument_node="">). While ISO was able to resolve about 3–10% of the total CIB light into individual sources (depending on the wavelength), Spitzer measurements have already detected ~30% of the CIB as sources,</span><sup class="reference" data-dcnode-id="956" id="cite_ref-9"><a data-dcnode-id="957" href="#cite_note-9"><span data-dcnode-id="958" instrument_node="">[9]</span></a></sup><span data-dcnode-id="955" instrument_node=""> and this ratio is expected to be ~90% at some wavelengths with the </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herschel_Space_Observatory" title="Herschel Space Observatory"><span data-dcnode-id="954" instrument_node="">Herschel Space Observatory</span></a><span data-dcnode-id="952" instrument_node="">.</span><sup class="reference" data-dcnode-id="949" id="cite_ref-10"><a data-dcnode-id="950" href="#cite_note-10"><span data-dcnode-id="951" instrument_node="">[10]</span></a></sup><span data-dcnode-id="948" instrument_node="">
</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Source count results support the "fast evolution" galaxy models. In these models galaxies nowadays look significantly different than they were at z=1...2, when they were coming through an intense star-formation phase. The source count results exclude the "steady state" scenarios, where z=1...2 galaxies look similar to those we see today in our cosmic neighborhood.
</span></p><span data-dcnode-id="944" instrument_node="">
</span><h2 data-dcnode-id="934"><span class="mw-headline" data-dcnode-id="942" id="See_also"><span data-dcnode-id="943" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="935"><span class="mw-editsection-bracket" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">[</span></span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCosmic_infrared_background%26action%3Dedit%26section%3D8" title="Edit section: See also"><span data-dcnode-id="939" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">]</span></span></span></h2><span data-dcnode-id="933" instrument_node="">

</span><li data-dcnode-id="922"><span data-dcnode-id="926"><a class="image" data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg"><img alt="icon" class="noviewer" data-dcnode-id="928" data-file-height="600" data-file-width="530" decoding="async" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg/25px-Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg/37px-Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg/49px-Stylised_atom_with_three_Bohr_model_orbits_and_stylised_nucleus.svg.png 2x" width="25"></a></span><span data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3APhysics" title="Portal:Physics"><span data-dcnode-id="925" instrument_node="">Physics portal</span></a></span></li><span data-dcnode-id="921" instrument_node="">
