_node="">And now let’s jump right into Milky Way photography.</span></p><div class="counter-hierarchy counter-decimal ez-toc-light-blue" data-dcnode-id="1744" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="1794"><p class="ez-toc-title" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Table of Contents</span></p></div><nav data-dcnode-id="1745"><ul class="ez-toc-list" data-dcnode-id="1746"><li data-dcnode-id="1791"><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23what-you-will-need" title="What You Will Need"><span data-dcnode-id="1793" instrument_node="">What You Will Need</span></a></li><li data-dcnode-id="1788"><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23location-and-light-pollution-considerations" title="Location and Light Pollution Considerations"><span data-dcnode-id="1790" instrument_node="">Location and Light Pollution Considerations</span></a></li><li data-dcnode-id="1785"><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23focusing" title="Focusing"><span data-dcnode-id="1787" instrument_node="">Focusing</span></a></li><li data-dcnode-id="1772"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23camera-settings" title="Camera Settings"><span data-dcnode-id="1784" instrument_node="">Camera Settings</span></a><ul data-dcnode-id="1773"><li data-dcnode-id="1780"><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23the-500-600-rule" title="The 500 / 600 Rule"><span data-dcnode-id="1782" instrument_node="">The 500 / 600 Rule</span></a></li><li data-dcnode-id="1777"><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23jpeg-or-raw" title="JPEG or RAW?"><span data-dcnode-id="1779" instrument_node="">JPEG or RAW?</span></a></li><li data-dcnode-id="1774"><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23camera-mode" title="Camera Mode"><span data-dcnode-id="1776" instrument_node="">Camera Mode</span></a></li></ul></li><li data-dcnode-id="1769"><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23foreground-elements-and-composition" title="Foreground Elements and Composition"><span data-dcnode-id="1771" instrument_node="">Foreground Elements and Composition</span></a></li><li data-dcnode-id="1753"><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23image-blending" title="Image Blending"><span data-dcnode-id="1768" instrument_node="">Image Blending</span></a><ul data-dcnode-id="1754"><li data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23time-blends" title="Time Blends"><span data-dcnode-id="1766" instrument_node="">Time Blends</span></a></li><li data-dcnode-id="1761"><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23star-tracker" title="Star Tracker"><span data-dcnode-id="1763" instrument_node="">Star Tracker</span></a></li><li data-dcnode-id="1758"><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23focus-stacking" title="Focus Stacking"><span data-dcnode-id="1760" instrument_node="">Focus Stacking</span></a></li><li data-dcnode-id="1755"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23image-averaging" title="Image Averaging"><span data-dcnode-id="1757" instrument_node="">Image Averaging</span></a></li></ul></li><li data-dcnode-id="1750"><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23post-processing" title="Post-Processing"><span data-dcnode-id="1752" instrument_node="">Post-Processing</span></a></li><li data-dcnode-id="1747"><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23learn-more" title="Learn More!"><span data-dcnode-id="1749" instrument_node="">Learn More!</span></a></li></ul></nav></div><h3 data-dcnode-id="1741"><span class="ez-toc-section" data-dcnode-id="1742" id="what-you-will-need"><span data-dcnode-id="1743" instrument_node="">What You Will Need</span></span></h3><p data-dcnode-id="1736"><span data-dcnode-id="1740" instrument_node="">Before we start talking about photographing the </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way"><span data-dcnode-id="1739" instrument_node="">Milky Way</span></a><span data-dcnode-id="1737" instrument_node="">, let me first go over what you will need in terms of gear and software:</span></p><div data-dcnode-id="1735" id="fs_content_ad"></div><ul data-dcnode-id="1668"><span data-dcnode-id="1734" instrument_node=""> </span><li data-dcnode-id="1721"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">An Advanced Camera</span></strong><span data-dcnode-id="1731" instrument_node=""> – you will need a camera that allows full manual exposure control of </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/what-is-aperture-in-photography"><span data-dcnode-id="1730" instrument_node="">aperture</span></a><span data-dcnode-id="1728" instrument_node="">, </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/what-is-shutter-speed-in-photography"><span data-dcnode-id="1727" instrument_node="">shutter speed</span></a><span data-dcnode-id="1725" instrument_node=""> and </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/what-is-iso-in-photography"><span data-dcnode-id="1724" instrument_node="">ISO</span></a><span data-dcnode-id="1722" instrument_node="">. You also want the camera to be able to focus manually, since focusing at night will surely be a challenge for any autofocus system. Ideally, you need an advanced DSLR or a mirrorless camera that can handle noise well at high ISOs (more on this below). A dedicated astro-camera like the Nikon D810A is going to be the top choice for astrophotography, but that’s for those that want to explore astrophotography beyond the scope of this article. Some point and shoot cameras might be suitable for the job with manual controls, but the results will be obviously much inferior, especially on small sensor point and shoots.</span></li><span data-dcnode-id="1720" instrument_node=""> </span><li data-dcnode-id="1698"><strong data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">A Fast Lens</span></strong><span data-dcnode-id="1717" instrument_node=""> – if you use an interchangeable lens camera, I would recommend to use a good, fast-aperture wide-angle lens (ideally in the f/1.4 – f/2.8 max aperture range). Top choices for photographing the stars are fast </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/prime-vs-zoom-lenses"><span data-dcnode-id="1716" instrument_node="">prime lenses</span></a><span data-dcnode-id="1714" instrument_node=""> that do very well wide open. My favorite lenses for night photography are the </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/reviews/nikon-14-24mm-f2-8g"><span data-dcnode-id="1713" instrument_node="">Nikon 14-24mm f/2.8G</span></a><span data-dcnode-id="1711" instrument_node=""> and the </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/reviews/nikon-20mm-f1-8g-ed"><span data-dcnode-id="1710" instrument_node="">Nikon 20mm f/1.8G</span></a><span data-dcnode-id="1708" instrument_node="">. Both are superb performers at their maximum apertures (wide open), so they are very suitable for night photography. But there are many more lens choices available that perform exceptionally well for night photography. We have written an article on </span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/the-best-night-photography-lenses-for-nikon-cameras"><span data-dcnode-id="1707" instrument_node="">best Nikon lenses for astrophotography</span></a><span data-dcnode-id="1705" instrument_node="">, listing both native and third-party options that also work well on other systems, so I would recommend that you check out that article. If you have a slow lens or you need to stop down your lens to get the maximum sharpness, you will have to crank up the ISO, which will result in grainy photos. That’s why a fast lens is an ideal choice. If you shoot Canon, you can get similar lens choices as Nikon and the value is going to be with third party lenses from Samyang / Rokinon. My top recommendation for astrophotography is the </span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1352858-REG/rokinon_sp14mae_n_14mm_f2_4_high_speed.html/BI/5562/KBID/6400" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="1704" instrument_node="">Rokinon SP 14mm f/2.4</span></a><span data-dcnode-id="1702" instrument_node=""> (</span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1308034-REG/rokinon_sp14m_c_special_performance_14mm_f_2_4.html/BI/5562/KBID/6400" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="1701" instrument_node="">Canon mount</span></a><span data-dcnode-id="1699" instrument_node="">), which shows excellent performance when stopped down to f/2.8 and it does not suffer from heavy coma like many other lenses do.</span></li><span data-dcnode-id="1697" instrument_node=""> </span><li data-dcnode-id="1690"><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">A Sturdy Tripod</span></strong><span data-dcnode-id="1694" instrument_node=""> – you will be shooting long exposures (15 seconds and longer), so a sturdy tripod is a must-have. You do not want a flimsy tripod that will shake like crazy during the exposure, especially if there is light wind. Make sure to check out our detailed </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/how-to-choose-and-buy-a-tripod-for-a-dslr-camera"><span data-dcnode-id="1693" instrument_node="">guide on choosing a tripod</span></a><span data-dcnode-id="1691" instrument_node=""> for more information.</span></li><span data-dcnode-id="1689" instrument_node=""> </span><li data-dcnode-id="1679"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Sky Map App</span></strong><span data-dcnode-id="1686" instrument_node=""> – this one is optional, but something I would highly recommend. A good sky map app such as </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/star-walk-night-sky-guide/id295430577%3Fmt%3D8"><span data-dcnode-id="1685" instrument_node="">Star Walk</span></a><span data-dcnode-id="1683" instrument_node=""> could show you exactly where the Milky Way is or will be, which can help a great deal with planning your shots. Another great app that I personally use is </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="1682" instrument_node="">PhotoPills</span></a><span data-dcnode-id="1680" instrument_node=""> and it has an excellent Night AR feature that can be very helpful for planning.</span></li><span data-dcnode-id="1678" instrument_node=""> </span><li data-dcnode-id="1674"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Post-Processing Software</span></strong><span data-dcnode-id="1675" instrument_node=""> – you definitely want to process your shots in good software to get the best quality results and bring out the details. I would recommend either Adobe Photoshop or Photoshop Elements for astrophotography. Lightroom can be useful as well, but it is not going to be as flexible to do things like levels and advanced cloning / spot removal tools (to remove planes and other objects from the shots, etc). Post-processing is a big part of astrophotography, so I would highly recommend to get good software for the job if you do not already have it. Further down below, I will show you how to take some simple steps in Photoshop / Elements to enhance your Milky Way photos.</span></li><span data-dcnode-id="1673" instrument_node=""> </span><li data-dcnode-id="1669"><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Flashlight</span></strong><span data-dcnode-id="1670" instrument_node=""> – a good flashlight is not only useful to find a good spot at night, but can also be used for light painting, if you have interesting foreground elements.</span></li></ul><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">There are other things you might need, such as a remote camera trigger (for 30+ second exposures), hand / leg warmers (if shooting in cold) and more, but those are optional or depend on conditions and what you are trying to achieve.</span></p><figure aria-describedby="caption-attachment-127101" class="wp-caption aligncenter" data-dcnode-id="1661" id="attachment_127101" style="width: 640px"><a class="fancybox image" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection.jpg" rel="gallery" title="NIKON D800E + 20mm f/1.8 @ 20mm, ISO 6400, 15 seconds, f/1.8"><img alt="Milky Way Reflection" class="size-medium wp-image-127101 lazy error" data-dcnode-id="1665" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-640x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection.jpg 1365w" data-was-processed="true" height="960" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-640x960.jpg&amp;raw" srcset="https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2016/05/Milky-Way-Reflection.jpg 1365w" width="640"></a><figcaption class="wp-caption-text" data-dcnode-id="1662" id="caption-attachment-127101"><span data-dcnode-id="1663" instrument_node="">NIKON D800E + 20mm f/1.8 @ 20mm, ISO 6400, 15 seconds, f/1.8</span></figcaption></figure><h3 data-dcnode-id="1658"><span class="ez-toc-section" data-dcnode-id="1659" id="location-and-light-pollution-considerations"><span data-dcnode-id="1660" instrument_node="">Location and Light Pollution Considerations</span></span></h3><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">If you live in a big city, it will be extremely difficult to capture the night sky and the Milky Way. Big city lights can be a huge problem due to air and light pollution, so it is best to get out of town/city and find a good location that does not have such problems. Sometimes it means driving several hours away from where you live. You might not see the light pollution with your eyes, but the camera sure will!</span></p><p data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">Remote national parks and wilderness areas are ideal for night photography, because the sky is crystal clear and there are no lights around. Use the </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//darksitefinder.com/map/"><span data-dcnode-id="1654" instrument_node="">Dark Sky Finder</span></a><span data-dcnode-id="1652" instrument_node=""> website to find the best locations with minimal light pollution.</span></p><figure aria-describedby="caption-attachment-155530" class="wp-caption aligncenter" data-dcnode-id="1646" id="attachment_155530" style="width: 960px"><a class="fancybox image" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise.jpg" rel="gallery" title="NIKON D800E + 14-24mm f/2.8 @ 14mm, ISO 3200, 25 seconds, f/2.8"><img alt="Milky Way with some noise" class="size-medium wp-image-155530 lazy error" data-dcnode-id="1650" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-960x640.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise.jpg 2048w" data-was-processed="true" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-960x640.jpg&amp;raw" srcset="https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2018/03/Milky-Way-with-some-noise.jpg 2048w" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1647" id="caption-attachment-155530"><span data-dcnode-id="1648" instrument_node="">NIKON D800E + 14-24mm f/2.8 @ 14mm, ISO 3200, 25 seconds, f/2.8</span></figcaption></figure><h3 data-dcnode-id="1643"><span class="ez-toc-section" data-dcnode-id="1644" id="focusing"><span data-dcnode-id="1645" instrument_node="">Focusing</span></span></h3><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Before we talk about exposure settings, let’s first go over some important steps in ensuring that we end up with properly focused shots. Focusing at night can be a challenging and frustrating experience because the autofocus system on your camera will have very little contrast to be able to acquire proper focus. The best thing to do is to compose your shot, set one focal length (if using a zoom lens) and once you manually acquire perfect focus, not to touch the focus or zoom rings until you are completely done. Personally, I turn off autofocus right away and only rely on manual focusing using Live View – the goal is to set focus to infinity. Some people say that using lens markers to set focus to infinity is a good practice, but in reality, unless you have an old manual focus lens with more or less precise infinity markings, I would not rely on those. Even a slight focus error on a modern high-resolution sensor will make the stars appear like circular blobs instead of defined stars, so your focus technique is critical.</span></p><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">So what is the best way to get perfect focus? I often utilize a number of different techniques using camera’s Live View. Once you set your lens to Manual Focus and turn Live View on, zoom in to 100% and point your camera at the brightest source of light in the sky, which is usually the moon. Move the focus ring until you can clearly see the defined shape of the moon and simply turn off Live View – you are done. If the moon is not in the sky, try to find another source of light – perhaps a very bright star or some distant light. If you do not have either one of those, then another option is to turn your flashlight on and set it far enough away from you that it is at infinity, then focus on the flashlight using Live View. Some Live View modes in cameras are very good and will “boost” the night sky and reveal the stars. If you can see the stars in Live View, then you do not need to use any of the above techniques – just rotate the focus ring until the stars appear sharp. And lastly, if nothing works out, you can try using the infinity mark on top of the lens and take sample shots to see if focus is properly acquired or not. If you see blurry stars when zoomed in to 100%, then you know that you need to rotate the focus ring a tad to get better focus. It will take you some time to get it right, but it is definitely worth doing this right, than end up with blurry photos.</span></p><figure aria-describedby="caption-attachment-150605" class="wp-caption aligncenter" data-dcnode-id="1634" id="attachment_150605" style="width: 960px"><a class="fancybox image" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo.jpg" rel="gallery" title="NIKON D800E + 20mm f/1.8 @ 20mm, ISO 3200, 20 seconds, f/2.2"><img alt="Milky Way landscape photo" class="size-medium wp-image-150605 lazy error" data-dcnode-id="1638" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-960x640.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo.jpg 2048w" data-was-processed="true" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-960x640.jpg&amp;raw" srcset="https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2017/11/Milky-Way-landscape-photo.jpg 2048w" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1635" id="caption-attachment-150605"><span data-dcnode-id="1636" instrument_node="">NIKON D800E + 20mm f/1.8 @ 20mm, ISO 3200, 20 seconds, f/2.2</span></figcaption></figure><p data-dcnode-id="1629"><span data-dcnode-id="1633" instrument_node="">Now, if you have a foreground object in your shot, you obviously want both the foreground and the stars to be in perfect focus. Since you are shooting at wide open aperture, how do you achieve that? Well, the answer is in a technique called “focus stacking”, except you are probably going to take two images, with one focused on the sky and the other focused on your foreground. Then you use a blending technique in Photoshop to merge the two shots into a single composite, with perfect focus on both. Spencer has written an excellent guide on </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/focus-stacking-tutorial-for-landscape-photography"><span data-dcnode-id="1632" instrument_node="">focus stacking</span></a><span data-dcnode-id="1630" instrument_node="">, so if you want to find out more about the technique, check out the link!</span></p><h3 data-dcnode-id="1626"><span class="ez-toc-section" data-dcnode-id="1627" id="camera-settings"><span data-dcnode-id="1628" instrument_node="">Camera Settings</span></span></h3><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">While the sky might look magnificent at night, with millions of stars easily visible to your eyes, it does not mean that your camera will be easily able to capture it. Your eyes get adjusted to low light at night, which means that you are seeing everything at very high sensitivity levels, with the iris wide open, at its maximum size. So if you want your camera to be able to capture the night sky as you see it (and perhaps even better than that), you will need to apply the same technique – use high ISO sensitivity levels and shoot at large apertures. This is where your camera and lens choices will play an important role on what you will be able to achieve. If you have a fast prime lens that performs well at its maximum aperture without introducing too much coma, you do not have to use very high ISO levels on your camera, which means less grain to deal with when post-processing your Milky Way photos. For example, the first image in this article was captured using the Nikon D3s and 24mm f/1.4G lens at f/1.4, ISO 1600 and 20-second long exposure. If I wanted to keep the length of the exposure the same and used a slower lens, say f/2.8 (two stops slower), I would have to increase my camera ISO from 1600 to 6400, which is a big difference.</span></p><div data-dcnode-id="1623" id="fs_content_ad"></div><p data-dcnode-id="1618"><span data-dcnode-id="1622" instrument_node="">So where do you start and what is the most important camera setting? What I would do first, is start out by determining the </span><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">length of exposure</span></strong><span data-dcnode-id="1619" instrument_node="">. And this is where it gets tricky, because if you do it wrong, you will either end up with a black sky and a couple of stars, or the stars will look like lines instead of dots, commonly referred to as “star trails”. Those can look great in some shots, but star trail photography requires completely different techniques centered around the north star and obviously won’t work for Milky Way shots. Remember, our planet constantly rotates, and since we are shooting from a tripod that is fixed in one position, we really have to be careful about timing each exposure, as we need to keep stars as dots in our shots.</span></p><figure aria-describedby="caption-attachment-149755" class="wp-caption aligncenter" data-dcnode-id="1613" id="attachment_149755" style="width: 960px"><a class="fancybox image" data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle.jpg" rel="gallery" title="NIKON D850 + 14mm f/1.8 @ 14mm, ISO 800, 20 seconds, f/1.8"><img alt="Al Kharanah Castle" class="size-medium wp-image-149755 lazy" data-dcnode-id="1617" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-960x640.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2017/10/Al-Kharanah-Castle.jpg 2048w" height="640" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20960%20640'%3E%3C/svg%3E" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1614" id="caption-attachment-149755"><span data-dcnode-id="1615" instrument_node="">NIKON D850 + 14mm f/1.8 @ 14mm, ISO 800, 20 seconds, f/1.8</span></figcaption></figure><h4 data-dcnode-id="1610"><span class="ez-toc-section" data-dcnode-id="1611" id="the-500-600-rule"><span data-dcnode-id="1612" instrument_node="">The 500 / 600 Rule</span></span></h4><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">This one has a confusing name, because some people refer to this method as the “500 Rule”, while others go with the “600 Rule”. Basically, to determine the optical length of exposure, we take one of the two numbers and divide it by the focal length of the lens to get the optimal shutter speed. So if you are shooting with a 20mm lens on a full-frame camera using the 500 rule, you take 500 and divide it by 20, which yields 25 seconds – that’s the longest shutter speed you should use before those stars start changing into trails. If you use the less conservative “600 Rule”, you end up with a 30 second exposure. Personally, I never had success with the “600 Rule”, as it always results in star trails, even when shooting with a low-resolution camera. The “500 Rule” for me is the maximum – in fact, I only use it as a reference and often end up reducing my shutter speed even more in order to have no star trails in my photos. Now if you go with a longer focal length lens, your exposure time will get shorter using the same math, so keep that in mind when photographing the Milky Way.</span></p><h4 data-dcnode-id="1605"><span class="ez-toc-section" data-dcnode-id="1606" id="jpeg-or-raw"><span data-dcnode-id="1607" instrument_node="">JPEG or RAW?</span></span></h4><p data-dcnode-id="1600"><span data-dcnode-id="1604" instrument_node="">If you are still shooting JPEG, slap yourself in the face – time to move to RAW and finally explore its benefits, especially when it comes to photographing the Milky Way. You want to shoot RAW for astrophotography, because you will often find yourself adjusting things like white balance, which you might not be able to change in JPEG images. There are many other benefits to shooting RAW – see my </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/raw-vs-jpeg"><span data-dcnode-id="1603" instrument_node="">RAW vs JPEG</span></a><span data-dcnode-id="1601" instrument_node=""> article for more details on why you should stay away from JPEG for night photography.</span></p><h4 data-dcnode-id="1597"><span class="ez-toc-section" data-dcnode-id="1598" id="camera-mode"><span data-dcnode-id="1599" instrument_node="">Camera Mode</span></span></h4><p data-dcnode-id="1589"><span data-dcnode-id="1596" instrument_node="">Whenever doing any type of night photography, you should always be shooting in full </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/understanding-digital-camera-modes%23manual-mode"><span data-dcnode-id="1595" instrument_node="">manual mode</span></a><span data-dcnode-id="1593" instrument_node="">, as there is simply not enough light for your camera’s meter to calculate the right exposure. This means that you need to turn off </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/what-is-auto-iso"><span data-dcnode-id="1592" instrument_node="">Auto ISO</span></a><span data-dcnode-id="1590" instrument_node=""> first, then set aperture to the maximum aperture like f/1.4, then the length of the exposure / shutter speed based on the “500 Rule” (typically between 20 to 30 seconds), followed by ISO (which I would set to 1600 as the base and move it up or down as needed). If you cannot clearly see the Milky Way in your shot after you take your first shot, you will need to raise ISO to a higher number like ISO 3200. Since you are shooting RAW, white balance does not matter.</span></p><h3 data-dcnode-id="1586"><span class="ez-toc-section" data-dcnode-id="1587" id="foreground-elements-and-composition"><span data-dcnode-id="1588" instrument_node="">Foreground Elements and Composition</span></span></h3><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">While capturing a shot of the Milky Way as shown in the beginning of this article can be rewarding, it is often boring to just shoot the Milky Way by itself. The best thing to do for these types of shots is to incorporate interesting foreground elements into your shots. Whether it is a beautiful mountain, a surreal lake, a rock or some other interesting object, it will surely make the photo much more appealing to the viewer’s eye. These shots can be hard to plan and require some prior research to determine the location of the Milky Way but, if you get it all right, all that effort will surely pay off. If you are blessed with a beautiful moonlight that illuminates your subjects, you might come back with killer pictures that will surely deserve a place on your wall. Here is a picture that I captured a couple of years back of Maroon Bells, taken at night:</span></p><figure aria-describedby="caption-attachment-68969" class="wp-caption aligncenter" data-dcnode-id="1579" id="attachment_68969" style="width: 960px"><a class="fancybox image" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night.jpg" rel="gallery" title="NIKON D3S + 24-70mm f/2.8 @ 29mm, ISO 800, 30 seconds, f/3.2"><img alt="Maroon Bells at Night" class="size-medium wp-image-68969 lazy" data-dcnode-id="1583" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-960x639.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-960x639.jpg 960w, https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-768x511.jpg 768w, https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-1536x1022.jpg 1536w, https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2014/02/Maroon-Bells-at-Night.jpg 2048w" height="639" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20960%20639'%3E%3C/svg%3E" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1580" id="caption-attachment-68969"><span data-dcnode-id="1581" instrument_node="">NIKON D3S + 24-70mm f/2.8 @ 29mm, ISO 800, 30 seconds, f/3.2</span></figcaption></figure><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">While the Milky Way is not seen above the mountain tops, it is still pretty incredible that the shot was taken at night. The whole scene was illuminated just by moonlight! If you look closely, you will see that the stars are slightly trailed – that’s because I broke the “500 Rule” with a 30 second exposure @ 29mm. I did that because I wanted a single shot that captured both the sky and the scenery, and I wanted to shoot at lower ISO to get the best image quality. I also stopped down the 24-70mm f/2.8G lens that I used that day to f/3.2 to get a little sharper corners.</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Keep in mind that having the moon out while shooting the night sky is not particularly desirable, as it might spill too much light into the sky and make it difficult to photograph all the details of the Milky Way. However, there are some cases when having the moon out could actually yield interesting results, as the below image shows:</span></p><figure aria-describedby="caption-attachment-118254" class="wp-caption aligncenter" data-dcnode-id="1570" id="attachment_118254" style="width: 640px"><a class="fancybox image" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF.jpg" rel="gallery" title="Canon EOS 5DS R + EF24-70mm f/2.8L II USM @ 24mm, ISO 3200, 20 seconds, f/2.8"><img alt="Milky Way Moonrise EXIF" class="size-medium wp-image-118254 lazy" data-dcnode-id="1574" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-640x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2015/09/Milky-Way-Moonrise-EXIF.jpg 1365w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20960'%3E%3C/svg%3E" width="640"></a><figcaption class="wp-caption-text" data-dcnode-id="1571" id="caption-attachment-118254"><span data-dcnode-id="1572" instrument_node="">Canon EOS 5DS R + EF24-70mm f/2.8L II USM @ 24mm, ISO 3200, 20 seconds, f/2.8</span></figcaption></figure><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Here is another image captured by Tom Redd, who spent a night at the Arches National Park in Moab, UT and captured the Milky Way with the window arch and other shapes as the foreground elements:</span></p><figure aria-describedby="caption-attachment-73226" class="wp-caption aligncenter" data-dcnode-id="1563" id="attachment_73226" style="width: 960px"><a class="fancybox image" data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd.jpg" rel="gallery" title="NIKON D4 @ 28mm, ISO 1600, 15 seconds, f/2.0"><img alt="Arches Night Sky by Tom Redd" class="size-medium wp-image-73226 lazy" data-dcnode-id="1567" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-960x639.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-960x639.jpg 960w, https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-768x511.jpg 768w, https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-1536x1022.jpg 1536w, https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2012/02/Arches-Night-Sky-by-Tom-Redd.jpg 2048w" height="639" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20960%20639'%3E%3C/svg%3E" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1564" id="caption-attachment-73226"><span data-dcnode-id="1565" instrument_node="">NIKON D4 @ 28mm, ISO 1600, 15 seconds, f/2.0</span></figcaption></figure><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">As you can see, he also had the moon in the sky as he captured the image. Tom used a 28mm f/1.8 lens @ f/2, ISO 1600 and 15 second exposure, and as you can see, the Milky Way is seen quite well after the details were brought out in Photoshop.</span></p><div data-dcnode-id="1560" id="fs_content_ad"></div><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">In short, it pays off to use an interesting foreground element to complement the Milky Way, so you should try to find something interesting to work with. And don’t let the moon stop you from taking great images of the Milky Way. If it is out and it is not too bright, you could use it to your advantage to illuminate foreground elements, or perhaps make it part of your final image.</span></p><h3 data-dcnode-id="1555"><span class="ez-toc-section" data-dcnode-id="1556" id="image-blending"><span data-dcnode-id="1557" instrument_node="">Image Blending</span></span></h3><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">Everything so far assumes that you are planning to capture high quality&nbsp;</span><i data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">single image</span></i><span data-dcnode-id="1551" instrument_node=""> photographs of the Milky Way. However, you can vastly extend the capabilities of your camera by blending together multiple photos.</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">There are four big techniques for image blending at night: time blends, star tracker blends, focus stacks, and image averaging.</span></p><h4 data-dcnode-id="1545"><span class="ez-toc-section" data-dcnode-id="1546" id="time-blends"><span data-dcnode-id="1547" instrument_node="">Time Blends</span></span></h4><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">A time blend involves taking multiple photos at different times of day (or night) and stitching them together in Photoshop. For Milky Way photography, time blending can be a good way to extend your depth of field.</span></p><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The method is quite simple. Take one photo shortly after sunset using a small aperture like f/11 to get substantial depth of field. Then, keep your tripod in the same spot until the Milky Way rises. Take a second photo at your usual astrophotography settings – say, f/1.8 and focused on the stars. Then, just blend the two images together in Photoshop.</span></p><div data-dcnode-id="1540" id="fs_content_ad"></div><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Here’s how it looks in practice. This first photo was taken at f/11, when there was still some light in the sky:</span></p><figure aria-describedby="caption-attachment-237678" class="wp-caption aligncenter" data-dcnode-id="1533" id="attachment_237678" style="width: 433px"><a class="fancybox image" data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1.jpg" rel="gallery" title="NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 138 seconds, f/11.0"><img alt="Milky Way Time Blend - BEFORE 1" class="size-legacy wp-image-237678 lazy" data-dcnode-id="1537" data-sizes="(max-width: 433px) 100vw, 433px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-433x650.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-1.jpg 1331w" height="650" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20433%20650'%3E%3C/svg%3E" width="433"></a><figcaption class="wp-caption-text" data-dcnode-id="1534" id="caption-attachment-237678"><span data-dcnode-id="1535" instrument_node="">NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 138 seconds, f/11.0</span></figcaption></figure><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">And the second photo was taken later in the evening:</span></p><figure aria-describedby="caption-attachment-237679" class="wp-caption aligncenter" data-dcnode-id="1526" id="attachment_237679" style="width: 433px"><a class="fancybox image" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2.jpg" rel="gallery" title="NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 25 seconds, f/1.8"><img alt="Milky Way Time Blend - BEFORE 2" class="size-legacy wp-image-237679 lazy" data-dcnode-id="1530" data-sizes="(max-width: 433px) 100vw, 433px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-433x650.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Time-Blend-BEFORE-2.jpg 1331w" height="650" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20433%20650'%3E%3C/svg%3E" width="433"></a><figcaption class="wp-caption-text" data-dcnode-id="1527" id="caption-attachment-237679"><span data-dcnode-id="1528" instrument_node="">NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 25 seconds, f/1.8</span></figcaption></figure><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Here’s the final blend:</span></p><figure aria-describedby="caption-attachment-237680" class="wp-caption aligncenter" data-dcnode-id="1519" id="attachment_237680" style="width: 640px"><a class="fancybox image" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way.jpg" rel="gallery" title="Two-image time blend"><img alt="Time Blend - Milky Way" class="size-medium wp-image-237680 lazy" data-dcnode-id="1523" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-640x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Time-Blend-Milky-Way.jpg 1333w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20960'%3E%3C/svg%3E" width="640"></a><figcaption class="wp-caption-text" data-dcnode-id="1520" id="caption-attachment-237680"><span data-dcnode-id="1521" instrument_node="">Two-image time blend</span></figcaption></figure><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Blending photos like this in Photoshop is quite easy. Just add the two layers to one document, add a layer mask to the top image, and use a soft brush to paint through to the layer below. It only takes a few minutes and isn’t prone to error.</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">However, it is highly important that you color correct both images before opening them in Photoshop. This way, the blend will look as natural as possible. Also, it’s best to shoot both images at the same ISO value so there is consistent noise across the frame.</span></p><h4 data-dcnode-id="1512"><span class="ez-toc-section" data-dcnode-id="1513" id="star-tracker"><span data-dcnode-id="1514" instrument_node="">Star Tracker</span></span></h4><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Similar to the previous method – but a way to get better image quality – is to photograph the Milky Way with a star tracker prior to blending.</span></p><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Star trackers follow the movement of the night sky, so you can use much longer shutter speeds than usual and maximize image quality. However, star trackers will cause a blurry foreground (because they can’t track the foreground and the stars simultaneously), so some time of blending in Photoshop becomes a necessity.</span></p><div data-dcnode-id="1507" id="fs_content_ad"></div><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">That’s how this photo was taken:</span></p><p data-dcnode-id="1502"><a class="fancybox image" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image.jpg" rel="gallery" title=""><img alt="Final Stacked Star Tracker Image" class="wp-image-174740 size-medium aligncenter lazy" data-dcnode-id="1504" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-640x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2019/07/Final-Stacked-Star-Tracker-Image.jpg 1365w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20960'%3E%3C/svg%3E" width="640"></a></p><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">It’s actually comprised of two individual frames, stitched together:</span></p><figure aria-describedby="caption-attachment-174739" class="wp-caption aligncenter" data-dcnode-id="1495" id="attachment_174739" style="width: 433px"><a class="fancybox image" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker.jpg" rel="gallery" title="NIKON Z 7 + NIKKOR Z 24-70mm f/4 S @ 24mm, ISO 64, 860 seconds, f/4.0"><img alt="Blurred Foreground Star Tracker" class="size-legacy wp-image-174739 lazy" data-dcnode-id="1499" data-sizes="(max-width: 433px) 100vw, 433px" data-src="https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-433x650.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2019/07/Blurred-Foreground-Star-Tracker.jpg 1365w" height="650" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20433%20650'%3E%3C/svg%3E" width="433"></a><figcaption class="wp-caption-text" data-dcnode-id="1496" id="caption-attachment-174739"><span data-dcnode-id="1497" instrument_node="">NIKON Z 7 + NIKKOR Z 24-70mm f/4 S @ 24mm, ISO 64, 860 seconds, f/4.0</span></figcaption></figure><figure aria-describedby="caption-attachment-174741" class="wp-caption aligncenter" data-dcnode-id="1490" id="attachment_174741" style="width: 433px"><a class="fancybox image" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker.jpg" rel="gallery" title="NIKON Z 7 + NIKKOR Z 24-70mm f/4 S @ 68mm, ISO 400, 294 seconds, f/4.0"><img alt="Sharp Foreground without Star Tracker" class="size-legacy wp-image-174741 lazy" data-dcnode-id="1494" data-sizes="(max-width: 433px) 100vw, 433px" data-src="https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-433x650.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-640x960.jpg 640w, https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-768x1152.jpg 768w, https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker-1024x1536.jpg 1024w, https://photographylife.com/wp-content/uploads/2019/07/Sharp-Foreground-without-Star-Tracker.jpg 1365w" height="650" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20433%20650'%3E%3C/svg%3E" width="433"></a><figcaption class="wp-caption-text" data-dcnode-id="1491" id="caption-attachment-174741"><span data-dcnode-id="1492" instrument_node="">NIKON Z 7 + NIKKOR Z 24-70mm f/4 S @ 68mm, ISO 400, 294 seconds, f/4.0</span></figcaption></figure><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">The image quality from this method is extremely high. Here’s a crop from the final result:</span></p><p data-dcnode-id="1485"><a class="fancybox image" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop.jpg" rel="gallery" title=""><img alt="Star Tracker Sharpness Crop" class="aligncenter size-medium wp-image-174743 lazy" data-dcnode-id="1487" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-960x640.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-960x640.jpg 960w, https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-768x512.jpg 768w, https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-1536x1024.jpg 1536w, https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop-650x433.jpg 650w, https://photographylife.com/wp-content/uploads/2019/07/Star-Tracker-Sharpness-Crop.jpg 1913w" height="640" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20960%20640'%3E%3C/svg%3E" width="960"></a></p><h4 data-dcnode-id="1482"><span class="ez-toc-section" data-dcnode-id="1483" id="focus-stacking"><span data-dcnode-id="1484" instrument_node="">Focus Stacking</span></span></h4><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">If you want to extend your depth of field at night, you may be tempted to use the same “focus stacking” method that is relatively common among landscape photographers during the day. Essentially, you use the same Milky Way photography settings as usual, but you gradually shift your point of focus from the foreground to the stars. Then, use software like Helicon Focus or Photoshop to merge a sharp image from front to back.</span></p><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">This image is a focus stack made up of sixteen individual exposures:</span></p><figure aria-describedby="caption-attachment-237677" class="wp-caption aligncenter" data-dcnode-id="1473" id="attachment_237677" style="width: 639px"><a class="fancybox image" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack.jpg" rel="gallery" title="16-image focus stack. NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 25 seconds, f/1.8"><img alt="Milky Way Focus Stack" class="size-medium wp-image-237677 lazy" data-dcnode-id="1477" data-sizes="(max-width: 639px) 100vw, 639px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-639x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Milky-Way-Focus-Stack.jpg 1331w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20639%20960'%3E%3C/svg%3E" width="639"></a><figcaption class="wp-caption-text" data-dcnode-id="1474" id="caption-attachment-237677"><span data-dcnode-id="1475" instrument_node="">16-image focus stack. NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 1600, 25 seconds, f/1.8</span></figcaption></figure><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Focus stacking is prone to errors if anything in your photo moves – even just plants in the wind – which is why it’s often not the best method of image blending at night. Even in the photo above, there are some strange blending artifacts that you may notice upon zooming in:</span></p><figure aria-describedby="caption-attachment-237683" class="wp-caption aligncenter" data-dcnode-id="1466" id="attachment_237683" style="width: 616px"><a class="fancybox image" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Focus-Stack-Artifact.jpg" rel="gallery" title="Note the irregular blur around the tree branch in this crop from the prior image."><img alt="Focus Stack Artifact" class="size-full wp-image-237683 lazy" data-dcnode-id="1470" data-sizes="(max-width: 616px) 100vw, 616px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Focus-Stack-Artifact.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Focus-Stack-Artifact.jpg 616w, https://photographylife.com/wp-content/uploads/2018/05/Focus-Stack-Artifact-300x200.jpg 300w, https://photographylife.com/wp-content/uploads/2018/05/Focus-Stack-Artifact-150x100.jpg 150w" height="410" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20616%20410'%3E%3C/svg%3E" width="616"></a><figcaption class="wp-caption-text" data-dcnode-id="1467" id="caption-attachment-237683"><span data-dcnode-id="1468" instrument_node="">Note the irregular blur around the tree branch in this crop from the prior image.</span></figcaption></figure><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">However, you may still consider doing a focus stack at night as backup to one of the other methods.</span></p><div data-dcnode-id="1463" id="fs_content_ad"></div><h4 data-dcnode-id="1460"><span class="ez-toc-section" data-dcnode-id="1461" id="image-averaging"><span data-dcnode-id="1462" instrument_node="">Image Averaging</span></span></h4><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">One final, popular method of image blending at night is called image averaging. This is when you take a large series of photos and average them together to reduce noise. You do this in specialized software that aligns the stars (without rotating the foreground) before blending the images together.</span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">This is a very helpful method of image blending that is quick and easy, with relatively low propensity for errors. It allows you to improve your image quality or extend depth of field, whichever you’re after for a particular image.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Here’s how the same scene looks taken with 33 individual photos at f/8 and ISO 51,200, then averaged together:</span></p><figure aria-describedby="caption-attachment-237676" class="wp-caption aligncenter" data-dcnode-id="1449" id="attachment_237676" style="width: 639px"><a class="fancybox image" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final.jpg" rel="gallery" title="Image average of 33 individual photos"><img alt="Image Averaging Milky Way Final" class="size-medium wp-image-237676 lazy" data-dcnode-id="1453" data-sizes="(max-width: 639px) 100vw, 639px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-639x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Milky-Way-Final.jpg 1331w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20639%20960'%3E%3C/svg%3E" width="639"></a><figcaption class="wp-caption-text" data-dcnode-id="1450" id="caption-attachment-237676"><span data-dcnode-id="1451" instrument_node="">Image average of 33 individual photos</span></figcaption></figure><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Not bad! By comparison, here’s one of the individual frames from the blend:</span></p><figure aria-describedby="caption-attachment-237675" class="wp-caption aligncenter" data-dcnode-id="1442" id="attachment_237675" style="width: 639px"><a class="fancybox image" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky.jpg" rel="gallery" title="NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 51200, 25 seconds, f/8.0"><img alt="Image Averaging Individual Photo Night Sky" class="size-medium wp-image-237675 lazy" data-dcnode-id="1446" data-sizes="(max-width: 639px) 100vw, 639px" data-src="https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-639x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2018/05/Image-Averaging-Individual-Photo-Night-Sky.jpg 1331w" height="960" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20639%20960'%3E%3C/svg%3E" width="639"></a><figcaption class="wp-caption-text" data-dcnode-id="1443" id="caption-attachment-237675"><span data-dcnode-id="1444" instrument_node="">NIKON Z 6 + 20mm f/1.8 @ 20mm, ISO 51200, 25 seconds, f/8.0</span></figcaption></figure><p data-dcnode-id="1434"><span data-dcnode-id="1441" instrument_node="">This is not a method that is possible to do natively in Photoshop. Instead, you must use software like </span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/starrylandscapestacker/home" rel="noopener" target="_blank"><span data-dcnode-id="1440" instrument_node="">Starry Landscape Stacker</span></a><span data-dcnode-id="1438" instrument_node=""> (Mac) or </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/sequatorglobal/" rel="noopener" target="_blank"><span data-dcnode-id="1437" instrument_node="">Sequator</span></a><span data-dcnode-id="1435" instrument_node=""> (Windows). Not all of this software is free, but it’s generally less than $50. Because of the flexibility and excellent results of image averaging, it’s our top recommendation of these four methods.</span></p><div data-dcnode-id="1433" id="fs_content_ad"></div><h3 data-dcnode-id="1430"><span class="ez-toc-section" data-dcnode-id="1431" id="post-processing"><span data-dcnode-id="1432" instrument_node="">Post-Processing</span></span></h3><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Post-processing is a big part of astrophotography, because your camera will capture a low-contrast sky that needs some work. This means that you will need to play with different settings to bring out the details, increase contrast and colors. Take a quick look at the “before and after” shots of the first image above:</span></p><figure aria-describedby="caption-attachment-73227" class="wp-caption aligncenter" data-dcnode-id="1423" id="attachment_73227" style="width: 960px"><a class="fancybox image" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2012/02/Before-and-After.jpg" rel="gallery" title="Left: Straight Out of Camera, Right: After Post-Processing"><img alt="Before and After" class="size-medium wp-image-73227 lazy" data-dcnode-id="1427" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://photographylife.com/wp-content/uploads/2012/02/Before-and-After-960x721.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2012/02/Before-and-After-960x721.jpg 960w, https://photographylife.com/wp-content/uploads/2012/02/Before-and-After-300x225.jpg 300w, https://photographylife.com/wp-content/uploads/2012/02/Before-and-After-768x577.jpg 768w, https://photographylife.com/wp-content/uploads/2012/02/Before-and-After-650x488.jpg 650w, https://photographylife.com/wp-content/uploads/2012/02/Before-and-After.jpg 1024w" height="721" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20960%20721'%3E%3C/svg%3E" width="960"></a><figcaption class="wp-caption-text" data-dcnode-id="1424" id="caption-attachment-73227"><span data-dcnode-id="1425" instrument_node="">Left: Straight Out of Camera, Right: After Post-Processing</span></figcaption></figure><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">The picture on the left is what the camera captured and the picture on the right is what I made it look like after some adjustments in Photoshop. Hard to believe that so much more detail can be brought out from images, but it actually did not take me long to get there. All I did was change white balance towards blues, then opened up the “Levels” tool in Photoshop and changed the sliders a bit to increase contrast and bring out the missing details:</span></p><p data-dcnode-id="1419"><img alt="Photoshop Levels" class="aligncenter size-full wp-image-73228 lazy" data-dcnode-id="1420" data-sizes="(max-width: 415px) 100vw, 415px" data-src="https://photographylife.com/wp-content/uploads/2012/02/Photoshop-Levels.png" data-srcset="https://photographylife.com/wp-content/uploads/2012/02/Photoshop-Levels.png 415w, https://photographylife.com/wp-content/uploads/2012/02/Photoshop-Levels-300x278.png 300w" height="385" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20415%20385'%3E%3C/svg%3E" width="415"></p><p data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">You can achieve similar results by playing with the Curves panel in Lightroom and you can bright out the details of the Milky Way by using the </span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/videos/how-to-use-the-adjustment-brush-in-lightroom"><span data-dcnode-id="1417" instrument_node="">Adjustment Brush</span></a><span data-dcnode-id="1415" instrument_node=""> and adding things like contrast and structure to it – just experiment a little! Once you are done, resize the image to the resolution you want, sharpen it up a tad (but don’t overdo it) and you should have a pretty presentable image of the Milky Way.</span></p><h3 data-dcnode-id="1411"><span class="ez-toc-section" data-dcnode-id="1412" id="learn-more"><span data-dcnode-id="1413" instrument_node="">Learn More!</span></span></h3><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">The above article is just an introduction on how to photograph the Milky Way. If you are willing to explore this subject in more detail, check out the below articles that we have previously published at Photography Life – there is a wealth of information there:</span></p><ol data-dcnode-id="1370"><span data-dcnode-id="1408" instrument_node=""> </span><li data-dcnode-id="1401"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/photographing-the-milky-way"><span data-dcnode-id="1407" instrument_node="">Photographing the Milky Way – A Detailed Guide</span></a><span data-dcnode-id="1405" instrument_node="">: Our good friend </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galleries.aaronpriestphoto.com/"><span data-dcnode-id="1404" instrument_node="">Aaron Priest</span></a><span data-dcnode-id="1402" instrument_node=""> did a phenomenal job writing one of the most detailed and comprehensive articles on Milky Way Photography.</span></li><span data-dcnode-id="1400" instrument_node=""> </span><li data-dcnode-id="1396"><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/how-to-focus-for-star-photography"><span data-dcnode-id="1399" instrument_node="">How to Focus for Star Photography</span></a><span data-dcnode-id="1397" instrument_node="">: Spencer did a great job explaining in detail how to properly focus at night when photographing the stars.</span></li><span data-dcnode-id="1395" instrument_node=""> </span><li data-dcnode-id="1391"><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/an-easy-way-to-compose-landscape-photos-at-night"><span data-dcnode-id="1394" instrument_node="">An Easy Way to Compose Landscape Photos at Night</span></a><span data-dcnode-id="1392" instrument_node="">: Another great article by Spencer that shows a quick and easy way to compose images at night by bumping up the camera’s ISO.</span></li><span data-dcnode-id="1390" instrument_node=""> </span><li data-dcnode-id="1386"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/what-makes-a-good-night-photography-lens"><span data-dcnode-id="1389" instrument_node="">What Makes a Good Night Photography Lens?</span></a><span data-dcnode-id="1387" instrument_node="">: If you are wondering about what lenses work best for astrophotography, check out this detailed guide – there is a wealth of information there.</span></li><span data-dcnode-id="1385" instrument_node=""> </span><li data-dcnode-id="1381"><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/how-to-get-enough-depth-of-field-for-landscapes-at-night"><span data-dcnode-id="1384" instrument_node="">How to Get Enough Depth of Field for Landscapes at Night</span></a><span data-dcnode-id="1382" instrument_node="">: If you are struggling with depth of field issues at night, this is the article you should definitely read.</span></li><span data-dcnode-id="1380" instrument_node=""> </span><li data-dcnode-id="1376"><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/photographing-milky-way-bow"><span data-dcnode-id="1379" instrument_node="">How to Photograph the Milky Way Bow</span></a><span data-dcnode-id="1377" instrument_node="">: A great article by our reader Steve Paxton on doing Milky Way panoramas.</span></li><span data-dcnode-id="1375" instrument_node=""> </span><li data-dcnode-id="1371"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/landscapes/astrophotography-tutorial"><span data-dcnode-id="1374" instrument_node="">Astrophotography Tutorial</span></a><span data-dcnode-id="1372" instrument_node="">: If you want to explore deep sky photography to take pictures of distant planets and nebulas, this piece by Wei-Hao Wang is a must-read.</span></li></ol><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Hope this article gives some guidance to those who want to experiment with photographing the stars and the Milky Way. If you have any questions, please feel free to ask us in the comments section below!</span></p></div><footer class="entry-footer" data-dcnode-id="1239"><div align="center" data-dcnode-id="1362" id="PhotographyLife_300x250_728x90_320x50_EndOfPosts"><span data-dcnode-id="1366" instrument_node=""> </span><span data-dcnode-id="1363" instrument_node=""> </span></div><section class="yikes-mailchimp-container yikes-mailchimp-container-2" data-dcnode-id="1317" id="yikes-mailchimp-container-2"><h3 class="yikes-mailchimp-form-title yikes-mailchimp-form-title-2" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Subscribe to Our Newsletter</span></h3><section class="yikes-mailchimp-form-description yikes ata-dcnode-id="952"></i><span data-dcnode-id="951" instrument_node=""> Reply to&nbsp; </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23comment-295061"><span data-dcnode-id="950" instrument_node=""> Ahmet Anak </span></a></div><div class="wpd-comment-date" data-dcnode-id="944" title="October 24, 2020 7:19 am"><span data-dcnode-id="947" instrument_node=""> </span><i aria-hidden="true" class="far fa-clock" data-dcnode-id="946"></i><span data-dcnode-id="945" instrument_node=""> October 24, 2020 7:19 am</span></div></div></div></div><div class="wpd-comment-text" data-dcnode-id="938"><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">It would be determined by the focal length you used. 30mm would be half the shutter speed of 15mm for example. If you have the PhotoPills app on your smartphone, check out the “Spot Stars” feature. It shows both the old 500 Rule and the much more accurate and newer NPF Rule. I’d recommend the NPF Rule if you want sharper stars and larger prints. But the 500 Rule is easy to start out with and it’s easy to calculate in your head too.</span></p></div><div class="wpd-comment-footer" data-dcnode-id="915"><div class="wpd-vote" data-dcnode-id="925"><div class="wpd-vote-up wpd_not_clicked" data-dcnode-id="933"><span data-dcnode-id="937" instrument_node=""> </span><svg data-dcnode-id="934" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="936" fill="none"></path><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" data-dcnode-id="935"></path></svg></div><div class="wpd-vote-result" data-dcnode-id="931" title="0"><span data-dcnode-id="932" instrument_node="">0</span></div><div class="wpd-vote-down wpd_not_clicked" data-dc
