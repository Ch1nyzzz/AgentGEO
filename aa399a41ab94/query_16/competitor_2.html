-dcnode-id="897"><div class="wpd-uinfo-top" data-dcnode-id="903"><div class="wpd-comment-author" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node=""> Aaron D. Priest</span></div><div class="wpd-space" data-dcnode-id="904"></div></div><div class="wpd-uinfo-bottom" data-dcnode-id="898"><div class="wpd-comment-date" data-dcnode-id="899" title="April 23, 2019 8:01 am"><span data-dcnode-id="902" instrument_node=""> </span><i aria-hidden="true" class="far fa-clock" data-dcnode-id="901"></i><span data-dcnode-id="900" instrument_node=""> April 23, 2019 8:01 am</span></div></div></div></div><div class="wpd-comment-text" data-dcnode-id="893"><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">This article was more about wide angle landscape astrophotography where a tracking mount is not necessary, not deep space astrophotography. Of course, you’ll always get cleaner images with a tracker since shutter speed is not as limited for sharp stars, and you can use a lower ISO, but the post-processing becomes more challenging as well, blending in an untracked foreground with a tracked sky.</span></p></div><div class="wpd-comment-footer" data-dcnode-id="870"><div class="wpd-vote" data-dcnode-id="880"><div class="wpd-vote-up wpd_not_clicked" data-dcnode-id="888"><span data-dcnode-id="892" instrument_node=""> </span><svg data-dcnode-id="889" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="891" fill="none"></path><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" data-dcnode-id="890"></path></svg></div><div class="wpd-vote-result" data-dcnode-id="886" title="0"><span data-dcnode-id="887" instrument_node="">0</span></div><div class="wpd-vote-down wpd_not_clicked" data-dcnode-id="881"><span data-dcnode-id="885" instrument_node=""> </span><svg data-dcno ding on my breaks at work from this website. Thank you.</span></p></div><div class="wpd-comment-footer" data-dcnode-id="384"><div class="wpd-vote" data-dcnode-id="397"><div class="wpd-vote-up wpd_not_clicked" data-dcnode-id="405"><span data-dcnode-id="409" instrument_node=""> </span><svg data-dcnode-id="406" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="408" fill="none"></path><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" data-dcnode-id="407"></path></svg></div><div class="wpd-vote-result" data-dcnode-id="403" title="0"><span data-dcnode-id="404" instrument_node="">0</span></div><div class="wpd-vote-down wpd_not_clicked" data-dcnode-id="398"><span data-dcnode-id="402" instrument_node=""> </span><svg data-dcnode-id="399" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0z" data-dcnode-id="401" fill="none"></path><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z" data-dcnode-id="400"></path></svg></div></div><div class="wpd-reply-button" data-dcnode-id="389"><span data-dcnode-id="396" instrument_node=""> </span><svg data-dcnode-id="393" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z" data-dcnode-id="395"></path><path d="M0 0h24v24H0z" data-dcnode-id="394" fill="none"></path></svg><span data-dcnode-id="392" instrument_node=""> </span><span data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Reply</span></span></div><div class="wpd-space" data-dcnode-id="388"></div><div class="wpd-toggle wpd-hidden wpd_not_clicked" data-dcnode-id="385" wpd-tooltip="Hide Replies"><span data-dcnode-id="387" instrument_node=""> </span><i class="fas fa-chevron-up" data-dcnode-id="386"></i></div></div></div></div><div data-dcnode-id="381" id="wpdiscuz_form_anchor-234151_0"></div><div class="wpd-comment wpd-reply wpd_comment_level-2" data-dcnode-id="331" id="wpd-comm-234154_234151"><div class="wpd-comment-wrap wpd-blog-user wpd-blog-contributor" data-dcnode-id="333"><div class="wpd-comment-right" data-dcnode-id="334" id="comment-234154"><div class="wpd-comment-header" data-dcnode-id="361"><div class="wpd-avatar" data-dcnode-id="378"><span data-dcnode-id="380" instrument_node=""> </span><img alt="Aaron D. Priest" class="avatar avatar-64 photo lazy" data-dcnode-id="379" data-src="https://secure.gravatar.com/avatar/d3aa839729d6167d0b719a0b298cc619?s=64&amp;d=mm&amp;r=g" data-srcset="https://secure.gravatar.com/avatar/d3aa839729d6167d0b719a0b298cc619?s=128&amp;d=mm&amp;r=g 2x" height="64" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3C/svg%3E" width="64"></div><div class="wpd-user-info" data-dcnode-id="362"><div class="wpd-uinfo-top" data-dcnode-id="374"><div class="wpd-comment-author" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node=""> Aaron D. Priest</span></div><div class="wpd-space" data-dcnode-id="375"></div></div><div class="wpd-uinfo-bottom" data-dcnode-id="363"><div class="wpd-reply-to" data-dcnode-id="368"><span data-dcnode-id="373" instrument_node=""> </span><i class="far fa-comments" data-dcnode-id="372"></i><span data-dcnode-id="371" instrument_node=""> Reply to&nbsp; </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed%23comment-234151"><span data-dcnode-id="370" instrument_node=""> Paul Jimenez </span></a></div><div class="wpd-comment-date" data-dcnode-id="364" title="March 10, 2017 9:13 am"><span data-dcnode-id="367" instrument_node=""> </span><i aria-hidden="true" class="far fa-clock" data-dcnode-id="366"></i><span data-dcnode-id="365" instrument_node=""> March 10, 2017 9:13 am</span></div></div></div></div><div class="wpd-comment-text" data-dcnode-id="358"><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">The 500/600 rule will fall apart pretty quick, it was engineered for 35mm film grain at higher ISOs, not the pixel density of today’s digital sensors. On your E-M5 Mark II with a 25mm f/1.8 you’d have a maximum shutter speed of about 7 seconds before stars would start trailing in the corners. You could try pushing that to 10 seconds and see if it’s acceptable, especially if you aren’t printing 20 x 30 or larger. Probably at 15 seconds you won’t see sharp stars anymore. Depends where you are pointing in the sky of course, and your latitude on Earth.</span></p></div><div class="wpd-comment-footer" data-dcnode-id="335"><div class="wpd-vote" data-dcnode-id="345"><div class="wpd-vote-up wpd_not_clicked" data-dcnode-id="353"><span data-dcnode-id="357" instrument_node=""> </span><svg data-dcnode-id="354" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0V0z" data-dcnode-id="356" fill="none"></path><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" data-dcnode-id="355"></path></svg></div><div class="wpd-vote-result wpd-up" data-dcnode-id="351" title="1"><span data-dcnode-id="352" instrument_node="">1</span></div><div class="wpd-vote-down wpd_not_clicked" data-dcnode-id="346"><span data-dcnode-id="350" instrument_node=""> </span><svg data-dcnode-id="347" viewBox="0 0 24 24" xmlns="https://www.w3.org/2000/svg"><path d="M0 0h24v24H0z" data-dcnode-id="349" fill="none"></path><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.
