ener noreferrer" target="_blank" title="Share on Facebook"></a></li><span data-dcnode-id="2378" instrument_node=""> </span><li data-dcnode-id="2376"><a class="twitter bt" data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Fvia%3DKillerPhotoTips%26text%3DHow%2Bto%2BPhotograph%2Bthe%2BMilky%2BWay%26url%3Dhttps%253A%252F%252Fphotographylife.com%252Flandscapes%252Fhow-to-photograph-the-milky-way" rel="nofollow noopener noreferrer" target="_blank" title="Share on Twitter"></a></li><span data-dcnode-id="2375" instrument_node=""> </span><li data-dcnode-id="2373"><a class="pinterest bt nolightbox" data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fphotographylife.com%252Flandscapes%252Fhow-to-photograph-the-milky-way%26media%3Dhttps%253A%252F%252Fphotographylife.com%252Fwp-content%252Fuploads%252F2012%252F02%252FArches-Night-Sky-by-Tom-Redd.jpg%26description%3DHow%2Bto%2BPhotograph%2Bthe%2BMilky%2BWay" rel="nofollow noopener noreferrer" target="_blank" title="Share on Pinterest"></a></li><span data-dcnode-id="2372" instrument_node=""> </span><li data-dcnode-id="2370"><a class="reddit bt" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/submit%3Furl%3Dhttps%253A%252F%252Fphotographylife.com%252Flandscapes%252Fhow-to-photograph-the-milky-way%26title%3DHow%2Bto%2BPhotograph%2Bthe%2BMilky%2BWay" rel="nofollow noopener noreferrer" target="_blank" title="Share on Reddit"></a></li></ul></div><p class="entry-meta" data-dcnode-id="2355"><span data-dcnode-id="2367" instrument_node="">By </span><a class="entry-author-link" data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/author/megaz" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="2365" itemprop="name"><span data-dcnode-id="2366" instrument_node="">Nasim Mansurov</span></span></a><span data-dcnode-id="2363" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="2360"><a data-dcnode-id="2361" href="#comments"><span data-dcnode-id="2362" instrument_node="">129 Comments</span></a></span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node="">Last Updated On </span><time class="entry-time" data-dcnode-id="2356" datetime="2020-12-28" itemprop="dateModified"><span data-dcnode-id="2357" instrument_node="">December 28, 2020</span></time></p></header><div class="entry-content" data-dcnode-id="1367"><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Many travel and landscape photographers, including myself, try to avoid shooting scenery with a clear blue sky. As much as we like seeing puffy or stormy clouds to spice up our photographs, we have no control over what nature provides each day. Sometimes we get lucky and capture beautiful sunrises and sunsets with blood red skies, and other times we are stuck with a clear, boring sky. When I find myself in such a situation and I know that the next morning will be clear, I sometimes explore opportunities to photograph the stars and the Milky Way at night. I am sure you have been in situations where you got out at night in a remote location and saw an incredibly beautiful night sky with millions of stars shining right at you, with patches of stars in a “cloudy” formation that are a part of the Milky Way. If you do not know how to photograph the night sky and the Milky Way, this guide might help you in understanding the basics.</span></p><figure aria-describedby="caption-attachment-73220" class="wp-caption aligncenter" data-dcnode-id="2346" id="attachment_73220" style="width: 639px"><a class="fancybox image" data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov.jpg" rel="gallery" title="NIKON D3S + 24mm f/1.4 @ 24mm, ISO 1600, 20 seconds, f/1.4"><img alt="Milky Way" class="size-medium wp-image-73220 lazy error" data-dcnode-id="2350" data-sizes="(max-width: 639px) 100vw, 639px" data-src="https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-639x960.jpg" data-srcset="https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov.jpg 1363w" data-was-processed="true" height="960" sizes="(max-width: 639px) 100vw, 639px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-639x960.jpg&amp;raw" srcset="https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-639x960.jpg 639w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-200x300.jpg 200w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-768x1154.jpg 768w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-1022x1536.jpg 1022w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov-433x650.jpg 433w, https://photographylife.com/wp-content/uploads/2012/02/Milky-Way-by-Nasim-Mansurov.jpg 1363w" width="639"></a><figcaption class="wp-caption-text" data-dcnode-id="2347" id="caption-attachment-73220"><span data-dcnode-id="2348" instrument_node="">NIKON D3S + 24mm f/1.4 @ 24mm, ISO 1600, 20 seconds, f/1.4</span></figcaption></figure><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">In this article, we will only go over the basics, because astrophotography can get very complex, especially for capturing deep space photos of nebulas, constellations and star systems. Some photographers utilize telescopes, specialized robotic heads with ultra-precision and CCD cameras specifically created for astrophotography worth tens of thousands of dollars, to create amazingly beautiful photographs that are extremely hard or even impossible to capture with a regular digital camera. I will skip through these complex topics and rather focus on what you can capture with a camera you already own, whether it is a DSLR, a mirrorless camera or even an advanced point and shoot.</span></p><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Here is a quick summary of how you can photograph the Milky Way:</span></p><ol data-dcnode-id="2320"><span data-dcnode-id="2341" instrument_node=""> </span><li data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Understand the capabilities of your camera gear</span></li><span data-dcnode-id="2338" instrument_node=""> </span><li data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Consider light pollution and scout for a dark area</span></li><span data-dcnode-id="2335" instrument_node=""> </span><li data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Use proper night focusing techniques</span></li><span data-dcnode-id="2332" instrument_node=""> </span><li data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Use the right camera settings</span></li><span data-dcnode-id="2329" instrument_node=""> </span><li data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Consider foreground elements for better composition</span></li><span data-dcnode-id="2326" instrument_node=""> </span><li data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Capture the Milky Way</span></li><span data-dcnode-id="2323" instrument_node=""> </span><li data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Post-process the Milky Way</span></li></ol><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">If you’re more of a visual learner, you may want to watch the following video course that our writer Spencer Cox created on photographing the Milky Way:</span></p><div class="video-container" data-dcnode-id="1799"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1800" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/IzBiWCPLw4A%3Ffeature%3Doembed&amp;raw" title="Milky Way Photography Tutorial - Definitive Guide to Astrophotography" width="500"><html data-cast-api-enabled="true" data-dcnode-id="1802" dir="ltr" lang="en"><head data-dcnode-id="2292"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="2312" name="viewport"/><link data-dcnode-id="2307" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="TqkI5bfK6DEbwyvpU7TzdA" rel="stylesheet"/><title data-dcnode-id="2294">YouTube</title><link data-dcnode-id="2293" href="https://www.youtube.com/watch?v=IzBiWCPLw4A" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="1803" dir="ltr"><div data-dcnode-id="1810" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="1811" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html
