</span><h2 class="post-title" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">How to Photograph the Milky Way</span></h2><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="985" instrument_node="">To photograph the Milky Way with a DSLR camera effectively, you need to take long-exposure images using a moderately </span><span data-dcnode-id="982" style="color: #0000ff;"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/iso-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="984" instrument_node="">high ISO setting</span></a></span><span data-dcnode-id="981" instrument_node="">, and the maximum aperture of your lens. This will reveal more of the structure and color of the Milky Way galaxy in a single image.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="978" instrument_node="">These are not hard and fast rules, of course. Like all experiences in </span><span data-dcnode-id="975" style="color: #0000ff;"><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/7-astrophotography-tips/" style="color: #0000ff;"><span data-dcnode-id="977" instrument_node="">astrophotography</span></a></span><span data-dcnode-id="974" instrument_node="">, subtle changes to your camera settings and approach can make a big difference.&nbsp;</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">A good starting point is to take 30-second exposures at ISO 1600, using an f-stop of F/2.8.</span></strong><span data-dcnode-id="969" instrument_node=""> By combining multiple images together (stacking), you can create images of the Milky Way with an even stronger signal (the amount of light collected) and reduced noise.&nbsp;</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965" style="text-align: center;"><img alt="Milky Way Photography Tips" class="alignnone size-full wp-image-18029" data-dcnode-id="966" height="750" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/milky-way-photography-tips.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-photography-tips.jpg 600w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-photography-tips-436x545.jpg 436w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-photography-tips-150x188.jpg 150w" width="600"></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="960" style="text-align: center;"><strong data-dcnode-id="961"><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The Milky Way Core rising in mid-July. Camera and Lens on Star Tracker.</span></em></strong></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The Milky Way is the galaxy that contains our Solar System. From our vantage point on Earth, we see it as a noticeable band of light stretching across the night sky.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Usually, when people talk about photographing the Milky Way, they are referring to the dense core of the galaxy towards the constellation Sagittarius.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Observers living in the southern hemisphere have the luxury of seeing this bright core high above their heads in the night sky. Don’t believe me? Look at the position of the Milky Way core in July from my location in Canada vs. Melbourne, Australia.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="947" style="text-align: center;"><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way.jpg" rel="noopener" target="_blank"><img alt="position of the milky way" class="aligncenter wp-image-18035" data-dcnode-id="949" height="294" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way.jpg 2100w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-545x247.jpg 545w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-1024x463.jpg 1024w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-768x347.jpg 768w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-1536x695.jpg 1536w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-2048x926.jpg 2048w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-688x311.jpg 688w, https://astrobackyard.com/wp-content/uploads/2021/07/best-time-to-see-milky-way-150x68.jpg 150w" width="650"></a></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="942" style="text-align: center;"><strong data-dcnode-id="943"><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">The Milky Way core from the Northern Hemisphere vs. Southern Hemisphere.</span></em></strong></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">As you can see, the farther north your latitude is, the less Milky Way core you will be able to see.&nbsp;</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">However, the plane of the Milky Way stretches across the sky into northern constellations as well. The photo below shows the Cygnus region of the Milky Way along with many other northern constellations such as Cepheus.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">This region of the Milky Way is quite beautiful in its own, unique way.&nbsp;</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930" style="text-align: center;"><img alt="Cygnus region of the Milky Way" class="alignnone size-full wp-image-18031" data-dcnode-id="931" height="414" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/cygnus-region-of-milky-way.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/cygnus-region-of-milky-way.jpg 650w, https://astrobackyard.com/wp-content/uploads/2021/07/cygnus-region-of-milky-way-545x347.jpg 545w, https://astrobackyard.com/wp-content/uploads/2021/07/cygnus-region-of-milky-way-150x96.jpg 150w" width="650"></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="925" style="text-align: center;"><strong data-dcnode-id="926"><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The “Backbone” of the Milky Way.</span></em></strong></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="923" instrument_node="">From my latitude in the northern hemisphere, the Milky Way core is only observable between the months of April to September. To photograph it in its full glory, I also need to travel to a dark sky location during the new moon phase. It’s possible to see the Milky Way from a </span><span data-dcnode-id="920" style="color: #0000ff;"><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/light-pollution/" style="color: #0000ff;"><span data-dcnode-id="922" instrument_node="">light-polluted</span></a></span><span data-dcnode-id="919" instrument_node=""> city, but it is very faint, and difficult to photograph.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">I also use a star tracker to compensate for the apparent rotation of the night sky. This allows me to take long exposure images free of star trailing, and collect deep details of the Milky Way. The star tracker I recommend for Milky Way photography is the Sky-Watcher Star Adventurer.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="911" style="text-align: center;"><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/staradventurer" rel="noopener" target="_blank"><img alt="Sky-Watcher Star Adventurer 2i" class="aligncenter wp-image-16537 size-full" data-dcnode-id="913" height="328" loading="lazy" sizes="(max-width: 381px) 100vw, 381px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/12/sky-watcher-star-adventurer-2i.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/12/sky-watcher-star-adventurer-2i.jpg 381w, https://astrobackyard.com/wp-content/uploads/2020/12/sky-watcher-star-adventurer-2i-150x129.jpg 150w" width="381"></a></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="906" style="text-align: center;"><strong data-dcnode-id="907"><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">I recommend the Sky-Watcher Star Adventurer for Milky Way Photography.&nbsp;</span></em></strong></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">In the following post, I’ll describe my experiences photographing the Milky Way with a DSLR camera. I’ll share the camera settings used, and specific astrophotography tips to help you capture your own image of this natural wonder.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900" style="text-align: center;"><img alt="Milky Way photography" class="aligncenter wp-image-12779 size-full" data-dcnode-id="901" height="650" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2019/07/milky-way-photography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2019/07/milky-way-photography.jpg 650w, https://astrobackyard.com/wp-content/uploads/2019/07/milky-way-photography-150x150.jpg 150w, https://astrobackyard.com/wp-content/uploads/2019/07/milky-way-photography-545x545.jpg 545w, https://astrobackyard.com/wp-content/uploads/2019/07/milky-way-photography-50x50.jpg 50w" width="650"></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="895" style="text-align: center;"><strong data-dcnode-id="896"><em data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">The Milky Way captured using a Canon Rebel DSLR and a Rokinon 14mm F/2.8 lens.</span></em></strong></p><span data-dcnode-id="894" instrument_node="">
</span><h1 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">How to Photograph the Milky Way</span></h1><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Have you ever tried to photograph the Milky Way with your DSLR camera? &nbsp;It’s no secret that your digital camera can record much more light than your eyes can see. For this reason, amateur photographers can create incredibly detailed portraits of the Milky Way Galaxy using modest equipment.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">All you need is a DSLR camera capable of shooting in manual mode, and an entry-level camera lens. An entry-level DSLR camera and kit lens is a great starting point. such as the Canon EOS Rebel T7 is a great starting point.&nbsp;</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">An entry-level camera kit will allow you to explore long-exposure astrophotography, and experience the incredible amount of light you can record in the night sky.&nbsp;</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="879" style="text-align: center;"><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/05/milky-way-photography.jpg" rel="noopener" target="_blank"><img alt="milky way photography" class="aligncenter wp-image-17587" data-dcnode-id="881" height="808" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/05/milky-way-photography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/05/milky-way-photography.jpg 654w, https://astrobackyard.com/wp-content/uploads/2021/05/milky-way-photography-405x545.jpg 405w, https://astrobackyard.com/wp-content/uploads/2021/05/milky-way-photography-150x202.jpg 150w" width="600"></a></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="874" style="text-align: center;"><strong data-dcnode-id="875"><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The Milky Way. Canon EOS Ra with a Sigma 24mm F/1.4 Lens</span></em></strong></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Before I go any further, I want to properly set your expectations. My first images of the Milky Way did not look like this, largely because I was shooting in heavily light-polluted skies. The photo above uses 4 strategies to create an impressive photo of the Milky Way:</span></p><span data-dcnode-id="870" instrument_node="">
</span><ul data-dcnode-id="848"><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="868" instrument_node="">A tracking camera mount (</span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/staradventurer" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="866" style="color: #0000ff;"><span data-dcnode-id="867" instrument_node="">Sky-Watcher Star Adventurer</span></span></a><span data-dcnode-id="864" instrument_node="">)</span></li><span data-dcnode-id="862" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="861" instrument_node="">A “fast” camera lens (</span><span data-dcnode-id="858" style="color: #0000ff;"><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3g6129t" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="860" instrument_node="">Sigma 24mm F/1.4</span></a></span><span data-dcnode-id="857" instrument_node="">)</span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Long-exposure images (30-seconds) to collect more signal in a single frame</span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Image stacking to improve the signal-to-noise ratio (Photoshop)</span></li><span data-dcnode-id="849" instrument_node="">
</span></ul><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="846" instrument_node="">I’ll cover each of these aspects in this article. A </span><span data-dcnode-id="843" style="color: #0000ff;"><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/star-tracker-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="845" instrument_node="">star tracker</span></a></span><span data-dcnode-id="842" instrument_node=""> that compensates for Earth’s rotation is not necessary for success, but it will help pull in more light in a single exposure without star trailing.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="839" instrument_node="">It gives you more flexibility in the camera settings you choose to shoot the Milky Way, as you can now offset higher ISO settings and low f-stops with longer exposures that use a lower ISO, and slower aperture.</span><img alt="iOptron SkyTracker" class="aligncenter size-full wp-image-7821" data-dcnode-id="838" height="491" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2017/11/wide-angle-camera-lens-astrophotography.jpg&amp;raw" width="400"></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="832" style="text-align: center;"><strong data-dcnode-id="833"><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">The iOptron SkyTracker Pro Camera Mount.</span></em></strong></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">The biggest advantage a tracking camera mount has over a stationary tripod is the ability to shoot exposures well past 30-seconds. When the star tracker has been properly polar-aligned, images of 2-minutes or more in length are possible (depending on your focal length).</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="822" style="text-align: left;"><span data-dcnode-id="827" instrument_node="">Images that have been captured under dark moonless skies will reveal the individual nebulae and star clusters within the Milky Way galaxy. Certain Messier objects, such as M8, M17, and M20 become obvious glowing pink regions of </span><span data-dcnode-id="824" style="color: #0000ff;"><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/sagittarius-constellation/" style="color: #0000ff;"><span data-dcnode-id="826" instrument_node="">Sagittarius</span></a></span><span data-dcnode-id="823" instrument_node="">.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="820" instrument_node="">The Milky Way doesn’t just mean the Core of our galaxy, it extends beyond Sagittarius towards the </span><span data-dcnode-id="817" style="color: #0000ff;"><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/cygnus-constellation/" style="color: #0000ff;"><span data-dcnode-id="819" instrument_node="">constellation Cygnus</span></a></span><span data-dcnode-id="816" instrument_node=""> the swan. This area of the Milky Way is less dense but contains some of my favorite deep sky objects within it.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="813" instrument_node="">The photo below showcases the Milky Way and the Great Rift in the direction of Cygnus. The </span><span data-dcnode-id="810" style="color: #0000ff;"><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/the-summer-triangle/" style="color: #0000ff;"><span data-dcnode-id="812" instrument_node="">Summer Triangle</span></a></span><span data-dcnode-id="809" instrument_node=""> also stands out prominently in this image, featuring the stars Vega, Deneb, and Altair.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805" style="text-align: center;"><img alt="the great rift" class="size-full wp-image-18038 aligncenter" data-dcnode-id="806" height="902" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/great-rift.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/great-rift.jpg 600w, https://astrobackyard.com/wp-content/uploads/2021/07/great-rift-363x545.jpg 363w, https://astrobackyard.com/wp-content/uploads/2021/07/great-rift-150x226.jpg 150w" width="600"></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800" style="text-align: center;"><strong data-dcnode-id="801"><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The Cygnus area of Milky Way and the Great Rift.</span></em></strong></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="798" instrument_node="">The image above was captured during another memorable trip to the </span><span data-dcnode-id="795" style="color: #0000ff;"><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/jFcgRpBSSpo" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="797" instrument_node="">Cherry Springs Star Party</span></a></span><span data-dcnode-id="794" instrument_node="">. Several images were captured using a DSLR camera on a SkyTracker Pro camera mount.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="791" instrument_node="">The </span><span data-dcnode-id="788" style="color: #0000ff;"><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Rift_%28astronomy%29" style="color: #0000ff;"><span data-dcnode-id="790" instrument_node="">Great Rift</span></a></span><span data-dcnode-id="787" instrument_node=""> is a dark band that appears to obscure the center of our galaxy when seen from Earth. It is comprised of molecular dust clouds that sit between our Solar System and the Sagittarius arm of the galaxy. It forms a dark lane that divides the bright band of the Milky Way.</span></p><span data-dcnode-id="785" instrument_node="">
</span><h2 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Basic Milky Way Photography (and Nightscape) Setup</span></h2><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The following equipment profile is the exact one I have used for actual Milky Way photos. Essentially you need a portable star tracker, and a camera and (wide-angle) lens combo that excels in low-light situations.&nbsp;</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">You do not need to mirror this setup to capture a great Milky Way photo, but it should give you an idea of what a typical wide-angle astrophotography rig looks like.</span></p><span data-dcnode-id="776" instrument_node="">
</span><ol data-dcnode-id="726"><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="768"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Camera:</span></strong><span data-dcnode-id="772" instrument_node=""> </span><span data-dcnode-id="769" style="color: #0000ff;"><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3eqCJo4" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="771" instrument_node="">Canon EOS R</span></a></span></li><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="760"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Adapter:</span></strong><span data-dcnode-id="764" instrument_node=""> </span><span data-dcnode-id="761" style="color: #0000ff;"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2UmNQY6" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="763" instrument_node="">Canon EF-EOS R Adapter</span></a></span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="752"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Lens:</span></strong><span data-dcnode-id="756" instrument_node=""> </span><span data-dcnode-id="753" style="color: #0000ff;"><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3B9YuSI" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="755" instrument_node="">Sigma 24mm F/1.4</span></a></span></li><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="744"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Star Tracker:</span></strong><span data-dcnode-id="748" instrument_node=""> </span><span data-dcnode-id="745" style="color: #0000ff;"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/staradventurer" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="747" instrument_node="">Sky-Watcher Star Adventurer</span></a></span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="736"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Tripod:</span></strong><span data-dcnode-id="740" instrument_node=""> </span><span data-dcnode-id="737" style="color: #0000ff;"><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/radian-carbon-fiber-tripod%3Frfsn%3D3263575.8c059d%26utm_source%3Drefersion%26utm_medium%3Daffiliate%26utm_campaign%3D3263575.8c059d" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="739" instrument_node="">Radian Carbon Fiber Tripod</span></a></span></li><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="728"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Remote Shutter:</span></strong><span data-dcnode-id="732" instrument_node=""> </span><span data-dcnode-id="729" style="color: #0000ff;"><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3kpaHNk" style="color: #0000ff;"><span data-dcnode-id="731" instrument_node="">Neewer Remote Cable</span></a></span></li><span data-dcnode-id="727" instrument_node="">
</span></ol><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723" style="text-align: center;"><img alt="astrophotography kit" class="alignnone size-full wp-image-18040" data-dcnode-id="724" height="800" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/astrophotography-kit.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/astrophotography-kit.jpg 600w, https://astrobackyard.com/wp-content/uploads/2021/07/astrophotography-kit-409x545.jpg 409w, https://astrobackyard.com/wp-content/uploads/2021/07/astrophotography-kit-150x200.jpg 150w" width="600"></p><span data-dcnode-id="722" instrument_node="">
</span><h2 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Best Camera Lens for Milky Way Photography</span></h2><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">It may surprise you to hear that a camera lens is the best way to capture the Milky Way, not a telescope.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The high magnification focal lengths of a telescope are great for zooming in on deep-sky objects, but to reveal the beautiful structure of the Milky Way, you need to go wide.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">A good camera lens for Milky Way photography will allow plenty of light to reach the sensor in a short period of time. Low-light performance is a critically important feature of the lens when shooting at night.&nbsp;</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">A ‘fast’ camera lens with a wide aperture is best, as this will give you more options in terms of exposure time and ISO settings.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="706" instrument_node="">I have used many lenses for Milky Way and </span><span data-dcnode-id="703" style="color: #0000ff;"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/nightscape-photography/" style="color: #0000ff;"><span data-dcnode-id="705" instrument_node="">nightscape photography</span></a></span><span data-dcnode-id="702" instrument_node=""> with my Canon camera bodies, and these are a few of my personal favorites.</span></p><span data-dcnode-id="700" instrument_node="">
</span><h3 data-dcnode-id="695"><span data-dcnode-id="696" style="color: #0000ff;"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3g6129t" style="color: #0000ff;"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Sigma 24mm F/1.4</span></strong></a></span></h3><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">In my experience, the Sigma 24mm F/1.4 is one of the best camera lenses for Milky Way photography. This lens is considered to be wide-angle, although 24mm is not nearly wide enough on a crop-sensor DSLR camera body.&nbsp;</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">This lens is best enjoyed with a full-frame camera. This will provide a practical field of view to capture the entire Milky Way core stretching across the sky, and much more.&nbsp;</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686" style="text-align: center;"><img alt="Sigma 24mm F/1.4 Art Canon" class="aligncenter wp-image-16372" data-dcnode-id="687" height="554" loading="lazy" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/11/sigma-24mm-f14-art-canon.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/11/sigma-24mm-f14-art-canon.jpg 500w, https://astrobackyard.com/wp-content/uploads/2020/11/sigma-24mm-f14-art-canon-345x545.jpg 345w, https://astrobackyard.com/wp-content/uploads/2020/11/sigma-24mm-f14-art-canon-150x237.jpg 150w" width="350"></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="681" style="text-align: center;"><strong data-dcnode-id="682"><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Sigma 24mm F/1.4 Camera Lens.</span></em></strong></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">It’s a premium quality prime lens from Sigma (part of their Art Series), and the lens performance is exceptional in low-light situations. If you dabble in video work at night (as I do on my YouTube channel), this lens will become your new favorite.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">You can read my </span><span data-dcnode-id="673" style="color: #0000ff;"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/sigma-24mm-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="675" instrument_node="">full review</span></a></span><span data-dcnode-id="672" instrument_node=""> of this lens used for the purpose of astrophotography.&nbsp;</span></p><span data-dcnode-id="670" instrument_node="">
</span><h3 data-dcnode-id="665"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3wKjdJt" rel="noopener" target="_blank"><strong data-dcnode-id="667"><span data-dcnode-id="668" style="color: #0000ff;"><span data-dcnode-id="669" instrument_node="">Rokinon 14mm F/2.8</span></span></strong></a></h3><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Another excellent choice is the Rokinon (or Samyang) 14mm F/2.8. This is a fan favorite in the astrophotography community, largely due to its impressive performance for the price.&nbsp;</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">You will not find a cheaper ultra-wide angle lens for astrophotography than this. The model I have is fully manual, meaning even the aperture control is done by “clicking” the lens into your desired f-stop.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">This lens offers a jaw-dropping 115° field of view on a full-frame camera, allowing you to capture incredible panorama-style images of the night sky.&nbsp;</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653" style="text-align: center;"><img alt="Rokinon 14mm f/2.8 lens" class="aligncenter wp-image-18036" data-dcnode-id="654" height="418" loading="lazy" sizes="(max-width: 320px) 100vw, 320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/rokinon-14mm-f28-lens.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/rokinon-14mm-f28-lens.jpg 350w, https://astrobackyard.com/wp-content/uploads/2021/07/rokinon-14mm-f28-lens-150x196.jpg 150w" width="320"></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="648" style="text-align: center;"><strong data-dcnode-id="649"><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Rokinon 14mm F/2.8 Lens.</span></em></strong></p><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Recommended Filter</span></h2><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The Milky Way is best photographed without the use of a filter, under pristine, dark, moonless skies. However, if you can’t get to a magical location like this, a mild light pollution filter may help.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">The Optolong L-Pro is a broadband light pollution filter, which means that it aims to collect </span><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">natural star colors</span></strong><span data-dcnode-id="637" instrument_node=""> that make a great Milky Way photo. In my experience, it does a great job of reducing the artificial glow of the city, without disrupting the natural color balance of your image.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632" style="text-align: center;"><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/33JAS7a" rel="noopener noreferrer" target="_blank"><img alt="milky way filter" class="aligncenter wp-image-13817 size-full" data-dcnode-id="634" height="249" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2019/11/l-pro-filter.jpg&amp;raw" width="421"></a></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="627" style="text-align: center;"><strong data-dcnode-id="628"><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">The Optolong L-Pro filter is suitable for Milky Way photography.</span></em></strong></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The 2″ model shown above can be threaded into the optical train of a camera and telescope configuration, but not with a DSLR camera and lens.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="622" instrument_node="">There is also a version for full-frame DSLR cameras (</span><span data-dcnode-id="619" style="color: #0000ff;"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/optolong-canon-full-frame-dslr-l-pro-filter%3Frfsn%3D3263575.8c059d%26utm_source%3Drefersion%26utm_medium%3Daffiliate%26utm_campaign%3D3263575.8c059d" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="621" instrument_node="">this one is for full-frame Canon DSLR’s</span></a></span><span data-dcnode-id="618" instrument_node="">) that sits inside of the camera body. A broadband clip-in filter is worth looking into if you plan on capturing Milky Way images in areas with light-polluted skies.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">When shooting the Milky Way from a dark sky location, you do not have to use a light pollution filter. This is the ideal scenario, as you will be able to record the natural colors of the stars in the sky without introducing any odd color casts to the image.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Including Foreground Details</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Sometimes you will want to capture foreground details in your Milky Way photo, to show the surrounding landscape below the night sky. For a single exposure on a stationary tripod, this is not an issue because the ground is not moving. However, when using a star tracker to capture images without star trailing, the Earth will show movement in as early as 30-seconds, creating a blurry portion of your image.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">This creates a challenging scenario for amateur astrophotographers that want to create an image with a stack of tracked shots and terrestrial details that are not blurred. The solution is to </span><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">create a composite</span></strong><span data-dcnode-id="603" instrument_node=""> image that combines a separate shot (or stack) of sharp, foreground landscape details with a tracked set of images of the Milky Way.&nbsp;</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="600" instrument_node="">To accomplish this, it is very important to blend the images together naturally, avoiding any hard edges between the night sky, and the Earth below. I find that the best way to do this is to use a feathered mask in Photoshop, with the useful refinement options found in the </span><span data-dcnode-id="597" style="color: #0000ff;"><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/select-and-mask-photoshop-cc/" style="color: #0000ff;"><span data-dcnode-id="599" instrument_node="">Select and Mask tool</span></a></span><span data-dcnode-id="596" instrument_node="">. The image below shows what this mask would look like in an image of the Milky Way with trees beneath it.&nbsp;</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592" style="text-align: center;"><img alt="landscape astrophotography" class="aligncenter wp-image-12695 size-full" data-dcnode-id="593" height="345" loading="lazy" sizes="(max-width: 675px) 100vw, 675px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2019/07/landscape-astrophotography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2019/07/landscape-astrophotography.jpg 675w, https://astrobackyard.com/wp-content/uploads/2019/07/landscape-astrophotography-545x279.jpg 545w" width="675"></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="587" style="text-align: center;"><strong data-dcnode-id="588"><em data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Blending images together (using masks) to create a Milky Way composite.</span></em></strong></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Essentially you want to take a clean shot of the foreground, to replace the blurry version in your night sky stack. The more exposures used for your Milky Way sky, the greater the blurring effect will be on the ground (because more time has passed). You may want to limit your integrated exposure time to about 30 minutes or less, to make the process of blending the images together easier.&nbsp;</span></p><span data-dcnode-id="583" instrument_node="">
</span><h2 data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">How to find it</span></h2><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">It might sound like a silly question, as our own Solar System is located inside of the Milky Way galaxy. However, certain areas of the Milky Way spiral are concentrated in the night sky at certain times of the year.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The galactic core is the most interesting area of the galactic plane, and what most photographers are hoping to capture. The galactic core is the most concentrated area of stars in the galactic plane, and what most photographers are hoping to capture.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Knowing where and when to look will help you to plan your photo session. I use an app for my Android smartphone called Stellarium, which will tell you exactly where everything in the night sky will be on any given night. Stellarium is a handy mobile planetarium that is easy to use. &nbsp;</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Whether you are planning a Milky Way shot or a deep-sky imaging project, this app can save you time and frustration.</span></p><span data-dcnode-id="568" instrument_node="">
</span><ul data-dcnode-id="558"><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="564"><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.noctuasoftware.stellarium%26hl%3Den"><span data-dcnode-id="566" instrument_node="">Stellarium for Android</span></a></li><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="560"><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/ca/app/stellarium-mobile-sky-map/id643165438%3Fmt%3D8"><span data-dcnode-id="562" instrument_node="">Stellarium for iPhone</span></a></li><span data-dcnode-id="559" instrument_node="">
</span></ul><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">I regularly use Stellarium on my PC to plan an imaging session, but having the app on my phone at all times is a real life-saver. Once you know where it is, it’s important to remember some specific camera settings to set yourself up for success.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><img alt="The Milky Way using 30-second exposures" class="aligncenter size-full wp-image-11064" data-dcnode-id="553" height="395" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2019/01/the-milky-way-30-seconds.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2019/01/the-milky-way-30-seconds.jpg 600w, https://astrobackyard.com/wp-content/uploads/2019/01/the-milky-way-30-seconds-545x359.jpg 545w" width="600"></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="547" style="text-align: center;"><em data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">The Milky Way captured using 30-second exposures on a star tracker mount</span></strong></em></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="545" instrument_node="">Another tool to help you plan your next Milky Way photography session is </span><span data-dcnode-id="542" style="color: #0000ff;"><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="544" instrument_node="">PhotoPills</span></a></span><span data-dcnode-id="541" instrument_node="">. You can use the handy planner feature to see exactly where the Milky Way will be from a specific location on the map.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="538" instrument_node="">This is a must-have mobile app for many night photography shooters, as it helps you get creative with compositions that include surrounding natural landscapes. See my complete list of essential astronomy and </span><span data-dcnode-id="535" style="color: #0000ff;"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astronomy-apps-for-stargazing/" style="color: #0000ff;"><span data-dcnode-id="537" instrument_node="">stargazing apps</span></a></span><span data-dcnode-id="534" instrument_node=""> for your smartphone.&nbsp;</span></p><span data-dcnode-id="532" instrument_node="">
</span><h2 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">4 Things to remember when photographing the Milky Way</span></h2><span data-dcnode-id="529" instrument_node="">
</span><ol data-dcnode-id="509"><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">Choose an ISO setting based on your shooting environment. The ISO will need to be much higher than you would normally use during a daytime photo. For moderate light pollution use 1600 to 3200. Pay attention to the histogram, and </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lonelyspeck.com/the-milky-way-in-los-angeles-light-pollution/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="526" instrument_node="">expose to the right</span></a><span data-dcnode-id="524" instrument_node="">. It’s a balancing act between noise and the amount of light collected. However, with enough image frames, even a noisy image can be smoothed&nbsp;out after stacking.</span></li><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Use your camera’s widest aperture, or close to it. Generally, you’ll want to let in as much light as possible, in the shortest amount of time. Fast camera lenses of f/2.8 or below may need to be stopped down a bit for better star quality.</span></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="518" instrument_node="">Set your camera’s drive mode to a 2, or 10-second delay. Better yet, use a </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2pQ8iPh"><span data-dcnode-id="517" instrument_node="">remote shutter release cable</span></a><span data-dcnode-id="515" instrument_node="">. Even the slightest movement created by pressing the shutter button can be enough to&nbsp;shake the stars up in your image. Also, make sure your tripod head is locked securely. A sliding tripod head in any direction will show itself immediately in the form of elongated stars.</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Shoot 30-second exposures. &nbsp;This will maximize the light collected in each individual frame. &nbsp;Yes, the stars may begin to trail (depending on your focal length), but this will only be evident when zoomed into 100%.</span></li><span data-dcnode-id="510" instrument_node="">
</span></ol><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="505"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/The_Milky_Way_2018.jpg"><img alt="Photograph The Milky Way" class="aligncenter wp-image-9253 size-full" data-dcnode-id="507" height="431" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/the_milky_way.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/the_milky_way.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/the_milky_way-545x361.jpg 545w" width="650"></a></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="498" style="text-align: center;"><strong data-dcnode-id="499"><em data-dcnode-id="500"><span data-dcnode-id="503" instrument_node="">The Milky Way using the Rokinon 14mm F/2.8 Lens</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
</span></em></strong></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">The photo above uses </span><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">60 x 120-second</span></strong><span data-dcnode-id="493" instrument_node=""> (2-minute) exposures at ISO 1600 with my Canon EOS Rebel T3i. The lens was at its native focal length of 14mm, and the aperture was set to F/3.2 for a sharper image.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="490" instrument_node="">Stopping down the f-ratio of your camera lens is a commonly used </span><span data-dcnode-id="487" style="color: #0000ff;"><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/7-astrophotography-tips/" style="color: #0000ff;"><span data-dcnode-id="489" instrument_node="">astrophotography tip</span></a></span><span data-dcnode-id="486" instrument_node=""> used to create images with sharper stars. This technique sacrifices some light-gathering ability for improved clarity and smaller stars. This is one of the many reasons a star tracker provides more options than a stationary mount. You are able to offset the slower f-ratio with longer subs.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">With 2 hours of total integration time, I was able to produce a final high-resolution photo of the Milky Way with reduced noise and much more detail. Here are the exact camera settings used for the photo above:</span></p><span data-dcnode-id="481" instrument_node="">
</span><h2 data-dcnode-id="478"><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Milky Way Camera Settings</span></strong></h2><span data-dcnode-id="477" instrument_node="">
</span><ul data-dcnode-id="450"><span data-dcnode-id="476" instrument_node="">
</span><li data-dcnode-id="472"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Exposure:</span></strong><span data-dcnode-id="473" instrument_node=""> 120 seconds</span></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="467"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">ISO:</span></strong><span data-dcnode-id="468" instrument_node=""> 1600</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="462"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">F-Stop:</span></strong><span data-dcnode-id="463" instrument_node=""> F/3.2</span></li><span data-dcnode-id="461" instrument_node="">
</span><li data-dcnode-id="457"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">White Balance:</span></strong><span data-dcnode-id="458" instrument_node=""> Auto</span></li><span data-dcnode-id="456" instrument_node="">
</span><li data-dcnode-id="452"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Number of Frames:</span></strong><span data-dcnode-id="453" instrument_node=""> 60</span></li><span data-dcnode-id="451" instrument_node="">
</span></ul><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">If you are not using a tracking mount, similar camera settings will still work, but you may need to increase the overall exposure time to produce similar results. Using a lower f-ratio (such as F/2.8 or below) can help produce a brighter image in a shorter period of time.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">The white balance settings on your camera are not as important as you may think. The key is to shoot in RAW file format so that you’re able to adjust individual parameters such as white balance during post-processing.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The following graphic presents some aggressive Milky Way camera settings, using an astro-modified mirrorless camera (Canon EOS Ra). These are the exact settings used to take a picture of the Milky Way core rising over our campsite in July, 2021.&nbsp;</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437" style="text-align: center;"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings.jpg" rel="noopener" target="_blank"><img alt="Milky Way Camera Settings" class="aligncenter wp-image-18027" data-dcnode-id="439" height="854" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings.jpg 1080w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-319x545.jpg 319w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-600x1024.jpg 600w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-768x1311.jpg 768w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-900x1536.jpg 900w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-585x999.jpg 585w, https://astrobackyard.com/wp-content/uploads/2021/07/milky-way-camera-settings-150x256.jpg 150w" width="500"></a></p><span data-dcnode-id="436" instrument_node="">
</span><h2 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Image Stacking&nbsp;</span></h2><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Stacking several long images together using specialing astrophotography software will yield the best results. The process of integration can improve the signal-to-noise ratio of your final photo.&nbsp;</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="429" instrument_node="">There are many choices to consider when looking to stack astrophotography image exposures, but I recommend Sequator for beginners. You can watch my </span><span data-dcnode-id="425" style="color: #0000ff;"><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/ODMMVrL8OrI" style="color: #0000ff;"><span data-dcnode-id="428" instrument_node="">Sequator tutorial</span></a><span data-dcnode-id="426" instrument_node=""> </span></span><span data-dcnode-id="424" instrument_node="">on YouTube to see how the software works.&nbsp;</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="421" instrument_node="">Sequator has a handy “</span><em data-dcnode-id="418"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Freeze Ground</span></strong></em><span data-dcnode-id="417" instrument_node="">” feature that allows you to stack tracked images of the night sky with a stationary foreground. This feature works surprisingly well, and you may find this method to be sufficient for your wide-anlge nightscapes.&nbsp;</span></p><span data-dcnode-id="415" instrument_node="">
</span><h3 data-dcnode-id="412"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Stacking Software for Milky Way Photography</span></strong></h3><span data-dcnode-id="411" instrument_node="">
</span><ul data-dcnode-id="379"><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="407" style="color: #0000ff;"><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/view/sequator/" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="409" instrument_node="">Sequator</span></a></span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="401"><span data-dcnode-id="402" style="color: #0000ff;"><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//deepskystacker.free.fr/english/index.html" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="404" instrument_node="">DeepSkyStacker</span></a></span></li><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="396"><span data-dcnode-id="397" style="color: #0000ff;"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264303%26a%3D2999125%26g%3D22852088" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="399" instrument_node="">Adobe Photoshop</span></a></span></li><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="392" style="color: #0000ff;"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixinsight.com/" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="394" instrument_node="">PixInsight</span></a></span></li><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" style="color: #0000ff;"><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astropixelprocessor.com/" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="389" instrument_node="">Astro Pixel Processor</span></a></span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="381"><span data-dcnode-id="382" style="color: #0000ff;"><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/starrylandscapestacker/home" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="384" instrument_node="">Starry Landscape Stacker</span></a></span></li><span data-dcnode-id="380" instrument_node="">
</span></ul><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="377" instrument_node="">The stacking process registers each image so that the stars align with each other. </span><span data-dcnode-id="374" style="color: #0000ff;"><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/how-to-take-dark-frames/" style="color: #0000ff;"><span data-dcnode-id="376" instrument_node="">Subtracting dark frames</span></a></span><span data-dcnode-id="373" instrument_node=""> from your final image is also a key step towards quality data.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="366" style="text-align: center;"><strong data-dcnode-id="367"><span data-dcnode-id="370" instrument_node="">Video Tutorial (Stacking in Photoshop)</span><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node="">
</span></strong></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="364" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/WIcJL2JGVao&amp;raw" width="560"></iframe></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="361" instrument_node="">In this situation, stacking the frames manually in Photoshop can do a better job than&nbsp;</span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/deep-sky-stacker-settings/"><span data-dcnode-id="360" instrument_node="">DeepSkyStacker</span></a><span data-dcnode-id="358" instrument_node="">. This is because the foreground objects in the image will throw the registration process off in DSS. However, an image of the Milky Way with no foreground landscape will stack just fine in DeepSkyStacker.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354" style="text-align: left;"><span data-dcnode-id="355" instrument_node="">You can manually stack your images together using Adobe Photoshop, resulting in a smoother image with less noise. This is especially effective when shooting Milky Way photos using a high ISO sensitivity, as digital noise can really start to show itself.&nbsp;</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="346" style="text-align: left;"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Related:</span></strong><span data-dcnode-id="350" instrument_node=""> </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/tutorials/stack-exposures/"><span data-dcnode-id="348" style="color: #0000ff;"><span data-dcnode-id="349" instrument_node="">How to manually stack your astrophotos in Photoshop</span></span></a></p><span data-dcnode-id="345" instrument_node="">
</span><h2 data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Milky Way Image Processing Tips</span></h2><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">For images of the night sky, the preview you see on your camera’s display is only beginning. The true color and beauty of your photo are yet to be brought forth. When you shoot RAW images using a DSLR camera, you open the door to powerful image processing capabilities. &nbsp;Adobe Camera RAW (ACR) is one of my favorite tools for processing astro images.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="336"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Adobe Camera Raw</span></strong></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">By capturing your images in RAW format, crucial edits can be made to image during the post-processing stage. &nbsp;You never want to shoot astrophotography images in JPEG format, as you are losing detail in the image.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">I use Adobe Camera Raw to pre-process my images coming into Photoshop. This software supports many different cameras, and allows you to import the images into various Adobe applications from Photoshop to Elements.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Key areas to address in ACR:</span></strong></p><span data-dcnode-id="325" instrument_node="">
</span><ul data-dcnode-id="308"><span data-dcnode-id="324" instrument_node="">
</span><li data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Adjust white balance – less brown, more blue</span></li><span data-dcnode-id="321" instrument_node="">
</span><li data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Apply noise reduction filter (modest)</span></li><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Increase Saturation</span></li><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Reduce chromatic aberration (color-fringing)</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Correct vignetting issues</span></li><span data-dcnode-id="309" instrument_node="">
</span></ul><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="302" style="text-align: left;"><span data-dcnode-id="306" instrument_node="">The above list is a small sampling of the actions applied to the Milky Way images on this page. For a really powerful image, try running third-party action sets on your image, such as the </span><span data-dcnode-id="303" style="color: #0000ff;"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prodigitalsoftware.com/Astronomy_Tools_For_Full_Version.html" style="color: #0000ff;"><span data-dcnode-id="305" instrument_node="">Astronomy Tools Action Set.</span></a></span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299" style="text-align: left;"><span data-dcnode-id="300" instrument_node="">Some of the most effective actions using the package listed above are “make stars smaller” and “local contrast adjustment”. Below, you’ll find an updated image processing video where I process the data from a stacked image in Photoshop.</span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="297" instrument_node="">You may also want to try running </span><span data-dcnode-id="294" style="color: #0000ff;"><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/topaz-denoise-ai-review/" style="color: #0000ff;"><span data-dcnode-id="296" instrument_node="">Topaz DeNoise AI</span></a></span><span data-dcnode-id="293" instrument_node=""> on the image to remove noise in the darker areas of the image. This is a third-party (paid) plugin, but I have found it to be very effective when processing nightscape-style images including the Milky Way.&nbsp;</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="290" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yACQ3x5dTko&amp;raw" width="560"></iframe></p><span data-dcnode-id="288" instrument_node="">
</span><h2 data-dcnode-id="286" style="text-align: left;"><span data-dcnode-id="287" instrument_node="">Travel to a Dark Sky Location</span></h2><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="284" instrument_node="">This means that you should plan your shot around the </span><span data-dcnode-id="281" style="color: #0000ff;"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_moon" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="283" instrument_node="">New Moon</span></a></span><span data-dcnode-id="280" instrument_node=""> phase. Even a half-quarter moon creates enough light in the night sky to ruin your image. Having New Moon and clear skies coincide with each other&nbsp;can be a tall order.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="275"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">This is one of the reasons Milky Way photography can be so challenging.</span></strong></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="273" instrument_node="">Light pollution can completely wash away the beautiful structure of the Milky Way galaxy. For this reason, it is essential that you leave the glow of the city behind, and travel to a dark sky location. One of the darkest locations I have been to is Cherry Springs State Park. This </span><span data-dcnode-id="269" style="color: #0000ff;"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/the-bortle-scale/" style="color: #0000ff;"><span data-dcnode-id="272" instrument_node="">Bortle Scale Class 2</span></a><span data-dcnode-id="270" instrument_node=""> </span></span><span data-dcnode-id="268" instrument_node="">location is home to the annual&nbsp;</span><span data-dcnode-id="265" style="color: #0000ff;"><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/6cnl78MS_jw" style="color: #0000ff;"><span data-dcnode-id="267" instrument_node="">Cherry Spring Star Party</span></a></span><span data-dcnode-id="264" instrument_node=""> in Pennsylvania</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">A camping trip can offer a fantastic opportunity for night photography, as these areas are usually well away from the city. Use a planetarium software such as Stellarium to preview the position of the Milky Way core from your vantage point.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">I hope that you have learned a few pointers to apply on your next night of photography. &nbsp;I encourage you to set aside some time to observe the Milky Way under dark skies and feel the overwhelming connection to our universe.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254" style="text-align: center;"><img alt="Wide-angle full-frame" class="aligncenter size-full wp-image-11034" data-dcnode-id="255" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2019/01/perseid-meteor-shower.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2019/01/perseid-meteor-shower.jpg 600w, https://astrobackyard.com/wp-content/uploads/2019/01/perseid-meteor-shower-545x363.jpg 545w" width="600"></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="249" style="text-align: center;"><strong data-dcnode-id="250"><em data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The Milky Way from Northern Ontario during the Perseid Meteor Shower</span></em></strong></p><span data-dcnode-id="248" instrument_node="">
</span><h3 data-dcnode-id="245"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Keys to a great Milky Way image:</span></strong></h3><span data-dcnode-id="244" instrument_node="">
</span><ul data-dcnode-id="206"><span data-dcnode-id="243" instrument_node="">
</span><li data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Use a wide-angle camera lens to capture a large portion of the Milky Way (17mm or wider is best)</span></li><span data-dcnode-id="240" instrument_node="">
</span><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Use a higher ISO setting than you would normally use during the day to collect more signal&nbsp;</span></li><span data-dcnode-id="237" instrument_node="">
</span><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Use your cameras lowest f-stop to collect as much light as possible in a single exposure</span></li><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Shoot in RAW mode to adjust variables such as white-balance in post-processing</span></li><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Pay close attention to the histogram and “expose to the right”</span></li><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Focus using your DSLR’s live view function on a bright star at 10X magnification</span></li><span data-dcnode-id="225" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Set your camera’s drive mode to a 2 or 10-second delay to avoid camera shake</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Use a star tracker that has been properly polar aligned to take longer exposures</span></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Use a remote shutter release cable to automate an imaging sequence</span></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Fasten your DSLR camera securely into place on your tripod or star tracker</span></li><span data-dcnode-id="213" instrument_node="">
</span><li data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Take multiple long-exposure images to stack and improve the signal-to-noise-ratio</span></li><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Shoot dark frames of the same temperature and exposure length to subtract during the stacking process</span></li><span data-dcnode-id="207" instrument_node="">
</span></ul><span data-dcnode-id="205" instrument_node="">
</span><h2 data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Photographing the Milky Way with a Smartphone</span></h2><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Yes, it is possible to photograph the Milky Way with a modern smartphone. In fact, I captured the image shown below of the Milky Way core using my Samsung Galaxy S21 Ultra.</span></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197" style="text-align: center;"><img alt="smartphone astrophotography" class="alignnone size-full wp-image-18044" data-dcnode-id="198" height="476" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2021/07/smartphone-astrophotography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2021/07/smartphone-astrophotography.jpg 400w, https://astrobackyard.com/wp-content/uploads/2021/07/smartphone-astrophotography-150x179.jpg 150w" width="400"></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="192" style="text-align: center;"><strong data-dcnode-id="193"><em data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">The Milky Way captured using my cell phone.&nbsp;</span></em></strong></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">I used the “Pro” camera mode (not night mode) for complete control over the camera settings. I recorded a single 20-second exposure at ISO 1600 with the phone propped up against a picnic table.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">I understand that photographing the Milky Way with a smartphone is an exciting idea for many people because it might be the best camera (or only camera) you own. The problem is, the tiny sensor on modern smartphones simply weren’t meant for long exposure low-light photography.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Although the results are impressive from considering it was taken from a phone, the image lacks the structure, color, and detail I have come to expect using a DSLR or mirrorless camera.&nbsp;</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">I am interested to see the results possible when several exposures are stacked and processed as you would with a typical astrophotography image.&nbsp;</span></p><span data-dcnode-id="179" instrument_node="">
