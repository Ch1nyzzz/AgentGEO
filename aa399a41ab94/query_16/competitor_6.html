</span><h2 class="post-title" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Photograph the Milky Way this Summer</span></h2><span data-dcnode-id="1326" instrument_node="">
</span><div class="singlepost post-9235 post type-post status-publish format-standard has-post-thumbnail hentry category-tutorials category-equipment category-milky-way tag-the-milky-way tag-milky-way-photography tag-skytracker-mount mv-content-wrapper cat-286-id cat-345-id cat-435-id has_thumb" data-dcnode-id="220" id="single-post-9235"><span data-dcnode-id="1325" instrument_node="">
</span><div class="entry" data-dcnode-id="222"><span data-dcnode-id="1324" instrument_node="">
</span><div class="post-feature-img" data-dcnode-id="1317"><span data-dcnode-id="1323" instrument_node="">
</span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/photograph-the-milky-way.jpg" rel="bookmark" title="Photograph the Milky Way this Summer"><span data-dcnode-id="1322" instrument_node="">
</span><img alt="" class="attachment-single-post size-single-post wp-post-image" data-dcnode-id="1321" height="359" sizes="(max-width: 688px) 100vw, 688px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/photograph-the-milky-way-688x359.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/photograph-the-milky-way.jpg 688w, https://astrobackyard.com/wp-content/uploads/2018/06/photograph-the-milky-way-545x284.jpg 545w" width="688"><span data-dcnode-id="1320" instrument_node=""> </span></a><span data-dcnode-id="1318" instrument_node="">
</span></div><span data-dcnode-id="1316" instrument_node="">
</span><div class="clear" data-dcnode-id="1315"></div><span data-dcnode-id="1314" instrument_node="">
</span><div class="meta" data-dcnode-id="1296"><span data-dcnode-id="1313" instrument_node="">
</span><span data-dcnode-id="1311" instrument_node="">
</span><time data-dcnode-id="1308" datetime="June 28, 2018"><span class="meta-date" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">June 28, 2018</span></span></time><span class="meta-category" data-dcnode-id="1303"><span class="meta-separator" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">|</span></span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/category/tutorials/"><span data-dcnode-id="1305" instrument_node="">Tutorials</span></a></span><span class="meta-comments" data-dcnode-id="1298"><span class="meta-separator" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">|</span></span><a data-dcnode-id="1299" href="#respond" rel="bookmark" title="Comments for Photograph the Milky Way this Summer"><span data-dcnode-id="1300" instrument_node="">0 Comments</span></a></span><span data-dcnode-id="1297" instrument_node="">
</span></div><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1294" instrument_node="">I recently returned from an unforgettable astrophotography trip where I photographed the </span><span data-dcnode-id="1291" style="color: #0000ff;"><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/how-to-photograph-milky-way/" style="color: #0000ff;"><span data-dcnode-id="1293" instrument_node="">Milky Way</span></a></span><span data-dcnode-id="1290" instrument_node=""> under some of the </span><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//darksky.org/idsp/parks/cherrysprings/"><span data-dcnode-id="1289" instrument_node="">darkest skies</span></a><span data-dcnode-id="1287" instrument_node=""> in the Eastern United States. The Cherry Springs Star party is an annual astronomy event where night sky enthusiasts come together to appreciate the true beauty of an unspoiled night sky.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">In this post, I’ll explain how I photographed the Milky Way with my DSLR camera, using a wide-angle lens and a small star tracker mount. I’ll also share the deep sky image of the Trifid Nebula I captured through my refractor telescope and a cooled CMOS camera. As far as astrophotography-based camping trips go, it doesn’t get any better than this.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Photographing the Milky Way</span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Before I describe how I photographed the Milky Way on my latest astrophotography adventure, a bit of backstory:</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Deep-sky imaging with a DSLR camera and telescope from a light-polluted backyard in the city is challenging. We use light pollution filters and isolate narrowband wavelengths in our targets to separate the beautiful nebulae and galaxies from a washed-out sky.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">As&nbsp;challenging&nbsp;(and rewarding) as this process&nbsp;may be with a telescope, an even </span><strong data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">bigger</span></strong><span data-dcnode-id="1269" instrument_node=""> challenge is to capture a clean wide-angle&nbsp;shot of the Milky Way from a bright city sky using a camera lens. My previous attempts at this feat have resulted in odd-looking portraits of our night sky due to image processing workarounds that can’t replace a truly dark sky. (Correcting gradients is often the biggest challenge)</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">The reason I mention this is to segway into my next point. When I </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">do</span></em><span data-dcnode-id="1263" instrument_node=""> get the opportunity to travel to a dark sky site, I try to capitalize on the situation by capturing astrophotography images that are simply not possible from my backyard. There is absolutely no substitute for dark skies.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1258" style="text-align: center;"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Video:&nbsp;An amazing trip to the 2018 Cherry Springs Star Party </span></strong></p><span data-dcnode-id="1257" instrument_node="">

7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="773" fill="#fff" id="ytp-id-21"></path></use><path d="M27,9 L9,9 C7.9,9 7,9.9 7,11 L7,14 L9,14 L9,11 L27,11 L27,25 L20,25 L20,27 L27,27 C28.1,27 29,26.1 29,25 L29,11 C29,9.9 28.1,9 27,9 L27,9 Z M7,24 L7,27 L10,27 C10,25.34 8.66,24 7,24 L7,24 Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="771" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="751" title="Full screen (f)"><svg data-dcnode-id="752" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="765"><use class="ytp-svg-shadow" data-dcnode-id="767" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="768" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="766" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="761"><use class="ytp-svg-shadow" data-dcnode-id="763" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="764" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="762" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="757"><use class="ytp-svg-shadow" data-dcnode-id="759" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="760" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="758" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="753"><use class="ytp-svg-shadow" data-dcnode-id="755" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="756" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="754" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=jFcgRpBSSpo" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></center><span data-dcnode-id="734" instrument_node="">As seen in the opening few seconds of the video, there are few more satisfying moments than seeing a 2-minute exposure appear on the back of your DSLR screen.</span><p data-dcnode-id="733"></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">In the video, I share a brief description of the astrophotography equipment used to capture my deep sky target (the Trifid Nebula), but failed to explain the gear used to photograph the Milky Way image that was featured at the end. The following information is a complete break down of the simple, yet essential gear I use for wide-angle Milky Way photography.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">What Do You Need?</span></h2><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="725" instrument_node="">It’s hard to argue that purchasing a DSLR camera isn’t the most pivotal first step towards astrophotography. Whether you want to photograph the Milky Way using a camera lens or dive into deep sky astrophotography through a telescope, a DSLR camera such as the </span><span data-dcnode-id="722" style="color: #0000ff;"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2IAgKrQ" style="color: #0000ff;"><span data-dcnode-id="724" instrument_node="">Canon Rebel EOS T7i</span></a></span><span data-dcnode-id="721" instrument_node=""> can take you there.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="718" instrument_node="">A DSLR offers many pivotal advantages over a point-and-shoot camera when it comes to astrophotography. The biggest difference being the complete control over the image capturing process when using the camera in </span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">manual</span></strong><span data-dcnode-id="715" instrument_node=""> mode. Exposure length, aperture, and ISO are just a few of the many variables that come into play when photographing the </span><span data-dcnode-id="712" style="color: #0000ff;"><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/how-to-find-the-milky-way/" style="color: #0000ff;"><span data-dcnode-id="714" instrument_node="">Milky Way</span></a></span><span data-dcnode-id="711" instrument_node="">.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">I personally use an older camera model, the Canon EOS Rebel T3i, but the newer versions of this camera body add increased resolution and higher sensitivity in low-light situations like this. If you’ve already got a DSLR camera, the following pieces of gear can take your Milky Way photography to the next level.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="699" style="text-align: center;"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Related Post:</span></strong><span data-dcnode-id="703" instrument_node=""> </span><span data-dcnode-id="700" style="color: #0000ff;"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astrophotography-cameras/" style="color: #0000ff;"><span data-dcnode-id="702" instrument_node="">Astrophotography Cameras</span></a></span></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">A Sky Tracker Mount:</span></strong></h3><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="693" instrument_node="">By attaching my DSLR camera and lens to the </span><span data-dcnode-id="690" style="color: #0000ff;"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/ioptron-skytracker-pro-review/" style="color: #0000ff;"><span data-dcnode-id="692" instrument_node="">iOptron SkyTracker Pro</span></a></span><span data-dcnode-id="689" instrument_node=""> camera mount, I am able to shoot long exposures of 2 minutes or more without star-trailing. To do this, the mount must be properly polar-aligned and mounted to a sturdy&nbsp;tripod to avoid any star trailing.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">The built-in polar axis finder scope makes this process rather quick and easy, as long as you know where to position the North Star in the illuminated reticle. I use the Polar Finder app on my Android smartphone to gather this information.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">With a ball-head attached to the mount, it’s easy to point your camera in a variety of handy upward directions to photograph the night sky. I use the iOptron branded ball-head mount, which has been extremely reliable and secure when used with my Canon DSLR’s and wide-angle lenses.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">When everything is secure and polar aligned, the astrophotography potential of this affordable star tracker is tremendous.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676" style="text-align: center;"><img alt="iOptron SkyTracker" class="aligncenter wp-image-7821" data-dcnode-id="677" height="491" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2017/11/wide-angle-camera-lens-astrophotography.jpg&amp;raw" width="400"></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">&nbsp;</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="665" style="text-align: center;"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Related Post:</span></strong><span data-dcnode-id="669" instrument_node=""> </span><span data-dcnode-id="666" style="color: #0000ff;"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/polar-alignment/" style="color: #0000ff;"><span data-dcnode-id="668" instrument_node="">How to Polar Align Your Telescope</span></a></span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">This little red box was designed specifically for lightweight and portable long exposure nightscape astrophotography. The uncomplicated nature and proven capabilities of this camera mount easily make the SkyTracker one of my favorite pieces of astrophotography gear I’ve ever used.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h3 data-dcnode-id="658"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">A Sturdy Tripod</span></strong></h3><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">I use a lightweight carbon fiber camera tripod to keep the SkyTracker steady and accurately tracking the apparent movement of the night sky. The model I use is extremely lightweight, and perhaps not sturdy enough for some imagers. I compensate for this by hanging my camera bag from the center column to lower the center of gravity.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">I’ve owned many heavy aluminum tripods in the past, and I prefer a lightweight carbon fiber tripod that is easy to pack and collapses small enough to fit into a backpack or camera bag. With an accurate polar alignment being critical to the success of your astrophoto, having a tripod that won’t budge during your imaging session is a must.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h3 data-dcnode-id="648"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">A Remote Shutter Release Cable</span></strong></h3><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The imaging sequence is automated using a remote shutter release cable with a built-in timer. I can choose the exposure length, number of shots, and set a delay between each shot. (A delay can help reduce noise by letting the sensor cool down between shots)</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="643" instrument_node="">This inexpensive model&nbsp;I found on </span><span data-dcnode-id="640" style="color: #0000ff;"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2LWfFN2" style="color: #0000ff;"><span data-dcnode-id="642" instrument_node="">Amazon</span></a></span><span data-dcnode-id="639" instrument_node=""> has served me well for years and runs on two triple-a batteries.&nbsp;The internal lithium-ion battery in the SkyTracker camera mount, camera battery,&nbsp;and the remote shutter release cable make this a completely portable astrophotography rig that takes up very little space when traveling. (I use an AC adapter to power the camera when possible)</span></p><span data-dcnode-id="637" instrument_node="">
</span><h3 data-dcnode-id="635" style="text-align: center;"><img alt="remote shutter release cable" class="aligncenter wp-image-8611 size-medium" data-dcnode-id="636" height="320" loading="lazy" sizes="(max-width: 545px) 100vw, 545px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/02/remote-shutter-release-cable-545x320.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/02/remote-shutter-release-cable-545x320.jpg 545w, https://astrobackyard.com/wp-content/uploads/2018/02/remote-shutter-release-cable.jpg 650w" width="545"></h3><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626" style="text-align: center;"><strong data-dcnode-id="627"><em data-dcnode-id="628"><span data-dcnode-id="633" instrument_node="">The Remote Shutter Release Cable I Use (</span><span data-dcnode-id="630" style="color: #0000ff;"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2LWfFN2" style="color: #0000ff;"><span data-dcnode-id="632" instrument_node="">Amazon</span></a></span><span data-dcnode-id="629" instrument_node="">)</span></em></strong></p><span data-dcnode-id="625" instrument_node="">
</span><h3 data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">A DSLR Camera</span></strong></h3><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">The camera I use for most of my DSLR astrophotography is a Canon EOS Rebel T3i (600D) that has been full-spectrum modified for astrophotography. The modification involved removing the stock IR cut filter in the camera to capture more “reds” in certain nebulae. Although it helps to reveal certain areas of nebulae, an Astro-modified DSLR is not necessary to produce stunning images of the Milky Way.</span></p><span data-dcnode-id="618" instrument_node="">
</span><h2 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Recommended Astrophotography Lens</span></h2><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="614" instrument_node="">The camera lens used for the Milky Way photos in this post is the </span><span data-dcnode-id="611" style="color: #0000ff;"><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/rokinon-14mm-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="613" instrument_node="">Rokinon 14mm F/2.8</span></a></span><span data-dcnode-id="610" instrument_node="">. This lens is widely regarded in the astrophotography community as a great affordable camera lens for Milky Way photography. At 14mm, the Rokinon offers the widest field of view of all my camera lenses. It’s also one of the fastest ways for me to collect starlight thanks to an f-ratio of F/2.8.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="607" instrument_node="">Late last year, I announced the purchase of this budget-friendly astrophotography lens on </span><span data-dcnode-id="604" style="color: #0000ff;"><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/astrobackyard/" style="color: #0000ff;"><span data-dcnode-id="606" instrument_node="">Facebook</span></a></span><span data-dcnode-id="603" instrument_node="">, and was pleasantly surprised with the example images being shared using it. My early testing on the Winter and Spring constellations were promising, but it was the Summer Milky Way I was really interested in capturing.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599" style="text-align: center;"><img alt="Rokinon 14mm F/2.8 lens for Canon" class="alignnone wp-image-8615 size-full" data-dcnode-id="600" height="358" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/02/rokinon-14mm-lens-for-canon.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/02/rokinon-14mm-lens-for-canon.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/02/rokinon-14mm-lens-for-canon-545x300.jpg 545w" width="650"></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="594" style="text-align: center;"><strong data-dcnode-id="595"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">The Rokinon 14mm F/2.8 Lens used for the Milky Way images below</span></em></strong></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">This is a completely manual lens, meaning you need to turn a dial to adjust the aperture (You cannot adjust this in-camera). Although this lens lacks autofocus and image stabilization, these features go unused during long exposure nightscape astrophotography. I have found that stopping the f-ratio of this lens down to F/3.2 produces better results in terms of star quality.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">When it comes to photographing The Milky Way, it’s tough to beat the affordability and performance offered by a portable setup like this.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="584" style="text-align: center;"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/The_Milky_Way_2018.jpg"><img alt="Photograph The Milky Way" class="aligncenter wp-image-9253 size-full" data-dcnode-id="586" height="431" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/the_milky_way.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/the_milky_way.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/the_milky_way-545x361.jpg 545w" width="650"></a></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="577" style="text-align: center;"><strong data-dcnode-id="578"><em data-dcnode-id="579"><span data-dcnode-id="582" instrument_node="">The Milky Way using the Rokinon 14mm F/2.8 Lens</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
</span></em></strong></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The photo above uses 60 x 2-minute exposures at taken at ISO 1600. The camera lens was fixed at a focal length of 14mm, and the f-ratio was set to F/3.2 for a sharper image.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The image frames were registered and stacked using DeepSkyStacker to improve the signal-to-noise ratio. The 2 hours of integration time produced a final high-resolution photo of the Milky Way with reduced noise and much more detail.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="567"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Camera Settings</span></strong></h3><span data-dcnode-id="566" instrument_node="">
</span><ul data-dcnode-id="539"><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="561" style="text-align: left;"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Exposure:</span></strong><span data-dcnode-id="562" instrument_node=""> 120 seconds</span></li><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="556" style="text-align: left;"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">ISO:</span></strong><span data-dcnode-id="557" instrument_node=""> 1600</span></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="551" style="text-align: left;"><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">F-Stop:</span></strong><span data-dcnode-id="552" instrument_node=""> F/3.2</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="546" style="text-align: left;"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">White Balance:</span></strong><span data-dcnode-id="547" instrument_node=""> Auto</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="541" style="text-align: left;"><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Number of Frames:</span></strong><span data-dcnode-id="542" instrument_node=""> 60</span></li><span data-dcnode-id="540" instrument_node="">
</span></ul><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">As you can see, the white balance settings on your camera are not important, as long as you are shooting in RAW file format. Shooting in RAW allows you to adjust individual parameters such as white balance after-the-fact, during post-processing. There are many excellent ways to process a photo of the Milky Way (including making edits in Adobe Camera Raw), but my personal preference is to stack the unedited image files in DeepSkyStacker first.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">This registers the frames so that the stars align with each other, and then stacks them together to reduce noise and improve detail. The final stacked image that DSS produces can then be further tweaked in Adobe Photoshop to pull out all of the colorful information living within the data. The entire process is much more enjoyable when the images were captured from a dark sky site with little to no light pollution.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="529" style="text-align: center;"><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/the-summer-triangle-astrobackyard.jpg"><img alt="The Summer Triangle" class="aligncenter wp-image-9271 size-full" data-dcnode-id="531" height="432" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/cygnus.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/cygnus.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/cygnus-545x362.jpg 545w" width="650"></a></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="524" style="text-align: center;"><strong data-dcnode-id="525"><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The Summer Triangle and the Milky Way from Cherry Springs</span></em></strong></p><span data-dcnode-id="523" instrument_node="">
</span><h2 data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">How it works</span></h2><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">The SkyTracker camera mount slowly turns it’s RA (Right Ascension) axis at the same speed the night sky appears to be moving. It compensates for the rotation of the Earth and freezes your target for a long exposure photo. A great photo of the Milky Way can be produced when you combine several images together of 60-seconds or more. The stacking process improves the signal-to-noise ratio, and allows you to collect much more detail than you ever could in a single shot.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">With a wide-angle lens and a DSLR camera, exposures of up to 3-minutes or longer are possible on the SkyTracker Pro. The images will reveal much more detail in the Milky Way than it is possible to see with the naked eye, and will not suffer from star-trailing.&nbsp; The same concept applies to deep sky astrophotography, but on a more complex level. (Balance and polar alignment accuracy become critical for a clean shot).</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="507" style="text-align: center;"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Related Article:</span></strong><span data-dcnode-id="511" instrument_node=""> </span><span data-dcnode-id="508" style="color: #0000ff;"><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/beginner-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="510" instrument_node="">Getting Started in Astrophotography</span></a></span></p><span data-dcnode-id="506" instrument_node="">
</span><h2 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Deep Sky Target: The Trifid Nebula</span></h2><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="502" instrument_node="">I couldn’t spend time photographing the Milky Way without also capturing a deep sky object through my telescope. While my DSLR camera and lens fired away at the heavens, I commisioned the </span><span data-dcnode-id="499" style="color: #0000ff;"><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/explore-scientific-ed140/" style="color: #0000ff;"><span data-dcnode-id="501" instrument_node="">Explore Scientific ED140</span></a></span><span data-dcnode-id="498" instrument_node=""> refractor to collect light on the colorful Trifid Nebula.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">To carry a large refractor telescope of this size effortlessly across the sky required a tracking telescope mount with an adequate payload capacity.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="492" instrument_node="">Having never traveled with the </span><span data-dcnode-id="489" style="color: #0000ff;"><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astrophotography-mount/" style="color: #0000ff;"><span data-dcnode-id="491" instrument_node="">iOptron CEM60 mount</span></a></span><span data-dcnode-id="488" instrument_node=""> before, I spent a large amount of time making sure it was properly leveled and polar aligned when I arrived at Cherry Springs. The campers next to me both owned CEM60’s as well and gave me some pointers on how to position the center pier in a more practical position. (The higher the pier, the less worry there is of a long telescope running into the mount)</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="483" style="text-align: center;"><strong data-dcnode-id="484"><img alt="astrophotography equipment" class="aligncenter size-full wp-image-9264" data-dcnode-id="485" height="351" loading="lazy" sizes="(max-width: 622px) 100vw, 622px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/astrophotography-equipment.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/astrophotography-equipment.jpg 622w, https://astrobackyard.com/wp-content/uploads/2018/06/astrophotography-equipment-545x308.jpg 545w" width="622"></strong></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="476" style="text-align: center;"><strong data-dcnode-id="477"><em data-dcnode-id="478"><span data-dcnode-id="481" instrument_node="">The iOptron CEM60 Mount with an Explore Scientific ED140</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
</span></em></strong></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">With my DSLR in use on the SkyTracker, I decided to use a cooled CMOS camera (ZWO ASI294MC-Pro) under dark skies for the first time. This proved to be a ground-breaking experience, as this combination is capable of producing results not possible in the city. I envy the astrophotographers with dark skies in their backyard, as this trip reminded me of just how much easier everything is when processing. (More on this later)</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">As dusk set in, I corrected my rough polar alignment and ran a 3-star alignment routine. With the ASI294MC-Pro camera attached, I use the live view mode of Astro Photography Tool to center my alignment stars in the field of view. The William Optics Star Spikes Bahtinov mask creates intense star diffraction spikes that not only aid in focus, but shows the direction of my alignment star even when it is not in the field of view. (The long edges of the star spikes will enter the frame)</span></p><span data-dcnode-id="469" instrument_node="">
</span><h2 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Target Acquired: The Trifid Nebula</span></h2><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">I chose the Trifid Nebula because it sits low on the horizon here in the Northern Hemisphere. This makes it difficult to capture from my backyard, so this was my best chance to catch it this summer. This nebula is a combination of an emission nebula and reflection nebula in one, giving it a pink and blue appearance. It’s one of the most iconic and colorful deep sky objects in the night sky and a target that inspired me to get into astrophotography early on.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="460" style="text-align: center;"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/astrophotography/comments/8tae50/the_trifid_nebula_w_a_140mm_apo_refractor/" rel="noopener noreferrer" target="_blank"><img alt="M20 - The Trifid Nebula" class="aligncenter wp-image-9266 size-full" data-dcnode-id="462" height="497" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/M20-the-trifid-nebula.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/M20-the-trifid-nebula.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/M20-the-trifid-nebula-545x417.jpg 545w" width="650"></a></p><span data-dcnode-id="459" instrument_node="">
</span><h3 data-dcnode-id="454"><strong data-dcnode-id="455"><span data-dcnode-id="458" instrument_node="">Image Details</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
</span></strong></h3><span data-dcnode-id="453" instrument_node="">
</span><ul data-dcnode-id="428"><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="448"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Exposure Time:</span></strong><span data-dcnode-id="449" instrument_node=""> 61 x 3-minutes (3 Hours, 3 Minutes Total)</span></li><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="440"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Camera: </span></strong><span data-dcnode-id="444" instrument_node="">ZWO ASI294MC-Pro</span><strong data-dcnode-id="441"><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
</span></strong></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="435"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Binning:</span></strong><span data-dcnode-id="436" instrument_node=""> 2×2</span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="430"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Filter:</span></strong><span data-dcnode-id="431" instrument_node=""> Astromania Luminance</span></li><span data-dcnode-id="429" instrument_node="">
</span></ul><span data-dcnode-id="427" instrument_node="">
</span><h2 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">About the Cherry Springs Star Party</span></h2><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="423" instrument_node="">The dark skies are by far the biggest appeal when it comes to the </span><span data-dcnode-id="420" style="color: #0000ff;"><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cherrysprings.org/" style="color: #0000ff;"><span data-dcnode-id="422" instrument_node="">Cherry Springs Star Party</span></a></span><span data-dcnode-id="419" instrument_node="">. However, there is much more to this event than that. There are interesting talks given by industry professionals and astronomy enthusiast inside the on-site pavilion during the day. These astronomy presentations discuss everything from current space program endeavors to beginner astrophotography tips and advice. In fact, there is a good chance I will be giving a talk on beginner deep sky astrophotography at next years event!</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">There are vendor booths set up during the day with an impressive assortment of astronomy gear and accessories available for purchase and inquiries. The The 24-hour snack bar caters to astronomers by offering items such as coffee and pizza at all hours of the night. The CSSP is truly meant for astronomers, at an incredible IDA (International Dark Sky Association) site.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="407" style="text-align: center;"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Related Post:</span></strong><span data-dcnode-id="411" instrument_node=""> </span><span data-dcnode-id="408" style="color: #0000ff;"><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/cherry-springs-star-party-2017/" style="color: #0000ff;"><span data-dcnode-id="410" instrument_node="">The 2017 Cherry Springs Star Party</span></a></span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404" style="text-align: center;"><img alt="CSSP" class="aligncenter size-full wp-image-9268" data-dcnode-id="405" height="321" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/cherry-springs.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/cherry-springs.jpg 600w, https://astrobackyard.com/wp-content/uploads/2018/06/cherry-springs-545x292.jpg 545w" width="600"></p><span data-dcnode-id="403" instrument_node="">
</span><h2 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Amateur Astrophotographers at the Park</span></h2><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">The number of deep sky imaging setups on the field at Cherry Springs is staggering. Clearly, astrophotography is a top priority for many (if not most) of the attendees of the event. I met some wonderful new astrophotography friends at the star party this year.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="396" instrument_node="">With common bonds in such a specific hobby, it’s easy to hit it off in a hurry. One of those gentlemen was Adam, also known as </span><span data-dcnode-id="393" style="color: #0000ff;"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com/user/265217-reddog1972/" style="color: #0000ff;"><span data-dcnode-id="395" instrument_node="">reddog1972</span></a></span><span data-dcnode-id="392" instrument_node=""> on Cloudy Nights. Adam absolutely floored me with the results he was getting using his 2 Orion equatorial telescope mounts. He captured exquisite portraits of objects like the Lagoon Nebula, Trifid Nebula, and even the Andromeda Galaxy.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="389" instrument_node="">Perhaps the most impressive part was that his shots were </span><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">unguided</span></strong><span data-dcnode-id="386" instrument_node="">, using affordable astrophotography mounts. I have recommended the </span><span data-dcnode-id="383" style="color: #0000ff;"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dpbolvw.net/click-8129787-10514497%3Furl%3Dhttp%253A%252F%252Fwww.telescope.com%252Fcatalog%252Fproduct.jsp%253FproductId%253D116276%2526id%253Dcjdf%26cjsku%3D116276" style="color: #0000ff;"><span data-dcnode-id="385" instrument_node="">Orion Sirius EQ-G Computerized GoTo Telescope Mount</span></a></span><span data-dcnode-id="382" instrument_node=""> to beginners for many years, and Adam validated the practicality of this advice once more with his incredible images taken at Cherry Springs.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><img alt="The Lagoon and Trifid Nebulae" class="size-full wp-image-9236 aligncenter" data-dcnode-id="379" height="455" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/the-lagoon-and-trifid.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/the-lagoon-and-trifid.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/the-lagoon-and-trifid-545x382.jpg 545w" width="650"></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="373" style="text-align: center;"><em data-dcnode-id="374"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">The Lagoon and Trifid Nebulae by Adam Toder(reddog1972 on Cloudy Nights)</span></strong></em></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Id like to thank the organizers of this event for an amazing time, and also the welcoming vendors and attendees. The star party lives up to the high expectations of an event held in such a remarkable location. From the friendly service at the 24-hour snack bar, to the bathroom facilities lit up in red lights – Cherry Springs is probably one of the best places on Earth to photograph the Milky Way.</span></p><span data-dcnode-id="369" instrument_node="">
</span><h2 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Upcoming Image Processing Tutorial</span></h2><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">For those interested in a Milky Way image processing tutorial, I will be publishing an updated video on my YouTube channel later this month. I will walk you through the steps taken in DeepSkyStacker and Adobe Photoshop to turn the single 2-minute image frames into the final image you see on this page. This will include any additional actions or plugins used to produce a high-resolution image for online sharing or print. Stay tuned!</span></p><span data-dcnode-id="363" instrument_node="">
</span><h3 data-dcnode-id="360"><strong data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Update:</span></strong></h3><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">I just recorded a Milky Way image-processing tutorial in Photoshop. The video below walks you through the stacking stage, right through to the final actions used to enhance the beautiful colors and details of the Milky Way:</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="352" style="text-align: center;"><span data-dcnode-id="353" style="color: #0000ff;"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/yACQ3x5dTko" style="color: #0000ff;"><span data-dcnode-id="355" instrument_node="">Video: How to Edit Milky Way Photos in Photoshop</span></a></span></p><span data-dcnode-id="351" instrument_node="">
</span><h2 data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">A summary of the astrophotography equipment used on this trip:</span></h2><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346" style="text-align: center;"><img alt="astrophotography" class="aligncenter size-full wp-image-9279" data-dcnode-id="347" height="393" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/06/astrophotography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/06/astrophotography.jpg 650w, https://astrobackyard.com/wp-content/uploads/2018/06/astrophotography-545x330.jpg 545w" width="650"></p><span data-dcnode-id="345" instrument_node="">
</span><h3 data-dcnode-id="342"><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Cameras:</span></strong></h3><span data-dcnode-id="341" instrument_node="">
