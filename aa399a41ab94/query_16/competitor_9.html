</span><div class="matching-course-ribbon" data-dcnode-id="1792"><span data-dcnode-id="1802" instrument_node="">
</span><div data-dcnode-id="1794"><span data-dcnode-id="1801" instrument_node="">
</span><strong data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Related course: </span></strong><span data-dcnode-id="1798" instrument_node="">
</span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/sp/p07-milky-way-mastery-ad/%3Fcf_1%3Dribbon" target=""><span data-dcnode-id="1797" instrument_node="">Milky Way Mastery</span></a><span data-dcnode-id="1795" instrument_node="">
</span></div><span data-dcnode-id="1793" instrument_node="">
</span></div><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1790" instrument_node="">One of the most popular types of night photography is capturing the night sky. By photographing the bright stars that form the Milky Way, you can really </span><a data-dcnode-id="1788" data-lasso-id="115462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/milky-way-photography-settings/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1789" instrument_node="">create some stunning photos</span></a><span data-dcnode-id="1787" instrument_node="">. But it’s is not always easy. If you don’t know how to do it, finding the Milky Way can seem like a daunting task.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">There are a lot of misconceptions about how to find the Milky Way in the night sky. This post aims to clear that up. Read on to learn that how to find the Milky Way is actually a lot simpler than you may think!</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><img alt="A landscape photo at night with the milky way" class="aligncenter size-full wp-image-288141" data-dcnode-id="1781" height="426" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-landscape.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-landscape.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-landscape-300x183.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-landscape-200x122.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-landscape-165x100.jpg 165w" width="700"></p><span data-dcnode-id="1779" instrument_node="">
</span><div class="see-guide" data-dcnode-id="1770"><span data-dcnode-id="1778" instrument_node="">
</span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/sp/p07-milky-way-mastery-ad/%3Fcf_1%3Dblog-banner" target="_blank"><span data-dcnode-id="1777" instrument_node="">
</span><img alt="" class="stg-desktop" data-dcnode-id="1776" height="343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2020/12/P07_Blog-Post-Banner_Desktop.jpg&amp;raw" width="1200"><span data-dcnode-id="1775" instrument_node="">
</span><img alt="" class="stg-mobile" data-dcnode-id="1774" height="302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2020/12/P07_Blog-Post-Banner_Mobile.jpg&amp;raw" width="400"><span data-dcnode-id="1773" instrument_node="">
</span></a><span data-dcnode-id="1771" instrument_node="">
</span></div><span data-dcnode-id="1769" instrument_node="">
</span><span data-dcnode-id="1766" instrument_node="">
</span><h2 data-dcnode-id="1762"><span class="ez-toc-section" data-dcnode-id="1765" id="Where_Is_The_Milky_Way_in_the_Night_Sky"></span><span data-dcnode-id="1764" instrument_node="">Where Is The Milky Way in the Night Sky?</span><span class="ez-toc-section-end" data-dcnode-id="1763"></span></h2><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">The Milky Way is, in fact, the galaxy that contains the Solar System. The Milky Way is everywhere we look. Up, down, left, right, that is the Milky Way.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">From Earth, it can be seen as a hazy form of stars in the night sky that the naked eye can barely notice.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">You can see the Milky Way all year, no matter where you are in the world. It’s visible just so long as the sky is clear and the light pollution is minimal.&nbsp; However, the Milky Way also appears to move in the sky, as the Earth rotates.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1751" instrument_node="">Have a look at this image below, shot at about 1 am:</span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node="">
</span><img alt="The Milky Way above the silhouette of a rock formation" class="aligncenter wp-image-17901 size-full" data-dcnode-id="1748" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/03/Night-Photography-Course-Joshua-Tree-April-2016-April-13-2016-43.jpg&amp;raw" width="700"><span data-dcnode-id="1747" instrument_node="">And compare it to this image, shot at about 4:30 am:</span><br data-dcnode-id="1746"><span data-dcnode-id="1745" instrument_node="">
</span><img alt="The Milky Way above a rock formation" class="aligncenter wp-image-17900 size-full" data-dcnode-id="1744" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/03/Night-Photography-Course-Joshua-Tree-April-2016-April-13-2016-161.jpg&amp;raw" width="700"><span data-dcnode-id="1743" instrument_node="">The location is almost the same, but you will notice that the Milky Way appears to move. Depending on the time of year, this may or may not be visible, depending on where you are.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><h2 data-dcnode-id="1737"><span class="ez-toc-section" data-dcnode-id="1740" id="How_Do_You_Locate_the_Milky_Way"></span><span data-dcnode-id="1739" instrument_node="">How Do You Locate the Milky Way?</span><span class="ez-toc-section-end" data-dcnode-id="1738"></span></h2><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">To see the Milky Way at night, you need all three of the following:</span></p><span data-dcnode-id="1733" instrument_node="">
</span><ol data-dcnode-id="1716"><span data-dcnode-id="1732" instrument_node="">
</span><li data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">a clear sky – there should be no clouds;</span></li><span data-dcnode-id="1729" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">minimal light pollution – too much extra light washes out the details in the </span><a data-dcnode-id="1726" data-lasso-id="115465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/getting-started-with-deep-sky-astrophotography/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1727" instrument_node="">night sky</span></a><span data-dcnode-id="1725" instrument_node="">; and</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node="">no moon – </span><a data-dcnode-id="1720" data-lasso-id="115468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/how-to-photograph-the-moon/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1721" instrument_node="">the moon</span></a><span data-dcnode-id="1719" instrument_node=""> is brighter than you think and will reduce the visible intensity of the Milky Way.</span></li><span data-dcnode-id="1717" instrument_node="">
</span></ol><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Only when all three of these conditions are met will you be able to see the Milky Way in all its glory. As mentioned before, it also depends on where in the world you are, and what time of year.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1708"><span class="ez-toc-section" data-dcnode-id="1711" id="Clear_Sky"></span><span data-dcnode-id="1710" instrument_node="">Clear Sky</span><span class="ez-toc-section-end" data-dcnode-id="1709"></span></h3><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Because you need a clear sky, it is best to look for the Milky Way during the summer months. Check the weather and try to go out on a night when the sky is clear and there are no clouds.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">Aim for less than 10% cloud cover. To help you out, </span><a data-dcnode-id="1701" data-lasso-id="115471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleardarksky.com/csk/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1702" instrument_node="">Clear Sky Chart</span></a><span data-dcnode-id="1700" instrument_node=""> is a good resource for astronomers that tells you when the sky will be clear and dark at specific observing sites – including national parks – across North America.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><h3 data-dcnode-id="1694"><span class="ez-toc-section" data-dcnode-id="1697" id="Light_Pollution"></span><span data-dcnode-id="1696" instrument_node="">Light Pollution</span><span class="ez-toc-section-end" data-dcnode-id="1695"></span></h3><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">When looking for the Milky Way, it is extremely important to go to a dark location far from the city.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Light pollution is caused by all the excessive artificial light in cities. This extra light reduces the ability to see stars. You may have to drive out more than 150 miles from a big city until you get to the true dark sky – according to the Bortle Dark Sky Scale.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><h3 data-dcnode-id="1683"><span class="ez-toc-section" data-dcnode-id="1686" id="Moonlight"></span><span data-dcnode-id="1685" instrument_node="">Moonlight</span><span class="ez-toc-section-end" data-dcnode-id="1684"></span></h3><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">If you are looking for the Milky Way on a night when the moon is shining bright, you will not be able to see it. The sky has to be very dark to see the stars of the galaxy with your naked eye. The presence of the moon will wash out the light of the stars, just like light pollution from the cities.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><img alt="photo of the milky way on the night sky" class="aligncenter size-full wp-image-102742" data-dcnode-id="1678" height="467" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-cover.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-cover.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-cover-300x200.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-cover-200x133.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2018/03/milky-way-cover-165x110.jpg 165w" width="700"></p><span data-dcnode-id="1676" instrument_node="">
</span><h2 data-dcnode-id="1672"><span class="ez-toc-section" data-dcnode-id="1675" id="Understanding_Moon_Phases_for_Maximum_Shooting_Time"></span><span data-dcnode-id="1674" instrument_node="">Understanding Moon Phases for Maximum Shooting Time</span><span class="ez-toc-section-end" data-dcnode-id="1673"></span></h2><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">I have mentioned above that to see the Milky Way, you need a clear sky, the absence of any moonlight, and minimal light pollution.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">We all know how to check the weather, and finding an area with very little light pollution is simple enough to figure out. But understanding the moon’s phases is a little bit more complicated. It is important to find the best times to see the Milky Way.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1664" instrument_node="">For the best results, we want to </span><a data-dcnode-id="1662" data-lasso-id="115474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/how-to-photograph-milky-way/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1663" instrument_node="">photograph the Milky Way</span></a><span data-dcnode-id="1661" instrument_node=""> during the period of ‘full darkness’. That is when there is no moon to wash out the stars. Full darkness is at its longest during the new moon and during winter months.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">So, the best times to see the Milky Way are during times of a new moon, when the moon is completely hidden in the sky. You can also manage to see the Milky Way a week before or after a new moon. But, if the moon is in its first quarter or more, the moonlight will make the sky too bright for you to be able to see the Milky Way.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1655" instrument_node="">Compare the duration of full darkness (the dark navy blue section at the top) below during </span><a data-dcnode-id="1653" data-lasso-id="115477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/summer-photography-ideas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1654" instrument_node="">summer</span></a><span data-dcnode-id="1652" instrument_node="">. It is about 2 hours long.</span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">
</span><img alt="Screenshot of Finding The Milky Way: full darkness, summer new moon" class="aligncenter wp-image-17920 size-full" data-dcnode-id="1649" height="622" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/03/full-darkness-moon-summer-new-moon.png&amp;raw" width="700"></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">Compare the same duration during the new moon, and you will see the time has reduced by 33 minutes.</span><br data-dcnode-id="1645"><span data-dcnode-id="1644" instrument_node="">
</span><img alt="Screenshot of Finding The Milky Way: full darkness diagram screenshot - full moon" class="aligncenter wp-image-17919 size-full" data-dcnode-id="1643" height="622" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/03/full-darkness-moon-summer-full-moon.png&amp;raw" width="700"></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">For maximum photography time, take your photos of the Milky Way during the new moon, in the winter. As soon as astronomical dawn shows its face, those stars will disappear.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1637" instrument_node="">The apps I use to track this are called Deluxe Moon and Sol, and you can read more about them here: </span><a data-dcnode-id="1635" data-lasso-id="115480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/apps-night-milky-way-photography/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1636" instrument_node="">Apps for Night-Time and Milky Way Photography</span></a></p><span data-dcnode-id="1633" instrument_node="">
</span><h3 data-dcnode-id="1628"><span class="ez-toc-section" data-dcnode-id="1632" id="Time_of_Night"></span><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Time of Night&nbsp;</span></strong><span class="ez-toc-section-end" data-dcnode-id="1629"></span></h3><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Different times of the night will also affect how you can see the Milky Way. For this, you need to understand the various phases of the night.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1623" instrument_node="">As the sun sets, the sky transitions into the </span><a data-dcnode-id="1621" data-lasso-id="115483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/what-is-golden-hour-photography/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1622" instrument_node="">golden hour</span></a><span data-dcnode-id="1620" instrument_node=""> and then the </span><a data-dcnode-id="1618" data-lasso-id="115486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/blue-hour-photography-techniques/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1619" instrument_node="">blue hour</span></a><span data-dcnode-id="1617" instrument_node="">. This time of transition, or twilight, can be divided into three phases. These phases are civil twilight, nautical twilight, and astronomical twilight. They depend on the angle of the sun. Exact sunset and sunrise are when the sun is 0 degrees to the horizon. After sunset comes civic, then nautical, and lastly astronomical twilight when the sun is 18 degrees below the horizon. After this, the sky is the darkest it will be throughout the night.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node="">When the sun is beginning to rise again at dawn, the sky again goes through the three phases of twilight. But this time, it is in reverse order. First will come astronomical, then nautical, and finally civic twilight before the </span><a data-dcnode-id="1612" data-lasso-id="115489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/how-to-get-started-with-sunrise-photography/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1613" instrument_node="">sun rises</span></a><span data-dcnode-id="1611" instrument_node="">.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">The best time to see the Milky Way is when it’s darkest, after astronomical twilight at dusk and before astronomical twilight at dawn. This duration is longest in winter months.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><img alt="photo of the sun setting" class="aligncenter size-full wp-image-308465" data-dcnode-id="1605" height="445" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-sunset.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-sunset.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-sunset-300x191.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-sunset-200x127.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-sunset-165x105.jpg 165w" width="700"></p><span data-dcnode-id="1603" instrument_node="">
</span><h2 data-dcnode-id="1599"><span class="ez-toc-section" data-dcnode-id="1602" id="What_Time_of_Year_to_See_the_Milky_Way"></span><span data-dcnode-id="1601" instrument_node="">What Time of Year to See the Milky Way</span><span class="ez-toc-section-end" data-dcnode-id="1600"></span></h2><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">If the Milky Way is just the entire collection of stars, how does it change throughout the year?</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">This is because the Milky Way has a core called the Galactic Centre. This is its rotational centre that is surrounded by dust, gas, and stars. It is the most intense and dramatic part of the Milky Way. So this is what you should aim to capture.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">It’s from March to September in the Northern Hemisphere, and September to March in the Southern Hemisphere, when you will get the most interesting view of the Milky Way. This is due to the way the earth spins around on its axis, and how the angle changes in different seasons.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">The most interesting angle of the Milky Way is when the Galactic Centre is almost vertical to the horizon. This is when the stars look the brightest and it’s the most intense.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node="">This photo below was taken in early April, and you can see how the Milky Way is rising horizontally across the sky.</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
</span><img alt="the Milky Way rising horizontally across the sky in the Northern Hemisphere" class="aligncenter wp-image-17904 size-full" data-dcnode-id="1582" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/03/Night-Photography-Course-Joshua-Tree-April-2016-April-13-2016-21.jpg&amp;raw" width="700"><span data-dcnode-id="1581" instrument_node="">Compare that to this photo, taken in the summer, and you will see that it is almost vertical as it appears to rotate.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1576"><img alt="The night sky with the Milky Way appearing vertically" class="aligncenter size-full wp-image-308426" data-dcnode-id="1578" height="432" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-vertical.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-vertical.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-vertical-300x185.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-vertical-200x123.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-photography-vertical-165x102.jpg 165w" width="700"><span data-dcnode-id="1577" instrument_node="">A trained eye can actually tell you when the photo was taken, based on the position of the Milky Way. It starts horizontal in March in the Northern Hemisphere and rotates 180 degrees through the months up until September.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><h2 data-dcnode-id="1571"><span class="ez-toc-section" data-dcnode-id="1574" id="How_Do_We_Know_What_the_Milky_Way_Looks_Like"></span><span data-dcnode-id="1573" instrument_node="">How Do We Know What the Milky Way Looks Like?</span><span class="ez-toc-section-end" data-dcnode-id="1572"></span></h2><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">The simplest answer to this is because we can look up at the sky and see it. Sure, we only have one perspective of the Milky Way, but it is the only one that matters to us, really.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">To know what it looks like from the outside, scientists use radio waves, infrared and ultraviolet wavelengths to create a more accurate view of the Milky Way.</span><br data-dcnode-id="1565"><span data-dcnode-id="1564" instrument_node="">
</span><img alt="Image of the milky way from space " class="size-full wp-image-267532 aligncenter" data-dcnode-id="1563" height="394" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-1.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-1.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-1-300x169.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-1-200x113.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/milky-way-1-165x93.jpg 165w" width="700"></p><span data-dcnode-id="1561" instrument_node="">
</span><h2 data-dcnode-id="1557"><span class="ez-toc-section" data-dcnode-id="1560" id="How_to_Find_The_North_Star_at_Night"></span><span data-dcnode-id="1559" instrument_node="">How to Find The North Star at Night</span><span class="ez-toc-section-end" data-dcnode-id="1558"></span></h2><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node="">It is important to be able to find the North Star in the </span><a data-dcnode-id="1553" data-lasso-id="115492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/mastering-creative-night-photography/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1554" instrument_node="">night sky</span></a><span data-dcnode-id="1552" instrument_node=""> because that is the star around which all other stars rotate.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Finding the North Star is not that hard, and there are a couple of ways of doing it. You can ‘cheat’ and use an app. There are many astronomy apps, such as the following:</span></p><span data-dcnode-id="1547" instrument_node="">
</span><ul data-dcnode-id="1527"><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1542"><a data-dcnode-id="1544" data-lasso-id="115495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/goskywatch-planetarium-for/id364209241%3Fmt%3D8" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1545" instrument_node="">GoSkyWatch Planetarium</span></a><span data-dcnode-id="1543" instrument_node=""> – on iOS</span></li><span data-dcnode-id="1541" instrument_node="">
</span><li data-dcnode-id="1537"><a data-dcnode-id="1539" data-lasso-id="115498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.gyrocade.starlight" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1540" instrument_node="">Starlight</span></a><span data-dcnode-id="1538" instrument_node=""> – on Android</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1529"><span data-dcnode-id="1535" instrument_node="">SkyView Lite – both on </span><a data-dcnode-id="1533" data-lasso-id="115501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/us/app/skyview-lite/id413936865"><span data-dcnode-id="1534" instrument_node="">iOS</span></a><span data-dcnode-id="1532" instrument_node=""> and </span><a data-dcnode-id="1530" data-lasso-id="115504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.t11.skyviewfree%26hl%3Den_US"><span data-dcnode-id="1531" instrument_node="">Android</span></a></li><span data-dcnode-id="1528" instrument_node="">
</span></ul><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">All you need to do is point your phone up at the night sky. It will align the star with your compass and tell you precisely what you’re looking at.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The other way, which is also my favourite method, is to go the old-fashioned way. Here, you try to find the North Star by first looking for the group of stars known as the Big Dipper. The Big Dipper looks like it does in the image below. It stands out because it looks like a saucepan with a handle. If you follow the far edge of the pan upwards, it points at Polaris, also known as the North Star.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">I prefer this method because it helps you to understand the night sky a bit better. And it also means you don’t have to rely on distracting technology.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><img alt="Milky Way diagram pointing out the Big Dipper, Little Dipper, and Polaris" class="aligncenter wp-image-267535 size-full" data-dcnode-id="1516" height="446" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.b-cdn.net/wp-content/uploads/2017/04/how-to-find-the-north-star.jpg&amp;raw" srcset="https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/how-to-find-the-north-star.jpg 700w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/how-to-find-the-north-star-300x191.jpg 300w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/how-to-find-the-north-star-200x127.jpg 200w, https://expertphotography.b-cdn.net/wp-content/uploads/2017/04/how-to-find-the-north-star-165x105.jpg 165w" width="700"></p><span data-dcnode-id="1514" instrument_node="">
</span><h2 data-dcnode-id="1510"><span class="ez-toc-section" data-dcnode-id="1513" id="Conclusion"></span><span data-dcnode-id="1512" instrument_node="">Conclusion</span><span class="ez-toc-section-end" data-dcnode-id="1511"></span></h2><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">As you can see, finding the Milky Way is not too tough. All you need is a dark, clear sky that is not obstructed by clouds, light pollution, or the moon.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">If you know what time of the year to go out and when the night sky is the darkest, you will be able to find the Milky Way in no time. There are also many tools and apps to help you figure this out.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Now that you know how to find it, you can start to take some amazing long exposure pictures of the night sky!</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1499" instrument_node="">This article will provide you with excellent base knowledge for how to </span><a data-dcnode-id="1497" data-lasso-id="115507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expertphotography.com/milky-way-photography-settings/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1498" instrument_node="">Photograph the Milky Way</span></a><span data-dcnode-id="1496" instrument_node="">. To go one step further, take a look at our </span><a data-dcnode-id="1494" data-lasso-id="115510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expho.to/p07-bp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1495" instrument_node="">Milky</span></a><a data-dcnode-id="1492" data-lasso-id="115513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expho.to/p07-bp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1493" instrument_node=""> Wa</span></a><a data-dcnode-id="1490" data-lasso-id="115516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expho.to/p07-bp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1491" instrument_node="">y</span></a><a data-dcnode-id="1488" data-lasso-id="115519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expho.to/p07-bp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1489" instrument_node=""> Mastery</span></a><span data-dcnode-id="1487" instrument_node=""> course!</span></p><span data-dcnode-id="1485" instrument_node="">
