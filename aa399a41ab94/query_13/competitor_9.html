</span><i class="fa fa-file-o" data-dcnode-id="999"></i><span data-dcnode-id="998" instrument_node="">
          Milky way galaxy
      </span></h3><span data-dcnode-id="996" instrument_node="">
</span><ol class="j-transcripts transcripts no-bullet no-style" data-dcnode-id="847" itemprop="text"><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">
      1.
    MILKY WAY GALAXY
BY VINAY GODSE
 
  </span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">
</span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-2-638.jpg%3Fcb%3D1464679063" target="_blank" title="WHAT IS GALAXY ?????
 A system of millions or billions of ..."><span data-dcnode-id="990" instrument_node="">
        2.
      </span></a><span data-dcnode-id="988" instrument_node="">
    WHAT IS GALAXY ?????
 A system of millions or billions of stars, together with gas
and dust, held together by gravitational attraction.
 A galaxy is a gravitationally bound system of stars, stellar
remnants, interstellar gas, dust, and dark matter.
 At the centre of many galaxies, there is a compact nucleus
that may sometimes be so bright that it overwhelms all the
normal radiation of the galaxy.
 
  </span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">
</span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-3-638.jpg%3Fcb%3D1464679063" target="_blank" title=" All in all, Hubble reveals an estimated 100 billion
galax..."><span data-dcnode-id="984" instrument_node="">
        3.
      </span></a><span data-dcnode-id="982" instrument_node="">
     All in all, Hubble reveals an estimated 100 billion
galaxies in the universe or so, but this number is
likely to increase to about 200 billion as telescope
technology in space improves.
 Most galaxies are 1,000 (3.086*10^16 Km) to 100,000
(3.086*10^19 Km) parsecs in diameter and are
usually separated by distances on the order of
millions of parsecs.
 
  </span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">
</span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-4-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 Our Solar system is located at the outer..."><span data-dcnode-id="978" instrument_node="">
        4.
      </span></a><span data-dcnode-id="976" instrument_node="">
    MILKY WAY GALAXY
 Our Solar system is located at the outer regions
of a spiral galaxy named ‘Milky Way’. The
nearest neighbouring galaxy is the Andromeda
galaxy (M31).
 The Milky Way Galaxy is an immense and very
interesting place. Not only does it measure
some 100000–120000 light-years in diameter, it
is home to our planet.
 
  </span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">
</span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-5-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 The Milky Way Galaxy is our home galaxy ..."><span data-dcnode-id="972" instrument_node="">
        5.
      </span></a><span data-dcnode-id="970" instrument_node="">
    MILKY WAY GALAXY
 The Milky Way Galaxy is our home galaxy in the
universe.
 Its name "milky" is derived from its appearance
as a dim glowing band arching across the night
sky whose individual stars cannot be
distinguished by the naked eye.
 
  </span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">
</span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-6-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 If you could travel outside the galaxy a..."><span data-dcnode-id="966" instrument_node="">
        6.
      </span></a><span data-dcnode-id="964" instrument_node="">
    MILKY WAY GALAXY
 If you could travel outside the galaxy and look
down on it from above, you’d see that the Milky
Way is a barred spiral galaxy measuring about
120,000 light-years across and about 1,000
light-years thick.
 For the longest time, the Milky Way was
thought to have 4 spiral arms, but newer
surveys have determined that it actually seems
to just have 2 spiral arms, called Scutum–
Centaurus and Carina–Sagittarius.
 
  </span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">
</span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-7-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 The spiral arms are formed from density ..."><span data-dcnode-id="960" instrument_node="">
        7.
      </span></a><span data-dcnode-id="958" instrument_node="">
    MILKY WAY GALAXY
 The spiral arms are formed from density waves
that orbit around the Milky Way. As these
density waves move through an area, they
compress the gas and dust, leading to a period
of active star formation for the region.
 However, the existence of these arms has
been determined from observing parts of the
Milky Way – as well as other galaxies in our
universe – and are not the result of seeing our
galaxy as a whole.
 
  </span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">
</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-8-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 Astronomers had long suspected the Milky..."><span data-dcnode-id="954" instrument_node="">
        8.
      </span></a><span data-dcnode-id="952" instrument_node="">
    MILKY WAY GALAXY
 Astronomers had long suspected the Milky Way
was made up of stars, but it wasn’t proven until
1610,
 when Galileo Galilei turned his rudimentary
telescope towards the heavens and resolved
individual stars in the band across the sky. With
the help of telescopes, astronomers realized
that there were many, many more stars in the
sky, and that all of the ones that we can see are
a part of the Milky Way.
 
  </span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">
</span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-9-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 The Milky Way looks brightest toward the..."><span data-dcnode-id="948" instrument_node="">
        9.
      </span></a><span data-dcnode-id="946" instrument_node="">
    MILKY WAY GALAXY
 The Milky Way looks brightest toward the
galactic center, in the direction of Sagittarius.
 The fact that the Milky Way divides the night sky
into two roughly equal hemispheres indicates
that the Solar System lies near the galactic
plane.
 The Milky Way has a relatively low surface
brightness due to the gases and dust that fills
the galactic disk.
 
  </span></li><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">
</span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-10-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 It is further believed that our galaxy f..."><span data-dcnode-id="942" instrument_node="">
        10.
      </span></a><span data-dcnode-id="940" instrument_node="">
    MILKY WAY GALAXY
 It is further believed that our galaxy formed
through the collisions of smaller galaxies, early
in the Universe.
 These mergers are still going on, and the Milky
Way is expected to collide with the Andromeda
galaxy in 3-4 billion years.
 The two galaxies will combine to form a giant
elliptical galaxy, and their super-massive black
holes might even merge.
 
  </span></li><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">
</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-11-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 The Milky Way and Andromeda are part of ..."><span data-dcnode-id="936" instrument_node="">
        11.
      </span></a><span data-dcnode-id="934" instrument_node="">
    MILKY WAY GALAXY
 The Milky Way and Andromeda are part of a
larger collection of galaxies known as the Local
Group.
 And these are contained within an even larger
region called the Virgo Super cluster – a mass
concentration of galaxies that contains at least
100 galaxy groups and clusters within its
diameter of 33 mega parsecs (110 million light-
years).
 
  </span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">
</span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-12-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 That prevents us from seeing the bright ..."><span data-dcnode-id="930" instrument_node="">
        12.
      </span></a><span data-dcnode-id="928" instrument_node="">
    MILKY WAY GALAXY
 That prevents us from seeing the bright galactic
center or from observing clearly what is on the
other side of it.
 Our Sun is located in the Orion Arm, a region of
space in between the two major arms of the
Milky Way, and about 27,000 light years from the
galactic core.
 At the heart of the Milky Way is a super-massive
black hole, just like all of the other galaxies,
known as Sagittarius A*.
 
  </span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">
</span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-13-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 Our Sun takes about 240 million years to..."><span data-dcnode-id="924" instrument_node="">
        13.
      </span></a><span data-dcnode-id="922" instrument_node="">
    MILKY WAY GALAXY
 Our Sun takes about 240 million years to orbit the
Milky Way once, in what is known as a galactic year
(or cosmic year).
 Just imagine, the last time the Sun was at this
region of the galaxy, dinosaurs roamed the Earth,
and the Sun has only made an estimated 18-20 trips
around in its entire life.
 By this reckoning, the birth of our Sun took place
18.4 galactic years ago, and the Universe itself was
created approximately 61 galactic years ago.
 
  </span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">
</span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-14-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 The Milky Way, like all galaxies, is sur..."><span data-dcnode-id="918" instrument_node="">
        14.
      </span></a><span data-dcnode-id="916" instrument_node="">
    MILKY WAY GALAXY
 The Milky Way, like all galaxies, is surrounded
by a vast halo of dark matter, which accounts
for some 90% of its mass..
 Nobody knows precisely what dark matter is,
but its mass has been inferred by observations
of how fast the galaxy rotates and other general
behaviors.
 More importantly, it is believed that this mass
helps keep the galaxy from tearing itself apart
as it rotates.
 
  </span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">
</span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-15-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 You might be amazed to know that dung be..."><span data-dcnode-id="912" instrument_node="">
        15.
      </span></a><span data-dcnode-id="910" instrument_node="">
    MILKY WAY GALAXY
 You might be amazed to know that dung beetles
actually navigate at night using the Milky Way.
 If you’ve never seen the Milky Way with your
own eyes, you should take the chance when
you can. Go to a place with nice dark skies, free
from light pollution, and look up and appreciate
the Milky Way. And be sure to wave hello to all
the neighboring stars who share our galaxy with
us.
 
  </span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">
</span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-16-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 You might be amazed to know that dung be..."><span data-dcnode-id="906" instrument_node="">
        16.
      </span></a><span data-dcnode-id="904" instrument_node="">
    MILKY WAY GALAXY
 You might be amazed to know that dung beetles
actually navigate at night using the Milky Way.
 If you’ve never seen the Milky Way with your
own eyes, you should take the chance when
you can. Go to a place with nice dark skies, free
from light pollution, and look up and appreciate
the Milky Way. And be sure to wave hello to all
the neighboring stars who share our galaxy with
us.
 
  </span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">
</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/milkywaygalaxy-160528095053/95/milky-way-galaxy-17-638.jpg%3Fcb%3D1464679063" target="_blank" title="MILKY WAY GALAXY
 In truth, all pictures that depict our g..."><span data-dcnode-id="900" instrument_node="">
        17.
      </span></a><span data-dcnode-id="898" instrument_node="">
    MILKY WAY GALAXY
 In truth, all pictures that depict our galaxy are
either artist’s renditions or pictures of other
spiral galaxies.
 Until recently, it was very difficult for scientists
to gauge what the Milky Way looks like, mainly
because we’re embedded inside it.
 If you had never been outside of your own
house, you wouldn’t know what it looked like
from outside. But you’d get a sense by looking
at the interior and comparing it to other houses
in the neighborhood.
