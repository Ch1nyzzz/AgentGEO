</span></li><li data-dcnode-id="24"><span data-dcnode-id="25" instrument_node="">The Milky Way is subdivided into a galactic bulge, a disk and a halo.

</span></li><li data-dcnode-id="22"><span data-dcnode-id="23" instrument_node="">Globular clusters inhabit the halo.

</span></li><li data-dcnode-id="20"><span data-dcnode-id="21" instrument_node="">Population I and population II stars appear in different regions.

</span></li><li data-dcnode-id="18"><span data-dcnode-id="19" instrument_node="">Dark matter makes up a large fraction of the matter in the Milky Way.

</span></li><li data-dcnode-id="16"><span data-dcnode-id="17" instrument_node="">We cannot see the center of the Milky Way with visible light, but infrared, radio, x-rays, and gamma-rays reveal its features.

</span></li><li data-dcnode-id="14"><span data-dcnode-id="15" instrument_node="">It is likely that a giant (4,000,000 solar masses) black hole lives at the Milky Way's center.

</span></li><li data-dcnode-id="12"><span data-dcnode-id="13" instrument_node="">Solar System (sun and planets) orbits Milky Way every 225,000,000 years.

</span></li><li data-dcnode-id="10"><span data-dcnode-id="11" instrument_node="">Arms of spiral galaxies are bright and bluish largely due to brightest stars (O &amp; B),
as well as emission nebulae.

</span></li><li data-dcnode-id="8"><span data-dcnode-id="9" instrument_node="">The Milky Way was formed by the collapse of a large region of gas and dust.</span></li></ul><span data-dcnode-id="6" instrument_node="">
