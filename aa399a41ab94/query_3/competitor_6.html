</span><article class="post-21914 post type-post status-publish format-standard has-post-thumbnail hentry category-astronomy category-galaxies category-guide-to-space tag-2mass tag-andromeda-galaxy tag-canis-major-dwarf-galaxy tag-featured tag-galaxies tag-large-magellanic-cloud tag-sagittarius-dwarf-galaxy tag-two-micron-all-sky-survey" data-dcnode-id="1013" id="post-21914"><span data-dcnode-id="1973" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1952"><span data-dcnode-id="1972" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1957"><span class="posted-on" data-dcnode-id="1963"><span class="screen-reader-text" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Posted on</span></span><span data-dcnode-id="1969" instrument_node=""> </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/21914/the-closest-galaxy-to-the-milky-way/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1967" datetime="2017-01-03T22:37:35-05:00"><span data-dcnode-id="1968" instrument_node="">January 3, 2017</span></time><time class="updated" data-dcnode-id="1965" datetime="2017-01-03T22:40:34-05:00"><span data-dcnode-id="1966" instrument_node="">January 3, 2017</span></time></a></span><span class="byline" data-dcnode-id="1958"><span data-dcnode-id="1962" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1959"><a class="url fn n" data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/author/mwill/"><span data-dcnode-id="1961" instrument_node="">Matt Williams</span></a></span></span></div><div class="unive-6d87912827d387b2f67bda6b901cb25a unive-above-header" data-dcnode-id="1956" id="unive-6d87912827d387b2f67bda6b901cb25a"></div><h1 class="entry-title" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">What is the Closest Galaxy to the Milky Way?</span></h1><span data-dcnode-id="1953" instrument_node=""> </span></header><span data-dcnode-id="1951" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1071"><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1949" instrument_node="">Scientists have known for some time that the Milky Way Galaxy is not alone in the Universe. In addition to our galaxy being part of the </span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30286/local-group/"><span data-dcnode-id="1948" instrument_node="">Local Group</span></a><span data-dcnode-id="1946" instrument_node=""> – a collection of 54 galaxies and dwarf galaxies – we are also part of the larger formation known as the </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30645/virgo-supercluster/"><span data-dcnode-id="1945" instrument_node="">Virgo Supercluster</span></a><span data-dcnode-id="1943" instrument_node="">. So you could say the Milky Way has a lot of neighbors.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1940" instrument_node="">Of these, most people consider the </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30289/andromeda-galaxy/"><span data-dcnode-id="1939" instrument_node="">Andromeda Galaxy</span></a><span data-dcnode-id="1937" instrument_node=""> to be our closest galactic cohabitant. But in truth, Andromeda is the closest </span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">spiral</span></em><span data-dcnode-id="1934" instrument_node=""> galaxy, and not the closest galaxy by a long shot. This distinction falls to a formation that is actually within the Milky Way itself, a dwarf galaxy that we’ve only known about for a little over a decade.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><h2 data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Closest Galaxy:</span></h2><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">At present, the closet known galaxy to the Milky Way is the Canis Major Dwarf Galaxy – aka. the Canis Major Overdensity. This stellar formation is about 42,000 light years from the </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/21875/center-of-the-milky-way/"><span data-dcnode-id="1927" instrument_node="">galactic center</span></a><span data-dcnode-id="1925" instrument_node="">, and a mere 25,000 light years from our Solar System. This puts it closer to us than the center of our own galaxy, which is 30,000 light years away from the Solar System.</span></p><div class="unive-content unive-target" data-advadstrackbid="1" data-advadstrackid="155349" data-dcnode-id="1901" id="unive-440829509"><a class="adv-link" data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/universetoday"><div data-dcnode-id="1906" id="go-ad-free"><span data-dcnode-id="1923" instrument_node="">

</span></div><span data-dcnode-id="1905" instrument_node="">
</span></a></div><span data-dcnode-id="1900" instrument_node="">
</span><figure aria-describedby="caption-attachment-117154" class="wp-caption aligncenter" data-dcnode-id="1894" id="attachment_117154" style="width: 580px"><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2008/12/canisgalaxy_2mass1-e1418078602301.jpg"><img alt="Illustration of the Canis Dwarf Dwarf Galaxy, Credit: R. Ibata (Strasbourg Observatory, ULP) et al./2MASS/NASA" class="size-medium wp-image-117154" data-dcnode-id="1899" height="400" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2008/12/canisgalaxy_2mass1-e1418078602301-580x400.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2008/12/canisgalaxy_2mass1-e1418078602301-580x400.jpg 580w, https://www.universetoday.com/wp-content/uploads/2008/12/canisgalaxy_2mass1-e1418078602301-250x172.jpg 250w, https://www.universetoday.com/wp-content/uploads/2008/12/canisgalaxy_2mass1-e1418078602301.jpg 800w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1895" id="caption-attachment-117154"><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Illustration of the Canis Dwarf Galaxy and its associated tidal (shown in red) in relation to our Milky Way. Credit: R. Ibata (Strasbourg Observatory, ULP) et al./2MASS/NASA</span></em></figcaption></figure><span data-dcnode-id="1893" instrument_node="">
</span><h2 data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Characteristics:</span></h2><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1889" instrument_node="">The Canis Major Dwarf Galaxy Dwarf Galaxy is believed to contain one billion stars in all, a relatively high-percentage of which are in the </span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/24720/red-giant-star/"><span data-dcnode-id="1888" instrument_node="">Red Giant Branch</span></a><span data-dcnode-id="1886" instrument_node=""> phase of their lifetimes. It has a roughly elliptical shape and is thought to contain as many stars as the </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/91510/sagittarius-dwarf-galaxy-a-beast-with-four-tails/"><span data-dcnode-id="1885" instrument_node="">Sagittarius Dwarf Elliptical Galaxy</span></a><span data-dcnode-id="1883" instrument_node="">, the previous contender for closest galaxy to our location in the Milky Way.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node="">In addition to the dwarf galaxy itself, a long filament of stars is visible trailing behind it. This complex, ringlike structure – which is sometimes referred to as the Monoceros Ring – wraps around the galaxy three times. The stream was first discovered in the early 21st century by astronomers conducting the </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sdss.org/"><span data-dcnode-id="1879" instrument_node="">Sloan Digital Sky Survey</span></a><span data-dcnode-id="1877" instrument_node=""> (SDSS).</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">It was in the course of investigating this ring of stars, and a closely spaced group of globular clusters similar to those associated with the Sagittarius Dwarf Elliptical Galaxy, that the Canis Major Dwarf Galaxy was first discovered. The current theory is that this galaxy was accreted (or swallowed up) by the Milky Way Galaxy.</span></p><div class="unive-d850b9e3dffb73b983c44c64a37e29ab unive-in-content" data-dcnode-id="1872" id="unive-d850b9e3dffb73b983c44c64a37e29ab"></div><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Other globular clusters that orbit the center of our Milky Way as a satellite – i.e. NGC 1851, NGC 1904, NGC 2298 and NGC 2808 – are thought to have been part of the Canis Major Dwarf Galaxy before its accretion. It also has associated open clusters, which are thought to have formed as a result of the dwarf galaxy’s gravity perturbing material in the galactic disk and stimulating star formation.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><figure aria-describedby="caption-attachment-113143" class="wp-caption aligncenter" data-dcnode-id="1862" id="attachment_113143" style="width: 580px"><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2014/07/Hubble-galaxy-mergers.jpg"><img alt="" class="size-medium wp-image-113143" data-dcnode-id="1867" height="400" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2014/07/Hubble-galaxy-mergers-580x400.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2014/07/Hubble-galaxy-mergers-580x400.jpg 580w, https://www.universetoday.com/wp-content/uploads/2014/07/Hubble-galaxy-mergers-250x172.jpg 250w, https://www.universetoday.com/wp-content/uploads/2014/07/Hubble-galaxy-mergers.jpg 868w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1863" id="caption-attachment-113143"><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Images of a few examples of merging galaxies taken by the Hubble Space Telescope. Credit: NASA/ESA/STScI/A. Evans/NRAO/Caltech</span></em></figcaption></figure><span data-dcnode-id="1861" instrument_node="">
</span><h2 data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Discovery:</span></h2><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1857" instrument_node="">Prior to its discovery, astronomers believed that the Sagittarius Dwarf Galaxy was the closest galactic formation to our own. At 70,000 light years from Earth, this galaxy was determined in 1994 to be closer to us than the </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30579/large-magellanic-cloud/"><span data-dcnode-id="1856" instrument_node="">Large Magellanic Cloud</span></a><span data-dcnode-id="1854" instrument_node=""> (LMC), the irregular dwarf galaxy that is located 180,000 light years from Earth, and which previously held the title of the closest galaxy to the Milky Way.</span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1851" instrument_node="">All of that changed in 2003 when The Canis Major Dwarf Galaxy was </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/9003/closest-galaxy-discovered/"><span data-dcnode-id="1850" instrument_node="">discovered</span></a><span data-dcnode-id="1848" instrument_node=""> by the Two Micron All-Sky Survey (</span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ipac.caltech.edu/2mass/overview/about2mass.html%23about"><span data-dcnode-id="1847" instrument_node="">2MASS</span></a><span data-dcnode-id="1845" instrument_node="">). This collaborative astronomical mission, which took place between 1997 and 2001, relied on data obtained by the Mt. Hopkins Observatory in Arizona (for the Northern Hemisphere) and the Cerro Tololo Inter-American Observatory in Chile (for the southern hemisphere).</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">From this data, astronomers were able to conduct a survey of 70% of the sky, detecting about 5,700 celestial sources of infrared radiation. Infrared astronomy takes advantage of advances in astronomy that see more of the Universe, since infrared light is not blocked by gas and dust to the same extent as visible light.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">Because of this technique, the astronomers were able to detect a very significant over-density of </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_classification" title="Stellar classification"><span data-dcnode-id="1838" instrument_node="">class M</span></a><span data-dcnode-id="1836" instrument_node=""> giant stars in a part of the sky occupied by the Canis Major constellation, along with several other related structures composed of this type of star, two of which form broad, faint arcs (as seen in the image close to the top).</span></p><span data-dcnode-id="1834" instrument_node="">
</span><figure aria-describedby="caption-attachment-117156" class="wp-caption aligncenter" data-dcnode-id="1828" id="attachment_117156" style="width: 580px"><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2008/12/reddwarf.jpg"><img alt="An artist depicts the incredibly powerful flare that erupted from the red dwarf star EV Lacertae. Credit: Casey Reed/NASA" class="size-medium wp-image-117156" data-dcnode-id="1833" height="392" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2008/12/reddwarf-580x392.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2008/12/reddwarf-580x392.jpg 580w, https://www.universetoday.com/wp-content/uploads/2008/12/reddwarf-250x169.jpg 250w, https://www.universetoday.com/wp-content/uploads/2008/12/reddwarf.jpg 800w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1829" id="caption-attachment-117156"><em data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">An artist depicts the incredibly powerful flare that erupted from the red dwarf star EV Lacertae. Credit: Casey Reed/NASA</span></em></figcaption></figure><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">The prevalence of M-class stars is what made the formation easy to detect. These cool, “Red Dwarfs” are not very luminous compared to other classes of stars, and cannot even be seen with the naked eye. However, they shine very brightly in the infrared, and appeared in great numbers.</span></p><div class="unive-01294eec9a5a16dd41cf79ad8892f422 unive-in-content" data-dcnode-id="1824" id="unive-01294eec9a5a16dd41cf79ad8892f422"></div><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">The discovery of this galaxy, and subsequent analysis of the stars associated with it, has provided some support for the current theory that galaxies may grow in size by swallowing their smaller neighbors. The Milky Way became the size it is now by eating up other galaxies like Canis Major, and it continues to do so today. And since stars from the Canis Major Dwarf Galaxy are technically already part of the Milky Way, it is by definition the nearest galaxy to us.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1819" instrument_node="">As already noted, it was the&nbsp;</span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/gallery/album/galaxy/pr2004031b/"><span data-dcnode-id="1818" instrument_node="">Sagittarius Dwarf Elliptical Galaxy</span></a><span data-dcnode-id="1816" instrument_node=""> that held the position of closest galaxy to our own prior to 2003. At 75,000 light years away. This dwarf galaxy, which consists of four globular clusters that measure some 10,000 </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light-year" title="Light-year"><span data-dcnode-id="1815" instrument_node="">light-years</span></a><span data-dcnode-id="1813" instrument_node=""> in diameter, was discovered in 1994. Prior to that, the Large Magellanic Cloud was thought to be our closest neighbor.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1810" instrument_node="">The </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apod.nasa.gov/apod/ap991114.html"><span data-dcnode-id="1809" instrument_node="">Andromeda Galaxy (M31)</span></a><span data-dcnode-id="1807" instrument_node=""> is the closest </span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">spiral</span></em><span data-dcnode-id="1804" instrument_node=""> galaxy to us, and though it’s gravitationally bound to the Milky Way, it’s not the closest galaxy by far – being 2 million light years away. Andromeda is currently approaching our galaxy at a speed of about 110 kilometers per second. In roughly 4 billion years, the Andromeda Galaxy is expected to merge with out own, forming a single, super-galaxy.</span></p><span data-dcnode-id="1802" instrument_node="">

</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Future of the Canis Major Dwarf Galaxy:</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Astronomers also believe that the Canis Major Dwarf Galaxy is in the process of being pulled apart by the gravitational field of the more massive Milky Way Galaxy. The main body of the galaxy is already extremely degraded, a process which will continue as it travels around and through our Galaxy.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">In time, the accretion process will likely culminate with the Canis Major Dwarf Galaxy merging entirely with the Milky Way, thus depositing its 1 billion stars to the 200 t0 400 billion that are already part of our galaxy.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1271" instrument_node="">We have written many interesting articles on </span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30168/galaxies/"><span data-dcnode-id="1270" instrument_node="">galaxies</span></a><span data-dcnode-id="1268" instrument_node=""> here at Universe Today. Here’s </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/9003/closest-galaxy-discovered/"><span data-dcnode-id="1267" instrument_node="">Closest Galaxy Discovered</span></a><span data-dcnode-id="1265" instrument_node="">, </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/26749/formation-of-the-milky-way/"><span data-dcnode-id="1264" instrument_node="">How did the Milky Way Form?</span></a><span data-dcnode-id="1262" instrument_node="">, </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/30305/how-many-galaxies-in-the-universe/"><span data-dcnode-id="1261" instrument_node="">How Many Galaxies are there in the Universe?</span></a><span data-dcnode-id="1259" instrument_node="">, </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/22828/milky-way-collision/"><span data-dcnode-id="1258" instrument_node="">What is the Milky Way Collision</span></a><span data-dcnode-id="1256" instrument_node="">, </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/73054/spiral-galaxies-could-eat-dwarfs-on-a-universal-scale/"><span data-dcnode-id="1255" instrument_node="">Spiral Galaxies Could eat Dwarfs all over the Universe</span></a><span data-dcnode-id="1253" instrument_node=""> and </span><a data- </span><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">For more information, check out this article from the </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spitzer.caltech.edu/news/257-ssc2007-10-Spitzer-Nets-Thousands-of-Galaxies-in-a-Giant-Cluster"><span data-dcnode-id="1245" instrument_node="">Spitzer Space Telescope</span></a><span data-dcnode-id="1243" instrument_node="">‘s website about the galaxies that are closest to the Milky Way Galaxy. And here is a </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8imxPVIr_u0"><span data-dcnode-id="1242" instrument_node="">video</span></a><span data-dcnode-id="1240" instrument_node=""> by the same author on the subject.</span></p><span data-dcnode-id="1238" instrument_node="">
