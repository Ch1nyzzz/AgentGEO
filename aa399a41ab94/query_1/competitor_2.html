ode="">[62]</span></span><span data-dcnode-id="3197" instrument_node="">.</span></p></div><div data-dcnode-id="2683"><p data-dcnode-id="3178"><span data-dcnode-id="3194" instrument_node="">Antideuterons rarely survive inelastic collisions. However, they can sometimes undergo inelastic, but non-annihilating collisions, and transfer enough energy to excite the target proton as a </span><span class="math" data-dcnode-id="3186"><span class="MathJax_Preview" data-dcnode-id="3190" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="3191" id="MJXp-Span-913"><span class="MJXp-mi MJXp-italic" data-dcnode-id="3192" id="MJXp-Span-914"><span data-dcnode-id="3193" instrument_node="">Δ</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="3189" id="MathJax-Element-47-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="3185" instrument_node=""> resonance. As they typically lose a substantial fraction of their initial energy, these antideuterons are effectively re-injected into the total flux with a degraded momentum. This mechanism redistributes antideuterons towards lower energies and flattens their spectrum, as first remarked by&nbsp; </span><span data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">[47,157]</span></span><span data-dcnode-id="3182" instrument_node="">. The antideuterons that result from these inelastic collisions are referred to as tertiary antideuterons, with a production rate given by&nbsp; </span><span data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">[47]</span></span><span data-dcnode-id="3179" instrument_node="">: </span></p><div class="formula" data-dcnode-id="2684"><span class="label" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">(14)</span></span><span class="math" data-dcnode-id="2685"><span class="MathJax_Preview" data-dcnode-id="2689" style="color: inherit;"><span class="MJXp-math" data-dcnode ass="MJXp-mi MJXp-italic" data-dcnode-id="1855" id="MJXp-Span-1530"><span data-dcnode-id="1856" instrument_node="">d</span></span></span></span></span></span></span></span></span><span class="MJXp-mrow" data-dcnode-id="1841" id="MJXp-Span-1533"><span class="MJXp-mo" data-dcnode-id="1846" id="MJXp-Span-1534" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="1847" instrument_node="">(</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="1844" id="MJXp-Span-1535"><span data-dcnode-id="1845" instrument_node="">E</span></span><span class="MJXp-mo" data-dcnode-id="1842" id="MJXp-Span-1536" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="1843" instrument_node="">)</span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="1838" id="MathJax-Element-58-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="1834" instrument_node=""> can be found in&nbsp; </span><span data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">[42]</span></span><span data-dcnode-id="1831" instrument_node="">.</span></p></div></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1822"><a aria-describedby="tp-snippet-chp-title-S0370157316000120" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157316000120" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1815"><a class="read-full-chapter-print" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157316000120" rel="noopener" target="_blank"><span data-dcnode-id="1821" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="1816"><span data-dcnode-id="1819" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1817" instrument_node="">https://www.sciencedirect.com/science/article/pii/S0370157316000120</span></div></div></article><article class="snippet column" data-dcnode-id="1768" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1780"><h2 class="u-font-serif u-text-light" data-dcnode-id="1810" id="tp-snippet-chp-title-S1387647309000700"><a class="anchor" data-aa-name="The physical properties of red supergiants" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647309000700"><span class="anchor-text" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">The physical properties of red supergiants</span></span></a></h2><div class="size-l" data-dcnode-id="1781"><cite data-dcnode-id="1796"><p data-dcnode-id="1797"><span data-dcnode-id="1802"><span data-dcnode-id="1809" instrument_node="">Emily M. </span><span data-dcnode-id="1807" instrument_node="">Levesque</span><span data-dcnode-id="1805" instrument_node="">, in</span><span data-dcnode-id="1803" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="1798" instrument_node="">, 2010</span></p></cite><p data-dcnode-id="1782"><span data-dcnode-id="1795" instrument_node="">It is important to note that the inclusion of red giants in the halo of the Milky Way could also potentially contaminate samples of extragalactic RSGs. </span><span data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Levesque et al. (2007)</span></span><span data-dcnode-id="1792" instrument_node=""> carefully consider this issue for the case of halo red giants in the direction of the Large Magellanic Cloud (LMC). They find the likelihood of halo giant contamination in the direction of the LMC to be less than 1% and confirm the membership of their RSG sample based on the kinematic analysis of the LMC by </span><span data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Olsen and Massey (2007)</span></span><span data-dcnode-id="1789" instrument_node="">. </span><span data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Massey et al. (2009)</span></span><span data-dcnode-id="1786" instrument_node=""> again address this issue for the RSG population of M31, performing a careful analysis of radial velocities for the RSG candidate spectra in their sample and confirming that all stars in the sample have velocities consistent with their locations in M31, as determined from </span><span data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Rubin and Ford (1970)</span></span><span data-dcnode-id="1783" instrument_node="">. Both of these examinations highlight the low probability of halo contamination in extragalactic RSG samples; however, they also emphasize that detailed kinematic analyses of the presumed host galaxies are required to rigorously address this issue.</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1776"><a aria-describedby="tp-snippet-chp-title-S1387647309000700" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647309000700" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1769"><a class="read-full-chapter-print" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647309000700" rel="noopener" target="_blank"><span data-dcnode-id="1775" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="1770"><span data-dcnode-id="1773" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1771" instrument_node="">https://www.sciencedirect.com/science/article/pii/S1387647309000700</span></div></div></article><article class="snippet column" data-dcnode-id="1637" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1649"><h2 class="u-font-serif u-text-light" data-dcnode-id="1764" id="tp-snippet-chp-title-S0146641015000460"><a class="anchor" data-aa-name="Indirect and direct search for dark matter" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0146641015000460"><span class="anchor-text" data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Indirect and direct search for dark matter</span></span></a></h2><div class="size-l" data-dcnode-id="1650"><cite data-dcnode-id="1744"><p data-dcnode-id="1745"><span data-dcnode-id="1750"><span data-dcnode-id="1763" instrument_node="">M. </span><span data-dcnode-id="1761" instrument_node="">Klasen</span><span data-dcnode-id="1759" instrument_node="">, ... </span><span data-dcnode-id="1757" instrument_node="">G. </span><span data-dcnode-id="1755" instrument_node="">Sigl</span><span data-dcnode-id="1753" instrument_node="">, in</span><span data-dcnode-id="1751" instrument_node=""> </span></span><a class="anchor" data-aa-name="Progress in Particle and Nuclear Physics" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/progress-in-particle-and-nuclear-physics"><span class="anchor-text" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Progress in Particle and Nuclear Physics</span></span></a><span data-dcnode-id="1746" instrument_node="">, 2015</span></p></cite><section data-dcnode-id="1651" id="S0146641015000460-s000070"><h3 data-dcnode-id="1738"><span data-dcnode-id="1743" instrument_node="">3.1</span><span data-dcnode-id="1741" instrument_node=""> </span><span data-dcnode-id="1739" instrument_node="">Detection principles</span></h3><p data-dcnode-id="1652" id="S0146641015000460-p000275"><span data-dcnode-id="1737" instrument_node="">Direct-detection experiments rely on the scattering of dark-matter particles from the halo of the Milky Way in a detector on Earth. The latter is usually set up deep underground, e.g.&nbsp;at Gran Sasso in Italy, Sanford in South Dakota or in the future Jin-Ping in China, to shield it from cosmic radiation, which, together with natural radioactivity in the rock and the detector material, constitutes the most important background. To discriminate the dark-matter signal from background processes and thermal noise, one exploits usually two out of three possible signals: energy deposition (phonons) in (often cryogenic) calorimeters, scintillation light (photons), and ionization (electrons). Localization of the scattering event allows one to define a fiducial volume inside the detector, which is then effectively shielded by the detector material itself. For the latter, current experiments use CaWO</span><sub data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">4</span></sub><span data-dcnode-id="1734" instrument_node=""> (CRESST&nbsp; </span><span data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">[89–91]</span></span><span data-dcnode-id="1731" instrument_node="">), CsI(Ti) (KIMS&nbsp; </span><span data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">[92,93]</span></span><span data-dcnode-id="1728" instrument_node="">), Ge (CDMS&nbsp; </span><span data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">[94–99]</span></span><span data-dcnode-id="1725" instrument_node="">, CoGeNT&nbsp; </span><span data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">[100,101]</span></span><span data-dcnode-id="1722" instrument_node="">, EDELWEISS </span><span data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">[102,103]</span></span><span data-dcnode-id="1719" instrument_node="">), NaI(Ti) (DAMA/LIBRA&nbsp; </span><span data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">[104]</span></span><span data-dcnode-id="1716" instrument_node="">) or Si (CDMS Si&nbsp; </span><span data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">[97]</span></span><span data-dcnode-id="1713" instrument_node="">) crystals, but also liquid Ar (DarkSide&nbsp; </span><span data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">[105]</span></span><span data-dcnode-id="1710" instrument_node="">), Ne (DEAP&nbsp; </span><span data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">[106]</span></span><span data-dcnode-id="1707" instrument_node="">) or Xe (LUX&nbsp; </span><span data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">[107]</span></span><span data-dcnode-id="1704" instrument_node="">, XENON&nbsp; </span><span data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">[108–111]</span></span><span data-dcnode-id="1701" instrument_node="">, XMASS&nbsp; </span><span data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">[112]</span></span><span data-dcnode-id="1698" instrument_node="">, ZEPLIN </span><span data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">[113]</span></span><span data-dcnode-id="1695" instrument_node="">). For many of these experiments, upgrades are in preparation (e.g.&nbsp;DARWIN&nbsp; </span><span data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">[114]</span></span><span data-dcnode-id="1692" instrument_node="">, EURECA&nbsp; </span><span data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">[115]</span></span><span data-dcnode-id="1689" instrument_node="">, LZ&nbsp; </span><span data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">[116]</span></span><span data-dcnode-id="1686" instrument_node="">, PANDA-X&nbsp; </span><span data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">[117]</span></span><span data-dcnode-id="1683" instrument_node="">, XENON1T/nT), in some cases focusing on the conversion of axions into photons (ADMX&nbsp; </span><span data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">[118]</span></span><span data-dcnode-id="1680" instrument_node="">). It is also possible to exploit the metastability of a superheated liquid composed of carbon and fluorine (COUPP&nbsp; </span><span data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">[119]</span></span><span data-dcnode-id="1677" instrument_node="">, PICASSO&nbsp; </span><span data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">[120]</span></span><span data-dcnode-id="1674" instrument_node="">, PICO&nbsp; </span><span data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">[121]</span></span><span data-dcnode-id="1671" instrument_node="">, SIMPLE&nbsp; </span><span data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">[122]</span></span><span data-dcnode-id="1668" instrument_node="">), the annual modulation of the dark-matter signal as the Earth orbits around the Sun (DAMA/LIBRA&nbsp; </span><span data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">[104]</span></span><span data-dcnode-id="1665" instrument_node="">), or the direction of the dark matter “wind”, blowing from the Cygnus constellation towards the Sun as it orbits around the galactic center (DMTPC </span><span data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">[123]</span></span><span data-dcnode-id="1662" instrument_node="">, DRIFT&nbsp; </span><span data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">[124]</span></span><span data-dcnode-id="1659" instrument_node="">, MIMAC&nbsp; </span><span data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">[125]</span></span><span data-dcnode-id="1656" instrument_node="">, NEWAGE </span><span data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">[126]</span></span><span data-dcnode-id="1653" instrument_node="">).</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1645"><a aria-describedby="tp-snippet-chp-title-S0146641015000460" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0146641015000460" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1638"><a class="read-full-chapter-print" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0146641015000460" rel="noopener" target="_blank"><span data-dcnode-id="1644" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="1639"><span data-dcnode-id="1642" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1640" instrument_node="">https://www.sciencedirect.com/science/article/pii/S0146641015000460</span></div></div></article><article class="snippet column" data-dcnode-id="1582" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1594"><h2 class="u-font-serif u-text-light" data-dcnode-id="1633" id="tp-snippet-chp-title-S1387647302002440"><a class="anchor" data-aa-name="An Alternative to Dark Matter: MOND" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647302002440"><span class="anchor-text" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">An Alternative to Dark Matter: MOND</span></span></a></h2><div class="size-l" data-dcnode-id="1595"><cite data-dcnode-id="1619"><p data-dcnode-id="1620"><span data-dcnode-id="1625"><span data-dcnode-id="1632" instrument_node="">F. </span><span data-dcnode-id="1630" instrument_node="">Combes</span><span data-dcnode-id="1628" instrument_node="">, in</span><span data-dcnode-id="1626" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="1621" instrument_node="">, 2002</span></p></cite><p data-dcnode-id="1596"><span data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">Since about a decade, the microlensing experiments have accumulated lensing events by compact objects in the </span><span class="topic-highlight" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Milky Way halo</span></span><span data-dcnode-id="1615" instrument_node=""> (</span></span><span data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Lasserre et al., 2000; Alcock et al., 2001</span></span><span data-dcnode-id="1611" instrument_node="">), and brown dwarfs are now ruled out as candidate for the baryonic dark matter. There could be a small contribution in white dwarfs, but the bulk of the mass has to be contributed by other candidates. These can only be gas now, either hot ionized gas around filaments in the intergalactic space (of which only a fraction ∼10</span><span class="math" data-dcnode-id="1601"><span class="MathJax_Preview" data-dcnode-id="1605" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="1606" id="MJXp-Span-1537"><span class="MJXp-msup" data-dcnode-id="1607" id="MJXp-Span-1538"><span class="MJXp-mi" data-dcnode-id="1610" id="MJXp-Span-1539" style="margin-right: 0.05em;"></span><span class="MJXp-mn MJXp-script" data-dcnode-id="1608" id="MJXp-Span-1540" style="vertical-align: 0.4em;"><span data-dcnode-id="1609" instrument_node="">−4</span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="1604" id="MathJax-Element-59-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="1600" instrument_node=""> is detected through the neutral fraction in Ly</span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">α</span></em><span data-dcnode-id="1597" instrument_node=""> absorption lines), or cold neutral molecular gas associated with galaxies.</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1590"><a aria-describedby="tp-snippet-chp-title-S1387647302002440" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647302002440" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1583"><a class="read-full-chapter-print" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647302002440" rel="noopener" target="_blank"><span data-dcnode-id="1589" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="1584"><span data-dcnode-id="1587" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1585" instrument_node="">https://www.sciencedirect.com/science/article/pii/S1387647302002440</span></div></div></article><article class="snippet column" data-dcnode-id="1538" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1550"><h2 class="u-font-serif u-text-light" data-dcnode-id="1578" id="tp-snippet-chp-title-S1387647398000098"><a class="anchor" data-aa-name="Particle dark matter and its indirect detection" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647398000098"><span class="anchor-text" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Particle dark matter and its indirect detection</span></span></a></h2><div class="size-l" data-dcnode-id="1551"><cite data-dcnode-id="1564"><p data-dcnode-id="1565"><span data-dcnode-id="1570"><span data-dcnode-id="1577" instrument_node="">Lars </span><span data-dcnode-id="1575" instrument_node="">Bergström</span><span data-dcnode-id="1573" instrument_node="">, in</span><span data-dcnode-id="1571" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="1566" instrument_node="">, 1998</span></p></cite><p data-dcnode-id="1552"><span data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">If neutralinos are indeed the CDM needed on galaxy scales and larger, there should be a substantial flux of these particles in the </span><span class="topic-highlight" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Milky Way halo</span></span><span data-dcnode-id="1560" instrument_node="">. Since the interaction strength is essentially given by the same weak couplings as, e.g., for neutrinos there is a non-negligible chance of detecting them in low-background counting experiments. Due to the large parameter space of MSSM, even with the simplifying assumptions above, there is a rather wide span of predictions for the event rate in detectors of various types. It is interesting, however, that the models giving the largest rates are already starting to be ruled out by present direct detection experiments (</span></span><span data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Bergström &amp; Gondolo, 1996</span></span><span data-dcnode-id="1556" instrument_node="">; </span><span data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Bottino et al., 1997</span></span><span data-dcnode-id="1553" instrument_node="">).</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1546"><a aria-describedby="tp-snippet-chp-title-S1387647398000098" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647398000098" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1539"><a class="read-full-chapter-print" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647398000098" rel="noopener" target="_blank"><span data-dcnode-id="1545" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="1540"><span data-dcnode-id="1543" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1541" instrument_node="">https://www.sciencedirect.com/science/article/pii/S1387647398000098</span></div></div></article><article class="snippet column" data-dcnode-id="507" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="519"><h2 class="u-font-serif u-text-light" data-dcnode-id="1534" id="tp-snippet-chp-title-S0370157316001022"><a class="anchor" data-aa-name="A review of the discovery reach of directional Dark Matter detection" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157316001022"><span class="anchor-text" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">A review of the discovery reach of directional Dark Matter detection</span></span></a></h2><div class="size-l" data-dcnode-id="520"><cite data-dcnode-id="1514"><p data-dcnode-id="1515"><span data-dcnode-id="1520"><span data-dcnode-id="1533" instrument_node="">F. </span><span data-dcnode-id="1531" instrument_node="">Mayet</span><span data-dcnode-id="1529" instrument_node="">, ... </span><span data-dcnode-id="1527" instrument_node="">S.E. </span><span data-dcnode-id="1525" instrument_node="">Vahsen</span><span data-dcnode-id="1523" instrument_node="">, in</span><span data-dcnode-id="1521" instrument_node=""> </span></span><a class="anchor" data-aa-name="Physics Reports" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/physics-reports"><span class="anchor-text" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Physics Reports</span></span></a><span data-dcnode-id="1516" instrument_node="">, 2016</span></p></cite><section data-dcnode-id="521" id="S0370157316001022-s000080"><h3 data-dcnode-id="1508"><span data-dcnode-id="1513" instrument_node="">3.2</span><span data-dcnode-id="1511" instrument_node=""> </span><span data-dcnode-id="1509" instrument_node="">Physics of the Galactic halo</span></h3><div data-dcnode-id="1217"><p data-dcnode-id="1486"><span data-dcnode-id="1507" instrument_node="">Historically, direct detection signal calculations and data analyses have used the Standard Halo Model (SHM) to model the WIMP velocity distribution. This simple model assumes that the Milky Way (MW) halo is an isotropic, isothermal sphere with density profile </span><span class="math" data-dcnode-id="1488"><span class="MathJax_Preview" data-dcnode-id="1492" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="1493" id="MJXp-Span-1541"><span class="MJXp-mi MJXp-italic" data-dcnode-id="1505" id="MJXp-Span-1542"><span data-dcnode-id="1506" instrument_node="">ρ</span></span><span class="MJXp-mo" data-dcnode-id="1503" id="MJXp-Span-1543" style="margin-left: 0.333em; margin-right: 0.333em;"><span data-dcnode-id="1504" instrument_node="">∝</span></span><spa -dcnode-id="816" id="MJXp-Span-1881"><span data-dcnode-id="817" instrument_node="">t</span></span><span class="MJXp-mo" data-dcnode-id="813" id="MJXp-Span-1882" style="margin-left: 0em; margin-right: 0em; vertical-align: -0.244em;"><span class="MJXp-right MJXp-scale7" data-dcnode-id="814" style="font-size: 1.978em; margin-left: -0.05em;"><span data-dcnode-id="815" instrument_node="">)</span></span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="809" id="MathJax-Element-79-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="805" instrument_node="">, where </span><span class="math" data-dcnode-id="783"><span class="MathJax_Preview" data-dcnode-id="787" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="788" id="MJXp-Span-1883"><span class="MJXp-msub" data-dcnode-id="796" id="MJXp-Span-1884"><span class="MJXp-mrow" data-dcnode-id="801" id="MJXp-Span-1885" style="margin-right: 0.05em;"><span class="MJXp-mstyle" data-dcnode-id="802" id="MJXp-Span-1886"><span class="MJXp-mi MJXp-bold" data-dcnode-id="803" id="MJXp-Span-1887"><span data-dcnode-id="804" instrument_node="">v</span></span></span></span><span class="MJXp-mrow MJXp-script" data-dcnode-id="797" id="MJXp-Span-1888" style="vertical-align: -0.4em;"><span class="MJXp-mstyle MJXp-script" data-dcnode-id="798" id="MJXp-Span-1889"><span class="MJXp-mi" data-dcnode-id="799" id="MJXp-Span-1890"><span data-dcnode-id="800" instrument_node="">lab</span></span></span></span></span><span class="MJXp-mrow" data-dcnode-id="789" id="MJXp-Span-1891"><span class="MJXp-mo" data-dcnode-id="794" id="MJXp-Span-1892" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="795" instrument_node="">(</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="792" id="MJXp-Span-1893"><span data-dcnode-id="793" instrument_node="">t</span></span><span class="MJXp-mo" data-dcnode-id="790" id="MJXp-Span-1894" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="791" instrument_node="">)</span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="786" id="MathJax-Element-80-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="782" instrument_node=""> is the lab’s velocity with respect to the Galactic rest frame, is sufficient. The lab’s velocity is the sum of the local circular speed, the Sun’s motion with respect to the Local Standard of Rest, and the Earth’s velocity relative the Sun. The full, correct calculation of the transformation between the reference frames is carried out in Refs.&nbsp; </span><span data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">[112,113]</span></span><span data-dcnode-id="779" instrument_node="">, see also Appendix A. Note that, as pointed out in Ref.&nbsp; </span><span data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">[112]</span></span><span data-dcnode-id="776" instrument_node="">, the commonly used expressions from Ref.&nbsp; </span><span data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">[14]</span></span><span data-dcnode-id="773" instrument_node=""> contain an error.</span></p><div data-dcnode-id="578"><p data-dcnode-id="702"><span data-dcnode-id="771" instrument_node="">The SHM may not to be a good approximation to the real MW halo, as the assumptions behind it (that the MW halo is an isotropic, isothermal sphere in dynamical equilibrium) are not valid. In cold Dark Matter cosmologies, structures form hierarchically, leading to DM halos which are triaxial, anisotropic and contain phase-space substructure (see </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">e.g.</span></em><span data-dcnode-id="768" instrument_node=""> Ref.&nbsp; </span><span data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">[114]</span></span><span data-dcnode-id="765" instrument_node="">). The velocity distributions of high-resolution Dark Matter-only simulations of MW-like halos deviate systematically from the Maxwellian distribution of the SHM. There are more low speed particles and the peak of the distribution is lower and flatter&nbsp; </span><span data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">[115,116]</span></span><span data-dcnode-id="762" instrument_node="">. Several fitting functions which encapsulate these properties have been proposed&nbsp; </span><span data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">[117,118]</span></span><span data-dcnode-id="759" instrument_node="">. Hydrodynamical simulations can have different predictions for the local DM distribution depending on their baryonic feedback models, and how well they can reproduce the main galaxy population properties. In particular, some simulations find that the local DM velocity distribution may be better fitted by a Tsallis distribution&nbsp; </span><span data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">[119]</span></span><span data-dcnode-id="756" instrument_node="">, or have a sharper peak than expected from a Maxwellian distribution&nbsp; </span><span data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">[120,121]</span></span><span data-dcnode-id="753" instrument_node="">. Very recently, however, high resolution hydrodynamic simulations of MW-like galaxies found that the best fit Maxwellian velocity distribution describes well the local DM velocity distributions of simulated haloes&nbsp; </span><span data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">[122,123]</span></span><span data-dcnode-id="750" instrument_node="">. While Ref.&nbsp; </span><span data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">[124]</span></span><span data-dcnode-id="747" instrument_node=""> found some discrepancy in their results compared to the results of Refs.&nbsp; </span><span data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">[122,123]</span></span><span data-dcnode-id="744" instrument_node="">, the source of these differences is yet to be understood. Eventually, some anisotropy in the velocity distribution can be expected. It is evaluated by the velocity anisotropy parameter </span><span class="math" data-dcnode-id="729"><span class="MathJax_Preview" data-dcnode-id="733" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="734" id="MJXp-Span-1895"><span class="MJXp-mi MJXp-italic" data-dcnode-id="742" id="MJXp-Span-1896"><span data-dcnode-id="743" instrument_node="">β</span></span><span class="MJXp-mrow" data-dcnode-id="735" id="MJXp-Span-1897"><span class="MJXp-mo" data-dcnode-id="740" id="MJXp-Span-1898" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="741" instrument_node="">(</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="738" id="MJXp-Span-1899"><span data-dcnode-id="739" instrument_node="">r</span></span><span class="MJXp-mo" data-dcnode-id="736" id="MJXp-Span-1900" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="737" instrument_node="">)</span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="732" id="MathJax-Element-81-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="728" instrument_node=""> which is a function of the three velocity dispersions along the three Galactic axes </span><span class="math" data-dcnode-id="707"><span class="MathJax_Preview" data-dcnode-id="711" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="712" id="MJXp-Span-1901"><span class="MJXp-mrow" data-dcnode-id="713" id="MJXp-Span-1902"><span class="MJXp-mo" data-dcnode-id="726" id="MJXp-Span-1903" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="727" instrument_node="">{</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="724" id="MJXp-Span-1904"><span data-dcnode-id="725" instrument_node="">x</span></span><span class="MJXp-mo" data-dcnode-id="722" id="MJXp-Span-1905" style="margin-left: 0em; margin-right: 0.222em;"><span data-dcnode-id="723" instrument_node="">,</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="720" id="MJXp-Span-1906"><span data-dcnode-id="721" instrument_node="">y</span></span><span class="MJXp-mo" data-dcnode-id="718" id="MJXp-Span-1907" style="margin-left: 0em; margin-right: 0.222em;"><span data-dcnode-id="719" instrument_node="">,</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="716" id="MJXp-Span-1908"><span data-dcnode-id="717" instrument_node="">z</span></span><span class="MJXp-mo" data-dcnode-id="714" id="MJXp-Span-1909" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="715" instrument_node="">}</span></span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="710" id="MathJax-Element-82-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="706" instrument_node=""> and is defined as </span><span data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">[99]</span></span><span data-dcnode-id="703" instrument_node="">, </span></p><div class="formula" data-dcnode-id="611"><span class="label" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">(4)</span></span><span class="math" data-dcnode-id="612"><span class="MathJax_Preview" data-dcnode-id="616" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="617" id="MJXp-Span-1910"><span class="MJXp-mi MJXp-italic" data-dcnode-id="698" id="MJXp-Span-1911"><span data-dcnode-id="699" instrument_node="">β</span></span><span class="MJXp-mrow" data-dcnode-id="691" id="MJXp-Span-1912"><span class="MJXp-mo" data-dcnode-id="696" id="MJXp-Span-1913" style="margin-left: 0em; margin-right: 0em;"><span data-dcnode-id="697" instrument_node="">(</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id Xp-mrow" data-dcnode-id="640" id="MJXp-Span-1939" style="margin-right: 0.05em;"><span class="MJXp-mi MJXp-italic" data-dcnode-id="641" id="MJXp-Span-1940"><span data-dcnode-id="642" instrument_node="">σ</span></span></span><span class="MJXp-script-box" data-dcnode-id="627" style="height: 1.86em; vertical-align: -0.64em;"><span class="MJXp-script" data-dcnode-id="634"><span data-dcnode-id="635"><span data-dcnode-id="636" style="margin-bottom: -0.25em;"><span class="MJXp-mrow" data-dcnode-id="637" id="MJXp-Span-1943"><span class="MJXp-mn" data-dcnode-id="638" id="MJXp-Span-1944"><span data-dcnode-id="639" instrument_node="">2</span></span></span></span></span></span><span class="MJXp-script" data-dcnode-id="628"><span data-dcnode-id="629"><span data-dcnode-id="630" style="margin-top: -0.85em;"><span class="MJXp-mrow" data-dcnode-id="631" id="MJXp-Span-1941"><span class="MJXp-mi MJXp-italic" data-dcnode-id="632" id="MJXp-Span-1942"><span data-dcnode-id="633" instrument_node="">x</span></span></span></span></span></span></span></span></span></span></span></span></span></span><span class="MJXp-mtext" data-dcnode-id="618" id="MJXp-Span-1945"><span data-dcnode-id="619" instrument_node="">.</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="615" id="MathJax-Element-83-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span></div><p data-dcnode-id="579"><span data-dcnode-id="610" instrument_node=""> At the Solar radius from the Galactic center (</span><span class="math" data-dcnode-id="593"><span class="MathJax_Preview" data-dcnode-id="597" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="598" id="MJXp-Span-1946"><span class="MJXp-msub" data-dcnode-id="603" id="MJXp-Span-1947"><span class="MJXp-mrow" data-dcnode-id="607" id="MJXp-Span-1948" style="margin-right: 0.05em;"><span class="MJXp-mi MJXp-italic" data-dcnode-id="608" id="MJXp-Span-1949"><span data-dcnode-id="609" instrument_node="">R</span></span></span><span class="MJXp-mrow MJXp-script" data-dcnode-id="604" id="MJXp-Span-1950" style="vertical-align: -0.4em;"><span class="MJXp-mo" data-dcnode-id="605" id="MJXp-Span-1951"><span data-dcnode-id="606" instrument_node="">⊙</span></span></span></span><span class="MJXp-mo" data-dcnode-id="601" id="MJXp-Span-1952" style="margin-left: 0.333em; margin-right: 0.333em;"><span data-dcnode-id="602" instrument_node="">=</span></span><span class="MJXp-mn" data-dcnode-id="599" id="MJXp-Span-1953"><span data-dcnode-id="600" instrument_node="">8</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="596" id="MathJax-Element-84-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="592" instrument_node=""> kpc), N-body simulations&nbsp; </span><span data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">[116,125–127]</span></span><span data-dcnode-id="589" instrument_node="">, with or without baryons, predict a </span><span class="math" data-dcnode-id="581"><span class="MathJax_Preview" data-dcnode-id="585" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="586" id="MJXp-Span-1954"><span class="MJXp-mi MJXp-italic" data-dcnode-id="587" id="MJXp-Span-1955"><span data-dcnode-id="588" instrument_node="">β</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="584" id="MathJax-Element-85-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="580" instrument_node=""> parameter spanning the range 0 to 0.4 which is in favor of radial anisotropy.</span></p></div><p data-dcnode-id="570" id="S0370157316001022-p000200"><span data-dcnode-id="577" instrument_node="">In addition to uncertainties in the overall shape of the distribution, the high speed tail contains stochastic features (dubbed “debris flow”) from incompletely phase-mixed material&nbsp; </span><span data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">[128,129]</span></span><span data-dcnode-id="574" instrument_node="">. It is also possible that the local DM distribution may contain streams from substructures that are in the process of being disrupted. For instance the Dark Matter component of one of the streams from the Sagittarius dwarf galaxy may pass through the Solar neighborhood&nbsp; </span><span data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">[130,131]</span></span><span data-dcnode-id="571" instrument_node="">.</span></p><p data-dcnode-id="536" id="S0370157316001022-p000205"><span data-dcnode-id="569" instrument_node="">The baryonic disk can also affect the DM distribution. Late merging halos are dragged into the disk by dynamical friction, where they are destroyed, leading to the formation of a co-rotating dark disk (DD)&nbsp; </span><span data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">[132,133]</span></span><span data-dcnode-id="566" instrument_node="">. While the contribution of the DD to the local DM density is uncertain, it is currently expected to be small, owing to the relatively quiescent merger history of the MW&nbsp; </span><span data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">[134]</span></span><span data-dcnode-id="563" instrument_node="">. Eris, a simulation of a MW-like galaxy including baryonic physics, has a DD which contributes less than </span><span class="math" data-dcnode-id="553"><span class="MathJax_Preview" data-dcnode-id="557" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="558" id="MJXp-Span-1956"><span class="MJXp-mn" data-dcnode-id="561" id="MJXp-Span-1957"><span data-dcnode-id="562" instrument_node="">10</span></span><span class="MJXp-mi MJXp-italic" data-dcnode-id="559" id="MJXp-Span-1958"><span data-dcnode-id="560" instrument_node="">%</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="556" id="MathJax-Element-86-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="552" instrument_node=""> of the local DM density&nbsp; </span><span data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">[120]</span></span><span data-dcnode-id="549" instrument_node="">. Ref.&nbsp; </span><span data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">[122]</span></span><span data-dcnode-id="546" instrument_node=""> finds that there may be some hints for the existence of a DD in only 2 out of 14 MW-like galaxies in the EAGLE and APOSTLE hydrodynamic simulations, while Ref.&nbsp; </span><span data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">[123]</span></span><span data-dcnode-id="543" instrument_node=""> does not find a significant DD in the two MW-like galaxies they studied from the MaGICC simulations. Furthermore, chemo-dynamical analysis of data from the Gaia-ESO Survey has found no evidence for the stellar component of an accreted disk&nbsp; </span><span data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">[135]</span></span><span data-dcnode-id="540" instrument_node="">. Further constraints on the dark disk density can be obtained by comparing global and local measures of the DM density (see Sec.&nbsp;5.4 of Ref.&nbsp; </span><span data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">[136]</span></span><span data-dcnode-id="537" instrument_node=""> for a review).</span></p><p data-dcnode-id="522" id="S0370157316001022-p000210"><span data-dcnode-id="535" instrument_node="">In the next section, we show how the velocity distribution enters into the calculation of the directional event rate. In Section&nbsp; </span><span data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">8.3</span></span><span data-dcnode-id="532" instrument_node=""> we will explore how directional detection may be used to probe the broad characteristics of the DM velocity distribution. In Sections&nbsp; </span><span data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">11 and 12</span></span><span data-dcnode-id="529" instrument_node=""> we extend this and discuss the possibility of detecting phase-space substructure and probing more general models for the velocity distribution. For more detailed discussion of astrophysical uncertainties pertaining to direct detection experiments see </span><em data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">e.g.</span></em><span data-dcnode-id="526" instrument_node=""> Refs.&nbsp; </span><span data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">[137,138]</span></span><span data-dcnode-id="523" instrument_node="">.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="515"><a aria-describedby="tp-snippet-chp-title-S0370157316001022" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157316001022" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="508"><a class="read-full-chapter-print" data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157316001022" rel="noopener" target="_blank"><span data-dcnode-id="514" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="509"><span data-dcnode-id="512" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="510" instrument_node="">https://www.sciencedirect.com/science/article/pii/S0370157316001022</span></div></div></article><article class="snippet column" data-dcnode-id="458" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="470"><h2 class="u-font-serif u-text-light" data-dcnode-id="503" id="tp-snippet-chp-title-S1387647304001162"><a class="anchor" data-aa-name="Science with the Square Kilometre Array" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647304001162"><span class="anchor-text" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Science with the Square Kilometre Array</span></span></a></h2><div class="size-l" data-dcnode-id="471"><cite data-dcnode-id="483"><p data-dcnode-id="484"><span data-dcnode-id="489"><span data-dcnode-id="502" instrument_node="">R. </span><span data-dcnode-id="500" instrument_node="">Beck</span><span data-dcnode-id="498" instrument_node="">, </span><span data-dcnode-id="496" instrument_node="">B.M. </span><span data-dcnode-id="494" instrument_node="">Gaensler</span><span data-dcnode-id="492" instrument_node="">, in</span><span data-dcnode-id="490" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="485" instrument_node="">, 2004</span></p></cite><p data-dcnode-id="472"><span data-dcnode-id="482" instrument_node="">A 1.4-GHz </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">all-sky survey of Faraday rotation</span></em><span data-dcnode-id="479" instrument_node=""> will accumulate tens of millions of rotation measure measurements toward background radio sources. This will allow us to characterize the overall magnetic geometry and turbulent properties of the disk and halo of the Milky Way, and of embedded individual objects such as H</span><span class="small-caps" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">ii</span></span><span data-dcnode-id="476" instrument_node=""> regions and SNRs. In a highly complementary fashion, mapping of diffuse polarized emission from the Milky Way in many narrow bands over a wide frequency range will allow us to carry out </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Faraday tomography</span></em><span data-dcnode-id="473" instrument_node=""> of the local Galaxy. The observing frequency for this tomography needs to be tuned to the ISM properties under study, e.g., ∼0.5 GHz for low-density regions and ∼5 GHz for high-density regions. The combination of these observations will yield a high-resolution three-dimensional picture of the magnetic field within a few kpc of the Sun. Direct synchrotron imaging of a large number of nearby galaxies (at frequencies &gt;5 GHz where Faraday depolarization is minimal) will uncover the detailed magnetic field structure in these sources. Together with Faraday rotation data from diffuse emission and from the all-sky survey of background sources, we will be able to test both the dynamo and primordial field theories for field origin and amplification and hence can establish an understanding of the structure and evolution of magnetic fields in galaxies.</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="466"><a aria-describedby="tp-snippet-chp-title-S1387647304001162" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647304001162" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="459"><a class="read-full-chapter-print" data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647304001162" rel="noopener" target="_blank"><span data-dcnode-id="465" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="460"><span data-dcnode-id="463" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="461" instrument_node="">https://www.sciencedirect.com/science/article/pii/S1387647304001162</span></div></div></article><article class="snippet column" data-dcnode-id="382" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="394"><h2 class="u-font-serif u-text-light" data-dcnode-id="454" id="tp-snippet-chp-title-S1387647305001041"><a class="anchor" data-aa-name="Wide-Field Imaging from Space" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647305001041"><span class="anchor-text" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Wide-Field Imaging from Space</span></span></a></h2><div class="size-l" data-dcnode-id="395"><cite data-dcnode-id="440"><p data-dcnode-id="441"><span data-dcnode-id="446"><span data-dcnode-id="453" instrument_node="">R. Michael </span><span data-dcnode-id="451" instrument_node="">Rich</span><span data-dcnode-id="449" instrument_node="">, in</span><span data-dcnode-id="447" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="442" instrument_node="">, 2005</span></p></cite><div data-dcnode-id="396"><p data-dcnode-id="421"><span data-dcnode-id="439" instrument_node="">Using Hubble and WFPC2, we have explored the stellar halo populations of other edge-on spiral and disk galaxies. We find a strong primary correlation between metallicity and the luminosity of the parent galaxy (</span><span data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Mouhcine et al., 2005</span></span><span data-dcnode-id="432"><span data-dcnode-id="436" instrument_node="">). However, the </span><span class="topic-highlight" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Milky Way halo</span></span><span data-dcnode-id="433" instrument_node=""> falls nearly 1 dex too metal poor, well below the trend (</span></span><span data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Fig. 6</span></span><span data-dcnode-id="429" instrument_node="">). At present, the field of view of WFPC2 (and also ACS) is too small to address the question of whether complex streams or features analogous to those seen in M31 by </span><span data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Ferguson et al. (2002)</span></span><span data-dcnode-id="426" instrument_node=""> may be detected out to 10–20</span><span data-dcnode-id="424" instrument_node="">&nbsp;</span><span data-dcnode-id="422" instrument_node="">Mpc. If one had the wide field of view and multi-wavelength capabilities of a SNAP-type mission, it would be possible to constrain the age distribution of halo stars (from the luminosity of AGB stars in the infrared) and to constrain better the metallicities from the shape of the red giant branch. The colors of the red giants could be compared to those of streams and satellites, and a truly general picture of stellar halos and early galaxy evolution might begin to emerge. There is the tantalizing possibility of measuring actual main sequence turnoff ages for the first time over a wide range of the Hubble sequence, perhaps pushing as distant as the ellipticals of the Virgo cluster. Coupling these data with the properties of the associated globular cluster systems might give one of the most powerful scientific legacies of such a mission.</span></p><figure class="figure text-xs" data-dcnode-id="397" id="S1387647305001041-fig6"><div class="download-image" data-dcnode-id="413"><div class="image-holder" data-dcnode-id="419"><img crossorigin="anonymous" data-dcnode-id="420" height="309" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1387647305001041-gr6.jpg&amp;raw"></div><div class="u-margin-s-ver text-s u-remove-if-print" data-dcnode-id="415"><a class="anchor" data-aa-conversiondriver="sd:tpp-topic-image:click" data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/user/login%3FreturnURL%3Dhttps%253A%252F%252Fwww.sciencedirect.com%252Ftopics%252Fphysics-and-astronomy%252Fmilky-way-halo"><span class="anchor-text" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Sign in to download full-size image</span></span></a></div><span data-dcnode-id="414" instrument_node=""></span></div><span class="captions" data-dcnode-id="398"><span data-dcnode-id="399"><p data-dcnode-id="400"><span class="label" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Fig. 6</span></span><span data-dcnode-id="410" instrument_node="">. </span><span data-dcnode-id="408" instrument_node="">Metallicity of stellar halo fields roughly 10</span><span data-dcnode-id="406" instrument_node="">&nbsp;</span><span data-dcnode-id="404" instrument_node="">kpc off the Galactic disk, against total luminosity of the parent system. Most Galaxies in this plot are edge-on spirals and the metallicities are derived from the colors of the resolved red giants (</span><span data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Mouhcine et al., 2005</span></span><span data-dcnode-id="401" instrument_node="">). Notice that the Milky Way lies 1 dex below the general trend, perhaps indicating that the Galactic bulge has been less important than the debris of accreted satellites in forming the halo population. The halos of these nearby galaxies such as NGC 4565 actually subtend roughly 20′ on the sky and deep imaging from a wide field imager could reveal features such as streamers from disrupted satellites.</span></p></span></span></figure></div></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="390"><a aria-describedby="tp-snippet-chp-title-S1387647305001041" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647305001041" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="383"><a class="read-full-chapter-print" data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1387647305001041" rel="noopener" target="_blank"><span data-dcnode-id="389" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="384"><span data-dcnode-id="387" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="385" instrument_node="">https://www.sciencedirect.com/science/article/pii/S1387647305001041</span></div></div></article><article class="snippet column" data-dcnode-id="310" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="322"><h2 class="u-font-serif u-text-light" data-dcnode-id="378" id="tp-snippet-chp-title-S138764730400065X"><a class="anchor" data-aa-name="Cosmic magnetic fields – as observed in the Universe, in galactic dynamos, and in the Milky Way" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S138764730400065X"><span class="anchor-text" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Cosmic magnetic fields – as observed in the Universe, in galactic dynamos, and in the Milky Way</span></span></a></h2><div class="size-l" data-dcnode-id="323"><cite data-dcnode-id="364"><p data-dcnode-id="365"><span data-dcnode-id="370"><span data-dcnode-id="377" instrument_node="">Jacques P. </span><span data-dcnode-id="375" instrument_node="">Vallée</span><span data-dcnode-id="373" instrument_node="">, in</span><span data-dcnode-id="371" instrument_node=""> </span></span><a class="anchor" data-aa-name="New Astronomy Reviews" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/new-astronomy-reviews"><span class="anchor-text" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">New Astronomy Reviews</span></span></a><span data-dcnode-id="366" instrument_node="">, 2004</span></p></cite><p data-dcnode-id="324"><span data-dcnode-id="363" instrument_node="">Using a global smoothing, </span><span data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Han and Qiao (1994)</span></span><span data-dcnode-id="360" instrument_node=""> suggested a S1 dynamo (</span><em data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">m</span></em><sub data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">azim</span></sub><span data-dcnode-id="355" instrument_node="">=1; </span><em data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">p</span></em><span data-dcnode-id="352" instrument_node="">=0) in the Milky Way, while </span><span data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Han et al. (1997)</span></span><span data-dcnode-id="349" instrument_node=""> suggested an A0 dynamo (</span><em data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">m</span></em><sub data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">azim</span></sub><span data-dcnode-id="344" instrument_node="">=0; </span><em data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">p</span></em><span data-dcnode-id="337"><span data-dcnode-id="341" instrument_node="">=1) in the </span><span class="topic-highlight" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Milky Way halo</span></span><span data-dcnode-id="338" instrument_node="">, inside the solar orbit. The last two studies both used much the same data but came to different conclusions, possibly due to neglecting to remove the strong RM of nearby superbubbles (∼90 rad/m</span></span><sup data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">2</span></sup><span data-dcnode-id="334" instrument_node="">) – thus the observations in Fig. 3 of </span><span data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Han et al. (1997)</span></span><span data-dcnode-id="331" instrument_node=""> shows that the pulsar RM does not increase with distance between 1 and 7 kpc, at high galactic latitudes, hence indicative of a </span><em data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">nearby</span></em><span data-dcnode-id="328" instrument_node=""> RM contribution to pulsars, which should have been removed. Pulsar RM may not be the best indicator of galactic magnetic field (</span><span data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Heiles, 1996a,b</span></span><span data-dcnode-id="325" instrument_node="">).</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="318"><a aria-describedby="tp-snippet-chp-title-S138764730400065X" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S138764730400065X" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="311"><a class="read-full-chapter-print" data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S138764730400065X" rel="noopener" target="_blank"><span data-dcnode-id="317" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="313" instrument_node="">https://www.sciencedirect.com/science/article/pii/S138764730400065X</span></div></div></article><article class="snippet column" data-dcnode-id="163" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="175"><h2 class="u-font-serif u-text-light" data-dcnode-id="306" id="tp-snippet-chp-title-S0370157304002996"><a class="anchor" data-aa-name="Dark matter and background light" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157304002996"><span class="anchor-text" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Dark matter and background light</span></span></a></h2><div class="size-l" data-dcnode-id="176"><cite data-dcnode-id="286"><p data-dcnode-id="287"><span data-dcnode-id="292"><span data-dcnode-id="305" instrument_node="">J.M. </span><span data-dcnode-id="303" instrument_node="">Overduin</span><span data-dcnode-id="301" instrument_node="">, </span><span data-dcnode-id="299" instrument_node="">P.S. </span><span data-dcnode-id="297" instrument_node="">Wesson</span><span data-dcnode-id="295" instrument_node="">, in</span><span data-dcnode-id="293" instrument_node=""> </span></span><a class="anchor" data-aa-name="Physics Reports" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/journal/physics-reports"><span class="anchor-text" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Physics Reports</span></span></a><span data-dcnode-id="288" instrument_node="">, 2004</span></p></cite><p data-dcnode-id="177"><span data-dcnode-id="285" instrument_node="">Pair annihilation into </span><em data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">photons</span></em><span data-dcnode-id="282" instrument_node=""> provides a complementary indirect search technique. The photons so produced lie in the </span><span class="math" data-dcnode-id="274"><span class="MathJax_Preview" data-dcnode-id="278" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="279" id="MJXp-Span-1959"><span class="MJXp-mi MJXp-italic" data-dcnode-id="280" id="MJXp-Span-1960"><span data-dcnode-id="281" instrument_node="">γ</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="277" id="MathJax-Element-87-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="273" instrument_node="">-ray portion of the spectrum for the range of WIMP rest energies considered here (50</span><span data-dcnode-id="271" instrument_node="">&nbsp;</span><span data-dcnode-id="269" instrument_node="">GeV</span><span class="math" data-dcnode-id="227"><span class="MathJax_Preview" data-dcnode-id="231" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="232" id="MJXp-Span-1961"><span class="MJXp-mspace" data-dcnode-id="268" id="MJXp-Span-1962" style="width: 0.16em; height: 0em;"></span><span class="MJXp-mo" data-dcnode-id="266" id="MJXp-Span-1963" style="margin-left: 0.333em; margin-right: 0.333em;"><span data-dcnode-id="267" instrument_node="">≲</span></span><span class="MJXp-mspace" data-dcnode-id="265" id="MJXp-Span-1964" style="width: 0.16em; height: 0em;"></span><span class="MJXp-msub" data-dcnode-id="249" id="MJXp-Span-1965"><span class="MJXp-mrow" data-dcnode-id="262" id="MJXp-Span-1966" style="margin-right: 0.05em;"><span class="MJXp-mi MJXp-italic" data-dcnode-id="263" id="MJXp-Span-1967"><span data-dcnode-id="264" instrument_node="">m</span></span></span><span class="MJXp-mrow MJXp-script" data-dcnode-id="250" id="MJXp-Span-1968" style="vertical-align: -0.4em;"><span class="MJXp-mover" data-dcnode-id="251" id="MJXp-Span-1969"><span data-dcnode-id="252"><span class="MJXp-over" data-dcnode-id="253"><span class="MJXp-script" data-dcnode-id="258"><span class="MJXp-mrow" data-dcnode-id="259" id="MJXp-Span-1972" style="margin-right: 0px; margin-left: 0px;"><span class="MJXp-mo" data-dcnode-id="260" id="MJXp-Span-1973"><span data-dcnode-id="261" instrument_node="">˜</span></span></span></span><span class="" data-dcnode-id="254"><span class="MJXp-mrow" data-dcnode-id="255" id="MJXp-Span-1970"><span class="MJXp-mi MJXp-italic" data-dcnode-id="256" id="MJXp-Span-1971"><span data-dcnode-id="257" instrument_node="">χ</span></span></span></span></span></span></span></span></span><span class="MJXp-msup" data-dcnode-id="242" id="MJXp-Span-1974"><span class="MJXp-mrow" data-dcnode-id="246" id="MJXp-Span-1975" style="margin-right: 0.05em;"><span class="MJXp-mi MJXp-italic" data-dcnode-id="247" id="MJXp-Span-1976"><span data-dcnode-id="248" instrument_node="">c</span></span></span><span class="MJXp-mrow MJXp-script" data-dcnode-id="243" id="MJXp-Span-1977" style="vertical-align: 0.5em;"><span class="MJXp-mn" data-dcnode-id="244" id="MJXp-Span-1978"><span data-dcnode-id="245" instrument_node="">2</span></span></span></span><span class="MJXp-mspace" data-dcnode-id="241" id="MJXp-Span-1979" style="width: 0.16em; height: 0em;"></span><span class="MJXp-mo" data-dcnode-id="239" id="MJXp-Span-1980" style="margin-left: 0.333em; margin-right: 0.333em;"><span data-dcnode-id="240" instrument_node="">≲</span></span><span class="MJXp-mspace" data-dcnode-id="238" id="MJXp-Span-1981" style="width: 0.16em; height: 0em;"></span><span class="MJXp-mn" data-dcnode-id="236" id="MJXp-Span-1982"><span data-dcnode-id="237" instrument_node="">1000</span></span><span class="MJXp-mspace" data-dcnode-id="235" id="MJXp-Span-1983" style="width: 0.16em; height: 0em;"></span><span class="MJXp-mi" data-dcnode-id="233" id="MJXp-Span-1984"><span data-dcnode-id="234" instrument_node="">GeV</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="230" id="MathJax-Element-88-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="226" instrument_node="">). Beginning with Sciama </span><span data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">[308]</span></span><span data-dcnode-id="223" instrument_node="">, Silk and Srednicki </span><span data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">[322]</span></span><span data-dcnode-id="220" instrument_node="">, many workers have studied the possibility of </span><span class="math" data-dcnode-id="212"><span class="MathJax_Preview" data-dcnode-id="216" style="color: inherit;"><span class="MJXp-math" data-dcnode-id="217" id="MJXp-Span-1985"><span class="MJXp-mi MJXp-italic" data-dcnode-id="218" id="MJXp-Span-1986"><span data-dcnode-id="219" instrument_node="">γ</span></span></span></span><span class="MathJax_SVG MathJax_SVG_Processing" data-dcnode-id="215" id="MathJax-Element-89-Frame" style="font-size: 100%; display: inline-block;" tabindex="0"></span></span><span data-dcnode-id="211" instrument_node="">-rays from SUSY WIMP annihilations in the halo of the Milky Way, which gives the strongest signal. Prognoses for detection have ranged from very optimistic </span><span data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">[327]</span></span><span data-dcnode-id="208" instrument_node=""> to very pessimistic </span><span data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">[328]</span></span><span data-dcnode-id="205" instrument_node="">; converging gradually to the conclusion that neutralino-annihilation contributions would be at or somewhat below the level of the Galactic background, and possibly distinguishable from it by their spectral shape </span><span data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">[329–331]</span></span><span data-dcnode-id="202" instrument_node="">. Recent studies have focused on possible enhancements of the signal in the presence of a high-density Galactic core </span><span data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">[332]</span></span><span data-dcnode-id="199" instrument_node="">, a flattened halo </span><span data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">[333]</span></span><span data-dcnode-id="196" instrument_node="">, a very extended singular halo </span><span data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">[334]</span></span><span data-dcnode-id="193" instrument_node="">, a massive central black hole </span><span data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">[335]</span></span><span data-dcnode-id="190" instrument_node="">, significant substructure </span><span data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">[336–338]</span></span><span data-dcnode-id="187" instrument_node=""> and adiabatic compression due to baryons </span><span data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">[339]</span></span><span data-dcnode-id="184" instrument_node="">. The current state of the art in this area is summarized in Ref. </span><span data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">[340]</span></span><span data-dcnode-id="181" instrument_node=""> with attention to prospects for detection by the upcoming G</span><span class="small-caps" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">LAST</span></span><span data-dcnode-id="178" instrument_node=""> mission.</span></p></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="171"><a aria-describedby="tp-snippet-chp-title-S0370157304002996" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157304002996" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">View article</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="164"><a class="read-full-chapter-print" data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0370157304002996" rel="noopener" target="_blank"><span data-dcnode-id="170" instrument_node="">Read full article</span></a><div class="chapter-url-print" data-dcnode-id="165"><span data-dcnode-id="168" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="166" instrument_node="">https://www.sciencedirect.com/science/article/pii/S0370157304002996</span></div></div></article><aside class="col
