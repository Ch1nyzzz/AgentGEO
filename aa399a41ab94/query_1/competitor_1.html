</span></li><li data-dcnode-id="1398"><span data-dcnode-id="1418" instrument_node=""> In </span><em data-dcnode-id="1415"><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheQContinuum" title="/pmwiki/pmwiki.php/Literature/TheQContinuum"><span data-dcnode-id="1417" instrument_node="">The Q Continuum</span></a></em><span data-dcnode-id="1414" instrument_node=""> the two barriers (surrounding the galaxy and at its center) were created by the </span><a class="twikilink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnergyBeings" title="/pmwiki/pmwiki.php/Main/EnergyBeings"><span data-dcnode-id="1413" instrument_node="">all-powerful Q</span></a><span data-dcnode-id="1411" instrument_node=""> to keep a </span><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1410" instrument_node="">Big Bad</span></a><span data-dcnode-id="1408" instrument_node=""> (named </span><strong data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">0</span></strong><span data-dcnode-id="1405" instrument_node="">) from re-entering the galaxy (</span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/StarTrekVTheFinalFrontier" title="/pmwiki/pmwiki.php/Film/StarTrekVTheFinalFrontier"><span data-dcnode-id="1404" instrument_node="">and another's head trapped in the center</span></a><span data-dcnode-id="1402" instrument_node="">). The side-effect of causing psychics to go crazy is unintentional. Furthermore, </span><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">0</span></strong><span data-dcnode-id="1399" instrument_node=""> is a "crippled" energy being, meaning it can't go faster than light-speed under its own power, which is why it hasn't simply tried to leave for Andromeda (that, and it's insane).
</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1397" instrument_node=""> Both </span><em data-dcnode-id="1394"><a class="twikilink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine" title="/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine"><span data-dcnode-id="1396" instrument_node="">Star Trek: Deep Space Nine</span></a></em><span data-dcnode-id="1393" instrument_node=""> and </span><em data-dcnode-id="1390"><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekVoyager" title="/pmwiki/pmwiki.php/Series/StarTrekVoyager"><span data-dcnode-id="1392" instrument_node="">Voyager</span></a></em><span data-dcnode-id="1389" instrument_node=""> examined the Delta and Gamma Quadrants, and established a </span><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">mostly</span></em><span data-dcnode-id="1386" instrument_node=""> consistent "100 years to cross the galaxy" rule to explain the lack of intergalactic travel. Trying to not die of Borg attacks or running out of resources (</span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Voyager</span></em><span data-dcnode-id="1383" instrument_node="">) or survive all out war with </span><a class="twikilink" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="1382" instrument_node="">The Dominion</span></a><span data-dcnode-id="1380" instrument_node=""> (</span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Deep Space 9</span></em><span data-dcnode-id="1377" instrument_node="">) probably didn't help exploration much either.
</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekTheNextGeneration" title="/pmwiki/pmwiki.php/Series/StarTrekTheNextGeneration"><span data-dcnode-id="1374" instrument_node="">TNG</span></a><span data-dcnode-id="1372" instrument_node=""> episode "Where No One Has Gone Before", the Enterprise, with the Traveler's help, goes one billion light-years away from the Milky Way, to the "edge of the known universe".
</span></li><li data-dcnode-id="1362"><span data-dcnode-id="1370" instrument_node=""> </span><em data-dcnode-id="1367"><a class="twikilink" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekDiscovery" title="/pmwiki/pmwiki.php/Series/StarTrekDiscovery"><span data-dcnode-id="1369" instrument_node="">Star Trek: Discovery</span></a></em><span data-dcnode-id="1366" instrument_node=""> reveals that even with the spore drive, </span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Discovery</span></em><span data-dcnode-id="1363" instrument_node=""> is still pretty much limited to the Milky Way since the mycelial network thins out near the galactic rim.
</span></li></ul></li><li data-dcnode-id="1336"><span data-dcnode-id="1359" instrument_node=""> </span><em data-dcnode-id="1356"><a class="twikilink" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BlakesSeven" title="/pmwiki/pmwiki.php/Series/BlakesSeven"><span data-dcnode-id="1358" instrument_node="">Blake's 7</span></a></em><span data-dcnode-id="1355" instrument_node=""> used a considerably more prosaic "barrier around the galaxy" in the form of </span><em data-dcnode-id="1351"><span data-dcnode-id="1354" instrument_node="">a huge field of </span><a class="twikilink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceMines" title="/pmwiki/pmwiki.php/Main/SpaceMines"><span data-dcnode-id="1353" instrument_node="">Space Mines</span></a></em><span data-dcnode-id="1350" instrument_node=""> that apparently extend right across the Federation's territory at the very edge of the galaxy. </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Lampshaded" title="/pmwiki/pmwiki.php/Main/Lampshaded"><span data-dcnode-id="1349" instrument_node="">Lampshaded</span></a><span data-dcnode-id="1347" instrument_node=""> as being an absurd expense even for a brutally repressive autocracy like the Terran Federation, since no known race has FTL capable of crossing intergalactic space in less than a matter of centuries. Cue a moment of what can only be described as in-universe </span><a class="twikilink" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeHorror" title="/pmwiki/pmwiki.php/Main/FridgeHorror"><span data-dcnode-id="1346" instrument_node="">Fridge Horror</span></a><span data-dcnode-id="1344" instrument_node="">:
</span><div class="indent" data-dcnode-id="1337"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Avon</span></strong><span data-dcnode-id="1341" instrument_node="">: Was it built to keep humanity in... or something else out? (</span><span class="spoiler" data-dcnode-id="1339" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1340" instrument_node="">It was the latter.</span></span><span data-dcnode-id="1338" instrument_node="">)
</span></div></li><li data-dcnode-id="1315"><span data-dcnode-id="1335" instrument_node=""> Played very straight in </span><em data-dcnode-id="1332"><a class="twikilink" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BabylonFive" title="/pmwiki/pmwiki.php/Series/BabylonFive"><span data-dcnode-id="1334" instrument_node="">Babylon 5</span></a></em><span data-dcnode-id="1331" instrument_node="">. Leaving the galaxy seems to be a rite of passage for the most ancient, advanced, incomprehensible races. It's implied that most of the familiar races (including humanity) are millions of years away from reaching this level, and that not all such ancient, advanced races immediately take the step (two such older races are always left behind to guide the younger ones).</span><span class="notelabel" data-dcnode-id="1328" onclick="togglenote('note38miy');" style="cursor: pointer;"><sup data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1317" id="note38miy" isnote="true" onclick="togglenote('note38miy');" style="display: none; cursor: pointer;"><span data-dcnode-id="1327" instrument_node="">The first pair were the Vorlons and Shadows, who tried to guide by presenting the races with a choice of </span><a class="twikilink" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrderVersusChaos" title="/pmwiki/pmwiki.php/Main/OrderVersusChaos"><span data-dcnode-id="1326" instrument_node="">Order Versus Chaos</span></a><span data-dcnode-id="1324" instrument_node="">; eventually </span><a class="twikilink" data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotiveDecay" title="/pmwiki/pmwiki.php/Main/MotiveDecay"><span data-dcnode-id="1323" instrument_node="">they forgot they were supposed to be teaching</span></a><span data-dcnode-id="1321" instrument_node=""> and it got personal, so they were shamed into leaving the galaxy. The </span><a class="twikilink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistantFinale" title="/pmwiki/pmwiki.php/Main/DistantFinale"><span data-dcnode-id="1320" instrument_node="">Distant Finale</span></a><span data-dcnode-id="1318" instrument_node=""> to Season 4 seems to indicate that humans and Minbari become the next two such races, with the humans representing Progress and Forward-thinking and the Minbari representing Tradition and Rootedness.</span></span><span data-dcnode-id="1316" instrument_node="">
</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1314" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StargateVerse" title="/pmwiki/pmwiki.php/Franchise/StargateVerse"><span data-dcnode-id="1313" instrument_node="">Stargate-verse</span></a><span data-dcnode-id="1311" instrument_node="">:
</span><ul data-dcnode-id="1255"><li data-dcnode-id="1290"><span data-dcnode-id="1310" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1309" instrument_node="">The Stargate network</span></a><span data-dcnode-id="1307" instrument_node=""> can near-instantaneously teleport people and objects from one Stargate to another on the opposite side of the Milky Way Galaxy, but they </span><em data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">normally</span></em><span data-dcnode-id="1304" instrument_node=""> can't travel to other galaxies. It is stated that Go'uld starship engines can take "months" to travel from one far side of the galaxy to the other, and over a century to reach another galaxy. As the original series progressed, however, they eventually found out that if provided with sufficient power (a </span><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">massive</span></em><span data-dcnode-id="1301" instrument_node=""> amount beyond humanity's ability to generate using conventional means) a Stargate can connect to Stargates in other galaxies (left behind by the gate-builders). Only three other galaxies are visited: the Ida galaxy (home of </span><a class="twikilink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigGood" title="/pmwiki/pmwiki.php/Main/BigGood"><span data-dcnode-id="1300" instrument_node="">the benevolent Asgard</span></a><span data-dcnode-id="1298" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts" title="/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts"><span data-dcnode-id="1297" instrument_node="">the virus nanobots</span></a><span data-dcnode-id="1295" instrument_node=""> known as the Replicators), the Pegasus galaxy (setting of the spinoff series </span><em data-dcnode-id="1292"><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StargateAtlantis" title="/pmwiki/pmwiki.php/Series/StargateAtlantis"><span data-dcnode-id="1294" instrument_node="">Stargate Atlantis</span></a></em><span data-dcnode-id="1291" instrument_node="">), and the Ori home galaxy. The initial expedition to Pegasus was one-way, because they only had one Zero-Point Module (ZPM), a football-sized super-reactor that was a pinnacle of gate-builder technology. Later they find more of these and are able to sporadically link the Stargates back and forth to Earth while having a ship with Asgard-built hyperdrives make regular month-long trips between Milky Way and Pegasus, which can be accelerated to three days with a ZPM.
</span></li><li data-dcnode-id="1279"><span data-dcnode-id="1289" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigGood" title="/pmwiki/pmwiki.php/Main/BigGood"><span data-dcnode-id="1288" instrument_node="">Asgard</span></a><span data-dcnode-id="1286" instrument_node=""> themselves subvert this trope </span><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">hard</span></em><span data-dcnode-id="1283" instrument_node="">, as Thor's ship was able to cross the distance between the Ida galaxy and the Milky Way in a matter of </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">hours</span></em><span data-dcnode-id="1280" instrument_node="">.
</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node=""> One rather nifty idea they came up with was to collect dozens of Stargates from abandoned and unused planets, then set them adrift in the middle of intergalactic space, literally creating a "Gate bridge" between the two galaxies. One Stargate at the extreme edge of the Milky Way is capable of teleporting to another at the exact opposite far edge, and the distance to Pegasus is the length of about 30 or so Milky Ways set end to end - so they simply set up about three dozen Stargates all in a row, each automatically "dialing" the next one and forwarding the teleportation-stream transmission to the next one. It couldn't go from Pegasus to Earth in one unbroken line, though; where the "area code" shifts at the mid-point between galaxies, they needed to build a free-floating space station. Still, once completed, they didn't need to rely on ZPMs to travel between galaxies anymore.
</span></li><li data-dcnode-id="1256"><span data-dcnode-id="1276" instrument_node=""> Averted in </span><em data-dcnode-id="1273"><a class="twikilink" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StargateUniverse" title="/pmwiki/pmwiki.php/Series/StargateUniverse"><span data-dcnode-id="1275" instrument_node="">Stargate Universe</span></a></em><span data-dcnode-id="1272" instrument_node=""> with the discovery of an </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">ancient</span></em><span data-dcnode-id="1269" instrument_node=""> Ancient starship sent out long ago to explore the universe and look for some sort of construct. The </span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Destiny</span></em><span data-dcnode-id="1266" instrument_node=""> has so many hyperdrives (of a different, earlier, design) that crossing intergalactic distances is easy, provided there's enough power, since the </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Destiny</span></em><span data-dcnode-id="1263" instrument_node=""> recharges by </span><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">diving into a star</span></em><span data-dcnode-id="1260" instrument_node=""> (and there are none between galaxies), but even then, the lack of living crew meant it could just drift the last few million light-years the old fashion way. There are several gate-laying ships (about half the size of the </span><em data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Destiny</span></em><span data-dcnode-id="1257" instrument_node="">) flying ahead of her, planting stargates on useful planets.
</span></li></ul></li><li data-dcnode-id="1248"><span data-dcnode-id="1253" instrument_node=""> Averted in </span><em data-dcnode-id="1250"><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Andromeda" title="/pmwiki/pmwiki.php/Series/Andromeda"><span data-dcnode-id="1252" instrument_node="">Andromeda</span></a></em><span data-dcnode-id="1249" instrument_node="">. The Systems Commonwealth, at its largest, spanned the Milky Way, the Small Magellanic Cloud and the Andromeda galaxy, with its capital, Tarn Vedra, situated in Andromeda. The resident way of FTL travel is independent from normal space, meaning that two systems that are next to each other in FTL may be in different galaxies.
</span></li></ul></div><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1244"></p><div class="folderlabel" data-dcnode-id="1242" onclick="togglefolder('folder7');"><span data-dcnode-id="1243" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="1174" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="1241" instrument_node="">
</span><ul data-dcnode-id="1175"><li data-dcnode-id="1210"><span data-dcnode-id="1240" instrument_node=""> In </span><em data-dcnode-id="1237"><a class="twikilink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer40000" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer40000"><span data-dcnode-id="1239" instrument_node="">Warhammer 40,000</span></a></em><span data-dcnode-id="1236" instrument_node="">, the </span><a class="twikilink" data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreWarriors" title="/pmwiki/pmwiki.php/Main/HumansAreWarriors"><span data-dcnode-id="1235" instrument_node="">Imperium of Man</span></a><span data-dcnode-id="1233" instrument_node=""> is prevented from going beyond the galaxy by the Astronomicon (a psychic lighthouse needed for reliable Warp travel) not being powerful enough to guide them that far. The </span><a class="twikilink" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceElves" title="/pmwiki/pmwiki.php/Main/SpaceElves"><span data-dcnode-id="1232" instrument_node="">Eldar</span></a><span data-dcnode-id="1230" instrument_node=""> are constricted by the infrastructure of their webway tunnels, </span><a class="twikilink" data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceOrcs" title="/pmwiki/pmwiki.php/Main/SpaceOrcs"><span data-dcnode-id="1229" instrument_node="">Ork</span></a><span data-dcnode-id="1227" instrument_node=""> Warp travel is haphazard and they would probably kill each other out of sheer boredom before the trip was 1/10th done, and the Tau are limited to a form of FTL considerably slower than true Warp travel. The </span><a class="twikilink" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts" title="/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts"><span data-dcnode-id="1226" instrument_node="">Tyranids</span></a><span data-dcnode-id="1224" instrument_node=""> come from another galaxy, but they probably traveled very slowly between the galaxies. (One book of the </span><em data-dcnode-id="1221"><a class="twikilink" data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HorusHeresy" title="/pmwiki/pmwiki.php/Literature/HorusHeresy"><span data-dcnode-id="1223" instrument_node="">Horus Heresy</span></a></em><span data-dcnode-id="1220" instrument_node=""> prequel series ended with a stinger showing the Tyranids being clued into the Milky Way's location. They don't actually </span><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">arrive</span></em><span data-dcnode-id="1217" instrument_node=""> until ten thousand years later.) What isn't explained, however, is why the </span><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RobotWar" title="/pmwiki/pmwiki.php/Main/RobotWar"><span data-dcnode-id="1216" instrument_node="">Necrons</span></a><span data-dcnode-id="1214" instrument_node=""> and their C'tan masters went into hibernation after scouring the galaxy clean of most life millions of years ago, given that their inertialess drives (fast FTL without entering the Warp) and immortal shells give them the means to travel to other galaxies even if it takes thousands of years, and the prospect of killing more living gives them a motive. The fifth edition Necron codex </span><a class="twikilink" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retcon" title="/pmwiki/pmwiki.php/Main/Retcon"><span data-dcnode-id="1213" instrument_node="">retcons</span></a><span data-dcnode-id="1211" instrument_node=""> the whole thing away, saying they just hack the Eldar webway and use their immortality to take longer trips at sub-light speeds. The Necron leader and his personal forces actually did leave the galaxy on a personal quest, but after meeting the Tyranids in the gulf between they turned back.
</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1209" instrument_node=""> In </span><em data-dcnode-id="1206"><a class="twikilink" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Traveller" title="/pmwiki/pmwiki.php/TabletopGame/Traveller"><span data-dcnode-id="1208" instrument_node="">Traveller</span></a></em><span data-dcnode-id="1205" instrument_node=""> only a small part of the Milky Way is known by Emperor Strephon's time.
</span></li><li data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node=""> Inverted by </span><a class="twikilink" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Rifts" title="/pmwiki/pmwiki.php/TabletopGame/Rifts"><span data-dcnode-id="1202" instrument_node="">Palladium's Phase World</span></a><span data-dcnode-id="1200" instrument_node=""> setting. The FTL engines used are slowed down by gravity interference from stars and suchlike, meaning that it's often just as fast moving between the closely spaced galaxies as it is crossing the same one.
</span></li><li data-dcnode-id="1187"><span data-dcnode-id="1198" instrument_node=""> Justified in </span><em data-dcnode-id="1195"><a class="twikilink" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/BattleTech" title="/pmwiki/pmwiki.php/TabletopGame/BattleTech"><span data-dcnode-id="1197" instrument_node="">BattleTech</span></a></em><span data-dcnode-id="1194" instrument_node=""> by the low FTL speeds of JumpShips. Yes, they can make near-if-not-quite instantaneous 'jumps' over up to 30 light-years at once...then the drive core takes at least a week to safely recharge, requiring either a nearby star to collect the energy via solar sail or eating into the limited fuel reserves if using the ship's own power plant to do so. The charging time and the lack of ship production facilities has the side effect of making exploration a perilous endeavor - nobody wants to go exploring in unmapped systems in a </span><a class="twikilink" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UsedFuture" title="/pmwiki/pmwiki.php/Main/UsedFuture"><span data-dcnode-id="1193" instrument_node="">four hundred year old</span></a><span data-dcnode-id="1191" instrument_node=""> priceless starship whose </span><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LostTechnology" title="/pmwiki/pmwiki.php/Main/LostTechnology"><span data-dcnode-id="1190" instrument_node="">construction techniques and shipyards have long since been forgotten</span></a><span data-dcnode-id="1188" instrument_node="">, when there is a chance that said four hundred year old jump drive can suddenly stop working, thus stranding the ship.
</span></li><li data-dcnode-id="1176"><span data-dcnode-id="1186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Spelljammer" title="/pmwiki/pmwiki.php/TabletopGame/Spelljammer"><span data-dcnode-id="1185" instrument_node="">Spelljammer</span></a><span data-dcnode-id="1183" instrument_node=""> is a weird one, considering that yes, by technicality, the entire setting (by extension, </span><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">all</span></em><span data-dcnode-id="1180" instrument_node=""> of Dungeons and Dragons) is set in only one galaxy. The interesting part, is that there </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">are</span></em><span data-dcnode-id="1177" instrument_node=""> no galaxies. The stars aren't actual celestial objects, they're just lights on the inside of the Crystal Sphere, massive and natural (or divine) Dyson's spheres (not accounting for the occasional star spawn). There isn't even any empty space in the traditional sense. "Wildspace" as it's called goes out to about twice the diameter of the outermost orbit, and then the crystal shell. On the other side, there are other shells, but there is no implication that they're actually organized into galaxies.
</span></li></ul></div><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1172"></p><div class="folderlabel" data-dcnode-id="1170" onclick="togglefolder('folder8');"><span data-dcnode-id="1171" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="944" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="1169" instrument_node="">
</span><ul data-dcnode-id="945"><li data-dcnode-id="1154"><span data-dcnode-id="1168" instrument_node=""> In </span><em data-dcnode-id="1165"><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EVEOnline" title="/pmwiki/pmwiki.php/VideoGame/EVEOnline"><span data-dcnode-id="1167" instrument_node="">EVE Online</span></a></em><span data-dcnode-id="1164" instrument_node="">, the wormhole that brought humanity from The Milky Way to New Eden in the backstory of collapsed millennia before the game's setting. The limits of stargate construction in the make it impossible to create an artificial link back. This limits gameplay to one galaxy, though you can see the wormhole's remains in the New Eden solarsystem. The later addition of ubiquitous wormholes appearing and disappearing throughout the galaxy granted access to another galaxy, where a race called </span><a class="twikilink" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1163" instrument_node="">the Talocan</span></a><span data-dcnode-id="1161" instrument_node=""> left their vicious </span><a class="twikilink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackDrone" title="/pmwiki/pmwiki.php/Main/AttackDrone"><span data-dcnode-id="1160" instrument_node="">Sleepers</span></a><span data-dcnode-id="1158" instrument_node=""> to guard their </span><a class="twikilink" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AppliedPhlebotinum" title="/pmwiki/pmwiki.php/Main/AppliedPhlebotinum"><span data-dcnode-id="1157" instrument_node="">advanced technology</span></a><span data-dcnode-id="1155" instrument_node="">. The new wormhole systems are dangerous and lawless, but exploiting them can be very profitable. Its also speculated that the Sleepers were left behind or are the remnants of Humanity that was cut off when the Eden wormhole collapsed.
</span></li><li data-dcnode-id="1115"><span data-dcnode-id="1153" instrument_node=""> </span><em data-dcnode-id="1150"><a class="twikilink" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/MassEffect" title="/pmwiki/pmwiki.php/Franchise/MassEffect"><span data-dcnode-id="1152" instrument_node="">Mass Effect</span></a></em><span data-dcnode-id="1149" instrument_node="">:
</span><ul data-dcnode-id="1116"><li data-dcnode-id="1129"><span data-dcnode-id="1148" instrument_node=""> The original trilogy and its associated materials is set in the Milky Way and </span><span class="spoiler" data-dcnode-id="1146" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1147" instrument_node="">aside from the mechanical Reapers,</span></span><span data-dcnode-id="1145" instrument_node=""> none of the spacefaring civilizations in it are able to travel to other galaxies. This is because while the </span><a class="twikilink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1144" instrument_node="">Mass Relays</span></a><span data-dcnode-id="1142" instrument_node=""> which everyone uses to get around the galaxy allow instantaneous travel across hundreds to thousands of light-years, they are </span><a class="twikilink" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackBox" title="/pmwiki/pmwiki.php/Main/BlackBox"><span data-dcnode-id="1141" instrument_node="">Black Box</span></a><span data-dcnode-id="1139" instrument_node=""> technology, and not only does nobody know exactly how they work, a past </span><a class="twikilink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BugWar" title="/pmwiki/pmwiki.php/Main/BugWar"><span data-dcnode-id="1138" instrument_node="">Bug War</span></a><span data-dcnode-id="1136" instrument_node=""> has made </span><a class="twikilink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFederation" title="/pmwiki/pmwiki.php/Main/TheFederation"><span data-dcnode-id="1135" instrument_node="">The Federation</span></a><span data-dcnode-id="1133" instrument_node=""> very cautious about activating relays without knowing where they lead. The limitations of non-Relay FTL technology are even starker; it's so slow in comparison (only 10 light-years a day, at best) that it takes forever to get anywhere, and your effective range is limited by the need to discharge the ship's drive every 48 hours on a planet or in a sufficiently powerful magnetosphere. More than 99% of the galaxy remains unexplored. All of this is a non-issue for </span><span class="spoiler" data-dcnode-id="1131" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1132" instrument_node="">the Reapers</span></span><span data-dcnode-id="1130" instrument_node=""> given their immortality and vastly more advanced technology, and no explanation is given as to why they aren't interested in other galaxies.
</span></li><li data-dcnode-id="1117"><span data-dcnode-id="1128" instrument_node=""> </span><em data-dcnode-id="1125"><a class="twikilink" data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MassEffectAndromeda" title="/pmwiki/pmwiki.php/VideoGame/MassEffectAndromeda"><span data-dcnode-id="1127" instrument_node="">Mass Effect: Andromeda</span></a></em><span data-dcnode-id="1124" instrument_node=""> averts this trope, featuring an exploration party to the Andromeda Galaxy through going into stasis on a </span><a class="twikilink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SleeperShip" title="/pmwiki/pmwiki.php/Main/SleeperShip"><span data-dcnode-id="1123" instrument_node="">Sleeper Ship</span></a><span data-dcnode-id="1121" instrument_node="">. Even traveling at the fastest possible speed the FTL drives could provide (and new tech to avoid the discharge problem), it still took the ships over 600 years to make the trip, and there is nothing in Andromeda that </span><a class="twikilink" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantGoHomeAgain" title="/pmwiki/pmwiki.php/Main/YouCantGoHomeAgain"><span data-dcnode-id="1120" instrument_node="">could possibly send them back again</span></a><span data-dcnode-id="1118" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="1103"><span data-dcnode-id="1114" instrument_node=""> </span><em data-dcnode-id="1111"><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FreeSpace" title="/pmwiki/pmwiki.php/VideoGame/FreeSpace"><span data-dcnode-id="1113" instrument_node="">FreeSpace</span></a></em><span data-dcnode-id="1110" instrument_node=""> uses a naturally-occurring portal network to jump ships between star systems, but a jump node to another galaxy is never found, or even hinted at (</span><a class="twikilink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EpilepticTrees" title="/pmwiki/pmwiki.php/Main/EpilepticTrees"><span data-dcnode-id="1109" instrument_node="">Epileptic Trees</span></a><span data-dcnode-id="1107" instrument_node=""> as to what exactly the Shivans did to Capella notwithstanding). On the other hand, humanity hasn't exactly explored very far in </span><em data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Freespace</span></em><span data-dcnode-id="1104" instrument_node="">; the GTVA's territory only consists of approximately 40 star systems. They've barely started exploring the Milky Way, let alone other galaxies!
</span></li><li data-dcnode-id="1094"><span data-dcnode-id="1102" instrument_node=""> Justified in the </span><em data-dcnode-id="1099"><a class="twikilink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MasterOfOrion" title="/pmwiki/pmwiki.php/VideoGame/MasterOfOrion"><span data-dcnode-id="1101" instrument_node="">Master of Orion</span></a></em><span data-dcnode-id="1098" instrument_node=""> series, as ships can only travel so far from your territory, making it quite understandable why other galaxies would be out of reach. (It </span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">is</span></em><span data-dcnode-id="1095" instrument_node=""> possible to research fuel cells with unlimited range, but these come so late in the game it hardly matters.)
</span></li><li data-dcnode-id="1085"><span data-dcnode-id="1093" instrument_node=""> Like the MOO series, </span><em data-dcnode-id="1090"><a class="twikilink" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GalacticCivilizations" title="/pmwiki/pmwiki.php/VideoGame/GalacticCivilizations"><span data-dcnode-id="1092" instrument_node="">Galactic Civilizations</span></a></em><span data-dcnode-id="1089" instrument_node=""> also restricts the range your starships can travel from your systems, again making it understandable why other galaxies would be out of reach. </span><a class="twikilink" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="1088" instrument_node="">Although</span></a><span data-dcnode-id="1086" instrument_node="">, as any player who has tried to wage war on the far side of the map can tell you, it just takes building a series of space-stations towards your destination to extend your ships' range far enough to reach.
</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1084" instrument_node=""> </span><em data-dcnode-id="1081"><a class="twikilink" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Halo" title="/pmwiki/pmwiki.php/Franchise/Halo"><span data-dcnode-id="1083" instrument_node="">Halo</span></a></em><span data-dcnode-id="1080" instrument_node="">:
</span><ul data-dcnode-id="1051"><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node=""> Human ships take a really long time to get anywhere with slipspace, so that explains why they haven't ventured beyond the Milky Way; the series itself takes place primarily around the Orion Arm.
</span></li><li data-dcnode-id="1057"><span data-dcnode-id="1077" instrument_node=""> On the other hand, the </span><a class="twikilink" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1076" instrument_node="">Forerunners</span></a><span data-dcnode-id="1074" instrument_node=""> were advanced enough to build installations located well outside of the Milky Way </span><span class="spoiler" data-dcnode-id="1072" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1073" instrument_node="">such as The Ark, the foundry in which the Halo Rings were first forged</span></span><span data-dcnode-id="1071" instrument_node="">. The only reason they never seem to have bothered to expand to other galaxies was lack of interest; </span><em data-dcnode-id="1068"><a class="twikilink" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HaloSilentium" title="/pmwiki/pmwiki.php/Literature/HaloSilentium"><span data-dcnode-id="1070" instrument_node="">Halo: Silentium</span></a></em><span data-dcnode-id="1067" instrument_node=""> clarifies that while the Forerunners were capable of intergalactic travel, even with their extremely advanced technology it was still rather expensive and difficult to do so, and never found the potential benefits of extragalactic travel to be worth the expense. The </span><a class="twikilink" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecursivePrecursors" title="/pmwiki/pmwiki.php/Main/RecursivePrecursors"><span data-dcnode-id="1066" instrument_node="">Precursors</span></a><span data-dcnode-id="1064" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParasiteZombie" title="/pmwiki/pmwiki.php/Main/ParasiteZombie"><span data-dcnode-id="1063" instrument_node="">the Flood</span></a><span data-dcnode-id="1061" instrument_node=""> were also both capable of intergalactic travel, </span><span class="spoiler" data-dcnode-id="1059" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1060" instrument_node="">which makes sense given that they're actually the same thing</span></span><span data-dcnode-id="1058" instrument_node="">.
</span></li><li data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node=""> Covenant ships also have absurdly fast FTL engines, despite merely being inferior copies of Forerunner technology, being able to reach about </span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">937 light-years per day</span></em><span data-dcnode-id="1053" instrument_node=""> (if that speed is maintained continuously, a Covenant ship could go from one end of the Milky Way to the other in a mere four months). However, not only are the Covenant too bound by religious dogma to care to learn how to use their technology to its fullest potential, they're more concerned about consolidating their control of the Orion Arm (and picking it clean of Forerunner artifacts) first.
</span></li></ul></li><li data-dcnode-id="1044"><span data-dcnode-id="1049" instrument_node=""> The gameplay of </span><em data-dcnode-id="1046"><a class="twikilink" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TachyonTheFringe" title="/pmwiki/pmwiki.php/VideoGame/TachyonTheFringe"><span data-dcnode-id="1048" instrument_node="">Tachyon: The Fringe</span></a></em><span data-dcnode-id="1045" instrument_node=""> is centered around tachyon gates (or tachyon coil generators, to be precise) that connect all of known space (actually, only a few dozen systems). Close to the end of the game, a news report informs the player about newly-invented tachyon wave generators, vastly increasing the range at which capital ships can travel (fighters still need static gates for FTL travel).
</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1043" instrument_node=""> Played straight in the first </span><em data-dcnode-id="1040"><a class="twikilink" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Homeworld" title="/pmwiki/pmwiki.php/VideoGame/Homeworld"><span data-dcnode-id="1042" instrument_node="">Homeworld</span></a></em><span data-dcnode-id="1039" instrument_node=""> game, but averted in the stand-alone expansion. In the </span><em data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Cataclysm</span></em><span data-dcnode-id="1036" instrument_node=""> expansion, the </span><em data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Naggarok</span></em><span data-dcnode-id="1033" instrument_node=""> is an experimental extragalactic ship sent by an unknown race millions of years ago. On the way, it has picked up a hitchhiker in </span><a class="twikilink" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperspaceIsAScaryPlace" title="/pmwiki/pmwiki.php/Main/HyperspaceIsAScaryPlace"><span data-dcnode-id="1032" instrument_node="">hyperspace</span></a><span data-dcnode-id="1030" instrument_node="">, which ended up being a sentient </span><a class="twikilink" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVirus" title="/pmwiki/pmwiki.php/Main/TheVirus"><span data-dcnode-id="1029" instrument_node="">virulent</span></a><span data-dcnode-id="1027" instrument_node=""> lifeform known as the Beast. The </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Naggarok</span></em><span data-dcnode-id="1024" instrument_node=""> is way more advanced than anything anyone in the galaxy has, including an intergalactic hyperdrive, an inertialess sublight engine, and disassemble weapons that can take any ship apart in seconds. The Bentusi, afraid of the Beast, decide to flee the galaxy for another one using a powerful slipgate. Since the sequel almost completely ignores the expansion, this trope is once again in effect, except, perhaps, the fact that most of the Bentusi are gone.
</span></li><li data-dcnode-id="1011"><span data-dcnode-id="1022" instrument_node=""> Even with the strongest engines available in </span><em data-dcnode-id="1019"><a class="twikilink" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Spore" title="/pmwiki/pmwiki.php/VideoGame/Spore"><span data-dcnode-id="1021" instrument_node="">Spore</span></a></em><span data-dcnode-id="1018" instrument_node="">, you can only cross a few parsecs in a single jump, and each jump has to end near a star or spacial anomaly. Intergalactic space is just too barren to cross.
</span><ul data-dcnode-id="1012"><li data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node=""> When Will Wright, the creator of the game, was asked why there was no intergalactic option in Spore, he pointed out that there was no way anyone would ever finish exploring the galaxy they </span><em data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">started in</span></em><span data-dcnode-id="1014" instrument_node="">, let alone another one.
</span></li></ul></li><li data-dcnode-id="1002"><span data-dcnode-id="1010" instrument_node=""> In </span><em data-dcnode-id="1007"><a class="twikilink" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EscapeVelocity" title="/pmwiki/pmwiki.php/VideoGame/EscapeVelocity"><span data-dcnode-id="1009" instrument_node="">Escape Velocity</span></a></em><span data-dcnode-id="1006" instrument_node="">, the hyperdrive can only operate along explored </span><a class="twikilink" data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperspaceLanes" title="/pmwiki/pmwiki.php/Main/HyperspaceLanes"><span data-dcnode-id="1005" instrument_node="">Hyperspace Lanes</span></a><span data-dcnode-id="1003" instrument_node=""> that have to be charted with unmanned probes. It's not even entirely clear how much of the Milky Way is explored.
</span></li><li data-dcnode-id="984"><span data-dcnode-id="1001" instrument_node=""> Averted somewhat in </span><em data-dcnode-id="998"><a class="twikilink" data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/InfiniteSpace" title="/pmwiki/pmwiki.php/VideoGame/InfiniteSpace"><span data-dcnode-id="1000" instrument_node="">Infinite Space</span></a></em><span data-dcnode-id="997" instrument_node="">. It's mostly set in the Small and Large Magellanic Clouds, which are almost on top of each other in intergalactic terms. </span><a class="twikilink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="996" instrument_node="">Void Gate</span></a><span data-dcnode-id="994" instrument_node=""> travel is instantaneous and occasionally intergalactic, but requires having a gate available. Conventional FTL travel between the two galaxies is possible, but dangerous due to </span><a class="twikilink" data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpacePirates" title="/pmwiki/pmwiki.php/Main/SpacePirates"><span data-dcnode-id="993" instrument_node="">Space Pirates</span></a><span data-dcnode-id="991" instrument_node=""> and natural hazards. The original colonization of the Large Magellanic Cloud was accomplished by enormous </span><a class="twikilink" data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenerationShips" title="/pmwiki/pmwiki.php/Main/GenerationShips"><span data-dcnode-id="990" instrument_node="">Generation Ships</span></a><span data-dcnode-id="988" instrument_node="">. </span><span class="spoiler" data-dcnode-id="986" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="987" instrument_node="">The player does travel to the Milky Way at the very end of the game; to the Solar System, in fact.</span></span><span data-dcnode-id="985" instrument_node="">
</span></li><li data-dcnode-id="974"><span data-dcnode-id="983" instrument_node=""> In </span><em data-dcnode-id="980"><a class="twikilink" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/EliteDangerous" title="/pmwiki/pmwiki.php/Videogame/EliteDangerous"><span data-dcnode-id="982" instrument_node="">Elite Dangerous</span></a></em><span data-dcnode-id="979" instrument_node="">, the Frame Shift Drive can traverse light-years in seconds, but is limited by two factors; the amount of hydrogen fuel it can burn in a single jump (up to 50LY), and the need to lock onto a sufficiently massive object for the jump. Interstellar travel is easy, but intergalactic travel is impossible as the stellar density dwindles to nothing in intergalactic space. The original </span><em data-dcnode-id="976"><a class="twikilink" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/Elite" title="/pmwiki/pmwiki.php/Videogame/Elite"><span data-dcnode-id="978" instrument_node="">Elite</span></a></em><span data-dcnode-id="975" instrument_node=""> had intergalactic travel, but was dropped in the sequels.
</span></li><li data-dcnode-id="953"><span data-dcnode-id="973" instrument_node=""> Played </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">mostly</span></em><span data-dcnode-id="970" instrument_node=""> straight in </span><em data-dcnode-id="967"><a class="twikilink" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StarTrekOnline" title="/pmwiki/pmwiki.php/VideoGame/StarTrekOnline"><span data-dcnode-id="969" instrument_node="">Star Trek Online</span></a></em><span data-dcnode-id="966" instrument_node="">, with player travel restricted to an </span><a class="createlink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Overworld" title="/pmwiki/pmwiki.php/Main/Overworld"><span data-dcnode-id="965" instrument_node="">overworld</span></a><span data-dcnode-id="963" instrument_node=""> consisting of about a third of the Milky Way (chunks of the Alpha, Beta, and Delta Quadrants; the Gamma Quadrant is only briefly visited in one mission due to the ongoing cold war with the Dominion). </span><span class="spoiler" data-dcnode-id="955" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="962" instrument_node="">However, the </span><a class="twikilink" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbusivePrecursors" title="/pmwiki/pmwiki.php/Main/AbusivePrecursors"><span data-dcnode-id="961" instrument_node="">Iconians</span></a><span data-dcnode-id="959" instrument_node=""> traveled to the Andromeda Galaxy after their homeworld was glassed 200,000 years ago, and have the technology to teleport entire </span><a class="twikilink" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DysonSphere" title="/pmwiki/pmwiki.php/Main/DysonSphere"><span data-dcnode-id="958" instrument_node="">Dyson spheres</span></a><span data-dcnode-id="956" instrument_node=""> full of ships across the intergalactic void.</span></span><span data-dcnode-id="954" instrument_node="">
</span></li><li data-dcnode-id="946"><span data-dcnode-id="952" instrument_node=""> </span><em data-dcnode-id="948"><a class="twikilink" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/AIWarFleetCommand" title="/pmwiki/pmwiki.php/Videogame/AIWarFleetCommand"><span data-dcnode-id="951" instrument_node="">AI War: Fleet Command</span></a><span data-dcnode-id="949" instrument_node="">:</span></em><span data-dcnode-id="947" instrument_node=""> It's only the humans that are stuck in the Milky Way, less because they can't and more because civil war and the AI got in the way before they could get to it. The AI is not so constrained and explicitly keeps most of its forces off-galaxy, and both the Zenith and the Spire explicitly reigned in other galaxies rather than this one before they fell. And even then, in the sequel you have human Marauders using a different sort of propulsion that could possibly let them leave and reenter the Milky Way.
</span></li></ul></div><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="942"></p><div class="folderlabel" data-dcnode-id="940" onclick="togglefolder('folder9');"><span data-dcnode-id="941" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Webcomics&nbsp;</span></div><div class="folder" data-dcnode-id="903" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="939" instrument_node="">
</span><ul data-dcnode-id="905"><li data-dcnode-id="906"><span data-dcnode-id="938" instrument_node=""> </span><em data-dcnode-id="935"><a class="twikilink" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SchlockMercenary" title="/pmwiki/pmwiki.php/Webcomic/SchlockMercenary"><span data-dcnode-id="937" instrument_node="">Schlock Mercenary</span></a></em><span data-dcnode-id="934" instrument_node="">:
</span><ul data-dcnode-id="907"><li data-dcnode-id="919"><span data-dcnode-id="933" instrument_node=""> There is </span><a class="urllink" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.schlockmercenary.com/2005-03-29"><span data-dcnode-id="932" instrument_node="">a footnote</span><img data-dcnode-id="931" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="929" instrument_node=""> on why teraport travel outside the galaxy is prohibitively expensive even in the best of times. That said, there is a way to travel to the Andromeda Galaxy and back: the two galaxies are linked by means of </span><span class="spoiler" data-dcnode-id="921" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="928" instrument_node="">a </span><a class="twikilink" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="927" instrument_node="">wormgate</span></a><span data-dcnode-id="925" instrument_node=""> originally sent </span><a class="twikilink" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeAbyss" title="/pmwiki/pmwiki.php/Main/TimeAbyss"><span data-dcnode-id="924" instrument_node="">at sublight speeds</span></a><span data-dcnode-id="922" instrument_node=""> across the gap</span></span><span data-dcnode-id="920" instrument_node="">.
</span></li><li data-dcnode-id="908"><span data-dcnode-id="918" instrument_node=""> Once </span><a class="twikilink" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusEstMachina" title="/pmwiki/pmwiki.php/Main/DeusEstMachina"><span data-dcnode-id="917" instrument_node="">Petey</span></a><span data-dcnode-id="915" instrument_node=""> gets control of the core generator he's able to yank ships from one galaxy to another, mostly for his war with the Dark Matter entities of Andromeda. Kevyn explains that it's a function of large masses affecting the fabric of space-time. Anywhere inside a galaxy is easy enough, but anywhere outside is much more expensive. Teraporting from the Milky Way to Andromeda is still quite expensive, but the large mass of Andromeda cuts the cost in half. </span><span class="spoiler" data-dcnode-id="910" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="914" instrument_node=""> Finding a Precursor race's </span><a class="twikilink" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetSpaceship" title="/pmwiki/pmwiki.php/Main/PlanetSpaceship"><span data-dcnode-id="913" instrument_node="">Planet Spaceship</span></a><span data-dcnode-id="911" instrument_node=""> in extragalactic space, let alone 'porting a ship of envoys to them, requires converting a decent-sized star to energy.</span></span><span data-dcnode-id="909" instrument_node="">
</span></li></ul></li></ul><p data-dcnode-id="904"></p></div><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="901"></p><div class="folderlabel" data-dcnode-id="899" onclick="togglefolder('folder10');"><span data-dcnode-id="900" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Original&nbsp;</span></div><div class="folder" data-dcnode-id="887" id="folder10" isfolder="true" style="display:block;"><span data-dcnode-id="898" instrument_node="">
</span><ul data-dcnode-id="888"><li data-dcnode-id="889"><span data-dcnode-id="897" instrument_node=""> In </span><em data-dcnode-id="894"><a class="twikilink" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebOriginal/OrionsArm" title="/pmwiki/pmwiki.php/WebOriginal/OrionsArm"><span data-dcnode-id="896" instrument_node="">Orion's Arm</span></a></em><span data-dcnode-id="893" instrument_node=""> a total lack of FTL has prevented anyone from leaving the Milky Way yet; indeed, the Terragen civilization mostly occupies the Orion Arm of the Milky Way galaxy alone, with some expansion into the neighboring Perseus and Sagittarius Arms as well. However a message from the Triangulum Galaxy has been picked up and massive telescope arrays have seen planetary scale building projects occurring in other galaxies. The Triangulum Transmission also told of a ten light-year wide object with the mass of </span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">billions</span></em><span data-dcnode-id="890" instrument_node=""> of stars and made up of the artificially imploded remains of an entire galaxy headed toward the Local Group of galaxies. Not only is it crossing intergalactic space, it's also coming from an entirely different cluster of galaxies.
</span></li></ul></div><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="885"></p><div class="folderlabel" data-dcnode-id="883" onclick="togglefolder('folder11');"><span data-dcnode-id="884" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Real Life&nbsp;</span></div><div class="folder" data-dcnode-id="845" id="folder11" isfolder="true" style="display:block;"><span data-dcnode-id="882" instrument_node="">
</span><ul data-dcnode-id="846"><li data-dcnode-id="873"><span data-dcnode-id="881" instrument_node=""> Until Edwin P. Hubble discovered </span><a class="urllink" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cepheid_variable"><span data-dcnode-id="880" instrument_node="">Cepheid stars</span><img data-dcnode-id="879" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="877" instrument_node=""> in the Andromeda Galaxy in </span><a class="twikilink" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheRoaringTwenties" title="/pmwiki/pmwiki.php/Main/TheRoaringTwenties"><span data-dcnode-id="876" instrument_node="">The Roaring '20s</span></a><span data-dcnode-id="874" instrument_node="">, it was generally believed the Universe consisted of just the Milky Way and the Magellanic Clouds, Andromeda for example being considered as just a nearby solar system in formation.
</span></li><li data-dcnode-id="847"><span data-dcnode-id="872" instrument_node=""> This will become </span><a class="twikilink" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TruthInTelevision" title="/pmwiki/pmwiki.php/Main/TruthInTelevision"><span data-dcnode-id="871" instrument_node="">Truth in Television</span></a><span class="notelabel" data-dcnode-id="867" onclick="togglenote('note4hzcb');" style="cursor: pointer;"><sup data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="865" id="note4hzcb" isnote="true" onclick="togglenote('note4hzcb');" style="display: none; cursor: pointer;"><span data-dcnode-id="866" instrument_node="">Or its alien equivalent</span></span><span data-dcnode-id="864" instrument_node=""> in the </span><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">very</span></em><span data-dcnode-id="861" instrument_node=""> far future for hypothetical alien races that could exist by then. After the Milky Way and Andromeda galaxies collide and merge together to form a new, larger galaxy - </span><em data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Milkomeda</span></em><span data-dcnode-id="858" instrument_node=""> or </span><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Milkdromeda</span></em><span data-dcnode-id="855" instrument_node=""> as it is often known - the other galaxies of the Local Group will coalesce with it leaving just one big galaxy. To make things </span><a class="twikilink" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromBadToWorse" title="/pmwiki/pmwiki.php/Main/FromBadToWorse"><span data-dcnode-id="854" instrument_node="">worse</span></a><span data-dcnode-id="852" instrument_node="">, the accelerating expansion of the Universe will cause other galaxies and galaxy groups to be unobservable, due to the universe expanding faster than the speed of light, leaving "us" just with Milkdromeda and, at best, whatever remains of the </span><a class="urllink" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Laniakea_Supercluster"><span data-dcnode-id="851" instrument_node="">Local Supercluster</span><img data-dcnode-id="850" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="848" instrument_node=""> as the only galaxies to study (and, as some astronomers have thought, without clues to know how the Universe began).
</span></li></ul></div><span data-dcnode-id="844" instrument_node="">
