</span><div class="article-content retro-folders" data-dcnode-id="841" id="main-article"><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2088"></p><div class="indent" data-dcnode-id="2078"><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">"Millions of years spent in the lightless, cold depths between galaxies ... it was beyond his grasp. Deep time. If not eternity, exactly, then certainly the next best thing. A voyage long enough that the galaxy would have visibly turned by the end of the journey - he shivered superstitiously. The very idea of traveling beyond the galaxy seemed wrong, somehow. Even the Ancients, those fearlessly insane techno-pagan anarchists of more than a dozen millennia past, hadn't dared those gulfs."</span></em><span data-dcnode-id="2085" instrument_node="">
</span><div class="indent" data-dcnode-id="2079"><span data-dcnode-id="2084" instrument_node="">— </span><em data-dcnode-id="2081"><a class="twikilink" data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/TheMisfitsWarhammer40000" title="/pmwiki/pmwiki.php/Fanfic/TheMisfitsWarhammer40000"><span data-dcnode-id="2083" instrument_node="">The Misfits (Warhammer 40,000)</span></a></em><span data-dcnode-id="2080" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2072"><span class="ad-caption" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2073" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2061"><span data-dcnode-id="2071" instrument_node="">In </span><a class="twikilink" data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpeculativeFiction" title="/pmwiki/pmwiki.php/Main/SpeculativeFiction"><span data-dcnode-id="2070" instrument_node="">Speculative Fiction</span></a><span data-dcnode-id="2068" instrument_node=""> featuring </span><a class="twikilink" data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FasterThanLightTravel" title="/pmwiki/pmwiki.php/Main/FasterThanLightTravel"><span data-dcnode-id="2067" instrument_node="">faster-than-light interstellar travel</span></a><span data-dcnode-id="2065" instrument_node="">, reaching other galaxies from the Milky Way (or fictional local equivalent, like </span><a class="twikilink" data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWars" title="/pmwiki/pmwiki.php/Franchise/StarWars"><span data-dcnode-id="2064" instrument_node="">the galaxy far, far away</span></a><span data-dcnode-id="2062" instrument_node="">) is often shown to be impossible or unfeasible, regardless of how fast FTL drive is.
</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2060" instrument_node="">Now, in </span><a class="twikilink" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="2059" instrument_node="">Real Life</span></a><span data-dcnode-id="2057" instrument_node="">, this is </span><a class="urllink" data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thatonewhojustis.wordpress.com/2013/03/24/extra-galactic-travel-is-harder-than-light-speed/"><span data-dcnode-id="2056" instrument_node="">pretty realistic</span><img data-dcnode-id="2055" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2053" instrument_node="">. The Milky Way is about 100,000 light-years across... but the nearest other spiral galaxy, Andromeda, is about 2.5 </span><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">million</span></em><span data-dcnode-id="2050" instrument_node=""> light-years away, which is 25 times more for all you math-challenged types</span><span class="notelabel" data-dcnode-id="2047" onclick="togglenote('note07vnc');" style="cursor: pointer;"><sup data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2045" id="note07vnc" isnote="true" onclick="togglenote('note07vnc');" style="display: none; cursor: pointer;"><span data-dcnode-id="2046" instrument_node="">(there are "dwarf" galaxies in orbit around the Milky Way, and some are close enough that some of their stars are closer to Earth than the opposite end of the Milky Way is, but a work may treat them merely as extensions of the Milky Way since it took astronomers so long to realize they had their own center of gravity)</span></span><span data-dcnode-id="2044" instrument_node="">. If your FTL drive takes 100 years from one edge of our galaxy to the opposite one while going full tilt, or your </span><a class="twikilink" data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubspaceOrHyperspace" title="/pmwiki/pmwiki.php/Main/SubspaceOrHyperspace"><span data-dcnode-id="2043" instrument_node="">hyperspace</span></a><span data-dcnode-id="2041" instrument_node=""> shortcuts are limited by the need to return to realspace and assess your position after making a relatively short jump, then it is perfectly reasonable that you shouldn't be able to travel to another galaxy in a casual manner.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2034"><span class="ad-caption" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2035" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2023"><span data-dcnode-id="2033" instrument_node="">However, if your ship is capable of crossing the Milky Way in a single day (after all, if we're ignoring the speed-of-light limit, then any other author-imposed speed limit is completely arbitrary), or your hyperdrive can simply </span><a class="twikilink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Teleportation" title="/pmwiki/pmwiki.php/Main/Teleportation"><span data-dcnode-id="2032" instrument_node="">open a shortcut between any two known locations anywhere in the universe</span></a><span data-dcnode-id="2030" instrument_node="">, then there really is no excuse for this. Bonus points if there is some unconvincing </span><a class="twikilink" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandWave" title="/pmwiki/pmwiki.php/Main/HandWave"><span data-dcnode-id="2029" instrument_node="">Hand Wave</span></a><span data-dcnode-id="2027" instrument_node=""> as to why they don't go to other galaxies. Or a convincing </span><a class="twikilink" data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandWave" title="/pmwiki/pmwiki.php/Main/HandWave"><span data-dcnode-id="2026" instrument_node="">Hand Wave</span></a><span data-dcnode-id="2024" instrument_node=""> based on modern physics (i.e. the FTL drive needs Dark Matter to work properly, and it stops working once you try to exit the Dark Matter Halo of your galaxy).
</span></p><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">One possible reason this is done is because a galaxy is about the largest object that can be rendered on a two dimensional plane with more than very superficial accuracy and are also the largest structures with relatively nice and cleanly defined "ends". Additionally it's quite hard to make individuals seem important at this sort of scale or define any sort of "setting geography" thanks to both a lack of any objective central point and the only structures visible at this scale being mostly empty clusters of galaxies; not providing so much as nebula can to let a setting designer define a certain region of a setting with any interesting traits.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2015"><span class="ad-caption" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2016" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2001"><span data-dcnode-id="2014" instrument_node="">When done right (the "FTL takes 100 years to cross the Milky Way" version), it's an aversion of </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SciFiWritersHaveNoSenseOfScale" title="/pmwiki/pmwiki.php/Main/SciFiWritersHaveNoSenseOfScale"><span data-dcnode-id="2013" instrument_node="">Sci-Fi Writers Have No Sense of Scale</span></a><span data-dcnode-id="2011" instrument_node="">. Compare </span><a class="twikilink" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorralledCosmos" title="/pmwiki/pmwiki.php/Main/CorralledCosmos"><span data-dcnode-id="2010" instrument_node="">Corralled Cosmos</span></a><span data-dcnode-id="2008" instrument_node="">. Contrast to </span><a class="twikilink" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmallUniverseAfterAll" title="/pmwiki/pmwiki.php/Main/SmallUniverseAfterAll"><span data-dcnode-id="2007" instrument_node="">Small Universe After All</span></a><span data-dcnode-id="2005" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatOtherGalaxies" title="/pmwiki/pmwiki.php/Main/WhatOtherGalaxies"><span data-dcnode-id="2004" instrument_node="">What Other Galaxies?</span></a><span data-dcnode-id="2002" instrument_node="">
</span></p><p data-dcnode-id="2000"></p><hr data-dcnode-id="1999"><h1 data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Examples:</span></h1><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1995"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="1993" onclick="toggleAllFolders();"><span data-dcnode-id="1994" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1991"></p><div class="folderlabel" data-dcnode-id="1989" onclick="togglefolder('folder0');"><span data-dcnode-id="1990" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime and Manga&nbsp;</span></div><div class="folder" data-dcnode-id="1965" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="1988" instrument_node="">
</span><ul data-dcnode-id="1966"><li data-dcnode-id="1976"><span data-dcnode-id="1987" instrument_node=""> </span><em data-dcnode-id="1984"><a class="twikilink" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/SpaceBattleshipYamato2199" title="/pmwiki/pmwiki.php/Anime/SpaceBattleshipYamato2199"><span data-dcnode-id="1986" instrument_node="">Space Battleship Yamato 2199</span></a></em><span data-dcnode-id="1983" instrument_node=""> technically averts this but keeps it in spirit. The protagonists plan on making a trip to the Large Magellanic Cloud and back to Earth in under a year, but in intergalactic terms that's like visiting a neighbouring country. They initially assume that this trope applies to the Gamilas Empire but get a rude surprise when they learn that the Large Magellanic Cloud is actually their home territory. The audience are also treated to a </span><a class="twikilink" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForeShadowing" title="/pmwiki/pmwiki.php/Main/ForeShadowing"><span data-dcnode-id="1982" instrument_node="">brief snapshot</span></a><span data-dcnode-id="1980" instrument_node=""> of a second opponent Gamilas is fighting in the </span><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Small</span></em><span data-dcnode-id="1977" instrument_node=""> Magellanic Cloud.
</span></li><li data-dcnode-id="1967"><span data-dcnode-id="1975" instrument_node=""> </span><em data-dcnode-id="1972"><a class="twikilink" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/CrestOfTheStars" title="/pmwiki/pmwiki.php/LightNovel/CrestOfTheStars"><span data-dcnode-id="1974" instrument_node="">Crest of the Stars</span></a></em><span data-dcnode-id="1971" instrument_node="">: even with quick and easy travel across the galaxy, humanity has not expanded beyond the Milky Way, mainly because they've never encountered a </span><a class="twikilink" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1970" instrument_node="">Planar Space Portal</span></a><span data-dcnode-id="1968" instrument_node=""> that leads to another galaxy. There is one anomalous set of unexplored portals that everyone is pretty sure leads to other galaxies, but the Abh have an ironclad grip on that territory and they're not going to let anyone explore them... at least, not until they are in utter control over the entire Milky Way and can guarantee that human conflict will not spread to other galaxies.
</span></li></ul></div><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1963"></p><div class="folderlabel" data-dcnode-id="1961" onclick="togglefolder('folder1');"><span data-dcnode-id="1962" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Books&nbsp;</span></div><div class="folder" data-dcnode-id="1944" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="1960" instrument_node="">
</span><ul data-dcnode-id="1945"><li data-dcnode-id="1952"><span data-dcnode-id="1959" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/MarvelUniverse" title="/pmwiki/pmwiki.php/Franchise/MarvelUniverse"><span data-dcnode-id="1958" instrument_node="">Marvel Universe</span></a><span data-dcnode-id="1956" instrument_node=""> each of the major </span><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GalacticSuperpower" title="/pmwiki/pmwiki.php/Main/GalacticSuperpower"><span data-dcnode-id="1955" instrument_node="">galactic empires</span></a><span data-dcnode-id="1953" instrument_node=""> rule seperate individual Galaxies, with the Kree ruling the Lesser Magelienic Cloud, the Skrulls in Andromeda, and the Shi'ar in an unidentified galaxy of the same name.
</span></li><li data-dcnode-id="1946"><span data-dcnode-id="1951" instrument_node=""> In </span><em data-dcnode-id="1948"><a class="twikilink" data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Dreadstar" title="/pmwiki/pmwiki.php/ComicBook/Dreadstar"><span data-dcnode-id="1950" instrument_node="">Dreadstar</span></a></em><span data-dcnode-id="1947" instrument_node="">, The hero arrives in an unnamed galaxy millions of years after he is responsible for the destruction of the Milky Way. Later, in the sequel comic, he and his companions travel to still another galaxy.
</span></li></ul></div><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1942"></p><div class="folderlabel" data-dcnode-id="1940" onclick="togglefolder('folder2');"><span data-dcnode-id="1941" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="1922" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="1939" instrument_node="">
</span><ul data-dcnode-id="1923"><li data-dcnode-id="1924"><span data-dcnode-id="1938" instrument_node=""> Averted in </span><em data-dcnode-id="1935"><a class="twikilink" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/ThereWasOnceAnAvengerFromKrypton" title="/pmwiki/pmwiki.php/Fanfic/ThereWasOnceAnAvengerFromKrypton"><span data-dcnode-id="1937" instrument_node="">There Was Once an Avenger from Krypton</span></a></em><span data-dcnode-id="1934" instrument_node="">. Stories that take place beyond Earth, such as </span><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Close Encounters of the Gem Kind</span></em><span data-dcnode-id="1931" instrument_node=""> and </span><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Eternity in Promise</span></em><span data-dcnode-id="1928" instrument_node=""> explore the regions beyond the Milky Way and emphasize the vast scope of the universe. If anything, the Milky Way is actually widely considered </span><a class="twikilink" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NormalFishInATinyPond" title="/pmwiki/pmwiki.php/Main/NormalFishInATinyPond"><span data-dcnode-id="1927" instrument_node="">a cosmic backwater in this series</span></a><span data-dcnode-id="1925" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1920"></p><div class="folderlabel" data-dcnode-id="1918" onclick="togglefolder('folder3');"><span data-dcnode-id="1919" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Film&nbsp;</span></div><div class="folder" data-dcnode-id="1854" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="1917" instrument_node="">
</span><ul data-dcnode-id="1855"><li data-dcnode-id="1903"><span data-dcnode-id="1916" instrument_node=""> </span><em data-dcnode-id="1913"><a class="twikilink" data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheChroniclesOfRiddick" title="/pmwiki/pmwiki.php/Franchise/TheChroniclesOfRiddick"><span data-dcnode-id="1915" instrument_node="">The Chronicles of Riddick</span></a></em><span data-dcnode-id="1912" instrument_node=""> franchise. The films don't mention galaxies but the novelizations contradict each other. The novelization to </span><em data-dcnode-id="1909"><a class="twikilink" data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/PitchBlack" title="/pmwiki/pmwiki.php/Film/PitchBlack"><span data-dcnode-id="1911" instrument_node="">Pitch Black</span></a></em><span data-dcnode-id="1908" instrument_node=""> by Frank Lauria implies that humans have colonised several galaxies. It says that Riddick worked in the Sigma Galaxy and that Johns chased him across 3 galaxies. But the novelisation to </span><em data-dcnode-id="1905"><a class="twikilink" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheChroniclesOfRiddick" title="/pmwiki/pmwiki.php/Film/TheChroniclesOfRiddick"><span data-dcnode-id="1907" instrument_node="">The Chronicles of Riddick</span></a></em><span data-dcnode-id="1904" instrument_node=""> by Alan Dean Foster implies that everything takes place within one galaxy.
</span></li><li data-dcnode-id="1856"><span data-dcnode-id="1902" instrument_node=""> </span><em data-dcnode-id="1899"><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWars" title="/pmwiki/pmwiki.php/Franchise/StarWars"><span data-dcnode-id="1901" instrument_node="">Star Wars</span></a></em><span data-dcnode-id="1898" instrument_node="">, of course, takes place solely in </span><a class="twikilink" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ALongTimeAgoInAGalaxyFarFarAway" title="/pmwiki/pmwiki.php/Main/ALongTimeAgoInAGalaxyFarFarAway"><span data-dcnode-id="1897" instrument_node="">A Galaxy Far, Far Away</span></a><span data-dcnode-id="1895" instrument_node="">, with no explanation whatsoever. </span><a class="twikilink" data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="1894" instrument_node="">The Empire</span></a><span data-dcnode-id="1892" instrument_node=""> rules over the whole galaxy, hyperspace travel can launch even small </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceFighter" title="/pmwiki/pmwiki.php/Main/SpaceFighter"><span data-dcnode-id="1891" instrument_node="">Space Fighters</span></a><span data-dcnode-id="1889" instrument_node=""> halfway across the galaxy in days or </span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">hours</span></em><span data-dcnode-id="1886" instrument_node="">, and the Rebel fleet hides above the galactic plane at the end of </span><em data-dcnode-id="1883"><a class="twikilink" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheEmpireStrikesBack" title="/pmwiki/pmwiki.php/Film/TheEmpireStrikesBack"><span data-dcnode-id="1885" instrument_node="">The Empire Strikes Back</span></a></em><span data-dcnode-id="1882" instrument_node=""> (nicely averting </span><a class="twikilink" data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwoDSpace" title="/pmwiki/pmwiki.php/Main/TwoDSpace"><span data-dcnode-id="1881" instrument_node="">2-D Space</span></a><span data-dcnode-id="1879" instrument_node=""> in the process), but intergalactic travel isn't even mentioned. </span><a class="twikilink" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWarsLegends" title="/pmwiki/pmwiki.php/Franchise/StarWarsLegends"><span data-dcnode-id="1878" instrument_node="">Star Wars Legends</span></a><span data-dcnode-id="1876" instrument_node=""> proposed numerous and often contradicting explanations, like </span><a class="twikilink" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CasualInterstellarTravel" title="/pmwiki/pmwiki.php/Main/CasualInterstellarTravel"><span data-dcnode-id="1875" instrument_node="">Casual Interstellar Travel</span></a><span data-dcnode-id="1873" instrument_node=""> only being possible along pre-mapped </span><a class="twikilink" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperspaceLanes" title="/pmwiki/pmwiki.php/Main/HyperspaceLanes"><span data-dcnode-id="1872" instrument_node="">Hyperspace Lanes</span></a><span data-dcnode-id="1870" instrument_node="">, a </span><em data-dcnode-id="1867"><a class="twikilink" data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarTrek" title="/pmwiki/pmwiki.php/Franchise/StarTrek"><span data-dcnode-id="1869" instrument_node="">Star Trek</span></a></em><span data-dcnode-id="1866" instrument_node="">-like "barrier on the edge of the galaxy", or the local </span><a class="twikilink" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1865" instrument_node="">Precursors</span></a><span data-dcnode-id="1863" instrument_node=""> sealing off certain sections of the galaxy to make hyperspace travel more difficult there. Nearby dwarf galaxies such as the Rishi Maze were actually accessible to travelers, but are beyond the frontiers of galactic governments. Because of this, illegal operations tend to set up shop there. Eventually this is dropped when the intergalactic Yuuzhan Vong arrive to mess things up and the </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/OutboundFlight" title="/pmwiki/pmwiki.php/Literature/OutboundFlight"><span data-dcnode-id="1862" instrument_node="">Republic attempt</span></a><span data-dcnode-id="1860" instrument_node=""> to explore other galaxies (the passage only expected to take a few years) only fails because Sidious has it intercepted to kill the Jedi aboard. The </span><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityReboot" title="/pmwiki/pmwiki.php/Main/ContinuityReboot"><span data-dcnode-id="1859" instrument_node="">Continuity Reboot</span></a><span data-dcnode-id="1857" instrument_node=""> doesn't bother with any justification at all, but also changes the map so that almost half of the main galaxy is unexplored. Of course, there's also the possibility that their galaxy just happens to have no others near it.
</span></li></ul></div><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1852"></p><div class="folderlabel" data-dcnode-id="1850" onclick="togglefolder('folder4');"><span data-dcnode-id="1851" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Gamebooks&nbsp;</span></div><div class="folder" data-dcnode-id="1835" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="1849" instrument_node="">
</span><ul data-dcnode-id="1836"><li data-dcnode-id="1837"><span data-dcnode-id="1848" instrument_node=""> In one of the </span><em data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Star Challenge</span></em><span data-dcnode-id="1845" instrument_node=""> books, your ship ends up in the Andromeda Galaxy after transversing a </span><a class="twikilink" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NegativeSpaceWedgie" title="/pmwiki/pmwiki.php/Main/NegativeSpaceWedgie"><span data-dcnode-id="1844" instrument_node="">Negative Space Wedgie</span></a><span data-dcnode-id="1842" instrument_node="">. After </span><strike data-dcnode-id="1839"><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expositron9000" title="/pmwiki/pmwiki.php/Main/Expositron9000"><span data-dcnode-id="1841" instrument_node="">Expositron9000</span></a></strike><span data-dcnode-id="1838" instrument_node=""> your robotic companion discovers that fact, your character mentions that a spaceship would need five hundred years to reach Andromeda even travelling at very high hyperspatial speeds.
</span></li></ul></div><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1833"></p><div class="folderlabel" data-dcnode-id="1831" onclick="togglefolder('folder5');"><span data-dcnode-id="1832" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="1458" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="1830" instrument_node="">
</span><ul data-dcnode-id="1459"><li data-dcnode-id="1779"><span data-dcnode-id="1829" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/IsaacAsimov" title="/pmwiki/pmwiki.php/Creator/IsaacAsimov"><span data-dcnode-id="1828" instrument_node="">Isaac Asimov</span></a><span data-dcnode-id="1826" instrument_node="">'s </span><em data-dcnode-id="1823"><a class="twikilink" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FoundationSeries" title="/pmwiki/pmwiki.php/Literature/FoundationSeries"><span data-dcnode-id="1825" instrument_node="">Foundation Series</span></a></em><span data-dcnode-id="1822" instrument_node="">:
</span><ul data-dcnode-id="1780"><li data-dcnode-id="1809"><span data-dcnode-id="1821" instrument_node=""> </span><em data-dcnode-id="1818"><a class="twikilink" data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FoundationAndEarth" title="/pmwiki/pmwiki.php/Literature/FoundationAndEarth"><span data-dcnode-id="1820" instrument_node="">Foundation and Earth</span></a></em><span data-dcnode-id="1817" instrument_node="">: Up until now, the </span><em data-dcnode-id="1814"><a class="twikilink" data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FoundationSeries" title="/pmwiki/pmwiki.php/Literature/FoundationSeries"><span data-dcnode-id="1816" instrument_node="">Foundation</span></a></em><span data-dcnode-id="1813" instrument_node=""> series has been set within the same Milky Way. Pelorat asks Golan why that is, since all places are the same distance away by hyperspace. Dr Asimov gives a </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="1812" instrument_node="">pretty good explanation</span></a><span data-dcnode-id="1810" instrument_node="">: ships traveling through hyperspace are affected by objects with mass that lie along the line that connects the starting and the ending point of the jump. The greater the mass or the distance between them, the greater the effect. This is the main reason why starships in the Foundation Universe use several small jumps instead of the single long one. And with every jump requiring several days to calculate the new jump coordinates, intergalactic travel would take a long, long time.
</span></li><li data-dcnode-id="1781"><span data-dcnode-id="1808" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GregoryBenford" title="/pmwiki/pmwiki.php/Creator/GregoryBenford"><span data-dcnode-id="1807" instrument_node="">Gregory Benford</span></a><span data-dcnode-id="1805" instrument_node="">'s </span><em data-dcnode-id="1802"><a class="twikilink" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FoundationsFear" title="/pmwiki/pmwiki.php/Literature/FoundationsFear"><span data-dcnode-id="1804" instrument_node="">Foundation's Fear</span></a></em><span data-dcnode-id="1801" instrument_node="">: In "Stars Like Grains of Sand", Seldon's internal monologue describes a legendary past occurrence; Steffno's Ride. This was the only recorded occasion in which </span><a class="twikilink" data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1800" instrument_node="">wormhole-travel</span></a><span data-dcnode-id="1798" instrument_node=""> extended beyond </span><a class="twikilink" data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheMilkyWayGalaxy" title="/pmwiki/pmwiki.php/UsefulNotes/TheMilkyWayGalaxy"><span data-dcnode-id="1797" instrument_node="">The Milky Way Galaxy</span></a><span data-dcnode-id="1795" instrument_node="">. Steffano is recorded to have traveled to Messier 87 (M87 </span><span class="notelabel" data-dcnode-id="1792" onclick="togglenote('note1yfim');" style="cursor: pointer;"><sup data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1790" id="note1yfim" isnote="true" onclick="togglenote('note1yfim');" style="display: none; cursor: pointer;"><span data-dcnode-id="1791" instrument_node="">now known as Pōwehi</span></span><span data-dcnode-id="1789" instrument_node="">), then came back just seconds before </span><a class="twikilink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurWormholesAreDifferent" title="/pmwiki/pmwiki.php/Main/OurWormholesAreDifferent"><span data-dcnode-id="1788" instrument_node="">the wormhole collapsed</span></a><span data-dcnode-id="1786" instrument_node="">.
</span><div class="indent" data-dcnode-id="1782"><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Something in wormhole physics discouraged extra-galactic adventures.</span></em><span data-dcnode-id="1783" instrument_node="">
</span></div></li></ul></li><li data-dcnode-id="1767"><span data-dcnode-id="1778" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RobertAHeinlein" title="/pmwiki/pmwiki.php/Creator/RobertAHeinlein"><span data-dcnode-id="1777" instrument_node="">Robert A. Heinlein</span></a><span data-dcnode-id="1775" instrument_node=""> novel </span><em data-dcnode-id="1772"><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TimeEnoughForLove" title="/pmwiki/pmwiki.php/Literature/TimeEnoughForLove"><span data-dcnode-id="1774" instrument_node="">Time Enough for Love</span></a></em><span data-dcnode-id="1771" instrument_node="">, the protagonist mentions how much of the Milky Way has been explored and settled but that </span><a class="twikilink" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreSpecial" title="/pmwiki/pmwiki.php/Main/HumansAreSpecial"><span data-dcnode-id="1770" instrument_node="">Humans Are Special</span></a><span data-dcnode-id="1768" instrument_node=""> so that there have been a few spaceships that have attempted the "long" trip. Their Libby drives are apparently time machines as well (only recently used that way because apparently nobody realized they were), and can arrive at their destination as just about any time they choose. And as nearly every character is functionally immortal and can have their personality stored electronically (a technique used to move between bodies too beat up to rejuvenate, easily adaptable to long-term storage), "on-board" time is nearly a non-issue.
</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node=""> In the story "The Star Pit" by </span><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SamuelRDelany" title="/pmwiki/pmwiki.php/Creator/SamuelRDelany"><span data-dcnode-id="1765" instrument_node="">Samuel R. Delany</span></a><span data-dcnode-id="1763" instrument_node="">, only people with a specific set of psychological issues can handle going outside the galaxy, even though interstellar travel is ridiculously convenient.
</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheNightsDawnTrilogy" title="/pmwiki/pmwiki.php/Literature/TheNightsDawnTrilogy"><span data-dcnode-id="1760" instrument_node="">The Night's Dawn Trilogy</span></a><span data-dcnode-id="1758" instrument_node="">: Upon discovering the sleeping god at the end of the last book, and theorizing that it is capable of intergalactic travel, everyone is shocked. Although FTL travel has been known for more than 500 years, it took several months and hundreds of small FTL 'jumps' for the main characters to travel the 1300 light-years to find the Sleeping God in the first place.
</span></li><li data-dcnode-id="1733"><span data-dcnode-id="1756" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1755" instrument_node="">Predictably</span></a><span data-dcnode-id="1753" instrument_node="">, </span><em data-dcnode-id="1750"><a class="twikilink" data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy" title="/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy"><span data-dcnode-id="1752" instrument_node="">The Hitchhiker's Guide to the Galaxy</span></a></em><span data-dcnode-id="1749" instrument_node=""> is apparently set entirely within </span><a class="twikilink" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMilkyWayIsTheOnlyWay" title="/pmwiki/pmwiki.php/Main/TheMilkyWayIsTheOnlyWay"><span data-dcnode-id="1748" instrument_node="">The Galaxy</span></a><span data-dcnode-id="1746" instrument_node="">. Despite all the various forms of faster-than-light travel, extradimensional beings, and travel driven by </span><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">improbability</span></em><span data-dcnode-id="1743" instrument_node="">. There is </span><em data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">one</span></em><span data-dcnode-id="1740" instrument_node=""> point in </span><a class="twikilink" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Radio/TheHitchhikersGuideToTheGalaxy" title="/pmwiki/pmwiki.php/Radio/TheHitchhikersGuideToTheGalaxy"><span data-dcnode-id="1739" instrument_node="">the radio show</span></a><span data-dcnode-id="1737" instrument_node=""> where the cast are escaping from Milliways and find themselves headed into intergalactic space — promptly running for the escape pods. Mind, there were </span><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">other</span></em><span data-dcnode-id="1734" instrument_node=""> reasons not to want to be aboard that ship at that particular time. Although, when the characters are searching for the real power behind the galactic throne, someone says "maybe he rules the whole universe" and this is thenceforth assumed to be true.
</span></li><li data-dcnode-id="1715"><span data-dcnode-id="1732" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingWithATrope" title="/pmwiki/pmwiki.php/Main/PlayingWithATrope"><span data-dcnode-id="1731" instrument_node="">Inverted (or something)</span></a><span data-dcnode-id="1729" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VernorVinge" title="/pmwiki/pmwiki.php/Creator/VernorVinge"><span data-dcnode-id="1728" instrument_node="">Vernor Vinge</span></a><span data-dcnode-id="1726" instrument_node="">'s </span><em data-dcnode-id="1723"><a class="twikilink" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ZonesOfThought" title="/pmwiki/pmwiki.php/Literature/ZonesOfThought"><span data-dcnode-id="1725" instrument_node="">Zones of Thought</span></a></em><span data-dcnode-id="1722" instrument_node=""> series. All technology, including FTL travel, works better as you get farther from the galactic core. This means it's impossible to get to the middle of the galaxy, because your ship will continually slow down and eventually FTL becomes impossible. Intergalactic travel should be possible, except that the outer reaches of this galaxy are controlled by </span><a class="twikilink" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AIIsACrapshoot" title="/pmwiki/pmwiki.php/Main/AIIsACrapshoot"><span data-dcnode-id="1721" instrument_node="">technological AIs</span></a><span data-dcnode-id="1719" instrument_node=""> who have </span><a class="twikilink" data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusEstMachina" title="/pmwiki/pmwiki.php/Main/DeusEstMachina"><span data-dcnode-id="1718" instrument_node="">ascended to near-godhood</span></a><span data-dcnode-id="1716" instrument_node="">, and they don't let anyone past them. Also, as one heads closer to the galactic core even at sub-lightspeed high technology begins to break down, computers can no longer function, and once inside the "Unthinking Depths" you'd no longer be capable of sentient thought.
</span></li><li data-dcnode-id="1707"><span data-dcnode-id="1714" instrument_node=""> Subverted in </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">The Last Legionary</span></em><span data-dcnode-id="1711" instrument_node=""> young adult series by Douglas Hill. The "Overlight" FTL drive used by spaceships in the stories is perfectly capable of getting a ship to another galaxy in several months but extended stays in Overlight drive humans insane, making it impossible to have a functioning crew at the other end of the trip. At the end of the series Keill's alien sidekick Glr (from another galaxy herself) reveals that </span><a class="twikilink" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanPopsicle" title="/pmwiki/pmwiki.php/Main/HumanPopsicle"><span data-dcnode-id="1710" instrument_node="">suspended animation</span></a><span data-dcnode-id="1708" instrument_node=""> allows the problem to be bypassed allowing her to potentially take Keill to visit her home galaxy.
</span></li><li data-dcnode-id="1695"><span data-dcnode-id="1706" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/IainBanks" title="/pmwiki/pmwiki.php/Creator/IainBanks"><span data-dcnode-id="1705" instrument_node="">Iain M. Banks</span></a><span data-dcnode-id="1703" instrument_node="">' </span><em data-dcnode-id="1700"><a class="twikilink" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheCulture" title="/pmwiki/pmwiki.php/Literature/TheCulture"><span data-dcnode-id="1702" instrument_node="">The Culture</span></a></em><span data-dcnode-id="1699" instrument_node=""> novels, it's explained that the Grid — the barrier between this universe the other ultraverses/infraverses ships use to travel— changes properties in extra-galactic space, making ships travel slower. Although, it didn't stop the </span><a class="twikilink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Excession" title="/pmwiki/pmwiki.php/Literature/Excession"><span data-dcnode-id="1698" instrument_node="">Sleeper Service</span></a><span data-dcnode-id="1696" instrument_node=""> from trying.
</span></li><li data-dcnode-id="1680"><span data-dcnode-id="1694" instrument_node=""> In Mikhail Akhmanov's </span><em data-dcnode-id="1691"><a class="twikilink" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ArrivalsFromTheDark" title="/pmwiki/pmwiki.php/Literature/ArrivalsFromTheDark"><span data-dcnode-id="1693" instrument_node="">Arrivals from the Dark</span></a></em><span data-dcnode-id="1690" instrument_node=""> books, all known galactic races utilize the "contour" drive for instantaneous FTL travel. It works by shifting the ship into another universe and then back into a new location. The drive consumes very little power but is prone to burn-outs, especially smaller models. However, jumps require extremely precise calculations, and strong gravity fields can drastically affect them. That is why most prefer to make a series of shorter jumps than a single long jump. Only the Orion Arm (our arm) of the galaxy is explored by most of the known races. The </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanAliens" title="/pmwiki/pmwiki.php/Main/HumanAliens"><span data-dcnode-id="1689" instrument_node="">Faata</span></a><span data-dcnode-id="1687" instrument_node=""> hail from the Perseus Arm but don't know much about the Orion Arm. It is common for Faata in the first two novels to take the long way around instead of jumping directly through the Void (area between the two arms with no stars). During the Void Wars, however, the Faata make several attempts to travel through the Void instead of around it. It is possible that the </span><a class="twikilink" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1686" instrument_node="">Daskins</span></a><span data-dcnode-id="1684" instrument_node=""> have travelled outside the galaxy. Most races assume that all of them left the galaxy long ago, which would explain their absence. The Daskins have also left behind an interstellar </span><a class="twikilink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1683" instrument_node="">Portal Network</span></a><span data-dcnode-id="1681" instrument_node=""> that appears to stretch as far as the Magellanic Clouds.
</span></li><li data-dcnode-id="1668"><span data-dcnode-id="1679" instrument_node=""> In Andrei Livadny's </span><em data-dcnode-id="1676"><a class="twikilink" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheHistoryOfTheGalaxy" title="/pmwiki/pmwiki.php/Literature/TheHistoryOfTheGalaxy"><span data-dcnode-id="1678" instrument_node="">The History of the Galaxy</span></a></em><span data-dcnode-id="1675" instrument_node=""> series, only a (relatively) small chunk of the galaxy has been discovered by humanity and all known races. While all alien races are, at least, millions of years old, the fact that they relied on </span><a class="twikilink" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1674" instrument_node="">Portal Networks</span></a><span data-dcnode-id="1672" instrument_node=""> and never invented the hyperdrive means that their expansion was extremely slow. Humans, on the other hand, have spread our in all directions, but only have several hundred colonies not too far from each other. Also, the nature of </span><a class="twikilink" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperspaceOrSubspace" title="/pmwiki/pmwiki.php/Main/HyperspaceOrSubspace"><span data-dcnode-id="1671" instrument_node="">Hypersphere</span></a><span data-dcnode-id="1669" instrument_node=""> implies that it is limited to our own galaxy. No one ever brings up the idea of going to another galaxy.
</span></li><li data-dcnode-id="1656"><span data-dcnode-id="1667" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VladimirVasilyev" title="/pmwiki/pmwiki.php/Creator/VladimirVasilyev"><span data-dcnode-id="1666" instrument_node="">Vladimir Vasilyev</span></a><span data-dcnode-id="1664" instrument_node="">'s </span><em data-dcnode-id="1661"><a class="createlink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Litearture/DeathOrGlory" title="/pmwiki/pmwiki.php/Litearture/DeathOrGlory"><span data-dcnode-id="1663" instrument_node="">War for Mobility</span></a></em><span data-dcnode-id="1660" instrument_node=""> duology, a newly-discovered portal to another galaxy is a major plot point, with its discovery sparking an interstellar war. Without it, FTL travel is way too slow to cross intergalactic distances. It is implied, though, that the </span><a class="twikilink" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1659" instrument_node="">Precursors</span></a><span data-dcnode-id="1657" instrument_node=""> who created the portals were able to do so, as they would've had to fly a portal to the other galaxy first in order to use it.
</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1655" instrument_node=""> </span><em data-dcnode-id="1652"><a class="twikilink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/PerryRhodan" title="/pmwiki/pmwiki.php/Literature/PerryRhodan"><span data-dcnode-id="1654" instrument_node="">Perry Rhodan</span></a></em><span data-dcnode-id="1651" instrument_node=""> started out with this (well, to be fair, it started with the first in-universe </span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">moon landing</span></em><span data-dcnode-id="1648" instrument_node=""> and mankind needed some time to even spread out into the galactic neighborhood)...then came the classic Andromeda arc (issues #200 - #299), which showcased the difficulties of trying to even </span><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">reach</span></em><span data-dcnode-id="1645" instrument_node=""> enemies in another galaxy with the technology available at the time, notably FTL drives that burnt out and needed to be replaced too soon to cover the entire distance. (Besides the creation of new multi-stage, multi-drive ship designs that used and dropped their drives one after the other, the main answer was the successful hijacking of several of the enemies' own intergalactic transmitter stations.) Even much later, 'routine' intergalactic travel remains pretty much limited to the familiar cosmic neighborhood and actual long-distance expeditions are pretty few and far between.
</span></li><li data-dcnode-id="1603"><span data-dcnode-id="1643" instrument_node=""> Played straight in </span><a class="twikilink" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SergeyLukyanenko" title="/pmwiki/pmwiki.php/Creator/SergeyLukyanenko"><span data-dcnode-id="1642" instrument_node="">Sergey Lukyanenko</span></a><span data-dcnode-id="1640" instrument_node="">'s </span><em data-dcnode-id="1637"><a class="twikilink" data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ALordFromPlanetEarth" title="/pmwiki/pmwiki.php/Literature/ALordFromPlanetEarth"><span data-dcnode-id="1639" instrument_node="">A Lord from Planet Earth</span></a></em><span data-dcnode-id="1636" instrument_node=""> in the first two novels, where precise </span><a class="twikilink" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubspaceOrHyperspace" title="/pmwiki/pmwiki.php/Main/SubspaceOrHyperspace"><span data-dcnode-id="1635" instrument_node="">hyperspace</span></a><span data-dcnode-id="1633" instrument_node=""> coordinates are required in order to make </span><a class="twikilink" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FasterThanLightTravel" title="/pmwiki/pmwiki.php/Main/FasterThanLightTravel"><span data-dcnode-id="1632" instrument_node="">FTL</span></a><span data-dcnode-id="1630" instrument_node=""> jumps. The only coordinates available are those left behind by the </span><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="1629" instrument_node="">Seeders</span></a><span data-dcnode-id="1627" instrument_node=""> (</span><span class="spoiler" data-dcnode-id="1623" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1626" instrument_node="">actually, 22nd-century humans who traveled back in time to </span><a class="twikilink" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Panspermia" title="/pmwiki/pmwiki.php/Main/Panspermia"><span data-dcnode-id="1625" instrument_node="">seed the galaxy with Human Alien life</span></a></span><span data-dcnode-id="1622" instrument_node="">). The third book reveals that, while </span><span class="spoiler" data-dcnode-id="1620" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1621" instrument_node="">humans in the 22nd century</span></span><span data-dcnode-id="1619" instrument_node=""> are able to cross galaxies, it was a complete accident that a ship ended up in a faraway dwarf galaxy and stumbled on a race of </span><a class="twikilink" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanAliens" title="/pmwiki/pmwiki.php/Main/HumanAliens"><span data-dcnode-id="1618" instrument_node="">Human Aliens</span></a><span data-dcnode-id="1616" instrument_node=""> with </span><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlueAndOrangeMorality" title="/pmwiki/pmwiki.php/Main/BlueAndOrangeMorality"><span data-dcnode-id="1615" instrument_node="">Blue-and-Orange Morality</span></a><span data-dcnode-id="1613" instrument_node="">. What follows is an intergalactic war that leaves </span><span class="spoiler" data-dcnode-id="1611" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1612" instrument_node="">humans</span></span><span data-dcnode-id="1610" instrument_node=""> desperately scrambling for allies. They have set up a </span><a class="twikilink" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoWarpingZone" title="/pmwiki/pmwiki.php/Main/NoWarpingZone"><span data-dcnode-id="1609" instrument_node="">No Warping Zone</span></a><span data-dcnode-id="1607" instrument_node=""> on the outskirts of the Milky Way in the direction of the dwarf galaxy that forces the enemy ships to drop out and be attacked by </span><span class="spoiler" data-dcnode-id="1605" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1606" instrument_node="">human</span></span><span data-dcnode-id="1604" instrument_node=""> forces.
</span></li><li data-dcnode-id="1574"><span data-dcnode-id="1602" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WilliamShatner" title="/pmwiki/pmwiki.php/Creator/WilliamShatner"><span data-dcnode-id="1601" instrument_node="">William Shatner</span></a><span data-dcnode-id="1599" instrument_node=""> novel </span><em data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Beyond the Stars</span></em><span data-dcnode-id="1596" instrument_node=""> (a part of his </span><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Quest For Tomorrow</span></em><span data-dcnode-id="1593" instrument_node=""> series), the protagonist Jim (</span><a class="twikilink" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything" title="/pmwiki/pmwiki.php/Main/DoesThisRemindYouOfAnything"><span data-dcnode-id="1592" instrument_node="">Does This Remind You of Anything?</span></a><span data-dcnode-id="1590" instrument_node="">) is sent on a colony ship. The back cover of the book claims that the ship is called </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Outward Bound</span></em><span data-dcnode-id="1587" instrument_node=""> and is a </span><a class="twikilink" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenerationShips" title="/pmwiki/pmwiki.php/Main/GenerationShips"><span data-dcnode-id="1586" instrument_node="">Generation Ship</span></a><span data-dcnode-id="1584" instrument_node=""> heading for another galaxy. This is, however, a case of </span><a class="twikilink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoversAlwaysLie" title="/pmwiki/pmwiki.php/Main/CoversAlwaysLie"><span data-dcnode-id="1583" instrument_node="">Covers Always Lie</span></a><span data-dcnode-id="1581" instrument_node="">. Not only do they get the name of the ship wrong (it's similar, though), but it's simply heading for a world far away from human space, but no one ever mentions another galaxy. It's also revealed in the next book that </span><span class="spoiler" data-dcnode-id="1576" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1580" instrument_node="">a previously-unknown race of </span><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeePeople" title="/pmwiki/pmwiki.php/Main/BeePeople"><span data-dcnode-id="1579" instrument_node="">Bee People</span></a><span data-dcnode-id="1577" instrument_node=""> blows up the colony ship soon after Jim gets off.</span></span><span data-dcnode-id="1575" instrument_node="">
</span></li><li data-dcnode-id="1562"><span data-dcnode-id="1573" instrument_node=""> One of the books in the </span><em data-dcnode-id="1570"><a class="twikilink" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AlexBenedict" title="/pmwiki/pmwiki.php/Literature/AlexBenedict"><span data-dcnode-id="1572" instrument_node="">Alex Benedict</span></a></em><span data-dcnode-id="1569" instrument_node=""> series by Jack McDevitt notes that current FTL technology could reach the Andromeda Galaxy in about a year. It hasn't happened for the simple reason that there's no need. The first book has the opposite tack of the then-current FTL technology being </span><em data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">much</span></em><span data-dcnode-id="1566" instrument_node=""> too slow for intergalactic travel to be practical (it is also observed that </span><span class="spoiler" data-dcnode-id="1564" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1565" instrument_node=""> suddenly making it practical is one of the things made possible by the rediscovered Corsarius-type FTL drive at the end of the book</span></span><span data-dcnode-id="1563" instrument_node="">).
</span></li><li data-dcnode-id="1550"><span data-dcnode-id="1561" instrument_node=""> In </span><em data-dcnode-id="1558"><a class="twikilink" data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Animorphs" title="/pmwiki/pmwiki.php/Literature/Animorphs"><span data-dcnode-id="1560" instrument_node="">Animorphs</span></a></em><span data-dcnode-id="1557" instrument_node="">, all of the space-faring civilizations mentioned are confined to our galaxy. Even the </span><a class="twikilink" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAlien" title="/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAlien"><span data-dcnode-id="1556" instrument_node="">sufficiently advanced</span></a><span data-dcnode-id="1554" instrument_node=""> Ellimist and Crayak are limited in their influence to our galaxy. The Crayak </span><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">is</span></strong><span data-dcnode-id="1551" instrument_node=""> extra-galactic in origin though, and other beings like themselves are said to exist in all galaxies.
</span></li><li data-dcnode-id="1538"><span data-dcnode-id="1549" instrument_node=""> Played with in </span><em data-dcnode-id="1546"><a class="twikilink" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Uplift" title="/pmwiki/pmwiki.php/Literature/Uplift"><span data-dcnode-id="1548" instrument_node="">Uplift</span></a></em><span data-dcnode-id="1545" instrument_node=""> universe, where the Civilization of Five Galaxies does span— well, take a guess— but can't for the life of it reach any galaxy outside that set. It turns out the hyperspace links just aren't there to travel outside the Five. Even more nastily, it turns out that in the distant past there were something more like fourteen galaxies, </span><span class="spoiler" data-dcnode-id="1540" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1544" instrument_node="">and by the end of the series it will be further traumatically reduced to the Civilization of Four Galaxies. This is predicted to continue until the Milky Way truly is the only way, along with each other isolated galaxy. An attempt by otherwise </span><a class="twikilink" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAliens" title="/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAliens"><span data-dcnode-id="1543" instrument_node="">Sufficiently Advanced Aliens</span></a><span data-dcnode-id="1541" instrument_node=""> to bridge the gap turns out to be the other impetus for the story.</span></span><span data-dcnode-id="1539" instrument_node="">
</span></li><li data-dcnode-id="1526"><span data-dcnode-id="1537" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoubleSubverted" title="/pmwiki/pmwiki.php/Main/DoubleSubverted"><span data-dcnode-id="1536" instrument_node="">Double Subverted</span></a><span data-dcnode-id="1534" instrument_node=""> in the </span><em data-dcnode-id="1531"><a class="twikilink" data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/StarCarrier" title="/pmwiki/pmwiki.php/Literature/StarCarrier"><span data-dcnode-id="1533" instrument_node="">Star Carrier</span></a></em><span data-dcnode-id="1530" instrument_node=""> series. As revealed in the third book the </span><a class="twikilink" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1529" instrument_node="">Sh'daar</span></a><span data-dcnode-id="1527" instrument_node=""> came from another galaxy, but not by hoofing it. Their home galaxy was a dwarf that was "eaten" by the much larger Milky Way a few billion years ago.
</span></li><li data-dcnode-id="1505"><span data-dcnode-id="1525" instrument_node=""> Played straight in the main </span><em data-dcnode-id="1522"><a class="twikilink" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/RevelationSpaceSeries" title="/pmwiki/pmwiki.php/Literature/RevelationSpaceSeries"><span data-dcnode-id="1524" instrument_node="">Revelation Space Series</span></a></em><span data-dcnode-id="1521" instrument_node=""> novels - the scarcity of </span><a class="twikilink" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReactionlessDrive" title="/pmwiki/pmwiki.php/Main/ReactionlessDrive"><span data-dcnode-id="1520" instrument_node="">Conjoiner Drives</span></a><span data-dcnode-id="1518" instrument_node=""> and the limitations of light speed have limited human expansion to a roughly 100 light-year wide bubble around Earth. Even the Inhibitors - a "race" of robots that </span><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsoluteXenophobe" title="/pmwiki/pmwiki.php/Main/AbsoluteXenophobe"><span data-dcnode-id="1517" instrument_node="">purge starfaring life</span></a><span data-dcnode-id="1515" instrument_node=""> and think within the </span><a class="twikilink" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeAbyss" title="/pmwiki/pmwiki.php/Main/TimeAbyss"><span data-dcnode-id="1514" instrument_node="">timespan of billions of years</span></a><span data-dcnode-id="1512" instrument_node=""> - have their operations limited to the Milky Way. Averted in the </span><a class="twikilink" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistantFinale" title="/pmwiki/pmwiki.php/Main/DistantFinale"><span data-dcnode-id="1511" instrument_node="">Distant Finale</span></a><span data-dcnode-id="1509" instrument_node=""> novellas with the </span><span class="spoiler" data-dcnode-id="1507" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1508" instrument_node=""> release of the Greenfly terraformers</span></span><span data-dcnode-id="1506" instrument_node="">; humanity begins to flee wholesale from the Milky Way to escape.
</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1504" instrument_node=""> In the </span><em data-dcnode-id="1501"><a class="twikilink" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/GreatShip" title="/pmwiki/pmwiki.php/Literature/GreatShip"><span data-dcnode-id="1503" instrument_node="">Great Ship</span></a></em><span data-dcnode-id="1500" instrument_node=""> universe, no known species have ventured (far) out of the Milky Way due to the lack of </span><a class="twikilink" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FasterThanLightTravel" title="/pmwiki/pmwiki.php/Main/FasterThanLightTravel"><span data-dcnode-id="1499" instrument_node="">Faster-Than-Light Travel</span></a><span data-dcnode-id="1497" instrument_node=""> or communications despite almost every interstellar species having become nigh-immortal </span><a class="twikilink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TransHuman" title="/pmwiki/pmwiki.php/Main/TransHuman"><span data-dcnode-id="1496" instrument_node="">Trans Humans</span></a><span data-dcnode-id="1494" instrument_node="">. The </span><a class="twikilink" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetSpaceship" title="/pmwiki/pmwiki.php/Main/PlanetSpaceship"><span data-dcnode-id="1493" instrument_node="">Great Ship</span></a><span data-dcnode-id="1491" instrument_node=""> was discovered streaking towards the the Milky Way - at a significant fraction of the speed of light - from an almost completely empty section of the sky, and was completely covered in impact craters from a steady stream of collisions from its billion year long flight. Humanity was the first to send a fleet to claim the Great Ship, which they </span><a class="twikilink" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceshipSlingshotStunt" title="/pmwiki/pmwiki.php/Main/SpaceshipSlingshotStunt"><span data-dcnode-id="1490" instrument_node="">slingshotted</span></a><span data-dcnode-id="1488" instrument_node=""> around a red dwarf to put it in the galactic plane. However, at the climax of </span><em data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The Well of Stars</span></em><span data-dcnode-id="1485" instrument_node="">, it is </span><span class="spoiler" data-dcnode-id="1480" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1484" instrument_node=""> revealed that a ship has been chasing the Great Ship across the universe; when they seize control after the Polypond war, they activate the ship's </span><a class="twikilink" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReactionlessDrive" title="/pmwiki/pmwiki.php/Main/ReactionlessDrive"><span data-dcnode-id="1483" instrument_node="">true engines</span></a><span data-dcnode-id="1481" instrument_node=""> and begin the flight back into intergalactic space with the ship's passengers still on board</span></span><span data-dcnode-id="1479" instrument_node="">.
</span></li><li data-dcnode-id="1469"><span data-dcnode-id="1477" instrument_node=""> Averted in </span><em data-dcnode-id="1474"><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheStarOfTheGuardians" title="/pmwiki/pmwiki.php/Literature/TheStarOfTheGuardians"><span data-dcnode-id="1476" instrument_node="">The Star of the Guardians</span></a></em><span data-dcnode-id="1473" instrument_node="">. There's a single space station in Andromeda, called "Hell's Outpost." It's pretty much a </span><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WretchedHive" title="/pmwiki/pmwiki.php/Main/WretchedHive"><span data-dcnode-id="1472" instrument_node="">Wretched Hive</span></a><span data-dcnode-id="1470" instrument_node=""> (hence the name) due to being outside the government's control. It's also pretty often raided by the local life-forms, a race of plasma-based creatures that eat energy.
</span></li><li data-dcnode-id="1460"><span data-dcnode-id="1468" instrument_node=""> Averted in </span><em data-dcnode-id="1465"><a class="twikilink" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/NexusNine" title="/pmwiki/pmwiki.php/Literature/NexusNine"><span data-dcnode-id="1467" instrument_node="">Nexus Nine</span></a></em><span data-dcnode-id="1464" instrument_node="">, the Tri-Galactic Union uses the titular </span><a class="twikilink" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PortalNetwork" title="/pmwiki/pmwiki.php/Main/PortalNetwork"><span data-dcnode-id="1463" instrument_node="">Nexus pathways</span></a><span data-dcnode-id="1461" instrument_node=""> to travel between galaxies, and the exploration of Nexus Nine leads them to a whole new one.
</span></li></ul></div><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1456"></p><div class="folderlabel" data-dcnode-id="1454" onclick="togglefolder('folder6');"><span data-dcnode-id="1455" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Live-Action TV&nbsp;</span></div><div class="folder" data-dcnode-id="1246" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="1453" instrument_node="">
</span><ul data-dcnode-id="1247"><li data-dcnode-id="1360"><span data-dcnode-id="1452" instrument_node=""> </span><em data-dcnode-id="1449"><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarTrek" title="/pmwiki/pmwiki.php/Franchise/StarTrek"><span data-dcnode-id="1451" instrument_node="">Star Trek</span></a></em><span data-dcnode-id="1448" instrument_node="">:
</span><ul data-dcnode-id="1361"><li data-dcnode-id="1430"><span data-dcnode-id="1447" instrument_node=""> In </span><em data-dcnode-id="1444"><a class="twikilink" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekTheOriginalSeries" title="/pmwiki/pmwiki.php/Series/StarTrekTheOriginalSeries"><span data-dcnode-id="1446" instrument_node="">Star Trek: The Original Series</span></a></em><span data-dcnode-id="1443" instrument_node="">, when traveling across the galaxy seemed to take just a few days or weeks, they had the "Galactic Barrier", a mysterious energy field blocking intergalactic travel. There is at least one species</span><span class="notelabel" data-dcnode-id="1440" onclick="togglenote('note29nyi');" style="cursor: pointer;"><sup data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1438" id="note29nyi" isnote="true" onclick="togglenote('note29nyi');" style="display: none; cursor: pointer;"><span data-dcnode-id="1439" instrument_node="">The Kelvans</span></span><span data-dcnode-id="1437" instrument_node=""> that comes from Andromeda, but takes 300 years or so to send a ship across the void (these are the guys with the weapons that turn people into salt cubes and back again), and the Planet Killer of episode "The Doomsday Machine" was believed to be extra-galactic in origin. The Galactic Barrier turned up occasionally as a plot point in some of the </span><a class="twikilink" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarTrekExpandedUniverse" title="/pmwiki/pmwiki.php/Franchise/StarTrekExpandedUniverse"><span data-dcnode-id="1436" instrument_node="">Star Trek Expanded Universe</span></a><span data-dcnode-id="1434" instrument_node=""> novels, but for the most part, the later series dropped that idea and changed warp speed to </span><a class="twikilink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TravelingAtTheSpeedOfPlot" title="/pmwiki/pmwiki.php/Main/TravelingAtTheSpeedOfPlot"><span data-dcnode-id="1433" instrument_node="">Traveling at the Speed of Plot</span></a><span data-dcnode-id="1431" instrument_node="">.
</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1429" instrument_node=""> One of the Expanded Universe novels (written by </span><a class="twikilink" data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WilliamShatner" title="/pmwiki/pmwiki.php/Creator/WilliamShatner"><span data-dcnode-id="1428" instrument_node="">William Shatner</span></a><span data-dcnode-id="1426" instrument_node="">) mentions a ship that accidentally ended up halfway to the Andromeda Galaxy and encountered an </span><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="1425" instrument_node="">Eldritch Abomination</span></a><span data-dcnode-id="1423" instrument_node=""> that was already on the way towards us. This was, however, the result of the ship ending up in a </span><a class="twikilink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AppliedPhlebotinum" title="/pmwiki/pmwiki.php/Main/AppliedPhlebotinum"><span data-dcnode-id="1422" instrument_node="">transwarp conduit</span></a><span data-dcnode-id="1420" instrument_node=""> connecting the two galaxies. Other EU novels include discussion on how to explore out there, mostly settling on AI being the only option.
