</span><p data-dcnode-id="7664" style="text-align: center;"><strong data-dcnode-id="7665"><span data-dcnode-id="7666" style="color: #15537a;"><span data-dcnode-id="7669" instrument_node="">The Stargate through our Sun refers to the Sun's Portal Event Horizon, through which Starseed and Alliance Groups come and go.</span><br data-dcnode-id="7668"><span data-dcnode-id="7667" instrument_node="">
Galactic Astrology reveals the Akashic Memories/Skills of the Soul, memories stored within the OverSoul's Akashic Records at our Milky Way's Galaxy Centre.</span></span></strong></p><span data-dcnode-id="7663" instrument_node="">
</span><p data-dcnode-id="7657" style="text-align: center;"><span data-dcnode-id="7658" style="color: #15537a;"><span data-dcnode-id="7662" instrument_node=""> Recent research shows the Sun and the planets are laid out according to the </span><a data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spirasolaris.ca/sbb4c.html" rel="noopener" target="_blank"><span data-dcnode-id="7661" instrument_node="">Golden Ratio</span></a><span data-dcnode-id="7659" instrument_node="">. The velocities, the orbital periods between the planets, the synodic periods and the distances out from the Sun, &nbsp;are all &nbsp;based on Golden 'Phi' Ratio. </span></span></p><span data-dcnode-id="7656" instrument_node="">
</span><p data-dcnode-id="7644" style="text-align: center;"><span data-dcnode-id="7645" style="color: #15537a;"><span data-dcnode-id="7655" instrument_node="">Importantly Astro-Genetic Galactic Astrology uses the phi geometry that underlies our *ETHERIC* &nbsp;</span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DArZLXHVVV5I" rel="noopener" target="_blank"><span data-dcnode-id="7654" instrument_node="">DNA helix</span></a><span data-dcnode-id="7652" instrument_node=""> and </span><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/pdf/q-bio/0702056.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7651" instrument_node="">molecule</span></a><span data-dcnode-id="7649" instrument_node="">, </span><strong data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">now we can begin to decode the Oversoul Akashic Records using an actual scientific approach</span></strong><span data-dcnode-id="7646" instrument_node="">, &nbsp;memories are transferred through time/space as waves, becoming the plasma/etheric garment encompassing DNA. </span></span></p><span data-dcnode-id="7643" instrument_node="">
</span><p data-dcnode-id="7624" style="text-align: center;"><strong data-dcnode-id="7639"><span data-dcnode-id="7640" style="color: #0000ff;"><a class="fbx-link fbx-instance" data-dcnode-id="7641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2019/10/helical-orbit.gif"><img alt="" class="aligncenter size-full wp-image-2770" data-dcnode-id="7642" height="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2019/10/helical-orbit.gif&amp;raw" width="400"></a></span></strong><span data-dcnode-id="7625" style="color: #0000ff;"><span data-dcnode-id="7626" style="color: #15537a;"><span data-dcnode-id="7638" instrument_node="">The cross- section of our DNA helix is a decagon (AMENTI / I-AM-TEN, ie; DNA helix = Hall of Records).</span><br data-dcnode-id="7637"><span data-dcnode-id="7636" instrument_node="">
We use the decagon (cross section of the helix) to plot solar planetary positions in relationship to the galactic centre -</span><br data-dcnode-id="7635"><span data-dcnode-id="7634" instrument_node="">
imagine if you will that we zoom ahead of our Sun, turn look back at the whole solar system moving towards us -</span><br data-dcnode-id="7633"><span data-dcnode-id="7632" instrument_node="">
then zoom to the side and watch the solar system going past us -</span><br data-dcnode-id="7631"><span data-dcnode-id="7630" instrument_node="">
clearly the </span><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DXftBXe6A4x4" rel="noopener" target="_blank"><span data-dcnode-id="7629" instrument_node="">helically spiralling path of the orbiting planets</span></a><span data-dcnode-id="7627" instrument_node=""> are carving out strands of the Solar DNA helix.</span></span></span></p><span data-dcnode-id="7623" instrument_node="">
</span><p data-dcnode-id="7620"><a class="fbx-link fbx-instance" data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE.jpg"><img alt="" class="aligncenter size-full wp-image-1999" data-dcnode-id="7622" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE.jpg&amp;raw" width="1635"></a></p><span data-dcnode-id="7619" instrument_node="">

</span><p data-dcnode-id="6426"><span data-dcnode-id="6435" style="color: #15537a;"><span data-dcnode-id="6453" instrument_node="">Astrophysicist Paul LaViolette has collected evidence (he uses the regular astronomic data) to prove there can't be a 'regular' black hole as thought by astronomers at galactic centre, their own data doesn't support black hole theory - yet does support a 'singular' stellar object *</span><a data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//etheric.com/sgr-a-luminous-ejecting-gas-subquantum-kinetics/" rel="noopener" target="_blank"><span data-dcnode-id="6452" instrument_node="">Sgr-A</span></a><span data-dcnode-id="6450" instrument_node="">*. Theres *Radio Emissions* coming from within the Black Hole event horizon whereas this shouldn’t be the case.</span><br data-dcnode-id="6449"><span data-dcnode-id="6448" instrument_node="">
.</span><br data-dcnode-id="6447"><span data-dcnode-id="6446" instrument_node="">
Paul begins: “The diameter of this luminous region inside the event horizon will be found to be smaller than the event horizon, thereby proving that the Galactic core is not a black hole. A posting to this effect can be found </span><a data-dcnode-id="6444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//etheric.com/sgr-a-luminous-ejecting-gas-subquantum-kinetics/" rel="noopener" target="_blank"><span data-dcnode-id="6445" instrument_node="">here</span></a><span data-dcnode-id="6443" instrument_node="">”.</span><br data-dcnode-id="6442"><span data-dcnode-id="6441" instrument_node="">
“Conventional astronomy has for decades maintained that the core of our Galaxy harbors a black hole singularity. The latest estimate places the mass of the core at 4.3 ± 0.3 million solar masses. Since its first publication in 1985, subquantum kinetics has maintained that black holes can’t form. It maintains that the massive objects in the cores of galaxies are instead very massive, very OLD STELLAR CORES which are kept from collapsing by the prodigious amount of “geneic” energy produced in their interior through the predicted photon blueshifting effect.</span><br data-dcnode-id="6440"><span data-dcnode-id="6439" instrument_node="">

</span><span data-dcnode-id="6427" style="color: #15537a;"><br data-dcnode-id="6432"><span data-dcnode-id="6431" instrument_node="">

</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="5793"><span data-dcnode-id="5816" instrument_node="">
</span><h4 data-dcnode-id="5813"><span data-dcnode-id="5814" style="color: #15537a;"><span data-dcnode-id="5815" instrument_node="">Unprecedented Near-Infrared Brightness and Variability of Sgr A [April-May 2019]</span></span></h4><span data-dcnode-id="5812" instrument_node="">
</span><p data-dcnode-id="5798"><span data-dcnode-id="5807" style="color: #15537a;"><span data-dcnode-id="5811" instrument_node="">A team of astronomers recent study of </span><a data-dcnode-id="5809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/pdf/1908.01777.pdf%3Ffbclid%3DIwAR32rAhd9n6RRBJuX3YaeRLZGz6MPwvJJi_a9xMdJ8dCX-h8TDGfy835jQ0" rel="noopener" target="_blank"><span data-dcnode-id="5810" instrument_node="">Srg-A</span></a><span data-dcnode-id="5808" instrument_node="">: Our recent observations of the Galactic center have captured Sgr A* in an unprecedented bright state in the near-infrared. Even more so, three of the four nights show Sgr A* in a clearly elevated state. The brightest flux levels observed in 2019 are over twice the peak flux value ever observed in the near-infrared from Keck and VLT. The distributions of flux variations from the four nights are also very unusual compared to the histori- cal data, showing significant deviations from the model which was previously able to describe all historical Keck, VLT, &amp; Spitzer measurements (Witzel et al. 2018; Chen et al. submitted).</span></span><br data-dcnode-id="5806"><span data-dcnode-id="5805" instrument_node="">
</span><span data-dcnode-id="5803" style="color: #15537a;"><span data-dcnode-id="5804" instrument_node="">Our galaxy's central plasma (Sgr-A) is called a '</span></span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-sis.org.uk/How_the_Plasma_Universe_Creates_Galaxies_and_Stars.php" rel="noopener" target="_blank"><span data-dcnode-id="5802" instrument_node="">Radio Quasar</span></a><span data-dcnode-id="5799" style="color: #15537a;"><span data-dcnode-id="5800" instrument_node="">' by Plasma Cosmologists.</span></span></p><span data-dcnode-id="5797" instrument_node="">
</span><p data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5794" instrument_node="">

</span></div><span data-dcnode-id="5474" instrument_node="">
</span><div class="" data-block="true" data-dcnode-id="5468" data-editor="8f8v" data-offset-key="e6rtr-0-0"><span data-dcnode-id="5473" instrument_node="">
</span><div class="_1mf _1mj" data-dcnode-id="5470" data-offset-key="e6rtr-0-0"><span data-dcnode-id="5471" data-offset-key="e6rtr-0-0" style="color: #003366;"><span data-dcnode-id="5472" instrument_node="">Scudder termed these phenomenon ‘X-points’. After Scudder’s theory was examined by NASA, they flew a robotic spacecraft into one of these magnetic points which revealed that the X-point had the potential to transport objects directly into the Sun’s atmosphere. The distance from the Earth to the Sun is measured as one astronomical unit (AU) or 93 million miles away. This discovery was ground breaking because it questioned our understanding of known physics and opened the door to understanding the relationship between time and space. Even though we may not fully grasp the concept yet, it can serve as a stepping stone to better understand how our universe operates on a scale once thought to intangible.</span></span></div><span data-dcnode-id="5469" instrument_node="">

</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="4514"><span data-dcnode-id="4586" instrument_node="">
</span><p data-dcnode-id="4571" style="text-align: left;"><span data-dcnode-id="4580" style="color: #15537a;"><span data-dcnode-id="4585" instrument_node="">Galactic *CENTRE* orientated charts are drawn from the Sun's perspective , but interpreted from the perspective of the Milky Way Centre -</span><br data-dcnode-id="4584"><span data-dcnode-id="4583" instrument_node="">
While the Geocentric chart looks out from the earth thru a telescope.</span><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">
</span></span><span data-dcnode-id="4579" instrument_node=""> </span><span data-dcnode-id="4576" style="color: #15537a;"><br data-dcnode-id="4578"><span data-dcnode-id="4577" instrument_node="">
In the helio chart we're looking out from the Sun with our telescope, plotting the planets in their real positions, we can then look further out at the stars that are in the background and note their true positions.</span></span><span data-dcnode-id="4575" instrument_node=""> </span><span data-dcnode-id="4572" style="color: #15537a;"><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">
More importantly we are looking specifically at how our Solar System and the planets react to incoming frequencies from the centre of the galaxy at a given moment.</span></span></p><span data-dcnode-id="4570" instrument_node="">
</span><p data-dcnode-id="4563"><span data-dcnode-id="4568" style="color: #15537a;"><span data-dcnode-id="4569" instrument_node="">It’s important to realize the realm of the OverSoul is beyond the ET family storyline from Lyra+Vega - Galactic Astrology is accessing the memories stored in our Oversoul, which/who has ‘guided’ the progress of her/his Star Family unfoldment throughout a local sector of the Milky Way -</span></span><br data-dcnode-id="4567"><span data-dcnode-id="4566" instrument_node="">
</span><span data-dcnode-id="4564" style="color: #15537a;"><span data-dcnode-id="4565" instrument_node="">In this respect we’re looking beyond a simple ‘Akashic Reading’ of past lives in various planetary systems to the *INTENT* of the Oversoul and purpose underlying the numerous Soul Extensions spread throughout time/space and dimensions - all of the above resolves back into the Galactic Centre where the originating OverSoul sprang from .</span></span></p><span data-dcnode-id="4562" instrument_node="">
</span><p data-dcnode-id="4528"><span data-dcnode-id="4557" style="color: #15537a;"><span data-dcnode-id="4561" instrument_node="">An </span><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibliotecapleyades.net/vida_alien/alien_lyssaroyal03.htm" rel="noopener" target="_blank"><span data-dcnode-id="4560" instrument_node="">extract</span></a><span data-dcnode-id="4558" instrument_node=""> from the group consciousness “Germane” via Lyssa Royal</span></span><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">
</span><span data-dcnode-id="4553" style="color: #15537a;"><span data-dcnode-id="4554" instrument_node="">The Soul Coding</span></span><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">
</span><span data-dcnode-id="4549" style="color: #15537a;"><span data-dcnode-id="4550" instrument_node="">What reincarnates?</span></span><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">
</span><span data-dcnode-id="4545" style="color: #15537a;"><span data-dcnode-id="4546" instrument_node="">"The I who was me then and who will be me in the future is perhaps both my soul and my physical genetic representation... but that original soul unaffected by the genetic coding has its own coding. Where does that come from, and why should it be affected by the Terra coding in our next reincarnation?</span></span><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">
</span><span data-dcnode-id="4541" style="color: #15537a;"><span data-dcnode-id="4542" instrument_node="">Good question.</span></span><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">
</span><span data-dcnode-id="4537" style="color: #15537a;"><span data-dcnode-id="4538" instrument_node="">First, a little bit of metaphysics here. Let's say that the oversoul is the palm of the hand. The fingers are the lifetimes or incarnations. &nbsp;Now, the oversoul knows the entire story and dictates what you're going to do. &nbsp;That's your source. &nbsp;That's the source that made you Lyran, Sirian, and Terran - the progression.   Genetics has been considered a physical thing. &nbsp;It's in your genes. &nbsp;Your genetic coding is in your DNA. &nbsp;Now, there is etheric DNA (for lack of another term) that exists within the matrices of your soul or your oversoul's energy. This represents your past, your future, your present all wrapped up into one idea. It's encoded by light frequencies.</span></span><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">
</span><span data-dcnode-id="4533" style="color: #15537a;"><span data-dcnode-id="4534" instrument_node="">This is what dictates or what attracts you to a certain type of body. When you want to come into a lifetime, there will be various connections with the different bodies on Earth. If you want to incarnate as a black person, maybe there have been lifetimes as other black people and you want to resolve them.</span></span><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">
</span><span data-dcnode-id="4529" style="color: #15537a;"><span data-dcnode-id="4530" instrument_node="">That's one idea. That's on the Earth level.   There are other levels that represent your identity with your Source on an etheric genetic level. That will dictate your experiences and your genetic evolution, not against your will but as a reflection of your will, and not only your genetic evolution on Earth, but your metagenetic evolution, the genetic evolution of you as a light being.</span></span></p><span data-dcnode-id="4527" instrument_node="">
</span><p data-dcnode-id="4520"><span data-dcnode-id="4525" style="color: #15537a;"><span data-dcnode-id="4526" instrument_node="">Originally was this etheric DNA created by someone, some energy form? </span></span><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">
</span><span data-dcnode-id="4521" style="color: #15537a;"><span data-dcnode-id="4522" instrument_node="">  No, not outside of you. We've described the whole idea of the dimensional infusion, which was your emergence into this reality that you all share. You came from a point of integration into a reality of separation. When you fragmented it was like the shattering of a mirror. You brought with you the original stuff that you were part of, and that is part of your identity. Your experiences here alter your identity; they change it, expand it.  So it's not that someone else created you but that who you are inherently created the codes that we speak of. It's a reflection of you rather than a blueprint about you."</span></span></p><span data-dcnode-id="4519" instrument_node="">
</span><p data-dcnode-id="4516"><a class="fbx-link fbx-instance" data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/08/Pulse-from-Galaxy-Centre.jpeg"><img alt="" class="aligncenter size-large wp-image-1696" data-dcnode-id="4518" height="439" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/08/Pulse-from-Galaxy-Centre-1024x599.jpeg&amp;raw" srcset="https://galacticastrologyacademy.com/wp-content/uploads/2018/08/Pulse-from-Galaxy-Centre-1024x599.jpeg 1024w, https://galacticastrologyacademy.com/wp-content/uploads/2018/08/Pulse-from-Galaxy-Centre-300x176.jpeg 300w, https://galacticastrologyacademy.com/wp-content/uploads/2018/08/Pulse-from-Galaxy-Centre-768x449.jpeg 768w" width="750"></a></p><span data-dcnode-id="4515" instrument_node="">

</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="4041"><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4100"><span data-dcnode-id="4128" style="color: #15537a;"><span data-dcnode-id="4129" instrument_node="">July 25/26th</span></span><br data-dcnode-id="4127"><span data-dcnode-id="4126" instrument_node="">
</span><span data-dcnode-id="4124" style="color: #15537a;"><span data-dcnode-id="4125" instrument_node="">Dreamspell Calendar New Year and the Galactic Centre (Hunab Ku):</span></span><br data-dcnode-id="4123"><span data-dcnode-id="4122" instrument_node="">
</span><span data-dcnode-id="4120" style="color: #15537a;"><span data-dcnode-id="4121" instrument_node="">.</span></span><br data-dcnode-id="4119"><span data-dcnode-id="4118" instrument_node="">
</span><span data-dcnode-id="4116" style="color: #15537a;"><span data-dcnode-id="4117" instrument_node="">The Mayan Tzolkin is two interpenetrating decagons, being 20day cycles, while Galactic Astrology embraces the decagon to form a new zodiac based on the angles of light, love and DNA (36, 72, 108, 144deg).</span></span><br data-dcnode-id="4115"><span data-dcnode-id="4114" instrument_node="">
</span><span data-dcnode-id="4112" style="color: #15537a;"><span data-dcnode-id="4113" instrument_node="">Mayan cycles were based on the Fibonacci numbers (golden ratio in nature uses whole numbers and not the golden fraction).</span></span><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">
</span><span data-dcnode-id="4108" style="color: #15537a;"><span data-dcnode-id="4109" instrument_node="">5days, 13days, 5 Baktuns, 13 Baktuns.</span></span><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">
</span><span data-dcnode-id="4101" style="color: #15537a;"><span data-dcnode-id="4105" instrument_node="">These cycles correspond to major planetary conjunctions over vast periods of time, &nbsp;corresponding to ‘golden ratio’ </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spirasolaris.ca/sbb4c.html" rel="noopener" target="_blank"><span data-dcnode-id="4104" instrument_node="">solar mechanics</span></a><span data-dcnode-id="4102" instrument_node="">.</span></span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4090"><span data-dcnode-id="4097" style="color: #15537a;"><span data-dcnode-id="4098" instrument_node="">.</span></span><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">
</span><span data-dcnode-id="4091" style="color: #15537a;"><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatdreams.com/gem1.htm" rel="noopener" target="_blank"><span data-dcnode-id="4094" instrument_node="">Ancient Mayan</span></a><span data-dcnode-id="4092" instrument_node=""> &nbsp;counted minutes, hours and days, not as 60sec, 60min but as multiples of the angles of Light, DNA and Love, ie; 36, 72, 144 etc.</span></span></p><span data-dcnode-id="4089" instrument_node="">
</span><p data-dcnode-id="4078"><span data-dcnode-id="4087" style="color: #15537a;"><span data-dcnode-id="4088" instrument_node="">These are the angles of the decagon &amp;amp; golden ratio geometries, 24hrs was 144min -</span></span><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">
</span><span data-dcnode-id="4083" style="color: #15537a;"><span data-dcnode-id="4084" instrument_node="">those who have explored the new physics may remember Bruce Cathie’s harmonic for Light was 144, which is intimately connected to the Dreamspell via light mathematics/tangents/cosine etc.</span></span><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">
</span><span data-dcnode-id="4079" style="color: #15537a;"><span data-dcnode-id="4080" instrument_node="">.</span></span></p><span data-dcnode-id="4077" instrument_node="">
</span><p data-dcnode-id="4043"><span data-dcnode-id="4075" style="color: #15537a;"><span data-dcnode-id="4076" instrument_node="">Dreamspell and the ‘Day out of Time’</span></span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">
</span><span data-dcnode-id="4071" style="color: #15537a;"><span data-dcnode-id="4072" instrument_node="">Jose who ‘invented’ the Dreamspell was born aligned exactly to his re-interpretation of the Mayan Long count Calendar (see image) -</span></span><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">
</span><span data-dcnode-id="4067" style="color: #15537a;"><span data-dcnode-id="4068" instrument_node="">While Dreamspell is not popular with many elder Mayan Time Keepers, the new age has embraced it with open arms.</span></span><br data-dcnode-id="4066"><span data-dcnode-id="4065" instrument_node="">
</span><span data-dcnode-id="4063" style="color: #15537a;"><span data-dcnode-id="4064" instrument_node="">.</span></span><br data-dcnode-id="4062"><span data-dcnode-id="4061" instrument_node="">
</span><span data-dcnode-id="4059" style="color: #15537a;"><span data-dcnode-id="4060" instrument_node="">July 25th is when the sun appears to be at 3-4deg Leo, this is exactly 144deg to Galactic Centre (node), the same 144deg from Jose’s birth Earth position.</span></span><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">
</span><span data-dcnode-id="4055" style="color: #15537a;"><span data-dcnode-id="4056" instrument_node="">.</span></span><br data-dcnode-id="4054"><span data-dcnode-id="4053" instrument_node="">
</span><span data-dcnode-id="4051" style="color: #15537a;"><span data-dcnode-id="4052" instrument_node="">There’s a 200yr cycle unfolding from 2012, which will see the Galactic Centre aligning to Solstice while earth will be there also on Dec 21st around 2222.</span></span><br data-dcnode-id="4050"><span data-dcnode-id="4049" instrument_node="">
</span><span data-dcnode-id="4044" style="color: #15537a;"><span data-dcnode-id="4048" instrument_node="">Original research on the Galactic Superwave (also called Solar Flash/Event) by </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibliotecapleyades.net/esp_galacticsuperwave02.htm" rel="noopener" target="_blank"><span data-dcnode-id="4047" instrument_node="">Paul LaViolette</span></a><span data-dcnode-id="4045" instrument_node=""> in 1980 suggests this superwave may take another couple of centuries to fully embrace our solar system.</span></span></p><span data-dcnode-id="4042" instrument_node="">
</span></div><span data-dcnode-id="4040" instrument_node="">

</span><p data-dcnode-id="1559"><a class="fbx-link fbx-instance" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two.jpg"><img alt="" class="aligncenter size-full wp-image-2005" data-dcnode-id="1561" height="71" sizes="(max-width: 1634px) 100vw, 1634px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two.jpg&amp;raw" srcset="https://galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two.jpg 1634w, https://galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two-300x13.jpg 300w, https://galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two-768x33.jpg 768w, https://galacticastrologyacademy.com/wp-content/uploads/2018/10/SPACE-two-1024x44.jpg 1024w" width="1634"></a></p><span data-dcnode-id="1558" instrument_node="">

</span></div></div><div class="so-panel widget widget_sow-editor panel-last-child" data-dcnode-id="1508" data-index="83" id="panel-41-49-0-1"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1509"><span data-dcnode-id="1553" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1511"><span data-dcnode-id="1552" instrument_node="">
</span><h2 data-dcnode-id="1549"><span data-dcnode-id="1550" style="color: #15537a;"><span data-dcnode-id="1551" instrument_node="">Group Consciousness</span></span></h2><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" style="color: #15537a;"><span data-dcnode-id="1547" instrument_node="">One very common element thats appeared over the decades via channelled sources is - when the channel asks for the name of the source , the reply is they don't have a name - the channel more or less makes one up - advanced Races don't use or need personal names.</span></span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1542" style="color: #15537a;"><span data-dcnode-id="1543" instrument_node="">All starseed lived within a group consciousness or advanced social environment and will find in the coming galactic era, an era when starseed can review the historic records of their departure - they had no name, this is why advanced Races use colour coding for skills/expertise and clothing.</span></span><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">
</span><span data-dcnode-id="1538" style="color: #15537a;"><span data-dcnode-id="1539" instrument_node="">.</span></span><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" style="color: #15537a;"><span data-dcnode-id="1535" instrument_node="">Starseed to be starseed means they’ve come from and operated within a group consciousness, meaning that their shared identity with their species or group is more important to them than a sense of personal identity or personality that they may have. A group consciousness is a collective awareness, identity, intelligence and communication system. Individuals within the group consciousness are aware of what the group experience is. They are a part of the group because they want to be and not because they are in any way forced to be a part of it. The attraction of a group consciousness is so great that beings let go of the need to operate from the level of personal preferences in favour of the group consciousness. . Source / God is a group consciousness and all beings through the process of evolution are ultimately returning back to this state of being.</span></span><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">
</span><span data-dcnode-id="1530" style="color: #15537a;"><span data-dcnode-id="1531" instrument_node=""> . Starseed often attempt to connect to their Star Family and their akashic records as an individuality/personality. However we cannot have a human style of relationship with a group consciousness and it may feel as if it is lacking of personality. As such to a human a group consciousness may feel a little detached and impersonal. If we can get over the normal human tendency to want to have human relationships with Star Family then we can begin to appreciate and communicate more directly with these group consciousness’s and have a deeper understanding of what akashic records entails.</span></span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1520"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" style="color: #15537a;"><span data-dcnode-id="1527" instrument_node="">IT IS THE DESTINY OF HUMANITY TO CONSTRUCT THEIR OWN STYLE OF GROUP CONSCIOUSNESS.</span></span></strong><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
</span><span data-dcnode-id="1521" style="color: #15537a;"><span data-dcnode-id="1522" instrument_node="">Here is one example of a Group Consciousness template or blueprint.</span></span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><a class="fbx-link fbx-instance" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop.jpeg"><img alt="" class="aligncenter size-full wp-image-2103" data-dcnode-id="1518" height="476" sizes="(max-width: 982px) 100vw, 982px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop.jpeg&amp;raw" srcset="https://galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop.jpeg 2946w, https://galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop-300x145.jpeg 300w, https://galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop-768x372.jpeg 768w, https://galacticastrologyacademy.com/wp-content/uploads/2018/11/Main-144-with-backdrop-1024x496.jpeg 1024w" width="982"></a></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1512" instrument_node="">

</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" style="color: #15537a;"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.physics-astronomy.com/2017/03/magnetic-rope-observed-for-first-time.html%3Ffbclid%3DIwAR14QPJSOP4piT2cFS1dT1UBi69cT-KUB2NqvT5VBT7W9SQUEAzylxOajRM%23.XTuvvS2B17g" rel="noopener" target="_blank"><span data-dcnode-id="1503" instrument_node="">Saturn - Sun</span></a><span data-dcnode-id="1501" instrument_node="">: Jamie Jasinski, UCL Space and Climate Physics PhD graduate now based at the University of Michigan, and the lead author of the paper said: "Contrary to previous ideas about Saturn's magnetosphere being unlike its terrestrial counterpart, these findings reveal that Saturn at times behaves and interacts with the Sun in much the same way as Earth."&nbsp;The phenomenon of the reconnection of the magnetic fields of Saturn with sun is almost the same as earth.</span><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">
The analysis was completed using a particle spectrometer built at UCL and a magnetometer built at Imperial College, both of which are onboard NASA’s Cassini spacecraft.</span></span></p><span data-dcnode-id="1496" instrument_node="">
