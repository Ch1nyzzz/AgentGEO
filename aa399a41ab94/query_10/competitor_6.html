</span><meta content="Milky Way, Solar System, Earth Axis, Celestial Equator, Ecliptic, Diagram, AutoCAD" data-dcnode-id="280" name="keywords"><span data-dcnode-id="279" instrument_node="">

</span><p data-dcnode-id="274"><img data-dcnode-id="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringanddesign.com/1/e%2520and%2520d%2520banner%25203.GIF&amp;raw"></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="272" instrument_node="">
</span><br data-dcnode-id="271"><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">
Milky Way and Solar System Orientation Diagram
</span><br data-dcnode-id="268"><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">
</span><br data-dcnode-id="265"><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">
These diagrams illustrate the orientation of the Milky Way and the Solar System.
</span><br data-dcnode-id="262"><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">



Disclaimer: These diagrams illustrate concepts but they are not accurate in many ways. See notes near bottom of page. The more you learn, the more interesting it becomes. 

</span><br data-dcnode-id="259"><br data-dcnode-id="258"><span data-dcnode-id="257" instrument_node="">
</span><br data-dcnode-id="256"><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">


I was unable to find an AutoCAD drawing of this, then I found it hard to find a geometric definition of both concepts (model of the Milky Way and model of the Solar System) in the same geometric model.
</span><br data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">On 11/24/2011 I found the "Orientation of Astronomical Coordinates" diagram on Wikipedia page 
</span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Celestial_coordinate_system" target="_blank"><span data-dcnode-id="251" instrument_node="">http://en.wikipedia.org/wiki/Celestial_coordinate_system</span></a><span data-dcnode-id="249" instrument_node="">
</span><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">The work below attempts to show the orbit of earth within that diagram.
</span><br data-dcnode-id="246"><span data-dcnode-id="245" instrument_node="">Further, I wanted to illustrate the orientation of the earth and the Milky Way at every month of the year.

</span><br data-dcnode-id="244"><br data-dcnode-id="243"><span data-dcnode-id="242" instrument_node="">
A pdf file of the image below (recommended):
</span><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringanddesign.com/1/073_celestial_ecliptic_galactic_angles_01.pdf"><span data-dcnode-id="241" instrument_node="">073_celestial_ecliptic_galactic_angles_01.pdf</span></a><span data-dcnode-id="239" instrument_node="">
</span></p><p data-dcnode-id="236"><img data-dcnode-id="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringanddesign.com/1/074_celestial_ecliptic_galactic_angles_01.gif&amp;raw"></p><span data-dcnode-id="235" instrument_node="">
</span><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">What are we looking at here?
</span><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">
</span><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">Numbers or lettering that read backwards are nearer to your point of view.
</span><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">Numbers or lettering that read normal are farther from your point of view.
</span><br data-dcnode-id="226"><span data-dcnode-id="225" instrument_node="">
</span><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">We are looking at 3 systems and their north poles.
</span><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">
</span><br data-dcnode-id="220"><span data-dcnode-id="219" instrument_node="">System 1 is the path of the earth and its position at 12 points during the year. 
</span><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">What is shown here is almost identical to what is known as the ecliptic, except the ecliptic is labeled by the apparent position of the sun and here I have labeled the position of the earth. The direction perpendicular to this system is ecliptic north.
</span><br data-dcnode-id="216"><span data-dcnode-id="215" instrument_node="">
</span><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">System 2 is the celestial equator, the equator of the apparent sphere of stars that surrounds us, that appears to rotate about the earth's axis. The direction perpendicular to the celestial equator is celestial north.
</span><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">
</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">System 3 is the galactic equator, the apparent equator of the Milky Way, although it is only apparent. The true central plane of the Milky Way is a bit south of our solar system and the true center of the Milky Way is hugely distant away, in the direction indicated by 0. The direction perpendicular to the galactic equator is galactic north.
</span><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">
</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">The angle between ecliptic north and celestial north is 23.4392°
</span><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">The angle between celestial north and galactic north is 62.8717°
</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">The angle between galactic north and ecliptic north is 60.1923°
</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">These are also the angles between the respective equators or planes of the systems.

</span><br data-dcnode-id="198"><br data-dcnode-id="197"><span data-dcnode-id="196" instrument_node="">

Above: </span><a data-dcnode-id="49" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engineeringanddesign.com/1/067_Milky_Way_Solar_System_Earth_orientations_to_DEC.pdf"><span data-dcnode-id="50" instrument_node="">067_Milky_Way_Solar_System_Earth_orientations_to_DEC.pdf</span></a><span data-dcnode-id="48" instrument_node="">

</span><br data-dcnode-id="41"><span data-dcnode-id="40" instrument_node="">Notes:

</span><br data-dcnode-id="39"><br data-dcnode-id="38"><span data-dcnode-id="37" instrument_node="">1. It is difficult to make a completely true diagram or true statement about the position or shape or distance of anything in astronomy. (There are so many interesting forces and phenomena that complicate it all.) The diagrams and these statements are approximations.

</span><br data-dcnode-id="36"><br data-dcnode-id="35"><span data-dcnode-id="34" instrument_node="">2. The Milky Way is shown in the correct orientation relative to the ecliptic of the solar system (the plane of earth's orbit around the sun), but the center of the Milky Way is not at the center of the solar system and the plane of the Milky Way does not go through the center of the solar system.

</span><br data-dcnode-id="33"><br data-dcnode-id="32"><span data-dcnode-id="31" instrument_node="">3. The diameter of the Milky Way is about 100,000 light years. The radius of the Milky Way is about 50,000 light years. The earth and solar system are about 27,000 light years from the center of the Milky Way. Looking away from the center of the Milky Way we still see about 23,000 light years to an outer edge of the Milky Way.

</span><br data-dcnode-id="30"><br data-dcnode-id="29"><span data-dcnode-id="28" instrument_node="">4. The thickness of the Milky Way is about 1,000 light years. The plane of the Milky Way goes through the middle of this thickness. Earth and the solar system are relatively near the plane of the Milky Way. Wikipedia 11/29/11 says we are 16 to 98 light years north of the plane of the Milky Way (why not more exact?). 

</span><br data-dcnode-id="27"><br data-dcnode-id="26"><span data-dcnode-id="25" instrument_node="">5. There is so much Milky Way in all directions from the earth, and it is of such a much larger scale than the Earth or the solar system, that for an observer on Earth it appears we may be near the center of it (but not true) and it appears we are on the plane of it (but not true).
