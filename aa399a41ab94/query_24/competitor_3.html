</span><p data-dcnode-id="2137"><span data-dcnode-id="2142" instrument_node="">Earth travels around the sun in an orbit that is slightly oval-shaped, known as an ellipse. Therefore, the planet's distance from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/58-the-sun-formation-facts-and-characteristics.html"><u data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">sun</span></u></a><span data-dcnode-id="2138" instrument_node=""> changes throughout the year.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2136" id="ad-unit-1"></div><p data-dcnode-id="2130"><span data-dcnode-id="2135" instrument_node="">However, the average distance from </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/54-earth-history-composition-and-atmosphere.html"><u data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Earth</span></u></a><span data-dcnode-id="2131" instrument_node=""> to the sun is about 93 million miles (150 million kilometers). Scientists also call this distance one astronomical unit (AU).</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2129" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="9359490633994056000" data-widget-type="seasonal"></aside><p data-dcnode-id="2123"><span data-dcnode-id="2128" instrument_node="">The universe is a big place, and sometimes researchers use the astronomical units to communicate how far celestial objects are separated from one another. For example, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/7-jupiter-largest-planet-solar-system.html"><u data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Jupiter</span></u></a><span data-dcnode-id="2124" instrument_node=""> orbits about 5 AU from the sun.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2078" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2079" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2080"><div data-dcnode-id="2081"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2082" id="trc_wrapper_12505" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2106" id="trc_header_12505"><div class="trc_header_ext" data-dcnode-id="2108"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2116"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2109"><a cl s="jw-break jw-reset" data-dcnode-id="2052"></span><span data-dcnode-id="2051" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h3 class="article-body__section" data-dcnode-id="2041" id="section-earth-s-distance-from-the-sun-changes"><span data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Earth's distance from the sun changes</span></span></h3><p data-dcnode-id="2035"><span data-dcnode-id="2040" instrument_node="">In early January, Earth reaches its closest position to the star. Astronomers call this point perihelion, and at this time Earth is about 91.4 million miles (147.1 million km) away from the sun, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2037" data-url="https://spaceplace.nasa.gov/seasons/en/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/seasons/en/" target="_blank"><u data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2036" instrument_node="">.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2034" id="ad-unit-2"></div><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Keep in mind that Earth's distance from the sun does not determine the seasons we experience; the seasons are determined by the tilt of the planet's axis. This is why the season occurring in Earth's Southern Hemisphere is always in opposition to the season in the Northern Hemisphere.</span></p><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Half a year after perihelion, Earth reaches its farthest distance from the star, which is called aphelion. At that moment, the planet is approximately 94.5 million miles (152.1 million km) from the sun. Aphelion occurs in early July.&nbsp;</span></p><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Perihelion and aphelion average out to about 93 million miles (150 million km).&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="2025" id="section-a-new-more-precise-astronomical-unit"><span data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">A new, more precise astronomical unit</span></span></h3><p data-dcnode-id="2015"><span data-dcnode-id="2024" instrument_node="">The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/29696-international-astronomical-union.html"><u data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">International Astronomical Union</span></u></a><span data-dcnode-id="2020" instrument_node=""> (IAU) is an international nonprofit organization that is tasked with, among many other things, defining astronomical constants. In </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17733-earth-sun-distance-astronomical-unit.html"><u data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">August 2012</span></u></a><span data-dcnode-id="2016" instrument_node="">, IAU members voted to approve a more exact measurement of 1 AU.</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2014" instrument_node="">An astronomical unit is now more precisely </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2011" data-url="https://www.iau.org/public/themes/measuring/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iau.org/public/themes/measuring/" target="_blank"><u data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">defined</span></u></a><span data-dcnode-id="2010" instrument_node=""> as "a conventional unit of length equal to 149,597,870,700 meters exactly." That translates to roughly 92,955,807 miles (149,597,871 km). &nbsp;</span></p><div class="jwplayer__widthsetter" data-dcnode-id="1990"><div class="jwplayer__wrapper" data-dcnode-id="1991"><div class="future__jwplayer" data-dcnode-id="1992" id="futr_botr_6MEsH3TN_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2005" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/6MEsH3TN/watch-inner-solar-system-planets-orbit-sun-for-entire-year-2019-animation%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2007" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="1993" id="botr_6MEsH3TN_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1994"><div class="jw-icon jw-reset" data-dcnode-id="2000"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2001" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2002"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1995"><div class="jw-error-text jw-reset-text" data-dcnode-id="1996" data-nosnippet="" dir="auto"><span data-dcnode-id="1999" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="1998"></span><span data-dcnode-id="1997" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="1984"><span data-dcnode-id="1989" instrument_node="">Why was this decision necessary? The equation that had previously determined the value of an AU depended on information including the mass of the sun. But that value changes because the star is constantly transforming its mass into energy, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="2799880396104210400" data-dcnode-id="1986" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="skimlinks" data-label="2012 reporting by Nature" data-merchant-id="undefined" data-merchant-name="SkimLinks - nature.com" data-merchant-network="undefined" data-merchant-url="undefined" data-placeholder-url="https://go.redirectingat.com/?id=92X1588396&amp;xcust=hawk-custom-tracking&amp;xs=1&amp;url=https%3A%2F%2Fwww.nature.com%2Farticles%2Fnature.2012.11416&amp;sref=https%3A%2F%2Fwww.space.com%2F17081-how-far-is-earth-from-the-sun.html" data-url="https://www.nature.com/articles/nature.2012.11416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.redirectingat.com/%3Fid%3D92X1588396%26xcust%3Dspace_us_2799880396104210400%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.nature.com%252Farticles%252Fnature.2012.11416%26sref%3Dhttps%253A%252F%252Fwww.space.com%252F17081-how-far-is-earth-from-the-sun.html" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><u data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">2012 reporting by Nature</span></u></a><span data-dcnode-id="1985" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Einstein's theory of general relativity also throws a wrench in the evaluation of an AU because it argues that space-time is relative depending on the observer's location in the solar system. This complication made it difficult for planetary scientists working on models of the solar system.</span></p><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">The IAU's recently-adopted value is measured using the speed of light in the vacuum of space, which is constant.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="1977" id="section-the-original-calculation"><span data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">The original calculation</span></span></h3><p data-dcnode-id="1967"><span data-dcnode-id="1976" instrument_node="">The first-known person to measure the distance to the sun was the Greek astronomer </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1973" data-url="https://books.google.com/books?id=_6qF4vjZvhYC&amp;pg=PA51#v=onepage&amp;q&amp;f=false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D_6qF4vjZvhYC%26pg%3DPA51%23v%3Donepage%26q%26f%3Dfalse" target="_blank"><u data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Aristarchus of Samos</span></u></a><span data-dcnode-id="1972" instrument_node="">, who lived from about 310 B.C. to 230 B.C. He used the phases of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/55-earths-moon-formation-composition-and-orbit.html"><u data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">moon</span></u></a><span data-dcnode-id="1968" instrument_node=""> to measure the sizes and distances of the sun and moon.&nbsp;</span></p><p data-dcnode-id="1961"><span data-dcnode-id="1966" instrument_node="">He postulated that when the half moon appears in Earth's sky, the center of our planet and the center of the moon create a line in space that forms a 90 degree angle with another line that could be drawn through space from the moon's center all the way to the sun's center. Using trigonometry, Aristarchus could determine the hypotenuse of a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1963" data-url="https://youtu.be/urgYWNCN-RA?t=137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/urgYWNCN-RA%3Ft%3D137" target="_blank"><u data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">triangle based on those two imaginary lines</span></u></a><span data-dcnode-id="1962" instrument_node="">. The value of the hypotenuse would provide the distance between the sun and the Earth.&nbsp;</span></p><p data-dcnode-id="1955"><span data-dcnode-id="1960" instrument_node="">Although imprecise, Aristarchus provided a simple understanding of the sizes and distances of the three bodies, which led him to conclude that the Earth goes around the sun, about 1,700 years before </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15684-nicolaus-copernicus.html"><u data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Nicolaus Copernicus</span></u></a><span data-dcnode-id="1956" instrument_node=""> proposed his heliocentric model of the solar system.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="1936"><div class="jwplayer__wrapper" data-dcnode-id="1937"><div class="future__jwplayer" data-dcnode-id="1938" id="futr_botr_9GffYzLX_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="1951" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/9GffYzLX/earth-facing-sunspot-blasts-powerful-x-flare-see-spacecrafts-view%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="1953" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="1939" id="botr_9GffYzLX_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1940"><div class="jw-icon jw-reset" data-dcnode-id="1946"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="1947" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="1948"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1941"><div class="jw-error-text jw-reset-text" data-dcnode-id="1942" data-nosnippet="" dir="auto"><span data-dcnode-id="1945" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="1944"></span><span data-dcnode-id="1943" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="1925"><span data-dcnode-id="1935" instrument_node="">In 1653, astronomer </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16070-christiaan-huygens.html"><u data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Christiaan Huygens</span></u></a><span data-dcnode-id="1931" instrument_node=""> calculated the distance from Earth to the sun. Much like Aristarchus, </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1151544405371734700" data-dcnode-id="1927" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="skimlinks" data-label="he used the phases of Venus" data-merchant-id="undefined" data-merchant-name="SkimLinks - nature.com" data-merchant-network="undefined" data-merchant-url="undefined" data-placeholder-url="https://go.redirectingat.com/?id=92X1588396&amp;xcust=hawk-custom-tracking&amp;xs=1&amp;url=https%3A%2F%2Fwww.nature.com%2Farticles%2Fs41567-019-0685-3&amp;sref=https%3A%2F%2Fwww.space.com%2F17081-how-far-is-earth-from-the-sun.html" data-url="https://www.nature.com/articles/s41567-019-0685-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.redirectingat.com/%3Fid%3D92X1588396%26xcust%3Dspace_us_1151544405371734700%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.nature.com%252Farticles%252Fs41567-019-0685-3%26sref%3Dhttps%253A%252F%252Fwww.space.com%252F17081-how-far-is-earth-from-the-sun.html" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1930" instrument_node="">h</span><u data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">e used the phases of Venus</span></u></a><span data-dcnode-id="1926" instrument_node=""> to find the angles in a Venus-Earth-sun triangle. His more precise measurements for what exactly constitutes an AU were possible thanks to the existence of the telescope.&nbsp;</span></p><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Guessing (correctly, by chance) the size of Venus, Huygens was able to determine the distance from Venus to Earth. Knowing that distance, plus the angles made by the triangle, he was able to measure the distance from Earth to the sun. However, because Huygens' method was partly guesswork and not completely scientifically grounded, he usually doesn't get the credit.</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1922" instrument_node="">In 1672, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18902-giovanni-cassini.html"><u data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Giovanni Cassini</span></u></a><span data-dcnode-id="1918" instrument_node=""> used a method involving parallax, or angular difference, to find the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16875-how-far-away-is-mars.html"><u data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">distance to Mars</span></u></a><span data-dcnode-id="1914" instrument_node=""> and at the same time figured out the distance to the sun. He sent a colleague, Jean Richer, to Cayenne, French Guiana (located just northwest of the modern-day </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/33949-guiana-space-center.html"><u data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Guiana Space Center</span></u></a><span data-dcnode-id="1910" instrument_node=""> near Kourou) while he stayed in Paris. At the same time, they both took measurements of the position of Mars relative to background stars, and triangulated those measurements with the known distance between Paris and French Guiana. Once they had the distance to Mars, they could also calculate the distance from Earth to the sun. Since his methods were more scientific, Cassini usually gets the credit.</span></p><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">These techniques are also why astronomers continue to use the distance from Earth to the sun as a scale for interpreting the solar system.</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1906" instrument_node="">"Expressing distances in the astronomical unit allowed astronomers to overcome the difficulty of measuring distances in some physical unit," astronomer Nicole Capitaine of Paris University </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17733-earth-sun-distance-astronomical-unit.html"><u data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">told Space.com</span></u></a><span data-dcnode-id="1902" instrument_node="">. "Such a practice was useful for many years, because astronomers were not able to make distance measurements in the solar system as precisely as they could measure angles."</span></p><h3 class="article-body__section" data-dcnode-id="1898" id="section-across-the-solar-system"><span data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Across the solar system</span></span></h3><div class="bordeaux-slot" data-dcnode-id="1897" data-feat-ref="bordeaux-feat-id-64" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1896" data-feat-ref="bordeaux-feat-id-65" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="1881"><div class="image-full-width-wrapper" data-dcnode-id="1887"><div class="image-widthsetter" data-dcnode-id="1888"><p class="vanilla-image-block" data-dcnode-id="1889" style="padding-top:56.25%;"><picture data-dcnode-id="1890"><source alt="Artists rendering of the Kuiper Belt and Oort Cloud." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1895" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Artists rendering of the Kuiper Belt and Oort Cloud." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1894" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1891"><img alt="Artists rendering of the Kuiper Belt and Oort Cloud." class="pull- expandable lazy-image-van optional-image loaded" data-dcnode-id="1893" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/QVDzBNcFi6KrCvHSrLmgUk-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1892"></div></figure><p></p></div></div><figcaption class="pull-" data-dcnode-id="1882" itemprop="caption description"><span class="caption-text" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Artists rendering of the Kuiper Belt and Oort Cloud. </span></span><span class="credit" data-dcnode-id="1883" itemprop="copyrightHolder"><span data-dcnode-id="1884" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">The sun is at the heart of the solar system. All of the bodies in the solar system — planets, asteroids, comets, etc. — revolve around it at various distances.&nbsp;</span></p><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Mercury, the planet closest to the sun, gets as close as 29 million miles (47 million km) in its elliptical orbit, while objects in the Oort Cloud, the solar system's icy shell, are thought to lie as far as 9.3 trillion miles (15 trillion km).</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1876" instrument_node="">Everything else falls in between. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1874" data-url="https://www.space.com/7-jupiter-largest-planet-solar-system.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/7-jupiter-largest-planet-solar-system.html"><span data-dcnode-id="1875" instrument_node="">Jupiter</span></a><span data-dcnode-id="1873" instrument_node="">, for example, is 5.2 AU from the sun. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1871" data-url="https://www.space.com/41-neptune-the-other-blue-planet-in-our-solar-system.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/41-neptune-the-other-blue-planet-in-our-solar-system.html"><span data-dcnode-id="1872" instrument_node="">Neptune</span></a><span data-dcnode-id="1870" instrument_node=""> is 30.07 AU from the sun.&nbsp;</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1868" instrument_node="">The distance to the nearest star, Proxima Centauri, is about 268,770 AU, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1866" data-url="https://imagine.gsfc.nasa.gov/features/cosmic/nearest_star_info.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.gsfc.nasa.gov/features/cosmic/nearest_star_info.html" target="_blank"><span data-dcnode-id="1867" instrument_node="">according to NASA</span></a><span data-dcnode-id="1865" instrument_node="">. However, to measure longer distances, astronomers use light-years, or </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1863" data-url="https://www.space.com/15830-light-speed.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15830-light-speed.html"><span data-dcnode-id="1864" instrument_node="">the distance that light travels</span></a><span data-dcnode-id="1862" instrument_node=""> in a single Earth-year, which is equal to 63,239 AU. So Proxima Centauri is about 4.25 light-years away.</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">
&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="1856" id="section-additional-resources-and-reading"><span data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Additional resources and reading</span></span></h3><p data-dcnode-id="1843"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1854" data-url="https://www.youtube.com/watch?v=urgYWNCN-RA&amp;t=137s" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DurgYWNCN-RA%26t%3D137s" target="_blank"><span data-dcnode-id="1855" instrument_node="">Watch a video</span></a><span data-dcnode-id="1853" instrument_node=""> explaining Aristarchus' approach to calculating the distance from Earth to the sun. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1851" data-url="https://nssdc.gsfc.nasa.gov/planetary/factsheet/sunfact.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nssdc.gsfc.nasa.gov/planetary/factsheet/sunfact.html" target="_blank"><span data-dcnode-id="1852" instrument_node="">NASA's sun fact sheet</span></a><span data-dcnode-id="1850" instrument_node=""> provides basic statistics about our star and its</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1848" data-url="https://solarsystem.nasa.gov/planets/sun" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/planets/sun" target="_blank"><span data-dcnode-id="1849" instrument_node=""> solar system exploration page</span></a><span data-dcnode-id="1847" instrument_node=""> offers details about solar science and missions studying the sun. You can also explore cosmic distances, within the solar system and beyond, with </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1845" data-url="https://solarsystem.nasa.gov/news/1230/cosmic-distances/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/news/1230/cosmic-distances/" target="_blank"><span data-dcnode-id="1846" instrument_node="">NASA</span></a><span data-dcnode-id="1844" instrument_node="">.</span></p><h2 data-dcnode-id="1841" id="bibliography"><span data-dcnode-id="1842" instrument_node="">Bibliography</span></h2><ul data-dcnode-id="1819"><li data-dcnode-id="1837"><span data-dcnode-id="1840" instrument_node="">Brumfiel, G. "The astronomical unit gets fixed." Nature (2012). </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="9252506264730980000" data-dcnode-id="1838" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="skimlinks" data-label="https://www.nature.com/articles/nature.2012.11416" data-merchant-id="undefined" data-merchant-name="SkimLinks - nature.com" data-merchant-network="undefined" data-merchant-url="undefined" data-placeholder-url="https://go.redirectingat.com/?id=92X1588396&amp;xcust=hawk-custom-tracking&amp;xs=1&amp;url=https%3A%2F%2Fwww.nature.com%2Farticles%2Fnature.2012.11416&amp;sref=https%3A%2F%2Fwww.space.com%2F17081-how-far-is-earth-from-the-sun.html" data-url="https://www.nature.com/articles/nature.2012.11416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.redirectingat.com/%3Fid%3D92X1588396%26xcust%3Dspace_us_9252506264730980000%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.nature.com%252Farticles%252Fnature.2012.11416%26sref%3Dhttps%253A%252F%252Fwww.space.com%252F17081-how-far-is-earth-from-the-sun.html" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1839" instrument_node="">https://www.nature.com/articles/nature.2012.11416</span></a></li><li data-dcnode-id="1833"><span data-dcnode-id="1836" instrument_node="">International Astronomical Union, "Measuring the Universe," accessed Jan. 21, 2022. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1834" data-url="https://
