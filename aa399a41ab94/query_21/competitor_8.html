</span><h1 data-dcnode-id="497" id="overview"><span data-dcnode-id="498" instrument_node="">
    SEGUE: Mapping the Outer Milky Way  </span></h1><span data-dcnode-id="496" instrument_node="">
</span><div class="subtitle" data-dcnode-id="494" id="overview"><span data-dcnode-id="495" instrument_node="">Sloan Extension for Galactic Understanding and Exploration (SEGUE)</span></div><span data-dcnode-id="493" instrument_node="">
</span><div data-context="main" data-dcnode-id="482" data-extendpage="false" data-scrollto="75" data-selectors="h2,h3" data-showandhide="false" data-showandhideonscroll="false" id="toc-wrapper"><span data-dcnode-id="492" instrument_node="">
</span><div class="tocify-title" data-dcnode-id="489"><a aria-controls="toc-body" aria-expanded="true" class="accordion-toggle" data-dcnode-id="490" data-toggle="collapse" href="#toc-body"><span data-dcnode-id="491" instrument_node="">Table&nbsp;of&nbsp;Contents</span></a></div><span data-dcnode-id="488" instrument_node="">
</span><div class="collapse in" data-dcnode-id="484" id="toc-body"><span data-dcnode-id="487" instrument_node="">
</span><div class="tocify-hide" data-context="main" data-dcnode-id="486" data-extendpage="false" data-scrollto="75" data-selectors="h2,h3" data-showandhide="false" data-showandhideonscroll="false" id="toc"></div><span data-dcnode-id="485" instrument_node="">
</span></div><span data-dcnode-id="483" instrument_node="">
</span></div><span data-dcnode-id="481" instrument_node="">
</span><div class="sdss-wrapper sdss-fig-right col-md-6 col-xs-12" data-dcnode-id="470"><span data-dcnode-id="480" instrument_node="">
</span><div class="panel panel-default sdss-figure" data-dcnode-id="472"><span data-dcnode-id="479" instrument_node="">
</span><div class="panel-body" data-dcnode-id="477"><img alt="Milky Way science: using SEGUE data with SSPP parameter estimates to determine the radial metallicity gradient of the Galactic disk (Cheng et al. 2012)" class="img-responsive" data-dcnode-id="478" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sdss.org/wp-content/uploads/2014/06/20120109.wander.png&amp;raw"></div><span data-dcnode-id="476" instrument_node="">
</span><div class="panel-body caption" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Milky Way science: using SEGUE data with SSPP parameter estimates to determine the radial metallicity gradient of the Galactic disk (Cheng et al. 2012)</span></div><span data-dcnode-id="473" instrument_node="">
</span></div><span data-dcnode-id="471" instrument_node="">
</span></div><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">The original Sloan Extension for Galactic Understanding and Exploration (SEGUE-1) obtained spectra of nearly 230,000 unique stars over a range of spectral types to investigate Milky Way structure. Building on this success, SEGUE-2 spectroscopically observed around 119,000 unique stars, focusing on the in situ stellar halo of the Galaxy, from distances of 10 to 60 kpc.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="465" instrument_node="">The complete spectral sample from SEGUE-1 and SEGUE-2 was available for SDSS-III DR8. Data Release 9 presented an updated version of the </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sdss3.org/dr10/spectro/sspp.php" rel="noopener" target="_blank"><span data-dcnode-id="464" instrument_node="">SEGUE Stellar Parameter Pipeline</span></a><span data-dcnode-id="462" instrument_node="">. It also included new </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sdss3.org/dr10/data_access/vac.php" rel="noopener" target="_blank"><span data-dcnode-id="461" instrument_node="">Value-Added Catalogs</span></a><span data-dcnode-id="459" instrument_node="">. There have been no updates to SEGUE data or processing for subsequent data releases, but as SDSS data releases are cumulative, the DR9 SEGUE data is included in DR17.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="456" instrument_node="">Combining SEGUE-1 and 2 reveals the complex kinematic and chemical substructure of the Galactic halo and disks, providing essential clues to the assembly and enrichment history of the Galaxy. In particular, the outer halo is expected to be dominated by late-time accretion events. SEGUE can help constrain existing models for the formation of the stellar halo and inform the next generation of high resolution simulations of Galaxy formation. In addition, SEGUE-1 and SEGUE-2 help uncover rare, chemically primitive stars that are fossils of the earliest generations of cosmic star formation. </span></p><span data-dcnode-id="453" instrument_node="">
</span><div class="clearfix" data-dcnode-id="452"></div><span data-dcnode-id="451" instrument_node="">
</span><div class="sdss-group-wrapper col-md-12 col-xs-12" data-dcnode-id="391"><span data-dcnode-id="450" instrument_node="">
</span><div class="panel panel-default sdss-group" data-dcnode-id="393"><span data-dcnode-id="449" instrument_node="">
</span><div class="panel-body" data-dcnode-id="395"><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Much of what we know about the stellar halo comes from kinematically-selected stars in the solar neighborhood. In any cosmological scenario we expect the stellar halo to form inside out, with the outer halo increasingly dominated by recent accretion. SEGUE-2 capitalizes on the wide field and high throughput of SDSS instruments to focus on the more distant halo with the goal of understanding the growth of our stellar halo over time. Specific questions we hope can be addressed with the SEGUE-2 data include the fraction of the halo formed by the accretion of dwarf galaxies vs. in situ star formation, the accretion history of the halo through time, and whether the chemical abundance distribution of the more recently accreted, dynamically younger halo resembles the surviving dwarf galaxies, such that the differences between these dwarf galaxies and the halo observed in the solar neighborhood result from different accretion times. In addition, finding more halo stars is the most likely way to increase the number of tracers in the Galactic gravitational potential at large distances in order to better determine the total mass of the Galaxy.</span></p><span data-dcnode-id="445" instrument_node="">
</span><div class="sdss-wrapper sdss-story-right col-md-5 col-xs-12" data-dcnode-id="406"><span data-dcnode-id="444" instrument_node="">
</span><div class="panel panel-default sdss-story" data-dcnode-id="408"><span data-dcnode-id="443" instrument_node="">
</span><div class="panel-body" data-dcnode-id="410"><span data-dcnode-id="442" instrument_node="">
</span><dl class="dl-horizontal" data-dcnode-id="414"><span data-dcnode-id="441" instrument_node="">
</span><dt data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Date range</span></dt><span data-dcnode-id="438" instrument_node="">
</span><dd data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Fall 2008 - Spring 2009</span></dd><span data-dcnode-id="435" instrument_node="">
</span><dt data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Survey area</span></dt><span data-dcnode-id="432" instrument_node="">
</span><dd data-dcnode-id="428"><span data-dcnode-id="431" instrument_node="">1317 deg</span><sup data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">2</span></sup></dd><span data-dcnode-id="427" instrument_node="">
</span><dt data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Number of stars</span></dt><span data-dcnode-id="424" instrument_node="">
</span><dd data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">118,151</span></dd><span data-dcnode-id="421" instrument_node="">
</span><dt data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Magnitude limit</span></dt><span data-dcnode-id="418" instrument_node="">
</span><dd data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">g &lt; 19</span></dd><span data-dcnode-id="415" instrument_node="">
</span></dl><span data-dcnode-id="413" instrument_node="">
</span><div class="clearfix" data-dcnode-id="412"></div><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
</span></div><span data-dcnode-id="407" instrument_node="">
</span></div><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">To probe the extremes of the halo stellar population distribution, SEGUE-2 specifically targets blue horizontal branch stars, K-giants, and M-giants. Many important and rare halo tracers are impossible to survey in situ. Thus, those three stellar categories are complemented by a collection of main sequence turn off stars that cover a broad enough color range to include metallicities up to solar and is neither biased in metallicity or kinematics.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Additional local samples are used by SEGUE-2 to supplement the distant halo survey. Old, cool white dwarfs can be assigned ages from models in order to date Galactic field populations, as had been done with ultra-cool white dwarfs found in SDSS and SEGUE-1. Extreme and ultra-cool subdwarfs explore the low-mass end of the halo mass function and are sufficiently local to have good 3D kinematics. The cool subdwarfs and the extremely metal-poor star sample in particular will also be useful for studies of chemical evolution, nucleosynthesis, and stellar atmospheres. Finally, SEGUE-2 investigates halo high velocity stars and hypervelocity stars.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">In selecting distant and rare objects, SEGUE-2 benefits from the experience of SEGUE-1 in developing optimized and efficient selection techniques. The SEGUE-2 selection methodology uses the most up to date color and proper motion cuts with SDSS DR7 photometry and astrometry to target particular spectral types. Additionally, the magnitude limits for SEGUE-2 use SEGUE-1 as a test case to achieve the optimal balance between survey depth, sky coverage, and data quality. Whereas SEGUE-1 matched shorter exposures of bright targets with long exposures of faint targets, SEGUE-2 obtains only deep pointings, as it focuses on the far reaches of our Galaxy.</span></p><span data-dcnode-id="396" instrument_node="">
</span></div><span data-dcnode-id="394" instrument_node="">
</span></div><span data-dcnode-id="392" instrument_node="">
</span></div><span data-dcnode-id="390" instrument_node="">
</span><div class="clearfix" data-dcnode-id="389"></div><span data-dcnode-id="388" instrument_node="">
</span><div class="totop-wrapper" data-dcnode-id="381"><span class="well well-sm" data-dcnode-id="382"><a data-dcnode-id="386" href="#"><span class="glyphicon glyphicon-circle-arrow-up" data-dcnode-id="387"></span></a><span data-dcnode-id="383"><a data-dcnode-id="384" href="#"><span data-dcnode-id="385" instrument_node="">Back to Top</span></a></span></span></div><span data-dcnode-id="380" instrument_node="">
</span><div class="clearfix" data-dcnode-id="379"></div><span data-dcnode-id="378" instrument_node="">
</span><div class="sdss-group-wrapper col-md-12 col-xs-12" data-dcnode-id="295"><span data-dcnode-id="377" instrument_node="">
</span><div class="panel panel-default sdss-group" data-dcnode-id="297"><span data-dcnode-id="376" instrument_node="">
</span><div class="panel-body" data-dcnode-id="299"><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="374" instrument_node="">For a thorough overview of SEGUE-1, see </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//adsabs.harvard.edu/abs/2009AJ....137.4377Y" rel="noopener" target="_blank"><span data-dcnode-id="373" instrument_node="">Yanny et al. 2009</span></a><span data-dcnode-id="371" instrument_node="">.</span></p><span data-dcnode-id="369" instrument_node="">
</span><div class="sdss-wrapper sdss-story-right col-md-5 col-xs-12" data-dcnode-id="328"><span data-dcnode-id="368" instrument_node="">
</span><div class="panel panel-default sdss-story" data-dcnode-id="330"><span data-dcnode-id="367" instrument_node="">
</span><div class="panel-body" data-dcnode-id="332"><span data-dcnode-id="366" instrument_node="">
</span><dl class="dl-horizontal" data-dcnode-id="334"><span data-dcnode-id="365" instrument_node="">
</span><dt data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Date range</span></dt><span data-dcnode-id="362" instrument_node="">
</span><dd data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Winter 2004 - Winter 2008</span></dd><span data-dcnode-id="359" instrument_node="">
</span><dt data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Survey area</span></dt><span data-dcnode-id="356" instrument_node="">
</span><dd data-dcnode-id="348"><span data-dcnode-id="355" instrument_node="">1438 deg</span><sup data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2</span></sup><span data-dcnode-id="352" instrument_node=""> (3500 deg</span><sup data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">2</span></sup><span data-dcnode-id="349" instrument_node=""> in Imaging)</span></dd><span data-dcnode-id="347" instrument_node="">
</span><dt data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Number of stars</span></dt><span data-dcnode-id="344" instrument_node="">
</span><dd data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">240,000</span></dd><span data-dcnode-id="341" instrument_node="">
</span><dt data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Magnitude limit</span></dt><span data-dcnode-id="338" instrument_node="">
</span><dd data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">g &lt; 19</span></dd><span data-dcnode-id="335" instrument_node="">
</span></dl><span data-dcnode-id="333" instrument_node="">
</span></div><span data-dcnode-id="331" instrument_node="">
</span></div><span data-dcnode-id="329" instrument_node="">
</span></div><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">SEGUE-1 was designed to explore the Milky Way structure; formation history; kinematics; dynamical evolution; chemical evolution; and dark matter distribution. The images and spectra obtained by SEGUE-1 allowed astronomers to map the positions and velocities of hundreds of thousands of stars, from faint, relatively near-by (within about 100 pc or roughly 300 light-years) ancient stellar embers known as white dwarfs to bright stellar giants located in the outer reaches of the stellar halo, more than 100,000 light-years away. Encoded within the spectral data are the composition and temperature of these stars, vital clues for determining the age and origin of different populations of stars within the Galaxy.</span></p><span data-dcnode-id="324" instrument_node="">
</span><div class="sdss-wrapper sdss-fig-left col-md-8 col-xs-12" data-dcnode-id="313"><span data-dcnode-id="323" instrument_node="">
</span><div class="panel panel-default sdss-figure" data-dcnode-id="315"><span data-dcnode-id="322" instrument_node="">
</span><div class="panel-body" data-dcnode-id="320"><img alt="SDSS stellar map of the Northern sky, showing trails and streams of stars torn from disrupted Milky Way satellites. Insets show new dwarf companions discovered by the SDSS (credit: V. Belokurov)." class="img-responsive" data-dcnode-id="321" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sdss.org/wp-content/uploads/2014/06/streams.jpg&amp;raw"></div><span data-dcnode-id="319" instrument_node="">
</span><div class="panel-body caption" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">SDSS stellar map of the Northern sky, showing trails and streams of stars torn from disrupted Milky Way satellites. Insets show new dwarf companions discovered by the SDSS (credit: V. Belokurov).</span></div><span data-dcnode-id="316" instrument_node="">
</span></div><span data-dcnode-id="314" instrument_node="">
</span></div><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">The primary goal of SEGUE-1 is a kinematic and stellar population study of the high-latitude thick disk and halo of the Milky Way. The halo is sampled sparsely with a series of seven deg</span><sup data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">2</span></sup><span data-dcnode-id="308" instrument_node=""> tiles both in the SEGUE-1 imaging stripes and the main Legacy survey area, with centers separated by roughly 10 deg. Each such tile is sampled with two pointings, split at r=17.8, approximately the median target magnitude.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Half of the targets on each line of sight are devoted to sampling across various main sequence types, up to and including the main sequence turnoff. These are largely selected for spectroscopic follow up based on straightforward color-color and color-magnitude cuts. To this sample we add metal-poor main sequence turnoff stars selected by their blue ugr colors. These targets tend to be at a heliocentric distance of 10 kpc for [Fe/H] = -1.54. To reach to greater distances, SEGUE-1 samples field blue horizontal branch (BHB) stars, which extends to distances of approximately 40 kpc. Also reaching this distance is the sample of halo red giants.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The spectroscopic selection also includes smaller categories of rare but interesting objects. These include cool white dwarfs, which can be used to date the age of the Galactic disk, and high proper motion targets from the SUPERBLINK catalog, which have uncovered some of the most extreme M subdwarfs known and aided in the calibration of their metallicity scale using common proper motion pairs.</span></p><span data-dcnode-id="300" instrument_node="">
</span></div><span data-dcnode-id="298" instrument_node="">
</span></div><span data-dcnode-id="296" instrument_node="">
</span></div><span data-dcnode-id="294" instrument_node="">
