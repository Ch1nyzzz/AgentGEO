</span><div class="text-copy bodyCopy auto" data-dcnode-id="1860" id="article-body"><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2361" instrument_node="">The Milky Way is a barred spiral galaxy around 13.6 billion years old with large pivoting arms stretching out across the cosmos. Its disk is about 100,000 </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/light-year.html"><span data-dcnode-id="2360" instrument_node="">light-years</span></a><span data-dcnode-id="2358" instrument_node=""> and just 1000 light-years thick, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2356" data-url="https://lco.global/spacebook/galaxies/the-milky-way-galaxy/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lco.global/spacebook/galaxies/the-milky-way-galaxy/" target="_blank"><span data-dcnode-id="2357" instrument_node="">Las Cumbres Observatory</span></a><span data-dcnode-id="2355" instrument_node="">.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2353" id="ad-unit-1"></div><p data-dcnode-id="2345"><span data-dcnode-id="2352" instrument_node="">Just as Earth orbits the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/58-the-sun-formation-facts-and-characteristics.html"><span data-dcnode-id="2351" instrument_node="">sun</span></a><span data-dcnode-id="2349" instrument_node="">, the solar system orbits the center of the Milky Way. Despite hurtling through space at speeds of around 515,000mph (828,000kmph) it still takes our solar system approximately 250 million years to complete a single revolution, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2347" data-url="https://interestingengineering.com/the-last-galactic-year-has-taken-us-from-the-jurassic-period-to-today" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//interestingengineering.com/the-last-galactic-year-has-taken-us-from-the-jurassic-period-to-today" target="_blank"><span data-dcnode-id="2348" instrument_node="">Interesting Engineering</span></a><span data-dcnode-id="2346" instrument_node="">. The last time our planet was in this position, dinosaurs were just emerging and mammals were yet to evolve.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2344" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="9936481470420412000" data-widget-type="seasonal"></aside><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">If the center of the Milky Way were a city, we would be living in suburbia, about 25,000 to 30,000 light-years from the city center. Life in the outskirts is good, we find ourselves nestled in one of the smaller neighborhoods, the Orion-Cygnus Arm, sandwiched between larger Perseus and Carina-Sagittarius arms. If we were to travel inwards towards the city center we would find the Scutum-Centaurus and Norma arms.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2297" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2298" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2299"><div data-dcnode-id="2300"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2301" id="trc_wrapper_2154" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2325" id="trc_header_2154"><div class="trc_header_ext" data-dcnode-id="2327"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2335"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2 "2292" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/how-to-photograph-the-milky-way-beginners-tips-tricks"><span data-dcnode-id="2290" instrument_node="">How to photograph the Milky Way: A guide for beginners and enthusiasts&nbsp;</span></a></p><div class="ad-unit" data-dcnode-id="2287" id="ad-unit-2"></div><div class="jwplayer__widthsetter" data-dcnode-id="2268"><div class="jwplayer__wrapper" data-dcnode-id="2269"><div class="future__jwplayer" data-dcnode-id="2270" id="futr_botr_SFwlk5pa_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2283" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/SFwlk5pa/milky-way-and-rocket-base-in-amazing-night-sky-time-lapses%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2285" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2271" id="botr_SFwlk5pa_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2272"><div class="jw-icon jw-reset" data-dcnode-id="2278"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2279" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2280"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2273"><div class="jw-error-text jw-reset-text" data-dcnode-id="2274" data-nosnippet="" dir="auto"><span data-dcnode-id="2277" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2276"></span><span data-dcnode-id="2275" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node="">Lying at the very heart of the Milky Way is a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/supermassive-black-hole"><span data-dcnode-id="2266" instrument_node="">supermassive black hole</span></a><span data-dcnode-id="2264" instrument_node=""> called Sagittarius A*. About 4 million times the mass of the sun, this beast consumes anything that strays too close, gorging on an ample supply of stellar material enabling it to grow into a giant. Though we cannot directly view this glutton at the core of our galaxy, scientists can suggest its presence by investigating its effect on nearby matter. &nbsp;</span></p><h2 class="article-body__section" data-dcnode-id="2260" id="section-why-is-our-galaxy-called-the-milky-way"><span data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Why is our galaxy called the Milky Way?</span></span></h2><p data-dcnode-id="2255"><span data-dcnode-id="2259" instrument_node="">According to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2257" data-url="https://www.amnh.org/explore/ology/astronomy/the-milky-way-galaxy2#:~:text=The%20Milky%20Way%20gets%20its,the%20%E2%80%9CBackbone%20of%20Night.%E2%80%9D" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnh.org/explore/ology/astronomy/the-milky-way-galaxy2%23%3A~%3Atext%3DThe%2520Milky%2520Way%2520gets%2520its%2Cthe%2520%25E2%2580%259CBackbone%2520of%2520Night.%25E2%2580%259D" target="_blank"><span data-dcnode-id="2258" instrument_node="">American Museum of Natural History</span></a><span data-dcnode-id="2256" instrument_node=""> (AMNH), our galactic home is called the Milky Way after its apparent milky white appearance as it stretches across the night sky. In Greek mythology, this milky band appeared because the goddess Hera sprayed milk across the sky.&nbsp;</span></p><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Around the world, the Milky Way is known by different names for example in China it is called "Silver River" and in the Kalahari Desert in South Africa it's called the "Backbone of Night". &nbsp;</span></p><h2 class="article-body__section" data-dcnode-id="2250" id="section-the-great-debate-of-1920"><span data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">The Great Debate of 1920</span></span></h2><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">We are constantly building on our wealth of knowledge of the Milky Way, though up until relatively recently astronomers believed that all the stars in the sky belonged to our galaxy.&nbsp;</span></p><p data-dcnode-id="2240"><span data-dcnode-id="2247" instrument_node="">"The Great Debate" in 1920 saw astronomers Herber Curtis and Harlow Shapley argue the scale of the universe and the prospect of "island universes" (galaxies), according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2245" data-url="http://www.nasonline.org/about-nas/history/archives/milestones-in-NAS-history/the-great-debate-of-1920.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nasonline.org/about-nas/history/archives/milestones-in-NAS-history/the-great-debate-of-1920.html" target="_blank"><span data-dcnode-id="2246" instrument_node="">National Academy of Sciences</span></a><span data-dcnode-id="2244" instrument_node="">. On one side of the debate, Shapley believed the Milky Way was much larger than previous estimates and that we weren't at the center. He also claimed that "spiral nebulae" such as Andromeda were a part of the Milky Way. On the other side of the debate, Curtis did not dispute Shapley's claims of a far larger Milky Way, he did however argue that there were large island universes (galaxies) such as Andromeda, that lay beyond the boundaries of the Milky Way. The dispute was resolved when Edwin Hubble's measurements of Cepheid variable stars proved Andromeda was located far outside the Milky Way. Modern estimates suggest the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15590-andromeda-galaxy-m31.html"><span data-dcnode-id="2243" instrument_node="">Andromeda galaxy</span></a><span data-dcnode-id="2241" instrument_node="">, our nearest galaxy neighbor is 2.5 million light-years away.</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">We now know that the Milky Way resides within the Local Group of galaxies, made up of over 30 galaxies including Andromeda, Triangulum and Leo I to name but a few. It turns out that it's pretty good to know who your neighbors are, as they may be closer than you think. The Milky Way is currently hurtling towards Andromeda at 250,000mph (400,000 km/h). Though there is no need to worry just yet, this crash of cosmic proportions is not due for another 4 billion years.&nbsp;</span></p><h2 class="article-body__section" data-dcnode-id="2235" id="section-the-milky-way-size-structure-and-mass"><span data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">The Milky Way: Size, structure and mass</span></span></h2><div class="bordeaux-slot" data-dcnode-id="2234" data-feat-ref="bordeaux-feat-id-84" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="2206"><div class="fancy_box-title" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Milky Way Quick Facts</span></div><div class="fancy_box_body" data-dcnode-id="2207"><p data-dcnode-id="2208"><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">–&nbsp; Galaxy type:</span></strong><span data-dcnode-id="2229" instrument_node=""> Barred spiral</span><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">
</span><strong data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">–&nbsp;Age:</span></strong><span data-dcnode-id="2224" instrument_node=""> 13.6 billion years (and counting)</span><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">
</span><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">–&nbsp;Size:</span></strong><span data-dcnode-id="2219" instrument_node=""> 100,000 light-years across</span><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">
</span><strong data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">–&nbsp;Number of stars:</span></strong><span data-dcnode-id="2214" instrument_node=""> about 200 billion</span><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">
</span><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">–&nbsp;Rotation time: </span></strong><span data-dcnode-id="2209" instrument_node="">250 million years</span></p></div></div><p data-dcnode-id="2198"><span data-dcnode-id="2205" instrument_node="">Studying the Milky Way used to be notoriously difficult. Astronomers sometimes compare the effort to attempting to describe the size and structure of a forest while being lost in the middle of it. From our position on </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/54-earth-history-composition-and-atmosphere.html"><span data-dcnode-id="2204" instrument_node="">Earth</span></a><span data-dcnode-id="2202" instrument_node="">, we simply lack an overview. But two ground-breaking space telescopes launched since the 1990s have helped usher in the golden age of Milky Way research. Major strides have been made, especially since the 2013 launch of the European Space Agency's (ESA) </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/41312-gaia-mission.html"><span data-dcnode-id="2201" instrument_node="">Gaia mission</span></a><span data-dcnode-id="2199" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Telescopes enabled astronomers to distinguish the basic shape and structure of some of the closest galaxies before they knew they were looking at galaxies. But reconstructing the shape and structure of our own galactic home was slow and tedious. The process involved building catalogs of stars, charting their positions in the sky and determining how far from Earth they are.&nbsp;</span></p><p data-dcnode-id="2191"><span data-dcnode-id="2195" instrument_node="">Dutch astronomer Jan Oort, sometimes dubbed the master of the galactic system, was the first to realize that the Milky Way isn't motionless but rotates, and he calculated speeds at which stars at various distances orbit around the galactic center. It also was Oort who determined the position of our sun in the vast galaxy. (The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16401-oort-cloud-the-outer-solar-system-s-icy-shell.html"><span data-dcnode-id="2194" instrument_node="">Oort Cloud</span></a><span data-dcnode-id="2192" instrument_node="">, a repository of trillions of comets far from the sun, was named after him.)</span></p><div class="bordeaux-slot" data-dcnode-id="2190" data-feat-ref="bordeaux-feat-id-86" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2189" data-feat-ref="bordeaux-feat-id-91" id="bordeaux-static-slot-12" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2174"><div class="image-full-width-wrapper" data-dcnode-id="2180"><div class="image-widthsetter" data-dcnode-id="2181" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2182" style="padding-top:56.25%;"><picture data-dcnode-id="2183"><source alt="Men silhouetted in front of the night sky" class="expandable lazy-image-van optional-image" data-dcnode-id="2188" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Men silhouetted in front of the night sky" class="expandable lazy-image-van optional-image" data-dcnode-id="2187" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2184"><img alt="Men silhouetted in front of the night sky" class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2186" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2185"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2175" itemprop="caption description"><span class="caption-text" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">The Milky Way's mesmerizing glowing band has had humankind star-struck for eons. </span></span><span class="credit" data-dcnode-id="2176" itemprop="copyrightHolder"><span data-dcnode-id="2177" instrument_node="">(Image credit: Photo by Kendall Hoopes from Pexels)</span></span></figcaption></figure><p data-dcnode-id="2169"><span data-dcnode-id="2173" instrument_node="">Gradually, a complex picture emerged of a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22382-spiral-galaxy.html"><span data-dcnode-id="2172" instrument_node="">spiral galaxy</span></a><span data-dcnode-id="2170" instrument_node=""> that appears quite ordinary.&nbsp;</span></p><p data-dcnode-id="2161"><span data-dcnode-id="2168" instrument_node="">At the center of the Milky Way sits a supermassive black hole called </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/milky-way-supermassive-black-hole-weird-flare.html"><span data-dcnode-id="2167" instrument_node="">Sagittarius A*</span></a><span data-dcnode-id="2165" instrument_node="">. With a mass equal to that of four million suns, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html"><span data-dcnode-id="2164" instrument_node="">black hole</span></a><span data-dcnode-id="2162" instrument_node="">, discovered in 1974, can be observed in the sky with radio telescopes close to the constellation Sagittarius.&nbsp;</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2160" instrument_node="">Everything else in the galaxy revolves around this powerful gateway to nothingness. In its immediate surroundings is a tightly packed region of dust, gas and stars called the galactic bulge. In the case of the Milky Way, this bulge is peanut-shaped, measuring 10,000 light-years across, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2158" data-url="https://sci.esa.int/web/gaia/-/58206-anatomy-of-the-milky-way" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia/-/58206-anatomy-of-the-milky-way"><span data-dcnode-id="2159" instrument_node="">according to ESA</span></a><span data-dcnode-id="2157" instrument_node="">. It harbors 10 billion stars (out of the Milky Way's total of about 200 billion), mostly old </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22471-red-giant-stars.html"><span data-dcnode-id="2156" instrument_node="">red giants</span></a><span data-dcnode-id="2154" instrument_node="">, which formed in the early stages of the galaxy's evolution.</span></p><p data-dcnode-id="2147"><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Related:</span></strong><span data-dcnode-id="2150" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/strange-signal-from-milky-way"><span data-dcnode-id="2149" instrument_node="">'Weird signal' hails from the Milky Way. What's causing it?</span></a></p><div class="bordeaux-slot" data-dcnode-id="2146" data-feat-ref="bordeaux-feat-id-87" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2145" data-feat-ref="bordeaux-feat-id-92" id="bordeaux-static-slot-13" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2130"><div class="image-full-width-wrapper" data-dcnode-id="2136"><div class="image-widthsetter" data-dcnode-id="2137" style="max-width:600px;"><p class="vanilla-image-block" data-dcnode-id="2138" style="padding-top:62.50%;"><picture data-dcnode-id="2139"><source alt="The structure of the Milky Way galaxy as seen from above the galactic disc." class="expandable lazy-image-van optional-image" data-dcnode-id="2144" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The structure of the Milky Way galaxy as seen from above the galactic disc." class="expandable lazy-image-van optional-image" data-dcnode-id="2143" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2140"><img alt="The structure of the Milky Way galaxy as seen from above the galactic disc." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2142" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-970-80.jpeg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2141"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2131" itemprop="caption description"><span class="caption-text" data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">The structure of the Milky Way galaxy as seen from above the galactic disk. </span></span><span class="credit" data-dcnode-id="2132" itemprop="copyrightHolder"><span data-dcnode-id="2133" instrument_node="">(Image credit: NASA/Adler/U. Chicago/Wesleyan/JPL-Caltech)</span></span></figcaption></figure><p data-dcnode-id="2125"><span data-dcnode-id="2129" instrument_node="">Beyond the bulge extends the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2127" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Guide_to_our_Galaxy" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Guide_to_our_Galaxy"><span data-dcnode-id="2128" instrument_node="">galactic disk</span></a><span data-dcnode-id="2126" instrument_node="">. This feature is 100,000 light-years across and 1,000 light-years thick, and it's home to the majority of the galaxy's stars, including our sun. Stars in the disk are dispersed in clouds of stellar dust and gas. When we look up to the sky at night, it's the edge-on view of this disk extending toward the galactic center that takes our breath away.</span></p><p data-dcnode-id="2120"><span data-dcnode-id="2124" instrument_node="">Stars in the disk orbit around the galactic center, forming swirling streams that appear to emanate like arms from the galactic bulge. Research into the mechanisms that drive the creation of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/gaia-reveals-spiral-arms-milky-way"><span data-dcnode-id="2123" instrument_node="">spiral arms</span></a><span data-dcnode-id="2121" instrument_node=""> is still in its infancy, but the latest studies suggest that these arms form and disperse within relatively short periods of up to 100 million years (out of the galaxy's 13 billion years of evolution).&nbsp;</span></p><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Inside those arms, stars, dust and gas are more tightly packed than in the more loosely filled areas of the galactic disk, and this increased density triggers more intense star formation. As a result, stars in the galactic disk tend to be much younger than those in the bulge.&nbsp;</span></p><p data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">"Spiral arms are like traffic jams in that the gas and stars crowd together and move more slowly in the arms. As material passes through the dense spiral arms, it is compressed and this triggers more star formation," Denilso Camargo, of the Federal University of Rio Grande do Sul in Brazil, said </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2115" data-url="https://www.nasa.gov/jpl/charting-the-milky-way-from-the-inside-out" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/jpl/charting-the-milky-way-from-the-inside-out"><span data-dcnode-id="2116" instrument_node="">in a statement</span></a><span data-dcnode-id="2114" instrument_node="">.</span></p><p data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node="">The Milky Way currently has four spiral arms according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2110" data-url="https://www.nsf.gov/mps/ast/outreach/MilkyWayLEDCraft2019.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/mps/ast/outreach/MilkyWayLEDCraft2019.pdf"><span data-dcnode-id="2111" instrument_node="">National Science Foundation</span></a><span data-dcnode-id="2109" instrument_node=""> (NSF). There are two main arms — Perseus and Scutum-Centaurus — and the Sagittarius and Local Arm, which are less pronounced. Scientists still discuss the exact position and shape of these arms using Gaia data.&nbsp;</span></p><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">The Milky Way </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2105" data-url="https://sci.esa.int/web/gaia/-/milky-way-s-warp-caused-by-galactic-collision-gaia-data-suggests" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia/-/milky-way-s-warp-caused-by-galactic-collision-gaia-data-suggests"><span data-dcnode-id="2106" instrument_node="">disk is not flat but warped</span></a><span data-dcnode-id="2104" instrument_node="">, according to ESA. As it rotates, it precesses like a wobbling spinning top. This wobble, essentially a giant ripple, circles the galactic center much more slowly than the stars in the disk, completing a full rotation in about 600 to 700 million years. Astronomers think this ripple may be a result of a past collision with another galaxy.</span></p><div class="bordeaux-slot" data-dcnode-id="2102" data-feat-ref="bordeaux-feat-id-88" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2101" data-feat-ref="bordeaux-feat-id-93" id="bordeaux-static-slot-14" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2086"><div class="image-full-width-wrapper" data-dcnode-id="2092"><div class="image-widthsetter" data-dcnode-id="2093" style="max-width:4000px;"><p class="vanilla-image-block" data-dcnode-id="2094" style="padding-top:56.25%;"><picture data-dcnode-id="2095"><source alt="The structure of the Milky Way with its rotating warped galactic disc." class="expandable lazy-image-van optional-image" data-dcnode-id="2100" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The structure of the Milky Way with its rotating warped galactic disc." class="expandable lazy-image-van optional-image" data-dcnode-id="2099" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2096"><img alt="The structure of the Milky Way with its rotating warped galactic disc." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2098" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2097"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2087" itemprop="caption description"><span class="caption-text" data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">The structure of the Milky Way with its rotating warped galactic disc. </span></span><span class="credit" data-dcnode-id="2088" itemprop="copyrightHolder"><span data-dcnode-id="2089" instrument_node="">(Image credit: Stefan Payne-Wardenaar; Inset: NASA/JPL-Caltech; Layout: ESA)</span></span></figcaption></figure><p data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">Sprinkled around the disk and the bulge are globular clusters, collections of ancient stars, as well as approximately 40 dwarf galaxies that are either orbiting or colliding with the larger Milky Way according to a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2083" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Gaia_reveals_that_most_Milky_Way_companion_galaxies_are_newcomers_to_our_corner_of_space" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Gaia_reveals_that_most_Milky_Way_companion_galaxies_are_newcomers_to_our_corner_of_space" target="_blank"><span data-dcnode-id="2084" instrument_node="">statement from ESA</span></a><span data-dcnode-id="2082" instrument_node="">.</span></p><p data-dcnode-id="2076"><span data-dcnode-id="2080" instrument_node="">All of that is surrounded by a spherical halo of dust and gas, which is twice as wide as the disk. Astronomers believe that the entire galaxy is embedded in an even larger halo of invisible </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20930-dark-matter.html"><span data-dcnode-id="2079" instrument_node="">dark matter</span></a><span data-dcnode-id="2077" instrument_node="">. Since dark matter doesn't emit any light, its presence can only be inferred indirectly by its gravitational effects on the motions of stars in the galaxy. Calculations suggest that this puzzling stuff makes up to 90% of the galaxy's mass.</span></p><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">"Even though we know the dark matter should be there, [and] we think it should be there, the ratio of dark matter to luminous matter in particular galaxies may be under debate," Gwendolyn Eadie, a Ph.D. candidate in astrophysics at McMaster University in Ontario, Canada, and co-author on the research, told Space.com.</span></p><p data-dcnode-id="2066"><span data-dcnode-id="2073" instrument_node="">The mass of the Milky Way, dark matter included, equals 1.5 trillion solar masses, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2071" data-url="https://www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate" target="_blank"><span data-dcnode-id="2072" instrument_node="">recent NASA estimates</span></a><span data-dcnode-id="2070" instrument_node="">. The galaxy's visible matter is distributed between its 200 billion </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/57-stars-formation-classification-and-constellations.html"><span data-dcnode-id="2069" instrument_node="">stars</span></a><span data-dcnode-id="2067" instrument_node="">, their planets and the massive clouds of dust and gas that fill the interstellar space.</span></p><p data-dcnode-id="2060"><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Related:</span></strong><span data-dcnode-id="2063" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15680-galaxies.html"><span data-dcnode-id="2062" instrument_node="">Galaxies: Collisions, types and how they're made</span></a></p><h3 class="article-body__section" data-dcnode-id="2057" id="section-where-is-the-sun-in-the-milky-way"><span data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Where is the sun in the Milky Way?</span></span></h3><div class="bordeaux-slot" data-dcnode-id="2056" data-feat-ref="bordeaux-feat-id-89" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2055" data-feat-ref="bordeaux-feat-id-94" id="bordeaux-static-slot-15" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2040"><div class="image-full-width-wrapper" data-dcnode-id="2046"><div class="image-widthsetter" data-dcnode-id="2047" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2048" style="padding-top:56.25%;"><picture data-dcnode-id="2049"><source alt="The sun is one of 200 billion stars making up the Milky Way galaxy." class="expandable lazy-image-van optional-image" data-dcnode-id="2054" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The sun is one of 200 billion stars making up the Milky Way galaxy." class="expandable lazy-image-van optional-image" data-dcnode-id="2053" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2050"><img alt="The sun is one of 200 billion stars making up the Milky Way galaxy." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2052" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2051"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2041" itemprop="caption description"><span class="caption-text" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">The sun is one of 200 billion stars making up the Milky Way galaxy. </span></span><span class="credit" data-dcnode-id="2042" itemprop="copyrightHolder"><span data-dcnode-id="2043" instrument_node="">(Image credit: NASA/GSFC/SDO)</span></span></figcaption></figure><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">The sun orbits about 26,000 light-years from the black hole Sagittarius A*, roughly in the middle of the galactic disk. Traveling at the speed of 515,000 mph (828,000 kph), the sun takes 230 million years to complete a full orbit around the galactic center.&nbsp;</span></p><p data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node="">The sun sits near the edge of the Local Arm of the Milky Way, one of the two smaller spiral arms of the galaxy. In 2019, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2035" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way" target="_blank"><span data-dcnode-id="2036" instrument_node="">using data from the Gaia mission</span></a><span data-dcnode-id="2034" instrument_node="">, astronomers found that the sun is essentially surfing a wave of interstellar gas that's 9,000 light-years long, 400 light-years wide and undulates 500 light-years above and below the galactic disk according to ESA.&nbsp;</span></p><p data-dcnode-id="2028"><span data-dcnode-id="2032" instrument_node="">Planets of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16080-solar-system-planets.html"><span data-dcnode-id="2031" instrument_node="">solar system</span></a><span data-dcnode-id="2029" instrument_node=""> do not orbit in the plane of the galaxy but are tipped by about 63 degrees.&nbsp;</span></p><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">"It's almost like we're sailing through the galaxy sideways," Merav Opher, an astrophysicist at George Mason University in Virginia, told Space.com.</span></p><h3 class="article-body__section" data-dcnode-id="2023" id="section-milky-way-formation-and-evolution"><span data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Milky Way formation and evolution</span></span></h3><div class="jwplayer__widthsetter" data-dcnode-id="2004"><div class="jwplayer__wrapper" data-dcnode-id="2005"><div class="future__jwplayer" data-dcnode-id="2006" id="futr_botr_xY4kJ0h3_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2019" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/xY4kJ0h3/see-the-milky-way-galaxys-warp-in-this-animation%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2021" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2007" id="botr_xY4kJ0h3_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2008"><div class="jw-icon jw-reset" data-dcnode-id="2014"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2015" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2016"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2009"><div class="jw-error-text jw-reset-text" data-dcnode-id="2010" data-nosnippet="" dir="auto"><span data-dcnode-id="2013" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2012"></span><span data-dcnode-id="2011" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">The evolution of the Milky Way began when clouds of gas and dust started collapsing, pushed together by </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/classical-gravity.html"><span data-dcnode-id="2002" instrument_node="">gravity</span></a><span data-dcnode-id="2000" instrument_node="">. First stars sprung up from the collapsed clouds, those that we see today in the globular clusters. The spherical halo emerged soon after, followed by the flat galactic disk. The galaxy started small and grew as the inescapable force of gravity pulled everything together.&nbsp;</span></p><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1983" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/" target="_blank"><figure class="van-image-figure pull-left inline-layout" data-bordeaux-image-check="" data-dcnode-id="1984"><div class="image-full-width-wrapper" data-dcnode-id="1990"><div class="image-widthsetter" data-dcnode-id="1991" style="max-width:880px;"><p class="vanilla-image-block" data-dcnode-id="1992" style="padding-top:227.27%;"><picture data-dcnode-id="1993"><source alt="The Milky Way is approximately 13.6 billion years old." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="1998" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-srcset="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-970-80.png.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Milky Way is approximately 13.6 billion years old." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="1997" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-srcset="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-970-80.png 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/png"></picture></p><figure class="expandable-image" data-dcnode-id="1994"><img alt="The Milky Way is approximately 13.6 billion years old." class="pull-left expandable lazy-image-van optional-image loaded" data-dcnode-id="1996" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png" data-srcset="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-970-80.png 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-970-80.png 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1995"></div></figure><p></p></div></div><figcaption class="pull-left inline-layout" data-dcnode-id="1985" itemprop="caption description"><span class="caption-text" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">The Milky Way is approximately 13.6 billion years old. </span></span><span class="credit" data-dcnode-id="1986" itemprop="copyrightHolder"><span data-dcnode-id="1987" instrument_node="">(Image credit: Future)</span></span></figcaption></figure></a><p data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">The galaxy's evolution is, however, still shrouded in mystery. A discipline called galactic archaeology is slowly unraveling some of the puzzles of the Milky Way's life thanks to the Gaia mission, which released its first </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1980" data-url="https://sci.esa.int/web/gaia/-/58210-gaia-data-release-1#:~:text=One%20thousand%20days%20after%20launch,July%202014%20to%20September%202015." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia/-/58210-gaia-data-release-1%23%3A~%3Atext%3DOne%2520thousand%2520days%2520after%2520launch%2CJuly%25202014%2520to%2520September%25202015." target="_blank"><span data-dcnode-id="1981" instrument_node="">catalog of data </span></a><span data-dcnode-id="1979" instrument_node="">in 2018.&nbsp;</span></p><p data-dcnode-id="1974"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1976" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/How_does_Gaia_study_the_Milky_Way" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/How_does_Gaia_study_the_Milky_Way" target="_blank"><span data-dcnode-id="1977" instrument_node="">Gaia measures</span></a><span data-dcnode-id="1975" instrument_node=""> the exact positions and distances of more than 1 billion stars, as well as their light spectra, which enables scientists to understand the stars' composition and age, according to ESA. The position data allow astronomers to determine the speeds and directions in which the stars move in space. As things in space follow predictable trajectories, astronomers can reconstruct the paths of the stars billions of years into the past and future. Combining these reconstructed trajectories into one stellar movie captures the evolution of the galaxy over eons.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1973" data-feat-ref="bordeaux-feat-id-90" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1972" data-feat-ref="bordeaux-feat-id-95" id="bordeaux-static-slot-16" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1957"><div class="image-full-width-wrapper" data-dcnode-id="1963"><div class="image-widthsetter" data-dcnode-id="1964" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1965" style="padding-top:56.25%;"><picture data-dcnode-id="1966"><source alt="Contrary to expectations, dwarf galaxies in the vicinity of the Milky Way have only just arrived." class="expandable lazy-image-van optional-image" data-dcnode-id="1971" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Contrary to expectations, dwarf galaxies in the vicinity of the Milky Way have only just arrived." class="expandable lazy-image-van optional-image" data-dcnode-id="1970" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1967"><img alt="Contrary to expectations, dwarf galaxies in the vicinity of the Milky Way have only just arrived." class="expandable lazy-image-van optional-image" data-dcnode-id="1969" data-ll-status="native" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1968"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="1958" itemprop="caption description"><span class="caption-text" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">About 50 dwarf galaxies orbit the Milky Way, destined to be devoured in the future. </span></span><span class="credit" data-dcnode-id="1959" itemprop="copyrightHolder"><span data-dcnode-id="1960" instrument_node="">(Image credit: ESA)</span></span></figcaption></figure><p data-dcnode-id="1949"><span data-dcnode-id="1956" instrument_node="">There is also </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1954" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way"><span data-dcnode-id="1955" instrument_node="">evidence</span></a><span data-dcnode-id="1953" instrument_node=""> that the Milky Way collided with several smaller galaxies during its evolution. In 2018, a team of Dutch astronomers found </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1951" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_ghosts_Gaia_uncovers_major_event_in_the_formation_of_the_Milky_Way" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_ghosts_Gaia_uncovers_major_event_in_the_formation_of_the_Milky_Way" target="_blank"><span data-dcnode-id="1952" instrument_node="">a group of 30,000 stars</span></a><span data-dcnode-id="1950" instrument_node=""> moving in sync through the sun's neighborhood in the opposite direction to the rest of the stars in the data set. The motion pattern matched what scientists had previously seen in computer simulations of galactic collisions. These stars also differed in color and brightness, which suggested they came from a different galaxy.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1948" data-feat-ref="bordeaux-feat-id-85" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="1930"><div class="fancy_box-title" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Related stories:</span></div><div class="fancy_box_body" data-dcnode-id="1931"><p data-dcnode-id="1942"><span data-dcnode-id="1945" instrument_node="">— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/23854-gaia-spacecraft-photos-milky-way-galaxy.html"><span data-dcnode-id="1944" instrument_node="">Photos: Gaia spacecraft mapping Milky Way galaxy</span></a></p><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/57-stars-formation-classification-and-constellations.html"><span data-dcnode-id="1940" instrument_node="">Star facts: The basics of star names and stellar evolution</span></a><span data-dcnode-id="1938" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1936" instrument_node="">— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/12637-stunning-galaxy-collision-photos.html"><span data-dcnode-id="1935" instrument_node="">When galaxies collide: Photos of great galactic crashes</span></a><span data-dcnode-id="1933" instrument_node=""> &nbsp;&nbsp;</span></p></div></div><p data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">Remnants of another, slightly younger, collision were spotted a year later. The Milky Way continues devouring smaller galaxies to this day. A galaxy called Sagittarius (not to be mistaken with the black hole) currently orbits close to the Milky Way and has likely </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1927" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_crash_may_have_triggered_Solar_System_formation" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_crash_may_have_triggered_Solar_System_formation" target="_blank"><span data-dcnode-id="1928" instrument_node="">smashed through its disk several times</span></a><span data-dcnode-id="1926" instrument_node=""> in the past 7 billion years. Using Gaia data, scientists found that these collisions triggered periods of intense star formation in the Milky Way and may even have something to do with the galaxy's trademark spiral shape. The study suggests that our sun was born during one of those periods some 4.6 billion years ago.&nbsp;</span></p><h2 class="article-body__section" data-dcnode-id="1922" id="section-the-future-of-the-milky-way-research"><span data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">The future of the Milky Way research</span></span></h2><p data-dcnode-id="1914"><span data-dcnode-id="1921" instrument_node="">Since the beginning of its operations, the Gaia mission has provided three updates to its massive stellar catalog. Astronomers from all over the world continue analyzing the data in search of new patterns and revelations. Gaia data currently generates more research papers than even the famous </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15892-hubble-space-telescope.html"><span data-dcnode-id="1920" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1918" instrument_node="">. In a recent "space telescope tournament", a</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1916" data-url="https://twitter.com/fox_ori/status/1439944461698715650?s=20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/fox_ori/status/1439944461698715650%3Fs%3D20" target="_blank"><span data-dcnode-id="1917" instrument_node=""> jokey poll run by astronomers on Twitter</span></a><span data-dcnode-id="1915" instrument_node="">, Gaia beat the veteran Hubble by five votes as the current darling of the astronomical community.&nbsp;</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Gaia will continue charting the galaxy until at least 2022, and the catalog it has compiled will keep astronomers busy for decades to come.&nbsp;</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1911" instrument_node="">Before Gaia, the largest dataset about positions and distances of stars in the Milky Way came from a mission called </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1909" data-url="https://www.cosmos.esa.int/web/hipparcos" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cosmos.esa.int/web/hipparcos"><span data-dcnode-id="1910" instrument_node="">Hipparcos</span></a><span data-dcnode-id="1908" instrument_node="">, after an ancient Greek astronomer who began charting the night sky 150 years before Christ. Hipparcos only saw about 100,000 of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21640-star-luminosity-and-magnitude.html"><span data-dcnode-id="1907" instrument_node="">brightest stars</span></a><span data-dcnode-id="1905" instrument_node=""> in the sun's neighborhood, compared to Gaia's one billion. The data was also less precise.&nbsp;</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Even though Gaia sees less than 1% of stars in the galaxy, astronomers can expand their findings and model the behavior of the entire Milky Way.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="1899" id="section-additional-resources"><span data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Additional resources</span></span></h3><p data-dcnode-id="1885"><span data-dcnode-id="1898" instrument_node="">Discover more about the Milky Way and other galaxies with this free learning material from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1896" data-url="https://www.open.edu/openlearn/mod/oucontent/view.php?id=66945&amp;section=2.2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.open.edu/openlearn/mod/oucontent/view.php%3Fid%3D66945%26section%3D2.2" target="_blank"><span data-dcnode-id="1897" instrument_node="">Open University</span></a><span data-dcnode-id="1895" instrument_node="">. Explore the Milky Way in </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1893" data-url="https://sci.esa.int/web/gaia/-/60036-gaia-data-release-2-virtual-reality-resources" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia/-/60036-gaia-data-release-2-virtual-reality-resources" target="_blank"><span data-dcnode-id="1894" instrument_node="">virtual reality</span></a><span data-dcnode-id="1892" instrument_node=""> with ESA's Gaia mission. Tour the Milky Way with </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1890" data-url="https://zah.uni-heidelberg.de/gaia/outreach/gaiasky" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zah.uni-heidelberg.de/gaia/outreach/gaiasky" target="_blank"><span data-dcnode-id="1891" instrument_node="">Gaia Sky</span></a><span data-dcnode-id="1889" instrument_node="">, a real-time, 3D, astronomy visualization software that uses ESA's Gaia mission data. Learn why it was so difficult to study the Milky Way before Gaia in this </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1887" data-url="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Why_was_it_so_difficult_to_study_the_Milky_Way_before_Gaia" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia/Why_was_it_so_difficult_to_study_the_Milky_Way_before_Gaia" target="_blank"><span data-dcnode-id="1888" instrument_node="">article from ESA</span></a><span data-dcnode-id="1886" instrument_node="">.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="1882" id="section-bibliography"><span data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Bibliography</span></span></h3><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">&nbsp;Xiang, M., Rix, HW. "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1270256097812144000" data-dcnode-id="1879" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="skimlinks" data-label="A time-resolved picture of our Milky Way's early formation history" data-merchant-id="undefined" data-merchant-name="SkimLinks - nature.com" data-merchant-network="undefined" data-merchant-url="undefined" data- m/mnras/article/414/3/2446/1042117%3Flogin%3Dtrue" target="_blank"><span data-dcnode-id="1870" instrument_node="">Mass models of the Milky Way.</span></a><span data-dcnode-id="1868" instrument_node="">" Monthly Notices of the Royal Astronomical Society 294.3 (1998): 429-438.</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">Helmi, Amina. "</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1864" data-url="https://www.annualreviews.org/doi/abs/10.1146/annurev-astro-032620-021917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.annualreviews.org/doi/abs/10.1146/annurev-astro-032620-021917" target="_blank"><span data-dcnode-id="1865" instrument_node="">Streams, substructures, and the early history of the Milky Way.</span></a><span data-dcnode-id="1863" instrument_node="">" Annual Review of Astronomy and Astrophysics 58 (2020): 205-256.&nbsp;</span></p><span data-dcnode-id="1861" instrument_node="">

</span><span class="bio" data-dcnode-id="1790"><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Tereza is a London-based science and technology journalist, aspiring fiction writer and amateur gymnast. Originally from Prague, the Czech Republic, she spent the first seven years of her career working as a reporter, script-writer and presenter for various TV programmes of the Czech Public Service Television. She later took a career break to pursue further education and added a Master's in Science from the International Space University, France, to her Bachelor's in Journalism and Master's in Cultural Anthropology from Prague's Charles University.&nbsp;She worked as a reporter at the Engineering and Technology magazine, freelanced for a range of publications including Live Science, Space.com, Professional Engineering, Via Satellite and Space News and served as a maternity cover science editor at the European Space Agency.</span></p></span><span data-dcnode-id="1789" instrument_node="">
