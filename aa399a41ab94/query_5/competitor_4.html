</span><h2 class="post-title" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Photograph The Triangulum Galaxy</span></h2><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="446" style="text-align: center;"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard.jpg" rel="noopener" target="_blank"><img alt="Triangulum Galaxy" class="aligncenter wp-image-19249" data-dcnode-id="448" height="750" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard.jpg 900w, https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard-436x545.jpg 436w, https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard-819x1024.jpg 819w, https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard-768x960.jpg 768w, https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard-688x860.jpg 688w, https://astrobackyard.com/wp-content/uploads/2022/01/triangulum-galaxy-astrobackyard-150x188.jpg 150w" width="600"></a></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="438" style="text-align: center;"><strong data-dcnode-id="439"><em data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">The Triangulum Galaxy captured during the </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/J9RF5Zf2dfg" rel="noopener" target="_blank"><span data-dcnode-id="443" instrument_node="">Black Forest Star Party</span></a><span data-dcnode-id="441" instrument_node="">.</span></em></strong></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="436" instrument_node="">The Triangulum Galaxy (M33) is a </span><span data-dcnode-id="433" style="color: #0000ff;"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/types-of-galaxies/" style="color: #0000ff;"><span data-dcnode-id="435" instrument_node="">spiral galaxy</span></a></span><span data-dcnode-id="432" instrument_node=""> in the constellation Triangulum, that is believed to be a satellite of the </span><span data-dcnode-id="429" style="color: #0000ff;"><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/andromeda-galaxy/" style="color: #0000ff;"><span data-dcnode-id="431" instrument_node="">Andromeda Galaxy</span></a></span><span data-dcnode-id="428" instrument_node="">. Messier 33 can be seen visually with the naked eye under exceptionally good seeing conditions with no light pollution.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The Triangulum Galaxy is a spectacular sight when photographed through a telescope. Its large, colorful spiral formation has been well-photographed by amateur astrophotographers using a camera and telescope.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="422" instrument_node="">This galaxy lies 3 million light-years from Earth and is the third-largest member of the </span><span data-dcnode-id="419" style="color: #0000ff;"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_Group" style="color: #0000ff;"><span data-dcnode-id="421" instrument_node="">Local Group</span></a></span><span data-dcnode-id="418" instrument_node=""> of Galaxies behind the Milky Way and Andromeda.</span></p><span data-dcnode-id="416" instrument_node="">
</span><h1 data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">The Triangulum Galaxy</span></h1><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Through astrophotography, we can reveal the faint details and structure of the Triangulum Galaxy with long exposure images. With enough time, your camera has the power to uncover the beauty of M33 even under an urban backyard sky.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="409" instrument_node="">For example, the photo below showcases the M33 Galaxy captured using an Explore Scientific ED80 telescope, and a </span><span data-dcnode-id="406" style="color: #0000ff;"><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astrophotography-cameras/" style="color: #0000ff;"><span data-dcnode-id="408" instrument_node="">modified DSLR camera</span></a></span><span data-dcnode-id="405" instrument_node="">. The Triangulum galaxy can be a challenging deep-sky target from the city, but with plenty of integrated exposure time, the true beauty of M33 can shine through.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><img alt="Triangulum Galaxy" class="aligncenter wp-image-10338 size-full" data-dcnode-id="402" height="673" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/11/triangulum-galaxy.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/11/triangulum-galaxy.jpg 600w, https://astrobackyard.com/wp-content/uploads/2018/11/triangulum-galaxy-486x545.jpg 486w" width="600"></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="393" style="text-align: center;"><strong data-dcnode-id="394"><em data-dcnode-id="395"><span data-dcnode-id="399" instrument_node="">The Triangulum Galaxy photographed using a </span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/canon-rebel/"><span data-dcnode-id="398" instrument_node="">Canon Rebel</span></a><span data-dcnode-id="396" instrument_node=""> DLSR Camera and 80mm Telescope</span></em></strong></p><span data-dcnode-id="392" instrument_node="">
</span><h2 data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Core Details:</span></h2><span data-dcnode-id="389" instrument_node="">
</span><ul data-dcnode-id="357"><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="384"><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Type:</span></strong><span data-dcnode-id="385" instrument_node=""> Spiral Galaxy</span></li><span data-dcnode-id="383" instrument_node="">
</span><li data-dcnode-id="379"><strong data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Constellation:</span></strong><span data-dcnode-id="380" instrument_node=""> Triangulum</span></li><span data-dcnode-id="378" instrument_node="">
</span><li data-dcnode-id="374"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Designations:</span></strong><span data-dcnode-id="375" instrument_node=""> Messier 33, NGC 598</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="369"><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Distance:</span></strong><span data-dcnode-id="370" instrument_node=""> 3 Million Light Years</span></li><span data-dcnode-id="368" instrument_node="">
</span><li data-dcnode-id="364"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Apparent Size:</span></strong><span data-dcnode-id="365" instrument_node=""> 70.8 x 41.7 arcminutes</span></li><span data-dcnode-id="363" instrument_node="">
</span><li data-dcnode-id="359"><strong data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Magnitude:</span></strong><span data-dcnode-id="360" instrument_node=""> +5.7</span></li><span data-dcnode-id="358" instrument_node="">
</span></ul><span data-dcnode-id="356" instrument_node="">
</span><h2 data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">About the Triangulum Galaxy</span></h2><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="352" instrument_node="">The </span><span data-dcnode-id="349" style="color: #0000ff;"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//earthsky.org/clusters-nebulae-galaxies/triangulum-galaxy-m33-a-binocular-challenge" style="color: #0000ff;"><span data-dcnode-id="351" instrument_node="">Triangulum Galaxy</span></a></span><span data-dcnode-id="348" instrument_node=""> was independently discovered by Charles Messier in 1764 and was later published as object number 33 in his Catalog of Nebulae and Star Clusters.&nbsp;</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="345" instrument_node="">Although the presence of M33 becomes obvious in a long exposure photograph, it can be difficult to observe visually.&nbsp;This face-on galaxy has been referred to as the Pinwheel Galaxy in some amateur astronomy references, but I prefer to reserve that title for </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/gallery/wallpaper/pr2006010a/"><span data-dcnode-id="343" style="color: #0000ff;"><span data-dcnode-id="344" instrument_node="">Messier 101</span></span><span data-dcnode-id="342" instrument_node="">.</span></a></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="338" instrument_node="">It is a diffuse object, that can easily get lost in a small amount of light pollution. In fact, the Triangulum Galaxy is one of the critical sky marks of the </span><span data-dcnode-id="335" style="color: #0000ff;"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bortle_scale" style="color: #0000ff;"><span data-dcnode-id="337" instrument_node="">Bortle Dark-Sky Scale</span></a></span><span data-dcnode-id="334" instrument_node="">.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">I find it very interesting to note that the galaxy’s brightest region of hydrogen (emission nebula), has its own designation of NGC 604. It’s another cataloged deep sky nebula within the galaxy itself!</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="328" instrument_node="">Have a look at this exquisite example of </span><span data-dcnode-id="325" style="color: #0000ff;"><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com/topic/600514-ngc-604-in-the-triangulum-galaxy-m33/" style="color: #0000ff;"><span data-dcnode-id="327" instrument_node="">NGC 604</span></a></span><span data-dcnode-id="324" instrument_node=""> within the Triangulum Galaxy captured by an amateur astrophotographer. A C14 Edge telescope was used to produce this HaLRGB image.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><img alt="NGC 604" class="aligncenter size-full wp-image-10336" data-dcnode-id="321" height="338" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/11/NGC_604.jpg&amp;raw" width="500"></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="312" style="text-align: center;"><strong data-dcnode-id="313"><em data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">NGC 604 by amateur astronomer “</span><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrobin.com/324326/%3Fnc%3Duser"><span data-dcnode-id="317" instrument_node="">Sydney</span></a><span data-dcnode-id="315" instrument_node="">” on Cloudy Nights</span></em></strong></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="310" instrument_node="">The giant H-II regions found in Messier 33 are some of the largest known stellar nurseries in the Universe. NGC 604 is over 40 times the size of the visible portion of the </span><span data-dcnode-id="307" style="color: #0000ff;"><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/orion-nebula/" style="color: #0000ff;"><span data-dcnode-id="309" instrument_node="">Orion Nebula</span></a></span><span data-dcnode-id="306" instrument_node="">.&nbsp;H II regions are full of atomic hydrogen that is ionized and indicates an area where star formation is taking place.</span></p><span data-dcnode-id="304" instrument_node="">
</span><h2 data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Where is M33 located?</span></h2><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="300" instrument_node="">To help find the galaxy, look left of Andromeda and Pisces, above Aries. If you can find M31, you are almost there. From my latitude in the Northern Hemisphere, M33 rises high overhead in the months of September-November. Use the star map from </span><span data-dcnode-id="296" style="color: #0000ff;"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.skyandtelescope.com/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="299" instrument_node="">Sky and Telescope</span></a><span data-dcnode-id="297" instrument_node=""> </span></span><span data-dcnode-id="295" instrument_node="">below to help you find it.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><img alt="Find the Triangulum Galaxy" class="aligncenter size-full wp-image-4115" data-dcnode-id="292" height="501" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33.jpg 650w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-545x420.jpg 545w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-250x193.jpg 250w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-550x424.jpg 550w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-234x180.jpg 234w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-389x300.jpg 389w, https://astrobackyard.com/wp-content/uploads/2016/01/find-triangulum-galaxy-m33-649x500.jpg 649w" width="650"></p><span data-dcnode-id="290" instrument_node="">
</span><h2 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Astrophotography</span></h2><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Through long exposure photography, we can see that this galaxy is full of hydrogen gas. &nbsp;These are the pink areas seen throughout the spiral arms in the galaxy.&nbsp;A camera modified for astrophotography makes a big difference when capturing hydrogen regions. &nbsp;</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">These reds and pinks will show up much brighter in a camera with its stock IR cut filter removed.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="280" instrument_node="">(For DSLR astro-modifications, have a look at the services being offered by </span><span data-dcnode-id="277" style="color: #0000ff;"><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imaginginfinity.com/dslrmods.html" style="color: #0000ff;"><span data-dcnode-id="279" instrument_node="">Hap Griffen</span></a></span><span data-dcnode-id="276" instrument_node="">)</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Capturing narrowband data in the H-Alpha wavelength will brighten these areas even more.&nbsp;The image I shared earlier in the post went through several stages of image processing.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="270" instrument_node="">Have a look at the original image below. The reason the sky is an ugly yellow-red color is that I shoot through heavy </span><span data-dcnode-id="267" style="color: #0000ff;"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astrophotography-light-pollution/" style="color: #0000ff;"><span data-dcnode-id="269" instrument_node="">light pollution</span></a></span><span data-dcnode-id="266" instrument_node=""> in the center of my city.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><img alt="Processing the Triangulum Galaxy in Photoshop" class="wp-image-4121 size-full aligncenter" data-dcnode-id="263" height="394" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing.jpg 700w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-545x307.jpg 545w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-688x387.jpg 688w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-250x141.jpg 250w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-550x310.jpg 550w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-320x180.jpg 320w, https://astrobackyard.com/wp-content/uploads/2016/01/triangulum-galaxy-astrophotography-processing-533x300.jpg 533w" width="700"></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="257" style="text-align: center;"><strong data-dcnode-id="258"><em data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">A single image exposure from an urban sky (red zone)</span></em></strong></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">This is what you can expect a single exposure of a deep sky object to look like from the city. I’ll need to balance the colors and remove gradients to pull this galaxy out of a washed-out sky. I’ll discuss the details of processing the image further down the page.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="252" instrument_node="">For this image, I used an IDAS LPS EOS clip-in filter to reduce targeted wavelengths of artificial light from the city. If you are having trouble finding this filter online, I suggest checking out the </span><span data-dcnode-id="249" style="color: #0000ff;"><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/xSY3_fjaKIA" style="color: #0000ff;"><span data-dcnode-id="251" instrument_node="">Optolong L-Pro filter</span></a></span><span data-dcnode-id="248" instrument_node="">. This is an excellent choice for broad-spectrum targets such as galaxies.</span></p><span data-dcnode-id="246" instrument_node="">
</span><h2 data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">M33 Galaxy with added Ha</span></h2><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">In December 2018, I photographed the M33 galaxy using a narrowband filter that isolates light emitted in the Ha wavelength. This camera filter allowed me to better showcase the intense clusters of nebulae in the galaxy, including NGC 604.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">To create the image below, I carefully blended the Ha details into my existing full-color RGB image taken with a DSLR.</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235" style="text-align: center;"><img alt="M33 Galaxy " class="aligncenter size-full wp-image-10619" data-dcnode-id="236" height="625" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2018/12/M33-galaxy-astrophotography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2018/12/M33-galaxy-astrophotography.jpg 600w, https://astrobackyard.com/wp-content/uploads/2018/12/M33-galaxy-astrophotography-523x545.jpg 523w" width="600"></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="233" instrument_node="">To capture the Triangulum galaxy in Ha, I used a </span><span data-dcnode-id="230" style="color: #0000ff;"><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/asi294mc-pro-review/" style="color: #0000ff;"><span data-dcnode-id="232" instrument_node="">ZWO ASI294MC Pro</span></a></span><span data-dcnode-id="229" instrument_node=""> camera through a Sky-Watcher Esprit 100 ED APO telescope. The filter used was the STC Astro Duo-Narrowband (Ha + OIII).</span></p><span data-dcnode-id="227" instrument_node="">
</span><h2 data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Which Telescope to Use</span></h2><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="223" instrument_node="">For the photo of Messier 33 on this page, I used an</span><span data-dcnode-id="220" style="color: #0000ff;"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/refractor-telescope/" style="color: #0000ff;"><span data-dcnode-id="222" instrument_node="">&nbsp;Explore Scientific ED80</span></a></span><span data-dcnode-id="219" instrument_node=""> refractor telescope.&nbsp;The focal length of this telescope (480mm) is well suited for the Triangulum&nbsp;Galaxy because it is a large galaxy, and a narrow field of view may not be able to capture the entire object.</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="216" instrument_node="">I often recommend this specific </span><span data-dcnode-id="213" style="color: #0000ff;"><a data-dcnode-id="214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/beginner-astrophotography-telescope/" style="color: #0000ff;"><span data-dcnode-id="215" instrument_node="">type of telescope</span></a></span><span data-dcnode-id="212" instrument_node=""> to beginners because of my positive experience with it.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="209" instrument_node="">This instrument has produced&nbsp;consistent&nbsp;results on a nightly basis from an astrophotography perspective. Another great choice to consider at this focal length is the </span><span data-dcnode-id="206" style="color: #0000ff;"><a data-dcnode-id="207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/dslr-camera-and-telescope/" style="color: #0000ff;"><span data-dcnode-id="208" instrument_node="">William Optics Zenithstar 73</span></a></span><span data-dcnode-id="205" instrument_node="">.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">This apochromatic refractor uses FPL-53 glass to create images with incredible contrast and color correction.</span></p><span data-dcnode-id="200" instrument_node="">
</span><h2 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Image Processing</span></h2><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="196" instrument_node="">Back in </span><span data-dcnode-id="193" style="color: #0000ff;"><a data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/backyard-galaxy-photography-m33-the-triangulum-galaxy/" style="color: #0000ff;"><span data-dcnode-id="195" instrument_node="">September of 2015</span></a></span><span data-dcnode-id="192" instrument_node="">, I spent a number of clear nights focused on this galaxy.</span></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">From my latitude in the Northern hemisphere, the Triangulum Galaxy rises high into the sky in the Fall. This is a prime location for imaging, as it is as far away from ground-based atmospheric disturbances as possible.</span></p><span data-dcnode-id="187" instrument_node="">
</span><p data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">I can also collect a lot of signal (light) on this target because it is free from obstructions like the roof of my house, and surrounding trees.</span></p><span data-dcnode-id="184" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="183" instrument_node="">As with most astrophotography targets, the real challenge is in the </span><span data-dcnode-id="180" style="color: #0000ff;"><a data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/tutorials/astrophotography-tutorial-1/" style="color: #0000ff;"><span data-dcnode-id="182" instrument_node="">image processing</span></a></span><span data-dcnode-id="179" instrument_node="">. Processing images of galaxies are quite different than most nebulae.</span></p><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">The isolation of the galaxy amongst a black sea of space helps it really stand out when imaged. The tough part about processing M33 is the overall low surface brightness of the galaxy.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="172"><img alt="Triangulum Galaxy - Astrophotography" class="wp-image-4120 size-full aligncenter" data-dcnode-id="173" height="338" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy.jpg 600w, https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy-545x307.jpg 545w, https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy-250x141.jpg 250w, https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy-550x310.jpg 550w, https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy-320x180.jpg 320w, https://astrobackyard.com/wp-content/uploads/2016/01/astrophotography-triagulum-galaxy-533x300.jpg 533w" width="600"></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="167" style="text-align: center;"><strong data-dcnode-id="168"><em data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Processing my image of M33 in Adobe Photoshop</span></em></strong></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164" style="text-align: left;"><span data-dcnode-id="165" instrument_node="">My original stacked image had a horrible gradient due to the poor sky conditions I shot in. This was easily removed in Adobe Photoshop using a popular method of gradient removal for astrophotography.</span></p><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="157" style="text-align: left;"><span data-dcnode-id="162" instrument_node="">You can watch my image processing tutorial on </span><span data-dcnode-id="159" style="color: #0000ff;"><a data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/9weEol1aWds" style="color: #0000ff;"><span data-dcnode-id="161" instrument_node="">removing gradients in Photoshop</span></a></span><span data-dcnode-id="158" instrument_node=""> on YouTube.</span></p><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">The capturing process went smoothly. &nbsp;I used BackyardEOS to control my modified Canon 450D. &nbsp;Autoguiding was used via the Orion Mini 50mm and Meade DSI Pro II combination riding on my Sky-Watcher HEQ5.&nbsp;</span></p><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="152" instrument_node="">For complete details of my astrophotography equipment, </span><span data-dcnode-id="149" style="color: #0000ff;"><a data-dcnode-id="150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/astrophotography-equipment/" style="color: #0000ff;"><span data-dcnode-id="151" instrument_node="">click here</span></a></span><span data-dcnode-id="148" instrument_node="">.</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="144"><img alt="Astrophotography telescope" class="aligncenter wp-image-1200 size-full" data-dcnode-id="145" height="750" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2015/09/backyard_telescope.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2015/09/backyard_telescope.jpg 500w, https://astrobackyard.com/wp-content/uploads/2015/09/backyard_telescope-363x545.jpg 363w" width="500"></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141" style="text-align: left;"><span data-dcnode-id="142" instrument_node="">&nbsp;</span></p><span data-dcnode-id="140" instrument_node="">
</span></div><span data-dcnode-id="137" instrument_node="">
