</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">When it comes to naming things in the cosmos we come up with a lot of creative and sometimes just plain obvious ways to describe them. In this article let us look at how our home galaxy got its iconic name.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" id="more-843"></span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1083"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">How did the Milky Way galaxy get its name? Origins of Milky Way come from ancient Greece and Rome. Greeks came up with a “Galaxias Kyklos” which translates to “Milky circle” and Romans named it “Via Lactea” which translates to “Road of Milk”. </span></strong></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The universe is one of those places where things are named after their appearance and rarely have fancy and hard to pronounce names. Stars that have run out of hydrogen to burn are simply called red giants. Black holes are well … black holes. And the list goes on. The same principle applies to our Milky Way galaxy.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h2 data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">What was Milky Way called before?</span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1073"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg%3Fssl%3D1"><img alt="What was Milky Way called before" class="alignnone size-full wp-image-855" data-dcnode-id="1075" data-recalc-dims="1" height="576" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg%3Fresize%3D864%252C576%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?w=1280&amp;ssl=1 1280w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=300%2C200&amp;ssl=1 300w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=1024%2C682&amp;ssl=1 1024w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=768%2C512&amp;ssl=1 768w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=100%2C67&amp;ssl=1 100w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=862%2C574&amp;ssl=1 862w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-6.jpg?resize=1200%2C800&amp;ssl=1 1200w" width="864"></a></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1071" instrument_node="">Before scientists came up with a rational explanation, there were many </span><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">myths</span></strong><span data-dcnode-id="1068" instrument_node=""> and </span><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">legends</span></strong><span data-dcnode-id="1065" instrument_node=""> about the origins of the Milky Way galaxy. Most of those are associated with ancient gods and tell all kinds of stories about the spectacular and bright streak of stars across the night sky.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><h3 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Ancient Greece</span></h3><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">The story of Milky Way in ancient Greece involves love affair, half-god out of wedlock, and breastfeeding. Zeus was known for his frequent visits to Earth and hookups with women. According to Greek mythology, Zeus had several children one of whom was Heracles. There are several versions of the story, but they all involve baby Heracles. While Hera (wife of Zeus) was sleeping baby Heracles was let to suckle on the divine milk. When Hera woke up and noticed the infant, she flung him away spilling some of the milk. And just like that Milky Way was formed.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Ancient Armenia</span></h3><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">In ancient Armenia Milky Way was called “Straw Thief’s Way”. According to legend, the god of fire, thunder, and war Vahagn stole some straw from the Assyrian king Barsham and brought it to Armenia during a particularly cold winter. Vahagn was not very careful with his loot and the stars you see in the night sky are straw that was spilled during the heist.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><h3 data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Ancient Egypt</span></h3><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">In Egyptian mythology, the Milky Way was described as “Pool of Cow’s Milk”. Thus, paving way for ancient Greeks and Romans to adopt the idea of the milk. Milky Way was associated with a fertility cow-goddess Bat.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Cherokee</span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Indigenous people of the Southeastern Woodlands of the United States tell a story of a dog who stole some cornmeal and was chased away. He ran to the North, spilling the cornmeal along the way thus our Milky Way galaxy was known as “Where the dog ran”.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><h3 data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Eastern Asia</span></h3><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">In this part of the world Milky Way was known as “Silvery River”. Ancient Chinese folk tale tells a story of two lovers (stars Altair and Vega) in the night sky between cowherd and weaver girl. They were allowed to meet only once a year on the 7th day of the 7th month. That day is still celebrated today as Qi Xi, the Seventh Night.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Finno-Ugric people</span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">People living in areas of today’s Finland, Sweden, Estonia, Latvia, and Lithuania to this day still have not forgotten the old name of the Milky Way which is “The Pathway of the Birds”. Finns noticed that birds migrate to the south and believed they used Milky Way as guidance towards their destination Lintukoto (bird home).</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">These are just a few legends of Milky Way origin and you can find similar stories in practically every culture.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><h2 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Why Milky Way is white?</span></h2><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1020" instrument_node="">Our galaxy consists of approximately 250 ± 150 billion stars and stretches 100 billion light-years across. The human mind can barely grasp the size of our Solar system and here we are at the inner edge of the </span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Orion Arm</span></strong><span data-dcnode-id="1017" instrument_node=""> some 27,000 light-years from the center of Milky Way. This brings us to the </span><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">sad fact</span></strong><span data-dcnode-id="1014" instrument_node=""> that we only see a tiny fraction of our enormous galactic neighborhood. The distinct white color is due to the fact that we can see only the brightest stars with the unaided eye.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Add on top of that the high density of stars at the core of the Milky Way galaxy and you can see why ancient people associated that with milk, corn, straws, and other “milky” foods. Also, our eyesight compared to the whole visual spectrum is bad at the very least.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h2 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Best places to see the Milky Way galaxy</span></h2><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1003"><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg%3Fssl%3D1"><img alt="Best places to see Milky Way galaxy" class="alignnone size-full wp-image-852" data-dcnode-id="1005" data-recalc-dims="1" height="576" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg%3Fresize%3D864%252C576%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?w=1280&amp;ssl=1 1280w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=100%2C67&amp;ssl=1 100w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=862%2C575&amp;ssl=1 862w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-3.jpg?resize=1200%2C801&amp;ssl=1 1200w" width="864"></a></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">If you live in a well light area chances are you have not seen Milky Way in its full glory. By some estimates, </span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">1/3 of the world population</span></strong><span data-dcnode-id="998" instrument_node=""> has never seen Milky Way the way our ancestors, not that long ago, saw it every night.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Light pollution is just one of several obstacles for optimal stargazing of the Milky Way. Depending on where you live – the northern or southern hemisphere Milky Way can be best seen in different periods of time. Generally speaking from October till February it is nearly impossible to see the densest and most spectacular part of the Milky Way.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The southern hemisphere has a clear advantage when it comes to stargazing – longer and cooler nights offer much better viewing conditions and overall provide way more days suitable for the date with the cosmos.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">If you still haven’t seen one of those Milky Way time-lapse videos, I strongly suggest you watch one and see for yourself what you are missing out if you fit in the previously mentioned 1/3 of the world population. It is time to leave flashy city lights and gaze upon our galaxy.</span></p><span data-dcnode-id="987" instrument_node="">

</span><p data-dcnode-id="460"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg%3Fssl%3D1"><img alt="Best place and time to see Milky Way in Northern hemisphere" class="alignnone size-full wp-image-854" data-dcnode-id="462" data-recalc-dims="1" height="508" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg%3Fresize%3D864%252C508%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?w=1280&amp;ssl=1 1280w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=300%2C176&amp;ssl=1 300w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=1024%2C602&amp;ssl=1 1024w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=768%2C452&amp;ssl=1 768w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=100%2C59&amp;ssl=1 100w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=862%2C507&amp;ssl=1 862w, https://i0.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-5.jpg?resize=1200%2C706&amp;ssl=1 1200w" width="864"></a></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="458" instrument_node="">The best time to see the Milky Way in the Northern hemisphere is during the </span><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">summer</span></strong><span data-dcnode-id="455" instrument_node="">. Unfortunately, summer in the Northern hemisphere means shorter nights and a higher risk of clouds caused by humidity.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">You must also factor in the light coming from the Moon. During the full moon, it will be nearly impossible to see most of the Milky Way. Keep track of the moon phases and fallow the weather report accordingly.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="449" instrument_node="">Here is a useful timetable of the best viewing pleasure of the Milky Way in the </span><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Northern hemisphere. </span></strong><span data-dcnode-id="446" instrument_node="">It was created by </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Capturetheatlas</span></strong></a><span data-dcnode-id="442" instrument_node=""> and if you are into astrophotography I suggest you check them out.</span></p><span data-dcnode-id="440" instrument_node="">
[pdf-embedder url=”https://universeexplained.com/wp-content/uploads/2020/07/2020-Milky-Way-Calendar-East-Coast-USA.pdf” title=”2020 Milky Way Calendar Universe Explained”]
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">For the Northern hemisphere, the best place to see Milky Way is as far away from artificial light sources as possible. Although the picture above paints a grim picture, you can still find decent spots for stargazing.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="436" instrument_node="">Even an hour’s drive from the biggest cities will allow you to see the Milky Way to some degree. For example, I live in Riga, Latvia which has a population of about 1 million. An hour drive to the nearby </span><strong data-dcnode-id="433"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visittukums.lv/en/What-to-see/Nature-places/The-Big-Kemeri-bog-and-trail" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="435" instrument_node="">Ķemeru bog</span></a></strong><span data-dcnode-id="432" instrument_node=""> and you can have a pretty good sight to behold. You can still see the light coming from the city in the back but overall, it is pretty good.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="429" instrument_node="">Some of the most iconic places to observe the Milky Way is in the remote areas of United States – </span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Central Nevada, Eastern Utah, Montana, Death Valley in California, Breckenridge in Colorado</span></strong><span data-dcnode-id="426" instrument_node=""> and </span><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Hawaii</span></strong><span data-dcnode-id="423" instrument_node="">.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="420" instrument_node="">If you are from Europe, then </span><strong data-dcnode-id="417"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestryandland.gov.scot/visit/forest-parks/galloway-forest-park/dark-skies" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="419" instrument_node="">Galloway International Dark Sky Park</span></a></strong><span data-dcnode-id="416" instrument_node=""> in southwest Scotland, UK is your best bet. It is far away from any artificial light sources and offers pitch-black skies with the jaw-dropping sight of our home galaxy. If you are planning on going there I strongly suggest you visit </span><strong data-dcnode-id="412"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitscotland.com/info/see-do/scottish-dark-sky-observatory-p905131" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="415" instrument_node="">The Scottish Dark Sky Observatory</span></a><span data-dcnode-id="413" instrument_node=""> </span></strong><span data-dcnode-id="411" instrument_node="">as well.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="408" instrument_node="">For a more luxurious experience, you can visit </span><strong data-dcnode-id="405"><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picdumidi.com/%3Flang%3Den" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="407" instrument_node="">Pic du Midi Observatory</span></a></strong><span data-dcnode-id="404" instrument_node=""> in the Pyrenees mountains, France. You can even book the room and stay the night for some unforgettable experience.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="401" instrument_node="">Despite being only 70km away from Berlin, which is one of the largest cities in Europe –</span><strong data-dcnode-id="397"><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sternenpark-havelland.de/kontakt.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="400" instrument_node="">Naturpark Westhavelland</span></a><span data-dcnode-id="398" instrument_node=""> </span></strong><span data-dcnode-id="396" instrument_node="">in Germany offers spectacular stargazing all year round. I could not find the English version of the webpage, but Google translate did a pretty good job.</span></p><span data-dcnode-id="394" instrument_node="">
</span><h3 data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Best places and time to see Milky Way in Southern hemisphere</span></h3><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="388"><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg%3Fssl%3D1"><img alt="Best place and time to see Milky Way in Southern hemisphere" class="alignnone size-full wp-image-856" data-dcnode-id="390" data-recalc-dims="1" height="486" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg%3Fresize%3D864%252C486%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?w=1280&amp;ssl=1 1280w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=300%2C169&amp;ssl=1 300w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=1024%2C576&amp;ssl=1 1024w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=768%2C432&amp;ssl=1 768w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=100%2C56&amp;ssl=1 100w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=862%2C485&amp;ssl=1 862w, https://i1.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-7.jpg?resize=1200%2C675&amp;ssl=1 1200w" width="864"></a></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="386" instrument_node="">Here is a different timetable of the best viewing pleasure of the Milky Way in the </span><strong data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Southern hemisphere. </span></strong><span data-dcnode-id="383" instrument_node="">Staff at </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Capturetheatlas</span></strong></a><span data-dcnode-id="379" instrument_node=""> have several calendars for different parts of the world. Thumbs up for a great job!</span></p><span data-dcnode-id="377" instrument_node="">
[pdf-embedder url=”https://universeexplained.com/wp-content/uploads/2020/07/2020-Milky-Way-Calendar-Australia.pdf” title=”2020 Milky Way Calendar – Australia”]
</span><p data-dcnode-id="363"><span data-dcnode-id="376" instrument_node="">If you are from down under, then Australian Outback is impossible to beat. It is located far away from any light source and will provide a sense of ancient times present at the moment. Based on the reviews some of the best areas include </span><strong data-dcnode-id="373"><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arkaroola.com.au/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="375" instrument_node="">Arkaroola Wilderness Sanctuary</span></a></strong><span data-dcnode-id="372" instrument_node="">, </span><strong data-dcnode-id="369"><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uluru" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="371" instrument_node="">Uluru or Ayers Rock</span></a></strong><span data-dcnode-id="368" instrument_node=""> , and </span><strong data-dcnode-id="365"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalparks.nsw.gov.au/visit-a-park/parks/warrumbungle-national-park" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="367" instrument_node="">Warrumbungle National Park</span></a></strong><span data-dcnode-id="364" instrument_node="">.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="361" instrument_node="">If you happen to be anywhere near Namibia, then definitely check out the Namib Desert. It is far away from any kind of light pollution and offers some of the darkest nights imaginable. There is even a small </span><strong data-dcnode-id="358"><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.andbeyond.com/experiences/africa/namibia/sossusvlei-desert/stargazing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="360" instrument_node="">observatory and desert lodge</span></a></strong><span data-dcnode-id="357" instrument_node=""> to make your stay even more memorable. The desert itself is quite flat and offers little to no obstacles for your stargazing experience. Deserts, in general, offer great visibility and true night time experience.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">It is hard to pick the best spot for viewing Milky Way, but Uyuni Salt Flats in Bolivia has to be it. This is one of the flattest places on Earth with blindingly white and even reflective surfaces. It is a truly bizarre, almost alien-like place and a perfect spot to gaze into the Universe. If you pick the right spot the Milky Way actually is reflected on the surface adding an insane amount of bonus points to guarantee an unforgettable night in one of the most desolated and harshest places on the Earth.</span></p><span data-dcnode-id="352" instrument_node="">
</span><h2 data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Conclusion</span></h2><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="346"><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg%3Fssl%3D1"><img alt="Milky Way above the cliff" class="alignnone size-full wp-image-853" data-dcnode-id="348" data-recalc-dims="1" height="572" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg%3Fresize%3D864%252C572%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?w=1280&amp;ssl=1 1280w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=300%2C199&amp;ssl=1 300w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=1024%2C678&amp;ssl=1 1024w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=768%2C508&amp;ssl=1 768w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=100%2C66&amp;ssl=1 100w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=862%2C570&amp;ssl=1 862w, https://i2.wp.com/universeexplained.com/wp-content/uploads/2020/07/How-did-the-Milky-Way-galaxy-get-its-name-Universe-Explained-4.jpg?resize=1200%2C794&amp;ssl=1 1200w" width="864"></a></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="344" instrument_node="">If you are packing for a stargazing trip you might want to check out one of my previous articles about the </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//universeexplained.com/stargazing-equipment-for-beginners/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">stargazing equipment for beginners</span></strong></a><span data-dcnode-id="340" instrument_node="">. It covers some of the basic and essential things you should definitely grab for the trip. Otherwise, you just answered the question “How did the Milky Way galaxy get its name?”, learned a bunch of mythology and a whole lot of places to add to your bucket list.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="337" instrument_node="">Perhaps the time has come to skip snowboarding this year and visit </span><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Galloway International Dark Sky Park.&nbsp;</span></strong><span data-dcnode-id="334" instrument_node="">Relatively close to where I live and even got some friends living in Scotland.</span></p><span data-dcnode-id="332" instrument_node="">
