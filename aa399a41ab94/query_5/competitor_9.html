</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">The&nbsp;Tadpole galaxy is named the Tadpole galaxy because it’s shape and star formation resembles that is a Tadpole.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><img alt="" class="aligncenter size-full wp-image-3486" data-dcnode-id="682" height="480" sizes="(max-width: 444px) 85vw, 444px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ouruniverseforkids.com/wp-content/uploads/2018/12/tadpole.jpg&amp;raw" srcset="https://www.ouruniverseforkids.com/wp-content/uploads/2018/12/tadpole.jpg 444w, https://www.ouruniverseforkids.com/wp-content/uploads/2018/12/tadpole-278x300.jpg 278w" width="444"></p><span data-dcnode-id="680" instrument_node="">

</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The tail of the galaxy alone is made up of stars that are around 280 million light years. This is massive. The merger of the head and tail of the galaxy is believed to have happened around 100 million years ago.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The galaxy is likely in time to break up&nbsp;at its tail&nbsp;and lose it’s formation, creating new smaller galaxies as a result.</span></p><span data-dcnode-id="671" instrument_node="">
