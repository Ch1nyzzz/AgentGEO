</span><h1 data-dcnode-id="5912" style="text-align: center;"><span data-dcnode-id="5913" instrument_node="">How to Photograph the Milky Way</span></h1><span data-dcnode-id="5911" instrument_node="">
</span><p data-dcnode-id="5897"><span data-dcnode-id="5910" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5899" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5901" id="_aaaaa"><span class="pv-outer" data-dcnode-id="5902"><span class="pv-inner" data-dcnode-id="5903" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Arches National Park" class="pv-img pv-burned" data-dcnode-id="5909" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2865758074-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="5906"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">The Milky Way rises over Arches National Park</span></span></span><span class="pv-pinit" data-dcnode-id="5904" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2865758074-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaaapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5905" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5900" instrument_node="">

</span><h1 data-dcnode-id="5891" style="text-align: center;"><span data-dcnode-id="5892" instrument_node="">Latest Updates</span></h1><span data-dcnode-id="5890" instrument_node="">
</span><hr data-dcnode-id="5889"><span data-dcnode-id="5888" instrument_node="">
</span><p data-dcnode-id="5874"><span data-dcnode-id="5887" instrument_node="">If you're interested in capturing images of nebula and galaxies, you'll want to check out my new Deep Space Course!&nbsp; This course has over 9 hours of content which will teach you how to find, photograph, and edit deep space objects.&nbsp; All you need to get started is a DSLR, star tracker, and telephoto lens!&nbsp; </span><a data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/deep-space-course" target="_blank"><span data-dcnode-id="5886" instrument_node="">Click here to read more about the Deep Space Course</span></a><span data-dcnode-id="5884" instrument_node="">.</span><br data-dcnode-id="5883"><span data-dcnode-id="5882" instrument_node="">
</span><br data-dcnode-id="5881"><span data-dcnode-id="5880" instrument_node="">
As you might already know, a star tracker is one of the best ways to capture better images at night.&nbsp; However, they can be quite difficult to use properly, and there isn't much good information online.&nbsp; Therefore, I set out to create a comprehensive tutorial package for each star tracker, including&nbsp;the iOptron SkyTracker Pro and SkyGuider Pro, as well as the Sky-Watcher Star Adventurer&nbsp;and Star Adventurer Mini.&nbsp; These courses are designed to show you the entire process for capturing amazing images at night.&nbsp; While some of this information is covered in this free tutorial page, I've gone much more in-depth on every subject and put it into an easy-to-follow video format.&nbsp; Most importantly, I've included hours of tutorial videos that will show you exactly how to setup your star tracker in the field!&nbsp; For more information,&nbsp;</span><strong data-dcnode-id="5876"><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/star-tracker-tutorials" target="_blank"><span data-dcnode-id="5878" style="color:#808080;"><span data-dcnode-id="5879" instrument_node="">head over to the Star Tracker Tutorials page</span></span></a></strong><span data-dcnode-id="5875" instrument_node="">!</span></p><span data-dcnode-id="5873" instrument_node="">
</span><p data-dcnode-id="5861"><span data-dcnode-id="5872" instrument_node="">If you want to learn how to edit your astro photos, then you'll love my new </span><strong data-dcnode-id="5868"><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/astrophotography-post-processing" target="_blank"><span data-dcnode-id="5870" style="color:#808080;"><span data-dcnode-id="5871" instrument_node="">Astrophotography Post-Processing Course</span></span></a></strong><span data-dcnode-id="5867" instrument_node="">.&nbsp; It's jam packed with over 7 hours of tutorial videos!&nbsp; For beginners, I've included basic tutorials for Photoshop, Camera RAW, and Bridge, which will help you learn the main features of each application.&nbsp; I've even included some of my own RAW files, so you can follow along and practice&nbsp;if you don't have your own images yet.&nbsp; For advanced users, I've created multiple full-length workflows for nightscape images as well as deep space astrophotography.&nbsp; One of the most important skills we'll be covering is exposure blending using Luminosity Masks.&nbsp; This technique will allow you to cleanly, and easily, blend your foreground and sky images.&nbsp; For more information, head over to the official </span><strong data-dcnode-id="5863"><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/astrophotography-post-processing" target="_blank"><span data-dcnode-id="5865" style="color:#808080;"><span data-dcnode-id="5866" instrument_node="">Astrophotography Post-Processing Course</span></span></a></strong><span data-dcnode-id="5862" instrument_node="">!</span></p><span data-dcnode-id="5860" instrument_node="">
</span><p data-dcnode-id="5847"><span data-dcnode-id="5859" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5851" style="width:924px;height:617px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5853" id="_aaaba"><span class="pv-outer" data-dcnode-id="5854"><span class="pv-inner" data-dcnode-id="5855" style="left:0px;top:0px;width:924px;height:617px;"><img class="pv-img pv-burned" data-dcnode-id="5858" height="617" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2993643064-5.jpg&amp;raw" style="left:0px;top:0px;width:925px;height:617px;" width="925"><span class="pv-pinit" data-dcnode-id="5856" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2993643064-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaabapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5857" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5852" instrument_node="">

</span><h1 data-dcnode-id="5841" style="text-align: center;"><span data-dcnode-id="5842" instrument_node="">Planning your Photoshoot</span></h1><span data-dcnode-id="5840" instrument_node="">
</span><hr data-dcnode-id="5839"><span data-dcnode-id="5838" instrument_node="">
</span><h2 data-dcnode-id="5833"><br data-dcnode-id="5837"><span data-dcnode-id="5836" instrument_node="">
</span><span data-dcnode-id="5834" style="font-size: 26px;"><span data-dcnode-id="5835" instrument_node="">Milky Way Location</span></span></h2><span data-dcnode-id="5832" instrument_node="">
</span><p data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">First, you need to know when and where the Milky Way will be in the sky. &nbsp;For those of us in the northern hemisphere, the core of the Milky Way is always in the southern sky. &nbsp;Keep in mind, "Milky Way Season" runs from April - October in most cases. &nbsp;In the winter months (November - February)&nbsp;the core is not visible. &nbsp;In Spring, the Milky Way will be in the Southeastern sky very early in the morning (3-5AM). &nbsp;In the Summer, the Milky Way will be due South and will be up all night. &nbsp;In the Fall, the Milky Way will be in the Southwest portion of the sky early at night (8PM-12AM).&nbsp;</span></p><span data-dcnode-id="5829" instrument_node="">
</span><p data-dcnode-id="5818"><span data-dcnode-id="5828" instrument_node="">I highly recommend using </span><span data-dcnode-id="5824" style="font-size:14px;"><strong data-dcnode-id="5825"><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stellarium.org/" target="_blank"><span data-dcnode-id="5827" instrument_node="">Stellarium</span></a></strong></span><span data-dcnode-id="5823" instrument_node="">, a free Desktop application. &nbsp;It is also available on the App Store and Google Play for $2.50. &nbsp;Stellarium allows you to select any location on Earth and see what the night sky will look like. &nbsp;I've been using Stellarium to plan all of my night photos for over a year now. The smartphone app&nbsp;has everything you will need when shooting out in the field.&nbsp; One thing to be aware of: Stellarium does not account for timezone differences.&nbsp; This can make planning a photoshoot confusing&nbsp;if you are using a location in a different timezone from your own.&nbsp; </span><u data-dcnode-id="5820"><a data-dcnode-id="5821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/stellariumuserguide/plugins%23TOC-Time-Zone-plugin" target="_blank"><span data-dcnode-id="5822" instrument_node="">Click here for more information and a fix for that particular issue</span></a></u><span data-dcnode-id="5819" instrument_node="">.</span></p><span data-dcnode-id="5817" instrument_node="">
</span><p data-dcnode-id="5807"><span data-dcnode-id="5816" instrument_node="">You should also get </span><strong data-dcnode-id="5813"><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//photoephemeris.com/" target="_blank"><span data-dcnode-id="5815" instrument_node="">TPE (The Photographer's Ephemeris)</span></a></strong><span data-dcnode-id="5812" instrument_node=""> to help plan out your photos.&nbsp; This app is a must-have for landscape photographers, and it also includes great information for nightscape photographers.&nbsp; It will show the path of the moon, if it's above the horizon, the civil / nautical / and astronomical twilight times, as well as the sun / moon rise / set times.&nbsp; This is one of my most-used apps when I'm doing photography.&nbsp; &nbsp;&nbsp;</span><br data-dcnode-id="5811"><span data-dcnode-id="5810" instrument_node="">
</span><br data-dcnode-id="5809"><span data-dcnode-id="5808" instrument_node="">
Don't forget, you can also look North for a different take on the Milky Way. &nbsp;I've found that some of my favorite Milky Way photos taken recently have actually be facing North, not South.</span></p><span data-dcnode-id="5806" instrument_node="">
</span><p data-dcnode-id="5790"><span data-dcnode-id="5805" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5792" style="width:944px;height:790px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5794" id="_aaaca"><span class="pv-outer" data-dcnode-id="5795"><span class="pv-inner" data-dcnode-id="5796" style="left:0px;top:0px;width:944px;height:790px;"><img alt="Trillium Lake - Midnight" class="pv-img pv-burned" data-dcnode-id="5804" height="790" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2683025316-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:790px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="5799"><span class="pv-zb-text-t pv-font1 pv-color1" data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">Trillium Lake - Midnight</span></span><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">The Milky Way shines brightly over Trillium Lake. Mount Hood can be seen in the distance</span></span></span><span class="pv-pinit" data-dcnode-id="5797" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2683025316-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaacapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5798" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5793" instrument_node="">
</span></span><span data-dcnode-id="5791" instrument_node="">
</span></p><span data-dcnode-id="5789" instrument_node="">
</span><p data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5786" instrument_node="">
</span><h2 data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="5783" instrument_node="">
</span><h2 data-dcnode-id="5780"><span data-dcnode-id="5781" style="font-size:26px;"><span data-dcnode-id="5782" instrument_node="">Dark Sky Map</span></span></h2><span data-dcnode-id="5779" instrument_node="">
</span><p data-dcnode-id="5772"><span data-dcnode-id="5778" instrument_node="">Next, you need to find a location with dark enough skies. &nbsp;If you are anywhere near a major source of light pollution the Milky Way will probably not be visible.&nbsp; I highly recommend using this </span><span data-dcnode-id="5774" style="font-size:14px;"><strong data-dcnode-id="5775"><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//darksitefinder.com/maps/world.html" target="_blank"><span data-dcnode-id="5777" instrument_node="">Dark Sky Map</span></a></strong></span><span data-dcnode-id="5773" instrument_node=""> as a guide to finding dark locations near you. &nbsp;Remember, the core of the Milky Way will be in the southern sky, so it's best to find locations that don't have any orange or red locations south of your position. &nbsp;Living in Northeast Ohio, it is very hard to find suitable locations for photographing the Milky Way. &nbsp;In my experience, even a Yellow area can be dark enough to get some good shots. &nbsp;If you are lucky enough to live near a dark sky with no light pollution, you will have a much easier time taking and editing your Milky Way photos.</span></p><span data-dcnode-id="5771" instrument_node="">
</span><p data-dcnode-id="5739"><span data-dcnode-id="5770" instrument_node="">There's a few different options for mobile apps. &nbsp;First up is the </span><a data-dcnode-id="5768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.pa.lightpollutionmap%26hl%3Den" target="_blank"><span data-dcnode-id="5769" instrument_node="">Light Pollution Map - Dark Sky Finder Astro Tools</span></a><span data-dcnode-id="5767" instrument_node="">. &nbsp;One feature I love in this app is that you can see whether light pollution on the horizon will affect you. &nbsp;If you press and hold a location on the map, a circle will form around the point. &nbsp;You can now see if light pollution will be visible on the horizon. &nbsp;This app also has the ability to show the Aurora location and strength. &nbsp;The app is free, but some more advanced features require you to purchase the Pro edition.</span><br data-dcnode-id="5766"><span data-dcnode-id="5765" instrument_node="">
</span><br data-dcnode-id="5764"><span data-dcnode-id="5763" instrument_node="">
If you just want a simple&nbsp;Dark Sky app, then </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.graebr.darkskymap%26hl%3Den" target="_blank"><span data-dcnode-id="5762" instrument_node="">I'd recommend this one</span></a><span data-dcnode-id="5760" instrument_node="">.</span><br data-dcnode-id="5759"><span data-dcnode-id="5758" instrument_node="">
</span><br data-dcnode-id="5757"><span data-dcnode-id="5756" instrument_node="">
To understand the role light pollution will play in your Milky Way photos, take a look at the 2 images below. &nbsp;The first image was taken in Joshua Tree National Park looking southwest. &nbsp;The second image was taken&nbsp;at Black Canyon of the Gunnison National Park looking south. &nbsp;Use the Dark Sky Map to see the difference in Light Pollution at each National Park.&nbsp;&nbsp;</span><br data-dcnode-id="5755"><span data-dcnode-id="5754" instrument_node="">
</span><br data-dcnode-id="5753"><span data-dcnode-id="5752" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5741" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5743" id="_aaada"><span class="pv-outer" data-dcnode-id="5744"><span class="pv-inner" data-dcnode-id="5745" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Light Pollution" class="pv-img pv-burned" data-dcnode-id="5751" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p835959024-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="5748"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">Light Polluted skies in Joshua Tree National Park</span></span></span><span class="pv-pinit" data-dcnode-id="5746" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p835959024-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaadapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5747" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5742" instrument_node="">
</span></span><span data-dcnode-id="5740" instrument_node="">
</span></p><span data-dcnode-id="5738" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5737" instrument_node="">

</span><h2 data-dcnode-id="5714"><span data-dcnode-id="5715" style="font-size:26px;"><span data-dcnode-id="5716" instrument_node="">Weather Forecast</span></span></h2><span data-dcnode-id="5713" instrument_node="">
</span><p data-dcnode-id="5705"><span data-dcnode-id="5712" instrument_node="">I recommend using </span><span data-dcnode-id="5707" style="font-size:14px;"><strong data-dcnode-id="5709"><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleardarksky.com/csk/" target="_blank"><span data-dcnode-id="5711" instrument_node="">Clear Dark&nbsp;Sky forecasts</span></a></strong><span data-dcnode-id="5708" instrument_node="">.</span></span><span data-dcnode-id="5706" instrument_node=""> &nbsp;These are a bit tricky to understand at first.&nbsp; Basically, you want as many rows as possible on the chart to be dark blue. &nbsp;The darker the blue, the better the conditions will be. &nbsp;This forecast is specialized for Astronomers and Astrophotographers with telescopes, so it may be a bit overkill for normal photographers. &nbsp;I've found it's more accurate than a standard forecast though. &nbsp;Another important thing to keep in mind is the moon. &nbsp;In order to get great Milky Way photos, the moon can not be out. &nbsp;Therefore, it's best to wait until the new moon each month, or use Stellarium to see if the moon will be below the horizon&nbsp;when you are out.</span></p><span data-dcnode-id="5704" instrument_node="">
</span><p data-dcnode-id="5690"><span data-dcnode-id="5703" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5692" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5694" id="_aaafa"><span class="pv-outer" data-dcnode-id="5695"><span class="pv-inner" data-dcnode-id="5696" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Milky Way " class="pv-img pv-burned" data-dcnode-id="5702" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p1891624800-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span data-dcnode-id="5699" style="display:none;"><span data-dcnode-id="5700"><span data-dcnode-id="5701" instrument_node="">The Northern portion of the Milky Way over Medano Creek in Great Sand Dunes National Park</span></span></span><span class="pv-pinit" data-dcnode-id="5697" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p1891624800-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaafapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5698" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5693" instrument_node="">

</span><h1 data-dcnode-id="5684" style="text-align: center;"><span data-dcnode-id="5685" instrument_node="">&nbsp;</span></h1><span data-dcnode-id="5683" instrument_node="">
</span><h1 data-dcnode-id="5681" style="text-align: center;"><span data-dcnode-id="5682" instrument_node="">Camera Gear</span></h1><span data-dcnode-id="5680" instrument_node="">
</span><hr data-dcnode-id="5679"><span data-dcnode-id="5678" instrument_node="">
</span><p data-dcnode-id="5672"><span data-dcnode-id="5677" instrument_node="">Any modern DSLR can take decent photos of the Milky Way. &nbsp;The major problem you will have with any camera is noise / grain.&nbsp; The camera's electronics always produce a low-level of 'noise'.&nbsp; Have you ever heard white noise when turning on your speakers or headphones?&nbsp; Once you start playing music, the white noise is no longer audible.&nbsp; It's a similar concept with cameras.&nbsp; You need to capture enough light to overpower the camera's 'white noise'.&nbsp; Older cameras have more 'white noise' and will perform worse in low-light scenarios.&nbsp; This concept is called Signal to Noise Ratio (SNR).&nbsp; </span><u data-dcnode-id="5674"><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cambridgeincolour.com/tutorials/image-noise.htm" target="_blank"><span data-dcnode-id="5676" instrument_node="">Click here to learn more about SNR</span></a></u><span data-dcnode-id="5673" instrument_node="">.</span></p><span data-dcnode-id="5671" instrument_node="">
</span><p data-dcnode-id="5665"><span data-dcnode-id="5670" instrument_node="">The next thing to consider is your camera's sensor size.&nbsp; The larger the sensor, the more light it can capture.&nbsp; Many entry level Crop-Sensor cameras will start to see heavy noise around&nbsp;IS0 800. &nbsp;A Full-Frame camera can shoot at much higher ISO's with better noise control. &nbsp;Full-Frame cameras also allow you to capture a wider view of the sky, provided you use a wide-angle lens; this&nbsp;also allows you to take longer exposures without any star movement. &nbsp;A Wide Angle lens can also help with Milky Way compositions, as you will have room for the Milky Way and foreground.&nbsp; </span><u data-dcnode-id="5667"><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northrup.photo/gear-basics/camera-body-features/sensor-size-crop-factor/" target="_blank"><span data-dcnode-id="5669" instrument_node="">For more information on crop-sensors vs full-frame sensors, read this article</span></a></u><span data-dcnode-id="5666" instrument_node="">.</span></p><span data-dcnode-id="5664" instrument_node="">
</span><p data-dcnode-id="5656"><span data-dcnode-id="5663" instrument_node="">I want to be very clear here, </span><strong data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">the best way to get higher-quality Milky Way photos is to capture more light</span></strong><span data-dcnode-id="5660" instrument_node="">.&nbsp; I recommend using a long shutter speed to capture more light.&nbsp; You could buy the most expensive camera in the world, but the photos still won't look great at the typical ISO 6400, f/2.8, and 25 second shutter speed.&nbsp; That's because the camera still only captured 25 seconds of light.&nbsp; If you capture </span><em data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">4 minutes</span></em><span data-dcnode-id="5657" instrument_node=""> of light though, the images will be vastly better.&nbsp; Therefore, even an entry-level DSLR with a long shutter speed can capture great Milky Way photos.&nbsp; There's just one problem though, we can't take 4 minute long photos without the stars blurring.</span></p><span data-dcnode-id="5655" instrument_node="">
</span><p data-dcnode-id="5649"><span data-dcnode-id="5654" instrument_node="">One of the best purchases&nbsp;I made for Milky Way photography was a star tracker.&nbsp;&nbsp;</span><u data-dcnode-id="5651"><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/11/star-tracker-tutorial" target="_blank"><span data-dcnode-id="5653" instrument_node="">You can read my Star Tracker Tutorial on my blog</span></a></u><span data-dcnode-id="5650" instrument_node="">.&nbsp; This device moves the camera at the same speed as the stars, allowing you to take much longer photos without star trails!&nbsp; Since you are now capturing much more light, your lens' aperture and camera's ISO performance no longer matter as much.&nbsp; For example, when using my 14mm lens with a star tracker, I can now take a 4 minute long photo and capture up to 8 times the amount of light!&nbsp; Normally I'd be limited to a 20 second exposure before the stars began to show movement.&nbsp; Having had a chance to use a star tracker on my 2017 roadtrip, I would recommend purchasing this device over an expensive new lens.&nbsp; Even with the best, most expensive, wide angle lens,&nbsp;you will always be limited to a ~20 shutter speed.&nbsp; Therefore, your images will always be grainy.&nbsp; The star tracker can help produce beautiful, clean, detailed images even with a relatively cheap lens and entry level camera!&nbsp; I cover Star Trackers in depth further down in the tutorial.</span></p><span data-dcnode-id="5648" instrument_node="">

If you currently can't afford a star tracker, there is another option for higher quality night photos.&nbsp; I recommend shooting multiple exposures in order to reduce noise. &nbsp;This process is called Median Stacking.&nbsp;</span><span data-dcnode-id="5115" style="font-size:14px;"><span data-dcnode-id="5119" instrument_node=""> </span><strong data-dcnode-id="5116"><a data-dcnode-id="5117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//petapixel.com/2013/05/29/a-look-at-reducing-noise-in-photographs-using-median-blending/" target="_blank"><span data-dcnode-id="5118" instrument_node="">This blog</span></a></strong></span><span data-dcnode-id="5114" instrument_node="">&nbsp;by Pat David&nbsp;does an excellent job of explaining the&nbsp;process in detail.&nbsp; You will need 10+ images to effectively remove noise.&nbsp; </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/sequatorglobal/" target="_blank"><strong data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">I recommend using Sequator to stack your images</span></strong></a><span data-dcnode-id="5110" instrument_node="">.&nbsp; It does a great job with wide angle photos and deep space images!&nbsp; </span><u data-dcnode-id="5107"><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dql4bEnJc4hE" target="_blank"><span data-dcnode-id="5109" instrument_node="">Click here to watch my YouTube tutorial for Sequator, where I show exactly how to use it</span></a></u><span data-dcnode-id="5106" instrument_node="">.</span></p><span data-dcnode-id="5104" instrument_node="">
</span><p data-dcnode-id="5097"><span data-dcnode-id="5101" style="font-size:16px;"><strong data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">*Sony Users:&nbsp;&nbsp;</span></strong></span><span data-dcnode-id="5100" instrument_node="">There is currently a major bug with some Sony mirrorless cameras, including the&nbsp;a7SII,&nbsp;a7RII, and a7RIII.&nbsp; Basically, the camera will automatically remove&nbsp;stars in your image, in an attempt to reduce noise and hot pixels.&nbsp; This flaw has been identified by the astro community and reported to Sony, who have yet to issue a fix.&nbsp; For more information, </span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/how-to-fix-sony-star-eater-on-the-a7sii-and-a7rii-continuous-shutter-mode-workaround/" target="_blank"><span data-dcnode-id="5099" instrument_node="">visit the Lonely Speck website.</span></a></p><span data-dcnode-id="5096" instrument_node="">
</span><p data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5093" instrument_node="">
</span><p data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5090" instrument_node="">
</span><h2 data-dcnode-id="5087"><span data-dcnode-id="5088" style="font-size:26px;"><span data-dcnode-id="5089" instrument_node="">Coma</span></span></h2><span data-dcnode-id="5086" instrument_node="">
</span><p data-dcnode-id="5080"><span data-dcnode-id="5085" instrument_node="">A lens that has bad aberrations can ruin your Milky Way images. &nbsp;</span><strong data-dcnode-id="5082"><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intothenightphoto.blogspot.com/2013/02/overcoming-coma-aberration-part-2.html" target="_blank"><span data-dcnode-id="5084" instrument_node="">This article explains exactly what Coma is</span></a></strong><span data-dcnode-id="5081" instrument_node="">.&nbsp; Many lenses produce awful coma, or star distortion.&nbsp; This causes the stars to lose their sharp, spherical look. &nbsp;The example below was taken with the Sigma 35mm Art lens at f/1.4. &nbsp;I cropped in heavily to the upper-right corner of the image.&nbsp; These "winged stars" are actually the result of astigmatism in the lens, often referred to as coma.&nbsp; If you stop the lens down to f/4, the stars will look normal.&nbsp; However, we've just lost 8 times the amount of light!&nbsp; Again, this is where the star tracker can come in handy.&nbsp; You can take a longer shutter speed with the f/4 aperture and get the best of both worlds, sharp stars and lots of light.&nbsp; Some lenses have bad coma that affect stars across the entire image. &nbsp;Therefore, it is recommended to use a lens with minimal coma for your Milky Way photos.</span></p><span data-dcnode-id="5079" instrument_node="">
</span><p data-dcnode-id="5073"><span data-dcnode-id="5078" instrument_node="">I recommend reading </span><strong data-dcnode-id="5075"><a data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/a-practical-guide-to-lens-aberrations-and-the-lonely-speck-aberration-test/" target="_blank"><span data-dcnode-id="5077" instrument_node="">this excellent article on Lens Aberrations over at Lonely Speck</span></a></strong><span data-dcnode-id="5074" instrument_node="">, it describes all of the major aberrations you may notice when photographing the stars.</span></p><span data-dcnode-id="5072" instrument_node="">
</span><p data-dcnode-id="5056"><span data-dcnode-id="5071" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="5060" style="width:944px;height:629px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="5062" id="_aaaha"><span class="pv-outer" data-dcnode-id="5063"><span class="pv-inner" data-dcnode-id="5064" style="left:0px;top:0px;width:944px;height:629px;"><img alt="Coma Example" class="pv-img pv-burned" data-dcnode-id="5070" height="629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2091895072-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:629px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="5067"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">Sigma 35mm f/1.4 coma</span></span></span><span class="pv-pinit" data-dcnode-id="5065" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2091895072-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaahapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="5066" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="5061" instrument_node="">
</span></span><span data-dcnode-id="5059" instrument_node="">
</span><br data-dcnode-id="5058"><span data-dcnode-id="5057" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="5055" instrument_node="">
</span><h2 data-dcnode-id="5052"><span data-dcnode-id="5053" style="font-size:26px;"><span data-dcnode-id="5054" instrument_node="">Lens Recommendations</span></span></h2><span data-dcnode-id="5051" instrument_node="">
</span><p data-dcnode-id="5046"><span data-dcnode-id="5050" instrument_node="">The lens you choose is one of the most important factors in capturing good Milky Way photos. &nbsp;You can have the best camera body available, but a bad lens choice will ruin your star photos. &nbsp;I've spent many hours researching the best&nbsp;lenses for </span><span data-dcnode-id="5048" style="line-height: 18px;"><span data-dcnode-id="5049" instrument_node="">night photography</span></span><span data-dcnode-id="5047" instrument_node="">.&nbsp; Every lens listed below is wide-angle, which will allow you to capture nightscape photos with a foreground.&nbsp;</span></p><span data-dcnode-id="5045" instrument_node="">
</span><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">If you want higher quality nightscapes, you'll want to create panoramas using a 35mm, 50mm, or even 85mm lens.&nbsp; I personally use the Sigma 35mm Art lens when I do any night-time panoramas.&nbsp; The Sigma 50mm Art would be another great option.&nbsp; Keep in mind, doing panoramas at night is quite hard.&nbsp; I would not recommend this approach for beginners.&nbsp; Wide angles lenses&nbsp;will make everything much easier.</span></p><span data-dcnode-id="5042" instrument_node="">
</span><p data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Out of all the lens manufacturers, the clear winner, for the price,&nbsp;is the Rokinon / Samyang brand. &nbsp;They make good, cheap, manual focus lenses. &nbsp;Oddly enough, many Nikon&nbsp;and Canon lenses are awful for taking Milky Way photos. &nbsp;Below is a list of the top Astrophotography lenses:</span></p><span data-dcnode-id="5039" instrument_node="">
</span><ol data-dcnode-id="4997"><span data-dcnode-id="5038" instrument_node="">
</span><li data-dcnode-id="5034"><span data-dcnode-id="5035" style="font-size:16px;"><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/520635-USA/Nikon_2163_AF_S_Zoom_Nikkor_14_24mm.html" target="_blank"><span data-dcnode-id="5037" instrument_node="">Nikon 14-24mm</span></a></span></li><span data-dcnode-id="5033" instrument_node="">
</span><li data-dcnode-id="5029"><a data-dcnode-id="5030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1390819-REG/sigma_212955_14_24mm_f_2_8_dg_hsm.html" target="_blank"><span data-dcnode-id="5031" style="font-size:16px;"><span data-dcnode-id="5032" instrument_node="">Sigma 14-24mm</span></span></a></li><span data-dcnode-id="5028" instrument_node="">
</span><li data-dcnode-id="5024"><span data-dcnode-id="5025" style="font-size:16px;"><a data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1083963-REG/tamron_sp_15_30mm_f_2_8_di.html" target="_blank"><span data-dcnode-id="5027" instrument_node="">Tamron 15-30mm</span></a></span></li><span data-dcnode-id="5023" instrument_node="">
</span><li data-dcnode-id="5019"><a data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1321307-REG/sigma_14mm_f_1_8_dg_hsm.html" target="_blank"><span data-dcnode-id="5021" style="font-size:16px;"><span data-dcnode-id="5022" instrument_node="">Sigma 14mm</span></span></a></li><span data-dcnode-id="5018" instrument_node="">
</span><li data-dcnode-id="5014"><span data-dcnode-id="5015" style="font-size:16px;"><a data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/769555-REG/Rokinon_FE14MAF_N_14mm_Ultra_Wide_Angle_f_2_8.html" target="_blank"><span data-dcnode-id="5017" instrument_node="">Rokinon 14mm</span></a></span></li><span data-dcnode-id="5013" instrument_node="">
</span><li data-dcnode-id="5009"><a data-dcnode-id="5010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/819106-REG/Rokinon_RK24MAFN_24mm_f_1_4_ED_AS.html" target="_blank"><span data-dcnode-id="5011" style="font-size:16px;"><span data-dcnode-id="5012" instrument_node="">Rokinon 24mm</span></span></a></li><span data-dcnode-id="5008" instrument_node="">
</span><li data-dcnode-id="5004"><span data-dcnode-id="5005" style="font-size:16px;"><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/898836-REG/Sigma_340306_35mm_f_1_4_DG_HSM.html" target="_blank"><span data-dcnode-id="5007" instrument_node="">Sigma 35mm Art</span></a></span></li><span data-dcnode-id="5003" instrument_node="">
</span><li data-dcnode-id="4999"><span data-dcnode-id="5000" style="font-size:16px;"><a data-dcnode-id="5001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1213515-REG/tokina_at_x_14_20mm_f_2_pro.html" target="_blank"><span data-dcnode-id="5002" instrument_node="">Tokina 14-20mm</span></a></span></li><span data-dcnode-id="4998" instrument_node="">
</span></ol><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4993" instrument_node="">
</span><p data-dcnode-id="4986"><span data-dcnode-id="4992" instrument_node="">First up is&nbsp;the acclaimed </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dxomark.com/Lenses/Nikon/Nikon-AF-S-NIKKOR-14-24mm-F28G-ED-mounted-on-Nikon-D750__975" target="_blank"><span data-dcnode-id="4989" style="font-size:14px;"><strong data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">Nikon 14-24mm</span></strong></span></a><span data-dcnode-id="4987" instrument_node="">. &nbsp;This lens is quite expensive at $1,900, especially compared to the $350 Rokinon 14mm.&nbsp; The Nikon has fairly minimal vignetting, distortion, and coma at f/2.8. &nbsp;This lens doubles as a fantastic lens for landscapes and waterfall photography as well. &nbsp;It is also very large and heavy, especially when compared next to the Rokinon.&nbsp; This is currently my main Milky Way lens.</span></p><span data-dcnode-id="4985" instrument_node="">
</span><p data-dcnode-id="4975"><span data-dcnode-id="4984" instrument_node="">The </span><strong data-dcnode-id="4980"><span data-dcnode-id="4981" style="font-size:14px;"><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dxomark.com/Lenses/Tamron/Tamron-SP-15-30mm-F28-Di-VC-USD-Model-A012-Nikon-mounted-on-Nikon-D750__975" target="_blank"><span data-dcnode-id="4983" instrument_node="">Tamron 15-30mm</span></a></span></strong><span data-dcnode-id="4979" instrument_node="">&nbsp;is one of the best wide-angle&nbsp;lenses on the market right now, and it costs $700 less than the Nikon! &nbsp;While it may capture slightly less light than the Nikon, it performs at a high level.&nbsp; In fact, it actually out-performs the Nikon during the day!&nbsp; The Tamron also has Vibration Control built in (you'll want to turn it off when photographing the Milky Way though). &nbsp;It is roughly the same size and weight of the Nikon 14-24mm (big and bulky). &nbsp;If you don't want to spend nearly $2,000, but you want a high-quality astrophotography lens, this might be your best bet!&nbsp; </span><strong data-dcnode-id="4976"><a data-dcnode-id="4977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/7/tamron-15-30mm-vs-nikon-14-24mm" target="_blank"><span data-dcnode-id="4978" instrument_node="">Check out my direct comparison tests of the Tamron 15-30mm vs the Nikon 14-24mm for more information.</span></a></strong></p><span data-dcnode-id="4974" instrument_node="">
</span><p data-dcnode-id="4963"><span data-dcnode-id="4973" instrument_node="">The new </span><a data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1390819-REG/sigma_212955_14_24mm_f_2_8_dg_hsm.html" target="_blank"><span data-dcnode-id="4970" style="font-size:14px;"><strong data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">Sigma 14-24mm</span></strong></span></a><span data-dcnode-id="4968" instrument_node=""> is another great wide-angle lens for astrophotography!&nbsp; It transmits slightly less light than the Nikon, but the Coma performance is better, and the lens costs $600 less!&nbsp; </span><strong data-dcnode-id="4965"><a data-dcnode-id="4966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2018/4/sigma-14-24mm-vs-nikon-14-24mm---astrophotography" target="_blank"><span data-dcnode-id="4967" instrument_node="">You can see a direct comparison of the Nikon 14-24mm and Sigma 14-24mm here</span></a></strong><span data-dcnode-id="4964" instrument_node="">.</span></p><span data-dcnode-id="4962" instrument_node="">
</span><p data-dcnode-id="4937"><span data-dcnode-id="4961" instrument_node="">If you don't want to spend over $500 on a lens, then I recommend purchasing the</span><a data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dxomark.com/Lenses/Samyang/14mm-F2.8-IF-ED-MC-Aspherical-Nikon-mounted-on-Nikon-D750__975" target="_blank"><span data-dcnode-id="4960" instrument_node="">&nbsp;</span><span data-dcnode-id="4957" style="font-size:14px;"><strong data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">Rokinon 14mm</span></strong></span></a><span data-dcnode-id="4955" instrument_node="">.&nbsp; </span><u data-dcnode-id="4952"><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/2/rokinon-14mm-vs-nikon-14-24mm" target="_blank"><span data-dcnode-id="4954" instrument_node="">You can head over to my blog,&nbsp;which has multiple comparison images of the Rokinon 14mm vs the Nikon 14-24mm</span></a></u><span data-dcnode-id="4951" instrument_node="">.&nbsp; Keep in mind, this lens is also listed&nbsp;under different names, including&nbsp;Samyang&nbsp;or Bower. &nbsp;They are all the same lens, just for different geographic markets. &nbsp;I'd recommend this lens&nbsp;for beginners and professionals alike. &nbsp;It is a cheap lens, yet the image quality is quite good, even better than some lenses that costs thousands of dollars. &nbsp;The Rokinon 14mm has no coma&nbsp;and is sharp from corner to corner.&nbsp; Another thing I love about this lens is its massive focus ring. &nbsp;Most lenses have a very small focus ring, (if you move the focus ring a millimeter past "Infinity" it won't be sharp). &nbsp;The Rokinon allows you to&nbsp;rotate the focus ring substantially without&nbsp;losing&nbsp;sharp focus. &nbsp;I should also mention that this lens is Manual Focus only, no autofocus. &nbsp;However, this is irrelevant when doing Milky Way photography, as Auto-Focus wouldn't work anyway.</span><br data-dcnode-id="4950"><span data-dcnode-id="4949" instrument_node="">
</span><br data-dcnode-id="4948"><span data-dcnode-id="4947" instrument_node="">
There are 2 bad things about this lens. &nbsp;First is the awful vignetting. &nbsp;</span><a data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/2/rokinon-14mm-vs-nikon-14-24mm" target="_blank"><span data-dcnode-id="4946" instrument_node="">When compared against the Nikon 14-24mm</span></a><span data-dcnode-id="4944" instrument_node="">, you can see that the Rokinon loses a substantial amount of light due to its vignetting. &nbsp;Personally, I find this to be a big problem. &nbsp;The images taken with the Rokinon are significantly darker than the Nikon or Tamron. &nbsp;The second problem is the mustache distortion, but it's not very noticeable unless you have a straight horizon in the center of the frame. &nbsp;To be clear, almost all of the Milky Way photos in my </span><a data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/milkyway" target="_blank"><span data-dcnode-id="4943" instrument_node="">Nightscapes Gallery</span></a><span data-dcnode-id="4941" instrument_node=""> were taken with this lens. &nbsp;It can definitely get the job done, but it will take more editing in post-processing to get the images up to an acceptable level.&nbsp; </span><strong data-dcnode-id="4938"><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DvO6mQUwcGnk" target="_blank"><span data-dcnode-id="4940" instrument_node="">Head over to my YouTube channel to check out a full-length post-processing video made specifically for the Rokinon 14mm!</span></a></strong></p><span data-dcnode-id="4936" instrument_node="">
</span><p data-dcnode-id="4930"><span data-dcnode-id="4935" instrument_node="">In 2017, I&nbsp;had the opportunity to test the Tamron 15-30, Nikon 14-24mm, and Rokinon 14mm against one another at Cherry Springs State Park. &nbsp;This review should give you a very clear look at the differences between each lens, and help you decide which option might work best for you. &nbsp;</span><strong data-dcnode-id="4932"><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/7/nikon-tamron-or-rokinon---best-lens-for-astro" target="_blank"><span data-dcnode-id="4934" instrument_node="">Click here to read the review</span></a></strong><span data-dcnode-id="4931" instrument_node="">.</span></p><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4915"><span data-dcnode-id="4928" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="4917" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="4919" id="_aaaia"><span class="pv-outer" data-dcnode-id="4920"><span class="pv-inner" data-dcnode-id="4921" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Rokinon 14mm image" class="pv-img pv-burned" data-dcnode-id="4927" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p399985086-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="4924"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">The Rokinon 14mm is a great Milky Way lens</span></span></span><span class="pv-pinit" data-dcnode-id="4922" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p399985086-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaiapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="4923" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="4918" instrument_node="">
</span></span><span data-dcnode-id="4916" instrument_node="">
</span></p><span data-dcnode-id="4914" instrument_node="">
</span><p data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4911" instrument_node="">
</span><p data-dcnode-id="4901"><span data-dcnode-id="4910" instrument_node="">Another lens I&nbsp;like is the </span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dxomark.com/Lenses/Sigma/Sigma-35mm-F14-DG-HSM-A-Nikon-mounted-on-Nikon-D750__975" target="_blank"><span data-dcnode-id="4907" style="font-size:14px;"><strong data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Sigma 35mm Art</span></strong></span></a><span data-dcnode-id="4905" instrument_node="">. &nbsp;It produces very sharp images, but it does suffer from pretty severe coma&nbsp;at f/1.4. However,&nbsp;at f/2.8 the coma is gone!&nbsp; The 35mm focal length also changes how you compose your Milky Way photos.&nbsp; Compared to a typical 14mm lens, you won't have much room to compose your scene.&nbsp; If you plan to capture a typical nightscape scene, with a foreground and the Milky Way overhead, you'll likely need to create a panorama.&nbsp; This can be very difficult to do in the dark, and I wouldn't recommend it for beginners.&nbsp; Plus, you'll also have much less Depth of Field with a 35mm lens, compared to a 14mm lens.&nbsp; At f/2.8 on a 14mm lens, you can focus on the stars and the foreground will be sharp too!&nbsp; </span><strong data-dcnode-id="4902"><a data-dcnode-id="4903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/6/sigma-35mm-art--astrophotography" target="_blank"><span data-dcnode-id="4904" instrument_node="">You can read a more in-depth review, complete with sample images, on my blog.</span></a></strong></p><span data-dcnode-id="4900" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4899" instrument_node="">If you have a Sony, Pentax, Fuji, or Olympus camera, head over to </span><span data-dcnode-id="4895" style="font-size:14px;"><strong data-dcnode-id="4896"><a data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lonelyspeck.com/lonely-specks-ultimate-list-of-best-astrophotography-lenses/" target="_blank"><span data-dcnode-id="4898" instrument_node="">Lonely Speck website</span></a></strong></span><span data-dcnode-id="4894" instrument_node=""> for even more lens recommendations and details! &nbsp;Ian has compiled a large list of lenses for every camera brand and sensor size that work best for Astrophotography. &nbsp;This article should help you find the best lens!</span></p><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4885"><span data-dcnode-id="4891" instrument_node="">In order to capture a nice foreground and the Milky Way with a 35mm or 50mm&nbsp;lens, you will likely have to create a Panorama. &nbsp;</span><strong data-dcnode-id="4887"><span data-dcnode-id="4888" style="font-size:14px;"><a data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lonelyspeck.com/medium-format-astrophotography-with-panorama-stitching/" target="_blank"><span data-dcnode-id="4890" instrument_node="">Check out this fantastic guide by LonelySpeck Photography to learn how</span></a></span></strong><span data-dcnode-id="4886" instrument_node="">. &nbsp;They have tons of informative guides and information on their site, be sure to look around!</span></p><span data-dcnode-id="4884" instrument_node="">
</span><p data-dcnode-id="4879"><br data-dcnode-id="4883"><span data-dcnode-id="4882" instrument_node="">
</span><br data-dcnode-id="4881"><span data-dcnode-id="4880" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="4878" instrument_node="">
</span><h2 data-dcnode-id="4875"><span data-dcnode-id="4876" style="font-size:26px;"><span data-dcnode-id="4877" instrument_node="">Focal Length Differences&nbsp;</span></span></h2><span data-dcnode-id="4874" instrument_node="">
</span><p data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">The lens you choose will drastically alter how your Milky Way images look. &nbsp;I love using a 14mm lens because I have plenty of room for the foreground and the Milky Way. &nbsp;Anything over 35mm is too tight to capture a foreground element, unless you create a panorama.&nbsp; Remember, these focal lengths are for Full-Frame cameras.&nbsp;</span></p><span data-dcnode-id="4871" instrument_node="">

</span><span class="zb-richtext largeimage" data-dcnode-id="4797" style="width:800px;height:534px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="4799" id="_aaama"><span class="pv-outer" data-dcnode-id="4800"><span class="pv-inner" data-dcnode-id="4801" style="left:0px;top:0px;width:800px;height:534px;"><img alt="50mm" class="pv-img pv-burned" data-dcnode-id="4807" height="534" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2266852917-4.jpg&amp;raw" style="left:0px;top:0px;width:800px;height:534px;" width="800"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="4804"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">50mm</span></span></span><span class="pv-pinit" data-dcnode-id="4802" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2266852917-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaamapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="4803" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="4798" instrument_node="">

</span></strong></p><span data-dcnode-id="4793" instrument_node="">
</span><p data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">If you are using a Crop-Sensor camera, the image will be magnified by a factor of 1.5.&nbsp; The photo below shows this difference between a 14mm lens on a full frame camera and a crop-sensor camera.&nbsp; The 14mm lens essentially becomes a 21mm lens on a crop-sensor camera.&nbsp;&nbsp;</span></p><span data-dcnode-id="4790" instrument_node="">
</span><p data-dcnode-id="4779"><span data-dcnode-id="4789" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="4781" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="4783" id="_aaana"><span class="pv-outer" data-dcnode-id="4784"><span class="pv-inner" data-dcnode-id="4785" style="left:0px;top:0px;width:944px;height:630px;"><img class="pv-img pv-burned" data-dcnode-id="4788" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2883727837-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-pinit" data-dcnode-id="4786" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2883727837-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaanapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="4787" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="4782" instrument_node="">
</span></span><span data-dcnode-id="4780" instrument_node="">
</span></p><span data-dcnode-id="4778" instrument_node="">
</span><p data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4775" instrument_node="">
</span><h2 data-dcnode-id="4772"><span data-dcnode-id="4773" style="font-size:26px;"><span data-dcnode-id="4774" instrument_node="">f-Stops vs T-Stops</span></span></h2><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">When it comes to Milky Way photography, it is crucial to capture as much&nbsp;light as possible. &nbsp;T-Stops measure the transmission of light through the lens. &nbsp;Ideally, the f-stop and T-stop would be the same. &nbsp;For example, an f/2.8 lens would transmit 2.8 T-stops of light. &nbsp;This is usually not the case.&nbsp; Most lenses don't transmit as much light as their aperture would indicate.&nbsp; For example, the Nikon 14-24mm f/2.8 transmits T/3.0 stops of light.&nbsp;&nbsp;</span></p><span data-dcnode-id="4768" instrument_node="">
</span><p data-dcnode-id="4764"><strong data-dcnode-id="4765"><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DYF-VJpePTIY" target="_blank"><span data-dcnode-id="4767" instrument_node="">I recommend watching this informative video by Tony Northrup on the difference between f-stops and T-stops.</span></a></strong></p><span data-dcnode-id="4763" instrument_node="">
</span><p data-dcnode-id="4757"><span data-dcnode-id="4762" instrument_node="">Be sure to visit </span><strong data-dcnode-id="4759"><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dxomark.com/" target="_blank"><span data-dcnode-id="4761" instrument_node="">DXO Mark and see what the T-stop rating is for your lens</span></a></strong><span data-dcnode-id="4758" instrument_node="">. &nbsp;You may be surprised how much light you are "losing". &nbsp;You can also compare most of the Astrophotography lenses I listed above, and get an idea of which lenses will let the most light in. &nbsp;Remember, the more light that you let in, the cleaner your images will be.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="4756" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4753" instrument_node="">
</span><h1 data-dcnode-id="4751" style="text-align: center;"><span data-dcnode-id="4752" instrument_node="">Camera Settings</span></h1><span data-dcnode-id="4750" instrument_node="">
</span><hr data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">
</span><p data-dcnode-id="4743"><br data-dcnode-id="4747"><span data-dcnode-id="4746" instrument_node="">
</span><br data-dcnode-id="4745"><span data-dcnode-id="4744" instrument_node="">
I'm sure this is what most of you came for.&nbsp; Everyone always wants to know more about what camera settings were used.&nbsp; For astrophotography, things are pretty simple.&nbsp; However, there are different methods you can use to create better images, like photo stacking or simply taking longer exposures (think 4+ minutes!).&nbsp; Let's break down each camera setting first, and see how they affect our night time images.</span></p><span data-dcnode-id="4742" instrument_node="">
</span><p data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="4739" instrument_node="">
</span><h2 data-dcnode-id="4736"><span data-dcnode-id="4737" style="font-size:26px;"><span data-dcnode-id="4738" instrument_node="">ISO</span></span></h2><span data-dcnode-id="4735" instrument_node="">
</span><p data-dcnode-id="4721"><span data-dcnode-id="4734" instrument_node="">ISO is a very important camera setting to understand for Milky Way photography. &nbsp;There are a lot of misconceptions about ISO, and what exactly it does. &nbsp;Generally, it is said that "increasing the ISO increases the camera's&nbsp;sensitivity to light".&nbsp; For the more experienced photographers, </span><strong data-dcnode-id="4731"><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lonelyspeck.com/how-to-find-the-best-iso-for-astrophotography-dynamic-range-and-noise/" target="_blank"><span data-dcnode-id="4733" instrument_node="">I recommend reading this ISO Tutorial by Lonely Speck</span></a></strong><span data-dcnode-id="4730" instrument_node="">. &nbsp;It covers ISO very well, especially in context with Astrophotography.</span><br data-dcnode-id="4729"><span data-dcnode-id="4728" instrument_node="">
</span><br data-dcnode-id="4727"><span data-dcnode-id="4726" instrument_node="">
</span><strong data-dcnode-id="4723"><a data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/p916374408" target="_blank"><span data-dcnode-id="4725" instrument_node="">Click here to see the difference between the ISO Stops, from 100 to 6400</span></a></strong><span data-dcnode-id="4722" instrument_node="">. &nbsp;The only setting I changed between each photo was the ISO.</span></p><span data-dcnode-id="4720" instrument_node="">
</span><p data-dcnode-id="4714"><span data-dcnode-id="4719" instrument_node="">Remember, there are only two ways to capture more light: a longer Shutter Speed or a wider Aperture. &nbsp;We want to gather as much light as possible through Shutter Speed and Aperture.&nbsp; Since we can only shoot for a certain length of time (before the stars become blurred), we are limited by the Shutter Speed. &nbsp;The&nbsp;lens aperture only opens up so wide. &nbsp;Most Wide Angle lenses are limited to f/2.8, although some can open up to f/1.8 or even f/1.4.</span><br data-dcnode-id="4718"><span data-dcnode-id="4717" instrument_node="">
</span><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">
It is generally better to use a higher ISO in-camera, as increasing the Exposure in Post-Processing tends to ruin image quality.&nbsp; However, at some point, increasing the ISO will actually cause you to lose Dynamic Range.&nbsp; This ISO value changes for each camera.&nbsp; Therefore, you may want to shoot at a lower ISO, say 1600, and brighten the Exposure as needed in your RAW editing software.</span></p><span data-dcnode-id="4713" instrument_node="">
</span><p data-dcnode-id="4703"><span data-dcnode-id="4712" instrument_node="">To make things even more confusing, some cameras are ISO Invariant,&nbsp;which&nbsp;means you can use any ISO and brighten the photo in Post-Processing without any loss in image quality.&nbsp; You would mainly use this feature to save data in your highlights and reduce noise.&nbsp; Note, this only applies when shooting in RAW.&nbsp;&nbsp;</span><strong data-dcnode-id="4709"><a data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/4/iso-invariance-with-a-nikon-d750" target="_blank"><span data-dcnode-id="4711" instrument_node="">Read my blog post on ISO Invariance to learn more</span></a></strong><span data-dcnode-id="4708" instrument_node="">. &nbsp;To understand how to&nbsp;use an ISO Invariant camera to its fullest potential, </span><strong data-dcnode-id="4705"><a data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fstoppers.com/landscapes/iso-review-capture-night-sky-iso-less-nikon-d750-144755" target="_blank"><span data-dcnode-id="4707" instrument_node="">check out this article by Daniel Laan</span></a></strong><span data-dcnode-id="4704" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4702" instrument_node="">
</span><p data-dcnode-id="4698"><span data-dcnode-id="4700" style="background-color:#ffff00;"><span data-dcnode-id="4701" instrument_node="">The best way to reduce noise / grain in your images is to capture more light</span></span><span data-dcnode-id="4699" instrument_node="">. &nbsp;That means a longer shutter speed or wider aperture. &nbsp;Increasing the ISO does not capture any more light! &nbsp;Watch the video below for more information, as well as some tips to reduce noise in Adobe Camera RAW and Photoshop.</span></p><span data-dcnode-id="4697" instrument_node="">
</span><p data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4694" instrument_node="">

</span><h2 data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="4165" instrument_node="">
</span><h2 data-dcnode-id="4162"><span data-dcnode-id="4163" style="font-size:26px;"><span data-dcnode-id="4164" instrument_node="">Aperture</span></span></h2><span data-dcnode-id="4161" instrument_node="">
</span><p data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">When photographing faint stars, it's imperative to use the widest Aperture possible. &nbsp;Ideally you have a lens that opens up to at least f/2.8. &nbsp;If not, you should seriously consider buying a new lens for astrophotography.&nbsp; Remember, a&nbsp;f/2 lens can get double the amount of light of a&nbsp;f/2.8 lens. &nbsp;A&nbsp;f/1.4 lens can get four times the amount of light of a f/2.8 lens!&nbsp; That's a huge difference!</span></p><span data-dcnode-id="4158" instrument_node="">
</span><p data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">If you use a wide-open aperture, like f/1.4, you will likely notice vignette in the corners and significant coma. &nbsp;If you stop-down to f/2 or f/2.8 these problems tend to disappear. &nbsp;This is another advantage to buying a lens that can open up to f/1.4 or f/1.8. &nbsp;For example, you have the Nikon 14-24mm (an f/2.8 lens) and you stop down to f/4. &nbsp;The vignette will be reduced, but you would now be getting half the amount of light. &nbsp;Not good for Milky Way photography. &nbsp;If the&nbsp;starting point is f/1.4 though, you can stop down to f/2.8 and still capture a lot of light and not have to deal with heavy vignette or bad coma.&nbsp; My Sigma 35mm Art lens has such bad coma, that I have to stop down to f/4 to get reasonable sharp stars!&nbsp; Make sure you do your research before you buy your next astrophotography lens!</span></p><span data-dcnode-id="4155" instrument_node="">
</span><p data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4152" instrument_node="">
</span><h2 data-dcnode-id="4149"><span data-dcnode-id="4150" style="font-size:26px;"><span data-dcnode-id="4151" instrument_node="">Shutter Speed</span></span></h2><span data-dcnode-id="4148" instrument_node="">
</span><p data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">The Shutter Speed you choose will have a massive impact on your astrophotography images.&nbsp; Most people begin by taking 1 single exposure.&nbsp; Therefore, there Shutter Speed needs to be fast enough to avoid star trails.&nbsp; By now, you've heard of the 500 Rule, which states "Take 500 divided by the focal length of your lens for sharp stars".&nbsp; Lets take a 35mm lens for example.&nbsp; 500 \ 35 =&nbsp;&nbsp;14.2 seconds.&nbsp; Therefore, your shutter speed would need to be 15 seconds or less for acceptably sharp stars.&nbsp; However, I personally don't agree with the 500 Rule.&nbsp; I find the stars will show too much movement.&nbsp; I personally use the 300 Rule most of the time.&nbsp;&nbsp;</span></p><span data-dcnode-id="4145" instrument_node="">
</span><p data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">If you want high-quality nightscapes, I would recommend using a much longer shutter speed.&nbsp; For example, I normally take 4 minute long photos to capture enough detail in my foreground.&nbsp; This also helps to drastically reduce the noise in my images.&nbsp; Taking a longer exposure is the simplest way to create better images!&nbsp; Keep in mind, you'll need to blend in another exposure for the sky, as the stars will show motion after 4 minutes.</span></p><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Alternatively, if you have a Star Tracker, you can use a much longer shutter speed.&nbsp; However, we now have the opposite problem as mentioned above.&nbsp; Instead of the stars moving over the course of the exposure, now the foreground will become blurry.&nbsp; This can cause image blending in Photoshop to become considerably more difficult.&nbsp; When using a star tracker, your shutter speed is limited to the accuracy of the star tracker.&nbsp; For example, I normally shoot&nbsp;4 minutes with a 14mm lens without noticing star trails.&nbsp; That allows me to capture over 4 times the amount of light than a standard 20 second exposure!&nbsp; If I'm using a 100mm lens, I can normally&nbsp;shoot up to 60 seconds without motion blur.&nbsp; That means I'm capturing almost 16 times more light than a standard 4 second exposure!!&nbsp;</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4136" instrument_node="">
</span><h2 data-dcnode-id="4133"><span data-dcnode-id="4134" style="font-size:26px;"><span data-dcnode-id="4135" instrument_node="">White Balance</span></span></h2><span data-dcnode-id="4132" instrument_node="">
</span><p data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">When I&nbsp;am&nbsp;photographing the Milky Way, I want to have as neutral a White Balance as possible.&nbsp; With that being said, most of my Milky Way images tend to have a blue or purple tint.&nbsp; Light Pollution, Air Glow,&nbsp;and environmental conditions can all change the colors in the night sky.</span></p><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4122"><span data-dcnode-id="4128" instrument_node="">I normally set my&nbsp;White Balance around &nbsp;</span><span data-dcnode-id="4124" style="font-size:14px;"><u data-dcnode-id="4125"><strong data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">4000 - 5000 K</span></strong></u></span><span data-dcnode-id="4123" instrument_node=""> for the best results. &nbsp;This tends to make the sky more blue / grey / green. &nbsp;Most of the photos in this tutorial were taken in that White Balance range.&nbsp; If you are shooting in RAW, and you should be, you can always leave the White Balance set to Auto.&nbsp; Once you get into Lightroom or Camera RAW, you can easily adjust the White Balance to suit the image.</span></p><span data-dcnode-id="4121" instrument_node="">
</span><p data-dcnode-id="4114"><span data-dcnode-id="4120" instrument_node="">To get realistic colors,&nbsp;use the preset 'Daylight' White Balance.&nbsp;&nbsp;</span><strong data-dcnode-id="4116"><span data-dcnode-id="4117" style="font-size:14px;"><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clarkvision.com/articles/color.of.the.night.sky/" target="_blank"><span data-dcnode-id="4119" instrument_node="">Read Roger Clark's blog post on Night Sky Colors&nbsp;for more information</span></a></span></strong><span data-dcnode-id="4115" instrument_node="">. &nbsp;The image below was taken on a dark night in Canyonlands National Park, Utah. &nbsp;This photo is a (roughly) accurate representation of the true night sky colors. &nbsp;The green color is&nbsp;called Air Glow, which is similar to the aurora. &nbsp;The predominate yellow color is because most stars in the night sky are yellow/orange/red.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="4113" instrument_node="">
</span><p data-dcnode-id="4099"><span data-dcnode-id="4112" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="4101" style="width:944px;height:666px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="4103" id="_aaapa"><span class="pv-outer" data-dcnode-id="4104"><span class="pv-inner" data-dcnode-id="4105" style="left:0px;top:0px;width:944px;height:666px;"><img alt="milky way colors" class="pv-img pv-burned" data-dcnode-id="4111" height="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2872195416-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:666px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="4108"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">More accurate night colors</span></span></span><span class="pv-pinit" data-dcnode-id="4106" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2872195416-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaapapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="4107" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="4102" instrument_node="">
</span></span><span data-dcnode-id="4100" instrument_node="">
</span></p><span data-dcnode-id="4098" instrument_node="">
</span><p data-dcnode-id="4089"><span data-dcnode-id="4097" instrument_node="">If you begin taking your Milky Way photos at Nautical Twilight (~one hour after sunset), the sky will have a blue cast to it. &nbsp;Therefore,&nbsp;you may need to re-adjust your White Balance once Astronomical Twilight arrives (~1.5 hours after sunset).&nbsp; Personally, I always wait until Astronomical Twilight to begin taking my Milky Way images.&nbsp; I recommend using </span><a data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//photoephemeris.com/" target="_blank"><span data-dcnode-id="4096" instrument_node="">The Photographer's Ephemeris App</span></a><span data-dcnode-id="4094" instrument_node=""> to see what time these occur.</span><br data-dcnode-id="4093"><span data-dcnode-id="4092" instrument_node="">
</span><br data-dcnode-id="4091"><span data-dcnode-id="4090" instrument_node="">
Again, the real colors of the night sky tend to be quite warm. &nbsp;Using the Daylight White Balance may be scientifically accurate, but it doesn't always make for a pleasing photo. &nbsp;As the artist, it's your decision to make. &nbsp;What White Balance looks best to you?</span></p><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4085" instrument_node="">
</span><h3 data-dcnode-id="4082" style="text-align: center;"><strong data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Daylight&nbsp;- 5500 K</span></strong></h3><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4066"><strong data-dcnode-id="4067"><span data-dcnode-id="4080" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="4069" style="width:944px;height:550px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="4071" id="_aaaqa"><span class="pv-outer" data-dcnode-id="4072"><span class="pv-inner" data-dcnode-id="4073" style="left:0px;top:0px;width:944px;height:550px;"><img alt="Daylight White Balance" class="pv-img pv-burned" data-dcnode-id="4079" height="550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2872214174-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:550px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="4076"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Daylight White Balance - 5500 K</span></span></span><span class="pv-pinit" data-dcnode-id="4074" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2872214174-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaqapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="4075" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="4070" instrument_node="">
