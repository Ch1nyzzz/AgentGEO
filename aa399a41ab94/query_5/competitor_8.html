</span></strong></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4063" style="text-align: center;"><span data-dcnode-id="4064" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4062" instrument_node="">

</span><h2 data-dcnode-id="3993"><span data-dcnode-id="3994" style="font-size:26px;"><span data-dcnode-id="3995" instrument_node="">Focusing on the Stars</span></span></h2><span data-dcnode-id="3992" instrument_node="">
</span><p data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">Focusing at night should be easy. &nbsp;Just set your lens to Infinity and shoot. &nbsp;Most lenses don't work that well unfortunately. &nbsp;If the focus ring is even slightly off, your stars will no longer be sharp. &nbsp;Manual focus&nbsp;lenses are much easier to focus with at night, as they have a lot of distance in the focusing ring. &nbsp;This is why I love using the Rokinon.&nbsp; I can move the focus ring quite a bit and still have sharp stars. &nbsp;When using most Auto-Focus lenses, the slightest movement on the focus ring will ruin the sharp focus.&nbsp; There are a few different ways to focus at night.</span></p><span data-dcnode-id="3989" instrument_node="">
</span><ol data-dcnode-id="3975"><span data-dcnode-id="3988" instrument_node="">
</span><li data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">Make sure your camera and lens are set to Manual Focus, you don't want the camera to try to Auto-Focus at night. &nbsp;</span></li><span data-dcnode-id="3985" instrument_node="">
</span><li data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Rotate your focus ring to Infinity. &nbsp;</span></li><span data-dcnode-id="3982" instrument_node="">
</span><li data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">Turn on Live View. &nbsp;Hopefully you have a bright enough star or some other distant light that you can use for a reference point.&nbsp; When you find your star / light, zoom in all the way with Live View.&nbsp; (There should be + or - buttons on the back that let you zoom in)</span></li><span data-dcnode-id="3979" instrument_node="">
</span><li data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Slowly rotate the focus ring back and forth, watching as the star changes from a blob to a pinpoint. &nbsp;Once you think you have the sharpest focus, take a test shot. &nbsp;Zoom in as far as possible on the Playback and verify the stars are sharp. &nbsp;</span></li><span data-dcnode-id="3976" instrument_node="">
</span></ol><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">Sometimes you can't see anything through Live View.&nbsp; It may be that the lens is too out of focus, double check that the Focus Ring is on / near infinity. &nbsp;You should also be using a lens with an aperture of at least f/2.8. &nbsp;If you are using a kit lens that doesn't have the capability to open up to f/2.8, it will probably be too dark on Live View to see any stars.</span></p><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Keep in mind, using Live View will quickly heat up the camera sensor. &nbsp;This sensor heat will cause unwanted side effects in your final images; these problems are covered further down on the page. &nbsp;Therefore, try to be as quick as possible when using Live View, especially on warm nights. &nbsp;Then again, having sharp stars is critical. &nbsp;Make sure that your stars are 100% sharp before continuing on.</span></p><span data-dcnode-id="3968" instrument_node="">
</span><p data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3964" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3956" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3958" id="_aaaua"><span class="pv-outer" data-dcnode-id="3959"><span class="pv-inner" data-dcnode-id="3960" style="left:0px;top:0px;width:944px;height:630px;"><img class="pv-img pv-burned" data-dcnode-id="3963" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2247522166-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-pinit" data-dcnode-id="3961" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2247522166-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaauapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3962" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3957" instrument_node="">

</span><h2 data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="3950" instrument_node="">
</span><h2 data-dcnode-id="3947"><span data-dcnode-id="3948" style="font-size:26px;"><span data-dcnode-id="3949" instrument_node="">Star Trails</span></span></h2><span data-dcnode-id="3946" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3939" style="line-height: 18px;"><span data-dcnode-id="3945" instrument_node="">Another problem you will encounter when shooting at night is star trails. &nbsp;While these can make for excellent photos, we generally want our stars to be tack-sharp. &nbsp;Therefore, we need to limit our exposure length so that the stars don't appear to move. &nbsp;This is another great reason to use a very wide lens (24mm and lower), you can have longer exposure times without any visible star movement. &nbsp;If you are interested in learning how to create a Star Trails image, check out my </span><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/startrails" target="_blank"><strong data-dcnode-id="3942"><span data-dcnode-id="3943" style="font-size:14px;"><span data-dcnode-id="3944" instrument_node="">Star Trails Tutorial</span></span></strong><span data-dcnode-id="3941" instrument_node="">.</span></a></span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3929" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3931" id="_aaava"><span class="pv-outer" data-dcnode-id="3932"><span class="pv-inner" data-dcnode-id="3933" style="left:0px;top:0px;width:944px;height:630px;"><img class="pv-img pv-burned" data-dcnode-id="3936" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2054201242-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-pinit" data-dcnode-id="3934" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2054201242-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaavapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3935" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3930" instrument_node="">

</span></p><span data-dcnode-id="3926" instrument_node="">
</span><h2 data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="3923" instrument_node="">
</span><h2 data-dcnode-id="3920"><span data-dcnode-id="3921" style="font-size:26px;"><span data-dcnode-id="3922" instrument_node="">The 500 rule</span></span></h2><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">As I stated in the Shutter Speed section, most photographers&nbsp;recommend the 500 Rule when taking Milky Way photos. &nbsp;The 500 Rule states: to prevent star trails, take&nbsp;500 divided by your lens' focal length.</span></p><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">In my experience, the 500 Rule is just a bit too long. &nbsp;You will likely see the stars moving.</span></p><span data-dcnode-id="3913" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Another problem you will have is that the camera may not give you the exact shutter speed. &nbsp;For example, you can't take a 21 or 14 second photo. &nbsp;Anything longer than 30 seconds has to be manually timed on Bulb Mode.</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Below you will see 4 heavily cropped&nbsp;images, each taken with a different "Rule" (500, 400, 300, 200). &nbsp;If you look closely, even the 300 Rule has a small amount of movement.&nbsp;Below are some quick Shutter Speeds for reference:</span></p><span data-dcnode-id="3907" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" style="font-size:14px;"><strong data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">500</span></strong><span data-dcnode-id="3904" instrument_node=""> / 14mm = </span><strong data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">35 seconds</span></strong></span></p><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3892"><span data-dcnode-id="3893" style="font-size:14px;"><strong data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">400</span></strong><span data-dcnode-id="3896" instrument_node=""> / 14mm = </span><strong data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">28 seconds</span></strong></span></p><span data-dcnode-id="3891" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" style="font-size: 14px;"><b data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">300&nbsp;</span></b><span data-dcnode-id="3888" instrument_node="">/ 14mm =&nbsp;</span><strong data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">21 seconds</span></strong></span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3876"><span data-dcnode-id="3877" style="font-size: 14px;"><strong data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">200&nbsp;</span></strong><span data-dcnode-id="3880" instrument_node="">/ 14mm = </span><strong data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">14 seconds</span></strong></span></p><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3861"><br data-dcnode-id="3874"><span data-dcnode-id="3873" instrument_node="">
**Note: all these numbers are for Full Frame Cameras. &nbsp;If you use a </span><strong data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Crop Sensor camera</span></strong><span data-dcnode-id="3870" instrument_node="">&nbsp;you must multiply your focal length by 1.5 to get the proper shutter speed. &nbsp;</span><strong data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">500</span></strong><span data-dcnode-id="3867" instrument_node=""> / (14mm </span><strong data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">* 1.5</span></strong><span data-dcnode-id="3864" instrument_node="">) = </span><strong data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">24&nbsp;seconds</span></strong></p><span data-dcnode-id="3860" instrument_node="">
</span><h3 data-dcnode-id="3857" style="text-align: center;"><strong data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">500 Rule:</span></strong></h3><span data-dcnode-id="3856" instrument_node="">
</span><p data-dcnode-id="3842"><span data-dcnode-id="3855" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3844" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3846" id="_aaawa"><span class="pv-outer" data-dcnode-id="3847"><span class="pv-inner" data-dcnode-id="3848" style="left:0px;top:0px;width:944px;height:630px;"><img alt="500 Rule" class="pv-img pv-burned" data-dcnode-id="3854" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2402948840-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="3851"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">500 Rule</span></span></span><span class="pv-pinit" data-dcnode-id="3849" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2402948840-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaawapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3850" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3845" instrument_node="">
</span></span><span data-dcnode-id="3843" instrument_node="">
</span></p><span data-dcnode-id="3841" instrument_node="">
</span><p data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3838" instrument_node="">
</span><h3 data-dcnode-id="3835" style="text-align: center;"><strong data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">400 Rule:</span></strong></h3><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3819"><strong data-dcnode-id="3820"><span data-dcnode-id="3833" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3822" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3824" id="_aaaxa"><span class="pv-outer" data-dcnode-id="3825"><span class="pv-inner" data-dcnode-id="3826" style="left:0px;top:0px;width:944px;height:630px;"><img alt="400 Rule" class="pv-img pv-burned" data-dcnode-id="3832" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2402948811-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="3829"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">400 Rule</span></span></span><span class="pv-pinit" data-dcnode-id="3827" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2402948811-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaxapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3828" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3823" instrument_node="">
</span></span><span data-dcnode-id="3821" instrument_node="">
</span></strong></p><span data-dcnode-id="3818" instrument_node="">
</span><p data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3815" instrument_node="">
</span><h3 data-dcnode-id="3812" style="text-align: center;"><strong data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">300 Rule:</span></strong></h3><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3810" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3799" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3801" id="_aaaya"><span class="pv-outer" data-dcnode-id="3802"><span class="pv-inner" data-dcnode-id="3803" style="left:0px;top:0px;width:944px;height:630px;"><img alt="300 Rule" class="pv-img pv-burned" data-dcnode-id="3809" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2402948800-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="3806"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">300 Rule</span></span></span><span class="pv-pinit" data-dcnode-id="3804" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2402948800-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaayapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3800" instrument_node="">
</span></span><span data-dcnode-id="3798" instrument_node="">
</span></p><span data-dcnode-id="3796" instrument_node="">
</span><h3 data-dcnode-id="3793" style="text-align: center;"><strong data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">200 Rule:</span></strong></h3><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3791" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3780" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3782" id="_aaaza"><span class="pv-outer" data-dcnode-id="3783"><span class="pv-inner" data-dcnode-id="3784" style="left:0px;top:0px;width:944px;height:630px;"><img alt="200 Rule" class="pv-img pv-burned" data-dcnode-id="3790" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2402948796-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="3787"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">200 Rule</span></span></span><span class="pv-pinit" data-dcnode-id="3785" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2402948796-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaazapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3786" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3781" instrument_node="">
</span></span><span data-dcnode-id="3779" instrument_node="">
</span></p><span data-dcnode-id="3777" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Another thing to consider when choosing your 'Rule'&nbsp;is the amount of light captured. &nbsp;Remember, it's crucial to capture as much light as possible at night; the more light you capture, the less grainy the photos will be. &nbsp;Even though&nbsp;the stars will show movement with the 500 Rule, you will capture substantially&nbsp;more light.</span></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">I personally use the 300 Rule. &nbsp;I find it to be the best compromise between sharp stars and capturing enough light. &nbsp;You can decide for yourself which Rule looks best. &nbsp;If you are using a Crop Sensor camera, you may want to stick with the 500 Rule so that you can have less grain in your images.&nbsp;&nbsp;</span></p><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3765" instrument_node="">
</span><h2 data-dcnode-id="3762"><span data-dcnode-id="3763" style="font-size:26px;"><span data-dcnode-id="3764" instrument_node="">Star Tracker</span></span></h2><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">A Star Tracker is a special device that moves your camera at the same speed as the Earth's rotation.&nbsp; This is by far the most effective way to capture more light and detail in your Milky Way photos.&nbsp; The best part is, you can use a lens that doesn't open to f/2.8 or a camera that doesn't perform well at high ISO's and still get a clean Milky Way photo!</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3747"><span data-dcnode-id="3757" instrument_node="">There are many different options for star trackers, but I personally use the </span><strong data-dcnode-id="3753"><a data-dcnode-id="3755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1280430-REG/ioptron_3322_skytracker_pro_camera_mount.html" target="_blank"><span data-dcnode-id="3756" instrument_node="">iOptron Skytracker Pro</span></a><span data-dcnode-id="3754" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="3752" instrument_node="">and I recently upgraded to the </span><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhphotovideo.com/c/product/1332922-REG/ioptron_3550_skyguider_pro_camera_mount.html" target="_blank"><strong data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">iOptron SkyGuider Pro</span></strong></a><span data-dcnode-id="3748" instrument_node="">.&nbsp; Honestly, I would recommend purchasing a device like this over an expensive new lens!&nbsp; The image below was taken using the SkyTracker in Colorado.&nbsp; I was able to shoot a 4 minute exposure and capture a lot more light and detail in the night sky!</span></p><span data-dcnode-id="3746" instrument_node="">
</span><p data-dcnode-id="3742"><strong data-dcnode-id="3743"><a data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/blog/2017/11/star-tracker-tutorial" target="_blank"><span data-dcnode-id="3745" instrument_node="">Click here to read my full Star Tracker tutorial, which includes a buying guide, step-by-step instructions, a video tutorial of the SkyTracker Pro, and a Post-Processing Tutorial!</span></a></strong></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3725"><span data-dcnode-id="3740" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3727" style="width:944px;height:630px;margin-left:auto;margin-right:auto;display:block;clear:both;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3729" id="_aaaaBa"><span class="pv-outer" data-dcnode-id="3730"><span class="pv-inner" data-dcnode-id="3731" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Kenosha Pass" class="pv-img pv-burned" data-dcnode-id="3739" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2538565042-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span data-dcnode-id="3734" style="display:none;"><span data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Kenosha Pass</span></span><span data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">The Milky Way rises over Colorado, as seen from Kenosha Pass.</span></span></span><span class="pv-pinit" data-dcnode-id="3732" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2538565042-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaaBapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3728" instrument_node="">
</span></span><span data-dcnode-id="3726" instrument_node="">
</span></p><span data-dcnode-id="3724" instrument_node="">
</span><h3 data-dcnode-id="3722" style="text-align: center;"><span data-dcnode-id="3723" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="3721" instrument_node="">
</span><h3 data-dcnode-id="3719" style="text-align: center;"><span data-dcnode-id="3720" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="3718" instrument_node="">
</span><h3 data-dcnode-id="3715" style="text-align: center;"><span data-dcnode-id="3716" style="font-size:22px;"><span data-dcnode-id="3717" instrument_node="">Star Tracker Instructions</span></span></h3><span data-dcnode-id="3714" instrument_node="">
</span><hr data-dcnode-id="3713"><span data-dcnode-id="3712" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3711" instrument_node="">Using a Star Tracker is relatively simple, yet it can be a pain to setup correctly.&nbsp; First, you need to align the device with Polaris, the North Star.&nbsp; This can be surprisingly difficult!&nbsp; If you are using the iOptron Skytracker Pro, it has a built-in base that helps with this process.&nbsp; You will need to know your latitude though.&nbsp; I recommend </span><strong data-dcnode-id="3708"><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.crookneckconsulting.tpeandroid%26hl%3Den" target="_blank"><span data-dcnode-id="3710" instrument_node="">TPE (The Photographer's Ephemeris) app</span></a></strong><span data-dcnode-id="3707" instrument_node="">.&nbsp; It will not only show your latitude in the upper right corner, but it gives you a wealth of necessary information including: sunrise / sunset times, twilight times, and moon rise/set times.&nbsp; This information is invaluable for Milky Way photography.&nbsp; Once you know your latitude, you can adjust the Star Tracker's base to match.&nbsp; Now your star tracker should be pointed up at the correct altitude.&nbsp;&nbsp;</span></p><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Your next goal is to make sure the star tracker is pointing North and directly at the North Star.&nbsp; If you are unfamiliar with the night sky, this will undoubtedly be somewhat complicated.&nbsp; I always look for the Big Dipper first.&nbsp; Then I take the corner star in the Big Dipper, and draw a straight line across the sky.&nbsp; This line should point right to the North Star.&nbsp; The North Star should be brighter than any other stars nearby.&nbsp; Remember though, the Big Dipper will rotate counter-clockwise around the North Star during the night.&nbsp; Depending on the season, the Big Dipper may be "upside down".&nbsp; Hopefully the image below illustrates this technique clearly.</span></p><span data-dcnode-id="3702" instrument_node="">
</span><p data-dcnode-id="3688"><span data-dcnode-id="3701" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="3690" style="width:944px;height:630px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="3692" id="_aaabBa"><span class="pv-outer" data-dcnode-id="3693"><span class="pv-inner" data-dcnode-id="3694" style="left:0px;top:0px;width:944px;height:630px;"><img alt="Find North Star" class="pv-img pv-burned" data-dcnode-id="3700" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2652585961-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:630px;" width="944"><span class="pv-zb-text pv-bgcolor1" data-dcnode-id="3697"><span class="pv-zb-text-c pv-font2 pv-color2" data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Finding the North Star</span></span></span><span class="pv-pinit" data-dcnode-id="3695" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2652585961-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaabBapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="3696" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="3691" instrument_node="">
</span></span><span data-dcnode-id="3689" instrument_node="">
</span></p><span data-dcnode-id="3687" instrument_node="">
</span><p data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">Once you have the North Star located, look through the Sky Tracker's scope and check if the North Star is visible through it.&nbsp; This step always gave&nbsp;me the most trouble.&nbsp; Frankly, I didn't realize I could adjust the focus of the polar scope.&nbsp; I've since focused it properly to my eye and the stars are sharp.&nbsp; Before I learned this, I would just roughly eyeball it&nbsp;and use the scope kind-of like a gun sight.&nbsp; This seemed to work well enough for wide angle photos, as well as 100mm photos at 60 seconds.</span></p><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Next, you need to make sure the star tracker is level.&nbsp; The Skytracker Pro linked above has a built in bubble-level that helps.&nbsp; If you happen to find yourself shooting on pavement, you're in luck!&nbsp; However, if you are in the wilderness, you will need to adjust the tripod legs so that the star tracker base is perfectly level.&nbsp; This can be a tedious process.&nbsp;</span></p><span data-dcnode-id="3681" instrument_node="">
</span><p data-dcnode-id="3676"><span data-dcnode-id="3680" instrument_node="">Finally, you need to balance the weight of your gear on the Star Tracker.&nbsp; If you are using a big telephoto lens, you will need to add counterweights.&nbsp; However, if you only have a small camera and lens, a counterweight is unnecessary.&nbsp; </span><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/KLVCuvRHrf4%3Ft%3D1h26m21s" target="_blank"><span data-dcnode-id="3679" instrument_node="">Click here to see the SkyGuider Pro's counterweight system</span></a><span data-dcnode-id="3677" instrument_node="">.</span></p><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Your accuracy with these steps will determine how long your Shutter Speed can be before star trails become apparent.&nbsp; Keep in mind, the longer the focal length, the more precise you will need to be with your alignment.&nbsp; At 14mm, as long as you're fairly close you should be able to shoot for at least 2 minutes without star trails.&nbsp; At 200mm though, if you are slightly off-alignment, you will see star trails after 20 seconds.&nbsp; If you are using a 200mm lens, you will also likely need to use a counterweight.&nbsp; The counterweight is needed to balance everything properly, otherwise the mount will not rotate properly and your stars will be blurry.</span></p><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">It's important to remember not to touch your tripod once you have a good alignment.&nbsp; Otherwise, you will have to go through the alignment process again.&nbsp; The first time I used my star tracker, it took me at least 30 minutes to get a good alignment.&nbsp; After using the device about a dozen times though, I was able to get good alignments within minutes.&nbsp;&nbsp;</span></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3665" instrument_node="">

</span><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">There is one&nbsp;major downside to using a star tracker though.&nbsp; Since the tracker is moving the camera&nbsp;to follow the stars, the foreground will blur out!&nbsp; This poses a dilemma.&nbsp; We can either have a sharp foreground or sharp stars.&nbsp; The only way around this is to take 2 photos and blend them in post-processing.&nbsp; Thankfully this is a relatively easy process in Photoshop.&nbsp; However, sometimes the horizon can be very tricky to blend between the two photos.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3131"><span data-dcnode-id="3136" instrument_node="">I recommend using Luminosity Masks to blend your 2 exposures together.&nbsp; This process is actually pretty easy once you are familiar with Photoshop.&nbsp; First, </span><strong data-dcnode-id="3133"><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shutterevolve.com/photoshop-powerpack/" target="_blank"><span data-dcnode-id="3135" instrument_node="">you should download the free Easy Panel by Jimmy McIntyre</span></a></strong><span data-dcnode-id="3132" instrument_node="">.&nbsp; Once you have that installed into Photoshop, you're ready to follow along with the tutorial below.</span></p><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="3129" instrument_node="">

s="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2636" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="2631"><use class="ytp-svg-shadow" data-dcnode-id="2633" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2634" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2632" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2627"><use class="ytp-svg-shadow" data-dcnode-id="2629" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2630" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2628" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=x2dVRoyyFrc" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></object><span data-dcnode-id="2608" instrument_node="">

</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Ultimately, a star tracker is the best way to capture high-quality Milky Way photos without breaking the bank on a new lens!&nbsp; After dealing with ugly, grainy Milky Way photos for 3 years, I wish I had bought one sooner!</span></p><span data-dcnode-id="2601" instrument_node="">
</span><h2 data-dcnode-id="2598"><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">
&nbsp;</span></h2><span data-dcnode-id="2597" instrument_node="">
</span><h1 data-dcnode-id="2595" style="text-align: center;"><span data-dcnode-id="2596" instrument_node="">Problems You Will Encounter</span></h1><span data-dcnode-id="2594" instrument_node="">
</span><hr data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node="">
</span><h2 data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="2589" instrument_node="">
</span><h2 data-dcnode-id="2586"><span data-dcnode-id="2587" style="font-size:26px;"><span data-dcnode-id="2588" instrument_node="">Purple Noise</span></span></h2><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2580" style="font-size:14px;"><span data-dcnode-id="2584" instrument_node="">This ugly&nbsp;purple grain that can ruin an otherwise good photo. &nbsp;Every camera has different amounts of grain and Amp Glow; some newer cameras have very effective sensor designs that can entirely remove this problem at a hardware level. &nbsp;For more information, </span><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clarkvision.com/articles/dark-current-suppression-technology/" target="_blank"><span data-dcnode-id="2583" instrument_node="">read this article by Roger Clark</span></a><span data-dcnode-id="2581" instrument_node="">.&nbsp;</span></span><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node="">
</span><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">
</span><span data-dcnode-id="2574" style="font-size:14px;"><span data-dcnode-id="2575" instrument_node="">This purple noise is mainly caused by sensor heat and lack of light. &nbsp;Therefore, you will likely notice this problem&nbsp;on warm nights. &nbsp;Using Live View will increase the sensor temperature the most. &nbsp;Therefore, it's best to minimize Live View usage, if possible. &nbsp;If your camera has a flip-out or rotating screen, move it away from the camera body. &nbsp;This will help to keep the camera a bit cooler. &nbsp;The ambient air temperature will also have an affect&nbsp;on the sensor's temperature. &nbsp;If it's a warm night, the sensor will take longer to cool down.</span></span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" style="font-size:14px;"><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpreview.com/forums/thread/3794038" target="_blank"><span data-dcnode-id="2571" instrument_node="">Click here for more information on keeping your sensor cool at night</span></a><span data-dcnode-id="2569" instrument_node="">, and how a hot sensor can cause more noise</span></span></p><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" style="font-size:14px;"><span data-dcnode-id="2565" instrument_node="">The amount of light captured will also have a major effect on the level of amp glow in your photos.&nbsp; Basically, the sensor needs to collect photons, which&nbsp;provide information for the final image.&nbsp; If the camera doesn't capture a lot of photons, the underlying sensor noise and heat will be visible in the photo.&nbsp; Imagine a canvas and a painter.&nbsp; If the painter doesn't put enough paint in the corners, the canvas will still be visible.&nbsp; Same thing here, but with light instead of paint.&nbsp;</span></span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2560" style="font-size:14px;"><span data-dcnode-id="2561" instrument_node="">The Before/After&nbsp;below shows a 15 second photo&nbsp;at ISO 12800, vs a 4 minute long photo at ISO 800.&nbsp; By capturing 16 times more light, the After image shows a massive improvement.&nbsp; Next time you head out, try taking a 4 minute long photo, instead of a 20 or 30 second image.&nbsp; Of course, you will need to blend in a sky exposure.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2555" instrument_node="">
</span><div class="beforeandafter" data-dcnode-id="2539" id="baf4"><span data-dcnode-id="2554" instrument_node="">
</span><div class="before" data-dcnode-id="2549" style="transition-timing-function: cubic-bezier(0.39, 0.575, 0.51, 1.65); transition-duration: 1s; width: 471px; opacity: 1;"><img data-dcnode-id="2553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-3/p2862330183-6.jpg&amp;raw" style="width: 944px; height: auto;"><span data-dcnode-id="2552" instrument_node=""> </span><span class="caption" data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">BEFORE</span></span></div><span data-dcnode-id="2548" instrument_node="">
</span><div class="after" data-dcnode-id="2543" style="opacity: 1;"><img data-dcnode-id="2547" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-3/p2862330196-6.jpg&amp;raw" style="width: 944px; height: auto;"><span data-dcnode-id="2546" instrument_node=""> </span><span class="caption" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">AFTER</span></span></div><span data-dcnode-id="2542" instrument_node="">
</span><div class="drag" data-dcnode-id="2540" style="transition-timing-function: cubic-bezier(0.39, 0.575, 0.51, 1.65); transition-duration: 1s; left: 471px; opacity: 1;"><div class="draghandle" data-dcnode-id="2541" style="left: -7px; top: 252px;"></div></div></div><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2532" instrument_node="">
</span><h2 data-dcnode-id="2529"><span data-dcnode-id="2530" style="font-size:26px;"><span data-dcnode-id="2531" instrument_node="">Long Exposure Noise Reduction</span></span></h2><span data-dcnode-id="2528" instrument_node="">
</span><h3 data-dcnode-id="2525"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">*May 2018 Update:&nbsp;</span></strong></h3><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">I've recently discovered a bad "glitch" when using Long Exposure Noise Reduction at night.&nbsp; On my Nikon D750, LENR causes the stars to have really weird colors, including green, magenta, and cyan.&nbsp; After a recent series of tests, I've confirmed this problem is a direct result of using LENR in-camera.&nbsp; Therefore, I would recommend everyone try this test on your own images ASAP.&nbsp;</span></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Set your camera to ISO 3200, f/4, 30 seconds.&nbsp; Take one image with LENR turned OFF, and another with it turned ON.&nbsp; Zoom in at least 100% on your computer and see if you notice the same issue as below:</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2515" instrument_node="">
</span><div class="beforeandafter" data-dcnode-id="2499" id="baf5"><span data-dcnode-id="2514" instrument_node="">
</span><div class="before" data-dcnode-id="2509" style="transition-timing-function: cubic-bezier(0.39, 0.575, 0.51, 1.65); transition-duration: 1s; width: 471px; opacity: 1;"><img data-dcnode-id="2513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-3/p2872249107-5.jpg&amp;raw" style="width: 944px; height: auto;"><span data-dcnode-id="2512" instrument_node=""> </span><span class="caption" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">LENR OFF</span></span></div><span data-dcnode-id="2508" instrument_node="">
</span><div class="after" data-dcnode-id="2503" style="opacity: 1;"><img data-dcnode-id="2507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-3/p2872249108-5.jpg&amp;raw" style="width: 944px; height: auto;"><span data-dcnode-id="2506" instrument_node=""> </span><span class="caption" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">LENR ON</span></span></div><span data-dcnode-id="2502" instrument_node="">
</span><div class="drag" data-dcnode-id="2500" style="transition-timing-function: cubic-bezier(0.39, 0.575, 0.51, 1.65); transition-duration: 1s; left: 471px; opacity: 1;"><div class="draghandle" data-dcnode-id="2501" style="left: -7px; top: 252px;"></div></div></div><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" style="line-height: 18px;"><span data-dcnode-id="2491" instrument_node="">Once LENR is turned on in your camera's menu, any Long Exposure you take (usually 1 second or longer) will engage the Noise Reduction.&nbsp; The camera takes another exposure of equal length, a dark frame.&nbsp; Then, the&nbsp;camera compares the Dark Frame with the original photo, removes any Hot Pixels and Amp Glow, and saves a final RAW or JPEG photo.&nbsp; Keep in mind, the camera will be unusable during the LENR stage.&nbsp; If you take a 4 minute exposure, you will need to wait another 4 minutes for the camera to capture the Dark Frame and then process the final image.&nbsp; The image below shows just how well LENR works at removing hot pixels.</span></span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2486" style="line-height: 18px;"><span data-dcnode-id="2487" instrument_node="">I would only recommend using LENR when photographing your landscapes / foregrounds at night.&nbsp; This is the easiest and most effective way of removing hot pixels, if you don't want to remove them manually in Photoshop.&nbsp; However, be sure to turn LENR OFF when photographing the Milky Way or sky, as it will likely cause the weird color shift seen above.</span></span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2483" instrument_node="">
</span><span class="zb-richtext largeimage" data-dcnode-id="2475" style="width:944px;height:575px;margin-left:10px;margin-right:10px;margin-top:10px;margin-bottom:10px;padding:0px;"><span class="pv pv-static pv-ready" data-dcnode-id="2477" id="_aaaeBa"><span class="pv-outer" data-dcnode-id="2478"><span class="pv-inner" data-dcnode-id="2479" style="left:0px;top:0px;width:944px;height:575px;"><img class="pv-img pv-burned" data-dcnode-id="2482" height="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peterzelinka.com/img/s/v-10/p2373843838-5.jpg&amp;raw" style="left:0px;top:0px;width:944px;height:576px;" width="944"><span class="pv-pinit" data-dcnode-id="2480" data-href="https://www.pinterest.com/pin/create/button/?url=https://www.peterzelinka.com/astrophotography&amp;media=https://www.peterzelinka.com/img/s/v-10/p2373843838-6.jpg&amp;description=&amp;layout=none&amp;ref=https://www.peterzelinka.com/astrophotography" id="_aaaeBapinit" onclick="window.open($(this).attr('data-href')); return false;"><img data-dcnode-id="2481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pinterest.com/images/pidgets/pinit_fg_en_rect_gray_20.png&amp;raw"></span></span></span></span><span data-dcnode-id="2476" instrument_node="">

</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h2 data-dcnode-id="2464"><span data-dcnode-id="2465" style="font-size:26px;"><span data-dcnode-id="2466" instrument_node="">Hot Pixels</span></span></h2><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">As we saw above, Hot Pixels will look like bright, multi-colored dots in your image. &nbsp;The warmer it is outside, the more hot pixels you will see in your image.&nbsp; Likewise, if you take photos longer than 30 seconds, the sensor will usually start to produce a lot of hot pixels.&nbsp; If you forget to enable Long Exposure Noise Reduction, and have an awesome image plagued by hot pixels, there are ways to fix it.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">If you remembered to take a Dark Frame while you were out shooting, you can try the Photoshop Subtract method, detailed in the video below. &nbsp;The best way to remove hot pixels in post-processing is the Dust and Scratches Filter in Photoshop. &nbsp;This works wonders on hot pixels, but it can be tricky to get right. &nbsp;The video below covers the process in detail.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">In my experience, Long Exposure Noise Reduction is the easiest and best method to removing Hot Pixels. &nbsp;However, it does not seem to do much for Amp Glow; so be sure to take a Dark Frame while you are shooting and use the Photoshop Subtract method to reduce Amp Glow.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">For more information on removing Hot Pixels, watch the video below.</span></p><span data-dcnode-id="2451" instrument_node="">

</span><h1 data-dcnode-id="1917" style="text-align: center;"><span data-dcnode-id="1918" instrument_node="">Photo Stacking to Reduce Noise</span></h1><span data-dcnode-id="1916" instrument_node="">
</span><hr data-dcnode-id="1915"><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">In order to reduce noise and increase detail in your Milky Way images, it is essential to do Photo Stacking. &nbsp;This process enables you to take multiple photos and have Photoshop find and remove grain. &nbsp;This is my favorite method for creating noise-free Milky Way photos. &nbsp;If you are familiar with taking star trail photos, it's the same process. &nbsp;You need to capture 10+ images, one after the other, and blend them together. &nbsp;This process can be complicated when using a wide angle lens however.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">Since the stars are moving in each frame,&nbsp;Photoshop will have a tough time aligning images taken with a wide angle lens (14mm). &nbsp;Photoshop can never properly align images taken with my Rokinon 14mm due to the wide angle distortion.&nbsp; I've had the best alignment success when using my Sigma 35mm lens.&nbsp; There is a free program that can successfully blend wide-angle photos to reduce noise, it's called </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/sequatorglobal/" target="_blank"><span data-dcnode-id="1909" instrument_node="">Sequator</span></a><span data-dcnode-id="1907" instrument_node="">.&nbsp; I&nbsp;recommend using this application for photo stacking not only wide angle images, but nebula and galaxy photos as well!&nbsp; You can watch my tutorial below.&nbsp;</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1904" instrument_node="">

</span><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Long Exposure Noise Reduction OFF</span></li><span data-dcnode-id="1359" instrument_node="">
</span></ul><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1356" instrument_node="">With those settings dialed in, take a test shot and verify everything is sharp. &nbsp;Now, use your camera's built in intervalometer (or use external device) and set it for anywhere between 10 to&nbsp;50+&nbsp;exposures. &nbsp;The more images you have, the less grainy the final image will be. &nbsp;Set the Interval to either 1 or 2&nbsp;seconds longer than your shutter speed. &nbsp;(8&nbsp;Second interval for 6 second shutter speed) &nbsp;If you've done Star Trails before, using the Intervalometer, it's the same process.</span><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">
</span><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">
This method takes a bit more work, but it can be very beneficial for noise reduction. &nbsp;At the very least, you can use this method to remove the noise from your foreground. &nbsp;Combine this with a Dark Frame subtraction and your images will be looking good! &nbsp;No Amp Glow, no hot pixels, and minimal noise!</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h1 data-dcnode-id="1347" style="text-align: center;"><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">
Post Processing</span></h1><span data-dcnode-id="1346" instrument_node="">
</span><hr data-dcnode-id="1345"><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1337"><br data-dcnode-id="1343"><span data-dcnode-id="1342" instrument_node="">
</span><span data-dcnode-id="1340" style="line-height: 18px;"><span data-dcnode-id="1341" instrument_node="">Milky Way photos straight out of the camera are very boring, in my opinion. &nbsp;To fully&nbsp;</span></span><span data-dcnode-id="1338" style="line-height: 18px;"><span data-dcnode-id="1339" instrument_node="">bring out the detail and color&nbsp;takes an extensive knowledge of Adobe Camera RAW and Photoshop.</span></span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" style="line-height: 18px;"><span data-dcnode-id="1335" instrument_node="">You can watch a full-length Milky Way editing tutorial over on my YouTube page.</span></span></p><span data-dcnode-id="1332" instrument_node="">
