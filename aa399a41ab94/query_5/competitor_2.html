</span><p class="normal" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">So by now you should know the name of the galaxy that our star – The Sun, and our planet – The Earth are in. If you are still unsure, our galaxy is called the ‘Milky Way’</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p class="normal" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The Milky Way galaxy is a disc shaped spiral galaxy with a huge collection of stars, about 100-400 billion. We don’t know exactly, but we know it’s over 200 billion. Wow. Not bad for a mid-size galaxy! But compared to other galaxies and star clusters&nbsp;The Milky Way is&nbsp;small.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p class="normal" data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node="">So it’s a medium size galaxy. The</span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ouruniverseforkids.com/the-solar-system/"><span data-dcnode-id="1402" instrument_node=""> solar system</span></a><span data-dcnode-id="1400" instrument_node=""> is located on one of the arms of the spirals. The milky way is 100,000 light years across. That’s a lot of miles!</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p class="normal" data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">Scientists believe that when the milky way galaxy was formed all of those billions of years ago, that a super massive </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ouruniverseforkids.com/black-holes/"><span data-dcnode-id="1396" instrument_node="">black hole </span></a><span data-dcnode-id="1394" instrument_node="">was also&nbsp;formed at the same time. They believe that the black hole was formed when a massive gas cloud collapsed in on itself.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p class="normal" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Everything in the Milky Way scientists believe revolves around this black hole. Let’s park black holes for now. We will explain what black holes are in a different section.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">As we are in the Milky Way, all the stars that you see in the nights sky are a part of the milky way.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">From anywhere on Earth we can see up to 10,000 stars, however that is not a lot compared to the amount of stars that are hurdling throughout our galaxy. So while you can only see a small amount of stars, we know that there are billions more stars in the&nbsp;milky way&nbsp;through the use of very advanced telescopes.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">So while we can map our mid size galaxy,&nbsp;we cannot see it in that way, as we are inside this amazing thing. What we can see however is our nearest neighbouring galaxy. Called Andromeda. This galaxy is also a spiral galaxy an is as fascinating as ours.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><img alt="Milky Way Galaxy" class="size-full wp-image-450" data-dcnode-id="1376" height="556" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ouruniverseforkids.com/wp-content/uploads/2016/05/Milky-Way-1.jpg&amp;raw" srcset="https://www.ouruniverseforkids.com/wp-content/uploads/2016/05/Milky-Way-1.jpg 680w, https://www.ouruniverseforkids.com/wp-content/uploads/2016/05/Milky-Way-1-300x245.jpg 300w" width="680"></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1366"><em data-dcnode-id="1367"><span data-dcnode-id="1368" style="font-size: 14pt;"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Kids Fun Facts Corner</span></strong></span></em></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node=""># 1. The sun travels around the Milky Way at about 500,000 miles per hour.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""># 2. The sun takes about 220 million years to travel around the Milky Way just one time.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node=""># 3. As we live within the Milky Way, we don’t actually know what our galaxy looks like. We know that it’s a spiral galaxy, so any pictures you see of our galaxy are taken from other spiral galaxies in the universe.</span></p><span data-dcnode-id="1356" instrument_node="">
