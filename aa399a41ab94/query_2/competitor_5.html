	                     Reset image size
					</span></button></span></div></div><figcaption data-dcnode-id="3134"><div class="article-text figure-caption" data-dcnode-id="3144"><p data-dcnode-id="3145"><strong data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Figure 10.</span></strong><span data-dcnode-id="3161" instrument_node="">&nbsp;Sun's peculiar velocity with respect to circular motion. This figure shows the posterior probability distribution function of the Sun's velocity with respect to the circular orbit at the solar radius. The measurement of the Sun's motion with respect to the orbit of a zero-velocity-dispersion population from Schönrich et al. (</span><a class="cite" data-dcnode-id="3159" href="#apj447278r72" id="fnref-apj447278r72"><span data-dcnode-id="3160" instrument_node="">2010</span></a><span data-dcnode-id="3158" instrument_node="">, hereafter SBD10) is indicated by dashed lines. The fact that our measurement of the Sun's rotational peculiar velocity does not agree with the </span><a class="cite" data-dcnode-id="3156" href="#apj447278r72" id="fnref-apj447278r72"><span data-dcnode-id="3157" instrument_node="">SBD10</span></a><span data-dcnode-id="3155" instrument_node=""> value may indicate that the closed orbit at the solar radius is not circular, due to non-axisymmetry at the level of 10&nbsp;km&nbsp;s</span><sup data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">−1</span></sup><span data-dcnode-id="3152" instrument_node="">. The inset shows this non-circular closed orbit (spatially to scale) if the non-axisymmetry is due to ellipticity of the disk (e.g., Kuijken &amp; Tremaine </span><a class="cite" data-dcnode-id="3150" href="#apj447278r56" id="fnref-apj447278r56"><span data-dcnode-id="3151" instrument_node="">1994</span></a><span data-dcnode-id="3149" instrument_node="">); the dashed gray curve is the circular orbit. Alternatively, the locally determined solar motion may be off by ∼10 km s</span><sup data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">−1</span></sup><span data-dcnode-id="3146" instrument_node="">.</span></p></div><p class="mb-05 print-hide" data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="3135"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f10_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DkjuJngrtdYjpdEKlH7rSoYJZl4Q%253D" id="wd-jnl-art-btn-std-img-apj447278f10"><span class="icon-image" data-dcnode-id="3141"></span><span data-dcnode-id="3140" instrument_node=""> Standard image
					</span></a><a class="btn btn-primary fig-dwnld-hi-img" data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f10_hr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3D1lIkI0KCnU5TX8ihWLZ8pPpxays%253D" id="wd-jnl-art-btn-hires-img-apj447278f10"><span class="icon-image" data-dcnode-id="3138"></span><span data-dcnode-id="3137" instrument_node=""> High-resolution image
					</span></a></span></figcaption></figure></figure><p data-dcnode-id="3038"><span data-dcnode-id="3131" instrument_node="">This discrepancy may result from a breakdown in the assumptions of the locally measured solar motion using Strömberg's asymmetric-drift relation. As convincingly shown by Schönrich et al. (</span><a class="cite" data-dcnode-id="3129" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3130" instrument_node="">2010</span></a><span data-dcnode-id="3128" instrument_node="">), the neglect of the radial metallicity gradient in the analysis of Dehnen &amp; Binney (</span><a class="cite" data-dcnode-id="3126" href="#apj447278r27" id="fnref-apj447278r27" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3127" instrument_node="">1998</span></a><span data-dcnode-id="3125" instrument_node="">) leads to a correction of ∼7 km s</span><sup data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">−1</span></sup><span data-dcnode-id="3122" instrument_node="">, but further improvements in the chemical-evolution model of Schönrich et al. (</span><a class="cite" data-dcnode-id="3120" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3121" instrument_node="">2010</span></a><span data-dcnode-id="3119" instrument_node="">) might lead to further corrections. The local velocity distribution has also long been known to contain various streams or "moving groups" (e.g., Kapteyn </span><a class="cite" data-dcnode-id="3117" href="#apj447278r48" id="fnref-apj447278r48" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3118" instrument_node="">1905</span></a><span data-dcnode-id="3116" instrument_node="">; Schwarzschild </span><a class="cite" data-dcnode-id="3114" href="#apj447278r73" id="fnref-apj447278r73" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3115" instrument_node="">1907</span></a><span data-dcnode-id="3113" instrument_node="">; Eggen </span><a class="cite" data-dcnode-id="3111" href="#apj447278r29" id="fnref-apj447278r29" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3112" instrument_node="">1986</span></a><span data-dcnode-id="3110" instrument_node="">; Dehnen </span><a class="cite" data-dcnode-id="3108" href="#apj447278r24" id="fnref-apj447278r24" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3109" instrument_node="">1998</span></a><span data-dcnode-id="3107" instrument_node="">; Bovy et al. </span><a class="cite" data-dcnode-id="3105" href="#apj447278r12" id="fnref-apj447278r12" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3106" instrument_node="">2009b</span></a><span data-dcnode-id="3104" instrument_node="">) that are likely of a dynamical origin (Bensby et al. </span><a class="cite" data-dcnode-id="3102" href="#apj447278r3" id="fnref-apj447278r3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3103" instrument_node="">2007</span></a><span data-dcnode-id="3101" instrument_node="">; Famaey et al. </span><a class="cite" data-dcnode-id="3099" href="#apj447278r31" id="fnref-apj447278r31" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3100" instrument_node="">2008</span></a><span data-dcnode-id="3098" instrument_node="">; Bovy &amp; Hogg </span><a class="cite" data-dcnode-id="3096" href="#apj447278r10" id="fnref-apj447278r10" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3097" instrument_node="">2010</span></a><span data-dcnode-id="3095" instrument_node="">; Sellwood </span><a class="cite" data-dcnode-id="3093" href="#apj447278r74" id="fnref-apj447278r74" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3094" instrument_node="">2010</span></a><span data-dcnode-id="3092" instrument_node="">) and contain a significant fraction of the nearby stars (Bovy et al. </span><a class="cite" data-dcnode-id="3090" href="#apj447278r12" id="fnref-apj447278r12" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3091" instrument_node="">2009b</span></a><span data-dcnode-id="3089" instrument_node="">). These moving groups make an accurate determination of the solar motion challenging. As such, the locally determined correction for the Sun's motion with respect to the LSR may well be incorrect by ∼5 km s</span><sup data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">−1</span></sup><span data-dcnode-id="3086" instrument_node=""> or more. A solar motion of ∼24 km s</span><sup data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">−1</span></sup><span data-dcnode-id="3083" instrument_node=""> rather than ∼12 km s</span><sup data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">−1</span></sup><span data-dcnode-id="3080" instrument_node=""> is not much more unlikely given the DF for a ∼5 Gyr population: using a Dehnen DF (Equation (</span><a class="eqnref" data-dcnode-id="3078" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3079" instrument_node="">6</span></a><span data-dcnode-id="3077" instrument_node="">)) with a radial dispersion of 30 km s</span><sup data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">−1</span></sup><span data-dcnode-id="3074" instrument_node=""> (Equation (</span><a class="eqnref" data-dcnode-id="3072" href="#apj447278fd11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3073" instrument_node="">11</span></a><span data-dcnode-id="3071" instrument_node="">)) and assuming our best-fit model gives </span><em data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">P</span></em><span data-dcnode-id="3068" instrument_node="">(</span><em data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">V</span></em><sub data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3063" instrument_node=""> − </span><em data-dcnode-id="3059"><span data-dcnode-id="3062" instrument_node="">V</span><sub data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">c</span></sub></em><span data-dcnode-id="3058" instrument_node=""> &gt; 12 km s</span><sup data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">−1</span></sup><span data-dcnode-id="3055" instrument_node="">) ≈ 0.2 and </span><em data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">P</span></em><span data-dcnode-id="3052" instrument_node="">(</span><em data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">V</span></em><sub data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3047" instrument_node=""> − </span><em data-dcnode-id="3043"><span data-dcnode-id="3046" instrument_node="">V</span><sub data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">c</span></sub></em><span data-dcnode-id="3042" instrument_node=""> &gt; 24 km s</span><sup data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">−1</span></sup><span data-dcnode-id="3039" instrument_node="">) ≈ 0.1.</span></p><p data-dcnode-id="3027"><span data-dcnode-id="3037" instrument_node="">However, if Strömberg's relation leads to a solar motion with respect to the LSR that is different from the globally determined solar motion with respect to the RSR, the most straightforward interpretation is that LSR's orbit is not circular, but deviates from circularity by about 10 km s</span><sup data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">−1</span></sup><span data-dcnode-id="3034" instrument_node=""> because of large-scale, non-axisymmetric streaming motions. The deviation cannot be much larger than this value, as the </span><em data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">radial</span></em><span data-dcnode-id="3031" instrument_node=""> component of the solar motion as determined from local samples agrees with our global measurement. As our measurement of the circular velocity is mainly at azimuths ϕ ≲ 45°, this 10 km s</span><sup data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">−1</span></sup><span data-dcnode-id="3028" instrument_node=""> deviation must happen over this angular scale.</span></p><p data-dcnode-id="2924"><span data-dcnode-id="3026" instrument_node="">There is mounting evidence for the existence of streaming motions in the Galactic disk of this magnitude. There has been a long-standing discrepancy of ∼7 km s</span><sup data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">−1</span></sup><span data-dcnode-id="3023" instrument_node=""> between the rotation curves determined from first (</span><em data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">l</span></em><span data-dcnode-id="3020" instrument_node=""> &lt; 90°) and fourth (</span><em data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">l</span></em><span data-dcnode-id="3017" instrument_node=""> &gt; 270°) quadrant tangent-point measurements (e.g., Kerr </span><a class="cite" data-dcnode-id="3015" href="#apj447278r49" id="fnref-apj447278r49" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3016" instrument_node="">1962</span></a><span data-dcnode-id="3014" instrument_node="">; Gunn et al. </span><a class="cite" data-dcnode-id="3012" href="#apj447278r42" id="fnref-apj447278r42" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3013" instrument_node="">1979</span></a><span data-dcnode-id="3011" instrument_node="">; Levine et al. </span><a class="cite" data-dcnode-id="3009" href="#apj447278r59" id="fnref-apj447278r59" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3010" instrument_node="">2008</span></a><span data-dcnode-id="3008" instrument_node="">), which could indicate streaming motions. Similarly, the analysis of the extreme line-of-sight velocity of H </span><span class="small-caps" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">i</span></span><span data-dcnode-id="3005" instrument_node=""> emission toward </span><em data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">l</span></em><span data-dcnode-id="3002" instrument_node=""> ∼ 90° leads to differences in </span><em data-dcnode-id="2998"><span data-dcnode-id="3001" instrument_node="">V</span><sub data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">c</span></sub></em><span data-dcnode-id="2997" instrument_node=""> of approximately 30 km s</span><sup data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">−1</span></sup><span data-dcnode-id="2994" instrument_node="">, albeit with large uncertainties (Knapp et al. </span><a class="cite" data-dcnode-id="2992" href="#apj447278r52" id="fnref-apj447278r52" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2993" instrument_node="">1979</span></a><span data-dcnode-id="2991" instrument_node="">; Jackson &amp; Kerr </span><a class="cite" data-dcnode-id="2989" href="#apj447278r47" id="fnref-apj447278r47" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2990" instrument_node="">1981</span></a><span data-dcnode-id="2988" instrument_node="">; Jackson </span><a class="cite" data-dcnode-id="2986" href="#apj447278r46" id="fnref-apj447278r46" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2987" instrument_node="">1985</span></a><span data-dcnode-id="2985" instrument_node="">). The fact that the maximum line-of-sight velocity in both CO and 21&nbsp;cm data reaches zero at </span><em data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">l</span></em><span data-dcnode-id="2982" instrument_node=""> ∼ 70°, rather than at </span><em data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">l</span></em><span data-dcnode-id="2979" instrument_node=""> = 90°, has been used to argue that the LSR moves ahead of </span><em data-dcnode-id="2975"><span data-dcnode-id="2978" instrument_node="">V</span><sub data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">c</span></sub></em><span data-dcnode-id="2974" instrument_node=""> with a speed of ∼7.5 km s</span><sup data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">−1</span></sup><span data-dcnode-id="2971" instrument_node=""> (Shuter </span><a class="cite" data-dcnode-id="2969" href="#apj447278r75" id="fnref-apj447278r75" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2970" instrument_node="">1982</span></a><span data-dcnode-id="2968" instrument_node="">; Clemens </span><a class="cite" data-dcnode-id="2966" href="#apj447278r23" id="fnref-apj447278r23" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2967" instrument_node="">1985</span></a><span data-dcnode-id="2965" instrument_node="">), similar to the offset we find. More recently, an analysis of line-of-sight velocities from the </span><em data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">RAVE</span></em><span data-dcnode-id="2962" instrument_node=""> has found a gradient, </span><span class="inline-eqn" data-dcnode-id="2956" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="2957"><span class="texImage" data-dcnode-id="2960"><img align="top" alt="$d\bar{V}_R / dR$" data-dcnode-id="2961" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn14.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=9bb0Dt1stwQizDD0IlckB%2B1TMj4%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="2955" instrument_node="">, in the mean radial velocity, </span><span class="inline-eqn" data-dcnode-id="2949" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="2950"><span class="texImage" data-dcnode-id="2953"><img align="top" alt="$\bar{V}_R$" data-dcnode-id="2954" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn15.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=9s2K4KOxV8Sab7t2laODtU4nrFY%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="2948" instrument_node="">, of ∼3 km s</span><sup data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">−1</span></sup><span data-dcnode-id="2945" instrument_node=""> kpc</span><sup data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">−1</span></sup><span data-dcnode-id="2942" instrument_node="">, and large streaming motions in both </span><span class="inline-eqn" data-dcnode-id="2936" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="2937"><span class="texImage" data-dcnode-id="2940"><img align="top" alt="$\bar{V}_R$" data-dcnode-id="2941" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn16.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=Mr9mI6KFL4nbYR%2Fc3dRGcqrg6es%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="2935" instrument_node=""> and the mean tangential velocity, </span><span class="inline-eqn" data-dcnode-id="2929" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="2930"><span class="texImage" data-dcnode-id="2933"><img align="top" alt="$\bar{V}_\phi$" data-dcnode-id="2934" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn17.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=AS7HPKe8TuvqcEUkpScqK5vb8fE%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="2928" instrument_node="">, within a few kiloparsecs from the Sun (Siebert et al. </span><a class="cite" data-dcnode-id="2926" href="#apj447278r76" id="fnref-apj447278r76" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2927" instrument_node="">2011</span></a><span data-dcnode-id="2925" instrument_node="">).</span></p><p data-dcnode-id="2905"><span data-dcnode-id="2923" instrument_node="">As a simple exploration of this possibility, we have computed the closed orbit at </span><em data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">R</span></em><sub data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">0</span></sub><span data-dcnode-id="2918" instrument_node=""> in a model for the Milky Way disk where this streaming motion is due to ellipticity of the disk, following Kuijken &amp; Tremaine (</span><a class="cite" data-dcnode-id="2916" href="#apj447278r56" id="fnref-apj447278r56" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2917" instrument_node="">1994</span></a><span data-dcnode-id="2915" instrument_node="">). We use a flat rotation curve, with a cos (2 ϕ) perturbation of constant ellipticity having an amplitude of 14 km s</span><sup data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">−1</span></sup><span data-dcnode-id="2912" instrument_node="">. Such a perturbation could arise if, for example, the halo is triaxial (e.g., Law et al. </span><a class="cite" data-dcnode-id="2910" href="#apj447278r58" id="fnref-apj447278r58" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2911" instrument_node="">2009</span></a><span data-dcnode-id="2909" instrument_node="">). The closed orbit is shown to scale in the inset in Figure </span><a data-dcnode-id="2907" href="#apj447278f10" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2908" instrument_node="">10</span></a><span data-dcnode-id="2906" instrument_node="">; it has an eccentricity of 0.06.</span></p><p data-dcnode-id="2874"><span data-dcnode-id="2904" instrument_node="">Regardless of the origin of the discrepancy between our globally measured solar motion and the locally measured value, our larger preferred value of </span><em data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">V</span></em><sub data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2899" instrument_node=""> − </span><em data-dcnode-id="2895"><span data-dcnode-id="2898" instrument_node="">V</span><sub data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">c</span></sub></em><span data-dcnode-id="2894" instrument_node=""> means that the Sun is likely closer to the pericenter of its orbit around the Galactic center than previously believed. Revising </span><em data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">V</span></em><sub data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2889" instrument_node=""> − </span><em data-dcnode-id="2885"><span data-dcnode-id="2888" instrument_node="">V</span><sub data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">c</span></sub></em><span data-dcnode-id="2884" instrument_node=""> upward by 12 km s</span><sup data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">−1</span></sup><span data-dcnode-id="2881" instrument_node=""> increases the eccentricity of the Sun's orbit to ∼0.1 from ∼0.06 and increases its mean Galactocentric radius to ∼8.9 kpc from ∼8.5 kpc. Such a large mean radius increases the tension between the Sun's high metallicity compared to local stars (Wielen et al. </span><a class="cite" data-dcnode-id="2879" href="#apj447278r84" id="fnref-apj447278r84" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2880" instrument_node="">1996</span></a><span data-dcnode-id="2878" instrument_node="">), although the peak of the local metallicity distribution may be closer to solar metallicity than previously believed (e.g., Casagrande et al. </span><a class="cite" data-dcnode-id="2876" href="#apj447278r20" id="fnref-apj447278r20" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2877" instrument_node="">2011</span></a><span data-dcnode-id="2875" instrument_node="">).</span></p><p data-dcnode-id="2795"><span data-dcnode-id="2873" instrument_node="">Finally, we address what our results imply for dark-matter direct-detection experiments, and for correcting the motion of Galactic and extragalactic objects for the motion of the Sun. Both of these applications essentially require knowledge of the </span><em data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">total</span></em><span data-dcnode-id="2870" instrument_node=""> Galactocentric solar velocity, </span><em data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">V</span></em><sub data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2865" instrument_node="">, to transform velocities into the Galactocentric (dark-matter-halo) rest frame.</span><sup class="fnref" data-dcnode-id="2862" xmlns:xlink="http://www.w3.org/1999/xlink"><a class="fnref" data-dcnode-id="2863" href="#apj447278fn2"><span data-dcnode-id="2864" instrument_node="">25</span></a></sup><span data-dcnode-id="2861" instrument_node=""> Although this motion is often decomposed as </span><em data-dcnode-id="2857"><span data-dcnode-id="2860" instrument_node="">V</span><sub data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">c</span></sub></em><span data-dcnode-id="2856" instrument_node=""> plus the Sun's motion with respect to </span><em data-dcnode-id="2852"><span data-dcnode-id="2855" instrument_node="">V</span><sub data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">c</span></sub></em><span data-dcnode-id="2851" instrument_node="">, our results in this paper show that this is unnecessarily dangerous, as it requires the </span><em data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">strong assumption</span></em><span data-dcnode-id="2848" instrument_node=""> that the LSR is on a circular orbit, such that </span><em data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">V</span></em><sub data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2843" instrument_node=""> = </span><em data-dcnode-id="2839"><span data-dcnode-id="2842" instrument_node="">V</span><sub data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">c</span></sub></em><span data-dcnode-id="2838" instrument_node=""> + </span><em data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">V</span></em><sub data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">ϕ, ☉, LSR</span></sub><span data-dcnode-id="2833" instrument_node="">, where the final term is the solar velocity with respect to the LSR. Our results in Section </span><a class="secref" data-dcnode-id="2831" href="#apj447278s4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2832" instrument_node="">4</span></a><span data-dcnode-id="2830" instrument_node=""> strongly rule out that this assumption holds for the currently accepted solar motion of ∼12 km s</span><sup data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">−1</span></sup><span data-dcnode-id="2827" instrument_node="">. However, this approach is entirely unnecessary for correcting velocities to the Galactocentric rest frame, as the proper motion of Sgr&nbsp;A* combined with the "clean" estimate of </span><em data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">R</span></em><sub data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">0</span></sub><span data-dcnode-id="2822" instrument_node=""> from Galactic-center dynamics shows that </span><em data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">V</span></em><sub data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2817" instrument_node=""> ≈ 242 km s</span><sup data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">−1</span></sup><span data-dcnode-id="2814" instrument_node="">, which agrees with our measured value of </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">V</span></em><sub data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2809" instrument_node="">. Adopting a standard </span><em data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">V</span></em><sub data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2804" instrument_node=""> = 242 km s</span><sup data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">−1</span></sup><span data-dcnode-id="2801" instrument_node=""> for correcting velocities for the Sun's motion, and decoupling this correction from the question of the true value of </span><em data-dcnode-id="2797"><span data-dcnode-id="2800" instrument_node="">V</span><sub data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">c</span></sub></em><span data-dcnode-id="2796" instrument_node="">, would therefore be helpful.</span></p></div><h3 data-dcnode-id="2792" id="apj447278s5-4" name="apj447278s5-4"><span data-dcnode-id="2793" instrument_node="">5.4.&nbsp;Implications for the Mass of the Milky Way</span></h3><div class="article-text" data-dcnode-id="2636"><p data-dcnode-id="2721"><span data-dcnode-id="2791" instrument_node="">We can use our measurement of the inner rotation curve of the Milky Way to estimate the Milky Way's total dark-halo mass. We combine the measurements in this paper with those of the Milky Way's outer rotation curve (</span><em data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">R</span></em><span data-dcnode-id="2788" instrument_node=""> ≳ 20 kpc) of Xue et al. (</span><a class="cite" data-dcnode-id="2786" href="#apj447278r88" id="fnref-apj447278r88" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2787" instrument_node="">2008</span></a><span data-dcnode-id="2785" instrument_node="">; specifically, taking the measurements using simulation II in Table 3 of that paper). Based on Figure </span><a data-dcnode-id="2783" href="#apj447278f6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2784" instrument_node="">6</span></a><span data-dcnode-id="2782" instrument_node=""> and Table </span><a class="tabref" data-dcnode-id="2780" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2781" instrument_node="">2</span></a><span data-dcnode-id="2779" instrument_node="">, we add our measurement as a flat rotation curve with </span><em data-dcnode-id="2775"><span data-dcnode-id="2778" instrument_node="">V</span><sub data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">c</span></sub></em><span data-dcnode-id="2774" instrument_node=""> = 218 km s</span><sup data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">−1</span></sup><span data-dcnode-id="2771" instrument_node="">, evaluated at three radii with uncertainties of 3 km s</span><sup data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">−1</span></sup><span data-dcnode-id="2768" instrument_node="">, 6 km s</span><sup data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">−1</span></sup><span data-dcnode-id="2765" instrument_node="">, and 10 km s</span><sup data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">−1</span></sup><span data-dcnode-id="2762" instrument_node=""> at </span><em data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">R</span></em><span data-dcnode-id="2759" instrument_node=""> = 4 kpc, </span><em data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">R</span></em><span data-dcnode-id="2756" instrument_node=""> = 8 kpc, and </span><em data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">R</span></em><span data-dcnode-id="2753" instrument_node=""> = 12 kpc, respectively (removing the measurements at </span><em data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">R</span></em><span data-dcnode-id="2750" instrument_node=""> = 7.5 kpc and </span><em data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">R</span></em><span data-dcnode-id="2747" instrument_node=""> = 12.5 kpc from Xue et al. </span><a class="cite" data-dcnode-id="2745" href="#apj447278r88" id="fnref-apj447278r88" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2746" instrument_node="">2008</span></a><span data-dcnode-id="2744" instrument_node="">). We also use our recent measurements of the local density of dark matter, ρ</span><sub data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">DM</span></sub><span data-dcnode-id="2741" instrument_node=""> = 0.008 ± 0.003 </span><em data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">M</span></em><sub data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">☉</span></sub><span data-dcnode-id="2736" instrument_node=""> pc</span><sup data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">−3</span></sup><span data-dcnode-id="2733" instrument_node=""> (Bovy &amp; Tremaine </span><a class="cite" data-dcnode-id="2731" href="#apj447278r16" id="fnref-apj447278r16" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2732" instrument_node="">2012</span></a><span data-dcnode-id="2730" instrument_node="">), and of the disk scale length, </span><em data-dcnode-id="2726"><span data-dcnode-id="2729" instrument_node="">h</span><sub data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">R</span></sub></em><span data-dcnode-id="2725" instrument_node=""> = 3.25 ± 0.25 kpc (Bovy et al. </span><a class="cite" data-dcnode-id="2723" href="#apj447278r14" id="fnref-apj447278r14" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2724" instrument_node="">2012b</span></a><span data-dcnode-id="2722" instrument_node="">), revising the measurement from the latter paper downward to correct for the influence of the dark halo on that measurement.</span></p><p data-dcnode-id="2681"><span data-dcnode-id="2720" instrument_node="">We model the Milky Way's potential as the combination of a bulge component with a Hernquist profile with a scale length of 600 pc, a disk component with a scale height of 300 pc (Bovy et al. </span><a class="cite" data-dcnode-id="2718" href="#apj447278r13" id="fnref-apj447278r13" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2719" instrument_node="">2012a</span></a><span data-dcnode-id="2717" instrument_node="">) and a scale length that is a free parameter, and a Navarro–Frenk–White (NFW) halo (Navarro et al. </span><a class="cite" data-dcnode-id="2715" href="#apj447278r67" id="fnref-apj447278r67" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2716" instrument_node="">1997</span></a><span data-dcnode-id="2714" instrument_node="">), with a scale radius that is a free parameter (i.e., without constraint on the concentration). The relative contributions of these three components are free parameters. We then fit the data given in the previous paragraph, and we find that </span><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">M</span></em><sub data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">halo</span></sub><span data-dcnode-id="2709" instrument_node=""> = 8</span><sup data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">+8</span></sup><sub data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">− 2</span></sub><span data-dcnode-id="2704" instrument_node=""> </span><b data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">×</span></b><span data-dcnode-id="2701" instrument_node=""> 10</span><sup data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">11</span></sup><span data-dcnode-id="2698" instrument_node=""> </span><em data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">M</span></em><sub data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">☉</span></sub><span data-dcnode-id="2693" instrument_node="">. The total mass of the Milky Way is ∼8.5 </span><b data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">×</span></b><span data-dcnode-id="2690" instrument_node=""> 10</span><sup data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">11</span></sup><span data-dcnode-id="2687" instrument_node=""> </span><em data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">M</span></em><sub data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">☉</span></sub><span data-dcnode-id="2682" instrument_node="">.</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2680" instrument_node="">This "low" estimate for the mass of the Milky Way likely makes it less massive than M31, which has an estimated dark-halo mass of 14 </span><b data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">×</span></b><span data-dcnode-id="2677" instrument_node=""> 10</span><sup data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">11</span></sup><span data-dcnode-id="2674" instrument_node=""> </span><em data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">M</span></em><sub data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">☉</span></sub><span data-dcnode-id="2669" instrument_node=""> (Watkins et al. </span><a class="cite" data-dcnode-id="2667" href="#apj447278r83" id="fnref-apj447278r83" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2668" instrument_node="">2010</span></a><span data-dcnode-id="2666" instrument_node="">). This measurement leads to a combined mass for the Local Group of ∼2.4 </span><b data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">×</span></b><span data-dcnode-id="2663" instrument_node=""> 10</span><sup data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">12</span></sup><span data-dcnode-id="2660" instrument_node=""> </span><em data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">M</span></em><sub data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">☉</span></sub><span data-dcnode-id="2655" instrument_node="">, which is consistent with the Local-Group-timing-argument within the large cosmic scatter (van der Marel et al. </span><a class="cite" data-dcnode-id="2653" href="#apj447278r82" id="fnref-apj447278r82" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2654" instrument_node="">2012</span></a><span data-dcnode-id="2652" instrument_node="">). Our measurement of </span><em data-dcnode-id="2648"><span data-dcnode-id="2651" instrument_node="">V</span><sub data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">c</span></sub></em><span data-dcnode-id="2647" instrument_node=""> = 218 ± 6 km s</span><sup data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">−1</span></sup><span data-dcnode-id="2644" instrument_node=""> combined with its estimated </span><em data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">I</span></em><span data-dcnode-id="2641" instrument_node="">-band magnitude of −22.3&nbsp;mag makes the Milky Way underluminous with respect to the Tully–Fisher relation of external spiral galaxies by about 1σ (see Flynn et al. </span><a class="cite" data-dcnode-id="2639" href="#apj447278r34" id="fnref-apj447278r34" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2640" instrument_node="">2006</span></a><span data-dcnode-id="2638" instrument_node="">).</span></p></div></div><span data-dcnode-id="2634" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="2632" id="apj447278s6" name="apj447278s6"><span data-dcnode-id="2633" instrument_node="">6.&nbsp;CONCLUSION</span></h2><div class="article-text" data-dcnode-id="2536" data-mobile-collapse=""><p data-dcnode-id="2610"><span data-dcnode-id="2631" instrument_node="">In this paper, we have measured the Milky Way's rotation curve over the range 4 kpc &lt; </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">R</span></em><span data-dcnode-id="2628" instrument_node=""> &lt; 14 kpc from the new APOGEE data set of kinematically warm stellar tracers at large distances from the Sun. Our measurement is not "clean," in the sense of being a geometric measurement such as that provided by tangent-point observations of H </span><span class="small-caps" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">i</span></span><span data-dcnode-id="2625" instrument_node=""> emission or by a measurement of the Sun's motion relative to an object assumed to be at rest with respect to the Galactic center. Because we use a warm stellar population, we must correct for the offset between the average rotational velocity of this population and the circular velocity—the asymmetric drift—using a dynamical Jeans model. However, the fact that our measurement uses a dynamical effect, rather than being purely geometric, has the advantage that we unambiguously measure </span><em data-dcnode-id="2621"><span data-dcnode-id="2624" instrument_node="">V</span><sub data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">c</span></sub></em><span data-dcnode-id="2620" instrument_node="">(</span><em data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">R</span></em><span data-dcnode-id="2617" instrument_node="">) in the sense of the radial force at </span><em data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">R</span></em><span data-dcnode-id="2614" instrument_node="">, and that we can measure the solid-body-rotation contribution to the rotation curve, in contrast to H </span><span class="small-caps" data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">i</span></span><span data-dcnode-id="2611" instrument_node=""> measurements.</span></p><p data-dcnode-id="2541"><span data-dcnode-id="2609" instrument_node="">Our main results are discussed in Section </span><a class="secref" data-dcnode-id="2607" href="#apj447278s4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2608" instrument_node="">4</span></a><span data-dcnode-id="2606" instrument_node="">. We find that the Milky Way's rotation curve is approximately flat over 4 kpc &lt; </span><em data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">R</span></em><span data-dcnode-id="2603" instrument_node=""> &lt; 14 kpc, with </span><em data-dcnode-id="2599"><span data-dcnode-id="2602" instrument_node="">V</span><sub data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">c</span></sub></em><span data-dcnode-id="2598" instrument_node="">(</span><em data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">R</span></em><sub data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">0</span></sub><span data-dcnode-id="2593" instrument_node="">) = 218  ±  6 km s</span><sup data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">−1</span></sup><span data-dcnode-id="2590" instrument_node="">. Table </span><a class="tabref" data-dcnode-id="2588" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2589" instrument_node="">2</span></a><span data-dcnode-id="2587" instrument_node=""> summarizes our results, and provides some alternative representations, such as the Oort constants, the local rotational frequency, and the contribution of the non-flatness of the rotation curve to a cylindrical-Poisson-equation determination of the local surface-mass and dark-matter densities. We simultaneously measure the Sun's velocity in the Galactocentric rest frame—these are independent free parameters in our model—and find that </span><em data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">V</span></em><sub data-dcnode-id="2581"><em data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">R</span></em><span data-dcnode-id="2582" instrument_node="">, ☉</span></sub><span data-dcnode-id="2580" instrument_node=""> = −10 ± 1 km s</span><sup data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">−1</span></sup><span data-dcnode-id="2577" instrument_node=""> and the angular motion of the Galactic center μ = 6.3</span><sup data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">+0.1</span></sup><sub data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">− 0.7</span></sub><span data-dcnode-id="2572" instrument_node=""> mas yr</span><sup data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">−1</span></sup><span data-dcnode-id="2569" instrument_node="">. These values are consistent with previous studies. Our measurement of </span><em data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">V</span></em><sub data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2564" instrument_node=""> = 242</span><sup data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">+10</span></sup><sub data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">− 3</span></sub><span data-dcnode-id="2559" instrument_node=""> km s</span><sup data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">−1</span></sup><span data-dcnode-id="2556" instrument_node=""> then leads to a solar offset from </span><em data-dcnode-id="2552"><span data-dcnode-id="2555" instrument_node="">V</span><sub data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">c</span></sub></em><span data-dcnode-id="2551" instrument_node=""> that is larger than the locally measured value (∼12 km s</span><sup data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">−1</span></sup><span data-dcnode-id="2548" instrument_node="">; Schönrich et al. </span><a class="cite" data-dcnode-id="2546" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2547" instrument_node="">2010</span></a><span data-dcnode-id="2545" instrument_node="">) by 14  ±  3 km s</span><sup data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">−1</span></sup><span data-dcnode-id="2542" instrument_node="">. This result may indicate that the challenging local measurement of the solar motion is incorrect or that the solar velocity is influenced by non-axisymmetric streaming motions that put the LSR on a non-circular orbit.</span></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Looking forward, we expect to accurately measure the atmospheric parameters and abundances other than [Fe/H] from the high-resolution APOGEE spectra in the near future. This will improve the measurements described in this paper by (1)&nbsp;providing better dwarf/giant separation, (2) allowing for more direct and more precise distances to be derived, and (3) letting the analysis be conducted on different chemically defined populations of stars. In particular, this will allow for a more detailed investigation into the signatures of non-axisymmetric dynamics in our data.</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">The data upon which the measurements presented in this paper are based will be released as part of SDSS-III's Data Release 10 in the summer of 2013.</span></p></div><div class="article-text" data-dcnode-id="2513" data-mobile-collapse=""><p data-dcnode-id="2528"><span data-dcnode-id="2535" instrument_node="">It is a pleasure to thank Scott Tremaine for many illuminating discussions about this work. We also thank Jennifer Johnson, Mark Reid, Hans-Walter Rix, and Greg Stinson for helpful comments. J.B. was supported by NASA through Hubble Fellowship grant HST-HF-51285.01 from the Space Telescope Science Institute, which is operated by the Association of Universities for Research in Astronomy, Incorporated, under NASA contract NAS5-26555. J.B. was partially supported by SFB 881 funded by the German Research Foundation DFG and is grateful to the Max Planck Institut für Astronomie for its hospitality during part of the period during which this research was performed. T.C.B. acknowledges partial support by grants PHY 02-16783 and PHY 08-22648: Physics Frontiers Center/Joint Institute for Nuclear Astrophysics (JINA), awarded by the U.S. National Science Foundation. This research made use of the </span><em data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">emcee</span></em><span data-dcnode-id="2532" instrument_node=""> MCMC sampler (Foreman-Mackey et al. </span><a class="cite" data-dcnode-id="2530" href="#apj447278r35" id="fnref-apj447278r35" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2531" instrument_node="">2012</span></a><span data-dcnode-id="2529" instrument_node="">).</span></p><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">This publication makes use of data products from the Two Micron All Sky Survey, which is a joint project of the University of Massachusetts and the Infrared Processing and Analysis Center/California Institute of Technology, funded by the National Aeronautics and Space Administration and the National Science Foundation.</span></p><p data-dcnode-id="2521"><span data-dcnode-id="2525" instrument_node="">This publication makes use of data products from the </span><em data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Wide-field Infrared Survey Explorer</span></em><span data-dcnode-id="2522" instrument_node="">, which is a joint project of the University of California, Los Angeles, and the Jet Propulsion Laboratory/California Institute of Technology, funded by the National Aeronautics and Space Administration.</span></p><p data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node="">Funding for SDSS-III has been provided by the Alfred P. Sloan Foundation, the Participating Institutions, the National Science Foundation, and the U.S. Department of Energy Office of Science. The SDSS-III Web site is </span><a class="url_link" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sdss3.org/" target="_blank" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2519" instrument_node="">http://www.sdss3.org/</span></a><span data-dcnode-id="2517" instrument_node="">.</span></p><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">SDSS-III is managed by the Astrophysical Research Consortium for the Participating Institutions of the SDSS-III Collaboration including the University of Arizona, the Brazilian Participation Group, Brookhaven National Laboratory, University of Cambridge, Carnegie Mellon University, University of Florida, the French Participation Group, the German Participation Group, Harvard University, the Instituto de Astrofisica de Canarias, the Michigan State/Notre Dame/JINA Participation Group, Johns Hopkins University, Lawrence Berkeley National Laboratory, Max Planck Institute for Astrophysics, Max Planck Institute for Extraterrestrial Physics, New Mexico State University, New York University, Ohio State University, Pennsylvania State University, University of Portsmouth, Princeton University, the Spanish Participation Group, University of Tokyo, University of Utah, Vanderbilt University, University of Virginia, University of Washington, and Yale University.</span></p></div><h2 class="header-anchor" data-dcnode-id="2511" id="apj447278app1" name="apj447278app1"><span data-dcnode-id="2512" instrument_node="">APPENDIX A: PHOTOMETRIC-DISTANCE PDFs FOR GIANT STARS</span></h2><div class="article-text" data-dcnode-id="2196" data-mobile-collapse=""><p data-dcnode-id="2481"><span data-dcnode-id="2510" instrument_node="">In this appendix, we describe the calculation of the photometric-distance distributions </span><em data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">p</span></em><span data-dcnode-id="2507" instrument_node="">(</span><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">d</span></em><span data-dcnode-id="2504" instrument_node="">|</span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">l</span></em><span data-dcnode-id="2501" instrument_node="">, </span><em data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">b</span></em><span data-dcnode-id="2498" instrument_node="">, (</span><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">J</span></em><span data-dcnode-id="2495" instrument_node=""> − </span><em data-dcnode-id="2491"><span data-dcnode-id="2494" instrument_node="">K</span><sub data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">s</span></sub></em><span data-dcnode-id="2490" instrument_node="">)</span><sub data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">0</span></sub><span data-dcnode-id="2487" instrument_node="">, </span><em data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">H</span></em><sub data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">0</span></sub><span data-dcnode-id="2482" instrument_node="">, [Fe/H], DF, iso) for the stars in our sample. The photometric-distance PDF for each star is the combination of the probability of its observed photometry, given a model for the color–absolute-magnitude distribution of giant stars, and a prior on the distance. Thus, we write
</span></p><div class="display-eqn" data-dcnode-id="2475" id="apj447278fd12" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="2476"><span class="texImage" data-dcnode-id="2479"><img alt="Equation (A1)" data-dcnode-id="2480" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd12.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=1y0FyHFlTTdappLUsF3YwdsloTY%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="2413"><span data-dcnode-id="2474" instrument_node="">where μ is the distance modulus, and </span><em data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">d</span></em><sup data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">2</span></sup><span data-dcnode-id="2469" instrument_node="">cos </span><em data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">b</span></em><span data-dcnode-id="2466" instrument_node=""> is the Jacobian for the coordinate transformation (</span><em data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">R</span></em><span data-dcnode-id="2463" instrument_node="">, ϕ, </span><em data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">z</span></em><span data-dcnode-id="2460" instrument_node="">) → (</span><em data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">d</span></em><span data-dcnode-id="2457" instrument_node="">, </span><em data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">l</span></em><span data-dcnode-id="2454" instrument_node="">, </span><em data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">b</span></em><span data-dcnode-id="2451" instrument_node="">), because we have anticipated that the distance prior is written in Galactocentric cylindrical coordinates (</span><em data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">R</span></em><span data-dcnode-id="2448" instrument_node="">, </span><em data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">z</span></em><span data-dcnode-id="2445" instrument_node="">, ϕ). This prior is an exponential distribution in </span><em data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">R</span></em><span data-dcnode-id="2442" instrument_node="">, ν</span><sub data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">*</span></sub><span data-dcnode-id="2439" instrument_node="">(</span><em data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">R</span></em><span data-dcnode-id="2436" instrument_node="">, </span><em data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">z</span></em><span data-dcnode-id="2433" instrument_node="">|DF)∝exp (− </span><em data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">R</span></em><span data-dcnode-id="2430" instrument_node="">/</span><em data-dcnode-id="2426"><span data-dcnode-id="2429" instrument_node="">h</span><sub data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">R</span></sub></em><span data-dcnode-id="2425" instrument_node="">); our sample is sufficiently close to the plane that vertical density gradients are unimportant (see Figure </span><a data-dcnode-id="2423" href="#apj447278f2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2424" instrument_node="">2</span></a><span data-dcnode-id="2422" instrument_node="">). We have implicitly assumed that the prior does not depend on [Fe/H]. Our fiducial model has </span><em data-dcnode-id="2418"><span data-dcnode-id="2421" instrument_node="">h</span><sub data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">R</span></sub></em><span data-dcnode-id="2417" instrument_node=""> = 3&nbsp;kpc, as is appropriate for the metal-rich disk stars that make up our sample (Bovy et al. </span><a class="cite" data-dcnode-id="2415" href="#apj447278r15" id="fnref-apj447278r15" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2416" instrument_node="">2012c</span></a><span data-dcnode-id="2414" instrument_node="">).</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2412" instrument_node="">In Equation (</span><a class="eqnref" data-dcnode-id="2410" href="#apj447278fd12" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2411" instrument_node="">A1</span></a><span data-dcnode-id="2409" instrument_node="">), we have also anticipated that we obtain the probability of the observed photometry of the star, given its distance from a model for the isochrones of giants, combined with a model for the distribution along the isochrone from an IMF model; this probability is labeled as "iso." We only use the color (</span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">J</span></em><span data-dcnode-id="2406" instrument_node=""> − </span><em data-dcnode-id="2402"><span data-dcnode-id="2405" instrument_node="">K</span><sub data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">s</span></sub></em><span data-dcnode-id="2401" instrument_node="">)</span><sub data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">0</span></sub><span data-dcnode-id="2398" instrument_node=""> and the magnitude </span><em data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">H</span></em><sub data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">0</span></sub><span data-dcnode-id="2393" instrument_node="">, as little is gained by adding </span><em data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">J</span></em><sub data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">0</span></sub><span data-dcnode-id="2388" instrument_node=""> or </span><em data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">K</span></em><sub data-dcnode-id="2382"><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">s</span></em><span data-dcnode-id="2383" instrument_node="">, 0</span></sub><span data-dcnode-id="2381" instrument_node=""> separately, and we compute the density in the color–absolute-magnitude plane for a given age and metallicity (which constitutes a single isochrone) by counting the number of stars generated from an IMF in small boxes in (</span><em data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">J</span></em><span data-dcnode-id="2378" instrument_node=""> − </span><em data-dcnode-id="2374"><span data-dcnode-id="2377" instrument_node="">K</span><sub data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">s</span></sub></em><span data-dcnode-id="2373" instrument_node="">)</span><sub data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">0</span></sub><span data-dcnode-id="2370" instrument_node="">–</span><em data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">H</span></em><sub data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">0</span></sub><span data-dcnode-id="2365" instrument_node="">. For stars in our sample, we find the nearest </span><em data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Z</span></em><span data-dcnode-id="2362" instrument_node="">/</span><em data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Z</span></em><sub data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">☉</span></sub><span data-dcnode-id="2357" instrument_node=""> (assuming </span><em data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Z</span></em><sub data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">☉</span></sub><span data-dcnode-id="2352" instrument_node=""> = 0.019) on a grid with a 0.0005 dex spacing, and we average Padova isochrones for metallicities </span><em data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Z</span></em><span data-dcnode-id="2349" instrument_node="">/</span><em data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Z</span></em><sub data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">☉</span></sub><span data-dcnode-id="2344" instrument_node="">, </span><em data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Z</span></em><span data-dcnode-id="2341" instrument_node="">/</span><em data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Z</span></em><sub data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">☉</span></sub><span data-dcnode-id="2336" instrument_node=""> − 0.0005, and </span><em data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Z</span></em><span data-dcnode-id="2333" instrument_node="">/</span><em data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Z</span></em><sub data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">☉</span></sub><span data-dcnode-id="2328" instrument_node="">, +0.0005, except at the edges of the grid at </span><em data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Z</span></em><span data-dcnode-id="2325" instrument_node="">/</span><em data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Z</span></em><sub data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">☉</span></sub><span data-dcnode-id="2320" instrument_node=""> = 0.0005 and </span><em data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Z</span></em><span data-dcnode-id="2317" instrument_node="">/</span><em data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Z</span></em><sub data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">☉</span></sub><span data-dcnode-id="2312" instrument_node=""> = 0.03. We average over age by assuming a constant star formation rate up to 12&nbsp;Gyr (except for the fit in Section </span><a class="secref" data-dcnode-id="2310" href="#apj447278s4-2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2311" instrument_node="">4.2</span></a><span data-dcnode-id="2309" instrument_node=""> with multiple populations, where we use an exponentially declining star formation rate). We use a lognormal Chabrier (</span><a class="cite" data-dcnode-id="2307" href="#apj447278r21" id="fnref-apj447278r21" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2308" instrument_node="">2001</span></a><span data-dcnode-id="2306" instrument_node="">) model for the IMF (but the resulting distance PDFs are essentially the same when using a Kroupa </span><a class="cite" data-dcnode-id="2304" href="#apj447278r54" id="fnref-apj447278r54" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2305" instrument_node="">2003</span></a><span data-dcnode-id="2303" instrument_node=""> IMF). The resulting density for a star with solar metallicity is shown in Figure </span><a data-dcnode-id="2301" href="#apj447278f11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2302" instrument_node="">11</span></a><span data-dcnode-id="2300" instrument_node="">. For a given distance and [Fe/H], the probability of a star's magnitude given its color is evaluated by computing its absolute magnitude </span><em data-dcnode-id="2296"><span data-dcnode-id="2299" instrument_node="">M</span><sub data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">H</span></sub></em><span data-dcnode-id="2295" instrument_node=""> and evaluating a density like the one shown in Figure </span><a data-dcnode-id="2293" href="#apj447278f11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2294" instrument_node="">11</span></a><span data-dcnode-id="2292" instrument_node="">.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="2237" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004 	                     Reset image size
					</span></button></span></div></div><figcaption data-dcnode-id="2239"><div class="article-text figure-caption" data-dcnode-id="2249"><p data-dcnode-id="2250"><strong data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Figure 11.</span></strong><span data-dcnode-id="2274" instrument_node="">&nbsp;Density in the color–magnitude plane, for the giant branch of stars with solar metallicity. Each color bin is normalized separately to show the absolute-magnitude distribution at each color. This density is calculated using Padova isochrones (Bertelli et al. </span><a class="cite" data-dcnode-id="2272" href="#apj447278r4" id="fnref-apj447278r4"><span data-dcnode-id="2273" instrument_node="">1994</span></a><span data-dcnode-id="2271" instrument_node="">; Bonatto et al. </span><a class="cite" data-dcnode-id="2269" href="#apj447278r8" id="fnref-apj447278r8"><span data-dcnode-id="2270" instrument_node="">2004</span></a><span data-dcnode-id="2268" instrument_node="">; Marigo et al. </span><a class="cite" data-dcnode-id="2266" href="#apj447278r64" id="fnref-apj447278r64"><span data-dcnode-id="2267" instrument_node="">2008</span></a><span data-dcnode-id="2265" instrument_node="">; Girardi et al. </span><a class="cite" data-dcnode-id="2263" href="#apj447278r41" id="fnref-apj447278r41"><span data-dcnode-id="2264" instrument_node="">2010</span></a><span data-dcnode-id="2262" instrument_node="">), assuming a lognormal Chabrier (</span><a class="cite" data-dcnode-id="2260" href="#apj447278r21" id="fnref-apj447278r21"><span data-dcnode-id="2261" instrument_node="">2001</span></a><span data-dcnode-id="2259" instrument_node="">) IMF and a constant star formation rate. This figure is an example of the density that we use as the photometric-distance distribution for each star. The length of the extinction arrow is the median extinction for the sample (0.45 in </span><em data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">J</span></em><span data-dcnode-id="2256" instrument_node=""> − </span><em data-dcnode-id="2252"><span data-dcnode-id="2255" instrument_node="">K</span><sub data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">s</span></sub></em><span data-dcnode-id="2251" instrument_node="">).</span></p></div><p class="mb-05 print-hide" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="2240"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f11_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3D1SVHhSi4TyabGaFbFQS8X16ytjY%253D" id="wd-jnl-art-btn-std-img-apj447278f11"><span class="icon-image" data-dcnode-id="2246"></span><span data-dcnode-id="2245" instrument_node=""> Standard image

					</span></a></span></figcaption></figure></figure><p data-dcnode-id="2210"><span data-dcnode-id="2236" instrument_node="">The distribution iso</span><sub data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">[Fe/H]</span></sub><span data-dcnode-id="2233" instrument_node="">(</span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">H</span></em><sub data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">0</span></sub><span data-dcnode-id="2228" instrument_node=""> − μ(</span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">d</span></em><span data-dcnode-id="2225" instrument_node="">), (</span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">J</span></em><span data-dcnode-id="2222" instrument_node=""> − </span><em data-dcnode-id="2218"><span data-dcnode-id="2221" instrument_node="">K</span><sub data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">s</span></sub></em><span data-dcnode-id="2217" instrument_node="">)</span><sub data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">0</span></sub><span data-dcnode-id="2214" instrument_node="">) is relatively insensitive to changes in [Fe/H] at high metallicity ([Fe/H] ≳ −0.4), where 90% of our sample lies. Thus, for the majority of the stars in our sample, the photometric-distance PDF does not strongly depend on the measured [Fe/H] and resembles Figure </span><a data-dcnode-id="2212" href="#apj447278f11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2213" instrument_node="">11</span></a><span data-dcnode-id="2211" instrument_node="">.</span></p><p data-dcnode-id="2197"><span data-dcnode-id="2209" instrument_node="">Also shown in Figure </span><a data-dcnode-id="2207" href="#apj447278f11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2208" instrument_node="">11</span></a><span data-dcnode-id="2206" instrument_node=""> is the direction that extinction moves objects in color and magnitude. In contrast to the case for the main sequence, this direction is at a large angle with the locus of the giant branch, such that under- or overestimated extinction values can significantly change the photometric-distance PDF. The length of the extinction arrow in this figure is the median extinction in (</span><em data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">J</span></em><span data-dcnode-id="2203" instrument_node=""> − </span><em data-dcnode-id="2199"><span data-dcnode-id="2202" instrument_node="">K</span><sub data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">s</span></sub></em><span data-dcnode-id="2198" instrument_node="">) for the sample (0.45&nbsp;mag).</span></p></div><h2 class="header-anchor" data-dcnode-id="2194" id="apj447278app2" name="apj447278app2"><span data-dcnode-id="2195" instrument_node="">APPENDIX B: ANALYSIS TESTS ON MOCK-DATA SAMPLES</span></h2><div class="article-text" data-dcnode-id="387" data-mobile-collapse=""><p data-dcnode-id="2107"><span data-dcnode-id="2193" instrument_node="">In this section, we perform extensive mock-data analyses to test the methodology and approximations described in Section </span><a class="secref" data-dcnode-id="2191" href="#apj447278s3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2192" instrument_node="">3</span></a><span data-dcnode-id="2190" instrument_node="">, and to determine at what level the data are sensitive to changes in the Galactic parameters. We create mock data sets by re-sampling the line-of-sight velocity for each data point from its PDF </span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">p</span></em><span data-dcnode-id="2187" instrument_node="">(</span><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">V</span></em><sub data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">los</span></sub><span data-dcnode-id="2182" instrument_node="">|</span><em data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">l</span></em><span data-dcnode-id="2179" instrument_node="">, </span><em data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">b</span></em><span data-dcnode-id="2176" instrument_node="">, (</span><em data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">J</span></em><span data-dcnode-id="2173" instrument_node=""> − </span><em data-dcnode-id="2169"><span data-dcnode-id="2172" instrument_node="">K</span><sub data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">s</span></sub></em><span data-dcnode-id="2168" instrument_node="">)</span><sub data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">0</span></sub><span data-dcnode-id="2165" instrument_node="">, </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">H</span></em><sub data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">0</span></sub><span data-dcnode-id="2160" instrument_node="">, [Fe/H], </span><em data-dcnode-id="2156"><span data-dcnode-id="2159" instrument_node="">V</span><sub data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">c</span></sub></em><span data-dcnode-id="2155" instrument_node="">(</span><em data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">R</span></em><span data-dcnode-id="2152" instrument_node="">), </span><em data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">R</span></em><sub data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">0</span></sub><span data-dcnode-id="2147" instrument_node="">, </span><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">V</span></em><sub data-dcnode-id="2141"><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">R</span></em><span data-dcnode-id="2142" instrument_node="">, ☉</span></sub><span data-dcnode-id="2140" instrument_node="">, </span><em data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">V</span></em><sub data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="2135" instrument_node="">, DF, iso) (Equation (</span><a class="eqnref" data-dcnode-id="2133" href="#apj447278fd1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2134" instrument_node="">1</span></a><span data-dcnode-id="2132" instrument_node="">)) in the best-fit model with a flat rotation curve for the real data (Table </span><a class="tabref" data-dcnode-id="2130" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2131" instrument_node="">2</span></a><span data-dcnode-id="2129" instrument_node="">). However, rather than using the simple Gaussian-with-asymmetric-drift-offset model, we sample from a Dehnen DF (Equation (</span><a class="eqnref" data-dcnode-id="2127" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2128" instrument_node="">6</span></a><span data-dcnode-id="2126" instrument_node="">)), with a radial scale length of </span><em data-dcnode-id="2122"><span data-dcnode-id="2125" instrument_node="">h</span><sub data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">R</span></sub></em><span data-dcnode-id="2121" instrument_node=""> = 3 kpc, and a radial-velocity-dispersion scale length taken from the best-fit model. Because the Dehnen DF has </span><em data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">X</span></em><sup data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">2</span></sup><span data-dcnode-id="2116" instrument_node=""> built-in, we do not use the best-fit </span><em data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">X</span></em><sup data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">2</span></sup><span data-dcnode-id="2111" instrument_node="">. For a Dehnen DF, the marginalization of the planar velocity distribution over the component of the velocity that is tangential to the line of sight cannot be done analytically, and we numerically integrate over this component. We do not add any observational error to the mock line-of-sight velocities, as the observational uncertainties are vanishingly small (see Section </span><a class="secref" data-dcnode-id="2109" href="#apj447278s2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2110" instrument_node="">2</span></a><span data-dcnode-id="2108" instrument_node="">). In this manner, we produce five mock data sets that are exactly like the real data, except for the line-of-sight velocities.</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2106" instrument_node="">We apply the exact same fitting procedure to the mock data as is used for the real data. We fit the five mock data sets with a flat-rotation-curve model, and obtain the best fits and uncertainties given in Table </span><a class="tabref" data-dcnode-id="2104" href="#apj447278t3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2105" instrument_node="">3</span></a><span data-dcnode-id="2103" instrument_node=""> (for comparison, this table also includes the best-fit model for the real data that was used to generate the mock data). We see that the true values for the parameters of interest are recovered well by the methodology of Section </span><a class="secref" data-dcnode-id="2101" href="#apj447278s3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="2102" instrument_node="">3</span></a><span data-dcnode-id="2100" instrument_node="">. We also see that the uncertainty ranges on the Galactic parameters are similar, both in size and asymmetry, to those derived for the real data. Therefore, the best-fit parameters do not appear to be biased by the approximate methodology used in this paper, and the uncertainties are as should be expected from these mock-data tests.</span></p><div class="boxout boxout-bdr-grey keyboard-focus
