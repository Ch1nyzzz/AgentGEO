					</span></a></span></figcaption></figure></figure><p data-dcnode-id="6133"><span data-dcnode-id="6198" instrument_node="">The middle panel of Figure </span><a data-dcnode-id="6196" href="#apj447278f4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6197" instrument_node="">4</span></a><span data-dcnode-id="6195" instrument_node="">—now for σ</span><sub data-dcnode-id="6192"><em data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">R</span></em></sub><span data-dcnode-id="6191" instrument_node="">(</span><em data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">R</span></em><sub data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">0</span></sub><span data-dcnode-id="6186" instrument_node="">) = 0.14 </span><em data-dcnode-id="6182"><span data-dcnode-id="6185" instrument_node="">V</span><sub data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">c</span></sub></em><span data-dcnode-id="6181" instrument_node="">, the best-fit value below—shows the difference in asymmetric drift for different values of </span><em data-dcnode-id="6177"><span data-dcnode-id="6180" instrument_node="">h</span><sub data-dcnode-id="6178"><span data-dcnode-id="6179" instrument_node="">R</span></sub></em><span data-dcnode-id="6176" instrument_node=""> and </span><em data-dcnode-id="6174"><span data-dcnode-id="6175" instrument_node="">h</span></em><sub data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">σ</span></sub><span data-dcnode-id="6171" instrument_node="">; the main difference is at small </span><em data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">R</span></em><span data-dcnode-id="6168" instrument_node="">. This figure shows that the dependence of the asymmetric-drift correction on </span><em data-dcnode-id="6164"><span data-dcnode-id="6167" instrument_node="">h</span><sub data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">R</span></sub></em><span data-dcnode-id="6163" instrument_node=""> and </span><em data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">h</span></em><sub data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">σ</span></sub><span data-dcnode-id="6158" instrument_node=""> at </span><em data-dcnode-id="6156"><span data-dcnode-id="6157" instrument_node="">R</span></em><sub data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">0</span></sub><span data-dcnode-id="6153" instrument_node=""> is mostly ≲ 0.02 </span><em data-dcnode-id="6149"><span data-dcnode-id="6152" instrument_node="">V</span><sub data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">c</span></sub></em><span data-dcnode-id="6148" instrument_node="">—as it is unlikely that the scale length is as small as 2&nbsp;kpc for this sample of stars (Bovy et al. </span><a class="cite" data-dcnode-id="6146" href="#apj447278r15" id="fnref-apj447278r15" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6147" instrument_node="">2012c</span></a><span data-dcnode-id="6145" instrument_node="">), or that the radial-velocity-dispersion scale length is much shorter than 8&nbsp;kpc—which is the same as the statistical uncertainty on the circular velocity that we infer below. Therefore, the systematic uncertainty due to the scale length of the population of stars is ≲ 4&nbsp;km&nbsp;s</span><sup data-dcnode-id="6143"><span data-dcnode-id="6144" instrument_node="">−1</span></sup><span data-dcnode-id="6142" instrument_node=""> at </span><em data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">R</span></em><sub data-dcnode-id="6138"><span data-dcnode-id="6139" instrument_node="">0</span></sub><span data-dcnode-id="6137" instrument_node="">, and likely ≲ 2&nbsp;km&nbsp;s</span><sup data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">−1</span></sup><span data-dcnode-id="6134" instrument_node="">. We could directly measure the scale length of our sample, but as this requires a detailed understanding of the dust distribution in the plane of the Galaxy, and as it does not contribute greatly to the error budget of our measurement, we do not attempt it here.</span></p><p data-dcnode-id="6099"><span data-dcnode-id="6132" instrument_node="">Our best-fit model below has a radial-velocity dispersion that is approximately flat over the range in </span><em data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">R</span></em><span data-dcnode-id="6129" instrument_node=""> considered here. In this case, the asymmetric-drift correction </span><em data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">increases</span></em><span data-dcnode-id="6126" instrument_node=""> with </span><em data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">R</span></em><span data-dcnode-id="6123" instrument_node="">, as is clear from Equation (</span><a class="eqnref" data-dcnode-id="6121" href="#apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6122" instrument_node="">5</span></a><span data-dcnode-id="6120" instrument_node="">), and the difference between this dispersion profile and that considered above is shown in the middle panel of Figure </span><a data-dcnode-id="6118" href="#apj447278f4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6119" instrument_node="">4</span></a><span data-dcnode-id="6117" instrument_node="">. The bottom panel of Figure </span><a data-dcnode-id="6115" href="#apj447278f4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6116" instrument_node="">4</span></a><span data-dcnode-id="6114" instrument_node=""> shows the actual asymmetric-drift correction applied in our best-fit model below. It is clear that this correction is small (≲ 6 km s</span><sup data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">−1</span></sup><span data-dcnode-id="6111" instrument_node=""> at </span><em data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">R</span></em><span data-dcnode-id="6108" instrument_node=""> &lt; 10 kpc); hence it does not drive our inferred value for </span><em data-dcnode-id="6104"><span data-dcnode-id="6107" instrument_node="">V</span><sub data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">c</span></sub></em><span data-dcnode-id="6103" instrument_node=""> below. The bottom panel of Figure </span><a data-dcnode-id="6101" href="#apj447278f4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6102" instrument_node="">4</span></a><span data-dcnode-id="6100" instrument_node=""> also illustrates that, if the dispersion scale length were smaller than that in our best-fit model below, then the circular-velocity curve would drop more steeply than what we infer below.</span></p><p data-dcnode-id="6094"><span data-dcnode-id="6098" instrument_node="">In addition to the kinematical model discussed so far, we include an outlier model that consists of a Gaussian with a width of σ = 100 km s</span><sup data-dcnode-id="6096"><span data-dcnode-id="6097" instrument_node="">−1</span></sup><span data-dcnode-id="6095" instrument_node="">, centered on a mean value that is a free parameter in the model. This outlier model exists primarily to deal with data-processing outliers, stars with a color and magnitude that places them beyond the disk, and close binaries with large velocity amplitudes (as we do not currently have a sufficient number of APOGEE epochs for each star to confidently remove these from the sample). In all of the fits below, the outlier fraction is ≲ 1%, and thus it does not influence our fits.</span></p></div><h3 data-dcnode-id="6091" id="apj447278s3-3" name="apj447278s3-3"><span data-dcnode-id="6092" instrument_node="">3.3.&nbsp;Dwarf Contamination</span></h3><div class="article-text" data-dcnode-id="6054"><p data-dcnode-id="6055"><span data-dcnode-id="6090" instrument_node="">The dwarf contribution to the likelihood in Equation (</span><a class="eqnref" data-dcnode-id="6088" href="#apj447278fd1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6089" instrument_node="">1</span></a><span data-dcnode-id="6087" instrument_node="">) could in principle be treated in the same way as the giant contribution, by integrating over the </span><em data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">p</span></em><span data-dcnode-id="6084" instrument_node="">(</span><em data-dcnode-id="6082"><span data-dcnode-id="6083" instrument_node="">d</span></em><span data-dcnode-id="6081" instrument_node="">|</span><em data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">l</span></em><span data-dcnode-id="6078" instrument_node="">, </span><em data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">b</span></em><span data-dcnode-id="6075" instrument_node="">, (</span><em data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">J</span></em><span data-dcnode-id="6072" instrument_node=""> − </span><em data-dcnode-id="6068"><span data-dcnode-id="6071" instrument_node="">K</span><sub data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">s</span></sub></em><span data-dcnode-id="6067" instrument_node="">)</span><sub data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">0</span></sub><span data-dcnode-id="6064" instrument_node="">, </span><em data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">H</span></em><sub data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">0</span></sub><span data-dcnode-id="6059" instrument_node="">, [Fe/H], DF, iso, dwarf) obtained from a similar isochrone and IMF model as for the giants. However, this is problematic, because the main sequence is much narrower than the giant branch, such that this integral is dominated by a narrow range of distances. As all of the dwarfs in our sample are faint main-sequence stars, they are expected to all be within a few 100&nbsp;pc from the Sun, and thus be relatively unaffected by the radial and azimuthal gradients in velocity distribution that we model for the giant stars. Our approach is therefore to replace the integration over distance with a single evaluation at zero distance from the Sun for the dwarf part of the likelihood. The dwarf stars are otherwise modeled using the same distribution of peculiar velocities as the giant stars, i.e., we assume that they are drawn from a similar population. The dwarf contamination in our best-fit model below is 7.5%, and is similar for other fits considered below. This is close to the value expected from stellar-population-synthesis models (see Section </span><a class="secref" data-dcnode-id="6057" href="#apj447278s2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6058" instrument_node="">2</span></a><span data-dcnode-id="6056" instrument_node="">).</span></p></div><h3 data-dcnode-id="6052" id="apj447278s3-4" name="apj447278s3-4"><span data-dcnode-id="6053" instrument_node="">3.4.&nbsp;Mock-data Tests</span></h3><div class="article-text" data-dcnode-id="6020"><p data-dcnode-id="6044"><span data-dcnode-id="6051" instrument_node="">The procedure described above makes non-trivial approximations to an ideal axisymmetric fit to the data. The most important of these is that, although we include the asymmetric drift as part of our model, we do not include the deviations from a Gaussian rotational-velocity distribution that are expected for a warm population of stars (with the same physical origin as the asymmetric drift). In addition to this assumption, we make small approximations to the full asymmetric-drift expression in Equation (</span><a class="eqnref" data-dcnode-id="6049" href="#apj447278fd4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6050" instrument_node="">4</span></a><span data-dcnode-id="6048" instrument_node="">). These simplifications are expected to have small effects on our analysis: the skew of the rotational-velocity distribution is only fully visible near the tangent point where the line-of-sight velocity is equal to the rotational velocity, but our sample covers a large range of distances for each line of sight, and 85% of our sample lies at 90° &lt; </span><em data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">l</span></em><span data-dcnode-id="6045" instrument_node=""> &lt; 270°, where there is no tangent point. As such, most stars are drawn from a distribution that is close to Gaussian.</span></p><p data-dcnode-id="6029"><span data-dcnode-id="6043" instrument_node="">To investigate these simplifications, we conduct a series of mock-data tests. In these tests, we sample line-of-sight velocities from the best-fit flat-rotation-curve model below, except that we use the full Dehnen DF of Equation (</span><a class="eqnref" data-dcnode-id="6041" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6042" instrument_node="">6</span></a><span data-dcnode-id="6040" instrument_node="">)—uncorrected, such that it does not quite reproduce the assumed exponential disk—rather than the Gaussian approximation used in the fit (we ignore the best-fit </span><em data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">X</span></em><sup data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">2</span></sup><span data-dcnode-id="6035" instrument_node=""> as the Dehnen DF has </span><em data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">X</span></em><sup data-dcnode-id="6031"><span data-dcnode-id="6032" instrument_node="">2</span></sup><span data-dcnode-id="6030" instrument_node=""> built-in). We then fit these mock data using the approximate methodology.</span></p><p data-dcnode-id="6021"><span data-dcnode-id="6028" instrument_node="">These mock-data tests are described in detail in Appendix&nbsp;</span><a class="secref" data-dcnode-id="6026" href="#apj447278app2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6027" instrument_node="">B</span></a><span data-dcnode-id="6025" instrument_node="">. The results from these tests show that the approximations made in the analysis do not produce any significant bias in the fitted parameters. Fits with non-flat rotation curves to the mock-data samples indicate that we can reliably determine the shape of the rotation curve between 4 kpc &lt; </span><em data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">R</span></em><span data-dcnode-id="6022" instrument_node=""> &lt; 14 kpc. The uncertainties in the fitted parameters for the mock data are approximately the same as those for the real data (see below), which indicates that the uncertainties in the Galactic parameters derived below for the real data are correct.</span></p></div><h3 data-dcnode-id="6018" id="apj447278s3-5" name="apj447278s3-5"><span data-dcnode-id="6019" instrument_node="">3.5.&nbsp;Parameter Sensitivity</span></h3><div class="article-text" data-dcnode-id="5701"><p data-dcnode-id="6004"><span data-dcnode-id="6017" instrument_node="">We briefly discuss here how our data are sensitive to the parameters of the model. The mean heliocentric line-of-sight velocity at a position (</span><em data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">R</span></em><span data-dcnode-id="6014" instrument_node="">, ϕ) = (</span><em data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">d</span></em><span data-dcnode-id="6011" instrument_node="">, </span><em data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">l</span></em><span data-dcnode-id="6008" instrument_node="">) is given by (see Equation (</span><a class="eqnref" data-dcnode-id="6006" href="#apj447278fd3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6007" instrument_node="">3</span></a><span data-dcnode-id="6005" instrument_node="">))
</span></p><div class="display-eqn" data-dcnode-id="5998" id="apj447278fd7" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5999"><span class="texImage" data-dcnode-id="6002"><img alt="Equation (7)" data-dcnode-id="6003" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd7.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=v9cMiZsIRoI4qTUCqmzDeLxXTO4%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="5945"><span data-dcnode-id="5997" instrument_node="">where </span><span class="inline-eqn" data-dcnode-id="5991" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5992"><span class="texImage" data-dcnode-id="5995"><img align="top" alt="$\bar{V}_\phi = V_c - V_a$" data-dcnode-id="5996" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn3.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=XiFoSgwXyum1y5%2F02YH%2BviJhLLI%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="5990" instrument_node="">. We have treated the position and velocity of the Sun as free parameters, without imposing any prior on </span><em data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">R</span></em><sub data-dcnode-id="5986"><span data-dcnode-id="5987" instrument_node="">0</span></sub><span data-dcnode-id="5985" instrument_node="">, and without assuming that the solar rotational velocity is given by the local circular velocity corrected for the (previously measured) velocity of the Sun with respect to the local standard of rest (LSR). We can determine the full space motion of the Sun from our sample, because the longitudinal dependence of the correction for the solar motion of the line-of-sight velocity of a star at (</span><em data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">R</span></em><span data-dcnode-id="5982" instrument_node="">, ϕ) ≡ (</span><em data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">d</span></em><span data-dcnode-id="5979" instrument_node="">, </span><em data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">l</span></em><span data-dcnode-id="5976" instrument_node="">) is sinusoidal (∝</span><em data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">V</span></em><sub data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="5971" instrument_node=""> sin </span><em data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">l</span></em><span data-dcnode-id="5968" instrument_node="">), while the dependence on the rotational velocity at the position of the star varies differently for the </span><em data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">d</span></em><span data-dcnode-id="5965" instrument_node=""> ≈ 1 to 10 kpc sample of APOGEE stars (∝(</span><em data-dcnode-id="5961"><span data-dcnode-id="5964" instrument_node="">V</span><sub data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">c</span></sub></em><span data-dcnode-id="5960" instrument_node=""> − </span><em data-dcnode-id="5956"><span data-dcnode-id="5959" instrument_node="">V</span><sub data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">a</span></sub></em><span data-dcnode-id="5955" instrument_node="">) sin (ϕ + </span><em data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">l</span></em><span data-dcnode-id="5952" instrument_node="">)). Mock-data tests in Appendix&nbsp;</span><a class="secref" data-dcnode-id="5950" href="#apj447278app2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="5951" instrument_node="">B</span></a><span data-dcnode-id="5949" instrument_node=""> show that our sample spans a sufficiently wide range in Galactic longitude and distance to disentangle these two effects, and measure the solar Galactocentric motion. Because we know the Sun's rotational frequency from assuming that the radio source Sgr&nbsp;A* at the Galactic center is at rest with respect to the disk, we have an independent check on our inferred value for the solar motion (but </span><em data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">we do not use the measured proper motion of Sgr&nbsp;A* as a prior on the solar motion</span></em><span data-dcnode-id="5946" instrument_node="">).</span></p><p data-dcnode-id="5816"><span data-dcnode-id="5944" instrument_node="">We can then turn a measurement of </span><span class="inline-eqn" data-dcnode-id="5938" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5939"><span class="texImage" data-dcnode-id="5942"><img align="top" alt="$\bar{V}_{\phi }(R)$" data-dcnode-id="5943" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn4.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=SnsRfCG9lwdhnasHzyioAwlbFf0%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="5937" instrument_node=""> into a measurement of </span><em data-dcnode-id="5933"><span data-dcnode-id="5936" instrument_node="">V</span><sub data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">c</span></sub></em><span data-dcnode-id="5932" instrument_node="">(</span><em data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">R</span></em><span data-dcnode-id="5929" instrument_node="">) by correcting for the asymmetric drift, </span><em data-dcnode-id="5925"><span data-dcnode-id="5928" instrument_node="">V</span><sub data-dcnode-id="5926"><span data-dcnode-id="5927" instrument_node="">a</span></sub></em><span data-dcnode-id="5924" instrument_node="">(</span><em data-dcnode-id="5922"><span data-dcnode-id="5923" instrument_node="">R</span></em><span data-dcnode-id="5921" instrument_node="">), using Equation (</span><a class="eqnref" data-dcnode-id="5919" href="#apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="5920" instrument_node="">5</span></a><span data-dcnode-id="5918" instrument_node="">). This transformation requires a measurement, foremost, of the radial-velocity dispersion, σ</span><sub data-dcnode-id="5915"><em data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">R</span></em></sub><span data-dcnode-id="5914" instrument_node="">(</span><em data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">R</span></em><span data-dcnode-id="5911" instrument_node="">). We can measure σ</span><sub data-dcnode-id="5908"><em data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">R</span></em></sub><span data-dcnode-id="5907" instrument_node=""> almost directly using the </span><em data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">l</span></em><span data-dcnode-id="5904" instrument_node=""> = 180° line of sight. By modeling σ</span><sub data-dcnode-id="5901"><em data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">R</span></em></sub><span data-dcnode-id="5900" instrument_node="">(</span><em data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">R</span></em><span data-dcnode-id="5897" instrument_node="">) as an exponential and assuming a constant σ</span><sup data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">2</span></sup><sub data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">ϕ</span></sub><span data-dcnode-id="5892" instrument_node="">/σ</span><sub data-dcnode-id="5889"><em data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">R</span></em></sub><sup data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">2</span></sup><span data-dcnode-id="5886" instrument_node="">, we can measure σ</span><sub data-dcnode-id="5883"><em data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">R</span></em></sub><span data-dcnode-id="5882" instrument_node="">(</span><em data-dcnode-id="5880"><span data-dcnode-id="5881" instrument_node="">R</span></em><span data-dcnode-id="5879" instrument_node="">) from the line-of-sight velocity dispersion at each </span><em data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">l</span></em><span data-dcnode-id="5876" instrument_node="">. The only subtlety here is that, in the first quadrant (</span><em data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">R</span></em><span data-dcnode-id="5873" instrument_node=""> &lt; </span><em data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">R</span></em><sub data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">0</span></sub><span data-dcnode-id="5868" instrument_node="">, </span><em data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">l</span></em><span data-dcnode-id="5865" instrument_node=""> &lt; 90°), we typically sample positions where </span><em data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">V</span></em><sub data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">los</span></sub><span data-dcnode-id="5860" instrument_node=""> is close to </span><em data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">V</span></em><sub data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">ϕ</span></sub><span data-dcnode-id="5855" instrument_node="">, while in the second and third quadrants (</span><em data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">R</span></em><span data-dcnode-id="5852" instrument_node=""> &gt; </span><em data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">R</span></em><sub data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">0</span></sub><span data-dcnode-id="5847" instrument_node="">, 90° &lt; </span><em data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">l</span></em><span data-dcnode-id="5844" instrument_node=""> &lt; 270°), </span><em data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">V</span></em><sub data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">los</span></sub><span data-dcnode-id="5839" instrument_node=""> is mainly composed of </span><em data-dcnode-id="5835"><span data-dcnode-id="5838" instrument_node="">V</span><sub data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">R</span></sub></em><span data-dcnode-id="5834" instrument_node="">. We can then use the measurement of σ</span><sub data-dcnode-id="5831"><em data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">R</span></em></sub><span data-dcnode-id="5830" instrument_node="">(</span><em data-dcnode-id="5828"><span data-dcnode-id="5829" instrument_node="">R</span></em><span data-dcnode-id="5827" instrument_node="">) to correct for </span><em data-dcnode-id="5823"><span data-dcnode-id="5826" instrument_node="">V</span><sub data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">a</span></sub></em><span data-dcnode-id="5822" instrument_node=""> and derive </span><em data-dcnode-id="5818"><span data-dcnode-id="5821" instrument_node="">V</span><sub data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">c</span></sub></em><span data-dcnode-id="5817" instrument_node="">.</span></p><p data-dcnode-id="5772"><span data-dcnode-id="5815" instrument_node="">The fact that our data sample is composed of the intermediate-age to old disk population is crucial for our ability to measure the full shape of the rotation curve. Traditional tangent-point analyses of the H </span><span class="small-caps" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">i</span></span><span data-dcnode-id="5812" instrument_node=""> emission at </span><em data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">l</span></em><span data-dcnode-id="5809" instrument_node=""> &lt; 90°, or the measurement of </span><em data-dcnode-id="5805"><span data-dcnode-id="5808" instrument_node="">V</span><sub data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">c</span></sub></em><span data-dcnode-id="5804" instrument_node="">(</span><em data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">R</span></em><span data-dcnode-id="5801" instrument_node="">) at 90° &lt; </span><em data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">l</span></em><span data-dcnode-id="5798" instrument_node=""> &lt; 270° using the thickness of the H </span><span class="small-caps" data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">i</span></span><span data-dcnode-id="5795" instrument_node=""> layer, are insensitive to solid-body (uniform angular speed) contributions to the rotation curve, because these do not give rise to line-of-sight velocities for circular orbits. Formally, the H </span><span class="small-caps" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">i</span></span><span data-dcnode-id="5792" instrument_node=""> velocities are invariant under the transformation </span><em data-dcnode-id="5788"><span data-dcnode-id="5791" instrument_node="">V</span><sub data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">c</span></sub></em><span data-dcnode-id="5787" instrument_node="">(</span><em data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">R</span></em><span data-dcnode-id="5784" instrument_node="">) → </span><em data-dcnode-id="5780"><span data-dcnode-id="5783" instrument_node="">V</span><sub data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">c</span></sub></em><span data-dcnode-id="5779" instrument_node="">(</span><em data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">R</span></em><span data-dcnode-id="5776" instrument_node="">) + Ω </span><em data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">R</span></em><span data-dcnode-id="5773" instrument_node="">. However, this is not the case for a warm tracer population, as, for example, the mean rotational velocity transforms as
</span></p><div class="display-eqn" data-dcnode-id="5766" id="apj447278fd8" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5767"><span class="texImage" data-dcnode-id="5770"><img alt="Equation (8)" data-dcnode-id="5771" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd8.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=f4BVBxsYOKaDNFrjQQQWujBje6w%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="5702"><span data-dcnode-id="5765" instrument_node="">where Ω</span><sub data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">0</span></sub><span data-dcnode-id="5762" instrument_node="">(</span><em data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">R</span></em><span data-dcnode-id="5759" instrument_node="">) = </span><em data-dcnode-id="5755"><span data-dcnode-id="5758" instrument_node="">V</span><sub data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">c</span></sub></em><span data-dcnode-id="5754" instrument_node="">(</span><em data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">R</span></em><span data-dcnode-id="5751" instrument_node="">)/</span><em data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">R</span></em><span data-dcnode-id="5748" instrument_node="">. Thus, the addition of Ω </span><em data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">R</span></em><span data-dcnode-id="5745" instrument_node=""> to </span><em data-dcnode-id="5741"><span data-dcnode-id="5744" instrument_node="">V</span><sub data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">c</span></sub></em><span data-dcnode-id="5740" instrument_node="">(</span><em data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">R</span></em><span data-dcnode-id="5737" instrument_node="">) changes </span><span class="inline-eqn" data-dcnode-id="5731" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5732"><span class="texImage" data-dcnode-id="5735"><img align="top" alt="$\bar{V}_{\mathrm{los}}$" data-dcnode-id="5736" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn5.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=tfVtTyI51%2Byy2L39Xdt7DTnSXRk%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="5730" instrument_node=""> by ∼</span><em data-dcnode-id="5726"><span data-dcnode-id="5729" instrument_node="">V</span><sub data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">a</span></sub></em><span data-dcnode-id="5725" instrument_node=""> Ω/Ω</span><sub data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">0</span></sub><span data-dcnode-id="5722" instrument_node="">, and Ω/Ω</span><sub data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">0</span></sub><span data-dcnode-id="5719" instrument_node=""> ∼ 10% gives rise to a few km s</span><sup data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">−1</span></sup><span data-dcnode-id="5716" instrument_node=""> changes in </span><span class="inline-eqn" data-dcnode-id="5710" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="5711"><span class="texImage" data-dcnode-id="5714"><img align="top" alt="$\bar{V}_{\mathrm{los}}$" data-dcnode-id="5715" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn6.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=H7IThu1aIBEkd%2FIO49ojaDzDzfM%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="5709" instrument_node="">, which we can detect with our data. Equation (</span><a class="eqnref" data-dcnode-id="5707" href="#apj447278fd8" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="5708" instrument_node="">8</span></a><span data-dcnode-id="5706" instrument_node="">) clearly shows that a warmer population, i.e., a population with a larger asymmetric drift, is </span><em data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">more sensitive</span></em><span data-dcnode-id="5703" instrument_node=""> to the local slope of the rotation curve than a colder population.</span></p></div></div><span data-dcnode-id="5699" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="5697" id="apj447278s4" name="apj447278s4"><span data-dcnode-id="5698" instrument_node="">4.&nbsp;RESULTS</span></h2><div class="article-text" data-dcnode-id="3786" data-mobile-collapse=""><h3 data-dcnode-id="5695" id="apj447278s4-1" name="apj447278s4-1"><span data-dcnode-id="5696" instrument_node="">4.1.&nbsp;Basic Models</span></h3><div class="article-text" data-dcnode-id="4126"><p data-dcnode-id="5677"><span data-dcnode-id="5694" instrument_node="">In this section, we discuss the results from fitting the basic kinematical model of a single population with exponential ν</span><sub data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">*</span></sub><span data-dcnode-id="5691" instrument_node="">(</span><em data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">R</span></em><span data-dcnode-id="5688" instrument_node="">) and σ</span><sub data-dcnode-id="5685"><em data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">R</span></em></sub><span data-dcnode-id="5684" instrument_node="">(</span><em data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">R</span></em><span data-dcnode-id="5681" instrument_node="">) profiles to the APOGEE disk midplane data from Section </span><a class="secref" data-dcnode-id="5679" href="#apj447278s2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="5680" instrument_node="">2</span></a><span data-dcnode-id="5678" instrument_node="">. These are the main results of this paper. In a subsequent section, we discuss the effects of various systematics on these basic model fits, but we find in the end that they do not significantly bias the results for the Galactic parameters in this section.</span></p><p data-dcnode-id="5576"><span data-dcnode-id="5676" instrument_node="">The results from fitting a flat rotation curve to the APOGEE data are given in the left column of Table </span><a class="tabref" data-dcnode-id="5674" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="5675" instrument_node="">2</span></a><span data-dcnode-id="5673" instrument_node="">. The right column of this table gives the results when fitting a power-law model for the rotation curve </span><em data-dcnode-id="5669"><span data-dcnode-id="5672" instrument_node="">V</span><sub data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">c</span></sub></em><span data-dcnode-id="5668" instrument_node="">(</span><em data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">R</span></em><span data-dcnode-id="5665" instrument_node="">) = </span><em data-dcnode-id="5661"><span data-dcnode-id="5664" instrument_node="">V</span><sub data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">c</span></sub></em><span data-dcnode-id="5660" instrument_node="">(</span><em data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">R</span></em><sub data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">0</span></sub><span data-dcnode-id="5655" instrument_node="">) (</span><em data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">R</span></em><span data-dcnode-id="5652" instrument_node="">/</span><em data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">R</span></em><sub data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">0</span></sub><span data-dcnode-id="5647" instrument_node="">)</span><sup data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">β</span></sup><span data-dcnode-id="5644" instrument_node="">. The best-fit power-law index in this case is approximately zero, such that both models for the rotation curve yield similar best-fit values for all parameters. The only significant difference between the two models for the rotation curve is the uncertainty interval for </span><em data-dcnode-id="5640"><span data-dcnode-id="5643" instrument_node="">V</span><sub data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">c</span></sub></em><span data-dcnode-id="5639" instrument_node="">(</span><em data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">R</span></em><sub data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">0</span></sub><span data-dcnode-id="5634" instrument_node="">), which extends to lower values of </span><em data-dcnode-id="5630"><span data-dcnode-id="5633" instrument_node="">V</span><sub data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">c</span></sub></em><span data-dcnode-id="5629" instrument_node=""> in the case of the power-law fit, although the upper limit on </span><em data-dcnode-id="5625"><span data-dcnode-id="5628" instrument_node="">V</span><sub data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">c</span></sub></em><span data-dcnode-id="5624" instrument_node=""> stays approximately the same. We find that </span><em data-dcnode-id="5620"><span data-dcnode-id="5623" instrument_node="">V</span><sub data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">c</span></sub></em><span data-dcnode-id="5619" instrument_node=""> is tightly constrained in the flat-rotation-curve model: </span><em data-dcnode-id="5615"><span data-dcnode-id="5618" instrument_node="">V</span><sub data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">c</span></sub></em><span data-dcnode-id="5614" instrument_node=""> = 218 ± 6 km s</span><sup data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">−1</span></sup><span data-dcnode-id="5611" instrument_node=""> (68% confidence). When fitting a power law we find </span><em data-dcnode-id="5607"><span data-dcnode-id="5610" instrument_node="">V</span><sub data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">c</span></sub></em><span data-dcnode-id="5606" instrument_node=""> = 218</span><sup data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">+4</span></sup><sub data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">− 19</span></sub><span data-dcnode-id="5601" instrument_node=""> km s</span><sup data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">−1</span></sup><span data-dcnode-id="5598" instrument_node="">, with a strong correlation between the power-law index β (or, equivalently, the local derivative </span><em data-dcnode-id="5594"><span data-dcnode-id="5597" instrument_node="">dV</span><sub data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">c</span></sub></em><span data-dcnode-id="5593" instrument_node="">/</span><em data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">dR</span></em><span data-dcnode-id="5590" instrument_node=""> of the circular velocity with respect to </span><em data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">R</span></em><span data-dcnode-id="5587" instrument_node="">) and </span><em data-dcnode-id="5583"><span data-dcnode-id="5586" instrument_node="">V</span><sub data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">c</span></sub></em><span data-dcnode-id="5582" instrument_node="">. Other parameters do not exhibit any strong correlation with </span><em data-dcnode-id="5578"><span data-dcnode-id="5581" instrument_node="">V</span><sub data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">c</span></sub></em><span data-dcnode-id="5577" instrument_node=""> (see discussion below).</span></p><div class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="5010" id="apj447278t2" tabindex="-1"><p data-dcnode-id="5572"><b data-dcnode-id="5574"><span data-dcnode-id="5575" instrument_node="">Table 2.</span></b><span data-dcnode-id="5573" instrument_node="">&nbsp;Results for Galactic Parameters and Tracer Properties</span></p><span data-dcnode-id="5567" instrument_node="">

            Download table as:&nbsp;
            </span><span class="btn-multi-block" data-dcnode-id="5012"><a class="btn btn-primary wd-jnl-art-btn-ascii" data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iopscience.iop.org/0004-637X/759/2/131/suppdata/apj447278t2_ascii.txt%3Fdoi%3D10.1088/0004-637X/759/2/131" target="_blank"><span data-dcnode-id="5016" instrument_node="">ASCII</span></a><a class="btn btn-primary wd-jnl-art-btn-typeset typeset-table-img" data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278t2_lr.gif%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DQhpwrag00TdScTHPPXy9GKdeO1A%253D" target="_blank"><span data-dcnode-id="5014" instrument_node="">Typeset image</span></a></span></p></div><p data-dcnode-id="4873"><span data-dcnode-id="5009" instrument_node="">When fitting a power-law model for the rotation curve, the local slope of the rotation curve is constrained to be −3 km s</span><sup data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">−1</span></sup><span data-dcnode-id="5006" instrument_node=""> kpc</span><sup data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">−1</span></sup><span data-dcnode-id="5003" instrument_node=""> &lt; </span><em data-dcnode-id="4999"><span data-dcnode-id="5002" instrument_node="">dV</span><sub data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">c</span></sub></em><span data-dcnode-id="4998" instrument_node="">/</span><em data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">dR</span></em><span data-dcnode-id="4995" instrument_node=""> &lt; 0.4 km s</span><sup data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">−1</span></sup><span data-dcnode-id="4992" instrument_node=""> kpc</span><sup data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">−1</span></sup><span data-dcnode-id="4989" instrument_node=""> (68% confidence), with a best-fit value near the upper end of that range, 0.2 km s</span><sup data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">−1</span></sup><span data-dcnode-id="4986" instrument_node=""> kpc</span><sup data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">−1</span></sup><span data-dcnode-id="4983" instrument_node="">. When fitting a linear model for the circular velocity the constraints are similar, and we do not discuss them further; the top, middle panels of Figure </span><a data-dcnode-id="4981" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4982" instrument_node="">5</span></a><span data-dcnode-id="4980" instrument_node=""> show the joint PDF for </span><em data-dcnode-id="4976"><span data-dcnode-id="4979" instrument_node="">V</span><sub data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">c</span></sub></em><span data-dcnode-id="4975" instrument_node=""> and β (for the power-law fit) and </span><em data-dcnode-id="4971"><span data-dcnode-id="4974" instrument_node="">dV</span><sub data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">c</span></sub></em><span data-dcnode-id="4970" instrument_node="">/</span><em data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">dR</span></em><span data-dcnode-id="4967" instrument_node=""> (for the linear fit). In Table </span><a class="tabref" data-dcnode-id="4965" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4966" instrument_node="">2</span></a><span data-dcnode-id="4964" instrument_node="">, we also give the Oort constants </span><em data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">A</span></em><span data-dcnode-id="4961" instrument_node=""> and </span><em data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">B</span></em><span data-dcnode-id="4958" instrument_node=""> corresponding to the </span><em data-dcnode-id="4954"><span data-dcnode-id="4957" instrument_node="">V</span><sub data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">c</span></sub></em><span data-dcnode-id="4953" instrument_node=""> and </span><em data-dcnode-id="4949"><span data-dcnode-id="4952" instrument_node="">dV</span><sub data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">c</span></sub></em><span data-dcnode-id="4948" instrument_node="">/</span><em data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">dR</span></em><span data-dcnode-id="4945" instrument_node=""> inferred directly for our sample (for the case of a flat rotation curve, </span><em data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">A</span></em><span data-dcnode-id="4942" instrument_node=""> and </span><em data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">B</span></em><span data-dcnode-id="4939" instrument_node=""> are equal in magnitude and opposite in sign, by definition). We also present the combination (</span><em data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">B</span></em><sup data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">2</span></sup><span data-dcnode-id="4934" instrument_node=""> − </span><em data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">A</span></em><sup data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">2</span></sup><span data-dcnode-id="4929" instrument_node="">)/(2π</span><em data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">G</span></em><span data-dcnode-id="4926" instrument_node="">), which is the correction term that must be added to the local dark-matter density to account for a non-flat rotation curve, when the local dark-matter density is inferred from local vertical kinematics using the cylindrical Poisson equation (e.g., Bovy &amp; Tremaine </span><a class="cite" data-dcnode-id="4924" href="#apj447278r16" id="fnref-apj447278r16" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4925" instrument_node="">2012</span></a><span data-dcnode-id="4923" instrument_node="">). It is clear that we constrain this correction term to be smaller than a fraction of the local dark-matter density: −0.0025 </span><em data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">M</span></em><sub data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">☉</span></sub><span data-dcnode-id="4918" instrument_node=""> pc</span><sup data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">−3</span></sup><span data-dcnode-id="4915" instrument_node=""> &lt; (</span><em data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">B</span></em><sup data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">2</span></sup><span data-dcnode-id="4910" instrument_node=""> − </span><em data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">A</span></em><sup data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">2</span></sup><span data-dcnode-id="4905" instrument_node="">)/(2π</span><em data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">G</span></em><span data-dcnode-id="4902" instrument_node="">) &lt; 0.0004 </span><em data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">M</span></em><sub data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">☉</span></sub><span data-dcnode-id="4897" instrument_node=""> pc</span><sup data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">−3</span></sup><span data-dcnode-id="4894" instrument_node="">, compared to a local dark-matter density of 0.008 ± 0.003 </span><em data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">M</span></em><sub data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">☉</span></sub><span data-dcnode-id="4889" instrument_node=""> pc</span><sup data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">−3</span></sup><span data-dcnode-id="4886" instrument_node=""> (Bovy &amp; Tremaine </span><a class="cite" data-dcnode-id="4884" href="#apj447278r16" id="fnref-apj447278r16" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4885" instrument_node="">2012</span></a><span data-dcnode-id="4883" instrument_node="">). Thus, the correction for the non-flatness of the rotation curve for our best-fit parameters is approximately zero, and at 68% confidence it lies between −0.1 GeV cm</span><sup data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">−3</span></sup><span data-dcnode-id="4880" instrument_node=""> and 0.0 GeV cm</span><sup data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">−3</span></sup><span data-dcnode-id="4877" instrument_node="">. We also give the rotational frequency Ω</span><sub data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">0</span></sub><span data-dcnode-id="4874" instrument_node=""> at the Sun's location.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="4789" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f5_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=l%2BkgtqSnP%2F3YrHBfEG2R7EAqjK0%3D" data-toolbar-link="apj447278f5" data-toolbar-title="Figure 5." data-toolbar-type="figure" id="apj447278f5" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="4790"><div class="panzoom-container" data-dcnode-id="4859"><div class="panzoom-parent" data-dcnode-id="4871" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 5." class="panzoom" data-dcnode-id="4872" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f5_lr.jpg?AWSAccessKeyI 					</span></button></span></div></div><figcaption data-dcnode-id="4791"><div class="article-text figure-caption" data-dcnode-id="4801"><p data-dcnode-id="4802"><strong data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Figure 5.</span></strong><span data-dcnode-id="4856" instrument_node="">&nbsp;PDFs for the parameters of the model. All PDFs in the top two rows are for the model with a flat rotation curve, except for the middle two panels in the top row, which are for the power-law fit and the linear-polynomial fit. The top row has the (marginalized) joint PDF for </span><em data-dcnode-id="4852"><span data-dcnode-id="4855" instrument_node="">V</span><sub data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">c</span></sub></em><span data-dcnode-id="4851" instrument_node=""> and (from left to right) </span><em data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">R</span></em><sub data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">0</span></sub><span data-dcnode-id="4846" instrument_node="">, power-law index β, linear derivative </span><em data-dcnode-id="4842"><span data-dcnode-id="4845" instrument_node="">dV</span><sub data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">c</span></sub></em><span data-dcnode-id="4841" instrument_node="">/</span><em data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">dR</span></em><span data-dcnode-id="4838" instrument_node="">, and the dwarf contamination fraction </span><em data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">P</span></em><span data-dcnode-id="4835" instrument_node="">(dwarf). The middle row has (from left to right): the Sun's peculiar rotational velocity </span><em data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">V</span></em><sub data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4830" instrument_node=""> − </span><em data-dcnode-id="4826"><span data-dcnode-id="4829" instrument_node="">V</span><sub data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">c</span></sub></em><span data-dcnode-id="4825" instrument_node="">, the ratio of </span><em data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">R</span></em><sub data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">0</span></sub><span data-dcnode-id="4820" instrument_node=""> to the radial-dispersion scale length, the radial-velocity dispersion, and the ratio of tangential-to-radial-velocity dispersion squared. The bottom row explores various systematics: a systematic offset in [Fe/H], in distance modulus μ, in extinction </span><em data-dcnode-id="4816"><span data-dcnode-id="4819" instrument_node="">A</span><sub data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">H</span></sub></em><span data-dcnode-id="4815" instrument_node="">, and using 20 populations between 1 and 10 Gyr with an exponentially declining star formation history and an increasing velocity dispersion as in Equation (</span><a class="eqnref" data-dcnode-id="4813" href="#apj447278fd11"><span data-dcnode-id="4814" instrument_node="">11</span></a><span data-dcnode-id="4812" instrument_node="">). In the three leftmost panels in the bottom row, the PDF for a single systematic offset is shown as the linear density and the solid contours, while the contours of the PDF when allowing for a different systematic offset in inner (</span><em data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">l</span></em><span data-dcnode-id="4809" instrument_node=""> ⩽ 90°) and outer (</span><em data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">l</span></em><span data-dcnode-id="4806" instrument_node=""> &gt; 90°) fields are represented as dashed lines. The figures in the top two rows also include the best-fit result from leave-one-longitudinal-field-out fits to the data as white crosses (that is, leaving one of the 14 fields in Table </span><a class="tabref" data-dcnode-id="4804" href="#apj447278t1"><span data-dcnode-id="4805" instrument_node="">1</span></a><span data-dcnode-id="4803" instrument_node=""> out of the data set).</span></p></div><p class="mb-05 print-hide" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="4792"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="4796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f5_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3Dl%252BkgtqSnP%252F3YrHBfEG2R7EAqjK0%253D" id="wd-jnl-art-btn-std-img-apj447278f5"><span class="icon-image" data-dcnode-id="4798"></span><span data-dcnode-id="4797" instrument_node=""> Standard image

					</span></a></span></figcaption></figure></figure><p data-dcnode-id="4734"><span data-dcnode-id="4788" instrument_node="">Using a power-law rotation-curve model, we estimate the uncertainty in the rotation curve by evaluating the range of </span><em data-dcnode-id="4784"><span data-dcnode-id="4787" instrument_node="">V</span><sub data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">c</span></sub></em><span data-dcnode-id="4783" instrument_node="">(</span><em data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">R</span></em><span data-dcnode-id="4780" instrument_node="">) at each </span><em data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">R</span></em><span data-dcnode-id="4777" instrument_node=""> for 10,000 samples from the PDF shown in Figure </span><a data-dcnode-id="4775" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4776" instrument_node="">5</span></a><span data-dcnode-id="4774" instrument_node="">. Thus, every sample has a power-law rotation curve, but the range at each </span><em data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">R</span></em><span data-dcnode-id="4771" instrument_node=""> does not have to follow a power law itself. This exercise shows whether, </span><em data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">in the power-law model</span></em><span data-dcnode-id="4768" instrument_node="">, the value of </span><em data-dcnode-id="4764"><span data-dcnode-id="4767" instrument_node="">V</span><sub data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">c</span></sub></em><span data-dcnode-id="4763" instrument_node="">(</span><em data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">R</span></em><span data-dcnode-id="4760" instrument_node="">) is well constrained or not for each </span><em data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">R</span></em><span data-dcnode-id="4757" instrument_node="">; The result is shown in the left panel of Figure </span><a data-dcnode-id="4755" href="#apj447278f6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4756" instrument_node="">6</span></a><span data-dcnode-id="4754" instrument_node="">. The same is shown in the right panel of that figure for a fit assuming a cubic-polynomial model for the rotation curve. However, in the latter model we have imposed a prior that </span><em data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">R</span></em><sub data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">0</span></sub><span data-dcnode-id="4749" instrument_node=""> &lt; 9 kpc, as a large number of samples from the PDF have </span><em data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">R</span></em><sub data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">0</span></sub><span data-dcnode-id="4744" instrument_node=""> &gt; 9 kpc, which we assume to be implausible from prior data (e.g., Ghez et al. </span><a class="cite" data-dcnode-id="4742" href="#apj447278r38" id="fnref-apj447278r38" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4743" instrument_node="">2008</span></a><span data-dcnode-id="4741" instrument_node="">; Gillessen et al. </span><a class="cite" data-dcnode-id="4739" href="#apj447278r39" id="fnref-apj447278r39" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4740" instrument_node="">2009</span></a><span data-dcnode-id="4738" instrument_node="">). We emphasize that we do not include such a prior in any other part of the analysis presented here. We see that the rotation curve is best constrained at small radii (4 kpc &lt; </span><em data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">R</span></em><span data-dcnode-id="4735" instrument_node=""> &lt; 8 kpc), and that it is largely consistent with being close to flat over the full range of Galactocentric radii considered here.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="4678" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f6_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=DNWXHyylgsOo503MUQkEQLOn8FA%3D" data-toolbar-link="apj447278f6" data-toolbar-title="Figure 6." data-toolbar-type="figure" id="apj447278f6" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="4679"><div class="panzoom-container" data-dcnode-id="4720"><div class="panzoom-parent" data-dcnode-id="4732" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 6." class="panzoom" data-dcnode-id="4733" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f6_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=DNWXHyylgsOo503MUQkEQLOn8FA%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw" style="transform: scale(1) translate(0px, 0px); backface-visibility: hidden; transform-origin: 50% 50%; cursor: move; transition: none 0s ease 0s; user-select: none; touch-action: none;"></div><div class="buttons zoom-tools" data-dcnode-id="4721"><button class="zoom-in" data-dcnode-id="4729"><span class="icon-zoomin" data-dcnode-id="4731"></span><span data-dcnode-id="4730" instrument_node="">

					</span></button></span></div></div><figcaption data-dcnode-id="4680"><div class="article-text figure-caption" data-dcnode-id="4690"><p data-dcnode-id="4691"><strong data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Figure 6.</span></strong><span data-dcnode-id="4717" instrument_node="">&nbsp;Milky Way's rotation curve in the range 4 &lt; </span><em data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">R</span></em><span data-dcnode-id="4714" instrument_node=""> &lt; 14&nbsp;kpc as inferred from our data for different forms of the shape of the rotation curve. At each </span><em data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">R</span></em><span data-dcnode-id="4711" instrument_node="">, the range in </span><em data-dcnode-id="4707"><span data-dcnode-id="4710" instrument_node="">V</span><sub data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">c</span></sub></em><span data-dcnode-id="4706" instrument_node="">(</span><em data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">R</span></em><span data-dcnode-id="4703" instrument_node="">) from 10,000 samples of the PDF—</span><em data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">assuming a power-law or cubic-polynomial model for the shape of the rotation curve</span></em><span data-dcnode-id="4700" instrument_node="">—is determined and the 68%, 95%, and 99% intervals are shown in varying shades of gray. For the cubic-polynomial model, we impose a prior that </span><em data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">R</span></em><sub data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">0</span></sub><span data-dcnode-id="4695" instrument_node=""> &lt; 9 kpc (see the text). For comparison, the squares show the rotation curve of M31 from the compilation of Carignan et al. (</span><a class="cite" data-dcnode-id="4693" href="#apj447278r17" id="fnref-apj447278r17"><span data-dcnode-id="4694" instrument_node="">2006</span></a><span data-dcnode-id="4692" instrument_node="">).</span></p></div><p class="mb-05 print-hide" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="4681"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f6_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DDNWXHyylgsOo503MUQkEQLOn8FA%253D" id="wd-jnl-art-btn-std-img-apj447278f6"><span class="icon-image" data-dcnode-id="4687"></span><span data-dcnode-id="4686" instrument_node=""> Standard image
