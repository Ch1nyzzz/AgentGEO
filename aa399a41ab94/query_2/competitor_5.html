	                     Reset image size
					</span></button></span></div></div><figcaption data-dcnode-id="3616"><div class="article-text figure-caption" data-dcnode-id="3626"><p data-dcnode-id="3627"><strong data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Figure 9.</span></strong><span data-dcnode-id="3660" instrument_node="">&nbsp;Influence of non-axisymmetry on the predicted mean of the </span><em data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">V</span></em><sub data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">los</span></sub><span data-dcnode-id="3655" instrument_node=""> distributions. The flat-rotation-curve model of Table </span><a class="tabref" data-dcnode-id="3653" href="#apj447278t2"><span data-dcnode-id="3654" instrument_node="">2</span></a><span data-dcnode-id="3652" instrument_node=""> and Figures </span><a data-dcnode-id="3650" href="#apj447278f7"><span data-dcnode-id="3651" instrument_node="">7</span></a><span data-dcnode-id="3649" instrument_node=""> and&nbsp;</span><a data-dcnode-id="3647" href="#apj447278f8"><span data-dcnode-id="3648" instrument_node="">8</span></a><span data-dcnode-id="3646" instrument_node=""> is displayed in the uppermost panel. Non-axisymmetric models shown are: the model for the Milky Way bar of Dehnen (</span><a class="cite" data-dcnode-id="3644" href="#apj447278r26" id="fnref-apj447278r26"><span data-dcnode-id="3645" instrument_node="">2000</span></a><span data-dcnode-id="3643" instrument_node="">); a two-armed logarithmic spiral with a fractional amplitude of 1% and a pitch angle of −15°; elliptical disk models of Kuijken &amp; Tremaine (</span><a class="cite" data-dcnode-id="3641" href="#apj447278r56" id="fnref-apj447278r56"><span data-dcnode-id="3642" instrument_node="">1994</span></a><span data-dcnode-id="3640" instrument_node="">) with an amplitude of 5% and position angles of 0° (fourth panel) and −45° (bottom panel). All models are calculated for a warm disk population with σ</span><sub data-dcnode-id="3637"><em data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">R</span></em></sub><span data-dcnode-id="3636" instrument_node="">(</span><em data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">R</span></em><sub data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">0</span></sub><span data-dcnode-id="3631" instrument_node="">) = 44 km s</span><sup data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">−1</span></sup><span data-dcnode-id="3628" instrument_node=""> and are adiabatically grown in an initially equilibrium, axisymmetric disk. While the influence of bar and spiral structure perturbations is small, an elliptical disk model can reduce the size of the residuals. This figure only shows the influence of non-axisymmetry on the mean of the line-of-sight velocities in each field; much more information is of course contained in the full distribution of line-of-sight velocities.</span></p></div><p class="mb-05 print-hide" data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="3617"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f9_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DW4S%252F86lmzQZRzxnUh6QSO39HMNc%253D" id="wd-jnl-art-btn-std-img-apj447278f9"><span class="icon-image" data-dcnode-id="3623"></span><span data-dcnode-id="3622" instrument_node=""> Standard image
					</span></a><a class="btn btn-primary fig-dwnld-hi-img" data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f9_hr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DPwHcWX3%252FEAMI3hysFbK0MlnLvc0%253D" id="wd-jnl-art-btn-hires-img-apj447278f9"><span class="icon-image" data-dcnode-id="3620"></span><span data-dcnode-id="3619" instrument_node=""> High-resolution image
					</span></a></span></figcaption></figure></figure><p data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">It is clear that the data used in this paper could be used to constrain non-axisymmetric perturbations to the axisymmetric potential assumed here. We defer a full treatment of this to a subsequent paper.</span></p></div><h3 data-dcnode-id="3609" id="apj447278s5-2" name="apj447278s5-2"><span data-dcnode-id="3610" instrument_node="">5.2.&nbsp;Comparison with Other Determinations of the Local Circular Velocity</span></h3><div class="article-text" data-dcnode-id="3268"><p data-dcnode-id="3506"><span data-dcnode-id="3608" instrument_node="">There have been many previous determinations of the local circular velocity, and we discuss here how our new measurement compares to these. Determinations of the local circular velocity can be roughly divided into two groups: measurements of the Sun's velocity with respect to an object or population assumed to be at rest with respect to the Galactic center (e.g., Sgr&nbsp;A* or a population of halo objects), or direct measurements of the local radial force (e.g., by determining the Oort constants or the orbit of a stream of stars). The former directly measure the Sun's Galactocentric velocity, </span><em data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">V</span></em><sub data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3603" instrument_node="">, but must assume a value for the Sun's motion with respect to the circular orbit at </span><em data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">R</span></em><sub data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">0</span></sub><span data-dcnode-id="3598" instrument_node=""> to arrive at </span><em data-dcnode-id="3594"><span data-dcnode-id="3597" instrument_node="">V</span><sub data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">c</span></sub></em><span data-dcnode-id="3593" instrument_node="">(</span><em data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">R</span></em><sub data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">0</span></sub><span data-dcnode-id="3588" instrument_node="">). The most direct measurement of this kind is the combination of the precisely measured proper motion of Sgr&nbsp;A* (Reid &amp; Brunthaler </span><a class="cite" data-dcnode-id="3586" href="#apj447278r69" id="fnref-apj447278r69" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3587" instrument_node="">2004</span></a><span data-dcnode-id="3585" instrument_node="">) with the distance to the Galactic center determined from the Keplerian orbits of S stars in the innermost parsec (Ghez et al. </span><a class="cite" data-dcnode-id="3583" href="#apj447278r38" id="fnref-apj447278r38" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3584" instrument_node="">2008</span></a><span data-dcnode-id="3582" instrument_node="">; Gillessen et al. </span><a class="cite" data-dcnode-id="3580" href="#apj447278r39" id="fnref-apj447278r39" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3581" instrument_node="">2009</span></a><span data-dcnode-id="3579" instrument_node="">). These measurements give </span><em data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">R</span></em><sub data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">0</span></sub><span data-dcnode-id="3574" instrument_node=""> ≈ 8 kpc, which combined with the proper motion of Sgr&nbsp;A* of 30.24 km s</span><sup data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">−1</span></sup><span data-dcnode-id="3571" instrument_node=""> kpc</span><sup data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">−1</span></sup><span data-dcnode-id="3568" instrument_node=""> yields a total solar velocity of 242 km s</span><sup data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">−1</span></sup><span data-dcnode-id="3565" instrument_node="">. As noted before, this result is entirely consistent with our inferred value of the angular motion of the Galactic center, and with our </span><em data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">V</span></em><sub data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3560" instrument_node=""> = 242</span><sup data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">+10</span></sup><sub data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">− 3</span></sub><span data-dcnode-id="3555" instrument_node=""> km s</span><sup data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">−1</span></sup><span data-dcnode-id="3552" instrument_node="">. The discrepancy between the value of </span><em data-dcnode-id="3548"><span data-dcnode-id="3551" instrument_node="">V</span><sub data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">c</span></sub></em><span data-dcnode-id="3547" instrument_node=""> = 229 km s</span><sup data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">−1</span></sup><span data-dcnode-id="3544" instrument_node=""> in Ghez et al. (</span><a class="cite" data-dcnode-id="3542" href="#apj447278r38" id="fnref-apj447278r38" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3543" instrument_node="">2008</span></a><span data-dcnode-id="3541" instrument_node="">; or higher measurements also based on the proper motion of Sgr&nbsp;A*) and our </span><em data-dcnode-id="3537"><span data-dcnode-id="3540" instrument_node="">V</span><sub data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">c</span></sub></em><span data-dcnode-id="3536" instrument_node=""> = 218 km s</span><sup data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">−1</span></sup><span data-dcnode-id="3533" instrument_node=""> is therefore </span><em data-dcnode-id="3527"><span data-dcnode-id="3532" instrument_node="">entirely due to our different value for the solar velocity with respect to </span><em data-dcnode-id="3528"><span data-dcnode-id="3531" instrument_node="">V</span><sub data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">c</span></sub></em></em><span data-dcnode-id="3526" instrument_node="">, and intrinsically these measurements are consistent. Similarly, the recent measurements of </span><em data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">V</span></em><sub data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3521" instrument_node=""> = 276 ± 23 km s</span><sup data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">−1</span></sup><span data-dcnode-id="3518" instrument_node=""> and </span><em data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">V</span></em><sub data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3513" instrument_node=""> = 244 ± 14 km s</span><sup data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">−1</span></sup><span data-dcnode-id="3510" instrument_node=""> using the kinematics of the Sgr stream (Carlin et al. </span><a class="cite" data-dcnode-id="3508" href="#apj447278r18" id="fnref-apj447278r18" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3509" instrument_node="">2012</span></a><span data-dcnode-id="3507" instrument_node="">) are consistent with our measurement of the solar velocity.</span></p><p data-dcnode-id="3418"><span data-dcnode-id="3505" instrument_node="">Measurements based on the Oort constants (e.g., Feast &amp; Whitelock </span><a class="cite" data-dcnode-id="3503" href="#apj447278r32" id="fnref-apj447278r32" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3504" instrument_node="">1997</span></a><span data-dcnode-id="3502" instrument_node="">), or the dynamics of a cold stellar stream (Koposov et al. </span><a class="cite" data-dcnode-id="3500" href="#apj447278r53" id="fnref-apj447278r53" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3501" instrument_node="">2010</span></a><span data-dcnode-id="3499" instrument_node="">), also indicate that </span><em data-dcnode-id="3495"><span data-dcnode-id="3498" instrument_node="">V</span><sub data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">c</span></sub></em><span data-dcnode-id="3494" instrument_node=""> ∼ 220 km s</span><sup data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">−1</span></sup><span data-dcnode-id="3491" instrument_node="">. The measurement of the Oort constants from </span><em data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Hipparcos</span></em><span data-dcnode-id="3488" instrument_node=""> proper motions by Feast &amp; Whitelock (</span><a class="cite" data-dcnode-id="3486" href="#apj447278r32" id="fnref-apj447278r32" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3487" instrument_node="">1997</span></a><span data-dcnode-id="3485" instrument_node="">) directly measures the angular frequency of the local circular orbit, independent (in principle) from the solar motion: Ω</span><sub data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">0</span></sub><span data-dcnode-id="3482" instrument_node=""> = </span><em data-dcnode-id="3478"><span data-dcnode-id="3481" instrument_node="">V</span><sub data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">c</span></sub></em><span data-dcnode-id="3477" instrument_node="">/</span><em data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">R</span></em><sub data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">0</span></sub><span data-dcnode-id="3472" instrument_node=""> = 27.2 ± 0.9 km s</span><sup data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">−1</span></sup><span data-dcnode-id="3469" instrument_node=""> kpc</span><sup data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">−1</span></sup><span data-dcnode-id="3466" instrument_node="">. This value is consistent with our determination (see Table </span><a class="tabref" data-dcnode-id="3464" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3465" instrument_node="">2</span></a><span data-dcnode-id="3463" instrument_node="">) Ω</span><sub data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">0</span></sub><span data-dcnode-id="3460" instrument_node=""> = 27.0</span><sup data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">+0.3</span></sup><sub data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">− 3.5</span></sub><span data-dcnode-id="3455" instrument_node=""> km s</span><sup data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">−1</span></sup><span data-dcnode-id="3452" instrument_node=""> kpc</span><sup data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">−1</span></sup><span data-dcnode-id="3449" instrument_node="">. The determination of </span><em data-dcnode-id="3445"><span data-dcnode-id="3448" instrument_node="">V</span><sub data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">c</span></sub></em><span data-dcnode-id="3444" instrument_node=""> = 221 ± 18 km s</span><sup data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">−1</span></sup><span data-dcnode-id="3441" instrument_node=""> of Koposov et al. (</span><a class="cite" data-dcnode-id="3439" href="#apj447278r53" id="fnref-apj447278r53" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3440" instrument_node="">2010</span></a><span data-dcnode-id="3438" instrument_node="">) from fitting an orbit to the cold GD-1 stellar stream at </span><em data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">R</span></em><span data-dcnode-id="3435" instrument_node=""> ∼ 10 kpc is clearly consistent with our measurement, although note that they assumed the </span><em data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">V</span></em><sub data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3430" instrument_node=""> − </span><em data-dcnode-id="3426"><span data-dcnode-id="3429" instrument_node="">V</span><sub data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">c</span></sub></em><span data-dcnode-id="3425" instrument_node=""> = 5.25 km s</span><sup data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">−1</span></sup><span data-dcnode-id="3422" instrument_node=""> value for the solar motion from Dehnen &amp; Binney (</span><a class="cite" data-dcnode-id="3420" href="#apj447278r27" id="fnref-apj447278r27" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3421" instrument_node="">1998</span></a><span data-dcnode-id="3419" instrument_node="">).</span></p><p data-dcnode-id="3344"><span data-dcnode-id="3417" instrument_node="">The recent measurement of </span><em data-dcnode-id="3413"><span data-dcnode-id="3416" instrument_node="">V</span><sub data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">c</span></sub></em><span data-dcnode-id="3412" instrument_node=""> = 254 ± 16 km s</span><sup data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">−1</span></sup><span data-dcnode-id="3409" instrument_node="">, from the kinematics of masers in the Galactic disk (Reid et al. </span><a class="cite" data-dcnode-id="3407" href="#apj447278r70" id="fnref-apj447278r70" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3408" instrument_node="">2009</span></a><span data-dcnode-id="3406" instrument_node="">), was shown to have an overly optimistic precision by Bovy et al. (</span><a class="cite" data-dcnode-id="3404" href="#apj447278r11" id="fnref-apj447278r11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3405" instrument_node="">2009a</span></a><span data-dcnode-id="3403" instrument_node="">), who concluded from a more general model for the DF of the masers that these data only imply </span><em data-dcnode-id="3399"><span data-dcnode-id="3402" instrument_node="">V</span><sub data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">c</span></sub></em><span data-dcnode-id="3398" instrument_node=""> = 246 ± 30 km s</span><sup data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">−1</span></sup><span data-dcnode-id="3395" instrument_node="">. The measurement of </span><em data-dcnode-id="3391"><span data-dcnode-id="3394" instrument_node="">V</span><sub data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">c</span></sub></em><span data-dcnode-id="3390" instrument_node=""> from the maser kinematics also assumes that </span><em data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">V</span></em><sub data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3385" instrument_node=""> is given by </span><em data-dcnode-id="3381"><span data-dcnode-id="3384" instrument_node="">V</span><sub data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">c</span></sub></em><span data-dcnode-id="3380" instrument_node=""> plus the locally determined solar motion of ∼10 km s</span><sup data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">−1</span></sup><span data-dcnode-id="3377" instrument_node="">. Apart from indicating a high value for </span><em data-dcnode-id="3373"><span data-dcnode-id="3376" instrument_node="">V</span><sub data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">c</span></sub></em><span data-dcnode-id="3372" instrument_node="">, albeit with a large uncertainty, the masers were also found to be lagging with respect to circular motion by about 15 km s</span><sup data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">−1</span></sup><span data-dcnode-id="3369" instrument_node="">, a large offset for a young and relatively cold tracer population. This offset cannot be explained by the asymmetric drift and it is physically implausible since it requires the masers to have more eccentric orbits than most of the young stars (McMillan &amp; Binney </span><a class="cite" data-dcnode-id="3367" href="#apj447278r65" id="fnref-apj447278r65" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3368" instrument_node="">2010</span></a><span data-dcnode-id="3366" instrument_node="">). Requiring the masers to be on circular orbits assuming a flat rotation curve leads to a solar motion of </span><em data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">V</span></em><sub data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3361" instrument_node=""> − </span><em data-dcnode-id="3357"><span data-dcnode-id="3360" instrument_node="">V</span><sub data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">c</span></sub></em><span data-dcnode-id="3356" instrument_node=""> = 18.6 ± 2.4 km s</span><sup data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">−1</span></sup><span data-dcnode-id="3353" instrument_node=""> and </span><em data-dcnode-id="3349"><span data-dcnode-id="3352" instrument_node="">V</span><sub data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">c</span></sub></em><span data-dcnode-id="3348" instrument_node=""> = 232 ± 24 (McMillan &amp; Binney </span><a class="cite" data-dcnode-id="3346" href="#apj447278r65" id="fnref-apj447278r65" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3347" instrument_node="">2010</span></a><span data-dcnode-id="3345" instrument_node="">), in good agreement with our measurements. Our measurement, however, relies on the theoretically well-motivated asymmetric-drift correction that is a direct consequence of the collisionless Boltzmann equation.</span></p><p data-dcnode-id="3327"><span data-dcnode-id="3343" instrument_node="">Therefore, we conclude that our measurement of </span><em data-dcnode-id="3339"><span data-dcnode-id="3342" instrument_node="">V</span><sub data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">c</span></sub></em><span data-dcnode-id="3338" instrument_node=""> is consistent with previously reported values. Compared to other determinations, our measurement of </span><em data-dcnode-id="3334"><span data-dcnode-id="3337" instrument_node="">V</span><sub data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">c</span></sub></em><span data-dcnode-id="3333" instrument_node=""> is one of the most highly precise, and unlike many other measurements, it does not require assumptions about the relation between the solar motion and </span><em data-dcnode-id="3329"><span data-dcnode-id="3332" instrument_node="">V</span><sub data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">c</span></sub></em><span data-dcnode-id="3328" instrument_node="">.</span></p><p data-dcnode-id="3286"><span data-dcnode-id="3326" instrument_node="">Our data </span><em data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">strongly</span></em><span data-dcnode-id="3323" instrument_node=""> rule out that the Milky Way's circular velocity at the solar radius is &gt;235 km s</span><sup data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">−1</span></sup><span data-dcnode-id="3320" instrument_node="">. Marginalizing over all of the systematics discussed in Section </span><a class="secref" data-dcnode-id="3318" href="#apj447278s4-2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3319" instrument_node="">4.2</span></a><span data-dcnode-id="3317" instrument_node="">, </span><em data-dcnode-id="3313"><span data-dcnode-id="3316" instrument_node="">V</span><sub data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">c</span></sub></em><span data-dcnode-id="3312" instrument_node=""> &lt; 235 km s</span><sup data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">−1</span></sup><span data-dcnode-id="3309" instrument_node=""> at &gt;99% confidence. Fixing </span><em data-dcnode-id="3305"><span data-dcnode-id="3308" instrument_node="">V</span><sub data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">c</span></sub></em><span data-dcnode-id="3304" instrument_node=""> to 250 km s</span><sup data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">−1</span></sup><span data-dcnode-id="3301" instrument_node=""> with </span><em data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">R</span></em><sub data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">0</span></sub><span data-dcnode-id="3296" instrument_node=""> = 8 kpc or 8.4 kpc leads to a best fit with much larger χ</span><sup data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">2</span></sup><span data-dcnode-id="3293" instrument_node="">: Δχ</span><sup data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">2</span></sup><span data-dcnode-id="3290" instrument_node=""> = 47 (∼5σ) and Δχ</span><sup data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">2</span></sup><span data-dcnode-id="3287" instrument_node=""> = 34 (∼3.7σ), respectively.</span></p><p data-dcnode-id="3269"><span data-dcnode-id="3285" instrument_node="">Our measurement that the Milky Way's rotation curve is essentially flat over 4 kpc &lt; </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">R</span></em><span data-dcnode-id="3282" instrument_node=""> &lt; 14 kpc agrees with measurements based on the kinematics of H </span><span class="small-caps" data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">i</span></span><span data-dcnode-id="3279" instrument_node=""> emission (e.g., Gunn et al. </span><a class="cite" data-dcnode-id="3277" href="#apj447278r42" id="fnref-apj447278r42" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3278" instrument_node="">1979</span></a><span data-dcnode-id="3276" instrument_node="">; Merrifield </span><a class="cite" data-dcnode-id="3274" href="#apj447278r66" id="fnref-apj447278r66" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3275" instrument_node="">1992</span></a><span data-dcnode-id="3273" instrument_node="">) and with the local measurement of the Oort constants (Feast &amp; Whitelock </span><a class="cite" data-dcnode-id="3271" href="#apj447278r32" id="fnref-apj447278r32" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3272" instrument_node="">1997</span></a><span data-dcnode-id="3270" instrument_node="">).</span></p></div><h3 data-dcnode-id="3266" id="apj447278s5-3" name="apj447278s5-3"><span data-dcnode-id="3267" instrument_node="">5.3.&nbsp;Implications for the Motion of the LSR</span></h3><div class="article-text" data-dcnode-id="2794"><p data-dcnode-id="3178"><span data-dcnode-id="3265" instrument_node="">We found in Section </span><a class="secref" data-dcnode-id="3263" href="#apj447278s4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3264" instrument_node="">4</span></a><span data-dcnode-id="3262" instrument_node="">, in both the flat- and power-law-rotation-curve models, that the Sun's velocity with respect to the center of the Galaxy—a distinct parameter from </span><em data-dcnode-id="3258"><span data-dcnode-id="3261" instrument_node="">V</span><sub data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">c</span></sub></em><span data-dcnode-id="3257" instrument_node=""> in our fit—is larger than </span><em data-dcnode-id="3253"><span data-dcnode-id="3256" instrument_node="">V</span><sub data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">c</span></sub></em><span data-dcnode-id="3252" instrument_node="">(</span><em data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">R</span></em><sub data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">0</span></sub><span data-dcnode-id="3247" instrument_node="">) by ∼24 km s</span><sup data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">−1</span></sup><span data-dcnode-id="3244" instrument_node="">. Defining the rotational standard of rest (RSR; Shuter </span><a class="cite" data-dcnode-id="3242" href="#apj447278r75" id="fnref-apj447278r75" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3243" instrument_node="">1982</span></a><span data-dcnode-id="3241" instrument_node="">) as the circular velocity in the axisymmetric approximation to the full potential, this solar motion with respect to the RSR is much larger than that measured by applying Strömberg's asymmetric-drift relation to local samples of stars. The asymmetric-drift relation is used to estimate the velocity of the zero-dispersion orbit by extrapolating the relation given in Equation (</span><a class="eqnref" data-dcnode-id="3239" href="#apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3240" instrument_node="">5</span></a><span data-dcnode-id="3238" instrument_node="">) from warmer samples of stars to σ</span><sub data-dcnode-id="3235"><em data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">R</span></em></sub><span data-dcnode-id="3234" instrument_node=""> = 0; it is this zero-dispersion orbit that is typically what is meant by the LSR (Fich &amp; Tremaine </span><a class="cite" data-dcnode-id="3232" href="#apj447278r33" id="fnref-apj447278r33" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3233" instrument_node="">1991</span></a><span data-dcnode-id="3231" instrument_node="">). Such analyses of the </span><em data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Hipparcos</span></em><span data-dcnode-id="3228" instrument_node=""> data yield a solar motion with respect to the LSR that is somewhere between 5 and 13 km s</span><sup data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">−1</span></sup><span data-dcnode-id="3225" instrument_node=""> (Dehnen &amp; Binney </span><a class="cite" data-dcnode-id="3223" href="#apj447278r27" id="fnref-apj447278r27" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3224" instrument_node="">1998</span></a><span data-dcnode-id="3222" instrument_node="">; Hogg et al. </span><a class="cite" data-dcnode-id="3220" href="#apj447278r45" id="fnref-apj447278r45" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3221" instrument_node="">2005</span></a><span data-dcnode-id="3219" instrument_node="">; Schönrich et al. </span><a class="cite" data-dcnode-id="3217" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3218" instrument_node="">2010</span></a><span data-dcnode-id="3216" instrument_node="">); 13 km s</span><sup data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">−1</span></sup><span data-dcnode-id="3213" instrument_node=""> is also the offset of the average rotational velocity of nearby stars (e.g., Allende Prieto et al. </span><a class="cite" data-dcnode-id="3211" href="#apj447278r1" id="fnref-apj447278r1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3212" instrument_node="">2004</span></a><span data-dcnode-id="3210" instrument_node="">). The discrepancy between our determination of the solar velocity with respect to the RSR, and that with respect to the LSR, is clearly shown in Figure </span><a data-dcnode-id="3208" href="#apj447278f10" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3209" instrument_node="">10</span></a><span data-dcnode-id="3207" instrument_node="">, where the PDF for </span><em data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">V</span></em><sub data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3202" instrument_node=""> − </span><em data-dcnode-id="3198"><span data-dcnode-id="3201" instrument_node="">V</span><sub data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">c</span></sub></em><span data-dcnode-id="3197" instrument_node="">, </span><em data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">V</span></em><sub data-dcnode-id="3191"><em data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">R</span></em><span data-dcnode-id="3192" instrument_node="">, ☉</span></sub><span data-dcnode-id="3190" instrument_node=""> is shown for the flat-rotation-curve model, together with the locally measured motion with respect to the LSR of Schönrich et al. (</span><a class="cite" data-dcnode-id="3188" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3189" instrument_node="">2010</span></a><span data-dcnode-id="3187" instrument_node="">). The analogous figure for the power-law rotation-curve fit has an essentially identical appearance. It is clear that the locally measured solar motion </span><em data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">V</span></em><sub data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="3182" instrument_node=""> is not equal to our globally measured solar motion to very high significance. Or, equivalently, the motion of the RSR is not the same as that of the LSR: the LSR seems to rotate ∼12 km s</span><sup data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">−1</span></sup><span data-dcnode-id="3179" instrument_node=""> faster than the RSR.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="3132" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f10_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=kjuJngrtdYjpdEKlH7rSoYJZl4Q%3D" data-toolbar-link="apj447278f10" data-toolbar-title="Figure 10." data-toolbar-type="figure" id="apj447278f10" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="3133"><div class="panzoom-container" data-dcnode-id="3164"><div class="panzoom-parent" data-dcnode-id="3176" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 10." class="panzoom" data-dcnode-id="3177" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f10_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=kjuJngrtdYjpdEKlH7rSoYJZl4Q%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw" style="transform: scale(1) translate(0px, 0px); backface-visibility: hidden; transform-origin: 50% 50%; cursor: move; transition: none 0s ease 0s; user-select: none; touch-action: none;"></div><div class="buttons zoom-tools" data-dcnode-id="3165"><button class="zoom-in" data-dcnode-id="3173"><span class="icon-zoomin" data-dcnode-id="3175"></span><span data-dcnode-id="3174" instrument_node="">
