</span><h2 class="collapse-blocked" data-dcnode-id="8303" id="artAbst"><span data-dcnode-id="8304" instrument_node="">ABSTRACT</span></h2><span data-dcnode-id="8302" instrument_node="">
</span><span data-dcnode-id="8300" instrument_node="">
</span><span data-dcnode-id="8298" instrument_node="">
</span><div class="article-text wd-jnl-art-abstract cf" data-dcnode-id="8174" itemprop="description"><span data-dcnode-id="8297" instrument_node="">
</span><p data-dcnode-id="8175"><span data-dcnode-id="8296" instrument_node="">We measure the Milky Way's rotation curve over the Galactocentric range 4 kpc ≲ </span><i data-dcnode-id="8294"><span data-dcnode-id="8295" instrument_node="">R</span></i><span data-dcnode-id="8293" instrument_node=""> ≲ 14 kpc from the first year of data from the Apache Point Observatory Galactic Evolution Experiment. We model the line-of-sight velocities of 3365 stars in 14 fields with </span><i data-dcnode-id="8291"><span data-dcnode-id="8292" instrument_node="">b</span></i><span data-dcnode-id="8290" instrument_node=""> = 0° between 30° ⩽ </span><i data-dcnode-id="8288"><span data-dcnode-id="8289" instrument_node="">l</span></i><span data-dcnode-id="8287" instrument_node=""> ⩽ 210° out to distances of 10 kpc using an axisymmetric kinematical model that includes a correction for the asymmetric drift of the warm tracer population (σ</span><sub data-dcnode-id="8284"><i data-dcnode-id="8285"><span data-dcnode-id="8286" instrument_node="">R</span></i></sub><span data-dcnode-id="8283" instrument_node=""> ≈ 35 km s</span><sup data-dcnode-id="8281"><span data-dcnode-id="8282" instrument_node="">−1</span></sup><span data-dcnode-id="8280" instrument_node="">). We determine the local value of the circular velocity to be </span><i data-dcnode-id="8276"><span data-dcnode-id="8279" instrument_node="">V</span><sub data-dcnode-id="8277"><span data-dcnode-id="8278" instrument_node="">c</span></sub></i><span data-dcnode-id="8275" instrument_node="">(</span><i data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">R</span></i><sub data-dcnode-id="8271"><span data-dcnode-id="8272" instrument_node="">0</span></sub><span data-dcnode-id="8270" instrument_node="">) = 218 ± 6 km s</span><sup data-dcnode-id="8268"><span data-dcnode-id="8269" instrument_node="">−1</span></sup><span data-dcnode-id="8267" instrument_node=""> and find that the rotation curve is approximately flat with a local derivative between −3.0 km s</span><sup data-dcnode-id="8265"><span data-dcnode-id="8266" instrument_node="">−1</span></sup><span data-dcnode-id="8264" instrument_node=""> kpc</span><sup data-dcnode-id="8262"><span data-dcnode-id="8263" instrument_node="">−1</span></sup><span data-dcnode-id="8261" instrument_node=""> and 0.4 km s</span><sup data-dcnode-id="8259"><span data-dcnode-id="8260" instrument_node="">−1</span></sup><span data-dcnode-id="8258" instrument_node=""> kpc</span><sup data-dcnode-id="8256"><span data-dcnode-id="8257" instrument_node="">−1</span></sup><span data-dcnode-id="8255" instrument_node="">. We also measure the Sun's position and velocity in the Galactocentric rest frame, finding the distance to the Galactic center to be 8 kpc &lt; </span><i data-dcnode-id="8253"><span data-dcnode-id="8254" instrument_node="">R</span></i><sub data-dcnode-id="8251"><span data-dcnode-id="8252" instrument_node="">0</span></sub><span data-dcnode-id="8250" instrument_node=""> &lt; 9 kpc, radial velocity </span><i data-dcnode-id="8248"><span data-dcnode-id="8249" instrument_node="">V</span></i><sub data-dcnode-id="8244"><i data-dcnode-id="8246"><span data-dcnode-id="8247" instrument_node="">R</span></i><span data-dcnode-id="8245" instrument_node="">, ☉</span></sub><span data-dcnode-id="8243" instrument_node=""> = −10 ± 1 km s</span><sup data-dcnode-id="8241"><span data-dcnode-id="8242" instrument_node="">−1</span></sup><span data-dcnode-id="8240" instrument_node="">, and rotational velocity </span><i data-dcnode-id="8238"><span data-dcnode-id="8239" instrument_node="">V</span></i><sub data-dcnode-id="8236"><span data-dcnode-id="8237" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="8235" instrument_node=""> = 242</span><sup data-dcnode-id="8233"><span data-dcnode-id="8234" instrument_node="">+10</span></sup><sub data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">− 3</span></sub><span data-dcnode-id="8230" instrument_node=""> km s</span><sup data-dcnode-id="8228"><span data-dcnode-id="8229" instrument_node="">−1</span></sup><span data-dcnode-id="8227" instrument_node="">, in good agreement with local measurements of the Sun's radial velocity and with the observed proper motion of Sgr&nbsp;A*. We investigate various systematic uncertainties and find that these are limited to offsets at the percent level, ∼2 km s</span><sup data-dcnode-id="8225"><span data-dcnode-id="8226" instrument_node="">−1</span></sup><span data-dcnode-id="8224" instrument_node=""> in </span><i data-dcnode-id="8220"><span data-dcnode-id="8223" instrument_node="">V</span><sub data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">c</span></sub></i><span data-dcnode-id="8219" instrument_node="">. Marginalizing over all the systematics that we consider, we find that </span><i data-dcnode-id="8215"><span data-dcnode-id="8218" instrument_node="">V</span><sub data-dcnode-id="8216"><span data-dcnode-id="8217" instrument_node="">c</span></sub></i><span data-dcnode-id="8214" instrument_node="">(</span><i data-dcnode-id="8212"><span data-dcnode-id="8213" instrument_node="">R</span></i><sub data-dcnode-id="8210"><span data-dcnode-id="8211" instrument_node="">0</span></sub><span data-dcnode-id="8209" instrument_node="">) &lt; 235 km s</span><sup data-dcnode-id="8207"><span data-dcnode-id="8208" instrument_node="">−1</span></sup><span data-dcnode-id="8206" instrument_node=""> at &gt;99 % confidence. We find an offset between the Sun's rotational velocity and the local circular velocity of 26 ± 3 km s</span><sup data-dcnode-id="8204"><span data-dcnode-id="8205" instrument_node="">−1</span></sup><span data-dcnode-id="8203" instrument_node="">, which is larger than the locally measured solar motion of 12 km s</span><sup data-dcnode-id="8201"><span data-dcnode-id="8202" instrument_node="">−1</span></sup><span data-dcnode-id="8200" instrument_node="">. This larger offset reconciles our value for </span><i data-dcnode-id="8196"><span data-dcnode-id="8199" instrument_node="">V</span><sub data-dcnode-id="8197"><span data-dcnode-id="8198" instrument_node="">c</span></sub></i><span data-dcnode-id="8195" instrument_node=""> with recent claims that </span><i data-dcnode-id="8191"><span data-dcnode-id="8194" instrument_node="">V</span><sub data-dcnode-id="8192"><span data-dcnode-id="8193" instrument_node="">c</span></sub></i><span data-dcnode-id="8190" instrument_node=""> ≳ 240 km s</span><sup data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">−1</span></sup><span data-dcnode-id="8187" instrument_node="">. Combining our results with other data, we find that the Milky Way's dark-halo mass within the virial radius is ∼8 </span><b data-dcnode-id="8185"><span data-dcnode-id="8186" instrument_node="">×</span></b><span data-dcnode-id="8184" instrument_node=""> 10</span><sup data-dcnode-id="8182"><span data-dcnode-id="8183" instrument_node="">11</span></sup><span data-dcnode-id="8181" instrument_node=""> </span><i data-dcnode-id="8179"><span data-dcnode-id="8180" instrument_node="">M</span></i><sub data-dcnode-id="8177"><span data-dcnode-id="8178" instrument_node="">☉</span></sub><span data-dcnode-id="8176" instrument_node="">.</span></p></div><span data-dcnode-id="8173" instrument_node="">

</span><div class="wd-jnl-art-full-text article-text" data-dcnode-id="386" itemprop="articleBody" xmlns:book="http://api.iop.org/Book/1.0/"><span data-dcnode-id="8077" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="8075" id="apj447278s1" name="apj447278s1"><span data-dcnode-id="8076" instrument_node="">1.&nbsp;INTRODUCTION</span></h2><div class="article-text" data-dcnode-id="7675" data-mobile-collapse=""><p data-dcnode-id="8025"><span data-dcnode-id="8074" instrument_node="">The Milky Way's inner rotation curve </span><em data-dcnode-id="8070"><span data-dcnode-id="8073" instrument_node="">V</span><sub data-dcnode-id="8071"><span data-dcnode-id="8072" instrument_node="">c</span></sub></em><span data-dcnode-id="8069" instrument_node="">(</span><em data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">R</span></em><span data-dcnode-id="8066" instrument_node="">), and in particular its value </span><em data-dcnode-id="8062"><span data-dcnode-id="8065" instrument_node="">V</span><sub data-dcnode-id="8063"><span data-dcnode-id="8064" instrument_node="">c</span></sub></em><span data-dcnode-id="8061" instrument_node=""> ≡ </span><em data-dcnode-id="8057"><span data-dcnode-id="8060" instrument_node="">V</span><sub data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">c</span></sub></em><span data-dcnode-id="8056" instrument_node="">(</span><em data-dcnode-id="8054"><span data-dcnode-id="8055" instrument_node="">R</span></em><sub data-dcnode-id="8052"><span data-dcnode-id="8053" instrument_node="">0</span></sub><span data-dcnode-id="8051" instrument_node="">) at the Sun's Galactocentric radius </span><em data-dcnode-id="8049"><span data-dcnode-id="8050" instrument_node="">R</span></em><sub data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">0</span></sub><span data-dcnode-id="8046" instrument_node="">, is crucial for our understanding of many Galactic and extragalactic observations. It provides an important constraint on mass models for the Milky Way and the question of whether the Galactic disk is maximal. The shape of the rotation curve is an important ingredient for realistic models of the disk's formation and evolution. The circular velocity at the Sun, which is located approximately 2.5 disk scale lengths from the Galactic center (Bovy et al. </span><a class="cite" data-dcnode-id="8044" href="#apj447278r14" id="fnref-apj447278r14" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8045" instrument_node="">2012b</span></a><span data-dcnode-id="8043" instrument_node="">), is also important for placing the Milky Way in a cosmological context, for example, when asking whether the Milky Way follows the Tully–Fisher relation (e.g., Klypin et al. </span><a class="cite" data-dcnode-id="8041" href="#apj447278r51" id="fnref-apj447278r51" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8042" instrument_node="">2002</span></a><span data-dcnode-id="8040" instrument_node="">; Flynn et al. </span><a class="cite" data-dcnode-id="8038" href="#apj447278r34" id="fnref-apj447278r34" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8039" instrument_node="">2006</span></a><span data-dcnode-id="8037" instrument_node="">; Hammer et al. </span><a class="cite" data-dcnode-id="8035" href="#apj447278r44" id="fnref-apj447278r44" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8036" instrument_node="">2007</span></a><span data-dcnode-id="8034" instrument_node="">). </span><em data-dcnode-id="8030"><span data-dcnode-id="8033" instrument_node="">V</span><sub data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">c</span></sub></em><span data-dcnode-id="8029" instrument_node=""> is often considered to be an important parameter for dark-matter direct-detection experiments and for correcting the motion of extragalactic objects for the motion of the Sun, although we seek to dispel these notions below (Section </span><a class="secref" data-dcnode-id="8027" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8028" instrument_node="">5.3</span></a><span data-dcnode-id="8026" instrument_node="">).</span></p><p data-dcnode-id="7939"><span data-dcnode-id="8024" instrument_node="">Traditionally, the local circular velocity has been obtained by measuring the Sun's motion with respect to an object that is assumed to be at rest with respect to the Galaxy. The most robust of those measurements is that derived from the observed proper motion of Sgr&nbsp;A* (Reid &amp; Brunthaler </span><a class="cite" data-dcnode-id="8022" href="#apj447278r69" id="fnref-apj447278r69" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8023" instrument_node="">2004</span></a><span data-dcnode-id="8021" instrument_node="">), even though this requires an estimate of </span><em data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">R</span></em><sub data-dcnode-id="8017"><span data-dcnode-id="8018" instrument_node="">0</span></sub><span data-dcnode-id="8016" instrument_node="">. An alternative method that does not require knowledge of </span><em data-dcnode-id="8014"><span data-dcnode-id="8015" instrument_node="">R</span></em><sub data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">0</span></sub><span data-dcnode-id="8011" instrument_node=""> consists of measuring the Sun's reflex motion using a stellar tidal stream with orbital pole near </span><em data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">l</span></em><span data-dcnode-id="8008" instrument_node=""> = 270° (Majewski et al. </span><a class="cite" data-dcnode-id="8006" href="#apj447278r62" id="fnref-apj447278r62" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8007" instrument_node="">2006</span></a><span data-dcnode-id="8005" instrument_node="">). Similar measurements using samples of halo stars (Sirko et al. </span><a class="cite" data-dcnode-id="8003" href="#apj447278r77" id="fnref-apj447278r77" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8004" instrument_node="">2004</span></a><span data-dcnode-id="8002" instrument_node="">), or the globular cluster system (Woltjer </span><a class="cite" data-dcnode-id="8000" href="#apj447278r86" id="fnref-apj447278r86" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="8001" instrument_node="">1975</span></a><span data-dcnode-id="7999" instrument_node="">), may be contaminated by the residual, presumably prograde, motion of these populations and, thus, only provide a lower limit. As discussed in detail in Section </span><a class="secref" data-dcnode-id="7997" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7998" instrument_node="">5.3</span></a><span data-dcnode-id="7996" instrument_node="">, such measurements intrinsically measure the </span><em data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">Sun's</span></em><span data-dcnode-id="7993" instrument_node=""> rotational velocity, </span><em data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">V</span></em><sub data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7988" instrument_node="">, rather than the circular velocity. To arrive at </span><em data-dcnode-id="7984"><span data-dcnode-id="7987" instrument_node="">V</span><sub data-dcnode-id="7985"><span data-dcnode-id="7986" instrument_node="">c</span></sub></em><span data-dcnode-id="7983" instrument_node="">, these measurements depend on a highly uncertain correction for the Sun's motion with respect to </span><em data-dcnode-id="7979"><span data-dcnode-id="7982" instrument_node="">V</span><sub data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">c</span></sub></em><span data-dcnode-id="7978" instrument_node="">. The measurement of </span><em data-dcnode-id="7974"><span data-dcnode-id="7977" instrument_node="">V</span><sub data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">c</span></sub></em><span data-dcnode-id="7973" instrument_node=""> by observing the extreme line-of-sight velocity of H </span><span class="small-caps" data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">i</span></span><span data-dcnode-id="7970" instrument_node=""> emission toward Galactic longitudes </span><em data-dcnode-id="7968"><span data-dcnode-id="7969" instrument_node="">l</span></em><span data-dcnode-id="7967" instrument_node=""> ∼ 90° in principle also directly measures </span><em data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">V</span></em><sub data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7962" instrument_node=""> (Knapp et al. </span><a class="cite" data-dcnode-id="7960" href="#apj447278r52" id="fnref-apj447278r52" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7961" instrument_node="">1979</span></a><span data-dcnode-id="7959" instrument_node="">), although the H </span><span class="small-caps" data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">i</span></span><span data-dcnode-id="7956" instrument_node=""> density drops too steeply with radius for </span><em data-dcnode-id="7954"><span data-dcnode-id="7955" instrument_node="">V</span></em><sub data-dcnode-id="7952"><span data-dcnode-id="7953" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7951" instrument_node=""> to be directly observed, and more intricate modeling is necessary to turn the H </span><span class="small-caps" data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">i</span></span><span data-dcnode-id="7948" instrument_node=""> emission toward </span><em data-dcnode-id="7946"><span data-dcnode-id="7947" instrument_node="">l</span></em><span data-dcnode-id="7945" instrument_node=""> ∼ 90° into a constraint on </span><em data-dcnode-id="7941"><span data-dcnode-id="7944" instrument_node="">V</span><sub data-dcnode-id="7942"><span data-dcnode-id="7943" instrument_node="">c</span></sub></em><span data-dcnode-id="7940" instrument_node="">.</span></p><p data-dcnode-id="7881"><span data-dcnode-id="7938" instrument_node="">Other measurements of </span><em data-dcnode-id="7934"><span data-dcnode-id="7937" instrument_node="">V</span><sub data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">c</span></sub></em><span data-dcnode-id="7933" instrument_node=""> have in the past been limited to measurements of the Oort constants, due to a lack of data at large distances from the Sun (e.g., Feast &amp; Whitelock </span><a class="cite" data-dcnode-id="7931" href="#apj447278r32" id="fnref-apj447278r32" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7932" instrument_node="">1997</span></a><span data-dcnode-id="7930" instrument_node="">). Recently, new estimates have been obtained from the kinematics of masers in the Galactic disk (Reid et al. </span><a class="cite" data-dcnode-id="7928" href="#apj447278r70" id="fnref-apj447278r70" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7929" instrument_node="">2009</span></a><span data-dcnode-id="7927" instrument_node="">; Bovy et al. </span><a class="cite" data-dcnode-id="7925" href="#apj447278r11" id="fnref-apj447278r11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7926" instrument_node="">2009a</span></a><span data-dcnode-id="7924" instrument_node="">; McMillan &amp; Binney </span><a class="cite" data-dcnode-id="7922" href="#apj447278r65" id="fnref-apj447278r65" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7923" instrument_node="">2010</span></a><span data-dcnode-id="7921" instrument_node="">), and from fitting an orbit to the cold stellar stream GD-1 (Koposov et al. </span><a class="cite" data-dcnode-id="7919" href="#apj447278r53" id="fnref-apj447278r53" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7920" instrument_node="">2010</span></a><span data-dcnode-id="7918" instrument_node="">). However, until now, no consensus has been reached as to whether </span><em data-dcnode-id="7914"><span data-dcnode-id="7917" instrument_node="">V</span><sub data-dcnode-id="7915"><span data-dcnode-id="7916" instrument_node="">c</span></sub></em><span data-dcnode-id="7913" instrument_node=""> lies near the IAU-recommended value of </span><em data-dcnode-id="7909"><span data-dcnode-id="7912" instrument_node="">V</span><sub data-dcnode-id="7910"><span data-dcnode-id="7911" instrument_node="">c</span></sub></em><span data-dcnode-id="7908" instrument_node=""> = 220 km s</span><sup data-dcnode-id="7906"><span data-dcnode-id="7907" instrument_node="">−1</span></sup><span data-dcnode-id="7905" instrument_node=""> (Kerr &amp; Lynden-Bell </span><a class="cite" data-dcnode-id="7903" href="#apj447278r50" id="fnref-apj447278r50" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7904" instrument_node="">1986</span></a><span data-dcnode-id="7902" instrument_node="">), or whether it needs to be revised upward to around </span><em data-dcnode-id="7898"><span data-dcnode-id="7901" instrument_node="">V</span><sub data-dcnode-id="7899"><span data-dcnode-id="7900" instrument_node="">c</span></sub></em><span data-dcnode-id="7897" instrument_node=""> = 250 km s</span><sup data-dcnode-id="7895"><span data-dcnode-id="7896" instrument_node="">−1</span></sup><span data-dcnode-id="7894" instrument_node=""> (e.g., Ghez et al. </span><a class="cite" data-dcnode-id="7892" href="#apj447278r38" id="fnref-apj447278r38" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7893" instrument_node="">2008</span></a><span data-dcnode-id="7891" instrument_node="">; Reid et al. </span><a class="cite" data-dcnode-id="7889" href="#apj447278r70" id="fnref-apj447278r70" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7890" instrument_node="">2009</span></a><span data-dcnode-id="7888" instrument_node="">; Bovy et al. </span><a class="cite" data-dcnode-id="7886" href="#apj447278r11" id="fnref-apj447278r11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7887" instrument_node="">2009a</span></a><span data-dcnode-id="7885" instrument_node="">; Schönrich </span><a class="cite" data-dcnode-id="7883" href="#apj447278r71" id="fnref-apj447278r71" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7884" instrument_node="">2012</span></a><span data-dcnode-id="7882" instrument_node="">).</span></p><p data-dcnode-id="7838"><span data-dcnode-id="7880" instrument_node="">Most of the information relating to the shape of the rotation curve is based upon the observed kinematics of the H </span><span class="small-caps" data-dcnode-id="7878"><span data-dcnode-id="7879" instrument_node="">i</span></span><span data-dcnode-id="7877" instrument_node=""> emission, either through the tangent-point method at </span><em data-dcnode-id="7875"><span data-dcnode-id="7876" instrument_node="">l</span></em><span data-dcnode-id="7874" instrument_node=""> &lt; 90° and </span><em data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">l</span></em><span data-dcnode-id="7871" instrument_node=""> &gt; 270° (van de Hulst et al. </span><a class="cite" data-dcnode-id="7869" href="#apj447278r81" id="fnref-apj447278r81" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7870" instrument_node="">1954</span></a><span data-dcnode-id="7868" instrument_node="">; Gunn et al. </span><a class="cite" data-dcnode-id="7866" href="#apj447278r42" id="fnref-apj447278r42" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7867" instrument_node="">1979</span></a><span data-dcnode-id="7865" instrument_node="">; Levine et al. </span><a class="cite" data-dcnode-id="7863" href="#apj447278r59" id="fnref-apj447278r59" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7864" instrument_node="">2008</span></a><span data-dcnode-id="7862" instrument_node="">), or through the observed thickness of the H </span><span class="small-caps" data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">i</span></span><span data-dcnode-id="7859" instrument_node=""> layer at 90° &lt; </span><em data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">l</span></em><span data-dcnode-id="7856" instrument_node=""> &lt; 270° (Merrifield </span><a class="cite" data-dcnode-id="7854" href="#apj447278r66" id="fnref-apj447278r66" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7855" instrument_node="">1992</span></a><span data-dcnode-id="7853" instrument_node="">). Such measurements are purely geometrical and, in particular, cannot constrain the component of Galactic rotation that has a uniform angular speed. This also holds for measurements of </span><em data-dcnode-id="7849"><span data-dcnode-id="7852" instrument_node="">V</span><sub data-dcnode-id="7850"><span data-dcnode-id="7851" instrument_node="">c</span></sub></em><span data-dcnode-id="7848" instrument_node=""> based on the line-of-sight velocities of open clusters (e.g., Frinchaboy </span><a class="cite" data-dcnode-id="7846" href="#apj447278r37" id="fnref-apj447278r37" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7847" instrument_node="">2008</span></a><span data-dcnode-id="7845" instrument_node="">). The best constraints on the local slope of the circular-velocity curve therefore also come from measurements of the Oort constants (e.g., Feast &amp; Whitelock </span><a class="cite" data-dcnode-id="7843" href="#apj447278r32" id="fnref-apj447278r32" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7844" instrument_node="">1997</span></a><span data-dcnode-id="7842" instrument_node="">), although the H </span><span class="small-caps" data-dcnode-id="7840"><span data-dcnode-id="7841" instrument_node="">i</span></span><span data-dcnode-id="7839" instrument_node=""> observations are crucial to measuring the rotation curve over the full radial range of the disk.</span></p><p data-dcnode-id="7798"><span data-dcnode-id="7837" instrument_node="">In this paper, we present the first measurement of the Milky Way's circular-velocity curve using kinematically warm stellar tracers out to heliocentric distances of 10 kpc, from the Sloan Digital Sky Survey III's Apache Point Observatory Galactic Evolution Experiment (SDSS-III/APOGEE; Eisenstein et al. </span><a class="cite" data-dcnode-id="7835" href="#apj447278r30" id="fnref-apj447278r30" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7836" instrument_node="">2011</span></a><span data-dcnode-id="7834" instrument_node="">; S. R. Majewski et al. 2012, in preparation). APOGEE is a high-resolution spectroscopic survey covering all of the major components of the Galaxy that—crucially—operates in the near-infrared, which allows stars to be observed to large distances in the dust-obscured regions of the inner Milky Way disk. While warm stellar-disk tracers do not on average rotate at the circular velocity like the H </span><span class="small-caps" data-dcnode-id="7832"><span data-dcnode-id="7833" instrument_node="">i</span></span><span data-dcnode-id="7831" instrument_node=""> emission discussed above, their offset from </span><em data-dcnode-id="7827"><span data-dcnode-id="7830" instrument_node="">V</span><sub data-dcnode-id="7828"><span data-dcnode-id="7829" instrument_node="">c</span></sub></em><span data-dcnode-id="7826" instrument_node="">(</span><em data-dcnode-id="7824"><span data-dcnode-id="7825" instrument_node="">R</span></em><span data-dcnode-id="7823" instrument_node="">)—the so-called asymmetric drift (Strömberg </span><a class="cite" data-dcnode-id="7821" href="#apj447278r79" id="fnref-apj447278r79" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7822" instrument_node="">1946</span></a><span data-dcnode-id="7820" instrument_node="">)—is a dynamical effect that can be calculated from their observed velocity dispersion. Because our measurement relies on a dynamical effect, we are sensitive to </span><em data-dcnode-id="7816"><span data-dcnode-id="7819" instrument_node="">V</span><sub data-dcnode-id="7817"><span data-dcnode-id="7818" instrument_node="">c</span></sub></em><span data-dcnode-id="7815" instrument_node=""> in the sense of the radial-force component at </span><em data-dcnode-id="7813"><span data-dcnode-id="7814" instrument_node="">R</span></em><span data-dcnode-id="7812" instrument_node="">, rather than to </span><em data-dcnode-id="7810"><span data-dcnode-id="7811" instrument_node="">V</span></em><sub data-dcnode-id="7808"><span data-dcnode-id="7809" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7807" instrument_node="">, although the large range in </span><em data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">l</span></em><span data-dcnode-id="7804" instrument_node=""> of our sample allows us to independently measure </span><em data-dcnode-id="7802"><span data-dcnode-id="7803" instrument_node="">V</span></em><sub data-dcnode-id="7800"><span data-dcnode-id="7801" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7799" instrument_node="">. Additional benefits of using the intermediate-age to old stellar population to trace the dynamics of the disk are that these populations are much less sensitive to non-axisymmetric streaming motions than cold gas, and that the large asymmetric drift can be used to constrain the component of Galactic rotation that possesses a uniform angular speed.</span></p><p data-dcnode-id="7742"><span data-dcnode-id="7797" instrument_node="">Using a data set of 3365 stars at </span><em data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">b</span></em><span data-dcnode-id="7794" instrument_node=""> = 0° along 14 lines of sight covering 30° ⩽ </span><em data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">l</span></em><span data-dcnode-id="7791" instrument_node=""> ⩽ 210°, we find that the Milky Way's rotation curve is approximately flat over 4 kpc &lt; </span><em data-dcnode-id="7789"><span data-dcnode-id="7790" instrument_node="">R</span></em><span data-dcnode-id="7788" instrument_node=""> &lt; 14 kpc, with </span><em data-dcnode-id="7784"><span data-dcnode-id="7787" instrument_node="">V</span><sub data-dcnode-id="7785"><span data-dcnode-id="7786" instrument_node="">c</span></sub></em><span data-dcnode-id="7783" instrument_node="">(</span><em data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">R</span></em><sub data-dcnode-id="7779"><span data-dcnode-id="7780" instrument_node="">0</span></sub><span data-dcnode-id="7778" instrument_node="">) = 218 ± 6 km s</span><sup data-dcnode-id="7776"><span data-dcnode-id="7777" instrument_node="">−1</span></sup><span data-dcnode-id="7775" instrument_node="">. A value of </span><em data-dcnode-id="7771"><span data-dcnode-id="7774" instrument_node="">V</span><sub data-dcnode-id="7772"><span data-dcnode-id="7773" instrument_node="">c</span></sub></em><span data-dcnode-id="7770" instrument_node=""> &gt; 235 km s</span><sup data-dcnode-id="7768"><span data-dcnode-id="7769" instrument_node="">−1</span></sup><span data-dcnode-id="7767" instrument_node=""> is ruled out at &gt;99% confidence by our data. Our measurement of </span><em data-dcnode-id="7765"><span data-dcnode-id="7766" instrument_node="">V</span></em><sub data-dcnode-id="7763"><span data-dcnode-id="7764" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="7762" instrument_node=""> = 242</span><sup data-dcnode-id="7760"><span data-dcnode-id="7761" instrument_node="">+10</span></sup><sub data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">− 3</span></sub><span data-dcnode-id="7757" instrument_node=""> km s</span><sup data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">−1</span></sup><span data-dcnode-id="7754" instrument_node=""> agrees with the observed proper motion of Sgr&nbsp;A*, but the Sun's offset from </span><em data-dcnode-id="7750"><span data-dcnode-id="7753" instrument_node="">V</span><sub data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">c</span></sub></em><span data-dcnode-id="7749" instrument_node=""> is larger than the locally measured value (Schönrich et al. </span><a class="cite" data-dcnode-id="7747" href="#apj447278r72" id="fnref-apj447278r72" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7748" instrument_node="">2010</span></a><span data-dcnode-id="7746" instrument_node="">) by 14 ± 3 km s</span><sup data-dcnode-id="7744"><span data-dcnode-id="7745" instrument_node="">−1</span></sup><span data-dcnode-id="7743" instrument_node="">.</span></p><p data-dcnode-id="7676"><span data-dcnode-id="7741" instrument_node="">The outline of this paper is as follows. In Section </span><a class="secref" data-dcnode-id="7739" href="#apj447278s2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7740" instrument_node="">2</span></a><span data-dcnode-id="7738" instrument_node="">, we describe the APOGEE data set. The methodology employed to model the observed kinematics of the kinematically warm tracer population is presented in Section </span><a class="secref" data-dcnode-id="7736" href="#apj447278s3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7737" instrument_node="">3</span></a><span data-dcnode-id="7735" instrument_node="">. We discuss our results in Section </span><a class="secref" data-dcnode-id="7733" href="#apj447278s4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7734" instrument_node="">4</span></a><span data-dcnode-id="7732" instrument_node="">, including a detailed discussion of potential systematics in Section </span><a class="secref" data-dcnode-id="7730" href="#apj447278s4-2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7731" instrument_node="">4.2</span></a><span data-dcnode-id="7729" instrument_node="">. The influence of non-axisymmetric streaming motions on our data is assessed in Section </span><a class="secref" data-dcnode-id="7727" href="#apj447278s5-1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7728" instrument_node="">5.1</span></a><span data-dcnode-id="7726" instrument_node="">. We compare our new measurement of </span><em data-dcnode-id="7722"><span data-dcnode-id="7725" instrument_node="">V</span><sub data-dcnode-id="7723"><span data-dcnode-id="7724" instrument_node="">c</span></sub></em><span data-dcnode-id="7721" instrument_node="">(</span><em data-dcnode-id="7719"><span data-dcnode-id="7720" instrument_node="">R</span></em><span data-dcnode-id="7718" instrument_node="">) with previous determinations in Section </span><a class="secref" data-dcnode-id="7716" href="#apj447278s5-2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7717" instrument_node="">5.2</span></a><span data-dcnode-id="7715" instrument_node="">. In Section </span><a class="secref" data-dcnode-id="7713" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7714" instrument_node="">5.3</span></a><span data-dcnode-id="7712" instrument_node="">, we discuss the implications of our measurement of the Sun's offset from circular motion and, in Section </span><a class="secref" data-dcnode-id="7710" href="#apj447278s5-4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7711" instrument_node="">5.4</span></a><span data-dcnode-id="7709" instrument_node="">, we estimate the mass of the Milky Way implied by our data, as well as other recent data. We conclude in Section </span><a class="secref" data-dcnode-id="7707" href="#apj447278s6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7708" instrument_node="">6</span></a><span data-dcnode-id="7706" instrument_node="">. Appendix&nbsp;</span><a class="secref" data-dcnode-id="7704" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7705" instrument_node="">A</span></a><span data-dcnode-id="7703" instrument_node=""> describes how photometric distances for the stars in our sample are estimated. In Appendix&nbsp;</span><a class="secref" data-dcnode-id="7701" href="#apj447278app2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7702" instrument_node="">B</span></a><span data-dcnode-id="7700" instrument_node="">, we discuss extensive mock-data tests used to test our methodology and to determine the data's sensitivity to </span><em data-dcnode-id="7696"><span data-dcnode-id="7699" instrument_node="">V</span><sub data-dcnode-id="7697"><span data-dcnode-id="7698" instrument_node="">c</span></sub></em><span data-dcnode-id="7695" instrument_node="">(</span><em data-dcnode-id="7693"><span data-dcnode-id="7694" instrument_node="">R</span></em><span data-dcnode-id="7692" instrument_node="">). In what follows we sometimes refer to the circular velocity at the Sun's location </span><em data-dcnode-id="7688"><span data-dcnode-id="7691" instrument_node="">V</span><sub data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">c</span></sub></em><span data-dcnode-id="7687" instrument_node="">(</span><em data-dcnode-id="7685"><span data-dcnode-id="7686" instrument_node="">R</span></em><sub data-dcnode-id="7683"><span data-dcnode-id="7684" instrument_node="">0</span></sub><span data-dcnode-id="7682" instrument_node="">) by the shorthand notation&nbsp;</span><em data-dcnode-id="7678"><span data-dcnode-id="7681" instrument_node="">V</span><sub data-dcnode-id="7679"><span data-dcnode-id="7680" instrument_node="">c</span></sub></em><span data-dcnode-id="7677" instrument_node="">.</span></p></div><span data-dcnode-id="7674" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="7672" id="apj447278s2" name="apj447278s2"><span data-dcnode-id="7673" instrument_node="">2.&nbsp;APOGEE DATA</span></h2><div class="article-text" data-dcnode-id="6930" data-mobile-collapse=""><p data-dcnode-id="7655"><span data-dcnode-id="7671" instrument_node="">The SDSS-III/APOGEE is a near-infrared (NIR; </span><em data-dcnode-id="7669"><span data-dcnode-id="7670" instrument_node="">H</span></em><span data-dcnode-id="7668" instrument_node="">-band; 1.51–1.70 μm), high-resolution (</span><em data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">R</span></em><span data-dcnode-id="7665" instrument_node=""> ≈ 22, 500), spectroscopic survey, targeting primarily red giants in all Galactic environments, with emphasis on the disk and the bulge. The APOGEE instrument (Wilson et al. </span><a class="cite" data-dcnode-id="7663" href="#apj447278r85" id="fnref-apj447278r85" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7664" instrument_node="">2010</span></a><span data-dcnode-id="7662" instrument_node="">; J. Wilson et al. 2012, in preparation) consists of a spectrograph with 300 2'' fibers that reaches a signal-to-noise ratio of 100&nbsp;per&nbsp;pixel (at about Nyquist sampling) at </span><em data-dcnode-id="7660"><span data-dcnode-id="7661" instrument_node="">H</span></em><span data-dcnode-id="7659" instrument_node=""> ⩽ 12.2 in three 1&nbsp;hr visits during bright time on the 2.5&nbsp;m Sloan telescope, at the Apache Point Observatory in Sunspot, NM (Gunn et al. </span><a class="cite" data-dcnode-id="7657" href="#apj447278r43" id="fnref-apj447278r43" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7658" instrument_node="">2006</span></a><span data-dcnode-id="7656" instrument_node="">). A detailed account of the target selection and data reduction pipeline is given in G. Zasowski et al. 2012 (in preparation) and D. Nidever et al. 2012 (in preparation), respectively. Here we summarize the, for our purposes, most important aspects of the target selection and data reduction.</span></p><p data-dcnode-id="7616"><span data-dcnode-id="7654" instrument_node="">Our analysis is based on data from APOGEE's first year of regular survey operations (2011 November 9 to 2012 July 5). We use data from fields centered on </span><em data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">b</span></em><span data-dcnode-id="7651" instrument_node=""> = 0°; APOGEE fields have a radius of 1</span><img align="baseline" alt="fdg" data-dcnode-id="7650" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.images.iop.org/Entities/fdg.gif&amp;raw"><span data-dcnode-id="7649" instrument_node="">5. By only selecting fields with 30° ⩽ </span><em data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">l</span></em><span data-dcnode-id="7646" instrument_node=""> ⩽ 330°, we avoid the bulge region. We resolve multiple visits to the same field by choosing the highest signal-to-noise ratio measurement of the Doppler shift, rather than combining the multiple epochs, because the typical uncertainty in the line-of-sight velocity is well below 1&nbsp;km&nbsp;s</span><sup data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">−1</span></sup><span data-dcnode-id="7643" instrument_node="">. Only primary survey targets are selected, excluding targets flagged as possible cluster members and stars observed as part of any of various special programs. We exclude stars with (</span><em data-dcnode-id="7641"><span data-dcnode-id="7642" instrument_node="">J</span></em><span data-dcnode-id="7640" instrument_node=""> − </span><em data-dcnode-id="7636"><span data-dcnode-id="7639" instrument_node="">K</span><sub data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">s</span></sub></em><span data-dcnode-id="7635" instrument_node="">)</span><sub data-dcnode-id="7633"><span data-dcnode-id="7634" instrument_node="">0</span></sub><span data-dcnode-id="7632" instrument_node=""> &gt; 1.1, as these are problematic for the isochrone model we adopt to marginalize over their distances (see Appendix&nbsp;</span><a class="secref" data-dcnode-id="7630" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7631" instrument_node="">A</span></a><span data-dcnode-id="7629" instrument_node="">). The resulting sample has 3365 stars in 14 different fields with 30° ⩽ </span><em data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">l</span></em><span data-dcnode-id="7626" instrument_node=""> ⩽ 210°. The distribution of the data in extinction-corrected color and magnitude is shown in Figure </span><a data-dcnode-id="7624" href="#apj447278f1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7625" instrument_node="">1</span></a><span data-dcnode-id="7623" instrument_node=""> and the distribution of the stars on the sky is shown in Figure </span><a data-dcnode-id="7621" href="#apj447278f2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7622" instrument_node="">2</span></a><span data-dcnode-id="7620" instrument_node="">. The properties of the sample in the various fields are given in Table </span><a class="tabref" data-dcnode-id="7618" href="#apj447278t1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7619" instrument_node="">1</span></a><span data-dcnode-id="7617" instrument_node="">.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="7582" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f1_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=l89IYRWNi0AFVVXh9CHdil0e7xc%3D" data-toolbar-link="apj447278f1" data-toolbar-title="Figure 1." data-toolbar-type="figure" id="apj447278f1" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id             Download table as:&nbsp;
            </span><span class="btn-multi-block" data-dcnode-id="7201"><a class="btn btn-primary wd-jnl-art-btn-ascii" data-dcnode-id="7204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iopscience.iop.org/0004-637X/759/2/131/suppdata/apj447278t1_ascii.txt%3Fdoi%3D10.1088/0004-637X/759/2/131" target="_blank"><span data-dcnode-id="7205" instrument_node="">ASCII</span></a><a class="btn btn-primary wd-jnl-art-btn-typeset typeset-table-img" data-dcnode-id="7202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278t1_lr.gif%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3Dl%252FB%252BiaeAxzmgg9dYc2MI7DSkLuk%253D" target="_blank"><span data-dcnode-id="7203" instrument_node="">Typeset image</span></a></span></p></div><p data-dcnode-id="7135"><span data-dcnode-id="7198" instrument_node="">Spectroscopic targets are selected from the Two Micron All Sky Survey (2MASS) point-source catalog (Skrutskie et al. </span><a class="cite" data-dcnode-id="7196" href="#apj447278r78" id="fnref-apj447278r78" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7197" instrument_node="">2006</span></a><span data-dcnode-id="7195" instrument_node="">), with the following quality restrictions applied: photometric uncertainties less than 0.1&nbsp;mag in </span><em data-dcnode-id="7193"><span data-dcnode-id="7194" instrument_node="">J</span></em><span data-dcnode-id="7192" instrument_node="">, </span><em data-dcnode-id="7190"><span data-dcnode-id="7191" instrument_node="">H</span></em><span data-dcnode-id="7189" instrument_node="">, and </span><em data-dcnode-id="7185"><span data-dcnode-id="7188" instrument_node="">K</span><sub data-dcnode-id="7186"><span data-dcnode-id="7187" instrument_node="">s</span></sub></em><span data-dcnode-id="7184" instrument_node="">; quality flag "A" or "B" in </span><em data-dcnode-id="7180"><span data-dcnode-id="7183" instrument_node="">JHK</span><sub data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">s</span></sub></em><span data-dcnode-id="7179" instrument_node="">; nearest neighbor more than 6'' away; confusion flag "0" for </span><em data-dcnode-id="7175"><span data-dcnode-id="7178" instrument_node="">JHK</span><sub data-dcnode-id="7176"><span data-dcnode-id="7177" instrument_node="">s</span></sub></em><span data-dcnode-id="7174" instrument_node="">; galaxy contamination flag "0"; read flag "1" or "2" for </span><em data-dcnode-id="7170"><span data-dcnode-id="7173" instrument_node="">JHK</span><sub data-dcnode-id="7171"><span data-dcnode-id="7172" instrument_node="">s</span></sub></em><span data-dcnode-id="7169" instrument_node="">; extkey equal to −1. The extinction corrections for targets in the Galactic midplane use mid-IR photometry from either </span><em data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">WISE</span></em><span data-dcnode-id="7166" instrument_node=""> (Wright et al. </span><a class="cite" data-dcnode-id="7164" href="#apj447278r87" id="fnref-apj447278r87" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7165" instrument_node="">2010</span></a><span data-dcnode-id="7163" instrument_node="">) or </span><em data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">Spitzer</span></em><span data-dcnode-id="7160" instrument_node="">/IRAC GLIMPSE-I (Churchwell et al. </span><a class="cite" data-dcnode-id="7158" href="#apj447278r22" id="fnref-apj447278r22" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7159" instrument_node="">2009</span></a><span data-dcnode-id="7157" instrument_node="">); therefore, both mid-IR detections and mid-IR photometric uncertainties less than 0.1&nbsp;mag are required.</span><sup class="fnref" data-dcnode-id="7154" xmlns:xlink="http://www.w3.org/1999/xlink"><a class="fnref" data-dcnode-id="7155" href="#apj447278fn1"><span data-dcnode-id="7156" instrument_node="">24</span></a></sup><span data-dcnode-id="7153" instrument_node=""> APOGEE's magnitude range—7 ⩽ </span><em data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">H</span></em><span data-dcnode-id="7150" instrument_node=""> &lt; 13.8—is within the completeness limits for both the IRAC and </span><em data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">WISE</span></em><span data-dcnode-id="7147" instrument_node=""> surveys. Photometry for all targets is extinction-corrected using the Rayleigh–Jeans Color Excess method (RJCE; Majewski et al. </span><a class="cite" data-dcnode-id="7145" href="#apj447278r63" id="fnref-apj447278r63" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7146" instrument_node="">2011</span></a><span data-dcnode-id="7144" instrument_node="">), which provides extinction values </span><em data-dcnode-id="7140"><span data-dcnode-id="7143" instrument_node="">A</span><sub data-dcnode-id="7141"><span data-dcnode-id="7142" instrument_node="">K</span></sub></em><span data-dcnode-id="7139" instrument_node=""> with typical random uncertainties ≲ 0.05&nbsp;mag for individual stars using a combination of near- and mid-IR photometry. Variations in the adopted extinction law among different lines of sight can lead to differences of up to 7% (Zasowski et al. </span><a class="cite" data-dcnode-id="7137" href="#apj447278r89" id="fnref-apj447278r89" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7138" instrument_node="">2009</span></a><span data-dcnode-id="7136" instrument_node="">).</span></p><p data-dcnode-id="7079"><span data-dcnode-id="7134" instrument_node="">The color range that we select, 0.5 ⩽ (</span><em data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">J</span></em><span data-dcnode-id="7131" instrument_node=""> − </span><em data-dcnode-id="7127"><span data-dcnode-id="7130" instrument_node="">K</span><sub data-dcnode-id="7128"><span data-dcnode-id="7129" instrument_node="">s</span></sub></em><span data-dcnode-id="7126" instrument_node="">)</span><sub data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">0</span></sub><span data-dcnode-id="7123" instrument_node=""> ⩽ 1.1, includes the red clump ((</span><em data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">J</span></em><span data-dcnode-id="7120" instrument_node=""> − </span><em data-dcnode-id="7116"><span data-dcnode-id="7119" instrument_node="">K</span><sub data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">s</span></sub></em><span data-dcnode-id="7115" instrument_node="">)</span><sub data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">0</span></sub><span data-dcnode-id="7112" instrument_node=""> = 0.5–0.7) and the red giant branch, for all metallicities. Dwarf contamination is most severe at (</span><em data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">J</span></em><span data-dcnode-id="7109" instrument_node=""> − </span><em data-dcnode-id="7105"><span data-dcnode-id="7108" instrument_node="">K</span><sub data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">s</span></sub></em><span data-dcnode-id="7104" instrument_node="">)</span><sub data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">0</span></sub><span data-dcnode-id="7101" instrument_node=""> &lt; 0.8, with most redder dwarfs being faint M and brown dwarfs. Most APOGEE observations consist of three or more individual "visits," with only three visits for stars with 7&nbsp;⩽</span><em data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">H</span></em><span data-dcnode-id="7098" instrument_node=""> &lt; 12.2, and six visits for 12.2 ⩽ </span><em data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">H</span></em><span data-dcnode-id="7095" instrument_node=""> &lt; 12.8. About 10% of our sample consists of even more visits for stars with 12.8 ⩽ </span><em data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">H</span></em><span data-dcnode-id="7092" instrument_node=""> &lt; 13.8. The APOGEE sampling is random in color, and a combination of random and systematic in apparent magnitude (selecting every </span><em data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">N</span></em><span data-dcnode-id="7089" instrument_node="">th star in a magnitude-ordered list for each field); details of the selection function are unimportant for our purposes and it suffices to note that the spectroscopic sample is a representative sample of the underlying (non-extinction-corrected) magnitude distribution. At </span><em data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">H</span></em><span data-dcnode-id="7086" instrument_node=""> &lt; 11, dwarf contamination in the APOGEE fields is expected to be less than 10% based on population-synthesis models (Girardi et al. </span><a class="cite" data-dcnode-id="7084" href="#apj447278r40" id="fnref-apj447278r40" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7085" instrument_node="">2005</span></a><span data-dcnode-id="7083" instrument_node="">) in the APOGEE fields (L. Girardi 2012, in preparation). Models predict that this contamination increases to about 20% at 11 &lt; </span><em data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">H</span></em><span data-dcnode-id="7080" instrument_node=""> &lt; 12. We explicitly include dwarf contamination as a free parameter in the analysis below.</span></p><p data-dcnode-id="7049"><span data-dcnode-id="7078" instrument_node="">Line-of-sight velocities are determined for each individual visit by cross-correlating against a set of ≈100 synthetic template spectra that sparsely cover the stellar-parameter range 3500&nbsp;K &lt;</span><em data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">T</span></em><sub data-dcnode-id="7074"><span data-dcnode-id="7075" instrument_node="">eff</span></sub><span data-dcnode-id="7073" instrument_node=""> &lt; 25, 000&nbsp;K in effective temperature, </span><em data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">T</span></em><sub data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">eff</span></sub><span data-dcnode-id="7068" instrument_node="">, −2 &lt; [Fe/H] &lt; 0.3 in metallicity, [Fe/H], and 2 &lt; log </span><em data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">g</span></em><span data-dcnode-id="7065" instrument_node=""> &lt; 5 in surface gravity, log </span><em data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">g</span></em><span data-dcnode-id="7062" instrument_node=""> (see D. Nidever et al. 2012, in preparation, for details on the exact procedure). The distribution of rms scatter in the measured line-of-sight velocity for stars with multiple observations peaks around 0.1 km s</span><sup data-dcnode-id="7060"><span data-dcnode-id="7061" instrument_node="">−1</span></sup><span data-dcnode-id="7059" instrument_node="">. Tests of field-to-field variations indicate that the zero point of the velocity scale is stable at the 0.05 km s</span><sup data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">−1</span></sup><span data-dcnode-id="7056" instrument_node=""> level. A preliminary comparison between the APOGEE-measured and literature line-of-sight velocity of 53 stars in M3, M13, and M15 shows that the APOGEE zero-point accuracy is ≈0.26 ± 0.20 km s</span><sup data-dcnode-id="7054"><span data-dcnode-id="7055" instrument_node="">−1</span></sup><span data-dcnode-id="7053" instrument_node=""> (see D. Nidever et al. 2012, in preparation for full details). In what follows we ignore the uncertainties on the line-of-sight velocities entirely (that is, we assume that they are zero) because the uncertainties are much smaller than any velocity difference that we could hope to measure with our sample of ≈3000 stars having a typical dispersion of ≈35 km s</span><sup data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">−1</span></sup><span data-dcnode-id="7050" instrument_node="">.</span></p><p data-dcnode-id="7032"><span data-dcnode-id="7048" instrument_node="">Repeated visits to the same star will eventually allow binary stars to be flagged as such based on the variability of their line-of-sight velocities. However, currently multiple visits are not available for all 14 APOGEE fields that we employ here, and removing fields without multiple visits would significantly reduce the longitudinal coverage of our sample. Using the stars in our sample that have multiple visits, we find that ∼4 % of stars show velocity variability at the 10–70 km s</span><sup data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">−1</span></sup><span data-dcnode-id="7045" instrument_node=""> level—the level at which they could be confused with the dispersion of a disk population. Binary contamination would spuriously increase the inferred velocity dispersion and therefore likely decrease the inferred circular velocity, due to the dispersion dependence of the asymmetric-drift correction used below. However, as discussed below, the asymmetric drift for our sample is ≲ 6 km s</span><sup data-dcnode-id="7043"><span data-dcnode-id="7044" instrument_node="">−1</span></sup><span data-dcnode-id="7042" instrument_node=""> at </span><em data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">R</span></em><span data-dcnode-id="7039" instrument_node=""> &lt; 10 kpc, such that the effect of binary contamination on the velocity dispersion is ≪1 km s</span><sup data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">−1</span></sup><span data-dcnode-id="7036" instrument_node="">. Therefore, we do not remove binaries from our sample, but we discuss the results obtained when removing them in Section </span><a class="secref" data-dcnode-id="7034" href="#apj447278s4-2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7035" instrument_node="">4.2</span></a><span data-dcnode-id="7033" instrument_node="">.</span></p><p data-dcnode-id="7007"><span data-dcnode-id="7031" instrument_node="">Stellar parameters and elemental abundances are determined by the APOGEE Stellar Parameters and Chemical Abundances Pipeline (ASPCAP; A. E. García Pérez et al. 2013, in preparation). After determining the spectral type, each star's microturbulence, </span><em data-dcnode-id="7029"><span data-dcnode-id="7030" instrument_node="">T</span></em><sub data-dcnode-id="7027"><span data-dcnode-id="7028" instrument_node="">eff</span></sub><span data-dcnode-id="7026" instrument_node="">, [Fe/H], log </span><em data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">g</span></em><span data-dcnode-id="7023" instrument_node="">, [α/Fe], [C/Fe], and [N/Fe] are determined through χ</span><sup data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">2</span></sup><span data-dcnode-id="7020" instrument_node=""> minimization of the difference between the observed and synthetic spectra derived from ATLAS9 model-atmosphere grids (Kurucz </span><a class="cite" data-dcnode-id="7018" href="#apj447278r57" id="fnref-apj447278r57" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7019" instrument_node="">1979</span></a><span data-dcnode-id="7017" instrument_node=""> and more recent updates). We only use [Fe/H] in our analysis below, and in particular, we do </span><em data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node="">not</span></em><span data-dcnode-id="7014" instrument_node=""> make use of log </span><em data-dcnode-id="7012"><span data-dcnode-id="7013" instrument_node="">g</span></em><span data-dcnode-id="7011" instrument_node=""> for the purpose of selecting giants, because the measurement of log </span><em data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">g</span></em><span data-dcnode-id="7008" instrument_node=""> has not been finalized yet within ASPCAP. Preliminary comparisons with standard stars and globular clusters indicate that the metallicities are currently accurate, to a precision of ∼0.1 dex at [Fe/H] &gt; −1. All but 21 of the disk stars in our sample described below have higher metallicities than this, and all but 160 have [Fe/H] &gt; −0.5.</span></p><p data-dcnode-id="6996"><span data-dcnode-id="7006" instrument_node="">Because many stars in our sample are on the red giant branch, and hence do not follow narrow magnitude–color relations like dwarfs and red clump stars, estimating precise distances to these stars is difficult. In what follows, we avoid estimating distances to the individual stars in our sample by marginalizing a kinematical model over the distance to the star. This marginalization is performed by integrating over the full photometric-distance probability distribution function (PDF) for each individual star, obtained from models for the stellar isochrones and initial mass function (IMF) of the giant stars in the sample, as well as a prior that the stars are in an exponential disk with a scale length of 3&nbsp;kpc (Bovy et al. </span><a class="cite" data-dcnode-id="7004" href="#apj447278r15" id="fnref-apj447278r15" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7005" instrument_node="">2012c</span></a><span data-dcnode-id="7003" instrument_node="">). This technique is discussed in detail in Appendix&nbsp;</span><a class="secref" data-dcnode-id="7001" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="7002" instrument_node="">A</span></a><span data-dcnode-id="7000" instrument_node="">. For dwarf stars, we assume that they are close enough that their distances are irrelevant for their kinematics. As such, we cannot show the spatial distribution of the stars in our sample. As an alternative, we show in Figure </span><a data-dcnode-id="6998" href="#apj447278f3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6999" instrument_node="">3</span></a><span data-dcnode-id="6997" instrument_node=""> the sum of all of the photometric-distance distributions for stars in our sample (assuming that they are all giants).</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="6931" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f3_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=HMxn5B0SFouSkVLa3dVxlAZWXr0%3D" data-toolbar-link="apj447278f3" data-toolbar-title="Figure 3." data-toolbar-type="figure" id="apj447278f3" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="6932"><div class="panzoom-container" data-dcnode-id="6982"><div class="panzoom-parent" data-dcnode-id="6994" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 3." class="panzoom" data-dcnode-id="6995" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f3_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=HMxn5B0SFouSkVLa3dVxlAZWXr0%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw" style="transform: scale(1) translate(0px, 0px); backface-visibility: hidden; transform-origin: 50% 50%; cursor: move; transition: none 0s ease 0s; user-select: none; touch-action: none;"></div><div class="buttons zoom-tools" data-dcnode-id="6983"><button class="zoom-in" data-dcnode-id="6991"><span class="icon-zoomin" data-dcnode-id="6993"></span><span data-dcnode-id="6992" instrument_node="">

	                     Reset image size
					</span></button></span></div></div><figcaption data-dcnode-id="6933"><div class="article-text figure-caption" data-dcnode-id="6943"><p data-dcnode-id="6944"><strong data-dcnode-id="6980"><span data-dcnode-id="6981" instrument_node="">Figure 3.</span></strong><span data-dcnode-id="6979" instrument_node="">&nbsp;Sum of all photometric-distance distributions </span><em data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">p</span></em><span data-dcnode-id="6976" instrument_node="">(</span><em data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">d</span></em><span data-dcnode-id="6973" instrument_node="">|</span><em data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">l</span></em><span data-dcnode-id="6970" instrument_node="">, </span><em data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">b</span></em><span data-dcnode-id="6967" instrument_node="">, (</span><em data-dcnode-id="6965"><span data-dcnode-id="6966" instrument_node="">J</span></em><span data-dcnode-id="6964" instrument_node=""> − </span><em data-dcnode-id="6960"><span data-dcnode-id="6963" instrument_node="">K</span><sub data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">s</span></sub></em><span data-dcnode-id="6959" instrument_node="">)</span><sub data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">0</span></sub><span data-dcnode-id="6956" instrument_node="">, </span><em data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">H</span></em><sub data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">0</span></sub><span data-dcnode-id="6951" instrument_node="">, [Fe/H], DF, iso) for stars in our sample, viewed from the north Galactic pole, with the Sun at azimuth 0°. These photometric-distance distributions are used in Equation (</span><a class="eqnref" data-dcnode-id="6949" href="#apj447278fd1"><span data-dcnode-id="6950" instrument_node="">1</span></a><span data-dcnode-id="6948" instrument_node="">) to marginalize over the distance to each individual star. We emphasize that this is </span><em data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">not</span></em><span data-dcnode-id="6945" instrument_node=""> the underlying distance distribution of our sample, as individual distances are poorly constrained for the giants in our sample. The 14 fields that we use are indicated by dashed white lines.</span></p></div><p class="mb-05 print-hide" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="6934"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f3_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DHMxn5B0SFouSkVLa3dVxlAZWXr0%253D" id="wd-jnl-art-btn-std-img-apj447278f3"><span class="icon-image" data-dcnode-id="6940"></span><span data-dcnode-id="6939" instrument_node=""> Standard image
