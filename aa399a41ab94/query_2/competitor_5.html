					</span></a></span></figcaption></figure></figure><p data-dcnode-id="4645"><span data-dcnode-id="4677" instrument_node="">We also determine the full planar phase-space position of the Sun in the Galactocentric reference frame. The current APOGEE data are relatively insensitive to the value of </span><em data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">R</span></em><sub data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">0</span></sub><span data-dcnode-id="4672" instrument_node="">. The 68% interval for </span><em data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">R</span></em><sub data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">0</span></sub><span data-dcnode-id="4667" instrument_node=""> for both the flat-rotation-curve and power-law fits is about 8 kpc &lt; </span><em data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">R</span></em><sub data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">0</span></sub><span data-dcnode-id="4662" instrument_node=""> &lt; 9 kpc, which is similar to that found for the mock data in Appendix&nbsp;</span><a class="secref" data-dcnode-id="4660" href="#apj447278app2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4661" instrument_node="">B</span></a><span data-dcnode-id="4659" instrument_node="">. The best-fit value is at the lower end of this range: 8.1 kpc when assuming a flat rotation curve, and 8 kpc for the power-law rotation-curve fit. The fully marginalized PDF for </span><em data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">R</span></em><sub data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">0</span></sub><span data-dcnode-id="4654" instrument_node=""> in the top left panel of Figure </span><a data-dcnode-id="4652" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4653" instrument_node="">5</span></a><span data-dcnode-id="4651" instrument_node=""> is almost entirely flat between 8.0 kpc &lt; </span><em data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">R</span></em><sub data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">0</span></sub><span data-dcnode-id="4646" instrument_node=""> &lt; 9.3 kpc.</span></p><p data-dcnode-id="4519"><span data-dcnode-id="4644" instrument_node="">The Galactocentric motion of the Sun is approximately </span><em data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">V</span></em><sub data-dcnode-id="4638"><em data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">R</span></em><span data-dcnode-id="4639" instrument_node="">, ☉</span></sub><span data-dcnode-id="4637" instrument_node=""> = −10.5 ± 1.0 km s</span><sup data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">−1</span></sup><span data-dcnode-id="4634" instrument_node="">, and </span><em data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">V</span></em><sub data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4629" instrument_node=""> = 242</span><sup data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">+10</span></sup><sub data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">− 3</span></sub><span data-dcnode-id="4624" instrument_node=""> km s</span><sup data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">−1</span></sup><span data-dcnode-id="4621" instrument_node=""> (in the case of a flat rotation curve) or </span><em data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">V</span></em><sub data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4616" instrument_node=""> = 242</span><sup data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">+5</span></sup><sub data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">− 17</span></sub><span data-dcnode-id="4611" instrument_node=""> km s</span><sup data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">−1</span></sup><span data-dcnode-id="4608" instrument_node=""> (for a power-law fit to the rotation curve). In the latter fit, there is a strong correlation between </span><em data-dcnode-id="4604"><span data-dcnode-id="4607" instrument_node="">V</span><sub data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">c</span></sub></em><span data-dcnode-id="4603" instrument_node=""> and </span><em data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">V</span></em><sub data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4598" instrument_node="">; the difference between the two is much better constrained: </span><em data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">V</span></em><sub data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4593" instrument_node=""> − </span><em data-dcnode-id="4589"><span data-dcnode-id="4592" instrument_node="">V</span><sub data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">c</span></sub></em><span data-dcnode-id="4588" instrument_node=""> = 23.1</span><sup data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">+3.6</span></sup><sub data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">− 0.5</span></sub><span data-dcnode-id="4583" instrument_node=""> km s</span><sup data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">−1</span></sup><span data-dcnode-id="4580" instrument_node="">. The marginalized PDF for </span><em data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">V</span></em><sub data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4575" instrument_node=""> − </span><em data-dcnode-id="4571"><span data-dcnode-id="4574" instrument_node="">V</span><sub data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">c</span></sub></em><span data-dcnode-id="4570" instrument_node=""> in Figure </span><a data-dcnode-id="4568" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4569" instrument_node="">5</span></a><span data-dcnode-id="4567" instrument_node=""> is well described by </span><em data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">V</span></em><sub data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4562" instrument_node=""> − </span><em data-dcnode-id="4558"><span data-dcnode-id="4561" instrument_node="">V</span><sub data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">c</span></sub></em><span data-dcnode-id="4557" instrument_node=""> = 26 ± 3 km s</span><sup data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">−1</span></sup><span data-dcnode-id="4554" instrument_node="">. We discuss the consequences of this solar motion in detail in Section </span><a class="secref" data-dcnode-id="4552" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4553" instrument_node="">5.3</span></a><span data-dcnode-id="4551" instrument_node="">, but we note here that the estimate of the angular motion of the Galactic center that we obtain from combining our fits for </span><em data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">V</span></em><sub data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="4546" instrument_node=""> and </span><em data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">R</span></em><sub data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">0</span></sub><span data-dcnode-id="4541" instrument_node=""> is consistent with the proper motion of Sgr&nbsp;A* as measured by Reid &amp; Brunthaler (</span><a class="cite" data-dcnode-id="4539" href="#apj447278r69" id="fnref-apj447278r69" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4540" instrument_node="">2004</span></a><span data-dcnode-id="4538" instrument_node="">): our estimate is </span><span class="inline-eqn" data-dcnode-id="4532" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="4533"><span class="texImage" data-dcnode-id="4536"><img align="top" alt="$\mu _{\mathrm{Sgr\ A}^*} = 6.3^{+0.1}_{-0.7}\,\mathrm{mas\ yr}^{-1}$" data-dcnode-id="4537" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn8.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=3GQepqGj7lJOfdlCweaMo6vQbzw%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="4531" instrument_node="">, compared to the direct measurement of 6.379 ± 0.024 mas yr</span><sup data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">−1</span></sup><span data-dcnode-id="4528" instrument_node="">. We discuss the apparent discrepancy between our agreement with the proper motion of Sgr&nbsp;A* and our low value for </span><em data-dcnode-id="4524"><span data-dcnode-id="4527" instrument_node="">V</span><sub data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">c</span></sub></em><span data-dcnode-id="4523" instrument_node=""> in Section </span><a class="secref" data-dcnode-id="4521" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4522" instrument_node="">5.3</span></a><span data-dcnode-id="4520" instrument_node="">.</span></p><p data-dcnode-id="4397"><span data-dcnode-id="4518" instrument_node="">The final block of parameters in Table </span><a class="tabref" data-dcnode-id="4516" href="#apj447278t2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4517" instrument_node="">2</span></a><span data-dcnode-id="4515" instrument_node=""> describes the tracer population. The velocity dispersion that we infer for the tracer stars is close to that expected for an old disk population: σ</span><sub data-dcnode-id="4512"><em data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">R</span></em></sub><span data-dcnode-id="4511" instrument_node="">(</span><em data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">R</span></em><sub data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">0</span></sub><span data-dcnode-id="4506" instrument_node="">) ≈ 32.0</span><sup data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">+0.5</span></sup><sub data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">− 3</span></sub><span data-dcnode-id="4501" instrument_node=""> km s</span><sup data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">−1</span></sup><span data-dcnode-id="4498" instrument_node=""> for the flat-rotation-curve and power-law fits. The ratio of the tangential-to-radial-velocity dispersions squared is 0.69 &lt; </span><em data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">X</span></em><sup data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">2</span></sup><span data-dcnode-id="4493" instrument_node=""> &lt; 1.0, with the best-fit value at the lower end of this range. This value is higher than expected from the epicycle approximation for a flat or falling rotation curve, which is </span><em data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">X</span></em><sup data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">2</span></sup><span data-dcnode-id="4488" instrument_node=""> ⩽ 0.5. However, this expectation holds only for a cold disk, and corrections due to the temperature of the old disk population always increase </span><em data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">X</span></em><sup data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">2</span></sup><span data-dcnode-id="4483" instrument_node=""> near </span><em data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">R</span></em><sub data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">0</span></sub><span data-dcnode-id="4478" instrument_node=""> (Kuijken &amp; Tremaine </span><a class="cite" data-dcnode-id="4476" href="#apj447278r55" id="fnref-apj447278r55" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4477" instrument_node="">1991</span></a><span data-dcnode-id="4475" instrument_node="">): the Dehnen disk DFs of Equation (</span><a class="eqnref" data-dcnode-id="4473" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4474" instrument_node="">6</span></a><span data-dcnode-id="4472" instrument_node="">) have </span><em data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">X</span></em><sup data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">2</span></sup><span data-dcnode-id="4467" instrument_node=""> that varies spatially, and reaches approximately 0.65 near </span><em data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">R</span></em><sub data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">0</span></sub><span data-dcnode-id="4462" instrument_node=""> (Dehnen </span><a class="cite" data-dcnode-id="4460" href="#apj447278r25" id="fnref-apj447278r25" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4461" instrument_node="">1999</span></a><span data-dcnode-id="4459" instrument_node="">). The best-fit value for </span><em data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">R</span></em><sub data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">0</span></sub><span data-dcnode-id="4454" instrument_node="">/</span><em data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">h</span></em><sub data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">σ</span></sub><span data-dcnode-id="4449" instrument_node=""> is approximately zero, with non-zero positive values ruled out by the data: the 68% interval is −0.24 &lt; </span><em data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">R</span></em><sub data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">0</span></sub><span data-dcnode-id="4444" instrument_node="">/</span><em data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">h</span></em><sub data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">σ</span></sub><span data-dcnode-id="4439" instrument_node=""> &lt; 0.03. Thus, the radial-velocity dispersion does not drop exponentially with radius with a scale length between 2 </span><em data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">R</span></em><sub data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">0</span></sub><span data-dcnode-id="4434" instrument_node="">/3 and </span><em data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">R</span></em><sub data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">0</span></sub><span data-dcnode-id="4429" instrument_node="">; such a drop would be expected from previous measurements of the radial dispersion as a function of </span><em data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">R</span></em><span data-dcnode-id="4426" instrument_node=""> (Lewis &amp; Freeman </span><a class="cite" data-dcnode-id="4424" href="#apj447278r60" id="fnref-apj447278r60" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4425" instrument_node="">1989</span></a><span data-dcnode-id="4423" instrument_node="">), or from the observed exponential decline of the vertical velocity dispersion (Bovy et al. </span><a class="cite" data-dcnode-id="4421" href="#apj447278r14" id="fnref-apj447278r14" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4422" instrument_node="">2012b</span></a><span data-dcnode-id="4420" instrument_node="">) combined with the assumption of constant σ</span><sub data-dcnode-id="4417"><em data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">z</span></em></sub><span data-dcnode-id="4416" instrument_node="">/σ</span><sub data-dcnode-id="4413"><em data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">R</span></em></sub><span data-dcnode-id="4412" instrument_node="">. We have attempted fits with two populations of stars with different radial scale lengths (3 kpc and 5 or 6 kpc) and radial-velocity dispersions, but the same radial-dispersion scale length. The best-fit </span><em data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">R</span></em><sub data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">0</span></sub><span data-dcnode-id="4407" instrument_node="">/</span><em data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">h</span></em><sub data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">σ</span></sub><span data-dcnode-id="4402" instrument_node=""> remains zero, such that it does not seem that we are seeing a mix of multiple populations that conspire to form a flat σ</span><sub data-dcnode-id="4399"><em data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">R</span></em></sub><span data-dcnode-id="4398" instrument_node=""> profile.</span></p><p data-dcnode-id="4376"><span data-dcnode-id="4396" instrument_node="">Even with the best-fit flat radial-dispersion profile, the disk is stable over most of the range in </span><em data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">R</span></em><span data-dcnode-id="4393" instrument_node=""> considered here. The Toomre </span><em data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Q</span></em><span data-dcnode-id="4390" instrument_node=""> parameter—</span><em data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Q</span></em><span data-dcnode-id="4387" instrument_node=""> = σ</span><sub data-dcnode-id="4384"><em data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">R</span></em></sub><span data-dcnode-id="4383" instrument_node=""> κ/(3.36</span><em data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">G</span></em><span data-dcnode-id="4380" instrument_node="">Σ) (Toomre </span><a class="cite" data-dcnode-id="4378" href="#apj447278r80" id="fnref-apj447278r80" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4379" instrument_node="">1964</span></a><span data-dcnode-id="4377" instrument_node="">)—for a flat rotation curve is
</span></p><div class="display-eqn" data-dcnode-id="4370" id="apj447278fd9" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="4371"><span class="texImage" data-dcnode-id="4374"><img alt="Equation (9)" data-dcnode-id="4375" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd9.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=jcwY%2FB6L%2F88dfMzh8Or9N7wtZak%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="4265"><span data-dcnode-id="4369" instrument_node="">This expression has </span><em data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">Q</span></em><span data-dcnode-id="4366" instrument_node=""> &gt; 1 down to 4.9 kpc and </span><em data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Q</span></em><span data-dcnode-id="4363" instrument_node=""> = 0.91 at </span><em data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">R</span></em><span data-dcnode-id="4360" instrument_node=""> = 4 kpc for a constant σ</span><sub data-dcnode-id="4357"><em data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">R</span></em></sub><span data-dcnode-id="4356" instrument_node="">(</span><em data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">R</span></em><span data-dcnode-id="4353" instrument_node="">) and a surface density Σ∝</span><em data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">e</span></em><sup data-dcnode-id="4346"><span data-dcnode-id="4350" instrument_node="">−</span><em data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">R</span></em><span data-dcnode-id="4347" instrument_node="">/(3 kpc)</span></sup><span data-dcnode-id="4345" instrument_node="">. Although the disk is marginally unstable in our best-fit model, this conclusion depends strongly on the assumed radial scale length: for </span><em data-dcnode-id="4341"><span data-dcnode-id="4344" instrument_node="">h</span><sub data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">R</span></sub></em><span data-dcnode-id="4340" instrument_node=""> = 3.25 kpc, </span><em data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">Q</span></em><span data-dcnode-id="4337" instrument_node=""> &gt; 1 everywhere at </span><em data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">R</span></em><span data-dcnode-id="4334" instrument_node=""> &gt; 4 kpc. The flatness of the inferred σ</span><sub data-dcnode-id="4331"><em data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">R</span></em></sub><span data-dcnode-id="4330" instrument_node=""> profile also depends on the assumed constancy of </span><em data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">X</span></em><sup data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">2</span></sup><span data-dcnode-id="4325" instrument_node="">. Actual equilibrium axisymmetric disks, such as those having a Dehnen DF (Equation (</span><a class="eqnref" data-dcnode-id="4323" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4324" instrument_node="">6</span></a><span data-dcnode-id="4322" instrument_node="">)), have a radially dependent </span><em data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">X</span></em><sup data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">2</span></sup><span data-dcnode-id="4317" instrument_node="">, with </span><em data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">X</span></em><sup data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">2</span></sup><span data-dcnode-id="4312" instrument_node=""> at </span><em data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">R</span></em><span data-dcnode-id="4309" instrument_node=""> = 4 kpc typically smaller than at </span><em data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">R</span></em><span data-dcnode-id="4306" instrument_node=""> = 8–16 kpc (Dehnen </span><a class="cite" data-dcnode-id="4304" href="#apj447278r25" id="fnref-apj447278r25" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4305" instrument_node="">1999</span></a><span data-dcnode-id="4303" instrument_node="">, Figure 4). At </span><em data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">R</span></em><span data-dcnode-id="4300" instrument_node=""> = 4 kpc, which for the present data sample is only reached for the </span><em data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">l</span></em><span data-dcnode-id="4297" instrument_node=""> = 30° line of sight, the line-of-sight velocity is entirely composed of the tangential-velocity component, such that any decrease in </span><em data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">X</span></em><sup data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">2</span></sup><span data-dcnode-id="4292" instrument_node=""> leads to an </span><em data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">increase</span></em><span data-dcnode-id="4289" instrument_node=""> in σ</span><sub data-dcnode-id="4286"><em data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">R</span></em></sub><span data-dcnode-id="4285" instrument_node=""> to sustain the same σ</span><sub data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">ϕ</span></sub><span data-dcnode-id="4282" instrument_node="">. Therefore, the true σ</span><sub data-dcnode-id="4279"><em data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">R</span></em></sub><span data-dcnode-id="4278" instrument_node="">(</span><em data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">R</span></em><span data-dcnode-id="4275" instrument_node="">) profile presumably </span><em data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">is</span></em><span data-dcnode-id="4272" instrument_node=""> falling with </span><em data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">R</span></em><span data-dcnode-id="4269" instrument_node="">, and the entire disk at </span><em data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">R</span></em><span data-dcnode-id="4266" instrument_node=""> &gt; 4 kpc should be stable in our model.</span></p><p data-dcnode-id="4247"><span data-dcnode-id="4264" instrument_node="">Full PDFs for all of the parameters of the basic models discussed in this section are given in Figure </span><a data-dcnode-id="4262" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4263" instrument_node="">5</span></a><span data-dcnode-id="4261" instrument_node="">. It is clear that with the exception of </span><em data-dcnode-id="4257"><span data-dcnode-id="4260" instrument_node="">V</span><sub data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">c</span></sub></em><span data-dcnode-id="4256" instrument_node=""> and the derivative of the rotation curve—β in the power-law model and </span><em data-dcnode-id="4252"><span data-dcnode-id="4255" instrument_node="">dV</span><sub data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">c</span></sub></em><span data-dcnode-id="4251" instrument_node="">/</span><em data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">dR</span></em><span data-dcnode-id="4248" instrument_node=""> in the linear model—there are no strong degeneracies among the parameters. Also included in this figure are the results from fitting all but one of the 14 APOGEE field for each field: these leave-one-out results show that no single field drives the analysis for any of the parameters.</span></p><p data-dcnode-id="4212"><span data-dcnode-id="4246" instrument_node="">We compare the best-fit flat-rotation-curve model with the data in Figures </span><a data-dcnode-id="4244" href="#apj447278f7" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4245" instrument_node="">7</span></a><span data-dcnode-id="4243" instrument_node=""> and&nbsp;</span><a data-dcnode-id="4241" href="#apj447278f8" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4242" instrument_node="">8</span></a><span data-dcnode-id="4240" instrument_node="">. Figure </span><a data-dcnode-id="4238" href="#apj447278f7" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4239" instrument_node="">7</span></a><span data-dcnode-id="4237" instrument_node=""> shows the raw heliocentric velocities versus Galactic longitude for all of the stars in the sample, as well as the mean for each field, and the prediction for the mean from the best-fit model. This "model mean" is computed by constructing the predicted line-of-sight velocity distribution using Equation (</span><a class="eqnref" data-dcnode-id="4235" href="#apj447278fd2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4236" instrument_node="">2</span></a><span data-dcnode-id="4234" instrument_node="">) and then calculating its mean. The full predicted line-of-sight velocity distribution for each field is shown in Figure </span><a data-dcnode-id="4232" href="#apj447278f8" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4233" instrument_node="">8</span></a><span data-dcnode-id="4231" instrument_node=""> as the smooth curve, which is to be compared with the histogrammed data points for each field. It is clear from Figure </span><a data-dcnode-id="4229" href="#apj447278f8" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4230" instrument_node="">8</span></a><span data-dcnode-id="4228" instrument_node=""> that the fits capture the overall smooth features of the distribution of line-of-sight velocities in each field, including any asymmetry in the distribution. However, it is also obvious that some of the model predictions are shifted from the observed histograms. This effect also appears in the comparison between the data mean and model mean for each field in the lower panel of Figure </span><a data-dcnode-id="4226" href="#apj447278f7" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4227" instrument_node="">7</span></a><span data-dcnode-id="4225" instrument_node="">. There appears to be a distinct pattern in these residuals. Thus, </span><em data-dcnode-id="4220"><span data-dcnode-id="4224" instrument_node="">the best-fit axisymmetric model fails to account for ≈10 km s</span><sup data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">−1</span></sup><span data-dcnode-id="4221" instrument_node=""> smooth deviations in the velocity field</span></em><span data-dcnode-id="4219" instrument_node="">. These deviations are likely due to non-axisymmetric streaming motions, which are expected at this level of accuracy; we discuss this further in Section </span><a class="secref" data-dcnode-id="4217" href="#apj447278s5-3" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4218" instrument_node="">5.3</span></a><span data-dcnode-id="4216" instrument_node="">. With the exception of the </span><em data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">l</span></em><span data-dcnode-id="4213" instrument_node=""> = 60° field, the data seem to follow the smooth velocity distribution quite well, albeit somewhat shifted on average.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="4161" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f7_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=wGeHQ6CpU4MKPOCdXDzq%2Bvlk%2Fec%3D" data-toolbar-link="apj447278f7" data-toolbar-title="F span><span data-dcnode-id="4181" instrument_node="">. Note that the residual for the </span><em data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">l</span></em><span data-dcnode-id="4178" instrument_node=""> = 60° field in the bottom panel is missing as it is larger than 15 km s</span><sup data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">−1</span></sup><span data-dcnode-id="4175" instrument_node="">.</span></p></div><p class="mb-05 print-hide" data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="4164"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f7_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DwGeHQ6CpU4MKPOCdXDzq%252Bvlk%252Fec%253D" id="wd-jnl-art-btn-std-img-apj447278f7"><span class="icon-image" data-dcnode-id="4170"></span><span data-dcnode-id="4169" instrument_node=""> Standard image

	                     Reset image size
					</span></button></span></div></div><figcaption data-dcnode-id="4129"><div class="article-text figure-caption" data-dcnode-id="4139"><p data-dcnode-id="4140"><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Figure 8.</span></strong><span data-dcnode-id="4144" instrument_node="">&nbsp;Comparison between the full line-of-sight heliocentric velocity distributions of the data and the best-fit flat-rotation-curve model. Fields are ordered by increasing longitude. The agreement between the gray model curve and the data is good, except for some offsets in the mean of the distributions, as is also clear from Figure </span><a data-dcnode-id="4142" href="#apj447278f7"><span data-dcnode-id="4143" instrument_node="">7</span></a><span data-dcnode-id="4141" instrument_node="">.</span></p></div><p class="mb-05 print-hide" data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="4130"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f8_lr.jpg%3FAWSAccessKeyId%3DAKIAYDKQL6LTV7YY2HIK%26Expires%3D1653245354%26Signature%3DzXin1M5Yu1E4XzkoJKXw9flDmTQ%253D" id="wd-jnl-art-btn-std-img-apj447278f8"><span class="icon-image" data-dcnode-id="4136"></span><span data-dcnode-id="4135" instrument_node=""> Standard image

					</span></a></span></figcaption></figure></figure></div><h3 data-dcnode-id="4124" id="apj447278s4-2" name="apj447278s4-2"><span data-dcnode-id="4125" instrument_node="">4.2.&nbsp;Systematics</span></h3><div class="article-text" data-dcnode-id="3787"><p data-dcnode-id="4111"><span data-dcnode-id="4123" instrument_node="">The basic models presented in the previous section are potentially subject to systematic uncertainties, which we discuss in this section. These uncertainties are mainly related to the distances of the stars in our sample, as these are obtained from somewhat uncertain models of the color–magnitude distribution of giant stars in the near-infrared </span><em data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">J</span></em><span data-dcnode-id="4120" instrument_node="">, </span><em data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">H</span></em><span data-dcnode-id="4117" instrument_node="">, and </span><em data-dcnode-id="4113"><span data-dcnode-id="4116" instrument_node="">K</span><sub data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">s</span></sub></em><span data-dcnode-id="4112" instrument_node=""> bands. We discuss here the influence of our assumed value for the scale length of the stars, of potential systematic offsets in the preliminary APOGEE metallicities used to inform the photometric distances, of systematic distance uncertainties, and of the impact of misestimated interstellar extinction and absorption. We also discuss the effect of binary contamination, of using a different set of stellar isochrones for distance estimation, and of modeling the data using many underlying populations of stars, with velocity dispersions smoothly varying with age.</span></p><p data-dcnode-id="4032"><span data-dcnode-id="4110" instrument_node="">In our fits, we have simply assumed a value of 3 kpc for the radial scale length, </span><em data-dcnode-id="4106"><span data-dcnode-id="4109" instrument_node="">h</span><sub data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">R</span></sub></em><span data-dcnode-id="4105" instrument_node="">, of the sample of stars used in the analysis. This assumption is based on the fact that, locally, the dominant solar-metallicity disk population has this scale length (Bovy et al. </span><a class="cite" data-dcnode-id="4103" href="#apj447278r15" id="fnref-apj447278r15" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4104" instrument_node="">2012c</span></a><span data-dcnode-id="4102" instrument_node="">). The parameter </span><em data-dcnode-id="4098"><span data-dcnode-id="4101" instrument_node="">h</span><sub data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">R</span></sub></em><span data-dcnode-id="4097" instrument_node=""> enters our analysis in two ways, the first being in the asymmetric-drift correction (Equation (</span><a class="eqnref" data-dcnode-id="4095" href="#apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4096" instrument_node="">5</span></a><span data-dcnode-id="4094" instrument_node="">)), and the second being in the prior on the distance distribution (Equation (</span><a class="eqnref" data-dcnode-id="4092" href="#apj447278fd12" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4093" instrument_node="">A1</span></a><span data-dcnode-id="4091" instrument_node="">)). The former of these is the most important for determining </span><em data-dcnode-id="4087"><span data-dcnode-id="4090" instrument_node="">V</span><sub data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">c</span></sub></em><span data-dcnode-id="4086" instrument_node="">(</span><em data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">R</span></em><span data-dcnode-id="4083" instrument_node="">). Changing </span><em data-dcnode-id="4079"><span data-dcnode-id="4082" instrument_node="">h</span><sub data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">R</span></sub></em><span data-dcnode-id="4078" instrument_node=""> to 2 kpc—which is highly unlikely, given that such a short scale length is not observed for any of the metal-rich, "thin disk" populations in the solar neighborhood (Bovy et al. </span><a class="cite" data-dcnode-id="4076" href="#apj447278r15" id="fnref-apj447278r15" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4077" instrument_node="">2012c</span></a><span data-dcnode-id="4075" instrument_node="">)—increases the best-fit value to </span><em data-dcnode-id="4071"><span data-dcnode-id="4074" instrument_node="">V</span><sub data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">c</span></sub></em><span data-dcnode-id="4070" instrument_node=""> = 223 km s</span><sup data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">−1</span></sup><span data-dcnode-id="4067" instrument_node=""> for a model with a flat rotation curve, and to </span><em data-dcnode-id="4063"><span data-dcnode-id="4066" instrument_node="">V</span><sub data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">c</span></sub></em><span data-dcnode-id="4062" instrument_node=""> = 220 km s</span><sup data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">−1</span></sup><span data-dcnode-id="4059" instrument_node=""> for a power-law rotation curve. Increasing </span><em data-dcnode-id="4055"><span data-dcnode-id="4058" instrument_node="">h</span><sub data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">R</span></sub></em><span data-dcnode-id="4054" instrument_node=""> to 4 kpc decreases the best-fit value to </span><em data-dcnode-id="4050"><span data-dcnode-id="4053" instrument_node="">V</span><sub data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">c</span></sub></em><span data-dcnode-id="4049" instrument_node="">(</span><em data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">R</span></em><sub data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">0</span></sub><span data-dcnode-id="4044" instrument_node="">) = 217 km s</span><sup data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">−1</span></sup><span data-dcnode-id="4041" instrument_node="">. Similar changes happen for the mock data sets described in Appendix&nbsp;</span><a class="secref" data-dcnode-id="4039" href="#apj447278app2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4040" instrument_node="">B</span></a><span data-dcnode-id="4038" instrument_node="">. Therefore, we conclude that the assumed radial scale length has a negligible influence on the inferred </span><em data-dcnode-id="4034"><span data-dcnode-id="4037" instrument_node="">V</span><sub data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">c</span></sub></em><span data-dcnode-id="4033" instrument_node="">.</span></p><p data-dcnode-id="3984"><span data-dcnode-id="4031" instrument_node="">To determine the influence of systematic offsets in the metallicities used in the photometric distances, we have performed fits allowing for a single metallicity offset, Δ[Fe/H], for all of the stars in the sample, for a model with a flat rotation curve. We find that the best-fit Δ[Fe/H] = −0.15 ± 0.02 dex, but the best-fit value of </span><em data-dcnode-id="4027"><span data-dcnode-id="4030" instrument_node="">V</span><sub data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">c</span></sub></em><span data-dcnode-id="4026" instrument_node=""> is unchanged, as is its uncertainty (see Figure </span><a data-dcnode-id="4024" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4025" instrument_node="">5</span></a><span data-dcnode-id="4023" instrument_node=""> for the Δ[Fe/H]–</span><em data-dcnode-id="4019"><span data-dcnode-id="4022" instrument_node="">V</span><sub data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">c</span></sub></em><span data-dcnode-id="4018" instrument_node=""> PDF). Although an offset of −0.15 dex might seem large, this offset should not be thought of as a measurement of [Fe/H] for the stars in our sample, because the photometric-distance PDFs, such as that in Figure </span><a data-dcnode-id="4016" href="#apj447278f11" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4017" instrument_node="">11</span></a><span data-dcnode-id="4015" instrument_node="">, are relatively insensitive to large changes in [Fe/H], especially at the high-metallicity end. We have also performed a fit with a different Δ[Fe/H] for inner (</span><em data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">l</span></em><span data-dcnode-id="4012" instrument_node=""> ⩽ 90°) and outer-disk fields. Such a fit finds Δ[Fe/H] = −0.12 ± 0.03 dex for the outer-disk fields, and Δ[Fe/H] = 0.70 ± 0.06 dex for the inner-disk fields, with a best-fit </span><em data-dcnode-id="4008"><span data-dcnode-id="4011" instrument_node="">V</span><sub data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">c</span></sub></em><span data-dcnode-id="4007" instrument_node=""> = 220 km s</span><sup data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">−1</span></sup><span data-dcnode-id="4004" instrument_node="">; see Figure </span><a data-dcnode-id="4002" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="4003" instrument_node="">5</span></a><span data-dcnode-id="4001" instrument_node=""> for the full PDF of the Δ[Fe/H] and </span><em data-dcnode-id="3997"><span data-dcnode-id="4000" instrument_node="">V</span><sub data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">c</span></sub></em><span data-dcnode-id="3996" instrument_node="">. As discussed previously, the photometric-distance PDFs are largely insensitive to changes in [Fe/H] at high [Fe/H]; the Padova isochrones also have an upper limit of [Fe/H]</span><sub data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">max</span></sub><span data-dcnode-id="3993" instrument_node=""> = 0.45 dex, such that increasing a star's [Fe/H] beyond this has no effect, because we then use [Fe/H]</span><sub data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">max</span></sub><span data-dcnode-id="3990" instrument_node="">. Therefore, even a change of Δ[Fe/H] = 0.7 dex has a negligible influence on the inner, high-metallicity, disk fields. In none of these fits is our inferred range for </span><em data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">R</span></em><sub data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">0</span></sub><span data-dcnode-id="3985" instrument_node=""> affected.</span></p><p data-dcnode-id="3909"><span data-dcnode-id="3983" instrument_node="">Similarly, we have performed fits allowing for a single distance-modulus offset, Δμ, to be applied to all of the stars in our sample, or for a separate offset for inner- and outer-disk fields. In the former case, we find Δμ = −0.27 ± 0.06, corresponding to a 12% ± 3% distance offset, without any influence on the inferred value of </span><em data-dcnode-id="3979"><span data-dcnode-id="3982" instrument_node="">V</span><sub data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">c</span></sub></em><span data-dcnode-id="3978" instrument_node="">. In the inner/outer offset fit, we find 23% smaller distances at </span><em data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">l</span></em><span data-dcnode-id="3975" instrument_node=""> ⩽ 90°, and 20% larger distances in the outer disk, again with a negligible influence on the best-fit </span><em data-dcnode-id="3971"><span data-dcnode-id="3974" instrument_node="">V</span><sub data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">c</span></sub></em><span data-dcnode-id="3970" instrument_node=""> (</span><em data-dcnode-id="3966"><span data-dcnode-id="3969" instrument_node="">V</span><sub data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">c</span></sub></em><span data-dcnode-id="3965" instrument_node=""> = 221 km s</span><sup data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">−1</span></sup><span data-dcnode-id="3962" instrument_node="">), but with a second minimum around </span><em data-dcnode-id="3958"><span data-dcnode-id="3961" instrument_node="">V</span><sub data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">c</span></sub></em><span data-dcnode-id="3957" instrument_node=""> = 190 km s</span><sup data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">−1</span></sup><span data-dcnode-id="3954" instrument_node="">, and a wider </span><em data-dcnode-id="3950"><span data-dcnode-id="3953" instrument_node="">V</span><sub data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">c</span></sub></em><span data-dcnode-id="3949" instrument_node=""> PDF that is, however, at </span><em data-dcnode-id="3945"><span data-dcnode-id="3948" instrument_node="">V</span><sub data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">c</span></sub></em><span data-dcnode-id="3944" instrument_node=""> &lt; 235 km s</span><sup data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">−1</span></sup><span data-dcnode-id="3941" instrument_node=""> at 99% confidence. A more physical effect is to allow for an offset in the extinction, Δ</span><em data-dcnode-id="3937"><span data-dcnode-id="3940" instrument_node="">A</span><sub data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">H</span></sub></em><span data-dcnode-id="3936" instrument_node="">, again using a single offset for the whole sample, or splitting the sample into inner- and outer-disk fields. A single extinction offset is well constrained to be small: Δ</span><em data-dcnode-id="3932"><span data-dcnode-id="3935" instrument_node="">A</span><sub data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">H</span></sub></em><span data-dcnode-id="3931" instrument_node=""> = −0.01 ± 0.01. Similarly, the best-fit extinction offset in the outer disk is Δ</span><em data-dcnode-id="3927"><span data-dcnode-id="3930" instrument_node="">A</span><sub data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">H</span></sub></em><span data-dcnode-id="3926" instrument_node=""> = 0 ± 0.02, while in the inner disk we find some evidence for misestimated extinction, with Δ</span><em data-dcnode-id="3922"><span data-dcnode-id="3925" instrument_node="">A</span><sub data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">H</span></sub></em><span data-dcnode-id="3921" instrument_node=""> = −0.2 ± 0.03. In both of these cases, the best-fit </span><em data-dcnode-id="3917"><span data-dcnode-id="3920" instrument_node="">V</span><sub data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">c</span></sub></em><span data-dcnode-id="3916" instrument_node=""> increases by 1 km s</span><sup data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">−1</span></sup><span data-dcnode-id="3913" instrument_node=""> or less, and the uncertainties remain approximately the same (see Figure </span><a data-dcnode-id="3911" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3912" instrument_node="">5</span></a><span data-dcnode-id="3910" instrument_node="">).</span></p><p data-dcnode-id="3888"><span data-dcnode-id="3908" instrument_node="">As discussed in Section </span><a class="secref" data-dcnode-id="3906" href="#apj447278s2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3907" instrument_node="">2</span></a><span data-dcnode-id="3905" instrument_node="">, we do not limit the sample to stars for which multiple velocity epochs are available that indicate that they are not part of a multiple system. Such a cut significantly reduces the longitudinal coverage of our sample. When we do apply this cut, we find that the best fits for </span><em data-dcnode-id="3901"><span data-dcnode-id="3904" instrument_node="">V</span><sub data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">c</span></sub></em><span data-dcnode-id="3900" instrument_node=""> and all other parameters are unchanged from the results for our basic flat-rotation-curve model in Section </span><a class="secref" data-dcnode-id="3898" href="#apj447278s4-1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3899" instrument_node="">4.1</span></a><span data-dcnode-id="3897" instrument_node="">, albeit with larger uncertainties. We find in particular that </span><em data-dcnode-id="3893"><span data-dcnode-id="3896" instrument_node="">V</span><sub data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">c</span></sub></em><span data-dcnode-id="3892" instrument_node=""> = 217 ± 7 km s</span><sup data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">−1</span></sup><span data-dcnode-id="3889" instrument_node="">, but the uncertainties in the position and velocity of the Sun are much increased.</span></p><p data-dcnode-id="3861"><span data-dcnode-id="3887" instrument_node="">In Appendix&nbsp;</span><a class="secref" data-dcnode-id="3885" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3886" instrument_node="">A</span></a><span data-dcnode-id="3884" instrument_node="">, we describe how we employ Padova isochrones to estimate photometric distances to the stars in our sample. When instead we use isochrones from the BaSTI library (Pietrinferni et al. </span><a class="cite" data-dcnode-id="3882" href="#apj447278r68" id="fnref-apj447278r68" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3883" instrument_node="">2004</span></a><span data-dcnode-id="3881" instrument_node="">), using the filter transformation from Carpenter (</span><a class="cite" data-dcnode-id="3879" href="#apj447278r19" id="fnref-apj447278r19" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3880" instrument_node="">2001</span></a><span data-dcnode-id="3878" instrument_node="">) to transform </span><em data-dcnode-id="3874"><span data-dcnode-id="3877" instrument_node="">K</span><sub data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">s</span></sub></em><span data-dcnode-id="3873" instrument_node=""> to the </span><em data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">K</span></em><span data-dcnode-id="3870" instrument_node="">-band filter used by BaSTI, we find that the results of our basic models (both with a flat and a power-law rotation curve) are essentially unchanged (with changes in </span><em data-dcnode-id="3866"><span data-dcnode-id="3869" instrument_node="">V</span><sub data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">c</span></sub></em><span data-dcnode-id="3865" instrument_node=""> of about 1 km s</span><sup data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">−1</span></sup><span data-dcnode-id="3862" instrument_node="">).</span></p><p data-dcnode-id="3851"><span data-dcnode-id="3860" instrument_node="">To determine whether our results change when we fit the data as a mix of multiple stellar populations, with velocity dispersions varying from that of a young population to that of the oldest disk population, we have performed a fit where the likelihood for </span><em data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">V</span></em><sub data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">los</span></sub><span data-dcnode-id="3855" instrument_node=""> in Equation (</span><a class="eqnref" data-dcnode-id="3853" href="#apj447278fd1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3854" instrument_node="">1</span></a><span data-dcnode-id="3852" instrument_node="">) is generalized to
</span></p><div class="display-eqn" data-dcnode-id="3845" id="apj447278fd10" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="3846"><span class="texImage" data-dcnode-id="3849"><img alt="Equation (10)" data-dcnode-id="3850" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd10.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=kI%2FWXqY5DlToqOm78OFPTawXXVs%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="3835"><span data-dcnode-id="3844" instrument_node="">where DF</span><sub data-dcnode-id="3841"><em data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">i</span></em></sub><span data-dcnode-id="3840" instrument_node=""> is the single-Gaussian population model used before, with dispersion at age τ</span><sub data-dcnode-id="3837"><em data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">i</span></em></sub><span data-dcnode-id="3836" instrument_node="">
</span></p><div class="display-eqn" data-dcnode-id="3829" id="apj447278fd11" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="3830"><span class="texImage" data-dcnode-id="3833"><img alt="Equation (11)" data-dcnode-id="3834" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd11.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=6ctoLQ6Gd0OxoL6o4sPq9wNa8os%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="3788"><span data-dcnode-id="3828" instrument_node="">and using an exponentially declining star formation history, such that </span><span class="inline-eqn" data-dcnode-id="3822" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="3823"><span class="texImage" data-dcnode-id="3826"><img align="top" alt="$P(i) \propto e^{\tau _i/(8\,\mathrm{Gyr})}$" data-dcnode-id="3827" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn11.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=Wr%2FnMeJeYKu7mCf2obvb1V2vdy4%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="3821" instrument_node="">. This model follows the fit of Aumer &amp; Binney (</span><a class="cite" data-dcnode-id="3819" href="#apj447278r2" id="fnref-apj447278r2" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3820" instrument_node="">2009</span></a><span data-dcnode-id="3818" instrument_node="">) in the solar neighborhood. We use a mix of 20 equally age-spaced populations between 1 and 10 Gyr, and find </span><em data-dcnode-id="3814"><span data-dcnode-id="3817" instrument_node="">V</span><sub data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">c</span></sub></em><span data-dcnode-id="3813" instrument_node=""> = 216 ± 7 km s</span><sup data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">−1</span></sup><span data-dcnode-id="3810" instrument_node="">, showing that this alternative model does not change our results; the full </span><em data-dcnode-id="3806"><span data-dcnode-id="3809" instrument_node="">V</span><sub data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">c</span></sub></em><span data-dcnode-id="3805" instrument_node="">–</span><em data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">R</span></em><sub data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">0</span></sub><span data-dcnode-id="3800" instrument_node=""> PDF is shown in Figure </span><a data-dcnode-id="3798" href="#apj447278f5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3799" instrument_node="">5</span></a><span data-dcnode-id="3797" instrument_node="">. This model has σ</span><sub data-dcnode-id="3793"><em data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">R</span></em><span data-dcnode-id="3794" instrument_node="">, 0</span></sub><span data-dcnode-id="3792" instrument_node=""> = 38 ± 2 km s</span><sup data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">−1</span></sup><span data-dcnode-id="3789" instrument_node="">, as expected for the old, "thin disk" population.</span></p></div></div><span data-dcnode-id="3785" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="3783" id="apj447278s5" name="apj447278s5"><span data-dcnode-id="3784" instrument_node="">5.&nbsp;DISCUSSION</span></h2><div class="article-text" data-dcnode-id="2635" data-mobile-collapse=""><h3 data-dcnode-id="3781" id="apj447278s5-1" name="apj447278s5-1"><span data-dcnode-id="3782" instrument_node="">5.1.&nbsp;Effect of Non-axisymmetric Features</span></h3><div class="article-text" data-dcnode-id="3611"><p data-dcnode-id="3758"><span data-dcnode-id="3780" instrument_node="">In the fits in Section </span><a class="secref" data-dcnode-id="3778" href="#apj447278s4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3779" instrument_node="">4</span></a><span data-dcnode-id="3777" instrument_node="">, we have assumed axisymmetric models for the velocity field in the Galactic disk. However, the Milky Way is known to have some non-axisymmetric structures, such as the central bar (Blitz &amp; Spergel </span><a class="cite" data-dcnode-id="3775" href="#apj447278r7" id="fnref-apj447278r7" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3776" instrument_node="">1991</span></a><span data-dcnode-id="3774" instrument_node="">; Binney et al. </span><a class="cite" data-dcnode-id="3772" href="#apj447278r5" id="fnref-apj447278r5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3773" instrument_node="">1991</span></a><span data-dcnode-id="3771" instrument_node="">), spiral arms (e.g., Drimmel &amp; Spergel </span><a class="cite" data-dcnode-id="3769" href="#apj447278r28" id="fnref-apj447278r28" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3770" instrument_node="">2001</span></a><span data-dcnode-id="3768" instrument_node="">), and a potentially triaxial halo (Law et al. </span><a class="cite" data-dcnode-id="3766" href="#apj447278r58" id="fnref-apj447278r58" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3767" instrument_node="">2009</span></a><span data-dcnode-id="3765" instrument_node="">) that may influence the measurement performed in this paper. Because we use a warm disk population as dynamical tracers, we can expect the influence of any non-axisymmetry to be smaller than for the colder gas tracers used in other studies (e.g., Levine et al. </span><a class="cite" data-dcnode-id="3763" href="#apj447278r59" id="fnref-apj447278r59" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3764" instrument_node="">2008</span></a><span data-dcnode-id="3762" instrument_node="">), because warm tracers respond less strongly to non-axisymmetric perturbations to the Milky Way potential than cold tracers (Lin et al. </span><a class="cite" data-dcnode-id="3760" href="#apj447278r61" id="fnref-apj447278r61" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3761" instrument_node="">1969</span></a><span data-dcnode-id="3759" instrument_node="">).</span></p><p data-dcnode-id="3732"><span data-dcnode-id="3757" instrument_node="">We have calculated the velocity field for a warm tracer population in various non-axisymmetric models (see J. Bovy 2013, in preparation, for full details). We follow the procedure of Dehnen (</span><a class="cite" data-dcnode-id="3755" href="#apj447278r26" id="fnref-apj447278r26" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3756" instrument_node="">2000</span></a><span data-dcnode-id="3754" instrument_node="">) and Bovy (</span><a class="cite" data-dcnode-id="3752" href="#apj447278r9" id="fnref-apj447278r9" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3753" instrument_node="">2010</span></a><span data-dcnode-id="3751" instrument_node="">) to calculate the velocity distribution at a given position for a given non-axisymmetric model for the disk, by performing backward orbit integrations until before the onset of the non-axisymmetric perturbation in an axisymmetric disk. At that time, the DF of the pre-existing axisymmetric disk is evaluated. By the conservation of phase-space density, this probability is equal to the current probability of the phase-space starting point of the orbit integration. We assume a flat rotation curve for the axisymmetric part of the potential, and we model the initial, axisymmetric DF as a Dehnen DF (Equation (</span><a class="eqnref" data-dcnode-id="3749" href="#apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3750" instrument_node="">6</span></a><span data-dcnode-id="3748" instrument_node="">)) with a velocity dispersion of 0.2 </span><em data-dcnode-id="3744"><span data-dcnode-id="3747" instrument_node="">V</span><sub data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">c</span></sub></em><span data-dcnode-id="3743" instrument_node="">, a radial scale length of </span><em data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">R</span></em><sub data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">0</span></sub><span data-dcnode-id="3738" instrument_node="">/3 and a dispersion scale length of </span><em data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">R</span></em><sub data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">0</span></sub><span data-dcnode-id="3733" instrument_node="">. These parameters are close to the best-fit parameters for the APOGEE tracer population.</span></p><p data-dcnode-id="3677"><span data-dcnode-id="3731" instrument_node="">We calculate the mean velocity field for the bar model of Dehnen (</span><a class="cite" data-dcnode-id="3729" href="#apj447278r26" id="fnref-apj447278r26" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3730" instrument_node="">2000</span></a><span data-dcnode-id="3728" instrument_node="">), and use it to construct the mean, non-axisymmetric </span><em data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">V</span></em><sub data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">los</span></sub><span data-dcnode-id="3723" instrument_node=""> field. This field is then applied as part of the model, and the result for the mean line-of-sight velocity in each field is shown in Figure </span><a data-dcnode-id="3721" href="#apj447278f9" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3722" instrument_node="">9</span></a><span data-dcnode-id="3720" instrument_node="">—there is of course much more discretionary power in the full DFs. In the same manner, we calculate the mean </span><em data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">V</span></em><sub data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">los</span></sub><span data-dcnode-id="3715" instrument_node=""> field for a two-armed logarithmic spiral with a fractional potential amplitude of 1% of the background, axisymmetric potential, a pitch angle of −15°, an angular frequency of 0.65 Ω</span><sub data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">0</span></sub><span data-dcnode-id="3712" instrument_node=""> (placing the Sun near the 4:1 inner Lindblad resonance), and an angle between the Sun–Galactic-center line and the line connecting the peak of the spiral pattern at the solar radius of 20°. We do the same for models with a flat elliptical (stationary, </span><em data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">m</span></em><span data-dcnode-id="3709" instrument_node=""> = 2) distortion to the potential (see Kuijken &amp; Tremaine </span><a class="cite" data-dcnode-id="3707" href="#apj447278r56" id="fnref-apj447278r56" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3708" instrument_node="">1994</span></a><span data-dcnode-id="3706" instrument_node="">), with a fractional amplitude of 5% and position angles of 0° and −45° with respect to the Sun–Galactic-center line. All of these perturbations were adiabatically grown. We see in Figure </span><a data-dcnode-id="3704" href="#apj447278f9" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3705" instrument_node="">9</span></a><span data-dcnode-id="3703" instrument_node=""> that the influence of the bar and spiral structure is negligible in the mean </span><em data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">V</span></em><sub data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">los</span></sub><span data-dcnode-id="3698" instrument_node=""> velocity field. An elliptical, </span><em data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">m</span></em><span data-dcnode-id="3695" instrument_node=""> = 2, perturbation could distort the mean velocity field in a way that would affect our analysis. Naively, the model in the bottom panel of Figure </span><a data-dcnode-id="3693" href="#apj447278f9" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="3694" instrument_node="">9</span></a><span data-dcnode-id="3692" instrument_node=""> significantly reduces the residuals between the best-fit </span><span class="inline-eqn" data-dcnode-id="3686" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="3687"><span class="texImage" data-dcnode-id="3690"><img align="top" alt="$\bar{V}_{\mathrm{los}}$" data-dcnode-id="3691" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn12.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=sTop4AY%2B0tpapIeM9DPrmorFjiU%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="3685" instrument_node=""> and the data </span><span class="inline-eqn" data-dcnode-id="3679" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="3680"><span class="texImage" data-dcnode-id="3683"><img align="top" alt="$\bar{V}_{\mathrm{los}}$" data-dcnode-id="3684" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn13.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=u3qSmgJjwQushZ4Q%2FidnnQMpsK8%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="3678" instrument_node="">.</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="3614" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f9_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=W4S%2F86lmzQZRzxnUh6QSO39HMNc%3D" data-toolbar-link="apj447278f9" data-toolbar-title="Figure 9." data-toolbar-type="figure" id="apj447278f9" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="3615"><div class="panzoom-container" data-dcnode-id="3663"><div class="panzoom-parent" data-dcnode-id="3675" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 9." class="panzoom" data-dcnode-id="3676" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f9_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=W4S%2F86lmzQZRzxnUh6QSO39HMNc%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw" style="transform: scale(1) translate(0px, 0px); backface-visibility: hidden; transform-origin: 50% 50%; cursor: move; transition: none 0s ease 0s; user-select: none; touch-action: none;"></div><div class="buttons zoom-tools" data-dcnode-id="3664"><button class="zoom-in" data-dcnode-id="3672"><span class="icon-zoomin" data-dcnode-id="3674"></span><span data-d
