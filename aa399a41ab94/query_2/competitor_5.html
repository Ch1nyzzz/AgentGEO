					</span></a></span></figcaption></figure></figure></div><span data-dcnode-id="6929" instrument_node="">
</span><h2 class="header-anchor" data-dcnode-id="6927" id="apj447278s3" name="apj447278s3"><span data-dcnode-id="6928" instrument_node="">3.&nbsp;METHODOLOGY</span></h2><div class="article-text" data-dcnode-id="5700" data-mobile-collapse=""><h3 data-dcnode-id="6925" id="apj447278s3-1" name="apj447278s3-1"><span data-dcnode-id="6926" instrument_node="">3.1.&nbsp;General Considerations</span></h3><div class="article-text" data-dcnode-id="6735"><p data-dcnode-id="6902"><span data-dcnode-id="6924" instrument_node="">Our approach to determining the Milky Way's rotation curve from the APOGEE data is to fit a kinematical, axisymmetric model to the observed line-of-sight velocities. In its most basic form, such a kinematical model consists of (1) a model for the rotation curve, (2) a model for the distribution of peculiar velocities with respect to circular motion as a function of Galactocentric radius, and (3) a set of parameters describing the transformation of positions and velocities from the heliocentric to the Galactocentric frame. These latter parameters are the distance </span><em data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">R</span></em><sub data-dcnode-id="6920"><span data-dcnode-id="6921" instrument_node="">0</span></sub><span data-dcnode-id="6919" instrument_node=""> from the Sun to the Galactic center, and the Sun's velocity with respect to the (dynamical) center of the Galaxy. We will ignore the small projection effects that arise at non-zero Galactic latitude and the vertical dependence of </span><em data-dcnode-id="6915"><span data-dcnode-id="6918" instrument_node="">V</span><sub data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">c</span></sub></em><span data-dcnode-id="6914" instrument_node="">, since these are all at the sub-km&nbsp;s</span><sup data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">−1</span></sup><span data-dcnode-id="6911" instrument_node=""> level for |</span><em data-dcnode-id="6909"><span data-dcnode-id="6910" instrument_node="">b</span></em><span data-dcnode-id="6908" instrument_node="">| &lt; 1</span><img align="baseline" alt="fdg" data-dcnode-id="6907" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.images.iop.org/Entities/fdg.gif&amp;raw"><span data-dcnode-id="6906" instrument_node="">5 and distances ≲ 10 kpc (e.g., Bovy &amp; Tremaine </span><a class="cite" data-dcnode-id="6904" href="#apj447278r16" id="fnref-apj447278r16" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6905" instrument_node="">2012</span></a><span data-dcnode-id="6903" instrument_node="">). Therefore, we are only concerned with motions in the plane of the Galactic disk, and we ignore vertical motions.</span></p><p data-dcnode-id="6830"><span data-dcnode-id="6901" instrument_node="">The kinematical model provides the probability distribution of line-of-sight velocities as a function of position (Galactocentric radius </span><em data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">R</span></em><span data-dcnode-id="6898" instrument_node=""> and azimuth ϕ, or distance </span><em data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">d</span></em><span data-dcnode-id="6895" instrument_node=""> and Galactic longitude </span><em data-dcnode-id="6893"><span data-dcnode-id="6894" instrument_node="">l</span></em><span data-dcnode-id="6892" instrument_node="">), after marginalizing over the component of the velocity tangential to the line of sight. This requires knowing the distance, which is only weakly constrained for giants (see Appendix&nbsp;</span><a class="secref" data-dcnode-id="6890" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6891" instrument_node="">A</span></a><span data-dcnode-id="6889" instrument_node="">). Therefore, we additionally marginalize the kinematical model over the distance to each star, to obtain the probability of the observed line-of-sight velocity of a star, given its position (</span><em data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">l</span></em><span data-dcnode-id="6886" instrument_node="">, </span><em data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">b</span></em><span data-dcnode-id="6883" instrument_node="">), photometry (</span><em data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">J</span></em><sub data-dcnode-id="6879"><span data-dcnode-id="6880" instrument_node="">0</span></sub><span data-dcnode-id="6878" instrument_node="">, </span><em data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">H</span></em><sub data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">0</span></sub><span data-dcnode-id="6873" instrument_node="">, </span><em data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">K</span></em><sub data-dcnode-id="6867"><em data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">s</span></em><span data-dcnode-id="6868" instrument_node="">, 0</span></sub><span data-dcnode-id="6866" instrument_node="">), the iron abundance [Fe/H] (taken as representative of the overall metallicity of the star), the kinematical model (represented by the circular-velocity curve </span><em data-dcnode-id="6862"><span data-dcnode-id="6865" instrument_node="">V</span><sub data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">c</span></sub></em><span data-dcnode-id="6861" instrument_node="">(</span><em data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">R</span></em><span data-dcnode-id="6858" instrument_node="">) and the distribution of peculiar velocities, distribution function (DF)), and the coordinate-transformation parameters </span><em data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">R</span></em><sub data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">0</span></sub><span data-dcnode-id="6853" instrument_node=""> and </span><strong data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">V</span></strong><sup data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">gal</span></sup><sub data-dcnode-id="6847"><span data-dcnode-id="6848" instrument_node="">☉</span></sub><span data-dcnode-id="6846" instrument_node=""> = (</span><em data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">V</span></em><sub data-dcnode-id="6840"><em data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">R</span></em><span data-dcnode-id="6841" instrument_node="">, ☉</span></sub><span data-dcnode-id="6839" instrument_node="">, </span><em data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">V</span></em><sub data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">ϕ, ☉</span></sub><span data-dcnode-id="6834" instrument_node="">) (where we label this parameter as "gal" to emphasize that this is the </span><em data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">full</span></em><span data-dcnode-id="6831" instrument_node=""> velocity with respect to the center of the Galaxy, not just the Sun's motion with respect to the local circular velocity):
</span></p><div class="display-eqn" data-dcnode-id="6824" id="apj447278fd1" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6825"><span class="texImage" data-dcnode-id="6828"><img alt="Equation (1)" data-dcnode-id="6829" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd1.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=zGtyF68%2BZR1E1A5wJuyV9mJYJ%2F8%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6813"><span data-dcnode-id="6823" instrument_node="">The first factor within the integral is produced by marginalizing the kinematical model over the velocity component tangential to the line of sight at a given position. The second factor is given by the photometric-distance PDF, discussed in Appendix&nbsp;</span><a class="secref" data-dcnode-id="6821" href="#apj447278app1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6822" instrument_node="">A</span></a><span data-dcnode-id="6820" instrument_node="">; we include "iso" in the prior information to emphasize that we use an isochrone and IMF model to obtain the photometric-distance PDFs. We also marginalize over whether a star is a giant or a dwarf star, which changes the photometric-distance PDF; the dwarf contamination probability </span><em data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">P</span></em><span data-dcnode-id="6817" instrument_node="">(dwarf) is a single free parameter in our model. Equation (</span><a class="eqnref" data-dcnode-id="6815" href="#apj447278fd1" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6816" instrument_node="">1</span></a><span data-dcnode-id="6814" instrument_node="">) is the likelihood for a single star, and the total likelihood for the sample is calculated by multiplying together the individual likelihoods for all the 3365 data points. This total likelihood is what we optimize to fit models to the data.</span></p><p data-dcnode-id="6796"><span data-dcnode-id="6812" instrument_node="">We can also calculate the distribution of line-of-sight velocities for individual fields, which we will use later to show comparisons between the best-fit model and the data. For the distribution of </span><em data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">V</span></em><sub data-dcnode-id="6808"><span data-dcnode-id="6809" instrument_node="">los</span></sub><span data-dcnode-id="6807" instrument_node=""> of a field centered at (</span><em data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">l</span></em><sub data-dcnode-id="6803"><span data-dcnode-id="6804" instrument_node="">field</span></sub><span data-dcnode-id="6802" instrument_node="">, </span><em data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">b</span></em><sub data-dcnode-id="6798"><span data-dcnode-id="6799" instrument_node="">field</span></sub><span data-dcnode-id="6797" instrument_node="">), we obtain
</span></p><div class="display-eqn" data-dcnode-id="6790" id="apj447278fd2" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6791"><span class="texImage" data-dcnode-id="6794"><img alt="Equation (2)" data-dcnode-id="6795" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd2.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=r3zufmTKPffI2389MyUpSTG1eSE%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6736"><span data-dcnode-id="6789" instrument_node="">where </span><em data-dcnode-id="6787"><span data-dcnode-id="6788" instrument_node="">p</span></em><span data-dcnode-id="6786" instrument_node="">(</span><em data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">J</span></em><span data-dcnode-id="6783" instrument_node=""> − </span><em data-dcnode-id="6779"><span data-dcnode-id="6782" instrument_node="">K</span><sub data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">s</span></sub></em><span data-dcnode-id="6778" instrument_node="">, </span><em data-dcnode-id="6776"><span data-dcnode-id="6777" instrument_node="">H</span></em><span data-dcnode-id="6775" instrument_node="">, [Fe/H], </span><em data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">l</span></em><span data-dcnode-id="6772" instrument_node="">, </span><em data-dcnode-id="6770"><span data-dcnode-id="6771" instrument_node="">b</span></em><span data-dcnode-id="6769" instrument_node="">|</span><em data-dcnode-id="6767"><span data-dcnode-id="6768" instrument_node="">l</span></em><sub data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">field</span></sub><span data-dcnode-id="6764" instrument_node="">, </span><em data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">b</span></em><sub data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">field</span></sub><span data-dcnode-id="6759" instrument_node="">, DF, iso) is taken directly from the field's data (that is, we sum over the data (</span><em data-dcnode-id="6757"><span data-dcnode-id="6758" instrument_node="">l</span></em><span data-dcnode-id="6756" instrument_node="">,</span><em data-dcnode-id="6754"><span data-dcnode-id="6755" instrument_node="">b</span></em><span data-dcnode-id="6753" instrument_node="">,(</span><em data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">J</span></em><span data-dcnode-id="6750" instrument_node=""> − </span><em data-dcnode-id="6746"><span data-dcnode-id="6749" instrument_node="">K</span><sub data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">s</span></sub></em><span data-dcnode-id="6745" instrument_node="">)</span><sub data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">0</span></sub><span data-dcnode-id="6742" instrument_node="">,</span><em data-dcnode-id="6740"><span data-dcnode-id="6741" instrument_node="">H</span></em><sub data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">0</span></sub><span data-dcnode-id="6737" instrument_node="">,[Fe/H])).</span></p></div><h3 data-dcnode-id="6733" id="apj447278s3-2" name="apj447278s3-2"><span data-dcnode-id="6734" instrument_node="">3.2.&nbsp;Kinematical Model</span></h3><div class="article-text" data-dcnode-id="6093"><p data-dcnode-id="6681"><span data-dcnode-id="6732" instrument_node="">We now describe in detail the full model that is fit to the data. Our fiducial model for the distribution of velocities in the Galactocentric rest frame is that it is a single biaxial Gaussian, with a mean radial velocity of zero because of the assumption of axisymmetry, and a mean rotational velocity given by the local circular velocity </span><em data-dcnode-id="6728"><span data-dcnode-id="6731" instrument_node="">V</span><sub data-dcnode-id="6729"><span data-dcnode-id="6730" instrument_node="">c</span></sub></em><span data-dcnode-id="6727" instrument_node="">(</span><em data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">R</span></em><span data-dcnode-id="6724" instrument_node="">), adjusted for the local asymmetric drift </span><em data-dcnode-id="6720"><span data-dcnode-id="6723" instrument_node="">V</span><sub data-dcnode-id="6721"><span data-dcnode-id="6722" instrument_node="">a</span></sub></em><span data-dcnode-id="6719" instrument_node="">(</span><em data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">R</span></em><span data-dcnode-id="6716" instrument_node="">; σ</span><sub data-dcnode-id="6713"><em data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">R</span></em></sub><span data-dcnode-id="6712" instrument_node="">, </span><em data-dcnode-id="6708"><span data-dcnode-id="6711" instrument_node="">h</span><sub data-dcnode-id="6709"><span data-dcnode-id="6710" instrument_node="">R</span></sub></em><span data-dcnode-id="6707" instrument_node="">, </span><em data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">h</span></em><sub data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">σ</span></sub><span data-dcnode-id="6702" instrument_node="">), which is a function of the velocity dispersion, σ</span><sub data-dcnode-id="6699"><em data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">R</span></em></sub><span data-dcnode-id="6698" instrument_node="">, and the radial and radial-velocity-dispersion scale lengths of the population (</span><em data-dcnode-id="6694"><span data-dcnode-id="6697" instrument_node="">h</span><sub data-dcnode-id="6695"><span data-dcnode-id="6696" instrument_node="">R</span></sub></em><span data-dcnode-id="6693" instrument_node=""> and </span><em data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">h</span></em><sub data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">σ</span></sub><span data-dcnode-id="6688" instrument_node="">, respectively, see below). The only free parameters of the distribution of peculiar velocities are therefore the radial and rotational velocity dispersions, as the mixed radial–azimuthal moment vanishes, again because of the assumption of axisymmetry. The mixed moment, or equivalently the vertex deviation, in the solar neighborhood does not vanish for the warm disk population (Dehnen &amp; Binney </span><a class="cite" data-dcnode-id="6686" href="#apj447278r27" id="fnref-apj447278r27" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6687" instrument_node="">1998</span></a><span data-dcnode-id="6685" instrument_node="">), but this seems likely to result from the presence of moving groups, and not from the smooth underlying distribution having a strong non-zero vertex deviation (Bovy et al. </span><a class="cite" data-dcnode-id="6683" href="#apj447278r12" id="fnref-apj447278r12" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6684" instrument_node="">2009b</span></a><span data-dcnode-id="6682" instrument_node="">).</span></p><p data-dcnode-id="6612"><span data-dcnode-id="6680" instrument_node="">Assuming that the distribution of velocities in the Galactocentric cylindrical frame is Gaussian allows us to analytically marginalize the velocity distribution over the velocity component tangential to the line of sight. The resulting one-dimensional distribution is itself Gaussian, with mean (</span><em data-dcnode-id="6676"><span data-dcnode-id="6679" instrument_node="">V</span><sub data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">c</span></sub></em><span data-dcnode-id="6675" instrument_node="">(</span><em data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">R</span></em><span data-dcnode-id="6672" instrument_node="">) − </span><em data-dcnode-id="6668"><span data-dcnode-id="6671" instrument_node="">V</span><sub data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">a</span></sub></em><span data-dcnode-id="6667" instrument_node="">(</span><em data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">R</span></em><span data-dcnode-id="6664" instrument_node="">; σ, </span><em data-dcnode-id="6660"><span data-dcnode-id="6663" instrument_node="">h</span><sub data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">R</span></sub></em><span data-dcnode-id="6659" instrument_node="">, </span><em data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">h</span></em><sub data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">σ</span></sub><span data-dcnode-id="6654" instrument_node="">))sin (ϕ + </span><em data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">l</span></em><span data-dcnode-id="6651" instrument_node="">) and variance σ</span><sup data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">2</span></sup><sub data-dcnode-id="6646"><em data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">R</span></em></sub><span data-dcnode-id="6645" instrument_node="">(1 + sin </span><sup data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">2</span></sup><span data-dcnode-id="6642" instrument_node="">(ϕ + </span><em data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">l</span></em><span data-dcnode-id="6639" instrument_node="">) (</span><em data-dcnode-id="6637"><span data-dcnode-id="6638" instrument_node="">X</span></em><sup data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">2</span></sup><span data-dcnode-id="6634" instrument_node=""> − 1)), where </span><em data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">X</span></em><sup data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">2</span></sup><span data-dcnode-id="6629" instrument_node=""> is the ratio of the rotational and radial-velocity variances </span><em data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">X</span></em><sup data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">2</span></sup><span data-dcnode-id="6624" instrument_node=""> ≡ σ</span><sup data-dcnode-id="6622"><span data-dcnode-id="6623" instrument_node="">2</span></sup><sub data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">ϕ</span></sub><span data-dcnode-id="6619" instrument_node="">/σ</span><sub data-dcnode-id="6616"><em data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">R</span></em></sub><sup data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">2</span></sup><span data-dcnode-id="6613" instrument_node="">. The Galactocentric line-of-sight velocity for a star is calculated from its heliocentric line-of-sight velocity
</span></p><div class="display-eqn" data-dcnode-id="6606" id="apj447278fd3" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6607"><span class="texImage" data-dcnode-id="6610"><img alt="Equation (3)" data-dcnode-id="6611" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd3.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=qJddZ5gDcKbyRJTCRuwoWz8TGxM%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6585"><span data-dcnode-id="6605" instrument_node="">where we have written the Sun's velocity in terms of its angular velocity Ω</span><sub data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">☉</span></sub><span data-dcnode-id="6602" instrument_node="">. This angular velocity is expected to be close to the observed proper motion of Sgr&nbsp;A* in the plane of the Galaxy (30.24&nbsp;km&nbsp;s</span><sup data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">−1</span></sup><span data-dcnode-id="6599" instrument_node="">&nbsp;kpc</span><sup data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">−1</span></sup><span data-dcnode-id="6596" instrument_node="">; Reid &amp; Brunthaler </span><a class="cite" data-dcnode-id="6594" href="#apj447278r69" id="fnref-apj447278r69" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6595" instrument_node="">2004</span></a><span data-dcnode-id="6593" instrument_node="">), but we leave it as a free parameter, in addition to </span><em data-dcnode-id="6591"><span data-dcnode-id="6592" instrument_node="">V</span></em><sub data-dcnode-id="6587"><em data-dcnode-id="6589"><span data-dcnode-id="6590" instrument_node="">R</span></em><span data-dcnode-id="6588" instrument_node="">, ☉</span></sub><span data-dcnode-id="6586" instrument_node="">.</span></p><p data-dcnode-id="6580"><span data-dcnode-id="6584" instrument_node="">The asymmetric drift in the plane of the Galaxy of a population of stars is given by (e.g., Binney &amp; Tremaine </span><a class="cite" data-dcnode-id="6582" href="#apj447278r6" id="fnref-apj447278r6" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6583" instrument_node="">2008</span></a><span data-dcnode-id="6581" instrument_node="">)
</span></p><div class="display-eqn" data-dcnode-id="6574" id="apj447278fd4" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6575"><span class="texImage" data-dcnode-id="6578"><img alt="Equation (4)" data-dcnode-id="6579" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd4.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=ApEwNkiyE%2FsY%2FStVPeFlKyKtFqY%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6554"><span data-dcnode-id="6573" instrument_node="">assuming that the radial–vertical velocity moment σ</span><sub data-dcnode-id="6570"><em data-dcnode-id="6571"><span data-dcnode-id="6572" instrument_node="">RZ</span></em></sub><span data-dcnode-id="6569" instrument_node=""> = 0 in the Galactic plane, for symmetry reasons. For an exponential-disk tracer population (stellar tracer density </span><span class="inline-eqn" data-dcnode-id="6563" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6564"><span class="texImage" data-dcnode-id="6567"><img align="top" alt="$\nu _*\propto e^{-R/h_R}$" data-dcnode-id="6568" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278ieqn1.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=W2Ghfs8zh6p3g6djaEK7lt%2FzJ%2Fg%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></span><span data-dcnode-id="6562" instrument_node="">) with an exponentially declining radial-velocity dispersion (</span><span class="inline-eqn" data-dcnode-id="6556" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6557"><span class="texImage" data- </span></p><div class="display-eqn" data-dcnode-id="6548" id="apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6549"><span class="texImage" data-dcnode-id="6552"><img alt="Equation (5)" data-dcnode-id="6553" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd5.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=lLecgKIzQbe7pM5%2FjvBntllVp2s%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6510"><span data-dcnode-id="6547" instrument_node="">The main unknown in this relation is </span><em data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">X</span></em><sup data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">2</span></sup><span data-dcnode-id="6542" instrument_node=""> and its dependence on </span><em data-dcnode-id="6540"><span data-dcnode-id="6541" instrument_node="">R</span></em><span data-dcnode-id="6539" instrument_node="">. In the fit below, we assume a constant </span><em data-dcnode-id="6537"><span data-dcnode-id="6538" instrument_node="">X</span></em><sup data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">2</span></sup><span data-dcnode-id="6534" instrument_node=""> with </span><em data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">R</span></em><span data-dcnode-id="6531" instrument_node=""> for calculating the model's Gaussian line-of-sight velocity dispersion (see above), but to model the asymmetric drift more realistically, we use an </span><em data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">X</span></em><sup data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">2</span></sup><span data-dcnode-id="6526" instrument_node="">(</span><em data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">R</span></em><span data-dcnode-id="6523" instrument_node="">) coming from an axisymmetric equilibrium model for the DF </span><em data-dcnode-id="6521"><span data-dcnode-id="6522" instrument_node="">f</span></em><span data-dcnode-id="6520" instrument_node="">(</span><em data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">E</span></em><span data-dcnode-id="6517" instrument_node="">, </span><em data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">L</span></em><span data-dcnode-id="6514" instrument_node="">) in a disk with a constant circular velocity with radius. For this DF, we use a Dehnen DF (Dehnen </span><a class="cite" data-dcnode-id="6512" href="#apj447278r25" id="fnref-apj447278r25" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6513" instrument_node="">1999</span></a><span data-dcnode-id="6511" instrument_node="">) given by
</span></p><div class="display-eqn" data-dcnode-id="6504" id="apj447278fd6" xmlns:xlink="http://www.w3.org/1999/xlink"><span class="tex" data-dcnode-id="6505"><span class="texImage" data-dcnode-id="6508"><img alt="Equation (6)" data-dcnode-id="6509" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278fd6.gif?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=2Ph32OD5yMM7pOmSJwEaBy1ZnEE%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw"></span></span></div><p data-dcnode-id="6468"><span data-dcnode-id="6503" instrument_node="">where </span><em data-dcnode-id="6499"><span data-dcnode-id="6502" instrument_node="">R</span><sub data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">e</span></sub></em><span data-dcnode-id="6498" instrument_node="">, </span><em data-dcnode-id="6494"><span data-dcnode-id="6497" instrument_node="">L</span><sub data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">c</span></sub></em><span data-dcnode-id="6493" instrument_node="">, and Ω(</span><em data-dcnode-id="6489"><span data-dcnode-id="6492" instrument_node="">R</span><sub data-dcnode-id="6490"><span data-dcnode-id="6491" instrument_node="">e</span></sub></em><span data-dcnode-id="6488" instrument_node="">) are the radius, angular momentum, and angular velocity, respectively, of the circular orbit with energy </span><em data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">E</span></em><span data-dcnode-id="6485" instrument_node="">. Using the procedure given in Section 3.2 of Dehnen (</span><a class="cite" data-dcnode-id="6483" href="#apj447278r25" id="fnref-apj447278r25" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6484" instrument_node="">1999</span></a><span data-dcnode-id="6482" instrument_node="">), we choose the ν</span><sub data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">*</span></sub><span data-dcnode-id="6479" instrument_node="">(</span><em data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">R</span></em><span data-dcnode-id="6476" instrument_node="">) and σ</span><sub data-dcnode-id="6473"><em data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">R</span></em></sub><span data-dcnode-id="6472" instrument_node="">(</span><em data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">R</span></em><span data-dcnode-id="6469" instrument_node="">) functions such that they reproduce a disk with exponential surface density and velocity-dispersion profiles to an accuracy of a fraction of a percent at all radii.</span></p><p data-dcnode-id="6331"><span data-dcnode-id="6467" instrument_node="">The asymmetric drift for the Dehnen DF for a population with σ</span><sub data-dcnode-id="6464"><em data-dcnode-id="6465"><span data-dcnode-id="6466" instrument_node="">R</span></em></sub><span data-dcnode-id="6463" instrument_node="">(</span><em data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">R</span></em><sub data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">0</span></sub><span data-dcnode-id="6458" instrument_node="">) = 0.2 </span><em data-dcnode-id="6454"><span data-dcnode-id="6457" instrument_node="">V</span><sub data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">c</span></sub></em><span data-dcnode-id="6453" instrument_node="">(</span><em data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">R</span></em><sub data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">0</span></sub><span data-dcnode-id="6448" instrument_node="">) ≈ 44&nbsp;km&nbsp;s</span><sup data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">−1</span></sup><span data-dcnode-id="6445" instrument_node=""> is shown in Figure </span><a data-dcnode-id="6443" href="#apj447278f4" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6444" instrument_node="">4</span></a><span data-dcnode-id="6442" instrument_node=""> for </span><em data-dcnode-id="6438"><span data-dcnode-id="6441" instrument_node="">h</span><sub data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">R</span></sub></em><span data-dcnode-id="6437" instrument_node=""> = 3 kpc, </span><em data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">h</span></em><sub data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">σ</span></sub><span data-dcnode-id="6432" instrument_node=""> = 8 kpc. The same is shown for a population with σ</span><sub data-dcnode-id="6429"><em data-dcnode-id="6430"><span data-dcnode-id="6431" instrument_node="">R</span></em></sub><span data-dcnode-id="6428" instrument_node="">(</span><em data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">R</span></em><sub data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">0</span></sub><span data-dcnode-id="6423" instrument_node="">) = 0.1 </span><em data-dcnode-id="6419"><span data-dcnode-id="6422" instrument_node="">V</span><sub data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">c</span></sub></em><span data-dcnode-id="6418" instrument_node="">(</span><em data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">R</span></em><sub data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">0</span></sub><span data-dcnode-id="6413" instrument_node="">) ≈ 22&nbsp;km&nbsp;s</span><sup data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">−1</span></sup><span data-dcnode-id="6410" instrument_node="">, and the difference, normalized for the difference in σ</span><sub data-dcnode-id="6407"><em data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">R</span></em></sub><span data-dcnode-id="6406" instrument_node=""> between them, is small. For different values of </span><em data-dcnode-id="6402"><span data-dcnode-id="6405" instrument_node="">h</span><sub data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">R</span></sub></em><span data-dcnode-id="6401" instrument_node=""> and </span><em data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">h</span></em><sub data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">σ</span></sub><span data-dcnode-id="6396" instrument_node="">, we correct this function using Equation (</span><a class="eqnref" data-dcnode-id="6394" href="#apj447278fd5" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6395" instrument_node="">5</span></a><span data-dcnode-id="6393" instrument_node="">). As different values for </span><em data-dcnode-id="6389"><span data-dcnode-id="6392" instrument_node="">h</span><sub data-dcnode-id="6390"><span data-dcnode-id="6391" instrument_node="">R</span></sub></em><span data-dcnode-id="6388" instrument_node=""> and </span><em data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">h</span></em><sub data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">σ</span></sub><span data-dcnode-id="6383" instrument_node=""> lead to a different </span><em data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">X</span></em><sup data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">2</span></sup><span data-dcnode-id="6378" instrument_node="">(</span><em data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">R</span></em><span data-dcnode-id="6375" instrument_node="">), this approach is slightly incorrect, but tests show that the difference in </span><em data-dcnode-id="6371"><span data-dcnode-id="6374" instrument_node="">V</span><sub data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">a</span></sub></em><span data-dcnode-id="6370" instrument_node=""> is ≲ 5% for reasonable values of </span><em data-dcnode-id="6366"><span data-dcnode-id="6369" instrument_node="">h</span><sub data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">R</span></sub></em><span data-dcnode-id="6365" instrument_node=""> and </span><em data-dcnode-id="6363"><span data-dcnode-id="6364" instrument_node="">h</span></em><sub data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">σ</span></sub><span data-dcnode-id="6360" instrument_node="">. As the asymmetric drift is typically ≲ 20&nbsp;km&nbsp;s</span><sup data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">−1</span></sup><span data-dcnode-id="6357" instrument_node=""> for our sample, this leads to changes ≲ 1&nbsp;km&nbsp;s</span><sup data-dcnode-id="6355"><span data-dcnode-id="6356" instrument_node="">−1</span></sup><span data-dcnode-id="6354" instrument_node="">, which we can ignore. Similarly, differences in </span><em data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">X</span></em><sup data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">2</span></sup><span data-dcnode-id="6349" instrument_node=""> for our sample from this model are typically ≲ 0.2, also leading to changes ≲ 1&nbsp;km&nbsp;s</span><sup data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">−1</span></sup><span data-dcnode-id="6346" instrument_node="">, such that our assumption of a constant </span><em data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">X</span></em><sup data-dcnode-id="6342"><span data-dcnode-id="6343" instrument_node="">2</span></sup><span data-dcnode-id="6341" instrument_node="">(</span><em data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">R</span></em><span data-dcnode-id="6338" instrument_node="">) does not strongly bias the value of the inferred circular velocity. In the exponential-disk model, the asymmetric drift for our sample is ≲ 25&nbsp;km&nbsp;s</span><sup data-dcnode-id="6336"><span data-dcnode-id="6337" instrument_node="">−1</span></sup><span data-dcnode-id="6335" instrument_node=""> at all radii, even in the innermost disk (Freeman </span><a class="cite" data-dcnode-id="6333" href="#apj447278r36" id="fnref-apj447278r36" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="6334" instrument_node="">1987</span></a><span data-dcnode-id="6332" instrument_node="">).</span></p><figure class="boxout boxout-bdr-grey keyboard-focus-only" data-dcnode-id="6199" data-toolbar-img="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f4_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=UHK%2FWQWuoCoiHZhtTGdpgg4KaNs%3D" data-toolbar-link="apj447278f4" data-toolbar-title="Figure 4." data-toolbar-type="figure" id="apj447278f4" role="group" tabindex="-1" xmlns:xlink="http://www.w3.org/1999/xlink"><figure data-dcnode-id="6200"><div class="panzoom-container" data-dcnode-id="6317"><div class="panzoom-parent" data-dcnode-id="6329" style="overflow: hidden; position: relative; user-select: none; touch-action: none;"><img alt="Figure 4." class="panzoom" data-dcnode-id="6330" data-src="https://cfn-live-content-bucket-iop-org.s3.amazonaws.com/journals/0004-637X/759/2/131/revision1/apj447278f4_lr.jpg?AWSAccessKeyId=AKIAYDKQL6LTV7YY2HIK&amp;Expires=1653245354&amp;Signature=UHK%2FWQWuoCoiHZhtTGdpgg4KaNs%3D" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.static.iopscience.com/2.79.0/img/lazy-loading-placeholder.gif&amp;raw" style="transform: scale(1) translate(0px, 0px); backface-visibility: hidden; transform-origin: 50% 50%; cursor: move; transition: none 0s ease 0s; user-select: none; touch-action: none;"></div><div class="buttons zoom-tools" data-dcnode-id="6318"><button class="zoom-in" data-dcnode-id="6326"><span class="icon-zoomin" data-dcnode-id="6328"></span><span data-dcnode-id="6327" instrument_node="">

 = 0.2</span><em data-dcnode-id="6277"><span data-dcnode-id="6280" instrument_node="">V</span><sub data-dcnode-id="6278"><span data-dcnode-id="6279" instrument_node="">c</span></sub></em><span data-dcnode-id="6276" instrument_node="">(</span><em data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">R</span></em><sub data-dcnode-id="6272"><span data-dcnode-id="6273" instrument_node="">0</span></sub><span data-dcnode-id="6271" instrument_node="">) curve and show the σ</span><sub data-dcnode-id="6268"><em data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">R</span></em></sub><span data-dcnode-id="6267" instrument_node="">(</span><em data-dcnode-id="6265"><span data-dcnode-id="6266" instrument_node="">R</span></em><sub data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">0</span></sub><span data-dcnode-id="6262" instrument_node="">) = 0.1</span><em data-dcnode-id="6258"><span data-dcnode-id="6261" instrument_node="">V</span><sub data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">c</span></sub></em><span data-dcnode-id="6257" instrument_node="">(</span><em data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">R</span></em><sub data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">0</span></sub><span data-dcnode-id="6252" instrument_node="">) for comparison. The middle panel shows the difference in asymmetric drift for different values of </span><em data-dcnode-id="6248"><span data-dcnode-id="6251" instrument_node="">h</span><sub data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">R</span></sub></em><span data-dcnode-id="6247" instrument_node=""> and </span><em data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">h</span></em><sub data-dcnode-id="6243"><span data-dcnode-id="6244" instrument_node="">σ</span></sub><span data-dcnode-id="6242" instrument_node="">, using the solid curve from the top panel as the fiducial model. The bottom panel shows the actual asymmetric-drift correction as a fraction of the circular velocity used for the best-fit model below (solid line), and also shows the correction for </span><em data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">R</span></em><sub data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">0</span></sub><span data-dcnode-id="6237" instrument_node="">/</span><em data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">h</span></em><sub data-dcnode-id="6233"><span data-dcnode-id="6234" instrument_node="">σ</span></sub><span data-dcnode-id="6232" instrument_node=""> = 1 (dashed line). All curves in the middle and bottom panels have σ</span><sub data-dcnode-id="6229"><em data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">R</span></em></sub><span data-dcnode-id="6228" instrument_node="">(</span><em data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">R</span></em><sub data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">0</span></sub><span data-dcnode-id="6223" instrument_node="">) = 0.14</span><em data-dcnode-id="6219"><span data-dcnode-id="6222" instrument_node="">V</span><sub data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">c</span></sub></em><span data-dcnode-id="6218" instrument_node="">(</span><em data-dcnode-id="6216"><span data-dcnode-id="6217" instrument_node="">R</span></em><sub data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">0</span></sub><span data-dcnode-id="6213" instrument_node="">) (the best-fit value for the APOGEE sample, see below).</span></p></div><p class="mb-05 print-hide" data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">Download figure:</span></p><span class="btn-multi-block print-hide" data-dcnode-id="6202"><a class="btn btn-primary fig-dwnld-std-img" data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfn-live-content-bucket-iop-org.s3.amazonaw
