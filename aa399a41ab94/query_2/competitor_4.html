</span><h3 class="pr_typeid" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">eso2119 — Science Release</span></h3><span data-dcnode-id="509" instrument_node="">
</span><h1 class="pr_title" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Watch stars move around the Milky Way’s supermassive black hole in deepest images yet</span></h1><span data-dcnode-id="506" instrument_node="">
</span><p class="date" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">14 December 2021</span></p><span data-dcnode-id="503" instrument_node="">
</span><div class="archive-image popup" data-dcnode-id="486"><span data-dcnode-id="502" instrument_node="">
</span><a class="popup" data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso2119a.jpg" title="ESO’s VLTI images of stars at the centre of the Milky Way"><span data-dcnode-id="501" instrument_node="">
</span><div class="image-container" data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/newsfeature/eso2119a.jpg&amp;raw" style="padding:0;"><span data-dcnode-id="498" instrument_node="">
</span></div><span data-dcnode-id="496" instrument_node="">
</span></a><span data-dcnode-id="494" instrument_node="">
</span><a class="popup" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso2119b.jpg" title="Stars around Sgr A* in March 2021"></a><a class="popup" data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso2119c.jpg" title="Stars around Sgr A* in May 2021"></a><a class="popup" data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso2119d.jpg" title="Stars around Sgr A* in June 2021"></a><a class="popup" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso2119e.jpg" title="Stars around Sgr A* in July 2021"></a><a class="popup" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso0949l.jpg" title="Wide-field view of the centre of the Milky Way"></a><a class="popup" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.eso.org/images/screen/eso1835b.jpg" title="Sagittarius A* in the constellation of Sagittarius"></a><span data-dcnode-id="487" instrument_node="">
</span></div><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="484"></p><span data-dcnode-id="483" instrument_node="">
</span><p class="text_intro pr_first" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">The European Southern Observatory’s Very Large Telescope Interferometer (ESO’s VLTI) has obtained the deepest and sharpest images to date of the region around the supermassive black hole at the centre of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the centre of our Milky Way, the team has made the most precise measurement yet of the black hole’s mass.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="472" dir="ltr"><span data-dcnode-id="479" instrument_node="">“</span><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">We want to learn more about the black hole at the centre of the Milky Way, Sagittarius A*: How massive is it exactly? Does it rotate? Do stars around it behave exactly as we expect from Einstein’s general theory of relativity? The best way to answer these questions is to follow stars on orbits close to the supermassive black hole. And here we demonstrate that we can do that to a higher precision than ever before</span></em><span data-dcnode-id="476" instrument_node="">,” explains Reinhard Genzel, a director at the Max Planck Institute for Extraterrestrial Physics (MPE) in Garching, Germany who was awarded a Nobel Prize in 2020 for Sagittarius A* research. Genzel and his team’s latest results, which expand on their three-decade-long study of stars orbiting the Milky Way's supermassive black hole, are published today in two papers in </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Astronomy &amp; Astrophysics</span></em><span data-dcnode-id="473" instrument_node="">.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="466" dir="ltr"><span data-dcnode-id="470" instrument_node="">On a quest to find even more stars close to the black hole, the team, known as the GRAVITY collaboration, developed a new analysis technique that has allowed them to obtain the deepest and sharpest images yet of our Galactic Centre. “</span><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">The VLTI gives us this incredible spatial resolution and with the new images we reach deeper than ever before. We are stunned by their amount of detail, and by the action and number of stars they reveal around the black hole</span></em><span data-dcnode-id="467" instrument_node="">,” explains Julia Stadler, a researcher at the Max Planck Institute for Astrophysics in Garching who led the team’s imaging efforts during her time at MPE. Remarkably, they found a star, called S300, which had not been seen previously, showing how powerful this method is when it comes to spotting very faint objects close to Sagittarius A*.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463" dir="ltr"><span data-dcnode-id="464" instrument_node="">With their latest observations, conducted between March and July 2021, the team focused on making precise measurements of stars as they approached the black hole. This includes the record-holder star S29, which made its nearest approach to the black hole in late May 2021. It passed it at a distance of just 13 billion kilometres, about 90 times the Sun-Earth distance, at the stunning speed of 8740 kilometres per second. No other star has ever been observed to pass that close to, or travel that fast around, the black hole.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457" dir="ltr"><span data-dcnode-id="461" instrument_node="">The team’s measurements and images were made possible thanks to GRAVITY, a unique instrument that the collaboration developed for ESO’s VLTI, located in Chile. GRAVITY combines the light of all four 8.2-metre telescopes of ESO’s Very Large Telescope (VLT) using a technique called interferometry. This technique is complex, </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">“but in the end you arrive at images 20 times sharper than those from the individual VLT telescopes alone, revealing the secrets of the Galactic Centre,”</span></em><span data-dcnode-id="458" instrument_node=""> says Frank Eisenhauer from MPE, principal investigator of GRAVITY.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="451" dir="ltr"><span data-dcnode-id="455" instrument_node="">“</span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Following stars on close orbits around Sagittarius A* allows us to precisely probe the gravitational field around the closest massive black hole to Earth, to test General Relativity, and to determine the properties of the black hole,</span></em><span data-dcnode-id="452" instrument_node="">” explains Genzel. The new observations, combined with the team’s previous data, confirm that the stars follow paths exactly as predicted by General Relativity for objects moving around a black hole of mass 4.30 million times that of the Sun. This is the most precise estimate of the mass of the Milky Way’s central black hole to date. The researchers also managed to fine-tune the distance to Sagittarius A*, finding it to be 27 000 light-years away.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="439" dir="ltr"><span data-dcnode-id="449" instrument_node="">To obtain the new images, the astronomers used a machine-learning technique, called&nbsp;</span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mpa-garching.mpg.de/ift/"><span data-dcnode-id="448" instrument_node="">Information Field Theory</span></a><span data-dcnode-id="446" instrument_node="">. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. In addition to the GRAVITY observations, the team also used data from</span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eso.org/public/teles-instr/paranal-observatory/vlt/vlt-instr/naco/"><span data-dcnode-id="445" instrument_node=""> NACO</span></a><span data-dcnode-id="443" instrument_node=""> and</span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eso.org/public/teles-instr/paranal-observatory/vlt/vlt-instr/sinfoni/"><span data-dcnode-id="442" instrument_node=""> SINFONI</span></a><span data-dcnode-id="440" instrument_node="">, two former VLT instruments, as well as measurements from the Keck Observatory and NOIRLab’s Gemini Observatory in the US.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430" dir="ltr"><span data-dcnode-id="437" instrument_node="">GRAVITY will be updated later this decade to GRAVITY+, which will also be installed on ESO’s VLTI and will push the sensitivity further to reveal fainter stars even closer to the black hole. The team aims to eventually find stars so close that their orbits would feel the gravitational effects caused by the black hole’s rotation. ESO’s upcoming Extremely Large Telescope (ELT), under construction in the Chilean Atacama Desert, will further allow the team to measure the velocity of these stars with very high precision. “</span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">With GRAVITY+’s and the ELT’s powers combined, we will be able to find out how fast the black hole spins,</span></em><span data-dcnode-id="434" instrument_node="">” says Eisenhauer. “</span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Nobody has been able to do that so far.</span></em><span data-dcnode-id="431" instrument_node="">”</span></p><span data-dcnode-id="429" instrument_node="">
</span><h3 data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">More information</span></h3><p data-dcnode-id="422" dir="ltr"><span data-dcnode-id="426" instrument_node="">This research was presented in two GRAVITY Collaboration papers to appear in </span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Astronomy &amp; Astrophysics</span></em><span data-dcnode-id="423" instrument_node="">.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="416" dir="ltr"><span data-dcnode-id="420" instrument_node="">The team who authored the paper “The mass distribution in the Galactic Centre from interferometric astrometry of multiple stellar orbits” (</span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aanda.org/10.1051/0004-6361/202142465"><span data-dcnode-id="419" instrument_node="">doi:10.1051/0004-6361/202142465</span></a><span data-dcnode-id="417" instrument_node="">) is composed of: R. Abuter (European Southern Observatory, Garching, Germany [ESO]), A. Amorim (Universidade de Lisboa - Faculdade de Ciências, Portugal and Centro de Astrofísica e Gravitação, IST, Universidade de Lisboa, Portugal [CENTRA]),&nbsp; M. Bauböck (Max Planck Institute for Extraterrestrial Physics, Garching, Germany [MPE] and Department of Physics, University of Illinois, USA), J. P. Berger (Univ. Grenoble Alpes, CNRS, Grenoble, France [IPAG] and ESO), H. Bonnet (ESO), G. Bourdarot (IPAG and MPE), W. Brandner (Max Planck Institute for Astronomy, Heidelberg, Germany [MPIA]), V. Cardoso (CENTRA and CERN, Genève, Switzerland), Y. Clénet (Observatoire de Paris, Université PSL, CNRS, Sorbonne Université, Université de Paris, Meudon, France [LESIA]), Y. Dallilar (MPE), R. Davies (MPE), P. T. de Zeeuw (Sterrewacht Leiden, Leiden University [Leiden], The Netherlands and MPE), J. Dexter (Department of Astrophysical &amp; Planetary Sciences, JILA, Duane Physics Bldg.,University of Colorado [Colorado], Boulder, USA), A. Drescher (MPE), A. Eckart (1st Institute of Physics, University of Cologne, Germany [Cologne] and Max Planck Institute for Radio Astronomy, Bonn, Germany), F. Eisenhauer (MPE), N. M. Förster Schreiber (MPE), P. Garcia (Faculdade de Engenharia, Universidade do Porto, Portugal and CENTRA), F. Gao (Hamburger Sternwarte, Universität Hamburg, Germany and MPE), E. Gendron (LESIA), R. Genzel (MPE and Departments of Physics and Astronomy, Le Conte Hall, University of California, Berkeley, USA), S. Gillessen (MPE), M. Habibi (MPE), X. Haubois (European Southern Observatory, Santiago, Chile [ESO Chile]), G. Heißel (LESIA), T. Henning (MPIA), S. Hippler (MPIA), M. Horrobin (Cologne), L. Jochum (ESO Chile), L. Jocou (IPAG), A. Kaufer (ESO Chile), P. Kervella (LESIA), S. Lacour (LESIA), V. Lapeyrère (LLESIA), J.-B. Le Bouquin (IPAG), P. Léna (LESIA), D. Lutz (MPE), T. Ott (MPE), T. Paumard (LESIA), K. Perraut (IPAG), G. Perrin (LESIA), O. Pfuhl (ESO and MPE), S. Rabien (MPE), G. Rodríguez-Coira (LESIA), J. Shangguan (MPE), T. Shimizu (MPE), S. Scheithauer (MPIA), J. Stadler (MPE), O. Straub (MPE), C. Straubmeier (Cologne), E. Sturm (MPE), L. J. Tacconi (MPE), K. R. W. Tristram (ESO Chile), F. Vincent (LESIA), S. von Fellenberg (MPE), F. Widmann (MPE), E. Wieprecht (MPE), E. Wiezorrek (MPE), J. Woillez (ESO), S. Yazici MPE and Cologne), and A. Young (MPE).&nbsp;</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">The team who authored the paper “Deep images of the Galactic Center with GRAVITY” (</span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aanda.org/10.1051/0004-6361/202142459"><span data-dcnode-id="413" instrument_node="">doi:10.1051/0004-6361/202142459</span></a><span data-dcnode-id="411" instrument_node="">)&nbsp;is composed of: R. Abuter (ESO), P. Arras (Max Planck Institute for Astrophysics [MPA], Garching, Germany and Department of Physics, Technical University Munich [TUM], Garching, Germany), M. Bauböck (MPE and Department of Physics, University of Illinois, USA), H. Bonnet (ESO), W. Brandner (MPIA), G. Bourdarot (IPAG and MPE), V. Cardoso (CENTRA and CERN), Y. Clénet (LESIA), P. T. de Zeeuw (Leiden and MPE), J. Dexter (Colorado and MPE), Y. Dallilar (MPE), A. Drescher (MPE), A. Eckart (Cologne and Max Planck Institute for Radio Astronomy, Bonn, Germany), F. Eisenhauer (MPE), T. Enßlin (MPA), N. M. Förster Schreiber (MPE), P. Garcia (Faculdade de Engenharia, Universidade do Porto, Portugal and CENTRA), F. Gao (Hamburger Sternwarte, Universität Hamburg, Germany and MPE), &nbsp;E. Gendron (LESIA), R. Genzel (MPE and Departments of Physics and Astronomy, Le Conte Hall, University of California, Berkeley, USA), S. Gillessen (MPE), M. Habibi (MPE), X. Haubois (ESO Chile), G. Heißel (LESIA), T. Henning (MPIA), S. Hippler (MPIA), M. Horrobin (Cologne), A. Jiménez-Rosales (MPE), L. Jochum (ESO Chile), L. Jocou (IPAG), A. Kaufer (ESO Chile), P. Kervella (LESIA), S. Lacour (LESIA), V. Lapeyrère (LESIA), J.-B. Le Bouquin (IPAG), P. Léna (LESIA), D. Lutz (MPE), T. Ott (MPE) , T. Paumard (LESIA) , K. Perraut (IPAG) , G. Perrin (LESIA) , O. Pfuhl (ESO and MPE), S. Rabien (MPE), J. Shangguan (MPE), T. Shimizu (MPE), S. Scheithauer (MPIA), J. Stadler (MPE , O. Straub (MPE), C. Straubmeier (Cologne), E. Sturm (MPE), L.J. Tacconi (MPE), K. R. W. Tristram (ESO Chile), F. Vincent (LESIA), S. von Fellenberg (MPE), I. Waisberg (Department of Particle Physics &amp; Astrophysics, Weizmann Institute of Science, Israel and MPE), F. Widmann (MPE), E. Wieprecht (MPE), E. Wiezorrek (MPE), J. Woillez (ESO), S. Yazici (MPE and Cologne), A. Young (MPE) and G. Zins (ESO).</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">The European Southern Observatory (ESO) enables scientists worldwide to discover the secrets of the Universe for the benefit of all. We design, build and operate world-class observatories on the ground — which astronomers use to tackle exciting questions and spread the fascination of astronomy — and promote international collaboration in astronomy. Established as an intergovernmental&nbsp;organisation&nbsp;in 1962, today ESO is supported by 16 Member States (Austria, Belgium, the Czech Republic, Denmark, France, Finland, Germany, Ireland, Italy, the Netherlands, Poland, Portugal, Spain, Sweden, Switzerland and the United Kingdom), along with the host state of Chile and with Australia as a Strategic Partner. ESO’s headquarters and its visitor&nbsp;centre&nbsp;and planetarium, the ESO Supernova, are located close to Munich in Germany, while the Chilean Atacama Desert, a&nbsp;marvellous&nbsp;place with unique conditions to observe the sky, hosts our telescopes. ESO operates three observing sites: La Silla, Paranal and&nbsp;Chajnantor. At Paranal, ESO operates the Very Large Telescope and its Very Large Telescope Interferometer, as well as two survey telescopes, VISTA working in the infrared and the visible-light VLT Survey Telescope.&nbsp;Also&nbsp;at Paranal ESO will host and operate the Cherenkov Telescope Array South, the world’s largest and most sensitive gamma-ray observatory. Together with international partners, ESO operates APEX and ALMA on&nbsp;Chajnantor, two facilities that observe the skies in the&nbsp;millimetre&nbsp;and&nbsp;submillimetre&nbsp;range. At Cerro&nbsp;Armazones, near Paranal, we are building “the world’s biggest eye on the sky” — ESO’s Extremely Large Telescope. From our offices in Santiago, Chile we support our operations in the country and engage with Chilean partners and society.&nbsp;</span></p><span data-dcnode-id="406" instrument_node="">
