</span><dd data-dcnode-id="2080" id="abstract"><span data-dcnode-id="2081" instrument_node="">Astronomers have obtained the deepest and sharpest images to date of the region around the supermassive black hole at the center of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the centre of our Milky Way, the team has made the most precise measurement yet of the black hole's mass.
</span></dd><span data-dcnode-id="2079" instrument_node="">

</span><div class="hyphenate less-top-margin" data-dcnode-id="1852" id="story_text"><span data-dcnode-id="2043" instrument_node="">
</span><p class="lead" data-dcnode-id="2041" id="first"><span data-dcnode-id="2042" instrument_node="">The European Southern Observatory's Very Large Telescope Interferometer (ESO's VLTI) has obtained the deepest and sharpest images to date of the region around the supermassive black hole at the centre of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the centre of our Milky Way, the team has made the most precise measurement yet of the black hole's mass.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><div class="mobile-top-rectangle hidden-md hidden-lg" data-dcnode-id="2022"><span data-dcnode-id="2039" instrument_node="">
</span><div class="textrule" data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node="">
</span><span data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">advertisement</span></span><span data-dcnode-id="2035" instrument_node="">
</span></div><span data-dcnode-id="2033" instrument_node="">
</span><span data-dcnode-id="2031" instrument_node="">
</span><div data-dcnode-id="2026" id="adslot-mobile-top-rectangle"><span data-dcnode-id="2030" instrument_node="">
</span><span data-dcnode-id="2027" instrument_node="">
</span></div><span data-dcnode-id="2025" instrument_node="">
</span><hr class="hrrule" data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">
</span></div><span data-dcnode-id="2021" instrument_node="">
</span><div data-dcnode-id="1995" id="text"><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">"We want to learn more about the black hole at the centre of the Milky Way, Sagittarius A*: How massive is it exactly? Does it rotate? Do stars around it behave exactly as we expect from Einstein's general theory of relativity? The best way to answer these questions is to follow stars on orbits close to the supermassive black hole. And here we demonstrate that we can do that to a higher precision than ever before," explains Reinhard Genzel, a director at the Max Planck Institute for Extraterrestrial Physics (MPE) in Garching, Germany who was awarded a Nobel Prize in 2020 for Sagittarius A* research. Genzel and his team's latest results, which expand on their three-decade-long study of stars orbiting the Milky Way's supermassive black hole, are published today in two papers in </span><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Astronomy &amp; Astrophysics</span></em><span data-dcnode-id="2016" instrument_node="">.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">On a quest to find even more stars close to the black hole, the team, known as the GRAVITY collaboration, developed a new analysis technique that has allowed them to obtain the deepest and sharpest images yet of our Galactic Centre. "The VLTI gives us this incredible spatial resolution and with the new images we reach deeper than ever before. We are stunned by their amount of detail, and by the action and number of stars they reveal around the black hole," explains Julia Stadler, a researcher at the Max Planck Institute for Astrophysics in Garching who led the team's imaging efforts during her time at MPE. Remarkably, they found a star, called S300, which had not been seen previously, showing how powerful this method is when it comes to spotting very faint objects close to Sagittarius A*.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">With their latest observations, conducted between March and July 2021, the team focused on making precise measurements of stars as they approached the black hole. This includes the record-holder star S29, which made its nearest approach to the black hole in late May 2021. It passed it at a distance of just 13 billion kilometres, about 90 times the Sun-Earth distance, at the stunning speed of 8740 kilometres per second. No other star has ever been observed to pass that close to, or travel that fast around, the black hole.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">The team's measurements and images were made possible thanks to GRAVITY, a unique instrument that the collaboration developed for ESO's VLTI, located in Chile. GRAVITY combines the light of all four 8.2-metre telescopes of ESO's Very Large Telescope (VLT) using a technique called interferometry. This technique is complex, "but in the end you arrive at images 20 times sharper than those from the individual VLT telescopes alone, revealing the secrets of the Galactic Centre," says Frank Eisenhauer from MPE, principal investigator of GRAVITY.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">"Following stars on close orbits around Sagittarius A* allows us to precisely probe the gravitational field around the closest massive black hole to Earth, to test General Relativity, and to determine the properties of the black hole," explains Genzel. The new observations, combined with the team's previous data, confirm that the stars follow paths exactly as predicted by General Relativity for objects moving around a black hole of mass 4.30 million times that of the Sun. This is the most precise estimate of the mass of the Milky Way's central black hole to date. The researchers also managed to fine-tune the distance to Sagittarius A*, finding it to be 27,000 light-years away.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">To obtain the new images, the astronomers used a machine-learning technique, called Information Field Theory. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. In addition to the GRAVITY observations, the team also used data from NACO and SINFONI, two former VLT instruments, as well as measurements from the Keck Observatory and NOIRLab's Gemini Observatory in the US.</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">GRAVITY will be updated later this decade to GRAVITY+, which will also be installed on ESO's VLTI and will push the sensitivity further to reveal fainter stars even closer to the black hole. The team aims to eventually find stars so close that their orbits would feel the gravitational effects caused by the black hole's rotation. ESO's upcoming Extremely Large Telescope (ELT), under construction in the Chilean Atacama Desert, will further allow the team to measure the velocity of these stars with very high precision. "With GRAVITY+'s and the ELT's powers combined, we will be able to find out how fast the black hole spins," says Eisenhauer. "Nobody has been able to do that so far."</span></p><span data-dcnode-id="1996" instrument_node="">
</span></div><span data-dcnode-id="1994" instrument_node="">

</span><span data-dcnode-id="70" instrument_node=""> </span><span data-dcnode-id="68" instrument_node=""> </span><div aria-labelledby="shareModalLabel" class="modal fade" data-dcnode-id="19" id="shareModal" role="dialog" tabindex="-1"><span data-dcnode-id="67" instrument_node=""> </span><div class="modal-dialog" data-dcnode-id="21" id="shareModalLabel" role="document"><span data-dcnode-id="66" instrument_node=""> </span><div class="modal-content" data-dcnode-id="23"><span data-dcnode-id="65" instrument_node=""> </span><div class="modal-header" data-dcnode-id="60"><span data-dcnode-id="64" instrument_node=""> </span><h4 class="modal-title" data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">Share this page ...</span></h4><span data-dcnode-id="61" instrument_node=""> </span></div><span data-dcnode-id="59" instrument_node=""> </span><div class="modal-body" data-dcnode-id="31"><span data-dcnode-id="58" instrument_node=""> </span><div data-dcnode-id="49"><span data-dcnode-id="57" instrument_node=""> </span><strong data-dcnode-id="55"><span data-dcnode-id="56" instrument_node="">Deepest images yet of Milky Way's supermassive black hole</span></strong><br data-dcnode-id="54"><span data-dcnode-id="53" instrument_node=""> </span><a data-dcnode-id="51" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2021/12/211214104235.htm"><span data-dcnode-id="52" instrument_node="">https://www.sciencedaily.com/releases/2021/12/211214104235.htm</span></a><span data-dcnode-id="50" instrument_node=""> </span></div><span data-dcnode-id="48" instrument_node=""> </span><div class="share-summary" data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">Astronomers have obtained the deepest and sharpest images to date of the region around the supermassive black hole at the center of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the centre of our Milky Way, the team has made the most precise measurement yet of the black hole's mass.</span></div><span data-dcnode-id="45" instrument_node=""> </span><div class="ssk-group" data-dcnode-id="33" data-url="https://www.sciencedaily.com/releases/2021/12/211214104235.htm"><span data-dcnode-id="44" instrument_node=""> </span><a class="ssk ssk-facebook" data-dcnode-id="43" data-ssk-ready="true"></a><span data-dcnode-id="42" instrument_node=""> </span><a class="ssk ssk-twitter" data-dcnode-id="41" data-ssk-ready="true"></a><span data-dcnode-id="40" instrument_node=""> </span><a class="ssk ssk-google-plus" data-dcnode-id="39" data-ssk-ready="true"></a><span data-dcnode-id="38" instrument_node=""> </span><a class="ssk ssk-pinterest" data-dcnode-id="37" data-ssk-ready="true"></a><span data-dcnode-id="36" instrument_node=""> </span><a class="ssk ssk-linkedin" data-dcnode-id="35" data-ssk-ready="true"></a><span data-dcnode-id="34" instrument_node=""> </span></div><span data-dcnode-id="32" instrument_node=""> </span></div><span data-dcnode-id="30" instrument_node=""> </span><div class="modal-footer" data-dcnode-id="25"><span data-dcnode-id="29" instrument_node=""> </span><button class="btn btn-default" data-dcnode-id="27" data-dismiss="modal" type="button"><span data-dcnode-id="28" instrument_node="">Close</span></button><span data-dcnode-id="26" instrument_node=""> </span></div><span data-dcnode-id="24" instrument_node=""> </span></div><span data-dcnode-id="22" instrument_node=""> </span></div><span data-dcnode-id="20" instrument_node=""> </span></div><span data-dcnode-id="18" instrument_node=""> </span></footer><span data-dcnode-id="5" instrument_node="">
