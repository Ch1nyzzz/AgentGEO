</span><h1 class="text-extra-large line-low mb-2" data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">Watch stars move around the Milky Way's supermassive black hole in deepest images yet</span></h1><span data-dcnode-id="3528" instrument_node="">
</span><p class="article-byline text-low" data-dcnode-id="3523"><span data-dcnode-id="3527" instrument_node="">
                                        by                                         </span><a class="article-byline__link" data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eso.org/public/" target="_blank"><span data-dcnode-id="3526" instrument_node="">ESO</span></a><span data-dcnode-id="3524" instrument_node="">
</span></p><span data-dcnode-id="3522" instrument_node="">
</span><div class="mt-4 article-main" data-dcnode-id="2274"><span data-dcnode-id="3521" instrument_node="">
</span><div class="article-gallery lightGallery" data-dcnode-id="3508"><span data-dcnode-id="3520" instrument_node="">
</span><div data-dcnode-id="3510" data-src="https://scx2.b-cdn.net/gfx/news/2021/watch-stars-move-aroun.jpg" data-sub-html="These annotated images, obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) between March and July 2021, show stars orbiting very close to Sgr A*, the supermassive black hole at the heart of the Milky Way. One of these stars, named S29, was observed as it was making its closest approach to the black hole at 13 billion kilometres, just 90 times the distance between the Sun and Earth. Another star, named S300, was detected for the first time in the new VLTI observations. To obtain the new images, the astronomers used a machine-learning technique, called Information Field Theory. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. Credit: ESO/GRAVITY collaboration" data-thumb="https://scx1.b-cdn.net/csz/news/tmb/2021/watch-stars-move-aroun.jpg"><span data-dcnode-id="3519" instrument_node="">
</span><figure class="article-img" data-dcnode-id="3512"><span data-dcnode-id="3518" instrument_node="">
</span><img alt="Watch stars move around the Milky Way's supermassive black hole in deepest images yet" data-dcnode-id="3517" height="328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scx1.b-cdn.net/csz/news/800a/2021/watch-stars-move-aroun.jpg&amp;raw" title="These annotated images, obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) between March and July 2021, show stars orbiting very close to Sgr A*, the supermassive black hole at the heart of the Milky Way. One of these stars, named S29, was observed as it was making its closest approach to the black hole at 13 billion kilometres, just 90 times the distance between the Sun and Earth. Another star, named S300, was detected for the first time in the new VLTI observations. To obtain the new images, the astronomers used a machine-learning technique, called Information Field Theory. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. Credit: ESO/GRAVITY collaboration" width="800"><span data-dcnode-id="3516" instrument_node="">
</span><figcaption class="text-darken text-low-up text-truncate-js text-truncate mt-3" data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">
                These annotated images, obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) between March and July 2021, show stars orbiting very close to Sgr A*, the supermassive black hole at the heart of the Milky Way. One of these stars, named S29, was observed as it was making its closest approach to the black hole at 13 billion kilometres, just 90 times the distance between the Sun and Earth. Another star, named S300, was detected for the first time in the new VLTI observations. To obtain the new images, the astronomers used a machine-learning technique, called Information Field Theory. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. Credit: ESO/GRAVITY collaboration
            </span></figcaption><span data-dcnode-id="3513" instrument_node=""> </span></figure><span data-dcnode-id="3511" instrument_node="">
</span></div><span data-dcnode-id="3509" instrument_node="">
</span></div><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">The European Southern Observatory's Very Large Telescope Interferometer (ESO's VLTI) has obtained the deepest and sharpest images to date of the region around the supermassive black hole at the center of the Milky Way. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the center of the Milky Way, the team has made the most precise measurement yet of the black hole's mass.

                                         
                                                  </span></p><section class="article-banner first-banner ads-336x280" data-dcnode-id="3496"><span data-dcnode-id="3505" instrument_node="">
</span><span data-dcnode-id="3503" instrument_node="">
</span><div data-dcnode-id="3498" id="div-gpt-ad-1449240174198-2"><span data-dcnode-id="3502" instrument_node="">
</span><span data-dcnode-id="3499" instrument_node="">
</span></div><span data-dcnode-id="3497" instrument_node="">
</span></section><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3487"><span data-dcnode-id="3494" instrument_node="">"We want to learn more about the black hole at the center of the Milky Way, Sagittarius A*: How massive is it exactly? Does it rotate? Do stars around it behave exactly as we expect from Einstein's general theory of relativity? The best way to answer these questions is to follow stars on orbits close to the supermassive black hole. And here we demonstrate that we can do that to a higher precision than ever before," explains Reinhard Genzel, a director at the Max Planck Institute for Extraterrestrial Physics (MPE) in Garching, Germany who was awarded a Nobel Prize in 2020 for Sagittarius A* research. Genzel and his team's latest results, which expand on their three-decade-long study of stars orbiting the Milky Way's </span><a class="textTag" data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/supermassive%2Bblack%2Bhole/" rel="tag"><span data-dcnode-id="3493" instrument_node="">supermassive black hole</span></a><span data-dcnode-id="3491" instrument_node="">, are published today in two papers in </span><i data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Astronomy &amp; Astrophysics</span></i><span data-dcnode-id="3488" instrument_node="">.</span></p><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">On a quest to find even more stars close to the black hole, the team, known as the GRAVITY collaboration, developed a new analysis technique that has allowed them to obtain the deepest and sharpest images yet of the galactic center. "The VLTI gives us this incredible spatial resolution, and with the new images, we reach deeper than ever before. We are stunned by their amount of detail, and by the action and number of stars they reveal around the black hole," explains Julia Stadler, a researcher at the Max Planck Institute for Astrophysics in Garching who led the team's imaging efforts during her time at MPE. Remarkably, they found a star, called S300, which had not been seen previously, showing how powerful this method is when it comes to spotting very faint objects close to Sagittarius A*.</span></p><span data-dcnode-id="3483" instrument_node="">
</span><figure class="mb-4" data-dcnode-id="2944" itemscope="" itemtype="http://schema.org/VideoObject"><span data-dcnode-id="3482" instrument_node="">

</span><meta content="This animation shows the orbits of the stars S29 and S55 as they move close to Sgr A* (centre), the supermassive black hole at the heart of the Milky Way. As we follow the stars along in their orbits, we see real images of the region obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) in March, May, June and July 2021. In addition to S29 and S55, the images also show two fainter stars, S62 and S300, the latter having only been discovered following these new VLTI observations. Credit: ESO/GRAVITY collaboration/L. Calçada" data-dcnode-id="3477" itemprop="description"><span data-dcnode-id="3476" instrument_node="">

</span><figcaption class="text-darken text-low-up mt-4" data-dcnode-id="2946" itemprop="caption"><span data-dcnode-id="2947" instrument_node="">This animation shows the orbits of the stars S29 and S55 as they move close to Sgr A* (centre), the supermassive black hole at the heart of the Milky Way. As we follow the stars along in their orbits, we see real images of the region obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) in March, May, June and July 2021. In addition to S29 and S55, the images also show two fainter stars, S62 and S300, the latter having only been discovered following these new VLTI observations. Credit: ESO/GRAVITY collaboration/L. Calçada</span></figcaption><span data-dcnode-id="2945" instrument_node="">
</span></figure><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">With their latest observations, conducted between March and July 2021, the team focused on making precise measurements of stars as they approached the black hole. This includes the record-holder star S29, which made its nearest approach to the black hole in late May 2021. It passed it at a distance of just 13 billion kilometers, about 90 times the sun-Earth distance, at the stunning speed of 8740 kilometers per second. No other star has ever been observed to pass that close to, or travel that fast around, the black hole.</span></p><span data-dcnode-id="2941" instrument_node="">
</span><div class="w-100 mb-4 ads" data-dcnode-id="2930"><span data-dcnode-id="2940" instrument_node="">
</span><span data-dcnode-id="2938" instrument_node="">
</span><span data-dcnode-id="2936" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0536483524803400" data-ad-format="auto" data-ad-slot="5350699939" data-dcnode-id="2935" style="display:block"></ins><span data-dcnode-id="2934" instrument_node="">
</span><span data-dcnode-id="2931" instrument_node="">
</span></div><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">The team's measurements and images were made possible thanks to GRAVITY, a unique instrument that the collaboration developed for ESO's VLTI, located in Chile. GRAVITY combines the light of all four 8.2-meter telescopes of ESO's Very Large Telescope (VLT) using a technique called interferometry. This technique is complex, "but in the end you arrive at images 20 times sharper than those from the individual VLT telescopes alone, revealing the secrets of the galactic center," says Frank Eisenhauer from MPE, principal investigator of GRAVITY.</span></p><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">"Following stars on close orbits around Sagittarius A* allows us to precisely probe the gravitational field around the closest massive black hole to Earth, to test General Relativity, and to determine the properties of the black hole," explains Genzel. The new observations, combined with the team's previous data, confirm that the stars follow paths exactly as predicted by general relativity for objects moving around a black hole of mass 4.30 million times that of the sun. This is the most precise estimate of the mass of the Milky Way's central black hole to date. The researchers also managed to fine-tune the distance to Sagittarius A*, finding it to be 27,000 light-years away.</span></p><span data-dcnode-id="2923" instrument_node="">
</span><figure class="mb-4" data-dcnode-id="2385" itemscope="" itemtype="http://schema.org/VideoObject"><span data-dcnode-id="2922" instrument_node="">
</span><meta content="Watch stars move around the Milky Way's supermassive black hole in deepest images yet" data-dcnode-id="2921" itemprop="name"><span data-dcnode-id="2920" instrument_node="">
</span><meta content="https://www.youtube.com/watch/?v=dXAU0gzsPOw" data-dcnode-id="2919" itemprop="url"><span data-dcnode-id="2918" instrument_node="">
</span><meta content="This zoom video sequence starts with a broad view of the Milky Way. We then dive into the dusty central region to take a much closer look. There, a swarm of stars orbit around an invisible object: a supermassive black hole, 4.3 million times that of the Sun. As we get closer to it, we see these stars, as observed by the NACO instrument on ESO’s Very Large Telescope (the last observation being from 2019). As we zoom in further, we see stars even closer to the black hole, observed with the GRAVITY instrument on ESO’s Very Large Telescope Interferometry in mid-2021. Credit: ESO/GRAVITY collaboration/L. Calçada,&nbsp;N. Risinger (skysurvey.org), DSS. Music: Johan Monel" data-dcnode-id="2917" itemprop="description"><span data-dcnode-id="2916" instrument_node="">

th class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2418" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="2413"><use class="ytp-svg-shadow" data-dcnode-id="2415" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2416" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2414" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2409"><use class="ytp-svg-shadow" data-dcnode-id="2411" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2412" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2410" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=dXAU0gzsPOw" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="2391" instrument_node="">
</span></div><span data-dcnode-id="2389" instrument_node="">
</span><figcaption class="text-darken text-low-up mt-4" data-dcnode-id="2387" itemprop="caption"><span data-dcnode-id="2388" instrument_node="">This zoom video sequence starts with a broad view of the Milky Way. We then dive into the dusty central region to take a much closer look. There, a swarm of stars orbit around an invisible object: a supermassive black hole, 4.3 million times that of the Sun. As we get closer to it, we see these stars, as observed by the NACO instrument on ESO’s Very Large Telescope (the last observation being from 2019). As we zoom in further, we see stars even closer to the black hole, observed with the GRAVITY instrument on ESO’s Very Large Telescope Interferometry in mid-2021. Credit: ESO/GRAVITY collaboration/L. Calçada,&nbsp;N. Risinger (skysurvey.org), DSS. Music: Johan Monel</span></figcaption><span data-dcnode-id="2386" instrument_node="">
</span></figure><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">To obtain the new images, the astronomers used a machine-learning technique called information field theory. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. In addition to the GRAVITY observations, the team also used data from NACO and SINFONI, two former VLT instruments, as well as measurements from the Keck Observatory and NOIRLab's Gemini Observatory in the US.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node="">GRAVITY will be updated later this decade to GRAVITY+, which will also be installed on ESO's VLTI and will push the sensitivity further to reveal fainter stars even closer to the black hole. The team eventually aims to find stars so close that their orbits would feel the gravitational effects caused by the black hole's rotation. ESO's upcoming Extremely Large Telescope (ELT), under construction in the Chilean Atacama Desert, will further allow the team to measure the velocity of these </span><a class="textTag" data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/stars/" rel="tag"><span data-dcnode-id="2380" instrument_node="">stars</span></a><span data-dcnode-id="2378" instrument_node=""> with very high precision. "With the GRAVITY+ and the ELT's power combined, we will be able to find out how fast the black hole spins," says Eisenhauer. "Nobody has been able to do that so far."</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2375" instrument_node="">This research was presented in two GRAVITY Collaboration papers to appear in </span><i data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Astronomy &amp; Astrophysics</span></i><span data-dcnode-id="2372" instrument_node="">.
