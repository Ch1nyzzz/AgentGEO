</span><h1 data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">A poster-size image of the beautiful barred spiral galaxy NGC 1300</span></h1><span data-dcnode-id="478" instrument_node="">
</span><div class="archive-image archive-image-dark popup" data-dcnode-id="471"><span data-dcnode-id="477" instrument_node="">
</span><a class="popup" data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.spacetelescope.org/archives/images/screen/opo0501a.jpg" title="A poster-size image of the beautiful barred spiral galaxy NGC 1300"><span data-dcnode-id="476" instrument_node="">
</span><img alt="A poster-size image of the beautiful barred spiral galaxy NGC 1300" class="img-responsive" data-dcnode-id="475" sizes="(min-width: 1000px) 700px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.spacetelescope.org/archives/images/thumb700x/opo0501a.jpg&amp;raw" srcset="/media/archives/images/medium/opo0501a.jpg 320w, https://cdn.spacetelescope.org/archives/images/news/opo0501a.jpg 180w, /media/archives/images/newsmini/opo0501a.jpg 60w, https://cdn.spacetelescope.org/archives/images/screen/opo0501a.jpg 1280w, https://cdn.spacetelescope.org/archives/images/thumb700x/opo0501a.jpg 700w, /media/archives/images/thumbs/opo0501a.jpg 122w"><span data-dcnode-id="474" instrument_node="">
</span></a><span data-dcnode-id="472" instrument_node="">
</span></div><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="469"></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">One of the largest Hubble Space Telescope images ever made of a complete galaxy is being unveiled today at the American Astronomical Society meeting in San Diego, Calif.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">The Hubble telescope captured a display of starlight, glowing gas, and silhouetted dark clouds of interstellar dust in this 4-foot-by-8-foot image of the barred spiral galaxy NGC 1300. NGC 1300 is considered to be prototypical of barred spiral galaxies. Barred spirals differ from normal spiral galaxies in that the arms of the galaxy do not spiral all the way into the center, but are connected to the two ends of a straight bar of stars containing the nucleus at its center.</span></p><p data-dcnode-id="463"></p><span data-dcnode-id="462" instrument_node="">
</span><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Credit:</span></strong><div class="credit" data-dcnode-id="446"><p data-dcnode-id="447"><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nasa.gov/"><span data-dcnode-id="459" instrument_node="">NASA</span></a><span data-dcnode-id="457" instrument_node="">, </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esa.int/"><span data-dcnode-id="456" instrument_node="">ESA</span></a><span data-dcnode-id="454" instrument_node="">, and The Hubble Heritage Team (</span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stsci.edu/"><span data-dcnode-id="453" instrument_node="">STScI</span></a><span data-dcnode-id="451" instrument_node="">/</span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aura-astronomy.org/"><span data-dcnode-id="450" instrument_node="">AURA</span></a><span data-dcnode-id="448" instrument_node="">)</span></p></div><span data-dcnode-id="445" instrument_node="">
