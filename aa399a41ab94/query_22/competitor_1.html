</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="668" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="677"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="2664" style="display:none"><span data-dcnode-id="2665" instrument_node="">Spiral galaxy with a central bar-shaped structure composed of stars</span></div><span data-dcnode-id="2663" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2649"><div class="thumbinner" data-dcnode-id="2650" style="width:352px;"><a class="image" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHubble2005-01-barred-spiral-galaxy-NGC1300.jpg"><img alt="" class="thumbimage" data-dcnode-id="2662" data-file-height="3787" data-file-width="6637" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg/350px-Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg/525px-Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/52/Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg/700px-Hubble2005-01-barred-spiral-galaxy-NGC1300.jpg 2x" width="350"></a><span data-dcnode-id="2660" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2651"><div class="magnify" data-dcnode-id="2658"><a class="internal" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHubble2005-01-barred-spiral-galaxy-NGC1300.jpg" title="Enlarge"></a></div><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NGC_1300" title="NGC 1300"><span data-dcnode-id="2657" instrument_node="">NGC 1300</span></a><span data-dcnode-id="2655" instrument_node="">, viewed nearly face-on; </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_Space_Telescope" title="Hubble Space Telescope"><span data-dcnode-id="2654" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="2652" instrument_node=""> image</span></div></div></div><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2647" instrument_node="">A </span><b data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">barred spiral galaxy</span></b><span data-dcnode-id="2644" instrument_node=""> is a </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiral_galaxy" title="Spiral galaxy"><span data-dcnode-id="2643" instrument_node="">spiral galaxy</span></a><span data-dcnode-id="2641" instrument_node=""> with a central bar-shaped structure composed of </span><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="2640" instrument_node="">stars</span></a><span data-dcnode-id="2638" instrument_node="">.</span><sup class="reference" data-dcnode-id="2635" id="cite_ref-1"><a data-dcnode-id="2636" href="#cite_note-1"><span data-dcnode-id="2637" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2634" instrument_node=""> Bars are found in about half of all spiral galaxies.</span><sup class="reference" data-dcnode-id="2631" id="cite_ref-mihalas1968_2-0"><a data-dcnode-id="2632" href="#cite_note-mihalas1968-2"><span data-dcnode-id="2633" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2628" id="cite_ref-timothy1998_3-0"><a data-dcnode-id="2629" href="#cite_note-timothy1998-3"><span data-dcnode-id="2630" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2627" instrument_node=""> Bars generally affect both the motions of stars and </span><a class="mw-redirect" data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstellar_gas" title="Interstellar gas"><span data-dcnode-id="2626" instrument_node="">interstellar gas</span></a><span data-dcnode-id="2624" instrument_node=""> within spiral galaxies and can affect </span><a class="mw-redirect" data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiral_arm" title="Spiral arm"><span data-dcnode-id="2623" instrument_node="">spiral arms</span></a><span data-dcnode-id="2621" instrument_node=""> as well.</span><sup class="reference" data-dcnode-id="2618" id="cite_ref-mihalas1968_2-1"><a data-dcnode-id="2619" href="#cite_note-mihalas1968-2"><span data-dcnode-id="2620" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2617" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way_Galaxy" title="Milky Way Galaxy"><span data-dcnode-id="2616" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="2614" instrument_node="">, where the </span><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="2613" instrument_node="">Solar System</span></a><span data-dcnode-id="2611" instrument_node=""> is located, is classified as a barred spiral galaxy.</span><sup class="reference" data-dcnode-id="2608" id="cite_ref-4"><a data-dcnode-id="2609" href="#cite_note-4"><span data-dcnode-id="2610" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2607" instrument_node="">
</span></p><p data-dcnode-id="2587"><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Hubble" title="Edwin Hubble"><span data-dcnode-id="2605" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="2603" instrument_node=""> classified spiral galaxies of this type as "SB" (spiral, barred) in his </span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_sequence" title="Hubble sequence"><span data-dcnode-id="2602" instrument_node="">Hubble sequence</span></a><span data-dcnode-id="2600" instrument_node=""> and arranged them into sub-categories based on how open the arms of the spiral are. SBa types feature tightly bound arms, while SBc types are at the other extreme and have loosely bound arms. SBb-type galaxies lie in between the two. SB0 is a barred </span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenticular_galaxy" title="Lenticular galaxy"><span data-dcnode-id="2599" instrument_node="">lenticular galaxy</span></a><span data-dcnode-id="2597" instrument_node="">. A new type, SBm, was subsequently created to describe somewhat </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barred_irregular_galaxy" title="Barred irregular galaxy"><span data-dcnode-id="2596" instrument_node="">irregular barred spirals</span></a><span data-dcnode-id="2594" instrument_node="">, such as the </span><a data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magellanic_Clouds" title="Magellanic Clouds"><span data-dcnode-id="2593" instrument_node="">Magellanic Clouds</span></a><span data-dcnode-id="2591" instrument_node="">, which were once classified as irregular galaxies, but have since been found to contain barred spiral structures. Among other types in Hubble's classifications for the galaxies are the spiral galaxy, </span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elliptical_galaxy" title="Elliptical galaxy"><span data-dcnode-id="2590" instrument_node="">elliptical galaxy</span></a><span data-dcnode-id="2588" instrument_node=""> and irregular galaxy.
</span></p><span data-dcnode-id="2586" instrument_node="">

</span><h2 data-dcnode-id="2504"><span class="mw-headline" data-dcnode-id="2512" id="Bars"><span data-dcnode-id="2513" instrument_node="">Bars</span></span><span class="mw-editsection" data-dcnode-id="2505"><span class="mw-editsection-bracket" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">[</span></span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarred_spiral_galaxy%26action%3Dedit%26section%3D1" title="Edit section: Bars"><span data-dcnode-id="2509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2503" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2497" role="note"><span data-dcnode-id="2500" instrument_node="">Further information: </span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Density_wave_theory%23Galactic_spiral_arms" title="Density wave theory"><span data-dcnode-id="2499" instrument_node="">Density wave theory §&nbsp;Galactic spiral arms</span></a></div><span data-dcnode-id="2496" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2478"><div class="thumbinner" data-dcnode-id="2479" style="width:222px;"><a class="image" data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_closer_look_at_IC_5201.jpg"><img alt="" class="thumbimage" data-dcnode-id="2495" data-file-height="1322" data-file-width="1280" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/44/A_closer_look_at_IC_5201.jpg/220px-A_closer_look_at_IC_5201.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/44/A_closer_look_at_IC_5201.jpg/330px-A_closer_look_at_IC_5201.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/44/A_closer_look_at_IC_5201.jpg/440px-A_closer_look_at_IC_5201.jpg 2x" width="220"></a><span data-dcnode-id="2493" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2480"><div class="magnify" data-dcnode-id="2491"><a class="internal" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_closer_look_at_IC_5201.jpg" title="Enlarge"></a></div><span data-dcnode-id="2490" instrument_node="">Barred spiral galaxy </span><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IC_5201" title="IC 5201"><span data-dcnode-id="2489" instrument_node="">IC 5201</span></a><span data-dcnode-id="2487" instrument_node="">, located more than 40 million light-years from Earth. It was discovered by </span><a class="external text" data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.klima-luft.de/steinicke/ngcic/persons/lunt.htm" rel="nofollow"><span data-dcnode-id="2486" instrument_node="">Joseph Lunt</span></a><span data-dcnode-id="2484" instrument_node="">.</span><sup class="reference" data-dcnode-id="2481" id="cite_ref-5"><a data-dcnode-id="2482" href="#cite_note-5"><span data-dcnode-id="2483" instrument_node="">[5]</span></a></sup></div></div></div><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2476" instrument_node="">Barred galaxies are apparently predominant, with surveys showing that up to two-thirds of all spiral galaxies contain a bar.</span><sup class="reference" data-dcnode-id="2473" id="cite_ref-6"><a data-dcnode-id="2474" href="#cite_note-6"><span data-dcnode-id="2475" instrument_node="">[6]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="2466" style="white-space:nowrap;"><span data-dcnode-id="2472" instrument_node="">[</span><i data-dcnode-id="2468"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AArticles_contradicting_other_articles" title="Category:Articles contradicting other articles"><span data-dcnode-id="2470" title="The lede says 'about half' of spiral galaxies are barred (April 2022)"><span data-dcnode-id="2471" instrument_node="">contradictory</span></span></a></i><span data-dcnode-id="2467" instrument_node="">]</span></sup><span data-dcnode-id="2465" instrument_node=""> The creation of the bar is generally thought to be the result of a </span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Density_wave_theory" title="Density wave theory"><span data-dcnode-id="2464" instrument_node="">density wave</span></a><span data-dcnode-id="2462" instrument_node=""> radiating from the center of the galaxy whose effects reshape the orbits of the inner stars. This effect builds over time to stars orbiting further out, which creates a self-perpetuating bar structure.</span><sup class="reference" data-dcnode-id="2459" id="cite_ref-7"><a data-dcnode-id="2460" href="#cite_note-7"><span data-dcnode-id="2461" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2458" instrument_node="">
</span></p><p data-dcnode-id="2433"><span data-dcnode-id="2456" instrument_node="">The bar structure is believed to act as a type of </span><a class="mw-redirect" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_nursery" title="Stellar nursery"><span data-dcnode-id="2455" instrument_node="">stellar nursery</span></a><span data-dcnode-id="2453" instrument_node="">, channeling </span><a class="mw-redirect" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstellar_gas" title="Interstellar gas"><span data-dcnode-id="2452" instrument_node="">gas</span></a><span data-dcnode-id="2450" instrument_node=""> inwards from the spiral arms through </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orbital_resonance" title="Orbital resonance"><span data-dcnode-id="2449" instrument_node="">orbital resonance</span></a><span data-dcnode-id="2447" instrument_node="">, fueling </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_evolution%23Birth" title="Stellar evolution"><span data-dcnode-id="2446" instrument_node="">star birth</span></a><span data-dcnode-id="2444" instrument_node=""> in the vicinity of its center.</span><sup class="reference" data-dcnode-id="2441" id="cite_ref-8"><a data-dcnode-id="2442" href="#cite_note-8"><span data-dcnode-id="2443" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2440" instrument_node=""> This process is also thought to explain why many barred spiral galaxies have </span><a class="mw-redirect" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_galactic_nuclei" title="Active galactic nuclei"><span data-dcnode-id="2439" instrument_node="">active galactic nuclei</span></a><span data-dcnode-id="2437" instrument_node="">, such as that seen in the </span><a class="mw-redirect" data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Pinwheel_Galaxy" title="Southern Pinwheel Galaxy"><span data-dcnode-id="2436" instrument_node="">Southern Pinwheel Galaxy</span></a><span data-dcnode-id="2434" instrument_node="">.
</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2432" instrument_node="">Bars are thought to be temporary phenomena in the lives of spiral galaxies; the bar structures decay over time, transforming galaxies from barred spirals to more "regular" spiral patterns. Past a certain size the accumulated mass of the bar compromises the stability of the overall bar structure. Barred spiral galaxies with high mass accumulated in their center tend to have short, stubby bars.</span><sup class="reference" data-dcnode-id="2429" id="cite_ref-9"><a data-dcnode-id="2430" href="#cite_note-9"><span data-dcnode-id="2431" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2428" instrument_node=""> Since so many spiral galaxies have bar structures, it is likely that they are recurring phenomena in spiral galaxy development. The oscillating evolutionary cycle from spiral galaxy to barred spiral galaxy is thought to take on the average about two billion years.</span><sup class="reference" data-dcnode-id="2425" id="cite_ref-10"><a data-dcnode-id="2426" href="#cite_note-10"><span data-dcnode-id="2427" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2424" instrument_node="">
</span></p><p data-dcnode-id="2417"><span data-dcnode-id="2422" instrument_node="">Recent studies have confirmed the idea that bars are a sign of galaxies reaching full maturity as the "formative years" end. A 2008 investigation found that only 20 percent of the spiral galaxies in the distant past possessed bars, compared with about 65 percent of their local counterparts.</span><sup class="reference" data-dcnode-id="2419" id="cite_ref-ShethElmegreen2008_11-0"><a data-dcnode-id="2420" href="#cite_note-ShethElmegreen2008-11"><span data-dcnode-id="2421" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2418" instrument_node="">
</span></p><span data-dcnode-id="2416" instrument_node="">
</span><div class="center" data-dcnode-id="2402"><div class="thumb tnone" data-dcnode-id="2403"><div class="thumbinner" data-dcnode-id="2404" style="width:352px;"><a class="image" data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg"><img alt="" class="thumbimage" data-dcnode-id="2415" data-file-height="1308" data-file-width="1308" decoding="async" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg/350px-PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg/525px-PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d3/PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg/700px-PIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg 2x" width="350"></a><span data-dcnode-id="2413" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2405"><div class="magnify" data-dcnode-id="2411"><a class="internal" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APIA19341-MilkyWayGalaxy-SpiralArmsData-WISE-20150603.jpg" title="Enlarge"></a></div><center data-dcnode-id="2406"><span data-dcnode-id="2410" instrument_node="">Milky Way Galaxy spiral arms - based on </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wide-field_Infrared_Survey_Explorer" title="Wide-field Infrared Survey Explorer"><span data-dcnode-id="2409" instrument_node="">WISE</span></a><span data-dcnode-id="2407" instrument_node=""> data.</span></center></div></div></div></div><span data-dcnode-id="2401" instrument_node="">
</span><h2 data-dcnode-id="2391"><span class="mw-headline" data-dcnode-id="2399" id="Grades"><span data-dcnode-id="2400" instrument_node="">Grades</span></span><span class="mw-editsection" data-dcnode-id="2392"><span class="mw-editsection-bracket" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">[</span></span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarred_spiral_galaxy%26action%3Dedit%26section%3D2" title="Edit section: Grades"><span data-dcnode-id="2396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2390" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2373"><div class="thumbinner" data-dcnode-id="2374" style="width:222px;"><a class="image" data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANGC_7640_a_spiral_in_Andromeda.jpg"><img alt="" class="thumbimage" data-dcnode-id="2389" data-file-height="1288" data-file-width="1280" decoding="async" height="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/NGC_7640_a_spiral_in_Andromeda.jpg/220px-NGC_7640_a_spiral_in_Andromeda.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/52/NGC_7640_a_spiral_in_Andromeda.jpg/330px-NGC_7640_a_spiral_in_Andromeda.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/52/NGC_7640_a_spiral_in_Andromeda.jpg/440px-NGC_7640_a_spiral_in_Andromeda.jpg 2x" width="220"></a><span data-dcnode-id="2387" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2375"><div class="magnify" data-dcnode-id="2385"><a class="internal" data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANGC_7640_a_spiral_in_Andromeda.jpg" title="Enlarge"></a></div><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NGC_7640" title="NGC 7640"><span data-dcnode-id="2384" instrument_node="">NGC 7640</span></a><span data-dcnode-id="2382" instrument_node=""> is a barred spiral galaxy in the </span><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andromeda_%28constellation%29" title="Andromeda (constellation)"><span data-dcnode-id="2381" instrument_node="">Andromeda</span></a><span data-dcnode-id="2379" instrument_node=""> constellation.</span><sup class="reference" data-dcnode-id="2376" id="cite_ref-12"><a data-dcnode-id="2377" href="#cite_note-12"><span data-dcnode-id="2378" instrument_node="">[12]</span></a></sup></div></div></div><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2371" instrument_node="">The general classification is "SB" (spiral barred). The sub-categories are based on how open or tight the arms of the spiral are. SBa types feature tightly bound arms. SBc types are at the other extreme and have loosely bound arms. SBb galaxies lie in between. SBm describes somewhat irregular barred spirals. SB0 is a </span><a class="mw-redirect" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barred_lenticular_galaxy" title="Barred lenticular galaxy"><span data-dcnode-id="2370" instrument_node="">barred lenticular galaxy</span></a><span data-dcnode-id="2368" instrument_node="">.
</span></p><span data-dcnode-id="2366" instrument_node="">
