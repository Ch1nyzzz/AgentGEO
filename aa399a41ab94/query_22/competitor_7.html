</span><h1 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Barred spiral bares all</span></h1><span data-dcnode-id="450" instrument_node="">
</span><div class="archive-image archive-image-dark popup" data-dcnode-id="443"><span data-dcnode-id="449" instrument_node="">
</span><a class="popup" data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.spacetelescope.org/archives/images/screen/potw1035a.jpg" title="Barred spiral bares all"><span data-dcnode-id="448" instrument_node="">
</span><img alt="Barred spiral bares all" class="img-responsive" data-dcnode-id="447" sizes="(min-width: 1000px) 700px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.spacetelescope.org/archives/images/thumb700x/potw1035a.jpg&amp;raw" srcset="/media/archives/images/medium/potw1035a.jpg 320w, https://cdn.spacetelescope.org/archives/images/news/potw1035a.jpg 180w, /media/archives/images/newsmini/potw1035a.jpg 60w, https://cdn.spacetelescope.org/archives/images/screen/potw1035a.jpg 1280w, https://cdn.spacetelescope.org/archives/images/thumb700x/potw1035a.jpg 700w, /media/archives/images/thumbs/potw1035a.jpg 122w"><span data-dcnode-id="446" instrument_node="">
</span></a><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="441"></p><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">The galaxy captured in this image, called UGC 12158, certainly isn’t camera-shy: this spiral stunner is posing face-on to the NASA/ESA Hubble Space Telescope’s Advanced Camera for Surveys, revealing its structure in fine detail.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">UGC 12158 is an excellent example of a barred spiral galaxy in the Hubble sequence — a scheme used to categorise galaxies based on their shapes. Barred spirals, as the name suggest, feature spectacular swirling arms of stars that emanate from a bar-shaped centre. Such bar structures are common, being found in about two thirds of spiral galaxies, and are thought to act as funnels, guiding gas to their galactic centres where it accumulates to form newborn stars. These aren’t permanent structures: astronomers think that they slowly disperse over time, so that the galaxies eventually evolve into regular spirals.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">The appearance of a galaxy changes little over millions of years, but this image also contains a short-lived and brilliant interloper — the bright blue star just to the lower left of the centre of the galaxy is very different from the several foreground stars seen in the image. It is in fact a supernova inside UGC 12158 and much further away than the Milky Way stars in the field — at a distance of about 400 million light-years! This stellar explosion, called SN 2004ef, was first spotted by two British amateur astronomers in September 2004 and the Hubble data shown here form part of the follow-up observations.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">This picture was created from images taken with the Wide Field Channel of Hubble’s Advanced Camera for Surveys. Images through blue (F475W, coloured blue), yellow (F606W, coloured green) and red (F814W, coloured red) as well as a filter that isolates the light from glowing hydrogen (F658W, also coloured red) have been included. The exposure times were 1160 s, 700 s, 700 s and 1200 s respectively. The field of view is about 2.3 arcminutes across.</span></p><p data-dcnode-id="429"></p><span data-dcnode-id="428" instrument_node="">
