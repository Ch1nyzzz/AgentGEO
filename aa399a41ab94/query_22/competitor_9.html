</span><h1 data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Spiral Galaxies</span></h1><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">The most common type of galaxy is called a "spiral galaxy." Not 
      surprisingly, spiral galaxies look like spirals, with long arms winding 
      toward a bright bulge at the center. But be careful - if you looked at a spiral 
      galaxy from the side, you could mistake its shape for a circle, and 
      so you'd have to use other criteria to learn it was a spiral.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">If you can clearly see the spiral shape, the galaxy is called a 
      "face-on spiral." If you instead see the galaxy from the side, 
      it is called an "edge-on spiral." You can recognize edge-on 
      spiral galaxies because you can see their bright central bulges. 
      Face-on and edge-on spiral galaxies 
      aren't really any different; they only look different because of 
      the angle from which you see them.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Some spiral galaxies have arms that are wound 
      tightly, while other galaxies have very loosely-wound arms. The 
      difference between tightly and loosely wound spirals is a genuine 
      difference between the galaxies, and can be used to classify spirals.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">About 77% of the observed galaxies in the universe are spiral galaxies. Our own 
      galaxy, the Milky Way, is a typical spiral galaxy. The images below 
      show three other good examples.</span></p><span data-dcnode-id="179" instrument_node="">
</span><span data-dcnode-id="178" instrument_node="">

          and an edge-on spiral galaxy (right)</span></p></td></tr></tbody></table><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Some spiral galaxies have a bright line, or bar, running through them. 
      These are called "barred spiral galaxies." The image below shows a 
      barred spiral galaxy. Galaxies without a bar are 
      simply called "spiral galaxies."</span></p><span data-dcnode-id="144" instrument_node="">

          </span><br data-dcnode-id="135"><font data-dcnode-id="133" size="-2"><span data-dcnode-id="134" instrument_node="">Image courtesy Steve Kent</span></font></p></td></tr></tbody></table><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Spiral galaxies are further classified by how tightly their spiral arms 
      are wound. A galaxy with very tightly wound arms, such the left galaxy 
      in the list above, would be called "type a." galaxy A "type b" galaxy 
      has more loosely wound 
      arms. A "type c" galaxy (such as the middle one above) has very loosely 
      wound arms. What type do you think the barred spiral to the right would be?</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">The arms of a spiral galaxy have lots of gas and dust, and 
      they are often areas where new stars are constantly forming. The bulge 
      of a spiral galaxy is composed primarily of old, red stars. 
      Very little star formation goes on in the bulge.</span></p><span data-dcnode-id="120" instrument_node="">
