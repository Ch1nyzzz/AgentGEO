</span><meta content="This work describes the hypothesis in which the explanation of the rotational velocity of barred spiral galaxies is based on the relativistic solution. Considering a previous relativistic solution for the unbarred spiral galaxies, this solution assumes that the entire spiral galaxy disk would rotate like a rigid (or solid) body. It is considered that both the Solar System and spiral galaxies are behaving like a rigid body in rotation. Then, having both systems the same dynamical behaviour, which can be explained by the same relativistic solution, these two apparently different cases are unified in the same solution. Thus, the stars and gas in the spiral galaxy must be rotating with the system in an almost the same and uniform angular velocity. Nevertheless, according to the Kerr metric for the rotating black hole, at the zone of the bar of barred spiral galaxies, stars and gas must be changing their direction toward the rotation poles of the black hole. On these assumptions, we apply the equation based on the relativistic solution to the barred spiral galaxies. More precisely, we present examples of the rotation curves of unbarred spiral galaxies: NGC 4378 and NGC 4594, and the barred spiral galaxies: Milky Way and, NGC 7541. Comparing our calculations with the observations we find a good approximation." data-dcnode-id="1079" name="citation_abstract"><span data-dcnode-id="1078" instrument_node="">

</span><b data-dcnode-id="815"><a data-dcnode-id="817" name="Abs"></a><span data-dcnode-id="816" instrument_node="">Abstract</span></b></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">
                        This work describes the hypothesis in which the explanation of the rotational velocity of barred spiral galaxies is based on the relativistic solution. Considering a previous relativistic solution for the unbarred spiral galaxies, this solution assumes that the entire spiral galaxy disk would rotate like a rigid (or solid) body. It is considered that both the Solar System and spiral galaxies are behaving like a rigid body in rotation. Then, having both systems the same dynamical behaviour, which can be explained by the same relativistic solution, these two apparently different cases are unified in the same solution. Thus, the stars and gas in the spiral galaxy must be rotating with the system in an almost the same and uniform angular velocity. Nevertheless, according to the Kerr metric for the rotating black hole, at the zone of the bar of barred spiral galaxies, stars and gas must be changing their direction toward the rotation poles of the black hole. On these assumptions, we apply the equation based on the relativistic solution to the barred spiral galaxies. More precisely, we present examples of the rotation curves of unbarred spiral galaxies: NGC 4378 and NGC 4594, and the barred spiral galaxies: Milky Way and, NGC 7541. Comparing our calculations with the observations we find a good approximation.
                    </span></p><span data-dcnode-id="810" instrument_node="">

</span><h3 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">                            Article Outline</span></h3><dl data-dcnode-id="782"><dd data-dcnode-id="783"><a data-dcnode-id="784" href="#Sec1"><span data-dcnode-id="785" instrument_node="">1. Introduction</span></a></dd></dl><dl data-dcnode-id="778"><dd data-dcnode-id="779"><a data-dcnode-id="780" href="#Sec2"><span data-dcnode-id="781" instrument_node="">2. Kerr Metric in the Barred Spiral Galaxies</span></a></dd></dl><dl data-dcnode-id="774"><dd data-dcnode-id="775"><a data-dcnode-id="776" href="#Sec3"><span data-dcnode-id="777" instrument_node="">3. General Theory of Relativity Solution for the Total Force</span></a></dd></dl><dl data-dcnode-id="770"><dd data-dcnode-id="771"><a data-dcnode-id="772" href="#Sec4"><span data-dcnode-id="773" instrument_node="">4. Rotational Velocity for Unbarred Spiral Galaxies</span></a></dd></dl><dl data-dcnode-id="766"><dd data-dcnode-id="767"><a data-dcnode-id="768" href="#Sec5"><span data-dcnode-id="769" instrument_node="">5. Spiral Geometry in Barred Spiral Galaxies</span></a></dd></dl><dl data-dcnode-id="762"><dd data-dcnode-id="763"><a data-dcnode-id="764" href="#Sec6"><span data-dcnode-id="765" instrument_node="">6. Comparison between Calculated and Observed Rotational Velocities in Spiral Galaxies</span></a></dd></dl><dl data-dcnode-id="758"><dd data-dcnode-id="759"><a data-dcnode-id="760" href="#Sec7"><span data-dcnode-id="761" instrument_node="">7. Conclusions</span></a></dd></dl><dl data-dcnode-id="754"><dd data-dcnode-id="755"><a data-dcnode-id="756" href="#SecACKNOWLEDGEMENTS"><span data-dcnode-id="757" instrument_node="">ACKNOWLEDGEMENTS</span></a></dd></dl><span data-dcnode-id="753" instrument_node="">

</span><div class="mb20" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node=""> </span></div><span data-dcnode-id="748" instrument_node=""> </span><div class="paperSection" data-dcnode-id="257"><span data-dcnode-id="747" instrument_node="">
</span><dl data-dcnode-id="746"></dl><dl data-dcnode-id="745"></dl><a data-dcnode-id="744" name="Sec1"></a><h3 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">1. Introduction</span></h3><dl data-dcnode-id="725"><dd data-dcnode-id="741"></dd><span data-dcnode-id="740" instrument_node="">One of the problems that classical gravitation theory has had is to justify the large velocities observed for stars and gas in spiral galaxies and how they differ from the rotational velocities of planets. Indeed, precise measurements (with a variety of techniques) of the velocities of stars and gases in spiral galaxies [1,2] make clear that the action of the galaxy on its stars and the gas estimated according to the classical gravitation theory cannot account for the measured velocities, if the gas is assumed to be a stable component of the galaxy, as described by the quasi-stationary density wave theory, which characterizes spirals as rigidly rotating, long-lived patterns (i.e. steady spirals) [3]. Thus, we can consider that in principle, stars and gas in spiral galaxies do not follow a rotational motion as described in classical gravitational theory, so they must obey other considerations to satisfy the observations.</span><dd data-dcnode-id="739"></dd><span data-dcnode-id="738" instrument_node="">The issue is that the classical Newtonian law of gravitation only considers two terms, which are the Newtonian gravity force and the centrifugal force to define the classical total force [4]. Then, it has some limitations proper of this classical theory since it does not consider any other energy or force involved in the rotating systems. This is the reason why is required to add some matter or forces to adjust the calculations to the rotational velocities observed in spiral galaxies, such as the dark matter concept [5], which has not been detected to date, or even develop some adjustments like the proposed in the Modified Newtonian Dynamics (MOND) theory [6,7].</span><dd data-dcnode-id="737"></dd><span data-dcnode-id="736" instrument_node="">On the other hand, the net or absolute total force in the relativistic solution, derived from the General Theory of Relativity (GTR) [8] considers a third term, which includes the force related to the Coriolis force in a rotating system, which is inverse of the distance to the fourth power. This is the main reason why the relativistic solution can be considered to provide an exact solution which does not require any additional matter and does not require any adjustment to fit to the rotational velocities observed in spiral galaxies.</span><dd data-dcnode-id="735"></dd><span data-dcnode-id="734" instrument_node="">Then, based on the relativistic solution to calculate the rotational velocities of unbarred spiral galaxies and their spiral geometry [9], we consider that the rotational velocity of barred spiral galaxies can also be calculated from this relativistic solution. Furthermore, considering the Kerr metric for a rotating black hole, we describe the dynamics and geometry to be applied to the barred spiral galaxies, specifically the dynamic which indicates that gas and matter are carried towards the axial poles defined by the rotating axially-symmetric.</span><dd data-dcnode-id="733"></dd><span data-dcnode-id="732" instrument_node="">A barred spiral galaxy, type as “SB” (spiral, barred) in the Hubble sequence, is a spiral galaxy with a central bar-shaped structure composed of stars and gas. For instance, the Milky Way galaxy, where the Solar System is located, is classified as a barred spiral galaxy [10].</span><dd data-dcnode-id="731"></dd><span data-dcnode-id="730" instrument_node="">In this solution, the dynamics of the stars in a spiral galaxy is not exclusively due to the combined gravitational field of all the stars, gas, or any other massive object in the galaxy, but rather considers that the entire galaxy disk moves and rotates as a rigid (or solid) body.</span><dd data-dcnode-id="729"></dd><span data-dcnode-id="728" instrument_node="">Previous works [9,11] show the possibility that both the Solar System and spiral galaxies are behaving like a rigid (or solid) body in rotation. Thus, having both systems the same dynamical behavior, which can be explained by the same relativistic solution, these two apparently different cases are unified in the same solution.</span><dd data-dcnode-id="727"></dd><span data-dcnode-id="726" instrument_node="">This work aims to describe the hypothesis that the explanation of the rotational velocity of some barred spiral galaxies is based on the solution of general relativity. Thus, we revisit the equation that describes the rotational velocity of stars in unbarred spiral galaxies, based on the relativistic solution to be applied to the barred spiral galaxies. In particular, we show examples of the calculated rotation curves of unbarred spiral galaxies NGC 4378 and NGC 4594, and barred spiral galaxies Milky Way and, NGC 7541 (with very different masses and sizes), comparing our calculations with the observations, finding a good approximation.</span></dl><a data-dcnode-id="724" name="Sec2"></a><h3 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">2. Kerr Metric in the Barred Spiral Galaxies</span></h3><dl data-dcnode-id="567"><dd data-dcnode-id="721"></dd><span data-dcnode-id="720" instrument_node="">The Kerr metric [12] is an exact solution of the Einstein field equations of general relativity that generalizes to a rotating uncharged black hole of the Schwarzschild metric [13]. This metric describes the geometry of empty spacetime around a rotating axially-symmetric black hole of massive resting mass </span><i data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">M</span></i><sub data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">●</span></sub><span data-dcnode-id="715" instrument_node=""> with a quasi-spherical event horizon. According to the Kerr metric, a rotating black hole with angular velocity Ω</span><sub data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">●</span></sub><span data-dcnode-id="712" instrument_node=""> difference of zero should exhibit frame-dragging [14]. Roughly speaking, this effect predicts that objects coming close to a rotating mass will be entrained to participate in its rotation, because of the swirling curvature of spacetime itself associated with rotating bodies. In the case of a rotating black hole, at close enough distances, all objects, even light, must rotate with the black hole. This region is called the ergosphere. Rotating black holes have surfaces where the metric seems to have apparent singularities; the size and shape of these surfaces would depend on the black hole's mass and angular momentum. The outer surface encloses the ergosphere and has a shape like a flattened sphere. The inner surface marks the event horizon [15] (Figure 1).</span><dd data-dcnode-id="711"></dd><span data-dcnode-id="710" instrument_node="">The Kerr metric has two physically relevant surfaces on which it appears to be singular. The inner surface corresponds to an event horizon like that observed in the Schwarzschild metric; this occurs where the purely radial component </span><i data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">g</span></i><sub data-dcnode-id="705"><i data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">rr</span></i></sub><span data-dcnode-id="704" instrument_node=""> of the metric goes to infinity. Solving the quadratic equation 1⁄</span><i data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">g</span></i><sub data-dcnode-id="699"><i data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">rr</span></i></sub><span data-dcnode-id="698" instrument_node=""> = 0 yields the solution:</span><table data-dcnode-id="691" width="100%"><tbody data-dcnode-id="692"><tr align="center" data-dcnode-id="693"><td align="center" data-dcnode-id="696"><img data-dcnode-id="697" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_001.gif&amp;raw"></td><td align="right" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">(1)</span></td></tr></tbody></table><span data-dcnode-id="690" instrument_node="">where </span><i data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">r</span></i><sub data-dcnode-id="685"><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">H</span></i></sub><span data-dcnode-id="684" instrument_node=""> is the radius of the inner surface of the singularity, </span><i data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">r</span></i><sub data-dcnode-id="679"><i data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">s</span></i></sub><span data-dcnode-id="678" instrument_node=""> is the Schwarzschild radius, and where for brevity, the length-scales </span><i data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">a</span></i><span data-dcnode-id="675" instrument_node=""> = </span><i data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">J</span></i><sub data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">●</span></sub><span data-dcnode-id="670" instrument_node="">/</span><i data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">M</span></i><sub data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">●</span></sub><i data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">c</span></i><span data-dcnode-id="663" instrument_node=""> is the ratio between the angular momentum of rotation</span><i data-dcnode-id="661"><span data-dcnode-id="662" instrument_node=""> J</span></i><sub data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">●</span></sub><span data-dcnode-id="658" instrument_node=""> and the mass </span><i data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">M</span></i><sub data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">●</span></sub><span data-dcnode-id="653" instrument_node=""> of the black hole. Another apparent singularity occurs where the purely temporal component </span><i data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">g</span></i><sub data-dcnode-id="648"><i data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">tt</span></i></sub><span data-dcnode-id="647" instrument_node=""> of the metric changes sign from positive to negative. Again, solving a quadratic equation </span><i data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">g</span></i><sub data-dcnode-id="642"><i data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">tt</span></i></sub><span data-dcnode-id="641" instrument_node=""> = 0 yields the solution:</span><table data-dcnode-id="634" width="100%"><tbody data-dcnode-id="635"><tr align="center" data-dcnode-id="636"><td align="center" data-dcnode-id="639"><img data-dcnode-id="640" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_002.gif&amp;raw"></td><td align="right" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">(2)</span></td></tr></tbody></table><span data-dcnode-id="633" instrument_node="">where </span><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">r</span></i><sub data-dcnode-id="628"><i data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">E</span></i></sub><span data-dcnode-id="627" instrument_node=""> is the radius of the purely temporal component of the singularity. Due to the cos</span><sup data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">2</span></sup><i data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">θ</span></i><span data-dcnode-id="622" instrument_node=""> term in the square root, this outer surface resembles a flattened sphere that touches the inner surface at the poles of the rotation axis, where the colatitude </span><i data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">θ</span></i><span data-dcnode-id="619" instrument_node=""> equals 0 or </span><i data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">π</span></i><span data-dcnode-id="616" instrument_node="">; the space between these two surfaces is called the ergosphere (Figure 1). Within this volume, the purely temporal component </span><i data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">g</span></i><sub data-dcnode-id="611"><i data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">tt</span></i></sub><span data-dcnode-id="610" instrument_node=""> is negative, i.e., acts like a purely spatial metric component. Consequently, particles within this ergosphere must co-rotate with the inner mass, if they are to retain their time-like character.</span><table class="imageTable" data-dcnode-id="590"><tbody data-dcnode-id="591"><tr data-dcnode-id="592"><td data-dcnode-id="607" valign="top"><a data-dcnode-id="608"><img data-dcnode-id="609" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.astronomy.20211001.02_003.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_003.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="593" valign="top" width="645"><b data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Fig</span></b><b data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">ure </span></b><b data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">1</span></b><b data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">.</span></b><b data-dcnode-id="597"><span data-dcnode-id="598" instrument_node=""> </span></b><b data-dcnode-id="595"><span data-dcnode-id="596" instrument_node=""> </span></b><span data-dcnode-id="594" instrument_node="">Kerr metric of a rotating black hole</span></td></tr></tbody></table><dd data-dcnode-id="589"></dd><span data-dcnode-id="588" instrument_node="">On the other hand, the barred spiral galaxy is a grouping of astronomical objects, stars and gas that keeps rotating due to the force of gravity of a rotating system. Its shape is spiral with a central bar that starts from diametrically opposite points of the galactic nucleus (Figure 2). In fact, it is observed that each of the two main arms of an unbarred spiral also start mainly from diametrically opposite points in the galactic nucleus, but do not present a bar. It is currently believed that in a barred galaxy, the bar funnels interstellar gas from the arms of the spiral galaxy into its interior.</span><dd data-dcnode-id="587"></dd><span data-dcnode-id="586" instrument_node="">Taking into account the Kerr metric, we can consider that stars and gas that are moving at the outer zones with the spiral arms, when reaching the region of one of the two rotation poles of the black hole, where the outer event horizon is near of the surface, this strongly suggests (but does not yet confirmed) that matter and gas clouds interact at the edges of the bar losing angular momentum and thus facilitating the creation of a flow of matter and gas that is diverted following a straight path from the outside region towards the axial poles, then forming the bar (Figure 2). </span><table class="imageTable" data-dcnode-id="568"><tbody data-dcnode-id="569"><tr data-dcnode-id="570"><td data-dcnode-id="583" valign="top"><a data-dcnode-id="584"><img data-dcnode-id="585" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.astronomy.20211001.02_004.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_004.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="571" valign="top" width="645"><b data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Fig</span></b><b data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">ure </span></b><b data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">2</span></b><b data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">.</span></b><b data-dcnode-id="573"><span data-dcnode-id="574" instrument_node=""> </span></b><span data-dcnode-id="572" instrument_node="">The dynamics around the Kerr metric of a rotating black hole, and the forming of the bar of a barred spiral galaxy</span></td></tr></tbody></table></dl><a data-dcnode-id="566" name="Sec3"></a><h3 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">3. General Theory of Relativity Solution for the Total Force</span></h3><dl data-dcnode-id="471"><dd data-dcnode-id="563"></dd><span data-dcnode-id="562" instrument_node="">A relativistic solution for the angular movement of the celestial bodies in a rotating system can be determined by a study of the solutions of Einstein’s equations following the standard procedure [16-18]. Thus, the total force for a rotating system is given as</span><table data-dcnode-id="555" width="100%"><tbody data-dcnode-id="556"><tr align="center" data-dcnode-id="557"><td align="center" data-dcnode-id="560"><img data-dcnode-id="561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_005.gif&amp;raw"></td><td align="right" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">(3)</span></td></tr></tbody></table><span data-dcnode-id="554" instrument_node="">where </span><i data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">r</span></i><span data-dcnode-id="551" instrument_node=""> is a position vector and </span><i data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">L</span></i><span data-dcnode-id="548" instrument_node=""> is the orbital angular momentum of the rest mass </span><i data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">m</span></i><span data-dcnode-id="545" instrument_node="">, given by</span><table data-dcnode-id="538" width="100%"><tbody data-dcnode-id="539"><tr align="center" data-dcnode-id="540"><td align="center" data-dcnode-id="543"><img data-dcnode-id="544" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_006.gif&amp;raw"></td><td align="right" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">(4)</span></td></tr></tbody></table><dd data-dcnode-id="537"></dd><span data-dcnode-id="536" instrument_node="">The first term in Eq. (3) represents the Newtonian gravitational force, which is described by the inverse-square law. This is the case of Newton equation [4] that describes the orbital motion of planets around the Sun. The second term represents the centrifugal force in circular motion. The third term is related to the Coriolis force, which includes the inverse of the distance to the fourth power, which is derived from the GTR.</span><dd data-dcnode-id="535"></dd><span data-dcnode-id="534" instrument_node="">Furthermore, a previous work [11] shows that it is possible that both the Solar System and spiral galaxies are behaving like a rigid (or solid) body in rotation. Thus, having both systems the same dynamical behavior, which can be explained by the same relativistic solution, these two apparently different cases are unified in the same solution. In that solution, the total angular frequency Ω</span><sub data-dcnode-id="531"><i data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">T</span></i></sub><span data-dcnode-id="530" instrument_node=""> of the system can be obtained from Eq. (3) by adding the apsidal precession for a rotating and orbiting body, giving</span><table data-dcnode-id="523" width="100%"><tbody data-dcnode-id="524"><tr align="center" data-dcnode-id="525"><td align="center" data-dcnode-id="528"><img data-dcnode-id="529" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_007.gif&amp;raw"></td><td align="right" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">(5)</span></td></tr></tbody></table><span data-dcnode-id="522" instrument_node="">where Ω</span><sub data-dcnode-id="519"><i data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">v</span></i></sub><span data-dcnode-id="518" instrument_node=""> is the angular velocity of the circular motion of the Solar System, Ω</span><sub data-dcnode-id="515"><i data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">φ</span></i></sub><span data-dcnode-id="514" instrument_node=""> is the angular velocity of the apsidal precession, </span><i data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">a</span></i><span data-dcnode-id="511" instrument_node=""> is the semi-major axis of the elliptical orbit, </span><i data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">e</span></i><span data-dcnode-id="508" instrument_node=""> is the eccentricity and </span><i data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">t</span></i><sub data-dcnode-id="503"><i data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">P</span></i></sub><span data-dcnode-id="502" instrument_node=""> is the time in seconds of a sidereal year. Then, for one revolution (2</span><i data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">π</span></i><span data-dcnode-id="499" instrument_node=""> radians), the total period is given by</span><table data-dcnode-id="492" width="100%"><tbody data-dcnode-id="493"><tr align="center" data-dcnode-id="494"><td align="center" data-dcnode-id="497"><img data-dcnode-id="498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_008.gif&amp;raw"></td><td align="right" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">(6)</span></td></tr></tbody></table><dd data-dcnode-id="491"></dd><span data-dcnode-id="490" instrument_node="">Substituting the Earth-Sun system data [12] into Eq. (6) for the maximum distance </span><i data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">r</span></i><sub data-dcnode-id="485"><i data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Max</span></i></sub><span data-dcnode-id="484" instrument_node=""> (during the aphelion), and the related minimum orbital velocity </span><i data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">v</span></i><span data-dcnode-id="481" instrument_node="">, total angular frequency equals 7.72554 × 10</span><sup data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">−12</span></sup><span data-dcnode-id="478" instrument_node=""> radians per second (50.2881” arc per year, or 0.0139689° per year). For one revolution (2</span><i data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">π</span></i><span data-dcnode-id="475" instrument_node=""> radians), total period in the case of the Earth equals 8.133 × 10</span><sup data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">11</span></sup><span data-dcnode-id="472" instrument_node=""> seconds (25,771.5 years), which is according to the observed period of Earth’s axial precession.</span></dl><a data-dcnode-id="470" name="Sec4"></a><h3 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">4. Rotational Velocity for Unbarred Spiral Galaxies</span></h3><dl data-dcnode-id="365"><dd data-dcnode-id="467"></dd><span data-dcnode-id="466" instrument_node="">According to this relativistic solution [19], at the stage where the entire spiral galaxy disk rotates like a rigid (or solid) body, the motion of the stars and gas that forms the spiral galaxy should be perceived from Earth as an almost uniform rotation of the galaxy. Considering the third term in Eq. (3), we can reduce common terms, giving</span><table data-dcnode-id="459" width="100%"><tbody data-dcnode-id="460"><tr align="center" data-dcnode-id="461"><td align="center" data-dcnode-id="464"><img data-dcnode-id="465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_009.gif&amp;raw"></td><td align="right" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">(7)</span></td></tr></tbody></table><span data-dcnode-id="458" instrument_node="">where Ω is the angular velocity of the rotating system.</span><dd data-dcnode-id="457"></dd><span data-dcnode-id="456" instrument_node="">In the same way as with the equation for classical mechanics scenario, we equate the centrifugal force with Eq. (7), obtaining</span><table data-dcnode-id="449" width="100%"><tbody data-dcnode-id="450"><tr align="center" data-dcnode-id="451"><td align="center" data-dcnode-id="454"><img data-dcnode-id="455" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_010.gif&amp;raw"></td><td align="right" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">(8)</span></td></tr></tbody></table><span data-dcnode-id="448" instrument_node="">with </span><i data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">M</span></i><span data-dcnode-id="445" instrument_node=""> in this case being the resting mass </span><i data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">M</span></i><sub data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">●</span></sub><span data-dcnode-id="440" instrument_node=""> of the galactic nucleus. In a rigid body, the angular velocity Ω of the system remains uniform. To calculate the rotational velocity, we can use as datum the angular velocity of the system, if known, or its equivalence with angular momentum </span><i data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">J</span></i><span data-dcnode-id="437" instrument_node="">, which increases almost linearly with respect to any distance from the nucleus. Then, according to Eq. (4), we can write the angular momentum as</span><table data-dcnode-id="430" width="100%"><tbody data-dcnode-id="431"><tr align="center" data-dcnode-id="432"><td align="center" data-dcnode-id="435"><img data-dcnode-id="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_011.gif&amp;raw"></td><td align="right" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">(9)</span></td></tr></tbody></table><span data-dcnode-id="429" instrument_node="">where </span><i data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">M</span></i><sub data-dcnode-id="424"><i data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">g</span></i></sub><span data-dcnode-id="423" instrument_node=""> is the mass of the system (in this case, mass of the spiral galaxy). The angular momentum of each galaxy can be calculated from the specific angular momentum </span><i data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">j</span></i><span data-dcnode-id="420" instrument_node=""> = </span><i data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">J</span></i><span data-dcnode-id="417" instrument_node="">/</span><i data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">M</span></i><sub data-dcnode-id="412"><i data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">g</span></i></sub><span data-dcnode-id="411" instrument_node=""> [20], as a function of distance in the spiral Sa galaxies. Then</span><table data-dcnode-id="404" width="100%"><tbody data-dcnode-id="405"><tr align="center" data-dcnode-id="406"><td align="center" data-dcnode-id="409"><img data-dcnode-id="410" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_012.gif&amp;raw"></td><td align="right" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">(10)</span></td></tr></tbody></table><dd data-dcnode-id="403"></dd><span data-dcnode-id="402" instrument_node="">One can verify the spiral behaviour from Eq. (8), having that </span><i data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">θ</span></i><span data-dcnode-id="399" instrument_node=""> = Ω</span><i data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">t</span></i><span data-dcnode-id="396" instrument_node=""> and, for the sake of describing the geometry of this equation, considering the Schwarzschild radius </span><i data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">r</span></i><sub data-dcnode-id="391"><i data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">s</span></i></sub><span data-dcnode-id="390" instrument_node=""> [13]. Therefore, we write this in polar coordinates as </span><table data-dcnode-id="383" width="100%"><tbody data-dcnode-id="384"><tr align="center" data-dcnode-id="385"><td align="center" data-dcnode-id="388"><img data-dcnode-id="389" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_013.gif&amp;raw"></td><td align="right" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">(11)</span></td></tr></tbody></table><span data-dcnode-id="382" instrument_node="">which is the equation of a spiral. The distance </span><i data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">r</span></i><span data-dcnode-id="379" instrument_node=""> can be described by the reciprocal </span><i data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">u</span></i><span data-dcnode-id="376" instrument_node=""> = 1/</span><i data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">r</span></i><span data-dcnode-id="373" instrument_node=""> as a function of </span><i data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">θ</span></i><span data-dcnode-id="370" instrument_node=""> according to the Binet equation in the solution of the relativistic equation derived for Schwarzschild metric [21,22].</span><dd data-dcnode-id="369"></dd><span data-dcnode-id="368" instrument_node="">We know from the observations that spiral galaxies normally mainly have two arms that start at the poles axially-symmetric from the centre of the galactic nucleus. The arms can be geometrically represented in Eq. (11) by considering the opposite sign of this equation for the second arm, so we include the (±) to consider both arms of the spiral galaxy.</span><dd data-dcnode-id="367"></dd><span data-dcnode-id="366" instrument_node="">In addition, Eqs. (10) and (11) can also be applied for unbarred spiral galaxies Sb and Sc, since these other types of galaxies follow the same geometry and dynamics, only by changing the number of laps performed before reaching the centre.</span></dl><a data-dcnode-id="364" name="Sec5"></a><h3 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">5. Spiral Geometry in Barred Spiral Galaxies</span></h3><dl data-dcnode-id="347"><dd data-dcnode-id="361"></dd><span data-dcnode-id="360" instrument_node="">Considering the Kerr metric for a rotating black hole, specifically the dynamic which indicates that gas and matter are carried from the outside towards the axial poles, following a linear path and forming the bar, we find the geometry of the barred spiral galaxies.</span><dd data-dcnode-id="359"></dd><span data-dcnode-id="358" instrument_node="">According to the Kerr metric, geometry of empty spacetime around a rotating axially-symmetric black hole would form the bar from the spiral towards the axial poles. Thus, from Eq. (11), we define the equation for the geometry of barred spiral galaxies, giving</span><table data-dcnode-id="351" width="100%"><tbody data-dcnode-id="352"><tr align="center" data-dcnode-id="353"><td align="center" data-dcnode-id="356"><img data-dcnode-id="357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_014.gif&amp;raw"></td><td align="right" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">(12)</span></td></tr></tbody></table><span data-dcnode-id="350" instrument_node="">which is the equation of a spiral with two centres. In the same way, we also include the (±) in Eq. (12) to consider both arms of the barred spiral galaxy (Figure 2). </span><dd data-dcnode-id="349"></dd><span data-dcnode-id="348" instrument_node="">The length of the bar will depend on how far the effect of the horizon event at the rotation poles reaches to transport matter and gas from the outer zone towards the singularity. According to the Kerr metric, it depends on the mass of the black hole, the rotation speed, and the closeness that the outer horizon event reaches to the external environment at the rotation poles.</span></dl><a data-dcnode-id="346" name="Sec6"></a><h3 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">6. Comparison between Calculated and Observed Rotational Velocities in Spiral Galaxies</span></h3><dl data-dcnode-id="281"><dd data-dcnode-id="343"></dd><span data-dcnode-id="342" instrument_node="">Our purpose is to calculate the rotational velocity of some unbarred and barred spiral galaxies based on the relativistic solution and assuming their behaviour is like a rigid (or solid) body, plotting the rotation curves with the calculated values and compare them with the observed rotation curves. In particular, we focus on the rotation curves of two spiral Sa and two spiral SB galaxies. More precisely, we take as an example the known rotation curves of the spiral Sa galaxies: NGC 4378 and NGC 4594, and spiral SB galaxies: Milky Way and, NGC 7541, assuming that the only relevant contribution to the movement of their different regions is due to their behaviour as a rigid (or solid) body in rotation and considering only the movements found on the galactic plane. </span><dd data-dcnode-id="341"></dd><span data-dcnode-id="340" instrument_node="">Then, calculation the rotational velocity is given by Eq. (10), considering the known values for each of these four spiral galaxies [23-29]. From this information, it is observed that the nucleus masses of barred spiral galaxies are larger than the nucleus masses of unbarred spiral galaxies. The results are tabulated in Table 1 (Rotational velocities) for each galaxy.</span><table class="imageTable" data-dcnode-id="328"><tbody data-dcnode-id="329"><tr data-dcnode-id="330"><td data-dcnode-id="337" valign="top"><a data-dcnode-id="338"><img data-dcnode-id="339" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.astronomy.20211001.02_015.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_015.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="331" valign="top" width="645"><b data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Table 1.</span></b><b data-dcnode-id="333"><span data-dcnode-id="334" instrument_node=""> </span></b><span data-dcnode-id="332" instrument_node=""> Rotational velocities: Tabulation of respective rotational velocities calculated from Eq. (10) for the unbarred spiral galaxies: NGC 4378 and NGC 4594, and the barred spiral galaxies: Milky Way and, NGC 7541</span></td></tr></tbody></table><dd data-dcnode-id="327"></dd><span data-dcnode-id="326" instrument_node="">Rotation curves are plotted in Figure 3, which shows the calculated results for these galaxies.</span><table class="imageTable" data-dcnode-id="308"><tbody data-dcnode-id="309"><tr data-dcnode-id="310"><td data-dcnode-id="323" valign="top"><a data-dcnode-id="324"><img data-dcnode-id="325" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.astronomy.20211001.02_016.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_016.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="311" valign="top" width="645"><b data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Fig</span></b><b data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">ure </span></b><b data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">3</span></b><b data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">.</span></b><b data-dcnode-id="313"><span data-dcnode-id="314" instrument_node=""> </span></b><span data-dcnode-id="312" instrument_node="">Plot of respective rotational velocities versus distance from nucleus for the unbarred spiral galaxies: NGC 4378 and NGC 4594, and the barred spiral galaxies: Milky Way and, NGC 7541. The dashed lines are calculated from Eqs. (10), and the solid lines come from the observations</span></td></tr></tbody></table><dd data-dcnode-id="307"></dd><span data-dcnode-id="306" instrument_node="">To make a comparison between the calculus given by Eq. (10) and the observed rotation curves of these galaxies [30,31], we superimpose the calculated rotation curves on the known curves.</span><dd data-dcnode-id="305"></dd><span data-dcnode-id="304" instrument_node="">In Figure 1, the solid lines show the rotation curves obtained from the observations. The rotation curves calculated with Eq. (10) are shown as dashed lines. We can see a good approximation between the calculated rotation curves and the known rotation curves of these spiral galaxies. The calculated rotation curves from Eq. (10) can also be applied to other known spiral galaxies to compare them with the observations. </span><dd data-dcnode-id="303"></dd><span data-dcnode-id="302" instrument_node="">In Figure 4, the respective angular momentum along the different distances from the nucleus for these spiral galaxies are plotted. In this way, it is shown the same almost linear pattern of angular momentum for all these spiral galaxies. </span><table class="imageTable" data-dcnode-id="284"><tbody data-dcnode-id="285"><tr data-dcnode-id="286"><td data-dcnode-id="299" valign="top"><a data-dcnode-id="300"><img data-dcnode-id="301" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.astronomy.20211001.02_017.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.astronomy.20211001.02_017.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="287" valign="top" width="645"><b data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Fig</span></b><b data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">ure </span></b><b data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">4</span></b><b data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">.</span></b><b data-dcnode-id="289"><span data-dcnode-id="290" instrument_node=""> </span></b><span data-dcnode-id="288" instrument_node="">Plot of respective angular momentum for the unbarred spiral galaxies: NGC 4378 and NGC 4594, and the barred spiral galaxies: Milky Way and, NGC 7541. The curves show the same almost linear pattern for all these spiral galaxies along the different distances from their respective nucleus</span></td></tr></tbody></table><dd data-dcnode-id="283"></dd><span data-dcnode-id="282" instrument_node="">On the other hand, the Oort constants [32] have not been considered in this work, since such constants are empirically derived parameters that particularly characterize the local rotational properties of the Milky Way.</span></dl><a data-dcnode-id="280" name="Sec7"></a><h3 data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">7. Conclusions</span></h3><dl data-dcnode-id="267"><dd data-dcnode-id="277"></dd><span data-dcnode-id="276" instrument_node="">The aim of this work is to describe the hypothesis in which the explanation of the rotational velocity of some unbarred and barred spiral galaxies is based on the general relativity solution. Furthermore, it is considered that both the Solar System and spiral galaxies are behaving like a rigid (or solid) body in rotation. Thus, having both systems the same dynamical behaviour, which can be explained by the same relativistic solution, these two apparently different cases are unified in the same solution. </span><dd data-dcnode-id="275"></dd><span data-dcnode-id="274" instrument_node="">In this work, the relativistic solution of the rotational curves for the unbarred spiral galaxies and the Kerr metric for the rotating black hole are related to the observed bar of the barred spiral galaxies. </span><dd data-dcnode-id="273"></dd><span data-dcnode-id="272" instrument_node="">Then, this work shows the use of Eq. (3) derived from the general relativity solution, applied here to calculate the rotational velocity of some spiral galaxies.</span><dd data-dcnode-id="271"></dd><span data-dcnode-id="270" instrument_node="">Thus, we apply Eq. (10) to describe the rotational velocity of stars and gas in some spiral galaxies based on this solution. We present preliminarily examples of the rotation curves of unbarred spiral galaxies: NGC 4378 and NGC 4594, and barred spiral galaxies: Milky Way and, NGC 7541.</span><dd data-dcnode-id="269"></dd><span data-dcnode-id="268" instrument_node="">Comparing our calculations with the observations we find a good approximation. It is shown that the respective angular momentum for these spiral galaxies has the same almost linear pattern along the different distances from their respective nucleus. One of the significances of this result based on the general relativity solution is that it is possible to fit the known rotation curves of the spiral galaxies without any need of introducing dark matter at all. The next step in proving the galaxy dynamics on the general relativity solution is to make more detailed observations of their angular momentum to confirm if the way in which spiral galaxies rotate is mainly according to rigidly rotating and long-lived patterns, as steady spirals.</span></dl><a data-dcnode-id="266" name="SecACKNOWLEDGEMENTS"></a><h3 data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">ACKNOWLEDGEMENTS</span></h3><dl data-dcnode-id="259"><dd data-dcnode-id="263"></dd><span data-dcnode-id="262" instrument_node="">The author would like to thank Professor Sergio S. Cornejo for its review and comments for this work.</span><dd data-dcnode-id="261"></dd><dd data-dcnode-id="260"></dd></dl><span data-dcnode-id="258" instrument_node="">
</span></div><span data-dcnode-id="256" instrument_node="">
