</span><h1 class="text-extra-large line-low mb-2" data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Strange radio waves emerge from the direction of the galactic center</span></h1><span data-dcnode-id="2444" instrument_node="">
</span><p class="article-byline text-low" data-dcnode-id="2439"><span data-dcnode-id="2443" instrument_node="">
                                        by                                         </span><a class="article-byline__link" data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usyd.edu.au/" target="_blank"><span data-dcnode-id="2442" instrument_node="">University of Sydney</span></a><span data-dcnode-id="2440" instrument_node="">
</span></p><span data-dcnode-id="2438" instrument_node="">
</span><div class="mt-4 article-main" data-dcnode-id="2059"><span data-dcnode-id="2437" instrument_node="">
</span><div class="article-gallery lightGallery" data-dcnode-id="2424"><span data-dcnode-id="2436" instrument_node="">
</span><div data-dcnode-id="2426" data-src="https://scx2.b-cdn.net/gfx/news/hires/2021/strange-radio-waves-em.jpg" data-sub-html="Artist's impression of radio signal ASKAP J173608.2-321635 arriving at Earth. Credit: Sebastian Zentilomo/University of Sydney" data-thumb="https://scx1.b-cdn.net/csz/news/tmb/2021/strange-radio-waves-em.jpg"><span data-dcnode-id="2435" instrument_node="">
</span><figure class="article-img" data-dcnode-id="2428"><span data-dcnode-id="2434" instrument_node="">
</span><img alt="Strange radio waves emerge from the direction of the galactic centre" data-dcnode-id="2433" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scx1.b-cdn.net/csz/news/800a/2021/strange-radio-waves-em.jpg&amp;raw" title="Artist's impression of radio signal ASKAP J173608.2-321635 arriving at Earth. Credit: Sebastian Zentilomo/University of Sydney" width="800"><span data-dcnode-id="2432" instrument_node="">
</span><figcaption class="text-darken text-low-up text-truncate-js text-truncate mt-3" data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">
                Artist's impression of radio signal ASKAP J173608.2-321635 arriving at Earth. Credit: Sebastian Zentilomo/University of Sydney
            </span></figcaption><span data-dcnode-id="2429" instrument_node=""> </span></figure><span data-dcnode-id="2427" instrument_node="">
</span></div><span data-dcnode-id="2425" instrument_node="">
</span></div><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Astronomers have discovered unusual signals coming from the direction of the Milky Way's center. The radio waves fit no currently understood pattern of variable radio source and could suggest a new class of stellar object.

                                         
                                                  </span></p><section class="article-banner first-banner ads-336x280" data-dcnode-id="2412"><span data-dcnode-id="2421" instrument_node="">
</span><span data-dcnode-id="2419" instrument_node="">
</span><div data-dcnode-id="2414" id="div-gpt-ad-1449240174198-2"><span data-dcnode-id="2418" instrument_node="">
</span><span data-dcnode-id="2415" instrument_node="">
</span></div><span data-dcnode-id="2413" instrument_node="">
</span></section><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">"The strangest property of this new signal is that it is has a very high polarization. This means its light oscillates in only one direction, but that direction rotates with time," said Ziteng Wang, lead author of the new study and a Ph.D. student in the School of Physics at the University of Sydney.</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2407" instrument_node="">"The brightness of the </span><a class="textTag" data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/object/" rel="tag"><span data-dcnode-id="2406" instrument_node="">object</span></a><span data-dcnode-id="2404" instrument_node=""> also varies dramatically, by a factor of 100, and the signal switches on and off apparently at random. We've never seen anything like it."</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2401" instrument_node="">Many types of star emit variable light across the electromagnetic spectrum. With tremendous advances in </span><a class="textTag" data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/radio%2Bastronomy/" rel="tag"><span data-dcnode-id="2400" instrument_node="">radio astronomy</span></a><span data-dcnode-id="2398" instrument_node="">, the study of variable or transient objects in </span><a class="textTag" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/radio%2Bwaves/" rel="tag"><span data-dcnode-id="2397" instrument_node="">radio waves</span></a><span data-dcnode-id="2395" instrument_node=""> is a huge field of study helping us to reveal the secrets of the Universe. Pulsars, supernovae, flaring stars and </span><a class="textTag" data-dcnode-id="2393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/fast%2Bradio%2Bbursts/" rel="tag"><span data-dcnode-id="2394" instrument_node="">fast radio bursts</span></a><span data-dcnode-id="2392" instrument_node=""> are all types of astronomical objects whose brightness varies.</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">"At first we thought it could be a pulsar—a very dense type of spinning dead star—or else a type of star that emits huge solar flares. But the signals from this new source don't match what we expect from these types of celestial objects," Mr Wang said.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2386" instrument_node="">The discovery of the object has been published today in the </span><i data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Astrophysical Journal</span></i><span data-dcnode-id="2383" instrument_node="">.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2380" instrument_node="">Mr Wang and an international team, including scientists from Australia's national science agency CSIRO, Germany, the United States, Canada, South Africa, Spain and France discovered the object using the CSIRO's ASKAP </span><a class="textTag" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/radio/" rel="tag"><span data-dcnode-id="2379" instrument_node="">radio</span></a><span data-dcnode-id="2377" instrument_node=""> telescope in Western Australia. Follow-up observations were with the South African Radio Astronomy Observatory's MeerKAT telescope.</span></p><span data-dcnode-id="2375" instrument_node="">

</span></video><div class="plyr__poster" data-dcnode-id="2212" style="background-image: url(&quot;https://scx1.b-cdn.net/gfx/video_tmb/2021/strange-radio-waves-em.mp4.jpg&quot;);"></div></div><div class="plyr__captions" data-dcnode-id="2210"></div><button aria-label="Play" class="plyr__control plyr__control--overlaid" data-dcnode-id="2203" data-plyr="play" type="button"><svg aria-hidden="true" data-dcnode-id="2206" focusable="false"><use data-dcnode-id="2207" href="#plyr-play"><svg data-dcnode-id="2208" id="plyr-play" viewBox="0 0 18 18"><path d="M15.562 8.1L3.87.225c-.818-.562-1.87 0-1.87.9v15.75c0 .9 1.052 1.462 1.87.9L15.563 9.9c.584-.45.584-1.35 0-1.8z" data-dcnode-id="2209"></path></svg></use></svg><span class="plyr__sr-only" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Play</span></span></button></div><span data-dcnode-id="2201" instrument_node="">
</span><figcaption class="text-darken text-low-up mt-4" data-dcnode-id="2199" itemprop="caption"><span data-dcnode-id="2200" instrument_node="">Artist's impression of the oscillating, variable radio signal ASKAP J173608.2-321635 arriving at Earth from towards the centre of the Milky Way. Credit: Sebastian Zentilomo/University of Sydney</span></figcaption><span data-dcnode-id="2198" instrument_node="">
</span></figure><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Mr Wang's Ph.D. supervisor is Professor Tara Murphy also from the Sydney Institute for Astronomy and the School of Physics.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Professor Murphy said: "We have been surveying the sky with ASKAP to find unusual new objects with a project known as variables and slow transients (VASTs), throughout 2020 and 2021. </span></p><span data-dcnode-id="2191" instrument_node="">
</span><div class="w-100 mb-4 ads" data-dcnode-id="2180"><span data-dcnode-id="2190" instrument_node="">
</span><span data-dcnode-id="2188" instrument_node="">
</span><span data-dcnode-id="2186" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0536483524803400" data-ad-format="auto" data-ad-slot="5350699939" data-dcnode-id="2185" style="display:block"></ins><span data-dcnode-id="2184" instrument_node="">
</span><span data-dcnode-id="2181" instrument_node="">
</span></div><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">"Looking towards the center of the galaxy, we found ASKAP J173608.2-321635, named after its coordinates. This object was unique in that it started out invisible, became bright, faded away and then reappeared. This behavior was extraordinary."</span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2175" instrument_node="">After detecting six </span><a class="textTag" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/radio%2Bsignals/" rel="tag"><span data-dcnode-id="2174" instrument_node="">radio signals</span></a><span data-dcnode-id="2172" instrument_node=""> from the source over nine months in 2020, the astronomers tried to find the object in visual light. They found nothing.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">They turned to the Parkes radio telescope and again failed to detect the source.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Professor Murphy said: "We then tried the more sensitive MeerKAT radio telescope in South Africa. Because the signal was intermittent, we observed it for 15 minutes every few weeks, hoping that we would see it again.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">"Luckily, the signal returned, but we found that the behavior of the source was dramatically different—the source disappeared in a single day, even though it had lasted for weeks in our previous ASKAP observations."</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">However, this further discovery did not reveal much more about the secrets of this transient radio source.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Mr Wang's co-supervisor, Professor David Kaplan from the University of Wisconsin-Milwaukee, said: "The information we do have has some parallels with another emerging class of mysterious objects known as galactic center radio transients, including one dubbed the 'cosmic burper."</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">"While our new object, ASKAP J173608.2-321635, does share some properties with GCRTs there are also differences. And we don't really understand those sources, anyway, so this adds to the mystery."</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The scientists plan to keep a close eye on the object to look for more clues as to what it might be.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">"Within the next decade, the transcontinental Square Kilometer Array (SKA) radio telescope will come online. It will be able to make sensitive maps of the sky every day," Professor Murphy said. "We expect the power of this telescope will help us solve mysteries such as this latest discovery, but it will also open vast new swathes of the cosmos to exploration in the radio spectrum."
