</span><div class="article-content retro-folders" data-dcnode-id="961" id="main-article"><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2940" instrument_node="">
</span><span data-dcnode-id="2938" instrument_node="">
</span><span data-dcnode-id="2936" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="2931" style="width:243px;"><a class="twikilink" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick" title="/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick"><div class="lazy_load_img_box" data-dcnode-id="2933" style="padding-top:169.96%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/roy_evaluation_2_2794.png" border="0" class="embeddedimage" data-dcnode-id="2934" height="413" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/roy_evaluation_2_2794.png&amp;raw" width="243"></div></a></div><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2929"></p><div class="indent" data-dcnode-id="2920"><em data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">"Heaven isn't full but the car park is. Since 1993 blessed souls have been driving around looking for a space."</span></em><span data-dcnode-id="2926" instrument_node="">
</span><div class="indent" data-dcnode-id="2921"><span data-dcnode-id="2925" instrument_node="">— </span><em data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Loads More Lies to Tell Small Kids</span></em><span data-dcnode-id="2922" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2914"><span class="ad-caption" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2915" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2909"><span data-dcnode-id="2913" instrument_node="">A character shuffles off the mortal coil to join the choir invisible. They travel through the Tunnel of Light and come out to find... a </span><a class="twikilink" data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeANumber" title="/pmwiki/pmwiki.php/Main/TakeANumber"><span data-dcnode-id="2912" instrument_node="">numbered ticket dispenser and a long line</span></a><span data-dcnode-id="2910" instrument_node="">.
</span></p><p data-dcnode-id="2901"><span data-dcnode-id="2908" instrument_node="">Welcome to the Afterlife Bureaucracy. Many movies have shown </span><a class="twikilink" data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExtraordinaryWorldOrdinaryProblems" title="/pmwiki/pmwiki.php/Main/ExtraordinaryWorldOrdinaryProblems"><span data-dcnode-id="2907" instrument_node="">the afterlife to be just an extension of the bureaucratic nightmare that plagues the living anytime they have any dealings with an official agency.</span></a><span data-dcnode-id="2905" instrument_node=""> Complete with "Now Serving XX (XXXXXXXXXXXXXX...)" signs, waiting rooms and </span><a class="twikilink" data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat"><span data-dcnode-id="2904" instrument_node="">obstructive bureaucrats</span></a><span data-dcnode-id="2902" instrument_node="">. But if the departed hope to get their Final Reward, they had better make damn sure all the "i"s are dotted and the "t"s are crossed.
</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2900" instrument_node="">Expect Hell in particular to be portrayed like this, because after all, for many people, </span><a class="twikilink" data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat"><span data-dcnode-id="2899" instrument_node="">dealing with the bureaucracy is its own kind of Hell</span></a><span data-dcnode-id="2897" instrument_node="">.
</span></p><p data-dcnode-id="2888"><span data-dcnode-id="2895" instrument_node="">Chinese mythology views heaven and the afterlife as a bureaucracy patterned on their own governmental systems (or was it the other way around?), and ruled over by the benevolent Jade Emperor, making this idea </span><a class="twikilink" data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanFeudalism" title="/pmwiki/pmwiki.php/Main/OlderThanFeudalism"><span data-dcnode-id="2894" instrument_node="">Older Than Feudalism</span></a><span data-dcnode-id="2892" instrument_node="">. As a result of extensive cultural exchange between Japan and China that has made this trope especially common in Anime and Manga. </span><a class="twikilink" data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JudgementOfTheDead" title="/pmwiki/pmwiki.php/Main/JudgementOfTheDead"><span data-dcnode-id="2891" instrument_node="">Judgement of the Dead</span></a><span data-dcnode-id="2889" instrument_node=""> is usually involved.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2882"><span class="ad-caption" data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2883" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="2867"><span data-dcnode-id="2881" instrument_node="">May overlap with </span><a class="twikilink" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellOfAHeaven" title="/pmwiki/pmwiki.php/Main/HellOfAHeaven"><span data-dcnode-id="2880" instrument_node="">Hell of a Heaven</span></a><span data-dcnode-id="2878" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneAfterlife" title="/pmwiki/pmwiki.php/Main/MundaneAfterlife"><span data-dcnode-id="2877" instrument_node="">Mundane Afterlife</span></a><span data-dcnode-id="2875" instrument_node="">. Do not confuse it with the video game series </span><em data-dcnode-id="2872"><a class="twikilink" data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DeptHeaven" title="/pmwiki/pmwiki.php/VideoGame/DeptHeaven"><span data-dcnode-id="2874" instrument_node="">Dept. Heaven</span></a></em><span data-dcnode-id="2871" instrument_node="">. May overlap with </span><a class="twikilink" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DontFearTheReaper" title="/pmwiki/pmwiki.php/Main/DontFearTheReaper"><span data-dcnode-id="2870" instrument_node="">Don't Fear the Reaper</span></a><span data-dcnode-id="2868" instrument_node="">.
</span></p><p data-dcnode-id="2860"><strong data-dcnode-id="2862"><span data-dcnode-id="2866" instrument_node="">As a </span><a class="twikilink" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathTrope" title="/pmwiki/pmwiki.php/Main/DeathTrope"><span data-dcnode-id="2865" instrument_node="">Death Trope</span></a><span data-dcnode-id="2863" instrument_node="">, several if not all Spoilers will be unmarked ahead. Beware.</span></strong><span data-dcnode-id="2861" instrument_node="">
</span></p><p data-dcnode-id="2859"></p><hr data-dcnode-id="2858"><h1 data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Examples:</span></h1><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2854"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="2852" onclick="toggleAllFolders();"><span data-dcnode-id="2853" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2850"></p><div class="folderlabel" data-dcnode-id="2848" onclick="togglefolder('folder0');"><span data-dcnode-id="2849" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime &amp; Manga&nbsp;</span></div><div class="folder" data-dcnode-id="2727" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="2847" instrument_node="">
</span><ul data-dcnode-id="2729"><li data-dcnode-id="2841"><span data-dcnode-id="2846" instrument_node=""> </span><em data-dcnode-id="2843"><a class="twikilink" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/HozukisCoolheadedness" title="/pmwiki/pmwiki.php/Manga/HozukisCoolheadedness"><span data-dcnode-id="2845" instrument_node="">Hozuki's Coolheadedness</span></a></em><span data-dcnode-id="2842" instrument_node=""> is about the bureaucracy of (Buddhist) Hell. They even have paid holidays for their employees.
</span></li><li data-dcnode-id="2832"><span data-dcnode-id="2840" instrument_node=""> </span><em data-dcnode-id="2837"><a class="twikilink" data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/YuYuHakusho" title="/pmwiki/pmwiki.php/Manga/YuYuHakusho"><span data-dcnode-id="2839" instrument_node="">YuYu Hakusho</span></a></em><span data-dcnode-id="2836" instrument_node="">; in fact, Yusuke's first reaction is to ask "Is this the stock market?" His unexpected heroic death causing problems for the bureaucracy is actually the entire catalyst of the series. Because no one expected him to pull a random selfless act and die, there was no place for him in the afterlife, and he was offered a chance to be resurrected. In exchange, he becomes the "Spirit World Detective," overseen by King Yama's son, Koenma. In the manga, it turns out that </span><span class="spoiler" data-dcnode-id="2834" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2835" instrument_node="">the bureaucracy is actually corrupt, with King Yama framing demons for violent crimes in order to maintain the Spirit World's control over the Demon World</span></span><span data-dcnode-id="2833" instrument_node="">.
</span></li><li data-dcnode-id="2787"><span data-dcnode-id="2831" instrument_node=""> </span><em data-dcnode-id="2828"><a class="twikilink" data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/DragonBall" title="/pmwiki/pmwiki.php/Franchise/DragonBall"><span data-dcnode-id="2830" instrument_node="">Dragon Ball</span></a></em><span data-dcnode-id="2827" instrument_node="">: An ever-expanding heirarchy of gods exist in the various universes who help lord over the realms and make sure things are running smoothly, including in the afterlife. However they do tend to fall </span><em data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">hard</span></em><span data-dcnode-id="2824" instrument_node=""> into </span><a class="twikilink" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything" title="/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything"><span data-dcnode-id="2823" instrument_node="">The Pirates Who Don't Do Anything</span></a><span data-dcnode-id="2821" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWorfEffect" title="/pmwiki/pmwiki.php/Main/TheWorfEffect"><span data-dcnode-id="2820" instrument_node="">The Worf Effect</span></a><span data-dcnode-id="2818" instrument_node="">, meaning it's often left to the protagonists to meet and defeat any conflicts that arise.
</span><ul data-dcnode-id="2788"><li data-dcnode-id="2807"><span data-dcnode-id="2817" instrument_node=""> King Yemma is in charge of judging the souls of the dead, determining whether they go to heaven or hell. He's actually a real figure from Asian mythology, but what makes him this trope is that his role is portrayed as a </span><em data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">literal</span></em><span data-dcnode-id="2814" instrument_node=""> desk-job, with paperwork and pen-pushing and everything. Whether he judges </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">all</span></em><span data-dcnode-id="2811" instrument_node=""> the dead or if he's just in charge of Earth's afterlife in particular is unclear, however the Buu Arc implies that he indeed does judge the dead across the </span><em data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">entire</span></em><span data-dcnode-id="2808" instrument_node=""> universe.
</span></li><li data-dcnode-id="2793"><span data-dcnode-id="2806" instrument_node=""> Each world has a Kami, meaning "god", although the </span><a class="twikilink" data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/FUNimation" title="/pmwiki/pmwiki.php/Creator/FUNimation"><span data-dcnode-id="2805" instrument_node="">FUNimation</span></a><span data-dcnode-id="2803" instrument_node=""> dubs make Kami their given name and their title changed to </span><a class="twikilink" data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Bowdlerise" title="/pmwiki/pmwiki.php/Main/Bowdlerise"><span data-dcnode-id="2802" instrument_node="">Guardian of Earth</span></a><span data-dcnode-id="2800" instrument_node="">. They answer to the Kaio (Kaiō; "Lord of Realms") of their quadrant, who answers to the Grand Kai. Above the Grand Kai are one or more Supreme Kais (Kaiōshin; "Divine Lord of Realms"), who watch over the universe as a whole. The number of Supreme Kais to a universe appears to be variable; most universes appear to just have two (generally an elder and an apprentice), but Universe 7 had </span><em data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">five</span></em><span data-dcnode-id="2797" instrument_node=""> at one point before a monster attack left them with a single </span><a class="twikilink" data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncompletelyTrained" title="/pmwiki/pmwiki.php/Main/IncompletelyTrained"><span data-dcnode-id="2796" instrument_node="">Incompletely Trained</span></a><span data-dcnode-id="2794" instrument_node=""> one.
</span></li><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node=""> It is later revealed that the Supreme Kais are the 'Gods of Creation' and balanced by a 'God of Destruction,' who destroys old worlds and such so new ones can formed. They are technically equal in "rank" to the Supreme Kai, but given that they are in general much more powerful than the Supreme Kai, in practice the Kai will usually defer to the God of Destruction. The God of Destruction is attended by an Angel, whose job it is to take care of them and train them. Angels also happen to be far more powerful than the Gods of Destruction, generally making them the single most powerful beings in a given universe. In the DBZ universe, (said to be the 7th Universe), the God of Destruction is Beerus, and his Angel is known as Whis.
</span></li><li data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node=""> At the top of the hierarchy is Zen'O, "King of All" ("Grand Zen'o the Omni-King" in the English dub). He also has an Angel for an attendant, who is referred to as the Grand Priest. Unlike the Gods of Destruction, whose Angels are more powerful than they are, Zen'O is noted to be far more powerful than the Grand Priest is.
</span></li></ul></li><li data-dcnode-id="2775"><span data-dcnode-id="2786" instrument_node=""> </span><em data-dcnode-id="2783"><a class="twikilink" data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Bleach" title="/pmwiki/pmwiki.php/Manga/Bleach"><span data-dcnode-id="2785" instrument_node="">Bleach</span></a></em><span data-dcnode-id="2782" instrument_node="">: Soul Society is run this way, with authority from the (absentee) Soul King delegated to the (civilian) Central 46, which in turn commands the (military) Gotei 13. The bureaucracy has been in place for at least 1000 years and is just about as crusty and hide-bound as you'd expect. It's not an exaggeration to say that a good 75% of all the nonsense that goes down in </span><em data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Bleach</span></em><span data-dcnode-id="2779" instrument_node=""> is because of Soul Society being poorly governed. </span><span class="spoiler" data-dcnode-id="2777" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2778" instrument_node="">In the second half of the series, this is slowly changing as the Gotei becomes more open, and as Kyouraku makes reforms in the wake of Yamamoto's death.</span></span><span data-dcnode-id="2776" instrument_node="">
</span></li><li data-dcnode-id="2766"><span data-dcnode-id="2774" instrument_node=""> </span><em data-dcnode-id="2771"><a class="twikilink" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Saiyuki" title="/pmwiki/pmwiki.php/Manga/Saiyuki"><span data-dcnode-id="2773" instrument_node="">Saiyuki</span></a></em><span data-dcnode-id="2770" instrument_node="">, being based on a classical Chinese novel, has an extensive version. Particularly of interest is </span><em data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Saiyuki Gaiden</span></em><span data-dcnode-id="2767" instrument_node="">, set mostly in the heavenly realms and where most characters are Celestial Bureaucrats of one form or another.
</span></li><li data-dcnode-id="2760"><span data-dcnode-id="2765" instrument_node=""> </span><em data-dcnode-id="2762"><a class="twikilink" data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/DescendantsOfDarkness" title="/pmwiki/pmwiki.php/Manga/DescendantsOfDarkness"><span data-dcnode-id="2764" instrument_node="">Descendants of Darkness</span></a></em><span data-dcnode-id="2761" instrument_node=""> is based upon this trope. The main characters are all dead people who serve as bureaucrats for the Afterlife Bureaucracy.
</span></li><li data-dcnode-id="2754"><span data-dcnode-id="2759" instrument_node=""> </span><em data-dcnode-id="2756"><a class="twikilink" data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BlackButler" title="/pmwiki/pmwiki.php/Manga/BlackButler"><span data-dcnode-id="2758" instrument_node="">Black Butler</span></a></em><span data-dcnode-id="2755" instrument_node=""> seems to have one too. This may be an homage to Yami no Matsuei.
</span></li><li data-dcnode-id="2748"><span data-dcnode-id="2753" instrument_node=""> </span><em data-dcnode-id="2750"><a class="twikilink" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AhMyGoddess" title="/pmwiki/pmwiki.php/Manga/AhMyGoddess"><span data-dcnode-id="2752" instrument_node="">Ah! My Goddess</span></a></em><span data-dcnode-id="2749" instrument_node="">'s Heaven is full of celestial sysadmins. The episode where Belldandy gets demon powers plays up this trope.
</span></li><li data-dcnode-id="2742"><span data-dcnode-id="2747" instrument_node=""> Edaniel describes the afterlife like this in </span><em data-dcnode-id="2744"><a class="twikilink" data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Bizenghast" title="/pmwiki/pmwiki.php/Manga/Bizenghast"><span data-dcnode-id="2746" instrument_node="">Bizenghast</span></a></em><span data-dcnode-id="2743" instrument_node="">.
</span></li><li data-dcnode-id="2736"><span data-dcnode-id="2741" instrument_node=""> The monsters of </span><em data-dcnode-id="2738"><a class="twikilink" data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/Slayers" title="/pmwiki/pmwiki.php/LightNovel/Slayers"><span data-dcnode-id="2740" instrument_node="">Slayers</span></a></em><span data-dcnode-id="2737" instrument_node=""> have one; all we really know about it is that Xellos, despite being more powerful than any of Shaburanigdo's lieutenants(he was apparently created specifically for The War of the Monster's Fall), ranks well below them.
</span></li><li data-dcnode-id="2730"><span data-dcnode-id="2735" instrument_node=""> Hotori dies and finds the Japanese Heaven is like this in </span><em data-dcnode-id="2732"><a class="twikilink" data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AndYetTheTownMoves" title="/pmwiki/pmwiki.php/Manga/AndYetTheTownMoves"><span data-dcnode-id="2734" instrument_node="">And Yet the Town Moves</span></a></em><span data-dcnode-id="2731" instrument_node="">.
</span></li></ul><p data-dcnode-id="2728"></p></div><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2725"></p><div class="folderlabel" data-dcnode-id="2723" onclick="togglefolder('folder1');"><span data-dcnode-id="2724" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Books&nbsp;</span></div><div class="folder" data-dcnode-id="2654" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="2722" instrument_node="">
</span><ul data-dcnode-id="2655"><li data-dcnode-id="2713"><span data-dcnode-id="2721" instrument_node=""> In </span><em data-dcnode-id="2718"><a class="twikilink" data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Valerian" title="/pmwiki/pmwiki.php/ComicBook/Valerian"><span data-dcnode-id="2720" instrument_node="">Valérian</span></a></em><span data-dcnode-id="2717" instrument_node="">, the celestial hierarchy based on planet Hypsis appears to be an extremely capitalist enterprise. Each pantheon's position in the hierarchy is determined by the gross national product of the planet it oversees, and it's possible for the enterprise to fail, which leads to stripping divinity and immortality from the pantheon's members, and banishing them to the infernal depths of the Point Central to work off their debts, as happened to one </span><a class="twikilink" data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LouisCypher" title="/pmwiki/pmwiki.php/Main/LouisCypher"><span data-dcnode-id="2716" instrument_node="">Mr. L.C.F. Sat</span></a><span data-dcnode-id="2714" instrument_node="">. The members of the Earth's pantheon, the Father, the Son and the Holy Spirit are a dilapidated business near collapse, and harassed by their colleagues over the Earthlings' habit of meddling with the affairs of others.
</span></li><li data-dcnode-id="2707"><span data-dcnode-id="2712" instrument_node=""> In </span><em data-dcnode-id="2709"><a class="twikilink" data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/AfterlifeInc" title="/pmwiki/pmwiki.php/ComicBook/AfterlifeInc"><span data-dcnode-id="2711" instrument_node="">Afterlife Inc</span></a></em><span data-dcnode-id="2708" instrument_node=""> a con-artist named Jack Fortune dies, discovers an afterlife in chaos, then takes over and runs it like a business. The road is hell is paved with good intentions, but Jack's doing pretty well in building a kinder, caring afterlife. So far.
</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2706" instrument_node=""> In </span><em data-dcnode-id="2703"><a class="twikilink" data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/DylanDog" title="/pmwiki/pmwiki.php/ComicBook/DylanDog"><span data-dcnode-id="2705" instrument_node="">Dylan Dog</span></a></em><span data-dcnode-id="2702" instrument_node=""> there are multiple "Hells" in the afterlife, some looking like a classical </span><a class="twikilink" data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDivineComedy" title="/pmwiki/pmwiki.php/Literature/TheDivineComedy"><span data-dcnode-id="2701" instrument_node="">Dantesque</span></a><span data-dcnode-id="2699" instrument_node=""> caves of eternal torture, others more peaceful and heaven-like (it's even suggested that life could be a Hell and death is only a way to get from one Hell to the other). There's a Hell dedicated to the archive of the deaths that happen in London that resembles the </span><a class="twikilink" data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucracy" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucracy"><span data-dcnode-id="2698" instrument_node="">Obstructive</span></a><span data-dcnode-id="2696" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VastBureaucracy" title="/pmwiki/pmwiki.php/Main/VastBureaucracy"><span data-dcnode-id="2695" instrument_node="">Vast Bureaucracy</span></a><span data-dcnode-id="2693" instrument_node=""> from </span><em data-dcnode-id="2690"><a class="twikilink" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Brazil" title="/pmwiki/pmwiki.php/Film/Brazil"><span data-dcnode-id="2692" instrument_node="">Brazil</span></a></em><span data-dcnode-id="2689" instrument_node="">.
</span></li><li data-dcnode-id="2682"><span data-dcnode-id="2687" instrument_node=""> The depiction of Hell and the Norse Afterlife seem to work this way in </span><em data-dcnode-id="2684"><a class="twikilink" data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/NinjaHighSchool" title="/pmwiki/pmwiki.php/ComicBook/NinjaHighSchool"><span data-dcnode-id="2686" instrument_node="">Ninja High School</span></a></em><span data-dcnode-id="2683" instrument_node="">.
</span></li><li data-dcnode-id="2676"><span data-dcnode-id="2681" instrument_node=""> In the </span><em data-dcnode-id="2678"><a class="twikilink" data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DeathJr" title="/pmwiki/pmwiki.php/VideoGame/DeathJr"><span data-dcnode-id="2680" instrument_node="">Death Jr.</span></a></em><span data-dcnode-id="2677" instrument_node=""> series, Death is the CEO of the corporation that handles the afterlife. The bureaucracy happens later (endless queues of souls, reams of forms) when Bureaucracy, the fifth horseman of the apocalypse, tries to take over.
</span></li><li data-dcnode-id="2667"><span data-dcnode-id="2675" instrument_node=""> </span><em data-dcnode-id="2672"><a class="twikilink" data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheGrievousJourneyOfIchabodAzrael" title="/pmwiki/pmwiki.php/ComicBook/TheGrievousJourneyOfIchabodAzrael"><span data-dcnode-id="2674" instrument_node="">The Grievous Journey of Ichabod Azrael</span></a></em><span data-dcnode-id="2671" instrument_node="">: Purgatory/limbo is a wasteland where the souls of the formerly living wait in line at the bank of a river guarded by demonic horsemen before receiving judgment by </span><a class="twikilink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFerryman" title="/pmwiki/pmwiki.php/Main/TheFerryman"><span data-dcnode-id="2670" instrument_node="">The Ferryman</span></a><span data-dcnode-id="2668" instrument_node="">, who will take them to their final destination.
</span></li><li data-dcnode-id="2656"><span data-dcnode-id="2666" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheGoldenAgeOfComicBooks" title="/pmwiki/pmwiki.php/UsefulNotes/TheGoldenAgeOfComicBooks"><span data-dcnode-id="2665" instrument_node="">Back in 1942</span></a><span data-dcnode-id="2663" instrument_node="">, Fawcet Comics debuted Kid Eternity, a young hero who was the victim of the first celestial clerical error in two million years. After his grandfather’s boat is torpedoed by a German U-boat, he ends up in Eternity (the name for Heaven here) where he finds out he isn’t supposed to die for 75 years. Fortunately, this is a Celestial Bureaucracy that is big on restitution; they not only grant him life, but incredible super-powers (including the ability to summon both historic and fictional characters to aid him) and as further largesse, appoint the portly desk jockey (“Mr. Keeper”) who made the error to act as his partner. The duo fought crime and </span><a class="twikilink" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThoseWackyNazis" title="/pmwiki/pmwiki.php/Main/ThoseWackyNazis"><span data-dcnode-id="2662" instrument_node="">Those Wacky Nazis</span></a><span data-dcnode-id="2660" instrument_node=""> for about eight years, but Kid Eternity never had the </span><a class="twikilink" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PopularityPower" title="/pmwiki/pmwiki.php/Main/PopularityPower"><span data-dcnode-id="2659" instrument_node="">Popularity Power</span></a><span data-dcnode-id="2657" instrument_node=""> he needed to be a hit, although he has had a few guest appearances since then. (And ironically, if he does indeed ever want to become A-list, he has to hurry; his 75-year reprieve is almost up!)
</span></li></ul></div><span data-dcnode-id="2653" instrument_node="">
</span><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2647"><span class="ad-caption" data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2648" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2646"></p><div class="folderlabel" data-dcnode-id="2644" onclick="togglefolder('folder2');"><span data-dcnode-id="2645" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="2623" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="2643" instrument_node="">
</span><ul data-dcnode-id="2624"><li data-dcnode-id="2631"><span data-dcnode-id="2642" instrument_node=""> The </span><em data-dcnode-id="2639"><a class="twikilink" data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/HauntedMansionAndTheHatboxGhost" title="/pmwiki/pmwiki.php/Fanfic/HauntedMansionAndTheHatboxGhost"><span data-dcnode-id="2641" instrument_node="">Haunted Mansion and the Hatbox Ghost</span></a></em><span data-dcnode-id="2638" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FanVerse" title="/pmwiki/pmwiki.php/Main/FanVerse"><span data-dcnode-id="2637" instrument_node="">Fan Verse</span></a><span data-dcnode-id="2635" instrument_node=""> has a </span><a class="twikilink" data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Reconstruction" title="/pmwiki/pmwiki.php/Main/Reconstruction"><span data-dcnode-id="2634" instrument_node="">Reconstruction</span></a><span data-dcnode-id="2632" instrument_node=""> version of this trope. Though the ghost realm, worldwide, is a rather lawless mess, the Haunted Mansion itself has a bureaucracy through the Ghost Relations Department, and ghosts have to fill out all sorts of forms to be allowed to haunt the house permanently. The Ghost Host, a self-described stickler for paperwork, imposes it on the other spooks, much to their annoyance.
</span></li><li data-dcnode-id="2625"><span data-dcnode-id="2630" instrument_node=""> </span><em data-dcnode-id="2627"><a class="twikilink" data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/MrAndMrsGold" title="/pmwiki/pmwiki.php/Fanfic/MrAndMrsGold"><span data-dcnode-id="2629" instrument_node="">Mr and Mrs Gold</span></a></em><span data-dcnode-id="2626" instrument_node="">: The Underworld seems to have shades of this. Lines of people waiting to get onto Charon’s boat (with proper payment of course), an intercom voice instructing them what to do, etc.
</span></li></ul></div><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2621"></p><div class="folderlabel" data-dcnode-id="2619" onclick="togglefolder('folder3');"><span data-dcnode-id="2620" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Animated&nbsp;</span></div><div class="folder" data-dcnode-id="2578" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="2618" instrument_node="">
</span><ul data-dcnode-id="2579"><li data-dcnode-id="2609"><span data-dcnode-id="2617" instrument_node=""> Hades' realm in the </span><a class="twikilink" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/DisneyAnimatedCanon" title="/pmwiki/pmwiki.php/Franchise/DisneyAnimatedCanon"><span data-dcnode-id="2616" instrument_node="">Disney version</span></a><span data-dcnode-id="2614" instrument_node=""> of </span><em data-dcnode-id="2611"><a class="twikilink" data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Hercules" title="/pmwiki/pmwiki.php/WesternAnimation/Hercules"><span data-dcnode-id="2613" instrument_node="">Hercules</span></a></em><span data-dcnode-id="2610" instrument_node=""> approaches this: though the place where the afterlife go is a chaotic swirling pool of ghosts and goo, when the dead enter Hades, a little sign clicks in: "1000001 served."
</span></li><li data-dcnode-id="2598"><span data-dcnode-id="2608" instrument_node=""> In the animated short film </span><em data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Heavenly Appeals,</span></em><span data-dcnode-id="2605" instrument_node=""> a reformed devil presents his appeals case to an obese angel guard at the gates of Heaven, only to be cruelly denied and have his documents thrown away. The angel further torments him by using a lever to make him bounce up and down on the stone platform he's sitting on, only to fall off his own cloud when he chokes on a donut. After hesitating, the devil saves the angel and they sit together on the cliff...</span><a class="twikilink" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UngratefulBastard" title="/pmwiki/pmwiki.php/Main/UngratefulBastard"><span data-dcnode-id="2604" instrument_node="">and then the angel shoves the devil off.</span></a><span data-dcnode-id="2602" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2600" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2601" instrument_node="">But the devil is saved when he grows a pair of angel wings and a halo off-screen. He joyfully enters the gates of Heaven, while the angel's wings disappear and he grows horns as he's cast down into Hell.</span></span><span data-dcnode-id="2599" instrument_node="">
</span></li><li data-dcnode-id="2589"><span data-dcnode-id="2597" instrument_node=""> In </span><em data-dcnode-id="2594"><a class="twikilink" data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Coco" title="/pmwiki/pmwiki.php/WesternAnimation/Coco"><span data-dcnode-id="2596" instrument_node="">Coco</span></a></em><span data-dcnode-id="2593" instrument_node="">, there's a small team of immigration agents whose job is to help those in the Land of the Dead going to see their descendants (and stopping anyone who's not on their family's </span><em data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">ofrenda</span></em><span data-dcnode-id="2590" instrument_node="">), or coming home with gifts and offerings.
</span></li><li data-dcnode-id="2580"><span data-dcnode-id="2588" instrument_node=""> </span><em data-dcnode-id="2585"><a class="twikilink" data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Soul" title="/pmwiki/pmwiki.php/WesternAnimation/Soul"><span data-dcnode-id="2587" instrument_node="">Soul</span></a></em><span data-dcnode-id="2584" instrument_node=""> contrasts the friendly counselors (all named "Jerry") who help new souls in the Great Before develop their personalities before going to Earth with Terry, the ornery accountant who tabulates the souls going into the Great Beyond. And when they notice an anomaly in the count, Terry goes out of their way to drag Joe's errant soul back to the conveyor belt. </span><span class="spoiler" data-dcnode-id="2582" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2583" instrument_node=""> In the end, the Jerries shift a bead on Terry's abacus while they're not looking and give Joe a second chance at life as a reward for helping 22.</span></span><span data-dcnode-id="2581" instrument_node="">
</span></li></ul></div><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2576"></p><div class="folderlabel" data-dcnode-id="2574" onclick="togglefolder('folder4');"><span data-dcnode-id="2575" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Live-Action&nbsp;</span></div><div class="folder" data-dcnode-id="2448" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="2573" instrument_node="">
</span><ul data-dcnode-id="2449"><li data-dcnode-id="2558"><span data-dcnode-id="2572" instrument_node=""> </span><em data-dcnode-id="2569"><a class="createlink" data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheHornBlowsAtMidnight" title="/pmwiki/pmwiki.php/Film/TheHornBlowsAtMidnight"><span data-dcnode-id="2571" instrument_node="">The Horn Blows At Midnight</span></a></em><span data-dcnode-id="2568" instrument_node="">: This infamous </span><a class="twikilink" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JackBenny" title="/pmwiki/pmwiki.php/Creator/JackBenny"><span data-dcnode-id="2567" instrument_node="">Jack Benny</span></a><span data-dcnode-id="2565" instrument_node=""> flop has Benny's character dreaming he's in a </span><a class="twikilink" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FluffyCloudHeaven" title="/pmwiki/pmwiki.php/Main/FluffyCloudHeaven"><span data-dcnode-id="2564" instrument_node="">Fluffy Cloud Heaven</span></a><span data-dcnode-id="2562" instrument_node=""> featuring an elaborate bureaucracy and symphonies orchestras of angels from multiple planets. Benny's assigned to end the planet earth by blowing his titular trumpet . . . . </span><a class="twikilink" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HilarityEnsues" title="/pmwiki/pmwiki.php/Main/HilarityEnsues"><span data-dcnode-id="2561" instrument_node="">Hilarity Ensues</span></a><span data-dcnode-id="2559" instrument_node="">.
</span></li><li data-dcnode-id="2549"><span data-dcnode-id="2557" instrument_node=""> </span><em data-dcnode-id="2554"><a class="twikilink" data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Beetlejuice" title="/pmwiki/pmwiki.php/Film/Beetlejuice"><span data-dcnode-id="2556" instrument_node="">Beetlejuice</span></a></em><span data-dcnode-id="2553" instrument_node="">. The afterlife is a waiting room and a surreal office building staffed by the ghosts of people who committed suicide. The newly dead are assigned case workers who give limited guidance, and the dead are expected to read </span><em data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">The Handbook for the Recently Deceased</span></em><span data-dcnode-id="2550" instrument_node=""> immediately upon their death (not that anyone comes out and tells them to read it, it’s just expected).
</span></li><li data-dcnode-id="2544"><span data-dcnode-id="2548" instrument_node=""> </span><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Defending Your Life</span></em><span data-dcnode-id="2545" instrument_node=""> has an afterlife of prosecutors, defense lawyers, judges, and a huge legal tangle.
</span></li><li data-dcnode-id="2535"><span data-dcnode-id="2543" instrument_node=""> </span><em data-dcnode-id="2540"><a class="twikilink" data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/AMatterOfLifeAndDeath" title="/pmwiki/pmwiki.php/Film/AMatterOfLifeAndDeath"><span data-dcnode-id="2542" instrument_node="">A Matter of Life and Death</span></a></em><span data-dcnode-id="2539" instrument_node="">, known in the U.S. as </span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Stairway to Heaven</span></em><span data-dcnode-id="2536" instrument_node="">.
</span></li><li data-dcnode-id="2529"><span data-dcnode-id="2534" instrument_node=""> </span><em data-dcnode-id="2531"><a class="twikilink" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/HereComesMrJordan" title="/pmwiki/pmwiki.php/Film/HereComesMrJordan"><span data-dcnode-id="2533" instrument_node="">Here Comes Mr. Jordan</span></a></em><span data-dcnode-id="2530" instrument_node=""> features bungled soul reaping by an officious (psychopompous?) angel known only as 7013, as part of a rather airline-esque afterlife.
</span></li><li data-dcnode-id="2515"><span data-dcnode-id="2528" instrument_node=""> In the 1946 </span><a class="twikilink" data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AbbottAndCostello" title="/pmwiki/pmwiki.php/Creator/AbbottAndCostello"><span data-dcnode-id="2527" instrument_node="">Abbott and Costello</span></a><span data-dcnode-id="2525" instrument_node=""> ghost comedy, </span><em data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">The Time of Their Lives</span></em><span data-dcnode-id="2522" instrument_node="">, after the curse that prevents </span><a class="twikilink" data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheAmericanRevolution" title="/pmwiki/pmwiki.php/UsefulNotes/TheAmericanRevolution"><span data-dcnode-id="2521" instrument_node="">Patriot</span></a><span data-dcnode-id="2519" instrument_node=""> Horatio Prim (Lou Costello) from ascending to Heaven is lifted, he is still excluded — because Heaven is "Closed for </span><a class="twikilink" data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/GeorgeWashington" title="/pmwiki/pmwiki.php/UsefulNotes/GeorgeWashington"><span data-dcnode-id="2518" instrument_node="">Washington's</span></a><span data-dcnode-id="2516" instrument_node=""> Birthday."
</span></li><li data-dcnode-id="2509"><span data-dcnode-id="2514" instrument_node=""> </span><em data-dcnode-id="2511"><a class="twikilink" data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheToothFairy" title="/pmwiki/pmwiki.php/Film/TheToothFairy"><span data-dcnode-id="2513" instrument_node="">The Tooth Fairy</span></a></em><span data-dcnode-id="2510" instrument_node="">: Not afterlife, but still (usually) invisible to humans.
</span></li><li data-dcnode-id="2503"><span data-dcnode-id="2508" instrument_node=""> </span><em data-dcnode-id="2505"><a class="twikilink" data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ALifeLessOrdinary" title="/pmwiki/pmwiki.php/Film/ALifeLessOrdinary"><span data-dcnode-id="2507" instrument_node="">A Life Less Ordinary</span></a></em><span data-dcnode-id="2504" instrument_node=""> saw heaven as this, complete with archangels as harassed middle-managers.
</span></li><li data-dcnode-id="2497"><span data-dcnode-id="2502" instrument_node=""> The Adjusters in </span><em data-dcnode-id="2499"><a class="twikilink" data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheAdjustmentBureau" title="/pmwiki/pmwiki.php/Film/TheAdjustmentBureau"><span data-dcnode-id="2501" instrument_node="">The Adjustment Bureau</span></a></em><span data-dcnode-id="2498" instrument_node=""> are supernatural beings in charge of human destinies... and they dress like 50's office clerks and work in what appears to be a huge chancellery.
</span></li><li data-dcnode-id="2491"><span data-dcnode-id="2496" instrument_node=""> Nick's introduction to the </span><em data-dcnode-id="2493"><a class="twikilink" data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/RIPD" title="/pmwiki/pmwiki.php/Film/RIPD"><span data-dcnode-id="2495" instrument_node="">R.I.P.D.</span></a></em><span data-dcnode-id="2492" instrument_node=""> takes place in an office, outside of which are walls full of filing cabinets as far as the eyes can see.
</span></li><li data-dcnode-id="2482"><span data-dcnode-id="2490" instrument_node=""> The Japanese film </span><em data-dcnode-id="2487"><a class="createlink" data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Afterlife19998" title="/pmwiki/pmwiki.php/Film/Afterlife19998"><span data-dcnode-id="2489" instrument_node="">Afterlife</span></a></em><span data-dcnode-id="2486" instrument_node=""> is set in an </span><a class="twikilink" data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AfterlifeAntechamber" title="/pmwiki/pmwiki.php/Main/AfterlifeAntechamber"><span data-dcnode-id="2485" instrument_node="">Afterlife Antechamber</span></a><span data-dcnode-id="2483" instrument_node=""> where the newly-dead are put through a formal process to prepare them for eternity.
</span></li><li data-dcnode-id="2474"><span data-dcnode-id="2481" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TheJamHandyOrganization" title="/pmwiki/pmwiki.php/Creator/TheJamHandyOrganization"><span data-dcnode-id="2480" instrument_node="">Jam Handy</span></a><span data-dcnode-id="2478" instrument_node=""> short </span><em data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Out of This World</span></em><span data-dcnode-id="2475" instrument_node=""> is about angel-like and demon-like characters who are actually file clerks who share an office tracking the sales numbers for bread salesmen. They perform a minor Job-like bet on a random bread salesman to see if he'll keep up good sales technique after somebody makes fun of him for it, simply out of boredom.
</span></li><li data-dcnode-id="2468"><span data-dcnode-id="2473" instrument_node=""> </span><em data-dcnode-id="2470"><a class="twikilink" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ItsAWonderfulLife" title="/pmwiki/pmwiki.php/Film/ItsAWonderfulLife"><span data-dcnode-id="2472" instrument_node="">It's a Wonderful Life</span></a></em><span data-dcnode-id="2469" instrument_node=""> has shades of this. Angels are divided into classes (Clarence, for instance, is a Guardian A2—Angel, Second Class), and to "advance," a particular soul needs to successfully perform duties and thus gain wings and more celestial powers. These duties are apparently assigned in a rotating order, with angels getting turns ever few centuries or so. Even prayer is implied to work this way—the film opens with dozens of people praying for George Bailey, and two high-ranking angels remark that they'll have to send someone down because of the high numbers.
</span></li><li data-dcnode-id="2462"><span data-dcnode-id="2467" instrument_node=""> The afterlife in </span><em data-dcnode-id="2464"><a class="twikilink" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/AlongWithTheGodsTheTwoWorlds" title="/pmwiki/pmwiki.php/Film/AlongWithTheGodsTheTwoWorlds"><span data-dcnode-id="2466" instrument_node="">Along With The Gods: The Two Worlds</span></a></em><span data-dcnode-id="2463" instrument_node=""> is organized like a bureaucracy. King Yeomra oversees all of the Hells and decides on the order in which a soul will face the Hells. The gods of each Hell judges souls, with guardians acting as defense lawyers and prosecutors on the other side. There are different levels of guardians and prosecutors, with each gaining a promotion if they succeed. There are also rules and regulations that govern how guardians and prosecutors can operate.
</span></li><li data-dcnode-id="2456"><span data-dcnode-id="2461" instrument_node=""> </span><em data-dcnode-id="2458"><a class="twikilink" data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/HellraiserJudgement" title="/pmwiki/pmwiki.php/Film/HellraiserJudgement"><span data-dcnode-id="2460" instrument_node="">Hellraiser: Judgement</span></a></em><span data-dcnode-id="2457" instrument_node="">: Hell, or rather the Stygian Inquisition within it, is portrayed as very bureaucratic. New arrivals are interviewed by The Auditor, who puts their sins to paper, which are then eaten by another demon (The Assessor), and finally judged by the Jury. If found guilty, the Butcher and the Surgeon finish the sinner off. Pinhead and his Cenobites are part of a different faction of demons (The Order of the Gash) dedicated to pleasure and pain as an end in itself, and only rarely get involved with other matters.
</span></li><li data-dcnode-id="2450"><span data-dcnode-id="2455" instrument_node=""> </span><em data-dcnode-id="2452"><a class="twikilink" data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Orpheus" title="/pmwiki/pmwiki.php/Film/Orpheus"><span data-dcnode-id="2454" instrument_node="">Orpheus</span></a></em><span data-dcnode-id="2451" instrument_node="">: For murdering Eurydice and taking her to the underworld, the princess (an angel of death) has to face a tribunal consisting of some weary-looking bureaucrats. She's basically let off with a warning. For making an unauthorized entry into the afterlife to get Eurydice, Orpheus is forbidden to ever look at her again, with her having to go back if she does.
</span></li></ul></div><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2446"></p><div class="folderlabel" data-dcnode-id="2444" onclick="togglefolder('folder5');"><span data-dcnode-id="2445" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Jokes&nbsp;</span></div><div class="folder" data-dcnode-id="2433" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="2443" instrument_node="">
</span><ul data-dcnode-id="2434"><li data-dcnode-id="2435"><span data-dcnode-id="2442" instrument_node=""> Three social workers are driving together to a social work conference when they are killed in a car crash. They end up approaching St. Peter in heaven, where they will each have to tell him what they did with their lives, so that St. Peter can determine whether they go to heaven or hell.
</span><div class="indent" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">The first social worker says, "I worked for the county welfare department. It was a really hard job and I was overloaded with clients, but I did help some people living in poverty to get necessary services." St. Peter thinks for a little bit, types into his computer for a little bit and says, "OK, you can go to heaven."
</span></div><div class="indent" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">The second social worker says, "I worked for Child Protective Services. It was really hard and depressing work, but I helped some children get out of abusive homes." St. Peter thinks for a little bit, types into his computer for a little bit, and says, "OK, you can go to heaven."
</span></div><div class="indent" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">The third social worker says, "I worked for a managed care company. I was very well paid and had a nice cushy office, and I really saved that insurance company a lot of money!" St. Peter thinks for a little bit, types into his computer for a little bit, and says, "OK, you can go to heaven, but you can only stay for three days."
</span></div></li></ul></div><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2431"></p><div class="folderlabel" data-dcnode-id="2429" onclick="togglefolder('folder6');"><span data-dcnode-id="2430" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="2060" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="2428" instrument_node="">
</span><ul data-dcnode-id="2061"><li data-dcnode-id="2414"><span data-dcnode-id="2427" instrument_node=""> The main setting of </span><em data-dcnode-id="2424"><a class="twikilink" data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/KeysToTheKingdom" title="/pmwiki/pmwiki.php/Literature/KeysToTheKingdom"><span data-dcnode-id="2426" instrument_node="">Keys to the Kingdom</span></a></em><span data-dcnode-id="2423" instrument_node=""> is one. It's not an afterlife, but it is the heart of creation and was created as a </span><a class="twikilink" data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosmicKeystone" title="/pmwiki/pmwiki.php/Main/CosmicKeystone"><span data-dcnode-id="2422" instrument_node="">Cosmic Keystone</span></a><span data-dcnode-id="2420" instrument_node=""> and to observe and document everything that happens in reality. It doesn't function very well, mainly due to corruption and incompetence.
</span><div class="indent" data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">Arthur shut his eyes for a moment. He couldn’t believe he was being told about an </span><em data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">accounting problem</span></em><span data-dcnode-id="2416" instrument_node=""> in the epicentre of the universe, in the House on which the entirety of creation depended for its continuing existence.
</span></div></li><li data-dcnode-id="2406"><span data-dcnode-id="2413" instrument_node=""> </span><em data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Lemegeton Clavicula Salomonis</span></em><span data-dcnode-id="2410" instrument_node="">, or </span><em data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Solomon's Key</span></em><span data-dcnode-id="2407" instrument_node="">. This foundational text of Western occultism/magic presents a very complicated government of demons that can be summoned to do the magician's bidding. Dukes, Princes, Generals, Viceroys, and many others hold rank and administer specific functions in Hell.
</span></li><li data-dcnode-id="2400"><span data-dcnode-id="2405" instrument_node=""> Given it was written in Qing dynasty China it's not surprising that a number of stories in </span><em data-dcnode-id="2402"><a class="twikilink" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/StrangeStoriesFromAChineseStudio" title="/pmwiki/pmwiki.php/Literature/StrangeStoriesFromAChineseStudio"><span data-dcnode-id="2404" instrument_node="">Strange Stories from a Chinese Studio</span></a></em><span data-dcnode-id="2401" instrument_node=""> feature the Heavenly Bureaucracy. In one, a newly deceased man takes the Celestial court's exam and is awarded a post as god of his city, but refuses one the grounds that he needed to care for his ailing mother. His examiners are impressed by his show of filial devotion and bring him back to life until his mother dies of old age and he's free to assume his divine position.
</span></li><li data-dcnode-id="2389"><span data-dcnode-id="2399" instrument_node=""> </span><em data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Les jeux sont faits</span></em><span data-dcnode-id="2396" instrument_node=""> (</span><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">The Game is Up</span></em><span data-dcnode-id="2393" instrument_node=""> or </span><em data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">The Chips Are Down</span></em><span data-dcnode-id="2390" instrument_node=""> depending on the translation) by Sartre, written in 1943.
</span></li><li data-dcnode-id="2375"><span data-dcnode-id="2388" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TomHolt" title="/pmwiki/pmwiki.php/Creator/TomHolt"><span data-dcnode-id="2387" instrument_node="">Tom Holt</span></a><span data-dcnode-id="2385" instrument_node="">'s </span><em data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Here Comes The Sun</span></em><span data-dcnode-id="2382" instrument_node=""> is entirely based on this trope. For example, a complaints form consists of a pure, 24-carat gold slab several acres in area, which is filled with so much bureaucratic crap that the actual complaint needs to be chiseled in microscopic writing in a millimetre-wide spot.
</span><ul data-dcnode-id="2376"><li data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node=""> Holt loves this one. In </span><em data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Paint Your Dragon</span></em><span data-dcnode-id="2378" instrument_node="">, Hell is portrayed as a bureaucracy, and Chardonay is explicitly referred to as Management.
</span></li></ul></li><li data-dcnode-id="2363"><span data-dcnode-id="2374" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CSLewis" title="/pmwiki/pmwiki.php/Creator/CSLewis"><span data-dcnode-id="2373" instrument_node="">C. S. Lewis</span></a><span data-dcnode-id="2371" instrument_node="">'s </span><em data-dcnode-id="2368"><a class="twikilink" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheScrewtapeLetters" title="/pmwiki/pmwiki.php/Literature/TheScrewtapeLetters"><span data-dcnode-id="2370" instrument_node="">The Screwtape Letters</span></a></em><span data-dcnode-id="2367" instrument_node=""> is one of the earliest English-language examples (though he acknowledges a 17th-century example in the prologue), featuring a </span><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiabolicalBureaucracy" title="/pmwiki/pmwiki.php/Main/DiabolicalBureaucracy"><span data-dcnode-id="2366" instrument_node="">Diabolical Bureaucracy</span></a><span data-dcnode-id="2364" instrument_node=""> (given the focus of the book, readers never learn what heaven is like). In this case, Hell's bureaucracy was created by taking what Lewis saw as good qualities, such as a sense of humor about oneself, and seeing what was left.
</span></li><li data-dcnode-id="2357"><span data-dcnode-id="2362" instrument_node=""> The </span><em data-dcnode-id="2359"><a class="twikilink" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DarkHeavens" title="/pmwiki/pmwiki.php/Literature/DarkHeavens"><span data-dcnode-id="2361" instrument_node="">Dark Heavens</span></a></em><span data-dcnode-id="2358" instrument_node=""> series is based around ancient Chinese mythology, and hence contains numerous references to the celestial bureaucracy, with one character complaining about how much paperwork his quarter of heaven requires.
</span></li><li data-dcnode-id="2339"><span data-dcnode-id="2356" instrument_node=""> </span><em data-dcnode-id="2353"><a class="twikilink" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/GoodOmens" title="/pmwiki/pmwiki.php/Literature/GoodOmens"><span data-dcnode-id="2355" instrument_node="">Good Omens</span></a></em><span data-dcnode-id="2352" instrument_node="">, by </span><a class="twikilink" data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TerryPratchett" title="/pmwiki/pmwiki.php/Creator/TerryPratchett"><span data-dcnode-id="2351" instrument_node="">Terry Pratchett</span></a><span data-dcnode-id="2349" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/NeilGaiman" title="/pmwiki/pmwiki.php/Creator/NeilGaiman"><span data-dcnode-id="2348" instrument_node="">Neil Gaiman</span></a><span data-dcnode-id="2346" instrument_node="">, is </span><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">built</span></em><span data-dcnode-id="2343" instrument_node=""> on this trope from start to finish. Crowley and Aziraphale treat their respective work— infernal wiles and heavenly intervention— like boring quotas that just need filling in between the </span><em data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">real</span></em><span data-dcnode-id="2340" instrument_node=""> fun, which only Earth can provide. Both are frustrated with orders from higher-ups (or lower-downs) who know all about paperwork but nothing about how sinning and saving is different in the 20th century than the 14th.
</span></li><li data-dcnode-id="2333"><span data-dcnode-id="2338" instrument_node=""> </span><em data-dcnode-id="2335"><a class="twikilink" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheYearsOfRiceAndSalt" title="/pmwiki/pmwiki.php/Literature/TheYearsOfRiceAndSalt"><span data-dcnode-id="2337" instrument_node="">The Years of Rice and Salt</span></a></em><span data-dcnode-id="2334" instrument_node=""> by Kim Stanley Robinson features the Bardo (the afterlife of Tibetan folklore), which, in reflection of the growing influence of China in the living world, is gradually taken over by the Chinese Celestial Bureaucracy.
</span></li><li data-dcnode-id="2320"><span data-dcnode-id="2332" instrument_node=""> In </span><em data-dcnode-id="2329"><a class="twikilink" data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/InfernoLarryNivenAndJerryPournelle" title="/pmwiki/pmwiki.php/Literature/InfernoLarryNivenAndJerryPournelle"><span data-dcnode-id="2331" instrument_node="">Inferno</span></a></em><span data-dcnode-id="2328" instrument_node=""> by </span><a class="twikilink" data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/LarryNiven" title="/pmwiki/pmwiki.php/Creator/LarryNiven"><span data-dcnode-id="2327" instrument_node="">Larry Niven</span></a><span data-dcnode-id="2325" instrument_node=""> &amp; Jerry Pournelle, which is a modern re-imagining of Dante's </span><em data-dcnode-id="2322"><a class="twikilink" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDivineComedy" title="/pmwiki/pmwiki.php/Literature/TheDivineComedy"><span data-dcnode-id="2324" instrument_node="">Inferno</span></a></em><span data-dcnode-id="2321" instrument_node="">, Hell is one big, strange bureaucracy whose motives the protagonist puzzles out during the course of the story.
</span></li><li data-dcnode-id="2314"><span data-dcnode-id="2319" instrument_node=""> </span><em data-dcnode-id="2316"><a class="twikilink" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWishList" title="/pmwiki/pmwiki.php/Literature/TheWishList"><span data-dcnode-id="2318" instrument_node="">The Wish List</span></a></em><span data-dcnode-id="2315" instrument_node=""> features Saint Peter griping about how computer programmers never get past the Pearly Gates, so he has to do all of his records manually. The staff of Hell dread being reassigned to somewhere even worse than they already are.
</span></li><li data-dcnode-id="2306"><span data-dcnode-id="2313" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MarkTwain" title="/pmwiki/pmwiki.php/Creator/MarkTwain"><span data-dcnode-id="2312" instrument_node="">Mark Twain</span></a><span data-dcnode-id="2310" instrument_node="">'s </span><em data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Captain Stormfield's Visit to Heaven</span></em><span data-dcnode-id="2307" instrument_node=""> includes a part where he lands in an alien heaven and has to deal with the bureaucracy to get to the heaven for Earth.
</span></li><li data-dcnode-id="2297"><span data-dcnode-id="2305" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/PiersAnthony" title="/pmwiki/pmwiki.php/Creator/PiersAnthony"><span data-dcnode-id="2304" instrument_node="">Piers Anthony</span></a><span data-dcnode-id="2302" instrument_node="">'s </span><em data-dcnode-id="2299"><a class="twikilink" data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/IncarnationsOfImmortality" title="/pmwiki/pmwiki.php/Literature/IncarnationsOfImmortality"><span data-dcnode-id="2301" instrument_node="">Incarnations of Immortality</span></a></em><span data-dcnode-id="2298" instrument_node=""> series has one of these. Part of the new Death's personal problems with the system is that babies born of rape or incest are automatically set at the half-good half-bad line, meaning any stillborns or crib death babies are automatically sent to purgatory to become office accountants. (Until he fixes it.)
</span></li><li data-dcnode-id="2288"><span data-dcnode-id="2296" instrument_node=""> In </span><em data-dcnode-id="2293"><a class="twikilink" data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JourneyToTheWest" title="/pmwiki/pmwiki.php/Literature/JourneyToTheWest"><span data-dcnode-id="2295" instrument_node="">Journey to the West</span></a></em><span data-dcnode-id="2292" instrument_node="">, there is even a list in the underworld dictating who goes there. Guess whose names Sun Wukong crosses off when he storms in.
</span><ul data-dcnode-id="2289"><li data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node=""> An entire chapter revolves around someone's soul accidentally being sent back to Earth in another body due to a bureaucratic screw-up.
</span></li></ul></li><li data-dcnode-id="2262"><span data-dcnode-id="2287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RobertAHeinlein" title="/pmwiki/pmwiki.php/Creator/RobertAHeinlein"><span data-dcnode-id="2286" instrument_node="">Robert A. Heinlein</span></a><span data-dcnode-id="2284" instrument_node="">'s </span><em data-dcnode-id="2281"><a class="twikilink" data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JobAComedyOfJustice" title="/pmwiki/pmwiki.php/Literature/JobAComedyOfJustice"><span data-dcnode-id="2283" instrument_node="">Job: A Comedy of Justice</span></a></em><span data-dcnode-id="2280" instrument_node=""> plays with this concept.
</span><ul data-dcnode-id="2263"><li data-dcnode-id="2272"><span data-dcnode-id="2279" instrument_node=""> The protagonist goes to heaven after being subjected to the </span><a class="twikilink" data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TraumaCongaLine" title="/pmwiki/pmwiki.php/Main/TraumaCongaLine"><span data-dcnode-id="2278" instrument_node="">torments of Job, only to discover that God and Satan are merely junior deities in a massive celestial hierarchy, playing games with their mortal "pawns" in a manner deliberately analogous to children playing with dolls.</span></a><span data-dcnode-id="2276" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodIsEvil" title="/pmwiki/pmwiki.php/Main/GodIsEvil"><span data-dcnode-id="2275" instrument_node="">God is then punished for failing to provide his creations with fair and consistent rules</span></a><span data-dcnode-id="2273" instrument_node="">.
</span></li><li data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node=""> The Heaven that the protagonist reaches is run in this manner, with the various angels and saints acting as bureaucrats and civil servants.
</span></li><li data-dcnode-id="2264"><span data-dcnode-id="2269" instrument_node=""> The Heaven associated with Earth in </span><em data-dcnode-id="2266"><a class="twikilink" data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/StrangerInAStrangeLand" title="/pmwiki/pmwiki.php/Literature/StrangerInAStrangeLand"><span data-dcnode-id="2268" instrument_node="">Stranger in a Strange Land</span></a></em><span data-dcnode-id="2265" instrument_node=""> resembles an office, with the angels discussing their projects and sports.
</span></li></ul></li><li data-dcnode-id="2238"><span data-dcnode-id="2261" instrument_node=""> </span><em data-dcnode-id="2258"><a class="twikilink" data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/PercyJacksonAndTheOlympians" title="/pmwiki/pmwiki.php/Literature/PercyJacksonAndTheOlympians"><span data-dcnode-id="2260" instrument_node="">Percy Jackson and the Olympians</span></a></em><span data-dcnode-id="2257" instrument_node="">:
</span><ul data-dcnode-id="2239"><li data-dcnode-id="2245"><span data-dcnode-id="2256" instrument_node=""> The Underworld in </span><em data-dcnode-id="2253"><a class="twikilink" data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/PercyJacksonAndTheOlympians" title="/pmwiki/pmwiki.php/Literature/PercyJacksonAndTheOlympians"><span data-dcnode-id="2255" instrument_node="">Percy Jackson and the Olympians</span></a></em><span data-dcnode-id="2252" instrument_node=""> is victim to this. There's a </span><em data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">long</span></em><span data-dcnode-id="2249" instrument_node=""> wait for departed souls, and Charon </span><strong data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">really</span></strong><span data-dcnode-id="2246" instrument_node=""> wants to have a pay-raise.
</span></li><li data-dcnode-id="2240"><span data-dcnode-id="2244" instrument_node=""> Even the EZ-Death line is backed up in </span><em data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">The Last Olympian</span></em><span data-dcnode-id="2241" instrument_node="">. Those with special circumstances, which is everyone else, are put on the very slow Attendant On Duty lines.
</span></li></ul></li><li data-dcnode-id="2226"><span data-dcnode-id="2237" instrument_node=""> The </span><em data-dcnode-id="2234"><a class="twikilink" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/KushielsLegacy" title="/pmwiki/pmwiki.php/Literature/KushielsLegacy"><span data-dcnode-id="2236" instrument_node="">Kushiel's Legacy</span></a></em><span data-dcnode-id="2233" instrument_node=""> novels give Chi'in people this version of the afterlife, since they are a stand-in for Chinese. But the </span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">very good</span></em><span data-dcnode-id="2230" instrument_node=""> people </span><a class="twikilink" data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DungeonBypass" title="/pmwiki/pmwiki.php/Main/DungeonBypass"><span data-dcnode-id="2229" instrument_node="">get to skip the bureaucracy</span></a><span data-dcnode-id="2227" instrument_node="">.
</span></li><li data-dcnode-id="2200"><span data-dcnode-id="2225" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AndreiBelyanin" title="/pmwiki/pmwiki.php/Creator/AndreiBelyanin"><span data-dcnode-id="2224" instrument_node="">Andrei Belyanin</span></a><span data-dcnode-id="2222" instrument_node="">:
</span><ul data-dcnode-id="2201"><li data-dcnode-id="2213"><span data-dcnode-id="2221" instrument_node=""> Heaven in Andrei Belyanin's </span><em data-dcnode-id="2218"><a class="twikilink" data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MyWifeIsAWitch" title="/pmwiki/pmwiki.php/Literature/MyWifeIsAWitch"><span data-dcnode-id="2220" instrument_node="">My Wife Is a Witch</span></a></em><span data-dcnode-id="2217" instrument_node=""> duology is run by a bureaucracy. The protagonist's </span><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodAngelBadAngel" title="/pmwiki/pmwiki.php/Main/GoodAngelBadAngel"><span data-dcnode-id="2216" instrument_node="">personal angel</span></a><span data-dcnode-id="2214" instrument_node=""> Ancifer has to file daily reports on his charge's activities. In the second book, it is revealed that Hell has decided to adopt a similar system, and his demon Farmason is not at all happy with all the deadlines and reports in triplicate.
</span></li><li data-dcnode-id="2202"><span data-dcnode-id="2212" instrument_node=""> Belyanin's </span><em data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">On-Call Demon</span></em><span data-dcnode-id="2209" instrument_node=""> novel has a similar premise. The protagonist is a demon named Abifasdon whose job involves collecting on the souls of people whose </span><a class="twikilink" data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DealWithTheDevil" title="/pmwiki/pmwiki.php/Main/DealWithTheDevil"><span data-dcnode-id="2208" instrument_node="">Deal with the Devil</span></a><span data-dcnode-id="2206" instrument_node=""> has expired (although, he still </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MustBeInvited" title="/pmwiki/pmwiki.php/Main/MustBeInvited"><span data-dcnode-id="2205" instrument_node="">has to get an invitation</span></a><span data-dcnode-id="2203" instrument_node=""> to come in). His wife also works there but in the Temptation Department. She uses her demoness wiles to trick (usually) male clients into signing such deals. Usually, her clients will sign the deal for a night with her, which Abifasdon doesn't mind (sex with a human is meaningless to a demon). Abifasdon's best (and only) friend is an bodybuilding angel, whose job frequently requires him to kick Abifasdon's ass if the client whose soul Abifasdon has come to collect on has suddenly decided to repent or has connections "upstairs".
