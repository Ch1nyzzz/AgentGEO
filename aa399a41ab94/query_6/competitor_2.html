</span></li></ul></li><li data-dcnode-id="2188"><span data-dcnode-id="2199" instrument_node=""> Hell, in </span><em data-dcnode-id="2196"><a class="twikilink" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JohannesCabalTheNecromancer" title="/pmwiki/pmwiki.php/Literature/JohannesCabalTheNecromancer"><span data-dcnode-id="2198" instrument_node="">Johannes Cabal the Necromancer</span></a></em><span data-dcnode-id="2195" instrument_node="">. This is apparently fairly recent, as the </span><a class="twikilink" data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat"><span data-dcnode-id="2194" instrument_node="">obstructive bureaucrat to end all obstructive bureaucrats</span></a><span data-dcnode-id="2192" instrument_node=""> who... "improved" things had only arrived in the mid-1800s. This is </span><a class="twikilink" data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="2191" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="2189" instrument_node="">, used to set up at least two impressive moments for Cabal, and one heartwarming scene (a rare thing, in that book).
</span></li><li data-dcnode-id="2177"><span data-dcnode-id="2187" instrument_node=""> Michelle Scott's </span><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Lilith Straight Series</span></em><span data-dcnode-id="2184" instrument_node=""> depicts hell as an enormous office building with industrial, gray carpeting, flickering fluorescent lights, and labyrinthine hallways. The Devil is a </span><a class="twikilink" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadBoss" title="/pmwiki/pmwiki.php/Main/BadBoss"><span data-dcnode-id="2183" instrument_node="">Bad Boss</span></a><span data-dcnode-id="2181" instrument_node=""> whose </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeleagueredAssistant" title="/pmwiki/pmwiki.php/Main/BeleagueredAssistant"><span data-dcnode-id="2180" instrument_node="">Beleaguered Assistant</span></a><span data-dcnode-id="2178" instrument_node=""> is constantly buried under paperwork.
</span></li><li data-dcnode-id="2146"><span data-dcnode-id="2176" instrument_node=""> </span><em data-dcnode-id="2173"><a class="twikilink" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Discworld" title="/pmwiki/pmwiki.php/Literature/Discworld"><span data-dcnode-id="2175" instrument_node="">Discworld</span></a></em><span data-dcnode-id="2172" instrument_node="">:
</span><ul data-dcnode-id="2147"><li data-dcnode-id="2160"><span data-dcnode-id="2171" instrument_node=""> This trope </span><a class="twikilink" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="2170" instrument_node="">taken to its logical extreme</span></a><span data-dcnode-id="2168" instrument_node=""> perfectly describes the Auditors of Reality, who are essentially bureaucrats who oversee the minutiae of the </span><a class="twikilink" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalUnderpinningsOfReality" title="/pmwiki/pmwiki.php/Main/MagicalUnderpinningsOfReality"><span data-dcnode-id="2167" instrument_node="">Magical Underpinnings of Reality</span></a><span data-dcnode-id="2165" instrument_node="">. Unfortunately for all sapient life, they </span><em data-dcnode-id="2162"><a class="twikilink" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OmnicidalManiac" title="/pmwiki/pmwiki.php/Main/OmnicidalManiac"><span data-dcnode-id="2164" instrument_node="">despise</span></a></em><span data-dcnode-id="2161" instrument_node=""> anything resembling creativity or individuality, since it increases the amount of paperwork they have to do.
</span></li><li data-dcnode-id="2148"><span data-dcnode-id="2159" instrument_node=""> Discworld's Hell - at least during Astfgl's stint as Demon King in </span><em data-dcnode-id="2156"><a class="twikilink" data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Eric" title="/pmwiki/pmwiki.php/Literature/Eric"><span data-dcnode-id="2158" instrument_node="">Eric</span></a></em><span data-dcnode-id="2155" instrument_node=""> - is also portrayed as a literally soul-grinding bureaucracy, with the torment of pushing a rock up a hill being replaced by the greater torment of listening to the associated Health and Safety regulations, and the ancient ledgers being replaced by modern filing cabinets. While this does have the desired effect on the damned, the demons have to suffer it right along with them. When the demons finally have enough of all this </span><span class="spoiler" data-dcnode-id="2150" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2154" instrument_node="">they do what any bureaucracy would do in the situation - </span><a class="twikilink" data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickedUpstairs" title="/pmwiki/pmwiki.php/Main/KickedUpstairs"><span data-dcnode-id="2153" instrument_node="">promote Astfgl to a position where he doesn't actually have any responsibility</span></a><span data-dcnode-id="2151" instrument_node="">, and give him a very nice office and a speaking tube that doesn't connect to anyone.</span></span><span data-dcnode-id="2149" instrument_node="">
</span></li></ul></li><li data-dcnode-id="2138"><span data-dcnode-id="2145" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JRRTolkien" title="/pmwiki/pmwiki.php/Creator/JRRTolkien"><span data-dcnode-id="2144" instrument_node="">J. R. R. Tolkien</span></a><span data-dcnode-id="2142" instrument_node="">'s "</span><a class="twikilink" data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/LeafByNiggle" title="/pmwiki/pmwiki.php/Literature/LeafByNiggle"><span data-dcnode-id="2141" instrument_node="">Leaf by Niggle</span></a><span data-dcnode-id="2139" instrument_node="">", the protagonist is a bit casual in preparing for his demise, so he is assigned to a sort of purgatory. After he learns to be better organized, the entities in charge send him on further.
</span></li><li data-dcnode-id="2132"><span data-dcnode-id="2137" instrument_node=""> Implied in the earlier chapters of </span><em data-dcnode-id="2134"><a class="twikilink" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheAtomicBloodStainedBus" title="/pmwiki/pmwiki.php/Literature/TheAtomicBloodStainedBus"><span data-dcnode-id="2136" instrument_node="">The Atomic Blood-Stained Bus</span></a></em><span data-dcnode-id="2133" instrument_node="">, and then shown outright when Garfield and Algernon go to the offices of the gods and deal with the receptionist and security angels.
</span></li><li data-dcnode-id="2123"><span data-dcnode-id="2131" instrument_node=""> </span><em data-dcnode-id="2128"><a class="twikilink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JourneyToChaos" title="/pmwiki/pmwiki.php/Literature/JourneyToChaos"><span data-dcnode-id="2130" instrument_node="">Journey to Chaos</span></a></em><span data-dcnode-id="2127" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrimReaper" title="/pmwiki/pmwiki.php/Main/GrimReaper"><span data-dcnode-id="2126" instrument_node="">grim reapers</span></a><span data-dcnode-id="2124" instrument_node=""> of the Abyss are organized into ranks and governed by laws and customs. Their scythe is the symbol of their office. For instance, Reno Grade is a third class trainee reaper whose scythe is blood red while Modil Pera is a first class senior reaper and carries a sycthe with a gold blade.
</span></li><li data-dcnode-id="2117"><span data-dcnode-id="2122" instrument_node=""> The </span><em data-dcnode-id="2119"><a class="twikilink" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DetectiveInspectorChen" title="/pmwiki/pmwiki.php/Literature/DetectiveInspectorChen"><span data-dcnode-id="2121" instrument_node="">Detective Inspector Chen</span></a></em><span data-dcnode-id="2118" instrument_node=""> series features a bureaucratic afterlife based on Chinese mythology.
</span></li><li data-dcnode-id="2111"><span data-dcnode-id="2116" instrument_node=""> In </span><em data-dcnode-id="2113"><a class="twikilink" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Atharon" title="/pmwiki/pmwiki.php/Literature/Atharon"><span data-dcnode-id="2115" instrument_node="">Atharon</span></a></em><span data-dcnode-id="2112" instrument_node="">, Avatars for different magical professions make one of these. Things get messy quickly whenever live mortals need to interact with them. Dead souls are ok, it's all in the days work for the Avatars.
</span></li><li data-dcnode-id="2102"><span data-dcnode-id="2110" instrument_node=""> The premise of </span><em data-dcnode-id="2107"><a class="twikilink" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/YouAreDeadSignHerePlease" title="/pmwiki/pmwiki.php/Literature/YouAreDeadSignHerePlease"><span data-dcnode-id="2109" instrument_node="">You Are Dead (Sign Here Please)</span></a></em><span data-dcnode-id="2106" instrument_node=""> is the protagonist runs afoul of the bureaucrats who run the universe by being the first person in history to refuse, upon the end of his natural life, to sign his 21B (Decedent Acknowledgment and Waiver of Liability) and therefore becoming immortal until such a time as he can be tricked or cajoled into doing so. Bureaucracy in the world of the novel turns out to be not only essential to anything happening over a certain size, but also </span><span class="spoiler" data-dcnode-id="2104" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2105" instrument_node=""> the literal meaning of life. As the universe expanded and grew more complex, the original bureaucrats created life on Earth, culminating in humans with immortal souls who could enter the afterlife upon death and help out with all the paperwork that was piling up.</span></span><span data-dcnode-id="2103" instrument_node="">
</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2101" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TadWilliams" title="/pmwiki/pmwiki.php/Creator/TadWilliams"><span data-dcnode-id="2100" instrument_node="">Tad Williams</span></a><span data-dcnode-id="2098" instrument_node="">'s </span><em data-dcnode-id="2095"><a class="createlink" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDirtyStreetsOfHeaven" title="/pmwiki/pmwiki.php/Literature/TheDirtyStreetsOfHeaven"><span data-dcnode-id="2097" instrument_node="">The Dirty Streets Of Heaven</span></a></em><span data-dcnode-id="2094" instrument_node=""> series has angels and demons divided into specific jobs within specific geographical areas. Protagonist </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BobbyDollar" title="/pmwiki/pmwiki.php/Literature/BobbyDollar"><span data-dcnode-id="2093" instrument_node="">Bobby Dollar</span></a><span data-dcnode-id="2091" instrument_node=""> (angel name Doloriel) is assigned as an advocate, or someone who argues for a soul's admission into heaven, facing off against a demon who advocates for the soul to go to hell based on their life and actions therein.
</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/IsaacAsimov" title="/pmwiki/pmwiki.php/Creator/IsaacAsimov"><span data-dcnode-id="2088" instrument_node="">Isaac Asimov</span></a><span data-dcnode-id="2086" instrument_node="">'s "</span><a class="twikilink" data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheLastTrump" title="/pmwiki/pmwiki.php/Literature/TheLastTrump"><span data-dcnode-id="2085" instrument_node="">The Last Trump</span></a><span data-dcnode-id="2083" instrument_node="">": </span><a class="twikilink" data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchangelGabriel" title="/pmwiki/pmwiki.php/Main/ArchangelGabriel"><span data-dcnode-id="2082" instrument_node="">Archangel Gabriel</span></a><span data-dcnode-id="2080" instrument_node=""> must show junior seraph Etheriel the paperwork for the </span><a class="twikilink" data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="2079" instrument_node="">Act of Ascendancy</span></a><span data-dcnode-id="2077" instrument_node=""> they're here to announce/enact. Acts countersigned by </span><a class="twikilink" data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="2076" instrument_node="">the Chief</span></a><span data-dcnode-id="2074" instrument_node=""> cannot be revoked. Meeting the Chief is to be done by appointment, and there's a six-winged cherub who acts as his secretary.
</span></li><li data-dcnode-id="2067"><span data-dcnode-id="2072" instrument_node=""> The titular institution from </span><em data-dcnode-id="2069"><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheFerrymanInstitute" title="/pmwiki/pmwiki.php/Literature/TheFerrymanInstitute"><span data-dcnode-id="2071" instrument_node="">The Ferryman Institute</span></a></em><span data-dcnode-id="2068" instrument_node=""> is the first of many supernatural institutions made to escort the souls of the departed to the afterlife. As mankind grew in size, not only did the Institute have to grow, but Death began creating other competing agencies to compensate for the workload.
</span></li><li data-dcnode-id="2062"><span data-dcnode-id="2066" instrument_node=""> In the Bulgarian short story </span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">On The Other Side</span></em><span data-dcnode-id="2063" instrument_node=""> by Elin Pelin, St. Peter has to whip out a tome ("numbered, bound and sealed by God's hand") to convince a recently passed old man that he belongs in Heaven, not Hell.
</span></li></ul></div><span data-dcnode-id="2059" instrument_node="">

</span><ul data-dcnode-id="1936"><li data-dcnode-id="2046"><span data-dcnode-id="2054" instrument_node=""> </span><em data-dcnode-id="2051"><a class="twikilink" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/DeadLikeMe" title="/pmwiki/pmwiki.php/Series/DeadLikeMe"><span data-dcnode-id="2053" instrument_node="">Dead Like Me</span></a></em><span data-dcnode-id="2050" instrument_node=""> features a character who gets turned into a grim reaper and joins the bureaucratic mess of being a psychopomp. One episode (the cut scene episode) explicitly </span><a class="twikilink" data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Lampshade" title="/pmwiki/pmwiki.php/Main/Lampshade"><span data-dcnode-id="2049" instrument_node="">lampshades</span></a><span data-dcnode-id="2047" instrument_node=""> this.
</span></li><li data-dcnode-id="2037"><span data-dcnode-id="2045" instrument_node=""> The Underworld as depicted in </span><em data-dcnode-id="2042"><a class="twikilink" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheMiddleMan" title="/pmwiki/pmwiki.php/Series/TheMiddleMan"><span data-dcnode-id="2044" instrument_node="">The Middle Man</span></a></em><span data-dcnode-id="2041" instrument_node=""> is a giant office building with files in the back room and a </span><a class="twikilink" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="2040" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="2038" instrument_node=""> at the desk position.
</span></li><li data-dcnode-id="2019"><span data-dcnode-id="2036" instrument_node=""> In an episode of </span><em data-dcnode-id="2033"><a class="twikilink" data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/AreYouAfraidOfTheDark" title="/pmwiki/pmwiki.php/Series/AreYouAfraidOfTheDark"><span data-dcnode-id="2035" instrument_node="">Are You Afraid of the Dark?</span></a></em><span data-dcnode-id="2032" instrument_node="">, "The Tale of Station 109.1", the main character is mistaken for a dead person at their local Celestial Bureaucracy. The clerk there, played by </span><a class="twikilink" data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpecialGuest" title="/pmwiki/pmwiki.php/Main/SpecialGuest"><span data-dcnode-id="2031" instrument_node="">Special Guest</span></a><span data-dcnode-id="2029" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GilbertGottfried" title="/pmwiki/pmwiki.php/Creator/GilbertGottfried"><span data-dcnode-id="2028" instrument_node="">Gilbert Gottfried</span></a><span data-dcnode-id="2026" instrument_node="">, tells him "I don't </span><em data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">make</span></em><span data-dcnode-id="2023" instrument_node=""> mistakes! When I was alive, I worked at the </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Department of Motor Vehicles</span></em><span data-dcnode-id="2020" instrument_node="">!"
</span></li><li data-dcnode-id="1998"><span data-dcnode-id="2018" instrument_node=""> A Turkish series called </span><em data-dcnode-id="2015"><a class="createlink" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Ruhsar" title="/pmwiki/pmwiki.php/Series/Ruhsar"><span data-dcnode-id="2017" instrument_node="">Ruhsar</span></a></em><span data-dcnode-id="2014" instrument_node=""> plays with this: Essentially, the afterlife is mentioned (since the audience never sees anything beyond the "lobby") to adhere to the traditional standards </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FluffyCloudHeaven" title="/pmwiki/pmwiki.php/Main/FluffyCloudHeaven"><span data-dcnode-id="2013" instrument_node="">Heaven</span></a><span data-dcnode-id="2011" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireAndBrimstoneHell" title="/pmwiki/pmwiki.php/Main/FireAndBrimstoneHell"><span data-dcnode-id="2010" instrument_node="">Hell</span></a><span data-dcnode-id="2008" instrument_node="">. But they are both </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">managed</span></em><span data-dcnode-id="2005" instrument_node=""> by a Celestial Bureaucracy. Some episodes revolved around the Bureaucratic nature of the afterlife such as the titular character working in a "Heaven Modernisation Committee" or having run-ins with the </span><a class="twikilink" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat" title="/pmwiki/pmwiki.php/Main/ObstructiveBureaucrat"><span data-dcnode-id="2004" instrument_node="">Obstructive Bureaucrat</span></a><span data-dcnode-id="2002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent"><span data-dcnode-id="2001" instrument_node="">Angels</span></a><span data-dcnode-id="1999" instrument_node=""> after accidentally violating a regulation.
</span></li><li data-dcnode-id="1989"><span data-dcnode-id="1997" instrument_node=""> An episode of </span><em data-dcnode-id="1994"><a class="twikilink" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MurderMostHorrid" title="/pmwiki/pmwiki.php/Series/MurderMostHorrid"><span data-dcnode-id="1996" instrument_node="">Murder Most Horrid</span></a></em><span data-dcnode-id="1993" instrument_node=""> has </span><a class="twikilink" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1992" instrument_node="">The Grim Reaper</span></a><span data-dcnode-id="1990" instrument_node=""> complaining endlessly about this. They gave her a makeover because they thought she was too grim for modern customers.
</span></li><li data-dcnode-id="1964"><span data-dcnode-id="1988" instrument_node=""> </span><em data-dcnode-id="1985"><a class="twikilink" data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Supernatural" title="/pmwiki/pmwiki.php/Series/Supernatural"><span data-dcnode-id="1987" instrument_node="">Supernatural</span></a></em><span data-dcnode-id="1984" instrument_node="">:
</span><ul data-dcnode-id="1965"><li data-dcnode-id="1979"><span data-dcnode-id="1983" instrument_node=""> Heaven is like this, at least for the Angels (human souls are all inside their own </span><em data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Matrix</span></em><span data-dcnode-id="1980" instrument_node="">-like fantasy worlds). The main hall where the Angels congregate looks like a white, ordane office. And Zachariah can be one scary-ass careerist.
</span></li><li data-dcnode-id="1971"><span data-dcnode-id="1978" instrument_node=""> Hell, under the Crowley regime, is also like this. It's just one long, shabby waiting line. He changed it to this because he noticed that too many people sent to Hell were masochists that were </span><a class="twikilink" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooKinkyToTorture" title="/pmwiki/pmwiki.php/Main/TooKinkyToTorture"><span data-dcnode-id="1977" instrument_node="">Too Kinky to Torture</span></a><span data-dcnode-id="1975" instrument_node="">, but </span><em data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">everybody</span></em><span data-dcnode-id="1972" instrument_node=""> hates waiting in line.
</span></li><li data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1969" instrument_node="">The (current) Grim Reaper</span></a><span data-dcnode-id="1967" instrument_node=""> takes Dean to her office in "Advanced Thanatology", which resembles a large hallway lined with dozens of bookshelves detailing mortals' fated deaths. Apparently, as shown in "Byzantium", the back room is occupied by Anubis, who became one of Heaven's "contractors" aeons ago.
</span></li></ul></li><li data-dcnode-id="1946"><span data-dcnode-id="1963" instrument_node=""> Deliberately </span><a class="twikilink" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Invoked" title="/pmwiki/pmwiki.php/Main/Invoked"><span data-dcnode-id="1962" instrument_node="">Invoked</span></a><span data-dcnode-id="1960" instrument_node=""> by the Ferengi in </span><em data-dcnode-id="1957"><a class="twikilink" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine" title="/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine"><span data-dcnode-id="1959" instrument_node="">Star Trek: Deep Space Nine</span></a></em><span data-dcnode-id="1956" instrument_node="">; since the Ferengi </span><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetOfHats" title="/pmwiki/pmwiki.php/Main/PlanetOfHats"><span data-dcnode-id="1955" instrument_node="">Hat</span></a><span data-dcnode-id="1953" instrument_node=""> is being cunning, and placing wealth above </span><a class="twikilink" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyInItForTheMoney" title="/pmwiki/pmwiki.php/Main/OnlyInItForTheMoney"><span data-dcnode-id="1952" instrument_node="">all else</span></a><span data-dcnode-id="1950" instrument_node=""> (including family), this is how the Ferengi view whatever they have in place of heaven; and they </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">strive</span></em><span data-dcnode-id="1947" instrument_node=""> to get to their Heaven (or, as they call it, The Divine Treasury). Basically, they believe that when a Ferengi dies, he meets the Blessed Exchequer, who reviews his life's finances. Those who have earned a profit in life get to enter the Divine Treasury to bid on a new life in front of the Celestial Auctioneers. Those who haven't are doomed to spend eternity in the Vault of Eternal Destitution.
</span></li><li data-dcnode-id="1937"><span data-dcnode-id="1945" instrument_node=""> In </span><em data-dcnode-id="1942"><a class="twikilink" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/HorribleHistories" title="/pmwiki/pmwiki.php/Series/HorribleHistories"><span data-dcnode-id="1944" instrument_node="">Horrible Histories</span></a></em><span data-dcnode-id="1941" instrument_node="">, the Stupid Deaths skits often reference an afterlife bureaucracy, for example Death talks about how big his workload was during the bubonic plague, or tells someone whose death he views as insufficiently interesting (or </span><a class="twikilink" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1940" instrument_node="">stupid</span></a><span data-dcnode-id="1938" instrument_node="">) to "get back in the Boring Deaths line."
</span></li></ul><ul data-dcnode-id="1846"><li data-dcnode-id="1924"><span data-dcnode-id="1932" instrument_node=""> The Promised Land comes off this way in </span><em data-dcnode-id="1929"><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/DoctorWho" title="/pmwiki/pmwiki.php/Series/DoctorWho"><span data-dcnode-id="1931" instrument_node="">Doctor Who</span></a></em><span data-dcnode-id="1928" instrument_node="">. Characters who have (apparently) died in-story appear in a garden or a gleaming </span><a class="twikilink" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhiteVoidRoom" title="/pmwiki/pmwiki.php/Main/WhiteVoidRoom"><span data-dcnode-id="1927" instrument_node="">white</span></a><span data-dcnode-id="1925" instrument_node=""> hallway to give their statements to Missy or her assistant Seb.
</span></li><li data-dcnode-id="1912"><span data-dcnode-id="1923" instrument_node=""> </span><em data-dcnode-id="1920"><a class="twikilink" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheMagicians2016" title="/pmwiki/pmwiki.php/Series/TheMagicians2016"><span data-dcnode-id="1922" instrument_node="">The Magicians (2016)</span></a></em><span data-dcnode-id="1919" instrument_node="">: In a variant, the Underworld is a nice version of this trope, especially considering everything else is a </span><a class="twikilink" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="1918" instrument_node="">Crapsack World</span></a><span data-dcnode-id="1916" instrument_node="">. Dead souls find themselves in what looks like a pleasant hotel lobby, with friendly staff ready to help them make the transition as smoothly as possible, along with an orientation video from Hades and pamphlets promising newcomers that they're (probably) not going to Hell. There are miniature paradises filled with mundane things people might enjoy like bowling while they wait to be sorted into their final afterlives, and the only real rules are that </span><a class="twikilink" data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSociopath" title="/pmwiki/pmwiki.php/Main/TheSociopath"><span data-dcnode-id="1915" instrument_node="">souls without shades</span></a><span data-dcnode-id="1913" instrument_node=""> are quarantined, and you're not allowed to interact with other souls if you were culpable in their deaths.
</span></li><li data-dcnode-id="1906"><span data-dcnode-id="1911" instrument_node=""> </span><em data-dcnode-id="1908"><a class="twikilink" data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/SabrinaTheTeenageWitch" title="/pmwiki/pmwiki.php/Series/SabrinaTheTeenageWitch"><span data-dcnode-id="1910" instrument_node="">Sabrina the Teenage Witch</span></a></em><span data-dcnode-id="1907" instrument_node=""> has elements of this with the Other Realm, the home of all witches and magic users. One episode reveals that there's a gigantic list of rules that must be followed, to the point where a mage is assigned to the role of Official Rule Keeper just to tell people about what laws they're breaking. In another, Hilda and Zelda must go to the YMCA—that's "Yikes! Magical Crisis Association"—to help Harvey out of a jam, and end up waiting in line for hours as they try to fill out the proper forms and deal with a less-than-helpful staff.
</span></li><li data-dcnode-id="1897"><span data-dcnode-id="1905" instrument_node=""> </span><em data-dcnode-id="1902"><a class="twikilink" data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheGoodPlace" title="/pmwiki/pmwiki.php/Series/TheGoodPlace"><span data-dcnode-id="1904" instrument_node="">The Good Place</span></a></em><span data-dcnode-id="1901" instrument_node="">: Every single action in your life is given a score managed by accountants. Even trivial things like buying a trashy magazine (bad) or eating a healthy sandwich (good). When you die you need a very high positive score in order to get into the titular Good Place while everyone else goes to the Bad Place. The scoring system however is infamously convoluted and at times nonsensical with a mention in season 3 that only the accountants have full knowledge on how the system works (for example, that healthy sandwich is worth less points on a baguette, because it makes it more </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">French</span></em><span data-dcnode-id="1898" instrument_node="">). Outside the neighborhoods, everything (at least on one side) is run like a company complete with board meetings, climbing the corporate ladder, approaching work like a day at the office and coffee breaks, while another side is run by a committee so hidebound that it's going to take them 1,400 years just to form the committee to investigate a complaint.
</span></li><li data-dcnode-id="1873"><span data-dcnode-id="1896" instrument_node=""> </span><em data-dcnode-id="1893"><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1985" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1985"><span data-dcnode-id="1895" instrument_node="">The Twilight Zone (1985)</span></a></em><span data-dcnode-id="1892" instrument_node="">: In "Dead Run", Johnny Davis begins working as a truck driver transporting condemned souls to </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hell" title="/pmwiki/pmwiki.php/Main/Hell"><span data-dcnode-id="1891" instrument_node="">Hell</span></a><span data-dcnode-id="1889" instrument_node="">. Within hours, he discovers that many of the damned don't deserve to be there. For instance, one woman was too self-centered in life, one man only saw the dirt in life and not the beauty and another was an atheist. After the souls riot, Johnny is brought to meet the Dispatcher, who has the final say on who is sent to Hell because </span><a class="twikilink" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="1888" instrument_node="">the Boss</span></a><span data-dcnode-id="1886" instrument_node=""> abdicated responsibility long ago. The Dispatcher explains to Johnny and he is instituting "time honored </span><a class="twikilink" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="1885" instrument_node="">Biblical</span></a><span data-dcnode-id="1883" instrument_node=""> standards" in holding the departed souls to a high standard. He sees it as his duty to combat the "secular, intellectual propaganda" of the modern age and ensure that pornographers, heathens, atheists, humanists and others receive the punishment that they deserve. Johnny is disgusted and helps a </span><a class="twikilink" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DraftDodging" title="/pmwiki/pmwiki.php/Main/DraftDodging"><span data-dcnode-id="1882" instrument_node="">draft dodger</span></a><span data-dcnode-id="1880" instrument_node="">, a junkie, a librarian who fought against </span><a class="twikilink" data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CulturePolice" title="/pmwiki/pmwiki.php/Main/CulturePolice"><span data-dcnode-id="1879" instrument_node="">banned books being removed from the shelves</span></a><span data-dcnode-id="1877" instrument_node=""> and a young gay man escape to </span><a class="twikilink" data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Heaven" title="/pmwiki/pmwiki.php/Main/Heaven"><span data-dcnode-id="1876" instrument_node="">Heaven</span></a><span data-dcnode-id="1874" instrument_node="">.
</span></li><li data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node=""> The short-lived 1994 series </span><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Heaven Help Us</span></em><span data-dcnode-id="1869" instrument_node=""> has a couple dying in a plane crash on their honeymoon. They're met in a hotel by Mr. Shepherd (</span><a class="twikilink" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RicardoMontalban" title="/pmwiki/pmwiki.php/Creator/RicardoMontalban"><span data-dcnode-id="1868" instrument_node="">Ricardo Montalbán</span></a><span data-dcnode-id="1866" instrument_node="">) who explains they've "fallen through the cracks". It seems that they died just as one second was being added to the cosmic clock. Also, their plane went down exactly halfway between Houston and Scottsdale, and the "manager" of each city assumed the other guy was handling it ("they have both been severely disciplined.") Thus, it's impossible to tell if the couple belongs in "the up place or the down place" and are being given a chance to decide by becoming semi-angelic figures helping others in need.
</span></li><li data-dcnode-id="1856"><span data-dcnode-id="1864" instrument_node=""> Doubles with </span><a class="twikilink" data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneAfterlife" title="/pmwiki/pmwiki.php/Main/MundaneAfterlife"><span data-dcnode-id="1863" instrument_node="">Mundane Afterlife</span></a><span data-dcnode-id="1861" instrument_node=""> in </span><em data-dcnode-id="1858"><a class="twikilink" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MiracleWorkers" title="/pmwiki/pmwiki.php/Series/MiracleWorkers"><span data-dcnode-id="1860" instrument_node="">Miracle Workers</span></a></em><span data-dcnode-id="1857" instrument_node="">. After you die, you become an angel working at Heaven Inc., which runs the whole world, with departments running from the Department of Dirt to the badly understaffed Department of Answered Prayers, to the now defunct Department of Mammoths.
</span></li><li data-dcnode-id="1847"><span data-dcnode-id="1855" instrument_node=""> </span><em data-dcnode-id="1852"><a class="twikilink" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/YourPrettyFaceIsGoingToHell" title="/pmwiki/pmwiki.php/Series/YourPrettyFaceIsGoingToHell"><span data-dcnode-id="1854" instrument_node="">Your Pretty Face Is Going to Hell</span></a></em><span data-dcnode-id="1851" instrument_node=""> envisions Hell as a (literally) soul-sucking cubicle farm, with Satan serving as a </span><a class="twikilink" data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="1850" instrument_node="">Corrupt Corporate Executive</span></a><span data-dcnode-id="1848" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1843"></p><div class="folderlabel" data-dcnode-id="1841" onclick="togglefolder('folder8');"><span data-dcnode-id="1842" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Music&nbsp;</span></div><div class="folder" data-dcnode-id="1800" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="1840" instrument_node="">
</span><ul data-dcnode-id="1801"><li data-dcnode-id="1823"><span data-dcnode-id="1839" instrument_node=""> Part of the </span><a class="twikilink" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueArtIsIncomprehensible" title="/pmwiki/pmwiki.php/Main/TrueArtIsIncomprehensible"><span data-dcnode-id="1838" instrument_node="">hard to follow</span></a><span data-dcnode-id="1836" instrument_node=""> plotline of </span><a class="twikilink" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/JethroTull" title="/pmwiki/pmwiki.php/Music/JethroTull"><span data-dcnode-id="1835" instrument_node="">Jethro Tull</span></a><span data-dcnode-id="1833" instrument_node="">'s 1973 </span><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConceptAlbum" title="/pmwiki/pmwiki.php/Main/ConceptAlbum"><span data-dcnode-id="1832" instrument_node="">Concept Album</span></a><span data-dcnode-id="1830" instrument_node="">, "A Passion Play", concerns something of a </span><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CelestialBureaucracy" title="/pmwiki/pmwiki.php/Main/CelestialBureaucracy"><span data-dcnode-id="1829" instrument_node="">Celestial Bureaucracy</span></a><span data-dcnode-id="1827" instrument_node=""> involving one "</span><a class="twikilink" data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StevenUlyssesPerhero" title="/pmwiki/pmwiki.php/Main/StevenUlyssesPerhero"><span data-dcnode-id="1826" instrument_node="">G. Oddie And Son</span></a><span data-dcnode-id="1824" instrument_node="">" running Heaven as bureaucratic office managers. This theme would have been carried over into the next year's proposed film project which became the "WarChild" album.
</span></li><li data-dcnode-id="1816"><span data-dcnode-id="1822" instrument_node=""> In the Hungarian song </span><em data-dcnode-id="1818"><a class="urllink" data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DeRBJsAX6vbM"><span data-dcnode-id="1821" instrument_node="">Penitencia</span><img data-dcnode-id="1820" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1817" instrument_node=""> by Zorán, the protagonist meets God, which is depicted as a job interview. He eventually fails and is sent back to Earth.
</span></li><li data-dcnode-id="1807"><span data-dcnode-id="1815" instrument_node=""> "The Afterlife" by </span><a class="createlink" data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/PaulSimon" title="/pmwiki/pmwiki.php/Creator/PaulSimon"><span data-dcnode-id="1814" instrument_node="">Paul Simon</span></a><span data-dcnode-id="1812" instrument_node="">
</span><div class="indent" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">You got to fill out a form first
</span></div><div class="indent" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">And then you wait in the line
</span></div></li><li data-dcnode-id="1802"><span data-dcnode-id="1806" instrument_node=""> "Alleluia" by </span><a class="createlink" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DarWilliams" title="/pmwiki/pmwiki.php/Creator/DarWilliams"><span data-dcnode-id="1805" instrument_node="">Dar Williams</span></a><span data-dcnode-id="1803" instrument_node=""> tells the story of a dead rebel without a cause who feels out of place in Heaven, which is sort of like a school or community center, with planned activities, etc. In the lyrics of the bridge, a "guidance-counselor"-like God says, "how could this be, that's really odd / I guess I'll have to check my records, silly me, you know, I'm only God."
</span></li></ul></div><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1798"></p><div class="folderlabel" data-dcnode-id="1796" onclick="togglefolder('folder9');"><span data-dcnode-id="1797" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Mythology and Religion&nbsp;</span></div><div class="folder" data-dcnode-id="1694" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="1795" instrument_node="">
</span><ul data-dcnode-id="1695"><li data-dcnode-id="1738"><span data-dcnode-id="1794" instrument_node=""> Traditional </span><a class="twikilink" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/ChineseMythology" title="/pmwiki/pmwiki.php/Myth/ChineseMythology"><span data-dcnode-id="1793" instrument_node="">Chinese religion</span></a><span data-dcnode-id="1791" instrument_node=""> took this concept and ran with it.
</span><ul data-dcnode-id="1739"><li data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node=""> For starters, their head God is literally an Emperor (The Jade Emperor), and the afterlife is run like the Old Chinese Empire, with the Emperor, his courtiers, various ministries and their respective ministers handling various departments regarding celestial/mortal life, and governors (with the Mortal Chinese Emperor being governor of the Mortal world)
</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node=""> This is primarily the reason why the Chinese believed the Emperor had the "Mandate of Heaven." Just as an Emperor would appoint a Governor, then probably the Jade Emperor mandated that the Mortal Emperor be governor of this world. Additionally, this too is why Chinese don't really put much stock in Royal Houses. Governorship of a Province in Imperial China was not hereditary, and therefore the Mortal Emperor's governorship of this world isn't either. Hence Heaven can withdraw the "Mandate." How do they know a mandate is withdrawn? By the simple matter of the Emperor being incompetent/corrupt, whereby it </span><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">is the peasants' right to remove him</span></em><span data-dcnode-id="1785" instrument_node="">, and replace him with either another noble house, a commoner, or even a foreign conquering barbarian as with the case of Kublai Khan and the Manchus.
</span></li><li data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node=""> </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Everyone</span></em><span data-dcnode-id="1780" instrument_node=""> in the Jade Emperor's Afterlife Empire becomes the God of his associated job/responsibilities. The Jade Emperor's cook? God of the Kitchen. The Palace Guards? Gods of Guarding/Gates/doorways. Hell, if the Celestial Empire upgraded, some of The Jade Emperor's webmasters might be Gods of Webmastering or something.
</span></li><li data-dcnode-id="1771"><span data-dcnode-id="1778" instrument_node=""> Mortals are often "hired" too. Some scholars believe Zao Jun (The Kitchen God) was an actual person in early Chinese history, possibly some chef with god-tier skills. The Ancient Chinese must have believed the Gods would want such a bloke to feed them.
</span><ul data-dcnode-id="1772"><li data-dcnode-id="1773"><span data-dcnode-id="1777" instrument_node=""> This is occasionally a cause of </span><a class="twikilink" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OddJobGods" title="/pmwiki/pmwiki.php/Main/OddJobGods"><span data-dcnode-id="1776" instrument_node="">Odd Job Gods</span></a><span data-dcnode-id="1774" instrument_node="">. For instance Guan Yu, a street vendor who rose to become a great general, became Guandi, god of war... and of bean curd sellers.
</span></li></ul></li><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node=""> The most prominent of the celestial bureaucrats was Wenchang Wang, the god of officials, examination candidates, and military officers. Students often prayed to him before taking one of the phenomenally hard Imperial Examinations, and religious philanthropists honored him by not wasting or misusing paper with writing on it. Additionally, Lord Wenchang is responsible for keeping the Cinnamon Ledger, on which everyone's deeds and the rewards/punishments due are recorded and changed accordingly.
</span></li><li data-dcnode-id="1764"><span data-dcnode-id="1768" instrument_node=""> The Chinese Place of Judgement resembles an Ancient Chinese Court of Law/Justice, with Yen Lo as the Lord/God of Judgement. Funnily, depictions of judgement by the Imperial Chinese features Yen Lo, in traditional judge's attire, seated on a desk cluttered with </span><em data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">paperwork</span></em><span data-dcnode-id="1765" instrument_node="">. He is surrounded by supernatural bureaucrats, record-makers, plaintiffs, jury, and even demonic lictors (court of justice guards).
</span></li><li data-dcnode-id="1756"><span data-dcnode-id="1763" instrument_node=""> The soul of the departed? Well, obviously the defendant, against a Mirror that plays instances of specific actions in his life. What's more, </span><em data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">you get to have a supernatural lawyer!</span></em><span data-dcnode-id="1760" instrument_node=""> Who knows the laws of heaven, and unlike in most religions, </span><em data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">you can argue your way out</span></em><span data-dcnode-id="1757" instrument_node=""> of a sentence in Chinese Hell. And Chinese Hell (as Heaven and Hell are one in the Chinese Afterlife) resembles, again, an Old Chinese torture chamber/prison, whereby you serve your (exceedingly brutal) punishment for a given amount of time (not unlike the mortal penal system), and then you're released either in the afterlife or you get reborn.
</span></li><li data-dcnode-id="1747"><span data-dcnode-id="1755" instrument_node=""> In China it's a common custom to burn offerings known as </span><a class="urllink" data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Hell_Bank_Notes"><span data-dcnode-id="1754" instrument_node="">Hell Bank Notes</span><img data-dcnode-id="1753" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1751" instrument_node="">. They're meant for the deceased to </span><a class="twikilink" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1750" instrument_node="">spend in the afterlife.</span></a><span data-dcnode-id="1748" instrument_node="">
</span></li><li data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node=""> It's also amusing to note that a number of Chinese and Indian near-death experiences include being informed by clerks that there has been a "clerical error" and "someone else with your name was supposed to die today."
</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node=""> Ghosts in Chinese mythology sometimes are similar to western ideas, haunting their place of death due to an unusual death and clinging on to some connection with the world of the living. Some ghosts, however, are </span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">assigned</span></em><span data-dcnode-id="1741" instrument_node=""> to haunt on earth by the heavenly bureaucracy in order to inspire proper respect for the dead.
</span></li></ul></li><li data-dcnode-id="1732"><span data-dcnode-id="1737" instrument_node=""> In </span><em data-dcnode-id="1734"><a class="twikilink" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheAeneid" title="/pmwiki/pmwiki.php/Literature/TheAeneid"><span data-dcnode-id="1736" instrument_node="">The Aeneid</span></a></em><span data-dcnode-id="1733" instrument_node=""> Aeneas travels through the underworld to Elysium, where he finds his father, Anchises — who is numbering souls on a tablet. So he's pretty much got a clipboard and is taking the names of everyone in Heaven.
</span></li><li data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node=""> There is </span><a class="twikilink" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Christianity" title="/pmwiki/pmwiki.php/UsefulNotes/Christianity"><span data-dcnode-id="1730" instrument_node="">Christian</span></a><span data-dcnode-id="1728" instrument_node=""> image of Heaven where St. Peter works the Pearly Gates, sitting at a high desk and letting people in based on the information in some great book (or, more recently, computer). God or Jesus will sometimes fill this role. However, this depiction of Heaven is merely a pop-cultural thing, it doesn't appear anywhere in the religion itself. The origin of the meme is probably that in the Bible, the names of all saved souls are said to be written into a "Book of Life" that God uses as a sort of roll of honor — and even that is probably more symbolic than literal.
</span></li><li data-dcnode-id="1716"><span data-dcnode-id="1726" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheQuran" title="/pmwiki/pmwiki.php/Literature/TheQuran"><span data-dcnode-id="1725" instrument_node="">The Qur'an</span></a><span data-dcnode-id="1723" instrument_node="">: In Islam, every part of a sentient being's (djinns are included) afterlife is managed by angels. For instance, every single human has two angels sitting on their shoulders to write down their piety and sin. After the Kiamat (End of the World), everyone will be in purgatory, where they have to go through several trials, which will be made either easier or harder based on those angels' reports. Afterward, the reports will be publicly announced to everyone who has been gathered, whereupon it will be decided </span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">how long</span></em><span data-dcnode-id="1720" instrument_node=""> they're going to stay in hell. Yes, everyone's going to hell at first, where the angels — not Satan — will torture them based on the sins they've committed. After repenting for their sins, the person will be removed from hell and gain eternity in heaven, </span><a class="twikilink" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NothingPersonal" title="/pmwiki/pmwiki.php/Main/NothingPersonal"><span data-dcnode-id="1719" instrument_node="">where the same angels who tortured them become their steadfast companions and servants</span></a><span data-dcnode-id="1717" instrument_node="">.
</span></li><li data-dcnode-id="1708"><span data-dcnode-id="1715" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/EgyptianMythology" title="/pmwiki/pmwiki.php/Myth/EgyptianMythology"><span data-dcnode-id="1714" instrument_node="">Egyptian Mythology</span></a><span data-dcnode-id="1712" instrument_node="">, in order to gain a eternal life in the paradise, there's are a huge number of prerequisites to fill, as you need to be mummified, prayed to, have a tomb with a name and food tribute made by your loved ones just to be judged, in which you need to have an unimpeachable life to avoid having your soul eaten by a chimera, and after that, there's still a very long and dangerous journey to reach paradise.
</span><ul data-dcnode-id="1709"><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node=""> There was even several gods associated with bureaucracy. Including Ma'at (The bureaucracy of law and order through her aspect as the goddess of truth), her husband Thoth (The bureaucracy on a cosmic scale as one of the creators of the universe, including the concept of writing) and their daughter Seshat (goddess of bureaucracy in general, especially in regards to record keeping)
</span></li></ul></li><li data-dcnode-id="1696"><span data-dcnode-id="1707" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Gnosticism" title="/pmwiki/pmwiki.php/UsefulNotes/Gnosticism"><span data-dcnode-id="1706" instrument_node="">Gnostic</span></a><span data-dcnode-id="1704" instrument_node=""> works, the </span><a class="twikilink" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent"><span data-dcnode-id="1703" instrument_node="">Archons</span></a><span data-dcnode-id="1701" instrument_node=""> are pretty much this, being heavenly agents with a complex hierarchy that deal with the souls after they die. Unfortunately, they </span><strong data-dcnode-id="1698"><a class="twikilink" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightIsNotGood" title="/pmwiki/pmwiki.php/Main/LightIsNotGood"><span data-dcnode-id="1700" instrument_node="">eat</span></a></strong><span data-dcnode-id="1697" instrument_node=""> said souls. The Aeons are also a complex hierarchy, but they don't deal with the souls that manage to transcend the Archons.
</span></li></ul></div><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1692"></p><div class="folderlabel" data-dcnode-id="1690" onclick="togglefolder('folder10');"><span data-dcnode-id="1691" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Radio&nbsp;</span></div><div class="folder" data-dcnode-id="1667" id="folder10" isfolder="true" style="display:block;"><span data-dcnode-id="1689" instrument_node="">
</span><ul data-dcnode-id="1668"><li data-dcnode-id="1674"><span data-dcnode-id="1688" instrument_node=""> The central premise of </span><em data-dcnode-id="1685"><a class="twikilink" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Radio/OldHarrysGame" title="/pmwiki/pmwiki.php/Radio/OldHarrysGame"><span data-dcnode-id="1687" instrument_node="">Old Harry's Game</span></a></em><span data-dcnode-id="1684" instrument_node="">, a workplace comedy set in </span><a class="twikilink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FireAndBrimstoneHell" title="/pmwiki/pmwiki.php/Main/FireAndBrimstoneHell"><span data-dcnode-id="1683" instrument_node="">Fire and Brimstone Hell</span></a><span data-dcnode-id="1681" instrument_node="">. Heaven is apparently even more of a mess from what is seen in-story, since Satan is </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">slightly</span></em><span data-dcnode-id="1678" instrument_node=""> less of a </span><a class="twikilink" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointyHairedBoss" title="/pmwiki/pmwiki.php/Main/PointyHairedBoss"><span data-dcnode-id="1677" instrument_node="">Pointy-Haired Boss</span></a><span data-dcnode-id="1675" instrument_node=""> than God.
</span></li><li data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node=""> In </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">The Odyssey of Runyon Jones</span></em><span data-dcnode-id="1670" instrument_node=""> by Norman Corwin, a nine-year old boy traverses the cosmos, pleading with its various department heads for info concerning his dead dog who has been sent to "Curgatory."
</span></li></ul></div><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1665"></p><div class="folderlabel" data-dcnode-id="1663" onclick="togglefolder('folder11');"><span data-dcnode-id="1664" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="1537" id="folder11" isfolder="true" style="display:block;"><span data-dcnode-id="1662" instrument_node="">
</span><ul data-dcnode-id="1538"><li data-dcnode-id="1626"><span data-dcnode-id="1661" instrument_node=""> </span><em data-dcnode-id="1658"><a class="twikilink" data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="1660" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="1657" instrument_node="">:
</span><ul data-dcnode-id="1627"><li data-dcnode-id="1642"><span data-dcnode-id="1656" instrument_node=""> The pantheon of </span><a class="twikilink" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/KaraTur" title="/pmwiki/pmwiki.php/TabletopGame/KaraTur"><span data-dcnode-id="1655" instrument_node="">Kara-tur</span></a><span data-dcnode-id="1653" instrument_node="">, the </span><em data-dcnode-id="1650"><a class="twikilink" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/ForgottenRealms" title="/pmwiki/pmwiki.php/TabletopGame/ForgottenRealms"><span data-dcnode-id="1652" instrument_node="">Forgotten Realms</span></a></em><span data-dcnode-id="1649" instrument_node="">' </span><a class="twikilink" data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="1648" instrument_node="">fantasy counterpart</span></a><span data-dcnode-id="1646" instrument_node=""> to East Asia, is actually </span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">called</span></em><span data-dcnode-id="1643" instrument_node=""> the Celestial Bureaucracy.
</span></li><li data-dcnode-id="1628"><span data-dcnode-id="1641" instrument_node=""> The Nine Hells of Baator has an Infernal Bureaucracy centered around the damnation of mortal souls, which requires a good deal of paperwork and a special breed of devilish bureaucrats. Mortal souls that arrive in Baator are marked based on which devil managed to tip their alignment to </span><a class="twikilink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawfulEvil" title="/pmwiki/pmwiki.php/Main/LawfulEvil"><span data-dcnode-id="1640" instrument_node="">Lawful Evil</span></a><span data-dcnode-id="1638" instrument_node="">, and shuttled off to the plane's different layers depending on which </span><a class="twikilink" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DemonLordsAndArchdevils" title="/pmwiki/pmwiki.php/Main/DemonLordsAndArchdevils"><span data-dcnode-id="1637" instrument_node="">archdevil</span></a><span data-dcnode-id="1635" instrument_node=""> will ultimately take credit for their damnation, where they will be tortured for spiritual energy and transformed into a new devil at the bottom of the infernal pecking order. There's a court system where mortals who signed a </span><a class="twikilink" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DealWithTheDevil" title="/pmwiki/pmwiki.php/Main/DealWithTheDevil"><span data-dcnode-id="1634" instrument_node="">Deal with the Devil</span></a><span data-dcnode-id="1632" instrument_node=""> can try to argue their cases and get out of an infernal contract, and though the devils will provide free legal counsel, they'll also do their best to prove that a mortal's other actions in life damned them for unrelated reasons. Devils compete viciously with each other to fill their damnation quotas and earn promotion to a more powerful form of Baatezu - demotion is feared more than oblivion because it's humiliating and agonizing, while at least oblivion is painless. Throw in "soul futures" trading, spiritual loan sharks trading a few souls now to a desperate devil for the promise of more souls later, devils competing with each other for rights to the most productive soul harvesting territory on the Material Plane, </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonPromotion" title="/pmwiki/pmwiki.php/Main/NonPromotion"><span data-dcnode-id="1631" instrument_node="">"lateral demotions"</span></a><span data-dcnode-id="1629" instrument_node=""> of dangerous underlings into forms of devil ill-suited for soul collection and thus further promotion, and archdevils trying to poach talent from each other, and the whole thing comes across as a dark satire of corporate politics.
</span></li></ul></li><li data-dcnode-id="1596"><span data-dcnode-id="1625" instrument_node=""> </span><em data-dcnode-id="1622"><a class="twikilink" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Exalted" title="/pmwiki/pmwiki.php/TabletopGame/Exalted"><span data-dcnode-id="1624" instrument_node="">Exalted</span></a></em><span data-dcnode-id="1621" instrument_node=""> includes a </span><a class="twikilink" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CelestialBureaucracy" title="/pmwiki/pmwiki.php/Main/CelestialBureaucracy"><span data-dcnode-id="1620" instrument_node="">Celestial Bureaucracy</span></a><span data-dcnode-id="1618" instrument_node="">, and player characters may be part of it. However, it differs from most examples of the Trope in that, while it runs Creation (the mortal world), it has little to do with the afterlife of mortals beyond filing the requisite paperwork to ensure the process of their </span><a class="twikilink" data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Reincarnation" title="/pmwiki/pmwiki.php/Main/Reincarnation"><span data-dcnode-id="1617" instrument_node="">Reincarnation</span></a><span data-dcnode-id="1615" instrument_node=""> goes smoothly (assuming that mortals don't </span><a class="twikilink" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GhostlyGoals" title="/pmwiki/pmwiki.php/Main/GhostlyGoals"><span data-dcnode-id="1614" instrument_node="">have some strong attachment to their former lives</span></a><span data-dcnode-id="1612" instrument_node="">, since actual lingering ghosts </span><a class="twikilink" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurGhostsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurGhostsAreDifferent"><span data-dcnode-id="1611" instrument_node="">don't fall under the Celestial Bureaucracy's jurisdiction</span></a><span data-dcnode-id="1609" instrument_node="">, which turns out to be a pretty significant crack to fall through). </span><br data-dcnode-id="1608"><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">The Celestial Order, as it's called, also has a bit of a problem with unemployment. This is partly a holdover from a time when Creation had been subjected to a series of cataclysms, and thus Heaven shut their doors to prevent the massive influx of gods whose jobs and homes in the mortal world had been destroyed. When it turned out Creation had survived after all, Heaven was also left with the difficult task of working with and around the </span><a class="twikilink" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeirdTradeUnion" title="/pmwiki/pmwiki.php/Main/WeirdTradeUnion"><span data-dcnode-id="1605" instrument_node="">Spirit Courts</span></a><span data-dcnode-id="1603" instrument_node="">, local unions formed by </span><a class="twikilink" data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkassGods" title="/pmwiki/pmwiki.php/Main/JerkassGods"><span data-dcnode-id="1602" instrument_node="">gods</span></a><span data-dcnode-id="1600" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElementalEmbodiment" title="/pmwiki/pmwiki.php/Main/ElementalEmbodiment"><span data-dcnode-id="1599" instrument_node="">elementals</span></a><span data-dcnode-id="1597" instrument_node=""> who realised that they had been written off by the higher ups.
</span></li><li data-dcnode-id="1590"><span data-dcnode-id="1595" instrument_node=""> </span><em data-dcnode-id="1592"><a class="twikilink" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/FengShui" title="/pmwiki/pmwiki.php/TabletopGame/FengShui"><span data-dcnode-id="1594" instrument_node="">Feng Shui</span></a></em><span data-dcnode-id="1591" instrument_node=""> has the traditional Chinese Hells, and it mentions in one sourcebook that the evil imperial eunuch sorcerers of 69 AD are trying to contact and bribe the eunuchs of the Heavenly Court. They haven't succeeded yet, and they think it's probably because they haven't come up with a big enough bribe.
</span></li><li data-dcnode-id="1581"><span data-dcnode-id="1589" instrument_node=""> </span><em data-dcnode-id="1586"><a class="twikilink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/InNomine" title="/pmwiki/pmwiki.php/TabletopGame/InNomine"><span data-dcnode-id="1588" instrument_node="">In Nomine</span></a></em><span data-dcnode-id="1585" instrument_node=""> features a form of bureaucracy for both Heaven and Hell. Heaven is ruled by the Seraphim Council, and also has Dominic's angels running around checking for heresy. Hell has Asmodeus's demons enforcing the rules of "The Game", but cheating is often encouraged.
</span><ul data-dcnode-id="1582"><li data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node=""> It's been said of the setting that both Heaven and Hell are feudal bureaucracies, but the Devil is, quite literally, in the details.
</span></li></ul></li><li data-dcnode-id="1575"><span data-dcnode-id="1580" instrument_node=""> </span><em data-dcnode-id="1577"><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/InvisibleSun" title="/pmwiki/pmwiki.php/TabletopGame/InvisibleSun"><span data-dcnode-id="1579" instrument_node="">Invisible Sun</span></a></em><span data-dcnode-id="1576" instrument_node=""> has the Pale Sun, the realm of ghosts and the dead, play host to a surprisingly byzantine bureaucracy holds sway and strictly regulates everything from construction to marriage.
</span></li><li data-dcnode-id="1554"><span data-dcnode-id="1574" instrument_node=""> In </span><em data-dcnode-id="1571"><a class="twikilink" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Ironclaw" title="/pmwiki/pmwiki.php/TabletopGame/Ironclaw"><span data-dcnode-id="1573" instrument_node="">Jadeclaw</span></a></em><span data-dcnode-id="1570" instrument_node=""> Zhōngguó, being not merely a </span><a class="twikilink" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="1569" instrument_node="">Fantasy Counterpart Culture</span></a><span data-dcnode-id="1567" instrument_node=""> but even sharing a name with China, believes in a celestial bureaucracy. And one of the sample characters is a dragon who was fired from his job in the weather department for sleeping on the job and causing a flood, as shown in </span><a class="urllink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//us-p.vclart.net/vcl/Artists/Helvetica/jadeclaw-comic-1.jpg"><span data-dcnode-id="1566" instrument_node="">this</span><img data-dcnode-id="1565" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">◊</span></small><span data-dcnode-id="1561" instrument_node=""> </span><a class="urllink" data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//us-p.vclart.net/vcl/Artists/Helvetica/jadeclaw-comic-2.jpg"><span data-dcnode-id="1560" instrument_node="">comic</span><img data-dcnode-id="1559" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">◊</span></small><span data-dcnode-id="1555" instrument_node="">.
</span></li><li data-dcnode-id="1545"><span data-dcnode-id="1553" instrument_node=""> In </span><em data-dcnode-id="1550"><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Pathfinder" title="/pmwiki/pmwiki.php/TabletopGame/Pathfinder"><span data-dcnode-id="1552" instrument_node="">Pathfinder</span></a></em><span data-dcnode-id="1549" instrument_node="">, this is the Boneyard, a cemetery like plane where the goddess of death Pharasma sits in judgement of the recently dead, and sends them onwards to the appropriate afterlife. The lines are quite long, but the whole thing is efficiently managed by the Psychopomps, </span><a class="twikilink" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueNeutral" title="/pmwiki/pmwiki.php/Main/TrueNeutral"><span data-dcnode-id="1548" instrument_node="">True Neutral</span></a><span data-dcnode-id="1546" instrument_node=""> outsiders who run the place and handle the paperwork. Why all this is necessary is uncertain, as Pharasma is also the goddess of prophesy, and supposedly knows the ultimate fate of every soul anyway.
</span></li><li data-dcnode-id="1539"><span data-dcnode-id="1544" instrument_node=""> </span><em data-dcnode-id="1541"><a class="twikilink" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Scion" title="/pmwiki/pmwiki.php/TabletopGame/Scion"><span data-dcnode-id="1543" instrument_node="">Scion</span></a></em><span data-dcnode-id="1540" instrument_node=""> has a game extension dealing with the Celestial Bureaucracy. The main Chinese gods are featured and may be chosen as parents of the player characters. The second edition promotes the Chinese gods to a main pantheon, but changes the name to Shen. They still very much remain extremely bureaucratic, and because of it, Chinese Scions become immune to earthy ones.
</span></li></ul></div><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1535"></p><div class="folderlabel" data-dcnode-id="1533" onclick="togglefolder('folder12');"><span data-dcnode-id="1534" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Theatre&nbsp;</span></div><div class="folder" data-dcnode-id="1521" id="folder12" isfolder="true" style="display:block;"><span data-dcnode-id="1532" instrument_node="">
