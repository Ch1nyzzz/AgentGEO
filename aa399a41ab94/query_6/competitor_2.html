</span><ul data-dcnode-id="1522"><li data-dcnode-id="1523"><span data-dcnode-id="1531" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/NoelCoward" title="/pmwiki/pmwiki.php/Creator/NoelCoward"><span data-dcnode-id="1530" instrument_node="">Noël Coward</span></a><span data-dcnode-id="1528" instrument_node="">'s </span><em data-dcnode-id="1525"><a class="twikilink" data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/BlitheSpirit" title="/pmwiki/pmwiki.php/Theatre/BlitheSpirit"><span data-dcnode-id="1527" instrument_node="">Blithe Spirit</span></a></em><span data-dcnode-id="1524" instrument_node=""> alludes to this; the ghost of the male lead's first wife refers to filling in a bunch of forms so she can come back to haunt him when he hosts a seance at his house.
</span></li></ul></div><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1519"></p><div class="folderlabel" data-dcnode-id="1517" onclick="togglefolder('folder13');"><span data-dcnode-id="1518" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="1275" id="folder13" isfolder="true" style="display:block;"><span data-dcnode-id="1516" instrument_node="">
</span><ul data-dcnode-id="1276"><li data-dcnode-id="1478"><span data-dcnode-id="1515" instrument_node=""> </span><em data-dcnode-id="1512"><a class="twikilink" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/JadeEmpire" title="/pmwiki/pmwiki.php/VideoGame/JadeEmpire"><span data-dcnode-id="1514" instrument_node="">Jade Empire</span></a></em><span data-dcnode-id="1511" instrument_node="">, being set in a </span><a class="twikilink" data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="1510" instrument_node="">fantastic equivalent</span></a><span data-dcnode-id="1508" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImperialChina" title="/pmwiki/pmwiki.php/Main/ImperialChina"><span data-dcnode-id="1507" instrument_node="">Imperial China</span></a><span data-dcnode-id="1505" instrument_node="">, has its own </span><a class="twikilink" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CelestialBureaucracy" title="/pmwiki/pmwiki.php/Main/CelestialBureaucracy"><span data-dcnode-id="1504" instrument_node="">Celestial Bureaucracy</span></a><span data-dcnode-id="1502" instrument_node=""> which is played for comic effect.
</span><ul data-dcnode-id="1479"><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node=""> In one instance, a minor god assigned by the bureaucracy to tabulate the karmic effects of the player's actions appears to him/her, in order to complain about all the work you've caused him to have to do. In fact he was overwhelmed and demoted to finance, where he now tries to show his superiors how efficient he is by acting as your private store. Having taken up his new role he actually seems rather happy, and flavour lines has him pitying the poor sap who got his old job.
</span></li><li data-dcnode-id="1490"><span data-dcnode-id="1499" instrument_node=""> He's not the only member of the Celestial Bureaucracy helping you out. Far from it. Turns out </span><span class="spoiler" data-dcnode-id="1495" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadScientist" title="/pmwiki/pmwiki.php/Main/MadScientist"><span data-dcnode-id="1498" instrument_node="">Mad Scientist</span></a><span data-dcnode-id="1496" instrument_node=""> Kang the Mad</span></span><span data-dcnode-id="1494" instrument_node=""> is </span><span class="spoiler" data-dcnode-id="1492" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1493" instrument_node="">the minor inventor's deity Lord Lao</span></span><span data-dcnode-id="1491" instrument_node=""> who was slumming it on Earth with a case of amnesia.
</span></li><li data-dcnode-id="1482"><span data-dcnode-id="1489" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheBigGuy" title="/pmwiki/pmwiki.php/Main/TheBigGuy"><span data-dcnode-id="1488" instrument_node="">Black Whirlwind</span></a><span data-dcnode-id="1486" instrument_node=""> apparently has an entire </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">department</span></em><span data-dcnode-id="1483" instrument_node=""> dedicated to recording all his karmic disruptions. And so do you, after the aforementioned minor god's disruption.
</span></li><li data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node=""> The whole problem of the game started when the Brothers Sun defeated and imprisoned the deity in charge of rain... who also was in charge of escorting the dead to their rest. Yes, it saved the Empire in the short term. In the long term? Nice job breaking it.
</span></li></ul></li><li data-dcnode-id="1458"><span data-dcnode-id="1477" instrument_node=""> The </span><a class="urllink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tmd.alienharmony.com/pa/kq6/1/a.htm"><span data-dcnode-id="1476" instrument_node="">standard game over</span><img data-dcnode-id="1475" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1473" instrument_node=""> in </span><em data-dcnode-id="1470"><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/KingsQuestVIHeirTodayGoneTomorrow" title="/pmwiki/pmwiki.php/VideoGame/KingsQuestVIHeirTodayGoneTomorrow"><span data-dcnode-id="1472" instrument_node="">King's Quest VI: Heir Today, Gone Tomorrow</span></a></em><span data-dcnode-id="1469" instrument_node="">. Which you have to actually deal with </span><em data-dcnode-id="1466"><a class="twikilink" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToHellAndBack" title="/pmwiki/pmwiki.php/Main/ToHellAndBack"><span data-dcnode-id="1468" instrument_node="">without</span></a></em><span data-dcnode-id="1465" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToHellAndBack" title="/pmwiki/pmwiki.php/Main/ToHellAndBack"><span data-dcnode-id="1464" instrument_node="">dying</span></a><span data-dcnode-id="1462" instrument_node=""> if you want the </span><a class="twikilink" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoldenEnding" title="/pmwiki/pmwiki.php/Main/GoldenEnding"><span data-dcnode-id="1461" instrument_node="">Golden Ending</span></a><span data-dcnode-id="1459" instrument_node="">.
</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1457" instrument_node=""> </span><em data-dcnode-id="1454"><a class="twikilink" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Afterlife1996" title="/pmwiki/pmwiki.php/VideoGame/Afterlife1996"><span data-dcnode-id="1456" instrument_node="">Afterlife (1996)</span></a></em><span data-dcnode-id="1453" instrument_node=""> is entirely based off this concept - The player has to </span><a class="twikilink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SimulationGame" title="/pmwiki/pmwiki.php/Main/SimulationGame"><span data-dcnode-id="1452" instrument_node="">plan out both heaven and hell</span></a><span data-dcnode-id="1450" instrument_node=""> to be, respectively, as pleasant and torturous as they can be. The game includes workforce management (angels and demons), bank loans (the currency is pennies from heaven, with the banks of heaven and hell offering different terms), placing development zones (for the seven deadly sins), and a dry, worldly demon in a business suit as one of your </span><a class="twikilink" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodAngelBadAngel" title="/pmwiki/pmwiki.php/Main/GoodAngelBadAngel"><span data-dcnode-id="1449" instrument_node="">advisors</span></a><span data-dcnode-id="1447" instrument_node="">.
</span></li><li data-dcnode-id="1440"><span data-dcnode-id="1445" instrument_node=""> The main character of </span><em data-dcnode-id="1442"><a class="twikilink" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GrimFandango" title="/pmwiki/pmwiki.php/VideoGame/GrimFandango"><span data-dcnode-id="1444" instrument_node="">Grim Fandango</span></a></em><span data-dcnode-id="1441" instrument_node=""> is an employee at the Department of Death, which guides souls to the afterlife. It's a post-mortem travel agency.
</span></li><li data-dcnode-id="1431"><span data-dcnode-id="1439" instrument_node=""> What we see of Hell in </span><em data-dcnode-id="1436"><a class="twikilink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Guacamelee" title="/pmwiki/pmwiki.php/VideoGame/Guacamelee"><span data-dcnode-id="1438" instrument_node="">Guacamelee!</span></a></em><span data-dcnode-id="1435" instrument_node=""> is a huge </span><a class="twikilink" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilLawyerJoke" title="/pmwiki/pmwiki.php/Main/EvilLawyerJoke"><span data-dcnode-id="1434" instrument_node="">law firm</span></a><span data-dcnode-id="1432" instrument_node=""> called "Devil's Advocates", full of accountants and motivational posters. Of course the Devil's office is at the top of the building.
</span></li><li data-dcnode-id="1422"><span data-dcnode-id="1430" instrument_node=""> </span><em data-dcnode-id="1427"><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TouhouProject" title="/pmwiki/pmwiki.php/Franchise/TouhouProject"><span data-dcnode-id="1429" instrument_node="">Touhou Project</span></a></em><span data-dcnode-id="1426" instrument_node=""> loves this trope. At one point, hell's budget is dangerously in the red, and so it </span><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">opens up stands in the world of the living in an attempt to balance the books</span></em><span data-dcnode-id="1423" instrument_node="">. Hell itself has the rather amusing title of "The Ministry of Right and Wrong" and they publish guidebooks.
</span></li><li data-dcnode-id="1413"><span data-dcnode-id="1421" instrument_node=""> </span><a class="urllink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DV60embwC6WM"><span data-dcnode-id="1420" instrument_node="">Have A Nice Death</span><img data-dcnode-id="1419" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1417" instrument_node=""> is a roguelike platformer where the </span><a class="twikilink" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1416" instrument_node="">The Grim Reaper</span></a><span data-dcnode-id="1414" instrument_node=""> has outsourced soul collection and become a CEO of a company processing souls, Death Inc. , unfortunately the department heads have staged a hostile takeover and Death has to get the company back.
</span></li><li data-dcnode-id="1403"><span data-dcnode-id="1412" instrument_node=""> The celestial realm of </span><em data-dcnode-id="1409"><a class="twikilink" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DeptHeaven" title="/pmwiki/pmwiki.php/VideoGame/DeptHeaven"><span data-dcnode-id="1411" instrument_node="">Dept. Heaven</span></a></em><span data-dcnode-id="1408" instrument_node=""> is, ironically enough, one of these; from the glimpses the players get over the series, it is a strictly hierarchy-based realm controlled by a small council who are the gods' proxies, particularly in Riviera, where the gods are </span><em data-dcnode-id="1405"><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod" title="/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod"><span data-dcnode-id="1407" instrument_node="">in absentia</span></a></em><span data-dcnode-id="1404" instrument_node="">. And thanks to the series' villain, the system is corrupt as all get-out, too.
</span></li><li data-dcnode-id="1397"><span data-dcnode-id="1402" instrument_node=""> In </span><em data-dcnode-id="1399"><a class="twikilink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AtlantisTheLostTales" title="/pmwiki/pmwiki.php/VideoGame/AtlantisTheLostTales"><span data-dcnode-id="1401" instrument_node="">Beyond Atlantis</span></a></em><span data-dcnode-id="1398" instrument_node="">, while traveling in ancient China the player enters Hell to acquire an item, discovering it is a bureaucracy run by bored demons. The lost souls of those who died trying to cut through the red tape still wander the area.
</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1396" instrument_node=""> In </span><em data-dcnode-id="1392"><a class="twikilink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfKyrandia" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfKyrandia"><span data-dcnode-id="1395" instrument_node="">The Legend of Kyrandia</span></a><span data-dcnode-id="1393" instrument_node=""> III: Malcolm's Revenge</span></em><span data-dcnode-id="1391" instrument_node="">, Malcolm arrives in the lobby of such a bureaucracy and is made to wait in line behind a </span><a class="twikilink" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaptainErsatz" title="/pmwiki/pmwiki.php/Main/CaptainErsatz"><span data-dcnode-id="1390" instrument_node="">Captain Ersatz</span></a><span data-dcnode-id="1388" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/ElvisPresley" title="/pmwiki/pmwiki.php/Music/ElvisPresley"><span data-dcnode-id="1387" instrument_node="">Elvis Presley</span></a><span data-dcnode-id="1385" instrument_node=""> before he is able to progress to Hell.
</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1383" instrument_node=""> In </span><em data-dcnode-id="1380"><a class="twikilink" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SamAndMaxFreelancePolice" title="/pmwiki/pmwiki.php/VideoGame/SamAndMaxFreelancePolice"><span data-dcnode-id="1382" instrument_node="">Sam &amp; Max: Freelance Police</span></a></em><span data-dcnode-id="1379" instrument_node="">, Hell looks like a regular office building with cubicles and the like. It can be assumed that bureaucracy is also implemented there.
</span></li><li data-dcnode-id="1372"><span data-dcnode-id="1377" instrument_node=""> The Underwhere in </span><em data-dcnode-id="1374"><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SuperPaperMario" title="/pmwiki/pmwiki.php/VideoGame/SuperPaperMario"><span data-dcnode-id="1376" instrument_node="">Super Paper Mario</span></a></em><span data-dcnode-id="1373" instrument_node="">. The demons here are referred to as D-Men, wear business suits, and are constantly concerned about keeping everything on schedule.
</span></li><li data-dcnode-id="1359"><span data-dcnode-id="1371" instrument_node=""> Death in the </span><em data-dcnode-id="1368"><a class="twikilink" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkWaters" title="/pmwiki/pmwiki.php/VideoGame/DarkWaters"><span data-dcnode-id="1370" instrument_node="">Dark Waters</span></a></em><span data-dcnode-id="1367" instrument_node=""> fan campaign for </span><em data-dcnode-id="1364"><a class="twikilink" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/NeverwinterNights2" title="/pmwiki/pmwiki.php/VideoGame/NeverwinterNights2"><span data-dcnode-id="1366" instrument_node="">Neverwinter Nights 2</span></a></em><span data-dcnode-id="1363" instrument_node=""> is portrayed as a long-suffering bureaucrat who forgives your in-game deaths because he's </span><a class="twikilink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PenPushingPresident" title="/pmwiki/pmwiki.php/Main/PenPushingPresident"><span data-dcnode-id="1362" instrument_node="">too busy with paperwork</span></a><span data-dcnode-id="1360" instrument_node=""> to bother processing you into the afterlife.
</span></li><li data-dcnode-id="1350"><span data-dcnode-id="1358" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RomanceGame" title="/pmwiki/pmwiki.php/Main/RomanceGame"><span data-dcnode-id="1357" instrument_node="">Romance Game</span></a><span data-dcnode-id="1355" instrument_node=""> </span><em data-dcnode-id="1352"><a class="twikilink" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/TenDaysWithMyDevil" title="/pmwiki/pmwiki.php/VisualNovel/TenDaysWithMyDevil"><span data-dcnode-id="1354" instrument_node="">10 Days with My Devil</span></a></em><span data-dcnode-id="1351" instrument_node=""> has human death and reincarnation managed by demons, responsible for making sure that humans meet their fated deaths and that their souls are transported to heaven, and angels, who cleanse the souls of dead humans and reincarnate them into new lives. The two races are each ruled by a king and keep track of the fates of humans using an electronic database.
</span></li><li data-dcnode-id="1338"><span data-dcnode-id="1349" instrument_node=""> </span><em data-dcnode-id="1346"><a class="twikilink" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiIV" title="/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiIV"><span data-dcnode-id="1348" instrument_node="">Shin Megami Tensei IV</span></a></em><span data-dcnode-id="1345" instrument_node=""> has the player, on dying in battle, arriving at the shore of the Styx... to find that Charon is so far behind on the paperwork that it will take uncountable eons before he gets to the front of the line. It's gotten so bad that Charon now </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">actively requests bribes</span></em><span data-dcnode-id="1342" instrument_node=""> so that souls can return to the living world and keep him from having to file a report on yet </span><em data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">another</span></em><span data-dcnode-id="1339" instrument_node=""> soul. (He even lets you put one resurrection on a tab, though as soon as you can pay he'll take it out of your pocket.)
</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1337" instrument_node=""> The Blue Kingdom in </span><em data-dcnode-id="1334"><a class="twikilink" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SunlessSkies" title="/pmwiki/pmwiki.php/VideoGame/SunlessSkies"><span data-dcnode-id="1336" instrument_node="">Sunless Skies</span></a></em><span data-dcnode-id="1333" instrument_node=""> is the region populated by the deceased and oh boy is it a bureaucratic </span><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">nightmare</span></em><span data-dcnode-id="1330" instrument_node="">. There are specific statuses for both the dead and the rare living beings adventuring through this kingdom: Ephemera are the dead waiting to pass through Death's Door, Yoked are deceased which are servants of the Kingdom, Antedeceased, which are the not-dead-yet, and the Invisible, which are devoid of any statuses (a "bureaucratic nightmare" according to the Carious Official). There are a phenomenal amount of Courts held by various animals (Apes, Hummingbirds, Whales, etc) each with a </span><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">very</span></em><span data-dcnode-id="1327" instrument_node=""> specific area of influence, and the queues to have an audience with them are ludicrously long. And don't get started on all the protocols that have to be followed in that realm. It can get so bad that it is highly advised to hire a Litigator to guide you while in there.
</span></li><li data-dcnode-id="1311"><span data-dcnode-id="1325" instrument_node=""> In </span><em data-dcnode-id="1322"><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Hades" title="/pmwiki/pmwiki.php/VideoGame/Hades"><span data-dcnode-id="1324" instrument_node="">Hades</span></a></em><span data-dcnode-id="1321" instrument_node="">, which focuses on </span><a class="twikilink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Myth/ClassicalMythology" title="/pmwiki/pmwiki.php/Myth/ClassicalMythology"><span data-dcnode-id="1320" instrument_node="">Greek mythology</span></a><span data-dcnode-id="1318" instrument_node="">, many of the Chthonic gods have roles that contribute to running the Underworld and managing the souls of the dead. Charon ferries dead souls down the River Styx (after </span><a class="twikilink" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Psychopomp" title="/pmwiki/pmwiki.php/Main/Psychopomp"><span data-dcnode-id="1317" instrument_node="">Hermes</span></a><span data-dcnode-id="1315" instrument_node=""> delivers them to him), Hypnos keeps track of new arrivals, and </span><a class="twikilink" data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PenPushingPresident" title="/pmwiki/pmwiki.php/Main/PenPushingPresident"><span data-dcnode-id="1314" instrument_node="">Hades himself</span></a><span data-dcnode-id="1312" instrument_node=""> decides where the dead will be placed, determines any punishments, and listens to their claims. Meanwhile, Thanatos is in charge of delivering the souls of those who died peaceful deaths, and the Furies punish those who committed particular crimes in life. Despite the focus on the afterlife, it's still very much a bureaucracy with a lot of paperwork involved; there's even an administrative office that Zagreus can gain access to (and he even tried to work there himself, with disastrous results).
</span></li><li data-dcnode-id="1302"><span data-dcnode-id="1310" instrument_node=""> In </span><em data-dcnode-id="1307"><a class="twikilink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/WorldOfWarcraft" title="/pmwiki/pmwiki.php/VideoGame/WorldOfWarcraft"><span data-dcnode-id="1309" instrument_node="">World of Warcraft</span></a></em><span data-dcnode-id="1306" instrument_node=""> the souls of the recently deceased are collected by Kyrians and brought before the </span><a class="twikilink" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Psychopomp" title="/pmwiki/pmwiki.php/Main/Psychopomp"><span data-dcnode-id="1305" instrument_node="">Arbiter</span></a><span data-dcnode-id="1303" instrument_node=""> who assesses the soul's life and assigns them to the appropriate realm. Each realm of the Shadowlands has its own directive to pursue in service of the Shadowlands as a whole, such as Bastion training new Kyrian and Maldraxxus acting as the military.
</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1301" instrument_node=""> In </span><em data-dcnode-id="1298"><a class="twikilink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DeathAndTaxes" title="/pmwiki/pmwiki.php/VideoGame/DeathAndTaxes"><span data-dcnode-id="1300" instrument_node="">Death and Taxes</span></a></em><span data-dcnode-id="1297" instrument_node=""> the player character is a </span><a class="twikilink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrimReaper" title="/pmwiki/pmwiki.php/Main/GrimReaper"><span data-dcnode-id="1296" instrument_node="">Grim Reaper</span></a><span data-dcnode-id="1294" instrument_node=""> charged with maintaining the balance of life and death for a small town, through paperwork. Departments exist for the death of </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">all</span></em><span data-dcnode-id="1291" instrument_node=""> things - from plants to animals to humans to stars to </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">galaxies</span></em><span data-dcnode-id="1288" instrument_node="">.
</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1286" instrument_node=""> Heaven in </span><em data-dcnode-id="1283"><a class="twikilink" data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/NeonWhite" title="/pmwiki/pmwiki.php/VideoGame/NeonWhite"><span data-dcnode-id="1285" instrument_node="">Neon White</span></a></em><span data-dcnode-id="1282" instrument_node=""> has lobbies, kiosks, put-upon secretaries, strict regulations, and long waiting times.
</span><div class="indent" data-dcnode-id="1278"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Neon White:</span></strong><span data-dcnode-id="1279" instrument_node=""> Look, I expect this much from the DMV, but I'm not waiting four hours for my stupid mission in HEAVEN.
</span></div></li></ul></div><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1273"></p><div class="folderlabel" data-dcnode-id="1271" onclick="togglefolder('folder14');"><span data-dcnode-id="1272" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Webcomics&nbsp;</span></div><div class="folder" data-dcnode-id="1125" id="folder14" isfolder="true" style="display:block;"><span data-dcnode-id="1270" instrument_node="">
</span><ul data-dcnode-id="1126"><li data-dcnode-id="1264"><span data-dcnode-id="1269" instrument_node=""> </span><em data-dcnode-id="1266"><a class="twikilink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/HellInc" title="/pmwiki/pmwiki.php/Webcomic/HellInc"><span data-dcnode-id="1268" instrument_node="">Hell Inc</span></a></em><span data-dcnode-id="1265" instrument_node="">: Hell, Inc. is a weekly webcomic about the demons who work at Hell, Inc., the massive corporation in charge of running Hell. The story follows Doug, a low-level office drone, as he tries to eke out whatever happiness he can from the nightmare world he calls home. Other than being in Hell, the office environment is only slightly more soul-crushing than normal.
</span></li><li data-dcnode-id="1223"><span data-dcnode-id="1263" instrument_node=""> </span><em data-dcnode-id="1260"><a class="twikilink" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick" title="/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick"><span data-dcnode-id="1262" instrument_node="">The Order of the Stick</span></a></em><span data-dcnode-id="1259" instrument_node="">. This being a </span><em data-dcnode-id="1256"><a class="twikilink" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Tabletopgame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/Tabletopgame/DungeonsAndDragons"><span data-dcnode-id="1258" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="1255" instrument_node="">-based world, </span><a class="twikilink" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsCheap" title="/pmwiki/pmwiki.php/Main/DeathIsCheap"><span data-dcnode-id="1254" instrument_node="">Death Is Cheap</span></a><span data-dcnode-id="1252" instrument_node=""> for adventurers (they get raised pretty regularly), so there are "fast track" procedures for repeat customers.
</span><ul data-dcnode-id="1224"><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node=""> Said "fast track" is a literal Revolving Door.
</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1249" instrument_node=""> The part of the afterlife where the more numerous recent dead who worship the Southern Gods go on death has a long line. Although that </span><em data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">was</span></em><span data-dcnode-id="1246" instrument_node=""> after a pretty major battle.
</span><ul data-dcnode-id="1240"><li data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawfulGood" title="/pmwiki/pmwiki.php/Main/LawfulGood"><span data-dcnode-id="1244" instrument_node="">Lawful Good</span></a><span data-dcnode-id="1242" instrument_node=""> afterlife (and possibly other afterlifes) is up a mountain, but the line to get in is in a different astral "place" depending on who you worshiped. It's like they've turned Heaven into the DMV...
</span></li></ul></li><li data-dcnode-id="1230"><span data-dcnode-id="1238" instrument_node=""> Somewhat unusually for this trope, and despite the Deva's insistence on doing things by the book (see the trope picture), </span><a class="urllink" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.giantitp.com/comics/oots0489.html"><span data-dcnode-id="1237" instrument_node="">she's actually quite easygoing on Roy</span><img data-dcnode-id="1236" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1234" instrument_node=""> instead of being </span><a class="twikilink" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawfulStupid" title="/pmwiki/pmwiki.php/Main/LawfulStupid"><span data-dcnode-id="1233" instrument_node="">Lawful Stupid</span></a><span data-dcnode-id="1231" instrument_node=""> about it.
</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node=""> The evil afterlife seems more </span><a class="twikilink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="1228" instrument_node="">corporation-styled</span></a><span data-dcnode-id="1226" instrument_node="">, with the Three Fiends acting like they're running a start-up company (which, in a way, they do) and worrying about the presentation they have to give to the "lower-downs" and how they haven't had time to clear their inbox all week. Cut to a huge inbox being filled with deceased evil people, including some of the soldiers the heroes are busy killing.
</span></li></ul></li><li data-dcnode-id="1203"><span data-dcnode-id="1222" instrument_node=""> </span><em data-dcnode-id="1219"><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Misfile" title="/pmwiki/pmwiki.php/Webcomic/Misfile"><span data-dcnode-id="1221" instrument_node="">Misfile</span></a></em><span data-dcnode-id="1218" instrument_node=""> is based around a filing error within the celestial bureaucracy that genderswaps a boy and erases the past two years of another girl; the human world has been altered to accommodate the change and they are the only ones who remember how their lives should be. </span><span class="spoiler" data-dcnode-id="1214" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod" title="/pmwiki/pmwiki.php/Main/HaveYouSeenMyGod"><span data-dcnode-id="1217" instrument_node="">The lack of leadership and increasing chaos after God left</span></a><span data-dcnode-id="1215" instrument_node=""> caused one archangel to snap and try to usurp power using the bureaucracy's own incompetence to mask his assassinations. The main characters kill him before he can retcon humanity,</span></span><span data-dcnode-id="1213" instrument_node=""> but leave the bureaucracy permanently changed...
</span><ul data-dcnode-id="1204"><li data-dcnode-id="1205"><span data-dcnode-id="1212" instrument_node=""> ...Which leads into sequel series Hell High. After another major filing error causes birth rates to increase in Hell, especially in the </span><em data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">infertile</span></em><span data-dcnode-id="1209" instrument_node=""> human damned, both sides agree to a compromise, creating a school meant for Hellborn to earn their </span><em data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">first</span></em><span data-dcnode-id="1206" instrument_node=""> chance at a life on Earth.
</span></li></ul></li><li data-dcnode-id="1197"><span data-dcnode-id="1202" instrument_node=""> </span><em data-dcnode-id="1199"><a class="twikilink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/IrregularWebcomic" title="/pmwiki/pmwiki.php/Webcomic/IrregularWebcomic"><span data-dcnode-id="1201" instrument_node="">Irregular Webcomic!</span></a></em><span data-dcnode-id="1198" instrument_node=""> features a hierarchy of Deaths, who are periodically demoted, promoted, or fired by the Head Death. Each one is in charge of a particular cause of death, such as Insanely Overpowered Fireballs, Choking On A Giant Frog, and Being Wrestled To Death By Steve Irwin. One memorable storyline involved all of the Deaths going on strike.
</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1196" instrument_node=""> </span><em data-dcnode-id="1193"><a class="twikilink" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Rhapsodies" title="/pmwiki/pmwiki.php/Webcomic/Rhapsodies"><span data-dcnode-id="1195" instrument_node="">Rhapsodies</span></a></em><span data-dcnode-id="1192" instrument_node=""> has the Department of Minor Nuisances, which is in charge of things like missing combs and traffic lights. Though when they are behind on various accounts they may resort to drastic measures.
</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1190" instrument_node=""> </span><em data-dcnode-id="1187"><a class="twikilink" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheArtOfMonsters" title="/pmwiki/pmwiki.php/Webcomic/TheArtOfMonsters"><span data-dcnode-id="1189" instrument_node="">The Art of Monsters</span></a></em><span data-dcnode-id="1186" instrument_node=""> has a bureaucratic heaven based on Chinese mythology. One of the characters is hauled in front of a tribunal for her misdeeds, while another gets given a job in a celestial library and a</span><a class="twikilink" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceHat" title="/pmwiki/pmwiki.php/Main/NiceHat"><span data-dcnode-id="1185" instrument_node="">fancy hat</span></a><span data-dcnode-id="1183" instrument_node="">.
</span></li><li data-dcnode-id="1169"><span data-dcnode-id="1181" instrument_node=""> </span><em data-dcnode-id="1178"><a class="twikilink" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheAdventuresOfDrMcNinja" title="/pmwiki/pmwiki.php/Webcomic/TheAdventuresOfDrMcNinja"><span data-dcnode-id="1180" instrument_node="">The Adventures of Dr. McNinja</span></a></em><span data-dcnode-id="1177" instrument_node=""> plays with this; purgatory is an infinite diner where-in the dead </span><a class="urllink" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//drmcninja.com/archives/comic/9p17/"><span data-dcnode-id="1176" instrument_node="">must eat dishes symbolizing/made-from each of their sins</span><img data-dcnode-id="1175" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1173" instrument_node=""> before they can move on to the next (as yet unseen) stage of the afterlife. The real kicker? There's only one waiter in the whole place so the service is just </span><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">terrible</span></em><span data-dcnode-id="1170" instrument_node="">; people that've been there for centuries are still on the bread basket.
</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1168" instrument_node=""> </span><em data-dcnode-id="1165"><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/WhiteDarkLife" title="/pmwiki/pmwiki.php/Webcomic/WhiteDarkLife"><span data-dcnode-id="1167" instrument_node="">White Dark Life</span></a></em><span data-dcnode-id="1164" instrument_node=""> inverts this, Hell is the Bureaucracy, Though it's still a horrible place for sinners.
</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1162" instrument_node=""> The angels in </span><em data-dcnode-id="1159"><a class="twikilink" data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/HolyBibble" title="/pmwiki/pmwiki.php/Webcomic/HolyBibble"><span data-dcnode-id="1161" instrument_node="">Holy Bibble</span></a></em><span data-dcnode-id="1158" instrument_node=""> have offices, councils, rules, etc...
</span></li><li data-dcnode-id="1147"><span data-dcnode-id="1156" instrument_node=""> </span><em data-dcnode-id="1153"><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Housepets" title="/pmwiki/pmwiki.php/Webcomic/Housepets"><span data-dcnode-id="1155" instrument_node="">Housepets!</span></a></em><span data-dcnode-id="1152" instrument_node=""> is said to have a </span><a class="urllink" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.housepetscomic.com/2012/05/30/slide-rule/"><span data-dcnode-id="1151" instrument_node="">celestial bureaucracy</span><img data-dcnode-id="1150" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1148" instrument_node=""> when Pete is tried for altering Joel/King's fate by turning him from a human into a dog. The eventual charge was "complicating matters in the celestial bureaucracy."
</span></li><li data-dcnode-id="1133"><span data-dcnode-id="1146" instrument_node=""> The forces of cosmic evil are this in </span><em data-dcnode-id="1143"><a class="twikilink" data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/EightBitTheater" title="/pmwiki/pmwiki.php/Webcomic/EightBitTheater"><span data-dcnode-id="1145" instrument_node="">8-Bit Theater</span></a></em><span data-dcnode-id="1142" instrument_node="">. At one point Black Mage's patron mentions that having him take over Hell is an unacceptable form of apocalypse because there's just way too much paperwork.
</span><div class="indent" data-dcnode-id="1134"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Black Mage:</span></strong><span data-dcnode-id="1139" instrument_node=""> Evil has middle management? </span><br data-dcnode-id="1138"><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Unnamed Evil God/"Darko, Dark God of the Dark":</span></strong><span data-dcnode-id="1135" instrument_node=""> Are you kidding? That's all we are.
</span></div></li><li data-dcnode-id="1127"><span data-dcnode-id="1132" instrument_node=""> </span><em data-dcnode-id="1129"><a class="twikilink" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/AngelMoxie" title="/pmwiki/pmwiki.php/Webcomic/AngelMoxie"><span data-dcnode-id="1131" instrument_node="">Angel Moxie</span></a></em><span data-dcnode-id="1128" instrument_node="">: The realm of the Higher Authority, which the characters answer to, turns out to work like this. Appeals to the Authority are handled by a receptionist who manifests as a squirrel.
</span></li></ul></div><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1123"></p><div class="folderlabel" data-dcnode-id="1121" onclick="togglefolder('folder15');"><span data-dcnode-id="1122" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Originals&nbsp;</span></div><div class="folder" data-dcnode-id="1077" id="folder15" isfolder="true" style="display:block;"><span data-dcnode-id="1120" instrument_node="">
</span><ul data-dcnode-id="1078"><li data-dcnode-id="1111"><span data-dcnode-id="1119" instrument_node=""> The web novel </span><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">A Trickster's Tail</span></em><span data-dcnode-id="1116" instrument_node=""> featured a "Department of Classifications" in </span><a class="urllink" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lycanon.org/trickster/tricksterstail14.htm"><span data-dcnode-id="1115" instrument_node="">Part 14</span><img data-dcnode-id="1114" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1112" instrument_node="">. The protagonist, realizing this appears to be the processing hub for the afterlife, asks the clerk why it's so empty.'
</span></li><li data-dcnode-id="1098"><span data-dcnode-id="1110" instrument_node=""> In </span><em data-dcnode-id="1107"><a class="twikilink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/CollegeHumor" title="/pmwiki/pmwiki.php/Website/CollegeHumor"><span data-dcnode-id="1109" instrument_node="">CollegeHumor</span></a></em><span data-dcnode-id="1106" instrument_node="">'s "God's Boss Craig", God is not in charge of heaven. </span><a class="twikilink" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1105" instrument_node="">He has a boss</span></a><span data-dcnode-id="1103" instrument_node=""> </span><a class="urllink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D4HUBOD7Qt74"><span data-dcnode-id="1102" instrument_node="">named Craig</span><img data-dcnode-id="1101" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1099" instrument_node="">.
</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1097" instrument_node=""> This trope is a mainstay of </span><em data-dcnode-id="1094"><a class="twikilink" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Podcast/LessIsMorgue" title="/pmwiki/pmwiki.php/Podcast/LessIsMorgue"><span data-dcnode-id="1096" instrument_node="">Less Is Morgue</span></a></em><span data-dcnode-id="1093" instrument_node="">. Evelyn describes purgatory as being like the DMV, another character is forced to fill out mountains of paperwork before being assigned to his afterlife, and </span><a class="twikilink" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1092" instrument_node="">The Grim Reaper</span></a><span data-dcnode-id="1090" instrument_node=""> uses a mobile app - that he can't even begin to understand - to judge the spirits of the deceased.
</span></li><li data-dcnode-id="1079"><span data-dcnode-id="1088" instrument_node=""> The animation </span><em data-dcnode-id="1084"><a class="urllink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSyDjEfUha0g"><span data-dcnode-id="1087" instrument_node="">Mortys</span><img data-dcnode-id="1086" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1083" instrument_node=""> is about </span><a class="twikilink" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1082" instrument_node="">The Grim Reaper</span></a><span data-dcnode-id="1080" instrument_node=""> (who happens to be a woman) being buried in the paperwork of administering the dead people. Her son wants her to use computers to be more effective.
</span></li></ul></div><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1075"></p><div class="folderlabel" data-dcnode-id="1073" onclick="togglefolder('folder16');"><span data-dcnode-id="1074" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Western Animation&nbsp;</span></div><div class="folder" data-dcnode-id="966" id="folder16" isfolder="true" style="display:block;"><span data-dcnode-id="1072" instrument_node="">
</span><ul data-dcnode-id="967"><li data-dcnode-id="1066"><span data-dcnode-id="1071" instrument_node=""> In </span><em data-dcnode-id="1068"><a class="twikilink" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/EekTheCat" title="/pmwiki/pmwiki.php/WesternAnimation/EekTheCat"><span data-dcnode-id="1070" instrument_node="">Eek! The Cat</span></a></em><span data-dcnode-id="1067" instrument_node="">, cats have life cards to show how many lives they have left. Eek was once tricked into taking the file of a bad cat and got sent to hell. Once the mistake got fixed, he regained all his lives.
</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1065" instrument_node=""> There's a bit of this in </span><em data-dcnode-id="1062"><a class="twikilink" data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/GarfieldHis9Lives" title="/pmwiki/pmwiki.php/WesternAnimation/GarfieldHis9Lives"><span data-dcnode-id="1064" instrument_node="">Garfield: His 9 Lives</span></a></em><span data-dcnode-id="1061" instrument_node="">. After losing his ninth, last life (in the future; modern-day Garfield is life eight), Garfield and Odie come before God, and Garfield successfully argues that his last death was unfair. God then asks which life he was on.
</span><div class="indent" data-dcnode-id="1053"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Garfield:</span></strong><span data-dcnode-id="1058" instrument_node=""> You mean... you don't keep track? </span><br data-dcnode-id="1057"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">God:</span></strong><span data-dcnode-id="1054" instrument_node=""> Normally I do, but our computers are on the blink right now.
</span></div><ul data-dcnode-id="1048"><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node=""> Garfield then claims it was his first life, wrangling a full nine more lives for both him and Odie.
</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node=""> However, there are hints that Heaven doesn't actually work like that, and God's just making up an excuse to show favoritism.
</span></li></ul></li><li data-dcnode-id="1035"><span data-dcnode-id="1046" instrument_node=""> The original pitch of </span><em data-dcnode-id="1043"><a class="twikilink" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/JimmyTwoShoes" title="/pmwiki/pmwiki.php/WesternAnimation/JimmyTwoShoes"><span data-dcnode-id="1045" instrument_node="">Jimmy Two-Shoes</span></a></em><span data-dcnode-id="1042" instrument_node=""> stated that reason why </span><a class="twikilink" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePollyanna" title="/pmwiki/pmwiki.php/Main/ThePollyanna"><span data-dcnode-id="1041" instrument_node="">Jimmy</span></a><span data-dcnode-id="1039" instrument_node=""> was in </span><a class="twikilink" data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellOfATime" title="/pmwiki/pmwiki.php/Main/HellOfATime"><span data-dcnode-id="1038" instrument_node="">Miseryville</span></a><span data-dcnode-id="1036" instrument_node=""> in the first place was that after he died by being hit by a bus, an administrative error by the powers that be sent him down instead of up. Whether or not this is still the case in the final cut of the show is unknown.
</span></li><li data-dcnode-id="1000"><span data-dcnode-id="1034" instrument_node=""> In the "Shroud of Wally" episode of </span><em data-dcnode-id="1031"><a class="twikilink" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Dilbert" title="/pmwiki/pmwiki.php/WesternAnimation/Dilbert"><span data-dcnode-id="1033" instrument_node="">Dilbert</span></a></em><span data-dcnode-id="1030" instrument_node="">, Dilbert is briefly killed and discovers that the afterlife is identical to his cubicle at work. Naturally, his engineer coworkers have one major concern:
</span><div class="indent" data-dcnode-id="1001"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Alice:</span></strong><span data-dcnode-id="1027" instrument_node=""> You're telling me that the afterlife is a stinking </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">CUBICLE</span></em><span data-dcnode-id="1024" instrument_node="">? </span><br data-dcnode-id="1023"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Dilbert:</span></strong><span data-dcnode-id="1020" instrument_node=""> I'm just telling you what I saw. </span><br data-dcnode-id="1019"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Loud Howard:</span></strong><span data-dcnode-id="1016" instrument_node=""> How fast was the Internet connection? </span><br data-dcnode-id="1015"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Dilbert:</span></strong><span data-dcnode-id="1012" instrument_node=""> I don't even know if it had an Internet connection. </span><br data-dcnode-id="1011"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Wally:</span></strong><span data-dcnode-id="1008" instrument_node=""> Well, this raises many troubling questions about the Afterlife. First, how do you get your software upgraded? </span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">* beat* </span><br data-dcnode-id="1005"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Wally:</span></strong><span data-dcnode-id="1002" instrument_node=""> I guess it was just the one question.
</span></div></li><li data-dcnode-id="994"><span data-dcnode-id="999" instrument_node=""> In the </span><em data-dcnode-id="996"><a class="twikilink" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/AmericanDad" title="/pmwiki/pmwiki.php/WesternAnimation/AmericanDad"><span data-dcnode-id="998" instrument_node="">American Dad!</span></a></em><span data-dcnode-id="995" instrument_node=""> episode "The Most Adequate Christmas Ever", Stan dies and is sent to Heaven, where he demands a "Second Chance" at life. This process, it turns out, requires a courthouse trial, with Angels using victories in cases to decide their hierarchy. Stan winds up with Michelle, who hasn't ever won a single case, and thus, lacks even angelic wings.
</span></li><li data-dcnode-id="981"><span data-dcnode-id="993" instrument_node=""> The </span><em data-dcnode-id="990"><a class="twikilink" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TomAndJerry" title="/pmwiki/pmwiki.php/WesternAnimation/TomAndJerry"><span data-dcnode-id="992" instrument_node="">Tom and Jerry</span></a></em><span data-dcnode-id="989" instrument_node=""> cartoon </span><em data-dcnode-id="986"><a class="twikilink" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/HeavenlyPuss" title="/pmwiki/pmwiki.php/WesternAnimation/HeavenlyPuss"><span data-dcnode-id="988" instrument_node="">Heavenly Puss</span></a></em><span data-dcnode-id="985" instrument_node=""> depicts the entrance to Tom's heaven as a gate before the Heavenly Express train. Cats that have just died wait in line before being admitted by the gatekeeper. Tom tries to sneak past, only to be told that he can only ride the train if Jerry signs a Certificate of Forgiveness first. Tom is given just one hour to go back to Earth and persuade Jerry to sign the document. Of course, it turns out it was </span><a class="twikilink" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllJustADream" title="/pmwiki/pmwiki.php/Main/AllJustADream"><span data-dcnode-id="984" instrument_node="">All Just a Dream</span></a><span data-dcnode-id="982" instrument_node="">
</span></li><li data-dcnode-id="968"><span data-dcnode-id="980" instrument_node=""> On </span><em data-dcnode-id="976"><span data-dcnode-id="979" instrument_node=""> </span><a class="twikilink" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/BigMouth" title="/pmwiki/pmwiki.php/WesternAnimation/BigMouth"><span data-dcnode-id="978" instrument_node="">Big Mouth</span></a></em><span data-dcnode-id="975" instrument_node=""> this is taken </span><a class="twikilink" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="974" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="972" instrument_node="">. It turns out that the Hormone Monsters work for "Human Resources — We Manage People" (</span><a class="twikilink" data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProductPlacement" title="/pmwiki/pmwiki.php/Main/ProductPlacement"><span data-dcnode-id="971" instrument_node="">presented by Acura</span></a><span data-dcnode-id="969" instrument_node="">), which manages all stages of human life. There is a Childhood Office, Department of Puberty, Center for Adulthood, Geriatrics and Bureau of the Dead. Nick, Andrew and Jessi find their way here when Tyler accidentally leaves a portal open.
</span></li></ul></div><span data-dcnode-id="965" instrument_node="">
