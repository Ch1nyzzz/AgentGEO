</span><h2 class="title heading" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">
      Brockton's Celestial Forge
    </span></h2><span data-dcnode-id="903" instrument_node="">
</span><h3 class="byline heading" data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">
</span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archiveofourown.org/users/Lord_Roustabout/pseuds/Lord%2520Roustabout" rel="author"><span data-dcnode-id="901" instrument_node="">Lord Roustabout (Lord_Roustabout)</span></a><span data-dcnode-id="899" instrument_node="">
</span></h3><span data-dcnode-id="897" instrument_node="">
</span><div class="summary module" data-dcnode-id="884" role="complementary"><span data-dcnode-id="896" instrument_node="">
</span><h3 class="heading" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Summary:</span></h3><span data-dcnode-id="893" instrument_node="">
</span><blockquote class="userstuff" data-dcnode-id="886"><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The Celestial Forge is the greatest combination of crafting powers in Jumpchain, meaning it is the greatest combination of crafting abilities in all of fiction. In Brockton Bay a forgotten side character's trigger event ends with him linked to the Celestial Forge rather than his intended shard. His slowly expanding collection of tinker abilities and the influence of his new benefactor pulls him into the heart of the conflict about to rock the city and decide the fate of the world.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">As part of a writing experiment that turned into a narrative. Perks and items form the Celestial Forge (pastebin.com/35AJD9Lj) are selected randomly based on progress through the story. Ultimately an excuse to explore the technology and crafting abilities of multiple sources of fiction.</span></p><span data-dcnode-id="887" instrument_node="">
</span></blockquote><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span></div><span data-dcnode-id="881" instrument_node="">
</span><div data-dcnode-id="475" id="chapters"><span data-dcnode-id="880" instrument_node="">
</span><span data-dcnode-id="878" instrument_node="">
</span><div class="chapter" data-dcnode-id="479" id="chapter-1"><span data-dcnode-id="877" instrument_node="">
</span><span data-dcnode-id="875" instrument_node="">
</span><div class="chapter preface group" data-dcnode-id="853" role="complementary"><span data-dcnode-id="874" instrument_node="">
</span><h3 class="title" data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">
</span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archiveofourown.org/works/23949661/chapters/57598366"><span data-dcnode-id="872" instrument_node="">Chapter 1</span></a><span data-dcnode-id="870" instrument_node="">: 1 Introduction
    </span></h3><span data-dcnode-id="868" instrument_node="">
</span><span data-dcnode-id="866" instrument_node="">
</span><div class="notes module" data-dcnode-id="855" id="notes"><span data-dcnode-id="865" instrument_node="">
</span><h3 class="heading" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Notes:</span></h3><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">
          (See the end of the chapter for  </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archiveofourown.org/works/23949661%23chapter_1_endnotes"><span data-dcnode-id="860" instrument_node="">notes</span></a><span data-dcnode-id="858" instrument_node="">.)
          </span></p><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span></div><span data-dcnode-id="852" instrument_node="">
</span><span data-dcnode-id="850" instrument_node="">
</span><div class="userstuff module" data-dcnode-id="512" role="article"><span data-dcnode-id="849" instrument_node="">
</span><h3 class="landmark heading" data-dcnode-id="847" id="work"><span data-dcnode-id="848" instrument_node="">Chapter Text</span></h3><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">It was hard enough being a college dropout in a city with a half dead economy. In Brockton most people were either ignoring the reality of the situation or had given up hope completely. Realistically the only growth industry was cape work, and if you weren’t a cape that meant tourism, the PRT, or henchmaning for the truly desperate. Most of the city would have given their right arm for superpowers. Too bad they don’t understand what you have to go through in order to trigger, or how the powers you get don’t exactly match up with what you dreamed about.</span></p><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">&nbsp;</span></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">If I thought the current level of what my power was capable of was all I would ever get I would probably be pretty frustrated. Back when I was in college everyone dreamed about being a tinker. When you were in an engineering program in the same city as Armsmaster it was really inevitable. When I finally got powers they didn’t exactly match what you’d expect from a tinker. Then again, from what I’d learned most tinkers didn’t exactly function on the level of what you’d expect from a tinker.</span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">&nbsp;</span></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">See, technically I had only made one thing so far. It was a doozy, but still not exactly the stuff heroes are made of. I might have been able to leverage it into some obscure application, especially the secondary effects, but it would have been a challenge. Still, it’s not as bad as it could have been. Or would have been.</span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">&nbsp;</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">I’d had my mighty pseudo-tinker powers for all of a week and had not accomplished much in that time. Mostly I’d been focusing on sorting out the mess of my life that had resulted in my trigger event. I wouldn’t exactly say bridges were burned, but there were some close relations that it would be awkward to deal with for a while. Triggers don’t really fix anything. Well, they might if it’s one of the ones that turns you super strong to deal with being crushed by a car, but for anything that has a longer buildup there’s no amount of power that is actually going to fix the problems with either you or your life that led to that situation. Accepting that at least let me start to move on.</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&nbsp;</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">I was riding the bus home after a grueling week of work. They say there are no jobs in Brockton Bay. That’s not exactly true. There are plenty of jobs as long as you’re relatively young, clean, willing to put up with abuse from the general public, and don’t need to support anyone else or have any serious obligations beyond basic survival. Which is how I was able to land a job as a part time retail worker in the rich side of the city. In a store where everyone other than the manager was part time, since that let you avoid all those pesky benefits that would have to be paid.</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">&nbsp;</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">It was how I was able to afford a truly terrible apartment in not quite the worst area of the docks. I was currently living in the part of the city they had warned us against when I first moved out of dorms. It at least got me away from Captain’s Hill and thanks to my power was just bearable. The apartment was about a five minute walk from the nearest bus stop, which it this neighborhood was a somewhat harrowing experience. The apartment was part of an oversized house that had been divided into five units, which placed mine as a long thin studio apartment.&nbsp; My theory was it had been assembled out of left over space. The fact that it had to be accessed from what must have been a converted fire escape only did more to convinced me. It was clearly a case of ‘we have this extra space. Can we get someone to pay for it?’.</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">&nbsp;</span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">I know there were much worse places. I’d looked at what they offered in my price range Downtown and this was totally worth the half hour bus commute. Plus, thanks to my power, it had one advantage.</span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">&nbsp;</span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Once I got home I dumped my jacket and headed for the closet. This would probably wear thin eventually, but for now, after just a week of having my power it was still a blast. I reached into my pocket and pulled out my key.</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&nbsp;</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">It was the first thing I built, if I could count as the person who built it. There were two kinds of things I could make with my powers. Things made out of normal material, and things like this. I couldn’t recreate the key if my life depended on it, but that doesn’t matter because it will always exist. I’ve essentially made it a universal constant that I will always have this key. Destroyed, lost, or just separated and it will turn up in a few minutes. That effect, and what it could accomplish was enough that if I didn’t know the full scope of my powers I probably would have assumed the key and what it could do was everything. Then it would be off to the PRT to let them try to figure out how to brand me as a door based superhero.</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">&nbsp;</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">I slid the key into the closet door and turned it. Rather than open into a small and musty collection of shirts and winter coats the door revealed a blank white cube of a room exactly five meters on each side. Safe and mobile access to an extradimensional space wasn’t a terrible power and could probably have any number of applications. I mean, if I wanted to go villain it would have let me clean out entire stores without anything weighing me down. I was putting it to a much more mundane application.</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">&nbsp;</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Right now the cube contained a duffle bag, mattress, work desk, small bookcase, two storage trunks, and an old office chair. There was also a battery lantern on the desk since the lighting level in this area left something to be desired. At least it was dark enough that it was possible to sleep here, and the place had less temperature and odor issues than my own apartment.</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&nbsp;</span></p><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">I wasn’t here just to get away from my living conditions. Aside from the entry way there was a single door on the left side of the cube. Before I headed that way I set up the crude door bar I had built earlier. One downside was I couldn’t close the door while I was inside. That was probably a safety measure since I didn’t know what would happen if the door I used was opened when I tried to get out, or worse destroyed. I had no intention of getting stuck in here forever, but I wasn’t going to let anyone wander in behind me. Between my locked, bolted and chained apartment door and the chunk of steel wedging this door shut as far as I could get it I was reasonably secure. It wouldn’t stop most of the capes in this city, but I was thankfully off their radar by virtue of not doing anything superhero related.</span></p><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">&nbsp;</span></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">I walked through the inner door into my workshop. It wasn’t exactly what you would expect when you heard the words ‘tinker’ and ‘workshop’. The place wasn’t bedecked with the blistering technology of a science hero. It wasn’t even a top quality manufacturing facility. This was more of what you would get from a high school metal shop. There were tools and machinery, but it was fairly basic stuff. Not even a proper numeric control lathe. I was lucky I had a manufacturing component in my college courses otherwise I’d be completely lost here. My high school had phased out shop class long ago so it was only thanks to a single college class offered more as a formality that I knew what I was doing.</span></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">&nbsp;</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Fortunately the place was stocked with materials and safety equipment. Unless I wanted to work with exotic alloys or bring in high tech equipment the whole place was designed so I wouldn’t have to go out for anything. That was a very good thing. I don’t know if it was true, but there were rumors about people who triggered as tinkers started buying random stuff like loads of silly putty, old microwaves, or cleaning chemicals only to get exposed by various agencies or gangs on the lookout for behavior like that. I had my doubts, since that seemed like it would generate loads of false positives, but who knew how good the thinkers working for people like that were.</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">&nbsp;</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">I didn’t want to end up exposed, especially not with my powers at their current level. So the fact that I had a private, personal, and well stocked workshop was a blessing. It was just too bad I couldn’t build anything worth a damn.</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">&nbsp;</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">What I had produced in my after work hours over the last week was nothing more than curiosities. Honestly it had been more about trying to get used to working with this kind of equipment again. The closest thing I’d made to a useful tool was that door jam, and that was just a matter of measuring correctly and working the right tools. I had rough tinker facilities, but I didn’t have any tinker knowledge.</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">&nbsp;</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">That is, I didn’t have any yet.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">&nbsp;</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">I closed my eyes and felt out the potential extent of my power. Over three hundred flares of lightning burned in my mind, all but one completely beyond my reach. The only mote I could touch was the single piece representing my workshop. The embers were arranged into twelve general constellations each along a different theme, but I could barely glean what it was at the moment. These were what I was working towards. These were the reason I hadn’t given up and sulked off to the Protectorate. These were tinker powers.</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">&nbsp;</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Every one of them represented some level of crafting ability, power, knowledge or resource. I could just barely feel them now, but I knew how strong they were. Even the weakest among them was significant and the highest tiers were world shaking. These were hero powers. More than that these were Hero powers, powers on the level of the first, legendary, and unlimited tinker. Powers that would let a person be the kind of technology superhero that used to appear in comic books, not the stripped down nonsense that was currently running around.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&nbsp;</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">There but for the grace of god and all that.</span></p><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">&nbsp;</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">My reach had been slowly building in the week since I got my powers. It was gradual at first, but had accelerated recently. Soon I would have a chance to link to another one of the points of light. The constellations shifted and changed so I had no idea what I would be able to reach, or even if what I had built up would be strong enough for whatever spark swung close at the time. This was the first time this had happened, but being able to feel it coming was incredible. I was lucky to have the level of understanding of my power that I’d been blessed with.</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">&nbsp;</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Like pretty much everyone in school I’d taken electives on parahuman studies. There were rumors that the cape population of the city took those courses in their secret identities, and the younger members of New Wave showed up occasionally. They were the cool courses that everyone was interested in. Get a chance to learn about the history of capes, cape impact on society, and theories on how powers worked. With the insight I’d gained since triggering I could say most of what they were teaching was pure crap. That may have been intentional since people trying to self-invoke a trigger event was a nightmare in terms of self-inflicted harm. Some of the other stuff was so far off the mark that I had to wonder if there was an intentional attempt to conceal it. Passenger theory had barely been touched on, and that was mostly to dismiss it. I kind of understood, it seemed ridiculous, and it was a lot more likely that anyone who thought their powers came from an outside intelligence was crazy rather than uniquely insightful.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&nbsp;</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">I was definitely in the latter category. I could feel my passenger’s excitement as my reach grew for the final grasp. A mote swung close from one of the mid-sized constellations. My power tried to grasp it, but the energy was too much. The flare of energy spun away and out of reach. There was mild disappointment from my passenger, but not despair. My reach was growing. Another mote would come, and I would be able to handle a stronger power by the time it arrived.</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">&nbsp;</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The emotional reassurance of my passenger was probably the most comforting thing in my life. My connection with him didn’t go any further than what he was feeling, but that was still incredibly enlightening. I trusted that he had my best interest at heart, or at least my survival. The reason I trusted that was because of how badly he wanted this set of powers complete.</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">&nbsp;</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">I didn’t have much information from my passenger, but I did understand my power. Generally people have a roughly instinctive understanding of how their powers work. Mine were a little more in depth than that. I understood the nature of how powers were gained and what they meant. I knew the name of the power I had, Metalwork Workshop which was from the Toolkits constellation of powers. And I knew the name of the entire array of powers and how badly my passenger wanted it to be complete.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">&nbsp;</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">My power, or the array of my potential powers, was the Celestial Forge. From what I could tell it was the ultimate tinker power and my passenger’s combined Holy Grail and Mount Everest. His emotions when considering the breath of the powers were complicated, but mostly centered on a longing to see them in action. He wanted this to be completed and was heavily invested in me being the one to finish it. All his guidance and support was for the purpose of turning me into the greatest tinker that had ever existed. I just hoped I could live up to those expectations.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">&nbsp;</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">I wasn’t likely to see any new powers tonight. I’d completed a circuit of the various pieces of borderline scrap metal that represented my crafting projects from the previous week. A persistent infinitely restocking workshop really was incredible, but without the skills to make better use of it all I had was a hobby room. I checked my watch. It was getting on past six. I had kind of blocked out this evening for dealing with any new ability I got from my power, but that was a wash. That left me some time to prepare for the other aspects of being a superhero.</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">&nbsp;</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">There’s a common impression that tinkers make something of a soft target in cape fights. That might be true for anyone who doesn’t show up with power armor or a personal force field, but the fact is most capes out there have no physical boosts at all. Brutes are common enough, but outside of that category everyone is as vulnerable as a normal human. The problem for tinkers is that they have time commitments that keep them from being able to train to the level expected from capes.</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">&nbsp;</span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">See, if you don’t have some power that makes training unnecessary the amount of physical conditioning necessary to just survive a cape encounter is insane. Fortunately I had already been running regularly before getting my powers. That was great for endurance, but there was the whole issue of muscle growth and combat skills to think of. I was lucky enough that my neighborhood had a solution to both of those problems.</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">&nbsp;</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">I left my workshop and closed the door to the extradimensional space. The transition from pristine room to dingy apartment was stark, but at least my apartment got slightly more livable now that I didn’t need to allocate space for sleeping or storage. I headed to the small kitchenette area and grabbed a high protein snack before gathering my workout gear and leaving the apartment.</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">&nbsp;</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Another load off my mind thanks to my powers, not storing anything of value in the apartment made me a lot less concerned about leaving it. I effectively had access to all my worldly possessions anywhere. As long as I could access any kind of door and I’d never have to worry about them being compromised. There were tinkers who would kill for that kind of security and my powers provided it as a near afterthought.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">&nbsp;</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">My destination was only a couple of blocks away and was in a fairly active part of the neighborhood. This was an area of the Docks where the people who still lived here were holding out hope for the city turning around. It was an endearing investment in the community that probably only persisted because there was minimal value to be found here for any of the local gangs. I was heading for an old building dating to the fifties that probably hadn’t been meaningfully updated since then. Still, having a boxing gym within walking distance that only charged forty dollars a month for membership was worth the potential fire hazard. Actually, fire was unlikely considering this place was probably stuffed to the gills with asbestos.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">&nbsp;</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">I checked in and got changed. The place was practically a time capsule, but it worked for what I needed. I had no illusion about being ‘fight ready’ after less than a week, but I was getting into a decent routine that would generate meaningful improvement eventually. I grabbed one of the jump ropes for a warm-up along with a set of push-ups, squats and crunches. I spent about fifteen minutes practicing the basic combinations from my introductory lesson before switching to the heavy bag.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&nbsp;</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">I pushed as far as I could but there were hard limits I was still struggling with. Endurance from running didn’t translate perfectly to this kind of workout. Eventually I was catching my breath with a water bottle while half collapsed on one of the side benches. That was when I saw Doug wandering over from the main ring.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">&nbsp;</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The best way I could describe Doug was if someone took Mickey from the Rocky movies and scaled him up to about six foot five. The guy was pushing sixty now but had apparently been an absolute terror in his youth. He had transitioned into coaching with all the grace of a rabid bull and would typically serenade the entire gym on deficiencies in your technique in a voice worthy of a drill sergeant.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">&nbsp;</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">He was in something of a good mood when he approached me, apparently having shouted himself out during his earlier training session. “Joe! Good to see you again. Too many young guys vanish after their first class.”</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">&nbsp;</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">“Well you know,” I took a sip from my water bottle. “Don’t want to embarrass myself the next time I see Mr. Laborn.”</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">&nbsp;</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">He nodded at that. “The man knows his boxing, though he’s probably a good part of why guys vanish after their first class.”</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">&nbsp;</span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The gym gave a free training session with signup. Given how intense the coaches were I think that was a strategy to weed out anyone who wasn’t serious about this kind of thing. Doug was a good example of that, but Mr. Laborn was on a whole other level. “He around tonight?”</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;</span></p><p data-dcnode-id="686"><span data-dcnode-id="689" instrument_node="">“Na, doing something with his kids. You looking for a practice round?”</span><br data-dcnode-id="688"><br data-dcnode-id="687"></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">I emphatically shook my head. “Not even close to ready for that.”</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">&nbsp;</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">“Stick with it and you’ll get there.” He nodded contemplatively. “We don’t get too many guys from the college down here. You’re engineering, right?”</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">&nbsp;</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">I suppressed a wince. I had danced around my enrollment status when I filled out my application. Dropping out of college hadn’t been a smooth process and until recently I had still held out some hopes of finishing my degree.</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">&nbsp;</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">That was gone now.</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">&nbsp;</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">“Was engineering. College didn’t work out for me.”</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">&nbsp;</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">“Sorry to hear that, kid. What happened?”</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">&nbsp;</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">No one would ever accuse Doug of having an excess of tact. That said there was something about the guy that made him easy to talk to. There was a decent chance that no matter what I said he would tell me to suck it up and head back to school, but that was just his nature. There wasn’t real malice behind it.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">&nbsp;</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">He also wasn’t going to let this go without some kind of answer. “A bunch of stuff. College, well it looked better from the outside. Like, it’s supposed to be this fresh start where everything’s different, but you just run into the same problems as the rest of your life.”</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">&nbsp;</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">He snorted. “Problems never go away. They’re part of life. You just get to pick the window dressing.”</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">&nbsp;</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">That brought a weak grin to my face. “I guess. Things just kind of fell apart for me. Can’t really name a single thing that set it off.”</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">&nbsp;</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">“Uh-huh. Was it a girl?”</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">&nbsp;</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">“What?”</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&nbsp;</span></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">“With guys your age it’s usually a girl. Or there’s a girl somewhere in the equation. That what happened?”</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">&nbsp;</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">“No.” Doug’s expression said he didn’t believe it. I let out a slow breath. “Ok, I had a pretty bad relationship that fell apart spectacularly, but I didn’t drop out over that.”</span></p><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">&nbsp;</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">“It’s never only a girl, but I’ve seen dozens of guys your age trying to get their lives together. There’s always a girl in there somewhere.” He paused. “Or a guy, but they’re usually quieter about that.”</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">&nbsp;</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">I nodded. Colleges had a certain social mentality that didn’t exactly mesh with having super powered neo-Nazi’s running around. Brockton’s solution seemed to be dressing up everything with just enough deniability to avoid attracting attention.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">&nbsp;</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Doug was looking at me expectantly. I glanced around. No one was that close to us and his students were savoring the brief respite from his tutelage as a chance to catch their breath and desperately rehydrate.</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">&nbsp;</span></p><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">I hated talking about this. It wasn’t just that the entire relationship was cringeworthy in retrospect.&nbsp; What really got me was everyone looking at it and assuming that was where everything went wrong. They thought that the rest of my life was fine and I’d let it all fall apart over some girl. Still, Doug was legendarily bullheaded but not known for making snap judgements.</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">&nbsp;</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">“So I was in the engineering program. It was pretty small, like twenty five people. Mostly guys as well. Just three girls in our year.”</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">&nbsp;</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">“So you went after one of them?”</span></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">&nbsp;</span></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">“Not at first.” He gave me a look. “Ok, there was this girl who had transferred from math to engineering in sophomore year.”</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">&nbsp;</span></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">“Really. What was her name?”</span></p><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">&nbsp;</span></p><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">“Sabah.” Doug raised an eyebrow. “She was Iraqi. Really good at math but her English wasn’t perfect. That gave her some trouble with parts of the course work. I helped her out with that.”</span></p><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&nbsp;</span></p><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">“And one thing led to another?”</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">&nbsp;</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">“Not exactly. We spent a lot of time together but it never really went further. I suggested stuff but she was always really demure about it, like a whole bunch of non-answers and putting things off.”</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&nbsp;</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">“That was probably a hint.”</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">&nbsp;</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">That stung. “Yeah, I got that in hindsight.”</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">&nbsp;</span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">“So what happened?”</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">&nbsp;</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">“It wasn’t going well, but one of my friends convinced me to give it another try, just ask directly and put it behind me.”</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">&nbsp;</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">“Not bad advice.”</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">&nbsp;</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">I actually flinched at that. “Uh, so I tried and it went bad. She tore into me and we had words. It was public and messy and I figured that was it.”</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">&nbsp;</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">“I’m guessing there’s more?”</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">&nbsp;</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">I nodded. “I tried to avoid her after that, but six weeks later she comes to me, apologizes and says she had a bad day and wants to work together again.”</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">&nbsp;</span></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">“So what did you do?”</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">&nbsp;</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">“I tried to go back to the way things were, but it was really awkward. And she ended up transferring to the fashion program pretty soon after.”</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">&nbsp;</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">“Seriously?”</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">&nbsp;</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">I shrugged. “Everyone was surprised. She didn’t talk to anyone about it, she just left. I found out later she had lost her dad to a heart attack. I guess that’s the kind of thing that makes you reevaluate stuff.”</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">&nbsp;</span></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Doug nodded grimly.</span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">&nbsp;</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">“Look, it was a mess, but that’s not why I dropped out.”</span></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">&nbsp;</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">“Not saying it is, but that kind of thing usually contributes.” He looked around the gym. “I’m not going to give you some bullshit speech about how boxing is like life and how what you learn here will carry you through. Boxing is boxing and life is life. The only thing they have in common is they’re both hard, painful, and take a lot of work. College might not have worked for you, but you’re a bright kid and are willing to put in the hours. You’ll be fine.”</span></p><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">&nbsp;</span></p><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">“Thanks, I appreciate that.”</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">&nbsp;</span></p><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">“Don’t let it go to your head. Now I’ve got to get back to those slackers before they think this is some kind of holiday.”</span></p><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">&nbsp;</span></p><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">While Doug stomped off to terrorize his students I wrapped up my workout with a marathon of pushups, squats, and crunches. I figured if I buried myself in exercise I might be able to drown out the horrible feelings the conversation had dug up. It was basically the same principle that had gotten me into running. By the time I showered and slunk back to my apartment my body was burning but I had managed to put my college years mostly out of my mind. I threw together a cheap but high protein dinner, mostly beans really, before opening my workshop and crashing for the night.</span></p><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">&nbsp;</span></p><span data-dcnode-id="513" instrument_node="">

</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Jumpchain abilities this chapter:</span></p><p data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">Workshop (Personal Reality) 100:</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">Each purchase of this adds to your Personal Reality Workshop needed to perform specific type of craft, which is to be specified when purchase is made. It comes with a basic set of tools and supplies. Good for fixing or creating all sorts of things, although any complex parts or nonstandard supplies will have to be brought in from outside. Additional purchases can add different types of Workshops to your Personal Reality or expand existing ones. Anything built in one of those workshops is fiat backed to be restored to its original condition within 48 hours if damaged or destroyed.</span></p><p data-dcnode-id="491"><span data-dcnode-id="496" instrument_node="">Access Key (Personal Reality) Free:</span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">This is a special key which lets you access your Personal Reality and its contents.</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">When inserted into any lock on any door, the door opens to reveal a gateway into your Reality at a predetermined location within it. You are the only person who can take the key from the lock, the gateway remains open as long as the key is in the lock, and if key is ever lost or stolen you will find it in your pocket a few minutes later. You cannot close the door as long as you are inside the Personal Reality.</span></p><p data-dcnode-id="487"><span data-dcnode-id="490" instrument_node="">Entrance Hall (Personal Reality) Free:</span><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node="">This is the room your Access Key opens a door to. It starts off as a 5 meter cube with blank white walls, floor, and ceiling, as some doors, one leading to the current Host Reality, the other into your Cosmic Warehouse, with additional doors leading to other extensions as these get added to your Personal Reality. Feel free to customize this Entrance Hall as you see fit. Additional Halls can, at your discretion, be linked only to certain keys or only to certain extensions. This allows you to have an entry hall just for skiing if you want.</span></p><span data-dcnode-id="486" instrument_node="">
</span></blockquote><span data-dcnode-id="484" instrument_node="">
