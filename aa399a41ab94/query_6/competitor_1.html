</span><div data-dcnode-id="2628" itemprop="image" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="2635" instrument_node="">
</span><meta content="https://cdn.mos.cms.futurecdn.net/v5n22xGyNNHLzSnSArbrVH.jpg" data-dcnode-id="2634" itemprop="url"><span data-dcnode-id="2633" instrument_node="">

</span></div><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2626" instrument_node="">The solar system is a collection of planets, moons, asteroids, comets, dust and gas that orbit our local star, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2623" data-url="https://www.space.com/58-the-sun-formation-facts-and-characteristics.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/58-the-sun-formation-facts-and-characteristics.html"><u data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">the sun</span></u></a><span data-dcnode-id="2622" instrument_node="">. It includes the rocky inner planets Mercury, Venus, Earth and Mars; the gas giants Jupiter and Saturn; and the ice giants Uranus and Neptune.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2620" id="ad-unit-1"></div><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Between Mars and Jupiter is a collection of asteroids known as the asteroid belt, while beyond Neptune is where small icy bodies, like Pluto and comets, live.</span></p><h3 class="article-body__section" data-dcnode-id="2615" id="section-how-old-is-our-solar-system"><span data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">How old is our solar system?</span></span></h3><aside class="hawk-nest hawk-processed" data-dcnode-id="2614" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="1302434985839238000" data-widget-type="seasonal"></aside><p data-dcnode-id="2602"><span data-dcnode-id="2613" instrument_node="">About 4.6 billion years ago, a giant cloud of dust and gas known as the solar nebula collapsed in on itself and began to form what would eventually become the solar system's sun and planets. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2611" data-url="https://www.space.com/42636-meteorites.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/42636-meteorites.html"><span data-dcnode-id="2612" instrument_node="">Meteorites</span></a><span data-dcnode-id="2610" instrument_node="">, or pieces of space rock that have fallen to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/earth.html"><span data-dcnode-id="2609" instrument_node="">Earth</span></a><span data-dcnode-id="2607" instrument_node="">, have helped scientists figure out the age of the solar system. Some of these small pieces have broken off of moons or planets and can yield interesting scientific information about the chemistry and history of their home body. Others have been traveling around the solar system since its beginning, before the planets even existed. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/15445-fallen-stars-gallery-famous-meteorites.html"><u data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Allende meteorite</span></u></a><span data-dcnode-id="2603" instrument_node="">, which fell to Earth in 1969 and scattered over Mexico, is the oldest known meteorite, at 4.55 billion years old.</span></p><div class="in-article ad-unit" data-dcnode-id="2554" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2555" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2556"><div data-dcnode-id="2557"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2558" id="trc_wrapper_18315" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2585" id="trc_header_18315" </div></div><div class="jwplayer__widthsetter" data-dcnode-id="2536"><div class="jwplayer__wrapper" data-dcnode-id="2537"><div class="future__jwplayer" data-dcnode-id="2538" id="futr_botr_PAEXLiW8_pBYGc5Ws_div"><div class="jw-error jw-reset" data-dcnode-id="2539" id="botr_PAEXLiW8_pBYGc5Ws_div" style="width: 100%; height: 270px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2540"><div class="jw-icon jw-reset" data-dcnode-id="2546"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2547" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2548"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2541"><div class="jw-error-text jw-reset-text" data-dcnode-id="2542" data-nosnippet="" dir="auto"><span data-dcnode-id="2545" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2544"></span><span data-dcnode-id="2543" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h3 class="article-body__section" data-dcnode-id="2533" id="section-how-did-our-solar-system-form"><span data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">How did our solar system form?</span></span></h3><p data-dcnode-id="2523"><span data-dcnode-id="2532" instrument_node="">Scientists think the solar system formed when a nearby exploding star, called a supernova, triggered the collapse of the solar nebula. According to this theory, the explosion sent shock waves through space, and those shock waves pushed parts of the nebula closer together, leading to collapse. The supernova may have </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/65411-neutron-star-collision-rains-bling-on-solar-system.html"><u data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">even seeded material into the nebula</span></u></a><span data-dcnode-id="2528" instrument_node="">, Live Science previously reported. For instance, scientists have found that aluminum-26, an element formed only in the hearts of stars, most likely originated from a series of nearby supernovas, Live Science sister site </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2525" data-url="https://www.space.com/supernovas-seed-solar-system-planets-ophiuchus-aluminum" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/supernovas-seed-solar-system-planets-ophiuchus-aluminum" target="_blank"><u data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Space.com reported</span></u></a><span data-dcnode-id="2524" instrument_node="">.</span></p><h3 class="article-body__section" data-dcnode-id="2520" id="section-the-sun"><span data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">The sun</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2504" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2505"><div class="image-full-width-wrapper" data-dcnode-id="2511"><div class="image-widthsetter" data-dcnode-id="2512" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2513" style="padding-top:56.25%;"><picture data-dcnode-id="2514"><source alt="An image of a massive solar flare (or coronal mass ejection) erupting out of the sun in 2017." class="expandable lazy-image-van optional-image" data-dcnode-id="2519" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="An image of a massive solar flare (or coronal mass ejection) erupting out of the sun in 2017." class="expandable lazy-image-van optional-image" data-dcnode-id="2518" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2515"><img alt="An image of a massive solar flare (or coronal mass ejection) erupting out of the sun in 2017." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2517" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/UKhUmF58wykRps8U7tTgtE-970-80.jpeg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2516"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2506" itemprop="caption description"><span class="caption-text" data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">An image of a massive solar flare (or coronal mass ejection) erupting out of the sun in 2017.&nbsp; </span></span><span class="credit" data-dcnode-id="2507" itemprop="copyrightHolder"><span data-dcnode-id="2508" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><p data-dcnode-id="2479"><span data-dcnode-id="2503" instrument_node="">The sun is at the center of the solar system and is its largest object, accounting for approximately 99.8% of the solar system's mass, according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2500" data-url="http://earthguide.ucsd.edu/virtualmuseum/ita/08_1.shtml" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//earthguide.ucsd.edu/virtualmuseum/ita/08_1.shtml" target="_blank"><u data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">University of California, San Diego</span></u></a><span data-dcnode-id="2499" instrument_node="">. The sun is a giant, raging ball of fire powered by nuclear reactions, and it provides the energy that sustains life on Earth. The yellow dwarf star is made up of gas — about 91% </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/28466-hydrogen.html"><u data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">hydrogen</span></u></a><span data-dcnode-id="2495" instrument_node=""> and 8.9% </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/28552-facts-about-helium.html"><u data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">helium</span></u></a><span data-dcnode-id="2491" instrument_node="">, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2488" data-url="https://mobile.arc.nasa.gov/public/iexplore/missions/pages/solarsystem/sun.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mobile.arc.nasa.gov/public/iexplore/missions/pages/solarsystem/sun.html"><u data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">NASA</span></u></a><span data-dcnode-id="2487" instrument_node="">. Compared with other stars, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2485" data-url="https://www.space.com/17001-how-big-is-the-sun-size-of-the-sun.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17001-how-big-is-the-sun-size-of-the-sun.html"><span data-dcnode-id="2486" instrument_node="">sun</span></a><span data-dcnode-id="2484" instrument_node=""> is relatively small and just one of hundreds of billions of stars in our home galaxy, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/milky-way.html"><u data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">the Milky Way</span></u></a><span data-dcnode-id="2480" instrument_node="">.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2478" id="ad-unit-2"></div><p data-dcnode-id="2472"><span data-dcnode-id="2477" instrument_node="">The sun is about 26,000 light-years from the center of our galaxy, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2474" data-url="https://imagine.gsfc.nasa.gov/features/cosmic/milkyway_info.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.gsfc.nasa.gov/features/cosmic/milkyway_info.html" target="_blank"><u data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2473" instrument_node="">. The Milky Way is a spiral galaxy, with curved arms of stars emanating from its center. The solar system is located in one of the smaller arms, called the Orion-Cygnus Arm, or simply the Orion Arm.</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2471" instrument_node="">The Milky Way is huge compared with the solar system. If the solar system were the size of your hand, the Milky Way would be as big as North America, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2469" data-url="https://nightsky.jpl.nasa.gov/news-display.cfm?News_ID=573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nightsky.jpl.nasa.gov/news-display.cfm%3FNews_ID%3D573" target="_blank"><span data-dcnode-id="2470" instrument_node="">NASA Jet Propulsion Laboratory's Night Sky Network</span></a><span data-dcnode-id="2468" instrument_node="">.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="2464" id="section-our-solar-system-s-planets"><span data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Our solar system's planets</span></span></h3><p data-dcnode-id="2455"><span data-dcnode-id="2463" instrument_node="">Eight confirmed planets and many </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2461" data-url="https://www.space.com/15216-dwarf-planets-facts-solar-system-sdcmp.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15216-dwarf-planets-facts-solar-system-sdcmp.html" target="_blank"><span data-dcnode-id="2462" instrument_node="">dwarf planets</span></a><span data-dcnode-id="2460" instrument_node=""> orbit the sun. According to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2457" data-url="https://solarsystem.nasa.gov/solar-system/our-solar-system/in-depth/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/solar-system/our-solar-system/in-depth/" target="_blank"><u data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">NASA</span></u></a><span data-dcnode-id="2456" instrument_node="">, "the order and arrangement of the planets and other bodies in our solar system is due to the way the solar system formed." Rocky materials could withstand the young sun's immense heat, so the first four planets — Mercury, Venus, Earth and Mars — are small, with rocky surfaces. Beyond them, "materials we are used to seeing as ice, liquid or gas settled in the outer regions of the young solar system," NASA says, namely the gas giants Jupiter and Saturn and the ice giants Uranus and Neptune.</span></p><h2 data-dcnode-id="2453" id="mercury"><span data-dcnode-id="2454" instrument_node="">Mercury</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2437" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2438"><div class="image-full-width-wrapper" data-dcnode-id="2444"><div class="image-widthsetter" data-dcnode-id="2445" style="max-width:1514px;"><p class="vanilla-image-block" data-dcnode-id="2446" style="padding-top:56.80%;"><picture data-dcnode-id="2447"><source alt="Mercury transits the sun on Nov. 11, 2019." class="expandable lazy-image-van optional-image" data-dcnode-id="2452" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-srcset="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-970-80.png.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Mercury transits the sun on Nov. 11, 2019." class="expandable lazy-image-van optional-image" data-dcnode-id="2451" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-srcset="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-970-80.png 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/png"></picture></p><figure class="expandable-image" data-dcnode-id="2448"><img alt="Mercury transits the sun on Nov. 11, 2019." class="expandable lazy-image-van optional-image error" data-dcnode-id="2450" data-ll-status="error" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK.png" data-srcset="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-970-80.png 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/K4SBUWMGPNjCQtMvCpe7KK-970-80.png 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2449"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2439" itemprop="caption description"><span class="caption-text" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Mercury transits the sun on Nov. 11, 2019. </span></span><span class="credit" data-dcnode-id="2440" itemprop="copyrightHolder"><span data-dcnode-id="2441" instrument_node="">(Image credit: NASA/SDO/HMI/AIA)</span></span></figcaption></figure></a><p data-dcnode-id="2433"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2435" data-url="https://www.space.com/36-mercury-the-suns-closest-planetary-neighbor.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/36-mercury-the-suns-closest-planetary-neighbor.html" target="_blank"><span data-dcnode-id="2436" instrument_node="">Mercury</span></a><span data-dcnode-id="2434" instrument_node=""> is the closest planet to the sun. It is also the smallest planet in the solar system; at about 3,032 miles (4,879 kilometers) in diameter, it is only slightly larger than Earth's moon and has no moons of its own. Mercury has no atmosphere to protect it from the sun's relentless radiation, and surface temperatures can reach highs of 800 degrees Fahrenheit (427 degrees Celsius) during the day and plummet as low as minus 290 F (minus 179 C) at night. Because of its speedy rotation around the sun, Mercury was named after the Roman messenger of the gods.</span></p><h2 data-dcnode-id="2431" id="venus"><span data-dcnode-id="2432" instrument_node="">Venus</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2415" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2416"><div class="image-full-width-wrapper" data-dcnode-id="2422"><div class="image-widthsetter" data-dcnode-id="2423" style="max-width:2048px;"><p class="vanilla-image-block" data-dcnode-id="2424" style="padding-top:56.20%;"><picture data-dcnode-id="2425"><source alt="A NASA illustration shows the Pioneer-13 probes descending toward the clouds of Venus." class="expandable lazy-image-van optional-image" data-dcnode-id="2430" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="A NASA illustration shows the Pioneer-13 probes descending toward the clouds of Venus." class="expandable lazy-image-van optional-image" data-dcnode-id="2429" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2426"><img alt="A NASA illustration shows the Pioneer-13 probes descending toward the clouds of Venus." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2428" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/CBuXDRWVw3W9rbnkU8Zd8G-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2427"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2417" itemprop="caption description"><span class="caption-text" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">A NASA illustration shows the Pioneer-13 probes descending toward the clouds of Venus. </span></span><span class="credit" data-dcnode-id="2418" itemprop="copyrightHolder"><span data-dcnode-id="2419" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><p data-dcnode-id="2405"><span data-dcnode-id="2414" instrument_node="">Named after the Roman goddess of love, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2411" data-url="https://www.space.com/44-venus-second-planet-from-the-sun-brightest-planet-in-solar-system.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/44-venus-second-planet-from-the-sun-brightest-planet-in-solar-system.html" target="_blank"><u data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Venus</span></u></a><span data-dcnode-id="2410" instrument_node=""> is the second planet from the sun and the hottest planet in the solar system. Its atmosphere is a thick layer of mostly carbon dioxide gas that traps heat, allowing the planet's surface temperatures to reach a scorching 880 F (471 C). At 7,520 miles (12,100 km) in diameter, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2407" data-url="https://solarsystem.nasa.gov/planets/venus/in-depth/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/planets/venus/in-depth/" target="_blank"><u data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2406" instrument_node="">, Venus is slightly smaller than Earth and, like our planet, has a core of molten iron.&nbsp;</span></p><p data-dcnode-id="2399"><span data-dcnode-id="2404" instrument_node="">In 2020, astronomers announced that they'd discovered phosphine in the atmosphere of Venus. On our planet, this chemical is almost always made by living creatures, leading some researchers to wonder if Venus' clouds might host life. However, the findings are controversial and have yet to be fully confirmed; indeed, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/venus-clouds-life-not-enough-water.html"><u data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">other work has suggested</span></u></a><span data-dcnode-id="2400" instrument_node=""> that it would be too difficult for any creatures to survive in such a hellish place because of the lack of much liquid water.&nbsp;</span></p><h2 data-dcnode-id="2397" id="earth"><span data-dcnode-id="2398" instrument_node="">Earth</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2381" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2382"><div class="image-full-width-wrapper" data-dcnode-id="2388"><div class="image-widthsetter" data-dcnode-id="2389" style="max-width:2800px;"><p class="vanilla-image-block" data-dcnode-id="2390" style="padding-top:56.25%;"><picture data-dcnode-id="2391"><source alt="This image shows how sunlight fell on Earth during the winter solstice on Dec. 21, 2010." class="expandable lazy-image-van optional-image" data-dcnode-id="2396" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="This image shows how sunlight fell on Earth during the winter solstice on Dec. 21, 2010." class="expandable lazy-image-van optional-image" data-dcnode-id="2395" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2392"><img alt="This image shows how sunlight fell on Earth during the winter solstice on Dec. 21, 2010." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2394" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/TcJrPJDVMXWTzsVbpisVNB-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2393"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2383" itemprop="caption description"><span class="caption-text" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">This image shows how sunlight fell on Earth during the winter solstice on Dec. 21, 2010. </span></span><span class="credit" data-dcnode-id="2384" itemprop="copyrightHolder"><span data-dcnode-id="2385" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><p data-dcnode-id="2372"><span data-dcnode-id="2380" instrument_node="">The third rock from the sun, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/earth.html"><span data-dcnode-id="2379" instrument_node="">Earth</span></a><span data-dcnode-id="2377" instrument_node=""> is the only planet in the universe known to harbor life. Its habitability is linked to the presence of liquid water. Earth is located in the so-called Goldilocks zone, meaning it orbits at the ideal distance from the sun to have liquid water; if it were any closer, the water would evaporate into a gas, and if Earth were farther away, the water would freeze. About 71% of our planet's surface is covered in water, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2374" data-url="https://www.usgs.gov/special-topics/water-science-school/science/how-much-water-there-earth" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usgs.gov/special-topics/water-science-school/science/how-much-water-there-earth" target="_blank"><u data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">according to the U.S. Geological Survey</span></u></a><span data-dcnode-id="2373" instrument_node="">, and Earth's atmosphere protects the planet from solar radiation.&nbsp;</span></p><p data-dcnode-id="2363"><span data-dcnode-id="2371" instrument_node="">Earth is the only planet not named after a god. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/32274-how-did-earth-get-its-name.html"><span data-dcnode-id="2370" instrument_node="">Earth likely earned its name</span></a><span data-dcnode-id="2368" instrument_node=""> from the English and German words for "ground." The blue planet is the largest of the four rocky planets in the solar system, and it has one </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/earths-moon.html"><u data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">moon</span></u></a><span data-dcnode-id="2364" instrument_node="">. Scientists think Earth's moon was formed from a piece of Earth that broke off when a giant object smashed into the young planet.</span></p><h2 data-dcnode-id="2361" id="mars"><span data-dcnode-id="2362" instrument_node="">Mars</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2347" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2348"><div class="image-full-width-wrapper" data-dcnode-id="2352"><div class="image-widthsetter" data-dcnode-id="2353" style="max-width:1280px;"><p class="vanilla-image-block" data-dcnode-id="2354" style="padding-top:56.25%;"><picture data-dcnode-id="2355"><source alt="An Illustration of Mars" class="expandable lazy-image-van optional-image" data-dcnode-id="2360" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="An Illustration of Mars" class="expandable lazy-image-van optional-image" data-dcnode-id="2359" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2356"><img alt="An Illustration of Mars" class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2358" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/RdpZSgkQNJK8WS58P9wBik-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2357"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2349" itemprop="caption description"><span class="credit" data-dcnode-id="2350" itemprop="copyrightHolder"><span data-dcnode-id="2351" instrument_node="">(Image credit: NASA/JPL-Caltech)</span></span></figcaption></figure></a><p data-dcnode-id="2343"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2345" data-url="https://www.space.com/47-mars-the-red-planet-fourth-planet-from-the-sun.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/47-mars-the-red-planet-fourth-planet-from-the-sun.html" target="_blank"><span data-dcnode-id="2346" instrument_node="">Mars</span></a><span data-dcnode-id="2344" instrument_node=""> is known as the Red Planet because of the iron-rich dust that covers its surface and gives it a rusty color. This red hue led the ancient Romans to name Mars after their god of war.&nbsp;</span></p><p data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">Mars, the fourth planet from the sun, is home to the largest volcano in the solar system, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2340" data-url="https://www.space.com/20133-olympus-mons-giant-mountain-of-mars.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20133-olympus-mons-giant-mountain-of-mars.html" target="_blank"><span data-dcnode-id="2341" instrument_node="">Olympus Mons</span></a><span data-dcnode-id="2339" instrument_node="">. The planet has a thin atmosphere, and without a thick protective shield, temperatures on Mars average around minus 80 F (minus 60 C).&nbsp;</span></p><p data-dcnode-id="2328"><span data-dcnode-id="2337" instrument_node="">It is likely that liquid water — which would provide a home for life as we know it — existed on the Martian surface billions of years ago, and some scientists think </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/is-there-water-on-mars"><u data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Mars may still have liquid water</span></u></a><span data-dcnode-id="2333" instrument_node=""> on its surface today. Mars has two moons: Phobos, which may have </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/martian-moon-deimos-lopsided-orbit-rings.html"><u data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">formed from ancient rings</span></u></a><span data-dcnode-id="2329" instrument_node=""> around the planet, and Deimos, which may have been knocked into its current orbit by an ancient, no-longer-existing moon.</span></p><h2 data-dcnode-id="2326" id="jupiter"><span data-dcnode-id="2327" instrument_node="">Jupiter</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2310" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2311"><div class="image-full-width-wrapper" data-dcnode-id="2317"><div class="image-widthsetter" data-dcnode-id="2318" style="max-width:3940px;"><p class="vanilla-image-block" data-dcnode-id="2319" style="padding-top:56.24%;"><picture data-dcnode-id="2320"><source alt="This NASA Hubble Space Telescope image shows auroras above the poles of Jupiter." class="expandable lazy-image-van optional-image" data-dcnode-id="2325" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="This NASA Hubble Space Telescope image shows auroras above the poles of Jupiter." class="expandable lazy-image-van optional-image" data-dcnode-id="2324" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2321"><img alt="This NASA Hubble Space Telescope image shows auroras above the poles of Jupiter." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2323" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/vXBSGJhzwAbEqEqLpJoahk-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2322"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2312" itemprop="caption description"><span class="caption-text" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">This NASA Hubble Space Telescope image shows auroras above the poles of Jupiter. </span></span><span class="credit" data-dcnode-id="2313" itemprop="copyrightHolder"><span data-dcnode-id="2314" instrument_node="">(Image credit: NASA, ESA, and J. Nichols (University of Leicester))</span></span></figcaption></figure></a><p data-dcnode-id="2306"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2308" data-url="https://www.space.com/7-jupiter-largest-planet-solar-system.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/7-jupiter-largest-planet-solar-system.html" target="_blank"><span data-dcnode-id="2309" instrument_node="">Jupiter</span></a><span data-dcnode-id="2307" instrument_node=""> is the biggest planet in the solar system. Unlike the inner planets, Jupiter is a gas giant, made up mainly of helium and hydrogen. It is named after the king of the Roman gods (also known as Zeus in the Greek pantheon).&nbsp;</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2305" instrument_node="">Jupiter, the fifth planet from the sun, is twice as big as all of the other planets in the solar system combined, yet it also has the shortest day of any planet, taking 10 hours to turn about its axis, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2302" data-url="https://solarsystem.nasa.gov/planets/jupiter/in-depth/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/planets/jupiter/in-depth/" target="_blank"><u data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2301" instrument_node="">. Jupiter is surrounded by dozens of moons, and its rings are faint and composed of dust. Deep in the planet's atmosphere, high pressure and high temperatures have compressed the hydrogen gas into a liquid, creating the largest ocean in the solar system, according to NASA.</span></p><h2 data-dcnode-id="2298" id="saturn"><span data-dcnode-id="2299" instrument_node="">Saturn</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2284" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2285"><div class="image-full-width-wrapper" data-dcnode-id="2289"><div class="image-widthsetter" data-dcnode-id="2290" style="max-width:1280px;"><p class="vanilla-image-block" data-dcnode-id="2291" style="padding-top:56.25%;"><picture data-dcnode-id="2292"><source alt="Saturn, black background" class="expandable lazy-image-van optional-image" data-dcnode-id="2297" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Saturn, black background" class="expandable lazy-image-van optional-image" data-dcnode-id="2296" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2293"><img alt="Saturn, black background" class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2295" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/VwX4MZkoQc3NRU7mxVMyx6-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2294"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2286" itemprop="caption description"><span class="credit" data-dcnode-id="2287" itemprop="copyrightHolder"><span data-dcnode-id="2288" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><p data-dcnode-id="2269"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2282" data-url="https://www.space.com/48-saturn-the-solar-systems-major-ring-bearer.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/48-saturn-the-solar-systems-major-ring-bearer.html" target="_blank"><span data-dcnode-id="2283" instrument_node="">Saturn</span></a><span data-dcnode-id="2281" instrument_node="">, the sixth planet from the sun, is the second-largest planet in the solar system. Saturn is best known for its prominent rings. Like Jupiter, Saturn is a gas giant composed of helium and hydrogen, and it is the least dense of the planets. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/saturns-rings"><u data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Saturn's rings are made of</span></u></a><span data-dcnode-id="2277" instrument_node=""> billions of ice particles and rocks. The ringed planet also has dozens of moons, ranging in size from that of a sports field to the size of Mercury, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2274" data-url="https://solarsystem.nasa.gov/moons/saturn-moons/overview/?page=0&amp;per_page=40&amp;order=name+asc&amp;search=&amp;placeholder=Enter+moon+name&amp;condition_1=38%3Aparent_id&amp;condition_2=moon%3Abody_type%3Ailike" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/moons/saturn-moons/overview/%3Fpage%3D0%26per_page%3D40%26order%3Dname%2Basc%26search%3D%26placeholder%3DEnter%2Bmoon%2Bname%26condition_1%3D38%253Aparent_id%26condition_2%3Dmoon%253Abody_type%253Ailike" target="_blank"><u data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2273" instrument_node="">. One of Saturn's moons, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2271" data-url="https://www.space.com/alien-life-ocean-moons-europa-enceladus.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/alien-life-ocean-moons-europa-enceladus.html" target="_blank"><span data-dcnode-id="2272" instrument_node="">Enceladus</span></a><span data-dcnode-id="2270" instrument_node="">, is covered in an icy ocean that astronomers say makes this moon a promising candidate for extraterrestrial life.</span></p><h2 data-dcnode-id="2267" id="uranus"><span data-dcnode-id="2268" instrument_node="">Uranus</span></h2><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2253" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2254"><div class="image-full-width-wrapper" data-dcnode-id="2258"><div class="image-widthsetter" data-dcnode-id="2259" style="max-width:1041px;"><p class="vanilla-image-block" data-dcnode-id="2260" style="padding-top:76.37%;"><picture data-dcnode-id="2261"><source alt="The blue body of Uranus glows (pin) with X-rays" class="expandable lazy-image-van optional-image" data-dcnode-id="2266" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The blue body of Uranus glows (pin) with X-rays" class="expandable lazy-image-van optional-image" data-dcnode-id="2265" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2262"><img alt="The blue body of Uranus glows (pin) with X-rays" class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2264" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/fCRJ2zUQziEDivFzpu9m5P-970-80.jpeg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2263"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2255" itemprop="caption description"><span class="credit" data-dcnode-id="2256" itemprop="copyrightHolder"><span data-dcnode-id="2257" instrument_node="">(Image credit: NASA/CXO/University College London/W. Dunn et al)</span></span></figcaption></figure></a><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Uranus, the seventh planet from the sun, was the first planet to be discovered using a telescope, by British astronomer William Herschel in 1781. The ice giant is composed of heavier elements than its gas giant neighbors — a mixture of water, methane and ammonia ice.&nbsp;</span></p><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Unlike other planets in the solar system, Uranus effectively orbits on its side (with its axis almost pointing toward the sun), and it "rolls" like a ball as it travels around the sun. Methane gas in Uranus' atmosphere makes the planet appear green-blue. The planet has 13 rings and 27 moons. It is the only planet to be named after a Greek deity, Ouranos the sky god, rather than a Roman one.&nbsp;</span></p><h2 data-dcnode-id="2247" id="neptune"><span data-dcnode-id="2248" instrument_node="">Neptune</span></h2><p data-dcnode-id="2242"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2244" data-url="https://www.space.com/41-neptune-the-other-blue-planet-in-our-solar-system.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/41-neptune-the-other-blue-planet-in-our-solar-system.html" target="_blank"><u data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Neptune</span></u></a><span data-dcnode-id="2243" instrument_node="">, the eighth planet from the sun, was discovered in 1846. However, even before observing the planet for the first time, scientists predicted its existence, because of its effect on Uranus' orbit.&nbsp;</span></p><p data-dcnode-id="2229"><span data-dcnode-id="2241" instrument_node="">Neptune, which is named after the Roman sea god, is so far from the sun that it takes 4.15 hours for sunlight to reach the planet, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2238" data-url="http://curious.astro.cornell.edu/about-us/49-our-solar-system/the-sun/general-questions/197-how-long-does-it-take-for-the-sun-s-light-to-reach-us-beginner" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//curious.astro.cornell.edu/about-us/49-our-solar-system/the-sun/general-questions/197-how-long-does-it-take-for-the-sun-s-light-to-reach-us-beginner" target="_blank"><u data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Cornell University</span></u></a><span data-dcnode-id="2237" instrument_node="">. (For comparison, it takes about </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2235" data-url="https://image.gsfc.nasa.gov/poetry/venus/q89.html#:~:text=How%20fast%20does%20light%20travel,distance%20called%201%20Astronomical%20Unit." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.gsfc.nasa.gov/poetry/venus/q89.html%23%3A~%3Atext%3DHow%2520fast%2520does%2520light%2520travel%2Cdistance%2520called%25201%2520Astronomical%2520Unit." target="_blank"><span data-dcnode-id="2236" instrument_node="">eight minutes</span></a><span data-dcnode-id="2234" instrument_node=""> for sunlight to reach Earth.) When the light arrives at Neptune, it is 900 times dimmer than what we see on Earth, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2231" data-url="https://www.nasa.gov/audience/foreducators/9-12/features/F_How_Far_How_Faint.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/audience/foreducators/9-12/features/F_How_Far_How_Faint.html" target="_blank"><u data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2230" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node="">Neptune is made up of water, methane and ammonia surrounding a small, rocky core. Strong winds on the planet propel clouds of frozen methane at speeds of up to 1,200 mph (2,000 km/h). Neptune has 14 known moons, one of which was rediscovered after </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2226" data-url="https://www.space.com/23113-neptune-lost-moon-naiad-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/23113-neptune-lost-moon-naiad-photos.html" target="_blank"><span data-dcnode-id="2227" instrument_node="">going missing</span></a><span data-dcnode-id="2225" instrument_node=""> for 20 years.</span></p><h3 class="article-body__section" data-dcnode-id="2221" id="section-why-is-pluto-not-a-planet"><span data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Why is Pluto not a planet?</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2205" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2206"><div class="image-full-width-wrapper" data-dcnode-id="2212"><div class="image-widthsetter" data-dcnode-id="2213" style="max-width:2400px;"><p class="vanilla-image-block" data-dcnode-id="2214" style="padding-top:56.25%;"><picture data-dcnode-id="2215"><source alt="NASA’s New Horizons spacecraft took this enhanced color image of Pluto on July 14, 2015." class="expandable lazy-image-van optional-image" data-dcnode-id="2220" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="NASA’s New Horizons spacecraft took this enhanced color image of Pluto on July 14, 2015." class="expandable lazy-image-van optional-image" data-dcnode-id="2219" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2216"><img alt="NASA’s New Horizons spacecraft took this enhanced color image of Pluto on July 14, 2015." class="expandable lazy-image-van optional-image" data-dcnode-id="2218" data-ll-status="native" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ay6ycXYTmhxfD2Jad9E8Kf-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2217"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2207" itemprop="caption description"><span class="caption-text" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">NASA’s New Horizons spacecraft took this enhanced color image of Pluto on July 14, 2015. </span></span><span class="credit" data-dcnode-id="2208" itemprop="copyrightHolder"><span data-dcnode-id="2209" instrument_node="">(Image credit: NASA/JHUAPL/SwRI)</span></span></figcaption></figure></a><p data-dcnode-id="2196"><span data-dcnode-id="2204" instrument_node="">Pluto, once considered the ninth planet in the solar system, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2201" data-url="https://www.space.com/why-pluto-is-not-a-planet.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/why-pluto-is-not-a-planet.html" target="_blank"><u data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">was reclassified as a dwarf planet in 2006</span></u></a><span data-dcnode-id="2200" instrument_node=""> because it failed to meet one of the criteria in the definition of a planet. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2198" data-url="https://www.iau.org/news/pressreleases/detail/iau0603/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iau.org/news/pressreleases/detail/iau0603/" target="_blank"><span data-dcnode-id="2199" instrument_node="">International Astronomical Union</span></a><span data-dcnode-id="2197" instrument_node=""> defines a planet as a celestial body that orbits the sun, has enough gravity to pull itself into a round or almost-round shape, and has cleared the neighborhood around its orbit. Pluto has not cleared the neighborhood around its orbit, so it's not considered a planet.</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2195" instrument_node="">Some astronomers believe this reclassification is </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2193" data-url="https://www.space.com/pluto-still-a-planet-nasa-chief-says.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/pluto-still-a-planet-nasa-chief-says.html" target="_blank"><span data-dcnode-id="2194" instrument_node="">unfair</span></a><span data-dcnode-id="2192" instrument_node=""> and that Pluto should be reinstated as the ninth planet in the solar system. Looking at the historical literature, Philip Metzger, a planetary scientist at the University of Central Florida, found that before the 2006 decision the "clearing the neighborhood" rule appeared only in a single 1801 paper. He and his colleagues concluded that this Pluto-excluding rule is "arbitrary and not based on historical precedent," </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/63716-pluto-earth-moon-are-planets.html"><u data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Live Science previously reported</span></u></a><span data-dcnode-id="2188" instrument_node="">, and that therefore Pluto should still be considered a planet.&nbsp;</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Pluto, which is named after the Roman god of the underworld, sits in the vast Kuiper Belt, a region beyond Neptune that contains trillions of icy objects.&nbsp;</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2169"><div class="jwplayer__wrapper" data-dcnode-id="2170"><div class="future__jwplayer" data-dcnode-id="2171" id="futr_botr_bZNVH9gM_pBYGc5Ws_div"><div class="jw-error jw-reset" data-dcnode-id="2172" id="botr_bZNVH9gM_pBYGc5Ws_div" style="width: 100%; height: 270px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2173"><div class="jw-icon jw-reset" data-dcnode-id="2179"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2180" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2181"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2174"><div class="jw-error-text jw-reset-text" data-dcnode-id="2175" data-nosnippet="" dir="auto"><span data-dcnode-id="2178" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2177"></span><span data-dcnode-id="2176" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h3 class="article-body__section" data-dcnode-id="2166" id="section-planet-x"><span data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Planet X</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2150" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2151"><div class="image-full-width-wrapper" data-dcnode-id="2157"><div class="image-widthsetter" data-dcnode-id="2158" style="max-width:1400px;"><p class="vanilla-image-block" data-dcnode-id="2159" style="padding-top:59.57%;"><picture data-dcnode-id="2160"><source alt="An illustration shows what Planet 9 might look like orbiting far from our sun. Now, at least two physicists think this picture is wrong and it's actually a black hole." class="expandable lazy-image-van optional-image" data-dcnode-id="2165" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="An illustration shows what Planet 9 might look like orbiting far from our sun. Now, at least two physicists think this picture is wrong and it's actually a black hole." class="expandable lazy-image-van optional-image" data-dcnode-id="2164" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2161"><img alt="An illustration shows what Planet 9 might look like orbiting far from our sun. Now, at least two physicists think this picture is wrong and it's actually a black hole." class="expandable lazy-image-van optional-image" data-dcnode-id="2163" data-ll-status="native" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/fZaXPG42HZEZ3jbkBGKttk-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2162"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2152" itemprop="caption description"><span class="caption-text" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">An illustration shows what Planet 9 might look like orbiting far from our sun. </span></span><span class="credit" data-dcnode-id="2153" itemprop="copyrightHolder"><span data-dcnode-id="2154" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><p data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">There is a possible candidate to fill Pluto's vacancy as the ninth planet: Planet X, or Planet Nine. In </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2147" data-url="https://iopscience.iop.org/article/10.3847/0004-6256/151/2/22" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iopscience.iop.org/article/10.3847/0004-6256/151/2/22" target="_blank"><span data-dcnode-id="2148" instrument_node="">a 2016 paper published </span></a><span data-dcnode-id="2146" instrument_node="">i
