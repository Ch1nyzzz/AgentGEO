n The Astronomical Journal, California Institute of Technology astronomers Mike Brown and Konstantin Batygin hypothesized that a planet 10 times larger than Earth could be orbiting the sun about 20 times farther away than Neptune does.&nbsp;</span></p><p data-dcnode-id="2140"><span data-dcnode-id="2144" instrument_node="">"All those people who are mad that Pluto is no longer a planet can be thrilled to know that there is a real planet out there still to be found," Brown </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2142" data-url="https://www.space.com/31670-planet-nine-solar-system-discovery.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/31670-planet-nine-solar-system-discovery.html" target="_blank"><span data-dcnode-id="2143" instrument_node="">said at the time</span></a><span data-dcnode-id="2141" instrument_node="">. "Now, we can go and find this planet and make the solar system have nine planets once again."&nbsp;</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2139" instrument_node="">However, Planet Nine's existence is still theoretical, because the planet has not been directly observed, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2136" data-url="https://solarsystem.nasa.gov/planets/hypothetical-planet-x/in-depth/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/planets/hypothetical-planet-x/in-depth/" target="_blank"><u data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2135" instrument_node="">.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2118"><div class="jwplayer__wrapper" data-dcnode-id="2119"><div class="future__jwplayer" data-dcnode-id="2120" id="futr_botr_AiDOjVxN_pBYGc5Ws_div"><div class="jw-error jw-reset" data-dcnode-id="2121" id="botr_AiDOjVxN_pBYGc5Ws_div" style="width: 100%; height: 270px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2122"><div class="jw-icon jw-reset" data-dcnode-id="2128"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2129" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2130"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2123"><div class="jw-error-text jw-reset-text" data-dcnode-id="2124" data-nosnippet="" dir="auto"><span data-dcnode-id="2127" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2126"></span><span data-dcnode-id="2125" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h3 class="article-body__section" data-dcnode-id="2115" id="section-between-the-planets"><span data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Between the planets</span></span></h3><p data-dcnode-id="2109"><span data-dcnode-id="2114" instrument_node="">Between Mars and Jupiter, there is a huge collection of asteroids known as the main asteroid belt. These space rocks are leftovers from the formation of the solar system, and there are over a million known asteroids all over the solar system, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2111" data-url="https://solarsystem.nasa.gov/asteroids-comets-and-meteors/asteroids/overview/?page=0&amp;per_page=40&amp;order=name+asc&amp;search=&amp;condition_1=101%3Aparent_id&amp;condition_2=asteroid%3Abody_type%3Ailike" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/asteroids-comets-and-meteors/asteroids/overview/%3Fpage%3D0%26per_page%3D40%26order%3Dname%2Basc%26search%3D%26condition_1%3D101%253Aparent_id%26condition_2%3Dasteroid%253Abody_type%253Ailike"><u data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2110" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Asteroids come in a wide variety of types and are classified based on their composition.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="2104" id="section-beyond-the-planets"><span data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Beyond the planets</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2088" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2089"><div class="image-full-width-wrapper" data-dcnode-id="2095"><div class="image-widthsetter" data-dcnode-id="2096" style="max-width:2800px;"><p class="vanilla-image-block" data-dcnode-id="2097" style="padding-top:56.25%;"><picture data-dcnode-id="2098"><source alt="Artist's impression of Kuiper Belt objects." class="expandable lazy-image-van optional-image" data-dcnode-id="2103" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Artist's impression of Kuiper Belt objects." class="expandable lazy-image-van optional-image" data-dcnode-id="2102" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2099"><img alt="Artist's impression of Kuiper Belt objects." class="expandable lazy-image-van optional-image" data-dcnode-id="2101" data-ll-status="native" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/uN9h9SoKDqyL3rFoAiFiG6-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2100"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2090" itemprop="caption description"><span class="caption-text" data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Artist's impression of Kuiper Belt objects. </span></span><span class="credit" data-dcnode-id="2091" itemprop="copyrightHolder"><span data-dcnode-id="2092" instrument_node="">(Image credit: MARK GARLICK/SCIENCE PHOTO LIBRARY via Getty Images)</span></span></figcaption></figure></a><p data-dcnode-id="2079"><span data-dcnode-id="2087" instrument_node="">Beyond the ice giant Neptune, the solar system extends to the Kuiper Belt and the Oort cloud. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2085" data-url="https://www.space.com/16144-kuiper-belt-objects.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16144-kuiper-belt-objects.html" target="_blank"><span data-dcnode-id="2086" instrument_node="">The Kuiper Belt</span></a><span data-dcnode-id="2084" instrument_node="">, whose existence was confirmed in 1992, is 30 to 55 astronomical units (AU) wide, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2081" data-url="https://solarsystem.nasa.gov/resources/399/kuiper-belt-in-depth/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/resources/399/kuiper-belt-in-depth/" target="_blank"><u data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2080" instrument_node="">. (One AU is the average distance between Earth and the sun — about 93 million miles, or 150 million km.)&nbsp;</span></p><p data-dcnode-id="2073"><span data-dcnode-id="2078" instrument_node="">The Kuiper Belt's most famous inhabitant is Pluto, but the region also contains hundreds of thousands of frozen objects 62 miles (100 km) or larger in diameter, many of which are remnants of the early solar system, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2075" data-url="https://solarsystem.nasa.gov/solar-system/kuiper-belt/overview/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/solar-system/kuiper-belt/overview/" target="_blank"><u data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">according to NASA</span></u></a><span data-dcnode-id="2074" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2069"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2071" data-url="https://www.space.com/16401-oort-cloud-the-outer-solar-system-s-icy-shell.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16401-oort-cloud-the-outer-solar-system-s-icy-shell.html" target="_blank"><span data-dcnode-id="2072" instrument_node="">The Oort cloud</span></a><span data-dcnode-id="2070" instrument_node="">, which is a collection of comets different than the Kuiper belt because it is located far, far in the solar system's icy outer reaches, has been hypothesized since the 1950s, but it has never been observed.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="2066" id="section-additional-resources"><span data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Additional resources</span></span></h3><ul data-dcnode-id="2050"><li data-dcnode-id="2061"><span data-dcnode-id="2065" instrument_node="">Learn more about the solar system, its history and the different planets and objects inside it using </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2063" data-url="https://solarsystem.nasa.gov/solar-system/our-solar-system/overview/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/solar-system/our-solar-system/overview/" target="_blank"><span data-dcnode-id="2064" instrument_node="">NASA's interactive resource page</span></a><span data-dcnode-id="2062" instrument_node="">.</span></li><li data-dcnode-id="2056"><span data-dcnode-id="2060" instrument_node="">Explore beautiful maps of many planets and moons, from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2058" data-url="https://www.usgs.gov/centers/astrogeology-science-center/maps" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usgs.gov/centers/astrogeology-science-center/maps" target="_blank"><span data-dcnode-id="2059" instrument_node="">U.S. Geological Survey</span></a><span data-dcnode-id="2057" instrument_node="">.</span></li><li data-dcnode-id="2051"><span data-dcnode-id="2055" instrument_node="">Discover how much you would weigh on different planets and moons, via </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2053" data-url="https://www.exploratorium.edu/ronh/weight/index.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.exploratorium.edu/ronh/weight/index.html" target="_blank"><span data-dcnode-id="2054" instrument_node="">San Francisco's Exploratorium</span></a><span data-dcnode-id="2052" instrument_node="">.</span></li></ul><h3 class="article-body__section" data-dcnode-id="2047" id="section-bibliography"><span data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Bibliography</span></span></h3><p data-dcnode-id="2038"><span data-dcnode-id="2046" instrument_node="">Bartels, M. (2020, September 14). </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">The phosphine discovered in Venus' clouds may be a big deal. Here's what you need to know.</span></em><span data-dcnode-id="2043" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2040" data-url="https://www.space.com/phosphine-venus-clouds-chemical-explained.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/phosphine-venus-clouds-chemical-explained.html" target="_blank"><u data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Space.com</span></u></a><span data-dcnode-id="2039" instrument_node="">.</span></p><p data-dcnode-id="2026"><span data-dcnode-id="2037" instrument_node="">Batygin, K., &amp; Brown, M. (2016). Evidence for a distant giant planet in the solar system. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2033" data-url="https://doi.org/10.3847/0004-6256/151/2/22" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3847/0004-6256/151/2/22" target="_blank"><u data-dcnode-id="2034"><em data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">The Astronomical Journal</span></em></u></a><em data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">,</span></em><span data-dcnode-id="2030" instrument_node=""> </span><em data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">151</span></em><span data-dcnode-id="2027" instrument_node="">(2).&nbsp;</span></p><p data-dcnode-id="2018"><span data-dcnode-id="2025" instrument_node="">Bryner, M. (2012, November 14). </span><em data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">How did Earth get its name? </span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/32274-how-did-earth-get-its-name.html" target="_blank"><u data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Live Science</span></u></a><span data-dcnode-id="2019" instrument_node="">.</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2017" instrument_node="">Choi, C. (2021, October 1). </span><em data-dcnode-id="2015"><span data-d
