</span><span class="credit" data-dcnode-id="2797" itemprop="copyrightHolder"><span data-dcnode-id="2798" instrument_node="">(Image credit: NASA/JPL-Caltech)</span></span><span data-dcnode-id="2796" instrument_node="">

</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">We may need to check our assumptions about how the Milky Way looks to an outsider.</span></p><div class="ad-unit" data-dcnode-id="2786" id="ad-unit-1"></div><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">While the typical artist's image of our galaxy suggests a barred spiral with long, graceful arms, the challenge is that we made these interpretations from data collected from within the galaxy, which provides a poor view of its outer reaches.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2783" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="3106168584348191000" data-widget-type="seasonal"></aside><p data-dcnode-id="2778"><span data-dcnode-id="2782" instrument_node="">New work from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15892-hubble-space-telescope.html"><span data-dcnode-id="2781" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="2779" instrument_node="">, based on measuring distances to cosmic objects, shows at least part of the outer arms may be clumpier and stubbier than believed. That said, predictions suggesting a lumpier set of arms at the galaxy's outer edge were made as far back as 1971, the research team said.</span></p><div class="in-article ad-unit" data-dcnode-id="2733" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2734" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2735"><div data-dcnode-id="2736"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2737" id="trc_wrapper_83919" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2761" id="trc_header_83919"><div class="trc_header_ext" data-dcnode-id="2763"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2771"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2764"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Promoted Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcol minute and see why everyone is addicted.</span></span><span class="branding" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Raid Shadow Legends</span></span></span></a><div class="trc_user_exclude_btn" data-dcnode-id="2746" title="Remove this item"></div><div class="trc_exclude_overlay trc_fade" data-dcnode-id="2745"></div><div class="trc_undo_btn" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Undo</span></div></div></div></div></div><div class="trc_clearer" data-dcnode-id="2738"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2731" id="mobile-in-article"><div data-dcnode-id="2732" id="mobile-taboola-mid-article"></div></div><p data-dcnode-id="2726"><span data-dcnode-id="2730" instrument_node="">"It's a good possibility that the outer disk of the Milky Way resembles the nearby galaxy Messier 83, with shorter, chopped-up pieces of arms," Josh Peek, an associate astronomer at the Space Telescope Science Institute (STScI) in Baltimore, said in a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2728" data-url="https://hubblesite.org/contents/news-releases/2021/news-2021-061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hubblesite.org/contents/news-releases/2021/news-2021-061" target="_blank"><span data-dcnode-id="2729" instrument_node="">statement</span></a><span data-dcnode-id="2727" instrument_node="">.</span></p><p data-dcnode-id="2720"><strong data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Related</span></strong><span data-dcnode-id="2723" instrument_node="">: </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/best-hubble-space-telescope-images.html"><span data-dcnode-id="2722" instrument_node="">The best Hubble Space Telescope images of all time!</span></a></p><div class="ad-unit" data-dcnode-id="2719" id="ad-unit-2"></div><div class="bordeaux-slot" data-dcnode-id="2718" data-feat-ref="bordeaux-feat-id-67" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2717" data-feat-ref="bordeaux-feat-id-68" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2704"><div class="image-full-width-wrapper" data-dcnode-id="2710"><div class="image-widthsetter" data-dcnode-id="2711" style="max-width:800px;"><p class="vanilla-image-block" data-dcnode-id="2712" style="padding-top:64.75%;"><picture data-dcnode-id="2713"><source alt="milky way" class="lazy-image-van optional-image" data-dcnode-id="2716" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png.webp 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png.webp 970w" type="image/webp"><source alt="milky way" class="lazy-image-van optional-image" data-dcnode-id="2715" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png 970w" type="image/png"><img alt="milky way" class="lazy-image-van optional-image loaded" data-dcnode-id="2714" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-pin-media="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU.png" data-srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/Ymd9YF4zdaDtrrmxCsNowU-970-80.png 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="2705" itemprop="caption description"><span class="caption-text" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Astronomers created a new map of the Milky Way by measuring the locations of natural radio sources known as masers (pink dots in pullouts at right) and dust clouds (blue dots). </span></span><span class="credit" data-dcnode-id="2706" itemprop="copyrightHolder"><span data-dcnode-id="2707" instrument_node="">(Image credit: Robert L. Hurt (Caltech, IPAC), Leah Hustak (STScI))</span></span></figcaption></figure><p data-dcnode-id="2699"><span data-dcnode-id="2703" instrument_node="">Peek and his colleagues focused on studying the Perseus spiral arm of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19915-milky-way-galaxy.html"><span data-dcnode-id="2702" instrument_node="">Milky Way</span></a><span data-dcnode-id="2700" instrument_node="">. Mapping our galaxy typically involves trying to measure distances to different objects.</span></p><p data-dcnode-id="2694"><span data-dcnode-id="2698" instrument_node="">Scientists can use </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/amp/astronomers-observe-rare-massive-star-burst-activity.html"><span data-dcnode-id="2697" instrument_node="">masers</span></a><span data-dcnode-id="2695" instrument_node="">, which are naturally occurring radio sources that happen in regions with a lot of massive stars being formed. But as masers aren't everywhere, scientists often need to use other techniques to approximate galactic-scale distances.</span></p><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Another step would be to try using the motions of those gas clouds, but the challenge is trying to predict those motions based on imperfect information. Ideally, NASA said in the statement, the motion measured for a gas cloud is "directly related to its distance due to the overall rotation of the Milky Way," allowing scientists to determine the galaxy's structure.</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">The new study asked what would happen if a gas cloud might also have random motions, which the research team measured using dust as a proxy. (That's because where you see gas, you usually see dust.) Generating the three-dimensional dust maps required looking at the colors of groups of stars all over the sky. Stars with a lot of dust in between themselves and the telescope will appear redder compared to their natural color, NASA said.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2671"><div class="jwplayer__wrapper" data-dcnode-id="2672"><div class="future__jwplayer" data-dcnode-id="2673" id="futr_botr_xY4kJ0h3_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2686" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/xY4kJ0h3/see-the-milky-way-galaxys-warp-in-this-animation%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2688" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2674" id="botr_xY4kJ0h3_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2675"><div class="jw-icon jw-reset" data-dcnode-id="2681"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2682" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2683"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2676"><div class="jw-error-text jw-reset-text" data-dcnode-id="2677" data-nosnippet="" dir="auto"><span data-dcnode-id="2680" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2679"></span><span data-dcnode-id="2678" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Hubble's data indeed showed more complexity to the Perseus arm than believed. The dust cloud observations showed that, opposite to what other studies assumed, the clouds don't lie at the distance of the Perseus arm (roughly 6,000 light-years away). Instead, the clouds move out to a distance of roughly 10,000 light-years.</span></p><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">But now the team would like to focus their efforts on the inner Milky Way as well, to get a better sense of how the galaxy is shaped as a whole. Hubble fellow Catherine Zucker, a member of Peek’s team at STScI, plans to use 3D dust maps using infrared observations of one billion to two billion stars reddened by dust.</span></p><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">"By linking those new dust maps with existing gas velocity surveys, astronomers can refine our map of the inner Milky Way much as they have already done with the outer galaxy," NASA stated, noting that more information may come from other observatories if the team's study ideas are accepted for telescope time.</span></p><div class="bordeaux-slot" data-dcnode-id="2664" data-feat-ref="bordeaux-feat-id-66" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="2647"><div class="fancy_box-title" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Related stories:</span></div><div class="fancy_box_body" data-dcnode-id="2648"><p data-dcnode-id="2649"><span data-dcnode-id="2661" instrument_node="">— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-prawn-nebula-photo"><span data-dcnode-id="2660" instrument_node="">Hubble telescope captures stunning image of the star-forming Prawn Nebula</span></a><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">
— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-first-photos-after-computer-crash"><span data-dcnode-id="2656" instrument_node="">See the first photos from the Hubble Space Telescope after a major computer malfunction</span></a><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">
— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-30-years-of-astronomy.html"><span data-dcnode-id="2652" instrument_node="">The Hubble Space Telescope and 30 years that transformed our view of the universe</span></a><span data-dcnode-id="2650" instrument_node="">&nbsp;</span></p></div></div><p data-dcnode-id="2639"><span data-dcnode-id="2646" instrument_node="">The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2644" data-url="https://videos.space.com/m/7rCGLofk/meet-the-nancy-grace-roman-space-telescope?list=9wzCTV4g" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/7rCGLofk/meet-the-nancy-grace-roman-space-telescope%3Flist%3D9wzCTV4g"><span data-dcnode-id="2645" instrument_node="">Nancy Grace Roman Space Telescope</span></a><span data-dcnode-id="2643" instrument_node=""> is expected to be able to map the entire plane of the galaxy in a few hundred hours, using infrared light to see through the dust (and perhaps view the other side of the Milky Way for the first time). Additionally, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/vera-rubin-observatory-broad-views-universe"><span data-dcnode-id="2642" instrument_node="">Vera Rubin Observatory</span></a><span data-dcnode-id="2640" instrument_node=""> can examine faint, faraway observations in several wavelengths, which when combined with Roman would provide robust distances to other objects.</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">A study based on the new research was accepted for publication in the Astrophysical Journal.</span></p><p data-dcnode-id="2619"><em data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node </span><span class="bio" data-dcnode-id="2532"><p data-dcnode-id="2533"><span data-dcnode-id="2540" instrument_node="">Elizabeth Howell, Ph.D., is a contributing writer for </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//space.com/" target="_blank"><span data-dcnode-id="2539" instrument_node="">Space.com</span></a><span data-dcnode-id="2537" instrument_node=""> since 2012. As a proud Trekkie and Canadian, she tackles topics like spaceflight, diversity, science fiction, astronomy and gaming to help others explore the universe. Elizabeth's on-site reporting includes two human spaceflight launches from Kazakhstan, and embedded reporting from a simulated Mars mission in Utah. She holds a Ph.D. and </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//m.sc/" target="_blank"><span data-dcnode-id="2536" instrument_node="">M.Sc</span></a><span data-dcnode-id="2534" instrument_node="">. in Space Studies from the University of North Dakota, and a Bachelor of Journalism from Canada's Carleton University. Her latest book, NASA Leadership Moments, is co-written with astronaut Dave Williams. Elizabeth first got interested in space after watching the movie Apollo 13 in 1996, and still wants to be an astronaut someday.</span></p></span><span data-dcnode-id="2531" instrument_node="">
