</span><h1 class="text-extra-large line-low mb-2" data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Black hole at center of Milky Way unpredictable and chaotic</span></h1><span data-dcnode-id="2412" instrument_node="">
</span><p class="article-byline text-low" data-dcnode-id="2407"><span data-dcnode-id="2411" instrument_node="">
                                        by                                         </span><a class="article-byline__link" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ras.org.uk/" target="_blank"><span data-dcnode-id="2410" instrument_node="">Royal Astronomical Society</span></a><span data-dcnode-id="2408" instrument_node="">
</span></p><span data-dcnode-id="2406" instrument_node="">
</span><div class="mt-4 article-main" data-dcnode-id="2271"><span data-dcnode-id="2405" instrument_node="">
</span><div class="article-gallery lightGallery" data-dcnode-id="2392"><span data-dcnode-id="2404" instrument_node="">
</span><div data-dcnode-id="2394" data-src="https://scx2.b-cdn.net/gfx/news/hires/2022/black-hole-at-center-o.jpg" data-sub-html="This X-ray image of the galactic center merges all Swift observations from 2006 through 2013. Sagittarius A* is at the center. Low-energy (300 to 1,500 electron volts) X-rays appear red. Green are medium-energy (1,500 to 3,000 eV). Blue are high-energy (3,000 to 10,000 eV). Credit: NASA/Swift/N. Degenaar" data-thumb="https://scx1.b-cdn.net/csz/news/tmb/2022/black-hole-at-center-o.jpg"><span data-dcnode-id="2403" instrument_node="">
</span><figure class="article-img" data-dcnode-id="2396"><span data-dcnode-id="2402" instrument_node="">
</span><img alt="Black hole at center of Milky Way unpredictable and chaotic" data-dcnode-id="2401" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scx1.b-cdn.net/csz/news/800a/2022/black-hole-at-center-o.jpg&amp;raw" title="This X-ray image of the galactic center merges all Swift observations from 2006 through 2013. Sagittarius A* is at the center. Low-energy (300 to 1,500 electron volts) X-rays appear red. Green are medium-energy (1,500 to 3,000 eV). Blue are high-energy (3,000 to 10,000 eV). Credit: NASA/Swift/N. Degenaar" width="800"><span data-dcnode-id="2400" instrument_node="">
</span><figcaption class="text-darken text-low-up text-truncate-js text-truncate mt-3" data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">
                This X-ray image of the galactic center merges all Swift observations from 2006 through 2013. Sagittarius A* is at the center. Low-energy (300 to 1,500 electron volts) X-rays appear red. Green are medium-energy (1,500 to 3,000 eV). Blue are high-energy (3,000 to 10,000 eV). Credit: NASA/Swift/N. Degenaar
            </span></figcaption><span data-dcnode-id="2397" instrument_node=""> </span></figure><span data-dcnode-id="2395" instrument_node="">
</span></div><span data-dcnode-id="2393" instrument_node="">
</span></div><p data-dcnode-id="2387"><span data-dcnode-id="2391" instrument_node="">An international team of researchers, led by postgraduate student Alexis Andrés, has found that the black hole at the center of our galaxy, Sagittarius A*, not only flares irregularly from day to day but also in the long term. The team analyzed 15 years' worth of data to come to this conclusion. The research was initiated by Andres in 2019 when he was a summer student at the University of Amsterdam. In the years that followed, he continued his research, which is now to be published in </span><i data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Monthly Notices of the Royal Astronomical Society</span></i><span data-dcnode-id="2388" instrument_node="">.

                                         
                                                  </span></p><section class="article-banner first-banner ads-336x280" data-dcnode-id="2377"><span data-dcnode-id="2386" instrument_node="">
</span><span data-dcnode-id="2384" instrument_node="">
</span><div data-dcnode-id="2379" id="div-gpt-ad-1449240174198-2"><span data-dcnode-id="2383" instrument_node="">
</span><span data-dcnode-id="2380" instrument_node="">
</span></div><span data-dcnode-id="2378" instrument_node="">
</span></section><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Sagittarius A* is a strong source of radio, X-rays and gamma rays (visible light is blocked by intervening gas and dust). Astronomers have known for decades that Sagittarius A* flashes every day, emitting bursts of radiation that are ten to a hundred times brighter than normal signals observed from the black hole.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node="">To find out more about these mysterious flares, the team of astronomers, led by Andrés, searched for patterns in 15 years of data made available by NASA's Neil Gehrels Swift Observatory, an Earth-orbiting satellite dedicated to the detection of gamma-ray bursts. The Swift Observatory has been observing </span><a class="textTag" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/gamma%2Brays/" rel="tag"><span data-dcnode-id="2371" instrument_node="">gamma rays</span></a><span data-dcnode-id="2369" instrument_node=""> from black hole since 2006. Analysis of the data showed high levels of activity from 2006 to 2008, with a sharp decline in activity for the next four years. After 2012, the frequency of flares increased again—the researchers had a difficult time distinguishing a pattern.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">In the next few years, the team of astronomers expect to gather enough data to be able to rule out whether the variations in the flares from Sagittarius A* are due to passing gaseous clouds or stars, or whether something else can explain the irregular activity observed from our galaxy's central black hole.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">"The long dataset of the Swift observatory did not just happen by accident," says co-author and previous supervisor to Andrés, Dr. Nathalie Degenaar, also at the University of Amsterdam. Her request for these specific measurements from the Swift satellite was granted while she was a Ph.D. student. "Since then, I've been applying for more observing time regularly. It's a very special observing program that allows us to conduct a lot of research."</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Co-author Dr. Jakob van den Eijnden, of the University of Oxford, comments on the team's findings: "How the flares occur exactly remains unclear. It was previously thought that more flares follow after gaseous clouds or stars pass by the black hole, but there is no evidence for that yet. And we cannot yet confirm the hypothesis that the magnetic properties of the surrounding gas play a role either."
