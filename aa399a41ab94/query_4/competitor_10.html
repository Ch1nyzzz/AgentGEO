</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">We’re at the tail-end of 2017 and what a year for astronomy and space science! I’m excited to talk about ten astronomy discoveries that help shape and change 2017. I will organize these by discovery date. Let’s jump right to it!</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">&nbsp;</span></p><span data-dcnode-id="902" instrument_node="">
</span><h2 data-dcnode-id="898"><span data-dcnode-id="901" instrument_node="">1)&nbsp;</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/02/22/science/trappist-1-exoplanets-nasa.html"><span data-dcnode-id="900" instrument_node="">NASA and European Astronomers Discover 7 Earth-Size Planets Orbiting Red Dwarf Star</span></a></h2><span data-dcnode-id="897" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="893" id="attachment_2430" style="width: 970px"><img alt="TRAPPIST-1-Planet-Comparison" aria-describedby="caption-attachment-2430" class="size-large wp-image-2430" data-dcnode-id="896" height="540" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison-1024x576.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison-1024x576.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison-300x169.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison-768x432.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison-1080x608.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/TRAPPIST-1-Planet-Comparison.jpg 1200w" width="960"><p class="wp-caption-text" data-dcnode-id="894" id="caption-attachment-2430"><span data-dcnode-id="895" instrument_node="">Credit: JPL-Caltech/NASA</span></p></div><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The search for life is one of the most critical questions for astronomy and even humanity. Are we alone in the universe or are there other life forms, even intelligent ones? Well in February of 2017, NASA and European astronomers discovered seven planets that may support life.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">These seven planets orbit a red dwarf, a star much smaller and cooler than ours, called TRAPPIST-1. The size of this star is only slightly larger than our gas giant Jupiter. It’s located 39.5 light-years away from Earth. That means if we had the technology to travel at the universe’s speed limit, the speed of light, it would take us 39.5 years. Check out how these planets orbit TRAPPIST-1. What sticks out to you?</span></p><span data-dcnode-id="886" instrument_node="">
</span><div class="wp-video" data-dcnode-id="833" style="width: 960px;"><span data-dcnode-id="884" instrument_node="">
</span><span class="mejs-offscreen" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Video Player</span></span><div aria-label="Video Player" class="mejs-container mejs-container-keyboard-inactive wp-video-shortcode mejs-video" data-dcnode-id="834" id="mep_0" role="application" style="width: 960px; height: 540px; min-width: 217px;" tabindex="0"><div class="mejs-inner" data-dcnode-id="835"><div class="mejs-mediaelement" data-dcnode-id="876"><mediaelementwrapper data-dcnode-id="877" id="video-2404-1"><video class="wp-video-shortcode" data-dcnode-id="878" height="540" id="video-2404-1_html5" preload="metadata" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/T1_1080_highQ_fast.mp4%3F_%3D1&amp;raw" style="width: 960px; height: 540px;" width="960"><source data-dcnode-id="881" src="https://brownspaceman.com/wp-content/uploads/2017/12/T1_1080_highQ_fast.mp4?_=1" type="video/mp4"><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/T1_1080_highQ_fast.mp4"><span data-dcnode-id="880" instrument_node="">https://brownspaceman.com/wp-content/uploads/2017/12/T1_1080_highQ_fast.mp4</span></a></video></mediaelementwrapper></div><div class="mejs-layers" data-dcnode-id="867"><div class="mejs-poster mejs-layer" data-dcnode-id="875" style="display: none; width: 100%; height: 100%;"></div><div class="mejs-overlay mejs-layer" data-dcnode-id="872" style="width: 100%; height: 100%; display: none;"><div class="mejs-overlay-loading" data-dcnode-id="873"><span class="mejs-overlay-loading-bg-img" data-dcnode-id="874"></span></div></div><div class="mejs-overlay mejs-layer" data-dcnode-id="870" style="display: none; width: 100%; height: 100%;"><div class="mejs-overlay-error" data-dcnode-id="871"></div></div><div class="mejs-overlay mejs-layer mejs-overlay-play" data-dcnode-id="868" style="width: 100%; height: 100%;"><div aria-label="Play" aria-pressed="false" class="mejs-overlay-button" data-dcnode-id="869" role="button" tabindex="0"></div></div></div><div class="mejs-controls" data-dcnode-id="836"><div class="mejs-button mejs-playpause-button mejs-play" data-dcnode-id="865"><button aria-controls="mep_0" aria-label="Play" data-dcnode-id="866" tabindex="0" title="Play" type="button"></button></div><div aria-live="off" class="mejs-time mejs-currenttime-container" data-dcnode-id="862" role="timer"><span class="mejs-currenttime" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">00:00</span></span></div><div class="mejs-time-rail" data-dcnode-id="850"><span aria-label="Time Slider" aria-valuemax="75.108367" aria-valuemin="0" aria-valuenow="0" aria-valuetext="00:00" class="mejs-time-total mejs-time-slider" data-dcnode-id="851" role="slider" tabindex="0"><span class="mejs-time-buffering" data-dcnode-id="861" style="display: none;"></span><span class="mejs-time-loaded" data-dcnode-id="860" style="transform: scaleX(0.137495);"></span><span class="mejs-time-current" data-dcnode-id="859" style="transform: scaleX(0);"></span><span class="mejs-time-hovered no-hover" data-dcnode-id="858"></span><span class="mejs-time-handle" data-dcnode-id="856" style="transform: translateX(0px);"><span class="mejs-time-handle-content" data-dcnode-id="857"></span></span><span class="mejs-time-float" data-dcnode-id="852"><span class="mejs-time-float-current" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">00:00</span></span><span class="mejs-time-float-corner" data-dcnode-id="853"></span></span></span></div><div class="mejs-time mejs-duration-container" data-dcnode-id="847"><span class="mejs-duration" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">01:15</span></span></div><div class="mejs-button mejs-volume-button mejs-mute" data-dcnode-id="839"><button aria-controls="mep_0" aria-label="Mute" data-dcnode-id="846" tabindex="0" title="Mute" type="button"></button><a aria-label="Volume Slider" aria-orientation="vertical" aria-valuemax="100" aria-valuemin="0" aria-valuenow="80" aria-valuetext="80%" class="mejs-volume-slider" data-dcnode-id="840" href="javascript:void(0);" role="slider"><span class="mejs-offscreen" data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Use Up/Down Arrow keys to increase or decrease volume.</span></span><div class="mejs-volume-total" data-dcnode-id="841"><div class="mejs-volume-current" data-dcnode-id="843" style="bottom: 0px; height: 80%;"></div><div class="mejs-volume-handle" data-dcnode-id="842" style="bottom: 80%; margin-bottom: -3px;"></div></div></a></div><div class="mejs-button mejs-fullscreen-button" data-dcnode-id="837"><button aria-controls="mep_0" aria-label="Fullscreen" data-dcnode-id="838" tabindex="0" title="Fullscreen" type="button"></button></div></div></div></div></div><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">First, my initial attention went to how incredibly close these planets are orbiting to their parent star. It’s measured in AU, which stands for astronomical unit, or the distance from our Sun to the Earth (149 million km). The furthest&nbsp;planet in the TRAPPIST-1 solar system is as far out as Venus in our&nbsp;system. In other words,&nbsp;Earth would be almost half an AU further out than all of these guys. Furthermore, what’s even&nbsp;</span><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">more exciting</span></em><span data-dcnode-id="828" instrument_node=""> is if you were a citizen of&nbsp;TRAPPIST-1b or TRAPPIST-1c (two closest planets to the star), that if you looked up at the sky, you would see the others planet like we see our Moon except for SEVERAL times bigger.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Now, another thing is how fast they orbit the star. You can’t tell from the video but the orbital periods (how long it’ll take to orbit the star – year) is anywhere from 1.5 days to 18 days. I think having a birthday every 1.5 days would get boring pretty fast or on the flipside, you would be in a state of perpetual partying.</span></p><span data-dcnode-id="823" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="819" id="attachment_2434" style="width: 877px"><img alt="Comparison of the sizes of the TRAPPIST-1 planets with Solar System bodies" aria-describedby="caption-attachment-2434" class="size-full wp-image-2434" data-dcnode-id="822" height="900" loading="lazy" sizes="(max-width: 867px) 100vw, 867px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Comparison_of_the_sizes_of_the_TRAPPIST-1_planets_with_Solar_System_bodies.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Comparison_of_the_sizes_of_the_TRAPPIST-1_planets_with_Solar_System_bodies.jpg 867w, https://brownspaceman.com/wp-content/uploads/2017/12/Comparison_of_the_sizes_of_the_TRAPPIST-1_planets_with_Solar_System_bodies-289x300.jpg 289w, https://brownspaceman.com/wp-content/uploads/2017/12/Comparison_of_the_sizes_of_the_TRAPPIST-1_planets_with_Solar_System_bodies-768x797.jpg 768w" width="867"><p class="wp-caption-text" data-dcnode-id="820" id="caption-attachment-2434"><span data-dcnode-id="821" instrument_node="">Credit: NASA/JPL</span></p></div><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">I think we are starting to get an idea of how tight and close these planets are, but that’s not why this discovery is a big deal. The incredible part is&nbsp;</span><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">all of these planets are predominantly rocky</span></strong><span data-dcnode-id="814" instrument_node="">. That’s major because it opens up the realm of possibilities of being more “Earth-like.” Scientists also believe that some of these planets may have ice or even liquid water.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="811" instrument_node="">Finally, TRAPPIST-1 is estimated to exist for at least 3 billion years to a possible 8 billion years. Our Sun is about 4.6 billion years and shows that it’s possible that</span><em data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;life forms exist</span></em><span data-dcnode-id="808" instrument_node=""> on these planets. Another crucial part is because TRAPPIST-1 is much smaller and considered an ultra-cool dwarf star that could last for up to&nbsp;</span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">12 trillion years!</span></strong><span data-dcnode-id="805" instrument_node=""> That is one massive timeline compared to our Sun’s 10 billion-year lifetime.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">&nbsp;</span></p><span data-dcnode-id="800" instrument_node="">
</span><h2 data-dcnode-id="796" style="text-align: center;"><span data-dcnode-id="799" instrument_node="">2) </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/image-feature/jpl/cassini-reveals-strange-shape-of-saturns-moon-pan"><span data-dcnode-id="798" instrument_node="">Cassini Spacecraft Captures Saturn’s Odd Looking Moon called Pan</span></a></h2><span data-dcnode-id="795" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="791" id="attachment_2436" style="width: 970px"><img alt="Saturn's moon Pan" aria-describedby="caption-attachment-2436" class="size-large wp-image-2436" data-dcnode-id="794" height="469" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/1_n1867600269_1-1024x500.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/1_n1867600269_1-1024x500.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/1_n1867600269_1-300x146.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/1_n1867600269_1-768x375.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/1_n1867600269_1.jpg 1041w" width="960"><p class="wp-caption-text" data-dcnode-id="792" id="caption-attachment-2436"><span data-dcnode-id="793" instrument_node="">Credit:NASA/JPL</span></p></div><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">Saturn has put us in awe countless times. Whether it’s the </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/storms-saturn/"><span data-dcnode-id="788" instrument_node="">hexagonal storm</span></a><span data-dcnode-id="786" instrument_node="">&nbsp;on the north pole to the hydrocarbon seas on Titan, Saturn has taught us so much. It’s no different this time as we turn our heads to this small unsuspecting Saturnian moon called Pan.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">This moon has some history which is part of the reason why the discovery turned us on our heads. The first part of this story is when scientists examined Saturn’s rings closely.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The rings are fascinating, but for today we’ll stick with one particular area that called the Encke Gap.</span></p><span data-dcnode-id="778" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="774" id="attachment_2438" style="width: 970px"><img alt="Saturn’s Ring System - Encke gap" aria-describedby="caption-attachment-2438" class="size-full wp-image-2438" data-dcnode-id="777" height="720" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Saturn%25E2%2580%2599sRingSystemCABEnckeGapCassiniDivisionCassiniISS.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Saturn’sRingSystemCABEnckeGapCassiniDivisionCassiniISS.jpg 960w, https://brownspaceman.com/wp-content/uploads/2017/12/Saturn’sRingSystemCABEnckeGapCassiniDivisionCassiniISS-300x225.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Saturn’sRingSystemCABEnckeGapCassiniDivisionCassiniISS-768x576.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/Saturn’sRingSystemCABEnckeGapCassiniDivisionCassiniISS-510x382.jpg 510w" width="960"><p class="wp-caption-text" data-dcnode-id="775" id="caption-attachment-2438"><span data-dcnode-id="776" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">Astronomer hypothesized that the Encke gap is a result of some massive object such as a moon. They predicted precisely that it would be a single moon and the size would be&nbsp;5–10×10</span><sup data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">−12</span></sup><span data-dcnode-id="769" instrument_node="">&nbsp;Saturn masses. When Voyager 2 approached Saturn, they started looking for this object and found just 1 degree away from where they predicted where it would be.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Here’s the photo that Voyager 2 took in 1981:</span></p><span data-dcnode-id="764" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="760" id="attachment_2439" style="width: 410px"><img alt="Voyager 2 - Pan" aria-describedby="caption-attachment-2439" class="size-full wp-image-2439" data-dcnode-id="763" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/vg2_4399815.gif&amp;raw" width="400"><p class="wp-caption-text" data-dcnode-id="761" id="caption-attachment-2439"><span data-dcnode-id="762" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">They could tell it was a little odd and excited they were right on the money about it. Fast forward to March 2017. Cassini Spacecraft takes a few up close and personal photos of Pan and see this:</span></p><span data-dcnode-id="756" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="752" id="attachment_2440" style="width: 970px"><img alt="Pan - Saturn Moon" aria-describedby="caption-attachment-2440" class="size-large wp-image-2440" data-dcnode-id="755" height="469" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/2_n1867602424_1-1024x500.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/2_n1867602424_1-1024x500.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/2_n1867602424_1-300x146.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/2_n1867602424_1-768x375.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/2_n1867602424_1.jpg 1041w" width="960"><p class="wp-caption-text" data-dcnode-id="753" id="caption-attachment-2440"><span data-dcnode-id="754" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="751" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="747" id="attachment_2441" style="width: 970px"><img alt="Saturn Moon - Pan - Up Close" aria-describedby="caption-attachment-2441" class="size-large wp-image-2441" data-dcnode-id="750" height="469" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/3_n1867604488_1-1024x500.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/3_n1867604488_1-1024x500.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/3_n1867604488_1-300x146.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/3_n1867604488_1-768x375.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/3_n1867604488_1.jpg 1041w" width="960"><p class="wp-caption-text" data-dcnode-id="748" id="caption-attachment-2441"><span data-dcnode-id="749" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">People call Pan the “space empanada” or NASA describes as the walnut-shaped moon. Any way you slice it it’s a very strange looking moon. What is intriguing is the lip around this moon. Where do you think it comes from? Well, astronomers discovered that it comes from the collection of ring particles that accrete over time.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The moon is only about 35 km across or almost half the size of Manhatten. Pan orbits Saturn through the Encke gap, which is approximately 325 km wide, in 13.8 hours. Its distance from Saturn is about 1/3 that of Earth-Moon distance.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">One exciting thing about Pan is that although it sweeps up ring particles, it also captures ice particles too. Meaning it’s not so far-fetched to think that if you were standing on Pan that it may be snowing from time to time. Or perhaps the surface of Pan may be soft and snowy or hard and icy. Either way, the solar system still has many surprises for us.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><img data-dcnode-id="736" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wwwcdn.skyandtelescope.com/wp-content/uploads/Pan-Flyby.gif&amp;raw"></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">&nbsp;</span></p><span data-dcnode-id="731" instrument_node="">
</span><h2 data-dcnode-id="727" style="text-align: center;"><span data-dcnode-id="730" instrument_node="">3) </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/03/30/science/spacex-launches-a-satellite-with-a-partly-used-rocket.html"><span data-dcnode-id="729" instrument_node="">SpaceX Launches a Satellite with a Reused Rocket</span></a></h2><span data-dcnode-id="726" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="722" id="attachment_2446" style="width: 889px"><img alt="SpaceX launches satellite on reused rocket" aria-describedby="caption-attachment-2446" class="size-full wp-image-2446" data-dcnode-id="725" height="485" loading="lazy" sizes="(max-width: 879px) 100vw, 879px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/f9-bulgariasat1-2.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/f9-bulgariasat1-2.jpg 879w, https://brownspaceman.com/wp-content/uploads/2017/12/f9-bulgariasat1-2-300x166.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/f9-bulgariasat1-2-768x424.jpg 768w" width="879"><p class="wp-caption-text" data-dcnode-id="723" id="caption-attachment-2446"><span data-dcnode-id="724" instrument_node="">Credit: SpaceX</span></p></div><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">SpaceX is making waves all throughout the year. If you don’t know already, SpaceX is a private space company led by the infamous Elon Musk that not only wants to help NASA deliver cargo to the ISS but get humans to Mars.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Elon wanted to reuse rockets and made it his dream to make it happen. It’s quite unbelievable that he was able to reuse a rocket and launch this satellite to space without a hitch. Why is that a big deal? Well, it comes down to the math of it all (don’t roll your eyes just yet).</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">When calculating the cost of a rocket one crucial part is the dollar per pound. If I want to send a satellite or a new supply for the astronauts on the ISS the cost of the rocket will depend on how efficient it is. In the past, the space shuttle would cost about $8,000 per pound. It meant that the cost of one rocket would be nearly $450 million.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The shuttle program vision was to get cheaper over time, but that never happened, which led to the cancellation of the space shuttle in 2011.</span></p><span data-dcnode-id="709" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="705" id="attachment_2448" style="width: 970px"><img alt="space shuttle" aria-describedby="caption-attachment-2448" class="size-large wp-image-2448" data-dcnode-id="708" height="600" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-1024x640.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-1024x640.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-300x188.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-768x480.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-400x250.jpg 400w, https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle-1080x675.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/space-shuttle.jpg 1440w" width="960"><p class="wp-caption-text" data-dcnode-id="706" id="caption-attachment-2448"><span data-dcnode-id="707" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Enter Elon Musk. In the early 2000’s he wanted to start his own space company and found out fast how expensive they are. He learned that there were huge markups because they outsource different parts of the rocket construction.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">That culmination is how SpaceX was born. They would construct everything in-house and set sights on the ambitious goal of creating a reusable rocket. Remember how the space shuttle cost $8,000 per pound? Well, Elon </span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">got that cost down to $1,000 per pound</span></strong><span data-dcnode-id="697" instrument_node=""> or about $62 million per flight.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">It took more than a decade to get here as well as some competitors like Blue Origin wanted a piece of the action too. In 2017 it’s a major achievement that not only SpaceX can provide a low-cost flight to lower Earth orbit but&nbsp;</span><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">is reliable as well</span></em><span data-dcnode-id="691" instrument_node="">.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span><h2 data-dcnode-id="682"><span data-dcnode-id="685" instrument_node="">4) </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2017-04-capture-image-dark-web-galaxies.html"><span data-dcnode-id="684" instrument_node="">Astronomers Capture ‘First’ Image of a Dark Matter Web that Connects Galaxies</span></a></h2><span data-dcnode-id="681" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="677" id="attachment_1449" style="width: 970px"><img alt="Dark Matter - Abell 520 - NASA" aria-describedby="caption-attachment-1449" class="size-large wp-image-1449" data-dcnode-id="680" height="617" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2016/02/hs-2012-10-a-xlarge_web-1024x658.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2016/02/hs-2012-10-a-xlarge_web-1024x658.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2016/02/hs-2012-10-a-xlarge_web-300x193.jpg 300w, https://brownspaceman.com/wp-content/uploads/2016/02/hs-2012-10-a-xlarge_web-768x494.jpg 768w, https://brownspaceman.com/wp-content/uploads/2016/02/hs-2012-10-a-xlarge_web.jpg 1280w" width="960"><p class="wp-caption-text" data-dcnode-id="678" id="caption-attachment-1449"><span data-dcnode-id="679" instrument_node="">Credit: Hubble / NASA</span></p></div><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">To get some appreciation of this story we need to give you a little context. The concept of dark matter and dark energy is at the frontier of our understanding of the universe. It’s interesting how we stumbled onto it.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">The expansion of the universe was thought of to be slowed down by gravity. However, Edwin Hubble discovered the expansion of the universe is not being slowed down but in fact&nbsp;</span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">expanding</span></strong><span data-dcnode-id="669" instrument_node="">.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Edwin’s discovery shook the very foundations of science and what we thought we knew about the universe. Enter Albert Einstein. He is working away on some very difficult problems, even for Einstein a man who published his theory of relativity at the age of 26. The problem he was trying to solve is how the universe works in respect to the fundamental interaction of gravitation as a result of spacetime being curved by mass and energy. These are famously called Einstein’s field equations (EFE).</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Here is the equation that he worked on:</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><img alt="Einstein Field Equations" class="aligncenter size-full wp-image-2451" data-dcnode-id="660" height="52" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Screen-Shot-2017-12-10-at-11.34.54-AM.png&amp;raw" width="223"></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">He included the cosmological constant&nbsp;λ to show that the universe was not expanding or contracting. However, he found out that if the universe was really like this that it should not simply exist at all. What is Einstein to do? Well, he called this his “biggest blunder he ever made.” However, as we know Edwin Hubble discovered that in fact, the universe is expanding. Einstein got wind of this and put back&nbsp;λ in the equation as scientists learned a positive value of λ is needed to explain an accelerating universe. Not only that but&nbsp;</span><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Einstein actually stumbled upon dark matter and dark energy.</span></strong><span data-dcnode-id="654" instrument_node="">&nbsp;Thus, we now know that dark energy is the reason why the universe is expanding faster. His biggest mistake turned out to be one of the biggest mysteries and epiphanies in human history.</span></p><span data-dcnode-id="652" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="648" id="attachment_2453" style="width: 1000px"><img alt="" aria-describedby="caption-attachment-2453" class="size-full wp-image-2453" data-dcnode-id="651" height="743" loading="lazy" sizes="(max-width: 990px) 100vw, 990px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-nasa.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-nasa.jpg 990w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-nasa-300x225.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-nasa-768x576.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-nasa-510x382.jpg 510w" width="990"><p class="wp-caption-text" data-dcnode-id="649" id="caption-attachment-2453"><span data-dcnode-id="650" instrument_node="">Credit: Max Planck Institute for Astrophysics</span></p></div><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="646" instrument_node="">Okay, so why the history lesson? Glad you asked. Since Einstein stumbled on dark matter and dark energy or simplifying that to the fact&nbsp;</span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">empty space is not just empty space but can possess its own energy.&nbsp;</span></strong></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="641" instrument_node="">Keeping that in mind it is hypothesized that the space between galaxies is&nbsp;</span><span data-dcnode-id="639" style="text-decoration: underline;"><span data-dcnode-id="640" instrument_node="">tied or connected by dark matter.</span></span><span data-dcnode-id="638" instrument_node=""> You can think of this as a web of dark matter. Researchers have not been able to prove this, </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">until now</span></strong><span data-dcnode-id="635" instrument_node="">.</span></p><span data-dcnode-id="633" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="629" id="attachment_2450" style="width: 909px"><img alt="Dark Matter Web" aria-describedby="caption-attachment-2450" class="size-full wp-image-2450" data-dcnode-id="632" height="900" loading="lazy" sizes="(max-width: 899px) 100vw, 899px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web.jpg 899w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web-290x290.jpg 290w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web-300x300.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web-768x769.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/Dark-matter-web-184x184.jpg 184w" width="899"><p class="wp-caption-text" data-dcnode-id="630" id="caption-attachment-2450"><span data-dcnode-id="631" instrument_node="">Credit: S. Epps &amp; M. Hudson / University of Waterloo</span></p></div><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">The photo you see here is&nbsp;</span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">direct evidence&nbsp;</span></strong><span data-dcnode-id="624" instrument_node="">that galaxies are connected with dark matter. The areas in white are the galaxies and the areas in red are dark matter.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">How did they produce this photo? Researchers, combined lensing images of 23,000 galaxy pairs located 4.5 billion light-years away to create a composite image or map that shows the evidence of dark matter between two galaxies. The fact we now have this image is&nbsp;</span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">huge</span></strong><span data-dcnode-id="618" instrument_node=""> for science and I’m sure Einstein would be ecstatic to learn and see this if he were alive today.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="615" instrument_node="">I will leave you with a famous stat of the makeup of the universe. As of 2017, we know that&nbsp;</span><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">68% of the universe is dark energy.</span></strong><span data-dcnode-id="612" instrument_node=""> We also know that&nbsp;</span><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">27% is dark matter</span></strong><span data-dcnode-id="609" instrument_node="">. Meaning, everything on Earth, or anything in the universe that has matter and we can see it with our instruments is&nbsp;</span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">just 5%.</span></strong><span data-dcnode-id="606" instrument_node=""> That’s right, everything you can touch and feel and see is just 5% of the universe. I’m not sure what is more humbling then appreciating that everything we know from science and observation gets us an understanding of 5% of the universe.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">&nbsp;</span></p><span data-dcnode-id="601" instrument_node="">
</span><h2 data-dcnode-id="597"><span data-dcnode-id="600" instrument_node="">5) </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/06/01/science/black-holes-collision-ligo-gravitational-waves.html"><span data-dcnode-id="599" instrument_node="">Third Gravitational Wave Detected from Black Hole Merger 3 Billion Light-Years Away</span></a></h2><span data-dcnode-id="596" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="592" id="attachment_2457" style="width: 970px"><img alt="Black Hole Merger" aria-describedby="caption-attachment-2457" class="size-large wp-image-2457" data-dcnode-id="595" height="768" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger-1024x819.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger-1024x819.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger-300x240.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger-768x614.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger-1080x864.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/Black-Hole-Merger.jpg 1125w" width="960"><p class="wp-caption-text" data-dcnode-id="593" id="caption-attachment-2457"><span data-dcnode-id="594" instrument_node="">Credit: Aurore Simonnet/Sonoma State/Caltech/MIT/LIGO</span></p></div><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="590" instrument_node="">Have you ever wondered what happens when two black holes merge together? What if I told you that you could&nbsp;</span><em data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">feel</span></em><span data-dcnode-id="587" instrument_node=""> the vibrations of two black holes merging even if they’re located&nbsp;</span><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">3 billion light-years away</span></strong><span data-dcnode-id="584" instrument_node=""> (or it would take you 3 billion years to reach this place traveling at the speed of light).</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Pull up a chair and listen to this (okay maybe you’re already sitting down). Einstein (yes him again) predicted an effect called a gravitational wave. That all things, even humans, give off gravitational waves. In fact, it’s really hard to measure it on smaller masses like humans, planets, or even stars.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Consequently, scientists created an instrument that could detect gravitational waves called Laser Interferometer Gravitational-Wave Observatory (LIGO). LIGO will detect vibrations on such a precise level that it can tell you where in the universe this gravitational wave came from.</span></p><span data-dcnode-id="576" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="572" id="attachment_2459" style="width: 970px"><img alt="LIGO" aria-describedby="caption-attachment-2459" class="size-large wp-image-2459" data-dcnode-id="575" height="636" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/LIGO-1024x678.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-1024x678.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-300x199.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-768x509.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-1080x715.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-207x136.jpg 207w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO-140x94.jpg 140w, https://brownspaceman.com/wp-content/uploads/2017/12/LIGO.jpg 1359w" width="960"><p class="wp-caption-text" data-dcnode-id="573" id="caption-attachment-2459"><span data-dcnode-id="574" instrument_node="">Credit: LIGO Laboratory</span></p></div><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Imagine, two massive black holes circling each other. Their speed and proximity both increase more and more as time progresses. Suddenly, they are within mere kilometers of each other and speeding up so fast that it’s practically unfathomable. As a result, it’s giving off large gravitational waves that let the universe know something immense is happening.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Here’s a video of a simulation how the merger happens using LIGO’s data. Notice how much faster it speeds up just before the merger.</span></p><span data-dcnode-id="565" instrument_node="">
</span><div class="wp-video" data-dcnode-id="514" style="width: 960px;"><span class="mejs-offscreen" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Video Player</span></span><div aria-label="Video Player" class="mejs-container mejs-container-keyboard-inactive wp-video-shortcode mejs-video" data-dcnode-id="515" id="mep_1" role="application" style="width: 960px; height: 540px; min-width: 217px;" tabindex="0"><div class="mejs-inner" data-dcnode-id="516"><div class="mejs-mediaelement" data-dcnode-id="557"><mediaelementwrapper data-dcnode-id="558" id="video-2404-2"><video class="wp-video-shortcode" data-dcnode-id="559" height="540" id="video-2404-2_html5" preload="metadata" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Black_Hole_Merger_Simulation_GW170104.mp4%3F_%3D2&amp;raw" style="width: 960px; height: 540px;" width="960"><source data-dcnode-id="562" src="https://brownspaceman.com/wp-content/uploads/2017/12/Black_Hole_Merger_Simulation_GW170104.mp4?_=2" type="video/mp4"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Black_Hole_Merger_Simulation_GW170104.mp4"><span data-dcnode-id="561" instrument_node="">https://brownspaceman.com/wp-content/uploads/2017/12/Black_Hole_Merger_Simulation_GW170104.mp4</span></a></video></mediaelementwrapper></div><div class="mejs-layers" data-dcnode-id="548"><div class="mejs-poster mejs-layer" data-dcnode-id="556" style="display: none; width: 100%; height: 100%;"></div><div class="mejs-overlay mejs-layer" data-dcnode-id="553" style="width: 100%; height: 100%; display: none;"><div class="mejs-overlay-loading" data-dcnode-id="554"><span class="mejs-overlay-loading-bg-img" data-dcnode-id="555"></span></div></div><div class="mejs-overlay mejs-layer" data-dcnode-id="551" style="display: none; width: 100%; height: 100%;"><div class="mejs-overlay-error" data-dcnode-id="552"></div></div><div class="mejs-overlay mejs-layer mejs-overlay-play" data-dcnode-id="549" style="width: 100%; height: 100%;"><div aria-label="Play" aria-pressed="false" class="mejs-overlay-button" data-dcnode-id="550" role="button" tabindex="0"></div></div></div><div class="mejs-controls" data-dcnode-id="517"><div class="mejs-button mejs-playpause-button mejs-play" data-dcnode-id="546"><button aria-controls="mep_1" aria-label="Play" data-dcnode-id="547" tabindex="0" title="Play" type="button"></button></div><div aria-live="off" class="mejs-time mejs-currenttime-container" data-dcnode-id="543" role="timer"><span class="mejs-currenttime" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">00:00</span></span></div><div class="mejs-time-rail" data-dcnode-id="531"><span aria-label="Time Slider" aria-valuemax="0" aria-valuemin="0" aria-valuenow="0" aria-valuetext="00:00" class="mejs-time-total mejs-time-slider" data-dcnode-id="532" role="slider" tabindex="0"><span class="mejs-time-buffering" data-dcnode-id="542" style="display: none;"></span><span class="mejs-time-loaded" data-dcnode-id="541"></span><span class="mejs-time-current" data-dcnode-id="540" style="transform: scaleX(0);"></span><span class="mejs-time-hovered no-hover" data-dcnode-id="539"></span><span class="mejs-time-handle" data-dcnode-id="537" style="transform: translateX(0px);"><span class="mejs-time-handle-content" data-dcnode-id="538"></span></span><span class="mejs-time-float" data-dcnode-id="533"><span class="mejs-time-float-current" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">00:00</span></span><span class="mejs-time-float-corner" data-dcnode-id="534"></span></span></span></div><div class="mejs-time mejs-duration-container" data-dcnode-id="528"><span class="mejs-duration" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">00:10</span></span></div><div class="mejs-button mejs-volume-button mejs-mute" data-dcnode-id="520"><button aria-controls="mep_1" aria-label="Mute" data-dcnode-id="527" tabindex="0" title="Mute" type="button"></button><a aria-label="Volume Slider" aria-orientation="vertical" aria-valuemax="100" aria-valuemin="0" aria-valuenow="80" aria-valuetext="80%" class="mejs-volume-slider" data-dcnode-id="521" href="javascript:void(0);" role="slider"><span class="mejs-offscreen" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Use Up/Down Arrow keys to increase or decrease volume.</span></span><div class="mejs-volume-total" data-dcnode-id="522"><div class="mejs-volume-current" data-dcnode-id="524" style="bottom: 0px; height: 80%;"></div><div class="mejs-volume-handle" data-dcnode-id="523" style="bottom: 80%; margin-bottom: -3px;"></div></div></a></div><div class="mejs-button mejs-fullscreen-button" data-dcnode-id="518"><button aria-controls="mep_1" aria-label="Fullscreen" data-dcnode-id="519" tabindex="0" title="Fullscreen" type="button"></button></div></div></div></div></div><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">It’s amazing to imagine a black hole that weighs as much as </span><b data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">49 times of our Sun’s mass. </span></b><span data-dcnode-id="509" instrument_node="">In fact, in the moment it merged it shed more energy than&nbsp;</span><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">all of the energy of the stars in the observable universe.</span></strong><span data-dcnode-id="506" instrument_node="">&nbsp;Then imagine having two of those merging together to create a fantastic black hole.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Nevertheless, why do we care if these black holes are merging? It’s fun to think about but what does that do for humanity? What applications does this have?</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">As a result, we can move away from sci-fi and </span><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">towards black-hole astronomy</span></strong><span data-dcnode-id="497" instrument_node="">. An important discipline because at the heart of every galaxy is a supermassive black hole and a possible end of the universe is one filled with just black holes. They can be tough to examine because of the sheer authority over forces like gravity. We can safely say that we’re in a new era of astronomy that has many discoveries just waiting for us.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">&nbsp;</span></p><span data-dcnode-id="492" instrument_node="">
</span><h2 data-dcnode-id="488"><span data-dcnode-id="491" instrument_node="">6) </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uanews.arizona.edu/story/ua-scientists-and-curious-case-warped-kuiper-belt"><span data-dcnode-id="490" instrument_node="">Researchers Discover Evidence of a Lurking Tenth Planet at the Edge of Our Solar System</span></a></h2><span data-dcnode-id="487" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="483" id="attachment_2465" style="width: 970px"><img alt="Planet 10 - ASU" aria-describedby="caption-attachment-2465" class="size-large wp-image-2465" data-dcnode-id="486" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/planet-10-1024x683.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/planet-10-1024x683.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/planet-10-300x200.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/planet-10-768x512.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/planet-10-1080x720.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/planet-10-140x94.jpg 140w, https://brownspaceman.com/wp-content/uploads/2017/12/planet-10.jpg 1200w" width="960"><p class="wp-caption-text" data-dcnode-id="484" id="caption-attachment-2465"><span data-dcnode-id="485" instrument_node="">Credit: Heather Roper/LPL</span></p></div><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Our solar system has been through a lot in the last decade or two. Pluto is not a planet anymore and is considered a dwarf planet, leaving us with 8 planets. That’s not a bad thing just an example of how science and astronomy change rapidly.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">Fast forward to 2014 a possible ninth planet, the size of 10 Earths, may exist beyond Neptune. In fact, it’s so far away that it’s&nbsp;</span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">700 times farther&nbsp;</span></strong><span data-dcnode-id="475" instrument_node="">than the distance from our Sun to planet Earth. Meaning it’s 144 million kilometers x 700! That’s unfathomably far. It’s so far that it takes&nbsp;</span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">10,000 to 20,000 years&nbsp;</span></strong><span data-dcnode-id="472" instrument_node="">to complete one orbit around the Sun! I would not want to have a birthday on that planet.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="469" instrument_node="">Okay, so let’s jump to June of 2017. Astronomers at Arizona State University discover a&nbsp;</span><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">planet 10</span></strong><span data-dcnode-id="466" instrument_node="">. However, this planet is not 700 times farther away or 700 AU but&nbsp;</span><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">60 AU</span></strong><span data-dcnode-id="463" instrument_node="">. The planet’s size is between Mars and Earth, which is a familiar size we can wrap our heads around.</span></p><span data-dcnode-id="461" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="457" id="attachment_2466" style="width: 760px"><img alt="Planetary Object - Planet ten - Orbit" aria-describedby="caption-attachment-2466" class="size-full wp-image-2466" data-dcnode-id="460" height="415" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Planetary-Object-small.png&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Planetary-Object-small.png 750w, https://brownspaceman.com/wp-content/uploads/2017/12/Planetary-Object-small-300x166.png 300w" width="750"><p class="wp-caption-text" data-dcnode-id="458" id="caption-attachment-2466"><span data-dcnode-id="459" instrument_node="">Image: Heather Roper/LPL</span></p></div><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="455" instrument_node="">So&nbsp;</span><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">why is this a big deal?</span></strong><span data-dcnode-id="452" instrument_node=""> Well, for one, the fact we’re&nbsp;</span><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">still finding more planets</span></em><span data-dcnode-id="449" instrument_node=""> after looking up at the night sky for more than a thousand years. You have to think about all this technology that we have and massive telescopes on the ground and in space that are constantly looking all over the universe. It’s&nbsp;</span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">astounding&nbsp;</span></em><span data-dcnode-id="446" instrument_node="">that not only pluto-size planets exist in the Kuiper belt (the ring of asteroids beyond Pluto).</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="443" instrument_node="">The second part is it shows that a solar system can possess&nbsp;</span><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">more planets than we can imagine or estimate</span></strong><span data-dcnode-id="440" instrument_node="">. For example, take our own Milky Way. It has&nbsp;</span><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">100 billion stars</span></strong><span data-dcnode-id="437" instrument_node="">. Pause and think about that for a second.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Each one of those stars has planets. Looking at our own solar system we have 8 major planets and numerous dwarf planets and possibly a half-dozen planets roaming on the outskirts. Why does the number of planets matter?</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">The number matters because it shows us that there could be more possibility of life on other planets. Of course, astronomers care more about the habitable planets. The ones that are like Earth, where you get plenty of Sun and energy. That being said, we know life can really exist&nbsp;</span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">almost anywhere.</span></em><span data-dcnode-id="428" instrument_node=""> For example, the infamous water bear or&nbsp;Tardigrade can survive in close to absolute zero temperatures. That’s nuts!</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">We have a lot to learn about our solar system, but this finding could be the momentum we need to get more eyes on the solar system. Our ancestors would be enthralled to see what humans have discovered about their home, their solar system.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">&nbsp;</span></p><span data-dcnode-id="420" instrument_node="">
</span><h2 data-dcnode-id="416" style="text-align: center;"><span data-dcnode-id="419" instrument_node="">7) </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2017-07-milky.html"><span data-dcnode-id="418" instrument_node="">The Milky Way’s Origins is not what it Seems</span></a></h2><span data-dcnode-id="415" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="411" id="attachment_2467" style="width: 1010px"><img alt="Foreboding Flame - Fred Herrmann 2014" aria-describedby="caption-attachment-2467" class="size-full wp-image-2467" data-dcnode-id="414" height="792" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Foreboding-Flame-Fred-Herrmann-2014.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Foreboding-Flame-Fred-Herrmann-2014.jpg 1000w, https://brownspaceman.com/wp-content/uploads/2017/12/Foreboding-Flame-Fred-Herrmann-2014-300x238.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Foreboding-Flame-Fred-Herrmann-2014-768x608.jpg 768w" width="1000"><p class="wp-caption-text" data-dcnode-id="412" id="caption-attachment-2467"><span data-dcnode-id="413" instrument_node="">Credit: Fred Herrmann 2014</span></p></div><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="409" instrument_node="">One of the important questions we ask as humans and of course in science is&nbsp;</span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">where did we come from? How did we get here? What happened before we got here?&nbsp;</span></em></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">These are all questions that scientists have been chipping away bit by bit. However, most of our answers revolve around Earth and how it came to be this&nbsp;terraqueous blue planet. Our galaxy the Milky Way is a whole different story.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">We know that the Milky Way is a large galaxy, relative to the galaxies we’ve observed thus far, and is about 100,000 light-years across. The&nbsp;</span><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">fascinating part</span></strong><span data-dcnode-id="398" instrument_node=""> is the way galaxies accumulate matter.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">It turns out that when stars go supernova they eject their energy, gas, mass, and dust into space that galactic winds transfer them to other galaxies. We call this an intergalactic transfer. Here’s a simulation by FIRE that shows how galaxies form early on:</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><iframe allow="encrypted-media" allowfullscreen="" data-dcnode-id="392" frameborder="0" gesture="media" height="720" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/5zSjwlleTco%3Ffeature%3Doembed&amp;raw" width="960"></iframe></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="389" instrument_node="">Why this is a big deal is because&nbsp;</span><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">it gave us insight on how galaxies grow in their infant stages</span></strong><span data-dcnode-id="386" instrument_node="">.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Knowing that this happens early on means that our galaxy is made up of many different stars from other galaxies. It’s amazing to think that our star may not even be from the Milky Way but could be from some other galaxy whose star went supernova and ejected their mass. That mass was then carried by a galactic wind and then over time enough of it collected together that it started to form a new star, possibly our Sun. Learning this can make you feel like you are truly unique and got here by such extraordinary events.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">&nbsp;</span></p><span data-dcnode-id="378" instrument_node="">
</span><h2 data-dcnode-id="374" style="text-align: center;"><span data-dcnode-id="377" instrument_node="">8) </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmns.umd.edu/news-events/features/3928"><span data-dcnode-id="376" instrument_node="">Astronomers Capture Unprecedented Detail of Gamma-Ray Burst</span></a></h2><span data-dcnode-id="373" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="369" id="attachment_2471" style="width: 970px"><img alt="Gamma Ray Burst - University of Maryland" aria-describedby="caption-attachment-2471" class="size-large wp-image-2471" data-dcnode-id="372" height="712" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland-1024x759.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland-1024x759.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland-300x222.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland-768x569.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland-1080x800.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/Gamma-Ray-Burst-University-of-Maryland.jpg 1215w" width="960"><p class="wp-caption-text" data-dcnode-id="370" id="caption-attachment-2471"><span data-dcnode-id="371" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="367" instrument_node="">When people think about what the most explosive event is in the universe they may think about the supernova. While they are quite intense events there is one that may&nbsp;</span><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">break your brain.</span></strong><span data-dcnode-id="364" instrument_node=""> Say hello to&nbsp;</span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">the most energetic event in the universe, a&nbsp;</span></em><span data-dcnode-id="361" instrument_node="">Gamma-ray burst.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="358" instrument_node="">What is a gamma-ray burst and how does it happen? Well, it’s when a massive star collapses and forms a black hole. However, this black hole is eating more than it can handle. In fact, it’s so fierce when it eats that it&nbsp;</span><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">ejects matter at the speed of light</span></strong><span data-dcnode-id="355" instrument_node="">. Oh, and did I forget to mention that this ejection can be seen as far as&nbsp;</span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">7.5 billion light-years away from Earth with the naked eye.</span></strong></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">The amount of power a gamma-ray burst emits in the 2 seconds to 30 seconds it’s around for is as much as our Sun’s lifetime of energy!&nbsp;However, don’t fret. Gamma-ray bursts are rare and happen to a galaxy every few million years.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="345"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Now, why is this discovery important?</span></strong></p><span data-dcnode-id="344" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="340" id="attachment_2472" style="width: 812px"><img alt="GRB 160625B" aria-describedby="caption-attachment-2472" class="size-full wp-image-2472" data-dcnode-id="343" height="452" loading="lazy" sizes="(max-width: 802px) 100vw, 802px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/GRB.png&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/GRB.png 802w, https://brownspaceman.com/wp-content/uploads/2017/12/GRB-300x169.png 300w, https://brownspaceman.com/wp-content/uploads/2017/12/GRB-768x433.png 768w" width="802"><p class="wp-caption-text" data-dcnode-id="341" id="caption-attachment-2472"><span data-dcnode-id="342" instrument_node="">Credit: Snapshot of burst via S.Karpov, G.Beskin (SAO RAS and Kazan Federal University, Russia), S.Bondar, E.Ivanov, E.Katkova, N.Orekhova, A.Perkov (OJS RPC PSI, Russia), A.Biryukov (SAI MSU and Kazan Federal University, Russia), V.Sasyuk (Kazan Federal University, Russia)</span></p></div><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Gamma-ray burst were mysteries until 1996 when the first one was detected. The observation of this gamma-ray burst called&nbsp;GRB 160625B (catchy name) answered some long-standing questions.</span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="335" instrument_node="">It helps answer how gamma-ray burst evolve as the dying star collapses to become a black hole. What they learned is that the black hole produces a&nbsp;</span><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">strong magnetic force</span></strong><span data-dcnode-id="332" instrument_node=""> that takes over as the dominant force over the energy emission jets.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Next, as the magnetic field starts to break down, matter takes over and becomes the dominant force over the jets. Researchers thought one or the other would dominate, but didn’t expect both would play such a key role.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Lastly, astronomers have been aching to get data on what’s called Synchrotron radiation. That may sound like jibberish to you, but the significance of that is what happens when electrons are accelerated in a curved or spiral pathway. To put it a little more simply it’s what powers that extremely bright phase of the burst. You need extremely good reaction time and coordination with the telescope to capture this data. And guess what? Your astronomer buddies were able to capture this for the first time!</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">The more we can understand gamma-ray burst the more we can figure out how it all works and possibly keep us out of harm’s way.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">&nbsp;</span></p><span data-dcnode-id="318" instrument_node="">
</span><h2 data-dcnode-id="314" style="text-align: center;"><span data-dcnode-id="317" instrument_node="">9) </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpl.nasa.gov/news/news.php%3Ffeature%3D6948"><span data-dcnode-id="316" instrument_node="">NASA’s Cassini Ends its Historic Exploration of Saturn Mission</span></a></h2><span data-dcnode-id="313" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="309" id="attachment_2475" style="width: 970px"><img alt="Cassini - Grand Finale" aria-describedby="caption-attachment-2475" class="size-large wp-image-2475" data-dcnode-id="312" height="540" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600-1024x576.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600-1024x576.jpg 1024w, https://brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600-300x169.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600-768x432.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600-1080x608.jpg 1080w, https://brownspaceman.com/wp-content/uploads/2017/12/40_CGF_STILL_00022_1600.jpg 1280w" width="960"><p class="wp-caption-text" data-dcnode-id="310" id="caption-attachment-2475"><span data-dcnode-id="311" instrument_node="">Credit: NASA/JPL</span></p></div><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">The Cassini mission will go down as one of the most inspiring and treasured in the history of space exploration. It was also one of the earliest missions where NASA, Italian space agency, and European space agency all collaborated. They gave the end of Cassini’s mission a fitting name, dubbed “Cassini’s Grand Finale.”</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">It wasn’t just a mission where Cassini would simply stop working. Scientists had one final task for Cassini to capture data in a way that had never been done before.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Cassini ‘s task is to enter Saturn’s atmosphere and send back data before it plunges so deep that it would finally crash. This grand&nbsp;finale wasn’t simple and required the spacecraft to maneuver between Saturn and its rings. The rings would pose one of the greatest threats because it’s filled with icy rocks that range anywhere from a micrometer to a meter in size. In space, where friction is almost non-existent, an impact from any of these rocks would cause major damages.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><iframe allow="encrypted-media" allowfullscreen="" data-dcnode-id="298" frameborder="0" gesture="media" height="540" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/videoseries%3Flist%3DPLTiv_XWHnOZpKPaDTVy36z0U8GxoiIkZa&amp;raw" width="960"></iframe></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">The Cassini mission wasn’t just about Saturn but also the moons. Titan, a rare moon in our solar system that has an atmosphere and a hydrocarbon sea, gave us so much wealth of knowledge that even sci-fi couldn’t have painted such an amazing world. I mean, we actually landed a human-made probe on Titan! That feat still astounds me to this day.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The mountain of data that Cassini has provided will not only change how we look at Saturn in 2017 but as we dig more into the data, will discover even more about Saturn in the years to come.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">&nbsp;</span></p><span data-dcnode-id="287" instrument_node="">
</span><h2 data-dcnode-id="283" style="text-align: center;"><span data-dcnode-id="286" instrument_node="">10) </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astronomy.com/news/2017/11/zombie"><span data-dcnode-id="285" instrument_node="">Scientists Discover Bizarre Star that Goes Supernova Twice</span></a></h2><span data-dcnode-id="282" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="278" id="attachment_2477" style="width: 910px"><img alt="Supernova Concept - Zombie Star" aria-describedby="caption-attachment-2477" class="size-full wp-image-2477" data-dcnode-id="281" height="675" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/SNconcept.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/SNconcept.jpg 900w, https://brownspaceman.com/wp-content/uploads/2017/12/SNconcept-300x225.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/SNconcept-768x576.jpg 768w, https://brownspaceman.com/wp-content/uploads/2017/12/SNconcept-510x382.jpg 510w" width="900"><p class="wp-caption-text" data-dcnode-id="279" id="caption-attachment-2477"><span data-dcnode-id="280" instrument_node="">Credit: NASA</span></p></div><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">We’ve gone through many different bizarre and exciting stories in 2017. However, I believe this one takes the cake for really surprising all of us.</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">A star called&nbsp;iPTF14hls (another catchy name) turns out to have gone supernova twice. Usually, after the initial supernova, the brightness dims after 100-days. What makes this star even stranger is the fact it has fluctuated between bright and dim five times over the course of three years. Could you imagine our Sun changing dramatically between dim and bright in our sky over three years? That would probably freak you out a little at the very least.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">What’s interesting is they observed IPTF14hls not only gone supernova twice in the last three years but erupted 60 years ago as well!</span></p><span data-dcnode-id="268" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="264" id="attachment_2479" style="width: 910px"><img alt="Supernova Brightness - iPTF14hls" aria-describedby="caption-attachment-2479" class="size-full wp-image-2479" data-dcnode-id="267" height="759" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/uploads/2017/12/SNbrightness.jpg&amp;raw" srcset="https://brownspaceman.com/wp-content/uploads/2017/12/SNbrightness.jpg 900w, https://brownspaceman.com/wp-content/uploads/2017/12/SNbrightness-300x253.jpg 300w, https://brownspaceman.com/wp-content/uploads/2017/12/SNbrightness-768x648.jpg 768w" width="900"><p class="wp-caption-text" data-dcnode-id="265" id="caption-attachment-2479"><span data-dcnode-id="266" instrument_node="">Credit: S. Wilkinson/LCO</span></p></div><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Up until now, scientists have always seen a star completely die once it has gone supernova. However, this star is breaking all the rules and has deeply perplexed us in how stars could do this.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">The leading theory is called pulsational pair-instability. This requires the star to be about 130 solar masses (130 of our Sun). What happens is when a star reaches a size above 100 solar masses that it starts to behave differently. A star is always fighting to stay in equilibrium between balancing pressure and the force of gravity (pressure pushing out and gravity pushing in). This massive star then increases its core temperature to 1 billion degrees C. Over time this core temperature rises to 3 billion degrees C.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Now, at these temperatures oxygen fuses explosively and blows off massive amounts of matter, the object shrinks, and resets the cycle. The process repeats until the star reaches a stable mass. When the ejected shell hits the trailing edge fo the previous shell, it releases energy as light.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">What is strange is this would normally explain iPTF4hls except the fact that pulsational pair-instability stars end their life in black holes. That is not the case here, which makes this discovery all the more exciting to figure out what is happening.</span></p><span data-dcnode-id="251" instrument_node="">
</span><div class="ts-fab-wrapper" data-dcnode-id="146" id="ts-fab-below"><span class="screen-reader-text" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">The following two tabs change content below.</span></span><ul class="ts-fab-list" data-dcnode-id="242"><li class="ts-fab-bio-link active" data-dcnode-id="246"><a data-dcnode-id="247" href="#ts-fab-bio-below"><span data-dcnode-id="248" instrument_node="">Bio</span></a></li><li class="ts-fab-latest-posts-link" data-dcnode-id="243"><a data-dcnode-id="244" href="#ts-fab-latest-posts-below"><span data-dcnode-id="245" instrument_node="">Latest Posts</span></a></li></ul><div class="ts-fab-tabs" data-dcnode-id="148"><span data-dcnode-id="241" instrument_node="">

man.com/wp-content/plugins/fancier-author-box/images/linkedin.png&amp;raw" width="24"></a><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//instagram.com/zbopinspace/" rel="nofollow" title="Instagram"><img alt="My Instagram profile" data-dcnode-id="230" height="24" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/plugins/fancier-author-box/images/instagram.png&amp;raw" width="24"></a><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brownspaceman.tumblr.com/" rel="nofollow" title="Tumblr"><img alt="My Tumblr blog" data-dcnode-id="228" height="24" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brownspaceman.com/wp-content/plugins/fancier-author-box/images/tumblr.png&amp;raw" width="24"></a></div><span data-dcnode-id="225" instrument_node="">

</span><div class="ts-fab-content" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Zain is a well travelled astronomy blogger and has been writing since 2013. He has a passion for science education and has been accepted into NASA social program for MAVEN launch. When he's not being a space cadet he's rock climbing outdoors with friends.</span></div><span data-dcnode-id="213" instrument_node="">
