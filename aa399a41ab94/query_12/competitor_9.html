</span><div class="thumb tright" data-dcnode-id="4746"><div class="thumbinner" data-dcnode-id="4747" style="width:352px;"><a class="image" data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACentreMilkyWayMap.png"><img alt="" class="thumbimage" data-dcnode-id="4754" data-file-height="3256" data-file-width="3830" decoding="async" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/CentreMilkyWayMap.png/350px-CentreMilkyWayMap.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/CentreMilkyWayMap.png/525px-CentreMilkyWayMap.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/CentreMilkyWayMap.png/700px-CentreMilkyWayMap.png 2x" width="350"></a><span data-dcnode-id="4752" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4748"><div class="magnify" data-dcnode-id="4750"><a class="internal" data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACentreMilkyWayMap.png" title="Enlarge"></a></div><span data-dcnode-id="4749" instrument_node="">A starchart of the night sky towards the galactic center.</span></div></div></div><span data-dcnode-id="4745" instrument_node="">
</span><p data-dcnode-id="4671"><span data-dcnode-id="4744" instrument_node="">The </span><b data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Galactic Center</span></b><span data-dcnode-id="4741" instrument_node=""> (or </span><b data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">Galactic Centre</span></b><span data-dcnode-id="4738" instrument_node="">) is the rotational center, the </span><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barycenter" title="Barycenter"><span data-dcnode-id="4737" instrument_node="">barycenter</span></a><span data-dcnode-id="4735" instrument_node="">, of the </span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" title="Milky Way"><span data-dcnode-id="4734" instrument_node="">Milky Way</span></a><span data-dcnode-id="4732" instrument_node=""> </span><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy" title="Galaxy"><span data-dcnode-id="4731" instrument_node="">galaxy</span></a><span data-dcnode-id="4729" instrument_node="">.</span><sup class="reference" data-dcnode-id="4726" id="cite_ref-NYT-20220131_1-0"><a data-dcnode-id="4727" href="#cite_note-NYT-20220131-1"><span data-dcnode-id="4728" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4723" id="cite_ref-ARX-20220128_2-0"><a data-dcnode-id="4724" href="#cite_note-ARX-20220128-2"><span data-dcnode-id="4725" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4722" instrument_node=""> Its </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_massive_object" title="Central massive object"><span data-dcnode-id="4721" instrument_node="">central massive object</span></a><span data-dcnode-id="4719" instrument_node=""> is a </span><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supermassive_black_hole" title="Supermassive black hole"><span data-dcnode-id="4718" instrument_node="">supermassive black hole</span></a><span data-dcnode-id="4716" instrument_node=""> of about 4 million </span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_mass" title="Solar mass"><span data-dcnode-id="4715" instrument_node="">solar masses</span></a><span data-dcnode-id="4713" instrument_node="">, which is called </span><a data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_A%2A" title="Sagittarius A*"><span data-dcnode-id="4712" instrument_node="">Sagittarius A*</span></a><span data-dcnode-id="4710" instrument_node="">,</span><sup class="reference" data-dcnode-id="4707" id="cite_ref-ALMA_3-0"><a data-dcnode-id="4708" href="#cite_note-ALMA-3"><span data-dcnode-id="4709" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="4704" id="cite_ref-EHS_4-0"><a data-dcnode-id="4705" href="#cite_note-EHS-4"><span data-dcnode-id="4706" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4701" id="cite_ref-gillessenetal2009_5-0"><a data-dcnode-id="4702" href="#cite_note-gillessenetal2009-5"><span data-dcnode-id="4703" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4700" instrument_node=""> a compact </span><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_radio_source" title="Astronomical radio source"><span data-dcnode-id="4699" instrument_node="">radio source</span></a><span data-dcnode-id="4697" instrument_node=""> which is almost exactly at the galactic rotational center. The Galactic Center is approximately 8 kiloparsecs (26,000&nbsp;ly) away from Earth</span><sup class="reference" data-dcnode-id="4694" id="cite_ref-GRAVITY_6-0"><a data-dcnode-id="4695" href="#cite_note-GRAVITY-6"><span data-dcnode-id="4696" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4693" instrument_node=""> in the direction of the </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constellation" title="Constellation"><span data-dcnode-id="4692" instrument_node="">constellations</span></a><span data-dcnode-id="4690" instrument_node=""> </span><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_%28constellation%29" title="Sagittarius (constellation)"><span data-dcnode-id="4689" instrument_node="">Sagittarius</span></a><span data-dcnode-id="4687" instrument_node="">, </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ophiuchus" title="Ophiuchus"><span data-dcnode-id="4686" instrument_node="">Ophiuchus</span></a><span data-dcnode-id="4684" instrument_node="">, and </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scorpius" title="Scorpius"><span data-dcnode-id="4683" instrument_node="">Scorpius</span></a><span data-dcnode-id="4681" instrument_node="">, where the Milky Way appears brightest, visually close to the </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Butterfly_Cluster" title="Butterfly Cluster"><span data-dcnode-id="4680" instrument_node="">Butterfly Cluster</span></a><span data-dcnode-id="4678" instrument_node=""> (M6) or the star </span><a class="mw-redirect" data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shaula" title="Shaula"><span data-dcnode-id="4677" instrument_node="">Shaula</span></a><span data-dcnode-id="4675" instrument_node="">, south to the </span><a data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pipe_Nebula" title="Pipe Nebula"><span data-dcnode-id="4674" instrument_node="">Pipe Nebula</span></a><span data-dcnode-id="4672" instrument_node="">.
</span></p><p data-dcnode-id="4651"><span data-dcnode-id="4670" instrument_node="">There are around 10 million </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="4669" instrument_node="">stars</span></a><span data-dcnode-id="4667" instrument_node=""> within one </span><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parsec" title="Parsec"><span data-dcnode-id="4666" instrument_node="">parsec</span></a><span data-dcnode-id="4664" instrument_node=""> of the Galactic Center, dominated by </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_giant" title="Red giant"><span data-dcnode-id="4663" instrument_node="">red giants</span></a><span data-dcnode-id="4661" instrument_node="">, with a significant population of massive </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supergiant" title="Supergiant"><span data-dcnode-id="4660" instrument_node="">supergiants</span></a><span data-dcnode-id="4658" instrument_node=""> and </span><a data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wolf%25E2%2580%2593Rayet_star" title="Wolf–Rayet star"><span data-dcnode-id="4657" instrument_node="">Wolf–Rayet stars</span></a><span data-dcnode-id="4655" instrument_node=""> from star formation in the region around 1 million years ago. The core stars are a small part within the much wider </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galactic_bulge" title="Galactic bulge"><span data-dcnode-id="4654" instrument_node="">galactic bulge</span></a><span data-dcnode-id="4652" instrument_node="">.
</span></p><span data-dcnode-id="4650" instrument_node="">

</span><h2 data-dcnode-id="4548"><span class="mw-headline" data-dcnode-id="4556" id="Discovery"><span data-dcnode-id="4557" instrument_node="">Discovery</span></span><span class="mw-editsection" data-dcnode-id="4549"><span class="mw-editsection-bracket" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">[</span></span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D1" title="Edit section: Discovery"><span data-dcnode-id="4553" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4547" instrument_node="">
</span><p data-dcnode-id="4521"><span data-dcnode-id="4546" instrument_node="">Because of </span><a data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstellar_cloud" title="Interstellar cloud"><span data-dcnode-id="4545" instrument_node="">interstellar dust</span></a><span data-dcnode-id="4543" instrument_node=""> along the line of sight, the Galactic Center cannot be studied at </span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visible_spectrum" title="Visible spectrum"><span data-dcnode-id="4542" instrument_node="">visible</span></a><span data-dcnode-id="4540" instrument_node="">, </span><a data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraviolet" title="Ultraviolet"><span data-dcnode-id="4539" instrument_node="">ultraviolet</span></a><span data-dcnode-id="4537" instrument_node="">, or soft (low-energy) </span><a data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray" title="X-ray"><span data-dcnode-id="4536" instrument_node="">X-ray</span></a><span data-dcnode-id="4534" instrument_node=""> </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="4533" instrument_node="">wavelengths</span></a><span data-dcnode-id="4531" instrument_node="">. The available information about the Galactic Center comes from observations at </span><a data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma_ray" title="Gamma ray"><span data-dcnode-id="4530" instrument_node="">gamma ray</span></a><span data-dcnode-id="4528" instrument_node="">, hard (high-energy) X-ray, </span><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared" title="Infrared"><span data-dcnode-id="4527" instrument_node="">infrared</span></a><span data-dcnode-id="4525" instrument_node="">, submillimetre, and </span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_wave" title="Radio wave"><span data-dcnode-id="4524" instrument_node="">radio</span></a><span data-dcnode-id="4522" instrument_node=""> wavelengths.
</span></p><span data-dcnode-id="4520" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4506"><div class="thumbinner" data-dcnode-id="4507" style="width:262px;"><span class="mw-tmh-player video" data-dcnode-id="4516"><video class="thumbimage" data-dcnode-id="4519" data-durationhint="157" data-mwprovider="wikimediacommons" data-mwtitle="Infrared-visible_light_comparison_of_VISTA’s_gigapixel_view_of_the_centre_of_the_Milky_Way.ogv" disabled="disabled" height="146" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Infrared-visible_light_comparison_of_VISTA%E2%80%99s_gigapixel_view_of_the_centre_of_the_Milky_Way.ogv/260px--Infrared-visible_light_comparison_of_VISTA%E2%80%99s_gigapixel_view_of_the_centre_of_the_Milky_Way.ogv.jpg" preload="none" tabindex="-1" width="260"></video><a class="mw-tmh-play" data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInfrared-visible_light_comparison_of_VISTA%25E2%2580%2599s_gigapixel_view_of_the_centre_of_the_Milky_Way.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="4518"></span></a></span><span data-dcnode-id="4515" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4508"><div class="magnify" data-dcnode-id="4513"><a class="internal" data-dcnode-id="4514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInfrared-visible_light_comparison_of_VISTA%25E2%2580%2599s_gigapixel_view_of_the_centre_of_the_Milky_Way.ogv" title="Enlarge"></a></div><span data-dcnode-id="4512" instrument_node="">This pan video gives a closer look at a huge image of the central parts of the Milky Way made by combining thousands of images from ESO's </span><a data-dcnode-id="4510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/VISTA_%28telescope%29" title="VISTA (telescope)"><span data-dcnode-id="4511" instrument_node="">VISTA telescope</span></a><span data-dcnode-id="4509" instrument_node=""> on Paranal in Chile and compares it with the view in visible light. Because VISTA has a camera sensitive to infrared light, it can see through much of the dust blocking the view in visible light, although many more opaque dust filaments still show up well in this picture.</span></div></div></div><span data-dcnode-id="4505" instrument_node="">
</span><p data-dcnode-id="4451"><a data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" title="Immanuel Kant"><span data-dcnode-id="4504" instrument_node="">Immanuel Kant</span></a><span data-dcnode-id="4502" instrument_node=""> stated in </span><i data-dcnode-id="4499"><a class="mw-redirect" data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Natural_History_and_Theory_of_the_Heavens" title="General Natural History and Theory of the Heavens"><span data-dcnode-id="4501" instrument_node="">General Natural History and Theory of the Heavens</span></a></i><span data-dcnode-id="4498" instrument_node=""> (1755) that a large star was at the center of the Milky Way Galaxy, and that </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sirius" title="Sirius"><span data-dcnode-id="4497" instrument_node="">Sirius</span></a><span data-dcnode-id="4495" instrument_node=""> might be the star.</span><sup class="reference" data-dcnode-id="4492" id="cite_ref-ley196508_7-0"><a data-dcnode-id="4493" href="#cite_note-ley196508-7"><span data-dcnode-id="4494" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4491" instrument_node=""> </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlow_Shapley" title="Harlow Shapley"><span data-dcnode-id="4490" instrument_node="">Harlow Shapley</span></a><span data-dcnode-id="4488" instrument_node=""> stated in 1918 that the halo of </span><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globular_cluster" title="Globular cluster"><span data-dcnode-id="4487" instrument_node="">globular clusters</span></a><span data-dcnode-id="4485" instrument_node=""> surrounding the Milky Way seemed to be centered on the star swarms in the constellation of Sagittarius, but the dark </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molecular_cloud" title="Molecular cloud"><span data-dcnode-id="4484" instrument_node="">molecular clouds</span></a><span data-dcnode-id="4482" instrument_node=""> in the area blocked the view for optical astronomy.</span><sup class="reference" data-dcnode-id="4479" id="cite_ref-shapley_8-0"><a data-dcnode-id="4480" href="#cite_note-shapley-8"><span data-dcnode-id="4481" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4478" instrument_node=""> In the early 1940s </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Baade" title="Walter Baade"><span data-dcnode-id="4477" instrument_node="">Walter Baade</span></a><span data-dcnode-id="4475" instrument_node=""> at </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Wilson_Observatory" title="Mount Wilson Observatory"><span data-dcnode-id="4474" instrument_node="">Mount Wilson Observatory</span></a><span data-dcnode-id="4472" instrument_node=""> took advantage of </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blackout_%28wartime%29%23World_War_II" title="Blackout (wartime)"><span data-dcnode-id="4471" instrument_node="">wartime blackout</span></a><span data-dcnode-id="4469" instrument_node=""> conditions in nearby Los Angeles to conduct a search for the center with the 100-inch (250&nbsp;cm) </span><a class="mw-redirect" data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooker_Telescope" title="Hooker Telescope"><span data-dcnode-id="4468" instrument_node="">Hooker Telescope</span></a><span data-dcnode-id="4466" instrument_node="">. He found that near the star </span><a class="mw-redirect" data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alnasl" title="Alnasl"><span data-dcnode-id="4465" instrument_node="">Alnasl</span></a><span data-dcnode-id="4463" instrument_node=""> (Gamma Sagittarii) there is a one-degree-wide void in the interstellar dust lanes, which provides a relatively clear view of the swarms of stars around the nucleus of the Milky Way Galaxy.</span><sup class="reference" data-dcnode-id="4460" id="cite_ref-baade_9-0"><a data-dcnode-id="4461" href="#cite_note-baade-9"><span data-dcnode-id="4462" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4459" instrument_node=""> This gap has been known as </span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baade%2527s_Window" title="Baade's Window"><span data-dcnode-id="4458" instrument_node="">Baade's Window</span></a><span data-dcnode-id="4456" instrument_node=""> ever since.</span><sup class="reference" data-dcnode-id="4453" id="cite_ref-ng_10-0"><a data-dcnode-id="4454" href="#cite_note-ng-10"><span data-dcnode-id="4455" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4452" instrument_node="">
</span></p><p data-dcnode-id="4421"><span data-dcnode-id="4450" instrument_node="">At </span><a class="mw-redirect" data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dover_Heights" title="Dover Heights"><span data-dcnode-id="4449" instrument_node="">Dover Heights</span></a><span data-dcnode-id="4447" instrument_node=""> in Sydney, Australia, a team of radio astronomers from the Division of Radiophysics at the </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CSIRO" title="CSIRO"><span data-dcnode-id="4446" instrument_node="">CSIRO</span></a><span data-dcnode-id="4444" instrument_node="">, led by </span><a class="mw-redirect" data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Lade_Pawsey" title="Joseph Lade Pawsey"><span data-dcnode-id="4443" instrument_node="">Joseph Lade Pawsey</span></a><span data-dcnode-id="4441" instrument_node="">, used '</span><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_interferometry" title="Sea interferometry"><span data-dcnode-id="4440" instrument_node="">sea interferometry</span></a><span data-dcnode-id="4438" instrument_node="">' to discover some of the first interstellar and intergalactic radio sources, including </span><a class="mw-redirect" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taurus_A" title="Taurus A"><span data-dcnode-id="4437" instrument_node="">Taurus A</span></a><span data-dcnode-id="4435" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virgo_A" title="Virgo A"><span data-dcnode-id="4434" instrument_node="">Virgo A</span></a><span data-dcnode-id="4432" instrument_node=""> and </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centaurus_A" title="Centaurus A"><span data-dcnode-id="4431" instrument_node="">Centaurus A</span></a><span data-dcnode-id="4429" instrument_node="">. By 1954 they had built an 80-foot (24&nbsp;m) fixed dish antenna and used it to make a detailed study of an extended, extremely powerful belt of radio emission that was detected in Sagittarius. They named an intense point-source near the center of this belt </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_A" title="Sagittarius A"><span data-dcnode-id="4428" instrument_node="">Sagittarius A</span></a><span data-dcnode-id="4426" instrument_node="">, and realised that it was located at the very center of the Galaxy, despite being some 32 degrees south-west of the conjectured galactic center of the time.</span><sup class="reference" data-dcnode-id="4423" id="cite_ref-pawsey_11-0"><a data-dcnode-id="4424" href="#cite_note-pawsey-11"><span data-dcnode-id="4425" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4422" instrument_node="">
</span></p><p data-dcnode-id="4383"><span data-dcnode-id="4420" instrument_node="">In 1958 the </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Astronomical_Union" title="International Astronomical Union"><span data-dcnode-id="4419" instrument_node="">International Astronomical Union</span></a><span data-dcnode-id="4417" instrument_node=""> (IAU) decided to adopt the position of Sagittarius A as the true zero coordinate point for the system of </span><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galactic_coordinate_system" title="Galactic coordinate system"><span data-dcnode-id="4416" instrument_node="">
galactic latitude and longitude</span></a><span data-dcnode-id="4414" instrument_node="">.</span><sup class="reference" data-dcnode-id="4411" id="cite_ref-iau_12-0"><a data-dcnode-id="4412" href="#cite_note-iau-12"><span data-dcnode-id="4413" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4410" instrument_node=""> In the </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equatorial_coordinate_system" title="Equatorial coordinate system"><span data-dcnode-id="4409" instrument_node="">equatorial coordinate system</span></a><span data-dcnode-id="4407" instrument_node=""> the location is: </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_ascension" title="Right ascension"><span data-dcnode-id="4406" instrument_node="">RA</span></a><span data-dcnode-id="4404" instrument_node=""> </span><span class="nowrap" data-dcnode-id="4394"><span data-dcnode-id="4403" instrument_node="">17</span><sup data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">h</span></sup><span data-dcnode-id="4400" instrument_node=""> 45</span><sup data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">m</span></sup><span data-dcnode-id="4397" instrument_node=""> 40.04</span><sup data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">s</span></sup></span><span data-dcnode-id="4393" instrument_node="">, </span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Declination" title="Declination"><span data-dcnode-id="4392" instrument_node="">Dec</span></a><span data-dcnode-id="4390" instrument_node=""> −29°&nbsp;00′&nbsp;28.1″ (</span><a class="mw-redirect" data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J2000" title="J2000"><span data-dcnode-id="4389" instrument_node="">J2000</span></a><span data-dcnode-id="4387" instrument_node=""> </span><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epoch_%28astronomy%29" title="Epoch (astronomy)"><span data-dcnode-id="4386" instrument_node="">epoch</span></a><span data-dcnode-id="4384" instrument_node="">).
</span></p><span data-dcnode-id="4382" instrument_node="">
</span><h2 data-dcnode-id="4372"><span class="mw-headline" data-dcnode-id="4380" id="Distance_to_the_Galactic_Center"><span data-dcnode-id="4381" instrument_node="">Distance to the Galactic Center</span></span><span class="mw-editsection" data-dcnode-id="4373"><span class="mw-editsection-bracket" data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">[</span></span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D2" title="Edit section: Distance to the Galactic Center"><span data-dcnode-id="4377" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4371" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4360"><div class="thumbinner" data-dcnode-id="4361" style="width:262px;"><span class="mw-tmh-player video" data-dcnode-id="4367"><video class="thumbimage" data-dcnode-id="4370" data-durationhint="36" data-mwprovider="wikimediacommons" data-mwtitle="Simulation_of_the_X-shaped_bulge_of_the_Milky_Way.ogv" disabled="disabled" height="146" id="mwe_player_1_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Simulation_of_the_X-shaped_bulge_of_the_Milky_Way.ogv/260px--Simulation_of_the_X-shaped_bulge_of_the_Milky_Way.ogv.jpg" preload="none" tabindex="-1" width="260"></video><a class="mw-tmh-play" data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASimulation_of_the_X-shaped_bulge_of_the_Milky_Way.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="4369"></span></a></span><span data-dcnode-id="4366" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4362"><div class="magnify" data-dcnode-id="4364"><a class="internal" data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASimulation_of_the_X-shaped_bulge_of_the_Milky_Way.ogv" title="Enlarge"></a></div><span data-dcnode-id="4363" instrument_node="">Animation of a barred galaxy like the Milky Way showing the presence of an X-shaped bulge. The X-shape extends to about one half of the bar radius. It is directly visible when the bar is seen from the side, but when the viewer is close to the long axis of the bar it cannot be seen directly and its presence can only be inferred from the distribution of brightnesses of stars along a given direction.</span></div></div></div><span data-dcnode-id="4359" instrument_node="">
</span><p data-dcnode-id="4337"><span data-dcnode-id="4358" instrument_node="">The exact distance between the </span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="4357" instrument_node="">Solar System</span></a><span data-dcnode-id="4355" instrument_node=""> and the Galactic Center is not certain,</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-malkin13_13-0"><a data-dcnode-id="4353" href="#cite_note-malkin13-13"><span data-dcnode-id="4354" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4351" instrument_node=""> although estimates since 2000 have remained within the range 24–28.4 </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light-year%23Definitions" title="Light-year"><span data-dcnode-id="4350" instrument_node="">kilolight-years</span></a><span data-dcnode-id="4348" instrument_node=""> (7.4–8.7 </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parsec%23Parsecs_and_kiloparsecs" title="Parsec"><span data-dcnode-id="4347" instrument_node="">kiloparsecs</span></a><span data-dcnode-id="4345" instrument_node="">).</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-francis14_14-0"><a data-dcnode-id="4343" href="#cite_note-francis14-14"><span data-dcnode-id="4344" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4341" instrument_node=""> The latest estimates from geometric-based methods and </span><a data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_distance_ladder" title="Cosmic distance ladder"><span data-dcnode-id="4340" instrument_node="">standard candles</span></a><span data-dcnode-id="4338" instrument_node=""> yield the following distances to the Galactic Center:
</span></p><span data-dcnode-id="4336" instrument_node="">

</span><p data-dcnode-id="4088"><br data-dcnode-id="4121"><span data-dcnode-id="4120" instrument_node="">
An accurate determination of the distance to the Galactic Center as established from </span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variable_star" title="Variable star"><span data-dcnode-id="4119" instrument_node="">variable stars</span></a><span data-dcnode-id="4117" instrument_node=""> (e.g. </span><a data-dcnode-id="4115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RR_Lyrae_variable" title="RR Lyrae variable"><span data-dcnode-id="4116" instrument_node="">RR Lyrae variables</span></a><span data-dcnode-id="4114" instrument_node="">) or </span><a class="mw-redirect" data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_candle" title="Standard candle"><span data-dcnode-id="4113" instrument_node="">standard candles</span></a><span data-dcnode-id="4111" instrument_node=""> (e.g. </span><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_clump" title="Red clump"><span data-dcnode-id="4110" instrument_node="">red-clump</span></a><span data-dcnode-id="4108" instrument_node=""> stars) is hindered by numerous effects, which include: an ambiguous </span><a class="mw-redirect" data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reddening_law" title="Reddening law"><span data-dcnode-id="4107" instrument_node="">reddening law</span></a><span data-dcnode-id="4105" instrument_node="">; a bias for smaller values of the distance to the Galactic Center because of a preferential sampling of stars toward the near side of the </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galactic_bulge" title="Galactic bulge"><span data-dcnode-id="4104" instrument_node="">Galactic bulge</span></a><span data-dcnode-id="4102" instrument_node=""> owing to </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extinction_%28astronomy%29" title="Extinction (astronomy)"><span data-dcnode-id="4101" instrument_node="">interstellar extinction</span></a><span data-dcnode-id="4099" instrument_node="">; and an uncertainty in characterizing how a mean distance to a group of </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Variable_star" title="Variable star"><span data-dcnode-id="4098" instrument_node="">variable stars</span></a><span data-dcnode-id="4096" instrument_node=""> found in the direction of the Galactic bulge relates to the distance to the Galactic Center.</span><sup class="reference" data-dcnode-id="4093" id="cite_ref-majaess10_24-0"><a data-dcnode-id="4094" href="#cite_note-majaess10-24"><span data-dcnode-id="4095" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="4090" id="cite_ref-vovk_25-0"><a data-dcnode-id="4091" href="#cite_note-vovk-25"><span data-dcnode-id="4092" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4089" instrument_node="">
</span></p><p data-dcnode-id="4037"><span data-dcnode-id="4087" instrument_node="">The nature of the Milky Way's </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barred_spiral_galaxy" title="Barred spiral galaxy"><span data-dcnode-id="4086" instrument_node="">bar</span></a><span data-dcnode-id="4084" instrument_node="">, which extends across the Galactic Center, is also actively debated, with estimates for its half-length and orientation spanning between 1–5 kpc (short or a long bar) and 10–50°.</span><sup class="reference" data-dcnode-id="4081" id="cite_ref-vanhollebeke09_22-1"><a data-dcnode-id="4082" href="#cite_note-vanhollebeke09-22"><span data-dcnode-id="4083" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="4078" id="cite_ref-majaess10_24-1"><a data-dcnode-id="4079" href="#cite_note-majaess10-24"><span data-dcnode-id="4080" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="4075" id="cite_ref-Cabrera-Lavers08_26-0"><a data-dcnode-id="4076" href="#cite_note-Cabrera-Lavers08-26"><span data-dcnode-id="4077" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4074" instrument_node=""> Certain authors advocate that the Milky Way features two distinct bars, one nestled within the other.</span><sup class="reference" data-dcnode-id="4071" id="cite_ref-nishiyama06_27-0"><a data-dcnode-id="4072" href="#cite_note-nishiyama06-27"><span data-dcnode-id="4073" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4070" instrument_node=""> The bar is delineated by red-clump stars (see also </span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_giant" title="Red giant"><span data-dcnode-id="4069" instrument_node="">red giant</span></a><span data-dcnode-id="4067" instrument_node="">); however, </span><a data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RR_Lyrae_variable" title="RR Lyrae variable"><span data-dcnode-id="4066" instrument_node="">RR Lyrae variables</span></a><span data-dcnode-id="4064" instrument_node=""> do not trace a prominent Galactic bar.</span><sup class="reference" data-dcnode-id="4061" id="cite_ref-majaess10_24-2"><a data-dcnode-id="4062" href="#cite_note-majaess10-24"><span data-dcnode-id="4063" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="4058" id="cite_ref-alcock98_28-0"><a data-dcnode-id="4059" href="#cite_note-alcock98-28"><span data-dcnode-id="4060" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="4055" id="cite_ref-kunder08_29-0"><a data-dcnode-id="4056" href="#cite_note-kunder08-29"><span data-dcnode-id="4057" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4054" instrument_node=""> The bar may be surrounded by a ring called the </span><i data-dcnode-id="4049"><span data-dcnode-id="4053" instrument_node="">5-</span><a class="mw-redirect" data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiloparsec" title="Kiloparsec"><span data-dcnode-id="4052" instrument_node="">kpc</span></a><span data-dcnode-id="4050" instrument_node=""> ring</span></i><span data-dcnode-id="4048" instrument_node=""> that contains a large fraction of the molecular hydrogen present in the Milky Way, and most of the Milky Way's </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_formation" title="Star formation"><span data-dcnode-id="4047" instrument_node="">star formation</span></a><span data-dcnode-id="4045" instrument_node=""> activity. Viewed from the </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andromeda_Galaxy" title="Andromeda Galaxy"><span data-dcnode-id="4044" instrument_node="">Andromeda Galaxy</span></a><span data-dcnode-id="4042" instrument_node="">, it would be the brightest feature of the Milky Way.</span><sup class="reference" data-dcnode-id="4039" id="cite_ref-fn14_30-0"><a data-dcnode-id="4040" href="#cite_note-fn14-30"><span data-dcnode-id="4041" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4038" instrument_node="">
</span></p><span data-dcnode-id="4036" instrument_node="">
</span><h2 data-dcnode-id="4026"><span class="mw-headline" data-dcnode-id="4034" id="Supermassive_black_hole"><span data-dcnode-id="4035" instrument_node="">Supermassive black hole</span></span><span class="mw-editsection" data-dcnode-id="4027"><span class="mw-editsection-bracket" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">[</span></span><a data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D3" title="Edit section: Supermassive black hole"><span data-dcnode-id="4031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4025" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4016"><div class="thumbinner" data-dcnode-id="4017" style="width:262px;"><a class="image" data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACenter_of_the_Milky_Way_Galaxy_IV_%25E2%2580%2593_Composite.jpg"><img alt="" class="thumbimage" data-dcnode-id="4024" data-file-height="4862" data-file-width="9725" decoding="async" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Center_of_the_Milky_Way_Galaxy_IV_%25E2%2580%2593_Composite.jpg/260px-Center_of_the_Milky_Way_Galaxy_IV_%25E2%2580%2593_Composite.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Center_of_the_Milky_Way_Galaxy_IV_%E2%80%93_Composite.jpg/390px-Center_of_the_Milky_Way_Galaxy_IV_%E2%80%93_Composite.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Center_of_the_Milky_Way_Galaxy_IV_%E2%80%93_Composite.jpg/520px-Center_of_the_Milky_Way_Galaxy_IV_%E2%80%93_Composite.jpg 2x" width="260"></a><span data-dcnode-id="4022" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4018"><div class="magnify" data-dcnode-id="4020"><a class="internal" data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACenter_of_the_Milky_Way_Galaxy_IV_%25E2%2580%2593_Composite.jpg" title="Enlarge"></a></div><span data-dcnode-id="4019" instrument_node="">There is a supermassive black hole in the bright white area to the right of the center of the image. This composite photograph covers about half of a degree.</span></div></div></div><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="3992"><span data-dcnode-id="4014" instrument_node="">The complex </span><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_radio_source" title="Astronomical radio source"><span data-dcnode-id="4013" instrument_node="">astronomical radio source</span></a><span data-dcnode-id="4011" instrument_node=""> </span><a data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_A" title="Sagittarius A"><span data-dcnode-id="4010" instrument_node="">Sagittarius A</span></a><span data-dcnode-id="4008" instrument_node=""> appears to be located almost exactly at the Galactic Center and contains an intense compact radio source, </span><a data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_A%2A" title="Sagittarius A*"><span data-dcnode-id="4007" instrument_node="">Sagittarius A*</span></a><span data-dcnode-id="4005" instrument_node="">, which coincides with a </span><a data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supermassive_black_hole" title="Supermassive black hole"><span data-dcnode-id="4004" instrument_node="">supermassive black hole</span></a><span data-dcnode-id="4002" instrument_node=""> at the center of the Milky Way. </span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accretion_%28astrophysics%29" title="Accretion (astrophysics)"><span data-dcnode-id="4001" instrument_node="">Accretion</span></a><span data-dcnode-id="3999" instrument_node=""> of gas onto the </span><a data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_hole" title="Black hole"><span data-dcnode-id="3998" instrument_node="">black hole</span></a><span data-dcnode-id="3996" instrument_node="">, probably involving an </span><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accretion_disk" title="Accretion disk"><span data-dcnode-id="3995" instrument_node="">accretion disk</span></a><span data-dcnode-id="3993" instrument_node=""> around it, would release energy to power the radio source, itself much larger than the black hole. 
</span></p><span data-dcnode-id="3991" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3979"><div class="thumbinner" data-dcnode-id="3980" style="width:222px;"><a class="image" data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArtist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg"><img alt="" class="thumbimage" data-dcnode-id="3990" data-file-height="3125" data-file-width="5000" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg/220px-Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg/330px-Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg/440px-Artist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg 2x" width="220"></a><span data-dcnode-id="3988" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3981"><div class="magnify" data-dcnode-id="3986"><a class="internal" data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArtist_impression_of_a_supermassive_black_hole_at_the_centre_of_a_galaxy.jpg" title="Enlarge"></a></div><span data-dcnode-id="3985" instrument_node="">Artist impression of a supermassive black hole at the center of a galaxy</span><sup class="reference" data-dcnode-id="3982" id="cite_ref-ALMA_3-1"><a data-dcnode-id="3983" href="#cite_note-ALMA-3"><span data-dcnode-id="3984" instrument_node="">[3]</span></a></sup></div></div></div><span data-dcnode-id="3978" instrument_node="">
</span><p data-dcnode-id="3948"><span data-dcnode-id="3977" instrument_node="">A study in 2008 which linked </span><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_telescope" title="Radio telescope"><span data-dcnode-id="3976" instrument_node="">radio telescopes</span></a><span data-dcnode-id="3974" instrument_node=""> in Hawaii, Arizona and California (</span><a class="mw-redirect" data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Long_Baseline_Interferometry" title="Very Long Baseline Interferometry"><span data-dcnode-id="3973" instrument_node="">Very Long Baseline Interferometry</span></a><span data-dcnode-id="3971" instrument_node="">) measured the diameter of Sagittarius A* to be 44 million kilometers (0.3 </span><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_unit" title="Astronomical unit"><span data-dcnode-id="3970" instrument_node="">AU</span></a><span data-dcnode-id="3968" instrument_node="">).</span><sup class="reference" data-dcnode-id="3965" id="cite_ref-EHS_4-1"><a data-dcnode-id="3966" href="#cite_note-EHS-4"><span data-dcnode-id="3967" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="3962" id="cite_ref-BBHF_31-0"><a data-dcnode-id="3963" href="#cite_note-BBHF-31"><span data-dcnode-id="3964" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3961" instrument_node=""> For comparison, the radius of Earth's orbit around the </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="3960" instrument_node="">Sun</span></a><span data-dcnode-id="3958" instrument_node=""> is about 150 million kilometers (1.0 </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_unit" title="Astronomical unit"><span data-dcnode-id="3957" instrument_node="">AU</span></a><span data-dcnode-id="3955" instrument_node="">), whereas the distance of </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercury_%28planet%29" title="Mercury (planet)"><span data-dcnode-id="3954" instrument_node="">Mercury</span></a><span data-dcnode-id="3952" instrument_node=""> from the Sun at closest approach (</span><a class="mw-redirect" data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perihelion" title="Perihelion"><span data-dcnode-id="3951" instrument_node="">perihelion</span></a><span data-dcnode-id="3949" instrument_node="">) is 46 million kilometers (0.3 AU). Thus, the diameter of the radio source is slightly less than the distance from Mercury to the Sun.
</span></p><p data-dcnode-id="3925"><span data-dcnode-id="3947" instrument_node="">Scientists at the </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Planck_Institute_for_Extraterrestrial_Physics" title="Max Planck Institute for Extraterrestrial Physics"><span data-dcnode-id="3946" instrument_node="">Max Planck Institute for Extraterrestrial Physics</span></a><span data-dcnode-id="3944" instrument_node=""> in Germany using Chilean telescopes have confirmed the existence of a supermassive black hole at the Galactic Center, on the order of 4.3 million </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_mass" title="Solar mass"><span data-dcnode-id="3943" instrument_node="">solar masses</span></a><span data-dcnode-id="3941" instrument_node="">.</span><sup class="reference" data-dcnode-id="3938" id="cite_ref-gillessenetal2009_5-2"><a data-dcnode-id="3939" href="#cite_note-gillessenetal2009-5"><span data-dcnode-id="3940" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3937" instrument_node=""> Later studies have estimated a mass of 3.7 million</span><sup class="reference" data-dcnode-id="3934" id="cite_ref-Ghez_32-0"><a data-dcnode-id="3935" href="#cite_note-Ghez-32"><span data-dcnode-id="3936" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="3931" id="cite_ref-Schödel_33-0"><a data-dcnode-id="3932" href="#cite_note-Sch%C3%B6del-33"><span data-dcnode-id="3933" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3930" instrument_node=""> or 4.1 million solar masses.</span><sup class="reference" data-dcnode-id="3927" id="cite_ref-Abuter_23-1"><a data-dcnode-id="3928" href="#cite_note-Abuter-23"><span data-dcnode-id="3929" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3926" instrument_node="">
</span></p><p data-dcnode-id="3910"><span data-dcnode-id="3924" instrument_node="">On 5 January 2015, NASA reported observing an </span><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray" title="X-ray"><span data-dcnode-id="3923" instrument_node="">X-ray</span></a><span data-dcnode-id="3921" instrument_node=""> flare 400 times brighter than usual, a record-breaker, from Sagittarius A*. The unusual event may have been caused by the breaking apart of an </span><a data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asteroid" title="Asteroid"><span data-dcnode-id="3920" instrument_node="">asteroid</span></a><span data-dcnode-id="3918" instrument_node=""> falling into the black hole or by the entanglement of </span><a class="mw-redirect" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnetic_field_line" title="Magnetic field line"><span data-dcnode-id="3917" instrument_node="">magnetic field lines</span></a><span data-dcnode-id="3915" instrument_node=""> within gas flowing into Sagittarius A*, according to astronomers.</span><sup class="reference" data-dcnode-id="3912" id="cite_ref-NASA-20150105_34-0"><a data-dcnode-id="3913" href="#cite_note-NASA-20150105-34"><span data-dcnode-id="3914" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3911" instrument_node="">
</span></p><span data-dcnode-id="3909" instrument_node="">
</span><h2 data-dcnode-id="3898"><span class="mw-headline" data-dcnode-id="3906" id="Stellar_population"><span data-dcnode-id="3908" id="paradox_of_youth_in_Galactic_Center"></span><span data-dcnode-id="3907" instrument_node="">Stellar population</span></span><span class="mw-editsection" data-dcnode-id="3899"><span class="mw-editsection-bracket" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">[</span></span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D4" title="Edit section: Stellar population"><span data-dcnode-id="3903" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3897" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3883"><div class="thumbinner" data-dcnode-id="3884" style="width:222px;"><a class="image" data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMilky_Way_Galaxy_and_a_meteor.jpg"><img alt="" class="thumbimage" data-dcnode-id="3896" data-file-height="800" data-file-width="1200" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Milky_Way_Galaxy_and_a_meteor.jpg/220px-Milky_Way_Galaxy_and_a_meteor.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Milky_Way_Galaxy_and_a_meteor.jpg/330px-Milky_Way_Galaxy_and_a_meteor.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Milky_Way_Galaxy_and_a_meteor.jpg/440px-Milky_Way_Galaxy_and_a_meteor.jpg 2x" width="220"></a><span data-dcnode-id="3894" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3885"><div class="magnify" data-dcnode-id="3892"><a class="internal" data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMilky_Way_Galaxy_and_a_meteor.jpg" title="Enlarge"></a></div><span data-dcnode-id="3891" instrument_node="">Galactic Center of the </span><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" title="Milky Way"><span data-dcnode-id="3890" instrument_node="">Milky Way</span></a><span data-dcnode-id="3888" instrument_node=""> and a </span><a class="mw-redirect" data-dcnode-id="3886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meteor" title="Meteor"><span data-dcnode-id="3887" instrument_node="">meteor</span></a></div></div></div><span data-dcnode-id="3882" instrument_node="">
</span><p data-dcnode-id="3822"><span data-dcnode-id="3881" instrument_node="">The central cubic </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parsec" title="Parsec"><span data-dcnode-id="3880" instrument_node="">parsec</span></a><span data-dcnode-id="3878" instrument_node=""> around Sagittarius A* contains around 10 million </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="3877" instrument_node="">stars</span></a><span data-dcnode-id="3875" instrument_node="">.</span><sup class="reference" data-dcnode-id="3872" id="cite_ref-35"><a data-dcnode-id="3873" href="#cite_note-35"><span data-dcnode-id="3874" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3871" instrument_node=""> Although most of them are old red </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giant_star" title="Giant star"><span data-dcnode-id="3870" instrument_node="">giant stars</span></a><span data-dcnode-id="3868" instrument_node="">, the Galactic Center is also rich in </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star%23Massive_stars" title="Star"><span data-dcnode-id="3867" instrument_node="">massive stars</span></a><span data-dcnode-id="3865" instrument_node="">. More than 100 </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OB_star" title="OB star"><span data-dcnode-id="3864" instrument_node="">OB</span></a><span data-dcnode-id="3862" instrument_node=""> and </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wolf%25E2%2580%2593Rayet_star" title="Wolf–Rayet star"><span data-dcnode-id="3861" instrument_node="">Wolf–Rayet stars</span></a><span data-dcnode-id="3859" instrument_node=""> have been identified there so far.</span><sup class="reference" data-dcnode-id="3856" id="cite_ref-36"><a data-dcnode-id="3857" href="#cite_note-36"><span data-dcnode-id="3858" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3855" instrument_node=""> They seem to have all been formed in a single </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_formation" title="Star formation"><span data-dcnode-id="3854" instrument_node="">star formation</span></a><span data-dcnode-id="3852" instrument_node=""> event a few million years ago. The existence of these relatively young stars was a surprise to experts, who expected the </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tidal_force" title="Tidal force"><span data-dcnode-id="3851" instrument_node="">tidal forces</span></a><span data-dcnode-id="3849" instrument_node=""> from the central black hole to prevent their formation. This </span><i data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">paradox of youth</span></i><span data-dcnode-id="3846" instrument_node=""> is even stronger for stars that are on very tight orbits around Sagittarius A*, such as </span><a data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S2_%28star%29" title="S2 (star)"><span data-dcnode-id="3845" instrument_node="">S2</span></a><span data-dcnode-id="3843" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S0-102" title="S0-102"><span data-dcnode-id="3842" instrument_node="">S0-102</span></a><span data-dcnode-id="3840" instrument_node="">. The scenarios invoked to explain this formation involve either star formation in a massive </span><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_cluster" title="Star cluster"><span data-dcnode-id="3839" instrument_node="">star cluster</span></a><span data-dcnode-id="3837" instrument_node=""> offset from the Galactic Center that would have migrated to its current location once formed, or star formation within a massive, compact gas </span><a data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accretion_disk" title="Accretion disk"><span data-dcnode-id="3836" instrument_node="">accretion disk</span></a><span data-dcnode-id="3834" instrument_node=""> around the central black-hole. Current evidence favors the latter theory, as formation through a large accretion disk is more likely to lead to the observed discrete edge of the young stellar cluster at roughly 0.5 parsec.</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-37"><a data-dcnode-id="3832" href="#cite_note-37"><span data-dcnode-id="3833" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3830" instrument_node=""> Most of these 100 young, massive stars seem to be concentrated within one or two disks, rather than randomly distributed within the central parsec.</span><sup class="reference" data-dcnode-id="3827" id="cite_ref-38"><a data-dcnode-id="3828" href="#cite_note-38"><span data-dcnode-id="3829" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="3824" id="cite_ref-39"><a data-dcnode-id="3825" href="#cite_note-39"><span data-dcnode-id="3826" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3823" instrument_node=""> This observation however does not allow definite conclusions to be drawn at this point.
</span></p><p data-dcnode-id="3802"><span data-dcnode-id="3821" instrument_node="">Star formation does not seem to be occurring currently at the Galactic Center, although the Circumnuclear Disk of molecular gas that orbits the Galactic Center at two parsecs seems a fairly favorable site for star formation. Work presented in 2002 by Antony Stark and Chris Martin mapping the gas density in a 400-</span><a data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light-year" title="Light-year"><span data-dcnode-id="3820" instrument_node="">light-year</span></a><span data-dcnode-id="3818" instrument_node=""> region around the Galactic Center has revealed an accumulating ring with a mass several million times that of the </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="3817" instrument_node="">Sun</span></a><span data-dcnode-id="3815" instrument_node=""> and near the critical density for </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_formation" title="Star formation"><span data-dcnode-id="3814" instrument_node="">star formation</span></a><span data-dcnode-id="3812" instrument_node="">. They predict that in approximately 200 million years there will be an episode of </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Starburst_region" title="Starburst region"><span data-dcnode-id="3811" instrument_node="">starburst</span></a><span data-dcnode-id="3809" instrument_node=""> in the Galactic Center, with many stars forming rapidly and undergoing supernovae at a hundred times the current rate. This starburst may also be accompanied by the formation of galactic </span><a class="mw-redirect" data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relativistic_jet" title="Relativistic jet"><span data-dcnode-id="3808" instrument_node="">relativistic jets</span></a><span data-dcnode-id="3806" instrument_node=""> as matter falls into the central </span><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_hole" title="Black hole"><span data-dcnode-id="3805" instrument_node="">black hole</span></a><span data-dcnode-id="3803" instrument_node="">. It is thought that the Milky Way undergoes a starburst of this sort every 500 million years.
</span></p><p data-dcnode-id="3783"><span data-dcnode-id="3801" instrument_node="">In addition to the paradox of youth, there is also a "conundrum of old age" associated with the distribution of the old stars at the Galactic Center. Theoretical models had predicted that the old stars—which far outnumber young stars—should have a steeply-rising density near the black hole, a so-called </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahcall%25E2%2580%2593Wolf_cusp" title="Bahcall–Wolf cusp"><span data-dcnode-id="3800" instrument_node="">Bahcall–Wolf cusp</span></a><span data-dcnode-id="3798" instrument_node="">. Instead, it was discovered in 2009 that the density of the old stars peaks at a distance of roughly 0.5 parsec from Sgr A*, then falls inward: instead of a dense cluster, there is a "hole", or </span><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_deficit" title="Mass deficit"><span data-dcnode-id="3797" instrument_node="">core</span></a><span data-dcnode-id="3795" instrument_node="">, around the black hole.</span><sup class="reference" data-dcnode-id="3792" id="cite_ref-40"><a data-dcnode-id="3793" href="#cite_note-40"><span data-dcnode-id="3794" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3791" instrument_node=""> Several suggestions have been put forward to explain this puzzling observation, but none is completely satisfactory.</span><sup class="reference" data-dcnode-id="3788" id="cite_ref-41"><a data-dcnode-id="3789" href="#cite_note-41"><span data-dcnode-id="3790" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="3785" id="cite_ref-42"><a data-dcnode-id="3786" href="#cite_note-42"><span data-dcnode-id="3787" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3784" instrument_node=""> For instance, although the black hole would eat stars near it, creating a region of low density, this region would be much smaller than a parsec. Because the observed stars are a fraction of the total number, it is theoretically possible that the overall stellar distribution is different from what is observed, although no plausible models of this sort have been proposed yet.
</span></p><span data-dcnode-id="3782" instrument_node="">
</span><h2 data-dcnode-id="3772"><span class="mw-headline" data-dcnode-id="3780" id="Gamma-_and_X-ray_emitting_Fermi_bubbles"><span data-dcnode-id="3781" instrument_node="">Gamma- and X-ray emitting Fermi bubbles</span></span><span class="mw-editsection" data-dcnode-id="3773"><span class="mw-editsection-bracket" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">[</span></span><a data-dcnode-id="3776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D5" title="Edit section: Gamma- and X-ray emitting Fermi bubbles"><span data-dcnode-id="3777" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3771" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="3747"><div class="thumbinner" data-dcnode-id="3748" style="width:304px;max-width:304px"><div class="trow" data-dcnode-id="3766"><div class="theader" data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Galactic gamma- and X-ray bubbles</span></div></div><div class="trow" data-dcnode-id="3761"><div class="tsingle" data-dcnode-id="3762" style="width:302px;max-width:302px"><div class="thumbimage" data-dcnode-id="3763"><a class="image" data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A800_nasa_structure_renderin2.jpg"><img alt="" data-dcnode-id="3765" data-file-height="1629" data-file-width="2896" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/800_nasa_structure_renderin2.jpg/300px-800_nasa_structure_renderin2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/800_nasa_structure_renderin2.jpg/450px-800_nasa_structure_renderin2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5a/800_nasa_structure_renderin2.jpg/600px-800_nasa_structure_renderin2.jpg 2x" width="300"></a></div></div></div><div class="trow" data-dcnode-id="3752"><div class="tsingle" data-dcnode-id="3753" style="width:302px;max-width:302px"><div class="thumbimage" data-dcnode-id="3754"><span class="mw-tmh-player video" data-dcnode-id="3755"><video data-dcnode-id="3760" data-durationhint="93" data-mwprovider="wikimediacommons" data-mwtitle="Gamma-ray_Bubbles.ogv" disabled="disabled" height="169" id="mwe_player_2_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Gamma-ray_Bubbles.ogv/300px--Gamma-ray_Bubbles.ogv.jpg" preload="none" tabindex="-1" width="300"></video><a class="mw-tmh-play" data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGamma-ray_Bubbles.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="3759"></span></a><span aria-label="1 minute and 33 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">1:33</span></span></span></div></div></div><div class="trow" data-dcnode-id="3749" style="display:flex"><div class="thumbcaption" data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">Gamma- and X-ray bubbles at the Milky Way galaxy center: Top: illustration; Bottom: video.</span></div></div></div></div><span data-dcnode-id="3746" instrument_node="">
</span><p data-dcnode-id="3713"><span data-dcnode-id="3745" instrument_node="">In November 2010, it was announced that two large elliptical lobe structures of energetic </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plasma_%28physics%29" title="Plasma (physics)"><span data-dcnode-id="3744" instrument_node="">plasma</span></a><span data-dcnode-id="3742" instrument_node="">, termed "bubbles", which emit gamma- and X-rays, were detected astride the Milky Way galaxy's core.</span><sup class="reference" data-dcnode-id="3739" id="cite_ref-bubbles_43-0"><a data-dcnode-id="3740" href="#cite_note-bubbles-43"><span data-dcnode-id="3741" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3738" instrument_node=""> These so-called "Fermi bubbles" extend up to about 25,000 </span><a class="mw-redirect" data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_year" title="Light year"><span data-dcnode-id="3737" instrument_node="">light years</span></a><span data-dcnode-id="3735" instrument_node=""> above and below the Galactic Center.</span><sup class="reference" data-dcnode-id="3732" id="cite_ref-bubbles_43-1"><a data-dcnode-id="3733" href="#cite_note-bubbles-43"><span data-dcnode-id="3734" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3731" instrument_node=""> The galaxy's diffuse gamma-ray fog hampered prior observations, but the discovery team led by D. Finkbeiner, building on research by G. Dobler, worked around this problem.</span><sup class="reference" data-dcnode-id="3728" id="cite_ref-bubbles_43-2"><a data-dcnode-id="3729" href="#cite_note-bubbles-43"><span data-dcnode-id="3730" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3727" instrument_node="">
The 2014 </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruno_Rossi_Prize" title="Bruno Rossi Prize"><span data-dcnode-id="3726" instrument_node="">Bruno Rossi Prize</span></a><span data-dcnode-id="3724" instrument_node=""> went to </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tracy_Slatyer" title="Tracy Slatyer"><span data-dcnode-id="3723" instrument_node="">Tracy Slatyer</span></a><span data-dcnode-id="3721" instrument_node="">, Douglas Finkbeiner, and Meng Su "for their discovery, in gamma rays, of the large unanticipated Galactic structure called the </span><i data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Fermi bubbles</span></i><span data-dcnode-id="3718" instrument_node="">".</span><sup class="reference" data-dcnode-id="3715" id="cite_ref-Rossi2014_44-0"><a data-dcnode-id="3716" href="#cite_note-Rossi2014-44"><span data-dcnode-id="3717" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3714" instrument_node="">
</span></p><p data-dcnode-id="3692"><span data-dcnode-id="3712" instrument_node="">The origin of the bubbles is being researched.</span><sup class="reference" data-dcnode-id="3709" id="cite_ref-origin_45-0"><a data-dcnode-id="3710" href="#cite_note-origin-45"><span data-dcnode-id="3711" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3706" id="cite_ref-46"><a data-dcnode-id="3707" href="#cite_note-46"><span data-dcnode-id="3708" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3705" instrument_node=""> The bubbles are connected and seemingly coupled, via energy transport, to the galactic core by columnar structures of energetic plasma dubbed "chimneys".</span><sup class="reference" data-dcnode-id="3702" id="cite_ref-chimneys_47-0"><a data-dcnode-id="3703" href="#cite_note-chimneys-47"><span data-dcnode-id="3704" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3701" instrument_node=""> They were seen in visible light</span><sup class="reference" data-dcnode-id="3698" id="cite_ref-48"><a data-dcnode-id="3699" href="#cite_note-48"><span data-dcnode-id="3700" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3697" instrument_node=""> and optical measurements were made for the first time in 2020.</span><sup class="reference" data-dcnode-id="3694" id="cite_ref-49"><a data-dcnode-id="3695" href="#cite_note-49"><span data-dcnode-id="3696" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3693" instrument_node="">
</span></p><span data-dcnode-id="3691" instrument_node="">
</span><h2 data-dcnode-id="3681"><span class="mw-headline" data-dcnode-id="3689" id="Gallery"><span data-dcnode-id="3690" instrument_node="">Gallery</span></span><span class="mw-editsection" data-dcnode-id="3682"><span class="mw-editsection-bracket" data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">[</span></span><a data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGalactic_Center%26action%3Dedit%26section%3D6" title="Edit section: Gallery"><span data-dcnode-id="3686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3679" instrument_node="">In May 2021 NASA published new images of the galactic center, based on surveys from </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandra_X-ray_Observatory" title="Chandra X-ray Observatory"><span data-dcnode-id="3678" instrument_node="">Chandra X-ray Observatory</span></a><span data-dcnode-id="3676" instrument_node=""> and other telescopes.</span><sup class="reference" data-dcnode-id="3673" id="cite_ref-50"><a data-dcnode-id="3674" href="#cite_note-50"><span data-dcnode-id="3675" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3672" instrument_node=""> Images are about 2.2 degrees (1,000 light years) across and 4.2 degrees (2,000 light years) long.
</span></p><span data-dcnode-id="3670" instrument_node="">
