</span><div class="text-copy bodyCopy auto" data-dcnode-id="2696" id="article-body"><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2947"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/36-mercury-the-suns-closest-planetary-neighbor.html" target="_blank"><span data-dcnode-id="2950" instrument_node="">Mercury</span></a><span data-dcnode-id="2948" instrument_node=""> is often cited as the most difficult of the naked-eye planets to see. Because it's the closest planet to the sun, it is usually obscured by the light from our star. &nbsp;</span></p><div class="ad-unit" data-dcnode-id="2946" id="ad-unit-1"></div><p data-dcnode-id="2941"><span data-dcnode-id="2945" instrument_node="">"Mercury has been known since very early times, but it is never very conspicuous, and there are many people who have never seen it at all," legendary British astronomer Sir Patrick Moore wrote in "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="4002265819578321400" data-dcnode-id="2943" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="The Boy's Book of Astronomy" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=72128&amp;GR_URL=https%3A%2F%2Famazon.com%2FBoys-Book-Astronomy-Patrick-Moore%2Fdp%2FB0093OXEE8%2F%3Ftag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Boys-Book-Astronomy-Patrick-Moore/dp/B0093OXEE8/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D72128%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FBoys-Book-Astronomy-Patrick-Moore%252Fdp%252FB0093OXEE8%252F%253Ftag%253Dhawk-future-20%2526ascsubtag%253Dspace-us-4002265819578321400-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2944" instrument_node="">The Boy's Book of Astronomy</span></a><span data-dcnode-id="2942" instrument_node="">," (Roy Publishers, 1958). "The reason for this is that it always seems to keep close to the sun in the sky, and can never be observed against a dark background."</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2940" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="1310938708790146600" data-widget-type="seasonal"></aside><p data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Although that's mostly true, there are times during the year when Mercury can be surprisingly easy to spot. And we are in just such a period right now.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2893" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2894" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2895"><div data-dcnode-id="2896"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2897" id="trc_wrapper_47935" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2921" id="trc_header_47935"><div class="trc_header_ext" data-dcnode-id="2923"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2931"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Sponsored Links</span></span></a><a ong data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/39240-when-to-see-planets-in-the-sky.html" target="_blank"><strong data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">When, where and how to see the planets in the 2020 night sky</span></strong></a><span data-dcnode-id="2885" instrument_node="">&nbsp;</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2865"><div class="jwplayer__wrapper" data-dcnode-id="2866"><div class="future__jwplayer" data-dcnode-id="2867" id="futr_botr_6MEsH3TN_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2880" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/6MEsH3TN/watch-inner-solar-system-planets-orbit-sun-for-entire-year-2019-animation%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2882" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2868" id="botr_6MEsH3TN_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2869"><div class="jw-icon jw-reset" data-dcnode-id="2875"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2876" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2877"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2870"><div class="jw-error-text jw-reset-text" data-dcnode-id="2871" data-nosnippet="" dir="auto"><span data-dcnode-id="2874" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2873"></span><span data-dcnode-id="2872" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2860"><span data-dcnode-id="2864" instrument_node="">Mercury is called an "inferior planet" because its orbit is nearer to the sun than Earth's is. Therefore, Mercury always appears, from our vantage point (as Moore wrote), to be in the same general direction as the sun. That's why relatively few people have set eyes on it. There is even a rumor that Nicolaus </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15684-nicolaus-copernicus.html" target="_blank"><span data-dcnode-id="2863" instrument_node="">Copernicus</span></a><span data-dcnode-id="2861" instrument_node=""> — who, in the early 1500s, formulated a model of the universe that placed the sun, rather than Earth, at the center of the&nbsp;solar system — never saw it.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2859" id="ad-unit-2"></div><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Yet Mercury is not really hard to see. You simply must know when and where to look, and find a clear horizon.</span></p><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">For those living in the Northern Hemisphere, a great "window of opportunity" for viewing Mercury in the evening sky opened up in late January. That window will remain open through Feb. 17, giving you a number of chances to see this so-called elusive planet with your own eyes.&nbsp;</span></p><h2 data-dcnode-id="2853" id="when-and-where-to-look-xa0"><span data-dcnode-id="2854" instrument_node="">When and where to look&nbsp;</span></h2><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Currently, Mercury is visible about 35 to 40 minutes after sunset, very near to the horizon, about 25 degrees south of due west. Your clenched fist held at arm's length measures roughly 10 degrees, so approximately 2.5 "fists" to the left of due west, along the horizon, will bring you to Mercury.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="2850" data-feat-ref="bordeaux-feat-id-70" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2849" data-feat-ref="bordeaux-feat-id-73" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2831"><div class="image-full-width-wrapper" data-dcnode-id="2840"><div class="image-widthsetter" data-dcnode-id="2841" style="max-width:1898px;"><p class="vanilla-image-block" data-dcnode-id="2842" style="padding-top:53.69%;"><picture data-dcnode-id="2843"><source alt="On the evening of Monday, Feb. 10, Mercury (orbit shown as red curve) will reach its widest separation, 18 degrees east of the sun. With Mercury sitting above a nearly vertical evening ecliptic, this will be the best appearance of the planet in 2020 for Northern Hemisphere observers. The optimal viewing times fall between 6 and 7 p.m. local time. Viewed in a telescope (inset), the planet will exhibit a waning half-illuminated phase." class="expandable lazy-image-van optional-image" data-dcnode-id="2848" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="On the evening of Monday, Feb. 10, Mercury (orbit shown as red curve) will reach its widest separation, 18 degrees east of the sun. With Mercury sitting above a nearly vertical evening ecliptic, this will be the best appearance of the planet in 2020 for Northern Hemisphere observers. The optimal viewing times fall between 6 and 7 p.m. local time. Viewed in a telescope (inset), the planet will exhibit a waning half-illuminated phase." class="expandable lazy-image-van optional-image" data-dcnode-id="2847" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2844"><img alt="On the evening of Monday, Feb. 10, Mercury (orbit shown as red curve) will reach its widest separation, 18 degrees east of the sun. With Mercury sitting above a nearly vertical evening ecliptic, this will be the best appearance of the planet in 2020 for Northern Hemisphere observers. The optimal viewing times fall between 6 and 7 p.m. local time. Viewed in a telescope (inset), the planet will exhibit a waning half-illuminated phase." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2846" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/6KQCvD3RStaSobcxYvkyDi-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2845"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2832" itemprop="caption description"><span class="caption-text" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">On the evening of Monday, Feb. 10, Mercury (orbit shown as red curve) will reach its widest separation, 18 degrees east of the sun. With Mercury sitting above a nearly vertical evening ecliptic, this will be the best appearance of the planet in 2020 for Northern Hemisphere observers. The optimal viewing times fall between 6 and 7 p.m. local time. Viewed in a telescope (inset), the planet will exhibit a waning half-illuminated phase. </span></span><span class="credit" data-dcnode-id="2833" itemprop="copyrightHolder"><span data-dcnode-id="2837" instrument_node="">(Image credit: </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2835" data-url="http://www.starrynight.com/starry-night-8-professional-astronomy-telescope-control-software.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.starrynight.com/starry-night-8-professional-astronomy-telescope-control-software.html" target="_blank"><span data-dcnode-id="2836" instrument_node="">Starry Night</span></a><span data-dcnode-id="2834" instrument_node="">)</span></span></figcaption></figure><p data-dcnode-id="2823"><span data-dcnode-id="2830" instrument_node="">You can also use brilliant </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/44-venus-second-planet-from-the-sun-brightest-planet-in-solar-system.html" target="_blank"><span data-dcnode-id="2829" instrument_node="">Venus</span></a><span data-dcnode-id="2827" instrument_node=""> as a benchmark. Just look the same distance — 25 degrees — to Venus' lower right, and you'll come to Mercury. If your sky is clear and there are no tall obstructions (like trees or buildings), you should have no trouble seeing Mercury as a very bright "star" shining with a trace of a yellowish-orange tinge. Tonight (Jan. 31), Mercury will be shining at magnitude -1.0, which means that only three other objects in the sky will appear brighter: the moon, Venus and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21702-sirius-brightest-star.html" target="_blank"><span data-dcnode-id="2826" instrument_node="">Sirius</span></a><span data-dcnode-id="2824" instrument_node=""> (the brightest star in Earth's night sky).&nbsp;</span></p><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">In the evenings that follow, Mercury will slowly diminish in brightness, but it will also slowly gain altitude as it gradually moves away from the sun's vicinity.&nbsp;</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2820" instrument_node="">It will be at greatest elongation, 18.2 degrees to the east of the sun, on Feb. 10. Look for it about 45 minutes to an hour after sundown, still about 25 degrees to the lower right of Venus. Shining at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21640-star-luminosity-and-magnitude.html" target="_blank"><span data-dcnode-id="2819" instrument_node="">magnitude</span></a><span data-dcnode-id="2817" instrument_node=""> -0.5 (just a smidge dimmer than the second-brightest star in the sky, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22858-canopus.html" target="_blank"><span data-dcnode-id="2816" instrument_node="">Canopus</span></a><span data-dcnode-id="2814" instrument_node="">, in the constellation Carina), it sets more than 90 minutes after the sun, making this Mercury's best evening apparition of 2020.</span></p><p data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">While viewing circumstances for Mercury are quite favorable north of the equator, that is not so for those in the Southern Hemisphere, where this rocky little world will hang very low to the horizon while deeply immersed in bright twilight, making the planet very difficult to see. Southern Hemisphere observers will get their chance to spot Mercury in late March and early April, when the elusive planet will appear to soar high into the eastern sky at dawn.&nbsp;</span></p><p data-dcnode-id="2800"><span data-dcnode-id="2810" instrument_node="">Mercury, like Venus and the moon, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/news/examining-the-phases-of-venus" target="_blank"><span data-dcnode-id="2809" instrument_node="">appears to go through phases</span></a><span data-dcnode-id="2807" instrument_node="">. Soon after it emerged into the evening sky in January, Mercury was a nearly full disk, which is why it currently appears so bright. By the time it arrives at its </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2805" data-url="https://in-the-sky.org/news.php?id=20200210_11_101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//in-the-sky.org/news.php%3Fid%3D20200210_11_101" target="_blank"><span data-dcnode-id="2806" instrument_node="">greatest elongation</span></a><span data-dcnode-id="2804" instrument_node="">, or its greatest separation from the sun, on Feb. 10, it will appear nearly half-illuminated. The amount of the planet's surface illuminated by the sun will continue to decrease in the days to come. When Mercury begins to turn back toward the sun's vicinity after Feb. 10, it will fade at a rather rapid pace. By Feb. 14, it will dim to magnitude +0.2, nearly as bright as the star </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22872-rigel.html" target="_blank"><span data-dcnode-id="2803" instrument_node="">Rigel</span></a><span data-dcnode-id="2801" instrument_node="">, in the constellation Orion.&nbsp;</span></p><p data-dcnode-id="2789"><span data-dcnode-id="2799" instrument_node="">By the evening of Feb. 17, Mercury's brightness will drop to magnitude +1.6 — about as bright as the star </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21940-castor-star.html" target="_blank"><span data-dcnode-id="2798" instrument_node="">Castor</span></a><span data-dcnode-id="2796" instrument_node="">, in the constellation Gemini, but only about 9% as bright as it appears now. In </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15693-telescopes-beginners-telescope-reviews-buying-guide.html" target="_blank"><span data-dcnode-id="2795" instrument_node="">telescopes</span></a><span data-dcnode-id="2793" instrument_node="">, Mercury will appear as a narrowing crescent. This, in all likelihood, will be your last view of the elusive planet this month, for the combination of its lowering altitude and its descent into the brighter sunset glow will finally render Mercury invisible in the evenings that follow. It will arrive at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2791" data-url="https://in-the-sky.org/news.php?id=20200226_11_100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//in-the-sky.org/news.php%3Fid%3D20200226_11_100" target="_blank"><span data-dcnode-id="2792" instrument_node="">inferior conjunction</span></a><span data-dcnode-id="2790" instrument_node="">, meaning it will pass between Earth and the sun, on Feb. 25.&nbsp;It will reappear in the morning sky in late March and early April.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2770"><div class="jwplayer__wrapper" data-dcnode-id="2771"><div class="future__jwplayer" data-dcnode-id="2772" id="futr_botr_LgNIOJ4e_XzKn4M6Y_div"><div class="carousel-showcase" data-dcnode-id="2785" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/LgNIOJ4e/2019-mercury-transit-captured-by-nasa-spacecraft%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2787" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2773" id="botr_LgNIOJ4e_XzKn4M6Y_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2774"><div class="jw-icon jw-reset" data-dcnode-id="2780"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2781" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2782"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2775"><div class="jw-error-text jw-reset-text" data-dcnode-id="2776" data-nosnippet="" dir="auto"><span data-dcnode-id="2779" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2778"></span><span data-dcnode-id="2777" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h2 data-dcnode-id="2768" id="swift-with-a-dual-identity"><span data-dcnode-id="2769" instrument_node="">Swift, with a dual identity</span></h2><p data-dcnode-id="2763"><span data-dcnode-id="2767" instrument_node="">In ancient Roman mythology, Mercury was the swift-footed messenger of the gods. The planet is well named, for it is the closest planet to the sun and the swiftest of the solar system. Averaging about 30 miles per second (48 kilometers per second), Mercury makes &nbsp;a journey around the sun in only 88 Earth days. Interestingly, it takes Mercury 59 Earth days to rotate once on its axis, so all parts of its surface experience long periods of intense heat and extreme cold. Although its mean </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18646-mercury-distance.html" target="_blank"><span data-dcnode-id="2766" instrument_node="">distance from the sun</span></a><span data-dcnode-id="2764" instrument_node=""> is only 36 million miles (58 million km), Mercury experiences by far the greatest range of temperatures: 800 degrees Fahrenheit (426 degrees Celsius) on its day side, and minus 280 degrees Fahrenheit (minus 173 degrees Celsius) on its night side.</span></p><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">In the pre-Christian era, this speedy planet actually had two names, as astronomers did not realize that it could alternately appear on one side of the sun and then the other. The planet was called Mercury when it was in the evening sky, but it was known as Apollo when it appeared in the morning. It is said that Pythagoras, in about the fifth century B.C., pointed out that they were one and the same.</span></p><ul data-dcnode-id="2751"><li data-dcnode-id="2758"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/mercury-transit-2019-thrills-skywatchers.html"><span data-dcnode-id="2760" instrument_node="">Rare Mercury transit, the last until 2032, thrills skywatchers around the world</span></a></li><li data-dcnode-id="2755"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/11002-enduring-mercury-mysteries.html"><span data-dcnode-id="2757" instrument_node="">The most enduring mysteries of Mercury</span></a></li><li data-dcnode-id="2752"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/dust-ring-discovered-mercury-orbit.html"><span data-dcnode-id="2754" instrument_node="">Surprise! Dust ring discovered in Mercury's orbit</span></a></li></ul><p </span><span class="bio" data-dcnode-id="2625"><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Joe Rao is Space.com's skywatching columnist, as well as a veteran meteorologist and eclipse chaser who also serves as an instructor and guest lecturer at New York's Hayden Planetarium. He writes about astronomy for Natural History magazine, the Farmers' Almanac and other publications. Joe is an 8-time Emmy-nominated meteorologist who served the Putnam Valley region of New York for over 21 years. You can find him on Twitter and YouTube tracking lunar and solar eclipses, meteor showers and more. To find out Joe's latest project, visit him on Twitter.</span></p></span><span data-dcnode-id="2624" instrument_node="">
