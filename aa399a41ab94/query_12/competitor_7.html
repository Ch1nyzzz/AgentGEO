</span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Autumn is the best season of the year for astronomical observing. The bugs of summer are gone, winter's cold has not set in and it gets dark at a reasonable hour.</span></p><div class="ad-unit" data-dcnode-id="2797" id="ad-unit-1"></div><p data-dcnode-id="2792"><span data-dcnode-id="2796" instrument_node="">The favorite targets for most amateur astronomers are what are called "deep-sky objects." They are large structures beyond the stars in the immediate galactic neighborhood. These cosmic sights include clusters of stars within the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2794" data-url="https://www.space.com/14249-milkyway-galaxy-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/14249-milkyway-galaxy-photos.html"><span data-dcnode-id="2795" instrument_node="">Milky Way</span></a><span data-dcnode-id="2793" instrument_node=""> and even other galaxies, distant islands of stars. Because of their distance, these objects are faint and hard to see. You may need to travel to a darker location to spot them.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2791" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="9961081184534872000" data-widget-type="seasonal"></aside><p data-dcnode-id="2786"><span data-dcnode-id="2790" instrument_node="">Amateur astronomers usually locate objects in the sky with a technique called "star hopping." With this method, they use the brighter nearby stars to locate the fainter, more distant objects. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2788" data-url="https://www.space.com/21854-andromeda-galaxy-m31-photos-gallery.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21854-andromeda-galaxy-m31-photos-gallery.html"><span data-dcnode-id="2789" instrument_node="">See amazing images of the Andromeda Galaxy</span></a><span data-dcnode-id="2787" instrument_node="">]</span></p><div class="in-article ad-unit" data-dcnode-id="2741" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2742" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2743"><div data-dcnode-id="2744"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2745" id="trc_wrapper_36418" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2769" id="trc_header_36418"><div class="trc_header_ext" data-dcnode-id="2771"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2779"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2772"><a class="trc_desktop_dis  In Diabetes Management" observeid="tbl-observe-3"><a class="item-thumbnail-href" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ad.doubleclick.net/ddm/clk/512482693%3B319964629%3By%3Ftblci%3DGiClwmujLLn292JtlEF_yJFmO4JP3UrT-okTqUPb3QF-XiCkuUMor7m67Prllu-6AQ%23tblciGiClwmujLLn292JtlEF_yJFmO4JP3UrT-okTqUPb3QF-XiCkuUMor7m67Prllu-6AQ" rel="nofollow noopener sponsored" target="_blank" title="This Is A Big Innovation In Diabetes Management"><div class="thumbBlock_holder" data-dcnode-id="2762"><span class="thumbBlock" data-dcnode-id="2764" style="background-image: url(&quot;https://images.taboola.com/taboola/image/fetch/f_jpg%2Cq_auto%2Ch_289%2Cw_520%2Cc_fill%2Cg_faces:auto%2Ce_sharpen/http%3A//cdn.taboola.com/libtrc/static/thumbnails/148851ab7dcc2301b2efc2119790acc2.jpg&quot;);"><span class="thumbnail-overlay" data-dcnode-id="2768"></span><span class="branding" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Dexcom</span></span><span class="static-text top-right" data-dcnode-id="2765"></span></span><div class="videoCube_aspect" data-dcnode-id="2763"></div></div></a><a class="item-label-href" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ad.doubleclick.net/ddm/clk/512482693%3B319964629%3By%3Ftblci%3DGiClwmujLLn292JtlEF_yJFmO4JP3UrT-okTqUPb3QF-XiCkuUMor7m67Prllu-6AQ%23tblciGiClwmujLLn292JtlEF_yJFmO4JP3UrT-okTqUPb3QF-XiCkuUMor7m67Prllu-6AQ" rel="nofollow noopener sponsored" target="_blank" title="This Is A Big Innovation In Diabetes Management"><span class="video-label-box trc-main-label" data-dcnode-id="2756"><span class="video-label video-title trc_ellipsis" data-dcnode-id="2759" style="-webkit-line-clamp: 2;"><span data-dcnode-id="2760" instrument_node="">This Is A Big Innovation In Diabetes Management</span></span><span class="branding" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Dexcom</span></span></span></a><div class="trc_user_exclude_btn" data-dcnode-id="2754" title="Remove this item"></div><div class="trc_exclude_overlay trc_fade" data-dcnode-id="2753"></div><div class="trc_undo_btn" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Undo</span></div></div></div></div></div><div class="trc_clearer" data-dcnode-id="2746"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2739" id="mobile-in-article"><div data-dcnode-id="2740" id="mobile-taboola-mid-article"></div></div><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">In late October, there are no </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2736" data-url="https://www.space.com/23286-brightest-stars-night-sky.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/23286-brightest-stars-night-sky.html"><span data-dcnode-id="2737" instrument_node="">bright stars in the night sky</span></a><span data-dcnode-id="2735" instrument_node="">. That's because, at this time of year, skywatchers are looking northward out of the disk of the Milky Way, so there are relatively few stars to interfere with the view.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2715"><div class="jwplayer__wrapper" data-dcnode-id="2716"><div class="future__jwplayer" data-dcnode-id="2717" id="futr_botr_rXFB4bHh_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2730" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/rXFB4bHh/target-planets-constellations-and-leonid-meteors-nov-2014-skywatching-video%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2732" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2718" id="botr_rXFB4bHh_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2719"><div class="jw-icon jw-reset" data-dcnode-id="2725"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2726" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2727"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2720"><div class="jw-error-text jw-reset-text" data-dcnode-id="2721" data-nosnippet="" dir="auto"><span data-dcnode-id="2724" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2723"></span><span data-dcnode-id="2722" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h2 data-dcnode-id="2713" id="a-dark-sky"><span data-dcnode-id="2714" instrument_node="">A dark sky</span></h2><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Even though many of the brightest stars observers can see from Earth don't make an appearance in the sky this month, that doesn't mean that skywatchers can't use some dimmer stars to spy interesting objects.</span></p><div class="ad-unit" data-dcnode-id="2710" id="ad-unit-2"></div><p data-dcnode-id="2705"><span data-dcnode-id="2709" instrument_node="">There are many stars just under second magnitude that form several easily recognized star patterns. Front and center, about halfway toward the zenith, is the Great Square of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2707" data-url="https://www.space.com/16743-constellation-pegasus.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16743-constellation-pegasus.html"><span data-dcnode-id="2708" instrument_node="">Pegasus</span></a><span data-dcnode-id="2706" instrument_node="">, tilted over by 45 degrees. (This will look larger in the sky than it does on the chart in this guide; take that into account when looking for it.)</span></p><p data-dcnode-id="2700"><span data-dcnode-id="2704" instrument_node="">Off to the left of Pegasus is the "W" shape of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2702" data-url="https://www.space.com/17364-night-sky-photo-meteor-cassiopeia.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17364-night-sky-photo-meteor-cassiopeia.html"><span data-dcnode-id="2703" instrument_node="">Cassiopeia</span></a><span data-dcnode-id="2701" instrument_node="">. Below it is Perseus, one of the richest areas in the Milky Way.</span></p><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Pegasus, Cassiopeia and Perseus form the skeleton of stars, through which skywatchers will look for more distant targets.</span></p><h2 data-dcnode-id="2696" id="spotting-andromeda"><span data-dcnode-id="2697" instrument_node="">Spotting Andromeda</span></h2><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">First and foremost is Andromeda — the largest galaxy in the cosmic group that includes the Milky Way. Andromeda is about 2.54 million light-years from the Milky Way. That means that the light people see from its trillion stars has been traveling toward Earth for more than 2 million years.</span></p><div class="bordeaux-slot" data-dcnode-id="2693" data-feat-ref="bordeaux-feat-id-64" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2692" data-feat-ref="bordeaux-feat-id-65" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="2674"><div class="image-full-width-wrapper" data-dcnode-id="2683"><div class="image-widthsetter" data-dcnode-id="2684"><p class="vanilla-image-block" data-dcnode-id="2685" style="padding-top:56.25%;"><picture data-dcnode-id="2686"><source alt="Use the autumn constellation patterns to locate the Andromeda Galaxy and other deep-sky objects." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="2691" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Use the autumn constellation patterns to locate the Andromeda Galaxy and other deep-sky objects." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="2690" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2687"><img alt="Use the autumn constellation patterns to locate the Andromeda Galaxy and other deep-sky objects." class="pull- expandable lazy-image-van optional-image loaded" data-dcnode-id="2689" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/PmLmkNXUDdKwzMhskzeXmW-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2688"></div></figure><p></p></div></div><figcaption class="pull-" data-dcnode-id="2675" itemprop="caption description"><span class="caption-text" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Use the autumn constellation patterns to locate the Andromeda Galaxy and other deep-sky objects. </span></span><span class="credit" data-dcnode-id="2676" itemprop="copyrightHolder"><span data-dcnode-id="2680" instrument_node="">(Image credit: </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2678" data-url="http://www.starrynight.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.starrynight.com/"><span data-dcnode-id="2679" instrument_node="">Starry Night</span></a><span data-dcnode-id="2677" instrument_node=""> software)</span></span></figcaption></figure><p data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">Beginning stargazers often get confused over objects named after the constellation in which they are found. Thus, "Andromeda" can refer to both the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2671" data-url="https://www.space.com/15590-andromeda-galaxy-m31.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15590-andromeda-galaxy-m31.html"><span data-dcnode-id="2672" instrument_node="">Andromeda Galaxy</span></a><span data-dcnode-id="2670" instrument_node=""> and the constellation Andromeda, where it is found. Similarly, "Milky Way" can refer to both the home galaxy of the sun and the band of its distant stars, which are seen in the night sky.</span></p><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">You can most easily locate the Andromeda Galaxy by using the constellation Cassiopeia as a guide. If you think of the right-hand part of the "W" as an arrowhead, it points directly toward Andromeda. A more precise way to locate it is to start with the Great Square of Pegasus. Its left-most star, Alpheratz, marks the head of Andromeda, the queen of Ethiopia in Greek mythology.</span></p><h2 data-dcnode-id="2665" id="telescope-or-binoculars"><span data-dcnode-id="2666" instrument_node="">Telescope or binoculars?</span></h2><p data-dcnode-id="2660"><span data-dcnode-id="2664" instrument_node="">What should you look for? Andromeda is so far away that its trillion stars combine to make a very faint glowing patch. You can see this most easily with </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2662" data-url="https://www.space.com/26021-best-binoculars.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/26021-best-binoculars.html"><span data-dcnode-id="2663" instrument_node="">binoculars</span></a><span data-dcnode-id="2661" instrument_node="">. Once you spot it, however, if you have a dark sky, you should be able to see it with your unaided eye.</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">People seeing Andromeda for the first time will swear it is the faintest thing they have ever seen, though to experienced astronomers it seems blindingly bright. A useful trick for teasing it out of the background is to use what astronomers call "averted vision." This takes advantage of a feature of the human eye where your most sensitive vision is just slightly off center of your field of vision. Look slightly off to one side of Andromeda’s location, and it should pop into view.</span></p><p data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">It is actually easier to see Andromeda in binoculars than in a telescope because it is so large. It is larger than the field of view of most telescopes, so it’s easy for you to sweep right over it without noticing it. Use the lowest magnification and widest field of view available on your telescope.</span></p><h2 data-dcnode-id="2654" id="other-deep-sky-targets"><span data-dcnode-id="2655" instrument_node="">Other deep-sky targets</span></h2><p data-dcnode-id="2649"><span data-dcnode-id="2653" instrument_node="">While looking at Andromeda, see if you can see its two satellite galaxies. These will appear farther away than they look in photographs, because photographs are made with long exposure times to record the outer reaches of the galaxy, making it appear much larger than it does in telescopes or binoculars. One satellite, Messier 32, is quite easy to see, being almost as bright as the main galaxy. The other satellite, Messier 110, is more of a challenge because it has a low surface brightness. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2651" data-url="https://www.space.com/27562-best-night-sky-events-november-2014.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/27562-best-night-sky-events-november-2014.html"><span data-dcnode-id="2652" instrument_node="">Best night sky events of November 2014 (images)</span></a><span data-dcnode-id="2650" instrument_node="">]</span></p><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Now for some easier targets. These are clusters of stars within the galaxy that includes the Earth. The brightest is known as the Pleiades, or the Seven Sisters. In the early evening it is low down on the horizon; by 3 a.m. it is almost overhead. You can easily see this with your unaided eye, even in the city.</span></p><p data-dcnode-id="2642"><span data-dcnode-id="2646" instrument_node="">Without any optical aid, you can spot about six stars in this cluster, but binoculars will reveal dozens more. In Japanese this cluster is known as Subaru, and the automobile named for it uses its stars as the car's logo. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2644" data-url="https://www.space.com/24745-pleiades-star-cluster-photo-amateur-astronomer.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/24745-pleiades-star-cluster-photo-amateur-astronomer.html"><span data-dcnode-id="2645" instrument_node="">Pleiades</span></a><span data-dcnode-id="2643" instrument_node=""> are located 410 light-years from the sun.</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Between Cassiopeia and Perseus are a pair of star clusters known as the Perseus Double Cluster. The clusters consist of hundreds of stars that are densely packed together, and are a treat when viewed in binoculars or a small telescope. They are located 7,000 and 8,000 light-years away.</span></p><p data-dcnode-id="2635"><span data-dcnode-id="2639" instrument_node="">The final object is much more challenging: the Triangulum or </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2637" data-url="https://www.space.com/13206-pinwheel-galaxy-deep-space-skywatcher-photo.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/13206-pinwheel-galaxy-deep-space-skywatcher-photo.html"><span data-dcnode-id="2638" instrument_node="">Pinwheel Galaxy</span></a><span data-dcnode-id="2636" instrument_node="">. You can find it using the same two stars you were asked to use to find the Andromeda Galaxy, but going in the opposite direction, south instead of north. It is 2.87 million light-years away, slightly farther than Andromeda.</span></p><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Though easy enough to find, Triangulum is very difficult to see. Although large in size, larger than the full moon, and quite bright, it has a very low surface brightness because of its size and orientation. It can be seen in "plan view," so that its outer reaches fade away into nothingness without any sharp edge to catch the eye.</span></p><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">To see Triangulum, you will need a dark sky and either binoculars or a telescope with a wide field of view. Despite the difficulty, some sharp-eyed observers have actually spotted it without any optical aid. In fact, it is used as a marker of an extremely dark sky and extremely sensitive vision.</span></p><p data-dcnode-id="2624"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Editor's Note</span></strong><span data-dcnode-id="2628" instrument_node="">: If you have an amazing image of a deep-sky object or any other skywatching photo you'd like to share for a possible story or image gallery, please contact managing editor Tariq Malik at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2626" href="mailto:spacephotos@space.com"><span data-dcnode-id="2627" instrument_node="">spacephotos@space.com</span></a><span data-dcnode-id="2625" instrument_node="">.</span></p><p data-dcnode-id="2597"><em data-dcnode-id="2598"><span data-dcnode-id="2623" instrument_node="">This article was provided to Space.com by&nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2621" data-url="http://www.simulationcurriculum.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.simulationcurriculum.com/"><span data-dcnode-id="2622" instrument_node="">Simulation Curriculum</span></a><span data-dcnode-id="2620" instrument_node="">, the leader in space science curriculum solutions and the makers of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2618" data-url="http://astronomy.starrynight.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//astronomy.starrynight.com/"><span data-dcnode-id="2619" instrument_node="">Starry Night</span></a><span data-dcnode-id="2617" instrument_node="">&nbsp;and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2615" data-url="http://www.southernstars.com/products/skysafari" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.southernstars.com/products/skysafari"><span data-dcnode-id="2616" instrument_node="">SkySafari</span></a><span data-dcnode-id="2614" instrument_node="">. Follow Starry Night on Twitter </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2612" data-url="https://twitter.com/starrynightedu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/starrynightedu"><span data-dcnode-id="2613" instrument_node="">@StarryNightEdu</span></a><span data-dcnode-id="2611" instrument_node="">. Follow us </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2609" data-url="http://twitter.com/spacedotcom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/spacedotcom"><span data-dcnode-id="2610" instrument_node="">@Spacedotcom</span></a><span data-dcnode-id="2608" instrument_node="">, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2606" data-url="https://www.facebook.com/spacecom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/spacecom"><span data-dcnode-id="2607" instrument_node="">Facebook</span></a><span data-dcnode-id="2605" instrument_node="">and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2603" data-url="https://plus.google.com/+spacecom/posts" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/%2Bspacecom/posts"><span data-dcnode-id="2604" instrument_node="">Google+</span></a><span data-dcnode-id="2602" instrument_node="">. Original article on </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2600" data-url="https://www.space.com/27647-november-deep-sky-astronomy-guide.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/27647-november-deep-sky-astronomy-guide.html"><span data-dcnode-id="2601" instrument_node="">Space.com</span></a><span data-dcnode-id="2599" instrument_node="">.</span></em></p><span data-dcnode-id="2596" instrument_node="">

</span><span class="bio" data-dcnode-id="2534"><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Geoff Gaherty was Space.com's Night Sky columnist and in partnership with Starry Night software and a dedicated amateur astronomer who sought to share the wonders of the night sky with the world. Based in Canada, Geoff studied mathematics and physics at McGill University and earned a Ph.D. in anthropology from the University of Toronto, all while pursuing a passion for the night sky and serving as an astronomy communicator. He credited a partial solar eclipse observed in 1946 (at age 5) and his 1957 sighting of the Comet Arend-Roland as a teenager for sparking his interest in amateur astronomy. In 2008, Geoff won the Chant Medal from the Royal Astronomical Society of Canada, an award given to a Canadian amateur astronomer in recognition of their lifetime achievements.&nbsp;Sadly, Geoff passed away July 7, 2016 due to complications from a kidney transplant, but his legacy continues at Starry Night.&nbsp;</span></p></span><span data-dcnode-id="2533" instrument_node="">
