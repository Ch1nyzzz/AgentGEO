 player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2120"></span><span data-dcnode-id="2119" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">For much of the U.S. we're now into the coldest part of the winter season, and for those who may have recently received a telescope for a holiday gift, the biggest complaint usually is: "I'd love to spend time looking at the wintertime stars, but it's so cold!"</span></p><div class="ad-unit" data-dcnode-id="2109" id="ad-unit-1"></div><p data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">This is hardly an excuse to stay inside. As I said two years ago in </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/43286-why-winter-skywatching-is-worthwhile.html"><span data-dcnode-id="2107" instrument_node="">this Space.com skywatching column</span></a><span data-dcnode-id="2105" instrument_node="">, you can properly protect yourself against the elements without suiting up like an astronaut about to walk on the moon.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2103" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="8891561404101689000" data-widget-type="seasonal"></aside><p data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node="">And rather than a telescope, I would consider </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/26021-best-binoculars.html"><span data-dcnode-id="2101" instrument_node="">binoculars</span></a><span data-dcnode-id="2099" instrument_node=""> on those really frigid nights. With binoculars you can step out to look at the sky briefly, whereas a telescope requires an investment of time setting it up and taking it down.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2053" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2054" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2055"><div data-dcnode-id="2056"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2057" id="trc_wrapper_60175" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2081" id="trc_header_60175"><div class="trc_header_ext" data-dcnode-id="2083"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2091"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2084"><a class="trc_desktop_disclosure_link trc_attribution_positio nk-parsed" data-component-tracked="1" data-dcnode-id="2029" data-url="https://skysafariastronomy.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skysafariastronomy.com/"><span data-dcnode-id="2030" instrument_node="">SkySafari app</span></a><span data-dcnode-id="2028" instrument_node="">)</span></span></figcaption></figure><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">The current winter sky is particularly well-suited to low-power observing and contains many fine binocular objects. I'd like to recommend three books which are ideal if you plan to scan the skies with binoculars.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2022" id="ad-unit-2"></div><p data-dcnode-id="2011"><span data-dcnode-id="2021" instrument_node="">The first is "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1024954668799774100" data-dcnode-id="2019" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Touring the Universe through Binoculars" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=72128&amp;GR_URL=https%3A%2F%2Famazon.com%2FTouring-Universe-through-Binoculars-Astronomers%2Fdp%2FB01JXWLTZ0%3Ftag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Touring-Universe-through-Binoculars-Astronomers/dp/B01JXWLTZ0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D72128%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FTouring-Universe-through-Binoculars-Astronomers%252Fdp%252FB01JXWLTZ0%253Ftag%253Dhawk-future-20%2526ascsubtag%253Dspace-us-1024954668799774100-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2020" instrument_node="">Touring the Universe through Binoculars</span></a><span data-dcnode-id="2018" instrument_node="">" by Philip S. Harrington (John Wiley &amp; Sons, 1990). Next is "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="9370880715504058000" data-dcnode-id="2016" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Binocular Highlights" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=72128&amp;GR_URL=https%3A%2F%2Famazon.com%2FBinocular-Highlights-Celestial-Sights-Users-ebook%2Fdp%2FB00HM8YWUC%3Ftag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Binocular-Highlights-Celestial-Sights-Users-ebook/dp/B00HM8YWUC" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D72128%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FBinocular-Highlights-Celestial-Sights-Users-ebook%252Fdp%252FB00HM8YWUC%253Ftag%253Dhawk-future-20%2526ascsubtag%253Dspace-us-9370880715504058000-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2017" instrument_node="">Binocular Highlights</span></a><span data-dcnode-id="2015" instrument_node="">" by Gary Seronik (Sky &amp; Telescope, 2017). And finally, "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1093107882830737200" data-dcnode-id="2013" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Stargazing Basics" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=72128&amp;GR_URL=https%3A%2F%2Famazon.com%2FStargazing-Basics-Getting-Recreational-Astronomy%2Fdp%2F0521728592%3Ftag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Stargazing-Basics-Getting-Recreational-Astronomy/dp/0521728592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D72128%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FStargazing-Basics-Getting-Recreational-Astronomy%252Fdp%252F0521728592%253Ftag%253Dhawk-future-20%2526ascsubtag%253Dspace-us-1093107882830737200-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2014" instrument_node="">Stargazing Basics</span></a><span data-dcnode-id="2012" instrument_node="">" by Paul E. Kinzer (Cambridge University Press, 2008).</span></p><h2 data-dcnode-id="2009" id="two-for-the-price-of-one"><span data-dcnode-id="2010" instrument_node="">Two for the price of one!
</span></h2><p data-dcnode-id="2001"><span data-dcnode-id="2008" instrument_node="">This week's sky, at around 9 p.m. local time, is notable for the many star clusters that invite inspection in binoculars. Let's start with the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2006" data-url="https://apod.nasa.gov/apod/ap090103.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apod.nasa.gov/apod/ap090103.html"><span data-dcnode-id="2007" instrument_node="">Double Cluster in Perseus</span></a><span data-dcnode-id="2005" instrument_node="">. Face northwest about halfway up from the horizon to the point overhead and you'll see the familiar zig-zag row of five stars of the constellation </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/29132-cassiopeia-the-banished-queen-of-constellations.html"><span data-dcnode-id="2004" instrument_node="">Cassiopeia, the queen</span></a><span data-dcnode-id="2002" instrument_node="">. Now with binoculars, scan the area to the upper left of the queen and you'll run across the Double Cluster.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="2000" data-feat-ref="bordeaux-feat-id-77" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1999" data-feat-ref="bordeaux-feat-id-81" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="1978"><div class="image-full-width-wrapper" data-dcnode-id="1990"><div class="image-widthsetter" data-dcnode-id="1991" style="max-width:2048px;"><p class="vanilla-image-block" data-dcnode-id="1992" style="padding-top:71.44%;"><picture data-dcnode-id="1993"><source alt="Astrophotographer Joel Tonyan captured this image of the Double Cluster in Perseus using an Astro-tech TMB-92 refractor telescope." class="expandable lazy-image-van optional-image" data-dcnode-id="1998" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="Astrophotographer Joel Tonyan captured this image of the Double Cluster in Perseus using an Astro-tech TMB-92 refractor telescope." class="expandable lazy-image-van optional-image" data-dcnode-id="1997" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1994"><img alt="Astrophotographer Joel Tonyan captured this image of the Double Cluster in Perseus using an Astro-tech TMB-92 refractor telescope." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="1996" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/MKKoWby7pXuC9MVDRqHmEC-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1995"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="1979" itemprop="caption description"><span class="caption-text" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Astrophotographer Joel Tonyan captured this image of the Double Cluster in Perseus using an &nbsp;Astro-tech TMB-92 refractor telescope. </span></span><span class="credit" data-dcnode-id="1980" itemprop="copyrightHolder"><span data-dcnode-id="1987" instrument_node="">(Image credit: Joel Tonyan/</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1985" data-url="https://www.flickr.com/photos/tychosnose/22099309745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/tychosnose/22099309745"><span data-dcnode-id="1986" instrument_node="">Flickr</span></a><span data-dcnode-id="1984" instrument_node="">/</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1982" data-url="https://creativecommons.org/licenses/by-nc-nd/2.0/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/2.0/"><span data-dcnode-id="1983" instrument_node="">CC BY-NC-ND 2.0</span></a><span data-dcnode-id="1981" instrument_node="">)</span></span></figcaption></figure><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">The total light of this rich scatter of stardust is equivalent to the brightness of a fourth-magnitude star, so the naked eye sees it as a brighter patch of the Milky Way. (</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21640-star-luminosity-and-magnitude.html"><span data-dcnode-id="1976" instrument_node="">Magnitude</span></a><span data-dcnode-id="1974" instrument_node=""> is a measure of brightness, with negative numbers denoting the brightest objects. For comparison, the Andromeda galaxy is just slightly brighter at magnitude 3.44, and the faintest magnitude visible to the naked eye from a dark sky is 6.5.)</span></p><p data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">As its moniker suggests, there are actually two concentrations of stars here, called h Persei and Chi Persei — a "double" cluster. The ancient astronomers Hipparchus and Ptolemy described them as a "cloudy spot." It was </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15589-galileo-galilei.html"><span data-dcnode-id="1971" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="1969" instrument_node=""> with his crude telescope who first noticed they were really two clusters of stars. Astronomers estimate that their apparent brightness is dimmed by roughly 1.7 magnitudes thanks to interstellar dust.&nbsp;</span></p><p data-dcnode-id="1960"><span data-dcnode-id="1967" instrument_node="">When we take this into account, it turns out that the ten brightest stars of this Double Cluster are actually comparable to such brilliant luminaries as </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22009-betelgeuse.html"><span data-dcnode-id="1966" instrument_node="">Betelgeuse</span></a><span data-dcnode-id="1964" instrument_node=""> and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22872-rigel.html"><span data-dcnode-id="1963" instrument_node="">Rigel</span></a><span data-dcnode-id="1961" instrument_node=""> in the constellation Orion, the hunter, for each cluster contains very massive blue stars and some of the brightest red stars known. The blue stars are extremely hot, on the order of 100,000 degrees, blazing out energy so fast that they cannot keep it up for more than 10 million years, changing to red as they age. Estimates place these star clusters at a distance of about 7,400 light-years from Earth. Together, their apparent size in the sky exceeds that of the full moon, and in binoculars or a small, low-power telescope they form one of the most impressive and spectacular objects in the entire heavens.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="1955"><div class="jwplayer__wrapper" data-dcnode-id="1956"><div class="future__jwplayer" data-dcnode-id="1957" id="futr_botr_P5yPS2lZ_bQHItauA_div"><div data-dcnode-id="1958" id="botr_P5yPS2lZ_bQHItauA_div"></div></div></div></div><h2 data-dcnode-id="1953" id="face-of-the-angry-bull"><span data-dcnode-id="1954" instrument_node="">Face of the angry bull
</span></h2><p data-dcnode-id="1945"><span data-dcnode-id="1952" instrument_node="">Next, turn your attention due south and enjoy the sight of the most brilliant of all the constellations, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16659-constellation-orion.html"><span data-dcnode-id="1951" instrument_node="">Orion, the unter</span></a><span data-dcnode-id="1949" instrument_node="">. Using his distinctive three-star belt, extend a diagonal line upwards, which will eventually take you to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17101-taurus-constellation.html"><span data-dcnode-id="1948" instrument_node="">Taurus, the bull</span></a><span data-dcnode-id="1946" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">The charging bull's angry face is plainly marked by the fine V-shaped cluster of the Hyades. Notice the first-magnitude orange star at the end of the lower arm of the V, which represents the Bull's fiery eye. That's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22026-aldebaran.html"><span data-dcnode-id="1943" instrument_node="">Aldebaran</span></a><span data-dcnode-id="1941" instrument_node="">, "the follower"; it rises soon after the famous Pleiades star cluster, which we'll meet in a moment, and pursues the cluster across the sky. I've always marveled at how Aldebaran — really just an innocent bystander — just happens to lie along our line of sight to complete so perfectly the cluster's characteristic "V" shape.&nbsp;</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1939" instrument_node="">The Hyades are among the nearest of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/35824-viewing-open-star-clusters-mobile-apps.html"><span data-dcnode-id="1938" instrument_node="">star clusters</span></a><span data-dcnode-id="1936" instrument_node="">, which explains why so many of the separate stars can be seen. At the middle of each arm is an attractive stellar grouping or "subcluster" that binoculars enhance. At a distance of 130 light-years from Earth, the Hyades members travel through space like a flock of geese, their paths ultimately converging toward a point between the star </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22929-procyon.html"><span data-dcnode-id="1935" instrument_node="">Procyon</span></a><span data-dcnode-id="1933" instrument_node=""> in Canis Minor and Betelgeuse in Orion, while receding from us at the rate of 100,000 mph (160,000 kph). Aldebaran is moving toward the south almost at right angles to the cluster's motion and twice as fast. Taurus's V-shaped head is, therefore, going to pieces. After 50,000 years it will be no more.&nbsp;</span></p><p data-dcnode-id="1926"><strong data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/41908-watch-stars-drift-with-mobile-apps.html"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Watch stars drift and constellations change shape using mobile apps</span></strong></a></p><div class="bordeaux-slot" data-dcnode-id="1925" data-feat-ref="bordeaux-feat-id-78" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1924" data-feat-ref="bordeaux-feat-id-82" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-right" data-bordeaux-image-check="" data-dcnode-id="1906"><div class="image-full-width-wrapper" data-dcnode-id="1915"><div class="image-widthsetter" data-dcnode-id="1916" style="max-width:1024px;"><p class="vanilla-image-block" data-dcnode-id="1917" style="padding-top:143.65%;"><picture data-dcnode-id="1918"><source alt="The Pleiades star cluster (M45) is a group of 800 stars formed about 100 million years ago. The cluster is located 410 light-years away from Earth in the constellation Taurus." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="1923" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Pleiades star cluster (M45) is a group of 800 stars formed about 100 million years ago. The cluster is located 410 light-years away from Earth in the constellation Taurus." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="1922" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1919"><img alt="The Pleiades star cluster (M45) is a group of 800 stars formed about 100 million years ago. The cluster is located 410 light-years away from Earth in the constellation Taurus." class="pull-right expandable lazy-image-van optional-image loaded" data-dcnode-id="1921" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/FUTaoVWekCsgskabuJcFoU-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1920"></div></figure><p></p></div></div><figcaption class="pull-right" data-dcnode-id="1907" itemprop="caption description"><span class="caption-text" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">The Pleiades star cluster (M45) is a group of 800 stars formed about 100 million years ago. The cluster is located 410 light-years away from Earth in the constellation Taurus. </span></span><span class="credit" data-dcnode-id="1908" itemprop="copyrightHolder"><span data-dcnode-id="1912" instrument_node="">(Image credit: Chuck Manges | </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1910" data-url="http://www.astrochuck.blogspot.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astrochuck.blogspot.com/"><span data-dcnode-id="1911" instrument_node=""> www.astrochuck.blogspot.com</span></a><span data-dcnode-id="1909" instrument_node="">)</span></span></figcaption></figure><h2 data-dcnode-id="1904" id="the-seven-sisters"><span data-dcnode-id="1905" instrument_node="">The Seven Sisters</span></h2><p data-dcnode-id="1896"><span data-dcnode-id="1903" instrument_node="">South of Perseus is one of the best — some might say </span><em data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">the</span></em><span data-dcnode-id="1900" instrument_node=""> best — binocular sights in the entire sky: the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/pleiades.html"><span data-dcnode-id="1899" instrument_node="">Pleiades star cluster</span></a><span data-dcnode-id="1897" instrument_node="">. It is the most prominent open (or galactic) cluster in our heavens, even though it is 400 light-years from us. An odd sidelight about this object is that some early 18th-century astronomers believed its bright star, Alcyone, was the center of the universe around which all else revolved.&nbsp;</span></p><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">This cluster, popularly known as the Seven Sisters, may be one of the first astronomical subjects recorded. It was known to the ancient Greek poet Hesiod nearly 3,000 years ago, and a reference to it has been found in Chinese annals dated around 2357 B.C. It is also mentioned three times in the Bible. The Japanese Feast of Lanterns festivals are remnants of ancient Tauric rites in honor of the Pleiades, and if your car is a Subaru, that is the Japanese name for this star cluster.&nbsp;</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1893" instrument_node="">In fact, the Subaru logo consists of six stars, and indeed to most eyes, while at first glance the Pleiades look like a shimmering little cloud of light, closer examination will readily reveal a tight knot of six stars. Why they are called the </span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">seven</span></em><span data-dcnode-id="1890" instrument_node=""> sisters is unknown, though some with acute vision have recorded a dozen or more "sisters" under excellent conditions. Several stars in the cluster seem to be enveloped in clouds of dust, perhaps left over from the stuff of which they were formed. The entire cluster may contain a total of perhaps 250 stars.</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">When giving planetarium shows, I'll ask my audience why they think Taurus is so angry. After hearing some suggestions, I'll point to the Pleiades and remark that, "It's probably because he has a bunch of bumblebees stinging his back." And interestingly, it is bumblebee&nbsp;workers — which are the female&nbsp;bumblebees — and queens, that possess stingers.</span></p><h2 data-dcnode-id="1885" id="the-manger-or-a-swarm-of-bees"><span data-dcnode-id="1886" instrument_node="">The Manger (or a swarm of bees)
</span></h2><div class="bordeaux-slot" data-dcnode-id="1884" data-feat-ref="bordeaux-feat-id-79" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1883" data-feat-ref="bordeaux-feat-id-83" id="bordeaux-static-slot-12" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="1862"><div class="image-full-width-wrapper" data-dcnode-id="1874"><div class="image-widthsetter" data-dcnode-id="1875" style="max-width:1024px;"><p class="vanilla-image-block" data-dcnode-id="1876" style="padding-top:66.70%;"><picture data-dcnode-id="1877"><source alt="The Beehive cluster sparkles in the evening sky as the crescent moon rises with Jupiter and several of its moons on Aug. 23, 2014, in this photo by Jeff Sullivan." class="expandable lazy-image-van optional-image" data-dcnode-id="1882" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Beehive cluster sparkles in the evening sky as the crescent moon rises with Jupiter and several of its moons on Aug. 23, 2014, in this photo by Jeff Sullivan." class="expandable lazy-image-van optional-image" data-dcnode-id="1881" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1878"><img alt="The Beehive cluster sparkles in the evening sky as the crescent moon rises with Jupiter and several of its moons on Aug. 23, 2014, in this photo by Jeff Sullivan." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="1880" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/UvMnCVCcYgsxgmQKVD6YSB-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1879"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="1863" itemprop="caption description"><span class="caption-text" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">The Beehive cluster sparkles in the evening sky as the crescent moon rises with Jupiter and several of its moons on Aug. 23, 2014, in this photo by Jeff Sullivan. </span></span><span class="credit" data-dcnode-id="1864" itemprop="copyrightHolder"><span data-dcnode-id="1871" instrument_node="">(Image credit: Jeff Sullivan/</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1869" data-url="https://www.flickr.com/photos/jeffreysullivan/15024839055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/jeffreysullivan/15024839055"><span data-dcnode-id="1870" instrument_node="">Flickr</span></a><span data-dcnode-id="1868" instrument_node="">/</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1866" data-url="https://creativecommons.org/licenses/by-nc-nd/2.0/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/2.0/"><span data-dcnode-id="1867" instrument_node="">CC BY-NC-ND 2.0</span></a><span data-dcnode-id="1865" instrument_node="">)</span></span></figcaption></figure><p data-dcnode-id="1854"><span data-dcnode-id="1861" instrument_node="">Finally, there is a patch of light hovering halfway up in the east-southeast sky. Using binoculars, sweep the region roughly midway between the bright star </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22890-regulus.html"><span data-dcnode-id="1860" instrument_node="">Regulus</span></a><span data-dcnode-id="1858" instrument_node=""> in the constellation Leo, the lion and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22068-pollux.html"><span data-dcnode-id="1857" instrument_node="">Pollux</span></a><span data-dcnode-id="1855" instrument_node=""> in the constellation Gemini, the twins, and it is there that you will find one of the brightest galactic star clusters. But what to call it?&nbsp;</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Some astronomy texts speak of "Praesepe, the Manger," while others call it the "Beehive." A manger is defined as "a feeding trough for donkeys." The cluster was apparently first called Praesepe 20 centuries ago. Galileo first resolved it into stars in 1610. A few dozen stars can be seen in binoculars or a low-power telescope.&nbsp;</span></p><p data-dcnode-id="1847"><span data-dcnode-id="1851" instrument_node="">The cluster's relatively new moniker — "Beehive" — may have evolved almost four centuries ago, when some unknown person, upon seeing so many stars revealed in one of the first crude telescopes cried out: "It looks like a swarm of bees!" Hence, the reason for why some astronomy books call the cluster "Beehive," while others call it "Praesepe." Perhaps the older designation "Praesepe" is preferable since two nearby stars of the constellation </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16970-cancer-constellation.html"><span data-dcnode-id="1850" instrument_node="">Cancer, the crab</span></a><span data-dcnode-id="1848" instrument_node=""> have been known for 2,000 years as Asellus Borealis and Asellus Australis — the northern and southern ass colts — feeding from a manger.&nbsp;</span></p><p data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">Our society has categorized </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1844" data-url="https://www.livescience.com/54258-donkeys.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/54258-donkeys.html"><span data-dcnode-id="1845" instrument_node="">donkeys</span></a><span data-dcnode-id="1843" instrument_node=""> as willing but somewhat stubborn beasts — an unfair assumption as they actually have a keen sense of self-preservation, and think about things before they react. That having been said, I would think they are indeed rather wise; certainly they would hardly try to feed from a beehive!</span></p><p data-dcnode-id="1839"><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Joe Rao serves as an instructor and guest lecturer at New York's&nbsp;Hayden Planetarium. He writes about astronomy for&nbsp;Natural History magazine, the&nbsp;Farmers' Almanac&nbsp;and other publications. Follow us&nbsp;on Twitter&nbsp;@Spacedotcom&nbsp;and on&nbsp;Facebook.&nbsp;</span></em></p><span data-dcnode-id="1838" instrument_node="">
</span></div><span data-dcnode-id="1836" instrument_node="">

</span><span class="bio" data-dcnode-id="1766"><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Joe Rao is Space.com's skywatching columnist, as well as a veteran meteorologist and eclipse chaser who also serves as an instructor and guest lecturer at New York's Hayden Planetarium. He writes about astronomy for Natural History magazine, the Farmers' Almanac and other publications. Joe is an 8-time Emmy-nominated meteorologist who served the Putnam Valley region of New York for over 21 years. You can find him on Twitter and YouTube tracking lunar and solar eclipses, meteor showers and more. To find out Joe's latest project, visit him on Twitter.</span></p></span><span data-dcnode-id="1765" instrument_node="">
