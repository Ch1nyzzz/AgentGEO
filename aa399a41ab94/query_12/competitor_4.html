span></a></sup></td></tr><tr data-dcnode-id="1927"><th class="infobox-label" data-dcnode-id="1930" scope="row"><span data-dcnode-id="1931" instrument_node="">Country</span></th><td class="infobox-data" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Japan</span></td></tr><tr data-dcnode-id="1922"><th class="infobox-label" data-dcnode-id="1925" scope="row"><span data-dcnode-id="1926" instrument_node="">Language</span></th><td class="infobox-data" data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Japanese</span></td></tr><tr data-dcnode-id="1910"><th class="infobox-label" data-dcnode-id="1920" scope="row"><span data-dcnode-id="1921" instrument_node="">Genre</span></th><td class="infobox-data" data-dcnode-id="1911"><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_literature" title="Children's literature"><span data-dcnode-id="1919" instrument_node="">Children's literature</span></a><span data-dcnode-id="1917" instrument_node="">, </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fantasy" title="Fantasy"><span data-dcnode-id="1916" instrument_node="">Fantasy</span></a><span data-dcnode-id="1914" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosophical_novel" title="Philosophical novel"><span data-dcnode-id="1913" instrument_node="">Philosophical novel</span></a></td></tr><tr data-dcnode-id="1905"><th class="infobox-label" data-dcnode-id="1908" scope="row"><span data-dcnode-id="1909" instrument_node="">Publisher</span></th><td class="infobox-data" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Bunpodō</span></td></tr><tr data-dcnode-id="1896"><th class="infobox-label" data-dcnode-id="1902" scope="row"><div data-dcnode-id="1903" style="display:inline-block; line-height:1.2em; padding:0.1em 0;"><span data-dcnode-id="1904" instrument_node="">Publication date</span></div></th><td class="infobox-data" data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">October 1934</span><sup class="reference" data-dcnode-id="1898" id="cite_ref-ohyama-date_2-0"><a data-dcnode-id="1899" href="#cite_note-ohyama-date-2"><span data-dcnode-id="1900" instrument_node="">[2]</span></a></sup></td></tr></tbody></table><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1831"><i data-dcnode-id="1890"><b data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Night on the Galactic Railroad</span></b></i><span data-dcnode-id="1880" style="font-weight: normal"><span data-dcnode-id="1889" instrument_node=""> (</span><span data-dcnode-id="1886" title="Japanese-language text"><span data-dcnode-id="1887" lang="ja"><span data-dcnode-id="1888" instrument_node="">銀河鉄道の夜</span></span></span><span data-dcnode-id="1885" instrument_node="">, </span><span data-dcnode-id="1882" title="Hepburn transliteration"><i data-dcnode-id="1883" lang="ja-Latn"><span data-dcnode-id="1884" instrument_node="">Ginga Tetsudō no Yoru</span></i></span><span data-dcnode-id="1881" instrument_node="">)</span></span><span data-dcnode-id="1879" instrument_node="">, sometimes translated as </span><i data-dcnode-id="1876"><b data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Milky Way Railroad</span></b></i><span data-dcnode-id="1875" instrument_node="">, </span><i data-dcnode-id="1872"><b data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Night Train to the Stars</span></b></i><span data-dcnode-id="1871" instrument_node=""> or </span><i data-dcnode-id="1868"><b data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Fantasy Railroad in the Stars</span></b></i><span data-dcnode-id="1867" instrument_node="">,</span><sup class="reference" data-dcnode-id="1864" id="cite_ref-translations_1-1"><a data-dcnode-id="1865" href="#cite_note-translations-1"><span data-dcnode-id="1866" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1863" instrument_node=""> is a classic Japanese fantasy </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novel" title="Novel"><span data-dcnode-id="1862" instrument_node="">novel</span></a><span data-dcnode-id="1860" instrument_node=""> by </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kenji_Miyazawa" title="Kenji Miyazawa"><span data-dcnode-id="1859" instrument_node="">Kenji Miyazawa</span></a><span data-dcnode-id="1857" instrument_node=""> written around 1927. The nine-chapter novel was posthumously published in 1934 as part of </span><i data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Complete Works of Kenji Miyazawa</span></i><span data-dcnode-id="1854" instrument_node=""> Vol. 3</span><span data-dcnode-id="1848" style="font-weight: normal"><span data-dcnode-id="1853" instrument_node=""> (</span><span data-dcnode-id="1850" title="Japanese-language text"><span data-dcnode-id="1851" lang="ja"><span data-dcnode-id="1852" instrument_node="">『宮沢賢治全集』第三巻</span></span></span><span data-dcnode-id="1849" instrument_node="">)</span></span><span data-dcnode-id="1847" instrument_node=""> published by Bunpodō</span><span data-dcnode-id="1841" style="font-weight: normal"><span data-dcnode-id="1846" instrument_node=""> (</span><span data-dcnode-id="1843" title="Japanese-language text"><span data-dcnode-id="1844" lang="ja"><span data-dcnode-id="1845" instrument_node="">文圃堂</span></span></span><span data-dcnode-id="1842" instrument_node="">)</span></span><span data-dcnode-id="1840" instrument_node="">.</span><sup class="reference" data-dcnode-id="1837" id="cite_ref-3"><a data-dcnode-id="1838" href="#cite_note-3"><span data-dcnode-id="1839" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1836" instrument_node=""> Four versions are known to be in existence, with the last one being the most famous among Japanese readers.</span><sup class="reference" data-dcnode-id="1833" id="cite_ref-4"><a data-dcnode-id="1834" href="#cite_note-4"><span data-dcnode-id="1835" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1832" instrument_node="">
</span></p><p data-dcnode-id="1820"><span data-dcnode-id="1830" instrument_node="">The novel was adapted as a </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Night_on_the_Galactic_Railroad_%28film%29" title="Night on the Galactic Railroad (film)"><span data-dcnode-id="1829" instrument_node="">1985 anime film of the same title</span></a><span data-dcnode-id="1827" instrument_node=""> as well as various </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musical_theatre" title="Musical theatre"><span data-dcnode-id="1826" instrument_node="">stage musicals</span></a><span data-dcnode-id="1824" instrument_node=""> and </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Play_%28theatre%29" title="Play (theatre)"><span data-dcnode-id="1823" instrument_node="">plays</span></a><span data-dcnode-id="1821" instrument_node="">.

</span><h2 data-dcnode-id="1677"><span class="mw-headline" data-dcnode-id="1685" id="Plot_summary"><span data-dcnode-id="1686" instrument_node="">Plot summary</span></span><span class="mw-editsection" data-dcnode-id="1678"><span class="mw-editsection-bracket" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">[</span></span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D1" title="Edit section: Plot summary"><span data-dcnode-id="1682" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Giovanni is a lonely boy, whose father is away on a long fishing trip, while his mother is ill at home. As a result, the young Giovanni must undertake paid jobs before and after school, delivering papers and setting type at the printers, in order to provide food for his poor family. These adult responsibilities leave him with no time to study or socialize, and he is ridiculed by his classmates. Apart from Giovanni's mother and sister, the only person who really cares for him is his former playmate Campanella, whose father is a close friend of Giovanni's father.
</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node="">During a lesson about the galaxy, the teacher asks Giovanni what the </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" title="Milky Way"><span data-dcnode-id="1672" instrument_node="">Milky Way</span></a><span data-dcnode-id="1670" instrument_node=""> is made of. Giovanni knows it is formed of stars, but is unable to say so, and Campanella does the same to save Giovanni from further teasing by the rest of the class. At the end of the lesson, the teacher encourages all the children to attend the festival of stars that evening. Upon returning home, Giovanni finds that no milk was delivered that day, so he heads out to the dairy to fetch it for his mother's dinner. Giovanni only encounters an elderly woman at the dairy, and once he pleads that his ill mother needs her milk that night, the woman advises him to come back later.
</span></p><p data-dcnode-id="1660"><span data-dcnode-id="1668" instrument_node="">Giovanni intends to watch the festival with Campanella, but on his way into town, he is mocked by his schoolmates for expecting an otter-skin coat from his father. Upset by this taunt, Giovanni flees from the town. He walks alone to the top of a nearby hill and lies on the ground at the base of a "weather wheel" (天気輪).</span><sup class="reference plainlinks nourlexpansion" data-dcnode-id="1665" id="ref_a"><a class="external autonumber" data-dcnode-id="1666" href="#endnote_a"><span data-dcnode-id="1667" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1664" instrument_node=""> As he gazes up at the Milky Way in the sky above, Giovanni suddenly finds himself with Campanella onboard a steam train, which travels past the </span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cygnus_%28constellation%29" title="Cygnus (constellation)"><span data-dcnode-id="1663" instrument_node="">Northern Cross</span></a><span data-dcnode-id="1661" instrument_node=""> and many other stars in its journey across the galaxy. The two boys witness many amazing sights and meet various people, including scholars excavating a fossil from sands of white crystal, and a man who catches herons to turn them into candy.
</span></p><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">When a ticket inspector appears, Giovanni discovers he has a rare ticket which allows him to go anywhere that the train runs. Shortly after, the boys are joined in their seats by a tutor and two children, Kaoru and Tadashi, who were onboard a ship that sank after hitting an iceberg. As the train passes the flame of </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scorpius" title="Scorpius"><span data-dcnode-id="1658" instrument_node="">Scorpio</span></a><span data-dcnode-id="1656" instrument_node="">, Kaoru recalls that it was once a scorpion who ate other insects, but perished in a well after escaping a weasel; regretting that it did not sacrifice itself for a good cause, the scorpion prayed to bring happiness to others in the next life, and its body burst into a bright flame that still burns in the night sky.
</span></p><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">The train next stops at the </span><a class="mw-redirect" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crux_%28constellation%29" title="Crux (constellation)"><span data-dcnode-id="1653" instrument_node="">Southern Cross</span></a><span data-dcnode-id="1651" instrument_node="">, where all the other passengers disembark for the Christian heaven, leaving only Giovanni and Campanella onboard as the train continues its journey. Giovanni pledges that they should go on together for ever, and vows to follow Scorpio's example of bringing true happiness to everyone. However, as the train approaches the </span><a class="mw-redirect" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coalsack" title="Coalsack"><span data-dcnode-id="1650" instrument_node="">Coalsack</span></a><span data-dcnode-id="1648" instrument_node=""> - a hole in the sky - Campanella sees what he considers 'the true heaven', where his mother is waiting for him, and suddenly vanishes from the train, leaving Giovanni alone in despair.
</span></p><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Giovanni wakes up on the hilltop, and initially dismisses his journey through the Milky Way as a dream. He heads back to the dairy, where this time he collects a bottle of milk from a farmer, who explains that an escaped calf drank half of the day's milk supply. As Giovanni passes through town on his way home, he learns that Campanella has fallen into the river while saving another boy from drowning. Giovanni hurries to the river, in fear of what he already knows, and finds Campanella's father just as he sadly gives up searching for his son, believing Campanella to have drowned. He tells Giovanni that he has received a letter from his father, announcing that he will be home soon. Continuing homeward to deliver this news and the milk to his mother, Giovanni secretly knows where Campanella went, and vows to stay strong throughout life.
</span></p><span data-dcnode-id="1644" instrument_node="">
</span><h2 data-dcnode-id="1634"><span class="mw-headline" data-dcnode-id="1642" id="Major_themes"><span data-dcnode-id="1643" instrument_node="">Major themes</span></span><span class="mw-editsection" data-dcnode-id="1635"><span class="mw-editsection-bracket" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">[</span></span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D2" title="Edit section: Major themes"><span data-dcnode-id="1639" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1632" instrument_node="">After Miyazawa's most beloved sister Toshi died in 1922, Miyazawa, in sorrow, went on a railroad trip to </span><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakhalin" title="Sakhalin"><span data-dcnode-id="1631" instrument_node="">Sakhalin</span></a><span data-dcnode-id="1629" instrument_node="">. He started working on this novel soon afterward in 1924, and this trip is said to be the basis of the story.</span><sup class="reference" data-dcnode-id="1626" id="cite_ref-5"><a data-dcnode-id="1627" href="#cite_note-5"><span data-dcnode-id="1628" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1625" instrument_node=""> He kept on polishing the work steadily until his death in 1933. The middle part of the novel was never completed but was published as it is nevertheless.
</span></p><p data-dcnode-id="1607"><span data-dcnode-id="1623" instrument_node="">A tribute to those who give themselves to others is a recurring theme throughout the storyline, and according to Hasebe (2000), they are reflections of Miyazawa's philosophy of self-sacrifice, a view appearing in many other juvenile novels of his such as </span><i data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Yodaka no Hoshi</span></i><span data-dcnode-id="1620" instrument_node=""> and </span><i data-dcnode-id="1617"><a class="mw-redirect" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gusk%25C5%258D_Budori_no_Denki" title="Guskō Budori no Denki"><span data-dcnode-id="1619" instrument_node="">Guskō Budori no Denki</span></a></i><span data-dcnode-id="1616" instrument_node="">.</span><sup class="reference" data-dcnode-id="1613" id="cite_ref-6"><a data-dcnode-id="1614" href="#cite_note-6"><span data-dcnode-id="1615" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1612" instrument_node=""> Meanwhile, Suzuki (2004) interprets them as representing a "holistic thought of Ecosystem".</span><sup class="reference" data-dcnode-id="1609" id="cite_ref-7"><a data-dcnode-id="1610" href="#cite_note-7"><span data-dcnode-id="1611" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1608" instrument_node="">
</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h2 data-dcnode-id="1596"><span class="mw-headline" data-dcnode-id="1604" id="Adaptations"><span data-dcnode-id="1605" instrument_node="">Adaptations</span></span><span class="mw-editsection" data-dcnode-id="1597"><span class="mw-editsection-bracket" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">[</span></span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D3" title="Edit section: Adaptations"><span data-dcnode-id="1601" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1595" instrument_node="">
</span><h3 data-dcnode-id="1585"><span class="mw-headline" data-dcnode-id="1593" id="Animated_film"><span data-dcnode-id="1594" instrument_node="">Animated film</span></span><span class="mw-editsection" data-dcnode-id="1586"><span class="mw-editsection-bracket" data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">[</span></span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D4" title="Edit section: Animated film"><span data-dcnode-id="1590" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1584" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1578" role="note"><span data-dcnode-id="1581" instrument_node="">Main article: </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Night_on_the_Galactic_Railroad_%28film%29" title="Night on the Galactic Railroad (film)"><span data-dcnode-id="1580" instrument_node="">Night on the Galactic Railroad (film)</span></a></div><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1576" instrument_node="">The story was made into a 1985 </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anime" title="Anime"><span data-dcnode-id="1575" instrument_node="">anime</span></a><span data-dcnode-id="1573" instrument_node=""> film directed by </span><a class="mw-redirect" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gisaburo_Sugii" title="Gisaburo Sugii"><span data-dcnode-id="1572" instrument_node="">Gisaburo Sugii</span></a><span data-dcnode-id="1570" instrument_node=""> based on a screenplay by </span><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minoru_Betsuyaku" title="Minoru Betsuyaku"><span data-dcnode-id="1569" instrument_node="">Minoru Betsuyaku</span></a><span data-dcnode-id="1567" instrument_node="">. It was released on July 13, 1985, and features </span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mayumi_Tanaka" title="Mayumi Tanaka"><span data-dcnode-id="1566" instrument_node="">Mayumi Tanaka</span></a><span data-dcnode-id="1564" instrument_node=""> as Giovanni and </span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chika_Sakamoto" title="Chika Sakamoto"><span data-dcnode-id="1563" instrument_node="">Chika Sakamoto</span></a><span data-dcnode-id="1561" instrument_node=""> as Campanella.
</span></p><span data-dcnode-id="1559" instrument_node="">
</span><h3 data-dcnode-id="1549"><span class="mw-headline" data-dcnode-id="1557" id="Stage_adaptations"><span data-dcnode-id="1558" instrument_node="">Stage adaptations</span></span><span class="mw-editsection" data-dcnode-id="1550"><span class="mw-editsection-bracket" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">[</span></span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D5" title="Edit section: Stage adaptations"><span data-dcnode-id="1554" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1517"><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Playwright" title="Playwright"><span data-dcnode-id="1547" instrument_node="">Playwright</span></a><span data-dcnode-id="1545" instrument_node=""> Sō Kitamura made the story into a drama titled </span><i data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Sōkō: Night on the Galactic Railroad</span></i><span data-dcnode-id="1537" style="font-weight: normal"><span data-dcnode-id="1542" instrument_node=""> (</span><span data-dcnode-id="1539" title="Japanese-language text"><span data-dcnode-id="1540" lang="ja"><span data-dcnode-id="1541" instrument_node="">想稿・銀河鉄道の夜</span></span></span><span data-dcnode-id="1538" instrument_node="">)</span></span><span data-dcnode-id="1536" instrument_node="">. Note that 想稿 could be a play on the word sōkō</span><span data-dcnode-id="1530" style="font-weight: normal"><span data-dcnode-id="1535" instrument_node=""> (</span><span data-dcnode-id="1532" title="Japanese-language text"><span data-dcnode-id="1533" lang="ja"><span data-dcnode-id="1534" instrument_node="">草稿</span></span></span><span data-dcnode-id="1531" instrument_node="">, "rough draft")</span></span><span data-dcnode-id="1529" instrument_node=""> and the character 想</span><span data-dcnode-id="1523" style="font-weight: normal"><span data-dcnode-id="1528" instrument_node=""> (</span><span data-dcnode-id="1525" title="Japanese-language text"><i data-dcnode-id="1526" lang="ja"><span data-dcnode-id="1527" instrument_node="">sō</span></i></span><span data-dcnode-id="1524" instrument_node="">)</span></span><span data-dcnode-id="1522" instrument_node=""> carrying meanings such as "conception" or "idea". Premièred in 1986, the play was performed by Kitamura's theatrical company Project Navi.</span><sup class="reference" data-dcnode-id="1519" id="cite_ref-8"><a data-dcnode-id="1520" href="#cite_note-8"><span data-dcnode-id="1521" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1518" instrument_node="">
</span></p><p data-dcnode-id="1489"><span data-dcnode-id="1516" instrument_node="">A part in a 2002 play consisting of various works by Kenji </span><i data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">The Account of Kenji Island Exploration</span></i><span data-dcnode-id="1504" style="font-weight: normal"><span data-dcnode-id="1513" instrument_node=""> (</span><span data-dcnode-id="1510" title="Japanese-language text"><span data-dcnode-id="1511" lang="ja"><span data-dcnode-id="1512" instrument_node="">賢治島探検記</span></span></span><span data-dcnode-id="1509" instrument_node="">, </span><span data-dcnode-id="1506" title="Hepburn transliteration"><i data-dcnode-id="1507" lang="ja-Latn"><span data-dcnode-id="1508" instrument_node="">Kenji-tō Tankenki</span></i></span><span data-dcnode-id="1505" instrument_node="">)</span></span><span data-dcnode-id="1503" instrument_node=""> written by Yutaka Narui for a theatrical company Caramelbox, features the story by the name of </span><i data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Night on the Light Speed Galactic Railroad</span></i><span data-dcnode-id="1491" style="font-weight: normal"><span data-dcnode-id="1500" instrument_node=""> (</span><span data-dcnode-id="1497" title="Japanese-language text"><span data-dcnode-id="1498" lang="ja"><span data-dcnode-id="1499" instrument_node="">光速銀河鉄道の夜</span></span></span><span data-dcnode-id="1496" instrument_node="">, </span><span data-dcnode-id="1493" title="Hepburn transliteration"><i data-dcnode-id="1494" lang="ja-Latn"><span data-dcnode-id="1495" instrument_node="">Kōsoku Ginga Tetsudō no Yoru</span></i></span><span data-dcnode-id="1492" instrument_node="">)</span></span><span data-dcnode-id="1490" instrument_node="">. It follows through the episodes in the novel rather briefly. The play also includes some lines by Professor Burukaniro, which appear only in the first three versions of the novel.
</span></p><p data-dcnode-id="1482"><a class="new" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWarabiza%26action%3Dedit%26redlink%3D1" title="Warabiza (page does not exist)"><span data-dcnode-id="1488" instrument_node="">Warabiza</span></a><span data-dcnode-id="1486" instrument_node="">, a performing arts company in </span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akita_Prefecture" title="Akita Prefecture"><span data-dcnode-id="1485" instrument_node="">Akita Prefecture</span></a><span data-dcnode-id="1483" instrument_node="">, made a musical version of the story. The musical premièred in April 2004 and toured around Japan until March 2007.
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><h3 data-dcnode-id="1471"><span class="mw-headline" data-dcnode-id="1479" id="Illustrated_e-book"><span data-dcnode-id="1480" instrument_node="">Illustrated e-book</span></span><span class="mw-editsection" data-dcnode-id="1472"><span class="mw-editsection-bracket" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">[</span></span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D6" title="Edit section: Illustrated e-book"><span data-dcnode-id="1476" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">This is an illustrated book with music, launched in 2011 as an application for Apple Inc.'s iPad. Using the final fourth draft of Miyazawa's original as the source text, this version is made up of 272 pages, an unusually large number for a picture book. Apple Japan has recommended the Japanese version as an educational application.
</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h2 data-dcnode-id="1457"><span class="mw-headline" data-dcnode-id="1465" id="Allusions_in_other_works"><span data-dcnode-id="1466" instrument_node="">Allusions in other works</span></span><span class="mw-editsection" data-dcnode-id="1458"><span class="mw-editsection-bracket" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">[</span></span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNight_on_the_Galactic_Railroad%26action%3Dedit%26section%3D7" title="Edit section: Allusions in other works"><span data-dcnode-id="1462" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1456" instrument_node="">
</span><ul data-dcnode-id="1150"><li data-dcnode-id="1434"><span data-dcnode-id="1455" instrument_node="">In the </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T%25C5%258Dhoku_region" title="Tōhoku region"><span data-dcnode-id="1454" instrument_node="">Tōhoku region</span></a><span data-dcnode-id="1452" instrument_node=""> of Japan where Kenji Miyazawa grew up, there is a real-life train line of similar name: Iwate Galaxy Railway Line</span><span data-dcnode-id="1442" style="font-weight: normal"><span data-dcnode-id="1451" instrument_node=""> (</span><span data-dcnode-id="1448" title="Japanese-language text"><span data-dcnode-id="1449" lang="ja"><span data-dcnode-id="1450" instrument_node="">いわて銀河鉄道線</span></span></span><span data-dcnode-id="1447" instrument_node="">, </span><span data-dcnode-id="1444" title="Hepburn transliteration"><i data-dcnode-id="1445" lang="ja-Latn"><span data-dcnode-id="1446" instrument_node="">Iwate Ginga Tetsudō sen</span></i></span><span data-dcnode-id="1443" instrument_node="">)</span></span><span data-dcnode-id="1441" instrument_node="">, running from </span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morioka_Station" title="Morioka Station"><span data-dcnode-id="1440" instrument_node="">Morioka Station</span></a><span data-dcnode-id="1438" instrument_node=""> to </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metoki_Station" title="Metoki Station"><span data-dcnode-id="1437" instrument_node="">Metoki Station</span></a><span data-dcnode-id="1435" instrument_node="">.</span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1427"><span data-dcnode-id="1432" instrument_node="">In the manga and anime </span><i data-dcnode-id="1429"><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doraemon" title="Doraemon"><span data-dcnode-id="1431" instrument_node="">Doraemon</span></a></i><span data-dcnode-id="1428" instrument_node="">, Nobita Nobi once mistook the novel for being Leiji Matsumoto's manga, since both contain "Ginga Tetsudō" in the title.</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1425" instrument_node="">The idea of a steam locomotive running through the stars inspired </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leiji_Matsumoto" title="Leiji Matsumoto"><span data-dcnode-id="1424" instrument_node="">Leiji Matsumoto</span></a><span data-dcnode-id="1422" instrument_node=""> to create his famous </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manga" title="Manga"><span data-dcnode-id="1421" instrument_node="">manga</span></a><span data-dcnode-id="1419" instrument_node="">, </span><i data-dcnode-id="1416"><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy_Express_999" title="Galaxy Express 999"><span data-dcnode-id="1418" instrument_node="">Galaxy Express 999</span></a></i><span data-dcnode-id="1415" instrument_node=""> (whose literal Japanese title is </span><i data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Ginga Tetsudō 999</span></i><span data-dcnode-id="1412" instrument_node="">, possibly in reference to the Japanese title of the novel).</span><sup class="reference" data-dcnode-id="1409" id="cite_ref-9"><a data-dcnode-id="1410" href="#cite_note-9"><span data-dcnode-id="1411" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1392"><span data-dcnode-id="1406" instrument_node="">The story inspired </span><a class="extiw" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ja.wikipedia.org/wiki/GOING_STEADY" title="ja:GOING STEADY"><span data-dcnode-id="1405" instrument_node="">Going Steady</span></a><span data-dcnode-id="1403" instrument_node="">, a Japanese </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Punk_rock" title="Punk rock"><span data-dcnode-id="1402" instrument_node="">punk rock</span></a><span data-dcnode-id="1400" instrument_node=""> band, to create the song "Ginga Tetsudō no Yoru"</span><span data-dcnode-id="1394" style="font-weight: normal"><span data-dcnode-id="1399" instrument_node=""> (</span><span data-dcnode-id="1396" title="Japanese-language text"><span data-dcnode-id="1397" lang="ja"><span data-dcnode-id="1398" instrument_node="">銀河鉄道の夜</span></span></span><span data-dcnode-id="1395" instrument_node="">)</span></span><span data-dcnode-id="1393" instrument_node="">.</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1390" instrument_node="">A character in the </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_novel" title="Light novel"><span data-dcnode-id="1389" instrument_node="">light novel</span></a><span data-dcnode-id="1387" instrument_node=""> </span><i data-dcnode-id="1384"><a class="mw-redirect" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/.hack//AI_buster" title=".hack//AI buster"><span data-dcnode-id="1386" instrument_node="">.hack//AI buster</span></a></i><span data-dcnode-id="1383" instrument_node=""> remarks that he took his </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/User_%28computing%29" title="User (computing)"><span data-dcnode-id="1382" instrument_node="">online handle</span></a><span data-dcnode-id="1380" instrument_node="">, Albireo, because he was so affected by Miyazawa's description of the binary star </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albireo" title="Albireo"><span data-dcnode-id="1379" instrument_node="">Albireo</span></a><span data-dcnode-id="1377" instrument_node="">. The book is referenced once more during a discussion on how much stories can change from the first draft to the final draft, due to the various different versions of </span><i data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Night on the Galactic Railroad</span></i><span data-dcnode-id="1374" instrument_node="">.</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1371" instrument_node="">With the character of </span><a class="mw-redirect" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matamune" title="Matamune"><span data-dcnode-id="1370" instrument_node="">Matamune</span></a><span data-dcnode-id="1368" instrument_node="">, the wise ghost of a cat often seen travelling by train in the afterlife and in the real world, manga artist Hiroyuki Takei introduced his own vision of Miyazawa's story in the manga </span><i data-dcnode-id="1365"><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shaman_King" title="Shaman King"><span data-dcnode-id="1367" instrument_node="">Shaman King</span></a></i><span data-dcnode-id="1364" instrument_node="">. The wise cat is even seen reading the book by Miyazawa in tome 19 (chapter 164).</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1356"><span data-dcnode-id="1361" instrument_node="">This book is also heavily mentioned and referenced in the anime </span><i data-dcnode-id="1358"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hanbun_no_Tsuki_ga_Noboru_Sora" title="Hanbun no Tsuki ga Noboru Sora"><span data-dcnode-id="1360" instrument_node="">Hanbun no Tsuki ga Noboru Sora</span></a></i><span data-dcnode-id="1357" instrument_node=""> (Looking up at the half-moon), as a book that Akiba Rika's father gave to her.</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1347"><i data-dcnode-id="1352"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakitate%21%21_Japan" title="Yakitate!! Japan"><span data-dcnode-id="1354" instrument_node="">Yakitate!! Japan</span></a></i><span data-dcnode-id="1351" instrument_node=""> has a short mention of the work as illustrated in the reaction of the judge Pierrot, the world class clown, after eating the bread of Shadow who promised it would send him across the galaxy to see his mother. It is shown that the characters mother's favorite book is the same piece of literature; she is shown in a painting holding the book. (This is only in the anime: in the manga, Pierrot is instead transported to the world of </span><i data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Galaxy Express 999</span></i><span data-dcnode-id="1348" instrument_node="">, which was adapted from this work.)</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1334"><span data-dcnode-id="1345" instrument_node="">In the manga </span><i data-dcnode-id="1342"><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aria_%28manga%29" title="Aria (manga)"><span data-dcnode-id="1344" instrument_node="">Aria</span></a></i><span data-dcnode-id="1341" instrument_node=""> by </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kozue_Amano" title="Kozue Amano"><span data-dcnode-id="1340" instrument_node="">Kozue Amano</span></a><span data-dcnode-id="1338" instrument_node="">, a human character, Akari, imagines that a nighttime train is the Galaxy Express from the novel. The next night she is given a ticket to ride it by a cat and nearly gets on it but donates the ticket to a kitten. Aside from Akari, the conductor and all the passengers are cats, similar to the movie.</span><sup class="reference" data-dcnode-id="1335" id="cite_ref-aria_10-0"><a data-dcnode-id="1336" href="#cite_note-aria-10"><span data-dcnode-id="1337" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1326"><a class="new" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDaisuke_Kashiwa%26action%3Dedit%26redlink%3D1" title="Daisuke Kashiwa (page does not exist)"><span data-dcnode-id="1332" instrument_node="">Daisuke Kashiwa</span></a><span data-dcnode-id="1330" instrument_node="">'s song "Stella" is program music based on the novel.</span><sup class="reference" data-dcnode-id="1327" id="cite_ref-11"><a data-dcnode-id="1328" href="#cite_note-11"><span data-dcnode-id="1329" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1317"><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hikaru_Utada" title="Hikaru Utada"><span data-dcnode-id="1324" instrument_node="">Hikaru Utada</span></a><span data-dcnode-id="1322" instrument_node="">'s album </span><i data-dcnode-id="1319"><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heart_Station" title="Heart Station"><span data-dcnode-id="1321" instrument_node="">Heart Station</span></a></i><span data-dcnode-id="1318" instrument_node=""> contains a song, "Take 5", which uses this novel as a basis for the lyrics.</span></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">The </span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vocaloid" title="Vocaloid"><span data-dcnode-id="1314" instrument_node="">Vocaloid</span></a><span data-dcnode-id="1312" instrument_node=""> Gumi ("Megpoid") has a song titled "For Campanella" (written by </span><a class="extiw" data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ja.wikipedia.org/wiki/sasakure.UK" title="ja:sasakure.UK"><span data-dcnode-id="1311" instrument_node="">sasakure.UK</span></a><span data-dcnode-id="1309" instrument_node="">), based after the novel. GUMI supposedly sings from Giovanni's point of view and the song was written "for" Campanella.</span></li><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1301"><span data-dcnode-id="1306" instrument_node="">The themes and character's actions of Night on the Galactic Railroad become a major plot point in the anime movie </span><i data-dcnode-id="1303"><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_Girl_%28film%29" title="Book Girl (film)"><span data-dcnode-id="1305" instrument_node="">Book Girl</span></a></i><span data-dcnode-id="1302" instrument_node="">.</span></li><span data-dcnode-id="1300" instrument_node="">
</span><li data-dcnode-id="1294"><span data-dcnode-id="1299" instrument_node="">The 2011 anime </span><i data-dcnode-id="1296"><a class="mw-redirect" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mawaru-Penguindrum" title="Mawaru-Penguindrum"><span data-dcnode-id="1298" instrument_node="">Mawaru-Penguindrum</span></a></i><span data-dcnode-id="1295" instrument_node=""> makes multiple references to both the book and the anime adaptation throughout, such as the red and blue colors associated with the main characters, the "Scorpion Fire" parable and the apple motif.</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1284"><span data-dcnode-id="1292" instrument_node="">In the </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otome_game" title="Otome game"><span data-dcnode-id="1291" instrument_node="">otome game</span></a><span data-dcnode-id="1289" instrument_node=""> </span><i data-dcnode-id="1286"><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hatoful_Boyfriend" title="Hatoful Boyfriend"><span data-dcnode-id="1288" instrument_node="">Hatoful Boyfriend</span></a></i><span data-dcnode-id="1285" instrument_node="">, and its sequel Holiday Star, the novel has been referred to both in the dialogue of the first game and served as the basis of the main plot in the second.</span></li><span data-dcnode-id="1283" instrument_node="">
</span><li data-dcnode-id="1262"><span data-dcnode-id="1282" instrument_node="">Since 2014, the railway operator </span><a class="mw-redirect" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/JR_East" title="JR East"><span data-dcnode-id="1281" instrument_node="">JR East</span></a><span data-dcnode-id="1279" instrument_node=""> operates a steam-hauled </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Excursion_train" title="Excursion train"><span data-dcnode-id="1278" instrument_node="">excursion train</span></a><span data-dcnode-id="1276" instrument_node=""> called the </span><i data-dcnode-id="1273"><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SL_Ginga" title="SL Ginga"><span data-dcnode-id="1275" instrument_node="">SL Ginga</span></a></i><span data-dcnode-id="1272" instrument_node=""> on the </span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamaishi_Line" title="Kamaishi Line"><span data-dcnode-id="1271" instrument_node="">Kamaishi Line</span></a><span data-dcnode-id="1269" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tohoku_region" title="Tohoku region"><span data-dcnode-id="1268" instrument_node="">Tohoku region</span></a><span data-dcnode-id="1266" instrument_node="">, inspired by the novel.</span><sup class="reference" data-dcnode-id="1263" id="cite_ref-mainichi20131106_12-0"><a data-dcnode-id="1264" href="#cite_note-mainichi20131106-12"><span data-dcnode-id="1265" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1253"><i data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Night on the Galactic Railroad</span></i><span data-dcnode-id="1258" instrument_node=""> is the first play the titular character of the manga </span><i data-dcnode-id="1255"><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kasane_%28manga%29" title="Kasane (manga)"><span data-dcnode-id="1257" instrument_node="">Kasane</span></a></i><span data-dcnode-id="1254" instrument_node=""> performs in by stealing her friend's face for one night, when she's a high school student. The play and the character's stellar performance as Giovanni will impact future developments and be referenced several times in the story afterwards.</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1251" instrument_node="">The story and characters of </span><a class="mw-redirect" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_no_Shima" title="Giovanni no Shima"><span data-dcnode-id="1250" instrument_node="">Giovanni's Island</span></a><sup class="reference" data-dcnode-id="1246" id="cite_ref-13"><a data-dcnode-id="1247" href="#cite_note-13"><span data-dcnode-id="1248" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1245" instrument_node=""> have a deep connection to the book, referencing it several times to the point where characters are playing scenes of their counterparts in Miyazawa's story. The protagonist's names, Junpei and Kanta, originate from "Giovanni" and "Campanella" respectively.</span></li><span data-dcnode-id="1243" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1242" instrument_node="">Campanella is alluded to in Ryohgo Narita's light novel series </span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baccano%21" title="Baccano!"><span data-dcnode-id="1241" instrument_node="">Baccano!</span></a><span data-dcnode-id="1239" instrument_node="">, in which one of his protagonists in the novels </span><i data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Ironic Light Orchestra</span></i><span data-dcnode-id="1236" instrument_node=""> and </span><i data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Crack Flag</span></i><span data-dcnode-id="1233" instrument_node=""> is named Monica Campanella. She also bears a similar fate to the original Campanella.</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1222"><span data-dcnode-id="1230" instrument_node="">The novel is referenced several times in the 2015 film </span><i data-dcnode-id="1227"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maku_ga_Agaru" title="Maku ga Agaru"><span data-dcnode-id="1229" instrument_node="">Maku ga Agaru</span></a></i><span data-dcnode-id="1226" instrument_node="">, starring the Japanese idol group </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Momoiro_Clover_Z" title="Momoiro Clover Z"><span data-dcnode-id="1225" instrument_node="">Momoiro Clover Z</span></a><span data-dcnode-id="1223" instrument_node="">, besides being the main play that make the characters in the film.</span></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1220" instrument_node="">In the </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eroge" title="Eroge"><span data-dcnode-id="1219" instrument_node="">eroge</span></a><span data-dcnode-id="1217" instrument_node=""> </span><i data-dcnode-id="1214"><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wagamama_High_Spec" title="Wagamama High Spec"><span data-dcnode-id="1216" instrument_node="">Wagamama High Spec</span></a></i><span data-dcnode-id="1213" instrument_node="">, a play based on the book is written and performed by characters of the game.</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1210" instrument_node="">In </span><i data-dcnode-id="1207"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Over_the_Garden_Wall" title="Over the Garden Wall"><span data-dcnode-id="1209" instrument_node="">Over the Garden Wall</span></a></i><span data-dcnode-id="1206" instrument_node="">, two brothers narrowly avoid being hit by a train only to fall into a river where they nearly drown, in allusion to the film's themes of both death by drowning and a train to the afterlife. There is also a bell that becomes significant in the film's final scene; Campanella is Italian for "bell".</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1203" instrument_node="">In the visual novel </span><a class="external text" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vndb.org/v16560" rel="nofollow"><span data-dcnode-id="1202" instrument_node="">A Sky Full of Stars</span></a><span data-dcnode-id="1200" instrument_node="">, the book is mentioned in dialogue in relation to a character's eyes (</span><a class="external text" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vndb.org/c35176" rel="nofollow"><span data-dcnode-id="1199" instrument_node="">Amanogawa Saya</span></a><span data-dcnode-id="1197" instrument_node="">) and the double star </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albireo" title="Albireo"><span data-dcnode-id="1196" instrument_node="">Albireo</span></a><span data-dcnode-id="1194" instrument_node="">.</span></li><span data-dcnode-id="1192" instrument_node="">
</span><li data-dcnode-id="1183"><span data-dcnode-id="1191" instrument_node="">In the mobile game </span><i data-dcnode-id="1188"><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magia_Record" title="Magia Record"><span data-dcnode-id="1190" instrument_node="">Magia Record</span></a></i><span data-dcnode-id="1187" instrument_node="">, a spinoff to the anime </span><i data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Puella Magi Madoka Magica</span></i><span data-dcnode-id="1184" instrument_node="">, there are multiple references to the book. For example, the doppels of the main characters Iroha and Yachiyo are named Giovanna and Campanella.</span></li><span data-dcnode-id="1182" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1181" instrument_node="">In the manga </span><i data-dcnode-id="1178"><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act-Age" title="Act-Age"><span data-dcnode-id="1180" instrument_node="">Act-Age</span></a></i><span data-dcnode-id="1177" instrument_node="">, the main character, Yonagi Kei, and other secondary characters perform a theatre play version of the story, with Kei as Campanella.</span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1174" instrument_node="">In the visual novel </span><i data-dcnode-id="1171"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wonderful_Everyday" title="Wonderful Everyday"><span data-dcnode-id="1173" instrument_node="">Wonderful Everyday</span></a></i><span data-dcnode-id="1170" instrument_node="">, an entire scene is a reference to the book.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1157"><i data-dcnode-id="1165"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stray_Sheep" title="Stray Sheep"><span data-dcnode-id="1167" instrument_node="">Stray Sheep</span></a></i><span data-dcnode-id="1164" instrument_node=""> by </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kenshi_Yonezu" title="Kenshi Yonezu"><span data-dcnode-id="1163" instrument_node="">Kenshi Yonezu</span></a><span data-dcnode-id="1161" instrument_node=""> contains a song titled "Campanella" named after a character in the novel. The lyrics are from the point of view of Zanelli (one of the bullies) after Campanella sacrifices himself to save him from drowning.</span><sup class="reference" data-dcnode-id="1158" id="cite_ref-14"><a data-dcnode-id="1159" href="#cite_note-14"><span data-dcnode-id="1160" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="1156" instrument_node="">
</span><li data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">In episode 5 of the anime adaptation of Karakai Jōzu no Takagi-san (</span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teasing_Master_Takagi-san" title="Teasing Master Takagi-san"><span data-dcnode-id="1154" instrument_node="">Teasing Master Takagi-san</span></a><span data-dcnode-id="1152" instrument_node="">), Takagi is seen reading a copy of the book in the library before helping Nishikata study for a test.</span></li></ul><span data-dcnode-id="1149" instrument_node="">
