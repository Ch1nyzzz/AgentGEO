</span><span data-dcnode-id="312" instrument_node="">
</span><h1 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Yes, you can see the Milky Way</span></h1><span data-dcnode-id="309" instrument_node="">
</span><span data-dcnode-id="307" instrument_node="">
</span><nav data-dcnode-id="280"><span data-dcnode-id="306" instrument_node="">
</span><ul data-dcnode-id="282"><span data-dcnode-id="305" instrument_node="">
</span><li data-dcnode-id="302"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youcanseethemilkyway.com/%23milky-way-from-earth" onclick="get_hash('#milky-way-from-earth');" title="Milky Way from Earth"><span data-dcnode-id="304" instrument_node="">Milky Way from Earth</span></a></li><span data-dcnode-id="301" instrument_node="">
</span><li data-dcnode-id="298"><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youcanseethemilkyway.com/%23milky-way-pictures" onclick="get_hash('#milky-way-pictures');" title="Milky Way pictures"><span data-dcnode-id="300" instrument_node="">Milky Way pictures</span></a></li><span data-dcnode-id="297" instrument_node="">
</span><li data-dcnode-id="294"><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youcanseethemilkyway.com/light-pollution" onclick="get_hash('#light-pollution');" target="_blank" title="Light pollution map"><span data-dcnode-id="296" instrument_node="">Light pollution map</span></a></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="290"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youcanseethemilkyway.com/blog" onclick="get_hash('#blog');" title="You can see the Milky Way Blog"><span data-dcnode-id="292" instrument_node="">Blog</span></a></li><span data-dcnode-id="289" instrument_node="">
</span><li data-dcnode-id="286"><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youcanseethemilkyway.com/about" onclick="get_hash('#about');" title="About You can see the Milky Way"><span data-dcnode-id="288" instrument_node="">About us</span></a></li><span data-dcnode-id="285" instrument_node="">
</span><span data-dcnode-id="283" instrument_node="">
</span></ul><span data-dcnode-id="281" instrument_node="">

</span></section><span data-dcnode-id="273" instrument_node="">
</span><span data-dcnode-id="271" instrument_node="">
</span><h2 data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Milky Way from Earth</span></h2><span data-dcnode-id="268" instrument_node="">
</span><div class="box single" data-dcnode-id="152"><span data-dcnode-id="267" instrument_node="">
</span><h3 data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">How to see the Milky Way Galaxy from Earth at night with the naked eye?</span></h3><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="263" instrument_node="">The </span><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="260" instrument_node=""> is one of the most interesting naked eye sights in the night sky. The name comes from its appearance as a dim glowing milky band arching across the night sky. The term </span><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Milky Way</span></strong><span data-dcnode-id="257" instrument_node=""> is a translation from Latin </span><em data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">via lactea</span></em><span data-dcnode-id="254" instrument_node=""> and Greek </span><em data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">milky circle</span></em><span data-dcnode-id="251" instrument_node=""> as seen from inside.&nbsp;However, it’s not bright, and it’s not always well placed to be seen. So to see it</span><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">,</span></strong><span data-dcnode-id="248" instrument_node="">&nbsp;you will have to meet the following minimum requirements:</span><br data-dcnode-id="247"><span data-dcnode-id="246" instrument_node="">
‐ Finding a dark clear night sky with no moonlight are the key words here for a best view of the </span><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Milky Way</span></strong><span data-dcnode-id="243" instrument_node=""> in the grand design (you can get an app that will show you the Moon Phases Calendar for iPhone </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/moon-phase-%2B-free/id671352640%3Fmt%3D8" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="242" instrument_node="">here</span></a><span data-dcnode-id="240" instrument_node=""> or for Android </span><a data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.universetoday.moon.free" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="239" instrument_node="">here</span></a><span data-dcnode-id="237" instrument_node="">);</span><br data-dcnode-id="236"><span data-dcnode-id="235" instrument_node="">
‐ No city lights, no headlights, basically as far as you can from any source of light pollution. You will need to travel far from any city, to a wild area or rural countryside.&nbsp;The best viewing site would be from the middle of the ocean either northern hemisphere or southern hemisphere being so far away from the artificial city lights.</span><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">
‐ No telescopes, no binoculars, (just eyeglasses if you’re near sighted) and at least one eyeball. TIP: By using a cheap </span><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2C8aiXZ"><span data-dcnode-id="232" instrument_node="">binoculars</span></a><span data-dcnode-id="230" instrument_node=""> which I got from </span><a data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2M2HJQo" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="229" instrument_node="">Amazon</span></a><span data-dcnode-id="227" instrument_node=""> can increase the view experience being able to see other galaxies as Andromeda Galaxy (M31),&nbsp;nebulae and event comets. At the other end you can use a high end telescope&nbsp;which also I got from Amazon that allows you to simply enter the date, time and your location, and then it points to the star. A fat telescope like </span><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2LZd9qB" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="226" instrument_node="">this model</span></a><span data-dcnode-id="224" instrument_node=""> offers views of celestial objects that you may not be able to view with a smaller reflector.</span><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">
‐ Best atmospheric conditions, a misty sky wouldn’t block it completely, nor would humidity. It would make it not as sharp, but still visible.</span><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">
‐ Give your eyes at least 15-20 minutes to adapt to the darkness though. Your eyes will become more sensitive to low light level.</span><br data-dcnode-id="219"><span data-dcnode-id="218" instrument_node="">
‐ A little bit of timing in late summer or winter evenings in Northern Hemisphere.</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="215" instrument_node="">We live in the </span><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="212" instrument_node="">, this means that every time we gaze at the night sky we are looking at the </span><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="209" instrument_node="">. More exactly the spiral arm closer to the galactic center one part of the year and in the other part we see the near edge of the spiral arm farther from the galactic center. Due to nebula and dust clouds, we can’t see the center of our Galaxy&nbsp;(in visible light) at any time.</span></p><span data-dcnode-id="207" instrument_node="">
</span><hr data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">
</span><h3 data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">How to find the Milky Way</span></h3><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="201" instrument_node="">The summer </span><strong data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Milky Way</span></strong><span data-dcnode-id="198" instrument_node=""> will look brighter in the&nbsp;Northern Hemisphere. Most noticeably you should be able to see the Great Rift in good dark skies. This dark lane in between Cygnus and Scutum is where a string of dense interstellar clouds block the view of more distant stars. At longer wavelengths in the infrared, light passes through these clouds more easily and we get a better view of the overall shape of our Galaxy, but there are still enough clouds created a dark reddened lane through the middle of the </span><strong data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="195" instrument_node="">.</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">
The two Magellanic Clouds irregular dwarf galaxies&nbsp;are visible from the Southern Hemisphere which may be orbiting our </span><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="190" instrument_node="">.</span></p><span data-dcnode-id="188" instrument_node="">
</span><hr data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">
</span><h3 data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Milky Way facts</span></h3><span data-dcnode-id="183" instrument_node="">
</span><h4 data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">How big is the Milky Way Galaxy?</span></h4><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="179" instrument_node="">The </span><strong data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Milky Way Galaxy</span></strong><span data-dcnode-id="176" instrument_node=""> is our home in the existing Universe, it is a barred spiral galaxy 100,000‐120,000 light-years in diameter containing 200‐400 billion stars and at least as many planets including our solar system. The galactic center is named Sagittarius A and its believed to hold a super-massive black hole with an estimated mass of 4.1‐4.5 million times the mass of our Sun.</span></p><span data-dcnode-id="174" instrument_node="">
</span><h4 data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">How old is the Milky Way Galaxy?</span></h4><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Milky Way Galaxy is approximately 13.7 billion years old, almost as the Universe itself. The age is determined by taking the age of the stars in the Milky Way.</span></p><span data-dcnode-id="168" instrument_node="">
</span><h4 data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Stars in the Milky Way Galaxy</span></h4><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">The Milky Way contains at least 100 billion stars and may have up to 400 billion stars. The exact number is not known.</span></p><span data-dcnode-id="162" instrument_node="">
</span><h4 data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Milky Way Galaxy from Earth</span></h4><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Earth, along with the Solar System, is situated in the Milky Way galaxy, orbiting about 28,000 light years from the center of the galaxy.</span></p><span data-dcnode-id="156" instrument_node="">
</span><div data-dcnode-id="155" id="amzn-assoc-ad-f8dd6936-5722-4691-a06f-2e784d693d41"></div><span data-dcnode-id="153" instrument_node="">
</span></div><span data-dcnode-id="151" instrument_node="">
