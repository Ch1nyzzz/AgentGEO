"">Elia Locardi</span></a><span data-dcnode-id="431" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="422"><img class="b-lazy" data-dcnode-id="428" data-src="/sites/default/files/articles/milky-way/michael-shainblum.webp" height="572px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="423"><span data-dcnode-id="427" instrument_node="">Photo by </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shainblumphoto.com/"><span data-dcnode-id="426" instrument_node="">Michael Shainblum</span></a><span data-dcnode-id="424" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="413"><img class="b-lazy" data-dcnode-id="421" data-src="/sites/default/files/articles/milky-way/daniel-kordan.webp" height="1229472850px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="13px"><figcaption data-dcnode-id="414"><span data-dcnode-id="420" instrument_node="">Nikon D800 | 14mm | f/3.2 | 30s | ISO 5000</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">Photo by </span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//danielkordan.com/"><span data-dcnode-id="417" instrument_node="">Daniel Kordan</span></a><span data-dcnode-id="415" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="404"><img class="b-lazy" data-dcnode-id="412" data-src="/sites/default/files/articles/milky-way/eric-pare.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="405"><span data-dcnode-id="411" instrument_node="">Canon 1D X Mark II | 14mm | f/1.8 | 8s | ISO 3200</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">Photo by </span><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ericpare.com/"><span data-dcnode-id="408" instrument_node="">Eric Paré</span></a><span data-dcnode-id="406" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="395"><img class="b-lazy" data-dcnode-id="403" data-src="/sites/default/files/articles/milky-way/ian-norman.webp" height="444px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="396"><span data-dcnode-id="402" instrument_node="">Sony a7S | 50mm | f/4 | 10s | ISO 12800 | 12-photo panorama</span><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">Photo by </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/"><span data-dcnode-id="399" instrument_node="">Ian Norman</span></a><span data-dcnode-id="397" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="386"><img class="b-lazy" data-dcnode-id="394" data-src="/sites/default/files/articles/milky-way/albert-dros.webp" height="1229472850px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="13px"><figcaption data-dcnode-id="387"><span data-dcnode-id="393" instrument_node="">Sony A7R II | 14mm | f/2.8 | 25s | ISO 6400 | panorama of multiple images</span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">Photo by </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.albertdros.com/"><span data-dcnode-id="390" instrument_node="">Albert Dros</span></a><span data-dcnode-id="388" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="377"><img class="b-lazy" data-dcnode-id="385" data-src="/sites/default/files/articles/milky-way/jose-hervas.webp" height="339px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="378"><span data-dcnode-id="384" instrument_node="">Canon 5D Mark III | 14mm | f/1.8 | 15s | ISO 3200 | 38-photo panorama</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">Photo by </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/joseahervas/"><span data-dcnode-id="381" instrument_node="">José Antonio Hervás</span></a><span data-dcnode-id="379" instrument_node="">.</span></figcaption></figure><figure data-dcnode-id="368"><img class="b-lazy" data-dcnode-id="376" data-src="/sites/default/files/articles/milky-way/sean-parker.webp" height="1229472850px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="13px"><figcaption data-dcnode-id="369"><span data-dcnode-id="375" instrument_node="">Sony A7R III | 16mm | f/2.8 | 20s | ISO 6400 | panorama of multiple images</span><br data-dcnode-id="374"><span data-dcnode-id="373" instrument_node="">Photo by </span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sean-parker.com/"><span data-dcnode-id="372" instrument_node="">Sean Parker</span></a><span data-dcnode-id="370" instrument_node="">.</span></figcaption></figure><figure class="portrait" data-dcnode-id="356"><img class="b-lazy" data-dcnode-id="367" data-src="/sites/default/files/articles/milky-way/aaron-priest.webp" height="1229472850px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="13px"><figcaption data-dcnode-id="357"><span data-dcnode-id="366" instrument_node="">Nikon D700 | 14mm | f/2.8 | ISO 2500 | 30s (sky) and 241s (ground) | 13 positions on a </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/70085322"><span data-dcnode-id="365" instrument_node="">Panoneed</span></a><span data-dcnode-id="363" instrument_node=""> for a full sphere</span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">Photo by </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galleries.aaronpriestphoto.com/"><span data-dcnode-id="360" instrument_node="">Aaron D. Priest</span></a><span data-dcnode-id="358" instrument_node="">.</span></figcaption></figure><h3 data-dcnode-id="352" id="step12"><span class="step" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">12.</span></span><span data-dcnode-id="353" instrument_node="">Don't give up!</span></h3><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">Sometimes I feel like a </span><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Goonies"><span data-dcnode-id="350" instrument_node="">Goonie</span></a><span data-dcnode-id="348" instrument_node="">.</span></p><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">I share the same spirit, the need for exploring the unknown, looking for a true adventure. I feel the necessity of living the challenge of chasing a dreamed scene.</span></p><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Nobody says it's easy!</span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">If you want to be one of us, you'll have to survive to bad weather, accidental falls and equipment failures among many other obstacles that will surely ruin your images. But, don't give up and chase your goals with all your energy. Sooner or later, you'll start shooting truly contagious Milky Way pictures.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Remember... PhotoPillers never give up... And I am definitely one of them.</span></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Are you too?</span></p><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Imagine. Plan. Shoot!</span></p><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">&nbsp;</span></p><p class="photographer-author" data-dcnode-id="326"><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.antonicladera.net/"><span data-dcnode-id="332" instrument_node="">Antoni Cladera</span></a><span data-dcnode-id="330" instrument_node=""> is a landscape photographer with commitment to the environment. Artist of the Spanish Confederation of Photography and member of the Spanish Association of Nature Photographers (</span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aefona.org/"><span data-dcnode-id="329" instrument_node="">AEFONA</span></a><span data-dcnode-id="327" instrument_node="">). He's part of the PhotoPills Team.</span></p><p class="photographer-author" data-dcnode-id="291"><span data-dcnode-id="325" instrument_node="">Special thanks to our friends </span><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theartofnight.com/"><span data-dcnode-id="324" instrument_node="">Mark Gee</span></a><span data-dcnode-id="322" instrument_node="">, </span><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elialocardi.com/"><span data-dcnode-id="321" instrument_node="">Elia Locardi</span></a><span data-dcnode-id="319" instrument_node="">, </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shainblumphoto.com/"><span data-dcnode-id="318" instrument_node="">Michael Shainblum</span></a><span data-dcnode-id="316" instrument_node="">, </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//danielkordan.com/"><span data-dcnode-id="315" instrument_node="">Daniel Kordan</span></a><span data-dcnode-id="313" instrument_node="">, </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ericpare.com/"><span data-dcnode-id="312" instrument_node="">Eric Paré</span></a><span data-dcnode-id="310" instrument_node="">, </span><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/"><span data-dcnode-id="309" instrument_node="">Ian Norman</span></a><span data-dcnode-id="307" instrument_node="">, </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.albertdros.com/"><span data-dcnode-id="306" instrument_node="">Albert Dros</span></a><span data-dcnode-id="304" instrument_node="">, </span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/joseahervas/"><span data-dcnode-id="303" instrument_node="">José Antonio Hervás</span></a><span data-dcnode-id="301" instrument_node="">, </span><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sean-parker.com/"><span data-dcnode-id="300" instrument_node="">Sean Parker</span></a><span data-dcnode-id="298" instrument_node="">, </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galleries.aaronpriestphoto.com/"><span data-dcnode-id="297" instrument_node="">Aaron D. Priest</span></a><span data-dcnode-id="295" instrument_node=""> and </span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="294" instrument_node="">Christoph Malin</span></a><span data-dcnode-id="292" instrument_node=""> for letting us publish their awesome Milky Way images and helping us improve the content of this article.</span></p><p class="notice" data-dcnode-id="285"><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Note:</span></strong><span data-dcnode-id="288" instrument_node=""> </span><em data-dcnode-id="286"><span data-dcnode-id="287"
