-dcnode-id="1217" id="remove-the-uv-filter"><span data-dcnode-id="1218" instrument_node="">Remove the UV filter</span></h4><p data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">If you usually use a </span><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/lens-filters-guide%23uvfilter"><span data-dcnode-id="1215" instrument_node="">ultraviolet (UV) filter</span></a><span data-dcnode-id="1213" instrument_node=""> to protect your lens, remove it as soon as you start preparing the equipment.</span></p><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">I don't like adding an extra glass to the lens if it's not going to give me a better control of the light.</span></p><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">In night photography, a </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/lens-filters-guide%23uvfilter"><span data-dcnode-id="1208" instrument_node="">ultraviolet (UV) filter</span></a><span data-dcnode-id="1206" instrument_node=""> can even ruin your photos. This type of filter slightly reduces the sharpness and contrast of your images. But it can also cause reflections, halos and flares.</span></p><h4 data-dcnode-id="1203" id="use-a-light-pollution-filter-optional"><span data-dcnode-id="1204" instrument_node="">Use a light pollution filter (optional)</span></h4><p data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">If there is light pollution in your scene from sodium vapor light sources, you should use a </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/lens-filters-guide%23lightpollutionfilter"><span data-dcnode-id="1201" instrument_node="">light pollution filter</span></a><span data-dcnode-id="1199" instrument_node=""> to remove in camera the yellowish glow they usually produce.</span></p><h4 data-dcnode-id="1196" id="turn-off-the-lens-stabilization-system"><span data-dcnode-id="1197" instrument_node="">Turn off the lens stabilization system</span></h4><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Some lenses include a function to stabilize vibrations. Canon, for example, calls it Image Stabilization (IS), while Nikon calls it Vibration Reduction (VR), and Sigma, Optical Stabilizer (OS). Other brands, such as Sony, Olympus and Pentax have been pushing for in-camera stabilization.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The lens stabilization system allows you to shoot handheld in low light conditions at shutter speeds slower than usual without getting a blurred image. This is possible because the lens compensates the vibrations you produce.</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">When using a tripod, you should turn off this function. Even without camera vibrations or movement, the image stabilization system (made of small gyroscopes) might try to correct nonexistent movements, causing vibrations that may negatively affect the sharpness of the image, especially when shooting at shutter speeds between 1/15s and 1s.</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Therefore, as a precaution, I recommend you to switch the lens stabilization system off when using a tripod.</span></p><h4 data-dcnode-id="1186" id="long-exposure-noise-reduction-on-or-off"><span data-dcnode-id="1187" instrument_node="">Long exposure noise reduction: on or off?</span></h4><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Noise is the biggest enemy of night sky photography.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Whatever camera you use, you'll suffer from noise problems in the shadows, especially when using high ISOs or in warm temperatures. Try to get the camera with better noise performance that you can afford.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node="">These are the different types of noise that you can see in a </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="1180" instrument_node="">long exposure</span></a><span data-dcnode-id="1178" instrument_node="">:</span></p><ul data-dcnode-id="1151"><li data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Luminance noise.</span></strong><span data-dcnode-id="1174" instrument_node=""> It occurs when there is not enough light reaching the sensor. It's a fixed pattern noise and it's easier to observe in the darker areas.</span></li><li data-dcnode-id="1169"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Chromatic noise.</span></strong><span data-dcnode-id="1170" instrument_node=""> This type of noise alters the color of pixels but not its luminance. Hence its name. The temperature of the sensor is the one to blame. This kind of noise spreads on the whole image and not only in the shadows, contrary to what happens with luminance noise.</span></li><li data-dcnode-id="1162"><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Thermal noise.</span></strong><span data-dcnode-id="1166" instrument_node=""> It appears in very long exposures due to the heat in the sensor. It can provoke magenta, green, or even blue </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colour_banding"><span data-dcnode-id="1165" instrument_node="">banding</span></a><span data-dcnode-id="1163" instrument_node=""> and vignetting in the corners of the frame. The only way to overcome this noise is by framing a larger area, adding to the image the portion affected by the banding. Later on, you can crop it in post-processing. You can also reduce it cooling off the sensor (turning off the camera for a few minutes) or by limiting the exposure time.</span></li><li data-dcnode-id="1152"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Hot pixels.</span></strong><span data-dcnode-id="1159" instrument_node=""> These are red, blue and green spots that appear on the image due to sensor overheating. The advantage here is that these spots always show up in the same position in the image. So it's easy to spot and remove them with an editing software such as </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="1158" instrument_node="">Lightroom</span></a><span data-dcnode-id="1156" instrument_node=""> or </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="1155" instrument_node="">Photoshop</span></a><span data-dcnode-id="1153" instrument_node="">.</span></li></ul><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">Almost all cameras include an option that enables noise reduction in </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="1149" instrument_node="">long exposures</span></a><span data-dcnode-id="1147" instrument_node="">. This system is based on the concept that two consecutive exposures with the same parameters (shutter speed, ISO and sensor temperature) will produce almost the same noise.</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">If you turn this function on, after taking a </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="1144" instrument_node="">long exposure</span></a><span data-dcnode-id="1142" instrument_node="">, the camera automatically takes a second photo with the same settings but without letting any light to reach the sensor. This way, the camera only records noise. Finally, the camera detects the noise in this second picture and removes it from the first one.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">One of the main drawbacks of the long exposure noise reduction function is that it takes twice the exposure time to take a single photo. That is, if you are shooting a 30-second exposure, the camera takes then another 30-second picture to eliminate the noise.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1138" instrument_node="">So if you're looking to take as many pictures as possible, for example when shooting a timelapse, </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="1137" instrument_node="">Meteor Showers</span></a><span data-dcnode-id="1135" instrument_node=""> or </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="1134" instrument_node="">Star Trails</span></a><span data-dcnode-id="1132" instrument_node="">, you should definitely turn it off.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">I personally never use it.</span></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">I prefer making a quick preview on my LCD to check if the Milky Way is bright enough, the lighting of the foreground is correct or the image is in focus so I can tweak accordingly. I don't like waiting for another 30 seconds, I prefer to shoot again.</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Later on, if necessary, I remove hot pixels and noise in post-processing.</span></p><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Finally, there's an alternative which is to turn it on when it's time to take the final picture, the good one. That is, you should work without this option when taking the test photos and activate it when you get a photo correctly exposed.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">I also recommend you to use it if you have a camera with poor noise performance. It's a way of making the most of your equipment before post-processing the image.</span></p><h4 data-dcnode-id="1119" id="shoot-in-raw"><span data-dcnode-id="1120" instrument_node="">Shoot in RAW</span></h4><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">RAW image files contain all the image data recorded by the sensor. So this image file format allows you to produce higher quality images, and correct in post-production problems that would be unrecoverable if you shot in JPEG format. That is because if you shoot in JPEG, a lot of the image information is compressed and lost.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">One important thing you should know is that the image you see on the LCD is a JPEG version of the RAW file. Therefore, the </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-2%23step10"><span data-dcnode-id="1115" instrument_node="">histogram</span></a><span data-dcnode-id="1113" instrument_node=""> displayed by the camera is not exactly the histogram of the RAW file.</span></p><h4 data-dcnode-id="1110" id="use-the-shortest-focal-length-you-can"><span data-dcnode-id="1111" instrument_node="">Use the shortest focal length you can</span></h4><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Set the shortest focal length you can (14mm, 18mm, 24mm, etc.)</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Try to keep it under 35 mm for two reasons:</span></p><ul data-dcnode-id="1101"><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">To maximize the field of view and capture as much sky as you can.</span></li><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">To maximize the exposure time (set the lowest possible shutter speed) to collect as much light as possible and, eventually, capture stars as big bright spots.</span></li></ul><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">I'll explain it better in a section below, when going deeper into the shutter speed (exposure time).</span></p><h4 data-dcnode-id="1097" id="select-the-manual-shooting-mode-m"><span data-dcnode-id="1098" instrument_node="">Select the Manual shooting mode (M)</span></h4><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">If you use your camera's auto mode you won't be able to capture the Milky Way.</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">The </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-2%23step13"><span data-dcnode-id="1093" instrument_node="">Manual shooting mode (M)</span></a><span data-dcnode-id="1091" instrument_node=""> gives you total control over the exposure by setting aperture, shutter speed, ISO and white balance adjustments at your will. You'll need to use it to collect as much light as possible to capture stars as big bright spots while getting a photo correctly exposed.</span></p><h4 data-dcnode-id="1088" id="use-the-largest-aperture-you-can"><span data-dcnode-id="1089" instrument_node="">Use the largest aperture you can</span></h4><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">When it comes to the camera settings you need to photograph the Milky Way, I like to start with the aperture.</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Go as wide as you can to capture the most light. Set the lens to its widest aperture (the smallest f/number), for example f/1.4, f/2.8 or f/3.5, depending on your lens.</span></p><h4 data-dcnode-id="1082" id="focus"><span data-dcnode-id="1083" instrument_node="">Focus</span></h4><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">When it comes to focusing you have two options:</span></p><ul data-dcnode-id="1075"><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Focusing at the hyperfocal distance.</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Focusing at one star.</span></li></ul><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Depending on your taste, choose one or the other.</span></p><h5 data-dcnode-id="1071" id="focusing-at-the-hyperfocal-distance"><span data-dcnode-id="1072" instrument_node="">Focusing at the hyperfocal distance</span></h5><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">When photographing the Milky Way, you want everything sharp from the front to the back of the scene. Since focusing your camera at the hyperfocal distance ensures maximum sharpness from half this distance all the way to infinity, forget about other manual methods like "setting focus to infinity with Live View" or "turning the focus ring to infinity". You only need to calculate the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/depth-of-field-guide%23step4"><span data-dcnode-id="1069" instrument_node="">hyperfocal distance</span></a><span data-dcnode-id="1067" instrument_node=""> for the focal length and aperture you want to use.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">There is only one problem...</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Doing the math!</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">If you love photography but hate math, you're on my side. Select your camera, focal length and aperture on the </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="1060" instrument_node="">PhotoPills</span></a><span data-dcnode-id="1058" instrument_node=""> depth of field (DoF) calculator to automatically get the hyperfocal distance.</span></p><div class="two-figures screenshot" data-dcnode-id="1046"><div data-dcnode-id="1052"><figure data-dcnode-id="1053"><img class="b-lazy" data-dcnode-id="1056" data-src="/sites/default/files/articles/milky-way/8-dof-1-en.webp" height="600px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="298px"><figcaption data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Depth of field (DoF) calculator - It shows the depth of field values in a table for a given camera, focal length, aperture and focus distance. The hyperfocal distance appears in the first row.</span></figcaption></figure></div><div data-dcnode-id="1047"><figure data-dcnode-id="1048"><img class="b-lazy" data-dcnode-id="1051" data-src="/sites/default/files/articles/milky-way/8-dof-2-en.webp" height="600px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="298px"><figcaption data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Depth of field (DoF) calculator - Swipe the table to the left to to see the Depth of field values on a picture.</span></figcaption></figure></div></div><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Once you've calculated the hyperfocal distance, you just need to focus at it.</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">It's impossible to focus exactly at the hyperfocal distance, so focus at a slightly larger distance. This way, you'll have the stars tack sharp in the photo.</span></p><p data-dcnode-id="1039"><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/depth-of-field-guide%23step4"><span data-dcnode-id="1041" instrument_node="">You can learn everything you need about the hyperfocal distance in our detailed depth of field guide.</span></a></p><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">In the following video I show you how to focus at the hyperfocal distance step by step:</span></p><div class="video-wrapper" data-dcnode-id="1027"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="1028" data-src="https://www.youtube.com/embed/zkoT1L54xzQ" frameborder="0" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"><html data-dcnode-id="1030" style="height: 100%;"><head data-dcnode-id="1033"><meta charset="utf-8"><meta content="width=device-width, minimum-scale=0.1" data-dcnode-id="1036" name="viewport"/><title data-dcnode-id="1034">gif (1×1)</title></meta></head><body data-dcnode-id="1031" style="margin: 0px; height: 100%"><img data-dcnode-id="1032" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" style="-webkit-user-select: none;"/></body></html></iframe></div><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Going back to my Milky Way image, I shot it with my Nikon D700 using a focal length of 14mm and an aperture of f/2.8. So, according to the PhotoPills depth of field (DoF) calculator my hyperfocal distance was 2.32 m.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The next thing you need to do is to use a flashlight to illuminate a spot at the hyperfocal distance (in this example, 2.32 m or at a bit longer distance). Then, use your camera's autofocus system to focus. Finally, set manual focusing so nothing changes.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Put the camera on a tripod, and be careful not to touch the focus setting.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">If your lens includes the distance scale, you can mark the focus distance on it. Calculate the hyperfocal distance, set the maximum aperture, focus at the hyperfocal distance and make a mark on the lens. This way, you won't have to focus before shooting, it will be enough to match the mark.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Again, focusing exactly at the hyperfocal distance is very difficult. Therefore, make sure you're focusing at a distance that is a bit longer than the hyperfocal one. Otherwise, if you focus at a shorter distance, the depth of field far limit will not be at infinite, and the stars will end up blurred.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">By focusing at a larger distance, the depth of field near limit will be a bit further from the camera, but the stars will be perfectly in focus.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">If you're going to shoot a timelapse, don't forget to double check that the camera is in focus before you trigger it. It occurred to me once that I accidentally touched the lens and I spent 3 hours in the cold to finally get a completely blurred timelapse... It wasn't funny at all!</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">So that's it. This is how you'll make the most of your depth of field, getting a more detailed final print.</span></p><p data-dcnode-id="1009" style="text-align: center; font-style: italic;"><span data-dcnode-id="1010" instrument_node="">"Wait a minute Toni... Imagine I have an interesting subject in the foreground, let's say a rock, that is close to my camera, just before the near hyperfocal limit (half the hyperfocal distance). What if I want it to also be in focus?"</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Roughly speaking, when you focus at the hyperfocal distance, the depth of field near limit lays at half of the hyperfocal distance. This means that everything that is between your camera and half the hyperfocal distance will be blurred.</span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">For example, if the hyperfocal distance is 2.32 m, it means that everything between my camera and 1.16 m, such as the rock you mention, will be blurred in the image. In addition to this, everything from 1.16 m to infinity will be in focus, in this case, the landscape and the stars.</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The solution to this problem is to shoot a double exposure and apply the focus stacking technique in post-processing.</span></p><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">In the first picture, focus at the hyperfocal distance to get everything that is between half the hyperfocal distance and infinity in focus. In the second image, focus at the foreground subject, the rock in this example, to shoot a second exposure. Then, in post-processing, merge these two images using </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpx.adobe.com/photoshop/using/masking-layers.html"><span data-dcnode-id="1001" instrument_node="">masking layers</span></a><span data-dcnode-id="999" instrument_node="">, selecting the areas in focus of each photo.</span></p><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">If you want to learn more about focus stacking, </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJqyh_ijbVZc"><span data-dcnode-id="996" instrument_node="">have a look at this tutorial of Dave Morrow</span></a><span data-dcnode-id="994" instrument_node="">.</span></p><h5 data-dcnode-id="991" id="focusing-at-one-star"><span data-dcnode-id="992" instrument_node="">Focusing at one star</span></h5><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">If you want the stars to be tack sharp, but you don’t mind losing a bit of sharpness in your subject, then focus at one star.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Set the camera and lens to manual focus.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Now, find a star and zoom in on it to magnify it (or use the Focus Magnifier option). Then, turn the focus ring to make focus on it. Turn it until you see the star as a tiny little dot (actually, the smallest possible dot).</span></p><h4 data-dcnode-id="983" id="frame-at-night-craking-up-the-iso"><span data-dcnode-id="984" instrument_node="">Frame at night craking up the ISO</span></h4><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">ISO is a key Milky Way photography setting.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">At the beginning of the shooting session you've accomplished the most difficult task: finding the right shooting spot. You know the image you want, from where to shoot and the position of the Milky Way you'll have.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">However, now you need to fine tune your composition and get the framing you want. And you need to do so even if it's pitch black...</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Thus, you need to use the highest ISO available in your camera (25600, 12800, 6400, 3200).</span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Why?</span></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Because you want the camera to take the shot as fast as possible. You're working on your composition, so noise is not an issue here. You don't want to wait 20 or 30 seconds between each test shot to adjust your framing, right?</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Once the camera is attached to the tripod, take as many test shots as you need to see if you're getting the framing you want and adjust accordingly.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Great!</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Now that everything is set and all the elements are in the right position in your frame, make sure all your gear is stable and your camera is strongly attached to the tripod head.</span></p><h4 data-dcnode-id="963" id="set-the-shutter-speed-and-avoid-star-trails-with-the-500-rule-or-with-the-npf-rule"><span data-dcnode-id="964" instrument_node="">Set the shutter speed and avoid Star Trails with the 500 rule or with the NPF rule</span></h4><p data-dcnode-id="961" id="spot-stars"><span data-dcnode-id="962" instrument_node="">The second Milky Way camera setting I'd like to set is the shutter speed.</span></p><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">For Milky Way photography, the longer you keep the shutter open the better.</span></p><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">There's only one limitation: </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="957" instrument_node="">Star Trails</span></a><span data-dcnode-id="955" instrument_node="">.</span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">You need to collect as much light as possible to capture stars as big bright spots. But you don't want to get motion blur because of the Earth's rotation. In other words, you don't want to see any trails left by the stars.</span></p><figure data-dcnode-id="948"><img class="b-lazy" data-dcnode-id="951" data-src="/sites/default/files/articles/milky-way/mw-tree.gif" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><figcaption data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">In this animated picture you can check that the longer you keep the shutter open (30", 60", 90", 120", 150", 180"), the longer the Star Trails.</span></figcaption></figure><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">So how long can you keep the shutter open and avoid Star Trails?</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">One easy way to estimate the maximum shutter speed (or exposure time) is to use what's called the 500 rule.</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Basically, to determine the optimal exposure time, take 500 and divide it by the effective focal length of the lens:</span></p><p data-dcnode-id="939" style="text-align: center;"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">exposure time = 500/(crop-factor × focal length)</span></strong></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Thus, the shorter the focal length the longer the shutter speed, and the better images you'll get.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Unfortunately, the 500 rule has proven to fail in most of the cases.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Why? Because it gives you a longer exposure time (a shutter speed too low) than what you would need. So you end up getting trails in your photos.</span></p><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">That's why we've implemented a more accurate formula in the PhotoPills </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/calculators/spotstars"><span data-dcnode-id="931" instrument_node="">Spot stars calculator</span></a><span data-dcnode-id="929" instrument_node="">: the NPF rule.</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">To satisfy your curiosity:</span></p><ul data-dcnode-id="919"><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">N is the aperture symbol.</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">P is the photosite of your camera sensor.</span></li><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">F is the focal length.</span></li></ul><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">But before I tell you more about it... I have to thank </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//galleries.aaronpriestphoto.com/"><span data-dcnode-id="917" instrument_node="">Aaron Priest</span></a><span data-dcnode-id="915" instrument_node=""> for letting us know about this new formula!</span></p><p data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">Developed by </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sahavre.fr/tutoriels/astrophoto/34-regle-npf-temps-de-pose-pour-eviter-le-file-d-etoiles"><span data-dcnode-id="912" instrument_node="">Frédéric Michaud and La Société Astronomique du Havre</span></a><span data-dcnode-id="910" instrument_node="">, the NPF rule takes into account three new variables in addition to the focal length:</span></p><ul data-dcnode-id="902"><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The aperture.</span></li><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The pixel pitch of your camera.</span></li><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">And the minimum declination of the stars that are captured in the frame.</span></li></ul><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Let's see why these variables are important and why you should take them into account.</span></p><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">On the one hand, if you like astronomy and </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="898" instrument_node="">Star Trails</span></a><span data-dcnode-id="896" instrument_node=""> photography, you'll know that, for the same exposure time, the trails left by stars near the celestial equator are longer than those left by stars near the Polaris.</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">And the declination is the variable that tells you how far a star is from the celestial equator. A star at the celestial equator has 0º of declination (it moves faster), and a star near the north celestial pole, like the Polaris for example, has 90º of declination (it doesn't move).</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">So, depending on the area of the sky you're shooting at (near or far from the celestial equator) you'll be able to use a shorter or longer exposure time (faster or slower shutter speed) to prevent trails.</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">On the other hand, the smaller the pixel pitch of your camera, the shorter the exposure time has to be to avoid trails. This is because the higher the resolution of the sensor the more detail is captured in the photo, and thus the movement of the stars is more perceptible. The pixel pitch depends on the sensor size and the megapixels of your camera.</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Finally, the aperture is also important.</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">In the Accurate mode (accuracy value) and when calculating the exposure time, the NPF rule allows the star to move its radius on the final image. This will assure that the stars still look like a circle (the ratio between length and height is lower than 1.5).</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Note that this is a very restrictive approach that will give you very short exposure times (fast shutter speeds). Use it only for large prints!</span></p><p data-dcnode-id="881" style="text-align: center; font-style: italic;"><span data-dcnode-id="882" instrument_node="">"Cool Toni... But how does the aperture affects the exposure time (or shutter speed)?"</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Well, the size of the stars in the photo depends, among other factors, on the aperture.</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The larger the aperture, the smaller the star. On the contrary, the smaller the aperture, the bigger the star. Therefore, if the diameter of a star increases, the star can move along a longer distance before the trail is perceptible, and the exposure time can be longer (slower shutter speed).</span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">In the Default mode (accuracy value), the NPF rule allows the star to move its diameter. You'll get longer exposure times if you decide to use this mode. This is the mode I usually use, and I'm very happy with the values I get!</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Math alert!</span></p><p data-dcnode-id="866"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/depth-of-field-guide%23step7"><span data-dcnode-id="872" instrument_node="">Diffraction</span></a><span data-dcnode-id="870" instrument_node=""> increases as the aperture gets smaller, so the </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disk"><span data-dcnode-id="869" instrument_node="">Airy disk</span></a><span data-dcnode-id="867" instrument_node=""> gets bigger. Thus, the star gets bigger when closing the aperture.</span></p><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">In conclusion, if you really wish to prevent </span><a data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="864" instrument_node="">Star Trails</span></a><span data-dcnode-id="862" instrument_node=""> in your photos, take into account the aperture, the pixel pitch and minimum declination to calculate the exposure time.</span></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Are you still there?</span></p><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">Don't panic! the </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="857" instrument_node="">PhotoPills</span></a><span data-dcnode-id="855" instrument_node=""> app does all the calculations for you.</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Let's see how it works.</span></p><p data-dcnode-id="841"><span data-dcnode-id="851" instrument_node="">Go to </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="850" instrument_node="">PhotoPills</span></a><span data-dcnode-id="848" instrument_node="">, tap on </span><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Spot Stars</span></em><span data-dcnode-id="845" instrument_node=""> (</span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Pills</span></em><span data-dcnode-id="842" instrument_node=""> menu) and then:</span></p><ol class="arabic simple" data-dcnode-id="818"><li data-dcnode-id="838"><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Choose your camera. The calculator will take into account the sensor size and megapixels to calculate the pixel pitch.</span></p></li><li data-dcnode-id="835"><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Set the focal length and aperture.</span></p></li><li data-dcnode-id="827"><p data-dcnode-id="828"><span data-dcnode-id="834" instrument_node="">If you know the minimum declination of the star that is captured in your frame, set it. </span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node=""> If you don't know what the declination is or you're in doubt, just set the declination of the stars to 0º. That's the worst scenario (i.e. the celestial equator enters your frame), so the exposure time will work for any shooting direction. </span><br data-dcnode-id="831"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">You can also use the AR button at the bottom of the screen to calculate it. Point your smartphone where you wish to frame the shot, and the declination and the maximum exposure time will be automatically calculated.</span></strong></p></li><li data-dcnode-id="822"><p data-dcnode-id="823"><span data-dcnode-id="826" instrument_node="">Choose the accuracy. Default is the recommended value for most cases, and it will allow you to shoot longer exposure times (slower shutter speeds). This will allow you to keep the ISO relatively low. </span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node=""> However, if you wish to print in a very large format, set this value to Accurate. You'll get a super short exposure time (faster shutter speed). Notice that this will force you to push the ISO to get the right exposure, getting noisy images on most cameras. That's why I suggest you to use the Default value when possible.</span></p></li><li data-dcnode-id="819"><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Despite the app will display both the 500 and the NPF rule results, use the exposure time (shutter speed) you get with the NPF Rule from the table of results. Use this value as a starting point, take a test shot and adjust accordingly.</span></p></li></ol><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">Have a look at the following </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="816" instrument_node="">PhotoPills</span></a><span data-dcnode-id="814" instrument_node=""> screenshots.</span></p><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">The first one shows the main screen of the </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/calculators/spotstars"><span data-dcnode-id="811" instrument_node="">Spot stars calculator</span></a><span data-dcnode-id="809" instrument_node="">. And the second one the Augmented Reality view.</span></p><div class="two-figures screenshot" data-dcnode-id="797"><div data-dcnode-id="803"><figure data-dcnode-id="804"><img class="b-lazy" data-dcnode-id="807" data-src="/sites/default/files/articles/milky-way/8-spot-1-en.webp" height="600px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="298px"><figcaption data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Spot stars calculator - Choose the camera, focal length, aperture, declination and accuracy level to calculate the maximum exposure time to avoid Star Trails using the NPF rule.</span></figcaption></figure></div><div data-dcnode-id="798"><figure data-dcnode-id="799"><img class="b-lazy" data-dcnode-id="802" data-src="/sites/default/files/articles/milky-way/8-spot-2-en.webp" height="600px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="298px"><figcaption data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Spot stars AR view - Tap on the AR button and point your smartphone where you wish to frame your shot. Automatically, PhotoPills will read the minimum declination of the stars and will give you the maximum exposure time in both, landscape and portrait camera shooting modes.</span></figcaption></figure></div></div><p data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">In addition to the NPF rule calculator, there is another great calculator you can use to assess the exposure time you need: </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/advanced-astrophotography-shutter-time-calculator/"><span data-dcnode-id="795" instrument_node="">The Advanced Exposure Calculator by Ian Norman</span></a><span data-dcnode-id="793" instrument_node="">.</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">It's really cool. You should check it out!</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">When calculating the exposure time, Ian has come up with a very clever system that allows you to establish the pixel tolerance you're willing to accept.</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">What's the pixel tolerance? The number of pixels a star can cover before you notice a trail.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">For example, a pixel tolerance of 7 pixels means that the stars in the frame are allowed to move along a maximum distance of 7 pixels for the recommended shutter speed (exposure time).</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Notice that using a 7 pixel tolerance in Ian's formula is pretty similar than using the Default accuracy mode in the NPF rule.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">And with a 3 pixel tolerance, you get a result quite similar to the Accurate mode.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Now, before moving to the next section, I'd love to say one last word about photographing the Milky Way using relatively long focal lengths (like a 50mm or a 85mm).</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">It's more challenging to do so because the lens narrow field of view will force you to use shorter exposure times to avoid Star Trails, due to the rotation of the Earth. And if you want to avoid them, you'll have to use extremely high ISOs, meaning that you'll get noise on the final image.</span></p><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The workaround is to use an </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equatorial_mount"><span data-dcnode-id="774" instrument_node="">equatorial mount</span></a><span data-dcnode-id="772" instrument_node="">, which allows you to compensate the rotation of the Earth. In this case, if you wish to include the landscape, you'll need to shoot a double exposure, one for the sky and another for the foreground.</span></p><p data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">But an equatorial mount or star tracker has many more advantages. This is how star photography expert </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="769" instrument_node="">Christoph Malin</span></a><span data-dcnode-id="767" instrument_node=""> describes their positive effect on Milky Way photography:</span></p><blockquote data-dcnode-id="756"><div data-dcnode-id="757"><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">"Tracking a Milky Way shot, using a tracker like the Vixen Polarie, has a lot of advantages, we all have seen nightscape photos of the Milky Way or constellations in the sky, which are full of stars, but many of these images lack one point, which is the dynamic range, natural colors, and natural contrast.</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">When we are not using the method of longer exposure (provided by a star tracker) and boost to higher ISOs and widest open aperture then the image quality becomes poor and in processing you might end up with a lot of white saturated stars, caused by the high ISO.</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">That's why many of these high contrast night sky images over a landscape have captured a lot of white stars at almost equal brightness, and this is unfortunately not the natural look of the sky. Stars appear at various brightnesses (magnitude) and in various colors.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">To a degree the D700 was able to show this, and the D3s as well due to its large sensor diodes. Unfortunately I can't use a tracker often for timelapse, but if I can I do. Milky Way images are so much better with a tracker and an exposure of 1 Minute or even a bit more."</span></p></div></blockquote><h4 data-dcnode-id="754" id="fine-tune-the-iso"><span data-dcnode-id="755" instrument_node="">Fine tune the ISO</span></h4><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">And the last Milky Way camera setting to adjust is... the ISO!</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Remember that you've been using an extremely high ISO to take your test shots.</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Now it's time to adjust it depending on:</span></p><ul data-dcnode-id="740"><li data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">The </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide%23step5"><span data-dcnode-id="746" instrument_node="">exposure triangle</span></a><span data-dcnode-id="744" instrument_node="">.</span></li><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">How much noise your camera produces.</span></li></ul><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">You want to get the correct exposure and you've already set the aperture and the shutter speed. So, you only need to adjust the ISO according to the other two settings.</span></p><p data-dcnode-id="736" style="text-align: center; font-style: italic;"><span data-dcnode-id="737" instrument_node="">"But how much?"</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">I love this quesion. Thanks for asking it! :D</span></p><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Again, the shutter speed (or exposure time) has to be limited to avoid </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="732" instrument_node="">Star Trails</span></a><span data-dcnode-id="730" instrument_node="">.</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Therefore, to avoid an underexposed image you have no choice but to crank up the ISO. The higher the ISO the brighter the Milky Way.</span></p><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Increasing the ISO amplifies the signal in the photosites (pixels) of the sensor. In other words, you're increasing the sensitivity of the sensor. The amount of light collected will be the same but it will be amplified increasing the exposure. So push your camera to the limit.</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Now, it's time to fine tune the ISO.</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The ISO you'll use in the final shot strongly depends on the noise performance of your camera.</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">Start with the a relatively high ISO (e.g. 6400, 3200, 1600) and continue taking test shots. After each test shot (or while you're taking it, if you have the live histogram option), have a close look at the </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-2%23step10"><span data-dcnode-id="719" instrument_node="">histogram</span></a><span data-dcnode-id="717" instrument_node=""> and zoom in the image in your LCD to check how much noise your camera has produced. Then, adjust the ISO accordingly.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">It's a game of try and fail, but it gets easier with a bit of practice! ;)</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">One thing, if your camera has these options, always avoid using ISOs that are amplifications by software instead of hardware, such as H1 and H2 levels.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">There are lots of techniques to reduce noise in post-processing, so don't be afraid to use a high ISO. But, at the same time, keep in mind that reducing noise in post-processing will soften your image and reduce sharpness. You will need to find the balance that gives you both a clean image and a sharp image. That's why you need to get it right on camera in the first place.</span></p><h4 data-dcnode-id="708" id="set-the-white-balance-manually"><span data-dcnode-id="709" instrument_node="">Set the white balance manually</span></h4><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Regarding the white balance, the goal is to set the right color temperature to capture a realistic Milky Way, showing the beauty of nature as pure as possible.</span></p><p data-dcnode-id="704" style="text-align: center; font-style: italic;"><span data-dcnode-id="705" instrument_node="">"What's the color temperature of the Milky Way?"</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">For many photographers that's around 4840K (pale yellow). But it actually depends on several factors, so tweak the white balance until you get a more natural Milky Way.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Light pollution or Moonlight will definitely affect your white balance selection. But don't worry too much about it because you're shooting in RAW, so you can adjust the white balance later on in post-processing.</span></p><p data-dcnode-id="686"><span data-dcnode-id="699" instrument_node="">One tip I learnt from </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="698" instrument_node="">Christoph Malin</span></a><span data-dcnode-id="696" instrument_node="">, and that can help you </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20171004033424/http%3A//christophmalin.com%3A80/2013/01/the-color-of-the-milky-way/"><span data-dcnode-id="695" instrument_node="">get the right color of the Milky Way</span></a><span data-dcnode-id="693" instrument_node="">, is to use notable stars as a reference. Make sure the colors you capture match their individual temperature range. For example, if you capture red giant superstars such as </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antares"><span data-dcnode-id="692" instrument_node="">Antares</span></a><span data-dcnode-id="690" instrument_node=""> or </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mars"><span data-dcnode-id="689" instrument_node="">Mars</span></a><span data-dcnode-id="687" instrument_node=""> and they turn out blue in your picture, you need to adjust your white balance until they turn out red.</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Let's go back to my Milky Way picture and the natural bridge...</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">There was heavy light pollution in the scene, coming from behind the natural bridge. So I decided to set the white balance to 3400K to get white stars and light pollution with a reddish hue.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">As a rule of thumb, I usually set the white balance to 3400-3900K and adjust from here.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">If you're shooting a timelapse, don't use the auto white balance. When shooting in auto white balance, the camera might change the color temperature from one photo to another, modifying the tone of the image. This will produce a very annoying flicker in your clip.</span></p><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">To avoid it, select the </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-2%23step13"><span data-dcnode-id="676" instrument_node="">Manual shooting mode (M)</span></a><span data-dcnode-id="674" instrument_node="">. Set the white balance manually to 3900K or use the tungsten preset mode (about 3200K). This way, you'll make sure that the color temperature remains constant throughout the sequence.</span></p><h4 data-dcnode-id="671" id="light-paint-the-landscape-optional"><span data-dcnode-id="672" instrument_node="">Light paint the landscape (optional)</span></h4><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">If you want to give your Milky Way images a sense of place, add depth and shadows, you should light paint the foreground. To have a more natural looking images, make sure the artificial light is subtle and has a low intensity. This is absolutely necessary on New Moon or thin Moon days.</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">On the contrary, as the Moon phase reaches Full Moon, the Moonlight might be enough to light the landscape.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Pictures made with side lighting usually have harsh shadows and more contrast. To brighten the shadows and reduce the contrast, you may want to use a fill-in-flash, flashlights or LEDs, whichever is more convenient.</span></p><p data-dcnode-id="663" style="text-align: center; font-style: italic;"><span data-dcnode-id="664" instrument_node="">"Toni how did you manage to light paint the natural bridge?"</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">It was thanks to a great teamwork!</span></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">This is how we did it:</span></p><ul data-dcnode-id="639"><li data-dcnode-id="655"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Equipment.</span></strong><span data-dcnode-id="656" instrument_node=""> We used one LED panel with a CTO gel filter.</span></li><li data-dcnode-id="651"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Lighting spot.</span></strong><span data-dcnode-id="652" instrument_node=""> Germán (aka the Developer) took the LED and walked away from my camera to apply sidelight to the bridge. The idea was to add visible shadows and depth to the image.</span></li><li data-dcnode-id="644"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">LED in movement.</span></strong><span data-dcnode-id="648" instrument_node=""> If you keep the LED still you'll overexpose one portion of the landscape. In this case, I continously moved the LED across the scene. Move it slower when applying light to the further subjects and then speed up when painting the closer ones. Always keep in mind the </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dnk9cTa3UthM"><span data-dcnode-id="647" instrument_node="">inverse-square law of light</span></a><span data-dcnode-id="645" instrument_node="">.</span></li><li data-dcnode-id="640"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Light painting time.</span></strong><span data-dcnode-id="641" instrument_node=""> After some try and fail, we found out that we needed to lightpaint for 10s to get the right exposure. Trial and error takes time and consumes battery. So, every time you run a test, make sure you count the seconds or user a timer to be able to adjust time accordingly.</span></li></ul><h4 data-dcnode-id="637" id="check-the-histogram-and-adjust-the-exposure"><span data-dcnode-id="638" instrument_node="">Check the histogram and adjust the exposure</span></h4><p data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">One last thing before you start taking photos like there's no tomorrow: check the camera's </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-2%23step10"><span data-dcnode-id="635" instrument_node="">histogram</span></a><span data-dcnode-id="633" instrument_node="">.</span></p><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The histogram allows you to check the exposure of the image on the camera's LCD screen, and to modify the camera settings (apeture, shutter speed and ISO) to adjust it at your will.</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">You know that the left side of the histogram represents the maximum dark values that your camera can record and the right side the maximum white values. On the left end of the histogram light is black, being white on the right end. In both cases, light values contain no detail.</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">To help you understand it better, have a look at the following exposure vs histogram examples:</span></p><ul data-dcnode-id="605"><li data-dcnode-id="622"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Underexposed.</span></strong><span data-dcnode-id="623" instrument_node=""> The histogram shows the peak touching the left side of the graph. You're capturing only dark tones. Correct it by opening the aperture, using a slower shutter speed or setting a higher ISO.</span></li><li data-dcnode-id="618"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Exposed to the left.</span></strong><span data-dcnode-id="619" instrument_node=""> The histogram shows the peak near the left side of the histogram window, slightly touching the left edge. Results can be acceptable, but you'll suffer from noise problems when post-processing. Again, try to lower the f/number, use a slower shutter speed or increase the ISO.</span></li><li data-dcnode-id="614"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Neutral exposure.</span></strong><span data-dcnode-id="615" instrument_node=""> The histogram shows peaks towards the center of the graph from left to right. It shows that the majority of the pixels in the image are mid-tones, and that fewer pixels makeup the shadows and highlights. It's a great histogram, so you don't need to adjust anything.</span></li><li data-dcnode-id="610"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Exposed to the right.</span></strong><span data-dcnode-id="611" instrument_node=""> The histogram shows the peak near the right side of the histogram window, slightly touching the right edge. Working with this histogram means that you increase the exposure of an image in order to collect the maximum amount of light and thus get the optimum performance out of the digital image sensor. It will help you to reduce noise, but be careful not to overexpose. Don't use a ISO excessively high ISO because your camera will end up producing noise, and thus, reducing the image quality.</span></li><li data-dcnode-id="606"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Overexposed.</span></strong><span data-dcnode-id="607" instrument_node=""> The histogram shows the peak touching the right side of the graph. You're capturing only bright tones. You might be forced to lower the ISO to get a properly exposed image.</span></li></ul><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Most of the time, you'll want a histogram that gives you a neutral exposure, with both edges of the histogram just touching the edges of the histogram window.</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">However, this really depends on the colors of your scene.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">This is the histogram I got from my Milky Way image:</span></p><figure class="portrait" data-dcnode-id="597"><img class="b-lazy" data-dcnode-id="598" data-src="/sites/default/files/articles/milky-way/mw-histogram.webp" height="169px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="284px"></figure><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">In night photography, you usually get an histogram with more mid to dark tones, and less bright tones...</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Don't expect a Gauss bell shaped curve!</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Well, now that you know what Milky Way photography settings you need to use. Let's have a look at the Milky Way post-processing workflow.</span></p><h3 data-dcnode-id="587" id="step10"><span class="step" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">10.</span></span><span data-dcnode-id="588" instrument_node="">How to post-process the Milky Way (with these 5 great free tutorials)</span></h3><p data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">Why do you think </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Cartier-Bresson"><span data-dcnode-id="585" instrument_node="">Henri-Cartier Bresson</span></a><span data-dcnode-id="583" instrument_node=""> never processed and developed his own film by himself? He just had someone else to do the job...</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The reason is simple. This allowed him to spend more time doing what he really loved: shooting.</span></p><p data-dcnode-id="572"><span data-dcnode-id="579" instrument_node="">I have the impression that nowadays us photographers are all a bit too much concerned about post-processing when we should focus on getting the image right in camera. If you shoot a bad photo, there's no way </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="578" instrument_node="">Lightroom</span></a><span data-dcnode-id="576" instrument_node=""> or </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="575" instrument_node="">Photoshop</span></a><span data-dcnode-id="573" instrument_node=""> will do the magic trick and make this picture any better.</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">In my opinion, the best post-processing is the one you don't need to do. So, get your image correctly exposed and you won't have to invest much time in front of the computer.</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Besides, pushing the exposure too much in post-processing increases noise and reduces the picture quality. Try to properly expose your photographs in camera in the first place.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Having said that, I must admit that post-processing will always be part of our workflow. Even purists use post-processing to remove photographic imperfections like dust, scratches, etc. Of course, some of you will surely argue that the creative process doesn't stop when pressing the shutter, that's just the beginning.</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Well, this is the beauty of rules, everyone can break them.</span></p><h4 data-dcnode-id="562" id="study-these-awesome-5-tutorials-and-learn-from-the-best"><span data-dcnode-id="563" instrument_node="">Study these awesome 5 tutorials and learn from the best</span></h4><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Like everything in life, learning from the best is key. So let me suggest you to watch these 5 free video tutorials created by several excellent Milky Way photographers. Thanks to them you'll be able to learn how to make the most of your Milky Way images:</span></p><ul data-dcnode-id="544"><li data-dcnode-id="557"><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DqNDrZ3hP2Tk"><span data-dcnode-id="559" instrument_node="">Milky Way Photography Masterclass with Alyn Wallace</span></a></li><li data-dcnode-id="554"><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D_hX-yIejU_g"><span data-dcnode-id="556" instrument_node="">Milky Way Photography Post-Processing Masterclass with Nick Page</span></a></li><li data-dcnode-id="551"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyspeck.com/light-pollution-video-tutorial/"><span data-dcnode-id="553" instrument_node="">How to Photograph the Milky Way in Really Heavy Light Pollution Using ETTR (Expose to the Right) by Ian Norman</span></a></li><li data-dcnode-id="548"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D49t3H2Ck29k"><span data-dcnode-id="550" instrument_node="">How to process the Milky Way - Adobe Lightroom CC tutorial by Michael Shainblum</span></a></li><li data-dcnode-id="545"><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kennethbrandon.com/how-to-edit-the-milky-way-photoshop-tutorial/"><span data-dcnode-id="547" instrument_node="">How to edit the Milky Way - Photoshop tutorial by Kenneth Brandon</span></a></li></ul><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">If you're looking for something more advanced and are willing to invest a bit of money, I recommend you these awesome resources:</span></p><ul data-dcnode-id="521"><li data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">Michael Shainblum's video tutorial: </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shainblumphoto.com/milky-way-tutorial-2/"><span data-dcnode-id="540" instrument_node="">Premium Night Sky, Milky Way Tutorial</span></a></li><li data-dcnode-id="534"><span data-dcnode-id="537" instrument_node="">Adam Woodworth's video tutorial: </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamwoodworth.com/video-tutorials/"><span data-dcnode-id="536" instrument_node="">Milky Way Master Class</span></a></li><li data-dcnode-id="530"><span data-dcnode-id="533" instrument_node="">Nick Page's video tutorial: </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nickpagephotography.com/tutorials/astrophotography-post-processing-course"><span data-dcnode-id="532" instrument_node="">Astrophotography Post Processing Course</span></a></li><li data-dcnode-id="526"><span data-dcnode-id="529" instrument_node="">Dave Morrow's ebook: </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davemorrowphotography.com/p/photograph-the-night-sky-book.html"><span data-dcnode-id="528" instrument_node="">Photograph the Night Sky</span></a></li><li data-dcnode-id="522"><span data-dcnode-id="525" instrument_node="">David Kingham's ebook: </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exploringexposure.com/product/nightscape-ebook/"><span data-dcnode-id="524" instrument_node="">Nightscape</span></a></li></ul><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Remember, when editing, make sure the colors of notable stars you capture (Antares, Mars, etc.) match their individual temperature range.</span></p><h4 data-dcnode-id="517" id="the-importance-of-noise-reduction"><span data-dcnode-id="518" instrument_node="">The importance of noise reduction</span></h4><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">As I've already said, I don't use the camera noise reduction mode. I prefer to preview the image immediately rather than waiting for another 30s.</span></p><p data-dcnode-id="507"><span data-dcnode-id="514" instrument_node="">To remove hot pixels you can use the clone tool in either </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="513" instrument_node="">Lightroom</span></a><span data-dcnode-id="511" instrument_node=""> or </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="510" instrument_node="">Photoshop</span></a><span data-dcnode-id="508" instrument_node="">. But I personally prefer to use the following workflow in Photoshop:</span></p><ul data-dcnode-id="498"><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Use the lasso tool to select the hot-pixels.</span></li><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Go to Edit &gt; Fill...</span></li><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Select "Content-Aware" in the field "Use".</span></li><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Press OK.</span></li></ul><p data-dcnode-id="490"><span data-dcnode-id="497" instrument_node="">If you create a custom </span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpx.adobe.com/photoshop/using/creating-actions.html"><span data-dcnode-id="496" instrument_node="">action in Photoshop</span></a><span data-dcnode-id="494" instrument_node=""> and a </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpx.adobe.com/photoshop/using/customizing-keyboard-shortcuts.html"><span data-dcnode-id="493" instrument_node="">keyboard shortcut</span></a><span data-dcnode-id="491" instrument_node="">, you can remove hot pixels very quickly.</span></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">There are different techniques to reduce the noise level.</span></p><p data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">Typical photo editing softwares such as </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="486" instrument_node="">Lightroom</span></a><span data-dcnode-id="484" instrument_node=""> and </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="483" instrument_node="">Photoshop</span></a><span data-dcnode-id="481" instrument_node=""> include tools to remove chromatic and luminance noise.</span></p><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">But be careful because when using any noise reduction tool. If you go way too far, it will soften the image and reduce sharpness. In night photography, it can even remove stars from the image.</span></p><p data-dcnode-id="467"><span data-dcnode-id="477" instrument_node="">In addition to this, there are other noise reduction specialized softwares that give even better results. </span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturecode.com/index.php"><span data-dcnode-id="476" instrument_node="">Photo Ninja</span></a><span data-dcnode-id="474" instrument_node=""> (the noise reduction tool is called Noise Ninja), </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nikcollection.dxo.com/dfine/"><span data-dcnode-id="473" instrument_node="">DxO's Nik Collection Dfine</span></a><span data-dcnode-id="471" instrument_node="">, and </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imagenomic.com/Products/Noiseware"><span data-dcnode-id="470" instrument_node="">Noiseware</span></a><span data-dcnode-id="468" instrument_node=""> are great tools.</span></p><p data-dcnode-id="462"><span data-dcnode-id="466" instrument_node="">In </span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="465" instrument_node="">Photoshop</span></a><span data-dcnode-id="463" instrument_node=""> I use DxO's Nik Collection Dfine, but not too much. I prefer to have a bit of noise and more stars rather than losing sharpness and stars. Then, I apply a masking layer to restore areas where the software has unnecessarily removed noise.</span></p><p data-dcnode-id="455"><span data-dcnode-id="461" instrument_node="">Another method you could use is stacking and averaging images in </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="460" instrument_node="">Photoshop</span></a><span data-dcnode-id="458" instrument_node="">. It's a great way of controlling noise with high ISO images. </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRydg7JGTAbw"><span data-dcnode-id="457" instrument_node="">Here you have a great video tutorial by Ian Norman.</span></a></p><h3 data-dcnode-id="451" id="step11"><span class="step" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">11.</span></span><span data-dcnode-id="452" instrument_node="">10 inspiring Milky Way pictures</span></h3><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Let's go back now to the purpose of this article. So open your mind, get inspired and brainstorm for a truly remarkable Milky Way picture.</span></p><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Sure, you'll find inspiration in Mark Gee's winning image - 'Guiding Light to The Stars'. In the same way, I'm sure that the following photos will boost your creativity.</span></p><figure data-dcnode-id="438"><img class="b-lazy" data-dcnode-id="446" data-src="/sites/default/files/articles/milky-way/guiding-light-to-the-stars.webp" height="357px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="439"><span data-dcnode-id="445" instrument_node="">Canon 5D Mark III | 24mm | f/2.8 | 30s | ISO 3200 | 10-photo panorama</span><br data-dcnode-id="444"><span data-dcnode-id="443" instrument_node="">Photo by </span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theartofnight.com/"><span data-dcnode-id="442" instrument_node="">Mark Gee</span></a><span data-dcnode-id="440" instrument_node="">.</span></figcaption></figure><figure class="portrait" data-dcnode-id="429"><img class="b-lazy" data-dcnode-id="437" data-src="/sites/default/files/articles/milky-way/elia-locardi.webp" height="1229472850px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="13px"><figcaption data-dcnode-id="430"><span data-dcnode-id="436" instrument_node="">Fuji X-E2 | 14mm | f/8 | 30s | ISO 400</span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">Photo by </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elialocardi.com/"><span data-dcnode-id="433" instrument_node=
