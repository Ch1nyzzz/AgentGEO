 Way is to look for the </span><a data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_%28constellation%29"><span data-dcnode-id="2878" instrument_node="">Sagittarius constellation</span></a><span data-dcnode-id="2876" instrument_node="">.</span></p><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">But don't worry to much about it, PhotoPills is a great Milky Way finder app. With its augmented reality views and map views it's super easy to find the Milky Way.</span></p><h4 data-dcnode-id="2871" id="same-location-same-direction-same-elevation-2"><span data-dcnode-id="2872" instrument_node="">Same location, same direction, same elevation (2)</span></h4><p data-dcnode-id="2866" style="text-align: center; font-style: italic;"><span data-dcnode-id="2870" instrument_node="">"For a given location and direction (</span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/understanding-azimuth-and-elevation"><span data-dcnode-id="2869" instrument_node="">azimuth</span></a><span data-dcnode-id="2867" instrument_node="">), the Galactic Center will always be at the same elevation in the sky."</span></p><p data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">To put it simple, if you go to the same location on two different dates, look towards the same direction and wait until the Galactic Center is in that direction, you'll see it at the same elevation in the sky.</span></p><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">No matter the date, for a given location, when the Galactic Center is in one direction, it always has the same elevation.</span></p><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Thus, given a location, the Galactic Center always rises in the same direction. Also, it always sets in the same direction.</span></p><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Surprised?</span></p><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">The practical application of this fact is easy. For example, once you know the azimuth in which the Galactic Center rises, just choose the shooting spot in a way that the azimuth of the Galactic Center is just where you want it relative to the main subject of your photo (rock, tree, lighthouse, building, etc.).</span></p><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">In other words, when you find a location you like, proceed as follows:</span></p><ul data-dcnode-id="2841"><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Decide the position of the Galactic Center in the sky. Oftentimes your initial shooting spot won't be right. You'll have to move around the location.</span></li><li data-dcnode-id="2844"><span data-dcnode-id="2851" instrument_node="">Use the Milky Way app tools included in PhotoPills, either the </span><a data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/how-plan-milky-way-using-2d-map-centric-planner"><span data-dcnode-id="2850" instrument_node="">Planner</span></a><span data-dcnode-id="2848" instrument_node=""> or the </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/how-plan-milky-way-using-augmented-reality"><span data-dcnode-id="2847" instrument_node="">Night Augmented Reality tool</span></a><span data-dcnode-id="2845" instrument_node="">, to find out the azimuth in which the Galactic Center is at the desired elevation and orientation.</span></li><li data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Again, use these tools to choose the shooting spot that gives you the composition you want.</span></li></ul><figure data-dcnode-id="2835"><img class="b-lazy" data-dcnode-id="2840" data-src="/sites/default/files/articles/milky-way/picture-ar-shooting-spot.webp" height="533px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2836"><span data-dcnode-id="2839" instrument_node="">Step 1. Find the azimuth in which the Galactic Center is at the elevation and orientation you want.</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">Step 2. Move around the location to find the right shooting spot for the composition you want.</span></figcaption></figure><h4 data-dcnode-id="2833" id="check-the-moon-phase-3"><span data-dcnode-id="2834" instrument_node="">Check the Moon phase (3)</span></h4><p data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Most times, you'll want to be in complete darkness when shooting the Milky Way. Therefore, when planning, you have to take into account the phase of the Moon. There should be no Moon!</span></p><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">As a result, when planning all your Milky Way shots you should make sure they happen during New Moon and the 4 days before and after it.</span></p><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">In this case, you'll need artificial light sources to capture the beauty of the landscape under the Milky Way.</span></p><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">But the presence of a Full Moon is not always detrimental. You can still use the Moonlight (from first quarter to last quarter) to photograph the landscape while capturing the Milky Way at the same time.</span></p><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Look for the dates when the Moon falls outside your desired frame, preferably forming an angle between 60º and 90º with the direction you're pointing your camera at. The light will be more prominent on one side, and more shadows will be cast on the opposite side of the landscape elements. So, in this case, side lighting is ideal to highlight textures.</span></p><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Direct front Moonlight shows the pattern of the landscape elements in a flat, uninformative way, but side lighting creates shadows in every little rock. This can give an almost 3D effect to a photograph.</span></p><p data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">The light is best starting about one to two hours after the Moon rises. It's when the Moon will illuminate the landscape completely, creating beautiful shadows that give volume to the elements.</span></p><p data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node="">To help you with the Moon, use the </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide-2%23moon-calendar"><span data-dcnode-id="2817" instrument_node="">Moon calendar</span></a><span data-dcnode-id="2815" instrument_node=""> included in the|PhotoPills| app ;)</span></p><h3 data-dcnode-id="2810" id="step7"><span class="step" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">7.</span></span><span data-dcnode-id="2811" instrument_node="">How to plan your Milky Way ideas step by step</span></h3><p data-dcnode-id="2806" style="text-align: center; font-style: italic;"><span data-dcnode-id="2809" instrument_node="">"A goal without a plan is just a wish." - </span><a data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoine_de_Saint-Exup%25C3%25A9ry"><span data-dcnode-id="2808" instrument_node="">Antoine de Saint-Exupéry</span></a></p><figure data-dcnode-id="2804"><img class="b-lazy" data-dcnode-id="2805" data-src="/sites/default/files/articles/milky-way/picture-mw-idea.webp" height="555px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"></figure><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">I love the mystery surrounding Es Pont d'En Gil, a natural bridge located in Menorca, a little island lost in the Mediterranean Sea... My home.</span></p><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">What I like about this natural bridge and makes it special is that behind it, 32 km (20 mi) away, is the crowded island of Mallorca. And its heavy light pollution paints red the arch of the bridge during the nights. It makes my imagination fly...</span></p><p data-dcnode-id="2797"><em data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">[Danger - flying mode on]</span></em></p><blockquote data-dcnode-id="2787"><div data-dcnode-id="2788"><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Imagine the red bridge... It's like a door to Hell, once you come in you can't come out, cursed for eternity... I've heard stories spoken by the elders... Stories about seamen who sailed never to return again... All vanished but one... There was one who returned... On a New Moon day... This is how the legend goes:</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">"Only in the nights of New Moon, when the stars dig deep into the very bowels of Hell, the brave will find the star way back to the human world."</span></p><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">I've always been fascinated by old sea stories and legends. The truth is that too many seamen have been swallowed by the sea leaving their wife and children behind. All these real life dramas have inspired me to look for a spark of hope. This is how I came up with the idea of connecting Hell and Heaven with a stair made of stars... Connecting them with the majestic Milky Way... In a New Moon night.</span></p><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">"... Only when the stars dig deep into the very bowels of Hell..." could be decrypted as "only when the Milky Way falls straight into the bridge"... I imagine the Milky Way completely vertical digging into the natural bridge... That's definitely an hypnotic shot!</span></p></div></blockquote><p data-dcnode-id="2784"><em data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">[You're safe now - flying mode off]</span></em></p><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">So, how did I calculate the exact date and time the Milky Way would be vertical and aligned with the bridge?</span></p><p data-dcnode-id="2777"><span data-dcnode-id="2781" instrument_node="">Yes, you're right... I used my favourite Milky Way app: </span><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="2780" instrument_node="">PhotoPills</span></a><span data-dcnode-id="2778" instrument_node="">!</span></p><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">In the following video, you'll learn how to use the PhotoPills app to find and plan any Milky Way photo you imagine in just seconds. It's so powerful!</span></p><div class="video-wrapper" data-dcnode-id="2773"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="2774" data-src="https://www.youtube.com/embed/MMbKEq-zr18" frameborder="0" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"></iframe></div><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Do you want more videos?</span></p><p data-dcnode-id="2767"><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/photopills"><span data-dcnode-id="2770" instrument_node="">Check our YouTube channel</span></a><span data-dcnode-id="2768" instrument_node=""> for more cool planning examples and videos on how to master the PhotoPills app!</span></p><p data-dcnode-id="2762"><span data-dcnode-id="2766" instrument_node="">For instance, </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DYBRM_wLTLsA"><span data-dcnode-id="2765" instrument_node="">in this video</span></a><span data-dcnode-id="2763" instrument_node=""> you'll see Rafa (aka the Bard) plan a cool Milky Way photo with the Vingerklip, an amazing rock formation in Namibia.</span></p><p data-dcnode-id="2757"><span data-dcnode-id="2761" instrument_node="">And this is exactly how I used the </span><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/tutorials/how-plan-milky-way-using-2d-map-centric-planner"><span data-dcnode-id="2760" instrument_node="">PhotoPills Planner</span></a><span data-dcnode-id="2758" instrument_node=""> to plan the shot:</span></p><h4 data-dcnode-id="2755" id="place-the-red-pin-on-the-shooting-spot"><span data-dcnode-id="2756" instrument_node="">Place the Red Pin on the shooting spot</span></h4><p data-dcnode-id="2744"><span data-dcnode-id="2754" instrument_node="">Go to </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="2753" instrument_node="">PhotoPills</span></a><span data-dcnode-id="2751" instrument_node=""> and tap on </span><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Planner</span></em><span data-dcnode-id="2748" instrument_node=""> (</span><em data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Pills</span></em><span data-dcnode-id="2745" instrument_node=""> menu).</span></p><p data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node="">The first step is always the same one: place the </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23red-pin"><span data-dcnode-id="2742" instrument_node="">Red Pin</span></a><span data-dcnode-id="2740" instrument_node=""> near your subject. In this case, the natural bridge of Es Pont d'En Gil in Menorca.</span></p><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">To do it, you can navigate the map or tap on the </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23planner-load"><span data-dcnode-id="2737" instrument_node="">Load</span></a><span data-dcnode-id="2735" instrument_node=""> button and</span></p><ul data-dcnode-id="2719"><li data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Use the Search bar to find a location.</span></li><li data-dcnode-id="2724"><span data-dcnode-id="2731" instrument_node="">Load a </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide-2%23mystuff-plans"><span data-dcnode-id="2730" instrument_node="">Plan</span></a><span data-dcnode-id="2728" instrument_node=""> or </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide-2%23mystuff-pois"><span data-dcnode-id="2727" instrument_node="">Point of Interest</span></a><span data-dcnode-id="2725" instrument_node=""> you've previously saved.</span></li><li data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Type the latitude and longitude.</span></li><li data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Or use a geotagged photo.</span></li></ul><p data-dcnode-id="2711"><span data-dcnode-id="2718" instrument_node="">In this example, tap on </span><em data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Load</span></em><span data-dcnode-id="2715" instrument_node="">, choose Latitude/Longitude an type these coordinates: (</span><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/40%25C2%25B000%2738.4%2522N%2B3%25C2%25B047%2740.6%2522E/%4040.0106724%2C3.79461%2C2920m/data%3D%213m2%211e3%214b1%214m2%213m1%211s0x0%3A0x0"><span data-dcnode-id="2714" instrument_node="">40.010673ºN, 3.794610ºE</span></a><span data-dcnode-id="2712" instrument_node="">).</span></p><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">The Red Pin will be placed near the bridge.</span></p><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">There are only two spots from where you can see the horizon through the bridge, but there is only one that is perfect for a Milky Way shoot.</span></p><p data-dcnode-id="2696"><span data-dcnode-id="2706" instrument_node="">Once you've found your desired shooting spot, </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnOZsprPgBnE"><span data-dcnode-id="2705" instrument_node="">move the Red Pin</span></a><span data-dcnode-id="2703" instrument_node=""> right on the position from where you want to take the photo. Then tap the </span><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23map-buttons"><span data-dcnode-id="2702" instrument_node="">Map Settings</span></a><span data-dcnode-id="2700" instrument_node=""> button and switch on the </span><a data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23milky-layers"><span data-dcnode-id="2699" instrument_node="">Milky Way layer</span></a><span data-dcnode-id="2697" instrument_node="">.</span></p><p data-dcnode-id="2688"><span data-dcnode-id="2695" instrument_node="">You'll find the </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Map Settings</span></em><span data-dcnode-id="2692" instrument_node=""> button on the map, at the bottom right corner, next to the </span><em data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">(+) button</span></em><span data-dcnode-id="2689" instrument_node="">.</span></p><div class="two-figures screenshot" data-dcnode-id="2677"><div data-dcnode-id="2683"><figure data-dcnode-id="2684"><img class="b-lazy" data-dcnode-id="2687" data-src="/sites/default/files/articles/milky-way/6-mw-1-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">PhotoPills Planner – On the Map Settings screen, tap on the eye icon to switch on the Milky Way layer.</span></figcaption></figure></div><div data-dcnode-id="2678"><figure data-dcnode-id="2679"><img class="b-lazy" data-dcnode-id="2682" data-src="/sites/default/files/articles/milky-way/6-mw-2-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">PhotoPills Planner – Place the Red Pin on the desired shooting spot. You now see the Milky Way layer on the map.</span></figcaption></figure></div></div><p data-dcnode-id="2672"><span data-dcnode-id="2676" instrument_node="">Notice the panel that is just above the map. </span><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23panel7"><span data-dcnode-id="2675" instrument_node="">Panel 7</span></a><span data-dcnode-id="2673" instrument_node=""> is telling you that:</span></p><ul data-dcnode-id="2667"><li data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">The Galactic Center will become visible at 11:16 pm (on May 22) at an azimuth of 128.5º when it rises.</span></li><li data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Then, it will become invisible at 04:29 am (on May 23) when it sets at an azimuth of 193.9º and an elevation of 19.7º.</span></li></ul><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Have a look at the two azimuth lines on the map. The light gray line is showing the direction where the Galactic Center will become visible (at an azimuth of 128.5º) and the dark gray one, where it will become invisible (at an azimuth of 193.9º) for the selected date.</span></p><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">The white circumferences are a sort of contour lines that will help you visualize the position of the Milky Way in the sky. You'll see what I mean in a second.</span></p><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Keep reading!</span></p><h4 data-dcnode-id="2659" id="check-all-the-new-moons-until-you-find-the-right-date-and-time"><span data-dcnode-id="2660" instrument_node="">Check all the New Moons until you find the right date and time</span></h4><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">I'd like to have the Milky Way (and the Galactic Center) completely vertical and aligned with the natural bridge. It's time to find when it happens...</span></p><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">On the one hand, for a given month, every year you'll be able to get the same shots. The Milky Way position in the sky will be the same.</span></p><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">This means that once you've planned a shot, you'll be able to repeat the photo every year during the same month (and even during a few months!).</span></p><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">And on the other hand, you want to have a perfect dark sky...</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Therefore, to find the date and time the photo you want happens, I recommend you to check the possible compositions you can get in each one of the New Moons of the year...</span></p><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">So in the blink of an eye, you know the possible shots you can get in a location depending on the month, and to figure out when the shot you want actually happens.</span></p><p data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">It'll take you a few minutes to do it the first time. And just a few seconds the second time ;)</span></p><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">So, this is the workflow you need to follow:</span></p><ul data-dcnode-id="2628"><li data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Double tap the center of the Time Bar to set the date to today and the time to right now.</span></li><li data-dcnode-id="2636"><span data-dcnode-id="2640" instrument_node="">Swipe the panels above the map until you get to </span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23panel8"><span data-dcnode-id="2639" instrument_node="">Panel 8</span></a><span data-dcnode-id="2637" instrument_node=""> (see screenshot below).</span></li><li data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">Tap the Milky Way picture on </span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23panel8"><span data-dcnode-id="2634" instrument_node="">Panel 8</span></a><span data-dcnode-id="2632" instrument_node=""> to jump in time to the next New Moon.</span></li><li data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Finally, change the time with the Time Bar to see where the Milky Way (and the Galactic Center) will be during the night.</span></li></ul><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">If the shot you want doesn't happen during that New Moon, tap again the picture of the Milky Way on the top panel to jump in time to the next New Moon. If necessary, keep repeating the process until you get the shot you want. Until you find the Milky Way in the position you need.</span></p><p data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Following these steps I figured out that the photo I want happens both in August and September 2019. So let's check August's New Moon (August 30th).</span></p><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Have a look at the first screenshot. The Milky Way is represented by a white dotted arc. The biggest white dot represents the Galactic Center, and marks the crossing point between the Galactic Center azimuth line and the Milky Way arc. This way, you can easily distinguish the Galactic Center on the Milky Way arc.</span></p><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">The top panel tells you that at 09:56 pm the Galactic Center will be at an azimuth of 194.0º and an elevation of 19.7º. When the Milky Way arc maximum elevation is 71.9º, the arc will be forming a diagonal in the sky.</span></p><div class="two-figures screenshot" data-dcnode-id="2609"><div data-dcnode-id="2615"><figure data-dcnode-id="2616"><img class="b-lazy" data-dcnode-id="2619" data-src="/sites/default/files/articles/milky-way/6-mw-3-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">PhotoPills Planner – Position of the Milky Way on August 30th at 09:56pm.</span></figcaption></figure></div><div data-dcnode-id="2610"><figure data-dcnode-id="2611"><img class="b-lazy" data-dcnode-id="2614" data-src="/sites/default/files/articles/milky-way/6-mw-4-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">PhotoPills Night Augmented Reality view – Position of the Milky Way on August 30th at 09:56 pm.</span></figcaption></figure></div></div><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Now, you want to have the Core of the Milky Way vertical and aligned with the bridge.</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">To find out when it happens, move time until the maximum elevation of the Milky Way arc is 90º (read the top panel ot confirm it) and check whether the Milky Way is aligned with the bridge.</span></p><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">If it's not aligned, readjust the position of the Red Pin. Additionally, you can jump to the next New Moon day and check it again.</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">That's it!</span></p><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Now the Planner tells you that if you go where the Red Pin is placed on August 30th at 11:46 pm, you'll get the scene you imagined.</span></p><div class="two-figures screenshot" data-dcnode-id="2588"><div data-dcnode-id="2594"><figure data-dcnode-id="2595"><img class="b-lazy" data-dcnode-id="2598" data-src="/sites/default/files/articles/milky-way/3-mw-1-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">PhotoPills Planner – On August 30th at 11:46 pm the Core of the Milky Way will be vertical and aligned with the bridge.</span></figcaption></figure></div><div data-dcnode-id="2589"><figure data-dcnode-id="2590"><img class="b-lazy" data-dcnode-id="2593" data-src="/sites/default/files/articles/milky-way/3-mw-2-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">PhotoPills Night Augmented Reality view – The Night Augmented Reality allows you to visualize if you got the composition you're looking for.</span></figcaption></figure></div></div><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Now, after the planning work it's time to pray for nice weather conditions.</span></p><p data-dcnode-id="2581"><span data-dcnode-id="2585" instrument_node="">This is the name of the game PhotoPillers play: </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.spreadshirt.com/photopills/plan%2B%2526%2Bpray%3Fcollection%3DNUehwyatyn"><span data-dcnode-id="2584" instrument_node="">Plan &amp; Pray</span></a><span data-dcnode-id="2582" instrument_node="">.</span></p><figure data-dcnode-id="2577"><img class="b-lazy" data-dcnode-id="2580" data-src="/sites/default/files/articles/milky-way/plan-and-pray.webp" height="494px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">The Bard praying while wearing one of PhotoPills' t-shirts!</span></figcaption></figure><h4 data-dcnode-id="2575" id="the-photo"><span data-dcnode-id="2576" instrument_node="">The photo</span></h4><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">And here you have the resulting image :)</span></p><p data-dcnode-id="2568"><span data-dcnode-id="2572" instrument_node="">I decided to shoot it in portrait mode and to ask Germán Marquès, the developer of the </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="2571" instrument_node="">PhotoPills</span></a><span data-dcnode-id="2569" instrument_node=""> app, to go and pose for me under the stars.</span></p><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">It adds interest and scale to the photo, don't you think?</span></p><figure class="portrait" data-dcnode-id="2562"><img class="b-lazy" data-dcnode-id="2565" data-src="/sites/default/files/articles/milky-way/german-gil.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Nikon D4s | 35mm | f/1.4 | 13s | ISO 6400</span></figcaption></figure><p data-dcnode-id="2557"><span data-dcnode-id="2561" instrument_node="">This is just a quick explanation on how to plan the Milky Way using </span><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="2560" instrument_node="">PhotoPills</span></a><span data-dcnode-id="2558" instrument_node="">.</span></p><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">For a complete step by step guide, have a look at the following video and articles:</span></p><ul data-dcnode-id="2529"><li data-dcnode-id="2550"><span data-dcnode-id="2554" instrument_node="">Video: </span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DYBRM_wLTLsA"><span data-dcnode-id="2553" instrument_node="">How To Plan The Milky Way With The Vingerklip, Namibia</span></a><span data-dcnode-id="2551" instrument_node="">.</span></li><li data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node="">Video: </span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DqNDrZ3hP2Tk"><span data-dcnode-id="2548" instrument_node="">Milky Way Photography Masterclass with Alyn Wallace</span></a><span data-dcnode-id="2546" instrument_node="">.</span></li><li data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">Video: </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D_hX-yIejU_g"><span data-dcnode-id="2543" instrument_node="">Milky Way Photography Post Processing Masterclass with Nick Page</span></a><span data-dcnode-id="2541" instrument_node="">.</span></li><li data-dcnode-id="2535"><span data-dcnode-id="2539" instrument_node="">Article: </span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/tutorials/how-plan-milky-way-using-2d-map-centric-planner"><span data-dcnode-id="2538" instrument_node="">How To Plan The Milky Way Using The 2D Map-Centric Planner</span></a><span data-dcnode-id="2536" instrument_node="">.</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">Article: </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/tutorials/how-plan-milky-way-using-augmented-reality"><span data-dcnode-id="2533" instrument_node="">How To Plan The Milky Way Using The Augmented Reality</span></a><span data-dcnode-id="2531" instrument_node="">.</span></li></ul><h3 data-dcnode-id="2525" id="step8"><span class="step" data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">8.</span></span><span data-dcnode-id="2526" instrument_node="">All the gear you need to successfully photograph the Milky Way</span></h3><figure data-dcnode-id="2523"><img class="b-lazy" data-dcnode-id="2524" data-src="/sites/default/files/articles/milky-way/equipment.webp" height="494px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"></figure><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">I always recommend those of my students who are willing to take photography seriously to start playing hard since the beginning and buy the best equipment possible they can afford, including second hand gear, because, at the end of the day, it's a way to save money.</span></p><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">If you spend your savings in a basic equipment, you'll soon find out that it's far too limited to take the images you want and you'll finally end investing in a better one, spending twice as much money. Besides, good equipment lasts for many years when treated well and, in case you decide to sell it, you'll always find a buyer in the secondhand market.</span></p><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">What is the ideal equipment for night photography? In my opinion, these are the general features your camera (either DSLR or mirrorless) should have:</span></p><ul data-dcnode-id="2496"><li data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Full manual exposure controls of aperture, shutter speed, ISO and focus.</span></li><li data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Full Frame sensor. One of the advantages of using a Full Frame camera is that, typically, noise performance is much better than in APS-C cameras, allowing you to use higher ISO values, collect more light and, thus, take better Milky Way pictures. This is due to the fact that the larger sensor of a Full Frame camera has larger photosites (pixels). Larger photosites can collect more light per unit of time allowing the camera not to have to amplify the signal that much, reducing noise, achieving a greater dynamic range and minimizing heat in the sensor. To sum up, for a given number of megapixels, Full Frame cameras generally produce less noise in the image than APS-C cameras.</span></li><li data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Good noise performance when cranking up the ISO to 3200 or higher.</span></li><li data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Full manual control of the white balance.</span></li><li data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Most of the settings (ISO, white balance, etc.) are directly accessible through external buttons, without having to dig into the camera menu.</span></li><li data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Shoots in RAW.</span></li><li data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">A perfectly sealed camera body with optimal construction to withstand the effects of wind, water, rain, humidity, sand, dust, etc.</span></li><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Good heat dissipation system to prevent the sensor to heat up and, thus, avoid thermal noise in the picture. Besides the noise, if the sensor temperature is too high, the sensor might start vignetting with a magenta color.</span></li><li data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">A built-in intervalometer. It comes very handy when you forget to bring the external intervalometer or when it runs out of battery.</span></li><li data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">The option to use non-CPU lenses.</span></li></ul><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Regarding the lens, for a given exposure time when shooting the Milky Way, you need your lens to collect as much light as possible to capture the maximum number of stars as big bright spots.</span></p><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Also, you want to make sure you capture as much of the Milky Way as you can. Therefore, you need to use the fastest (f/number) and widest-angle (short focal length) lens you can afford to collect as much light as possible and also frame the larger area of the sky. A 14mm for Full Frame cameras or 11mm for cropped sensors would be ideal.</span></p><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Lenses that allow these short focal lengths are called ultra wide angle lenses. Unfortunately, due to the complexity of its construction, the wider the lens the more expensive it is.</span></p><h4 data-dcnode-id="2488" id="pros-and-cons-of-the-beginner-s-equipment-and-workarounds"><span data-dcnode-id="2489" instrument_node="">Pros and cons of the beginner's equipment... and workarounds!</span></h4><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">You obviously don't need to spend a fortune in a professional equipment to capture nice compositions of the Milky Way, it's all about your imagination.</span></p><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">And yes, you and I are aware that with a basic equipment your images won't look as good as they should to well trained eyes.</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">But... Shhhh... Keep this as a secret...</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">The good news is that most of your friends and social media followers will hardly make out the difference between your image and a professional one... So, why not trying to photograph the Milky Way?</span></p><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">The most common equipment in my beginner's class consists of:</span></p><h5 data-dcnode-id="2476" id="camera"><span data-dcnode-id="2477" instrument_node="">Camera</span></h5><ul data-dcnode-id="2430"><li data-dcnode-id="2447"><span data-dcnode-id="2475" instrument_node="">Cameras with an </span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/APS-C"><span data-dcnode-id="2474" instrument_node="">APS-C</span></a><span data-dcnode-id="2472" instrument_node=""> sensor: Nikon </span><a data-dcnode-id="2470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SBVDOZ"><span data-dcnode-id="2471" instrument_node="">D3500</span></a><span data-dcnode-id="2469" instrument_node=""> and </span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MVmpN3"><span data-dcnode-id="2468" instrument_node="">D5600</span></a><span data-dcnode-id="2466" instrument_node="">; Canon </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2IqBsQo"><span data-dcnode-id="2465" instrument_node="">2000D</span></a><span data-dcnode-id="2463" instrument_node="">, </span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Canon-Digital-Camera-Accessory-Bundle/dp/B07FT15H54/ref%3Dsr_1_2_sspa%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="2462" instrument_node="">4000D</span></a><span data-dcnode-id="2460" instrument_node=""> and </span><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N1LMN7"><span data-dcnode-id="2459" instrument_node="">M50</span></a><span data-dcnode-id="2457" instrument_node="">; Fuji </span><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZNKxL"><span data-dcnode-id="2456" instrument_node="">XT-20</span></a><span data-dcnode-id="2454" instrument_node="">; Pentax </span><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MTUcpJ"><span data-dcnode-id="2453" instrument_node="">K-70</span></a><span data-dcnode-id="2451" instrument_node=""> and Sony </span><a data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3DWj09s"><span data-dcnode-id="2450" instrument_node="">a6400</span></a><span data-dcnode-id="2448" instrument_node="">.</span></li><li data-dcnode-id="2436"><span data-dcnode-id="2446" instrument_node="">Cameras with a </span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Thirds_system"><span data-dcnode-id="2445" instrument_node="">Micro 4/3</span></a><span data-dcnode-id="2443" instrument_node=""> sensor: Olympus </span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3IKzG7P"><span data-dcnode-id="2442" instrument_node="">E-PL10</span></a><span data-dcnode-id="2440" instrument_node="">; Panasonic </span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3oTWgTB"><span data-dcnode-id="2439" instrument_node="">G95</span></a><span data-dcnode-id="2437" instrument_node="">.</span></li><li data-dcnode-id="2431"><span data-dcnode-id="2435" instrument_node="">Compact camera (1" sensor): Sony </span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3ysrIuZ"><span data-dcnode-id="2434" instrument_node="">RX100 VII</span></a><span data-dcnode-id="2432" instrument_node="">.</span></li></ul><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">These cameras allow full manual exposure and manual white balance (or, at least, choosing a white balance preset).</span></p><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Unfortunately, basic DSLR and mirrorless cameras don't allow you to use ISOs of 3200 and higher without producing noise. One possible way to work around these cameras' limitations is to shoot at 800 ISO and use a noise reduction tool in post-processing. Depending on the results you get, try to push your ISO higher and see what happens.</span></p><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">However, be aware, noise reduction does smooth the fine detail in your images, making them softer to the eye, which can be problematic.</span></p><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">These cameras are usually part of a kit that includes a basic 18-55mm lens.</span></p><h5 data-dcnode-id="2420" id="mm-lens"><span data-dcnode-id="2421" instrument_node="">18-55mm lens</span></h5><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">The lens makes the image, the camera records it.</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Therefore, your lens is a crucial part of your equipment. You should definitely invest in quality lenses.</span></p><p data-dcnode-id="2408"><span data-dcnode-id="2415" instrument_node="">Most DSLRs, like the Nikon </span><a data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SBVDOZ"><span data-dcnode-id="2414" instrument_node="">D3500</span></a><span data-dcnode-id="2412" instrument_node=""> or the Canon </span><a data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2IqBsQo"><span data-dcnode-id="2411" instrument_node="">2000D</span></a><span data-dcnode-id="2409" instrument_node="">, come in a basic kit with an 18-55mm lens. These lenses have been designed to give acceptable results when shooting daytime pictures and using an aperture of f/8.</span></p><p data-dcnode-id="2400"><span data-dcnode-id="2407" instrument_node="">But, of course, they don't perform as well as professional zoom lenses (like the </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="2406" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="2404" instrument_node=""> and </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2ydi0"><span data-dcnode-id="2403" instrument_node="">Canon 16-35mm f/2.8L III</span></a><span data-dcnode-id="2401" instrument_node="">) when shooting at night and in low light conditions. In these light conditions, use a focal length of 18mm or less (if your lens is capable) and the widest aperture available, usually f/3.5.</span></p><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">Keep in mind that, due to the cropped sensor of these cameras and that you have to shoot with a focal length of 18mm (equivalent in 35mm format to 27mm for Nikon, and 28.8mm for Canon), your exposure time has to be pretty short to </span><a data-dcnode-id="2397" href="#step9"><span data-dcnode-id="2398" instrument_node="">prevent stars from trailing</span></a><span data-dcnode-id="2396" instrument_node=""> (more or less 17-18 seconds depending on the camera).</span></p><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Furthermore, as you are using an aperture of f/3.5 and ISO 800, the amount of light collected will also be very limited, getting an underexposed image. As a result, you'll end up with noise when post-processing the image.</span></p><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">To sum up, this is not the ideal equipment for shooting the Milky Way but, if it's all you have, make the most of it and work on your post-processing to reduce the noise level.</span></p><p data-dcnode-id="2383"><span data-dcnode-id="2390" instrument_node="">If you're looking for an affordable wide angle lens, I'd recommend the </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q54q8i"><span data-dcnode-id="2389" instrument_node="">Rokinon 14mm f/2.8 with AE chip</span></a><span data-dcnode-id="2387" instrument_node=""> and the </span><a data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q5hsTt"><span data-dcnode-id="2386" instrument_node="">Irix 15mm f/2.4 Firefly</span></a><span data-dcnode-id="2384" instrument_node="">.</span></p><p data-dcnode-id="2378"><span data-dcnode-id="2382" instrument_node="">With this basic equipment, one alternative is to shoot longer exposures (5 minutes or more depending on the Moon phase) using the nominal ISO of your camera (usually ISO 100 or 200) to avoid noise. You won't get stars as big bright spots, but you'll capture the </span><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="2381" instrument_node="">Star Trails</span></a><span data-dcnode-id="2379" instrument_node=""> of the Milky Way, which can make a pretty stunning picture.</span></p><p data-dcnode-id="2370"><span data-dcnode-id="2377" instrument_node="">Another way to create stunning Star Trails is by merging a series of short exposure photos into a single image using softwares like </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.markus-enzweiler.de/software/software.html"><span data-dcnode-id="2376" instrument_node="">StarStaX</span></a><span data-dcnode-id="2374" instrument_node=""> (Mac, Windows and Linux) or </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.startrails.de/html/software.html"><span data-dcnode-id="2373" instrument_node="">Startrails</span></a><span data-dcnode-id="2371" instrument_node=""> (Windows). Here, the relative motion of the stars creates structures similar to Star Trails. The advantage is that you prevent your sensor from overheating...</span></p><p data-dcnode-id="2365"><span data-dcnode-id="2369" instrument_node="">If you want to learn everything about Star Trails, </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="2368" instrument_node="">have a look at our super photography guide</span></a><span data-dcnode-id="2366" instrument_node="">.</span></p><h5 data-dcnode-id="2363" id="basic-travel-tripod"><span data-dcnode-id="2364" instrument_node="">Basic travel tripod</span></h5><p data-dcnode-id="2359"><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="2362" instrument_node="">Long exposures</span></a><span data-dcnode-id="2360" instrument_node=""> are the name of the game in night sky photography.</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Therefore, when choosing a tripod, weight matters. The last thing you want in your photos is blur caused by any vibration due to wind or running water. You need to keep your camera steady and still.</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2356" instrument_node="">Basic tripods usually don't weigh too much and are pretty unstable, so you'll probably have blur problems when shooting </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="2355" instrument_node="">long exposures</span></a><span data-dcnode-id="2353" instrument_node="">. Add to this the risk of damaging your photography equipment because of a fall.</span></p><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">To prevent vibrations and, thus, reduce blurring, you can load the tripod with extra weight by hanging a bag filled with stones or even your camera bag from it.</span></p><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">In addition to this, if your tripod has a center column, don't raise because it'll make it more unstable. If you raise it, you're also raising the mass center of the system formed by tripod, head, camera and lens, which results into a more unstable system. The lower the mass center the more stable the system will be...</span></p><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">It's all about physics.</span></p><h5 data-dcnode-id="2344" id="basic-headlamp"><span data-dcnode-id="2345" instrument_node="">Basic headlamp</span></h5><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Since you'll be in the dark, a headlamp is pretty much a necessity. But, it won't work properly if you intend to do some light painting.</span></p><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">If you've planned to have interesting foreground elements, a good flashlight is compulsory.</span></p><h5 data-dcnode-id="2338" id="remote-shutter-release-or-basic-intervalometer"><span data-dcnode-id="2339" instrument_node="">Remote shutter release or basic intervalometer</span></h5><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">A remote shutter release allows you to trigger your camera remotely without touching it. This is particularly nice to prevent vibration resulting into motion blur or streaks in your images.</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">The problem with remote releases is that they are not programmable, so you cannot shoot at regular intervals automatically. It's a much better idea to buy a cheap intervalometer. Nowadays you can even find cameras that include it.</span></p><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">An intervalometer is a programmable remote shutter that you can use to set the exposure time, the time interval between each shot, the total number of photos you want to take and even the time delay of the first picture.</span></p><p data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">If you're using the Bulb mode, you'll be able to shoot exposures of 30+ seconds. This is particularly useful when shooting timelapses and </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="2330" instrument_node="">Star Trails</span></a><span data-dcnode-id="2328" instrument_node="">.</span></p><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">These are all great intervalometers:</span></p><ul data-dcnode-id="2317"><li data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node="">Pro intervalometer: </span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smdv-usa.com/intervalometer.html"><span data-dcnode-id="2323" instrument_node="">SMDV</span></a><span data-dcnode-id="2321" instrument_node="">.</span></li><li data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">For cheap intervalometers check the brands Neewer, Phottix and Vello.</span></li></ul><h5 data-dcnode-id="2315" id="memory-cards"><span data-dcnode-id="2316" instrument_node="">Memory cards</span></h5><p data-dcnode-id="2310"><span data-dcnode-id="2314" instrument_node="">There are many different types of </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N06QDX"><span data-dcnode-id="2313" instrument_node="">SD Cards</span></a><span data-dcnode-id="2311" instrument_node=""> (Secure Digital) depending on capacity and data transfer speed.</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2309" instrument_node="">Buy a memory card with a high transfer rate from </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JFTXix8"><span data-dcnode-id="2308" instrument_node="">SanDisk</span></a><span data-dcnode-id="2306" instrument_node=""> or </span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2OsUqqQ"><span data-dcnode-id="2305" instrument_node="">ProGrade</span></a><span data-dcnode-id="2303" instrument_node=""> (my favorite brands), because it allows each picture to be saved into the memory card quicker.</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Nowadays, the price of SD cards has dropped so much and it's so cheap to purchase a fast card that you shouldn't purchase anything with less specifications.</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Finally, I recommend you to use several small capacity cards rather than a few large capacity ones. That way, if you lose a card or spoil it, fewer pictures will be lost. By using several small capacity cards you decrease the risk of losing your photos.</span></p><p data-dcnode-id="2293"><span data-dcnode-id="2297" instrument_node="">While there are still cameras that can work with </span><a data-dcnode-id="2295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3bLDZ"><span data-dcnode-id="2296" instrument_node="">CompactFlash</span></a><span data-dcnode-id="2294" instrument_node=""> (CF) cards, this system is slowly disappearing.</span></p><h4 data-dcnode-id="2291" id="minimum-equipment-for-admissible-image-quality-mid-range-gear"><span data-dcnode-id="2292" instrument_node="">Minimum equipment for admissible image quality (mid-range gear)</span></h4><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">If you want to take photos of the Milky Way with an acceptable quality, this is the equipment you need:</span></p><h5 data-dcnode-id="2287" id="id1"><span data-dcnode-id="2288" instrument_node="">Camera</span></h5><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Depending on your budget and goals, you may be interested in jumping into the Full Frame universe or staying with a camera with a cropped sensor.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">In both cases, there are cameras with great noise performance.</span></p><ul data-dcnode-id="2216"><li data-dcnode-id="2251"><span data-dcnode-id="2282" instrument_node="">Cameras with an APS-C sensor: Nikon </span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2WOxKUE"><span data-dcnode-id="2281" instrument_node="">Z50</span></a><span data-dcnode-id="2279" instrument_node="">, </span><a data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3GJLOUI"><span data-dcnode-id="2278" instrument_node="">Zfc</span></a><span data-dcnode-id="2276" instrument_node=""> and </span><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZAPfe"><span data-dcnode-id="2275" instrument_node="">D7500</span></a><span data-dcnode-id="2273" instrument_node="">; Canon </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3yDUZTX"><span data-dcnode-id="2272" instrument_node="">M6 Mark II</span></a><span data-dcnode-id="2270" instrument_node="">, </span><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3IPxtI3"><span data-dcnode-id="2269" instrument_node="">850D</span></a><span data-dcnode-id="2267" instrument_node=""> and </span><a data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3m3QTPO"><span data-dcnode-id="2266" instrument_node="">90D</span></a><span data-dcnode-id="2264" instrument_node=""> ; Fuji </span><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3yDWWzL"><span data-dcnode-id="2263" instrument_node="">X-S10</span></a><span data-dcnode-id="2261" instrument_node=""> and </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3dRIgTW"><span data-dcnode-id="2260" instrument_node="">X-T30 II</span></a><span data-dcnode-id="2258" instrument_node="">; Pentax </span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N21Y0Z"><span data-dcnode-id="2257" instrument_node="">KP</span></a><span data-dcnode-id="2255" instrument_node=""> and Sony </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2B9VBqL"><span data-dcnode-id="2254" instrument_node="">a6600</span></a><span data-dcnode-id="2252" instrument_node="">.</span></li><li data-dcnode-id="2240"><span data-dcnode-id="2250" instrument_node="">Cameras with a Micro 4/3 sensor: Olympus </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/30qYmkd"><span data-dcnode-id="2249" instrument_node="">OM-D E-M5 Mark III</span></a><span data-dcnode-id="2247" instrument_node=""> and </span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3s6jV5c"><span data-dcnode-id="2246" instrument_node="">OM-D E-M1 Mark III</span></a><span data-dcnode-id="2244" instrument_node="">; Panasonic </span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2VqO3WO"><span data-dcnode-id="2243" instrument_node="">GX9</span></a><span data-dcnode-id="2241" instrument_node="">.</span></li><li data-dcnode-id="2217"><span data-dcnode-id="2239" instrument_node="">Full Frame cameras: Nikon </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/323IYuI"><span data-dcnode-id="2238" instrument_node="">Z5</span></a><span data-dcnode-id="2236" instrument_node=""> and </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2ZoaQ"><span data-dcnode-id="2235" instrument_node="">D750</span></a><span data-dcnode-id="2233" instrument_node="">; Canon </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3DOOq1L"><span data-dcnode-id="2232" instrument_node="">RP</span></a><span data-dcnode-id="2230" instrument_node="">; Sony </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SRkcG2"><span data-dcnode-id="2229" instrument_node="">a7C</span></a><span data-dcnode-id="2227" instrument_node="">, </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3BgVz"><span data-dcnode-id="2226" instrument_node="">a7 II</span></a><span data-dcnode-id="2224" instrument_node="">, </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N37q3u"><span data-dcnode-id="2223" instrument_node="">a7S II</span></a><span data-dcnode-id="2221" instrument_node=""> and </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N1AjgK"><span data-dcnode-id="2220" instrument_node="">a7R II</span></a><span data-dcnode-id="2218" instrument_node="">.</span></li></ul><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">If you already have a Full Frame camera or you want to make the leap, congratulations!</span></p><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Two of the main advantages of using a camera with a Full Frame sensor is that</span></p><ul data-dcnode-id="2207"><li data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">it produces less noise in the image, and</span></li><li data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">it has a greater dynamic range than an APS-C with the same megapixels, allowing you to work with higher ISOs, collect more light and, thus, take better Milky Way pictures.</span></li></ul><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">All these cameras will allow you to use ISO 1600, 3200 or even 6400 with acceptable noise performance while getting images properly exposed.</span></p><h5 data-dcnode-id="2203" id="wide-angle-lens"><span data-dcnode-id="2204" instrument_node="">Wide angle lens</span></h5><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">As we're talking about Milky Way photography, I'm going to focus on wide angle and ultra wide angle lenses, because they allow you to capture the largest amount of stars.</span></p><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">For Micro 4/3 cameras all the following lenses are great for night photography:</span></p><ul data-dcnode-id="2189"><li data-dcnode-id="2196"><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2XTXld4"><span data-dcnode-id="2198" instrument_node="">Olympus M.Zuiko Digital ED 7-14 mm f/2.8</span></a></li><li data-dcnode-id="2193"><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3dRYV9O"><span data-dcnode-id="2195" instrument_node="">Olympus M.Zuiko Digital ED 12-40mm f/2.8 PRO</span></a></li><li data-dcnode-id="2190"><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3IRvZwU"><span data-dcnode-id="2192" instrument_node="">Olympus M.Zuiko Digital ED 12mm f/2.0</span></a></li></ul><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">One of the brands with best price/value balance is Rokinon (also known as Samyang, Pro-Optic, Bower, Falcon, Wallimex, etc.). They have models available for both Full Frame and APS-C sensors. Another brand that also provide great lenses for night sky photography is Tokina.</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">For APS-C cameras, I'd like to highlight the following lenses:</span></p><ul data-dcnode-id="2160"><li data-dcnode-id="2179"><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3EUd9TG"><span data-dcnode-id="2184" instrument_node="">Rokinon 12mm f/2</span></a><span data-dcnode-id="2182" instrument_node=""> or </span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3oPZqrf"><span data-dcnode-id="2181" instrument_node="">Samyang 12mm f/2</span></a></li><li data-dcnode-id="2173"><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2jBzf"><span data-dcnode-id="2178" instrument_node="">Rokinon 16mm f/2.0</span></a><span data-dcnode-id="2176" instrument_node=""> or </span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2Wi8p"><span data-dcnode-id="2175" instrument_node="">Samyang 16mm f/2.0</span></a></li><li data-dcnode-id="2170"><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q1I33K"><span data-dcnode-id="2172" instrument_node="">Tokina 11-16mm f/2.8</span></a></li><li data-dcnode-id="2167"><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q29N8x"><span data-dcnode-id="2169" instrument_node="">Sigma 10-20mm f/3.5</span></a></li><li data-dcnode-id="2164"><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2ZUXV"><span data-dcnode-id="2166" instrument_node="">Sigma 18-35mm f/1.8 Art</span></a></li><li data-dcnode-id="2161"><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2WLHH"><span data-dcnode-id="2163" instrument_node="">Sigma 17-70mm f/2.8 Macro</span></a></li></ul><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">For Full Frame cameras, these prime lenses are great:</span></p><ul data-dcnode-id="2145"><li data-dcnode-id="2152"><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q6kVkz"><span data-dcnode-id="2157" instrument_node="">Rokinon 14mm f/2.8</span></a><span data-dcnode-id="2155" instrument_node=""> or </span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q45auH"><span data-dcnode-id="2154" instrument_node="">Samyang 14mm f/2.8</span></a></li><li data-dcnode-id="2146"><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2QclDgt"><span data-dcnode-id="2151" instrument_node="">Rokinon 24mm f/1.4</span></a><span data-dcnode-id="2149" instrument_node=""> or </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q0dv2r"><span data-dcnode-id="2148" instrument_node="">Samyang 24mm f/1.4</span></a></li></ul><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Keep in mind that these lenses also work on APS-C cameras, but you need to take into account the crop factor. For example, on a camera with a crop factor of 1.5x, the Rokinon 14mm would be equivalent to 21mm on a Full Frame camera.</span></p><p data-dcnode-id="2138"><span data-dcnode-id="2142" instrument_node="">Besides highlighting the competitive price of these lenses, it's also noteworthy that, especially in the case of the Rokinon/Samyang lenses, they almost don't have </span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coma_%28optics%29"><span data-dcnode-id="2141" instrument_node="">coma</span></a><span data-dcnode-id="2139" instrument_node=""> at their maximum aperture, a fact that you need to consider in night photography.</span></p><p data-dcnode-id="2136" style="text-align: center; font-style: italic;"><span data-dcnode-id="2137" instrument_node="">"Toni, what's this coma thing about?"</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Coma is an optical aberration that distorts the stars in the corners of the lens. Stars appear in the image as trails instead of appearing as dots.</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">A more complex explanation would be that the visible phenomenon is a point image on the picture trailing toward the exterior or the center of the image, like a comet, which is where the name comes from. Coma spreading radially from the optical axis forms a teardrop-shaped flare, usually called a meridional coma flare. A sagittal coma flare occurs concentrically, often for flying birds, forming a diamond-shaped flare.</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Coma can be reduced by stopping down the lens.</span></p><figure data-dcnode-id="2122"><img class="b-lazy" data-dcnode-id="2129" data-src="/sites/default/files/articles/milky-way/malin-coma-1.webp" height="447px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2123"><span data-dcnode-id="2128" instrument_node="">Meridional coma flare.</span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">Photo by </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="2125" instrument_node="">Christoph Malin</span></a></figcaption></figure><figure data-dcnode-id="2114"><img class="b-lazy" data-dcnode-id="2121" data-src="/sites/default/files/articles/milky-way/malin-coma-2.webp" height="622px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2115"><span data-dcnode-id="2120" instrument_node="">Sagittal coma flare, the famous "fishes" that 24mm f/1.4 lenses like Canon's and Nikon's show (except the Nikon 14-24mm f/2.8).</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">Photo by </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="2117" instrument_node="">Christoph Malin</span></a></figcaption></figure><p data-dcnode-id="2109"><span data-dcnode-id="2113" instrument_node="">With the combination of any camera body and lens listed above, you'll be able to take great pictures of the Milky Way. You might have noise problems when shooting </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/long-exposure-photography-guide"><span data-dcnode-id="2112" instrument_node="">long exposures</span></a><span data-dcnode-id="2110" instrument_node=""> at ISOs over 3200, but you can minimize them by using the Long Exposure Noise Reduction mode of your camera.</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">One word on durability...</span></p><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">You need to be very careful when working under extreme rain, high humidity, low temperatures or with sand or dust in the air. The sealing of the camera is not as good as the one of professional cameras. You should protect your gear as much as possible.</span></p><h5 data-dcnode-id="2103" id="lighting-equipment"><span data-dcnode-id="2104" instrument_node="">Lighting equipment</span></h5><p data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node="">A good LED headlamp is recommended when you get seriously into night photography. Its light is very powerful, allowing you to see in the dark and to focus at the </span><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/depth-of-field-guide%23step4"><span data-dcnode-id="2101" instrument_node="">hyperfocal distance</span></a><span data-dcnode-id="2099" instrument_node="">.</span></p><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">When using your headlamp, make sure you're not annoying the photographers around you. This is key!</span></p><p data-dcnode-id="2085"><span data-dcnode-id="2095" instrument_node="">Headlamps with Red Night Vision Light are best – they allow to avoid white flash lights that ruin your night vision. I like the </span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Petzl-TIKKA-Headlamp-Lumens-Orange/dp/B00UAJ1FBE/ref%3Dsr_1_1%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="2094" instrument_node="">Petzl Tikka XP</span></a><span data-dcnode-id="2092" instrument_node="">, the </span><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2yGzd"><span data-dcnode-id="2091" instrument_node="">Pelican 2750</span></a><span data-dcnode-id="2089" instrument_node=""> and the </span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZDHbK"><span data-dcnode-id="2088" instrument_node="">Pelican 2760</span></a><span data-dcnode-id="2086" instrument_node="">.</span></p><p data-dcnode-id="2074"><span data-dcnode-id="2084" instrument_node="">Other powerful LED headlamps are the </span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/LED-Lenser-SEO5-Headlamp-Gray/dp/B00BXMSF10/ref%3Dsr_1_1%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="2083" instrument_node="">Led Lenser SEO5</span></a><span data-dcnode-id="2081" instrument_node="">, </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/LED-Lenser-880044-Headlamp-Black/dp/B0053GV2T4/ref%3Dsr_1_2%3Fs%3Dhi%26ie%3DUTF8%26qid%3D1418312125%26sr%3D1-2%26keywords%3DLed%2BLenser%2BH14R%26tag%3Dphoto0b0a-20"><span data-dcnode-id="2080" instrument_node="">H14R</span></a><span data-dcnode-id="2078" instrument_node=""> or </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZFRbm"><span data-dcnode-id="2077" instrument_node="">H7R.2</span></a><span data-dcnode-id="2075" instrument_node="">.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">If you're shooting in a day with a thin Moon or New Moon, you'll need to artificially illuminate the foreground (the ground, a tree, a rock, etc.). To do so, you would ideally complement the headlamp with a LED flashlight, LED panels or flashes.</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2071" instrument_node="">You can use a LED flashlight such as the </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0EQzW"><span data-dcnode-id="2070" instrument_node="">Coast TX-10</span></a><span data-dcnode-id="2068" instrument_node="">, the </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0053H4VH8/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D211189%26creative%3D373489%26creativeASIN%3DB0053H4VH8%26link_code%3Das3%26tag%3Dphoto0b0a-20%26linkId%3D2J3EWWSBHRAPKC23"><span data-dcnode-id="2067" instrument_node="">Led Lenser L7</span></a><span data-dcnode-id="2065" instrument_node=""> or the </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2czJn"><span data-dcnode-id="2064" instrument_node="">Maglite Mini</span></a><span data-dcnode-id="2062" instrument_node=""> to add volume and texture to certain elements that you want to appear in the photo. Its advantage is that it allows you to work with more accuracy. Similar to a brush, you can paint with light the exact areas that interest you.</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Unfortunately, it covers a small area.</span></p><p data-dcnode-id="2054"><span data-dcnode-id="2058" instrument_node="">To cover a larger area you can use either </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JjcKRp"><span data-dcnode-id="2057" instrument_node="">LED panels</span></a><span data-dcnode-id="2055" instrument_node=""> or a flash. LED panels have the advantage of continuous light, so it will be easier to control light. The good thing is that you can find them at a very reasonable price.</span></p><figure data-dcnode-id="2047"><img class="b-lazy" data-dcnode-id="2053" data-src="/sites/default/files/articles/milky-way/leds.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">Usually LEDs can be purchased along with </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JnMs0q"><span data-dcnode-id="2051" instrument_node="">color correction gels</span></a><span data-dcnode-id="2049" instrument_node="">.</span></figcaption></figure><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">The advantage of flashes is their power. They allow you, for example, to take a portrait of a model while capturing the Milky Way with a single exposure.</span></p><figure data-dcnode-id="2043"><img class="b-lazy" data-dcnode-id="2044" data-src="/sites/default/files/articles/milky-way/mw-joan.webp" height="535px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"></figure><p data-dcnode-id="2035"><span data-dcnode-id="2042" instrument_node="">Both LEDs and Flashes will give you a daylight </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index
