</span><h2 data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Milky Way Photography: The Definitive Guide (2022)</span></h2><span data-dcnode-id="3777" instrument_node="">
</span><p class="author" data-dcnode-id="3773"><span data-dcnode-id="3776" instrument_node="">By </span><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/author/antoni"><span data-dcnode-id="3775" instrument_node="">Antoni Cladera</span></a></p><span data-dcnode-id="3772" instrument_node="">
</span></header><span data-dcnode-id="3770" instrument_node="">
</span><div class="wrapper relative" data-dcnode-id="3747"><span data-dcnode-id="3769" instrument_node="">
</span><p class="tags" data-dcnode-id="3766"><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/tags/milky-way"><span data-dcnode-id="3768" instrument_node="">milky way</span></a></p><span data-dcnode-id="3765" instrument_node="">
</span><div class="share-top" data-dcnode-id="3749"><span data-dcnode-id="3764" instrument_node="">
</span><div class="share-buttons" data-count="0" data-dcnode-id="3751" data-id="2053" data-wa-count="0"><a class="share fb" data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer.php%3Fu%3D/articles/milky-way-photography-guide%26t%3DMilky%2520Way%2520Photography%253A%2520The%2520Definitive%2520Guide%2520%25282022%2529%2520%257C%2520PhotoPills" target="_blank" title="Share on Facebook"><span class="icon share-fb" data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Facebook</span></span></a><a class="share tw" data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/share%3Ftext%3DMilky%2520Way%2520Photography%253A%2520The%2520Definitive%2520Guide%2520%25282022%2529%2520%257C%2520PhotoPills%26url%3D/articles/milky-way-photography-guide%26via%3Dphotopills" target="_blank" title="Share on Twitter"><span class="icon share-tw" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Twitter</span></span></a><a class="share pt" data-dcnode-id="3755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3D/articles/milky-way-photography-guide%26description%3DMilky%2520Way%2520Photography%253A%2520The%2520Definitive%2520Guide%2520%25282022%2529%2520%257C%2520PhotoPills" target="_blank" title="Share on Pinterest"><span class="icon share-pt" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Pinterest</span></span></a><a class="share email" data-dcnode-id="3752" href="mailto:?subject=Milky%20Way%20Photography%3A%20The%20Definitive%20Guide%20%282022%29%20%7C%20PhotoPills&amp;body=Milky%20Way%20Photography%3A%20The%20Definitive%20Guide%20%282022%29%20%7C%20PhotoPills%0A/articles/milky-way-photography-guide%0A%0ADiscover%20PhotoPills%20%28https%3A//www.photopills.com%29%2C%20the%20remedy%20to%20your%20photographic%20problems." title="Tell a friend"><span class="icon share-em" data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Tell a friend</span></span></a></div><span data-dcnode-id="3750" instrument_node=""> </span></div><span data-dcnode-id="3748" instrument_node="">
</span></div><span data-dcnode-id="3746" instrument_node="">
</span><img class="cover-photo" data-dcnode-id="3745" height="471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/sites/default/files/tutorials/2019/milky-way-guide_0.jpg&amp;raw" width="738"><span data-dcnode-id="3744" instrument_node="">
</span><div class="wrapper" data-dcnode-id="259"><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">What if I told you that you're more than capable of imagining, planning and shooting Milky Way pictures that will put people into what I call a sharing trance? Would you believe it?</span></p><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Nowadays, almost everyone can take photos of the night Sky, even very good ones. Night sky photography in general, and MIlky Way photography in particular, have become very popular.</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">You see it every day, social networks are filled up with multiple great Milky Way photos, published by great photographers hoping that their work will be massively shared.</span></p><p data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Unfortunately, the truth is that just a few achieve to go viral. Why? One possible answer is: inner remarkability.</span></p><p data-dcnode-id="3727"><span data-dcnode-id="3734" instrument_node="">Social transmission expert, </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jonahberger.com/"><span data-dcnode-id="3733" instrument_node="">Jonah Berger</span></a><span data-dcnode-id="3731" instrument_node="">, in his New York Times Bestseller book </span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/1451686579/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D211189%26creative%3D373489%26creativeASIN%3D1451686579%26link_code%3Das3%26tag%3Dphoto0b0a-20%26linkId%3DB4HN44DXZSBYEXKB"><span data-dcnode-id="3730" instrument_node="">'Contagious: why things catch on'</span></a><span data-dcnode-id="3728" instrument_node="">, maintains that:</span></p><blockquote data-dcnode-id="3723"><div data-dcnode-id="3724"><p data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">"Remarkable things provide social currency because they make the people who talk about them seem, well, more remarkable [...] Sharing extraordinary, novel, or entertaining stories or ads makes people seem more extraordinary, novel, and entertaining [...] Not surprisingly then, remarkable things get brought up more often."</span></p></div></blockquote><p data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Therefore, how can you make photos so that people will share and talk about? The same inner remarkability principle applies. Taking great photos is not enough, they need to be truly remarkable.</span></p><p data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">The idea behind this article is to help you tell better stories through your Milky Way photography, so your message reaches more people.</span></p><p data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">In the age when Whatsapp, social networks and television are fighting for our attention - and when more photographs than you can possibly view in your whole life are published every day - you must learn how to make truly remarkable photos that your friends and followers can't avoid sharing and talking about... They will spread your story, your message ;)</span></p><p data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">So...</span></p><p data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">In this guide, I'll cover everything you need to turn your Milky Way photo ideas into truly legendary images...</span></p><p data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Everything!</span></p><p data-dcnode-id="3706"><span data-dcnode-id="3710" instrument_node="">Lots of Milky Way pictures to inspire you, a complete Milky Way viewing calendar for 2022 (with the best months of the year you can photograph the Milky Way) and how to use the </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="3709" instrument_node="">PhotoPills</span></a><span data-dcnode-id="3707" instrument_node=""> app to plan any Milky Way photo you imagine...</span></p><p data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">In other words, to find the right shooting spot and right date and time the Milky Way scene you imagine actually happens. So you can go and capture it!</span></p><p data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">But also all the equipment you need and how to use it to photograph the Milky Way step by step.</span></p><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">And of course, this includes the most used Milky Way camera settings!</span></p><p data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">All of this will become clear as you read through this guide.</span></p><p data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">Are you ready?</span></p><p data-dcnode-id="3692" style="text-align: center; font-style: italic;"><span data-dcnode-id="3695" instrument_node="">"You cannot teach a man anything; you can only help him find it within himself." - </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei"><span data-dcnode-id="3694" instrument_node="">Galileo Galilei</span></a></p><span data-dcnode-id="3691" instrument_node="">

</span><h3 data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Content</span></h3><ol data-dcnode-id="3593"><li data-dcnode-id="3627"><a data-dcnode-id="3628" href="#step1"><span data-dcnode-id="3629" instrument_node="">Mark Gee proves everyone can take contagious images</span></a></li><li data-dcnode-id="3624"><a data-dcnode-id="3625" href="#step2"><span data-dcnode-id="3626" instrument_node="">Believe in the impossible, brainstorm for remarkability</span></a></li><li data-dcnode-id="3621"><a data-dcnode-id="3622" href="#step3"><span data-dcnode-id="3623" instrument_node="">Add enigma to your composition, include the Milky Way</span></a></li><li data-dcnode-id="3618"><a data-dcnode-id="3619" href="#step4"><span data-dcnode-id="3620" instrument_node="">Milky Way viewing calendar 2022</span></a></li><li data-dcnode-id="3615"><a data-dcnode-id="3616" href="#step5"><span data-dcnode-id="3617" instrument_node="">Where to photograph the Milky Way (how to find a powerful Milky Way location)</span></a></li><li data-dcnode-id="3612"><a data-dcnode-id="3613" href="#step6"><span data-dcnode-id="3614" instrument_node="">The 3 crucial tips you should know before you start planning the Milky Way</span></a></li><li data-dcnode-id="3609"><a data-dcnode-id="3610" href="#step7"><span data-dcnode-id="3611" instrument_node="">How to plan your Milky Way ideas step by step</span></a></li><li data-dcnode-id="3606"><a data-dcnode-id="3607" href="#step8"><span data-dcnode-id="3608" instrument_node="">All the gear you need to successfully photograph the Milky Way</span></a></li><li data-dcnode-id="3603"><a data-dcnode-id="3604" href="#step9"><span data-dcnode-id="3605" instrument_node="">How to photograph the Milky Way step by step</span></a></li><li data-dcnode-id="3600"><a data-dcnode-id="3601" href="#step10"><span data-dcnode-id="3602" instrument_node="">How to post-process the Milky Way RAWs (with these 5 great free tutorials)</span></a></li><li data-dcnode-id="3597"><a data-dcnode-id="3598" href="#step11"><span data-dcnode-id="3599" instrument_node="">10 inspiring Milky Way pictures</span></a></li><li data-dcnode-id="3594"><a data-dcnode-id="3595" href="#step12"><span data-dcnode-id="3596" instrument_node="">Don't give up!</span></a></li></ol><h3 data-dcnode-id="3589" id="step1"><span class="step" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">1.</span></span><span data-dcnode-id="3590" instrument_node="">Mark Gee proves everyone can take contagious images</span></h3><p data-dcnode-id="3584"><span data-dcnode-id="3588" instrument_node="">Do you know </span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theartofnight.com/"><span data-dcnode-id="3587" instrument_node="">Mark Gee</span></a><span data-dcnode-id="3585" instrument_node="">? Maybe not. He's an extraordinary photographer based in Wellington, New Zealand.</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">Let me share his extraordinary story with you.</span></p><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Mark Gee's imagination and persistence has no limit. You may not believe it, but this is the simple cause of his successful career in both film and photography industry.</span></p><p data-dcnode-id="3569"><span data-dcnode-id="3579" instrument_node="">Having worked on </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theartofnight.com/filmography/"><span data-dcnode-id="3578" instrument_node="">movies</span></a><span data-dcnode-id="3576" instrument_node=""> like 'The Hobbit', 'The Lord of the Rings' or 'Avatar', the highlight of his photography career happened only a few years ago. He not only won two categories in the prestigious competition </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rmg.co.uk/whats-on/exhibitions/astronomy-photographer-of-the-year/2013-winners"><span data-dcnode-id="3575" instrument_node="">Astronomy Photographer of the year 2013</span></a><span data-dcnode-id="3573" instrument_node="">, but he also won it overall with his unique image </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theartofnight.com/2013/09/my-astrophotography-journey-from-novice-to-astronomy-photographer-of-the-year-2013/"><span data-dcnode-id="3572" instrument_node="">'Guiding Light To The Stars'</span></a><span data-dcnode-id="3570" instrument_node="">.</span></p><figure data-dcnode-id="3563"><img class="b-lazy" data-dcnode-id="3568" data-src="/sites/default/files/articles/milky-way/guiding-light-to-the-stars.webp" height="357px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3564"><span data-dcnode-id="3567" instrument_node="">Winning image of the Astronomy Photographer of the Year 2013: 'Guiding Light To The Stars'.</span><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">Canon 5D Mark III | 24mm | f/2.8 | 30s | ISO 3200 | 10-photo panorama</span></figcaption></figure><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">'Guiding Light To The Stars' is a fantasy story.</span></p><p data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Every time I look at this contagious image, I can't avoid immersing myself in an imaginary world...</span></p><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">What if the stars owe all their beauty to a little lighthouse lost somewhere in New Zealand?</span></p><p data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Am I crazy? Maybe a little... Don't blame me for that!</span></p><p data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">From the composition side, it's a stunning panorama of the Milky Way arching over New Zealand's North Island coast. Look how the Milky Way seems to spring up from the lighthouse, connecting the stars and the landscape. In the middle of the image you see the Galactic Center, by far the brightest part of our galaxy.</span></p><p data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">But the idea that got his work out there and noticed was his viral video 'Full Moon Silhouettes'. Mark explains here what happened:</span></p><blockquote data-dcnode-id="3543"><div data-dcnode-id="3544"><p data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">"I wanted to video the Moon rising and revealing silhouettes up on a lookout in Wellington, New Zealand. This idea proved a lot harder than I had anticipated, and there were a lot of failed and frustrating attempts. But finally after a year of trying, I managed to pull off something that exceeded my expectations.</span></p><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">I stayed up until 03:00 am the next morning finding suitable music for my newly captured clip which I put together and uploaded it to Vimeo. I called it 'Full Moon Silhouettes' (even though technically it was captured a day after the Full Moon) and when I awoke later that day, my email was full of hundreds of emails from people all over the world writing to me and thanking me for making the video.</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">It had touched the hearts of people in ways I could have never imagined, and here they were sharing those moments with me. This was certainly a very humbling experience for me, and one I will never forget."</span></p></div></blockquote><div class="video-wrapper" data-dcnode-id="3541"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="3542" data-src="https://player.vimeo.com/video/58385453?badge=0" frameborder="0" fullscreen="" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"></iframe></div><p data-dcnode-id="3536"><span data-dcnode-id="3540" instrument_node="">For a detailed explanation on how Mark imagined, planned and shot the 'Full Moon Silhouettes' video, have a look at the article </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theartofnight.com/2013/11/to-the-moon-and-back/"><span data-dcnode-id="3539" instrument_node="">'To the Moon and Back'</span></a><span data-dcnode-id="3537" instrument_node="">.</span></p><p data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">Now, if I told you that Mark started his photography career in 2009, would you believe it? I bet you wouldn't!</span></p><p data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">Well, it's true... With a 4-year photography career only, Mark Gee proved that you don't need to be a Master with ages of experience to shoot contagious images. The truth is you only need to have a remarkable story to tell and tons of motivation.</span></p><p data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">So, believe in yourself. You can do it too!</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3529" instrument_node="">Oh! By the way... If you wish to learn how to shoot the Milky Way face to face with PhotoPills Masters like Mark Gee, the PhotoPills team and a selected group of PhotoPillers like you, you should definitely attend the </span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/camp"><span data-dcnode-id="3528" instrument_node="">PhotoPills Camp</span></a><span data-dcnode-id="3526" instrument_node="">! ;)</span></p><p data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">During the Camp you'll learn how to use PhotoPills, an app that has become key in night photography.</span></p><figure data-dcnode-id="3520"><a class="fancybox" data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/camp"><img class="b-lazy" data-dcnode-id="3522" data-src="/sites/default/files/articles/milky-way/group-photo-camp-2018.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"></a></figure><h3 data-dcnode-id="3516" id="step2"><span class="step" data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">2.</span></span><span data-dcnode-id="3517" instrument_node="">Believe in the impossible, brainstorm for remarkability</span></h3><figure class="portrait" data-dcnode-id="3514"><img class="b-lazy" data-dcnode-id="3515" data-src="/sites/default/files/articles/milky-way/imagine-plan-shoot.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="319px"></figure><p data-dcnode-id="3510" style="text-align: center; font-style: italic;"><span data-dcnode-id="3513" instrument_node="">"Image quality is not the product of a machine, but of the person who directs the machine, and there are no limits to imagination and expression." - </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ansel_Adams"><span data-dcnode-id="3512" instrument_node="">Ansel Adams</span></a></p><p data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Think big!</span></p><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">As it turns out, if you want your photos to become viral, you need people to freak out with them, to fall in love with them. The good news is you have all you need: your creative side.</span></p><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Yes, of course you need to master all the photography technique involved but, as Mark Gee proved, creativity makes the difference.</span></p><p data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">Where should you start?</span></p><p data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Don't let the critic that dwells in you, your analytic mind, take over and get in control... Think big, focus and let your imagination fly.</span></p><p data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Immerse yourself in the creative process, look for a special location and do your research. Find the story hidden within, the emotion that evokes. Your goal is to come up with a unique story to tell, a deep emotion to convey, a remarkable message you'll try to get across combining a powerful technique, composition and location.</span></p><h3 data-dcnode-id="3494" id="step3"><span class="step" data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">3.</span></span><span data-dcnode-id="3495" instrument_node="">Add enigma to your composition, include the Milky Way</span></h3><p data-dcnode-id="3486"><span data-dcnode-id="3493" instrument_node="">The </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/how-find-sunrises-and-sunsets"><span data-dcnode-id="3492" instrument_node="">Sun</span></a><span data-dcnode-id="3490" instrument_node=""> and the </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/moon-photography-guide"><span data-dcnode-id="3489" instrument_node="">Moon</span></a><span data-dcnode-id="3487" instrument_node=""> are powerful photographic elements you can use in your image to help you get the message across while adding interest and mystery...</span></p><p data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">But the Milky Way multiplies the possibilities. Take advantage of it!</span></p><p data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">The Milky Way moves in the sky following the Earth's rotation as the stars move.</span></p><p data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">In other words, you'll have different compositions at different times of the night. You can get the complete Milky Way arching over the landscape, which is great to capture a panorama. Or you can get part of the Milky Way in vertical, diagonal and horizontal orientation.</span></p><p data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Sure, you'll come up with multiple ideas of different compositions. Usually, you know the exact position you want the Galactic Center to be in your image, but you don't know whether the scene is possible or when it occurs. There is no secret: the key to photographing stars is planning.</span></p><p data-dcnode-id="3473"><span data-dcnode-id="3477" instrument_node="">Thanks to technology, the old times when you had to work out all the calculations by hand or use the trial and error approach are over. Nowadays, you have incredibly powerful tools like the </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="3476" instrument_node="">PhotoPills</span></a><span data-dcnode-id="3474" instrument_node=""> app at your fingertips that will do all the planning for you.</span></p><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">Here are 2 complete tutorials to help you easily plan any photo of the Milky Way you imagine:</span></p><ul data-dcnode-id="3464"><li data-dcnode-id="3468"><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/tutorials/how-plan-milky-way-using-2d-map-centric-planner"><span data-dcnode-id="3470" instrument_node="">How To Plan The Milky Way Using The PhotoPills 2D Milky Way Planner</span></a></li><li data-dcnode-id="3465"><a data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/tutorials/how-plan-milky-way-using-augmented-reality"><span data-dcnode-id="3467" instrument_node="">How To Plan The Milky Way Using The Night Augmented Reality view</span></a></li></ul><p data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">No excuses now!</span></p><p data-dcnode-id="3451"><span data-dcnode-id="3461" instrument_node="">You can also check </span><a data-dcnode-id="3459" href="#step6"><span data-dcnode-id="3460" instrument_node="">section 6</span></a><span data-dcnode-id="3458" instrument_node=""> to learn how to plan the Milky Way with PhotoPills. There you'll find a detailed explanation with a real example, where I use the Planner along with the </span><a data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23milky-layers"><span data-dcnode-id="3457" instrument_node="">Milky Way layer</span></a><span data-dcnode-id="3455" instrument_node=""> and the </span><a data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23planner-night-ar"><span data-dcnode-id="3454" instrument_node="">Night Augmented Reality view</span></a><span data-dcnode-id="3452" instrument_node="">.</span></p><div class="two-figures screenshot" data-dcnode-id="3440"><div data-dcnode-id="3446"><figure data-dcnode-id="3447"><img class="b-lazy" data-dcnode-id="3450" data-src="/sites/default/files/articles/milky-way/3-mw-1-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">PhotoPills Planner – The white azimuth line shows the direction of the Galactic Center on August 30h, 2019 at 11:46 pm. The Milky Way is vertical and aligned with the natural bridge of Es Pont d'En Gil.</span></figcaption></figure></div><div data-dcnode-id="3441"><figure data-dcnode-id="3442"><img class="b-lazy" data-dcnode-id="3445" data-src="/sites/default/files/articles/milky-way/3-mw-2-en.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="246px"><figcaption data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Night Augmented Reality view – The big red dot shows the position of the Galactic Center. The Milky Way is completely vertical and aligned with the natural bridge.</span></figcaption></figure></div></div><h3 data-dcnode-id="3436" id="step4"><span class="step" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">4.</span></span><span data-dcnode-id="3437" instrument_node="">Milky Way viewing calendar 2022</span></h3><p data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">When should you start looking for the Core of the Milky Way? When will it be visible? Or even better, when is the best time of the year to shoot the Milky Way?</span></p><p data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Actually the Milky Way is visible everyday at night. That is if you're not in a heavily light polluted area, of course...</span></p><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">However, its Core, the brightest part of the Milky Way, the most spectacular area... Summing up, the portion of the Milky Way you want to have in your photos, is not always visible :(</span></p><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">So we say that there is a hunting season for the Milky Way!</span></p><p data-dcnode-id="3423"><span data-dcnode-id="3427" instrument_node="">During part of the year, the Core of the Milky Way is not visible because it's blocked by the </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/how-find-sunrises-and-sunsets"><span data-dcnode-id="3426" instrument_node="">Sun</span></a><span data-dcnode-id="3424" instrument_node="">.</span></p><p data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Why is that?</span></p><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Because the Galactic Genter is only above the horizon during daylight hours.</span></p><p data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">When planning to shoot the Milky Way, you should</span></p><ul data-dcnode-id="3409"><li data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Find out the period of the year in which the Galactic Center is visible during nighttime, and then</span></li><li data-dcnode-id="3410"><span data-dcnode-id="3414" instrument_node="">Check the </span><a data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide-2%23moon-calendar"><span data-dcnode-id="3413" instrument_node="">PhotoPills Moon calendar</span></a><span data-dcnode-id="3411" instrument_node=""> (and Moonrise and Moonset times) to choose the date where there is no Moon at night. Or, if you want the Moon to help you light the foreground, choose the date of the Moon phase that suits your needs.</span></li></ul><p data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">To narrow the search and get faster results, you need to know the starting and ending dates of the best period of the year to shoot the Milky Way.</span></p><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">So, when is this?</span></p><p data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Check the following Milky Way calendar :)</span></p><h4 data-dcnode-id="3401" id="northern-hemisphere-milky-way-viewing-calendar"><span data-dcnode-id="3402" instrument_node="">Northern Hemisphere Milky Way viewing calendar</span></h4><p data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">In the Northern Hemisphere, the Core begins to be visible at the end of January, although for a very short time. Depending on where you are, you'll have to wait until February or even March.</span></p><p data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">The Core is not visible in November, December and early January.</span></p><figure data-dcnode-id="3393"><img class="b-lazy" data-dcnode-id="3396" data-src="/sites/default/files/articles/milky-way/picture-mw-north.webp" height="555px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">The Galactic Center is visible from March to October and not visible from November to February.</span></figcaption></figure><p data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">At the beginning of the Milky Way season, the Core becomes visible in the pre-dawn hours just before Sunrise, and remains above the horizon during daylight hours. As months go by, the Core becomes visible for a longer and longer period of time each night, being June and July the months with longer visibility. During this time of year, the Core is be visible all night.</span></p><p data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">From July on, the Core visibility begins to decrease and the best viewing time moves towards after dusk, until it becomes totally invisible again in winter (November).</span></p><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">Now, pay attention. This is important!</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3386" instrument_node="">Like the Sagittarius constellation, </span><strong data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">the Galactic Center can only be visible from latitudes between +55º and -90º</span></strong><span data-dcnode-id="3383" instrument_node="">.</span></p><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">If you live in latitudes above +55º, you won't be able to see the Galactic Center.</span></p><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">You'll be able to see only part of the Core of the Milky Way. The best time to see it is before and after summer. Notice that during the summer the astronomical twilight never ends, so you won't have a completely dark sky.</span></p><h4 data-dcnode-id="3376" id="southern-hemisphere-milky-way-viewing-calendar"><span data-dcnode-id="3377" instrument_node="">Southern Hemisphere Milky Way viewing calendar</span></h4><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">In the Southern Hemisphere, the Core is also visible from the end of January to October.</span></p><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">But here you can enjoy better conditions than in the Northern Hemisphere. Most of the Milky Way season falls in winter, when the cold temperatures will help you get crispy stars.</span></p><p data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Again, the Core is not visible from November to January.</span></p><figure data-dcnode-id="3366"><img class="b-lazy" data-dcnode-id="3369" data-src="/sites/default/files/articles/milky-way/picture-mw-south.webp" height="555px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">The Galactic Center is visible from February to October and not visible from November to January.</span></figcaption></figure><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">If you live in the Southern Hemisphere, you can enjoy a longer visibility because the peak occurs in winter, when days are shorter and nights are longer.</span></p><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">All these visibility facts for the Northern and Southern Hemisphere are just qualitative, not exact figures.</span></p><p data-dcnode-id="3354"><span data-dcnode-id="3361" instrument_node="">If you want to know how the Galactic Center visibility time and direction change throughout the year in a determined location, you should enable the </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide%23milky-layers"><span data-dcnode-id="3360" instrument_node="">Milky Way layer</span></a><span data-dcnode-id="3358" instrument_node=""> on the Planner and move time continuously to see how the visibility evolves. Go to </span><a data-dcnode-id="3356" href="#step7"><span data-dcnode-id="3357" instrument_node="">section 7</span></a><span data-dcnode-id="3355" instrument_node=""> to learn how to plan the Milky Way ;)</span></p><p data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">To better understand what I mean, watch the following video. It shows how the Galactic Center visibility time and direction change throughout 2015 at Delicate Arch, in the Arches National Park, UTah (USA).</span></p><p data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Even if the data corresponds to 2015 figures, they're still valid because the pattern is the same every year.</span></p><div class="video-wrapper" data-dcnode-id="3348"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="3349" data-src="https://player.vimeo.com/video/101232692?badge=0" frameborder="0" fullscreen="" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"></iframe></div><p data-dcnode-id="3341"><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delicate_Arch"><span data-dcnode-id="3347" instrument_node="">Delicate Arch</span></a><span data-dcnode-id="3345" instrument_node=""> 2015 Galactic Center visibility calendar (</span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/38%25C2%25B044%2737.0%2522N%2B109%25C2%25B029%2758.0%2522W/%4038.7432987%2C-109.4986238%2C543m/data%3D%213m1%211e3%214m2%213m1%211s0x0%3A0x0"><span data-dcnode-id="3344" instrument_node="">38.743611º, -109.499444º</span></a><span data-dcnode-id="3342" instrument_node="">):</span></p><ul data-dcnode-id="3330"><li data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Total visibility time: 988.31 hours</span></li><li data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Visibility peak: 5.63 hours, May 27th</span></li><li data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Minimum visibility azimuth: 127.8º</span></li><li data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Maximum visibility azimuth: 232.2º</span></li><li data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Hunting season:</span></li></ul><table class="stripped-table align-default" data-dcnode-id="3268"><tbody data-dcnode-id="3269"><tr class="row-odd" data-dcnode-id="3325"><td data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">January</span></td><td data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">7.38 hours</span></td></tr><tr class="row-even" data-dcnode-id="3320"><td data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">February</span></td><td data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">44.62 hours</span></td></tr><tr class="row-odd" data-dcnode-id="3315"><td data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">March</span></td><td data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">87.94 hours</span></td></tr><tr class="row-even" data-dcnode-id="3310"><td data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">April</span></td><td data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">118.9 hours</span></td></tr><tr class="row-odd" data-dcnode-id="3305"><td data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">May</span></td><td data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">159.16 hours</span></td></tr><tr class="row-even" data-dcnode-id="3300"><td data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">June</span></td><td data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">157.63 hours</span></td></tr><tr class="row-odd" data-dcnode-id="3295"><td data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">July</span></td><td data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">156.64 hours</span></td></tr><tr class="row-even" data-dcnode-id="3290"><td data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">August</span></td><td data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">119.06 hours</span></td></tr><tr class="row-odd" data-dcnode-id="3285"><td data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">September</span></td><td data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">82.1 hours</span></td></tr><tr class="row-even" data-dcnode-id="3280"><td data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">October</span></td><td data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">47.89 hours</span></td></tr><tr class="row-odd" data-dcnode-id="3275"><td data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">November</span></td><td data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">6.99 hours</span></td></tr><tr class="row-even" data-dcnode-id="3270"><td data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">December</span></td><td data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">0.0 hours</span></td></tr></tbody></table><h3 data-dcnode-id="3264" id="step5"><span class="step" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">5.</span></span><span data-dcnode-id="3265" instrument_node="">Where to photograph the Milky Way (how to find a powerful Milky Way location)</span></h3><p data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">The reason most photographers keep their best locations secret is that an unexploded location, rich of unique photogenic elements, can help you take an award winning image, as simple as that.</span></p><p data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">A second reason is that location scouting can be very time consuming and expensive. I've been living on a little island lost in the Mediterranean Sea for 20+ years now and, although I've thoughtfully explored most of it, finding pretty unique locations on the way, I feel like the best location is yet to come.</span></p><p data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">So, what makes a great location in night sky photography?</span></p><h4 data-dcnode-id="3256" id="it-s-light-pollution-free"><span data-dcnode-id="3257" instrument_node="">It's light pollution free</span></h4><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Unless you're willing to include artificial city lights in your composition, you'll need to do some research and find out where the nearby dark sky locations are.</span></p><figure data-dcnode-id="3242"><img class="b-lazy" data-dcnode-id="3253" data-src="/sites/default/files/articles/milky-way/light-pollution-nasa.webp" height="370px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3243"><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthobservatory.nasa.gov/images/79765/night-lights-2012-flat-map"><span data-dcnode-id="3252" instrument_node="">NASA</span></a><span data-dcnode-id="3250" instrument_node=""> Earth Observatory image by Robert Simmon, using </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpss.noaa.gov/"><span data-dcnode-id="3249" instrument_node="">Suomi NPP VIIRS</span></a><span data-dcnode-id="3247" instrument_node=""> data provided courtesy of Chris Elvidge (</span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ngdc.noaa.gov/eog/"><span data-dcnode-id="3246" instrument_node="">NOAA National Centers for Environmental Information</span></a><span data-dcnode-id="3244" instrument_node="">).</span></figcaption></figure><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Depending on where you live, it can be very challenging to find a location with limited light pollution. These are some resources that can help you find dark sky locations:</span></p><ul data-dcnode-id="3208"><li data-dcnode-id="3236"><a data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blue-marble.de/nightlights/"><span data-dcnode-id="3239" instrument_node="">NASA's Blue Marble</span></a><span data-dcnode-id="3237" instrument_node="">: The site uses a Google Maps interface with NASA's most recent Night Lights image. You can browse the maximum resolution of 4 pixels per km², as well as a slightly coarser night-lights map, enhanced by town names and national borders.</span></li><li data-dcnode-id="3232"><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twanight.org/"><span data-dcnode-id="3235" instrument_node="">The World At Night (TWAN)</span></a><span data-dcnode-id="3233" instrument_node="">: It has one of the largest collections of global categorized astronomic landscape images sorted by regions.</span></li><li data-dcnode-id="3228"><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.darksky.org/our-work/conservation/idsp/"><span data-dcnode-id="3231" instrument_node="">International Dark Sky locations</span></a><span data-dcnode-id="3229" instrument_node="">: I love these guys' movement. The International Dark Sky Association promotes the preservation and protection of night skies across the globe for future generations. You'll find 5 types of designations in their database: communities, parks, reserves, sanctuaries, and urban places. These areas are home to some of the darkest and most pristine skies in the world.</span></li><li data-dcnode-id="3224"><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_astronomical_observatories"><span data-dcnode-id="3227" instrument_node="">Wikipedia Observatories list</span></a><span data-dcnode-id="3225" instrument_node="">: Observatories are located in completely dark skies. It's a good idea to check where they are to find black crystal skies.</span></li><li data-dcnode-id="3219"><span data-dcnode-id="3223" instrument_node="">Look for </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nightsky.jpl.nasa.gov/club-map.cfm%3FOverrideLocation%3D1"><span data-dcnode-id="3222" instrument_node="">Local Astronomy Clubs</span></a><span data-dcnode-id="3220" instrument_node="">: There are amateur astronomers everywhere. Make sure you ask them for suggestions. Most of them enjoy sharing their love for astronomy and would be happy to point you in the right direction.</span></li><li data-dcnode-id="3209"><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//darkskyfinder.com/"><span data-dcnode-id="3218" instrument_node="">Dark Sky Finder (iOS)</span></a><span data-dcnode-id="3216" instrument_node=""> and </span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photographersarsenal.com/mobile-apps-android-ios-iphone-ipad/light-pollution-map/"><span data-dcnode-id="3215" instrument_node="">Light Pollution Map (Android)</span></a><span data-dcnode-id="3213" instrument_node="">: Both apps help you locate nearby dark skies to take a telescope, watch </span><a data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="3212" instrument_node="">Meteor Showers</span></a><span data-dcnode-id="3210" instrument_node="">, or simply relax under the stars. See light pollution maps of the entire world, along with dots that indicate good observing locations.</span></li></ul><p data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Do you wonder how does an unspoiled night sky look like?</span></p><p data-dcnode-id="3195"><span data-dcnode-id="3205" instrument_node="">Make sure you don't miss the following </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christophmalin.com/"><span data-dcnode-id="3204" instrument_node="">Christoph Malin</span></a><span data-dcnode-id="3202" instrument_node="">'s work of art. You'll discover the amazing dark sky of the </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atacama_Desert"><span data-dcnode-id="3201" instrument_node="">Atacama Desert</span></a><span data-dcnode-id="3199" instrument_node=""> and the outstanding </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Southern_Observatory"><span data-dcnode-id="3198" instrument_node="">European Southern Observatory</span></a><span data-dcnode-id="3196" instrument_node="">... Men's outpost to space observation.</span></p><div class="video-wrapper" data-dcnode-id="3193"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="3194" data-src="https://player.vimeo.com/video/102790649?badge=0" frameborder="0" fullscreen="" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"></iframe></div><h4 data-dcnode-id="3191" id="it-includes-a-point-of-interest"><span data-dcnode-id="3192" instrument_node="">It includes a point of interest</span></h4><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Choose a location which has at least one interesting element that inspires you.</span></p><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">Including it in your composition will help you connect landscape and sky in a creative way, which will capture the viewer's attention.</span></p><p data-dcnode-id="3182"><span data-dcnode-id="3186" instrument_node="">These are some of my favorite </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/user-guide-2%23mystuff-pois"><span data-dcnode-id="3185" instrument_node="">Points of Interest</span></a><span data-dcnode-id="3183" instrument_node="">. Try to experiment with them!</span></p><h5 data-dcnode-id="3180" id="rocks"><span data-dcnode-id="3181" instrument_node="">Rocks</span></h5><figure data-dcnode-id="3176"><img class="b-lazy" data-dcnode-id="3179" data-src="/sites/default/files/articles/milky-way/milky-way-rock.webp" height="254px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Nikon D4s | 24mm | f/2.8 | 20s | Panorama</span></figcaption></figure><p data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Being some of the most amazing and beautiful pieces of nature, rocks convey a sense of power, isolation, and challenge.</span></p><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Rock formations were slowly created by strong elements such as heat, wind, rain, and other erosional forces, over millions of years.</span></p><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">You can find them in many different positions. I personally prefer those that are isolated because they convey a sense of drama.</span></p><p data-dcnode-id="3165"><span data-dcnode-id="3169" instrument_node="">I guess it's not difficult to find a nice rock in your area. But if that's not the case, have a look at the </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_rock_formations"><span data-dcnode-id="3168" instrument_node="">list of best rock formations on Wikipedia</span></a><span data-dcnode-id="3166" instrument_node="">.</span></p><h5 data-dcnode-id="3163" id="natural-arches-and-bridges"><span data-dcnode-id="3164" instrument_node="">Natural arches and bridges</span></h5><figure data-dcnode-id="3159"><img class="b-lazy" data-dcnode-id="3162" data-src="/sites/default/files/articles/milky-way/milky-way-natural-arch.webp" height="196px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Nikon D4s | 14mm | f/2.8 | 30s | ISO 6400 | Panorama</span></figcaption></figure><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">These marvelous giant stone structures, carved by nature, are doors to Heaven... And sometimes doors to Hell as well.</span></p><p data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Natural bridges are formed by running water. This makes them even more special and rarer than arches, which result from a combination of other erosional forces.</span></p><p data-dcnode-id="3150"><span data-dcnode-id="3154" instrument_node="">Again, if you're not lucky to live near one of these natural wonders, do your research on the net. Check the </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_longest_natural_arches"><span data-dcnode-id="3153" instrument_node="">list of longest natural arches on Wikipedia</span></a><span data-dcnode-id="3151" instrument_node="">.</span></p><p data-dcnode-id="3145"><span data-dcnode-id="3149" instrument_node="">If you live in the USA, you can't miss </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/arch/index.htm"><span data-dcnode-id="3148" instrument_node="">Arches National Park</span></a><span data-dcnode-id="3146" instrument_node=""> (Utah). With over 2,000 classified arches, massive monoliths and towering walls, it's a dream come true for all night photographers.</span></p><h5 data-dcnode-id="3143" id="lighthouses"><span data-dcnode-id="3144" instrument_node="">Lighthouses</span></h5><figure data-dcnode-id="3139"><img class="b-lazy" data-dcnode-id="3142" data-src="/sites/default/files/articles/milky-way/milky-way-lighthouse.webp" height="499px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Nikon D4s | 17mm | f/2.8 | 30s | ISO 6400</span></figcaption></figure><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Some of the world's most picturesque buildings are lighthouses. Some of them have been crucial in many wars, suffering dramatic consequences from being in the battlefield.</span></p><p data-dcnode-id="3132"><span data-dcnode-id="3136" instrument_node="">If you look into their past, you'll find enigmas and surprising stories hidden behind the walls. Go, discover the mystery around a nearby lighthouse or check the </span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lists_of_lighthouses"><span data-dcnode-id="3135" instrument_node="">list of lighthouses on Wikipedia</span></a><span data-dcnode-id="3133" instrument_node=""> to find one that interests you.</span></p><h5 data-dcnode-id="3130" id="trees"><span data-dcnode-id="3131" instrument_node="">Trees</span></h5><figure data-dcnode-id="3126"><img class="b-lazy" data-dcnode-id="3129" data-src="/sites/default/files/articles/milky-way/milky-way-tree.webp" height="245px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Nikon D4s | 18mm | f/2.8 | 25s | ISO 6400 | Panorama</span></figcaption></figure><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Just two words: captivating organisms. They are powerful structures that add interest to your image and become dominant when photographed on their own.</span></p><p data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Look for an isolated tree. It will help you break the horizon line and give a sense of scale to the shot.</span></p><p data-dcnode-id="3117"><span data-dcnode-id="3121" instrument_node="">Trees can be unusual either because of their biology or because humans have changed them in some way. Here is a </span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_individual_trees"><span data-dcnode-id="3120" instrument_node="">list of particularly unusual trees on Wikipedia</span></a><span data-dcnode-id="3118" instrument_node="">.</span></p><h5 data-dcnode-id="3115" id="ancient-constructions"><span data-dcnode-id="3116" instrument_node="">Ancient constructions</span></h5><figure data-dcnode-id="3111"><img class="b-lazy" data-dcnode-id="3114" data-src="/sites/default/files/articles/milky-way/milky-way-naveta.webp" height="256px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Nikon Z6 | 18mm | f/2.8 | 25s | ISO 6400 | 3350K | 7-photo panorama</span></figcaption></figure><p data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Some people say these old stone constructions were built by ancient civilizations. Others, more skeptical about men's technological capabilities, that they were built by aliens.</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">I ignore your opinion on these theories but the truth is that all these constructions will make your photos trap everyone's attention. It's like connecting two worlds: ancient cultures and alien nations.</span></p><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Among the types of old constructions, the megalithic ones are my favorite.</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3104" instrument_node="">A </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megalith"><span data-dcnode-id="3103" instrument_node="">megalith</span></a><span data-dcnode-id="3101" instrument_node=""> is a very large usually rough stone used in prehistoric cultures as a monument or building block. The word "megalithic" describes structures made of such large stones, using an interlocking system instead of mortar or cement.</span></p><p data-dcnode-id="3090"><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stonehenge"><span data-dcnode-id="3099" instrument_node="">Stonehenge</span></a><span data-dcnode-id="3097" instrument_node=""> in the UK and the </span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naveta_d%27Es_Tudons"><span data-dcnode-id="3096" instrument_node="">Naveta d'Es Tudons</span></a><span data-dcnode-id="3094" instrument_node=""> in our beautiful island of Menorca (Spain) are great examples of megalithic constructions. You can find more examples on the </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_oldest_known_surviving_buildings"><span data-dcnode-id="3093" instrument_node="">list of the oldest known surviving buildings on Wikipedia</span></a><span data-dcnode-id="3091" instrument_node="">.</span></p><h5 data-dcnode-id="3088" id="models"><span data-dcnode-id="3089" instrument_node="">Models</span></h5><figure class="portrait" data-dcnode-id="3084"><img class="b-lazy" data-dcnode-id="3087" data-src="/sites/default/files/articles/milky-way/milky-way-model.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="357px"><figcaption data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Nikon D4s | 18mm | f/2.8 | 20s | ISO 6400 | 3700K</span></figcaption></figure><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">Adding a model in the mix can be challenging but also very rewarding. Sometimes, the story you want to tell needs the help of a human character to make it complete.</span></p><p data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">These are just a few ideas to inspire you, but you can use other elements such as windmills, lakes to create reflections, abandoned vehicles or machines... Take advantage of what you have nearby.</span></p><h4 data-dcnode-id="3078" id="find-a-place-with-a-hidden-story"><span data-dcnode-id="3079" instrument_node="">Find a place with a hidden story</span></h4><figure data-dcnode-id="3074"><img class="b-lazy" data-dcnode-id="3077" data-src="/sites/default/files/articles/milky-way/milky-way-hidden-story.webp" height="460px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Nikon D4s | 17mm | f/2.8 | 30s | ISO 6400</span></figcaption></figure><p data-dcnode-id="3055"><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lists_of_cemeteries"><span data-dcnode-id="3073" instrument_node="">Cemeteries</span></a><span data-dcnode-id="3071" instrument_node="">, </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lists_of_battles"><span data-dcnode-id="3070" instrument_node="">battlefields</span></a><span data-dcnode-id="3068" instrument_node="">, </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_ghost_towns_by_country"><span data-dcnode-id="3067" instrument_node="">ghost towns</span></a><span data-dcnode-id="3065" instrument_node="">, </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lists_of_volcanoes"><span data-dcnode-id="3064" instrument_node="">volcanos</span></a><span data-dcnode-id="3062" instrument_node="">, </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_impact_craters_on_Earth"><span data-dcnode-id="3061" instrument_node="">craters</span></a><span data-dcnode-id="3059" instrument_node=""> and </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_deserts"><span data-dcnode-id="3058" instrument_node="">deserts</span></a><span data-dcnode-id="3056" instrument_node=""> have a kind of hypnotic atmosphere that attracts the attention of many brave photographers looking for something new to invigorate their photographic creativity. Sometimes visiting the same old haunts or taking the same types of pictures can get stale.</span></p><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Why not trying something new?</span></p><h4 data-dcnode-id="3051" id="use-any-available-source-of-information"><span data-dcnode-id="3052" instrument_node="">Use any available source of information</span></h4><p data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">One of the main tasks during any planning is research. That means you have to spend as much time looking around until you find what you need.</span></p><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">And for that, I suggest you use any available source of information.</span></p><ul data-dcnode-id="2945"><li data-dcnode-id="3009"><span data-dcnode-id="3046" instrument_node="">Seeing photos of other photographers is the best source of inspiration. You can check </span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/"><span data-dcnode-id="3045" instrument_node="">Instagram</span></a><span data-dcnode-id="3043" instrument_node="">, </span><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/"><span data-dcnode-id="3042" instrument_node="">Flickr</span></a><span data-dcnode-id="3040" instrument_node="">, </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//500px.com/"><span data-dcnode-id="3039" instrument_node="">500px</span></a><span data-dcnode-id="3037" instrument_node="">, </span><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/"><span data-dcnode-id="3036" instrument_node="">Unsplash</span></a><span data-dcnode-id="3034" instrument_node="">, </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/"><span data-dcnode-id="3033" instrument_node="">Getty Images</span></a><span data-dcnode-id="3031" instrument_node="">, </span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1x.com/"><span data-dcnode-id="3030" instrument_node="">1x.com</span></a><span data-dcnode-id="3028" instrument_node=""> , </span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.viewbug.com/"><span data-dcnode-id="3027" instrument_node="">Viewbug</span></a><span data-dcnode-id="3025" instrument_node="">, </span><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/"><span data-dcnode-id="3024" instrument_node="">Pexels</span></a><span data-dcnode-id="3022" instrument_node="">, </span><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youpic.com/"><span data-dcnode-id="3021" instrument_node="">Youpic</span></a><span data-dcnode-id="3019" instrument_node="">, </span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/"><span data-dcnode-id="3018" instrument_node="">Shutterstock</span></a><span data-dcnode-id="3016" instrument_node="">, </span><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stock.adobe.com/"><span data-dcnode-id="3015" instrument_node="">Adobe Stock</span></a><span data-dcnode-id="3013" instrument_node=""> and </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.google.com/"><span data-dcnode-id="3012" instrument_node="">Google Images</span></a><span data-dcnode-id="3010" instrument_node="">.</span></li><li data-dcnode-id="3001"><span data-dcnode-id="3008" instrument_node="">Take advantage of locations other photographers discovered and explored. There are communities, such as </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.locationscout.net/"><span data-dcnode-id="3007" instrument_node="">Locationscout</span></a><span data-dcnode-id="3005" instrument_node=""> and </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shothotspot.com/"><span data-dcnode-id="3004" instrument_node="">ShotHotspot</span></a><span data-dcnode-id="3002" instrument_node="">, where this information is shared.</span></li><li data-dcnode-id="2969"><span data-dcnode-id="3000" instrument_node="">Thoroughly study publications such as travel magazines (</span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/"><span data-dcnode-id="2999" instrument_node="">National Geographic</span></a><span data-dcnode-id="2997" instrument_node="">, </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cntraveler.com/"><span data-dcnode-id="2996" instrument_node="">Condé Nast Traveler</span></a><span data-dcnode-id="2994" instrument_node=""> and </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelandleisure.com/"><span data-dcnode-id="2993" instrument_node="">Travel + Leisure</span></a><span data-dcnode-id="2991" instrument_node="">), travel curated content (</span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exposure.co/"><span data-dcnode-id="2990" instrument_node="">Exposure</span></a><span data-dcnode-id="2988" instrument_node="">, </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//maptia.com/"><span data-dcnode-id="2987" instrument_node="">Maptia</span></a><span data-dcnode-id="2985" instrument_node=""> and </span><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.landscapestories.net/"><span data-dcnode-id="2984" instrument_node="">Landscape Stories</span></a><span data-dcnode-id="2982" instrument_node="">), travel guides (</span><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/"><span data-dcnode-id="2981" instrument_node="">Lonely Planet</span></a><span data-dcnode-id="2979" instrument_node="">) and the photography section of newspapers such as </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/photo/"><span data-dcnode-id="2978" instrument_node="">The Atlantic</span></a><span data-dcnode-id="2976" instrument_node="">, </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/inpictures"><span data-dcnode-id="2975" instrument_node="">The Guardian</span></a><span data-dcnode-id="2973" instrument_node=""> and </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/section/lens"><span data-dcnode-id="2972" instrument_node="">The New York Times</span></a><span data-dcnode-id="2970" instrument_node="">.</span></li><li data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">Search the galleries of your favourite photographers' websites. A good example is the PhotoPills Masters' websites participating in the </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/camp"><span data-dcnode-id="2967" instrument_node="">PhotoPills Camp</span></a><span data-dcnode-id="2965" instrument_node="">.</span></li><li data-dcnode-id="2959"><span data-dcnode-id="2963" instrument_node="">Wikipedia and its lists of interesting places is an endless source of information. Are you looking for lighthouses? Type in Google </span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Fq%3Dlighthouse%2Blist%2BWikipedia"><span data-dcnode-id="2962" instrument_node="">"lighthouse list Wikipedia"</span></a><span data-dcnode-id="2960" instrument_node=""> and analyze the results.</span></li><li data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Ask the locals, they are the ones who know the area best and who will give you good advice.</span></li><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Books can also help you learn about the local history and natural biodiversity of an area or town.</span></li><li data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Don't forget to visit the Town Hall or the tourist office of that city or town. I'm sure you'll be surprised.</span></li><li data-dcnode-id="2948"><span data-dcnode-id="2952" instrument_node="">Check the Points of interest (POIs) included in </span><a data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="2951" instrument_node="">PhotoPills</span></a><span data-dcnode-id="2949" instrument_node="">.</span></li><li data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">And finally, most importantly, scout the area. It's often the most effective strategy :)</span></li></ul><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">What are you waiting for?</span></p><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Go and find an unexplored location!</span></p><h4 data-dcnode-id="2939" id="add-a-shooting-star"><span data-dcnode-id="2940" instrument_node="">Add a shooting star</span></h4><figure class="portrait" data-dcnode-id="2935"><img class="b-lazy" data-dcnode-id="2938" data-src="/sites/default/files/articles/milky-way/milky-way-shooting-star.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Nikon D4s | 35mm | f/1.8 | 15s (Milky Way and meteor) and 25s (foreground) | ISO 1600 | 3150K</span></figcaption></figure><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Meteors will turn a good Milky Way picture into a memorable one. So, when a Meteor Shower is coming up, make sure you're ready to take action.</span></p><p data-dcnode-id="2928"><span data-dcnode-id="2932" instrument_node="">Take a look at our </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="2931" instrument_node="">Meteor Showers photography guide</span></a><span data-dcnode-id="2929" instrument_node="">. You'll find information about both the upcoming Meteor Showers and how to shoot them.</span></p><p data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">During a Meteor Shower, meteors are observed to radiate from one point in the night sky. These meteors are caused by streams of cosmic debris entering the Earth's atmosphere at extremely high speeds. Smaller fragments burn in the atmosphere producing a "shooting star", but the bigger ones can really produce an amazing big fireball.</span></p><p data-dcnode-id="2921"><span data-dcnode-id="2925" instrument_node="">Produced by comet Swift-Tuttle, the </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perseids"><span data-dcnode-id="2924" instrument_node="">Perseids</span></a><span data-dcnode-id="2922" instrument_node=""> are one of the best Meteor Showers that can be observed, with up to 100 meteors per hour. The shower runs annually from mid July to the end of August. But there are many more great Meteor Showers during the year.</span></p><p data-dcnode-id="2916"><span data-dcnode-id="2920" instrument_node="">Which ones? Again, check our </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="2919" instrument_node="">Meteor Showers photography guide</span></a><span data-dcnode-id="2917" instrument_node="">.</span></p><p data-dcnode-id="2911"><span data-dcnode-id="2915" instrument_node="">If you are lucky enough to capture many meteors, you can use the technique described in </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWlR-XrDhRIE"><span data-dcnode-id="2914" instrument_node="">this Meteor Showers Masterclass with Ian Norman</span></a><span data-dcnode-id="2912" instrument_node=""> for image post-processing and to get a stunning effect.</span></p><h3 data-dcnode-id="2907" id="step6"><span class="step" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">6.</span></span><span data-dcnode-id="2908" instrument_node="">The 3 crucial tips you should know before you start planning the Milky Way</span></h3><p data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Let's say that after having checked many locations, you've finally found one that inspires you. And you're ready to plan a cool Milky Way picture...</span></p><p data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">But hey! Don't hurry...</span></p><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Before you use your Milky Way app to find and plan that Milky Way photo you have in mind, there are 3 crucial tips about the Milky Way you should know.</span></p><h4 data-dcnode-id="2899" id="you-ll-find-the-core-in-the-southern-skies-1"><span data-dcnode-id="2900" instrument_node="">You'll find the Core in the southern skies (1)</span></h4><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Knowing the direction where you will find the Core of the Milky Way is mandatory. Don't waste your time planning images that are not possible.</span></p><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">These are the general rules depending on the hemisphere you are:</span></p><ul data-dcnode-id="2886"><li data-dcnode-id="2891"><strong data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Northern Hemisphere.</span></strong><span data-dcnode-id="2892" instrument_node=""> Look towards the southern skies to see the Galactic Core. The Core will start to be visible to the southeast (spring), to the south (summer), or to the southwest (fall).</span></li><li data-dcnode-id="2887"><strong data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Southern Hemisphere.</span></strong><span data-dcnode-id="2888" instrument_node=""> Also look towards the southern skies to see the Galactic Center. In this case, the Core will start to be visible to the southwest (spring) or to the southeast (fall and winter).</span></li></ul><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">In addition to this, in the Northern Hemisphere the Core is pretty close to the horizon, even when it's at its maximum elevation. And the further you go towards the south, the higher in the sky you'll find it. You can have the whole Core above the horizon, and even above your head.</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">That's the reason some of the best Milky Way pictures are taken in the Southern Hemisphere, because you can come up with many more compositions.</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Therefore, don't look for the Core of the Milky Way towards the north. When brainstorming, think about different compositions with the Galactic Center in the southeast, south or southwest.</span></p><p data-dcnode-id="2875"><span data-dcnode-id="2879" instrument_node="">Another way to find the Center of our galaxy and the brightest part of the Milky
