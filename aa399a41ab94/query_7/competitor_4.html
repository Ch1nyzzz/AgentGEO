=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_temperature"><span data-dcnode-id="2041" instrument_node="">color temperature</span></a><span data-dcnode-id="2039" instrument_node=""> of about 5500K, this is white. In order to change its temperature, it's very interesting to use </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_gel"><span data-dcnode-id="2038" instrument_node="">colored gels</span></a><span data-dcnode-id="2036" instrument_node="">.</span></p><p data-dcnode-id="2033" style="text-align: center; font-style: italic;"><span data-dcnode-id="2034" instrument_node="">"Toni, what's a colored gel?"</span></p><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">A gel is a colored plastic sheet that you can place in front of the light source to color its light.</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2030" instrument_node="">Ideally, you should always have in your bag at least a couple of </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_correction"><span data-dcnode-id="2029" instrument_node="">color correction gels</span></a><span data-dcnode-id="2027" instrument_node="">. In most sessions, a </span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JkfCO8"><span data-dcnode-id="2026" instrument_node="">CTO gel</span></a><span data-dcnode-id="2024" instrument_node=""> (Color Temperature Orange) and a </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JkgzGc"><span data-dcnode-id="2023" instrument_node="">CTB gel</span></a><span data-dcnode-id="2021" instrument_node=""> (Color Temperature Blue) will do the job. They're not expensive and last for a long time.</span></p><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">A CTB gel converts tungsten light (3200K) to 'daylight' color (5500K), so it can be used to cool your scene. While a CTO gel performs the reverse, it converts 'daylight' color (5500K) to tungsten (3200K), allowing you to warm the scene.</span></p><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Gels are available in different intensities. You can find them with an intensity or strength of 1/4, 1/2, 3/4, etc. The lower the intensity the less the color temperature is corrected.</span></p><figure data-dcnode-id="2012"><img class="b-lazy" data-dcnode-id="2015" data-src="/sites/default/files/articles/milky-way/cto-ctb.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">CTB and CTO gels of different intensities ready to be used on a flashlight.</span></figcaption></figure><p data-dcnode-id="2007"><span data-dcnode-id="2011" instrument_node="">In addition to color correction gels, there are the so called </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JkM1Ed"><span data-dcnode-id="2010" instrument_node="">color gels</span></a><span data-dcnode-id="2008" instrument_node="">. These are used to allow color lighting accents and unnatural effects. There is a huge number of colors available from several manufacturers: red, yellow, green, dark blue, etc.</span></p><figure data-dcnode-id="2003"><img class="b-lazy" data-dcnode-id="2006" data-src="/sites/default/files/articles/milky-way/gels.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Gels of different colors.</span></figcaption></figure><h5 data-dcnode-id="2001" id="tripod-and-head"><span data-dcnode-id="2002" instrument_node="">Tripod and head</span></h5><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">As I already mentioned in the beginner's section, weight is key. The more the tripod weighs, the better the stability is. Obviously, you're looking for a tripod with a weight that you can comfortably carry without hurting your back.</span></p><p data-dcnode-id="1982"><span data-dcnode-id="1998" instrument_node="">The most popular tripod brands for advanced amateur photographers are </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N1R0sq"><span data-dcnode-id="1997" instrument_node="">Gitzo</span></a><span data-dcnode-id="1995" instrument_node="">, </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N30gMP"><span data-dcnode-id="1994" instrument_node="">Manfrotto</span></a><span data-dcnode-id="1992" instrument_node="">, </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0wR60"><span data-dcnode-id="1991" instrument_node="">Benro</span></a><span data-dcnode-id="1989" instrument_node="">, </span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0Rejo"><span data-dcnode-id="1988" instrument_node="">Induro</span></a><span data-dcnode-id="1986" instrument_node=""> or </span><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZR3EW"><span data-dcnode-id="1985" instrument_node="">Really Right Stuff</span></a><span data-dcnode-id="1983" instrument_node="">.</span></p><p data-dcnode-id="1971"><span data-dcnode-id="1981" instrument_node="">The </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3gXIa"><span data-dcnode-id="1980" instrument_node="">Manfrotto 055XPRO3</span></a><span data-dcnode-id="1978" instrument_node=""> is probably the best seller tripod in the mid-range bracket. I also really like the </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Lr5fad"><span data-dcnode-id="1977" instrument_node="">Travel</span></a><span data-dcnode-id="1975" instrument_node=""> line by </span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0wR60"><span data-dcnode-id="1974" instrument_node="">Benro</span></a><span data-dcnode-id="1972" instrument_node="">.</span></p><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Here, you should look for a tripod that can bear the camera body and the lens, but that also has a good stability against wind for a reasonably price. An aluminium tripod that can bear at least 5-7 kg (11-16 lb) of weight would be ideal. Again, remember not to raise the center column of the tripod because it will make it more unstable.</span></p><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Besides the tripod, you need to acquire a head suitable for night sky photography. There are many different heads in the market. The most commonly used in this type of photography are the ballhead and the pan/tilt head. The type of head depends on your taste, but make sure that it can bear at least 5-7 kg (11-16 lb) of weight and that it includes a removable plate.</span></p><h5 data-dcnode-id="1965" id="intervalometer"><span data-dcnode-id="1966" instrument_node="">Intervalometer</span></h5><p data-dcnode-id="1957"><span data-dcnode-id="1964" instrument_node="">Every advanced photographer should have an intervalometer. The remote shutter release can do the job in many cases, but if you want to shoot a timelapse, </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="1963" instrument_node="">Star Trails</span></a><span data-dcnode-id="1961" instrument_node=""> or simply shoot continuously during one of the </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="1960" instrument_node="">Meteor Showers</span></a><span data-dcnode-id="1958" instrument_node="">, having an intervalometer is compulsory.</span></p><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Furthermore, even when you only want to photograph the Milky Way, continuous shooting will increase the likelihood of capturing a shooting star, which will definitely add interest to the image.</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">These are all great intervalometers:</span></p><ul data-dcnode-id="1945"><li data-dcnode-id="1948"><span data-dcnode-id="1952" instrument_node="">Pro intervalometer: </span><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smdv-usa.com/intervalometer.html"><span data-dcnode-id="1951" instrument_node="">SMDV</span></a><span data-dcnode-id="1949" instrument_node=""> .</span></li><li data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">For cheap intervalometers check the brands Neewer, Phottix and Vello.</span></li></ul><p data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">A great alternative is a device called </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camranger.com/"><span data-dcnode-id="1943" instrument_node="">CamRanger</span></a><span data-dcnode-id="1941" instrument_node="">. Right now it's available for Nikon, Canon, Fuji and Sony cameras.</span></p><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">It's a stand-alone device that you connect to your DSLR or mirrorless camera with a USB cable. It creates an ad hoc WiFi network to which you can connect your smartphone or tablet (iOS, Android and Windows). Thanks to the CamRanger application you can control your camera without a computer or an Internet connection.</span></p><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Best of all, this device is independent. Therefore, if your mobile device loses its connection, the CamRanger has an internal memory to keep shooting. Imagine that you are making a timelapse, your sequence would be cut if the camera stops taking pictures in the time frame you've set...</span></p><p data-dcnode-id="1919"><span data-dcnode-id="1935" instrument_node="">So the CamRanger is great for many types of photos: timelapses (of the </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/milky-way-photography-guide"><span data-dcnode-id="1934" instrument_node="">Milky Way</span></a><span data-dcnode-id="1932" instrument_node="">, of </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="1931" instrument_node="">Star Trails</span></a><span data-dcnode-id="1929" instrument_node="">, of </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/solar-eclipse-photography-guide"><span data-dcnode-id="1928" instrument_node="">solar eclipses</span></a><span data-dcnode-id="1926" instrument_node=""> or </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/lunar-eclipse-photography-guide"><span data-dcnode-id="1925" instrument_node="">lunar eclipses</span></a><span data-dcnode-id="1923" instrument_node="">...), </span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-3%23step23"><span data-dcnode-id="1922" instrument_node="">bracketing</span></a><span data-dcnode-id="1920" instrument_node="">, focus stacking for macro and landscapes... and many more!</span></p><h5 data-dcnode-id="1917" id="id2"><span data-dcnode-id="1918" instrument_node="">Memory cards</span></h5><p data-dcnode-id="1912"><span data-dcnode-id="1916" instrument_node="">There are many different types of </span><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N06QDX"><span data-dcnode-id="1915" instrument_node="">SD Cards</span></a><span data-dcnode-id="1913" instrument_node=""> (Secure Digital) depending on their capacity and data transfer speed.</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1911" instrument_node="">Both SDHC and SDXC Class 10 cards from </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JFTXix8"><span data-dcnode-id="1910" instrument_node="">SanDisk</span></a><span data-dcnode-id="1908" instrument_node=""> or </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2OsUqqQ"><span data-dcnode-id="1907" instrument_node="">ProGrade</span></a><span data-dcnode-id="1905" instrument_node=""> (my favorite brands) are ideal for advanced amateur photographers. Their writing performance is good enough to have an acceptably short time interval between two consecutive exposures.</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">It might seem this is not that important, but it's vital when shooting timelapses at night or low light conditions, as you want to take the maximum number of photos possible.</span></p><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">The cards can have a capacity of 16GB, 32GB, 64GB or even more. If you plan to shoot timelapses, I recommend you to get a 64GB card or with a higher capacity, to make sure you have enough space to store all the photos.</span></p><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">While there are still cameras that can work with </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3bLDZ"><span data-dcnode-id="1898" instrument_node="">CompactFlash</span></a><span data-dcnode-id="1896" instrument_node=""> (CF) cards, this system is slowly disappearing.</span></p><h4 data-dcnode-id="1893" id="professional-equipment-high-end-gear"><span data-dcnode-id="1894" instrument_node="">Professional equipment (high-end gear)</span></h4><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">There is almost no limit to how much you can spend on equipment... But I assure you that with the following equipment your photography won't be limited either.</span></p><h5 data-dcnode-id="1889" id="id3"><span data-dcnode-id="1890" instrument_node="">Camera</span></h5><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">When you seek the highest quality standard in your photography a mid/high range Full Frame camera is the best option (but not the only one). It should have a sensor with great noise performance in low light conditions and that it doesn't overheat.</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Furthermore, it's also very important that the body is perfectly sealed to withstand bad weather conditions, sand, dust, humidity and water.</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">The following are great cameras for professional night photographers:</span></p><ul data-dcnode-id="1783"><li data-dcnode-id="1869"><span data-dcnode-id="1882" instrument_node="">Cameras with an APS-C sensor: Nikon </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N03QqY"><span data-dcnode-id="1881" instrument_node="">D500</span></a><span data-dcnode-id="1879" instrument_node="">; Fuji </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N8BNWF"><span data-dcnode-id="1878" instrument_node="">XH-1</span></a><span data-dcnode-id="1876" instrument_node="">, </span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2VivYdq"><span data-dcnode-id="1875" instrument_node="">XT-4</span></a><span data-dcnode-id="1873" instrument_node=""> and </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3GOx333"><span data-dcnode-id="1872" instrument_node="">X-Pro3</span></a><span data-dcnode-id="1870" instrument_node="">.</span></li><li data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">Cameras with a Micro 4/3 sensor: Olympus </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SQw0KF"><span data-dcnode-id="1867" instrument_node="">OM-D E-M1X</span></a><span data-dcnode-id="1865" instrument_node="">.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1863" instrument_node="">Full Frame cameras: Nikon </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SD02RZ"><span data-dcnode-id="1862" instrument_node="">Z6</span></a><span data-dcnode-id="1860" instrument_node="">, </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SQzyMZ"><span data-dcnode-id="1859" instrument_node="">Z7</span></a><span data-dcnode-id="1857" instrument_node="">, </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3pZfEh2"><span data-dcnode-id="1856" instrument_node="">Z6 II</span></a><span data-dcnode-id="1854" instrument_node="">, </span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/30oCOVm"><span data-dcnode-id="1853" instrument_node="">Z7 II</span></a><span data-dcnode-id="1851" instrument_node="">, </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3FCnT9o"><span data-dcnode-id="1850" instrument_node="">Z9</span></a><span data-dcnode-id="1848" instrument_node="">, </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3IRs8zQ"><span data-dcnode-id="1847" instrument_node="">D780</span></a><span data-dcnode-id="1845" instrument_node="">, </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SFBDv1"><span data-dcnode-id="1844" instrument_node="">D850</span></a><span data-dcnode-id="1842" instrument_node="">, </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SL36LH"><span data-dcnode-id="1841" instrument_node="">D5</span></a><span data-dcnode-id="1839" instrument_node=""> and </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3IIBG0h"><span data-dcnode-id="1838" instrument_node="">D6</span></a><span data-dcnode-id="1836" instrument_node="">; Canon </span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SADXTL"><span data-dcnode-id="1835" instrument_node="">R</span></a><span data-dcnode-id="1833" instrument_node="">, </span><a data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3DTTeCX"><span data-dcnode-id="1832" instrument_node="">R6</span></a><span data-dcnode-id="1830" instrument_node="">, </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SFWfDr"><span data-dcnode-id="1829" instrument_node="">6D Mark II</span></a><span data-dcnode-id="1827" instrument_node="">, </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N23vUR"><span data-dcnode-id="1826" instrument_node="">5D Mark IV</span></a><span data-dcnode-id="1824" instrument_node=""> and </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3DSjEor"><span data-dcnode-id="1823" instrument_node="">1D X Mark III</span></a><span data-dcnode-id="1821" instrument_node="">; Panasonic </span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3EVafhx"><span data-dcnode-id="1820" instrument_node="">S5</span></a><span data-dcnode-id="1818" instrument_node="">, </span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/34uqSiD"><span data-dcnode-id="1817" instrument_node="">S1R</span></a><span data-dcnode-id="1815" instrument_node=""> and </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3b63vyk"><span data-dcnode-id="1814" instrument_node="">S1H</span></a><span data-dcnode-id="1812" instrument_node="">; Pentax </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SLjYSD"><span data-dcnode-id="1811" instrument_node="">K-1 Mark II</span></a><span data-dcnode-id="1809" instrument_node="">; Sony </span><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0mNK3"><span data-dcnode-id="1808" instrument_node="">a7 III</span></a><span data-dcnode-id="1806" instrument_node="">, </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0mNK3"><span data-dcnode-id="1805" instrument_node="">a7 IV</span></a><span data-dcnode-id="1803" instrument_node="">, </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2STRtAM"><span data-dcnode-id="1802" instrument_node="">a7S III</span></a><span data-dcnode-id="1800" instrument_node="">, </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3K9OV"><span data-dcnode-id="1799" instrument_node="">a7R III</span></a><span data-dcnode-id="1797" instrument_node="">, </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3E1jStO"><span data-dcnode-id="1796" instrument_node="">a7R IV</span></a><span data-dcnode-id="1794" instrument_node="">, </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N24wfD"><span data-dcnode-id="1793" instrument_node="">a9</span></a><span data-dcnode-id="1791" instrument_node="">, </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3ISxpXZ"><span data-dcnode-id="1790" instrument_node="">a9 II</span></a><span data-dcnode-id="1788" instrument_node=""> and </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3s20MBi"><span data-dcnode-id="1787" instrument_node="">a1</span></a><span data-dcnode-id="1785" instrument_node="">.</span></li></ul><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">All have a wonderful noise performance when using high ISOs. Furthermore, they include external buttons for every important setting (ISO, white balance, etc.) allowing you to easily change them.</span></p><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Of course, you should use these bodies with a great lens if you want to make the most of it.</span></p><h5 data-dcnode-id="1777" id="id4"><span data-dcnode-id="1778" instrument_node="">Wide angle lens</span></h5><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">You should look for a sharp, fast, wide angle lens with no coma distortion at the edge nor other chromatic aberrations.</span></p><p data-dcnode-id="1770"><span data-dcnode-id="1774" instrument_node="">One of the best lenses due to its quality and proven results is the </span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1773" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="1771" instrument_node="">.</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node="">It's not only used by Nikon photographers, but also by photographers using other camera brands like Canon. In this case, you need to use a top quality adapter ring like the </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q1BKgH"><span data-dcnode-id="1768" instrument_node="">Novoflex EOS NIK NT</span></a><span data-dcnode-id="1766" instrument_node="">. It's an incredibly sharp lens with very little coma and vignetting.</span></p><p data-dcnode-id="1760"><span data-dcnode-id="1764" instrument_node="">If you'd like to find more about it, you can have a look at </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exploringexposure.com/blog/review-of-nikon-14-24-f28-for-night-photography/"><span data-dcnode-id="1763" instrument_node="">a great review on David Kingham's website</span></a><span data-dcnode-id="1761" instrument_node="">.</span></p><figure data-dcnode-id="1755"><img class="b-lazy" data-dcnode-id="1759" data-src="/sites/default/files/articles/milky-way/nikon-14-24.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1756"><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1758" instrument_node="">Nikon AF-S 14-24mm f/2.8 G ED</span></a></figcaption></figure><p data-dcnode-id="1750"><span data-dcnode-id="1754" instrument_node="">If the price is not an issue for you, another lens you might consider is the </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q4yml2"><span data-dcnode-id="1753" instrument_node="">Zeiss 15mm f/2.8</span></a><span data-dcnode-id="1751" instrument_node="">. This lens is also very sharp and it has not coma.</span></p><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">But aside its outstanding optical and mechanical quality it has a serious problem: over contrasting glass. This not an issue during the day, but it's definitely a problem at night.</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">Zeiss glass is not good at night. A </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1746" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="1744" instrument_node=""> set at 15mm vs the Zeiss 15mm still shows details in the darkest shadows and blacks. With the Zeiss, the blacks are completely clipped.</span></p><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Do you have a dark forest in the background along with the Milky Way? In post-production, you can recover detail in the trees on an image shot with the Nikon but not with the Zeiss.</span></p><p data-dcnode-id="1736"><span data-dcnode-id="1740" instrument_node="">If you're looking for a very sharp lens, try the </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q70Yu3"><span data-dcnode-id="1739" instrument_node="">Tokina 16-28mm f/2.8</span></a><span data-dcnode-id="1737" instrument_node="">.</span></p><p data-dcnode-id="1728"><span data-dcnode-id="1735" instrument_node="">Similarly, the </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2Z79y"><span data-dcnode-id="1734" instrument_node="">Rokinon 14mm f/2.8</span></a><span data-dcnode-id="1732" instrument_node=""> and the </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q7dFoQ"><span data-dcnode-id="1731" instrument_node="">Samyang 14mm f/2.8</span></a><span data-dcnode-id="1729" instrument_node=""> give exceptional results. Both lenses have little coma.</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node="">On the Canon side, you have the </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Q2ydi0"><span data-dcnode-id="1726" instrument_node="">Canon 16-35mm f/2.8L III</span></a><span data-dcnode-id="1724" instrument_node="">.</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Other awesome lenses are:</span></p><ul data-dcnode-id="1705"><li data-dcnode-id="1718"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Jngcuy"><span data-dcnode-id="1720" instrument_node="">Tamron 15-30mm f/2.8</span></a></li><li data-dcnode-id="1715"><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JjMQgp"><span data-dcnode-id="1717" instrument_node="">Canon 11-24mm f/4L</span></a></li><li data-dcnode-id="1712"><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Jkmj2v"><span data-dcnode-id="1714" instrument_node="">Canon 14mm f/2.8L II</span></a></li><li data-dcnode-id="1709"><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Jm2F6p"><span data-dcnode-id="1711" instrument_node="">Sigma 14mm f/1.8 Art</span></a></li><li data-dcnode-id="1706"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/3oT3hDQ"><span data-dcnode-id="1708" instrument_node="">Sigma 14-24mm f/2.8 Art</span></a></li></ul><h5 data-dcnode-id="1703" id="id5"><span data-dcnode-id="1704" instrument_node="">Lighting equipment</span></h5><p data-dcnode-id="1692"><span data-dcnode-id="1702" instrument_node="">A powerful LED headlamp is essential, such as the </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/LED-Lenser-SEO5-Headlamp-Gray/dp/B00BXMSF10/ref%3Dsr_1_1%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1701" instrument_node="">Led Lenser SEO5</span></a><span data-dcnode-id="1699" instrument_node="">, the </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/LED-Lenser-880044-Headlamp-Black/dp/B0053GV2T4/ref%3Dsr_1_2%3Fs%3Dhi%26ie%3DUTF8%26qid%3D1418312125%26sr%3D1-2%26keywords%3DLed%2BLenser%2BH14R%26tag%3Dphoto0b0a-20"><span data-dcnode-id="1698" instrument_node="">H14R</span></a><span data-dcnode-id="1696" instrument_node=""> or the </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZFRbm"><span data-dcnode-id="1695" instrument_node="">H7R.2</span></a><span data-dcnode-id="1693" instrument_node="">. They are light, small, have a great autonomy and allow you to see and focus in the dark.</span></p><p data-dcnode-id="1681"><span data-dcnode-id="1691" instrument_node="">Headlamps with included RED Night Vision Light are the best choice to avoid white flash lights at night. Proven good headlamps with built in red light option are the </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Petzl-TIKKA-Headlamp-Lumens-Orange/dp/B00UAJ1FBE/ref%3Dsr_1_1%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1690" instrument_node="">Petzl Tikka XP</span></a><span data-dcnode-id="1688" instrument_node="">, the </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2yGzd"><span data-dcnode-id="1687" instrument_node="">Pelican 2750</span></a><span data-dcnode-id="1685" instrument_node=""> and the </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZDHbK"><span data-dcnode-id="1684" instrument_node="">Pelican 2760</span></a><span data-dcnode-id="1682" instrument_node="">.</span></p><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">In addition to the headlamp, it's advisable to have at least two flashlights from strong brands such as Coast, Led lenser, Maglite or Surefire.</span></p><p data-dcnode-id="1671"><span data-dcnode-id="1678" instrument_node="">On the one hand, you need a powerful flashlight to illuminate subjects over long distances, such as </span><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2Jp6p74"><span data-dcnode-id="1677" instrument_node="">Coast HP7</span></a><span data-dcnode-id="1675" instrument_node=""> or </span><a data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/LED-Lenser-Lumen-Flashlight-880055/dp/B07R8SNX3B/%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1674" instrument_node="">Led Lenser M7</span></a><span data-dcnode-id="1672" instrument_node="">.</span></p><p data-dcnode-id="1660"><span data-dcnode-id="1670" instrument_node="">On the other hand, you need a second less powerful flashlight, such as the </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0EQzW"><span data-dcnode-id="1669" instrument_node="">Coast TX-10</span></a><span data-dcnode-id="1667" instrument_node="">, the </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0053H4VH8/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D211189%26creative%3D373489%26creativeASIN%3DB0053H4VH8%26link_code%3Das3%26tag%3Dphoto0b0a-20%26linkId%3D2J3EWWSBHRAPKC23"><span data-dcnode-id="1666" instrument_node="">Led Lenser L7</span></a><span data-dcnode-id="1664" instrument_node=""> or the </span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2czJn"><span data-dcnode-id="1663" instrument_node="">Maglite Mini</span></a><span data-dcnode-id="1661" instrument_node=""> to illuminate foreground subjects.</span></p><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">In addition to this, you should have at least 2 </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JjcKRp"><span data-dcnode-id="1658" instrument_node="">LED panels</span></a><span data-dcnode-id="1656" instrument_node="">. These panels are crucial since they provide continuous light and cover a large area, allowing you to easily illuminate the entire foreground, even in panoramas. Sometimes, you'll need or want to combine LED with flashlights.</span></p><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Finally, it's necessary to own a few flashes. Flashes will provide a light source to shoot portraits, lighting inside buildings, etc. If your intention is to make a portrait, it's ideal to also use stands/tripods for flashes and softboxes/octoboxes.</span></p><figure class="portrait" data-dcnode-id="1641"><img class="b-lazy" data-dcnode-id="1652" data-src="/sites/default/files/articles/milky-way/milky-way-portrait.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="400px"><figcaption data-dcnode-id="1642"><span data-dcnode-id="1651" instrument_node="">Nikon Z6 | 85mm | f/1.5 | 4s | ISO 6400 | 3550K</span><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">One of the portraits I took during the 2019 </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/camp"><span data-dcnode-id="1648" instrument_node="">PhotoPills Camp</span></a><span data-dcnode-id="1646" instrument_node=""> (Model: </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marcograssiphotography.com/about-my-travels/"><span data-dcnode-id="1645" instrument_node="">Jessica Lancia</span></a><span data-dcnode-id="1643" instrument_node="">).</span></figcaption></figure><p data-dcnode-id="1633"><span data-dcnode-id="1640" instrument_node="">Don't forget to add a few color correction gels to your bag. </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JkfCO8"><span data-dcnode-id="1639" instrument_node="">CTO</span></a><span data-dcnode-id="1637" instrument_node=""> and </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JkgzGc"><span data-dcnode-id="1636" instrument_node="">CTB</span></a><span data-dcnode-id="1634" instrument_node=""> gels of different intensities are essential. Colored gels are also necessary if you want to create effects, such as adding red or yellow light inside a building.</span></p><figure class="portrait" data-dcnode-id="1629"><img class="b-lazy" data-dcnode-id="1632" data-src="/sites/default/files/articles/milky-way/flash-gels.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Flash with CTO and CTB gels.</span></figcaption></figure><h5 data-dcnode-id="1627" id="id6"><span data-dcnode-id="1628" instrument_node="">Tripod and head</span></h5><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">A carbon fiber tripod is ideal for both supporting the weight of the gear and to be easily carried everywhere you go. These tripods are robust and allow heavy loads (5-25 kg or 11-56 lb) depending on the model.</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Obviously, you should choose a tripod that can support the weight of the tripod head, the camera and the heaviest lens you have. But always leave a marge de manoeuvre just in case you decide to buy heavier gear in the future.</span></p><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Be very careful when working with your carbon fiber tripod during thunderstorms. These tripods can conduct electricity, so they can work as a small lightning rod. Under these weather conditions it's preferably not to use them and to keep them folded in the bag.</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1620" instrument_node="">Brands like </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N1R0sq"><span data-dcnode-id="1619" instrument_node="">Gitzo</span></a><span data-dcnode-id="1617" instrument_node="">, </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N30gMP"><span data-dcnode-id="1616" instrument_node="">Manfrotto</span></a><span data-dcnode-id="1614" instrument_node="">, </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0wR60"><span data-dcnode-id="1613" instrument_node="">Benro</span></a><span data-dcnode-id="1611" instrument_node="">, </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0Rejo"><span data-dcnode-id="1610" instrument_node="">Induro</span></a><span data-dcnode-id="1608" instrument_node=""> and </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZR3EW"><span data-dcnode-id="1607" instrument_node="">Really Right Stuff</span></a><span data-dcnode-id="1605" instrument_node=""> offer tripods of great quality in both materials, carbon and aluminum.</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">In my opinion, the tripod's best friend is a good ballhead. The </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZZhx3"><span data-dcnode-id="1602" instrument_node="">Really Right Stuff BH-55</span></a><span data-dcnode-id="1600" instrument_node=""> is the one that I use. Supporting up to 23 kg (50 lb), it bears the weight of my gear with no problem. It allows me to work comfortably and with great precision.</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1598" instrument_node="">Other ballheads that I like are the </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N26KeZ"><span data-dcnode-id="1597" instrument_node="">Gitzo GH1382QD</span></a><span data-dcnode-id="1595" instrument_node="">, the </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3dpoY"><span data-dcnode-id="1594" instrument_node="">Kirk Enterprises BH-1</span></a><span data-dcnode-id="1592" instrument_node=""> and the </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N2CmBh"><span data-dcnode-id="1591" instrument_node="">Arca Swiss Monoball Z1 SP</span></a><span data-dcnode-id="1589" instrument_node="">, all robust and with very high endurance (minimum 13.5 kg or 30 lb).</span></p><h5 data-dcnode-id="1586" id="id7"><span data-dcnode-id="1587" instrument_node="">Intervalometer</span></h5><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Surely, the wired intervalometers that I've mentioned in the mid-range gear section are a great tool for night photographers, but I love wireless ones.</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">And you're probably wandering why this is such a big deal... Well, because it allows me to comfortably start and stop the camera while I'm lighting the scene or when the camera is in a difficult-to-access place (on a tree).</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">I use the </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/ref%3Dnb_sb_noss_2%3Furl%3Dsearch-alias%253Delectronics%26field-keywords%3DPhottix%2520Aion%2520Wireless%2520Timer%26tag%3Dphoto0b0a-20"><span data-dcnode-id="1580" instrument_node="">Phottix AION</span></a><span data-dcnode-id="1578" instrument_node="">, which has the additional advantage of being connected by wire to any type of camera just by changing the connector jack.</span></p><figure data-dcnode-id="1570"><img class="b-lazy" data-dcnode-id="1576" data-src="/sites/default/files/articles/milky-way/phottix-aion.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1571"><span data-dcnode-id="1575" instrument_node="">The intervalometer I use: the </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/ref%3Dnb_sb_noss_2%3Furl%3Dsearch-alias%253Delectronics%26field-keywords%3DPhottix%2520Aion%2520Wireless%2520Timer%26tag%3Dphoto0b0a-20"><span data-dcnode-id="1574" instrument_node="">Phottix AION</span></a><span data-dcnode-id="1572" instrument_node="">.</span></figcaption></figure><p data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">A great alternative is a device called </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camranger.com/"><span data-dcnode-id="1568" instrument_node="">CamRanger</span></a><span data-dcnode-id="1566" instrument_node="">. Right now it’s available for Nikon, Canon, Fuji and Sony cameras.</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">It's a stand-alone device that you connect to your DSLR or mirrorless camera with a USB cable. It creates an ad hoc WiFi network to which you can connect your smartphone or tablet (iOS, Android and Windows). Thanks to the CamRanger application you can control your camera without a computer or an Internet connection.</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Best of all, this device is independent. Therefore, if your mobile device loses its connection, the CamRanger has an internal memory to keep shooting. Imagine that you are making a timelapse, your sequence would be cut if the camera stops taking pictures in the time frame you’ve set...</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1560" instrument_node="">So the CamRanger is great for many types of photos: timelapses (of the </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/milky-way-photography-guide"><span data-dcnode-id="1559" instrument_node="">Milky Way</span></a><span data-dcnode-id="1557" instrument_node="">, of </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/star-trails-photography-guide"><span data-dcnode-id="1556" instrument_node="">Star Trails</span></a><span data-dcnode-id="1554" instrument_node="">, of a </span><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/solar-eclipse-photography-guide"><span data-dcnode-id="1553" instrument_node="">solar eclipses</span></a><span data-dcnode-id="1551" instrument_node=""> or </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/lunar-eclipse-photography-guide"><span data-dcnode-id="1550" instrument_node="">lunar eclipses</span></a><span data-dcnode-id="1548" instrument_node="">...), </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/exposure-photography-guide-3%23step23"><span data-dcnode-id="1547" instrument_node="">bracketing</span></a><span data-dcnode-id="1545" instrument_node="">, focus stacking for macro and landscapes... and many more!</span></p><h5 data-dcnode-id="1542" id="id8"><span data-dcnode-id="1543" instrument_node="">Memory cards</span></h5><p data-dcnode-id="1531"><span data-dcnode-id="1541" instrument_node="">Get the best quality </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N06QDX"><span data-dcnode-id="1540" instrument_node="">SD Cards</span></a><span data-dcnode-id="1538" instrument_node=""> possible (like </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JFTXix8"><span data-dcnode-id="1537" instrument_node="">SanDisk</span></a><span data-dcnode-id="1535" instrument_node=""> or </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2OsUqqQ"><span data-dcnode-id="1534" instrument_node="">ProGrade</span></a><span data-dcnode-id="1532" instrument_node="">) to minimize the risk of losing your photos and to get the maximum transfer speed.</span></p><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Minimizing the delay between photos is very important when shooting consecutive pictures at high speed.</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">The SDXC UHS-II Class U3 cards are ideal for professional photographers. Their writing performance is excellent and they have an incredibly short time interval between two consecutive exposures.</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">Furthermore, you should use high capacity cards (64GB, 128GB or even 256GB) to avoid running out of memory space right in the middle of a timelapse session or when shooting </span><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="1525" instrument_node="">Meteor Showers</span></a><span data-dcnode-id="1523" instrument_node="">.</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">While there are still cameras that can work with </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3bLDZ"><span data-dcnode-id="1520" instrument_node="">CompactFlash</span></a><span data-dcnode-id="1518" instrument_node=""> (CF) cards, this system is slowly disappearing.</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">And to replace it, SanDisk, Nikon and Sony launched a new card format called </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/31cARqd"><span data-dcnode-id="1515" instrument_node="">XQD</span></a><span data-dcnode-id="1513" instrument_node=""> currently available for several Full Frame (Nikon D4, D4s, D5 and D850; Panasonic S1 and S1R), APS-C (Nikon D500) and mirrorless (Nikon Z6, Z6 II, Z7 and Z7 II) models. These cards</span></p><ul data-dcnode-id="1505"><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Have a very high storage capacity (from 32GB to 256GB).</span></li><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Have a super fast reading and recording speed (400MB/s compared to 160MB/s for a CF card or 250MB/s for an SD card).</span></li><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Are very secure, resistant and with an incredible durability.</span></li></ul><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Their only problem: a high price (for now).</span></p><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Oh, and here's a little trick... ;)</span></p><p data-dcnode-id="1496"><span data-dcnode-id="1500" instrument_node="">You can use the </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="1499" instrument_node="">PhotoPills</span></a><span data-dcnode-id="1497" instrument_node=""> timelapse calculator to work out the total memory space you need, so you make sure you bring enough memory cards.</span></p><h5 data-dcnode-id="1494" id="batteries"><span data-dcnode-id="1495" instrument_node="">Batteries</span></h5><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Battery charging is one of the rituals every photographer must go through before a shooting session. You need to check and fully charge all the batteries of your different cameras and a few more just in case. Depending on the type of camera and of photography, the number of batteries will vary from 2-3 (DSLR) to 6 or more (mirrorless).</span></p><figure data-dcnode-id="1488"><img class="b-lazy" data-dcnode-id="1491" data-src="/sites/default/files/articles/milky-way/batteries.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">It's always a good idea to bring several spare batteries with you.</span></figcaption></figure><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">However, be aware that cold temperatures shorten battery power performance. Therefore, if you plan to run a long shooting session in the cold, you should use a grip with extra batteries. You will minimize the chances of running out of battery power in the middle of a cold winter night.</span></p><p data-dcnode-id="1475"><span data-dcnode-id="1485" instrument_node="">I use a Nikon </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00IMOB5SW/ref%3Das_li_tl%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1484" instrument_node="">D4s</span></a><span data-dcnode-id="1482" instrument_node=""> or a Nikon </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2SD02RZ"><span data-dcnode-id="1481" instrument_node="">Z6</span></a><span data-dcnode-id="1479" instrument_node="">. Both allow me to shoot long timelapse sessions and </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/meteor-shower-photography-guide"><span data-dcnode-id="1478" instrument_node="">Meteor Showers</span></a><span data-dcnode-id="1476" instrument_node=""> without any battery problem.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">If you don't have a grip, but you still want to spend several hours shooting a timelapse, you'll have to replace the battery as quickly as possible.</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Make sure that you don't move the camera in the process, it would be a pity to arrive at home and find out that the whole timelapse has been ruined. At this point, a sturdy tripod and a good headball come into play more than ever... They will allow you to change the battery without moving the camera.</span></p><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Before leaving home, don't forget to check that the batteries of flashlights, LED panels, flashes and headlamp are also fully charged.</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">Finally, it's a good idea to take a </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2JHkewW"><span data-dcnode-id="1467" instrument_node="">portable power bank</span></a><span data-dcnode-id="1465" instrument_node=""> for your smartphone or tablet.</span></p><h5 data-dcnode-id="1462" id="dollies-and-sliders-for-timelapsers"><span data-dcnode-id="1463" instrument_node="">Dollies and sliders (for timelapsers)</span></h5><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">You only need these accessories to make a timelapse.</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Dollies and sliders are wonderful tools that provide motion in a timelapse, either by physically moving the camera along a rail, rotating it around one or more axis or a combination of all movements. As a result, the footage is more dynamic compared with a static timelapse.</span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Depending on your budget, you can purchase sliders that allow different camera movements:</span></p><ul data-dcnode-id="1443"><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">1 Axis: The camera slides along a rail from one end to the other.</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1453" instrument_node="">2 Axis: In addition to slide movement, </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panning_%28camera%29"><span data-dcnode-id="1452" instrument_node="">pan</span></a><span data-dcnode-id="1450" instrument_node=""> or </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tilt_%28camera%29"><span data-dcnode-id="1449" instrument_node="">tilt</span></a><span data-dcnode-id="1447" instrument_node=""> camera movements are allowed, just one of them, not both.</span></li><li data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">3 Axis: The system allows for pro level pan, tilt and slide camera movements.</span></li></ul><p data-dcnode-id="1435"><span data-dcnode-id="1442" instrument_node="">The video 'Ibiza Lights III' produced by </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/joseahervas/"><span data-dcnode-id="1441" instrument_node="">Jose Antonio Hervás</span></a><span data-dcnode-id="1439" instrument_node=""> is a great example of how sliders can be used to create stunning timelapses. Besides, it includes many scenes planned with the </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/"><span data-dcnode-id="1438" instrument_node="">PhotoPills</span></a><span data-dcnode-id="1436" instrument_node=""> app.</span></p><div class="video-wrapper" data-dcnode-id="1433"><iframe allowfullscreen="allowfullscreen" class="b-lazy" data-dcnode-id="1434" data-src="https://player.vimeo.com/video/63691010?badge=0" frameborder="0" fullscreen="" height="414" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="736"></iframe></div><p data-dcnode-id="1420"><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dynamicperception.com/"><span data-dcnode-id="1432" instrument_node="">Dynamic Perception</span></a><span data-dcnode-id="1430" instrument_node="">, </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//syrp.co/"><span data-dcnode-id="1429" instrument_node="">Syrp</span></a><span data-dcnode-id="1427" instrument_node="">, </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pocketslider.de/"><span data-dcnode-id="1426" instrument_node="">PocketSlider</span></a><span data-dcnode-id="1424" instrument_node=""> and </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mslider.com/"><span data-dcnode-id="1423" instrument_node="">mSlider</span></a><span data-dcnode-id="1421" instrument_node=""> are great brands to consider when buying a slider.</span></p><h5 data-dcnode-id="1418" id="equipment-against-moisture"><span data-dcnode-id="1419" instrument_node="">Equipment against moisture</span></h5><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">One of the most annoying aspects of night photography is dealing with dew. Moisture in the air can condense on the cold front surface of your lens, and ruin the photos.</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">These are some of the existing solutions to fight against dew.</span></p><h6 data-dcnode-id="1412" id="hood"><span data-dcnode-id="1413" instrument_node="">Hood</span></h6><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">This is the first element you should use as a protection against dew. The hood is not only great for day use to avoid unwanted reflections of light, it's also very important in night photography. By using a hood, moisture will take longer to condense on the surface of your lens and the lens will be better protected in case it accidentally falls on the ground.</span></p><h6 data-dcnode-id="1408" id="fan"><span data-dcnode-id="1409" instrument_node="">Fan</span></h6><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">A simple PC fan can help you keep the lens dry and without moisture condensation thanks to the steady stream of air generated. It's an ideal solution for nights that are not too wet. Of course, you'll need a power supply that has enough capacity to keep the fan working the whole night shooting session and a support system to guide the fan towards the lens. The good news is that these fans have a very low power consumption.</span></p><figure data-dcnode-id="1402"><img class="b-lazy" data-dcnode-id="1405" data-src="/sites/default/files/articles/milky-way/pc-fan.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The system I use: a PC fan connected to a portable battery.</span></figcaption></figure><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">I particularly use a small portable rechargeable Li-ion 12V 3800mAh battery with a 5.5mm barrel jack and USB connectors. Here, I had to adapt a 5.5mm barrel jack connector to the wire of the fan. Finally, I put the fan onto a flexible loc-line hose adhered to a clamp so it can be attached to the tripod.</span></p><figure class="portrait" data-dcnode-id="1396"><img class="b-lazy" data-dcnode-id="1399" data-src="/sites/default/files/articles/milky-way/camera-fan.webp" height="768px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="768px"><figcaption data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">PC fan and battery attached to the equipment.</span></figcaption></figure><h6 data-dcnode-id="1394" id="dew-heater"><span data-dcnode-id="1395" instrument_node="">Dew heater</span></h6><p data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">The idea behind this tool is to heat the lens to a temperature above the </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dew_point"><span data-dcnode-id="1392" instrument_node="">dew point</span></a><span data-dcnode-id="1390" instrument_node="">, avoiding moisture condensation. You should look for a heater that is light to avoid carrying more weight than necessary as, quite often, reaching points with little light pollution involves long walks.</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">The existing commercial solutions are composed by a heater, a battery and a controller. With the controller you adjust power in order to keep the temperature of the heater above the dew point.</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">On the one hand, the controller gives you the advantage of managing more efficiently the battery power. But, on the other hand, it's another gadget you have to charge and carry. Sometimes it just doesn't pay off to carry so many things.</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">I prefer a cheaper and lighter solution. I use a heater without a controller connected directly to a portable battery. I know, I can't adjust power, but I've tested that this system can provide power for nearly 5 hours. If you need the battery to last longer or you forecast a cold night, just bring an extra battery with you.</span></p><figure data-dcnode-id="1376"><img class="b-lazy" data-dcnode-id="1382" data-src="/sites/default/files/articles/milky-way/dew-heater.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1377"><span data-dcnode-id="1381" instrument_node="">Dew heater </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Dew-Not-Heater-Strip-DN004/dp/B003UNN8Z8%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1380" instrument_node="">Dew-Not 3" DN004</span></a><span data-dcnode-id="1378" instrument_node=""> connected to a portable battery.</span></figcaption></figure><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Summing up, all you need is a heater strip, a battery and a cable to connect the heater to the battery.</span></p><ul data-dcnode-id="1349"><li data-dcnode-id="1358"><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Heater strip.</span></strong><span data-dcnode-id="1371" instrument_node=""> Perhaps, the two most popular heater strip brands are </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dew-not.com/"><span data-dcnode-id="1370" instrument_node="">Dew-Not</span></a><span data-dcnode-id="1368" instrument_node=""> and </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kendrickastro.com/"><span data-dcnode-id="1367" instrument_node="">Kendrick</span></a><span data-dcnode-id="1365" instrument_node="">. I use a </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Dew-Not-Heater-Strip-DN004/dp/B003UNN8Z8%3Ftag%3Dphoto0b0a-20"><span data-dcnode-id="1364" instrument_node="">Dew-Not 3" DN004</span></a><span data-dcnode-id="1362" instrument_node="">, which perfectly fits my </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1361" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="1359" instrument_node="">. This model has a length of 33cm (13"), long enough to cover the diameter of the lens. Make sure you buy a strip that can go around the entire circumference of the lens.</span></li><li data-dcnode-id="1354"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Battery.</span></strong><span data-dcnode-id="1355" instrument_node=""> As for the power supply for the heater strip, I use a 12V 3800mAh battery. The same battery I use to power the PC fan described in the previous section serves well. Bringing a spare battery is always a good idea.</span></li><li data-dcnode-id="1350"><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Cable connector.</span></strong><span data-dcnode-id="1351" instrument_node=""> Most heater strips have a male RCA connector, while portable batteries have a 5.5mm barrel jack connector. Therefore, you need to purchase a RCA/Jack 5.5mm adapter. I built mine from a RCA cable and a 5.5mm barrel jack.</span></li></ul><figure class="portrait" data-dcnode-id="1345"><img class="b-lazy" data-dcnode-id="1348" data-src="/sites/default/files/articles/milky-way/camera-dew-heater.webp" height="768px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="768px"><figcaption data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Dew heater and battery attached to the equipment.</span></figcaption></figure><p data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">Another great heater is the </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theheatcompany.com/en-us/warmers/multi-bodywarmer"><span data-dcnode-id="1343" instrument_node="">multi-bodywarmer by TheHeatCompany</span></a><span data-dcnode-id="1341" instrument_node="">.</span></p><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">These heaters are used by photographers, film crews and athletes all over the world, and you'll never run into battery problems with them. Just tape one on the bottom of your lens. That's it.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">Finally, make sure you also bring with you a comfortable chair, drinks, snacks, your favorite music (</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pinkfloyd.com/"><span data-dcnode-id="1336" instrument_node="">Pink Floyd</span></a><span data-dcnode-id="1334" instrument_node=""> in my case) and a portable battery charger to keep all electronic equipment charged, including the speakers!</span></p><p data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node="">Starting a night shooting session with </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFk0V_GGa2XM"><span data-dcnode-id="1331" instrument_node="">"Shine On Crazy Diamond"</span></a><span data-dcnode-id="1329" instrument_node=""> is priceless... ;)</span></p><h4 data-dcnode-id="1326" id="comparing-basic-advanced-and-professional-equipment-performance"><span data-dcnode-id="1327" instrument_node="">Comparing basic, advanced and professional equipment performance</span></h4><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Above, I've explained the different types of equipment (basic, advanced and pro) you can find in the market. Now, I'd like to show you how these equipments perform when you try to shoot the Milky Way.</span></p><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">For this test, I used the following gear:</span></p><ul data-dcnode-id="1311"><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Sony RX-100 III (compact camera with 1" sensor)</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Nikon D3000 (basic APS-C sensor) + 18-55mm f3.5-5.6</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Nikon D7000 (advanced APS-C sensor) + Tokina 11-16mm f2.8</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Nikon D600 (advanced Full Frame sensor) + Samyang 14mm f2.8</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Nikon D700 (pro Full Frame sensor) + Nikkor 14-24 f2.8</span></li></ul><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">To compare the quality of these different combinations of cameras and lenses, I shot the following images from the same spot and kept (almost) the same framing.</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">All pictures were shot at a white balance of 3800K or at tungsten white balance (WB) when the camera didn't allow to set the white balance manually. The post-processing is exactly the same in all images. To do so, I created a preset in </span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clk.tradedoubler.com/click%3Fp%3D264355%26a%3D3003963%26g%3D24067048"><span data-dcnode-id="1307" instrument_node="">Lightroom</span></a><span data-dcnode-id="1305" instrument_node=""> which I applied to all the images.</span></p><div class="two-figures" data-dcnode-id="1293"><div data-dcnode-id="1299"><figure data-dcnode-id="1300"><img class="b-lazy" data-dcnode-id="1303" data-src="/sites/default/files/articles/milky-way/rx100-2w.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Sony RX-100 III | 8.8mm (24mm equivalent) | f/2.8 | 30s | ISO 3200 - It shows serious problems of luminance and chromatic noise at high ISO. Because the lens is not a wide angle, I got a narrow angle of view. Notice that the Milky Way doesn't fit in the frame. Finally, it suffers from coma.</span></figcaption></figure></div><div data-dcnode-id="1294"><figure data-dcnode-id="1295"><img class="b-lazy" data-dcnode-id="1298" data-src="/sites/default/files/articles/milky-way/d3000-3w.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="335px"><figcaption data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Nikon D3000 + 18-55mm f3.5-5.6 | 18mm (27mm equivalent) | f/3.5 | 30s | ISO 1600 - It presents a lot of luminance, chromatic and thermal noise (top left corner) at ISO 1600. The lens is not fast and has a narrow angle of view. The Milky Way doesn't fit in the frame. It also presents coma.</span></figcaption></figure></div></div><div class="two-figures" data-dcnode-id="1282"><div data-dcnode-id="1288"><figure data-dcnode-id="1289"><img class="b-lazy" data-dcnode-id="1292" data-src="/sites/default/files/articles/milky-way/d7000-1w.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="331px"><figcaption data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Nikon D7000 + Tokina 11-16mm f2.8 | 11mm (16.5mm equivalent) | f/2.8 | 30s | ISO 3200 - It presents luminance and chromatic noise at ISO 3200, but considering that I'm using a cropped sensor camera, the results are acceptable. The lens is fast enough to capture a nice number of stars. Furthermore, being a wide angle lens, I managed to capture both the tree and the Milky Way.</span></figcaption></figure></div><div data-dcnode-id="1283"><figure data-dcnode-id="1284"><img class="b-lazy" data-dcnode-id="1287" data-src="/sites/default/files/articles/milky-way/d600-1w.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="334px"><figcaption data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Nikon D600 + Samyang 14mm f2.8 | 14mm | f/2.8 | 30s | ISO 3200 - Luminance and chromatic noise level is quite low at ISO 3200. Also, the performance of the Samyang lens is more than acceptable.</span></figcaption></figure></div></div><figure class="portrait" data-dcnode-id="1278"><img class="b-lazy" data-dcnode-id="1281" data-src="/sites/default/files/articles/milky-way/d700-5w.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Nikon D700 + Nikkor 14-24mm f2.8 | 14mm | f/2.8 | 30s | ISO 3200 - Luminance and chromatic noise level is low at ISO 3200. It's the perfect combination of camera body and lens for night sky photography. The detail of the stars is perfect.</span></figcaption></figure><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">To sum up, the best option for photographing the Milky Way regardless of the gear you have is the combination of a Full Frame camera and a wide angle lens (with a focal length of 14mm for instance), and as fast as possible, (such as f/2.8).</span></p><h3 data-dcnode-id="1272" id="step9"><span class="step" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">9.</span></span><span data-dcnode-id="1273" instrument_node="">How to photograph the Milky Way step by step</span></h3><figure class="portrait" data-dcnode-id="1268"><img class="b-lazy" data-dcnode-id="1271" data-src="/sites/default/files/articles/milky-way/german-gil.webp" height="500px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="333px"><figcaption data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Nikon D4s | 35mm | f/1.4 | 13s | ISO 6400</span></figcaption></figure><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">You got an idea.</span></p><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">You planned it, maybe a few months ago.</span></p><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">And finally, you find yourself in a beautiful outdoor location with dark skies.</span></p><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">You've worked out all the Milky Way camera settings... And you're ready to make a photograph.</span></p><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">You might prefer enjoying the scene alone, but why not sharing the adventure with some friends for a change?</span></p><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">I believe in associationism as a way of helping others and sharing knowledge, enriching each one's photography. When I'm with my students, they make the shooting both more interesting and challenging.</span></p><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">In any case, getting to the location well in advance is key!</span></p><figure data-dcnode-id="1252"><img class="b-lazy" data-dcnode-id="1253" data-src="/sites/default/files/articles/milky-way/students.webp" height="310px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"></figure><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Let's see how to set up everything for the shooting session, step by step.</span></p><h4 data-dcnode-id="1248" id="get-to-your-shooting-spot-in-advance"><span data-dcnode-id="1249" instrument_node="">Get to your shooting spot in advance</span></h4><p data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">You can use the </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.photopills.com/articles/how-plan-milky-way-using-augmented-reality"><span data-dcnode-id="1246" instrument_node="">PhotoPills Night Augmented Reality view</span></a><span data-dcnode-id="1244" instrument_node=""> to double-check you're at the right spot and that you'll have the Milky Way where you want.</span></p><h4 data-dcnode-id="1241" id="place-the-tripod-ballhead-camera-and-lens"><span data-dcnode-id="1242" instrument_node="">Place the tripod, ballhead, camera, and lens</span></h4><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Place your tripod on a solid surface, right on the shooting spot you thoughtfully planned.</span></p><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Then, make sure the tripod is stable and attach the fastest and widest lens you have to your camera. Basically what you want here is a wide angle lens to maximize your exposure time, and with a wide aperture to capture as much light as possible.</span></p><p data-dcnode-id="1226"><span data-dcnode-id="1236" instrument_node="">To photograph the Milky Way and the natural bridge, I used my Nikon D700 Full Frame camera and a </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1235" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="1233" instrument_node=""> lens on my </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N0wR60"><span data-dcnode-id="1232" instrument_node="">Benro</span></a><span data-dcnode-id="1230" instrument_node=""> A4580T tripod legs with a </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2N3dpoY"><span data-dcnode-id="1229" instrument_node="">Kirk Enterprises BH-1</span></a><span data-dcnode-id="1227" instrument_node=""> head.</span></p><figure data-dcnode-id="1219"><img class="b-lazy" data-dcnode-id="1225" data-src="/sites/default/files/articles/milky-way/d700-14-24.webp" height="493px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="740px"><figcaption data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">My Nikon D700 with the </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bhpho.to/2MZPirk"><span data-dcnode-id="1223" instrument_node="">Nikon 14-24mm f/2.8</span></a><span data-dcnode-id="1221" instrument_node="">.</span></figcaption></figure><h4 data
