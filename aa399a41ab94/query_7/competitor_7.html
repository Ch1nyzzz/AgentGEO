</span><p data-dcnode-id="4281" style="text-align: justify;"><span data-dcnode-id="4285" instrument_node="">Having a </span><strong data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Milky Way Calendar</span></strong><span data-dcnode-id="4282" instrument_node=""> makes life much easier when you are planning new images and trips.</span></p><p data-dcnode-id="4271" style="text-align: justify;"><span data-dcnode-id="4280" instrument_node="">We all know the importance of planning when you want to </span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/how-to-photograph-the-milky-way/" rel="noopener" target="_blank"><strong data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">photograph the Milky Way</span></strong></a><span data-dcnode-id="4276" instrument_node="">. Our galaxy is visible for a certain period of time depending on the month, day, time of day, and latitude. Knowing&nbsp;</span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/best-time-to-see-the-milky-way/" rel="noopener" target="_blank"><strong data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">when is the best time to see the Milky Way</span></strong></a><span data-dcnode-id="4272" instrument_node=""> in your location is important, but there are more factors to consider.</span></p><p data-dcnode-id="4263" style="text-align: justify;"><span data-dcnode-id="4270" instrument_node="">To help you, we create these </span><strong data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Milky Way viewing calendars</span></strong><span data-dcnode-id="4267" instrument_node="">&nbsp;every year where you can </span><strong data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">see, at a glance, the best days to photograph the Milky Way in your location</span></strong><span data-dcnode-id="4264" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="4253" id="attachment_169580" style="width: 503px"><picture aria-describedby="caption-attachment-169580" class="wp-image-169580 size-full" data-dcnode-id="4257" loading="lazy" title="2022 Milky Way Viewing Calendar Capture the Atlas"><span data-dcnode-id="4262" instrument_node="">

tching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="3721" style="text-align: justify;"><strong data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Which Milky Way viewing Calendar should I use?</span></strong></h2><p data-dcnode-id="3716" style="text-align: justify;"><span data-dcnode-id="3720" instrument_node="">We always create&nbsp;</span><strong data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Milky Way calendars for 20 different regions on Earth</span></strong><span data-dcnode-id="3717" instrument_node="">, so it’s very likely that there’ll be a specific Calendar for your area:</span></p><ul data-dcnode-id="3632"><li data-dcnode-id="3712" style="text-align: justify;"><strong data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">UK Milky Way Calendar</span></strong><span data-dcnode-id="3713" instrument_node=""> (Snowdonia)- Latitude 53ºN</span></li><li data-dcnode-id="3708" style="text-align: justify;"><strong data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">Northern Europe Milky Way Calendar</span></strong><span data-dcnode-id="3709" instrument_node=""> (Berlin) – Latitude 52ºN</span></li><li data-dcnode-id="3704" style="text-align: justify;"><strong data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Canada Milky Way Calendar</span></strong><span data-dcnode-id="3705" instrument_node=""> (Banff)- Latitude 51ºN</span></li><li data-dcnode-id="3700" style="text-align: justify;"><strong data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Central Europe Milky Way Calendar</span></strong><span data-dcnode-id="3701" instrument_node=""> (Dolomites) – Latitude 46ºN</span></li><li data-dcnode-id="3696" style="text-align: justify;"><strong data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">PNW USA Milky Way Calendar</span></strong><span data-dcnode-id="3697" instrument_node=""> (Oregon) – Latitude 45ºN</span></li><li data-dcnode-id="3692" style="text-align: justify;"><strong data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">East Coast USA Milky Way Calendar</span></strong><span data-dcnode-id="3693" instrument_node=""> (Pennsylvania) – Latitude 42ºN</span></li><li data-dcnode-id="3688" style="text-align: justify;"><strong data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Southern Europe Milky Way Calendar</span></strong><span data-dcnode-id="3689" instrument_node=""> (Madrid) – Latitude 40ºN</span></li><li data-dcnode-id="3684" style="text-align: justify;"><strong data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Midwest USA Milky Way Calendar</span></strong><span data-dcnode-id="3685" instrument_node=""> (Denver) – Latitude 39ºN</span></li><li data-dcnode-id="3680" style="text-align: justify;"><strong data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Southwest USA Milky Way Calendar</span></strong><span data-dcnode-id="3681" instrument_node=""> (Death Valley) – Latitude 36ºN</span></li><li data-dcnode-id="3676" style="text-align: justify;"><strong data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Southern USA Milky Way Calendar</span></strong><span data-dcnode-id="3677" instrument_node=""> (San Antonio) – Latitude 29ºN</span></li><li data-dcnode-id="3672" style="text-align: justify;"><strong data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Canary Islands Milky Way Calendar</span></strong><span data-dcnode-id="3673" instrument_node=""> (Tenerife) – Latitude 28ºN</span></li><li data-dcnode-id="3668" style="text-align: justify;"><strong data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">India Milky Way Calendar</span></strong><span data-dcnode-id="3669" instrument_node=""> (Kolkata) – Latitude 23ºN</span></li><li data-dcnode-id="3664" style="text-align: justify;"><strong data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Mexico &nbsp;Milky Way Calendar</span></strong><span data-dcnode-id="3665" instrument_node="">&nbsp; (Toluca) – Latitude 20ºN</span></li><li data-dcnode-id="3657" style="text-align: justify;"><strong data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Southeast Asia Milky Way</span></strong><span data-dcnode-id="3661" instrument_node=""> </span><strong data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">Calendar</span></strong><span data-dcnode-id="3658" instrument_node=""> (Bangkok) – Latitude 14ºN</span></li><li data-dcnode-id="3653" style="text-align: justify;"><strong data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Central America &amp; Caribbean Milky Way Calendar</span></strong><span data-dcnode-id="3654" instrument_node=""> (San Jose) – Latitude 10ºN</span></li><li data-dcnode-id="3649" style="text-align: justify;"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Equator Milky Way Calendar</span></strong><span data-dcnode-id="3650" instrument_node=""> (Bogota) – Latitude 4ºN</span></li><li data-dcnode-id="3645" style="text-align: justify;"><strong data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Indonesia Milky Way Calendar</span></strong><span data-dcnode-id="3646" instrument_node=""> (Bali) – Latitude 5ºS</span></li><li data-dcnode-id="3641" style="text-align: justify;"><strong data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Australia Milky Way Calendar</span></strong><span data-dcnode-id="3642" instrument_node=""> (Sydney) – Latitude 33ºS</span></li><li data-dcnode-id="3637" style="text-align: justify;"><strong data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">New Zealand Milky Way Calendar</span></strong><span data-dcnode-id="3638" instrument_node=""> (Milford Sound) – Latitude 44ºS</span></li><li data-dcnode-id="3633" style="text-align: justify;"><strong data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Patagonia Milky Way Calendar</span></strong><span data-dcnode-id="3634" instrument_node=""> (“Torres del Paine”) – Latitude 50ºS</span></li></ul><p data-dcnode-id="3624" style="text-align: justify;"><span data-dcnode-id="3631" instrument_node="">Besides, our</span><strong data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node=""> Milky Way calendars are based on latitude,</span></strong><span data-dcnode-id="3628" instrument_node=""> so even if there isn’t a calendar for your area, you can still&nbsp;</span><strong data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">use a calendar from the closest latitude</span></strong><span data-dcnode-id="3625" instrument_node="">. The data and best days to shoot the Milky Way will be the same; you just have to consider any possible time difference.</span></p><p data-dcnode-id="3617" style="text-align: justify;"><span data-dcnode-id="3623" instrument_node="">You can see the latitude in our </span><strong data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">list of Milky Way calendars</span></strong><span data-dcnode-id="3620" instrument_node=""> as well as in the </span><strong data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">bottom-right corner of each calendar:</span></strong></p><p data-dcnode-id="3609"><picture class="aligncenter wp-image-52499 size-full" data-dcnode-id="3611" loading="lazy" title="Milky Way planning Calendar"><span data-dcnode-id="3616" instrument_node="">
</span><source data-dcnode-id="3615" sizes="(max-width: 894px) 100vw, 894px" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/Latitude-Milky-Way-Calendar.jpg.webp 894w, https://capturetheatlas.com/wp-content/uploads/2020/12/Latitude-Milky-Way-Calendar-300x12.jpg.webp 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/Latitude-Milky-Way-Calendar-768x32.jpg.webp 768w" type="image/webp"><span data-dcnode-id="3614" instrument_node="">

</span></picture><span data-dcnode-id="3610" instrument_node="">
</span></p><p data-dcnode-id="3604" style="text-align: justify;"><span data-dcnode-id="3608" instrument_node="">As an </span><strong data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">example</span></strong><span data-dcnode-id="3605" instrument_node="">, if you want to photograph the Milky Way in Cape Town, South Africa:</span></p><ul data-dcnode-id="3598" style="text-align: justify;"><li data-dcnode-id="3599"><span data-dcnode-id="3603" instrument_node="">Search the region in our </span><strong data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Milky Way calendar list</span></strong><span data-dcnode-id="3600" instrument_node="">. We don’t have a specific calendar for South Africa, but let’s check which calendar you could use for that area.</span></li></ul><ul data-dcnode-id="3589" style="text-align: justify;"><li data-dcnode-id="3590"><span data-dcnode-id="3597" instrument_node="">Use </span><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latlong.net/"><span data-dcnode-id="3596" instrument_node="">this site</span></a><span data-dcnode-id="3594" instrument_node=""> or do a quick search in Google to </span><strong data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">see the latitude at your location</span></strong><span data-dcnode-id="3591" instrument_node="">. In this case, we’ll check the latitude at Cape Town, South Africa:</span></li></ul><p data-dcnode-id="3581" style="text-align: justify;"><picture class="aligncenter wp-image-52501 size-full" data-dcnode-id="3583" loading="lazy" title="Best Milky Way Calendar for USA"><span data-dcnode-id="3588" instrument_node="">

</span><img alt="USA Milky Way Calendar" data-dcnode-id="3585" height="389" loading="lazy" sizes="(max-width: 899px) 100vw, 899px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-almanac-latitude-.jpg&amp;raw" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-almanac-latitude-.jpg 899w, https://capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-almanac-latitude--300x130.jpg 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-almanac-latitude--768x332.jpg 768w, https://capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-almanac-latitude--878x380.jpg 878w" width="899"><span data-dcnode-id="3584" instrument_node="">
</span></picture><span data-dcnode-id="3582" instrument_node="">
</span></p><blockquote data-dcnode-id="3577"><p data-dcnode-id="3578" style="text-align: justify;"><em data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">If you live in a big country with regions at different latitudes, search for your specific location.</span></em></p></blockquote><ul data-dcnode-id="3571" style="text-align: justify;"><li data-dcnode-id="3572"><span data-dcnode-id="3576" instrument_node="">Now, we’ll look for the </span><strong data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">closest Milky Way chart in the list</span></strong><span data-dcnode-id="3573" instrument_node=""> with a latitude of -33:</span></li></ul><p data-dcnode-id="3563"><picture class="aligncenter wp-image-52507" data-dcnode-id="3565" loading="lazy" title="Australia Milky Way viewing Calendar"><span data-dcnode-id="3570" instrument_node="">
</span><source data-dcnode-id="3569" sizes="(max-width: 493px) 100vw, 493px" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars.jpg.webp 700w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-300x300.jpg.webp 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-150x150.jpg.webp 150w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-90x90.jpg.webp 90w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-380x380.jpg.webp 380w" type="image/webp"><span data-dcnode-id="3568" instrument_node="">
</span><img alt="Milky Way Calendars list" data-dcnode-id="3567" height="493" loading="lazy" sizes="(max-width: 493px) 100vw, 493px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars.jpg&amp;raw" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars.jpg 700w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-300x300.jpg 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-150x150.jpg 150w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-90x90.jpg 90w, https://capturetheatlas.com/wp-content/uploads/2020/12/Astrophotography-Calendars-380x380.jpg 380w" width="493"><span data-dcnode-id="3566" instrument_node="">
</span></picture><span data-dcnode-id="3564" instrument_node="">
</span></p><p data-dcnode-id="3558" style="text-align: justify;"><span data-dcnode-id="3562" instrument_node="">As you can see, Sydney is located at the closest latitude to Cape Town. Therefore, the </span><strong data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Australia Milky Way calendar</span></strong><span data-dcnode-id="3559" instrument_node="">, which is based in Sydney, would be the most accurate for your location.</span></p><h1 data-dcnode-id="3555" style="text-align: justify;"><strong data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">How to use the Milky Way Calendar?</span></strong></h1><p data-dcnode-id="3550" style="text-align: justify;"><span data-dcnode-id="3554" instrument_node="">Each </span><strong data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">2022 Milky Way viewing Calendar</span></strong><span data-dcnode-id="3551" instrument_node=""> shows the most relevant data you have to consider to see the Milky Way. From left to right, the columns will show you:</span></p><p data-dcnode-id="3542"><picture class="aligncenter wp-image-52509" data-dcnode-id="3544" loading="lazy" title="Milky Way viewing chart"><span data-dcnode-id="3549" instrument_node="">
</span><source data-dcnode-id="3548" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-Calendar-Data.jpg.webp" type="image/webp"><span data-dcnode-id="3547" instrument_node="">
</span><img alt="Milky Way Calendar Data" data-dcnode-id="3546" height="110" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/wp-content/uploads/2020/12/Milky-Way-Calendar-Data.jpg&amp;raw" width="616"><span data-dcnode-id="3545" instrument_node="">
</span></picture><span data-dcnode-id="3543" instrument_node="">
</span></p><h3 data-dcnode-id="3540" style="text-align: justify;"><span data-dcnode-id="3541" instrument_node="">Date</span></h3><p data-dcnode-id="3532" style="text-align: justify;"><span data-dcnode-id="3539" instrument_node="">Our </span><strong data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Milky Way almanac</span></strong><span data-dcnode-id="3536" instrument_node=""> takes as a </span><strong data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">reference every Saturday night of the year</span></strong><span data-dcnode-id="3533" instrument_node="">. Please note that, as a rule of thumb, the two days before and two days after each Saturday will be similar.</span></p><p data-dcnode-id="3512" style="text-align: justify;"><em data-dcnode-id="3513"><strong data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Ex</span></strong><span data-dcnode-id="3529" instrument_node="">. If Saturday, June 25</span><sup data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">th</span></sup><span data-dcnode-id="3526" instrument_node="">, 2022 is one of the best days to shoot the Milky Way, Thursday the 23</span><span data-dcnode-id="3524" style="font-size: 12px;"><span data-dcnode-id="3525" instrument_node="">rd</span></span><span data-dcnode-id="3523" instrument_node="">, Friday the 24</span><sup data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">th</span></sup><span data-dcnode-id="3520" instrument_node="">, Sunday the 26</span><sup data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">th</span></sup><span data-dcnode-id="3517" instrument_node="">, and Monday the 27</span><sup data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">th</span></sup><span data-dcnode-id="3514" instrument_node=""> will also be good days.</span></em></p><h3 data-dcnode-id="3510" style="text-align: justify;"><span data-dcnode-id="3511" instrument_node="">Moon</span></h3><p data-dcnode-id="3508" style="text-align: justify;"><span data-dcnode-id="3509" instrument_node="">The moon is one of the key elements affecting Milky Way visibility. Here you’ll find:</span></p><ul data-dcnode-id="3500" style="text-align: justify;"><li data-dcnode-id="3501"><strong data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">Illumination</span></strong><span data-dcnode-id="3505" instrument_node="">: The percentage of moon brightness. We consider </span><strong data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">more than 30% as too bright</span></strong><span data-dcnode-id="3502" instrument_node=""> to see the Milky Way.</span></li></ul><ul data-dcnode-id="3495" style="text-align: justify;"><li data-dcnode-id="3496"><strong data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Moonrise</span></strong><span data-dcnode-id="3497" instrument_node="">: The time the moon rises. When there’s “+1” by the hour it means that the moon is rising the following day (Sunday).</span></li></ul><ul data-dcnode-id="3490" style="text-align: justify;"><li data-dcnode-id="3491"><strong data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Moonset</span></strong><span data-dcnode-id="3492" instrument_node="">: The time the moon sets. The “+1” by the number means that the moon is setting the following day (Sunday).</span></li></ul><h3 data-dcnode-id="3488" style="text-align: justify;"><span data-dcnode-id="3489" instrument_node="">Sun</span></h3><p data-dcnode-id="3483" style="text-align: justify;"><span data-dcnode-id="3487" instrument_node="">Here you’ll find the </span><strong data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">sunset and sunrise time</span></strong><span data-dcnode-id="3484" instrument_node=""> at that particular latitude. The Milky Way can only be visible in that timeframe.</span></p><h3 data-dcnode-id="3481" style="text-align: justify;"><span data-dcnode-id="3482" instrument_node="">Milky Way</span></h3><p data-dcnode-id="3476" style="text-align: justify;"><span data-dcnode-id="3480" instrument_node="">The time the Milky Way is in the sky. In these columns, you’ll find the </span><strong data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">start and end time</span></strong><span data-dcnode-id="3477" instrument_node=""> as well as the total number of hours.</span></p><h3 data-dcnode-id="3474" style="text-align: justify;"><span data-dcnode-id="3475" instrument_node="">Galactic Center Visibility</span></h3><p data-dcnode-id="3466" style="text-align: justify;"><span data-dcnode-id="3473" instrument_node="">This is the </span><strong data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">most important column</span></strong><span data-dcnode-id="3470" instrument_node="">. It considers the </span><strong data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">time the Galactic Center is visible</span></strong><span data-dcnode-id="3467" instrument_node=""> considering all the previous factors.</span></p><p data-dcnode-id="3458" style="text-align: justify;"><span data-dcnode-id="3465" instrument_node="">Here you’ll find the </span><strong data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">start and end time</span></strong><span data-dcnode-id="3462" instrument_node=""> where you’ll be able to see and shoot the Milky Way in the sky, as well as the </span><strong data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">total number of hours</span></strong><span data-dcnode-id="3459" instrument_node="">.</span></p><p data-dcnode-id="3453" style="text-align: justify;"><span data-dcnode-id="3457" instrument_node="">The number of hours also determines the </span><strong data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">best days to shoot the Milky Way</span></strong><span data-dcnode-id="3454" instrument_node="">, which are marked in three different colors:</span></p><ul data-dcnode-id="3440" style="text-align: justify;"><li data-dcnode-id="3449"><strong data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Dark Blue</span></strong><span data-dcnode-id="3450" instrument_node="">: Days where the Milky Way is not visible</span></li><li data-dcnode-id="3445"><strong data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Blue</span></strong><span data-dcnode-id="3446" instrument_node="">: Days where the Milky Way is only visible for a short time</span></li><li data-dcnode-id="3441"><strong data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Red</span></strong><span data-dcnode-id="3442" instrument_node="">: Best days to photograph the Milky Way</span></li></ul><blockquote data-dcnode-id="3428"><p data-dcnode-id="3437" style="text-align: justify;"><em data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">We only consider the “best days” to be those with 3+ hours of Milky Way visibility. Please note that some regions like Northern Europe, the UK, and Canada don’t have “best days” marked in red since the max. Milky Way visibility is below 1.5 hours.</span></em></p><p data-dcnode-id="3429"><picture class="aligncenter wp-image-52511" data-dcnode-id="3431" loading="lazy" title="Milky Way chart Capture the Atlas"><span data-dcnode-id="3436" instrument_node="">
</span><source data-dcnode-id="3435" sizes="(max-width: 524px) 100vw, 524px" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar-.jpg.webp 899w, https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar--300x78.jpg.webp 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar--768x199.jpg.webp 768w" type="image/webp"><span data-dcnode-id="3434" instrument_node="">
</span><img alt="Capture the Atlas Milky Way viewing chart" data-dcnode-id="3433" height="136" loading="lazy" sizes="(max-width: 524px) 100vw, 524px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar-.jpg&amp;raw" srcset="https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar-.jpg 899w, https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar--300x78.jpg 300w, https://capturetheatlas.com/wp-content/uploads/2020/12/UK-Milky-Way-Calendar--768x199.jpg 768w" width="524"><span data-dcnode-id="3432" instrument_node="">
</span></picture><span data-dcnode-id="3430" instrument_node="">
</span></p></blockquote><h3 data-dcnode-id="3426" style="text-align: justify;"><span data-dcnode-id="3427" instrument_node="">Galactic Center Position</span></h3><p data-dcnode-id="3418" style="text-align: justify;"><span data-dcnode-id="3425" instrument_node="">The last column of our </span><strong data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">2022 Milky Way planner</span></strong><span data-dcnode-id="3422" instrument_node=""> shows the </span><strong data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Galactic Center elevation in the sky</span></strong><span data-dcnode-id="3419" instrument_node="">. Here you should consider the following:</span></p><ul data-dcnode-id="3407" style="text-align: justify;"><li data-dcnode-id="3408"><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Arch</span></strong><span data-dcnode-id="3415" instrument_node="">: Any degree of elevation </span><strong data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">from 0º up to 60º</span></strong><span data-dcnode-id="3412" instrument_node="">. In this range, you’ll be able to</span><strong data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node=""> shoot the Milky Way arch</span></strong><span data-dcnode-id="3409" instrument_node=""> in the sky.</span></li></ul><ul data-dcnode-id="3396" style="text-align: justify;"><li data-dcnode-id="3397"><strong data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Vertical</span></strong><span data-dcnode-id="3404" instrument_node="">: From </span><strong data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">60º to 90º</span></strong><span data-dcnode-id="3401" instrument_node="">. In this range, you’ll be able to </span><strong data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">shoot the Milky Way as a diagonal or vertical band</span></strong><span data-dcnode-id="3398" instrument_node=""> in the sky.</span></li></ul><blockquote data-dcnode-id="3392"><p data-dcnode-id="3393" style="text-align: justify;"><em data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">When you see a negative value like “Vertical (85º) – Vertical (-80º)”, it means that the Milky Way starts being visible at 85º, and it moves until it’s completely vertical at 90º, then moves until it disappears at 80º but on the other side of the sky.</span></em></p></blockquote><div class="wp-caption aligncenter" data-dcnode-id="3382" id="attachment_47630" style="width: 477px"><picture aria-describedby="caption-attachment-47630" class="wp-image-47630 size-full" data-dcnode-id="3386" loading="lazy" title="Milky Way photography planner"><span data-dcnode-id="3391" instrument_node="">
</span><source data-dcnode-id="3390" sizes="(max-width: 467px) 100vw, 467px" srcset="https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah.jpg.webp 467w, https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah-200x300.jpg.webp 200w, https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah-254x380.jpg.webp 254w" type="image/webp"><span data-dcnode-id="3389" instrument_node="">
</span><img alt="Milky Way degrees planner" aria-describedby="caption-attachment-47630" data-dcnode-id="3388" height="700" loading="lazy" sizes="(max-width: 467px) 100vw, 467px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah.jpg&amp;raw" srcset="https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah.jpg 467w, https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah-200x300.jpg 200w, https://capturetheatlas.com/wp-content/uploads/2020/11/Milky-Way-Utah-254x380.jpg 254w" width="467"><span data-dcnode-id="3387" instrument_node="">
</span></picture><span data-dcnode-id="3385" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="3383" id="caption-attachment-47630"><span data-dcnode-id="3384" instrument_node="">Vertical Milky Way band at 90º</span></p></div><h2 data-dcnode-id="3379" style="text-align: justify;"><strong data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">Other things to consider</span></strong></h2><p data-dcnode-id="3374" style="text-align: justify;"><span data-dcnode-id="3378" instrument_node="">After downloading your&nbsp;</span><strong data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Milky Way astrophotography chart</span></strong><span data-dcnode-id="3375" instrument_node="">&nbsp;to plan your night photography sessions, I also recommend checking a few more things so you can capture the best possible images:</span></p><ul data-dcnode-id="3365"><li data-dcnode-id="3366" style="text-align: justify;"><strong data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Light Pollution Map</span></strong><span data-dcnode-id="3371" instrument_node="">: Use a </span><strong data-dcnode-id="3368"><a data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightpollutionmap.info/%23zoom%3D4.22%26lat%3D43.8665%26lon%3D-81.6951%26layers%3DB0TFFFFFFFFFFFFFFF" rel="noopener" target="_blank"><span data-dcnode-id="3370" instrument_node="">light pollution map like this</span></a></strong><span data-dcnode-id="3367" instrument_node=""> to check the darkest locations near you or the area you’re visiting.</span></li></ul><ul data-dcnode-id="3352"><li data-dcnode-id="3353" style="text-align: justify;"><strong data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Cloud Coverage</span></strong><span data-dcnode-id="3362" instrument_node="">: Check the weather forecast to see the clouds, humidity, haze, and other conditions that affect the night-sky visibility. For this, you can use </span><strong data-dcnode-id="3359"><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weather.gov/" rel="noopener" target="_blank"><span data-dcnode-id="3361" instrument_node="">NOAA</span></a></strong><span data-dcnode-id="3358" instrument_node=""> or an app like </span><strong data-dcnode-id="3355"><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.windy.com/es/-Nubes-clouds%3Fclouds%2C36.457%2C-93.625%2C5" rel="noopener" target="_blank"><span data-dcnode-id="3357" instrument_node="">Windy</span></a></strong><span data-dcnode-id="3354" instrument_node="">.</span></li></ul><ul data-dcnode-id="3343"><li data-dcnode-id="3344" style="text-align: justify;"><strong data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Altitude</span></strong><span data-dcnode-id="3349" instrument_node="">: Use </span><strong data-dcnode-id="3346"><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/earth/" rel="noopener" target="_blank"><span data-dcnode-id="3348" instrument_node="">Google Earth</span></a></strong><span data-dcnode-id="3345" instrument_node=""> to look for higher altitudes where you’ll enjoy a better view of the night sky.</span></li></ul><ul data-dcnode-id="3334"><li data-dcnode-id="3335" style="text-align: justify;"><strong data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Seasons</span></strong><span data-dcnode-id="3340" instrument_node="">: If you want to better understand how the Milky Way changes throughout the seasons check our article on </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/best-time-to-see-the-milky-way/" rel="noopener" target="_blank"><strong data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">when to see the Milky Way</span></strong></a><span data-dcnode-id="3336" instrument_node="">.</span></li></ul><ul data-dcnode-id="3325"><li data-dcnode-id="3326" style="text-align: justify;"><strong data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Places</span></strong><span data-dcnode-id="3331" instrument_node="">: To learn how to read light pollution maps, the Bortle scale, and how to find the best locations near you, check our article on </span><a data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/where-can-you-see-the-milky-way/" rel="noopener" target="_blank"><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">where to see the Milky Way</span></strong></a><span data-dcnode-id="3327" instrument_node="">.</span></li></ul><ul data-dcnode-id="3316"><li data-dcnode-id="3317"><strong data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Settings</span></strong><span data-dcnode-id="3322" instrument_node="">: Follow our </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/how-to-photograph-the-milky-way/" rel="noopener" target="_blank"><strong data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Milky Way photography guide</span></strong></a><span data-dcnode-id="3318" instrument_node=""> to learn the best settings and techniques to shoot our galaxy.</span></li></ul><ul data-dcnode-id="3306"><li data-dcnode-id="3307"><span data-dcnode-id="3308" style="text-align: justify;"><strong data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Cameras</span></strong><span data-dcnode-id="3313" instrument_node="">: Find our selection of the </span><strong data-dcnode-id="3310"><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/best-camera-milky-way-photography/" rel="noopener" target="_blank"><span data-dcnode-id="3312" instrument_node="">best cameras to shoot the Milky in 2022</span></a></st </span><p data-dcnode-id="3008" style="text-align: justify"><span data-dcnode-id="3009" instrument_node="">Dan is a professional nature and landscape photographer, photography educator, and co-founder of Capture the Atlas. His base camp is in Philadelphia, USA, but he spends long periods of time exploring and photographing new locations around the world.</span></p><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="2996" style="text-align: justify"><span data-dcnode-id="3006" instrument_node="">Apart from shooting the </span><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/how-to-photograph-the-milky-way/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3005" instrument_node="">Milky Way</span></a><span data-dcnode-id="3003" instrument_node="">, the </span><a data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/how-to-photograph-the-northern-lights/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3002" instrument_node="">Northern Lights</span></a><span data-dcnode-id="3000" instrument_node="">, and any landscape that can stir powerful emotions, he enjoys leading </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/photo-tours/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2999" instrument_node="">photo tours</span></a><span data-dcnode-id="2997" instrument_node=""> to some of the most remote places on Earth.</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2990" style="text-align: justify"><span data-dcnode-id="2994" instrument_node="">You can find more about Dan </span><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capturetheatlas.com/danzafra-about/"><strong data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">here.</span></strong></a></p><span data-dcnode-id="2989" instrument_node=""> </span></div><span data-dcnode-id="2987" instrument_node="">

</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Hello! We are traveling to visit Oak Island NC from Feb 8-16. I read that it’s a great place to view the Milky Way, along the beach or out on the pier. So I would want to use the Southwest USA (Death Valley) map since Oak Island is at 33 degrees N latitude. The Oak Island Pier is at 33.9 degrees north. My question is, the times shown are the same no matter where you are right? Oak Island is 3 hours ahead of Death Valley, CA, and the Galactic Center is visible for 10 minutes on Feb 12, from 5:01 AM to 5:11 AM, which will be my only chance to see it. (The Arch is 30 degrees, will it still be visible?). So I should still go out to the shore at 5 AM EST (time zones don’t matter)? With only a 10 minute window I don’t want to miss it. Also, is the small difference in latitude (33.9 vs 36) important for what time the galaxy is viewable?</span></p><span data-dcnode-id="2452" instrument_node="">

</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Ron, when you are tracking it’s completely normal to have a more exposed image with two defined bumps in the histogram; one towards the left and another towards the midtones. In untracked images, the histogram is usually a single bump starting from a curve pushed towards the left. </span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Make sure that you have pinpoint stars and that you are not overexposing areas in the Milky Way core (to check this, the zebra peaking is very useful).</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">I hope this helps and if you want to dive deeper into this I have very extensive tutorials on my </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academy.capturetheatlas.com/" rel="noopener nofollow ugc" target="_blank"><span data-dcnode-id="1883" instrument_node="">Milky Way tracking course</span></a><span data-dcnode-id="1881" instrument_node="">. </span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1878" instrument_node="">Happy shooting &amp; clear skies!</span><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">
