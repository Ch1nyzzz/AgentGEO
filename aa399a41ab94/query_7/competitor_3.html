n></span></figcaption></figure><p data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">What a difference 11 billion years makes, as can be seen in these two comparative views of our Milky Way galaxy. The top view shows how our galaxy looks today; the bottom view, how it appeared in the remote past. This photo illustration is based on a Hubble Space Telescope survey of evolving Milky Way-type galaxies. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1952" data-url="https://www.space.com/23594-milky-way-galaxy-evolution-hubble-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/23594-milky-way-galaxy-evolution-hubble-photos.html"><span data-dcnode-id="1953" instrument_node="">Read the Full Story Here</span></a><span data-dcnode-id="1951" instrument_node="">]</span></p><h2 data-dcnode-id="1948" id="illustration-of-early-milky-way"><span data-dcnode-id="1949" instrument_node="">Illustration of Early Milky Way</span></h2><div class="bordeaux-slot" data-dcnode-id="1947" data-feat-ref="bordeaux-feat-id-114" id="bordeaux-static-slot-15" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1946" data-feat-ref="bordeaux-feat-id-125" id="bordeaux-static-slot-26" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="1933"><div class="image-full-width-wrapper" data-dcnode-id="1937"><div class="image-widthsetter" data-dcnode-id="1938"><p class="vanilla-image-block" data-dcnode-id="1939" style="padding-top:56.25%;"><picture data-dcnode-id="1940"><source alt="Artist's Illustration of the Early Milky Way" class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1945" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/UpvHJfjJLPBfnkaF3HAjjL.jpg
