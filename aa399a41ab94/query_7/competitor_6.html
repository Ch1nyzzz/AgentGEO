2" data-dcnode-id="1105"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1106" href="#Where_is_the_darkest_place_on_Earth" title="Where is the darkest place on Earth?"><span data-dcnode-id="1107" instrument_node="">Where is the darkest place on Earth?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1102"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="1103" href="#Which_is_the_largest_galaxy_in_the_universe" title="Which is the largest galaxy in the universe?"><span data-dcnode-id="1104" instrument_node="">Which is the largest galaxy in the universe?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1099"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="1100" href="#How_does_Milky_Way_look_like_from_Earth" title="How does Milky Way look like from Earth?"><span data-dcnode-id="1101" instrument_node="">How does Milky Way look like from Earth?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1096"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="1097" href="#Can_a_wormhole_exist" title="Can a wormhole exist?"><span data-dcnode-id="1098" instrument_node="">Can a wormhole exist?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1093"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="1094" href="#What_will_happen_to_the_sun_when_it_dies" title="What will happen to the sun when it dies?"><span data-dcnode-id="1095" instrument_node="">What will happen to the sun when it dies?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1090"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="1091" href="#What_black_hole_is_closest_to_Earth" title="What black hole is closest to Earth?"><span data-dcnode-id="1092" instrument_node="">What black hole is closest to Earth?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1087"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="1088" href="#How_many_suns_are_in_the_Milky_Way" title="How many suns are in the Milky Way?"><span data-dcnode-id="1089" instrument_node="">How many suns are in the Milky Way?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1084"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="1085" href="#Can_we_reach_another_galaxy" title="Can we reach another galaxy?"><span data-dcnode-id="1086" instrument_node="">Can we reach another galaxy?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1081"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="1082" href="#Can_we_see_Andromeda_from_Earth" title="Can we see Andromeda from Earth?"><span data-dcnode-id="1083" instrument_node="">Can we see Andromeda from Earth?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1078"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="1079" href="#How_old_is_the_black_hole" title="How old is the black hole?"><span data-dcnode-id="1080" instrument_node="">How old is the black hole?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1075"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="1076" href="#How_old_is_Milky_Way_galaxy" title="How old is Milky Way galaxy?"><span data-dcnode-id="1077" instrument_node="">How old is Milky Way galaxy?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1072"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="1073" href="#How_old_is_the_moon" title="How old is the moon?"><span data-dcnode-id="1074" instrument_node="">How old is the moon?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1069"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="1070" href="#Could_there_be_a_green_sun" title="Could there be a green sun?"><span data-dcnode-id="1071" instrument_node="">Could there be a green sun?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1066"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="1067" href="#What_star_color_is_the_hottest" title="What star color is the hottest?"><span data-dcnode-id="1068" instrument_node="">What star color is the hottest?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1063"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="1064" href="#What_color_is_the_moon" title="What color is the moon?"><span data-dcnode-id="1065" instrument_node="">What color is the moon?</span></a></li></ul></nav></div><span data-dcnode-id="1059" instrument_node="">
</span><h2 data-dcnode-id="1055"><span class="ez-toc-section" data-dcnode-id="1058" id="Where_is_the_Milky_Way_black_hole"></span><span data-dcnode-id="1057" instrument_node="">Where is the Milky Way black hole?</span><span class="ez-toc-section-end" data-dcnode-id="1056"></span></h2><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">Observational evidence indicates that almost every large galaxy has a supermassive black hole at the galaxy’s center. The Milky Way has a supermassive black hole in its Galactic Center, which corresponds to the location of </span><b data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Sagittarius A*</span></b><span data-dcnode-id="1050" instrument_node="">.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><h2 data-dcnode-id="1043"><span class="ez-toc-section" data-dcnode-id="1047" id="What_is_the_closest_galaxy_to_the_Milky_Way"></span><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">What is the closest galaxy to the Milky Way?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1044"></span></h2><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Types of galaxies</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node=""> Since it is so far from us, it takes light from </span><b data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Andromeda</span></b><span data-dcnode-id="1035" instrument_node=""> more than 2.5 million years to bridge the gap. Despite the immense distance, Andromeda is the closest large galaxy to our Milky Way, and it’s bright enough in the night sky that it’s visible to the naked eye in the Northern Hemisphere.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><h2 data-dcnode-id="1028"><span class="ez-toc-section" data-dcnode-id="1032" id="How_old_is_the_universe"></span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">How old is the universe?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1029"></span></h2><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">Using data from the Planck space observatory, they found the universe to be </span><b data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">approximately 13.8 billion years old</span></b><span data-dcnode-id="1023" instrument_node="">.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1016"><span class="ez-toc-section" data-dcnode-id="1020" id="Are_there_purple_stars"></span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Are there purple stars?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1017"></span></h2><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">Although you can spot many colors of stars in the night sky, </span><b data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">purple and green stars aren’t seen because of the way humans perceive</span></b><span data-dcnode-id="1011" instrument_node=""> visible light. Stars are a multicolored bunch. … The color of a star is linked to its surface temperature. The hotter the star, the shorter the wavelength of light it will emit.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h2 data-dcnode-id="1004"><span class="ez-toc-section" data-dcnode-id="1008" id="Where_is_Earth_in_the_Milky_Way"></span><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Where is Earth in the Milky Way?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1005"></span></h2><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">Earth is located </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">in one of the spiral arms of the Milky Way (called the Orion Arm)</span></b><span data-dcnode-id="999" instrument_node=""> which lies about two-thirds of the way out from the center of the Galaxy. Here we are part of the Solar System – a group of eight planets, as well as numerous comets and asteroids and dwarf planets which orbit the Sun.</span></p><span data-dcnode-id="997" instrument_node="">
</span><h2 data-dcnode-id="992"><span class="ez-toc-section" data-dcnode-id="996" id="Can_you_see_the_Milky_Way_at_night"></span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Can you see the Milky Way at night?</span></strong><span class="ez-toc-section-end" data-dcnode-id="993"></span></h2><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">Up, down, left, right, that is the Milky Way. From Earth, it can be seen as a hazy form of stars in the night sky that the naked eye can barely notice. </span><b data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">You can see the Milky Way all year</span></b><span data-dcnode-id="987" instrument_node="">, no matter where you are in the world. It’s visible just so long as the sky is clear and the light pollution is minimal.</span></p><span data-dcnode-id="985" instrument_node="">
</span><h2 data-dcnode-id="980"><span class="ez-toc-section" data-dcnode-id="984" id="Where_is_the_darkest_place_on_Earth"></span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Where is the darkest place on Earth?</span></strong><span class="ez-toc-section-end" data-dcnode-id="981"></span></h2><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="978" instrument_node="">The measurements revealed </span><b data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">the Roque de los Muchachos Observatory</span></b><span data-dcnode-id="975" instrument_node=""> as the darkest place on Earth, where artificial light only brightens the night sky by 2 percent.</span></p><span data-dcnode-id="973" instrument_node="">
</span><h2 data-dcnode-id="968"><span class="ez-toc-section" data-dcnode-id="972" id="Which_is_the_largest_galaxy_in_the_universe"></span><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Which is the largest galaxy in the universe?</span></strong><span class="ez-toc-section-end" data-dcnode-id="969"></span></h2><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">The biggest known galaxy is </span><b data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">IC 1101</span></b><span data-dcnode-id="963" instrument_node="">, which is 50 times the Milky Way’s size and about 2,000 times more massive. It is about 5.5 million light-years across. Nebulas, or vast clouds of gas, also have impressively large sizes.</span></p><span data-dcnode-id="961" instrument_node="">
</span><h2 data-dcnode-id="956"><span class="ez-toc-section" data-dcnode-id="960" id="How_does_Milky_Way_look_like_from_Earth"></span><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">How does Milky Way look like from Earth?</span></strong><span class="ez-toc-section-end" data-dcnode-id="957"></span></h2><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">The Milky Way is visible from Earth as </span><b data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">a hazy band of white light, some 30° wide, arching the night sky</span></b><span data-dcnode-id="951" instrument_node="">. … Dark regions within the band, such as the Great Rift and the Coalsack, are areas where interstellar dust blocks light from distant stars. The area of sky that the Milky Way obscures is called the Zone of Avoidance.</span></p><span data-dcnode-id="949" instrument_node="">
</span><h2 data-dcnode-id="944"><span class="ez-toc-section" data-dcnode-id="948" id="Can_a_wormhole_exist"></span><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Can a wormhole exist?</span></strong><span class="ez-toc-section-end" data-dcnode-id="945"></span></h2><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">In the early days of research on black holes, before they even had that name, physicists did not yet know if these bizarre objects existed in the real world. The original idea of a wormhole came from physicists Albert Einstein and Nathan Rosen. …</span></p><span data-dcnode-id="940" instrument_node="">
</span><h2 data-dcnode-id="935"><span class="ez-toc-section" data-dcnode-id="939" id="What_will_happen_to_the_sun_when_it_dies"></span><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">What will happen to the sun when it dies?</span></strong><span class="ez-toc-section-end" data-dcnode-id="936"></span></h2><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">But for the sun, death is not the end. While </span><b data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">about half its mass will flood out, the rest will crush together at the very center of the planetary nebula</span></b><span data-dcnode-id="930" instrument_node="">. This will turn into a tiny, bright, ultra-dense ember of the sun’s core, no larger than the Earth. This kind of smoldering remnant is called a white dwarf star.</span></p><span data-dcnode-id="928" instrument_node="">
</span><h2 data-dcnode-id="923"><span class="ez-toc-section" data-dcnode-id="927" id="What_black_hole_is_closest_to_Earth"></span><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">What black hole is closest to Earth?</span></strong><span class="ez-toc-section-end" data-dcnode-id="924"></span></h2><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">For a comparison, </span><b data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Sagittarius A</span></b><span data-dcnode-id="918" instrument_node="">, the supermassive black hole at the center of the Milky Way, is thought to be about 4 million times the mass of the sun. In addition to being among the smallest black holes ever seen, it’s the nearest one to us that we know of, at just 1,500 light years away.</span></p><span data-dcnode-id="916" instrument_node="">
</span><h2 data-dcnode-id="911"><span class="ez-toc-section" data-dcnode-id="915" id="How_many_suns_are_in_the_Milky_Way"></span><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">How many suns are in the Milky Way?</span></strong><span class="ez-toc-section-end" data-dcnode-id="912"></span></h2><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">The Milky Way has a mass of </span><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">1.5 trillion suns</span></b><span data-dcnode-id="906" instrument_node="">.</span></p><span data-dcnode-id="904" instrument_node="">
</span><h2 data-dcnode-id="899"><span class="ez-toc-section" data-dcnode-id="903" id="Can_we_reach_another_galaxy"></span><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Can we reach another galaxy?</span></strong><span class="ez-toc-section-end" data-dcnode-id="900"></span></h2><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">The technology required to travel between galaxies is far beyond humanity’s present capabilities, and currently only the subject of speculation, hypothesis, and science fiction. However, theoretically speaking, </span><b data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">there is nothing to conclusively indicate that intergalactic travel is impossible</span></b><span data-dcnode-id="894" instrument_node="">.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h2 data-dcnode-id="887"><span class="ez-toc-section" data-dcnode-id="891" id="Can_we_see_Andromeda_from_Earth"></span><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Can we see Andromeda from Earth?</span></strong><span class="ez-toc-section-end" data-dcnode-id="888"></span></h2><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">Excluding the Large and Small Magellanic Clouds, visible from Earth’s Southern Hemisphere, the Andromeda galaxy is </span><b data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">the brightest external galaxy you can see</span></b><span data-dcnode-id="882" instrument_node="">. At 2.5 million light-years, it’s the most distant thing humans can see with the unaided eye. Astronomers sometimes call this galaxy Messier 31, or M31.</span></p><span data-dcnode-id="880" instrument_node="">
</span><h2 data-dcnode-id="875"><span class="ez-toc-section" data-dcnode-id="879" id="How_old_is_the_black_hole"></span><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">How old is the black hole?</span></strong><span class="ez-toc-section-end" data-dcnode-id="876"></span></h2><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">At </span><b data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">more than 13 billion years old</span></b><span data-dcnode-id="870" instrument_node="">, the black hole and quasar are the earliest yet seen, giving astronomers insight into the formation of massive galaxies in the early universe.</span></p><div class="jeg_ad jeg_ad_article jnews_content_inline_2_ads" data-dcnode-id="860"><div class="ads-wrapper align-center" data-dcnode-id="861"><div class="ads_code" data-dcnode-id="862"><span data-dcnode-id="867" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1204169513668561" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="3594720067" data-dcnode-id="866" style="display:block; text-align:center;"></ins><span data-dcnode-id="865" instrument_node="">
</span></div></div></div><span data-dcnode-id="859" instrument_node="">
</span><h2 data-dcnode-id="854"><span class="ez-toc-section" data-dcnode-id="858" id="How_old_is_Milky_Way_galaxy"></span><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">How old is Milky Way galaxy?</span></strong><span class="ez-toc-section-end" data-dcnode-id="855"></span></h2><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">Astronomers believe that our own Milky Way galaxy is </span><b data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">approximately 13.6 billion years old</span></b><span data-dcnode-id="849" instrument_node="">. The newest galaxy we know of formed only about 500 million years ago.</span></p><span data-dcnode-id="847" instrument_node="">
</span><h2 data-dcnode-id="842"><span class="ez-toc-section" data-dcnode-id="846" id="How_old_is_the_moon"></span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">How old is the moon?</span></strong><span class="ez-toc-section-end" data-dcnode-id="843"></span></h2><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">Scientists looked to the moon’s mineral composition to estimate that the moon is </span><b data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">around 4.425 billion years old</span></b><span data-dcnode-id="837" instrument_node="">, or 85 million years younger than what previous studies had proven.</span></p><span data-dcnode-id="835" instrument_node="">
</span><h2 data-dcnode-id="830"><span class="ez-toc-section" data-dcnode-id="834" id="Could_there_be_a_green_sun"></span><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Could there be a green sun?</span></strong><span class="ez-toc-section-end" data-dcnode-id="831"></span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="828" instrument_node="">Any star emitting mostly green will be putting out lots of red and blue as well, making the star look white. Changing the star’s temperature will make it look orange, or yellow, or red, or blue, but you just can’t get green. Our eyes simply won’t see it that way. That’s why </span><b data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">there are no green stars.</span></b></p><span data-dcnode-id="824" instrument_node="">
</span><h2 data-dcnode-id="819"><span class="ez-toc-section" data-dcnode-id="823" id="What_star_color_is_the_hottest"></span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">What star color is the hottest?</span></strong><span class="ez-toc-section-end" data-dcnode-id="820"></span></h2><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">White stars are hotter than red and yellow. </span><b data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Blue stars</span></b><span data-dcnode-id="814" instrument_node=""> are the hottest stars of all.</span></p><span data-dcnode-id="812" instrument_node="">
</span><h2 data-dcnode-id="807"><span class="ez-toc-section" data-dcnode-id="811" id="What_color_is_the_moon"></span><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">What color is the moon?</span></strong><span class="ez-toc-section-end" data-dcnode-id="808"></span></h2><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">So there’s your answer; the Moon’s true color is </span><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">grey</span></b><span data-dcnode-id="802" instrument_node="">, but appears to us in whatever color the Earth’s atmosphere makes it appear. Wishing you clear skies and wide eyes.</span></p><span data-dcnode-id="800" instrument_node="">
