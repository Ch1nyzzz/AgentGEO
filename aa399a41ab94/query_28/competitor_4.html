itle="How many Milky Ways are there?"><span data-dcnode-id="610" instrument_node="">How many Milky Ways are there?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="605"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="606" href="#How_does_universe_look_like" title="How does universe look like?"><span data-dcnode-id="607" instrument_node="">How does universe look like?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="602"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="603" href="#Is_Universe_flat_or_round" title="Is Universe flat or round?"><span data-dcnode-id="604" instrument_node="">Is Universe flat or round?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="599"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="600" href="#Is_the_universe_shaped_like_a_person" title="Is the universe shaped like a person?"><span data-dcnode-id="601" instrument_node="">Is the universe shaped like a person?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="596"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="597" href="#What_is_the_true_shape_of_the_world" title="What is the true shape of the world?"><span data-dcnode-id="598" instrument_node="">What is the true shape of the world?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="593"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="594" href="#Is_the_universe_infinite" title="Is the universe infinite?"><span data-dcnode-id="595" instrument_node="">Is the universe infinite?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="590"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="591" href="#Is_the_universe_shaped_like_a_donut" title="Is the universe shaped like a donut?"><span data-dcnode-id="592" instrument_node="">Is the universe shaped like a donut?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="587"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="588" href="#Is_a_torus_shaped_planet_possible" title="Is a torus shaped planet possible?"><span data-dcnode-id="589" instrument_node="">Is a torus shaped planet possible?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="584"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="585" href="#What_is_a_toroidal_shape" title="What is a toroidal shape?"><span data-dcnode-id="586" instrument_node="">What is a toroidal shape?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="581"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="582" href="#What_is_the_shape_of_the_universe_NASA" title="What is the shape of the universe NASA?"><span data-dcnode-id="583" instrument_node="">What is the shape of the universe NASA?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="578"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="579" href="#How_many_dimensions_are_there" title="How many dimensions are there?"><span data-dcnode-id="580" instrument_node="">How many dimensions are there?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="575"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="576" href="#How_old_is_our_galaxy" title="How old is our galaxy?"><span data-dcnode-id="577" instrument_node="">How old is our galaxy?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="572"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="573" href="#How_can_the_universe_be_flat_and_accelerating" title="How can the universe be flat and accelerating?"><span data-dcnode-id="574" instrument_node="">How can the universe be flat and accelerating?</span></a></li></ul></nav></div><span data-dcnode-id="568" instrument_node="">
</span><h2 data-dcnode-id="564"><span class="ez-toc-section" data-dcnode-id="567" id="What_is_at_the_center_of_our_Milky_Way_galaxy"></span><span data-dcnode-id="566" instrument_node="">What is at the center of our Milky Way galaxy?</span><span class="ez-toc-section-end" data-dcnode-id="565"></span></h2><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">We live in the Milky Way Galaxy, which is a collection of stars, gas, dust, and a supermassive black hole at it’s very center. Our solar system is in the Orion arm, and we are about 25,000 light years (2.5 X 10^17 miles) from the very center of the Galaxy.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="556"><span class="ez-toc-section" data-dcnode-id="559" id="Is_there_a_black_hole_in_the_center_of_the_Milky_Way"></span><span data-dcnode-id="558" instrument_node="">Is there a black hole in the center of the Milky Way?</span><span class="ez-toc-section-end" data-dcnode-id="557"></span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Astronomers are confident that the Milky Way galaxy has a supermassive black hole at its center, 26,000 light-years from the Solar System, in a region called Sagittarius A* because: No known astronomical object other than a black hole can contain 4.1 million M ☉ in this volume of space.</span></p><span data-dcnode-id="552" instrument_node="">
</span><h2 data-dcnode-id="548"><span class="ez-toc-section" data-dcnode-id="551" id="What_is_the_bright_star_in_the_middle_of_the_Milky_Way"></span><span data-dcnode-id="550" instrument_node="">What is the bright star in the middle of the Milky Way?</span><span class="ez-toc-section-end" data-dcnode-id="549"></span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The center of the Milky Way is a pretty happenin’ place. As with most other galaxies, there is a supermassive black hole there. Ours is named Sagittarius A* (pronounced “Sagittarius A-star”, abbreviated as Sgr A*).</span></p><span data-dcnode-id="544" instrument_node="">
</span><h2 data-dcnode-id="540"><span class="ez-toc-section" data-dcnode-id="543" id="Why_is_the_center_of_the_Milky_Way_so_bright"></span><span data-dcnode-id="542" instrument_node="">Why is the center of the Milky Way so bright?</span><span class="ez-toc-section-end" data-dcnode-id="541"></span></h2><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The Galactic centre is bright simply because the are lots of stars packed in there. The number density of stars in the bulge is high. I’m afraid our Supermassive Black Hole, Sgr A* is utterly unimportant in terms of brightness.</span></p><span data-dcnode-id="536" instrument_node="">
</span><h2 data-dcnode-id="532"><span class="ez-toc-section" data-dcnode-id="535" id="Where_can_I_see_the_Milky_Way_tonight"></span><span data-dcnode-id="534" instrument_node="">Where can I see the Milky Way tonight?</span><span class="ez-toc-section-end" data-dcnode-id="533"></span></h2><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">To see the Milky Way at night, you need all three of the following:</span></p><span data-dcnode-id="528" instrument_node="">
</span><ol data-dcnode-id="517"><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">a clear sky – there should be no clouds;</span></li><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">minimal light pollution – too much extra light washes out the details in the night sky; and.</span></li><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">no moon – the moon is brighter than you think and will reduce the visible intensity of the Milky Way.</span></li><span data-dcnode-id="518" instrument_node="">
</span></ol><span data-dcnode-id="516" instrument_node="">
</span><h2 data-dcnode-id="512"><span class="ez-toc-section" data-dcnode-id="515" id="Can_you_see_Milky_Way_with_eyes"></span><span data-dcnode-id="514" instrument_node="">Can you see Milky Way with eyes?</span><span class="ez-toc-section-end" data-dcnode-id="513"></span></h2><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">More than 100,000 light years in diameter, with more than 100 billion stars and at least as many planets, the Milky Way is arguably the most impressive feature of the night sky that you can see with the naked eye.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h2 data-dcnode-id="504"><span class="ez-toc-section" data-dcnode-id="507" id="When_can_I_see_the_Milky_Way_tonight"></span><span data-dcnode-id="506" instrument_node="">When can I see the Milky Way tonight?</span><span class="ez-toc-section-end" data-dcnode-id="505"></span></h2><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Generally the dense part of the Milky Way is best viewed when it is as high as possible in the Southern sky. Facing south during April and May the pre-dawn hours are best. From June to early August the best time is near midnight, though the Milky Way will be visible almost all night….</span></p><span data-dcnode-id="500" instrument_node="">
</span><h2 data-dcnode-id="496"><span class="ez-toc-section" data-dcnode-id="499" id="Can_you_see_Milky_Way_with_Full_Moon"></span><span data-dcnode-id="498" instrument_node="">Can you see Milky Way with Full Moon?</span><span class="ez-toc-section-end" data-dcnode-id="497"></span></h2><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The Milky Way is only highly visible in the northern hemisphere during February to around September. Take into consideration which phase the moon currently is in. During a full moon you won’t be able to capture any of the Milky Way due to the reflective sun light washing out the night sky….</span></p><span data-dcnode-id="492" instrument_node="">
</span><h2 data-dcnode-id="488"><span class="ez-toc-section" data-dcnode-id="491" id="What_time_of_year_is_best_for_stargazing"></span><span data-dcnode-id="490" instrument_node="">What time of year is best for stargazing?</span><span class="ez-toc-section-end" data-dcnode-id="489"></span></h2><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Autumn, Winter and Spring offer the best times to stargaze and many astronomers refer to an ‘observing season’. This is the time from when clocks go back in October (nights become 1 hour longer) to the time they go forward in March (nights become 1 hour shorter).</span></p><span data-dcnode-id="484" instrument_node="">
</span><h2 data-dcnode-id="480"><span class="ez-toc-section" data-dcnode-id="483" id="What_is_the_best_time_to_photograph_the_Milky_Way"></span><span data-dcnode-id="482" instrument_node="">What is the best time to photograph the Milky Way?</span><span class="ez-toc-section-end" data-dcnode-id="481"></span></h2><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">The best time of day to photograph the Milky Way is usually between 00:00 and 5:00 on nights with a new moon during the Milky Way season….</span></p><span data-dcnode-id="476" instrument_node="">
</span><h2 data-dcnode-id="472"><span class="ez-toc-section" data-dcnode-id="475" id="Where_is_the_Milky_Way_in_the_universe"></span><span data-dcnode-id="474" instrument_node="">Where is the Milky Way in the universe?</span><span class="ez-toc-section-end" data-dcnode-id="473"></span></h2><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Virgo Supercluster</span></p><span data-dcnode-id="468" instrument_node="">
</span><h2 data-dcnode-id="464"><span class="ez-toc-section" data-dcnode-id="467" id="How_many_Milky_Ways_are_there"></span><span data-dcnode-id="466" instrument_node="">How many Milky Ways are there?</span><span class="ez-toc-section-end" data-dcnode-id="465"></span></h2><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Stars are not scattered randomly through space, they are gathered together into vast groups known as galaxies. The Sun belongs to a galaxy called the Milky Way. Astronomers estimate there are about 100 thousand million stars in the Milky Way alone. Outside that, there are millions upon millions of other galaxies also!</span></p><span data-dcnode-id="460" instrument_node="">
</span><h2 data-dcnode-id="456"><span class="ez-toc-section" data-dcnode-id="459" id="How_does_universe_look_like"></span><span data-dcnode-id="458" instrument_node="">How does universe look like?</span><span class="ez-toc-section-end" data-dcnode-id="457"></span></h2><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The observable universe is thus a sphere with a diameter of about 28.5 gigaparsecs (93 billion light-years or 8.8×1026 m). Assuming that space is roughly flat (in the sense of being a Euclidean space), this size corresponds to a comoving volume of about 1.22×104 Gpc3 (4.22×105 Gly3 or 3.57×1080 m3).</span></p><span data-dcnode-id="452" instrument_node="">
</span><h2 data-dcnode-id="448"><span class="ez-toc-section" data-dcnode-id="451" id="Is_Universe_flat_or_round"></span><span data-dcnode-id="450" instrument_node="">Is Universe flat or round?</span><span class="ez-toc-section-end" data-dcnode-id="449"></span></h2><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">All other cosmological data suggests the universe is flat, meaning it has no curvature, similar to a sheet of paper. These Planck measurements indicate that it could be “closed”, or spherical, which would mean that if you travelled far enough in one direction, you would end up back where you started….</span></p><span data-dcnode-id="444" instrument_node="">
</span><h2 data-dcnode-id="440"><span class="ez-toc-section" data-dcnode-id="443" id="Is_the_universe_shaped_like_a_person"></span><span data-dcnode-id="442" instrument_node="">Is the universe shaped like a person?</span><span class="ez-toc-section-end" data-dcnode-id="441"></span></h2><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">The exact shape is still a matter of debate in physical cosmology, but experimental data from various independent sources (WMAP, BOOMERanG, and Planck for example) confirm that the universe is flat with only a 0.4% margin of error.</span></p><span data-dcnode-id="436" instrument_node="">
</span><h2 data-dcnode-id="432"><span class="ez-toc-section" data-dcnode-id="435" id="What_is_the_true_shape_of_the_world"></span><span data-dcnode-id="434" instrument_node="">What is the true shape of the world?</span><span class="ez-toc-section-end" data-dcnode-id="433"></span></h2><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">oblate spheroid</span></p><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="424"><span class="ez-toc-section" data-dcnode-id="427" id="Is_the_universe_infinite"></span><span data-dcnode-id="426" instrument_node="">Is the universe infinite?</span><span class="ez-toc-section-end" data-dcnode-id="425"></span></h2><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">First, it’s still possible the universe is finite. The observable universe is still huge, but it has limits. That’s because we know the universe isn’t infinitely old — we know the Big Bang occurred some 13.8 billion years ago. That means that light has had “only” 13.8 billion years to travel….</span></p><span data-dcnode-id="420" instrument_node="">
</span><h2 data-dcnode-id="416"><span class="ez-toc-section" data-dcnode-id="419" id="Is_the_universe_shaped_like_a_donut"></span><span data-dcnode-id="418" instrument_node="">Is the universe shaped like a donut?</span><span class="ez-toc-section-end" data-dcnode-id="417"></span></h2><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Our universe may even be floating around inside a torus-shaped space. One model suggests that the cosmos once included various branes with up to eight dimensions, floating about in a nine-dimensional space with each dimension circling back on itself like a doughnut….</span></p><span data-dcnode-id="412" instrument_node="">
</span><h2 data-dcnode-id="408"><span class="ez-toc-section" data-dcnode-id="411" id="Is_a_torus_shaped_planet_possible"></span><span data-dcnode-id="410" instrument_node="">Is a torus shaped planet possible?</span><span class="ez-toc-section-end" data-dcnode-id="409"></span></h2><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">A planet in the shape of a donut, or toroid, as it’s called in mathematics, could technically exist, but it would have to jump some steep physics hurdles to get there. Planets are round because gravity pulls inward. Its shape would also do funny things to gravity….</span></p><span data-dcnode-id="404" instrument_node="">
</span><h2 data-dcnode-id="400"><span class="ez-toc-section" data-dcnode-id="403" id="What_is_a_toroidal_shape"></span><span data-dcnode-id="402" instrument_node="">What is a toroidal shape?</span><span class="ez-toc-section-end" data-dcnode-id="401"></span></h2><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">A Toroid is a geometric shape that resembles a torus. A toroid is constructed by rotating a geometrical shape around an axis which is outside the shape. If this is done to a circle, a torus results. This short article about mathematics can be made longer.</span></p><span data-dcnode-id="396" instrument_node="">
</span><h2 data-dcnode-id="392"><span class="ez-toc-section" data-dcnode-id="395" id="What_is_the_shape_of_the_universe_NASA"></span><span data-dcnode-id="394" instrument_node="">What is the shape of the universe NASA?</span><span class="ez-toc-section-end" data-dcnode-id="393"></span></h2><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">flat</span></p><span data-dcnode-id="388" instrument_node="">
</span><h2 data-dcnode-id="384"><span class="ez-toc-section" data-dcnode-id="387" id="How_many_dimensions_are_there"></span><span data-dcnode-id="386" instrument_node="">How many dimensions are there?</span><span class="ez-toc-section-end" data-dcnode-id="385"></span></h2><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The world as we know it has three dimensions of space—length, width and depth—and one dimension of time. But there’s the mind-bending possibility that many more dimensions exist out there. According to string theory, one of the leading physics model of the last half century, the universe operates with 10 dimensions….</span></p><span data-dcnode-id="380" instrument_node="">
</span><h2 data-dcnode-id="376"><span class="ez-toc-section" data-dcnode-id="379" id="How_old_is_our_galaxy"></span><span data-dcnode-id="378" instrument_node="">How old is our galaxy?</span><span class="ez-toc-section-end" data-dcnode-id="377"></span></h2><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">13.51&nbsp;billion&nbsp;years</span></p><span data-dcnode-id="372" instrument_node="">
</span><h2 data-dcnode-id="368"><span class="ez-toc-section" data-dcnode-id="371" id="How_can_the_universe_be_flat_and_accelerating"></span><span data-dcnode-id="370" instrument_node="">How can the universe be flat and accelerating?</span><span class="ez-toc-section-end" data-dcnode-id="369"></span></h2><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">A universe with too much density collapses in on itself, a critical density universe stays static, while a universe with not enough density keeps expanding at a steady (coasting) rate. However, today’s cosmology puts emphasis upon the cosmological constant, which gives an accelerating expansion….</span></p><span data-dcnode-id="364" instrument_node="">
</span><div class="addtoany_share_save_container addtoany_content addtoany_content_bottom" data-dcnode-id="318"><div class="a2a_kit a2a_kit_size_26 addtoany_list" data-a2a-title="What is at the center of our Milky Way galaxy?" data-a2a-url="https://colors-newyork.com/what-is-at-the-center-of-our-milky-way-galaxy/" data-dcnode-id="319" style="line-height: 26px;"><a class="a2a_button_email" data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colors-newyork.com/%23email" rel="nofollow noopener" target="_blank" title="Email"><span class="a2a_svg a2a_s__default a2a_s_email" data-dcnode-id="361" style="background-color: rgb(1, 102, 255); width: 26px; line-height: 26px; height: 26px; background-size: 26px; border-radius: 4px;"><svg aria-hidden="true" data-dcnode-id="362" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M26 21.25v-9s-9.1 6.35-9.984 6.68C15.144 18.616 6 12.25 6 12.25v9c0 1.25.266 1.5 1.5 1.5h17c1.266 0 1.5-.22 1.5-1.5zm-.015-10.765c0-.91-.265-1.235-1.485-1.235h-17c-1.255 0-1.5.39-1.5 1.3l.015.14s9.035 6.22 10 6.56c1.02-.395 9.985-6.7 9.985-6.7l-.015-.065z" data-dcnode-id="363" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Email</span></span></a><a class="a2a_button_facebook" data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colors-newyork.com/%23facebook" rel="nofollow noopener" target="_blank" title="Facebook"><span class="a2a_svg a2a_s__default a2a_s_facebook" data-dcnode-id="355" style="background-color: rgb(24, 119, 242); width: 26px; line-height: 26px; height: 26px; background-size: 26px; border-radius: 4px;"><svg aria-hidden="true" data-dcnode-id="356" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5
