</span><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">The Milky Way is a barred spiral galaxy, one of hundreds of billions in the observable universe. It's also our home.</span></p><div class="ad-unit" data-dcnode-id="2769" id="ad-unit-1"></div><p data-dcnode-id="2758"><span data-dcnode-id="2768" instrument_node="">Like other galaxies, the Milky Way is an isolated collection of stars and other material bound together by their common gravity. In addition to the 100 billion to 400 billion stars in our galaxy, a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2766" data-url="https://exoplanetarchive.ipac.caltech.edu/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exoplanetarchive.ipac.caltech.edu/"><span data-dcnode-id="2767" instrument_node="">similar number of planets</span></a><span data-dcnode-id="2765" instrument_node=""> likely exist in the Milky Way — some of them part of solar systems and some floating freely. Between the stars sit innumerable nebulas, which are clouds of gas and dust. The vast majority of the interstellar gas is </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/28466-hydrogen.html"><span data-dcnode-id="2764" instrument_node="">hydrogen</span></a><span data-dcnode-id="2762" instrument_node=""> and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/28552-facts-about-helium.html"><span data-dcnode-id="2761" instrument_node="">helium</span></a><span data-dcnode-id="2759" instrument_node="">.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2757" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="1388641433202690800" data-widget-type="seasonal"></aside><p data-dcnode-id="2746"><span data-dcnode-id="2756" instrument_node="">However, multiple lines of evidence — most importantly, that material in the galaxy orbits the center far too quickly to be held together by the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/37115-what-is-gravity.html"><span data-dcnode-id="2755" instrument_node="">gravity</span></a><span data-dcnode-id="2753" instrument_node=""> of visible objects — suggest that most of the mass of the Milky Way is made up of some form of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/46506-states-of-matter.html" target="_blank"><span data-dcnode-id="2752" instrument_node="">matter</span></a><span data-dcnode-id="2750" instrument_node=""> that does not interact with light. Astronomers call this </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/dark-matter.html"><span data-dcnode-id="2749" instrument_node="">dark matter</span></a><span data-dcnode-id="2747" instrument_node="">, and its true nature is not fully understood.</span></p><div class="in-article ad-unit" data-dcnode-id="2701" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2702" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2703"><div data-dcnode-id="2704"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2705" id="trc_wrapper_62153" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2729" id="trc_header_62153"><div class="trc_header_ext" data-dcnode-id="2731"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2739"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-livescience%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-livescience%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2732"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-livescience%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Promoted Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-livescience%26utm_medium%3Drefe id="mobile-taboola-mid-article"></div></div><h3 class="article-body__section" data-dcnode-id="2696" id="section-who-discovered-the-milky-way"><span data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Who discovered the Milky Way?</span></span></h3><p data-dcnode-id="2688"><span data-dcnode-id="2695" instrument_node="">From our vantage point on </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/earth.html"><span data-dcnode-id="2694" instrument_node="">Earth</span></a><span data-dcnode-id="2692" instrument_node="">, the Milky Way looks like a band of diffuse light that arcs across the nighttime sky. This is where the English name comes from: </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/56756-milky-way-name-origin.html"><span data-dcnode-id="2691" instrument_node="">The Romans called it Via Lactea</span></a><span data-dcnode-id="2689" instrument_node=""> and envisioned it as a band of spilled milk. Astronomers and philosophers debated the nature of the Milky Way until Galileo Galilei first observed it with a telescope and found that the light of the Milky Way comes from innumerable distant stars. The stars themselves are too far away to see all of them individually, but their combined light gives the familiar band.</span></p><p data-dcnode-id="2680"><span data-dcnode-id="2687" instrument_node="">Up until the early 1900's, astronomers assumed that the Milky Way contained all the stars in the universe (either the Milky Way extended to fill the entire cosmos, or it was a finite size and surrounded by an infinite void). However, in the early 1920's, astronomer </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2685" data-url="https://www.space.com/15665-edwin-powell-hubble.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15665-edwin-powell-hubble.html"><span data-dcnode-id="2686" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="2684" instrument_node=""> made detailed observations of the Andromeda Nebula, revealing that it was its own "island" of stars — a galaxy in its own right — located millions of light-years away from us, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2682" data-url="https://www.britannica.com/biography/Edwin-Hubble" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble"><span data-dcnode-id="2683" instrument_node="">Britannica</span></a><span data-dcnode-id="2681" instrument_node="">.</span></p><div class="ad-unit" data-dcnode-id="2679" id="ad-unit-2"></div><h3 class="article-body__section" data-dcnode-id="2676" id="section-what-does-the-milky-way-look-like"><span data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">What does the Milky Way look like?</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2660" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2661"><div class="image-full-width-wrapper" data-dcnode-id="2667"><div class="image-widthsetter" data-dcnode-id="2668" style="max-width:1538px;"><p class="vanilla-image-block" data-dcnode-id="2669" style="padding-top:69.51%;"><picture data-dcnode-id="2670"><source alt="The Milky Way Galaxy is organized into spiral arms of giant stars that illuminate interstellar gas and dust. The sun is in a finger called the Orion Spur." class="expandable lazy-image-van optional-image" data-dcnode-id="2675" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Milky Way Galaxy is organized into spiral arms of giant stars that illuminate interstellar gas and dust. The sun is in a finger called the Orion Spur." class="expandable lazy-image-van optional-image" data-dcnode-id="2674" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2671"><img alt="The Milky Way Galaxy is organized into spiral arms of giant stars that illuminate interstellar gas and dust. The sun is in a finger called the Orion Spur." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2673" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/yJdivrsy4tEP3rqfpk2hjT-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2672"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2662" itemprop="caption description"><span class="caption-text" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">The Milky Way Galaxy is organized into spiral arms of giant stars that illuminate interstellar gas and dust. The sun is in a finger called the Orion Spur.&nbsp; </span></span><span class="credit" data-dcnode-id="2663" itemprop="copyrightHolder"><span data-dcnode-id="2664" instrument_node="">(Image credit: Hubble Space Telescope)</span></span></figcaption></figure></a><p data-dcnode-id="2655"><span data-dcnode-id="2659" instrument_node="">The Milky Way is a relatively thin, flattened disk. This explains why it appears as a band in our sky. When we are looking in the direction of the disk, Earthlings see the combined light of all the stars in the galaxy. When we look in a direction away from the disk, we see only the stars close to our </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/our-solar-system.html"><span data-dcnode-id="2658" instrument_node="">solar system</span></a><span data-dcnode-id="2656" instrument_node="">.</span></p><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">The Milky Way has three main parts: the core, the disk and the halo.</span></p><p data-dcnode-id="2645"><span data-dcnode-id="2652" instrument_node="">The core isn't spherical; it's elongated into the shape of a bar anywhere from 5,000 to 20,000 light-years long. Up to a quarter of all the stars in the Milky Way reside in the core; the density of stars there is up to a million times greater than it is in the neighborhood of the sun, according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2650" data-url="https://webbtelescope.org/resource-gallery/articles/pagecontent/filter-articles/what-is-the-center-of-our-galaxy-like?keyword=Black%20Holes&amp;filterUUID=a776e097-0c60-421c-baec-1d8ad049bfb0#:~:text=In%20the%20center%20of%20the%20galaxy%2C%20stars%20are%20only,%E2%80%930.04%20light%2Dyears%20apart." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webbtelescope.org/resource-gallery/articles/pagecontent/filter-articles/what-is-the-center-of-our-galaxy-like%3Fkeyword%3DBlack%2520Holes%26filterUUID%3Da776e097-0c60-421c-baec-1d8ad049bfb0%23%3A~%3Atext%3DIn%2520the%2520center%2520of%2520the%2520galaxy%252C%2520stars%2520are%2520only%2C%25E2%2580%25930.04%2520light-years%2520apart."><span data-dcnode-id="2651" instrument_node="">Space Telescope Science Institute</span></a><span data-dcnode-id="2649" instrument_node="">. At the very center of the galaxy sits Sagittarius A*, a supermassive black hole with a mass that's 4.1 million times that of the sun, according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2647" data-url="http://www.astro.ucla.edu/~ghezgroup/gc/journey/smbh.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astro.ucla.edu/~ghezgroup/gc/journey/smbh.html"><span data-dcnode-id="2648" instrument_node="">UCLA Galactic Center Group</span></a><span data-dcnode-id="2646" instrument_node="">.</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2644" instrument_node="">The stellar disk of the Milky Way has a radius of 75,000 to 100,000 light-years, but it is only about 1,000 light-years thick. Within the disk sit several major spiral arms, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2642" data-url="https://solarsystem.nasa.gov/resources/285/the-milky-way-galaxy/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/resources/285/the-milky-way-galaxy/"><span data-dcnode-id="2643" instrument_node="">NASA</span></a><span data-dcnode-id="2641" instrument_node="">, where the density of stars and gas is higher than average and star formation occurs at a higher rate, making these arms stand out in visual observations.</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Our solar system sits in the disk, about 27,000 light-years from the galactic center, near the inner rim of the Orion Arm.</span></p><p data-dcnode-id="2633"><span data-dcnode-id="2637" instrument_node="">Beyond the disk of the Milky Way is its halo, which is a spherical region with a radius of about 100,000 light-years. The halo contains old stars and globular clusters, all orbiting the galactic center in random directions. The dark matter extends even farther, up to 400,000 light-years from the center, according to a study published in 2019 in the journal </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2635" data-url="https://www.aanda.org/articles/aa/full_html/2019/01/aa33355-18/aa33355-18.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aanda.org/articles/aa/full_html/2019/01/aa33355-18/aa33355-18.html"><span data-dcnode-id="2636" instrument_node="">Astronomy &amp; Astrophysics</span></a><span data-dcnode-id="2634" instrument_node="">.</span></p><h3 class="article-body__section" data-dcnode-id="2630" id="section-where-is-the-milky-way"><span data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Where is the Milky Way?</span></span></h3><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2614" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/" target="_blank"><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2615"><div class="image-full-width-wrapper" data-dcnode-id="2621"><div class="image-widthsetter" data-dcnode-id="2622" style="max-width:3500px;"><p class="vanilla-image-block" data-dcnode-id="2623" style="padding-top:56.26%;"><picture data-dcnode-id="2624"><source alt="The Milky Way and the other members of our Local Group of galaxies." class="expandable lazy-image-van optional-image" data-dcnode-id="2629" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Milky Way and the other members of our Local Group of galaxies." class="expandable lazy-image-van optional-image" data-dcnode-id="2628" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2625"><img alt="The Milky Way and the other members of our Local Group of galaxies." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2627" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5GPNiQohyRrCkz5DDjPun5-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2626"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2616" itemprop="caption description"><span class="caption-text" data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">The Milky Way and the other members of our Local Group of galaxies. </span></span><span class="credit" data-dcnode-id="2617" itemprop="copyrightHolder"><span data-dcnode-id="2618" instrument_node="">(Image credit: Ron Miller/Stocktrek Images via Getty Images)</span></span></figcaption></figure></a><p data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node="">The Milky Way has two major satellite galaxies — the Large and Small Magellanic Clouds — and dozens of smaller satellites. Our nearest neighbor is the Andromeda galaxy, located about 2.5 million light-years away. Together with Andromeda and about 80 smaller galaxies, the Milky Way is a part of the Local Group, which is a group of galaxies, about 10 million light-years across, bound together by their common gravity, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2611" data-url="https://astronomy.swin.edu.au/cosmos/l/Local+Group" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.swin.edu.au/cosmos/l/Local%2BGroup"><span data-dcnode-id="2612" instrument_node="">Swinburne University</span></a><span data-dcnode-id="2610" instrument_node="">.</span></p><p data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node="">The Local Group is one member of a larger structure called the Virgo Supercluster, which is surrounded by several great intergalactic voids, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2606" data-url="http://www.icc.dur.ac.uk/~tt/Lectures/Galaxies/LocalGroup/Back/virgo.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icc.dur.ac.uk/~tt/Lectures/Galaxies/LocalGroup/Back/virgo.html"><span data-dcnode-id="2607" instrument_node="">Durham University</span></a><span data-dcnode-id="2605" instrument_node="">. At the center of this supercluster sits the Virgo Cluster, a massive collection of 1,000 to 2,000 galaxies about 54 million light-years away. The Virgo Supercluster itself is thought to be a component of an even larger structure called the Laniakea Supercluster.</span></p><h3 class="article-body__section" data-dcnode-id="2601" id="section-how-big-is-the-milky-way"><span data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">How big is the Milky Way? </span></span></h3><p data-dcnode-id="2596"><span data-dcnode-id="2600" instrument_node="">It's difficult to estimate the true size of our galaxy, because we live inside it and all the clouds of gas and dust obscure our observations of it. Astronomers estimate that the total mass of the Milky Way is around a trillion times the mass of the sun, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2598" data-url="https://www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate"><span data-dcnode-id="2599" instrument_node="">NASA</span></a><span data-dcnode-id="2597" instrument_node="">. Most of that mass, by far, is in the form of dark matter; stars represent around only 1% of the mass of the galaxy, and interstellar gas accounts for only 0.1%.</span></p><h3 class="article-body__section" data-dcnode-id="2593" id="section-is-the-milky-way-moving"><span data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Is the Milky Way moving?</span></span></h3><div class="jwplayer__widthsetter" data-dcnode-id="2577"><div class="jwplayer__wrapper" data-dcnode-id="2578"><div class="future__jwplayer" data-dcnode-id="2579" id="futr_botr_UU0DpYtK_pBYGc5Ws_div"><div class="jw-error jw-reset" data-dcnode-id="2580" id="botr_UU0DpYtK_pBYGc5Ws_div" style="width: 100%; height: 270px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2581"><div class="jw-icon jw-reset" data-dcnode-id="2587"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2588" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2589"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2582"><div class="jw-error-text jw-reset-text" data-dcnode-id="2583" data-nosnippet="" dir="auto"><span data-dcnode-id="2586" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2585"></span><span data-dcnode-id="2584" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2572"><span data-dcnode-id="2576" instrument_node="">Relative to the general expansion of space that pulls galaxies away from each other (on average), the Milky Way is moving at approximately 391 miles per second (630 kilometers per second), scientists reported on the preprint server </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2574" data-url="https://arxiv.org/abs/astro-ph/0510106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/abs/astro-ph/0510106"><span data-dcnode-id="2575" instrument_node="">arXiv</span></a><span data-dcnode-id="2573" instrument_node=""> in 2005. Our galaxy is on a collision course with Andromeda, and our two galaxies will crash and begin to merge in about 5 billion years.</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2571" instrument_node="">Both the Milky Way and Andromeda are moving together in the direction of what's called the Great Attractor, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2569" data-url="http://www.ifa.hawaii.edu/info/press-releases/kocevski-1-06/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ifa.hawaii.edu/info/press-releases/kocevski-1-06/"><span data-dcnode-id="2570" instrument_node="">University of Hawaii Institute for Astronomy</span></a><span data-dcnode-id="2568" instrument_node=""> reported. The Great Attractor is thought to be the center of the Laniakea Supercluster. However, observations of this region of the local universe are difficult because it lies past the direction of our galactic center, which obscures our view.</span></p><h3 class="article-body__section" data-dcnode-id="2564" id="section-additional-resources"><span data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Additional resources</span></span></h3><p data-dcnode-id="2559"><span data-dcnode-id="2563" instrument_node="">—</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2561" data-url="https://www.calacademy.org/educators/tour-of-the-galaxy" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/educators/tour-of-the-galaxy" target="_blank"><span data-dcnode-id="2562" instrument_node="">California Academy of Sciences</span></a><span data-dcnode-id="2560" instrument_node=""> has this great educational video that lets students tour the Milky Way.</span></p><p data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node="">—This National Geographic Book "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="2617886021154151400" data-dcnode-id="2556" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Visual Galaxy" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=74387&amp;GR_URL=https%3A%2F%2Famazon.com%2FVisual-Galaxy-Ultimate-Guide-Beyond%2Fdp%2F142622060X%3Ftag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Visual-Galaxy-Ultimate-Guide-Beyond/dp/142622060X" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D74387%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FVisual-Galaxy-Ultimate-Guide-Beyond%252Fdp%252F142622060X%253Ftag%253Dhawk-future-20%2526ascsubtag%253Dlivescience-us-2617886021154151400-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2557" instrument_node="">Visual Galaxy</span></a><span data-dcnode-id="2555" instrument_node="">" has gorgeous images of the Milky Way.</span></p><p data-dcnode-id="2549"><span data-dcnode-id="2553" instrument_node="">—Check out these activities and resources about the solar system and night sky at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2551" data-url="https://mcdonaldobservatory.org/teachers/classroom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcdonaldobservatory.org/teachers/classroom" target="_blank"><span data-dcnode-id="2552" instrument_node="">the McDonald Observatory</span></a><span data-dcnode-id="2550" instrument_node="">.</span></p><span data-dcnode-id="2548" instrument_node="">

</span><span class="bio" data-dcnode-id="2478"><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Paul M. Sutter is a research professor in astrophysics at &nbsp;SUNY Stony Brook University and the Flatiron Institute in New York City. He regularly appears on TV and podcasts, including &nbsp;"Ask a Spaceman." He is the author of two books, "Your Place in the Universe" and "How to Die in Space," and is a regular contributor to Space.com, Live Science, and more. Paul received his PhD in Physics from the University of Illinois at Urbana-Champaign in 2011, and spent three years at the Paris Institute of Astrophysics, followed by a research fellowship in Trieste, Italy.&nbsp;</span></p></span><span data-dcnode-id="2477" instrument_node="">
