ta-dcnode-id="1250" href="#menu-11"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">References</span></strong></a></li></ul><span data-dcnode-id="1247" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2765885248050149" data-ad-format="auto" data-ad-slot="5971426765" data-dcnode-id="1246" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">A </span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">spiral galaxy</span></strong><span data-dcnode-id="1241" instrument_node=""> It is a monumental cluster of stars in the shape of a disk with spiral arms, reminiscent of the shape of a pinwheel. The shape of the arms varies a lot, but in general a condensed center is clearly distinguished surrounded by a disk from which the spirals sprout.</span></p><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Almost 60% of the galaxies that are currently known are spirals with the following characteristic structures: central bulge or galactic bulge, disk, spiral arms and halo.</span></p><img data-dcnode-id="1237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/galaxias-espirales-caractersticas-formacin-y-tipos.webp&amp;raw"><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">These are galaxies of extraordinary beauty that can be located in constellations such as Eridano. All of them encoded thanks to the work of the astronomer Edwin Hubble (1889-1953).</span></p><a data-dcnode-id="1234" id="menu-1"></a><span data-dcnode-id="1233" instrument_node="">
</span><h2 data-dcnode-id="1230"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Characteristics of spiral galaxies</span></strong></h2><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">Two thirds of spiral galaxies have a central bar, constituting a subtype called </span><i data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">barred spiral galaxies</span></i><span data-dcnode-id="1226" instrument_node="">, to differentiate them from simple spiral galaxies. They have only two spirals coming out of the bar and winding in the same direction. Our Milky Way is an example of a barred spiral galaxy, although we cannot observe it from our position.</span></p><ins class="adsbygoogle" data-ad-client="ca-pub-2765885248050149" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="7463298370" data-dcnode-id="1224" style="display:block; text-align:center;"></ins><span data-dcnode-id="1223" instrument_node="">
</span><br data-dcnode-id="1222"><div class="cnt32_rl_bg_str" data-dcnode-id="1221" data-id="274988" id="cnt_rb_274988"></div><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The central bulge is reddish in color, due to the presence of older stars. There is little gas in the nucleus itself and a black hole is usually found in the center.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">The disk for its part is bluish and rich in gas and dust, with the presence of young and hotter stars that orbit in almost circular paths around the galactic nucleus, but more slowly than those of the nucleus.</span></p><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">As for the spirals, they come in a great variety, ranging from those that wrap tightly around the central bulge or the arms arranged more openly on it. They stand out thanks to the large number of hot, blue, young stars they contain. </span></p><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">There are several theories about why they are formed, which we will talk about later.</span></p><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Finally, there is a spherical halo that surrounds the entire disk, poor in gas and dust, in which the oldest stars are grouped into globular star clusters, huge clusters with thousands and even millions of stars that move at high speed.</span></p><ins class="adsbygoogle" data-ad-client="ca-pub-2765885248050149" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="7463298370" data-dcnode-id="1210" style="display:block; text-align:center;"></ins><span data-dcnode-id="1209" instrument_node="">
</span><br data-dcnode-id="1208"><div class="cnt32_rl_bg_str" data-dcnode-id="1207" data-id="274988" id="cnt_rb_274988"></div><a data-dcnode-id="1206" id="menu-2"></a><span data-dcnode-id="1205" instrument_node="">
</span><h2 data-dcnode-id="1202"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Types of spiral galaxies</span></strong></h2><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">To classify galaxies according to their morphology (appearance as seen from Earth) the tuning fork created by Edwin Hubble in 1936 is used. This classification was later modified by other astronomers by adding subtypes and numbers to the original notation.</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Hubble letter-coded the galaxies this way: E for elliptical galaxies, SO for lenticular shaped galaxies, and S for spirals.</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Two more categories were later added to include SB barred spiral galaxies and non-patterned and irregular galaxies: Irr. About 90% of all observed galaxies are elliptical or spiral. Only 10% are in the Irr category.</span></p><img data-dcnode-id="1195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/andrmeda-descubrimiento-origen-caractersticas-estructura-1.webp&amp;raw"><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Hubble believed that galaxies began their life as spherical structures of the E0 type and then developed arms and became spiral galaxies that would end up being irregular.</span></p><ins class="adsbygoogle" data-ad-client="ca-pub-2765885248050149" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="7463298370" data-dcnode-id="1192" style="display:block; text-align:center;"></ins><span data-dcnode-id="1191" instrument_node="">
</span><br data-dcnode-id="1190"><div class="cnt32_rl_bg_str" data-dcnode-id="1189" data-id="274988" id="cnt_rb_274988"></div><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">However, it has been shown that this is not the case. Elliptical galaxies have a much slower rotational motion that will not lead to them flattening out and generating spirals.</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">On the arms of the Hubble tuning fork are the spiral galaxies: S for normal spirals and SB for barred spirals. The lower case letters indicate the subtypes: "a" indicates that the coils are tightly closed around the nucleus, while "c" is used when they are looser. Also the proportion of gas increases accordingly.</span></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The Milky Way is of the SBb type, with the Sun in one of the spiral arms: the arm of Orion, so called because the stars of this constellation are also found there, one of the most striking seen from Earth.</span></p><a data-dcnode-id="1182" id="menu-3"></a><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1178"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Theories about the origin of spirals</span></strong></h2><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">The origin of the spiral arms is not yet known with certainty, however there are several theories that attempt to explain them. To begin with, astronomers soon observed that different structures in a spiral galaxy rotate at different speeds. This is known as </span><i data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">differential rotation</span></i><span data-dcnode-id="1174" instrument_node=""> and it is a characteristic of this type of galaxies.</span></p><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">The interior of the disk of spiral galaxies rotates much faster than the exterior, while the halo does not rotate. For this reason, at the beginning it was believed that this was the cause of the spirals appearing and not only this, it is also the evidence of the existence of dark matter.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">However, if so, the spirals would be short-lived (in astronomical terms of course), because they would wind up on themselves and disappear.</span></p><a data-dcnode-id="1168" id="menu-4"></a><span data-dcnode-id="1167" instrument_node="">
</span><h2 data-dcnode-id="1164"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Density waves and star self-propagation</span></strong></h2><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">A more accepted theory to explain the existence of spirals is that of density waves. This theory, created by the Swedish astronomer Bertil Lindblad (1895-1965), postulates that matter experiences variations in its concentration, which, like sound, can propagate in the galactic environment.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">In this way, areas with more concentration are created, such as spirals, and others with less, which would be the spaces between them. But these areas have a limited duration, so the arms can move although their shape persists over time.</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">This explains why spirals are very active regions in terms of stellar production. There the gas and dust are more concentrated, so gravity intervenes so that the matter clumps together forming protostars, which will give rise to young and massive stars.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The other theory that seeks to explain spirals is that of self-propagation. The massive blue stars in the spiral arms are known to be short-lived relative to cooler, redder stars in the core. </span></p><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The former usually end their life in gigantic supernova explosions, but the material can be recycled into new stars in the same place as the previous ones: the spiral arms.</span></p><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">This would explain the persistence of the arms, but not the origin of them. For this reason, astronomers believe rather that they are due to a combination of factors: the same differential rotation, the existence of density waves, the self-propagation of stars and the interactions suffered with other galaxies. </span></p><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">All these circumstances together give rise to different types of spiral arms: thin and clearly delineated or thick and poorly defined.</span></p><a data-dcnode-id="1149" id="menu-5"></a><span data-dcnode-id="1148" instrument_node="">
</span><h2 data-dcnode-id="1145"><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Differences with elliptical galaxies</span></strong></h2><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The most obvious difference is that the stars in elliptical galaxies are more evenly distributed than in spirals. In these they appear concentrated in the reddish disk and scattered in the spiral arms, bluish in color, whereas the distribution in elliptical galaxies is oval.</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Another distinctive feature is the presence or absence of interstellar gas and dust. In elliptical galaxies, most of the matter turned into stars long ago, so they have little gas and dust.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">For their part, spiral galaxies have areas where gas and dust, which give rise to new stars, is abundant.</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The next notable difference is the type of stars. Astronomers distinguish two stellar populations: population I young and population II, older stars. Elliptical galaxies contain population II stars and few elements heavier than helium.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">In contrast, spiral galaxies contain Populations I and II. Population I, younger and with high metallicity, predominates on the disc and the arms. This means that they contain heavy elements, remnants of already disappeared stars, while the oldest stars are found in the halo.</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">For this reason, stars continue to form in spiral galaxies, whereas in elliptical galaxies they do not. And it is that elliptical galaxies are probably the result of collisions between spiral and irregular galaxies, during which most of the cosmic dust disappears and with it the possibility of creating new stars.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">These collisions between galaxies are frequent events, in fact it is believed that the Milky Way is in collision with small satellite galaxies: the Sagittarius elliptical dwarf galaxy SagDEG and the Canis Major dwarf galaxy.</span></p><a data-dcnode-id="1130" id="menu-6"></a><span data-dcnode-id="1129" instrument_node="">
</span><h2 data-dcnode-id="1126"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Comparison chart</span></strong></h2><img data-dcnode-id="1125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/galaxias-espirales-caractersticas-formacin-y-tipos-1.webp&amp;raw"><a data-dcnode-id="1124" id="menu-7"></a><span data-dcnode-id="1123" instrument_node="">
</span><h2 data-dcnode-id="1120"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Examples of spiral galaxies</span></strong></h2><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Spiral galaxies abound in the universe. Viewed from Earth, they are objects of extraordinary beauty due to their various forms. For example, in the constellation Eridano there are five spiral galaxies of different types, including three barred. One of them is NGC 1300, shown below.</span></p><img data-dcnode-id="1117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/galaxias-espirales-caractersticas-formacin-y-tipos-2.webp&amp;raw"><a data-dcnode-id="1116" id="menu-8"></a><span data-dcnode-id="1115" instrument_node="">
</span><h2 data-dcnode-id="1112"><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">The milky way</span></strong></h2><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">It is the galaxy that houses the Solar System in one of its spiral arms. It contains between 100 and 400 billion stars with an estimated size of between 150 - 200 thousand light years. It is part of the so-called Local Group of galaxies, along with Andromeda and about 50 other galaxies, almost all dwarfs.</span></p><a data-dcnode-id="1109" id="menu-9"></a><span data-dcnode-id="1108" instrument_node="">
</span><h2 data-dcnode-id="1105"><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Andromeda</span></strong></h2><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Also known as M31, it is located in the constellation Andromeda, close to Cassiopeia with its recognizable W shape. It can be seen with the naked eye or with good binoculars on clear, moonless nights.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Although it already appeared in the records of ancient Arab astronomers, it was not known that it was a galaxy until the beginning of the 20th century, thanks to the observations of Edwin Hubble.</span></p><img data-dcnode-id="1100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/galaxias-espirales-caractersticas-formacin-y-tipos-3.webp&amp;raw"><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">It is about 2.5 million light years away and is about the same size as the Milky Way, although it is believed to be slightly more massive. However, recent estimates indicate that its mass is comparable to that of our own galaxy.</span></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Andromeda is approaching us at great speed, so it is expected that in about 4.5 billion years it will collide with the Milky Way, giving rise to a gigantic elliptical galaxy.</span></p><a data-dcnode-id="1095" id="menu-10"></a><span data-dcnode-id="1094" instrument_node="">
</span><h2 data-dcnode-id="1091"><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Whirlpool Galaxy</span></strong></h2><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">It appears in Messier's catalog as object M51 and was discovered by Charles Messier himself in 1773. It is found in the constellation of Canes Venatici in the boreal sky, near Bootes and Leo, from where it can be seen with binoculars.</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">This majestic astronomical object has the typical shape of a spiral galaxy and is at an estimated distance of between 16 and 27 million light years. It has a companion galaxy clearly visible in telescope images: the galaxy NGC 5195.</span></p><img data-dcnode-id="1086" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.warbletoncouncil.org/science/cules-son-los-elementos-del-universo.webp&amp;raw"><a data-dcnode-id="1085" id="menu-11"></a><span data-dcnode-id="1084" instrument_node="">
