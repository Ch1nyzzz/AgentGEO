="1062" instrument_node="">galaxy: Spiral galaxies</span></a></span><p class="topic-paragraph" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">   Spirals are characterized by circular symmetry, a bright nucleus surrounded by a thin outer disk, and a superimposed spiral structure. They are divided into two parallel classes: normal spirals and barred spirals. The normal spirals have arms that emanate from the nucleus, while… </span></p><a class="read-more" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy/Types-of-galaxies%23ref559197"><span data-dcnode-id="1057" instrument_node="">Read More</span></a></li></ul></section><section data-dcnode-id="1037"><h3 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">distribution of nebulae</span></h3><ul class="list-unstyled" data-dcnode-id="1038"><li data-dcnode-id="1039"><div class="md-assembly-wrapper card-media" data-dcnode-id="1049" data-type="image"><img alt="The Cat's Eye nebula." data-dcnode-id="1050" data-height="1600" data-width="1596" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/70/94870-050-2ECAB6AD/Cats-Eye-nebula.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"></div><span data-dcnode-id="1048" instrument_node=""> </span><span class="index-xref" data-dcnode-id="1044"><span data-dcnode-id="1047" instrument_node="">In </span><a class="md-crosslink" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/nebula%23ref363692"><span data-dcnode-id="1046" instrument_node="">nebula</span></a></span><p class="topic-paragraph" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">In a spiral galaxy the interstellar medium makes up 3 to 5 percent of the galaxy’s mass, but within a spiral arm its mass fraction increases to about 20 percent. About 1 percent of the mass of the interstellar medium is in the form of “dust”—small solid…</span></p><a class="read-more" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/nebula%23ref363692"><span data-dcnode-id="1041" instrument_node="">Read More</span></a></li></ul></section><section data-dcnode-id="1021"><h3 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">observational astronomy</span></h3><ul class="list-unstyled" data-dcnode-id="1022"><li data-dcnode-id="1023"><div class="md-assembly-wrapper card-media" data-dcnode-id="1033" data-type="image"><img alt="Hubble Space Telescope" data-dcnode-id="1034" data-height="650" data-width="845" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/73216-050-C10E383B/Hubble-Space-Telescope-Discovery-space-shuttle.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"></div><span data-dcnode-id="1032" instrument_node=""> </span><span class="index-xref" data-dcnode-id="1028"><span data-dcnode-id="1031" instrument_node="">In </span><a class="md-crosslink" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy/Observations-of-the-galactic-centre%23ref406884"><span data-dcnode-id="1030" instrument_node="">astronomy: Study of other galaxies and related phenomena</span></a></span><p class="topic-paragraph" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Spiral galaxies—of which the Milky Way system is a characteristic example—tend to be flattened, roughly circular systems with their constituent stars strongly concentrated along spiral arms. These arms are thought to be produced by traveling density waves, which compress and expand the galactic material. Between…</span></p><a class="read-more" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy/Observations-of-the-galactic-centre%23ref406884"><span data-dcnode-id="1025" instrument_node="">Read More</span></a></li></ul></section><section data-dcnode-id="1005"><h3 data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">work of Hubble</span></h3><ul class="list-unstyled" data-dcnode-id="1006"><li data-dcnode-id="1007"><div class="md-assembly-wrapper card-media" data-dcnode-id="1017" data-type="image"><img alt="Edwin Hubble" data-dcnode-id="1018" data-height="1376" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/60/198560-050-11888CDF/Edwin-Hubble-1931.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"></div><span data-dcnode-id="1016" instrument_node=""> </span><span class="index-xref" data-dcnode-id="1012"><span data-dcnode-id="1015" instrument_node="">In </span><a class="md-crosslink" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble%23ref267734"><span data-dcnode-id="1014" instrument_node="">Edwin Hubble</span></a></span><p class="topic-paragraph" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">…the problem of the so-called spiral nebulae, objects he had investigated for his doctorate. The status of the spirals (as they were widely known) was then unclear. Were they distant star systems (galaxies in current terminology) comparable to the Milky Way Galaxy, or were they clouds of gas or sparse…</span></p><a class="read-more" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble%23ref267734"><span data-dcnode-id="1009" instrument_node="">Read More</span></a></li></ul></section></section></div><span data-dcnode-id="1002" instrument_node="">

</span></div><span class="marker before-article" data-dcnode-id="594"></span><div class="md-sentinel--spy-target" data-dcnode-id="593"></div><section data-dcnode-id="558" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="565"><strong data-dcnode-id="590"><span data-dcnode-id="592" id="ref279593"></span><span data-dcnode-id="591" instrument_node="">Seyfert galaxy</span></strong><span data-dcnode-id="589" instrument_node="">,  any of a class of </span><a class="md-crosslink" data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="588" instrument_node="">galaxies</span></a><span data-dcnode-id="586" instrument_node=""> known to have active nuclei. Such galaxies were named for the American astronomer </span><span data-dcnode-id="585" id="ref956837"></span><span data-dcnode-id="584" instrument_node="">Carl K. Seyfert, who first called attention to them in 1944. Two types are recognized. The nuclear spectra of </span><span data-dcnode-id="583" id="ref956838"></span><span data-dcnode-id="582" instrument_node="">Type 1 Seyfert galaxies show broad emission lines, which are indicative of a central concentration of hot gas that is expanding at speeds of up to thousands of kilometres per second. </span><span data-dcnode-id="581" id="ref956839"></span><a class="md-crosslink" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/type-2-Seyfert-galaxy"><span data-dcnode-id="580" instrument_node="">Type 2 Seyferts</span></a><span data-dcnode-id="578" instrument_node=""> have strong emission lines, but they indicate more-modest velocities, less than 1,000 km/sec. Seyfert galaxies appear normal in ordinary images but are extremely strong sources of </span><a class="md-crosslink" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="577" instrument_node="">infrared radiation</span></a><span data-dcnode-id="575" instrument_node="">. Moreover, many are powerful sources of radio energy and </span><a class="md-crosslink" data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/X-ray"><span data-dcnode-id="574" instrument_node="">X-rays</span></a><span data-dcnode-id="572" instrument_node=""> as well. Seyfert nuclei are related to </span><a class="md-crosslink" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/quasar"><span data-dcnode-id="571" instrument_node="">quasars</span></a><span data-dcnode-id="569" instrument_node=""> but apparently involve smaller amounts of energy release. Like quasars, they are thought to be powered by massive </span><a class="md-crosslink" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/black-hole"><span data-dcnode-id="568" instrument_node="">black holes</span></a><span data-dcnode-id="566" instrument_node=""> at their centres. About 1 percent of all spiral galaxies are thought to exhibit Seyfert properties, or perhaps all spiral galaxies are Seyferts 1 percent of the time.</span></p><span class="marker p1" data-dcnode-id="563"></span><span class="marker AM1 am-inline" data-dcnode-id="561"></span><span class="marker MOD1 mod-inline" data-dcnode-id="559"></span></section><span data-dcnode-id="557" instrument_node="">
