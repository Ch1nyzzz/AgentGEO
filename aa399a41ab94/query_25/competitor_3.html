</span><section class="content-single content-area" data-dcnode-id="135" id="primary"><span data-dcnode-id="289" instrument_node="">
</span><main class="site-main" data-dcnode-id="138" id="main" role="main"><span data-dcnode-id="288" instrument_node="">
</span><article class="post-446 page type-page status-publish has-post-thumbnail hentry" data-dcnode-id="192" id="post-446"><span data-dcnode-id="287" instrument_node="">
</span><header class="entry-header" data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Types of Galaxies</span></h1><span data-dcnode-id="283" instrument_node="">
</span></header><span data-dcnode-id="280" instrument_node="">
</span><div class="entry-content clearfix" data-dcnode-id="195"><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The most widely used classification scheme for galaxies is based on one devised by Edwin P. Hubble and further refined by astronomer Gerard de Vaucouleurs. It uses the three main types:</span></p><span data-dcnode-id="276" instrument_node="">
</span><ul class="menu-list" data-dcnode-id="262"><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="272"><a data-dcnode-id="273" href="#spiral"><span data-dcnode-id="274" instrument_node="">Spiral</span></a></li><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="268"><a data-dcnode-id="269" href="#elliptical"><span data-dcnode-id="270" instrument_node="">Elliptical</span></a></li><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="264"><a data-dcnode-id="265" href="#irregular"><span data-dcnode-id="266" instrument_node="">Irregular</span></a></li><span data-dcnode-id="263" instrument_node="">
</span></ul><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">then further breaks them down by specific characteristics (openness of spirals, size and extent of bars, size of galactic bulges). In this age of multi-wavelength observing, the sub-classifications also include markers for such characteristics as a galaxy’s star-formation rate and age spectrum of its stars.</span></p><span data-dcnode-id="258" instrument_node="">
</span><div data-dcnode-id="256" id="spiral"><span data-dcnode-id="257" instrument_node="">&nbsp;</span></div><span data-dcnode-id="255" instrument_node="">
</span><h2 data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Spiral Galaxies</span></h2><span data-dcnode-id="252" instrument_node="">
</span><div class="black-background" data-dcnode-id="250"><img alt="Spiral Galaxies Diagram" class="aligncenter size-full wp-image-6040" data-dcnode-id="251" height="505" loading="eager" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/wp-content/uploads/spiral-galaxies.jpg&amp;raw" srcset="https://space-facts.com/wp-content/uploads/spiral-galaxies.jpg 1000w, https://space-facts.com/wp-content/uploads/spiral-galaxies-300x152.jpg 300w, https://space-facts.com/wp-content/uploads/spiral-galaxies-768x388.jpg 768w" width="1000"></div><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="248" instrument_node="">Spiral galaxies are the most common type in the universe. Our </span><a data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/galaxies/milky-way/"><span data-dcnode-id="247" instrument_node="">Milky Way</span></a><span data-dcnode-id="245" instrument_node=""> is a spiral, as is the rather close-by </span><a data-dcnode-id="243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/galaxies/andromeda/"><span data-dcnode-id="244" instrument_node="">Andromeda Galaxy</span></a><span data-dcnode-id="242" instrument_node="">. Spirals are large rotating disks of stars and nebulae, surrounded by a shell of dark matter. The central bright region at the core of a galaxy is called the “galactic bulge”. Many spirals have a halo of stars and star clusters arrayed above and below the disk.</span></p><span data-dcnode-id="240" instrument_node="">
</span><div class="black-background" data-dcnode-id="238"><img alt="Spiral Barred Galaxies Diagram" class="aligncenter size-full wp-image-6041" data-dcnode-id="239" height="505" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/wp-content/uploads/spiral-barred-galaxies.jpg&amp;raw" srcset="https://space-facts.com/wp-content/uploads/spiral-barred-galaxies.jpg 1000w, https://space-facts.com/wp-content/uploads/spiral-barred-galaxies-300x152.jpg 300w, https://space-facts.com/wp-content/uploads/spiral-barred-galaxies-768x388.jpg 768w" width="1000"></div><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="236" instrument_node="">Spirals that have large, bright bars of stars and material cutting across their central sections are called “barred spirals”. A large majority of galaxies have these bars, and astronomers study them to understand what function they play within the galaxy. In addition to bars, many spirals may also contain supermassive </span><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/black-holes/"><span data-dcnode-id="235" instrument_node="">black holes</span></a><span data-dcnode-id="233" instrument_node=""> in their cores. Subgroups of spirals are defined by the characteristics of their bulges, spiral arms, and how tightly wound those arms are.</span></p><span data-dcnode-id="231" instrument_node="">
</span><div data-dcnode-id="229" id="elliptical"><span data-dcnode-id="230" instrument_node="">&nbsp;</span></div><span data-dcnode-id="228" instrument_node="">
</span><h2 data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Elliptical Galaxies</span></h2><span data-dcnode-id="225" instrument_node="">
</span><div class="black-background" data-dcnode-id="223"><img alt="Elliptical Galaxies Diagram" class="aligncenter size-full wp-image-6042" data-dcnode-id="224" height="505" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/wp-content/uploads/elliptical-galaxies.jpg&amp;raw" srcset="https://space-facts.com/wp-content/uploads/elliptical-galaxies.jpg 1000w, https://space-facts.com/wp-content/uploads/elliptical-galaxies-300x152.jpg 300w, https://space-facts.com/wp-content/uploads/elliptical-galaxies-768x388.jpg 768w" width="1000"></div><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">Elliptical galaxies are roughly egg-shaped (ellipsoidal or ovoid) found largely in galaxy clusters and smaller compact groups. Most ellipticals contain older, low-mass stars, and because they lack a great deal of star-making gas and dust clouds, there is little new star formation occurring in them. Ellipticals can have as few as a hundred million to perhaps a hundred trillion stars, and they can range in size from a few thousand light-years across to more than a few hundred thousand. Astronomers now suspect that every elliptical has a central supermassive black hole that is related to the mass of the galaxy itself. </span><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/galaxies/messier-87/"><span data-dcnode-id="220" instrument_node="">Messier 87</span></a><span data-dcnode-id="218" instrument_node=""> is an example of an elliptical galaxy. There are some subgroups of ellipticals, including “dwarf ellipticals” with properties that put them somewhere between regular ellipticals and the tightly knit groups of stars called globular clusters.</span></p><span data-dcnode-id="216" instrument_node="">
</span><div data-dcnode-id="214" id="irregular"><span data-dcnode-id="215" instrument_node="">&nbsp;</span></div><span data-dcnode-id="213" instrument_node="">
</span><h2 data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Irregular Galaxies</span></h2><span data-dcnode-id="210" instrument_node="">
</span><div class="black-background" data-dcnode-id="208"><img alt="Irregular Galaxies Diagram" class="aligncenter size-full wp-image-6043" data-dcnode-id="209" height="505" loading="lazy" sizes="(max-width: 326px) 100vw, 326px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/wp-content/uploads/irregular-galaxies.jpg&amp;raw" srcset="https://space-facts.com/wp-content/uploads/irregular-galaxies.jpg 326w, https://space-facts.com/wp-content/uploads/irregular-galaxies-194x300.jpg 194w" width="326"></div><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="206" instrument_node="">Irregular galaxies are as their name suggests: irregular in shape. The best example of an irregular that can be seen from Earth is the </span><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space-facts.com/galaxies/magellanic-clouds/"><span data-dcnode-id="205" instrument_node="">Small Magellanic Cloud</span></a><span data-dcnode-id="203" instrument_node="">. Irregulars usually do not have enough structure to characterise them as spirals or ellipticals. They may show some bar structure, they may have active regions of star formation, and some smaller ones are listed as “dwarf irregulars”, very similar to the very earliest galaxies that formed about 13.5 billion years ago. Irregulars are characterised by their structures (or lack of them).</span></p><span data-dcnode-id="201" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="197" style="text-align: right;"><strong data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Galaxy Illustrations:</span></strong><span data-dcnode-id="198" instrument_node=""> Laurine Moreau – laurinemoreau.com</span></p><span data-dcnode-id="196" instrument_node="">
</span></div><span data-dcnode-id="193" instrument_node="">
</span></article><span data-dcnode-id="191" instrument_node="">
</span><div class="widget_text widget widget_custom_html widget-bottom" data-dcnode-id="179" id="custom_html-3"><div class="textwidget custom-html-widget" data-dcnode-id="180"><div class="ad-bottom" data-dcnode-id="181"><center data-dcnode-id="182"><span data-dcnode-id="189" instrument_node="">
