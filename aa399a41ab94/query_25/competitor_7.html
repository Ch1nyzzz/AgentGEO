</span><h2 data-dcnode-id="750" id="Introduction"><span data-dcnode-id="751" instrument_node="">Introduction:</span></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Astronomers are still uncertain about how galaxies have formed. They believe that after the Big Bang, space was made up of mostly hydrogen and helium and as gravity pulled gas and dust together it formed individual stars.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">As those star began to pull together with their gravitational forces they created collections of stars that eventually turned into galaxies.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">There are other scientists that believe that the mass of the galaxies were pulled together prior to the stars being created.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Galaxies are defined as a large group of gas, dust, and stars that are held together by gravity.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Our solar system is one of many that exist in the Milky Way galaxy, which is a spiral galaxy that is part of a larger galaxy group called the Local Group.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Scientists believe that the universe has billions of galaxies, and for humans, we have been able to view three outside of our Milky Way galaxy just by looking at the night sky, for thousands of years: the Large and Small Magellanic Clouds and the Andromeda galaxy.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">To give you an idea of how far these are from Earth, the Large and Small Magellanic Clouds are around 160,000 light-years away. They are considered to be “satellites” of the Milky Way galaxy.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The Andromeda galaxy is quite a bit larger and is around 2.5 million light-years away. All other galaxies are a lot farther away from us.</span></p><span data-dcnode-id="725" instrument_node="">
</span><h2 data-dcnode-id="723" id="Statistics"><span data-dcnode-id="724" instrument_node="">Types of Galaxies Statistics:</span></h2><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Scientists have classified galaxies into three types: elliptical, spiral, and irregular.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="716"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Elliptical Galaxies:</span></strong></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">These galaxies are named after their general oval or round shape, and they typically have stars that are speckled evenly throughout.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Like spiral galaxies, they usually have a bulge and a halo, however, they don’t have the flat disk of stars. Elliptical galaxies have stars that seem to be a lot older and have lower masses.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><img alt="Elliptical Galaxies" class="alignnone size-full wp-image-1373" data-dcnode-id="708" height="806" sizes="(max-width: 767px) 89vw, (max-width: 1000px) 54vw, (max-width: 1071px) 543px, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies.jpg&amp;raw" srcset="https://www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies.jpg 800w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies-150x150.jpg 150w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies-298x300.jpg 298w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies-768x774.jpg 768w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Elliptical-Galaxies-100x100.jpg 100w" title="Elliptical Galaxies" width="800"></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">This is due to the fact that there is less of the gasses and dust required to make new stars. They can have as small of a number of stars as a hundred million or as man as a hundred trillion.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Elliptical galaxies can be in a number of sizes as well. Some are a few thousand light-years across, while the bigger ones are as large as a few hundred thousand light-years across.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">This type of galaxy is mostly found in smaller groups and galaxy clusters. Scientists believe that all elliptical galaxies have a supermassive black hole at its center. They think that the black hole is related to the galaxy’s mass.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">There is also a subgroup of elliptical galaxies call “dwarf ellipticals.” These galaxies have properties that relate to regular elliptical galaxies but also some of the globular clusters, which are a tightknit group of stars.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Lenticular Galaxies:</span></strong></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Named after their lens-shape, lenticular galaxies have thinner rotating star disks. They also have a middle bulge, but no spiral arms.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">They share characteristics with elliptical galaxies in that they have very little interstellar matter or dust. Lenticular galaxies seem to exist in some of space’s more densely populated areas.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Spiral Galaxies:</span></strong></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Spiral galaxies may be those that are the most familiar. They have an identifiable spiral shape with extending “arms” and a mostly flat disk that has a bulge in the center.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The bulge is the large concentration of stars, and both the bulge and arms have a halo of stars that can be faintly seen.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The arms contain a higher percentage of gas and dust that are required for new star formation. This is why the spiral arm have the highest quantity of younger stars.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The bulge and arms have the older stars and a lot less of the dust and gas. Our Milky Way is a spiral galaxy.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The most common types of galaxies that exist in the universe are the spiral galaxies. The spiral galaxies are large and have a disk of rotating stars and nebulae that is encircled by dark matter.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The very center or core is called the “galactic bulge” and some spiral galaxies have star clusters and stars below and above the disk that create a halo-effect.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">A majority of the spiral galaxies contain a supermassive black hole at their center.There are some spiral galaxies that are in a sub-classification called “barred spirals.”</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">This is because their bulge looks like a bar. The bulge is more elongated and in these galaxy types the arms usually look like they extend out of the ends of the bar.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">There are other spiral galaxy subgroups that are defined by how tightly their arms are wound, their spiral arms, and the bulges.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="650"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Irregular Galaxies:</span></strong></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">As you could guess by the name, the irregular galaxies don’t really have any structure or shape that makes them identifiable.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">These galaxies often look rather chaotic, don’t have any trace that they ever had spiral arms, and don’t have a bulge.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Scientists believe that the appearance of these galaxies is due to the interactions and collisions that they had with other galaxies. Some irregular galaxies may have a bar structure as well as regions that are active in the formation of new stars.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">There is a subgroup of irregular galaxies called the “dwarf irregulars,” and they are thought to appear like the earliest galaxies that were formed around 13.5 billion years ago.</span></p><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="635" id="History"><span data-dcnode-id="636" instrument_node="">History:</span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">For much of the history, astronomers assumed that the Milky Way galaxy was the center of the universe and everything revolved or orbited around it.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">This idea continued until the early 1900s when a scientist and Harvard College Observatory head, Harlow Shapley, indicated that the spiral-shaped blobs he was observing were gas and dust that was separate from the Milky Way galaxy. He called these areas “island universes.”</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><img alt="Spiral Galaxies" class="alignnone size-full wp-image-1381" data-dcnode-id="627" height="783" loading="lazy" sizes="(max-width: 767px) 89vw, (max-width: 1000px) 54vw, (max-width: 1071px) 543px, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetsforkids.org/wp-content/uploads/2019/06/Spiral-Galaxies.jpg&amp;raw" srcset="https://www.planetsforkids.org/wp-content/uploads/2019/06/Spiral-Galaxies.jpg 800w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Spiral-Galaxies-300x294.jpg 300w, https://www.planetsforkids.org/wp-content/uploads/2019/06/Spiral-Galaxies-768x752.jpg 768w" title="Spiral Galaxies" width="800"></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Edwin Hubble identified a number of pulsing stars in 1924 that he called “Cepheid variables.”</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">He recognized that they were outside of the Milky Way galaxy and were a completely unique set of stars that existed at far away distances.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">He began the first creation of an initial classification system for the items that he was identifying.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Gerard de Vaucouleurs took Hubble’s initial classification system and revised it to identify the three main galaxy types and broke them down by the characteristics that included: openness of spirals, extent and size of bars, and galactic bulge size.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">As scientists continued to observe galaxies they added additional sub-classifications to include characteristic markers such as the star-formation rate of a galaxy and the age spectrum of the stars in a galaxy.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="608" id="Structure"><span data-dcnode-id="609" instrument_node="">Structure:</span></h2><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Galaxies exist in all sizes and shapes and can contain a few hundred thousand stars and be quite a few thousand light-years across all the way to being home to trillions of stars and being as large as hundreds of thousands of light-years across.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Galaxies can exist on their own as well as collected together in small groups and even larger clusters. Galaxies are the place where we find the stars and they believe they are the nursery for new stars.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><img alt="Irregular Galaxies" class="alignnone size-large wp-image-1383" data-dcnode-id="600" height="335" loading="lazy" sizes="(max-width: 525px) 100vw, 525px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetsforkids.org/wp-content/uploads/2019/06/irregular-galaxies-1024x653.jpg&amp;raw" srcset="https://www.planetsforkids.org/wp-content/uploads/2019/06/irregular-galaxies.jpg 1024w, https://www.planetsforkids.org/wp-content/uploads/2019/06/irregular-galaxies-300x191.jpg 300w, https://www.planetsforkids.org/wp-content/uploads/2019/06/irregular-galaxies-768x490.jpg 768w" title="Irregular Galaxies" width="525"></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">This is one of the reasons that you rarely find stars sitting in space by themselves outside of galaxies.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Galaxies are constantly moving, so it’s no surprise if they crash into each other. When this happens they change their shape and can jumpstart a lot of star-formations.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">When galaxies collide their stars don’t collide. This is because there is such a huge amount of distance between the stars.</span></p><span data-dcnode-id="589" instrument_node="">
</span><h2 data-dcnode-id="587" id="Interesting"><span data-dcnode-id="588" instrument_node="">Interesting Information:</span></h2><span data-dcnode-id="586" instrument_node="">
</span><ul data-dcnode-id="560"><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Almost all galaxies have a center that contains a black hole. Objects that are drawn into the black hole generate huge amounts of energy that can be seen by astronomers using specialize equipment.</span></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Some galaxies can be relatively small and yet have a black hole that is extremely large.</span></li><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">The material that circles a black hole can spew out energy in the form of bright jets.</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Some galaxies have quasars at their center, which are the most energetic bodies in the universe.</span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The classification of galaxies is based on their shape but also on their evolutionary history.</span></li><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">The spiral galaxies are the most common and contain huge amounts of dust and gas that create new stars.</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">There aren’t as many elliptical galaxies as spiral galaxies, and these have less of the gas, dust and star-making regions. Astronomers think that around half of the universe’s galaxies are elliptical.</span></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Irregular galaxies make up around three percent of the galaxies. They can have many different shapes and are often rather chaotic looking.</span></li><span data-dcnode-id="561" instrument_node="">
</span></ul><span data-dcnode-id="559" instrument_node="">
</span><h2 data-dcnode-id="557" id="Exploration"><span data-dcnode-id="558" instrument_node="">Exploration and Research:</span></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Hubble measured the distances between individual galaxies and continued with his measurements through the use of the “Doppler shift” information.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">This is the measurement of the quantity of light from the galaxies that was stretched out due to their motion. Using the Doppler shift he discovered that the galaxies that were around the Milky Way galaxy were traveling at very fast speed and moving away from us.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">He also discovered that those in the farthest distance were moving faster than the galaxies closer to the Milky Way galaxy. Using this information Hubble calculated that the universe was expanding.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Astronomers took this data and eventually figured out the speed of the expansion of the universe.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Using the sophisticated and higher technology telescopes on both the ground and in space, astronomers have been able to track galaxies and see how their individual evolution is effected by dark matter.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Dark matter is a mysterious substance that can’t be seen with any type of telescope or technology.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Scientists believe that both dark matter and dark energy make up a majority of the mass and energy in the universe, however, they still grapple with proving their existence.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="531"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">2017:</span></strong><span data-dcnode-id="532" instrument_node=""> Astronomers located two large galaxies from the ancient universe that were created with a large quantity of dark matter. The unusually huge size of the galaxies have given scientists the ability to question whether they grew bigger with time or if there is another unknown process that caused their size.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="526"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">2017:</span></strong><span data-dcnode-id="527" instrument_node=""> Just a few months after the discovery of the two extraordinarily large ancient universe galaxies, astronomers located a group of galaxies that were orbiting with each other in sync in a pattern that might be later explained as being dark matter.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="521"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">2017:</span></strong><span data-dcnode-id="522" instrument_node=""> the Multi Unit Spectroscopic Explorer (MUSE) instrument used at the European Southern Observatory’s Very Large Telescope (VLT) allowed astronomers to view a group of 72 galaxies that were previously hidden due to being so faint.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="516"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">2018:</span></strong><span data-dcnode-id="517" instrument_node=""> A research group challenged the theory of dark matter when they found the NGC 1052-DF2 galaxy. This galaxy had nearing four hundred times less dark matter than the predictive models for it size. The results of the discovery remain under debate as it is controversial.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">2018:</span></strong><span data-dcnode-id="512" instrument_node=""> A Hubble Space Telescope image was created that included around 15,000 galaxies in it. This image gave astronomers an incredible amount of information for future studies.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="506"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">2018:</span></strong><span data-dcnode-id="507" instrument_node=""> Scientists discovered hundreds of galaxies that were hiding behind a super-energetic black hole.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h2 data-dcnode-id="503" id="Facts"><span data-dcnode-id="504" instrument_node="">Facts about Galaxies for Kids:</span></h2><span data-dcnode-id="502" instrument_node="">
</span><ul data-dcnode-id="464"><span data-dcnode-id="501" instrument_node="">
</span><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The word “galaxy” comes from the Greek word “galaxias” which translates to “milky”. Humans in the past thought that our Milky Way galaxy was the center of the universe, so the word relates to all galaxies.</span></li><span data-dcnode-id="498" instrument_node="">
</span><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Scientists believe that there may be over 170 billion galaxies in the universe that we call “observable,” and there actually could be a lot more.</span></li><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The arms of the spiral galaxies have dense molecular clouds of hydrogen gas and dust that are the star nurseries for creating new stars.</span></li><span data-dcnode-id="492" instrument_node="">
</span><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Nearing two thirds of the spiral galaxies are barred-spiral galaxies, with the bars at their center.</span></li><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The classification used for galaxies is referred to as the Hubble classification scheme and lists spiral galaxies depending upon how tightly wound their arms are and the center bulge size.</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">They include a type “S” with an “a, b or c.” Barred spiral galaxies use the classification symbol of “SB.”</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Scientists believe that spiral galaxies are younger than elliptical galaxies. It’s thought that spiral galaxies burn through the star-forming fuel and eventually become elliptical galaxies.</span></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">The Hubble classification scheme uses the letter “E” to identify elliptical galaxies. There may be an additional number assigned for the ellipticity degree.</span></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">The Hubble classification scheme for Lenticular galaxies uses “S0” for identification.</span></li><span data-dcnode-id="474" instrument_node="">
</span><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">The Milky Way galaxy is considered to be a barred spiral galaxy that is around 120,000 light-years in diameter.</span></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">If the night sky looks like it’s full of stars – think about the fact that the Milky Way galaxy has around 400 billion stars and maybe as many planets as stars.</span></li><span data-dcnode-id="468" instrument_node="">
</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">The name for a galaxy that creates new stars at a faster than normal rate is “starburst.”</span></li><span data-dcnode-id="465" instrument_node="">
