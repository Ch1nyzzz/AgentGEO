</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Spiral galaxies are the most common type of galaxies found throughout the Universe. They possess the most beautiful features out of the 4 types of galaxies.</span></p><span data-dcnode-id="781" instrument_node="">

</span><h2 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Key Facts &amp; Summary</span></h2><span data-dcnode-id="751" instrument_node="">
</span><ul data-dcnode-id="708"><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">Spiral galaxies&nbsp;are a&nbsp;class&nbsp;of&nbsp;galaxies&nbsp;originally described by astronomer&nbsp;Edwin Hubble&nbsp;in his 1936 work&nbsp;</span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Realm of the Nebulae.</span></em></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">They are part of the Hubble sequence a morphological classification scheme for galaxies.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Spiral galaxies usually consist of a rotating disk that contains stars, dust, gas, and a concentration of stars known as the bulge in the center.</span></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">These bulges are often surrounded by a faint halo of stars, many of which reside in globular clusters – a spherical collection of stars that orbits a galactic core.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">As such, Spiral galaxies are named after their spiral structures that extend from the center into a galactic disk.</span></li><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">They have spiral arms – sites of ongoing star formation that are brighter than the surrounding disk due to the presence of young OB stars that inhabit them.</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Around two-thirds of all spiral galaxies have an additional component in the form of a bar-like structure.</span></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">This bar extends from the central bulge at the ends of which spiral arms begin.</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Our Milky Way, for example, is a barred spiral galaxy.</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Spiral galaxies are the most common type of galaxies found throughout the Universe. Around 60% of the observable universe is comprised out of spiral galaxies.</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Spiral galaxies are mostly found in low-density regions, and very rarely at the center of galaxy clusters.</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Most spiral galaxies contain a supermassive black hole in the center of the central bulge.</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Spiral galaxies tend to be the brightest galaxies in the universe.</span></li><span data-dcnode-id="709" instrument_node="">
</span></ul><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The discovery of other types of galaxies is fairly recent. In fact, we didn’t even know that other galaxies existed, other than the Milky Way for a long time. Galaxies were first classified as nebulae since they looked like fuzzy clouds. All of this changed in 1920 when astronomer Edwin Hubble demonstrated that the Andromeda nebula was, in fact, a galaxy.&nbsp; With this revelation further studies were conducted, many other galaxies were discovered and in 1936, Hubble debuted a way to classify galaxies.</span></p><span data-dcnode-id="704" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="702"><img alt="" class="wp-image-3944" data-dcnode-id="703" height="480" loading="lazy" sizes="(max-width: 614px) 100vw, 614px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/M101_hires.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/M101_hires.jpg 614w, https://nineplanets.org/wp-content/uploads/2019/12/M101_hires-300x235.jpg 300w" width="614"></figure><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">He grouped them into four main categories: spiral galaxies, lenticular galaxies, elliptical galaxies, and irregular galaxies. Observations revealed that spiral galaxies were the most common type of galaxies found throughout the universe.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">They have a flat, spinning disk with a central bulge surrounded by spiral arms. The spinning motion reaches speeds of up to hundreds of kilometers/miles per second. This usually can cause matter in the disk to take on a distinctive spiral shape, like a cosmic pinwheel. For example, our Milky Way, like many other spiral galaxies, has a linear, starry bar at its center.</span></p><span data-dcnode-id="695" instrument_node="">
</span><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Formation</span></h2><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Galaxies are thought to have been formed roughly 13 to 14 billion years ago. One hypothesis states that galaxies were born when vast clouds of gas and dust collapsed under their own gravitational pull, allowing stars to form.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">A second hypothesis claims that the young universe contained many small "lumps" of matter, which clumped together to form galaxies. Hubble Space Telescope has photographed such lumps, which may be the precursors to modern galaxies.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">According to this theory, most of the early large galaxies were spirals. But over time, many spirals merged to form elliptical galaxies. Galaxies go on to merge with one another to create even bigger galaxies. Our Milky Way, for example, will collide with the Andromeda galaxy in the far future.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Nonetheless, there are still open questions about how galaxies form. Some astronomers believe that galaxies usually form from smaller clusters of about one million stars, known as globular clusters. Other astronomers believe that galaxies formed first and later birthed globular clusters. When it comes to spiral galaxies, it is believed that the stellar halo, bulge, and disks formed at different times and through different mechanisms.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Structure - Characteristics</span></h2><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Usually, spiral galaxies contain a central bulge surrounded by a flat, rotating disk of stars. The bulge located in the center is made up of older, dimmer stars, and is thought to usually contain a supermassive black hole.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Around two-thirds of spiral galaxies also contain a bar structure through their center, the same as our Milky Way. The disk of stars orbiting the bulge tends to separate into arms that circle the galaxy. These spiral arms contain a wealth of gas and dust, thus many young stars are birthed in these regions. These young stars shine very brightly before their quick demise.</span></p><span data-dcnode-id="671" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="669"><img alt="" class="wp-image-3943" data-dcnode-id="670" height="600" loading="lazy" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/HAWK-I_NGC.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/HAWK-I_NGC.jpg 602w, https://nineplanets.org/wp-content/uploads/2019/12/HAWK-I_NGC-300x300.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/HAWK-I_NGC-150x150.jpg 150w" width="602"></figure><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The motion of the spiral arms still remains disputed. A theory suggests that these galaxy arms could be the result of density waves traveling through the outer disk. Encounters between galaxies may cause such waves as the mass of the smaller galaxy could affect the structure of the larger galaxy as they unite.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="664" instrument_node="">Their size usually varies greatly, from 5 up to 100 kiloparsecs across. The same can be said regarding their mass which typically is between 10</span><sup data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">9</span></sup><span data-dcnode-id="661" instrument_node="">&nbsp;and 10</span><sup data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">12</span></sup><span data-dcnode-id="658" instrument_node="">&nbsp;solar masses, and luminosities ranging from 10</span><sup data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">8</span></sup><span data-dcnode-id="655" instrument_node="">&nbsp;to 10</span><sup data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">11</span></sup><span data-dcnode-id="652" instrument_node="">&nbsp;time that of the </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/the-sun/"><span data-dcnode-id="651" instrument_node="">Sun.</span></a></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The vast majority of spiral galaxies rotate in the sense that the arms trail the direction of the spin.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Measurements of the rotation curves revealed that the orbital speed of the material in the disk does not fall off as expected if most of the mass is concentrated near the center.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Because of this, the visible portion of spiral galaxies is regarded as having only a small fraction of the total mass of the galaxy.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Thus it is concluded that spiral galaxies are surrounded by an extensive halo consisting mostly of dark matter.</span></p><span data-dcnode-id="636" instrument_node="">
</span><h2 data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Spiral Galaxies Classification</span></h2><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Spiral galaxies can be classified according to the tightness of their spiral, the lumpiness of their arms, and the overall size of their central bulge.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The relative amounts of gas and dust contained within these galaxies can portray these differences.</span></p><span data-dcnode-id="627" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="625"><img alt="" class="wp-image-3942" data-dcnode-id="626" height="480" loading="lazy" sizes="(max-width: 583px) 100vw, 583px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/HubbleTuningFork.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/HubbleTuningFork.jpg 583w, https://nineplanets.org/wp-content/uploads/2019/12/HubbleTuningFork-300x247.jpg 300w" width="583"></figure><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">There are currently 3 classifications of classical spiral galaxies and another 3 for barred spiral galaxies:</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="617"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">1. Spiral galaxy type A – abbreviation Sa –</span></strong><span data-dcnode-id="618" instrument_node=""> they have a big central bulge and smooth, broad spiral arms. Around 2% of the&nbsp;mass&nbsp;of Sa spiral galaxies is present in the form of gas and dust. This means that a relatively small proportion of Sa galaxies are involved in star formation.</span></p><span data-dcnode-id="616" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="614"><img alt="" class="wp-image-3941" data-dcnode-id="615" height="196" loading="lazy" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-and-C.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-and-C.png 350w, https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-and-C-300x168.png 300w" width="350"></figure><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">2. </span><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Spiral galaxy type B – abbreviation Sb –</span></strong><span data-dcnode-id="609" instrument_node="">&nbsp; have a moderately-sized central bulge and moderately-well-defined spiral arms.</span></p><span data-dcnode-id="607" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="605"><img alt="" class="wp-image-3940" data-dcnode-id="606" height="196" loading="lazy" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-C.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-C.png 350w, https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-A-B-C-300x168.png 300w" width="350"></figure><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">3. </span><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Spiral Galaxy type C – abbreviation Sc – </span></strong><span data-dcnode-id="600" instrument_node="">&nbsp;small central bulge as well as narrow and well-defined central arms. They contain about 15% gas and dust.</span></p><span data-dcnode-id="598" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="596"><img alt="" class="wp-image-3939" data-dcnode-id="597" height="196" loading="lazy" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-ABC.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-ABC.png 350w, https://nineplanets.org/wp-content/uploads/2019/12/Spiral-Type-ABC-300x168.png 300w" width="350"></figure><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">4. </span><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Barred spiral galaxy type A – abbreviation SBa – </span></strong><span data-dcnode-id="591" instrument_node="">they feature tightly bound arms.</span></p><span data-dcnode-id="589" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="587"><img alt="" class="wp-image-3938" data-dcnode-id="588" height="480" loading="lazy" sizes="(max-width: 480px) 100vw, 480px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/NGC_4314HST1998-21.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/NGC_4314HST1998-21.jpg 480w, https://nineplanets.org/wp-content/uploads/2019/12/NGC_4314HST1998-21-300x300.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/NGC_4314HST1998-21-150x150.jpg 150w" width="480"></figure><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">5. </span><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Barred spiral galaxy type B – abbreviation SBb – </span></strong><span data-dcnode-id="582" instrument_node="">they feature both tightly and loosely bond arms.</span></p><span data-dcnode-id="580" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="578"><img alt="" class="wp-image-3937" data-dcnode-id="579" height="730" loading="lazy" sizes="(max-width: 730px) 100vw, 730px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Messier95_spitzer.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Messier95_spitzer.jpg 730w, https://nineplanets.org/wp-content/uploads/2019/12/Messier95_spitzer-300x300.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/Messier95_spitzer-150x150.jpg 150w" width="730"></figure><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">6. </span><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Barred spiral galaxy type C – abbreviation Sbc –</span></strong><span data-dcnode-id="573" instrument_node=""> they have loosely bound arms.</span></p><span data-dcnode-id="571" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="569"><img alt="" class="wp-image-3936" data-dcnode-id="570" height="630" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Barred_spiral_galaxy_NGC_1073.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Barred_spiral_galaxy_NGC_1073.jpg 800w, https://nineplanets.org/wp-content/uploads/2019/12/Barred_spiral_galaxy_NGC_1073-300x236.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/Barred_spiral_galaxy_NGC_1073-768x605.jpg 768w" width="800"></figure><span data-dcnode-id="568" instrument_node="">
</span><h2 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Future</span></h2><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Usually, spiral galaxies are believed to evolve into elliptical galaxies as they get older. All galaxies change their form/shape as they age. Usually, with time, galaxies collided with one another and former bigger structures.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h2 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Did you know?</span></h2><span data-dcnode-id="559" instrument_node="">
</span><ol data-dcnode-id="542"><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">One of the largest spiral galaxies ever discovered is NGC 6872. It is around 522.000 light-years across from the tips of its outstretched arms.</span></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">One of the oldest spiral galaxy to be discovered is the 11-billion-year-old A1689B11</span></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The nearest spiral galaxy to the Milky Way is the Andromeda galaxy at a distance of 2.5 million light-years away. It is also constantly moving closer to us and astronomers predict that these galaxies will collide in the far future.</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Around 77% of the galaxies that have been observed by man are spiral galaxies.</span></li><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Spiral galaxies are also known as disk galaxies.</span></li><span data-dcnode-id="543" instrument_node="">
</span></ol><span data-dcnode-id="541" instrument_node="">
