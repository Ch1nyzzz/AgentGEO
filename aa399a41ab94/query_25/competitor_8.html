</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1296" id="mntl-sc-block_1-0"><span data-dcnode-id="1303" instrument_node="">
Spiral galaxies are among the most beautiful and plentiful </span><a data-component="link" data-dcnode-id="1301" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-are-starburst-galaxies-3072050"><span data-dcnode-id="1302" instrument_node="">galaxy types</span></a><span data-dcnode-id="1300" instrument_node=""> in the cosmos. When artists draw galaxies, spirals are what they first visualize. This is likely due to the fact that the </span><a data-component="link" data-dcnode-id="1298" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-milky-way-galaxy-3072056"><span data-dcnode-id="1299" instrument_node="">Milky Way</span></a><span data-dcnode-id="1297" instrument_node=""> is a spiral; as is the neighboring Andromeda Galaxy. Their shapes are the result of long galactic evolution activities that astronomers are still working to understand.
</span></p><span data-dcnode-id="1295" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1284" id="mntl-sc-block_1-0-1"><div class="comp mntl-block" data-dcnode-id="1285" id="mntl-block_4-0"><span data-dcnode-id="1294" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1273" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1274" instrument_node="">
Spiral galaxies are characterized by their sweeping arms which stretch out from the central region in a spiral pattern. They are subdivided into classes based on how tightly the arms are wound, with the tightest classified as Sa and those with the most loosely wound arms as Sd.

</span><div class="rail-video__title" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">A Guide To How Big The Galaxy Is</span></div><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span></div></div><span data-dcnode-id="993" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="991" id="mntl-sc-block_1-0-5"><span data-dcnode-id="992" instrument_node="">
Some spiral galaxies have a "bar" passing through the center of which the spiral arms extend. These are classified as barred spirals and follow the same sub-classification model as "normal" spiral galaxies, except with the designators SBa - SBd. Our own Milky Way is a barred spiral, with a thick "ridge" of stars and gas and dust passing through the central core.
</span></p><span data-dcnode-id="990" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="979" id="mntl-sc-block_1-0-6"><div class="comp mntl-block" data-dcnode-id="980" id="mntl-block_6-0"><span data-dcnode-id="989" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="982" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="988" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="984" id="mntl-native__adunit_2-0"><span data-dcnode-id="987" instrument_node="">
</span><div class="wrapper" data-dcnode-id="986" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="985" instrument_node="">
</span></div><span data-dcnode-id="983" instrument_node="">
</span></div><span data-dcnode-id="981" instrument_node="">
</span></div></div><span data-dcnode-id="978" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="976" id="mntl-sc-block_1-0-7"><span data-dcnode-id="977" instrument_node="">
Some galaxies are classified as S0. These are galaxies for which it is impossible to tell if a "bar" is present.
</span></p><span data-dcnode-id="975" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="974" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="973" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="965" id="mntl-sc-block_1-0-9"><span data-dcnode-id="972" instrument_node="">
Many spiral galaxies have what is known as a galactic bulge. This is a spheroid packed with lots of </span><a data-component="link" data-dcnode-id="970" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-a-star-3073608"><span data-dcnode-id="971" instrument_node="">stars</span></a><span data-dcnode-id="969" instrument_node=""> and contains within it a </span><a data-component="link" data-dcnode-id="967" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/black-holes-information-3072388"><span data-dcnode-id="968" instrument_node="">supermassive black hole</span></a><span data-dcnode-id="966" instrument_node=""> that binds together the rest of the galaxy.
</span></p><span data-dcnode-id="964" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="963" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="962" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="957" id="mntl-sc-block_1-0-11"><span data-dcnode-id="961" instrument_node="">
From the side, spirals look like flat disks with central spheroids. We see many stars and clouds of gas and dust. However, they also contain something else: massive haloes of </span><a data-component="link" data-dcnode-id="959" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/cold-dark-matter-3072275"><span data-dcnode-id="960" instrument_node="">dark matter</span></a><span data-dcnode-id="958" instrument_node="">. This mysterious "stuff" is invisible to any experiment that has sought to directly observe it. Dark matter plays a role in galaxies, which is also still being determined.&nbsp;
</span></p><span data-dcnode-id="956" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="945" id="mntl-sc-block_1-0-12"><div class="comp mntl-block" data-dcnode-id="946" id="mntl-block_7-0"><span data-dcnode-id="955" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard3-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="948" data-height="600" id="ref-billboard3-sticky-dynamic_2-0" style="height: 600px; top: 2025px;"><span data-dcnode-id="954" instrument_node="">

</span></div></div><span data-dcnode-id="944" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="943" id="toc-star-types"></span><span data-dcnode-id="942" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="937" id="mntl-sc-block_1-0-13"><span data-dcnode-id="941" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node=""> Star Types </span></span><span data-dcnode-id="938" instrument_node=""> </span></h2><span data-dcnode-id="936" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="934" id="mntl-sc-block_1-0-14"><span data-dcnode-id="935" instrument_node="">
The spiral arms of these galaxies are filled with lots of hot, young blue stars and even more gas and dust (by mass). In fact, our Sun is sort of an oddity considering the type of company it keeps in this region.
</span></p><span data-dcnode-id="933" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="932" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="931" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="929" id="mntl-sc-block_1-0-16"><span data-dcnode-id="930" instrument_node="">
Within the central bulge of spiral galaxies with looser spiral arms (Sc and Sd) the population of stars is very similar to that in the spiral arms, young hot blue stars, but in much greater density.
</span></p><span data-dcnode-id="928" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="927" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="926" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="924" id="mntl-sc-block_1-0-18"><span data-dcnode-id="925" instrument_node="">
In contracts spiral galaxies with tighter arms (Sa and Sb) tend to have mostly old, cool, red stars that contain very little metal.
</span></p><span data-dcnode-id="923" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="922" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="921" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="919" id="mntl-sc-block_1-0-20"><span data-dcnode-id="920" instrument_node="">
And while the vast majority of the stars in these galaxies are found either within the plane of the spiral arms or the bulge, there exists a halo around the galaxy. While this region is dominated by dark matter, there are also very old stars, usually with very low metallicity, that orbit through the plane of the galaxy in highly elliptical orbits.
</span></p><span data-dcnode-id="918" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="907" id="mntl-sc-block_1-0-21"><div class="comp mntl-block" data-dcnode-id="908" id="mntl-block_8-0"><span data-dcnode-id="917" instrument_node="">

</span></div></div><span data-dcnode-id="906" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="905" id="toc-formation"></span><span data-dcnode-id="904" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="899" id="mntl-sc-block_1-0-22"><span data-dcnode-id="903" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node=""> Formation </span></span><span data-dcnode-id="900" instrument_node=""> </span></h2><span data-dcnode-id="898" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="896" id="mntl-sc-block_1-0-23"><span data-dcnode-id="897" instrument_node="">
The formation of spiral arm features in galaxies is mostly due to the gravitational effect of material in the galaxy as waves pass through. This posits that pools of greater mass density slow down and form "arms" as the galaxy rotates. As gas and dust pass through those arms it gets compressed to form new stars and the arms expand in mass density further, enhancing the effect. More recent models have attempted to incorporate dark matter, and other properties of these galaxies, into a more complex theory of formation.
</span></p><span data-dcnode-id="895" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="894" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="893" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="892" id="toc-supermassive-black-holes"></span><span data-dcnode-id="891" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="886" id="mntl-sc-block_1-0-25"><span data-dcnode-id="890" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node=""> Supermassive Black Holes </span></span><span data-dcnode-id="887" instrument_node=""> </span></h2><span data-dcnode-id="885" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="883" id="mntl-sc-block_1-0-26"><span data-dcnode-id="884" instrument_node="">
Another defining characteristic of spiral galaxies is the presence of supermassive black holes at their cores. It is not known if all spiral galaxies contain one of these behemoths, but there is a mountain of indirect evidence that virtually all such galaxies will contain them within the bulge.
</span></p><span data-dcnode-id="882" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="871" id="mntl-sc-block_1-0-27"><div class="comp mntl-block" data-dcnode-id="872" id="mntl-block_9-0"><span data-dcnode-id="881" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard5-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="874" data-height="600" id="ref-billboard5-sticky-dynamic_2-0" style="height: 600px;"><span data-dcnode-id="880" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="876" id="mntl-sc-sticky-billboard-ad_12-0"><span data-dcnode-id="879" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="10ba6b0f121548579b01537d8368aa14" data-auction-floor-value="55" data-dcnode-id="878" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[250, 250],[200, 200],[180, 150],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="877" instrument_node="">

</span></div></div><span data-dcnode-id="870" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="869" id="toc-dark-matter"></span><span data-dcnode-id="868" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="863" id="mntl-sc-block_1-0-28"><span data-dcnode-id="867" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node=""> Dark Matter </span></span><span data-dcnode-id="864" instrument_node=""> </span></h2><span data-dcnode-id="862" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="860" id="mntl-sc-block_1-0-29"><span data-dcnode-id="861" instrument_node="">
It was actually of spiral galaxies that first suggested the possibility of dark matter. Galactic rotation is determined by the gravitational interactions of the masses present within the galaxy. But computer simulations of spiral galaxies showed that the rotation velocities differed from those observed.
</span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="858" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="857" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="852" id="mntl-sc-block_1-0-31"><span data-dcnode-id="856" instrument_node="">
Either our understanding of general relativity was flawed, or another source of mass was present. Since </span><a data-component="link" data-dcnode-id="854" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/einsteins-theory-of-relativity-2699378"><span data-dcnode-id="855" instrument_node="">relativity theory</span></a><span data-dcnode-id="853" instrument_node=""> has been tested and verified on virtually all scales there has so far been resistance to challenging it.
</span></p><span data-dcnode-id="851" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="850" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="849" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="847" id="mntl-sc-block_1-0-33"><span data-dcnode-id="848" instrument_node="">
Instead, scientists have postulated that an as-yet-unseen particle exists that does not interact with the electromagnetic force - and most likely not the strong force, and perhaps not even the weak force (though some models do include that property) - but it does interact gravitationally.
</span></p><span data-dcnode-id="846" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="835" id="mntl-sc-block_1-0-34"><div class="comp mntl-block" data-dcnode-id="836" id="mntl-block_10-0"><span data-dcnode-id="845" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard6-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="838" data-height="600" id="ref-billboard6-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="844" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="840" id="mntl-sc-sticky-billboard-ad_13-0"><span data-dcnode-id="843" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="0caa42cf7280481ebb9c69581524920b" data-auction-floor-value="40" data-dcnode-id="842" data-pos="btf5" data-priority="8" data-rtb="true" data-sizes="[[300, 250],[300, 255],[250, 250],[200, 200],[180, 150],[7, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard6"></div><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span></div><span data-dcnode-id="837" instrument_node="">
</span></div></div><span data-dcnode-id="834" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="832" id="mntl-sc-block_1-0-35"><span data-dcnode-id="833" instrument_node="">
It is thought that spiral galaxies maintain a dark matter halo; a spherical volume of dark matter that permeates the entire region in and around the galaxy.
</span></p><span data-dcnode-id="831" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="830" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="829" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="827" id="mntl-sc-block_1-0-37"><span data-dcnode-id="828" instrument_node="">
Dark matter has yet to be detected directly, but there is some indirect observational evidence for its existence. Over the next couple of decades, new experiments should be able to shed light on this mystery.
</span></p><span data-dcnode-id="826" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="825" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="824" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="816" id="mntl-sc-block_1-0-39"><span data-dcnode-id="823" instrument_node="">
</span><em data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">Edited and updated by </span><a data-component="link" data-dcnode-id="820" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/carolyn-collins-petersen-3071049"><span data-dcnode-id="821" instrument_node="">Carolyn Collins Petersen</span></a><span data-dcnode-id="819" instrument_node="">.</span></em><span data-dcnode-id="817" instrument_node="">
