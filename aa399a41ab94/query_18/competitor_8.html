                                            </span></p><span data-dcnode-id="3548" instrument_node="">
</span></div><span data-dcnode-id="3546" instrument_node="">
</span></div><span data-dcnode-id="3544" instrument_node="">
</span><h1 class="text-extra-large line-low mb-2" data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Where is Earth in the Milky Way?</span></h1><span data-dcnode-id="3541" instrument_node="">
</span><p class="article-byline text-low" data-dcnode-id="3536"><span data-dcnode-id="3540" instrument_node="">
                                        by Matt Williams,                                                                                 </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.universetoday.com/"><span data-dcnode-id="3539" instrument_node="">Universe Today</span></a><span data-dcnode-id="3537" instrument_node=""> </span></p><span data-dcnode-id="3535" instrument_node="">
</span><div class="mt-4 article-main" data-dcnode-id="2277"><span data-dcnode-id="3534" instrument_node="">
</span><div class="article-gallery lightGallery" data-dcnode-id="3521"><span data-dcnode-id="3533" instrument_node="">
</span><div data-dcnode-id="3523" data-src="https://scx2.b-cdn.net/gfx/news/2016/whereisearth.jpg" data-sub-html="The Milky Way’s basic structure is believed to involve two main spiral arms emanating from opposite ends of an elongated central bar. Credit: T. Dame" data-thumb="https://scx1.b-cdn.net/csz/news/tmb/2016/whereisearth.jpg"><span data-dcnode-id="3532" instrument_node="">
</span><figure class="article-img" data-dcnode-id="3525"><span data-dcnode-id="3531" instrument_node="">
</span><img alt="Where is Earth in the Milky Way?" data-dcnode-id="3530" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scx1.b-cdn.net/csz/news/800a/2016/whereisearth.jpg&amp;raw" title="The Milky Way’s basic structure is believed to involve two main spiral arms emanating from opposite ends of an elongated central bar. Credit: T. Dame" width="580"><span data-dcnode-id="3529" instrument_node="">
</span><figcaption class="text-darken text-low-up text-truncate-js text-truncate mt-3" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">
                The Milky Way’s basic structure is believed to involve two main spiral arms emanating from opposite ends of an elongated central bar. Credit: T. Dame
            </span></figcaption><span data-dcnode-id="3526" instrument_node=""> </span></figure><span data-dcnode-id="3524" instrument_node="">
</span></div><span data-dcnode-id="3522" instrument_node="">
</span></div><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">For thousand of years, astronomers and astrologers believed that the Earth was at the center of our Universe. This perception was due in part to the fact that Earth-based observations were complicated by the fact that the Earth is embedded in the Solar System. It was only after many centuries of continued observation and calculations that we discovered that the Earth (and all other bodies in the Solar System) actually orbits the Sun.

                                         
                                                  </span></p><section class="article-banner first-banner ads-336x280" data-dcnode-id="3509"><span data-dcnode-id="3518" instrument_node="">
</span><span data-dcnode-id="3516" instrument_node="">
</span><div data-dcnode-id="3511" id="div-gpt-ad-1449240174198-2"><span data-dcnode-id="3515" instrument_node="">
</span><span data-dcnode-id="3512" instrument_node="">
</span></div><span data-dcnode-id="3510" instrument_node="">
</span></section><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3507" instrument_node="">Much the same is true about our Solar System's position within the Milky Way. In truth, we've only been aware of the fact that we are part of a much larger disk of </span><a class="textTag" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/stars/" rel="tag"><span data-dcnode-id="3506" instrument_node="">stars</span></a><span data-dcnode-id="3504" instrument_node=""> that orbits a common center for about a century. And given that we are embedded within it, it has been historically difficult to ascertain our exact position. But thanks to ongoing efforts, astronomers now know where our Sun resides in the galaxy.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3499"><b data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Size of the Milky Way:</span></b></p><span data-dcnode-id="3498" instrument_node="">
</span><p data-dcnode-id="3487"><span data-dcnode-id="3497" instrument_node="">For starters, the Milky Way is really, really big! Not only does it measure some 100,000–120,000 light-years in diameter and about 1,000 light-years thick, but up to 400 billion stars are located within it (though some estimates think there are even more). Since one light year is about 9.5 x 10</span><sup data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">12</span></sup><span data-dcnode-id="3494" instrument_node=""> km (9.5 trillion km) long, the diameter of the Milky Way galaxy is about 9.5 x 10</span><sup data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">17</span></sup><span data-dcnode-id="3491" instrument_node=""> to 11.4 x 10</span><sup data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">17</span></sup><span data-dcnode-id="3488" instrument_node=""> km, or 9,500 to 11,400 quadrillion km.</span></p><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">It became its current size and shape by eating up other galaxies, and is still doing so today. In fact, the Canis Major Dwarf Galaxy is the closest galaxy to the Milky Way because its stars are currently being added to the Milky Way's disk. And our galaxy has consumed others in its long history, such as the Sagittarius Dwarf Galaxy.</span></p><span data-dcnode-id="3483" instrument_node="">

6,10 l -6,0 0,0 z" data-dcnode-id="2977" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="2972"><use class="ytp-svg-shadow" data-dcnode-id="2974" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2975" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2973" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2968"><use class="ytp-svg-shadow" data-dcnode-id="2970" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2971" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2969" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=8_l8CxIieVQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="2950" instrument_node="">

</span></figure><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">And yet, our galaxy is only a middle-weight when compared to other galaxies in the local Universe. Andromeda, the closest major galaxy to our own, is about twice as large as our own. It measures 220,000 light years in diameter, and has an estimated 400-800 billion stars within it.</span></p><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Structure of the Milky Way:</span></p><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2933"><span data-dcnode-id="2937" instrument_node="">If you could travel outside the galaxy and look down on it from above, you'd see that the Milky Way is a barred </span><a class="textTag" data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/spiral%2Bgalaxy/" rel="tag"><span data-dcnode-id="2936" instrument_node="">spiral galaxy</span></a><span data-dcnode-id="2934" instrument_node="">. For the longest time, the Milky Way was thought to have 4 spiral arms, but newer surveys have determined that it actually seems to just have two spiral arms, called Scutum–Centaurus and Carina–Sagittarius.</span></p><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2931" instrument_node="">The spiral arms are formed from density waves that orbit around the Milky Way – i.e. stars and clouds of gas clustered together. As these </span><a class="textTag" data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/density%2Bwaves/" rel="tag"><span data-dcnode-id="2930" instrument_node="">density waves</span></a><span data-dcnode-id="2928" instrument_node=""> move through an area, they compress the gas and dust, leading to a period of active star formation for the region. However, the existence of these arms has been determined from observing parts of the Milky Way – as well as other galaxies in our universe.</span></p><span data-dcnode-id="2926" instrument_node="">
</span><div class="w-100 mb-4 ads" data-dcnode-id="2915"><span data-dcnode-id="2925" instrument_node="">
</span><span data-dcnode-id="2923" instrument_node="">
</span><span data-dcnode-id="2921" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0536483524803400" data-ad-format="auto" data-ad-slot="5350699939" data-dcnode-id="2920" style="display:block"></ins><span data-dcnode-id="2919" instrument_node="">
</span><span data-dcnode-id="2916" instrument_node="">
</span></div><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">In truth, all the pictures that depict our galaxy are either artist's renditions or pictures of other spiral galaxies, and not the result of direct observation of the whole. Until recently, it was very difficult for scientists to gauge what the Milky Way really looks like, mainly because we're inside it. It has only been through decades of observation, reconstruction and comparison to other galaxies that they have been to get a clear picture of what the Milky Way looks like from the outside.</span></p><span data-dcnode-id="2911" instrument_node="">

ass="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2405" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2403" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="2398"><use class="ytp-svg-shadow" data-dcnode-id="2400" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2401" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2399" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2394"><use class="ytp-svg-shadow" data-dcnode-id="2396" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2397" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2395" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=H8iuu543-4M" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="2376" instrument_node="">

</span><figcaption class="text-darken text-low-up mt-4" data-dcnode-id="2372" itemprop="caption"><span data-dcnode-id="2373" instrument_node="">Credit: Universe Today</span></figcaption><span data-dcnode-id="2371" instrument_node="">
</span></figure><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">From ongoing surveys of the night sky with ground-based telescopes, and more recent missions involving space telescopes, astronomers now estimate that there are between 100 and 400 billion stars in the Milky Way. They also think that each star has at least one planet, which means there are likely to be hundreds of billions of planets in the Milky Way – billions of which are believed to be the size and mass of the Earth.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">As noted, much of the Milky Way's arms is made up of dust and gas. This matter makes up a whopping 10-15% of all the "luminous matter" (i.e. that which is visible) in our galaxy, with the remainder being the stars. Our galaxy is roughly 100,000 light years across, and we can only see about 6,000 light years into the disk in the visible spectrum.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Still, when light pollution is not significant, the dusty ring of the Milky Way can be discerned in the night sky. What's more, infrared astronomy and viewing the Universe in other, non-visible wavelengths has allowed astronomers to be able to see more of it.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2360" instrument_node="">The Milky Way, like all </span><a class="textTag" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/galaxies/" rel="tag"><span data-dcnode-id="2359" instrument_node="">galaxies</span></a><span data-dcnode-id="2357" instrument_node="">, is also surrounded by a vast halo of dark matter, which accounts for some 90% of its mass. Nobody knows precisely what dark matter is, but its mass has been inferred by observations of how fast the galaxy rotates and other general behaviors. More importantly, it is believed that this mass helps keep the galaxy from tearing itself apart as it rotates.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">The Solar System:</span></p><span data-dcnode-id="2352" instrument_node="">
</span><div class="article-gallery lightGallery" data-dcnode-id="2339"><span data-dcnode-id="2351" instrument_node="">
</span><div data-dcnode-id="2341" data-src="https://scx2.b-cdn.net/gfx/news/2016/whereisearth.png" data-sub-html="The location of our Solar Systemin the Orion Spur of the Milky Way galaxy. Credit: Roberto Mura/Public Domain" data-thumb="https://scx1.b-cdn.net/csz/news/tmb/2016/whereisearth.png"><span data-dcnode-id="2350" instrument_node="">
</span><figure class="article-img text-center" data-dcnode-id="2343"><span data-dcnode-id="2349" instrument_node="">
</span><img alt="Where is Earth in the Milky Way?" data-dcnode-id="2348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scx1.b-cdn.net/csz/news/800a/2016/whereisearth.png&amp;raw" title="The location of our Solar Systemin the Orion Spur of the Milky Way galaxy. Credit: Roberto Mura/Public Domain"><span data-dcnode-id="2347" instrument_node="">
</span><figcaption class="text-left text-darken text-truncate text-low-up mt-3" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">
                The location of our Solar Systemin the Orion Spur of the Milky Way galaxy. Credit: Roberto Mura/Public Domain
            </span></figcaption><span data-dcnode-id="2344" instrument_node=""> </span></figure><span data-dcnode-id="2342" instrument_node="">
</span></div><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">The Solar System (and Earth) is located about 25,000 light-years to the galactic center and 25,000 light-years away from the rim. So basically, if you were to think of the Milky Way as a big record, we would be the spot that's roughly halfway between the center and the edge.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2334" instrument_node="">Astronomers have agreed that the Milky Way probably has two major </span><a class="textTag" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/tags/spiral%2Barms/" rel="tag"><span data-dcnode-id="2333" instrument_node="">spiral arms</span></a><span data-dcnode-id="2331" instrument_node=""> – Perseus arm and the Scutum-Centaurus arm – with several smaller arms and spurs. The Solar System is located in a region in between the two arms called the Orion-Cygnus arm. This arm measures 3,500 light-years across and is 10,000 light-years in length, where it breaks off from the Sagittarius Arm.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">The fact that the Milky Way divides the night sky into two roughly equal hemispheres indicates that the Solar System lies near the galactic plane. The Milky Way has a relatively low surface brightness due to the gases and dust that fills the galactic disk. That prevents us from seeing the bright galactic center or from observing clearly what is on the other side of it.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">You might be surprised to learn that it takes the Sun 250 million years to complete one rotation around the Milky Way – this is what is known as a "Galactic Year" or "Cosmic Year". The last time the Solar System was in this position in the Milky Way, there were still dinosaurs on Earth. The next time, who knows? Humanity might be extinct, or it might have evolved into something else entirely.</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">As you can see, the Milky Way alone is a very big place. And discerning our location within it has been no simple task. And as our knowledge of the Universe has expanded, we've come to learn two things. Not only is the Universe much larger than we could have ever imagined, but our place within in continues to shrink! Our Solar System, it seems, is both insignificant in the grand scheme of things, but also extremely precious!
