</span><h1 class="title" data-dcnode-id="2057" id="page-title"><span data-dcnode-id="2058" instrument_node="">Majoring in Astronomy</span></h1><span data-dcnode-id="2056" instrument_node="">
</span><div class="block block-system block-main block-system-main odd block-without-title" data-dcnode-id="462" id="block-system-main"><span data-dcnode-id="2055" instrument_node="">
</span><div class="block-inner clearfix" data-dcnode-id="464"><span data-dcnode-id="2054" instrument_node="">
</span><div class="content clearfix" data-dcnode-id="466"><span data-dcnode-id="2053" instrument_node="">
</span><article class="node node-page node-published node-not-promoted node-not-sticky author-artsci odd clearfix" data-dcnode-id="468" id="node-page-14"><span data-dcnode-id="2052" instrument_node="">
</span><div class="content clearfix" data-dcnode-id="475"><span data-dcnode-id="2051" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="477"><div class="field-items" data-dcnode-id="478"><div class="field-item even" data-dcnode-id="479"><hr data-dcnode-id="2050"><p data-dcnode-id="2045"><span data-dcnode-id="2049" instrument_node="">If you are interested in majoring in Astronomy-Physics (or Astronomy) please contact the Director of the Astronomy Undergraduate program as soon as possible as first-year course choices are important for the Astronomy-Physics major in particular.&nbsp; &nbsp;Currently the Director is Steven Majewski (</span><a data-dcnode-id="2047" href="mailto:srm4n@virginia.edu"><span data-dcnode-id="2048" instrument_node="">srm4n@virginia.edu</span></a><span data-dcnode-id="2046" instrument_node="">).&nbsp; &nbsp;</span></p><span data-dcnode-id="2044" instrument_node="">
</span><hr data-dcnode-id="2043"><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Although the study of astronomy has ancient roots, it is now one of the most rapidly developing and exciting subjects in modern science. Astronomy is the study of the Universe and its contents: planets, stars, black holes, galaxies, and quasars. Each of these is a fascinating topic in its own right. But perhaps the greatest achievement of modern astronomy has been to gather them all into a rich and coherent picture, one which depicts the origin and evolution of all things from the Big Bang to the development of living organisms.&nbsp;</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Recent advances in astronomy have derived from new technologies that have yielded instruments of unprecedented power: telescopes with 10-meter mirrors, orbiting satellite observatories for all parts of the electromagnetic spectrum, deep space missions to sample planetary atmospheres and surfaces, and huge laboratories for detection of elusive cosmic neutrinos and gravity waves.&nbsp;</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">The excitement and accessibility of astronomy are featured in frequent press coverage of major new discoveries, including in recent years the discovery of planets orbiting other stars, a comet crashing into Jupiter, the discovery of very young galaxies in the distant universe, the detection of gravitational waves from merging black holes, the possibility of life on Mars, the threat of asteroid collisions with the Earth, and the detection of primordial ripples in the cosmic background radiation. Astronomy draws from, and contributes to, many other subjects: primarily physics but also geology, atmospheric and environmental science, biology, and even philosophy.&nbsp;</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">The two Astronomy majors programs offer students the opportunity to explore these frontier discoveries while simultaneously developing fundamental analytical and quantitative skills useful in many different careers. A total of thirty five Astronomy courses are open to majors. The BA Astronomy major offers a concentration on science in the context of a liberal arts degree for students who do not intend to pursue graduate training in astronomy or physics. It is often part of a double major. The BS Astronomy-Physics major provides more rigorous preparation for graduate work in astronomy, physics, computer science, or related fields.</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2030" instrument_node="">Note: The information contained on this website is for informational purposes only.&nbsp; The </span><a class="outside-link" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//records.ureg.virginia.edu/index.php"><span data-dcnode-id="2029" instrument_node="">Undergraduate Record</span></a><span data-dcnode-id="2027" instrument_node=""> and </span><a class="outside-link" data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//records.ureg.virginia.edu/preview_program.php%3Fcatoid%3D48%26poid%3D6021"><span data-dcnode-id="2026" instrument_node="">Graduate Record</span></a><span data-dcnode-id="2024" instrument_node=""> represent the official repository for academic program requirements.&nbsp;</span></p><span data-dcnode-id="2022" instrument_node="">
</span><div class="jquery-ui-filter jquery-ui-filter-accordion jquery-ui-filter-accordion-processed ui-accordion ui-widget ui-helper-reset" data-dcnode-id="481" id="jquery-ui-filter" role="tablist"><span data-dcnode-id="2021" instrument_node="">
</span><div aria-controls="ui-accordion-jquery-ui-filter-panel-0" aria-selected="false" class="jquery-ui-filter-header jquery-ui-filter-accordion-header ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2017" id="ui-accordion-jquery-ui-filter-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="2020"></span><a data-dcnode-id="2018" href="#faculty"><span data-dcnode-id="2019" instrument_node="">Faculty</span></a></div><span data-dcnode-id="2016" instrument_node="">
</span><div aria-expanded="false" aria-hidden="true" aria-labelledby="ui-accordion-jquery-ui-filter-header-0" class="jquery-ui-filter-container jquery-ui-filter-accordion-container ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2008" id="ui-accordion-jquery-ui-filter-panel-0" role="tabpanel" style="display: none; height: 3866px;"><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2014" instrument_node="">The University has the largest astronomy department in the Southeastern United States. The department‘s eighteen professors are committed to strong undergraduate teaching as well as to conducting astronomical research. As one of the top fifteen research departments in the country, faculty expertise spans a wide range of subjects from star clusters, to the evolution of our Galaxy, to black holes, to distant galaxies. </span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//astronomy.as.virginia.edu/research/"><span data-dcnode-id="2013" instrument_node="">Active faculty research programs</span></a><span data-dcnode-id="2011" instrument_node=""> keep classroom teaching up-to-date and are an integral part of tutorial and senior thesis projects. Faculty research is well supported by the National Science Foundation, the National Aeronautics and Space Administration, and other agencies.</span></p><span data-dcnode-id="2009" instrument_node="">
</span></div><span data-dcnode-id="2007" instrument_node="">
</span><div aria-controls="ui-accordion-jquery-ui-filter-panel-1" aria-selected="false" class="jquery-ui-filter-header jquery-ui-filter-accordion-header ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2003" id="ui-accordion-jquery-ui-filter-header-1" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="2006"></span><a data-dcnode-id="2004" href="#students"><span data-dcnode-id="2005" instrument_node="">Students</span></a></div><span data-dcnode-id="2002" instrument_node="">
</span><div aria-expanded="false" aria-hidden="true" aria-labelledby="ui-accordion-jquery-ui-filter-header-1" class="jquery-ui-filter-container jquery-ui-filter-accordion-container ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1994" id="ui-accordion-jquery-ui-filter-panel-1" role="tabpanel" style="display: none; height: 3866px;"><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">There are typically 20-30 declared majors at any given time. Students get to know each other well and often work together. Close contact with the faculty is part of the learning environment. Many students work one-on-one with faculty in tutorials or senior theses, and this work can be published in major research journals and presented at national meetings. Students can also work at the Department’s observatories or on summer research projects supported by grants. Advanced students can enroll in graduate courses.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Most students who complete our Astronomy-Physics degree go on to graduate programs in astronomy or physics, frequently at the best schools in the country. Students who complete the Astronomy degree are well prepared for a wide range of careers. Our graduates are employed by universities, NASA, federal observatories and laboratories, planetariums, and aerospace and computer corporations, or have gone into professions such as medicine, law, the military, business, science writing, and science education.</span></p><span data-dcnode-id="1995" instrument_node="">
</span></div><span data-dcnode-id="1993" instrument_node="">
</span><div aria-controls="ui-accordion-jquery-ui-filter-panel-2" aria-selected="false" class="jquery-ui-filter-header jquery-ui-filter-accordion-header ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1989" id="ui-accordion-jquery-ui-filter-header-2" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1992"></span><a data-dcnode-id="1990" href="#special-resources-and-student-research-"><span data-dcnode-id="1991" instrument_node="">Special Resources and Student Research&nbsp;</span></a></div><span data-dcnode-id="1988" instrument_node="">
</span><div aria-expanded="false" aria-hidden="true" aria-labelledby="ui-accordion-jquery-ui-filter-header-2" class="jquery-ui-filter-container jquery-ui-filter-accordion-container ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1941" id="ui-accordion-jquery-ui-filter-panel-2" role="tabpanel" style="display: none; height: 3866px;"><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1986" instrument_node="">The department is very well equipped to support its students. There is an excellent collection of journals, monographs, catalogs, and atlases in the </span><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.www2.lib.virginia.edu/brown/astronomy/index.html"><span data-dcnode-id="1985" instrument_node="">Astronomy Library</span></a><span data-dcnode-id="1983" instrument_node=""> as well as in the library of the nearby National Radio Astronomy Observatory. We have a wide variety of telescopes available on the Grounds: 6-inch, 8-inch, and 10-inch aperture instruments as well as the historic </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/research/observatories/mccormick/26inch"><span data-dcnode-id="1982" instrument_node="">26-inch Clark refractor</span></a><span data-dcnode-id="1980" instrument_node=""> at Leander McCormick Observatory. At </span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/observatories/fan-mountain"><span data-dcnode-id="1979" instrument_node="">Fan Mountain Observatory</span></a><span data-dcnode-id="1977" instrument_node="">, our local research observatory, located 15 miles south of Charlottesville, we have </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/undergraduate-studies/research/observatories/fan-mountain/40inch/"><span data-dcnode-id="1976" instrument_node="">40-inch</span></a><span data-dcnode-id="1974" instrument_node=""> and </span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/undergraduate-studies/research/observatories/fan-mountain/31inch/"><span data-dcnode-id="1973" instrument_node="">31-inch</span></a><span data-dcnode-id="1971" instrument_node=""> reflecting telescopes. All of these are equipped with digital CCD cameras, spectrographs, and other specialized instruments.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">We offer excellent computing facilities to our students, based on a network of Linux workstations, all of which run sophisticated data analysis, numerical simulation, image processing, and display software.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">As soon as a student declares the major, he or she is assigned an account on our computers and has 24 hour access to our library and other facilities.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1962" instrument_node="">One of the important features of the majors programs is the opportunity to participate in </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/undergraduate-studies/astronomy.as.virginia.edu/courses%23ASTR%25204993"><span data-dcnode-id="1961" instrument_node="">ASTR 4993 tutorials</span></a><span data-dcnode-id="1959" instrument_node="">, in which the student studies some area of particular interest to him/her under the individual guidance of a faculty member. Any subject in the area of competence of the faculty can be examined in depth. These tutorials are distinct from </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.as.virginia.edu/undergraduate-studies/astronomy.as.virginia.edu/courses%23ASTR%25204998"><span data-dcnode-id="1958" instrument_node="">ASTR 4998 (Senior Thesis)</span></a><span data-dcnode-id="1956" instrument_node="">, although we expect that many students may choose to do thesis research on a problem growing out of a tutorial. ASTR 4993 may be repeated once for credit.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1953" instrument_node="">As part of tutorials and thesis research, our students regularly work on observations obtained by faculty at leading worldwide facilities, including 4 to 10-m class optical telescopes, the Very Large Array, the Hubble Space Telescope, the Chandra X-Ray Observatory, the Sloan Digital Sky Survey, and the 2MASS infrared all-sky survey. Students can also participate with faculty and staff in projects using national supercomputing facilities for theoretical computational simulations. The headquarters of the </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nrao.edu/"><span data-dcnode-id="1952" instrument_node="">National Radio Astronomy Observatory</span></a><span data-dcnode-id="1950" instrument_node=""> and the </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nrao.edu/index.php/about/facilities/naasc"><span data-dcnode-id="1949" instrument_node="">North American ALMA Science Center</span></a><span data-dcnode-id="1947" instrument_node=""> are located on Grounds, and students can be supervised by NRAO scientists or engineers.</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Undergraduate students have a number of options for funding research projects. First, they should check with their advisor to see if their advisor has&nbsp; grant that could cover travel, summer wages, or equipment.</span></p><span data-dcnode-id="1942" instrument_node="">
