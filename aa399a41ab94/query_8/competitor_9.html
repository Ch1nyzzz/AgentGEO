Revolution is an important concept to understand when you're studying the stars. It refers to the movement of a planet around the </span><a data-component="link" data-dcnode-id="928" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/things-you-should-know-about-the-sun-3073449"><span data-dcnode-id="929" instrument_node="">Sun</span></a><span data-dcnode-id="927" instrument_node="">. All of the </span><a data-component="link" data-dcnode-id="925" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/facts-about-sun-planets-comets-asteroids-3073635"><span data-dcnode-id="926" instrument_node="">planets</span></a><span data-dcnode-id="924" instrument_node=""> in our solar system revolve around the sun. The path of the earth around the sun which is one complete cycle of an orbit is approximately 365.2425 days in length. Planetary revolution can sometimes be confused with </span><a data-component="link" data-dcnode-id="922" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/rotation-and-revolution-definition-astronomy-3072287"><span data-dcnode-id="923" instrument_node="">planetary rotation</span></a><span data-dcnode-id="921" instrument_node=""> but they are two separate things.
</span></p><span data-dcnode-id="919" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="897" id="mntl-sc-block_1-0-3"><span data-dcnode-id="898" instrument_node="">
While revolution and rotation are similar concepts each is used to describe two different things. Planets, like Earth, revolve or travel around the sun. But the Earth is also spinning on what is called an axis, this rotation is what gives us our night and day cycle. If the Earth didn't spin then only one side of it would face the sun during its revolution. This would make the other side of the Earth very cold as we need the sun for light and heat. This ability to spin on an axis is called rotation.
</span></p><span data-dcnode-id="896" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="885" id="mntl-sc-block_1-0-4"><div class="comp mntl-block" data-dcnode-id="886" id="mntl-block_5-0"><span data-dcnode-id="895" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="871" id="mntl-sc-block_1-0-6"><span data-dcnode-id="875" instrument_node="">
A full revolution of the Earth around the Sun is known as a terrestrial, or earth year. It takes roughly 365 days for the Earth to complete this revolution. This is what our calendar year is based on.&nbsp;The </span><a data-component="link" data-dcnode-id="873" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/gregorian-calendar-1434504"><span data-dcnode-id="874" instrument_node="">Gregorian Calendar</span></a><span data-dcnode-id="872" instrument_node=""> is based on the revolution of the earth around the sun to be 365.2425 days in length. The inclusion of a "leap year", one where we have an extra day happens every four years to account for the .2425. As Earth's orbit changes the length of our years' changes as well. These types of changes usually happen over millions of years.
</span></p><span data-dcnode-id="870" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="859" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="860" id="mntl-block_6-0"><span data-dcnode-id="869" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="848" id="mntl-sc-block_1-0-9"><span data-dcnode-id="849" instrument_node="">
The moon orbits, or revolves, around the Earth. Each planet affects the other one. The moon has some interesting effects on the Earth. Its gravitational pull is responsible for the rise and fall of the tides. Some people believe that the full moon, a stage in the moon's revolution, causes humans to act strangely. However, there is no scientific proof to back up the claim that strange things happen during the full moon.
</span></p><span data-dcnode-id="847" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="825" id="mntl-sc-block_1-0-12"><span data-dcnode-id="826" instrument_node="">
The moon does not rotate because it is gravitationally locked with the Earth. The moon has synched up with the Earth in such a way that the same side of the moon is always facing the earth. This is why the Moon always looks the same. It's known that at one point the moon did rotate on its own axis. As our gravitational pull on the&nbsp;moon got stronger the moon stopped rotating.
</span></p><span data-dcnode-id="824" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="823" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="822" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="809" id="mntl-sc-block_1-0-15"><span data-dcnode-id="813" instrument_node="">
The time it takes for the solar system to orbit the center of the </span><a data-component="link" data-dcnode-id="811" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-milky-way-galaxy-3072056"><span data-dcnode-id="812" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="810" instrument_node=""> is referred to as a galactic year. It's also known as a cosmic year. There are 225 to 250 Million terrestrial (earth) years in one galactic year. That's a long trip!
</span></p><span data-dcnode-id="808" instrument_node="">
