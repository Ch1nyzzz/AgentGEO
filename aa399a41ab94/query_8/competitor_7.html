</span><div class="standard-column-mwc" data-dcnode-id="1600"><span data-dcnode-id="2212" instrument_node="">
</span><div class="grid grid--no-gutters grid--no-bottom-margin" data-dcnode-id="1602"><span data-dcnode-id="2211" instrument_node="">
</span><div class="grid__col grid__col--8-700" data-dcnode-id="1950"><span data-dcnode-id="2210" instrument_node="">
</span><div class="lede lede--bg-expand copy-box" data-dcnode-id="2200"><span data-dcnode-id="2209" instrument_node="">
</span><div data-dcnode-id="2202"><span data-dcnode-id="2208" instrument_node="">
</span><div data-dcnode-id="2204"><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Humans have studied the stars for thousands of years. To many cultures, stars were the metaphor for constancy, while everything else moved and changed. Modern stellar astronomy showed that stars do change on many time scales, ranging from days to longer periods of time than human history. Stars are born, they change over their lifetimes, and they die. Along the way, they influence the chemistry and structure of their environment, and provide a home for any planets in orbit. Stellar astronomy is dedicated to studying each step of that process, treating stars both as individuals and as members of a population.</span></p><span data-dcnode-id="2205" instrument_node="">
</span></div><span data-dcnode-id="2203" instrument_node="">
</span></div><span data-dcnode-id="2201" instrument_node="">
</span></div><span data-dcnode-id="2199" instrument_node="">
</span><div about="/research/science-field/stellar-astronomy" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">
</span></div><span data-dcnode-id="2196" instrument_node="">
</span><div class="copy-box standard-column six-cell-pre-at-700" data-dcnode-id="1952"><span data-dcnode-id="2195" instrument_node="">
</span><h2 data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Our Work</span></h2><span data-dcnode-id="2192" instrument_node="">
</span><div class="paragraph paragraph--type--editor paragraph--view-mode--default" data-dcnode-id="2124"><span data-dcnode-id="2191" instrument_node="">
</span><div data-dcnode-id="2126"><span data-dcnode-id="2190" instrument_node="">
</span><div data-dcnode-id="2128"><p data-dcnode-id="2188" dir="ltr"><span data-dcnode-id="2189" instrument_node="">Center for Astrophysics | Harvard &amp; Smithsonian stellar astronomers study all aspects of star birth, life, and death:</span></p><span data-dcnode-id="2187" instrument_node="">
</span><ul data-dcnode-id="2129"><li data-dcnode-id="2176" dir="ltr"><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2178" dir="ltr"><span data-dcnode-id="2185" instrument_node="">Identifying and studying protostars inside the clouds that gave them birth. These nebulas are opaque to visible light, so astronomers use submillimeter light observatories like the CfA’s </span><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/taxonomy/term/441"><span data-dcnode-id="2184" instrument_node="">Submillimeter Array (SMA)</span></a><span data-dcnode-id="2182" instrument_node=""> and the Atacama Large Millimeter/submillimeter Array (ALMA) to see through the gas and dust. Astronomers identified a sudden outburst from a protostar, caused by a lot of mass clumping onto it at once.</span><br data-dcnode-id="2181"><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/2017-10"><span data-dcnode-id="2180" instrument_node="">Protostar Blazes Bright, Reshaping Its Stellar Nursery</span></a></p><span data-dcnode-id="2177" instrument_node="">
</span></li><span data-dcnode-id="2175" instrument_node="">
</span><li data-dcnode-id="2161" dir="ltr"><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2163" dir="ltr"><span data-dcnode-id="2173" instrument_node="">Finding new stars within clusters by their intense radiation. Astronomers use NASA’s </span><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/taxonomy/term/428"><span data-dcnode-id="2172" instrument_node="">Spitzer Infrared Telescope</span></a><span data-dcnode-id="2170" instrument_node=""> and </span><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/taxonomy/term/288"><span data-dcnode-id="2169" instrument_node="">Chandra X-ray Observatory</span></a><span data-dcnode-id="2167" instrument_node=""> to see young stars, which emit a lot more high-energy radiation than their older versions. Chandra observations of a nebula called W51 revealed 600 young stars through their X-ray emission.</span><br data-dcnode-id="2166"><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chandra.harvard.edu/photo/2017/w51/"><span data-dcnode-id="2165" instrument_node="">W51: Chandra Peers into a Nurturing Cloud</span></a></p><span data-dcnode-id="2162" instrument_node="">
</span></li><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2152" dir="ltr"><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2154" dir="ltr"><span data-dcnode-id="2158" instrument_node="">And studying the magnetic field of the Sun to learn about other stars. Using data from the Sun, researchers create three-dimensional models of magnetic field generation, which can be tested against observational data from other stars. The end goal is understanding exactly how stellar magnetic fields are created, and how they influence planets in their systems.</span><br data-dcnode-id="2157"><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/2017-23"><span data-dcnode-id="2156" instrument_node="">The Secret of Magnetic Cycles in Stars</span></a></p><span data-dcnode-id="2153" instrument_node="">
</span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2140" dir="ltr"><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2142" dir="ltr"><span data-dcnode-id="2149" instrument_node="">Monitoring starquakes to understand the interiors of Sun-like stars. The Sun and stars like it vibrate, passing sound waves through their interiors. Just as earthquakes let geologists map Earth’s interior, these starquakes allow astronomers to measure what’s going on inside stars. Using NASA’s </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/taxonomy/term/287"><span data-dcnode-id="2148" instrument_node="">Kepler Observatory</span></a><span data-dcnode-id="2146" instrument_node=""> and other instruments designed to watch stars for long periods of time, researchers measure the fluctuations of light caused by these vibrations.</span><br data-dcnode-id="2145"><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/su201648"><span data-dcnode-id="2144" instrument_node="">Solar-Like Oscillations in Other Stars</span></a></p><span data-dcnode-id="2141" instrument_node="">
</span></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2131" dir="ltr"><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2133" dir="ltr"><span data-dcnode-id="2137" instrument_node="">Observing aging stars as they shed huge amounts of material into surrounding space. Old giant stars are simply too big to keep a stable grasp of their outer layers, so their surfaces pulsate and eject particles in the form of powerful winds. Using ALMA and other observatories, astronomers can identify the composition and structure of these winds.</span><br data-dcnode-id="2136"><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/su201615"><span data-dcnode-id="2135" instrument_node="">Pulsation-Driven Winds in Giant Stars</span></a></p><span data-dcnode-id="2132" instrument_node="">
</span></li><span data-dcnode-id="2130" instrument_node="">
</span></ul></div><span data-dcnode-id="2127" instrument_node="">
</span></div><span data-dcnode-id="2125" instrument_node="">
</span></div><span data-dcnode-id="2123" instrument_node="">
</span><div class="list-hold paragraph paragraph--type--stat-with-content paragraph--view-mode--default" data-dcnode-id="2110"><span data-dcnode-id="2122" instrument_node="">
</span><div class="block-stat paragraph paragraph--type--stat paragraph--view-mode--default" data-dcnode-id="2112"><span data-dcnode-id="2121" instrument_node="">
</span><div class="numbers" data-dcnode-id="2117"><span data-dcnode-id="2120" instrument_node="">10</span><sup data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">22</span></sup></div><span data-dcnode-id="2116" instrument_node="">
</span><div class="words" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">A one with 22 zeros behind it - a rough approximation of the number of stars in the observable universe.</span></div><span data-dcnode-id="2113" instrument_node="">
</span></div><span data-dcnode-id="2111" instrument_node="">
</span></div><span data-dcnode-id="2109" instrument_node="">
</span><div class="paragraph paragraph--type--editor paragraph--view-mode--default" data-dcnode-id="1954"><span data-dcnode-id="2108" instrument_node="">
</span><div data-dcnode-id="1956"><span data-dcnode-id="2107" instrument_node="">
</span><div data-dcnode-id="1958"><ul data-dcnode-id="2073"><li data-dcnode-id="2096" dir="ltr"><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2098" dir="ltr"><span data-dcnode-id="2105" instrument_node="">Studying the supernovas of high-mass stars to understand how they explode. Some &nbsp;supernovas may gain some power in environments rich in the </span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/elemental-abundances"><span data-dcnode-id="2104" instrument_node="">heavier elements astronomers call “metals”</span></a><span data-dcnode-id="2102" instrument_node="">. The mechanisms for explosions are complex and not well understood yet, challenging astronomers to study them in new ways.</span><br data-dcnode-id="2101"><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/2017-24"><span data-dcnode-id="2100" instrument_node="">Astronomers Discover ‘Heavy Metal’ Supernova Rocking Out</span></a></p><span data-dcnode-id="2097" instrument_node="">
</span></li><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2084" dir="ltr"><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2086" dir="ltr"><span data-dcnode-id="2093" instrument_node="">Measuring the fluctuations in a variable star. </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/variable-stars-and-binaries"><span data-dcnode-id="2092" instrument_node="">Many old stars pulsate</span></a><span data-dcnode-id="2090" instrument_node="">, but the details of the processes involved are difficult to measure in individual stars. CfA astronomers used NASA’s Hubble Space Telescope to characterize pulsations in the giant red star Betelgeuse, familiar as the “shoulder” of the constellation Orion. By measuring the speed of material in different parts of Betelgeuse’s atmosphere, they found the fluctuations are asymmetrical, much like the contractions of a human heart as it beats.</span><br data-dcnode-id="2089"><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/archive/alobel0100.html"><span data-dcnode-id="2088" instrument_node="">Betelgeuse’s Chromosphere Beats Asymmetrically</span></a></p><span data-dcnode-id="2085" instrument_node="">
</span></li><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2075" dir="ltr"><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2077" dir="ltr"><span data-dcnode-id="2081" instrument_node="">Providing the first images of individual stars. Even with powerful telescopes, most stars are visible only as points of light. However, CfA astronomers captured an image of Betelgeuse using the Hubble, demonstrating that aging giant stars are dramatically non-spherical in shape. This study also provided the first map of the star’s surface, which showed that Betelgeuse has much larger fluctuations in temperature than our Sun.</span><br data-dcnode-id="2080"><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfa.harvard.edu/news/archive/direct96.html"><span data-dcnode-id="2079" instrument_node="">Astronomers Capture First Direct Image of A Star</span></a></p><span data-dcnode-id="2076" instrument_node="">
</span></li><span data-dcnode-id="2074" instrument_node="">
</span></ul><p data-dcnode-id="2071" dir="ltr"><span data-dcnode-id="2072" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2070" instrument_node="">
</span><h2 data-dcnode-id="2068" dir="ltr"><span data-dcnode-id="2069" instrument_node="">The Life and Death of Stars</span></h2><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065" dir="ltr"><span data-dcnode-id="2066" instrument_node="">Stars produce nearly all the light in the sky. Stars also create the carbon, oxygen, iron, and most of the other elements planets — and life —&nbsp;are built from. The nuclear fusion that makes heavier elements from lighter ones is what defines a star, and the details of that fusion indicates where the star is in its life cycle.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2056" dir="ltr"><span data-dcnode-id="2063" instrument_node="">Two things determine the unique life of a star: its mass, which is set during </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/star-formation"><span data-dcnode-id="2062" instrument_node="">formation</span></a><span data-dcnode-id="2060" instrument_node="">, and whether it lives its life alone or with companions. If a star is in a </span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/variable-stars-and-binaries"><span data-dcnode-id="2059" instrument_node="">binary</span></a><span data-dcnode-id="2057" instrument_node=""> or larger association, its companions can affect its evolution through the exchange of mass or tidal forces pulling each other out of shape. Meanwhile, solitary stars like the Sun follow a set path determined by their mass.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2044" dir="ltr"><span data-dcnode-id="2054" instrument_node="">Low-mass stars fuse hydrogen into helium at a slow rate, and live phenomenally long lives, most of them longer than the current age of the universe. Moderate-mass stars like the Sun consume the available hydrogen and helium over the course of a few billion years, then die peacefully, leaving behind a </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/neutron-stars-and-white-dwarfs"><span data-dcnode-id="2053" instrument_node="">white dwarf</span></a><span data-dcnode-id="2051" instrument_node="">. High-mass stars speed through their life cycle, exploding as supernovas and leaving a </span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/neutron-stars-and-white-dwarfs"><span data-dcnode-id="2050" instrument_node="">neutron star</span></a><span data-dcnode-id="2048" instrument_node="">, </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/black-holes"><span data-dcnode-id="2047" instrument_node="">black hole,</span></a><span data-dcnode-id="2045" instrument_node=""> or nothing at all. These explosions enrich their surroundings with new atoms and molecules, providing the materials for the next generation of stars.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041" dir="ltr"><span data-dcnode-id="2042" instrument_node="">Stellar astronomy studies the life cycle and structure of stars, both as individuals and as populations. By tracking the commonalities and differences that make stars what they are, we understand the appearance and contents of the visible universe.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><ul data-dcnode-id="1985"><li data-dcnode-id="2032" dir="ltr"><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2034" dir="ltr"><span data-dcnode-id="2038" instrument_node="">Stars are born out of cold dense clouds of gas and dust. The process begins when a nearby disturbance compresses the gas, such as a supernova explosion or a shock wave from a black hole. The compression allows gravity to work, drawing more matter in to make a </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/star-formation"><span data-dcnode-id="2037" instrument_node="">protostar</span></a><span data-dcnode-id="2035" instrument_node=""> and a disk of spinning matter. Planets are born from that disk, while the protostar gathers enough mass to begin nuclear fusion. Astronomers hunt for these infant stars and their protostellar disks, to identify the processes and particular types of atoms involved.</span></p><span data-dcnode-id="2033" instrument_node="">
</span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2023" dir="ltr"><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2025" dir="ltr"><span data-dcnode-id="2029" instrument_node="">Oftentimes, many stars are born from the same nebula, and remain close together in a </span><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/star-clusters"><span data-dcnode-id="2028" instrument_node="">star cluster</span></a><span data-dcnode-id="2026" instrument_node="">. For that reason, many of the stars in a cluster have similar chemistry and were born at roughly the same time. Some clusters contain very old stars, while others are far younger, providing astronomers with a laboratory for understanding stellar evolution.</span></p><span data-dcnode-id="2024" instrument_node="">
</span></li><span data-dcnode-id="2022" instrument_node="">
</span><li data-dcnode-id="2014" dir="ltr"><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2016" dir="ltr"><span data-dcnode-id="2020" instrument_node="">Stars spend most of their lives on the main sequence, where they fuse hydrogen into helium in their cores. When the available fuel is used up, they swell into giants and go through another cycle of </span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/stellar-structure-and-evolution"><span data-dcnode-id="2019" instrument_node="">evolution</span></a><span data-dcnode-id="2017" instrument_node="">. Astronomers track the way this works by studying the structure of the stars. The internal workings become visible through vibrations — starquakes — and magnetic cycles that produce fluctuations in the star’s light, as well as chemical changes on the surface. In addition, aging stars can pulsate, changing their brightness in various ways. Some of these stars, known as Cepheid variables, fluctuate predictably enough to be used for measuring distances to nearby galaxies.</span></p><span data-dcnode-id="2015" instrument_node="">
</span></li><span data-dcnode-id="2013" instrument_node="">
</span><li data-dcnode-id="2005" dir="ltr"><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2007" dir="ltr"><span data-dcnode-id="2011" instrument_node="">Many stars have one or more companions, and those can affect a star’s life profoundly. Close </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/variable-stars-and-binaries"><span data-dcnode-id="2010" instrument_node="">binary stars</span></a><span data-dcnode-id="2008" instrument_node=""> can pull each other out of shape, strip matter from each other, or even merge into one star. If the companion is a white dwarf, neutron star, or black hole, interactions can be even more dire for the star. These can shorten the star’s life and sometimes produce small explosions on the its surface.</span></p><span data-dcnode-id="2006" instrument_node="">
</span></li><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="1996" dir="ltr"><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="1998" dir="ltr"><span data-dcnode-id="2002" instrument_node="">When a star in the same mass range as the Sun dies, it sheds its outer layers, forming a </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/planetary-nebulae"><span data-dcnode-id="2001" instrument_node="">planetary nebula</span></a><span data-dcnode-id="1999" instrument_node="">. The elements from those outer layers enrich the surrounding environment, while the shape of the planetary nebula itself provides clues to the final days of the original star. Meanwhile, the remnant of the star’s core becomes a white dwarf.</span></p><span data-dcnode-id="1997" instrument_node="">
</span></li><span data-dcnode-id="1995" instrument_node="">
</span><li data-dcnode-id="1987" dir="ltr"><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1989" dir="ltr"><span data-dcnode-id="1993" instrument_node="">High-mass stars explode as </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pweb.cfa.harvard.edu/research/topic/supernovas-remnants"><span data-dcnode-id="1992" instrument_node="">supernovas</span></a><span data-dcnode-id="1990" instrument_node="">, which are energetic enough to fuse more elements and spread them through space. The remnant of the star’s core shrinks into a neutron star for moderately high-mass stars, or a black hole for very high-mass stars. Astronomers study supernovas and their remnants to understand the way these stars die and spread materials through the galaxy. The neutron stars and black holes they leave behind also shape their environments in profound ways.</span></p><span data-dcnode-id="1988" instrument_node="">
</span></li><span data-dcnode-id="1986" instrument_node="">
</span></ul><p data-dcnode-id="1983" dir="ltr"><span data-dcnode-id="1984" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1982" instrument_node="">

</span></div><span data-dcnode-id="1185" instrument_node="">
</span><div class="h4" data-dcnode-id="1177"><span data-dcnode-id="1184" instrument_node="">The Harvard Astronomical Glass Plate Collection is an archive of roughly 500,000 images of the sky preserved on glass photographic plates, the way professional astronomers often captured images in the era before the dominance of digital technology. These plates are more than historical curiosities: they provide over a century’s worth of data that can be used by contemporary astronomers to trace how objects in the night sky change over periods from years to decades.</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">
</span><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">
For that reason, researchers with the DASCH (Digital Access to a Sky Century @ Harvard) project are scanning the plates for digital storage and analysis. The process can also lead to new discoveries in old images, particularly of events that change over time, such as variable stars, novas, or black hole flares. The Harvard Astronomical Plate Collection is housed at the Harvard College Observatory (HCO), part of the Center for Astrophysics | Harvard &amp; Smithsonian.</span><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">

</span><div class="h4" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">The Sloan Digital Sky Survey continues its twenty-year legacy of wide-field optical/infrared imaging and spectroscopy, which has led astronomy into the era of large archives and data science. Harvard and Smithsonian are both full institutional members of the latest epoch of the survey, SDSS-V, which started observations in 2020.</span></div><span data-dcnode-id="1108" instrument_node="">

</span><h3 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Coordinated Molecular Probe Line Extinction Thermal Emission (COMPLETE) Survey of Star Forming Regions</span></h3><span data-dcnode-id="1085" instrument_node="">
</span><div class="meta" data-dcnode-id="1080"><span data-dcnode-id="1084" instrument_node="">
</span><div data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Radio and Geoastronomy</span></div><span data-dcnode-id="1081" instrument_node="">
</span></div><span data-dcnode-id="1079" instrument_node="">
</span><div class="h4" data-dcnode-id="1075"><span data-dcnode-id="1078" instrument_node="">Star formation is a complex process, beginning from cold clouds of gas and dust and ending with the diverse population of stars we observe in our galaxy and beyond. Studying that process requires many different types of astronomical observations to capture the composition, dynamics, and other properties of star-forming regions. While most researchers focus on certain aspects of these systems, the COordinated Molecular Probe Line Extinction Thermal Emission (COMPLETE) Survey of Star Forming Regions was an ambitious project designed to capture as much information as possible, using data from multiple observatories to accomplish the task. During the survey’s data-collecting period, each of these observatories provided a different type of observation on three star-forming regions in the Milky Way, across the infrared, microwave, and radio part of the spectrum of light. COMPLETE was a collaboration between astronomers at the Center for Astrophysics | Harvard &amp; Smithsonian and other universities around the world.</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node="">

</span></a><span data-dcnode-id="1063" instrument_node="">

</span><h3 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">From Molecular Cores to Planet Forming Disks (c2d)</span></h3><span data-dcnode-id="1051" instrument_node="">
</span><div class="h4" data-dcnode-id="1047"><span data-dcnode-id="1050" instrument_node="">Since the 1990s, astronomers have identified thousands of exoplanets, indicating that the Milky Way alone could be host to hundreds of billions of planets. However, we are still learning how these planets formed in the first place, crucial information in understanding the variety of systems researchers have cataloged. To fill in those gaps, astronomers from the Center for Astrophysics | Harvard &amp; Smithsonian collaborated with others from around the world on the project named “From Molecular Cores to Planet Forming Disks” (c2d). This program used NASA’s Spitzer Infrared Space Telescope to observe star-forming systems and the protoplanetary disks where future planets are born. The c2d program ended its observational phase in the mid-2000s, but maintains a catalog of these systems that continues to be used by astronomers studying star formation.</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">

</span><div data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Radio and Geoastronomy</span></div><span data-dcnode-id="1019" instrument_node="">
</span></div><span data-dcnode-id="1017" instrument_node="">
</span><div class="h4" data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">Gould’s Belt is a long chain of clouds in the Milky Way comprised of stellar nurseries and hot young stars. Stretching across a substantial part of the night sky, Gould’s Belt includes the Orion Nebula — the middle object in Orion’s “sword” — and a number of other star-forming regions. These regions are opaque in visible light, so the Spitzer Gould’s Belt Survey project used NASA’s Spitzer Infrared Space Telescope, the European Space Agency’s Herschel Space Observatory, and the James Clerk Maxwell Telescope in Hawaii to map the region in infrared and submillimeter light. The survey was led by scientists at the Center for Astrophysics | Harvard &amp; Smithsonian, in collaboration with a number of other institutions around the world. Since the completion of observations in 2006, the data has continued to supply astronomers with insights into the formation of new stars in the Milky Way.</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">

</span><h3 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The Cygnus-X Spitzer Legacy Survey</span></h3><span data-dcnode-id="989" instrument_node="">
</span><div class="h4" data-dcnode-id="985"><span data-dcnode-id="988" instrument_node="">The Cygnus-X region of the Milky Way is a veritable factory for making new stars, including a large number of giant hot stars. The Cygnus-X Spitzer Legacy Survey is dedicated to studying how these giant stars formed, and how they affect the growth of smaller stars in their vicinity. Led by researchers at the Center for Astrophysics | Harvard &amp; Smithsonian, this survey used NASA’s Spitzer Infrared Space Telescope to identify and track the course of star formation in Cygnus-X in multiple wavelengths of infrared light. Though the observational portion of the survey is over, researchers at CfA and many other institutions continue to generate new astronomical insights from its data.</span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">
</span></div><span data-dcnode-id="984" instrument_node="">

</span><h3 data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">ANCHORS</span></h3><span data-dcnode-id="961" instrument_node="">
</span><div class="h4" data-dcnode-id="957"><span data-dcnode-id="960" instrument_node="">Star-forming regions are sources of intense radiation, from radio waves to X-rays. The ANCHORS (AN archive of CHandra Observations of Regions of Star formation) database documents over 10,000 X-ray sources in these regions of space, collected in the early 2000s by NASA’s Chandra X-ray Observatory. This archive is managed by astronomers at the Center for Astrophysics | Harvard &amp; Smithsonian. ANCHORS is designed to be easy to use, allowing for sorting of data through a simple online interface.</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">

</span></a><span data-dcnode-id="945" instrument_node="">

</span><div class="h4" data-dcnode-id="923"><span data-dcnode-id="926" instrument_node="">In extreme environments, where pressure, temperature, and density are high, atoms change the way they emit and absorb light. Electrons are stripped from nuclei, forming a plasma, and the ions emit X-rays when struck by free electrons. To assist astronomers in identifying atoms under these harsh conditions, the Center for Astrophysics | Harvard &amp; Smithsonian maintains the AtomDB database of X-ray spectra. This catalog provides essential information for studying conditions in many astrophysical environments, including those near black holes, stars, and neutron stars.</span><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">

</span><h3 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">PINTofALE (Package for Interactive Analysis of Line Emission)</span></h3><span data-dcnode-id="899" instrument_node="">
</span><div class="h4" data-dcnode-id="895"><span data-dcnode-id="898" instrument_node="">Astrophysical environments are often strikingly different from those on Earth, but there’s no direct way for astronomers to measure conditions in space. Instead, they must infer environmental properties from the behavior of atoms, particularly the way they absorb and emit light. For this to work, researchers need to use databases of atomic spectra, which requires writing or using computer code. PINTofALE (Package for Interactive Analysis of Line Emission) is a software toolkit designed to streamline this process, giving astronomers a powerful way to use X-ray and ultraviolet atomic data without having to write their own code every time. The package was developed by researchers at the Center for Astrophysics | Harvard &amp; Smithsonian, and is provided for free as a service to astronomers.</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">

</span><div class="h4" data-dcnode-id="775"><span data-dcnode-id="782" instrument_node="">The Chandra X-ray Observatory is NASA’s flagship X-ray observatory, providing essential data on everything from the environment surrounding newborn stars to the emissions from hot plasma inside galaxy clusters. The Smithsonian Astrophysical Observatory (SAO), as part of the Center for Astrophysics | Harvard &amp; Smithsonian, manages Chandra’s day-to-day operations, providing spacecraft control, observation planning, and data processing for astronomers. Chandra is one of NASA’s orbiting Great Observatories, along with the Hubble.</span><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">

</span><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Einstein Observatory</span></h3><span data-dcnode-id="751" instrument_node="">
</span><div class="h4" data-dcnode-id="747"><span data-dcnode-id="750" instrument_node="">NASA’s Einstein Observatory was the first X-ray space telescope designed to produce images of astronomical X-ray sources. The spacecraft operated from 1978 through 1981, providing important observations of pulsars, supernova remnants, supermassive black holes in other galaxies, and many more, paving the way for NASA’s Chandra X-ray Observatory. The X-ray telescope was designed by researchers at the Center for Astrophysics | Harvard &amp; Smithsonian.</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">

</span><h3 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Giant Magellan Telescope</span></h3><span data-dcnode-id="723" instrument_node="">
</span><div class="h4" data-dcnode-id="715"><span data-dcnode-id="722" instrument_node="">Is Earth unique, or are there other planets with life in the Milky Way? To answer this question and many others, astronomers need larger and more sensitive observatories than anything we currently have. For that reason, the Center for Astrophysics | Harvard &amp; Smithsonian is collaborating with a number of other institutions around the world to create the Giant Magellan Telescope (GMT), currently under construction in Chile. The GMT will consist of seven large mirrors acting in concert as one giant telescope 80&nbsp;feet&nbsp;across. That large size provides an unprecedented view of the sky and the ability to detect the chemical composition of exoplanet atmospheres. Like NASA’s Hubble Space Telescope, the GMT will be a powerful tool across the field of astronomy, providing insights into the formation of planets, the structure of galaxies, and the evolution of the universe itself.</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">

</span><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">High Accuracy Radial Velocity Planet Searcher-North (HARPS-N)</span></h3><span data-dcnode-id="691" instrument_node="">
</span><div class="h4" data-dcnode-id="683"><span data-dcnode-id="690" instrument_node="">Measuring the mass of a distant exoplanet requires tracking the changes in light of the host star as the planet’s gravity tugs it slightly — a delicate process. The High Accuracy Radial velocity Planet Searcher for the Northern hemisphere (HARPS-N) is an instrument designed for that purpose. HARPS-N is installed on the Telescopio Nazionale Galileo at the Roque de los Muchachos Observatory on the island of La Palma in the Canary Islands. The instrument provides valuable follow-up observations for the smaller exoplanets identified by NASA’s Kepler/K2 space telescope and other observatories. Astronomers at the Center for Astrophysics | Harvard &amp; Smithsonian are part of the international collaboration operating the instrument. Using the high quality data from HARPS-N, astronomers hope to measure the masses of Earth-like worlds to sufficient accuracy to determine how much these planets resemble ours.</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">

</span><h3 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Hungarian-made Automated Telescope Network (HATNet)</span></h3><span data-dcnode-id="659" instrument_node="">
</span><div class="h4" data-dcnode-id="651"><span data-dcnode-id="658" instrument_node="">The Hungarian-made Automated Telescope Network (HATNet) is a set of computer-controlled small telescopes located at various observatories around the world. Five of these telescopes are hosted at the Fred Lawrence Whipple Observatory (FLWO), a Center for Astrophysics | Harvard &amp; Smithsonian facility in southern Arizona. HATNet is designed to look for planets in orbit around bright stars; since beginning operations in 2001, astronomers have used the network to identify 70 confirmed&nbsp;exoplanets&nbsp;and several hundred additional candidates that have not yet been confirmed as exoplanets or ruled out as false positives.</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">

</span><div class="inside-copy" data-dcnode-id="617"><span data-dcnode-id="630" instrument_node="">
</span><h3 data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Kepler/K2</span></h3><span data-dcnode-id="627" instrument_node="">
</span><div class="h4" data-dcnode-id="619"><span data-dcnode-id="626" instrument_node="">Since the early 1990s, astronomers have identified thousands of planets orbiting other stars. Most of those identifications have come thanks to one observatory: NASA’s Kepler space telescope. Until it lost its ability to point, Kepler observed a region of the sky containing about 150,000 stars with potential planets, monitoring them for the slight decrease in light caused by planets crossing in front of the star. After the spacecraft’s pointing control failed, the mission was renamed K2, and it continued to hunt for exoplanets as it tumbled slowly, with its field of view drifting slowly across the sky. The mission finally ended in 2018, though the data it produced continues to provide astronomers with valuable information about planets in our galactic neighborhood. Astronomers from the Center for Astrophysics | Harvard &amp; Smithsonian were responsible for the preparation of the catalog for potentially interesting stars, and have participated extensively in follow-up observations of Kepler planetary discoveries.</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">

</span><h3 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Lynx X-Ray Observatory</span></h3><span data-dcnode-id="595" instrument_node="">
</span><div class="h4" data-dcnode-id="587"><span data-dcnode-id="594" instrument_node="">The Lynx X-ray Observatory is a proposed X-ray space telescope, designed to be the next generation following NASA’s Chandra X-ray Observatory and the European Space Agency’s upcoming Athena Telescope. This observatory will be able to take images of a larger area of the sky in X-ray light with better resolution than any existing telescope, allowing astronomers to study the first supermassive black holes, the hot gas surrounding galaxies as they evolve, and radiation from the earliest stars. Researchers from the Center for Astrophysics | Harvard &amp; Smithsonian and other universities are presenting Lynx to NASA for consideration in the 2020 Decadal Survey, with a proposed launch date in the mid-2030s.</span><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">

</span><h3 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Magellan Telescopes</span></h3><span data-dcnode-id="563" instrument_node="">
</span><div class="h4" data-dcnode-id="555"><span data-dcnode-id="562" instrument_node="">The twin Magellan Telescopes in Chile are each 6.5 meter optical telescopes. These telescopes are both equipped with instruments to take images and spectra of light from a wide variety of astronomical sources, including exoplanet systems, star-forming regions, supernova remnants, and interacting galaxies. The Magellan Telescopes — named Baade and Clay —&nbsp; are hosted at the Las Campanas Observatory and are operated by a consortium of institutions, including the Center for Astrophysics | Harvard &amp; Smithsonian, Carnegie Institution for Science, University of Arizona, the University of Michigan, and the Massachusetts Institute of Technology. In addition, CfA scientists and engineers provided a wide field f/5 focal system (including secondary mirror and corrective optics), and a powerful astronomical camera for use at the Clay telescope.</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">

</span><h3 data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">MEarth</span></h3><span data-dcnode-id="531" instrument_node="">
</span><div class="h4" data-dcnode-id="525"><span data-dcnode-id="530" instrument_node="">How many Earth-sized planets are out there? How many of those might support life? Answering these questions is complicated because Earth-like worlds are small, making them hard to detect. The MEarth Project — pronounced “mirth” — simplifies the problem by looking for planets orbiting small, red M dwarf stars. Potentially habitable Earth-sized planets have smaller orbits around these stars than yellow Sun-like stars, allowing MEarth to identify them. The MEarth telescopes are operated by the Center for Astrophysics | Harvard &amp; Smithsonian and located at the CfA’s Fred Lawrence Whipple Observatory (FLWO) in Arizona and the Cerro Tololo Inter-American Observatory (CTIO) in Chile. Astronomers have used MEarth to identify multiple planets, including the rocky planet GJ1132b.</span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">

</span><h3 data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">MINiature Exoplanet Radial Velocity Array (MINERVA)</span></h3><span data-dcnode-id="469" instrument_node="">
</span><div class="h4" data-dcnode-id="461"><span data-dcnode-id="468" instrument_node="">Finding potentially habitable exoplanets is a major goal of modern astronomy, but Earth-like worlds in Earth-like orbits are hard to detect. The MINiature Exoplanet Radial Velocity Array (MINERVA) project is a set of small telescopes designed to look at two related but simpler systems: Earth-size planets close to their host stars, and “super-Earths” in more Earth-like orbits. MINERVA is a collaboration between the Center for Astrophysics | Harvard &amp; Smithsonian, the University of Montana, Penn State, the University of Southern Queensland, and the University of Pennsylvania. The telescopes are hosted at the CfA’s Fred Lawrence Whipple Observatory (FLWO) in Arizona.</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">

</span><h3 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Pan-STARRS-1 Science Consortium</span></h3><span data-dcnode-id="405" instrument_node="">
</span><div class="h4" data-dcnode-id="397"><span data-dcnode-id="404" instrument_node="">Many objects in the sky don’t change or move visibly on human time scales. However, many others do, especially objects in the Solar System. The Panoramic Survey Telescope and Rapid Response System (Pan-STARRS) program is designed to monitor the sky for transient astronomical phenomena: everything from near-Earth asteroids to supernovas in far-off galaxies. The first phase of the program, Pan-STARRS1, used a 1.8-meter telescope on the summit of Haleakalā on the island of Maui in Hawaii. The Center for Astrophysics | Harvard &amp; Smithsonian is part of the international Pan-STARRS1 Science consortium, along with the University of Hawaii and other institutions around the world. Pan-STARRS1 data revealed many asteroids, comets, and other previously-unknown moving or variable astronomical objects.</span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">

</span><h3 data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Spitzer Space Telescope</span></h3><span data-dcnode-id="373" instrument_node="">
</span><div class="h4" data-dcnode-id="365"><span data-dcnode-id="372" instrument_node="">Infrared light is the key to studying a wide range of astronomical systems, including newborn stars and planets, dust in distant galaxies, and material swirling around black holes. The Spitzer Space Telescope was NASA’s orbiting infrared observatory, and part of NASA’s Great Observatories program, along with the Chandra X-ray Observatory and the Hubble Space Telescope. Scientists and engineers at the Center for Astrophysics | Harvard &amp; Smithsonian led the design, testing, and construction of the Infrared Array Camera (IRAC). The Spitzer Space Telescope was launched in 2003&nbsp;and retired in 2020.</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">

</span><h3 data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Stratospheric Terahertz Observatory 1&amp;2</span></h3><span data-dcnode-id="341" instrument_node="">
</span><div class="h4" data-dcnode-id="333"><span data-dcnode-id="340" instrument_node="">The Milky Way is full of clouds of gas and dust, which are the places where new stars and planets are born. These molecular clouds clump together and break apart over time, such that understanding their evolution requires observing them at various stages of their lives. However, much of the light emitted by these clouds is blocked by Earth’s atmosphere. To get above most of the light-blocking air, NASA’s Stratospheric Terahertz Observatory (STO) is an infrared telescope flown on a special high-altitude balloon 40 kilometers (25 miles) over Antarctica. Center for Astrophysics | Harvard &amp; Smithsonian researchers were involved with the development of the first STO mission, which flew for 14 days in 2012; the second mission, STO2, operated for three weeks in 2016.</span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">
</span><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
Visit the&nbsp;Stratospheric Terahertz Observatory 1&amp;2 Website</span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">

</span><h3 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">The Submillimeter Array - Maunakea, HI</span></h3><span data-dcnode-id="309" instrument_node="">
</span><div class="h4" data-dcnode-id="301"><span data-dcnode-id="308" instrument_node="">Located near the summit of Maunakea on the Big Island of Hawaii, the Submillimeter Array (SMA) is one of the flagship observatories of the Center for Astrophysics | Harvard &amp; Smithsonian. The observatory consists of eight radio dishes working together as one telescope, giving astronomers a window on a wide range of astronomical objects and phenomena: planets and comets in our own Solar System; the birth of stars and planets; and the supermassive black holes hidden at the centers of the Milky Way and other galaxies. The SMA is operated jointly by the CfA and the Academia Sinica in Taiwan.</span><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
</span><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">

</span><h3 data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Transiting Exoplanet Survey Satellite (TESS)</span></h3><span data-dcnode-id="277" instrument_node="">
</span><div class="h4" data-dcnode-id="269"><span data-dcnode-id="276" instrument_node="">Astronomers have discovered thousands of planets orbiting other stars. Extrapolating from that knowledge, the Milky Way alone is probably home to hundreds of billions of planets, many of which are likely rocky, Earth-like worlds. NASA’s Transiting Exoplanet Survey Satellite (TESS) is a space observatory designed to look for exoplanets in orbit around 200,000 nearby bright stars, with a particular interest in identifying small planets. Astronomers from the Center for Astrophysics | Harvard &amp; Smithsonian are part of the scientific team to analyze TESS data, as well as performing follow-up observations. The relative closeness of worlds in the TESS survey will allow astronomers to even study some of their atmospheres, using the future Giant Magellan Telescope (GMT) and other observatories. TESS observational program is complementary to NASA’s long-running Kepler/K2 mission, and could identify as many as 20,000 new exoplanet orbiting a wide variety of star types.</span><br data-dcnode-id="275"><span data-dcnode-id="274" instrument_node="">
</span><br data-dcnode-id="273"><span data-dcnode-id="272" instrument_node="">
