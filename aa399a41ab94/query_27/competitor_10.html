</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The Milky Way galaxy is an immense, flat, disk-shaped collection of gas, dust, and stars that spreads around 100.000 light-years across and is several thousand light-years thick.</span></p><span data-dcnode-id="920" instrument_node="">

</span><h2 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Key Facts &amp; Summary</span></h2><span data-dcnode-id="890" instrument_node="">
</span><ul data-dcnode-id="813"><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">There are at least 100 billion galaxies in the universe, and the Milky Way is just one of them.</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The Milky Way – out of the four types of galaxies – is a spiral barred type of galaxy.</span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Every star we see with our naked eyes is in the Milky Way galaxy. The only object you can see in the sky outside of the Milky Way with your naked eyes is the Andromeda Galaxy.</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">The ancients knew about the Milky Way, but they did not know what it was exactly. In 1610 Galileo Galilei pointed his telescope in the sky and saw thousands of stars. More observations were conducted and after the discovery of the Andromeda galaxy by Edwin Hubble, it was concluded that the Milky Way was just one out of many galaxies.</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The galactic center of the Milky Way is about 25.000 light-years away from our Sun.</span></li><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">In the galactic center lays Sagittarius A*, a supermassive black hole that has a mass of about 4.3 million that of our Sun. This is a common feature of the galactic centers of galaxies.</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">Sagittarius A* is about the size of </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/mercury/"><span data-dcnode-id="869" instrument_node="">Mercury’s</span></a><span data-dcnode-id="867" instrument_node=""> orbit – 22.5 million km / 14 million mi. This is just the hole itself, the accretion disk which is the mass of objects trying to get into it is responsible for Sagittarius’s enormous mass.</span></li><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">The Milky Way has been estimated to have around 100 million black holes, but not as gigantic as the one in the center.</span></li><span data-dcnode-id="862" instrument_node="">
</span><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The mass of the Milky Way is believed to be around 100 billion times that of the Sun, which would translate to the fact that our galaxy might have around 100-400 billion stars.</span></li><span data-dcnode-id="859" instrument_node="">
</span><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">The radius of the Milky Way is estimated to be around 52.850 light-years.</span></li><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">The Milky Way is believed to be around 12 billion years old.</span></li><span data-dcnode-id="853" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">There are around 40 billion exoplanets (planets that orbit other stars) similar to the size of Earth orbiting in the habitable zones of their sun-like stars. At least 100 billion planets exist in the Milky Way galaxy.</span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The Milky Way galaxy has 4 major spiral arms, which are sights of strong star formation.</span></li><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">There are many more minor spiral arms as well. Our Sun is currently in such a location, just outside a spiral arm named the Orion Arm.</span></li><span data-dcnode-id="844" instrument_node="">
</span><li data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The Milky Way is made up of about 90% dark matter, matter that cannot be seen and about 10% “luminous matter”, or matter that we can see with our eyes. This large quantity of dark matter causes an invisible halo that has been demonstrated by simulations of how the Milky Way spins.</span></li><span data-dcnode-id="841" instrument_node="">
</span><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">The halo – is a vast spherical cloud of stars surrounding us out at great distances.&nbsp; Most of the globular clusters – groups of the most ancient stars in the universe orbiting the Milky Way - are in this halo, orbiting the Milky Way’s galactic center.</span></li><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">The central region of the Milky Way is shaped like a bar, composed of mostly old, red stars.</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Our galaxy belongs to a small cluster of galaxies called the Local Group, which is one of many other groups and clusters of galaxies located near the outer edge of the Virgo supercluster.</span></li><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Our galaxy grew by devouring other small galaxies. Such a process is still on-going even now. The Large and Small Magellanic Clouds are orbiting the Milky Way galaxy, while the Sagittarius dwarf galaxy is on the process of merging with the main body of the Milky Way galaxy.</span></li><span data-dcnode-id="829" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Estimative calculations predict that our galaxy will also collide with the Andromeda galaxy in around 8 billion years or sooner.</span></li><span data-dcnode-id="826" instrument_node="">
</span><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The Milky Way galaxy is moving at a velocity of 600 km / 372 mi per second towards a densely packed region of space called the Shapley Attractor. In comparison to the size of the galaxy, the accurate speed of movement is actually smaller.</span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">In addition to the pulling effect of the Shapley Attractor, the Milky Way galaxy is also pushed by the Dipole Repeller – an empty void.</span></li><span data-dcnode-id="820" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The oldest known exoplanet in the Milky Way galaxy is nicknamed Methuselah – believed to be about 12.7 billion years old.</span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">About 10-15% of the Milky Way’s visible matter is made of dust and gas, with the rest being stars.</span></li><span data-dcnode-id="814" instrument_node="">
</span></ul><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Since ancient times humanity has been able to observe a faint fuzzy glow stretching on the night sky. This glow’s resemblance to a pathway or a river is strong. Many ancient cultures saw it that way because it glows white.</span></p><span data-dcnode-id="809" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="807"><img alt="" class="wp-image-3687" data-dcnode-id="808" height="680" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot-1024x680.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot-1024x680.jpg 1024w, https://nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot-300x199.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot-768x510.jpg 768w, https://nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot-1536x1020.jpg 1536w, https://nineplanets.org/wp-content/uploads/2019/12/ESO-VLT-Laser-phot.jpg 1600w" width="1024"></figure><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The ancient people of Greece called it “Galaxius”, or “Milky.” Over the millennia that name remained and suffered different variations, and stuck to this day.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Nobody knew what exactly this glow was, until Galileo Galilei pointed his telescope at it in 1610, and saw that the glow was actually a collection of thousands of stars. For a period of time, some believed that the galaxy is as big as the universe itself. However, many observations were further conducted.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Since the Andromeda galaxy can also be viewed with the naked eyes, it attracted the attention of astronomers. With more modern telescopes being used, an astronomer by the name of Edwin Hubble studied the Andromeda nebula. He concluded in 1923 that the nebula was, in fact, another galaxy.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">He published his works in 1929 and forever changed our views on the universe, concluding that the Milky Way was just one, out of many other galaxies. Seven decades later, a telescope named in Hubble’s honor helped discover that the observable universe was truly vast, and contained nearly 100 billion galaxies.</span></p><span data-dcnode-id="794" instrument_node="">
</span><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Formation</span></h2><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">How the Milky Way formed is still a matter of debate. The Big Bang theory suggests that after the explosion, the universe was composed of radiation and subatomic particles.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">There are two strong viewpoints here:</span></p><span data-dcnode-id="785" instrument_node="">
</span><ul data-dcnode-id="777"><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Small particles slowly teamed up and gradually formed stars, star clusters, and eventually galaxies.</span></li><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The universe first organize as immense clumps of matter that later subdivided into galaxies.</span></li><span data-dcnode-id="778" instrument_node="">
</span></ul><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">It is still up to debate. However, we know that the Milky Way galaxy grew by merging with other galaxies. Almost half of the matter in the Milky Way is believed to have come from other distant galaxies.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">These very old stars and clusters now comprise the galactic halo of our galaxy. It continued to grow by merging and because of the accretion of gas that came directly from the galactic halo.</span></p><span data-dcnode-id="770" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="768"><img alt="" class="wp-image-3686" data-dcnode-id="769" height="939" loading="lazy" sizes="(max-width: 946px) 100vw, 946px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Milky-Way.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Milky-Way.jpg 946w, https://nineplanets.org/wp-content/uploads/2019/12/Milky-Way-300x298.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/Milky-Way-150x150.jpg 150w, https://nineplanets.org/wp-content/uploads/2019/12/Milky-Way-768x762.jpg 768w" width="946"></figure><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">When the first stars of the Milky Way were born, the mass was large enough so that the galaxy was spinning relatively quickly.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">This led the gaseous interstellar medium to collapse from a roughly spheroidal shape – to that of a disk. Later-generation of stars formed in this spiral disk, with the younger stars including our </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/the-sun/"><span data-dcnode-id="762" instrument_node="">Sun</span></a><span data-dcnode-id="760" instrument_node="">, currently observed to be in the disk.</span></p><span data-dcnode-id="758" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="756"><img alt="" class="wp-image-3688" data-dcnode-id="757" height="379" loading="lazy" sizes="(max-width: 673px) 100vw, 673px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/spiral-disk.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/spiral-disk.jpg 673w, https://nineplanets.org/wp-content/uploads/2019/12/spiral-disk-300x169.jpg 300w" width="673"></figure><span data-dcnode-id="755" instrument_node="">
</span><h2 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Location</span></h2><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">The Milky Way galaxy and the Andromeda galaxy are a binary system of giant spiral galaxies belonging to a group of 50 closely bound galaxies known as the Local Group</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Local Group is surrounded by a Local Void, itself being part of the Virgo Supercluster of galaxies. The Virgo Supercluster is also surrounded by giant voids such as the Microscopium Void, Sculptor Void, Bootes Void, and Canes-Major Void.</span></p><span data-dcnode-id="746" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="744"><img alt="" class="wp-image-3685" data-dcnode-id="745" height="750" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Local_Group_LofE06240.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Local_Group_LofE06240.png 1024w, https://nineplanets.org/wp-content/uploads/2019/12/Local_Group_LofE06240-300x220.png 300w, https://nineplanets.org/wp-content/uploads/2019/12/Local_Group_LofE06240-768x563.png 768w" width="1024"></figure><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The voids change shape over time, creating filamentous structures of galaxies. The Virgo Supercluster, for instance, is being drawn towards the Great Attractor, which in turn forms part of a greater structure named Laniakea.</span></p><span data-dcnode-id="740" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="738"><img alt="" class="wp-image-3689" data-dcnode-id="739" height="750" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Laniakea.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Laniakea.png 1024w, https://nineplanets.org/wp-content/uploads/2019/12/Laniakea-300x220.png 300w, https://nineplanets.org/wp-content/uploads/2019/12/Laniakea-768x563.png 768w" width="1024"></figure><span data-dcnode-id="737" instrument_node="">
</span><h2 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Size, Mass, and Distance</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The Milky Way is part of the Local Group, holding the second title as the largest galaxy in it. Its stellar disk is approximately 100.000 light-years / 30 kpc in diameter.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">It is approximately 1.000 light-years / 0.3 kpc thick. The Local Group is about 10 million light-years across, and the Andromeda galaxy is the most massive galaxy in it, The Milky Way is the second-most massive.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">The Milky Way is almost 1.5 trillion times the mass of the Sun. If the </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/solar-system/"><span data-dcnode-id="726" instrument_node="">Solar System</span></a><span data-dcnode-id="724" instrument_node=""> were the size of a coin, the Milky Way would be the size of the contiguous United States.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Much of the mass seems to be dark matter, an unknown and invisible form of matter that interacts gravitationally with ordinary matter.</span></p><span data-dcnode-id="719" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="717"><img alt="" class="wp-image-3684" data-dcnode-id="718" height="450" loading="lazy" sizes="(max-width: 430px) 100vw, 430px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Milky_way_profile.svg.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Milky_way_profile.svg.png 573w, https://nineplanets.org/wp-content/uploads/2019/12/Milky_way_profile.svg-287x300.png 287w" width="430"></figure><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Milky Way’s mass has a radius of about 129.000 light-years. This suggests that about 90% of the mass is comprised of dark matter.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h2 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Galactic Rotation/Orbit</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">All the stars and gas of our galaxy orbit a supermassive black hole located at the center of the galaxy named Sagittarius A*.The Sagittarius A* is around 28.000 light-years away from </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/earth/"><span data-dcnode-id="708" instrument_node="">Earth</span></a><span data-dcnode-id="706" instrument_node="">.</span></p><span data-dcnode-id="704" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="702"><img alt="" class="wp-image-3683" data-dcnode-id="703" height="419" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Rotation_curve_Milky_Way.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Rotation_curve_Milky_Way.jpg 600w, https://nineplanets.org/wp-content/uploads/2019/12/Rotation_curve_Milky_Way-300x210.jpg 300w" width="600"></figure><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The stars and gas rotate around the center differentially, meaning that the rotation period varies with location. A typical characteristic of spiral galaxies is that the orbital speeds of most stars do not depend strongly on their distance from the center.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">There are 2 small galaxies around with a number of dwarf galaxies in the Local Group who orbit the Milky Way. The largest one is the Large Magellanic Cloud with a diameter of 14.000 light-years. It has a close companion, the Small Magellanic Cloud. The smallest galaxies usually have 500 light-years diameters.</span></p><span data-dcnode-id="695" instrument_node="">
</span><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Structure &amp; Contents</span></h2><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The Milky Way consists of a bar-shaped core region that is surrounded by a warped disk of gas, dust, and stars. It is a spiral galaxy with relatively loosely wound arms.</span></p><span data-dcnode-id="689" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="687"><img alt="" class="wp-image-3682" data-dcnode-id="688" height="1024" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/the_Milky_Way-1024x1024.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/the_Milky_Way.jpg 1024w, https://nineplanets.org/wp-content/uploads/2019/12/the_Milky_Way-300x300.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/the_Milky_Way-150x150.jpg 150w, https://nineplanets.org/wp-content/uploads/2019/12/the_Milky_Way-768x768.jpg 768w" width="1024"></figure><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">The Milky Way galaxy has 4 major spiral arms, which are sights of strong star formation.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">There are many more minor spiral arms as well. Our Sun is currently in such a location, just outside a spiral arm named the Orion Arm.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The Milky Way is made up of about 90% dark matter, matter which cannot be seen and about 10% “luminous matter”, or matter that we can see with our eyes. This large quantity of dark matter causes an invisible halo that surrounds the Milky Way.</span></p><span data-dcnode-id="677" instrument_node="">
</span><h3 data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Spiral Arms</span></h3><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The 4 major spiral arms of the Milky Way contain a higher density of interstellar gas, dust and a greater concentration of star formation than the rest of the galaxy.</span></p><span data-dcnode-id="671" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="669"><img alt="" class="wp-image-3681" data-dcnode-id="670" height="600" loading="lazy" sizes="(max-width: 635px) 100vw, 635px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Milky_Way_Arms.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Milky_Way_Arms.png 635w, https://nineplanets.org/wp-content/uploads/2019/12/Milky_Way_Arms-300x283.png 300w" width="635"></figure><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The cyan, purple, green, and pink colors represent the major arms. They are called: the Perseus Arm, Outer Arm, Scutum-Centaurus Arm, and Carina-Sagittarius arm.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The orange color represents the two minor arms which also contains our solar system. They are the Orion and Cygnus Arm. The investigation is on-going to determine the exact number of arms our galaxy has.</span></p><span data-dcnode-id="662" instrument_node="">
</span><h3 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Black holes</span></h3><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">In the center of the Milky Way is Sagittarius A*, a supermassive black hole. It has a mass of about 4.3 million that of our Sun and it is near the border of the constellations Sagittarius and Scorpio.</span></p><span data-dcnode-id="656" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="654"><img alt="" class="wp-image-3680" data-dcnode-id="655" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Sagittarius-A.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Sagittarius-A.jpg 1000w, https://nineplanets.org/wp-content/uploads/2019/12/Sagittarius-A-300x150.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/Sagittarius-A-768x384.jpg 768w" width="1000"></figure><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Sagittarius A* is not the only black hole in the Milky Way. Estimations suggest that there are over 100 million black holes in the Milky Way alone with two dozen already discovered, but they are small.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">However, recent observations of a star named LB-1 revealed the presence of a black hole about 70 times or more the mass of our Sun. This discovery is controversial since it was believed that there shouldn’t be black holes of this size in our galaxy, with the exception of Sagittarius A*. Observations continue and now a raising belief is becoming predominant: that there are more enormous black holes of which we haven’t yet detected in our own galaxy.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Halo</span></h3><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The Milky Way’s galactic disk is surrounded by a spheroidal halo of old stars and globular clusters. About 90% of them lie within 100.000 lights years of the Galactic Center. Almost 40% of the clusters in our galaxy are on retrograde orbits, moving in the opposite direction from the Milky Way rotation.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h3 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Stars</span></h3><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The Milky Way contains hundreds of billions of stars of all different types, shapes, and sizes. Filling the space between the stars is a disk of gas and dust called the&nbsp;interstellar medium. This disk has at least a comparable extent in radius to the stars.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Stars are still birthed in our galaxy with an estimated one new Sun’s mass worth of stars being formed per year. This mostly occurs in the dense clouds in the galactic plane, central bulges, and even some of the outskirts of the galaxy.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The closest star to us (with the exception of our sun), is a star named Proxima Centauri, at about 4.3 light-years the average distance.</span></p><span data-dcnode-id="629" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="627"><img alt="" class="wp-image-3679" data-dcnode-id="628" height="750" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Proxima-Centauri.png&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Proxima-Centauri.png 1024w, https://nineplanets.org/wp-content/uploads/2019/12/Proxima-Centauri-300x220.png 300w, https://nineplanets.org/wp-content/uploads/2019/12/Proxima-Centauri-768x563.png 768w" width="1024"></figure><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Perhaps the oldest star in the Milky Way that we have detected, is a star named SMSS J0313-6708. It is estimated to be 13.6 billion years old at a distance of 6.000 light-years from Earth. Another star designated HD 140283 is considered to be older, but there is uncertainty regarding its age.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Thus, this makes SMS0313 the oldest known star with an accurate determination of its age.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">In regards to the largest known star in the Milky Way, it is believed to be the Pistol Star. It is a star believed to be 100 times more massive than our Sun and 10.000.000 times as bright.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h3 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Exoplanets</span></h3><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Exoplanets are planets that orbit other stars, just like the planets in our solar system orbit the Sun. There are around 4.099 confirmed exoplanets in the Milky Way. Another 5.000 are awaiting confirmation and more than 3.000 planetary systems have been confirmed.</span></p><span data-dcnode-id="611" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="609"><img alt="" class="wp-image-3678" data-dcnode-id="610" height="528" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nineplanets.org/wp-content/uploads/2019/12/Planets_everywhere.jpg&amp;raw" srcset="https://nineplanets.org/wp-content/uploads/2019/12/Planets_everywhere.jpg 800w, https://nineplanets.org/wp-content/uploads/2019/12/Planets_everywhere-300x198.jpg 300w, https://nineplanets.org/wp-content/uploads/2019/12/Planets_everywhere-768x507.jpg 768w" width="800"></figure><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The Milky Way is estimated to have billions of planets, some of them orbiting stars while others drifting alone in space bearing the name “rogue planets.” The oldest known exoplanet in the Milky Way galaxy is nicknamed Methuselah (PSR B1620-26b) – believed to be about 12.7 billion years old. It is approximately 12.400 light-years away from Earth, and it is located in the constellation of Scorpius.</span></p><span data-dcnode-id="605" instrument_node="">
</span><h2 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Life Habitability</span></h2><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">There are an estimative 40 billion Earth-sized planets in the Milky Way, orbiting around sun-like stars and positioned in the habitable zone. This coupled with the fact that even moons may have suitable conditions to develop life, drastically raises the chances of life outside our own planet. But obviously enough, we ourselves are the proof that the Milky Way galaxy is at least favorable towards developing life.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h2 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Collision</span></h2><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Galaxies grow by colliding and thus merging with other galaxies. The Milky Way is no different. Some galaxies have already been absorbed by the Milky Way, such as the progenitor of Omega Centauri.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">It is strongly believed that the Milky Way will collide with the Andromeda Galaxy in the far future. Current measurements suggest that the Andromeda galaxy is approaching us at 100 – 140 km/s ~ 62-86 mi/s.</span></p><span data-dcnode-id="590" instrument_node="">
</span><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Future observations</span></h2><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">There isn’t actually any photo or illustration of the Milky Way that is complete.&nbsp; Observations are continuous and every day they reveal new planets, stars, facts. But step by step, we will one day have a more complete view of our own galaxy. Much of it still remains unknown.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h2 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Did you know?</span></h2><span data-dcnode-id="581" instrument_node="">
</span><ul data-dcnode-id="558"><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Our Sun takes around 250 million years to orbit the galaxy. This means that it’s already made about 20 orbits around the galaxy since it was born.</span></li><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">In an interesting way, we all orbit around a black hole, the one in the galactic center of the Milky Way, Sagittarius A*.</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">It is believed that the Milky Way galaxy has around 2 rogue planets for every star. They are planets that have been thrown out of their solar system.</span></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">The Milky Way is rotating in a clockwise direction.</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">The Milky Way is surrounded by more than 150 ancient groups of stars, some of which are among the oldest in the universe. They are called globular clusters.</span></li><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">We have only around 75 years since we discovered that we live in a galaxy, out of many other galaxies.</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">The outermost regions of the Milky Way suggest that it hasn’t undergone any mergers with large galaxies in the last 10 billion years. This is unusual when compared to other similar spiral galaxies like our own - Andromeda for example.</span></li><span data-dcnode-id="559" instrument_node="">
</span></ul><span data-dcnode-id="557" instrument_node="">
