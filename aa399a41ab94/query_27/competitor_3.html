</span><div data-dcnode-id="909"><span data-dcnode-id="910"><span data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">The Milky Way is about 1,000,000,000,000,000,000 km (about 100,000 </span><b data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">light years</span></b><span data-dcnode-id="912" instrument_node=""> or about 30 kpc) across. The Sun does not lie near the center of our Galaxy. It lies about 8 kpc from the center on what is known as the Orion Arm of the Milky Way.</span></span></span></div><br data-dcnode-id="908"><p data-dcnode-id="901"><a class="lc" data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/401694" rel="nofollow" target="_blank"><span data-dcnode-id="907" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="905" instrument_node=""> </span><br data-dcnode-id="904"><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node=""> People also ask,  how thick is the Milky Way?</span></p><p data-dcnode-id="891"><span data-dcnode-id="892"><span data-dcnode-id="893"><span data-dcnode-id="900" instrument_node="">The </span><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Milky Way</span></b><span data-dcnode-id="897" instrument_node=""> is the second-largest galaxy in the Local Group, with its stellar disk approximately 100,000 ly (30 kpc) in diameter and, on average, approximately 1,000 ly (0.3 kpc) </span><b data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">thick</span></b><span data-dcnode-id="894" instrument_node="">.</span></span></span></p><p data-dcnode-id="875"><span data-dcnode-id="890" instrument_node="">Furthermore,  what is the size and structure of the Milky Way galaxy? </span><span data-dcnode-id="876"><span data-dcnode-id="877"><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Structure</span></b><span data-dcnode-id="887" instrument_node=""> and Composition. The </span><b data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">galaxy</span></b><span data-dcnode-id="884" instrument_node=""> we live in, called the </span><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Milky Way Galaxy</span></b><span data-dcnode-id="881" instrument_node="">, is a barred spiral </span><b data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">galaxy</span></b><span data-dcnode-id="878" instrument_node=""> composed of at least 100 billion stars. It is approximately 100,000 light years across and about 1000 light years thick. It has a central bulge that is about 10,000 light years in diameter.</span></span></span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node=""> Also Know,  where are we in the Milky Way?</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">  the Orion Arm </span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">How far can we see into the Milky Way?</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">about 27,000 light-years</span></p><span data-dcnode-id="866" instrument_node=""> </span></div><span data-dcnode-id="864" instrument_node="">

</span><p data-dcnode-id="839" style="display:inline;"></p><div data-dcnode-id="820"><span data-dcnode-id="821"><span data-dcnode-id="822"><span data-dcnode-id="838" instrument_node="">If the universe is </span><b data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">infinite</span></b><span data-dcnode-id="835" instrument_node="">, it has always been </span><b data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">infinite</span></b><span data-dcnode-id="832" instrument_node="">. At the Big Bang, it was </span><b data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">infinitely</span></b><span data-dcnode-id="829" instrument_node=""> dense. Since then it has just been getting less dense as </span><b data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">space</span></b><span data-dcnode-id="826" instrument_node=""> has expanded. In the </span><b data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">infinite</span></b><span data-dcnode-id="823" instrument_node=""> case, you wouldn't have enough curvature for spacetime to form the hypersphere.</span></span></span></div><p data-dcnode-id="819"></p><span data-dcnode-id="818" instrument_node="">
