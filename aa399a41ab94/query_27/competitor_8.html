</span><div class="post-info" data-dcnode-id="1160"><span data-dcnode-id="1183" instrument_node="">
</span><div class="author-intro" data-dcnode-id="1181" data-udy-fe="text_-10ded548"><span data-dcnode-id="1182" instrument_node="">Posted by</span></div><span data-dcnode-id="1180" instrument_node="">
</span><div class="coauthors" data-dcnode-id="1171"><span data-dcnode-id="1179" instrument_node="">
</span><a class="post-info-author w-inline-block" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/author/andybriggs/"><span data-dcnode-id="1178" instrument_node="">
</span><div data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Andy Briggs</span></div><span data-dcnode-id="1175" instrument_node="">
</span></a><span data-dcnode-id="1173" instrument_node="">
</span><span data-dcnode-id="1172" instrument_node="">
</span></div><span data-dcnode-id="1170" instrument_node=""> </span><div class="divider-small" data-dcnode-id="1169"></div><span data-dcnode-id="1168" instrument_node="">
</span><div class="post-info-block" data-dcnode-id="1162"><img alt="" class="mini-icon-grey" data-dcnode-id="1167" data-udy-fe="image_-1c8ba15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/wp-content/themes/earthsky-testing-6c8e0a978c578089f4b8b6-2/images/calendar.svg&amp;raw" srcset=""><span data-dcnode-id="1166" instrument_node="">
</span><div data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">February 16, 2021</span></div><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1157" instrument_node="">
</span><div class="post-rich-text w-richtext" data-dcnode-id="817"><figure aria-describedby="caption-attachment-348756" class="wp-caption alignnone" data-dcnode-id="1147" id="attachment_348756" style="width: 800px"><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/11/jupiter-saturn-milky-way-Michael-Zuber-TerlinguaT-nov11-2020-e1605883945110.jpg"><img alt="Jupiter, Saturn, Milky Way, above an abandoned stone building, under a dark desert night sky." class="size-full wp-image-348756" data-dcnode-id="1156" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/11/jupiter-saturn-milky-way-Michael-Zuber-TerlinguaT-nov11-2020-e1605883945110.jpg&amp;raw" width="800"></a><figcaption class="wp-caption-text" data-dcnode-id="1148" id="caption-attachment-348756"><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/earthsky-community-photos/entry/34768" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1154" instrument_node="">View at EarthSky Community Photos</span></a><span data-dcnode-id="1152" instrument_node="">. | </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/michaeldeanzuber/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1151" instrument_node="">Michael Zuber</span></a><span data-dcnode-id="1149" instrument_node=""> caught the bright planets Jupiter and Saturn – above the building in this photo – near the starry band of the Milky Way, from Terlingua, Texas, on November 11, 2020. Thank you, Michael.</span></figcaption></figure><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Do you think of the Milky Way as a starry band across a dark night sky? Or do you think of it as a great spiral galaxy in space? Both are correct. Both refer to our home galaxy, our local island in the vast ocean of the universe, composed of hundreds of billions of stars, one of which is our sun.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Long ago, it was possible for everybody in the world to see a dark, star-strewn sky when they looked heavenward at night, rather than the obscuring glow of city lights. In those ancient times, humans looked to the starry sky and saw a ghostly band of light arcing across the heavens, from horizon to horizon. This graceful arc of light moved across the sky with the seasons. The most casual sky-watchers could notice that parts of the band are obscured by darkness, which we now know to be vast clouds of dust.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1137"><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthskystore.org/collections/astronomy-tools/products/earthsky-lunar-calendar" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1139" instrument_node="">EarthSky lunar calendars are back in stock! A few left. Get one while you can! </span></a></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1135" instrument_node="">Myths and legends grew up in different cultures around this mysterious apparition in the heavens. Each culture explained this band of light in the sky according to its own beliefs. To the ancient Armenians, it was straw strewn across the sky by the god </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vahagn" rel="noopener" target="_blank"><span data-dcnode-id="1134" instrument_node="">Vahagn</span></a><span data-dcnode-id="1132" instrument_node="">. In eastern Asia, it was the </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Silvery River of Heaven</span></em><span data-dcnode-id="1129" instrument_node="">. The Finns and Estonians saw it as the </span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Pathway of the Birds</span></em><span data-dcnode-id="1126" instrument_node="">. Meanwhile, because western culture had become dominated by the legends and myths of first the ancient Greeks and then the Romans, it was their interpretations which were passed down to a majority of languages. Both the Greeks and the Romans saw the starry band as </span><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">a river of milk</span></em><span data-dcnode-id="1123" instrument_node="">. The Greek myth said it was milk from the breast of the goddess </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hera" rel="noopener" target="_blank"><span data-dcnode-id="1122" instrument_node="">Hera</span></a><span data-dcnode-id="1120" instrument_node="">, divine wife of Zeus. The Romans saw the river of light as milk from their goddess </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ops" rel="noopener" target="_blank"><span data-dcnode-id="1119" instrument_node="">Ops</span></a><span data-dcnode-id="1117" instrument_node="">.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">Thus it was bequeathed the name by which, today, we know that ghostly arc stretching across the sky: the </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" rel="noopener" target="_blank"><span data-dcnode-id="1113" instrument_node="">Milky Way</span></a><span data-dcnode-id="1111" instrument_node="">.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><figure aria-describedby="caption-attachment-343036" class="wp-caption alignnone" data-dcnode-id="1102" id="attachment_343036" style="width: 650px"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/08/milky-way-William-Mathe-Rocky-Mnt-Natl-Park-CO-aug15-2020-e1598265929690.jpg"><img alt="Edgewise view of the summer Milky Way in starry sky, on a dark night, between 2 rock cliffs." class="size-full wp-image-343036" data-dcnode-id="1108" height="975" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/08/milky-way-William-Mathe-Rocky-Mnt-Natl-Park-CO-aug15-2020-e1598265929690.jpg&amp;raw" width="650"></a><figcaption class="wp-caption-text" data-dcnode-id="1103" id="caption-attachment-343036"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/earthsky-community-photos/entry/32711" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1106" instrument_node="">View at EarthSky Community Photos</span></a><span data-dcnode-id="1104" instrument_node="">. | William Mathe captured this image on August 15, 2020, and wrote: “Hiked up to the top of Rocky Mountain National Park in Colorado …just below 12,000 feet. Was greeted with a raging forest fire about 10 miles to the west … hung around long enough to get a couple of snaps of the Milky Way. You can see the brown clouds of smoke hanging in the valley below the rock outcrop on which I was perched.” Thank you, William.</span></figcaption></figure><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1100" instrument_node="">When you are standing under a completely </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/stargazing" rel="noopener" target="_blank"><span data-dcnode-id="1099" instrument_node="">dark</span></a><span data-dcnode-id="1097" instrument_node="">, starry sky, away from light pollution, the Milky Way appears like a cloud across the cosmos. But that cloud betrays no clue as to what it actually </span><em data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">is.&nbsp;</span></em><span data-dcnode-id="1094" instrument_node="">Until the invention of the telescope, no human could have known the nature of the Milky Way.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1091" instrument_node="">Just point even a small telescope anywhere along its length and you will be rewarded with a beautiful sight. What appears as a cloud to the unaided eye resolves into countless millions of stars, whose distance and close relative proximity to each other do not permit us to pick them out individually with just our eyes. In the same way, a raincloud looks solid in the sky but is made up of countless water droplets. The stars of the Milky Way merge together into a single band of light. But through a telescope, we see the Milky Way for what it truly is: a spiral arm of our </span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/astronomy-essentials/definition-what-is-a-galaxy" rel="noopener" target="_blank"><span data-dcnode-id="1090" instrument_node="">galaxy.</span></a></p><span data-dcnode-id="1087" instrument_node="">
</span><figure aria-describedby="caption-attachment-317388" class="wp-caption alignnone" data-dcnode-id="1079" id="attachment_317388" style="width: 625px"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist.jpg"><img alt="Painting of circular face-on tight purple spiral with a yellow central bar." class="size-full wp-image-317388" data-dcnode-id="1086" height="352" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist.jpg&amp;raw" srcset="https://earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist.jpg 625w, https://earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist-300x169.jpg 300w, https://earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist-190x107.jpg 190w, https://earthsky.org/upl/2019/07/milky-way-bar-Gaia-artist-140x79.jpg 140w" width="625"></a><figcaption class="wp-caption-text" data-dcnode-id="1080" id="caption-attachment-317388"><span data-dcnode-id="1084" instrument_node="">We can’t get outside the Milky Way, so we have to rely on artist’s concepts, like this one, to show us how it might look. The larger orange/yellow blob in the lower part of the image is a massively glorified representation of our sun, showing its approximate location with respect to the center. Image via </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Our_Activities/Space_Science/Gaia/Gaia_starts_mapping_our_galaxy_s_bar" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1083" instrument_node="">ESA</span></a><span data-dcnode-id="1081" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">Thus we arrive at the second answer to the question of what the Milky Way is. To astronomers, it is the name given to the entire galaxy we live in, not just the part of it we see in the sky above us as that river of light. If this seems confusing, we must acknowledge the need for our galaxy to have a name. Many other galaxies are designated by catalogue numbers rather than names, for example the </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_General_Catalogue" rel="noopener" target="_blank"><span data-dcnode-id="1076" instrument_node="">New General Catalogue</span></a><span data-dcnode-id="1074" instrument_node="">, first published in 1888, which merely assigns a sequential number to each. More recent catalog numbers contain information of far more use to astronomers, for example the galaxy’s location on the sky and during which survey it was discovered. Moreover, a galaxy may appear in more than one catalog and thus possess more than one designation. For example,&nbsp;the galaxy NGC 2470 is also known as 2MFGC 6271.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">These galaxy designations are certainly unromantic, belying the dazzling beauty of the objects they are attached to. But other galaxies, particularly those brighter, closer galaxies which appear as more than just fuzzy smudges of light in a telescope, were given names by astronomers of the 17th and 18th centuries according to their appearance: the Pinwheel, the Sombrero, the Sunflower, the Cartwheel, the cigar and so forth. These names were attached to galaxies long before there were any systematic sky surveys that made it necessary to use numerical labeling systems, due to the sheer number of galaxies the surveys discovered. In time, the galaxies bearing these descriptive labels were incorporated into various catalogs, but many are still known by their names. Our own galaxy does not appear in any index of galaxies. There was, however, a need for a name to refer to it by. Thus we call it “The Milky Way” instead of “the galaxy” or “our galaxy”. So that name refers to both that river of light across the sky, which is part of our galaxy, and the galaxy as a whole. When not using the name, astronomers refer to it with a capital G (the Galaxy), and all other galaxies with a lowercase g.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><figure aria-describedby="caption-attachment-329655" class="wp-caption alignnone" data-dcnode-id="1062" id="attachment_329655" style="width: 800px"><img alt="Milky Way face-on, showing the central bar, major spiral arms, and the Orion Arm." class="size-full wp-image-329655" data-dcnode-id="1068" height="800" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way.jpg&amp;raw" srcset="https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way.jpg 800w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-300x300.jpg 300w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-150x150.jpg 150w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-768x768.jpg 768w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-640x640.jpg 640w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-190x190.jpg 190w, https://earthsky.org/upl/2020/01/Annotated-artists_impression_of_the_Milky_Way-140x140.jpg 140w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1063" id="caption-attachment-329655"><span data-dcnode-id="1067" instrument_node="">In this artist’s conception of the Milky Way, the sun’s location is shown below the central bar, at the inward side of the Orion Arm (called by its slightly dated name, the Orion Spur). The Orion Arm lies between the Sagittarius Arm and the Perseus Arm. Image via NASA/ JPL/ ESO/ R. Hurt/ </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AArtist%2527s_impression_of_the_Milky_Way_%28updated_-_annotated%29.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1066" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="1064" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1060" instrument_node="">Our solar system is located about 2/3 of the way out from the Galactic Center toward the edge of the galaxy. We are, in fact, 26,000 light years from the center, or 153,000 </span><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">trillion&nbsp;</span></em><span data-dcnode-id="1057" instrument_node="">miles (246,000 trillion km). Under the stars we can look toward the middle of the galaxy or we can look in the other direction, out toward the edge. When we look to the edge, we see a spiral arm of the Milky Way known as the </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/space/does-our-sun-reside-in-a-spiral-arm-of-the-milky-way-galaxy" rel="noopener" target="_blank"><span data-dcnode-id="1056" instrument_node="">Orion-Cygnus Arm</span></a><span data-dcnode-id="1054" instrument_node=""> (or the Orion spur): a river of light across the sky that gave rise to so many ancient myths.&nbsp; The solar system is just on the inner edge of this spiral arm. If we look in the other direction, one would naturally expect to be able to see the center of the galaxy, which is located in the constellation of Sagittarius. But unfortunately, we cannot see it. The Galactic Center is hidden from us behind vast clouds of dark gas that telescopes operating in visible light cannot see through. It is only in recent decades that astronomers have been able to pierce that dusty fog with </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_telescope" rel="noopener" target="_blank"><span data-dcnode-id="1053" instrument_node="">infrared telescopes</span></a><span data-dcnode-id="1051" instrument_node=""> to reveal what, throughout human history, has been concealed. With these new additions to astronomers’ arsenal of instruments, the study of around 100 stars at the galactic center revealed that those giant clouds of dark dust were hiding a monster: a black hole, designated </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_A%2A" rel="noopener" target="_blank"><span data-dcnode-id="1050" instrument_node="">Sagittarius A*</span></a><span data-dcnode-id="1048" instrument_node="">, with a mass four million times the mass of our sun.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><figure aria-describedby="caption-attachment-354558" class="wp-caption alignnone" data-dcnode-id="1033" id="attachment_354558" style="width: 800px"><img alt="Colorful images of thick, irregular horizontal lines, stacked on top of each other. " class="size-full wp-image-354558" data-dcnode-id="1045" height="454" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA.jpg&amp;raw" srcset="https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA.jpg 800w, https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA-300x170.jpg 300w, https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA-768x436.jpg 768w, https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA-640x363.jpg 640w, https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA-190x108.jpg 190w, https://earthsky.org/upl/2021/02/multiwavelengthMilkyWay_NASA-140x79.jpg 140w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1034" id="caption-attachment-354558"><span data-dcnode-id="1044" instrument_node="">The Milky Way as seen in different lights, that is, different </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" rel="noopener" target="_blank"><span data-dcnode-id="1043" instrument_node="">wavelengths</span></a><span data-dcnode-id="1041" instrument_node=""> of light. The most familiar view is the one seen in optical light, which is the 3rd image from the bottom. Here, most of the galaxy is obscured by gas clouds (dark areas). But look in the same direction in infrared light, and you can see through the clouds (4th, 5th and 6th image from the bottom)! </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asd.gsfc.nasa.gov/archive/mwmw/mmw_images.html" rel="noopener" target="_blank"><span data-dcnode-id="1040" instrument_node="">Read more about these images</span></a><span data-dcnode-id="1038" instrument_node="">. Image via </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asd.gsfc.nasa.gov/archive/mwmw/mmw_images.html" rel="noopener" target="_blank"><span data-dcnode-id="1037" instrument_node="">NASA</span></a><span data-dcnode-id="1035" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1031" instrument_node="">Our Milky Way galaxy is one of billions in the universe. We do not know exactly how many galaxies exist: a </span><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/startswithabang/2018/10/18/this-is-how-we-know-there-are-two-trillion-galaxies-in-the-universe/" rel="noopener" target="_blank"><span data-dcnode-id="1030" instrument_node="">modern estimate</span></a><span data-dcnode-id="1028" instrument_node=""> vastly increases previous counts to as many as 2 trillion. The Milky Way is approximately 100,000 </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/astronomy-essentials/how-far-is-a-light-year" rel="noopener" target="_blank"><span data-dcnode-id="1027" instrument_node="">light-years</span></a><span data-dcnode-id="1025" instrument_node=""> across, or 600,000 trillion miles (950,000 trillion km). We do not know its exact age, but we assume it came into being in the very early universe along with most other galaxies: within perhaps a billion years after the Big Bang. Estimates of how many stars live within the Milky Way vary quite considerably, but it seems to be somewhere between 100 billion and double that figure. Why is there so much variance? Simply because it is so difficult to count the number of stars in the galaxy from our vantage point here on Earth. Imagine being in a crowded room full of people and trying to count them without being able to move around the room. From where you are standing, all you can do is make an estimate because those people farther away from you are hidden by those closer. Neither can you even see what size and shape the room is; its walls are hidden from you by the mass of people. It’s exactly the same from our position in the galaxy.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1022" instrument_node="">It is this inability to see the structure of the Milky Way from our location inside it that meant for most of human history we did not even recognise that we live inside a galaxy in the first place. Indeed, we did not even realise what a galaxy </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">is:&nbsp;</span></em><span data-dcnode-id="1019" instrument_node="">a vast city of stars, separated from others by even vaster distances. Without telescopes, most of the other galaxies in the sky were invisible. The unaided eye can only see three of them: from the Northern Hemisphere we can see only the </span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/clusters-nebulae-galaxies/andromeda-galaxy-closest-spiral-to-milky-way" rel="noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">Andromeda galaxy</span></a><span data-dcnode-id="1016" instrument_node="">, also known as M31, which lies some two million light-years from us and which is in fact the farthest object we can see with our eyes alone, under dark skies. The skies in the Southern Hemisphere have the Small and Large </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magellanic_Clouds" rel="noopener" target="_blank"><span data-dcnode-id="1015" instrument_node="">Magellanic Clouds</span></a><span data-dcnode-id="1013" instrument_node="">, two amorphous dwarf galaxies orbiting our own. They are far larger and brighter in the sky than M31 simply because they are much closer.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><figure aria-describedby="caption-attachment-346840" class="wp-caption alignnone" data-dcnode-id="1004" id="attachment_346840" style="width: 800px"><img alt="Oblique view of a glowing spiral with fuzzy white patches out from it." class="size-large wp-image-346840" data-dcnode-id="1010" height="531" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2020/10/M31-Levay-800x531.png&amp;raw" width="800"><figcaption class="wp-caption-text" data-dcnode-id="1005" id="caption-attachment-346840"><span data-dcnode-id="1009" instrument_node="">The Andromeda Galaxy (M31) is the closest large galaxy to our Milky Way. It’s seen here with two satellite galaxies: M32 is the compact fuzzy object located to the right of the Andromeda Galaxy’s center, and M110 is the more extended nebulous object at the top left of the central galaxy’s nucleus. Image via Zolt Levay/ </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/zoltlevay/50445392043" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1008" instrument_node="">Flickr</span></a><span data-dcnode-id="1006" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1003" instrument_node="">
</span><figure aria-describedby="caption-attachment-354561" class="wp-caption alignnone" data-dcnode-id="996" id="attachment_354561" style="width: 800px"><img alt="Two irregular glowing fuzzy patches on the sky over several large telescope domes. " class="size-full wp-image-354561" data-dcnode-id="1002" height="533" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO.jpg&amp;raw" srcset="https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO.jpg 800w, https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO-300x200.jpg 300w, https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO-768x512.jpg 768w, https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO-640x426.jpg 640w, https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO-190x127.jpg 190w, https://earthsky.org/upl/2021/02/ATs_Magellanic_Clouds_paranal_ESO-140x93.jpg 140w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="997" id="caption-attachment-354561"><span data-dcnode-id="1001" instrument_node="">The Large and Small Magellanic Clouds over Paranal in Chile. These are satellite galaxies of the Milky Way and are only visible from the Southern Hemisphere. Image via the </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eso.org/public/images/ATs_Magellanic_Clouds_hires-CC/" rel="noopener" target="_blank"><span data-dcnode-id="1000" instrument_node="">European Southern Observatory</span></a><span data-dcnode-id="998" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="994" instrument_node="">Until the 1910s, the existence of other galaxies had not been observationally confirmed. Those fuzzy patches of light astronomers saw through their telescopes were long believed to be </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nebula" rel="noopener" target="_blank"><span data-dcnode-id="993" instrument_node="">nebulae</span></a><span data-dcnode-id="991" instrument_node="">, vast clouds of gas and dust close to us, and not other galaxies. But the concept of other galaxies was born </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ned.ipac.caltech.edu/level5/March02/Gordon/Gordon2.html" rel="noopener" target="_blank"><span data-dcnode-id="990" instrument_node="">earlier</span></a><span data-dcnode-id="988" instrument_node="">, in the early and mid-18th century, by Swedish philosopher and scientist </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emanuel_Swedenborg" rel="noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">Emanuel Swedenborg</span></a><span data-dcnode-id="985" instrument_node=""> and English astronomer </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Wright_%28astronomer%29" rel="noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">Thomas Wright</span></a><span data-dcnode-id="982" instrument_node="">, who apparently conceived the idea independently of each other. Building upon the work of Wright, German philosopher </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" rel="noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">Immanuel Kant</span></a><span data-dcnode-id="979" instrument_node=""> referred to galaxies as “island universes.” The first observational evidence came in 1912 by American astronomer </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vesto_Slipher" rel="noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">Vesto Slipher</span></a><span data-dcnode-id="976" instrument_node="">, who found that the spectra of the “nebulae” he measured were </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/astronomy-essentials/what-is-a-redshift" rel="noopener" target="_blank"><span data-dcnode-id="975" instrument_node="">redshifted</span></a><span data-dcnode-id="973" instrument_node=""> and thus much further away than previously thought.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="970" instrument_node="">And then, </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Hubble" rel="noopener" target="_blank"><span data-dcnode-id="969" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="967" instrument_node="">, through years of painstaking work at the Mount Wilson Observatory in California, confirmed in the 1920s that we do not live in a unique location: our galaxy is just one of perhaps trillions. Hubble came to this realization by studying a type of star known as a </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cepheid_variable" rel="noopener" target="_blank"><span data-dcnode-id="966" instrument_node="">Cepheid variable</span></a><span data-dcnode-id="964" instrument_node="">, which pulsates with a regular periodicity. The intrinsic brightness of a Cepheid variable is directly related to its pulsation period: by measuring how long it takes for the star to brighten, fade and brighten again you can calculate how </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/astronomy-essentials/stellar-luminosity-the-true-brightness-of-stars" rel="noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">bright</span></a><span data-dcnode-id="961" instrument_node=""> it is, that is to say, how much light it emits. Consequently, by observing how bright it appears from the Earth you can calculate its distance, in the same way that seeing distant car headlights at night can tell you how far away the car is from how bright its lights appear to you. You can judge the distance of the car because you know all car headlights have about the same brightness.</span></p><span data-dcnode-id="959" instrument_node="">
</span><figure aria-describedby="caption-attachment-354562" class="wp-caption alignnone" data-dcnode-id="952" id="attachment_354562" style="width: 600px"><img alt="Fuzzy cloud like blob with a bright light with lens spikes in the center. " class="size-full wp-image-354562" data-dcnode-id="958" height="589" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2021/02/RS_Puppis_Cepheid_variable_WikimediaCommons.jpg&amp;raw" srcset="https://earthsky.org/upl/2021/02/RS_Puppis_Cepheid_variable_WikimediaCommons.jpg 600w, https://earthsky.org/upl/2021/02/RS_Puppis_Cepheid_variable_WikimediaCommons-300x295.jpg 300w, https://earthsky.org/upl/2021/02/RS_Puppis_Cepheid_variable_WikimediaCommons-190x187.jpg 190w, https://earthsky.org/upl/2021/02/RS_Puppis_Cepheid_variable_WikimediaCommons-140x137.jpg 140w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="953" id="caption-attachment-354562"><span data-dcnode-id="957" instrument_node="">An example of a Cepheid Variable star is RS Puppis. It varies in brightness by almost a factor of 5 every 40 days. Image via NASA/ ESA/ </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D48277866" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="956" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="954" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">One of Edwin Hubble’s great achievements was finding Cepheid variables in M31, the Andromeda galaxy. Hunched under the eyepiece of the huge </span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Wilson_Observatory%23100-inch_Hooker_telescope" rel="noopener" target="_blank"><span data-dcnode-id="949" instrument_node="">Hooker Telescope</span></a><span data-dcnode-id="947" instrument_node=""> in the cold night air, Hubble repeatedly photographed it, eventually finding what he was seeking in that distant spiral: stars which changed in brightness over a regular period. Performing the calculations, Hubble realised that M31 is not astronomically close to us at all. It is 2 million light years away. It is a galaxy like our own, long thought to be a third as big again as the Milky Way but which is now believed to be about the same size.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">Hubble, for whom this discovery must have been a monumental shock, surmised that our galaxy was no different from M31 and the others he observed, thus relegating us to a position of lesser importance in the universe. This was as big a revelation and diminution of our position in the universe&nbsp;as when humans came to understand that the Earth is not the center of the universe: that we, along with the other planets we see, orbit the sun. We do not live in a special or privileged location. The universe does not&nbsp;</span><em data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">have</span></em><span data-dcnode-id="941" instrument_node=""> any vantage points which are superior to others. Wherever you are in the universe and you look up at the stars, you will see the same thing. Your constellations may be different, but no matter in which direction you look, you see galaxies rushing away from you in all directions as the universe expands, carrying the galaxies along with it. Until the work by Slipher and Hubble (and others), we did not know the universe was expanding and it took a surprisingly long time for this fact to be accepted by the astronomical community. Even Albert Einstein did not believe it, introducing an arbitrary correction into his Relativity calculations which would result in a static, non-expanding universe. However, Einstein later called this correction the greatest error in his career when he finally accepted that the universe is expanding.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="938" instrument_node="">Although Hubble showed us that ours is just one galaxy among perhaps trillions, this did not tell astronomers what the Milky Way would look like it if you were to see it from outside. We knew it has spiral arms: that band of light across the sky was clear evidence of that. But as to how </span><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">many</span></em><span data-dcnode-id="935" instrument_node=""> spiral arms there are, or how big the galaxy is, or how many stars inhabit it, those were questions still unanswered in the 1920s. It took most of the 20th century after Hubble’s discoveries to piece together the answers to these questions, through a combination of painstaking work with both Earth- and space-based telescopes. So if one could travel outside our galaxy, what would it look like? A standard analogy compares it to two fried eggs stuck together back-to-back. The yolk of the egg is known as the </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galactic_bulge" rel="noopener" target="_blank"><span data-dcnode-id="934" instrument_node="">Galactic Bulge</span></a><span data-dcnode-id="932" instrument_node="">, a huge globe of stars at the center extending above and below the plane of the galaxy. The Milky Way is now thought to have four spiral arms winding out from its center like the arms of a </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catherine_wheel_%28firework%29" rel="noopener" target="_blank"><span data-dcnode-id="931" instrument_node="">Catherine wheel</span></a><span data-dcnode-id="929" instrument_node="">. But these arms do not actually meet at the center: a few years ago astronomers discovered that the Milky Way is in fact a </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barred_spiral_galaxy" rel="noopener" target="_blank"><span data-dcnode-id="928" instrument_node="">barred spiral</span></a><span data-dcnode-id="926" instrument_node=""> galaxy, having a “bar” of stars running across its center, from which the spiral arms extend at either end. Barred spiral galaxies are not uncommon in the universe, so our galaxy is certainly nothing out of the ordinary. We do not yet, however, understand how that central bar forms.</span></p><span data-dcnode-id="924" instrument_node="">
</span><figure aria-describedby="caption-attachment-354767" class="wp-caption alignnone" data-dcnode-id="914" id="attachment_354767" style="width: 600px"><img alt="Horizontally stretched out glowing bulge - like a bar - with spiral arms around it. " class="size-full wp-image-354767" data-dcnode-id="923" height="658" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki.jpg&amp;raw" srcset="https://earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki.jpg 600w, https://earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki-274x300.jpg 274w, https://earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki-190x208.jpg 190w, https://earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki-140x154.jpg 140w, https://earthsky.org/upl/2021/02/NGC_7773_barredgalaxy_NASA_ESA_Wiki-300x329.jpg 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="915" id="caption-attachment-354767"><span data-dcnode-id="922" instrument_node="">This Hubble image shows galaxy NGC 7773, an example of a barred spiral galaxy thought to be similar to the Milky Way. Its bulge is stretched out into a bar-shaped structure, extending to the inner parts of the galaxy’s spiral arms. Astronomers believe a bar in the center of a galaxy is a sign of galaxy maturity. Younger spiral galaxies do not feature barred central structures as often as older spirals do. Image via ESA/Hubble, </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0" rel="noopener" target="_blank" title="Creative Commons Attribution 4.0"><span data-dcnode-id="921" instrument_node="">CC BY 4.0</span></a><span data-dcnode-id="919" instrument_node="">, </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D79436374" rel="noopener" target="_blank"><span data-dcnode-id="918" instrument_node="">Creative Commons</span></a><span data-dcnode-id="916" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="912" instrument_node="">Only two years ago, another major discovery was made: the Milky Way is not a flat disk of stars but has a “kink” running across it like an extended “S”. Something has </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia/-/milky-way-s-warp-caused-by-galactic-collision-gaia-data-suggests" rel="noopener" target="_blank"><span data-dcnode-id="911" instrument_node="">warped</span></a><span data-dcnode-id="909" instrument_node=""> the disk. At the moment the finger points at the gravitational influence of the astronomically-close </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagittarius_Dwarf_Spheroidal_Galaxy" rel="noopener" target="_blank"><span data-dcnode-id="908" instrument_node="">Sagittarius dwarf galaxy</span></a><span data-dcnode-id="906" instrument_node="">, one of perhaps twenty small galaxies that orbit the Milky Way, like moths around a flame. As the Sagittarius galaxy slowly orbits around us, its gravity has pulled on our galaxy’s stars, eventually creating the warp.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">These dwarf galaxies are not the only astronomical objects bound to our own. The Milky Way is surrounded by a halo of </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globular_cluster" rel="noopener" target="_blank"><span data-dcnode-id="902" instrument_node="">globular clusters</span></a><span data-dcnode-id="900" instrument_node="">, concentrations of stars looking like fuzzy golf balls, containing perhaps a million or so extremely ancient stars.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">It is highly probable that we will continue to make more landmark discoveries about the Milky Way. The study of its nature and origin is accelerating as new astronomical tools become available, such as the European Space Agency’s orbiting </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia" rel="noopener" target="_blank"><span data-dcnode-id="896" instrument_node="">Gaia</span></a><span data-dcnode-id="894" instrument_node=""> telescope, which is making a three-dimensional map of our galaxy’s stars with exquisite and quite unprecedented accuracy: it aims to map a billion of them. Gaia’s data allows astronomers to see where the stars are, in which direction they are moving and how fast. This incredible map is already revealing previously-unknown features of our galaxy: the discovery of the galaxy’s warp by Gaia is one such feature. It is an extremely exciting time for the study of our galaxy, and the discoveries being made are telling us so much about not just our own galaxy but other spiral galaxies as well.</span></p><span data-dcnode-id="892" instrument_node="">
</span><figure aria-describedby="caption-attachment-188736" class="wp-caption alignnone" data-dcnode-id="882" id="attachment_188736" style="width: 580px"><img alt="Star-strewn sky with Galactic band on the diagonal and a satellite telescope to the bottom right." class="size-full wp-image-188736" data-dcnode-id="891" height="415" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthsky.org/upl/2013/12/Gaia-Milky-Way.jpg&amp;raw" srcset="https://earthsky.org/upl/2013/12/Gaia-Milky-Way.jpg 580w, https://earthsky.org/upl/2013/12/Gaia-Milky-Way-300x214.jpg 300w, https://earthsky.org/upl/2013/12/Gaia-Milky-Way-190x135.jpg 190w, https://earthsky.org/upl/2013/12/Gaia-Milky-Way-140x100.jpg 140w" width="580"><figcaption class="wp-caption-text" data-dcnode-id="883" id="caption-attachment-188736"><span data-dcnode-id="890" instrument_node="">A composite image of the orbiting telescope </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/gaia" rel="noopener" target="_blank"><span data-dcnode-id="889" instrument_node="">Gaia</span></a><span data-dcnode-id="887" instrument_node="">, mapping the stars of the Milky Way. Image via </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/Science_Exploration/Space_Science/Gaia_overview" rel="noopener" target="_blank"><span data-dcnode-id="886" instrument_node="">ESA</span></a><span data-dcnode-id="884" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">It is all a far cry from when, thousands of years ago, our ancestors ascribed fantastic beasts and gods to that mysterious band of light they saw as they stood in awe under the starry sky.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Bottom line: Our galaxy, the Milky Way, is a lot more than we can see from Earth without instruments. Here, we look into the origin of the name, the structure, and the fascinating history of how our knowledge of our own galaxy has developed over the centuries and continues to develop today.</span></p><span data-dcnode-id="875" instrument_node="">

</span><div data-dcnode-id="387" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="440"><div class="comment__name clearfix" data-dcnode-id="444"><img class="comment__avatar" data-dcnode-id="449" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="446"><a data-dcnode-id="447" href=""><span data-dcnode-id="448" instrument_node="">george w iliffe jr</span></a></strong><span data-dcnode-id="445" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="441"><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">What started out for me as a five cent candy bar is today is a tremendous wonder of the universe</span></p></div></div><div class="comment__wrapper" data-dcnode-id="430"><div class="comment__name clearfix" data-dcnode-id="434"><img class="comment__avatar" data-dcnode-id="439" height="32" src="https://c.disquscdn.com/uploads/users/3436/7414/avatar92.jpg?1613887520" width="32"/><strong data-dcnode-id="436"><a data-dcnode-id="437" href=""><span data-dcnode-id="438" instrument_node="">SJBhatti</span></a></strong><span data-dcnode-id="435" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="431"><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">new language with new nomenclature is essential in astronomy to cancel errors and false speculations of the past.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="418"><div class="comment__name clearfix" data-dcnode-id="424"><img class="comment__avatar" data-dcnode-id="429" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="426"><a data-dcnode-id="427" href=""><span data-dcnode-id="428" instrument_node="">Alfred Renald</span></a></strong><span data-dcnode-id="425" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="419"><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">A) On the origin of the "Milky Way" name in Greek mythology: Heracles would happily suckle upon the nipple of Hera, but as he did so, he sucked too hard, and in pain, Hera removed the baby from her nipple. As Hera did so, the motherly milk of Hera sprayed out into the heavens, creating the Milky Way.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">B) 100,000 light years does not translate to 600,000 trillion miles as 1000 trillions is a quadrillion--so it would have another nomenclature--please check.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="408"><div class="comment__name clearfix" data-dcnode-id="412"><img class="comment__avatar" data-dcnode-id="417" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="414"><a data-dcnode-id="415" href=""><span data-dcnode-id="416" instrument_node="">AndyTheAstronomer</span></a></strong><span data-dcnode-id="413" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="409"><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Thank you Alfred. I am aware that 1000 trillion is a quadrillion, but I prefer to spell out the number in trillions because in my experience most people have no idea what a quadrillion is. I feel it more important to be able to communicate vast numbers like this in a way that people might understand rather than stick rigidly to the correct scientific or mathematical nomenclature.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="398"><div class="comment__name clearfix" data-dcnode-id="402"><img class="comment__avatar" data-dcnode-id="407" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="404"><a data-dcnode-id="405" href=""><span data-dcnode-id="406" instrument_node="">george w iliffe jr</span></a></strong><span data-dcnode-id="403" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="399"><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">What started out for me as a five cent candy bar, is today an tremendous wonder in the Universe.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="388"><div class="comment__name clearfix" data-dcnode-id="392"><img class="comment__avatar" data-dcnode-id="397" height="32" src="https://c.disquscdn.com/uploads/users/26852/4650/avatar92.jpg?1649164883" width="32"/><strong data-dcnode-id="394"><a data-dcnode-id="395" href=""><span data-dcnode-id="396" instrument_node="">Patrick X Paradis</span></a></strong><span data-dcnode-id="393" instrument_node=""> • 3 weeks ago
