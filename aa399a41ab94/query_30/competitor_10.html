</span><h2 class="post-title" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Types of Galaxies</span></h2><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="579" instrument_node="">There are four distinct types of galaxies in the universe, elliptical, spiral, barred spiral, and irregular. Although these are the four main types, there are various types of </span><span data-dcnode-id="576" style="color: #0000ff;"><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.gsfc.nasa.gov/science/objects/galaxies1.html" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="578" instrument_node="">galaxies</span></a></span><span data-dcnode-id="575" instrument_node=""> and the way in which they are classified is by their shape.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="572" instrument_node="">A galaxy is a </span><span data-dcnode-id="569" style="color: #0000ff;"><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/8tKUvuurqsY" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="571" instrument_node="">cluster of stars</span></a></span><span data-dcnode-id="568" instrument_node="">, gas, and dust that are kept together by the force of gravity. Within galaxies, there are also planets, black holes, moons, comets, and dark matter.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="565" instrument_node="">For example, the Milky Way, the solar system in which we reside, is classified as a </span><span data-dcnode-id="562" style="color: #0000ff;"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.gsfc.nasa.gov/science/objects/milkyway1.html%23%3A~%3Atext%3DThe%2520Milky%2520Way%2520is%2520a%2Cour%2520own%2520Milky%2520Way%2520Galaxy.%26text%3DThese%2520stars%2520form%2520a%2520large%2Cthe%2520suburbs%2520of%2520our%2520galaxy." rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="564" instrument_node="">barred spiral galaxy</span></a></span><span data-dcnode-id="561" instrument_node=""> because of its general spiral shape accompanied by a bar and disk of stars at the center.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="558" instrument_node="">The other general </span><span data-dcnode-id="555" style="color: #0000ff;"><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hosting.astro.cornell.edu/academics/courses/astro201/galaxies/types.htm" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="557" instrument_node="">classifications</span></a></span><span data-dcnode-id="554" instrument_node=""> of galaxies include spiral galaxies, elliptical galaxies, and irregular galaxies. This shape classification of galaxies was created by Edwin Hubble in 1926 which he laid out in a diagram called the </span><span data-dcnode-id="551" style="color: #0000ff;"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/image-feature/goddard/a-galaxy-at-the-center-of-the-hubble-tuning-fork/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="553" instrument_node="">Hubble Tuning Fork</span></a></span><span data-dcnode-id="550" instrument_node="">, because of the diagram’s resemblance in shape to a tuning fork.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546" style="text-align: center;"><img alt="types of galaxies" class="alignnone size-full wp-image-15676" data-dcnode-id="547" height="1172" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2.jpg 652w, https://astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2-303x545.jpg 303w, https://astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2-570x1024.jpg 570w, https://astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2-556x999.jpg 556w, https://astrobackyard.com/wp-content/uploads/2020/07/types-of-galaxies-2-150x270.jpg 150w" width="652"></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="544" instrument_node="">If you want to see some of the most incredible galaxy photos ever taken, be sure to visit the </span><strong data-dcnode-id="538"><span data-dcnode-id="543" instrument_node="">Hubble Space Telescope Image Archives: </span><span data-dcnode-id="540" style="color: #0000ff;"><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spacetelescope.org/images/archive/category/galaxies/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="542" instrument_node="">Galaxies</span></a></span><span data-dcnode-id="539" instrument_node="">.</span></strong></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="535" instrument_node="">Over the years I have photographed several galaxies from my backyard using my camera and telescope. To accomplish these detailed galaxy portraits, I take long-exposure images using a monochrome camera on an </span><span data-dcnode-id="532" style="color: #0000ff;"><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/equatorial-telescope-mount/" style="color: #0000ff;"><span data-dcnode-id="534" instrument_node="">equatorial telescope mount</span></a></span><span data-dcnode-id="531" instrument_node="">.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="528" instrument_node="">The following image of the </span><span data-dcnode-id="525" style="color: #0000ff;"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/m51-whirlpool-galaxy/" style="color: #0000ff;"><span data-dcnode-id="527" instrument_node="">Whirlpool Galaxy</span></a></span><span data-dcnode-id="524" instrument_node=""> is one of my favorites.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h2 data-dcnode-id="520" style="text-align: center;"><img alt="Galaxy photography" class="size-full wp-image-15536 aligncenter" data-dcnode-id="521" height="813" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/06/galaxy-photography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/06/galaxy-photography.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/06/galaxy-photography-436x545.jpg 436w" width="650"></h2><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="515" style="text-align: center;"><em data-dcnode-id="516"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">The Whirlpool Galaxy in Canes Venatici. Photo by Trevor Jones.</span></strong></em></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Spiral Galaxies</span></h2><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="510" instrument_node="">Named for their shape, spiral galaxies are the most common type of galaxy in the universe. Of all the known galaxies in the universe, 77% of them are classified as </span><span data-dcnode-id="507" style="color: #0000ff;"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cas.sdss.org/dr6/en/proj/basic/galaxies/spirals.asp" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="509" instrument_node="">spiral galaxies</span></a></span><span data-dcnode-id="506" instrument_node="">.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">These types of galaxies are classified by their 3 main components – a disk, bulge, and halo. The bulge is housed at the center of the galaxy. It is spherically shaped, and only contains old stars.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="500" instrument_node="">The disk component is both the shape of the galaxy and where new stars form in the galaxy. The halo is located on the outer edge of the galaxy. Similarly to the bulge, the halo is comprised of clusters of </span><span data-dcnode-id="497" style="color: #0000ff;"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/types-of-stars/" style="color: #0000ff;"><span data-dcnode-id="499" instrument_node="">old stars</span></a></span><span data-dcnode-id="496" instrument_node=""> which are known as globular clusters.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492" style="text-align: center;"><img alt="Triangulum Galaxy" class="alignnone size-full wp-image-15355" data-dcnode-id="493" height="625" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/05/triangulum-galaxy.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/05/triangulum-galaxy.jpg 500w, https://astrobackyard.com/wp-content/uploads/2020/05/triangulum-galaxy-436x545.jpg 436w" width="500"></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="487" style="text-align: center;"><strong data-dcnode-id="488"><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">The Triangulum Galaxy. Photo by Trevor Jones.</span></em></strong></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Typically, the new stars form at the “arms” of the disk, however, when this type of galaxy does not have arms it is referred to as lenticular, or S0.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481" style="text-align: left;"><span data-dcnode-id="482" instrument_node="">Regular or standard spiral galaxies are typically notated as S or SA. For both spiral and barred spiral galaxies, after the initial notation of the broad classification, there is a more specific classification noting the tightness of the spiral.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478" style="text-align: left;"><span data-dcnode-id="479" instrument_node="">This more specific notation is the letters ‘a’, ‘b’, ‘c’, ‘d’, and so on where ‘a’ represents the tightest spiral.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475" style="text-align: center;"><img alt="Galaxy type chart" class="alignnone size-full wp-image-15613" data-dcnode-id="476" height="596" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/galaxy-type-chart.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/07/galaxy-type-chart.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/07/galaxy-type-chart-545x500.jpg 545w" width="650"></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="465" style="text-align: center;"><em data-dcnode-id="466"><strong data-dcnode-id="467"><span data-dcnode-id="473" instrument_node="">Galaxy Type Chart (Tuning-fork-style diagram of the&nbsp;</span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_sequence" rel="noopener noreferrer" target="_blank" title="Hubble sequence"><span data-dcnode-id="472" instrument_node="">Hubble sequence</span></a><span data-dcnode-id="470" instrument_node="">) </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy_morphological_classification" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="469" instrument_node="">(Wikipedia)</span></a></strong></em></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="463" instrument_node="">There are many beautiful examples of spiral galaxies in the night sky. One of the best spiral galaxy examples in the </span><span data-dcnode-id="460" style="color: #0000ff;"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/andromeda-galaxy/" style="color: #0000ff;"><span data-dcnode-id="462" instrument_node="">Andromeda Galaxy</span></a></span><span data-dcnode-id="459" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Other than the Large and Small Magellanic clouds that are only visible from the southern hemisphere, the Andromeda Galaxy is the brightest galaxy you can see with your naked eye. To the unaided eye, this spiral galaxy appears as a smudge of light in the Andromeda constellation.&nbsp;</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="453" instrument_node="">Through </span><span data-dcnode-id="450" style="color: #0000ff;"><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/beginner-astrophotography/" style="color: #0000ff;"><span data-dcnode-id="452" instrument_node="">astrophotography</span></a></span><span data-dcnode-id="449" instrument_node="">, we can reveal much more of the galaxy structure, including the outer arms containing bright nebula regions. A camera’s sensor can record much more detail in a long-exposure image than our eyes could ever see visually.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><img alt="Andromeda Galaxy" class="size-full wp-image-14917 aligncenter" data-dcnode-id="446" height="679" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/03/andromeda-galaxy.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/03/andromeda-galaxy.jpg 450w, https://astrobackyard.com/wp-content/uploads/2020/03/andromeda-galaxy-361x545.jpg 361w" width="450"></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="440" style="text-align: center;"><em data-dcnode-id="441"><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The Andromeda Galaxy. Photo by Trevor Jones.</span></strong></em></p><span data-dcnode-id="439" instrument_node="">
</span><h2 data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Lenticular Galaxy</span></h2><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="435" instrument_node="">Briefly elaborating, </span><span data-dcnode-id="432" style="color: #0000ff;"><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomy.swin.edu.au/cosmos/s/s0%2Bgalaxy" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="434" instrument_node="">S0 galaxies</span></a></span><span data-dcnode-id="431" instrument_node=""> are like a combination between a spiral galaxy and elliptical galaxy because of the bulge and disk that they do have, like spiral galaxies, but they do not have a spiral-like structure.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="428" instrument_node="">A </span><span data-dcnode-id="425" style="color: #0000ff;"><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenticular_galaxy" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="427" instrument_node="">lenticular galaxy</span></a></span><span data-dcnode-id="424" instrument_node=""> is a type of galaxy intermediate between an elliptical galaxy and a spiral galaxy. This designation is according to the galaxy morphological </span><span data-dcnode-id="421" style="color: #0000ff;"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy_morphological_classification" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="423" instrument_node="">classification scheme</span></a></span><span data-dcnode-id="420" instrument_node="">.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Lenticular galaxies are large-scale disc galaxies that do not have large-scale spiral arms. They have minimal ongoing star formation, as they have used up or lost their interstellar matter. As shown in the Sombrero Galaxy image below, they often retain a significant amount of dust in their disks.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413" style="text-align: center;"><img alt="M104" class="alignnone size-full wp-image-15434" data-dcnode-id="414" height="624" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/05/m104.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/05/m104.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/05/m104-545x523.jpg 545w" width="650"></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="404" style="text-align: center;"><strong data-dcnode-id="405"><em data-dcnode-id="406"><span data-dcnode-id="411" instrument_node="">The </span><span data-dcnode-id="408" style="color: #0000ff;"><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/m104-sombrero-galaxy/" style="color: #0000ff;"><span data-dcnode-id="410" instrument_node="">Sombrero Galaxy</span></a></span><span data-dcnode-id="407" instrument_node="">. Photo by Trevor Jones.</span></em></strong></p><span data-dcnode-id="403" instrument_node="">
</span><h2 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Barred Spiral Galaxies</span></h2><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="399" instrument_node="">Although similar to spiral galaxies, </span><span data-dcnode-id="396" style="color: #0000ff;"><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.schoolsobservatory.org/learn/astro/gals/class/barredspiral" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="398" instrument_node="">barred spiral galaxies</span></a></span><span data-dcnode-id="395" instrument_node=""> differ in their shape slightly. Rather than just being spiraled from the nucleus like ordinary spiral galaxies, these have a ‘bar’ of matter running through them2. From the ends of this ‘bar’ the arms emerge.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">This middle bar with the two arms extended from the ends of the bar causes barred galaxies to be shaped similarly to the letter ‘S’. Other than this major difference, barred spiral galaxies and typical spiral galaxies are essentially the same. Just like typical spiral galaxies, barred spiral galaxies contain a disk, bulge, and halo.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388" style="text-align: center;"><img alt="Barred Spiral Galaxy" class="size-full wp-image-15610 aligncenter" data-dcnode-id="389" height="463" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/barred-spiral-galaxy-NASA.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/07/barred-spiral-galaxy-NASA.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/07/barred-spiral-galaxy-NASA-545x388.jpg 545w" width="650"></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="380" style="text-align: center;"><strong data-dcnode-id="381"><em data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">NGC 1300. </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apod.nasa.gov/apod/ap200611.html"><span data-dcnode-id="385" instrument_node="">NASA APOD June 11, 2020</span></a><span data-dcnode-id="383" instrument_node="">.</span></em></strong></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">According to Hubble Tuning Fork, barred spiral galaxies are notated as SB rather than just S or SA as typical spiral galaxies are. Additionally, as noted earlier, the Milky Way is a barred galaxy!</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">But this went unnoticed by astronomers for a while compared to other galaxies because of the smaller bar of the Milky Way compared to other barred galaxies.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="372" instrument_node="">Some other examples of barred galaxies include NGC 1300 and </span><span data-dcnode-id="369" style="color: #0000ff;"><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.constellation-guide.com/ngc-1365-great-barred-spiral-galaxy/" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="371" instrument_node="">NGC 1365</span></a></span><span data-dcnode-id="368" instrument_node="">.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">NGC 1300 and NGC 1365 are only 60 million light-years from Earth which is close enough to be seen by telescope.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Because of their close proximity to Earth, both of these galaxies are pieces of two different constellations. NGC 1300 is a part of the constellation Eridanus and NGC 1365 is a part of Fornax.</span></p><span data-dcnode-id="360" instrument_node="">
</span><h2 data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Elliptical Galaxies</span></h2><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="356" instrument_node="">These </span><span data-dcnode-id="353" style="color: #0000ff;"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apod.nasa.gov/apod/elliptical_galaxies.html" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="355" instrument_node="">elliptical galaxies</span></a></span><span data-dcnode-id="352" instrument_node=""> are classified by their ovular shape and lack of central bulge. In contrast to their name, however, sometimes these galaxies are rather circular.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The stars and gasses in these types of galaxies are spread fairly evenly throughout, however, the center is still the brightest area. Additionally, elliptical galaxies do not contain many new stars. Rather, these galaxies are comprised of old, low mass stars.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="346" instrument_node="">At the center of an elliptical galaxy is typically a black hole. Compared to a </span><span data-dcnode-id="343" style="color: #0000ff;"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stardate.org/radio/program/barred-spirals" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="345" instrument_node="">barred spiral</span></a></span><span data-dcnode-id="342" instrument_node=""> or typical spiral galaxy, in an elliptical galaxy there is a black hole where the bulge of old stars should be. This black hole may be part of the reason why new stars do not form often in elliptical galaxies.</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338" style="text-align: center;"><img alt="Elliptical Galaxy" class="alignnone size-full wp-image-15614" data-dcnode-id="339" height="650" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/elliptical-galaxy-hubble.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/07/elliptical-galaxy-hubble.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/07/elliptical-galaxy-hubble-545x545.jpg 545w, https://astrobackyard.com/wp-content/uploads/2020/07/elliptical-galaxy-hubble-150x150.jpg 150w, https://astrobackyard.com/wp-content/uploads/2020/07/elliptical-galaxy-hubble-50x50.jpg 50w" width="650"></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="329" style="text-align: center;"><strong data-dcnode-id="330"><em data-dcnode-id="331"><span data-dcnode-id="336" instrument_node="">NGC 3610. </span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/image-feature/goddard/hubble-views-a-young-elliptical-galaxy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="334" style="color: #0000ff;"><span data-dcnode-id="335" instrument_node="">ESA/Hubble &amp; NASA</span></span></a><span data-dcnode-id="332" instrument_node="">, Acknowledgement: Judy Schmidt </span></em></strong></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Because the central black hole of elliptical galaxies likely consumes the dust and gas necessary for new star formation, the materials necessary to make these new stars are not abundant in elliptical galaxies.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">The notation for elliptical galaxies is E. Unlike the additional spiral tightness classification of barred and typical spiral galaxies, elliptical galaxies have a more specific classification of the numbers 0 through 7.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">The 0 represents the most round elliptical galaxy and 7 means that the galaxy is very ovular.</span></p><span data-dcnode-id="319" instrument_node="">
</span><h2 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Irregular Galaxies</span></h2><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">As the name implies, irregular galaxies are all quite unique. Each irregular galaxy does not have a size or shape that is what we know as ‘regular’ or ‘normal’. These do not have any previously discussed components, such as a bulge, disk, or arms, that other galaxies are known to have.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">According to NASA, the uniqueness of irregular galaxies may be because of interactions they could have had in the past with other, neighboring galaxies.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308" style="text-align: center;"><img alt="Irregular galaxy" class="alignnone size-full wp-image-15617" data-dcnode-id="309" height="479" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/irregular-galaxy-APOD.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/07/irregular-galaxy-APOD.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/07/irregular-galaxy-APOD-545x402.jpg 545w" width="650"></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="299" style="text-align: center;"><em data-dcnode-id="300"><b data-dcnode-id="301"><span data-dcnode-id="306" instrument_node="">Irregular Galaxy NGC 55. </span><span data-dcnode-id="303" style="color: #0000ff;"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apod.nasa.gov/apod/ap180921.html" style="color: #0000ff;"><span data-dcnode-id="305" instrument_node="">NASA APOD</span></a></span><span data-dcnode-id="302" instrument_node="">, September 21, 2018. Martin Pugh.</span></b></em></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Although there is nothing typical, symmetrical, or ordinary about irregular galaxies, there are two distinct types: IrrI (Irr1) and IrrII (Irr2). IrrI tend to have regions with an abundance of hydrogen gas as well as young stars.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">In contrast, IrrII is extremely dust abundant which makes seeing the stars within this type of galaxy incredibly difficult.</span></p><span data-dcnode-id="292" instrument_node="">
</span><h2 data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Formation</span></h2><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="288" instrument_node="">Clusters and clouds of stars and dust making their way through the universe are thought to be the very beginnings of </span><span data-dcnode-id="285" style="color: #0000ff;"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//svs.gsfc.nasa.gov/11534" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="287" instrument_node="">galaxy formation</span></a></span><span data-dcnode-id="284" instrument_node="">. As these groupings make their way closer together, gravity begins to play a role.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">It is thought that once close enough, gravity will force together groups of stars and dust into a much larger entity.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277" style="text-align: center;"><img alt="galaxy formation" class="alignnone size-full wp-image-15619" data-dcnode-id="278" height="499" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/07/galaxy-formation.jpg&amp;raw" width="350"></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="269" style="text-align: center;"><strong data-dcnode-id="270"><em data-dcnode-id="271"><span data-dcnode-id="273" style="color: #0000ff;"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2DO8M1B" style="color: #0000ff;"><span data-dcnode-id="275" instrument_node="">Galaxy Formation and Evolution</span></a></span><span data-dcnode-id="272" instrument_node="">. Houjun Mo, Frank van den Bosch, Simon White.</span></em></strong></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">The way in which different types of galaxies are formed is dependent upon the interactions of each component during the original formation of the galaxy.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">For example, collisions of space masses are likely to occur which may then force certain pieces to the outer edges of the galaxy. This interaction would then potentially form the arms of a spiral galaxy.</span></p><span data-dcnode-id="262" instrument_node="">
</span><h2 data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">List of Naked Eye Galaxies</span></h2><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="258" instrument_node="">Certain galaxies are so bright that you can observe them visually with the unaided eye. This means that you do not need a telescope or binoculars to the galaxy, you just need to look up at the right time and place. </span><span data-dcnode-id="255" style="color: #0000ff;"><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/light-pollution-filters/" style="color: #0000ff;"><span data-dcnode-id="257" instrument_node="">Light pollution</span></a></span><span data-dcnode-id="254" instrument_node=""> can spoil the view, so be sure to attempt viewing these naked-eye galaxies from a dark-sky location.&nbsp;</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="251" instrument_node="">Here is a list of the </span><span data-dcnode-id="248" style="color: #0000ff;"><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_galaxies%23Naked-eye_galaxies" style="color: #0000ff;"><span data-dcnode-id="250" instrument_node="">brightest galaxies</span></a></span><span data-dcnode-id="247" instrument_node=""> you can observe with the naked-eye under clear, moonless conditions.&nbsp;</span></p><span data-dcnode-id="245" instrument_node="">
</span><ul data-dcnode-id="222"><span data-dcnode-id="244" instrument_node="">
</span><li data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Large Magellanic Cloud (Magnitude 0.9)</span></li><span data-dcnode-id="241" instrument_node="">
</span><li data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Small Magellanic Cloud (Magnitude 2.7)</span></li><span data-dcnode-id="238" instrument_node="">
</span><li data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Andromeda Galaxy (Magnitude 3.4)</span></li><span data-dcnode-id="235" instrument_node="">
</span><li data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Triangulum Galaxy (Magnitude 5.7)</span></li><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Centaurus A (Magnitude 6.84)</span></li><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Bode’s Galaxy (Magnitude 6.94)</span></li><span data-dcnode-id="226" instrument_node="">
</span><li data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Sculptor Galaxy (Magnitude 7.2)</span></li><span data-dcnode-id="223" instrument_node="">
</span></ul><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">I have personally observed the 2 brightest northern hemisphere galaxies from a dark sky location (Bortle Scale class 2). The Andromeda Galaxy and Triangulum Galaxy were noticeable “smudges” in the night sky.&nbsp;</span></p><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">In the picture below, you’ll notice the Andromeda Galaxy is visible to the upper right of the image. Although this is a long-exposure photograph, this is a useful (exaggerated) representation of what you can expect to see under pristine skies.&nbsp;</span></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213" style="text-align: center;"><img alt="nightscape photography" class="alignnone size-full wp-image-15366" data-dcnode-id="214" height="569" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/05/nightscape-photography.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/05/nightscape-photography.jpg 650w, https://astrobackyard.com/wp-content/uploads/2020/05/nightscape-photography-545x477.jpg 545w" width="650"></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="208" style="text-align: center;"><strong data-dcnode-id="209"><em data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">The Andromeda Galaxy is visible to the naked eye from a dark sky location.&nbsp;</span></em></strong></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="206" instrument_node="">Certain constellations, such as </span><span data-dcnode-id="203" style="color: #0000ff;"><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/constellation-virgo/" style="color: #0000ff;"><span data-dcnode-id="205" instrument_node="">Virgo</span></a></span><span data-dcnode-id="202" instrument_node="">, contain </span><span data-dcnode-id="199" style="color: #0000ff;"><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_galaxy_groups_and_clusters" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="201" instrument_node="">galaxy clusters</span></a></span><span data-dcnode-id="198" instrument_node="">.&nbsp;The Virgo Cluster is a galaxy cluster found in the constellations Coma Berenices and Virgo.</span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">The cluster’s center is located approximately 53.8 million light-years away from the solar system, at the center of the Virgo Supercluster, the larger cluster of galaxies that also contains the Local Group, which in turn includes the Andromeda Galaxy and the Milky Way.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="192" instrument_node="">The Virgo Cluster contains about 1300 galaxies, possibly even up to 2000. The image below highlights a particularly handsome cluster of galaxies, known as </span><span data-dcnode-id="189" style="color: #0000ff;"><a data-dcnode-id="190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/hDgTEihxkTc" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="191" instrument_node="">Markarian’s Chain</span></a></span><span data-dcnode-id="188" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184" style="text-align: center;"><img alt="Virgo cluster of galaxies" class="aligncenter wp-image-14696 size-full" data-dcnode-id="185" height="759" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrobackyard.com/wp-content/uploads/2020/03/virgo-cluster-of-galaxies.jpg&amp;raw" srcset="https://astrobackyard.com/wp-content/uploads/2020/03/virgo-cluster-of-galaxies.jpg 500w, https://astrobackyard.com/wp-content/uploads/2020/03/virgo-cluster-of-galaxies-359x545.jpg 359w" width="500"></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="179" style="text-align: center;"><em data-dcnode-id="180"><strong data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Markarian’s Chain (Trevor Jones)&nbsp;The Virgo Cluster of Galaxies.</span></strong></em></p><span data-dcnode-id="178" instrument_node="">
</span><h2 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Types of Galaxies (Video)</span></h2><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">In the following video, the author explains how galaxies are categorized according to their apparent shape. The shape of the galaxy gives astronomers clues as to the age and types of stars found within it.&nbsp;</span></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">This is an excellent summary of the different types of galaxies in the universe.</span></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="167" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="168" data-mce-fragment="1" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/B7q0Z19sKdM&amp;raw" width="560"></iframe></p><span data-dcnode-id="166" instrument_node="">
