urce data-dcnode-id="469" src="https://static.sfdict.com/content-assets/science/audio/ogg/S0645800.ogg" type="audio/ogg"><source data-dcnode-id="468" src="https://static.sfdict.com/content-assets/science/audio/mp3/S0645800.mp3" type="audio/mpeg"><source data-dcnode-id="467" src="https://static.sfdict.com/content-assets/science/audio/wav/S0645800.wav" type="audio/wav"></audio></div></div></div></div></section><hr class="headword-separator css-qxeaj1 etjs7ll0" data-dcnode-id="460"><section class="css-109x55k e1hk9ate4" data-dcnode-id="414"><div class="css-69s207 e1hk9ate3" data-dcnode-id="458"><span class="css-1b1gas3 e1hk9ate2" data-dcnode-id="459"></span></div><div class="css-10n3ydx e1hk9ate0" data-dcnode-id="415"><div class="css-geb4n4 e1q3nk1v2" data-dcnode-id="416"><span class="one-click-content css-nnyc96 e1q3nk1v1" data-dcnode-id="417"><span class="definition" data-dcnode-id="418"><span class="deftx" data-dcnode-id="452"><span class="tx" data-dcnode-id="453"><span data-dcnode-id="457" instrument_node="">A galaxy consisting of a rotating flattened disk with an ellipsoidal central bulge from which extend a pattern of two or more luminous spiral arms. Spiral galaxies range from large bulges with tightly wound arms (classified as Sa) to small bulges with loosely wound arms (classified as Sc and in some cases Sd). The majority of the mass of a spiral galaxy is contained in its bulge, made up mostly of old stars, while the arms are composed mostly of younger stars and large amounts of interstellar gas and dust. A spherical, relatively dust-free region known as a </span><span class="rich-text bold" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">galactic halo</span></span><span data-dcnode-id="454" instrument_node=""> surrounding a spiral galaxy may contain large amounts of dark matter. The Milky Way is a spiral galaxy.</span></span></span><span class="deftx" data-dcnode-id="446"><span class="tx" data-dcnode-id="447"><span data-dcnode-id="451" instrument_node="">♦ A spiral galaxy whose central bulge has the shape of a bar from whose ends the spiral arms emanate is called a </span><span class="rich-text bold" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">barred spiral galaxy</span></span><span data-dcnode-id="448" instrument_node="">. About a third of spiral galaxies have this straight or lozenge-shaped bar of stars, gas, and dust extending out from the nucleus. Barred spiral galaxies are classified similarly to regular spirals, from SBa (large bulge, tightly wound arms) to SBc (smaller bulge, looser arms). Astronomers believe that some elliptical galaxies containing hints of a bar and spiral might once have been barred spiral galaxies.</span></span></span><span class="ref ref-see" data-dcnode-id="439"><span class="ld" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node=""> See illustration at </span></span><span data-dcnode-id="443" instrument_node=""> </span><span class="kw" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">galaxy</span></span><span data-dcnode-id="440" instrument_node="">.</span></span><span class="ref ref-comp" data-dcnode-id="426"><span class="ld" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node=""> Compare </span></span><span data-dcnode-id="436" instrument_node=""> </span><span class="kw" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">elliptical galaxy</span></span><span data-dcnode-id="433" instrument_node=""> </span><span class="kw" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">irregular galaxy</span></span><span data-dcnode-id="430" instrument_node=""> </span><span class="kw" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">lenticular galaxy</span></span><span data-dcnode-id="427" instrument_node="">.</span></span><span class="ref ref-see" data-dcnode-id="419"><span class="ld" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node=""> See more at </span
