</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node=""> Beside this,  what are the similarities between spiral and elliptical galaxies?</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node=""> </span></p><span data-dcnode-id="1013" instrument_node=""> </span><span data-dcnode-id="1012" instrument_node=""> </span><span data-dcnode-id="1011" instrument_node=""> </span><span data-dcnode-id="1008" instrument_node=""> </span><span data-dcnode-id="1005" instrument_node=""> </span><span data-dcnode-id="1002" instrument_node=""> </span><span data-dcnode-id="1000" instrument_node=""> </span><span data-dcnode-id="999" instrument_node=""> </span><span data-dcnode-id="996" instrument_node=""> </span><span data-dcnode-id="993" instrument_node=""> </span><span data-dcnode-id="990" instrument_node=""> </span><span data-dcnode-id="988" instrument_node=""> </span><span data-dcnode-id="987" instrument_node=""> </span><span data-dcnode-id="984" instrument_node=""> </span><span data-dcnode-id="981" instrument_node=""> </span><span data-dcnode-id="978" instrument_node=""> </span><span data-dcnode-id="976" instrument_node=""> </span><span data-dcnode-id="975" instrument_node=""> </span><span data-dcnode-id="972" instrument_node=""> </span><span data-dcnode-id="969" instrument_node=""> </span><span data-dcnode-id="966" instrument_node=""> </span><span data-dcnode-id="964" instrument_node=""> </span><span data-dcnode-id="962" instrument_node=""> </span><table data-dcnode-id="961"><tbody data-dcnode-id="963"><tr data-dcnode-id="1001"><th data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Spiral galaxies</span></th><th data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Elliptical galaxies</span></th><th data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Irregular galaxies</span></th></tr><tr data-dcnode-id="989"><td data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Huge; contain stars, gas, and dust</span></td><td data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Huge; contain stars, gas, and dust</span></td><td data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Huge; contain stars, gas, and dust</span></td></tr><tr data-dcnode-id="977"><td data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Held together by gravity</span></td><td data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Held together by gravity</span></td><td data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Held together by gravity</span></td></tr><tr data-dcnode-id="965"><td data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Pinwheel shape (see top view of Spiral 1, above)</span></td><td data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Round-to-oval shape</span></td><td data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">No regular shape</span></td></tr></tbody></table><span data-dcnode-id="960" instrument_node=""> </span><p data-dcnode-id="959"></p><p data-dcnode-id="936"><span data-dcnode-id="958" instrument_node="">Beside above,  how are the centers of many spiral galaxies similar to many elliptical galaxies? </span><span data-dcnode-id="937"><span data-dcnode-id="938"><span data-dcnode-id="957" instrument_node="">Bith are types of </span><b data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">galaxies</span></b><span data-dcnode-id="954" instrument_node=""> that have </span><b data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">many</span></b><span data-dcnode-id="951" instrument_node=""> objects held together by gravity. </span><b data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Spiral galaxies</span></b><span data-dcnode-id="948" instrument_node=""> have lots of gas and dust which means it has younger stars. </span><b data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Elliptical galaxies</span></b><span data-dcnode-id="945" instrument_node=""> have littlr gas and dust which means it has older stars. As you can see, </span><b data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">spiral galaxies</span></b><span data-dcnode-id="942" instrument_node=""> and </span><b data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">elliptical galaxies</span></b><span data-dcnode-id="939" instrument_node=""> are very alike and diffferent.</span></span></span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node=""> Also to know,  how are spiral and elliptical galaxies different?</span></p><p data-dcnode-id="917"><span data-dcnode-id="933" instrument_node=""> </span><span data-dcnode-id="918"><span data-dcnode-id="919"><span data-dcnode-id="932" instrument_node="">(1) From </span><b data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Spiral Galaxy</span></b><span data-dcnode-id="929" instrument_node="">: Most </span><b data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">spiral galaxies</span></b><span data-dcnode-id="926" instrument_node=""> consist of a flat, rotating disk containing stars, gas and dust, and a central concentration of stars known as the bulge. An </span><b data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">elliptical galaxy</span></b><span data-dcnode-id="923" instrument_node=""> is a type of </span><b data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">galaxy</span></b><span data-dcnode-id="920" instrument_node=""> having an approximately ellipsoidal shape and a smooth, nearly featureless brightness profile.</span></span></span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">What are the characteristics of a elliptical galaxy?</span></p><p data-dcnode-id="896"><span data-dcnode-id="914" instrument_node=""> </span><span data-dcnode-id="910"><span data-dcnode-id="913" instrument_node="">General </span><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">characteristics</span></b></span><span data-dcnode-id="909" instrument_node=""> </span><span data-dcnode-id="897"><span data-dcnode-id="898"><span data-dcnode-id="908" instrument_node="">They are spherical or ovoid masses of stars, starved of star-making gases. The smallest known </span><b data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">elliptical galaxy</span></b><span data-dcnode-id="905" instrument_node=""> is about one-tenth the size of the Milky Way. The motion of stars in </span><b data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">elliptical galaxies</span></b><span data-dcnode-id="902" instrument_node=""> is predominantly radial, unlike the disks of spiral </span><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">galaxies</span></b><span data-dcnode-id="899" instrument_node="">, which are dominated by rotation.</span></span></span></p><span data-dcnode-id="895" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="894" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="893" instrument_node="">

</span><p data-dcnode-id="872"></p><div data-dcnode-id="853"><span data-dcnode-id="854"><span data-dcnode-id="855"><span data-dcnode-id="871" instrument_node="">As their name suggests, </span><b data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">elliptical galaxies</span></b><span data-dcnode-id="868" instrument_node=""> are round or oval, with stars distributed fairly uniformly throughout. They </span><b data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">have a bulge</span></b><span data-dcnode-id="865" instrument_node=""> and halo, like spiral </span><b data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">galaxies</span></b><span data-dcnode-id="862" instrument_node="">, but don't </span><b data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">have</span></b><span data-dcnode-id="859" instrument_node=""> the flat disk of stars. The stars in ellipticals tend to be older. Irregular </span><b data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">galaxies have</span></b><span data-dcnode-id="856" instrument_node=""> no identifiable shape or structure to them.</span></span></span></div><p data-dcnode-id="852"></p><span data-dcnode-id="851" instrument_node="">
