</span><div class="article-content retro-folders" data-dcnode-id="804" id="main-article"><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1476"></p><div class="quoteright" data-dcnode-id="1473" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="1474" style="padding-top:96.86%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/girlaxy_9804.jpg" border="0" class="embeddedimage" data-dcnode-id="1475" height="339" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/girlaxy_9804.jpg&amp;raw" width="350"></div></div><div class="acaptionright" data-dcnode-id="1471" style="width:350px;"><span data-dcnode-id="1472" instrument_node="">Meet the Girlaxy!</span></div><p data-dcnode-id="1470"></p><div class="indent" data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node=""> What planet are </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">you</span></em><span data-dcnode-id="1466" instrument_node=""> from?</span></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1459"><span class="ad-caption" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1460" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="1441"><em data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Milky Way and the Galaxy Girls</span></em><span data-dcnode-id="1456" instrument_node=""> was an original toyline mainly aimed at girls and developed by </span><a class="twikilink" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/LaurenFaust" title="/pmwiki/pmwiki.php/Creator/LaurenFaust"><span data-dcnode-id="1455" instrument_node="">Lauren Faust</span></a><span data-dcnode-id="1453" instrument_node=""> of </span><em data-dcnode-id="1450"><a class="twikilink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic" title="/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic"><span data-dcnode-id="1452" instrument_node="">My Little Pony: Friendship Is Magic</span></a></em><span data-dcnode-id="1449" instrument_node=""> fame. It's about </span><a class="twikilink" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification" title="/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification"><span data-dcnode-id="1448" instrument_node="">girls with a planetary theme</span></a><span data-dcnode-id="1446" instrument_node=""> (known as the Girlaxy) similar to </span><em data-dcnode-id="1443"><a class="twikilink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SailorMoon" title="/pmwiki/pmwiki.php/Franchise/SailorMoon"><span data-dcnode-id="1445" instrument_node="">Sailor Moon</span></a></em><span data-dcnode-id="1442" instrument_node=""> and their various adventures.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1440" instrument_node="">The idea of the franchise came from some homemade dolls </span><a class="twikilink" data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/LaurenFaust" title="/pmwiki/pmwiki.php/Creator/LaurenFaust"><span data-dcnode-id="1439" instrument_node="">Lauren Faust</span></a><span data-dcnode-id="1437" instrument_node=""> made in her spare time. It's important to note that these dolls are something that Lauren is very passionate about, to the point that she is almost always trying to promote them on her official </span><a class="twikilink" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/DeviantArt" title="/pmwiki/pmwiki.php/Website/DeviantArt"><span data-dcnode-id="1436" instrument_node="">DeviantArt</span></a><span data-dcnode-id="1434" instrument_node=""> </span><a class="urllink" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/"><span data-dcnode-id="1433" instrument_node="">page</span><img data-dcnode-id="1432" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1430" instrument_node=""> or on their official site. She's been trying to get an animated series based on them off the ground for years, in fact </span><em data-dcnode-id="1427"><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic" title="/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic"><span data-dcnode-id="1429" instrument_node="">Friendship is Magic</span></a></em><span data-dcnode-id="1426" instrument_node=""> may have </span><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatCouldHaveBeen" title="/pmwiki/pmwiki.php/Main/WhatCouldHaveBeen"><span data-dcnode-id="1425" instrument_node="">never happened</span></a><span data-dcnode-id="1423" instrument_node=""> if she wasn't pitching </span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Galaxy Girls</span></em><span data-dcnode-id="1420" instrument_node=""> to Hasbro in the first place.</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">The main theme of the dolls is that there are many ways to be a girl, and it encourages girls to be their own unique selves while proving that being girly isn't a synonym for being lame.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1411"><span class="ad-caption" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1412" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="1392"><span data-dcnode-id="1410" instrument_node="">The official website domains have lapsed in 2016 and been scooped up by domain squatters, but its latest archive can be visited </span><a class="urllink" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20160422105243/http%3A//milkywayandthegalaxygirls.com/"><span data-dcnode-id="1409" instrument_node="">here</span><img data-dcnode-id="1408" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1406" instrument_node="">, and the Solar Sisterhood Blog (which includes some </span><a class="twikilink" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterBlog" title="/pmwiki/pmwiki.php/Main/CharacterBlog"><span data-dcnode-id="1405" instrument_node="">in-character entries</span></a><span data-dcnode-id="1403" instrument_node=""> for the Girlaxy) can be found </span><a class="urllink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20160421025024/http%3A//www.milkywayandthegalaxygirls.com%3A80/solarsisterhoodblog/"><span data-dcnode-id="1402" instrument_node="">here</span><img data-dcnode-id="1401" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1399" instrument_node="">.</span><span class="notelabel" data-dcnode-id="1396" onclick="togglenote('note0h5at');" style="cursor: pointer;"><sup data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1394" id="note0h5at" isnote="true" onclick="togglenote('note0h5at');" style="display: none; cursor: pointer;"><span data-dcnode-id="1395" instrument_node="">This is an older section of the site, but it's up-to-date. The main site currently lacks a way to view older entries, which is why we're providing a separate link to the blog.</span></span><span data-dcnode-id="1393" instrument_node=""> Sadly, with the loss of the domains, merchandise is only available second-hand.</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1391" instrument_node="">Compare </span><em data-dcnode-id="1388"><a class="twikilink" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/PlanetaryMoe" title="/pmwiki/pmwiki.php/Webcomic/PlanetaryMoe"><span data-dcnode-id="1390" instrument_node="">Planetary Moe</span></a></em><span data-dcnode-id="1387" instrument_node="">, </span><em data-dcnode-id="1384"><a class="twikilink" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyMoon" title="/pmwiki/pmwiki.php/WesternAnimation/MyMoon"><span data-dcnode-id="1386" instrument_node="">My Moon</span></a></em><span data-dcnode-id="1383" instrument_node="">, </span><em data-dcnode-id="1380"><a class="twikilink" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Stellarscape" title="/pmwiki/pmwiki.php/Webcomic/Stellarscape"><span data-dcnode-id="1382" instrument_node="">Stellarscape</span></a></em><span data-dcnode-id="1379" instrument_node=""> and </span><em data-dcnode-id="1376"><a class="twikilink" data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Nebula" title="/pmwiki/pmwiki.php/Webcomic/Nebula"><span data-dcnode-id="1378" instrument_node="">Nebula</span></a></em><span data-dcnode-id="1375" instrument_node="">.</span></p><p data-dcnode-id="1368"><span data-dcnode-id="1373" instrument_node="">We have a forum discussion about it </span><a class="urllink" data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/posts.php%3Fdiscussion%3D13099735370A46220100%26page%3D1"><span data-dcnode-id="1372" instrument_node="">here</span><img data-dcnode-id="1371" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1369" instrument_node="">.</span></p><hr data-dcnode-id="1367"><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1361"><span class="ad-caption" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1362" id="proper-ad-tvtropes_mobile_ad_3"></div></div><h2 data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">This series provides examples of:</span></h2><ul data-dcnode-id="1110"><li data-dcnode-id="1349"><span data-dcnode-id="1358" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlliterativeList" title="/pmwiki/pmwiki.php/Main/AlliterativeList"><span data-dcnode-id="1357" instrument_node="">Alliterative List</span></a><span data-dcnode-id="1355" instrument_node="">: Moon's list of poetry in her biography does this with </span><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">six</span></em><span data-dcnode-id="1352" instrument_node=""> different letters, and the sentence starts with a seventh:</span><div class="indent" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node=""> From her melancholy moments emerge beautiful bittersweet ballads, splendid sorrowful sonnets, lovely lamentable lyrics, awesome ominous odes, ravishing regretful rhapsodies and heavyhearted haikus.</span></div></li><li data-dcnode-id="1315"><span data-dcnode-id="1348" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlliterativeTitle" title="/pmwiki/pmwiki.php/Main/AlliterativeTitle"><span data-dcnode-id="1347" instrument_node="">Alliterative Title</span></a><span data-dcnode-id="1345" instrument_node="">: Most of the girls, although not always with the first syllables.</span><ul data-dcnode-id="1316"><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node=""> Milky Way: "Starry Eyed Space Girl!"</span></li><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node=""> Venus: Interplanetary Performer!</span></li><li data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node=""> Mars: Astronomical Artist!</span></li><li data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node=""> Jupiter: Heavenly Hippie!</span></li><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node=""> The Sun: Sizzlin' Solar Sister!</span></li><li data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node=""> Uranus: Intergalactic Intellect!</span></li><li data-dcnode-id="1325"><span data-dcnode-id="1332" instrument_node=""> The Moon: "Lunar Lyricist". </span><a class="urllink" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20160316010438im_/http%3A//www.milkywayandthegalaxygirls.com/MW%2520pitchbook_1_7_1012.jpg"><span data-dcnode-id="1331" instrument_node="">Hers</span><img data-dcnode-id="1330" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">◊</span></small><span data-dcnode-id="1326" instrument_node=""> lacks an exclamation mark.</span></li><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node=""> Saturn: Deep Space DJ!</span></li><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node=""> Pluto's is defied, as "Cosmic Rocker!".</span></li><li data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node=""> Also Mercury: "Universal Athlete!"</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node=""> And Neptune: Celestial Surfer Girl!</span></li></ul></li><li data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousGender" title="/pmwiki/pmwiki.php/Main/AmbiguousGender"><span data-dcnode-id="1313" instrument_node="">Ambiguous Gender</span></a><span data-dcnode-id="1311" instrument_node="">: It's been left unclear as to whether </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1310" instrument_node="">Black Hole</span></a><span data-dcnode-id="1308" instrument_node=""> is male or female.</span></li><li data-dcnode-id="1292"><span data-dcnode-id="1306" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimatedAdaptation" title="/pmwiki/pmwiki.php/Main/AnimatedAdaptation"><span data-dcnode-id="1305" instrument_node="">Animated Adaptation</span></a><span data-dcnode-id="1303" instrument_node="">: Currently only these promos; </span><em data-dcnode-id="1299"><a class="urllink" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D9DYixlKOtQw"><span data-dcnode-id="1302" instrument_node="">Meet Milky Way and the Galaxy Girls</span><img data-dcnode-id="1301" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1298" instrument_node=""> and </span><em data-dcnode-id="1294"><a class="urllink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrA6F-tba2WY"><span data-dcnode-id="1297" instrument_node="">Chibis In Space</span><img data-dcnode-id="1296" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1293" instrument_node="">.</span></li><li data-dcnode-id="1288"><span data-dcnode-id="1291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Animesque" title="/pmwiki/pmwiki.php/Main/Animesque"><span data-dcnode-id="1290" instrument_node="">Animesque</span></a></li><li data-dcnode-id="1279"><span data-dcnode-id="1287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification" title="/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification"><span data-dcnode-id="1286" instrument_node="">Anthropomorphic Personification</span></a><span data-dcnode-id="1284" instrument_node="">: The physical planets still exist though, judging from </span><a class="urllink" data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/journal/Dancin-amp-039-to-the-Beat-Boards-240439331"><span data-dcnode-id="1283" instrument_node="">this</span><img data-dcnode-id="1282" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1280" instrument_node="">.</span></li><li data-dcnode-id="1274"><span data-dcnode-id="1278" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BareYourMidriff" title="/pmwiki/pmwiki.php/Main/BareYourMidriff"><span data-dcnode-id="1277" instrument_node="">Bare Your Midriff</span></a><span data-dcnode-id="1275" instrument_node="">: About half of the girls.</span></li><li data-dcnode-id="1270"><span data-dcnode-id="1273" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatmanCanBreatheInSpace" title="/pmwiki/pmwiki.php/Main/BatmanCanBreatheInSpace"><span data-dcnode-id="1272" instrument_node="">Batman Can Breathe in Space</span></a></li><li data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheMask" title="/pmwiki/pmwiki.php/Main/BeneathTheMask"><span data-dcnode-id="1268" instrument_node="">Beneath the Mask</span></a><span data-dcnode-id="1266" instrument_node="">: Pluto's official description is "Don't let her attitude fool you. Beneath her hard-rock exterior lies a heart of gold, and a true friend who's always ready to stick up for her gal pals—with brute force."</span></li><li data-dcnode-id="1253"><span data-dcnode-id="1264" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1263" instrument_node="">Big Bad</span></a><span data-dcnode-id="1261" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/LaurenFaust" title="/pmwiki/pmwiki.php/Creator/LaurenFaust"><span data-dcnode-id="1260" instrument_node="">Lauren Faust</span></a><span data-dcnode-id="1258" instrument_node=""> mentioned that an animated excursion starring MWGG would have her going up against Black Hole:</span><div class="indent" data-dcnode-id="1254"><span data-dcnode-id="1257" instrument_node=""> Milky Way’s joy in life is to explore her realm, meet new friends and find adventure. While visiting our Solar System for the very first time, Milky comes across a beautiful, small planetoid. But when she touches it, it shatters into 11 pieces, releasing the villain who was imprisoned inside, the massively destructive and terrifying BLACK HOLE!!! </span><br data-dcnode-id="1256"><span data-dcnode-id="1255" instrument_node="">Milky must find the pieces of the planetoid and re-imprison this threat to the known universe, but the fragments have been hurled to each of the planets of the star system that surrounds her. As she searches for them, she meets each and every one of the Galaxy Girls, and each girl must use her unique talents to help Milky retrieve the fragments and save the Universe from being sucked in and devoured by Black Hole’s evil vortex!</span></div></li><li data-dcnode-id="1239"><span data-dcnode-id="1252" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardiovascularLove" title="/pmwiki/pmwiki.php/Main/CardiovascularLove"><span data-dcnode-id="1251" instrument_node="">Cardiovascular Love</span></a><span data-dcnode-id="1249" instrument_node="">: Venus, who has </span><a class="twikilink" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeartSymbol" title="/pmwiki/pmwiki.php/Main/HeartSymbol"><span data-dcnode-id="1248" instrument_node="">Heart-symbol-shaped</span></a><span data-dcnode-id="1246" instrument_node=""> earring pendants, more such hearts on her clothing, and a few of them scattered on the right side of her </span><a class="urllink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20160414084053im_/http%3A//www.milkywayandthegalaxygirls.com/MW%2520pitchbook_1_7_106.jpg"><span data-dcnode-id="1245" instrument_node="">bio image</span><img data-dcnode-id="1244" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">◊</span></small><span data-dcnode-id="1240" instrument_node="">, whose meaning is this trope, by inference, as Venus is the Roman Goddess of Love, although no such mention appears on her bio description.</span></li><li data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CastOfPersonifications" title="/pmwiki/pmwiki.php/Main/CastOfPersonifications"><span data-dcnode-id="1237" instrument_node="">Cast of Personifications</span></a><span data-dcnode-id="1235" instrument_node="">: The premise is personifying the solar system as a diverse group of teen girls who wear roller skates, though the physical planets still exist.</span></li><li data-dcnode-id="1218"><span data-dcnode-id="1233" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterBlog" title="/pmwiki/pmwiki.php/Main/CharacterBlog"><span data-dcnode-id="1232" instrument_node="">Character Blog</span></a><span data-dcnode-id="1230" instrument_node="">: Some of the </span><a class="urllink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.milkywayandthegalaxygirls.com/solarsisterhoodblog/"><span data-dcnode-id="1229" instrument_node="">Solar Sisterhood Blog</span><img data-dcnode-id="1228" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1226" instrument_node=""> entries are written by </span><a class="twikilink" data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewAgeRetroHippie" title="/pmwiki/pmwiki.php/Main/NewAgeRetroHippie"><span data-dcnode-id="1225" instrument_node="">Jupiter</span></a><span data-dcnode-id="1223" instrument_node=""> (and </span><a class="urllink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//milkywayandthegalaxygirls.com/the-sun-says-%253C%21--E2--%253E80%259Clook-at-me%253C%21--E2--%253E80%259D"><span data-dcnode-id="1222" instrument_node="">one of them</span><img data-dcnode-id="1221" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1219" instrument_node=""> by The Sun).</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1217" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterNameAndTheNounPhrase" title="/pmwiki/pmwiki.php/Main/CharacterNameAndTheNounPhrase"><span data-dcnode-id="1216" instrument_node="">Character Name and the Noun Phrase</span></a></li><li data-dcnode-id="1206"><span data-dcnode-id="1213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CloudCuckoolander" title="/pmwiki/pmwiki.php/Main/CloudCuckoolander"><span data-dcnode-id="1212" instrument_node="">Cloud Cuckoolander</span></a><span data-dcnode-id="1210" instrument_node="">: Mars is, as the website quotes, "a true </span><a class="twikilink" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustForPun" title="/pmwiki/pmwiki.php/Main/JustForPun"><span data-dcnode-id="1209" instrument_node="">space cadet</span></a><span data-dcnode-id="1207" instrument_node="">."</span></li><li data-dcnode-id="1187"><span data-dcnode-id="1205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClusterBleepBomb" title="/pmwiki/pmwiki.php/Main/ClusterBleepBomb"><span data-dcnode-id="1204" instrument_node="">Cluster Bleep-Bomb</span></a><span data-dcnode-id="1202" instrument_node="">: From </span><a class="urllink" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20160309183601/http%3A//www.milkywayandthegalaxygirls.com/solarsisterhoodblog/%3Fp%3D26"><span data-dcnode-id="1201" instrument_node="">the Solar Sisterhood Blog</span><img data-dcnode-id="1200" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1198" instrument_node="">, after </span><a class="twikilink" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlutoIsExpendable" title="/pmwiki/pmwiki.php/Main/PlutoIsExpendable"><span data-dcnode-id="1197" instrument_node="">Pluto's demotion to dwarf planet</span></a><span data-dcnode-id="1195" instrument_node="">:</span><div class="indent" data-dcnode-id="1188"><span data-dcnode-id="1194" instrument_node=""> The last to see Pluto before her disappearance was Mars, who relayed her experience to us: </span><span data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">“I heard a little of what she was saying to herself and I think she said– and this may not be an exact quote– but she said ‘Those &amp;*%!* scientists can %$#@!! If they think they can *&amp;%@# change my %$#* status, they got another &amp;*%%# thing coming! I never wanted to be a &amp;*%@# planet anyway, planets are &amp;*%%#. Who needs those $%##@s anyway!’”</span></span><span data-dcnode-id="1191" instrument_node=""> Mars continues, </span><span data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">“and then I think she said ‘ #@@*’ and ‘&amp;&amp;*%@’ and ‘##$% **&amp;% &amp;##@@, **@#%$$!!!!’ But really I can’t be sure.”</span></span></div></li><li data-dcnode-id="1139"><span data-dcnode-id="1186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColorCodedCharacters" title="/pmwiki/pmwiki.php/Main/ColorCodedCharacters"><span data-dcnode-id="1185" instrument_nod D26"><span data-dcnode-id="1018" instrument_node="">after her demotion</span><img data-dcnode-id="1017" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1015" instrument_node="">. As a commenter put it:</span><div class="indent" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">She seems like someone who would say “Don’t worry, statistics show that most people who go through a hard breakup eventually get over it with the help of counseling” and say it with such sincerity that you can’t hate her.</span></div></li></ul><ul data-dcnode-id="1000"><li data-dcnode-id="1001"><span data-dcnode-id="1008" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveGoddess" title="/pmwiki/pmwiki.php/Main/LoveGoddess"><span data-dcnode-id="1007" instrument_node="">Love Goddess</span></a><span data-dcnode-id="1005" instrument_node="">: Venus, by inference, with her symbol being the </span><a class="twikilink" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeartSymbol" title="/pmwiki/pmwiki.php/Main/HeartSymbol"><span data-dcnode-id="1004" instrument_node="">Heart Symbol</span></a><span data-dcnode-id="1002" instrument_node="">, but nothing in her bio text is about her being a love goddess.</span></li></ul><ul data-dcnode-id="854"><li data-dcnode-id="991"><span data-dcnode-id="997" instrument_node=""> </span><a class="twikilink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoodSwinger" title="/pmwiki/pmwiki.php/Main/MoodSwinger"><span data-dcnode-id="996" instrument_node="">Mood-Swinger</span></a><span data-dcnode-id="994" instrument_node="">: Moon:</span><div class="indent" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node=""> The Moon's emotions change as surely as the tides. They ebb and flow, wax and wane. [...] her mood swings can be unpredictable</span></div></li><li data-dcnode-id="986"><span data-dcnode-id="990" instrument_node=""> </span><a class="twikilink" data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewAgeRetroHippie" title="/pmwiki/pmwiki.php/Main/NewAgeRetroHippie"><span data-dcnode-id="989" instrument_node="">New-Age Retro Hippie</span></a><span data-dcnode-id="987" instrument_node="">: Jupiter has traits of this.</span></li><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrphanedSeries" title="/pmwiki/pmwiki.php/Main/OrphanedSeries"><span data-dcnode-id="984" instrument_node="">Orphaned Series</span></a><span data-dcnode-id="982" instrument_node="">: Since the main website domains lapsed, this seems to be the case.</span></li><li data-dcnode-id="976"><span data-dcnode-id="980" instrument_node=""> </span><a class="twikilink" data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeekABangs" title="/pmwiki/pmwiki.php/Main/PeekABangs"><span data-dcnode-id="979" instrument_node="">Peek-a-Bangs</span></a><span data-dcnode-id="977" instrument_node="">: Venus.</span></li><li data-dcnode-id="971"><span data-dcnode-id="975" instrument_node=""> </span><a class="twikilink" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PerkyGoth" title="/pmwiki/pmwiki.php/Main/PerkyGoth"><span data-dcnode-id="974" instrument_node="">Perky Goth</span></a><span data-dcnode-id="972" instrument_node="">: Pluto.</span></li><li data-dcnode-id="966"><span data-dcnode-id="970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PinkMeansFeminine" title="/pmwiki/pmwiki.php/Main/PinkMeansFeminine"><span data-dcnode-id="969" instrument_node="">Pink Means Feminine</span></a><span data-dcnode-id="967" instrument_node="">: Pink-clad Venus is by far the most feminine of the Galaxy Girls.</span></li><li data-dcnode-id="949"><span data-dcnode-id="965" instrument_node=""> </span><a class="twikilink" data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlutoIsExpendable" title="/pmwiki/pmwiki.php/Main/PlutoIsExpendable"><span data-dcnode-id="964" instrument_node="">Pluto Is Expendable</span></a><span data-dcnode-id="962" instrument_node="">: Pluto reacts to her demotion </span><a class="urllink" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/art/Pluto-s-reaction-38604464"><span data-dcnode-id="961" instrument_node="">here</span><img data-dcnode-id="960" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="958" instrument_node="">, </span><a class="urllink" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/art/Dwarf-Planet-THIS-214470591"><span data-dcnode-id="957" instrument_node="">here</span><img data-dcnode-id="956" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="954" instrument_node="">, and </span><a class="urllink" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20160309183601/http%3A//www.milkywayandthegalaxygirls.com/solarsisterhoodblog/%3Fp%3D26"><span data-dcnode-id="953" instrument_node="">here</span><img data-dcnode-id="952" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="950" instrument_node="">.</span></li><li data-dcnode-id="944"><span data-dcnode-id="948" instrument_node=""> </span><a class="twikilink" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RapunzelHair" title="/pmwiki/pmwiki.php/Main/RapunzelHair"><span data-dcnode-id="947" instrument_node="">Rapunzel Hair</span></a><span data-dcnode-id="945" instrument_node="">: Jupiter, Pluto, Saturn, Moon, and Milky Way to a lesser extent.</span></li><li data-dcnode-id="939"><span data-dcnode-id="943" instrument_node=""> </span><a class="twikilink" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedEyesTakeWarning" title="/pmwiki/pmwiki.php/Main/RedEyesTakeWarning"><span data-dcnode-id="942" instrument_node="">Red Eyes, Take Warning</span></a><span data-dcnode-id="940" instrument_node="">: Eris.</span></li><li data-dcnode-id="934"><span data-dcnode-id="938" instrument_node=""> </span><a class="twikilink" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RockTrio" title="/pmwiki/pmwiki.php/Main/RockTrio"><span data-dcnode-id="937" instrument_node="">Rock Trio</span></a><span data-dcnode-id="935" instrument_node="">: Pluto, Ceres, and Eris form a band called Pluto and the Dwarf Planets. Pluto is the guitarist, Ceres is the bassist, and Eris is the drummer.</span></li><li data-dcnode-id="929"><span data-dcnode-id="933" instrument_node=""> </span><a class="twikilink" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RollerbladeGood" title="/pmwiki/pmwiki.php/Main/RollerbladeGood"><span data-dcnode-id="932" instrument_node="">Rollerblade Good</span></a><span data-dcnode-id="930" instrument_node="">: All the girls wear roller skates. Rather confusingly, so does Neptune...who also spends a lot of time on a surfboard.</span></li><li data-dcnode-id="924"><span data-dcnode-id="928" instrument_node=""> </span><a class="twikilink" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RuleOfCute" title="/pmwiki/pmwiki.php/Main/RuleOfCute"><span data-dcnode-id="927" instrument_node="">Rule of Cute</span></a><span data-dcnode-id="925" instrument_node="">: How do these girls travel the cosmos on their roller skates alone? Who cares?! Lauren Faust thought it'd be cute. (That and the fact that Jupiter's animals need only a helmet and rocket boosters to travel safely.)</span></li><li data-dcnode-id="904"><span data-dcnode-id="923" instrument_node=""> </span><a class="twikilink" data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SailorSenshiSendUp" title="/pmwiki/pmwiki.php/Main/SailorSenshiSendUp"><span data-dcnode-id="922" instrument_node="">Sailor Senshi Send-Up</span></a><span data-dcnode-id="920" instrument_node="">: The series, which is </span><a class="twikilink" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InspiredBy" title="/pmwiki/pmwiki.php/Main/InspiredBy"><span data-dcnode-id="919" instrument_node="">Inspired by…</span></a><span data-dcnode-id="917" instrument_node=""> </span><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Sailor Moon</span></em><span data-dcnode-id="914" instrument_node="">, stars </span><a class="twikilink" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification" title="/pmwiki/pmwiki.php/Main/AnthropomorphicPersonification"><span data-dcnode-id="913" instrument_node="">Anthropomorphic Personifications</span></a><span data-dcnode-id="911" instrument_node=""> of celestial beings. Milky Way is the equivalent of fifteen years old and is a plucky, adventurous blonde girl. The story of the toy-line revolves around Milky Way assembling a team of planet-based </span><a class="twikilink" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalGirl" title="/pmwiki/pmwiki.php/Main/MagicalGirl"><span data-dcnode-id="910" instrument_node="">Magical Girls</span></a><span data-dcnode-id="908" instrument_node=""> to combat a </span><a class="twikilink" data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="907" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="905" instrument_node="">, the Black Hole, that she accidentally released.</span></li><li data-dcnode-id="899"><span data-dcnode-id="903" instrument_node=""> </span><a class="twikilink" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SassyBlackWoman" title="/pmwiki/pmwiki.php/Main/SassyBlackWoman"><span data-dcnode-id="902" instrument_node="">Sassy Black Woman</span></a><span data-dcnode-id="900" instrument_node="">: Sun.</span></li><li data-dcnode-id="894"><span data-dcnode-id="898" instrument_node=""> </span><a class="twikilink" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="897" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="895" instrument_node="">: Black Hole, as mentioned above.</span></li><li data-dcnode-id="886"><span data-dcnode-id="893" instrument_node=""> </span><a class="twikilink" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShesGotLegs" title="/pmwiki/pmwiki.php/Main/ShesGotLegs"><span data-dcnode-id="892" instrument_node="">She's Got Legs</span></a><span data-dcnode-id="890" instrument_node="">: Not for any real </span><a class="twikilink" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fanservice" title="/pmwiki/pmwiki.php/Main/Fanservice"><span data-dcnode-id="889" instrument_node="">fanservice</span></a><span data-dcnode-id="887" instrument_node="">, but about half of the girls wear shorts or short skirts.</span></li><li data-dcnode-id="881"><span data-dcnode-id="885" instrument_node=""> </span><a class="twikilink" data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShownTheirWork" title="/pmwiki/pmwiki.php/Main/ShownTheirWork"><span data-dcnode-id="884" instrument_node="">Shown Their Work</span></a><span data-dcnode-id="882" instrument_node="">: They actually use the correct pronunciation of Uranus.</span></li><li data-dcnode-id="862"><span data-dcnode-id="880" instrument_node=""> </span><a class="twikilink" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SiblingYinYang" title="/pmwiki/pmwiki.php/Main/SiblingYinYang"><span data-dcnode-id="879" instrument_node="">Sibling Yin-Yang</span></a><span data-dcnode-id="877" instrument_node="">: No-nonsense bookworm Uranus and </span><a class="twikilink" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurferDude" title="/pmwiki/pmwiki.php/Main/SurferDude"><span data-dcnode-id="876" instrument_node="">Surfer Dudette</span></a><span data-dcnode-id="874" instrument_node=""> Neptune. Bonus points in that they're twins. </span><span class="notelabel" data-dcnode-id="871" onclick="togglenote('note1ny56');" style="cursor: pointer;"><sup data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="863" id="note1ny56" isnote="true" onclick="togglenote('note1ny56');" style="display: none; cursor: pointer;"><span data-dcnode-id="870" instrument_node=""> Possible </span><a class="twikilink" data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="869" instrument_node="">Shout-Out</span></a><span data-dcnode-id="867" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSkyIsAnOcean" title="/pmwiki/pmwiki.php/Main/TheSkyIsAnOcean"><span data-dcnode-id="866" instrument_node="">The Sky Is an Ocean</span></a><span data-dcnode-id="864" instrument_node="">, since their namesakes were gods of sky and ocean, respectively. </span></span></li><li data-dcnode-id="855"><span data-dcnode-id="861" instrument_node=""> </span><a class="twikilink" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SilkHidingSteel" title="/pmwiki/pmwiki.php/Main/SilkHidingSteel"><span data-dcnode-id="860" instrument_node="">Silk Hiding Steel</span></a><span data-dcnode-id="858" instrument_node="">: Venus seems to be characterized as this, if this bit from her profile on the official site is any indication:</span><div class="indent" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">"As [Venus] moves across the sky, one cannot take one's eyes off of this heavenly body—but a pretty face is not all this Evening Star has to offer! It takes a disciplined and controlled mind and immeasurable strength to master these moves, and Venus has the brains and the brawn to do it!"</span></div></li></ul><ul data-dcnode-id="808"><li data-dcnode-id="848"><span data-dcnode-id="852" instrument_node=""> </span><a class="twikilink" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicolorEyes" title="/pmwiki/pmwiki.php/Main/TechnicolorEyes"><span data-dcnode-id="851" instrument_node="">Technicolor Eyes</span></a><span data-dcnode-id="849" instrument_node="">: Mars has green and pink eyes.</span></li><li data-dcnode-id="843"><span data-dcnode-id="847" instrument_node=""> </span><a class="twikilink" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tomboy" title="/pmwiki/pmwiki.php/Main/Tomboy"><span data-dcnode-id="846" instrument_node="">Tomboy</span></a><span data-dcnode-id="844" instrument_node="">: Mercury and Pluto; Neptune and Saturn to a lesser extent.</span></li><li data-dcnode-id="832"><span data-dcnode-id="842" instrument_node=""> </span><a class="twikilink" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UranusIsShowing" title="/pmwiki/pmwiki.php/Main/UranusIsShowing"><span data-dcnode-id="841" instrument_node="">Uranus Is Showing</span></a><span data-dcnode-id="839" instrument_node="">: From the official website comes this gem:</span><div class="indent" data-dcnode-id="833"><span data-dcnode-id="838" instrument_node="">"Uranus is very particular about the way you pronounce her name. She would like you to know that the proper, scientific pronunciation of her name is: YOOR-en-us. </span><img class="ymmv1 rounded" data-dcnode-id="837" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/SugarWiki/FunnyMoments" title="/pmwiki/pmwiki.php/SugarWiki/FunnyMoments"><span data-dcnode-id="836" instrument_node="">No other pronunciation is acceptable</span></a><span data-dcnode-id="834" instrument_node="">."</span></div></li><li data-dcnode-id="822"><span data-dcnode-id="831" instrument_node=""> </span><a class="twikilink" data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VisualPun" title="/pmwiki/pmwiki.php/Main/VisualPun"><span data-dcnode-id="830" instrument_node="">Visual Pun</span></a><span data-dcnode-id="828" instrument_node="">:</span><ul data-dcnode-id="823"><li data-dcnode-id="826"><span data-dcnode-id="827" instrument_node=""> Saturn wears a lot of rings and hoops.</span></li><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node=""> Milky Way is literally "starry-eyed."</span></li></ul></li><li data-dcnode-id="809"><span data-dcnode-id="821" instrument_node=""> </span><a class="twikilink" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhenSheSmiles" title="/pmwiki/pmwiki.php/Main/WhenSheSmiles"><span data-dcnode-id="820" instrument_node="">When She Smiles</span></a><span data-dcnode-id="818" instrument_node="">: Moon, as seen </span><a class="urllink" data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/gallery/%3Foffset%3D72%23/dwy05g"><span data-dcnode-id="817" instrument_node="">here</span><img data-dcnode-id="816" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="814" instrument_node=""> and </span><a class="urllink" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fyre-flye.deviantart.com/gallery/%3Foffset%3D72%23/dwy08h"><span data-dcnode-id="813" instrument_node="">here</span><img data-dcnode-id="812" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="810" instrument_node="">.</span></li></ul><hr data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">
