</span><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">While many families flock to O’ahu or </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/things-to-do-maui-with-kids/"><span data-dcnode-id="939" instrument_node="">Maui</span></a><span data-dcnode-id="937" instrument_node=""> on their Hawaiian vacation, savvy family travelers know that the lower key vibe of Hawaii’s Big Island can offer just the R&amp;R they seek. My husband’s family has been vacationing on the Big Island of Hawaii on the Kohala Coast since he was a child. When I joined the family nearly 15 years ago, it quickly became the Hawaiian island destination I visited most.</span></p><span data-dcnode-id="935" instrument_node="">

</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">We recently returned from a full week of travel to the Big Island with our two kids. Although our daughter had been twice before, this was our 5 year old son’s first visit to the Big Island. I decided it’s long overdue for me to share a decade and a half’s knowledge about this magnificent island destination with Trips With Tykes readers!</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Here are all the essentials you need to know when planning a trip to the Big Island of Hawaii with kids – from what to do to where to stay, with lots of tips in between!</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="914"><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">(Trips With Tykes uses affiliate links which means I may earn a small commission if you purchase through links in this post. See our full disclosure policy linked in the menu at the bottom of this site.)</span></em></p><span data-dcnode-id="913" instrument_node="">
</span><h2 data-dcnode-id="911" id="flying-to-hawaii-s-big-island"><span data-dcnode-id="912" instrument_node="">Flying to Hawaii’s Big Island</span></h2><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Unlike Oahu and Maui, the Big Island can be a Hawaiian destination that can be a bit harder to reach, especially for East Coasters. Every time we have been, Californians and other West Coasters seem to make up the majority of the clientele. With non-stop flights from every major California airport and West Coast cities like SEA and PDX, this is no surprise. There are no non-stops from even Chicago or New York airports, so travelers from the rest of the country are going to need to connect somewhere to get to the Big Island. But I promise that a connection is well worth it.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">There are two commercial airports on the Big Island. Visitors from the mainland will almost always arrive into Ellison Onizuka Kona International Airport at Keahole (KOA or often just “Kona Airport”). The other airport, Hilo International (ITO) is served from LAX only and mostly receives inter-island flights. KOA is served from the United States by United, American, Alaska, Hawaiian, and Delta. Look for </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/southwest-airlines-hawaii-flights/"><span data-dcnode-id="905" instrument_node="">Southwest Airlines to start its Hawaii flights</span></a><span data-dcnode-id="903" instrument_node="">&nbsp;later in 2019.</span></p><span data-dcnode-id="901" instrument_node="">
</span><div class="wp-block-image size-full wp-image-9493" data-dcnode-id="888"><figure class="aligncenter" data-dcnode-id="889"><noscript data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">&lt;img loading="lazy" width="800" height="600" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg" alt="Hawaii Big Island with Kids - Kona Airport Open Air" class="wp-image-9493" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-300x225.jpg 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-768x576.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9493" data-dcnode-id="892"><img alt="Hawaii Big Island with Kids - Kona Airport Open Air" class="lazyload" data-dcnode-id="898" data-pin-description="Hawaii Big Island with Kids - Kona Airport Open Air" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-300x225.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-768x576.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg.webp&amp;raw" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-300x225.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kona-Airport-Open-Air-768x576.jpg.webp 768w" style="" width="800"><span class="dpsp-pin-it-overlay" data-dcnode-id="897"></span><a aria-label="Pin This" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fwp-content%252Fuploads%252F2019%252F02%252FHawaii-Big-Island-with-Kids-Kona-Airport-Open-Air.jpg%26url%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fhawaii-big-island-with-kids%252F%26is_video%3Dfalse%26description%3DHawaii%2520Big%2520Island%2520with%2520Kids%2520-%2520Kona%2520Airport%2520Open%2520Air" rel="noopener" target="_blank" title="Pin This"><span class="dpsp-network-icon" data-dcnode-id="894"><svg data-dcnode-id="895" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="896"></path></svg></span></a></div><figcaption data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Open air layout of KOA Airport.</span></figcaption></figure></div><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">KOA is an open air airport and the weather is quite warm year round. I recommend dressing in layers on your flight so you can switch into your island attire and be comfortable upon landing. All the major car rental companies are accessible via shuttle service and very close by. Weekly car rentals at KOA can be fairly inexpensive. My family uses Autoslash to look for deals, but often find great rates with Costco Travel, which enables us to have an additional driver included at no extra cost (and for those of you who have kids of car seat age, remember the </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/why-hertz-car-rentals-may-be-a-good-fit-for-your-family/"><span data-dcnode-id="885" instrument_node="">free car seat AAA membership benefit with Hertz</span></a><span data-dcnode-id="883" instrument_node="">!).</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Uber or Lyft were only just allowed to operate at KOA for pickups as of February 1, 2019. But there’s no indication there are enough ride share drivers on the island to make this a viable ground transportation option at all. Plan on using a cab or pre-booked hotel shuttle if you don’t rent a car.</span></p><span data-dcnode-id="878" instrument_node="">
</span><h2 data-dcnode-id="876" id="big-island-geography-basics"><span data-dcnode-id="877" instrument_node="">Big Island Geography &amp; Basics</span></h2><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The Big Island is the newest of the Hawaiian islands, with much more ongoing volcanic activity and lots of newer lava flows. Flying into KOA, you’ll spot little but black rock. Many a visitor’s hopes and dreams of a vacation on a lush tropical island have been dashed by this first look. Even the drive away from the airport looks barren. But never fear. The resorts are tropical oases in a sea of black lava that make for an especially intriguing contrast.</span></p><span data-dcnode-id="872" instrument_node="">
</span><div class="wp-block-image size-full wp-image-9494" data-dcnode-id="859"><figure class="aligncenter" data-dcnode-id="860"><noscript data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&lt;img loading="lazy" width="789" height="527" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport.jpg" alt="Hawaii Big Island with Kids - Landing at KOA Kona Airport" class="wp-image-9494" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport.jpg 789w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport-300x200.jpg 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport-768x513.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9494" data-dcnode-id="863"><img alt="Hawaii Big Island with Kids - Landing at KOA Kona Airport" class="lazyload" data-dcnode-id="869" data-pin-description="Hawaii Big Island with Kids - Landing at KOA Kona Airport" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport.jpg.webp 789w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport-300x200.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Landing-at-KOA-Kona-Airport-768x513.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="527" id="mv-trellis-img-3" loading="lazy </span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">As its name makes obvious, the Big Island is indeed larger than the other islands of Hawaii. That means you’ll need more time to see it all if that is your goal. Most visitors pick one side of the island – Kona or Hilo – and focus their activities there. Travelers from the mainland tend to spend the most time on the western (Kona/Kohala) side of the island where the major resorts are located. To drive from the resorts on the Kohala Coast to Hawaii Volcanoes National Park, for example, will take well over two hours. Roads can be winding, so day trippers should be prepared and realistic about drive times.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">What family travelers will love about the Big Island is the reliable weather, at least on the Kona and Kohala side. That area gets very little rainfall, so you can count on blue skies and beach days for nearly every day of your vacation. High temperatures are usually in the low 80s year round, with the evening lows around 70.</span></p><span data-dcnode-id="852" instrument_node="">
</span><h2 data-dcnode-id="850" id="where-to-stay-on-the-big-island-the-best-big-island-hotels-for-families"><span data-dcnode-id="851" instrument_node="">Where to Stay on the Big Island: The Best Big Island Hotels for Families</span></h2><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Family travelers to the Big Island will find no shortage of magnificent hotel properties. Hawaii is certainly more expensive than many travel destinations, but there are still quality resorts for more modest budgets as well. And for luxury travelers, the options are quite extensive. Here are the hotels that work best for families on the Big Island:</span></p><span data-dcnode-id="846" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="835"><figure class="aligncenter" data-dcnode-id="836"><noscript data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">&lt;img loading="lazy" width="600" height="900" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels.jpg" alt="Visiting the Big Island of Hawaii with kids? Explore the very best in hotels, from luxury resorts to budget-friendly lodging on the Kohala Coast and beyond. Plus, things to do and tips for a Big Island vacation. #hawaii #bigisland #familytravel #tripswithtykes" class="wp-image-9506" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels.jpg 600w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9506" data-dcnode-id="837"><img alt="Visiting the Big Island of Hawaii with kids? Explore the very best in hotels, from luxury resorts to budget-friendly lodging on the Kohala Coast and beyond. Plus, things to do and tips for a Big Island vacation. #hawaii #bigisland #familytravel #tripswithtykes" class="lazyload" data-dcnode-id="843" data-pin-description="Visiting the Big Island of Hawaii with kids? Explore the very best in hotels, from luxury resorts to budget-friendly lodging on the Kohala Coast and beyond. Plus, things to do and tips for a Big Island vacation. #hawaii #bigisland #familytravel #tripswithtykes" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Best-Hotels.jpg.webp 600 </span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">As one of the Four Seasons’ flagship properties (and the most expensive hotel on the Big Island), this is an obvious hotel choice for luxury loving family travelers. The Four Seasons signature service abounds, and families will love that a kids club for children ages 5-12 is included in the price. The hotel’s location is more convenient for airport access and activities in and around the village of Kailua-Kona as well. The resort is known more for its pools than its beach, so it may not fit the bill as well if you prefer to spend more of your time on the sand and in the surf.</span></p><span data-dcnode-id="826" instrument_node="">

</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">This is the hotel for luxury seekers who appreciate a hotel with history. The Mauna Kea Beach Hotel is one of the the original “Rock Resorts” founded by Laurance Rockefeller in the mid-1960s. It is located on one of the Big Island’s best beaches which is highly swimmable for families. The Mauna Kea is now a Marriott Autograph Collection property, so points-loving travelers can earn and spend a valuable loyalty currency here. My brother-in-law was just married at this hotel last year, so my family spent an entire week and can recommend it highly.</span></p><span data-dcnode-id="804" instrument_node="">
</span><h3 data-dcnode-id="800" id="3-mauna-lani-bay-hotel-bungalows"><span data-dcnode-id="803" instrument_node="">3. </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Hotel_Review-g2312116-d111599-Reviews-Mauna_Lani-Puako_Kohala_Coast_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="802" instrument_node="">Mauna Lani Bay Hotel &amp; Bungalows</span></a></h3><span data-dcnode-id="799" instrument_node="">
</span><div class="wp-block-image size-full wp-image-9495" data-dcnode-id="786"><figure class="aligncenter" data-dcnode-id="787"><noscript data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">&lt;img loading="lazy" width="800" height="536" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg" alt="Hawaii Big Island with Kids - Mauna Lani Bay Hotel" class="wp-image-9495" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-300x201.jpg 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-768x515.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9495" data-dcnode-id="790"><img alt="Hawaii Big Island with Kids - Mauna Lani Bay Hotel" class="lazyload" data-dcnode-id="796" data-pin-description="Hawaii Big Island with Kids - Mauna Lani Bay Hotel" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-300x201.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-768x515.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="536" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg.webp&amp;raw" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-300x201.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel-768x515.jpg.webp 768w" style="" width="800"><span class="dpsp-pin-it-overlay" data-dcnode-id="795"></span><a aria-label="Pin This" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fwp-content%252Fuploads%252F2019%252F02%252FHawaii-Big-Island-with-Kids-Mauna-Lani-Bay-Hotel.jpg%26url%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fhawaii-big-island-with-kids%252F%26is_video%3Dfalse%26description%3DHawaii%2520Big%2520Island%2520with%2520Kids%2520-%2520Mauna%2520Lani%2520Bay%2520Hotel" rel="noopener" target="_blank" title="Pin This"><span class="dpsp-network-icon" data-dcnode-id="792"><svg data-dcnode-id="793" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.85 </span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Located in the middle of King Kamehameha’s royal fish ponds, the setting of this hotel is dramatic. My family has visited the Mauna Lani Bay more times than all other hotels on the Big Island combined. The hotel had definitely slipped over the years, but a new owner is at the helm. It’s currently undergoing a major (and much-needed) renovation, and will reopen as an Auberge resort in late 2019. All signs point to the fact that the hotel is going to be a Kohala Coast force to be reckoned with once again, aimed directly at the Four Seasons Hualalai and Mauna Kea clientele. I’m hoping to be there as soon as I can after it opens with a full report!</span></p><span data-dcnode-id="782" instrument_node="">
</span><h3 data-dcnode-id="778" id="4-hilton-waikoloa-village"><span data-dcnode-id="781" instrument_node="">4. </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Hotel_Review-g60608-d89980-Reviews-Hilton_Waikoloa_Village-Waikoloa_Kohala_Coast_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="780" instrument_node="">Hilton Waikoloa Village</span></a></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Waikoloa has the most hustle and bustle of any area of the Big Island (but not too much), so I always recommend this area highly for families who like to stay busy. The Hilton Waikoloa Village is the largest property in the area, featuring three pools with waterfalls, a 175 foot waterslide, an on-site luau, a swim with the dolphins experience, and lots of shopping. Transportation-loving kids will adore the canal boats and trams that serve the practical function of getting you around the large resort but are also an activity unto themselves.&nbsp;The resort also has a kids club called Camp Keiki for kids ages 5-12.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="770" id="5-waikoloa-beach-marriott-resort-spa"><span data-dcnode-id="773" instrument_node="">5. </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fave.co/2JHG5Hf" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="772" instrument_node="">Waikoloa Beach Marriott Resort &amp; Spa</span></a></h3><span data-dcnode-id="769" instrument_node="">

</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">For families who still want to be in the center of things at Waikoloa but perhaps at a smaller property, the Marriott fits the bill. The hotel has a number of “Ohana Room” categories which give families staying in a room together extra space for not much of an additional upcharge. With standard room rates fluctuating between $200-400 a night depending on season, this hotel is also more accessible for many family budgets. The hotel has a gorgeous network of pools as well as a luau on site that families will love.</span></p><span data-dcnode-id="752" instrument_node="">
</span><h3 data-dcnode-id="748" id="6-courtyard-by-marriott-king-kamehameha-s-kona-beach-hotel"><span data-dcnode-id="751" instrument_node="">6. </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fave.co/3n40Fjn" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="750" instrument_node="">Courtyard by Marriott King Kamehameha’s Kona Beach Hotel</span></a></h3><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Family travelers on a stricter budget may find&nbsp;King Kamehameha’s Kona Beach Hotel the perfect fit. A popular choice for locals taking a staycation, room prices can regularly be found under $200 a night. The hotel is a Marriott Category 4 property so it can also be a great value with points. Located in the village of Kailua-Kona, it’s close to many of the activities that family travelers will want to do. And with a luau, spa, and multiple restaurants, its onsite amenities far exceed many other hotels in this price range.</span></p><span data-dcnode-id="744" instrument_node="">
</span><h2 data-dcnode-id="742" id="what-to-do-on-the-big-island-with-kids"><span data-dcnode-id="743" instrument_node="">What to Do on the Big Island with Kids</span></h2><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">There are so many things to do on Hawaii’s Big Island that it has taken us numerous trips to even begin to do many of the things on this list. You’ll want to spend a lot of your time enjoying your resort’s beaches, pools, and other amenities, so don’t over-schedule yourself. The whole point of going to the Big Island is to escape the hustle and bustle!</span></p><span data-dcnode-id="738" instrument_node="">

</span><h3 data-dcnode-id="721" id="1-attend-a-luau"><span data-dcnode-id="722" instrument_node="">1. Attend a Luau</span></h3><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="719" instrument_node="">Luaus are a must-do on any Hawaiian vacation, even if they can sometimes be a tad touristy. The food and drinks are always plentiful and kids always seem to enjoy the show. I can personally recommend the </span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Restaurant_Review-g60608-d4038023-Reviews-Sunset_Luau_at_the_Waikoloa_Beach_Marriott-Waikoloa_Kohala_Coast_Island_of_Hawaii_.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="718" instrument_node="">Sunset Luau at the Waikoloa Beach Marriott Resort &amp; Spa</span></a><span data-dcnode-id="716" instrument_node=""> as well as the </span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Restaurant_Review-g2312116-d12347731-Reviews-The_Mauna_Kea_Luau-Puako_Kohala_Coast_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="715" instrument_node="">luau at the Mauna Kea Beach Resort</span></a><span data-dcnode-id="713" instrument_node="">. Others include the </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Restaurant_Review-g60608-d1151223-Reviews-Legends_of_Hawaii_Luau-Waikoloa_Kohala_Coast_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="712" instrument_node="">Legends of Hawaii Luau at the Hilton Waikoloa Village</span></a><span data-dcnode-id="710" instrument_node="">, the </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60872-d577256-Reviews-Island_Breeze_Luau-Kailua_Kona_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="709" instrument_node="">Island Breeze Luau at the Courtyard by Marriott King Kamehameha’s Kona Beach Hotel</span></a><span data-dcnode-id="707" instrument_node="">, and the </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60872-d590374-Reviews-Royal_Kona_Resort_Luau-Kailua_Kona_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="706" instrument_node="">Voyagers of the Pacific Luau at the Royal Kona Resort</span></a><span data-dcnode-id="704" instrument_node="">.</span></p><span data-dcnode-id="702" instrument_node="">

</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Most luaus do not run nightly, so be certain to compare schedules of the offerings near you before your trip. For families with younger children, check the age at which the luau begins charging admission. Some have a slightly higher age cutoff and may save you a bundle if your young kids are still free.</span></p><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="683" id="2-snorkel-with-manta-rays"><span data-dcnode-id="684" instrument_node="">2. Snorkel with Manta Rays</span></h3><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">There are a couple of coves near the village of Kailua-Kona that serve as feeding spots for giant manta rays at night. Families with kids old enough to be comfortable snorkeling in the ocean at night should book an excursion to swim with them. SCUBA divers dive to the bottom and shine lights up at the snorkelers to attract the plankton that mantas feed on.&nbsp;It’s truly one of the most memorable adventures the Big Island has to offer. I can personally recommend </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60872-d1059060-Reviews-Kona_Honu_Divers-Kailua_Kona_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="680" instrument_node="">Kona Honu Divers</span></a><span data-dcnode-id="678" instrument_node=""> highly for this excursion for divers and snorkelers alike.</span></p><span data-dcnode-id="676" instrument_node="">
</span><h3 data-dcnode-id="674" id="3-explore-hawaii-volcanoes-national-park"><span data-dcnode-id="675" instrument_node="">3. Explore Hawaii Volcanoes National Park</span></h3><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Visitors have flocked for years to Hawaii Volcanoes National Park to see an active volcano in action. Since the eruption of 2018, however, there is no longer visible lava within the park. But don’t let that deter you from a visit. There are still magnificent hiking trails and lots for your kids to learn within this park.</span></p><span data-dcnode-id="670" instrument_node="">
</span><h3 data-dcnode-id="668" id="4-take-a-helicopter-ride"><span data-dcnode-id="669" instrument_node="">4. Take a Helicopter Ride</span></h3><span data-dcnode-id="667" instrument_node="">

</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">Taking a ride in a helicopter is a pricey excursion, but the views make it well worth the splurge. Take a tour that takes you within view of the volcano as well as the island’s many waterfalls. </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60608-d1627325-Reviews-Blue_Hawaiian_Helicopters_Waikoloa-Waikoloa_Kohala_Coast_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="651" instrument_node="">Blue Hawaiian Helicopters</span></a><span data-dcnode-id="649" instrument_node=""> sets the gold standard for these tours and has a location right near the Waikoloa area resorts that is highly accessible to all Kohala Coast visitors.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="645" id="5-visit-akaka-falls"><span data-dcnode-id="646" instrument_node="">5. Visit Akaka Falls</span></h3><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The Big Island has no shortage of breathtaking waterfalls, but most of them are on the remote north coast only really visible in a helicopter. Akaka Falls is one of the only ones that is easily accessible for hikers.&nbsp;Just 10 miles from Hilo, Akaka Falls State Park is home to two separate falls: 100-foot Kahuna Falls and 442-foot Akaka Falls. The hike is easy and paved, so it’s an excursion that works well for families of kids of every age.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h3 data-dcnode-id="639" id="6-go-flumin-da-ditch"><span data-dcnode-id="640" instrument_node="">6. Go Flumin’ Da Ditch</span></h3><span data-dcnode-id="638" instrument_node="">

</span><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">(</span><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Editor’s Note February 2022</span></strong><span data-dcnode-id="620" instrument_node="">: The historic Kohala Ditch has been damaged beyond repair so this activity will not reopen. The team behind Flumin’ Kohala now offers UTV tours of the area that allow rides ages 5+ with a driver 21+. Our family did a similar tour with a company no longer in operation and highly recommend it!)</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Eco-adventure company </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60582-d8042410-Reviews-Flumin_Kohala-Hawi_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="616" instrument_node="">Flumin’ Kohala</span></a><span data-dcnode-id="614" instrument_node="">&nbsp;has exclusive rights to access the Kohala Ditch, a 22-mile network of historic irrigation flumes and tunnels around the town of Hawi on the north of the island. You and your kids can book a tour with them to float through portions of this system on a kayak-style raft for a totally unique adventure.&nbsp;Kids as young as 5 can participate, and it’s even an activity that active grandparents could do too. Just be prepared for long and dark tunnels during some of the tour, which is not for the claustrophobic. Our family’s trip was truly the highlight of our most recent Big Island vacation.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h3 data-dcnode-id="610" id="7-dine-at-the-kona-brewing-company"><span data-dcnode-id="611" instrument_node="">7. Dine at the Kona Brewing Company</span></h3><span data-dcnode-id="609" instrument_node="">

</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">Yes, you should take your children to a brewery! The </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Restaurant_Review-g60872-d522631-Reviews-Kona_Brewing_Company_Pub_Brewery-Kailua_Kona_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="595" instrument_node="">Kona Brewing Company</span></a><span data-dcnode-id="593" instrument_node=""> is as family-friendly as it gets, with a pub serving lots of things kids will eat and love. Meanwhile, parents can sample some of the more unique beer offerings that you can only get in their island location. It’s a win-win.</span></p><span data-dcnode-id="591" instrument_node="">
</span><h3 data-dcnode-id="589" id="8-sample-shave-ice"><span data-dcnode-id="590" instrument_node="">8. Sample Shave Ice</span></h3><span data-dcnode-id="588" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="577"><figure class="aligncenter" data-dcnode-id="578"><noscript data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&lt;img loading="lazy" width="800" height="800" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg" alt="Hawaii Big Island with Kids - Kid and Shave Ice" class="wp-image-9499" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--150x150.jpg 150w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--300x300.jpg 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--768x768.jpg 768w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--240x240.jpg 240w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--100x100.jpg 100w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--250x250.jpg 250w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9499" data-dcnode-id="579"><img alt="Hawaii Big Island with Kids - Kid and Shave Ice" class="lazyload" data-dcnode-id="585" data-pin-description="Hawaii Big Island with Kids - Kid and Shave Ice" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--150x150.jpg.webp 150w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--300x300.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--768x768.jpg.webp 768w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--240x240.jpg.webp 240w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--100x100.jpg.webp 100w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--250x250.jpg.webp 250w" data-trellis-processed="1" data-webp="true" height="800" id="mv-trellis-img-13" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg.webp&amp;raw" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--150x150.jpg.webp 150w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--300x300.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--768x768.jpg.webp 768w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--240x240.jpg.webp 240w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--100x100.jpg.webp 100w, https://tripswithtykes.com/wp-content/uploads/2019/02/Hawaii-Big-Island-with-Kids-Kid-and-Shave-Ice--250x250.jpg.webp 250w" style="" width="800"><span class="dpsp-pin-it-overlay" data-dcnode-id="584"></span><a aria-label="Pin This" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fwp-content%252Fuploads%252F2019%252F02%252FHawaii-Big-Island-with-Kids-Kid-and-Shave-Ice-.jpg%26url%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fhawaii-big-island-with-kids%252F%26is_video%3Dfalse%26description%3DHawaii%2520Big%2520Island%2520with%2520Kids%2520-%2520Kid%2520and%2520Shave%2520Ice" rel="noopener" target="_blank" title="Pin This"><span class="dpsp-network-icon" data-dcnode-id="581"><svg data-dcnode-id="582" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="583"></path></svg></span></a></div></figure></div><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">It’s Hawaii’s most iconic snack, so make sure to try some authentic shave ice somewhere on the Big Island during your visit. Our family’s pick? Anuenue on the Kohala Coast in the town of&nbsp;Kawaihae. </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Restaurant_Review-g60872-d13479263-Reviews-Ululani_s_Hawaiian_Shave_Ice-Kailua_Kona_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="574" instrument_node="">Ululani’s</span></a><span data-dcnode-id="572" instrument_node=""> (with a location in Kailua-Kona) is another well-known brand all over Hawaii that won’t steer you wrong.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568" id="9-beach-hop"><span data-dcnode-id="569" instrument_node="">9. Beach Hop</span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="566" instrument_node="">Not all of the resorts on the Big Island are known for their beaches. So if you choose to stay in a resort that isn’t on an iconic beach, be sure to go visit one or two of the islands best beaches. Favorites for family travelers include the highly swimmable beaches in front of the </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fave.co/3oDlcvA" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="565" instrument_node="">Mauna Kea Beach Hotel</span></a><span data-dcnode-id="563" instrument_node=""> (Kauna’oa Bay) or&nbsp;</span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fave.co/3qIU5kE" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="562" instrument_node="">Westin Hapuna Beach Resort</span></a><span data-dcnode-id="560" instrument_node=""> (Hapuna Beach). For a more unique beach-going experience, check out Punalu’u Black Sand Beach on the south side of the island.</span></p><span data-dcnode-id="558" instrument_node="">
</span><h3 data-dcnode-id="556" id="10-hike-through-a-lava-tube"><span data-dcnode-id="557" instrument_node="">10. Hike through a Lava Tube</span></h3><span data-dcnode-id="555" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="544"><figure class="aligncenter" data-dcnode-id="545"><noscript data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">&lt;img loading="lazy" width="800" height="506" src="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg" alt="" class="wp-image-9505" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-300x190.jpg 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-768x486.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-9505" data-dcnode-id="546"><img alt="" class="lazyload" data-dcnode-id="552" data-pin-description="The Ultimate Guide to Hawaii's Big Island with Kids" data-pin-media="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg" data-pin-title="The Ultimate Guide to Hawaii's Big Island with Kids" data-src="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg.webp" data-srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-300x190.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-768x486.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="506" id="mv-trellis-img-14" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg.webp&amp;raw" srcset="https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg.webp 800w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-300x190.jpg.webp 300w, https://tripswithtykes.com/wp-content/uploads/2019/02/Big-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport-768x486.jpg.webp 768w" style="" width="800"><span class="dpsp-pin-it-overlay" data-dcnode-id="551"></span><a aria-label="Pin This" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fwp-content%252Fuploads%252F2019%252F02%252FBig-Island-of-Hawaii-with-Kids-Lava-Tube-Near-Kona-Airport.jpg%26url%3Dhttps%253A%252F%252Ftripswithtykes.com%252Fhawaii-big-island-with-kids%252F%26is_video%3Dfalse%26description%3DThe%2520Ultimate%2520Guide%2520to%2520Hawaii%27s%2520Big%2520Island%2520with%2520Kids" rel="noopener" target="_blank" title="Pin This"><span class="dpsp-network-icon" data-dcnode-id="548"><svg data-dcnode-id="549" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="550"></path></svg></span></a></div></figure></div><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Not far from KOA airport, you might spot a number of cars pulled off to the side of the Queen’s Highway in the middle of black lava flows. Believe it or not, there is lava tube and cave at this location that you can climb into and explore. It’s a quick stop – plan for maybe 20 minutes or so – but be sure to bring decent hiking shoes because you may cut your feet in flip flops. And be careful of traffic since parking is right along the busy highway.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h3 data-dcnode-id="538" id="11-zip-down-a-zipline"><span data-dcnode-id="539" instrument_node="">11. Zip Down a Zipline</span></h3><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">There are several zipline tour companies on the lush north and east sides of the Big Island to take your family on an eco-adventure. </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/links/7738147/type/dlg/https%3A//www.tripadvisor.com/Attraction_Review-g60582-d2292644-Reviews-Kohala_Zipline-Hawi_Island_of_Hawaii_Hawaii.html" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="535" instrument_node="">Kohala Zipline</span></a><span data-dcnode-id="533" instrument_node="">,&nbsp;Skyline Eco-Adventures, and Umauma Falls Zipline &amp; Rappel Experience are the major operators. Just be sure to check age and weight requirements because most companies won’t take younger children.</span></p><span data-dcnode-id="531" instrument_node="">
</span><h2 data-dcnode-id="529" id="additional-tips-for-visiting-hawaii-s-big-island"><span data-dcnode-id="530" instrument_node="">Additional Tips for Visiting Hawaii’s Big Island</span></h2><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Visiting Hawaii’s Big Island with kids? Here are a few final tips my family has learned from our many experiences there.</span></p><span data-dcnode-id="525" instrument_node="">
</span><ol data-dcnode-id="501"><li data-dcnode-id="520"><span data-dcnode-id="522" style="text-decoration: underline;"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Rent a car</span></strong></span><span data-dcnode-id="521" instrument_node="">: While I have visited O’ahu without a car before, I really wouldn’t recommend it on the Big Island. The distances are too great and the other transportation options are too slim. Cars will give you the freedom to adjust your schedule on the fly and leave your resort for new activities, restaurants, and shopping.</span></li><li data-dcnode-id="515"><span data-dcnode-id="517" style="text-decoration: underline;"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Consider a condo</span></strong></span><span data-dcnode-id="516" instrument_node="">: Hotels don’t always work for family travelers, especially those with babies who need a separate place to sleep or those with teens who need their privacy. Luckily, many of the hotel properties mentioned in this article have affiliated condo rentals nearby that can give you the best of both worlds. Just check the condo locations closely (many are not located within walking distance of the beach) and make sure you rent from a company that gives you full hotel privileges (some VRBO rentals, for example, can come with restricted access).</span></li><li data-dcnode-id="507"><span data-dcnode-id="512" style="text-decoration: underline;"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Hire a sitter</span></strong></span><span data-dcnode-id="511" instrument_node="">: If you aren’t staying at a resort with a kids club, I highly recommend hiring a sitter so parents can get a night out. So many of the dining experiences on the Big Island are expensive, and adults can enjoy them and get more value without little ones. Our family has used the excellent and background-checked sitters of </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mkcare.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="510" instrument_node="">Malihini Keiki Care</span></a><span data-dcnode-id="508" instrument_node=""> on many vacations for nearly a decade.</span></li><li data-dcnode-id="502"><span data-dcnode-id="504" style="text-decoration: underline;"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Give yourself a week</span></strong></span><span data-dcnode-id="503" instrument_node="">: So many families want to come to the state of Hawaii on a week’s vacation and island hop to multiple places to see it all. You can’t. I’d recommend at least 4 days on just the Big Island to do it justice, but a full week is even more preferable.</span></li></ol><span data-dcnode-id="500" instrument_node="">
</span><h2 data-dcnode-id="498" id="more-advice-for-the-big-island-the-hawaiian-islands-with-kids"><span data-dcnode-id="499" instrument_node="">More Advice for the Big Island &amp; the Hawaiian Islands with Kids</span></h2><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Traveling to the Big Island or elsewhere in Hawaii with kids? Check out these additional resources:</span></p><span data-dcnode-id="494" instrument_node="">
</span><ul data-dcnode-id="478"><li data-dcnode-id="489"><span data-dcnode-id="493" instrument_node="">My friend Marcie of Hawaii Travel with Kids has an amazingly detailed&nbsp;</span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//transactions.sendowl.com/stores/15827/211532" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="492" instrument_node="">Big Island with Kids travel guide</span></a><span data-dcnode-id="490" instrument_node="">&nbsp;available for purchase on her site. This guide will take a lot of the planning and guess work out of your trip.</span></li><li data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">Maui is another family-friendly island we love to visit. Check out my guide to&nbsp;</span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/things-to-do-maui-with-kids/"><span data-dcnode-id="487" instrument_node="">Maui with kids</span></a><span data-dcnode-id="485" instrument_node="">.</span></li><li data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">Many families have Disney’s Aulani Resort on O’ahu on their family travel bucket list. See my tips for the&nbsp;</span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripswithtykes.com/disney-aulani-splurges/"><span data-dcnode-id="482" instrument_node="">best splurges at Aulani</span></a><span data-dcnode-id="480" instrument_node="">.</span></li></ul><span data-dcnode-id="477" instrument_node="">

</span><div class="trellis-comment-text" data-dcnode-id="170"><span data-dcnode-id="177" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Lara S.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Wednesday 20th of February 2019</span></p><span data-dcnode-id="171" instrument_node="">

</span></div><span data-dcnode-id="167" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="156"><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">I'd also highly recommend the Fairmont Orchid. They have a gorgeous sandy beach with a great cove for snorkeling or seeing green turtles swim past that my son (age 4) loved. There is also a great pool and kid's program. Also kids under 6 eat free! There is a petroglyph park you can walk to from the hotel that is amazing. And a path to the left that meanders along several rocky beaches where turtles sleep.</span></p><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">We also drove over the island to Hilo then up the coast and found an amazing garden called the Hawaii Tropical Botanical Garden that was built by a family who cleaned up a cliffside and gradually planted gardens down it and alongside a gorgeous waterfall and to the cove below. There are lots of stairs but it was well worth it to see the fantastic plants and views. </span></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Finally I HIGHLY recommend visiting the observatories at the top of Mauna Kea via a tour (they take you up the very rugged road for sunset then bring you back down to the visitors center for dinner and star gazing through a telescope) or on your own at least to the visiter's center (the road to which is paved, although the road to the top of the mountain is not). It is extremely cold up top of the mountain like puffy coat cold so don't wear shorts. You truly feel on top of the world up there and I cannot recommend it enough. We saw Mars through the telescope and a nebula. There is an age restriction on some tours that go all the way up but I cannot remember what it is at the moment. Hope these are some fun tips for families!</span></p><span data-dcnode-id="157" instrument_node="">
</span></div><span data-dcnode-id="155" instrument_node="">
