</span><section class="section section-discovery section-discovery-even" data-dcnode-id="3173"><span data-dcnode-id="3313" instrument_node="">
</span><div class="container-holder" data-dcnode-id="3175"><span data-dcnode-id="3312" instrument_node="">

</span><div class="heading" data-dcnode-id="3179"><span data-dcnode-id="3310" instrument_node="">
</span><h1 data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">Explore What to Do In Kailua Kona Hawaii</span></h1><span data-dcnode-id="3307" instrument_node="">
</span><div class="title-text" data-dcnode-id="3221"><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">The Kona District of Hawaii stretches a diverse, and expansive 60 miles along the Big Island’s sunny western coast. Lined with lava fields, coffee farms, and some of Hawaii’s most beautiful coastline, a drive through Kona provides a relaxed atmosphere, tropical luxury and family-friendly attractions alike.
</span></p><h2 data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">Geography of Kona</span></h2><span data-dcnode-id="3301" instrument_node="">
</span><p data-dcnode-id="3296"><span data-dcnode-id="3300" instrument_node="">Kona is nestled on the slopes of Hualālai, the 3rd youngest of the five volcanoes on the Big Island of Hawaii. The volcano reaches 8,271 feet above sea level and is thought to have risen from the ocean about 300,000 years ago. </span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//volcanoes.usgs.gov/volcanoes/hualalai/" rel="noopener" target="_blank"><span data-dcnode-id="3299" instrument_node="">Hualālai</span></a><span data-dcnode-id="3297" instrument_node=""> last erupted in 1801 and has been relatively quiet since then, but is still considered active. Based on historical behavior, Hualālai could erupt again within the next century.
</span></p><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">In the Hawaiian language, kona means “leeward,” or dry side of the island. In ancient times, Kona was the name of the leeward district on each major island. There are areas named Kona on several Hawaiian islands, so you will notice that the Big Island’s Kona is referred to as Kailua Kona when speaking about the town. Being situated under the protective mass of Hualālai and Mauna Loa volcanoes means that the weather in Kona is very consistent and quite temperate. Daytime highs range from 81°F to 87°F with average lows being 68°F-75°F.
</span></p><h2 data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Activities in Kona Hawaii</span></h2><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3290" instrument_node="">The rich soil and moderate leeward climate make for perfect farming and coffee growing conditions. </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/kona-coffee-guide-and-tasting-tours" rel="noopener" target="_blank"><span data-dcnode-id="3289" instrument_node="">Kona coffee</span></a><span data-dcnode-id="3287" instrument_node=""> has become famous worldwide for its rich, yet smooth taste. There are many active and historical coffee farms to visit and taste a cup for yourself.
</span></p><p data-dcnode-id="3278"><span data-dcnode-id="3285" instrument_node="">The coastal waters on the west side of the Big Island also tend to be fairly gentle and dotted with small white sand beaches, making for </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/5-amazing-snorkeling-spots" rel="noopener" target="_blank"><span data-dcnode-id="3284" instrument_node="">great snorkeling</span></a><span data-dcnode-id="3282" instrument_node="">, beach activities and water sports. The Alika 2 Slide a few miles off the coast drops away to great depths, offering world class </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/sport-fishing-in-hawaii" rel="noopener" target="_blank"><span data-dcnode-id="3281" instrument_node="">sport fishing</span></a><span data-dcnode-id="3279" instrument_node="">, just miles off shore. The Honokohau Harbor between the airport and Kailua-Kona is the starting point for boat charters that range from whale watching expeditions to battling a 1,000 pound game fish. Flying into Kona is a breeze with the&nbsp;Ellison Onizuka Kona International Airport at Keāhole (KOA) receiving direct flights from many airports.
</span></p><p data-dcnode-id="3274"><span data-dcnode-id="3277" instrument_node="">Keep reading for more information about city life, history &amp; present day Kona Hawaii.</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">
</span></p><div class="content-more" data-dcnode-id="3223"><span data-dcnode-id="3273" instrument_node="">
</span><div class="content-more__wrap content-more__wrap" data-dcnode-id="3228" style="opacity: 0;"><span data-dcnode-id="3272" instrument_node="">
</span><a data-dcnode-id="3271" id="more" name="more"></a><span data-dcnode-id="3270" instrument_node="">
</span><h2 data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Kona City Life</span></h2><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">At the heart of Kailua Kona is Historic Kailua Village. This is a beautiful little downtown area, near the Kailua pier. It offers great dining and shopping opportunities with a good dose of local flavor and historical sights such as the Hulihe’e Palace and the iconic Mokuaikaua Church, the oldest Christian Church in Hawaii.</span></p><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Dining in Kailua Kona is diverse and varied as the geography of the western side of the Big Island. Hole-in-the-wall treasures and casual Hawaiian-style fare abound, but fine dining is available too. World-class chefs have made the area home and luxury resorts keep them competitive – great news for those with sophisticated tastes.</span></p><p data-dcnode-id="3259"><span data-dcnode-id="3263" instrument_node="">If you want to stay in or near Kona, there are a wide variety of lodging options available. You may enjoy the amenities of the larger resorts like the King K Marriott, Royal Kona Resort, or the Sheraton. There are a wide array of smaller hotels, bed and breakfasts, and condos throughout the area. The area is also full of affordable </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/accommodations/vacation-rentals" rel="noopener" target="_blank"><span data-dcnode-id="3262" instrument_node="">vacation rentals</span></a><span data-dcnode-id="3260" instrument_node="">, making a Hawaiian adventure on a budget more feasible.</span></p><h2 data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Kona Hawaii History</span></h2><p data-dcnode-id="3249"><span data-dcnode-id="3256" instrument_node="">Kona has a fascinating history, both natural and human. First discovered by Polynesian explorers between 100-600 A.D., the Kona coast was among the most welcoming early settlements for native Hawaiians. Moderate weather, fertile fields, and calm waters made for easier living. Most of the ancient Ali’i (or chiefs) called Kona home. Because of the extent of history centered around Kona Hawaii, there are several </span><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/kona-cultural-sites" rel="noopener" target="_blank"><span data-dcnode-id="3255" instrument_node="">historic sites</span></a><span data-dcnode-id="3253" instrument_node=""> and </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/guide-to-kona-national-and-state-parks" rel="noopener" target="_blank"><span data-dcnode-id="3252" instrument_node="">state or national parks</span></a><span data-dcnode-id="3250" instrument_node=""> to explore in the area.&nbsp;Kaloko Honokohau National Historic Park to the north and&nbsp;Pu`uhonua O Hōnaunau National Park to the south are both worth a visit.</span></p><p data-dcnode-id="3244"><span data-dcnode-id="3248" instrument_node="">In the 15th century, Umi-a-Liloa united the Big Island’s numerous groups under a single rule, moving his seat of power from the Waipi’o Valley to Kona, establishing a tradition for generations of rulers to come. In fact, the most celebrated Hawaiian royalty, King Kamehameha I, moved his court to </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/kona-cultural-sites" rel="noopener" target="_blank"><span data-dcnode-id="3247" instrument_node="">Kamakahonu</span></a><span data-dcnode-id="3245" instrument_node=""> in Northern Kona in 1812 after unifying the Hawaiian people under one rule and establishing the Kingdom of Hawaii in 1795.</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3243" instrument_node="">The British explorer, Captain James Cook made the first European contact with Hawaii Island in 1979, just south of Kona Hawaii at </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/kealakekua-bay" rel="noopener" target="_blank"><span data-dcnode-id="3242" instrument_node="">Kealakekua Bay</span></a><span data-dcnode-id="3240" instrument_node="">. After a month of festivities and trade with the islanders, Captain Cook &nbsp;would ultimately meet his demise in a quarrel with the local Hawaiians. &nbsp;On the site where Cook was killed a memorial obelisk, now known as the Captain Cook Monument, was built in 1874 in his memory. This has become a popular and iconic attraction for those snorkeling in Kealakekua Bay.</span></p><h2 data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Present Day Kona Hawaii</span></h2><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Today, Kona Hawaii is home to an international airport, numerous historic and natural attractions, luxurious resorts, fine dining, black sand and white sand beaches, and world-renowned coffee. Approximately 1.2 million tourists visit the Kona side of the island each year and two-thirds of those visitors are returning to explore more of what the Big Island has to offer.</span></p><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">The geographic diversity of Kona Hawaii is striking; world-class beaches appear within a stone’s throw of soaring mountain slopes and epic lava fields. You will also notice that with such a large and diverse region it has been divided into the districts (moku) of North Kona and South Kona. The term “Kona” is sometimes used to refer to the largest town in the area, Kailua Kona, but there are actually many towns in the district, including Kealakekua, Keauhou, Holualoa, Hōnaunau and Honalo.</span></p><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Al fresco island dining, world-renowned breweries, delicious poke, and incredible coffee are just a few of the dining attractions visitors to Kona enjoy, and this paired with the easy access to beaches, shopping, and historic sites keep them coming back season after season.</span></p><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node=""> </span></p></div><span data-dcnode-id="3227" instrument_node="">

</span></p><div class="swp-hidden-panel-wrap" data-dcnode-id="3182" style="display: none; visibility: collapse; opacity: 0"><div class="swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_custom_color swp_other_custom_color swp_individual_custom_color scale-80 scale-full_width" data-dcnode-id="3183" data-float="none" data-float-color="#f5f4ef" data-float-mobile="none" data-min-width="1100" data-post-id="423" data-transition="fade"><div class="nc_tweetContainer swp_share_button swp_facebook" data-dcnode-id="3208" data-network="facebook"><a class="nc_tweet swp_share_link" data-dcnode-id="3209" data-link="https://www.facebook.com/share.php?u=https%3A%2F%2Fbigislandguide.com%2Fdestinations%2Fkona" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fbigislandguide.com%252Fdestinations%252Fkona" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="3210"><span class="iconFiller" data-dcnode-id="3211"><span class="spaceManWilly" data-dcnode-id="3212"><i class="sw swp_facebook_icon" data-dcnode-id="3215"></i><span class="swp_share" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Share</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_pinterest" data-dcnode-id="3200" data-network="pinterest"><a class="nc_tweet swp_share_link noPop" data-dcnode-id="3201" onclick="var e=document.createElement('script');							e.setAttribute('type','text/javascript');							e.setAttribute('charset','UTF-8');							e.setAttribute('src','//assets.pinterest.com/js/pinmarklet.js?r='+Math.random()*99999999);							document.body.appendChild(e);						" rel="nofollow noreferrer noopener"><span class="swp_count swp_hide" data-dcnode-id="3202"><span class="iconFiller" data-dcnode-id="3203"><span class="spaceManWilly" data-dcnode-id="3204"><i class="sw swp_pinterest_icon" data-dcnode-id="3207"></i><span cla
