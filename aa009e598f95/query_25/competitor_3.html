</span><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Jomalig Island is located in the province of Quezon, Philippines. The island’s name is pronounced as “Humalig” derived from the word “Humalik”, a love story legend. The island, famous for its golden sand beaches, has quite risen in popularity but the place has remained undisturbed because of its remote location. It’s the farthest island municipality of the Quezon Province requiring 4-6 hours boat ride from Ungos Port, Real, Quezon.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Just recently, I visited this golden paradise together with my wife-to-be and our friend to witness its unspoiled beaches and turquoise sea. After long hours of travelling from Metro Manila, we were rewarded with striking scenery of the island’s natural beauty and were greeted by one of the kindest people we’ve ever met, the Jomaligins. These relieved all our stress from the almost 16 hours travel time, 7 hours of which was unexpected waiting time at Ungos port. Add to that, the motion sickness that we had to endure during the 5-hour boat ride.</span></p><span data-dcnode-id="2653" instrument_node="">
</span><div class="toc_light_blue no_bullets contracted" data-dcnode-id="2571" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="2645"><span data-dcnode-id="2652" instrument_node="">TABLE OF CONTENTS</span><span data-dcnode-id="2651" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="2646"><span data-dcnode-id="2650" instrument_node="">[</span><a data-dcnode-id="2648" href="#"><span data-dcnode-id="2649" instrument_node="">show</span></a><span data-dcnode-id="2647" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="2572" style="display: none;"><li data-dcnode-id="2634"><a data-dcnode-id="2641" href="#HOW_TO_REACH_JOMALIG_ISLAND"><span class="toc_number toc_depth_1" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">1</span></span><span data-dcnode-id="2642" instrument_node=""> HOW TO REACH JOMALIG ISLAND</span></a><ul data-dcnode-id="2635"><li data-dcnode-id="2636"><a data-dcnode-id="2637" href="#ALTERNATIVE_ROUTE_TO_JOMALIG_ISLAND"><span class="toc_number toc_depth_2" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">1.1</span></span><span data-dcnode-id="2638" instrument_node=""> ALTERNATIVE ROUTE TO JOMALIG ISLAND</span></a></li></ul></li><li data-dcnode-id="2629"><a data-dcnode-id="2630" href="#WHERE_TO_STAY_IN_JOMALIG_ISLAND"><span class="toc_number toc_depth_1" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">2</span></span><span data-dcnode-id="2631" instrument_node=""> WHERE TO STAY IN JOMALIG ISLAND</span></a></li><li data-dcnode-id="2624"><a data-dcnode-id="2625" href="#WHERE_TO_EAT_IN_JOMALIG_ISLAND"><span class="toc_number toc_depth_1" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">3</span></span><span data-dcnode-id="2626" instrument_node=""> WHERE TO EAT IN JOMALIG ISLAND</span></a></li><li data-dcnode-id="2588"><a data-dcnode-id="2620" href="#PLACES_TO_VISIT_IN_JOMALIG_ISLAND"><span class="toc_number toc_depth_1" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">4</span></span><span data-dcnode-id="2621" instrument_node=""> PLACES TO VISIT IN JOMALIG ISLAND</span></a><ul data-dcnode-id="2589"><li data-dcnode-id="2615"><a data-dcnode-id="2616" href="#PUNO_NG_WALANG_FOREVER"><span class="toc_number toc_depth_2" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">4.1</span></span><span data-dcnode-id="2617" instrument_node=""> PUNO NG WALANG FOREVER</span></a></li><li data-dcnode-id="2610"><a data-dcnode-id="2611" href="#GOLDEN_SANDnbspBEACH"><span class="toc_number toc_depth_2" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">4.2</span></span><span data-dcnode-id="2612" instrument_node=""> GOLDEN SAND&nbsp;BEACH</span></a></li><li data-dcnode-id="2605"><a data-dcnode-id="2606" href="#LITTLE_BORACAY"><span class="toc_number toc_depth_2" data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">4.3</span></span><span data-dcnode-id="2607" instrument_node=""> LITTLE BORACAY</span></a></li><li data-dcnode-id="2600"><a data-dcnode-id="2601" href="#KANAWAY_BEACH"><span class="toc_number toc_depth_2" data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">4.4</span></span><span data-dcnode-id="2602" instrument_node=""> KANAWAY BEACH</span></a></li><li data-dcnode-id="2595"><a data-dcnode-id="2596" href="#LITTLE_BATANES"><span class="toc_number toc_depth_2" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">4.5</span></span><span data-dcnode-id="2597" instrument_node=""> LITTLE BATANES</span></a></li><li data-dcnode-id="2590"><a data-dcnode-id="2591" href="#SALIBUNGOT_BEACH"><span class="toc_number toc_depth_2" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">4.6</span></span><span data-dcnode-id="2592" instrument_node=""> SALIBUNGOT BEACH</span></a></li></ul></li><li data-dcnode-id="2583"><a data-dcnode-id="2584" href="#JOMALIG_ISLAND_SAMPLE_ITINERARY"><span class="toc_number toc_depth_1" data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">5</span></span><span data-dcnode-id="2585" instrument_node=""> JOMALIG ISLAND SAMPLE ITINERARY</span></a></li><li data-dcnode-id="2578"><a data-dcnode-id="2579" href="#JOMALIG_ISLAND_BUDGET_BREAKDOWN"><span class="toc_number toc_depth_1" data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">6</span></span><span data-dcnode-id="2580" instrument_node=""> JOMALIG ISLAND BUDGET BREAKDOWN</span></a></li><li data-dcnode-id="2573"><a data-dcnode-id="2574" href="#OTHER_TIPS_REMINDERS_FROM_THE_ADVENTUROUS_LENS"><span class="toc_number toc_depth_1" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">7</span></span><span data-dcnode-id="2575" instrument_node=""> OTHER TIPS &amp; REMINDERS FROM THE ADVENTUROUS LENS</span></a></li></ul></div><span data-dcnode-id="2570" instrument_node="">
</span><h2 data-dcnode-id="2566"><span data-dcnode-id="2567" id="HOW_TO_REACH_JOMALIG_ISLAND"><strong data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">HOW TO REACH JOMALIG ISLAND</span></strong></span></h2><span data-dcnode-id="2565" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2555"><span data-dcnode-id="2564" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="2557"><span data-dcnode-id="2563" instrument_node="">
</span><img alt="Jomalig Island Boat" class="wp-image-5624 td-animation-stack-type0-2" data-dcnode-id="2562" height="428" loading="lazy" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg%3Fresize%3D696%252C465%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=1024%2C684&amp;ssl=1 1024w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=300%2C200&amp;ssl=1 300w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=768%2C513&amp;ssl=1 768w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=696%2C465&amp;ssl=1 696w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=1068%2C713&amp;ssl=1 1068w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?resize=629%2C420&amp;ssl=1 629w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1.jpg?w=1080&amp;ssl=1 1080w" width="640"><span data-dcnode-id="2561" instrument_node="">
</span><span class="xc_pin" data-dcnode-id="2559" onclick="pin_this(event, 'http://pinterest.com/pin/create/button/?url=https://www.adventurouslens.com/jomalig-island/&amp;media=https://www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8180-1-1024x684.jpg&amp;description=JOMALIG ISLAND: Travel Guide, Budget and Itinerary | https://www.adventurouslens.com/jomalig-island/')"><span data-dcnode-id="2560" instrument_node="">
</span></span><span data-dcnode-id="2558" instrument_node="">
</span></span><span data-dcnode-id="2556" instrument_node="">
</span></figure><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2553" instrument_node="">Jomalig Island is accessible through private or public transportation. Land transportation is until Ungos Port in Real. Fastest route going to Real (Ungos Port) is via Marikina-Infanta highway passing through Antipolo, Morong, Pililla and Famy-Real-Infanta road. Travel time is approximately 3-4 hours depending on the traffic condition. There are no parking spaces inside the port area so parking will have to be personally arranged with the locals. You can leave your car or motorcycle on their watch. We haven’t tried this but one of the adventurer that we met in Jomalig said he left his motorbike in the house of the port ticketing personnel. Rate varies from Php100-Php300 per day. After land travel, you will then take a boat ride to the island. </span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">Below is how to reach Jomalig by commute:</span></p><span data-dcnode-id="2549" instrument_node="">
</span><ol data-dcnode-id="2539"><li data-dcnode-id="2544"><span data-dcnode-id="2548" instrument_node="">From Metro Manila, take Raymond Transportation bus bound for Infanta via Ungos for Php230 (air-conditioned). Bus terminal is located at </span><strong data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Sta.Teresita cor Legarda, Sampaloc, Manila</span></strong><span data-dcnode-id="2545" instrument_node="">. Daily trips to Infanta via Ungos are at 11:30PM and 1:00AM. Travel time is 4-5 hours depending on the road traffic condition. Another option is by van located just walking distance from the bus terminal for Php220.</span></li><li data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Alight at Ungos Port then ride a boat going to Jomalig. There’s a Php10 terminal fee. The boat fare is Php400 with daily trips at 5:00AM, 7:00AM and 10:00AM. Sailing time is 4-6 hours depending on the boat speed. Fastest boat according to some locals is M/B Gladys Mae.</span></li><li data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Once in Jomalig landing port, ride a habal-habal going to the chosen resort. Fare is Php50-Php70 depending on the distance.</span></li></ol><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">The island has an airstrip so another option is to get a chartered plane. Jomalig Island is less than an hour away from Metro Manila by air travel.</span></p><div class="td-a-rec td-a-rec-id-content_inline tdi_10_8c0 td_block_template_8" data-dcnode-id="2528"><span data-dcnode-id="2535" instrument_node="">
</span><span data-dcnode-id="2530" instrument_node="">
</span></div><span data-dcnode-id="2527" instrument_node="">
</span><h3 data-dcnode-id="2523"><span data-dcnode-id="2524" id="ALTERNATIVE_ROUTE_TO_JOMALIG_ISLAND"><strong data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">ALTERNATIVE ROUTE TO JOMALIG ISLAND</span></strong></span></h3><span data-dcnode-id="2522" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2512"><span data-dcnode-id="2521" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="2514"><span data-dcnode-id="2520" instrument_node="">
</span><img alt="Jomalig Island Port" class="wp-image-5637 td-animation-stack-type0-2" data-dcnode-id="2519" height="427" loading="lazy" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg%3Fresize%3D696%252C464%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=696%2C464&amp;ssl=1 696w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=1068%2C712&amp;ssl=1 1068w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?resize=630%2C420&amp;ssl=1 630w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2.jpg?w=1080&amp;ssl=1 1080w" width="640"><span data-dcnode-id="2518" instrument_node="">
</span><span class="xc_pin" data-dcnode-id="2516" onclick="pin_this(event, 'http://pinterest.com/pin/create/button/?url=https://www.adventurouslens.com/jomalig-island/&amp;media=https://www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8264-2-1024x683.jpg&amp;description=JOMALIG ISLAND: Travel Guide, Budget and Itinerary | https://www.adventurouslens.com/jomalig-island/')"><span data-dcnode-id="2517" instrument_node="">
</span></span><span data-dcnode-id="2515" instrument_node="">
</span></span><span data-dcnode-id="2513" instrument_node="">
</span></figure><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">During off season, boat trips going directly to Jomalig Island from Ungos Port and vice versa don’t have fixed schedule. We arrived in Ungos Port at around 3:30AM expecting to catch the first trip but to no avail. We were informed by the ticketing personnel that there’s no scheduled trip to Jomalig. Luckily, there was an alternative route going to a neighboring island but we had to wait for 7 hours at the port. The boat left at around 10:30AM. Here’s how:</span></p><span data-dcnode-id="2508" instrument_node="">
</span><ol data-dcnode-id="2503"><li data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Take an alternative boat going to Patnanungan Island, a neighboring island just less than an hour to Jomalig. The fare is Php350 with 4-5 hours travel time.</span></li><li data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">At the Patnanungan Port, charter another boat to Jomalig. Minimum fare is Php1,500. You can share the cost with other adventurers. There are bigger boats that can accommodate up to 20 passengers.</span></li></ol><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">There are more routes going to Jomalig Island such as via Atimonan, Quezon or via Panganiban, Camarines Sur. However, boat trips schedule of these routes are quite irregular even during peak season. If you’re coming from Metro Manila, fastest route is via Ungos Port in Real, Quezon.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><h2 data-dcnode-id="2495"><span data-dcnode-id="2496" id="WHERE_TO_STAY_IN_JOMALIG_ISLAND"><strong data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">WHERE TO STAY IN JOMALIG ISLAND</span></strong></span></h2><span data-dcnode-id="2494" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2484"><span data-dcnode-id="2493" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="2486"><span data-dcnode-id="2492" instrument_node="">
</span><img alt="Jomalig Island Resort" class="wp-image-5625 td-animation-stack-type0-2" data-dcnode-id="2491" height="428" loading="lazy" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg%3Fresize%3D696%252C465%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=1024%2C684&amp;ssl=1 1024w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=768%2C513&amp;ssl=1 768w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=696%2C465&amp;ssl=1 696w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=1068%2C713&amp;ssl=1 1068w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?resize=629%2C420&amp;ssl=1 629w, https://i0.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4.jpg?w=1080&amp;ssl=1 1080w" width="640"><span data-dcnode-id="2490" instrument_node="">
</span><span class="xc_pin" data-dcnode-id="2488" onclick="pin_this(event, 'http://pinterest.com/pin/create/button/?url=https://www.adventurouslens.com/jomalig-island/&amp;media=https://www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8619-4-1024x684.jpg&amp;description=JOMALIG ISLAND: Travel Guide, Budget and Itinerary | https://www.adventurouslens.com/jomalig-island/')"><span data-dcnode-id="2489" instrument_node="">
</span></span><span data-dcnode-id="2487" instrument_node="">
</span></span><span data-dcnode-id="2485" instrument_node="">
</span></figure><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Jomalig Island doesn’t have any posh places to stay in but various options are available such as homestay, lodges and beach resorts. Note that as of this writing, pitching tent at Salibungot beach is not allowed anymore. We stayed in South Pacific Island Resort (SPIR), “bahay kubo” style for Php500/night. It’s a beach front resort located in Sitio Salibungot and a sandbar lies nearby the place that is visible during low tide. Below are the options and rates:</span></p><span data-dcnode-id="2480" instrument_node="">
</span><ul data-dcnode-id="2471"><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Bahay Kubo (max of 5 people) – Php500/night</span></li><li data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Bahay Kubo (max of 15 people) – Php1000/night</span></li><li data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Tent Pitching (own tent) – Php150/night</span></li><li data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Cavana (for a larger group) – Php1,500/night</span></li></ul><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Tent rental is also available for Php150/night (good for 2 persons). You’ll pay a total of Php300, including the pitch fee.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">SPIR is one of the most popular, if not the best resort in Jomalig Island. It’s the tourists’ go-to-place, locals and foreigners alike. More than the view itself, the resort’s owner and staff are very accommodating. Also, the food and services offered to their guests are superb. If you want to book SPIR, please contact Nanay Thelma at the following mobile numbers:</span></p><span data-dcnode-id="2464" instrument_node="">
</span><ul data-dcnode-id="2459"><li data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">SMART – (0907) 828 5161</span></li><li data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">GLOBE – (0916) 280 0158</span></li></ul><span data-dcnode-id="2458" instrument_node="">
</span><h2 data-dcnode-id="2454"><span data-dcnode-id="2455" id="WHERE_TO_EAT_IN_JOMALIG_ISLAND"><strong data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">WHERE TO EAT IN JOMALIG ISLAND</span></strong></span></h2><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Jomalig Island’s homestays, lodges and resorts include food services. SPIR provides meals, “lutong bahay” style, at Php100/person offered in big serving – enough to fill a hungry stomach of an adventurer. You can request your preferred dish or bring your own set of ingredients then have them cooked by your host or by the chef resort.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><h2 data-dcnode-id="2446"><span data-dcnode-id="2447" id="PLACES_TO_VISIT_IN_JOMALIG_ISLAND"><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">PLACES TO VISIT IN JOMALIG ISLAND</span></strong></span></h2><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Jomalig Island’s main mode of transportation is habal-habal, it’s a motorcycle for hire wherein the passenger sits behind the driver. Habal-habal drivers offer whole day tour for Php600/person. SPIR owners have contacts to these drivers, just tell them if you want to avail habal-habal tour. Below are the places we have visited:</span></p><span data-dcnode-id="2442" instrument_node="">
</span><h3 data-dcnode-id="2438"><span data-dcnode-id="2439" id="PUNO_NG_WALANG_FOREVER"><strong data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">PUNO NG WALANG FOREVER</span></strong></span></h3><span data-dcnode-id="2437" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2427"><span data-dcnode-id="2436" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="2429"><span data-dcnode-id="2435" instrument_node="">

</span><p data-dcnode-id="2415"><span data-dcnode-id="2425" instrument_node="">The lone tree in the middle of a vast greenland is one of the top destinations in Jomalig Island. I don’t know why but it’s interesting that even a lonesome tree can become a famous tourist spot just because of Filipinos’ wit. After being named “</span><em data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Puno ng walang </span></em><span data-dcnode-id="2422" instrument_node="">forever”, it has become a mandatory phot op stop for the heartbroken or single “</span><em data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Titos</span></em><span data-dcnode-id="2419" instrument_node="">” and “</span><em data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Titas</span></em><span data-dcnode-id="2416" instrument_node="">” who haven’t found their long lasting love yet. And wait… now even couples pose here too.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><h3 data-dcnode-id="2410"><span data-dcnode-id="2411" id="GOLDEN_SANDnbspBEACH"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">GOLDEN SAND&nbsp;BEACH</span></strong></span></h3><span data-dcnode-id="2409" instrument_node="">

</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Jomalig Island is famous for its golden sand beaches but the sand in this beach is more gold-colored than the others. The beach’s small rock formations and the sand waves make this place more instagrammable. Entrance Fee is Php30/person.</span></p><span data-dcnode-id="2395" instrument_node="">
</span><h3 data-dcnode-id="2391"><span data-dcnode-id="2392" id="LITTLE_BORACAY"><strong data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">LITTLE BORACAY</span></strong></span></h3><span data-dcnode-id="2390" instrument_node="">

</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Jomalig Island is not just all about golden sand beaches. In fact, there’s a beach called Pamana White Beach Resort dubbed as the “Little Boracay”. The fine, white sand and the turquoise sea is really comparable to Boracay beach. The coconut trees, hammocks and swings added beauty to this unspoiled beach. Entrance fee is Php30/person.</span></p><span data-dcnode-id="2376" instrument_node="">

</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Aside from enjoying the beach in front of SPIR and the habal-habal tour, you can also visit other destinations such as:</span></p><span data-dcnode-id="2316" instrument_node="">
</span><ul data-dcnode-id="2301"><li data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Mangrove Area at Sitio Landing</span></li><li data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Bigwangan Lake</span></li><li data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Manlanat Islet</span></li><li data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Buton Sandbar</span></li><li data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Apple’s Beach</span></li><li data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Sitio Burungawan</span></li><li data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Go Island Hopping and Snorkeling. Explore the island by renting a fisherman’s boat for Php2000.</span></li></ul><span data-dcnode-id="2300" instrument_node="">

</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">If you plan to visit Jomalig Island, below is an ideal and non-hectic budget itinerary for 3D2N (3 days and 2 nights) coming from Metro Manila. Make necessary adjustments depending on your preferences and situation.</span></p><span data-dcnode-id="2279" instrument_node="">

</span><table class="wp-block-table" data-dcnode-id="2105"><tbody data-dcnode-id="2106"><tr data-dcnode-id="2179"><td data-dcnode-id="2183"><strong data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Particular</span></strong></td><td data-dcnode-id="2180"><strong data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Expense</span></strong></td></tr><tr data-dcnode-id="2174"><td data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Bus  from Manila to Ungos Port, Real</span></td><td data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Php 230</span></td></tr><tr data-dcnode-id="2169"><td data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Ungos Port, Real to Jomalig Island</span></td><td data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Php 400</span></td></tr><tr data-dcnode-id="2164"><td data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Environmental Fee</span></td><td data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Php 170</span></td></tr><tr data-dcnode-id="2159"><td data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Habal-habal Jomalig Port to SPIR</span></td><td data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Php 70</span></td></tr><tr data-dcnode-id="2154"><td data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">SPIR Entrance Fee</span></td><td data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Php 100</span></td></tr><tr data-dcnode-id="2149"><td data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Bahay Kubo (Php500/night times 2 divide by 3)</span></td><td data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Php 334</span></td></tr><tr data-dcnode-id="2144"><td data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Food (Php100/meal)</span></td><td data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Php 600</span></td></tr><tr data-dcnode-id="2139"><td data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Habal-habal Tour</span></td><td data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Php 600</span></td></tr><tr data-dcnode-id="2134"><td data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Tour Entrance Fees</span></td><td data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Php 130</span></td></tr><tr data-dcnode-id="2129"><td data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Habal-habal to Jomalig Port</span></td><td data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Php 70</span></td></tr><tr data-dcnode-id="2124"><td data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Boat Jomalig to Ungos Port, Real</span></td><td data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Php 400</span></td></tr><tr data-dcnode-id="2119"><td data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Tricycle Ungos Port to Bus Terminal</span></td><td data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">PHp 35</span></td></tr><tr data-dcnode-id="2114"><td data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Bus back to Manila</span></td><td data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Php 230</span></td></tr><tr data-dcnode-id="2107"><td data-dcnode-id="2111"><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Total</span></strong></td><td data-dcnode-id="2108"><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Php 3,369</span></strong></td></tr></tbody></table><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node="">If you follow above itinerary, it will set you back at </span><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Php3,400/person</span></strong><span data-dcnode-id="2100" instrument_node=""> excluding extra expenses such as snacks and drinks. Surprisingly, consumables in Jomalig Island is almost the same rate as in the mainland. As of this writing, below are the prices of some commodities:</span></p><span data-dcnode-id="2098" instrument_node="">
</span><ul data-dcnode-id="2087"><li data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">San Mig Light – Php 40/bottle</span></li><li data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Chips – Php30</span></li><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Coffee – Php15</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Coke (1.5L) – Php90</span></li><li data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">1L Bottle of Mineral Water – Php25</span></li></ul><span data-dcnode-id="2086" instrument_node="">
</span><h2 data-dcnode-id="2082"><span data-dcnode-id="2083" id="OTHER_TIPS_REMINDERS_FROM_THE_ADVENTUROUS_LENS"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">OTHER TIPS &amp; REMINDERS FROM THE ADVENTUROUS LENS</span></strong></span></h2><span data-dcnode-id="2081" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2069"><span data-dcnode-id="2080" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="2073"><span data-dcnode-id="2079" instrument_node="">
</span><img alt="Jomalig Island Tips" class="wp-image-5634 td-animation-stack-type0-1" data-dcnode-id="2078" data-recalc-dims="1" height="464" loading="lazy" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg%3Fresize%3D696%252C464%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=1024%2C683&amp;ssl=1 1024w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=300%2C200&amp;ssl=1 300w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=768%2C512&amp;ssl=1 768w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=696%2C464&amp;ssl=1 696w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=1068%2C712&amp;ssl=1 1068w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?resize=630%2C420&amp;ssl=1 630w, https://i1.wp.com/www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6.jpg?w=1080&amp;ssl=1 1080w" width="696"><span data-dcnode-id="2077" instrument_node="">
</span><span class="xc_pin" data-dcnode-id="2075" onclick="pin_this(event, 'http://pinterest.com/pin/create/button/?url=https://www.adventurouslens.com/jomalig-island/&amp;media=https://www.adventurouslens.com/wp-content/uploads/2019/02/DSCF8454-6-1024x683.jpg&amp;description=JOMALIG ISLAND: Travel Guide, Budget and Itinerary | https://www.adventurouslens.com/jomalig-island/')"><span data-dcnode-id="2076" instrument_node="">
</span></span><span data-dcnode-id="2074" instrument_node="">

</span><figcaption data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Little Boracay</span></figcaption></figure><span data-dcnode-id="2068" instrument_node="">
</span><ul data-dcnode-id="2047"><li data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Depending on the volume of passengers, Raymond Transportation bus schedule may vary. During our trip, the first trip left early from Sampaloc and we had to ride the next bus scheduled at 12mn.</span></li><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Boat trip schedule to Jomalig Island is quite irregular during off season. It’s better to ask your contact person in Jomalig to check the boat trips and the weather as well!</span></li><li data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">There’s no seating arrangement in the boat, it’s a first come, first serve basis. For convenience, be early and choose the upper deck (top load style) that allows you to lie down and sleep during the ride.</span></li><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Included in the boat fare is a simple meal served at the boat while in transit. It’s a meal freshly cooked by the boat crew.</span></li><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Jomalig Island has mobile signal and intermittent data, so you can still access your social media and update your family and loved ones.</span></li><li data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Electricity is only available between 1:00PM to 4:00AM. This schedule may vary. If you stay at SPIR, they have a generator so there’s no issue.</span></li><li data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">ATM is now available in Jomalig Island. We didn’t withdraw cash but one of the couple guests at SPIR told us they were able to get cash from ATM located at the town proper. Still, better to bring enough cash on your trip as ATM’s cash is limited.</span></li><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Jomalig Island is a whole year-round destination as long as the weather permits. Peak season is during summer.</span></li><li data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Let’s help maintain Jomalig Island’s natural beauty. Be a responsible adventurer and strictly follow the leave no trace policy. Don’t throw your garbage anywhere.</span></li><li data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Be friendly to Jomaligins, avoid too much bargaining on the rates as long as it’s reasonable. Remember that we go to an adventure to unwind while they’re there to make a living.</span></li></ul><span data-dcnode-id="2046" instrument_node="">
