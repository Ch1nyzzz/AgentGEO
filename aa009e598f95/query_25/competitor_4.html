</span><h2 data-dcnode-id="2604"><span data-dcnode-id="2609" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2608" id="i"></span><span data-dcnode-id="2607" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2606"></span><span data-dcnode-id="2605" instrument_node="">
</span></h2><span data-dcnode-id="2603" instrument_node="">
</span><h2 data-dcnode-id="2597"><span data-dcnode-id="2602" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2601" id="i-2"></span><span data-dcnode-id="2600" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2599"></span><span data-dcnode-id="2598" instrument_node="">
</span></h2><span data-dcnode-id="2596" instrument_node="">
</span><h2 data-dcnode-id="2590"><span data-dcnode-id="2595" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2594" id="How_to_plan_for_3_days_in_Big_Island"></span><span data-dcnode-id="2593" instrument_node="">How to plan for 3 days in Big Island</span><span class="ez-toc-section-end" data-dcnode-id="2592"></span><span data-dcnode-id="2591" instrument_node="">
</span></h2><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2577"><span data-dcnode-id="2588" instrument_node="">Big Island or Hawaii island, is the largest in the Hawaiian archipelago and also the southernmost in location. With abundant natural beauty, rapidly changing landscapes and Hawaii’s only active volcano (Kilauea, erupting continuously since 1983), </span><strong data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">three days in</span></strong><span data-dcnode-id="2585" instrument_node=""> </span><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Big Island</span></strong><span data-dcnode-id="2582" instrument_node="">&nbsp;include something for everyone: be it nature lovers, hikers, water babies (such as </span><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stuffitgotravelling.com/majestic-manta-ray-snorkel-in-kona/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Manta Ray snorkel</span></strong></a><span data-dcnode-id="2578" instrument_node=""> in Kona, voted as one of the top activities in Hawaii) and of course geologists and earth science folks.</span></p><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2572" instrument_node="">The two towns of </span><strong data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Hilo and Kona</span></strong><span data-dcnode-id="2569" instrument_node=""> are on opposite ends of the island and both have </span><strong data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">unique attractions</span></strong><span data-dcnode-id="2566" instrument_node=""> that should not be missed, if you plan correctly. Being the daughter of a geologist, try as I might, I could not shake off the temptation of seeing a live volcano (</span><strong data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Hilo’s prime attraction</span></strong><span data-dcnode-id="2563" instrument_node=""> and a rarity in this modern world) and so we decided to tag Big Island on to our </span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yrofthemonkey.com/travel-guide-maui-hawaii/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">original Maui itinerary</span></strong></a><span data-dcnode-id="2559" instrument_node=""> to make our first visit to Hawaii as memorable as possible.</span></p><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2551"><em data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Disclaimer: This post may contain some affiliate links. Clicking on them may earn me a small commission at no extra cost to you for the product. This teeny tiny commission will help support my blog hosting and other maintenance costs. Thank you!</span></em></p><span data-dcnode-id="2550" instrument_node="">
</span><h2 data-dcnode-id="2544"><span data-dcnode-id="2549" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2548" id="i-3"></span><span data-dcnode-id="2547" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2546"></span><span data-dcnode-id="2545" instrument_node="">
</span></h2><span data-dcnode-id="2543" instrument_node="">
</span><h2 data-dcnode-id="2537"><span data-dcnode-id="2542" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2541" id="i-4"></span><span data-dcnode-id="2540" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2539"></span><span data-dcnode-id="2538" instrument_node="">
</span></h2><span data-dcnode-id="2536" instrument_node="">
</span><h2 data-dcnode-id="2530"><span data-dcnode-id="2535" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2534" id="i-5"></span><span data-dcnode-id="2533" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2532"></span><span data-dcnode-id="2531" instrument_node="">
</span></h2><span data-dcnode-id="2529" instrument_node="">
</span><h2 data-dcnode-id="2523"><span data-dcnode-id="2528" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2527" id="Is_3_days_enough_to_see_Big_Island"></span><span data-dcnode-id="2526" instrument_node="">Is 3 days enough to see Big Island?</span><span class="ez-toc-section-end" data-dcnode-id="2525"></span><span data-dcnode-id="2524" instrument_node="">
</span></h2><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Big Island is HUGE and so it is really not possible to see everything in just three days. Also, the fact that Hilo and Kona-its two main towns are on opposite ends of the island with distinct attractions of their own means you will be spending some time driving between the two and that will inevitably take up some time.</span></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2515" instrument_node="">I recommend spending at least one day at each of these two towns, with an additional day reserved for driving down the southern rim of the island. Keep in mind, you will be missing out on some attractions in the northern part of the island, such as the beautiful, serene </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thishawaiilife.com/hapuna-beach/" rel="noopener" target="_blank"><strong data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Hapuna beach</span></strong></a><span data-dcnode-id="2511" instrument_node=""> which is north of Kona. Oh well, there is only so much you can squeeze in with three days and this gives you another excuse to return to Big island!</span></p><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2505" instrument_node="">Although three days is clearly not enough, I have tried my best to squeeze in the must see attractions of Big Island in this 3 day Big Island itinerary. These include important information on how to see Hawaii’s active volcano, where to stay on either towns of Big island and a road trip from Hilo to Kona, which is as scenic as the </span><a data-dcnode-id="2502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yrofthemonkey.com/travel-maui-road-hana/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Road to Hana in Maui</span></strong></a><span data-dcnode-id="2501" instrument_node="">!</span></p><span data-dcnode-id="2499" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2495"><img alt="Three days in Big island, Big island beach" class="aligncenter error" data-dcnode-id="2498" data-lazy-src="https://68.media.tumblr.com/9c99eace6e36bf4f78b009c2fc06e5db/tumblr_inline_oofvn74rlM1s27h5b_540.jpg" data-ll-status="error" height="552" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//68.media.tumblr.com/9c99eace6e36bf4f78b009c2fc06e5db/tumblr_inline_oofvn74rlM1s27h5b_540.jpg&amp;raw" width="540"><noscript data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/9c99eace6e36bf4f78b009c2fc06e5db/tumblr_inline_oofvn74rlM1s27h5b_540.jpg" alt="Three days in Big island, Big island beach" width="540" height="552"&gt;</span></noscript></figure><span data-dcnode-id="2494" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2493"></figure><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2489" instrument_node="">
</span><h2 data-dcnode-id="2483"><span data-dcnode-id="2488" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2487" id="i-6"></span><span data-dcnode-id="2486" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2485"></span><span data-dcnode-id="2484" instrument_node="">
</span></h2><span data-dcnode-id="2482" instrument_node="">
</span><h2 data-dcnode-id="2476"><span data-dcnode-id="2481" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2480" id="i-7"></span><span data-dcnode-id="2479" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2478"></span><span data-dcnode-id="2477" instrument_node="">
</span></h2><span data-dcnode-id="2475" instrument_node="">
</span><h2 data-dcnode-id="2469"><span data-dcnode-id="2474" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2473" id="i-8"></span><span data-dcnode-id="2472" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2471"></span><span data-dcnode-id="2470" instrument_node="">
</span></h2><span data-dcnode-id="2468" instrument_node="">
</span><h2 data-dcnode-id="2462"><span data-dcnode-id="2467" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2466" id="Where_to_stay_in_Big_Island_Hilo"></span><span data-dcnode-id="2465" instrument_node="">Where to stay in Big Island: Hilo</span><span class="ez-toc-section-end" data-dcnode-id="2464"></span><span data-dcnode-id="2463" instrument_node="">
</span></h2><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">When you start planning for your Big Island trip, it will become very obvious to you that the two main towns in question here are Hilo and Kona, lying on opposite ends of the island, with a good 2.5-4hr drive between the two depending on the route. Hilo is a small town with sparse population but abundant natural beauty and the Volcano National Park while Kona is where the tourists flock to for coffee and chocolate tours as well as resorts and restaurants.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">At the very outset I suggest divide your time equally between the two parts of the island and therefore make accommodations accordingly, because let’s face it-the idea of driving back in pitch darkness from Hilo to Kona after a beautiful night of lava watching, post a tedious hike no less, is not exactly very exciting or safe.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2448" instrument_node="">We flew into Hilo from Maui since we wanted to see the lava flow from the active Kilauea volcano, which is undoubtedly one of the top most </span><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Hilo attractions</span></strong><span data-dcnode-id="2445" instrument_node="">. We stayed at the beautiful </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g60607-d111584-Reviews-Hale_Ohia_Cottages-Volcano_Island_of_Hawaii_Hawaii.html" rel="nofollow noopener noreferrer" target="_blank"><b data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Hale Ohia cottages</span></b></a><span data-dcnode-id="2441" instrument_node="">, a mere 12 min drive from the Volcano National park itself.</span></p><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">The cottages are extremely affordable with friendly staff and the rooms are beautiful with their own bathrooms. There is greenery wherever the eyes wander and protected parking in a shed in the property itself. There is also a small kitchenette with a fridge and breakfast items like freshly baked Hawaiian fruit bread and fruits (banana and cut papaya). We loved our stay there because of the convenience, location, good value for money and amenities.</span></p><span data-dcnode-id="2433" instrument_node="">
</span><div data-dcnode-id="2427" style="background-color: #e7dbf2; padding: 1.0em; max-width: 65.0em; margin: 1.0em 0; border: solid 2.0px #cccccc;"><strong data-dcnode-id="2428"><span data-dcnode-id="2432" instrument_node=""> YOU MAY LIKE: – </span><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//explorenowornever.com/what-to-pack-for-maui/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2431" instrument_node="">What to pack for Hawaii</span></a><span data-dcnode-id="2429" instrument_node="">: A complete guide for first timers</span></strong></div><span data-dcnode-id="2426" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2422"><img alt="Big island Hotel" class="aligncenter error" data-dcnode-id="2425" data-lazy-src="https://68.media.tumblr.com/df4928a673c208cbdaeb62de86428d4d/tumblr_inline_oofwn0OL4i1s27h5b_540.jpg" data-ll-status="error" height="540" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//68.media.tumblr.com/df4928a673c208cbdaeb62de86428d4d/tumblr_inline_oofwn0OL4i1s27h5b_540.jpg&amp;raw" width="540"><noscript data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/df4928a673c208cbdaeb62de86428d4d/tumblr_inline_oofwn0OL4i1s27h5b_540.jpg" alt="Big island Hotel" width="540" height="540"&gt;</span></noscript></figure><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2418" instrument_node="">
</span><h2 data-dcnode-id="2412"><span data-dcnode-id="2417" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2416" id="i-9"></span><span data-dcnode-id="2415" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2414"></span><span data-dcnode-id="2413" instrument_node="">
</span></h2><span data-dcnode-id="2411" instrument_node="">
</span><h2 data-dcnode-id="2405"><span data-dcnode-id="2410" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2409" id="i-10"></span><span data-dcnode-id="2408" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2407"></span><span data-dcnode-id="2406" instrument_node="">
</span></h2><span data-dcnode-id="2404" instrument_node="">
</span><h2 data-dcnode-id="2397"><span data-dcnode-id="2403" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2402" id="Main_attractions_in_Hilo_for_your_Big_Island_3_day_itinerary"></span><b data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Main attractions in Hilo for your Big Island 3 day itinerary&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="2399"></span><span data-dcnode-id="2398" instrument_node="">
</span></h2><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2393" instrument_node="">
</span><h3 data-dcnode-id="2387"><span data-dcnode-id="2392" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2391" id="Waterfalls_in_Big_Island"></span><span data-dcnode-id="2390" instrument_node="">Waterfalls in Big Island</span><span class="ez-toc-section-end" data-dcnode-id="2389"></span><span data-dcnode-id="2388" instrument_node="">
</span></h3><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2374"><strong data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Your 3 days in Big Island will be spent</span></strong><span data-dcnode-id="2383" instrument_node=""> amidst the lap of nature starting with the waterfalls in Hilo. This part of the island boasts of several waterfalls, big and small, one of which is the extremely popular </span><b data-dcnode-id="2380"><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/big-island/regions-neighborhoods/hilo/wailuku-state-park/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2382" instrument_node="">Rainbow falls</span></a></b><span data-dcnode-id="2379" instrument_node=""> in the Wailuku river state park, plunging from a height of 100 ft. This is also one of the best and most popular </span><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wedreamoftravel.com/big-island-photography-locations/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Big Island Photography locations</span></strong></a><span data-dcnode-id="2375" instrument_node="">!</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">On sunny days, the water drops create a beautiful rainbow arc, thus lending the falls its name. You can view the falls from either the enclosed area near the parking lot or from above and it is simply gorgeous. Arrive early to avoid eager crowds and watch your step as you ascend up the stair for an aerial view.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2363"><img alt="Rainbow waterfalls in Hilo" class="aligncenter" data-dcnode-id="2366" data-lazy-src="https://68.media.tumblr.com/20f54c9c830aa07c5977f5a7ce35a382/tumblr_inline_oofvp3cGGg1s27h5b_540.jpg" height="654" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20654'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/20f54c9c830aa07c5977f5a7ce35a382/tumblr_inline_oofvp3cGGg1s27h5b_540.jpg" alt="Rainbow waterfalls in Hilo" width="540" height="654"&gt;</span></noscript></figure><span data-dcnode-id="2362" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2361"></figure><span data-dcnode-id="2360" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2359"></figure><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2351" instrument_node="">Next, comes the </span><b data-dcnode-id="2347"><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiistateparks.org/parks/hawaii/akaka-falls-state-park/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2350" instrument_node="">Akaka falls state park</span></a><span data-dcnode-id="2348" instrument_node="">&nbsp;</span></b><span data-dcnode-id="2346" instrument_node="">where you get to see two falls for the price of one! Honestly, the only price you is for parking and that two a mere $2 if you park just outside the park lines on the roadside. A short hike through dense vegetation of blooming orchids and fern will lead you first to the 100ft drop of Kahuna falls and then then majestic Akaka falls, plummeting through a height of 442 ft (twice that of Niagara falls).</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2340" instrument_node="">This is a “</span><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">free falling</span></strong><span data-dcnode-id="2337" instrument_node="">” falls, the drop being facilitated by the deep gorge cut by the KoleKole stream into the basaltic rock and ashes of the now dormant Mauna Kea, another volcano on the island. USA’s highest waterfall is also on the Big Island and is the </span><b data-dcnode-id="2334"><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//independenttravelcats.com/2013/08/18/must-see-waterfalls-on-the-big-island-of-hawaii/" rel="nofollow"><span data-dcnode-id="2336" instrument_node="">Waihilau falls</span></a></b><span data-dcnode-id="2333" instrument_node=""> that drops a whopping 2600 ft into the Waimanu valley. We had to give this one a miss since we were planning to drive to Kona via the south and this is on the northern part of the island.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2327"><img alt="Akaka falls state park in Hilo" class="aligncenter" data-dcnode-id="2330" data-lazy-src="https://68.media.tumblr.com/1746d328268a0dd5364a42267766a2e4/tumblr_inline_oofvs2w1fd1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/1746d328268a0dd5364a42267766a2e4/tumblr_inline_oofvs2w1fd1s27h5b_540.jpg" alt="Akaka falls state park in Hilo" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="2326" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2325"></figure><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2309"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">One more cool stop that you should include in your 3 day Big Island itinerary</span></strong><span data-dcnode-id="2315" instrument_node=""> is the </span><b data-dcnode-id="2311"><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.instanthawaii.com/cgi-bin/hi%3FParks.kole" rel="nofollow"><span data-dcnode-id="2314" instrument_node="">Kolekole Beach County Park</span></a><span data-dcnode-id="2312" instrument_node="">&nbsp;</span></b><span data-dcnode-id="2310" instrument_node="">on the&nbsp;Hāmākua Coast in South Hilo, where the Akaka falls actually meets the Kolekole stream that joins the ocean. The park is beautiful for family picnics and you get a strange sense of tranquility by watching the waves break on the rocks. Plus, it is not everyday that you get to see the start and end of a water fall’s journey, so a stop at this park is definitely worth the detour.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2304"><img alt="Kolekole beach county Park in Big Island" class="aligncenter" data-dcnode-id="2307" data-lazy-src="https://68.media.tumblr.com/dcb6a95499c199b93456915b103e5800/tumblr_inline_oofvv46rBl1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/dcb6a95499c199b93456915b103e5800/tumblr_inline_oofvv46rBl1s27h5b_540.jpg" alt="Kolekole beach county Park in Big Island" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2300" instrument_node="">
</span><h3 data-dcnode-id="2294"><span data-dcnode-id="2299" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2298" id="i-11"></span><span data-dcnode-id="2297" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2296"></span><span data-dcnode-id="2295" instrument_node="">
</span></h3><span data-dcnode-id="2293" instrument_node="">
</span><h3 data-dcnode-id="2287"><span data-dcnode-id="2292" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2291" id="i-12"></span><span data-dcnode-id="2290" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2289"></span><span data-dcnode-id="2288" instrument_node="">
</span></h3><span data-dcnode-id="2286" instrument_node="">
</span><h3 data-dcnode-id="2280"><span data-dcnode-id="2285" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2284" id="Lava_flow_watching"></span><span data-dcnode-id="2283" instrument_node="">Lava flow watching</span><span class="ez-toc-section-end" data-dcnode-id="2282"></span><span data-dcnode-id="2281" instrument_node="">
</span></h3><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2278" instrument_node="">From verdant greenery to a dystopian landscape marred by dark swathes of </span><b data-dcnode-id="2275"><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pillow_lava" rel="nofollow"><span data-dcnode-id="2277" instrument_node="">pillow lava</span></a></b><span data-dcnode-id="2274" instrument_node="">, Big Island is full of surprises at every bend. </span><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Hilo’s biggest attraction</span></strong><span data-dcnode-id="2271" instrument_node=""> is definitely watching the lava flow from the active Kilauea volcano. </span><strong data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Honestly, if there is one thing that you need to include in your 3 day Big Island itinerary, this should be it.</span></strong></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2263" instrument_node="">Please bear in mind that the lava watching sites are not at the volcano national park per se and all you can see from the crater rim drive or the Jaggar museum is the smoke from the volcanic crater from a distance. </span><strong data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">The Kalapana viewing area</span></strong><span data-dcnode-id="2260" instrument_node=""> is one of the many spots in the park, an hour’s drive from Jaggar museum, where the lava flows into the ocean in Kamoamoa, while gushing out from the&nbsp;Puʻu ʻŌʻō vent in the East Rift zone.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Once you reach the lava flow viewing spot, you either have to bike (40 min) or hike (2 hrs) on the rough, volcanic terrain to get to the designated viewing spot. We got a tandem bike (this is the point where I admit, amidst a hot cauldron of tears of shame, that I cannot bike and hence this arrangement) and pedaled our way up to the viewing area which was already crowded bumper to bumper with people trying to get a glimpse of the lava.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2248" instrument_node="">Our bike rental company was </span><b data-dcnode-id="2245"><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kaimurentals.com/%3Fgclid%3DCj0KEQjwicfHBRCh6KaMp4-asKgBEiQA8GH2xwavztgdGpGHqe6hHss99YRjbH2qM8G8wfkC9UT2MCsaArai8P8HAQ" rel="nofollow"><span data-dcnode-id="2247" instrument_node="">Kaimu rentals</span></a></b><span data-dcnode-id="2244" instrument_node=""> (open till 9PM) and the staff was very friendly and encouraging despite my wimpy, non-existent biking skills. </span><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/havo/planyourvisit/lava2.htm" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Please read the Hawaii National Parks website for current updates on lava viewing</span></strong></a><span data-dcnode-id="2240" instrument_node="">. It is also a good idea to check out the </span><b data-dcnode-id="2237"><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hvo.wr.usgs.gov/activity/kilaueastatus.php" rel="nofollow"><span data-dcnode-id="2239" instrument_node="">daily lava flow update</span></a></b><span data-dcnode-id="2236" instrument_node=""> to figure out the locations that will be available for viewing.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2231" instrument_node="">
</span><h4 data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Tips for safely watching the lava flow</span></h4><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Lava viewing is a once in a lifetime, surreal experience and if you take proper precautions, you will live to tell the tale and savor those amazing photos. To begin with, the best viewing time is between 3-9 PM, i.e. the darker it gets the better it is, so please come armed with flashlights.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">The terrain understandably is extremely uneven, rough and difficult to navigate, so please wear appropriate clothes (trousers/jeans/basically anything that covers the legs) and sturdy hiking footwear. Based on the direction, drift and intensity, lava flow and thus the viewing areas and locations will change.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Always follow all posted signs by park rangers and do not try to get into the cordoned area for a sneak peak since these are fragile lava platforms and break off into the ocean.&nbsp;</span></p><span data-dcnode-id="2213" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2209"><img alt="Lava flow sighting in Hilo, Big Island, Hawaii" class="aligncenter" data-dcnode-id="2212" data-lazy-src="https://68.media.tumblr.com/2e671d9e010e4834fe98d7fab76e1f63/tumblr_inline_oofvxkH3YS1s27h5b_540.jpg" height="389" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20389'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/2e671d9e010e4834fe98d7fab76e1f63/tumblr_inline_oofvxkH3YS1s27h5b_540.jpg" alt="Lava flow sighting in Hilo, Big Island, Hawaii" width="540" height="389"&gt;</span></noscript></figure><span data-dcnode-id="2208" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2207"></figure><span data-dcnode-id="2206" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2202"><img alt="Lava flow sighting in Big Island, Hawaii" class="aligncenter" data-dcnode-id="2205" data-lazy-src="https://68.media.tumblr.com/a42e697abaedc5a2f012d57f1ac64e5b/tumblr_inline_oofvx9F1uY1s27h5b_540.jpg" height="401" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20401'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/a42e697abaedc5a2f012d57f1ac64e5b/tumblr_inline_oofvx9F1uY1s27h5b_540.jpg" alt="Lava flow sighting in Big Island, Hawaii" width="540" height="401"&gt;</span></noscript></figure><span data-dcnode-id="2201" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2197"><img alt="Lava flow watching should be on your Big Island 3 day itinerary" class="aligncenter" data-dcnode-id="2200" data-lazy-src="https://68.media.tumblr.com/612e2a11376d13e4a07a8f4d8f312621/tumblr_inline_oofvxetyZO1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/612e2a11376d13e4a07a8f4d8f312621/tumblr_inline_oofvxetyZO1s27h5b_540.jpg" alt="Lava flow watching should be on your Big Island 3 day itinerary" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="2196" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2195"></figure><span data-dcnode-id="2194" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2190"><img alt="Lava flow sighting in Big island, three days in big island" class="aligncenter" data-dcnode-id="2193" data-lazy-src="https://68.media.tumblr.com/62688f69f0ce851068fb0968a4654927/tumblr_inline_oofvxozjHp1s27h5b_540.jpg" height="360" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20360'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/62688f69f0ce851068fb0968a4654927/tumblr_inline_oofvxozjHp1s27h5b_540.jpg" alt="Lava flow sighting in Big island, three days in big island" width="540" height="360"&gt;</span></noscript></figure><span data-dcnode-id="2189" instrument_node="">
</span><h2 data-dcnode-id="2183"><span data-dcnode-id="2188" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2187" id="i-13"></span><span data-dcnode-id="2186" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2185"></span><span data-dcnode-id="2184" instrument_node="">
</span></h2><span data-dcnode-id="2182" instrument_node="">
</span><h2 data-dcnode-id="2176"><span data-dcnode-id="2181" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2180" id="i-14"></span><span data-dcnode-id="2179" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2178"></span><span data-dcnode-id="2177" instrument_node="">
</span></h2><span data-dcnode-id="2175" instrument_node="">
</span><h2 data-dcnode-id="2169"><span data-dcnode-id="2174" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2173" id="i-15"></span><span data-dcnode-id="2172" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="2171"></span><span data-dcnode-id="2170" instrument_node="">
</span></h2><span data-dcnode-id="2168" instrument_node="">
</span><h2 data-dcnode-id="2161"><span data-dcnode-id="2167" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2166" id="Big_Island_road_trip_From_Hilo_to_Kona_via_the_Islands_southern_rim"></span><b data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Big Island road trip: From Hilo to Kona via the Island’s southern rim</span></b><span class="ez-toc-section-end" data-dcnode-id="2163"></span><span data-dcnode-id="2162" instrument_node="">
</span></h2><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2159" instrument_node="">Our flight home to San Francisco was from </span><strong data-dcnode-id="2155"><span data-dcnode-id="2158" instrument_node="">Kona, known for some of the </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitravelwithkids.com/best-big-island-luaus/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2157" instrument_node="">best Luaus on Big island</span></a></strong><span data-dcnode-id="2154" instrument_node="">, so we decided to spend our last day and half there exploring the many </span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Kona attractions during our three days in Big Island</span></strong><span data-dcnode-id="2151" instrument_node="">.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2145" instrument_node="">The </span><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">drive from Hilo to Kona</span></strong><span data-dcnode-id="2142" instrument_node=""> can have several possible routes depending on how much time you have on your hands to devote to all the picturesque stops. </span><strong data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">We decided to take the route grazing the southernmost tip of the island and in retrospect, are extremely happy with our decision because a Big Island 3 day itinerary is not a whole lot of time to see everything!</span></strong></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2135" instrument_node="">
</span><h3 data-dcnode-id="2129"><span data-dcnode-id="2134" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2133" id="First_stop_on_Big_Island_road_trip_Punaluu_black_sand_beach"></span><span data-dcnode-id="2132" instrument_node="">First stop on Big Island road trip: Punalu’u black sand beach</span><span class="ez-toc-section-end" data-dcnode-id="2131"></span><span data-dcnode-id="2130" instrument_node="">
</span></h3><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2127" instrument_node="">We first stopped by the </span><b data-dcnode-id="2123"><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/big-island/regions-neighborhoods/kau/punaluu-black-sand-beach/" rel="nofollow"><span data-dcnode-id="2126" instrument_node="">Punalu’u black sand beach</span></a><span data-dcnode-id="2124" instrument_node="">&nbsp;</span></b><span data-dcnode-id="2122" instrument_node="">where thanks to volcanic activity, the sand is pitch black. This is also where we met our first Hawaiian turtle snoozing in the sun. Hawaiian turtles are state property and part of the conservation efforts by the state. Just as you would not like to be bothered or fiddled with while sunbathing, so do turtles. Please watch them from a distance, do not touch or disturb them or try to feed or ride them. In short, obey posted signs and let sleeping turtles lie!</span></p><span data-dcnode-id="2120" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2116"><img alt="Road trip from Hilo to Kona, big island, Hawaii" class="aligncenter" data-dcnode-id="2119" data-lazy-src="https://68.media.tumblr.com/cb7a5f959f8c68a912c8433c8e9e54fc/tumblr_inline_oofw1ecVQv1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/cb7a5f959f8c68a912c8433c8e9e54fc/tumblr_inline_oofw1ecVQv1s27h5b_540.jpg" alt="Road trip from Hilo to Kona, big island, Hawaii" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="2115" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2114"></figure><span data-dcnode-id="2113" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2112"></figure><span data-dcnode-id="2111" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2107"><img alt="Hawaii beaches with sleeping tortoise" class="aligncenter" data-dcnode-id="2110" data-lazy-src="https://68.media.tumblr.com/1879b75f9c7e372320fb22e758aaec81/tumblr_inline_oofw0iyPGo1s27h5b_540.jpg" height="691" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20691'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/1879b75f9c7e372320fb22e758aaec81/tumblr_inline_oofw0iyPGo1s27h5b_540.jpg" alt="Hawaii beaches with sleeping tortoise" width="540" height="691"&gt;</span></noscript></figure><span data-dcnode-id="2106" instrument_node="">

</span><h3 data-dcnode-id="2094"><span data-dcnode-id="2099" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2098" id="Hilo_to_Kona_road_trip_Stopping_at_Punaluu_bake_shop"></span><span data-dcnode-id="2097" instrument_node="">Hilo to Kona road trip: Stopping at Punalu’u bake shop</span><span class="ez-toc-section-end" data-dcnode-id="2096"></span><span data-dcnode-id="2095" instrument_node="">
</span></h3><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2092" instrument_node="">After the beach,&nbsp;</span><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">which was the first stop on our Big island road trip,</span></strong><span data-dcnode-id="2089" instrument_node=""> comes&nbsp;</span><span data-dcnode-id="2085" style="color: #6eb48c;"><b data-dcnode-id="2086"><u data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Punalu’u</span></u></b></span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bakeshophawaii.com/" rel="noopener noreferrer" style="font-weight: bold;" target="_blank"><span data-dcnode-id="2084" instrument_node="">&nbsp;bake&nbsp;shop</span></a><span data-dcnode-id="2082" instrument_node="">, USA’s southernmost bakery serving yummy malasadas (Hawaiian donuts of Portuguese origin) and other tasty treats. This is a good place to stop for refueling, getting a taste of the </span><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">famous Kona coffee ice cream</span></strong><span data-dcnode-id="2079" instrument_node=""> or simply picking up a bag of macadamia nut cookies.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2073"><img alt="Punalu'u bake shop, Hawaii, 3 days in Big Island" class="aligncenter" data-dcnode-id="2076" data-lazy-src="https://68.media.tumblr.com/46a03c9dd2a8fd75f113f6b8cc004936/tumblr_inline_oofxpukqDp1s27h5b_540.jpg" height="370" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20370'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/46a03c9dd2a8fd75f113f6b8cc004936/tumblr_inline_oofxpukqDp1s27h5b_540.jpg" alt="Punalu'u bake shop, Hawaii, 3 days in Big Island" width="540" height="370"&gt;</span></noscript></figure><span data-dcnode-id="2072" instrument_node="">

</span><h3 data-dcnode-id="2059"><span data-dcnode-id="2065" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="2064" id="Must_see_stop_from_Hilo_to_Kona_Papakolea_green_sand_beach"></span><strong data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Must see stop from Hilo to Kona: Papakōlea green sand beach</span></strong><span class="ez-toc-section-end" data-dcnode-id="2061"></span><span data-dcnode-id="2060" instrument_node="">
</span></h3><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2057" instrument_node="">Next, comes one of </span><strong data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Big Island’s most inaccessible beaches</span></strong><span data-dcnode-id="2054" instrument_node=""> which is a 6 mile drive across extremely rough terrain to a cliff of jagged volcanic rocks which you have to climb down to get to a mossy green beach, aptly titled&nbsp;</span><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Papakōlea green sand beach</span></strong><span data-dcnode-id="2051" instrument_node="">. Again, the color is due to volcanic activity.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2045" instrument_node="">Unless you have a four wheel drive and guts of steel, do not try to drive down that undeveloped path full of twists and turns (the hike is about 3 hrs). We got a shuttle which was more like a small rig/truck with a driver armed with </span><b data-dcnode-id="2042"><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//madmax.wikia.com/wiki/Imperator_Furiosa" rel="nofollow"><span data-dcnode-id="2044" instrument_node="">Furiosa</span></a></b><span data-dcnode-id="2041" instrument_node=""> like driving skills who drove through this unbelievably inhospitable terrain to get us to the ledge from where we could get down to the beach. My body violently lurched side to side as I held on to the handle of the rig while standing on the back for dear life and was extremely glad to set foot on land once those never ending six miles were covered.&nbsp;</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2035" instrument_node="">All I can say is that all that bodily pain simply melted away as walked on that beautiful strip of green sand and stared at the crystal blue water for the longest time. The cliffs on all sides were peculiar layered striations on them which I am guessing is also a result of lava deposition in layers and wind/water action against the basalt. Albeit difficult to get to, I do recommend that you try visiting this beach as part of your </span><strong data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Big Island 3 day itinerary!</span></strong></p><span data-dcnode-id="2031" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="2027"><img alt="Papakōlea green sand beach" class="aligncenter" data-dcnode-id="2030" data-lazy-src="https://68.media.tumblr.com/39764e65204d17094542c7b028e79eed/tumblr_inline_oofw2rwJOq1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/39764e65204d17094542c7b028e79eed/tumblr_inline_oofw2rwJOq1s27h5b_540.jpg" alt="Papakōlea green sand beach" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="2026" instrument_node="">
