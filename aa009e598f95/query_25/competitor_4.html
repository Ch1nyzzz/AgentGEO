</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1974" instrument_node="">
</span><h3 data-dcnode-id="1968"><span data-dcnode-id="1973" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1972" id="_Fourth_stop_Ka_Lae"></span><span data-dcnode-id="1971" instrument_node="">&nbsp;Fourth stop: Ka Lae</span><span class="ez-toc-section-end" data-dcnode-id="1970"></span><span data-dcnode-id="1969" instrument_node="">
</span></h3><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1966" instrument_node="">If you’ve reached this far on your </span><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Big Island road trip</span></strong><span data-dcnode-id="1963" instrument_node="">, do not ignore the lure of the small fishing village of Ka Lae, which is also where the </span><strong data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">southernmost tip of USA lies</span></strong><span data-dcnode-id="1960" instrument_node="">. It is speculated that Polynesians first came to Hawaii through this point and made this island their home.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Standing on a tiny wooden stool jutting out from a cliff with the endless Pacific blue in front of me, I could not help but wonder about their journey and of the millions of other such stories of human migration that have occurred in the past across ocean waters. To me, that one moment where I simply stood at what was the last piece of US land in the southernmost part of the northern hemisphere, was perhaps my most memorable one during this entire trip.</span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">By the way, amidst all this serious contemplation, I also managed to catch sight of a brave local diving right into the water from the cliffs above. This was nothing short of eye popping for someone who is terrified at the thought of wetting her toes in ocean water, no matter how warm.</span></p><span data-dcnode-id="1946" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1942"><img alt="Southernmost point of USA" class="aligncenter" data-dcnode-id="1945" data-lazy-src="https://68.media.tumblr.com/be7aed8bc0c179beca3040516fb50c85/tumblr_inline_oofwa0t9NC1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/be7aed8bc0c179beca3040516fb50c85/tumblr_inline_oofwa0t9NC1s27h5b_540.jpg" alt="Southernmost point of USA" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="1941" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1940"></figure><span data-dcnode-id="1939" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1935"><img alt="Things to do in Big Island for 3 days" class="aligncenter" data-dcnode-id="1938" data-lazy-src="https://68.media.tumblr.com/29a6dfc19950056fa18be94bc26ac1f7/tumblr_inline_oofwa0VPGa1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/29a6dfc19950056fa18be94bc26ac1f7/tumblr_inline_oofwa0VPGa1s27h5b_540.jpg" alt="Things to do in Big Island for 3 days" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="1934" instrument_node="">
</span><h2 data-dcnode-id="1928"><span data-dcnode-id="1933" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1932" id="i-16"></span><span data-dcnode-id="1931" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1930"></span><span data-dcnode-id="1929" instrument_node="">
</span></h2><span data-dcnode-id="1927" instrument_node="">
</span><h2 data-dcnode-id="1921"><span data-dcnode-id="1926" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1925" id="i-17"></span><span data-dcnode-id="1924" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1923"></span><span data-dcnode-id="1922" instrument_node="">
</span></h2><span data-dcnode-id="1920" instrument_node="">
</span><h2 data-dcnode-id="1913"><span data-dcnode-id="1919" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1918" id="3_days_in_Big_Island_Where_to_stay_in_Kona"></span><b data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">3 days in Big Island: Where to stay in Kona</span></b><span class="ez-toc-section-end" data-dcnode-id="1915"></span><span data-dcnode-id="1914" instrument_node="">
</span></h2><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1911" instrument_node="">We reached Kona well past sunset and checked into </span><b data-dcnode-id="1908"><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Kona_Palace_in_Captain_Cook.htm%3Fa_aid%3D206728" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1910" instrument_node="">Kona palace</span></a></b><span data-dcnode-id="1907" instrument_node="">, a charming little B&amp;B (a private home actually) in Captain Cook, with acres of beautiful garden and run by a friendly Texan lady who had decided to move to Hawaii by way of Nebraska. Breakfast is served at 8:30 and despite the some not nice reviews, we found our host to be extremely friendly and welcoming.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">We had booked our stay at the very last minute when we decided to drive to Kona for an extra day and so really appreciated her accommodating us on such short notice. I know this is kind of sensitive, but I want to be honest about our experience since travelers come from different backgrounds and faith and might not be comfortable in certain situations.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">The website for Kona palace says&nbsp;“Christian owner” but that should not deter you since our host did not even for once try to push her faith on us (lots of religion related books in the guest-room though). I just wanted to clarify this to those of you who might not feel comfortable staying somewhere where the owners profess their faith openly but I think that is transparent policy to have in order to avoid surprises.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1889"><img alt="Big island hotels" class="aligncenter" data-dcnode-id="1892" data-lazy-src="https://68.media.tumblr.com/e9c763b200e4f502b0571bb3c881c4cc/tumblr_inline_oofwa2Dtjv1s27h5b_540.jpg" height="475" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20475'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/e9c763b200e4f502b0571bb3c881c4cc/tumblr_inline_oofwa2Dtjv1s27h5b_540.jpg" alt="Big island hotels" width="540" height="475"&gt;</span></noscript></figure><span data-dcnode-id="1888" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1887"></figure><span data-dcnode-id="1886" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1882"><img alt="Chocolate and coffee tour in Kona, Hawaii" class="aligncenter" data-dcnode-id="1885" data-lazy-src="https://68.media.tumblr.com/4edf3a84ab6863c6acc4c2b542bd0d89/tumblr_inline_oofwwyTvFr1s27h5b_540.jpg" height="540" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20540'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/4edf3a84ab6863c6acc4c2b542bd0d89/tumblr_inline_oofwwyTvFr1s27h5b_540.jpg" alt="Chocolate and coffee tour in Kona, Hawaii" width="540" height="540"&gt;</span></noscript></figure><span data-dcnode-id="1881" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1880"></figure><span data-dcnode-id="1879" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1875"><img alt="Coffee tour in Kona, Big Island" class="aligncenter" data-dcnode-id="1878" data-lazy-src="https://68.media.tumblr.com/90f105f321cb0994a7d8e4e93c4c3573/tumblr_inline_oofwft5XVh1s27h5b_540.jpg" height="598" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20598'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/90f105f321cb0994a7d8e4e93c4c3573/tumblr_inline_oofwft5XVh1s27h5b_540.jpg" alt="Coffee tour in Kona, Big Island" width="540" height="598"&gt;</span></noscript></figure><span data-dcnode-id="1874" instrument_node="">
</span><h2 data-dcnode-id="1868"><span data-dcnode-id="1873" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1872" id="i-18"></span><span data-dcnode-id="1871" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1870"></span><span data-dcnode-id="1869" instrument_node="">
</span></h2><span data-dcnode-id="1867" instrument_node="">
</span><h2 data-dcnode-id="1861"><span data-dcnode-id="1866" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1865" id="i-19"></span><span data-dcnode-id="1864" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1863"></span><span data-dcnode-id="1862" instrument_node="">
</span></h2><span data-dcnode-id="1860" instrument_node="">
</span><h2 data-dcnode-id="1854"><span data-dcnode-id="1859" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1858" id="Things_to_do_in_Kona_during_your_3_days_in_Big_Island"></span><span data-dcnode-id="1857" instrument_node="">Things to do in Kona during your 3 days in Big Island</span><span class="ez-toc-section-end" data-dcnode-id="1856"></span><span data-dcnode-id="1855" instrument_node="">
</span></h2><span data-dcnode-id="1853" instrument_node="">
</span><h3 data-dcnode-id="1847"><span data-dcnode-id="1852" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1851" id="i-20"></span><span data-dcnode-id="1850" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1849"></span><span data-dcnode-id="1848" instrument_node="">
</span></h3><span data-dcnode-id="1846" instrument_node="">
</span><h3 data-dcnode-id="1840"><span data-dcnode-id="1845" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1844" id="Coffee_tour_and_chocolates"></span><span data-dcnode-id="1843" instrument_node="">Coffee tour and chocolates</span><span class="ez-toc-section-end" data-dcnode-id="1842"></span><span data-dcnode-id="1841" instrument_node="">
</span></h3><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1838" instrument_node="">Kona is a big town and like any other coastal towns, has that one main street running along the marina which is crowded to the D with tourists. That should not stop you from visiting the Scandinavian shaved ice parlor or get a tour of the many coffee mills or chocolate factories, brewing and selling the two prides of Hawaii, i.e. </span><b data-dcnode-id="1835"><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kona_coffee" rel="nofollow"><span data-dcnode-id="1837" instrument_node="">Kona coffee</span></a></b><span data-dcnode-id="1834" instrument_node=""> and </span><b data-dcnode-id="1831"><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chocolate-revolution.com/beans.php" rel="nofollow"><span data-dcnode-id="1833" instrument_node="">Criollo chocolate</span></a></b><span data-dcnode-id="1830" instrument_node=""> (considered one of the rarest chocolates in the world since they are not disease resistant).</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1824" instrument_node="">For those who would love to know more about Kona coffee, here is an excellent article on the </span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creatorsofcoffee.com/best-kona-coffee/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">best Kona Coffee beans</span></strong></a><span data-dcnode-id="1820" instrument_node=""> and where to find them.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1814" instrument_node="">Even if you are not big on coffee, and Kona Coffee can be very strong, do check out the tiny, local Holualoa Kona coffee company where a self guided coffee tour is offered which is one of the many </span><strong data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">attractions of Kona</span></strong><span data-dcnode-id="1811" instrument_node="">. Here, you get to sip some amazing coffee, find out the difference between drum and air roasted varieties, get a </span><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">self-guided coffee tour</span></strong><span data-dcnode-id="1808" instrument_node=""> of the place and see how coffee is plucked (they have their own coffee farm) to how the beans are separated and roasted and finally go home with some excellent Kona coffee and coffee bean (lovingly called peaberry) coated with chocolate (warning-extremely addictive).</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1802" instrument_node="">The farm had some Toulouse geese employed who apparently provide precious fertilizer and &nbsp;are mean, clucking weed killing machines. The other place to visit would be the nearby is the </span><b data-dcnode-id="1799"><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohcf.us/index.html" rel="nofollow"><span data-dcnode-id="1801" instrument_node="">Original Hawaiian chocolate factory</span></a></b><span data-dcnode-id="1798" instrument_node=""> which offers farm tours every Wednesday and Friday. We missed the tour but got to take some delicious chocolates for friends and family from their shop! For those of you looking to do things beyond just eating, this </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exploringkiwis.com/fair-wind-snorkeling-kona-hawaii-review/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">review on snorkeling in Kona</span></strong></a><span data-dcnode-id="1794" instrument_node=""> is definitely inspiring for underwater adventure!</span></p><span data-dcnode-id="1792" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1788"><img alt="Coffee tour in Kona, Big Island" class="aligncenter" data-dcnode-id="1791" data-lazy-src="https://68.media.tumblr.com/426fe280451cb2ed415abddc55046bed/tumblr_inline_oofwtzotDn1s27h5b_540.jpg" height="540" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20540'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/426fe280451cb2ed415abddc55046bed/tumblr_inline_oofwtzotDn1s27h5b_540.jpg" alt="Coffee tour in Kona, Big Island" width="540" height="540"&gt;</span></noscript></figure><span data-dcnode-id="1787" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1786"></figure><span data-dcnode-id="1785" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1781"><img alt="Things to do in Kona-go on a coffee tour" class="aligncenter" data-dcnode-id="1784" data-lazy-src="https://68.media.tumblr.com/30b7a15fcad38557608ede9f3ac048e7/tumblr_inline_oofwo7tV3e1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/30b7a15fcad38557608ede9f3ac048e7/tumblr_inline_oofwo7tV3e1s27h5b_540.jpg" alt="Things to do in Kona-go on a coffee tour" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1774" instrument_node="">
</span><h3 data-dcnode-id="1768"><span data-dcnode-id="1773" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1772" id="Beaches_of_Kona"></span><span data-dcnode-id="1771" instrument_node="">Beaches of Kona</span><span class="ez-toc-section-end" data-dcnode-id="1770"></span><span data-dcnode-id="1769" instrument_node="">
</span></h3><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1766" instrument_node="">Coffee and chocolate aside, if you want to get far away from the crazy crowd during your </span><strong data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">three days in Big Island</span></strong><span data-dcnode-id="1763" instrument_node="">, then escape to one of the many </span><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">spectacular beaches north of Kona</span></strong><span data-dcnode-id="1760" instrument_node=""> which still remain somewhat elusive to tourists.&nbsp;</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1754" instrument_node="">We saw our last sunset in Hawaii at the very beautiful </span><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Mahai’ula beach</span></strong><span data-dcnode-id="1751" instrument_node=""> (close to another difficult to get to , yet spectacular Makalawena Beach) after driving carefully through another patch of undeveloped road. The softest sand and the perfect sunset were the best parting gifts one could ask for. </span><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">I highly recommend including this one beach in your Big Island 3 day itinerary if you have time for nothing else.</span></strong></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1743" instrument_node="">A perfect end to our </span><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Big Island activities</span></strong><span data-dcnode-id="1740" instrument_node=""> as I’d like to put it. If you cannot get more of Hawaii, here is an </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pandareviewz.com/things-to-do-oahu-hawaii/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">excellent guide to Oahu</span></strong></a><span data-dcnode-id="1736" instrument_node="">,the most popular island in the archipelago.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1730"><img alt="Mahai'ula beach, Big Island" class="aligncenter" data-dcnode-id="1733" data-lazy-src="https://68.media.tumblr.com/15a88660c09633cb1164c6aacfa2b65c/tumblr_inline_oofwyc619Q1s27h5b_540.jpg" height="810" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20810'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/15a88660c09633cb1164c6aacfa2b65c/tumblr_inline_oofwyc619Q1s27h5b_540.jpg" alt="Mahai'ula beach, Big Island" width="540" height="810"&gt;</span></noscript></figure><span data-dcnode-id="1729" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1728"></figure><span data-dcnode-id="1727" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1726"></figure><span data-dcnode-id="1725" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1724"></figure><span data-dcnode-id="1723" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1719"><img alt="Mahai'ula beach, Kona, Big Island" class="aligncenter" data-dcnode-id="1722" data-lazy-src="https://68.media.tumblr.com/b5fcb563e687b855846a184cbc429515/tumblr_inline_oofwybXJoB1s27h5b_540.jpg" height="676" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20676'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/b5fcb563e687b855846a184cbc429515/tumblr_inline_oofwybXJoB1s27h5b_540.jpg" alt="Mahai'ula beach, Kona, Big Island" width="540" height="676"&gt;</span></noscript></figure><span data-dcnode-id="1718" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1717"></figure><span data-dcnode-id="1716" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1712"><img alt="Mahai'ula beach, Three days in Big island" class="aligncenter" data-dcnode-id="1715" data-lazy-src="https://68.media.tumblr.com/ed1df40d33ff317074aeed7e6872de5c/tumblr_inline_oofwyeDKlo1s27h5b_540.jpg" height="663" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20540%20663'%3E%3C/svg%3E" width="540"><noscript data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">&lt;img loading="lazy" class="aligncenter" src="https://68.media.tumblr.com/ed1df40d33ff317074aeed7e6872de5c/tumblr_inline_oofwyeDKlo1s27h5b_540.jpg" alt="Mahai'ula beach, Three days in Big island" width="540" height="663"&gt;</span></noscript></figure><span data-dcnode-id="1711" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1710"></figure><span data-dcnode-id="1709" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1708"></figure><span data-dcnode-id="1707" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1706"></figure><span data-dcnode-id="1705" instrument_node="">
</span><figure class="tmblr-full" data-dcnode-id="1704"></figure><span data-dcnode-id="1703" instrument_node="">
</span><h2 data-dcnode-id="1697"><span data-dcnode-id="1702" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1701" id="i-21"></span><span data-dcnode-id="1700" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1699"></span><span data-dcnode-id="1698" instrument_node="">
</span></h2><span data-dcnode-id="1696" instrument_node="">
</span><h2 data-dcnode-id="1690"><span data-dcnode-id="1695" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1694" id="i-22"></span><span data-dcnode-id="1693" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1692"></span><span data-dcnode-id="1691" instrument_node="">
</span></h2><span data-dcnode-id="1689" instrument_node="">
</span><h2 data-dcnode-id="1683"><span data-dcnode-id="1688" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1687" id="i-23"></span><span data-dcnode-id="1686" instrument_node="">&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="1685"></span><span data-dcnode-id="1684" instrument_node="">
</span></h2><span data-dcnode-id="1682" instrument_node="">
</span><h2 data-dcnode-id="1675"><span data-dcnode-id="1681" instrument_node="">
</span><span class="ez-toc-section" data-dcnode-id="1680" id="The_best_places_to_eat_in_Big_Island"></span><b data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">The best places to eat in Big Island</span></b><span class="ez-toc-section-end" data-dcnode-id="1677"></span><span data-dcnode-id="1676" instrument_node="">
</span></h2><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node="">We had a great time </span><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">eating our way through &nbsp;Big Island</span></strong><span data-dcnode-id="1670" instrument_node="">, where options ranged from dining splurges to totally delicious budget finds.&nbsp; Big island, owing to its size, seemed to have way more cheap dining options compared to Maui, our previous stop.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1657"><strong data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Our Big Island restaurants</span></strong><span data-dcnode-id="1662" instrument_node=""> included dining with the active volcano crater as our backdrop at </span><b data-dcnode-id="1659"><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hawaiivolcanohouse.com/dining/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1661" instrument_node="">Volcano House</span></a></b><span data-dcnode-id="1658" instrument_node=""> restaurant (it also doubles up as lodging) right in the middle of Volcano national park (food was amazing as well and I had some excellent Pinot Noir there) to roadside fruit stands handing you some of the freshest coconut water.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1652" instrument_node="">From to tasty as heck, fish tacos with a great view of the bay at </span><b data-dcnode-id="1648"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hilobaycafe.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1651" instrument_node="">Hilo Bay cafe</span></a><span data-dcnode-id="1649" instrument_node="">&nbsp;</span></b><span data-dcnode-id="1647" instrument_node="">to some authentic </span><b data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Laulau</span></b><span data-dcnode-id="1644" instrument_node=""> at a small family owned diner (</span><b data-dcnode-id="1641"><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foodnetwork.com/restaurants/hi/captain-cook/kaaloas-super-js-authentic-hawaiian-restaurant/kaaloa-s-super-j-s-authentic-hawaiian-videos" rel="nofollow"><span data-dcnode-id="1643" instrument_node="">Kaaloa’s Super J’s</span></a></b><span data-dcnode-id="1640" instrument_node="">) in Kona, we munched and slurped our way through Big Island during our 3 days there. Crepes at Peaberry and Galette (a tiny cafe in a strip mall) and some lip smacking Saimin (Chinese soup with spam, noodles and wontons) at </span><b data-dcnode-id="1637"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz/broke-da-mouth-grindz-kailua-kona" rel="nofollow"><span data-dcnode-id="1639" instrument_node="">Broke da Mouth Grindz</span></a></b><span data-dcnode-id="1636" instrument_node="">, a restaurant serving Filipino and Hawaiian staples were two other good finds.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1630" instrument_node="">Don’t forget to stop by </span><b data-dcnode-id="1627"><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz/two-ladies-kitchen-hilo" rel="nofollow"><span data-dcnode-id="1629" instrument_node="">Two ladies Kitchen</span></a></b><span data-dcnode-id="1626" instrument_node="">, a small </span><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Japanese mochi shop in Hilo</span></strong><span data-dcnode-id="1623" instrument_node="">, famous for its old school mochis, which are real fruit wrapped in mochi! Their strawberry shortcake as well as strawberry mochi are super famous (you cannot take the latter to the mainland since it contains fruit).</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1617" instrument_node="">However, my most memorable meal in this travel Hawaii edition was in fact breakfast at the tiny </span><b data-dcnode-id="1613"><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz/pauls-place-hilo" rel="nofollow"><span data-dcnode-id="1616" instrument_node="">Paul’s place cafe</span></a><span data-dcnode-id="1614" instrument_node=""> </span></b><span data-dcnode-id="1612" instrument_node="">run by none other the world’s most friendly chef Uncle Paul who not only cooked us amazing breakfast (waffles for S and lox bagel for me) but also sent us home with a pot of local honey! That place is pint sized and so arrive early to get a seat.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">A few things to remember when ordering </span><strong data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">food in Hawaii</span></strong><span data-dcnode-id="1603" instrument_node="">: portions are huge and since fish is done in several ways there, don’t be surprised if you are asked the question of how well would you liked your fish cooked. Unlike steak, “well cooked” is a perfectly acceptable answer in the Piscean world and you will not be judged for it! Vegetarian food is hard to come by on the island but you do get some vegetarian choices in bigger restaurants with more menu options.</span></p><span data-dcnode-id="1601" instrument_node="">
