</span><input class="jpibfi" data-dcnode-id="2944" type="hidden"><p data-dcnode-id="2939"><em data-dcnode-id="2940"><span data-dcnode-id="2941" style="font-size: 14pt;"><img alt="Ultimate Big Island 7 Day Hawaii Itinerary" class="aligncenter wp-image-8971 size-full" data-dcnode-id="2943" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Ultimate-Hawaii-Itinerary-Big-Island-7-Day-Itinerary.png" height="1102" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Ultimate-Hawaii-Itinerary-Big-Island-7-Day-Itinerary.png&amp;raw" title="Ultimate Big Island 7 Day Hawaii Itinerary" width="735"><span data-dcnode-id="2942" instrument_node="">Want to know how to spend a 7 day trip to Hawaii? I spent two months on the Big Island and explored far and wide during my time there – check out my epic Hawaii Itinerary to get ideas for your own Hawaii Big Island vacation!</span></span></em></p><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2936" style="font-size: 14pt;"><span data-dcnode-id="2937" instrument_node="">While I love all of the Hawaiian Islands that I have been to – the four largest of the island chain – I have absolutely no qualms about picking a favorite: it’s the Big Island for the win, every time.</span></span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2932" style="font-size: 14pt;"><span data-dcnode-id="2933" instrument_node="">If you have the time, I definitely suggest doing a bit of Hawaii island hopping, but if you only have time to visit one island – it should be the Big Island.</span></span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2928" style="font-size: 14pt;"><span data-dcnode-id="2929" instrument_node="">You see, the Big Island offers so many of the things that I love – unspoiled nature, natural wildlife encounters, a laid-back lifestyle, lush greenery, and friendly locals. </span></span></p><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2918" style="font-size: 14pt;"><span data-dcnode-id="2925" instrument_node="">Oh, and a lack of tourists compared to some of the other Hawaiian Islands – I’m looking at you </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/things-to-do-in-waikiki/" rel="noopener" target="_blank"><span data-dcnode-id="2924" instrument_node="">Oahu</span></a><span data-dcnode-id="2922" instrument_node=""> and </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/ultimate-7-day-maui-itinerary/" rel="noopener" target="_blank"><span data-dcnode-id="2921" instrument_node="">Maui</span></a><span data-dcnode-id="2919" instrument_node="">.</span></span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2914" style="font-size: 14pt;"><span data-dcnode-id="2915" instrument_node="">The Big Island of Hawaii is truly a special place that must be experienced. But be careful, you may never want to leave – I sure didn’t.</span></span></p><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><img alt="Hawaii Itinerary map" class="size-full wp-image-13232 aligncenter" data-dcnode-id="2911" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2020/12/Hawaii-Itinerary-map.jpg" height="562" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2020/12/Hawaii-Itinerary-map.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2020/12/Hawaii-Itinerary-map.jpg 900w, https://theworldonmynecklace.com/wp-content/uploads/2020/12/Hawaii-Itinerary-map-768x480.jpg 768w" width="900"></p><span data-dcnode-id="2909" instrument_node="">

</span><p data-dcnode-id="2469"><img alt="Kailua Bay on the Big Island - part of any good Hawaii Itinerary" class="aligncenter wp-image-8916 size-full" data-dcnode-id="2470" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg" height="1440" loading="lazy" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg 1920w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii-1536x1152.jpg 1536w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Beautiful-Kailua-Bay-in-Kailua-Kona-Hawaii-760x570.jpg 760w" title="Kailua Bay on the Big Island - part of any good Hawaii Itinerary" width="1920"></p><span data-dcnode-id="2468" instrument_node="">
</span><h3 data-dcnode-id="2463"><span data-dcnode-id="2464" id="History_of_The_Big_Island_of_Hawaii"><span data-dcnode-id="2465" style="font-size: 18pt;"><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">History of The Big Island of Hawaii</span></strong></span></span></h3><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" style="font-size: 14pt;"><span data-dcnode-id="2461" instrument_node="">The Big Island of Hawaii is, as the name suggests, the largest island of the Hawaiian Island chain, and it is bigger than all the other Hawaiian Islands </span><strong data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">combined</span></strong><span data-dcnode-id="2458" instrument_node="">.</span></span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" style="font-size: 14pt;"><span data-dcnode-id="2454" instrument_node="">The island is made up of five volcanoes, with two of them dominating the island. One of them – Mauna Kea – is the tallest mountain in the world if the measurement was from the bottom of the ocean, not sea level (then it would be Everest). </span></span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" style="font-size: 14pt;"><span data-dcnode-id="2450" instrument_node="">The other giant volcano is Mauna Loa, and it is the largest volcano in the world by mass.</span></span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" style="font-size: 14pt;"><span data-dcnode-id="2446" instrument_node="">Hawaii is the official name of the Big Island as well as the island chain. King Kamehameha I united the islands under his reign in 1810, naming the entire chain after his home island.</span></span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><img alt="Visiting Pu'uhonua o Honaunau National Historical Park is a must for any Hawaii Itinerary" class="aligncenter wp-image-8959 size-full" data-dcnode-id="2442" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Small-beach-at-Puuhonua-o-Honaunau.jpg" height="1100" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Small-beach-at-Puuhonua-o-Honaunau.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Small-beach-at-Puuhonua-o-Honaunau.jpg 825w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Small-beach-at-Puuhonua-o-Honaunau-768x1024.jpg 768w" title="Visiting Pu'uhonua o Honaunau National Historical Park is a must for any Hawaii Itinerary" width="825"></p><span data-dcnode-id="2440" instrument_node="">
</span><h2 data-dcnode-id="2435"><span data-dcnode-id="2436" id="My_Ultimate_Hawaii_Big_Island_Itinerary_7_Days"><span data-dcnode-id="2437" style="font-size: 24pt;"><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">My Ultimate Hawaii Big Island Itinerary: 7 Days</span></strong></span></span></h2><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" style="font-size: 14pt;"><span data-dcnode-id="2433" instrument_node="">After spending a total of two months over two separate trips to the Big Island, I wanted to put together a Big Island itinerary that will showcase the best things to do over one week in Hawaii – as this seems to be the amount of time that most people have to visit.</span></span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" style="font-size: 14pt;"><span data-dcnode-id="2429" instrument_node="">I have included some bonus things to do on the Big Island as well because there are so many amazing things to do here – 7 days in Hawaii gives you a good overview but only scratches the surface of this incredible island.</span></span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2424" style="font-size: 14pt;"><span data-dcnode-id="2425" instrument_node="">Also, everyone has different tastes and you can sub some things out of this Hawaii Itinerary that you aren’t interested in doing and replace with some of the bonus activities I included. </span></span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" style="font-size: 14pt;"><span data-dcnode-id="2421" instrument_node="">I am a big fan of history, beaches, local events, and </span><a data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/hikes-on-the-big-island-hawaii/" rel="noopener" target="_blank"><span data-dcnode-id="2420" instrument_node="">hiking</span></a><span data-dcnode-id="2418" instrument_node=""> so these are all big focuses in this Hawaii Itinerary, as is food.</span></span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" style="font-size: 14pt;"><span data-dcnode-id="2414" instrument_node="">I have been to almost all of these places myself. The places that I haven’t been to have been recommended to me. </span></span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" style="font-size: 14pt;"><span data-dcnode-id="2410" instrument_node="">I spent most of my time in South Kona so you will notice I have a lot more food recommendations for there, and hardly any for the east side of the island where I didn’t spend much time on my most recent trip.</span></span></p><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2405"><img alt="Anaehoomalu Bay is a great addition to your Big Island Itinerary" class="aligncenter wp-image-8940 size-full" data-dcnode-id="2406" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/%25CA%25BBAnaeho%25CA%25BBomalu-Beach-on-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-Hawaii-760x570.jpg 760w" title="Anaehoomalu Bay is a great addition to your Big Island Itinerary" width="1100"></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" style="font-size: 14pt;"><span data-dcnode-id="2403" instrument_node="">To make the most of your 1 week in Hawaii, it is best to stay in at least a couple of different places otherwise your drive times are going to be pretty long – although it is still doable to have one base. </span></span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" style="font-size: 14pt;"><span data-dcnode-id="2399" instrument_node="">In my Hawaii itinerary, I have you staying in three different parts of the island – Kailua-Kona, Volcano, and Hilo.</span></span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" style="font-size: 14pt;"><span data-dcnode-id="2395" instrument_node="">So are you ready for the most detailed Big Island Itinerary out there?</span></span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" style="font-size: 14pt;"><span data-dcnode-id="2391" instrument_node="">Enjoy!</span></span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><img alt="Kailua Bay is a highlight of a Hawaii Itinerary" class="aligncenter wp-image-8942 size-full" data-dcnode-id="2387" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Kailua-Bay-in-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Kailua-Bay-in-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Kailua-Bay-in-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Kailua-Bay-in-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Kailua-Bay-in-Hawaii-760x570.jpg 760w" title="Kailua Bay is a highlight of a Hawaii Itinerary" width="1100"></p><span data-dcnode-id="2385" instrument_node="">
</span><h3 data-dcnode-id="2379"><span data-dcnode-id="2380" id="Hawaiii_Itinerary_Day_One"><span data-dcnode-id="2381" style="font-size: 24pt;"><strong data-dcnode-id="2382"><u data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Hawaiii Itinerary Day One</span></u></strong></span></span></h3><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" style="font-size: 14pt;"><span data-dcnode-id="2377" instrument_node="">To ease you into your full-on 7 days in Hawaii, spend the first day getting to know the cute beach town of Kailua-Kona, and then hit one of the best beaches on the Big Island for a relaxing afternoon. </span></span></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" style="font-size: 14pt;"><span data-dcnode-id="2373" instrument_node="">If you want to throw in a bit of adventure – either self-drive (if you have hired a 4WD vehicle) or book a tour to go stargazing at the top of Mauna Kea in the evening.</span></span></p><span data-dcnode-id="2370" instrument_node="">
</span><h4 data-dcnode-id="2360"><span data-dcnode-id="2361" id="Morning_-_Kailua-Kona"><span data-dcnode-id="2365" style="font-size: 24pt;"><strong data-dcnode-id="2366"><span data-dcnode-id="2368" style="font-size: 18pt;"><span data-dcnode-id="2369" instrument_node="">Morning –</span></span><span data-dcnode-id="2367" instrument_node=""> </span></strong></span><span data-dcnode-id="2362" style="font-size: 18pt;"><strong data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Kailua-Kona </span></strong></span></span></h4><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" style="font-size: 14pt;"><span data-dcnode-id="2358" instrument_node="">Known interchangeably as both Kailua and Kona by locals – this laid-back city is a great place to start your Big Island exploration. </span></span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" style="font-size: 14pt;"><span data-dcnode-id="2354" instrument_node="">Located on the dry leeward side of the island, Kailua is a hot spot for tourism, but amid the souvenir shops and tourist restaurants, there is still enough of a local flavor to make it a charming and worthwhile destination for people who don’t generally enjoy touristy places.</span></span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" style="font-size: 14pt;"><span data-dcnode-id="2350" instrument_node="">Start your Kailua exploration by wandering the waterside Ali’i Drive where there are a number of shops and restaurants geared towards tourists – some better than others.</span></span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" style="font-size: 14pt;"><span data-dcnode-id="2346" instrument_node=""> We saw dolphins just offshore a few times so make sure to stop for a while and look out at the water.</span></span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><img alt="Beautiful Kailua Bay is a highlight of 1 week in Hawaii" class="aligncenter wp-image-8962 size-full" data-dcnode-id="2342" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Swimming-in-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Swimming-in-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Swimming-in-Kailua-Bay-in-Kailua-Kona-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Swimming-in-Kailua-Bay-in-Kailua-Kona-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Swimming-in-Kailua-Bay-in-Kailua-Kona-Hawaii-760x570.jpg 760w" title="Beautiful Kailua Bay is a highlight of 1 week in Hawaii" width="1100"></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" style="font-size: 14pt;"><span data-dcnode-id="2339" instrument_node="">If you are into history, stop by Mokuaikaua Church – Hawaii’s oldest Christian Church, and you can do a tour of Hulihe‘e Palace if you feel so inclined: It was once home to Hawaiian Royalty.</span></span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" style="font-size: 14pt;"><span data-dcnode-id="2335" instrument_node="">Stop by the Kona Farmers Market which is open daily and is a great place to stock up on tropical fruits and vegetables.</span></span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" style="font-size: 14pt;"><span data-dcnode-id="2331" instrument_node="">For lunch, you have a couple of really good options – my favorite is the Cool Runnings Food Truck that offers out-of-this-world Jamaican dishes. It is often parked at the corner of Hualalai Road and Kuakini Highway or outside Ola Brew Co.</span></span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" style="font-size: 14pt;"><span data-dcnode-id="2327" instrument_node="">Alternatively, if you are dying to try something a little more local, head to Umeke’s – their poke is awesome, and they do some good Hawaiian bowls too.</span></span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><img alt="Kailua-Kona town - a highlight of a Big Island itinerary" class="aligncenter wp-image-8928 size-full" data-dcnode-id="2323" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Downtown-Kailua-Kona-on-the-Big-Island-of-Hawaii-1.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Downtown-Kailua-Kona-on-the-Big-Island-of-Hawaii-1.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Downtown-Kailua-Kona-on-the-Big-Island-of-Hawaii-1.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Downtown-Kailua-Kona-on-the-Big-Island-of-Hawaii-1-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Downtown-Kailua-Kona-on-the-Big-Island-of-Hawaii-1-760x570.jpg 760w" title="Kailua-Kona town - a highlight of a Big Island itinerary" width="1100"></p><span data-dcnode-id="2321" instrument_node="">
</span><h4 data-dcnode-id="2311"><span data-dcnode-id="2312" id="Afternoon_-_Hapuna_Beach"><span data-dcnode-id="2316" style="font-size: 24pt;"><strong data-dcnode-id="2317"><span data-dcnode-id="2319" style="font-size: 18pt;"><span data-dcnode-id="2320" instrument_node="">Afternoon –</span></span><span data-dcnode-id="2318" instrument_node=""> </span></strong></span><span data-dcnode-id="2313" style="font-size: 18pt;"><strong data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Hāpuna Beach</span></strong></span></span></h4><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" style="font-size: 14pt;"><span data-dcnode-id="2309" instrument_node="">Spend the afternoon at one of the most beautiful beaches in Hawaii – Hāpuna beach on the South Kohala Coast. It is about a 40-minute drive from downtown Kailua-Kona but is totally worth the trip. </span></span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" style="font-size: 14pt;"><span data-dcnode-id="2305" instrument_node="">It has been ranked as one of the best beaches in the world on numerous occasions and is my favorite beach on the Big Island.</span></span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><img alt="Hapuna Beach is one of the best beaches in Hawaii" class="aligncenter wp-image-8932 size-full" data-dcnode-id="2301" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hapuna-Beach-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Hapuna-Beach-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hapuna-Beach-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hapuna-Beach-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hapuna-Beach-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Hapuna Beach is one of the best beaches in Hawaii" width="1100"></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" style="font-size: 14pt;"><span data-dcnode-id="2298" instrument_node="">With pure white sand and azure water, half-mile-long Hāpuna beach is absolutely gorgeous and a great place to relax for an afternoon, to swim, and sunbathe.</span></span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" style="font-size: 14pt;"><span data-dcnode-id="2294" instrument_node="">If you get antsy and want to explore more – you could do a bit of a South Kohala Coast beach-hop – Kaunaʻoa (Mauna Kea) beach and Anaeho’omalu Bay (A Bay) are also very beautiful and are in the same area as Hāpuna beach.</span></span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><img alt="A-Bay is one of the most beautiful beaches in Hawaii and a must for your Hawaii Itinerary" class="aligncenter wp-image-8941 size-full" data-dcnode-id="2290" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-the-Big-Island-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/%25CA%25BBAnaeho%25CA%25BBomalu-Beach-on-the-Big-Island-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-the-Big-Island-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-the-Big-Island-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/ʻAnaehoʻomalu-Beach-on-the-Big-Island-Hawaii-760x570.jpg 760w" title="A-Bay is one of the most beautiful beaches in Hawaii and a must for your Hawaii Itinerary" width="1100"></p><span data-dcnode-id="2288" instrument_node="">
</span><h4 data-dcnode-id="2281"><span data-dcnode-id="2282" id="Evening_-_Kailua-Kona"><span data-dcnode-id="2283" style="font-size: 18pt;"><strong data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Evening – </span></strong><strong data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Kailua-Kona</span></strong></span></span></h4><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" style="font-size: 14pt;"><span data-dcnode-id="2279" instrument_node="">After getting your fill of beach life, drive back to Kailua-Kona for dinner and drinks. If you are a craft beer fan, you absolutely have to go to Kona Brewing Company, their food menu is almost as good as their amazing beer.</span></span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" style="font-size: 14pt;"><span data-dcnode-id="2275" instrument_node="">Try to get there early enough to catch Happy Hour if you can – it runs from 3-6pm on weekdays and is well worth it. </span></span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" style="font-size: 14pt;"><span data-dcnode-id="2271" instrument_node="">If you love garlic, try the roasted garlic pupu – a whole head of roasted garlic with herb flatbread and melted gorgonzola cheese. I am still dreaming about this.</span></span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" style="font-size: 14pt;"><span data-dcnode-id="2267" instrument_node="">Another option for dinner is Humpy’s Big Island Alehouse – which has a selection of delicious seafood and local dishes, along with pub classics such as burgers, nachos, and pizzas. Grab a table on the patio if you can to enjoy the beautiful harbor views.</span></span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><img alt="Kailua-Kona town is a highlight of any Big Island Hawaii Itinerary" class="aligncenter wp-image-8335 size-full" data-dcnode-id="2263" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/02/Sea-wall-in-Kailua-Kona-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/02/Sea-wall-in-Kailua-Kona-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/02/Sea-wall-in-Kailua-Kona-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/02/Sea-wall-in-Kailua-Kona-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/02/Sea-wall-in-Kailua-Kona-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Kailua-Kona town is a highlight of any Big Island Hawaii Itinerary" width="1100"></p><span data-dcnode-id="2261" instrument_node="">
</span><h4 data-dcnode-id="2251"><span data-dcnode-id="2252" id="Optional_Activity_-_Star-Gazing_from_Mauna_Kea"><span data-dcnode-id="2256" style="font-size: 24pt;"><strong data-dcnode-id="2257"><span data-dcnode-id="2259" style="font-size: 18pt;"><span data-dcnode-id="2260" instrument_node="">Optional Activity –</span></span><span data-dcnode-id="2258" instrument_node=""> </span></strong></span><span data-dcnode-id="2253" style="font-size: 18pt;"><strong data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Star-Gazing from Mauna Kea</span></strong></span></span></h4><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2247"><span data-dcnode-id="2248" style="font-size: 14pt;"><span data-dcnode-id="2249" instrument_node="">If you are really feeling adventurous, why not make the trip up to the top of the tallest mountain in Hawaii, where, depending on when you are traveling there, you may even see snow!</span></span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244"><img alt="Visiting the summit of Mauna Kea is a must for any Big Island Itinerary" class="aligncenter wp-image-8951 size-full" data-dcnode-id="2245" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Observatory-at-summit-of-Mauna-Kea-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Observatory-at-summit-of-Mauna-Kea-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Observatory-at-summit-of-Mauna-Kea-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Observatory-at-summit-of-Mauna-Kea-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Observatory-at-summit-of-Mauna-Kea-Hawaii-760x570.jpg 760w" title="Visiting the summit of Mauna Kea is a must for any Big Island Itinerary" width="1100"></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" style="font-size: 14pt;"><span data-dcnode-id="2242" instrument_node="">If you have hired a 4WD vehicle you can drive up there yourself, otherwise you will need to take a tour – there are a number of sunset and stargazing tours to the summit of Mauna Kea, with the cheapest tour priced around $210 and up. They generally leave around mid-afternoon and include dinner.</span></span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" style="font-size: 14pt;"><span data-dcnode-id="2238" instrument_node="">If you do drive up there yourself, I recommend getting up there in time for the sunset as the views are incredible and you are well above the clouds. </span></span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" style="font-size: 14pt;"><span data-dcnode-id="2234" instrument_node="">I haven’t been up there in the evening – we went late afternoon – but I have been told that the sunset and star-gazing are incredible up there.</span></span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2228"><span data-dcnode-id="2229" style="font-size: 14pt;"><span data-dcnode-id="2230" instrument_node="">Are you on a super tight budget, love adventure, and only have a 2WD drive car? We actually started walking up the road from the Visitors Center and managed to hitch a ride the rest of the way up so it is possible, just not guaranteed.</span></span></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><img alt="Visiting the summit of Mauna Kea is a must for any 7 Day Big Island Itinerary" class="aligncenter wp-image-8473 size-full" data-dcnode-id="2226" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Summit-of-Mauna-Kea-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/03/Summit-of-Mauna-Kea-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Summit-of-Mauna-Kea-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/03/Summit-of-Mauna-Kea-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/03/Summit-of-Mauna-Kea-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Visiting the summit of Mauna Kea is a must for any 7 Day Big Island Itinerary" width="1100"></p><span data-dcnode-id="2224" instrument_node="">
</span><h3 data-dcnode-id="2218"><span data-dcnode-id="2219" id="Hawaii_Itinerary_Day_Two"><span data-dcnode-id="2220" style="font-size: 24pt;"><strong data-dcnode-id="2221"><u data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Hawaii Itinerary Day Two</span></u></strong></span></span></h3><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" style="font-size: 14pt;"><span data-dcnode-id="2216" instrument_node="">Day Two of my Hawaii Big Island Itinerary will be spent in one of my favorite parts of the Big Island – South Kona. We did a six-week </span><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpx.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2215" instrument_node="">Help X</span></a><span data-dcnode-id="2213" instrument_node=""> placement there so I know this part of the island better than any other, and there is so much on offer here.</span></span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" style="font-size: 14pt;"><span data-dcnode-id="2209" instrument_node="">South Kona is known for its world-class coffee and macadamia nuts, and a great place to try Kona coffee is at the Royal Kona Coffee Center, where there is a small museum and lots of free coffee samples. It is also a great spot to buy local products.</span></span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2204" style="font-size: 14pt;"><span data-dcnode-id="2205" instrument_node="">This perfect day in South Kona will be spent hiking or kayaking to a remote bay where Captain Cook was killed, snorkeling with colorful fish and turtles, hanging at a local beach, and seeing wild spinner dolphins – if you are lucky.</span></span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><img alt="South Kona is part of any best Hawaii Itinerary" class="aligncenter wp-image-8965 size-full" data-dcnode-id="2201" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-from-South-Kona-on-the-Big-Island.jpg" height="1100" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/View-from-South-Kona-on-the-Big-Island.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-from-South-Kona-on-the-Big-Island.jpg 825w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-from-South-Kona-on-the-Big-Island-768x1024.jpg 768w" title="South Kona is part of any best Hawaii Itinerary" width="825"></p><span data-dcnode-id="2199" instrument_node="">
</span><h4 data-dcnode-id="2189"><span data-dcnode-id="2190" id="Morning_-_Hiking_or_Kayaking_at_Kealakekua_Bay"><span data-dcnode-id="2194" style="font-size: 24pt;"><strong data-dcnode-id="2195"><span data-dcnode-id="2197" style="font-size: 18pt;"><span data-dcnode-id="2198" instrument_node="">Morning –</span></span><span data-dcnode-id="2196" instrument_node=""> </span></strong></span><span data-dcnode-id="2191" style="font-size: 18pt;"><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Hiking or Kayaking at Kealakekua Bay</span></strong></span></span></h4><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" style="font-size: 14pt;"><span data-dcnode-id="2187" instrument_node="">After an early breakfast and coffee at The Coffee Shack in Captain Cook – the views from the deck here are some of the best on the island – it’s time for an adventure!</span></span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2182" style="font-size: 14pt;"><span data-dcnode-id="2183" instrument_node="">The best thing to do in South Kona in my opinion is to hike down to Captain Cook Monument in Kealakekua Bay to snorkel.</span></span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><img alt="The Captain Cook Monument in Kealakekua Bay on the Big Island" class="aligncenter wp-image-8506 size-full" data-dcnode-id="2179" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Captain-Cook-Monument-in-Kealakekua-Bay-on-the-Big-Island.jpg" height="1100" loading="lazy" sizes="(max-width: 784px) 100vw, 784px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/03/Captain-Cook-Monument-in-Kealakekua-Bay-on-the-Big-Island.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Captain-Cook-Monument-in-Kealakekua-Bay-on-the-Big-Island.jpg 784w, https://theworldonmynecklace.com/wp-content/uploads/2019/03/Captain-Cook-Monument-in-Kealakekua-Bay-on-the-Big-Island-768x1078.jpg 768w" title="The Captain Cook Monument in Kealakekua Bay on the Big Island" width="784"></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" style="font-size: 14pt;"><span data-dcnode-id="2176" instrument_node="">You can reach the monument by either hiking, kayaking, or on a boat tour. I have hiked there and kayaked there and although hiking there was my favorite as we had the place to ourselves for an hour before anyone else arrived. </span></span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" style="font-size: 14pt;"><span data-dcnode-id="2172" instrument_node="">It really comes down to whether you are much of a hiker or not, as it is very hot and reasonably strenuous to hike back out of the bay. </span></span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" style="font-size: 14pt;"><span data-dcnode-id="2168" instrument_node="">You can read about my experience hiking to the Captain Cook Monument and the logistics </span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/captain-cook-monument-trail/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2167" instrument_node="">here</span></a><span data-dcnode-id="2165" instrument_node="">.</span></span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><img alt="Hiking on the Big Island should be part of your Hawaii Itinerary" class="aligncenter wp-image-8934 size-full" data-dcnode-id="2161" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hiking-back-from-the-Captain-Cook-Monument-in-South-Kona-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Hiking-back-from-the-Captain-Cook-Monument-in-South-Kona-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hiking-back-from-the-Captain-Cook-Monument-in-South-Kona-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hiking-back-from-the-Captain-Cook-Monument-in-South-Kona-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hiking-back-from-the-Captain-Cook-Monument-in-South-Kona-Hawaii-760x570.jpg 760w" title="Hiking on the Big Island should be part of your Hawaii Itinerary" width="1100"></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" style="font-size: 14pt;"><span data-dcnode-id="2158" instrument_node="">You used to be able to kayak across the bay to the monument by just hiring a kayak and going for it – this is what I did back in 2010. These days you need to have a permit, which means you need to join a guided kayaking tour. </span></span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" style="font-size: 14pt;"><span data-dcnode-id="2154" instrument_node="">There are only three tour companies that have permits to do this, you can find more information on the Hawaii State Parks </span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kealakekua-bay-state-historical-park/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2153" instrument_node="">website</span></a><span data-dcnode-id="2151" instrument_node=""> about this.</span></span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" style="font-size: 14pt;"><span data-dcnode-id="2147" instrument_node="">If you do decide to kayak, it takes around half an hour one way to kayak across the bay, and it is usually reasonably sheltered so it’s not too hard going.</span></span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" style="font-size: 14pt;"><span data-dcnode-id="2143" instrument_node="">Whatever way you get there, make sure to go snorkeling once you get to the monument as the bay offers some of the best snorkeling on the Big Island. And keep an eye out for dolphins. </span></span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><img alt="View over Kealakekua Bay - a must do for your Hawaii Big Island Itinerary" class="aligncenter wp-image-8511 size-full" data-dcnode-id="2139" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Kealakekua-Bay-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/03/Kealakekua-Bay-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/03/Kealakekua-Bay-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/03/Kealakekua-Bay-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/03/Kealakekua-Bay-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="View over Kealakekua Bay - a must do for your Hawaii Big Island Itinerary" width="1100"></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" style="font-size: 14pt;"><span data-dcnode-id="2136" instrument_node="">Once you are done, grab lunch on the quiet back deck of Keoki’s for fish and chips or try traditional Hawaiian Chicken or Pork Lau Lau at Ka’aloa’s Super J’s.</span></span></p><span data-dcnode-id="2133" instrument_node="">
</span><h4 data-dcnode-id="2126"><span data-dcnode-id="2127" id="Afternoon_-_Two_Step_and_Puuhonua_O_Honaunau"><span data-dcnode-id="2128" style="font-size: 18pt;"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Afternoon – </span></strong><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Two Step and Pu’uhonua O Hōnaunau</span></strong></span></span></h4><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" style="font-size: 14pt;"><span data-dcnode-id="2124" instrument_node="">If you haven’t had your snorkeling fix yet, go to one of the other best places to snorkel on the Big Island: Two Step. On the way, stop at the Painted Church – a cute historic church with murals and pictures painted on the walls inside.</span></span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" style="font-size: 14pt;"><span data-dcnode-id="2120" instrument_node="">Two Step is fantastic for the huge variety of tropical fish, and from my personal experience, the snorkeling is even better than around the Captain Cook Monument.</span></span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" style="font-size: 14pt;"><span data-dcnode-id="2116" instrument_node=""> There is also a great chance that you will see turtles here, either when you are out snorkeling or around the rocks and boat dock.</span></span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><img alt="Snorkeling at Two Step - the best snorkeling on the Big Island of Hawaii" class="aligncenter wp-image-8964 size-full" data-dcnode-id="2112" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Two-Step-in-South-Kona.png" height="1100" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Two-Step-in-South-Kona.png&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Two-Step-in-South-Kona.png 825w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Two-Step-in-South-Kona-768x1024.png 768w" title="Snorkeling at Two Step - the best snorkeling on the Big Island of Hawaii" width="825"></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" style="font-size: 14pt;"><span data-dcnode-id="2109" instrument_node="">Right next to Two Step is one of the most important historic sites in all of the Hawaiian Islands: </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/puho/index.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2108" instrument_node="">Pu’uhonua O Hōnaunau National Historical Park</span></a><span data-dcnode-id="2106" instrument_node="">. This park is one of the only remaining places of refuge that is still at least partially standing. </span></span></p><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" style="font-size: 14pt;"><span data-dcnode-id="2102" instrument_node="">In ancient Hawaiian culture, if you violated a kapu (sacred laws) you would be put to death, to stop the gods from taking their vengeance on everyone.</span></span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" style="font-size: 14pt;"><span data-dcnode-id="2098" instrument_node="">The only way you could escape this fate was to make it across treacherous waters to the Pu’uhonua O Hōnaunau, or one of the other places of refuge that once existed across the Hawaiian Islands.</span></span></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" style="font-size: 14pt;"><span data-dcnode-id="2094" instrument_node="">If you were lucky enough to make it here, the priests would perform a number of rites to basically forgive you of your sins, so that you wouldn’t have to be put to death.</span></span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><img alt="Pu'uhonua o Honaunau National Historical Park - part of any good Hawaii one week itinerary" class="aligncenter wp-image-8955 size-full" data-dcnode-id="2090" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Puuhonua-o-Honaunau-on-the-Big-Island-of-Hawaii.png" height="1063" loading="lazy" sizes="(max-width: 797px) 100vw, 797px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Puuhonua-o-Honaunau-on-the-Big-Island-of-Hawaii.png&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Puuhonua-o-Honaunau-on-the-Big-Island-of-Hawaii.png 797w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Puuhonua-o-Honaunau-on-the-Big-Island-of-Hawaii-768x1024.png 768w" title="Pu'uhonua o Honaunau National Historical Park - part of any good Hawaii one week itinerary" width="797"></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" style="font-size: 14pt;"><span data-dcnode-id="2087" instrument_node="">This historic site is now run by the National Parks service and you will need to pay a fee to enter, or if you have a year-long National Parks pass like us, you won’t need to pay anything.</span></span></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" style="font-size: 14pt;"><span data-dcnode-id="2083" instrument_node="">There is a free audio tour you can take, and the small beach in the site nearly always has turtles basking in the shallow waters.</span></span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><img alt="Pu'uhonua o Honaunau National Historical Park in South Kona, Hawaii" class="aligncenter wp-image-8931 size-full" data-dcnode-id="2079" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Grounds-of-Puuhonua-o-Honaunau-on-the-Big-Island.jpg" height="1100" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Grounds-of-Puuhonua-o-Honaunau-on-the-Big-Island.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Grounds-of-Puuhonua-o-Honaunau-on-the-Big-Island.jpg 825w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Grounds-of-Puuhonua-o-Honaunau-on-the-Big-Island-768x1024.jpg 768w" title="Pu'uhonua o Honaunau National Historical Park in South Kona, Hawaii" width="825"></p><span data-dcnode-id="2077" instrument_node="">
</span><h4 data-dcnode-id="2070"><span data-dcnode-id="2071" id="Evening_-_Hookena_Beach"><span data-dcnode-id="2072" style="font-size: 18pt;"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Evening – </span></strong><strong data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Ho’okena Beach</span></strong></span></span></h4><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" style="font-size: 14pt;"><span data-dcnode-id="2068" instrument_node="">Ho’okena Beach is a popular spot with locals and we went there a lot with our hosts, to have breakfast or dinner, to swim, and to watch the sunset.</span></span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><img alt="Sunset at Ho'okena Beach in South Kona - a highlight of my 1 week in Hawaii" class="aligncenter wp-image-8961 size-full" data-dcnode-id="2064" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Sunset-at-Hookena-Beach-on-the-Big-Island.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Sunset-at-Hookena-Beach-on-the-Big-Island.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Sunset-at-Hookena-Beach-on-the-Big-Island.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Sunset-at-Hookena-Beach-on-the-Big-Island-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Sunset-at-Hookena-Beach-on-the-Big-Island-760x570.jpg 760w" title="Sunset at Ho'okena Beach in South Kona - a highlight of my 1 week in Hawaii" width="1100"></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" style="font-size: 14pt;"><span data-dcnode-id="2061" instrument_node="">Ho’okena is another popular spot for the local spinner dolphins, and we saw humpbacks pretty close to shore here a couple of times too (in winter). Make sure to walk around the coast to the blowholes and ruins of an old church.</span></span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" style="font-size: 14pt;"><span data-dcnode-id="2057" instrument_node="">There are a number of picnic tables so it is a perfect spot to have a picnic dinner, or after the sunset you could stop at the historic Manago Hotel in Captain Cook on the way back to Kailua for dinner – the menu offers classic dishes like mahi, steak and teri chicken with Hawaiian sides like mac salad, and hearty scoops of white rice.</span></span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><img alt="Ho'okena Beach in South Kona - a highlight of my one week in Hawaii" class="aligncenter wp-image-8937 size-full" data-dcnode-id="2053" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hookena-Beach-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Hookena-Beach-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hookena-Beach-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hookena-Beach-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hookena-Beach-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Ho'okena Beach in South Kona - a highlight of my one week in Hawaii" width="1100"></p><span data-dcnode-id="2051" instrument_node="">
</span><h3 data-dcnode-id="2045"><span data-dcnode-id="2046" id="Hawaii_Itinerary_Day_Three"><span data-dcnode-id="2047" style="font-size: 24pt;"><strong data-dcnode-id="2048"><u data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Hawaii Itinerary Day Three</span></u></strong></span></span></h3><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" style="font-size: 14pt;"><span data-dcnode-id="2043" instrument_node="">Day three is one of my absolute favorites of this Hawaii 1 week itinerary, with a visit to a laid-back hippie town, an important Hawaiian historic site, lots of scenic driving, a hike into one of the most beautiful valleys in Hawaii, and dinner in the cute artist village of Holualoa. You are going to love it!</span></span></p><span data-dcnode-id="2040" instrument_node="">
</span><h4 data-dcnode-id="2033"><span data-dcnode-id="2034" id="Morning_-_North_Kohala"><span data-dcnode-id="2035" style="font-size: 18pt;"><strong data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Morning – </span></strong><strong data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">North Kohala</span></strong></span></span></h4><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" style="font-size: 14pt;"><span data-dcnode-id="2031" instrument_node="">Drive along the coastal Akoni Pule Highway from Kailua up the coast towards Hawi and keep an eye out for whales offshore along the way – it’s pretty common to see them along this road in winter.</span></span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" style="font-size: 14pt;"><span data-dcnode-id="2027" instrument_node="">Your first stop will be to visit Mo’okini Heiau, an important pre-European historic site, and the first temple ever built in Hawaii – way back in 480 A.D. The temple was dedicated to Ku, the god of war, and many human sacrifices took place here.</span></span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><img alt="Mo'okini Heiau on the Big Island should be part of your Big Island 7 Day Itinerary" class="aligncenter wp-image-8950 size-full" data-dcnode-id="2023" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Mookini-Heiau-on-North-Coast-of-the-Big-Island-of-Hawaii.png" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Mookini-Heiau-on-North-Coast-of-the-Big-Island-of-Hawaii.png&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Mookini-Heiau-on-North-Coast-of-the-Big-Island-of-Hawaii.png 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Mookini-Heiau-on-North-Coast-of-the-Big-Island-of-Hawaii-768x576.png 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Mookini-Heiau-on-North-Coast-of-the-Big-Island-of-Hawaii-760x570.png 760w" title="Mo'okini Heiau on the Big Island should be part of your Big Island 7 Day Itinerary" width="1100"></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" style="font-size: 14pt;"><span data-dcnode-id="2020" instrument_node="">You need a 4WD to drive the treacherous road to the temple, but alternatively, you can hike along the road, which is what I did. It’s a lovely and easy hike, 4 miles return and mostly flat. We saw whales breaching offshore here too.</span></span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" style="font-size: 14pt;"><span data-dcnode-id="2016" instrument_node="">The site is beautiful and creepy, and definitely worth a visit – especially if you are interested in Hawaiian culture and history.</span></span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" style="font-size: 14pt;"><span data-dcnode-id="2012" instrument_node="">Once you are finished with your visit to Mo’okini Heiau, head into hippie Hawi for lunch and a wander around the shops. Hawi is super laid back and such a cute town. </span></span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" style="font-size: 14pt;"><span data-dcnode-id="2008" instrument_node="">I recommend eating at the charming Bamboo Restaurant – I really liked the chicken sate potstickers and the coconut prawns.</span></span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><img alt="Hawi in North Kohala is a must for your Hawaii one week itinerary" class="aligncenter wp-image-8933 size-full" data-dcnode-id="2004" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hawi-on-the-North-Coast-of-Hawaii.jpg" height="805" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Hawi-on-the-North-Coast-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hawi-on-the-North-Coast-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Hawi-on-the-North-Coast-of-Hawaii-768x562.jpg 768w" title="Hawi in North Kohala is a must for your Hawaii one week itinerary" width="1100"></p><span data-dcnode-id="2002" instrument_node="">
</span><h4 data-dcnode-id="1995"><span data-dcnode-id="1996" id="Afternoon_-_Pololu_Valley"><span data-dcnode-id="1997" style="font-size: 18pt;"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Afternoon – </span></strong><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Pololu Valley</span></strong></span></span></h4><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" style="font-size: 14pt;"><span data-dcnode-id="1993" instrument_node="">From Hawi, continue driving east to the end of the road at Pololu Valley Lookout. This valley is one of the most beautiful in Hawaii and if you are feeling up to it, I highly recommend hiking down into the valley – it is 3-miles return and a bit of a slog to hike back out but totally worth it.</span></span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><img alt="Pololu Valley - a highlight of my 7 day Big Island Itinerary" class="aligncenter wp-image-8954 size-full" data-dcnode-id="1989" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Pololu Valley - a highlight of my 7 day Big Island Itinerary" width="1100"></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" style="font-size: 14pt;"><span data-dcnode-id="1986" instrument_node="">If you do make it into the valley, walk the wild, black-sand beach and explore the forest. It is so peaceful down there and incredibly lush and beautiful.</span></span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" style="font-size: 14pt;"><span data-dcnode-id="1982" instrument_node="">On the way back to Kailua, drive the scenic Kohala Mountain Road – one of the most beautiful drives on the island.</span></span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1977"><img alt="Pololu Valley - a highlight of my Hawaii Itinerary: 7 Days" class="aligncenter wp-image-8953 size-full" data-dcnode-id="1978" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-beach-on-the-Big-Island.jpg" height="818" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-beach-on-the-Big-Island.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-beach-on-the-Big-Island.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Pololu-Valley-beach-on-the-Big-Island-768x571.jpg 768w" title="Pololu Valley - a highlight of my Hawaii Itinerary: 7 Days" width="1100"></p><span data-dcnode-id="1976" instrument_node="">
</span><h4 data-dcnode-id="1969"><span data-dcnode-id="1970" id="Evening_-_Holualoa_Art_Village"><span data-dcnode-id="1971" style="font-size: 18pt;"><strong data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Evening – </span></strong><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Holualoa Art Village</span></strong></span></span></h4><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" style="font-size: 14pt;"><span data-dcnode-id="1967" instrument_node="">After relaxing for a couple of hours back at your accommodations (or even at one of the South Kohala Coast beaches if you can fit it in), drive the short drive up the mountain to Holualoa, a small but vibrant arts village that is full of galleries and shops.</span></span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" style="font-size: 14pt;"><span data-dcnode-id="1963" instrument_node="">If you are lucky enough to visit on </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/first-friday-art-events" rel="noopener" target="_blank"><span data-dcnode-id="1962" instrument_node="">First Fridays</span></a><span data-dcnode-id="1960" instrument_node="">, grab something from one of the food stands and enjoy live music and late closing times at the galleries.</span></span></p><span data-dcnode-id="1957" instrument_node="">
</span><h3 data-dcnode-id="1951"><span data-dcnode-id="1952" id="Hawaii_Itinerary_Day_Four"><span data-dcnode-id="1953" style="font-size: 24pt;"><strong data-dcnode-id="1954"><u data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Hawaii Itinerary Day Four</span></u></strong></span></span></h3><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" style="font-size: 14pt;"><span data-dcnode-id="1949" instrument_node="">Day Four will take you to one of the least visited parts of the island, the South. Along with hiking to one of the world’s only green sand beaches, and maybe cliff diving if you are game, you will also have lunch at a Hawaiian icon – Punalu’u Bake Shop – as well as spending the afternoon at the beautiful black sand Punalu’u beach which is well known for its basking turtles.</span></span></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1944"><img alt="Punalu'u Black sand beach in Hawaii's south - a great addition to your Hawaii Itinerary" class="aligncenter wp-image-8957 size-full" data-dcnode-id="1945" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Punaluu-Black-Sand-Beach-on-the-Big-Island-of-Hawaii.jpg" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Punaluu-Black-Sand-Beach-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Punaluu-Black-Sand-Beach-on-the-Big-Island-of-Hawaii.jpg 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Punaluu-Black-Sand-Beach-on-the-Big-Island-of-Hawaii-768x576.jpg 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Punaluu-Black-Sand-Beach-on-the-Big-Island-of-Hawaii-760x570.jpg 760w" title="Punalu'u Black sand beach in Hawaii's south - a great addition to your Hawaii Itinerary" width="1100"></p><span data-dcnode-id="1943" instrument_node="">
</span><h4 data-dcnode-id="1932"><span data-dcnode-id="1933" id="Morning_-_Papakolea_Green_Sand_Beach"><span data-dcnode-id="1934" style="font-size: 18pt;"><strong data-dcnode-id="1937"><span data-dcnode-id="1942" instrument_node="">Morning – </span><span data-dcnode-id="1938" style="font-size: 14pt;"><span data-dcnode-id="1940" style="font-size: 18pt;"><span data-dcnode-id="1941" instrument_node="">Papakōlea</span></span><span data-dcnode-id="1939" instrument_node=""> </span></span></strong><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Green Sand Beach</span></strong></span></span></h4><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" style="font-size: 14pt;"><span data-dcnode-id="1930" instrument_node="">Get an early start for the drive to South Point, also known as Ka Lae. Rugged South Point is the southernmost point of the Big Island of Hawaii and of the 50 United States, and is worth visiting for one big reason: The Papakōlea Green Sand Beach.</span></span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" style="font-size: 14pt;"><span data-dcnode-id="1926" instrument_node="">This morning you will be hiking to one of the only green sand beaches in the world!</span></span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><img alt="Hiking to the Green Sand Beach is a unique experience to add to your Big Island Hawaii Itinerary" class="aligncenter wp-image-8930 size-full" data-dcnode-id="1922" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Green-Sand-Beach-on-the-Big-Island-of-Hawaii.png" height="1100" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/Green-Sand-Beach-on-the-Big-Island-of-Hawaii.png&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/Green-Sand-Beach-on-the-Big-Island-of-Hawaii.png 825w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/Green-Sand-Beach-on-the-Big-Island-of-Hawaii-768x1024.png 768w" title="Hiking to the Green Sand Beach is a unique experience to add to your Big Island Hawaii Itinerary" width="825"></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" style="font-size: 14pt;"><span data-dcnode-id="1919" instrument_node="">The hike is around 5.5 miles return and is easy, although there is no shade so bring lots of water and sunscreen.&nbsp;</span></span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" style="font-size: 14pt;"><span data-dcnode-id="1915" instrument_node="">Once you get to Papakōlea beach, you will be so glad that you slogged it out in the sun – the setting is perfect! The sand is a green-gold color and like nothing I have seen before.</span></span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><img alt="Hiking to the Green Sand Beach is a unique experience to add to your Big Island Hawaii Itinerary" class="aligncenter wp-image-8969 size-full" data-dcnode-id="1911" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Ultimate Big Island 7 Day Hawaii Itinerary" data-jpibfi-post-url="https://theworldonmynecklace.com/ultimate-big-island-7-day-itinerary/" data-jpibfi-src="https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-over-the-Green-Sand-Beach-on-Hawaii.png" height="825" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theworldonmynecklace.com/wp-content/uploads/2019/07/View-over-the-Green-Sand-Beach-on-Hawaii.png&amp;raw" srcset="https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-over-the-Green-Sand-Beach-on-Hawaii.png 1100w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-over-the-Green-Sand-Beach-on-Hawaii-768x576.png 768w, https://theworldonmynecklace.com/wp-content/uploads/2019/07/View-over-the-Green-Sand-Beach-on-Hawaii-760x570.png 760w" title="Hiking to the Green Sand Beach is a unique experience to add to your Big Island Hawaii Itinerary" width="1100"></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" style="font-size: 14pt;"><span data-dcnode-id="1908" instrument_node="">It’s a bit steep getting down to the beach, but it’s easy enough. We swam but be careful of powerful waves and rip currents – if it is rough, stick close to shore.</span></span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" style="font-size: 14pt;"><span data-dcnode-id="1904" instrument_node="">If that wasn’t enough adventure for you, head to South Point where you can cliff dive – that’s a bit too out there for me though.</span></span></p><span data-dcnode-id="1901" instrument_node="">
</span><h4 data-dcnode-id="1894"><span data-dcnode-id="1895" id="Afternoon_-_Punaluu_Black_Sand_Beach"><span data-dcnode-id="1896" style="font-size: 18pt;"><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Afternoon – </span></strong><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Punalu’u Black Sand Beach</span></strong></span></span></h4><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" style="font-size: 14pt;"><span data-dcnode-id="1892" instrument_node="">Reward yourself for a morning of exercise and adventure with lunch at the iconic Punalu’u Bake Shop, where you have to try their malasadas (donuts).</span></span></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" style="font-size: 14pt;"><span data-dcnode-id="1888" instrument_node="">After lunch, hit up the beautiful Punalu’u Black Sand Beach where you can easily spend a lazy afternoon swimming, and lounging around under the perfect palm trees that stretch out along the sand. </span></span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" style="font-size: 14pt;"><span data-dcnode-id="1884" instrument_node="">Don’t miss seeing the turtles that are usually on the sand, basking in the sun. The easiest way to find them is to look for the crowd of people.</span></span></p><span data-dcnode-id="1881" instrument_node="">
