</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="742" data-lazy-src="https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f" data-lazy-srcset="https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f 2x" data-pin-nopin="true" height="60" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2060%2060'%3E%3C/svg%3E" width="60"><noscript data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&lt;img alt='' src='https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f' srcset='https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f 2x' class='avatar avatar-60 photo' height='60' width='60' /&gt;</span></noscript><span data-dcnode-id="739" instrument_node=""> </span><b class="fn" data-dcnode-id="736"><a class="url" data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/" rel="external nofollow ugc"><span data-dcnode-id="738" instrument_node="">Norbert</span></a></b><span data-dcnode-id="735" instrument_node=""> </span><span class="says" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">says:</span></span><span data-dcnode-id="732" instrument_node=""> </span></div><span data-dcnode-id="729" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="723"><span data-dcnode-id="728" instrument_node="">
</span><a data-dcnode-id="725" href="#comment-56730"><time data-dcnode-id="726" datetime="2019-01-22T19:15:24-05:00"><span data-dcnode-id="727" instrument_node="">January 22, 2019 at 7:15 pm</span></time></a><span data-dcnode-id="724" instrument_node=""> </span></div><span data-dcnode-id="721" instrument_node="">
</span></footer><span data-dcnode-id="718" instrument_node="">
</span><div class="comment-content" data-dcnode-id="696"><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Hi Maya – </span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Thanks! And yes, your understanding is right. This is a common question and while I do think there’s a workaround, it a “grey area” workaround.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">There’s two ways of doing it, in my opinion. The first way is getting two hotel bookings with free cancelation. One should be for the first day or so, and the second for the rest. You’ll show both of them if asked for during entry. </span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="704"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/booking-com/" rel="noopener ugc" target="_blank"><span data-dcnode-id="707" instrument_node="">Booking.com</span></a><span data-dcnode-id="705" instrument_node=""> allows you to get bookings that you can cancel up to a few days before the trip (or even up to the same day – double check the free cancellation dates!). So, you’ll have to use the first one since you’ll have to show it the date of arrival, but you can cancel the second one right after you get there and wing it. </span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Alternatively, and again this is a grey area, but you could simply make a reservation via booking.com, print the booking confirmation, and cancel it immediately after. Then just book a place as a walk-in once you get there. I highly doubt they will check the validity of the booking confirmation printout before letting you in. </span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Even though I went there before they imposed the new regulations, I’m sure lots of guesthouses still welcome walk-in guests. (People can change plans or maybe extend once there, so I’m sure there’s some flexibility there)</span></p><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span><div class="reply" data-dcnode-id="691"><a aria-label="Reply to Norbert" class="comment-reply-link" data-belowelement="div-comment-56730" data-commentid="56730" data-dcnode-id="692" data-postid="14936" data-replyto="Reply to Norbert" data-respondelement="respond" href="#comment-56730" rel="nofollow"><span data-dcnode-id="693" instrument_node="">Reply</span></a></div><span data-dcnode-id="690" instrument_node=""> </span></article><span data-dcnode-id="687" instrument_node="">
