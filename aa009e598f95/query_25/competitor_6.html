</span><figure aria-describedby="caption-attachment-14954" class="wp-caption aligncenter" data-dcnode-id="5358" id="attachment_14954" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14954" data-dcnode-id="5363"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5368" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-600x450.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-300x225.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-20x15.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="450" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20450'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 12" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FNorbert-Shell.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5365"><svg data-dcnode-id="5366" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="5367"></path></svg></span></a></div><noscript data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">&lt;img class="size-large wp-image-14954" src="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-600x450.jpg" alt="Galapagos Islands, Ecuador" width="600" height="450" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-300x225.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell-20x15.jpg 20w" sizes="(max-width: 600px) 100vw, 600px" title="How to Travel The Galapagos Islands on a Budget 12" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Shell.jpg"&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="5359" id="caption-attachment-14954"><span data-dcnode-id="5360" instrument_node="">Trying a new “turtle suit” while visiting El Chato in Santa Cruz.</span></figcaption></figure><span data-dcnode-id="5357" instrument_node="">
</span><h3 data-dcnode-id="5354" style="text-align: left;"><strong data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">DIY with Day Tours in the Galapagos</span></strong></h3><span data-dcnode-id="5353" instrument_node="">
</span><p data-dcnode-id="5351" style="text-align: left;"><span data-dcnode-id="5352" instrument_node="">This is the way I did it since I wanted to visit some islands I couldn’t do on my own. While this type of trip allows you to go to more islands, you still cannot visit the islands further from Santa Cruz, due to the lack of time to tour them in a day.</span></p><span data-dcnode-id="5350" instrument_node="">
</span><p data-dcnode-id="5348" style="text-align: left;"><span data-dcnode-id="5349" instrument_node="">If you’re going during the low season, you can play it by ear and wait to get to Galapagos to book your day tours. Bargain with the tour operators, especially if you’re doing more than one tour. This is what I did.</span></p><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5342" style="text-align: left;"><span data-dcnode-id="5346" instrument_node="">Day tours prices range from $80 (</span><a data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/tips/bargaining-101-art-haggling-your-travels/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5345" instrument_node="">if you’re excellent at bargaining</span></a><span data-dcnode-id="5343" instrument_node="">) to $200+.</span></p><span data-dcnode-id="5341" instrument_node="">
</span><p data-dcnode-id="5339" style="text-align: left;"><span data-dcnode-id="5340" instrument_node="">The only time I’d advise to book online is if you’re going during high season (mid-June to early-September and mid-December to mid-January)&nbsp;since the number of tours running is limited to minimize the potential damage to the ecosystem (more on that below).</span></p><span data-dcnode-id="5338" instrument_node="">
</span><p data-dcnode-id="5333" style="text-align: left;"><span data-dcnode-id="5337" instrument_node="">In that case,&nbsp;</span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%26p%3Dhttps%253A%252F%252Fwww.viator.com%252FGalapagos-Islands%252Fd936-ttd" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5336" instrument_node="">I’d recommend checking Viator</span></a><span data-dcnode-id="5334" instrument_node="">, which has a few day and multi-day tours available, but yes, they are slightly more expensive than if you bargain in person.</span></p><span data-dcnode-id="5332" instrument_node="">
</span><p data-dcnode-id="5329" style="text-align: left;"><strong data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">Why would you pay for a day tour?</span></strong></p><span data-dcnode-id="5328" instrument_node="">
</span><p data-dcnode-id="5326" style="text-align: left;"><span data-dcnode-id="5327" instrument_node="">As beautiful as Santa Cruz, San Cristobal, Floreana, and Isabela are, there are other islands that are even more beautiful or that provide other snorkeling/diving and wildlife spotting opportunities.</span></p><span data-dcnode-id="5325" instrument_node="">
</span><figure aria-describedby="caption-attachment-14950" class="wp-caption aligncenter" data-dcnode-id="5314" id="attachment_14950" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14950" data-dcnode-id="5319"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5324" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Iguana-600x400.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Iguana.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Iguana-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Iguana-20x13.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Iguana.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="400" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20400'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 13" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FMarine-Iguana.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5321"><svg data-dcnode-id="5322" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><p </span><p data-dcnode-id="5308" style="text-align: left;"><span data-dcnode-id="5312" instrument_node="">I enjoyed </span><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BBartolome%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FSanta-Cruz%252FBartolome-Day-Tour-Galapagos-Includes-Hotel-Pick-up%252Fd50212-19569P14" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5311" instrument_node="">my day tour to Bartolome</span></a><span data-dcnode-id="5309" instrument_node="">, which has the iconic view that represents the volcanic nature of Galapagos. It is not great for wildlife, but it is quite nice for snorkeling and diving.</span></p><span data-dcnode-id="5307" instrument_node="">
</span><p data-dcnode-id="5305" style="text-align: left;"><span data-dcnode-id="5306" instrument_node="">I also visited North Seymour to see the Blue Footed Boobies, Frigate Birds, and other animals found there.</span></p><span data-dcnode-id="5304" instrument_node="">
</span><p data-dcnode-id="5302" style="text-align: left;"><span data-dcnode-id="5303" instrument_node="">This tour, though, I wouldn’t recommend unless you want to see big colonies of such animals. I believe the price ($150+) is not worth it (unless you’re a naturalist).</span></p><span data-dcnode-id="5301" instrument_node="">
</span><figure aria-describedby="caption-attachment-14942" class="wp-caption aligncenter" data-dcnode-id="5290" id="attachment_14942" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14942" data-dcnode-id="5295"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5300" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Blue-Footed-Booby-600x400.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Blue-Footed-Booby.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Blue-Footed-Booby-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Blue-Footed-Booby-20x13.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Blue-Footed-Booby.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="400" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20400'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 14" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FBlue-Footed-Booby.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5297"><svg data-dcnode-id="5298" height="32" viewBox="0 0 23 32" width="23" xmlns="http:/ </span><p data-dcnode-id="5287" style="text-align: left;"><span data-dcnode-id="5288" instrument_node="">Other Islands you can visit with day tours are Isabela, Floreana, Santa Fe, Pinzon, and San Cristobal.</span></p><span data-dcnode-id="5286" instrument_node="">
</span><p data-dcnode-id="5284" style="text-align: left;"><span data-dcnode-id="5285" instrument_node="">In my opinion, it is not worth doing day tours to the islands you can visit on your own since they are best experienced by staying there at least a day or two.</span></p><span data-dcnode-id="5283" instrument_node="">
</span><p data-dcnode-id="5280" style="text-align: left;"><strong data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">How Day Tours Work?</span></strong></p><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5277" style="text-align: left;"><span data-dcnode-id="5278" instrument_node="">Something you must take into account when planning your trip is that companies have a restricted schedule.</span></p><span data-dcnode-id="5276" instrument_node="">
</span><p data-dcnode-id="5274" style="text-align: left;"><span data-dcnode-id="5275" instrument_node="">The National Park allows only a limited number of visitors per island, so each tour company can visit X or Y island a few days a week. So, if one company is not going to Bartolome today, another one will.</span></p><span data-dcnode-id="5273" instrument_node="">
</span><p data-dcnode-id="5264" style="text-align: left;"></p><div class="dpsp-pin-it-wrapper aligncenter size-large wp-image-14951" data-dcnode-id="5267"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5272" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-600x338.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-300x169.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-20x11.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="338" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20338'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 15" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FMarine-Turtle.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5269"><svg data-dcnode-id="5270" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="5271"></path></svg></span></a></div><noscript data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">&lt;img class="aligncenter size-large wp-image-14951" src="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-600x338.jpg" alt="Galapagos Islands, Ecuador" width="600" height="338" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-300x169.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle-20x11.jpg 20w" sizes="(max-width: 600px) 100vw, 600px" title="How to Travel The Galapagos Islands on a Budget 15" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Marine-Turtle.jpg"&gt;</span></noscript><p></p><span data-dcnode-id="5263" instrument_node="">
</span><p data-dcnode-id="5261" style="text-align: left;"><span data-dcnode-id="5262" instrument_node="">Additionally, tours are strict on what you’re allowed to do according to the permits they got from the National Park. If it is a land tour (land permit), you’re not allowed to touch the water, and vice versa with a water permit.</span></p><span data-dcnode-id="5260" instrument_node="">
</span><p data-dcnode-id="5258" style="text-align: left;"><span data-dcnode-id="5259" instrument_node="">For example, during my diving tours, we were not allowed to stand even on the rocks by the shore of one of the islands. And on my North Seymour tour, we were not allowed to swim in the water since we were walking on the island to spot the birds.</span></p><span data-dcnode-id="5257" instrument_node="">
</span><p data-dcnode-id="5255" style="text-align: left;"><span data-dcnode-id="5256" instrument_node="">A snorkeling tour by the beach, of course, allows you to walk on the beach and surrounding areas.</span></p><span data-dcnode-id="5254" instrument_node="">
</span><p data-dcnode-id="5252" style="text-align: left;"><span data-dcnode-id="5253" instrument_node="">Based on personal experience, if you want to go to Bartolome, book it first thing after you arrive, as this tour is very popular and fills up quickly (sometimes days in advance).</span></p><span data-dcnode-id="5251" instrument_node="">
</span><figure aria-describedby="caption-attachment-26339" class="wp-caption aligncenter" data-dcnode-id="5240" id="attachment_26339" style="width: 1500px"><div class="dpsp-pin-it-wrapper size-full wp-image-26339" data-dcnode-id="5245"><img alt="Galapagos on a Budget - Bartolome Island" class="" data-dcnode-id="5250" data-lazy-sizes="(max-width: 1500px) 100vw, 1500px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg 1500w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-600x400.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-768x512.jpg 768w" data-pin-description="Galapagos on a Budget - Bartolome Island" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201500%201000'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 16" width="1500"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FGalapagos-on-a-Budget.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520on%2520a%2520Budget%2520-%2520Bartolome%2520Island" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5247"><svg data-dcnode-id="5248" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="5249"></path></svg></span></a></div><noscript data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">&lt;img class="size-full wp-image-26339" src="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg" alt="Galapagos on a Budget - Bartolome Island" width="1500" height="1000" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg 1500w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-600x400.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget-768x512.jpg 768w" sizes="(max-width: 1500px) 100vw, 1500px" title="How to Travel The Galapagos Islands on a Budget 16" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Galapagos-on-a-Budget.jpg"&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="5241" id="caption-attachment-26339"><span data-dcnode-id="5242" instrument_node="">The “it” view of Galapagos as seen from the top of Bartolome Island.</span></figcaption></figure><span data-dcnode-id="5239" instrument_node="">
</span><p data-dcnode-id="5237" style="text-align: left;"><span data-dcnode-id="5238" instrument_node="">A DIY with Day Tours kind of trip will cost you around $115 to $200 per day on average, depending on how many tours you do. I averaged $122.42 per day, including two dive tours and two land tours.</span></p><span data-dcnode-id="5236" instrument_node="">
</span><h3 data-dcnode-id="5233"><strong data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">Best Tours in the Galapagos Islands</span></strong></h3><span data-dcnode-id="5232" instrument_node="">
</span><p data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">The following are some of the best Galapagos tours I did and I highly recommend doing if you’re booking things ahead:</span></p><span data-dcnode-id="5229" instrument_node="">
</span><ul data-dcnode-id="5209"><span data-dcnode-id="5228" instrument_node="">
</span><li data-dcnode-id="5224"><a data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BBartolome%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FSanta-Cruz%252FBartolome-Day-Tour-Galapagos-Includes-Hotel-Pick-up%252Fd50212-19569P14" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5227" instrument_node="">A Day Tour to Bartolome, with snorkeling!</span></a><span data-dcnode-id="5225" instrument_node=""> (Don’t miss visiting Bartolome, and book this one ahead of time or at least the very first day you get to the Galapagos. It gets fully booked all the time!)</span></li><span data-dcnode-id="5223" instrument_node="">
</span><li data-dcnode-id="5219"><a data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BSeymour%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FPuerto-Ayora%252FSeymour-North-Island-Full-Day-Tour%252Fd50235-30440P61" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5222" instrument_node="">A Day Tour to Seymour Island</span></a><span data-dcnode-id="5220" instrument_node=""> (As I mentioned, this one is great for those interested in birds and wildlife)</span></li><span data-dcnode-id="5218" instrument_node="">
</span><li data-dcnode-id="5215"><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BFloreana%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FSanta-Cruz%252FSanta-Cruz-Isla-Floreana-Day-Tour%252Fd50212-104189P14" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5217" instrument_node="">A Day Tour to Floreana Island</span></a></li><span data-dcnode-id="5214" instrument_node="">
</span><li data-dcnode-id="5211"><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BSnorkeling%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FGalapagos-Islands%252FSanta-Fe-Galapagos-Snorkeling-Day-Trip-plus-Playa-Escondida-Includes-Lunch%252Fd936-19569P35" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5213" instrument_node="">A Snorkeling with Sea Lions Tour!</span></a></li><span data-dcnode-id="5210" instrument_node="">
</span></ul><span data-dcnode-id="5208" instrument_node="">
</span><p data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">There are a few budget multi-day tours available, that while I didn’t do myself, they seem to have pretty good reviews. These some good options to see the Galapagos on a budget without having to plan everything yourself:</span></p><span data-dcnode-id="5205" instrument_node="">
</span><ul data-dcnode-id="5187"><span data-dcnode-id="5204" instrument_node="">
</span><li data-dcnode-id="5201"><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2BBudget%2B4%2Bdays%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FGalapagos-Islands%252F4-Day-Galapagos-Island-Hopping-Toure%252Fd936-29628P4" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5203" instrument_node="">4 Days Galapagos on a Budget</span></a></li><span data-dcnode-id="5200" instrument_node="">
</span><li data-dcnode-id="5197"><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2B4%2Bdays%2BExpress%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FGalapagos-Islands%252F4-Day-Galapagos-Islands-Flash-Tour%252Fd936-3074P60" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5199" instrument_node="">4 Days Galapagos Express</span></a></li><span data-dcnode-id="5196" instrument_node="">
</span><li data-dcnode-id="5193"><a data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2B6%2BDays%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FGalapagos-Islands%252F6-Day-Galapagos-Island-Hopping%252Fd936-29628P6" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5195" instrument_node="">6 Days Galapagos Island Hopping on a Budget</span></a></li><span data-dcnode-id="5192" instrument_node="">
</span><li data-dcnode-id="5189"><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%2B8%2Bdays%26ued%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FSan-Cristobal%252F8-Day-Galapagos-Multi-Sport-Adventure-Tour-Visiting-Three-Islands%252Fd50236-19569P4" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5191" instrument_node="">8 Days Galapagos Adventure</span></a></li><span data-dcnode-id="5188" instrument_node="">
</span></ul><span data-dcnode-id="5186" instrument_node="">
</span><h3 data-dcnode-id="5183" style="text-align: left;"><strong data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">Don’t miss the diving tours…</span></strong></h3><span data-dcnode-id="5182" instrument_node="">
</span><p data-dcnode-id="5180" style="text-align: left;"><span data-dcnode-id="5181" instrument_node="">Diving was the highlight of my trip to Galapagos. I did two dives in Gordon Rocks and two dives in Floreana. It is said that Gordon Rocks is one of the best, if not the best, dive you can do as a day trip.</span></p><span data-dcnode-id="5179" instrument_node="">
</span><p data-dcnode-id="5177" style="text-align: left;"><span data-dcnode-id="5178" instrument_node="">There are better dives in Galapagos, of course, but these can only be reached with liveaboard cruises (which are awfully expensive).</span></p><span data-dcnode-id="5176" instrument_node="">
</span><p data-dcnode-id="5174" style="text-align: left;"><span data-dcnode-id="5175" instrument_node="">On Gordon Rocks, you can see loads of marine life including marine turtles, manta rays, whitetip sharks, hammerhead sharks, and more. Close to it, you can also snorkel with sea lions (my favorite part of this particular dive trip).</span></p><span data-dcnode-id="5173" instrument_node="">
</span><p data-dcnode-id="5171" style="text-align: left;"><span data-dcnode-id="5172" instrument_node="">In Floreana, I saw similar wildlife, except for the hammerhead sharks, and had a marvelous time diving with several playful sea lions.</span></p><span data-dcnode-id="5170" instrument_node="">
</span><p data-dcnode-id="5168" style="text-align: left;"><span data-dcnode-id="5169" instrument_node="">Dive trips go for an average of $150 for two dives, and in the case of Gordon’s Rock, you must be an experienced diver (20+ dives) due to the strong currents there.</span></p><span data-dcnode-id="5167" instrument_node="">
</span><p data-dcnode-id="5159" style="text-align: left;"><span data-dcnode-id="5166" instrument_node="">I did my dives with </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Albatros-Tours-SA-Albatros-Dive-Resort/464281836955315%3Fsk%3Dtimeline" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5165" instrument_node="">Albatros Tours</span></a><span data-dcnode-id="5163" instrument_node="">, and I highly recommend them. Another company that I was recommended was </span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scubaiguana.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5162" instrument_node="">Scuba Iguana</span></a><span data-dcnode-id="5160" instrument_node="">.</span></p><span data-dcnode-id="5158" instrument_node="">

</span><figure aria-describedby="caption-attachment-14952" class="wp-caption aligncenter" data-dcnode-id="5135" id="attachment_14952" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14952" data-dcnode-id="5140"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5145" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Diving-600x338.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Diving.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Diving-300x169.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Diving-20x11.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Norbert-Diving.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="338" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20338'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 18" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FNorbert-Diving.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5142"><svg data-dcnode-id="5143" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/s </span><h3 data-dcnode-id="5131" style="text-align: left;"><strong data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">Last-Minute Cruises in the Galapagos Islands</span></strong></h3><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5128" style="text-align: left;"><span data-dcnode-id="5129" instrument_node="">Cruises fall on the higher end of the cost scale, but should you do your proper research and outreach, you might find affordable last-minute cruises worth doing.</span></p><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5125" style="text-align: left;"><span data-dcnode-id="5126" instrument_node="">Cruises are also the best way to reach those further islands day-trippers can’t visit and to see some of the most beautiful and untouched sceneries in Galapagos.</span></p><span data-dcnode-id="5124" instrument_node="">
</span><p data-dcnode-id="5122" style="text-align: left;"><span data-dcnode-id="5123" instrument_node="">I originally intended to see Galapagos by cruise, but after contacting a few agencies, the itineraries I got did not fully fit my interest in places I wanted to see.</span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5119" style="text-align: left;"><span data-dcnode-id="5120" instrument_node="">Still, I got some pretty good quotes from them. Also, cruises don’t include diving in their activities though they do a lot of snorkeling.</span></p><span data-dcnode-id="5118" instrument_node="">
</span><figure aria-describedby="caption-attachment-14957" class="wp-caption aligncenter" data-dcnode-id="5107" id="attachment_14957" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14957" data-dcnode-id="5112"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5117" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Sea-Lions-600x337.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Sea-Lions.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Sea-Lions-300x169.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Sea-Lions-20x11.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Sea-Lions.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="337" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20337'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 19" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FSea-Lions.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5114"><svg data-dcnode-id="5115" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 </span><p data-dcnode-id="5104" style="text-align: left;"><span data-dcnode-id="5105" instrument_node="">Through emails and calls, I managed to find 4-day cruises from $730, 5-day from $780, and 8-day from $1,300. These prices didn’t include the airfare nor the park’s entrance fee.</span></p><span data-dcnode-id="5103" instrument_node="">
</span><p data-dcnode-id="5101" style="text-align: left;"><span data-dcnode-id="5102" instrument_node="">It is said that you can find the best last-minute deals between a month and three weeks before your departure date, so have that in mind when searching for deals.</span></p><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5098" style="text-align: left;"><span data-dcnode-id="5099" instrument_node="">If you’re flexible on time, it is recommended just to arrive in Puerto Ayora and search there for a cruise, as it will be much cheaper. I did my “test search” and I didn’t find them much cheaper than from what I found through emails and phone calls.</span></p><span data-dcnode-id="5097" instrument_node="">
</span><figure aria-describedby="caption-attachment-14959" class="wp-caption aligncenter" data-dcnode-id="5086" id="attachment_14959" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14959" data-dcnode-id="5091"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5096" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Yatch-600x306.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Yatch.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Yatch-300x153.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Yatch-20x10.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Yatch.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="306" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20306'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 20" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FYatch.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5093"><svg data-dcnode-id="5094" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 </span><p data-dcnode-id="5082" style="text-align: left;"><strong data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">These are the companies I called and emailed:</span></strong></p><span data-dcnode-id="5081" instrument_node="">
</span><ul data-dcnode-id="5061"><span data-dcnode-id="5080" instrument_node="">
</span><li data-dcnode-id="5077"><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecuatraveling.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5079" instrument_node="">Ecuatraveling</span></a></li><span data-dcnode-id="5076" instrument_node="">
</span><li data-dcnode-id="5073"><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//galapagoslastminute.net/" rel="noopener" style="font-family: Verdana, Helvetica, Arial, sans-serif; font-size: 1rem;" target="_blank"><span data-dcnode-id="5075" instrument_node="">GalapagosLastMinute.net</span></a></li><span data-dcnode-id="5072" instrument_node="">
</span><li data-dcnode-id="5069"><a data-dcnode-id="5070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.galapagostours.net/" rel="nofollow noopener noreferrer" style="font-family: Verdana, Helvetica, Arial, sans-serif; font-size: 1rem;" target="_blank"><span data-dcnode-id="5071" instrument_node="">Galapagos Tours Co.</span></a></li><span data-dcnode-id="5068" instrument_node="">
</span><li data-dcnode-id="5063"><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imagineecuador.com/" rel="nofollow noopener noreferrer" style="font-family: Verdana, Helvetica, Arial, sans-serif; font-size: 1rem;" target="_blank"><span data-dcnode-id="5067" instrument_node="">Imagine Ecuador</span></a><span data-dcnode-id="5064" style="font-family: Verdana, Helvetica, Arial, sans-serif; font-size: 1rem;"><span data-dcnode-id="5065" instrument_node=""> – Of all the companies I contacted, they gave the best last-minute deals.</span></span></li><span data-dcnode-id="5062" instrument_node="">
</span></ul><span data-dcnode-id="5060" instrument_node="">
</span><p data-dcnode-id="5055" style="text-align: left;"><span data-dcnode-id="5059" instrument_node="">There’s also </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.galapagoscruiselinks.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5058" instrument_node="">Galapagos Cruise Links</span></a><span data-dcnode-id="5056" instrument_node="">, which is a site where you can contact the cruise owners directly, not an intermediary tour company. You can bargain with them for lower than what you see on the site. This site is a hit-n-miss depending on how willing the cruise owner is on discussing prices.</span></p><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5049" style="text-align: left;"><span data-dcnode-id="5053" instrument_node="">Also, Viator has </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D11018%26awinaffid%3D206089%26clickref%3DGalapagos%26p%3Dhttps%253A%252F%252Fwww.viator.com%252FGalapagos-Islands%252Fd936-ttd" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5052" instrument_node="">a few last-minute cruises</span></a><span data-dcnode-id="5050" instrument_node=""> listed on their site. They may not be the cheapest, but they aren’t that expensive either.</span></p><span data-dcnode-id="5048" instrument_node="">
</span><p data-dcnode-id="5043" style="text-align: left;"><span data-dcnode-id="5047" instrument_node="">Have in mind that not all cruises are the same, and service varies depending on the category – from budget to luxury. There are also other criteria you must have in mind when choosing a cruise, so to better understand them, </span><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikivoyage.org/wiki/Galapagos_Islands" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5046" instrument_node="">check out the “Get Around” section of this Wikivoyage page</span></a><span data-dcnode-id="5044" instrument_node="">.</span></p><span data-dcnode-id="5042" instrument_node="">
</span><p data-dcnode-id="5034"><span data-dcnode-id="5041" instrument_node="">Lastly, should you not want to fuss too much with planning and figuring things out with transport and cruises, then I highly recommend checking the excellent cruise tours offered by </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/gadventures-galapagos/"><span data-dcnode-id="5040" instrument_node="">G Adventures</span></a><span data-dcnode-id="5038" instrument_node=""> and </span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/intrepidtravel-galapagos/"><span data-dcnode-id="5037" instrument_node="">Intrepid Travel</span></a><span data-dcnode-id="5035" instrument_node="">.</span></p><span data-dcnode-id="5033" instrument_node="">
</span><p data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">I’ve traveled with both companies several times (not to Galapagos, though), and both have an&nbsp;outstanding reputation all around the world and some of the best tours you can ask for.</span></p><span data-dcnode-id="5030" instrument_node="">
</span><h2 data-dcnode-id="5027" style="text-align: left;"><strong data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">A Few Extra Things You Must Know</span></strong></h2><span data-dcnode-id="5026" instrument_node="">
</span><ul data-dcnode-id="5004"><span data-dcnode-id="5025" instrument_node="">
</span><li data-dcnode-id="5023" style="text-align: left;"><span data-dcnode-id="5024" instrument_node="">There’s a park entrance fee of $100 charged right at the airport in Galapagos.</span></li><span data-dcnode-id="5022" instrument_node="">
</span><li data-dcnode-id="5020" style="text-align: left;"><span data-dcnode-id="5021" instrument_node="">There’s an additional $20 “transit control” fee charged before checking in your flight in Guayaquil or Quito.</span></li><span data-dcnode-id="5019" instrument_node="">
</span><li data-dcnode-id="5017" style="text-align: left;"><span data-dcnode-id="5018" instrument_node="">Smoking is technically not allowed in the islands (since they are all a national park) though some people do discretely.</span></li><span data-dcnode-id="5016" instrument_node="">
</span><li data-dcnode-id="5006" style="text-align: left;"><span data-dcnode-id="5015" instrument_node="">It’s not possible to buy a one-way ticket without proof of transportation from the islands. While this is true, I spoke with travelers who managed to fly into Galapagos with only a one-way ticket (but maybe they were lucky). Buy a round-trip, and should you want to extend your time there, it is easy (and free if the price is the same) to change the date of your return ticket or to switch your departure to another island. This is true only if you bought your tickets directly at </span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latam.com/" rel="nofollow noopener noreferrer" style="font-size: 1rem;" target="_blank"><span data-dcnode-id="5014" instrument_node="">LATAM.com</span></a><span data-dcnode-id="5011" style="font-size: 1rem;"><span data-dcnode-id="5012" instrument_node=""> or </span></span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tame.com.ec/" rel="nofollow noopener noreferrer" style="font-size: 1rem;" target="_blank"><span data-dcnode-id="5010" instrument_node="">Tame.com.ec</span></a><span data-dcnode-id="5007" style="font-size: 1rem;"><span data-dcnode-id="5008" instrument_node=""> (and not through an aggregator site like expedia.com and such).</span></span></li><span data-dcnode-id="5005" instrument_node="">
</span></ul><span data-dcnode-id="5003" instrument_node="">
</span><figure aria-describedby="caption-attachment-14945" class="wp-caption aligncenter" data-dcnode-id="4992" id="attachment_14945" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14945" data-dcnode-id="4997"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5002" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Flamingos-600x400.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Flamingos.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Flamingos-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Flamingos-20x13.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Flamingos.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="400" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20400'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 21" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FFlamingos.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="4999"><svg data-dcnode-id="5000" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 </span><p data-dcnode-id="4989" style="text-align: left;"><span data-dcnode-id="4990" instrument_node="">Phew, this was a long post, but I shared here all my knowledge about Galapagos. And hey, it’s a once in a lifetime experience, so I want you to enjoy it just as much as I did!</span></p><span data-dcnode-id="4988" instrument_node="">

</span><div class="comment-metadata" data-dcnode-id="4398"><span data-dcnode-id="4403" instrument_node="">
</span><a data-dcnode-id="4400" href="#comment-51781"><time data-dcnode-id="4401" datetime="2015-10-15T03:21:58-04:00"><span data-dcnode-id="4402" instrument_node="">October 15, 2015 at 3:21 am</span></time></a><span data-dcnode-id="4399" instrument_node=""> </span></div><span data-dcnode-id="4396" instrument_node="">

</span><div class="comment-content" data-dcnode-id="4379"><span data-dcnode-id="4392" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Thanks for provide this blog!</span></p><span data-dcnode-id="4389" instrument_node="">
</span><p data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">When I decided to volunteer in Ecuador I knew that the Galapagos islands were a must-see, but I didn’t want to spend a large part of my budget on an expensive cruise. So I decided to try out the cheaper, less practiced option: fly to the archipelago, stay on the main island of Santa Cruz and do day trips to the surrounding islands.</span></p><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">While this can start off as a good idea, it’s very easy for the money to start vanishing. We met people who were spending two weeks on Santa Cruz and taking day trips almost every day: when you add up the $70+ day trip price, plus nightly dinners and accommodation, it starts to look like an all-inclusive cruise would be more economical!</span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">My friend Sherri and I were certain we could get the majority of the Galapagos experience without the huge price tag – but obviously that comes at a price of its own. We didn’t eat a huge amount and when we did it wasn’t fancy meals; we walked most of the time and we hungrily searched out every free activity we could. But it worked!</span></p><span data-dcnode-id="4380" instrument_node="">
</span></div><span data-dcnode-id="4377" instrument_node="">
</span><div class="reply" data-dcnode-id="4374"><a aria-label="Reply to B.H." class="comment-reply-link" data-belowelement="div-comment-51781" data-commentid="51781" data-dcnode-id="4375" data-postid="14936" data-replyto="Reply to B.H." data-respondelement="respond" href="#comment-51781" rel="nofollow"><span data-dcnode-id="4376" instrument_node="">Reply</span></a></div><span data-dcnode-id="4373" instrument_node=""> </span></article><span data-dcnode-id="4370" instrument_node="">

</span><div class="comment-content" data-dcnode-id="4148"><span data-dcnode-id="4152" instrument_node="">
</span><p data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">I am an Ecuadorian living in the states who loves to travel. Yes, you could travel to the Galapagos on your own, but from personal experience, a cruise is the way to go. Of course a very cheap cruise. The reason? cruises will take you to beaches or places only shown on National Geographic documentaries. There are beaches such as sombrero chino, las bachas or Gardner Bay (one of the most beautiful beaches in the world) which can only be accessed by cruises. Also cruises will take you to places where wildlife is abundant such as Punta Suarez in Espanola Island. If you are young, consider a cheap cruise since you will almost pay the same as if you were doing a budget backpack trip</span></p><span data-dcnode-id="4149" instrument_node="">

</span><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Hi Greg – </span></p><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">When it is high season, you might have some luck, but be aware that there may not be a lot of availability like I had in May. When I searched around I found several options that could fit 5 people (my group), so if you’re traveling solo or just a couple, I guess you might have better luck. Still, I might recommend booking the first night or two if you still want to go with “no reservation” for most of the trip to save money.</span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Regarding Spanish, yes, most of them speak English. Tourism moves the economy in Galapagos, so most people there speak at least basic English to form a conversation.</span></p><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Hope this helps!</span></p><span data-dcnode-id="3997" instrument_node="">

</span><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">Hi Abby – </span></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">We went to the tunnels along the main road from the airport to town, and all we did was pay for a taxi to get there. The driver (who said was a tour guide too, as everyone else there says) just told us to go through one entrance (where he dropped us), and exit through the other (where he picked us up). It was simple and there was no need of a guide.</span></p><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">If you feel like you want/need a guide, you can do it right in town the day before or even the same day if you do it early.</span></p><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">By the way, we got our taxi driver literally on the street around 1:00pm when we decided to go to the tunnels. If you’re going during high season, you might want to plan it a bit ahead (a day or two) since it gets very crowded there.</span></p><span data-dcnode-id="3893" instrument_node="">
</span><p data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Hope this helps!</span></p><span data-dcnode-id="3890" instrument_node="">
</span></div><span data-dcnode-id="3887" instrument_node="">

</span><p data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">You can go to Isabela on your own by taking a boat transfer. If I remember correctly it departs twice or up to three times a day and takes around two hours each way. I think you should stay there overnight as there’s a lot to do and see in Isabela. Unfortunately I don’t have any place I can recommend, but if it’s not high season, I’m sure you can spot a decent place by just arriving there and walking around. That’s how I found mine in Santa Cruz.</span></p><span data-dcnode-id="3254" instrument_node="">

</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Hi Claire – </span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Well it depends on your pace, but I’d say at least 3 in Santa Cruz, 2 in Floreana, 3 in Isabela, 2 in San Cristobal, and Baltra only has the airport, so no days for that one.</span></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Of course, you could choose to stay longer or less days on each island depending on your interests. In my opinion, these amount of days will allow you to travel round those islands, and even do a few day tours (which you might still need to do if you like diving or would like to go to other islands), and even relax for a day or two. The total of days comes to 10, but I’d maybe push it to 12 or even two weeks depending on how much you want to do. But for sure, don’t go to Galapagos for less than a week.</span></p><span data-dcnode-id="2890" instrument_node="">
</span></div><span data-dcnode-id="2887" instrument_node="">

</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">About the cruise, to be honest, you’ll have to dig in with some research as their schedules change all the time and the islands vary. I’d recommend to start with the list of companies listed in the post. </span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">The transfer between islands is not a speedboat but a ferry. To Floreana is the same (a ferry), though I believe you can hop on diving tours to Floreana to catch a ride there for a fee. (Don’t quote me on that, though).</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Most of the information I shared on this post I got to know once in Galapagos. As you may have discovered already, there’s not a lot of transportation options info on the web, but, having said that, once you are in Galapagos, you can just hop in a tour shop and they will sort you out with all your transportation and/or tours. (even if last minute)</span></p><span data-dcnode-id="2795" instrument_node="">

</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Hi James – </span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">I recommend flying to Baltra if you want to see the most as it is the biggest base in Galapagos. I don’t have information on beginners dive, but I know they offer “Discovery Dives” which are dives for people interested in diving but that don’t have a diving license. One of my friends did it when I was there with her. All you have to do is ask right at the dive shop to see if they can accommodate you and give you the “crash course” before going into the water. Most companies do. If you’re certified by then, you definitely don’t need 20+ dives to go diving, that’s for “advanced” diving spots like Gordon Rocks or other deep dives. But, there are tons of places where you can dive with a basic certification and just a handful of dives.</span></p><span data-dcnode-id="2384" instrument_node="">
</span></div><span data-dcnode-id="2381" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Hi Slim – Three days is enough to get a good sense of Santa Cruz. I recommend staying in the town of Puerto Ayora. Regarding day trips, you will have to check there directly (or online) as that will depend on what they have available for the days you’re there. You can walk around Puerto Ayora and pay a taxi driver to give you a private tour to some of the most famous sights in the island (I have them listed here in the post). It’s not expensive and it’s easy to arrange. A good day trip to another island could be Isla Isabela and Bartolome Island, among other. It all depends on what you’re interested in seeing and what you’ll visit with your group tour after your days in Santa Cruz.</span></p><span data-dcnode-id="2189" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2087"><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">You should probably start at Santa Cruz and Puerto Ayora, which is where most businesses are and where most of the free attractions are. From there, you can plan your day trips or last-minute cruise to go anywhere you want/can according to your budget and time. But, even if you decide to spend most of your time in other islands, I recommend flying to Baltra (Santa Cruz) and staying in Puerto Ayora one or two nights to get your bearings and play it by ear.</span></p><span data-dcnode-id="2088" instrument_node="">

</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">If you’re on a tight budget, I’d suggest concentrating mostly on Baltra, Santa Cruz, San Cristobal and Isabela Island (or pretty much the main islands you can travel by local ferries). They have free or cheap things to do that don’t require a tour. </span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Only pay tours for things you really want to see and can’t do on your own. Instead of diving, do a snorkeling tour, as it’s cheaper. </span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Also, barter as much as you can. Some tour companies there give last minute discounts, so test your luck there.</span></p><span data-dcnode-id="1995" instrument_node="">

</span><p data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">That is correct. It’s a new rule they have in place. Should you want to “play it by ear” once in Galapagos, as I did (pre this rule), you could book a fully refundable hotel reservation via </span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/booking-com/" rel="ugc" target="_blank"><span data-dcnode-id="1783" instrument_node="">Booking.com</span></a><span data-dcnode-id="1781" instrument_node="">, print the “proof of reservation,” then cancel it to find a cheap place once in Galapagos. It might work, but technically you’re cheating the system, so do it at your own risk. Besides, it’s quite possible you might find equally cheap accommodation online, so maybe it’s not worth taking that risk.</span></p><span data-dcnode-id="1779" instrument_node="">

</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">As far as I know, the public ferries/speedboats only go between the four inhabited islands and they come and go twice or thrice a day, depending on the island. Usually at least once in the morning and once in the afternoon. If you’d like to visit any other uninhabited island, it must be done with a tour. The current schedule and price can be found there when you get to Santa Cruz, as it varied depending on the season.</span></p><span data-dcnode-id="1533" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">If you’re looking for day tours, you can book them last minute once you get to the islands. I’d recommend, though, to try to book all your tours on the first day once you’re there. Not all tours run every day, so you should make a list of what you’re interested in, and then organize them based on your (and their) schedule. Regarding price, I believe they are slightly cheaper once in Galapagos. If you’re booking more than two tours with the same provider, you can ask for a “bulk” discount. That worked for me when I booked 4 trips with the same company when I got there, but we were also 5 travelers, so we had some bargaining power there. Give it a try, anyway! Just so you have an idea, if prices are still the same, most day tours between $100 and $150 (including the diving tours). The ones that are slightly more expensive are around $160-170 and are for further islands that are still doable with a day trip.</span></p><span data-dcnode-id="1446" instrument_node="">

</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Hi Michole – </span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Not sure about the fact that sharks are well fed (at least not by humans). The Galapagos is a natural reserve and these sharks are wild animals, so they take care of themselves naturally (as far as I know). Having said that, most sharks don’t attack humans just because. I’ve dived several times with different kinds of non-dangerous sharks and they have never bothered me or any other diver I know. They simply mind their own business as long as we don’t bother them directly. </span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Hope this helps.</span></p><span data-dcnode-id="1034" instrument_node="">

</span><a data-dcnode-id="899" href="#comment-56678"><time data-dcnode-id="900" datetime="2018-10-18T08:40:47-04:00"><span data-dcnode-id="901" instrument_node="">October 18, 2018 at 8:40 am</span></time></a><span data-dcnode-id="898" instrument_node=""> </span></div><span data-dcnode-id="895" instrument_node="">

</span><div class="comment-content" data-dcnode-id="875"><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="890" instrument_node="">Thanks Norbert for the wonderful post – you truly are a good Samaritan helping your fellow travelers.</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
So I am planning a DIY trip from 12/25 – 12/31 to the Galapagos (Santa Cruz)  myself with my wife and 2.5 year old daughter so did not want to make it too hectic with tours every day .</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
However, I would like to do a 1 day trip to Bartolome island but can a 2.5 year old do that walk? Is it a very taxing long walk? Can i wait to book my Bartolome island trip until I get there since I am unable to find any availability for that week online?</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
I also wanted to do the South Plaza island for its colorful flora but would they be colorful in December – is that island worth doing?</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
Otherwise I was planning just taking the ferry to Isabela or San Cristobal (any suggestions based on which animals I would not get to see in Santa Cruz but would see in either of these islands)? Do you have a preference between these two islands? I was then planning to get a hotel once I arrived in Isabela or San Cristo but would it be easy enough to find a hotel once we get there at that time of the year?</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
Finally, I am presuming I can get the tickets for the ferry once I get there and I understand it is $30 one way and takes about 2 hours  – is that right?</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
Thanks and happy travels</span></p><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="873" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="860" data-lazy-src="https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f" data-lazy-srcset="https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f 2x" data-pin-nopin="true" height="60" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2060%2060'%3E%3C/svg%3E" width="60"><noscript data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">&lt;img alt='' src='https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f' srcset='https://www.globotreks.com/wp-content/gravatars/59cfbb3ffc348ea60c7694d5a472776f 2x' class='avatar avatar-60 photo' height='60' width='60' /&gt;</span></noscript><span data-dcnode-id="857" instrument_node=""> </span><b class="fn" data-dcnode-id="854"><a class="url" data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/" rel="external nofollow ugc"><span data-dcnode-id="856" instrument_node="">Norbert</span></a></b><span data-dcnode-id="853" instrument_node=""> </span><span class="says" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">says:</span></span><span data-dcnode-id="850" instrument_node=""> </span></div><span data-dcnode-id="847" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="841"><span data-dcnode-id="846" instrument_node="">
</span><a data-dcnode-id="843" href="#comment-56680"><time data-dcnode-id="844" datetime="2018-10-18T17:01:50-04:00"><span data-dcnode-id="845" instrument_node="">October 18, 2018 at 5:01 pm</span></time></a><span data-dcnode-id="842" instrument_node=""> </span></div><span data-dcnode-id="839" instrument_node="">
</span></footer><span data-dcnode-id="836" instrument_node="">
</span><div class="comment-content" data-dcnode-id="810"><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Hi Neel – </span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Thanks! Yes, a 2.5 years old can do that walk. It is not too long, but it’s uphill (mostly stepped). Just take your time going up. I booked my trip to Bartolome while in Santa Cruz, so you might have a similar luck, but if you’re already seeing it all booked for that week, then it could be quite risky. </span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">I haven’t been to South Plaza, so can’t say anything based on experience.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">In Isabela and San Cristobal you’ll get to see more seals. Personally I think Isabela offers more, but that’s just a personal opinion.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Yes, the ferry you can book there. It’s pretty easy to do. There are also speedboats, should you want to save time.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Regarding booking hotels in Isabela/San Cristobal once there, I’m sure there could be options to book last minute, but have in mind that you’re going during X-mas holidays, so it could be quite busy. In that case, I’d try booking online, or at least keep an eye on </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/booking-com/" rel="noopener ugc" target="_blank"><span data-dcnode-id="818" instrument_node="">booking.com</span></a><span data-dcnode-id="816" instrument_node="">, which tells you how many rooms are available at any given hotel for those days. Booking.com also offers free cancelation on many hotels, so it’s another option should you want to play it safe.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Hope this helps!</span></p><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="808" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="787" data-lazy-src="https://www.globotreks.com/wp-content/gravatars/103e1bdd90977dd7a5eeeff7465dc3ce" data-lazy-srcset="https://www.globotreks.com/wp-content/gravatars/103e1bdd90977dd7a5eeeff7465dc3ce 2x" data-pin-nopin="true" height="60" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2060%2060'%3E%3C/svg%3E" width="60"><noscript data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&lt;img alt='' src='https://www.globotreks.com/wp-content/gravatars/103e1bdd90977dd7a5eeeff7465dc3ce' srcset='https://www.globotreks.com/wp-content/gravatars/103e1bdd90977dd7a5eeeff7465dc3ce 2x' class='avatar avatar-60 photo' height='60' width='60' /&gt;</span></noscript><span data-dcnode-id="784" instrument_node=""> </span><b class="fn" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Maya</span></b><span data-dcnode-id="781" instrument_node=""> </span><span class="says" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">says:</span></span><span data-dcnode-id="778" instrument_node=""> </span></div><span data-dcnode-id="775" instrument_node="">

</span><div class="comment-content" data-dcnode-id="757"><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="762" instrument_node="">Hey Norbert, great post! This was really helpful!</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
Do you know if one has to book accomodations for all days before arriving at the islands? As per my understanding of the new ruling, you have to provide reservations of accomodations for your whole stay before you are allowed to enter the Galapogos. Wouldn’t this make it  difficult to spontaneously plan day trips, or stays at other islands?</span></p><span data-dcnode-id="758" instrument_node="">
