</span><span data-dcnode-id="6016" data-image-pin-it="true" id="dpsp-post-content-markup"></span><p data-dcnode-id="6014" style="text-align: left;"><span data-dcnode-id="6015" instrument_node="">The Galapagos Archipelago, also known as Darwin’s living laboratory, is home to an abundance of wildlife, both on land and underwater.</span></p><span data-dcnode-id="6013" instrument_node="">
</span><p data-dcnode-id="6011" style="text-align: left;"><span data-dcnode-id="6012" instrument_node="">Thanks to their isolation from the mainland for millions of years, animals here evolved into their own species to come with their unique environment.</span></p><span data-dcnode-id="6010" instrument_node="">
</span><p data-dcnode-id="6008" style="text-align: left;"><span data-dcnode-id="6009" instrument_node="">Galapagos has been one of the highlights of my round the world trip, and it is a place I would return every time I have the chance. These volcanic islands, while they are at the top of many bucket lists, they have the fame of being extremely expensive.</span></p><span data-dcnode-id="6007" instrument_node="">
</span><p data-dcnode-id="6005" style="text-align: left;"><span data-dcnode-id="6006" instrument_node="">Many people see them as a dream destination, far away from reality, but the truth is that these islands can be visited on a budget and many backpackers like me visit them too.</span></p><span data-dcnode-id="6004" instrument_node="">
</span><figure aria-describedby="caption-attachment-14958" class="wp-caption aligncenter" data-dcnode-id="5993" id="attachment_14958" style="width: 600px"><div class="dpsp-pin-it-wrapper wp-image-14958 size-large" data-dcnode-id="5998"><img alt="Galapagos Islands, Ecuador" class="entered lazyloaded" data-dcnode-id="6003" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-600x400.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-20x13.jpg 20w" data-ll-status="loaded" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-600x400.jpg&amp;raw" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-20x13.jpg 20w" style="" title="How to Travel The Galapagos Islands on a Budget 1" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FTortuga-Bay.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="6000"><svg data-dcnode-id="6001" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="6002"></path></svg></span></a></div><noscript data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">&lt;img class="wp-image-14958 size-large" src="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-600x400.jpg" alt="Galapagos Islands, Ecuador" width="600" height="400" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay-20x13.jpg 20w" sizes="(max-width: 600px) 100vw, 600px" title="How to Travel The Galapagos Islands on a Budget 1" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Tortuga-Bay.jpg"&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="5994" id="caption-attachment-14958"><span data-dcnode-id="5995" instrument_node="">Tortuga Bay in Santa Cruz</span></figcaption></figure><span data-dcnode-id="5992" instrument_node="">
</span><p data-dcnode-id="5990" style="text-align: left;"><span data-dcnode-id="5991" instrument_node="">Here I want to share with you everything I know about traveling Galapagos with a small budget.</span></p><span data-dcnode-id="5989" instrument_node="">
</span><h2 data-dcnode-id="5986" style="text-align: left;"><strong data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">How to Get to Galapagos Islands Cheaply</span></strong></h2><span data-dcnode-id="5985" instrument_node="">
</span><p data-dcnode-id="5977" style="text-align: left;"><span data-dcnode-id="5984" instrument_node="">The best way to get to Galapagos is by flying from mainland Ecuador – from either Quito or Guayaquil, with the latter often being cheaper. Check </span><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latam.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5983" instrument_node="">LATAM Airlines</span></a><span data-dcnode-id="5981" instrument_node=""> and </span><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tame.com.ec/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5980" instrument_node="">TAME</span></a><span data-dcnode-id="5978" instrument_node=""> as they often have cheap flights, going for as low as $250 round-trip.</span></p><span data-dcnode-id="5976" instrument_node="">
</span><p data-dcnode-id="5971" style="text-align: left;"><span data-dcnode-id="5975" instrument_node="">Normal airfares range from $300 to $500 round-trip (I paid $324 with LAN from Guayaquil). I would recommend </span><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latam.com/" rel="noopener" target="_blank"><span data-dcnode-id="5974" instrument_node="">following LATAM Airlines newsletter for deals</span></a><span data-dcnode-id="5972" instrument_node="">, as they often offer discounted airfares throughout all South America.</span></p><span data-dcnode-id="5970" instrument_node="">
</span><p data-dcnode-id="5968" style="text-align: left;"><span data-dcnode-id="5969" instrument_node="">There are several flights a day arriving both to San Cristobal Island and Baltra Island. The airport in Baltra is the one that will connect you to Santa Cruz Island, which is the most developed island in all Galapagos.</span></p><span data-dcnode-id="5967" instrument_node="">
</span><p data-dcnode-id="5965" style="text-align: left;"><span data-dcnode-id="5966" instrument_node="">In Santa Cruz, you’ll find Puerto Ayora, which is the most populated town, and while it is big and most things happen there, it is still quite small in comparison to mainland cities. It is also the main port from where most cruises and day tours depart.</span></p><span data-dcnode-id="5964" instrument_node="">
</span><figure aria-describedby="caption-attachment-14955" class="wp-caption aligncenter" data-dcnode-id="5953" id="attachment_14955" style="width: 600px"><div class="dpsp-pin-it-wrapper wp-image-14955 size-large" data-dcnode-id="5958"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5963" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-600x304.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-300x152.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-20x10.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="304" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20304'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 2" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FPuerto-Ayora.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5960"><svg data-dcnode-id="5961" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="5962"></path></svg></span></a></div><noscript data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">&lt;img class="wp-image-14955 size-large" src="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-600x304.jpg" alt="Galapagos Islands, Ecuador" width="600" height="304" srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-300x152.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora-20x10.jpg 20w" sizes="(max-width: 600px) 100vw, 600px" title="How to Travel The Galapagos Islands on a Budget 2" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Puerto-Ayora.jpg"&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="5954" id="caption-attachment-14955"><span data-dcnode-id="5955" instrument_node="">Puerto Ayora</span></figcaption></figure><span data-dcnode-id="5952" instrument_node="">
</span><p data-dcnode-id="5950" style="text-align: left;"><span data-dcnode-id="5951" instrument_node="">San Cristobal Island, on the other hand, is less developed than Santa Cruz, yet it is the capital of Galapagos and another departure point for cruises – located in the town of Puerto Baquerizo Moreno.</span></p><span data-dcnode-id="5949" instrument_node="">
</span><p data-dcnode-id="5947" style="text-align: left;"><span data-dcnode-id="5948" instrument_node="">When flying to Galapagos, make sure to know from which island your cruise is departing – should you choose that option.</span></p><span data-dcnode-id="5946" instrument_node="">
</span><p data-dcnode-id="5941" style="text-align: left;"><em data-dcnode-id="5943"><strong data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">UPDATE:</span></strong></em><span data-dcnode-id="5942" instrument_node=""> As of June 5, 2017, all national or foreign tourists must show the following documents prior to entering the province of Galapagos:</span></p><span data-dcnode-id="5940" instrument_node="">
</span><ol data-dcnode-id="5915"><span data-dcnode-id="5939" instrument_node="">
</span><li data-dcnode-id="5937" style="text-align: left;"><span data-dcnode-id="5938" instrument_node="">Return airline ticket.</span></li><span data-dcnode-id="5936" instrument_node="">
</span><li data-dcnode-id="5931" style="text-align: left;"><span data-dcnode-id="5935" instrument_node="">Reservation in a hotel or with a cruise tour, that matches the dates of your return airline ticket, </span><strong data-dcnode-id="5932" style="font-size: 1rem;"><em data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">OR</span></em></strong></li><span data-dcnode-id="5930" instrument_node="">
</span><li data-dcnode-id="5920" style="text-align: left;"><span data-dcnode-id="5929" instrument_node="">A letter of invitation to enter as a guest of a permanent or temporary resident in the Galapagos Islands for no more than 60 days per year (a limit outlined in the Special Law for Galapagos). The letter must come from the resident – not from the visitor. </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.galapagos.org/wp-content/uploads/2017/06/Formato-Carta-Invitaci%25C3%25B3n.pdf" rel="nofollow noopener noreferrer" style="font-size: 1rem;" target="_blank"><span data-dcnode-id="5928" instrument_node="">Download a sample letter here</span></a><span data-dcnode-id="5925" style="font-size: 1rem;"><span data-dcnode-id="5926" instrument_node=""> (in Spanish). </span></span><em data-dcnode-id="5921" style="font-size: 1rem;"><strong data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">Note:</span></strong><span data-dcnode-id="5922" instrument_node=""> A friend of mine went there recently and he wasn’t asked for his proof of a hotel reservation. It seems like they MIGHT not be fully enforcing it all the time, but bette have it and be safe.</span></em></li><span data-dcnode-id="5919" instrument_node="">
</span><li data-dcnode-id="5917" style="text-align: left;"><span data-dcnode-id="5918" instrument_node="">Transit Control Card issued by the Galapagos Governing Council which can be acquired at the Governing Council counters in the airports in Quito or Guayaquil, Ecuador.</span></li><span data-dcnode-id="5916" instrument_node="">
</span></ol><span data-dcnode-id="5914" instrument_node="">
</span><p data-dcnode-id="5912" style="text-align: left;"><span data-dcnode-id="5913" instrument_node="">Of the above, the only new requirement is the hotel reservation or letter of invitation. The proof of a return flight and the Transit Control Card were previously required.</span></p><span data-dcnode-id="5911" instrument_node="">
</span><h2 data-dcnode-id="5908" style="text-align: left;"><strong data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">For How Long Should You Stay?</span></strong></h2><span data-dcnode-id="5907" instrument_node="">
</span><p data-dcnode-id="5905" style="text-align: left;"><span data-dcnode-id="5906" instrument_node="">It all depends on what you’re interested in doing and how much you want to see. But, in my opinion, you shouldn’t be there for less than five full days (not including travel days). I would suggest more like seven or eight full days.</span></p><span data-dcnode-id="5904" instrument_node="">
</span><p data-dcnode-id="5902" style="text-align: left;"><span data-dcnode-id="5903" instrument_node="">Cruises range from 4-days, 5-days, 8-days, and more. But a thing you must know is that a 4-day cruise only has two full days in other islands because the 4-days includes the departure and arrival days too. So, I don’t recommend doing 4/5-days cruise.</span></p><span data-dcnode-id="5901" instrument_node="">
</span><p data-dcnode-id="5899" style="text-align: left;"><span data-dcnode-id="5900" instrument_node="">Target for an 8-days tour (or longer) to enjoy a bigger variety of islands and some less visited, more pristine ones.</span></p><span data-dcnode-id="5898" instrument_node="">
</span><figure aria-describedby="caption-attachment-14946" class="wp-caption aligncenter" data-dcnode-id="5887" id="attachment_14946" style="width: 600px"><div class="dpsp-pin-it-wrapper size-large wp-image-14946" data-dcnode-id="5892"><img alt="Galapagos Islands, Ecuador" class="" data-dcnode-id="5897" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.globotreks.com/wp-content/uploads/2015/06/Giant-Tortoise-600x400.jpg" data-lazy-srcset="https://www.globotreks.com/wp-content/uploads/2015/06/Giant-Tortoise.jpg 600w, https://www.globotreks.com/wp-content/uploads/2015/06/Giant-Tortoise-300x200.jpg 300w, https://www.globotreks.com/wp-content/uploads/2015/06/Giant-Tortoise-20x13.jpg 20w" data-pin-description="Galapagos Islands, Ecuador" data-pin-media="https://www.globotreks.com/wp-content/uploads/2015/06/Giant-Tortoise.jpg" data-pin-title="How to Travel The Galapagos Islands on a Budget" height="400" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20400'%3E%3C/svg%3E" style="" title="How to Travel The Galapagos Islands on a Budget 3" width="600"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fwp-content%252Fuploads%252F2015%252F06%252FGiant-Tortoise.jpg%26url%3Dhttps%253A%252F%252Fwww.globotreks.com%252Fdestinations%252Fecuador%252Fcheapest-travel-galapagos%252F%253Futm_source%253Dpinterest%2526utm_medium%253Dsocial%2526utm_campaign%253Dgrow-social-pro%26is_video%3Dfalse%26description%3DGalapagos%2520Islands%252C%2520Ecuador" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="5894"><svg data-dcnode-id="5895" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/sv
