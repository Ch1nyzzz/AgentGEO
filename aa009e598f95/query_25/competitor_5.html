</span><ins class="adsbygoogle" data-ad-client="ca-pub-1204797127667931" data-ad-format="auto" data-ad-slot="9437881565" data-dcnode-id="7781" style="display:block"></ins><span data-dcnode-id="7780" instrument_node=""> </span></div><hr data-dcnode-id="7776"><p data-dcnode-id="7772" id="yui_3_16_0_ym19_1_1468068576400_7043" style="text-align: center;"><span data-dcnode-id="7773" style="font-family: Helvetica;"><span data-dcnode-id="7774" style="font-size: 18pt;"><span data-dcnode-id="7775" instrument_node="">OVERVIEW</span></span></span></p><p data-dcnode-id="7766" style="text-align: justify;"><span data-dcnode-id="7771" instrument_node="">In the middle of Luzon’s Southern waters, just an hour off the coast of Nasugbu in </span><span data-dcnode-id="7768" style="color: #ff00ff;"><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awanderfulsole.com/lomi-tapa-taal-basilica-heritage-village-the-story-of-a-fun-road-trip-in-batangas/" style="color: #ff00ff;"><span data-dcnode-id="7770" instrument_node="">Batangas</span></a></span><span data-dcnode-id="7767" instrument_node=""> lies Fortune Island. As little as it is, this lone island is hard to ignore with it boasting of creamy white shores of powdery sands and turquoise waters as cold as ice. Not only that the beach is beguiling to the eyes but its richness reaches hundreds of meters deep, making its surrounding waters a favorite diving spot. And just when you think that’s all there is to this little island, wait until it charms its way to your heart, taking you into some unearthly place created only for the gods. Yes. Fortune Island is not your typical tropical paradise. It is that and more. Surreal. Mystique. Mythical. So if you need a quick beach fix with a goddess’ touch, simply head your way to our country’s own version of Athens.</span></p><div class="is-special cf gallery-1-2" data-dcnode-id="7737" data-type="1-2"><div class="tiled-gallery type-rectangular" dat a-original-width="252" height="168" itemprop="http://schema.org/image" mwl-index="17" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0154.jpg%3Fw%3D252%26h%3D168%26ssl%3D1&amp;raw" style="width: 178px; height: 119px;" title="FORTUNE ISLAND TRAVEL GUIDE" width="252"><span data-dcnode-id="7589" instrument_node=""> </span></a></div></div></div></div></div><p data-dcnode-id="7581" style="text-align: justify;"><span data-dcnode-id="7582" instrument_node="">In 2013, Fortune Island opened its doors again to the public through the initiative of a Korean businessman who currently holds the island under lease. Up to this date, it remained unknown as to whether the island is still owned by Leviste or was bought by some other entity or is already under the local government’s jurisdiction which surely involves some legal issues that I don’t really want to dig into further. One thing is evident though, the island is without a doubt beautiful beyond its league but is badly neglected.</span></p><hr data-dcnode-id="7580"><p data-dcnode-id="7577" style="text-align: center;"><span data-dcnode-id="7578" style="font-size: 18pt; font-family: Helvetica;"><span data-dcnode-id="7579" instrument_node="">THE NAME “FORTUNE ISLAND”</span></span></p><p data-dcnode-id="7575" style="text-align: justify;"><span data-dcnode-id="7576" instrument_node="">I, just like many people, have wondered why Fortune Island&nbsp;was&nbsp;named such. To think about it literally is a folly given how bad luck seemed to stick to the island. Tragic&nbsp;shipwrecks, it being a cyclone magnet and a failed business venture make it more of a misfortune island instead. Perhaps some people just wanted to be funny and took its ills lightheartedly thus naming it Fortune.</span></p><div class="is-special cf gallery-1-2" data-dcnode-id="7546" data-type="1-2"><div class="tiled-gallery type-rectangular" data-carousel-extra="null" data-dcno ont-size: 18pt;"><span data-dcnode-id="7476" instrument_node="">URBAN LEGEND: The Mystery Of A Ghost</span></span></p><p data-dcnode-id="7472" style="text-align: justify;"><span data-dcnode-id="7473" instrument_node="">Ever thought about waking up in the middle of the night in some remote island too far away from civilization with you still half asleep while&nbsp;you walk&nbsp;to relieve yourself off fluids? And just when you’re about done with the earthly mundane, a strange air suddenly sent shivers down your spine,&nbsp;instantly waking you up from your slumber. You froze and hesitated to look around. You turn your eyes slowly to the&nbsp;left then right, up and&nbsp;down. No one’s around. You hastily walk back towards your camp but just when you’re about to take the turn to safety, a woman dressed in white with her pale face obscured by her long black hair stands in the way. She slowly turns to look at you revealing her lifelessness. Her ferocious stare sent you choking until it is hard to breathe. You try to scream but you just couldn’t find your voice. And then… And then….</span></p><div class="is-special cf gallery-1-2" data-dcnode-id="7423" data-type="1-2"><div class="tiled-gallery type-square" data-carousel-extra="null" data-dcnode-id="7424" data-original-width="770" itemscope="" itemtype="http://schema.org/ImageGallery"><div class="gallery-row" data-dcnode-id="7453" data-original-height="385" data-original-width="770" style="width: 546px; height: 273px;"><div class="gallery-group" data-dcnode-id="7463" data-original-height="385" data-original-width="385" style="width: 273px; height: 273px;"><div class="tiled-gallery-item" data-dcnode-id="7464" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7471" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-conten r.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0127.jpg%3Fssl%3D1" itemprop="url"><meta content="252" data-dcnode-id="7373" itemprop="width"><meta content="252" data-dcnode-id="7372" itemprop="height"><span data-dcnode-id="7371" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATANGAS" class="mwl-img" data-attachment-id="4276" data-comments-opened="1" data-dcnode-id="7370" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D5200&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1466258447&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;22&quot;,&quot;iso&quot;:&quot;200&quot;,&quot;shutter_speed&quot;:&quot;0.0015625&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="FORTUNE ISLAND TRAVEL GUIDE" data-large-file="https://i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0127.jpg?fit=770%2C514&amp;ssl=1" data-medium-file="https://i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0127.jpg?fit=300%2C200&amp;ssl=1" data-mwl-img-id="4276" data-orig-file="https://www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0127.jpg" data-orig-size="1600,1067" data-original-height="252" data-original-width="252" height="252" itemprop="http://schema.org/image" mwl-index="38" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0127.jpg%3Fw%3D252%26h%3D252%26crop%3D1%26ssl%3D1&amp;raw" style="width: 178px; height: 178px;" title="FORTUNE ISLAND TRAVEL GUIDE" width="252"><span data-dcnode-id="7369" instrument_node=""> </span></a></div></div></div></div></div><p data-dcnode-id="7361" style="text-align: justify;"><span data-dcnode-id="7362" instrument_node="">Anyhooo! Nobody really knows about&nbsp;the truth behind the lovely bones of a girl found buried&nbsp;under the fine white sands of the island. Even if someone knows what her fate really was, he/she chose to carry that secret to his/her grave. And for many years to come, Ana or Maria–&nbsp;(I hate myself for not dropping by her tomb. Now I am struggling to remember what her name really was) –will continue to walk along the shores, wondering why the sands feels so good against the thin skin of her toes. She will continue to climb that staircase to the acropolis every night especially when the moon is at its brightest. She will still&nbsp;be seen staring blankly into space while she effortlessly stood at the edge of the cliff with her silky black hair gracefully flying with the wind. Despite her underlying circumstance, I really wish she was happy.</span></p><div class="is-special cf gallery-1-2" data-dcnode-id="7312" data-type="1-2"><div class="tiled-gallery type-rectangular" data-carousel-extra="null" data-dcnode-id="7313" data-original-width="770" itemscope="" itemtype="http://schema.org/ImageGallery"><div class="gallery-row" data-dcnode-id="7333" data-original-height="211" data-original-width="770" style="width: 546px; height: 149px;"><div class="gallery-group images-1" data-dcnode-id="7352" data-original-height="211" data-original-width="314" style="width: 222px; height: 149px;"><div class="tiled-gallery-item tiled-gallery-item-large" data-dcnode-id="7353" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7360" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0119.jpg%3Fssl%3D1" itemprop="url"><meta content="310" data-dcnode-id="7359" itemprop="width"><meta content="207" data-dcnode-id="7358" itemprop="height"><span data-dcnode-id="7357" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATA "254" itemprop="http://schema.org/image" mwl-index="42" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0144.jpg%3Fw%3D381%26h%3D254%26ssl%3D1&amp;raw" style="width: 270px; height: 180px;" title="FORTUNE ISLAND TRAVEL GUIDE" width="381"><span data-dcnode-id="7327" instrument_node=""> </span></a></div></div><div class="gallery-group images-1" data-dcnode-id="7315" data-original-height="258" data-original-width="385" style="width: 273px; height: 182px;"><div class="tiled-gallery-item tiled-gallery-item-large" data-dcnode-id="7316" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7323" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0142.jpg%3Fssl%3D1" itemprop="url"><meta content="381" data-dcnode-id="7322" itemprop="width"><meta content="254" data-dcnode-id="7321" itemprop="height"><span data-dcnode-id="7320" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATANGAS" class="mwl-img" data-attachment-id="4284" data-comments-opened="1" data-dcnode-id="7319" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D5200&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1466259010&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;18&quot;,&quot;iso&quot;:&quot;200&quot;,&quot;shutter_speed&quot;:&quot;0.00125&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="FORTUNE ISLAND TRAVEL GUIDE" data-large-file="https://i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0142.jpg?fit=770%2C514&amp;ssl=1" data-medium-file="https://i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0142.jpg?fit=300%2C200&amp;ssl=1" data-mwl-img-id="4284" data-orig-file="https://www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0142.jpg" data-orig-size="1600,1067" data-original-height="254" data-original-width="381" height="254" itemprop="http://schema.org/image" mwl-index="43" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0142.jpg%3Fw%3D381%26h%3D254%26ssl%3D1&amp;raw" style="width: 270px; height: 180px;" title="FORTUNE ISLAND TRAVEL GUIDE" width="381"><span data-dcnode-id="7318" instrument_node=""> </span></a></div></div></div></div></div><hr data-dcnode-id="7311"><p data-dcnode-id="7306"><br data-dcnode-id="7309"><span data-dcnode-id="7308" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1204797127667931" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1326708900" data-dcnode-id="7307" style="display: block; text-align: center;"></ins></p><p data-dcnode-id="7303"></p><hr data-dcnode-id="7302"><p data-dcnode-id="7299" style="text-align: center;"><span data-dcnode-id="7300" style="font-size: 18pt; font-family: Helvetica;"><span data-dcnode-id="7301" instrument_node="">WHAT TO DO IN THE ISLAND MADE FOR THE GODS?</span></span></p><p data-dcnode-id="7297" style="text-align: justify;"><span data-dcnode-id="7298" instrument_node="">I’m pretty sure reading everything I’ve written about Fortune Island sparked your interest even more or did it make you change your mind? I hope not because the island just got a whole lot of things to offer you. Fortune Island is surely not a bore. I promise. You asking what you can do for fun. Here’s some of them.</span></p><ul data-dcnode-id="7254"><span data-dcnode-id="7296" instrument_node="">
</span><li data-dcnode-id="7291" style="text-align: justify;"><span data-dcnode-id="7293" style="font-size: 14pt;"><strong data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">Trek to the Lighthouse</span></strong></span><span data-dcnode-id="7292" instrument_node=""> – Sweat those extra calories and go on a 30-minute trek to the lighthouse atop the island’s highest point. You’ll love to see the antic that it is.</span></li><span data-dcnode-id="7290" instrument_node="">
</span><li data-dcnode-id="7285" style="text-align: justify;"><strong data-dcnode-id="7287"><span data-dcnode-id="7288" style="font-size: 14pt;"><span data-dcnode-id="7289" instrument_node="">Do a Greek style photo shoot</span></span></strong><span data-dcnode-id="7286" instrument_node=""> – Get enough selfies, groupfies and what have you with&nbsp;the Grecian pillars of the acropolis as the backdrop. Dress like the ancient Greeks for more style. Pretty classy enough? Who’s&nbsp;up to&nbsp;playing Psyche and Cupid?</span></li><span data-dcnode-id="7284" instrument_node="">
</span><li data-dcnode-id="7279" style="text-align: justify;"><strong data-dcnode-id="7281"><span data-dcnode-id="7282" style="font-size: 14pt;"><span data-dcnode-id="7283" instrument_node="">Cliff Dive</span></span></strong><span data-dcnode-id="7280" instrument_node=""> – Are you up for the coolest plunge? Then jump into the tempting turquoise waters from a 25-30 feet high cliff. Just make sure to&nbsp;bank more than enough courage as it can really be frustrating if you haven’t.</span></li><span data-dcnode-id="7278" instrument_node="">
</span><li data-dcnode-id="7273" style="text-align: justify;"><strong data-dcnode-id="7275"><span data-dcnode-id="7276" style="font-size: 14pt;"><span data-dcnode-id="7277" instrument_node="">Snorkel and discover the colorful world underwater</span></span></strong><span data-dcnode-id="7274" instrument_node=""> – Marvel at the abundance&nbsp;of life within the waters surrounding the island. Do it your way. You can either snorkel with a floater or if you are far more skillful than that then this might just become one of your favorite free dive spots.</span></li><span data-dcnode-id="7272" instrument_node="">
</span><li data-dcnode-id="7267" style="text-align: justify;"><strong data-dcnode-id="7269"><span data-dcnode-id="7270" style="font-size: 14pt;"><span data-dcnode-id="7271" instrument_node="">Swim and frolic under the sun</span></span></strong><span data-dcnode-id="7268" instrument_node=""> – Nothing beats the classic. While some dudes and chicks get on with their adventure, don’t feel left out if you are more into relaxing by the beach. Indulge into the cool refreshing waters and frolic under the sun as long as you want! Sometimes it’s okay to skip playtime and have a little me-time.</span></li><span data-dcnode-id="7266" instrument_node="">
</span><li data-dcnode-id="7261" style="text-align: justify;"><strong data-dcnode-id="7263"><span data-dcnode-id="7264" style="font-size: 14pt;"><span data-dcnode-id="7265" instrument_node="">Explore the Batcave through a canoe/kayak</span></span></strong><span data-dcnode-id="7262" instrument_node=""> – If the waters are friendly, you might wanna ride with tides and explore the batcave to&nbsp;ravel on some amazing rock formations.</span></li><span data-dcnode-id="7260" instrument_node="">
</span><li data-dcnode-id="7255" style="text-align: justify;"><span data-dcnode-id="7257" style="font-size: 14pt;"><strong data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">Visit the shipwreck site</span></strong></span><span data-dcnode-id="7256" instrument_node=""> – Ask your boatman to take you to the shipwreck site.&nbsp;This is something diving enthusiasts don’t want to miss.</span></li></ul><div class="is-special cf gallery-1-2" data-dcnode-id="7196" data-type="1-2"><div class="tiled-gallery type-square" data-carousel-extra="null" data-dcnode-id="7197" data-original-width="770" itemscope="" itemtype="http://schema.org/ImageGallery"><div class="gallery-row" data-dcnode-id="7226" data-original-height="256" data-original-width="770" style="width: 546px; height: 181px;"><div class="gallery-group" data-dcnode-id="7245" data-original-height="256" data-original-width="256" style="width: 181px; height: 181px;"><div class="tiled-gallery-item" data-dcnode-id="7246" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7253" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/wp-1468135549383.jpeg%3Fssl%3D1" itemprop="url"><meta content="252" data-dcnode-id="7252" itemprop="width"><meta content="252" data-dcnode-id="7251" itemprop="height"><span data-dcnode-id="7250" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATANGAS" class="mwl-img" data-attachment-id="4246" data-comments-opened="1" data-dcnode-id="7249" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1424441445&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso ta-orig-file="https://www.awanderfulsole.com/wp-content/uploads/2016/07/wp-1468135635098.jpeg" data-orig-size="2582,1937" data-original-height="252" data-original-width="252" height="252" itemprop="http://schema.org/image" mwl-index="49" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/wp-1468135635098.jpeg%3Fw%3D252%26h%3D252%26crop%3D1%26ssl%3D1&amp;raw" style="width: 178px; height: 178px;" title="FORTUNE ISLAND TRAVEL GUIDE" width="252"><span data-dcnode-id="7202" instrument_node=""> </span></a></div></div></div></div></div><p data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">&nbsp;</span></p><p data-dcnode-id="7193" style="text-align: justify;"></p><hr data-dcnode-id="7192"><p data-dcnode-id="7189" style="text-align: center;"><span data-dcnode-id="7190" style="font-size: 18pt; font-family: Helvetica;"><span data-dcnode-id="7191" instrument_node="">HOW TO GO TO THE ISLAND</span></span></p><ul data-dcnode-id="7176"><span data-dcnode-id="7188" instrument_node="">
</span><li data-dcnode-id="7183" style="text-align: justify;"><strong data-dcnode-id="7185"><span data-dcnode-id="7186" style="font-size: 14pt;"><span data-dcnode-id="7187" instrument_node="">Commute</span></span></strong><span data-dcnode-id="7184" instrument_node=""> – &nbsp;From Baclaran or Buendia Bus Stations, ride a BSC or DLTB bus bound for Nasugbu. Alight the bus in Nasugbu Bus Station then ride a tricycle going to Fortune Island Resort. Pay the fees and charter an outrigger boat to take you to the island. Total travel time may take 5-6 hours.</span></li><span data-dcnode-id="7182" instrument_node="">
</span><li data-dcnode-id="7177" style="text-align: justify;"><strong data-dcnode-id="7179"><span data-dcnode-id="7180" style="font-size: 14pt;"><span data-dcnode-id="7181" instrument_node="">Private</span></span></strong><span data-dcnode-id="7178" instrument_node=""> – Drive via Cavitex. Continue driving to Governor’s Road then to Nasugbu Ternate Hwy until you reach Nasugbu. Turn right to C. Alvares, the street passed Jollibee. Continue driving then turn right to Apacibe Blvd. Just drive straight until you find Fortune Island Beach Resort.</span></li></ul><div class="is-special cf gallery-1-2" data-dcnode-id="7137" data-type="1-2"><div class="tiled-gallery type-rectangular" data-carousel-extra="null" data-dcnode-id="7138" data-original-width="770" itemscope="" itemtype="http://schema.org/ImageGallery"><div class="gallery-row" data-dcnode-id="7149" data-original-height="344" data-original-width="770" style="width: 546px; height: 243px;"><div class="gallery-group images-1" data-dcnode-id="7167" data-original-height="344" data-original-width="514" style="width: 364px; height: 243px;"><div class="tiled-gallery-item tiled-gallery-item-large" data-dcnode-id="7168" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7175" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/DSC_0120.jpg%3Fssl%3D1" itemprop="url"><meta content="510" data-dcnode-id="7174" itemprop="width"><meta content="340" data-dcnode-id="7173" itemprop="height"><span data-dcnode-id="7172" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATANGAS" class="mwl-img" data-attachment-id="4272" data-comments-opened="1" data-dcnode-id="7171" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;5.6&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;N ></div></div></div></div></div><hr data-dcnode-id="7136"><p data-dcnode-id="7133" style="text-align: center;"><span data-dcnode-id="7134" style="font-size: 18pt; font-family: Helvetica;"><span data-dcnode-id="7135" instrument_node="">SOME OTHER THINGS WE MIGHT NEED TO KNOW?</span></span></p><ul data-dcnode-id="7111"><span data-dcnode-id="7132" instrument_node="">
</span><li data-dcnode-id="7130" style="text-align: justify;"><span data-dcnode-id="7131" instrument_node="">Fortune Island is devoid of comfort. There is no electricity. No decent toilet and bath&nbsp;rooms. No clean water source. But! You might be happy to know there is mobile data signal in the island so keeping your IG and FB updated will never be a problem.</span></li><span data-dcnode-id="7129" instrument_node="">
</span><li data-dcnode-id="7127" style="text-align: justify;"><span data-dcnode-id="7128" instrument_node="">Since there is no clean water source, it is better to bring extra gallons of water for washing and&nbsp;cleaning up. You may wanna bring lots of wet&nbsp;wipes too.</span></li><span data-dcnode-id="7126" instrument_node="">
</span><li data-dcnode-id="7124" style="text-align: justify;"><span data-dcnode-id="7125" instrument_node="">Shaded camping space in the island is limited so if you hate exposing yourself&nbsp;in the midday sun then be there early on, especially on weekends and the summer so you can save yourself the best camping space.</span></li><span data-dcnode-id="7123" instrument_node="">
</span><li data-dcnode-id="7121" style="text-align: justify;"><span data-dcnode-id="7122" instrument_node="">There is no trash bins nor trash bags in the island so please don’t add up to the existing garbage scattered there. If you can’t pick those rubbish&nbsp;up at least&nbsp;keep yours for proper disposal when you get back to the mainland.</span></li><span data-dcnode-id="7120" instrument_node="">
</span><li data-dcnode-id="7118" style="text-align: justify;"><span data-dcnode-id="7119" instrument_node="">Prepare yourselves for a rough boat travel as the waves can really be unforgiving especially in the rainy season.</span></li><span data-dcnode-id="7117" instrument_node="">
</span><li data-dcnode-id="7115" style="text-align: justify;"><span data-dcnode-id="7116" instrument_node="">If you need anything like floaters and snorkel gears or if you seek assistance, please look for&nbsp;Tatay Dante, the island caretaker.</span></li><span data-dcnode-id="7114" instrument_node="">
</span><li data-dcnode-id="7112" style="text-align: justify;"><span data-dcnode-id="7113" instrument_node="">For those bringing their cars, there is parking space in Fortune Island Resort.</span></li></ul><div class="is-special cf gallery-1-2" data-dcnode-id="7061" data-type="1-2"><div class="tiled-gallery type-rectangular" data-carousel-extra="null" data-dcnode-id="7062" data-original-width="770" itemscope="" itemtype="http://schema.org/ImageGallery"><div class="gallery-row" data-dcnode-id="7082" data-original-height="386" data-original-width="770" style="width: 546px; height: 273px;"><div class="gallery-group images-1" data-dcnode-id="7100" data-original-height="386" data-original-width="514" style="width: 364px; height: 273px;"><div class="tiled-gallery-item tiled-gallery-item-large" data-dcnode-id="7101" itemprop="associatedMedia" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="7110" instrument_node=""> </span><a border="0" class="lightbox-gallery-img" data-dcnode-id="7104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.awanderfulsole.com/wp-content/uploads/2016/07/wp-1468135604174.jpeg%3Fssl%3D1" itemprop="url"><meta content="510" data-dcnode-id="7109" itemprop="width"><meta content="382" data-dcnode-id="7108" itemprop="height"><span data-dcnode-id="7107" instrument_node=""> </span><img alt="FORTUNE ISLAND NASUGBU BATANGAS" class="mwl-img" data-attachment-id="4254" data-comments-opened="1" data-dcnode-id="7106" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.5&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1424443489&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;400&quot;,&quot;shutter_speed&quot;:&quot;6.25E-5&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="FORTUNE ISLAND TR
