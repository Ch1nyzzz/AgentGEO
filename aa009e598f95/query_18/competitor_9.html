</span><div class="eapps-instagram-feed-posts-item-text es-post-text" data-dcnode-id="2061" eapps-link="text"><span data-dcnode-id="2062" instrument_node="">🌺 Trivia time! Did you know that before the very first luau, women in Hawaii were not allowed to dine with men? They also weren't allowed certain types of food reserved for royalty, regardless of their rank. These were forbidden by a set of religious laws, but in 1819, King Kamehameha II abolished these practices. He held a feast where he dined in the company of women, and this symbolic act became the very first luau. ⁠ ⁠ If you feel like celebrating the spirit of aloha, check the link in our bio to find the best luaus on the islands of Hawaii. ⁠ ⁠ #HawaiiActivities #island #travel #hawaii #hawaiitravel #haiwaiitraveltips #travelhawaii #hawaiitravels #hawaiitravelguide #luckywelivehawaii #aloha #hawaiistragram #hawaiigram #hawaiianluau #luau</span></div><span data-dcnode-id="2060" instrument_node="">
