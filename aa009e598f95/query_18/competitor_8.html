</span><div class="fs-16" data-dcnode-id="5587"><span data-dcnode-id="5600" instrument_node="">Leaving from the Kona International Airport, go to Highway 19 (the only exit from the airport), and make a left hand turn onto the Highway. Drive for about 25 minutes till you reach the traffic light and the entrance to the Waikoloa Beach Resort.</span><br data-dcnode-id="5599"><span data-dcnode-id="5598" instrument_node="">
</span><br data-dcnode-id="5597"><span data-dcnode-id="5596" instrument_node="">

</span><br data-dcnode-id="5593"><span data-dcnode-id="5592" instrument_node="">

</span><div class="mb-8" data-dcnode-id="3889"><span data-dcnode-id="3896" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">Do I need to be able to swim to participate?</span></h4><span data-dcnode-id="3893" instrument_node="">
</span><p class="fs-14" data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">No, there is no swimming on this cruise. Although you often have to board from the beach and shallow surf, the water should only come up to your knees. </span></p><span data-dcnode-id="3890" instrument_node="">
</span></div><span data-dcnode-id="3888" instrument_node="">
</span><div class="mb-8" data-dcnode-id="3880"><span data-dcnode-id="3887" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">What kind of boat will be used?</span></h4><span data-dcnode-id="3884" instrument_node="">
</span><p class="fs-14" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">The Glassbottom Boat is a US Coast Guard Inspected, custom designed 26-foot fiberglass vessel, able to accommodate up to 19 passengers. It includes shaded bench-style seating, convenient dry boarding via a beach ramp, and a comfortable ride.</span></p><span data-dcnode-id="3881" instrument_node="">
</span></div><span data-dcnode-id="3879" instrument_node="">
