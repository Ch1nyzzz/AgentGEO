</span><div class="fs-14" data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">Get ready for a charming, fully narrated, mule-drawn wagon tour of Hawaii’s famous Waipio Valley. Explore the lush landscapes known as the “Valley of the Kings,” and experience scenery once only fit for royalty. Be swept away by the cascading waterfalls, traditional taro patches, and even a smattering of wild, island horses. Built especially for Waipio's rustic terrain, the wagon has been expertly outfitted with a six-spring design, GM shocks, and padded seats, ensuring you a comfortable ride.</span></div><span data-dcnode-id="6893" instrument_node="">

</span><p class="fs-14 d-inline" data-dcnode-id="4325"><span data-dcnode-id="4330" instrument_node="">Waipio Valley Wagon Tour is a great way to see and experience the valley. Although the van drive down and up the valley was bumpy, we were glad it wasn't the wagon or hiking on foot because of the long, windy steep hill.</span><span data-dcnode-id="4328" id="dots1"><span data-dcnode-id="4329" instrument_node="">...</span></span><span data-dcnode-id="4326" id="more1" style="display: none;"><span data-dcnode-id="4327" instrument_node=""> We saw the waterfalls from afar (not up close), wild horses, taro fields, streams and river. We were a little disappointed that the tour did not go the black sand beach. Overall the wagon tour is a good way to see the valley below, especially for those who are not experienced in hiking uphill. </span></span></p><span data-dcnode-id="4324" instrument_node="">
