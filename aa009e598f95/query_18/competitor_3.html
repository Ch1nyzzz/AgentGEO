</span><div class="fs-14" data-dcnode-id="9018"><span data-dcnode-id="9019" instrument_node="">Travel to the top of the Big Island in a luxury van while learning interesting facts about island geology and natural history from your knowledgeable guide. You’ll first stop at the Onizuka Visitor Information Station (VIS) to acclimate to the altitude and enjoy a delicious meal. Then get ready for the steep half hour ascent to the summit and watch the enchanting sunset from above the clouds! Back at Mauna Kea Visitor Center you can warm up with hot drinks as your guides interpret the fascinating night sky. Watch as the guides use lasers to point out constellations, star clusters, and other stunning celestial bodies. You can also look through Celestron telescopes to see planets and distant galaxies! This sunset and stargazing tour is unlike any other Big Island tour!</span></div><span data-dcnode-id="9017" instrument_node="">
</span></div><span data-dcnode-id="9015" instrument_node="">
</span><div class="mb-8" data-dcnode-id="8947"><span data-dcnode-id="9014" instrument_node="">

</span><ul data-dcnode-id="8992"><b data-dcnode-id="9010"><span data-dcnode-id="9011" instrument_node="">Tour Highlights</span></b><span data-dcnode-id="9009" instrument_node="">
</span><li data-dcnode-id="9007"><span data-dcnode-id="9008" instrument_node="">Sunset at the summit: The most dramatic spectacle in Hawaii!</span></li><span data-dcnode-id="9006" instrument_node="">
</span><li data-dcnode-id="9004"><span data-dcnode-id="9005" instrument_node="">Guided stargazing with lasers and Celestron telescope at the Visitor Information Station</span></li><span data-dcnode-id="9003" instrument_node="">
</span><li data-dcnode-id="9001"><span data-dcnode-id="9002" instrument_node="">Duration: 7.5-8.5 hours</span></li><span data-dcnode-id="9000" instrument_node="">
</span><li data-dcnode-id="8998"><span data-dcnode-id="8999" instrument_node="">Pick-up Available from Kona Crossroads Shopping Center, The Queens Market Place, Saddle Road Junction (between Hwy 190 and 200) or Maunakea Recreation area</span></li><span data-dcnode-id="8997" instrument_node="">
</span><li data-dcnode-id="8993"><b data-dcnode-id="8995"><span data-dcnode-id="8996" instrument_node="">Dinner Package:</span></b><span data-dcnode-id="8994" instrument_node=""> Dinner includes a hearty portion of 3-cheese vegetable lasagna. Gourmet hot cocoa, coffee, and teas accompanied with biscotti while stargazing</span></li></ul><span data-dcnode-id="8991" instrument_node="">
</span><hr data-dcnode-id="8990"><span data-dcnode-id="8989" instrument_node="">
</span><center data-dcnode-id="8986"><b data-dcnode-id="8987"><span data-dcnode-id="8988" instrument_node="">Mauna Kea Summit Information:</span></b></center><span data-dcnode-id="8985" instrument_node="">
</span><br data-dcnode-id="8984"><span data-dcnode-id="8983" instrument_node="">
</span><b data-dcnode-id="8981"><span data-dcnode-id="8982" instrument_node="">Where does this activity take place?</span></b><span data-dcnode-id="8980" instrument_node="">
This dormant volcano is one of the only places on earth where you can drive from sea level up to the towering height of 13,796 ft. (4,205 m.) in about two hours.
</span><br data-dcnode-id="8979"><span data-dcnode-id="8978" instrument_node="">
</span><br data-dcnode-id="8977"><span data-dcnode-id="8976" instrument_node="">
</span><b data-dcnode-id="8974"><span data-dcnode-id="8975" instrument_node="">What will the weather be like?</span></b><span data-dcnode-id="8973" instrument_node="">
Temperatures can sometimes drop below freezing and the Mauna Kea summit is one of the two locations in Hawaii where it can snow, with the other being the sister volcano Mauna Loa.
</span><br data-dcnode-id="8972"><span data-dcnode-id="8971" instrument_node="">
</span><br data-dcnode-id="8970"><span data-dcnode-id="8969" instrument_node="">
Although the weather can be cold, the clear icy air makes for incredible stargazing. The Big Island also has state regulations to limit light pollution so that stargazers and astronomers alike can see even more of the vast universe. These ideal conditions are the reason Mauna Kea summit is home to 13 observatories.
</span><br data-dcnode-id="8968"><span data-dcnode-id="8967" instrument_node="">
</span><br data-dcnode-id="8966"><span data-dcnode-id="8965" instrument_node="">
</span><b data-dcnode-id="8963"><span data-dcnode-id="8964" instrument_node="">Is Mauna Kea a special place?</span></b><span data-dcnode-id="8962" instrument_node="">
In addition to its scientific significance, the Mauna Kea summit is a sacred place in Hawaiian culture and religion. The summit is regarded as the home of multiple deities and is revered as the birthplace of the Hawaiian Islands and its people. Please be mindful of both the scientific and cultural importance of the summit area by not disturbing the telescopes or archaeological sites.
</span><hr data-dcnode-id="8961"><span data-dcnode-id="8960" instrument_node="">

</span><h4 class="font-weight-bold mb-8" data-dcnode-id="7341"><span data-dcnode-id="7342" instrument_node="">Restrictions</span></h4><span data-dcnode-id="7340" instrument_node="">
</span><ul class="fs-14 pl-lg-20 mb-lg-12" data-dcnode-id="7320"><span data-dcnode-id="7339" instrument_node="">
</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Guests who are pregnant are not permitted to participate in this activity.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">Participants may not scuba dive within 24 hours of this activity due to the risk of decompression sickness.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7333"><span data-dcnode-id="7334" instrument_node="">Guests with a BMI (Body Mass Index) of 40 or over should not make this trip.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">Participants with any history of a respiratory problems (this includes pneumonia in the last 6 months, any lung conditions or surgeries) are not permitted to take this tour. Contact your physician if you have questions about traveling to this altitude.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7329"><span data-dcnode-id="7330" instrument_node="">Participants with any history of heart problems (this includes ANY heart surgery, stent, pacemaker, heart valve irregularities etc.) are not permitted to take this tour.  Contact your physician if you have questions about traveling to this altitude.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7327"><span data-dcnode-id="7328" instrument_node="">Wheelchair Accessibility: Tour vehicle is not equipped with a lift. Must be able to get into the van with assistance, storage available for collapsible wheelchairs.  Please indicate during booking for most convenient arrangements.</span></li><span data-dcnode-id="7326" instrument_node="">
</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7324"><span data-dcnode-id="7325" instrument_node="">This activity is not wheelchair accessible.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">People 16 years old and above can participate in this activity.</span></li><span data-dcnode-id="7321" instrument_node="">
</span></ul><span data-dcnode-id="7319" instrument_node="">
</span><h4 class="font-weight-bold mb-8" data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">Other requirements</span></h4><span data-dcnode-id="7316" instrument_node="">

</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">Please call the activity provider the day before to reconfirm your booking. Your voucher has the necessary contact information listed.</span></li><span data-dcnode-id="7312" instrument_node="">
</span></ul><span data-dcnode-id="7310" instrument_node="">
</span><h4 class="font-weight-bold mb-8" data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">Booking requirements (# of participants, vehicles, hours, etc.)</span></h4><span data-dcnode-id="7307" instrument_node="">

</span><ul class="fs-14 pl-lg-20 mb-lg-12" data-dcnode-id="7286"><span data-dcnode-id="7296" instrument_node="">
</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">Closed toe shoes</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">Jackets</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">The average temperature on top of Mauna Kea is 30°F and wind is common. Please wear long pants and closed toed shoes and bring any layering garments you may have.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node="">Warm gloves</span></li><span data-dcnode-id="7287" instrument_node="">
</span></ul><span data-dcnode-id="7285" instrument_node="">

</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">The activity schedule is subject to change or cancellation due to weather or traffic conditions.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">The menu is subject to change without notice.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">Drinks are available for purchase.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7265"><span data-dcnode-id="7274" instrument_node="">Road closures due to high winds near the summit may happen in the winter. If a road closure is discovered en route a shorter version of the tour will continue and guests will receive a partial refund.</span><br data-dcnode-id="7273"><span data-dcnode-id="7272" instrument_node="">
</span><br data-dcnode-id="7271"><span data-dcnode-id="7270" instrument_node="">
If a road closure is discovered before departure, guests will be contacted and given the option to cancel at no charge or receive a partial refund and still participate on an shorter tour.</span><br data-dcnode-id="7269"><span data-dcnode-id="7268" instrument_node="">
</span><br data-dcnode-id="7267"><span data-dcnode-id="7266" instrument_node="">
If you cannot be reached, your booking will be canceled and you will be given a full refund.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7263"><span data-dcnode-id="7264" instrument_node="">Beverages and snacks are available for purchase at Mauna Kea Visitor Center, and you are also welcome to bring your own non-alcoholic beverages if you wish.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="7259"><span data-dcnode-id="7262" instrument_node="">The guests are required to follow the COVID-19 safety guidelines below:</span><br data-dcnode-id="7261"><span data-dcnode-id="7260" instrument_node="">

</span><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Guests who are pregnant are not permitted to participate in this activity.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">Participants may not scuba dive within 24 hours of this activity due to the risk of decompression sickness.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">Guests with a BMI (Body Mass Index) of 40 or over should not make this trip.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5716"><span data-dcnode-id="5717" instrument_node="">Participants with any history of a respiratory problems (this includes pneumonia in the last 6 months, any lung conditions or surgeries) are not permitted to take this tour. Contact your physician if you have questions about traveling to this altitude.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">Participants with any history of heart problems (this includes ANY heart surgery, stent, pacemaker, heart valve irregularities etc.) are not permitted to take this tour.  Contact your physician if you have questions about traveling to this altitude.</span></li><li class="note_li_disc mb-8 fs-lg-16 note_list_li_image_no" data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">Wheelchair Accessibility: Tour vehicle is not equipped with a lift. Must be able to get into the van with assistance, storage available for collapsible wheelchairs.  Please indicate during booking for most convenient arrangements.</span></li><span data-dcnode-id="5711" instrument_node="">
</span></ul><span data-dcnode-id="5709" instrument_node="">
</span><h4 class="font-weight-bold mb-8" data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">Other requirements</span></h4><span data-dcnode-id="5706" instrument_node="">

</span><h2 class="font-weight-bold" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">FAQ</span></h2><span data-dcnode-id="4582" instrument_node="">

</span><div class="col-lg-10" data-dcnode-id="4467"><span data-dcnode-id="4579" instrument_node="">
</span><span data-dcnode-id="4577" instrument_node="">
</span><div class="d-lg-flex" data-dcnode-id="4481"><span data-dcnode-id="4576" instrument_node="">

</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4567"><span data-dcnode-id="4574" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Q. What will we see on this tour?</span></div><span data-dcnode-id="4571" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">A. While driving up Saddle Road you'll have panoramic views of Mauna Kea and Mauna Loa. Along the road you'll see black lava rock formed by Mauna Loa's eruptions in the last two hundred years. From the Mauna Kea Access Road you'll see many volcanic cones that once spewed lava. You will also get to watch the sunset over these volcanic slopes. At the summit you will see thirteen telescopes that make up the Mauna Kea Observatories (the observatories are closed to the public but you might get to see the domes open after sunset).  At the Onizuka Visitor Information Station you will get to look through a solar telescope, watch a video about Mauna Kea and the observatory, and after sunset this is where the stargazing magic happens. The guide will operate a computerized Celestron telescope through which you can see stars, planets, distant galaxies, and the moon.</span></div><span data-dcnode-id="4568" instrument_node="">
</span></div><span data-dcnode-id="4566" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4558"><span data-dcnode-id="4565" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Q. Will we get to look through the big telescopes on Mauna Kea?</span></div><span data-dcnode-id="4562" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">A. No, the observatories have very limited public access. However, you might get to see the domes open after sunset.</span></div><span data-dcnode-id="4559" instrument_node="">
</span></div><span data-dcnode-id="4557" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4549"><span data-dcnode-id="4556" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Q. Will there be any health risks linked to going up Mauna Kea?</span></div><span data-dcnode-id="4553" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">A. Mauna Kea has 40% less oxygen than sea level and 40% less air pressure. This drop of vital oxygen can cause serious problems for persons with heart or lung issues, children, and women who are pregnant. Visitors in good health are also susceptible to altitude sickness and should use caution and abide by all rules and regulations of the tour. Next to having a good time, safety is the number one priority.</span></div><span data-dcnode-id="4550" instrument_node="">
</span></div><span data-dcnode-id="4548" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4540"><span data-dcnode-id="4547" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">Q. What type of vehicle will be used?</span></div><span data-dcnode-id="4544" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">A. Built for comfort, the 14 passenger 4v4 Van Terra micro-coaches are equipped with air conditioning, stereo sound, PA, phone, first aid and oxygen, parkas, and a telescope.  Each van can hold up to 14 people.</span></div><span data-dcnode-id="4541" instrument_node="">
</span></div><span data-dcnode-id="4539" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4531"><span data-dcnode-id="4538" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Q. Will we be guaranteed to see stars?</span></div><span data-dcnode-id="4535" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">A. Mauna Kea enjoys an average of 325 clear nights per year. Most of the inclement nights are easily predictable. The weather is monitored on a daily basis and if poor scenic conditions are likely, the trip will be cancelled and a full refund given (or reschedule if available). Like any high mountain there can be unpredictable and fast changing weather at any time.</span></div><span data-dcnode-id="4532" instrument_node="">
</span></div><span data-dcnode-id="4530" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4522"><span data-dcnode-id="4529" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">Q. What kind of equipment will be used?</span></div><span data-dcnode-id="4526" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">A. Your guides will provide you with new Celestron CPC 1100 telescopes that are equipped with Starbright XL coatings for 10% more light throughput than ordinary instruments. These scopes are computer automated and have spectacular optics. Because they are bigger and have better optics they gather about 100% more light than telescopes used on other tours.</span></div><span data-dcnode-id="4523" instrument_node="">
</span></div><span data-dcnode-id="4521" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4503"><span data-dcnode-id="4520" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Q. What jackets sizes are available?</span></div><span data-dcnode-id="4517" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4505"><span data-dcnode-id="4516" instrument_node="">A. The jackets sizes are as follows:</span><br data-dcnode-id="4515"><span data-dcnode-id="4514" instrument_node="">
</span><br data-dcnode-id="4513"><span data-dcnode-id="4512" instrument_node="">
Small ~145 lbs and under  / ~63.5 kg</span><br data-dcnode-id="4511"><span data-dcnode-id="4510" instrument_node="">
Medium 140~175 lbs / ~77 kg</span><br data-dcnode-id="4509"><span data-dcnode-id="4508" instrument_node="">
Large 170~210 lbs / ~90.5 kg</span><br data-dcnode-id="4507"><span data-dcnode-id="4506" instrument_node="">
XL 200~260 lbs / ~ 113 kg</span></div><span data-dcnode-id="4504" instrument_node="">
</span></div><span data-dcnode-id="4502" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4494"><span data-dcnode-id="4501" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Q. How far in advance should I book this activity?</span></div><span data-dcnode-id="4498" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">A. We recommend booking at least 3 weeks in advance. If you have very specific schedule requirements and are not flexible, please book sooner. Last-minute bookings are often possible, but availability is limited.</span></div><span data-dcnode-id="4495" instrument_node="">
</span></div><span data-dcnode-id="4493" instrument_node="">
</span><div class="mb-12 pb-12 border-dotted-bottom-light" data-dcnode-id="4485"><span data-dcnode-id="4492" instrument_node="">
</span><div class="fs-16 font-weight-bold" data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">Q. How cold does it get on Mauna Kea?</span></div><span data-dcnode-id="4489" instrument_node="">
</span><div class="fs-14 mb-4" data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">A. Average temperatures can reach 32° Fahrenheit or 0° Celsius.</span></div><span data-dcnode-id="4486" instrument_node="">

</span><h2 class="font-weight-bold mb-8" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">FAQ</span></h2><span data-dcnode-id="4335" instrument_node="">
</span><span data-dcnode-id="4333" instrument_node="">
</span><div class="non-faq" data-dcnode-id="4240"><span data-dcnode-id="4332" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4324"><span data-dcnode-id="4331" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">What will we see on this tour?</span></h4><span data-dcnode-id="4328" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">While driving up Saddle Road you'll have panoramic views of Mauna Kea and Mauna Loa. Along the road you'll see black lava rock formed by Mauna Loa's eruptions in the last two hundred years. From the Mauna Kea Access Road you'll see many volcanic cones that once spewed lava. You will also get to watch the sunset over these volcanic slopes. At the summit you will see thirteen telescopes that make up the Mauna Kea Observatories (the observatories are closed to the public but you might get to see the domes open after sunset).  At the Onizuka Visitor Information Station you will get to look through a solar telescope, watch a video about Mauna Kea and the observatory, and after sunset this is where the stargazing magic happens. The guide will operate a computerized Celestron telescope through which you can see stars, planets, distant galaxies, and the moon.</span></p><span data-dcnode-id="4325" instrument_node="">
</span></div><span data-dcnode-id="4323" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4315"><span data-dcnode-id="4322" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Will we get to look through the big telescopes on Mauna Kea?</span></h4><span data-dcnode-id="4319" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">No, the observatories have very limited public access. However, you might get to see the domes open after sunset.</span></p><span data-dcnode-id="4316" instrument_node="">
</span></div><span data-dcnode-id="4314" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4306"><span data-dcnode-id="4313" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">Will there be any health risks linked to going up Mauna Kea?</span></h4><span data-dcnode-id="4310" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Mauna Kea has 40% less oxygen than sea level and 40% less air pressure. This drop of vital oxygen can cause serious problems for persons with heart or lung issues, children, and women who are pregnant. Visitors in good health are also susceptible to altitude sickness and should use caution and abide by all rules and regulations of the tour. Next to having a good time, safety is the number one priority.</span></p><span data-dcnode-id="4307" instrument_node="">
</span></div><span data-dcnode-id="4305" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4297"><span data-dcnode-id="4304" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">What type of vehicle will be used?</span></h4><span data-dcnode-id="4301" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">Built for comfort, the 14 passenger 4v4 Van Terra micro-coaches are equipped with air conditioning, stereo sound, PA, phone, first aid and oxygen, parkas, and a telescope.  Each van can hold up to 14 people.</span></p><span data-dcnode-id="4298" instrument_node="">
</span></div><span data-dcnode-id="4296" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4288"><span data-dcnode-id="4295" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">Will we be guaranteed to see stars?</span></h4><span data-dcnode-id="4292" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">Mauna Kea enjoys an average of 325 clear nights per year. Most of the inclement nights are easily predictable. The weather is monitored on a daily basis and if poor scenic conditions are likely, the trip will be cancelled and a full refund given (or reschedule if available). Like any high mountain there can be unpredictable and fast changing weather at any time.</span></p><span data-dcnode-id="4289" instrument_node="">
</span></div><span data-dcnode-id="4287" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4279"><span data-dcnode-id="4286" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">What kind of equipment will be used?</span></h4><span data-dcnode-id="4283" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node="">Your guides will provide you with new Celestron CPC 1100 telescopes that are equipped with Starbright XL coatings for 10% more light throughput than ordinary instruments. These scopes are computer automated and have spectacular optics. Because they are bigger and have better optics they gather about 100% more light than telescopes used on other tours.</span></p><span data-dcnode-id="4280" instrument_node="">
</span></div><span data-dcnode-id="4278" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4260"><span data-dcnode-id="4277" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">What jackets sizes are available?</span></h4><span data-dcnode-id="4274" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4262"><span data-dcnode-id="4273" instrument_node="">The jackets sizes are as follows:</span><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node="">
</span><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">
Small ~145 lbs and under  / ~63.5 kg</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">
Medium 140~175 lbs / ~77 kg</span><br data-dcnode-id="4266"><span data-dcnode-id="4265" instrument_node="">
Large 170~210 lbs / ~90.5 kg</span><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">
XL 200~260 lbs / ~ 113 kg</span></p><span data-dcnode-id="4261" instrument_node="">
</span></div><span data-dcnode-id="4259" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4251"><span data-dcnode-id="4258" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">How far in advance should I book this activity?</span></h4><span data-dcnode-id="4255" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">We recommend booking at least 3 weeks in advance. If you have very specific schedule requirements and are not flexible, please book sooner. Last-minute bookings are often possible, but availability is limited.</span></p><span data-dcnode-id="4252" instrument_node="">
</span></div><span data-dcnode-id="4250" instrument_node="">
</span><div class="mb-8" data-dcnode-id="4242"><span data-dcnode-id="4249" instrument_node="">
</span><h4 class="font-weight-bold" data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">How cold does it get on Mauna Kea?</span></h4><span data-dcnode-id="4246" instrument_node="">
</span><p class="fs-14" data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">Average temperatures can reach 32° Fahrenheit or 0° Celsius.</span></p><span data-dcnode-id="4243" instrument_node="">
