</span><p data-dcnode-id="3190" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="3202" instrument_node="">Your “</span><em data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">home away from home</span></em><span data-dcnode-id="3199" instrument_node="">” awaits on the Big Island of Hawaii in charming, affordable Hawaii vacation rental&nbsp;</span><a class="navigable" data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/Aloha_Studio.html"><span data-dcnode-id="3198" instrument_node="">cottages</span></a><span data-dcnode-id="3196" instrument_node="">&nbsp;in warm and sunny South Kohala. South Kohala boasts the Kohala Coast – Hawaii’s “gold coast”. The Kohala Coast is the ultimate Hawaii vacation destination for you and the entire family. No need to fear that your dream Hawaii vacation will become a budget nightmare.&nbsp; For less than a third of the cost of the hotels and resorts, you can have your own fully-equipped, comfortable, private Hawaii vacation rental cottage only minutes away to the beauty and adventure this paradise island has to offer. The renowned white-sand beaches, golf courses, 5-star resorts, spectacular hiking, vistas, boat tours, coral-reef snorkeling, whale watching, sumptuous dining, shopping, and more awaits you. Get ready for Hawaii –&nbsp;</span><em data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">The Big Island</span></em><span data-dcnode-id="3193" instrument_node="">&nbsp;– and stay with us at&nbsp;Aloha Vacation Cottages&nbsp;where far away never felt so close to home!</span><br data-dcnode-id="3192"><br data-dcnode-id="3191"></p><span data-dcnode-id="3189" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3184"><figure class="aligncenter" data-dcnode-id="3185"><img alt="" class="wp-image-85" data-dcnode-id="3188" height="178" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/wp-content/uploads/2019/01/beach_a_bay_small.jpg&amp;raw" width="272"><figcaption data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node=""> ©Aloha Vacation Cottages, LLC </span></figcaption></figure></div><span data-dcnode-id="3183" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="3163" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="3172"><em data-dcnode-id="3173"><span data-dcnode-id="3182" instrument_node="">~~~</span><br data-dcnode-id="3181"><span data-dcnode-id="3180" instrument_node="">Our visit here has been fantastic. We’ve kind of broken the fun barrier!</span><br data-dcnode-id="3179"><span data-dcnode-id="3178" instrument_node="">Diving – night + day – with Manta Rays, turtles, and our favorite – Lauwiliwilinukunuku’oi’oi [fish]. And, all the while hearing whale song under the water! Our bird watching was great, too – Kalij Pheasants, Apapane, and the elusive Elepaio. Your guest accommodations have been surperb with every detail thought of – we’ve been so well supplied in the kitchen, etc. Honestly, we’ve stayed at many vrbo [vacation rental by owner] places across the country and by far yours is the best appointed – the details make the difference! We’re sure we’ll see you again as we continue to seek our next home here on the Big Island.</span><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">Mahalo. April &amp; Mark – Montana / USA</span><br data-dcnode-id="3175"><span data-dcnode-id="3174" instrument_node="">~~~</span></em></strong><br data-dcnode-id="3171"><strong data-dcnode-id="3167"><em data-dcnode-id="3168"><span data-dcnode-id="3170" instrument_node="">This wonderful cottage exceeded our expectations, truly. Your attention to detail and the many extras provided made us smile. You think of everything! We found this to be &nbsp;a perfect location to explore in many directions without the crowds in other places. Your South Kohala area is a lot more relaxed town than Kona, yet had everything we needed. When the body receives honest exercise whether hiking, snorkelling or swimming, when the eyes observe lush scenery, expansive views, ancient ruins, whales and rainbows, when the fuel comes from your pineapples, papayas, bananas and oranges…how can you not be rejuvenated, inspired and uplifted?&nbsp; Many thanks! We look forward to seeing you again.&nbsp;</span><br data-dcnode-id="3169"></em></strong><strong data-dcnode-id="3164"><em data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Dennis &amp; Lorna, Washington</span></em></strong></p><span data-dcnode-id="3162" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="3158" data-open-accessibility-text-original="16px" style="font-size: 16px;"><strong data-dcnode-id="3159"><em data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="3157" instrument_node="">
</span><div class="wp-block-media-text alignwide has-media-on-the-right" data-dcnode-id="3139" style="grid-template-columns:auto 26%"><figure class="wp-block-media-text__media" data-dcnode-id="3155"><img alt="Hale Kea Cottage, Big Island" class="wp-image-196 size-full" data-dcnode-id="3156" height="168" loading="lazy" sizes="(max-width: 167px) 100vw, 167px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/wp-content/uploads/2019/06/HaleKea_front.jpg&amp;raw" srcset="https://alohacottages.net/wp-content/uploads/2019/06/HaleKea_front.jpg 167w, https://alohacottages.net/wp-content/uploads/2019/06/HaleKea_front-150x150.jpg 150w" width="167"></figure><div class="wp-block-media-text__content" data-dcnode-id="3140"><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3145" data-open-accessibility-text-original="16px" style="font-size: 16px;"><em data-dcnode-id="3151"><strong data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">So, start packing!</span></strong></em><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">It’s time to dig out your bathing suit and sunscreen and plan your&nbsp;</span><a class="navigable" data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/rates/"><span data-dcnode-id="3148" instrument_node="">Hawaii vacation</span></a><span data-dcnode-id="3146" instrument_node="">&nbsp;on the sunny Kohala Coast at our Big Island vacation rentals.&nbsp;Languish on&nbsp;soft white-sand beaches and swim with the turtles in the warm waters of the Pacific Ocean.&nbsp; Keep your eyes open for the whales surfacing with their young…and dolphins playfully splashing through the surf.</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3142" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="3143" instrument_node="">Our Big Island Hawaii vacation rentals provide the comforts of home with generous amenities. Your cottage is fully equipped and ready to move into. All you have to do is arrive! We take care of the rest so you can relax, discover, and enjoy the wonders and beauty of Hawaii.

</span></p><span data-dcnode-id="3141" instrument_node="">
</span></div></div><span data-dcnode-id="3138" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="3128" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="3135"><em data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">~~~</span></em></strong><br data-dcnode-id="3134"><strong data-dcnode-id="3129"><em data-dcnode-id="3130"><span data-dcnode-id="3133" instrument_node="">What a relaxing, private home from which to enjoy this different and so beautiful island! Far from the maddening crowds, near to friendly folks, this cottage made for a fine restfull vacation. Our hosts provided us with all we needed and more. We were comfortable, felt peace in this quiet atmosphere …and we’ll take this with us as a reminder that we must return soon. – Gary &amp; Marylin, California</span><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3121" data-open-accessibility-text-original="16px" style="font-size: 16px;"><em data-dcnode-id="3124"><strong data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">Welcome to the world’s geological real-time classroom!</span></strong></em><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">Forget about virtual reality – this is the only spot on the planet where you can get up close and intimate with an active, flowing volcano!&nbsp; The Big Island is still growing…come see the youngest real estate on the planet being formed before your eyes!</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="3119" instrument_node="">Hawaii’s Big Island is abundant with diverse eco-systems affording you infinite possibilities for cultural, culinary, natural, and spiritual adventures visiting ancient sacred spots. The renowned beaches of the Kohala Coast will refresh you, the waterfalls of Hilo will awaken your senses, Kilauea’s crater, the world’s most active volcano, and the summit of Mauna Kea will humble you with their power and majesty…the Big Island holds the ultimate in experiences for any age.

</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="3103" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="3114"><em data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">~~~</span></em></strong><br data-dcnode-id="3113"><span data-dcnode-id="3112" instrument_node=""> </span><strong data-dcnode-id="3109"><em data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">We had 5 glorious weeks here split between the two cottages. We felt at home right away. [Based here] we explored the Big Island all around. The insider information you provided was very much appreciated. The place was always nice to come home to every day after a good day out. Once in a while it was also real nice to stay home and enjoy the place which is very comfortable and relaxing. We had everything here. The cottages are located in one of the most pleasant areas on this island. The climate is dry and warm but not stuffy or humid. The nights are cool for sleeping well. We loved going to Waimea town [10 minutes away] which was easy to reach to shop and experience the local culture. It’s just a beautiful place. The beaches down the road are the most outstanding on the island [12 minutes] — especially our favorite one, Mauna Kea beach. Thank you for everything you did to make our stay memorable. – Jaye, USA</span></em></strong><span data-dcnode-id="3108" instrument_node=""> </span><strong data-dcnode-id="3104"><em data-dcnode-id="3105"><br data-dcnode-id="3107"><span data-dcnode-id="3106" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="3102" instrument_node="">
</span><div class="wp-block-columns has-2-columns" data-dcnode-id="3076"><span data-dcnode-id="3101" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3089"><span data-dcnode-id="3100" instrument_node="">

</span><p data-dcnode-id="3073" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="3074" instrument_node="">Whether you’re dreaming of a quiet retreat curled up with a book or a different adventure every day, now is the time to travel to Hawaii’s Big Island where you can play in the sunshine 365 days a year.&nbsp;Aloha Vacation Cottages is your special spot for a family escape, a Hawaiian-style wedding, honeymoon, anniversary, or a kick-back holiday.&nbsp; Need to put a distance between you and your daily reality but don’t want to be disconnected? No problem! Among generous amenities, you’ll enjoy convenient free high-speed wireless Internet access 24/7 in the comfort of your Hawaii vacation rental cottage. </span></p><span data-dcnode-id="3072" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="3056" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="3069"><em data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">~~~</span></em></strong><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node=""> </span><strong data-dcnode-id="3062"><em data-dcnode-id="3063"><span data-dcnode-id="3066" instrument_node="">The cottage was perfectly stocked, the location could not be better for seeing the entire island, and the hosts are most helpful. The weather was comfortable, if not outstanding, during our 10 days on the island. A cloudy day [in May] at the Mauna Kea beach is still a lot warmer than a spring day in Oregon. We thank you for providing such a comfortable abode for our stay. It was perfect in every way. If we return to the Island, we will give you a call. And, we will also recommend your cottage to anyone we know headed your way.&nbsp;</span><br data-dcnode-id="3065"><span data-dcnode-id="3064" instrument_node="">– Pamela / Arizona &amp; Gene / Oregon, USA</span></em></strong><span data-dcnode-id="3061" instrument_node=""> </span><strong data-dcnode-id="3057"><em data-dcnode-id="3058"><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="3055" instrument_node="">
</span><div class="wp-block-columns has-2-columns" data-dcnode-id="3035"><span data-dcnode-id="3054" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3046"><span data-dcnode-id="3053" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3048"><figure class="aligncenter" data-dcnode-id="3049"><img alt="" class="wp-image-90" data-dcnode-id="3052" height="170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/wp-content/uploads/2019/01/Banana_plant.jpg&amp;raw" width="226"><figcaption data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node=""> Garden Banana</span></figcaption></figure></div><span data-dcnode-id="3047" instrument_node="">

</span><div class="wp-block-image" data-dcnode-id="3039"><figure class="aligncenter" data-dcnode-id="3040"><img alt="" class="wp-image-91" data-dcnode-id="3043" height="170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/wp-content/uploads/2019/01/Ananas_am_Haus.jpg&amp;raw" width="226"><figcaption data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node=""> Garden Pineapple</span></figcaption></figure></div><span data-dcnode-id="3038" instrument_node="">

</span><p class="has-text-align-center has-text-color" data-dcnode-id="3016" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="3031"><em data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">~~~</span></em></strong><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node=""> </span><strong data-dcnode-id="3026"><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">We assumed that Hawaii would be nice…but we must say that we were impressed with how much of it is pristine coastline…and so clean. We really appreciated the wonderful beaches on the Kohala Coast in your area. Now, having that coastline treasure just minutes from our lovely cottage was more than we ever expected. It was convenient located to everything we wanted to do. From the hiking trails to the deserted gorgeous beach spots, we found the peace we wanted away from the commercial fray. We enjoyed living in Hale Kea Cottage very much. It was peaceful and quiet. We got the best nights sleeping here. Thank you for all you did to make it feel like “our home”. We’ve rented places before but never one that was so well thought out to meet everyone’s comfort. Your homemade mac-nut ice cream was a very nice touch indeed…as was the fresh fruit and the fresh baked malasada buns (they were still warm). We used your Big Island guidelines for us in the cottage every day and we are certain that we would have missed out on many special places without it. We’re not big on eating fish at home but we have to admit that the fish you guided us on was fabulous….and with the recipes from the cottage kitchen, we ate beautiful Hawaii fish in the best restaurant on the Big Island….at our own BBQ on the deck.</span></em></strong><br data-dcnode-id="3025"><strong data-dcnode-id="3022"><em data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Thank you for everything. Anne &amp; Edgar, London.</span></em></strong><span data-dcnode-id="3021" instrument_node=""> </span><strong data-dcnode-id="3017"><em data-dcnode-id="3018"><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3003" data-open-accessibility-text-original="16px" style="font-size: 16px;"><strong data-dcnode-id="3012"><em data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Getting around the big island…</span></em></strong><br data-dcnode-id="3011"><span data-dcnode-id="3010" instrument_node="">Hawaii’s Big Island has it all for fun, relaxation and adventure. But, you will be needing a car to access all there is to see and do on the Big Island. We at&nbsp;Aloha Vacation Cottages&nbsp;have been pleased with the services of &nbsp;</span><a class="navigable" data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.discounthawaiicarrental.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3009" instrument_node="">www.DiscountHawaiiCarRental.com</span></a><span data-dcnode-id="3007" instrument_node="">. See our&nbsp;Big Island car rental page&nbsp;</span><a class="navigable" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/big-island-car-rental/"><span data-dcnode-id="3006" instrument_node="">Big Island car rental info</span></a><span data-dcnode-id="3004" instrument_node="">&nbsp;for a selection of other&nbsp;companies available to serve your&nbsp;rental needs. </span></p><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="2996" data-open-accessibility-text-original="16px" style="font-size: 16px;"><strong data-dcnode-id="2999"><em data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Getting married on the Big Island…</span></em></strong><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">Somewhere on Hawaii’s Big Island is your dream wedding spot. Whether it be the perfect beach at sunset, or an exotic rain forest, fertile plantation,&nbsp;a&nbsp;tiny,&nbsp;intimate painted church tucked away in the countryside,&nbsp;&nbsp;or the wide-open up-country meadows in the foothills of&nbsp;a majestic volcano, you can have your dream Hawaii wedding&nbsp;easily fulfilled. And…</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p class="has-text-align-center has-text-color" data-dcnode-id="2969" data-open-accessibility-text-original="16px" style="color: rgb(37, 121, 38); font-size: 16px;"><strong data-dcnode-id="2992"><em data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">~~~</span></em></strong><br data-dcnode-id="2991"><span data-dcnode-id="2990" instrument_node=""> </span><strong data-dcnode-id="2987"><em data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Thank you so much for the wonderful accommodations and all the extra amenities in the cottage. We loved the fresh fruit basket and the well-supplied kitchen. Your personal “Holo-Holo” Day Trips was perfect! We took it with us everyday. Some of the best things we did we might have missed if not for your guide! We love the Big Island and will definitely come back to stay here again.&nbsp;You helped make our honeymoon perfect!&nbsp;</span></em></strong><br data-dcnode-id="2986"><strong data-dcnode-id="2983"><em data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Mahalo….See you again, soon! Leigh &amp; Mike, Maryland – USA</span></em></strong><span data-dcnode-id="2982" instrument_node=""> </span><strong data-dcnode-id="2979"><em data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">nt on the Big Island….at our own BBQ on the deck.</span></em></strong><br data-dcnode-id="2978"><strong data-dcnode-id="2975"><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Thank you for everything. Anne &amp; Edgar, London.</span></em></strong><span data-dcnode-id="2974" instrument_node=""> </span><strong data-dcnode-id="2970"><em data-dcnode-id="2971"><br data-dcnode-id="2973"><span data-dcnode-id="2972" instrument_node="">~~~</span></em></strong></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2963" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="2967" instrument_node=""> Aloha Vacation Cottages&nbsp;&nbsp;are a&nbsp;perfect choice&nbsp;for your&nbsp;Hawaii&nbsp;</span><a class="navigable" data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/hawaii-island-wedding/"><span data-dcnode-id="2966" instrument_node="">honeymoon</span></a><span data-dcnode-id="2964" instrument_node="">. </span></p><span data-dcnode-id="2962" instrument_node="">

</span><p data-dcnode-id="2923" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="2924" instrument_node="">At our Big Island vacation rental,&nbsp;Aloha Vacation Cottages, we’ll do our best to meet your individual needs, budget and expectations.</span></p><span data-dcnode-id="2922" instrument_node="">

</span><p data-dcnode-id="2911" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="2914" instrument_node="">Along with great location, we offer many features and amenities that other rental owners either charge extra for or do not provide, which gives our guests greater comfort, convenience,&nbsp; and savings on their vacations. &nbsp;</span><a aria-label=" (opens in a new tab)" class="navigable" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alohacottages.net/cottage-amenities/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2913" instrument_node="">See here!</span></a></p><span data-dcnode-id="2910" instrument_node="">

</span><p data-dcnode-id="2849" data-open-accessibility-text-original="16px" style="font-size: 16px;"><strong data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Location, location, location…</span></strong><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">Vacations all start with that special spot to base yourself for your comfort and convenience. &nbsp;You know that the Big Island is bigger than other Hawaiian islands combined, with it’s 11 climate zones! So, you surely don’t want to get stuck spending your entire vacation in one climate zone…especially in the rain.&nbsp; The sunniest spot on the Big Island has less than 10 inches of rain a year and is just minutes away from the best white-sand beaches this island has to offer. It’s the Kohala Coast that is reputed to be the “gold coast”, and that is where you will find&nbsp;Aloha Vacation Cottages.&nbsp;Kohala is the ultimate destination on the Big Island with beautiful beaches, championship golf courses, resorts, shopping, breathtaking views and look-out points, cosy villages, hikes and much more.Aloha Vacation Cottages&nbsp;is away from the crowded tourist fray, yet not isolated. From here, you can easily get anywhere on the island. </span></p><span data-dcnode-id="2848" instrument_node="">

</span><h5 class="accessibly-mobile-logo accessibly-mobile-visible accessibly-read-ignore" data-dcnode-id="161" data-open-accessibility-text-original="26px" style="font-size: 26px;"><span data-dcnode-id="164" instrument_node="">Accesibly App by </span><a aria-hidden="true" class="otm-text accessibly-read-ignore navigable" data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onthemapmarketing.com/accessibly/" rel="nofollow" role="presentation" target="_blank" title="On the Map Marketing"><span data-dcnode-id="163" instrument_node="">On The Map Marketing</span></a></h5><span data-dcnode-id="160" instrument_node="">
</span><div class="accessibility-extras" data-dcnode-id="155"><span data-dcnode-id="159" instrument_node="">
</span><button class="accessibility-extras-link accessibly-statement-button accessibly-ignore accessibly-read-ignore navigable" data-dcnode-id="157" id="accessibly-statement-link"><span data-dcnode-id="158" instrument_node="">Accessibility statement</span></button><span data-dcnode-id="156" instrument_node="">
</span></div><span data-dcnode-id="154" instrument_node="">
</span></div><span data-dcnode-id="152" instrument_node="">
</span><div class="accessibility-statement" data-dcnode-id="24"><span data-dcnode-id="151" instrument_node="">
</span><div class="accessibility-statement-content" data-dcnode-id="26"><span data-dcnode-id="150" instrument_node="">
</span><p class="accessibly-read-ignore ac-h2" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Accessibly App Accessibility Statement</span></p><span data-dcnode-id="147" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Accessibly App is committed to making sites accessible for all, including people with disabilities. We are continuously improving the service we provide through our app to comply with increased accessibility standards, guidelines, and to make the browsing experience better for everyone.</span></p><span data-dcnode-id="144" instrument_node="">
</span><p class="accessibly-read-ignore ac-h3" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Conformance status</span></p><span data-dcnode-id="141" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">The app uses the Web Content Accessibility Guidelines (WCAG) defined requirements to improve accessibility for people with disabilities. It defines three levels of conformance: Level A, Level AA, and Level AAA. Accessibly App is following the best guidelines and is partially conformant with WCAG 2.0 level AA.</span></p><span data-dcnode-id="138" instrument_node="">
</span><p class="accessibly-read-ignore ac-h3" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Technical information</span></p><span data-dcnode-id="135" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Accessibly App is an app supported in Shopify and Wordpress environments. The app relies on the following technologies:</span></p><span data-dcnode-id="132" instrument_node="">
</span><ul class="accessibly-read-ignore" data-dcnode-id="121"><li class="accessibly-read-ignore" data-dcnode-id="130" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="131" instrument_node="">HTML</span></li><li class="accessibly-read-ignore" data-dcnode-id="128" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="129" instrument_node="">CSS</span></li><li class="accessibly-read-ignore" data-dcnode-id="126" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="127" instrument_node="">JavaScript</span></li><li class="accessibly-read-ignore" data-dcnode-id="124" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="125" instrument_node="">NodeJS</span></li><li class="accessibly-read-ignore" data-dcnode-id="122" data-open-accessibility-text-original="16px" style="font-size: 16px;"><span data-dcnode-id="123" instrument_node="">MongoDB</span></li></ul><span data-dcnode-id="120" instrument_node="">
</span><p class="accessibly-read-ignore ac-h3" data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Accessibly App features</span></p><span data-dcnode-id="117" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">When a site has Accessibly App i ac-h4nstalled, the website can be adjusted with keyboard navigation using the “tab” key (WCAG 2.1/2.1.1). Additionally, see the list of all provided Accessibly App features and tools for better website experience:</span></p><span data-dcnode-id="114" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Zoom | WCAG 2.1 / 1.4.4</span></p><span data-dcnode-id="111" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">This feature enables users to enhance the size of the text to up to three times the original text for better text readability. </span></p><span data-dcnode-id="108" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Bigger cursor</span></p><span data-dcnode-id="105" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Makes the cursor bigger and more prominent. Increases the size for better site browsing. </span></p><span data-dcnode-id="102" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Invert colors</span></p><span data-dcnode-id="99" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">Invert the colors of the website content. For those with decreased vision, the high contrast greatly helps to read the site better. </span></p><span data-dcnode-id="96" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">Tweak Contrast | WCAG 2.1 / 1.4.6</span></p><span data-dcnode-id="93" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">This feature lets users manually select from two options: to enhance the contrast of the website or to decrease the contrast. </span></p><span data-dcnode-id="90" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">Tweak Brightness | WCAG 2.1 / 1.4.6</span></p><span data-dcnode-id="87" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">This feature lets users update the brightness on the site. The content can either be made brighter or darker. </span></p><span data-dcnode-id="84" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">Grayscale | WCAG 2.1 / 1.4.6</span></p><span data-dcnode-id="81" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">Users can turn on grayscale, making the website content appear only in shades of gray. This benefits people with visual impairment.</span></p><span data-dcnode-id="78" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">Reading Line</span></p><span data-dcnode-id="75" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">Add a supportive reading line to the site.</span></p><span data-dcnode-id="72" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">Readable fonts</span></p><span data-dcnode-id="69" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">Convert the fonts available on-site to one of the most easily readable fonts: Helvetica.</span></p><span data-dcnode-id="66" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">Alt Text and Images</span></p><span data-dcnode-id="63" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="58"><span data-dcnode-id="62" instrument_node="">Ability to read alt text of images. As of now, our tool has added a feature where alt descriptions for images without them are generated using </span><a class="accessibly-read-ignore navigable" data-dcnode-id="60" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cloud.google.com/vision/" rel="nofollow" target="_blank"><span data-dcnode-id="61" instrument_node="">Google's Vision AI</span></a><span data-dcnode-id="59" instrument_node="">. In the event that you haven't manually written these image descriptions yourself, this greatly helps people with visual impairment browse your site.</span></p><span data-dcnode-id="57" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="55"><span data-dcnode-id="56" instrument_node="">Tooltips | WCAG 2.1 / 2.5.3Add labels to images that contain a written description of the image.</span></p><span data-dcnode-id="54" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="52"><span data-dcnode-id="53" instrument_node="">Highlight links</span></p><span data-dcnode-id="51" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="49"><span data-dcnode-id="50" instrument_node="">Highlight links to make them more prominent.</span></p><span data-dcnode-id="48" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">Hide images</span></p><span data-dcnode-id="45" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">Hide images on the site. This provides better site readability for people with visual impairment.</span></p><span data-dcnode-id="42" instrument_node="">
</span><p class="accessibly-read-ignore ac-h4" data-dcnode-id="40"><span data-dcnode-id="41" instrument_node="">Read page</span></p><span data-dcnode-id="39" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="37"><span data-dcnode-id="38" instrument_node="">A feature that allows a voice to read the text on your site out loud to visitors. </span></p><span data-dcnode-id="36" instrument_node="">
</span><p class="accessibly-read-ignore ac-h2" data-dcnode-id="34"><span data-dcnode-id="35" instrument_node="">Notes &amp; Feedback</span></p><span data-dcnode-id="33" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="31"><span data-dcnode-id="32" instrument_node="">We always try to update our services and operate in the best possible manner to benefit all of our clients and their site visitors.</span></p><span data-dcnode-id="30" instrument_node="">
</span><p class="accessibly-read-ignore" data-dcnode-id="28"><span data-dcnode-id="29" instrument_node="">We cannot control or correct problems with third-party sites, but please let us know if you encounter difficulty with any sites we link to so we can pass the information along to the site owners. You may also want to address your concerns directly to these third parties.</span></p><span data-dcnode-id="27" instrument_node="">
