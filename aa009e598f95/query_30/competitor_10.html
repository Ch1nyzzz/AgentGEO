</span><div class="entry-content" data-dcnode-id="137"><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="311"><em data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Hawaii’s Big Island is spectacular in every conceivable natural way. Both on land and below the Pacific Ocean, nature thrives. The chaos of tectonic activity juxtaposes the gentle pace of life in the towns and villages. When it comes to unique experiences, Big Island has more than its fair share.</span></em></p><span data-dcnode-id="310" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="304" id="attachment_2393" style="width: 810px"><img aria-describedby="caption-attachment-2393" class="wp-image-2393 size-full lazyloaded" data-dcnode-id="309" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Big-Island-Sunset-Daniel-Wedeking.jpg" height="532" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Big-Island-Sunset-Daniel-Wedeking.jpg&amp;raw" width="800"><noscript data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">&lt;img aria-describedby="caption-attachment-2393" class="wp-image-2393 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Big-Island-Sunset-Daniel-Wedeking.jpg" width="800" height="532" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="305" id="caption-attachment-2393"><span data-dcnode-id="306" instrument_node="">A shot of a Big Island sunset (Photo: Daniel Wedeking via Flickr)</span></p></div><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Fringed with long sandy beaches, picture perfect bays, verdant waterfall-filled rainforests, and exotic flowers and birds, Hawaii’s Big Island must have caught mother nature on a good day. Big Island, the largest in the United States’ Hawaiian archipelago, is simply stunning and a major draw for visitors from across the globe.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">There’s more to the Big Island than natural beauty though. It is also full of interesting landmarks and bastions of scientific discovery. Small but vibrant local trade outlets are often happy to open their doors to curious tourists, while local culture is frequently on show for the benefit of visitors. We’ve compiled 13 of the most unique things to see and do on Hawaii’s Big Island.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Explore the magnificent Hawaii Volcanoes National Park</span></strong></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">Offering a fascinating insight into the world of active volcanism and biological diversity, this is one of the Big Island’s best natural attractions. The park can be traversed by car in just a few hours or explored in greater depth over several days. There are incredible hiking trails, taking in landscapes of solidified lava and lush tropical rainforest. More intrepid visitors can even reach the summit of Kīlauea volcano via Crater Rim Drive, a gruelling 11-mile (18-km) stretch of road. However, it’s advisable to check the status of the volcanoes in advance, as they are unwieldy beasts. For the guidance of a local expert, you could also book at tour. A great example of an evening volcano tour </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/hawaii-volcanoes-national-park-l4781/big-island-evening-volcano-explorer-from-hilo-t206436/%3Fpartner_id%3DO3NM2ZB" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="291" instrument_node="">can be found here</span></a><span data-dcnode-id="289" instrument_node="">.</span></p><span data-dcnode-id="287" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="281" id="attachment_18245" style="width: 1210px"><img alt="" aria-describedby="caption-attachment-18245" class="size-full wp-image-18245 lazyloaded" data-dcnode-id="286" data-sizes="(max-width: 1200px) 100vw, 1200px" data-src="https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg" data-srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-1024x683.jpg 1024w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg&amp;raw" srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-1024x683.jpg 1024w" width="1200"><noscript data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">&lt;img aria-describedby="caption-attachment-18245" class="size-full wp-image-18245" src="https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg" alt="" width="1200" height="800" srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Glowing-crater-at-Volcanoes-National-Park-Photo-Chris-Favero-via-Flickr-CC-BY-SA-2.0-1024x683.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="282" id="caption-attachment-18245"><span data-dcnode-id="283" instrument_node="">Glowing crater at Volcanoes National Park (Photo: Chris Favero via Flickr / CC BY-SA 2.0)</span></p></div><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="277"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Observe the final frontier at Mauna Kea Observatories</span></strong></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">There’s no shortage of human-made delights to enjoy on Big Island either. A great example are the highly distinguished Mauna Kea Observatories where astronomers from around the world come to peer out far, far beyond the palm trees at the skies above Hawaii. The W.M. Keck Observatory boasts the world’s largest and most scientifically productive optical and infrared telescopes and with so few city lights polluting the night skies, the view through these industrial scale contraptions is simply sensational. The collection of astronomical research facilities sits atop Mauna Kea, a dormant volcano reaching the lofty height of 4,207 metres (13,803 ft). Individual summit visits are not permitted, but if you’re on the Big Island as part of an organised group tour with an educational slant, it’s worth visiting the Observatory Headquarters in Waimea and you and your group are likely to be granted a look around.</span></p><span data-dcnode-id="273" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="267" id="attachment_2397" style="width: 2410px"><img alt="W M Keck Observatory" aria-describedby="caption-attachment-2397" class="wp-image-2397 size-full lazyloaded" data-dcnode-id="272" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/W-M-Keck-Observatory.jpg" height="1597" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/W-M-Keck-Observatory.jpg&amp;raw" width="2400"><noscript data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">&lt;img aria-describedby="caption-attachment-2397" class="wp-image-2397 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/W-M-Keck-Observatory.jpg" alt="W M Keck Observatory" width="2400" height="1597" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="268" id="caption-attachment-2397"><span data-dcnode-id="269" instrument_node="">Giant telescopes at the Mauna Kea Observatories in Waimea (Photo: Andrew Richard Hara Photography)</span></p></div><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="263"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Book a nature tour with a local guide</span></strong></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="261" instrument_node="">Snorkelling or diving with squadrons of feeding manta rays, hiking through dense rainforest, spotting brightly coloured birds and wildlife; these are all highlights of any trip for many visitors to Big Island. Water lovers can head out onto the open ocean to look for dolphins, either in a tour boat or a kayak. Alternatively it is possible to take a sailboat tour to renowned snorkelling sites to spot turtles, tropical fish and other sub-aquatic marvels. There are many options out there to interact with Big Island nature, and hiring local guides is the best way to go. For some of the many nature tours available on Hawaii’s Big Island, take a look at </span><a data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3DBig%2520Island%252C%2520Hawaii%26customerSearch%3D1%26searchSource%3D2/%3Fpartner_id%3DO3NM2ZB" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="260" instrument_node="">GetYourGuide</span></a><span data-dcnode-id="258" instrument_node="">.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="253"><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Perk up at Kona Coffee Living History Farm</span></strong></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">The Big Island district of Kona is intrinsically linked with the coffee trade and this long-standing relationship is celebrated at the Kona Coffee Living History Farm. Visitors can come and explore this fascinating 5.5-acre working coffee and macadamia nut farm through its ‘Hands On History’ program, featuring a variety of activities focused on cultural traditions and practices that have been vital to Kona’s coffee industry down the years. There’s artefact exhibitions, coffee bean harvesting demonstrations, animal husbandry, gardening, lauhala weaving and even Japanese calligraphy – a nod to the large number of Japanese immigrants who came to work in Hawaii’s coffee trade during the early to mid-19th century.</span></p><span data-dcnode-id="249" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="243" id="attachment_2398" style="width: 650px"><img alt="Kona Coffee Living History Farm" aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full lazyloaded" data-dcnode-id="248" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Kona-Coffee-Living-History-Farm.jpg" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Kona-Coffee-Living-History-Farm.jpg&amp;raw" width="640"><noscript data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">&lt;img aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Kona-Coffee-Living-History-Farm.jpg" alt="Kona Coffee Living History Farm" width="640" height="453" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="244" id="caption-attachment-2398"><span data-dcnode-id="245" instrument_node="">Young visitors gathered at the Kona Coffee Living History Farm (Photo: Kona Historical Society)</span></p></div><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="239"><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Get marked at Kona Henna Studio</span></strong></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">The word tattoo comes from the Polynesian language, with this form of body art originally hailing from the region. However, for those that don’t like the idea of growing old with a marking that also starts to look its age, what better souvenir from your Big Island adventure than a temporary Henna tattoo? The staff at Kona Henna Studio, in historic downtown Kailua Kona, are masters of the art, using only natural ingredients to embellish your body with striking art-work. The studio has thousands of designs to choose from, so you’re guaranteed to find something that suits your tastes, and the tattoos are guaranteed to last up to four weeks, depending on the body part. Walk-ins and appointments are both accepted.</span></p><span data-dcnode-id="235" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="229" id="attachment_2398" style="width: 650px"><img alt="Kona Henna Studio" aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full lazyloaded" data-dcnode-id="234" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Kona-Henna-Studio.jpg" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Kona-Henna-Studio.jpg&amp;raw" width="640"><noscript data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">&lt;img aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Kona-Henna-Studio.jpg" alt="Kona Henna Studio" width="640" height="453" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="230" id="caption-attachment-2398"><span data-dcnode-id="231" instrument_node="">Decorated with a distinctive Henna design created by Kona Henna Studio (Photo: Kona Henna Studio)</span></p></div><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="225"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Learn about nature’s other face at the Pacific Tsunami Museum</span></strong></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Depicting the history of the 1946 Pacific tsunami and the 1960 Chilean tsunami, which devastated much of the east coast of the Big Island, this museum is well worth a look around. While most tectonic activity takes place along the edges of plates as they interact, Hawaii sits right in the middle of the Pacific Plate. However, it is considered on of the world’s rare non plate-boundary hotspots. The infamous Ring of Fire is on all sides of Hawaii, hundreds of miles removed, but that won’t stop a tsunami, which can cross entire oceans. The museum also acts as an important education facility to locals and visitors. For a companion activity, the museum also helps co-ordinate self-guided walking and driving tours of sites hit hardest by the tsunamis.</span></p><span data-dcnode-id="221" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="215" id="attachment_2398" style="width: 650px"><img alt="Pacific Tsunami Museum" aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full lazyloaded" data-dcnode-id="220" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Pacific-Tsunami-Museum.jpg" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Pacific-Tsunami-Museum.jpg&amp;raw" width="640"><noscript data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">&lt;img aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Pacific-Tsunami-Museum.jpg" alt="Pacific Tsunami Museum" width="640" height="453" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="216" id="caption-attachment-2398"><span data-dcnode-id="217" instrument_node="">Exterior of the Pacific Tsunami Museum (Photo: Pacific Tsunami Museum)</span></p></div><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="211"><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Take a break at Coconut Island</span></strong></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Sitting just offshore from the island’s Lili’uokalani Gardens sits Mokuola, known popularly today as Coconut Island. This area is home to the Big Island’s most popular beach, offering swimming, a tower from which to jump into the ocean, picnic tables, a grassy area, and excellent sea turtle watching opportunities. Regular community events and barbecues are also held here, so be sure to check the local schedule if you’re in town.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="204"><strong data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Attend a Hawaiian luau</span></strong></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="202" instrument_node="">One of Hawaiian culture’s most popular draws is the luau, which involves a feast of local delicacies like poke and hog roasts, surrounded by traditional entertainment with music and dancing, such as hula. Naturally many people come to Big Island with a luau high on their ‘to do’ lists, so there’s a good number of options to choose from, with many taking place at the big resorts. These are open to all, but advanced booking of tickets is often encouraged. We wrote a separate article detailing the best three luaus on Big Island, which you can check out and make bookings via, by </span><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/articles/luaus-in-the-big-island/"><span data-dcnode-id="201" instrument_node="">clicking here</span></a><span data-dcnode-id="199" instrument_node="">. To browse a list of other Big Island luau options, head over to </span><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.viator.com/searchResults/all%3Ftext%3Dluau%2520big%2520island%26destId%3D" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="198" instrument_node="">Viator.com via this link</span></a><span data-dcnode-id="196" instrument_node="">.</span></p><span data-dcnode-id="194" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="188" id="attachment_18246" style="width: 1210px"><img alt="" aria-describedby="caption-attachment-18246" class="size-full wp-image-18246 lazyloaded" data-dcnode-id="193" data-sizes="(max-width: 1200px) 100vw, 1200px" data-src="https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg" data-srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-1024x683.jpg 1024w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg&amp;raw" srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-1024x683.jpg 1024w" width="1200"><noscript data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">&lt;img aria-describedby="caption-attachment-18246" class="size-full wp-image-18246" src="https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg" alt="" width="1200" height="800" srcset="https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0.jpg 1200w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-300x200.jpg 300w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-768x512.jpg 768w, https://www.travelmag.com/wp-content/uploads/2019/04/Preparing-the-feast-at-a-luau-Photo-Ashlyn-Gehrett-via-Flickr-CC-BY-ND-2.0-1024x683.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="189" id="caption-attachment-18246"><span data-dcnode-id="190" instrument_node="">Preparing the feast at a luau (Photo: Ashlyn Gehrett via Flickr / CC BY-ND 2.0)</span></p></div><span data-dcnode-id="187" instrument_node="">
</span><p data-dcnode-id="184"><strong data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Hike out to Rainbow Falls</span></strong></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Known locally as Waianuenue, Rainbow Falls boasts an awe-inspiring 80-foot drop and is renowned for the stunning rainbows that form amid the surrounding mist. Situated just outside of Hilo city, it’s easily accessible to visitors and a popular excursion point, so to avoid the crowds, head there for early morning or late afternoon. And be sure to take a camera. The special viewing platform is the best spot to get a glimpse of the rainbow, which tends to form only in the mornings. As for the goddess who resides in the falls, there’s no guarantee of a sighting.</span></p><span data-dcnode-id="180" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="174" id="attachment_2398" style="width: 650px"><img alt="Rainbow Falls" aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full lazyloaded" data-dcnode-id="179" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Rainbow-Falls-Brad-Pedersen-1.jpg" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Rainbow-Falls-Brad-Pedersen-1.jpg&amp;raw" width="640"><noscript data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">&lt;img aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Rainbow-Falls-Brad-Pedersen-1.jpg" alt="Rainbow Falls" width="640" height="453" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="175" id="caption-attachment-2398"><span data-dcnode-id="176" instrument_node="">A scenic view of Rainbow Falls on Big Island (Photo: Brad Pedersen via Flickr)</span></p></div><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="170"><strong data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Try the local produce at Island Gourmet Markets </span></strong></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Sometimes, even in Hawaii, the weather lets you down and you need “something for a rainy day”. Located in the Queens’ MarketPlace within the beautiful grounds of the Waikoloa Resort, this is without question the Big Island’s premier shopping destination and the ideal solution for when the elements drown out the outdoor activities. Whether its apparel, beach needs, cosmetics, gifts, local foods or souvenirs you’re after, there’s plenty to satisfy most customers here.</span></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="163"><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Step back a century or two at Lyman House Memorial Museum</span></strong></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">As the Big Island’s oldest surviving wood-framed building, this quaint colonial-style house is a popular draw for history and architecture enthusiasts. It was originally built in 1838, but since the 1930s it served as a fascinating natural history and local culture museum. Open to the public from Monday to Saturday, it holds extensive displays on Hawaiian culture and is renowned for its collection of shells and minerals, including a rare specimen of orlymanite.</span></p><span data-dcnode-id="159" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="153" id="attachment_2398" style="width: 650px"><img alt="Sky 28" aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full lazyloaded" data-dcnode-id="158" data-src="https://www.travelmag.com/wp-content/uploads/2017/01/Lyman-House-Memorial-Museum-Mark-Gobel.jpg" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelmag.com/wp-content/uploads/2017/01/Lyman-House-Memorial-Museum-Mark-Gobel.jpg&amp;raw" width="640"><noscript data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">&lt;img aria-describedby="caption-attachment-2398" class="wp-image-2398 size-full" src="https://www.travelmag.com/wp-content/uploads/2017/01/Lyman-House-Memorial-Museum-Mark-Gobel.jpg" alt="Sky 28" width="640" height="453" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="154" id="caption-attachment-2398"><span data-dcnode-id="155" instrument_node="">Lyman House Memorial Museum on the Big Island (Photo: Mark Gobel via Flickr)</span></p></div><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="149"><strong data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Try a local tipple at Kona Brewing Company</span></strong></p><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">This traditional, independent microbrewery has become something of a tourist hot-spot, giving visitors the chance to sample local brews and enjoy an informal tour of the building. Perpetually busy, there’s outdoor seating and live music to keep guests entertained. Food is also in ample supply, including some of the best pizza to be found anywhere on the island. But it’s the craft beer that is naturally the biggest reason to visit, with a good variety of beers on tap including lagers, Fire Rock Pale Ale, Hanalei Island and Castaway IPAs, and Koko Brown Ale.</span></p><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="142"><strong data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Try the seafood at Huggo’s On the Rocks</span></strong></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Huggo’s on the Rocks is a consistent favourite among locals and visitors seeking to “chillax”. It’s a great spot to enjoy delicious seafood and tropical drinks while taking in the ambience of the Pacific Ocean. For anyone coming to the Big Island, this is a must-try destination for a memorable oceanfront dining experience. The best time to go is a sunset, with its covered, warmly lit main restaurant open on all sides as torches blaze and the Pacific laps the shore.</span></p><span data-dcnode-id="138" instrument_node="">
</span></div><span data-dcnode-id="135" instrument_node="">
