</span><div class="wp-block-image size-full wp-image-26129" data-dcnode-id="538"><figure class="aligncenter" data-dcnode-id="539"><img alt="Tasmania Bridge, Hobart" class="wp-image-26129" data-dcnode-id="542" height="500" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274-300x200.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274-768x512.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274-610x406.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-193497274-480x320.jpg 480w" width="750"><figcaption data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Tasmania Bridge in Hobart</span></figcaption></figure></div><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Today, you’ll begin your journey by exploring Tasmania’s capital, Hobart!</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Without a car, one of the best ways to see the attractions around town is with a Red Decker City Loop Tour. This double decker bus takes you to the top attractions around town in 90 minutes.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">This is a hop-on hop-off bus where you get 24-48 hours (depending on your ticket) of access. You can read about the stops to plan your visit and make a booking </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reddecker.com.au/tours/24-hour-ticket/" rel="noopener" target="_blank"><span data-dcnode-id="529" instrument_node="">here</span></a><span data-dcnode-id="527" instrument_node="">.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">Mount Wellington can be visited with the </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtwellingtonexplorer.com.au/" rel="noopener" target="_blank"><span data-dcnode-id="523" instrument_node="">kunanyi / Mt Wellington Explorer Bus</span></a><span data-dcnode-id="521" instrument_node="">. This return trip takes 2 hours and you’ll get to spend 30 minutes at the summit. The benefit of this bus tour is that they have access to the summit even in times of bad weather.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Both tours start at the Travel Centre (corner of Davey and Elizabeth Street).</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">If you’re going to purchase a Red Decker bus tour, you can save money by purchasing a combined ticket with the explorer bus </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtwellingtonexplorer.com.au/mt-wellington-city-loop-combo/" rel="noopener" target="_blank"><span data-dcnode-id="514" instrument_node="">here</span></a><span data-dcnode-id="512" instrument_node="">.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">I recommend you plan your own visit based on the attractions that interest you, but a simple itinerary is below.</span></p><span data-dcnode-id="507" instrument_node="">
</span><ul data-dcnode-id="498"><li aria-level="1" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Take the SkyBus from Hobart Airport into the city</span></li><li aria-level="1" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Leave your bags at your hotel and then head to Point A and take the kunanyi / Mt Wellington Explorer Bus to Mount Wellington</span></li><li aria-level="1" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Return to Point A and start your City Loop Tour, stopping somewhere for lunch</span></li><li aria-level="1" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Return to your hotel and have dinner somewhere in North Hobart</span></li></ul><span data-dcnode-id="497" instrument_node="">
</span><h3 data-dcnode-id="494"><span data-dcnode-id="495" id="Day_2_Enjoying_More_Of_Hobart"><span data-dcnode-id="496" instrument_node="">Day 2: Enjoying More Of Hobart</span></span></h3><span data-dcnode-id="493" instrument_node="">
</span><div class="wp-block-image size-full wp-image-24915" data-dcnode-id="488"><figure class="aligncenter" data-dcnode-id="489"><img alt="Taking a play break in MONA with kids" class="wp-image-24915" data-dcnode-id="492" height="525" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/MONA.png&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/MONA.png 700w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-300x225.png 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-610x458.png 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-510x382.png 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-480x360.png 480w" width="700"><figcaption data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Taking a play break in MONA</span></figcaption></figure></div><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Today you’ll make your way to MONA! I highly recommend you take the ferry to MONA.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">This departs from Brooke Street Pier and only takes 25 minutes. You can purchase a drink or bite to eat on board, and it’s a comfortable and scenic way of getting to MONA.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">You need to book in advance to visit MONA. You can do this and purchase ferry tickets </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mona.net.au/visit/getting-here" rel="noopener" target="_blank"><span data-dcnode-id="479" instrument_node="">here</span></a><span data-dcnode-id="477" instrument_node="">.</span></p><span data-dcnode-id="475" instrument_node="">
</span><ul data-dcnode-id="466"><li aria-level="1" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Have breakfast near Hobart’s Waterfront and then head to Brooke Street Pier</span></li><li aria-level="1" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Take the ferry to MONA and spend some time exploring the Museum</span></li><li aria-level="1" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Have lunch and then head to Battery Point for a heritage walk</span></li><li aria-level="1" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Explore Salamanca and Hobart’s waterfront and pick somewhere for dinner</span></li></ul><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">You can read more about these attractions in the itinerary above this one.</span></p><span data-dcnode-id="462" instrument_node="">
</span><h3 data-dcnode-id="459"><span data-dcnode-id="460" id="Day_3_Exploring_Richmond"><span data-dcnode-id="461" instrument_node="">Day 3: Exploring Richmond</span></span></h3><span data-dcnode-id="458" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="455"><figure class="aligncenter" data-dcnode-id="456"><img alt="Best Richmond Accommodation Tasmania" class="wp-image-27925" data-dcnode-id="457" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715.jpg 800w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715-300x200.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715-768x512.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715-610x406.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-183891715-480x320.jpg 480w" width="800"></figure></div><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">On day 3 you’ll explore Richmond!</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">Again, you’ll want to do this as part of a bus tour. A good half day tour is </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hobartshuttlebus.com/richmond-village/" rel="noopener" target="_blank"><span data-dcnode-id="449" instrument_node="">here</span></a><span data-dcnode-id="447" instrument_node=""> which gives you nearly 3 hours to explore the attractions at your leisure.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">These tours leave from the Travel Centre with some hotel pick ups available. </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hobartshuttlebus.com/richmond-village/" rel="noopener" target="_blank"><span data-dcnode-id="443" instrument_node="">You can make a booking here</span></a><span data-dcnode-id="441" instrument_node="">.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">You can read about the attractions in Richmond in the itinerary above this one.</span></p><span data-dcnode-id="436" instrument_node="">
</span><ul data-dcnode-id="429"><li aria-level="1" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Start the morning with breakfast in Battery Point</span></li><li aria-level="1" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Head to the Travel Centre (or get a hotel pick up) and take the bus to Richmond</span></li><li aria-level="1" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Explore the attractions in Richmond</span></li></ul><span data-dcnode-id="428" instrument_node="">
</span><h3 data-dcnode-id="425"><span data-dcnode-id="426" id="Day_4_Bruny_Island"><span data-dcnode-id="427" instrument_node="">Day 4: Bruny Island</span></span></h3><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Today you’ll explore the scenic and interesting Bruny Island with a day tour!</span></p><span data-dcnode-id="421" instrument_node="">
</span><ul data-dcnode-id="415"><li aria-level="1" data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">Wake up early and head to the starting point for your tour (you can read about the best tours </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/bruny-island-tours/" rel="noopener" target="_blank"><span data-dcnode-id="419" instrument_node="">here</span></a><span data-dcnode-id="417" instrument_node="">)</span></li></ul><span data-dcnode-id="414" instrument_node="">
</span><h4 data-dcnode-id="411"><span data-dcnode-id="412" id="Bruny_Island"><span data-dcnode-id="413" instrument_node="">Bruny Island</span></span></h4><span data-dcnode-id="410" instrument_node="">
</span><div class="wp-block-image size-full wp-image-25538" data-dcnode-id="405"><figure class="aligncenter" data-dcnode-id="406"><img alt="The Neck Bruny Island things to do" class="wp-image-25538" data-dcnode-id="409" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201021_230857066_iOS-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">The Neck – I’ve never seen anything like it</span></figcaption></figure></div><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Bruny Island is a fantastic place to spend the day exploring. This island sits just off the south east coast and offers plenty from everyone, with abundant wildlife, nature walks, local produce, beaches and a small settlement.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Some of the most iconic spots of this island are the Neck (a narrow strip which separates the North and South of the island), South Bruny National Park for its bush walks and beaches and the historic Cape Bruny Lighthouse.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">You’ll also find many places selling some of the best Tasmanian produce like oysters, cheese, honey and chocolate and wine.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">There are many day tours you can do, so you can find one that takes you to the places that interest you.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="391" instrument_node="">You can read about the best day tours to Bruny Island by </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/bruny-island-tours/" rel="noopener" target="_blank"><span data-dcnode-id="390" instrument_node="">clicking here</span></a><span data-dcnode-id="388" instrument_node=""> or read our full guide to Bruny Island </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/best-things-to-do-on-bruny-island/" rel="noopener" target="_blank"><span data-dcnode-id="387" instrument_node="">here</span></a><span data-dcnode-id="385" instrument_node="">.</span></p><span data-dcnode-id="383" instrument_node="">
</span><h3 data-dcnode-id="380"><span data-dcnode-id="381" id="Day_5_Port_Arthur_Historic_Site"><span data-dcnode-id="382" instrument_node="">Day 5: Port Arthur Historic Site</span></span></h3><span data-dcnode-id="379" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26120" data-dcnode-id="374"><figure class="aligncenter" data-dcnode-id="375"><img alt="Port Arthur Historic Site" class="wp-image-26120" data-dcnode-id="378" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Port Arthur Historic Site</span></figcaption></figure></div><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">On the last day of your trip to Tasmania, you’ll take a day tour to the Port Arthur Historic Site. You can find a </span><a class="thirstylink" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/port-arthur-day-tour/" rel="nofollow noopener" target="_blank" title="Port Arthur Day Tour"><span data-dcnode-id="371" instrument_node="">day tour here</span></a><span data-dcnode-id="369" instrument_node="">.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Be mindful that these tours can take anywhere from 8-12 hours so keep in mind the time of your flight before booking one. You may be able to organise airport dropoff, as Hobart Airport is closer to Port Arthur than Hobart, but you’ll need to discuss this with the tour company directly.</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">You can read about this site in the itinerary above.</span></p><span data-dcnode-id="361" instrument_node="">
</span><h2 data-dcnode-id="358"><span data-dcnode-id="359" id="Tasmania_4_Days_Itinerary_8211_From_Hobart_Without_A_Car"><span data-dcnode-id="360" instrument_node="">Tasmania 4 Days Itinerary – From Hobart Without A Car</span></span></h2><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">With one less day, I recommend removing either the Richmond, Bruny Island or Port Arthur day trip. Whichever sounds the least interesting to you.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Read the above for all the details of this 4 day itinerary Tasmania.</span></p><span data-dcnode-id="351" instrument_node="">
</span><h2 data-dcnode-id="348"><span data-dcnode-id="349" id="Tasmania_3_Day_Itinerary"><span data-dcnode-id="350" instrument_node="">Tasmania 3 Day Itinerary</span></span></h2><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">If you’ve only got 3 days in Tasmania you can make some modifications to the itineraries above.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">If you’re planning a Tasmania itinerary 3 days from Devonport, remove the final day exploring the Tamar Valley.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">For a 3 day Tasmania itinerary from Hobart with a car, you may want to remove the visit to Wineglass Bay (as this is quite far) and replace this with Port Arthur or Bruny Island.</span></p><span data-dcnode-id="338" instrument_node="">
</span><div class="wp-block-image size-full wp-image-25996" data-dcnode-id="333"><figure class="aligncenter" data-dcnode-id="334"><img alt="Wineglass Bay" class="wp-image-25996" data-dcnode-id="337" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-bay-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Wineglass Bay</span></figcaption></figure></div><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Planning a 3 days in Tasmania itinerary without a car may be more difficult. If you want to get out of Hobart, you may need to make some tough decisions.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">I recommend that you include a Red Decker City Loop in your 3 day trip to Tasmania to see the best attractions in the city, as well as the kunanyi / Mt Wellington Explorer Bus.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">You then need to decide if you want to see Richmond, Bruny Island or Port Arthur. If more than one of these interests you, maybe consider removing the trip to MONA.</span></p><span data-dcnode-id="323" instrument_node="">
</span><h2 data-dcnode-id="320"><span data-dcnode-id="321" id="Tasmania_Weekend_Trip"><span data-dcnode-id="322" instrument_node="">Tasmania Weekend Trip</span></span></h2><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">If you just need a weekend in Tasmania itinerary, I recommend you fly into Hobart and spend your time doing your favourite choice of activities from the itineraries above which don’t require a car. If you haven’t been to Hobart before, focus on that.</span></p><span data-dcnode-id="316" instrument_node="">
</span><h2 data-dcnode-id="313"><span data-dcnode-id="314" id="Final_Words"><span data-dcnode-id="315" instrument_node="">Final Words</span></span></h2><span data-dcnode-id="312" instrument_node="">
</span><div class="wp-block-image size-full wp-image-27461" data-dcnode-id="307"><figure class="aligncenter" data-dcnode-id="308"><img alt="View of Hobart from Mt Wellington" class="wp-image-27461" data-dcnode-id="311" height="421" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057-300x168.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057-768x431.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057-610x342.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Tasmania-Australia-A-294232057-480x269.jpg 480w" width="750"><figcaption data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">View of Hobart from Mt Wellington</span></figcaption></figure></div><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Tasmania offers so much to see that no matter how long you visit you’ll be left wanting more. Just try to fit in what you can.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The laid back nature of the state makes it easy to visit, and there will still be plenty of exciting and beautiful attractions waiting for when you return!</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="282"><i data-dcnode-id="283"><span data-dcnode-id="299" instrument_node="">We hope you enjoy these suggestions for what to do in Tasmania for 4 or 5 days so that you can have your perfect trip. You can find more information to plan your perfect trip to Tasmania </span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/trip-to-tasmania/" rel="noopener" target="_blank"><span data-dcnode-id="298" instrument_node="">here</span></a><span data-dcnode-id="296" instrument_node="">&nbsp;or read our 7 day itinerary </span><a data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/tasmania-itinerary-7-days/" rel="noopener" target="_blank"><span data-dcnode-id="295" instrument_node="">here</span></a><span data-dcnode-id="293" instrument_node="">, 10 day </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/self-drive-tasmania-itinerary-10-days/" rel="noopener" target="_blank"><span data-dcnode-id="292" instrument_node="">here</span></a><span data-dcnode-id="290" instrument_node=""> or 14 day </span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/tasmania-road-trip-14-days-itinerary/" rel="noopener" target="_blank"><span data-dcnode-id="289" instrument_node="">here</span></a><span data-dcnode-id="287" instrument_node="">. For more planning guides,&nbsp;</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/planning/" rel="noopener" target="_blank"><span data-dcnode-id="286" instrument_node="">click here</span></a><span data-dcnode-id="284" instrument_node="">.</span></i></p><span data-dcnode-id="281" instrument_node="">
