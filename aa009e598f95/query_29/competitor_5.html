</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">This isn’t a super well equipped zoo like those you find in major cities, but they do house over 100 species of animals with kangaroos, Tasmanian devils, snakes, a huge variety of birds, lions, tigers and more.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">One of the interesting things to do here is walk through the Jurassic Swamp. This is a large garden with robotic dinosaurs, sound effects and information on dinosaurs (although be careful on warm days as they do say real snakes can be active).</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">There are also food machines where you can feed some of the more docile animals like wallabies, sheeps and goats, and they have a cafe open for lunch too.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1322"><i data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Address: 1166 Ecclestone Rd, Riverside TAS 7250</span></i></p><span data-dcnode-id="1321" instrument_node="">
</span><h4 data-dcnode-id="1318"><span data-dcnode-id="1319" id="Christmas_Hills_Raspberry_Farm"><span data-dcnode-id="1320" instrument_node="">Christmas Hills Raspberry Farm</span></span></h4><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1314"><i data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Driving time from Tasmania Zoo: Approximately 35 minutes&nbsp;</span></i></p><span data-dcnode-id="1313" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26433" data-dcnode-id="1308"><figure class="aligncenter" data-dcnode-id="1309"><img alt="Christmas Hills Raspberry Farm walk around the lake" class="wp-image-26433" data-dcnode-id="1312" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/IMG_5141-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The walk around the lake</span></figcaption></figure></div><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The last stop on your Tasmania itinerary before heading to Devonport is Christmas Hills Raspberry farm. This cafe/farm offers you some of that famous Tasmanian produce to sample before you leave and is also great for some last minute souvenirs.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Located on a gorgeous property with lakes to walk by and alpacas and wallabies to see, the cafe is open daily from 7am to 5pm (and only closed Christmas and Good Friday).</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">This is a raspberry farm and you can find raspberry dishes year round (however fresh raspberries are seasonal). If you’d like to, you can stop for a 3 course meal or purchase some goodies from the shop.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">This is a perfect place to end your Tasmania trip and get some fresh treats for the ferry ride back to Melbourne!</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1292"><i data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The cafe is open daily from 7am to 5pm.</span></i></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1288"><i data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Address: 9 Christmas Hills Rd, Elizabeth Town TAS 7304</span></i></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1284"><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/christmas-hills-raspberry-farm/" rel="noopener" target="_blank"><span data-dcnode-id="1286" instrument_node="">Click here to read our full review.</span></a></p><span data-dcnode-id="1283" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" id="Tasmania_Itinerary_4_Days_8211_From_Devonport"><span data-dcnode-id="1282" instrument_node="">Tasmania Itinerary 4 Days – From Devonport</span></span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">With one less day, I recommend removing day 3 from the above itinerary – basically don’t visit the Arthur River and the Edge of the World. Instead, on day 2, finish the day in Stanley and on day 3, visit The Nut and wander around town before heading to the Tamar Valley as per the itinerary above.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1273"><span data-dcnode-id="1274" id="Overview-2"><span data-dcnode-id="1275" instrument_node="">Overview</span></span></h3><span data-dcnode-id="1272" instrument_node="">
</span><ol data-dcnode-id="1263"><li aria-level="1" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Day 1 drive to Cradle Mountain once disembarking the Spirit and visit Dove Lake and surrounds</span></li><li aria-level="1" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Day 2 have some fun at Tasmazia, call in at Sheffield and then enjoy the beach at Boat Harbour. Drive on to Stanley for the night</span></li><li aria-level="1" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Day 3 climb The Nut and explore historic Stanley before driving on the Tamar Valley visiting either Seahorse World or Platypus House and watching the penguins come in at Low Head</span></li><li aria-level="1" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Day 4 see more of the Tamar Valley before driving back to the Spirit of Tasmania.</span></li></ol><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Read the above for all the details of this 4 day Tasmania itinerary.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><h2 data-dcnode-id="1256"><span data-dcnode-id="1257" id="5_Days_In_Tasmania_Itinerary_8211_From_Hobart"><span data-dcnode-id="1258" instrument_node="">5 Days In Tasmania Itinerary – From Hobart</span></span></h2><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">In this Tasmania 5 days self drive itinerary, you are going to love exploring the best of east coast Tasmania and Hobart while learning about Tasmania’s convict past at Port Arthur. You’ll enjoy the variety in this trip!</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">This itinerary assumes starting and finishing in Hobart and that you have your own car or will hire one (</span><a class="thirstylink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/rentalcars/" rel="nofollow noopener" target="_blank" title="RentalCars"><span data-dcnode-id="1250" instrument_node="">find latest car hire prices here</span></a><span data-dcnode-id="1248" instrument_node="">).</span></p><span data-dcnode-id="1246" instrument_node="">
</span><h3 data-dcnode-id="1243"><span data-dcnode-id="1244" id="Overview-3"><span data-dcnode-id="1245" instrument_node="">Overview</span></span></h3><span data-dcnode-id="1242" instrument_node="">
</span><ol data-dcnode-id="1233"><li aria-level="1" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Days 1-2 discover Hobart</span></li><li aria-level="1" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Day 3 drive to Coles Bay with a stop at Maria Island on the way</span></li><li aria-level="1" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Day 4 walk to Wineglass Bay in the morning before driving on to Port Arthur in the afternoon. Consider a ghost tour at Port Arthur Historic Site</span></li><li aria-level="1" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Day 5 visit the Port Arthur Historic Site before driving back to Hobart</span></li></ol><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">The highlights of this Tasmania 5 day self drive itinerary are:</span></p><span data-dcnode-id="1229" instrument_node="">
</span><ul data-dcnode-id="1218"><li aria-level="1" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Taking your time to explore Hobart (from above and below)</span></li><li aria-level="1" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Venturing out of Hobart and visiting famous MONA and historic Richmond</span></li><li aria-level="1" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Exploring Maria Island and hiking the stunning Wineglass Bay</span></li><li aria-level="1" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Connecting with Tasmania’s convict history at Port Arthur</span></li><li aria-level="1" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Seeing some of Tasmania’s unique and beautiful geological formations</span></li></ul><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">… and more!</span></p><span data-dcnode-id="1214" instrument_node="">
</span><h3 data-dcnode-id="1211"><span data-dcnode-id="1212" id="Map-2"><span data-dcnode-id="1213" instrument_node="">Map</span></span></h3><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The following map shows you the route this 5 day itinerary takes.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1201"><figure class="aligncenter" data-dcnode-id="1202"><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/viewer%3Fmid%3D1k82ZV7Z46JgvrB9nt-2hDxkMBmMy-bT3%26ll%3D-42.61348408836351%252C147.76845510000004%26z%3D9" rel="noopener" target="_blank"><img alt="5 Days In Tasmania Itinerary - From Hobart" class="wp-image-28937" data-dcnode-id="1206" height="598" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart.png&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart.png 799w, https://tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart-300x225.png 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart-768x575.png 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart-510x382.png 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/5-Days-In-Tasmania-Itinerary-From-Hobart-480x359.png 480w" width="799"></a><figcaption data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Click the Map to open in Google Maps. You can then access directions to each of the locations discussed in this article.</span></figcaption></figure></div><span data-dcnode-id="1200" instrument_node="">
</span><h3 data-dcnode-id="1197"><span data-dcnode-id="1198" id="Day_1_Arriving_In_Hobart"><span data-dcnode-id="1199" instrument_node="">Day 1: Arriving In Hobart</span></span></h3><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Today, you begin your journey by exploring Tasmania’s capital, Hobart!</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">As this is the first day you arrive, it’s important to get acquainted with the city. This is why we start at Mount Wellington to see everything from above and then take an easy stroll through the attractions below!</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">If you arrive later in the day, you may need to adjust the itinerary to suit your schedule.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><ul data-dcnode-id="1176"><li aria-level="1" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Arrive in Hobart at Hobart Airport and pick up your car</span></li><li aria-level="1" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Make your way to the top of Mount Wellington and understand the layout of the town</span></li><li aria-level="1" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Have lunch (we recommend somewhere in North Hobart) and then make your way to your hotel</span></li><li aria-level="1" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">After checking in, head to Battery Point for a walk on the heritage trail</span></li><li aria-level="1" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Make your way to Salamanca, explore Hobart’s Waterfront and enjoy a dinner at either of these spots</span></li></ul><span data-dcnode-id="1175" instrument_node="">
</span><h4 data-dcnode-id="1172"><span data-dcnode-id="1173" id="Where_To_Stay_In_Hobart"><span data-dcnode-id="1174" instrument_node="">Where To Stay In Hobart</span></span></h4><span data-dcnode-id="1171" instrument_node="">
</span><ul data-dcnode-id="1155"><li aria-level="1" data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">BEST – MACq 01 Hotel (</span><a class="thirstylink" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/macq-01-hotel/" rel="nofollow noopener" target="_blank" title="MACq 01 Hotel"><span data-dcnode-id="1169" instrument_node="">See latest prices here</span></a><span data-dcnode-id="1167" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="1161"><span data-dcnode-id="1165" instrument_node="">MIDRANGE – Somerset On The Pier (</span><a class="thirstylink" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/somerset-on-the-pier-hobart/" rel="nofollow noopener" target="_blank" title="Somerset On The Pier Hobart"><span data-dcnode-id="1164" instrument_node="">See latest prices here</span></a><span data-dcnode-id="1162" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">BUDGET – Central Hotel Hobart (</span><a class="thirstylink" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/central-hotel-hobart/" rel="nofollow noopener" target="_blank" title="Central Hotel Hobart"><span data-dcnode-id="1159" instrument_node="">See latest prices here</span></a><span data-dcnode-id="1157" instrument_node="">)</span></li></ul><span data-dcnode-id="1154" instrument_node="">
</span><h4 data-dcnode-id="1151"><span data-dcnode-id="1152" id="Mt_Wellington"><span data-dcnode-id="1153" instrument_node="">Mt Wellington</span></span></h4><span data-dcnode-id="1150" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1147"><figure class="aligncenter" data-dcnode-id="1148"><img alt="Morning view of Hobart with mt. Wellington in the background" class="wp-image-28118" data-dcnode-id="1149" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613.jpg 800w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613-300x200.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613-768x512.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613-610x406.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Morning-view-of-Hobart-with-mt-161185613-480x320.jpg 480w" width="800"></figure></div><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">People in Hobart know Mt Wellington simply as ‘the mountain’, and it’s clear why – it can be seen from all around town! Driving to the summit takes only 30 minutes and is a must do when you first visit Hobart.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The road is sealed, easy to drive on and takes you right to the summit of this 1,271 metre mountain. Along the way you’ll find multiple spots for stopping and checking out the view, as well as walking trails and a coffee van at the Springs.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">At the summit, you’ll find an enclosed observation deck with a layout of the city to help you get orientated. The views from the top (in clear weather) really are stunning, and there are also observation decks outdoors.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">It can be cold and windy here so most people don’t spend too long, but you could take a walk if the weather is right and you’re dressed appropriately.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Access to the mountain can be restricted at times due to bad weather (especially in winter), but it’s still worth seeing how far you can go. If this happens to you, taking a walk in nearby Fern Tree (like the short Silver Falls walk) is a good alternative to visiting the top of the mountain.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><h4 data-dcnode-id="1128"><span data-dcnode-id="1129" id="Battery_Point"><span data-dcnode-id="1130" instrument_node="">Battery Point</span></span></h4><span data-dcnode-id="1127" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26132" data-dcnode-id="1122"><figure class="aligncenter" data-dcnode-id="1123"><img alt="Historic houses along Hampden Road at Battery Point" class="wp-image-26132" data-dcnode-id="1126" height="421" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391-300x168.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391-768x431.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391-610x342.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/bigstock-Hobart-Australia-December-300789391-480x269.jpg 480w" width="750"><figcaption data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Historic houses along Hampden Road at Battery Point</span></figcaption></figure></div><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Battery Point stands out as one of the most pretty, historical and affluent suburbs in Hobart, and the best way to explore it is with a heritage walk which you can find </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.batterypointwalk.com.au/" rel="noopener" target="_blank"><span data-dcnode-id="1119" instrument_node="">here</span></a><span data-dcnode-id="1117" instrument_node="">.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">This compact suburb features sandstone buildings, cottages, parks, churches, cafes and restaurants and makes for a lovely way to spend an afternoon. The heritage trail will take you up Kelly’s Steps, through Arthur’s Circus and through the streets of this lovely suburb.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">I recommend a visit to the charming Narryna Heritage Museum – an old town house with some relics like paintings and furniture from years past.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">A stop at Hampden Road is a must for a smoothie or coffee, and then continue on to Princes Park to take a stroll and relax.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><h4 data-dcnode-id="1103"><span data-dcnode-id="1104" id="Salamanca_Place_and_Hobarts_Waterfront"><span data-dcnode-id="1105" instrument_node="">Salamanca Place and Hobart’s Waterfront</span></span></h4><span data-dcnode-id="1102" instrument_node="">
</span><div class="wp-block-image size-full wp-image-24914" data-dcnode-id="1097"><figure class="aligncenter" data-dcnode-id="1098"><img alt="Hobart Waterfront" class="wp-image-24914" data-dcnode-id="1101" height="469" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront-300x188.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront-768x480.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront-610x381.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront-400x250.jpg 400w, https://tasmaniaexplorer.com.au/wp-content/uploads/Hobart-Waterfront-480x300.jpg 480w" width="750"><figcaption data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Hobart Waterfront</span></figcaption></figure></div><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">One of the main centres of Hobart’s bar and restaurant scene is Salamanca Place. This collection of sandstone warehouses is home to lively bars, restaurants, cafes, galleries and souvenir stores.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Salamanca Place changes depending on when you visit. During the day this area is pretty but unassuming. On Saturday’s it becomes a lively market, and by night the area is full of activity.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">I recommend starting your visit at the fountain in the square and then taking your time to explore the buildings. You’ll find shops selling souvenirs Tasmania is known for like honey, woodwork and more. This is also a place to relax and there are many places to stop for a drink, with each venue offering its own atmosphere.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Hobart’s Waterfront is in front of Salamanca and this area has its own offerings to explore like the floating pontoon at Brooke Street Pier (which hosts a Twilight Market on Friday nights), the converted warehouses on Hunter Street, Mawsons Replica Hut (the Antartic Explorer), MAC01 and much more.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">You’ll also find abundant seafood dining and this is obviously a great option for dinner. You can choose anything which interests you – from takeaway options on the wharf, to more fine dining venues back at Salamanca.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><h3 data-dcnode-id="1078"><span data-dcnode-id="1079" id="Day_2_Enjoying_Hobart"><span data-dcnode-id="1080" instrument_node="">Day 2: Enjoying Hobart</span></span></h3><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">On your second day in Hobart you’ll head outside the city centre exploring the famous art gallery of MONA and the historic town of Richmond.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><ul data-dcnode-id="1063"><li aria-level="1" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Have breakfast (we recommend Machine Cafe in Salamanca Place) then drive to MONA (Museum of Old and New Art)</span></li><li aria-level="1" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">After MONA, continue driving on to Richmond</span></li><li aria-level="1" data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Stop for lunch at a winery on the way (there are several near Cambridge/Richmond)</span></li><li aria-level="1" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Spend some time discovering the sites at Richmond before returning to Hobart</span></li><li aria-level="1" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Head to the Waterfront or Salamanca Place for dinner</span></li></ul><span data-dcnode-id="1062" instrument_node="">
</span><h4 data-dcnode-id="1059"><span data-dcnode-id="1060" id="MONA"><span data-dcnode-id="1061" instrument_node="">MONA</span></span></h4><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1055"><i data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Driving time from Hobart: Approximately 20 minutes</span></i></p><span data-dcnode-id="1054" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26097" data-dcnode-id="1049"><figure class="aligncenter" data-dcnode-id="1050"><img alt="MONA in Hobart" class="wp-image-26097" data-dcnode-id="1053" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart.png&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart.png 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart-300x225.png 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart-768x576.png 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart-610x458.png 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart-510x382.png 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/MONA-in-Hobart-480x360.png 480w" width="750"><figcaption data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Outside view of MONA</span></figcaption></figure></div><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">When it comes to museums/art galleries in Hobart, there is nothing quite like MONA. In fact, this museum stands out Australia wide for the unique and interesting artifacts and exhibits which draw visitors in everyday.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">MONA is located just a 20 minute drive from Hobart and positioned by a winery. You need to </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mona.net.au/" rel="noopener" target="_blank"><span data-dcnode-id="1043" instrument_node="">pre-book your visit online</span></a><span data-dcnode-id="1041" instrument_node="">, and you can also purchase a bus/cruise ticket at the same time (cruises leave from Brooke Street Pier). However I recommend driving so you can head straight to Richmond afterwards.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Outside of the museum is pretty but fairly low key with a trampoline which you can jump on and some interesting architecture as well as a big picnic and concert area, but inside and underground is a totally different story.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">This museum is huge and fascinatingly impressive with lots to see. There are huge murals, paintings, rooms to walk through, restaurants and a bar.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Many exhibits change but some things are always on display. There appears to be a large focus on things people would rather not think about – death, the repulsiveness of the human body (think smelly poo machines and awkward photos) and lots of interesting, funny and creepy things at every turn.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Some of it really isn’t kid friendly but you can quickly walk past and see something else. There is also a map which can show you the places to avoid for families.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Outside, we found places to eat and another exhibit – House of Mirrors – which was a maze of mirrors. This was an extra $10 and very difficult to escape from, but loads of fun!</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">MONA simply can’t be missed when you’re in Hobart!</span></p><span data-dcnode-id="1021" instrument_node="">
</span><h4 data-dcnode-id="1018"><span data-dcnode-id="1019" id="Richmond"><span data-dcnode-id="1020" instrument_node="">Richmond</span></span></h4><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1014"><i data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Driving time from MONA: Approximately 30 minutes</span></i></p><span data-dcnode-id="1013" instrument_node="">
</span><div class="wp-block-image size-full wp-image-24920" data-dcnode-id="1008"><figure class="aligncenter" data-dcnode-id="1009"><img alt="Richmond" class="wp-image-24920" data-dcnode-id="1012" height="469" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Richmond.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond-300x188.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond-768x480.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond-610x381.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond-400x250.jpg 400w, https://tasmaniaexplorer.com.au/wp-content/uploads/Richmond-480x300.jpg 480w" width="750"><figcaption data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Richmond</span></figcaption></figure></div><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Richmond is just outside of Hobart and a pretty town in it’s own right. This small town has been drawing visitors (local, interstate and international) for many years and offers plenty of things for tourists to see and do.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">One of the easiest ways to see the best of Richmond is simply to walk. Everything is close by in this pretty little town.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">I recommend you park your car near Richmond Bridge (the oldest stone bridge in Australia) and cross the bridge and walk into the town from there.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">You’ll pass cafes, restaurants, galleries and boutique shops. People are friendly and welcoming to tourists, and you can simply see what interests you.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">If you’re visiting with kids check out the Pooseum (which is exactly what it sounds like – a museum of animal poo!).</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Two must see spots are the Richmond Gaol and Old Hobart Town Model Village.</span></p><span data-dcnode-id="989" instrument_node="">
</span><h4 data-dcnode-id="986"><span data-dcnode-id="987" id="Richmond_Gaol"><span data-dcnode-id="988" instrument_node="">Richmond Gaol</span></span></h4><span data-dcnode-id="985" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="982"><figure class="aligncenter" data-dcnode-id="983"><img alt="Outside the Richmond Gaol Tasmania" class="wp-image-24840" data-dcnode-id="984" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_004625475_iOS-480x360.jpg 480w" width="750"></figure></div><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Tasmanian’s embrace their convict past perhaps a bit more than other states, and one of the top attractions in Richmond is the Richmond Gaol.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Richmond Gaol shows just how different conditions were just 200 years ago and offers you an authentic experience with a self guided tour through the complex. This is one of the places in Tasmania to understand the history of Tasmanian convicts.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">As Australia’s oldest intact convict gaol, the gaol is impressively presented. It is a relatively small complex, but what it lacks in size it makes up for in authenticity. Here you’ll see the holding cells (in almost authentic condition), solitary confinement cells, an old kitchen, flogging yard and information boards (and sound effects) to add to your visit.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">When we visited the cost was $10 for adults, $5 for children and just $25 for a family. We thought this was good value and the gaol can be explored in around an hour.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/richmond-gaol/" rel="noopener" target="_blank"><span data-dcnode-id="968" instrument_node="">Click here to read my full review.</span></a></p><span data-dcnode-id="965" instrument_node="">
</span><h4 data-dcnode-id="962"><span data-dcnode-id="963" id="Old_Hobart_Town_Model_Village"><span data-dcnode-id="964" instrument_node="">Old Hobart Town Model Village</span></span></h4><span data-dcnode-id="961" instrument_node="">
</span><div class="wp-block-image size-full wp-image-24904" data-dcnode-id="956"><figure class="aligncenter" data-dcnode-id="957"><img alt="Old Hobart Town Model Village" class="wp-image-24904" data-dcnode-id="960" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/20200906_021935928_iOS-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Walking in to Old Hobart Town (note this is using my super zoomed out lens – the site is bigger than it looks here)</span></figcaption></figure></div><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Richmond is a town which embraces history and this is clear from the nostalgic Old Hobart Town Model Village.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">This impressive and large model village, which took the builders several years to construct, is a representation of how Hobart looked 200 years ago in the 1820’s.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Not only is this an interesting model to walk around, but information boards let you understand how life was here just 200 years ago. You’ll notice how much the town has changed since then, but there are a couple buildings/sites which still exist.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">This impressive model includes bonsai trees of native myrtle and amusing figurines in interesting situations, and they offer a game for kids to play to keep them interested.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/old-hobart-town-model-village/" rel="noopener" target="_blank"><span data-dcnode-id="942" instrument_node="">Click here to read my full review.</span></a></p><span data-dcnode-id="939" instrument_node="">
</span><h3 data-dcnode-id="936"><span data-dcnode-id="937" id="Day_3_Discover_Maria_Island"><span data-dcnode-id="938" instrument_node="">Day 3: Discover Maria Island</span></span></h3><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932"><i data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Total driving time: 2 hours and 35 minutes&nbsp;</span></i></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Today you’ll leave Hobart and explore the extraordinary Maria Island before making your way to Coles Bay.</span></p><span data-dcnode-id="928" instrument_node="">
</span><ul data-dcnode-id="919"><li aria-level="1" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Stop somewhere for breakfast and then make your way to Triabunna (this is where the ferry leaves for Maria Island)</span></li><li aria-level="1" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Spend some time exploring Maria Island, the buildings and consider taking a walk</span></li><li aria-level="1" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Head back to Orford for lunch</span></li><li aria-level="1" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Continue driving to Coles Bay where you’ll spend the night (approx driving time 1 hour and 25 minutes)</span></li></ul><span data-dcnode-id="918" instrument_node="">
</span><h4 data-dcnode-id="915"><span data-dcnode-id="916" id="Where_To_Stay_At_Coles_Bay"><span data-dcnode-id="917" instrument_node="">Where To Stay At Coles Bay</span></span></h4><span data-dcnode-id="914" instrument_node="">
</span><ul data-dcnode-id="892"><li aria-level="1" data-dcnode-id="907"><b data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">BEST </span></b><span data-dcnode-id="911" instrument_node="">– Freycinet Lodge (</span><a class="thirstylink" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/freycinet-lodge/" rel="nofollow noopener" target="_blank" title="Freycinet Lodge"><span data-dcnode-id="910" instrument_node="">Click here for more details</span></a><span data-dcnode-id="908" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="900"><b data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">MIDRANGE </span></b><span data-dcnode-id="904" instrument_node="">– BIG4 Iluka on Freycinet (</span><a class="thirstylink" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/big4-iluka-freycinet/" rel="nofollow noopener" target="_blank" title="Big4 Iluka Freycinet"><span data-dcnode-id="903" instrument_node="">Click here for more details</span></a><span data-dcnode-id="901" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="893"><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">BUDGET </span></b><span data-dcnode-id="897" instrument_node="">– Swansea Backpacker Lodge (</span><a class="thirstylink" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/swansea-backpacker-lodge/" rel="nofollow noopener" target="_blank" title="Swansea Backpacker Lodge"><span data-dcnode-id="896" instrument_node="">Click here for more details</span></a><span data-dcnode-id="894" instrument_node="">)</span></li></ul><span data-dcnode-id="891" instrument_node="">
</span><h4 data-dcnode-id="888"><span data-dcnode-id="889" id="Maria_Island"><span data-dcnode-id="890" instrument_node="">Maria Island</span></span></h4><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="884"><i data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Driving time to Triabunna from Hobart: 1 hour and 15 minutes</span></i></p><span data-dcnode-id="883" instrument_node="">
</span><div class="wp-block-image size-full wp-image-25298" data-dcnode-id="878"><figure class="aligncenter" data-dcnode-id="879"><img alt="Fossil Cliffs circuit Maria Island" class="wp-image-25298" data-dcnode-id="882" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201009_002303130_iOS-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The entry to Fossils Cliffs and the steeper path afterwards</span></figcaption></figure></div><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Maria Island is one of two major islands that people explore in Tasmania (the other being Bruny Island).</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">However the major difference with Maria Island is that, unlike Bruny Island, Maria Island has no permanent inhabitants, no cars are allowed on the island, and of course it has its own unique history and sites. This makes it a fantastic place to explore.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="870" instrument_node="">Maria Island is connected to the Tasmanian mainland via a ferry. The ferry leaves from the wharf at Triabunna (you can read about the ferry </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/maria-island-ferry/" rel="noopener" target="_blank"><span data-dcnode-id="869" instrument_node="">here</span></a><span data-dcnode-id="867" instrument_node="">) and takes only 30 minutes. I recommend purchasing tickets before visiting (this can be done </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.encountermaria.com.au/%23/bookingProcess/tourAndPackage" rel="noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">here</span></a><span data-dcnode-id="864" instrument_node="">).</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The ferry arrives at Darlington, the only settlement here with an old penitentiary and a few historic buildings. It’s a fascinating place to explore with a very isolated feeling.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">This island is a huge drawcard for nature lovers, and it’s abundant with wildlife like wombats, wallabies and Tasmanian devils (sent here to protect them from the facial tumour).</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="855" instrument_node="">Getting around is easy by walking. The Reservoir Circuit is a short easy walk, or you can do something longer like visiting the Fossil Cliffs (read about this </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/fossil-cliffs-maria-island/" rel="noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">here</span></a><span data-dcnode-id="852" instrument_node=""> or for a full list of walk </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/maria-island-ferry/" rel="noopener" target="_blank"><span data-dcnode-id="851" instrument_node="">click here</span></a><span data-dcnode-id="849" instrument_node="">). You can also hire a bike and explore the island at your own leisure.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">A couple of hours is a good amount of time for exploring the island. My only real advice is to come prepared. There are no shops so you need to bring water and food with you.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h3 data-dcnode-id="841"><span data-dcnode-id="842" id="Day_4_Hiking_at_Wineglass_Bay"><span data-dcnode-id="843" instrument_node="">Day 4: Hiking at Wineglass Bay</span></span></h3><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837"><i data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Total driving time: 2 hours and 50 minutes&nbsp;</span></i></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">One of the other most visited nature sites in all of Tasmania is Wineglass Bay, and today you’ll understand why. You’ll start the morning with a gentle hike to the lookout at Freycinet National Park over the stunning Wineglass Bay, and then make your way to Port Arthur after lunch.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">This day is not to be missed!</span></p><span data-dcnode-id="830" instrument_node="">
</span><ul data-dcnode-id="823"><li aria-level="1" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Start the morning at Freycinet National Park and hike to the lookout over Wineglass Bay</span></li><li aria-level="1" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Head to Freycinet Marine Farm for a delicious seafood lunch</span></li><li aria-level="1" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Leave Coles Bay heading for Port Arthur and then consider taking a ghost tour at night</span></li></ul><span data-dcnode-id="822" instrument_node="">
</span><h4 data-dcnode-id="819"><span data-dcnode-id="820" id="Where_To_Stay_At_Port_Arthur"><span data-dcnode-id="821" instrument_node="">Where To Stay At Port Arthur</span></span></h4><span data-dcnode-id="818" instrument_node="">
</span><ul data-dcnode-id="796"><li aria-level="1" data-dcnode-id="811"><b data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">BEST</span></b><span data-dcnode-id="815" instrument_node=""> – Port Arthur Villas (</span><a class="thirstylink" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/port-arthur-villas/" rel="nofollow noopener" target="_blank" title="Port Arthur Villas"><span data-dcnode-id="814" instrument_node="">Click here for more details</span></a><span data-dcnode-id="812" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="804"><b data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">MIDRANGE</span></b><span data-dcnode-id="808" instrument_node=""> – NRMA Port Arthur (</span><a class="thirstylink" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/nrma-port-arthur-holiday-park/" rel="nofollow noopener" target="_blank" title="NRMA Port Arthur Holiday Park"><span data-dcnode-id="807" instrument_node="">Click here for more details</span></a><span data-dcnode-id="805" instrument_node="">)</span></li><li aria-level="1" data-dcnode-id="797"><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">BUDGET</span></b><span data-dcnode-id="801" instrument_node=""> – Fox and Hounds Inn (</span><a class="thirstylink" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/fox-and-hounds-inn-port-arthur/" rel="nofollow noopener" target="_blank" title="Fox and Hounds Inn Port Arthur"><span data-dcnode-id="800" instrument_node="">Click here for more details</span></a><span data-dcnode-id="798" instrument_node="">)</span></li></ul><span data-dcnode-id="795" instrument_node="">
</span><h4 data-dcnode-id="792"><span data-dcnode-id="793" id="Wineglass_Bay"><span data-dcnode-id="794" instrument_node="">Wineglass Bay</span></span></h4><span data-dcnode-id="791" instrument_node="">
</span><div class="wp-block-image size-full wp-image-24924" data-dcnode-id="786"><figure class="aligncenter" data-dcnode-id="787"><img alt="Wineglass Bay in Freycinet National Park" class="wp-image-24924" data-dcnode-id="790" height="469" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park-300x188.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park-768x480.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park-610x381.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park-400x250.jpg 400w, https://tasmaniaexplorer.com.au/wp-content/uploads/Wineglass-Bay-in-Freycinet-National-Park-480x300.jpg 480w" width="750"><figcaption data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Wineglass Bay in Freycinet National Park</span></figcaption></figure></div><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Iconic Wineglass Bay located in Freycinet National Park is a postcard perfect destination. This site is featured in many travel blogs/sites/magazines, is ranked as one of the top beaches in the world and is one of the most visited spots in all of Tasmania.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Today, you’ll get to see it for yourself!</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">You have a few options when you arrive at Freycinet National Park. Parking at the car park, you’ll find a couple of options for your walk. You can opt to do the Hazards Beach Circuit (a more challenging 5 hour return hike which takes you through the beach and around the park) or just hike to the lookout up a 1.3 kilometre trail.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Most people simply go to the lookout. This is steep but you can take it as easy as you like (it takes most people around an hour return). There are spots to stop and things to read along the way, and at the top you are rewarded with a breathtakingly stunning view of the beach below.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">You can also then decide if you’d like to make your way down to the beach. However this is another steep walk and takes about an hour return.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">There are other walks you can do in Freycinet National Park like Sleepy Bay which is only 10 minutes return and takes you down some easy steps to the shoreline.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Spend as long as you like exploring this stunning area and work up an appetite for lunch!</span></p><span data-dcnode-id="764" instrument_node="">
</span><h4 data-dcnode-id="761"><span data-dcnode-id="762" id="Freycinet_Marine_Farm"><span data-dcnode-id="763" instrument_node="">Freycinet Marine Farm</span></span></h4><span data-dcnode-id="760" instrument_node="">
</span><div class="wp-block-image size-full wp-image-25338" data-dcnode-id="755"><figure class="aligncenter" data-dcnode-id="756"><img alt="Freycinet Marine Farm from the road sign" class="wp-image-25338" data-dcnode-id="759" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/20201007_003725448_iOS-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">From the highway</span></figcaption></figure></div><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Tasmania is a seafood lovers paradise and for some of the best seafood on offer, we recommend a lunch at Freycinet Marine Farm.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">This is the place to sample some of the freshest mussels and oysters you’ll find as these are caught daily from their farm. We found these incredibly delicious! The farm even offers tours where you can catch and shuck your own oysters straight from the sea.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">There are a few different buildings here and they offer sit down and takeaway options as well as other seafood which is sourced locally. I recommend sitting down for lunch and washing your meal down with a glass of Tasmanian wine.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">There were plenty of places to sit when we visited, prices were not exorbitant and the kids were quite happy with their fish and chips (big praise!).</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739"><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Address: 1784 Coles Bay Rd, Coles Bay TAS 7215</span></em></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="735"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/freycinet-marine-farm/" rel="noopener" target="_blank"><span data-dcnode-id="737" instrument_node="">Click here to read my full review.</span></a></p><span data-dcnode-id="734" instrument_node="">
</span><h3 data-dcnode-id="731"><span data-dcnode-id="732" id="Day_5_Exploring_Port_Arthur_And_Eaglehawk_Neck"><span data-dcnode-id="733" instrument_node="">Day 5: Exploring Port Arthur And Eaglehawk Neck</span></span></h3><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><i data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Total driving time: 1 hour and 20 minutes&nbsp;</span></i></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Your final day in Tasmania will be spent exploring the Port Arthur Historic Site, seeing some of the geological wonders at Eaglehawk Neck and then making your way back to Hobart Airport for your flight.</span></p><span data-dcnode-id="723" instrument_node="">
</span><ul data-dcnode-id="714"><li aria-level="1" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Explore the Port Arthur Historic Site with a walking tour then take a cruise on the waterfront (included in the entry price)</span></li><li aria-level="1" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Continue on the Eaglehawk Neck and see the funny names at Doo Town</span></li><li aria-level="1" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Stop at the Blow Hole and then walk on the Tessellated Pavement</span></li><li aria-level="1" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Head to Hobart Airport for your flight departing Hobart! (approx 55 minute drive to Hobart Airport from Eaglehawk Neck)</span></li></ul><span data-dcnode-id="713" instrument_node="">
</span><h4 data-dcnode-id="710"><span data-dcnode-id="711" id="Port_Arthur_Historic_Site"><span data-dcnode-id="712" instrument_node="">Port Arthur Historic Site</span></span></h4><span data-dcnode-id="709" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26122" data-dcnode-id="704"><figure class="aligncenter" data-dcnode-id="705"><img alt="Port Arthur Historic Site" class="wp-image-26122" data-dcnode-id="708" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/Port-Arthur-Historic-Site-1-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Port Arthur Historic Site</span></figcaption></figure></div><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">As previously stated Tasmanian’s embrace their convict history and in all of Tasmania there’s no better place to connect with this history than Port Arthur Historic Site.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">This UNESCO listed site is famous for being one of the most brutal gaols in the colony. Now, however, this is a huge expansive museum with many buildings intact, some in ruins and some undergoing restoration.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">You enter Port Arthur Historic Site via the visitors centre and your entry price includes a walking tour and harbour cruise. I highly recommend you pre-book so that you can select your preferred times for these.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Walking tours take 40 minutes. A large group then follows an interesting guide who takes you around the site and explains some of the history. Our tour didn’t enter into any buildings but after the tour we were free to explore. There’s a lot to see with the old gaol and holding cells, gardens and orchards, old houses, historical relics and much more.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">After you’ve explored the site you can take your included cruise from the waterfront. This is a 25 minute guided harbour cruise which sails past Isle of the Dead (Port Arthur’s burial spot). You can visit this island for an extra fee if this interests you.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Finish your visit with a stop at the restaurant and gift shop.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">By night, the scene changes and Port Arthur Historic Site hosts the extremely popular </span><a class="thirstylink" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/port-arthur-ghost-tour/" rel="nofollow noopener" target="_blank" title="Port Arthur Ghost Tour"><span data-dcnode-id="683" instrument_node="">Port Arthur Ghost Tour</span></a><span data-dcnode-id="681" instrument_node="">. There’s been a lot of reported paranormal events over the years, and as this was the site of much misery and brutality, some of these stories are chilling to hear.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">These entertaining tours guide you through the site at night over a 90 minute period and cover some of these paranormal events that have occurred over the years. Expect to see some activity and to judge for yourself!</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="673"><a class="thirstylink" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/loves/port-arthur-ghost-tour/" rel="nofollow noopener" target="_blank" title="Port Arthur Ghost Tour"><span data-dcnode-id="675" instrument_node="">Click here to book your entry pass now.</span></a></p><span data-dcnode-id="672" instrument_node="">
</span><h4 data-dcnode-id="669"><span data-dcnode-id="670" id="Doo_Town"><span data-dcnode-id="671" instrument_node="">Doo Town</span></span></h4><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="665"><i data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Driving time to Eaglehawk Neck from Port Arthur: Approximately 15 minutes</span></i></p><span data-dcnode-id="664" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26123" data-dcnode-id="659"><figure class="aligncenter" data-dcnode-id="660"><img alt="Doo Town" class="wp-image-26123" data-dcnode-id="663" height="563" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town-300x225.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town-768x576.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town-610x458.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town-510x382.jpg 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/Doo-Town-480x360.jpg 480w" width="750"><figcaption data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">One of the signs in Doo Town</span></figcaption></figure></div><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">For a bit of lighthearted entertainment after visiting Port Arthur, stop at Doo Town in Eaglehawk Neck.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Why is it named “Doo Town”? Because the majority of the buildings here are named in some way using the word Doo! Most of the residents are in on the fun, and you’ll find some funny places like the appropriately named Doo-Lishus cafe.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Not only is the town positioned in a pretty spot near the water, but a drive through is entertaining with all the funny names. It seems to get funnier the more names you see 🙂</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><i data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Address: 301 C338, Eaglehawk Neck, TAS 7179</span></i></p><span data-dcnode-id="645" instrument_node="">
</span><h4 data-dcnode-id="642"><span data-dcnode-id="643" id="Blow_Hole_And_Tessellated_Pavement"><span data-dcnode-id="644" instrument_node="">Blow Hole And Tessellated Pavement</span></span></h4><span data-dcnode-id="641" instrument_node="">
</span><div class="wp-block-image size-full wp-image-26124" data-dcnode-id="636"><figure class="aligncenter" data-dcnode-id="637"><img alt="Blow hole, Eaglehawk Neck, Tasmania" class="wp-image-26124" data-dcnode-id="640" height="422" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania.jpg&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania.jpg 750w, https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania-300x169.jpg 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania-800x450.jpg 800w, https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania-768x432.jpg 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania-610x343.jpg 610w, https://tasmaniaexplorer.com.au/wp-content/uploads/Blow-hole-at-Eaglehawk-Neck-Tasmania-480x270.jpg 480w" width="750"><figcaption data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Blow hole at Eaglehawk Neck</span></figcaption></figure></div><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Exploring more of Eaglehawk Neck, you’ll find the Blow Hole. This is just one of the couple of unique sites here where water spouts through an eroded cave to create a blow hole effect.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The blow hole is only a short 5 minute walk from the carpark and you can plan to spend around 15 minutes here. While the effect is only present at times of high tide, the view from above is very pretty and worth a visit any time of day.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Your final spot to visit in Eaglehawk Neck is the Tessellated Pavement – one of the most photographed spots in Tasmania!</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">You would be forgiven for thinking the tessellated pavement is manmade. The tiled rocks seem almost too perfect to be a natural phenomenon. You’ll find an information board above where this interesting geological process is explained.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">You can walk right over the pavement and see tiny rock pools and interesting marine life, as well as continue walking to the beach in the distance. I recommend warm clothes and appropriate walking footwear.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">This is the perfect way to end your Tasmania trip before heading off.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="614"><span data-dcnode-id="615" id="4_Days_In_Tasmania_Itinerary_8211_From_Hobart"><span data-dcnode-id="616" instrument_node="">4 Days In Tasmania Itinerary – From Hobart</span></span></h2><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">With one less day, I recommend removing Port Arthur so you’ll finish your itinerary after hiking to Wineglass Bay and return to Hobart then.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h3 data-dcnode-id="607"><span data-dcnode-id="608" id="Overview-4"><span data-dcnode-id="609" instrument_node="">Overview</span></span></h3><span data-dcnode-id="606" instrument_node="">
</span><ol data-dcnode-id="599"><li aria-level="1" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Days 1-2 discover Hobart</span></li><li aria-level="1" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Day 3 drive to Coles Bay with a stop at Maria Island on the way</span></li><li aria-level="1" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Day 4 walk to Wineglass Bay in the morning before driving back to Hobart to finish your Tasmania itinerary 4 days</span></li></ol><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Read the above for all the details of this 4 day itinerary Tasmania.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="592"><span data-dcnode-id="593" id="Tasmania_5_Day_Tour_8211_From_Hobart_Without_A_Car"><span data-dcnode-id="594" instrument_node="">Tasmania 5 Day Tour – From Hobart Without A Car</span></span></h2><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">This five day itinerary is all about getting a great taste of southern Tasmania without needing your own wheels. It focuses on Hobart, Port Arthur and Bruny Island – all great places to explore!</span></p><span data-dcnode-id="588" instrument_node="">
</span><h3 data-dcnode-id="585"><span data-dcnode-id="586" id="Overview-5"><span data-dcnode-id="587" instrument_node="">Overview</span></span></h3><span data-dcnode-id="584" instrument_node="">
</span><ol data-dcnode-id="575"><li aria-level="1" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Days 1-2 discover Hobart</span></li><li aria-level="1" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Day 3 take a bus to historic Richmond and explore</span></li><li aria-level="1" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Day 4 visit Bruny Island on a day tour</span></li><li aria-level="1" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Day 5 visit the Port Arthur Historic Site on a day tour</span></li></ol><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The highlights of this Tasmania 5 day itinerary are:</span></p><span data-dcnode-id="571" instrument_node="">
</span><ul data-dcnode-id="562"><li aria-level="1" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Exploring the best parts of Hobart and seeing it from the top of Mount Wellington</span></li><li aria-level="1" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Wandering through the historic nearby town of Richmond</span></li><li aria-level="1" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Enjoying both the rugged and refined parts of Bruny Island</span></li><li aria-level="1" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Stepping back in time with a visit to Port Arthur Historic Site</span></li></ul><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="558"><span data-dcnode-id="559" id="Map-3"><span data-dcnode-id="560" instrument_node="">Map</span></span></h3><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The following map shows you the route this 5 day itinerary takes.</span></p><span data-dcnode-id="554" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="548"><figure class="aligncenter" data-dcnode-id="549"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/viewer%3Fmid%3D1TfJoYrBrM22AORvuQ84_D0DhrJVEDSWo%26ll%3D-43.114487021168756%252C147.49639265000005%26z%3D10" rel="noopener" target="_blank"><img alt="Tasmania 5 Day Tour - From Hobart Without A Car" class="wp-image-28938" data-dcnode-id="553" height="599" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car.png&amp;raw" srcset="https://tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car.png 799w, https://tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car-300x225.png 300w, https://tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car-768x576.png 768w, https://tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car-510x382.png 510w, https://tasmaniaexplorer.com.au/wp-content/uploads/Tasmania-5-Day-Tour-From-Hobart-Without-A-Car-480x360.png 480w" width="799"></a><figcaption data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Click the Map to open in Google Maps. You can then access directions to each of the locations discussed in this article.</span></figcaption></figure></div><span data-dcnode-id="547" instrument_node="">
</span><h3 data-dcnode-id="544"><span data-dcnode-id="545" id="Day_1_Arriving_In_Hobart-2"><span data-dcnode-id="546" instrument_node="">Day 1: Arriving In Hobart</span></span></h3><span data-dcnode-id="543" instrument_node="">
