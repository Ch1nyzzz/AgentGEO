</span><div class="container pt-5" data-dcnode-id="649"><span data-dcnode-id="5548" instrument_node="">
</span><div class="row" data-dcnode-id="651"><span data-dcnode-id="5547" instrument_node="">
</span><div class="col-lg-9" data-dcnode-id="961"><span data-dcnode-id="5546" instrument_node="">
</span><div class="section-title" data-dcnode-id="5541"><span data-dcnode-id="5545" instrument_node="">
</span><h1 class="theme-color" data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">Two Day Itinerary for Flagstaff</span></h1><span data-dcnode-id="5542" instrument_node="">
</span></div><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5535"><span data-dcnode-id="5539" instrument_node="">With just two days to visit Flagstaff, you have just about the right amount of time to explore Flagstaff </span><em data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">and</span></em><span data-dcnode-id="5536" instrument_node=""> the national parks and monuments surrounding the area.</span></p><span data-dcnode-id="5534" instrument_node="">
</span><p data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">Ideally, visitors to Flagstaff should try to experience the destination, following this suggested itinerary, as a two-and-a-half day trip, with 2 overnight stays. Make the most of the trip by arriving in Flagstaff as early in the morning as possible (allow for driving time from Phoenix or where-ever your trip begins) to view the San Francisco Peaks bathed in morning, midday and late afternoon light during your visit. </span></p><span data-dcnode-id="5531" instrument_node="">
</span><p data-dcnode-id="5523"><span data-dcnode-id="5530" instrument_node="">As we recommended in our </span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/one-day-itinerary"><span data-dcnode-id="5529" instrument_node="">One Day Itinerary</span></a><span data-dcnode-id="5527" instrument_node="">, make the most of your time by combining two meals a day; enjoy one of many </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/top-5-brunch"><span data-dcnode-id="5526" instrument_node="">Flagstaff restaurants' brunch</span></a><span data-dcnode-id="5524" instrument_node=""> offerings to sustain your energy until dinnertime, or have a big early breakfast, then a midday, energy-boosting snack, and an early dinner. You'll still experience the best of Flagstaff's restaurant scene, but have more time to be out-and-about, trekking around northern Arizona.</span></p><span data-dcnode-id="5522" instrument_node="">
</span><p data-dcnode-id="5517"><span data-dcnode-id="5521" instrument_node="">
Here is a quick point-by-point "Greatest Hits" list of things to do in Flagstaff and northern Arizona in two (or two-and-a-half days.) If you follow our </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/one-day-itinerary"><span data-dcnode-id="5520" instrument_node="">One Day Itinerary</span></a><span data-dcnode-id="5518" instrument_node=""> for Day One, pay attention to the suggestions by season. On this itinerary, Days Two and Three are equally do-able in warm weather as cold; you'll probably just need to allow for slower driving conditions and appropriate layered clothing. </span></p><span data-dcnode-id="5516" instrument_node="">
</span><h3 data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">Day One</span></h3><span data-dcnode-id="5513" instrument_node="">
</span><ul data-dcnode-id="5505"><span data-dcnode-id="5512" instrument_node="">
</span><li data-dcnode-id="5507"><span data-dcnode-id="5511" instrument_node="">Follow our </span><a data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/one-day-itinerary"><span data-dcnode-id="5510" instrument_node="">One Day Itinerary</span></a><span data-dcnode-id="5508" instrument_node="">. It's a great way to kick off your trip and give you the best of Flagstaff itself.</span></li><span data-dcnode-id="5506" instrument_node="">
</span></ul><span data-dcnode-id="5504" instrument_node="">
</span><div class="divider mb-20" data-dcnode-id="5503"></div><span data-dcnode-id="5502" instrument_node="">
</span><h3 data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">Day Two</span></h3><span data-dcnode-id="5499" instrument_node="">
</span><ul data-dcnode-id="5439"><span data-dcnode-id="5498" instrument_node="">
</span><li data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">Grab a hearty, early breakfast early morning</span></li><span data-dcnode-id="5495" instrument_node="">
</span><ul data-dcnode-id="5481"><span data-dcnode-id="5494" instrument_node="">
</span><li data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">Mike &amp; Rhonda's The Place</span></li><span data-dcnode-id="5491" instrument_node="">
</span><li data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">Martannes</span></li><span data-dcnode-id="5488" instrument_node="">
</span><li data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">Brandy's</span></li><span data-dcnode-id="5485" instrument_node="">
</span><li data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">Cafe Daily Fare</span></li><span data-dcnode-id="5482" instrument_node="">
</span></ul><span data-dcnode-id="5480" instrument_node="">
</span><li data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">Head out to visit the area's national parks and monuments and plan to spend about 8 hours exploring and driving:</span></li><span data-dcnode-id="5477" instrument_node="">
</span><ul data-dcnode-id="5441"><span data-dcnode-id="5476" instrument_node="">
</span><li data-dcnode-id="5462"><span data-dcnode-id="5475" instrument_node="">Grand Canyon National Park - Spend at least 3 hours at the South Rim. Directions for the three possible routes to the Grand Canyon, each about 3 hours round trip, can be found </span><a data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/directions"><span data-dcnode-id="5474" instrument_node="">here</span></a><span data-dcnode-id="5472" instrument_node="">
</span><ul data-dcnode-id="5464"><span data-dcnode-id="5471" instrument_node="">
</span><li data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">If you go through Williams, visit Bearizona Wildlife Park on your way back to Flagstaff.</span></li><span data-dcnode-id="5468" instrument_node="">
</span><li data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">If you leave the park via Desert View Drive, returning through the East Entrance called Desert View, you can hit Wupatki National Monument and Sunset Crater on your way back via Highway 89.</span></li><span data-dcnode-id="5465" instrument_node="">
</span></ul><span data-dcnode-id="5463" instrument_node="">
</span></li><li data-dcnode-id="5458"><span data-dcnode-id="5461" instrument_node="">Walnut Canyon National Monument, Meteor Crater and Petrified Forest National Park - Heading east of Flagstaff along I-40, you can hit all three of these attractions. Directions can be found </span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flagstaff.com/day-trips"><span data-dcnode-id="5460" instrument_node="">here</span></a></li><span data-dcnode-id="5457" instrument_node="">
</span><ul data-dcnode-id="5446"><span data-dcnode-id="5456" instrument_node="">
</span><li data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">Walnut Canyon - Take 60-90 minutes to hike along the Rim or Island Trails to view ancient pueblos and cliff dwellings</span></li><span data-dcnode-id="5453" instrument_node="">
</span><li data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Meteor Crater - Spend an hour at this commercial attraction is the world's best preserved meteorite impact site, located near Winslow</span></li><span data-dcnode-id="5450" instrument_node="">
</span><li data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">Petrified Forest - Best known for globally significant Late Triassic fossils, the park is located near Holbrook and takes about 1 hour to see on a self-guided drive</span></li><span data-dcnode-id="5447" instrument_node="">
</span></ul><span data-dcnode-id="5445" instrument_node="">
</span><li data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Return to Flagstaff for an early dinner at one of our recommendations from Day One</span></li><span data-dcnode-id="5442" instrument_node="">
</span></ul><span data-dcnode-id="5440" instrument_node="">
</span></ul><span data-dcnode-id="5438" instrument_node="">
</span><div class="divider mb-20" data-dcnode-id="5437"></div><span data-dcnode-id="5436" instrument_node="">
</span><h3 data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">Day Three (Half Day)</span></h3><span data-dcnode-id="5433" instrument_node="">
</span><ul data-dcnode-id="5419"><span data-dcnode-id="5432" instrument_node="">
</span><li data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">Get up and at 'em early, and have a big breakfast at a new choice from one of our suggested spots above</span></li><span data-dcnode-id="5429" instrument_node="">
</span><li data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Visit one of the National Monuments or Parks that you did not select on Day Two. For a half day, it may make sense to stick close to Flagstaff, so Walnut Canyon and Sunset Crater are excellent options, OR…</span></li><span data-dcnode-id="5426" instrument_node="">
</span><li data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">Visit Arizona Snowbowl for a half-day of riding the scenic Sky Ride, playing disc golf, hiking or attending a ranger program in the spring/summer, or skiing and snowboarding in the winter, OR…</span></li><span data-dcnode-id="5423" instrument_node="">
</span><li data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">Visit the Flagstaff Nordic Center for a half-day of mountain bike rental and riding (self-guided or on a guided tour) in the spring/summer, or snow biking, snowshoeing, and ski lessons in winter, or Wing Mountain for tubing and sledding in the winter</span></li><span data-dcnode-id="5420" instrument_node="">
</span></ul><span data-dcnode-id="5418" instrument_node="">
</span><div data-dcnode-id="5401"><span data-dcnode-id="5417" instrument_node="">

</span><div class="mb-0 text-sm text-muted collapse" data-dcnode-id="3946" id="description379"><span data-dcnode-id="3947" instrument_node="">Welcome to Bearizona Wildlife Park. We are a Wildlife adventure, open year round.Located on 160 acres in the city of Williams Az. We are right off Route 66 on the way to the Grand Canyon, just a short drive from Sedona and Flagstaff. The park consists of a 3 mile drive thru and Fort Bearizona. In the drive thru, you will take your own vehicle or our Wild Ride Bus through pristine Natural habitats for many North American Species. In these free roaming areas You will see wolves, bears, bison, and many other large species that can come right up to your car. Where the drive thru ends Fort Bearizona begins.  Park your car and come on in. This is where you will find our smaller animals like river otters and bobcats. The barnyard, which is our petting zoo and fun for all ages.  The Raptor Free Flight program, where birds of prey fly right over your head. All Shows which include animal meet-n-greets and training presentations. Big Bear Gift shop, over 8,000 sq feet of treasures and also housing Arizonaâ€™s largest model train, a historically accurate replica of the railroad from Williams depot to the grand canyon. For dining options we have the Bearizona Grill for a quick snack or our themed Canyonlands restaurant where you can sit and have a hot meal and a cold beverage overlooking our remarkable jaguar enclosure. You can Hop on our website for all current show times and we hope you can come visit us soon.  Not only will you learn about lots of Awesome North American animals but you will also have an amazing time while your doing it. </span></div><span data-dcnode-id="3945" instrument_node="">
