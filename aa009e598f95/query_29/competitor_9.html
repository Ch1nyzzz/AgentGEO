</span><h2 data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Overview</span></h2><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Ecuador packs more biodiversity into a small area than anywhere else on Earth. Roughly the size of Great Britain, it’s possible to drive across the country in one day — from tropical Pacific beaches up through cloud forest to Andean peaks and down again to the edge of the Amazon jungle. Of course, that would be one very long day, so it’s best to spread it out over a few weeks, but you can see a lot of Ecuador on a ten-day tour.</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2990"><span data-dcnode-id="2994" instrument_node="">The </span><strong data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">highlands</span></strong><span data-dcnode-id="2991" instrument_node=""> are the most visited region with a wealth of natural and cultural attractions — the colonial centers of Quito and Cuenca, the line of the Equator, Otavalo’s indigenous market, the Valley of the Volcanoes, shimmering lakes, thermal springs and dramatic train rides.</span></p><span data-dcnode-id="2989" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2988" instrument_node="">The </span><strong data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">cloud forest</span></strong><span data-dcnode-id="2985" instrument_node=""> and </span><strong data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">jungle</span></strong><span data-dcnode-id="2982" instrument_node=""> are treasure troves for bird-watchers and nature-lovers, and you can choose from one-day tours to secondary jungle or spend 4 or 5 days going deeper into the primary rainforest.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2972"><span data-dcnode-id="2979" instrument_node="">The </span><strong data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Pacific coast</span></strong><span data-dcnode-id="2976" instrument_node=""> boasts some of the best surfing in South America as well as beaches, mangroves, and delicious seafood, while the </span><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Galapagos</span></strong><span data-dcnode-id="2973" instrument_node=""> is one of the world’s best destinations for wildlife watching and a truly once-in-a-lifetime experience.</span></p><span data-dcnode-id="2971" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">The south of Ecuador is the road-less-traveled but has some stunning attractions and lush scenery: Inca ruins, hilltop towns, petrified forest, and mangroves teeming with birdlife.</span></p><span data-dcnode-id="2968" instrument_node="">

width:360px;"><span data-dcnode-id="2899" instrument_node="">Hiking in Lake Quilotoa</span></td><td data-dcnode-id="2895" style="width:192.359375px;"><span data-dcnode-id="2896" instrument_node="">Latacunga</span></td></tr><tr data-dcnode-id="2881"><td data-dcnode-id="2889" style="width:86px;"><span data-dcnode-id="2890" instrument_node="">Day 5</span></td><td data-dcnode-id="2886" style="width:360px;"><span data-dcnode-id="2887" instrument_node="">Hiking in Cotopaxi National Park</span></td><td data-dcnode-id="2883" style="width:192.359375px;"><span data-dcnode-id="2884" instrument_node="">Cotopaxi</span></td></tr><tr data-dcnode-id="2869"><td data-dcnode-id="2877" style="width:86px;"><span data-dcnode-id="2878" instrument_node="">Day 6</span></td><td data-dcnode-id="2874" style="width:360px;"><span data-dcnode-id="2875" instrument_node="">Climb Cotopaxi volcano</span></td><td data-dcnode-id="2871" style="width:192.359375px;"><span data-dcnode-id="2872" instrument_node="">Baños</span></td></tr><tr data-dcnode-id="2857"><td data-dcnode-id="2865" style="width:86px;"><span data-dcnode-id="2866" instrument_node="">Day 7</span></td><td data-dcnode-id="2862" style="width:360px;"><span data-dcnode-id="2863" instrument_node="">Waterfall tour and thermal baths in Baños&nbsp;</span></td><td data-dcnode-id="2859" style="width:192.359375px;"><span data-dcnode-id="2860" instrument_node="">Baños</span></td></tr><tr data-dcnode-id="2845"><td data-dcnode-id="2853" style="width:86px;"><span data-dcnode-id="2854" instrument_node="">Day 8</span></td><td data-dcnode-id="2850" style="width:360px;"><span data-dcnode-id="2851" instrument_node="">Riobamba and Devil’s Nose Train Ride&nbsp;</span></td><td data-dcnode-id="2847" style="width:192.359375px;"><span data-dcnode-id="2848" instrument_node="">Alausí</span></td></tr><tr data-dcnode-id="2833"><td data-dcnode-id="2841" style="width:86px;"><span data-dcnode-id="2842" instrument_node="">Day 9</span></td><td data-dcnode-id="2838" style="width:360px;"><span data-dcnode-id="2839" instrument_node="">Cuenca city tour</span></td><td data-dcnode-id="2835" style="width:192.359375px;"><span data-dcnode-id="2836" instrument_node="">Cuenca</span></td></tr><tr data-dcnode-id="2821"><td data-dcnode-id="2829" style="width:86px;"><span data-dcnode-id="2830" instrument_node="">Day 10</span></td><td data-dcnode-id="2826" style="width:360px;"><span data-dcnode-id="2827" instrument_node="">Return to Quito</span></td><td data-dcnode-id="2823" style="width:192.359375px;"><span data-dcnode-id="2824" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2809"><td data-dcnode-id="2817" style="width:86px;"><span data-dcnode-id="2818" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2814" style="width:360px;"><span data-dcnode-id="2815" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2811" style="width:192.359375px;"><span data-dcnode-id="2812" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2803" instrument_node="">At an altitude of between 2000 and 3000 meters, you’ll need to pace yourself in the Ecuadorian highlands. Begin in the colonial center of capital </span><strong data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Quito</span></strong><span data-dcnode-id="2800" instrument_node=""> with its array of Spanish architecture and art. Take a bus half an hour north to the Equator at </span><strong data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Mitad del Mundo</span></strong><span data-dcnode-id="2797" instrument_node="">. Then take a day trip two hours by bus to the northern highland town of </span><strong data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Otavalo</span></strong><span data-dcnode-id="2794" instrument_node="">, which hosts one of the biggest indigenous markets in South America.</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2791" instrument_node="">Next, take a bus three hours south of Quito through the </span><strong data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Valley of the Volcanoes</span></strong><span data-dcnode-id="2788" instrument_node=""> to explore the spectacular </span><strong data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Lake Quilotoa</span></strong><span data-dcnode-id="2785" instrument_node="">. Next, hike around the volcano </span><strong data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Cotopaxi, </span></strong><span data-dcnode-id="2782" instrument_node="">marveling at its&nbsp;5,897-meter summit. Fit hikers can attempt to reach the peak with help from a local tour operator (you need to spend the night halfway up at the Refuge cabin and depart around 1 am for the summit).</span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">After your visit to Cotopaxi, take a bus three hours south to relax in the thermal baths of </span><strong data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Baños</span></strong><span data-dcnode-id="2776" instrument_node="">, and explore nearby waterfalls before experiencing Ecuador’s most dramatic train ride.</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2773" instrument_node="">Travel two hours south-west to </span><strong data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Riobamba</span></strong><span data-dcnode-id="2770" instrument_node=""> and take the train south to the famous </span><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Nariz del Diablo</span></strong><span data-dcnode-id="2767" instrument_node=""> (Devil’s Nose), a series of switchbacks carved into the mountainside. Stay in </span><strong data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Alausí</span></strong><span data-dcnode-id="2764" instrument_node="">, then take a bus two hours south to the charming colonial city of </span><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Cuenca</span></strong><span data-dcnode-id="2761" instrument_node=""> before flying back to Quito. &nbsp;</span></p><span data-dcnode-id="2759" instrument_node="">

ght:19px;"><span data-dcnode-id="2699" instrument_node="">Latacunga</span></td></tr><tr data-dcnode-id="2684" style="height:19px;"><td data-dcnode-id="2692" style="width:97.203125px;height:19px;"><span data-dcnode-id="2693" instrument_node="">Day 4</span></td><td data-dcnode-id="2689" style="width:398.21875px;height:19px;"><span data-dcnode-id="2690" instrument_node="">Waterfall tour and thermal baths in Baños</span></td><td data-dcnode-id="2686" style="width:178.59375px;height:19px;"><span data-dcnode-id="2687" instrument_node="">Baños</span></td></tr><tr data-dcnode-id="2672" style="height:20px;"><td data-dcnode-id="2680" style="width:97.203125px;height:20px;"><span data-dcnode-id="2681" instrument_node="">Day 5</span></td><td data-dcnode-id="2677" style="width:398.21875px;height:20px;"><span data-dcnode-id="2678" instrument_node="">Day trip to the jungle via Puyo, return to Quito</span></td><td data-dcnode-id="2674" style="width:178.59375px;height:20px;"><span data-dcnode-id="2675" instrument_node="">Quito</span></td></tr><tr data-dcnode-id="2660" style="height:19px;"><td data-dcnode-id="2668" style="width:97.203125px;height:19px;"><span data-dcnode-id="2669" instrument_node="">Day 6</span></td><td data-dcnode-id="2665" style="width:398.21875px;height:19px;"><span data-dcnode-id="2666" instrument_node="">Fly to Santa Cruz in the Galapagos Islands&nbsp;</span></td><td data-dcnode-id="2662" style="width:178.59375px;height:19px;"><span data-dcnode-id="2663" instrument_node="">Galapagos</span></td></tr><tr data-dcnode-id="2648" style="height:18px;"><td data-dcnode-id="2656" style="width:97.203125px;height:18px;"><span data-dcnode-id="2657" instrument_node="">Days 7-9</span></td><td data-dcnode-id="2653" style="width:398.21875px;height:18px;"><span data-dcnode-id="2654" instrument_node="">Galapagos tour</span></td><td data-dcnode-id="2650" style="width:178.59375px;height:18px;"><span data-dcnode-id="2651" instrument_node="">Galapagos</span></td></tr><tr data-dcnode-id="2636" style="height:1px;"><td data-dcnode-id="2644" style="width:97.203125px;height:1px;"><span data-dcnode-id="2645" instrument_node="">Day 10</span></td><td data-dcnode-id="2641" style="width:398.21875px;height:1px;"><span data-dcnode-id="2642" instrument_node="">Fly back to Quito</span></td><td data-dcnode-id="2638" style="width:178.59375px;height:1px;"><span data-dcnode-id="2639" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2624" style="height:4.296875px;"><td data-dcnode-id="2632" style="width:97.203125px;height:4.296875px;"><span data-dcnode-id="2633" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2629" style="width:398.21875px;height:4.296875px;"><span data-dcnode-id="2630" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2626" style="width:178.59375px;height:4.296875px;"><span data-dcnode-id="2627" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Situated 600 miles off the coast of Ecuador, the Galapagos Islands are an unforgettable and unique destination. If you want to make the trip then you will need to pack highlights of mainland Ecuador in a few days.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2615" instrument_node="">See the sights of </span><strong data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Quito</span></strong><span data-dcnode-id="2612" instrument_node="">’s Old Town as well as the Equator at </span><strong data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Mitad del Mundo</span></strong><span data-dcnode-id="2609" instrument_node="">, a half-hour bus ride north of the city. Then take a day trip (two hours by bus) to the indigenous market at </span><strong data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Otavalo</span></strong><span data-dcnode-id="2606" instrument_node=""> before heading south (two hours of Quito by bus) to explore the national park around spectacular volcano </span><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Cotopaxi</span></strong><span data-dcnode-id="2603" instrument_node="">.&nbsp;Take a bus three hours south to relax in the thermal baths of </span><strong data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Baños</span></strong><span data-dcnode-id="2600" instrument_node="">, then take a day trip through the cloud forest to secondary jungle via </span><strong data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Puyo</span></strong><span data-dcnode-id="2597" instrument_node="">. Return to Quito (four hours by bus) to fly to the </span><strong data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Galapagos Islands</span></strong><span data-dcnode-id="2594" instrument_node=""> (2.5 hours).</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Choose either a cruise or a land-based tour, and spend five days experiencing the wildlife and geological wonders of this archipelago – snorkeling with sea lions and penguins, hiking on lava trails past giant tortoises and iguanas, and watching the incredible birdlife.</span></p><span data-dcnode-id="2589" instrument_node="">

ta-dcnode-id="2520" instrument_node="">Otavalo, visit Lake Cuicocha</span></td><td data-dcnode-id="2516" style="width:218.125px;"><span data-dcnode-id="2517" instrument_node="">Otavalo</span></td></tr><tr data-dcnode-id="2502"><td data-dcnode-id="2510" style="width:89px;"><span data-dcnode-id="2511" instrument_node="">Day 5</span></td><td data-dcnode-id="2507" style="width:353px;"><span data-dcnode-id="2508" instrument_node="">Mojanda Lakes and return to Quito</span></td><td data-dcnode-id="2504" style="width:218.125px;"><span data-dcnode-id="2505" instrument_node="">Quito</span></td></tr><tr data-dcnode-id="2490"><td data-dcnode-id="2498" style="width:89px;"><span data-dcnode-id="2499" instrument_node="">Day 6</span></td><td data-dcnode-id="2495" style="width:353px;"><span data-dcnode-id="2496" instrument_node="">Fly to Coca for jungle tour</span></td><td data-dcnode-id="2492" style="width:218.125px;"><span data-dcnode-id="2493" instrument_node="">Jungle lodge</span></td></tr><tr data-dcnode-id="2478"><td data-dcnode-id="2486" style="width:89px;"><span data-dcnode-id="2487" instrument_node="">Days 7-9</span></td><td data-dcnode-id="2483" style="width:353px;"><span data-dcnode-id="2484" instrument_node="">Jungle tour</span></td><td data-dcnode-id="2480" style="width:218.125px;"><span data-dcnode-id="2481" instrument_node="">Jungle lodge</span></td></tr><tr data-dcnode-id="2466"><td data-dcnode-id="2474" style="width:89px;"><span data-dcnode-id="2475" instrument_node="">Day 10</span></td><td data-dcnode-id="2471" style="width:353px;"><span data-dcnode-id="2472" instrument_node="">Return to Quito</span></td><td data-dcnode-id="2468" style="width:218.125px;"><span data-dcnode-id="2469" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2454"><td data-dcnode-id="2462" style="width:89px;"><span data-dcnode-id="2463" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2459" style="width:353px;"><span data-dcnode-id="2460" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2456" style="width:218.125px;"><span data-dcnode-id="2457" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2448" instrument_node="">Rivaling the Galapagos for providing incredible wildlife experiences is the jungle, within easy reach of the highlands. After taking in the highlights of capital city </span><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Quito</span></strong><span data-dcnode-id="2445" instrument_node="">, head two hours north-west by bus to the cloud forest around </span><strong data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Mindo</span></strong><span data-dcnode-id="2442" instrument_node=""> for hiking, birdwatching and zip-lining across the forest canopy.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2439" instrument_node="">Then head further north to explore the dramatic volcanic scenery around Otavalo at </span><strong data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Lake Cuicocha</span></strong><span data-dcnode-id="2436" instrument_node=""> and </span><strong data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Mojanda</span></strong><span data-dcnode-id="2433" instrument_node="">. Get the bus back to Quito (two hours) and fly to the jungle entry town of </span><strong data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Coca</span></strong><span data-dcnode-id="2430" instrument_node=""> (30 minutes by air or nine hours by bus). Take a boat one hour downriver to reach swathes of primary jungle. Stay at a jungle lodge for four or five days, exploring amazing scenery and wildlife around </span><strong data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Yasuní National Park</span></strong><span data-dcnode-id="2427" instrument_node=""> – parrot clay licks, toucans, howler monkeys, white caiman and piranhas to name but a few highlights. &nbsp;</span></p><span data-dcnode-id="2425" instrument_node="">

a-dcnode-id="2295" style="width:377.90625px;"><span data-dcnode-id="2296" instrument_node="">Atacames</span></td><td data-dcnode-id="2292" style="width:237px;"><span data-dcnode-id="2293" instrument_node="">Atacames</span></td></tr><tr data-dcnode-id="2278"><td data-dcnode-id="2286" style="width:89.09375px;"><span data-dcnode-id="2287" instrument_node="">Day 10</span></td><td data-dcnode-id="2283" style="width:377.90625px;"><span data-dcnode-id="2284" instrument_node="">Return to Guayaquil or Quito</span></td><td data-dcnode-id="2280" style="width:237px;"><span data-dcnode-id="2281" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2266"><td data-dcnode-id="2274" style="width:89.09375px;"><span data-dcnode-id="2275" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2271" style="width:377.90625px;"><span data-dcnode-id="2272" instrument_node="">&nbsp;</span></td><td data-dcnode-id="2268" style="width:237px;"><span data-dcnode-id="2269" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Ecuador’s coast is less visited by foreign tourists and while it may not be quite as spectacular as the Caribbean, it has some fantastic beaches, surf spots, wildlife watching, and seafood.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2257" instrument_node="">Begin in </span><strong data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Guayaquil</span></strong><span data-dcnode-id="2254" instrument_node="">, Ecuador’s largest city, exploring the riverfront Malecon and artistic district Las Peñas. Then take a bus north (three hours) to party and surf town </span><strong data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Montañita</span></strong><span data-dcnode-id="2251" instrument_node="">.</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2241"><span data-dcnode-id="2248" instrument_node="">One hour further north by bus is the stunning forest scenery of </span><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Machalilla National Park</span></strong><span data-dcnode-id="2245" instrument_node="">. Relax on the protected beach of Las Frailes, explore the hills and take a day trip to</span><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node=""> Isla de la Plata</span></strong><span data-dcnode-id="2242" instrument_node="">. Here you can see blue-footed boobies and frigate birds, particularly good if you’re not visiting the Galapagos.</span></p><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2239" instrument_node="">Take a bus five hours north to </span><strong data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Bahía de Caráquez</span></strong><span data-dcnode-id="2236" instrument_node="">, arguably Ecuador’s most beautiful coastal city. Take a trip to the mangroves to observe the bird life, stay in nearby surfing mecca </span><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Canoa</span></strong><span data-dcnode-id="2233" instrument_node=""> and visit </span><strong data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Rio Muchacho Organic Farm</span></strong><span data-dcnode-id="2230" instrument_node="">. Four hours further north is another great surfing spot at </span><strong data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Mompiche</span></strong><span data-dcnode-id="2227" instrument_node="">, with a more spectacular tropical backdrop. Two hours further north is the party town of </span><strong data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Atacames</span></strong><span data-dcnode-id="2224" instrument_node="">, a great place to dance and gorge on delicious seafood.&nbsp;</span></p><span data-dcnode-id="2222" instrument_node="">

</span><p data-dcnode-id="2038"><span data-dcnode-id="2051" instrument_node="">Southern Ecuador is less visited but has plenty to keep you occupied. Begin in </span><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Cuenca</span></strong><span data-dcnode-id="2048" instrument_node=""> with a tour of the historic city, before taking a day trip to Ecuador’s best Inca ruins at </span><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Ingapirca</span></strong><span data-dcnode-id="2045" instrument_node="">. Take the bus four hours south to </span><strong data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Loja</span></strong><span data-dcnode-id="2042" instrument_node=""> and the nearby hippy enclave of </span><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Vilcabamba</span></strong><span data-dcnode-id="2039" instrument_node="">. Relax in the ideal climate and explore the surrounding hills.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2036" instrument_node="">On Day 5, Take a day trip to the cloud forests of </span><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Podocarpus National Park</span></strong><span data-dcnode-id="2033" instrument_node=""> close to town. Head west (four hours by bus) to get further off the beaten track in the dramatic hilltop town of </span><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Zaruma</span></strong><span data-dcnode-id="2030" instrument_node="">, where you can sample some of the best coffee on the continent. Explore the largest petrified forest in South America at </span><strong data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Puyango</span></strong><span data-dcnode-id="2027" instrument_node="">, about three hours by road from Zaruma, before heading for </span><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Machala</span></strong><span data-dcnode-id="2024" instrument_node="">, self-styled ‘banana capital of the world’.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2021" instrument_node="">On Day 8, stop off for hiking and birdwatching in the mangroves of </span><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Churute</span></strong><span data-dcnode-id="2018" instrument_node=""> en route to </span><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Guayaquil</span></strong><span data-dcnode-id="2015" instrument_node="">, Ecuador’s largest city. Take a tour of the riverfront and historic highlights before hitting the bars and discos in the evening.&nbsp;</span></p><h2 data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">More Great 10-Day Ecuador Itineraries</span></h2><span data-dcnode-id="2011" instrument_node="">
