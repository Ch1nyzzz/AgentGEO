h:103px;"><span data-dcnode-id="2831" instrument_node="">Cusco</span></td></tr><tr data-dcnode-id="2816"><td data-dcnode-id="2824" style="width:57px;"><span data-dcnode-id="2825" instrument_node="">Day 5</span></td><td data-dcnode-id="2821" style="width:393px;"><span data-dcnode-id="2822" instrument_node="">Departing Cusco</span></td><td data-dcnode-id="2818" style="width:103px;"><span data-dcnode-id="2819" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2808"><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">Kick off the trip in the capital city of Lima, going for a walk along the clifftop promenade in Miraflores and sitting down for a traditional Peruvian meal in one of the neighborhood’s many restaurants. The next morning, fly to Cusco. Drink some coca tea—it helps with the altitude change—before walking around the ancient city, visiting the Coricancha (known as "The Temple of the Sun”), the impressive Puca Pucara ruins, and the colorful Mercado Central de San Pedro marketplace.&nbsp;</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2806" instrument_node="">The next day, you’ll explore the Sacred Valley. Stops along the day’s trip include Pisac, with its ruins and textile market, and Moray, known for its amphitheater-like terraces made by the Incas. Spend the evening in Ollantaytambo, home to some of the region’s best-preserved Inca architecture. On day four, take the train to Aguas Calientes and transfer to Machu Picchu. This 15th-century Inca citadel, a sanctuary and retreat for the Incan Emperor Pachacutec and his court, is one of the new Seven Wonders of the World. After several hours of travel by train and car, you’ll have one last evening in Cusco for pisco sours and Peruvian-style nightlife. </span><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/sacred-valley-highlights-5-days"><strong data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Learn more</span></strong></a></p><span data-dcnode-id="2801" instrument_node="">
</span><h2 data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Itinerary #2: Machu Picchu &amp; Short Inca Trail</span></h2><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node="">On this</span><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/machu-picchu-short-inca-trail-5-days"><span data-dcnode-id="2796" instrument_node=""> quick adventure in the Sacred Valley</span></a><span data-dcnode-id="2794" instrument_node="">, you’ll hike on the Inca Trail and explore the spectacular ancient ruins of Machu Picchu.</span></p><span data-dcnode-id="2792" instrument_node="">
</span><figure class="image" data-dcnode-id="2785"><a data-dcnode-id="2790" data-lightbox="article" data-title="Inca ruins of Winay Wayna along the Inca Trail to Machu Picchu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/67924f50d536eff941b32bdd8bed22134433cc67/big-8f346ec9c54c322763666368df13e80e.jpg"><img alt="Machu Picchu, the highlight of any trip to the Sacred Valley, veiled in cloud" data-dcnode-id="2791" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/67924f50d536eff941b32bdd8bed22134433cc67/big-8f346ec9c54c322763666368df13e80e.jpg&amp;raw"></a><span data-dcnode-id="2789" instrument_node="">

span data-dcnode-id="2714" instrument_node="">Departing Cusco</span></td><td data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2700"><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">The trip begins in Lima. Explore the historic center, a UNESCO World Heritage Site, stopping into the 16th-century Spanish-designed cathedral, which took 80 years to build. Stroll around the coastal neighborhood of Miraflores at night and enjoy ocean views from Love Park. On day two, you’ll head to Cusco and begin your tour of the Sacred Valley. One stop along the journey is Pisac, one of the region’s most important archaeological sites, known for its ancient Inca burial grounds and irrigation systems. Stop in the town’s busy textile market to shop for souvenirs, then overnight in the Incan city of Ollantaytambo.&nbsp;</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">On day three, hike along the Inca Trail towards Machu Picchu. Highlights along the way include the archaeological site of Chachabamba and the ruins of Wiñay Wayna. Take a break when you arrive at Aguas Calientes, the gateway to Machu Picchu, where you can try traditional Peruvian food like ceviche and sample pisco sours made with a wide range of native fruits.</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2695" instrument_node="">On day four, get an early start to see high-altitude Machu Picchu without a crowd. You’ll go on a guided tour of the site, then head back to Aguas Calientes and catch a train to Ollantaytambo. You’ll drive to Cusco, where you’ll have time for one last Peruvian meal before taking a flight out the next day. </span><strong data-dcnode-id="2692"><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/machu-picchu-short-inca-trail-5-days"><span data-dcnode-id="2694" instrument_node="">Learn more</span></a></strong></p><span data-dcnode-id="2690" instrument_node="">
</span><h2 data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Itinerary #3: Experience the Peruvian Amazon</span></h2><span data-dcnode-id="2687" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2686" instrument_node="">Experience the natural wonders of the Peruvian Amazon with a </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/experience-the-peruvian-amazon"><span data-dcnode-id="2685" instrument_node="">five-day itinerary</span></a><span data-dcnode-id="2683" instrument_node=""> that includes a boat tour and a visit to the Tambopata Research Center to see red howler monkeys, anacondas, and the endangered giant river otter.</span></p><span data-dcnode-id="2681" instrument_node="">
</span><figure class="image" data-dcnode-id="2674"><a data-dcnode-id="2679" data-lightbox="article" data-title="Macaws feed at a clay lick in Parque Nacional Manu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/703e7c31d32ada701bc0a6a757862c567110d58c/big-501c640d525189c6f78a1ae3ad9a036f.jpg"><img alt="Macaws feed at one of the most bird-rich clay licks in Peru on the Madre de Dios river, Parque Nacional Manu" data-dcnode-id="2680" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/703e7c31d32ada701bc0a6a757862c567110d58c/big-501c640d525189c6f78a1ae3ad9a036f.jpg&amp;raw"></a><span data-dcnode-id="2678" instrument_node="">

">Fly from Puerto Maldonado back to Lima, Depart from Peru</span></td><td data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2589"><br data-dcnode-id="2591"><span data-dcnode-id="2590" instrument_node="">Arrive in Lima and spend an evening getting oriented in Peru’s capital city. The next day, you’ll head straight into the Amazon, catching an early flight to Puerto Maldonado and check into the&nbsp; Inkaterra Reserva Amazonica lodge, your home base for the rest of the trip.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Choose from several afternoon excursions themed around bird-watching, boating, or getting to know the flora and fauna of the rainforest. Sleep in the jungle before the next day’s trip to Lake Sandoval in the Tambopata National Reserve. There, you’ll paddle through a mirror-like lake in a wooden canoe, spotting rare wildlife like endangered giant river otters, red howler monkeys, red-bellied macaws, anacondas, side-neck turtles and black caimans.&nbsp;</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2584" instrument_node="">You’ll have a range of day trips and excursions to choose from in the days that follow. Try the Inkaterra Canopy Walkway, which invites you to walk through the rainforest canopy on a suspension bridge, spotting colorful toucans, monkeys, and sloths along the way. Then take a trip to Gamitana Creek, a winding, dark water jungle stream that’s home to piranhas, turtles, and a wide range of birds. After dark, consider the two-hour Rainforest by Night excursion, where your guide will point out nocturnal forest sounds and jungle species that only come out at night. On day five, you’ll head back to civilization and catch a flight home.</span><strong data-dcnode-id="2581"><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/experience-the-peruvian-amazon"><span data-dcnode-id="2583" instrument_node=""> Learn more</span></a></strong></p><span data-dcnode-id="2579" instrument_node="">
</span><h2 data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Itinerary #4: From Lima to Nazca - Wildlife, History &amp; Gastronomy</span></h2><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2571"><span data-dcnode-id="2575" instrument_node="">On this </span><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/from-lima-to-nazca-wildlife-history-gastronomy-5-days"><span data-dcnode-id="2574" instrument_node="">diverse tour</span></a><span data-dcnode-id="2572" instrument_node="">, you’ll eat your way through Lima’s exciting culinary scene, see Humboldt Penguins on the Ballestas Islands, and view the Nazca Lines from the window of a plane.</span></p><span data-dcnode-id="2570" instrument_node="">
</span><figure class="image" data-dcnode-id="2563"><a data-dcnode-id="2568" data-lightbox="article" data-title="Nazca Lines from above" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/e26b7cf65cc960f14b1b133c6d51a31322e18a2a/big-3dac58e937e108616c29f7d977a39a8a.jpg"><img alt="The popular and spectacular Santa Cruz trek near Huaraz" data-dcnode-id="2569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/e26b7cf65cc960f14b1b133c6d51a31322e18a2a/big-3dac58e937e108616c29f7d977a39a8a.jpg&amp;raw"></a><span data-dcnode-id="2567" instrument_node="">

ima</span></td><td data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2475"><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">Like many short trips around Peru, this itinerary begins in Lima. But instead of jetting off after a single night in the capital, this trip plan features an extra day in the big city. Go on a guided tour of the city’s historic center and, on two day, get to know Lima’s food scene with a visit to a </span><em data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">mercado</span></em><span data-dcnode-id="2476" instrument_node=""> (marketplace) and a cooking class, where you’ll learn to make ceviche. Spend the evening walking around the hipster-friendly neighborhood of Barranco, home to a great selection of bars and restaurants.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">On day three, you’ll have an early transfer to Paracas, the gateway to the nearby Ballestas Islands. The adventure continues with a boat ride from Paracas to the islands, a sanctuary for marine life. Look for Humboldt Penguins and Peruvian Boobies along the way: they only live along the Humboldt Current, which flows through the area.&nbsp;</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2470" instrument_node="">Visit the Paracas National Reserve’s interpretation center for an overview, then stop to see turritellas, fossilized remains of sea snails, and the Cathedral, the base of a million-year-old rock formation that’s located just off the coast. On day four, head to the Pisco airport to board a 12-passenger plane for a 90-minute flight over the sprawling Nazca Lines to view famed geoglyphs depicting a hummingbird, dog, tree, whale, and lizard. You’ll finish </span><em data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">the</span></em><span data-dcnode-id="2467" instrument_node=""> day sandboarding down the towering dunes at Huacachina before returning to Lima for one last night in Peru. </span><strong data-dcnode-id="2464"><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/from-lima-to-nazca-wildlife-history-gastronomy-5-days"><span data-dcnode-id="2466" instrument_node="">Learn more</span></a></strong></p><span data-dcnode-id="2462" instrument_node="">
</span><h2 data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Itinerary #5: Secrets of Northern Peru</span></h2><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2458" instrument_node="">Get off the beaten path in northern Peru with an </span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/perus-best-kept-secret-kuelap-and-gocta"><span data-dcnode-id="2457" instrument_node="">archeology-focused trip</span></a><span data-dcnode-id="2455" instrument_node="">&nbsp;that features stops at Kuelap—also known as “the Machu Picchu of the North”—and a hike to Gocta, one of the highest waterfalls in the world.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><figure class="image" data-dcnode-id="2446"><a data-dcnode-id="2451" data-lightbox="article" data-title="Ancient ruins at Kuelap" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/6f6a8f26004fa3f503072dd4334158cfacc70e9c/big-09de9b41daa6f1c73471f70389c41d18.jpg"><img alt="Dramatic scenery beckons at the Colca Canyon near Arequipa" data-dcnode-id="2452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.kimkim.com/files/a/images/6f6a8f26004fa3f503072dd4334158cfacc70e9c/big-09de9b41daa6f1c73471f70389c41d18.jpg&amp;raw"></a><span data-dcnode-id="2450" instrument_node="">

pan></td><td data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2361"><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">After a night in Lima, you’ll fly to Jaen and transfer to the Amazonas Region, passing through Andean valleys, coconut groves, and rice plantations along the journey. End up in Chachapoyas, where you can relax, breathe in some fresh air, and sample traditional Peruvian cuisine before the next day’s adventure to the archaeological complex of Kuelap. Known as the Machu Picchu of the North, the ancient fortified city is accessible by cable car and hiking trail. Explore Kuelap’s temples and religious buildings, then have a meal in a family-run restaurant before returning to Chachapoyas for the evening.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">On day four, another outdoor adventure awaits. Transfer to Cocachimba, the jumping-off point for the hike to Gocta waterfall. You’ll trek through the cloud forest, keeping your eyes open for the rare spatuletail hummingbird, indigenous to the area. You’re also likely to spot Peru’s vibrantly hued national bird, the Andean cock-of-the-rock, in its natural habitat. Look for orchids and bromeliads lining the trail, too.</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2356" instrument_node="">Note that the six-hour hike is challenging (riding on horseback for part of the journey is an option). The reward is a stunning view of the 2,529-foot cataracts, considered one of the highest waterfalls in the world. On day five, fly from Jaen to Lima, where you’ll connect to an international flight home.</span><strong data-dcnode-id="2353"><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/perus-best-kept-secret-kuelap-and-gocta"><span data-dcnode-id="2355" instrument_node=""> Learn more</span></a></strong></p><span data-dcnode-id="2351" instrument_node="">
</span><h2 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">More Great 5-Day Peru Itineraries</span></h2><span data-dcnode-id="2348" instrument_node="">
