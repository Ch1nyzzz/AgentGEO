</span><h1 class="entry-title p_post_titles_font" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">The Perfect Egypt Itinerary – 10 Days of Exploring History</span></h1><span data-dcnode-id="3348" instrument_node=""> </span></header><span data-dcnode-id="3345" instrument_node="">
</span><div class="clearfix entry-content" data-dcnode-id="2376"><span data-dcnode-id="3344" instrument_node="">
</span><span data-dcnode-id="3343" data-mobile-size="720" id="dpsp-post-sticky-bar-markup"></span><span data-dcnode-id="3342" data-image-pin-it="true" id="dpsp-post-content-markup"></span><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Egypt has been at the very top of my bucket list for as long as I can remember. It’s always been a goal of mine to visit all the world wonders, but Egypt has always held a special place in my heart for personal reasons. When I had the chance to spend 10 days in Egypt, I had to take it.</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">Ever since I was a little girl, I remember my grandmother telling me stories of growing up in Egypt, and how they would spend summers at the country club on the Nile. Looking through old black and white photographs of my dad growing up in Alexandria, it always sounded so luxurious. Immersing myself in the rich history of my ancestors, I had no idea how connected I would feel to this place.&nbsp;</span></p><span data-dcnode-id="3335" instrument_node="">

</span><h2 data-dcnode-id="3255"><span class="ez-toc-section" data-dcnode-id="3259" id="Day_1_-_Welcome_to_Egypt"></span><strong data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Day 1&nbsp; – Welcome to Egypt</span></strong><span class="ez-toc-section-end" data-dcnode-id="3256"></span></h2><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">In preparing for this trip, I did a ton of research for my first real trip to the Middle East. I say “real trip” because I’ve visited Dubai twice before, but Dubai is very different from other middle eastern countries. It is much less conservative. </span></p><span data-dcnode-id="3251" instrument_node="">
</span><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">After a day of packing and worrying if I packed the right things, I was standing at the airport ready to board the red-eye from Montreal to Casablanca and then Casablanca to Cairo. About 15 hours later, we finally arrived to our hotel close to 7 p.m. We made it just in time to meet the rest of the group over a light dinner before calling it a night to get some rest for the jam-packed schedule for the next day.</span></p><span data-dcnode-id="3248" instrument_node="">
</span><h2 data-dcnode-id="3240"><span class="ez-toc-section" data-dcnode-id="3247" id="Day_2_-_Cairo"></span><strong data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Day 2</span></strong><span data-dcnode-id="3244" instrument_node=""> </span><strong data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">– Cairo </span></strong><span class="ez-toc-section-end" data-dcnode-id="3241"></span></h2><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Our first day in Egypt was nothing short of epic! At 10:15 a.m., we hit the ground running! After a traditional breakfast of Foul Medames (beans) and falafel, we drove to Saqqara. This was the start of an amazing day spent exploring the pyramids.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><h3 data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Visiting Saqqara: The First Pyramid</span></h3><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3225"><strong data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Hours:</span></strong><span data-dcnode-id="3230" instrument_node=""> 7 a.m. – 7 p.m. from May 1 – Ramadan; 8 a.m. – 5 p.m. from start of Ramadan – April 30</span><br data-dcnode-id="3229"><strong data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Cost: </span></strong><span data-dcnode-id="3226" instrument_node=""> £25 EGP (about $1.55 USD)</span></p><span data-dcnode-id="3224" instrument_node="">

</span><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Built-in 2500 BC, Saqqara was the first pyramid ever built, also known as the step pyramid. This pyramid has a pretty unique story to its unique look. In Egyptian history, they built pyramids as a place to be reborn for the afterlife. Completion of the pyramid meant meant it was time to die and move into the next life. </span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">The Step Pyramid of Djoser,  the most well-known of the monuments at Saqqara, was built for the first king of the 3rd Dynasty. The pyramid was built quicker than expected so they kept adding levels until the king died, hence the steps.&nbsp;</span></p><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">The pyramid was cool but definitely not the most epic you’ll see, I swear it only gets better!</span></p><span data-dcnode-id="3207" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3200"><span class="dpsp-pin-it-wrapper wp-image-2785" data-dcnode-id="3203"><img alt="A woman sitting in front of the step pyramid at Saqqara" class="" data-attachment-id="2785" data-comments-opened="1" data-dcnode-id="3206" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;2.8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS 5D Mark IV&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;946685036&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;50&quot;,&quot;iso&quot;:&quot;160&quot;,&quot;shutter_speed&quot;:&quot;0.0002&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Saqqara-Egypt-Itinerary-10-Days-2" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1440x1800.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-300x375.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2.jpg" data-orig-size="4369,5461" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/saqqara-egypt-itinerary-10-days-2/" data-pin-description="The step pyramid at Saqqara was the first of its kind. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #cairo #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt 10 day itinerary | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Cairo Egypt | Cairo Egypt Instagram pictures | Egypt pyramids | Egypt photo ideas" height="1800" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1440x1800.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1440x1800.jpg 1440w, https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-300x375.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1229x1536.jpg 1229w, https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1638x2048.jpg 1638w, https://lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-800x1000.jpg 800w" width="1440"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Saqqara-Egypt-Itinerary-10-Days-2-1440x1800.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DThe%2520step%2520pyramid%2520at%2520Saqqara%2520was%2520the%2520first%2520of%2520its%2520kind.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523cairo%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%252010%2520day%2520itinerary%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Cairo%2520Egypt%2520%257C%2520Cairo%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Egypt%2520pyramids%2520%257C%2520Egypt%2520photo%2520ideas"><span data-dcnode-id="3205" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Saqqara – The Step Pyramid</span></figcaption></figure><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">By 11:45 a.m., I saw my first hieroglyphics by stepping inside the Pyramid of Unas. If you’re someone who gets claustrophobic, this might not be for you. However, if you can handle it, it’s quite the experience seeing the inside of a pyramid.</span></p><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">You have to crawl through a 100 ft tunnel with a 4 ft ceiling. Once you reach the center of the pyramid, the ceiling opens up and you can stand. This is when you get your first glimpse at some of the oldest hieroglyphics.&nbsp;</span></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Whether you are claustrophobic or not, you won’t want to be in there for long as there is no air. It gets hot quicky! To exit, you’ll have to endure the mini leg burn workout to climb back out of the pyramid.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Note: Please be respectful when visiting. You can only take iPhone photos inside and you cannot touch the walls. In the photo below I am hovering my hand over them, but never touching). </span></p><span data-dcnode-id="3187" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3180"><span class="dpsp-pin-it-wrapper wp-image-2787" data-dcnode-id="3183"><img alt="A woman looking at Egyptian hieroglyphics inside a pyramid in Egypt at Saqqara." class="" data-attachment-id="2787" data-comments-opened="1" data-dcnode-id="3186" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1573053488&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Hieroglyphics-Egypt-Itinerary-10-Days-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1440x1920.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-300x400.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1.jpg" data-orig-size="3024,4032" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/hieroglyphics-egypt-itinerary-10-days-1/" data-pin-description="The hieroglyphics inside the pyramid at Saqqara. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #cairo #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt 10 day itinerary | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Cairo Egypt | Cairo Egypt Instagram pictures | Egypt pyramids | Egyptian hieroglyphics" height="1920" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1440x1920.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1440x1920.jpg 1440w, https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-300x400.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1152x1536.jpg 1152w, https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1536x2048.jpg 1536w, https://lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-800x1067.jpg 800w" width="1440"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Hieroglyphics-Egypt-Itinerary-10-Days-1-1440x1920.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DThe%2520hieroglyphics%2520inside%2520the%2520pyramid%2520at%2520Saqqara.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523cairo%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%252010%2520day%2520itinerary%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Cairo%2520Egypt%2520%257C%2520Cairo%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Egypt%2520pyramids%2520%257C%2520Egyptian%2520hieroglyphics"><span data-dcnode-id="3185" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Seeing my first hieroglyphics</span></figcaption></figure><span data-dcnode-id="3179" instrument_node="">
</span><h3 data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Visit the Great Pyramids of Giza &amp; the Sphinx</span></h3><span data-dcnode-id="3176" instrument_node="">
</span><p data-dcnode-id="3168"><strong data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Hours: </span></strong><span data-dcnode-id="3173" instrument_node="">8 a.m. – 5 p.m., hours for inside of pyramid differ slightly</span><br data-dcnode-id="3172"><strong data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Cost: </span></strong><span data-dcnode-id="3169" instrument_node=""> £100 EGP ($6.20) for complex;  £360 EGP ($22) for inside of Great Pyramid;  £100 EGP ($6.20) for inside of Khafre Pyramid or Mers Ankh Tomb</span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">After we finished at Saqqara, we headed to the Great Pyramids. I had no idea that you can actually stand on the Great Pyramids of Giza. It is only the first few steps but still. While it isn’t the best photo opp, it’s definitely a must-do to say you’ve stood on something that was built over 3000 years ago. </span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">I didn’t get any photos here but my beautiful friend did, see below!</span></p><span data-dcnode-id="3161" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3154"><span class="dpsp-pin-it-wrapper wp-image-2793" data-dcnode-id="3157"><img alt="A woman sitting on the Great Pyramid of Giza" class="" data-attachment-id="2793" data-comments-opened="1" data-dcnode-id="3160" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1-300x454.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1.jpg" data-orig-size="1123,1698" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/great-pyramid-of-giza-egypt-itinerary-10-days-2-1/" data-pin-description="@christinagalbato at the Great Pyramid in Egypt. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #cairo #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt 10 day itinerary | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Cairo Egypt | Cairo Egypt Instagram pictures | Egypt pyramids | Great Pyramid of Giza" height="1698" loading="lazy" sizes="(max-width: 1123px) 100vw, 1123px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1.jpg 1123w, https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1-300x454.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1-1016x1536.jpg 1016w, https://lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1-800x1210.jpg 800w" width="1123"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Great-Pyramid-of-Giza-Egypt-Itinerary-10-Days-2-1.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3D%2540christinagalbato%2520at%2520the%2520Great%2520Pyramid%2520in%2520Egypt.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523cairo%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%252010%2520day%2520itinerary%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Cairo%2520Egypt%2520%257C%2520Cairo%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Egypt%2520pyramids%2520%257C%2520Great%2520Pyramid%2520of%2520Giza"><span data-dcnode-id="3159" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">@christinagalbato sitting on the Great Pyramid</span></figcaption></figure><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Beware that the base of the pyramid stays crowded with tourists and people trying to haggle you. They will almost always tell you it’s a “gift” but trust me, no gift is free. It’s always best to avoid eye contact and politely decline (something I have a hard time doing because I’m so chatty).&nbsp;</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">A little later than expected (around 2 p.m.), we finally made it to the Pyramid shoot location we all wanted to visit. Look for it on Google Maps as “Giza Panorama.” There is a great view of the pyramids from there.</span></p><span data-dcnode-id="3147" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Pro Tip: If you’re looking for an epic shot of the pyramids, I’d recommend going a little earlier in the day (around 10 am) to get a more dramatic shadow on the pyramids. That’s what really gives it that 3D look and makes your photo pop! We, unfortunately, we went later in the day and the result is the Pyramids looking more 2 dimensional (see below).  Nonetheless, still incredible!</span></p><span data-dcnode-id="3144" instrument_node="">

</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">Personally, if you’re really looking for that WOW factor photo I prefer this angle more (see below). This way you’ll be able to get all 4 pyramids in the frame. I love this photo of my friend Hayley!</span></p><span data-dcnode-id="3133" instrument_node="">

e-id="3128" instrument_node="">@haylsa nailing it at the Great Pyramids of Giza</span></figcaption></figure><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Our last stop of the day was the Sphinx around 4 p.m. We made it just in time for sunset.  Note that the Sphinx closes at 5 p.m., and they are very strict about getting you out on time.  </span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">It is said that the Sphinx’s nose was damaged when Napoleon’s men fired a cannon at it. No one really knows what happened though. No matter what happened, it is still an impressive sight! It actually left me singing ‘A Whole New World’ and imagining seeing it from a magic carpet!</span></p><span data-dcnode-id="3119" instrument_node="">

</span><p data-dcnode-id="3098"><span data-dcnode-id="3102" instrument_node="">After all the day’s excitement, we sat down for a very late lunch/ early dinner. Our guide Sam took us to this incredible local spot called </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barcelo.com/en-us/barcelo-hotels/hotels/egypt/cairo/barcelo-cairo-pyramids/%23services"><span data-dcnode-id="3101" instrument_node="">Sphinx located in the Barcelo Cairo Pyramids Hotel</span></a><span data-dcnode-id="3099" instrument_node="">. </span></p><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">We feasted on some of the best hummus, baba ganoush, falafel, fatouche salad and so much more. If you go, ask for the set menu and not the buffet. You won’t regret it, it was delicious! </span></p><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Sidebar: We quickly discovered how much better Egyptian falafel is than back home and became hooked. We had falafel every day on this trip! Falafel as you know it is traditionally made with chickpeas but Egyptian falafel is made from fava beans offering a less dry and more flavourful ball! </span></p><span data-dcnode-id="3091" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3084"><span class="dpsp-pin-it-wrapper wp-image-2828" data-dcnode-id="3087"><img alt="A group sitting down for Egyptian food in Cairo, Egypt, at Sphinx" class="" data-attachment-id="2828" data-comments-opened="1" data-dcnode-id="3090" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Egyptian-Food-Egypt-Itinerary-10-Days-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1.png" data-medium-file="https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1-300x424.png" data-orig-file="https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1.png" data-orig-size="1119,1582" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/egyptian-food-egypt-itinerary-10-days-1/" data-pin-description="The food in Egypt is so good, especially at Sphinx. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #cairo #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt 10 day itinerary | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Cairo Egypt | Cairo Egypt Instagram pictures | Egypt pyramids | Great Pyramid of Giza" height="1582" loading="lazy" sizes="(max-width: 1119px) 100vw, 1119px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1.png&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1.png 1119w, https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1-300x424.png 300w, https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1-1086x1536.png 1086w, https://lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1-800x1131.png 800w" width="1119"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2020/01/Egyptian-Food-Egypt-Itinerary-10-Days-1.png%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DThe%2520food%2520in%2520Egypt%2520is%2520so%2520good%252C%2520especially%2520at%2520Sphinx.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523cairo%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%252010%2520day%2520itinerary%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Cairo%2520Egypt%2520%257C%2520Cairo%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Egypt%2520pyramids%2520%257C%2520Great%2520Pyramid%2520of%2520Giza"><span data-dcnode-id="3089" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Traditional Egyptian Dinner at Sphinx</span></figcaption></figure><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">At the end of the second day, we decided to pay more and fly from Cairo to Luxor and avoid the 7-hour drive. We all agreed we wanted to get to Karnak Temple as soon as it opened, which meant an early wake up call for us.</span></p><span data-dcnode-id="3080" instrument_node="">
</span><h2 data-dcnode-id="3074"><span class="ez-toc-section" data-dcnode-id="3079" id="Day_3_-_Luxor_Karnak_Temple_Nubian_Village"></span><strong data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">Day 3 – Luxor, Karnak Temple</span></strong><span data-dcnode-id="3076" instrument_node="">, &amp; Nubian Village</span><span class="ez-toc-section-end" data-dcnode-id="3075"></span></h2><span data-dcnode-id="3073" instrument_node="">
</span><h3 data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Karnak Temple for Sunrise</span></h3><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3062"><strong data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Hours:</span></strong><span data-dcnode-id="3067" instrument_node=""> 6 a.m. – 5:30 p.m.</span><br data-dcnode-id="3066"><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Cost:</span></strong><span data-dcnode-id="3063" instrument_node="">  £50 EGP ($3)</span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3060" instrument_node="">Today was the day I was waiting for, Karnak Temple! This was the temple I was the most excited to shoot at on the trip. This temple blew my socks off, it was even more breathtaking in person than I imagined! Karnak is also the biggest temple in Egypt and the second biggest temple in the world. (</span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/cambodia/"><span data-dcnode-id="3059" instrument_node="">Angkor Wat, Cambodia being the biggest</span></a><span data-dcnode-id="3057" instrument_node="">.)</span></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Karnak temple was also the place we had the hardest time shooting at because the workers all thought we were doing commercial shoots. Note if you’re planning to shoot here only take what you need. We had to pay them off to let us take photos.</span></p><span data-dcnode-id="3052" instrument_node="">

Karnak%2520Temple%2520Luxor%2520%257C%2520Karnak%2520Temple%2520Instagram"><span data-dcnode-id="3050" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Karnak Temple</span></figcaption></figure><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">With 10 creators and 10 cameras on the trip you can only imagine how long we took to shoot at each location. Between photos, video, IG stories, GIFs… Egyptians didn’t know what hit them!  </span></p><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">This temple won’t disappoint you! We were the first ones in and got to enjoy the quiet and the early morning sunlight and birds chirping. It was perfect for photos, but we could see the crowds coming not far after us. </span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Can you believe this light flare was real!? </span></p><span data-dcnode-id="3035" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3028"><span class="dpsp-pin-it-wrapper wp-image-2809" data-dcnode-id="3031"><img alt="A woman walking through Karnak Temple in Luxor" class="" data-attachment-id="2809" data-comments-opened="1" data-dcnode-id="3034" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Karnak-Temple-Egypt-Itinerary-10-Days-2" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2-300x453.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2.jpg" data-orig-size="1125,1700" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/karnak-temple-egypt-itinerary-10-days-2/" data-pin-description="@mvandersluis in Karnak Temple. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #luxor #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Luxor Egypt | Luxor Egypt Instagram pictures | Karnak Temple Luxor | Karnak Temple Instagram" height="1700" loading="lazy" sizes="(max-width: 1125px) 100vw, 1125px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2.jpg 1125w, https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2-300x453.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2-1016x1536.jpg 1016w, https://lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2-800x1209.jpg 800w" width="1125"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Karnak-Temple-Egypt-Itinerary-10-Days-2.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3D%2540mvandersluis%2520in%2520Karnak%2520Temple.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523luxor%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%2520in%252010%2520days%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Luxor%2520Egypt%2520%257C%2520Luxor%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Karnak%2520Temple%2520Luxor%2520%257C%2520Karnak%2520Temple%2520Instagram"><span data-dcnode-id="3033" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">@mvandersluis at Karnak Temple</span></figcaption></figure><span data-dcnode-id="3027" instrument_node="">
</span><h3 data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Nubian Village Near Aswan</span></h3><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">In the evening we did a sunset cruise to a small village. We had some snacks (more falafel and wine) on the boat as we cruised down the Nile.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">In the village, a local opened up her home and welcomed us for an incredible dinner. She made all traditional food, including some of my faves my grandma makes! One of being Molohiya; a green spinach-like soup that tastes amazing. Everything was so good, it was nice to have a home-cooked meal. </span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">After dinner, some of the village children gathered and sang for us as we all danced. It was really a special moment.</span></p><span data-dcnode-id="3015" instrument_node="">
</span><h2 data-dcnode-id="3010"><span class="ez-toc-section" data-dcnode-id="3014" id="Day_4_-_Aswan_to_Abu_Simbel"></span><strong data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Day 4 – Aswan to Abu Simbel</span></strong><span class="ez-toc-section-end" data-dcnode-id="3011"></span></h2><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">After a few days of early wake-up calls, this was a rough morning, but it was totally worth it once there! We all piled into our bus and made the 3-hour drive from Aswan to Abu Simbel, just on the border of Sudan. </span></p><span data-dcnode-id="3006" instrument_node="">
</span><h3 data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Abu Simbel Temples</span></h3><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="2995"><strong data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Hours: </span></strong><span data-dcnode-id="3000" instrument_node="">6 a.m. – 5 p.m. from October to April; 6 a.m. – 6 p.m. from May to September</span><br data-dcnode-id="2999"><strong data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Cost: </span></strong><span data-dcnode-id="2996" instrument_node=""> £160 EGP ($10) </span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Abu Simbel actually has two temples. One was for Ramesses II. The other was for his royal wife, Queen Nefertari. On the way there our guide explained to us the history of the temples. Can you believe this temple was carved out of one single piece of stone?!! </span></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">The craziest piece of history he shared was that with the building of the dam in 1960 the temples were at risk of flooding. So in 1964, the temples were cut into 836 pieces and moved to higher ground! I couldn’t take my eyes this temple trying to imagine how they could move something so massive and put it back together so flawlessly.&nbsp;</span></p><span data-dcnode-id="2988" instrument_node="">

/Nubian-Village-Egypt-Itinerary-10-Days-6-1440x1800.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-1440x1800.jpg 1440w, https://lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-300x375.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-1229x1536.jpg 1229w, https://lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-1639x2048.jpg 1639w, https://lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-800x1000.jpg 800w" width="1440"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Nubian-Village-Egypt-Itinerary-10-Days-6-1440x1800.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DThe%2520local%2520market%2520in%2520the%2520Nubian%2520Village%2520in%2520Aswan.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%2520in%252010%2520days%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Aswan%2520Egypt%2520%257C%2520Aswan%2520Egypt%2520Instagram%2520pictures%2520%257C%2520Nubian%2520Village%2520Egypt%2520%257C%2520Nubian%2520Village%2520Aswan"><span data-dcnode-id="2887" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Local shops in the village</span></figcaption></figure><span data-dcnode-id="2881" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">That afternoon we boarded a traditional boat called a “Felucca”. Our guide told us this is one of the most popular things to do and people come specifically for this experience when in Egypt. How could we miss it? </span></p><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">We boarded the Felucca just before sunset. First impressions: SLUMBER PARTY! The boat is one massive mattress that can sleep up to 14 people. Typically people board the boat late afternoon and spend time jumping in the Nile while getting to know your bed mates!</span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">You eat all meals on the boat, and at night the boat docks onshore. The best part was once we docked, the staff made a bonfire and played traditional music as we danced and drank wine around the fire.</span></p><span data-dcnode-id="2872" instrument_node="">

="">Save</span></a></span><figcaption data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Lunch on the Felucca</span></figcaption></figure><span data-dcnode-id="2864" instrument_node="">
</span><h2 data-dcnode-id="2858"><span class="ez-toc-section" data-dcnode-id="2863" id="Day_6_-_Edfu_Temple_Driving_to_Luxor"></span><strong data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Day 6 – Edfu Temple</span></strong><span data-dcnode-id="2860" instrument_node=""> &amp;  Driving to Luxor</span><span class="ez-toc-section-end" data-dcnode-id="2859"></span></h2><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">We woke up with sunrise on the Felucca. Full disclosure, it isn’t the most comfortable sleep but the experience really is one of a kind. After breakfast on board, we made our way to Edfu Temple, also known as the Temple of Horus. </span></p><span data-dcnode-id="2854" instrument_node="">
</span><h3 data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Temple of Horus</span></h3><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2843"><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Hours:</span></strong><span data-dcnode-id="2848" instrument_node=""> 8 a.m. to 5 p.m.</span><br data-dcnode-id="2847"><strong data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Cost: </span></strong><span data-dcnode-id="2844" instrument_node=""> £100 EGP ($6)</span></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">The temple is dedicated to the falcon god Horus and was built over a 180-year period. Horus is the son of the gods Isis and Osiris. The temple complex is huge! It is the second largest temple in Egypt. It is also one of the tallest and best-preserved of the temples in Egypt. </span></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Located between Aswan and Luxor, it made for a perfect stop on the way back. From the temple, it was a 2 and half hour drive back to Luxor where we spent the night.</span></p><span data-dcnode-id="2836" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2829"><span class="dpsp-pin-it-wrapper wp-image-2814" data-dcnode-id="2832"><img alt="Christina Galbato in front of the Temple of Horus or Edfu Temple in Egypt" class="" data-attachment-id="2814" data-comments-opened="1" data-dcnode-id="2835" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Temple-of-Horus-Egypt-Itinerary-10-Days-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Temple-of-Horus-Egypt-Itinerary-10-Days-1.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Temple-of-Horus-Egypt-Itinerary-10-Days-1-300x449.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Temple-of-Horus-Egypt-Itinerary-10-Days-1.jpg" data-orig-size="1125,1682" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/temple-of-horus-egypt-itinerary-10-days-1/" data-pin-description="@christinagalbato in front of the Temple of Horus or Edfu Temple in Egypt. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Edfu Egypt | Temple of Horus Egypt | Temple of Edfu Egypt | Edfu Temple" height="1682" loading="lazy" sizes="(max-width: 1125px) 100vw, 1125px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/20 cnode-id="2830"><span data-dcnode-id="2831" instrument_node="">@christinagalbato at Temple of Horus</span></figcaption></figure><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">If jewelry is your thing and you’re looking for something authentic our guide took us to Sam’s House. A local jewelry shop located in the Luxor market, right across from Luxor temple. Gold especially is really cheap in Egypt so I ended up picking up a cartouche for my sister and I with our names on it in hieroglyphics. As well as an eye of Horus, a symbol of protection. </span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">They didn’t happen to have the length of chain I wanted so I ended up getting just the pendant and picked up a chain in Dubai at the gold souk. The cartouche was $90 USD each and the eye was $80 USD. </span></p><span data-dcnode-id="2822" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2815"><span class="dpsp-pin-it-wrapper wp-image-2850" data-dcnode-id="2818"><img alt="A cartouche with a name on it and the eye of Horus" class="" data-attachment-id="2850" data-comments-opened="1" data-dcnode-id="2821" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1577900758&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Jewelry-Egypt-Itinerary-10-Days-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1440x1920.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-300x400.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1.jpg" data-orig-size="3024,4032" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/jewelry-egypt-itinerary-10-days-1/" data-pin-description="Buying Egyptian jewelry to take home with me with my name and the Eye of Horus. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Edfu Egypt | Temple of Horus Egypt | Temple of Edfu Egypt | Edfu Temple" height="1920" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1440x1920.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1440x1920.jpg 1440w, https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-300x400.jpg 300w, https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1152x1536.jpg 1152w, https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1536x2048.jpg 1536w, https://lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-800x1067.jpg 800w" width="1440"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2020/01/Jewelry-Egypt-Itinerary-10-Days-1-1440x1920.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DBuying%2520Egyptian%2520jewelry%2520to%2520take%2520home%2520with%2520me%2520with%2520my%2520name%2520and%2520the%2520Eye%2520of%2520Horus.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%2520in%252010%2520days%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520Edfu%2520Egypt%2520%257C%2520Temple%2520of%2520Horus%2520Egypt%2520%257C%2520Temple%2520of%2520Edfu%2520Egypt%2520%257C%2520Edfu%2520Temple"><span data-dcnode-id="2820" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Cartouche with my name on the left and the eye of Horus on the right.</span></figcaption></figure><span data-dcnode-id="2814" instrument_node="">
</span><h2 data-dcnode-id="2809"><span class="ez-toc-section" data-dcnode-id="2813" id="Day_7_-_Valley_of_the_Kings"></span><strong data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Day 7 – Valley of the Kings</span></strong><span class="ez-toc-section-end" data-dcnode-id="2810"></span></h2><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Today was a full on day! Not everyone made it, but those of us who could push through the early wake-up call at 3:30 a.m. did not regret it!</span></p><span data-dcnode-id="2805" instrument_node="">
</span><h3 data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Hot Air Balloon Ride Over the Valley of the Kings at Sunrise</span></h3><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">We woke up before the crack of dawn to experience the most magical hot air balloon over the Valley of the Kings. I’ve had some experience with hot air balloons but there’s nothing like flying over some of the greatest temples in history! You will never regret waking up for sunrise!</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">If you plan to do a hot air balloon ride in Luxor, they start at about $70 per person. The views are worth the price. You can an amazing and unique view of the well-known landmarks of Luxor.</span></p><span data-dcnode-id="2796" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2789"><span class="dpsp-pin-it-wrapper wp-image-2821" data-dcnode-id="2792"><img alt="Explorerssaurus - a couple in a hot air balloon over the Valley of Kings in Egypt" class="" data-attachment-id="2821" data-comments-opened="1" data-dcnode-id="2795" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1577812883&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Valley-of-the-Kings-Egypt-Itinerary-10-Days-2" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-300x372.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2.jpg" data-orig-size="1125,1396" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/valley-of-the-kings-egypt-itinerary-10-days-2/" data-pin-description="Make sure to take a hot air balloon ride at sunrise over the Valley of Kings in Egypt for a unique view. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in the Valley of Kings | Valley of Kings Egypt" height="1396" loading="lazy" sizes="(max-width: 1125px) 100vw, 1125px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2.jpg 1125w, https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-300x372.jpg 300w, https://lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-800x993.jpg 800w" width="1125"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2019/12/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DMake%2520sure%2520to%2520take%2520a%2520hot%2520air%2520balloon%2520ride%2520at%2520sunrise%2520over%2520the%2520Valley%2520of%2520Kings%2520in%2520Egypt%2520for%2520a%2520unique%2520view.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%2520in%252010%2520days%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520the%2520Valley%2520of%2520Kings%2520%257C%2520Valley%2520of%2520Kings%2520Egypt"><span data-dcnode-id="2794" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">@explorerssaurus_ high above Valley of the Kings</span></figcaption></figure><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Pro Tip: If you’re going for photos take your widest lens with you! Unless you book a private tour the hot air balloon can accommodate 12-16 people making it a tight squeeze for photos. If you’re good with photoshop it’s easier to fix the image in post-processing. If not, well then you may need to get creative with your angles. (I was leaning as far out of the balloon as I safely could to get this photo of Raquel &amp; Miguel).</span></p><span data-dcnode-id="2785" instrument_node="">
</span><h3 data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">The Valley of the Kings</span></h3><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2774"><strong data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Hours:</span></strong><span data-dcnode-id="2779" instrument_node=""> 6 a.m. – 5 p.m. (last ticket sold at 4 p.m.)</span><br data-dcnode-id="2778"><strong data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Cost: </span></strong><span data-dcnode-id="2775" instrument_node=""> £160 EGP ($10) </span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">After heading back to the hotel for a quick shower and breakfast, we ventured back out around 10:30 a.m. to discover the Valley of the Kings! The landscape was amazing from above, and it is just as amazing on the ground.</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Valley of the Kings was by far my favorite temple for history! To date, 63 royal tombs have been discovered here. However, there is one tomb that they know is buried here but has yet to be discovered, the tomb of Ramesses VIII. I was secretly hoping we brought good luck and they would discover it while we were visiting!</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2764"><strong data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Every month in Egypt there are at least one or two new discoveries. Egyptians say that they’ve only uncovered 30% of their history!</span></strong></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">In Valley of the Kings, we went inside the tomb of Ramesses IV. Because the temples are underground, the colors are vivid without ever being touched up or repainted. It is incredible to see something so well preserved thanks to being untouched by outside elements.</span></p><span data-dcnode-id="2760" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2753"><span class="dpsp-pin-it-wrapper wp-image-2859" data-dcnode-id="2756"><img alt="Hieroglyphics inside the tomb of Ramesses IV in the Valley of Kings" class="" data-attachment-id="2859" data-comments-opened="1" data-dcnode-id="2759" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Valley of the Kings – Egypt Itinerary 10 Days 2 (1)" data-large-file="https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1440x1852.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-300x386.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1.jpg" data-orig-size="3020,3884" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/valley-of-the-kings-egypt-itinerary-10-days-2-1/" data-pin-description="Egyptian hieroglyphics inside a pyramid that was the tomb of Ramesses IV in the Valley of Kings. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in the Valley of Kings | Valley of Kings Egypt" height="1852" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1440x1852.jpg&amp;raw" srcset="https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1440x1852.jpg 1440w, https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-300x386.jpg 300w, https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1194x1536.jpg 1194w, https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1592x2048.jpg 1592w, https://lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-800x1029.jpg 800w" width="1440"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A//lisahomsy.com/wp-content/uploads/2020/01/Valley-of-the-Kings-Egypt-Itinerary-10-Days-2-1-1440x1852.jpg%26url%3Dhttps%3A//lisahomsy.com/egypt-itinerary-10-days/%26is_video%3Dfalse%26description%3DEgyptian%2520hieroglyphics%2520inside%2520a%2520pyramid%2520that%2520was%2520the%2520tomb%2520of%2520Ramesses%2520IV%2520in%2520the%2520Valley%2520of%2520Kings.%2520Click%2520here%2520for%2520the%2520ultimate%2520Egypt%2520travel%2520guide%2520with%2520a%2520full%252010%2520day%2520Egypt%2520itinerary.%2520%2523egypt%2520%2523travel%2520%2523instagramfeed%2520%2523travelguide%2520%257C%2520best%2520places%2520to%2520visit%2520in%2520Egypt%2520%257C%2520Egypt%2520travel%2520itinerary%2520%257C%2520Egypt%2520in%252010%2520days%2520%257C%2520Egypt%2520travel%2520tips%2520%257C%2520Egypt%2520photography%2520%257C%2520Egypt%2520pyramids%2520%257C%2520%2520%2520Egypt%2520outfits%2520%257C%2520things%2520to%2520do%2520in%2520Egypt%2520%257C%2520what%2520to%2520wear%2520in%2520Egypt%2520%257C%2520things%2520to%2520do%2520in%2520the%2520Valley%2520of%2520Kings%2520%257C%2520Valley%2520of%2520Kings%2520Egypt"><span data-dcnode-id="2758" instrument_node="">Save</span></a></span><figcaption data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Hieroglyphics inside the tomb of Ramesses IV</span></figcaption></figure><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Due to many tombs getting robbed, the royal tombs were quickly moved and hidden in what’s now known as the Valley of the Kings. Because the royals were buried with all their treasures, pyramids drew so much attention and clearly marked where tombs were. The mountains in this area are shaped like pyramids which symbolize success in the afterlife, making it a natural fit as a burial ground and hiding them from tomb raiders.</span></p><span data-dcnode-id="2749" instrument_node="">
</span><h3 data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Luxor Temple at Night</span></h3><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2738"><strong data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Hours:</span></strong><span data-dcnode-id="2743" instrument_node=""> 6 a.m. – 9 p.m.</span><br data-dcnode-id="2742"><strong data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Cost: </span></strong><span data-dcnode-id="2739" instrument_node=""> £100 EGP ($6) </span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">After a long day, we finished off the day by exploring Luxor Temple at night. The temple at night was is beautiful, but it’s also the busiest time to visit. So many people crowd in to watch the temple light up at sunset. This made photos a little bit of a challenge.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">To get photos without the crowd, visiting during the day would have been best. However, if you can think outside the box and find a different angle, you can make anything work. I love this photo of Hayley and I even more than the entrance where everyone shoots!</span></p><span data-dcnode-id="2731" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2724"><span class="dpsp-pin-it-wrapper wp-image-2759" data-dcnode-id="2727"><img alt="Two women in Luxor Temple at night in Luxor, Egypt" class="" data-attachment-id="2759" data-comments-opened="1" data-dcnode-id="2730" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;1.4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;NIKON D750&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1573472280&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;20&quot;,&quot;iso&quot;:&quot;1600&quot;,&quot;shutter_speed&quot;:&quot;0.00625&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Luxor-Temple-Egypt-Itinerary-10-Days-1" data-large-file="https://lisahomsy.com/wp-content/uploads/2019/12/Luxor-Temple-Egypt-Itinerary-10-Days-1-1440x1800.jpg" data-medium-file="https://lisahomsy.com/wp-content/uploads/2019/12/Luxor-Temple-Egypt-Itinerary-10-Days-1-300x375.jpg" data-orig-file="https://lisahomsy.com/wp-content/uploads/2019/12/Luxor-Temple-Egypt-Itinerary-10-Days-1.jpg" data-orig-size="3924,4905" data-permalink="https://lisahomsy.com/egypt-itinerary-10-days/luxor-temple-egypt-itinerary-10-days-1/" data-pin-description="Visiting Luxor Temple for sunset and at night meant more crowds but was worth it. Click here for the ultimate Egypt travel guide with a full 10 day Egypt itinerary. #egypt #travel #luxor #instagramfeed #travelguide | best places to visit in Egypt | Egypt travel itinerary | Egypt in 10 days | Egypt travel tips | Egypt photography | Egypt pyramids |   Egypt outfits | things to do in Egypt | what to wear in Egypt | things to do in Luxor Egypt | Luxor Temple Egypt | Luxor Instagram pictures" height="1800" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisahomsy.com/wp-content/uploa </span><h3 data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Visiting Al-Mustafa Mosque in Egypt</span></h3><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">We flew out from Cairo and landed in Sharm El Sheikh around 10am. We were supposed to drive straight to Dahab about an hour away. However, in researching, we came across this incredible mosque in Sharm El Sheikh, that we had to see for ourselves. </span></p><span data-dcnode-id="2710" instrument_node="">

</span><h3 data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Experiencing a Bedouin Dinner</span></h3><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">At night we went into the mountains for a traditional BBQ Bedouin dinner under the stars. It was so good! Not only was the food they prepared delicious but I was also among great company. It was such a great experience and really bonded us as a group!</span></p><span data-dcnode-id="2677" instrument_node="">
</span><h2 data-dcnode-id="2672"><span class="ez-toc-section" data-dcnode-id="2676" id="Day_9_-_Diving_in_Dahab"></span><strong data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Day 9 – Diving in Dahab</span></strong><span class="ez-toc-section-end" data-dcnode-id="2673"></span></h2><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">I was so excited for this morning. We got to go diving in the Red Sea! Did you know that there are only two places in the world that have a blue hole and Egypt is one of them? </span></p><span data-dcnode-id="2668" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2661"><span class="dpsp-pin-it-wrapper wp-image-2884" data-dcnode-id="2664"><img alt="Two people diving in the Blue Hole in Dahab, Egypt in the Red Sea." class="" data-attachment-id="2884" data-comments-opened="1" data-dcnode-id="2667" data-image-caption="<p>OLYMPUS DIGITAL CAMERA</p>

</span><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Two of us from the group were certified scuba divers so we went off while the rest of the group did an intro to diving course. Ever since I got certified I have wanted to dive in the Red Sea. Egypt is even beautiful underwater with the reefs and bright-colored fish. But I will say that the coral was a little more bleached than I had hoped it would be. </span></p><span data-dcnode-id="2657" instrument_node="">

</span><p data-dcnode-id="2628"></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">The town of Dahab is a tiny little beach town, with a laid back island vibe. I was pretty surprised to see girls walking in bikinis, guys walking barefoot carrying surfboards. It felt like a little piece of Tulum with some Egyptian flare. I found a new vegan cafe spot that just opened up, and we all got yummy smoothies. I also bought the biggest and juiciest fresh mango to eat at breakfast the next day!</span></p><span data-dcnode-id="2624" instrument_node="">

</span><h2 data-dcnode-id="2611"><span class="ez-toc-section" data-dcnode-id="2615" id="Day_10_-_Dahab_to_Cairo"></span><strong data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Day 10 – Dahab to Cairo</span></strong><span class="ez-toc-section-end" data-dcnode-id="2612"></span></h2><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2609" instrument_node="">We had breakfast at our hotel, </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/eg/dahab-paradise.en.html%3Faid%3D1658084%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="2608" instrument_node="">Dahab Paradise</span></a><span data-dcnode-id="2606" instrument_node="">, before flying back to Cairo for our last day. I asked the hotel staff to cut up the fresh mangoes I had bought the day before and I ate them before we took off. They were some of the best mangoes I’ve ever had! </span></p><span data-dcnode-id="2604" instrument_node="">
