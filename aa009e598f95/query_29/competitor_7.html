</span><p data-dcnode-id="2649"><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">Kick things off in true Cartagena style with a stroll through the sun-drenched streets of Cartagena with a knowledgeable local guide showing you the best places to eat, drink, and play on the way. After taking in Cartagena’s captivating history for a few hours, sample the coast’s premium ceviches.</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Once you’ve ticked off the must-see sights on your first couple of days, get ready to really immerse yourself in the authentic life of a Cartagenera. You’ll take a voyage through the grass-roots neighborhoods of Cartagena before heading back to your hotel for a quick siesta before a night of salsa.</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2644" instrument_node="">And no trip to the Caribbean is complete without a visit to paradise, so spend your last day taking in the sun on the Rosario Islands, a beautiful archipelago made up of 30 idyllic islands. Then, celebrate the last night of your trip in one of Cartagena’s top restaurants.&nbsp;</span><strong data-dcnode-id="2639" style="font-size:0.9rem;"><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/best-of-cartagena-5-day-itinerary"><span data-dcnode-id="2643" instrument_node="">Learn</span></a><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/best-of-cartagena-5-day-itinerary"><span data-dcnode-id="2641" instrument_node=""> more</span></a></strong></p><span data-dcnode-id="2637" instrument_node="">

</span><p data-dcnode-id="2438"><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">The undiscovered region of Chocó on Colombia's Pacific coast takes center stage in this 5-day trip, where you'll have time to explore the massive Utría National Park. This lush rainforest has some of the highest rainfall in the world, so expect to see amazing flora and fauna.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2436" instrument_node="">The park also protects the coastal marine environment and is known for humpback whales and nesting sea turtles (and these empty beaches are great for surfing). Start and end the trip exploring scenic Medellín—one of Latin America's most exciting cities—to round out this awesome Colombian adventure.&nbsp;</span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/medellin-the-wild-pacific-coast-5-days-5-day-itinerary"><strong data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Learn more</span></strong></a></p><span data-dcnode-id="2431" instrument_node="">

data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Medellín</span></td></tr></tbody></table><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2335"><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node="">Experience a taste of Colombian culture on this 5-day trip to the Coffee Triangle. You'll go to the heart of the country's coffee region in charming Salento for an overnight at a working farm and hike through the picturesque green mountains of the Cocora Valley (and the famous wax palms).</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node="">Then, head to Manizales, the most&nbsp;adventurous&nbsp;of the three&nbsp;cities&nbsp;that make up Colombia's&nbsp;coffee triangle, where you'll visit the Rio Blanco Nature reserve.&nbsp; Like the coffee this region is known for, this trip is designed to awaken all of your senses. </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/explore-zona-cafetera-5-days"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Learn more</span></strong></a></p><span data-dcnode-id="2328" instrument_node="">

</span><p data-dcnode-id="2236"><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">One of the best aspects of visiting Cartagena on Colombia's northern coast is having close proximity to nearby Caribbean Islands for the ultimate culture/beach adventure. On this 5-day trip, you'll start off experiencing the city's narrow streets with palaces, churches, and mansions painted in pastel colors (not to mention hip hotels and galleries that are popping up).</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2229"><span data-dcnode-id="2234" instrument_node="">Then, boat over to San Bernardo's beautiful coral islands for white-sand beaches and watersports. Finish the adventure back in Cartagena for one more night of colonial romance. </span><strong data-dcnode-id="2230"><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/c/cartagena-the-san-bernardo-islands-5-days"><span data-dcnode-id="2233" instrument_node="">Learn more</span></a><br data-dcnode-id="2231"></strong></p><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2227" instrument_node="">For more Colombia trip ideas, </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kimkim.com/sc/colombia-5-day-tours"><span data-dcnode-id="2226" instrument_node="">check out all of our 5-day tours and itineraries</span></a><span data-dcnode-id="2224" instrument_node="">.</span></p><span data-dcnode-id="2222" instrument_node="">
