</span><figure aria-describedby="caption-attachment-3563" class="wp-caption aligncenter" data-dcnode-id="3298" id="attachment_3563" style="width: 900px"><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge.jpg"><img alt="Brooklyn Bridge 4 Day NYC itinerary. " class="size-full wp-image-3563" data-dcnode-id="3302" height="900" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge.jpg 900w, https://www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge-150x150.jpg 150w, https://www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge-300x300.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/11/Brooklyn-Bridge-768x768.jpg 768w" width="900"></a><figcaption class="wp-caption-text" data-dcnode-id="3299" id="caption-attachment-3563"><span data-dcnode-id="3300" instrument_node="">A trip to New York City is a must for teens who crave the energy of the city Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3292"><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelingmom.com/family-vacations/san-diego-family-vacations/top-teen-destination/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">New York City</span></strong></a><span data-dcnode-id="3293" instrument_node="">&nbsp;a nonstop destination that tops the must do list for teens. It offers an energy that teens crave. Pack some comfy walking shoes since NYC offers urban trekking at its finest. I lived in NYC for two years, though I didn’t introduce my kids to the metropolis until they could walk all day without whining.&nbsp;In a city that never slows down, travel lessons abound. The skills I learned in NYC helped me navigate any city in the world. Find&nbsp;museums to parks and shopping to snacking, New York City offers a week of fun with teens in this 4 day NYC itinerary.</span></p><span data-dcnode-id="3291" instrument_node="">
</span><h2 data-dcnode-id="3287"><span data-dcnode-id="3288" id="Top_Attractions_in_that_4_day_NYC_Itinerary"><strong data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Top Attractions in that 4 day NYC Itinerary</span></strong></span></h2><span data-dcnode-id="3286" instrument_node="">
</span><h2 data-dcnode-id="3282"><span data-dcnode-id="3283" id="Day_One_Downtown_Manhattan_with_Kids"><strong data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">Day One Downtown Manhattan with Kids</span></strong></span></h2><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Start at the southern tip of Manhattan and see the oldest part of New York City first. Catch a ferry to the Statue of Libery and see some of &nbsp;best views. A must for families along with most visitor to NYC.</span></p><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3273"><strong data-dcnode-id="3275"><em data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="3274" instrument_node=""> All the destinations are walkable so put on the walking shoes and grab a bottle of water to explore. An umbrella and a rain jacket are great additions to your backpack too.</span></p><span data-dcnode-id="3272" instrument_node="">
</span><figure aria-describedby="caption-attachment-3537" class="wp-caption aligncenter" data-dcnode-id="3267" id="attachment_3537" style="width: 1000px"><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Statue-of-Liberty-NPS.jpg"><img alt="Visit the Statue of Liberty during your 4 day NYC itinerary." class="size-full wp-image-3537" data-dcnode-id="3271" height="750" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Statue-of-Liberty-NPS.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Statue-of-Liberty-NPS.jpg 1000w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Statue-of-Liberty-NPS-300x225.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Statue-of-Liberty-NPS-768x576.jpg 768w" width="1000"></a><figcaption class="wp-caption-text" data-dcnode-id="3268" id="caption-attachment-3537"><span data-dcnode-id="3269" instrument_node="">The Statue of Liberty is a must for your trip to NYC. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="3266" instrument_node="">
</span><h2 data-dcnode-id="3262"><span data-dcnode-id="3263" id="Statue_of_Liberty_and_Ellis_Island_-_First_Stop"><strong data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Statue of Liberty and Ellis Island – First Stop</span></strong></span></h2><span data-dcnode-id="3261" instrument_node="">
</span><h5 data-dcnode-id="3258"><strong data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">New York City Harbor</span></strong></h5><span data-dcnode-id="3257" instrument_node="">
</span><h5 data-dcnode-id="3254"><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Admission Varies based on age</span></strong></h5><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3240"><strong data-dcnode-id="3250"><em data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="3249" instrument_node=""> </span><em data-dcnode-id="3241"><span data-dcnode-id="3248" instrument_node="">Depart your hotel and grab some breakfast before heading south to the southern tip of Manhattan at Battery Park. Use MTA subway stop Whitehall St/South Ferry on the </span><strong data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">1</span></strong><span data-dcnode-id="3245" instrument_node=""> or the</span><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node=""> R </span></strong><span data-dcnode-id="3242" instrument_node="">train.</span></em></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Make the effort and visit the Statue of Liberty, especially if you are traveling with kids. When I lived in NYC I never visited it. Instead I opted to take the Staten Island Ferry to see it from the water. Don’t make my mistake.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">As a symbol of freedom and liberty known world-wide, the Statue of Liberty sits on a 12-acre island in the middle of New York Harbor. Learn about its construction in the museum under the pedestal. Then climb the stairs to the top of the pedestal or head to the crown to capture views of downtown Manhattan (additional tickets required). Take lots of pictures and stand at the base and look up at her in wonder.</span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Operated by Statue Cruises, the ferry departs from Battery Park in Lower Manhattan. Explore the Statue of Liberty first then re-board the ferry to tour Ellis Island, an additional stop. First ferry leaves at 9:00 a.m. and last one departs at 3:00 p.m. with extended hours during peak seasons. Ferry ticket required for everyone and admission based on age.</span></p><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Statue Cruises also operates a Statue of Liberty Ferry from New Jersey.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3221"><em data-dcnode-id="3223"><strong data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Note:</span></strong><span data-dcnode-id="3224" instrument_node=""> </span></em><span data-dcnode-id="3222" instrument_node="">For 2021, the pedestal and crown remained closed and theaters operate at reduced capacity.</span></p><span data-dcnode-id="3220" instrument_node="">
</span><h4 data-dcnode-id="3217"><strong data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Read More</span></strong></h4><span data-dcnode-id="3216" instrument_node="">
</span><h5 data-dcnode-id="3212"><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/lady-liberty-for-all/" rel="noopener" target="_blank"><strong data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">How to Visit the Statue of Liberty</span></strong></a></h5><span data-dcnode-id="3211" instrument_node="">
</span><h5 data-dcnode-id="3207"><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/top-10-national-park-sites-in-new-york-city/" rel="noopener" target="_blank"><strong data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Top National Park Sites in NYC</span></strong></a></h5><span data-dcnode-id="3206" instrument_node="">
</span><h5 data-dcnode-id="3202"><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/13-museum-musts-for-kids-in-nyc/" rel="noopener" target="_blank"><strong data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Best Museums in New York City</span></strong></a></h5><span data-dcnode-id="3201" instrument_node="">
</span><h2 data-dcnode-id="3197"><span data-dcnode-id="3198" id="Ellis_Island"><strong data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Ellis Island</span></strong></span></h2><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">From 1892 until 1954, Ellis Island welcomed 12 million immigrants to the United States. The Ellis Island Immigration Museum walks visitors through the facility that processed close to 5,000 people a day.</span></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Concessions are available at the Statue of Liberty National Monument and Ellis Island Museum or grab some to-go before boarding the ferry.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3185"><strong data-dcnode-id="3187"><em data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="3186" instrument_node=""> To tour both islands, give yourself the morning. Reservations are a must and book months in advance for the pedestal tour and six months in advance for the crown tour ( For 2021, the pedestal and crown remained closed and theaters operate at reduced capacity). A Junior Ranger Booklet is available. All passengers will go through airport-style security screening.</span></p><span data-dcnode-id="3184" instrument_node="">
</span><figure aria-describedby="caption-attachment-3534" class="wp-caption aligncenter" data-dcnode-id="3179" id="attachment_3534" style="width: 648px"><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Castle-Clinton-National-Monument.jpg"><img alt="Explore Castle Clinton on your 4 day NYC itinerary. " class="size-large wp-image-3534" data-dcnode-id="3183" height="536" loading="lazy" sizes="(max-width: 648px) 100vw, 648px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Castle-Clinton-National-Monument-1024x847.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Castle-Clinton-National-Monument.jpg 1024w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Castle-Clinton-National-Monument-300x248.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Castle-Clinton-National-Monument-768x635.jpg 768w" width="648"></a><figcaption class="wp-caption-text" data-dcnode-id="3180" id="caption-attachment-3534"><span data-dcnode-id="3181" instrument_node="">Next to the Statue of Liberty ferry is the Castle Clinton National Monument. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="3178" instrument_node="">
</span><h2 data-dcnode-id="3174"><span data-dcnode-id="3175" id="Castle_Clinton_and_Battery_Park_-_Second_Stop"><strong data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Castle Clinton and Battery Park – Second Stop</span></strong></span></h2><span data-dcnode-id="3173" instrument_node="">
</span><h5 data-dcnode-id="3162"><strong data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Battery Park</span></strong><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">
</span><strong data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node=""> Open Seven Days A Week From 7:45 a.m. to 5 p.m.</span></strong><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">
</span><strong data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node=""> Free</span></strong></h5><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">After disembarking the Statue Cruises ferry, explore the Castle Clinton National Monument for more immigration history, located steps from the ferry dock. For war buffs in the family, it’s also a fort from the War of 1812 with antique cannons. Junior Ranger booklets are available.</span></p><span data-dcnode-id="3158" instrument_node="">
</span><h4 data-dcnode-id="3155"><strong data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">SeaGlass Carousel</span></strong></h4><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3149"><span data-dcnode-id="3153" instrument_node="">After the history lesson, walk over to the newest carousel in New York City, </span><strong data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">SeaGlass Carousel,</span></strong><span data-dcnode-id="3150" instrument_node=""> in Battery Park. Built in 2015, hop on a fish to whirl around the pavilion to classical music. Open from Thursday to Sunday from 11 a.m. to 9 p.m. Admission is $5 per person.</span></p><span data-dcnode-id="3148" instrument_node="">
</span><p data-dcnode-id="3143"><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100349848-12148425" rel="noopener" target="_top"><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">
</span><img alt="" border="0" class="aligncenter" data-dcnode-id="3145" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tqlkg.com/image-100349848-12148425&amp;raw" width="200"></a></p><span data-dcnode-id="3142" instrument_node="">
</span><h2 data-dcnode-id="3138"><span data-dcnode-id="3139" id="Walking_Tour_of_Lower_Manhattan"><strong data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Walking Tour of Lower Manhattan</span></strong></span></h2><span data-dcnode-id="3137" instrument_node="">
</span><h4 data-dcnode-id="3134"><strong data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Top Sites</span></strong></h4><span data-dcnode-id="3133" instrument_node="">
</span><ul data-dcnode-id="3101"><span data-dcnode-id="3132" instrument_node="">
</span><li data-dcnode-id="3127"><span data-dcnode-id="3131" instrument_node="">

</span></ul><span data-dcnode-id="3100" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3099" instrument_node="">Walk up Broadway from Battery Park, a quick .5-mile walk, to take some selfies at the </span><strong data-dcnode-id="3095"><em data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Charging Bull</span></em><span data-dcnode-id="3096" instrument_node=""> Statue</span></strong><span data-dcnode-id="3094" instrument_node="">, though </span><em data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Fearless Girl</span></em><span data-dcnode-id="3091" instrument_node=""> has been moved,&nbsp;Broadway at Morris St.</span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3088" instrument_node="">Continue up Broadway and walk by </span><strong data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Trinity Church</span></strong><span data-dcnode-id="3085" instrument_node="">, located at 75 Broadway at Wall St. The first church was built in 1698 and rebuilt two times. A notable building from the American Revolution and people fleeing the 9/11 attacks found shelter in the church from falling debris.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3074"><span data-dcnode-id="3082" instrument_node="">Next walk by the </span><strong data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">New York Stock Exchange</span></strong><span data-dcnode-id="3079" instrument_node=""> (NYSE), at 11 Wall St., unfortunately tours aren’t available so grab another picture. In front, find </span><em data-dcnode-id="3076"><strong data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">Fearless Girl,</span></strong></em><span data-dcnode-id="3075" instrument_node=""> the statue dipicting a 4-foot tall girl urging more women on corporate boards.</span></p><span data-dcnode-id="3073" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3072" instrument_node="">I would pick either the </span><strong data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Federal Hall National Monument</span></strong><span data-dcnode-id="3069" instrument_node=""> or the </span><strong data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">9/11 Museum</span></strong><span data-dcnode-id="3066" instrument_node=""> to tour, depending on interest and time.</span></p><span data-dcnode-id="3064" instrument_node="">
</span><figure aria-describedby="caption-attachment-3536" class="wp-caption aligncenter" data-dcnode-id="3059" id="attachment_3536" style="width: 1000px"><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Federal-Hall-NPS.jpg"><img alt="Visit Federal Hall during your 4 day NYC itinerary " class="size-full wp-image-3536" data-dcnode-id="3063" height="781" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Federal-Hall-NPS.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Federal-Hall-NPS.jpg 1000w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Federal-Hall-NPS-300x234.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Federal-Hall-NPS-768x600.jpg 768w" width="1000"></a><figcaption class="wp-caption-text" data-dcnode-id="3060" id="caption-attachment-3536"><span data-dcnode-id="3061" instrument_node="">Next to the New York Stock Exchange is Federal Hall, a National Park Site. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="3058" instrument_node="">
</span><h2 data-dcnode-id="3054"><span data-dcnode-id="3055" id="Federal_Hall_National_Monument_-_Fourth_Stop"><strong data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Federal Hall National Monument – Fourth Stop</span></strong></span></h2><span data-dcnode-id="3053" instrument_node="">
</span><h5 data-dcnode-id="3038"><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Federal Hall National Monument</span></strong><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">
</span><strong data-dcnode-id="3047" style="font-style: inherit;"><span data-dcnode-id="3048" instrument_node="">26 Wall Street</span></strong><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">
</span><strong data-dcnode-id="3043" style="font-style: inherit;"><span data-dcnode-id="3044" instrument_node="">Open Monday Through Friday From 9 a.m. To 5 p.m.</span></strong><br data-dcnode-id="3042"><span data-dcnode-id="3041" instrument_node="">
</span><strong data-dcnode-id="3039" style="font-style: inherit;"><span data-dcnode-id="3040" instrument_node="">Free</span></strong></h5><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3033"><strong data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Federal Hall</span></strong><span data-dcnode-id="3034" instrument_node=""> served as the first Capitol of the United States, the Supreme Court and the Executive Branch offices. George Washington took the oath of office as the first President of the United States at Federal Hall as well.</span></p><span data-dcnode-id="3032" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Located at 26 Wall Street, Federal Hall’s visitor center is at the Pine Street entrance. It’s open Monday through Friday from 9 a.m. to 5 p.m. During the summer, it’s open Saturdays as well. Free to enter and Junior Ranger booklets available.</span></p><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3024"><em data-dcnode-id="3026"><strong data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Note:</span></strong></em><span data-dcnode-id="3025" instrument_node=""> Federal Hall National Monument remains closed.</span></p><span data-dcnode-id="3023" instrument_node="">
</span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">To get to the 9/11 Memorial, head north from Federal Hall to Cedar St. Walk a couple of blocks west to Greenwich Street then take a right. The memorial is in the following block.</span></p><span data-dcnode-id="3020" instrument_node="">
</span><figure aria-describedby="caption-attachment-3544" class="wp-caption aligncenter" data-dcnode-id="3015" id="attachment_3544" style="width: 800px"><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/9-11-Memorial.jpg"><img alt="4 Day NYC Itinerary " class="size-full wp-image-3544" data-dcnode-id="3019" height="600" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/9-11-Memorial.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/9-11-Memorial.jpg 800w, https://www.carfulofkids.com/wp-content/uploads/2017/10/9-11-Memorial-300x225.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/9-11-Memorial-768x576.jpg 768w" width="800"></a><figcaption class="wp-caption-text" data-dcnode-id="3016" id="caption-attachment-3544"><span data-dcnode-id="3017" instrument_node="">Take a moment and remember those who lost their life on that day. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="3014" instrument_node="">
</span><h2 data-dcnode-id="3010"><span data-dcnode-id="3011" id="911_Memorial_and_Museum_-_Fifth_Stop"><strong data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">9/11 Memorial and Museum – Fifth Stop</span></strong></span></h2><span data-dcnode-id="3009" instrument_node="">
</span><h5 data-dcnode-id="3006"><strong data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">180 Greenwich St.</span></strong></h5><span data-dcnode-id="3005" instrument_node="">
</span><h5 data-dcnode-id="3002"><strong data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">9/11 Memorial</span></strong></h5><span data-dcnode-id="3001" instrument_node="">
</span><h5 data-dcnode-id="2998"><strong data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Open from 10 a.m. to 5 p.m. </span></strong></h5><span data-dcnode-id="2997" instrument_node="">
</span><h5 data-dcnode-id="2994"><strong data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Free</span></strong></h5><span data-dcnode-id="2993" instrument_node="">
</span><h5 data-dcnode-id="2990"><strong data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">9/11 Museum</span></strong></h5><span data-dcnode-id="2989" instrument_node="">
</span><h5 data-dcnode-id="2984"><strong data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Open from&nbsp;</span></strong><strong data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">10 a.m. to 5 p.m.</span></strong></h5><span data-dcnode-id="2983" instrument_node="">
</span><h5 data-dcnode-id="2980"><strong data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Admission depending on age, 6 and under free</span></strong></h5><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2973"><strong data-dcnode-id="2976"><em data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">How to get there: </span></em></strong><em data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">For the 9/11 Memorial, head north from Federal Hall to Cedar St. Walk a couple of blocks west to Greenwich Street then take a right. The memorial is in the following block.</span></em></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">As a former American Airlines flight attendant that lived through that horrific day, I visit the 9/11 Memorial to remember my former colleagues. The memorial is somber space that gives visitors a place to reflect.</span></p><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">For visitors with more time, reserve tickets to the </span><strong data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">9/11 Museum</span></strong><span data-dcnode-id="2965" instrument_node="">, located steps from the memorial. It uses artifacts from the World Trade Center and actual recordings of emergency calls. Touring the museum is an emotional experience though the area around the WTC has recovered, experiencing a rebirth.</span></p><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2958"><strong data-dcnode-id="2960"><em data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2959" instrument_node=""> Please be respectful of other visitors at the Memorial and Museum. Advance reservations required.</span></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Time to eat so head to a downtown NYC icon.</span></p><span data-dcnode-id="2954" instrument_node="">
</span><figure aria-describedby="caption-attachment-3366" class="wp-caption aligncenter" data-dcnode-id="2949" id="attachment_3366" style="width: 648px"><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/07/Katz-Deli-Pastrami.jpg"><img alt="Where to eat in NYC with teens, try Katz's for pastrami on rye." class="size-large wp-image-3366" data-dcnode-id="2953" height="864" loading="lazy" sizes="(max-width: 648px) 100vw, 648px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/07/Katz-Deli-Pastrami-768x1024.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/07/Katz-Deli-Pastrami.jpg 768w, https://www.carfulofkids.com/wp-content/uploads/2017/07/Katz-Deli-Pastrami-225x300.jpg 225w" width="648"></a><figcaption class="wp-caption-text" data-dcnode-id="2950" id="caption-attachment-3366"><span data-dcnode-id="2951" instrument_node="">The pastrami on rye is a NYC icon though teens might not get it. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2948" instrument_node="">
</span><h2 data-dcnode-id="2942"><span data-dcnode-id="2943" id="Dinner_at_Katzs_Delicatessen_-_Sixth_Stop"><strong data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Dinner at Katz’s </span></strong><strong data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Delicatessen – Sixth Stop</span></strong></span></h2><span data-dcnode-id="2941" instrument_node="">
</span><h5 data-dcnode-id="2935"><strong data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Katz’s Delicatessen</span></strong><strong data-dcnode-id="2936"><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">
205 E. Houston St. </span></strong></h5><span data-dcnode-id="2934" instrument_node="">
</span><h5 data-dcnode-id="2931"><strong data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">Open 8 a.m. to 10:45 p.m.</span></strong></h5><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2920"><strong data-dcnode-id="2927"><em data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="2926" instrument_node=""> </span><em data-dcnode-id="2921"><span data-dcnode-id="2925" instrument_node="">Walk east along Cortlandt St. to the MTA Fulton St. Station for the Brooklyn-bound</span><strong data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node=""> J</span></strong><span data-dcnode-id="2922" instrument_node=""> train (it will be headed north). Exit the Essex St. Station and walk north along Essex Street to 205 E. Houston St.</span></em></p><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2915"><strong data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Katz’s Delicatessen</span></strong><span data-dcnode-id="2916" instrument_node=""> is an NYC icon. The pastrami-on-rye sandwiches are pricey but I ordered half and got a bowl of Matzo ball soup. This location is as original as it gets, with locals dining alongside the travelers.</span></p><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2909"><strong data-dcnode-id="2911"><em data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2910" instrument_node=""> You can order at the counter and seat yourself or sit at a table with table service. Don’t lose the paper ticket the waiter gives you, you will have to hand it to the person working the door.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Time for dessert so walk to Little Italy.</span></p><span data-dcnode-id="2905" instrument_node="">
</span><figure aria-describedby="caption-attachment-3538" class="wp-caption aligncenter" data-dcnode-id="2900" id="attachment_3538" style="width: 800px"><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Ferrara-Cappaccino.jpg"><img alt="Have dessert in Little Italy on your 4 day NYC itinerary. " class="size-full wp-image-3538" data-dcnode-id="2904" height="838" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Ferrara-Cappaccino.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Ferrara-Cappaccino.jpg 800w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Ferrara-Cappaccino-286x300.jpg 286w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Ferrara-Cappaccino-768x804.jpg 768w" width="800"></a><figcaption class="wp-caption-text" data-dcnode-id="2901" id="caption-attachment-3538"><span data-dcnode-id="2902" instrument_node="">Grab a seat and a cappuccino in Little Italy. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2899" instrument_node="">
</span><h2 data-dcnode-id="2895"><span data-dcnode-id="2896" id="Dessert_in_Little_Italy_-_Seventh_Stop"><strong data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Dessert in Little Italy – Seventh Stop</span></strong></span></h2><span data-dcnode-id="2894" instrument_node="">
</span><h5 data-dcnode-id="2891"><strong data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Ferrara Italian Bakery</span></strong></h5><span data-dcnode-id="2890" instrument_node="">
</span><h5 data-dcnode-id="2887"><strong data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">195 Grand St. </span></strong></h5><span data-dcnode-id="2886" instrument_node="">
</span><h5 data-dcnode-id="2883"><strong data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Open Monday to Thursday from 10 a.m. to 9 p.m. Friday and Saturday from 9 a.m. to 11 p.m. and Sunday from 9 a.m. to 9 p.m.</span></strong></h5><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2875"><strong data-dcnode-id="2879"><em data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="2878" instrument_node=""> </span><em data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">From Katz’s Deli, walk south on Orchard St. for two blocks until Grand St. and head west eight blocks (about half a mile).</span></em></p><span data-dcnode-id="2874" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2873" instrument_node="">Stop at </span><strong data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Ferrara Italian Bakery </span></strong><span data-dcnode-id="2870" instrument_node="">for a cappuccino and cannoli&nbsp;fix with table service. Or grab a gelato on the street and walk around Little Italy as it sparkles at night.</span></p><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2867" instrument_node="">Time to head back to your hotel so grab one of the three MTA Subways at Canal Street with service on the </span><strong data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">N</span></strong><span data-dcnode-id="2864" instrument_node="">, </span><strong data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">6</span></strong><span data-dcnode-id="2861" instrument_node="">, </span><strong data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Q</span></strong><span data-dcnode-id="2858" instrument_node="">, </span><strong data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Z</span></strong><span data-dcnode-id="2855" instrument_node=""> trains.</span></p><span data-dcnode-id="2853" instrument_node="">

</span><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Fill up your culture tank and head to Midtown. &nbsp;Midtown offers all the big city thrills one expects from a trip to NYC. Wear the walking shoes and the Broadway shows that appeal to families don’t require dressy outfits.</span></p><span data-dcnode-id="2820" instrument_node="">
