</span><h5 data-dcnode-id="2798"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Rockefeller Center</span></strong><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">
</span><strong data-dcnode-id="2803" style="font-style: inherit;"><span data-dcnode-id="2804" instrument_node="">45 Rockefeller Plaza</span></strong><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">
</span><strong data-dcnode-id="2799" style="font-style: inherit;"><span data-dcnode-id="2800" instrument_node="">Free, Tours Additional Admission</span></strong></h5><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2781"><strong data-dcnode-id="2794"><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="2793" instrument_node=""> </span><em data-dcnode-id="2782"><span data-dcnode-id="2792" instrument_node="">After breakfast near the hotel, take the MTA subway</span><strong data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node=""> D</span></strong><span data-dcnode-id="2789" instrument_node=""> or </span><strong data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">F</span></strong><span data-dcnode-id="2786" instrument_node=""> and exit the 47-50</span><sup data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">th</span></sup><span data-dcnode-id="2783" instrument_node=""> St./Rockefeller Center Stop.</span></em></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Developed by the Rockefeller family, it’s a complex of buildings and outdoor space in Midtown. In addition to the buildings, find a summertime cafe and a wintertime ice skating rink. Inside and out find quick service food outlets and shopping like the LEGO store. Though one of the top activities is checking out the NYC skyline for the observation tower.</span></p><span data-dcnode-id="2777" instrument_node="">
</span><h4 data-dcnode-id="2774"><strong data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Top of the Rock</span></strong></h4><span data-dcnode-id="2773" instrument_node="">
</span><h5 data-dcnode-id="2770"><strong data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Admission based on age</span></strong></h5><span data-dcnode-id="2769" instrument_node="">
</span><h5 data-dcnode-id="2766"><strong data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Open daily from 10 a.m. to 10 p.m.</span></strong></h5><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">After reserving tickets online, bypass the ticket line for the Top of the Rock. After a quick elevator ride, explore three different floors all with incredible views. With the best views of Central Park, this is also the best way to see landmarks like the Chrysler Building and Empire State Building.</span></p><span data-dcnode-id="2762" instrument_node="">
</span><h4 data-dcnode-id="2759"><strong data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Radio City Music Hall</span></strong></h4><span data-dcnode-id="2758" instrument_node="">
</span><h5 data-dcnode-id="2755"><strong data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Admission based on age, reservations highly recommended</span></strong></h5><span data-dcnode-id="2754" instrument_node="">
</span><h5 data-dcnode-id="2751"><strong data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Open daily from 9:30 a.m. to 5 p.m.</span></strong></h5><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node="">Next, tour the legendary theater and home to the </span><em data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Rockettes</span></em><span data-dcnode-id="2746" instrument_node="">. After the Top of the Rock tour, stay at Rockefeller Center and tour Radio City Music Hall. Art Deco theater features rich architectural details from a bygone era along with some of Bob Mackie’s Rockettes costumes.</span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2739"><em data-dcnode-id="2741"><strong data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Note:</span></strong></em><span data-dcnode-id="2740" instrument_node=""> Tours not offered until July 2021 at earliest.</span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">If it’s time to feed the kids I recommend grabbing a bite at Rockefeller Center. Between the Plaza and the concourse level, I found close to 30 different places to eat.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><figure aria-describedby="caption-attachment-3532" class="wp-caption aligncenter" data-dcnode-id="2730" id="attachment_3532" style="width: 750px"><a data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Starry-Night-MoMA.jpg"><img alt="Visit the MoMA during your 4 day NYC itinerary." class="size-full wp-image-3532" data-dcnode-id="2734" height="650" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Starry-Night-MoMA.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Starry-Night-MoMA.jpg 750w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Starry-Night-MoMA-300x260.jpg 300w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="2731" id="caption-attachment-3532"><span data-dcnode-id="2732" instrument_node="">Take in the art at the MoMA, like Starry Night by Van Gogh. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2729" instrument_node="">
</span><h2 data-dcnode-id="2725"><span data-dcnode-id="2726" id="Museum_of_Modern_Art_MoMA_-_Second_Stop"><strong data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Museum of Modern Art MoMA — Second Stop</span></strong></span></h2><span data-dcnode-id="2724" instrument_node="">
</span><h5 data-dcnode-id="2713"><strong data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">11 W. 53th St.</span></strong><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">
</span><strong data-dcnode-id="2718" style="font-style: inherit;"><span data-dcnode-id="2719" instrument_node="">Open From Daily10:30 a.m. To 5:30 p.m., 7p.m. on Saturdays.</span></strong><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">
</span><strong data-dcnode-id="2714" style="font-style: inherit;"><span data-dcnode-id="2715" instrument_node="">Admission For Adults, Kids Under 16 Free. Timed Entry reservations required</span></strong></h5><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2699"><strong data-dcnode-id="2709"><em data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="2708" instrument_node=""> </span><em data-dcnode-id="2700"><span data-dcnode-id="2707" instrument_node="">From Rockefeller Center, walk .5-mile north along 5</span><sup data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">th</span></sup><span data-dcnode-id="2704" instrument_node=""> or 6</span><sup data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">th</span></sup><span data-dcnode-id="2701" instrument_node=""> Avenues to the MoMA, located at 11 W. 53th St.</span></em></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">With a city full of the best art museums in the U.S. where should you start? I suggest the Museum of Modern Art, or MoMA.</span></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2694" instrument_node="">If your kids have short attention spans, head straight for the Fifth Floor. That’s where I found </span><em data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Starry Night</span></em><span data-dcnode-id="2691" instrument_node=""> by Vincent Van Gogh, </span><em data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Dance</span></em><span data-dcnode-id="2688" instrument_node=""> by Henri Matisse along with works from Andy Warhol, Frida Kahlo and Pablo Picasso.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Kids under 16 get in free and the MoMA hands out guides for family visits. Walk through the gift shop for unique souvenirs. After art comes architecture so head to a grand Gothic Cathedral located on 5th Ave.</span></p><span data-dcnode-id="2683" instrument_node="">
</span><figure aria-describedby="caption-attachment-3531" class="wp-caption aligncenter" data-dcnode-id="2678" id="attachment_3531" style="width: 648px"><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/St-Patricks-Cathedral-1.jpg"><img alt="Tour St. Patrick's Cathedral during your 4 day NYC itinerary. " class="size-large wp-image-3531" data-dcnode-id="2682" height="972" loading="lazy" sizes="(max-width: 648px) 100vw, 648px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/St-Patricks-Cathedral-1-683x1024.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/St-Patricks-Cathedral-1.jpg 683w, https://www.carfulofkids.com/wp-content/uploads/2017/10/St-Patricks-Cathedral-1-200x300.jpg 200w" width="648"></a><figcaption class="wp-caption-text" data-dcnode-id="2679" id="caption-attachment-3531"><span data-dcnode-id="2680" instrument_node="">Walk through St. Patrick’s Cathedral for one of the top architectural sites in NYC. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2677" instrument_node="">
</span><h2 data-dcnode-id="2673"><span data-dcnode-id="2674" id="St_Patricks_Cathedral_-_Third_Stop"><strong data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">St. Patrick’s Cathedral — Third Stop</span></strong></span></h2><span data-dcnode-id="2672" instrument_node="">
</span><h5 data-dcnode-id="2649"><strong data-dcnode-id="2668"><span data-dcnode-id="2671" instrument_node="">Fifth Ave. Between 50</span><sup data-dcnode-id="2669" style="font-style: inherit; font-weight: inherit;"><span data-dcnode-id="2670" instrument_node="">th &nbsp;</span></sup></strong><strong data-dcnode-id="2664"><span data-dcnode-id="2667" instrument_node="">nd 51</span><sup data-dcnode-id="2665" style="font-style: inherit; font-weight: inherit;"><span data-dcnode-id="2666" instrument_node="">st</span></sup></strong><strong data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">St.</span></strong><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">
</span><strong data-dcnode-id="2658" style="font-style: inherit;"><span data-dcnode-id="2659" instrument_node="">Open&nbsp;</span></strong><strong data-dcnode-id="2656" style="font-style: inherit;"><span data-dcnode-id="2657" instrument_node="">Monday to Friday from</span></strong><strong data-dcnode-id="2654" style="font-style: inherit;"><span data-dcnode-id="2655" instrument_node="">&nbsp;6:30 a.m.to 2 p.m., Saturday 7:30 a.m. to 6:30 p.m. and Sunday from 9 a.m. to 5 p.m.</span></strong><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">
</span><strong data-dcnode-id="2650" style="font-style: inherit;"><span data-dcnode-id="2651" instrument_node="">Free</span></strong></h5><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2642"><strong data-dcnode-id="2645"><em data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">How to get there:&nbsp;</span></em></strong><em data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">From the MoMA, walk three blocks down Fifth Ave. to 51st St.</span></em></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Regardless of religion, St. Patrick’s is one of the pieces of architecture. Take a few minutes and walk through the Neo Gothic Cathedral in the center of midtown. During my last visit, I saw a girls’ choir performing and the acoustics were unbelievable.</span></p><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Up next, walk .5-mile to a grand train station and some dinner.</span></p><span data-dcnode-id="2635" instrument_node="">
</span><figure aria-describedby="caption-attachment-3525" class="wp-caption aligncenter" data-dcnode-id="2630" id="attachment_3525" style="width: 950px"><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Grand-Central-Terminal.jpg"><img alt="Walk through Grand Central Terminal during your 4 day NYC itinerary. " class="size-full wp-image-3525" data-dcnode-id="2634" height="766" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Grand-Central-Terminal.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Grand-Central-Terminal.jpg 950w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Grand-Central-Terminal-300x242.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Grand-Central-Terminal-768x619.jpg 768w" width="950"></a><figcaption class="wp-caption-text" data-dcnode-id="2631" id="caption-attachment-3525"><span data-dcnode-id="2632" instrument_node="">Grand Central Terminal is a transportation hub along with a top tourist attraction. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2629" instrument_node="">
</span><h2 data-dcnode-id="2625"><span data-dcnode-id="2626" id="Grand_Central_Terminal_-_Fourth_Stop"><strong data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Grand Central Terminal — Fourth Stop</span></strong></span></h2><span data-dcnode-id="2624" instrument_node="">
</span><h5 data-dcnode-id="2609"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">89 E. 42nd St.</span></strong><br data-dcnode-id="2621"><span data-dcnode-id="2620" instrument_node="">
</span><strong data-dcnode-id="2618" style="font-style: inherit;"><span data-dcnode-id="2619" instrument_node="">Terminal Open From 5:30 a.m. To 2 a.m.</span></strong><br data-dcnode-id="2617"><span data-dcnode-id="2616" instrument_node="">
</span><strong data-dcnode-id="2614" style="font-style: inherit;"><span data-dcnode-id="2615" instrument_node="">Dining Concourse Open From 7 a.m. To 9 p.m. Monday Through Saturday, Sunday 11 a.m. To 7 p.m.</span></strong><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">
</span><strong data-dcnode-id="2610" style="font-style: inherit;"><span data-dcnode-id="2611" instrument_node="">Free To Enter</span></strong></h5><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2601"><strong data-dcnode-id="2604"><em data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">How to get there:</span></em><span data-dcnode-id="2605" instrument_node=""> </span></strong><em data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">From St. Patrick’s, walk down 5th Ave for seven blocks to 43rd St. then walk east for two blocks.</span></em></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Walk through the Beaux Arts Masterpiece and my favorite building in New York City. As the largest train terminal in the world, Grand Central Terminal is a top destination for locals and travelers with dining and shopping along with commuter trains and subways.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">The ceiling of the main concourse features an astronomical ceiling, a four-sided brass clock and Tennessee marble was used for the stairs and the floor. The exterior features granite with expanses of divided-light windows and sculptures.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2593" instrument_node="">Lots of options for dining, </span><strong data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">The Oyster Bar</span></strong><span data-dcnode-id="2590" instrument_node="">, is the oldest business in Grand Central and offers an iconic NYC dining spot. Or walk to the concourse level for more casual dining, with options like </span><strong data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Shake Shack</span></strong><span data-dcnode-id="2587" instrument_node=""> and </span><strong data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Jaquest Torres Ice Cream</span></strong><span data-dcnode-id="2584" instrument_node="">. Grand Central Market offers prepared food, coffee, cut flowers and specialty food items.</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">After dinner, it’s time to see a Broadway show. If this is your kids’ first theater production, I recommend a Disney on Broadway show.</span></p><span data-dcnode-id="2579" instrument_node="">
</span><figure aria-describedby="caption-attachment-3522" class="wp-caption aligncenter" data-dcnode-id="2574" id="attachment_3522" style="width: 700px"><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Alladin-on-Broadway.jpg"><img alt="See a Broadway show during your 4 day NYC itinerary. " class="size-full wp-image-3522" data-dcnode-id="2578" height="944" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Alladin-on-Broadway.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Alladin-on-Broadway.jpg 700w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Alladin-on-Broadway-222x300.jpg 222w" width="700"></a><figcaption class="wp-caption-text" data-dcnode-id="2575" id="caption-attachment-3522"><span data-dcnode-id="2576" instrument_node="">If it’s your family’s first theater experience, I recommend a Disney production. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2573" instrument_node="">
</span><h2 data-dcnode-id="2569"><span data-dcnode-id="2570" id="Theater_District_for_a_Show_-_Fifth_Stop"><strong data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Theater District for a Show — Fifth Stop</span></strong></span></h2><span data-dcnode-id="2568" instrument_node="">
</span><h5 data-dcnode-id="2565"><strong data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">The theater district runs from 40th to 54th Streets and from 6th to 8th Avenues.</span></strong></h5><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2554"><strong data-dcnode-id="2561"><em data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">How to get there:</span></em></strong><span data-dcnode-id="2560" instrument_node=""> </span><em data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">Grab a MTA </span><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">S</span></strong><span data-dcnode-id="2556" instrument_node=""> Train in Grand Central Terminal and exit at Times Square Station.</span></em></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">With audiences full of families, a Disney on Broadway production is my choice for kids’ first theater performance. Packed with tunes they know by heart, elaborate sets and glittering costumes, kids stay glued to their seats. During my last visit, we saw Aladdin.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2545"><strong data-dcnode-id="2547"><em data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2546" instrument_node=""> Sure, you can hope for last-minute reduced seats though I reserved my seats way before my trip to ensure my family sat together.</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2538"><em data-dcnode-id="2540"><strong data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Note:</span></strong><span data-dcnode-id="2541" instrument_node=""> </span></em><span data-dcnode-id="2539" instrument_node="">Broadway performances will resume Fall 2021.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2532"><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100349848-12148425" rel="noopener" target="_top"><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">
</span><img alt="" border="0" class="aligncenter" data-dcnode-id="2534" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tqlkg.com/image-100349848-12148425&amp;raw" width="200"></a></p><span data-dcnode-id="2531" instrument_node="">
</span><h2 data-dcnode-id="2527"><span data-dcnode-id="2528" id="Times_Square_-_Sixth_Stop"><strong data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Times Square – Sixth Stop</span></strong></span></h2><span data-dcnode-id="2526" instrument_node="">
</span><h5 data-dcnode-id="2521"><span data-dcnode-id="2525" instrument_node="">Intersection of Broadway and 7</span><sup data-dcnode-id="2523" style="font-style: inherit; font-weight: inherit;"><span data-dcnode-id="2524" instrument_node="">th</span></sup><span data-dcnode-id="2522" instrument_node="">Avenue</span></h5><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">After a show, celebrate a great trip with the brightest lights in the city. The best time to walk through Time Square is after dark. Times Square also features street performers and lots of shopping.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2488"><strong data-dcnode-id="2514"><em data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2513" instrument_node=""> Times Square is also a major MTA subway stop with service on the&nbsp;</span><strong data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">N</span></strong><span data-dcnode-id="2510" instrument_node="">,</span><strong data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Q</span></strong><span data-dcnode-id="2507" instrument_node="">,</span><strong data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">R</span></strong><span data-dcnode-id="2504" instrument_node="">,</span><strong data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">S</span></strong><span data-dcnode-id="2501" instrument_node="">,</span><strong data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">1</span></strong><span data-dcnode-id="2498" instrument_node="">,</span><strong data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">2</span></strong><span data-dcnode-id="2495" instrument_node="">,</span><strong data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">3</span></strong><span data-dcnode-id="2492" instrument_node="">, and</span><strong data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">7</span></strong><span data-dcnode-id="2489" instrument_node="">trains.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><figure aria-describedby="caption-attachment-3560" class="wp-caption aligncenter" data-dcnode-id="2482" id="attachment_3560" style="width: 750px"><a data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/11/Juniors-Times-Square.jpg"><img alt="4 Day NYC Itinerary " class="size-full wp-image-3560" data-dcnode-id="2486" height="1023" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/11/Juniors-Times-Square.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/11/Juniors-Times-Square.jpg 750w, https://www.carfulofkids.com/wp-content/uploads/2017/11/Juniors-Times-Square-220x300.jpg 220w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="2483" id="caption-attachment-3560"><span data-dcnode-id="2484" instrument_node="">My favorite New York Style cheesecake is Junior’s with large slices of creamy, not-too-sweet cheesecake and available to-go. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2481" instrument_node="">
</span><h2 data-dcnode-id="2477"><span data-dcnode-id="2478" id="Juniors_Restaurant_and_Bakery_-_Seventh_Stop"><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Junior’s Restaurant and Bakery – Seventh Stop</span></strong></span></h2><span data-dcnode-id="2476" instrument_node="">
</span><h4 data-dcnode-id="2469"><strong data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">1515 Broadway at 45th St.</span></strong><br data-dcnode-id="2473"><span data-dcnode-id="2472" instrument_node="">
</span><strong data-dcnode-id="2470" style="font-style: inherit;"><span data-dcnode-id="2471" instrument_node="">Open From 7 a.m. to 10 p.m.</span></strong></h4><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2467" instrument_node="">With all the walking, it’s time for dessert. I recommend heading north on Broadway to Junior’s for cheesecake. Topping the </span><strong data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">best cheesecake</span></strong><span data-dcnode-id="2464" instrument_node=""> list for years, it’s a dense, not-too-sweet and creamy NY-style cheesecake. I ordered the plain and didn’t share. It also holds for next day snacks if you have a refrigerator.</span></p><span data-dcnode-id="2462" instrument_node="">
</span><h2 data-dcnode-id="2458"><span data-dcnode-id="2459" id="Top_of_the_Rock_-_Eighth_Stop"><strong data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Top of the Rock – Eighth Stop</span></strong></span></h2><span data-dcnode-id="2457" instrument_node="">
</span><h4 data-dcnode-id="2446"><strong data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Rockefeller Center</span></strong><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">
</span><strong data-dcnode-id="2451" style="font-style: inherit;"><span data-dcnode-id="2452" instrument_node="">45 Rockefeller Plaza</span></strong><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">
</span><strong data-dcnode-id="2447" style="font-style: inherit;"><span data-dcnode-id="2448" instrument_node="">Free, Tours Additional Admission</span></strong></h4><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2439"><strong data-dcnode-id="2442" style="font-style: inherit;"><em data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">How to Get There:</span></em></strong><em data-dcnode-id="2440" style="font-weight: inherit;"><span data-dcnode-id="2441" instrument_node="">From 47th St. and Seventh Ave. (Times Square) walk north two blocks to 49th St. then head east for one long block to Sixth Ave.</span></em></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2437" instrument_node="">If you purchased the </span><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Sun and Stars ticket</span></strong><span data-dcnode-id="2434" instrument_node=""> at Top of the Rock, head back to the Rockefeller Center. After sun sets the crowds ease up and the lights of New York City twinkle. (Not available in 2021.)</span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2427"><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100349848-12147431" rel="noopener" target="_top"><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">
</span><img alt="" border="0" class="aligncenter" data-dcnode-id="2429" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tqlkg.com/image-100349848-12147431&amp;raw" width="250"></a></p><span data-dcnode-id="2426" instrument_node="">
</span><h2 data-dcnode-id="2422"><span data-dcnode-id="2423" id="Day_Three_-_Central_Park_NYC_Animals"><strong data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Day Three — Central Park &amp; NYC Animals</span></strong></span></h2><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Animals live in New York City, lots of them. Then find more animals at the Natural History Museum and Central Park, both favorites among kids. After learning the history of New York City and its early residents, it’s time to learn about its famous park.</span></p><span data-dcnode-id="2418" instrument_node="">
</span><figure aria-describedby="caption-attachment-3527" class="wp-caption aligncenter" data-dcnode-id="2413" id="attachment_3527" style="width: 750px"><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Natural-History-Museum.jpg"><img alt="Tour the Natural History Museum during your 4 day NYC itinerary. " class="size-full wp-image-3527" data-dcnode-id="2417" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Natural-History-Museum.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Natural-History-Museum.jpg 750w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Natural-History-Museum-225x300.jpg 225w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="2414" id="caption-attachment-3527"><span data-dcnode-id="2415" instrument_node="">A trip to the American Museum of Natural History will keep the kids engages for hours. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2412" instrument_node="">
</span><h2 data-dcnode-id="2405"><span data-dcnode-id="2406" id="American_Museum_of_Natural_History_and_the_Hayden_Planetarium_-_First_Stop"><strong data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">American Museum of Natural History and the Hayden Planetarium —</span></strong><span data-dcnode-id="2409" instrument_node=""> </span><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">First Stop</span></strong></span></h2><span data-dcnode-id="2404" instrument_node="">
</span><h5 data-dcnode-id="2389"><strong data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">American Museum Of Natural History</span></strong><br data-dcnode-id="2401"><span data-dcnode-id="2400" instrument_node="">
</span><strong data-dcnode-id="2398" style="font-style: inherit;"><span data-dcnode-id="2399" instrument_node="">Central Park West At 79th St.</span></strong><br data-dcnode-id="2397"><span data-dcnode-id="2396" instrument_node="">
</span><strong data-dcnode-id="2394" style="font-style: inherit;"><span data-dcnode-id="2395" instrument_node="">Open Wednesday to Sunday From 10 a.m. To 5:30 p.m.</span></strong><br data-dcnode-id="2393"><span data-dcnode-id="2392" instrument_node="">
</span><strong data-dcnode-id="2390" style="font-style: inherit;"><span data-dcnode-id="2391" instrument_node="">Admission Depending on Age. Timed entry reservations required</span></strong></h5><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2372"><em data-dcnode-id="2385"><strong data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">How to get there:</span></strong></em><span data-dcnode-id="2384" instrument_node=""> </span><em data-dcnode-id="2373"><span data-dcnode-id="2383" instrument_node="">After enjoying breakfast at your centrally located hotel, take the </span><strong data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">A</span></strong><span data-dcnode-id="2380" instrument_node=""> or </span><strong data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">B</span></strong><span data-dcnode-id="2377" instrument_node=""> MTA subway train and exit the 81</span><sup data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">st </span></sup><span data-dcnode-id="2374" instrument_node="">/ Museum of Natural History.</span></em></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2370" instrument_node="">A must for families, even my teen daughter spent hours exploring the</span><strong data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node=""> American Museum of Natural History</span></strong><span data-dcnode-id="2367" instrument_node=""> and the </span><strong data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Hayden Planetarium</span></strong><span data-dcnode-id="2364" instrument_node="">. A sprawling museum that could take all day so hit the highlights, like the Hall of Dinosaurs, “Lucy” the early human, the giant blue whale and the Theodore Roosevelt Rotunda along with the Hall of North American Mammals.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Carve out a little time for the Hayden Planetarium to learn more about the world beyond our atmosphere. It’s located on-site and requires an additional timed ticket.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2354"><strong data-dcnode-id="2356"><em data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2355" instrument_node=""> I recommend eating lunch at the Natural History Museum and the Museum Food Court on the lower level features family favorites. During our visit we enjoyed salads though pizza, burgers, sandwiches and a selection of desserts are available. Reserve tickets to the Hayden Planetarium before arriving to make the best use of your time.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">After exploring the museum, walk across the street to Central Park.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2342"><strong data-dcnode-id="2347"><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Tip:</span></em></strong><span data-dcnode-id="2346" instrument_node=""> First load a&nbsp;</span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nycgovparks.org/parks/central-park/map"><span data-dcnode-id="2345" instrument_node="">Central Park map </span></a><span data-dcnode-id="2343" instrument_node="">on your phone and find your phone’s compass. Even after living in New York City for several years, I still get turned around in the park since all its paths curve and meander.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><figure aria-describedby="caption-attachment-3524" class="wp-caption aligncenter" data-dcnode-id="2336" id="attachment_3524" style="width: 750px"><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Conservatory-Water.jpg"><img alt="Visit Conservatory Water during your 4 day NYC itinerary. " class="size-full wp-image-3524" data-dcnode-id="2340" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Conservatory-Water.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Conservatory-Water.jpg 750w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Conservatory-Water-225x300.jpg 225w" width="750"></a><figcaption class="wp-caption-text" data-dcnode-id="2337" id="caption-attachment-3524"><span data-dcnode-id="2338" instrument_node="">Walk to Conservatory Water to see the sailboats. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2335" instrument_node="">
</span><h2 data-dcnode-id="2331"><span data-dcnode-id="2332" id="Walking_Tour_of_Central_Park_-_Second_Stop"><strong data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Walking Tour of Central Park — Second Stop</span></strong></span></h2><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Enter Central Park right across the street from the Natural History Museum and grab some water from a street vendor lining the park’s edge.</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2326" instrument_node="">Head for the </span><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Swedish Cottage</span></strong><span data-dcnode-id="2323" instrument_node=""> and stay out of the Ramble, a thicket of woods. I used my phone’s compass to navigate out of it and I lived in the city for years.</span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2320" instrument_node="">After Swedish Cottage, walk through </span><strong data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Shakespeare’s Garden</span></strong><span data-dcnode-id="2317" instrument_node=""> and tour </span><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Belvedere Castle</span></strong><span data-dcnode-id="2314" instrument_node=""> (donations accepted for tour) to grab a NYC skyline photo from the top.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2311" instrument_node="">Next head south to </span><strong data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Conservatory Water</span></strong><span data-dcnode-id="2308" instrument_node=""> for a charming area dedicated to the young-at-heart. Rent a wind-powered sail boat ($11 for 30 minutes) or just enjoy the scenery.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><figure aria-describedby="caption-attachment-3521" class="wp-caption aligncenter" data-dcnode-id="2301" id="attachment_3521" style="width: 700px"><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Alice-in-Wonderland.jpg"><img alt="Walk through Central Park during your 4 day NYC itinerary. " class="size-full wp-image-3521" data-dcnode-id="2305" height="984" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Alice-in-Wonderland.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Alice-in-Wonderland.jpg 700w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Alice-in-Wonderland-213x300.jpg 213w" width="700"></a><figcaption class="wp-caption-text" data-dcnode-id="2302" id="caption-attachment-3521"><span data-dcnode-id="2303" instrument_node="">The Alice in Wonderland statue is another must for families. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2299" instrument_node="">The </span><strong data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Hans Christian Anderson Statue </span></strong><span data-dcnode-id="2296" instrument_node="">is close along with the </span><strong data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Alice in Wonderland Statue</span></strong><span data-dcnode-id="2293" instrument_node="">. Both offer must dos for families.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">If the kids want to paddle a boat, head to </span><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Loeb’s Boathouse</span></strong><span data-dcnode-id="2287" instrument_node=""> to rent one ($20 an hour, cash only). Then grab an ice cream cone at the Loeb Boathouse Café Express for an afternoon snack. It also serves light meals from 8 a.m. to 5 p.m.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2284" instrument_node="">Up next, </span><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Bethesda Terrance</span></strong><span data-dcnode-id="2281" instrument_node="">, Fountain and Arcade, tops for pictures of the park. If the kids need a pretzel, find a street cart near Bethesda.</span></p><span data-dcnode-id="2279" instrument_node="">
</span><figure aria-describedby="caption-attachment-3523" class="wp-caption aligncenter" data-dcnode-id="2274" id="attachment_3523" style="width: 800px"><a data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Bethesda-Terrace.jpg"><img alt="Tour Central Park during your 4 day NYC itinerary. " class="size-full wp-image-3523" data-dcnode-id="2278" height="729" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/Bethesda-Terrace.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/Bethesda-Terrace.jpg 800w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Bethesda-Terrace-300x273.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/Bethesda-Terrace-768x700.jpg 768w" width="800"></a><figcaption class="wp-caption-text" data-dcnode-id="2275" id="caption-attachment-3523"><span data-dcnode-id="2276" instrument_node="">Bethesda Terrace is a top spot in Central Park. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2272" instrument_node="">Next walk south along </span><strong data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">The Mall</span></strong><span data-dcnode-id="2269" instrument_node="">, a wide sidewalk shaded with trees. Another must for families, the 1908 </span><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Carousel</span></strong><span data-dcnode-id="2266" instrument_node=""> is open April though October from 10 a.m. to 6 p.m. Admission is $3 per person, cash only.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2263" instrument_node="">After riding the Carousel, walk by the </span><strong data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Chess and Checker House</span></strong><span data-dcnode-id="2260" instrument_node=""> and play a game. Then move on to </span><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">The Diary</span></strong><span data-dcnode-id="2257" instrument_node="">, a visitor center for Central Park.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2254" instrument_node="">Another must for families, the </span><strong data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Central Park Zoo</span></strong><span data-dcnode-id="2251" instrument_node=""> boasts a sea lion exhibit that visitors can see while walking along a free path through the zoo.</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2248" instrument_node="">Find lots of </span><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">playgrounds</span></strong><span data-dcnode-id="2245" instrument_node=""> sprinkled throughout Central Park so take a minute and let the kids play.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><h4 data-dcnode-id="2240"><strong data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Read More</span></strong></h4><span data-dcnode-id="2239" instrument_node="">
</span><h5 data-dcnode-id="2235"><strong data-dcnode-id="2236"><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theopensuitcase.com/central-park-cherry-blossoms-ny/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2238" instrument_node="">Cherry Blossoms in NYC&nbsp;</span></a></strong></h5><span data-dcnode-id="2234" instrument_node="">
</span><h2 data-dcnode-id="2230"><span data-dcnode-id="2231" id="The_Plaza_Hotel_Food_Hall_-_Third_Stop"><strong data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">The Plaza Hotel Food Hall — Third Stop</span></strong></span></h2><span data-dcnode-id="2229" instrument_node="">
</span><h5 data-dcnode-id="2218"><strong data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">The Plaza Hotel Food Hall</span></strong><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">
</span><strong data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node=""> 1 W. 59th St.</span></strong><br data-dcnode-id="2222"><span data-dcnode-id="2221" instrument_node="">
</span><strong data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node=""> Open From 11 a.m. To 8 p.m. (Temporarily closed)</span></strong></h5><span data-dcnode-id="2217" instrument_node="">

</span><p data-dcnode-id="2205"><strong data-dcnode-id="2208"><em data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">How to get there:</span></em></strong><em data-dcnode-id="2206" style="font-weight: inherit;"><span data-dcnode-id="2207" instrument_node="">From Central Park exit at its southeast corner, The Plaza Hotel is across 59th Street.</span></em></p><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2203" instrument_node="">After romping through the park for the afternoon, take a break and eat. I recommend </span><strong data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">The Plaza Hotel Food Hall</span></strong><span data-dcnode-id="2200" instrument_node="">. The food hall is around the corner from the lobby and in the basement offering lots of options for families.</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">I found sandwiches, salads and pasta in family-friendly quick service formats. Even the city’s best desserts can be found at The Plaza Food Hall, like Lady M Crepe Cakes, Billy’s Bakery and Chef Daniel Boulud’s Épicerie Boulud.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">After grabbing dessert, shop downstairs at the gift shop selling Plaza merchandise. And for Moms with girls, the Eloise Shop is a must.</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">After sitting for a bit and recharging, walk about .5-mile east on 60</span><sup data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">th</span></sup><span data-dcnode-id="2188" instrument_node=""> St. to the Roosevelt Island Tram.</span></p><span data-dcnode-id="2186" instrument_node="">

</span><h2 data-dcnode-id="2176"><span data-dcnode-id="2177" id="Roosevelt_Island_Tram_-_Fourth_Stop"><strong data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Roosevelt Island Tram — Fourth Stop</span></strong></span></h2><span data-dcnode-id="2175" instrument_node="">
</span><h5 data-dcnode-id="2172"><strong data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">At the intersection of 59th St. and 2nd Ave.</span></strong></h5><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2162"><strong data-dcnode-id="2168"><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">
</span></strong><strong data-dcnode-id="2165"><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">How to get there:</span></em></strong><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">FromThe Plaza Hotel on 59th St. walk five blocks east to Second Ave, about half a mile.</span></em></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Take the family on a tram ride for free, if you purchased a MTA MetroCard for the subway (or $4 roundtrip). The bright red tram cars climb up and over the East River to get to Roosevelt Island. Get off and re-board to return to mid-town for some of the best views of Midtown.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2157" instrument_node="">After a full day, head back to your hotel. The MTA Lexington Ave./59th St. Station offers service on the&nbsp;</span><strong data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">N</span></strong><span data-dcnode-id="2154" instrument_node="">,</span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">R</span></strong><span data-dcnode-id="2151" instrument_node="">,</span><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">4</span></strong><span data-dcnode-id="2148" instrument_node="">,</span><strong data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">5</span></strong><span data-dcnode-id="2145" instrument_node="">, and</span><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">6</span></strong><span data-dcnode-id="2142" instrument_node="">trains, two blocks from the tram station. Another day of exploring awaits in New York City.</span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2135"><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100349848-12147431" rel="noopener" target="_top"><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">
</span><img alt="" border="0" class="aligncenter" data-dcnode-id="2137" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tqlkg.com/image-100349848-12147431&amp;raw" width="250"></a></p><span data-dcnode-id="2134" instrument_node="">
</span><h2 data-dcnode-id="2130"><span data-dcnode-id="2131" id="Day_Four_More_to_Explore"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Day Four More to Explore</span></strong></span></h2><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">After three packed days, NYC still offers more neighborhoods to explore. Start the day in the trendy neighborhood of Chelsea in Lower Manhattan, packed with boutiques, foodie destinations and one of the NYC hot spots–High Line Park.</span></p><span data-dcnode-id="2126" instrument_node="">

</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Chelsea Market is a food hall and shopping complex across several floors. After grabbing a bite at any number of places for breakfast, wander around the market for unique shopping.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Head across the street to the High Line for an urban hike, a top destination.</span></p><span data-dcnode-id="2087" instrument_node="">
</span><figure aria-describedby="caption-attachment-3545" class="wp-caption aligncenter" data-dcnode-id="2082" id="attachment_3545" style="width: 700px"><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/high-Line-NYC.jpg"><img alt="Walk High Line during your 4 day NYC itinerary." class="size-full wp-image-3545" data-dcnode-id="2086" height="933" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/high-Line-NYC.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/high-Line-NYC.jpg 700w, https://www.carfulofkids.com/wp-content/uploads/2017/10/high-Line-NYC-225x300.jpg 225w" width="700"></a><figcaption class="wp-caption-text" data-dcnode-id="2083" id="caption-attachment-3545"><span data-dcnode-id="2084" instrument_node="">Explore a converted railroad platform that’s been transformed into a park. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="2081" instrument_node="">

</span><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Take the High Line to its northern end at 34</span><sup data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">th</span></sup><span data-dcnode-id="2043" instrument_node=""> St. After returning to the street level, hail a cab to the next destination, Circle Line Circles for a NYC cruise.</span></p><span data-dcnode-id="2041" instrument_node="">

</span><p data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node="">As a top destination for kids along with the American Museum of Natural History, the </span><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Intrepid Sea Air and Space Museum</span></strong><span data-dcnode-id="1912" instrument_node=""> is a must for school-age kids. Don’t let the aircraft carrier throw you off, I found more than military aircraft.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Clamber across the deck of the USS Intrepid to see a retired Concorde (I miss seeing her at JFK), and of course seeing one of the retired space shuttles is a must. The Space Shuttle Enterprise is one of several on display across the U.S.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">If you or your group doesn’t have problems with claustrophobia, explore the USS Growler, a submarine.</span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">After exploring the Intrepid and seeing the Space Shuttle, time to switch gears again. This time I offer some choices.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><figure aria-describedby="caption-attachment-3547" class="wp-caption aligncenter" data-dcnode-id="1896" id="attachment_3547" style="width: 800px"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/The-Met-NYC.jpg"><img alt="Visit The Met during your 4 day NYC itinerary. " class="size-full wp-image-3547" data-dcnode-id="1900" height="600" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/wp-content/uploads/2017/10/The-Met-NYC.jpg&amp;raw" srcset="https://www.carfulofkids.com/wp-content/uploads/2017/10/The-Met-NYC.jpg 800w, https://www.carfulofkids.com/wp-content/uploads/2017/10/The-Met-NYC-300x225.jpg 300w, https://www.carfulofkids.com/wp-content/uploads/2017/10/The-Met-NYC-768x576.jpg 768w" width="800"></a><figcaption class="wp-caption-text" data-dcnode-id="1897" id="caption-attachment-3547"><span data-dcnode-id="1898" instrument_node="">As the largest art museum in the U.S. The Met is a must for art lovers. Photo Credit: Catherine Parker</span></figcaption></figure><span data-dcnode-id="1895" instrument_node="">
</span><h2 data-dcnode-id="1892"><span data-dcnode-id="1893" id="The_Metropolitan_Museum_of_Art"><span data-dcnode-id="1894" instrument_node="">The Metropolitan Museum of Art</span></span></h2><span data-dcnode-id="1891" instrument_node="">
</span><h5 data-dcnode-id="1888"><strong data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">1000 5th Ave.</span></strong></h5><span data-dcnode-id="1887" instrument_node="">
</span><h5 data-dcnode-id="1884"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Open Thursday to Monday from 10 a.m. to 5:00 p.m.</span></strong></h5><span data-dcnode-id="1883" instrument_node="">
</span><h5 data-dcnode-id="1878"><strong data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Admission based on age, kids under 12 free.&nbsp;</span></strong><strong data-dcnode-id="1879" style="font-style: inherit;"><span data-dcnode-id="1880" instrument_node="">Timed entry reservations required</span></strong></h5><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">As the largest art museum in the U.S. you can explore </span><strong data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">The Metropolitan Museum of Art</span></strong><span data-dcnode-id="1873" instrument_node=""> all day and still not see it all. So check out the map when you enter and concentrate on your interests.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">My favorites are The Temple of Dendur, the Medieval Art for it imposing display and the American Wing. Yet don’t miss the extensive collection of European Masters.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1862"><strong data-dcnode-id="1864"><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Tip:</span></em><span data-dcnode-id="1865" instrument_node=""> </span></strong><span data-dcnode-id="1863" instrument_node="">Need a break? Grab a snack or light meal at any of the cafes located in The Met.</span></p><span data-dcnode-id="1861" instrument_node="">
</span><h2 data-dcnode-id="1858"><span data-dcnode-id="1859" id="A_Baseball_Game"><span data-dcnode-id="1860" instrument_node="">A Baseball Game</span></span></h2><span data-dcnode-id="1857" instrument_node="">
</span><h5 data-dcnode-id="1854"><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">NY Yankees Stadium</span></strong></h5><span data-dcnode-id="1853" instrument_node="">
</span><h5 data-dcnode-id="1850"><strong data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">1 E. 161 St., Bronx</span></strong></h5><span data-dcnode-id="1849" instrument_node="">
</span><h5 data-dcnode-id="1846"><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Tickets Required</span></strong></h5><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1836"><strong data-dcnode-id="1842"><em data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">How to get there:&nbsp;</span></em></strong><em data-dcnode-id="1837"><span data-dcnode-id="1841" instrument_node="">From Midtown, take the Bronx-bound </span><strong data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">D</span></strong><span data-dcnode-id="1838" instrument_node=""> train to the 161st St./Yankee Stadium Station. Yankee Stadium is just outside the subway station and for a game the subway is the best way to get to there.</span></em></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">The energy at a Yankees game could power a medium-sized city on its own. If you have baseball fans, make the effort and see a game.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">If it’s an away game, take the </span><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Classic Tour</span></strong><span data-dcnode-id="1828" instrument_node=""> instead. Led by a tour guide, visitors see all the best of Yankees Stadium, like the historic baseball artifacts. (Admission based on age.)</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1820"><em data-dcnode-id="1822"><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Tip:</span></strong><span data-dcnode-id="1823" instrument_node=""> </span></em><span data-dcnode-id="1821" instrument_node="">For baseball fans, this is a must. Check the schedule way in advance and purchase tickets before your trip. Be ready for some fun, Yankee fans are loud and the energy at the games is electric, even for non-fans.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><h2 data-dcnode-id="1815"><span data-dcnode-id="1816" id="Using_A_NYC_MetroCard_With_Kids"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Using A NYC MetroCard With Kids</span></strong></span></h2><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Use the subway to get around, a must-have skill for teens who will be exploring on their own in a few years.To explore NYC via the subway, head to the nearest subway station to purchase a MTA pay-per-ride subway card.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">I prefer to use the MetroCard vending machines but cards can be purchased at the subway station booths. The vending machines accept credit cards and usually faster than the booths, which might be closed.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Each fare is $2.75 when using a MetroCard and you get a 5% bonus when you load more than $5.50 on each card. A single ride ticket is $3 via the vending machines or booth.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The MTA unlimited passes come in 7-day and 30-day options. Stick with a pay-per-ride card unless you will ride the subway more than 14 separate times.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><h2 data-dcnode-id="1798"><span data-dcnode-id="1799" id="Tips_and_Hints_for_the_NYC_Subways"><b data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Tips and Hints for the NYC Subways</span></b></span></h2><span data-dcnode-id="1797" instrument_node="">
</span><ul data-dcnode-id="1759"><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">MetroCards can be used on subway trains and local buses.</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">$1 new card fee applies to all new cards.</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Free transfers between trains in the same station.</span></li><span data-dcnode-id="1787" instrument_node="">
</span><li data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Metro cards bend easily so keep your cards in a protected place, like a wallet.</span></li><span data-dcnode-id="1784" instrument_node="">
</span><li data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">If this is your first trip to NYC, stay away from Express trains and buses.</span></li><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Up to three kids 44″ and under can ride for free with an accompanying adult.</span></li><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Free kids usually crawl under the turnstile before the paying adult swipes their card or use the nearby accessible gate.</span></li><span data-dcnode-id="1775" instrument_node="">
</span><li data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Get a card for each person to swipe so you don’t look like a tourist. Kids 12 and older should be able to navigate swiping Metrocards and moving through turnstiles.</span></li><span data-dcnode-id="1772" instrument_node="">
</span><li data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Know if you are traveling Uptown (Bronx/Queens) or Downtown (Brooklyn). Trains and subway platforms will be labeled and maps are in each train car along with multiple spots in the subway station.</span></li><span data-dcnode-id="1769" instrument_node="">
</span><li data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Since there are lots of stairs to navigate, pack your lightest stroller.</span></li><span data-dcnode-id="1766" instrument_node="">
</span><li data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Hold hands if traveling with smaller kids, especially during peak periods.</span></li><span data-dcnode-id="1763" instrument_node="">
</span><li data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Make sure your child knows to go to a NYPD officer or MTA personnel if lost. Give kids a card with contact information in case of emergency.</span></li><span data-dcnode-id="1760" instrument_node="">
</span></ul><span data-dcnode-id="1758" instrument_node="">
</span><h2 data-dcnode-id="1755"><span data-dcnode-id="1756" id="Plan_a_Youth_Group_Trip_to_NYC"><span data-dcnode-id="1757" instrument_node="">Plan a Youth Group Trip to NYC</span></span></h2><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">Don’t rule out taking a group of kids to NYC, I did. I kept costs within budget with a week-long stay at the </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carfulofkids.com/2017/07/where-to-stay-in-new-york-city-with-a-youth-group/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1752" instrument_node="">HI Hostel on the Upper West Side</span></a><span data-dcnode-id="1750" instrument_node=""> and lots of cheap NYC eats.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">I told the teens we’re urban camping and hiking. Packed with backpacks and walking shoes, we saw the city.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><h2 data-dcnode-id="1741"><span data-dcnode-id="1742" id="Cruising"><strong data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Cruising?</span></strong></span></h2><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">New York City is a frequent port of-call for cruise ships, like Regent Seven Seas Cruises.</span></p><span data-dcnode-id="1737" instrument_node="">
