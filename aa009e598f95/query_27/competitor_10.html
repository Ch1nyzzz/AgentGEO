9" instrument_node="">Annual Events</span></span></span></span></div><article aria-label="Festivals and Events on the Big Island" class="post-143 page type-page status-publish entry" data-dcnode-id="544"><header class="entry-header" data-dcnode-id="1063"><h1 class="entry-title" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Festivals and Events on the Big Island</span></h1><div class="mobile-only entry-meta" data-dcnode-id="1064"><span data-dcnode-id="1082" instrument_node="">By </span><span class="entry-author" data-dcnode-id="1079"><span class="entry-author-name" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Love Big Island</span></span></span><span data-dcnode-id="1078" instrument_node=""> | updated </span><time class="entry-modified-time" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">November 10, 2021</span></time><p class="sidetoc-icons social" data-dcnode-id="1065"><a class="link" data-dcnode-id="1074" data-pin-color="red" data-pin-config="beside" data-pin-custom="true" data-pin-do="buttonPin" data-pin-height="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fall-events-on-the-big-island%252F%26description%3DFestivals%2520and%2520Events%2520on%2520the%2520Big%2520Island" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'pinterest'});" rel="noopener" target="_blank"><span class="icon-pinterest" data-dcnode-id="1075"></span></a><a class="link" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fall-events-on-the-big-island%252F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'facebook'});" rel="noopener" target="_blank"><span class="icon-facebook" data-dcnode-id="1073"></span></a><a class="link" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DFestivals%2520and%2520Events%2520on%2520the%2520Big%2520Island%26url%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fall-events-on-the-big-island%252F%26via%3Dlovebigisland" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'twitter'});" rel="noopener" target="_blank"><span class="icon-twitter" data-dcnode-id="1071"></span></a><a class="link" data-dcnode-id="1068" href="mailto:?subject=Festivals%20and%20Events%20on%20the%20Big%20Island&amp;body=https%3A%2F%2Fwww.lovebigisland.com%2Fall-events-on-the-big-island%2F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'email'});"><span class="icon-mail4" data-dcnode-id="1069"></span></a><a class="link" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/all-events-on-the-big-island" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'other'});"><span class="icon-share2" data-dcnode-id="1067"></span></a></p></div></header><div class="entry-content" data-dcnode-id="545"><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">List of annual events and festivals on the Big Island of Hawaii. Visit on of these events during your stay to get a unique, fun, and local experience.</span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Scroll down to festivals &amp; events in:</span></p><div class="one-third first" data-dcnode-id="1041"><ol data-dcnode-id="1042"><li data-dcnode-id="1055"><strong data-dcnode-id="1056"><a data-dcnode-id="1057" href="#january"><span data-dcnode-id="1058" instrument_node="">January</span></a></strong></li><li data-dcnode-id="1051"><strong data-dcnode-id="1052"><a data-dcnode-id="1053" href="#february"><span data-dcnode-id="1054" instrument_node="">February</span></a></strong></li><li data-dcnode-id="1047"><strong data-dcnode-id="1048"><a data-dcnode-id="1049" href="#march"><span data-dcnode-id="1050" instrument_node="">March</span></a></strong></li><li data-dcnode-id="1043"><strong data-dcnode-id="1044"><a data-dcnode-id="1045" href="#april"><span data-dcnode-id="1046" instrument_node="">April</span></a></strong></li></ol></div><div class="one-third" data-dcnode-id="1023"><ol data-dcnode-id="1024" start="5"><li data-dcnode-id="1037"><strong data-dcnode-id="1038"><a data-dcnode-id="1039" href="#may"><span data-dcnode-id="1040" instrument_node="">May</span></a></strong></li><li data-dcnode-id="1033"><strong data-dcnode-id="1034"><a data-dcnode-id="1035" href="#june"><span data-dcnode-id="1036" instrument_node="">June</span></a></strong></li><li data-dcnode-id="1029"><strong data-dcnode-id="1030"><a data-dcnode-id="1031" href="#july"><span data-dcnode-id="1032" instrument_node="">July</span></a></strong></li><li data-dcnode-id="1025"><strong data-dcnode-id="1026"><a data-dcnode-id="1027" href="#august"><span data-dcnode-id="1028" instrument_node="">August</span></a></strong></li></ol></div><div class="one-third" data-dcnode-id="1005"><ol data-dcnode-id="1006" start="9"><li data-dcnode-id="1019"><strong data-dcnode-id="1020"><a data-dcnode-id="1021" href="#september"><span data-dcnode-id="1022" instrument_node="">September</span></a></strong></li><li data-dcnode-id="1015"><strong data-dcnode-id="1016"><a data-dcnode-id="1017" href="#october"><span data-dcnode-id="1018" instrument_node="">October</span></a></strong></li><li data-dcnode-id="1011"><strong data-dcnode-id="1012"><a data-dcnode-id="1013" href="#november"><span data-dcnode-id="1014" instrument_node="">November</span></a></strong></li><li data-dcnode-id="1007"><strong data-dcnode-id="1008"><a data-dcnode-id="1009" href="#december"><span data-dcnode-id="1010" instrument_node="">December</span></a></strong></li></ol></div><hr data-dcnode-id="1004"><h2 data-dcnode-id="1002" id="january"><span data-dcnode-id="1003" instrument_node="">January:</span></h2><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">PGA Mitsubishi Electric Championship at Hualalai</span></h3><p data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">This event kicks off the PGA Championship Tour every year at the Hualalai Resort Golf Club. For more information call 800-417-2770 </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pgatour.com/champions/tournaments/mitsubishi-electric-championship-at-hualalai.html" rel="noopener" target="_blank"><span data-dcnode-id="998" instrument_node="">or visit their website</span></a><span data-dcnode-id="996" instrument_node="">.</span></p><h3 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">The Waimea Ocean Film Festival</span></h3><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">This festival brings together films, filmmakers, speakers, stories, athletes, scientists, artists and culture to the island and coast each year to fulfill the following mission:</span></p><blockquote data-dcnode-id="988"><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">“to bring a greater understanding of the ocean environment and island culture, plus build awareness that everything we do on land affects the sea, including the people whose livelihood and subsistence depends on the health of the ocean environment.”</span></p></blockquote><p data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">More information on the </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waimeaoceanfilm.org/" rel="noopener" target="_blank"><span data-dcnode-id="986" instrument_node="">website</span></a><span data-dcnode-id="984" instrument_node="">.</span></p><h3 data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Kona Annual Surf Film Festival</span></h3><p data-dcnode-id="976"><span data-dcnode-id="980" instrument_node="">A local surf film festival showing surf films from around the world. For more info see their </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.konasurffilmfestival.org/" rel="noopener" target="_blank"><span data-dcnode-id="979" instrument_node="">website</span></a><span data-dcnode-id="977" instrument_node="">.</span></p><hr data-dcnode-id="975"><h2 data-dcnode-id="973" id="february"><span data-dcnode-id="974" instrument_node="">February:</span></h2><h3 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Panaewa Stampede Rodeo</span></h3><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">Check out rodeo Hawaiian-style at this weekend event featuring an amateur competition between cowboys, cowgirls, keiki and kūpuna. Enjoy paniolo (cowboy) demonstrations, Hawaiian musical entertainment, food and craft booths. For more info call 808-937-1004 </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hawaiirodeostampede.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="969" instrument_node="">or visit their website</span></a><span data-dcnode-id="967" instrument_node="">.</span></p><h3 data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Waimea Cherry Blossom Heritage Festival</span></h3><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">This popular festival celebrates Japanese traditions and culture and includes cherry blossom viewing, music, demonstrations, exhibits, crafts, entertainment, ethnic foods, a farmers’ market and visiting performers and artisans from Japan. For more info call 808-961-8706 or see the </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Waimea-Cherry-Blossom-Heritage-Festival-195555713803758/events/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="962" instrument_node="">event calendar on facebook</span></a><span data-dcnode-id="960" instrument_node="">.</span></p><h3 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Panaewa Stampede Rodeo</span></h3><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">Check out rodeo Hawaiian-style at this weekend event featuring an amateur competition between cowboys, cowgirls, keiki and kūpuna. Enjoy paniolo (cowboy) demonstrations, Hawaiian musical entertainment, food and craft booths. For more info call 808-937-1004 </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hawaiirodeostampede.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="955" instrument_node="">or visit their website</span></a><span data-dcnode-id="953" instrument_node="">.</span></p><h3 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">South Kona (SOKO) Artists’ Studio Tour</span></h3><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">SOKO is a collective of professional artists including painters, potters, photographers, assemblage sculptors, jewelers, printmakers and mosaic artists, who share their work through this annual studio tour.</span></p><p data-dcnode-id="941"><span data-dcnode-id="947" instrument_node="">This is a self-guided tour where each artist’s studio is marked on a map of the Kona and South Kona area. The tour will be held on </span><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">February 24th &amp; 25th</span></strong><span data-dcnode-id="944" instrument_node=""> at 12 locations from Keauhou throughout Kona to Captain</span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node=""> Cook.</span></p><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">Read more about this event and see the map at </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sokoartists.com/" rel="noopener" target="_blank"><span data-dcnode-id="939" instrument_node="">www.sokoartists.com</span></a><span data-dcnode-id="937" instrument_node="">.</span></p><hr data-dcnode-id="935"><h2 data-dcnode-id="933" id="march"><span data-dcnode-id="934" instrument_node="">March:</span></h2><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Kona Brewers Festival</span></h3><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">This annual festival promotes craft brewing an microbreweries in Hawaii. Expect about 60 craft beers from Hawaii and the U.S. Mainland, plus gourmet food. Also special Brewer’s Dinner, Golf Tourney and Run for the Hops. For more info call 808-987-9196 </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//konabrewersfestival.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">or visit their website</span></a><span data-dcnode-id="927" instrument_node="">.</span></p><h3 data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Great Waikoloa Ukulele Festival</span></h3><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">Big Island ukulele enthusiasts can strum along and play their part with a great lineup of ukulele masters. Join them for laughter, love and hope. Ukulele give-aways, food booths, ukulele lessons and more. For more info </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ukulelefestivalhawaii.org/en/waikoloa.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">visit their website</span></a><span data-dcnode-id="920" instrument_node="">.</span></p><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Big Island International Marathon</span></h3><p data-dcnode-id="913"><span data-dcnode-id="916" instrument_node="">10.8 mile and 3.1 mile fun runs along the Pacific Ocean, through tropical rainforests, past rushing waterfalls and along black lava beaches to finish at the historic Hilo Bay front in one of the world most scenic marathons! For more info call 808-969-7400 </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hilomarathon.org/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="915" instrument_node="">or visit their website.</span></a></p><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Lavaman Triathlon Waikoloa</span></h3><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">Features a 1.5k swim, 40k bike, and 10k run. It was voted the Best Post-Race Party in Triathlon! With finish line nutrition, finisher medal, massage provided by Hawaiian School of Massage, live music and prize giveaways. right on Waikoloa Beach. For more info </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lavamantriathlon.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="909" instrument_node="">visit their website</span></a><span data-dcnode-id="907" instrument_node="">.</span></p><hr data-dcnode-id="905"><h2 data-dcnode-id="903" id="april"><span data-dcnode-id="904" instrument_node="">April:</span></h2><h3 data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Merrie Monarch Festival</span></h3><p data-dcnode-id="897"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">This is the most sought-after event on the Big Island!</span></strong><span data-dcnode-id="898" instrument_node=""> It is a one week-long hula celebration and competition with festivities including exhibitions, musical entertainment, arts and crafts fairs and the Miss Aloha Hula Competition and kahiko (ancient) and ‘auana (modern) hula competitions.</span></p><p data-dcnode-id="889"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Most hotels in Hilo and the surroundings will be completely booked weeks in advance</span></strong><span data-dcnode-id="894" instrument_node=""> so plan ahead if you are interested in seeing world-class hula. For more info call 808-935-9168 or visit the </span><strong data-dcnode-id="891"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.merriemonarch.com/" rel="noopener" target="_blank"><span data-dcnode-id="893" instrument_node="">Merrie Monarch website</span></a></strong><span data-dcnode-id="890" instrument_node="">.</span></p><h3 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Laupehoehoe Music Festival</span></h3><p data-dcnode-id="879"><span data-dcnode-id="886" instrument_node="">The annual Laupahoehoe Music Festival hosts an exceptional lineup of Hawaiian entertainers. Grammy recognized rising stars, veteran masters and top local bands come together for a day of </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">nonstop music and hula, island style!</span></strong><span data-dcnode-id="883" instrument_node=""> Festival food vendors will offer a wide variety of tastes and vegetarian grinds. Local craft vendors will be on site as well. For more info </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.laupahoehoemusicfestival.org/" rel="noopener" target="_blank"><span data-dcnode-id="882" instrument_node="">visit their website</span></a><span data-dcnode-id="880" instrument_node="">.</span></p><h3 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">MAMo: Maoil Arts Month</span></h3><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">This month long celebration held annually in the month of May celebrates the depth, breadth, and diversity of the Native Hawaiian arts community with a month long of different events including among others exhibits and local art markets! </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/MAMo-Maoli-Arts-Movement-120467331301327/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="875" instrument_node="">For more info check their website</span></a><span data-dcnode-id="873" instrument_node="">.</span></p><h3 data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Big Island Chocolate Festival</span></h3><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">The Big Island Chocolate Festival tries to combine all the best elements of the other chocolate festivals i.e. the chef competition for savory and sweet and People’s Choice, the chocolate symposiums and farm tours, and the live entertainment, into one.</span></p><p data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">Everyone going will taste 20-25 different samples of savory and sweet chocolate delicacies and you can also enjoy wine, Kona Brewery beer or Island Cuvee sparkling wine. For more info </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandchocolatefestival.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">visit their website</span></a><span data-dcnode-id="864" instrument_node="">.</span></p><p data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">Did you know Hawaii is the only state where cacao can be grown? And that you can visit these farms for tours and tastings? More information: </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/organic-chocolate-big-island-hawaii/"><span data-dcnode-id="861" instrument_node="">Locally grown and produced chocolate from the Big Island</span></a><span data-dcnode-id="859" instrument_node="">.</span></p><hr data-dcnode-id="857"><h2 data-dcnode-id="855" id="may"><span data-dcnode-id="856" instrument_node="">May:</span></h2><h3 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Ka’u Coffee Festival</span></h3><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">If coffee gets you going, then go to this popular festival celebrating the bean in Hawaii Island’s beautiful Ka’u district. Featuring a Coffee tasting presentation, a Ka’u coffee recipe contest, music, hula, farm tours and many stands offering local food, coffee and crafts!! Entry is free, for more info </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kaucoffeefestival.com/" rel="noopener" target="_blank"><span data-dcnode-id="851" instrument_node="">visit their website</span></a><span data-dcnode-id="849" instrument_node="">.</span></p><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">It is also possible (and a great excursion) to visit some Kona coffee farms yourself. More information: </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kona-coffee-hawaii/"><span data-dcnode-id="846" instrument_node="">Visit a Kona Coffee farm yourself</span></a><span data-dcnode-id="844" instrument_node="">.</span></p><h3 class="paragraph_style" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">May Day is Lei Day! Festival</span></h3><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">This free family event in Hilo is for residents and visitors of all ages to join in the creative and cultural tradition of making and wearing lei, which is deeply rooted in the Hawaiian culture.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">The annual event includes a lei contest, lei making demonstrations, hula performances, guided forest tours with cultural protocols for harvesting lei materials, talk story sessions, orchid and native plant sales, and food booths.</span></p><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">For more info </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.leiday.org/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="835" instrument_node=""> visit the Hilo Lei day website</span></a><span data-dcnode-id="833" instrument_node="">.</span></p><h3 data-dcnode-id="829"><span data-dcnode-id="830" lang="haw"><span data-dcnode-id="831" instrument_node="">Hawaiʻi Kuauli Pacific and Asia Festival </span></span></h3><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">3-day festival in Kona created as a </span><span data-dcnode-id="826" lang="haw"><span data-dcnode-id="827" instrument_node="">celebration of the pacific and asia featuring their cultures through song, dance, fashion and food. </span></span><span data-dcnode-id="825" instrument_node="">Events include a mixture of free and paid presentations of cultural dance expressions, culturally based education programs, food, music, fashion, art and traditional arts &amp; crafts workshops.</span></p><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">More information on the </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hikuauli.com/" rel="noopener" target="_blank"><span data-dcnode-id="822" instrument_node="">Hawai’i Kuauli website</span></a><span data-dcnode-id="820" instrument_node="">.</span></p><h3 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Western Week in Honoka’a</span></h3><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Western Week is a celebration of the local paniolo culture and farming heritage of Honoka’a. This is a one-week event including a Western Week Parade, rodeos, a saloon girl contest, the Hamakua Harvest Farm Festival (see next event), and more.</span></p><p data-dcnode-id="807"><span data-dcnode-id="814" instrument_node="">For details see the event </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//honokaawesternweek.org/" rel="noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">website</span></a><span data-dcnode-id="811" instrument_node=""> or </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/HonokaaWesternWeek/" rel="noopener" target="_blank"><span data-dcnode-id="810" instrument_node="">facebook page</span></a><span data-dcnode-id="808" instrument_node="">.</span></p><h3 data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Annual Farm Festival at Hāmākua Harvest</span></h3><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Hāmākua Harvest organizes farmers markets once a year and celebrates their farm festival once a year. Festivities feature a 35+ vendor farmers’ market and an all-day line-up of entertainment including a hula performance, petting zoo, a silent auction, educational presentations, yard games, keiki activities, and ono food.</span></p><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">Read more about this event on the </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hamakuaharvest.org/annual-farm-festival/" rel="noopener" target="_blank"><span data-dcnode-id="801" instrument_node="">event website</span></a><span data-dcnode-id="799" instrument_node="">.</span></p><h3 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Big Island Film Festival (not organized since 2016, future uncertain)</span></h3><p data-dcnode-id="788"><span data-dcnode-id="795" instrument_node="">This </span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">“Talk Story”</span></em><span data-dcnode-id="792" instrument_node=""> film festival is a celebration of independent narrative filmmakers and their short and feature films. It is an international film festival which celebrates narrative filmmakers and narrative films. With three movie venues, food and beverage events, workshops, celebrities, and Hawaiian music and culture, it’s rapidly gaining an international reputation! For more info call 808-883-0394 </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bigislandfilmfestival.com/wp/" rel="noopener" target="_blank"><span data-dcnode-id="791" instrument_node="">or visit their website</span></a><span data-dcnode-id="789" instrument_node="">.</span></p><hr data-dcnode-id="787"><h2 data-dcnode-id="785" id="june"><span data-dcnode-id="786" instrument_node="">June:</span></h2><h3 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Annual Hawai’i Kuauli Pacific &amp; Asia Cultural Festival</span></h3><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">The Hawaiʻi Kuauli Pacific &amp; Asia Cultural Festival showcases different cultural presentations to celebrate local cultural practices, such as a hula hoʻike, a fireknife competition, a cook-off, a fashion show, and much more.</span></p><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Read more on the </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hikuauli.com/" rel="noopener" target="_blank"><span data-dcnode-id="779" instrument_node="">festival website</span></a><span data-dcnode-id="777" instrument_node="">.</span></p><h3 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Kamehameha Festival (Hilo) and Parade (Kona)</span></h3><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">The </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamehameha_Day" rel="noopener" target="_blank"><span data-dcnode-id="772" instrument_node="">Kamehameha Day celebration</span></a><span data-dcnode-id="770" instrument_node=""> was first established in 1871 as a national holiday of the Kingdom of Hawai‘i and always takes place on June 11th. Kamehameha Day was created to honor the memory of Kamehameha the Great (c. 1758-1819) who united the Hawaiian Islands in 1810 to became Hawai‘i’s first King.</span></p><p data-dcnode-id="762"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The Kamehameha festival in Hilo</span></strong><span data-dcnode-id="766" instrument_node=""> features features a ho‘olaule‘a with top Hawaii recording artists, hula hālau, various cultural presentations, Hawaiian chant competition, dance of the warrior exhibition, food, and art and crafts booth. For more information call 808-989-4844 </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kamehamehafestival.org/" rel="noopener" target="_blank"><span data-dcnode-id="765" instrument_node="">or visit their website</span></a><span data-dcnode-id="763" instrument_node="">.</span></p><p data-dcnode-id="755"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">The King Kamehameha Day Celebration Parade in Kona</span></strong><span data-dcnode-id="759" instrument_node=""> celebrates Hawaiian history with a costumed parade and features food vendors, Hawaiian crafts, and a silent auction. For more information see the </span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//konaparade.org/" rel="noopener" target="_blank"><span data-dcnode-id="758" instrument_node="">King Kamehameha Day Parade website</span></a><span data-dcnode-id="756" instrument_node="">.</span></p><h3 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Rohto Ironman 70.3 Hawaii</span></h3><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">This half ironman triathlon on the Kohala coast is part of the official qualifier series for the Ironman World Championship held on the island in October.</span></p><p data-dcnode-id="747"><span data-dcnode-id="750" instrument_node="">Athletes start the day with a swim in the crystal blue waters of Hapuna Beach State Park along the Kohala Coast of the Big Island. Then they take on the challenging 56 mile bike course on the legendary Queen Ka’ahumanu Highway. The day finishes with a 13.1 mile run through paradise. For more info </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eu.ironman.com/triathlon/events/americas/ironman-70.3/hawaii.aspx" rel="noopener" target="_blank"><span data-dcnode-id="749" instrument_node="">visit their website.</span></a></p><h3 data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Kona Marathon &amp; Family Fun Runs</span></h3><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">An estimated 1,800 runners of all ages and abilities will be competing for prize money, participating for health and enjoyment, and raising money for charity. The start and Finish are at the Keauhou Beach Resort just south of Kailua-Kona and you can compete in a complete marathon, 1/2 marathon, 10k, 5k, and a family run. For more info </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//konamarathon.com/" rel="noopener" target="_blank"><span data-dcnode-id="743" instrument_node="">visit their website</span></a><span data-dcnode-id="741" instrument_node="">.</span></p><h3 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Hawaii Performing Arts Festival</span></h3><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">The Hawaii Performing Arts Festival brings together talented young musicians from Hawaii, the U.S., Canada, Asia, Africa, the Middle East, South America and Europe to Hawaii Island.</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Every year this month-long festival brings between 20 and 30 concerts to the Big Island spread over ~10 venues in Waimea, Hilo, Honoka’a and all along the Kohala coast. Many of the concerts are free to the public.</span></p><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">More information on the </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiiperformingartsfestival.org/" rel="noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">Hawaii Performing Arts Website</span></a><span data-dcnode-id="730" instrument_node="">.</span></p><hr data-dcnode-id="728"><h2 data-dcnode-id="726" id="july"><span data-dcnode-id="727" instrument_node="">July:</span></h2><h3 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Parker Ranch Independence Day Rodeo</span></h3><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">See real Paniolo (Hawaiian cowboys) in action at this rodeo! For info call 808-885-7311 or </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parkerranch.com/" rel="noopener" target="_blank"><span data-dcnode-id="722" instrument_node="">visit their website</span></a><span data-dcnode-id="720" instrument_node="">.</span></p><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Hawaiian International Bill-fishing Tournament</span></h3><p data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">This week-long event is know as the “Grandfather of all big game fishing tournaments”!! It has been around more than 50 years now, and was first organized only 2 days after Hawaii officially became a state in 1959. For more info</span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hibtfishing.com/" rel="noopener" target="_blank"><span data-dcnode-id="715" instrument_node=""> visit their website</span></a><span data-dcnode-id="713" instrument_node="">.</span></p><h3 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Experience Volcano Village Festival</span></h3><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Next to a gateway to the Hawaii Volcanoes National Park, Volcano Village is an artist village and home too many activities and relaxing opportunities. This festival is spread over several locations in the village and showcases music, Hawaiian culture, artists in action, tours, demonstrations, kid and ohana activities, a petting zoo, happy hours, restaurant specials, food trucks, and more.</span></p><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">See the </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.experiencevolcano.com/experiencevolcanofestival" rel="noopener" target="_blank"><span data-dcnode-id="706" instrument_node="">festival website</span></a><span data-dcnode-id="704" instrument_node=""> for details.</span></p><h3 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Hawaii Volcanoes National Park Cultural Festival</span></h3><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">This festival is created to perpetuate Hawaiian culture and promote appreciation of traditional values. Cultural practitioners lead demonstrations and provide hands-on learning opportunities for a wide variety of Hawaiian crafts, games, and foods.</span></p><p data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">See the </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/planyourvisit/event-details.htm%3Fid%3DA2BC9A1C-0298-8253-2D028470FE3753A8" rel="noopener" target="_blank"><span data-dcnode-id="697" instrument_node="">event website</span></a><span data-dcnode-id="695" instrument_node=""> for more information (but note that the event url changes yearly and we may not have had the time to update to the most current one).</span></p><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Volcano’s ‘ohi’a lehua half marathon</span></h3><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Run at 4,000 feet in the quaint village of Volcano, just outside of the Hawaii Volcanoes National Park. There are 3 distances: a keiki dash for children, a 5 km run (3.1 miles), and a half marathon. All runs are out and back courses and participants run through the village streets in the lush native rainforest, with the 1/2 Marathon continuing into the upper ranch lands with stunning views of Mauna Kea and Mauna Loa volcanoes.</span></p><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">More information at the event </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohialehuahalf.com/" rel="noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">website</span></a><span data-dcnode-id="686" instrument_node="">.</span></p><hr data-dcnode-id="684"><h2 data-dcnode-id="682" id="august"><span data-dcnode-id="683" instrument_node="">August:</span></h2><h3 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Don the Beachcomber Mai Tai Festival</span></h3><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">This annual event attracts aficionados of this renown tropical mix cocktail from around the world! Bartenders compete for title of Best Mai Tai and a $10,000 cash prize, and you can also enjoy a farmers market, food from Big Island restaurants and live entertainment along with mai tai sampling. For more info </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.donsmaitaifest.com/" rel="noopener" target="_blank"><span data-dcnode-id="678" instrument_node="">visit their website</span></a><span data-dcnode-id="676" instrument_node="">.</span></p><hr data-dcnode-id="674"><h2 data-dcnode-id="672" id="september"><span data-dcnode-id="673" instrument_node="">September:</span></h2><h3 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Queen Liliuokalani Canoe Race</span></h3><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">The Queen Lili’uokalani Long-Distance Canoe Races are the world’s largest outrigger canoe races. The event features single hull, double hull and individual races along with a torchlight parade, dance and luau awards ceremony. For more info call 808-334-9481 </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qlcanoerace.com/" rel="noopener" target="_blank"><span data-dcnode-id="668" instrument_node="">or visit their website</span></a><span data-dcnode-id="666" instrument_node="">.</span></p><h3 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Mealani’s Taste Of Hawaii Range</span></h3><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">Over 30 of the state’s top chefs dazzle diners with delectable dishes using grass-fed beef, pork, lamb, goat, mutton and wild boar—plus fresh island fruit and veggies. Attendees looking for culinary adventure can taste and enjoy all the cuts of grass-fed beef—everything from tongue to tail. The event originated in Waimea on the Big Island, where the paniolo (Hawaiian cowboy) rides the range and greened-over volcanic cinder cones are dotted with grazing cattle. For more info, </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tasteofthehawaiianrange.com/" rel="noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">visit their website</span></a><span data-dcnode-id="659" instrument_node="">.</span></p><h3 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Big Island Style Slack Key Guitar Festival.</span></h3><p data-dcnode-id="649"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">“Slack Key” is the Hawaiian trademark method of tuning and playing the guitar</span></strong><span data-dcnode-id="653" instrument_node="">. At this free music festival fifteen of the best slack-key artists from Hawaiʽi and the Big Island will perform. For more info call </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.slackkeyfestival.com/" rel="noopener" target="_blank"><span data-dcnode-id="652" instrument_node="">or visit their website</span></a><span data-dcnode-id="650" instrument_node="">.</span></p><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">He Hali‘a Aloha No Ka Queen Lili‘uokalani Festival</span></h3><p data-dcnode-id="643"><span data-dcnode-id="646" instrument_node="">This festival celebrates the birthday of Hawai‘i’s beloved Queen Lili‘uokalani, the last reigning monarch of Hawai‘i and features Hula</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node=""> performances by worldwide hula hālau (schools). For more info call 808-961-8706.</span></p><h3 data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Annual Parade and Festival for the United Nations International Day of Peace.</span></h3><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">The tranquil Hāmākua Coast town of Honoka‘a organizes a parade featuring bands, floats, clubs, school groups, performance artists and dancers to honor the United Nations International Peace Day. For more info call 808-640-4602 </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.peacedayparade.org/" rel="noopener" target="_blank"><span data-dcnode-id="639" instrument_node="">or visit their website</span></a><span data-dcnode-id="637" instrument_node="">.</span></p><h3 data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Ka’u Coffee Trail Run</span></h3><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">This trail run offers moderate to highly-challenging 5K, 10K and 1/2 marathon races through macadamia nut and coffee fields along the beautiful slopes of rural Ka’u on the southern side of Hawaii Island. The race begins and ends at the Ka’u Coffee Mill in Pahala (Wood Valley). The course starts with a family-friendly 5K, continues uphill through a moderately-challenging 10K and reaches a 3100-foot elevation in the vigorously-exhilarating Half Marathon.</span></p><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">All proceeds from this event stay in Ka’u to benefit the Ka’u community, more information on </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okaukakou.org/" rel="noopener" target="_blank"><span data-dcnode-id="630" instrument_node="">this website</span></a><span data-dcnode-id="628" instrument_node="">.</span></p><hr data-dcnode-id="626"><h2 data-dcnode-id="624" id="october"><span data-dcnode-id="625" instrument_node="">October:</span></h2><h3 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Hilo Way finding Festival</span></h3><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">Are you intrigued by the ancient arts of navigating and way finding that enable the ancient pacific islanders to find their way in thousands of square miles of ocean? This festival celebrates the historic sailing feats of the pacific peoples that used celestial navigation, and is also organized to revive and expand skills and interest in long distance canoe voyaging. Free activities include panel presentations and workshops led by Hawai‘i’s master canoe navigators. For more info call 808-969-9704 </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imiloahawaii.org/search%3Fq%3Dwayfinding" rel="noopener" target="_blank"><span data-dcnode-id="620" instrument_node="">or visit their website</span></a><span data-dcnode-id="618" instrument_node="">.</span></p><h3 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Ironman World Championship.</span></h3><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">There is no bigger day for a triathlete than the day of the Ironman World Championship. </span><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">This is the race that defined the sport as it came of age</span></strong><span data-dcnode-id="611" instrument_node="">, and continues to be the defining race for any avid triathlete. It features 2.4 mi. swim, 112 mi. bike and 26.2 mi. run.</span></p><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">Every year, tens-of-thousands of triathletes apply for a place but only 1800 get to participate to get that coveted title: Iron Man! For more info </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ironman.com/triathlon/events/americas/ironman/world-championship.aspx" rel="noopener" target="_blank"><span data-dcnode-id="608" instrument_node="">visit their website</span></a><span data-dcnode-id="606" instrument_node="">.</span></p><hr data-dcnode-id="604"><h2 data-dcnode-id="602" id="november"><span data-dcnode-id="603" instrument_node="">November:</span></h2><h3 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Big Island Farm Fair in Kona</span></h3><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">Farm fair to promote and educate the community about Hawaii’s agriculture industry. Includes agriculture displays, country market, ice cold watermelon, a keiki corral, livestock exhibit, and last but not least, a pianolo grill serving local agricultural products such as teriyaki beef &amp; grass fed beefburgers! </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ekfernandezshows.com/event-details.asp%3Feventid%3D252" rel="noopener" target="_blank"><span data-dcnode-id="598" instrument_node="">Kona Fair Website</span></a><span data-dcnode-id="596" instrument_node="">.</span></p><h3 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Black and White Night</span></h3><p data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">Downtown Hilo’s biggest annual strolling party with numerous live music venues, fashion shows, a treasure hunt through town, free food, author &amp; artist receptions. Everyone dresses in black and white, from shorts and T-shirts to gowns and suits to enter the “Best Dressed Black &amp; White Contest” for cash prizes. For more info call 808-935-8850 </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//downtownhilo.com/blackandwhite/" rel="noopener" target="_blank"><span data-dcnode-id="591" instrument_node="">or visit their website</span></a><span data-dcnode-id="589" instrument_node="">.</span></p><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Moku O Keawe International Hula Festival</span></h3><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">A multi-day event celebrating hula and the hula arts, this festival features hula hālau (troupes) from Hawaii, Japan and elsewhere competing in kūpuna (senior), kahiko (ancient) and ‘auana (modern) hula divisions. Master instructors teach workshops and cultural classes throughout the event. For more info call 808-886-8822 </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/mokuokeawe/" rel="noopener" target="_blank"><span data-dcnode-id="584" instrument_node="">or visit their facebook page</span></a><span data-dcnode-id="582" instrument_node="">.</span></p><h3 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Moku O Keawe Kapa Festival</span></h3><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Kapa is the traditional Hawaiian art of bark cloth production and design. The event centers around a three-day kapa workshop for both expert and beginner kapa artists. Hawaiian arts, Hawaiian music, hula performances and food will create a festive atmosphere. Visitors can try their hand at kapa making as well. For info call 808-323-3318.</span></p><h3 data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Kona Coffee Cultural Festival</span></h3><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Since its inception in 1970, the Festival has sought to preserve, perpetuate and promote Kona’s unique 183-year coffee heritage. With nearly 50 events over 10 days there’s something for everyone, from coffee drinkers to connoisseurs to multi-generational families. Festival signature events include a Coffee &amp; Art Stroll, Cupping Competition, Farm &amp; Mill Tours, International Lantern Parade or explore Kona coffee country’s cafe’s, shopping and community with a self-guided driving tour brochure. For more info </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//konacoffeefest.com/" rel="noopener" target="_blank"><span data-dcnode-id="573" instrument_node="">visit their website</span></a><span data-dcnode-id="571" instrument_node="">.</span></p><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">It is also possible (and a great excursion) to visit some Kona coffee farms yourself. More information: </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kona-coffee-hawaii/"><span data-dcnode-id="568" instrument_node="">Visit a Kona Coffee farm yourself</span></a><span data-dcnode-id="566" instrument_node="">.</span></p><h3 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">100% Pure Kona Coffee (half) Marathon</span></h3><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">This is one for those of you that take their running shoes on holidays! Run the scenic coast of Kailua-Kona down Ali’i Drive to the infamous “Pit” at the “End of the World” in marathon (two loops) and half marathon (one loop) distance. This race is part of the Kona Coffee Cultural Festival.</span></p><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">More information on the </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.purekonahalf.com/" rel="noopener" target="_blank"><span data-dcnode-id="559" instrument_node="">event website</span></a><span data-dcnode-id="557" instrument_node="">.</span></p><hr data-dcnode-id="555"><h2 data-dcnode-id="553" id="december"><span data-dcnode-id="554" instrument_node="">December:</span></h2><h3 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Kailua-Kona Christmas Parade</span></h3><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">Fun Christmas Parade along Ali’i Drive in Kailua Kona, held typically during the second week of December. For more details see the </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//paradesinkona.com/" rel="noopener" target="_blank"><span data-dcnode-id="549" instrument_node="">event website</span></a><span data-dcnode-id="547" instrument_node="">.</span></p></div></article></main><aside aria-label="Primary Sidebar" class="sidebar sidebar-primary widget-area" data-dcnode-id="384" id="genesis-sidebar-primary" role="complementary"><h2 class="genesis-sidebar-title screen-reader-text" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Primary Sidebar</span></h2><section class="widget widget-meta" data-d
