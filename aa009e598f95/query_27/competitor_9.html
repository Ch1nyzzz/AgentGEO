nt; padding: 0px !important; margin: 0px !important; border: none !important;" title="New Zealand"></div></div><div class="eic-row eic-child-2" data-dcnode-id="2060" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-image eic-image-8" data-dcnode-id="2061" data-pos-x="-105" data-pos-y="0" data-size-x="499" data-size-y="273" style="background-size: 348px 191px; background-position: -73px 0px; border-width: 3px;"><img alt="New Zealand" data-dcnode-id="2062" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-8.jpg&amp;raw" style="width: 348px !important; height: 191px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -73px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="New Zealand"></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2050" instrument_node="">
</span><h2 data-dcnode-id="2047" id="h-how-long-to-spend-in-new-zealand"><span data-dcnode-id="2048" style="font-size: 24pt;"><span data-dcnode-id="2049" instrument_node="">How long to spend in New Zealand?</span></span></h2><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">On a map, you may be incorrect in thinking you don’t actually need that much time on a New Zealand North Island road trip. But trust me, you do.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">The North Island deserves at least a couple of weeks, but we are not all blessed with being able to stay this long. This trip was only 10 days but it can be suited for anyone looking for a 9 to 12 day trip itinerary. It’s one of&nbsp; best road trips from Auckland for those who love nature and natural attractions.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Many people like to know if combining both New Zealand South island with the North Island is a good idea. Well, if you have a few weeks, then I say yes. Previously, I have done them separately and also as a combined trip. It really depends on how much time you have and when you plan to go. There is no best answer, you just have to plan well and get the most out of your trip as I have done here.</span></p><div data-dcnode-id="2036" data-inserter-version="2" id="ezoic-pub-ad-placeholder-638"></div><span data-dcnode-id="2034" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2031"><figure class="aligncenter is-resized" data-dcnode-id="2032"><img alt="" class="wp-image-20317" data-dcnode-id="2033" height="239" sizes="(max-width: 239px) 100vw, 239px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_16908315_s-2019.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_16908315_s-2019.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_16908315_s-2019-300x300.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_16908315_s-2019-150x150.jpg 150w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_16908315_s-2019-768x767.jpg 768w" width="239"></figure></div><span data-dcnode-id="2030" instrument_node="">
</span><h2 data-dcnode-id="2027" id="h-best-time-to-visit-new-zealand"><span data-dcnode-id="2028" style="font-size: 24pt;"><span data-dcnode-id="2029" instrument_node="">Best time to visit New Zealand</span></span></h2><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">A North Island road trip is most popular during the summer months of December, January and February. It offers the best chance of good weather, but with it comes the larger crowds and bumped up accommodation prices. School holiday periods will also be busier.</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">For reasonably good weather you could try the shoulder months of November, March and April.&nbsp; Take note that New Zealand can experience all types pf weather regardless of the time of year.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">This particular trip was taken in July. That’s right, the dead of winter. But guess what? I had 9 glorious days of sunshine and no wind. It was absolutely calm conditions and ideal for touring. All my previous trips were taken in summer and I still experienced occasional rain so you just never know.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Winter can be a wonderful time to visit. The crowds are low so you get to explore many once jam packed attractions on your own. You also get to stay in some amazing locations at the cheapest rates of the year. I’m not saying winter is completely ideal. Yes it is chilly early morning and evening, but a steaming outdoor hot tub or natural spring makes up for that quite nicely.</span></p><div data-dcnode-id="2013" data-inserter-version="2" id="ezoic-pub-ad-placeholder-639"></div><span data-dcnode-id="2011" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2008"><figure class="aligncenter" data-dcnode-id="2009"><img alt="" class="wp-image-20350" data-dcnode-id="2010" height="549" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-19.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-19.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-19-300x165.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-19-768x422.jpg 768w" width="1000"></figure></div><span data-dcnode-id="2007" instrument_node="">
</span><h2 data-dcnode-id="2004" id="h-fast-facts-about-new-zealand"><span data-dcnode-id="2005" style="font-size: 24pt;"><span data-dcnode-id="2006" instrument_node="">Fast Facts about New Zealand</span></span></h2><span data-dcnode-id="2003" instrument_node="">
</span><ul data-dcnode-id="1980"><li data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Population: 5 million people</span></li><li data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Capital: Wellington</span></li><li data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Driving – left hand side</span></li><li data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Lakes : 3820</span></li><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Volcanoes: 12 active</span></li><li data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Snakes : 0 (that’s right, there are no snakes in New Zealand)</span></li><li data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Was the first country to introduce the bungee jump (located in Queenstown)</span></li><li data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">New Zealanders are known as “Kiwis” named after their national animal, a flightless and curious bird.</span></li><li data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Has a strong cultural input from the indigenous Maori people</span></li><li data-dcnode-id="1981"><span data-dcnode-id="1984" instrument_node="">Has the world’s longest place name with 85 letters&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span data-dcnode-id="1982" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="1983" instrument_node="">“Taumatawhakatangihangakoauauotamateaturipukakapikimangahoronukupokaiwhenuakitanatahu”</span></span></li></ul><span data-dcnode-id="1979" instrument_node="">

2" instrument_node="">Waimangu Volcanic Valley</span></td></tr><tr data-dcnode-id="1907"><td class="has-text-align-center" data-align="center" data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Te Puia Thermal Park</span></td></tr><tr data-dcnode-id="1904"><td class="has-text-align-center" data-align="center" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Redwoods Tree Top Walk</span></td></tr><tr data-dcnode-id="1901"><td class="has-text-align-center" data-align="center" data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Skyride Rotorua</span></td></tr><tr data-dcnode-id="1898"><td class="has-text-align-center" data-align="center" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Okere Falls Reserve</span></td></tr><tr data-dcnode-id="1895"><td class="has-text-align-center" data-align="center" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Kerosene Creek</span></td></tr><tr data-dcnode-id="1892"><td class="has-text-align-center" data-align="center" data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Mt Maunganui base walk</span></td></tr><tr data-dcnode-id="1889"><td class="has-text-align-center" data-align="center" data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Hot Water beach</span></td></tr><tr data-dcnode-id="1886"><td class="has-text-align-center" data-align="center" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Cathedral Cove</span></td></tr><tr data-dcnode-id="1883"><td class="has-text-align-center" data-align="center" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Robert Findlay Wildlife Reserve</span></td></tr></tbody></table></figure><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1876"><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">This North Island Road Trip from Auckland covers approximately 900 km in distance.</span></strong></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">By the time we covered all the places of interest in each region, our total trip distance was 1200 km.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">The largest travel day is just under 3 hours but the rest are relatively short, so you get to enjoy your days seeing the sites rather than being stuck behind the wheel. The best part is, when you are confined to the car, you’ll be memorized by the amazing scenery along the way so it’s a win win situation all round.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">As this was a winter trip, day light hours are less than in summer, so you will have the opportunity to add many extra activities to the itinerary if needed or simply down time to relax.</span></p><div data-dcnode-id="1865" data-inserter-version="2" id="ezoic-pub-ad-placeholder-641"></div><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1860"><strong data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Our North Island NZ road trip went like this:</span></strong></p><span data-dcnode-id="1859" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1856"><figure class="aligncenter" data-dcnode-id="1857"><img alt="" class="wp-image-20298" data-dcnode-id="1858" height="554" sizes="(max-width: 710px) 100vw, 710px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/nz-map-b.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/nz-map-b.jpg 710w, https://www.mytraveljam.com/wp-content/uploads/2021/07/nz-map-b-300x234.jpg 300w" width="710"></figure></div><span data-dcnode-id="1855" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1854"><span data-dcnode-id="1853" instrument_node="">
</span><h3 data-dcnode-id="1850" id="h-day-1-auckland"><span data-dcnode-id="1851" style="font-size: 36pt;"><span data-dcnode-id="1852" instrument_node="">Day 1. Auckland&nbsp;</span></span></h3><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">OK, are you ready for the most amazing New Zealand road trip. Your North Island itinerary is full of scenic locations, unique experiences and some incredible places to call home each night.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1843"><figure class="aligncenter is-resized" data-dcnode-id="1844"><img alt="" class="wp-image-1554" data-dcnode-id="1845" height="52" sizes="(max-width: 71px) 100vw, 71px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-210x150.png 210w" width="71"></figure></div><span data-dcnode-id="1842" instrument_node="">
</span><h3 data-dcnode-id="1838" id="h-distance-auckland-to-ramarama-30-km-drive-time-37-mins"><span data-dcnode-id="1839" style="color: #0000ff;"><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Distance Auckland to Ramarama: 30 Km / drive time 37 mins</span></strong></span></h3><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Depending on the time of day you begin your trip, will depend on how far you get for your first night. As we flew into Auckland mid afternoon we decided it was best not to venture too far in case our flight was delayed, but also because we needed time to pick up a rental car as well. For that reason we headed for Ramarama, a small farming region south of Auckland city.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1831"><em data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Did I mention there was an outdoor hot tub awaiting also.</span></em></p><div data-dcnode-id="1829" data-inserter-version="2" id="ezoic-pub-ad-placeholder-642"></div><span data-dcnode-id="1827" instrument_node="">
</span><h4 data-dcnode-id="1824" id="h-attractions"><span data-dcnode-id="1825" style="font-size: 24pt;"><span data-dcnode-id="1826" instrument_node="">ATTRACTIONS</span></span></h4><span data-dcnode-id="1823" instrument_node="">

</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Auckland is a big city and has many attractions to see including short half day tours .Some of these include:</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1813"><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3eExOzW"><span data-dcnode-id="1815" instrument_node="">Auckland Sky Tower – Skip the Line</span></a></p><span data-dcnode-id="1812" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1809"><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3kEwVev"><span data-dcnode-id="1811" instrument_node="">Half Day City Highlights Tour</span></a></p><span data-dcnode-id="1808" instrument_node="">

</span><p class="has-text-align-center" data-dcnode-id="1798"><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3rmHnZx"><span data-dcnode-id="1800" instrument_node="">Sea Life Aquarium&nbsp;</span></a></p><span data-dcnode-id="1797" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1794"><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3rq9UgL"><span data-dcnode-id="1796" instrument_node="">Gourmet Food &amp; Wine Walking Tour</span></a></p><span data-dcnode-id="1793" instrument_node="">
</span><h4 data-dcnode-id="1790" id="h-accommodation"><span data-dcnode-id="1791" style="font-size: 24pt;"><span data-dcnode-id="1792" instrument_node="">ACCOMMODATION</span></span></h4><span data-dcnode-id="1789" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1786"><figure class="aligncenter is-resized" data-dcnode-id="1787"><img alt="" class="wp-image-1556" data-dcnode-id="1788" height="54" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/cartoon-bed.jpg&amp;raw" width="69"></figure></div><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Auckland has a big range of hotels BUT New Zealand as a whole has a generous amount of self contained accommodation.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">During your New Zealand road trip, you have the chance to stay in some pretty cool cabins or cottages which I highly recommend for comfort.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">For this trip we are saving on food costs by making most meals ourselves, and instead, are staying in with the comforts of a kitchen, lounge and in most cases, a washer and dryer. A nice benefit when wanting to travel with minimal luggage.</span></p><div data-dcnode-id="1775" data-inserter-version="2" id="ezoic-pub-ad-placeholder-644"></div><span data-dcnode-id="1773" instrument_node="">

</span><figure class="wp-block-table" data-dcnode-id="1724"><table data-dcnode-id="1725"><tbody data-dcnode-id="1726"><tr data-dcnode-id="1727"><td data-dcnode-id="1728"><span data-dcnode-id="1766" instrument_node="">

</span><h3 data-dcnode-id="1711" id="h-day-2-putaruru"><span data-dcnode-id="1712" style="font-size: 36pt;"><span data-dcnode-id="1713" instrument_node="">Day 2. Putaruru</span></span></h3><span data-dcnode-id="1710" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1707"><figure class="aligncenter is-resized" data-dcnode-id="1708"><img alt="" class="wp-image-1554" data-dcnode-id="1709" height="61" sizes="(max-width: 83px) 100vw, 83px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w" width="83"></figure></div><span data-dcnode-id="1706" instrument_node="">
</span><h3 data-dcnode-id="1702" id="h-distance-ramarama-to-putaruru-277-km-drive-time-3-30-mins"><span data-dcnode-id="1703" style="color: #0000ff;"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Distance Ramarama to Putaruru: 277 Km / drive time 3.30 mins</span></strong></span></h3><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">It’s off again on our North Island NZ raod trip. Today’s drive is along State highway 1 for much of the trip before turning west for Putaruru.&nbsp; The countryside is evergreen as we pass through many farmland areas, leaving the city well and truly behind.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">This is by far your biggest drive day as we cross off some of the areas top attractions. From then on, the days driving is relatively short and easy. You’ll need a good 9 hours of time up your sleeves if you plan to do each activity and booking in advance is crucial. A booked out activity or having to wait for the next tour will set you back.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h4 data-dcnode-id="1692" id="h-attractions-1"><span data-dcnode-id="1693" style="font-size: 24pt;"><span data-dcnode-id="1694" instrument_node="">ATTRACTIONS</span></span></h4><span data-dcnode-id="1691" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1688"><figure class="aligncenter is-resized" data-dcnode-id="1689"><img alt="" class="wp-image-3872" data-dcnode-id="1690" height="83" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2018/03/attraction-pic.gif&amp;raw" width="85"></figure></div><span data-dcnode-id="1687" instrument_node="">
</span><h5 data-dcnode-id="1684" id="h-waitomo-glowworm-caves"><span data-dcnode-id="1685" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="1686" instrument_node="">Waitomo Glowworm Caves</span></span></h5><span data-dcnode-id="1683" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1680"><figure class="aligncenter" data-dcnode-id="1681"><img alt="" class="wp-image-20334" data-dcnode-id="1682" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_241999030_s-2019.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_241999030_s-2019.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_241999030_s-2019-300x200.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_241999030_s-2019-768x512.jpg 768w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_241999030_s-2019-272x182.jpg 272w" width="1000"></figure></div><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Without doubt, this is one of the most popular things to do on the North Island New Zealand. To get there, it requires a slight detour to the south.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">The Waitomo Glowworm Cave is a guided tour through a cave system uniquely lit up by thousands of bio luminescent insects. Accessed by boat, you’ll glide through the cave before entering the Cathedral cave on foot.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Tours are very popular so it is highly recommended you book in advance, otherwise you’ll be left to wait it out for a spot. Tour time is 45 minutes.</span></p><div data-dcnode-id="1669" data-inserter-version="2" id="ezoic-pub-ad-placeholder-646"></div><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node="">You can read more here and see pricing. </span><span data-dcnode-id="1663" style="color: #0000ff;"><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3xYypUS" style="color: #0000ff;"><span data-dcnode-id="1665" instrument_node="">Waitomo Glowworm Caves</span></a></span></p><span data-dcnode-id="1661" instrument_node="">
</span><h4 data-dcnode-id="1658" id="h-hobbiton-movie-set"><span data-dcnode-id="1659" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="1660" instrument_node="">Hobbiton Movie Set&nbsp;</span></span></h4><span data-dcnode-id="1657" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1655"><img alt="" class="wp-image-20335" data-dcnode-id="1656" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_126694400_s-2019.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_126694400_s-2019.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_126694400_s-2019-300x200.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_126694400_s-2019-768x512.jpg 768w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_126694400_s-2019-272x182.jpg 272w" width="1000"></figure><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Though I did not participate in this activity myself, if I didn’t mention it I’d be feeling a great load of guilt. Especially as the location is a place you’ll be passing straight by.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">For Lord of the Rings fans, this 2 hour movie set tour takes you to all the great movie locations including the Green Dragon Inn. Note that Hobbiton can ONLY be access via a tour. Departures start from 9.30 am and there are at least 5 tours per day running.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">You can read more here. </span><span data-dcnode-id="1644" style="color: #0000ff;"><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hobbitontours.com/" style="color: #0000ff;"><span data-dcnode-id="1646" instrument_node="">Hobbiton Movie Set</span></a></span></p><span data-dcnode-id="1642" instrument_node="">
</span><h5 data-dcnode-id="1639" id="h-blue-spring-te-waihou-walkway"><span data-dcnode-id="1640" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="1641" instrument_node="">Blue Spring – Te Waihou Walkway&nbsp;</span></span></h5><span data-dcnode-id="1638" instrument_node="">
</span><div class="eic-container eic-container-desktop" data-dcnode-id="1622"><div class="eic-frame eic-frame-20340 eic-frame-2-row-bottom-2-col" data-dcnode-id="1623" data-layout-name="2-row-bottom-2-col" data-orig-border="4" data-orig-width="652" data-ratio="1" style="width: 592.797px; height: 592.797px; border-width: 4px;"><div class="eic-rows" data-dcnode-id="1624"><div class="eic-row eic-child-1" data-dcnode-id="1633" style="top: 0; left: 0; right: 0; bottom: 50%; height: 50%;"><div class="eic-image eic-image-0" data-dcnode-id="1634" data-pos-x="0" data-pos-y="-62" data-size-x="636" data-size-y="376" style="background-size: 579px 342px; background-position: 0px -56px; border-width: 4px;"><img alt="new zealand 38" data-dcnode-id="1635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-38.jpg&amp;raw" style="width: 579px !important; height: 342px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: 0px !important; top: -56px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 38"></div></div><div class="eic-row eic-child-2" data-dcnode-id="1625" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-cols" data-dcnode-id="1626"><div class="eic-col eic-child-1" data-dcnode-id="1630" style="top: 0; bottom: 0; left: 0; right: 50%; width: 50%;"><div class="eic-image eic-image-1" data-dcnode-id="1631" data-pos-x="-52" data-pos-y="0" data-size-x="424" data-size-y="314" style="background-size: 386px 286px; background-position: -47px 0px; border-width: 4px;"><img alt="new zealand 7" data-dcnode-id="1632" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-7.jpg&amp;raw" style="width: 386px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -47px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 7"></div></div><div class="eic-col eic-child-2" data-dcnode-id="1627" style="top: 0; bottom: 0; right: 0; left: 50%; width: 50%;"><div class="eic-image eic-image-2" data-dcnode-id="1628" data-pos-x="-123" data-pos-y="0" data-size-x="572" data-size-y="314" style="background-size: 521px 286px; background-position: -111px 0px; border-width: 4px;"><img alt="new zealand 3" data-dcnode-id="1629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-3.jpg&amp;raw" style="width: 521px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -111px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 3"></div></div></div></div></div></div></div><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Of all the things we visited in New Zealand, the Blue Spring is my “cannot miss” activity.</span></p><div data-dcnode-id="1617" data-inserter-version="2" id="ezoic-pub-ad-placeholder-647"></div><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Simply stunning is the Blue Spring, a river of&nbsp; water so clear it will leave you breathless in its beauty. It supplies up to 70% of all New Zealand bottled water and for this reason, you cannot swim here.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">The Blue Spring can be accessed via 2 different walking tracks. The longer version is 4.7 km one way (9.4 km return trip) along the Te Waihou Walkway and is expected to take 3 hours to complete. The starting point is from the car park on Whites Road and meanders through some of the prettiest scenery you could imagine.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Alternately, you can choose a shorter 15 minute walk from the Leslie road car park. Just to give you an idea, the shorter walk provides the biggest ‘wow” section and the longer walk provides that plus a beautiful scenic hike overall.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h4 data-dcnode-id="1603" id="h-lake-karapiro"><span data-dcnode-id="1604" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1605" instrument_node="">Lake Karapiro</span></span></h4><span data-dcnode-id="1602" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1599"><figure class="aligncenter" data-dcnode-id="1600"><img alt="" class="wp-image-20341" data-dcnode-id="1601" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-8.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-8.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-8-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-8-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">The Karapiro Lake area is popular with water sports enthusiasts and families who are there to enjoy the lake atmosphere. It’s also the chosen back drop for my next nights stop.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1594" instrument_node="">The region is famous for its bike trails such as the Waikato River and Te Awa Cycle trails. Another spot if you have time is </span><span data-dcnode-id="1590" style="color: #0000ff;"><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sanctuarymountain.co.nz/home" style="color: #0000ff;"><span data-dcnode-id="1593" instrument_node="">Sanctuary Mountain Maungatutari.</span></a><span data-dcnode-id="1591" instrument_node="">&nbsp;</span></span></p><div data-dcnode-id="1587" data-inserter-version="2" id="ezoic-pub-ad-placeholder-648"></div><span data-dcnode-id="1585" instrument_node="">
</span><h4 data-dcnode-id="1582" id="h-accommodation-1"><span data-dcnode-id="1583" style="font-size: 24pt;"><span data-dcnode-id="1584" instrument_node="">ACCOMMODATION</span></span></h4><span data-dcnode-id="1581" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1578"><figure class="aligncenter is-resized" data-dcnode-id="1579"><img alt="" class="wp-image-1556" data-dcnode-id="1580" height="62" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/cartoon-bed.jpg&amp;raw" width="79"></figure></div><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Want to feel like royalty for a night?</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">You can’t go past the Versace Suite at Lake Karapiro Lodge.&nbsp; An incredible space of lux furnishings, super king bed and large balcony overlooking Lake Karapiro, it really doesn’t get any better than this. The hosts also provide a cooked to order breakfast along with fresh fruits and more.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><div class="wp-block-image wp-image-20342 size-full" data-dcnode-id="1566"><figure class="aligncenter" data-dcnode-id="1567"><img alt="North island NZ road trip" class="wp-image-20342" data-dcnode-id="1570" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-10.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-10.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-10-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-10-768x432.jpg 768w" width="1000"><figcaption data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Our lux stay in the Versace Suite at Lake Karapiro Ledge</span></figcaption></figure></div><span data-dcnode-id="1565" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1518"><table data-dcnode-id="1519"><tbody data-dcnode-id="1520"><tr data-dcnode-id="1521"><td data-dcnode-id="1522"><span data-dcnode-id="1564" instrument_node="">

</span><p data-dcnode-id="1543" style="text-align: center;"><span data-dcnode-id="1549" style="color: #0000ff;"><span data-dcnode-id="1553" instrument_node="">Cottage –</span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp9459561%253FnoDates%253Dtrue" style="color: #0000ff;"><strong data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node=""> Spectacular </span></strong></a></span><span data-dcnode-id="1544" style="color: #0000ff;"><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp9459561%253FnoDates%253Dtrue" style="color: #0000ff;"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Lake View Home</span></strong></a><span data-dcnode-id="1545" instrument_node=""> – side by side outdoor bathtubs</span></span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1535" style="text-align: center;"><span data-dcnode-id="1536" style="color: #0000ff;"><span data-dcnode-id="1541" instrument_node="">Family stay – </span><strong data-dcnode-id="1538"><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp20017373%253FnoDates%253Dtrue" style="color: #0000ff;"><span data-dcnode-id="1540" instrument_node="">Quirky &amp; unique converted Woolshed&nbsp;</span></a></strong><span data-dcnode-id="1537" instrument_node=""> – 2 bedroom</span></span></p><div data-dcnode-id="1533" data-inserter-version="2" id="ezoic-pub-ad-placeholder-649"></div><span data-dcnode-id="1531" instrument_node="">

</span><h3 data-dcnode-id="1512" id="h-day-3-4-taupo"><span data-dcnode-id="1513" style="font-size: 36pt;"><span data-dcnode-id="1514" instrument_node="">Day 3 &amp; 4 Taupo</span></span></h3><span data-dcnode-id="1511" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1508"><figure class="aligncenter is-resized" data-dcnode-id="1509"><img alt="" class="wp-image-1554" data-dcnode-id="1510" height="47" sizes="(max-width: 64px) 100vw, 64px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-210x150.png 210w" width="64"></figure></div><span data-dcnode-id="1507" instrument_node="">
</span><h3 data-dcnode-id="1503" id="h-distance-putaruru-to-taupo-86-km-drive-time-1-02-mins"><span data-dcnode-id="1504" style="color: #0000ff;"><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Distance Putaruru to Taupo : 86 Km / drive time 1.02 mins</span></strong></span></h3><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Day 3 of our North Island road trip and it is a leisurely short drive toward the city of Taupo. But before we reach our next destination, we make a stop at one of the most impressive thermal parks of the trip. We are here for the next two nights, taking in many must see attractions and things to do.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><h4 data-dcnode-id="1496" id="h-attractions-2"><span data-dcnode-id="1497" style="font-size: 24pt;"><span data-dcnode-id="1498" instrument_node="">ATTRACTIONS</span></span></h4><span data-dcnode-id="1495" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1492"><figure class="aligncenter is-resized" data-dcnode-id="1493"><img alt="" class="wp-image-3872" data-dcnode-id="1494" height="64" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2018/03/attraction-pic.gif&amp;raw" width="65"></figure></div><span data-dcnode-id="1491" instrument_node="">
</span><h5 data-dcnode-id="1488" id="h-orakei-korako-geothermal-park"><span data-dcnode-id="1489" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1490" instrument_node="">Orakei Korako Geothermal Park</span></span></h5><span data-dcnode-id="1487" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1484"><figure class="aligncenter" data-dcnode-id="1485"><img alt="" class="wp-image-20343" data-dcnode-id="1486" height="480" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-11.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-11.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-11-300x144.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-11-768x369.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Staying on State Highway 1, you’ll turn off eventually to take the 13 km drive to Orakei Korako.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The visitor centre rests on one side of a lake and the park on the other. You will be taken by boat to start your self guided 2.5 km walk through an array of impressive features. These include geysers, bubbling mud pools, a cave and the colourful silica terraces.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Of all the thermal parks in the region, I have to say this was probably my favourite. It just had so many different features and an abundance of cool colours. Also, the crowds are a lot less here as it’s not as accessible as some of the other parks.</span></p><div data-dcnode-id="1473" data-inserter-version="2" id="ezoic-pub-ad-placeholder-650"></div><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1470" instrument_node="">You can see ticket prices here. </span><span data-dcnode-id="1467" style="color: #0000ff;"><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3BrsI3G" style="color: #0000ff;"><span data-dcnode-id="1469" instrument_node="">Orakei Korako Geothermal Park</span></a></span></p><span data-dcnode-id="1465" instrument_node="">
</span><h5 data-dcnode-id="1462" id="h-huka-falls"><span data-dcnode-id="1463" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="1464" instrument_node="">Huka Falls</span></span></h5><span data-dcnode-id="1461" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1458"><figure class="aligncenter" data-dcnode-id="1459"><img alt="new zealand NZ road trip" class="wp-image-20344" data-dcnode-id="1460" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-12.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-12.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-12-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-12-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1457" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1454"><figure class="aligncenter" data-dcnode-id="1455"><img alt="" class="wp-image-20328" data-dcnode-id="1456" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-5.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-5.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-5-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-5-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">No visitor to Taupo should skip the chance to witness this amazing rush of water barreling at full speed before descending into an 11 metre drop waterfall. It is quite astounding to witness.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The noise alone is deafening as hundreds of people stand at numerous viewing points to see 220.000 litres of water per second (aha, that’s right) hurtling through a narrow gorge along the Waikato River.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1446" instrument_node="">You can even take a </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3kEpCDy"><span data-dcnode-id="1444" style="color: #0000ff;"><span data-dcnode-id="1445" instrument_node="">jet boat ride</span></span></a><span data-dcnode-id="1442" instrument_node=""> to see the falls up close for an added adventure.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><h4 data-dcnode-id="1437" id="h-cruise-lake-taupo"><span data-dcnode-id="1438" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1439" instrument_node="">Cruise Lake Taupo</span></span></h4><span data-dcnode-id="1436" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1433"><figure class="aligncenter" data-dcnode-id="1434"><img alt="new zealand NZ road trip" class="wp-image-20345" data-dcnode-id="1435" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-14.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-14.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-14-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-14-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">The largest lake in all of New Zealand can really only be explored by boat. Formed by a volcanic eruption thousands of year prior, the city of Taupo is build up around it.</span></p><div data-dcnode-id="1428" data-inserter-version="2" id="ezoic-pub-ad-placeholder-651"></div><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1425" instrument_node="">We are setting off on a trip around the lake to see the Maori rock carvings that adorn the cliff face on the other side of the lake. The 90 minute return cruise is the perfect amount of time, especially as you have so much more to see. You can see tour details here – </span><span data-dcnode-id="1422" style="color: #0000ff;"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3rw5Prl" style="color: #0000ff;"><span data-dcnode-id="1424" instrument_node="">Scenic Maori Rock carving cruise</span></a></span></p><span data-dcnode-id="1420" instrument_node="">
</span><h4 data-dcnode-id="1417" id="h-aratiatia-rapids"><span data-dcnode-id="1418" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1419" instrument_node="">Aratiatia Rapids</span></span></h4><span data-dcnode-id="1416" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1413"><figure class="aligncenter" data-dcnode-id="1414"><img alt="new zealand NZ road trip" class="wp-image-20347" data-dcnode-id="1415" height="1024" sizes="(max-width: 706px) 100vw, 706px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-16-706x1024.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-16-706x1024.jpg 706w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-16-207x300.jpg 207w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-16-768x1114.jpg 768w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-16.jpg 1000w" width="706"></figure></div><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">We stumbled onto Aratiatia Rapids by chance and wondered why I hadn’t discovered it earlier.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">The rapids are created from the opening of the Aratiatia Dam Wall each and every day. The first signs that anything is about to happen is the loud sirens that fill the air, a warning to anyone in the wrong place at the wrong time.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1405" instrument_node="">Watch as thousands of litres of water fill the shallow river bed before exploding over the rocks and pushing down stream. The whole process takes around 15 minutes. Times for the dam wall opening is best checked on the </span><span data-dcnode-id="1401" style="color: #0000ff;"><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovetaupo.com/en/scenic-attractions/aratiatia-rapids/" style="color: #0000ff;"><span data-dcnode-id="1404" instrument_node="">website</span></a><span data-dcnode-id="1402" instrument_node=""> </span></span><span data-dcnode-id="1400" instrument_node="">to be accurate, but generally they open 3 times a day in winter and 4 times a day in summer.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><h4 data-dcnode-id="1395" id="h-wairakei-terraces-thermal-pools"><span data-dcnode-id="1396" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1397" instrument_node="">Wairakei Terraces Thermal Pools</span></span></h4><span data-dcnode-id="1394" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1391"><figure class="aligncenter" data-dcnode-id="1392"><img alt="" class="wp-image-20348" data-dcnode-id="1393" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-17.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-17.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-17-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-17-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">It’s time to unwind and soothe those aching muscles (OK, so no reason actually needed) by taking a dip into the outdoor naturally heated pools.</span></p><div data-dcnode-id="1386" data-inserter-version="2" id="ezoic-pub-ad-placeholder-652"></div><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">There are 3 pools which are all adults only.&nbsp; The cost is NZ $25 per person.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">It was simply heaven on a cool winters day and I couldn’t believe how toasty it was. Ranging from 34 to 40 degrees Celsius, I could see why everyone had a bottle of water to keep hydrated, it gets hotter than you may think.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">The property also has a thermal walk you can do (extra cost) and towels are available to hire if needed.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><h4 data-dcnode-id="1372" id="h-accommodation-2"><span data-dcnode-id="1373" style="font-size: 24pt;"><span data-dcnode-id="1374" instrument_node="">ACCOMMODATION</span></span></h4><span data-dcnode-id="1371" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1368"><figure class="aligncenter is-resized" data-dcnode-id="1369"><img alt="" class="wp-image-1556" data-dcnode-id="1370" height="61" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/cartoon-bed.jpg&amp;raw" width="78"></figure></div><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Taupo is a big city so accommodation options are plentiful.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">We stayed absolute lake frontage in a great apartment at The Village Resort. It had everything you could need just like the comforts of home.</span></p><div data-dcnode-id="1360" data-inserter-version="2" id="ezoic-pub-ad-placeholder-653"></div><span data-dcnode-id="1358" instrument_node="">
</span><div class="wp-block-image wp-image-20349 size-full" data-dcnode-id="1353"><figure class="aligncenter" data-dcnode-id="1354"><img alt="" class="wp-image-20349" data-dcnode-id="1357" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-18.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-18.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-18-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-18-768x432.jpg 768w" width="1000"><figcaption data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">The Village Resort was lake frontage and included all the home comforts.</span></figcaption></figure></div><span data-dcnode-id="1352" instrument_node="">

</span><h3 data-dcnode-id="1299" id="h-day-5-6-rotorua"><span data-dcnode-id="1300" style="font-size: 36pt;"><span data-dcnode-id="1301" instrument_node="">Day 5 &amp; 6 Rotorua</span></span></h3><span data-dcnode-id="1298" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1295"><figure class="aligncenter is-resized" data-dcnode-id="1296"><img alt="" class="wp-image-1554" data-dcnode-id="1297" height="71" sizes="(max-width: 97px) 100vw, 97px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w" width="97"></figure></div><span data-dcnode-id="1294" instrument_node="">
</span><h3 data-dcnode-id="1290" id="h-distance-taupo-to-rotorua-79-km-drive-time-57-mins"><span data-dcnode-id="1291" style="color: #0000ff;"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Distance Taupo to Rotorua : 79 Km / drive time 57 mins</span></strong></span></h3><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1288" instrument_node="">We have crossed the half way mark of our North Island NZ road trip but I’m trying not to think about it. I’m totally ready for more crazy </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/cool-experiences-2/"><span data-dcnode-id="1287" instrument_node="">cool experiences.&nbsp;</span></a></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1283" instrument_node="">It’s a&nbsp; quick drive to </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/things-to-do-in-rotorua/"><span data-dcnode-id="1282" instrument_node="">Rotorua</span></a><span data-dcnode-id="1280" instrument_node=""> in under an hour, and the fun activities start all over again.</span></p><div data-dcnode-id="1277" data-inserter-version="2" id="ezoic-pub-ad-placeholder-654"></div><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Rotorua is an action packed place to be so an extra night would have been ideal, but we are up early and ready to take on the town for the next 48 hours.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><h4 data-dcnode-id="1269" id="h-attractions-3"><span data-dcnode-id="1270" style="font-size: 24pt;"><span data-dcnode-id="1271" instrument_node="">ATTRACTIONS</span></span></h4><span data-dcnode-id="1268" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1265"><figure class="aligncenter is-resized" data-dcnode-id="1266"><img alt="" class="wp-image-3872" data-dcnode-id="1267" height="74" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2018/03/attraction-pic.gif&amp;raw" width="76"></figure></div><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Rotorua has a few thermal parks, each different, each worth a visit.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">I had previously visited Wai-O-tapo Thermal Wonderland which is by far the most popular but also the most crowded. Now that I have seen all the big thermal parks I not convinced it is the best but I have to say that all the parks blew me away.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h5 data-dcnode-id="1255" id="h-waimangu-volcanic-valley"><span data-dcnode-id="1256" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1257" instrument_node="">Waimangu Volcanic Valley</span></span></h5><span data-dcnode-id="1254" instrument_node="">
</span><div class="eic-container eic-container-desktop" data-dcnode-id="1233"><div class="eic-frame eic-frame-20355 eic-frame-2-row-top-2-col-right-2-row" data-dcnode-id="1234" data-layout-name="2-row-top-2-col-right-2-row" data-orig-border="4" data-orig-width="657" data-ratio="0.8" style="width: 592.797px; height: 740.996px; border-width: 4px;"><div class="eic-rows" data-dcnode-id="1235"><div class="eic-row eic-child-1" data-dcnode-id="1239" style="top: 0; left: 0; right: 0; bottom: 66.666%; height: 66.666%;"><div class="eic-cols" data-dcnode-id="1240"><div class="eic-col eic-child-1" data-dcnode-id="1249" style="top: 0; bottom: 0; left: 0; right: 50%; width: 50%;"><div class="eic-image eic-image-0" data-dcnode-id="1250" data-pos-x="-262" data-pos-y="0" data-size-x="963" data-size-y="534" style="background-size: 869px 482px; background-position: -236px 0px; border-width: 4px;"><img alt="new zealand 20" data-dcnode-id="1251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-20.jpg&amp;raw" style="width: 869px !important; height: 482px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -236px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 20"></div></div><div class="eic-col eic-child-2" data-dcnode-id="1241" style="top: 0; bottom: 0; right: 0; left: 50%; width: 50%;"><div class="eic-rows" data-dcnode-id="1242"><div class="eic-row eic-child-1" data-dcnode-id="1246" style="top: 0; left: 0; right: 0; bottom: 50%; height: 50%;"><div class="eic-image eic-image-1" data-dcnode-id="1247" data-pos-x="-60" data-pos-y="0" data-size-x="481" data-size-y="263" style="background-size: 434px 238px; background-position: -54px 0px; border-width: 4px;"><img alt="new zealand 22" data-dcnode-id="1248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-22.jpg&amp;raw" style="width: 434px !important; height: 238px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -54px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 22"></div></div><div class="eic-row eic-child-2" data-dcnode-id="1243" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-image eic-image-2" data-dcnode-id="1244" data-pos-x="-138" data-pos-y="0" data-size-x="481" data-size-y="263" style="background-size: 434px 238px; background-position: -124px 0px; border-width: 4px;"><img alt="new zealand 21" data-dcnode-id="1245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-21.jpg&amp;raw" style="width: 434px !important; height: 238px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -124px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 21"></div></div></div></div></div></div><div class="eic-row eic-child-2" data-dcnode-id="1236" style="bottom: 0; left: 0; right: 0; top: 66.666%; height: 33.334%;"><div class="eic-image eic-image-3" data-dcnode-id="1237" data-pos-x="0" data-pos-y="-20" data-size-x="641" data-size-y="355" style="background-size: 579px 321px; background-position: 0px -18px; border-width: 4px;"><img alt="nz b" data-dcnode-id="1238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/nz-b.jpg&amp;raw" style="width: 579px !important; height: 321px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: 0px !important; top: -18px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="nz b"></div></div></div></div></div><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Unspoiled, untouched and memorizing in every possible way.</span></p><div data-dcnode-id="1228" data-inserter-version="2" id="ezoic-pub-ad-placeholder-655"></div><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Located 45 minutes north of Taupo along the Thermal Explorer Highway, and just 20 minutes south of Rotorua, it is best done on your way up to Rotorua.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The entrance sits high up on a mountain and offers breathtaking panoramic views of the valley beyond and below. Access to the park involves a decent walk which is a highlight in itself. It is 4 kms from the visitor centre all the way to Lake Rotomahana so make sure you have the right walking shoes. The first section is downhill and needs some amount of grip underfoot.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1216"><p data-dcnode-id="1217"><b data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">before you start thinking about how you are going to get back to your stating point, there is a free shuttle bus from 3 points within the park, including from the lake.</span></b></p></blockquote><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The 1.5 km walk to Frying Pan Lake is lush and incredibly scenic, and down hill. From here it is flat and an easy walk to the lake. Other magical sites include Cathedral Rocks, Inferno crater, geysers, hot springs and silica terraces.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">Once you reach the lake (at the very end) you can opt to take a </span><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">boat cruise</span></strong><span data-dcnode-id="1208" instrument_node=""> for 90 minutes which I did.&nbsp; It takes you to areas that can only be accessed by boat, where you can see thermal activity along the shore line.</span></p><div data-dcnode-id="1205" data-inserter-version="2" id="ezoic-pub-ad-placeholder-656"></div><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">There is a tonne of things to see here but what I loved about Waimangu Volcanic Valley was the overall scenery. If you only do a couple of thermal parks, you must include this one.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1199" instrument_node="">To read more check out –</span><span data-dcnode-id="1195" style="color: #0000ff;"><span data-dcnode-id="1198" instrument_node=""> </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3Bss5Hi" style="color: #0000ff;"><span data-dcnode-id="1197" instrument_node="">Waimangu Volcanic Valley Self Guided Walk&nbsp;</span></a></span></p><span data-dcnode-id="1193" instrument_node="">
</span><h5 data-dcnode-id="1190" id="h-te-puia-thermal-park"><span data-dcnode-id="1191" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="1192" instrument_node="">Te Puia – thermal park</span></span></h5><span data-dcnode-id="1189" instrument_node="">
</span><div class="eic-container eic-container-desktop" data-dcnode-id="1173"><div class="eic-frame eic-frame-20359 eic-frame-2-row-bottom-2-col" data-dcnode-id="1174" data-layout-name="2-row-bottom-2-col" data-orig-border="4" data-orig-width="652" data-ratio="1" style="width: 592.797px; height: 592.797px; border-width: 4px;"><div class="eic-rows" data-dcnode-id="1175"><div class="eic-row eic-child-1" data-dcnode-id="1184" style="top: 0; left: 0; right: 0; bottom: 50%; height: 50%;"><div class="eic-image eic-image-0" data-dcnode-id="1185" data-pos-x="0" data-pos-y="0" data-size-x="636" data-size-y="367" style="background-size: 579px 334px; background-position: 0px 0px; border-width: 4px;"><img alt="new zealand 24" data-dcnode-id="1186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-24.jpg&amp;raw" style="width: 579px !important; height: 334px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: 0px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 24"></div></div><div class="eic-row eic-child-2" data-dcnode-id="1176" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-cols" data-dcnode-id="1177"><div class="eic-col eic-child-1" data-dcnode-id="1181" style="top: 0; bottom: 0; left: 0; right: 50%; width: 50%;"><div class="eic-image eic-image-1" data-dcnode-id="1182" data-pos-x="-62" data-pos-y="0" data-size-x="572" data-size-y="314" style="background-size: 521px 286px; background-position: -56px 0px; border-width: 4px;"><img alt="new zealand 25" data-dcnode-id="1183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-25.jpg&amp;raw" style="width: 521px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -56px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 25"></div></div><div class="eic-col eic-child-2" data-dcnode-id="1178" style="top: 0; bottom: 0; right: 0; left: 50%; width: 50%;"><div class="eic-image eic-image-2" data-dcnode-id="1179" data-pos-x="-112" data-pos-y="0" data-size-x="572" data-size-y="314" style="background-size: 521px 286px; background-position: -101px 0px; border-width: 4px;"><img alt="new zealand 23" data-dcnode-id="1180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-23.jpg&amp;raw" style="width: 521px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -101px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 23"></div></div></div></div></div></div></div><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Located within city limits, Te Puia is smaller in size and less attractive than the other parks i have seen. BUT there is a big BUT.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">The park is home to the largest active geyser in the southern hemisphere and it is seriously impressive. I would happily pay the entrance fee just to see this. In fact, I stayed around to watch it twice as i was so mind blown by it.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">The Pohutu geyser shoots up to 30 metres and goes off once or twice every hour.</span></p><div data-dcnode-id="1162" data-inserter-version="2" id="ezoic-pub-ad-placeholder-657"></div><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Overall, expect to spend up 1.5 to 2 hours here.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><h4 data-dcnode-id="1154" id="h-redwoods-tree-top-walk"><span data-dcnode-id="1155" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1156" instrument_node="">Redwoods Tree Top Walk</span></span></h4><span data-dcnode-id="1153" instrument_node="">
