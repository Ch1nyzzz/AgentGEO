m.com/wp-content/uploads/2021/07/new-zealand-28.jpg&amp;raw" style="width: 520px !important; height: 287px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -157px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 28"></div></div><div class="eic-col eic-child-2" data-dcnode-id="1142" style="top: 0; bottom: 0; right: 0; left: 50%; width: 50%;"><div class="eic-image eic-image-2" data-dcnode-id="1143" data-pos-x="0" data-pos-y="-31" data-size-x="209" data-size-y="383" style="background-size: 189px 346px; background-position: 0px -27px; border-width: 4px;"><img alt="new zealand 30" data-dcnode-id="1144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-30.jpg&amp;raw" style="width: 189px !important; height: 346px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: 0px !important; top: -27px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 30"></div></div></div></div></div></div><div class="eic-row eic-child-2" data-dcnode-id="1135" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-image eic-image-3" data-dcnode-id="1136" data-pos-x="0" data-pos-y="-16" data-size-x="641" data-size-y="354" style="background-size: 579px 320px; background-position: 0px -14px; border-width: 4px;"><img alt="new zealand 29" data-dcnode-id="1137" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-29.jpg&amp;raw" style="width: 579px !important; height: 320px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: 0px !important; top: -14px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 29"></div></div></div></div></div><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">A wonderful experience in Rotorua where you get to walk high above the forest floor.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Though this was a tourist hot spot, I loved it so much. The 800 metre walk across a series of swinging suspension bridges is pretty cool. The best part is you can come back after dark and do it all again under lights. A totally different experience&nbsp; and well worth it.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">You must also take one of the walks just beside the visitor centre and stroll through towering redwood forest. There are a few to choose, from short to longer walks.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><h4 data-dcnode-id="1119" id="h-skyline-rotorua"><span data-dcnode-id="1120" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1121" instrument_node="">Skyline Rotorua</span></span></h4><span data-dcnode-id="1118" instrument_node="">
</span><div class="eic-container eic-container-desktop" data-dcnode-id="1102"><div class="eic-frame eic-frame-20370 eic-frame-2-col-left-2-row" data-dcnode-id="1103" data-layout-name="2-col-left-2-row" data-orig-border="4" data-orig-width="643" data-ratio="1" style="width: 592.797px; height: 592.797px; border-width: 4px;"><div class="eic-cols" data-dcnode-id="1104"><div class="eic-col eic-child-1" data-dcnode-id="1108" style="top: 0; bottom: 0; left: 0; right: 50%; width: 50%;"><div class="eic-rows" data-dcnode-id="1109"><div class="eic-row eic-child-1" data-dcnode-id="1113" style="top: 0; left: 0; right: 0; bottom: 50%; height: 50%;"><div class="eic-image eic-image-0" data-dcnode-id="1114" data-pos-x="-47" data-pos-y="0" data-size-x="564" data-size-y="310" style="background-size: 520px 286px; background-position: -43px 0px; border-width: 4px;"><img alt="new zealand 31" data-dcnode-id="1115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-31.jpg&amp;raw" style="width: 520px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -43px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 31"></div></div><div class="eic-row eic-child-2" data-dcnode-id="1110" style="bottom: 0; left: 0; right: 0; top: 50%; height: 50%;"><div class="eic-image eic-image-1" data-dcnode-id="1111" data-pos-x="-78" data-pos-y="0" data-size-x="564" data-size-y="310" style="background-size: 520px 286px; background-position: -71px 0px; border-width: 4px;"><img alt="new zealand 34" data-dcnode-id="1112" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-34.jpg&amp;raw" style="width: 520px !important; height: 286px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -71px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 34"></div></div></div></div><div class="eic-col eic-child-2" data-dcnode-id="1105" style="top: 0; bottom: 0; right: 0; left: 50%; width: 50%;"><div class="eic-image eic-image-2" data-dcnode-id="1106" data-pos-x="-16" data-pos-y="0" data-size-x="346" data-size-y="627" style="background-size: 319px 579px; background-position: -14px 0px; border-width: 4px;"><img alt="new zealand 33" data-dcnode-id="1107" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-33.jpg&amp;raw" style="width: 319px !important; height: 579px !important; max-width: none !important; max-height: none !important; position: absolute !important; left: -14px !important; top: 0px !important; padding: 0px !important; margin: 0px !important; border: none !important;" title="new zealand 33"></div></div></div></div></div><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">For another thrilling up in the air experience, be sure to ride the cable car to the top of Rotorua. The whole complex is an entertainment hub of family fun activities, including luge rides, zip lining, sky swing and mountain bike park.</span></p><div data-dcnode-id="1097" data-inserter-version="2" id="ezoic-pub-ad-placeholder-658"></div><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">If that’s all too much you can simply take in the lake and surrounding views, have lunch or dinner or simply watch all the action unfold. We spent around 2 hours at Sky Rotorua.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">You can see more here- </span><span data-dcnode-id="1088" style="color: #0000ff;"><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skyline.co.nz/en/rotorua/things-to-do/skyline-gondola-rotorua/" style="color: #0000ff;"><span data-dcnode-id="1090" instrument_node="">Skyline Rotorua</span></a></span></p><span data-dcnode-id="1086" instrument_node="">
</span><h4 data-dcnode-id="1083" id="h-okere-falls-reserve"><span data-dcnode-id="1084" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1085" instrument_node="">Okere Falls Reserve</span></span></h4><span data-dcnode-id="1082" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1079"><figure class="aligncenter" data-dcnode-id="1080"><img alt="" class="wp-image-20371" data-dcnode-id="1081" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-35.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-35.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-35-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-35-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">If waterfalls and rain forest walks are your thing, you must visit Okere Falls Reserve.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Located 20 minutes north of Rotorua city, the reserve is home to 4 waterfalls. The track is well formed and can be accessed from 2 car parks.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">There are a few steps to make your way down to the viewing areas of the falls but is not too demanding. I spent a total of 90 minutes here and really enjoyed it. The whole area is extremely picturesque and was not too overcrowded.</span></p><div data-dcnode-id="1068" data-inserter-version="2" id="ezoic-pub-ad-placeholder-659"></div><span data-dcnode-id="1066" instrument_node="">
</span><h4 data-dcnode-id="1063" id="h-kerosene-creek"><span data-dcnode-id="1064" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="1065" instrument_node="">Kerosene Creek</span></span></h4><span data-dcnode-id="1062" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1059"><figure class="aligncenter" data-dcnode-id="1060"><img alt="north island NZ road trip" class="wp-image-20372" data-dcnode-id="1061" height="587" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-36.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-36.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-36-300x176.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-36-768x451.jpg 768w" width="1000"></figure></div><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">A magical spot of geothermal heated stream water, Kerosene creek&nbsp; is pretty popular, or so I heard. Seeing I was there in winter, it was only occupied by a few keen travellers. Being 30 km out of town might help also.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">So a quick change into my bathers and a quicker run for the stream (like I said it was winter) and it was soothing in every way. Be careful of the rocks which are hard to see and if you are visiting in the warmer season, expect bigger numbers. The fact that it is free makes it a worth while place to venture.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1046"><span data-dcnode-id="1047" style="color: #0000ff; font-size: 18pt;"><span data-dcnode-id="1051" instrument_node="">Looking for more Rotorua Attractions: </span><strong data-dcnode-id="1048"><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/things-to-do-in-rotorua/" style="color: #0000ff;"><span data-dcnode-id="1050" instrument_node="">40 Best things to do in Rotorua</span></a></strong></span></p><span data-dcnode-id="1045" instrument_node="">
</span><h4 data-dcnode-id="1042" id="h-accommodation-3"><span data-dcnode-id="1043" style="font-size: 24pt;"><span data-dcnode-id="1044" instrument_node="">ACCOMMODATION</span></span></h4><span data-dcnode-id="1041" instrument_node="">

</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">While Rotorua has plenty of great accommodation options, you have the chance to find a more secluded and peaceful spot if needed.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">For this reason, we stayed 10 minutes out of town on Lake Okareka, a peaceful little town with a great lake walk right at your doorstep. The Blue Lake is also near by.</span></p><div data-dcnode-id="1030" data-inserter-version="2" id="ezoic-pub-ad-placeholder-660"></div><span data-dcnode-id="1028" instrument_node="">
</span><div class="wp-block-image wp-image-20373 size-full" data-dcnode-id="1023"><figure class="aligncenter" data-dcnode-id="1024"><img alt="new zealand NZ road trip" class="wp-image-20373" data-dcnode-id="1027" height="577" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-37.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-37.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-37-300x173.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-37-768x443.jpg 768w" width="1000"><figcaption data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">take a walk around Lake Okareka. Our private apartment with lake views</span></figcaption></figure></div><span data-dcnode-id="1022" instrument_node="">

</span><h3 data-dcnode-id="967" id="h-distance-rotorua-to-bay-of-plenty-74-km-drive-time-54-mins"><span data-dcnode-id="968" style="color: #0000ff;"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Distance Rotorua to Bay of Plenty: 74 Km / drive time 54 mins</span></strong></span></h3><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">In less than an hour we find ourselves along the magnificent Bay of Plenty. The weather includes blue skies and calm conditions, perfect for a day of scenic walks.</span></p><div data-dcnode-id="962" data-inserter-version="2" id="ezoic-pub-ad-placeholder-661"></div><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The next two days are all about relaxation while just enjoying the beach.</span></p><span data-dcnode-id="957" instrument_node="">
</span><h4 data-dcnode-id="954" id="h-attractions-4"><span data-dcnode-id="955" style="font-size: 24pt;"><span data-dcnode-id="956" instrument_node="">ATTRACTIONS</span></span></h4><span data-dcnode-id="953" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="950"><figure class="aligncenter is-resized" data-dcnode-id="951"><img alt="" class="wp-image-3872" data-dcnode-id="952" height="67" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2018/03/attraction-pic.gif&amp;raw" width="68"></figure></div><span data-dcnode-id="949" instrument_node="">
</span><h5 data-dcnode-id="946" id="h-mt-maunganui-base-walk"><span data-dcnode-id="947" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="948" instrument_node="">Mt Maunganui base walk</span></span></h5><span data-dcnode-id="945" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="942"><figure class="aligncenter" data-dcnode-id="943"><img alt="" class="wp-image-20320" data-dcnode-id="944" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-13.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-13.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-13-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/NZNI-13-768x432.jpg 768w" width="1000"></figure></div><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The trendy town of Mt Maunganui sits at the end of a sand spit with water encompassing from all angles. The mountain itself is at the very tip and therefore provides a perfect coastal view walking track.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The town is a hub of activity, with droves of people out to enjoy the base walk around the mountain. The 3.4 km walk is an easy paced activity and you soon realize why it is considered one of New Zealand’s most popular walks.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">For those with extra energy and up for a challenge, you can choose to take the track to the summit which takes around 40 minutes to complete. it is considered somewhat strenuous but well worth the sweaty climb.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="929"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The rest of your day, including the next is all about taking some time to enjoy the beach, swim season or not. Why not try a range of activities on offer:</span></strong></p><div data-dcnode-id="927" data-inserter-version="2" id="ezoic-pub-ad-placeholder-662"></div><span data-dcnode-id="925" instrument_node="">

</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">I have booked the most incredible isolated cabin right on the beach. It is off grid, so no electricity and instead runs on a generator. It has private beach access, an outdoor hot tub overlooking the ocean and not a soul in sight.&nbsp; There is a kitchen, lounge, outdoor setting, BBQ area&nbsp; and free WiFi. Though it was just the two of us, the cabin (which is actually split into two separate cabins) can accommodate up to 7 people.</span></p><div data-dcnode-id="893" data-inserter-version="2" id="ezoic-pub-ad-placeholder-663"></div><span data-dcnode-id="891" instrument_node="">

</span><hr class="wp-block-separator" data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
</span><h3 data-dcnode-id="838" id="h-day-9-coromandel-peninsula"><span data-dcnode-id="839" style="font-size: 36pt;"><span data-dcnode-id="840" instrument_node="">Day 9 Coromandel Peninsula</span></span></h3><span data-dcnode-id="837" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="834"><figure class="aligncenter is-resized" data-dcnode-id="835"><img alt="" class="wp-image-1554" data-dcnode-id="836" height="61" sizes="(max-width: 84px) 100vw, 84px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-210x150.png 210w" width="84"></figure></div><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="829" id="h-distance-bay-of-plenty-to-coromandel-peninsula-160-km-drive-time-2-30-mins"><span data-dcnode-id="830" style="color: #0000ff;"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Distance Bay of Plenty to Coromandel Peninsula: 160 Km / drive time 2.30 mins</span></strong></span></h3><span data-dcnode-id="828" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Depending on where you chose to stay on the Bay of Plenty will determine how far your drive is up the coast. It may be less or more. The peninsula is an enjoyable drive with lots of stunning coastal scenery.</span></p><div data-dcnode-id="824" data-inserter-version="2" id="ezoic-pub-ad-placeholder-664"></div><span data-dcnode-id="822" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="819"><figure class="aligncenter is-resized" data-dcnode-id="820"><img alt="" class="wp-image-3872" data-dcnode-id="821" height="69" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2018/03/attraction-pic.gif&amp;raw" width="70"></figure></div><span data-dcnode-id="818" instrument_node="">
</span><h5 data-dcnode-id="815" id="h-hot-water-beach"><span data-dcnode-id="816" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="817" instrument_node="">Hot Water Beach</span></span></h5><span data-dcnode-id="814" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="812"><img alt="" class="wp-image-20377" data-dcnode-id="813" height="662" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotoshot-water-beach-NZ.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotoshot-water-beach-NZ.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotoshot-water-beach-NZ-300x199.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotoshot-water-beach-NZ-768x508.jpg 768w" width="1000"></figure><span data-dcnode-id="811" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Located between the towns of Tairua and Whitianga is a special little place known as Hot Water Beach.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">It’s where naturally heated mineral water makes it way to the earths surface on a stretch of sand along the Pacific Ocean. This unique place is only accessible 2 hours either side of the low tide. Come at high tide and you will find it all under water. Unfortunately I couldn’t get there at low tide but hopefully you’ll have better luck.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">You can dig your own personal hot tub then watch it wash away, ready for someone else tomorrow. Believe it or not, you can actually hire shovels from the store next to the car park. Because lets face it, how many people travel with a shovel for those “need to dig a hole” moments.</span></p><span data-dcnode-id="802" instrument_node="">
</span><h5 data-dcnode-id="799" id="h-cathedral-cove"><span data-dcnode-id="800" style="font-size: 24pt; color: #0000ff;"><span data-dcnode-id="801" instrument_node="">Cathedral Cove</span></span></h5><span data-dcnode-id="798" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="796"><img alt="" class="wp-image-20378" data-dcnode-id="797" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_cathedral-cove.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_cathedral-cove.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_cathedral-cove-300x200.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_cathedral-cove-768x512.jpg 768w, https://www.mytraveljam.com/wp-content/uploads/2021/07/Depositphotos_cathedral-cove-272x182.jpg 272w" width="1000"></figure><span data-dcnode-id="795" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Heading further up the coast from Hot Water Beach (only 10 minutes) is another famous landmark on the Coromandel Peninsula.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Cathedral Cove is a naturally formed arch and is the most popular tourist attraction in the area. Beautiful white sandy beaches can be found here on either side of the arch, and is the perfect place for a picnic and a swim if the weather is ideal.</span></p><div data-dcnode-id="788" data-inserter-version="2" id="ezoic-pub-ad-placeholder-665"></div><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Like Hot Water Beach, it is best seen 2 hours either side of high tide but is not a big deal if you can’t. You just won’t be able to pass through the arch without getting your lower half wet.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">To get to Cathedral Cove you will have to endure a gorgeous scenic walk that is 2.5 km each way and takes around 90 minutes return. There are two side tracks, Gemstone Bay and Stingray Bay that you can explore also.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">It is worth noting that the start of the trail head is 1.5 km’s from the actual car park for Cathedral Cove, and it’s steep. Shuttle buses run during the busy season but not the off season. But you will be able to drive your car all the way to the top car park without having to negotiate the hill.</span></p><span data-dcnode-id="777" instrument_node="">
</span><h4 data-dcnode-id="774" id="h-accommodation-5"><span data-dcnode-id="775" style="font-size: 24pt;"><span data-dcnode-id="776" instrument_node="">ACCOMMODATION</span></span></h4><span data-dcnode-id="773" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="770"><figure class="aligncenter is-resized" data-dcnode-id="771"><img alt="" class="wp-image-1556" data-dcnode-id="772" height="57" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/cartoon-bed.jpg&amp;raw" width="72"></figure></div><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Your last night is a couple hours from Auckland so make the most of it.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">If like us, you need to be a bit closer to the airport or to drop your rental car off, I recommend the most gorgeous little cottage in the town of Miranda. It’s right near a coastal bird sanctuary and offers great views of the area. That way you are less than an hour from the city but still far enough away to enjoy a peaceful last night.</span></p><div data-dcnode-id="762" data-inserter-version="2" id="ezoic-pub-ad-placeholder-666"></div><span data-dcnode-id="760" instrument_node="">
</span><div class="wp-block-image wp-image-20379 size-full" data-dcnode-id="755"><figure class="aligncenter" data-dcnode-id="756"><img alt="new zealand NZ road trip" class="wp-image-20379" data-dcnode-id="759" height="562" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-40.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-40.jpg 1000w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-40-300x169.jpg 300w, https://www.mytraveljam.com/wp-content/uploads/2021/07/new-zealand-40-768x432.jpg 768w" width="1000"><figcaption data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">The beautiful cottage was meticulously furnished with stunning rural views from the deck.</span></figcaption></figure></div><span data-dcnode-id="754" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="715"><table data-dcnode-id="716"><tbody data-dcnode-id="717"><tr data-dcnode-id="718"><td data-dcnode-id="719"><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="746" style="text-align: center;"><span data-dcnode-id="747" style="color: #0000ff;"><span data-dcnode-id="752" instrument_node="">Couples cottage – </span><strong data-dcnode-id="749"><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp20045159%253FadultsCount%253D2" style="color: #0000ff;"><span data-dcnode-id="751" instrument_node="">The Beautiful Cottage</span></a></strong><span data-dcnode-id="748" instrument_node="">– well appointed / close to Hot Springs</span></span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="738" style="text-align: center;"><span data-dcnode-id="739" style="color: #0000ff;"><span data-dcnode-id="744" instrument_node="">Couples retreat – </span><strong data-dcnode-id="741"><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/hotels/Tairua-Treehouse-Tairua-Holiday-Home%2CNewZealand-c49247-h5139460-details%3Fa_aid%3D194461" style="color: #0000ff;"><span data-dcnode-id="743" instrument_node="">Tauria Treehouse</span></a></strong><span data-dcnode-id="740" instrument_node=""> – up to 4 guests / privacy&nbsp;</span></span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="730" style="text-align: center;"><span data-dcnode-id="731" style="color: #0000ff;"><span data-dcnode-id="736" instrument_node="">Family Stay – </span><strong data-dcnode-id="733"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp7707489%253FadultsCount%253D2" style="color: #0000ff;"><span data-dcnode-id="735" instrument_node="">Oceana Escape</span></a></strong><span data-dcnode-id="732" instrument_node=""> – pool / sea views&nbsp;</span></span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="721" style="text-align: center;"><span data-dcnode-id="722" style="color: #0000ff;"><span data-dcnode-id="728" instrument_node="">Group Stay – </span><strong data-dcnode-id="724"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-100293218-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fen-au%252Fholiday-rental%252Fp7681844%253FadultsCount%253D7" style="color: #0000ff;"><span data-dcnode-id="727" instrument_node="">Whitianga House</span></a><span data-dcnode-id="725" instrument_node=""> </span></strong><span data-dcnode-id="723" instrument_node="">– pool/ close to beach / 5 bedroom</span></span></p><span data-dcnode-id="720" instrument_node="">
</span></td></tr></tbody></table></figure><span data-dcnode-id="714" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="709" id="h-day-9-auckland-return"><span data-dcnode-id="710" style="font-size: 24pt;"><span data-dcnode-id="711" instrument_node="">Day 9 Auckland return</span></span></h3><span data-dcnode-id="708" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="705"><figure class="aligncenter is-resized" data-dcnode-id="706"><img alt="" class="wp-image-1554" data-dcnode-id="707" height="52" sizes="(max-width: 71px) 100vw, 71px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4.png 433w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-300x220.png 300w, https://www.mytraveljam.com/wp-content/uploads/2017/12/car-4x4-210x150.png 210w" width="71"></figure></div><span data-dcnode-id="704" instrument_node="">
</span><h3 data-dcnode-id="700" id="h-distance-coromandel-peninsula-to-auckland-190-km-drive-time-2-35-mins"><span data-dcnode-id="701" style="color: #0000ff;"><strong data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Distance Coromandel Peninsula to Auckland : 190 Km / drive time 2.35 mins</span></strong></span></h3><span data-dcnode-id="699" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" style="font-size: 14pt; color: #0000ff;"><span data-dcnode-id="698" instrument_node="">Distance Miranda to Auckland : 80 km /&nbsp; drive time: 57 mins</span></span></strong></p><div data-dcnode-id="693" data-inserter-version="2" id="ezoic-pub-ad-placeholder-667"></div><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Our last day involved a slow drive back toward Auckland, probably because we just didn’t want it to end. We took a couple of detours just to make sure we were satisfied we had seen everything…..as you do.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">If you are coming from the Coromandel Peninsula and have time, continuing around the peninsula till you hit the town of Thames is well worth it. With unobstructed sea views, it’s a nice finish to your trip.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">Another worthwhile stop is at the </span><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Robert Findlay Wildlife Reserve</span></strong><span data-dcnode-id="681" instrument_node="">, a sanctuary for thousands of local and migrating birds. You will need to head to the town of&nbsp; Miranda before reconnecting back on the main highway, Auckland bound.</span></p><span data-dcnode-id="679" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
</span><h2 data-dcnode-id="674" id="h-north-island-nz-road-trip-review"><span data-dcnode-id="675" style="color: #0000ff; font-size: 24pt;"><span data-dcnode-id="676" instrument_node="">North Island NZ Road Trip Review</span></span></h2><span data-dcnode-id="673" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="670"><figure class="aligncenter" data-dcnode-id="671"><img alt="" class="wp-image-20316" data-dcnode-id="672" height="347" sizes="(max-width: 701px) 100vw, 701px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mytraveljam.com/wp-content/uploads/2021/07/NZ-bay-of-plenty-2.jpg&amp;raw" srcset="https://www.mytraveljam.com/wp-content/uploads/2021/07/NZ-bay-of-plenty-2.jpg 701w, https://www.mytraveljam.com/wp-content/uploads/2021/07/NZ-bay-of-plenty-2-300x149.jpg 300w" width="701"></figure></div><span data-dcnode-id="669" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">New Zealand is an epic country. So much to see and do in such a small space, and a changing landscape that surprises you at every turn. They certainly know how to tug at a tourists soft spot.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">My favourite part of New Zealand was the never ending scenery, and that’s free. Well most of it. And that is why a road trip is best suited to see it all. You get to do it your way and at a pace you are comfortable with.</span></p><div data-dcnode-id="662" data-inserter-version="2" id="ezoic-pub-ad-placeholder-668"></div><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">So why wait any longer if you are still contemplating if and when to go. Just do it. Because the world including you needs to see what makes this amazing destination so magical and special.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" style="font-size: 18pt;"><span data-dcnode-id="656" instrument_node="">What to read next:</span></span></p><span data-dcnode-id="653" instrument_node="">
