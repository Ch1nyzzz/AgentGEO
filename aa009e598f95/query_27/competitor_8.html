</span><p data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">Do you dream of palm trees, turquoise waters perfect for snorkeling, scuba diving, and surfing? Of eating tropical fruits, fresh seafood, and rainbow shave ice? I know I do, which I was I was thrilled to finally visited Hawaii in conjunction with my trip to Fiji and </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/the-best-things-to-do-in-tonga-a-tongatapu-island-guide/" title="The Best Things to do in Tonga: A Tongatapu Island Guide"><span data-dcnode-id="1511" instrument_node="">Tonga</span></a><span data-dcnode-id="1509" instrument_node="">. Not only was it perfect for breaking up a long, long, long, long, flight but it also made for a really fun travel destination. Considering heading here yourself? Here’s how to spend 1 week in Hawaii and my picks for the ultimate Oahu Itinerary.</span></p><span data-dcnode-id="1507" instrument_node="">

2_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_32_of_49_50-600x454.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_32_of_49_50-300x227.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_32_of_49_50-768x581.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_32_of_49_50-640x485.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1496" instrument_node="">
</span><h2 data-dcnode-id="1493"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Getting to Hawaii</span></strong></h2><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">For those who live under a rock, Hawaii is an island. Actually, I’m lying. Hawaii is a state that is made up of a number of islands. You can get here by boat (normally a cruise unless you are a master sailor in which case- can we be friends?), but most people will arrive by plane. In my experience in planning my own trip to Hawaii, the cheapest (and fastest) airport to fly into was Honolulu Airport on Oahu. This is the island that I stayed on and will use for the basis of this 1 week in Hawaii article. While you can island hop, it can be expensive and if you only have one week in Hawaii then you may as well set up a base on one island and explore. There’s more than enough to see and do on Oahu and I’m sharing my favourites in this Oahu itinerary.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><h2 data-dcnode-id="1486"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">1 Week in Hawaii: Getting around Oahu</span></strong></h2><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1481"><img alt="This is my Happy place rainbow coloured sign in Hawaii" class="aligncenter size-full wp-image-8058 entered lazyloaded" data-dcnode-id="1484" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-600x800.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-225x300.jpg 225w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-768x1024.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-640x853.jpg 640w" data-ll-status="loaded" height="1365" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg&amp;raw" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-600x800.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-225x300.jpg 225w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-768x1024.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-640x853.jpg 640w" width="1024"><noscript data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">&lt;img class="aligncenter size-full wp-image-8058" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg" alt="This is my Happy place rainbow coloured sign in Hawaii" width="1024" height="1365" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-600x800.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-225x300.jpg 225w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-768x1024.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/Hawaii-_Oahu_40_of_49_50-640x853.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1479" instrument_node="">As is the case with all Hawaiian Islands, the easiest way to get around is to rent a car. It allows you the most freedom and takes away any stress of time limits. If you are looking to rent a car, </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-8031835-12595013" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1478" instrument_node="">check out rental prices here</span></a><span data-dcnode-id="1476" instrument_node="">. That being said, I know that renting a car isn’t always an option, especially for those </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/solo-travel-in-hawaii/" title="Solo Travel in Hawaii: Oahu for Solo Travellers"><span data-dcnode-id="1475" instrument_node="">travelling solo to Hawaii&nbsp;</span></a><span data-dcnode-id="1473" instrument_node="">like I did. Don’t worry though, you won’t be stuck. There are ways to get around both Honolulu and the island.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1470" instrument_node="">In terms of Honolulu area, if you want the easy tourist route that hits the popular spots, consider getting tickets for the Waikiki Trolley which is a hop on hop off bus. You can get 1,4, or 7 day passes </span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/7-day-pass-waikiki-trolley-hop-on-hop-off-all-line-pass-t159701/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3Dwaikiki-trolley" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1469" instrument_node="">here.</span></a></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">You can also use the local bus system which is creatively called ‘The Bus’. The Bus is pretty good for getting around Honolulu and the nearby areas such as Pearl Harbour or Hanauma Bay. Your best bet is to buy daily passes as it’s the same price for that as it is for 2 trips. Buses can be cramped and busy, but the drivers are friendly and it is cheap.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">The same bus service works on the whole island, however, these journeys tend to be pretty long. I originally thought I’d take the bus up to the North Shore for a day trip but that wasn’t really realistic when I timed it out. I could have gone and spent a night somewhere there, but The Bus also isn’t ideal for carting your luggage around either.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">If you do want to explore more of the island, your best bet is to book day trips- there are lots of good ones that I’ll share later. Or, you could hire a taxi or private transfer to take you. Taxis and private hires aren’t cheap but, let’s be honest, nothing is in Hawaii.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1451"><em data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node="">Pssst. Looking to save money on your vacation? Check out my article on how to </span><strong data-dcnode-id="1453"><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/hawaii-on-a-budget/" title="Hawaii on a Budget: Oahu Guide"><span data-dcnode-id="1455" instrument_node="">explore Hawaii on a budget.</span></a></strong></em></p><span data-dcnode-id="1450" instrument_node="">
</span><h2 data-dcnode-id="1447"><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Where to Stay in Waikiki for 1 Week in Hawaii</span></strong></h2><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><img alt="Surfjack hotel Hawaii" class="aligncenter size-full wp-image-8010 entered lazyloaded" data-dcnode-id="1445" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-600x400.png 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-300x200.png 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-768x512.png 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-640x426.png 640w" data-ll-status="loaded" height="682" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png&amp;raw" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-600x400.png 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-300x200.png 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-768x512.png 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-640x426.png 640w" width="1024"><noscript data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">&lt;img class="aligncenter size-full wp-image-8010" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png" alt="Surfjack hotel Hawaii" width="1024" height="682" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM.png 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-600x400.png 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-300x200.png 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-768x512.png 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Screen-Shot-2019-01-28-at-1.41.14-PM-640x426.png 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">For my one week in Hawaii, I chose to base myself in Waikiki then relied on day trips and The Bus to get around for site seeing and tours. While I didn’t necessarily love that the Hawaii I experienced was a big city, I also recognized that without renting a car, it really is the best bet.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Honolulu is surprisingly big and it does take a while to get around. Since I’m a beach girl I chose to stay in Waikiki which I actually really liked. Cute shops, cool restaurants and bars, and gorgeous stretches of beach made it the ideal place to stay for a beach vacation. I definitely recommending choosing this part of Oahu as your base for your stay.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Need some recommendations?</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">If you are on a tight budget or looking to meet people you can try &nbsp;hostel. Honolulu has a couple and I stayed in one in Waikiki but it wasn’t great. It was pretty dirty, the staff was unfriendly, and it was so loud. So I can’t really recommend it.&nbsp;</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1428" instrument_node="">That being said, there are some nice more affordable hotel options. Try the </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/the-surfjack-hotel-amp-swim-club.en.html%3Faid%3D1210268%26no_rooms%3D1%26group_adults%3D1" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1427" instrument_node="">Surfjack Hotel.</span></a><span data-dcnode-id="1425" instrument_node=""> I stayed here for a couple nights at the end of my trip because I needed some privacy. It was about a 10-15-minute walk to Waikiki Beach and had a cool on-site pool. Rooms were spacious and kind of funky- definitely fit the island vibe. Another favourite is the </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/the-royal-hawaiian.en.html%3Faid%3D1210268%26no_rooms%3D1%26group_adults%3D2" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1424" instrument_node="">Royal Hawaiian</span></a><span data-dcnode-id="1422" instrument_node=""> which you may recognize as the pink hotel on Waikiki Beach. Other popular picks include the </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/waikiki-beachcomber-by-outrigger-honolulu.en.html%3Faid%3D1210268%26no_rooms%3D1%26group_adults%3D2" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1421" instrument_node="">Waikiki Beachcomber by Outrigger</span></a><span data-dcnode-id="1419" instrument_node=""> and the </span><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/hilton-hawaiian-village.en.html%3Faid%3D1210268%26no_rooms%3D1%26group_adults%3D1" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1418" instrument_node="">Hilton Hawaiian Village Waikiki.</span></a></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">Or, if you are really looking to splurge then try the </span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/moana-surfrider-a-westin-resort-spa.en.html%3Faid%3D1210268%26no_rooms%3D1%26group_adults%3D1" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1413" instrument_node="">Moana Surf Rider hotel</span></a><span data-dcnode-id="1411" instrument_node="">. It’s THE hotel to stay at in Waikiki and you can’t beat the location. I walked by a few times and definitely wished I had a bigger budget so I could stay there.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1408" instrument_node="">For more on where to stay in Oahu, check out </span><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/where-to-stay-in-oahu-hawaii/" rel="noopener" target="_blank" title="Where to Stay in Oahu, Hawaii: Honolulu &amp; Beyond"><span data-dcnode-id="1407" instrument_node="">this post.</span></a></p><span data-dcnode-id="1404" instrument_node="">
</span><h2 data-dcnode-id="1401" style="text-align: left;"><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">The Best Things to do in Oahu: My Oahu Itinerary Favourites</span></strong></h2><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Considering that Oahu is a pretty small island, it sure has a lot to see and do. Some is free, some is pricey (but worth it) so my biggest word of advice to is do a bit of planning ahead of time and figure out what it is you really want to see and do. A lot of the day trips and tours fill up quickly so your best bet is to book your spot in advance. With that in mind, here are my favourite things to do in Oahu that you should definitely consider adding to your Oahu itinerary.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><h3 data-dcnode-id="1394"><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Snorkelling at Hanauma Bay, Oahu’s Top Snorkel Site</span></strong></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1389"><img alt="Hanauma Bay" class="aligncenter size-full wp-image-7995 entered lazyloaded" data-dcnode-id="1392" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-640x480.jpg 640w" data-ll-status="loaded" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg&amp;raw" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-640x480.jpg 640w" width="1024"><noscript data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">&lt;img class="aligncenter size-full wp-image-7995" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg" alt="Hanauma Bay" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_1_of_49_50-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Oahu has no shortage of snorkeling spots but for those looking for a beautiful, easy spot to get to without having to hire a guide or take a tour, I recommend Hanauma Bay. It’s an easy bus ride from Waikiki and has a beautiful beach with a restaurant and change rooms on site making it perfect for a day trip. Hamauma Bay can get busy and crowded (especially on holidays and weekends) but I still thought it was worth it. The snorkeling offered plenty of multi-coloured corals and some bright reef fish plus the beach was gorgeous.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Please note that there is a small fee to enter.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><h3 data-dcnode-id="1379"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Watch the Surfers at Waikiki Beach</span></strong></h3><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1374"><img alt="Watching surfers at Waikiki Beach" class="aligncenter size-full wp-image-8056" data-dcnode-id="1377" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-600x400.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-300x200.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-768x512.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-640x427.jpg 640w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">&lt;img class="aligncenter size-full wp-image-8056" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280.jpg" alt="Watching surfers at Waikiki Beach" width="1024" height="682" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-600x400.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-300x200.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-768x512.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/sea-931164_1280-640x427.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1372" instrument_node="">Waikiki Beach is the busiest beach in Oahu, but you can’t leave the island without spending a little bit of time here whether it’s for swimming, or watching the sunset. The surfers here riding the waves are a pretty iconic site and, for those interested, you can even </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/group-surf-lesson-41-ratio-t15224/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3Dwaikiki-surf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1371" instrument_node="">take some lessons</span></a><span data-dcnode-id="1369" instrument_node=""> or just rent a board.</span><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1365" instrument_node="">
</span><h3 data-dcnode-id="1362"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Friday Night Fireworks in Waikiki</span></strong></h3><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">If you have one week in Hawaii, then you will likely be in Oahu for the Friday night fireworks in Waikiki. They aren’t particularily special fireworks per say, but I’m a sucker for fireworks any day so seeing these were pretty fun. I watched from the beach, though you need to be pretty selective about where you go because some of the beach hotels block the view. You can also watch from the water if you book a boat tour.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><h3 data-dcnode-id="1355"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Circle Island Tour of Oahu</span></strong></h3><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1350"><img alt="Circle Island Tour Hawaii" class="aligncenter size-full wp-image-8051" data-dcnode-id="1353" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-640x480.jpg 640w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">&lt;img class="aligncenter size-full wp-image-8051" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n.jpg" alt="Circle Island Tour Hawaii" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/41460064_244798252873829_5836705764642652160_n-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">If you don’t plan on renting a car and exploring the island on your own, then definitely take a full day circle island tour. There are dozens of operators for this, though some of the stops differ a little bit. The one I did went to a coffee farm, the Dole Plantation (where I had my first ever Dole whip- drool), a couple of gorgeous beaches up around the North Shore, Haleiwa Town, the famous North Shore food trucks, and even a cocktail stop. We had a TON of fun and I loved being able to get out of the city and see the sites with a local.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1345" instrument_node="">Want to book a circle island tour? </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/oahu-majestic-full-day-circle-island-tour-t156465/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3DOahu-circle-island" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1344" instrument_node="">Try this one.</span></a></p><span data-dcnode-id="1341" instrument_node="">
</span><h3 data-dcnode-id="1338"><strong data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Spot the Wild Dolphins of Hawaii</span></strong></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1333"><img alt="wild spinner dolphins in Hawaii" class="aligncenter size-full wp-image-7990" data-dcnode-id="1336" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-640x480.jpg 640w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">&lt;img class="aligncenter size-full wp-image-7990" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50.jpg" alt="wild spinner dolphins in Hawaii" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Wild_Dolphins_4_of_7_50-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">Oahu is known for it’s spinner dolphins which are beautiful to see out in the water. Prior to 2021, you could actually swim with them. However, while some people and businesses allowed you to swim with the dolphins in Hawaii ethically and responsibly, some didn’t. Sadly, it got to the point where laws had to be put into place to stay away from the dolphins for their safety and protection. While you can no longer swim with the dolphins in Hawaii, you can still go out and search for them in an ethical and responsible manner. </span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/whale-watching-waikiki-t42381/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3DOahu-dolphins" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1330" instrument_node="">This tour offers dolphin viewing as well as snorkel stops and, depending on the time of year, maybe some whale sightings.</span></a><span data-dcnode-id="1328" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1326" instrument_node="">
</span><h3 data-dcnode-id="1323"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Whale Watching in Hawaii (Winter Only)</span></strong></h3><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1318"><img alt="Humpback whale in Hawaii" class="aligncenter size-full wp-image-8054" data-dcnode-id="1321" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-640x480.jpg 640w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">&lt;img class="aligncenter size-full wp-image-8054" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280.jpg" alt="Humpback whale in Hawaii" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/humpback-whale-407201_1280-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1316" instrument_node="">Love whales? Me too. Hawaii is one of the best places to see humpback whales, especially on the North Shore. However, it is a seasonal activity that can only be done in the winter months. Whale season in Hawaii runs from November until May with the best viewings from January until March. While you can’t swim with the humpback whales in Hawaii (</span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/swimming-with-whales/" rel="noopener noreferrer" target="_blank" title="Swimming with Whales in Tonga: Everything You Need to Know"><span data-dcnode-id="1315" instrument_node="">you can in Tonga</span></a><span data-dcnode-id="1313" instrument_node="">&nbsp;and </span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/swimming-with-whales-in-tahiti-the-moorea-whale-swim/" rel="noopener" target="_blank" title="Swimming With Whales in Tahiti: The Mo’orea Whale Swim"><span data-dcnode-id="1312" instrument_node="">French Polynesia</span></a><span data-dcnode-id="1310" instrument_node="">) the whale watching tours are a great way to see them up close.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1307" instrument_node="">Book your whale watching tour in Hawaii </span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/whale-watching-waikiki-t42381/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3DOahu-whales" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1306" instrument_node="">here.</span></a></p><span data-dcnode-id="1303" instrument_node="">
</span><h3 data-dcnode-id="1300"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Shopping in Waikiki</span></strong></h3><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Shopping may not seem like one of the top things to do in Hawaii but I happened to be there a couple months before Christmas so I had a lot of fun checking out the shops in Waikiki and finding fun and unique things for friends and family back home- especially the women I was shopping for. From spa and bath products to unique beachy jewelry and more, there was lots to choose from. I might have even picked up a couple of fun things for myself (no regrets).&nbsp;</span></p><span data-dcnode-id="1296" instrument_node="">
</span><h3 data-dcnode-id="1293"><strong data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Take a Hike</span></strong></h3><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1288"><img alt="Hawaii sunset hike" class="aligncenter size-full wp-image-8055" data-dcnode-id="1291" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-600x400.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-300x200.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-768x512.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-640x427.jpg 640w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">&lt;img class="aligncenter size-full wp-image-8055" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280.jpg" alt="Hawaii sunset hike" width="1024" height="682" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-600x400.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-300x200.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-768x512.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/hawaii-839801_1280-640x427.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Oahu has tons of hiking trails, a couple of which are just outside Waikiki and can easily be reached by public transit. Perhaps the most popular hike is Diamond Head which offers a scenic overlook over Waikiki and the ocean. Just make sure you check opening and closing times ahead of time, we tried to go for sunset only to discover it was closed.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Another really popular hike in Oahu is Koko Head. This hike is made up of over 1200 ‘stairs’ formed by old train tracks. You should probably be a comfortable hiker to tackle this one as it can be a bit precarious at points but the viewpoint at the top makes it look like it’s worth it.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Perhaps the most iconic hike in Oahu is the Stairway to Heaven or the Haiku stairs. If you use Instagram no doubt you’ve seen several travel ‘influencers’ posting shots from this hike. Well, guess what? This hike is actually illegal and as of 2019 comes with a hefty fine of nearly $1000. The stairs are now considered to be too dangerous and there have been several deaths here. So, do yourself a favour, and skip this one.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><h3 data-dcnode-id="1275"><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Step into the Scenes of Your Favourite Movies</span></strong></h3><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1270"><img alt="" class="aligncenter size-full wp-image-7991" data-dcnode-id="1273" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-640x480.jpg 640w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">&lt;img class="aligncenter size-full wp-image-7991" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50.jpg" alt="" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_48_of_49_50-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Oahu is a popular filming locations for several well-known movies including the latest Jumagi, the Jurassic Park series, Forgetting Sarah Marshall, Pearl Harbour, Blue Crush, and many more. If you are a big movie fan in general, or love one of these specific movies then you may be interested in heading to the scenes where they were filmed.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Perhaps the most popular filming location in Hawaii is Kualoa Ranch which was the filming location for one of my favourites: Jurassic Park (love me some dinosaurs). A visit here does have to booked as part of a tour (you can book one here) but it’s a fun way to spend a day.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Another fun place to stop if you are renting a car is Turtle Bay Resort. You don’t have to stay here to visit (though it is beautiful and if you have the budget you may want to), but it’s worth popping into the bar to have a drink and check out the beach views. This is where Forgetting Sarah Marshall was filmed so you’ll probably recognize a lot of the scenery.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h3 data-dcnode-id="1257"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Learn about the History of Pearl Harbor</span></strong></h3><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1252"><img alt="Pearl Harbor and American flag" class="aligncenter size-full wp-image-8053" data-dcnode-id="1255" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-600x399.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-300x199.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-768x511.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-640x426.jpg 640w" height="681" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20681'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">&lt;img class="aligncenter size-full wp-image-8053" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280.jpg" alt="Pearl Harbor and American flag" width="1024" height="681" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-600x399.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-300x199.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-768x511.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/water-3296109_1280-640x426.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1250" instrument_node="">You can’t come to Hawaii without knowing a bit of history behind Pearl Harbor; home of the infamous bombing that kickstarted WWII. Pearl Harbor takes nearly an hour to get to by bus from Waikiki (so time your visit accordingly) and is comprised of several museums. Admission to the Arizona Memorial is free, though tickets are limited so I do recommend taking advantage of the book 1 day in advance option online. Booking opens at 7am for next day tours and costs $1.50USD to reserve your spot. These tickets are limited so get them while they last. You can get them </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.recreation.gov/ticket/facility/tour/16" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1249" instrument_node="">here.</span></a></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1245" instrument_node="">You can also visit with a guide to see other parts of Pearl Harbor as well.</span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/honolulu-l261/honolulu-pearl-habor-tour-with-arizona-memorial-t398362/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle%26cmp%3Dpearl-harbour" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1244" instrument_node=""> Take a look at this tour.</span></a></p><span data-dcnode-id="1241" instrument_node="">
</span><h3 data-dcnode-id="1238"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Embrace the Island Life</span></strong></h3><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1233"><img alt="Food Truck North Shore Hawaii" class="aligncenter size-full wp-image-7989" data-dcnode-id="1236" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-600x439.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-300x220.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-768x562.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-640x469.jpg 640w" height="750" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20750'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">&lt;img class="aligncenter size-full wp-image-7989" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50.jpg" alt="Food Truck North Shore Hawaii" width="1024" height="750" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-600x439.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-300x220.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-768x562.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_38_of_49_50-640x469.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Hawaii may be part of the USA, but it has its own culture and plenty of cool things to see, do, learn about, and try.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1228" instrument_node="">One of the best ways to enjoy your week in Hawaii is to make sure you try plenty of local food. If you love seafood and fresh fruit, you’ll be in heaven in Hawaii. Two of my Hawaiian favourites are poke bowls and rainbow shave ice, but there’s way more to try. Even if you don’t consider yourself to be experimental with food, do yourself a favour and pick one local spot for a meal rather than joining the massive queue at The Cheesecake Factory. Up for a foodie adventure? </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/oahu-food-and-sights-bus-tour-t266757/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26utm_source%3Deat_sleep_breathe_travel%26placement%3Dcontent-middle%26cmp%3DOahu-food-bus-tour" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1227" instrument_node="">Try this sightseeing food tour.</span></a></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">Another fun way to get your Aloha on is to join a Luau. Now, you need to know going in that these cater to tourists. It’s not a local thing that you happen to stumble upon. Oh, and they tend to come with hefty pricetags. But, you’ll get a pretty lei, a delicious meal, and an impressive show that makes for a fun night out. </span><strong data-dcnode-id="1220"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/oahu-l4966/ka-moana-luau-at-sea-life-park-t150332/%3Fpartner_id%3DO8H6E72%26utm_medium%3Donline_publisher%26utm_source%3Deat_sleep_breathe_travel%26placement%3Dcontent-middle%26cmp%3Dluau" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1222" instrument_node="">Book your Luau tickets here.</span></a></strong></p><span data-dcnode-id="1218" instrument_node="">
</span><h3 data-dcnode-id="1215"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Uncover the Royal History of Hawaii</span></strong></h3><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><img alt="Iolani Palace, Honolulu" class="aligncenter size-full wp-image-8059" data-dcnode-id="1213" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-600x388.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-300x194.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-768x497.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-640x415.jpg 640w" height="663" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20663'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">&lt;img class="aligncenter size-full wp-image-8059" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280.jpg" alt="Iolani Palace, Honolulu" width="1024" height="663" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-600x388.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-300x194.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-768x497.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/02/honolulu-1632072_1280-640x415.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Did you know that Hawaii had a royal family? Before it became part of the USA, Hawaii was a kingdom that was ruled by it’s own monarchs. In fact, Hawaii is the only place in the USA that has &nbsp;a real royal palace.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">The Iolani Palace was finished in 1882 and served as the home for the last king of Hawaii. Funnily enough, this palace actually received electricity before the White House. Today, travellers to Hawaii can visit this Iolani Palace and take a tour to discovery the history of Hawaii and it’s royal heritage.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">For those interested in Hawaii’s history and culture, another must is the Polynesian Cultural Centre. It’s one of the top-rated places to visit in Oahu and and offers some great experiences. There are multiple ticket options depending on the type of visit you wish to have. You can learn more </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polynesia.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1201" instrument_node="">here</span></a><span data-dcnode-id="1199" instrument_node="">.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h2 data-dcnode-id="1194"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Must Pack Items for 1 Week in Hawaii</span></strong></h2><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1189"><img alt="Sitting on the wall in Hanauma Bay, Hawaii" class="aligncenter size-full wp-image-7986" data-dcnode-id="1192" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50.jpg" data-lazy-srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-640x480.jpg 640w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">&lt;img class="aligncenter size-full wp-image-7986" src="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50.jpg" alt="Sitting on the wall in Hanauma Bay, Hawaii" width="1024" height="768" srcset="https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50.jpg 1024w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-600x450.jpg 600w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-300x225.jpg 300w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-768x576.jpg 768w, https://eatsleepbreathetravel.com/wp-content/uploads/2019/01/Hawaii-_Oahu_17_of_49_50-640x480.jpg 640w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Packing for a tropical vacation isn’t too tricky, but there are definitely a few must-have items that I strongly recommend you bring with you. One, because you’ll want them and two, because you’ll save yourself some money by bringing rather than having to buy while you are there. Here are my suggestions on what to pack for Hawaii.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><ul data-dcnode-id="1162"><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1183" instrument_node="">Dry bag: Perfect for keeping your clothing/towel/electronics dry for any beach days or time spent out on a boat. </span><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01GZCUCO0/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01GZCUCO0%26linkCode%3Das2%26tag%3Dhannahlogan21-20%26linkId%3D4724589f13b6a608f96aca832ec392c9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1182" instrument_node="">Get some here.</span></a></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1178" instrument_node="">A quick dry towel. Some resorts/hotels will give you beach towels but they tend to either be small or thick and slow to dry. I’m a big fan of this brand of quick dry towel for travel- plus they are big and perfect to dry off or use as a beach blanket.</span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B07L88DDQC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB07L88DDQC%26linkCode%3Das2%26tag%3Dhannahlogan21-20%26linkId%3D0ce14526d7514ec86920a23556f35c02" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1177" instrument_node=""> Take a look at these ones.</span></a></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">Reef Safe Sunscreen. Sunscreen is a must and a reef safe brand is the way to go. Especially since Hawaii is banning any non-reef-safe sunscreens. There are a few brands but I’m a big supporter of </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B017BVN9BC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB017BVN9BC%26linkCode%3Das2%26tag%3Dhannahlogan21-20%26linkId%3Df5c39c048e3b81e4436ce3f9717fb3ef" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1172" instrument_node="">Stream 2 Sea products</span></a><span data-dcnode-id="1170" instrument_node="">&nbsp;which have been tried and tested.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1167" instrument_node="">Good swimming gear! If you are a woman, check my list of tried and tested size-inclusive brands that I love for travel and the ocean </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/the-best-plus-size-swimsuits-for-travel/" rel="noopener" target="_blank" title="The Best Plus Size Swimsuits for Travel and Ocean Lovers"><span data-dcnode-id="1166" instrument_node="">here.</span></a></li><span data-dcnode-id="1163" instrument_node="">
</span></ul><span data-dcnode-id="1161" instrument_node="">
</span><div data-dcnode-id="1155" style="background-color: #cae2ff; padding: 1.0em; max-width: 45.0em; margin: 1.0em 0; border: solid 1.0px&nbsp;#cccccc;"><strong data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node=""> Psst: Wondering what my must-have travel items are? </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eatsleepbreathetravel.com/whats-in-my-bag/" rel="noopener noreferrer" target="_blank" title="What’s in My Bag: Travel Accessories I Can’t Live Without"><span data-dcnode-id="1159" instrument_node="">Here’s what you’ll always find in my bag</span></a><span data-dcnode-id="1157" instrument_node="">. </span></strong></div><span data-dcnode-id="1154" instrument_node="">
</span><h2 data-dcnode-id="1151"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Final Tips for Your Oahu Itinerary</span></strong></h2><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Oahu is a lot of fun and a great destination to choose for your one week in Hawaii. Whether you are looking for adventure, culture, or just a laid back vacation, you’ll find what you are looking for on this tropical island. Just remember that Hawaii is a dream destination for many, so for the best deals and to avoid disappointment, your best bet is to book things (hotels, tours, etc.) in advance to avoid disappointment!</span></p><span data-dcnode-id="1147" instrument_node="">
</span><h3 data-dcnode-id="1144"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">A Note on Travel Insurance in Hawaii</span></strong></h3><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1135"><em data-dcnode-id="1136"><span data-dcnode-id="1142" instrument_node="">Please, do NOT travel without travel insurance! I’ve had to rely on mine multiple times. While the cost may seem annoying and better spent elsewhere, trust me when I say you’ll be sorry if you don’t have it. For just a couple bucks a day, you can save yourself a whole lot of stress and money. I like to recommend </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safetywing.com/%3FreferenceID%3D24738580" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1141" instrument_node="">SafetyWing</span></a><span data-dcnode-id="1139" instrument_node=""> for travel medical insurance as they are one of the most affordable options I’ve found, plus, they are who I use and I have had great experiences with them. Learn more about the importance of travel insurance </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatsleepbreathetravel.com/travel-insurance/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1138" instrument_node="">here.</span></a></em></p><span data-dcnode-id="1134" instrument_node="">

</span><span data-dcnode-id="616" instrument_node=""> </span><img alt="Celebrating Mimouna!⁣ photo dump 📸 
⁣
So, what the heck is Mimouna?⁣
⁣
It’s a traditional celebration held at the end of Passover to mark the return of eating hametz (foods with leavening agents) which is avoided during the week of Passover. Mimouna isn’t typically celebrated by all Jews though, it’s a celebration common among those with Moroccan descent. ⁣
⁣
The parties are big- the bigger the better with tons of food and music and fun. From what I gathered, getting an invite to a Mimouna is a hot ticket here in Israel. And I was lucky enough to get a couple. ⁣
⁣
I spent Mimouna at my friend Asaf’s family home where his parents welcomed us with a seemingly endless display of drinks and food. ⁣
⁣
Drinks included wine, beer, water, soft drinks, of course, Moroccan mint tea. ⁣
⁣
As for the food, the tradition is couscous with ful (cooked fava beans) and of course moufleta which are delicious Moroccan crepes. They were served with butter and honey or all kinds of jams. And trust me, there were all kinds of jams. From strawberry and cherry to spicy mango, pomelo, and an apple cinnamon. ⁣
⁣
As if that wasn’t enough there is plenty of marzipan treats from the traditional fruit shaped sweets to my favourites- dates stuffed with marzipan. ⁣
⁣
The evening was spent drinking, eating, socializing and karaoke. Our hosts brought a DJ in for the night as the crowd sand their favourite Israeli songs. Of course being the random tourist who can’t speak Hebrew, we did a couple English ones too. Toxic by Brittany Spears and the classic Don’t Stop Believing by Journey. ⁣
⁣
As I’ve said before, getting to experience celebrations of different cultures is one of my all-time favourite things about travel. And I’m so glad I got to add Mimouna to the list!⁣
⁣

</span><img alt="Growing up in Canada I had a lot of misconceptions about Israel and Palestine. ⁣
⁣
Some of them were harmless, like assuming that because it’s the Middle East everything is desert. (It’s not. There is a lot of desert but also beautiful forested areas and lush green hills covered in wildflowers, and incredible gardens like this one)⁣
⁣
Some were a hard lesson learned. Like assuming that because it’s the Middle East it would be cheap (Fun fact- Tel Aviv was named as the most expensive city to live in the world back in December) ⁣
⁣
And some have been much more eye-opening. Like the assumption that the decades old conflict between Israel and Palestine meant that this part of the world is a war zone. ⁣
⁣
Are there major issues? Yes.⁣
Can it be at times scary? Yes. ⁣
Are there heartbreaking stories? Yes. ⁣
But is this land a dangerous war zone? ⁣
No. ⁣
⁣
I’ve faced a lot of criticism over my time here from what I’ve shared in my stories. People have complained that I’m showing beaches and markets and local food and not focusing enough on the conflict. ⁣
⁣
But that’s kinda the point. ⁣
⁣
I’m not a conflict expert (and there are a million problems with the assumption that I have to discuss it at all, much less on a daily basis.)⁣
⁣
But I am a culture enthusiast. A foodie. A solo female traveller. A history lover. And a people person. ⁣
⁣
Both Israel and Palestine offer so much when it comes to all of these things. ⁣
⁣
This part of the world- and the people in it- are so much more than just the conflict.

And that’s what I’m trying to share. ⁣
⁣

ps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/Cb-DSQAA4HE/" rel="noopener nofollow" style="height: 86.375px; background-image: url(&quot;https://eatsleepbreathetravel.com/wp-content/uploads/sb-instagram-feed-images/277953469_979075806072073_1578383730766975589_nfull.jpg&quot;); background-size: cover; background-position: center center; background-repeat: no-repeat;" target="_blank"><span data-dcnode-id="569" instrument_node="">

</span><img alt="⁣
If Aladdin’s cave of wonders was a real life place I’m pretty sure it would be Sinjalawi; a family store run by 4 artistic brothers in the heart of the Old City Jerusalem. ⁣
⁣
This is my favourite shop in the city (a must- visit if you need souvenirs! Especially handmade jewelry) and I’m so glad to see it still open after the struggles of Covid. ⁣
⁣
Old City ofJerusalem is so different right now. It’s crazy to me that I can walk through the streets and stop as I please. Chat with the vendors. And take photos of whatever I want. Pre-Covid you could barely move through the crowds that swarmed this part of the city. ⁣
⁣
While I personally love the quieter experience it’s hard hearing the store owners share how tough the last two years have been. I talked to several vendors in the Old City and in the Machneyuda Shuk yesterday about how difficult things have been lately. Its  hard to believe that 2 years later places are still struggling. And incredibly sad to see how many doors have closed, likely for good. ⁣
⁣
So for those of you who are starting to plan travel again, consider this your friendly reminder to shop and support local abroad as well as at home. Consider boutique hotels rather than chains. Family restaurants over familiar names, and local artisans over global brands. ⁣
⁣
And don’t forget to take the time to chat to the people too. I’m finding that as much as we missed travel, these individuals missed having us as travellers and I’m loving the conversations that I’ve been able to have with the locals along the way. ⁣
⁣
Ps: yes Sinjalawi had a magic lamp but unfortunately for me, no genie inside.

</span><img alt="1 month ago today I left cold snowy Canada for sunny Tel Aviv. I had planned to stay about 7 weeks- the longest I’ve stayed in one place (aside from Canada) in a decade. I chose it for the social aspect- I’m lucky enough to have several amazing friends here but I was concerned that I might get bored. That it might be too long in one spot. ⁣
⁣
But the truth is, in the last month I have fallen in love with life in Tel Aviv. ⁣
⁣
-I love how walkable it is.⁣
-I love that I’m right by the sea and that there are so many beaches. ⁣
-I love the food and drink which is hands down some of the best I’ve experienced around the world. ⁣
-I love the people here who have continually treated me with warmth and kindness (and patience!)⁣
-I love that there are dogs everywhere⁣
-I love how casual it is and that I don’t feel pressured to wear makeup or have perfect hair when i leave my apartment. ⁣
⁣
Tel Aviv is fun. It’s vibrant and I’m not ready to leave in 3 weeks when my apartment lease is up. ⁣
⁣
So I’m going to stick around a bit longer because I’m pretty freaking happy here. ⁣
⁣

</span><img alt="Covid quarantine has me feeling like a cross between Rapunzel trapped in her tower and Ariel singing about how she wants to be where the people are. ⁣
⁣
If my life was a Disney movie or romcom some beautiful Israeli man would see me in the window, get my attention, ask for my number, send me some flowers and beg to take me on a date as soon as my isolation ends. ⁣
⁣
Alas, my life seems to be providing lots of comedy but zero romance. The only man I seem to have gained the attention of these last two days was an old guy parked in a truck who definitely saw me having a dance party while eating ice cream straight from the container yesterday afternoon. ⁣
⁣
Desperate times call for desperate measures 🍦 ⁣
⁣
Also, note to self: people CAN see into my windows from the street. ⁣
⁣
Ice cream dance parties aside, these past couple of days haven’t exactly been fun. While I am beyond grateful to feel relatively physically healthy with this virus, the mental and emotional aspect is a bit of a whirlwind.⁣
⁣
-Figuring out what to do as a foreigner is hard. ⁣
-Trying to find help in English is hard. ⁣
-Wondering if things might get worse is hard ⁣
-Being alone right now is hard. ⁣
⁣
Yesterday I ended up completely overwhelmed and burst into tears. Twice. ⁣
⁣
But, I also knew that this was a possibility. ⁣
I knew the risk I was taking by travelling during the pandemic. ⁣
I knew that it would be up to me to figure it out and take care or myself. ⁣
⁣
But I am figuring it out. I always do. ⁣
⁣
Crossing my fingers that things go smoothly and I can leave isolation on Monday. But in the meantime… I might need more ice cream. ⁣

</span><img alt="One of the questions I’ve been asked the most over the last few days in Tel Aviv is how I can just decide to come live here for a few months as a non-resident. Especially when I’m not Jewish. ⁣
⁣
So here’s the deal. ⁣
⁣
As a Canadian I am allowed to spend 3 months in Israel at a time on a tourist visa. I didn’t need to apply in advance, I got it on arrival. ⁣
⁣
I also work for myself. I run my own business that is fully online. It’s registered in Canada and all I need to work is the internet. This means I can work anywhere in the world as long as I have internet without it being an issue. ⁣
⁣
As for finding a place to live, I got a fully furnished vacation rental for 7 weeks. It’s expensive compared to other countries but significantly cheaper than staying in hotels. Plus it has a full kitchen (and laundry facilities), which helps me cut down on costs as well since I can cook for myself rather than eating out. ⁣
⁣
Everything is fully legal and allowed. I’m not breaking any rules.⁣
⁣
The best part? I can do this pretty much anywhere in the world. And if you work remotely, you might be able to as well. Worth thinking about 😉⁣
⁣

</span><img alt="Spring has sprung!
Well, at least it has here in Israel. 

It felt pretty strange going out to see the spring flowers at the beginning of March when home is still covered in ice and snow. But I’m definitely not complaining. Israel this time of year is lush, green and absolutely beautiful. 

This past weekend I joined a couple of friends in a day trip up north to check out some of the flowers. We lucked in and saw a huge grove of almond trees with their pale pink and white blossoms. We also went in search of fields of wild lupine. Full disclosure: it was meant to be a hike but after getting a bit lost on an random (but very entertaining) off-roading adventure we didn’t quite make it in time but still managed to find them at another spot. 

On top of the almond blossoms and lupine, Israel spring blooms also include iris, orchids, and red anemones which are the most popular. 

So if you are thinking about planning a trip to Israel and want to skip the winter rain and summer heat, definitely plan for this time of year. The weather is great and the nature is stunning. 

Just be warned: Saturday evening traffic here is no joke!
