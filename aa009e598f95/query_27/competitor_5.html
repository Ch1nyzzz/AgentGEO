n></p></div></div></header><div class="big-leader big-leader--scriptless" data-dcnode-id="1509"><img alt="National and State Parks" aria-hidden="true" class="big-leader__image post-image" data-dcnode-id="1511" height="660" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w" width="1200"><div class="wrap" data-dcnode-id="1510"></div></div><div class="site-inner" data-dcnode-id="381"><div class="wrap" data-dcnode-id="382"><div class="content-sidebar-wrap" data-dcnode-id="383"><main class="content" data-dcnode-id="528" id="genesis-content"><div class="breadcrumb" data-dcnode-id="1501"><span data-dcnode-id="1502"><span data-dcnode-id="1503"><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/"><span data-dcnode-id="1508" instrument_node="">Home</span></a><span data-dcnode-id="1506" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">National Parks</span></span></span></span></div><article aria-label="National and State Parks" class="post-195 page type-page status-publish has-post-thumbnail entry" data-dcnode-id="529"><header class="entry-header" data-dcnode-id="1479"><h1 class="entry-title" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">National and State Parks</span></h1><div class="mobile-only entry-meta" data-dcnode-id="1480"><span data-dcnode-id="1498" instrument_node="">By </span><span class="entry-author" data-dcnode-id="1495"><span class="entry-author-name" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Love Big Island</span></span></span><span data-dcnode-id="1494" instrument_node=""> | updated </span><time class="entry-modified-time" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">March 22, 2022</span></time><p class="sidetoc-icons social" data-dcnode-id="1481"><a class="link" data-dcnode-id="1490" data-pin-color="red" data-pin-config="beside" data-pin-custom="true" data-pin-do="buttonPin" data-pin-height="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fstate-national-parks%252F%26media%3Dhttps%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg%26description%3DNational%2520and%2520State%2520Parks" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'pinterest'});" rel="noopener" target="_blank"><span class="icon-pinterest" data-dcnode-id="1491"></span></a><a class="link" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fstate-national-parks%252F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'facebook'});" rel="noopener" target="_blank"><span class="icon-facebook" data-dcnode-id="1489"></span></a><a class="link" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DNational%2520and%2520State%2520Parks%26url%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fstate-national-parks%252F%26via%3Dlovebigisland" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'twitter'});" rel="noopener" target="_blank"><span class="icon-twitter" data-dcnode-id="1487"></span></a><a class="link" data-dcnode-id="1484" href="mailto:?subject=National%20and%20State%20Parks&amp;body=https%3A%2F%2Fwww.lovebigisland.com%2Fstate-national-parks%2F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'email'});"><span class="icon-mail4" data-dcnode-id="1485"></span></a><a class="link" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'other'});"><span class="icon-share2" data-dcnode-id="1483"></span></a></p></div></header><div class="entry-content" data-dcnode-id="530"><p data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node="">The Big Island is a place with incredible natural beauty and a rich cultural history and we are not surprised that 4 (out of 5) of the National Parks in Hawaii are on our island. Next to those we also host 14 state parks </span><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">and</span></strong><span data-dcnode-id="1475" instrument_node=""> a 175 mile (282 km) national historic trail.</span></p><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">You can find a summary of all those national and state parks on this page:</span></p><div class="fixed-toc" data-dcnode-id="1445"><p data-dcnode-id="1469"><span class="icon-file-text" data-dcnode-id="1471"></span><span data-dcnode-id="1470" instrument_node=""> Table of contents</span></p><p data-dcnode-id="1468"></p><ul data-dcnode-id="1447"><li data-dcnode-id="1463"><a data-dcnode-id="1465" href="#map"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Map of all parks</span></strong></a><span data-dcnode-id="1464" instrument_node=""> on the Big Island</span></li><li data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">List of </span><strong data-dcnode-id="1459"><a data-dcnode-id="1460" href="#national-parks"><span data-dcnode-id="1461" instrument_node="">4 National Parks</span></a></strong></li><li data-dcnode-id="1453"><span data-dcnode-id="1457" instrument_node="">List of </span><strong data-dcnode-id="1454"><a data-dcnode-id="1455" href="#state-parks"><span data-dcnode-id="1456" instrument_node="">14 State Parks</span></a></strong></li><li data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">The </span><strong data-dcnode-id="1449"><a data-dcnode-id="1450" href="#national-historic-trail"><span data-dcnode-id="1451" instrument_node="">Ala Kahakai National Historic Trail</span></a></strong></li></ul><p data-dcnode-id="1446"></p></div><details class="mobtoc" data-dcnode-id="1418"><summary data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Table of Contents</span></summary><p data-dcnode-id="1442"></p><ul data-dcnode-id="1421"><li data-dcnode-id="1437"><a data-dcnode-id="1439" href="#map"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Map of all parks</span></strong></a><span data-dcnode-id="1438" instrument_node=""> on the Big Island</span></li><li data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">List of </span><strong data-dcnode-id="1433"><a data-dcnode-id="1434" href="#national-parks"><span data-dcnode-id="1435" instrument_node="">4 National Parks</span></a></strong></li><li data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">List of </span><strong data-dcnode-id="1428"><a data-dcnode-id="1429" href="#state-parks"><span data-dcnode-id="1430" instrument_node="">14 State Parks</span></a></strong></li><li data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">The </span><strong data-dcnode-id="1423"><a data-dcnode-id="1424" href="#national-historic-trail"><span data-dcnode-id="1425" instrument_node="">Ala Kahakai National Historic Trail</span></a></strong></li></ul><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node=""> </span></p></details><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Exploring our parks is guaranteed to give an extra dimension to your stay here on the Big Island!</span></p><h2 data-dcnode-id="1414" id="map"><span data-dcnode-id="1415" instrument_node="">Map of National and state parks</span></h2><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Most parks are evenly spread along the coast of the island, while some (most notable the Hawaii Volcanoes National Park) can be found further inland. The following map shows the locations of the state and national parks on the Big Island:</span></p><p data-dcnode-id="1410"><iframe data-dcnode-id="1411" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/embed%3Fmid%3D1Z5e1KbNmJCc8F6OYIv0Qy_-1ypc-V7DT&amp;raw" width="100%"></iframe></p><h2 data-dcnode-id="1408" id="national-parks"><span data-dcnode-id="1409" instrument_node="">National Parks</span></h2><p data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node="">There are five national parks in the state of Hawaii (four of which are on the Big Island) and each of them is worth a visit. Our national parks were established to preserve the </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/history-and-culture/"><span data-dcnode-id="1406" instrument_node="">island history and natural wonders</span></a><span data-dcnode-id="1404" instrument_node=""> which means that </span><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">they are excellent sites to explore, to learn about, and to see, the natural treasures of the Big Island</span></strong><span data-dcnode-id="1401" instrument_node="">.</span></p><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The four national parks on the Big Island are:</span></p><ol data-dcnode-id="1381"><li data-dcnode-id="1394"><a data-dcnode-id="1395" href="#hvnp"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Hawaii Volcanoes NP</span></strong></a></li><li data-dcnode-id="1390"><a data-dcnode-id="1391" href="#honaunau"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Puʻuhonua o Honaunau NHP</span></strong></a></li><li data-dcnode-id="1386"><a data-dcnode-id="1387" href="#kaloko"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Kaloko-Honokohau NHP</span></strong></a></li><li data-dcnode-id="1382"><a data-dcnode-id="1383" href="#Puukohala"><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Puʻukohala Heiau NHP</span></strong></a></li></ol><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">The two National Parks in the state that are </span><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">*not* on the Big Island</span></strong><span data-dcnode-id="1377" instrument_node=""> are:</span></p><ol data-dcnode-id="1355"><li data-dcnode-id="1366"><span data-dcnode-id="1375" instrument_node="">The gorgeous </span><strong data-dcnode-id="1372"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/maui/haleakala/" rel="noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">Haleakalā National Park</span></a></strong><span data-dcnode-id="1371" instrument_node=""> on </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/maui/"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Maui</span></strong></a><span data-dcnode-id="1367" instrument_node="">, and</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1365" instrument_node="">The interesting but very difficult to reach </span><strong data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/kala/planyourvisit/index.htm" rel="noopener" target="_blank"><span data-dcnode-id="1364" instrument_node="">Kalaupapa National Historical Park</span></a></strong><span data-dcnode-id="1361" instrument_node=""> on </span><strong data-dcnode-id="1358"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/molokai/"><span data-dcnode-id="1360" instrument_node="">Molokaʻi</span></a></strong><span data-dcnode-id="1357" instrument_node="">.</span></li></ol><h3 data-dcnode-id="1353" id="hvnp"><span data-dcnode-id="1354" instrument_node="">1: Hawaii Volcanoes National Park</span></h3><p data-dcnode-id="1348"><span data-dcnode-id="1352" instrument_node="">This National park located between Hilo and Kona on the southern flanks of the Kilauea and Mauna Loa volcano is both for locals and for tourists </span><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">by far</span></strong><span data-dcnode-id="1349" instrument_node=""> the most popular attraction on the Big Island. It also is one of the few places on this planet where you can safely watch an active volcano (Kilauea) up, close and personal.</span></p><p data-dcnode-id="1340"><span data-dcnode-id="1347" instrument_node="">According to us and many others </span><strong data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">this park is the one “must-see” destination on the Big Island</span></strong><span data-dcnode-id="1344" instrument_node="">. You can find an </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-volcanoes-national-park/"><span data-dcnode-id="1343" instrument_node="">in depth guide for the Hawaii Volcanoes National Park</span></a><span data-dcnode-id="1341" instrument_node=""> on our website.</span></p><p data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Opening hours</span></strong><span data-dcnode-id="1337" instrument_node=""> – Daily: 7:45 a.m. to 5 p.m. (Kilauea Visitor Center), 10 a.m. to 9 p.m. (Ranger station, chain of craters road)</span></p><div class="wp-caption aligncenter" data-dcnode-id="1329" id="attachment_3853" style="width: 810px"><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents.jpg" rel="attachment wp-att-3853"><noscript data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">&lt;img aria-describedby="caption-attachment-3853" class="wp-image-3853 size-large" src="https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-800x533.jpg" alt="Steam vents in the Hawaii Volcanoes National Park" width="800" height="533" srcset="https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-800x533.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-620x413.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-768x512.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-320x213.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-400x267.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-600x400.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoe oads/hawaii-volcanoes-national-park-steam-vents-800x533.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-800x533.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-620x413.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-768x512.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-320x213.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-400x267.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-600x400.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-576x384.jpg 576w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents-864x576.jpg 864w, https://www.lovebigisland.com/wp-content/uploads/hawaii-volcanoes-national-park-steam-vents.jpg 1200w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1330" id="caption-attachment-3853"><span data-dcnode-id="1331" instrument_node="">Steam vents in the Hawaii Volcanoes National Park, a few minutes from the visitor center.</span></p></div><h4 data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The Kahuku unit</span></h4><p data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">In 2003 a new 116,000 acre section of the park was acquired: the Kahuku unit. It is located in the Kaʻu district about halfway between Kona and the Hawaii Volcanoes National Park and boasts some beautiful hikes. Read more about the </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kau/%23kahuku"><span data-dcnode-id="1325" instrument_node="">Kahuku unit</span></a><span data-dcnode-id="1323" instrument_node=""> on our website.</span></p><h3 data-dcnode-id="1320" id="honaunau"><span data-dcnode-id="1321" instrument_node="">2: Puʻuhonua o Honaunau National Historical Park</span></h3><p data-dcnode-id="1315"><span data-dcnode-id="1319" instrument_node="">Puʻuhonua means “place of refuge”: this is the site where Hawaiians that broke a </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">kapu</span></em><span data-dcnode-id="1316" instrument_node=""> (law) fled to avoid punishment. Warriors that were defeated during battle also sought refuge here.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The park contains numerous archaeological sites: from temple platforms and royal fishponds to the “Hale o Keawe”, a reconstructed Hawaiian temple.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1306" id="attachment_8925" style="width: 810px"><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-H%25C5%258Dnaunau.jpg" rel="attachment wp-att-8925"><noscript data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">&lt;img aria-describedby="caption-attachment-8925" class="wp-image-8925 size-large" src="https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-800x321.jpg" alt="Pu'uhonua o Hōnaunau, national park, big island, hawaii, palm tree, coconut, tropical" width="800" height="321" srcset="https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-800x321.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-620x249.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-400x160.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-768x308.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-320x128.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-600x241.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Pu'uhonua o Hōnaunau, national park, big island, hawaii, palm tree, coconut, tropical" aria-describedby="caption-attachment-8925" class="wp-image-8925 size-large lazyloaded" data-dcnode-id="1310" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-800x321.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-800x321.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-620x249.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-400x160.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-768x308.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-320x128.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-600x241.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau.jpg 1200w" height="321" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-H%25C5%258Dnaunau-800x321.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-800x321.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-620x249.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-400x160.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-768x308.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-320x128.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau-600x241.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Pu-uhonua-o-Hōnaunau.jpg 1200w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1307" id="caption-attachment-8925"><span data-dcnode-id="1308" instrument_node="">The Puʻuhonua o Hōnaunau park has a definite tropical feel: it is filled with white sand and coconut palms!</span></p></div><p data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node="">The park is located in the middle of the tropical and lush Kona coffee belt and is very close to two of the </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/great-snorkeling-spots-hawaii/"><span data-dcnode-id="1304" instrument_node="">best snorkeling spots on the Big Island</span></a><span data-dcnode-id="1302" instrument_node="">. This makes it a great place to combine learning about native Hawaiian customs with a snorkeling trip and/or a </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kona-coffee-tasting/"><span data-dcnode-id="1301" instrument_node="">visit to a Kona coffee farm</span></a><span data-dcnode-id="1299" instrument_node="">.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1297" instrument_node="">Read more about visiting this park in our </span><strong data-dcnode-id="1294"><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks/puuhonua-o-honaunau/"><span data-dcnode-id="1296" instrument_node="">in-depth guide to the Puʻuhonua o Honaunau National Park</span></a></strong><span data-dcnode-id="1293" instrument_node=""> and/or visit the </span><strong data-dcnode-id="1290"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/puho/index.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1292" instrument_node="">official park website.</span></a></strong></p><p data-dcnode-id="1285"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Opening hours</span></strong><span data-dcnode-id="1286" instrument_node="">: Daily 8 a.m. to 5 p.m. (Visitor Center).</span></p><div class="wp-caption aligncenter" data-dcnode-id="1276" id="attachment_3531" style="width: 810px"><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg" rel="attachment wp-att-3531"><noscript data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">&lt;img aria-describedby="caption-attachment-3531" class="wp-image-3531 size-large" src="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg" alt="Pu'uhonua o Honaunau National Park on the Big Island of Hawaii" width="800" height="440" srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Pu'uhonua o Honaunau National Park on the Big Island of Hawaii" aria-describedby="caption-attachment-3531" class="wp-image-3531 size-large ls-is-cached lazyloaded" data-dcnode-id="1282" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" height="440" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1277" id="caption-attachment-3531"><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks/puuhonua-o-honaunau/"><span data-dcnode-id="1280" instrument_node="">Puʻuhonua o Honaunau National Park</span></a><span data-dcnode-id="1278" instrument_node=""> on the Big Island of Hawaii is a good place to take in Hawaiian History. Next door (300 feet from the park entrance) is one of the best places of the island to go snorkeling</span></p></div><h3 data-dcnode-id="1274" id="kaloko"><span data-dcnode-id="1275" instrument_node="">3: Kaloko-Honokohau National Historic Park</span></h3><p data-dcnode-id="1257"><span data-dcnode-id="1273" instrument_node="">This park protects an ancient Hawaiian settlement. It contains partitions of the typically Hawaiian </span><em data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">ahupuaʻa</span></em><span data-dcnode-id="1270" instrument_node=""> (land divisions that divided the land into zones between the mountain and ocean). You can also find ancient </span><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">kiʻi pohaku (</span></em><span data-dcnode-id="1267" instrument_node="">petroglyphs or rock engravings), </span><em data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">kahua</span></em><span data-dcnode-id="1264" instrument_node=""> (housing platforms), </span><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">holua</span></em><span data-dcnode-id="1261" instrument_node=""> (stone slide) and </span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">heiau</span></em><span data-dcnode-id="1258" instrument_node=""> (a place of worship) here.</span></p><p data-dcnode-id="1253"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Opening hours</span></strong><span data-dcnode-id="1254" instrument_node=""> – Daily 8:30 a.m. to 4 p.m. (Hale Ho’okipa Visitor Center)</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">Visit the </span><strong data-dcnode-id="1249"><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/kaho/index.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1251" instrument_node="">official park website.</span></a></strong></p><div class="wp-caption aligncenter" data-dcnode-id="1241" id="attachment_5836" style="width: 810px"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1.jpg" rel="attachment wp-att-5836"><noscript data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&lt;img aria-describedby="caption-attachment-5836" class="wp-image-5836 size-large" src="https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg" alt="Kaloko Fishpond in the Kaloko-Honokōhau National Historical Park, hawaii, national park" width="800" height="429" srcset="https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-620x333.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-768x412.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-320x172.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-400x215.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-600x322.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-1038x557.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-694x372.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Kaloko Fishpond in the Kaloko-Honokōhau National Historical Park, hawaii, national park" aria-describedby="caption-attachment-5836" class="wp-image-5836 size-large lazyloaded" data-dcnode-id="1245" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-620x333.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-768x412.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-320x172.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-400x215.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-600x322.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-1038x557.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-694x372.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1.jpg 1280w" height="429" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-800x429.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-620x333.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-768x412.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-320x172.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-400x215.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-600x322.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-1038x557.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1-694x372.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/kaloko-fishpond-1.jpg 1280w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1242" id="caption-attachment-5836"><span data-dcnode-id="1243" instrument_node="">Aerial view of the Kaloko Fishpond in the Kaloko-Honokōhau National Historical Park from the east. Image credit: NPS</span></p></div><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">A big bonus to the Koloko Honokohau park are the two beaches: Honokohau and Aiʻopio beach. These two beaches combine into a 1-mile long sandy beach that never gets too busy. The water here is calm and there is plenty of shade. Perfect for a visit with small children.</span></p><p data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">Honokohau Harbor, directly below (south) of the park, is also a </span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/snorkeling/"><span data-dcnode-id="1237" instrument_node="">good spot to go snorkeling</span></a><span data-dcnode-id="1235" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1227" id="attachment_6456" style="width: 810px"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island.jpg" rel="attachment wp-att-6456"><noscript data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">&lt;img aria-describedby="caption-attachment-6456" class="wp-image-6456 size-large" src="https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-800x488.jpg" alt="A close up of the sand at Ai'opio beach" width="800" height="488" srcset="https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-800x488.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-620x378.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-768x469.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-320x195.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-400x244.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-600x366.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-629x384.jpg 629w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-944x576.jpg 944w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="A close up of the sand at Ai'opio beach" aria-describedby="caption-attachment-6456" class="lazyload wp-image-6456 size-large" data-dcnode-id="1231" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-800x488.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-800x488.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-620x378.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-768x469.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-320x195.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-400x244.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-600x366.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-629x384.jpg 629w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island-944x576.jpg 944w, https://www.lovebigisland.com/wp-content/uploads/close-up-sand-big-island.jpg 1280w" height="488" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20488%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1228" id="caption-attachment-6456"><span data-dcnode-id="1229" instrument_node="">A close up of the sand at Aiʻopio beach</span></p></div><h3 data-dcnode-id="1225" id="Puukohala"><span data-dcnode-id="1226" instrument_node="">4: Puʻukohala Heiau National Historic Park</span></h3><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">How many places in the USA do you know where you can walk in the footsteps of a king? As far as we know, this is the only one!</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Kamehamea I build this place of worship around 1790 and dedicated it to the war god Kūkaʻilimoku. After having build the temple he set out to conquer the neighboring islands, in which he succeeded. This was the first time that the Hawaiian islands were united under one king: King Kamehamea I!</span></p><p data-dcnode-id="1217"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Opening hours</span></strong><span data-dcnode-id="1218" instrument_node=""> – Daily 7:30 a.m. to 4 p.m. (Visitor Center)</span></p><p data-dcnode-id="1211"><span data-dcnode-id="1216" instrument_node="">Visit the </span><strong data-dcnode-id="1213"><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/puhe/index.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1215" instrument_node="">official website</span></a></strong><span data-dcnode-id="1212" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1204" id="attachment_5834" style="width: 810px"><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS.jpg" rel="attachment wp-att-5834"><noscript data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">&lt;img aria-describedby="caption-attachment-5834" class="wp-image-5834 size-large" src="https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-800x450.jpg" alt="Pu'ukohola Heiau National Historic Site, national park, hawaii" width="800" height="450" srcset="https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-800x450.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-620x349.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-768x432.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-320x180.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-400x225.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-600x338.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-1024x576.jpg 1024w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-683x384.jpg 683w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Pu'ukohola Heiau National Historic Site, national park, hawaii" aria-describedby="caption-attachment-5834" class="lazyload wp-image-5834 size-large" data-dcnode-id="1208" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-800x450.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-800x450.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-620x349.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-768x432.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-320x180.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-400x225.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-600x338.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-1024x576.jpg 1024w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS-683x384.jpg 683w, https://www.lovebigisland.com/wp-content/uploads/Puukohola-Heiau-NHS.jpg 1280w" height="450" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20450%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1205" id="caption-attachment-5834"><span data-dcnode-id="1206" instrument_node="">The Puʻukohola Heiau National Historic Site. Image credit: NPS</span></p></div><h2 data-dcnode-id="1202" id="state-parks"><span data-dcnode-id="1203" instrument_node="">State Parks</span></h2><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">The Hawaiʻi’s State Park System is composed of 51 state parks state wide, 14 of which you can find on the Big Island. The parks offer varied outdoor recreation and cultural/heritage opportunities and range from landscaped grounds with developed facilities to rugged natural areas with trails and primitive facilities.</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The 14 state parks on the Big Island are:</span></p><div data-dcnode-id="1123"><div class="one-half first" data-dcnode-id="1161"><ol data-dcnode-id="1162"><li data-dcnode-id="1192"><a data-dcnode-id="1193" href="#akaka"><span data-dcnode-id="1197" instrument_node="">ʻ</span><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Akaka Falls</span></strong><span data-dcnode-id="1194" instrument_node=""> State Park</span></a></li><li data-dcnode-id="1187"><a data-dcnode-id="1188" href="#hapuna"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Hāpuna Beach</span></strong><span data-dcnode-id="1189" instrument_node=""> State Recreation Area</span></a></li><li data-dcnode-id="1183"><a data-dcnode-id="1184" href="#hulihee"><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Huliheʻe Palace</span></strong></a></li><li data-dcnode-id="1178"><a data-dcnode-id="1179" href="#kalopa"><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Kalōpā</span></strong><span data-dcnode-id="1180" instrument_node=""> State Recreation Area</span></a></li><li data-dcnode-id="1173"><a data-dcnode-id="1174" href="#kealakekua"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Kealakekua Bay</span></strong><span data-dcnode-id="1175" instrument_node=""> State Historical Park</span></a></li><li data-dcnode-id="1168"><a data-dcnode-id="1169" href="#kekaha"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Kekaha Kai</span></strong><span data-dcnode-id="1170" instrument_node=""> State Park</span></a></li><li data-dcnode-id="1163"><a data-dcnode-id="1164" href="#kiholo"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Kīholo</span></strong><span data-dcnode-id="1165" instrument_node=""> State Park Reserve</span></a></li></ol></div><div class="one-half" data-dcnode-id="1124"><ol data-dcnode-id="1125" start="8"><li data-dcnode-id="1156"><a data-dcnode-id="1157" href="#kohala"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Kohala Historical Sites</span></strong><span data-dcnode-id="1158" instrument_node=""> State Monument</span></a></li><li data-dcnode-id="1151"><a data-dcnode-id="1152" href="#lapakahi"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Lapakahi</span></strong><span data-dcnode-id="1153" instrument_node=""> State Historical Park</span></a></li><li data-dcnode-id="1146"><a data-dcnode-id="1147" href="#lava-tree"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Lava Tree</span></strong><span data-dcnode-id="1148" instrument_node=""> State Monument</span></a></li><li data-dcnode-id="1141"><a data-dcnode-id="1142" href="#mackenzie"><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">MacKenzie</span></strong><span data-dcnode-id="1143" instrument_node=""> State Recreation Area</span></a></li><li data-dcnode-id="1136"><a data-dcnode-id="1137" href="#manuka"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Manukā</span></strong><span data-dcnode-id="1138" instrument_node=""> State Wayside</span></a></li><li data-dcnode-id="1131"><a data-dcnode-id="1132" href="#wailoa"><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Wailoa River</span></strong><span data-dcnode-id="1133" instrument_node=""> State Recreation Area</span></a></li><li data-dcnode-id="1126"><a data-dcnode-id="1127" href="#wailuku"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Wailuku River</span></strong><span data-dcnode-id="1128" instrument_node=""> State Park</span></a></li></ol></div></div><p data-dcnode-id="1117"><span data-dcnode-id="1122" instrument_node="">You can find more information about the state park system on the </span><strong data-dcnode-id="1119"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/" rel="noopener" target="_blank"><span data-dcnode-id="1121" instrument_node="">Hawaiʻi State Parks website</span></a></strong><span data-dcnode-id="1118" instrument_node=""> (external link).</span></p><h3 data-dcnode-id="1115" id="akaka"><span data-dcnode-id="1116" instrument_node="">1: ʻAkaka Falls State Park (Hamakua Coast)</span></h3><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">Just north of Hilo this is a great stop for anyone driving past the Hamakua coast. The 422 ft tall ʻAkaka Falls are the main attraction of this park and are reachable through an easy half mile walk. </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/waterfalls/"><span data-dcnode-id="1113" instrument_node="">Waterfall</span></a><span data-dcnode-id="1111" instrument_node=""> enthusiasts also can try to see if they can spot the 400 ft Kahūnā falls.</span></p><ul data-dcnode-id="1083"><li data-dcnode-id="1106"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Opening hours</span></strong><span data-dcnode-id="1107" instrument_node="">: The vehicle gate/parking area is open from 8:30 am to 6 pm. The park is open to walk-ins between sunrise and sunset.</span></li><li data-dcnode-id="1102"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="1103" instrument_node="">: $10.00 per car and $5 per person for non residents. No charge for Hawaii residents.</span></li><li data-dcnode-id="1095"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Hiking</span></strong><span data-dcnode-id="1099" instrument_node="">: Yes! The 0.4 mile </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/akaka-falls-loop-trail/" rel="noopener" target="_blank"><span data-dcnode-id="1098" instrument_node="">ʻAkaka falls loop trail</span></a><span data-dcnode-id="1096" instrument_node="">.</span></li><li data-dcnode-id="1084"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Website</span></strong><span data-dcnode-id="1092" instrument_node="">: We love this place and have written plenty </span><strong data-dcnode-id="1089"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/akaka-falls/"><span data-dcnode-id="1091" instrument_node="">about the ʻAkaka falls</span></a></strong><span data-dcnode-id="1088" instrument_node=""> on our website. See also the </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/akaka-falls-state-park/" rel="noopener" target="_blank"><span data-dcnode-id="1087" instrument_node="">DNLR website</span></a><span data-dcnode-id="1085" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="1076" id="attachment_3703" style="width: 810px"><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/akaka-falls-picture.jpg"><noscript data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&lt;img aria-describedby="caption-attachment-3703" class="size-large wp-image-3703" src="https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-800x500.jpg" alt="Akaka falls on the Big Island" width="800" height="500" srcset="https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-800x500.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-620x388.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-768x480.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-320x200.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-400x250.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-600x375.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-614x384.jpg 614w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-922x576.jpg 922w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Akaka falls on the Big Island" aria-describedby="caption-attachment-3703" class="lazyload size-large wp-image-3703" data-dcnode-id="1080" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-800x500.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-800x500.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-620x388.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-768x480.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-320x200.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-400x250.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-600x375.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-614x384.jpg 614w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture-922x576.jpg 922w, https://www.lovebigisland.com/wp-content/uploads/akaka-falls-picture.jpg 1000w" height="500" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20500%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1077" id="caption-attachment-3703"><span data-dcnode-id="1078" instrument_node="">The 422 ft. tall ʻAkaka falls on the Big Island of Hawaii are a pleasant stop on your way to or from Hilo</span></p></div><h3 data-dcnode-id="1074" id="hapuna"><span data-dcnode-id="1075" instrument_node="">2: Hāpuna Beach State Recreation Area (Kohala)</span></h3><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">This is a landscaped beach park on the sunny Kohala coast close to where all the resorts are. There is good swimming during calm seas and bodysurfing during periods of shore breaks. This beach park hostst one of the most popular white sand beaches of the island.</span></p><ul data-dcnode-id="1031"><li data-dcnode-id="1068"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Hours</span></strong><span data-dcnode-id="1069" instrument_node="">: 7:00 am to 8:00 pm, daily.</span></li><li data-dcnode-id="1064"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="1065" instrument_node="">: $5 per visitor vehicle parking fee.</span></li><li data-dcnode-id="1054"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Hiking</span></strong><span data-dcnode-id="1061" instrument_node="">: Yes! The </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/ala-kahakai-trail-kawaihae-anaehoomalu/" rel="noopener" target="_blank"><span data-dcnode-id="1060" instrument_node="">Kawaihae-Anaehoomalu part</span></a><span data-dcnode-id="1058" instrument_node=""> of the Ala Kahakia trail (see also </span><a data-dcnode-id="1056" href="#national-historic-trail"><span data-dcnode-id="1057" instrument_node="">below</span></a><span data-dcnode-id="1055" instrument_node="">)</span></li><li data-dcnode-id="1047"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Camping/lodging</span></strong><span data-dcnode-id="1051" instrument_node="">: Yes! There are 4 person A-frame cabins for rent, reservations only! </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camping.ehawaii.gov/camping/all%2Cdetails%2C1694.html" rel="noopener" target="_blank"><span data-dcnode-id="1050" instrument_node="">More info</span></a><span data-dcnode-id="1048" instrument_node="">.</span></li><li data-dcnode-id="1039"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Beach</span></strong><span data-dcnode-id="1044" instrument_node="">: One of the most beautiful white sand beaches in the state: </span><strong data-dcnode-id="1041"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/hapuna-beach/"><span data-dcnode-id="1043" instrument_node="">Hapuna Beach</span></a></strong><span data-dcnode-id="1040" instrument_node="">.</span></li><li data-dcnode-id="1032"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Website</span></strong><span data-dcnode-id="1036" instrument_node="">: See the link above for information about the beach, or see information about the state park on the </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/hapuna-beach-state-recreation-area/" rel="noopener" target="_blank"><span data-dcnode-id="1035" instrument_node="">DNLR website</span></a><span data-dcnode-id="1033" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="1024" id="attachment_7170" style="width: 810px"><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview.jpg"><noscript data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">&lt;img aria-describedby="caption-attachment-7170" class="size-large wp-image-7170" src="https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-800x403.jpg" alt="hapuna beach, hawaii" width="800" height="403" srcset="https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-800x403.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-620x312.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-768x386.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-320x161.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-400x201.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-600x302.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-1038x522.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-694x349.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="hapuna beach, hawaii" aria-describedby="caption-attachment-7170" class="lazyload size-large wp-image-7170" data-dcnode-id="1028" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-800x403.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-800x403.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-620x312.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-768x386.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-320x161.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-400x201.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-600x302.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-1038x522.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview-694x349.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/hapuna-beach-overview.jpg 1280w" height="403" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20403%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1025" id="caption-attachment-7170"><span data-dcnode-id="1026" instrument_node="">Overview of Hapuna Beach and Hapuna bay. The Mauna Kea Golf course is visible on the left, together with the Hapuna Beach Prince Hotel. Image from google maps.</span></p></div><h3 data-dcnode-id="1022" id="hulihee"><span data-dcnode-id="1023" instrument_node="">3: Huliheʻe Palace (Kona)</span></h3><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The Huliheʻe Palace in downtown Kona once was a summer vacation home for Hawaiian royalty. Today it is a museum showcasing Victorian artifacts from the era of King Kalākaua and Queen Kapiʻolani.</span></p><ul data-dcnode-id="1000"><li data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Hours</span></strong><span data-dcnode-id="1017" instrument_node="">: Monday through Saturday from 9 am to 4 pm. Closed on major holidays.</span></li><li data-dcnode-id="1012"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="1013" instrument_node="">: $8 – $10 for adults, $ 1 for children, and $6 – $8 for kamaʻāina (residents)</span></li><li data-dcnode-id="1008"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Historic site</span></strong><span data-dcnode-id="1009" instrument_node="">: Yes! Guided tours are offered for a fee and there is a gift shop.</span></li><li data-dcnode-id="1001"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Website</span></strong><span data-dcnode-id="1005" instrument_node="">: more information on the </span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/hulihee-palace/" rel="noopener" target="_blank"><span data-dcnode-id="1004" instrument_node="">DNLR website</span></a><span data-dcnode-id="1002" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="993" id="attachment_8968" style="width: 810px"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Hulihe%25CA%25BBe-Palace-kona.jpg"><noscript data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">&lt;img aria-describedby="caption-attachment-8968" class="size-large wp-image-8968" src="https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-800x574.jpg" alt="Huliheʻe Palace, Hulihee Palace, kailua kona, big island, museum, hawaii, hawaiian royalty" width="800" height="574" srcset="https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-800x574.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-620x445.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-400x287.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-768x551.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-320x230.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-600x431.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Huliheʻe Palace, Hulihee Palace, kailua kona, big island, museum, hawaii, hawaiian royalty" aria-describedby="caption-attachment-8968" class="lazyload size-large wp-image-8968" data-dcnode-id="997" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-800x574.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-800x574.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-620x445.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-400x287.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-768x551.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-320x230.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona-600x431.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Huliheʻe-Palace-kona.jpg 1200w" height="574" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20574%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="994" id="caption-attachment-8968"><span data-dcnode-id="995" instrument_node="">The Huliheʻe Palace in Kailua-Kona is a former vacation home of Hawaiian royalty that now is converted to a museum showcasing furniture and artifacts.</span></p></div><h3 data-dcnode-id="991" id="kalopa"><span data-dcnode-id="992" instrument_node="">4: Kalōpā State Recreation Area (Hamakua Coast)</span></h3><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">This is a park that showcases a native ‘ohi’a forest at a 2000-foot elevation. An easy nature trail and camping are available on site.</span></p><ul data-dcnode-id="959"><li data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Hours</span></strong><span data-dcnode-id="986" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="981"><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="982" instrument_node="">: None</span></li><li data-dcnode-id="974"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Hiking</span></strong><span data-dcnode-id="978" instrument_node="">: Yes! The 0.7 mile </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/kalopa-nature-trail/" rel="noopener" target="_blank"><span data-dcnode-id="977" instrument_node="">Kalopa Nature loop trail</span></a><span data-dcnode-id="975" instrument_node="">.</span></li><li data-dcnode-id="967"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Camping/lodging</span></strong><span data-dcnode-id="971" instrument_node="">: Reservation only, both cabins and campsites. </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camping.ehawaii.gov/camping/all%2Cdetails%2C1686.html" rel="noopener" target="_blank"><span data-dcnode-id="970" instrument_node="">More information</span></a><span data-dcnode-id="968" instrument_node="">.</span></li><li data-dcnode-id="960"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Website</span></strong><span data-dcnode-id="964" instrument_node="">: Kalōpā State Recreation Area on the </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kalopa-state-recreation-area/" rel="noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">DNLR website</span></a><span data-dcnode-id="961" instrument_node="">.</span></li></ul><h3 data-dcnode-id="957" id="kealakekua"><span data-dcnode-id="958" instrument_node="">5: Kealakekua Bay State Historical Park (Kona)</span></h3><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">Kealakekua Bay is a state and&nbsp; a marine life conservation district, and is one of the best places in the state to </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kealakekua-bay/%23snorkeling"><span data-dcnode-id="955" instrument_node="">go snorkeling</span></a><span data-dcnode-id="953" instrument_node="">. This is the site of the first extensive contact between Hawaiians and Westerners with the arrival of Captain Cook in 1779, and also the place of his demise.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">In the park you can see Hikiau Heiau, a traditional religious site, and the Captain Cook monument at a distance across Kealakekua Bay.</span></p><ul data-dcnode-id="916"><li data-dcnode-id="946"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Hours</span></strong><span data-dcnode-id="947" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="942"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="943" instrument_node="">: None</span></li><li data-dcnode-id="935"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Hiking</span></strong><span data-dcnode-id="939" instrument_node="">: The Captain Cook monument is reachable via the </span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandhikes.com/kealakekua-bay/" rel="noopener" target="_blank"><span data-dcnode-id="938" instrument_node="">historic Ka’awaloa Trail</span></a><span data-dcnode-id="936" instrument_node="">.</span></li><li data-dcnode-id="928"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Historic site</span></strong><span data-dcnode-id="932" instrument_node="">: Yes! read more about the meaning of this place in the </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/files/2014/09/hsp_kealakekua_shp.pdf" rel="noopener" target="_blank"><span data-dcnode-id="931" instrument_node="">park brochure</span></a><span data-dcnode-id="929" instrument_node="">.</span></li><li data-dcnode-id="921"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Official website</span></strong><span data-dcnode-id="925" instrument_node="">: </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kealakekua-bay-state-historical-park/" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">DNLR website</span></a><span data-dcnode-id="922" instrument_node="">.</span></li><li data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">In-depth guide on our website</span></strong><span data-dcnode-id="918" instrument_node="">: Kealakekua Bay</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="909" id="attachment_3463" style="width: 810px"><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii.jpg"><noscript data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">&lt;img aria-describedby="caption-attachment-3463" class="size-large wp-image-3463" src="https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-800x500.jpg" alt="Captain Cook monument on the Big Island" width="800" height="500" srcset="https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-800x500.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-620x388.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-768x480.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-320x200.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-400x250.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-600x375.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-614x384.jpg 614w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-922x576.jpg 922w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Captain Cook monument on the Big Island" aria-describedby="caption-attachment-3463" class="lazyload size-large wp-image-3463" data-dcnode-id="913" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-800x500.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-800x500.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-620x388.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-768x480.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-320x200.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-400x250.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-600x375.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-614x384.jpg 614w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii-922x576.jpg 922w, https://www.lovebigisland.com/wp-content/uploads/capt-cook-monument-hawaii.jpg 1280w" height="500" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20500%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="910" id="caption-attachment-3463"><span data-dcnode-id="911" instrument_node="">The best snorkeling in Kealakekua bay is around the Captain Cook monument, but getting there is difficult. The most easy option is to book a snorkeling tour.</span></p></div><h3 data-dcnode-id="907" id="kekaha"><span data-dcnode-id="908" instrument_node="">6: Kekaha Kai State Park (Kona)</span></h3><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">This park is home to some of the most beautiful and inaccessible beaches on the Big Island.</span></p><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">The Mahaiʻula section has a sandy beach and a picnic area with tables. A 4.5-mile hike north through this wilderness park on the historic coastal trail, Ala Kahakai, leads to </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/kua-bay/"><span data-dcnode-id="903" instrument_node="">Kua Bay</span></a><span data-dcnode-id="901" instrument_node="">. Midway, a hike to the summit of Puʻu Kuʻili, a 342-foot high cinder cone, offers an excellent view of the coastline.</span></p><ul data-dcnode-id="872"><li data-dcnode-id="896"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Hours</span></strong><span data-dcnode-id="897" instrument_node="">: Open daily 8 am –7 pm</span></li><li data-dcnode-id="892"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="893" instrument_node="">: none</span></li><li data-dcnode-id="888"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Hiking</span></strong><span data-dcnode-id="889" instrument_node="">: yes, an access trail linking together a string of pristine white sand beaches. Note that the trail is dry and hot and no drinking water is provided!</span></li><li data-dcnode-id="880"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Beach</span></strong><span data-dcnode-id="885" instrument_node="">: This beach park is home to some of our </span><strong data-dcnode-id="882"><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/%23kekaha-kai"><span data-dcnode-id="884" instrument_node="">favorite beaches</span></a></strong><span data-dcnode-id="881" instrument_node="">!</span></li><li data-dcnode-id="873"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Website</span></strong><span data-dcnode-id="877" instrument_node="">: </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kekaha-kai-kona-coast-state-park/" rel="noopener" target="_blank"><span data-dcnode-id="876" instrument_node="">Kekaha Kai DNLR website</span></a><span data-dcnode-id="874" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="865" id="attachment_8938" style="width: 810px"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii.jpg"><noscript data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&lt;img aria-describedby="caption-attachment-8938" class="size-large wp-image-8938" src="https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-800x338.jpg" alt="Mahai'ula beach, kekaha kai park, big island, hawaii, beach, paradise" width="800" height="338" srcset="https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-800x338.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-620x262.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-400x169.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-768x324.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-320x135.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-600x254.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Mahai'ula beach, kekaha kai park, big island, hawaii, beach, paradise" aria-describedby="caption-attachment-8938" class="lazyload size-large wp-image-8938" data-dcnode-id="869" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-800x338.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-800x338.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-620x262.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-400x169.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-768x324.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-320x135.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii-600x254.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/mahaiula-shade-hawaii.jpg 1200w" height="338" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20338%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="866" id="caption-attachment-8938"><span data-dcnode-id="867" instrument_node="">Mahaiʻula beach is the most southern beach in the Kekaha Kai State Park on the Kona coast.</span></p></div><h3 data-dcnode-id="863" id="kiholo"><span data-dcnode-id="864" instrument_node="">7: Kīholo State Park Reserve (Kona)</span></h3><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">This is a stark, lava-covered coastal park with small bays, sparsely vegetated coastline, historic lava flows, and wide open spaces. The park facilities are basic (restrooms and trash cans, no water).</span></p><ul data-dcnode-id="831"><li data-dcnode-id="857"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Hours</span></strong><span data-dcnode-id="858" instrument_node="">: April 1 to Labor Day: 7 am to 7 pm. After Labor Day to March 31: 7 am to 6 pm</span></li><li data-dcnode-id="853"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="854" instrument_node="">: none</span></li><li data-dcnode-id="846"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Camping/lodging</span></strong><span data-dcnode-id="850" instrument_node="">: Camping is allowed for a fee on weekends with reservations only. </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camping.ehawaii.gov/camping/all%2Cdetails%2C57781.html" rel="noopener" target="_blank"><span data-dcnode-id="849" instrument_node="">More info</span></a><span data-dcnode-id="847" instrument_node="">.</span></li><li data-dcnode-id="839"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Beach</span></strong><span data-dcnode-id="843" instrument_node="">: Of course :) There is a </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/%23kiholo"><span data-dcnode-id="842" instrument_node="">beautiful salt-and-sweet water bay</span></a><span data-dcnode-id="840" instrument_node=""> with good swimming. If the tide is out the bay is dotted with tide pools that are perfect for snorkeling.</span></li><li data-dcnode-id="832"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Website</span></strong><span data-dcnode-id="836" instrument_node="">: </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;u
