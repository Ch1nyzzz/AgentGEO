rl=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kiholo-state-park-reserve/" rel="noopener" target="_blank"><span data-dcnode-id="835" instrument_node="">DNLR website</span></a><span data-dcnode-id="833" instrument_node="">.</span></li></ul><h3 data-dcnode-id="829" id="kohala"><span data-dcnode-id="830" instrument_node="">8: Kohala Historical Sites State Monument (Kohala)</span></h3><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">This is the birthsite of the greatest king hawaii has ever known: Kamehameha I. The park is a National Historic Landmark that also includes Moʻokini which is one of the most famous luakini heiau (sacrificial temples) on the island.</span></p><ul data-dcnode-id="807"><li data-dcnode-id="823"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Hours</span></strong><span data-dcnode-id="824" instrument_node="">: Open daily 9 am-8 pm, closed Wednesdays.</span></li><li data-dcnode-id="819"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="820" instrument_node="">: None.</span></li><li data-dcnode-id="815"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Historic site</span></strong><span data-dcnode-id="816" instrument_node="">: Yes! This is the birthplace of king Kamehameha I.</span></li><li data-dcnode-id="808"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Website</span></strong><span data-dcnode-id="812" instrument_node="">: </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/kohala-historical-sites-state-monument/" rel="noopener" target="_blank"><span data-dcnode-id="811" instrument_node="">DNLR website</span></a><span data-dcnode-id="809" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="800" id="attachment_10247" style="width: 810px"><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument.jpg"><noscript data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">&lt;img aria-describedby="caption-attachment-10247" class="size-large wp-image-10247" src="https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-800x360.jpg" alt="Mo'okini Heiau, Kohala Historical Sites State Monument" width="800" height="360" srcset="https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-800x360.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-620x279.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-768x346.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-320x144.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-400x180.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Mo'okini Heiau, Kohala Historical Sites State Monument" aria-describedby="caption-attachment-10247" class="lazyload size-large wp-image-10247" data-dcnode-id="804" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-800x360.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-800x360.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-620x279.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-768x346.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-320x144.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument-400x180.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kohala-historical-sites-state-monument.jpg 1200w" height="360" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20360%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="801" id="caption-attachment-10247"><span data-dcnode-id="802" instrument_node="">Mo’okini Heiau and the Kohala Historical Sites State Monument. Image credit: google maps</span></p></div><h3 data-dcnode-id="798" id="lapakahi"><span data-dcnode-id="799" instrument_node="">9: Lapakahi State Historical Park (Kohala)</span></h3><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">The Lapakahi State Historical Park contains the partially restored remains of an ancient Hawaiian coastal settlement that you can explore as part of a 1.1 mile self-guided interpretive trail. This is also a great place to </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-whale-watching/%23diy-whale-watching"><span data-dcnode-id="796" instrument_node="">see whales during whale season</span></a><span data-dcnode-id="794" instrument_node=""> (November to May).</span></p><p data-dcnode-id="788"><span data-dcnode-id="792" instrument_node="">Lapakahi is one of five Marine Life Conservation Districts on the Big Island, which means that marine life here is protected to the greatest extent possible and thus that there is </span><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">great snorkeling</span></strong><span data-dcnode-id="789" instrument_node="">! You can find good coral growth and a remarkable diversity of fish species mostly at the south end of the bay.</span></p><p data-dcnode-id="780"><span data-dcnode-id="787" instrument_node="">Read more about </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/snorkeling/%23lapakahi"><span data-dcnode-id="786" instrument_node="">snorkeling here</span></a><span data-dcnode-id="784" instrument_node=""> on our website and about the </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dar/marine-managed-areas/hawaii-marine-life-conservation-districts/hawaii-lapakahi/" rel="noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">Lapakahi MLCD</span></a><span data-dcnode-id="781" instrument_node=""> on the DNLR website.</span></p><ul data-dcnode-id="750"><li data-dcnode-id="776"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Hours</span></strong><span data-dcnode-id="777" instrument_node="">: Open daily 8 am-4 pm, closed State Holidays</span></li><li data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="773" instrument_node="">: None</span></li><li data-dcnode-id="765"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Hiking</span></strong><span data-dcnode-id="769" instrument_node="">: Yes! The 1.1 mile </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/lapakahi-village-interpretive-trail/" rel="noopener" target="_blank"><span data-dcnode-id="768" instrument_node="">Lapakahi Village Interpretive loop trail</span></a><span data-dcnode-id="766" instrument_node="">.</span></li><li data-dcnode-id="758"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Historic site</span></strong><span data-dcnode-id="762" instrument_node="">: Yes! Read all about this park in the </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/files/2014/09/Lapakahi-brochure_2014.pdf" rel="noopener" target="_blank"><span data-dcnode-id="761" instrument_node="">Lapakahi park brochure</span></a><span data-dcnode-id="759" instrument_node="">.</span></li><li data-dcnode-id="751"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Website</span></strong><span data-dcnode-id="755" instrument_node="">: </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/lapakahi-state-historical-park/" rel="noopener" target="_blank"><span data-dcnode-id="754" instrument_node="">DLNR website</span></a><span data-dcnode-id="752" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="743" id="attachment_6953" style="width: 810px"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park.jpg"><noscript data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">&lt;img aria-describedby="caption-attachment-6953" class="size-large wp-image-6953" src="https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-800x333.jpg" alt="lapakahi, whale watching, big island, hawaii" width="800" height="333" srcset="https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-800x333.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-620x258.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-320x133.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-400x167.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-768x320.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-600x250.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-1038x432.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-694x289.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="lapakahi, whale watching, big island, hawaii" aria-describedby="caption-attachment-6953" class="lazyload size-large wp-image-6953" data-dcnode-id="747" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-800x333.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-800x333.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-620x258.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-320x133.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-400x167.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-768x320.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-600x250.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-1038x432.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park-694x289.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/lapakahi-state-historical-park.jpg 1280w" height="333" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20333%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="744" id="caption-attachment-6953"><span data-dcnode-id="745" instrument_node="">satellite view of the Lapakahi state historical park. Image credit: google maps.</span></p></div><h3 data-dcnode-id="741" id="lava-tree"><span data-dcnode-id="742" instrument_node="">10: Lava Tree State Monument (Puna)</span></h3><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">This park protects an excellent example of a forest of lava trees along an 0.7 mile loop trail. Lava trees are an unusual volcanic feature and are the result of a lava flow that swept through this forested area and left behind lava molds of the tree trunks. Picnicking opportunities.</span></p><ul data-dcnode-id="716"><li data-dcnode-id="735"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Hours</span></strong><span data-dcnode-id="736" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="731"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="732" instrument_node="">: None.</span></li><li data-dcnode-id="724"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Hiking</span></strong><span data-dcnode-id="728" instrument_node="">: Yes! a </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/lava-trees-loop-trail/" rel="noopener" target="_blank"><span data-dcnode-id="727" instrument_node="">1.1 mile loop trail that showcases lava trees</span></a><span data-dcnode-id="725" instrument_node="">.</span></li><li data-dcnode-id="717"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Website</span></strong><span data-dcnode-id="721" instrument_node="">: </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/lava-tree-state-monument/" rel="noopener" target="_blank"><span data-dcnode-id="720" instrument_node="">DNLR website</span></a><span data-dcnode-id="718" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="709" id="attachment_10256" style="width: 810px"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds.jpg"><noscript data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&lt;img aria-describedby="caption-attachment-10256" class="size-large wp-image-10256" src="https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-800x432.jpg" alt="lava tree, lava mold, lava tree state park" width="800" height="432" srcset="https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-800x432.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-620x335.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-768x415.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-320x173.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-400x216.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="lava tree, lava mold, lava tree state park" aria-describedby="caption-attachment-10256" class="lazyload size-large wp-image-10256" data-dcnode-id="713" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-800x432.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-800x432.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-620x335.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-768x415.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-320x173.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds-400x216.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lava-tree-state-park-tree-molds.jpg 1200w" height="432" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20432%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="710" id="caption-attachment-10256"><span data-dcnode-id="711" instrument_node="">Lava trees are the result of a lava flow that swept through this forested area and left behind lava molds of the tree. By Sean A. Clevenger [CC BY-SA 3.0 (https://creativecommons.org/licenses/by-sa/3.0)], from Wikimedia Commons</span></p></div><h3 data-dcnode-id="707" id="mackenzie"><span data-dcnode-id="708" instrument_node="">11: MacKenzie State Recreation Area (Puna)</span></h3><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">This park showcases a wild volcanic coastline with low cliffs and picnicking in an ironwood grove. Very close to lava flows from the&nbsp; </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-lava-viewing/%23leilani"><span data-dcnode-id="705" instrument_node="">2018 Kilauea LERZ eruption</span></a><span data-dcnode-id="703" instrument_node="">. and possibly home to new black sand beaches.</span></p><ul data-dcnode-id="682"><li data-dcnode-id="698"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Hours</span></strong><span data-dcnode-id="699" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="694"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="695" instrument_node="">: None</span></li><li data-dcnode-id="690"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Hiking</span></strong><span data-dcnode-id="691" instrument_node="">: There is an old Hawaiian coastal trail that traverses the park.</span></li><li data-dcnode-id="683"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Website</span></strong><span data-dcnode-id="687" instrument_node="">: </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/mackenzie-state-recreation-area/" rel="noopener" target="_blank"><span data-dcnode-id="686" instrument_node="">Park DNLR website</span></a><span data-dcnode-id="684" instrument_node="">.</span></li></ul><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">MacKenzie is also the best access point for </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/pohoiki-black-sand-beach/"><span data-dcnode-id="680" instrument_node="">Isaac Hale beach park</span></a><span data-dcnode-id="678" instrument_node=""> (for the Pohoiki black sand beach).</span></p><h3 data-dcnode-id="675" id="manuka"><span data-dcnode-id="676" instrument_node="">12: Manukā State Wayside (Ka’u)</span></h3><p data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">This park offers a rest stop with an opportunity to picnic among a collection of native and introduced trees. Also home to an </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/activities-to-do/botanical-gardens/%23manuka"><span data-dcnode-id="673" instrument_node="">arboretum</span></a><span data-dcnode-id="671" instrument_node=""> (a botanical garden for trees)</span></p><ul data-dcnode-id="639"><li data-dcnode-id="666"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Hours</span></strong><span data-dcnode-id="667" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="662"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="663" instrument_node="">: None</span></li><li data-dcnode-id="655"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Hiking</span></strong><span data-dcnode-id="659" instrument_node="">: A </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/hiking/hawaii/manuka-nature-trail/" rel="noopener" target="_blank"><span data-dcnode-id="658" instrument_node="">2-mile nature hike</span></a><span data-dcnode-id="656" instrument_node=""> through the adjacent Manukā Natural Area Reserve</span></li><li data-dcnode-id="649"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Camping/lodging</span></strong><span data-dcnode-id="652" instrument_node="">: Yes, camping with reservation only. </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//camping.ehawaii.gov/camping/all%2Cdetails%2C1688.html" rel="noopener" target="_blank"><span data-dcnode-id="651" instrument_node="">More info</span></a></li><li data-dcnode-id="640"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Website</span></strong><span data-dcnode-id="646" instrument_node="">: This is one of our highlighted stops in the </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kau/%23manuka"><span data-dcnode-id="645" instrument_node="">Kau district</span></a><span data-dcnode-id="643" instrument_node="">. See also the </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/manuka-state-wayside/" rel="noopener" target="_blank"><span data-dcnode-id="642" instrument_node="">DNLR website</span></a></li></ul><h3 data-dcnode-id="637" id="wailoa"><span data-dcnode-id="638" instrument_node="">13: Wailoa River State Recreation Area (Hilo)</span></h3><p data-dcnode-id="631"><span data-dcnode-id="636" instrument_node="">Small and&nbsp;landscaped park set around Wailoa River in downtown Hilo. The </span><strong data-dcnode-id="633"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wailoacenter.com/" rel="noopener" target="_blank"><span data-dcnode-id="635" instrument_node="">Wailoa center</span></a></strong><span data-dcnode-id="632" instrument_node=""> which is contained within the park contains two galleries which host month-long art and cultural exhibits – both are free and open to the public.</span></p><ul data-dcnode-id="616"><li data-dcnode-id="627"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Hours</span></strong><span data-dcnode-id="628" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="623"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="624" instrument_node="">: None</span></li><li data-dcnode-id="617"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Website</span></strong><span data-dcnode-id="620" instrument_node="">: </span><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/wailoa-river-state-recreation-area"><span data-dcnode-id="619" instrument_node="">DNRL website</span></a></li></ul><h3 data-dcnode-id="614" id="wailuku"><span data-dcnode-id="615" instrument_node="">14: Wailuku River State Park (Hilo)</span></h3><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">The Wailuku state park in Hilo contains&nbsp;two separate park areas: Boiling pots and Rainbow falls. The parks offer viewpoints of geologic and scenic interest along Wailuku River.</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Boiling Pots is a succession of large pools connected by underground flow or (small) waterfalls, lined with exposed hexagonal columns that were formed by the slow cooling of basalt lava. The 80-foot Rainbow Falls is renowned for the rainbows formed from its mist on sunny mornings.</span></p><ul data-dcnode-id="590"><li data-dcnode-id="606"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Hours</span></strong><span data-dcnode-id="607" instrument_node="">: Daily During Daylight Hours</span></li><li data-dcnode-id="602"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Entrance fee</span></strong><span data-dcnode-id="603" instrument_node="">: None</span></li><li data-dcnode-id="591"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Website</span></strong><span data-dcnode-id="599" instrument_node="">: Rainbow falls is our </span><strong data-dcnode-id="596"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/rainbow-falls/"><span data-dcnode-id="598" instrument_node="">favorite drive-in waterfall</span></a></strong><span data-dcnode-id="595" instrument_node="">, more information on both locations on the </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/hawaii/wailuku-river-state-park/" rel="noopener" target="_blank"><span data-dcnode-id="594" instrument_node="">DNLR website</span></a><span data-dcnode-id="592" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="583" id="attachment_4995" style="width: 810px"><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii.jpg"><noscript data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&lt;img aria-describedby="caption-attachment-4995" class="size-large wp-image-4995" src="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-800x600.jpg" alt="rainbow falls going off big island" width="800" height="600" srcset="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-768x576.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="rainbow falls going off big island" aria-describedby="caption-attachment-4995" class="lazyload size-large wp-image-4995" data-dcnode-id="587" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-800x600.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-768x576.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-big-island-hawaii.jpg 1280w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20600%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="584" id="caption-attachment-4995"><span data-dcnode-id="585" instrument_node="">The volume of the rainbow falls (or Waianuenue) changes on a daily basis. This is what the falls look like after a good rain upstream</span></p></div><h2 data-dcnode-id="581" id="national-historic-trail"><span data-dcnode-id="582" instrument_node="">The Ala Kahakai National Historic Trail</span></h2><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The Ala Kahakai trail was designated in 2000 for the preservation, protection and interpretation of traditional Native Hawaiian culture and natural resources. It is a system of trails that are found within a 175 mile shoreline “corridor” from ʻUpolu Point on the north end of Hawaiʻi island, along the western coast through Kohala and Kona and Ka’ū, then east along the southern coast in Puna to the eastern boundary of Hawaiʻi Volcanoes National Park</span></p><p data-dcnode-id="573"><strong data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">&gt; Official NPS website: </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/alka/index.htm" rel="noopener" target="_blank"><span data-dcnode-id="577" instrument_node="">Ala Kahakai</span></a><span data-dcnode-id="575" instrument_node="">.</span></strong></p><p data-dcnode-id="567"><strong data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">&gt; Website of </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alakahakaitrail.org/" rel="noopener" target="_blank"><span data-dcnode-id="571" instrument_node="">Ala Kahakai Trail association</span></a><span data-dcnode-id="569" instrument_node="">.</span></strong></p><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">The exact layout of the historic Ala Kahakai Trail has been lost in time, and many parts now are short segments of other Big Island trails that cross through public and private lands. Currently </span><strong data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">only a few parts of the trail are being maintained</span></strong><span data-dcnode-id="563" instrument_node="">, most notably a part along the Kohala coast and several parts within the 4 national parks:</span></p><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Accessible parts of the Ala Kahakia Trail</span></h3><p data-dcnode-id="556"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Note: the trail is not yet open as a national historic trail</span></strong><span data-dcnode-id="557" instrument_node="">. The policy of the Ala Kahakai Trail association is to open and make trails public as community-based management plans are established, in place and implemented. Many sections of the trail have not been able to have that happen yet. The following parts of the trail are currently most accessible:</span></p><p data-dcnode-id="545"><span data-dcnode-id="555" instrument_node="">A 15-mile State managed Ala Kahakai in South Kohala is open to the public between </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/%23spencer"><span data-dcnode-id="554" instrument_node="">Spencer Beach Park</span></a><span data-dcnode-id="552" instrument_node=""> at Ohaiʻula in Kawaihae and </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/anaehoomalu-beach/"><span data-dcnode-id="551" instrument_node="">ʻAnaehoʻomalu Bay</span></a><span data-dcnode-id="549" instrument_node="">. You can find this part on the map below and read more information on this part of the trail on the official </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiitrails.hawaii.gov/trails/%23/trail/ala-kahakai-trail/5" rel="noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">HawaiiTrails website</span></a><span data-dcnode-id="546" instrument_node="">.</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The coastal trails at all four National Parks are also open to the public. For more information on the trail contact the Na Ala Hele Trails &amp; Access Specialist, Hawaiʻi Island, Department of Land &amp; Natural Resources, 19 East Kawili Street, Hilo, Hawaii 96720 by telephone: 808 974-4217.</span></p><p data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">You can see the trail and the trail corridor on the following map (from </span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/alka/planyourvisit/images/ALKA_Map-Final_110617.jpg" rel="noopener" target="_blank"><span data-dcnode-id="541" instrument_node="">source</span></a><span data-dcnode-id="539" instrument_node="">, size warning: linked file is 5.7 MB!):</span></p><div class="wp-caption aligncenter" data-dcnode-id="531" id="attachment_10246" style="width: 810px"><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map.jpg"><noscript data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">&lt;img aria-describedby="caption-attachment-10246" class="size-large wp-image-10246" src="https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-800x566.jpg" alt="Ala Kahakai, big island, national historic trail, hawaii, map" width="800" height="566" srcset="https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-800x566.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-620x438.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-768x543.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-2000x1414.jpg 2000w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-320x226.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-400x283.jpg 400w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Ala Kahakai, big island, national historic trail, hawaii, map" aria-describedby="caption-attachment-10246" class="lazyload size-large wp-image-10246" data-dcnode-id="535" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-800x566.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-800x566.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-620x438.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-768x543.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-2000x1414.jpg 2000w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-320x226.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/ala-kahakai-trail-map-400x283.jpg 400w" height="566" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20566%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="532" id="caption-attachment-10246"><span data-dcnode-id="533" instrument_node="">Ala Kahakai National Historic Trail is a 175 mile corridor and trail network of cultural and historical significance. It traverses through hundreds of ancient Hawaiian settlement sites and over 200 ahupuaʻa (traditional land divisions). Image source: NPS</span></p></div></div></article></main><aside aria-label="Primary Sidebar" class="sidebar sidebar-primary widget-area" data-dcnode-id="384" id="genesis-sidebar-primary" role="complementary"><h2 class="genesis-sidebar-title screen-reader-text" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Primary Sidebar</span></h2><section class="widget widget-meta" data-dcnode-id="511"><div class="widget-wrap" data-dcnode-id="512"><div class="entry-author entry-meta" data-dcnode-id="519"><p class="entry-meta__label" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Copy by:</span></p><p class="entry-meta__value" data-dcnode-id="520"><span class="entry-author" data-dcnode-id="521"><span class="entry-author-name" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Love Big Island</span></span></span></p></div><div class="entry-modified entry-meta" data-dcnode-id="513"><p class="entry-meta__label" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Last updated:</span></p><p class="entry-meta__value" data-dcnode-id="514"><time class="entry-modified-time" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">March 22, 2022</span></time></p></div></div></section><section class="widget widget_nav_menu" data-dcnode-id="502" id="nav_menu-77"><div class="widget-wrap" data-dcnode-id="503"><h3 class="widgettitle widget-title" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">COVID-19 information</span></h3><div class="menu-coronavirus-container" data-dcnode-id="504"><ul class="menu" data-dcnode-id="505" id="menu-coronavirus"><li class="menu-item menu-item-type-post_type menu-item-object-hawaii_blog menu-item-12686" data-dcnode-id="506" id="menu-item-12686"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-blog/coronavirus-update/" title="COVID-19 and your trip to Hawaii"><span data-dcnode-id="508" instrument_node="">COVID-19 and your trip to Hawaii</span></a></li></ul></div></div></section><section class="widget_text widget widget_custom_html" data-dcnode-id="470" id="custom_html-12"><div class="widget_text widget-wrap" data-dcnode-id="471"><h3 class="widgettitle widget-title" data-dcnode-id="500"><span data-dcnode-id="501" in
