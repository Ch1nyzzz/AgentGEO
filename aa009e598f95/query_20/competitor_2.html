</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">A couple weeks ago Rob and I went on a long-needed vacation to the Big Island of Hawaii. Today I’d like to share with you our experience with finding vegan food on the Big Island in the hopes that you may find it useful for your own future travels.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1790" instrument_node="">In case you’re looking for vegan-friendly restaurant suggestions on Maui instead, check out my post about </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/3889/maui-hawaii-vegan-food-guide/"><span data-dcnode-id="1789" instrument_node="">vegan food in Maui</span></a><span data-dcnode-id="1787" instrument_node="">. </span></p><span data-dcnode-id="1785" instrument_node="">

ian-at-legends-of-Hawaii-luau-Big-Island-of-Hawaii_1-186x300.jpg 186w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Blue-Hawaiian-at-legends-of-Hawaii-luau-Big-Island-of-Hawaii_1-124x200.jpg 124w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Blue-Hawaiian-at-legends-of-Hawaii-luau-Big-Island-of-Hawaii_1-300x483.jpg 300w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture></figure><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">A while ago, we both agreed that we wanted to go somewhere warm at the approach of the cooler season here in the Pacific Northwest. Even though Hawaii wasn’t our first choice (we </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/3853/things-to-do-in-maui-hawaii/"><span data-dcnode-id="1775" instrument_node="">just went to Maui last year</span></a><span data-dcnode-id="1773" instrument_node="">, and this time around we were considering Caribbean), we were glad that we decided to give it a go. </span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Last year in Maui we stayed at a condo that we booked via AirBnB. My favorite part about that condo was the opportunity to make our own meals a few times, which was way cheaper than going out to eat three times a day.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">This time on the Big Island, we stayed at </span><a aria-label="Hilton Waikoloa Village (opens in a new tab)" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tidd.ly/9e752303" rel="nofollow noreferrer noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">Hilton Waikoloa Village</span></a><span data-dcnode-id="1764" instrument_node="">. Our room didn’t have a kitchen, but we still had a wonderful time. We probably could have stayed on the premises the whole time because this place had just about everything.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">It was also nice to get some perks like free breakfast buffet and some room credit (that depends on the travel package you select). Pretty much all restaurants at the Hilton Waikoloa compound had vegan or veganizable menu options – see my reviews below.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">All in all, even though the price point for most meals on the Big Island was more expensive than back home, we were glad that this place turned out to be pretty vegan-friendly.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1755" instrument_node="">To find more vegan-friendly vacation destinations from the blog, check out my posts about </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/8877/vegan-san-diego/"><strong data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">vegan restaurants in San Diego</span></strong></a><span data-dcnode-id="1751" instrument_node="">, </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/7893/vegan-food-in-leavenworth-wa/"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">vegan food in Leavenworth, WA</span></strong></a><span data-dcnode-id="1747" instrument_node="">, and the </span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/4698/vegan-victoria-bc/"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">vegan scene in Victoria, BC</span></strong></a><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">.</span></strong></p><span data-dcnode-id="1740" instrument_node="">
</span><h2 data-dcnode-id="1737" style="text-align: center;"><span data-dcnode-id="1738" style="color: #000000;"><span data-dcnode-id="1739" instrument_node="">Vegan Food on the Big Island of Hawaii</span></span></h2><span data-dcnode-id="1736" instrument_node="">
</span><h3 data-dcnode-id="1733" style="text-align: center;"><span data-dcnode-id="1734" style="color: #cf2585;"><span data-dcnode-id="1735" instrument_node="">Under The Bodhi Tree (Mauna Lani shopping center, Waikoloa)</span></span></h3><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">This was one of the places that had quite a few mentions online as I was doing my research of vegan-friendly restaurants on the Big Island.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">We went to Under the Bodhi Tree for lunch on our first day, and the food turned out to be just what I needed – lots of fresh vegetables arranged into wraps, salads, sandwiches, smoothies, etc.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Under the Bodhi Tree is overall vegetarian, with a few good vegan options like this wrap that I ordered:</span></p><span data-dcnode-id="1723" instrument_node="">
</span><h3 data-dcnode-id="1712" style="text-align: center;"><span data-dcnode-id="1713" style="color: #800000;"><strong data-dcnode-id="1716"><picture class="aligncenter wp-image-4353 sp-no-webp" data-dcnode-id="1717" title="Vegan restaurants on Big Island of Hawaii: lunch at Under the Bodhi's Tree"><source data-dcnode-id="1722" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-137x150.webp 137w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-274x300.webp 274w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-183x200.webp 183w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-300x328.webp 300w" sizes="(max-width: 550px) 100vw, 550px" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-137x150.webp 137w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-274x300.webp 274w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-183x200.webp 183w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-300x328.webp 300w" type="image/webp"><source data-dcnode-id="1721" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.jpg 620w, https://www.veganr oads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-274x300.jpg 274w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-183x200.jpg 183w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-300x328.jpg 300w" data-ll-status="loaded" data-pin-description="Vegan Travel and Food on the Big Island of Hawaii" data-pin-title="Vegan Travel and Food on the Big Island of Hawaii" height="601" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.jpg&amp;raw" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-137x150.jpg 137w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-274x300.jpg 274w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-183x200.jpg 183w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-300x328.jpg 300w" title="Vegan restaurants on Big Island of Hawaii: lunch at Under the Bodhi's Tree" width="550"><noscript data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">&lt;img src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.jpg" class="aligncenter wp-image-4353 sp-no-webp" title="Vegan restaurants on Big Island of Hawaii: lunch at Under the Bodhi's Tree" alt="Vegan restaurants on Big Island of Hawaii: lunch at Under the Bodhi's Tree" height="601" width="550" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-137x150.jpg 137w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-274x300.jpg 274w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-183x200.jpg 183w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-wrap-at-Under-The-Bodhi-Tree-on-the-Big-Island-of-Hawaii-300x328.jpg 300w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture></strong><span data-dcnode-id="1714" style="color: #cf2585;"><span data-dcnode-id="1715" instrument_node="">Charley’s Thai (Queen’s Marketplace, Waikoloa)</span></span></span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Charley’s Thai was one of the dinner options closest to our hotel but located outside of the main hotel area, in a neat shopping mall. The menu was pretty standard for a Thai restaurant, with plenty of tofu options.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">We had the same waitress both times we went there. Each time she asked if we were vegan when we ordered our tofu curries, saying that she would let the cooks know to omit adding fish sauce. The food may not have been the best Thai we’ve ever eaten, but overall it was ok.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><h3 data-dcnode-id="1702" style="text-align: center;"><span data-dcnode-id="1703" style="color: #cf2585;"><span data-dcnode-id="1704" instrument_node="">Local Dish (Hawi)</span></span></h3><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1700" instrument_node="">We drove up to Hawi on Sunday planning to stop by their famed all-vegan </span><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Sweet Potato Kitchen</span></strong><span data-dcnode-id="1697" instrument_node=""> restaurant. However, it turned out that it was closed on weekends, so we had to look for lunch somewhere else.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">There were only a handful restaurants open, so we tried our luck with a place called Local Dish. The guy behind the counter (possibly the owner) was very attentive to our requests, pointing to the vegetarian section on the menu.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Rob picked the eggplant sandwich while I went for the roasted Portobello mushroom panini (we asked to omit cheese and butter). My sandwich came out with a nicely grilled mushroom cap, mustard, sauteed greens and lots of red bell peppers, which turned out to be a delicious combo. It may have been a little greasier than I like but I wasn’t complaining.</span></p><span data-dcnode-id="1689" instrument_node="">

g 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-Portobello-sandwich-at-the-Local-Dish-in-Hawi-Big-Island-of-Hawaii-246x200.jpg 246w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1681" id="caption-attachment-4351"><span data-dcnode-id="1682" instrument_node="">Vegan portobello panini at Local Dish in Hawi, Big Island of Hawaii</span></figcaption></figure><span data-dcnode-id="1679" instrument_node="">
</span><h3 data-dcnode-id="1675" style="text-align: center;"><span data-dcnode-id="1676" style="color: #800000;"><span data-dcnode-id="1677" style="color: #cf2585;"><span data-dcnode-id="1678" instrument_node="">Monstera (Mauna Lani shopping center, Waikoloa)</span></span></span></h3><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">This was one of our favorite meals during our trip. Monstera came up in my online search as a vegan-friendly Japanese restaurant in the nearby shopping center. Their menu showed that they had tofu steak, which we found intriguing.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Once we got to the restaurant, our waitress told us that they could make just about anything off the menu, or replace seafood with tofu/veganize the sauces in a lot of the existing menu options.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Rob went for an udon noodle bowl with tofu and vegetables, and I ordered a couple of custom veggie rolls. Rob’s noodles looked and tasted spectacular, and my veggie sushi also turned out nice, with crunchy asparagus, Kabocha squash, avocado and some other tasty bits. No pictures here because we started devouring everything as soon as the food was brought out.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><h3 data-dcnode-id="1662" style="text-align: center;"><span data-dcnode-id="1663" style="color: #cf2585;"><span data-dcnode-id="1664" instrument_node="">Café Ono (Volcano Village near Volcanoes National Park)</span></span></h3><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">On our way to the Volcanoes National Park, we stopped for lunch at Café Ono – another all-vegetarian/vegan-friendly restaurant with lots of online reviews.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">It turned out to be the cutest little place located inside an art gallery on a private farm that doubles as an artists’ retreat. The owner of the place gave us lots of tips on what to do in the national park.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">We both ordered vegan chili with brown rice that was a part of a generous platter with side salad, toast and some amazing purple sweet potato chips that I’ve never seen or eaten before but was totally fascinated by:</span></p><span data-dcnode-id="1652" instrument_node="">
</span><figure aria-describedby="caption-attachment-4355" class="wp-caption aligncenter" data-dcnode-id="1643" id="attachment_4355" style="width: 550px"><picture class="wp-image-4355 sp-no-webp" data-dcnode-id="1646" title="Vegan food on Big Island: chili with rice and a side salad at Cafe Ono on Big Island of Hawaii"><source data-dcnode-id="1651" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-132x150.webp 132w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-264x300.webp 264w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-176x200.webp 176w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-300x341.webp 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/webp"><source data-dcnode-id="1650" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-132x150.jpg 132w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-264x300.jpg 264w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-176x200.jpg 176w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-300x341.jpg 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/jpeg"><img alt="Vegan food on Big Island: chili with rice and a side salad at Cafe Ono on Big Island of Hawaii" class="wp-image-4355 sp-no-webp" data-dcnode-id="1649" data-lazy-sizes="(max-width: 550px) 100vw, 550px" data-lazy-src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.jpg" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-132x150.jpg 132w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-264x300.jpg 264w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-176x200.jpg 176w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-300x341.jpg 300w" data-pin-description="Vegan Travel and Food on the Big Island of Hawaii" data-pin-title="Vegan Travel and Food on the Big Island of Hawaii" height="625" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20550%20625'%3E%3C/svg%3E" title="Vegan food on Big Island: chili with rice and a side salad at Cafe Ono on Big Island of Hawaii" width="550"><noscript data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">&lt;img src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.jpg" class="wp-image-4355 sp-no-webp" title="Vegan food on Big Island: chili with rice and a side salad at Cafe Ono on Big Island of Hawaii" alt="Vegan food on Big Island: chili with rice and a side salad at Cafe Ono on Big Island of Hawaii" height="625" width="550" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-132x150.jpg 132w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-264x300.jpg 264w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-176x200.jpg 176w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-chili-with-rice-and-a-side-salad-at-Cafe-Ono-in-Volcano-Village-Big-Island-of-Hawaii-300x341.jpg 300w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1644" id="caption-attachment-4355"><span data-dcnode-id="1645" instrument_node="">Vegan chili with rice and a side salad at Cafe Ono on Big Island of Hawaii</span></figcaption></figure><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">We also&nbsp;took a giant slice of vegan carrot cake to go, and ate it later on the edge of a volcanic crater inside the national park.&nbsp;Hands-down&nbsp;the coolest place&nbsp;to eat&nbsp;carrot cake!</span></p><span data-dcnode-id="1639" instrument_node="">
</span><h3 data-dcnode-id="1636" style="text-align: center;"><span data-dcnode-id="1637" style="color: #cf2585;"><span data-dcnode-id="1638" instrument_node="">Gypsea Gelato (south of Kona)</span></span></h3><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">I was so impressed with </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veganrunnereats.com/3889/maui-hawaii-vegan-food-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1633" instrument_node="">vegan gelato options in Maui last year</span></a><span data-dcnode-id="1631" instrument_node=""> that when we went to the Big Island, I kind of expected to see a similar situation there. Unfortunately it wasn’t the case, but we still found one gelato place located to the south of Kona.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Gypsea Gelato makes everything on site. While the overall flavor variety was pretty big, they only had 3 non-dairy sorbet flavors. The scoops were very generous though! I had a scoop of raspberry sorbet while Rob went for mango:</span></p><span data-dcnode-id="1626" instrument_node="">
</span><figure aria-describedby="caption-attachment-4352" class="wp-caption aligncenter" data-dcnode-id="1617" id="attachment_4352" style="width: 550px"><picture class="wp-image-4352 sp-no-webp" data-dcnode-id="1620" title="Vegan food options on Big Island of Hawaii: Vegan raspberry sorbet at Gypsea Gelato"><source data-dcnode-id="1625" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-116x150.webp 116w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-232x300.webp 232w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-155x200.webp 155w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-300x388.webp 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/webp"><source data-dcnode-id="1624" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-116x150.jpg 116w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-232x300.jpg 232w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-155x200.jpg 155w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-300x388.jpg 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/jpeg"><img alt="Vegan food options on Big Island of Hawaii: Vegan raspberry sorbet at Gypsea Gelato" class="wp-image-4352 sp-no-webp" data-dcnode-id="1623" data-lazy-sizes="(max-width: 550px) 100vw, 550px" data-lazy-src= -content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-155x200.jpg 155w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-sorbet-at-Gypsea-Gelato-Big-Island-of-Hawaii-300x388.jpg 300w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1618" id="caption-attachment-4352"><span data-dcnode-id="1619" instrument_node="">Vegan food options on Big Island of Hawaii: Vegan raspberry sorbet at Gypsea Gelato</span></figcaption></figure><span data-dcnode-id="1616" instrument_node="">
</span><h2 data-dcnode-id="1613" style="text-align: center;"><span data-dcnode-id="1614" style="color: #000000;"><span data-dcnode-id="1615" instrument_node="">Our Vegan Findings at the Hilton Waikoloa Village Resort</span></span></h2><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1608"><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tidd.ly/9e752303" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1611" instrument_node="">Hilton resort in Waikoloa Village</span></a><span data-dcnode-id="1609" instrument_node=""> turned out to be a great place to relax by any of the three available pools or a beach lagoon, take nice walks and enjoy gorgeous sunsets every night.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The Hilton facility included a few on-site restaurants, and thankfully, a few of them offered decent vegan options or at least the good ol’ ‘take the cheese off to make it vegan’ things. The expectable downside was the fairly high prices of the food offered.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Anyway, here are our vegan picks among the Hilton Waikoloa Village restaurants:</span></p><span data-dcnode-id="1601" instrument_node="">
</span><h3 data-dcnode-id="1598" style="text-align: center;"><span data-dcnode-id="1599" style="color: #cf2585;"><span data-dcnode-id="1600" instrument_node="">Big Island Breakfast</span></span></h3><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">We were lucky that our travel package included coupons for free breakfasts every morning, otherwise this buffet-style restaurant charges $32.95 per person for an all-inclusive breakfast.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">We found quite a few vegan-friendly options like steel-cut oatmeal with various toppings, rice, toast, peanut butter and tropical jellies, lots of fresh fruit and some vegetables.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">I was fascinated by a nice variety of Asian pickled and marinated vegetables (the area is heavily favored by tourists from Asian countries). Also, the sight of people eating bacon and eggs with chopsticks was quite unusual 🙂</span></p><span data-dcnode-id="1588" instrument_node="">
</span><figure aria-describedby="caption-attachment-4350" class="wp-caption alignnone" data-dcnode-id="1579" id="attachment_4350" style="width: 550px"><picture class="wp-image-4350 sp-no-webp" data-dcnode-id="1582" title="Vegan Big Island: vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village"><source data-dcnode-id="1587" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x147.webp 150w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x295.webp 300w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-204x200.webp 204w" sizes="(max-width: 550px) 100vw, 550px" type="image/webp"><source data-dcnode-id="1586" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x147.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x295.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-204x200.jpg 204w" sizes="(max-width: 550px) 100vw, 550px" type="image/jpeg"><img alt="Vegan Big Island: vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village" class="wp-image-4350 sp-no-webp" data-dcnode-id="1585" data-lazy-sizes="(max-width: 550px) 100vw, 550px" data-lazy-src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x147.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x295.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-204x200.jpg 204w" data-pin-description="Vegan Travel and Food on the Big Island of Hawaii" data-pin-title="Vegan Travel and Food on the Big Island of Hawaii" height="540" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20550%20540'%3E%3C/svg%3E" title="Vegan Big Island: vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village" width="550"><noscript data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">&lt;img src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg" class="wp-image-4350 sp-no-webp" title="Vegan Big Island: vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village" alt="Vegan Big Island: vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village" height="540" width="550" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x147.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x295.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-breakfast-options-at-the-Big-Island-breakfast-buffet-at-the-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-204x200.jpg 204w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1580" id="caption-attachment-4350"><span data-dcnode-id="1581" instrument_node="">Vegan breakfast options at the Big Island Breakfast at Hilton Waikoloa Village</span></figcaption></figure><span data-dcnode-id="1578" instrument_node="">
</span><h3 data-dcnode-id="1574" style="text-align: center;"><span data-dcnode-id="1575" style="color: #800000;"><span data-dcnode-id="1576" style="color: #cf2585;"><span data-dcnode-id="1577" instrument_node="">Lagoon Grill (the same building as Ocean Sports)</span></span></span></h3><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">This burgers and fries-type restaurant is conveniently located between a pool and a lagoon beach. We found a specifically marked vegan burger made with a Boca burger patty, served on a vegan bun with vegan mayo (!) and all the trimmings.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">At 17 dollars, this was definitely the most expensive vegan burger I’ve eaten to date, but I appreciated the thoughtfulness of this place to add a vegan option to their menu.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><h3 data-dcnode-id="1564" style="text-align: center;"><span data-dcnode-id="1565" style="color: #cf2585;"><span data-dcnode-id="1566" instrument_node="">Dona and Toni’s Pizza</span></span></h3><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Dona and Toni’s offers the traditional Italian fare with local produce incorporated in a lot of dishes. It was close to our building, so we went there twice.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">We loved the fluffy crust on their cheeseless pizza (it could have used a bit more sauce though), and the Primavera pasta was also pretty good. However, the service was slow, and the complimentary bread basket typical for most Italian restaurants isn’t offered with the meals.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><h3 data-dcnode-id="1554" style="text-align: center;"><span data-dcnode-id="1555" style="color: #cf2585;"><span data-dcnode-id="1556" instrument_node="">Boat Landing Cantina</span></span></h3><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Probably one of my favorite meals at Hilton happened at this open-air restaurants that was only opened for lunches during our stay (it serves dinners during busier seasons).</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">The menu lists a veggie burrito and veggie tacos that are served with local oyster mushrooms grown on </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hamakuamushrooms.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1548" instrument_node="">a mushroom farm in Hamakua</span></a><span data-dcnode-id="1546" instrument_node="">. We both ordered the tacos, and were pleasantly surprised with how well the mushrooms tasted in them. There was also a good amount of fresh guacamole on top of each taco.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Just a heads-up: let your server know that you’re vegan to make sure the kitchen staff prepares your order separately. Also, skip the Mexican rice as it is cooked with chicken stock.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><figure aria-describedby="caption-attachment-4356" class="wp-caption aligncenter" data-dcnode-id="1532" id="attachment_4356" style="width: 620px"><picture class="wp-image-4356 size-full sp-no-webp" data-dcnode-id="1535" title="Vegan food on the Big Island of Hawaii: veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village"><source data-dcnode-id="1540" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.webp 620w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x141.webp 150w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x281.webp 300w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-213x200.webp 213w" sizes="(max-width: 620px) 100vw, 620px" type="image/webp"><source data-dcnode-id="1539" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x141.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x281.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-213x200.jpg 213w" sizes="(max-width: 620px) 100vw, 620px" type="image/jpeg"><img alt="Vegan food on the Big Island of Hawaii: veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village" class="wp-image-4356 size-full sp-no-webp" data-dcnode-id="1538" data-lazy-sizes="(max-width: 620px) 100vw, 620px" data-lazy-src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x141.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x281.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-213x200.jpg 213w" data-pin-description="Vegan Travel and Food on the Big Island of Hawaii" data-pin-title="Vegan Travel and Food on the Big Island of Hawaii" height="581" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20620%20581'%3E%3C/svg%3E" title="Vegan food on the Big Island of Hawaii: veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village" width="620"><noscript data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">&lt;img src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg" class="wp-image-4356 size-full sp-no-webp" title="Vegan food on the Big Island of Hawaii: veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village" alt="Vegan food on the Big Island of Hawaii: veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village" height="581" width="620" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii.jpg 620w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-150x141.jpg 150w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-300x281.jpg 300w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Vegan-tacos-with-trumpet-mushrooms-at-Boat-Landing-Cantina-Hilton-Waikoloa-Village-Big-Island-of-Hawaii-213x200.jpg 213w" sizes="(max-width: 620px) 100vw, 620px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1533" id="caption-attachment-4356"><span data-dcnode-id="1534" instrument_node="">Veggie tacos at the Boat Landing Cantina at Hilton Waikoloa Village</span></figcaption></figure><span data-dcnode-id="1531" instrument_node="">
</span><h3 data-dcnode-id="1527" style="text-align: center;"><span data-dcnode-id="1528" style="color: #800000;"><span data-dcnode-id="1529" style="color: #cf2585;"><span data-dcnode-id="1530" instrument_node="">Waikoloa Coffee stands</span></span></span></h3><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Hilton in Waikoloa has two of these coffee stands at both ends of the train trek (yes, the resort is so big they have a train taking people to their rooms. And a boat.)</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">In case you don’t feel like shelling out $32.95 for the breakfast buffet, you can find various breakfasty things here: oatmeal packs, granola, smoothies, Acai bowls and naturally, coffee.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><h3 data-dcnode-id="1517" style="text-align: center;"><span data-dcnode-id="1518" style="color: #cf2585;"><span data-dcnode-id="1519" instrument_node="">Legends of Hawaii Luau</span></span></h3><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Please don’t roll your eyes, but we did go to a luau 🙂 Our travel package included free tickets to this luau held on the hotel premises, so we decided to use them and see if we could find anything vegan at the traditionally meat-heavy luau buffet.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">I was ready to settle for a plate of salad if things came to it, but thankfully we found a few other vegan options like white rice (the only thing clearly marked as vegan 🙂 ), steamed broccoli and carrots, marinated tomato and seaweed salad, and lots of fruit for dessert.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">In case you’re into tropical beverages, the luau at Hilton offers free alcoholic drinks as long as you were willing to stand in line to the bar for 20+ minutes. My Blue Hawaiian (at the beginning of this post) looked just mesmerizing!</span></p><span data-dcnode-id="1507" instrument_node="">
</span><h2 data-dcnode-id="1504" style="text-align: center;"><span data-dcnode-id="1505" style="color: #000000;"><span data-dcnode-id="1506" instrument_node="">Honorable Mentions</span></span></h2><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Here are a few vegan-friendly restaurants on the Big Island that I discovered in my online search before our trip, but due to their schedules or our whereabouts we didn’t get a chance to visit them.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><h3 data-dcnode-id="1497" style="text-align: center;"><span data-dcnode-id="1498" style="color: #cf2585;"><span data-dcnode-id="1499" instrument_node="">Sweet Potato Kitchen (Hawi)</span></span></h3><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Supposedly&nbsp;the best place on the Big Island for vegan comfort food. I’m guessing we’ll have to take another trip to find out if this is true 🙂 Open for breakfast and lunch&nbsp;from 10:30 am to 3:30 pm Monday through Friday.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><h3 data-dcnode-id="1490" style="text-align: center;"><span data-dcnode-id="1491" style="color: #cf2585;"><span data-dcnode-id="1492" instrument_node="">Ai Pono Vegan Cafe, a.k.a. Evolution Bakery (Kailua-Kona)</span></span></h3><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">It’s hard to tell from their site where Ai Pono ends and Evolution Bakery starts. Generally, if you’re in Kona between 7 and 11:30 am any day, or in the afternoon or evening Wednesday through Sunday, you may get a chance to get some vegan bagels, pastries and locally grown coffee. We weren’t so lucky.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><h3 data-dcnode-id="1483" style="text-align: center;"><span data-dcnode-id="1484" style="color: #cf2585;"><span data-dcnode-id="1485" instrument_node="">Sweet Cane Cafe (Hilo)</span></span></h3><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">This place on the&nbsp;rainy side of the island offers&nbsp;vegan and vegetarian sandwiches, salads, wraps, etc. Open Monday through Saturday, 8 am to 6 pm. could be a good place to fill up before a hike in the Volcanoes National Park.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><h2 data-dcnode-id="1476" style="text-align: center;"><span data-dcnode-id="1477" style="color: #000000;"><span data-dcnode-id="1478" instrument_node="">Fun Vegan-Friendly Tours</span></span></h2><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1474" instrument_node="">Rob and I are big nerds who love finding out how our food is made, so vegan-friendly tours are always on our travel itinerary if we can find them. Out of these three, we went to the chocolate and coffee farms. If you’re not into farm tours, here’s </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tidd.ly/ee3b213" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1473" instrument_node="">a whole lot of other fun activities on the Big Island</span></a><span data-dcnode-id="1471" instrument_node="">.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><h3 data-dcnode-id="1466" style="text-align: center;"><span data-dcnode-id="1467" style="color: #cf2585;"><span data-dcnode-id="1468" instrument_node="">Original Hawaiian Chocolate Factory and Farm (Kona area)</span></span></h3><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">A great place to see how chocolate is made! This beautiful place grows their own cacao beans, processes them and makes them into chocolate bars.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">This was also the only brand of Hawaiian chocolate I could find that had a dairy-free dark variety. Tours are offered on Wednesday and Friday mornings – make sure to schedule yours in advance ($15 per person).</span></p><span data-dcnode-id="1459" instrument_node="">
</span><figure aria-describedby="caption-attachment-4372" class="wp-caption aligncenter" data-dcnode-id="1450" id="attachment_4372" style="width: 550px"><picture class="wp-image-4372 size-full sp-no-webp" data-dcnode-id="1453" title="Vegan-friendly tours on the Big Island of Hawaii: the Original Hawaiian Chocolate Factory and Farm"><source data-dcnode-id="1458" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.webp 550w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-124x150.webp 124w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-248x300.webp 248w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-165x200.webp 165w,https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-300x363.webp 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/webp"><source data-dcnode-id="1457" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.jpg 550w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-124x150.jpg 124w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-248x300.jpg 248w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-165x200.jpg 165w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-300x363.jpg 300w" sizes="(max-width: 550px) 100vw, 550px" type="image/jpeg"><img alt="Vegan-friendly tours on the Big Island of Hawaii: the Original Hawaiian Chocolate Factory and Farm" class="wp-image-4372 size-full sp-no-webp" data-dcnode-id="1456" data-lazy-sizes="(max-width: 550px) 100vw, 550px" data-lazy-src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.jpg" data-lazy-srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.jpg 550w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-124x150.jpg 124w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-248x300.jpg 248w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-165x200.jpg 165w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-300x363.jpg 300w" data-pin-description="Vegan Travel and Food on the Big Island of Hawaii" data-pin-title="Vegan Travel and Food on the Big Island of Hawaii" height="665" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20550%20665'%3E%3C/svg%3E" title="Vegan-friendly tours on the Big Island of Hawaii: the Original Hawaiian Chocolate Factory and Farm" width="550"><noscript data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">&lt;img src="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.jpg" class="wp-image-4372 size-full sp-no-webp" title="Vegan-friendly tours on the Big Island of Hawaii: the Original Hawaiian Chocolate Factory and Farm" alt="Vegan-friendly tours on the Big Island of Hawaii: the Original Hawaiian Chocolate Factory and Farm" height="665" width="550" srcset="https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm.jpg 550w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-124x150.jpg 124w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-248x300.jpg 248w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-165x200.jpg 165w, https://www.veganrunnereats.com/wp-content/uploads/2016/11/Cacao-pods-at-the-Original-Hawaiian-Chocolate-Factory-and-Farm-300x363.jpg 300w" sizes="(max-width: 550px) 100vw, 550px"&gt;</span></noscript></picture><figcaption class="wp-caption-text" data-dcnode-id="1451" id="caption-attachment-4372"><span data-dcnode-id="1452" instrument_node="">Freshly picked cacao pods at the Original Hawaiian Chocolate Factory and Farm</span></figcaption></figure><span data-dcnode-id="1449" instrument_node="">
</span><h3 data-dcnode-id="1446" style="text-align: center;"><span data-dcnode-id="1447" style="color: #cf2585;"><span data-dcnode-id="1448" instrument_node="">Mountain Thunder Coffee Plantation (Kona area)</span></span></h3><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Kona coffee is known all over the world for its high quality beans, and this farm and mini processing plant offer some of the best coffee I’ve tried (also quite expensive, with some varieties marked at $75-85 a pound in their gift shop).</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">A great place to see how coffee is grown and roasted, taste a few samples, and tickle the belly of the fluffiest and friendliest cat I’ve ever met! Free tours happen every day between 10 am and 4 pm.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><h3 data-dcnode-id="1436" style="text-align: center;"><span data-dcnode-id="1437" style="color: #cf2585;"><span data-dcnode-id="1438" instrument_node="">Hamakua Mushroom Farm (north of Hilo)</span></span></h3><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Mushrooms can be quite fascinating too! I saw mentions of this place’s harvest on menus all over the island. Tours and tastings happen on Tuesdays and Thursdays ($20 per person), reservations required.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">I hope you now have a better feel for the vegan Big Island scene! If you find any additional vegan restaurants on Big Island of Hawaii, please let me know, and I’ll gladly add them to this list.</span></p><span data-dcnode-id="1429" instrument_node="">

</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Hi Erin! I didn’t do any running when I was there – was taking a much needed break from working out – but it’s totally doable! The scenery is quite different on the east and west side of the island: the east is greener and cooler weather-wise, and the west is very dry and hot, so you’d need to adjust when you’re going out for a run, what you’re bringing along, etc. Definitely bring some water if you’ll be running on the west side! There are vast black lava fields on the west (dry lava of course), so it feels even hotter outside in the afternoon. Anyway, hope you have some fun running while you’re on the Big Island!</span></p><span data-dcnode-id="935" instrument_node="">
